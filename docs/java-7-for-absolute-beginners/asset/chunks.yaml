- fmt: "### Implementing `java.lang.Comparable`\n\nAnother best practice acknowledged\
    \ by the Java community is to use `java.lang.Comparable` for comparisons that\
    \ are “natural” to the object. People naturally sort themselves by name (just\
    \ look at a phone book), so it makes sense to implement `java.lang.Comparable`\
    \ and have its `compareTo` method tell us whether a name is less than, equal to,\
    \ or greater than another person's name. [Listing 4-30](#Chapter04.html#list_4_30)\
    \ shows our `Person` class again, with the addition of implementing `java.lang.Comparable`.\
    \ For our `Person` example, we get the numeric value of each `String` field, add\
    \ them together, and use that as the numeric value of our `Person` object.\n\n\
    **Listing 4-30.** Person class implementing `java.lang.Comparable`\n\n```\npackage\
    \ com.apress.javaforabsolutebeginners .examples.comparing;\n\npublic class Person\
    \ implements Comparable<Person> {\n  String firstName;\n  String lastName;\n \
    \   public Person (String firstName, String lastName) {\n    this.firstName =\
    \ firstName;\n    this.lastName = lastName;\n  }\n\n  public boolean equals(Person\
    \ p) {\n    if (p == null) {\n      return false;\n    }\n    if (p == this) {\n\
    \      return true;\n    }\n    if (!(p instanceof Person)) {\n      return false;\n\
    \    }\n    if (p.lastName.equals(this.lastName)\n        && p.firstName.equals(this.firstName))\
    \ {\n      return true;\n    } else {\n      return false;\n    }\n  }\n\n  public\
    \ int hashCode() {\n    int result = 17;\n    result *= firstName.hashCode() *\
    \ 37;\n    result *= lastName.hashCode() * 37;\n    return result;\n  }\n\n  public\
    \ int compareTo(Person p) {\n    int thisTotal = firstName.hashCode() + lastName.hashCode();\n\
    \    int pTotal = p.firstName.hashCode() + p.lastName.hashCode();\n    if (thisTotal\
    \ > pTotal) {\n      return 1;\n    }\n    if (thisTotal < pTotal) {\n      return\
    \ -1;\n    }\n    // must be equal\n    return 0;\n  }\n}\n```\n\nThe contract\
    \ that the `compareTo` method guarantees (as described in its documentation) is\
    \ that it will return a positive number if the local object is greater than the\
    \ object in the argument, a negative number if the local object is less than the\
    \ object in the argument, and 0 if the two are equal. It's also important that,\
    \ given the same object as an argument, the `equals` method returns true and the\
    \ `compareTo` method returns 0. To do that, just use the same fields in both methods.\
    \ If you need to break the rule, be sure to document it in the Javadoc for the\
    \ `compareTo` method.\n\n![images](images/square.jpg) **Tip** A common problem\
    \ is to try to cast a class that implements `java.lang.Comparable` to a class\
    \ of your own. Because they are in different packages (your class is in your own\
    \ package and the other class is in the `java.lang.Comparable` package), you can't\
    \ cast your class to the other class. `Integer` is probably the class that most\
    \ often causes this problem, but any class that extends `java.lang.Comparable`\
    \ has the same issue. So, if you see a `ClassCastException`, remember this particular\
    \ problem, because it is a likely cause of the exception.\n\nRemember that to\
    \ compare `Person` objects, you need to create another class with a main method,\
    \ set up a few `Person` objects, and then compare them. I include a class to do\
    \ just that at the end of the chapter, but why not give it a try now? As with\
    \ so many other things, you can't learn to program unless you program.\n\n###\
    \ Implementing `java.util.Comparator`\n\nAlthough the Java community uses `java.lang.Comparable`\
    \ for natural comparisons, we implement a `Comparator` when we want to compare\
    \ objects in some arbitrary way. Also, because `Comparator` objects are themselves\
    \ classes, it's possible to implement many different `Comparator` objects for\
    \ the same class. Let's expand our `Person` object to have a field by which we\
    \ probably wouldn't usually want to sort and then create a `Comparator` class\
    \ to sort by it. That kind of thing happens pretty often, really, because it allows\
    \ for grouping by not-so-obvious characteristics. [Listing 4-31](#Chapter04.html#list_4_31)\
    \ shows the modified Person class.\n\n**Listing 4-31.** Person class with a favorite\
    \ book field\n\n```\npackage com.apress.javaforabsolutebeginners .examples.comparing;\n\
    \npublic class Person implements Comparable<Person> {\n  String firstName;\n \
    \ String lastName;\n  String favoriteBook;\n    public Person (String firstName,\
    \ String lastName, String favoriteBook) {\n    this.firstName = firstName;\n\n\
