    \npublic class CompareTest {\n```"
  raw: '##### Implementing java.lang.Comparable


    Another best practice acknowledged by the Java community is to use `java.lang.Comparable`
    for comparisons that are “natural” to the object. People naturally sort themselves
    by name (just look at a phone book), so it makes sense to implement `java.lang.Comparable`
    and have its `compareTo` method tell us whether a name is less than, equal to,
    or greater than another person''s name. [Listing 4-30](#Chapter04.html#list_4_30)
    shows our `Person` class again, with the addition of implementing `java.lang.Comparable`.
    For our `Person` example, we get the numeric value of each `String` field, add
    them together, and use that as the numeric value of our `Person` object.


    ***Listing 4-30.** Person class implementing java.lang.Comparable*


    `package com.apress.javaforabsolutebeginners .examples.comparing;`


    `public class Person implements Comparable<Person> {`

    `  String firstName;`

    `  String lastName;`

    `    public Person (String firstName, String lastName) {`

    `    this.firstName = firstName;`

    `    this.lastName = lastName;`

    `  }`


    `  public boolean equals(Person p) {`

    `    if (p == null) {`

    `      return false;`

    `    }`

    `    if (p == this) {`

    `      return true;`

    `    }`

    `    if (!(p instanceof Person)) {`

    `      return false;`

    `    }`

    `    if (p.lastName.equals(this.lastName)`

    `        && p.firstName.equals(this.firstName)) {`

    `      return true;`

    `    } else {`

    `      return false;`

    `    }`

    `  }`


    `  public int hashCode() {`

    `    int result = 17;`

    `    result *= firstName.hashCode() * 37;`

    `    result *= lastName.hashCode() * 37;`

    `    return result;`

    `  }`


    `  public int compareTo(Person p) {`

    `    int thisTotal = firstName.hashCode() + lastName.hashCode();`

    `    int pTotal = p.firstName.hashCode() + p.lastName.hashCode();`

    `    if (thisTotal > pTotal) {`

    `      return 1;`

    `    }`

    `    if (thisTotal < pTotal) {`

    `      return -1;`

    `    }`

    `    // must be equal`

    `    return 0;`

    `  }`

    `}`


    The contract that the `compareTo` method guarantees (as described in its documentation)
    is that it will return a positive number if the local object is greater than the
    object in the argument, a negative number if the local object is less than the
    object in the argument, and 0 if the two are equal. It''s also important that,
    given the same object as an argument, the `equals` method returns true and the
    `compareTo` method returns 0\. To do that, just use the same fields in both methods.
    If you need to break the rule, be sure to document it in the Javadoc for the `compareTo`
    method.


    ![images](images/square.jpg) **Tip** A common problem is to try to cast a class
    that implements `java.lang.Comparable` to a class of your own. Because they are
    in different packages (your class is in your own package and the other class is
    in the `java.lang.Comparable` package), you can''t cast your class to the other
    class. `Integer` is probably the class that most often causes this problem, but
    any class that extends `java.lang.Comparable` has the same issue. So, if you see
    a `ClassCastException`, remember this particular problem, because it is a likely
    cause of the exception.


    Remember that to compare `Person` objects, you need to create another class with
    a main method, set up a few `Person` objects, and then compare them. I include
    a class to do just that at the end of the chapter, but why not give it a try now?
    As with so many other things, you can''t learn to program unless you program.


    Implementing `java.util.Comparator` Although the Java community uses `java.lang.Comparable`
    for natural comparisons, we implement a `Comparator` when we want to compare objects
    in some arbitrary way. Also, because `Comparator` objects are themselves classes,
    it''s possible to implement many different `Comparator` objects for the same class.
    Let''s expand our `Person` object to have a field by which we probably wouldn''t
    usually want to sort and then create a `Comparator` class to sort by it. That
    kind of thing happens pretty often, really, because it allows for grouping by
    not-so-obvious characteristics. [Listing 4-31](#Chapter04.html#list_4_31) shows
    the modified Person class.


    ***Listing 4-31.** Person class with a favorite book field*


    `package com.apress.javaforabsolutebeginners .examples.comparing;`


    `public class Person implements Comparable<Person> {`

    `  String firstName;`

    `  String lastName;`

    `  String favoriteBook;`

    `    public Person (String firstName, String lastName, String favoriteBook) {`

    `    this.firstName = firstName;`


    `    this.lastName = lastName;`

    `    this.favoriteBook = favoriteBook;`

    `  }`


    `  public boolean equals(Person p) {`

    `    if (p == null) {`

    `      return false;`

    `    }`

    `    if (p == this) {`

    `      return true;`

    `    }`

    `    if (!(p instanceof Person)) {`

    `      return false;`

    `    }`

    `    if (p.lastName.equals(this.lastName)`

    `        && p.firstName.equals(this.firstName)) {`

    `      return true;`

    `    } else {`

    `      return false;`

    `    }`

    `  }`


    `  public int hashCode() {`

    `    int result = 17;`

    `    result *= firstName.hashCode() * 37;`

    `    result *= lastName.hashCode() * 37;`

    `    return result;`

    `  }`


    `  public int compareTo(Person p) {`

    `    // sort by last name first`

    `    if (lastName.compareTo(p.lastName) > 0) {`

    `      return 1;`

    `    }`

    `    if (lastName.compareTo(p.lastName) < 0) {`

    `      return -1;`

    `    }`

    `    // last names must be equal`

    `    // so compare first names`

    `    if (firstName.compareTo(p.firstName) > 0) {`

    `      return 1;`

    `    }`

    `    if (firstName.compareTo(p.firstName) < 0) {`

    `      return -1;`

    `    }`

    `    // both names must be equal`

    `    return 0;`

    `  }`

    `}`


    And [Listing 4-32](#Chapter04.html#list_4_32) shows the book comparator class.


    ***Listing 4-32.** Book comparator class*


    `package com.apress.javaforabsolutebeginners .examples.comparing;`


    `import java.util.Comparator;`


    `public class BookComparator implements Comparator<Person> {`


    `  public int compare(Person p1, Person p2) {`

    `    return p1.favoriteBook.compareTo(p2.favoriteBook);`

    `  }`

    `}`


    In this case, all we have to do is use the `String` class''s `compareTo` method.
    Note that we must tell the comparator what kind of thing to compare (with `Comparator<Person>`).
    Otherwise, we have to accept arguments of type `Object` and cast to objects of
    type `Person`.


    ![images](images/square.jpg) **Note** You don''t need comparators for arrays of
    primitives or for collections of any objects that implement `java.lang.Comparable`
    (such as `String` and `Integer`). Those objects are already comparable.


    Finally, [Listing 4-33](#Chapter04.html#list_4_33) shows `CompareTest`, expanded
    to use both kinds of comparison.


    ***Listing 4-33.** CompareTest using both comparisons*


