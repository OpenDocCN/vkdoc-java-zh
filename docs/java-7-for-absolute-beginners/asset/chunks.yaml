    The `AverageImpl` class includes a constructor, as shown in [Listing 2-11](#Chapter02.html#list_2_11).


    ***Listing 2-11.** A constructor*


    `         public AverageImpl(int[] ints) throws IllegalArgumentException {`

    `                 if (ints.length == 0){`

    `                         throw new IllegalArgumentException(EXCEPTION_MESSAGE);`

    `                 }`

    `                 this.ints = ints;`

    `         }`


    Constructors look like methods but aren''t. Notice the lack of a return type and
    the name being identical to the class name. They are called when we first create
    an object and enable us to set up the object before we do anything with it. Creating
    the object is called *instantiation*.


    What needs to be done varies tremendously by class. Many constructors (such as
    the one shown in this example) set some values. Other classes might create other
    objects, open a database connection or a file, or start some other process (and
    the possibilities don''t stop there).


    If you don''t define a constructor, Java still creates a default constructor,
    to enable the `new` keyword to work. Otherwise, no one would ever be able to create
    an instance of your class. Constructors can have all the usual access modifiers.


    You can also create multiple constructors for a single class. For example, suppose
    we want to provide a handy way to average any other number with 2\. We can do
    that with a constructor such as in [Listing 2-12](#Chapter02.html#list_2_12):


    ***Listing 2-12.** Another constructor*


    `         public AverageImpl(int otherNumber) {`

    `                 ints = new int[] {2, otherNumber};`

    `         }`


    Now we have two ways to create an instance of the `AverageImpl` class.


    ![images](images/square.jpg) **Note** The `this` keyword is a reference to the
    object the class defines. In this case, the `this` keyword is necessary to distinguish
    the `ints` field in the class from the `ints` argument in the constructor''s argument
    list.


    #### Access Modifiers


    Classes, interfaces, fields, and methods all use various access modifiers to indicate
    which other classes and interfaces can see and (potentially) modify the item in
    question. Java has four access modifiers: `private`, `package-private`, `protected`,
    and `public`.


    *   `private` means that only the other members (that is, fields and methods)
    within a class can see and (for fields) modify the method or field at hand. Private
    classes and interfaces appear only within classes, never as stand-alone constructs.

    *   package-private (often just called package) means that other members of the
    same package have access to the item. package-private is the default access modifier
    and does not have a keyword, because `package` is used to specify the package
    for a class or interface. To declare package access for something, use no access
    modifier.

    *   `protected` indicates that only descendants of the class can access the item.
    Classes can be protected, but protected classes generally appear only within other
    classes (an idiom called an inner class). Similarly, interfaces can be protected
    (provided they are within a class), but it''s rare (I''ve never seen one). `protected`
    is most often used on fields and methods within classes.

    *   `public` indicates that any object has access to the item. `public` is often
    used (and probably overused quite a bit). It pays to get into the habit of asking
    whether anything should be public.


    One other thing to know is that the access modifiers are hierarchical. `private`
    includes package-private (that is, if something can see a private object, it can
    see a package-private object, too), package-private includes `protected`, and
    `protected` includes `public`. Hard-to-find problems can arise when people forget
    that the access modifiers are hierarchical. Imagine a package with multiple classes
    and within that package, some class has a method visible to the package and another
    class has a protected method of the same name. Potentially, code can end up calling
    the wrong method. It doesn''t happen often, but it''s tough to figure out when
    it does.


    ![images](images/square.jpg) **Note** Access modifiers can be tricky. In the course
    of writing this brief description of them, I tripped over all kinds of uses I
    hadn''t previously considered (it''s been a learning experience). For example,
    Ithought that interfaces could not be protected. However, they can be protected
    (or private) when they appear within classes. `private` and `public` are easy
    to understand and use. For `package` and `protected`, think carefully before deciding
    to use that modifier.


    #### Interfaces


    *Interfaces* define behaviors that classes must implement if they implement the
    interface. Interfaces are always abstract, and all the methods they contain are
    also always abstract. *Abstract* (which Java supports with `abstract` keyword)
    means that the class or method or field or whatever cannot be instantiated (that
    is, created) where it is defined. Some other object must instantiate the item
    in question. In the case of interfaces, that means a class that implements the
    interface must implement the methods defined in the interface (as we already learned,
    but now you know why that''s the case). Consequently, interfaces never implement
    anything. Also, interfaces, and the methods they contain, are always static. Consequently,
    each interface (and its methods) exists exactly once in the system.


    Interfaces generally contain only method definitions. They can also contain fields,
    but those fields are always constants.


    Consider the `getAverage()` method from the `Average` interface listed earlier
    in the chapter. As you can see, the method has no body, not even braces. That''s
    a method definition (also called a method signature), as opposed to a method.
    Any class that implements the interface must implement that method, including
    its modifiers and arguments. In this example, a class that implements `Average`
    must contain a method with the same modifiers. That is, the class must contain
    a `public float getAverage()` method with a body that does whatever needs to be
    done and returns a float value. (We cover data types in the next chapter.)


    Interfaces offer a handy way to ensure that similar classes implement similar
    (but not necessarily the same) behavior. Consider a set of classes that model
    the animal kingdom. Such a model might have a `Predator` interface with a `hunt()`
    method. Both cats and dogs hunt, but they do it differently (cats tend to pounce,
    and dogs tend to chase). By leaving the details to the classes, the `Predator`
    interface lets us know that predators hunt but leaves room for each kind of predator
    to hunt in their own way.'
