- fmt: '# Debugging with Eclipse


    Not every error throws an exception; sometimes, due to poor programming, your
    code will do something totally wrong without throwing an exception. The computer
    did exactly what you told it to do, but it didn''t do what you meant. When programming,
    it pays to remember that a computer is just a construction of silicon and various
    metals, so it is literally as dumb as a box of rocks. It has no conscious ability
    to adjust for your errors, as another person does when you speak or write.


    Software developers love exceptions. Every time Java throws an exception, it provides
    a stack trace, showing us the classes and methods (and line numbers therein) that
    led to the exception. That makes finding and fixing the error easy.


    In the absence of an exception, though, you have to either puzzle it out by examining
    the logic of the program or use a debugger. Sometimes, just examining the logic
    will do the trick. Other times, however, only a debugger will do the job. As my
    editors could surely tell you, I often miss my own errors. I know what I meant
    to write and look past what I actually wrote. The same problem applies to programming:
    we know what we intended to do and often overlook what we actually did. A debugger
    forces you to look at your code differently, which can help you find the problem.
    Also, a debugger “steps” through the code one line at a time. That narrow scope
    (a single line) allows you to really focus to find any error.


    Eclipse includes a full-featured debugger, and the rest of this chapter describes
    how to use that debugger to track down and fix a problem. Other debuggers exist
    for Java, and Java includes a command-line debugger called `JDB` (The Java Debugger).
    However, I think the Eclipse debugger is easier to use and provides all the features
    one needs. For what it''s worth, I generally use it for my own work.


    I had a problem with the Fireworks program from [Chapter 10](#Chapter10.html#ch10),
    “Animation” that I had to use the debugger to find, so I''ll use that program
    as an example for our debugging exercise. In fact, I''ll start by showing you
    a problem that I used the Eclipse debugger to solve. [Figure 11-1](#Chapter11.html#fig_11_1)
    shows the mess I made of the Fireworks program before I got it to work correctly.


    ![images](images/1101.jpg)


    ***Figure 11-1.** Fireworks problem*


    As you can see, I accidentally created searchlights rather than fireworks. The
    question is: How did I do it? Since the answer didn''t just jump out at me when
    I first read the code, I used the debugger to puzzle out the problem. As always,
    99% of the effort went into finding the problem. Once you reach the “Aha!” moment,
    actually fixing the problem usually takes very little time (except for those times
    when you discover that you need to rewrite the whole program—those are bad days.)


    Before we can analyze what went wrong, though, you need to learn more about debugging
    in general and how to use the Eclipse debugger in particular, so we''ll return
    to this busted Fireworks program near the end of the chapter.


    ## The Flow of Debugging


    Before we dive into the Eclipse debugger, I think it would be a good idea to present
    a walkthrough of the overall debugging process.


    1.  Identify the problem. That sounds trivial, but it''s often not. In complex
    systems (and sometimes even in simple ones), just stating the trouble can be tricky.
    Ask yourself: Exactly which behavior is wrong?

    2.  Set a breakpoint at a line you think (you often can''t be entirely sure) will
    be executed before your problem occurs. As you gain skill with debugging, you''ll
    get better at setting your initial entry point.

    3.  Step over the lines until you hit the error. The line you just stepped over
    is the problem line (or possibly one of multiple problem lines, if you have nested
    issues). If it''s helpful, examine the values of the variables as you go. That
    can be especially useful in loops.

    4.  Set a breakpoint on that line and restart your application. When you get to
    that line, step into it.

    5.  Alternate between stepping over and stepping into lines until you finally
    have the defective code at its lowest level. Again, examine the values of any
    variables related to the problem as you go.


    By following that the preceding general flow, you can use a debugger to identify
    exactly where your program did what you didn''t want it to do, even though it
    didn''t throw an exception.


    ## Debugging without a Debugger


    In Java''s early days (circa 1995), there was no debugger, either at the command
    line or in a nice program such as Eclipse. Yet those of us using Java still had
    to find and fix our bugs. So, we fell back on the old practice of writing values
    to the console. The `System.out.println()` method was our friend (though we certainly
    got tired of writing it). We would add print statements to show the values of
    all the relevant variables wherever we suspected a bug existed. In that fashion,
    we could inspect the values as the code ran. It was a poor substitute for being
    able to step over and into lines with an actual debugger, but it worked.


    Programmers sometimes still use that technique, even when a debugger is available.
    For example, if I think I can figure out a problem quickly with just a print statement
    or two, I''ll try that first. If you use print statements this way, remember to
    remove them when you solve the issue. I''ve been embarrassed in more than one
    code review by a lingering print statement.


    Fortunately for you, you get to learn Java at a time when mature tools have already
    been created, so you don''t have to rely on print statements. To that end, let''s
    fire up the Eclipse debugger and see how it works.


    ## Starting the Eclipse Debugger


    To start the Eclipse debugger:


    1.  Open Eclipse.

    2.  From the **Window** menu, choose **Open Perspective**, and then choose **Debug**.
    The Debug perspective appears.


    ![images](images/square.jpg) **Tip** After the first time you open the Debug perspective,
    a shortcut button appears on the right side of the Eclipse toolbar. In the future,
    you can switch to the Debug perspective by clicking that button and back to the
    regular perspective by clicking the **Java** button.


    Let''s start by opening the `Firework` class (the object that controls drawing
    a single firework). When you first open the `Firework` class in the Debug perspective,
    you''ll see a screen very similar to the one in [Figure 11-2](#Chapter11.html#fig_11_2).


    ![images](images/1102.jpg)


    ***Figure 11-2.** Eclipse Debug perspective*


    Let''s look at this screen in more detail. You can see the code in the middle
    left panel of the application. The middle right panel displays an outline of the
    class. So far, it''s the same as the Java perspective, but with a lot less space.
    The top left area shows the Debug panel and a tab to switch back to the Navigator
    panel. When you run the debugger, the Debug panel shows the call stack (all the
    objects the program went through to get to its current point). The top right area
    shows the breakpoints and variables. We''ll talk about breakpoints and variables
    shortly. Finally, the bottom panel shows a number of possible views. You generally
    want the console view when debugging.


    Don''t worry if your debugger doesn''t look exactly like mine. Like every software
    developer, I''ve customized my environment a bit, and we may be on different versions.
    The general layout is still the same, though, and that''s enough to show you the
    relevant parts.'
  raw: '## Debugging with Eclipse


    Not every error throws an exception; sometimes, due to poor programming, your
    code will do something totally wrong without throwing an exception. The computer
    did exactly what you told it to do, but it didn''t do what you meant. When programming,
    it pays to remember that a computer is just a construction of silicon and various
    metals, so it is literally as dumb as a box of rocks. It has no conscious ability
    to adjust for your errors, as another person does when you speak or write.


    Software developers love exceptions. Every time Java throws an exception, it provides
    a stack trace, showing us the classes and methods (and line numbers therein) that
    led to the exception. That makes finding and fixing the error easy.


    In the absence of an exception, though, you have to either puzzle it out by examining
    the logic of the program or use a debugger. Sometimes, just examining the logic
    will do the trick. Other times, however, only a debugger will do the job. As my
    editors could surely tell you, I often miss my own errors. I know what I meant
    to write and look past what I actually wrote. The same problem applies to programming:
    we know what we intended to do and often overlook what we actually did. A debugger
    forces you to look at your code differently, which can help you find the problem.
    Also, a debugger “steps” through the code one line at a time. That narrow scope
    (a single line) allows you to really focus to find any error.


    Eclipse includes a full-featured debugger, and the rest of this chapter describes
    how to use that debugger to track down and fix a problem. Other debuggers exist
    for Java, and Java includes a command-line debugger called JDB (The Java Debugger).
    However, I think the Eclipse debugger is easier to use and provides all the features
    one needs. For what it''s worth, I generally use it for my own work.


    I had a problem with the Fireworks program from [Chapter 10](#Chapter10.html#ch10),
    “Animation” that I had to use the debugger to find, so I''ll use that program
    as an example for our debugging exercise. In fact, I''ll start by showing you
