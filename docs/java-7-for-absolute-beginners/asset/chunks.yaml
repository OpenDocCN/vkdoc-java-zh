- fmt: "### For Loops\n\nAs a rule, use a `for` loop when you have some value that\
    \ you can count. For example, whenever you have an array or a list or an enumeration,\
    \ you can use a `for` loop based on the number of items present.\n\nRemember our\
    \ cardinal direction example from [Chapter 3](#Chapter03.html#ch3)? Let's examine\
    \ that more closely in [Listing 5-7](#Chapter05.html#list_5_7).\n\n**Listing 5-7.**\
    \ Loop that finds directions\n\n```\nint[] compassPoints = {22, 77, 144, 288};\n\
    for (int i = 0; i < compassPoints.length; i++) {\n  System.out.println(compassPoints[i]\
    \ + \" degrees is (very roughly) \"\n      + Direction.findCardinalDirection(compassPoints[i]));\n\
    }\n```\n\nThe `for` loop consists of two parts: the information that controls\
    \ the looping and the block of code that gets run each time through the loop.\
    \ The control section (within the parentheses) consists of three parts: initialization,\
    \ termination, and increment. Each of these three parts ends with a semicolon,\
    \ though the semicolon after the increment is often dropped. The names give us\
    \ a good indication of what they do. The initialization code sets up whatever\
    \ variable we use for our counting, the termination code indicates how to know\
    \ when to stop looping, and the increment code dictates how to change the initialization\
    \ variable each time through the loop. In this simple case, we set an `int` named\
    \ `i` to 0, running the code in the loop for each item in the `compassPoints`\
    \ array, and incrementing the initialization variable (`i`) by one each time.\n\
    \nJava programmers can certainly do things differently than shown here. Consider\
    \ the following `for` statements in [Listing 5-8](#Chapter05.html#list_5_8).\n\
    \n**Listing 5-8.** Alternate for loops\n\n```\n// Process just half the compassPoints\
    \ array\nfor (int i = compassPoints.length / 2; i < compassPoints.length; i++)\
    \ {\n\n}\n// Process every other member of the compassPoints array\nfor (int i\
    \ = 0; i < compassPoints.length; i += 2) {\n\n}\n```\n\nThe first of the two loops\
    \ process the high-value half (items 2 and 3—remember that arrays start at 0)\
    \ of the `compassPoints` array. The second loop processes items 0 and 2. If we\
    \ use `int i = 1`, the second loop processes items 1 and 3. As a rule, any variable\
    \ that can be counted (including `char` variables, but that's bad practice unless\
    \ you process individual characters—otherwise, groups of characters should be\
    \ treated as `String` objects, both for simplicity and for performance) can serve\
    \ as the initialization value, and it can start at any of the variable's possible\
    \ values (including negative numbers). Also, any valid mathematical operation\
    \ can be performed in the increment value. Of course, if you also use the initialization\
    \ variable as an index into an array, using a negative number gets you an `ArrayOutOfBounds`\
    \ exception, because array indices don't use negative numbers. When you do these\
    \ kinds of things, though, test thoroughly to be sure you get the results you\
    \ expect.\n\nSpeaking of using the initialization variable as an index, that's\
    \ exactly what we do in [Listing 5-7](#Chapter05.html#list_5_7). You can also\
    \ perform mathematical operations on the initialization variable in the body of\
    \ the loop, as shown in [Listing 5-9](#Chapter05.html#list_5_9).\n\n**Listing\
    \ 5-9.** Modifying the initialization variable in the loop body\n\n```\nint[]\
    \ compassPoints = {22, 77, 144, 288};\nfor (int i = 0; i < compassPoints.length;\
    \ i++) {\n  System.out.println(compassPoints[i++] + \" degrees is (very roughly)\
    \ \" + Direction.findCardinalDirection(compassPoints[i]));\n}\n```\n\nNotice that\
    \ we add a postfix operator to the initialization variable at one point where\
    \ it's used as an index. Consequently, this loop now processes items 0 and 2 in\
    \ the `compassPoints` array. As you can see, this offers another way to process\
    \ every other item. If we make `i++` be `i += 2`, the loop processes every third\
    \ item and processes items 0 and 3. Although potentially useful, this kind of\
    \ thing can lead to problems. Again, test thoroughly.\n\nBy the way, the best\
    \ practice for processing alternating items differently is not to write two `for`\
    \ loops or do math on the increment value but to test each item as it goes through\
    \ the loop and do the appropriate thing in each case, as shown in [Listing 5-10](#Chapter05.html#list_5_10).\n\
    \n**Listing 5-10.** Processing every other item in a single loop\n\n```\nint[]\
    \ compassPoints = {22, 77, 144, 288};\nfor (int i = 0; i < compassPoints.length;\
    \ i++) {\n  if (i % 2 == 1) {\n    System.out.println(\"[\" + i + \" is odd] \"\
    \ + compassPoints[i] +\n        \" degrees is (very roughly) \" +\n        Direction.findCardinalDirection(compassPoints[i]));\n\
    \  } else {\n    System.out.println(\"[\" + i + \" is even] \" + compassPoints[i]\
    \ +\n        \" degrees is (very roughly) \" +\n        Direction.findCardinalDirection(compassPoints[i]));\n\
    \  }\n}\n```\n\n[Listing 5-11](#Chapter05.html#list_5_11) shows the output of\
    \ that loop.\n\n**Listing 5-11.** Output from processing alternate items differently\n\
    \n```\n[0 is even] 22 degrees is (very roughly) NORTH\n[1 is odd] 77 degrees is\
    \ (very roughly) EAST\n[2 is even] 144 degrees is (very roughly) SOUTH\n[3 is\
    \ odd] 288 degrees is (very roughly) WEST\n```\n\nThis kind of code is often used\
    \ to alternate the colors of rows in tables and similar applications. Using `if\
    \ (i % 3 == 1)` processes every third item differently, and so on.\n\n`for` loops\
    \ support an alternate (and sometimes handy) syntax, called *enhanced for syntax*.\
    \ The enhanced for syntax consists of an initialization variable and an object\
    \ (an array in this case) to associate with the initialization variable. Every\
    \ item in the object gets processed by the loop, with the initialization variable\
    \ providing access to the current index value (which is nearly always needed).\
    \ Provided you want to process every item (though you can skip items with `if`\
    \ statements in the loop body), the enhanced for syntax provides a nice shortcut.\
    \ The enhanced for syntax was created for collections and arrays, but it can also\
    \ be used with enumerations (as we saw in [Chapter 3](#Chapter03.html#ch3), “Operators”).\
    \ Let's consider an example in [Listing 5-12](#Chapter05.html#list_5_12), using\
    \ the same array that we saw in the previous examples.\n\nThe enhanced for syntax\
    \ is also called “for each”. I dislike that, because other languages (such as\
    \ Perl) have an actual `foreach` keyword. Java has the notion of “for each of\
    \ these items, run the following code”, but it does not have an actual `foreach`\
    \ keyword. Consequently, I prefer to call it the “enhanced for.” It got the name\
    \ when it was introduced in Java 5. Before Java 5, only the basic `for` structure\
    \ was available to Java developers.\n\n**Listing 5-12.** Enhanced for syntax example\n\
    \n```\nint[] compassPoints = {22, 77, 144, 288};\nfor (int i: compassPoints) {\n\
    \  System.out.println(compassPoints[i] + \" degrees is (very roughly) \" +\n \
    \     Direction.findCardinalDirection(compassPoints[i]));\n}\n```\n\n[Listing\
    \ 5-12](#Chapter05.html#list_5_12) does the same thing as [Listing 5-9](#Chapter05.html#list_5_9).\n\
    \nOne last thing that every Java developer should know about a `for` loop is that\
    \ it is just a shortcut for a `while` loop. That is, every `for` loop can be rewritten\
    \ as a `while` loop. Let's turn the loop from [Listing 5-9](#Chapter05.html#list_5_9)\
    \ into a `while` loop in [Listing 5-13](#Chapter05.html#list_5_13).\n\n**Listing\
    \ 5-13.** Turning a for loop into a while loop\n\n```\nint i = 0;\nwhile (i <\
    \ compassPoints.length) {\n  System.out.println(compassPoints[i] + \" degrees\
    \ is (very roughly) \" +\n      Direction.findCardinalDirection(compassPoints[i]));\n\
    \  i++;\n}\n```\n\n[Listing 5-13](#Chapter05.html#list_5_13) does the same thing\
    \ as [Listing 5-9](#Chapter05.html#list_5_9) and [5-12](#Chapter05.html#list_5_12).\
    \ (You can almost always find multiple ways to do the same thing in most programming\
    \ languages, including Java.)"
  raw: '#### For Loops


    As a rule, use a `for` loop when you have some value that you can count. For example,
    whenever you have an array or a list or an enumeration, you can use a `for` loop
    based on the number of items present.


    Remember our cardinal direction example from [Chapter 3](#Chapter03.html#ch3)?
    Let''s examine that more closely in [Listing 5-7](#Chapter05.html#list_5_7).


    ***Listing 5-7.** Loop that finds directions*


    `int[] compassPoints = {22, 77, 144, 288};`

    `for (int i = 0; i < compassPoints.length; i++) {`

    `  System.out.println(compassPoints[i] + " degrees is (very roughly) "`

    `      + Direction.findCardinalDirection(compassPoints[i]));`

    `}`


    The `for` loop consists of two parts: the information that controls the looping
    and the block of code that gets run each time through the loop. The control section
    (within the parentheses) consists of three parts: initialization, termination,
    and increment. Each of these three parts ends with a semicolon, though the semicolon
    after the increment is often dropped. The names give us a good indication of what
    they do. The initialization code sets up whatever variable we use for our counting,
    the termination code indicates how to know when to stop looping, and the increment
    code dictates how to change the initialization variable each time through the
    loop. In this simple case, we set an `int` named `i` to 0, running the code in
    the loop for each item in the `compassPoints` array, and incrementing the initialization
    variable (`i`) by one each time.


    Java programmers can certainly do things differently than shown here. Consider
    the following `for` statements in [Listing 5-8](#Chapter05.html#list_5_8).


    ***Listing 5-8.** Alternate for loops*


    `// Process just half the compassPoints array`

    `for (int i = compassPoints.length / 2; i < compassPoints.length; i++) {`


    `}`

    `// Process every other member of the compassPoints array`

    `for (int i = 0; i < compassPoints.length; i += 2) {`


    `}`


    The first of the two loops process the high-value half (items 2 and 3—remember
    that arrays start at 0) of the `compassPoints` array. The second loop processes
    items 0 and 2\. If we use `int i = 1`, the second loop processes items 1 and 3\.
    As a rule, any variable that can be counted (including `char` variables, but that''s
    bad practice unless you process individual characters—otherwise, groups of characters
    should be treated as `String` objects, both for simplicity and for performance)
    can serve as the initialization value, and it can start at any of the variable''s
    possible values (including negative numbers). Also, any valid mathematical operation
    can be performed in the increment value. Of course, if you also use the initialization
    variable as an index into an array, using a negative number gets you an `ArrayOutOfBounds`
    exception, because array indices don''t use negative numbers. When you do these
    kinds of things, though, test thoroughly to be sure you get the results you expect.


    Speaking of using the initialization variable as an index, that''s exactly what
    we do in [Listing 5-7](#Chapter05.html#list_5_7). You can also perform mathematical
    operations on the initialization variable in the body of the loop, as shown in
    [Listing 5-9](#Chapter05.html#list_5_9).


    ***Listing 5-9.** Modifying the initialization variable in the loop body*


    `int[] compassPoints = {22, 77, 144, 288};`

    `for (int i = 0; i < compassPoints.length; i++) {`

    `  System.out.println(compassPoints[i++] + " degrees is (very roughly) " + Direction.findCardinalDirection(compassPoints[i]));`

    `}`


    Notice that we add a postfix operator to the initialization variable at one point
    where it''s used as an index. Consequently, this loop now processes items 0 and
    2 in the `compassPoints` array. As you can see, this offers another way to process
    every other item. If we make `i++` be `i += 2`, the loop processes every third
    item and processes items 0 and 3\. Although potentially useful, this kind of thing
    can lead to problems. Again, test thoroughly.


    By the way, the best practice for processing alternating items differently is
    not to write two for loops or do math on the increment value but to test each
    item as it goes through the loop and do the appropriate thing in each case, as
    shown in [Listing 5-10](#Chapter05.html#list_5_10).


    ***Listing 5-10.** Processing every other item in a single loop*


    `int[] compassPoints = {22, 77, 144, 288};`

    `for (int i = 0; i < compassPoints.length; i++) {`

    `  if (i % 2 == 1) {`

    `    System.out.println("[" + i + " is odd] " + compassPoints[i] +`

    `        " degrees is (very roughly) " +`

    `        Direction.findCardinalDirection(compassPoints[i]));`

    `  } else {`

    `    System.out.println("[" + i + " is even] " + compassPoints[i] +`

    `        " degrees is (very roughly) " +`

    `        Direction.findCardinalDirection(compassPoints[i]));`

    `  }`

    `}`


    [Listing 5-11](#Chapter05.html#list_5_11) shows the output of that loop.


    ***Listing 5-11.** Output from processing alternate items differently*


    `[0 is even] 22 degrees is (very roughly) NORTH`

    `[1 is odd] 77 degrees is (very roughly) EAST`

    `[2 is even] 144 degrees is (very roughly) SOUTH`

    `[3 is odd] 288 degrees is (very roughly) WEST`


    This kind of code is often used to alternate the colors of rows in tables and
    similar applications. Using `if (i % 3 == 1)` processes every third item differently,
    and so on.


    `for` loops support an alternate (and sometimes handy) syntax, called *enhanced
    for syntax*. The enhanced for syntax consists of an initialization variable and
    an object (an array in this case) to associate with the initialization variable.
    Every item in the object gets processed by the loop, with the initialization variable
    providing access to the current index value (which is nearly always needed). Provided
    you want to process every item (though you can skip items with `if` statements
    in the loop body), the enhanced for syntax provides a nice shortcut. The enhanced
    for syntax was created for collections and arrays, but it can also be used with
    enumerations (as we saw in [Chapter 3](#Chapter03.html#ch3), “Operators”). Let''s
    consider an example in [Listing 5-12](#Chapter05.html#list_5_12), using the same
    array that we saw in the previous examples.


    The enhanced for syntax is also called “for each”. I dislike that, because other
    languages (such as Perl) have an actual `foreach` keyword. Java has the notion
    of “for each of these items, run the following code”, but it does not have an
    actual `foreach` keyword. Consequently, I prefer to call it the “enhanced for.”
    It got the name when it was introduced in Java 5\. Before Java 5, only the basic
    `for` structure was available to Java developers.


    ***Listing 5-12.** Enhanced for syntax example*


    `int[] compassPoints = {22, 77, 144, 288};`

    `for (int i: compassPoints) {`

    `  System.out.println(compassPoints[i] + " degrees is (very roughly) " +`

    `      Direction.findCardinalDirection(compassPoints[i]));`

    `}`


    [Listing 5-12](#Chapter05.html#list_5_12) does the same thing as [Listing 5-9](#Chapter05.html#list_5_9).


    One last thing that every Java developer should know about a `for` loop is that
    it is just a shortcut for a `while` loop. That is, every `for` loop can be rewritten
    as a `while` loop. Let''s turn the loop from [Listing 5-9](#Chapter05.html#list_5_9)
    into a `while` loop in [Listing 5-13](#Chapter05.html#list_5_13).


    ***Listing 5-13.** Turning a for loop into a while loop*


    `int i = 0;`

    `while (i < compassPoints.length) {`

    `  System.out.println(compassPoints[i] + " degrees is (very roughly) " +`

    `      Direction.findCardinalDirection(compassPoints[i]));`

    `  i++;`

    `}`


    [Listing 5-13](#Chapter05.html#list_5_13) does the same thing as [Listing 5-9](#Chapter05.html#list_5_9)
    and [5-12](#Chapter05.html#list_5_12). (You can almost always find multiple ways
    to do the same thing in most programming languages, including Java.)'
  trans: '

    #### For 循环


    通常，当你拥有可以计数的值时，应使用 `for` 循环。例如，当你有一个数组、列表或枚举时，你可以根据其中元素的数量使用 `for` 循环。


    还记得第 3 章中的基本方向示例吗？让我们在代码清单 5-7 中更仔细地研究一下。


    ***代码清单 5-7.** 查找方向的循环*


    `int[] compassPoints = {22, 77, 144, 288};`

    `for (int i = 0; i < compassPoints.length; i++) {`

    `  System.out.println(compassPoints[i] + " degrees is (very roughly) "`

    `      + Direction.findCardinalDirection(compassPoints[i]));`

    `}`


    `for` 循环由两部分组成：控制循环的信息和每次循环时运行的代码块。控制部分（在括号内）由三部分组成：初始化、终止和增量。这三部分中的每一部分都以分号结尾，尽管增量后的分号通常会被省略。这些名称很好地表明了它们的作用。初始化代码设置用于计数的变量，终止代码指示如何知道何时停止循环，增量代码规定每次循环时如何更改初始化变量。在这个简单的例子中，我们将一个名为
    `i` 的 `int` 变量设置为 0，为 `compassPoints` 数组中的每个项运行循环内的代码，并将初始化变量 (`i`) 每次递增 1。


    Java 程序员当然可以采取与这里所示不同的做法。请考虑代码清单 5-8 中的以下 `for` 语句。


    ***代码清单 5-8.** 替代的 for 循环*


    `// 仅处理 compassPoints 数组的一半`

    `for (int i = compassPoints.length / 2; i < compassPoints.length; i++) {`


    `}`

    `// 处理 compassPoints 数组中的每隔一个元素`

    `for (int i = 0; i < compassPoints.length; i += 2) {`


    `}`


    这两个循环中的第一个处理 `compassPoints` 数组中高值的一半（第 2 和第 3 项——记住数组从 0 开始）。第二个循环处理第 0 和第 2
    项。如果我们使用 `int i = 1`，第二个循环将处理第 1 和第 3 项。通常，任何可以计数的变量（包括 `char` 变量，但除非处理单个字符，否则这是不好的做法——出于简单性和性能考虑，字符组应作为
    `String` 对象处理）都可以作为初始化值，并且可以从该变量的任何可能值（包括负数）开始。此外，任何有效的数学运算都可以在增量值中执行。当然，如果你还将初始化变量用作数组的索引，使用负数会导致
    `ArrayOutOfBounds` 异常，因为数组索引不使用负数。不过，当你做这类事情时，请彻底测试以确保得到预期的结果。


    说到将初始化变量用作索引，这正是我们在代码清单 5-7 中所做的。你也可以在循环体中对初始化变量执行数学运算，如代码清单 5-9 所示。


    ***代码清单 5-9.** 在循环体中修改初始化变量*


    `int[] compassPoints = {22, 77, 144, 288};`

    `for (int i = 0; i < compassPoints.length; i++) {`

    `  System.out.println(compassPoints[i++] + " degrees is (very roughly) " + Direction.findCardinalDirection(compassPoints[i]));`

    `}`


    注意，我们在初始化变量用作索引的地方添加了一个后缀运算符。因此，这个循环现在处理 `compassPoints` 数组中的第 0 和第 2 项。如你所见，这提供了另一种处理每隔一个项的方法。如果我们把
    `i++` 改成 `i += 2`，循环将处理每三个项中的一项，即处理第 0 和第 3 项。虽然可能有用，但这类事情可能会导致问题。再次强调，请彻底测试。


    顺便提一下，以不同方式处理交替项的最佳实践不是编写两个 for 循环或对增量值进行数学运算，而是在每个项通过循环时对其进行测试，并在每种情况下执行适当的操作，如代码清单
    5-10 所示。


    ***代码清单 5-10.** 在单个循环中处理每隔一个项*


    `int[] compassPoints = {22, 77, 144, 288};`

    `for (int i = 0; i < compassPoints.length; i++) {`

    `  if (i % 2 == 1) {`

    `    System.out.println("[" + i + " is odd] " + compassPoints[i] +`

    `        " degrees is (very roughly) " +`

    `        Direction.findCardinalDirection(compassPoints[i]));`

    `  } else {`

    `    System.out.println("[" + i + " is even] " + compassPoints[i] +`

    `        " degrees is (very roughly) " +`

    `        Direction.findCardinalDirection(compassPoints[i]));`

    `  }`

    `}`


    代码清单 5-11 显示了该循环的输出。


    ***代码清单 5-11.** 以不同方式处理交替项的输出*


    `[0 is even] 22 degrees is (very roughly) NORTH`

    `[1 is odd] 77 degrees is (very roughly) EAST`

    `[2 is even] 144 degrees is (very roughly) SOUTH`

    `[3 is odd] 288 degrees is (very roughly) WEST`


    这类代码常用于在表格行和类似应用中交替颜色。使用 `if (i % 3 == 1)` 可以不同方式处理每三个项中的一项，依此类推。


    `for` 循环支持另一种（有时很方便的）语法，称为*增强型 for 语法*。增强型 for 语法由一个初始化变量和一个与该初始化变量关联的对象（此处为数组）组成。对象中的每个项都由循环处理，初始化变量提供对当前索引值（几乎总是需要的）的访问。如果你希望处理每个项（尽管可以在循环体中使用
    `if` 语句跳过某些项），增强型 for 语法提供了一个很好的快捷方式。增强型 for 语法是为集合和数组创建的，但也可以与枚举一起使用（正如我们在第 3
    章 “运算符”中看到的）。让我们在代码清单 5-12 中考虑一个示例，使用与前面示例中相同的数组。


    增强型 for 语法也被称为“for each”。我不喜欢这个叫法，因为其他语言（如 Perl）有一个实际的 `foreach` 关键字。Java 有“对于这些项中的每一个，运行以下代码”的概念，但它没有一个实际的
    `foreach` 关键字。因此，我更喜欢称其为“增强型 for”。它在 Java 5 中引入时获得了这个名称。在 Java 5 之前，Java 开发者只能使用基本的
    `for` 结构。


    ***代码清单 5-12.** 增强型 for 语法示例*


    `int[] compassPoints = {22, 77, 144, 288};`

    `for (int i: compassPoints) {`

    `  System.out.println(compassPoints[i] + " degrees is (very roughly) " +`

    `      Direction.findCardinalDirection(compassPoints[i]));`

    `}`


    代码清单 5-12 执行与代码清单 5-9 相同的操作。


    每个 Java 开发者都应该了解的关于 `for` 循环的最后一点是，它只是 `while` 循环的一种快捷方式。也就是说，每个 `for` 循环都可以重写为
    `while` 循环。让我们在代码清单 5-13 中将代码清单 5-9 中的循环转换为 `while` 循环。


    ***代码清单 5-13.** 将 for 循环转换为 while 循环*


    `int i = 0;`

    `while (i < compassPoints.length) {`

    `  System.out.println(compassPoints[i] + " degrees is (very roughly) " +`

    `      Direction.findCardinalDirection(compassPoints[i]));`

    `  i++;`

    `}`


    代码清单 5-13 执行与代码清单 5-9 和 5-12 相同的操作。（在大多数编程语言（包括 Java）中，你几乎总能找到多种方法来完成同一件事。）

