    ### Summary


    In this chapter, I explained the unusual but sometimes useful idea of working
    with items that refer to themselves, known as recursion. In particular, you learned
    that:


    *   Recursion occurs in human languages.

    *   Recursion happens all the time (but we often don''t notice it).

    *   Recursive algorithms need stop conditions.

    *   It''s sometimes a good idea to avoid recursion.

    *   Conversely, recursion is sometimes the best answer to a problem.

    *   Recursion can be an elegant solution to some problems, such as that of generating
    the Fibonacci sequence.

    *   Recursion is the underlying algorithm in making fractals.


    I hope you enjoyed this chapter. It was one of my favorites to write, and I enjoyed
    creating sample code for it. In fact, I played with many variations of the code,
    just for fun. You should do the same. In particular, regarding the Sierpinski
    triangle program, try changing colors at every other depth or every third depth
    value rather than at every depth value (hint: use the modulus operator). Then,
    play with the values that control the appearance of the fractal tree. In particular,
    play with different numbers as inputs to the `randInt` method. Also, rotate the
    tree and fiddle with the colors to create roots instead of the branches of a tree.


    I leave you with two challenges that will help you grow as a programmer. First,
    create a Sierpinski gasket (a square of squares rather than a triangle of triangles).
    Second, create a Mandelbrot or Julia fractal. I nearly included sample code for
    a Julia fractal (one of my favorites), but I thought it would be a great exercise
    for you, now that you know the basics of recursion in Java. You''ll need to do
    a bit of research to find the algorithms and math behind the Sierpinski gasket
    and the Mandelbrot and Julia fractals, but discovering algorithms and formulae
    is part of the job when you develop software. I''m sure you''ll get used to performing
    this kind of research.


    ## C H A P T E R  15


    ## Generics and Regular Expressions


    Readers who already know Java may very well ask why these two topics are together
    in the same chapter. The answer is that they both involve pattern matching. A
    generic specifier (also known as a parameter) is a pattern that code must match
    in order to use a particular block of code (which might be an interface, a class,
    a method, or other things). Regular Expressions, on the other hand, use patterns
    to select substrings within strings. In both cases, the pattern restricts the
    available selections. Both have additional benefits as well, which we''ll get
    to next.


    ### Generics


    Generics offer a way to specify the kind of objects that a class, variable, or
    method can use. The most common use of generics is to specify what kind of object
    can go into a collection (such as a list or a tree or a hashmap). Another use
    is to allow a type that has yet to be specified to be used where the generic is
    specified. In that sense, the type is generic, which is where the name of this
    idea comes from. We''ll see examples of both kinds of generics as proceed through
    this section.


    Prior to Java 5, Java had no mechanism for specifying generics. That lack led
    to a number of problems, including being able to assign unexpected types of objects
    to a collection (leading to run-time errors), the necessity of casting objects
    from one type to another, and overly verbose and complex code. Fortunately, we
    now have a way to avoid those problems.


    The syntax of generic specifiers relies on the angle bracket characters (< and
    >). To create a collection with a generic specifier, add the generic expression
    at the end of the type specifier for the collection, as shown in [Listing 15-1](#Chapter15.html#list_15_1).


    ***Listing 15-1.** A Simple Generic*


    `LinkedList<JPanel> panelList = new LinkedList<JPanel>();`


    That line of code declares a LinkedList that can only contain JPanel objects.
    Java 7 introduces a nice shorthand that slightly reduces the amount of code. In
    particular, you can leave out the type declaration when creating an instance of
    a parameterized object, provided the compiler can infer the type from elsewhere
    in the line. Thus, the code in [Listing 15-1](#Chapter15.html#list_15_1) could
    be replaced with the code in [Listing 15-2](#Chapter15.html#list_15_2).


    ***Listing 15-2.** A Simplified Generic*


    `LinkedList<JPanel> panelList = new LinkedList<>();`


    Notice that the constructor for our `LinkedList` object indicates that it''s a
    generic but doesn''t provide the type of the objects that can go in the list.
    We can leave that out because the compiler can infer a type of `JPanel` from the
    type declaration portion of this variable declaration. By the way, the `<>` expression
    is often called "the diamond."


    An object can have multiple parameters, provided a matching class exists to define
    that object. [Listing 15-3](#Chapter15.html#list_15_3) shows an example.


    ***Listing 15-3.** A Generic with Multiple Parameters*


    `package com.bryantcs.examples;`


    `public class GenericRole<Actor, Role> {`


    `        private Actor actor;`

    `        private Role role;`


    `        public GenericRole(Actor p, Role a) {`

    `                actor = p;`

    `                role = a;`

    `        }`


    `        public Actor getActor() {`

    `                return actor;`

    `        }`


    `        public Role getRole() {`

    `                return role;`

    `        }`

    `}`


    A significant feature of this class is that you do not have to create an Actor
    class or a Role class. Because it uses generics, the declarations that create
    instances of the `GenericRole` object must specify the types of the `Actor` and
    `Role` objects.


    As I mentioned at the beginning of this section, this arrangement is where the
    word "generic" comes from. These objects can be undeclared at this point, so they
    are, in a sense, generic.


    So let''s look at a class that does something with our `GenericRole` class. Consider
    [Listing 15-4](#Chapter15.html#list_15_4).


    ***Listing 15-4.** Using a Multiple-Parameter Generic*


    `package com.bryantcs.examples;`


    `import java.util.LinkedList;`


    `public class GenericRoleProgram {`

    `        public static void main(String[] args) {`

    `                LinkedList<GenericRole<String, String>> roleMap =`

    `                        new LinkedList<GenericRole<>>();`


    `                roleMap.add(new GenericRole<String, String>("Humphrey Bogart",`

    `                                "Sam Spade"));`

    `                System.out.println(roleMap.getFirst().getActor() +`

    `                                " appeared on screen as " + roleMap.getFirst().getRole());`

    `        }`

    `}`'
