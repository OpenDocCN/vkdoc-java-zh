- fmt: '#### Understanding Generations


    The Java garbage collector uses the concept of generations. In most applications,
    nearly all objects exist for a very short time. If you look at the `Target` objects
    created by an instance of the `TargetClickPanel` class (listed in the previous
    chapter), you''ll see that they exist for just a few seconds each. In fact, if
    a player clicks on one, an instance of the `Target` class might exist for only
    a fraction of a second. Conversely, the `TargetClickPanel` instance and the `TargetClick`
    instance both exist for the duration of the game, but there''s only one instance
    of each class for the entire time.


    Suppose a game of `TargetClick` involves the creation of 100 `Target` objects.
    In that scenario, two objects (one instance of the `TargetClick` class and one
    instance of the `TargetClickPanel` class) exist for the entire life of the program,
    while 100 other objects (all the instances of the `Target` class) exist for no
    more than a few seconds each. So, at least in this case, we have a great example
    where nearly all objects are not present in the system for long.


    All of these short-lived objects end up in the "young generation." The young generation
    has three spaces: "eden," "from," and "to." The eden space is where objects go
    first. So, when your program creates a new object (such as an instance of the
    `Target` class in the `TargetClick` game), the object goes into the eden space.
    The from and to spaces are called "survivor spaces," and objects that survive
    at least one garbage collection pass move to these spaces until they''ve survived
    sufficiently long to move to the tenured generation. At any given moment, one
    survivor space is empty. When the garbage collector runs, it moves the survivors
    from the eden space and the currently occupied survivor space into the currently
    empty survivor space.


    Objects that last a while (either a certain amount of time or a certain number
    of collections) end up in the "tenured generation" (also called the "old generation"
    – the older I get, the more I prefer to talk about the "tenured generation").
    Finally, the "permanent generation" isn''t really a generation but is instead
    the area where the JVM stores the class definitions. The permanent generation
    isn''t necessarily static, as Java programs can load and unload classes as they
    run.


    Java''s garbage collector sweeps the young generation more often than the tenured
    generations and uses different collection algorithms for the two generations.
    Further detail is beyond the scope of this book. If you''re interested in greater
    detail about Java collection algorithms, you can find a number of books and web
    sites devoted to the subject. Efficient garbage collection is one of those problems
    that draws the best minds in the field of computer science, because it is both
    practical (every Java programmer needs a good one) and highly theoretical.


    One of the very difficult issues facing the designers of garbage collection algorithms
    (including those used in Java) is how to deal with references that cross the generational
    boundaries. Before the garbage collector can remove an object from memory, it
    has to ensure that no references exist. That means checking references across
    the generations, which is a difficult task to do quickly.


    #### Scavenges and Full Collections


    The Java garbage collector can do partial garbage collection by collecting just
    the young generation. This type of operation is called a "scavenge." When the
    garbage collector collects both the young and the tenured generations, this is
    called a "full collection," or (often) just a "collection." A number of command-line
    switches modify the garbage collector''s behavior with regard to the young and
    tenured generations. We''ll encounter these and other switches later in the chapter,
    in the section entitled "Understanding Garbage Collection Settings."


    #### Garbage Collection is Event-Driven


    Garbage collection doesn''t happen every time an object happens to no longer have
    any references. If it did, every Java program would spend more time removing unused
    objects than it would spend doing anything else, and the performance of all Java
    programs would be so poor that no one would use Java for anything.


    Instead, the Java garbage collector works on an event-driven model. When certain
    conditions are met, the garbage collector runs. These conditions involve the ratio
    of heap space (the amount of memory) in use to the amount of free memory and the
    amount of total memory. In simple terms, when the JVM determines that it''s running
    out of memory, it runs the garbage collector. So, when the amount of heap space
    relative to the amount of total memory gets to a certain percentage, the garbage
    collector removes any objects that have no references. Doing so readjusts the
    percentage of memory in use downward, so that the program can keep on running.


    #### Understanding Garbage Collection Settings


    The Java garbage collector uses another group of switches (similar to the memory
    switches we saw earlier) that you set when you start your program. Here''s a summary
    of the most common switches:


    ![images](images/t1302.jpg)'
