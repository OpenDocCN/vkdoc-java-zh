    `} catch(ArithmeticException ae) {`

    `        throw ae;`

    `} finally {`

    `        System.out.println("Made it past the exception!");`

    `}`


    Notice that the second `catch` block re-throws that particular kind of exception.
    In this case, you probably wouldn''t do that, but the example illustrates a common
    practice. Exceptions often get re-thrown, so that they can get handled by the
    method that makes the most sense for handling that particular exception. Often,
    a developer writes a method and has no idea to handle the exception while writing
    that method, so the developer re-throws and figures the next method (or the one
    after that and so on) will know what to do with it. Of course, if the exception
    never gets handled, you have a problem that might crash the program, stick embarrassing
    exception messages in your output, or otherwise leave you wiping egg off your
    face and trying to placate angry users. When you re-throw an exception, the method
    containing your `try`-`catch` block needs to throw the exception, too. In that
    fashion, methods can pass an exception through many methods to get it to a method
    that knows how to handle it.


    The `finally` keyword lets you create a block of code that gets run no matter
    what. Even if an exception happens, the code in the `finally` block gets run.
    In the example shown here, it doesn''t do much. `finally` often isn''t included
    precisely because nothing needs to be done. However, it''s sometimes critically
    important that a `finally` block exist to do something. The classic use for a
    `finally` block is to close a database connection. If you open a database connection
    to do some work but then hit an exception, the database connection still needs
    to get closed. Too many open connections slow database performance and can ultimately
    crash a database (a disaster for most commercial software).


    One last thing to know about exceptions is that Java has two categories of exceptions:
    checked exceptions and runtime exceptions. Checked exceptions are called that
    because the compiler (which is the program that turns your code into machine code
    that your computer can understand) checks for them when you try to compile your
    code. One big reason to use Eclipse is that it checks for problems as you write
    your code. If you use a method that throws checked exceptions, you must handle
    those exceptions in your code (though re-throwing them counts as handling them).
    The compiler does not check for runtime exceptions. Eclipse runs a compiler for
    us and checks our code as we type it, so we know immediately when we need to catch
    checked exceptions. Runtime exceptions (as the name implies) can only be caught
    at run time, so Eclipse can''t warn us about those as we write our code.


    Checked exceptions represent things beyond the program''s control, such as bad
    user input or a file not existing. Runtime exceptions represent things that can
    be fixed with more or better code. One school of thought says that checked exceptions
    represent things the program should recover from. For example, if the program
    encounters a missing file (that is, some method gets an `IOException` when it
    expects a file handle), the program should ask the user where the file is or let
    the user cancel the operation. Runtime exceptions represent errors (usually oversights)
    in the code that developers should fix. If you get a `NullPointerException`, you
    don''t ask the user to do anything (though you might tell the user to call customer
    support and report the problem). Instead, you fix the point in the code where
    something is passing null when it shouldn''t. One concept that nearly all experienced
    programmers embrace is *defensive programming*, which means we try to not let
    things get to a point where exceptions can happen. Instead, we do things like
    checking to see whether something is null before we try to use it.


    As it happens, `IllegalArgumentException` is a runtime exception. If you remove
    the `try`-`catch` blocks from `AverageTest`, you get no error. However, because
    I can anticipate the problem, I elect to specifically throw that error, so that
    I can attach a meaningful error message.'
  trans: '

    #### 异常


    当出现问题时，Java 会通过一个称为“抛出异常”的过程来引发错误。`Exception` 是一个拥有众多（且多层）子类的类。如果有人试图使用空数组，`AverageImpl`
    类会抛出一个 `IllegalArgumentException`，因为 `getAverage` 方法需要除以数组的长度，而除以 0 是非法的。（实际上，试图除以零会产生一个
    `ArithmeticException`，但 `AverageImpl` 不会让事情发展到那一步。）


    当你预见到有人可能会尝试导致问题的操作时，你应该测试该问题并抛出适当的异常。让我们更详细地看看 `AverageImpl` 抛出异常的一个地方，如清单 2-13
    所示：


    ***清单 2-13.** 抛出异常*


    `public AverageImpl(int[] ints) throws IllegalArgumentException {`

    `        if (ints.length == 0){`

    `                throw new IllegalArgumentException(EXCEPTION_MESSAGE);`

    `        }`

    `        this.ints = ints;`

    `}`


    如你所见，方法声明中包含了 `throws` 关键字，后面跟着该方法抛出的异常名称。一个方法可以抛出任意数量的异常（很多方法也确实如此）。当一个方法可能抛出多种异常时，用逗号分隔它们。


    在方法内部，你可以看到针对我们想要捕获的问题的测试，即 `ints` 的值为空数组。一旦检测到问题，我们就使用 `throw` 关键字抛出相应异常的新实例。


    当一个方法抛出异常时，任何使用该方法的对象都必须处理该异常。你可以在清单 2-14 的 `AverageTest` 类中看到这种情况：


    ***清单 2-14.** 处理异常*


    `try {`

    `  averageImpl.setInts(ints2);`

    `} catch(IllegalArgumentException iae) {`

    `  System.out.println("哎呀！不能使用空数组");`

    `}`


    这种结构被称为 `try`-`catch` 块。如你所见，它实际上是两个块——一个在 `try` 语句内，另一个在 `catch` 语句内。如果 `try`
    块中的代码抛出了异常，那么 `catch` 语句中的代码就会运行。你可以在一个 `try`-`catch` 块中包含多个 `catch` 语句，每个语句捕获不同类型的异常。这样，你就可以针对不同类型的异常采取不同的操作。你还可以向
    `try`-`catch` 块添加一个 `finally` 块。清单 2-15 基于现有示例展示了一个更详细的例子：


    ***清单 2-15**. Try-catch-finally*


    `try {`

    `        averageImpl.setInts(ints2);`

    `} catch(IllegalArgumentException iae) {`

    `        System.out.println("哎呀！不能使用空数组");`

    `} catch(ArithmeticException ae) {`

    `        throw ae;`

    `} finally {`

    `        System.out.println("成功通过了异常！");`

    `}`


    注意，第二个 `catch` 块重新抛出了那种特定的异常。在这种情况下，你可能不会这样做，但这个例子说明了一种常见做法。异常经常被重新抛出，以便它们能够被最适合处理该特定异常的方法处理。通常，开发者在编写一个方法时不知道如何处理异常，因此开发者会重新抛出异常，并指望下一个方法（或再下一个，以此类推）知道如何处理它。当然，如果异常从未被处理，你就会遇到问题，这可能导致程序崩溃、在输出中留下令人尴尬的异常消息，或者让你颜面扫地，并试图安抚愤怒的用户。当你重新抛出异常时，包含你的
    `try`-`catch` 块的方法也需要抛出该异常。通过这种方式，方法可以将异常传递多个方法，最终到达一个知道如何处理它的方法。


    `finally` 关键字允许你创建一个无论发生什么都会运行的代码块。即使发生了异常，`finally` 块中的代码也会运行。在所示的示例中，它并没有做太多事情。`finally`
    通常不被包含，正是因为不需要做任何事情。然而，有时 `finally` 块的存在对于执行某些操作至关重要。`finally` 块的经典用途是关闭数据库连接。如果你打开一个数据库连接来做一些工作，但随后遇到了异常，数据库连接仍然需要关闭。过多的打开连接会降低数据库性能，并最终可能导致数据库崩溃（这对大多数商业软件来说是一场灾难）。


    关于异常，最后需要了解的一点是，Java 有两类异常：受检异常（checked exceptions）和运行时异常（runtime exceptions）。受检异常之所以这样称呼，是因为当你尝试编译代码时，编译器（即将你的代码转换为计算机能理解的机器码的程序）会检查它们。使用
    Eclipse 的一大原因是它会在你编写代码时检查问题。如果你使用了一个抛出受检异常的方法，你必须在代码中处理这些异常（尽管重新抛出它们也算作处理）。编译器不会检查运行时异常。Eclipse
    为我们运行编译器并在我们输入代码时检查代码，因此我们立即知道何时需要捕获受检异常。运行时异常（顾名思义）只能在运行时被捕获，因此 Eclipse 在我们编写代码时无法警告我们这些异常。


    受检异常代表程序无法控制的情况，例如错误的用户输入或文件不存在。运行时异常代表可以通过更多或更好的代码来修复的问题。有一种观点认为，受检异常代表程序应该从中恢复的情况。例如，如果程序遇到一个缺失的文件（即，某个方法在期望一个文件句柄时得到了一个
    `IOException`），程序应该询问用户文件在哪里，或者让用户取消操作。运行时异常代表代码中的错误（通常是疏忽），开发者应该修复这些错误。如果你遇到了
    `NullPointerException`，你不需要让用户做任何事情（尽管你可能会告诉用户联系客户支持并报告问题）。相反，你应该修复代码中本不应传递 null
    的地方。几乎所有经验丰富的程序员都认同的一个概念是*防御性编程*，这意味着我们努力不让事情发展到可能发生异常的地步。相反，我们会做一些事情，比如在使用某个对象之前检查它是否为
    null。


    实际上，`IllegalArgumentException` 是一个运行时异常。如果你从 `AverageTest` 中移除 `try`-`catch` 块，你不会得到任何错误。然而，因为我能够预见到这个问题，所以我选择特意抛出该错误，以便我可以附加一条有意义的错误消息。

