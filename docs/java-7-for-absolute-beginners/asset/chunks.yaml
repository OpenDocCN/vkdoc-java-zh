- fmt: '### Breakpoints and Variables


    A breakpoint is a place in the code where you want to stop the execution of a
    program. Computers run programs one instruction at a time. As a result, you can
    interrupt the flow of instructions and make the computer wait while you look at
    the values that are produced by your code at a particular spot. Fortunately, computers
    don''t get bored, so you can make them wait as long as you like.


    When you debug an application, you create temporary breakpoints, which appear
    in the Breakpoints view, wherever you want the debugger to stop. The debugger
    lets your application run until it reaches one of those points in the code; it
    then suspends your program, and shows you the values of the various objects and
    primitives in the Variables view.


    Eclipse lets you set a number of different kinds of breakpoints:


    - Line breakpoints

    - Exception breakpoints

    - Classloading breakpoints

    - Watchpoints

    - Method breakpoints

    - Printpoints


    I''m going to cover only line breakpoints, as they will solve nearly all the problems
    you are likely to encounter—I made it a long way into my career before I ever
    needed anything other than a line breakpoint. However, I encourage you to investigate
    the other kinds of breakpoints on your own. Start by reading the Eclipse help
    file''s content about breakpoints.


    ### Setting a Line Breakpoint


    To set a line breakpoint:


    1. Right-click in the thin area to the left of the line of code where you want
    to set a breakpoint.

    2. Choose **Toggle Breakpoint**. A breakpoint appears at the line where you right-clicked,
    as shown in [Figure 11-3](#Chapter11.html#fig_11_3). The blue dot to the far left
    of the first line in the `draw` method is the breakpoint indicator. When your
    program runs, it stops at that point and shows you the values of all the objects
    and primitives that are in scope at the time.


    ![images](images/1103.jpg)


    ***Figure 11-3.** Breakpoint in code:*


    Let''s see what happens when we run the program ([Figure 11-4](#Chapter11.html#fig_11_4)).


    ![images](images/1104.jpg)


    ***Figure 11-4.** Execution suspended at breakpoint:*


    Notice the line highlighted in green. That green line indicates the current execution
    point (that is, the line that was being processed before the program was suspended).
    When the debugger stops at a line, it shows you the values in scope for that line
    in the Variables list, the method containing the line in the Outline panel, and
    the call stack in the Debug panel. From there, you can step through the code,
    either one line at a time or even within a line. We''ll get to stepping shortly.
    First, though, let''s be sure you understand the concept of scope.


    ### About Scope


    What does “in scope” mean? The objects and primitives (that is, the variables)
    that are in scope are those that are capable of being used at a particular point
    in the program. In the case of the breakpoint above, the only local value we can
    see is `g`, the instance of the `Graphics` class that will be used for the drawing.
    However, we can also see a value called `this`, which is the containing class.
    By expanding the `this` entry in the variable list, we can see all the class variables
    declared within it (rather than in a method). [Figure 11-5](#Chapter11.html#fig_11_5)
    displays what an expanded view of the `this` value looks like.


    ![images](images/1105.jpg)


    ***Figure 11-5.** Expanded containing class value `this`*


    As you can see, the expanded `this` listing shows the values of all the class
    variables (the arrow to the left of an entry indicates that that entry can be
    expanded). Clicking on one of them causes details about it to appear at the bottom
    of the Variables view. In this case, we can see the RGB values (values for red,
    green, and blue) that constitute the color for this particular firework. You can
    also right-click the entry and get even more information, but we''ll skip that
    for now. Once you''ve mastered the basics of debugging, you can try out those
    more advanced features.


    #### Stepping:


    “Stepping” in debuggers refers to the ability to move to the next execution point
    in the program. For convenience, Eclipse offers three kinds of stepping commands:
    Step Into, Step Over, and Step Return. [Figure 11-6](#Chapter11.html#fig_11_6)
    shows the step buttons on the debug toolbar.


    ![images](images/1106.jpg)


    ***Figure 11-6.** Callout of step controls on debug toolbar*


    You can also use function keys to step. `F5` corresponds to Step Into, `F6` corresponds
    to Step Over, and `F7` corresponds to Step Return.


    ##### Stepping Into


    When you step into a line, you advance to the first of whatever methods may be
    in the line. Consider the second line in the `draw` method:


    `g.setColor(drawColor);`


    When you step into that line, you step to the top of the `setColor` method in
    the `Graphics` class. That''s probably not very useful; you only want to use this
    command to step into your own code.


    For some lines, stepping into is the same as stepping over, because nothing in
    the line changes the execution point. For example, stepping into the first line
    of the `draw` method has the same effect as stepping over it, because that line
    just assigns one value to another value.


    ##### Stepping Over


    When you step over a line, you let the debugger run through whatever methods may
    be called by that line. That includes any classes and methods that may be called
    by those methods, and so on. Sometimes, that amounts to very little code; other
    times, it''s a large chunk of a Java library.


    Stepping over lines is a good way to find the place in your program where you
    have a problem. Step over until the problem behavior presents itself. Then you
    know which line is bad. From that point, you can step into the methods under that
    line, and then step over the lines in those methods until you hit the problem
    spot again. Thus, by swapping back and forth between stepping over and stepping
    into code, you can narrow down and finally locate the failure in your code.


    ##### Stepping to Return


    Step Return lets the program run until the current method returns. Step Return
    is really just a convenience feature so that you don''t have to step through all
    the lines in a method. If you step into a method and realize that it can''t possibly
    be the source of your problem, Step Return offers a handy way to move along.


    ### Removing a Line Breakpoint


    You may have noticed that the command for creating a breakpoint is **Toggle Breakpoint**.
    Toggling an existing breakpoint removes it.


    ### Disabling a Line Breakpoint


    Sometimes, it''s handy to leave a breakpoint in place but not use it for a while.
    For example, you might disable a breakpoint while you track down some other bug
    that you have to fix before you can deal with the one you originally started to
    fix. You''ll sometimes find that a bug is really a nested set of bugs, and you
    have to fix one before you can fix another. The good news is that identifying
    one bug often gives you insight into the larger problem, and fixing the remaining
    issues then becomes largely mechanical. There are times, though, when you hit
    a series of hard-to-solve problems, and then you''ll be happy to have a good debugger.
    To disable a breakpoint:


    1. Right-click the breakpoint you want to disable.

    2. Choose Disable Breakpoint.'
  raw: '### Breakpoints and Variables


    A breakpoint is a place in the code where you want to stop the execution of a
    program. Computers run programs one instruction at a time. As a result, you can
    interrupt the flow of instructions and make the computer wait while you look at
    the values that are produced by your code at a particular spot. Fortunately, computers
    don''t get bored, so you can make them wait as long as you like.


    When you debug an application, you create temporary breakpoints, which appear
    in the Breakpoints view, wherever you want the debugger to stop. The debugger
    lets your application run until it reaches one of those points in the code; it
    then suspends your program, and shows you the values of the various objects and
    primitives in the Variables view.


    Eclipse lets you set a number of different kinds of breakpoints:


    *   Line breakpoints

    *   Exception breakpoints

    *   Classloading breakpoints

    *   Watchpoints

    *   Method breakpoints

    *   Printpoints


    I''m going to cover only line breakpoints, as they will solve nearly all the problems
    you are likely to encounter—I made it a long way into my career before I ever
    needed anything other than a line breakpoint. However, I encourage you to investigate
    the other kinds of breakpoints on your own. Start by reading the Eclipse help
    file''s content about breakpoints.


    #### Setting a Line Breakpoint


    To set a line breakpoint:


    1.  Right-click in the thin area to the left of the line of code where you want
    to set a breakpoint.

    2.  Choose **Toggle Breakpoint**. A breakpoint appears at the line where you right-clicked,
    as shown in [Figure 11-3](#Chapter11.html#fig_11_3). The blue dot to the far left
    of the first line in the draw method is the breakpoint indicator. When your program
    runs, it stops at that point and shows you the values of all the objects and primitives
    that are in scope at the time.


    ![images](images/1103.jpg)


    ***Figure 11-3.** Breakpoint in code:*


    Let''s see what happens when we run the program ([Figure 11-4](#Chapter11.html#fig_11_4)).


    ![images](images/1104.jpg)


    ***Figure 11-4.** Execution suspended at breakpoint:*


    Notice the line highlighted in green. That green line indicates the current execution
    point (that is, the line that was being processed before the program was suspended).
    When the debugger stops at a line, it shows you the values in scope for that line
    in the Variables list, the method containing the line in the Outline panel, and
    the call stack in the Debug panel. From there, you can step through the code,
    either one line at a time or even within a line. We''ll get to stepping shortly.
    First, though, let''s be sure you understand the concept of scope.


    #### About Scope


    What does “in scope” mean? The objects and primitives (that is, the variables)
    that are in scope are those that are capable of being used at a particular point
    in the program. In the case of the breakpoint above, the only local value we can
    see is `g`, the instance of the `Graphics` class that will be used for the drawing.
    However, we can also see a value called `this`, which is the containing class.
    By expanding the `this` entry in the variable list, we can see all the class variables
    declared within it (rather than in a method). [Figure 11-5](#Chapter11.html#fig_11_5)
    displays what an expanded view of the `this` value looks like.


    ![images](images/1105.jpg)


    ***Figure 11-5.** Expanded containing class value `this`*


    As you can see, the expanded `this` listing shows the values of all the class
    variables (the arrow to the left of an entry indicates that that entry can be
    expanded). Clicking on one of them causes details about it to appear at the bottom
    of the Variables view. In this case, we can see the RGB values (values for red,
    green, and blue) that constitute the color for this particular firework. You can
    also right-click the entry and get even more information, but we''ll skip that
    for now. Once you''ve mastered the basics of debugging, you can try out those
    more advanced features.


    ##### Stepping:


    “Stepping” in debuggers refers to the ability to move to the next execution point
    in the program. For convenience, Eclipse offers three kinds of stepping commands:
    Step Into, Step Over, and Step Return. [Figure 11-6](#Chapter11.html#fig_11_6)
    shows the step buttons on the debug toolbar.


    ![images](images/1106.jpg)


    ***Figure 11-6.** Callout of step controls on debug toolbar*


    You can also use function keys to step. **F5** corresponds to Step Into, **F6**
    corresponds to Step Over, and **F7** corresponds to Step Return.


    ###### Stepping Into


    When you step into a line, you advance to the first of whatever methods may be
    in the line. Consider the second line in the draw method:


    `g.setColor(drawColor);`


    When you step into that line, you step to the top of the `setColor` method in
    the Graphics class. That''s probably not very useful; you only want to use this
    command to step into your own code.


    For some lines, stepping into is the same as stepping over, because nothing in
    the line changes the execution point. For example, stepping into the first line
    of the draw method has the same effect as stepping over it, because that line
    just assigns one value to another value.


    ###### Stepping Over


    When you step over a line, you let the debugger run through whatever methods may
    be called by that line. That includes any classes and methods that may be called
    by those methods, and so on. Sometimes, that amounts to very little code; other
    times, it''s a large chunk of a Java library.


    Stepping over lines is a good way to find the place in your program where you
    have a problem. Step over until the problem behavior presents itself. Then you
    know which line is bad. From that point, you can step into the methods under that
    line, and then step over the lines in those methods until you hit the problem
    spot again. Thus, by swapping back and forth between stepping over and stepping
    into code, you can narrow down and finally locate the failure in your code.


    ###### Stepping to Return


    Step Return lets the program run until the current method returns. Step Return
    is really just a convenience feature so that you don''t have to step through all
    the lines in a method. If you step into a method and realize that it can''t possibly
    be the source of your problem, Step Return offers a handy way to move along.


    #### Removing a Line Breakpoint


    You may have noticed that the command for creating a breakpoint is **Toggle Breakpoint**.
    Toggling an existing breakpoint removes it.


    #### Disabling a Line Breakpoint


    Sometimes, it''s handy to leave a breakpoint in place but not use it for a while.
    For example, you might disable a breakpoint while you track down some other bug
    that you have to fix sbefore you can deal with the one you originally started
    to fix. You''ll sometimes find that a bug is really a nested set of bugs, and
    you have to fix one before you can fix another. The good news is that identifying
    one bug often gives you insight into the larger problem, and fixing the remaining
    issues then becomes largely mechanical. There are times, though, when you hit
    a series of hard-to-solve problems, and then you''ll be happy to have a good debugger.
    To disable a breakpoint:


    1.  Right-click the breakpoint you want to disable.

    2.  Choose Disable Breakpoint.'
  trans: '

    ### 断点与变量


    断点是代码中你希望暂停程序执行的位置。计算机逐条指令运行程序，因此你可以中断指令流，让计算机等待，同时查看代码在特定位置产生的值。幸运的是，计算机不会感到无聊，所以你可以让它们想等多久就等多久。


    调试应用程序时，你可以在希望调试器暂停的任何位置创建临时断点，这些断点会显示在“断点”视图中。调试器会让你的应用程序一直运行，直到到达代码中的某个断点位置；随后它会挂起你的程序，并在“变量”视图中显示各种对象和基本类型的值。


    Eclipse 允许你设置多种不同类型的断点：


    *   行断点

    *   异常断点

    *   类加载断点

    *   观察点

    *   方法断点

    *   打印点


    我只会介绍行断点，因为它们几乎能解决你可能会遇到的所有问题——在我的职业生涯中，很长一段时间里除了行断点之外从未使用过其他类型。不过，我鼓励你自己去研究其他类型的断点。可以先从阅读
    Eclipse 帮助文件中关于断点的内容开始。


    #### 设置行断点


    要设置行断点：


    1.  在要设置断点的代码行左侧的狭窄区域中右键单击。

    2.  选择**切换断点**。在你右键单击的行上会出现一个断点，如图 11-3 所示。`draw` 方法中第一行最左侧的蓝点就是断点指示器。当你的程序运行时，它会在该位置暂停，并显示当时作用域内所有对象和基本类型的值。


    ![images](img/1103.jpg)


    ***图 11-3.** 代码中的断点：*


    让我们看看运行程序时会发生什么（图 11-4）。


    ![images](img/1104.jpg)


    ***图 11-4.** 执行在断点处暂停：*


    注意高亮为绿色的行。该绿色行表示当前的执行点（即程序被暂停前正在处理的那一行）。当调试器在某一行暂停时，它会在“变量”列表中显示该行作用域内的值，在“大纲”面板中显示包含该行的方法，并在“调试”面板中显示调用堆栈。从这里开始，你可以单步执行代码，可以一次执行一行，甚至可以在行内逐步执行。我们稍后会介绍单步执行。不过，首先请确保你理解了作用域的概念。


    #### 关于作用域


    “在作用域内”是什么意思？在作用域内的对象和基本类型（即变量）是指在程序的特定位置能够被使用的那些。以上面的断点为例，我们唯一能看到的局部值是 `g`，即用于绘图的
    `Graphics` 类的实例。然而，我们还能看到一个名为 `this` 的值，它代表包含该方法的类。通过展开变量列表中的 `this` 条目，我们可以查看在其中声明的所有类变量（而不是在方法中声明的）。图
    11-5 展示了 `this` 值展开后的视图。


    ![images](img/1105.jpg)


    ***图 11-5.** 展开的包含类值 `this`*


    如你所见，展开的 `this` 列表显示了所有类变量的值（条目左侧的箭头表示该条目可以展开）。点击其中一个条目，其详细信息会显示在“变量”视图的底部。在这个例子中，我们可以看到构成这个特定烟花颜色的
    RGB 值（红、绿、蓝的值）。你也可以右键点击该条目获取更多信息，但我们暂时跳过这一步。一旦你掌握了调试的基础知识，就可以尝试那些更高级的功能。


    ##### 单步执行：


    调试器中的“单步执行”指的是移动到程序中下一个执行点的能力。为了方便，Eclipse 提供了三种单步执行命令：单步跳入、单步跳过和单步返回。图 11-6 显示了调试工具栏上的单步执行按钮。


    ![images](img/1106.jpg)


    ***图 11-6.** 调试工具栏上的单步执行控件标注*


    你也可以使用功能键进行单步执行。**F5** 对应单步跳入，**F6** 对应单步跳过，**F7** 对应单步返回。


    ###### 单步跳入


    当你单步跳入一行时，你会进入该行中可能存在的任何方法的开头。考虑 `draw` 方法中的第二行：


    `g.setColor(drawColor);`


    当你单步跳入该行时，你会跳转到 `Graphics` 类中 `setColor` 方法的顶部。这可能没什么大用；你只希望使用此命令跳入你自己的代码。


    对于某些行，单步跳入与单步跳过效果相同，因为该行中没有任何内容会改变执行点。例如，单步跳入 `draw` 方法的第一行与单步跳过它的效果相同，因为该行只是将一个值赋给另一个值。


    ###### 单步跳过


    当你单步跳过一行时，你让调试器运行该行可能调用的所有方法。这包括这些方法可能调用的任何类和方法，依此类推。有时，这相当于很少的代码；其他时候，则可能是 Java
    库的一大块代码。


    单步跳过是找到程序中问题所在位置的好方法。一直单步跳过，直到问题行为出现。这样你就知道是哪一行出了问题。从那里开始，你可以单步跳入该行下的方法，然后在这些方法中单步跳过，直到再次遇到问题点。因此，通过在单步跳过和单步跳入代码之间来回切换，你可以逐步缩小范围，最终定位到代码中的故障。


    ###### 单步返回


    单步返回让程序一直运行，直到当前方法返回。单步返回实际上只是一个便利功能，这样你就不必单步执行一个方法中的所有行。如果你单步跳入一个方法，并意识到它不可能是问题的根源，那么单步返回提供了一种方便的方式来继续前进。


    #### 移除行断点


    你可能已经注意到，创建断点的命令是**切换断点**。切换一个已有的断点会将其移除。


    #### 禁用行断点


    有时，保留一个断点但暂时不使用它会很方便。例如，当你追踪另一个必须先修复的 bug 时，可能会禁用一个断点，然后才能处理你最初开始修复的那个。你有时会发现一个
    bug 实际上是一组嵌套的 bug，你必须先修复一个才能修复另一个。好消息是，识别出一个 bug 通常能让你对更大的问题有所了解，然后修复剩余的问题在很大程度上就变成了机械性的工作。不过，有时你会遇到一系列难以解决的问题，这时你就会庆幸有一个好用的调试器。要禁用断点：


    1.  右键单击要禁用的断点。

    2.  选择禁用断点。

