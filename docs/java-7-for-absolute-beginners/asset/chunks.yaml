- fmt: "### While loops\n\nAs we just learned, `for` loops deal with a specific case\
    \ of the more general purpose served by `while` loops. `for` loops (usually) deal\
    \ with things that can be counted. `while` loops continue to loop as long as something\
    \ is `true`. A `while` loop has only one argument: an expression that can be evaluated\
    \ as `true` or `false`.\n\nBefore we go any further, let's look at the simplest\
    \ possible `while` loop, as shown in [Listing 5-14](#Chapter05.html#list_5_14).\n\
    \n**Listing 5-14**. A simple while loop\n\n```\nwhile (counter < 10) {\n  System.out.println(counter);\n\
    }\n```\n\nA `while` loop does not have an explicit initialization variable or\
    \ an increment statement; you must provide that functionality yourself. (One of\
    \ the reasons for the invention of the `for` loop was to put all three parts of\
    \ a loop – initialize, test, and increment – in a single spot.) Though both initialization\
    \ and increment often appear near (for initialization) or within (for incrementing)\
    \ `while` loops, they are not part of the `while` loop syntax, as they are in\
    \ `for` loops. So let's look at a more complete example, which includes initialization\
    \ and incrementing, in addition to the test (see [Listing 5-15](#Chapter05.html#list_5_15)).\n\
    \n**Listing 5-15**. A more complete while loop\n\n```\nint counter = 0;\nwhile\
    \ (counter < 10) {\n  System.out.println(counter);\n  counter++;\n}\n```\n\nThat\
    \ (still simple) example shows the typical structure of a `while` loop: declare\
    \ a variable, test the variable at the top of the `while` loop, do some work in\
    \ the `while` loop, and increment the variable in the `while` loop. After the\
    \ test fails, the `while` loop is done, and the code below the `while` loop runs.\n\
    \nYou can create a `while` loop that runs forever (or, more likely, until some\
    \ condition that gets checked by an `if` statement in the body of the loop triggers\
    \ a `break` statement) by using `while(true)`. That construct is useful in some\
    \ cases, but it's not a safe thing to do. Savvy programmers try to ensure that\
    \ loops can't run forever (that's called an infinite loop). What if, due to unexpected\
    \ input data, your break condition in the body of the loop never gets hit? Then\
    \ your program is stuck (and that can be loads of fun if it happens to be writing\
    \ into a file—you can quickly cause problems for your operating system this way).\
    \ If you feel that you must use `while(true)`, test thoroughly.\n\nAnother use\
    \ for a `while` loop is to try something for a set amount of time when you don't\
    \ know how long each try will take. For example, suppose a mail client tries for\
    \ one minute to connect to a mail server and then gives up (that is, it times\
    \ out). [Listing 5-14](#Chapter05.html#list_5_14a) shows one way to wait for a\
    \ connection.\n\n**Listing 5-14.** While loop that waits for an event\n\n```\n\
    boolean connected = false;\nlong now = System.currentTimeMillis();\nlong oneMinuteFromStart\
    \ = System.currentTimeMillis() + 60000;\nwhile (!connected && now < oneMinuteFromStart)\
    \ {\n  System.out.println(\"Trying to connect....\");\n  if (MailServer.connect())\
    \ {\n    connected = true;\n    break;\n  }\n  // pause for two seconds\n  //\
    \ to let other processes work, too\n  try {\n    System.out.println(\"(letting\
    \ other processes run)\");\n    Thread.sleep(2000);\n  } catch (Exception e) {\n\
    \    e.printStackTrace();\n  }\n  // reset now for the next comparison\n  now\
    \ = System.currentTimeMillis();\n}\nif (connected) {\n  System.out.println(\"\
    Connected to the mail server\");\n} else {\n  System.out.println(\"Timed out while\
    \ trying to connect to the mail server\");\n}\n```\n\nCode to connect to a server\
    \ in a real-world application also checks for a number of exceptions and does\
    \ not print to the console but rather updates a status window (that includes a\
    \ cancel button) for the user.\n\nNotice the `break` statement. If we do connect,\
    \ we don't want to wait for the rest of the code to run (especially because it\
    \ contains a sleep instruction). Consequently, we jump out of the `while` loop\
    \ after we connect. The handy thing is that, if we connect on the first try, we\
    \ never wait and never loop. We shoot through the code as though it were linear\
    \ (except for the overhead of the comparison in the `while`) and we're done. If\
    \ we usually do connect on the first try, that's a nice little optimization. We\
    \ cover break statements in detail later in this chapter.\n\nNotice also the try-catch\
    \ block and the call to `Thread.sleep(2000)` within it. The `Thread.sleep()` method\
    \ tells the current thread to sleep for some number of milliseconds, letting other\
    \ processes run. In other words, it lets other processes get some work done while\
    \ your process takes a break. If it weren't present, the JVM wouldn't try to do\
    \ anything else until your `while` loop exited. That's generally a bad practice,\
    \ because it can bring an entire application to a halt while everything waits\
    \ for your code. Exactly how long to let your thread sleep varies by a number\
    \ of factors (how long what you're doing takes, how important what you're doing\
    \ is, and so on).\n\n**Tip** You should almost always put the current thread to\
    \ sleep for a bit to let other processes work when you do anything that has to\
    \ be timed.\n\n### Do-while Loops\n\nDo-while loops work much like `while` loops.\
