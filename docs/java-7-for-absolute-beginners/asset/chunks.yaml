- fmt: "### The `break` Statement\n\nMany programming languages offer some form of\
    \ `break` statement, because the need to stop the current execution path when\
    \ some condition is met is a common problem. The `break` statement without a label\
    \ moves the execution point (the bit of code the program is currently running)\
    \ to the next statement that is outside of whatever structure contains the `break`\
    \ statement. The only structures that can contain `break` statements are `for`,\
    \ `while`, and `do-while` loops and `switch` statements.\n\nThe `break` statement\
    \ has two forms, one (the most commonly used form) without a label and one with\
    \ a label. We see several examples of `break` statements throughout this chapter.\
    \ A `break` statement with a label breaks an outer loop, meaning that it is useful\
    \ only within nested loops. As an example, suppose we search a chessboard to find\
    \ a particular piece (say the black king). We might implement the search as a\
    \ loop going left to right with a loop going across the board. (By the way, if\
    \ we search for the position of a chess piece this way, we have a badly designed\
    \ program; each piece should be an object, and we find its location by examining\
    \ its properties, but this idea will do for an example as in [Listing 5-16.](#Chapter05.html#list_5_16))\n\
    \n***Listing 5-16.** Labeled `break` statement*\n\n```\nString[][] pieces = {\n\
    \  {\"Black Castle\", \"Black Knight\", \"Black Bishop\", \"Black Queen\",\n \
    \   \"Black King\", \"\", \"\", \"\"},\n  {\"Black Pawn\", \"Black Pawn\", \"\
    Black Pawn\", \"\", \"\", \"\", \"\", \"\"},\n  {\"\", \"\", \"\", \"\", \"\"\
    , \"\", \"\", \"\"},\n  {\"\", \"\", \"\", \"\", \"\", \"\", \"\", \"\"},\n  {\"\
    \", \"\", \"\", \"\", \"\", \"\", \"\", \"\"},\n  {\"\", \"\", \"\", \"\", \"\"\
    , \"\", \"\", \"\"},\n  {\"White Pawn\", \"White Pawn\", \"White Pawn\", \"\"\
    , \"\", \"\", \"\", \"\"},\n  {\"White Castle\", \"White Knight\", \"White Bishop\"\
    , \"White Queen\",\n    \"White King\", \"\", \"\", \"\"}\n    };\nint x = 0,\
    \ y = 0;\nking:\nfor (int i = 0; i < 8; i++) {\n  for (int j = 0; j < 8; j++)\
    \ {\n    if (pieces[i][j].equals(\"Black King\")) {\n      x = i;\n      y = j;\n\
    \      break king;\n    }\n  }\n}\nSystem.out.println(\"x: \" + x + \", y: \"\
    \ + y);\n```\n\nThe `king:` label indicates which loop the `break king;` statement\
    \ should terminate. Code execution then resumes with the print statement below\
    \ the outer loop.\n\n### The `continue` Statement\n\nThe `continue` statement\
    \ works within loops. It stops the current iteration of the loop and moves to\
    \ the next one. The `break` statement, on the other hand, exits the entire loop.\
    \ In other words, the `continue` statement continues the loop, whereas the `break`\
    \ statement breaks out of the loop (which explains the origin of these two keywords).\
    \ The general idiom for its use is that the code in the loop has determined that\
    \ it does not need to go further and can jump to processing the next item. It's\
    \ Java's way of letting you say, “No, not that one. How about the next one?” Returning\
    \ to our chessboard, suppose we want to count the number of surviving pawns (see\
    \ [Listing 5-17](#Chapter05.html#list_5_17)).\n\n***Listing 5-17.** `continue`\
    \ statement*\n\n```\nString[][] pieces = {\n  {\"Black Castle\", \"Black Knight\"\
    , \"Black Bishop\", \"Black Queen\", \"Black King\", \"\", \"\", \"\"},\n  {\"\
    Black Pawn\", \"Black Pawn\", \"Black Pawn\", \"\", \"\", \"\", \"\", \"\"},\n\
    \  {\"\", \"\", \"\", \"\", \"\", \"\", \"\", \"\"},\n  {\"\", \"\", \"\", \"\"\
    , \"\", \"\", \"\", \"\"},\n  {\"\", \"\", \"\", \"\", \"\", \"\", \"\", \"\"\
    },\n  {\"\", \"\", \"\", \"\", \"\", \"\", \"\", \"\"},\n  {\"White Pawn\", \"\
    White Pawn\", \"White Pawn\", \"\", \"\", \"\", \"\", \"\"},\n  {\"White Castle\"\
    , \"White Knight\", \"White Bishop\", \"White Queen\", \"White King\", \"\", \"\
    \", \"\"}\n};\nint pawns = 0;\nfor (int i = 0; i < 8; i++) {\n  for (int j = 0;\
    \ j < 8; j++) {\n    if (!pieces[i][j].contains(\"Pawn\")) {\n      continue;\n\
    \    }\n    pawns++;\n  }\n}\nSystem.out.println(\"Surviving pawns: \" + pawns);\n\
    ```\n\nWhen we encounter the `continue` statement, we jump over any other code\
    \ in the loop and process the next item.\n\nNote that we can rewrite the body\
    \ of the inner loop to not use a `continue` statement as in [Listing 5-18](#Chapter05.html#list_5_18):\n\
    \n***Listing 5-18.** Doing without the `continue` statement*\n\n```\nif (pieces[i][j].contains(\"\
    Pawn\")) {\n  pawns++;\n}\n```\n\nIt turns out that writing an example of the\
    \ `continue` statement that can't be rewritten to be simpler without the `continue`\
    \ statement is fairly hard to do, which is why `continue` statements don't appear\
    \ in code that often.\n\nLike the `break` statement, the `continue` statement\
    \ can use a label. As it happens, adding a label to a `continue` statement in\
    \ the chess example yields the same result, though with more processing. So let's\
    \ consider an example that counts the number of characters that appear before\
    \ the first space in each string within an array of strings (see [Listing 5-19](#Chapter05.html#list_5_19)).\n\
    \n***Listing 5-19.** A `continue` statement with a label*\n\n```\nString[] detectives\
    \ = {\"Sam Spade\", \"Sherlock Holmes\", \"Charlie Chan\"};\nint charactersBeforeSpaces\
    \ = 0;\nouter:\nfor (String str : detectives) {\n    char[] strChars = str.toCharArray();\n\
    \    for (char ch : strChars) {\n        if (ch == ' ') {\n            continue\
    \ outer;\n        }\n        charactersBeforeSpaces++;\n    }\n}\nSystem.out.println(charactersBeforeSpaces);\n\
    ```\n\nThis bit of code prints 18.\n\n![images](images/square.jpg) **Note** As\
    \ mentioned earlier in this chapter, the Java community frowns on the use of labels,\
    \ because they dislike the use of `goto`-like idioms, and jumping to a label comes\
    \ close to being a `goto` instruction. The designers of Java intentionally did\
    \ not include a `goto` instruction, and the community has embraced the no-`goto`\
    \ idea to the extent of frowning on labels as well. The accepted view is that\
    \ if your code has to jump around, you've done a poor job designing your code.\
    \ I concur, because I've never yet found a use for `break` or `continue` statements\
    \ with labels, other than in writing examples to show how they work.\n\nLet's\
    \ redo that bit of code to show how it works without a label and thus fits the\
    \ best practices of the Java community (see [Listing 5-20](#Chapter05.html#list_5_20)).\n\
    \n***Listing 5-20.** Removing a label*\n\n```\nString[] detectives = {\"Sam Spade\"\
    , \"Sherlock Holmes\", \"Charlie Chan\"};\nint charactersBeforeSpaces = 0;\nfor\
    \ (String str : detectives) {\n    char[] strChars = str.toCharArray();\n    for\
    \ (char ch : strChars) {\n        if (ch == ' ') {\n            break;\n     \
    \   }\n        charactersBeforeSpaces++;\n    }\n}\nSystem.out.println(charactersBeforeSpaces);\n\
    ```\n\nAs you can see, removing the label and replacing the `continue` statement\
    \ with a `break` statement produces the same result and is simpler to follow.\
    \ Labels are appropriate in some rare cases, but you'll probably write Java code\
    \ for a long time before you find such a case. (I've been writing Java code since\
    \ 1995, and we've yet to need a label.) In the meantime, try to structure your\
    \ code to avoid jumping around beyond the use of label-free `break` and `continue`\
    \ statements. Instead, structure your code so that your logic catches every possible\
    \ case. That way, you won't need to jump anywhere."
  raw: '#### The break Statement


    Many programming languages offer some form of `break` statement, because the need
    to stop the current execution path when some condition is met is a common problem.
    The `break` statement without a label moves the execution point (the bit of code
    the program is currently running) to the next statement that is outside of whatever
    structure contains the `break` statement. The only structures that can contain
    `break` statements are `for`, `while`, and `do-while` loops and `switch` statements.


    The `break` statement has two forms, one (the most commonly used form) without
    a label and one with a label. We see several examples of `break` statements throughout
    this chapter. A `break` statement with a label breaks an outer loop, meaning that
    it is useful only within nested loops. As an example, suppose we search a chessboard
    to find a particular piece (say the black king). We might implement the search
    as a loop going left to right with a loop going across the board. (By the way,
    if we search for the position of a chess piece this way, we have a badly designed
    program; each piece should be an object, and we find its location by examining
    its properties, but this idea will do for an example as in [Listing 5-16.](#Chapter05.html#list_5_16))


    ***Listing 5-16.** Labeled break statement*


    `String[][] pieces = {`

    `  {"Black Castle", "Black Knight", "Black Bishop", "Black Queen",`

    `    "Black King", "", "", ""},`

    `  {"Black Pawn", "Black Pawn", "Black Pawn", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"White Pawn", "White Pawn", "White Pawn", "", "", "", "", ""},`

    `  {"White Castle", "White Knight", "White Bishop", "White Queen",`

    `    "White King", "", "", ""}`

    `    };`

    `int x = 0, y = 0;`

    `king:`

    `for (int i = 0; i < 8; i++) {`

    `  for (int j = 0; j < 8; j++) {`

    `    if (pieces[i][j].equals("Black King")) {`

    `      x = i;`

    `      y = j;`

    `      break king;`

    `    }`

    `  }`

    `}`

    `System.out.println("x: " + x + ", y: " + y);`


    The `king:` label indicates which loop the `break king;` statement should terminate.
    Code execution then resumes with the print statement below the outer loop.


    #### The continue Statement


    The `continue` statement works within loops. It stops the current iteration of
    the loop and moves to the next one. The `break` statement, on the other hand,
    exits the entire loop. In other words, the `continue` statement continues the
    loop, whereas the `break` statement breaks out of the loop (which explains the
    origin of these two keywords). The general idiom for its use is that the code
    in the loop has determined that it does not need to go further and can jump to
    processing the next item. It''s Java''s way of letting you say, “No, not that
    one. How about the next one?” Returning to our chessboard, suppose we want to
    count the number of surviving pawns (see [Listing 5-17](#Chapter05.html#list_5_17)).


    ***Listing 5-17.** continue statement*


    `String[][] pieces = {`

    `  {"Black Castle", "Black Knight", "Black Bishop", "Black Queen", "Black King",
    "", "", ""},`

    `  {"Black Pawn", "Black Pawn", "Black Pawn", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"White Pawn", "White Pawn", "White Pawn", "", "", "", "", ""},`

    `  {"White Castle", "White Knight", "White Bishop", "White Queen", "White King",
    "", "", ""}`

    `};`

    `int pawns = 0;`

    `for (int i = 0; i < 8; i++) {`

    `  for (int j = 0; j < 8; j++) {`

    `    if (!pieces[i][j].contains("Pawn")) {`

    `      continue;`

    `    }`

    `    pawns++;`

    `  }`

    `}`

    `System.out.println("Surviving pawns: " + pawns);`


    When we `encounter` the `continue` statement, we jump over any other code in the
    loop and process the next item.


    Note that we can rewrite the body of the inner loop to not use a `continue` statement
    as in [Listing 5-18](#Chapter05.html#list_5_18):


    ***Listing 5-18.** Doing without the `continue` statement*


    `if (pieces[i][j].contains("Pawn")) {`

    `  pawns++;`

    `}`


    It turns out that writing an example of the `continue` statement that can''t be
    rewritten to be simpler without the `continue` statement is fairly hard to do,
    which is why `continue` statements don''t appear in code that often.


    Like the `break` statement, the `continue` statement can use a label. As it happens,
    adding a label to a `continue` statement in the chess example yields the same
    result, though with more processing. So let''s consider an example that counts
    the number of characters that appear before the first space in each string within
    an array of strings (see [Listing 5-19](#Chapter05.html#list_5_19)).


    ***Listing 5-19.** A continue statement with a label*


    `String[] detectives = {"Sam Spade", "Sherlock Holmes", "Charlie Chan"};`

    `int charactersBeforeSpaces = 0;`

    `outer:`

    `for (String str : detectives) {`

    `    char[] strChars = str.toCharArray();`

    `    for (char ch : strChars) {`

    `        if (ch == '' '') {`

    `            continue outer;`

    `        }`

    `        charactersBeforeSpaces++;`

    `    }`

    `}`

    `System.out.println(charactersBeforeSpaces);`


    This bit of code prints 18.


    ![images](images/square.jpg) **Note** As mentioned earlier in this chapter, the
    Java community frowns on the use of labels, because they dislike the use of `goto`-like
    idioms, and jumping to a label comes close to being a `goto` instruction. The
    designers of Java intentionally did not include a `goto` instruction, and the
    community has embraced the no-`goto` idea to the extent of frowning on labels
    as well. The accepted view is that if your code has to jump around, you''ve done
    a poor job designing your code. I concur, because I''ve never yet found a use
    for `break` or `continue` statements with labels, other than in writing examples
    to show how they work.


    Let''s redo that bit of code to show how it works without a label and thus fits
    the best practices of the Java community (see [Listing 5-20](#Chapter05.html#list_5_20)).


    ***Listing 5-20.** Removing a label*


    `String[] detectives = {"Sam Spade", "Sherlock Holmes", "Charlie Chan"};`

    `int charactersBeforeSpaces = 0;`

    `for (String str : detectives) {`

    `    char[] strChars = str.toCharArray();`

    `    for (char ch : strChars) {`

    `        if (ch == '' '') {`

    `            break;`

    `        }`

    `        charactersBeforeSpaces++;`

    `    }`

    `}`

    `System.out.println(charactersBeforeSpaces);`


    As you can see, removing the label and replacing the `continue` statement with
    a `break` statement produces the same result and is simpler to follow. Labels
    are appropriate in some rare cases, but you''ll probably write Java code for a
    long time before you find such a case. (I''ve been writing Java code since 1995,
    and we''ve yet to need a label.) In the meantime, try to structure your code to
    avoid jumping around beyond the use of label-free `break` and `continue` statements.
    Instead, structure your code so that your logic catches every possible case. That
    way, you won''t need to jump anywhere.'
  trans: '

    #### break 语句


    许多编程语言都提供了某种形式的 `break` 语句，因为在满足某个条件时停止当前执行路径是一个常见问题。不带标签的 `break` 语句会将执行点（程序当前正在运行的代码片段）移动到包含该
    `break` 语句的结构之外的下一句代码。唯一可以包含 `break` 语句的结构是 `for`、`while` 和 `do-while` 循环以及 `switch`
    语句。


    `break` 语句有两种形式，一种不带标签（最常用的形式），另一种带标签。我们在本章中会看到几个 `break` 语句的示例。带标签的 `break` 语句会中断外层循环，这意味着它只在嵌套循环中有用。例如，假设我们在棋盘上搜索某个特定的棋子（比如黑王）。我们可能会实现一个从左到右的循环，再嵌套一个从上到下的循环来遍历整个棋盘。（顺便说一句，如果我们用这种方式搜索棋子的位置，那程序的设计就很糟糕；每个棋子都应该是一个对象，我们通过检查其属性来找到它的位置，但这个想法足以作为清单
    5-16 的示例。）


    ***清单 5-16.** 带标签的 break 语句*


    `String[][] pieces = {`

    `  {"Black Castle", "Black Knight", "Black Bishop", "Black Queen",`

    `    "Black King", "", "", ""},`

    `  {"Black Pawn", "Black Pawn", "Black Pawn", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"White Pawn", "White Pawn", "White Pawn", "", "", "", "", ""},`

    `  {"White Castle", "White Knight", "White Bishop", "White Queen",`

    `    "White King", "", "", ""}`

    `    };`

    `int x = 0, y = 0;`

    `king:`

    `for (int i = 0; i < 8; i++) {`

    `  for (int j = 0; j < 8; j++) {`

    `    if (pieces[i][j].equals("Black King")) {`

    `      x = i;`

    `      y = j;`

    `      break king;`

    `    }`

    `  }`

    `}`

    `System.out.println("x: " + x + ", y: " + y);`


    `king:` 标签指明了 `break king;` 语句应该终止哪个循环。代码执行随后会从外层循环下面的打印语句继续。


    #### continue 语句


    `continue` 语句在循环内部工作。它会停止当前循环迭代并进入下一次迭代。而 `break` 语句则会退出整个循环。换句话说，`continue` 语句是继续循环，而
    `break` 语句是跳出循环（这也解释了这两个关键字的起源）。它的一般用法是，循环中的代码确定不需要继续执行当前迭代，可以跳转到处理下一个项目。这是 Java
    让你表达“不，不是这个。下一个怎么样？”的方式。回到我们的棋盘示例，假设我们要统计存活的兵的数量（见清单 5-17）。


    ***清单 5-17.** continue 语句*


    `String[][] pieces = {`

    `  {"Black Castle", "Black Knight", "Black Bishop", "Black Queen", "Black King",
    "", "", ""},`

    `  {"Black Pawn", "Black Pawn", "Black Pawn", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"", "", "", "", "", "", "", ""},`

    `  {"White Pawn", "White Pawn", "White Pawn", "", "", "", "", ""},`

    `  {"White Castle", "White Knight", "White Bishop", "White Queen", "White King",
    "", "", ""}`

    `};`

    `int pawns = 0;`

    `for (int i = 0; i < 8; i++) {`

    `  for (int j = 0; j < 8; j++) {`

    `    if (!pieces[i][j].contains("Pawn")) {`

    `      continue;`

    `    }`

    `    pawns++;`

    `  }`

    `}`

    `System.out.println("Surviving pawns: " + pawns);`


    当我们遇到 `continue` 语句时，会跳过循环中的任何其他代码，并处理下一个项目。


    请注意，我们可以重写内层循环的主体，使其不使用 `continue` 语句，如清单 5-18 所示：


    ***清单 5-18.** 不使用 `continue` 语句的实现*


    `if (pieces[i][j].contains("Pawn")) {`

    `  pawns++;`

    `}`


    事实证明，要写出一个不使用 `continue` 语句就无法简化实现的 `continue` 语句示例是相当困难的，这就是为什么 `continue` 语句在代码中并不常见的原因。


    与 `break` 语句类似，`continue` 语句也可以使用标签。碰巧的是，在棋盘示例中为 `continue` 语句添加标签会产生相同的结果，尽管处理过程更多一些。因此，让我们考虑一个示例，该示例统计字符串数组中每个字符串中第一个空格之前出现的字符数（见清单
    5-19）。


    ***清单 5-19.** 带标签的 continue 语句*


    `String[] detectives = {"Sam Spade", "Sherlock Holmes", "Charlie Chan"};`

    `int charactersBeforeSpaces = 0;`

    `outer:`

    `for (String str : detectives) {`

    `    char[] strChars = str.toCharArray();`

    `    for (char ch : strChars) {`

    `        if (ch == '' '') {`

    `            continue outer;`

    `        }`

    `        charactersBeforeSpaces++;`

    `    }`

    `}`

    `System.out.println(charactersBeforeSpaces);`


    这段代码会打印出 18。


    ![images](img/square.jpg) **注意** 正如本章前面提到的，Java 社区不赞成使用标签，因为他们不喜欢使用类似 `goto` 的惯用法，而跳转到标签几乎等同于
    `goto` 指令。Java 的设计者有意没有包含 `goto` 指令，社区也接受了无 `goto` 的理念，以至于同样不赞成使用标签。公认的观点是，如果你的代码需要跳来跳去，说明你的代码设计得很糟糕。我同意这一点，因为除了在编写示例来展示它们如何工作之外，我从未发现带标签的
    `break` 或 `continue` 语句有什么用处。


    让我们重写那段代码，展示如何在不使用标签的情况下工作，从而符合 Java 社区的最佳实践（见清单 5-20）。


    ***清单 5-20.** 移除标签*


    `String[] detectives = {"Sam Spade", "Sherlock Holmes", "Charlie Chan"};`

    `int charactersBeforeSpaces = 0;`

    `for (String str : detectives) {`

    `    char[] strChars = str.toCharArray();`

    `    for (char ch : strChars) {`

    `        if (ch == '' '') {`

    `            break;`

    `        }`

    `        charactersBeforeSpaces++;`

    `    }`

    `}`

    `System.out.println(charactersBeforeSpaces);`


    如你所见，移除标签并将 `continue` 语句替换为 `break` 语句会产生相同的结果，并且更易于理解。标签在极少数情况下是合适的，但你可能需要编写很长时间的
    Java 代码才能遇到这种情况。（我从 1995 年开始编写 Java 代码，至今从未需要过标签。）在此期间，请尽量组织你的代码，避免在无标签的 `break`
    和 `continue` 语句之外进行跳转。相反，要组织好代码，使你的逻辑能够覆盖每一种可能的情况。这样，你就不需要跳转到任何地方了。

