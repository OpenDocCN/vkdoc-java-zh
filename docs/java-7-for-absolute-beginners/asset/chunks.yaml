    \   this.degrees = degrees;\n  }\n\n  public int getDegrees() {\n    return degrees;\n\
    \  }\n\n  // static because it doesn't rely on a particular direction\n  public\
    \ static Direction findCardinalDirection (int degrees) {\n    if (degrees < 45)\
    \ {\n      return NORTH;\n    } else if (degrees < 135) {\n      return EAST;\n\
    \    } else if (degrees < 225) {\n      return SOUTH;\n    } else if (degrees\
    \ < 315) {\n      return WEST;\n    } else {\n      return NORTH;\n    }\n  }\n\
    }\n```\n\nNow that we have our completed enumeration, we need a test program to\
    \ see how it works. [Listing 3-17](#Chapter03.html#list_3_17) shows a program\
    \ class that does the job.\n\n**Listing 3-17.** A test class for our enumeration\n\
    \n```java\npackage com.bryantcs.examples.enumExample;\n\npublic class EnumExample\
    \ {\n\n  public static void main(String[] args) {\n    int[] compassPoints = {22,\
    \ 77, 144, 288};\n    for (int i = 0; i < compassPoints.length; i++) {\n     \
    \ System.out.println(compassPoints[i] + \" degrees is (very roughly) \"\n    \
    \    + Direction.findCardinalDirection(compassPoints[i]));\n    }\n    for (Direction\
    \ d : Direction.values()) {\n      System.out.println(d + \" is \" + d.getDegrees()\
    \ + \" degrees.\");\n    }\n  }\n}\n```\n\n`EnumExample` produces the output in\
    \ the console shown in [Listing 3-18](#Chapter03.html#list_3_18).\n\n**Listing\
    \ 3-18.** `EnumExample` output\n\n```\n22 degrees is (very roughly) NORTH\n77\
    \ degrees is (very roughly) EAST\n144 degrees is (very roughly) SOUTH\n288 degrees\
    \ is (very roughly) WEST\nNORTH is 0 degrees.\nEAST is 90 degrees.\nSOUTH is 180\
    \ degrees.\nWEST is 270 degrees.\n```\n\n### Summary\n\nIn this chapter, we learned\
    \ the basics about the various data types that are available in Java. We found\
    \ out:\n\n*   The size restrictions of the various numeric data types\n*   How\
    \ the `boolean` data type works\n*   How `char` variables and `String` objects\
    \ work and a bit about how they can interact\n*   How arrays work\n*   What a\
    \ null is and how to use one to good effect\n*   How to create and use enumerations\n\
    \nWe make repeated use of all these concepts and techniques throughout the rest\
    \ of the book. As we work more with Java, you'll do a lot with primitives, the\
    \ `String` object, primitive and `String` literals, and arrays. Enumerations appear\
    \ less often in most code, but they offer important advantages (most notably type\
    \ safety) when we need them.\n\n## Chapter 4: Operators\n\nJava includes many\
    \ operators, from ordinary mathematical operators such as a minus sign (−) to\
    \ operators that only make sense for object-oriented programming, such as `instanceof`.\
    \ To start with, let's look at the list of operators in [Table 4-1](#Chapter04.html#tab_4_1).\n\
    \n![images](images/t0401.jpg)\n\n![images](images/t0401a.jpg)\n\n### Operator\
    \ Precedence\n\nThe first thing to know about operators is that they have precedence.\
    \ I can't forget Mr. Smith in junior high algebra class teaching us to memorize\
    \ Please Excuse My Dear Aunt Sally. That odd phrase is an effective mnemonic for\
    \ the order of operations (another name for operator precedence) in algebra. It\
    \ shortens to PEMDAS, which gives us Parentheses, Exponent, Multiplication, Division,\
    \ Addition, and Subtraction. Thanks to operator precedence (and, in my case, Mr.\
    \ Smith), when we work with algebra equations, we know to resolve parentheses\
    \ before we resolve exponents, exponents before multiplication, and so on.\n\n\
    The same kind of thing holds true in Java (and many other programming languages).\
    \ However, as shown previously, Java has a lot more than six operators. Also,\
    \ Java has some operators that have the same level of precedence. In those cases,\
    \ precedence proceeds from left to right for binary operators (except assignment\
    \ operators) and right to left for assignment operators. That's probably as clear\
    \ as mud, but we get to some examples shortly that clarify the order of operations\
    \ and identify some of the problem spots where people often trip.\n\n### The Missing\
    \ Operator: Parentheses\n\nParentheses aren't in the list of Java operators, but\
    \ they act as an operator with the highest precedence. Anything in parentheses\
    \ is resolved first. When a line has several sets of parentheses, they are resolved\
    \ from innermost to outermost and from left to right. Let's consider some examples\
    \ in [Listing 4-1](#Chapter04.html#list_4_1).\n\n**Listing 4-1.** Parentheses\
    \ as an operator\n\n```java\nSystem.out.println(2 + 4 / 2); // division processed\
    \ first, so prints 4\nSystem.out.println((2 + 4) / 2); // addition processed first,\
    \ so prints 3\nSystem.out.println((2 + 4) / 3 * 2); // prints 4, not 1 – see below\
    \ for why\nSystem.out.println((2 + 4) / (3 * 2)); // prints 1\nSystem.out.println((2\
    \ + 4) / (2 * 2)); // prints 1 – note the truncation\nSystem.out.println((2.0\
    \ + 4.0) / (2.0 * 2.0)); // prints 1.5\n```\n\nThe bolded line prints 4 because\
    \ the division operator gets processed before the multiplication operator. That\
    \ happens because operators of equal precedence get processed from left to right.\
    \ In algebra, multiplication comes before division. However, Java is not algebra,\
    \ and that sometimes trips up new Java developers who remember their algebra.\
    \ (I've tripped over that difference at least once.)\n\nThe fifth line prints\
    \ 1 because we use integer literals (as we covered in the previous chapter). Consequently,\
    \ we get back an integer literal. Java truncates (that is, throws away) any remainder\
    \ when dealing with integers, so 1.5 becomes 1. The last line uses floating-point\
    \ literals, so it returns 1.5. A value of 1.9 would also be truncated to 1. Truncation\
    \ is not a kind of rounding; a truncated value has any value to the right of the\
    \ decimal place removed.\n\nAs a rule, remember to use parentheses to clarify\
    \ your code and to ensure the proper order for your operations. I mention clarity\
    \ first for a reason: Clarity helps a lot. If you can gain clarity by splitting\
    \ a line onto multiple lines to make your operations clear for other developers\
    \ (and for yourself when you return to the code at a later date), then do so.\
    \ Your fellow developers will thank you if they can understand your code without\
    \ a struggle.\n\n### Postfix Operators\n\nThe term *postfix* has a number of meanings\
    \ in mathematics, linguistics, and other fields. In computer science, it means\
    \ an operator that follows an expression. Java's two postfix operators increment\
    \ (increase by one) and decrement (decrease by one) values. [Listing 4-2](#Chapter04.html#list_4_2)\
    \ shows some examples:\n\n**Listing 4-2.** Postfix operators\n\n```java\nprivate\
    \ int getC() {\n  int c = 0;\n  c++; // c = 1 now\n  c--; // c = 0 now\n  return\
    \ c++; //returns 0;\n}\n```\n\nSo why does that return 0? Because the postfix\
    \ operators first return the original value and then assign the new value to the\
    \ variable. That particular language detail bites a lot of new Java programmers.\
    \ To fix it, use the unary `++` operator (next on our list) before the expression\
    \ rather than the postfix operator after the expression or move your return statement\
    \ to its own line. Parentheses around the expression `(c++)` do not make this\
    \ method return 1, by the way, because `c` would have been set to 0 within the\
    \ parentheses."
