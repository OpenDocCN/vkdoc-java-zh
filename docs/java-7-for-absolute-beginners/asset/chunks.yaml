    ### 射击场游戏


    顾名思义，射击场是一款非常简单的射击游戏。我创建它主要是为了展示如何用单个计时器控制多个对象、如何让相似对象以不同速度移动，以及如何实现一种简单的碰撞检测方法（即检测一个对象何时与另一个对象交互——通常是通过相互碰撞）。我还会展示一种实现双缓冲的方法，这能减少游戏中令人烦躁的闪烁。当你编写自己的游戏时（毫无疑问会更有趣、更好玩），你需要知道如何实现这些功能。


    在深入代码之前，我们先看看游戏的样子。图 12-2 展示了运行中的射击场游戏。


    ![images](img/1202.jpg)


    ***图 12-2.** 射击场游戏*


    从得分可以看出，我在截屏前击中了四个 10 分靶和一个 25 分靶。我觉得后排很难击中，但游戏本就该如此，所以我想这是个好迹象。


    射击场游戏由六个类组成：


    *   `ShootingGallery` 定义并管理用户界面。

    *   `ShootingGalleryPanel` 管理游戏区域并包含游戏循环。

    *   `ShootingGalleryShooter` 管理光标。

    *   `ShootingGalleryTargetRow` 管理单行靶子。

    *   `ShootingGalleryTarget` 管理单个靶子。

    *   `ShootingGallerySprites` 管理游戏使用的精灵图。


    ***清单 12-4.** ShootingGallery 类*


