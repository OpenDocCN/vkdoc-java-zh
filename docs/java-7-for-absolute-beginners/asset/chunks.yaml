- fmt: "### Writing XML\n\nAs mentioned above, you can write XML with the DOM package\
    \ or by writing `String` objects. If you just need to write an XML file, writing\
    \ strings works well enough (and it is the fastest way to create XML). On the\
    \ other hand, if you need to pass your XML output to a process that requires an\
    \ XML header, and perhaps even needs to ensure that the XML conforms to a schema,\
    \ you might want to consider using DOM.\n\nBefore you get to writing XML, you\
    \ first need a data source to provide the content that you want to turn into XML.\
    \ Here is a simple class that provides the content of the poem used earlier (\"\
    The Great Figure,\" by William Carlos Williams).\n\n**Listing 9-3**. A Poem As\
    \ a Data Source\n\n```java\npackage com.bryantcs.examples.xml;\n\nimport java.util.ArrayList;\n\
    \npublic class Poem {\n\n  private static String title = \"The Great Figure\"\
    ;\n  private static String author = \"William Carlos Williams\";\n  private static\
    \ ArrayList<String> lines = new ArrayList<String>();\n\n  static {\n    lines.add(\"\
    Among the rain\");\n    lines.add(\"and lights\");\n    lines.add(\"I saw the\
    \ figure 5\");\n    lines.add(\"in gold\");\n    lines.add(\"on a red\");\n  \
    \  lines.add(\"fire truck\");\n    lines.add(\"moving\");\n    lines.add(\"tense\"\
    );\n    lines.add(\"unheeded\");\n    lines.add(\"to gong clangs\");\n    lines.add(\"\
    siren howls\");\n    lines.add(\"and wheels rumbling\");\n    lines.add(\"through\
    \ the dark city\");\n  }\n\n  public static String getTitle() {\n    return title;\n\
    \  }\n\n  public static String getAuthor() {\n    return author;\n  }\n\n  public\
    \ static ArrayList<String> getLines() {\n    return lines;\n  }\n}\n```\n\nAs\
    \ you can see, it's a pretty simple representation of a poem. Notice that it's\
    \ also entirely static. Some classes consist entirely of static members, but those\
    \ classes usually define sets of helper methods (string manipulation specialized\
    \ for a particular application is a common use for that kind of helper class).\
    \ A class with static data, though, usually indicates that someone hasn't thought\
    \ through a problem very well. This kind of thing usually belongs in a file. For\
    \ our purposes, though, this slightly odd class will serve well enough.\n\n####\
    \ Writing XML with DOM\n\nHere's the code for writing an XML file with DOM, given\
    \ the `Poem` class as the data source:\n\n**Listing 9-4**. Writing XML with DOM\n\
    \n```java\npackage com.bryantcs.examples.xml;\n\nimport java.io.File;\n\nimport\
    \ java.io.FileNotFoundException;\nimport java.io.FileOutputStream;\nimport java.io.IOException;\n\
    import java.io.StringWriter;\n\nimport javax.xml.parsers.DocumentBuilder;\nimport\
    \ javax.xml.parsers.DocumentBuilderFactory;\nimport javax.xml.parsers.ParserConfigurationException;\n\
    import javax.xml.transform.OutputKeys;\nimport javax.xml.transform.Transformer;\n\
    import javax.xml.transform.TransformerConfigurationException;\nimport javax.xml.transform.TransformerException;\n\
