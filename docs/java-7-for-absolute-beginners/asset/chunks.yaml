    正如我们刚刚看到的，`TargetClickPanel` 类仅提供了目标出现的场所，处理游戏区域内的鼠标点击（`TargetClick` 类处理菜单和框架中的鼠标点击），并维持五个目标处于活跃状态。


    在构成 `TargetClick` 游戏的三个类中，`Target` 类的任务最为简单：它绘制一个目标，并判断目标是否被击中。这看起来可能任务过多，你的第一反应可能是将命中逻辑移出此类。然而，如果玩家击中了目标，`Target`
    类的实例必须停止绘制其目标。因此，将命中逻辑放在 `Target` 类中是合理的。再次强调，赋予每个类明确的目的比将逻辑与表现分离更重要。在决定是否分离代码时，问自己两个有用的问题：我能进一步分离吗？进一步分离是否使代码更易于理解或维护？在这个例子中，代码本可以进一步分离。然而，进一步分离只会使这个简单的程序变得杂乱。


