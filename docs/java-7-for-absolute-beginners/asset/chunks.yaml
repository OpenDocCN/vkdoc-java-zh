    #### 字段


    *字段*是类或（极少情况下）接口中用于保存值的成员。字段让我们能够存储使用特定类时关心的信息位。例如，在定义矩形的类中，高度和宽度字段对该类的用途至关重要。在本章前面列出的
    `AverageImpl` 类中，以下代码行定义了一个字段：


    `private long begin;`


    这个特定字段包含一个 `long` 类型的值（这是一个非常大的数字——我们将在下一章介绍数据类型）。在这种情况下，该字段包含 `null`（一个关键字，表示某物未被赋值，对于对象引用而言，表示不引用任何对象），直到其他代码对其赋值。你也可以直接为字段赋值，如代码清单
    2-8 所示。


    ***代码清单 2-8.** 字段示例*


    `int[] ints = {1, 2, 3, 4};`

    `AverageImpl averageImpl = new AverageImpl(ints);`


    对于基本类型（如 `int`），你可以直接使用值。在这个例子中，我们为一个 `int` 数组赋值。对于对象，你必须使用 `new` 关键字并调用对象的构造方法。我们将在下一章介绍基本类型和对象之间的区别。


    对于字段，`static` 关键字的作用与在方法上类似：静态字段只有一个实例，由该类的所有对象共享。因此，静态字段也被称为类字段（因为它仅适用于类本身，而非从该类创建的对象）。静态字段主要用于定义常量（永不改变的值）。我们将在本章后面介绍常量。


    ![images](img/square.jpg) **警告** 静态字段可能引发问题。假设程序中有两个部分同时运行，每个部分都在操作一个对象，而该对象的类定义中包含一个静态字段。如果两个类同时尝试修改该字段，就可能发生糟糕的情况（包括竞态条件——程序各部分相互等待——以及字段值不正确）。因此，除常量（既是静态又是最终的）之外，所有静态字段通常都应设为私有。


    ##### 常量


    许多编程语言都支持*常量*的概念。常量是一个永不改变的值。例如，Java 包含一个名为 Math 的类，而 `Math` 类中包含一个名为 PI 的常量，它以高精度保存圆周率的值。


    在 Java 中，常量是具有特定修饰符组合的字段：static 和 final。大多数常量也是 public 的，尽管也可以（并且有时很有用）拥有私有、包级和受保护的常量。我们在
    `AverageImpl` 类中使用了一个私有常量，以避免重复输入相同的字符串。按照惯例，常量的名称全部大写，逻辑单词之间用下划线分隔，如代码清单 2-9
    所示。


    ***代码清单 2-9.** 一个常量*


    `private static final String EXCEPTION_MESSAGE =`

    `    “ints must contain at least one int”;`


    #### 方法


    *方法*本质上是一个类能够执行的操作。关于类和对象的一个常见比喻是：类是名词，方法是动词。与所有比喻一样，它有时正确，有时错误，但通常是一种检查设计是否合理的便捷方式。方法通常会对类的其他成员（字段和方法）进行操作。然而，有些方法（通常是静态方法）不操作类的其他成员，而是独立运行。


    由于方法能够执行各种不同的操作，因此除了说“方法执行操作”之外，很难对方法做出有意义的概括。或许一些例子会有所帮助（见代码清单 2-10）。


    ***代码清单 2-10**. 方法*


    `  // 一个经典的 getter 方法`

    `  @Override`

    `  public int[] getInts() {`

    `    return ints;`

    `  }`


    `  // 一个经典的 setter 方法`

    `  @Override`

    `  public void setInts(int[] ints) throws IllegalArgumentException {`

    `    if (ints.length == 0){`

    `      throw new IllegalArgumentException(EXCEPTION_MESSAGE);`

    `    }`

    `    this.ints = ints;`

    `  }`


    让我们仔细看看这个“setter”方法，从第一行开始（不包括以 `//` 开头的注释。我们将在本章后面介绍注释）。


    `public` 是方法的访问修饰符。我们已在前面章节介绍了访问修饰符。


    `void` 是返回类型。返回类型告诉调用该方法的任何代码应该期待什么。所有方法都必须有返回类型。`void` 表示该方法不会返回任何内容。因此，所有方法都必须有返回类型，但并非所有方法都必须返回内容。如果我们查看类中的其他方法，可以看到它们通常确实会返回一些内容。


    `setInts` 是方法的名称。按照惯例，方法名以小写字母开头，并在每个逻辑单词出现的位置使用大写字母。这有时被称为驼峰命名法。


    括号内包含参数列表。在这个例子中，列表只有一个参数。每个参数都有类型和名称。在这个例子中，类型是 `int[]`（方括号表示数组），名称是 `ints`。当有多个参数时，它们用逗号分隔，如下面来自
    `AverageTest` 类的方法声明所示：


    `private static String buildTestString(int[] values, float average, long time)
    {`


    花括号字符用于打开构成方法体的代码块。我们将在本章后面介绍代码块。


    方法也可以是静态的。对于方法，`static` 关键字意味着系统中只存在一个这样的方法，无论该类可能有多少个对象。因此，静态方法也被称为类方法。此外，该方法不能使用类的任何字段，除非这些字段本身已被声明为静态（通常是常量）。静态方法可以是一种便捷的方式，用于提供在整个代码中使用的工具方法。例如，一个接受日期并返回格式化字符串的方法可以是静态的，前提是它不需要使用其所在类的任何非静态方法。此外，静态方法可能稍微高效一些，因为它们不访问方法体之外的任何内容。


    ![images](img/square.jpg) **警告** 静态方法可能引发问题。假设你有两个线程，每个线程都在操作一个对象，而该对象的类定义中包含一个静态方法。如果两个类同时尝试访问该方法，就可能发生糟糕的情况。一方面，由于线程可能以错误的顺序运行，该方法修改的任何字段最终都可能得到错误的值。此外，静态方法只有一个实例（类本身），因此一个执行耗时操作的类可能会让第二个（以及第三个、第四个等）线程等待。

