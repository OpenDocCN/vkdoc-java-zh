    `        System.exit(0);`

    `      }`

    `    }`

    `  }`

    `}`


    As usual, the `ShootingGallery` class just sets up the window and handles clicks
    to the menu and the window''s controls (minimize and close, in this case). I disabled
    the resize control on the window, both because it simplified the math in the game
    and because it''s something you might want to know how to do someday. The following
    line removes the ability to resize the window:


    ***Listing 12-5.** Preventing Resizing*


    `    frame.setResizable(false);`


    I try to not restrict the user''s actions unless I have a good, user-friendly
    reason to do so. So I would not normally have removed the ability to resize the
    window. Again, though, I thought it would make a good example, and it simplified
    the programming a bit. Restricting the user''s actions to make your own life easier
    is poor practice though (it''s a form of intellectual laziness) – don''t do it
    unless you''re doing it just to show how it''s done.


    One last thing to note about the `ShootingGallery` class (and the game) is that
    it has no start or stop control. It just runs continuously without end. I left
    out a number of common features that you might expect in a game so that you can
    implement them yourself. I''ve added a list of those ideas near the end of the
    chapter.


