- fmt: "# Writing Your First Java Program\n\nTo write a program in Java, you need\
    \ the Java Development Kit (`JDK`). Strictly speaking, the `JDK` is all you need;\
    \ however, other tools can make writing a Java application easier. Most software\
    \ developers like to use an Integrated Development Environment (`IDE`). One of\
    \ the most popular IDEs is `Eclipse`. Fortunately, both the `JDK` and `Eclipse`\
    \ are free downloads. This chapter describes how to download and install both\
    \ products and how to set up your first Java project in `Eclipse`. By the end\
    \ of this chapter, you will have typed in and run your first Java program.\n\n\
    ## Installing the JDK\n\n`JDK` is a collection of programs that enables you to\
    \ write programs in Java. The two programs you'll use most are `javac.exe` and\
    \ `java.exe`. The `javac.exe` program is the compiler, which means it's the program\
    \ that turns code you can read (the code you write in Java) into code your computer\
    \ can read (the collection of 0s and 1s that a computer needs when it runs a program).\
    \ The `java.exe` program runs the programs that you write. After `javac.exe` compiles\
    \ them, `java.exe` starts them and manages all the things a program needs (a connection\
    \ to the operating system, handles for files, and a lot of other things). Because\
    \ you'll use `Eclipse` (which we discuss shortly), you don't need to run `javac.exe`\
    \ and `java.exe`. `Eclipse` does that for you. But it's handy to know what they\
    \ do, so that you can run programs directly from a command window when you want\
    \ to do so.\n\nBefore you can install it, you have to download it, of course.\
    \ To get the latest version of the `JDK`, follow these steps:\n\n1.  Open [`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\
    \ in a web browser.\n2.  Click the **Download JDK** button.\n3.  Follow the instructions\
    \ provided by the web site.\n4.  Run the installer and accept any defaults.\n\n\
    ![images](images/square.jpg) **Note** If you don't have administrator rights on\
    \ your computer, clear (that is, uncheck) the checkbox that lets you install the\
    \ program for all users. This enables you to still install the `JDK`. I would\
    \ provide more details, but the web site changes from time to time, so more detailed\
    \ instructions would probably be wrong (and confusing and irritating).\n\nYou\
    \ can put the `JDK` anywhere you'd put any other program. The default location\
    \ works just fine.\n\n## Installing Eclipse\n\n`Eclipse` is an `IDE`. Basically,\
    \ it provides a convenient tool for writing and testing your programs. Among other\
    \ things, it identifies your errors as you make them, which makes correcting them\
    \ much easier and faster than writing code in a text file and compiling it from\
    \ the command line. `Eclipse` also colors parts of your code. After you get used\
    \ to the color scheme (which happens very quickly), you'll be able to write code\
    \ more quickly.\n\nAgain, before you can install `Eclipse`, you have to download\
    \ it. To do so, follow these steps:\n\n1.  Open [`http://www.eclipse.org/downloads/`](http://www.eclipse.org/downloads/)\
    \ in a web browser.\n2.  Find the **Eclipse IDE for Java Developers** choice and\
    \ select the 32-bit version.\n\n    ![images](images/square.jpg) **Note** If you\
    \ have a 64-bit operating system, choose the 32-bit version of `Eclipse` anyway.\
    \ At the time of this writing, the 64-bit version of `Eclipse` has issues that\
    \ make Java development more difficult than it needs to be.\n\n3.  Follow the\
    \ instructions provided by the web site.\n4.  Run the installer and accept any\
    \ defaults.\n\nAgain, I would try to provide more detail, but the web site changes\
    \ from time to time, so more detailed instructions would probably be wrong (and\
    \ so confusing and irritating).\n\nYou can put `Eclipse` anywhere you'd put any\
    \ other program. Again, the default location works just fine.\n\n## Creating Your\
    \ First Project\n\nWhen you use `Eclipse`, you have to create a separate project\
    \ for each program. That way, `Eclipse` can keep the details of one program separate\
    \ from another. Each project consists of the source code files you write for your\
    \ program and, potentially, a number of other resources that you might attach\
    \ to a program. For example, you might include images and files that contain settings\
    \ to load at run time and many other possible items.\n\nAfter you've started `Eclipse`,\
    \ you can make a new project as follows:\n\n1.  From the **File** menu, select\
    \ **New**, and then select **Project**. The New Project window appears, as shown\
    \ in [Figure 1-1](#Chapter01.html#fig_1_1).\n\n    ![images](images/0101.jpg)\n\
    \n    ***Figure 1-1.** Eclipse's New Project window.*\n\n2.  In the New Project\
    \ window, double-click **Java Project**. The New Java Project window appears,\
    \ as shown in [Figure 1-2](#Chapter01.html#fig_1_2).\n\n    ![images](images/0102.jpg)\n\
    \n    ***Figure 1-2.** Eclipse's New Java Project window.*\n\n3.  Type `Hello`\
    \ in the **Project name** field.\n\n    ![images](images/square.jpg) **Note**\
    \ Be careful to pick meaningful names. I've chosen `Hello` for this example because\
    \ the first program we're going to write is one that says `Hello`. One common\
    \ mistake for new software developers is to choose names such as `Project1` and\
    \ `Project2`. It probably won't be long before you can't remember the details\
    \ of any of them. Instead, if you're writing a minesweeper game, call your project\
    \ `Minesweeper`. Then, when you're also working on an instant messaging program,\
    \ you can distinguish `Minesweeper` from `InstantMessenger` much more readily\
    \ than you can distinguish `Project1` from `Project2`.\n\n4.  Click **OK**. You\
    \ can change a number of other options here. However, for our purposes, the default\
    \ settings work just fine. You should now have a window that looks something like\
    \ the one in [Figure 1-3](#Chapter01.html#fig_1_3).\n\n    ![images](images/0103.jpg)\n\
    \n    ***Figure 1-3.** The main area of the Eclipse IDE.*"
  raw: "## Writing Your First Java Program\n\nTo write a program in Java, you need\
    \ the Java Development Kit (JDK). Strictly speaking, the JDK is all you need;\
    \ however, other tools can make writing a Java application easier. Most software\
    \ developers like to use an Integrated Development Environment (IDE). One of the\
    \ most popular IDEs is Eclipse. Fortunately, both the JDK and Eclipse are free\
    \ downloads. This chapter describes how to download and install both products\
    \ and how to set up your first Java project in Eclipse. By the end of this chapter,\
    \ you will have typed in and run your first Java program.\n\n### Installing the\
    \ JDK\n\nJDK is a collection of programs that enables you to write programs in\
    \ Java. The two programs you'll use most are javac.exe and java.exe. The javac.exe\
    \ program is the compiler, which means it's the program that turns code you can\
    \ read (the code you write in Java) into code your computer can read (the collection\
    \ of 0s and 1s that a computer needs when it runs a program). The java.exe program\
    \ runs the programs that you write. After javac.exe compiles them, java.exe starts\
    \ them and manages all the things a program needs (a connection to the operating\
    \ system, handles for files, and a lot of other things). Because you'll use Eclipse\
    \ (which we discuss shortly), you don't need to run javac.exe and java.exe. Eclipse\
    \ does that for you. But it's handy to know what they do, so that you can run\
    \ programs directly from a command window when you want to do so.\n\nBefore you\
    \ can install it, you have to download it, of course. To get the latest version\
    \ of the JDK, follow these steps:\n\n1.  Open [`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\
    \ in a web browser.\n2.  Click the **Download JDK** button.\n3.  Follow the instructions\
    \ provided by the web site.\n4.  Run the installer and accept any defaults.\n\n\
    ![images](images/square.jpg) **Note** If you don't have administrator rights on\
    \ your computer, clear (that is, uncheck) the checkbox that lets you install the\
    \ program for all users. This enables you to still install the JDK.I would provide\
    \ more details, but the web site changes from time to time, so more detailed instructions\
    \ would probably be wrong (and confusing and irritating).\n\nYou can put the JDK\
    \ anywhere you'd put any other program. The default location works just fine.\n\
    \n### Installing Eclipse\n\nEclipse is an IDE. Basically, it provides a convenient\
    \ tool for writing and testing your programs. Among other things, it identifies\
    \ your errors as you make them, which makes correcting them much easier and faster\
    \ than writing code in a text file and compiling it from the command line. Eclipse\
    \ also colors parts of your code. After you get used to the color scheme (which\
    \ happens very quickly), you'll be able to write code more quickly.\n\nAgain,\
    \ before you can install Eclipse, you have to download it. To do so, follow these\
    \ steps:\n\n1.  Open [`http://www.eclipse.org/downloads/`](http://www.eclipse.org/downloads/)\
    \ in a web browser.\n2.  Find the **Eclipse IDE for Java Developers** choice and\
    \ select the 32-bit version.\n\n    ![images](images/square.jpg) **Note** If you\
    \ have a 64-bit operating system, choose the 32-bit version of Eclipse anyway.\
    \ At the time of this writing, the 64-bit version of Eclipse has issues that make\
    \ Java development more difficult than it needs to be.\n\n3.  Follow the instructions\
    \ provided by the web site.\n4.  Run the installer and accept any defaults.\n\n\
    Again, I would try to provide more detail, but the web site changes from time\
    \ to time, so more detailed instructions would probably be wrong (and so confusing\
    \ and irritating).\n\nYou can put Eclipse anywhere you'd put any other program.\
    \ Again, the default location works just fine.\n\n### Creating Your First Project\n\
    \nWhen you use Eclipse, you have to create a separate project for each program.\
    \ That way, Eclipse can keep the details of one program separate from another.\
    \ Each project consists of the source code files you write for your program and,\
    \ potentially, a number of other resources that you might attach to a program.\
    \ For example, you might include images and files that contain settings to load\
    \ at run time and many other possible items.\n\nAfter you've started Eclipse,\
    \ you can make a new project as follows:\n\n1.  From the **File** menu, select\
    \ **New,** and then select **Project**. The New Project window appears, as shown\
    \ in [Figure 1-1](#Chapter01.html#fig_1_1).\n\n    ![images](images/0101.jpg)\n\
    \n    ***Figure 1-1.** Eclipse's New Project window.*\n\n2.  In the New Project\
    \ window, double-click **Java Project**. The New Java Project window appears,\
    \ as shown in [Figure 1-2](#Chapter01.html#fig_1_2).\n\n    ![images](images/0102.jpg)\n\
    \n    ***Figure 1-2.** Eclipse's New Java Project window.*\n\n3.  Type `Hello`\
    \ in the **Project name** field.\n\n    ![images](images/square.jpg) **Note**\
    \ Be careful to pick meaningful names. I've chosen `Hello` for this example because\
    \ the first program we're going to write is one that says `Hello`. One common\
    \ mistake for new software developers is to choose names such as `Project1` and\
    \ `Project2`. It probably won't be long before you can't remember the details\
    \ of any of them. Instead, if you're writing a minesweeper game, call your project\
    \ `Minesweeper`. Then, when you're also working on an instant messaging program,\
    \ you can distinguish `Minesweeper` from `InstantMessenger` much more readily\
    \ than you can distinguish `Project1` from `Project2`.\n\n4.  Click **OK**. You\
    \ can change a number of other options here. However, for our purposes, the default\
    \ settings work just fine. You should now have a window that looks something like\
    \ the one in [Figure 1-3](#Chapter01.html#fig_1_3).\n\n    ![images](images/0103.jpg)\n\
    \n    ***Figure 1-3.** The main area of the Eclipse IDE.*"
  trans: "\n## 编写你的第一个 Java 程序\n\n要用 Java 编写程序，你需要 Java 开发工具包（JDK）。严格来说，你只需要 JDK；不过，其他工具能让编写\
    \ Java 应用程序更轻松。大多数软件开发人员喜欢使用集成开发环境（IDE）。最流行的 IDE 之一是 Eclipse。幸运的是，JDK 和 Eclipse\
    \ 都是免费下载的。本章将介绍如何下载和安装这两款产品，以及如何在 Eclipse 中设置你的第一个 Java 项目。学完本章后，你将输入并运行你的第一个\
    \ Java 程序。\n\n### 安装 JDK\n\nJDK 是一组程序，让你能够用 Java 编写程序。你最常用的两个程序是 `javac.exe` 和\
    \ `java.exe`。`javac.exe` 程序是编译器，也就是说，它负责将你能读懂的代码（你用 Java 编写的代码）转换成计算机能读懂的代码（计算机运行程序时所需的\
    \ 0 和 1 集合）。`java.exe` 程序则负责运行你编写的程序。在 `javac.exe` 编译它们之后，`java.exe` 启动它们并管理程序所需的一切（与操作系统的连接、文件句柄以及许多其他内容）。因为你将使用\
    \ Eclipse（我们稍后会讨论），所以不需要手动运行 `javac.exe` 和 `java.exe`。Eclipse 会为你代劳。但了解它们的功能会很有用，这样当你想要时，可以直接从命令窗口运行程序。\n\
    \n当然，在安装之前，你必须先下载它。要获取最新版本的 JDK，请按照以下步骤操作：\n\n1.  在网页浏览器中打开 [`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)。\n\
    2.  点击 **下载 JDK** 按钮。\n3.  按照网站提供的说明进行操作。\n4.  运行安装程序并接受所有默认设置。\n\n![images](img/square.jpg)\
    \ **注意** 如果你在计算机上没有管理员权限，请清除（即取消勾选）允许为所有用户安装程序的复选框。这样你仍然可以安装 JDK。我本想提供更多细节，但网站会不时更改，因此更详细的说明很可能是错误的（而且会令人困惑和恼火）。\n\
    \n你可以将 JDK 放在你放置任何其他程序的任何位置。默认位置就很好。\n\n### 安装 Eclipse\n\nEclipse 是一个 IDE。基本上，它提供了一个方便的工具来编写和测试你的程序。除此之外，它还能在你犯错时立即识别错误，这使得纠正错误比在文本文件中编写代码并从命令行编译要容易和快速得多。Eclipse\
    \ 还会为你的代码的不同部分着色。一旦你习惯了这种配色方案（这很快就会发生），你就能更快地编写代码。\n\n同样，在安装 Eclipse 之前，你必须先下载它。为此，请按照以下步骤操作：\n\
    \n1.  在网页浏览器中打开 [`http://www.eclipse.org/downloads/`](http://www.eclipse.org/downloads/)。\n\
    2.  找到 **Eclipse IDE for Java Developers** 选项，并选择 32 位版本。\n\n    ![images](img/square.jpg)\
    \ **注意** 如果你使用的是 64 位操作系统，仍然选择 32 位版本的 Eclipse。在撰写本文时，64 位版本的 Eclipse 存在一些问题，使得\
    \ Java 开发比应有的更困难。\n\n3.  按照网站提供的说明进行操作。\n4.  运行安装程序并接受所有默认设置。\n\n同样，我本想提供更多细节，但网站会不时更改，因此更详细的说明很可能是错误的（而且会令人困惑和恼火）。\n\
    \n你可以将 Eclipse 放在你放置任何其他程序的任何位置。同样，默认位置就很好。\n\n### 创建你的第一个项目\n\n当你使用 Eclipse 时，你必须为每个程序创建一个单独的项目。这样，Eclipse\
    \ 就可以将一个程序的细节与另一个程序分开。每个项目包含你为程序编写的源代码文件，以及可能附加到程序的一些其他资源。例如，你可能包含图像、包含运行时加载设置的文件以及许多其他可能的项目。\n\
    \n启动 Eclipse 后，你可以按如下方式创建一个新项目：\n\n1.  从 **文件** 菜单中，选择 **新建**，然后选择 **项目**。此时会出现“新建项目”窗口，如\
    \ 图 1-1 所示。\n\n    ![images](img/0101.jpg)\n\n    ***图 1-1.** Eclipse 的“新建项目”窗口。*\n\
    \n2.  在“新建项目”窗口中，双击 **Java 项目**。此时会出现“新建 Java 项目”窗口，如 图 1-2 所示。\n\n    ![images](img/0102.jpg)\n\
    \n    ***图 1-2.** Eclipse 的“新建 Java 项目”窗口。*\n\n3.  在 **项目名称** 字段中输入 `Hello`。\n\
    \n    ![images](img/square.jpg) **注意** 注意选择有意义的名称。在这个例子中，我选择了 `Hello`，因为我们要编写的第一个程序是一个输出\
    \ `Hello` 的程序。软件开发新手常犯的一个错误是选择诸如 `Project1` 和 `Project2` 这样的名称。很可能过不了多久，你就记不清其中任何一个的细节了。相反，如果你在编写一个扫雷游戏，就将你的项目命名为\
    \ `Minesweeper`。这样，当你同时还在开发一个即时通讯程序时，区分 `Minesweeper` 和 `InstantMessenger` 要比区分\
    \ `Project1` 和 `Project2` 容易得多。\n\n4.  点击 **确定**。你可以在这里更改许多其他选项。不过，就我们的目的而言，默认设置就很好。现在你应该会看到一个类似于\
    \ 图 1-3 所示的窗口。\n\n    ![images](img/0103.jpg)\n\n    ***图 1-3.** Eclipse IDE 的主区域。*\n"
- fmt: "### Creating the Program\n\nEvery Java program has one class that is the program's\
    \ starting point (often called an entry point). A class is a bit of code that\
    \ groups other bits of code together in a particular way. We'll get to classes\
    \ in the next chapter. The thing that makes that class special is the existence\
    \ of the `main` method. A method is a bit of code that does one particular thing\
    \ – in this case, it starts the program. We'll cover methods in the next chapter,\
    \ too. The `main` method accepts inputs and starts the program. Every Java program\
    \ has one and only one `main` method.\n\n![images](images/square.jpg) **Note**\
    \ That said, some code bases actually have a number of `main` methods. They exist\
    \ so that classes can be tested individually. Strictly speaking, each one starts\
    \ a separate Java program, even though the people working on them might think\
    \ of them as just parts of the larger program. For our purposes, just remember\
    \ that a Java program must have a `main` method.\n\nThe class that contains the\
    \ `main` method determines the name of the program. The name of the program is\
    \ the name of that class. For example, the program we write later in this chapter\
    \ is called `Hello` because the class that holds its `main` method is named `Hello`.\
    \ (Of course, the marketing department can call it anything, but it's the `Hello`\
    \ program to Java and Java developers.) This naming arrangement happens because\
    \ of the way Java programs are started: The Java runtime engine requires the name\
    \ of a class that contains a `main` method.\n\n![images](images/square.jpg) **Note**\
    \ The file that holds a Java class must have exactly the same name as the Java\
    \ class. For example, the `Hello` class must be stored in a file named `Hello.java`.\
    \ If the file were named `hello.java`, it wouldn't work. A lowercase `h` is not\
    \ an uppercase `H`, and the Java compiler won't recognize that `hello.java` contains\
    \ the `Hello` class.\n\nTo create a class with a `main` method for your first\
    \ program, follow these steps:\n\n1.  Right-click the `Hello` project in the Eclipse\
    \ Package Explorer, choose **New**, and then choose **Class**. The New Java Class\
    \ window displays, as shown in [Figure 1-4](#Chapter01.html#fig_1_4).\n\n![images](images/0104.jpg)\n\
    \n***Figure 1-4.** Eclipse's New Java Class window.*\n\n2.  In the **Package**\
    \ field, type whatever you like for the package, but remember to use a name you\
    \ can remember and keep it separate from your other projects. A package is a way\
    \ to group classes together. For small projects, you don't need them. Large projects\
    \ would be impossible to manage without them, though. We'll cover classes in the\
    \ next chapter. In the **Name** field, type `Hello`. This is the name of your\
    \ class.\n3.  Check the checkbox that gives you a `main` method (`public static\
    \ void main (String args[])`). When you're done, you should have a class similar\
    \ to the one in [Listing 1-1](#Chapter01.html#list_1_1).\n    Remember that Java\
    \ is case-sensitive. `Hello` is not the same as `hello` to Java.\n\n***Listing\
    \ 1-1**: Preliminary Hello class*\n\n```\npackage com.bryantcs.examples.hello;\n\
    \npublic class Hello {\n\n  /**\n   * @param args\n   */\n  public static void\
    \ main(String[] args) {\n    // TODO Auto-generated method stub\n\n  }\n\n}\n\
    ```\n\n4.  Remove the comments. We don't need a comment (the lines that start\
    \ with `/*` and end with `*/` and the line that starts with `//`), and we're about\
    \ to fill in that autogenerated stub.\n5.  Within the `main` method, type: `System.out.println(\"\
    Hello, World!\");`\n\nYour class should now look similar to [Listing 1-2](#Chapter01.html#list_1_2).\n\
    \n***Listing 1-2**: Basic Hello program*\n\n```\npackage com.bryantcs.examples.hello;\n\
    \npublic class Hello {\n\n  public static void main(String[] args) {\n    System.out.println(\"\
    Hello, World!\");\n  }\n\n}\n```\n\nThat's a complete Java program. You can now\
    \ run your program by clicking the Run button in the toolbar or by choosing **Run**\
    \ from the **Run** menu. [Figure 1.5](#Chapter01.html#fig_1_5) shows where to\
    \ find the Run button.\n\n![images](images/0105.jpg)\n\n***Figure 1-5.** Where\
    \ to find the Run button.*\n\nEclipse then displays a console panel under the\
    \ code area that shows the output of your program. In this case, it says, “Hello,\
    \ World!” Writing a program that outputs “Hello, World!” is an old tradition,\
    \ by the way. If you tell experienced developers that you're at the “Hello, World!”\
    \ stage in learning how to program, they'll know that you've just taken your first\
    \ steps on the road to being a software developer. Most software developers remember\
    \ that day fondly.\n\nThe `String[] args` part is the mechanism that a Java program\
    \ uses to read in options (more properly called arguments) that you can give to\
    \ your program. The word `String` refers to a collection of characters that we\
    \ can treat as a single object. A name is a classic example of a string. The `[]`\
    \ indicates an array, which is a collection of values (strings in this case).\
    \ The collection (that is, the array) of strings is called `args`. We add the\
    \ capability to use an argument to our `Hello` program later in the chapter, we\
    \ cover arrays in the next chapter, and we cover strings in [Chapter 3](#Chapter03.html#ch3),\
    \ “Data Types.”\n\n### Adding More Functionality\n\nNow that you have a working\
    \ program, let's make it do more. Specifically, let's make it read in your name\
    \ and say hello to you rather than to the whole world.\n\nLook at the declaration\
    \ for the `main` method. The `args` array holds all the values that were provided\
    \ to the Java runtime engine when someone started your program. Often, these are\
    \ configuration settings of various types. One common practice is to pass in the\
    \ path to a file that contains more information (such as difficulty settings for\
    \ a game or the most recently opened files for a word processor)—that is, the\
    \ path to a configuration file. We read files later in the book. For now, we get\
    \ the arguments from Eclipse. First, though, we need to write the code to read\
    \ the arguments and put the first argument into our message. [Listing 1-3](#Chapter01.html#list_1_3)\
    \ shows how to do this.\n\n***Listing 1-3**: Reading arguments*\n\n```\npackage\
    \ com.apress.java7forabsolutebeginners;\n\npublic class Hello {\n\n  public static\
    \ void main(String[] args) {\n    System.out.println(\"Hello, \" + args[0] + \"\
    !\");\n  }\n\n}\n```\n\n![images](images/square.jpg) **Note** Computers start\
    \ counting at 0 rather than 1. Consequently, the first member of an array can\
    \ be found at 0. Typing `args[1]` here generates an out-of-bounds exception, by\
    \ which Java means that it expects to find two strings, but you provided only\
    \ one. You'll quickly get used to computers starting their counting at 0.\n\n\
    `System.out.println` accepts a single `String` object as its argument. In this\
    \ case, we've got three `String` objects, but the plus signs concatenate them\
    \ together to create a single string, satisfying the requirement (for just one\
    \ string) of the `println` method. The plus sign is Java's string concatenation\
    \ operator (in addition to being a plus sign when used for mathematical operations).\
    \ We cover operators in [Chapter 4](#Chapter04.html#ch4), “Operators.”\n\nTo provide\
    \ a value for the argument in Eclipse, follow these steps:\n\n1.  From the **Run**\
    \ menu, choose **Run Configurations**. The Run Configurations window appears.\
    \ [Figure 1.6](#Chapter01.html#fig_1_6) shows the Run Configurations window.\n\
    \n    ![images](images/0106.jpg)\n\n    ***Figure 1-6.** The Run Configurations\
    \ window.*\n\n2.  In the **Arguments** tab, type your name.\n3.  Click the **Run**\
    \ button.\n\nThis time, your program says hello to you.\n\nCongratulations. At\
    \ this point, you've created a program that does the basic things all programs\
    \ do: accepts input, modifies the input to accomplish something, and produces\
    \ output. It might not seem like much, but it's the first step on a fun path.\
    \ We do much more before we're done."
  raw: "### Creating the Program\n\nEvery Java program has one class that is the program's\
    \ starting point .(often called an entry point). A class is a bit of code that\
    \ groups other bits of code together in a particular way. We'll get to classes\
    \ in the next chapter. The thing that makes that class special is the existence\
    \ of the `main` method. A method is a bit of code that does one particular thing\
    \ – in this case, it starts the program. We'll cover methods in the next chapter,\
    \ too. The `main` method accepts inputs and starts the program. Ever Java program\
    \ has one and only one `main` method.\n\n![images](images/square.jpg) **Note**\
    \ That said, some code bases actually have a number of `main` methods. They exist\
    \ so that classes can be tested individually. Strictly speaking, each one starts\
    \ a separate Java program, even though the people working on them might think\
    \ of them as just parts of the larger program. For our purposes, just remember\
    \ that a Java program must have a `main` method.\n\nThe class that contains the\
    \ `main` method .determines the name of the program. The name of the program is\
    \ the name of that class. For example, the program we write later in this chapter\
    \ is called Hello because the class that holds its main method is named `Hello`.\
    \ (Of course, the marketing department can call it anything, but it's the `Hello`\
    \ program to Java and Java developers.) This naming arrangement happens because\
    \ of the way Java programs are started: The Java runtime engine requires the name\
    \ of a class that contains a `main` method.\n\n![images](images/square.jpg) **Note**\
    \ The file that holds a Java class must have exactly the same name as the Java\
    \ class. For example, the `Hello` class must be stored in a file named Hello.java.\
    \ If the file were named hello.java, it wouldn't work. A lowercase h is not an\
    \ uppercase H, and the Java compiler won't recognize that hello.java contains\
    \ the `Hello` class.\n\nTo create a class with a main method for your first program,\
    \ follow these steps:\n\n1.  Right-click the `Hello` project in the Eclipse Package\
    \ Explorer, choose **New**, and then choose **Class**. The New Java Class window\
    \ displays, as shown in [Figure 1-4](#Chapter01.html#fig_1_4).\n\n![images](images/0104.jpg)\n\
    \n***Figure 1-4.** Eclipse's New Java Class window.*\n\n2.  In the **Package**\
    \ field, type whatever you like for the package, but remember to use a name you\
    \ can remember and keep it separate from your other projects. A package is a way\
    \ to group classes together. For small projects, you don't need them. Large projects\
    \ would be impossible to manage without them, though. We'll cover classes in the\
    \ next chapterIn the **Name** field, type `Hello`. This is the name of your class.\n\
    3.  Check the checkbox that gives you a `main` method (`public static void main\
    \ (String args[]`)). When you're done, you should have a class similar to the\
    \ one in [Listing 1-1](#Chapter01.html#list_1_1).\n    Remember that Java is case-sensitive.\
    \ “Hello” is not the same as “hello” to Java.\n\n***Listing 1-1**: Preliminary\
    \ Hello class*\n\n`package com.bryantcs.examples.hello;`\n\n`public class Hello\
    \ {`\n\n`  /**`\n    `   * @param args`\n    `   */`\n    `  public static void\
    \ main(String[] args) {`\n    `    // TODO Auto-generated method stub`\n\n`  }`\n\
    \n`}`\n4.  Remove the comments. We don't need a comment (the lines that start\
    \ with /* and end with /* and the line that starts with //), and we're about to\
    \ fill in that autogenerated stub.\n5.  Within the `main` method, type: `System.out.println(\"\
    Hello, World!\");`\n\nYour class should now look similar to [Listing 1-2](#Chapter01.html#list_1_2).\n\
    \n***Listing 1-2**: Basic Hello program*\n\n`package com.bryantcs.examples.hello;`\n\
    \n`public class Hello {`\n\n`  public static void main(String[] args) {`\n`    System.out.println(\"\
    Hello, World!\");`\n`  }`\n\n`}`\n\nThat's a complete Java program. You can now\
    \ run your program by clicking the Run button in the toolbar or by choosing **Run**\
    \ from the **Run** menu. [Figure 1.5](#Chapter01.html#fig_1_5) shows where to\
    \ find the Run button.\n\n![images](images/0105.jpg)\n\n***Figure 1-5.** Where\
    \ to find the Run button.*\n\nEclipse then displays a console panel under the\
    \ code area that shows the output of your program. In this case, it says, “Hello,\
    \ World!” Writing a program that outputs “Hello, World!” is an old tradition,\
    \ by the way. If you tell experienced developers that you're at the “Hello, World!”\
    \ stage in learning how to program, they'll know that you've just taken your first\
    \ steps on the road to being a software developer. Most software developers remember\
    \ that day fondly.\n\nThe String[] args part is the mechanism that a Java program\
    \ uses to read in options (more properly called arguments) that you can give to\
    \ your program. The word String refers to a collection of characters that we can\
    \ treat as a single object. A name is a classic example of a string. The [] indicates\
    \ an array, which is a collection of values (strings in this case). The collection\
    \ (that is, the array) of strings is called args. We add the capability to use\
    \ an argument to our Hello program later in the chapter, we cover arrays in the\
    \ next chapter, and we cover strings in [Chapter 3](#Chapter03.html#ch3), “Data\
    \ Types.”\n\n#### Adding More Functionality\n\nNow that you have a working program,\
    \ let's make it do more. Specifically, let's make it read in your name and say\
    \ hello to you rather than to the whole world.\n\nLook at the declaration for\
    \ the `main` method. The `args` array holds all the values that were provided\
    \ to the Java runtime engine when someone started your program. Often, these are\
    \ configuration settings of various types. One common practice is to pass in the\
    \ path to a file that contains more information (such as difficulty settings for\
    \ a game or the most recently opened files for a word processor)—that is, the\
    \ path to a configuration file. We read files later in the book. For now, we get\
    \ the arguments from Eclipse. First, though, we need to write the code to read\
    \ the arguments and put the first argument into our message. [Listing 1-3](#Chapter01.html#list_1_3)\
    \ shows how to do this.\n\n***Listing 1-3**: Reading arguments*\n\n`package com.apress.java7forabsolutebeginners;`\n\
    \n`public class Hello {`\n\n`  public static void main(String[] args) {`\n**`System.out.println(\"\
    Hello, \" + args[0] + \"!\");`**\n`  }`\n\n`}`\n\n![images](images/square.jpg)\
    \ **Note** Computers start counting at 0 rather than 1\\. Consequently, the first\
    \ member of an array can be found at 0\\. Typing `args[1]` here generates an out-of-bounds\
    \ exception, by which Java means that it expects to find two strings, but you\
    \ provided only one. You'll quickly get used to computers starting their counting\
    \ at 0.\n\n`System.out.println` accepts a single `String` object as its argument.\
    \ In this case, we've got three `String` objects, but the plus signs concatenate\
    \ them together to create a single string, satisfying the requirement (for just\
    \ one string) of the `println` method. The plus sign is Java's string concatenation\
    \ operator (in addition to being a plus sign when used for mathematical operations).\
    \ We cover operators in [Chapter 4](#Chapter04.html#ch4), “Operators.”\n\nTo provide\
    \ a value for the argument in Eclipse, follow these steps:\n\n1.  From the **Run**\
    \ menu, choose **Run Configurations**. The Run Configurations window appears.\
    \ [Figure 1.6](#Chapter01.html#fig_1_6) shows the Run Configurations window.\n\
    \n    ![images](images/0106.jpg)\n\n    ***Figure 1-6.** The Run Configurations\
    \ window.*\n\n2.  In the **Arguments** tab, type your name.\n3.  Click the **Run**\
    \ button.\n\nThis time, your program says hello to you.\n\nCongratulations. At\
    \ this point, you've created a program that does the basic things all programs\
    \ do: accepts input, modifies the input to accomplish something, and produces\
    \ output. It might not seem like much, but it's the first step on a fun path.\
    \ We do much more before we're done."
  trans: "\n### 创建程序\n\n每个 Java 程序都有一个作为程序起点的类（通常称为入口点）。类是一段代码，它以特定方式将其他代码片段组合在一起。我们将在下一章中介绍类。使该类特殊的是\
    \ `main` 方法的存在。方法是一段执行特定功能的代码——在这里，它启动程序。我们也会在下一章中介绍方法。`main` 方法接受输入并启动程序。每个 Java\
    \ 程序有且只有一个 `main` 方法。\n\n![images](img/square.jpg) **注意** 话虽如此，某些代码库实际上包含多个 `main`\
    \ 方法。它们的存在是为了能够单独测试各个类。严格来说，每个 `main` 方法都会启动一个独立的 Java 程序，即使开发人员可能认为它们只是更大程序的一部分。就我们而言，只需记住\
    \ Java 程序必须有一个 `main` 方法。\n\n包含 `main` 方法的类决定了程序的名称。程序的名称就是该类的名称。例如，我们在本章后面编写的程序叫做\
    \ Hello，因为包含其 main 方法的类名为 `Hello`。（当然，市场部门可以给它起任何名字，但对于 Java 和 Java 开发者来说，它就是\
    \ `Hello` 程序。）这种命名方式源于 Java 程序的启动方式：Java 运行时引擎需要一个包含 `main` 方法的类的名称。\n\n![images](img/square.jpg)\
    \ **注意** 保存 Java 类的文件必须与该 Java 类具有完全相同的名称。例如，`Hello` 类必须存储在名为 Hello.java 的文件中。如果文件名为\
    \ hello.java，它将无法工作。小写 h 与大写 H 不同，Java 编译器无法识别 hello.java 包含 `Hello` 类。\n\n要为你的第一个程序创建一个包含\
    \ main 方法的类，请遵循以下步骤：\n\n1.  在 Eclipse 的包资源管理器中右键单击 `Hello` 项目，选择 **New**，然后选择\
    \ **Class**。将显示“新建 Java 类”窗口，如图 1-4 所示。\n\n![images](img/0104.jpg)\n\n***图 1-4.**\
    \ Eclipse 的“新建 Java 类”窗口。*\n\n2.  在 **Package** 字段中，输入你喜欢的任何包名，但请记住使用一个你能记住的名称，并使其与其他项目分开。包是一种将类分组的方式。对于小型项目，你不需要它们。然而，没有包，大型项目将无法管理。我们将在下一章中介绍类。在\
    \ **Name** 字段中，输入 `Hello`。这是你的类的名称。\n3.  勾选为你提供 `main` 方法（`public static void\
    \ main (String args[])`）的复选框。完成后，你应该得到一个类似于清单 1-1 中的类。\n    请记住 Java 是区分大小写的。对于\
    \ Java 来说，“Hello”与“hello”是不同的。\n\n***清单 1-1**：初步的 Hello 类*\n\n`package com.bryantcs.examples.hello;`\n\
    \n`public class Hello {`\n\n`  /**`\n    `   * @param args`\n    `   */`\n   \
    \ `  public static void main(String[] args) {`\n    `    // TODO 自动生成的方法存根`\n\n\
    `  }`\n\n`}`\n4.  删除注释。我们不需要注释（以 /* 开头并以 */ 结尾的行，以及以 // 开头的行），并且我们即将填充那个自动生成的存根。\n\
    5.  在 `main` 方法内部，输入：`System.out.println(\"Hello, World!\");`\n\n你的类现在应该类似于清单\
    \ 1-2。\n\n***清单 1-2**：基本的 Hello 程序*\n\n`package com.bryantcs.examples.hello;`\n\
    \n`public class Hello {`\n\n`  public static void main(String[] args) {`\n`    System.out.println(\"\
    Hello, World!\");`\n`  }`\n\n`}`\n\n这是一个完整的 Java 程序。你现在可以通过单击工具栏中的“运行”按钮或从 **Run**\
    \ 菜单中选择 **Run** 来运行你的程序。图 1.5 显示了“运行”按钮的位置。\n\n![images](img/0105.jpg)\n\n***图\
    \ 1-5.** “运行”按钮的位置。*\n\n然后，Eclipse 会在代码区域下方显示一个控制台面板，其中显示程序的输出。在本例中，它会显示“Hello,\
    \ World!”。顺便说一句，编写一个输出“Hello, World!”的程序是一个古老的传统。如果你告诉有经验的开发者你正处于学习编程的“Hello,\
    \ World!”阶段，他们就会知道你刚刚踏上了成为软件开发者的道路。大多数软件开发者都深情地记得那一天。\n\n`String[] args` 部分是 Java\
    \ 程序用来读取你可以提供给程序的选项（更准确地说是参数）的机制。`String` 一词指的是我们可以将其视为单个对象的字符集合。名字是字符串的典型例子。`[]`\
    \ 表示一个数组，它是一个值的集合（在这里是字符串）。这个字符串集合（即数组）被称为 `args`。我们将在本章后面为 Hello 程序添加使用参数的功能，在下一章中介绍数组，并在第\
    \ 3 章“数据类型”中介绍字符串。\n\n#### 添加更多功能\n\n既然你已经有了一个可以运行的程序，让我们让它做更多的事情。具体来说，让它读取你的名字并向你问好，而不是向全世界问好。\n\
    \n查看 `main` 方法的声明。`args` 数组保存了当有人启动你的程序时提供给 Java 运行时引擎的所有值。通常，这些是各种类型的配置设置。一种常见的做法是传入一个包含更多信息的文件路径（例如游戏的难度设置或文字处理器最近打开的文件）——即配置文件的路径。我们将在本书后面介绍如何读取文件。现在，我们从\
    \ Eclipse 获取参数。不过，首先，我们需要编写代码来读取参数并将第一个参数放入我们的消息中。清单 1-3 展示了如何做到这一点。\n\n***清单\
    \ 1-3**：读取参数*\n\n`package com.apress.java7forabsolutebeginners;`\n\n`public class\
    \ Hello {`\n\n`  public static void main(String[] args) {`\n**`System.out.println(\"\
    Hello, \" + args[0] + \"!\");`**\n`  }`\n\n`}`\n\n![images](img/square.jpg) **注意**\
    \ 计算机从 0 开始计数，而不是从 1 开始。因此，数组的第一个成员位于索引 0 处。在这里输入 `args[1]` 会生成一个越界异常，Java 通过这个异常表示它期望找到两个字符串，但你只提供了一个。你会很快习惯计算机从\
    \ 0 开始计数的。\n\n`System.out.println` 接受一个 `String` 对象作为其参数。在本例中，我们有三个 `String` 对象，但加号将它们连接在一起以创建一个单独的字符串，从而满足了\
    \ `println` 方法（只需要一个字符串）的要求。加号是 Java 的字符串连接运算符（除了在数学运算中用作加号之外）。我们将在第 4 章“运算符”中介绍运算符。\n\
    \n要在 Eclipse 中为参数提供一个值，请遵循以下步骤：\n\n1.  从 **Run** 菜单中选择 **Run Configurations**。将出现“运行配置”窗口。图\
    \ 1.6 显示了“运行配置”窗口。\n\n    ![images](img/0106.jpg)\n\n    ***图 1-6.** “运行配置”窗口。*\n\
    \n2.  在 **Arguments** 选项卡中，输入你的名字。\n3.  单击 **Run** 按钮。\n\n这次，你的程序会向你问好。\n\n恭喜你。至此，你已经创建了一个完成所有程序基本功能的程序：接受输入、修改输入以完成某些任务，并产生输出。这看起来可能不算什么，但这是踏上一条有趣道路的第一步。在完成本书之前，我们还会做更多的事情。\n"
- fmt: "#### Further Development\n\nJust for fun, let's tack on a bit more functionality.\
    \ When programs generate console output, they often include the date and time.\
    \ Formatting a date takes more code than most people would expect until they've\
    \ had to do it. That's because the real world has so many different date formats.\
    \ In the United States, month/day/year (MDY) format prevails. In Europe, day/month/year\
    \ (DMY) prevails. In addition to the date formats used by people, computer systems\
    \ also have various ways of representing dates, from simple variations such as\
    \ year/month/day (YMD) to far more arcane arrangements. Java, having inherited\
    \ from C, uses the same date storage technique as C and Unix (which was originally\
    \ coded mostly in C) and Linux (which shares much with Unix). Consequently, Java\
    \ stores dates as the number of seconds since January 1, 1970. In more detailed\
    \ and technical terms, Java's “epoch” started at January 1, 1970, 00:00:00 GMT.\n\
    \nSo, how do we turn the number of seconds since 1970 into a nicely formatted\
    \ time stamp for our output? [Listing 1-4](#Chapter01.html#list_1_4) shows one\
    \ way. (Part of both the joy and the pain of software development is that there's\
    \ almost always more than one way to do something.) I explain more about the new\
    \ pieces of code in the next section.\n\n***Listing 1-4**: Adding a timestamp\
    \ to Hello*\n\n```\npackage com.apress.java7forabsolutebeginners;\n\nimport java.text.SimpleDateFormat;\n\
    import java.util.Date;\n\npublic class Hello {\n\n  public static void main(String[]\
    \ args) {\n    // First, get the date as seconds since 1/1/1970\n    // Note that\
    \ a Date object also contains time information\n    Date now = new Date();\n \
    \   // Second, create a formatter object\n    SimpleDateFormat formatter =\n \
    \     new SimpleDateFormat(\"EEE, MMM dd, yyyy HH:mm:ss\");\n    // Third, apply\
    \ the formatter to the date\n    String formattedDate = formatter.format(now);\n\
    \    // Finally, add our formatted date to our output\n    System.out.println(formattedDate\
    \ + \"> Hello, \" + args[0] + \"!\");\n  }\n\n}\n```\n\nWhen you run this program,\
    \ you'll see a date and time stamp before your other output.\n\n#### About Java\
    \ Objects\n\nNotice how we had to use two kinds of objects (`Date` and `SimpleDateFormat`)\
    \ to create a nicely formatted date. `Date` and `SimpleDateFormat` are defined\
    \ by class files, just as your `Hello` program is defined by a class file. We\
    \ told our Java program where to find those classes with the `import` statement\
    \ near the top of the file. Your program cannot run without them, so we have to\
    \ tell Java where to find them.\n\nFor any class or other bit of code that's part\
    \ of the Java standard libraries, you can learn all about it from the Javadoc\
    \ that Oracle maintains for each version of Java. Javadoc is a special document\
    \ format that lets Java programmers embed documentation directly into code. That\
    \ way, you can look at the documentation for classes you want to use as you program\
    \ your own classes. As you do more programming, you'll spend a lot of time reading\
    \ this documentation. As a good learning exercise, look up the `SimpleDateFormat`\
    \ class and look at all the options you can use when formatting a date.\n\nFor\
    \ Java 7, you can find the API (short for Application Programming Interface) documentation\
    \ at [http://download.oracle.com/javase/7/docs/api/](http://download.oracle.com/javase/7/docs/api/).\n\
    \n![images](images/square.jpg) **Note** Eclipse provides the Javadoc information\
    \ for items in the standard API. Hover your mouse over any method or object that\
    \ you're using, and you'll see the Javadoc information for that item. When you\
    \ see the Javadoc, press **F2** to open a separate window that lets you see more.\n\
    \n### Summary\n\nIn this chapter, we did the following tasks:\n\n*   Downloaded\
    \ and installed the Java Development Kit\n*   Downloaded and installed Eclipse,\
    \ which we use to write Java programs\n*   Created the code for our first program\
    \ within Eclipse\n*   Ran our first program (“Hello, world!”)\n*   Modified the\
    \ first program to do a bit more (say hello to you specifically)\n*   Modified\
    \ the program still more (to include the date and time)\n*   Learned where to\
    \ find more information about the other code used in future programs\n\nMany of\
    \ these tasks constitute the day-to-day work of full-time software developers.\
    \ We spend a lot of time (more than we'd like, usually) setting up tools. We also\
    \ spend most of our time either writing new classes or (far more often) rewriting\
    \ existing classes, either to add new functionality or to correct a problem. We\
    \ also certainly spend plenty of time reading documentation or wishing we had\
    \ more documentation to read.\n\nI guarantee that you'll find yourself returning\
    \ to these tasks many, many times if you stick with software development, whether\
    \ as a hobby or as a profession. You'll also do some of these tasks (especially\
    \ writing and modifying code) as you work your way through this book. I hope you\
    \ find it to be fun. I usually do.\n\n## C H A P T E R  2\n\n## Java Syntax\n\n\
    The syntax of any language is the rules that any speaker of the language follows\
    \ so that other speakers of that language can understand. In other words, syntax\
    \ is a set of rules that all the speakers of a language agree to follow so that\
    \ they can communicate. If you violate the rules, people listening to you are\
    \ either going to ask, “Huh? What?” or think you're being silly (which might be\
    \ appropriate in some settings but will often cause a problem).\n\nComputer languages\
    \ work in much the same way, except that they're never spoken (though I won't\
    \ be surprised to see, or should I say hear, oral programming languages someday).\
    \ If you decide to do your own thing, don't be surprised when your computer doesn't\
    \ do what you had in mind. If you fail to code clearly and follow the rules of\
    \ your programming language, all you'll get is confusion, though your computer\
    \ will generate error messages rather than say, “Huh? What?”\n\nJava gets most\
    \ of its syntax from another language called C++. C++ in turn gets most of its\
    \ syntax from C. And C was influenced by other languages. The people who created\
    \ Java chose C++ as the basis for Java's syntax because C++ was one of the most\
    \ widely used languages at the time, and that gave many developers some familiarity\
    \ with Java syntax. Java's success (it's now widely used) depends on many factors,\
    \ but adopting an already widely known syntax certainly didn't hurt."
