  trans: '

    请注意，现在我们有了参数嵌套参数的情况（在 `LinkedList<GenericRole<String, String>> roleMap` 中）。当一个参数化（即泛型）集合本身包含具有参数的对象类型时，就会得到嵌套的泛型说明符。这看起来可能有些奇怪，但一旦开始使用泛型，这就会成为常见做法。


    你还可以指定一个集合可以包含多种对象，前提是这些对象都继承自同一个类或实现同一个接口。为此，Java 包含一个通配符（以问号字符的形式），你可以将其与泛型说明符一起使用。例如，请参考清单
    15-5。


    ***清单 15-5.** 使用泛型通配符*


    `LinkedList<? extends JPanel> panels = new LinkedList<>();`


    这个声明表示任何继承自 `JPanel` 的类都可以成为该列表的成员。还记得我在关于动画、视频游戏和递归的章节中多次继承 `JPanel` 吗？如果我需要一个单一的列表来容纳这些不同的面板，上面的列表就能很好地完成这项工作。


    `extends` 关键字同样适用于接口。因此，如果我想要一个包含实现 `MouseListener` 接口的类的列表，我可以使用清单 15-6 中所示的声明。


    ***清单 15-6.** 针对接口的泛型*


    `LinkedList<? extends MouseListener> mouseListeners = new LinkedList<>();`


    ***清单 15-7.** 使用 `Super` 关键字的泛型*


    `LinkedList<? super JPanel> panelAncestors = new LinkedList<>();`


    `super` 关键字指定任何被 `JPanel` 类扩展的对象都可以成为该列表的成员。对于这个列表来说，那将是 `javax.swing.JComponent`
    类型的对象。当你希望确保满足参数的对象是可比较的（以便它们可以被排序）时，`super` 关键字可能最为有用。根据我的经验，它并不常用，所以我就不再深入探讨了。


    既然我们已经了解了泛型的语法，接下来谈谈为什么要使用它们。最大的好处是更早地检测错误。在软件开发（以及许多其他行业）中，有一个公认的道理：越早发现错误，修复成本就越低。如果我们在编码时就能发现错误，修复它只需重写我们正在处理的代码即可；成本微不足道。如果错误到了测试人员那里（假设我们有测试人员——并非所有软件公司都有测试团队），成本就会更高。测试团队必须找到它并告知开发人员，开发人员（可能已经转向其他任务）必须重新打开并修改那段代码，然后测试团队必须验证修复后的代码是否正确运行。最糟糕的结果是错误一直传到客户那里；我们不仅要承担与测试团队和客户沟通的额外成本，还要承担（通常更重要的）客户因此对我们软件和公司评价降低的代价。所以，让我们采用包括泛型在内的技术，尽早捕获错误。


    清单 15-9 和清单 15-10 展示了为什么泛型能促进早期错误检测。


    ***清单 15-8.** 普通列表*


    `List integerList = new LinkedList();`

    `integerList.add(new Integer(0));`

    `integerList.add("这里有个问题"); // 完全合法但大错特错`


    在清单 15-9 中，`integerList` 可以包含任何对象。我可以将 `String` 类型的对象传入该列表。名称只是名称，虽然它揭示了意图（这是好习惯），但它并不能防止有人将
    `Integer` 类型以外的对象传入列表。因此，当有人确实传入了非 `Integer` 对象时，当我们试图从该列表中取出 `Integer` 对象时，就会遇到运行时错误。


    那么，让我们看看泛型如何防止测试人员，或者更糟的是，防止客户看到我们的错误。


    ***清单 15-9.** 泛型列表*


    `List<Integer> integerList = new LinkedList<Integer>();`

    `integerList.add(new Integer(0));`

    `integerList.add("这里有个问题");`


    第二个示例中 `List` 声明上的泛型表达式（或参数）指定该列表只能包含 `Integer` 对象。`Integer` 参数阻止任何人将 `String`
    对象（或除 `Integer` 对象之外的任何东西）传递给 `integerList`。当其他程序员试图向 `integerList` 添加非 `Integer`
    类型的对象时，他们会遇到编译错误。他们的代码无法编译，客户也绝无可能看到错误，因为某个粗心的程序员混淆了 `String` 和 `Integer`。图 15-1
    显示了我尝试时 Eclipse 产生的错误。


    ![images](img/1501.jpg)


    ***图 15-1.** 因误用泛型列表而产生的类型匹配错误*


    注意它如何指出 `add` 方法的正确参数是 `Integer` 对象。实际上，`List` 接口并没有这样的方法。然而，Eclipse 编译器创建了一个具有该方法的
    `LinkedList` 类的实例。因此，没有人能编译违反我们泛型列表意图的代码。这防止了所有可能在运行时出现的问题，并防止我们的同事、测试人员，以及最终我们的客户认为我们一定是白痴。


    就个人而言，我还发现这类代码更容易阅读和编写。类型转换对我来说总是感觉像是一种杂乱。作为一个纯粹主义者，我更倾向于一开始就拥有正确的类型，而不需要强制转换。


    最后，确保你的集合只包含你期望的类型是防御性编程的一个方面（每个程序员都应该采用的另一个好习惯）。如果你确保没有其他程序员（包括未来的你自己）能将错误的值传递给你的代码，你就为你的用户减少了麻烦。这是一项吃力不讨好的任务，因为没有人（除了你的同事可能）会意识到你做了这件事，但这仍然是个好主意。如果你愿意以更积极的方式看待它，可以将其视为确保使用你代码的开发人员更有可能编写出无错误的代码。我的一位同事（Matt
    Hinze，他在不编码时也写关于 MVC 的书）称之为“将我们的客户推入成功的深渊”。无论你怎么表述，限制错误潜入系统的可能性都是优秀软件开发实践的典范。

    '
- fmt: "### Regular Expressions\n\nIf you've ever worked with files from the command\
    \ line on your computer, you may very well have used a regular expression without\
    \ realizing it. For example, I recently wanted a list of all the HTML files in\
    \ a directory (on a Windows 7 system). In a command window, I typed `dir *.htm`\
    \ and got the list I wanted. `*.htm` is in fact a regular expression that means\
    \ all the files with an extension of `htm`. Suppose I had wanted all the HTML\
    \ files with names that start with “s”. The command would have been `dir s*.htm`.\
    \ Regular expressions in Java work in much the same way, except that you can specify\
    \ much more complex patterns.\n\nThe Java regular expression package is `java.util.regex`.\
    \ It contains the `MatchResult` interface, the `Matcher` class (which implements\
    \ the `MatchResult` interface), the `Pattern` class, and the `PatternSyntaxException`\
    \ class. You can't directly instantiate the `Matcher` and `Pattern` classes, as\
    \ they have no public constructors. In other words, `new Matcher` and `new Pattern`\
    \ don't work. Instead, the pattern for using them is to get a `Pattern` object\
    \ by calling one of the `compile` methods within the `Pattern` class. Then you\
    \ get a `Matcher` object by calling the `matcher` method within the `Pattern`\
    \ class. Finally, to find the substrings that match your pattern, you call the\
    \ `find` method within the `Matcher` class. Let's create a class that will let\
    \ us experiment with the `Pattern` and `Matcher` classes. Listing 15-11 shows\
    \ one possible implementation of such a class.\n\n**Listing 15-10.** `RegexTester`\
    \ Class\n\n```\npackage com.bryantcs.examples;\n\nimport java.util.regex.Matcher;\n\
    import java.util.regex.Pattern;\n\npublic class RegexTester {\n\n  public static\
    \ void main(String[] args) {\n    Pattern pattern = Pattern.compile(args[0]);\n\
    \    Matcher matcher = pattern.matcher(args[1]);\n    while(matcher.find()) {\n\
    \      String groupText = matcher.group();\n      int matchBegin = matcher.start();\n\
    \      int matchEnd  = matcher.end();\n      StringBuilder sb = new StringBuilder(\"\
    Found a match for \");\n      sb.append(groupText);\n      sb.append(\" beginning\
    \ at \");\n      sb.append(matchBegin);\n      sb.append(\" and ending at \");\n\
    \      sb.append(matchEnd);\n      System.out.println(sb);\n    }\n  }\n}\n```\n\
    \n`matcher.group()` gives us the text being matched (that's essentially the result\
    \ of the pattern we specify in the second argument). `matcher.start()` gives us\
    \ the starting position of the matched string within the input string (the first\
    \ argument). `matcher.end()` gives us the ending position of the matched string.\
    \ I used a `StringBuilder` object to avoid a really long line, which is awkward\
    \ to read in a book. I often use `StringBuilder` objects within my production\
    \ code, too, for the sake of performance (the concatenation operator is the worst\
    \ way to create a `String` object).\n\nBefore we plunge into the syntax of regular\
    \ expressions, let's cover how to pass values to the `RegexTester` program. In\
    \ doing so, we'll also run it for the first time. To set up arguments for `RegexTester`,\
    \ follow these steps.\n\n1.  From the **Run** menu, choose **Run Configurations**.\
    \ The Run Configurations window appears, as shown in [Figure 15-2](#Chapter15.html#fig_15_2).\n\
    \n![images](images/1502.jpg)\n\n**Figure 15-2.** Run configurations for `RegexTester`\n\
    \n2.  In the right pane, click the **Arguments** tab. The Arguments tab appears,\
    \ as shown in [Figure 15-3](#Chapter15.html#fig_15_3).\n\n![images](images/1503.jpg)\n\
    \n**Figure 15-3.** Empty parameters for `RegexTester`\n\n3.  To set up our first\
    \ test data, type the following text (including the quotation marks) into the\
    \ **Program arguments:** field:\n\n```\n\"Sam\" \"Sam Spade;Yosemite Sam;Sam Merlotte;Samwise\
    \ Gamgee;\"\n```\n\nWhen you're done typing, the window should look like the window\
    \ shown in [Figure 15-4](#Chapter15.html#fig_15_4).\n\n![images](images/1504.jpg)\n\
