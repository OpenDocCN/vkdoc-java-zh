    #### 静态成员


    类可以拥有*静态成员*，包括字段、方法以及其他类（类中的类称为*内部类*）。类的静态成员通常被称为*类成员*。关于类成员，需要了解的重要一点是：该成员永远只存在一个实例。如果我们的
    `Cat` 类有一个静态方法，我们可能会有十个不同的 `Cat` 类实例，但该静态方法始终只有一个。当 `Cat` 类的每个成员都想使用该方法时，这就成了问题。这些实例最终会相互等待。


    不过，静态成员也有其用途。当你希望确保某个特定类的所有实例化对象中，只有唯一一个某事物存在时，`static` 关键字就是实现方式。`static` 关键字的一个明显用途是在
    `main` 方法上。想象一下，如果程序类的每个实例都能启动一个新程序，我们很快就会用程序淹没操作系统。静态成员一个更常见且有用的用途是实现计数器。假设我们要跟踪创建了多少个
    `Cat` 对象。那么 `Cat` 类可以包含一个名为 `numberOfCats` 的静态字段，并且该类的构造函数会在每次创建 `Cat` 对象时递增该字段。这段代码看起来就像清单
    6-4 中的 `Cat` 类。


    ***清单 6-4.** 计数 `Cat` 对象*


    `class Cat extends Mammal{`


    `  static int numberOfCats;`


    `  Cat() {`

    `    numberOfCats++;`

    `  }`

    `}`


    要获取 `Cat` 对象的数量，我们可以实现一个方法来返回值，或者直接引用该字段并获取其值。要引用静态成员，我们使用类名，后跟句点，再跟静态成员名，如清单
    6-5 所示。


    ***清单 6-5** 引用静态成员*


    `System.out.println(Cat.numberOfCats);`


    然而，我们通常应该更倾向于将静态字段设为私有，并创建一个 get 方法来返回该值。否则，我们会将该字段暴露给其他类进行设置，这很可能是一个 bug。清单 6-6
    展示了修改后的 `Cat` 类，它使用了私有字段模式（模式是计算机科学中常见的惯用法——有很多种模式，如果你从事编程工作，它们是非常值得研究的东西）。


    ***清单 6-6**. 带有私有静态字段的 Cat 类*


    `class Cat extends Mammal{`


    `  private static int numberOfCats;`


    `  Cat() {`

    `    numberOfCats++;`

    `  }`


    `  public static final int getNumberOfCats() {`

    `    return numberOfCats;`

    `  }`

    `}`


    你注意到这个方法也是静态的吗？无论我们创建多少个 `Cat` 对象，都只需要一个这样的方法，因此将 `getNumberOfCats` 设为静态是合理的。我们还将其设为
    `final`，因为子类没有理由实现自己的 `getNumberOfCats` 方法。因此，如果我们有扩展 `Cat` 类的 `Tiger` 和 `Lion`
    类，除非这些方法有不同的参数，否则它们不能拥有 `getNumberOfCats` 方法。


    ### 多态


    *多态*（Polymorphism）源自希腊语 poly（意为“多”）和 morph（意为“形态”），意指同一事物可以具有不同的形态。这是许多领域（包括化学、生物学，当然还有计算机科学）中的一个技术术语。每个领域都根据其研究范畴来定义该术语，但归根结底都是指具有多种形态。


    在面向对象的计算机语言中，多态的一种形式是不同类能够对相同的输入做出适当的响应。因此，我们的 `Mammal` 类可能会定义一个 `speak` 方法。`Cat`
    类会将 speak 方法实现为喵喵叫，狗实现为汪汪叫，老鼠实现为吱吱叫。它们都实现了相同的方法，但各自以适当的方式实现。这些方法被称为被重写。子类中的方法用自己的行为替换了父类的行为——也就是说，它们重写了父类的方法。


    另一种多态（称为*重载*）是指相同的行为根据传递给该行为（或方法）的对象而具有不同的含义。例如，我们的 Cat 对象可能有两个名为 chase 的方法，`Cat`
    的实例对于 `chase(Tail)` 方法和 `chase(Mouse)` 方法会表现出不同的行为。也就是说，我们有同名的方法，但它们有不同的签名（一个接受
    `Tail` 对象作为参数，另一个接受 `Mouse` 对象作为参数）。这是方法重载的经典例子。

