  raw: '#### Writing a File''s Content


    Writing to a file works in much the same way as reading from a file. We get a
    stream, put the content we want to write to the file in the stream, write that
    content to the file, and then close the stream. [Listing 8-14](#Chapter08.html#list_8_14)
    shows a program that does just that. It''s a little more complex but still straight-forward.
    For fun and so that we can be sure something happens when we compare the file
    before and after we run the program, we reverse the file''s content along the
    way.


    ***Listing 8-14.** Writing to hamlet.txt*


    `package com.apress.java7forabsolutebeginners.examples;`


    `import java.io.File;`


    `import java.io.FileInputStream;`

    `import java.io.FileNotFoundException;`

    `import java.io.FileOutputStream;`

    `import java.io.IOException;`


    `public class WriteFile {`


    `    public static void main(String[] args) {`

    `        // Specify the file`

    `        String fileName = "C:" + File.separator + "test"`

    `            + File.separator + "Hamlet.txt";`

    `        File hamletFile = new File(fileName);`

    `        // Set up a byte array to hold the file''s content`

    `        byte[] content = new byte[0];`

    `        try {`

    `            // Create an input stream for the file`

    `            FileInputStream hamletInputStream = new FileInputStream(hamletFile);`

    `            // Figure out how much content the file has`

    `            int bytesAvailable = hamletInputStream.available();`

    `            // Set the content array to the length of the content`

    `            content = new byte[bytesAvailable];`

    `            // Load the file''s content into our byte array`

    `            hamletInputStream.read(content);`

    `            // Close the stream`

    `            hamletInputStream.close();`

    `        } catch (FileNotFoundException fnfe) {`

    `            System.out.println("Couldn''t find a file called " + fileName);`

    `        } catch (IOException ioe) {`

    `            System.out.println("Couldn''t read from a file called " + fileName);`

    `        }`

    `        // Reverse the contents of our array, just so we''ll`

    `        // know we did something to the file''s content`

    `        reverseByteArray(content);`

    `        try {`

    `            // Create a stream for our output`

    `            FileOutputStream hamletOutputStream`

    `                = new FileOutputStream(hamletFile);`

    `            // Write our output to our stream`

    `            // (and thus to our file)`

    `            hamletOutputStream.write(content);`

    `            // Close the output stream`

    `            hamletOutputStream.close();`

    `        } catch (FileNotFoundException fnfe) {`

    `            System.out.println("Couldn''t find a file called " + fileName);`

    `        } catch (IOException ioe) {`

    `            System.out.println("Couldn''t write to a file called " + fileName);`

    `        }`

    `    }`


    `    private static void reverseByteArray(byte[] inBytes) {`

    `        int inLength = inBytes.length;`

    `        for (int i = 0; i < inLength >> 1; i++) {`

    `            byte temp = inBytes[i];`

    `            inBytes[i] = inBytes[inLength - i - 1];`

    `            inBytes[inLength - i - 1] = temp;`

    `        }`

    `    }`

    `}`


    Before we proceed with reviewing the file, let''s examine the `reverseByteArray`
    method. It does what''s called *in-place reversing,* because we modify the original
    object without using any additional memory. Because we use the same memory area
    that the object already modifies, it''s said to be “in-place.” We can do that
    because Java passes memory addresses rather than values for objects (such as an
    array). We can''t do it for a primitive, because Java passes copies of values
    for primitives. Many developers prefer in-place operations because they consume
    less memory and generally perform more quickly than code that makes copies of
    things and then modifies the copies.


    This particular reversing algorithm works from both ends of the input at once,
    by the way. Although you might think we have to worry about whether we have an
    even number or odd number of bytes, we don''t actually need to concern ourselves
    with that detail. If we start with an even number of bytes, we walk down the array
    to the middle and swap the center two bytes. With an odd number of bytes, the
    byte at the center simply never moves. Also, shifting to the right by one is a
    smidgeon faster than dividing by two. Combined with working from both ends at
    once and doing the reversal in place (that is, by not creating an additional array
    to hold intermediate results), this reversing algorithm is about as fast as a
    reversing algorithm can be, making it a handy trick to remember.


    Alternately, we can reverse the contents of the file by using Java''s StringBuffer
    class. To do so, we have to convert the content variable to a String object, create
    an instance of the StringBuffer class, call the reverse method on the StringBuffer
    object, and convert the result of StringBuffer.reverse back into a byte array.
    [Listing 8-15](#Chapter08.html#list_8_15) shows that alternate way to reverse
    the contents of a byte array.


    ***Listing 8-15.** Another way to reverse a byte array*


    `    String contentString = content.toString();`

    `    StringBuffer sb = new StringBuffer(contentString);`

    `    sb.reverse();`

    `    content = sb.toString().getBytes();`


    I showed you another way to reverse the contents of a byte to demonstrate that
    there''s almost always another way to do things and to illustrate an issue you
    should know about: Conversion is expensive.  The code in [Listing 8-15](#Chapter08.html#list_8_15)
    does a number of conversions (both of the `toString` methods and the `getBytes`
    method are conversions). Conversions consume both time and memory, though, so
    you can optimize your code by using an algorithm that doesn''t demand conversions.
    Conversely, the `reverseByteArray` method does all of its work with bytes and
    never tries to convert to another type, so it ties up fewer resources (memory)
    and runs more quickly. Try to remember to not convert between types unless you
    must.


    Now examine the contents of `hamlet.txt`. You find it''s completely reversed,
    as shown in [Listing 8-16](#Chapter08.html#list_8_16).


    ***Listing 8-16.** Hamlet in reverse*


    `efil gnol os fo ytimalac sekam tahT`

    `tcepser eht s''ereht :esuap su evig tsuM`

    `,lioc latrom siht ffo delffuhs evah ew nehW`

    `emoc yam smaerd tahw htaed fo peels taht ni roF`

    `;bur eht s''ereht ,ya :maerd ot ecnahcrep :peels oT`


    So now you see how to open a file, read its content, and replace (and reverse)
