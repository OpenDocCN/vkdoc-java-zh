  raw: '### The Non-Existent Type: null


    Java includes a value that isn''t anything: `null`. It refers to a memory address
    that has not been assigned. In Java terms, that means it refers to an object or
    primitive that has not been created. As I mentioned in the “Arrays” section, when
    you create an array without specifying its values, you are creating a collection
    of `null` values. They have no memory address, no corresponding primitive or object
    exists for them, and so they are `null`. That might sound like a problem, and
    the whole concept of `null` often causes novice programmers some trouble. You
    can keep it straight by remembering that a `null` is a non-existent reference.


    The oft-maligned `null` has its uses (otherwise, it wouldn''t exist—programmers
    are pragmatic people, most of the time). For example, we often compare an object
    to null to be sure that something exists before we try to use it. If the graphics
    library is supposed to give us an object of type `Color` and we get `null` instead,
    we have a problem. So we might compare that `Color` value to `null` to ensure
    that we are getting a `Color` object and do something useful (such as trying another
    way or at least logging an error) if not.


    Also, it''s common practice to create a variable in one place and assign it in
    another place. In between the creation and assignment, the value of that variable
    might be `null` (it also might not be null because some primitives, such as `int`,
    have default values). This technique is handy because we might want to assign
    different values to the variable based on some logic. For example, a series of
    `if-else` statements or a `switch` statement might contain code to assign the
    value of a variable. Let''s consider a small example (from a minesweeper game),
    shown in [Listing 3-10](#Chapter03.html#list_3_10).


    ***Listing 3-10.** Using a null value*


    `public getMineIcon(int x, int y) {`


    `// x and y are the position within the game grid`

    `  int numberOfAdjacentMines = getNumberOfAdjacentMines(x, y);`


    `  MineIcon mineIcon = null; // here''s our null`

    `  if (numberOfAdjacentMines == 1) {`

    `    mineIcon = new MineIcon(1);`

    `  } else if (numberOfAdjacentMines == 2) {`

    `    mineIcon = new MineIcon(2);`

    `  }`

    `  // and so on up to 8`


    `  return mineIcon;`

    `}`


    In this case, we can assume a `MineIcon` class exists and that its constructor
    will take two integer values and return an icon (a type of image) that shows the
    value of that integer argument. Because a square in a minesweeper game can have
    no more than eight neighboring mines, we stop at eight. We also let the method
    return `null`, to represent the case where a square has no neighboring mines.
    Consequently, the code that calls this method then has to know what to do with
    a `null` value. As it happens, the `setIcon` method that we need to use accepts
    a `null` argument as a way of saying that no icon needs to be set.


    We create a full-blown minesweeper program in [Chapter 7](#Chapter07.html#ch7),
    “Creating a User Interface.” When we do, you see a different way to use set the
    mine icon, but it still uses a `null` reference. For now, just remember that `null`
    is just another value (though a special one that indicates a non-existent reference)
    and that it can be used for purposes other than just checking for missing objects.


    ### Enumerations


    An *enumeration* (often written as “enum”) is a data type that consists of a fixed
    number of constants. For example, if you are writing a game that involves navigation,
    you might have an enumeration to define the four cardinal directions, similar
    to the one shown  in [Listing 3-11](#Chapter03.html#list_3_11).


    ***Listing 3-11**. Enum for directions*


    `public enum Direction {`

    `    NORTH, EAST, SOUTH, WEST;`

    `}`


    As [Listing 3-11](#Chapter03.html#list_3_11) shows, the declaration of an enumeration
    consists of the `enum` keyword, a name for the enumeration, and the values that
    comprise the enumeration. The values are just names and have no type of their
    own. That works because we need unique identifiers but don''t need a type for
    each one.


    The value of enumerations is that they are type-safe (meaning that it can''t be
    confused with another type—enums used to be created with integers, so confusing
    an enum with an integer was a real problem). Without enumerations, we''d have
    to set up constants in a different way—usually with integers, as shown in [Listing
    3-12](#Chapter03.html#list_3_12).


    ***Listing 3-12.** Constants to define directions*


    `public static final int NORTH = 0;`

    `public static final int EAST = 1;`

    `public static final int SOUTH = 2;`

    `public static final int WEST = 3;`


    ![images](images/square.jpg) **Caution** Do not write collections of constants
    this way. They can be compared to int values, and that''s almost certain to be
    the wrong thing to do. That''s why Java has enumerations.The enumeration value,
    `Direction.NORTH`, can''t be treated as an integer (not even by accident), whereas
    the constant, `NORTH`, can be. Also, constants are static and final (and often
    public). Enumerations remove the need for those modifiers, which gives us greater
    flexibility when using enumerations.


    Each `enum` is actually a class. (You might have noticed that its declaration
    syntax is similar to a class.) All `enum` objects implicitly extend `java.lang.Enum`.
    That lets us make more meaningful enums than just lists of constants. To continue
    with our example, we can set the degrees for each direction, as shown in [Listing
    3-13](#Chapter03.html#list_3_13).


    ***Listing 3-13**. Enum with more information*


    `public enum Direction {`

    `  NORTH (0),`

    `  EAST (90),`

    `  SOUTH (180),`

    `  WEST (270);`


    `  private final int degrees;`

    `  Direction(int degrees) {`

    `    this.degrees = degrees;`

    `  }`


    `  public int getDegrees() {`

    `    return degrees;`

    `  }`

    `}`


    From there, we can write code to get the additional information associated with
    each value in the enumeration, as shown in [Listing 3-14](#Chapter03.html#list_3_14).


    ***Listing 3-14**. Getting details from an enum*


    `for (Direction d : Direction.values()) {`

    `  System.out.println(d + " is " + d.degrees + "degrees.");`

    `}`


    We can also write methods that work with the enumeration''s values. For example,
    we can write a method that, given a direction in degrees, tells you which cardinal
    direction is closest. [Listing 3-15](#Chapter03.html#list_3_15) shows one way
    to write such a method.


    ***Listing 3-15**. findCardinalDirection method*


    `public static Direction findCardinalDirection (int degrees) {`

    `  if (degrees < 45) {`

    `    return NORTH;`

    `  } else if (degrees < 135) {`

    `    return EAST;`

    `  } else if (degrees < 225) {`

    `    return SOUTH;`

    `  } else if (degrees < 315) {`

    `    return WEST;`

    `  } else {`

    `    return NORTH;`

    `  }`

    `}`


    You might also notice the different syntax for iterating through a for loop. That
    syntax is not unique to enumerations, but it is especially handy for them. We
    cover these alternate ways of using a `for` loop when we get to looping in a later
    chapter.


    As you can see, an enumeration is far more powerful than a simple list of constants.
    It''s also safer, because no one can confuse `Direction.North` with `0`.


    [Listing 3-16](#Chapter03.html#list_3_16) shows the full code for the `Direction`
    enumeration.


    ***Listing 3-16**. Complete enumeration example*


    `package com.bryantcs.examples.enumExample;`'
