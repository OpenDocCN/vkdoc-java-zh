    \ = \"s\";\nString sToo = \"s\";\nSystem.out.println(s.equals(sToo));\nSystem.out.println(s.equals(\"\
    s\"));\n```\n\nBoth of these print statements produce \"true\" in the console.\
    \ We cover comparing objects in more depth later in this chapter.\n\n# Bitwise\
