- fmt: "### Wrapper Classes\n\nEach of the primitives (remember, `String` is an object\
    \ rather than a primitive) has a corresponding class that provides several useful\
    \ abilities that are otherwise unavailable to a primitive. You can think of the\
    \ wrapper classes as each being a package of useful abilities wrapped around a\
    \ primitive of the corresponding type. [Table 3-4](#Chapter03.html#tab_3_4) shows\
    \ the corresponding class for each primitive:\n\n![Images](images/t0304.jpg)\n\
    \nThe most commonly used methods of those classes are the various `parse`, `Value`,\
    \ and `valueOf` methods, because those methods let you turn a `String` into a\
    \ primitive. Each class also supports `toString` methods to turn primitives into\
    \ `String` objects. [Listing 3-6](#Chapter03.html#list_3_6) shows what you can\
    \ do with an `int` primitive.\n\n***Listing 3-6**. Integer example*\n\n```\n//\
    \ declare an int\nint myInt = 1;\n\n// and a String that contains a number\nString\
    \ myString = \"1\";\n\n// turn myInt into a String\nString myIntString = Integer.toString(myInt);\n\
    \n// turn myString into an int\nint myStringInt = Integer.parseInt(myString);\n\
    \n// turn myString into an Integer\n// be prepared for an exception if myString\
    \ does not hold a number\nInteger myStringInteger = new Integer(myString);\n\n\
    // and then turn myStringInteger into an int\nint myOtherStringInt = myStringInteger.intValue();\n\
    \n// Now for more unusual things\n// convert an int to a float (perhaps for further\
    \ floating-point work)\nfloat myFloat = new Integer(myInt).floatValue();\n\n//\
    \ convert an int to a byte\n// be prepared for an exception if the value is out\
    \ of byte's range\nbyte myByte = new Integer(myInt).byteValue();\n\n// convert\
    \ an int to a long\n// no need to worry about an exception this time\nlong myLong\
    \ = new Integer(myInt).longValue();\n\n// just for fun, get the binary string\
    \ representation of myInt\n// creates a String object that holds \"1\"\nString\
    \ myIntBinary = Integer.toBinaryString(myInt);\n```\n\nThe other numeric primitives\
    \ (`byte`, `short`, `long`, `float`, and `double`) all work in a similar way.\
    \ You can convert any of them to any other, though you might have to handle an\
    \ exception if the conversion can't be done with the value you provide. For example,\
    \ if you have an `int` variable that holds a value of 300, converting it to a\
    \ `byte` gives an error, because a `byte` can't hold that value. We cover this\
    \ concept in greater detail in the next chapter, when discussing casting values.\n\
    \nThe `Boolean` and `Character` classes work a little differently. You can still\
    \ convert strings to `boolean` or `char` values and vice-versa, but you can't\
    \ convert `boolean` and `char` primitives into other primitives. Also, the `Boolean`\
    \ class includes an `equals` method, and the `Character` class includes many methods\
    \ for dealing with issues such as characters that are meant to be read from right\
    \ to left (for example, characters from Arabic and Hebrew) and other special issues\
    \ that relate only to characters. All of those operations are fairly unusual,\
    \ though, so we don't cover them. If you want to learn more about them (and good\
    \ for you if you do), look at the Javadoc for the `Boolean` and `Character` classes.\
    \ As you might recall from [Chapter 1](#Chapter01.html#ch1), JavaDoc is a special\
    \ kind of documentation that is built into the code itself. Oracle (the company\
    \ that makes Java) provides extensive JavaDoc for all the standard Java libraries.\
    \ You can find the JavaDoc for the `Boolean` class at [`http://download.oracle.com/javase/7/docs/api/java/lang/Boolean.html`](http://download.oracle.com/javase/7/docs/api/java/lang/Boolean.html)\
    \ and the JavaDoc for the `Character` class at [`http://download.oracle.com/javase/7/docs/api/java/lang/Character.html`](http://download.oracle.com/javase/7/docs/api/java/lang/Character.html).\
    \ You can find all the JavaDoc for Java 7 at [`http://download.oracle.com/javase/7/docs/api/`](http://download.oracle.com/javase/7/docs/api/)\
    \ (as you can see, the other topics are branches of the overall API documentation).\n\
    \n### Arrays\n\nAn *array* is a data structure that holds a group of variables\
    \ under a single identifier. Java supports arrays for both primitives and objects.\
    \ Square brackets after a variable's name indicate that it is an array. [Listing\
    \ 3-7](#Chapter03.html#list_3_7) shows several arrays and how to manipulate them.\n\
    \n***Listing 3-7**. Arrays of primitives*\n\n```\nint[] a; // array declaration\
    \ without assignment\na = new int[2]; // specify the length of an existing array\n\
    int[] b = {1, 2, 3, 4}; // array declaration with assignment\nint bLength = b.length;\
    \ // how to get the length of an array\n\n// arrays start at 0, not 1\nb[0] =\
    \ 2; // have to reassign each value in the array individually\n```\n\nLet's look\
    \ at the code one line at a time. The first line creates an array of `int` primitives\
    \ but doesn't assign anything to it (`a` is null at that point). The second line\
    \ shows how to set an array to be a particular length. If `a` had values, its\
    \ values would be replaced by the default values of the new type (0 in this case).\
    \ The third line shows how to create an array with a set of starting values. You\
    \ can use that block assignment syntax only when creating an array, not when assigning\
    \ new values to an existing array. The fourth line shows how to get the length\
    \ of an array. The last line shows how to reassign one of the values in an array\
    \ and shows that array addresses start at 0. (Most programming languages start\
    \ counting at 0.)\n\nNow let's consider an array of objects in [Listing 3-8](#Chapter03.html#list_3_8),\
    \ which reveals some interesting things.\n\n***Listing 3-8**. Arrays of objects*\n\
    \n```\nInteger[] myIntegers = new Integer[4];\nfor (int i = 0; i < myIntegers.length;\
    \ i++) {\n        myIntegers[i] = new Integer(i);\n}\n```\n\nAgain, let's go line\
    \ by line. As you can see, the syntax for creating an array of objects differs\
    \ a bit from that for primitives. The part to the left of the equal sign looks\
    \ the same (the kind of object, the array indicator, and the name of the variable),\
    \ but the part to the right of the equal sign differs by having the `new` keyword\
    \ before the type of the item going into the array. To create a new instance of\
    \ an object, we usually use the `new` keyword (though other ways exist), which\
    \ calls a constructor for the object. However, all of the `Integer` class's constructors\
    \ require an object (either an `int` or a `String` object that holds an integer\
    \ value), so this array ends up holding four null references. (We dive into what\
    \ null means in a moment.)\n\nThis listing also shows how to loop through an array\
    \ and, in this case, create an object for each of the null objects. Notice that\
    \ we have to use the `new` keyword again, even though we used it when we created\
    \ the array. Because we got four null references rather than actual objects from\
    \ the original assignment, we have to create new ones here. In this case, we end\
    \ up with four `Integer` objects having values of 0, 1, 2, and 3.\n\nJava provides\
    \ a convenience class for arrays. The `Arrays` class consists of many static methods\
    \ to do handy things such as copy and sort arrays. For example, [Listing 3-9](#Chapter03.html#list_3_9)\
    \ shows one way to sort an array of ints.\n\n***Listing 3-9**. Using the Arrays\
    \ convenience class*\n\n```\nint[] a = {5, 4, 3, 2};\n// at the top of the program,\
    \ we had to import\n// java.util.Arrays for this to work correctly\nArrays.sort(a);\n\
    for (int i = 0; i < a.length; i++) {\n  System.out.println(a[i]);\n}\n```\n\n\
    The result is 2, 3, 4, 5 (each on its own line) in the console."
  raw: '### Wrapper Classes


    Each of the primitives (remember, `String` is an object rather than a primitive)
    has a corresponding class that provides several useful abilities that are otherwise
    unavailable to a primitive. You can think of the wrapper classes as each being
    a package of useful abilities wrapped around a primitive of the corresponding
    type. [Table 3-4](#Chapter03.html#tab_3_4) shows the corresponding class for each
    primitive:


    ![Images](images/t0304.jpg)


    The most commonly used methods of those classes are the various `parse`, `Value`,
    and `valueOf` methods, because those methods let you turn a `String` into a primitive.
    Each class also supports `toString` methods to turn primitives into `String` objects.
    [Listing 3-6](#Chapter03.html#list_3_6) shows what you can do with an `int` primitive.


    ***Listing 3-6**. Integer example*


    `// declare an int`

    `int myInt = 1;`


    `// and a String that contains a number`

    `String myString = "1";`


    `// turn myInt into a String`

    `String myIntString = Integer.toString(myInt);`


    `// turn myString into an int`

    `int myStringInt = Integer.parseInt(myString);`


    `// turn myString into an Integer`

    `// be prepared for an exception if myString does not hold a number`

    `Integer myStringInteger = new Integer(myString);`


    `// and then turn myStringInteger into an int`

    `int myOtherStringInt = myStringInteger.intValue();`


    `// Now for more unusual things`

    `// convert an int to a float (perhaps for further floating-point work)`

    `float myFloat = new Integer(myInt).floatValue();`


    `// convert an int to a byte`

    `// be prepared for an exception if the value is out of byte''s range`

    `byte myByte = new Integer(myInt).byteValue();`


    `// convert an int to a long`

    `// no need to worry about an exception this time`

    `long myLong = new Integer(myInt).longValue();`


    `// just for fun, get the binary string representation of myInt`

    `// creates a String object that holds "1"`

    `String myIntBinary = Integer.toBinaryString(myInt);`


    The other numeric primitives (`byte`, `short`, `long`, `float`, and `double`)
    all work in a similar way. You can convert any of them to any other, though you
    might have to handle an exception if the conversion can''t be done with the value
    you provide. For example, if you have an int variable that holds a value of 300,
    converting it to a byte gives an error, because a byte can''t hold that value.
    We cover this concept in greater detail in the next chapter, when discussing casting
    values.


    The `Boolean` and `Character` classes work a little differently. You can still
    convert strings to `boolean` or `char` values and vice-versa, but you can''t convert
    `boolean` and `char` primitives into other primitives. Also, the `Boolean` class
    includes an `equals` method, and the `Character` class includes many methods for
    dealing with issues such as characters that are meant to be read from right to
    left (for example, characters from Arabic and Hebrew) and other special issues
    that relate only to characters. All of those operations are fairly unusual, though,
    so we don''t cover them. If you want to learn more about them (and good for you
    if you do), look at the Javadoc for the `Boolean` and `Character` classes. As
    you might recall from [Chapter 1](#Chapter01.html#ch1), JavaDoc is a special kind
    of documentation that is built into the code itself. Oracle (the company that
    makes Java) provides extensive JavaDoc for all the standard Java libraries. You
    can find the JavaDoc for the Boolean class at [`http://download.oracle.com/javase/7/docs/api/java/lang/Boolean.html`](http://download.oracle.com/javase/7/docs/api/java/lang/Boolean.html)
    and the JavaDoc for the Character class at [`http://download.oracle.com/javase/7/docs/api/java/lang/Character.html`](http://download.oracle.com/javase/7/docs/api/java/lang/Character.html).
    You can find all the JavaDoc for Java 7 at [`http://download.oracle.com/javase/7/docs/api/`](http://download.oracle.com/javase/7/docs/api/)
    (as you can see, the other topics are branches of the overall API documentation).


    ### Arrays


    An *array* is a data structure that holds a group of variables under a single
    identifier. Java supports arrays for both primitives and objects. Square brackets
    after a variable''s name indicate that it is an array. [Listing 3-7](#Chapter03.html#list_3_7)
    shows several arrays and how to manipulate them.


    ***Listing 3-7**. Arrays of primitives*


    `int[] a; // array declaration without assignment`

    `a = new int[2]; // specify the length of an existing array`

    `int[] b = {1, 2, 3, 4}; // array declaration with assignment`

    `int bLength = b.length; // how to get the length of an array`


    `// arrays start at 0, not 1`

    `b[0] = 2; // have to reassign each value in the array individually`


    Let''s look at the code one line at a time. The first line creates an array of
    `int` primitives but doesn''t assign anything to it (`a` is null at that point).
    The second line shows how to set an array to be a particular length. If `a` had
    values, its values would be replaced by the default values of the new type (0
    in this case). The third line shows how to create an array with a set of starting
    values. You can use that block assignment syntax only when creating an array,
    not when assigning new values to an existing array. The fourth line shows how
    to get the length of an array. The last line shows how to reassign one of the
    values in an array and shows that array addresses start at 0\. (Most programming
    languages start counting at 0.)


    Now let''s consider an array of objects in [Listing 3-8](#Chapter03.html#list_3_8),
    which reveals some interesting things.


    ***Listing 3-8**. Arrays of objects*


    `Integer[] myIntegers = new Integer[4];`

    `for (int i = 0; i < myIntegers.length; i++) {`

    `        myIntegers[i] = new Integer(i);`

    `}`


    Again, let''s go line by line. As you can see, the syntax for creating an array
    of objects differs a bit from that for primitives. The part to the left of the
    equal sign looks the same (the kind of object, the array indicator, and the name
    of the variable), but the part to the right of the equal sign differs by having
    the `new` keyword before the type of the item going into the array. To create
    a new instance of an object, we usually use the `new` keyword (though other ways
    exist), which calls a constructor for the object. However, all of the Integer
    class''s constructors require an object (either an `int` or a `String` object
    that holds an integer value), so this array ends up holding four null references.
    (We dive into what null means in a moment.)


    This listing also shows how to loop through an array and, in this case, create
    an object for each of the null objects. Notice that we have to use the `new` keyword
    again, even though we used it when we created the array. Because we got four null
    references rather than actual objects from the original assignment, we have to
    create new ones here. In this case, we end up with four `Integer` objects having
    values of 0, 1, 2, and 3.


    Java provides a convenience class for arrays. The `Arrays` class consists of many
    static methods to do handy things such as copy and sort arrays. For example, [Listing
    3-9](#Chapter03.html#list_3_9) shows one way to sort an array of ints.


    ***Listing 3-9**. Using the Arrays convenience class*


    `int[] a = {5, 4, 3, 2};`

    `// at the top of the program, we had to import`

    `// java.util.Arrays for this to work correctly`

    `Arrays.sort(a);`

    `for (int i = 0; i < a.length; i++) {`

    `  System.out.println(a[i]);`

    `}`


    The result is 2, 3, 4, 5 (each on its own line) in the console.'
