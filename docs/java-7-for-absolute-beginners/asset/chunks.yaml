    ### 原始数据类型


    *原始*意味着不存在用于定义该类型变量的类。Java 支持多种原始数据类型。在前几章的代码示例中，你看到过一些变量，其数据类型就是原始类型。凡是出现 `int`
    或 `boolean` 的地方，它们都是原始数据类型（通常简称为“原始类型”）。原始类型可分为几个大类。从语言的角度来看，这些分类并不存在，但它们确实有助于人们区分不同的原始类型。


    #### 整数原始类型


    *整数原始类型*是指其值只能是整数的类型。它不能是实数（即带有小数部分的值）。数字 0、1、16 和 37 都是整数。数字 12.34 不是整数。各种整数原始类型之间的区别在于每种类型由多少位组成。由于位数更多的类型可以容纳更大的数字，因此不同位数的实际效果是增加了该类型的最大值。增加位数可能带来的负面影响是消耗更多内存。通常情况下这无关紧要，但最佳实践是使用不超过你所需大小的数据元素。


    整数原始类型是有符号的（除非你使用 `unsigned` 关键字，我们稍后会详细讨论），因此它们的取值范围是从负数到正数。


    表 3-1 展示了各种整数原始类型的详细信息。


    ![图片](img/t0301.jpg)


    你需要更大的数字吗？实际应用程序有时需要比 `long` 最大值还要大的数字。在这种情况下，Java 提供了一个名为 `BigInteger` 的类。由 `BigInteger`
    对象表示的数字可以是任意大小，因为 `BigInteger` 类会分配足够的字节来存储任何数字的表示形式。使用起来有点棘手，并且对 `BigInteger`
    对象的操作速度较慢，但有时这是唯一的方法。`BigInteger` 不是原始类型。


    #### 实数原始类型


    实数具有小数点以及小数点后的数值。即使该值为 0，即使你没有输入小数点及其后的内容，小数点及其后的零也会在幕后存在。它们必须存在，以便对该值的操作可以与完整值进行比较，因此
    JVM（Java 虚拟机，即运行你程序的程序）即使你没有输入也会自动填充它们。


    ![图片](img/square.jpg) **注意** `0` 和 `0.00` 在 Java 中是不同的值。对普通人来说，它们都表示零。对科学家或数学家来说，一个比另一个表示更高的精度，但它们仍然都表示零。但对编译器来说，它们是不同的数据类型，彼此之间毫无关系。


    Java 支持两种实数原始类型：`float` 和 `double`。`float` 的名称来源于浮点数的概念。小数点可以移动，因此被称为“浮动”。`double`
    的名称则是因为它占用的存储空间是 `float` 的两倍。表 3-2 展示了 `float` 和 `double` 的详细信息。


    ![图片](img/t0302.jpg)


    同样，有时这仍然不够。对于这些情况，Java 提供了一个名为 `BigDecimal` 的类。与 `BigInteger` 一样，它使用起来可能很棘手，并且对其操作速度较慢。但当你绝对需要一个比
    `double` 更大的数字时，请使用 `BigDecimal`。与 `BigInteger` 一样，`BigDecimal` 不是原始类型。


    #### boolean


    `boolean` 数据类型表示某事物是真还是假。实际上，这两个词（`true` 和 `false`）是 `boolean` 数据类型仅有的两个值。


    ![图片](img/square.jpg) **注意** `true` 和 `false` 是 Java 中的保留字。你不能将它们用于除布尔变量值之外的任何其他用途。例如，尝试创建一个名为
    `true` 的 `int` 会引发错误。


    #### char


    `char` 数据类型占用两个 8 位字节，用于表示字符。它存储为一个无符号的 16 位整数，最小值为 0，最大值为 65,535。但是，你绝不应该使用 `char`
    来存储数字，因为这可能导致混淆。使用 `char` 变量来保存单个字符，这样就能避免麻烦。


    那么，为什么在字符相对较少的情况下最大值却这么大呢？好吧，当你考虑到全世界使用的所有字符集时，65,535 这个数字并非不合理。事实上，在处理传统中文时，这个数字还不够用。


    ![图片](img/square.jpg) **提示** 如果你对如何处理其他语言的字符感到好奇，可以查阅 Unicode，这是一个定义全世界所有字符的标准。有关处理多字节字符的更多信息，请查阅可变宽度编码。


    #### 特殊类型：String


    `String` 是一种兼具原始类型和对象某些特性的类型。严格来说，它是一个对象；也就是说，它由 `String` 类定义。`String` 对象是一个字符序列（Java
    提供了将 `String` 对象转换为 `char` 原始类型集合以及从这样的集合创建 `String` 对象的实用工具）。处理集合（字符串）通常比处理单个字符更方便，因此
    Java（以及几乎所有其他编程语言）都提供了 `String` 对象。


    Java 为 `String` 类提供了特殊支持，使其行为有点像原始类型。特别是，你可以使用等号（`=`）创建 `String` 对象，并且可以使用加号（`+`）连接
    `String` 对象，如清单 3-1 所示。顺便说一下，连接操作仅适用于字符串。如果你对其他数据类型使用加号，要么会得到错误（尝试将两个 `boolean`
    值相加你就会明白），要么会得到你通常与加号关联的数学加法运算。


    ***清单 3-1**. String 示例*


    `String myString = "my string";`

    `String yourString = "your string";`

    `String ourString = myString + " " + yourString;`

    `System.out.println(myString);`

    `System.out.println(yourString);`

    `System.out.println(ourString);`


    输出结果见清单 3-2。


    ***清单 3-2**. String 示例输出*


    `my string`

    `your string`

    `my string your string`


    请注意，`ourString` 的值由三个值的连接组成：`myString`、`" "` 和 `yourString`。`" "` 是一个字符串字面量。这是
    `String` 与其他对象的另一个不同之处；没有其他对象（记住，原始类型不是对象）可以拥有字面量。

    '
- fmt: '### Literals


    All the primitives and the `String` class can have literal values. A *literal*
    is a constant value that corresponds to a particular data type. [Table 3-2](#Chapter03.html#tab_3_2a)
    provides examples for each of the primitive data types and the `String` class.


    ![Images](images/t0302a.jpg)


    ![images](images/square.jpg) **Note** Declaring a `float` literal requires appending
    `f` to the end of the literal. Otherwise, the compiler tries to make it into a
    `double` value and then complains that it can''t cast from `double` to `float`.
    Similarly, you can put `d` at the end of a `double` literal''s declaration. However,
    that is redundant because `double` is the default floating-point type.


    Literals pop up all over the place, often without anyone stopping to think about
    it (after all, we''re usually trying to get the computer to do something). Every
    time we write a loop that starts at 0 and counts to some value, we use a literal
    (in that case, an integer literal). A number of other literals are common in nearly
    all programming languages and tasks. In set theory (which informs a lot of programming
    and especially database programming), the only three values that matter are 0,
    1, and many. Consequently, 0 and 1 appear over and over again throughout all kinds
    of software. The empty string (`""`—sometimes handy for comparing `String` objects)
    and the single space (`" "`—handy for linking `String` objects without inventing
    a new and large word in the process) also appear often.


    ### Escaping Characters


    Variables of type `char` can have several special values. First, single quotation
    marks (`''`), double quotation marks (`"`), and backslashes (`\`) all have to
    be marked as special (that''s called escaping a character), so that the JVM knows
    you want one of those characters. Otherwise, it would process all your single
    quotations as the beginning or end of a `char` and all your double quotations
    as the beginning or end of a `String` object. The backslash character has to be
    escaped because it is the escape character. If it couldn''t itself be escaped,
    then every backslash would indicate an escaped character, which would be a real
    problem. *Escaped characters* (often called escape sequences because they consist
    of at least two characters—the escape character and at least one other character)
    are also used for non-graphical characters (often called control characters).
    There''s even a character called Bell. It never appears, but it can (if your computer
    enables it) make your computer beep. The Bell (or Alert) character''s escape sequence
    is `\a`. All of that might not make sense, so let''s consider some examples in
    [Listing 3-3](#Chapter03.html#list_3_3) to make things clearer.


    ***Listing 3-3**. Examples of escaping characters*


    ```

    // Let''s start with double quotation marks

    // The following line throws an error because meow isn''t defined

    System.out.println("My cat says, "meow."");

    // so the line has to be

    System.out.println("My cat says, \"meow.\"");

    // which will produce this output: My cat says, "meow."


    // And now single quotation marks

    // The following line throws an error because '' never has a matching ''

    System.out.println("'' is my favorite character");

    // so the line has to be

    System.out.println("\'' is my favorite character");

    // which will produce this: '' is my favorite character

    // (my actual favorite character is ;)


    // And now the backslash itself

    // The following line throws an error because it''s missing a closing "

    // (The compiler takes \" as a literal " and then can''t find an end to the string.)

    System.out.println("I want a \");

    // so the line has to be

    System.out.println("I want a \\");

    // which will produce this: I want a \

    ```


    Java also supports several special escape sequences (all beginning with a backslash).
    [Table 3-3](#Chapter03.html#tab_3_3) shows each escape sequence and describes
    its effect. It begins with the three we already covered.


    ![Images](images/t0303.jpg)


    The newline character (`\n`) sees a lot of use for things like creating readable
    error messages, separating lines in files, and other output. Tabs are less common
    but still sometimes used (to line up pieces of output to make things easier to
    read). The others are much more rarely used, because software developers hardly
    ever create unstructured output these days. When programmers used punch cards
    for input and line printers for output, programmers made extensive use of the
    form feed and start-of-line characters. We still produce plenty of output, of
    course, but it''s usually HTML, XML, or some other structured format.


    In addition to being possible values for variables of type `char`, `String` objects
    can also contain escape sequences. Many `String` objects contain a newline sequence
    or two. [Listing 3-4](#Chapter03.html#list_3_4) shows a short example.


    ***Listing 3-4**. String with escape sequence*


    ```

    String errorMessage = "The whatsit didn''t work!\nCheck the doohickey.";

    System.out.println(errorMessage);

    ```


    That code snippet produces the output in [Listing 3-5](#Chapter03.html#list_3_5).


    ***Listing 3-5**. Newline output*


    ```

    The whatsit did''t work!

    Check the doohickey.

    ```'
