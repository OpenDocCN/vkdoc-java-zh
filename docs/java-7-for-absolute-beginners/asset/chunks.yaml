- fmt: '### Primitive Data Types


    *Primitive* means that no class exists to define a variable of that type. Java
    supports a number of primitive data types. In the code samples in previous chapters,
    you saw several variables whose data types were primitive. Anywhere you saw `int`
    or `boolean`, those were primitive data types (usually called “primitives”). Primitives
    fall into several broad categories. From the language''s point of view, the categories
    don''t exist, but they do help people keep the primitives straight from one another.


    #### Integer Primitives


    An *integer primitive* is one whose value can be only an integer. It cannot be
    a real number (that is, one with a fractional value). The numbers 0, 1, 16, and
    37 are all integers. The number 12.34 is not an integer. The distinguishing feature
    between the various integer primitives is how many bits make up each one. Because
    a type made of more bits can hold a bigger number, the practical effect of the
    different number of bits is to increase the maximum value of that type. The possible
    detrimental effect of increasing the number of bits is to consume more memory.
    Often, it doesn''t matter, but it''s good practice to use data elements no larger
    than you need.


    Integer primitives are signed (unless you use the `unsigned` keyword, which we
    discuss more in a moment), so their values range from a negative number to a positive
    number.


    [Table 3-1](#Chapter03.html#tab_3_1) shows the details of the various integer
    primitives.


    ![Images](images/t0301.jpg)


    Do you need even bigger numbers? Real-world applications sometimes need numbers
    even bigger than the maximum value of `long`. In those cases, Java provides a
    class called `BigInteger`. A number represented by a `BigInteger` object can be
    of any size, because the `BigInteger` class allocates enough bytes to store a
    representation of any number. It''s a little tricky to use and operations on `BigInteger`
    objects are slow, but it''s sometimes the only way. `BigInteger` is not a primitive.


    #### Real Primitives


    Real numbers have decimal points and values after the decimal point. Even if that
    value is 0, and even if you didn''t type a decimal point and anything after it,
    the decimal point and the zeros after it are there behind the scenes. They must
    exist so that operations on the value can compare to the full value, so the JVM
    (the Java Virtual Machine, which is the program that runs your programs) fills
    them in even if you don''t.


    ![images](images/square.jpg) **Note** `0` and `0.00` are different values in Java.
    To the average person, they both mean zero. To a scientist or mathematician, the
    one indicates greater precision than the other, but they still both mean zero.
    But to a compiler, they are different data types and have nothing to do with one
    another.


    Java supports two real primitives, `float` and `double`. `float` gets its name
    from the idea of a floating point number. The decimal point can move, so it''s
    said to “float.” `double` gets its name because it takes twice the storage space
    of a float. [Table 3-2](#Chapter03.html#tab_3_2) shows the details of `float`
    and `double`.


    ![Images](images/t0302.jpg)


    Again, sometimes even that isn''t enough. For those cases, Java provides a class
    called `BigDecimal`. As with `BigInteger`, it can be tricky to use, and operations
    on it are slow. But when you absolutely have to have a number bigger than a double,
    use `BigDecimal`. As with `BigInteger`, `BigDecimal` is not a primitive.


    #### boolean


    The `boolean` data type indicates whether something is true or false. In fact,
    those two words (`true` and `false`) are the only two values `boolean` data types
    can have.


    ![images](images/square.jpg) **Note** `true` and `false` are reserved words in
    Java. You can''t use them for anything other than the value of a boolean variable.
    For example, trying to create an `int` called `true` throws an error.


    #### char


    The `char` data type holds two 8-bit bytes and is meant to represent characters.
    It''s stored as an unsigned 16-bit integer with a minimum value of 0 and a maximum
    value of 65,535. However, you should never use a `char` to store a number, because
    that can lead to confusion. Use `char` variables to hold individual characters,
    and you''ll avoid trouble.


    So why is the maximum so big when relatively few characters exist? Well, when
    you look at all the character sets in use all around the world, 65,535 isn''t
    so unreasonable. In fact, it''s not enough when dealing with traditional Chinese.


    ![images](images/square.jpg) **Tip** If you''re curious about how to handle characters
    from other languages, look up Unicode, which is a standard that defines all the
    world''s characters. For more on handling multi-byte characters, look up variable-width
    encoding.


    #### The Special Type: String


    `String` is a type that has some of the characteristics of both a primitive and
    an object. Strictly speaking, it is an object; that is, a `String` class defines
    it. A `String` object is a sequence of characters (and Java provides utilities
    for turning a `String` object into a collection of `char` primitives and for making
    a `String` object from such a collection). It''s often handy to work on the collection
    (the string) rather than on each character, so Java (and nearly all other programming
    languages) provides a `String` object.


    Java offers special support for the `String` class that lets `String` objects
    act a little like primitives. In particular, you can create a `String` object
    by using the equals sign (`=`), and you can concatenate `String` objects with
    the plus sign (`+`), as shown in [Listing 3-1](#Chapter03.html#list_3_1). Concatenation
    applies only to strings, by the way. If you use a plus symbol with the other data
    types, you either get an error (try adding two `boolean` values and you''ll see
    it) or you get the mathematical plus operation that you usually associate with
    the plus symbol.


    **Listing 3-1**. String examples


    ```

    String myString = "my string";

    String yourString = "your string";

    String ourString = myString + " " + yourString;

    System.out.println(myString);

    System.out.println(yourString);

    System.out.println(ourString);

    ```


    The output is in [Listing 3-2](#Chapter03.html#list_3_2).


    **Listing 3-2**. String example output


    ```

    my string

    your string

    my string your string

    ```


    Notice that the value of `ourString` consists of the concatenation of three values:
    `myString`, `" "`, and `yourString`. `" "` is a `String` literal. That''s another
    way `String` differs from other objects; no other object (remember, primitives
    aren''t objects) can have a literal.'
