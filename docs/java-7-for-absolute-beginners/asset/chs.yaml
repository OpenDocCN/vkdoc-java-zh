  \n图 11-11 展示了正确代码产生的值。\n\n![images](img/1111.jpg)\n\n***图 11-11.** 调试器中的正确值*\n\n\
  如你所见，`endX` 和 `endY` 的值更接近我预期的值，这引出了编写软件时你需要做的另一件事：弄清楚预期的值。如果你不知道调试器中应该出现什么值，就无法确定你的代码在做正确（或错误）的事情。\n\
  \n### 总结\n\n本章我们涵盖了很多内容。你学到了：\n\n*   调试的一般流程。\n*   如何在没有调试器的情况下进行调试（以及为什么拥有一个调试器更好）。\n\
  *   如何设置行断点。\n*   还有其他类型的断点可供使用，以满足你的调试需求。\n*   如何单步跳过代码以及如何单步进入代码。\n*   如何检查变量在代码影响下的值。\n\
  *   在知道哪里出错之前，你需要先知道预期的结果。\n*   如何利用这些预期来发现并修复问题。\n\n随着你在编程方面做得更多，你会无数次地经历这个基本过程。通过练习，你会逐渐培养出自己对问题所在以及如何找到它们的直觉。老实说，调试是一门艺术，而那种凭借经验判断哪里出错的直觉，比任何对调试器的正式理解都能让你做得更多。因此，请使用\
  \ Eclipse 调试器以及未来可能遇到的任何其他调试器，来培养你自己的调试技能。拥有调试的诀窍是区分高级开发者和初级开发者的因素之一，而经验是为你自己创造这种诀窍的唯一途径。\n\
  \n现在，将 Eclipse 调试器指向你在阅读本书时开发的代码，设置几个断点，看看你能学到什么。我敢打赌你会感到惊讶。\n\n## 第 12 章\n\n##\
  \ 视频游戏\n\n所谓“视频游戏”，我指的是那些控制方式非常有限、且主要界面以某种方式呈现动画效果的游戏。其他电脑游戏虽然也使用动画，但在传统意义上并不属于视频游戏。例如，一款名为《BattleZone》的老游戏（我大学时玩过）就是视频游戏。而《文明》系列的所有版本，都是电脑游戏，但不是视频游戏。区别在哪里？在于复杂度和游戏所需的技巧。视频游戏通常简单，需要操作敏捷。其他游戏则往往更复杂，依赖智力。作为一个狂热的游戏玩家，根据心情，我两种都喜欢。\n\
  \n我猜很多读这本书的人都想学习编写视频游戏。这很合理。我可能也会这么做。如果你如此热爱游戏以至于直接跳到了这一章，我建议你至少先阅读关于动画的那一章，因为那些概念非常适用于视频游戏的编程。\n\
  \n### 视频游戏的机制\n\n在我们深入游戏之前，先来考虑一下视频游戏的核心组成部分，这些术语不特定于任何编程语言，包括 Java。然后，当我们浏览几个示例时，可以讨论这些示例是如何实现这些机制的。视频游戏包含三个主要部分：\n\
  \n*   用户界面\n*   游戏逻辑\n*   游戏循环\n\n#### 用户界面\n\n正如我们在前几章中看到的，任何带有图形用户界面的程序都会将大量代码用于创建和响应用户界面。不幸的是，这可能导致在用户界面代码中忽略了游戏逻辑。复杂的游戏（例如大多数现代视频游戏）通过将逻辑放在一组类中，将呈现（用户界面的另一种说法）放在另一组类中，从而将逻辑与呈现分离。简单的游戏可能会在同一个类中混合逻辑和呈现（尽管可能在不同的方法中）。本章中的示例游戏采用了后一种组织方式，因为它们是非常简单的游戏。我们已经在第\
  \ 6 章“面向对象编程”中讨论过混合逻辑和呈现的想法。\n\n然而，用户界面代码中总有一些点会触发逻辑代码中的行为。这些点通常是代码处理用户输入的地方。如果你点击鼠标上的一个按钮，输入确实会通过用户界面层（通过鼠标处理器），但那次点击几乎肯定也会触发某种游戏逻辑。当你阅读视频游戏的代码时（顺便说一句，你可以在网上找到很多游戏的代码），请注意这些进入游戏逻辑的入口点。它们是任何电脑游戏中的关键位置。\n\
  \n#### 游戏逻辑\n\n“游戏逻辑”指的是游戏响应用户输入以及可能响应其他条件（例如计时器或网络事件）的方式。以下是一些你可能在各种游戏中见过的游戏逻辑示例：\n\
  \n*   玩家击中目标后得分。\n*   计时器归零时游戏结束。\n*   跳到一个特定位置会打开一扇秘密门。\n\n所有游戏都至少有一点游戏逻辑。游戏（通常）需要某种结束条件（游戏结束条件），并且大多数游戏都有某种计分方式。并非所有游戏都需要这些，但大多数都需要。例如，本章中的第二个示例（一个非常简单的射击场游戏）没有结束条件。只要你愿意，你可以一直射击。\n\
  \n#### 游戏循环\n\n你可能还记得第 10 章“动画”中，程序重绘屏幕的次数是其帧率，而程序处理所有输入并产生所有输出的次数是其赫兹数。游戏循环决定了这两个速度指标。本章中的第二个示例（射击场游戏）每秒运行其游戏循环\
  \ 50 次，因此其帧率和赫兹数都是 50。\n\n那么游戏循环是做什么的呢？这因游戏而异，但任何游戏循环都必须完成一些基本任务：\n\n*   处理用户输入和所有其他输入\n\
  *   处理游戏逻辑\n*   重绘游戏场地\n\n\n\n### TargetClick 游戏\n\nTargetClick 本质上是一款电子版的经典打地鼠游戏。屏幕上会出现一个圆点，你必须在它消失前点击它。点击的圆点越多，得分就越高。你可以通过设定获胜所需成功点击的次数来（间接）控制游戏时长。如果你想增加游戏难度，可以放大游戏窗口（这样圆点之间的距离会更远）。图\
  \ 12-1 展示了正在运行中的 TargetClick 游戏。\n\n![images](img/1201.jpg)\n\n***图 12-1.** TargetClick\
