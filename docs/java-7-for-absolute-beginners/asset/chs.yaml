  \ j) == Mine.flagState.UNKNOWN) {`\n`                clickedButton.removeMouseListener(this);`\n\
  `              }`\n`            }`\n`          } else {`\n`            state = mineSweeper.mineField.resolveClick(i,j,\
  \ false);`\n`          }`\n`          if (state == MineField.gameState.WIN) {`\n\
