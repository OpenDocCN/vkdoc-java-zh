  \ 类只负责设置窗口并处理菜单和窗口控件（本例中为最小化和关闭）的点击。我禁用了窗口的调整大小控件，既是为了简化游戏中的数学计算，也是因为你可能想知道如何实现这一功能。下面这行代码禁用了调整窗口大小的功能：\n\
  \n***清单 12-5.** 禁止调整大小*\n\n`    frame.setResizable(false);`\n\n我尽量不限制用户的操作，除非有充分且对用户友好的理由。因此，我通常不会禁用调整窗口大小的功能。不过，我再次认为这能成为一个好例子，并且它简化了编程。然而，为了让自己更轻松而限制用户操作是一种不良实践（这是一种智力上的懒惰）——除非你只是为了演示如何实现，否则不要这样做。\n\
  \n关于 `ShootingGallery` 类（以及整个游戏），最后要注意的一点是：它没有开始或停止控制。游戏会无休止地持续运行。我省略了一些你可能期望在游戏中看到的常见功能，以便你可以自己实现它们。我在本章末尾附近列出了这些想法的清单。\n\
  \n***清单 12-6.** ShootingGalleryPanel 类*\n\n`package com.bryantcs.examples.videogames;`\n\
  \n`import java.awt.Dimension;`\n`import java.awt.Graphics;`\n`import java.awt.event.ActionEvent;`\n\
  `import java.awt.event.ActionListener;`\n\n`import javax.swing.BoxLayout;`\n`import\
  \ javax.swing.JPanel;`\n`import javax.swing.Timer;`\n\n`public class ShootingGalleryPanel\
  \ extends JPanel implements ActionListener{`\n\n`  private static final long serialVersionUID\
  \ = 1L;`\n\n`  // 由玩家控制的光标`\n`  private ShootingGalleryShooter shooter;`\n\n`  //\
  \ 在游戏区域中移动的精灵图`\n`  private ShootingGalleryTargetSprites sprites;`\n\n`  // 最宽靶子的宽度`\n\
  `  public final static int TARGET_SPACE = 50;`\n\n`  // 用于控制动画的滴答计数器`\n`  private\
  \ int ticks;`\n\n`  // 三行靶子`\n`  static ShootingGalleryTargetRow row1, row2, row3;`\n\
  \n`  // 用于控制游戏循环的计时器`\n`  private Timer timer = new Timer(20, this);`\n\n`  // 构造方法`\n\
  `  public ShootingGalleryPanel() {`\n\n`    // 设置精灵图`\n`    sprites = new ShootingGalleryTargetSprites();`\n\
  `    sprites.init();`\n\n`    // 设置水平布局，因为我们要`\n`    // 在左侧添加三个垂直行`\n`    setLayout(new\
  \ BoxLayout(this, BoxLayout.X_AXIS));`\n\n`    // 设置并添加最左侧的行（最小且分值最高的靶子）`\n`    row1\
  \ = new ShootingGalleryTargetRow(sprites.getSpriteBySize(25), 50);`\n`    row1.setPreferredSize(new\
  \ Dimension(TARGET_SPACE + 10, getHeight()));`\n`    add(row1);`\n\n`    // 设置并添加中间行（较慢且分值较低）`\n\
  `    row2 = new ShootingGalleryTargetRow(sprites.getSpriteBySize(40), 25);`\n`    row2.setPreferredSize(new\
  \ Dimension(TARGET_SPACE + 10, getHeight()));`\n`    add(row2);`\n\n`    // 设置并添加最右侧的行（最慢且分值最低的靶子）`\n\
  `    row3 = new ShootingGalleryTargetRow(sprites.getSpriteBySize(50), 10);`\n`    row3.setPreferredSize(new\
  \ Dimension(TARGET_SPACE + 10, getHeight()));`\n`    add(row3);`\n\n`    // 计算玩家光标的缩进距离并添加它`\n\
  `    int shooterOffset = (3 * (TARGET_SPACE + 10));`\n`    int gameWidth = ShootingGallery.gameDimension.width;`\n\
  \n`    // 设置并添加玩家光标`\n`    shooter = new ShootingGalleryShooter(gameWidth - shooterOffset);`\n\
  `    shooter.setPreferredSize(new Dimension(gameWidth - shooterOffset, getHeight()));`\n\
  `    add(shooter);`\n\n`    // 启动计时器`\n`    timer.start();`\n`  }`\n\n\n\n`  //\
  \ 让父组件自行绘制`\n`  @Override`\n`  public void paintComponent(Graphics g) {`\n`    super.paintComponent(g);`\n\
  `  }`\n\n`  // 游戏循环`\n`  @Override`\n`  public void actionPerformed(ActionEvent\
  \ e) {`\n\n`    // 递增滴答计数器`\n`    ticks++;`\n`    // 每秒重置一次滴答计数器`\n`    // 防止其超出\
  \ int 类型的最大值`\n`    if (ticks == 50) {`\n`      ticks = 0;`\n`    }`\n\n`    //\
  \ 每滴答一次移动最左侧的行`\n`    row1.tick();`\n\n`    // 每两次滴答移动中间的行`\n`    if (ticks == 0\
  \ || ticks % 2 == 0) {`\n`      row2.tick();`\n`    }`\n\n`    // 每三次滴答移动最右侧的行`\n\
  `    if (ticks == 0 || ticks % 3 == 0) {`\n`      row3.tick();`\n`    }`\n`    //\
  \ 每滴答一次更新玩家光标的位置`\n`    shooter.tick();`\n`  }`\n`}`\n\n与 `TargetClickPanel` 类类似，`ShootingGalleryPanel`\
  \ 类的大部分功能是设置和管理游戏区域（用户界面）。然而，`actionPerformed` 方法完全由游戏逻辑构成，并包含了游戏循环。它的工作原理是每隔若干滴答移动各行。最左侧的行（包含最小且分值最高的目标）在每个滴答时更新，因此移动速度非常快（我很难击中它们，但游戏设计本就该如此）。中间的行每两次滴答更新一次，而最右侧的行（包含最大且分值最低的目标）每三次滴答更新一次。因此，大而慢的目标会挡在快速且高价值目标的路径上，这正是射击场游戏的典型特征。\n\
  \n最后，`actionPerformed` 方法会更新光标的位置和状态。光标是用户唯一能控制的对象，因此我们必须尽可能频繁地更新其位置和状态。每秒更新五十次足以跟上我所见过的任何玩家的操作。\n\
  \n当计时器运行满一秒钟后，`actionPerformed` 方法会重置它。否则，长时间的游戏可能会导致滴答次数超过 `ticks` 变量的最大值。这种情况虽然不太可能发生，但为何不在问题出现之前就防患于未然呢？我们也可以选择每千次或每百万次滴答重置一次，但将\
  \ `int` 设置为 0 是一个非常廉价的操作，因此我选择每秒重置一次。\n\n`actionPerformed` 方法处理了游戏循环所需的所有三项任务，但顺序和方式与我们在\
  \ TargetClick 游戏中看到的不同。这一次，界面的更新被推给了其他类（`ShootingGalleryTargetRow` 和 `ShootingGalleryShooter`），而用户输入的处理被放在了最后而非最前。在这种情况下，用户输入是先处理还是后处理并无区别。我这样做的目的是为了演示任务的顺序通常并不重要。当然也存在例外情况，但当你遇到它们时，你能够识别出来，因为它们将成为游戏机制的一部分。\n\
  \n由于 `ShootingGalleryPanel.actionPerformed` 方法的三个主要功能之一是更新各行，让我们来看看各行是如何工作的（其他主要功能是更新光标和管理滴答）。在阅读\
  \ `ShootingGalleryTargetRow` 类的代码时，请特别注意 `tick` 方法（该方法会在目标移出底部时将其移除，并在顶部用新目标替换它们——前提是玩家没有击中该特定目标）。\n\
