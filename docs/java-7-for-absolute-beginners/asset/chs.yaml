  `  }`\n`}`\n\n`MineSweeper` 与我们之前编写的其他 Swing 类功能相同，但正如你刚才所见，它还做了更多的事情。因此，让我们逐步了解它究竟在做什么。我们从你刚才停下的地方开始：在底部，从\
  \ `main` 方法开始。正如你在第 1 章“编写你的第一个 Java 程序”中学到的，`main` 方法是程序的入口点。代码清单 7-5 展示了 `main`\
  \ 方法。\n\n***代码清单 7-5.** MineSweeper 的 main 方法*\n\n`  public static void main(String[]\
  \ args) {`\n`    MineSweeper mineSweeper = new MineSweeper();`\n`    mineSweeper.createAndShowGUI();`\n\
  `  }`\n\n`main` 方法做的事情不多。它创建了一个 `MineSweeper` 类的实例，这是一种避免在整个类中只使用静态对象和方法的便捷方式。创建新对象会调用该对象类的构造函数。在我们目前看到的其他类中，构造函数什么也没做（我们也没有编写它们，而是依赖默认构造函数来创建对象）。然而，`MineSweeper`\
  \ 类需要一个真正的构造函数。代码清单 7-6 展示了这个构造函数。\n\n***代码清单 7-6.** MineSweeper 的构造函数*\n\n`  public\
  \ MineSweeper() {`\n`    helper = new MineSweeperHelper(this);`\n`    actionListener\
  \ = new MineSweeperActionListener(this, helper);`\n`    mouseListener = new MineSweeperMouseListener(this,\
  \ helper);`\n`    init();`\n`  }`\n\n`MineSweeper` 构造函数首先通过实例化 `MineSweeperHelper`\
  \ 类来创建一个辅助对象。我们必须先做这一步，以便将辅助对象传递给我们的两个监听器对象。接下来的两行创建了 `MineSweeperActionListener`\
  \ 和 `MineSweeperMouseListener` 类的实例。这些类分别监视菜单和雷区上的鼠标点击。我们本可以将这些监听器放在 `MineSweeper`\
  \ 类中（事实上，我们最初确实将那个功能放在了 `MineSweeper` 类中）。相反，我们决定让 `MineSweeper` 类只处理用户界面的定义，并将所有其他任务推给其他类。这是你在开发程序时经常会面临的设计决策。在这种情况下，我的编辑（Ewan）和技术审阅者（Massimo）都建议拆分功能，他们是对的。（谢谢各位。）即使是相对简单的软件（是的，`MineSweeper`\
  \ 非常简单）也能从他人的审阅中受益，这是你自己编程时需要记住的一点。\n\n你可能已经注意到，构造函数创建的所有类都将 `MineSweeper` 实例本身（通过\
  \ `this` 关键字）作为参数。目前，不必担心这个细节。当我们介绍这些类时，你会明白为什么会这样。\n\n最后，`MineSweeper` 构造函数调用了\
  \ `init` 方法，该方法（再次）出现在代码清单 7-7 中。\n\n***代码清单 7-7.** MineSweeper 的 init 方法*\n\n`  void\
  \ init() {`\n`    mineButtons = new JButton[rows][columns];`\n`    for (int i =\
  \ 0; i < rows; i++) {`\n`      for (int j = 0; j < columns; j++) {`\n`        JButton\
  \ currentButton = new JButton();`\n`        mineButtons[i][j] = currentButton;`\n\
  `        currentButton.setPreferredSize(buttonSize);`\n`        currentButton.setMaximumSize(buttonSize);`\n\
  `        currentButton.setMinimumSize(buttonSize);`\n`        currentButton.addMouseListener(mouseListener);`\n\
  `        currentButton.setEnabled(true);`\n`        currentButton.setText(\"\");`\n\
  `        currentButton.setIcon(null);`\n`      }`\n`    }`\n`    minePanel.setLayout(new\
  \ GridLayout(rows, columns));`\n`    for (int i = 0; i < rows; i++) {`\n`      for\
  \ (int j = 0; j < columns; j++) {`\n`        minePanel.add(mineButtons[i][j]);`\n\
  `      }`\n`    }`\n`    mineField = new MineField(rows, columns, numberOfMines);`\n\
  `  }`\n\n`init` 方法创建了作为雷区用户界面的二维小按钮数组。（雷区本身是一个更抽象的对象，包含地雷位置的信息——这是一个微妙但有意义的区别，我们将在本章稍后深入探讨。）然后，它将所有这些按钮添加到保存雷区按钮的\
  \ `JPanel` 对象中。最后，它创建了实际的雷区。（再次强调，按钮是我们让玩家访问雷区信息集的方式。）\n\n![images](img/square.jpg)\
  \ **注意** 当用户启动应用程序以及用户开始新游戏时，都会调用 `init` 方法。这就是为什么它会用一个新的实例替换 `MineField` 类的现有实例。\n\
  \n在构造函数和 `init` 方法完成游戏设置后，`main` 方法将控制权传递给执行链中的下一个方法：`createAndShowGUI`。代码清单 7-8\
  \ 展示了 `createAndShowGUI` 方法。\n\n***代码清单 7-8.** MineSweeper 的 createAndShowGUI 方法*\n\
  \n`  private void createAndShowGUI() {`\n`    frame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);`\n\
  `    frame.getContentPane()`\n`        .setLayout(new BoxLayout(frame.getContentPane(),\
  \ BoxLayout.Y_AXIS));`\n\n`    addAndArrangePanels(frame);`\n`    addMenu(frame);`\n\
  \n\n\n`    frame.pack();`\n`    frame.setVisible(true);`\n`  }`\n\n`createAndShowGUI`\
  \ 方法负责设置并显示 `JFrame` 对象。请记住，`JFrame` 对象就是一个窗口。因此，我们定义了程序窗口的细节，然后将其显示出来。接下来，我们逐行分析。第一行表示关闭窗口时也应退出程序（停止程序并将其从操作系统的运行程序列表中移除，通常称为“退出程序”）。第二行设置布局。在此例中，它使用了一个\
  \ `BoxLayout` 对象，该对象将控件垂直排列成一行。请注意，我们必须获取内容窗格才能设置布局。接着，我们将执行权（即程序当前正在执行的工作）传递给 `addAndArrangePanels`\
  \ 方法（我们稍后会讲到）。该方法执行完毕后，执行权返回到此方法。然后，我们将执行权传递给另一个名为 `addMenu` 的方法。请注意，这两个方法都将 `JFrame`\
  \ 对象作为参数，这告诉我们这些方法负责完成更多设置窗口的工作。事实上，它们完成了大部分工作。最后，我们来到最后两行，这两行直接影响 `JFrame` 对象。在\
  \ `JFrame` 对象上调用 `pack` 方法的那一行（即 `frame.pack();` 这一行）告诉 JVM 整理 `JFrame` 对象中的所有控件。最后一行在\
  \ `JFrame` 对象上调用 `setVisible` 方法，这是 Java 中让窗口对用户可见的方式。你可以将窗口保留在内存中，并使其可见或不可见。当需要隐藏窗口时，这比重新指定窗口具有更好的性能。\n\
  \n现在，让我们看看 `addAndArrangePanels` 方法，该方法出现在清单 7-9 中。\n\n***清单 7-9.** MineSweeper\
  \ 的 addAndArrangePanels 方法*\n\n`  private void addAndArrangePanels(JFrame frame)\
  \ {`\n`    Border paddingBorder = BorderFactory.createEmptyBorder(5,5,5,5);`\n`    JPanel\
  \ controlPanel = new JPanel();`\n`    minesFoundLabel.setBorder(paddingBorder);`\n\
  `    minesFoundLabel.setAlignmentX(Component.LEFT_ALIGNMENT);`\n`    minesRemainingLabel.setAlignmentX(Component.RIGHT_ALIGNMENT);`\n\
  `    minesRemainingLabel.setBorder(paddingBorder);`\n`    minesRemainingLabel.setText(\"\
  Remaining: \" + mineField.getMinesRemaining());`\n`    controlPanel.add(minesFoundLabel);`\n\
  `    controlPanel.add(minesRemainingLabel);`\n`    GridLayout gridLayout = new GridLayout(1,2);`\n\
  `    controlPanel.setLayout(gridLayout);`\n\n`    frame.getContentPane().add(controlPanel);`\n\
  `    frame.getContentPane().add(minePanel);`\n`  }`\n\n你可能会问：“面板？什么面板？” 实际上，扫雷程序使用了两个\
  \ `JPanel` 对象。一个面板用于显示计分板，另一个用于显示雷区。还记得那个垂直轴的 `BoxLayout` 对象吗？它规定了一个面板在另一个面板之上。在此例中，显示分数的面板（称为\
  \ `controlPanel`）位于雷区（称为 `minePanel`）之上。同样，我们逐行分析。\n\n第一行创建了一个 `Border` 对象，该对象在四个边上都有\
  \ 5 像素的内边距。我们使用这个 `Border` 对象来防止标签与窗口中的其他元素发生碰撞。第二行创建了一个名为 `controlPanel` 的新 `JPanel`\
  \ 对象，它用于容纳我们的标签。那么，为什么不在此处创建容纳雷区的面板呢？因为我们在其他地方也需要它，所以必须在类的顶部将其创建为类变量。第三行为 `minesFoundLabel`\
  \ 对象设置内边距，该标签告诉玩家到目前为止他们标记了多少颗地雷。（当然，玩家可能标记错误；这也是乐趣的一部分。）第四行将 `minesFoundLabel`\
  \ 的对齐方式设置为左对齐，使其显示在面板的左侧。第五行设置 `minesRemainingLabel` 的对齐方式，该标签告诉玩家还有多少颗地雷未被发现，使其显示在面板的右侧。第六行使用我们定义的边框为\
  \ `minesRemainingLabel` 添加边框。第七行设置 `minesRemainingLabel` 的文本。那么，为什么我们没有设置 `minesFoundLabel`\
  \ 的值呢？因为设置该标签不需要拼接两个字符串，而且我们无法确定玩家在游戏中选择了多少颗地雷。接下来的两行将我们的标签添加到 `controlPanel` 对象中。然后，我们创建一个\
  \ `GridLayout` 对象，用于控制两个标签的放置位置。在此例中，我们创建了一个只有一行和两个单元格的小网格（每个标签一个）。最后，我们将两个面板添加到\
  \ `JFrame` 对象中。至此，窗口中出现的所有控件都已定义，它们之间的相互关系也已定义。\n\n![images](img/square.jpg) **注意**\
  \ 创建组件、设置其属性并将组件添加到容器中，是在 Swing（以及其他用户界面框架）中设置用户界面的标准做法。如果你编写许多具有用户界面的应用程序，你会经常这样做。请记住，容器也是一个组件，因此你经常会将一个组件添加到另一个组件中，然后将这组组件再添加到另一个组件中。你可以在\
  \ `addAndArrangePanels` 方法中看到这一点：我们将标签添加到 `JPanel` 对象，然后将 `JPanel` 对象添加到 `JFrame`\
  \ 对象。\n\n现在我们已经定义了窗口中的组件，接下来添加一个菜单，以便玩家可以开始新游戏、设置游戏大小以及退出游戏。所有这些操作都在 `AddMenu` 方法中完成，该方法出现在清单\
  \ 7-10 中。\n\n***清单 7-10.** MineSweeper 的 addMenu 方法*\n\n\n\n`  private void addMenu(JFrame\
  \ frame) {`\n`    JMenu file = new JMenu(\"文件\");`\n`    file.setMnemonic('F');`\n\
  `    JMenuItem newItem = new JMenuItem(\"新游戏\");`\n`    newItem.setMnemonic('n');`\n\
  `    newItem.addActionListener(actionListener);`\n`    file.add(newItem);`\n`    ButtonGroup\
  \ sizeOptions = new ButtonGroup();`\n`    JRadioButtonMenuItem smallOption = new\
  \ JRadioButtonMenuItem(\"小型 (8 x 8, 10 颗雷)\");`\n`    smallOption.setMnemonic('s');`\n\
  `    smallOption.addActionListener(actionListener);`\n`    sizeOptions.add(smallOption);`\n\
  `    file.add(smallOption);`\n`    JRadioButtonMenuItem mediumOption =`\n`        new\
  \ JRadioButtonMenuItem(\"中型 (16 x 16, 40 颗雷)\");`\n`    mediumOption.setMnemonic('m');`\n\
  `    mediumOption.addActionListener(actionListener);`\n`    sizeOptions.add(mediumOption);`\n\
  `    file.add(mediumOption);`\n`    JRadioButtonMenuItem largeOption =`\n`        new\
  \ JRadioButtonMenuItem(\"大型 (16 x 32, 100 颗雷)\");`\n`    largeOption.setMnemonic('l');`\n\
  `    largeOption.addActionListener(actionListener);`\n`    sizeOptions.add(largeOption);`\n\
  `    file.add(largeOption);`\n`    JMenuItem exitItem = new JMenuItem(\"退出\");`\n\
  `    exitItem.setMnemonic('x');`\n`    exitItem.addActionListener(actionListener);`\n\
  `    file.add(exitItem);`\n`    JMenuBar menuBar = new JMenuBar();`\n`    menuBar.add(file);`\n\
  `    frame.setJMenuBar(menuBar);`\n`  }`\n\n`addMenu` 方法比我们目前编写的一些程序还要庞大。正如我在本章开头提到的，对\
  \ Swing 的一个常见抱怨是它过于冗长（这意味着需要大量代码才能完成看似不多的工作）。同样，这是一个不公平的批评，因为其他用户界面框架也存在同样的问题。能够设置大量选项来让程序执行各种操作，意味着需要设置很多属性，也就意味着需要大量代码。这就是用户界面开发的本质。在创建了几个带有图形用户界面（GUI）的程序之后，你就会习惯这一点。\n\
  \n那么，让我们详细看看 `addMenu` 方法。该方法遵循一种重复的模式，因此我们描述这种模式，而不是逐行解释（毕竟，这*确实*是一个庞大的方法）。第一行创建了一个名为“file”的\
  \ `JMenu` 对象。如果我们的程序还有一个编辑菜单（比如文字处理器可能有的那种），我们就会有另一个 `JMenu` 对象。因此，对于 Swing 来说，菜单是更大菜单结构（我们将在方法末尾附近看到）中的一个菜单项。创建文件菜单对象后，我们开始创建\
  \ `JMenuItem` 对象。每个 `JMenuItem` 对象定义了此特定菜单中的一个选项。对于每个菜单项，我们指定一个名称（例如“新游戏”或“退出”），设置一个助记符（让玩家可以用键盘控制菜单），添加一个\
  \ `ActionListener` 对象（在本例中，所有菜单项都使用同一个动作监听器），然后将该菜单项添加到文件菜单对象中。在方法末尾附近，我们创建了一个 `JMenuBar`\
  \ 对象。`JMenuBar` 对象可能更符合人们提到“菜单”时的认知，因为 `JMenuBar` 对象定义了程序顶部的整个菜单栏。有了 `JMenuBar`\
  \ 对象后，我们将文件菜单对象添加到其中，最后将整个菜单添加到我们的窗口（同样，由我们的 `JFrame` 对象定义）。\n\n现在我们已经看完了所有方法，接下来应该看看\
  \ `MineSweeper` 类中的字段。这些字段是类顶部的变量。为了省去你在本书页面间来回翻找的麻烦，清单 7-11 展示了这些字段的定义。\n\n***清单\
  \ 7-11.** MineSweeper 的字段*\n\n`  int columns = 8;`\n`  int rows = 8;`\n`  int numberOfMines\
  \ = 10;`\n\n`  JFrame frame = new JFrame(\"扫雷\");`\n`  JPanel minePanel = new JPanel();`\n\
