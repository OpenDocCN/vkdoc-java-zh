  \ `MineIcon` 类的实例。要获取图标，我们可以使用调用类方法的语法。（请记住，类方法属于类本身，而不属于类的任何实例。）该语法是类名、句点以及方法的名称和参数，例如\
  \ `MineIcon.getMineIcon();`。\n\n静态方法相当常见。你可以将它们用于任何不需要包含类实例的任务。甚至完全由静态方法组成的类也相当常见。与\
  \ `MineIcon` 类一样，它们提供了不需要任何对象即可工作的功能。它们要么提供实用方法（例如，以特定应用程序所需的特殊方式格式化 `String` 对象），要么返回不需要任何其他输入即可找到的项目（例如我们的图标）。这看起来可能有点奇怪，因为你以前从未见过，但它为你的编程工具箱提供了另一个工具。\n\
  \n坚持住。我们快完成 `MineSweeper` 程序的代码了。只剩下两个用于监听用户操作（鼠标点击和菜单操作）的类了。让我们继续看 `MineSweeperMouseListener`\
  \ 类，如清单 7-28 所示。\n\n***清单 7-28.** MineSweeperMouseListener 类*\n\n`package com.apress.java7forabsolutebeginners.examples.MineSweeper;`\n\
  \n\n\n`import java.awt.event.MouseEvent;`\n`import java.awt.event.MouseListener;`\n\
  \n`import javax.swing.JButton;`\n\n`public class MineSweeperMouseListener implements\
  \ MouseListener {`\n\n`  private MineSweeper mineSweeper;`\n`  private MineSweeperHelper\
