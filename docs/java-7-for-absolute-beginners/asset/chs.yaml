  现在让我们看看烟花绘图面板。在 `Fireworks` 类中使用 `Timer` 对象也简化了这个类。我们不再需要实现 `Runnable` 接口、拥有 `run`\
  \ 方法或指定何时重绘。同样，`Timer` 类替我们完成了所有这些工作，让我们可以专注于在面板上绘制我们想要的对象集合。清单 10-4 展示了 `FireworksPanel`\
  \ 类。\n\n***清单 10-4.** FireworksPanel 类*\n\n`package com.bryantcs.examples.animation;`\n\
  \n`import java.awt.Graphics;`\n\n`import javax.swing.JPanel;`\n\n`public class FireworksPanel\
  \ extends JPanel{`\n\n`  private static final long serialVersionUID = 1L;`\n`  private\
  \ Firework[] fireworks = new Firework[4];`\n\n`  FireworksPanel() {`\n`    init();`\n\
  `  }`\n\n`  void init() {`\n`    for (int i = 0; i < 4; i++) {`\n`      fireworks[i]\
  \ = new Firework((int)(Math.random()`\n`        * this.getWidth()), this.getHeight(),\
  \ 30);`\n`    }`\n`  }`\n\n\n\n`  public void reset() {`\n`    init();`\n`  }`\n\
  `  public void paint (Graphics g) {`\n`    super.paintComponent(g);`\n`    for (int\
  \ i = 0; i < 4; i++) {`\n`      if (fireworks[i].isDone()) {`\n`        fireworks[i]\
  \ = new Firework((int)(Math.random()`\n`          * this.getWidth()), this.getHeight(),\
  \ 30);`\n`      }`\n`      fireworks[i].draw(g);`\n`    }`\n`  }`\n`}`\n\n`FireworksPanel`\
  \ 类的全部工作就是管理我们想要绘制的对象集合，因此我们来看看定义单个对象的类。`Firework` 类使用随机颜色在屏幕一半高度处绘制一条线，然后创建由十二根均匀分布的线条组成的爆裂效果。概念上很简单，但需要一些代码才能让数学计算正确。代码清单\
  \ 10-5 展示了 `Firework` 类。\n\n***代码清单 10-5.** Firework 类*\n\n`package com.bryantcs.examples.animation;`\n\
  \n`import java.awt.Color;`\n`import java.awt.Graphics;`\n\n`public class Firework\
  \ {`\n\n`  private int startX, startY, burstX, burstY, burstStep, currentStep, panelHeight,\
  \ steps;`\n`  Color color;`\n\n`  // 需要相当多的设置工作来确定`\n`  // * 起始位置`\n`  // * 爆裂位置`\n\
  `  // * 当前步骤`\n`  // * 总步骤数`\n`  Firework(int x, int height, int ticks) {`\n`  \
  \  panelHeight = height;`\n`    steps = ticks;`\n`    startX = x;`\n`    startY\
  \ = height;`\n`    burstX = x;`\n`    burstY = height >> 1;`\n`    burstStep = ticks\
  \ >> 1;`\n`    currentStep = 0;`\n`    color = new Color((int)(Math.random() * 0xFFFFFF));`\n\
  `  }`\n\n`  void draw(Graphics g) {`\n`    Color drawColor = color;`\n`    g.setColor(drawColor);`\n\
  `    int height = panelHeight - panelHeight / steps * currentStep;`\n`    // 原点位于屏幕顶部，因此我们通过检查当前高度是否大于爆裂高度`\n\
  `    // 来判断是否位于下半部分。这看起来是反的，但实际就是这样工作的。`\n`    if (height > burstY) {`\n`      //\
  \ 如果位于面板下半部分，只需绘制`\n`      // 代表烟花弹上升的线条。`\n`      g.drawLine(startX, startY, burstX,\
  \ height);`\n`    }`\n\n`    if(currentStep >= burstStep) {`\n`      // 到达爆裂点时，绘制\
  \ 12 条线组成一个圆形。`\n`      // 为此，我们需要一点三角学知识。`\n`      for (int i = 0; i < 12; i++)\
  \ {`\n`        double xPrime, yPrime;`\n`        double currentRadians = Math.toRadians(30\
  \ * i);`\n\n`        int length = burstY / 2 / steps * currentStep;`\n`        xPrime\
  \ = (Math.cos(currentRadians)`\n`            - Math.sin(currentRadians)) * length;`\n\
  `        yPrime = (Math.sin(currentRadians)`\n`            + Math.cos(currentRadians))\
  \ * length;`\n`        int endX = new Double(xPrime).intValue() + burstX;`\n`  \
  \      int endY = new Double(yPrime).intValue() + burstY;`\n\n`        g.drawLine(burstX,\
  \ burstY, endX, endY);`\n`      }`\n`    }`\n`    currentStep++;`\n`  }`\n`  //\
  \ 此烟花已完成，因此面板`\n`  // 类可以将其交由垃圾回收处理。`\n`  public boolean isDone() {`\n`    return\
  \ currentStep >= steps;`\n`  }`\n`}`\n\n顺便提一下，你可以使用类似的代码来绘制子弹飞出并击中目标爆炸的效果。想法之间往往相似，因此相同的代码通常只需稍加修改就能用于不同的目的，而这就是其中一个例子。我鼓励你创建那个动画。尝试同时使用全部\
  \ 12 条射线（从中心辐射出的线条）以及仅使用未覆盖目标的射线（这可能更逼真，具体取决于你选择模拟的事件类型）。\n\n### 精灵动画\n\n到目前为止，我们专注于绘制由圆形和线条组成的简单对象。你可以使用相同的技术创建更复杂的对象，但使用一系列图像通常更容易。这些图像被称为*精灵*。许多动画依赖精灵来创建复杂的图像，如果通过编程方式创建这些图像需要大量代码（从而耗费大量时间）。此外，使用图像可以让公司雇佣艺术家创建图像，并让程序员创建动画。因此，图像和代码的质量都得到提升，从而制作出更好的程序。关注点分离也是一条适用于商业的良好原则，在商业中通常被称为专业化。\n\
  \n在本例中，我们创建了一个由四幅图像组成的简单精灵，代表一个不断扩大的靶心。图 10-4 展示了全部四幅精灵图像，并放大十倍显示。\n\n![images](img/1004.jpg)\n\
  \n***图 10-4.** MouseSprites 程序使用的精灵*\n\n我将其放大十倍，以揭示在显示器（或电视、手机或任何数字显示设备）上绘制事物的原理——没有曲线。你在屏幕上看到的任何曲线都是一系列直线（每条直线称为曲线的一个线段）的集合。线段越多，效果越逼真，但本质上没有曲线。在屏幕上创建一个圆形（`Graphics`\
  \ 类中的 `drawOval` 方法可以完成此操作），然后仔细观察它（例如通过截屏并放大）。你会发现它是一组直线。\n\n顺便说一句，我与一群出色的数字艺术家共事，他们最喜欢的名言出自《黑客帝国》，小女孩说：“没有勺子。”她意识到矩阵是一种幻觉，而大多数数字艺术家也意识到（并陶醉于）他们在制造幻觉。如果你喜欢制造幻觉，你可以在数字艺术和动画中获得很多乐趣（并拥有出色的职业生涯）。\n\
  \n我不是艺术家，所以我创建了一组简单的精灵。我还将计时器设置为四分之一秒，制作了一个相对较慢（游戏玩家可能会说非常慢）的动画。如果你仔细观察，可能能看到绘制出的单个图像。大多数动画的帧率要高得多（至少与电影相当），但这个动画很适合用来演示。\n\
  \n运行程序时，反复点击鼠标，看看能同时启动多少个动画。这可以证明你可以同时运行多个精灵动画（并测试你快速点击的能力——我们能够同时启动四个）。在每次点击之间移动鼠标，以便可以分别看到每个动画。\n\
  \n我还添加了一个功能：触发式动画。这个动画不是无限循环运行（可能通过按钮点击等操作停止和启动），而是响应事件运行一次。在本例中，触发器是鼠标点击。我添加这种技术是为了向你展示如何创建响应用户命令的动画。例如，你可能让一个无限循环绘制游戏中的大部分对象，并使用触发式动画来绘制爆炸以及因游戏事件而出现的其他元素。\n\
  \n关于精灵，还有一点需要了解：单个图像可以存储为单独的文件，也可以存储为单个文件（通常称为精灵表）。图 10-4 在正常缩放级别下就可以作为精灵表使用。对于单个文件的情况，程序加载的是图像的一部分，而不是整个图像。例如，许多涉及地图的游戏会将单个地形符号存储在一个文件中。Java\
  \ 图形 API 提供了一种读取部分图像的方法：`BufferedImage` 类中的 `getSubImage` 方法。\n\n代码清单 10-6 展示了一个精灵动画程序的程序类（名为\
  \ `MouseSprites`，因为它由鼠标点击触发）。\n\n***代码清单 10-6.** MouseSprites 类*\n\n`package com.bryantcs.examples.animation;`\n\
  \n\n\n`import java.awt.Color;`\n`import java.awt.Dimension;`\n`import java.awt.event.ActionEvent;`\n\
  `import java.awt.event.ActionListener;`\n`import java.awt.event.MouseEvent;`\n`import\
  \ java.awt.event.MouseListener;`\n\n`import javax.swing.JFrame;`\n`import javax.swing.JMenu;`\n\
  `import javax.swing.JMenuBar;`\n`import javax.swing.JMenuItem;`\n`import javax.swing.Timer;`\n\
  \n`public class MouseSprites implements ActionListener,` **`MouseListener`** `{`\n\
  \n`  private static final long serialVersionUID = 1L;`\n\n`  private MouseSpritePanel\
  \ mouseSpritePanel = new MouseSpritePanel();`\n\n`  private JFrame frame = new Jframe(\"\
  MouseSprites\");`\n`  // 这里是我们非常慢的计时器。每秒 4 次——呜！`\n`  private Timer timer = new\
  \ Timer(250, this);`\n\n`  private void addMenu(JFrame frame) {`\n`    JMenu file\
  \ = new JMenu(\"文件\");`\n`    file.setMnemonic('F');`\n`    JMenuItem exitItem =\
  \ new JMenuItem(\"退出\");`\n`    exitItem.setMnemonic('x');`\n`    exitItem.addActionListener(this);`\n\
  `    file.add(exitItem);`\n`    JMenuBar menuBar = new JMenuBar();`\n`    menuBar.add(file);`\n\
  `    frame.setJMenuBar(menuBar);`\n`  }`\n\n`  private void createAndShowGUI() {`\n\
  `    addMenu(frame);`\n`    frame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);`\n\
  `    mouseSpritePanel.setPreferredSize(new Dimension(400, 200));`\n`    mouseSpritePanel.addMouseListener(this);`\n\
  `    mouseSpritePanel.setBackground(Color.WHITE);`\n`    frame.getContentPane().add(mouseSpritePanel);`\n\
  `    frame.pack();`\n`    frame.setVisible(true);`\n`    timer.start();`\n`  }`\n\
  \n`  public static void main(String[] args) {`\n`    MouseSprites mouseSprite =\
  \ new MouseSprites();`\n`    mouseSprite.createAndShowGUI();`\n`  }`\n\n`  // 此方法监听计时器`\n\
  `  public void actionPerformed(ActionEvent e) {`\n`    if (e.getActionCommand()\
  \ != null) {`\n`      // 如果用户选择退出，则退出程序`\n`      if (e.getActionCommand().equals(\"\
  退出\")) {`\n`        timer.stop();`\n`        System.exit(0);`\n`      }`\n`    }`\n\
  `    // 否则，重新绘制面板`\n`    // （这就是我们实现动画的方式）`\n`    mouseSpritePanel.repaint();`\n\
  `  }`\n\n**`@Override`**\n**`public void mouseClicked(MouseEvent e) {`**\n**`}`**\n\
  \n**`@Override`**\n**`public void mouseEntered(MouseEvent e) {`**\n**`}`**\n\n**`@Override`**\n\
  **`public void mouseExited(MouseEvent e) {`**\n**`}`**\n\n**`@Override`**\n**`public\
  \ void mousePressed(MouseEvent e) {`**\n**`}`**\n\n**`// 此方法添加一个新的、不断扩大的靶心。`**\n\
  **`@Override`**\n**`public void mouseReleased(MouseEvent e) {`**\n**`mouseSpritePanel.add(e.getX(),\
  \ e.getY());`**\n**`}`**\n`}`\n\n如你所见，这个类与 `Fireworks` 类类似，只是增加了实现 `MouseListener`\
  \ 接口（及其所有必需的方法）。我们将 `MouseListener` 的实现（在类的顶部）和 `MouseListener` 的方法（在类的底部）加粗，以便于查找。与\
  \ `Fireworks` 类一样，`MouseSprites` 类有一个计时器来控制绘制新精灵的频率，并且有一个面板类来提供绘制精灵的位置。\n\n![images](img/square.jpg)\
  \ **注意** 你必须创建一个名为 C:\\test\\sprites（在 Windows 上）或 C:/test/sprites（在 Unix 或 Linux\
  \ 上）的目录，并将精灵图像放入该目录，程序才能显示精灵。或者，你也可以将图像放在其他位置，并修改代码指向该目录。\n\n更复杂的程序可能会将精灵文件的位置作为程序参数传入。通常认为在程序中硬编码路径和文件名是不好的做法，但我不想引入从参数读取路径的额外复杂性（我想专注于动画）。如果你想对这个简单程序进行扩展，将位置作为参数添加会是一个不错的练习。如果这样做，请记住该参数应在\
  \ `MouseSprites` 类的 `main` 方法中处理，而不是在 `MouseSpritePanel` 类中。清单 10-7 展示了 `MouseSpritePanel`\
  \ 类。\n\n***清单 10-7.** MouseSpritePanel 类*\n\n\n\n`package com.bryantcs.examples.animation;`\n\
  \n`import java.awt.Graphics;`\n`import java.awt.Image;`\n`import java.io.File;`\n\
  \n`import java.io.IOException;`\n`import java.util.ArrayList;`\n\n`import javax.imageio.ImageIO;`\n\
  `import javax.swing.JPanel;`\n\n`public class MouseSpritePanel extends JPanel {`\n\
  \n`  private static final long serialVersionUID = 1L;`\n\n`  private Image[] spriteImages\
  \ = new Image[4];`\n`  private ArrayList<MouseSprite> currentSprites = new ArrayList<MouseSprite>();`\n\
  \n`  MouseSpritePanel() {`\n`    try {`\n`      spriteImages[0] = ImageIO.read(new`\n\
  `      File(\"C:\\\\test\\\\sprites\\\\sprite1.png\"));`\n`      spriteImages[1]\
  \ = ImageIO.read(new`\n`      File(\"C:\\\\test\\\\sprites\\\\sprite2.png\"));`\n\
  `      spriteImages[2] = ImageIO.read(new`\n`      File(\"C:\\\\test\\\\sprites\\\
  \\sprite3.png\"));`\n`      spriteImages[3] = ImageIO.read(new`\n`      File(\"\
  C:\\\\test\\\\sprites\\\\sprite4.png\"));`\n`    } catch (IOException e) {`\n`      System.out.println(\"\
  无法打开精灵文件\");`\n`      System.exit(1);`\n`    }`\n`  }`\n\n`  void add (int x, int\
  \ y) {`\n`    MouseSprite newSprite = new MouseSprite(x, y, spriteImages, this);`\n\
  `    currentSprites.add(newSprite);`\n`  }`\n\n`  public void paint (Graphics g)\
  \ {`\n`    super.paintComponent(g);`\n`    for (int i = 0; i < currentSprites.size();\
  \ i++) {`\n`      MouseSprite currentSprite = currentSprites.get(i);`\n`      if\
  \ (!currentSprite.isDone()) {`\n`        currentSprite.draw(g);`\n`      } else\
  \ {`\n`        currentSprite = null;`\n`        currentSprites.remove(i);`\n`      }`\n\
  `    }`\n`  }`\n`}`\n\n`MouseSpritePanel` 类管理一组图像，并将这些图像传递给每个新的 `MouseSprite` 对象。当每个精灵完成自身绘制后，`MouseSpritePanel`\
  \ 会移除该精灵对象，以避免列表杂乱，并让已完成的精灵被垃圾回收。否则，我们将面临失控的内存泄漏，这将构成糟糕的编程实践。\n\n`MouseSprite` 类（如清单\
  \ 10-8 所示）依次绘制四个精灵中的每一个。从概念上讲，它与 `Firework` 类类似，都是先在屏幕上绘制其组成部分，然后宣告绘制完成，以便持有其引用的类可以释放该引用，从而让系统垃圾回收这个现已无用的\
  \ `MouseSprite` 对象。\n\n***清单 10-8.** MouseSprite 类*\n\n`package com.bryantcs.examples.animation;`\n\
  \n`import java.awt.Graphics;`\n`import java.awt.Image;`\n`import java.awt.image.ImageObserver;`\n\
  \n`import javax.swing.JPanel;`\n\n`public class MouseSprite {`\n`  private int spriteX,\
  \ spriteY, step;`\n`  private boolean done = false;`\n`  Image[] spriteImages= new\
  \ Image[4];`\n`  JPanel spritePanel;`\n\n`  MouseSprite(int x, int y, Image[] images,\
  \ JPanel panel) {`\n`    spriteX = x;`\n`    spriteY = y;`\n`    step = 0;`\n`    spriteImages\
  \ = images;`\n`    spritePanel = panel;`\n`  }`\n\n`  void draw(Graphics g) {`\n\
  `    ImageObserver observer = spritePanel;`\n`    if (step < 4) {`\n`      g.drawImage(spriteImages[step],\
  \ spriteX, spriteY, observer);`\n`      step++;`\n`    } else {`\n`      done =\
  \ true;`\n`    }`\n`  }`\n\n`  public boolean isDone() {`\n`    return done;`\n\
  `  }`\n`}`\n\n图 10-5 展示了 MouseSprite 程序。\n\n![images](img/1005.jpg)\n\n***图 10-5.**\
  \ MouseSprite 程序*\n\n在截图中我只能捕捉到两个靶心。这种试图捕捉动画运动瞬间的问题，正是动画程序员经常添加开关来减慢或停止动画的原因之一。对于非游戏类动画（例如旋转的医学图像或法庭上使用的动画），慢放、暂停和快进选项是必不可少的。另一个不错的练习是向\
  \ MouseSprite 程序添加停止功能（例如，右键单击可以停止和启动动画）。\n\n`MouseSprite` 类在其过程的每个部分绘制不同的图像，然后设置一个标志来表示绘制完成。正如我们之前所见，管理各个\
  \ `MouseSprite` 对象的类（`MouseSpritePanel`）可以检测何时移除 `MouseSprite` 对象。\n\n### 总结\n\n\
  在本章中，我们介绍了使用 Java 创建动画的基础知识。具体来说，我们讨论了以下内容：\n\n*   如何使用 Java 的 Graphics 包在屏幕上绘图\n\
  *   如何使用线程控制动画\n*   如何使用定时器控制动画\n*   定时器如何比线程提供更好的控制，因此我们应该优先使用定时器\n*   如何创建定时动画\n\
  *   如何创建触发式动画\n*   如何将文件中的图像显示到屏幕上\n\n在本章的初稿中，我没有添加屏幕截图。我最初省略它们是因为我们希望你在阅读本书时运行代码。我的编辑（你好，Ewan）指出，读者可能希望看到它们，即使他们正在运行代码，也能了解程序正确运行时的效果。因为\
  \ Ewan 说得有道理，所以我添加了它们，尽管屏幕截图远不如在你自己的计算机上观看动画运行效果好。我也希望你在阅读本书时能“捣鼓”代码。不要只是运行你在书中看到的代码。根据你自己的思路修改书中的代码。书中的所有代码都属于你，所以你可以随意修改。更好的是，编写你自己的程序来创建你自己的动画。我已经尝试提供了一些想法，我想你也有很多想法。\n\
  \n作为本章的结束语，这一章是我最喜欢写的章节之一。我发现创建动画很有趣。如果你也同意，我鼓励你将动画编程作为爱好或职业（或两者兼有——我合作的许多同事回家后还会利用自己的时间做更多项目）。这会很有回报，无论是看到你的想法在屏幕上变为现实，还是从经济角度而言，因为这是一项许多雇主都看重的技能。\n\
  \n## 第 11 章\n\n\n\n## 使用 Eclipse 进行调试\n\n并非每个错误都会抛出异常；有时，由于编程不佳，你的代码会完全做错事，但不会抛出异常。计算机确实完全按照你告诉它的指令执行了，但它并没有执行你的本意。编程时，记住这一点很有帮助：计算机只是由硅和各种金属构成的构造，因此它实际上就像一盒石头一样愚蠢。它没有意识能力来调整你的错误，就像另一个人在你说话或写作时做的那样。\n\
  \n软件开发人员喜欢异常。每次 Java 抛出异常时，它都会提供一个堆栈跟踪，显示导致异常的类和方法（以及其中的行号）。这使得查找和修复错误变得容易。\n\n\
  然而，在没有异常的情况下，你必须要么通过检查程序逻辑来推理，要么使用调试器。有时，仅检查逻辑就能解决问题。但其他时候，只有调试器才能胜任。正如我的编辑们肯定能告诉你的那样，我经常忽略自己的错误。我知道我本意要写什么，却忽略了我实际写的内容。同样的问题也适用于编程：我们知道我们打算做什么，却常常忽视我们实际做了什么。调试器迫使你以不同的方式看待代码，这可以帮助你找到问题。此外，调试器会一次一行地“单步执行”代码。这种狭窄的范围（单行）让你能够真正集中精力找到任何错误。\n\
  \nEclipse 包含一个功能齐全的调试器，本章的其余部分将描述如何使用该调试器来追踪和修复问题。Java 还有其他调试器，并且 Java 包含一个名为 JDB（Java\
  \ 调试器）的命令行调试器。但是，我认为 Eclipse 调试器更易于使用，并提供了所需的所有功能。不管怎样，我通常在自己的工作中使用它。\n\n我在第 10\
  \ 章“动画”中的“烟花”程序遇到了一个问题，必须使用调试器才能找到，所以我将用那个程序作为我们调试练习的示例。实际上，我将首先向你展示一个我使用 Eclipse\
  \ 调试器解决的问题。图 11-1 显示了我让“烟花”程序正确运行之前搞砸的样子。\n\n![images](img/1101.jpg)\n\n***图 11-1.**\
  \ 烟花程序问题*\n\n如你所见，我不小心制造了探照灯而不是烟花。问题是：我是怎么做到的？由于我第一次阅读代码时答案并没有直接跳出来，所以我使用了调试器来推理这个问题。一如既往，99%\
  \ 的努力都花在了寻找问题上。一旦你达到“啊哈！”的时刻，实际修复问题通常只需要很少的时间（除了那些你发现需要重写整个程序的时候——那些是糟糕的日子。）\n\n\
  不过，在我们分析哪里出了问题之前，你需要更多地了解一般的调试知识，特别是如何使用 Eclipse 调试器，所以我们将在本章末尾回到这个出错的烟花程序。\n\n\
  ### 调试流程\n\n在我们深入 Eclipse 调试器之前，我认为最好先概述一下整个调试过程。\n\n1.  识别问题。这听起来很简单，但通常并非如此。在复杂的系统中（有时甚至在简单的系统中），仅仅陈述问题所在就可能很棘手。问问自己：到底是哪个行为出错了？\n\
  2.  在你认为（通常你无法完全确定）会在问题发生之前执行的一行代码上设置断点。随着你调试技能的提高，你会更擅长设置初始入口点。\n3.  单步跳过代码行，直到遇到错误。你刚刚跳过的那一行就是问题行（或者可能是多个问题行之一，如果你有嵌套问题的话）。如果有帮助，可以在执行过程中检查变量的值。这在循环中特别有用。\n\
  4.  在该行设置断点并重新启动应用程序。当到达那一行时，单步跳入。\n5.  交替使用单步跳过和单步跳入，直到最终在最底层找到有缺陷的代码。同样，在执行过程中检查与问题相关的任何变量的值。\n\
  \n通过遵循上述一般流程，你可以使用调试器精确定位程序在何处执行了你不想让它做的事情，即使它没有抛出异常。\n\n### 没有调试器的调试\n\n在 Java\
  \ 的早期（大约 1995 年），无论是在命令行还是在像 Eclipse 这样优秀的程序中，都没有调试器。然而，我们这些使用 Java 的人仍然必须找到并修复我们的错误。因此，我们退而求其次，采用了向控制台写入值的旧方法。`System.out.println()`\
  \ 方法曾是我们的朋友（尽管我们肯定厌倦了编写它）。我们会在任何怀疑存在错误的地方添加打印语句，以显示所有相关变量的值。通过这种方式，我们可以在代码运行时检查这些值。这是对使用实际调试器进行单步跳过和跳入的一种拙劣替代，但它确实有效。\n\
  \n即使有调试器可用，程序员有时仍然会使用这种技术。例如，如果我认为只需一两个打印语句就能快速找出问题，我会先尝试这种方法。如果你以这种方式使用打印语句，请记住在解决问题后删除它们。我曾因遗留的打印语句而在不止一次代码审查中感到尴尬。\n\
  \n幸运的是，你学习 Java 时，成熟的工具已经创建出来，所以你不需要依赖打印语句。为此，让我们启动 Eclipse 调试器，看看它是如何工作的。\n\n###\
  \ 启动 Eclipse 调试器\n\n启动 Eclipse 调试器：\n\n1.  打开 Eclipse。\n2.  从 **Window** 菜单中，选择\
  \ **Open Perspective**，然后选择 **Debug**。调试透视图就会出现。\n\n![images](img/square.jpg) **提示**\
  \ 在第一次打开调试透视图后，Eclipse 工具栏右侧会出现一个快捷按钮。将来，你可以通过单击该按钮切换到调试透视图，并通过单击 **Java** 按钮切换回常规透视图。\n\
  \n让我们从打开 Firework 类（控制绘制单个烟花的对象）开始。当你第一次在调试透视图中打开 Firework 类时，你会看到一个与图 11-2 非常相似的屏幕。\n\
  \n![images](img/1102.jpg)\n\n***图 11-2.** Eclipse 调试透视图*\n\n让我们更详细地看看这个屏幕。你可以在应用程序中间左侧的面板中看到代码。中间右侧的面板显示类的轮廓。到目前为止，它与\
  \ Java 透视图相同，但空间小得多。左上角区域显示调试面板和一个切换回导航器面板的选项卡。当你运行调试器时，调试面板会显示调用堆栈（程序到达当前点所经过的所有对象）。右上角区域显示断点和变量。我们稍后会讨论断点和变量。最后，底部面板显示了许多可能的视图。调试时，你通常希望看到控制台视图。\n\
  \n如果你的调试器看起来和我的不完全一样，请不要担心。像每个软件开发人员一样，我对自己的环境进行了一些定制，而且我们可能使用不同的版本。不过，总体布局仍然是相同的，这足以向你展示相关部分。\n\
  \n\n\n### 断点与变量\n\n断点是代码中你希望暂停程序执行的位置。计算机逐条指令运行程序，因此你可以中断指令流，让计算机等待，同时查看代码在特定位置产生的值。幸运的是，计算机不会感到无聊，所以你可以让它们想等多久就等多久。\n\
  \n调试应用程序时，你可以在希望调试器暂停的任何位置创建临时断点，这些断点会显示在“断点”视图中。调试器会让你的应用程序一直运行，直到到达代码中的某个断点位置；随后它会挂起你的程序，并在“变量”视图中显示各种对象和基本类型的值。\n\
  \nEclipse 允许你设置多种不同类型的断点：\n\n*   行断点\n*   异常断点\n*   类加载断点\n*   观察点\n*   方法断点\n*\
  \   打印点\n\n我只会介绍行断点，因为它们几乎能解决你可能会遇到的所有问题——在我的职业生涯中，很长一段时间里除了行断点之外从未使用过其他类型。不过，我鼓励你自己去研究其他类型的断点。可以先从阅读\
  \ Eclipse 帮助文件中关于断点的内容开始。\n\n#### 设置行断点\n\n要设置行断点：\n\n1.  在要设置断点的代码行左侧的狭窄区域中右键单击。\n\
  2.  选择**切换断点**。在你右键单击的行上会出现一个断点，如图 11-3 所示。`draw` 方法中第一行最左侧的蓝点就是断点指示器。当你的程序运行时，它会在该位置暂停，并显示当时作用域内所有对象和基本类型的值。\n\
  \n![images](img/1103.jpg)\n\n***图 11-3.** 代码中的断点：*\n\n让我们看看运行程序时会发生什么（图 11-4）。\n\
  \n![images](img/1104.jpg)\n\n***图 11-4.** 执行在断点处暂停：*\n\n注意高亮为绿色的行。该绿色行表示当前的执行点（即程序被暂停前正在处理的那一行）。当调试器在某一行暂停时，它会在“变量”列表中显示该行作用域内的值，在“大纲”面板中显示包含该行的方法，并在“调试”面板中显示调用堆栈。从这里开始，你可以单步执行代码，可以一次执行一行，甚至可以在行内逐步执行。我们稍后会介绍单步执行。不过，首先请确保你理解了作用域的概念。\n\
  \n#### 关于作用域\n\n“在作用域内”是什么意思？在作用域内的对象和基本类型（即变量）是指在程序的特定位置能够被使用的那些。以上面的断点为例，我们唯一能看到的局部值是\
  \ `g`，即用于绘图的 `Graphics` 类的实例。然而，我们还能看到一个名为 `this` 的值，它代表包含该方法的类。通过展开变量列表中的 `this`\
  \ 条目，我们可以查看在其中声明的所有类变量（而不是在方法中声明的）。图 11-5 展示了 `this` 值展开后的视图。\n\n![images](img/1105.jpg)\n\
  \n***图 11-5.** 展开的包含类值 `this`*\n\n如你所见，展开的 `this` 列表显示了所有类变量的值（条目左侧的箭头表示该条目可以展开）。点击其中一个条目，其详细信息会显示在“变量”视图的底部。在这个例子中，我们可以看到构成这个特定烟花颜色的\
  \ RGB 值（红、绿、蓝的值）。你也可以右键点击该条目获取更多信息，但我们暂时跳过这一步。一旦你掌握了调试的基础知识，就可以尝试那些更高级的功能。\n\n#####\
  \ 单步执行：\n\n调试器中的“单步执行”指的是移动到程序中下一个执行点的能力。为了方便，Eclipse 提供了三种单步执行命令：单步跳入、单步跳过和单步返回。图\
  \ 11-6 显示了调试工具栏上的单步执行按钮。\n\n![images](img/1106.jpg)\n\n***图 11-6.** 调试工具栏上的单步执行控件标注*\n\
  \n你也可以使用功能键进行单步执行。**F5** 对应单步跳入，**F6** 对应单步跳过，**F7** 对应单步返回。\n\n###### 单步跳入\n\n\
  当你单步跳入一行时，你会进入该行中可能存在的任何方法的开头。考虑 `draw` 方法中的第二行：\n\n`g.setColor(drawColor);`\n\n\
  当你单步跳入该行时，你会跳转到 `Graphics` 类中 `setColor` 方法的顶部。这可能没什么大用；你只希望使用此命令跳入你自己的代码。\n\n对于某些行，单步跳入与单步跳过效果相同，因为该行中没有任何内容会改变执行点。例如，单步跳入\
  \ `draw` 方法的第一行与单步跳过它的效果相同，因为该行只是将一个值赋给另一个值。\n\n###### 单步跳过\n\n当你单步跳过一行时，你让调试器运行该行可能调用的所有方法。这包括这些方法可能调用的任何类和方法，依此类推。有时，这相当于很少的代码；其他时候，则可能是\
  \ Java 库的一大块代码。\n\n单步跳过是找到程序中问题所在位置的好方法。一直单步跳过，直到问题行为出现。这样你就知道是哪一行出了问题。从那里开始，你可以单步跳入该行下的方法，然后在这些方法中单步跳过，直到再次遇到问题点。因此，通过在单步跳过和单步跳入代码之间来回切换，你可以逐步缩小范围，最终定位到代码中的故障。\n\
  \n###### 单步返回\n\n单步返回让程序一直运行，直到当前方法返回。单步返回实际上只是一个便利功能，这样你就不必单步执行一个方法中的所有行。如果你单步跳入一个方法，并意识到它不可能是问题的根源，那么单步返回提供了一种方便的方式来继续前进。\n\
  \n#### 移除行断点\n\n你可能已经注意到，创建断点的命令是**切换断点**。切换一个已有的断点会将其移除。\n\n#### 禁用行断点\n\n有时，保留一个断点但暂时不使用它会很方便。例如，当你追踪另一个必须先修复的\
  \ bug 时，可能会禁用一个断点，然后才能处理你最初开始修复的那个。你有时会发现一个 bug 实际上是一组嵌套的 bug，你必须先修复一个才能修复另一个。好消息是，识别出一个\
  \ bug 通常能让你对更大的问题有所了解，然后修复剩余的问题在很大程度上就变成了机械性的工作。不过，有时你会遇到一系列难以解决的问题，这时你就会庆幸有一个好用的调试器。要禁用断点：\n\
  \n1.  右键单击要禁用的断点。\n2.  选择禁用断点。\n\n\n\n#### 设置条件断点\n\n另一个常见需求是设置条件断点，即仅在变量达到特定值时触发断点。你也可以同时检查多个变量的值。\n\
  \n设置条件断点的方法如下：\n\n1.  右键单击你想要设置为条件的断点。\n2.  选择**断点属性**。此时将显示断点的属性窗口（参见图 11-7）。\n\
  \n    ![images](img/1107.jpg)\n\n    ***图 11-7.** 断点属性窗口：*\n\n3.  勾选**启用条件**复选框。\n\
  4.  在复选框下方的文本字段中，输入你的条件代码。这通常是一行普通的 Java 代码，不带分号。例如，如果你只想在 `currentStep` 的值大于等于\
  \ 15 时触发此断点，可以设置如图 11-8 所示的条件。\n\n    ![images](img/1108.jpg)\n\n    ***图 11-8.**\
  \ 已启用并指定断点条件：*\n\n5.  点击**确定**。\n\n当你让代码运行（并点击应用程序中的 **Go** 按钮开始绘图）时，稍等片刻后，你将看到如图\
  \ 11-9 所示的一组变量：\n\n![images](img/1109.jpg)\n\n***图 11-9.** 条件断点处的变量：*\n\n如你所见，当\
  \ `currentStep` 达到 15 时，程序停止了。\n\n### 调试技巧与诀窍\n\n既然你已经了解了使用 Eclipse 调试器的基本知识，这里有一些技巧和诀窍，可以在你使用任何调试器时提供帮助：\n\
  \n*   **在循环中要特别警惕。** 循环的本质是反复检查和定义一小部分值。因此，在遍历循环时，请仔细检查这些变量。我无法告诉你循环变量设置不当给我带来了多少次麻烦，但这种情况占了很大比例。\n\
  *   **在循环中使用条件断点。** 通常，问题直到某个特定值出现时才会暴露。反复观察同一组值并不有趣，而且无聊会削弱你的注意力，让你错过真正的问题。因此，请使用条件断点跳过那些你已知不是问题的部分。\n\
  *   **留意“复制粘贴”错误。** 如果你使用了从别处（包括本书）获取的代码，很容易忘记将变量从你借用的示例中的值更改为你需要的值。代码看起来可能正确，因为这是你寻找示例时读到的内容，但它实际上是错误的，因为它不符合你程序的需求。\n\
  *   **花时间理解代码。** 我常常急于完成那些我认为简单的事情，结果却发现它们并不简单。痛苦的经历教会了我，要花时间充分理解我正在使用的代码（无论是来自库、示例还是我自己的代码）。只有全面理解代码的每一个细节，你才能理解调试器给出的结果。\n\
  \n顺便说一句，最后一点实际上是开发人员所做的最困难的事情之一。将代码库中的所有关系都装进你的大脑，从而清晰地了解其工作原理——这通常被称为“可视化”——是一项艰巨的任务。优秀的开发人员都擅长可视化。这也是为什么许多开发人员同时也是优秀的音乐家、顶级的电子游戏玩家，或者两者兼备。这三项追求都需要良好的可视化技能，而所有优秀的开发人员也都是优秀的解谜者，原因相同。相比正规教育甚至经验，可视化是成为优秀开发人员的关键。当然，教育和经验有助于你培养和完善你的可视化技能。\n\
  \n### 修复烟花程序\n\n既然你已经掌握了足够的知识来理解我如何使用调试器查找并修复问题，我们可以回到我的问题上：我想要烟花效果，却得到了探照灯效果。\n\
  \n我首先要做的是找出问题出在哪里。幸运的是，我已经将绘制单个烟花的全部代码隔离到了 `Firework` 类的 `draw()` 方法中。请记住，每个方法应该只完成一个易于识别的任务。使调试更容易，是\
  \ Java 开发人员遵循这一实践的最重要原因之一。\n\n烟花程序清单 11-1 展示了导致问题的方法版本。\n\n***清单 11-1.** 有缺陷的 `Firework.draw()`\
  \ 方法*\n\n`void draw(Graphics g) {`\n`  Color drawColor = color;`\n`  g.setColor(drawColor);`\n\
  `  int height = panelHeight - panelHeight / steps * currentStep;`\n`  if (height\
  \ > burstY) {`\n`    g.drawLine(startX, startY, burstX, height);`\n`  }`\n`  if(currentStep\
  \ >= burstStep) {`\n`    for (int i = 0; i < 12; i++) {`\n**`double xPrime, yPrime;`**\n\
  `      double currentRadians = Math.toRadians(30 * i);`\n\n`      int length = burstY\
  \ / 2 / steps * currentStep;`\n`      xPrime = (Math.cos(currentRadians)`\n`          -\
  \ Math.sin(currentRadians)) * length;`\n`      yPrime = (Math.sin(currentRadians)`\n\
  `          + Math.cos(currentRadians)) * length;`\n`      int endX = new Double(xPrime).intValue();`\n\
  `      int endY = new Double(yPrime).intValue();`\n\n`      g.drawLine(burstX, burstY,\
  \ endX, endY);`\n`    }`\n`  }`\n`  currentStep++;`\n`}`\n\n在 draw 方法内部，我知道问题一定出在绘制十二条射线（从烟花中心到边缘的线条）的循环中。因此，我能够确定，单步执行代码的一个良好起点是\
  \ `for` 循环内的第一行。\n\n从这个断点开始，我逐行执行，直到 `for` 循环内的最后一行（即，直到我到达 `drawLine` 方法）。此时，我发现\
  \ `endX` 和 `endY` 的值出乎我的意料，我得到了第一个线索。（调试常常让我感觉自己像个侦探——也许这就是我如此喜欢夏洛克·福尔摩斯的原因。）图 11-10\
  \ 显示了调试器中的值。\n\n![images](img/1110.jpg)\n\n***图 11-10.** 调试器中显示的错误值*\n\n让我发现问题的是，`endX`\
  \ 和 `endY` 的值与线条长度的值相同。这两个值应该位于面板宽度和高度的中间附近，即 `endX` 约为 200，`endY` 约为 100（尽管由于起始\
  \ X 位置是随机的，`endX` 的变化可能比 `endY` 大得多）。\n\n因此，在第二次调试运行时，我特别关注了 `endX` 和 `endY` 被定义的地方：就在调用\
  \ `drawLine` 方法之前的那两行代码。这时我才意识到，我忘记了考虑屏幕边缘的偏移量（这是一个“拍脑门”的时刻，我骂自己是白痴，但至少我找到了问题）。\n\
  \n最后，我将代码修正为你之前在第 10 章中看到的版本，我将在清单 11-2 中再次给出。\n\n***清单 11-2.** 修正后的 `Firework.draw()`\
  \ 方法*\n\n`void draw(Graphics g) {`\n`  Color drawColor = color;`\n`  g.setColor(drawColor);`\n\
  `  int height = panelHeight - panelHeight / steps * currentStep;`\n`  if (height\
