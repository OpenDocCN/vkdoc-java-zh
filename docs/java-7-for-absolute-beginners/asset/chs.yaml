  `    if (option == 1) {`\n`      System.exit(0);`\n`    } else {`\n`      newGame(mineSweeper.rows,\
  \ mineSweeper.columns);`\n`    }`\n`  }`\n\n`  void newGame(int previousRows, int\
  \ previousColumns) {`\n`    for (int i = 0; i < previousRows; i++) {`\n`      for\
  \ (int j = 0; j < previousColumns; j++) {`\n`        mineSweeper.minePanel.remove(mineSweeper.mineButtons[i][j]);`\n\
  `      }`\n`    }`\n`    mineSweeper.init();`\n`    mineSweeper.minePanel.validate();`\n\
  `    mineSweeper.frame.validate();`\n`    mineSweeper.frame.pack();`\n`    updateLabels();`\n\
