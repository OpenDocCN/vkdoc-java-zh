  `          int count = mineSweeper.mineField.countAdjacentMines(i, j);`\n`     \
  \     if (count > 0) {`\n`            thisButton.setIcon(MineIcon.getNumberIcon(count));`\n\
  `          }`\n`        }`\n`      }`\n`    }`\n`  }`\n\n`showAll` 方法的任务很简单，就是揭示所有内容，并从所有位置移除鼠标监听器。它只在游戏结束时被调用，无论玩家是赢是输。如果玩家赢了，为什么还要显示所有内容？玩家可能没有在所有有地雷的位置设置地雷图标，甚至可能在判断错误的情况下仍然获胜。我们希望在游戏结束时完整呈现游戏的真实状态，因此我们为所有没有地雷的位置清除并设置正确的数字图标（包括无图标），并为所有有地雷的位置设置地雷图标。如果玩家赢了，这样做可以确认玩家的准确性。如果玩家输了，展示游戏的真实状态可以揭示错误，可能让玩家学会更好地玩这个游戏。\n\
  \n注意，这里没有 `MineIcon` 类的实例，但我们仍然可以从中获取图标。我们将在讲到 `MineIcon` 类时了解其工作原理。现在，让我们继续看 `endGame`\
  \ 方法。清单 7-25 展示了 `endGame` 方法。\n\n***清单 7-25.** MineSweeperHelper 的 endGame 方法*\n\
  \n\n\n`  void endGame(boolean won) {`\n`    showAll();`\n`    String wonOrLost;`\n\
  `    int option;`\n`    if (won) {`\n`      wonOrLost = \"You won!\";`\n`    } else\
  \ {`\n`      wonOrLost = \"You lost.\";`\n`    }`\n`    option = JOptionPane.showConfirmDialog(mineSweeper.frame,\
  \ wonOrLost`\n`            + \" Play again?\", wonOrLost,`\n`        JOptionPane.YES_NO_OPTION);`\n\
  `    if (option == 1) {`\n`      System.exit(0);`\n`    } else {`\n`      newGame(mineSweeper.rows,\
  \ mineSweeper.columns);`\n`    }`\n`  }`\n\n正如我们在 `showAll` 方法的描述中所见，`endGame` 方法调用了\
  \ `showAll` 方法。然后它会向玩家显示一个对话框，告知玩家是赢了还是输了，并询问玩家是否要再玩一局。为了显示这个对话框，我们使用了 `JOptionPane`\
  \ 类，这是在 Swing 中显示对话框的一种方式。之所以叫 `JOptionPane`，可能是因为它提供了多种不同的选项。如果你查阅 `JOptionBox`\
  \ 的 JavaDoc，会发现它有许多构造方法，每个构造方法都会创建一种不同类型的对话框。在这个场景中，我们需要一个包含消息、“是”按钮、“否”按钮，并且能够让我们知道玩家点击了哪个按钮的对话框。为了实现这一切，我们创建了一个\
  \ `String` 对象来保存消息（要么是“You won!”，要么是“You lost.”），并定义了一个 `int` 值来保存 `JOptionPane`\
  \ 对象的返回值。返回值指示了用户点击了哪个按钮，其中 0 表示“是”，1 表示“否”。最后，如果用户选择了“否”（返回值为 1），我们以退出码 0 退出程序（这意味着程序正常关闭，而非因错误导致）。如果用户选择了“是”，我们就调用\
  \ `newGame` 方法，这是下一个方法。清单 7-26 展示了 `newGame` 方法。\n\n***清单 7-26.** MineSweeper 的\
  \ newGame 方法*\n\n`  void newGame(int previousRows, int previousColumns) {`\n`    for\
  \ (int i = 0; i < previousRows; i++) {`\n`      for (int j = 0; j < previousColumns;\
  \ j++) {`\n`        mineSweeper.minePanel.remove(mineSweeper.mineButtons[i][j]);`\n\
  `      }`\n`    }`\n`    mineSweeper.init();`\n`    mineSweeper.minePanel.validate();`\n\
  `    mineSweeper.frame.validate();`\n`    mineSweeper.frame.pack();`\n`    updateLabels();`\n\
  `  }`\n\n正如我们在 `updateButtons` 方法的描述中所见，当一个方法需要调用一系列其他方法时，调用方法最好只做这些事，并且它做的事情应该简单明了。否则，你可能会得到一个难以理解和调试的方法。此外，因为存在这种问题的方法过于复杂，它恰恰是错误容易产生的地方。所以，这样的方法不仅难以调试，而且你很可能不得不去调试它——这真是双重打击。\n\
  \n就 `newGame` 方法而言，它执行一个简单的任务（从雷区面板中移除所有按钮），然后调用一系列其他方法来完成设置新游戏和更新界面的工作。具体来说，它调用了\
  \ `MineSweeper` 类中的 `init` 方法，该方法会创建一个新的 `MineField` 对象，并在游戏区域中设置所有按钮。接着，它验证了 `MineSweeper`\
  \ 类中的 `minePanel` 对象，这确保了所有旧按钮不会显示，而 `init` 方法创建的新按钮会显示出来。然后，它验证了 `JFrame` 对象，这强制它正确地接受已更改的\
  \ `minePanel` 对象。（可以将 Swing 对象上的 `validate` 方法视为一种确保所有更改都能向用户显示的机制。）之后，它调用了 `JFrame`\
  \ 对象的 `pack` 方法，完成了刷新我们已更改的雷区界面的工作。最后，它将标签更新为初始值（这些值由 `init` 方法设置）。\n\n要做的事情很多，但我们通过让方法为我们执行明确定义的部分来管理它，而不是将所有内容都堆在一个地方，否则又会变得难以理解、难以调试，并且（最糟糕的是）更容易产生错误。请记住：如果你必须费劲才能弄清楚一个方法在做什么，那么它很可能需要拆分成多个方法。另一方面，这也可能意味着你的设计存在问题（很可能是一组设计不佳的类）。无论哪种情况，都要将难以理解的代码视为问题的信号，并想办法让它变得易于理解。\n\
  \n现在，让我们来看一个不寻常的类——`MineIcon` 类，如清单 7-27 所示。\n\n***清单 7-27.** MineIcon 类*\n\n`package\
  \ com.apress.java7forabsolutebeginners.examples.MineSweeper;`\n\n`import javax.swing.Icon;`\n\
  `import javax.swing.ImageIcon;`\n\n`public class MineIcon {`\n\n`  private static\
