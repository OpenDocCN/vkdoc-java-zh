  \ 构造函数*\n\n\n\n`  public MineSweeperHelper(MineSweeper mineSweeper) {`\n`    this.mineSweeper\
  \ = mineSweeper;`\n`  }`\n\n这个构造方法做的事情不多，但其所做之事至关重要。类中的所有方法都作用于 `MineSweeper` 类的一个实例，因此我们必须拥有一个实例供它们使用。构造方法为我们提供了这个实例。正如我们在\
  \ `MineSweeper` 类的构造方法中所见，`MineSweeper` 类将自身（通过 `this` 关键字）传递给该类（以及其他代表其执行工作的工具类）。这是辅助类的一种常见惯用法：辅助类必须与它所辅助的对象建立联系，才能执行任何操作。\n\
  \n接下来，我们来看下一个方法：`updateLabels`。清单 7-22 展示了 `updateLabels` 方法。\n\n***清单 7-22.** MineSweeperHelper\
  \ 的 updateLabels 方法*\n\n`  void updateLabels() {`\n`    mineSweeper.minesFoundLabel.setText(\"\
  已找到: \" + mineSweeper.mineField.getMinesFound());`\n`    mineSweeper.minesRemainingLabel.setText(\"\
  剩余: \" +`\n`        mineSweeper.mineField.getMinesRemaining());`\n`  }`\n\n没有比这更简单的了。`updateLabels`\
  \ 的任务很简单，就是更新显示已找到地雷数量和剩余待找地雷数量的标签。请记住，这些值是基于玩家的猜测，而非实际数值。玩家可能会猜错，从而导致数字错误。这也是游戏乐趣的一部分。\n\
  \n`updateButtons` 方法做的事情稍多一些，包括在网格上放置数字，我们将在清单之后更详细地探讨这一点。清单 7-23 展示了 `updateButtons`\
  \ 方法。\n\n***清单 7-23.** MineSweeperHelper 的 updateButtons 方法*\n\n`  void updateButtons()\
  \ {`\n`    for (int i = 0; i < mineSweeper.rows; i++) {`\n`      for (int j = 0;\
  \ j < mineSweeper.columns; j++) {`\n`        if (mineSweeper.mineField.getMineCleared(i,\
  \ j) == true) {`\n`          mineSweeper.mineButtons[i][j].removeMouseListener(mineSweeper.mouseListener);`\n\
  `          mineSweeper.mineButtons[i][j].setBackground(Color.WHITE);`\n`       \
  \   int count = mineSweeper.mineField.countAdjacentMines(i, j);`\n`          if\
  \ (count > 0) {`\n`            mineSweeper.mineButtons[i][j].setIcon(MineIcon.getNumberIcon(count));`\n\
  `          }`\n`        } else {`\n`          if (mineSweeper.mineField.getMineFlag(i,\
  \ j) == Mine.flagState.MINE) {`\n`            mineSweeper.mineButtons[i][j].setIcon(MineIcon.getMineIcon());`\n\
  `          } else if (mineSweeper.mineField.getMineFlag(i, j) == Mine.flagState.SUSPECT)\
  \ {`\n`            mineSweeper.mineButtons[i][j].setIcon(MineIcon.getSuspectIcon());`\n\
  `          } else {`\n`            mineSweeper.mineButtons[i][j].setIcon(null);`\n\
  `          }`\n`        }`\n`      }`\n`    }`\n`  }`\n\n`updateButtons` 方法遍历整个网格，将任何已清除的按钮替换为空白或数字，并在玩家标记为地雷或可疑的位置设置地雷和可疑图标。正如你从清单\
  \ 7-23 中所见，这需要多个 `if` 语句，其中一些还嵌套在其他 `if` 语句中。我们从第一个 `if` 语句（`for` 循环内的第一行）开始。如果该位置已被清除，它会移除该位置的鼠标监听器，这样后续对该位置的点击就不会产生任何效果。然后，它将背景颜色设置为白色，并在该位置放置正确的图标图像（如果该位置相邻没有地雷，则可能没有图像）。如果地雷尚未被清除，我们就进入外层的\
  \ `else` 块。我之所以说“外层”，是因为它包含了其他的 `else` 块（当然是在 `if` 块之后）。由于该位置尚未被清除，我们必须确保地雷和可疑图标被正确设置。最后，如果玩家移除了（或从未设置过）该位置的地雷和可疑图标，我们必须确保没有图标存在。这就是为什么我们在最后一行（不包括带有闭合大括号的行）将该位置的图标设置为\
  \ `null`。\n\n本质上，`updateLabels` 方法管理着雷区的显示，为所有位置设置颜色和图标。这里有一个很好的设计建议给你：始终确保每个方法都有一个单一、定义明确的任务。如果一个方法需要做多件事，就将其拆分为多个方法，并让一个方法只负责（或至少不超出）调用其他方法。当我们讲到\
  \ `newGame` 方法时，就会看到这类方法的一个例子。\n\n接下来，我们来看 `showAll` 方法，如清单 7-24 所示。\n\n***清单 7-24.**\
  \ MineSweeperHelper 的 showAll 方法*\n\n`  void showAll() {`\n`    for (int i = 0;\
  \ i < mineSweeper.rows; i++) {`\n`      for (int j = 0; j < mineSweeper.columns;\
