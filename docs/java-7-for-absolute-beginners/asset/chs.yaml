  `    sierpinskiTriangle.createAndShowGUI();`\n`  }`\n\n`  public void actionPerformed(ActionEvent\
  \ e) {`\n`    if (e.getActionCommand() != null) {`\n`      if (e.getActionCommand().equals(\"\
  退出\")) {`\n`        System.exit(0);`\n`      }`\n`      if (e.getActionCommand().equals(\"\
  重绘\")) {`\n`        sierpinskiTrianglePanel.repaint();`\n`      }`\n`    }`\n`  }`\n\
  `}`\n\n到现在为止，你应该已经熟悉这类程序类的工作方式了：它处理用户输入，设置容纳内容的窗口，并管理执行更有趣工作的类。\n\n以下是执行绘图的类：\n\n\
  ***清单 14-5.** SierpinskiTrianglePanel.java*\n\n`package com.bryantcs.examples.fractals;`\n\
  \n`import java.awt.Color;`\n`import java.awt.Graphics;`\n`import java.awt.geom.Point2D;`\n\
  `import javax.swing.JPanel;`\n\n`public class SierpinskiTrianglePanel extends JPanel\
  \ {`\n\n`  private static final long serialVersionUID = 1L;`\n\n`  int maxLevel\
  \ = 7;`\n\n`  private void drawTriangle(int level, Graphics g, Point2D.Double point1,`\n\
  `      Point2D.Double point2, Point2D.Double point3) {`\n`    if (level < maxLevel)\
  \ {`\n`      // 逐层向下处理`\n`      Point2D.Double midPoint1 = getMiddlePoint(point1,\
  \ point2);`\n`      Point2D.Double midPoint2 = getMiddlePoint(point2, point3);`\n\
  `      Point2D.Double midPoint3 = getMiddlePoint(point1, point3);`\n\n`      g.setColor(new\
  \ Color((int)(Math.random() * 0xFFFFFF)));`\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n`      drawTriangle(level + 1, g, point1, midPoint1, midPoint3);`\n`      drawTriangle(level\
  \ + 1, g, midPoint1, point2, midPoint2);`\n`      drawTriangle(level + 1, g, midPoint3,\
  \ midPoint2, point3);`\n`    } else {`\n`      // 在底层，绘制实际的三角形`\n`      // （这些是较大三角形的一部分）`\n\
  `      int[] xPoints = {`\n`          new Double(point1.getX()).intValue(),`\n`\
  \          new Double(point2.getX()).intValue(),`\n`          new Double(point3.getX()).intValue()`\n\
  `        };`\n`      int[] yPoints = {`\n`          new Double(point1.getY()).intValue(),`\n\
  `          new Double(point2.getY()).intValue(),`\n`          new Double(point3.getY()).intValue()`\n\
  `        };`\n`      g.fillPolygon(xPoints, yPoints, 3);`\n`    }`\n`  }`\n\n` \
  \ private Point2D.Double getMiddlePoint(Point2D.Double point1,`\n`      Point2D.Double\
  \ point2) {`\n`    double newX = (point1.getX() + point2.getX()) / 2;`\n`    double\
  \ newY = (point1.getY() + point2.getY()) / 2;`\n`    return new Point2D.Double(newX,\
  \ newY);`\n`  }`\n\n`  public void paint (Graphics g) {`\n`    super.paintComponent(g);`\n\
  `    int height = this.getHeight();`\n`    int width = this.getWidth();`\n`    //\
  \ 这里是一种获取等边三角形高度的方法    Double doubleHeight`\n`      = Math.sqrt(height * height\
  \ - (width / 2) * (width / 2));    // Y 轴上的 0 点位于底部，所以这看起来是倒置的`\n`    Point2D.Double\
  \ lowerLeft = new Point2D.Double(0, doubleHeight);`\n`    Point2D.Double lowerRight\
  \ = new Point2D.Double(width, doubleHeight);`\n`    Point2D.Double top = new Point2D.Double(width\
  \ / 2, 0);`\n`    drawTriangle(1, g, lowerLeft, lowerRight, top);`\n`  }`\n`}`\n\
  \n`SierpinskiTriangleJava` 类实际上是从 `paint` 方法开始的，它计算外部三角形的角点，并将这些值传递给 `drawTriangle`\
  \ 方法。然后，`drawTriangle` 方法计算一系列嵌套的三角形，直到达到类顶部声明的 `maxLevel` 变量中指定的深度。您可以通过更改该值来改变深度，一个很好的练习是添加一个设置该值的用户界面。\n\
  \n实际的绘制仅在类达到最大层级时发生。此时，有 729（3 的 6 次方）个三角形会自行绘制，以及 364 个包含其他三角形的三角形。364 不是 3 的幂，那么通过计算六层深度是如何得到这个数字的呢？下表显示了进展过程：\n\
  \n![images](img/t1401.jpg)\n\n如您所见，外部三角形的包含使得数字有些偏差，因此总数永远不会是 3 的幂。然而，任意两个步骤之间的差值都是\
  \ 3 的幂。每当单个项目包含其他以规则方式缩放的项目时，就会出现这种模式。\n\n在 `drawTriangle` 方法中，我计算了当前三角形的中点，并基于这些点创建了三个新的三角形。这就是谢尔宾斯基算法的精髓。该方法中的其余代码负责绘制工作，并确保我不会错过停止条件。\n\
  \n![images](img/square.jpg) **注意** 通过从最外层开始并反向计数，可以使 `drawTriangle` 的代码更简单。但是，我希望有一个\
  \ `maxLevel` 值，以便尽可能轻松地设置深度。我还使用了 `Point2D` 而不是 `Point`，以获得更高的精度（从而防止窗口内三角形位置出现小的不匹配）。\n\
  \n最后，这是我的谢尔宾斯基三角形程序的结果：\n\n![images](img/1402.jpg)\n\n***图 14-2.** 谢尔宾斯基三角形程序的输出*\n\
  \n#### 绘制分形树\n\n我喜欢的另一个分形是分形树，因为它确实很像一棵树（至少乍一看是这样）。以下是程序类：\n\n***清单 14-6.** FractalTree.java*\n\
