  \ 类中所见，`MineSweeperMouseListener` 类有一个构造函数，用于获取 `MineSweeper` 类的实例。它还会获取一个 `MineSweeperHelper`\
  \ 类的实例。这两个类都需要监听鼠标点击事件，因此 `MineSweeperMouseListener` 类必须拥有这两个类的实例。唯一执行实际操作的另一个方法是\
  \ `mouseReleased` 方法。正如我们之前所学，由于鼠标移动会清除点击事件的问题，使用 `mouseReleased` 方法比使用 `mouseClicked`\
  \ 方法更可靠。\n\n`mouseClicked` 方法会遍历所有按钮，直到找到玩家点击的那个按钮。如果玩家点击了鼠标左键，该方法会调用 `MineField`\
  \ 类中的 `resolveClick` 方法，以判断玩家是否踩中了地雷。如果没有踩中，`resolveClick` 方法会判断游戏是结束（因为玩家获胜或失败）还是应该继续。如果用户点击了其他任何按钮（很可能是右键），该方法仍会调用\
  \ `resolveClick` 方法，但会通过按钮标志指示点击的是左键以外的按钮。然后，`resolveClick` 方法会切换该位置上的地雷、可疑和未知图标。最后，`mouseClicked`\
  \ 方法使用 `resolveClick` 方法返回的值来决定结束游戏（玩家获胜或失败）还是继续游戏。如果游戏没有结束，我们会更新雷区中的按钮。最后，在所有其他处理完成后，`mouseClicked`\
  \ 方法会更新标签。\n\n`MineSweeperMouseListener` 类并不复杂，但值得将此功能移入其自己的类中，以简化 `MineSweeper`\
  \ 类。这也遵循了每个对象应有明确目的的设计原则。在这种情况下，我们创建了一个职责明确的类，专门用于监听雷区中的点击事件，并将该功能移除（并将其他部分移至其他类），从而使\
  \ `MineSweeper` 类能够纯粹专注于显示用户界面。\n\n让我们通过查看 MineSweeper 包中的最后一个类，来结束这段漫长的 MineSweeper\
  \ 游戏之旅。清单 7-29 展示了 `MineSweeperActionListener` 类。\n\n***清单 7-29.** MineSweeperActionListener\
  \ 类*\n\n`package com.apress.java7forabsolutebeginners.examples.MineSweeper;`\n\n\
  `import java.awt.event.ActionEvent;`\n`import java.awt.event.ActionListener;`\n\n\
