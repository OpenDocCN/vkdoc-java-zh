  \n让我们从顶部开始，先看字段（记住，类级别的变量称为字段）。清单 7-13 展示了 `MineField` 类中的字段。\n\n***清单 7-13.** MineField\
  \ 类的字段*\n\n`  private Mine[][] mineField;`\n`  private int rows;`\n`  private int\
  \ columns;`\n`  private int mines;`\n`  private int minesFound = 0;`\n`  private\
  \ int minesRemaining;`\n`  private int emptiesRemaining;`\n`  enum gameState {WIN,\
  \ LOSE, CONTINUE};`\n\n首先，我们有一个二维数组，用于存储地雷的位置。然后，我们得到一组整数值，用于告知此游戏实例应有多少行、列和地雷。接着，我们得到更多的整数值，用于告知当前游戏的状态（已找到的地雷数量、剩余地雷数量以及剩余空格数量）。我们添加了一个\
  \ `minesRemaining` 字段，以避免重复输入 `mines - minesFound`。`emptiesRemaining` 字段更有趣，因为它让我们知道用户何时获胜。最后，我们有一个三态枚举，用于告知整个游戏的当前状态——具体来说，是玩家获胜、玩家失败，还是玩家可以继续当前游戏。\n\
  \n![images](img/square.jpg) **注意** `gameState` 枚举不是私有的（这意味着它对包中的所有其他类可见），因为其他类会在不同地方使用它的值，我们稍后会看到。\n\
  \n`MineField` 类有一个构造函数（由 `MineSweeper` 类中的 `init` 方法使用）。清单 7-14 展示了 `MineField`\
  \ 构造函数。\n\n***清单 7-14.** MineField 构造函数*\n\n`MineField(int rows, int columns, int\
  \ mines) {`\n`  this.rows = rows;`\n`  this.columns = columns;`\n`  this.mines =\
  \ mines;`\n`  minesRemaining = mines;`\n`  emptiesRemaining = rows * columns - mines;`\n\
  `  mineField = new Mine[rows][columns];`\n`  init();`\n`  populate();`\n`}`\n\n\n\
  \n与大多数构造函数类似，`MineField` 构造函数首先用当前游戏的值填充字段。然后它调用一个名为 `init` 的方法（我们接下来会分析这个方法）。最后，它调用没有参数的\
  \ `populate` 方法（实际上有两个 `populate` 方法——我们稍后会解释原因）。顺便提一下，构造函数先执行一些简单工作，再调用其他方法处理更复杂任务的模式很常见。这种模式提供了一种隔离复杂性的方式，使代码更易阅读，并且在出现问题时更易调试。\n\
  \n现在我们来看 `init` 方法，如清单 7-15 所示。\n\n***清单 7-15.** MineField 的 init 方法*\n\n`private\
  \ void init() {`\n`  for (int i = 0; i < rows; i++){`\n`    for (int j = 0; j <\
  \ columns; j++) {`\n`      mineField[i][j] = new Mine();`\n`    }`\n`  }`\n`}`\n\
  \n如你所见，这是一个简单的方法。它用正确数量的 `Mine` 对象填充雷区。两个 `populate` 方法负责繁重的工作，即确定地雷的位置。如果你是一位聪明的读者（我知道你肯定是），你可能会好奇为什么每个可能的位置都有一个\
  \ `Mine` 对象；我们会在分析 `Mine` 对象本身时解开这个谜团。\n\n现在，让我们继续探讨两个 `populate` 方法，我把它们放在清单 7-16\
  \ 中。\n\n***清单 7-16.** 两个 populate 方法*\n\n`private void populate() {`\n`  populate(0);`\n\
  `}`\n\n`private void populate(int mineCount) {`\n`  int currentCount = mineCount;`\n\
  `  double mineChance = (double) mines / (double) (rows * columns);`\n`  for (int\
  \ i = 0; i < rows; i++) {`\n`    for (int j = 0; j < columns; j++) {`\n`      Mine\
  \ thisMine = mineField[i][j];`\n`      if (!thisMine.hasMine()) {`\n`        if\
  \ (Math.random() < mineChance) {`\n`          thisMine.setMine();`\n`          currentCount++;`\n\
  `          if (currentCount == mines) {`\n`            return;`\n`          }`\n\
  `        }`\n`      }`\n`    }`\n`  }`\n`  if (currentCount < mines) {`\n`    populate(currentCount);`\n\
  `  }`\n`}`\n\n那么为什么要有两个 `populate` 方法呢？第一个是便捷方法，省去了提供参数的麻烦。在这个例子中，它其实并不那么便捷，因为我们只调用了一次这个便捷方法。你完全可以说我们应该只用一个方法。然而，我们经常使用这种模式，以至于它已经成为一种习惯。更重要的是，它给了我们一个讨论这种有用模式的机会。\n\
  \n那么，再次回到这个问题：为什么是两个方法？这在很多情况下都是一种有用的技巧。如果你将方法暴露给其他对象（即这些方法不是私有的），那么多个同名方法可以让开发者（包括你自己）用不同的参数调用同一个方法。然后这些方法中的每一个都会调用另一个应用这些参数的方法。在其他情况下，更简单的方法会被多次使用，以便让编码更轻松一些（无需每次都指定很少变化的参数）。\n\
  \n现在我们来谈谈这两个 `populate` 方法具体做了什么。简单的 `populate` 方法调用更复杂的 `populate` 方法并传入一个参数（这个参数是开始填充雷区所需的值）。这个初始值是到目前为止已经放置的地雷数量。这就是为什么初始参数是\
  \ 0。\n\n复杂版本的 `populate` 方法会记录到目前为止已放置的地雷数量（`currentCount` 变量）。为了判断某个特定位置是否有地雷，该方法使用随机数生成器，将其与地雷出现在任何位置的概率进行比较。这个概率是可能的位置数量除以地雷数量。\n\
  \n如果我们在遍历整个数组之前恰好达到了所需的地雷数量，就可以停止。方法中间的 `if` 语句实现了这个目标。另一方面，如果我们遍历了整个数组却没有达到所需的地雷数量，我们就再次调用\
  \ `populate` 方法。让我重复一下这一点：我们再次调用了当前所在的方法。这被称为递归，我将在本书后面用一整章来介绍这个相对高级的主题。递归是我最喜欢的编程技巧之一，你可以用它做一些有趣的事情。不过现在，让我们先完成扫雷游戏。\n\
  \n如果我们确实需要重新进入该方法，第二次遍历会再次扫描整个数组，直到我们最终拥有所需数量的地雷。理论上，这个过程可能需要两次以上的遍历。但在测试中，从未需要超过两次遍历，并且第一次遍历从未产生少于七颗地雷的情况。这个算法会稍微偏向雷区的左上角，但我认为这是一个可以接受的问题。\n\
  \n所以，`populate` 方法虽然有点棘手，但它们确实解决了如何随机填充雷区的问题。让我们继续看其他方法。\n\n接下来的两个方法，`getMinesFound`\
  \ 和 `getMinesRemaining`，返回字段的值。因此我们不再进一步描述它们。不过，这两个方法之后的方法，是另一段需要解释的复杂代码。清单 7-17\
  \ 展示了 `cascade` 方法。\n\n***清单 7-17.** MineField 的 cascade 方法*\n\n`private gameState\
  \ cascade(int x, int y) {`\n`  if (x < 0 || y < 0 || x >= rows || y >= columns)\
  \ {`\n`    return gameState.CONTINUE;`\n`  }`\n`  Mine thisMine = mineField[x][y];`\n\
  `  if (thisMine.hasMine()) {`\n`    return gameState.CONTINUE;`\n`  }`\n`  if (!thisMine.isCleared())\
  \ {`\n`    thisMine.clear();`\n`    emptiesRemaining--;`\n`    if (emptiesRemaining\
  \ == 0) {`\n`      return gameState.WIN;`\n`    }`\n`  }`\n`  if (countAdjacentMines(x,\
  \ y) > 0) {`\n`    return gameState.CONTINUE;`\n`  } else{`\n`    for (int i = x\
  \ - 1; i <= x + 1; i++) {`\n`      for (int j = y - 1; j <= y + 1; j++) {`\n`        if\
  \ (i < 0 || j < 0 || i >= rows || j >= columns) {`\n`          continue;`\n`        }\
  \ else if (!mineField[i][j].isCleared()) {`\n`          cascade(i, j);`\n`        }`\n\
  `      }`\n`    }`\n`  }`\n`  return gameState.CONTINUE;`\n`}`\n\n`cascade` 方法处理最困难的任务，即判断当一个位置被清除时，是否应该同时清除多个位置。它使用了著名的泛洪填充算法的一个简单版本，检查相邻的已清除位置，而不是检查相同颜色的像素（就像你在绘图程序的泛洪填充中看到的那样）。它的工作原理是：检查玩家点击的位置（不是右键点击），检查该位置旁边的每个位置（包括对角线方向），再检查这些位置旁边的所有位置，依此类推，直到最终没有位置需要检查为止。要使该算法工作，需要再次使用递归。正如你在方法底部附近看到的，`cascade`\
  \ 方法调用了自身。\n\n考虑到一个没有地雷的大区域可能导致一次点击清除大量位置，`cascade` 方法可能会多次调用自身。我没有为了查看它被调用的频率而测试该方法，但在最坏的情况下，看到\
  \ 100 次调用我们也不会感到惊讶。如果你对此感兴趣，可以添加一个计数器变量（它必须是该方法的一个参数），每次进入该方法时将其递增，并将该值打印到控制台。然后，当你玩游戏时，就能看到\
  \ `cascade` 方法被调用了多少次。\n\n\n\n在`cascade`方法中出现的另一个复杂之处是需要检查边界。如果当前位置位于游戏区域的边缘，检查相邻位置可能会导致`ArrayOutOfBounds`异常，这可不是什么有趣的事。因此，我们使用了一个`if`语句来检查所有四个边界，如果检查会导致无效位置，则不再调用`cascade`方法。\n\
  \n最后，你可能注意到`cascade`方法返回了`gameState`枚举中的一个值。大多数情况下，返回的是`gameState.CONTINUE`。然而，级联事件有可能清空棋盘并赢得游戏，因此该方法也可能返回`gameState.WIN`。\n\
  \n`MineField`类还有最后一个重要的方法，名为`countAdjacentMines`。清单 7-18 展示了`countAdjacentMines`方法。\n\
  \n***清单 7-18.** 扫雷游戏中的 countAdjacentMines 方法*\n\n`int countAdjacentMines(int x,\
  \ int y) {`\n`  int count = 0;`\n`  for (int i = x - 1; i <= x + 1; i++) {`\n`    for\
  \ (int j = y - 1; j <= y + 1; j++) {`\n`      if (i == x && j == y) {`\n`        continue;`\n\
  `      } else if (i < 0 || j < 0 || i >= rows || j >= columns) {`\n`        continue;`\n\
  `      } else if (mineField[i][j].hasMine()) {`\n`        count++;`\n`      }`\n\
  `    }`\n`  }`\n`  return count;`\n`}`\n\n当玩家清除一个不含地雷的位置时，我们需要在该位置显示相邻地雷的数量。为此，我们需要一个方法来统计任意给定位置相邻的地雷数量。与`cascade`方法一样，我们必须检查游戏区域的边缘，并且使用了相同的代码来实现。除此之外，`countAdjacentMines`方法会检查每个相邻（包括对角线方向）的位置，并累加找到的地雷数量。\n\
  \n`Mine`类定义了一个单独的位置。你可能会觉得这个名字起得不好，因为它并不只对应有地雷的位置。为此，我们曾考虑将其改名为`Location`。但后来我们想到，当爆炸物处理专家（顺便说一句，这些人可是真正的英雄）检查爆炸物时，他们会假设每个位置都埋有地雷。所以，出于一种诡辩的心态，我保留了`Mine`这个名字。清单\
  \ 7-19 展示了`Mine`类。\n\n***清单 7-19.** Mine 类*\n\n`package com.apress.java7forabsolutebeginners.examples.MineSweeper;`\n\
  \n`public class Mine {`\n\n`  enum flagState {UNKNOWN, MINE, SUSPECT};`\n`    private\
  \ boolean isCleared = false;`\n`  private boolean hasMine = false;`\n`  private\
  \ flagState flag = flagState.UNKNOWN;`\n`      boolean hasMine() {`\n`    return\
  \ hasMine;`\n`  }`\n\n`  void setMine() {`\n`    hasMine = true;`\n`  }`\n\n`  boolean\
  \ isCleared() {`\n`    return isCleared;`\n`  }`\n\n`  void clear() {`\n`    isCleared\
  \ = true;`\n`  }`\n\n`  flagState getFlagState() {`\n`    return flag;`\n`  }`\n\
  \n`  flagState setFlagState() {`\n`    if (flag == flagState.UNKNOWN) {`\n`      flag\
  \ = flagState.MINE;`\n`      return flagState.MINE;`\n`    }`\n`    if (flag ==\
  \ flagState.MINE) {`\n`      flag = flagState.SUSPECT;`\n`      return flagState.SUSPECT;`\n\
  `    }`\n`    if (flag == flagState.SUSPECT) {`\n`      flag = flagState.UNKNOWN;`\n\
  `      return flagState.UNKNOWN;`\n`    }`\n`    return flagState.UNKNOWN;`\n`  }`\n\
  `}`\n\n`Mine`类负责追踪一个位置是否有地雷、该位置是否已被清除，以及用户是否将该位置标记为有地雷、可疑（在扫雷游戏中通常用问号图标表示）或未知（意味着游戏中没有图标）。唯一的复杂之处在于`setFlagState`方法，它是在不同状态之间循环切换，而不是接受一个参数来设置标记状态。这种行为模拟了用户通过右键点击雷区位置来循环切换标记的操作。\n\
  \n现在我们可以继续介绍`MineSweeperHelper`类，它包含了游戏所需的各种杂项方法。虽然它没有`MineSweeper`和`MineField`类那么大，但与之前的工作相比，它仍然是一个大型类。请再次通读并尽力理解它（既然你已经了解了程序其余部分的工作原理，你应该能很好地理解它），然后我们将对其进行详细分析。清单\
  \ 7-20 展示了`MineSweeperHelper`类。\n\n***清单 7-20.** MineSweeperHelper 类*\n\n`package\
