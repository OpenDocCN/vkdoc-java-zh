  \n`  public void paint (Graphics g) {`\n`    int width = this.getSize().width;`\n\
  `    int height = this.getSize().height;`\n`    super.paintComponent(g);`\n\n`    if\
  \ (animating) {`\n`      g.setColor(Color.RED);`\n`      g.fillOval(xPosition, height\
  \ / 2, 10 ,10);`\n`      xPosition += 20;`\n`      if (xPosition > width) {`\n`        animating\
  \ = false;`\n`      }`\n`    }`\n`  }`\n\n`  // run 方法控制屏幕重绘的频率，从而控制帧率`\n`  public\
  \ void run() {`\n`    while(animating) {`\n`      try {`\n`        Thread.sleep(40);`\n\
  `        this.repaint();`\n`      } catch (InterruptedException ie) {`\n`        return;`\n\
  `      }`\n`    }`\n`  }`\n`}`\n\n这两个类创建的程序看起来就像图 10-1 中的图像。\n\n![images](img/1001.jpg)\n\
  \n***图 10-1.** ScootBall 的初始状态*\n\n`ScootBallPanel` 类的核心是 `run` 方法，它实现了 `Runnable`\
  \ 接口中对应的 `run` 方法。该方法所做的就是运行一个连续循环，休眠一段时间，然后重绘面板。休眠的时间决定了帧率。在这个例子中，它休眠 40 毫秒，产生大约\
  \ 25 帧的帧率。我用了“大约”这个词，因为重绘需要一些时间，导致实际帧率略低于 25。我们将在下一个示例中看到如何获得更精确的帧率。\n\n`paint`\
  \ 方法在屏幕上绘制球，每次都在一个新位置，直到该位置超出面板的宽度。具体来说，调用 `super.paintComponent(g)` 会将面板重绘为其原始状态（一个空白的白色方框）。随后的几行代码则绘制球。图\
  \ 10-2 展示了一个球在屏幕上滑动的画面。\n\n![images](img/1002.jpg)\n\n***图 10-2.** 运行中的 ScootBall*\n\
  \nScootBall 算不上一个复杂的程序，但它演示了动画的基础：每隔一段时间（通常是每秒若干次）绘制更新后的图像。接下来，让我们看一个稍微复杂一些（也因此更有趣）的示例。\n\
  \n\n\n### 动画化多个对象\n\n本示例展示了一次性动画化多个对象的一种方法。在此例中，我们采用面向对象的方式解决问题（毕竟 Java 是一种面向对象的语言）。具体来说，我们为想要动画化的对象创建一个类，然后创建该类的多个实例。作为一个简单示例，我们对所有动画化对象使用同一个类。不过，你可以使用相同的技术来动画化不同类型的对象。例如，一辆坦克（某个类的实例）可以向一个碉堡（第三个类的实例）发射一颗子弹（另一个类的实例）。\n\
  \n关键在于让每个对象自行绘制，然后遍历它们，依次让每个对象绘制自身。这样，调用类无需了解如何绘制这些对象，可以专注于时间控制和用户界面。这种组织方式体现了面向对象编程的原则之一——封装，也体现了几乎所有软件系统的一个主要目标——关注点分离（即程序能做的每一件不同的事，都应由程序的不同部分来处理）。这些原则是面向对象编程的优势所在，因为它们使程序设计以及错误查找变得容易得多。我们将在下一章讨论错误查找。\n\
  \n为了说明如何同时动画化多个对象，我们创建一个简单的烟花程序。当用户点击**Go**按钮时，程序会在屏幕上以每组四个的方式绘制烟花。图 10-3 展示了运行中的烟花程序。\n\
  \n![images](img/1003.jpg)\n\n***图 10-3.** 运行中的烟花程序*\n\n顺便提一下，即使是像烟花这样简单的动画程序，截图也无法完全展现其效果。动画的本质决定了任何静态图像都无法与实际动画相媲美。因此，请运行本章中的程序，看看它们实际的样子。我希望你一直在运行本书中的程序，但如果没有，那么在本章中，如果你想真正了解它们的功能，就必须运行它们。我建议你随后自定义这些程序，创建自己的版本，并最终创作出属于你自己的原创动画。\n\
  \n`Fireworks` 类的工作方式与 `ScootBall` 类类似，但有一个重要区别：`Fireworks` 类使用一个 `Timer` 对象来控制动画。`Timer`\
  \ 类为其实例提供了一种简单的方法，可以每隔一段时间触发一个进程（不仅仅是动画，而是任何进程）。由于定时器独立于绘制过程，我们能够更接近每秒 25 帧（每 40\
  \ 毫秒一次）的精确帧率。此外，定时器简化了这个类和绘图面板类，因为我们不再需要管理线程。程序仍然使用线程，但 `Timer` 类替我们完成了这项工作。基于这些原因，使用\
  \ `Timer` 对象比自行创建线程并让其休眠一段时间要好得多。（我之前向你展示了另一种方法，以便你知道它的存在，但在你自己的动画中请使用 `Timer` 对象）。清单\
