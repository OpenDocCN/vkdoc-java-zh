  \ `TargetClickPanel` 和 `Target` 类中，我们稍后会看到）。`endGame` 和 `startGame` 方法展示了用户界面代码与游戏逻辑相结合的地方。`endGame`\
  \ 方法只包含足以停止计时器的逻辑。`endGame` 方法的其余部分为用户提供了开始新游戏或退出的选项。`newGame` 方法重置所有内容（包括用户界面）并开始新游戏。\n\
  \n`actionPerformed` 方法也包含了游戏循环。这一点并不明显，因为实际上并没有真正的循环存在。相反，`Timer` 对象会在每次计时器滴答时调用\
  \ `actionPerformed` 方法。因此，只要计时器在运行，我们就能得到一个连续的循环。当你检查 `actionPerformed` 方法时，可以看到它完成了游戏循环中的全部三项任务：处理用户输入（通过\
  \ `getActionCommand` 方法）、处理游戏逻辑（通过检查用户是否点击了足够多的目标来结束游戏），以及重新绘制游戏区域（通过调用 `TargetClickPanel`\
  \ 对象的 `repaint` 方法）。\n\n\n\n`TargetPanel` 类提供了游戏区域，并保持五个目标处于活跃状态。作为维持五个目标活跃的一部分，它还会检查其区域内的鼠标点击是否击中了目标。这些功能属于游戏逻辑的一部分。在这种情况下，游戏逻辑分布在多个类中是可以接受的。指导原则是每个类都有清晰、明确的任务。维持正确数量的目标活跃并检查目标是否被击中，是管理游戏区域的一部分，而这正是`TargetClickPanel`类的职责。这里有一个经验：尽可能将逻辑与用户界面分离。然而，更应优先考虑每个类都有明确目的的原则，而非将逻辑与表现分离。理想情况下，你可以同时实现这两个目标，但这并不总是可行的（就像这里一样）。\n\
  \n***清单 12-2.** TargetClickPanel 类*\n\n`package com.bryantcs.examples.videogames;`\n\
