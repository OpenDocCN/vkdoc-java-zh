  \ BufferedImage sprite;`\n\n`  // 构造函数，在此设置我们需要知道的各种值`\n`  public ShootingGalleryTargetRow(BufferedImage\
  \ sprite, int value, int delay) {`\n`    targetValue = value;`\n`    newTargetTicker\
  \ = 0;`\n`    this.sprite = sprite;`\n`  }`\n\n`  public LinkedList<ShootingGalleryTarget>\
  \ getTargets() {`\n`    return targets;`\n`  }`\n\n`  @Override`\n`  public void\
  \ paintComponent(Graphics g) {`\n`    super.paintComponent(g);`\n`    this.setBackground(Color.WHITE);`\n\
  `    for (int targetCounter = 0; targetCounter < targets.size(); targetCounter ++)\
  \ {`\n`      ShootingGalleryTarget currentTarget = targets.get(targetCounter);`\n\
  `      if (currentTarget.getY() > getHeight() + ShootingGalleryPanel.TARGET_SPACE)\
  \ {`\n`        targets.remove(currentTarget);`\n`      } else {`\n`        currentTarget.setY(currentTarget.getY()\
  \ + ShootingGalleryPanel.TARGET_SPACE / 10);`\n`        currentTarget.draw(g);`\n\
  `      }`\n`    }`\n`  }`\n\n`  public void tick() {`\n`    for (int targetCounter\
  \ = 0; targetCounter < targets.size(); targetCounter ++) {`\n`      ShootingGalleryTarget\
  \ currentTarget = targets.get(targetCounter);`\n`      currentTarget.setY(currentTarget.getY()\
  \ + ShootingGalleryPanel.TARGET_SPACE / 10);`\n`    }`\n`    newTargetTicker++;`\n\
  `    if (newTargetTicker > 9) {`\n`      newTargetTicker = 0;`\n`      ShootingGalleryTarget\
  \ newTarget =`\n`        new ShootingGalleryTarget(targetValue, sprite, 0,`\n`              -ShootingGalleryPanel.TARGET_SPACE,\
  \ this);`\n`      targets.add(newTarget);`\n`    }`\n`    repaint();`\n`  }`\n`}`\n\
  \n`ShootingGalleryTargetRow` 类负责处理给定行中的目标。`paintComponent` 方法会移除移出底部的目标，并绘制该行中所有剩余的目标（处理玩家光标的\
  \ `ShootingGalleryShooter` 类会移除被击中的目标）。`tick` 方法负责更新目标集合的信息。具体来说，`tick` 方法每十次滴答就在该行顶部添加一个新目标，从而不断补充该行（限制游戏运行时间的一种方法是限制每行的目标总数——目标耗尽则游戏结束。如果你感兴趣，可以自由实现这个想法）。\n\
  \n使用 `LinkedList` 对象来保存目标，可以在不固定目标数量的情况下进行添加和移除操作。由于目标会被击中，目标数量会波动，因此我们需要一个能够适应这种波动的数据结构。\n\
  \n现在我们已经了解了目标行的工作原理，接下来让我们看看实际的 `Target` 对象。\n\n***清单 12-8.** ShootingGalleryTarget\
  \ 类*\n\n`package com.bryantcs.examples.videogames;`\n\n`import java.awt.Graphics;`\n\
  `import java.awt.Polygon;`\n`import java.awt.Image;`\n\n`public class ShootingGalleryTarget\
  \ {`\n\n`  // 我们需要知道的整型值：价值、大小、位置、`\n`  // 以及距行边缘的偏移量（用于居中）`\n`  private int value,\
  \ size, xPosition, yPosition, offset;`\n`  // 对包含该目标的行的引用（`\n`  // 我们需要将其用作精灵图的\
  \ ImageObserver）`\n`  private ShootingGalleryTargetRow row;`\n\n`  // 精灵图`\n`  private\
  \ Image sprite;`\n\n`  // 用于碰撞检测的多边形对象`\n`  Polygon polygon;`\n\n`  // 构造函数，在此设置所有需要的值`\n\
  `  public ShootingGalleryTarget(int value, Image sprite, int x, int y, ShootingGalleryTargetRow\
  \ row) {`\n`    size = sprite.getWidth(row);`\n`    this.value = value;`\n`    this.sprite\
  \ = sprite;`\n`    xPosition = x;`\n`    yPosition = y;`\n`    this.row = row;`\n\
  `    offset = (ShootingGalleryPanel.TARGET_SPACE - size) / 2;`\n`  }`\n\n`  // 绘制方法`\n\
  `  public void draw(Graphics g) {`\n\n\n\n`    // 设置目标的位置`\n`    int x = xPosition\
  \ + offset;`\n`    int y = yPosition + offset;`\n\n`    // 绘制精灵`\n`    g.drawImage(sprite,\
  \ x, y, size, size, row);`\n\n`    // 创建一个与精灵匹配的多边形`\n`    // 我们将使用该多边形来判断精灵是否被击中`\n\
  `    polygon = new Polygon();`\n`    polygon.addPoint(x, y);`\n`    polygon.addPoint(x,\
  \ y + size);`\n`    polygon.addPoint(x + size, y + size);`\n`    polygon.addPoint(x\
  \ + size, y);`\n`  }`\n\n`  // 提供一种更新垂直位置的方法`\n`  public void setY(int y) {`\n`    yPosition\
  \ = y;`\n`  }`\n`  // 提供一种获取垂直位置的方法`\n`  public int getY() {`\n`    return yPosition;`\n\
  `  }`\n`  // 提供一种获取分值的方法`\n`  // （当目标被击中时使用）`\n`  public int getValue() {`\n`    return\
  \ value;`\n`  }`\n`}`\n\n`ShootingGalleryTarget` 类是一个非常简单的对象，它负责追踪目标的位置、分值（如果被击中）以及在其行内绘制自身的方式。为了使碰撞检测更容易，我将目标实现为一个\
  \ `Polygon` 对象，因为 `Polygon` 类有一个名为 `contains` 的便捷方法，可以让我们知道某个点是否在多边形内。我本可以使用图像本身的属性，但这样做需要更多的代码和数学计算，而且既不会提高性能，也不会增强可读性。\n\
  \n碰撞检测通常意味着两个对象最终处于同一空间，游戏必须决定如何处理这种情况（例如绘制爆炸效果、打开一扇门，或根据游戏性质决定的任何其他可能性）。在这个案例中，我选择简化游戏，不绘制从光标到目标区域的子弹（或激光束等）。然而，我们仍然需要判断玩家射击时是否击中了目标。因此，我让射击者类检查目标是否与玩家光标的中心处于同一垂直位置，并且（从最右侧的行开始，向左逐行处理）移除第一个匹配该垂直位置的目标。\n\
  \n一个很好的练习是为射击添加动画效果。你可以添加一个子弹对象（使用另一个类）并让它穿过屏幕，或者只是从光标画一条线到它接触到的第一个目标（扩展 `ShootingGalleryShooter`\
  \ 类可以实现这个技巧）。\n\n说到射击者类，让我们更仔细地看一下。在阅读该类时，请注意它实现了 `MouseListener` 和 `MouseMotionListener`\
  \ 这两个接口。游戏中的其他对象不需要监听鼠标点击和鼠标移动，因此只有 `ShootingGalleryShooter` 类实现了这些接口。你可能还想研究一下\
  \ `paintComponent` 方法，看看它如何在玩家射击后改变条形的颜色，并强制在两次射击之间延迟一秒钟。最后，请仔细查看 `analyzeShot`\
  \ 和 `analyzeShotForRow` 方法。这两个方法包含了判断射击是否命中目标的逻辑。\n\n***清单 12-9.** ShootingGalleryShooter\
