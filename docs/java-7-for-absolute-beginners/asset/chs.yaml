  \ `Element` 对象实际上都是一个 `Node` 对象（`Element` 接口扩展了 `Node` 接口）。由于 DOM 的实现方式，有时你需要同时处理\
  \ `Element` 对象和 `Node` 对象，就像我在处理属性值时不得不做的那样。\n\n#### 使用 SAX 读取 XML\n\nSAX 使用一个名为\
  \ `ContentHandler` 的接口来暴露解析事件，然后你可以在自己的代码中拦截这些事件，以便为每个解析事件执行所需的任何处理。SAX 包还提供了 `ContentHandler`\
  \ 的一个默认实现，称为 `DefaultHandler`。`DefaultHandler` 对每个事件不执行任何操作，因为不执行任何操作是默认行为。但是，你可以覆盖\
  \ `DefaultHandler` 中的方法来做任何你想做的事情。扩展 `DefaultHandler` 的好处是，你可以只覆盖你关心的那些方法，而让其余的方法保持不变。在我这里使用的示例中，我不需要\
  \ `DefaultHandler` 中的许多方法，所以我没有覆盖它们。\n\n如果你查看这些方法的名称，就能明白为什么 SAX 在处理 XML 时占用如此少的内存。它会为\
  \ XML 文档的每个部分（无论是文档本身还是元素）的开始和结束触发一个事件。因此，解析器只需将元素的名称（以及一些其他细节）和元素的子节点列表放入内存。在到达\
  \ `characters` 方法（即处理元素字符内容的方法）之前，它不必将元素的内容放入内存。大多数元素没有大量的文本内容（一个例外是当有人像 Word 文档那样将图像存储在\
  \ XML 元素中时），因此用于处理文本的内存通常不多。\n\n为了向你展示如何读取一个简单的 XML 文档并在控制台中描述其内容，我首先创建了一个类（名为 `XMLToConsoleHandler`），它扩展了\
  \ `DefaultHandler` 并覆盖了我在捕获 XML 文件内容时需要使用的几个方法。以下是 `XMLToConsoleHandler` 类：\n\n\
  ***清单 9-7**。XMLToConsolHandler*\n\n`package com.bryantcs.examples.xml;`\n\n`import\
  \ org.xml.sax.Attributes;`\n`import org.xml.sax.SAXException;`\n\n`import org.xml.sax.helpers.DefaultHandler;`\n\
  \n`public class XMLToConsoleHandler extends DefaultHandler {`\n\n`  // characters\
  \ 方法处理元素的实际内容  @Override`\n`  public void characters(char[] content, int start,\
  \ int length) throws SAXException {`\n`    // 在控制台中描述内容    System.out.println(\"\
  找到内容: \" + new String(content, start, length));  }`\n\n`  // endDocument 方法让我们可以在解析器到达文档末尾时执行某些操作  @Override`\n\
  `  public void endDocument() throws SAXException {`\n`    // 在控制台中宣布我们找到了文档的末尾`\n\
  `System.out.println(\"找到文档的末尾\");  }`\n\n`  // endElement 方法让我们可以在解析器到达元素末尾时执行某些操作  @Override`\n\
  `  public void endElement(String arg0, String localName, String qName)`\n`      throws\
  \ SAXException {`\n`    // 在控制台中宣布我们找到了一个元素的末尾`\n`System.out.println(\"找到一个名为 \\\
  \"\" + qName + \"\\\" 的元素的末尾\");`\n`  }`\n\n`  // startDocument 方法让我们可以在找到文档顶部时执行某些操作  @Override`\n\
  `  public void startDocument() throws SAXException {`\n`    // 在控制台中宣布我们找到了文档的开头`\n\
  `System.out.println(\"找到文档的开头\");`\n`  }`\n\n\n\n`  // startElement 方法让我们能够在`\n\
  `  // 到达元素开头时执行某些操作  @Override`\n`  public void startElement(String uri, String\
  \ localName, String qName,`\n`      Attributes attributes) throws SAXException {`\n\
  `    // 创建一个 StringBuilder 对象来包含对该元素的描述`\n`StringBuilder sb = new StringBuilder();`\n\
  `    // 添加元素名称    sb.append(\"找到名为 \\\"\" +`\n`qName + \"\\\" 的元素开头\");`\n`    //\
  \ 检查元素是否有任何属性    if (attributes != null &&`\n`attributes.getLength() > 0) {`\n`      sb.append(\"\
  ，其属性名为 \");`\n`      // 如果确实找到属性，则逐一描述      for (int i = 0; i <`\n`attributes.getLength();\
  \ i++) {`\n`        String attributeName = attributes.getLocalName(i);`\n`        String\
  \ attributeValue = attributes.getValue(i);`\n`        sb.append(\"\\\"\" + attributeName\
  \ + \"\\\"\");`\n`        sb.append(\" (值 = \");`\n`        sb.append(\"\\\"\" +\
  \ attributeValue + \"\\\"\");`\n`        sb.append(\")\");`\n\n`        // 如果尚未到达属性末尾，`\n\
  `        // 则添加逗号以保持格式正确        if (i < attributes.getLength() - 1) {`\n`          sb.append(\"\
  , \");`\n`        }`\n`      }`\n`    }`\n`    // 在控制台中描述该元素    System.out.println(sb.toString());`\n\
  `  }`\n`}`\n\n再次强调，我们使用 `StringBuilder` 来避免在内存中创建过多的 `String` 对象。唯一的复杂性在于处理可能存在的任何属性，而大部分代码实际上只是为了“美化打印”（程序员常用来指代格式化输出以便人类轻松阅读的代码的术语）。\n\
  \n让我们看看使用 `XMLToConsoleHandler` 类向控制台写入内容的类。同样，你需要在 C:\\test（Windows 系统）或 C:/test（Unix\
  \ 或 Linux 系统）目录下有一个名为 poemsource.xml 的文件。你可以使用 domoutput.xml 文件的内容作为 poemsource.xml\
  \ 文件的内容。以下是该类：\n\n***清单 9-8**。ReadWithSAX*\n\n`package com.bryantcs.examples.xml;`\n\
  \n`import java.io.File;`\n`import java.io.IOException;`\n\n`import javax.xml.parsers.ParserConfigurationException;`\n\
  `import javax.xml.parsers.SAXParser;`\n`import javax.xml.parsers.SAXParserFactory;`\n\
  \n`import org.xml.sax.SAXException;`\n\n`public class ReadWithSAX {`\n\n`  public\
  \ static void main(String[] args) {`\n`    String fileName = \"C:\" + File.separator\
  \ + \"test\"`\n`        + File.separator + \"poemsource.xml\";`\n`    getFileContents(fileName);`\n\
  `  }`\n\n`  private static void getFileContents (String fileName) {`\n`    try {`\n\
  `    // 创建我们处理程序的一个实例      XMLToConsoleHandler handler = new`\n`XMLToConsoleHandler();`\n\
  `    // 获取一个解析器工厂      SAXParserFactory factory = SAXParserFactory.newInstance();`\n\
  `    // 获取一个解析器      SAXParser saxParser = factory.newSAXParser();`\n`    // 现在使用我们的处理程序解析文件      saxParser.parse(fileName,\
  \ handler );`\n\n`    // 处理可能的异常    } catch(IOException ioe) {`\n`      System.out.println(\"\
  无法打开 \" + fileName + \" 进行解析\");`\n`    } catch(ParserConfigurationException pce)\
  \ {`\n`      System.out.println(\"创建 SAX 解析器失败 \");`\n`    } catch(SAXException\
  \ saxe) {`\n`      System.out.println(\"解析 XML 文件失败\");`\n`    }`\n`  }`\n`}`\n\n\
  很简单，不是吗？SAX 的乐趣之一就在于它易于实现。创建一个处理程序，创建一个解析器，然后将你的输入和处理程序传递给工厂。因此，异常处理代码比实际执行工作的代码还要长。当然，这种安排实际上掩盖了复杂性在于处理程序类这一事实。尽管如此，将代码拆分，使复杂性隔离到单个类中，正是使用\
  \ Java 这类面向对象语言的正确方式。\n\n### 关于工厂类的一点说明\n\n你可能已经注意到，要获取 `DocumentBuilder` 对象，你必须使用\
  \ `DocumentBuilderFactory` 对象。同样，要获取 `SAXParser` 对象，你必须使用 `SAXParserFactory` 对象。工厂模式在\
  \ Java（以及其他面向对象语言，如 C++）中经常被使用，以允许创建具有不同属性的对象。例如，`SAXParserFactory` 类包含一种指定独立验证器对象的方法，以确保\
  \ XML 符合某个模式（模式是对一组数据应包含内容的定义）。\n\n工厂模式是一种方便的方式，用于呈现一组非常相似、仅通过某些功能的开启或关闭而有所不同的对象。否则，你就需要为每种可能的特性组合都创建一个类。在某些情况下，那将是一大堆非常相似的类。工厂模式为这个问题提供了一个易于使用且易于理解的解决方案。因此，Java\
  \ 的标准库中有许多工厂对象。你也可以创建自己的工厂类。当你发现自己需要创建许多非常相似（但略有不同）的对象时，可以考虑为它们创建一个工厂。\n\n### 总结\n\
  \n好了，以上就是关于如何使用 Java 处理 XML 的快速介绍。关于这个主题已经写了好几本好书，因为其复杂性远不止本文所呈现的这些。尽管如此，本章应该能让你为需要读写\
  \ XML 文件或流做好准备。\n\n具体来说，我们涵盖了 Java 处理 XML 的两种主要方式的基础知识：文档对象模型（DOM）和 XML 简化 API（SAX）。你了解到\
  \ DOM 提供了出色的性能，因为它将整个文档加载到内存中。然而，将整个文档加载到内存中也是 DOM 最大的问题，因为大型文档可能会超出可用内存。另一方面，SAX\
  \ 可以处理任意数量的 XML（包括千兆字节大小的数据流），但它需要为每种 XML 文档创建自定义的处理程序类。\n\n最后，我们探讨了工厂类的本质，了解了它们存在的原因，以及你可能在何时使用它们。\n\
  \n## 第 10 章\n\n## 动画\n\n动画涉及随时间变化的图像。有趣的是（至少对我们来说是这样，但我们热爱词源学），*动画*在计算机科学之外意味着“赋予生命”。动画图像确实看起来比静态图像更有生命力。\n\
  \n\n### 时机决定一切\n\n动画的本质在于时机。动画图像会每隔一段时间发生变化。通常，这个间隔非常短（每秒多次），但每分钟变化一次的图像（例如时钟）仍然属于动画，尽管看起来可能不那么有趣。为了让你了解动画图像变化的频率，我们来看看一些常见的动画速度，这些速度我们大多数人每天都会见到，甚至通常不会意识到它们是动画图像。\n\
  \n标准电视信号（STV，高清电视的前身）每秒显示约 30 帧新图像。也就是说，STV 信号的帧率为每秒 30 帧。*帧率*是动画、通用计算以及其他行业中的一个关键术语。你已经了解了它在动画中的含义。在通用计算中，“帧率”指的是程序处理所有输入并生成所有输出的频率。经典的例子是操控车辆的软件。如果车辆是海上的货轮，较低的帧率（例如每分钟一次）可能就足够了。而对于自动着陆器（用于月球或火星），可能需要接近每秒\
  \ 100 次的帧率。这样的系统被称为以某个*赫兹*运行，这是描述进程每秒重复多少次的技术术语。赫兹被用于许多行业，包括电子行业。最后，对于视频游戏，动画通常以每秒帧数（FPS）来衡量，这与赫兹相同，但属于行业特定术语。\n\
  \n回到常见的帧率（或 FPS），标准电视每秒显示 30 帧。大多数电影以 24 FPS 拍摄（尽管这正在迅速变为 60 FPS）。NTSC（美国的标准电视信号格式，高清电视的前身）以\
  \ 60 FPS 运行（但它是隔行扫描的，意味着屏幕被分成若干行，交替的行集每秒各显示 30 次）。许多其他国家（包括大部分欧洲国家）在标准电视中使用 50 FPS（隔行扫描）。ATSC\
  \ 标准（本质上是美国使用的高清电视标准）根据多种因素，每秒显示 24 到 60 帧。更新的高清电视设备声称帧率高达 240。最后，大多数计算机显示器在 75\
  \ 到 85 赫兹之间运行，即每秒 75 到 85 帧。\n\n最后一个速率通常是程序员最关心的（尽管游戏主机程序员也需要关注电视帧率）。我们可以制作能够显示每秒数百帧的动画系统，但这样做没有意义。没有显示器能显示那么多帧。因此，显示器的赫兹是计算机生成动画的实际限制。事实上，试图达到高于显示器赫兹的帧率不仅毫无意义，还可能有害，因为它会占用系统资源，使其无法处理其他工作（无论是你的进程还是其他进程）。\n\
  \n在为本章创建示例时，我们选择了 4 到 25 FPS 之间的帧率。这看起来可能很低，但对于示例来说已经足够了。较低的帧率甚至可能帮助你理解动画的工作原理，因为你可以看到动画发生的过程。如果你仔细观察精灵动画示例，你可以看到单个图像被绘制出来。\n\
  \n顺便提一下，人类（以及猫、狗和其他任何拥有非机械眼睛的生物）并不是以每隔一段时间闪过一帧的方式来看待世界的。作为模拟系统，人眼和大脑对光线、运动和颜色的稳定输入做出反应。游戏制作者和其他动画师（例如在法庭上重现车祸场景的人）通常关心的问题是，观众在什么速率下会感觉自己看到了逼真的画面（再次强调，这与看到真实事物不同）。这个数字根据许多因素而有很大差异，例如分辨率、屏幕内容的明暗平衡、观众所在区域的照明、观众的视力敏锐度（其本身又由年龄、疲劳程度、动画经验等多个变量决定）。\n\
  \n那么，你的应用程序合适的 FPS 是多少？唯一真正知道的方法是将它展示给几位不同的潜在用户，并询问他们看起来是否良好。此外，如果你做了大量动画工作，你可能会培养出对合适帧率的直觉。最后，游戏制作者通常关注竞争对手在做什么。如果他们的游戏以\
  \ 75 FPS 运行，你的游戏最好也能达到这个水平，或者有充分的理由不这样做。\n\n\n\n### 动画：一个简单示例\n\n让我们从基础开始：让一个物体从屏幕一侧移动到另一侧。我在游戏行业的朋友们说，这是游戏开发的“Hello,\
  \ World”阶段。为此，我们创建两个类：一个作为物体移动的场地，另一个作为主程序的框架。（我们也可以只用一个类来实现，但 Swing 使得创建一个独立的绘图场地更为简便。）清单\
