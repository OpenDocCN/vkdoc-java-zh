  `  public void mouseReleased(MouseEvent e) {`\n`    if (e.getSource() == sayButton)\
  \ {`\n`      JOptionPane.showMessageDialog(frame, sayText.getText(),`\n`        \"\
  你说的是\", JOptionPane.PLAIN_MESSAGE);`\n`    }`\n`  }`\n`}`\n\n程序变得很大了，不是吗？实际上，并非如此。它比我们目前完成的大部分程序都要大得多，但仍然没有许多真实程序那么大。管理复杂性是软件开发中很重要的一部分。如前所述，良好的设计和编码实践能让你管理代码的复杂性，同时仍然生成健壮的程序。顺便提一下，我反复强调这一点，因为它对良好的软件开发至关重要。\n\
  \n在这个例子中，我们通过添加一个 `arrangeComponents` 方法来管理额外的复杂性。该方法让你能将所有组件关联到一个 `JPanel` 上，然后将该面板添加到框架中。如果没有面板，框架就没有地方放置组件，因此\
  \ `JFrame` 和 `JPanel` 经常是成对出现的。和往常一样，还有其他方法，但在 Swing 应用程序中，一个 `JFrame` 对象带有一个或多个\
  \ `JPanel` 对象是很常见的。\n\n在更复杂的程序中，会有多个方法（可能还有多个类）来处理所有组件。在较大的 Swing 程序中，常见的做法是让每个窗口都由其自己的类来定义。在这样的系统中，另一个类（或一组类），称为控制器，决定哪个（或哪些）窗口应该可见，以及哪个窗口应该获得焦点。不过，我们这个小程序没那么复杂，所以一个类就够了。\n\
  \n\n\n我们还必须实现 `MouseListener` 接口，这样程序才能判断用户何时点击了按钮。`MouseListener` 接口要求实现五个方法，但我们只使用了其中一个。其他程序可能需要区分鼠标按钮按下和释放的时刻（例如，为了实现拖放或在绘图程序中绘制矩形框等行为），但我们这个小程序只需要知道用户点击了按钮。请注意为按钮添加鼠标监听器的那一行代码。每个你想要处理事件的组件都必须为其添加一个事件监听器。当有多个对象在监听事件时，你必须判断用户选择了哪个对象，并让程序做出相应的响应。`getSource`\
  \ 方法让我们能够做到这一点。在下一个示例中，你将看到更多关于这种决策逻辑的运用，无论是菜单还是按钮。\n\n![images](img/square.jpg)\
  \ **提示** 如果你需要检测鼠标按钮是否被点击，请使用 `mouseReleased` 方法，而不是 `mouseClicked` 方法。在许多 JVM 中，`mouseClicked`\
  \ 方法工作不正常（特别是会遗漏一些点击，这对用户来说很令人沮丧），而 `mouseReleased` 方法则更可靠。这是因为鼠标移动会中断鼠标监听器（Java\
  \ 有一个单独的监听器接口用于监控鼠标移动）。因此，如果你在点击按钮时稍微抖动了一下，就可能丢失这次鼠标点击。\n\n### 一个更大的 Swing 应用程序\n\
  \n碰巧的是，我喜欢扫雷和类似的游戏，所以我想自己编写一个扫雷游戏，作为 Swing 应用程序的一个更大、更真实的示例。扫雷不仅是我最喜欢的游戏之一，而且因为它同时使用了鼠标监听器和动作监听器，所以也是一个很好的示例。它也是那种受益于拥有一个程序类和多个额外类来处理各种功能的应用类型。\n\
  \n在开始之前，让我们思考一下这样一个程序的设计。表 7-1 描述了构成扫雷程序的各个类。\n\n![images](img/t0701.jpg)\n\n让我们从程序类（`MineSweeper`）开始。在代码清单\
  \ 7-4 之后，我将描述该类中的控制流程（换句话说，就是它的逻辑），并解释每个方法。与我们之前做过的事情相比，这是一个庞大而复杂的类。现在，即使看起来不太明白，也请通读一遍。然后我们将详细地分析它。代码清单\
  \ 7-4 展示了 `MineSweeper` 类。不过，在进入代码清单之前，让我们先通过图 7-4 看看我们将从 `MineSweeper` 类中得到什么。\n\
