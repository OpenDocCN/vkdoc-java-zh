  \ 对象来创建字符串。如果使用字符串连接运算符（`+`），JVM 会创建一个新的 String 对象，但同时会在内存中保留之前的 String 对象，这会迅速消耗大量内存。现代\
  \ JVM 在处理这个问题上已经有所改进，但这仍然是一个问题，良好的实践要求你在需要进行多次连接操作时使用 `StringBuilder`。\n\n如你所见，我将代码拆分成了几个方法，以清晰明确地分离算法的各个部分。这是许多开发者遵循的做法，当代码复杂度达到一定程度时，采用这种做法是很好的。每个程序员对于何时应该将一个长方法拆分成多个方法都有不同的阈值。我自己的阈值相当低。一个方法不需要变得很长，我就会开始想要拆分它。在这种情况下，拆分代码也让我能够分别处理每个步骤抛出的\
  \ `Exception` 对象。\n\n使用 DOM 创建 XML 的过程相当直接：\n\n1.  创建一个空的 `Document` 对象（包含所有其他内容的顶级\
  \ DOM 对象）。这在 `createDocument` 方法中完成。\n2.  创建元素和属性（以及它们的子元素、孙元素等，根据需要），并将这些元素和属性添加到\
  \ Document 对象中。`createElements` 方法执行此步骤。\n3.  将 DOM 对象的内容转换为 `String` 对象。`createXMLString`\
  \ 方法为你完成此步骤。\n4.  将 `String` 对象写入目标位置（本例中为文件）。`writeXMLToFile` 方法创建你的文件并将 XML 放入文件中。\n\
  \n#### 使用字符串编写 XML\n\n以下是通过写出 `String` 对象来生成相同输出的代码。\n\n***列表 9-5**. 使用字符串编写 XML*\n\
