  \n`  // 这里是更新游戏区域的地方`\n`  public void paint (Graphics g) {`\n`    super.paintComponent(g);`\n\
  `    for (int i = 0; i < targets.length; i++) {`\n`      // 这里我们在第一次循环时创建初始目标`\n\
  `      if (targets[i] == null) {`\n`        targets[i] = new Target(this);`\n`      }`\n\
  `      // 目标是否已完成（要么完全绘制完毕，要么已被点击？）`\n`      if (!targets[i].isDone()) {`\n`        //\
  \ 如果未完成，则在游戏区域中绘制它`\n`        targets[i].draw(g);`\n`      } else {`\n`        //\
  \ 如果已完成，则创建一个新目标并放入数组；`\n`        // 旧目标现在没有引用指向它，因此可以被垃圾回收`\n`        targets[i]\
  \ = new Target(this);`\n`      }`\n`    }`\n`  }`\n`  // 我们必须有此方法以满足 MouseListener\
  \ 契约`\n`  @Override`\n`  public void mouseClicked(MouseEvent e) {`\n`  }`\n`  //\
  \ 我们必须有此方法以满足 MouseListener 契约`\n`  @Override`\n`  public void mouseEntered(MouseEvent\
  \ e) {`\n`  }`\n\n`  // 我们必须有此方法以满足 MouseListener 契约`\n`  @Override`\n`  public\
  \ void mouseExited(MouseEvent e) {`\n`  }`\n\n`  // 我们必须有此方法以满足 MouseListener 契约`\n\
  `  @Override`\n`  public void mousePressed(MouseEvent e) {`\n`  }`\n\n`  // 这里是检查游戏区域内用户输入的地方`\n\
  `  // 并检查输入是否改变了游戏状态`\n`  // （因为用户击中了目标）`\n`  @Override`\n`  public void mouseReleased(MouseEvent\
  \ e) {`\n`    for (int i = 0; i < targets.length; i++) {`\n`      targets[i].pointInTarget(e.getX(),\
  \ e.getY());`\n`    }`\n`  }`\n`}`\n\n正如我们刚刚看到的，`TargetClickPanel` 类仅提供了目标出现的场所，处理游戏区域内的鼠标点击（`TargetClick`\
  \ 类处理菜单和框架中的鼠标点击），并维持五个目标处于活跃状态。\n\n在构成 `TargetClick` 游戏的三个类中，`Target` 类的任务最为简单：它绘制一个目标，并判断目标是否被击中。这看起来可能任务过多，你的第一反应可能是将命中逻辑移出此类。然而，如果玩家击中了目标，`Target`\
  \ 类的实例必须停止绘制其目标。因此，将命中逻辑放在 `Target` 类中是合理的。再次强调，赋予每个类明确的目的比将逻辑与表现分离更重要。在决定是否分离代码时，问自己两个有用的问题：我能进一步分离吗？进一步分离是否使代码更易于理解或维护？在这个例子中，代码本可以进一步分离。然而，进一步分离只会使这个简单的程序变得杂乱。\n\
  \n***清单 12-3.** Target 类*\n\n`package com.bryantcs.examples.videogames;`\n\n`import\
  \ java.awt.Color;`\n`import java.awt.Graphics;`\n\n`import javax.swing.JPanel;`\n\
  \n`public class Target {`\n`  // 绘制目标所需的基本信息：`\n`  // 它在哪里，现在有多大？`\n`  private int\
  \ drawX, drawY, step;`\n\n`  // 我们完成了吗？默认情况下，没有`\n`  private boolean done = false;`\n\
  \n`  // 对游戏区域的引用，我们用它来`\n`  // 为此目标寻找一个位置`\n`  JPanel panel;`\n\n`  // 构造函数`\n`  Target(JPanel\
  \ panel) {`\n`    this.panel = panel;`\n`    // -30 + 15 创建了一个 15 像素的边框`\n\n`    //\
  \ 在游戏区域中找到一个随机位置`\n`    drawX = TargetClick.random.nextInt(panel.getWidth() - 30)\
  \ + 15;`\n`    drawY = TargetClick.random.nextInt(panel.getHeight() - 30) + 15;`\n\
  \n`    // 启动步数计数器`\n`    step = 0;`\n`  }`\n\n`  // 这里是绘制目标的地方`\n`  void draw(Graphics\
  \ g) {`\n`    if (!done) {`\n`      // 如果未完成，则绘制一个大小随当前步数变化的圆`\n`      if (step\
  \ == 0) {`\n`        g.setColor(Color.RED);`\n`        g.fillOval(drawX - 15, drawY\
  \ - 15, 10, 10);`\n`      }`\n`      if (step == 1) {`\n`        g.setColor(Color.RED);`\n\
  `        g.fillOval(drawX - 15, drawY - 15, 20, 20);`\n`      }`\n\n`      if (step\
  \ == 2) {`\n`        g.setColor(Color.RED);`\n`        g.fillOval(drawX - 15, drawY\
  \ - 15, 30, 30);`\n`      }`\n`      if (step == 3) {`\n`        g.setColor(Color.RED);`\n\
  `        g.fillOval(drawX - 15, drawY - 15, 20, 20);`\n`      }`\n`      if (step\
  \ == 4) {`\n`        g.setColor(Color.RED);`\n`        g.fillOval(drawX - 15, drawY\
