  \      int previousColumns = mineSweeper.columns;`\n`      mineSweeper.rows = 8;`\n\
  `      mineSweeper.columns = 8;`\n`      mineSweeper.numberOfMines = 10;`\n`   \
  \   mineSweeperHelper.newGame(previousRows, previousColumns);`\n`      return;`\n\
  `    }`\n`    if (e.getActionCommand().equals(\"Medium (16 x 16, 40 mines)\")) {`\n\
  `      int previousRows = mineSweeper.rows;`\n`      int previousColumns = mineSweeper.columns;`\n\
  `      mineSweeper.rows = 16;`\n`      mineSweeper.columns = 16;`\n`      mineSweeper.numberOfMines\
  \ = 40;`\n`      mineSweeperHelper.newGame(previousRows, previousColumns);`\n` \
  \     return;`\n`    }`\n`    if (e.getActionCommand().equals(\"Large (16 x 32,\
  \ 100 mines)\")) {`\n`      int previousRows = mineSweeper.rows;`\n`      int previousColumns\
  \ = mineSweeper.columns;`\n`      mineSweeper.rows = 16;`\n`      mineSweeper.columns\
  \ = 32;`\n`      mineSweeper.numberOfMines = 100;`\n`      mineSweeperHelper.newGame(previousRows,\
  \ previousColumns);`\n`      return;`\n`    }`\n`  }`\n`}`\n\n与 `MineSweeperMouseListener`\
  \ 类类似，`MineSweeperActionListener` 也必须同时拥有一个 `MineSweeper` 对象和一个 `MineSweeperHelper`\
  \ 对象。为此，它有一个提供这两个对象的构造函数。该类中唯一的方法（请记住，构造函数虽然看起来很像，但它不是方法）是 `actionPerformed` 方法，它实现了\
  \ `ActionListener` 接口定义的唯一方法。\n\n`actionPerformed` 方法监听菜单事件，要么退出游戏，要么开始新游戏。在开始新游戏的情况下，它可以使用当前设置（游戏区域大小和地雷数量）开始新游戏，也可以使用新设置开始新游戏。对于不同大小的新游戏，`actionPerformed`\
  \ 方法会获取当前游戏区域的大小，设置新游戏区域的大小（通过设置 `MineSweeper` 对象中的值），然后调用 `MineSweeperHelper` 对象中的\
  \ `newGame` 方法。请记住，`newGame` 方法首先会移除构成游戏区域的现有按钮。这就是我们必须获取当前游戏区域大小的原因。\n\n与 `MineSweeperMouseListener`\
  \ 类一样，`MineSweeperActionListener` 也是一个简单的类。不过，它同样遵循了良好的设计原则，具有明确的目的，并且有助于简化 `MineSweeper`\
  \ 类（在我们将其拆分为五个类之前，该类变得越来越臃肿）。\n\n现在我们已经完成了整个 MineSweeper 程序，让我们看看最终得到的结果，即 图 7-5\
  \ 中完成的游戏。\n\n![images](img/0705.jpg)\n\n***图 7-5.** 一个完成的扫雷游戏*\n\n\n\n### 本章小结\n\
  \n在本章中，你看到了多个 Swing 应用程序，其复杂度逐步提升，最终实现了一个较大型的应用程序，它模拟了我们常见且流行的一款游戏。本章篇幅较长，代码量也很大，但它展示了我们第一个真实世界的示例。在本书后续章节中，我们还会创建多个真实的应用程序，但它们的规模都不会超过扫雷游戏。\n\
  \n在编写这些应用程序的过程中，我们了解到：\n\n*   Swing 应用程序可能会变得冗长（这是所有用户界面框架的通病）。\n*   Swing 应用程序的起点是一个\
  \ `JFrame` 对象，因为它为我们提供了一个窗口。\n*   添加组件的位置是内容面板。\n*   使用 Swing 组件的常规做法是：创建一个组件，设置其所需的属性（以便根据我们的目的进行定制），然后将该组件添加到另一个组件中。\n\
  *   将鼠标和菜单监听器（以及键盘监听器，如果需要的话）移到它们自己的类中会很方便，这样可以简化大型类，并让每个类专注于单一、明确的目的。\n*   拥有一个辅助类会很方便，同样是为了简化大型类。\n\
  *   一个类的所有成员都可以是静态的，以及如何使用这样的类。\n\n学习编程的最佳方法（在我看来也是唯一真正有效的方法）就是动手编程。所以，去自己编写一两个\
  \ Swing 应用程序吧。\n\n## 第 8 章\n\n## 文件的写入与读取\n\n对于几乎任何类型的程序来说，向文件写入数据和从文件读取数据都是常见的任务。即使是像我们的扫雷游戏这样简单的程序，也能从将信息存储到文件并在之后检索中受益。（扫雷游戏可以存储玩家上次选择的游戏尺寸，并记录每种尺寸的最佳完成时间。）Java\
  \ 提供了大量的类和接口来处理文件（以及相关的对象，如目录和驱动器）。这一切的核心就是那个命名恰当且常用的 `java.io.File` 类。“io” 代表输入/输出。\n\
  \n### 使用 File 对象\n\n关于使用 `java.io.File`（下文我将称之为“`File`”）对象，首先要了解的是：一个 `File` 对象**不是**一个文件。Java\
  \ 中的 `File` 对象是一个包含文件各种信息的对象。这种区别看似无关紧要，但实际上非常重要。考虑下面这段代码：`File myFile = new File();`\
  \ 这段代码并不会在你的系统上创建一个空文件。相反，它会在你的程序中创建一个对象。为了便于比较，我们来看一下在系统上创建空文件的代码。请注意，在创建文件对象之后，我们必须使用\
  \ `createNewFile()` 方法来创建文件。\n\n![images](img/square.jpg) **注意** 要使代码清单 8-1 和代码清单\
  \ 8-2 中的代码能够运行，你必须先在 C 盘上创建一个名为 `test` 的目录。\n\n图 8-1 展示了在运行代码清单 8-1 之前我的测试目录（我专门为这段代码创建的）。这张图并不激动人心，但我认为你应该先看看“之前”的图像，以便与图\
  \ 8-2（显示“之后”的图像）进行对比。\n\n![images](img/0801.jpg)\n\n***图 8-1.** 一个测试目录*\n\n***代码清单\
  \ 8-1.** 创建一个空文件*\n\n`package com.apress.java7forabsolutebeginners.examples;`\n\n\
  `import java.io.File;`\n\n`public class FileTest {`\n\n`    public static void main(String[]\
  \ args) {`\n`        String fileName = \"C:\\\\test\\\\myFile.txt\";`\n`        File\
  \ myFile = new File(fileName);`\n`        try {`\n`            myFile.createNewFile();`\n\
  `        } catch (Exception e) {`\n`            System.out.println(\"Couldn't create\
  \ \" + myFile.getPath());`\n`        }`\n`        System.out.println(\"Created \"\
  \ + myFile.getPath());`\n`    }`\n`}`\n\n如果你的 C 盘上有一个 `test` 目录，该程序会在该目录中创建一个名为\
  \ `myFile.txt` 的空文本文件。图 8-2 显示了我的 Windows 笔记本电脑上的结果。\n\n![images](img/0802.jpg)\n\
  \n***图 8-2.** 包含我们文件的测试目录*\n\n让我们来分析一下这段代码。首先，请注意我们使用了双反斜杠（这是一种转义序列，用于插入单个反斜杠）作为路径分隔符。使用双反斜杠实际上是一种不好的做法。它假设我们在\
  \ Windows（或 DOS）系统上运行。但是，当有人在 Unix、Linux 系统或 Mac 上运行我们的程序时会发生什么？JVM 可能会自行判断并使用正确的字符，但我们不能依赖这种事情。相反，我们应该使用\
  \ Java 的路径说明符来指定文件名，如代码清单 8-2 所示。\n\n其次，请注意我们必须处理异常才能使用 File 对象。几乎所有输入/输出类和接口中的方法都会抛出\
  \ `IOException`。正如我们在第 2 章“Java 语法”中学习异常基础知识时所了解到的，Java 对象通常会在程序范围之外的事情可能导致问题时抛出异常。对于处理文件的方法，你的程序无法预知文件系统上可能出现的所有问题。你可能会无意中指定一个不存在的目录或驱动器，或者指定一个无效的文件名。例如，我的笔记本电脑没有\
  \ Z 盘。所以，如果我尝试创建 `Z:\\\\test\\\\myFile.txt`，程序就会失败。代码清单 8-2 展示了如何创建一个路径在任何操作系统上都能工作的文件（只要该操作系统存在\
  \ JVM）。\n\n***代码清单 8-2.** 使用路径说明符创建空文件*\n\n`package com.apress.java7forabsolutebeginners.examples;`\n\
  \n`import java.io.File;`\n\n`public class FileTest {`\n\n`    public static void\
  \ main(String[] args) {`\n**`        String fileName = \"C:\" + File.separator +`**\n\
  **`                \"test\" + File.separator + \"myFile.txt\";`**\n`        File\
  \ myFile = new File(fileName);`\n`        try {`\n`            myFile.createNewFile();`\n\
  `        } catch (Exception e) {`\n`            System.out.println(\"Couldn't create\
  \ \" + myFile.getPath());`\n`        }`\n`        System.out.println(\"Created \"\
  \ + myFile.getPath());`\n`    }`\n`}`\n\n现在，无论我们在什么系统上运行该程序，我们都能为文件获得一个正确的路径。如果其他一切正常（C\
  \ 盘存在，`test` 目录存在，我们的程序有权限在该位置写入文件，等等），我们就能在预期位置得到一个全新的空文本文件。\n\n\n\n#### 打开文件\n\
  \n你可能无法一直只编写新文件，因此也需要了解如何打开一个已存在的文件。打开文件实际上就是创建一个与文件系统中某个文件相对应的 `File` 对象。然后，通过这个\
  \ `File` 对象，你可以对文件内容执行各种操作。我们稍后会介绍如何操作内容；现在，先为现有文件获取一个 `File` 对象。由于我们已经创建了 `myFile.txt`，现在就来获取该文件的\
  \ `File` 对象。为了确保我们确实找到了一个文件，可以使用 `exists()` 方法来检查文件是否存在，如清单 8-3 所示。\n\n***清单 8-3.**\
  \ 获取现有文件的 File 对象*\n\n`package com.apress.java7forabsolutebeginners.examples;`\n\
  \n`import java.io.File;`\n\n`public class FileTest {`\n\n`    public static void\
  \ main(String[] args) {`\n`        String fileName = \"C:\" + File.separator +`\n\
  `                \"test\" + File.separator + \"myFile.txt\";`\n`        File myFile\
  \ = new File(fileName);`\n`        System.out.println(fileName + \" exists? \" +\
  \ myFile.exists());`\n`    }`\n`}`\n\n请注意，无论文件是否存在，创建 `File` 对象的方式都是相同的。正如本章前面所述，`File`\
  \ 对象并不是一个文件。`File` 对象是一个路径规范（可能在文件系统中存在，也可能不存在）以及一些其他信息，这些信息可能与实际文件对应，也可能不对应。仅仅指定一个路径并为其创建一个新的\
  \ `File` 对象，并不会创建新文件，也不能证明现有文件存在。要完成这些操作，我们需要采取进一步的步骤，如清单 8-1 和 8-2（我们使用了 `createnewFile()`\
  \ 方法）以及清单 8-3（我们使用了 `exists()` 方法）所示。\n\n#### 删除文件\n\n有时，你也需要删除文件。这个过程与创建新文件或查找现有文件类似。清单\
  \ 8-4 展示了最简单的实现方式。\n\n***清单 8-4.** 删除文件*\n\n`package com.apress.java7forabsolutebeginners.examples;`\n\
  \n`import java.io.File;`\n\n`import java.io.IOException;`\n`public class FileTest\
  \ {`\n\n`  public static void main(String[] args) throws IOException {`\n`    String\
  \ fileName = \"C:\" + File.separator +`\n`        \"test\" + File.separator + \"\
  myFile.txt\";`\n`    File myFile = new File(fileName);`\n`    if(!myFile.exists())\
  \ {`\n`      throw new IOException(\"Cannot delete \" + fileName`\n`          +\
  \ \" because\" + fileName + \" does not exist\");`\n`    } else {`\n`      myFile.delete();`\n\
  `    }`\n`    System.out.println(fileName + \" exists? \" + myFile.exists());`\n\
  `  }`\n`}`\n\n顺便提一下，删除文件后无需再检查文件是否存在。如果操作失败，你会收到一条错误消息。我们添加了打印语句，以便程序能产生一些输出，让我们知道它已完成。图\
  \ 8-3 显示了程序在 `test` 目录中找到名为 `myFile.txt` 的文件并将其删除后的输出（在 Eclipse 的控制台窗口中）。\n\n![images](img/0803.jpg)\n\
  \n***图 8-3.** 成功删除文件的输出*\n\n图 8-4 显示了程序无法在 test 目录中找到并删除名为 `myFile.txt` 的文件时的输出（在\
  \ Eclipse 的控制台窗口中）。\n\n![images](img/0804.jpg)\n\n***图 8-4.** 删除文件失败时的输出*\n\n####\
  \ 处理临时文件\n\n*临时文件*为我们提供了一种存储数据的方式，这些数据我们可能在某个时候需要，但当前不需要，并且程序退出后也不希望保留。例如，大多数文字处理器在你处理文档时会保持一个临时文件打开。该文件有多种用途，包括在程序崩溃时提供一种至少恢复大部分工作的方法。临时文件仅在程序正常退出时才会被删除，因此崩溃会留下一个包含你工作的文件，这确实非常方便。\n\
  \n`File` 类提供了一些专门用于处理临时文件的方法。这些方法允许你创建多个临时文件，而无需为每个文件想一个新名称。相反，你可以指定一个前缀（至少三个字符长）、一个后缀（如果将后缀设置为\
  \ `null`，则默认为 `.tmp`），以及（可选地）一个目录。如果不指定目录，JVM 会在系统的临时目录中创建你的文件。在大多数系统上，默认的临时目录是用户目录的一个子目录。\n\
  \n那么，让我们看看如何在清单 8-5 中创建一批临时文件。\n\n***清单 8-5.** 创建临时文件*\n\n`package com.apress.java7forabsolutebeginners.examples;`\n\
  \n`import java.io.File;`\n\n`public class FileTest {`\n\n`    public static void\
  \ main(String[] args) {`\n`        String tempDirectoryName = \"C:\" + File.separator\
  \ + \"test\";`\n`        File tempDirectory = new File(tempDirectoryName);`\n`        for\
  \ (int i = 0; i < 10; i++) {`\n`            try {`\n`                File thisFile\
  \ =`\n`                    File.createTempFile(\"tmp\", null, tempDirectory);`\n\
  `            } catch (Exception e) {`\n`                System.out.println(\"Couldn't\
  \ create temp file \" + i);`\n`            }`\n`        }`\n`        System.out.println(\"\
  Done creating temp files\");`\n`    }`\n`}`\n\n`createTempFile` 方法保证在程序生命周期内创建的每个临时文件都是不同的。它不保证文件名对人类有实际意义。清单\
  \ 8-6 显示了程序在我们的 `test` 目录中创建的文件名称。\n\n***清单 8-6.** 临时文件名*\n\n`tmp1672349819571008723.tmp`\n\
  `tmp3234113842230809615.tmp`\n`tmp5343720775549909618.tmp`\n`tmp6194798942830449846.tmp`\n\
  `tmp7016714774703888253.tmp`\n`tmp720922773409895465.tmp`\n`tmp7634665877605496722.tmp`\n\
  `tmp7730975525106591320.tmp`\n`tmp799007629249445444.tmp`\n`tmp8048303951856646489.tmp`\n\
  \n图 8-5 显示了在我的测试目录中创建临时文件后的情况。\n\n![images](img/0805.jpg)\n\n***图 8-5.** 测试目录中的临时文件*\n\
  \n有些系统会创建文件并让它们在系统中保留很长时间（通常直到用户删除它们，通常是通过程序的用户界面而不是通过文件系统）。例如，Windows Live Mail\
  \ 将每封邮件存储为一个单独的文件。尽管如此，我们通常希望删除可能创建的任何临时文件。（否则，它们看起来就不太像临时文件了。）要删除我们创建的任何临时文件，只需添加一行代码，如清单\
  \ 8-7 所示。\n\n***清单 8-7.** 删除临时文件*\n\n`package com.apress.java7forabsolutebeginners.examples;`\n\
  \n`import java.io.File;`\n\n`public class FileTest {`\n\n`    public static void\
  \ main(String[] args) {`\n`        String tempDirectoryName = \"C:\" + File.separator\
  \ + \"test\";`\n`        File tempDirectory = new File(tempDirectoryName);`\n`        for\
  \ (int i = 0; i < 10; i++) {`\n`            try {`\n`                File thisFile\
  \ =`\n`                    File.createTempFile(\"tmp\", null, tempDirectory);`\n\
  **`thisFile.deleteOnExit();`**\n`            } catch (Exception e) {`\n`                System.out.println(\"\
  Couldn't create temp file \" + i);`\n`            }`\n`        }`\n`        System.out.println(\"\
  Done creating temp files\");`\n`    }`\n`}`\n\n`deleteOnExit()` 方法告诉 JVM 在程序退出时删除与特定\
  \ `File` 对象关联的文件（或目录，或一组目录和文件）。在这种情况下，文件不会存在很长时间。然而，在一个功能更复杂的程序中，临时文件可能会在程序执行其任务期间存在相当长的时间。例如，考虑一个游戏，它正在临时文件中存储各种信息。这些文件会一直存在，直到你停止玩游戏。\n\
  \n\n\n#### 创建目录\n\n有时，你需要创建一个目录来存放所创建的文件。实际上，`File` 类既可以定义目录，也可以定义文件。（在本章前面处理临时文件的程序中，你曾见过一个例子：我们使用\
  \ `File` 对象来指定测试目录。）请记住，`File` 对象是一个包含其他信息的路径。该路径可以指向一个文件或一个目录。清单 8-8 展示了一个创建目录的简单程序。\n\
  \n***清单 8-8.** 创建目录*\n\n`package com.apress.java7forabsolutebeginners.examples;`\n\
  \n`import java.io.File;`\n\n`public class FileTest {`\n\n`    public static void\
  \ main(String[] args) {`\n**`String testDirectoryName = \"C:\" + File.separator\
  \ + \"test\";`**\n**`File testDirectory = new File(testDirectoryName);`**\n`        try\
  \ {`\n`            testDirectory.mkdir();`\n`        } catch (Exception e) {`\n\
  `            System.out.println(\"无法创建名为 \"`\n`                    + testDirectoryName\
  \ + \" 的目录\");`\n`            System.exit(1);`\n`        }`\n`        System.out.println(\"\
  已创建名为 \" + testDirectoryName + \" 的目录\");`\n`    }`\n`}`\n\n请注意，我们使用的是 `mkdir` 方法，而不是\
  \ `createNewFile` 方法。Windows 系统要求我们拥有特殊权限才能写入 `C:` 盘的根目录。任何在系统上创建名为 `C:\\test` 的文件的尝试都会失败。（如果我们将路径改为\
  \ `C:\\temp\\test`，我们会在 `test` 目录下得到一个名为 `test`（无扩展名）的文件。）然而，我们可以在根目录下创建一个子目录，因此\
  \ `mkdir` 方法可以正常工作。\n\n你也可以创建多个目录，形式为指向特定位置的较长路径。假设我们想创建一个名为 `C:\\test\\test2\\\
  test3` 的目录。我们可以使用 `mkdirs` 方法（注意末尾的 s）来实现，如清单 8-9 所示（其中指定路径的行和 `mkdirs` 行已高亮显示）。\n\
  \n***清单 8-9.** 创建多个目录*\n\n`package com.apress.java7forabsolutebeginners.examples;`\n\
  \n`import java.io.File;`\n\n`public class FileTest {`\n\n`    public static void\
  \ main(String[] args) {`\n**`String testDirectoryName = \"C:\" + File.separator\
  \ + \"test\" +`**\n**`File.separator + \"test2\" + File.separator + \"test3\";`**\n\
  `        File testDirectory = new File(testDirectoryName);`\n`        try {`\n**`testDirectory.mkdirs();`**\n\
  `        } catch (Exception e) {`\n`            System.out.println(\"无法创建名为 \"`\n\
  `                    + testDirectoryName + \" 的目录\");`\n`            System.exit(1);`\n\
  `        }`\n`        System.out.println(\"已创建名为 \" + testDirectoryName + \" 的目录\"\
  );`\n`    }`\n`}`\n\n请注意 `System.Exit(1)` 命令。如果发生错误，该行会使程序停止（更准确地说，它会终止当前正在运行的 Java\
  \ 虚拟机）。按照惯例（并且是一个古老的惯例），退出代码 0 表示程序正常终止（即没有错误）。任何其他值都表示某种错误。在详细的异常信息出现之前（并且在当今某些系统中仍然如此），当程序失败时，人们只能得到一个晦涩的数字。然后，有人必须在一个错误代码列表中查找这个数字，才能知道发生了什么。优秀的系统操作员能记住大量这样的代码。如今，开发人员很高兴能获得更有意义的输出。\n\
  \n像往常一样，你可以在 Eclipse 的控制台中看到目录的名称。我还包含了程序运行后文件系统的截图，只是为了证明它确实有效。图 8-6 显示了我系统上 Windows\
  \ 资源管理器路径字段中的目录。\n\n![images](img/0806.jpg)\n\n***图 8-6.** 创建三个嵌套目录的结果*\n\n####\
  \ 删除目录\n\n类似地，你可能需要在某个时候删除一个目录。正如你现在可能预料到的，执行此操作的代码与创建目录的代码非常相似，如清单 8-10 所示。\n\n\
  ***清单 8-10.** 删除目录*\n\n`package com.apress.java7forabsolutebeginners.examples;`\n\
  \n`import java.io.File;`\n\n`public class FileTest {`\n\n`  public static void main(String[]\
  \ args) {`\n`    String testDirectoryName = \"C:\" + File.separator + \"test\";`\n\
  `    File testDirectory = new File(testDirectoryName);`\n`    if (testDirectory.exists())\
  \ {`\n`      testDirectory.delete();`\n`      System.out.println(\"已删除名为 \" + testDirectoryName\
  \ + \" 的目录\");`\n`    } else {`\n`      System.out.println(\"无法删除 \" + testDirectory`\n\
  `          + \"，因为它不存在\");`\n`    }`\n`  }`\n`}`\n\n\n\n#### 删除多个目录\n\n如果使用 `mkdirs`\
  \ 方法且 JVM 无法创建最终目录，它可能会沿途创建部分目录。这是一个问题，因此你需要检查路径链中的每个目录并将其删除。出于这个原因，路径有时会存储为单个值的集合（例如，在\
  \ `String` 对象的数组中），以便可以通过编程方式处理它们。在不能创建空目录的情况下（这始终很重要，因为杂乱地填充用户驱动器是不好的做法），最好将路径的各个部分存储为一个集合，并逐个创建每个目录，如果某个目录创建失败，则停止并删除已创建的任何目录。因此，如果我们关心在目录创建尝试失败后删除路径片段，我们就不会使用\
  \ `mkdirs` 方法。清单 8-11 展示了一个小程序，该程序会创建目录直到某个目录创建失败，然后删除沿途可能创建的任何目录。\n\n![images](img/square.jpg)\
  \ **注意** 如果你的 C 盘上仍有一个名为 test 的目录，请在运行清单 8-11 中的代码之前将其删除。\n\n***清单 8-11.** 创建路径失败时回滚目录*\n\
  \n`package com.apress.java7forabsolutebeginners.examples;`\n\n`import java.io.File;`\n\
  \n`public class FileTest {`\n\n`  public static void main(String[] args) {`\n`    String\
  \ currentPath = \"C:\";`\n`    // 在我的 Windows 机器上，双冒号是非法的，因此这会失败`\n`    String[]\
  \ pathParts = {\"test\", \"test2\", \"test3::fail\"};`\n`    for (String pathPart:\
  \ pathParts) {`\n`      currentPath += File.separator + pathPart;`\n`      File\
  \ testDirectory = new File(currentPath);`\n`      if (!testDirectory.mkdir()) {`\n\
  `        System.out.println(\"创建 \" + testDirectory`\n`            + \" 失败；正在删除所有已创建的目录\"\
  );`\n`        removePathByParts(\"C:\", pathParts);`\n`      } else {`\n`        System.out.println(\"\
  已创建 \" + testDirectory);`\n`      }`\n`    }`\n`  }`\n\n`  private static void removePathByParts(String\
  \ pathStart, String[] pathParts) {`\n`    String currentPath = pathStart;`\n`    String[]\
  \ paths = new String[pathParts.length];`\n`    // 首先，构建一个可能的路径数组`\n\n`    for (int\
  \ pathCounter = 0; pathCounter < pathParts.length; pathCounter++) {`\n`      currentPath\
  \ += File.separator + pathParts[pathCounter];`\n`      paths[pathCounter] = currentPath;`\n\
  `    }`\n`    // 然后反向遍历，检查每个路径是否存在`\n`    // 如果找到则将其删除`\n`    for (int pathCounter\
  \ = pathParts.length - 1; pathCounter >= 0;`\n`          pathCounter--) {`\n`      File\
  \ currentFile = new File(paths[pathCounter]);`\n`      if (currentFile.delete())\
  \ {`\n`        System.out.println(\"已移除 \" + currentFile);`\n`      }`\n`    }`\n\
  `  }`\n`}`\n\n如你所见，修复失败的 `mkdirs` 运行需要费些功夫。（当然，可能有更好的方法来解决这个问题。）你是否曾遇到过软件安装失败，然后发现留下了目录？这是因为在几乎所有的编程语言中，回滚路径都是一件麻烦事，有些人甚至懒得去做，即使是商业软件也是如此。\n\
  \n图 8-7 显示了尝试使用不可能的名称创建目录以及回滚目录创建过程的输出。\n\n![images](img/0807.jpg)\n\n***图 8-7.**\
  \ 回滚失败的目录创建操作*\n\n### 写入和读取内容\n\n我们涵盖了不少内容，却从未向文件写入或从文件读取一个字节。在软件开发中，经常发生的情况是，你必须花时间先理解一件事，然后才能理解另一件事。几乎所有的研究领域都有足够的复杂性，需要学习先决知识，软件开发也是如此。正如比尔·科斯比曾调侃的那样：“我必须先给你讲那个笑话，然后才能给你讲这个笑话。”\n\
  \n#### 顺流而下\n\n在 Java（以及某些其他语言）中，从文件读取和向文件写入依赖于一种称为*流*的结构。流是进出文件的数据，附带一些元数据（即关于数据的数据），用于指示诸如可用字节数（在正在读取的文件中）、数据是入站还是出站、相关文件的文件描述符等信息。在下一章处理\
  \ XML 文件时，我们会对流做更多操作（因为我们使用不同类型的流）。现在，只需记住流是保存进出文件内容的数据结构。\n\n\n\n#### 读取文件内容\n\n\
  在进一步深入之前，我们首先需要一个包含内容的文件。因此，让我们设置一个测试用例。将清单 8-12（摘自莎士比亚戏剧*《哈姆雷特》*的几行文字）中的内容复制到一个名为\
  \ `Hamlet.txt` 的文本文件中，并将该文件放入你的 `C:\\test` 目录下。\n\n***清单 8-12.** Hamlet.txt 的原始内容*\n\
  \n`To sleep: perchance to dream: ay, there's the rub;`\n`For in that sleep of death\
  \ what dreams may come`\n`When we have shuffled off this mortal coil,`\n`Must give\
  \ us pause: there's the respect`\n`That makes calamity of so long life`\n\n（如果你不喜欢我选的这段内容，也可以随意使用你自己喜欢的片段。就目前而言，我们只需要一些文本即可。）\n\
  \n现在我们有了一个包含内容的文件，就可以通过程序将该内容读入内存。要读取文件内容，Java 开发者通常会使用 `FileInputStream` 对象。清单\
  \ 8-13 展示了一个简单的程序，用于读取文件并在控制台中重复其内容：\n\n***清单 8-13.** 在控制台中输出 hamlet.txt*\n\n`package\
  \ com.apress.java7forabsolutebeginners.examples;`\n\n`import java.io.File;`\n`import\
  \ java.io.FileInputStream;`\n`import java.io.FileNotFoundException;`\n`import java.io.IOException;`\n\
  \n`public class ReadFile {`\n\n`    public static void main(String[] args) {`\n\
  `        // 指定文件`\n`        String fileName = \"C:\" + File.separator + \"test\"\
  `\n`            + File.separator + \"Hamlet.txt\";`\n`        File hamletFile =\
  \ new File(fileName);`\n`        // 设置一个字节数组来保存文件内容`\n`        byte[] content =\
  \ new byte[0];`\n`        try {`\n`            // 为文件创建一个输入流`\n`            FileInputStream\
  \ hamletInputStream = new FileInputStream(hamletFile);`\n`            // 计算文件有多少内容`\n\
  `            int bytesAvailable = hamletInputStream.available();`\n`            //\
  \ 将内容数组设置为内容的长度`\n`            content = new byte[bytesAvailable];`\n`            //\
  \ 将文件内容加载到我们的字节数组中`\n`            hamletInputStream.read(content);`\n`            //\
  \ 关闭流`\n`            hamletInputStream.close();`\n`        } catch (FileNotFoundException\
  \ fnfe) {`\n`            System.out.println(\"找不到名为 \" + fileName + \" 的文件\");`\n\
  `        } catch (IOException ioe) {`\n`            System.out.println(\"无法从名为 \"\
  \ + fileName + \" 的文件中读取\");`\n`        }`\n`        // 将内容转换为字符串`\n`        //\
  \ 并将其输出到控制台`\n`        System.out.print(new String(content));`\n`    }`\n`}`\n\n\
  让我们分析一下这个程序。在完成我们已经知道如何做的步骤（查找文件）之后，我们首先设置一个数据结构（字节数组）来保存文件的内容。然后，我们设置一个 `try`-`catch`\
  \ 块来处理处理文件时可能出现的异常。我们可以通过仅处理 `Exception`（`FileNotFoundException` 和 `IOException`\
  \ 的父类对象）来处理这两种异常，但这样我们就无法知道具体出了什么问题。在诊断问题时，更详细的信息（在一定范围内）通常更好。\n\n在我们的 `try`-`catch`\
  \ 块中，我们创建一个流对象来保存文件的内容，然后将流的内容读取到我们的字节数组中。接着我们关闭流。在这个简单的例子中，我们并不需要关闭流。当程序退出时，JVM\
  \ 会为我们关闭它。然而，尽快关闭文件是一个好习惯。每个打开的文件都会迫使操作系统提供一个称为文件句柄的对象。打开的文件过多会严重降低计算机的性能，导致程序崩溃，甚至导致操作系统崩溃。\n\
  \n将文件内容存入内存后，我们就可以对其进行操作。在这个例子中，我们将其转换为一个 `String` 对象，并将该 `String` 对象发送到控制台，从而镜像出文件的内容。我们还可以对文件内容做许多其他事情。例如，文字处理程序会将内容显示给用户，以便用户修改内容；游戏可能会初始化某些值（比如地图的大小或对手的激进程度），等等。\n\
  \n\n\n#### 写入文件内容\n\n写入文件的操作与读取文件非常相似。我们获取一个流，将要写入文件的内容放入流中，将内容写入文件，然后关闭流。清单 8-14\
  \ 展示了一个实现此功能的程序。它稍微复杂一些，但仍然很直观。为了增加趣味性，并确保我们在运行程序前后对比文件时能看到一些变化，我们在此过程中将文件内容反转。\n\
  \n***清单 8-14.** 写入 hamlet.txt*\n\n`package com.apress.java7forabsolutebeginners.examples;`\n\
  \n`import java.io.File;`\n\n`import java.io.FileInputStream;`\n`import java.io.FileNotFoundException;`\n\
  `import java.io.FileOutputStream;`\n`import java.io.IOException;`\n\n`public class\
  \ WriteFile {`\n\n`    public static void main(String[] args) {`\n`        // 指定文件`\n\
  `        String fileName = \"C:\" + File.separator + \"test\"`\n`            + File.separator\
  \ + \"Hamlet.txt\";`\n`        File hamletFile = new File(fileName);`\n`        //\
  \ 设置一个字节数组来保存文件内容`\n`        byte[] content = new byte[0];`\n`        try {`\n`            //\
  \ 为文件创建输入流`\n`            FileInputStream hamletInputStream = new FileInputStream(hamletFile);`\n\
  `            // 计算文件内容的大小`\n`            int bytesAvailable = hamletInputStream.available();`\n\
  `            // 将内容数组设置为内容长度`\n`            content = new byte[bytesAvailable];`\n\
  `            // 将文件内容加载到我们的字节数组中`\n`            hamletInputStream.read(content);`\n\
  `            // 关闭流`\n`            hamletInputStream.close();`\n`        } catch\
  \ (FileNotFoundException fnfe) {`\n`            System.out.println(\"找不到名为 \" +\
  \ fileName + \" 的文件\");`\n`        } catch (IOException ioe) {`\n`            System.out.println(\"\
  无法从名为 \" + fileName + \" 的文件中读取\");`\n`        }`\n`        // 反转数组的内容，只是为了让我们`\n\
  `        // 知道我们对文件内容做了些操作`\n`        reverseByteArray(content);`\n`        try\
  \ {`\n`            // 为输出创建流`\n`            FileOutputStream hamletOutputStream`\n\
  `                = new FileOutputStream(hamletFile);`\n`            // 将输出写入流`\n\
  `            // （从而写入文件）`\n`            hamletOutputStream.write(content);`\n`            //\
  \ 关闭输出流`\n`            hamletOutputStream.close();`\n`        } catch (FileNotFoundException\
  \ fnfe) {`\n`            System.out.println(\"找不到名为 \" + fileName + \" 的文件\");`\n\
  `        } catch (IOException ioe) {`\n`            System.out.println(\"无法写入名为\
  \ \" + fileName + \" 的文件\");`\n`        }`\n`    }`\n\n`    private static void\
  \ reverseByteArray(byte[] inBytes) {`\n`        int inLength = inBytes.length;`\n\
  `        for (int i = 0; i < inLength >> 1; i++) {`\n`            byte temp = inBytes[i];`\n\
  `            inBytes[i] = inBytes[inLength - i - 1];`\n`            inBytes[inLength\
  \ - i - 1] = temp;`\n`        }`\n`    }`\n`}`\n\n在继续审查文件之前，我们先来研究一下 `reverseByteArray`\
  \ 方法。它执行的是所谓的*原地反转*，因为我们修改了原始对象而没有使用任何额外的内存。由于我们使用的是对象（例如数组）已经占用的同一内存区域，因此被称为“原地”操作。我们之所以能做到这一点，是因为\
  \ Java 传递的是对象的内存地址而不是值。对于基本类型，我们无法这样做，因为 Java 传递的是基本类型值的副本。许多开发者更喜欢原地操作，因为它们消耗更少的内存，并且通常比先复制内容再修改副本的代码执行得更快。\n\
  \n顺便提一下，这个特定的反转算法同时从输入的两端开始操作。尽管你可能认为我们需要担心字节数是偶数还是奇数，但实际上我们无需关注这个细节。如果从偶数个字节开始，我们会沿着数组走到中间，并交换中间的两个字节。如果是奇数个字节，中间的字节根本不会移动。此外，右移一位比除以二稍微快一点。结合同时从两端操作和原地反转（即不创建额外的数组来保存中间结果），这个反转算法几乎可以达到反转算法的最快速度，是一个值得记住的实用技巧。\n\
  \n或者，我们可以使用 Java 的 `StringBuffer` 类来反转文件内容。为此，我们必须将 `content` 变量转换为 `String` 对象，创建\
  \ `StringBuffer` 类的实例，在 `StringBuffer` 对象上调用 `reverse` 方法，然后将 `StringBuffer.reverse`\
  \ 的结果转换回字节数组。清单 8-15 展示了反转字节数组内容的另一种方法。\n\n***清单 8-15.** 反转字节数组的另一种方法*\n\n`    String\
  \ contentString = content.toString();`\n`    StringBuffer sb = new StringBuffer(contentString);`\n\
  `    sb.reverse();`\n`    content = sb.toString().getBytes();`\n\n我向你展示另一种反转字节内容的方法，是为了说明几乎总有其他方法可以完成事情，并阐明一个你应该了解的问题：转换的代价很高。清单\
  \ 8-15 中的代码执行了多次转换（`toString` 方法和 `getBytes` 方法都是转换）。然而，转换会消耗时间和内存，因此你可以通过使用不需要转换的算法来优化代码。相反，`reverseByteArray`\
  \ 方法的所有操作都基于字节，从未尝试转换为其他类型，因此它占用的资源（内存）更少，运行速度也更快。请记住，除非必须，否则不要进行类型转换。\n\n现在检查 `hamlet.txt`\
  \ 的内容。你会发现它已经完全反转，如清单 8-16 所示。\n\n***清单 8-16.** 反转后的 Hamlet*\n\n`efil gnol os fo\
  \ ytimalac sekam tahT`\n`tcepser eht s'ereht :esuap su evig tsuM`\n`,lioc latrom\
  \ siht ffo delffuhs evah ew nehW`\n`emoc yam smaerd tahw htaed fo peels taht ni\
  \ roF`\n`;bur eht s'ereht ,ya :maerd ot ecnahcrep :peels oT`\n\n现在你了解了如何打开文件、读取其内容以及替换（和反转）该内容。我们也可以修改文件内容，而不是替换它。一个简单的操作是将新内容追加到现有内容之后。为此，我们需要在打开文件时指定要追加内容，方法是使用不同的\
  \ `File` 构造函数。为了使其打印效果更好，我们还在原始内容和反转内容之间添加了一个换行符（`'\\n'`）。清单 8-17 展示了代码，其中新增和更改的行已突出显示。\n\
