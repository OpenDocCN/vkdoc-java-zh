  \ MineSweeperHelper helper) {`\n`    this.mineSweeper = mineSweeper;`\n`    mineSweeperHelper\
  \ = helper;`\n`  }`\n\n`  @Override`\n`  public void mouseClicked(MouseEvent e)\
  \ {`\n`  }`\n\n`  @Override`\n`  public void mouseEntered(MouseEvent e) {`\n`  }`\n\
  \n`  @Override`\n`  public void mouseExited(MouseEvent e) {`\n`  }`\n\n`  @Override`\n\
  `  public void mousePressed(MouseEvent e) {`\n`  }`\n\n`  @Override`\n`  public\
