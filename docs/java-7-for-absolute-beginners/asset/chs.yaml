  \ smaerd tahw htaed fo peels taht ni roF`\n`;bur eht s'ereht ,ya :maerd ot ecnahcrep\
  \ :peels oT`\n\n### 总结\n\n软件开发人员经常需要处理文件，而 Java 提供了丰富的类来让我们做到这一点。正如我们所看到的，我们使用 `File`\
  \ 类来处理文件和目录，并使用流（`FileInputStream` 对象和 `FileOutputStream` 对象）来读取和写入文件。我们学到了关于 `File`、`FileInputStream`\
  \ 和 `FileOutputStream` 对象的许多知识：\n\n*   `File` 对象可以表示由路径定义的目录结构。\n*   `File` 对象不是文件或目录。它是一个代表文件或目录的对象。\n\
  *   `File` 对象所代表的文件或目录不一定存在。\n*   创建目录的失败尝试可能会留下不需要的目录，因此我们需要在目录创建操作失败后进行清理。\n*\
  \   `FileInputStream` 对象和 `FileOutputStream` 对象使用字节数组来读取和写入文件。\n*   我们可以通过使用字节数组将\
  \ `FileInputStream` 对象的内容加载到 `FileOutputStream` 对象中。\n\n处理目录、文件和文件内容可能不是最令人兴奋的编程类型，但它通常是必要的。随着你编程生涯的继续（无论是作为专业人士还是爱好者），你几乎肯定会定期处理文件。\n\
  \n和往常一样，我鼓励你编写一些自己的程序。这里有几个想法可以尝试：\n\n*   读取一个文件的内容并将其放入另一个文件中。\n*   读取一个目录中的所有文件名并将它们放入一个文件中。\n\
  *   在上一个想法的基础上，为文件名添加完整路径名。\n*   创建一个文件中列出的所有文件。\n*   创建一个文件中列出的所有文件，但每个文件使用不同的路径。\n\
  \n![images](img/square.jpg) **提示** 在测试文件时，只从测试目录中的文件进行读写，就像我们在本章中所做的那样。这降低了意外更改可能导致问题的文件的风险。此外，要经常测试，以确保你处理的文件最终位于正确的位置并具有正确的内容。\n\
  \n## 第 9 章\n\n## 编写和读取 XML\n\nXML 代表可扩展标记语言（Extensible Markup Language）。你可能会认为它应该是“eXtensible\
  \ Markup Language”，但事实并非如此。撇开奇怪的缩写不谈，XML 值得被收录在一本面向初学者的编程书中，因为随着你的软件开发生涯（无论是作为爱好者还是专业人士）的继续，你不可避免地会在各种地方遇到\
  \ XML。它用于存储文档，从单个网页的内容到整套百科全书的内容。它还用于在应用程序之间传输数据，无论运行这些应用程序的服务器是在地球的另一半还是在同一个房间。它甚至被用于（与层叠样式表一起）在\
  \ Web 浏览器中显示信息。在过去的十几年里，我工作过的每一家公司，以及我编写的每一个应用程序（至少那些比扫雷更严肃和重要的应用程序），都至少在一定程度上使用了\
  \ XML。\n\n尽管有一种名为 XSLT（可扩展样式表语言转换）的专门语言用于处理 XML，但 Java 也是一种非常流行的用于处理 XML 的语言。此外，最好和最流行的\
  \ XSLT 处理器之一，名为 Saxon，就是用 Java 编写的。Java 在处理 XML 方面特别方便，因为它包含了许多专门用于处理（读取、写入和转换）XML\
  \ 的包。最常见的两个包（很大程度上是因为它们包含在 Java 中）是 DOM（文档对象模型）和 SAX（XML 简单 API）。你可以使用 DOM 来读取和写入\
  \ XML。SAX 只能读取（或者更准确地说，解析）XML。不过，对于编写 XML，你也可以创建一个 `String` 对象并将其写入文件。如果操作正确，编写\
  \ `String` 对象在生成 XML 时提供了最低的开销（无论是在内存还是速度方面）。本章将介绍如何从 DOM 和 `String` 对象编写 XML，以及如何使用\
  \ DOM 和 SAX 读取 XML。\n\n\n\n### XML 的结构\n\n在开始处理 XML 内容之前，你应该先了解 XML 的外观并学习其本质。首先，要知道\
  \ XML 虽然被称为一种语言，但它与 Java 并非同一种意义上的语言。XML 是一种存储格式，本身不提供任何处理能力。它没有循环结构，也没有指定变量或数据类型的方法（程序可能会使用少量\
  \ XML 作为变量或数据类型，但这与 Java 的做法不同）。因此，XML 实际上只是以特定方式组织起来的文本。\n\n任何 XML 文档的根节点都是一个单一元素。该元素可以拥有任意数量的子元素，每个子元素又可以拥有任意数量的子元素，以此类推，从而形成任意复杂度和深度的层级结构（也就是说，XML\
  \ 文档可以是任意大小，元素可以嵌套到任意深度）。此外，每个元素都可以拥有任意数量的属性。然而，属性不能包含子元素，因此在大多数 XML 文档中，大部分内容都来自元素。\n\
  \n在进一步深入之前，先来看一下最小的 XML 文件。\n\n***清单 9-1.** 最小的 XML 文件*\n\n`<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>`\n`<elementName/>`\n\n我曾处理过包含许多此类文件的系统，因为在一组用于存放复杂流程输出的目录中，每个目录都必须至少包含一个文件。因此，我们有一堆内容如下的\
  \ XML 文件：`<?xml version=\"1.0\" encoding=\"UTF-8\"?><placeholder/>` 稍后你将看到确切的语法。在此之前，一个更有意义的示例将有助于澄清问题。下面是我最喜欢的一首诗，编码为\
  \ XML 文档。\n\n***清单 9-2**. XML 示例*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n\
  `<poem title=\"The Great Figure\" author=\"William Carlos Williams\">`\n`  <line>Among\
  \ the rain</line>`\n`  <line>and lights</line>`\n`  <line>I saw the figure 5</line>`\n\
  `  <line>in gold</line>`\n`  <line>on a red</line>`\n`  <line>fire truck</line>`\n\
  `  <line>moving</line>`\n`  <line>tense</line>`\n`  <line>unheeded</line>`\n`  <line>to\
  \ gong clangs</line>`\n`  <line>siren howls</line>`\n`  <line>and wheels rumbling</line>`\n\
  `  <line>through the dark city</line>`\n`</poem>`\n\n第一行是文档声明，表明该文档是一个 XML 文档，并指定了版本（1.0，这是最常用的版本，足以满足大多数用途）和编码。文档声明总是以\
  \ `<?` 开头，以 `?>` 结尾。这样，它们就不会与 XML 元素混淆。大多数能够处理 XML 的系统都可以处理没有文档声明的文档，但严格来说，没有文档声明的文档并不是一个\
  \ XML 文件——它只是一组看起来像 XML 文件的字符集合。这似乎是一个武断且微不足道的区别，但你的 XML 文档可能仅仅因为这个原因而被某些系统拒绝，因此最好养成始终包含文档声明的习惯。编码指明了适用于内容的字符集。UTF-8\
  \ 是一个大型字符集，包含了大多数非亚洲语言（包括英语、希腊语、西班牙语、俄语等）中可用的字符。亚洲语言（中文、日文、越南语等）使用表意文字（即与词语对应的图像）。因此，亚洲字符集非常庞大且难以处理。为简单起见，我们将坚持使用\
  \ UTF-8 和英文文档。\n\n下一行包含根元素。任何 XML 文件中的第一个元素就是该文档的根元素。所有其他元素，无论嵌套多深，都是根元素的后代。根元素\
  \ `poem` 包含两个属性：`title` 和 `author`。根元素还包含了构成诗歌正文的所有 `line` 元素。\n\n注意每个元素的语法。每个元素都以一个开始标签（`<poem>`\
  \ 或 `<line>`）开头，并以一个结束标签（`</poem>` 或 `</line>`）结尾。基本规则是标签内的名称必须匹配（关于可以使用哪些字符有各种限制，但几乎任何英文单词都可以）。除此之外，开始标签总是以左尖括号（`<`）开头，以右尖括号（`>`）结尾。结束标签总是以左尖括号和斜杠（`</`）开头，以右尖括号（`>`）结尾。元素也可以是空的，此时它们可以采用两种形式之一：一个开始标签和一个结束标签，中间没有任何内容；或者一个特殊的空元素标签。例如，一个空的\
  \ line 元素可以表示为 `<line></line>` 或 `<line/>`。第二种结构提供了一个方便的快捷方式，可以节省一些输入。如果这首诗包含一个空行（例如较长诗歌中节与节之间的行），你可以用这种方式表示空行。\n\
  \n![images](img/square.jpg) **注意** XML 是区分大小写的。`<POEM>`、`<Poem>` 和 `<poem>` 都是不同的元素，因此\
  \ `<POEM></poem>` 会导致 XML 解析器抛出错误。\n\n一首诗提供了一个相当传统的文档编码为 XML 的示例。考虑一个在系统之间作为 XML\
  \ 传输的数据示例。\n\n***清单 9-2**. 作为数据的 XML*\n\n`<?xml version=\"1.0\"?>`\n`<soap:Envelope`\n\
  \n`    soap:encodingStyle=\"http://www.w3.org/2001/12/soap-encoding\">`\n`  <soap:Body\
  \ >`\n`    <w:GetTemperature>`\n`      <w:Location>78701</w:Location>`\n`    </w:GetTemperature>`\n\
  `  </soap:Body>`\n`</soap:Envelope>`\n\n仔细看文档声明。在这种情况下，它没有指明编码。XML 的默认编码是 UTF-8，因此当你打算使用\
  \ UTF-8 字符时，可以省略编码声明。然后是一个名为 `soap:Envelope` 的根元素。文档声明和根元素构成了 XML 文件的最小内容，但这对于系统间的消息传递来说意义不大。因此，这个示例还包含了一些数据（某个城市的邮政编码）。这个\
  \ XML 文档表示一个系统向另一个系统请求数据。（顺便说一下，这是我从头发明的；NOAA 可能使用完全不同的方式。）具体来说，这是一个获取德克萨斯州奥斯汀温度的请求。注意缩进。当\
  \ XML 旨在供人类阅读时，通常会进行缩进，使得每一级元素都比其父级元素更靠右。当创建要发送到另一个系统的数据流时，元素之间的所有空白通常会被移除，导致整个文档位于一行。这对人类来说很难阅读，但可以节省带宽，而且计算机并不觉得难以阅读。\n\
  \n![images](img/square.jpg) **注意** “文档”是引用任何 XML 实例的常规方式，无论它编码的是实际文档还是任意数据位——XML\
  \ 最初来自出版业，并保留了该行业的一些术语。\n\n\n\nSOAP 代表简化对象访问协议（Simplified Object Access Protocol）。它是系统之间来回传递数据的一种常见方式。一个系统发出请求，另一个系统发送相应的响应，这可能会触发另一个请求。处理请求并产生响应的系统随后可能会发送一个请求。通过这种方式，系统之间相互“传递”，直到数据被正确传输（或者出现错误条件，指示系统应停止尝试）。系统间和进程间的通信可能比简单的请求-响应循环复杂得多，但这超出了本书的范围。此类协议（SOAP\
  \ 是众多此类标准之一）的目的是为不同的系统提供一种尽可能少依赖操作系统或语言的通信方式。一个系统可能是运行用 C++ 编写的应用程序的 Windows 服务器，另一个系统可能是运行\
  \ Java 应用程序的 Linux 服务器，而另一个系统可能是运行 ADA 应用程序的超级计算机。只要其他系统能够识别请求并生成适当的响应，其他任何因素都无关紧要。这使得\
  \ SOAP 及类似协议对软件开发人员非常有用。你可以创建各种系统，并让它们相互通信。互联网是管道，但 SOAP 消息及类似内容构成了管道中的水（或者网络中的信息，这里不再使用比喻）。顺便说一句，请求和响应（尤其是后者）可能非常大。我曾经创建过一个系统，与国家保险清算所共享保单信息。该系统中的响应非常大——通常有数兆字节的数据。（老实说，如果是我设计那个系统，我会发送一个响应，指定一个位置，让其他系统可以从该位置下载包含保单的文件。巨大的响应可能会带来问题。消息越长，数据损坏的可能性就越高，而且有时将数据存储一段时间会很有用。不过，这不是我能决定的。）\n\
  \n`xmlns:soap` 属性指定了 SOAP 的命名空间，以便任何接收它的系统都能识别出它是什么类型的消息（假设该系统完全了解 SOAP）。（XMLNS\
  \ 代表 XML 命名空间。）`encodingStyle` 元素（它本身是 soap 命名空间的一个成员）指定了所使用的 SOAP 的确切版本。`soap:Body`\
  \ 命名空间为天气信息指定了一个（在此例中是虚构的）命名空间。请注意，每个命名空间都有一个别名（在此文档中为 `soap` 或 `w`）。这些别名省去了为每个元素输入完整命名空间的麻烦，更重要的是，减少了在管道中传输的字节数。相对简单的诗歌示例没有声明命名空间，这意味着它使用了默认的\
  \ XML 命名空间。每个 XML 元素都有一个命名空间，即使它只是默认的。在 SOAP 示例中，你可以看到单个 XML 文档可以包含来自多个命名空间的元素（一个\
  \ Microsoft Word 文档包含多达 14 个不同的命名空间，这正好说明了事情可以变得多么复杂）。命名空间允许不同的组织使用相同的元素，而不会在它们进入同一文档时相互冲突。例如，如果另一个组织生成天气信息，他们会有自己的命名空间，以防止与\
  \ `noaa` 命名空间发生冲突。\n\n### XML 与流\n\n流（Stream）是一组旨在按顺序读取的数据集合。也就是说，流旨在一次读取一个字节。通常认为这样的数据块是序列化的（意味着它已准备好被传输并串行读取，这是“一次一个字节”的另一种说法）。在\
  \ Java（以及许多其他语言）中，XML 作为流进行处理。读取 XML 是通过解析 `InputStream` 对象完成的，而写入 XML 通常是通过创建 `StreamResult`\
  \ 对象完成的。当使用 `String` 对象创建 XML 时，结果通常仍然会导出为 `OutputStream`，因为其他某个进程需要接收一个流才能在更大的流程中完成其部分工作。例如，许多系统会生成大型文档。在这些系统中，你可以使用\
  \ `String` 对象创建 XML，从结果中创建一个 `OutputStream`，然后将该流作为 `InputStream` 发送给另一个对象，该对象将生成一个\
  \ PDF 文件。PDF 文件作为最终文档，可以存储在服务器上、打印，或两者兼有。\n\n正如你在第 8 章中看到的，Java 使用 `Stream` 对象来读取和写入文件。既然你已经在处理\
  \ `Stream` 对象，那么将 XML 文档保存为文件就是一项自然而简单的任务。将现有文件作为流读取也使加载 XML 文件变得直接。因此，有输入流、输出流，以及大型流程各步骤之间的流。幸运的是，Java\
  \ 使得处理流变得容易。\n\n### DOM 与 SAX\n\nDOM（文档对象模型）和 SAX（XML 简化 API）各有优缺点。与大多数与数据相关的问题一样，知道使用哪一个取决于了解你的数据。如果你需要处理相对较小的文档，DOM\
  \ 效果很好，因为它会将整个 XML 数据流加载到内存中，使其速度很快（同样，前提是文档很小）。另一方面，SAX 只使用足够的内存来处理当前元素（称为节点），这使其能够处理任何大小的文档。我曾使用\
  \ SAX 解析长达 2000 页的书籍内容。SAX 的缺点是你无法同时访问文档的大部分内容，因为只有很少一部分在内存中。此外，SAX 仅适用于传入的 XML\
  \ 文档；它不写入 XML。\n\n因此，请记住，对于小的 XML 源使用 DOM，对于较大的 XML 源使用 SAX。如果你不确定 XML 输入是大还是小，请使用\
  \ SAX。当然，文档是大还是小取决于处理文档时可用的内存量。如果你的程序可以在拥有充足内存的计算机上独立运行，你可以使用 DOM 加载相当大的文档。但是，如果你的程序必须与其他进程共享服务器，或者必须在小型设备（例如手机）上运行，那么内存将受到限制，你的选择也会减少。最后，如果你的应用程序必须同时处理多个文档（可能针对多个用户），那么每个进程的内存将大大减少。应用程序可用的内存越受限，你就越应该倾向于使用\
  \ SAX。举个例子，我最近参与了一个应用程序，它会触发任意数量的转换来创建文档集。在实践中，每个集合包含大约 15 个文档。此外，多个用户可以同时启动文档生成运行，导致同时处理多达\
  \ 50 个文档，而所有文档都只有 8 MB 的 RAM。我们绝对需要使用 SAX。\n\n\n\n### 编写 XML\n\n如前所述，你可以使用 DOM 包或通过编写\
  \ `String` 对象来编写 XML。如果你只需要编写一个 XML 文件，直接编写字符串就足够了（这也是创建 XML 最快的方式）。另一方面，如果你需要将\
  \ XML 输出传递给一个需要 XML 头部的进程，甚至可能需要确保 XML 符合某个模式，那么你可能需要考虑使用 DOM。\n\n在开始编写 XML 之前，你首先需要一个数据源来提供你想要转换成\
  \ XML 的内容。下面是一个简单的类，它提供了前面用到的诗歌（威廉·卡洛斯·威廉姆斯的《大人物》）的内容。\n\n***清单 9-3**。作为数据源的诗歌*\n\
  \n`package com.bryantcs.examples.xml;`\n\n`import java.util.ArrayList;`\n\n`public\
  \ class Poem {`\n\n`  private static String title = \"The Great Figure\";`\n`  private\
  \ static String author =\"William Carlos Williams\";`\n`  private static ArrayList<String>\
  \ lines = new ArrayList<String>();`\n\n`  static {`\n`    lines.add(\"Among the\
  \ rain\");`\n`    lines.add(\"and lights\");`\n`    lines.add(\"I saw the figure\
  \ 5\");`\n`    lines.add(\"in gold\");`\n`    lines.add(\"on a red\");`\n`    lines.add(\"\
  fire truck\");`\n`    lines.add(\"moving\");`\n`    lines.add(\"tense\");`\n`    lines.add(\"\
  unheeded\");`\n`    lines.add(\"to gong clangs\");`\n`    lines.add(\"siren howls\"\
  );`\n`    lines.add(\"and wheels rumbling\");`\n`    lines.add(\"through the dark\
  \ city\");`\n`  }`\n\n`  public static String getTitle() {`\n`    return title;`\n\
  `  }`\n\n`  public static String getAuthor() {`\n`    return author;`\n`  }`\n`  public\
  \ static ArrayList<String> getLines() {`\n`    return lines;`\n`  }`\n`}`\n\n如你所见，这是一个非常简单的诗歌表示。注意，它也是完全静态的。有些类完全由静态成员组成，但这些类通常定义一组辅助方法（针对特定应用的字符串操作是这类辅助类的常见用途）。然而，一个包含静态数据的类通常表明某人对问题的思考不够深入。这类东西通常应该放在一个文件中。不过，就我们的目的而言，这个略显奇怪的类已经足够用了。\n\
  \n#### 使用 DOM 编写 XML\n\n以下是使用 DOM 编写 XML 文件的代码，以 Poem 类作为数据源：\n\n***清单 9-4**。使用\
  \ DOM 编写 XML*\n\n`package com.bryantcs.examples.xml;`\n\n`import java.io.File;`\n\
  \n`import java.io.FileNotFoundException;`\n`import java.io.FileOutputStream;`\n\
  `import java.io.IOException;`\n`import java.io.StringWriter;`\n\n`import javax.xml.parsers.DocumentBuilder;`\n\
  `import javax.xml.parsers.DocumentBuilderFactory;`\n`import javax.xml.parsers.ParserConfigurationException;`\n\
  `import javax.xml.transform.OutputKeys;`\n`import javax.xml.transform.Transformer;`\n\
  `import javax.xml.transform.TransformerConfigurationException;`\n`import javax.xml.transform.TransformerException;`\n\
  `import javax.xml.transform.TransformerFactory;`\n`import javax.xml.transform.dom.DOMSource;`\n\
  `import javax.xml.transform.stream.StreamResult;`\n\n`import org.w3c.dom.Document;`\n\
  `import org.w3c.dom.Element;`\n`import org.w3c.dom.Text;`\n\n`public class WriteWithDOM\
  \ {`\n\n`  public static void main (String args[]) {`\n`    // 创建一个空的 Document`\n\
  `    Document doc = createDocument();`\n\n`    // 创建 XML`\n`    createElements(doc);`\n\
  \n`    // 创建 XML 的字符串表示`\n`    String xmlContent = createXMLString(doc);`\n\n`    //\
  \ 将 XML 写入文件`\n`    writeXMLToFile(xmlContent);`\n`  }`\n\n`// 这里我们创建（目前为空的）XML\
  \ 文档  private static Document`\n`createDocument() {`\n`    Document doc = null;`\n\
  `    try {`\n`      DocumentBuilderFactory dbfac = DocumentBuilderFactory.newInstance();`\n\
  `      DocumentBuilder docBuilder = dbfac.newDocumentBuilder();`\n`      doc =  docBuilder.newDocument();`\n\
  `      doc.setXmlStandalone(true);`\n`    }`\n`    catch(ParserConfigurationException\
  \ pce) {`\n`      System.out.println(\"无法创建 DocumentBuilder\");`\n`      System.exit(1);`\n\
  `    }`\n`    return doc;`\n`  }`\n`  // 这里我们向 XML 文档添加内容  private static void`\n\
  `createElements(Document doc) {`\n`    // 创建根元素`\n`    Element poem = doc.createElement(\"\
  poem\");`\n`    poem.setAttribute(\"title\", Poem.getTitle());`\n`    poem.setAttribute(\"\
  author\", Poem.getAuthor());`\n\n`    // 将根元素添加到文档`\n`    doc.appendChild(poem);`\n\
  \n`    // 创建子元素`\n`    for (String lineIn : Poem.getLines() ) {`\n`      Element\
  \ line = doc.createElement(\"line\");`\n`      Text lineText = doc.createTextNode(lineIn);`\n\
  `      line.appendChild(lineText);`\n`      // 将每个元素添加到根元素      poem.appendChild(line);`\n\
  `    }`\n`  }`\n\n`  // 这里我们将 DOM 对象`\n`  // 转换为包含 XML 的字符串  private static String\
  \ createXMLString(Document doc) {`\n`    // 将 DOM 转换为字符串`\n`    Transformer transformer\
  \ = null;`\n`    StringWriter stringWriter = new StringWriter();`\n`    try {`\n\
  `      TransformerFactory transformerFactory =`\n`        TransformerFactory.newInstance();`\n\
  `      transformer = transformerFactory.newTransformer();`\n`      transformer.setOutputProperty(OutputKeys.OMIT_XML_DECLARATION,`\n\
  `        \"no\");`\n`      transformer.setOutputProperty(OutputKeys.INDENT, \"yes\"\
  );`\n\n`      // 创建一个字符串来包含 Document 对象中的 XML`\n`      stringWriter = new StringWriter();`\n\
  `      StreamResult result = new StreamResult(stringWriter);`\n`      DOMSource\
  \ source = new DOMSource(doc);`\n`      transformer.transform(source, result);`\n\
  `    } catch (TransformerConfigurationException e) {`\n`      System.out.println(\"\
  无法创建 Transformer\");`\n`      System.exit(1);`\n`    } catch (TransformerException\
  \ e) {`\n`      System.out.println(\"无法将 DOM 转换为字符串\");`\n`      System.exit(1);`\n\
  `    }`\n`    return stringWriter.toString();`\n`  }`\n\n\n\n`  // 此处将包含 XML 的字符串转换为文件`\n\
  `  private static void writeXMLToFile(String xmlContent) {`\n`    String fileName\
  \ = \"C:\" + File.separator + \"test\"`\n`    + File.separator + \"domoutput.xml\"\
  ;`\n`    try {`\n`      File domOutput = new File(fileName);`\n`      FileOutputStream\
  \ domOutputStream`\n`          = new FileOutputStream(domOutput, true);`\n`      domOutputStream.write(xmlContent.getBytes());`\n\
  `      domOutputStream.close();`\n`      System.out.println(fileName + \" 已成功写入\"\
  );`\n`    } catch (FileNotFoundException fnfe) {`\n`      System.out.println(\"\
  找不到名为 \" + fileName + \" 的文件\");`\n`      System.exit(1);`\n`    } catch (IOException\
  \ ioe) {`\n`      System.out.println(\"无法写入名为 \" + fileName + \" 的文件\");`\n`      System.exit(1);`\n\
