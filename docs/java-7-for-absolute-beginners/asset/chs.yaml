  \ 头部），但如果你只需要一个简单的 XML 文档，它就能正常工作。\n\n### 读取 XML\n\n要读取 XML，你可以使用 DOM 或 SAX。正如本章前面提到的，当你能够确保\
  \ XML 内容适合可用内存时，DOM 很方便。然而，当输入过大时，DOM 就会失效。另一方面，SAX 可以处理任意数量的输入。对于 SAX，你只需要与最大元素所需内存相当的内存（通常不多，除非你在处理诸如大型图像或单个元素可能包含大量数据的项目之类的情况）。\n\
  \n\n\n#### 使用 DOM 读取 XML\n\n以下是一个使用 DOM 读取 XML 的程序的源代码。要使此程序正常运行，你需要创建一个名为 `poemsource.xml`\
  \ 的文件，并将其放在 `C:\\test`（Windows 系统）或 `C:/test`（Unix 或 Linux 系统）目录下。你可以使用 `domoutput.xml`\
  \ 文件的内容作为 `poemsource.xml` 文件的内容。\n\n***清单 9-6**。使用 DOM 读取 XML*\n\n`package com.bryantcs.examples.xml;`\n\
