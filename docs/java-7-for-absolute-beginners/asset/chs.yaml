  \ 类负责处理玩家控制的唯一对象：光标，它既指示射击位置，也指示玩家是否可以射击。请记住，`ShootingGalleryPanel` 类中的计时器每秒滴答五十次。因此，`ShootingGalleryShooter`\
  \ 类会跟踪五十个步骤，以便在两次射击之间强制施加一秒的延迟。然后，它利用这 50 个步骤绘制光标的竖条，在玩家射击时将其设置为黄色，并在这一秒内逐渐将其恢复为红色。当竖条完全变红时，玩家即可再次射击。\n\
  \n为了完全理解 ShootingGallery 游戏，我们还需要检查最后一个类（正如我们在第 11 章“使用 Eclipse 调试”中学到的，完全理解程序代码是软件开发的关键部分）。`ShootingGalleryTargetSprites`\
  \ 类加载三种不同的目标图像，并使它们可供程序的其他部分使用。清单 12-10 展示了 `ShootingGalleryTargetSprites` 类。\n\n\
  ***清单 12-10.** ShootingGalleryTargetSprites 类*\n\n`package com.bryantcs.examples.videogames;`\n\
  \n`import java.awt.Image;`\n`import java.io.File;`\n`import java.io.IOException;`\n\
  \n`import javax.imageio.ImageIO;`\n\n`public class ShootingGalleryTargetSprites\
