  \n***清单 14-7.** FractalTreePanel.java*\n\n`package com.bryantcs.examples.fractals;`\n\
  \n`import java.awt.Color;`\n`import java.awt.Graphics;`\n`import java.util.Random;`\n\
  \n`import javax.swing.JPanel;`\n\n`public class FractalTreePanel extends JPanel\
  \ {`\n\n`  private static final long serialVersionUID = 1L;`\n\n`  private final\
  \ static double RADIANS = Math.PI / 180.0;`\n`  Random rand;`\n\n`  public FractalTreePanel()\
  \ {`\n`    rand = new Random();`\n`  }`\n`    private void drawSegment(Graphics\
  \ g, int x1, int y1, double angle, int depth) {`\n`    if (depth == 0) return; //\
  \ 停止条件`\n`    int xAngleOffset =       new Double(Math.cos(angle * RADIANS) * depth\
  \ * 10.0).intValue();`\n`    int yAngleOffset =`\n`      new Double(Math.sin(angle\
  \ * RADIANS) * depth * 10.0).intValue();`\n`    int x2 = x1 + xAngleOffset;`\n`\
  \    int y2 = y1 + yAngleOffset;`\n`    int colorValue = 256 - ((depth - 1) * 32)\
  \ - 1;`\n`    if (colorValue < 0) {`\n`      colorValue = 0;`\n`    }`\n`    g.setColor(new\
  \ Color(0, colorValue, 0));`\n`    g.drawLine(x1, y1, x2, y2);`\n`    int randFactor\
  \ = rand.nextInt(20) + 10; // 一个介于 10 和 30 之间的值`\n`    drawSegment(g, x2, y2, angle\
  \ - randFactor, depth - 1);`\n`    randFactor = rand.nextInt(20) + 10; // 一个介于 10\
  \ 和 30 之间的值`\n`    drawSegment(g, x2, y2, angle + randFactor, depth - 1);`\n`  }`\n\
  \n`  public void paint(Graphics g) {`\n`    super.paintComponent(g);`\n`    drawSegment(g,\
  \ getWidth() / 2, getHeight(), -90, 9);`\n`  }`\n`}`\n\n分形树的算法非常简单：画一条线；从该线的终点，再画两条线；依此类推。我可以使用固定值来做到这一点，但通过添加一些随机性，我将生成更逼真的树。为此，我还更改了树每个部分的颜色，在顶部使用更浅的绿色。\n\
  \n\n\n就我而言，我将算法从最大深度向下配置到 0。对于这类算法，这样做可以减少代码量（因此应该更容易理解）。由于我喜欢深度为 9 的树的外观，我没有像在\
  \ `SierpinskiTrianglePanel` 类中那样单独设置深度值。这个类的另一个有趣特性是初始角度为 -90 度。如果初始角度为 0，树会向右横向生长。这是因为\
  \ 0 度角会绘制一条位于 X 轴上的线。因此，为了让线条沿 Y 轴向上生长，我必须向左旋转 90 度（即 -90 度）。90 度角会产生一棵向下生长的树（这可能是模拟根系的便捷方法）。\n\
  \n下一页展示了分形树程序的一个结果（每次结果都略有不同）。\n\n![images](img/1403.jpg)\n\n***图 14-3.** 分形树程序的输出*\n\
  \n### 总结\n\n在本章中，我解释了处理自引用项（即递归）这一不常见但有时很有用的概念。具体来说，你了解到：\n\n*   递归存在于人类语言中。\n*\
  \   递归无时无刻不在发生（但我们常常没有注意到）。\n*   递归算法需要停止条件。\n*   有时最好避免使用递归。\n*   反之，递归有时是解决问题的最佳方案。\n\
  *   递归可以成为某些问题的优雅解决方案，例如生成斐波那契数列。\n*   递归是生成分形的基础算法。\n\n希望你喜欢这一章。这是我最喜欢写的章节之一，我也很享受为它编写示例代码的过程。事实上，我出于乐趣尝试了代码的许多变体。你也应该这样做。特别是对于谢尔宾斯基三角形程序，尝试每隔一层深度或每隔三层深度改变颜色，而不是每层都改变（提示：使用取模运算符）。然后，调整控制分形树外观的参数。特别是，尝试向\
  \ `randInt` 方法输入不同的数字。此外，旋转树并调整颜色，以创建树根而不是树枝。\n\n我留给你两个挑战，它们将帮助你成长为一名程序员。首先，创建一个谢尔宾斯基地毯（由正方形组成的正方形，而不是由三角形组成的三角形）。其次，创建一个曼德勃罗或朱莉娅分形。我差点就包含了朱莉娅分形（我最喜欢的分形之一）的示例代码，但我认为既然你已经了解了\
  \ Java 中递归的基础知识，这对你来说将是一个很好的练习。你需要做一些研究来找到谢尔宾斯基地毯、曼德勃罗分形和朱莉娅分形背后的算法和数学原理，但发现算法和公式是软件开发工作的一部分。我相信你会习惯进行这类研究的。\n\
  \n## 第 15 章\n\n## 泛型与正则表达式\n\n已经了解 Java 的读者可能会问，为什么这两个主题会放在同一章。答案是它们都涉及模式匹配。泛型说明符（也称为参数）是一种模式，代码必须匹配该模式才能使用特定的代码块（可能是接口、类、方法或其他内容）。而正则表达式则使用模式在字符串中选择子字符串。在这两种情况下，模式都限制了可用的选择。两者还有其他好处，我们接下来会讲到。\n\
  \n### 泛型\n\n泛型提供了一种指定类、变量或方法可以使用的对象类型的方法。泛型最常见的用途是指定哪种类型的对象可以放入集合（如列表、树或哈希映射）中。另一个用途是允许在指定泛型的地方使用尚未指定的类型。从这个意义上说，该类型是泛型的，这也是这个概念名称的由来。在本节中，我们将看到这两种泛型的示例。\n\
  \n在 Java 5 之前，Java 没有指定泛型的机制。这种缺失导致了许多问题，包括能够将意外类型的对象分配给集合（导致运行时错误）、必须将对象从一种类型强制转换为另一种类型，以及代码过于冗长和复杂。幸运的是，我们现在有办法避免这些问题。\n\
  \n泛型说明符的语法依赖于尖括号字符（< 和 >）。要创建带有泛型说明符的集合，请在集合的类型说明符末尾添加泛型表达式，如清单 15-1 所示。\n\n***清单\
  \ 15-1.** 一个简单的泛型*\n\n`LinkedList<JPanel> panelList = new LinkedList<JPanel>();`\n\
  \n这行代码声明了一个只能包含 `JPanel` 对象的 `LinkedList`。Java 7 引入了一种简洁的简写形式，可以略微减少代码量。具体来说，在创建参数化对象的实例时，如果编译器可以从行中的其他地方推断出类型，则可以省略类型声明。因此，清单\
  \ 15-1 中的代码可以替换为清单 15-2 中的代码。\n\n***清单 15-2.** 一个简化的泛型*\n\n`LinkedList<JPanel> panelList\
  \ = new LinkedList<>();`\n\n请注意，我们的 `LinkedList` 对象的构造函数表明它是泛型的，但没有提供可以放入列表中的对象类型。我们可以省略它，因为编译器可以从该变量声明的类型声明部分推断出\
  \ `JPanel` 类型。顺便提一下，`<>` 表达式通常被称为“菱形运算符”。\n\n一个对象可以有多个参数，前提是存在匹配的类来定义该对象。清单 15-3\
  \ 展示了一个示例。\n\n***清单 15-3.** 一个多参数泛型*\n\n`package com.bryantcs.examples;`\n\n`public\
  \ class GenericRole<Actor, Role> {`\n\n`        private Actor actor;`\n`        private\
  \ Role role;`\n\n`        public GenericRole(Actor p, Role a) {`\n`                actor\
  \ = p;`\n`                role = a;`\n`        }`\n\n`        public Actor getActor()\
  \ {`\n`                return actor;`\n`        }`\n\n`        public Role getRole()\
  \ {`\n`                return role;`\n`        }`\n`}`\n\n这个类的一个重要特性是，你不必创建 `Actor`\
  \ 类或 `Role` 类。因为它使用了泛型，所以创建 `GenericRole` 对象实例的声明必须指定 `Actor` 和 `Role` 对象的类型。\n\n\
  正如我在本节开头提到的，这就是“泛型”一词的来源。这些对象此时可以未声明，因此从某种意义上说，它们是泛型的。\n\n那么，让我们来看一个使用我们的 `GenericRole`\
  \ 类的类。请参考清单 15-4。\n\n***清单 15-4.** 使用多参数泛型*\n\n`package com.bryantcs.examples;`\n\
  \n`import java.util.LinkedList;`\n\n`public class GenericRoleProgram {`\n`        public\
  \ static void main(String[] args) {`\n`                LinkedList<GenericRole<String,\
  \ String>> roleMap =`\n`                        new LinkedList<GenericRole<>>();`\n\
  \n`                roleMap.add(new GenericRole<String, String>(\"Humphrey Bogart\"\
  ,`\n`                                \"Sam Spade\"));`\n`                System.out.println(roleMap.getFirst().getActor()\
  \ +`\n`                                \" appeared on screen as \" + roleMap.getFirst().getRole());`\n\
  `        }`\n`}`\n\n\n\n请注意，现在我们有了参数嵌套参数的情况（在 `LinkedList<GenericRole<String, String>>\
  \ roleMap` 中）。当一个参数化（即泛型）集合本身包含具有参数的对象类型时，就会得到嵌套的泛型说明符。这看起来可能有些奇怪，但一旦开始使用泛型，这就会成为常见做法。\n\
  \n你还可以指定一个集合可以包含多种对象，前提是这些对象都继承自同一个类或实现同一个接口。为此，Java 包含一个通配符（以问号字符的形式），你可以将其与泛型说明符一起使用。例如，请参考清单\
  \ 15-5。\n\n***清单 15-5.** 使用泛型通配符*\n\n`LinkedList<? extends JPanel> panels = new\
  \ LinkedList<>();`\n\n这个声明表示任何继承自 `JPanel` 的类都可以成为该列表的成员。还记得我在关于动画、视频游戏和递归的章节中多次继承\
  \ `JPanel` 吗？如果我需要一个单一的列表来容纳这些不同的面板，上面的列表就能很好地完成这项工作。\n\n`extends` 关键字同样适用于接口。因此，如果我想要一个包含实现\
  \ `MouseListener` 接口的类的列表，我可以使用清单 15-6 中所示的声明。\n\n***清单 15-6.** 针对接口的泛型*\n\n`LinkedList<?\
  \ extends MouseListener> mouseListeners = new LinkedList<>();`\n\n***清单 15-7.**\
  \ 使用 `Super` 关键字的泛型*\n\n`LinkedList<? super JPanel> panelAncestors = new LinkedList<>();`\n\
  \n`super` 关键字指定任何被 `JPanel` 类扩展的对象都可以成为该列表的成员。对于这个列表来说，那将是 `javax.swing.JComponent`\
  \ 类型的对象。当你希望确保满足参数的对象是可比较的（以便它们可以被排序）时，`super` 关键字可能最为有用。根据我的经验，它并不常用，所以我就不再深入探讨了。\n\
  \n既然我们已经了解了泛型的语法，接下来谈谈为什么要使用它们。最大的好处是更早地检测错误。在软件开发（以及许多其他行业）中，有一个公认的道理：越早发现错误，修复成本就越低。如果我们在编码时就能发现错误，修复它只需重写我们正在处理的代码即可；成本微不足道。如果错误到了测试人员那里（假设我们有测试人员——并非所有软件公司都有测试团队），成本就会更高。测试团队必须找到它并告知开发人员，开发人员（可能已经转向其他任务）必须重新打开并修改那段代码，然后测试团队必须验证修复后的代码是否正确运行。最糟糕的结果是错误一直传到客户那里；我们不仅要承担与测试团队和客户沟通的额外成本，还要承担（通常更重要的）客户因此对我们软件和公司评价降低的代价。所以，让我们采用包括泛型在内的技术，尽早捕获错误。\n\
  \n清单 15-9 和清单 15-10 展示了为什么泛型能促进早期错误检测。\n\n***清单 15-8.** 普通列表*\n\n`List integerList\
  \ = new LinkedList();`\n`integerList.add(new Integer(0));`\n`integerList.add(\"\
  这里有个问题\"); // 完全合法但大错特错`\n\n在清单 15-9 中，`integerList` 可以包含任何对象。我可以将 `String` 类型的对象传入该列表。名称只是名称，虽然它揭示了意图（这是好习惯），但它并不能防止有人将\
  \ `Integer` 类型以外的对象传入列表。因此，当有人确实传入了非 `Integer` 对象时，当我们试图从该列表中取出 `Integer` 对象时，就会遇到运行时错误。\n\
  \n那么，让我们看看泛型如何防止测试人员，或者更糟的是，防止客户看到我们的错误。\n\n***清单 15-9.** 泛型列表*\n\n`List<Integer>\
  \ integerList = new LinkedList<Integer>();`\n`integerList.add(new Integer(0));`\n\
  `integerList.add(\"这里有个问题\");`\n\n第二个示例中 `List` 声明上的泛型表达式（或参数）指定该列表只能包含 `Integer`\
  \ 对象。`Integer` 参数阻止任何人将 `String` 对象（或除 `Integer` 对象之外的任何东西）传递给 `integerList`。当其他程序员试图向\
  \ `integerList` 添加非 `Integer` 类型的对象时，他们会遇到编译错误。他们的代码无法编译，客户也绝无可能看到错误，因为某个粗心的程序员混淆了\
  \ `String` 和 `Integer`。图 15-1 显示了我尝试时 Eclipse 产生的错误。\n\n![images](img/1501.jpg)\n\
  \n***图 15-1.** 因误用泛型列表而产生的类型匹配错误*\n\n注意它如何指出 `add` 方法的正确参数是 `Integer` 对象。实际上，`List`\
  \ 接口并没有这样的方法。然而，Eclipse 编译器创建了一个具有该方法的 `LinkedList` 类的实例。因此，没有人能编译违反我们泛型列表意图的代码。这防止了所有可能在运行时出现的问题，并防止我们的同事、测试人员，以及最终我们的客户认为我们一定是白痴。\n\
  \n就个人而言，我还发现这类代码更容易阅读和编写。类型转换对我来说总是感觉像是一种杂乱。作为一个纯粹主义者，我更倾向于一开始就拥有正确的类型，而不需要强制转换。\n\
  \n最后，确保你的集合只包含你期望的类型是防御性编程的一个方面（每个程序员都应该采用的另一个好习惯）。如果你确保没有其他程序员（包括未来的你自己）能将错误的值传递给你的代码，你就为你的用户减少了麻烦。这是一项吃力不讨好的任务，因为没有人（除了你的同事可能）会意识到你做了这件事，但这仍然是个好主意。如果你愿意以更积极的方式看待它，可以将其视为确保使用你代码的开发人员更有可能编写出无错误的代码。我的一位同事（Matt\
  \ Hinze，他在不编码时也写关于 MVC 的书）称之为“将我们的客户推入成功的深渊”。无论你怎么表述，限制错误潜入系统的可能性都是优秀软件开发实践的典范。\n\
  \n\n\n### 正则表达式\n\n如果你曾在计算机的命令行中处理过文件，很可能在不知不觉中已经使用过正则表达式。例如，我最近想获取某个目录下（Windows\
  \ 7 系统）所有 HTML 文件的列表。在命令窗口中，我输入了 `dir *.htm`，便得到了所需的列表。`*.htm` 实际上就是一个正则表达式，表示所有扩展名为\
  \ `htm` 的文件。假设我想获取所有文件名以 \"s\" 开头的 HTML 文件，命令则应为 `dir s*.htm`。Java 中的正则表达式工作原理与此类似，只不过你可以指定更为复杂的模式。\n\
  \nJava 的正则表达式包是 `java.util.regex`。它包含了 `MatchResult` 接口、`Matcher` 类（实现了 `MatchResult`\
  \ 接口）、`Pattern` 类以及 `PatternSyntaxException` 类。你不能直接实例化 `Matcher` 和 `Pattern` 类，因为它们没有公共构造方法。换句话说，`new\
  \ Matcher` 和 `new Pattern` 是行不通的。相反，使用它们的模式是：首先通过调用 `Pattern` 类中的某个 `compile` 方法来获取一个\
  \ `Pattern` 对象。然后，通过调用 `Pattern` 类中的 `matcher` 方法来获取一个 `Matcher` 对象。最后，要查找与模式匹配的子字符串，需要调用\
  \ `Matcher` 类中的 `find` 方法。让我们创建一个类来试验 `Pattern` 和 `Matcher` 类。清单 15-11 展示了此类的一个可能实现。\n\
  \n***清单 15-10.** RegexTester 类*\n\n`package com.bryantcs.examples;`\n\n`import java.util.regex.Matcher;`\n\
  `import java.util.regex.Pattern;`\n\n`public class RegexTester {`\n\n`  public static\
  \ void main(String[] args) {`\n`    Pattern pattern = Pattern.compile(args[0]);`\n\
  `    Matcher matcher = pattern.matcher(args[1]);`\n`    while(matcher.find()) {`\n\
  `      String groupText = matcher.group();`\n`      int matchBegin = matcher.start();`\n\
  `      int matchEnd  = matcher.end();`\n`      StringBuilder sb = new StringBuilder(\"\
  Found a match for \");`\n`      sb.append(groupText);`\n`      sb.append(\" beginning\
  \ at \");`\n`      sb.append(matchBegin);`\n`      sb.append(\" and ending at \"\
  );`\n`      sb.append(matchEnd);`\n`      System.out.println(sb);`\n`    }`\n`  }`\n\
  `}`\n\n`matcher.group` 为我们提供正在匹配的文本（这本质上是我们通过第二个参数指定的模式的结果）。`matcher.start` 为我们提供匹配字符串在输入字符串（第一个参数）中的起始位置。`matcher.end`\
  \ 为我们提供匹配字符串的结束位置。我使用了 `StringBuilder` 对象来避免产生过长的行，这在书中阅读起来很不方便。在我的生产代码中，出于性能考虑，我也经常使用\
  \ `StringBuilder` 对象（连接运算符是创建 `String` 对象最糟糕的方式）。\n\n在我们深入探讨正则表达式的语法之前，先来了解一下如何向\
  \ RegexTester 程序传递值。同时，我们也将首次运行它。要为 RegexTester 设置参数，请按照以下步骤操作。\n\n1.  从 **运行**\
  \ 菜单中，选择 **运行配置**。将出现运行配置窗口，如 图 15-2 所示。\n\n![images](img/1502.jpg)\n\n***图 15-2.**\
  \ RegexTester 的运行配置*\n\n2.  在右侧窗格中，单击 **参数** 选项卡。将出现参数选项卡，如 图 15-3 所示。\n\n![images](img/1503.jpg)\n\
  \n***图 15-3.** RegexTester 的空参数*\n\n3.  要设置我们的第一个测试数据，请在 **程序参数：** 字段中输入以下文本（包括引号）：\n\
  \n`     \"Sam\" \"Sam Spade;Yosemite Sam;Sam Merlotte;Samwise Gamgee;\"`\n\n输入完成后，窗口应如\
  \ 图 15-4 所示。\n\n![images](img/1504.jpg)\n\n***图 15-4.** RegexTester 的已填充参数*\n\n\
  4.  要运行 RegexTester 程序，请单击 **运行**。程序的输出将显示在 Eclipse 控制台中，如 图 15-5 所示。\n\n![images](img/1505.jpg)\n\
  \n***图 15-5.** Eclipse 控制台中 RegexTester 的输出*\n\n我不会为每个测试都展示所有这些步骤，但我认为第一次测试时看到这些步骤可能会对你有帮助。对于后续的测试，我将只展示在\
  \ **参数** 选项卡中输入的内容以及控制台中显示的内容。\n\n现在我们有了一个测试程序并知道如何使用它，我们需要专注于 Java 支持的正则表达式语法。正则表达式语法本身几乎就是一种语言，因此我们将重点介绍基础知识以及一些更常用的高级部分。整个内容足以写成一本书（而且确实有这样的书存在）。\n\
  \n我们的简单测试用例使用了一个字符串字面量。字符串字面量只是一段文本。在我们刚刚运行的示例中，`\"Sam\"` 是一个字符串字面量。`\"Spade\"`\
  \ 是另一个字符串字面量。如果我们将 `\"Sam\"` 替换为 `\"Spade\"`，我们将在控制台中得到以下输出：\n\n`Found a match for\
  \ Spade beginning at 4 and ending at 9`\n\n仅使用字符串字面量，我们能做的事情不多。我们可以找到特定字符串的所有实例，但无法找到任何与模式匹配的内容。要创建模式，我们必须深入正则表达式的关键组成部分——元字符。\n\
  \n元字符是用于创建模式的字符。元字符不表示单个字面字符，而是表示一组字符。有些元字符可以单独使用，而其他元字符在没有其他元字符的情况下则毫无意义。表 15-1\
  \ 描述了 Java 正则表达式语法支持的元字符。\n\n![image](img/t1501.jpg)\n![image](img/t1501a.jpg)\n\
  \n从所有这些示例中，我敢打赌你开始意识到正则表达式可以有多么强大。但实际上，描述元字符只是触及了正则表达式的皮毛。它远比我在这里展示的内容要丰富得多。让我们通过查看示例来进一步学习。\n\
  \n回到我们涉及名为 Sam 的虚构角色的示例，假设我们想要获取完整的名称（包括分隔符，即分号）。我们可以尝试如下操作：\n\n`(Sam).*;`\n\n其输出为：\n\
  \n`Found a match for Sam Spade;Yosemite Sam;Sam Merlotte;Samwise Gamgee; beginning\
  \ at 0 and`\n`ending at 51`\n\n这行不通。问题在于 `.*` 模式会匹配它能匹配的所有内容（这称为贪婪匹配）。在这种情况下，它匹配了整行。幸运的是，Java\
  \ 正则表达式语法包含一种使模式不贪婪的方法（正则表达式程序员称之为懒惰匹配）。要使匹配变为懒惰匹配，我们可以在模式后附加问号字符 (?)，如下所示：\n\n\
  `(Sam).*?;`\n\n该正则表达式的输出为：\n\n`Found a match for Sam Spade; beginning at 0 and ending\
  \ at 10`\n`Found a match for Sam; beginning at 19 and ending at 23`\n`Found a match\
  \ for Sam Merlotte; beginning at 23 and ending at 36`\n`Found a match for Samwise\
  \ Gamgee; beginning at 36 and ending at 51`\n\n我们越来越接近了，但 \"Yosemite Sam\" 中的 \"\
  Yosemite\" 去哪了？嗯，表达式以 (Sam) 开头，因此它只会匹配以 \"Sam\" 开头的部分，这不包括 \"Yosemite Sam\"。解决方案是在开头和结尾都使用\
  \ `.*?` 模式，如下所示：\n\n`.*?(Sam).*?;`\n\n请注意，开头的模式也必须是懒惰的，否则我们又会得到整行。现在输出为：\n\n`Found\
  \ a match for Sam Spade; beginning at 0 and ending at 10`\n`Found a match for Yosemite\
  \ Sam; beginning at 10 and ending at 23`\n`Found a match for Sam Merlotte; beginning\
  \ at 23 and ending at 36`\n`Found a match for Samwise Gamgee; beginning at 36 and\
  \ ending at 51`\n\n\n\n通过这种方式，我们解析了一行包含多条记录的内容。然后，我们可以添加代码，将每个匹配项写入文件中的单独一行，或以其他方式处理每个匹配值。这种解析是软件开发中的常见任务，而正则表达式提供了一种很好的实现方式。\n\
  \n正如我所指出的，正则表达式可能会变得复杂得多。以下正则表达式会从每个以“Sam”开头的条目中移除“Sam”：\n\n`S(?!am)|(?<!S)a|a(?!m)|(?<!Sa)m|^Sam`\n\
  \n其输出为：\n\n`Found a match for  Spade; beginning at 3 and ending at 10`\n`Found a\
  \ match for Yosemite Sam; beginning at 10 and ending at 23`\n`Found a match for  Merlotte;\
  \ beginning at 26 and ending at 36`\n`Found a match for wise Gamgee; beginning at\
  \ 39 and ending at 51`\n\n用于同时移除“Yosemite Sam”中“Sam”的代码会更加复杂。事实上，否定一个组是正则表达式不擅长处理的事情之一。在这些情况下，通常最好将正则表达式与其他`String`操作结合使用，并将一个表达式的结果传递给另一个正则表达式（这个过程称为链式调用）。这些技术可以让你管理正则表达式的复杂性，并且可能比单个复杂的正则表达式提供更好的性能。\n\
  \n如果你想了解更多关于正则表达式的信息，可以从官方的正则表达式教程开始：[`download.oracle.com/javase/tutorial/essential/regex/index.html`](http://download.oracle.com/javase/tutorial/essential/regex/index.html)\n\
  \n### 总结\n\n本章涵盖了受益于模式匹配的内容：泛型和正则表达式。关于泛型，我们了解到：\n\n*   我们可以指定集合中内容的类型。\n*   得益于\
  \ Java 7 引入的改进，只要编译器能够从行首确定类型，我们就可以使用菱形运算符（`<>`）来稍微缩短代码。\n*   泛型可以有多个参数。\n*   我们可以嵌套泛型参数，以确保在任何深度都能获得正确类型的对象。\n\
  *   我们可以在泛型参数中使用通配符，以容纳相似的对象（任何扩展特定类或实现特定接口集或两者兼有的对象）。\n*   泛型让我们能够在编码时而不是运行时捕获问题，从而节省时间并避免尴尬。\n\
  \n关于正则表达式，我们了解到：\n\n*   如何实例化 `java.util.regex` 包中的成员类（`Matcher` 和 `Pattern`）。\n\
  *   每个元字符的作用。\n*   如何以多种有用的方式组合元字符。\n*   如何使模式变为非贪婪（匹配尽可能少的字符）而不是贪婪（匹配尽可能多的字符）。\n\
  *   正则表达式可能变得非常复杂，以及如何管理这种复杂性。\n\n本章涵盖了两种语言特性，我希望你在开发自己的程序时能发现它们很有用。我特别希望你在使用集合时都能使用泛型，因为你应该尽可能采用最佳实践。至于正则表达式，请记住它们是为了让事情变得更简单。如果你发现某个正则表达式太难理解，可以将其拆解，结合其他`String`操作，并使用多个正则表达式，而不是一个庞大的正则表达式。\n\
