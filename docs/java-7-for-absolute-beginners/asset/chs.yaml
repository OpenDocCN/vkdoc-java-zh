  \ 章：泛型与正则表达式\n泛型\n正则表达式\n本章小结\n索引\n\n## 前言\n\n这本书的诞生，源于一位朋友（你好，罗斯）的女儿（你好，凯莉）问我平时做什么。碰巧当时我随身带着笔记本电脑，于是就演示给她看。凯莉当时\
  \ 15 岁，很快就失去了兴趣。我当时是一名 Web 开发人员（主要编写中间件和数据库代码，而非前端代码），于是我解释说 Facebook 的工作原理也类似。这引起了她的兴趣。了解你的受众，总是有好处的。\n\
  \n那次经历让我萌生了写一本书、引导年轻人入门编程的想法。那年晚些时候，当 Apress 邀请我写书时，我设法说服他们让我为初学者写一本。\n\n所以，如果你想尝试编写软件，这本书就是为你准备的。它绝非对这两个主题（“它是如何工作的”和“它是如何编写的”实际上是两个主题）的详尽解释，但它是一个起点。我希望这个起点足以让你拥有一个新的爱好：编写软件。如果你之后学得更多，甚至可能有一天以此为职业。我希望读过这本书的读者中，有人最终能进入这个行业，因为我们需要更多敏锐的头脑来编写软件。\n\
  \n如果你恰好是那个人，欢迎来到软件开发这个古怪、令人沮丧、引人入胜，有时又回报丰厚的世界。\n\n——杰伊·布莱恩特\n\n\n\n## 关于作者\n\n![image](img/jay_bryant.jpg)\
  \ 我最初是一名诗人。虽然我精通写作技巧，但我发现自己缺乏“火花”。于是，我成为了一名教师。在尝试成为诗人的过程中，我获得了两个英语文学学位，自然也就教起了英语。从\
  \ 1986 年开始，我还兼职编写软件手册。\n\n巧合的是，我修读了大学提供的所有语言学课程，纯粹是因为我喜欢诸如转换生成语法和形态学这样的概念。有一次，我在一位开发者身后看代码时说道：“我看到了结构和语法。告诉我它是如何工作的。”菲尔·施伦普很聪明，他没有在我看他写代码时试图解释\
  \ C 语言是如何工作的。相反，他让我去买一本布莱恩·克尼汉和丹尼斯·里奇合著的《C 程序设计语言》。在菲尔的些许指导下，我读了这本书并完成了所有练习。\n\n\
  这开启了我的软件开发之旅。从那以后，我阅读了更多书籍，学习（并遗忘了一些）更多的编程语言。1991 年大学解聘我后，我继续担任技术文档工程师，并把编程作为业余爱好，直到\
  \ 1998 年，编程开始成为我工作的一部分。我对当时使用的文档工具感到不满，于是开始自己编写一些工具。在为了制作文档工具而做了更多年的编程工作后，我在 2004\
  \ 年底放弃了作为工作一部分的写作，成为了一名全职软件开发人员。我做了三年的全职 Java 和 XSLT 开发人员，然后又做了三年的全职 Java Web 应用程序开发人员。\n\
  \n到这些经历结束时，我积累了足够的知识来写一本关于 Java 的书。写这本书让我学到了更多，也帮助我将已有的知识系统化。一如既往，教学（而写这类书本身就是一种教学实践）也教会了教师本人。\n\
  \n写这本书也提醒我，我真的很喜欢写作。所以我找到了一份既能写作又能编程的工作。我正在编写 API 文档。也就是说，我向软件开发人员解释软件是如何工作的，以便他们能在更短的时间内完成更多工作。对于这类工作，我最喜欢的职位头衔是“编程作家”，所以现在我也这样称呼自己。\n\
  \n当我不在编写软件或撰写关于软件的文章时，我会玩各种游戏（不仅仅是电脑游戏）、阅读奇幻和科幻小说，以及和朋友一起外出。我和一只名叫奥斯卡的橙色虎斑猫住在一起，它时而像猫界恐怖分子，时而像粘人小怪兽。\n\
  \n——杰伊·布莱恩特\n\n## 关于技术审校\n\n![image](img/massimo_nardone.jpg) ![image](img/square.jpg)**马西莫·纳尔多内**出生于维苏威火山脚下，拥有意大利萨莱诺大学的计算机科学硕士学位。他目前担任高级\
  \ IT 安全、云和基础架构架构师，并且是 IBM 芬兰公司的芬兰发明开发团队负责人。他在移动、安全和万维网技术领域拥有超过 16 年的国内外项目经验，曾担任项目经理、软件工程师、研究工程师、首席安全架构师和软件专家。马西莫还在赫尔辛基理工大学网络实验室担任客座讲师和习题指导老师，负责“通信协议安全”课程。\n\
  \n## 引言\n\n### 本书读者对象\n\n书名写着“面向完全初学者”。我指的是编程方面的完全初学者。我最初的读者群是青少年，我希望他们能上大学，获得数学、计算机科学或电气工程（或者技术传播或平面设计）学位，然后进入软件行业。但我很快意识到，成年人也可能希望学习编程，无论是作为职业转型的一部分、作为一种爱好，还是仅仅出于好奇。因此，我把这本书写给任何想学习编程但没有任何编程知识的人，无论其年龄或未来职业道路等其他特征如何。\n\
  \n### 本书结构\n\n第一章通过向你展示如何安装开发环境以及如何编写第一个程序来帮助你入门。接下来的几章涵盖了 Java 工作原理的基础知识，包括运算符、数据类型、分支和循环，以及面向对象语言如何定义和解决问题。中间章节详细介绍了软件开发人员必须不断执行的一些“日常”任务，例如处理文件及其内容以及为程序创建用户界面。在本书讲完这些内容之后，会转向一些（我认为）更有趣的主题，例如创建动画和视频游戏。本书以一章作为结尾，简要介绍了两个主题，虽然它们有些高级，但可能会让你在读完本书后在自己的程序中实现一些不错的功能。\n\
  \n整本书中，我都包含了代码示例，你可以将其输入到你的开发环境中并运行。你也可以从 Apress 网站获取这些代码。我还融入了我在软件开发领域 25 年（其中\
  \ 20 年为全职）的经验教训。我希望这些现实世界的经验能让你对高度抽象的软件开发领域有更具体的认识。值得记住的是，尽管这个领域本质上是理论性的，但我们想要解决的问题大多存在于现实世界中。\n\
  \n### 排版约定\n\n本书使用了一些排版约定，旨在使阅读更轻松。排版不能替代糟糕的写作或糟糕的编码，但它有助于使两者更加清晰。为此，本书采用了以下约定：\n\
  \n正文中的代码（通常出现在段落中）显示如下：`java.lang.System`\n\n代码清单显示如下：\n\n***清单 引言-1.** 示例代码块*\n\
  \n`public static void main(String[] args) {`\n`  System.out.println(\"Hello, World!\"\
  );`\n`}`\n\n在操作步骤中，你应该使用的界面元素（如按钮和菜单选项）在句子中以粗体文本显示，如下所示：“从**文件**菜单中选择**新建**。”文件系统中出现的对象名称（如文件和目录）以等宽字体显示，如下所示：`C:\\\
  temp`\n\n我还应该提到，我有意使用了非正式（近乎“乡土”）的风格和语气。当我分享我的经验时，我使用第一人称单数（“我”）。当我希望你做我在写书时所做的事情时（通常是编写代码或以特定方式思考问题），我使用第一人称复数（“我们”）。当我希望你做某事时，我使用第二人称（“你”）。此外，我大量使用了缩写形式，例如“I've”。我希望你会发现这本书因其非正式的呈现方式而更具吸引力。\n\
  \n### 先决条件\n\n在阅读本书之前，你需要至少熟悉一种操作系统，例如 Windows 或 Mac OS X。特别是，你需要知道如何在你的计算机上创建和删除文件。如果你了解过计算机上的“命令”或“批处理”文件是如何工作的，那就更好了，因为那是一种轻量级的编程。\n\
  \n阅读本书不需要任何其他先决条件。你不需要了解数学、逻辑或计算机科学。本书有时会涉及所有这些学科的零散知识，但都是以一种务实的方式，不依赖于读者具备任何现有知识。\n\
  \n你真正需要的只是学习编程的渴望。\n\n## 第 1 章\n\n\n\n## 编写你的第一个 Java 程序\n\n要用 Java 编写程序，你需要 Java\
  \ 开发工具包（JDK）。严格来说，你只需要 JDK；不过，其他工具能让编写 Java 应用程序更轻松。大多数软件开发人员喜欢使用集成开发环境（IDE）。最流行的\
  \ IDE 之一是 Eclipse。幸运的是，JDK 和 Eclipse 都是免费下载的。本章将介绍如何下载和安装这两款产品，以及如何在 Eclipse 中设置你的第一个\
  \ Java 项目。学完本章后，你将输入并运行你的第一个 Java 程序。\n\n### 安装 JDK\n\nJDK 是一组程序，让你能够用 Java 编写程序。你最常用的两个程序是\
  \ `javac.exe` 和 `java.exe`。`javac.exe` 程序是编译器，也就是说，它负责将你能读懂的代码（你用 Java 编写的代码）转换成计算机能读懂的代码（计算机运行程序时所需的\
  \ 0 和 1 集合）。`java.exe` 程序则负责运行你编写的程序。在 `javac.exe` 编译它们之后，`java.exe` 启动它们并管理程序所需的一切（与操作系统的连接、文件句柄以及许多其他内容）。因为你将使用\
  \ Eclipse（我们稍后会讨论），所以不需要手动运行 `javac.exe` 和 `java.exe`。Eclipse 会为你代劳。但了解它们的功能会很有用，这样当你想要时，可以直接从命令窗口运行程序。\n\
  \n当然，在安装之前，你必须先下载它。要获取最新版本的 JDK，请按照以下步骤操作：\n\n1.  在网页浏览器中打开 [`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)。\n\
  2.  点击 **下载 JDK** 按钮。\n3.  按照网站提供的说明进行操作。\n4.  运行安装程序并接受所有默认设置。\n\n![images](img/square.jpg)\
  \ **注意** 如果你在计算机上没有管理员权限，请清除（即取消勾选）允许为所有用户安装程序的复选框。这样你仍然可以安装 JDK。我本想提供更多细节，但网站会不时更改，因此更详细的说明很可能是错误的（而且会令人困惑和恼火）。\n\
  \n你可以将 JDK 放在你放置任何其他程序的任何位置。默认位置就很好。\n\n### 安装 Eclipse\n\nEclipse 是一个 IDE。基本上，它提供了一个方便的工具来编写和测试你的程序。除此之外，它还能在你犯错时立即识别错误，这使得纠正错误比在文本文件中编写代码并从命令行编译要容易和快速得多。Eclipse\
  \ 还会为你的代码的不同部分着色。一旦你习惯了这种配色方案（这很快就会发生），你就能更快地编写代码。\n\n同样，在安装 Eclipse 之前，你必须先下载它。为此，请按照以下步骤操作：\n\
  \n1.  在网页浏览器中打开 [`http://www.eclipse.org/downloads/`](http://www.eclipse.org/downloads/)。\n\
  2.  找到 **Eclipse IDE for Java Developers** 选项，并选择 32 位版本。\n\n    ![images](img/square.jpg)\
  \ **注意** 如果你使用的是 64 位操作系统，仍然选择 32 位版本的 Eclipse。在撰写本文时，64 位版本的 Eclipse 存在一些问题，使得\
  \ Java 开发比应有的更困难。\n\n3.  按照网站提供的说明进行操作。\n4.  运行安装程序并接受所有默认设置。\n\n同样，我本想提供更多细节，但网站会不时更改，因此更详细的说明很可能是错误的（而且会令人困惑和恼火）。\n\
  \n你可以将 Eclipse 放在你放置任何其他程序的任何位置。同样，默认位置就很好。\n\n### 创建你的第一个项目\n\n当你使用 Eclipse 时，你必须为每个程序创建一个单独的项目。这样，Eclipse\
  \ 就可以将一个程序的细节与另一个程序分开。每个项目包含你为程序编写的源代码文件，以及可能附加到程序的一些其他资源。例如，你可能包含图像、包含运行时加载设置的文件以及许多其他可能的项目。\n\
  \n启动 Eclipse 后，你可以按如下方式创建一个新项目：\n\n1.  从 **文件** 菜单中，选择 **新建**，然后选择 **项目**。此时会出现“新建项目”窗口，如\
  \ 图 1-1 所示。\n\n    ![images](img/0101.jpg)\n\n    ***图 1-1.** Eclipse 的“新建项目”窗口。*\n\
  \n2.  在“新建项目”窗口中，双击 **Java 项目**。此时会出现“新建 Java 项目”窗口，如 图 1-2 所示。\n\n    ![images](img/0102.jpg)\n\
  \n    ***图 1-2.** Eclipse 的“新建 Java 项目”窗口。*\n\n3.  在 **项目名称** 字段中输入 `Hello`。\n\n\
  \    ![images](img/square.jpg) **注意** 注意选择有意义的名称。在这个例子中，我选择了 `Hello`，因为我们要编写的第一个程序是一个输出\
  \ `Hello` 的程序。软件开发新手常犯的一个错误是选择诸如 `Project1` 和 `Project2` 这样的名称。很可能过不了多久，你就记不清其中任何一个的细节了。相反，如果你在编写一个扫雷游戏，就将你的项目命名为\
  \ `Minesweeper`。这样，当你同时还在开发一个即时通讯程序时，区分 `Minesweeper` 和 `InstantMessenger` 要比区分\
  \ `Project1` 和 `Project2` 容易得多。\n\n4.  点击 **确定**。你可以在这里更改许多其他选项。不过，就我们的目的而言，默认设置就很好。现在你应该会看到一个类似于\
  \ 图 1-3 所示的窗口。\n\n    ![images](img/0103.jpg)\n\n    ***图 1-3.** Eclipse IDE 的主区域。*\n\
  \n\n\n### 创建程序\n\n每个 Java 程序都有一个作为程序起点的类（通常称为入口点）。类是一段代码，它以特定方式将其他代码片段组合在一起。我们将在下一章中介绍类。使该类特殊的是\
  \ `main` 方法的存在。方法是一段执行特定功能的代码——在这里，它启动程序。我们也会在下一章中介绍方法。`main` 方法接受输入并启动程序。每个 Java\
  \ 程序有且只有一个 `main` 方法。\n\n![images](img/square.jpg) **注意** 话虽如此，某些代码库实际上包含多个 `main`\
  \ 方法。它们的存在是为了能够单独测试各个类。严格来说，每个 `main` 方法都会启动一个独立的 Java 程序，即使开发人员可能认为它们只是更大程序的一部分。就我们而言，只需记住\
  \ Java 程序必须有一个 `main` 方法。\n\n包含 `main` 方法的类决定了程序的名称。程序的名称就是该类的名称。例如，我们在本章后面编写的程序叫做\
  \ Hello，因为包含其 main 方法的类名为 `Hello`。（当然，市场部门可以给它起任何名字，但对于 Java 和 Java 开发者来说，它就是 `Hello`\
  \ 程序。）这种命名方式源于 Java 程序的启动方式：Java 运行时引擎需要一个包含 `main` 方法的类的名称。\n\n![images](img/square.jpg)\
  \ **注意** 保存 Java 类的文件必须与该 Java 类具有完全相同的名称。例如，`Hello` 类必须存储在名为 Hello.java 的文件中。如果文件名为\
  \ hello.java，它将无法工作。小写 h 与大写 H 不同，Java 编译器无法识别 hello.java 包含 `Hello` 类。\n\n要为你的第一个程序创建一个包含\
  \ main 方法的类，请遵循以下步骤：\n\n1.  在 Eclipse 的包资源管理器中右键单击 `Hello` 项目，选择 **New**，然后选择 **Class**。将显示“新建\
  \ Java 类”窗口，如图 1-4 所示。\n\n![images](img/0104.jpg)\n\n***图 1-4.** Eclipse 的“新建 Java\
  \ 类”窗口。*\n\n2.  在 **Package** 字段中，输入你喜欢的任何包名，但请记住使用一个你能记住的名称，并使其与其他项目分开。包是一种将类分组的方式。对于小型项目，你不需要它们。然而，没有包，大型项目将无法管理。我们将在下一章中介绍类。在\
  \ **Name** 字段中，输入 `Hello`。这是你的类的名称。\n3.  勾选为你提供 `main` 方法（`public static void main\
  \ (String args[])`）的复选框。完成后，你应该得到一个类似于清单 1-1 中的类。\n    请记住 Java 是区分大小写的。对于 Java\
  \ 来说，“Hello”与“hello”是不同的。\n\n***清单 1-1**：初步的 Hello 类*\n\n`package com.bryantcs.examples.hello;`\n\
  \n`public class Hello {`\n\n`  /**`\n    `   * @param args`\n    `   */`\n    `  public\
  \ static void main(String[] args) {`\n    `    // TODO 自动生成的方法存根`\n\n`  }`\n\n`}`\n\
  4.  删除注释。我们不需要注释（以 /* 开头并以 */ 结尾的行，以及以 // 开头的行），并且我们即将填充那个自动生成的存根。\n5.  在 `main`\
  \ 方法内部，输入：`System.out.println(\"Hello, World!\");`\n\n你的类现在应该类似于清单 1-2。\n\n***清单\
  \ 1-2**：基本的 Hello 程序*\n\n`package com.bryantcs.examples.hello;`\n\n`public class\
  \ Hello {`\n\n`  public static void main(String[] args) {`\n`    System.out.println(\"\
  Hello, World!\");`\n`  }`\n\n`}`\n\n这是一个完整的 Java 程序。你现在可以通过单击工具栏中的“运行”按钮或从 **Run**\
  \ 菜单中选择 **Run** 来运行你的程序。图 1.5 显示了“运行”按钮的位置。\n\n![images](img/0105.jpg)\n\n***图 1-5.**\
  \ “运行”按钮的位置。*\n\n然后，Eclipse 会在代码区域下方显示一个控制台面板，其中显示程序的输出。在本例中，它会显示“Hello, World!”。顺便说一句，编写一个输出“Hello,\
  \ World!”的程序是一个古老的传统。如果你告诉有经验的开发者你正处于学习编程的“Hello, World!”阶段，他们就会知道你刚刚踏上了成为软件开发者的道路。大多数软件开发者都深情地记得那一天。\n\
  \n`String[] args` 部分是 Java 程序用来读取你可以提供给程序的选项（更准确地说是参数）的机制。`String` 一词指的是我们可以将其视为单个对象的字符集合。名字是字符串的典型例子。`[]`\
  \ 表示一个数组，它是一个值的集合（在这里是字符串）。这个字符串集合（即数组）被称为 `args`。我们将在本章后面为 Hello 程序添加使用参数的功能，在下一章中介绍数组，并在第\
  \ 3 章“数据类型”中介绍字符串。\n\n#### 添加更多功能\n\n既然你已经有了一个可以运行的程序，让我们让它做更多的事情。具体来说，让它读取你的名字并向你问好，而不是向全世界问好。\n\
  \n查看 `main` 方法的声明。`args` 数组保存了当有人启动你的程序时提供给 Java 运行时引擎的所有值。通常，这些是各种类型的配置设置。一种常见的做法是传入一个包含更多信息的文件路径（例如游戏的难度设置或文字处理器最近打开的文件）——即配置文件的路径。我们将在本书后面介绍如何读取文件。现在，我们从\
  \ Eclipse 获取参数。不过，首先，我们需要编写代码来读取参数并将第一个参数放入我们的消息中。清单 1-3 展示了如何做到这一点。\n\n***清单 1-3**：读取参数*\n\
  \n`package com.apress.java7forabsolutebeginners;`\n\n`public class Hello {`\n\n\
  `  public static void main(String[] args) {`\n**`System.out.println(\"Hello, \"\
  \ + args[0] + \"!\");`**\n`  }`\n\n`}`\n\n![images](img/square.jpg) **注意** 计算机从\
  \ 0 开始计数，而不是从 1 开始。因此，数组的第一个成员位于索引 0 处。在这里输入 `args[1]` 会生成一个越界异常，Java 通过这个异常表示它期望找到两个字符串，但你只提供了一个。你会很快习惯计算机从\
  \ 0 开始计数的。\n\n`System.out.println` 接受一个 `String` 对象作为其参数。在本例中，我们有三个 `String` 对象，但加号将它们连接在一起以创建一个单独的字符串，从而满足了\
  \ `println` 方法（只需要一个字符串）的要求。加号是 Java 的字符串连接运算符（除了在数学运算中用作加号之外）。我们将在第 4 章“运算符”中介绍运算符。\n\
  \n要在 Eclipse 中为参数提供一个值，请遵循以下步骤：\n\n1.  从 **Run** 菜单中选择 **Run Configurations**。将出现“运行配置”窗口。图\
  \ 1.6 显示了“运行配置”窗口。\n\n    ![images](img/0106.jpg)\n\n    ***图 1-6.** “运行配置”窗口。*\n\
  \n2.  在 **Arguments** 选项卡中，输入你的名字。\n3.  单击 **Run** 按钮。\n\n这次，你的程序会向你问好。\n\n恭喜你。至此，你已经创建了一个完成所有程序基本功能的程序：接受输入、修改输入以完成某些任务，并产生输出。这看起来可能不算什么，但这是踏上一条有趣道路的第一步。在完成本书之前，我们还会做更多的事情。\n\
  \n\n\n#### 进一步开发\n\n纯粹为了趣味，我们再添加一点功能。程序在生成控制台输出时，通常会包含日期和时间。格式化日期所需的代码量往往超出大多数人的预期，除非他们亲自实践过。这是因为现实世界中的日期格式千差万别。在美国，月/日/年（MDY）格式占主导地位；而在欧洲，日/月/年（DMY）格式更为普遍。除了人类使用的日期格式外，计算机系统也有多种表示日期的方式，从简单的变体如年/月/日（YMD），到更为晦涩的排列方式。Java\
  \ 继承了 C 语言的特性，采用与 C 和 Unix（最初主要用 C 编写）以及 Linux（与 Unix 共享大量代码）相同的日期存储技术。因此，Java 将日期存储为自\
  \ 1970 年 1 月 1 日以来的秒数。用更详细、更专业的术语来说，Java 的“纪元”始于 1970 年 1 月 1 日 00:00:00 GMT。\n\n\
  那么，我们如何将自 1970 年以来的秒数转换为格式良好的时间戳并输出呢？清单 1-4 展示了一种方法。（软件开发既令人愉悦又令人痛苦的部分原因在于，几乎总是有多种方法来完成同一件事。）我将在下一节中详细解释这些新代码片段。\n\
  \n***清单 1-4**：为 Hello 程序添加时间戳*\n\n`package com.apress.java7forabsolutebeginners;`\n\
  \n`import java.text.SimpleDateFormat;`\n`import java.util.Date;`\n\n`public class\
  \ Hello {`\n\n`  public static void main(String[] args) {`\n`    // 首先，获取自 1970/1/1\
  \ 以来的秒数形式的日期`\n`    // 注意，Date 对象也包含时间信息`\n`    Date now = new Date();`\n`    //\
  \ 其次，创建一个格式化器对象`\n`    SimpleDateFormat formatter =`\n`      new SimpleDateFormat(\"\
  EEE, MMM dd, yyyy HH:mm:ss\");`\n`    // 第三，将格式化器应用于日期`\n`    String formattedDate\
  \ = formatter.format(now);`\n`    // 最后，将格式化后的日期添加到输出中`\n`    System.out.println(formattedDate\
  \ + \"> Hello, \" + args[0] + \"!\");`\n`  }`\n\n`}`\n\n当你运行这个程序时，会在其他输出之前看到一个日期和时间戳。\n\
  \n#### 关于 Java 对象\n\n请注意，我们必须使用两种对象（`Date` 和 `SimpleDateFormat`）来创建一个格式良好的日期。`Date`\
  \ 和 `SimpleDateFormat` 由类文件定义，就像你的 Hello 程序由类文件定义一样。我们通过文件顶部的 `import` 语句告诉 Java\
  \ 程序在哪里找到这些类。没有它们，你的程序无法运行，因此我们必须告诉 Java 在哪里找到它们。\n\n对于 Java 标准库中的任何类或其他代码片段，你都可以从\
  \ Oracle 为每个 Java 版本维护的 Javadoc 中了解其全部信息。Javadoc 是一种特殊的文档格式，允许 Java 程序员将文档直接嵌入到代码中。这样，当你编写自己的类时，可以查阅你想要使用的类的文档。随着你进行更多的编程，你会花大量时间阅读这些文档。作为一个很好的学习练习，请查阅\
  \ `SimpleDateFormat` 类，并查看格式化日期时可以使用的所有选项。\n\n对于 Java 7，你可以在 [`download.oracle.com/javase/7/docs/api/`](http://download.oracle.com/javase/7/docs/api/)\
  \ 找到 API（应用程序编程接口的缩写）文档。\n\n![images](img/square.jpg) **注意** Eclipse 为标准 API 中的项目提供了\
  \ Javadoc 信息。将鼠标悬停在你正在使用的任何方法或对象上，你将看到该项目的 Javadoc 信息。看到 Javadoc 后，按 **F2** 键可打开一个单独的窗口，让你查看更多内容。\n\
  \n### 总结\n\n在本章中，我们完成了以下任务：\n\n*   下载并安装了 Java 开发工具包\n*   下载并安装了 Eclipse，我们用它来编写\
  \ Java 程序\n*   在 Eclipse 中为我们的第一个程序创建了代码\n*   运行了我们的第一个程序（“Hello, world!”）\n*  \
  \ 修改了第一个程序以增加一点功能（专门向你问好）\n*   进一步修改了程序（以包含日期和时间）\n*   了解了在哪里可以找到未来程序中使用的其他代码的更多信息\n\
  \n这些任务中的许多构成了全职软件开发人员的日常工作。我们花费大量时间（通常比我们希望的要多）来设置工具。我们大部分时间要么在编写新类，要么（更常见的是）重写现有类，以添加新功能或纠正问题。当然，我们也会花大量时间阅读文档，或者希望有更多文档可供阅读。\n\
  \n我保证，如果你坚持从事软件开发，无论是作为爱好还是职业，你会发现自己无数次地回到这些任务上。在阅读本书的过程中，你也会完成其中的一些任务（尤其是编写和修改代码）。我希望你觉得这很有趣。我通常觉得如此。\n\
  \n## 第 2 章\n\n## Java 语法\n\n任何语言的语法都是该语言使用者遵循的规则，以便其他使用者能够理解。换句话说，语法是一套所有语言使用者同意遵循的规则，以便他们能够进行交流。如果你违反了规则，听你说话的人要么会问：“嗯？什么？”要么会认为你在犯傻（这在某些场合可能合适，但通常会导致问题）。\n\
  \n计算机语言的工作方式大致相同，只是它们从不被说出来（尽管我毫不惊讶有一天会看到，或者应该说听到，口头编程语言）。如果你决定自行其是，当你的计算机没有按照你的想法运行时，不要感到惊讶。如果你未能清晰地编码并遵循编程语言的规则，你只会得到混乱，尽管你的计算机会生成错误消息，而不是说：“嗯？什么？”\n\
  \nJava 的大部分语法源自另一种名为 C++ 的语言。而 C++ 的大部分语法又源自 C。C 则受到其他语言的影响。创建 Java 的人选择 C++ 作为\
  \ Java 语法的基础，因为 C++ 是当时使用最广泛的语言之一，这使许多开发者对 Java 语法有了一定的熟悉度。Java 的成功（它现在被广泛使用）取决于许多因素，但采用一种已经广为人知的语法无疑是有帮助的。\n\
  \n\n\n### 一个示例\n\n我创建了两个类和一个接口，它们共同演示了 Java 几乎所有的语法。我们在第 1 章中了解到，类是一段包含其他代码段的代码（我们将在本章后面介绍）。接口本质上是一种契约；使用某个接口的类必须执行该接口指定的所有操作。（用规范的\
  \ Java 术语来说，实现某个接口的类必须实现该接口指定的所有方法）我可能遗漏了一些晦涩的细节，但理解这些语法足以让你受用很长时间。在本章剩余部分，我们将多次引用这三个代码清单。如果这些代码清单看起来很长，请不要为此烦恼。现在，只需通读一遍。随着我们深入学习本章，请回头再看这三个代码清单，一切都会变得更加清晰。让我们从一个接口开始，如代码清单\
  \ 2-1 所示。\n\n***代码清单 2-1.** Average 接口*\n\n`package com.apress.java7forabsolutebeginners.syntaxExample;`\n\
  \n`public interface Average {`\n\n`  public int[] getInts();`\n`  public void setInts(int[]\
  \ ints);`\n`  public float getAverage();`\n`}`\n\n任何使用我们 `Average` 接口的类都必须包含（即实现）`getInts`、`setInts`\
  \ 和 `getAverage` 方法。此外，实现类中的这些方法必须具有相同的参数。因此，如果一个类包含以下签名方法 `getInts(int numberOfIntsToGet)`，除非它还包含一个签名方法\
  \ `getInts()`，否则不满足接口的契约。现在不必过于担心这一点。我们会在学习过程中通过一些示例来讲解，这些示例应该能很好地帮助你理解。\n\n***代码清单\
  \ 2-2**. AverageImpl 类*\n\n`package com.apress.java7forabsolutebeginners.syntaxExample;`\n\
  \n`public class AverageImpl extends Object implements Average {`\n`  private long\
  \ begin;`\n`  private long end;`\n`  private int[] ints;`\n`  private static final\
  \ String EXCEPTION_MESSAGE =`\n`    \"ints must contain at least one int\";`\n\n\
  `  public AverageImpl(int[] ints) throws IllegalArgumentException {`\n`    if (ints.length\
  \ == 0){`\n`      throw new IllegalArgumentException(EXCEPTION_MESSAGE);`\n`    }`\n\
  `    this.ints = ints;`\n`  }`\n\n`  @Override`\n`  public float getAverage() {`\n\
  `    begin = System.nanoTime();`\n`    int result = 0;`\n`    for (int i = 0; i\
  \ < ints.length; i++) {`\n`      result += ints[i];`\n`    }`\n`    end = System.nanoTime();`\n\
  `    return (float) result / ints.length;`\n`  }`\n\n`  public static float averageTwoNumbers(int\
  \ a, int b) {`\n`    return (float) (a + b) / 2;`\n`  }`\n\n`  // 一个经典的 getter 方法`\n\
  `  @Override`\n`  public int[] getInts() {`\n`    return ints;`\n`  }`\n\n`  //\
  \ 一个经典的 setter 方法`\n`  @Override`\n`  public void setInts(int[] ints) throws IllegalArgumentException\
  \ {`\n`    if (ints.length == 0){`\n`      throw new IllegalArgumentException(EXCEPTION_MESSAGE);`\n\
  `    }`\n`    this.ints = ints;`\n`  }`\n\n`  public long getRunTime() {`\n`    return\
  \ end - begin;`\n`  }`\n`}`\n\n`AverageImpl` 实现了 `Average` 接口。（“Impl” 是常用于表示实现接口的类的缩写）具体来说，它实现了\
  \ `Average` 接口定义的三个方法。如你所见，它还做了一些其他事情，包括定义一条在出现问题时使用的消息（异常是 Java 表示发现某些操作未成功的方式），并为我们提供了工具来跟踪计算我们提供的任何输入数字的平均值所需的时间。\n\
  \n***代码清单 2-3**. AverageTest 类*\n\n`package com.bryantcs.examples.syntaxExample;`\n\
  \n`import java.text.SimpleDateFormat;`\n`import java.util.Date;`\n\n`public class\
  \ AverageTest {`\n\n`  public static void main(String[] args) {`\n`    // 为 AverageImpl\
  \ 设置一个测试`\n`    int[] ints = {1, 2, 3, 4};`\n`    AverageImpl averageImpl = new\
  \ AverageImpl(ints);`\n`    // 执行一次测试`\n`    String testString = buildTestString(averageImpl.getInts(),`\n\
  `        averageImpl.getAverage(), averageImpl.getRunTime());`\n`    System.out.println(testString);`\n\
  \n`    // 设置第二个测试（使用 setInts）`\n`    ints[0] = 2;`\n`    ints[1] = 3;`\n`    ints[2]\
  \ = 4;`\n`    ints[3] = 5;`\n`    averageImpl.setInts(ints);`\n\n`    // 执行第二个测试`\n\
  `    testString = buildTestString(averageImpl.getInts(),`\n`        averageImpl.getAverage(),\
  \ averageImpl.getRunTime());`\n`    System.out.println(testString);`\n\n`    //\
  \ 测试异常`\n`    int[] ints2 = {};`\n`    try {`\n`      averageImpl.setInts(ints2);`\n\
  `    } catch(IllegalArgumentException iae) {`\n`      System.out.println(\"哎呀！不能使用空数组\"\
  );`\n`    }`\n\n`    // 为便捷方法添加一个测试`\n`    System.out.println(\"AverageImpl.averageTwoNumbers(1,\
  \ 2) = \"`\n`        + AverageImpl.averageTwoNumbers(1, 2));`\n`  }`\n\n`  private\
  \ static String buildTestString(int[] values, float average, long time) {`\n`    //\
  \ 为我们的测试设置一个时间戳`\n`    Date now = new Date();`\n`    SimpleDateFormat formatter\
  \ = new SimpleDateFormat(\"HH:mm:ss\");`\n`    String timeStamp = formatter.format(now);`\n\
  \n`    StringBuffer sb = new StringBuffer(timeStamp);`\n`    sb.append(\"> 对 {\"\
  );`\n`    for (int i = 0; i < values.length; i++) {`\n`      sb.append(values[i]);`\n\
  `      if (i < values.length - 1) {`\n`        sb.append(\", \");`\n`      }`\n\
  `    }`\n`    sb.append(\"} 求平均值，得到 \");`\n`    sb.append(average);`\n`    sb.append(\"\
  ，耗时 \");`\n`    sb.append(time);`\n`    sb.append(\" 纳秒\");`\n`    return sb.toString();`\n\
  `  }`\n`}`\n\n最后，`AverageTest` 类创建了一个程序（你可以通过它有一个 `main` 方法来判断，正如我们在第 1 章中看到的），该程序让我们能够测试我们的\
  \ Average 接口和 `AverageImpl` 类。它测试了 `AverageImpl` 类中的所有方法，甚至创建了一个异常（即一个错误），以便我们了解其工作原理。它还创建了一个\
  \ `String` 对象，我们用它作为向用户显示结果的消息。\n\n#### 行\n\nJava 文件（类和接口）由代码行组成。虽然这看起来显而易见，但实际上很重要。我们用行来衡量代码（还记得电影《侏罗纪公园》中，由塞缪尔·杰克逊扮演的程序员说有两百万行代码，我们就会认为程序很复杂吗？），并用行来分隔不同的代码段。Java\
  \ 有几种类型的行，包括语句（例如 `i = 2;`）、声明以及普通的空行（空行通常有助于使程序更易于阅读）。Java 使用一个特定字符——分号（`;`）来标记语句的结束。这一点很重要，因为一个长语句可以在文件中跨越多行，但从\
  \ Java 的角度来看，它仍然是一个单独的语句。有时，在调试 Java 代码时，这一点可能很重要。代码清单 2-2 和 2-3 中的示例都有因页面宽度限制而必须拆分的语句。\n\
  \n为了让你的编程更简单、更容易（并且不让其他程序员抓狂），请尽量让你的行（包括语句和声明）保持简短。由于历史原因，80 个字符通常被建议作为一行的长度限制。如果你的代码达到\
  \ 80 个字符，请设法将该行分成两行。（80 个字符的限制源于穿孔卡片有 80 个字符）你当然可以有更长的行（并且有时这是可以接受的），但为了保持代码的清晰，请尽量控制过长的行。\n\
  \n\n\n##### 避免过度复杂的代码\n\n有一个老笑话：一个人写下“简化！”，另一个人则将其改写为“避免晦涩”。在某种程度上，编码很像写作（事实上，我们喜欢这两者正是因为它们的相似之处）。其中一个相似之处在于，你常常有多种方式来完成一件事。虽然把一行代码写得极其复杂可能是一种有趣的挑战，但你应该避免这种编码方式。如果你的代码尽可能易读，你的同事会感谢你，当你回头处理一个旧项目时，你也会感谢自己。让我们看看清单\
  \ 2-4 中的例子：\n\n***清单 2-4**. 密集的代码*\n\n`someValue = someMethodToGetABooleanValue()\
  \ != someOtherMethodToGetABooleanValue() ?  `\n`  someMethodToDoSomething() : someMethodToDoSomethingElse();`\n\
  \n问题在于密度。上面这一行在一个地方包含了太多含义。因此，让我们在清单 2-5 中将其重写为更简单的代码。\n\n***清单 2-5**. 简化的代码示例*\n\
  \n`boolean firstBooleanValue = someMethodToGetABooleanValue();`\n`boolean secondBooleanValue\
  \ = someOtherMethodToGetABooleanValue();`\n\n`if (firstBooleanValue != secondBooleanValue)\
  \ {`\n`         someMethodToDoSomething();`\n`} else {`\n`         someMethodToDoSomethingElse();`\n\
  `}`\n\n不必担心细节。只需考虑结构。我们将在本章和下一章中逐步理解所有这些零碎内容的含义。\n\n注意，简化后的代码要长得多。简化后的代码不是一行（在文件中占两行），而是占了八行。简化确实有代价（需要你多滚动才能读完）。然而，它可读性更强。你（和你的同事）可以快速理解它，而面对那行密集的代码，你（很可能）需要停下来琢磨其含义。\n\
  \n有些开发者可能会说我们过度简化了代码。他们会指出，那两个 `boolean` 变量并没有实际帮助（返回这些值的方法可以直接放在 `if` 条件中），而且花括号也是不必要的（如果\
  \ `if` 和 `else` 的代码块都只有一行，就不需要花括号）。这些说法都没错。代码看起来会像清单 2-6 这样。\n\n***清单 2-6**. 适度简化的代码*\n\
  \n`if (someMethodToGetABooleanValue() != someOtherMethodToGetABooleanValue())`\n\
  `         someMethodToDoSomething();`\n`else`\n`         someMethodToDoSomethingElse();`\n\
  \n这里涉及的是风格问题。每个开发者对于代码何时过于复杂（即信息过于密集）都有自己的阈值。有些人喜欢非常复杂的代码，认为原始那行代码没什么问题，而另一些人则喜欢把每一点细节都拆分开来。对计算机来说，这无关紧要。所以这纯粹是一个人类层面的问题。\n\
  \n你会发现开发者对编码风格非常认真。事实上，我们在软件开发社区中见过的一些最严重的分歧就是关于编码风格的。作为初学者，你最好的选择是保持简单，避免过于密集的代码。最终，你会形成自己对“过于复杂”的阈值判断。\n\
  \n#### 包声明\n\n让我们从最顶部开始，也就是包声明：\n\n`         package com.bryantcs.examples.syntaxExample;`\n\
  \n这一行表明该类属于某个特定的包。一个包可以包含任意数量的类和接口。随着你开发更复杂的程序，你会希望将类和接口分组，以便更容易地找到某个特定的类或接口。例如，在\
  \ Web 应用中，通常会将与数据库交互的类（数据层）与为用户生成网页的类（表示层）分开。（这类应用通常还有一个中间层，数据在其中被转换为对用户有意义的信息。）\n\
  \n使用多个包的另一个好处是，不同的包可以包含同名的类。例如，标准 Java 库中包含 `java.util.Date`（本示例中用到）和 `java.sql.Date`。它们的功能略有不同（例如，它们有不同的日期格式化方式）。如果它们在同一个包中，就只能有一个被命名为\
  \ `Date`。\n\n![images](img/square.jpg) **注意** 包声明是可选的；然而，这是一个好习惯。即使你只是把开发当作爱好，你也希望将自己的项目彼此分开。\n\
  \n按照惯例，包声明遵循特定的格式。虽然这不属于严格的 Java 语法（没有它程序也能运行），但如果你不遵循这种格式，大多数 Java 开发者会对你印象不佳。从右向左解读这种格式最容易理解：\n\
  \n*   `syntaxExample` 表示包的本地名称。`AverageTest` 是一个简单的应用程序，因此只有一个包。\n*   `examples`\
  \ 表示本地包的父包。我们将本书的所有示例都放在 `examples` 包中。\n*   `com.bryantcs` 是所有应用程序的标识符，以便它们在发布到互联网上时与其他人的应用程序区分开来。毕竟，很多人可能都有一个\
  \ `examples` 包，甚至可能有人也有一个 `examples.syntaxExample` 包。包声明通常看起来像反向的 URL。你可能会期望看到类似\
  \ `bryantcs.com/examples/syntaxExample` 这样的形式（但不要访问那个网站，它不存在）。正如我们接下来看到的，域名部分（com.bryantcs）提供了最后的保障，确保我们的类是唯一的。\n\
  \n`com.bryantcs` 可以防止因两个包同名而产生的问题。按照惯例，包名的这一部分采用反向形式，因为域名比域类别名称更具体，而包名应该从左到右由不具体到具体。因此，从左到右阅读时，我们得到域类别（`com`）、域名（`bryantcs`）、应用类型（`examples`），最后是最内层包的名称（`syntaxExample`）。前两部分（`com.bryantcs`）是标准\
  \ Java 命名约定的一部分。后两部分（`examples.syntaxExample`）只是我们自己的约定，用于防止程序之间相互混淆。\n\n以下是另一个包声明的例子：\n\
  \n`         org.apache.fop`\n\n这指的是 apache.org 的 FOP（格式化对象处理器）项目。（Apache 是开源软件的领先提供商，也是作为\
  \ Java 开发者或测试人员参与其中的好地方。）\n\n包名可以更长，因为它们会不断增长以表示包中的包（包中的包，以此类推）。以下是来自 FOP 项目的一个更长的例子：\n\
  \n`         org.apache.fop.fo.pagination.bookmarks`\n\n这指的是 `bookmarks` 包，它位于 `pagination`\
  \ 包内，而 `pagination` 包位于 `fo` 包内，`fo` 包又位于 `fop` 包内。将包嵌套多层是商业项目中的常见做法。很少有实用的应用程序能合理地只放在一个包中。\n\
  \n你可以通过包含所需代码所在的包，来引入他人项目（以及你自己现有项目）中的代码。这种机制使开发者能够共享代码，并允许一家公司编写（并收费）供其他公司使用的代码。\n\
  \n\n\n#### 导入\n\n在包声明之后，我们进入 `import` 部分（如本章前面的清单 2-3 所示）。可以存在任意数量的 `import` 语句。\n\
  \n`import` 语句表明你的类使用了来自另一个包的一个或多个类或接口。这样，你就可以编写两个完全独立的应用程序，并在它们之间共享代码。此外，其他人可以编写一个库，然后你可以通过导入该库中你想要使用的部分来使用它。\n\
  \n让我们检查一下清单 2-7 中的 `import` 语句：\n\n***清单 2-7**。导入语句*\n\n`         import java.text.SimpleDateFormat;`\n\
  `         import java.util.Date;`\n\n在 `import` 关键字之后，我们得到一个类标识符。同样，从右向左阅读类标识符会很有帮助。`java.text.SimpleDateFormat`\
  \ 表明 `SimpleDateFormat` 位于 `util` 包内，而该包又位于 `java` 包内。\n\n这个特定的类来自官方 Java 库。这条 `import`\
  \ 语句告诉有经验的 Java 开发者，`AverageTest` 将要格式化一个日期。\n\n现在，假设我们想使用同一个包内的其他类。那么我们可以使用通配符（*）来指定该包内的任何类，如下所示：\n\
  \n`         import java.text.*;`\n\n每个不同的开发团队对于何时停止具体指定并使用通配符都有不同的标准。当我们从同一个包中使用了三个类或接口时，我们倾向于使用通配符。其他人则在只要从同一个包中使用了两个成员时就使用通配符。还有一些开发者从不使用通配符，因为通配符会妨碍你查看实际使用了哪些对象。\n\
  \n#### 类\n\n类行标识了特定的类。别忘了，包含该类的文件必须与类同名，包括相同的大小写。\n\n`         public class AverageImpl\
  \ extends Object implements Average {`\n\n所有类都继承自某个其他类。然而，当一个类继承自 `Object`（即 Java\
  \ 的根对象）时，你可以省略 `extends Object`。正如我们之前提到的，软件开发人员天生是极简主义者；我们不会编写任何无用的东西。因此，当被继承的类是\
  \ `Object` 时，很少有 Java 开发者会包含 `extends` 关键字。\n\n让我们剖析一下这个类声明，看看所有部分都意味着什么。第一个词 `public`\
  \ 是这个类的访问修饰符。更多细节请参见本章后面的“访问修饰符”。\n\n第二个词 `class` 表明我们定义了一个类。换句话说，我们定义了一种可以在系统中创建的对象。在这种情况下，我们定义了一个永远不会成为实际对象的类。抽象类用于被其他类继承以及作为引用。如果这个类是抽象的，其语法如下：\n\
  \n`         public abstract class AverageImpl extends Object implements Average\
  \ {`\n\n类也可以是静态的。在类上，`static` 关键字意味着该类的实例只有一个。你不能创建静态类的新实例（但运行时引擎会为你创建一个）。顺便提一下，你可能会觉得有趣的是，静态类仍然可以被克隆，因此\
  \ `static` 关键字本身并不能保证单例（一个只有一个实例的类）。\n\n![images](img/square.jpg) **注意** 定义类的另一种选择是定义接口。我们将在本章后面介绍接口。\n\
  \n第三个词 `AverageImpl` 是类的名称。Java 关于类（以及其他名称）只有两条规则。每个名称必须以字母开头。每个名称只能由特定字符组成：a-z、A-Z、0-9、下划线（_）和美元符号（$）。\n\
  \n![images](img/square.jpg) **注意** 顺便说一下，`Impl` 是 implementation（实现）的缩写。拥有一个接口以及一个为该接口提供实现的类是一种相当常见的做法。在这些情况下，常见的命名约定是将类命名为接口名称加上\
  \ `Impl`。别担心，我们会在“接口”部分介绍“实现”的含义。\n\n除了实际规则之外，Java 社区还遵循某些命名类的习惯性指南。\n\n*   第一个习惯是每个类名应以大写字母开头。\n\
  *   第二，名称中的每个逻辑单词应以大写字母开头。\n*   第三，我们很少在类名中使用下划线。美元符号仅用于生成的代码（即由程序而非人编写的代码）。\n\n\
  你不能违反规则（如果违反，你的程序将无法运行），但你可以违反社区的约定。然而，你应该有充分的理由这样做。这些约定让我们都能更轻松地相互沟通，因此请遵循它们，除非你有充分的理由不这样做，并注释你的理由。\n\
  \n第四个词 `extends` 让我们知道该类的父类。一个类的父类（更准确地说，超类）是当前类从中获取其定义基础的类。特别是，一个类可以使用其父类中所有 `public`\
  \ 和 `protected` 方法，就像它们是在当前类中定义的一样。在这种情况下，我们继承自 Java 的根类：`Object`。`extends` 关键字告诉我们这个类是其父类的一种变体。在这种情况下，`AverageImpl`\
  \ 是 `Object` 的一种变体。如果你查看一个类与其父类之间的关系，发现它不合理，那么你需要重新思考你在做什么，或者，如果这不是你编写的类，则需要更仔细地检查你正在使用的库。\n\
  \n第五个词 `Object` 告诉我们正在继承的基类的名称。有时，这个名称是有意义的，并能告诉我们一些关于父类的信息。有时，就像这里一样，父类的名称并不能告诉我们太多信息（因为每个类最终都继承自\
  \ `Object`）。优秀的软件开发人员力求使用有意义的名称，但这并不总是可能的。\n\n第六个词 `implements` 告诉我们这个类使用了一个或多个接口。我们将在本章后面介绍它们。\n\
  \n第七个词（在这个例子中也是最后一个）`Average` 告诉我们这个类实现的接口的名称。一个类可以实现任意数量的接口，尽管很少有类实现超过两三个接口，而且许多类根本不实现任何接口。\n\
  \n\n\n#### 字段\n\n*字段*是类或（极少情况下）接口中用于保存值的成员。字段让我们能够存储使用特定类时关心的信息位。例如，在定义矩形的类中，高度和宽度字段对该类的用途至关重要。在本章前面列出的\
  \ `AverageImpl` 类中，以下代码行定义了一个字段：\n\n`private long begin;`\n\n这个特定字段包含一个 `long` 类型的值（这是一个非常大的数字——我们将在下一章介绍数据类型）。在这种情况下，该字段包含\
  \ `null`（一个关键字，表示某物未被赋值，对于对象引用而言，表示不引用任何对象），直到其他代码对其赋值。你也可以直接为字段赋值，如代码清单 2-8 所示。\n\
  \n***代码清单 2-8.** 字段示例*\n\n`int[] ints = {1, 2, 3, 4};`\n`AverageImpl averageImpl\
  \ = new AverageImpl(ints);`\n\n对于基本类型（如 `int`），你可以直接使用值。在这个例子中，我们为一个 `int` 数组赋值。对于对象，你必须使用\
  \ `new` 关键字并调用对象的构造方法。我们将在下一章介绍基本类型和对象之间的区别。\n\n对于字段，`static` 关键字的作用与在方法上类似：静态字段只有一个实例，由该类的所有对象共享。因此，静态字段也被称为类字段（因为它仅适用于类本身，而非从该类创建的对象）。静态字段主要用于定义常量（永不改变的值）。我们将在本章后面介绍常量。\n\
  \n![images](img/square.jpg) **警告** 静态字段可能引发问题。假设程序中有两个部分同时运行，每个部分都在操作一个对象，而该对象的类定义中包含一个静态字段。如果两个类同时尝试修改该字段，就可能发生糟糕的情况（包括竞态条件——程序各部分相互等待——以及字段值不正确）。因此，除常量（既是静态又是最终的）之外，所有静态字段通常都应设为私有。\n\
  \n##### 常量\n\n许多编程语言都支持*常量*的概念。常量是一个永不改变的值。例如，Java 包含一个名为 Math 的类，而 `Math` 类中包含一个名为\
  \ PI 的常量，它以高精度保存圆周率的值。\n\n在 Java 中，常量是具有特定修饰符组合的字段：static 和 final。大多数常量也是 public\
  \ 的，尽管也可以（并且有时很有用）拥有私有、包级和受保护的常量。我们在 `AverageImpl` 类中使用了一个私有常量，以避免重复输入相同的字符串。按照惯例，常量的名称全部大写，逻辑单词之间用下划线分隔，如代码清单\
  \ 2-9 所示。\n\n***代码清单 2-9.** 一个常量*\n\n`private static final String EXCEPTION_MESSAGE\
  \ =`\n`    “ints must contain at least one int”;`\n\n#### 方法\n\n*方法*本质上是一个类能够执行的操作。关于类和对象的一个常见比喻是：类是名词，方法是动词。与所有比喻一样，它有时正确，有时错误，但通常是一种检查设计是否合理的便捷方式。方法通常会对类的其他成员（字段和方法）进行操作。然而，有些方法（通常是静态方法）不操作类的其他成员，而是独立运行。\n\
  \n由于方法能够执行各种不同的操作，因此除了说“方法执行操作”之外，很难对方法做出有意义的概括。或许一些例子会有所帮助（见代码清单 2-10）。\n\n***代码清单\
  \ 2-10**. 方法*\n\n`  // 一个经典的 getter 方法`\n`  @Override`\n`  public int[] getInts()\
  \ {`\n`    return ints;`\n`  }`\n\n`  // 一个经典的 setter 方法`\n`  @Override`\n`  public\
  \ void setInts(int[] ints) throws IllegalArgumentException {`\n`    if (ints.length\
  \ == 0){`\n`      throw new IllegalArgumentException(EXCEPTION_MESSAGE);`\n`    }`\n\
  `    this.ints = ints;`\n`  }`\n\n让我们仔细看看这个“setter”方法，从第一行开始（不包括以 `//` 开头的注释。我们将在本章后面介绍注释）。\n\
  \n`public` 是方法的访问修饰符。我们已在前面章节介绍了访问修饰符。\n\n`void` 是返回类型。返回类型告诉调用该方法的任何代码应该期待什么。所有方法都必须有返回类型。`void`\
  \ 表示该方法不会返回任何内容。因此，所有方法都必须有返回类型，但并非所有方法都必须返回内容。如果我们查看类中的其他方法，可以看到它们通常确实会返回一些内容。\n\
  \n`setInts` 是方法的名称。按照惯例，方法名以小写字母开头，并在每个逻辑单词出现的位置使用大写字母。这有时被称为驼峰命名法。\n\n括号内包含参数列表。在这个例子中，列表只有一个参数。每个参数都有类型和名称。在这个例子中，类型是\
  \ `int[]`（方括号表示数组），名称是 `ints`。当有多个参数时，它们用逗号分隔，如下面来自 `AverageTest` 类的方法声明所示：\n\n\
  `private static String buildTestString(int[] values, float average, long time) {`\n\
  \n花括号字符用于打开构成方法体的代码块。我们将在本章后面介绍代码块。\n\n方法也可以是静态的。对于方法，`static` 关键字意味着系统中只存在一个这样的方法，无论该类可能有多少个对象。因此，静态方法也被称为类方法。此外，该方法不能使用类的任何字段，除非这些字段本身已被声明为静态（通常是常量）。静态方法可以是一种便捷的方式，用于提供在整个代码中使用的工具方法。例如，一个接受日期并返回格式化字符串的方法可以是静态的，前提是它不需要使用其所在类的任何非静态方法。此外，静态方法可能稍微高效一些，因为它们不访问方法体之外的任何内容。\n\
  \n![images](img/square.jpg) **警告** 静态方法可能引发问题。假设你有两个线程，每个线程都在操作一个对象，而该对象的类定义中包含一个静态方法。如果两个类同时尝试访问该方法，就可能发生糟糕的情况。一方面，由于线程可能以错误的顺序运行，该方法修改的任何字段最终都可能得到错误的值。此外，静态方法只有一个实例（类本身），因此一个执行耗时操作的类可能会让第二个（以及第三个、第四个等）线程等待。\n\
  \n\n\n#### 构造函数\n\n`AverageImpl` 类包含一个构造函数，如代码清单 2-11 所示。\n\n***代码清单 2-11.** 一个构造函数*\n\
  \n`         public AverageImpl(int[] ints) throws IllegalArgumentException {`\n\
  `                 if (ints.length == 0){`\n`                         throw new IllegalArgumentException(EXCEPTION_MESSAGE);`\n\
  `                 }`\n`                 this.ints = ints;`\n`         }`\n\n构造函数看起来像方法，但并非如此。注意它没有返回类型，且名称与类名完全相同。当我们首次创建对象时，它们会被调用，使我们能够在操作对象之前对其进行设置。创建对象的过程称为*实例化*。\n\
  \n需要完成的工作因类而异，差异巨大。许多构造函数（如本例所示）会设置一些值。其他类可能会创建其他对象、打开数据库连接或文件，或者启动其他进程（可能性远不止于此）。\n\
  \n如果你没有定义构造函数，Java 仍会创建一个默认构造函数，以使 `new` 关键字能够正常工作。否则，没有人能够创建你的类的实例。构造函数可以拥有所有常见的访问修饰符。\n\
  \n你也可以为单个类创建多个构造函数。例如，假设我们想提供一种便捷方式，来计算任意其他数字与 2 的平均值。我们可以通过像代码清单 2-12 这样的构造函数来实现：\n\
  \n***代码清单 2-12.** 另一个构造函数*\n\n`         public AverageImpl(int otherNumber) {`\n\
  `                 ints = new int[] {2, otherNumber};`\n`         }`\n\n现在我们有两种方式来创建\
  \ `AverageImpl` 类的实例。\n\n![images](img/square.jpg) **注意** `this` 关键字是对该类所定义对象的引用。在本例中，`this`\
  \ 关键字是必要的，用于区分类中的 `ints` 字段和构造函数参数列表中的 `ints` 参数。\n\n#### 访问修饰符\n\n类、接口、字段和方法都使用各种访问修饰符来指示哪些其他类和接口可以查看并（可能）修改所讨论的项。Java\
  \ 有四种访问修饰符：`private`、`package-private`、`protected` 和 `public`。\n\n*   `private`\
  \ 意味着只有同一个类中的其他成员（即字段和方法）才能查看并（对于字段而言）修改该方法或字段。私有类和接口只出现在类内部，绝不会作为独立结构出现。\n*   `package-private`（通常简称为\
  \ package）意味着同一包中的其他成员可以访问该项。`package-private` 是默认的访问修饰符，没有对应的关键字，因为 `package` 用于指定类或接口所属的包。要声明某物具有包访问权限，则不使用任何访问修饰符。\n\
  *   `protected` 表示只有该类的后代才能访问该项。类可以是 `protected` 的，但受保护的类通常只出现在其他类内部（这种用法称为内部类）。类似地，接口也可以是\
  \ `protected` 的（前提是它们位于某个类内部），但这很罕见（我从未见过）。`protected` 最常用于类中的字段和方法。\n*   `public`\
  \ 表示任何对象都可以访问该项。`public` 经常被使用（可能被过度使用了）。养成习惯，问问自己是否真的应该将某物设为 `public`，这是值得的。\n\n\
  另一件需要了解的事情是，访问修饰符是分层的。`private` 包含 `package-private`（也就是说，如果某物能看见一个私有对象，它也能看见一个包私有对象），`package-private`\
  \ 包含 `protected`，而 `protected` 包含 `public`。当人们忘记访问修饰符是分层的时，可能会产生难以发现的问题。想象一个包含多个类的包，在该包中，某个类有一个对包可见的方法，而另一个类有一个同名的\
  \ `protected` 方法。代码最终可能会调用错误的方法。这种情况不常发生，但一旦发生，就很难排查。\n\n![images](img/square.jpg)\
  \ **注意** 访问修饰符可能很棘手。在撰写这段简短描述的过程中，我遇到了各种我之前未曾考虑过的用法（这对我来说是一次学习经历）。例如，我原以为接口不能是 `protected`\
  \ 的。然而，当它们出现在类内部时，它们可以是 `protected`（或 `private`）的。`private` 和 `public` 易于理解和使用。对于\
  \ `package` 和 `protected`，在决定使用该修饰符之前，请仔细考虑。\n\n#### 接口\n\n*接口*定义了实现该接口的类必须实现的行为。接口总是抽象的，并且它们包含的所有方法也总是抽象的。*抽象*（Java\
  \ 通过 `abstract` 关键字支持）意味着该类、方法、字段或其他任何东西不能在其定义处被实例化（即创建）。必须由其他对象来实例化所讨论的项。对于接口而言，这意味着实现该接口的类必须实现接口中定义的方法（正如我们已经了解的那样，但现在你知道为什么了）。因此，接口从不实现任何东西。此外，接口及其包含的方法总是静态的。因此，每个接口（及其方法）在系统中只存在一次。\n\
  \n接口通常只包含方法定义。它们也可以包含字段，但这些字段总是常量。\n\n考虑本章前面列出的 `Average` 接口中的 `getAverage()` 方法。如你所见，该方法没有方法体，甚至没有花括号。这是一个方法定义（也称为方法签名），而不是一个方法。任何实现该接口的类都必须实现该方法，包括其修饰符和参数。在这个例子中，实现\
  \ `Average` 的类必须包含一个具有相同修饰符的方法。也就是说，该类必须包含一个 `public float getAverage()` 方法，该方法带有一个执行所需操作并返回一个\
  \ `float` 值的方法体。（我们将在下一章介绍数据类型。）\n\n接口提供了一种便捷的方式，来确保相似的类实现相似（但不一定相同）的行为。考虑一组模拟动物王国的类。这样的模型可能有一个带有\
  \ `hunt()` 方法的 `Predator` 接口。猫和狗都会捕猎，但它们的方式不同（猫倾向于猛扑，而狗倾向于追逐）。通过将细节留给具体的类，`Predator`\
  \ 接口让我们知道捕食者会捕猎，但为每种捕食者以自己的方式捕猎留下了空间。\n\n\n\n#### 异常\n\n当出现问题时，Java 会通过一个称为“抛出异常”的过程来引发错误。`Exception`\
  \ 是一个拥有众多（且多层）子类的类。如果有人试图使用空数组，`AverageImpl` 类会抛出一个 `IllegalArgumentException`，因为\
  \ `getAverage` 方法需要除以数组的长度，而除以 0 是非法的。（实际上，试图除以零会产生一个 `ArithmeticException`，但 `AverageImpl`\
  \ 不会让事情发展到那一步。）\n\n当你预见到有人可能会尝试导致问题的操作时，你应该测试该问题并抛出适当的异常。让我们更详细地看看 `AverageImpl`\
  \ 抛出异常的一个地方，如清单 2-13 所示：\n\n***清单 2-13.** 抛出异常*\n\n`public AverageImpl(int[] ints)\
  \ throws IllegalArgumentException {`\n`        if (ints.length == 0){`\n`                throw\
  \ new IllegalArgumentException(EXCEPTION_MESSAGE);`\n`        }`\n`        this.ints\
  \ = ints;`\n`}`\n\n如你所见，方法声明中包含了 `throws` 关键字，后面跟着该方法抛出的异常名称。一个方法可以抛出任意数量的异常（很多方法也确实如此）。当一个方法可能抛出多种异常时，用逗号分隔它们。\n\
  \n在方法内部，你可以看到针对我们想要捕获的问题的测试，即 `ints` 的值为空数组。一旦检测到问题，我们就使用 `throw` 关键字抛出相应异常的新实例。\n\
  \n当一个方法抛出异常时，任何使用该方法的对象都必须处理该异常。你可以在清单 2-14 的 `AverageTest` 类中看到这种情况：\n\n***清单 2-14.**\
  \ 处理异常*\n\n`try {`\n`  averageImpl.setInts(ints2);`\n`} catch(IllegalArgumentException\
  \ iae) {`\n`  System.out.println(\"哎呀！不能使用空数组\");`\n`}`\n\n这种结构被称为 `try`-`catch`\
  \ 块。如你所见，它实际上是两个块——一个在 `try` 语句内，另一个在 `catch` 语句内。如果 `try` 块中的代码抛出了异常，那么 `catch`\
  \ 语句中的代码就会运行。你可以在一个 `try`-`catch` 块中包含多个 `catch` 语句，每个语句捕获不同类型的异常。这样，你就可以针对不同类型的异常采取不同的操作。你还可以向\
  \ `try`-`catch` 块添加一个 `finally` 块。清单 2-15 基于现有示例展示了一个更详细的例子：\n\n***清单 2-15**. Try-catch-finally*\n\
  \n`try {`\n`        averageImpl.setInts(ints2);`\n`} catch(IllegalArgumentException\
  \ iae) {`\n`        System.out.println(\"哎呀！不能使用空数组\");`\n`} catch(ArithmeticException\
  \ ae) {`\n`        throw ae;`\n`} finally {`\n`        System.out.println(\"成功通过了异常！\"\
  );`\n`}`\n\n注意，第二个 `catch` 块重新抛出了那种特定的异常。在这种情况下，你可能不会这样做，但这个例子说明了一种常见做法。异常经常被重新抛出，以便它们能够被最适合处理该特定异常的方法处理。通常，开发者在编写一个方法时不知道如何处理异常，因此开发者会重新抛出异常，并指望下一个方法（或再下一个，以此类推）知道如何处理它。当然，如果异常从未被处理，你就会遇到问题，这可能导致程序崩溃、在输出中留下令人尴尬的异常消息，或者让你颜面扫地，并试图安抚愤怒的用户。当你重新抛出异常时，包含你的\
  \ `try`-`catch` 块的方法也需要抛出该异常。通过这种方式，方法可以将异常传递多个方法，最终到达一个知道如何处理它的方法。\n\n`finally`\
  \ 关键字允许你创建一个无论发生什么都会运行的代码块。即使发生了异常，`finally` 块中的代码也会运行。在所示的示例中，它并没有做太多事情。`finally`\
  \ 通常不被包含，正是因为不需要做任何事情。然而，有时 `finally` 块的存在对于执行某些操作至关重要。`finally` 块的经典用途是关闭数据库连接。如果你打开一个数据库连接来做一些工作，但随后遇到了异常，数据库连接仍然需要关闭。过多的打开连接会降低数据库性能，并最终可能导致数据库崩溃（这对大多数商业软件来说是一场灾难）。\n\
  \n关于异常，最后需要了解的一点是，Java 有两类异常：受检异常（checked exceptions）和运行时异常（runtime exceptions）。受检异常之所以这样称呼，是因为当你尝试编译代码时，编译器（即将你的代码转换为计算机能理解的机器码的程序）会检查它们。使用\
  \ Eclipse 的一大原因是它会在你编写代码时检查问题。如果你使用了一个抛出受检异常的方法，你必须在代码中处理这些异常（尽管重新抛出它们也算作处理）。编译器不会检查运行时异常。Eclipse\
  \ 为我们运行编译器并在我们输入代码时检查代码，因此我们立即知道何时需要捕获受检异常。运行时异常（顾名思义）只能在运行时被捕获，因此 Eclipse 在我们编写代码时无法警告我们这些异常。\n\
  \n受检异常代表程序无法控制的情况，例如错误的用户输入或文件不存在。运行时异常代表可以通过更多或更好的代码来修复的问题。有一种观点认为，受检异常代表程序应该从中恢复的情况。例如，如果程序遇到一个缺失的文件（即，某个方法在期望一个文件句柄时得到了一个\
  \ `IOException`），程序应该询问用户文件在哪里，或者让用户取消操作。运行时异常代表代码中的错误（通常是疏忽），开发者应该修复这些错误。如果你遇到了\
  \ `NullPointerException`，你不需要让用户做任何事情（尽管你可能会告诉用户联系客户支持并报告问题）。相反，你应该修复代码中本不应传递 null\
  \ 的地方。几乎所有经验丰富的程序员都认同的一个概念是*防御性编程*，这意味着我们努力不让事情发展到可能发生异常的地步。相反，我们会做一些事情，比如在使用某个对象之前检查它是否为\
  \ null。\n\n实际上，`IllegalArgumentException` 是一个运行时异常。如果你从 `AverageTest` 中移除 `try`-`catch`\
  \ 块，你不会得到任何错误。然而，因为我能够预见到这个问题，所以我选择特意抛出该错误，以便我可以附加一条有意义的错误消息。\n\n\n\n#### 代码块\n\n\
  *代码块*是通常由多行代码组成的单元，通过花括号（`{}`）来界定。（花括号有几种不同的叫法，有些叫法可能比较牵强。为了保持全书一致，我将其统称为花括号。）\n\
  \n花括号为方法、类以及各种语句（例如`if`和`for`）定义了代码块。让我们来看一个来自 清单 2-16 中 AverageImpl 类的简单代码块：\n\n\
  ***清单 2-16.** 一个简单的代码块*\n\n`    for (int i = 0; i < ints.length; i++) {`\n`      result\
  \ += ints[i];`\n`    }`\n\n静态代码块 *静态代码块*是一种便捷的代码片段，允许你定义一个代码块，并将其包含在每个构造函数中。让我们通过\
  \ 清单 2-17 中的一个示例（以另一个类的形式）来了解。\n\n***清单 2-17**. 静态代码块示例*\n\n`package com.bryantcs.examples;`\n\
  \n`public class StaticBlockClass {`\n\n`        private static String name;`\n`        private\
  \ String whichOne;`\n\n`        static {`\n`                name = \"StaticBlockClass\"\
  ;`\n`        }`\n`        public StaticBlockClass(int identifier) {`\n`                whichOne\
  \ = Integer.toString(identifier);`\n`        }`\n\n`        public StaticBlockClass(String\
  \ identifier) {`\n`                whichOne = identifier;`\n`        }`\n\n`}`\n\
  \n如你所见，我们设置的字段也必须是静态的。不过，因为我们不想改变它，所以这也没问题。在这个例子中，使用静态代码块并没有带来太多好处。但是，想象一下，如果我们有十个值需要设置，并且有四个构造函数。\n\
  \n除了节省空间（尽管在这个例子中并非如此），静态代码块真正的价值在于确保类所需的一切都能进入每个构造函数。如果某些构造函数中设置了某些内容而其他构造函数没有，就可能导致错误，而静态代码块可以帮助你管理这个问题。\n\
  \n#### 注释\n\n*注释*是通常纯粹供人类阅读的代码行。编译器会完全忽略注释。Java 支持两种风格的注释：行尾注释和块注释。我提供的代码示例中有许多行尾注释。*行尾注释*以两个斜杠字符（`//`）开头，如下所示：\n\
  \n`// 行尾注释，恰好是该行唯一的内容`\n\n行尾注释也可以在该行其他代码之后开始，如下所示：\n\n`int counter = 0; // 初始化计数器`\n\
  \n代码不能跟在行尾注释的同一行后面，否则它会成为注释的一部分。\n\n*块注释*以斜杠加星号（`/*`）开头，以星号加斜杠（`*/`）结尾。块注释可以在一行内，也可以由多行组成。块注释可以与其他代码在同一行开始。实际上，块注释可以出现在同一行代码元素之间（这可能导致该行代码在文件中由多行组成）。一如既往，示例会有所帮助。以下是一个单独占一行的块注释：\n\
  \n`/* 注释 */`\n\n以下是一行中间带有注释的代码：\n\n`int counter /* 注释 */ = 0;`\n\n请不要这样做。这在语法上是合法的，但却是糟糕的编程实践，因为它会使代码更难阅读。\n\
  \n现在让我们来看 清单 2-18 中的多行块注释。\n\n***清单 2-18**. 多行块注释*\n\n`/* 现在是所有优秀程序员编写有意义注释的时候了，`\n\
  `这样我们其他人才能理解代码在做什么。 */`\n\n清单 2-19 展示了另一个与代码混合的多行块注释。\n\n***清单 2-19**. 多行块注释中的不良风格*\n\
  \n`int counter /*`\n`请不要`\n`这样做 */ = 0;`\n\n按照惯例（我打破这个惯例是为了给你提供你不应模仿的示例），多行注释应将注释开头（`/*`）单独放在一行，注释结尾（`*/`）单独放在一行，并且中间每一行都以星号开头，如\
  \ 清单 2-20 所示。\n\n***清单 2-20**. 格式正确的多行块注释*\n\n`/*`\n` * 现在是所有优秀程序员编写有意义注释的时候了，`\n\
  ` * 这样我们其他人才能理解代码在做什么。`\n` * 现在这个注释的格式也正确了。`\n` */`\n\n这样更容易阅读，不是吗？\n\n**JAVADOC**\n\
  \nJava 包含一种从类和接口内部生成文档的机制。这种机制称为 Javadoc，它使用一种特殊的块注释（这里是一种既供人类阅读也供系统读取的注释）。Javadoc\
  \ 注释以斜杠加两个星号（`/**`）开头，以星号加斜杠（`*/`）结尾，与块注释非常相似，只是在起始语法中多了一个星号。注释的内容最终会出现在 Javadoc\
  \ 工具创建的文档中。按照惯例，任何供公共使用的类都应该在类及其所有可能被他人使用或扩展的方法（通常是 public 和 protected 方法）上添加 Javadoc\
  \ 注释。\n\n当 Javadoc 工具运行时，它会检查所有的类和接口，并创建一组 HTML 页面（或根据各种设置生成其他输出），这些页面包含与程序中的类、接口和方法相对应的标题和子标题。各种标记帮助\
  \ Javadoc 工具指示参数和返回值的描述、Javadoc 注释的作者以及其他特殊内容。\n\n当你为自己编写程序时，不需要插入 Javadoc 注释。如果你开始为开源项目或公司编写代码，可能会被要求向代码中添加\
  \ Javadoc 注释。\n\n清单 2-21 展示了一个 Javadoc 注释及其所描述的方法声明的示例。\n\n***清单 2-21**. 一个方法的 Javadoc\
  \ 注释*\n\n`  /**`\n`   * 此方法使 Cat 对象追逐给定的 Mouse 对象。`\n`   * @param mouse 一个 Mouse\
  \ 类的实例，供我们的猫追逐`\n`   */`\n`  void chase(Mouse mouse) {`\n\n因为你可能暂时还不需要创建 Javadoc，我们就先讲到这里。当你需要了解更多信息时，可以在\
  \ [`http://www.oracle.com/technetwork/java/javase/documentation/index-jsp-135444.html`](http://www.oracle.com/technetwork/java/javase/documentation/index-jsp-135444.html)\
  \ 找到 Javadoc 工具的主页。\n\n### 本章小结\n\n那么，我们在本章学到了什么？\n\n我们讨论了：\n\n*   Java 文件的结构，了解了语句和声明\n\
  *   构成 Java 程序的组件（类和接口）\n*   构成类和接口的组件（方法、字段、构造函数、代码块和注释）\n*   Javadoc 的基础知识\n\n\
  关于我们在单一章节中涵盖的内容，已经可以写出整本书，但对于初学者来说，那些书可能过于枯燥。我认为学习基础知识，然后处理文件、创建动画以及制作自己的视频游戏会更有趣。我们将在本书的后续部分完成所有这些内容。我建议你重读本章，并在阅读过程中思考你从本章后面部分学到的东西。我还建议你停下来自己做一些简单的编程练习。尝试一些简单的事情，例如编写一个打印小型乘法表（比如到\
  \ 4 x 4）的程序，以及一个接受多个字符串作为参数并以有趣方式组合它们的程序。没有什么比亲自动手实践更能让你学到东西了。\n\n## 第 3 章\n\n##\
  \ 数据类型\n\n大多数编程语言都有数据类型。Java 有几种数据类型。数据类型的第一个特征是它是基本类型还是对象类型。任何不是基本类型的东西都是某种对象。\n\
  \n\n\n### 原始数据类型\n\n*原始*意味着不存在用于定义该类型变量的类。Java 支持多种原始数据类型。在前几章的代码示例中，你看到过一些变量，其数据类型就是原始类型。凡是出现\
  \ `int` 或 `boolean` 的地方，它们都是原始数据类型（通常简称为“原始类型”）。原始类型可分为几个大类。从语言的角度来看，这些分类并不存在，但它们确实有助于人们区分不同的原始类型。\n\
  \n#### 整数原始类型\n\n*整数原始类型*是指其值只能是整数的类型。它不能是实数（即带有小数部分的值）。数字 0、1、16 和 37 都是整数。数字 12.34\
  \ 不是整数。各种整数原始类型之间的区别在于每种类型由多少位组成。由于位数更多的类型可以容纳更大的数字，因此不同位数的实际效果是增加了该类型的最大值。增加位数可能带来的负面影响是消耗更多内存。通常情况下这无关紧要，但最佳实践是使用不超过你所需大小的数据元素。\n\
  \n整数原始类型是有符号的（除非你使用 `unsigned` 关键字，我们稍后会详细讨论），因此它们的取值范围是从负数到正数。\n\n表 3-1 展示了各种整数原始类型的详细信息。\n\
  \n![图片](img/t0301.jpg)\n\n你需要更大的数字吗？实际应用程序有时需要比 `long` 最大值还要大的数字。在这种情况下，Java 提供了一个名为\
  \ `BigInteger` 的类。由 `BigInteger` 对象表示的数字可以是任意大小，因为 `BigInteger` 类会分配足够的字节来存储任何数字的表示形式。使用起来有点棘手，并且对\
  \ `BigInteger` 对象的操作速度较慢，但有时这是唯一的方法。`BigInteger` 不是原始类型。\n\n#### 实数原始类型\n\n实数具有小数点以及小数点后的数值。即使该值为\
  \ 0，即使你没有输入小数点及其后的内容，小数点及其后的零也会在幕后存在。它们必须存在，以便对该值的操作可以与完整值进行比较，因此 JVM（Java 虚拟机，即运行你程序的程序）即使你没有输入也会自动填充它们。\n\
  \n![图片](img/square.jpg) **注意** `0` 和 `0.00` 在 Java 中是不同的值。对普通人来说，它们都表示零。对科学家或数学家来说，一个比另一个表示更高的精度，但它们仍然都表示零。但对编译器来说，它们是不同的数据类型，彼此之间毫无关系。\n\
  \nJava 支持两种实数原始类型：`float` 和 `double`。`float` 的名称来源于浮点数的概念。小数点可以移动，因此被称为“浮动”。`double`\
  \ 的名称则是因为它占用的存储空间是 `float` 的两倍。表 3-2 展示了 `float` 和 `double` 的详细信息。\n\n![图片](img/t0302.jpg)\n\
  \n同样，有时这仍然不够。对于这些情况，Java 提供了一个名为 `BigDecimal` 的类。与 `BigInteger` 一样，它使用起来可能很棘手，并且对其操作速度较慢。但当你绝对需要一个比\
  \ `double` 更大的数字时，请使用 `BigDecimal`。与 `BigInteger` 一样，`BigDecimal` 不是原始类型。\n\n####\
  \ boolean\n\n`boolean` 数据类型表示某事物是真还是假。实际上，这两个词（`true` 和 `false`）是 `boolean` 数据类型仅有的两个值。\n\
  \n![图片](img/square.jpg) **注意** `true` 和 `false` 是 Java 中的保留字。你不能将它们用于除布尔变量值之外的任何其他用途。例如，尝试创建一个名为\
  \ `true` 的 `int` 会引发错误。\n\n#### char\n\n`char` 数据类型占用两个 8 位字节，用于表示字符。它存储为一个无符号的\
  \ 16 位整数，最小值为 0，最大值为 65,535。但是，你绝不应该使用 `char` 来存储数字，因为这可能导致混淆。使用 `char` 变量来保存单个字符，这样就能避免麻烦。\n\
  \n那么，为什么在字符相对较少的情况下最大值却这么大呢？好吧，当你考虑到全世界使用的所有字符集时，65,535 这个数字并非不合理。事实上，在处理传统中文时，这个数字还不够用。\n\
  \n![图片](img/square.jpg) **提示** 如果你对如何处理其他语言的字符感到好奇，可以查阅 Unicode，这是一个定义全世界所有字符的标准。有关处理多字节字符的更多信息，请查阅可变宽度编码。\n\
  \n#### 特殊类型：String\n\n`String` 是一种兼具原始类型和对象某些特性的类型。严格来说，它是一个对象；也就是说，它由 `String`\
  \ 类定义。`String` 对象是一个字符序列（Java 提供了将 `String` 对象转换为 `char` 原始类型集合以及从这样的集合创建 `String`\
  \ 对象的实用工具）。处理集合（字符串）通常比处理单个字符更方便，因此 Java（以及几乎所有其他编程语言）都提供了 `String` 对象。\n\nJava\
  \ 为 `String` 类提供了特殊支持，使其行为有点像原始类型。特别是，你可以使用等号（`=`）创建 `String` 对象，并且可以使用加号（`+`）连接\
  \ `String` 对象，如清单 3-1 所示。顺便说一下，连接操作仅适用于字符串。如果你对其他数据类型使用加号，要么会得到错误（尝试将两个 `boolean`\
  \ 值相加你就会明白），要么会得到你通常与加号关联的数学加法运算。\n\n***清单 3-1**. String 示例*\n\n`String myString\
  \ = \"my string\";`\n`String yourString = \"your string\";`\n`String ourString =\
  \ myString + \" \" + yourString;`\n`System.out.println(myString);`\n`System.out.println(yourString);`\n\
  `System.out.println(ourString);`\n\n输出结果见清单 3-2。\n\n***清单 3-2**. String 示例输出*\n\n\
  `my string`\n`your string`\n`my string your string`\n\n请注意，`ourString` 的值由三个值的连接组成：`myString`、`\"\
  \ \"` 和 `yourString`。`\" \"` 是一个字符串字面量。这是 `String` 与其他对象的另一个不同之处；没有其他对象（记住，原始类型不是对象）可以拥有字面量。\n\
  \n\n\n#### 字面量\n\n所有基本类型和`String`类都可以拥有字面量值。*字面量*是一种与特定数据类型对应的常量值。表 3-2 为每种基本数据类型和`String`类提供了示例。\n\
  \n![图片](img/t0302a.jpg)\n\n![图片](img/square.jpg) **注意** 声明 float 字面量时，需要在字面量末尾追加\
  \ f。否则，编译器会尝试将其转换为 double 值，然后报错，提示无法从 double 转换为 float。类似地，你可以在 double 字面量声明的末尾加上\
  \ d。不过，这是多余的，因为 double 是默认的浮点类型。\n\n字面量随处可见，人们往往不会停下来思考它（毕竟，我们通常只是想方设法让计算机做点什么）。每当我们编写一个从\
  \ 0 开始计数到某个值的循环时，我们就在使用字面量（在这种情况下，是整数字面量）。其他许多字面量在几乎所有编程语言和任务中都很常见。在集合论（它为大量编程，尤其是数据库编程提供了理论基础）中，唯一重要的三个值是\
  \ 0、1 和多。因此，0 和 1 在各种软件中反复出现。空字符串（`\"\"`——有时用于比较 String 对象）和单个空格（`\" \"`——用于连接 String\
  \ 对象而无需在此过程中创造一个新的大词）也经常出现。\n\n##### 转义字符\n\n`char`类型的变量可以拥有几个特殊的值。首先，单引号（'）、双引号（`\"\
  `）和反斜杠（\\）都必须被标记为特殊字符（这称为转义字符），以便 JVM 知道你想要的是这些字符之一。否则，它会将所有单引号处理为`char`的开始或结束，将所有双引号处理为`String`对象的开始或结束。反斜杠字符必须被转义，因为它本身就是转义字符。如果它本身不能被转义，那么每个反斜杠都会表示一个转义字符，这将是一个真正的问题。*转义字符*（通常称为转义序列，因为它们至少由两个字符组成——转义字符和至少一个其他字符）也用于非图形字符（通常称为控制字符）。甚至还有一个叫做\
  \ Bell 的字符。它从不显示，但它可以（如果你的计算机支持）让你的计算机发出蜂鸣声。Bell（或 Alert）字符的转义序列是`\\a`。所有这些可能不太容易理解，所以让我们看看代码清单\
  \ 3-3 中的一些例子，以便更清楚地说明问题。\n\n***代码清单 3-3**. 转义字符示例*\n\n`// 让我们从双引号开始`\n`// 下面这行会报错，因为\
  \ meow 未定义`\n`System.out.println(\"My cat says, \"meow.\"\");`\n`// 所以这一行必须写成`\n\
  `System.out.println(\"My cat says, \\\"meow.\\\"\");`\n`// 这将产生输出：My cat says, \"\
  meow.\"`\n\n`// 现在是单引号`\n`// 下面这行会报错，因为 ' 没有匹配的 '`\n`System.out.println(\"' is my\
  \ favorite character\");`\n`// 所以这一行必须写成`\n`System.out.println(\"\\' is my favorite\
  \ character\");`\n`// 这将产生输出：' is my favorite character`\n`// （我真正喜欢的字符是 ;）`\n\n\
  `// 现在是反斜杠本身`\n`// 下面这行会报错，因为它缺少一个结束的 \"`\n`// （编译器将 \\\" 视为字面量 \"，然后找不到字符串的结尾。）`\n\
  `System.out.println(\"I want a \\\");`\n`// 所以这一行必须写成`\n`System.out.println(\"I\
  \ want a \\\\\");`\n`// 这将产生输出：I want a \\`\n\nJava 还支持几个特殊的转义序列（全部以反斜杠开头）。表 3-3\
  \ 展示了每个转义序列并描述了其效果。它从我们已经介绍过的三个开始。\n\n![图片](img/t0303.jpg)\n\n换行符（`\\n`）在创建可读的错误消息、分隔文件中的行以及其他输出方面得到了大量使用。制表符不太常见，但有时仍会使用（用于对齐输出片段，使内容更易读）。其他转义序列则很少使用，因为如今的软件开发人员几乎不再创建非结构化输出。当程序员使用穿孔卡片进行输入、使用行式打印机进行输出时，他们广泛使用换页符和行首字符。当然，我们仍然会产生大量输出，但通常是\
  \ HTML、XML 或其他结构化格式。\n\n除了作为`char`类型变量的可能值之外，`String`对象也可以包含转义序列。许多`String`对象包含一个或两个换行序列。代码清单\
  \ 3-4 展示了一个简短的例子。\n\n***代码清单 3-4**. 包含转义序列的字符串*\n\n`String errorMessage = \"The\
  \ whatsit didn't work!\\nCheck the doohickey.\";`\n`System.out.println(errorMessage);`\n\
  \n该代码片段产生的输出如代码清单 3-5 所示。\n\n***代码清单 3-5**. 换行输出*\n\n`The whatsit did't work!`\n\
  `Check the doohickey.`\n\n\n\n### 包装类\n\n每一种基本类型（记住，`String` 是一个对象而非基本类型）都有一个对应的类，提供了基本类型本身所不具备的若干实用功能。你可以将包装类视为包裹在对应基本类型周围的一包实用功能。表\
  \ 3-4 展示了每种基本类型对应的包装类：\n\n![图片](img/t0304.jpg)\n\n这些类中最常用的方法是各种 `parse`、`Value`\
  \ 和 `valueOf` 方法，因为这些方法能让你将 `String` 转换为基本类型。每个类也支持 `toString` 方法，用于将基本类型转换为 `String`\
  \ 对象。代码清单 3-6 展示了你可以对 `int` 基本类型执行的操作。\n\n***代码清单 3-6**。Integer 示例*\n\n`// 声明一个\
  \ int`\n`int myInt = 1;`\n\n`// 以及一个包含数字的 String`\n`String myString = \"1\";`\n\n\
  `// 将 myInt 转换为 String`\n`String myIntString = Integer.toString(myInt);`\n\n`//\
  \ 将 myString 转换为 int`\n`int myStringInt = Integer.parseInt(myString);`\n\n`// 将\
  \ myString 转换为 Integer`\n`// 如果 myString 不包含数字，请准备好处理异常`\n`Integer myStringInteger\
  \ = new Integer(myString);`\n\n`// 然后将 myStringInteger 转换为 int`\n`int myOtherStringInt\
  \ = myStringInteger.intValue();`\n\n`// 现在做一些更不寻常的事情`\n`// 将 int 转换为 float（也许是为了后续的浮点运算）`\n\
  `float myFloat = new Integer(myInt).floatValue();`\n\n`// 将 int 转换为 byte`\n`// 如果该值超出\
  \ byte 的范围，请准备好处理异常`\n`byte myByte = new Integer(myInt).byteValue();`\n\n`// 将 int\
  \ 转换为 long`\n`// 这次无需担心异常`\n`long myLong = new Integer(myInt).longValue();`\n\n\
  `// 纯粹为了好玩，获取 myInt 的二进制字符串表示`\n`// 创建一个包含 \"1\" 的 String 对象`\n`String myIntBinary\
  \ = Integer.toBinaryString(myInt);`\n\n其他数值基本类型（`byte`、`short`、`long`、`float` 和\
  \ `double`）的工作方式类似。你可以将它们中的任意一种转换为另一种，不过如果无法用你提供的值进行转换，你可能需要处理异常。例如，如果你有一个值为 300\
  \ 的 int 变量，将其转换为 byte 会出错，因为 byte 无法容纳该值。我们将在下一章讨论类型转换时更详细地介绍这个概念。\n\n`Boolean`\
  \ 和 `Character` 类的工作方式略有不同。你仍然可以将字符串转换为 `boolean` 或 `char` 值，反之亦然，但你不能将 `boolean`\
  \ 和 `char` 基本类型转换为其他基本类型。此外，`Boolean` 类包含一个 `equals` 方法，而 `Character` 类包含许多用于处理诸如从右到左阅读的字符（例如，阿拉伯语和希伯来语的字符）以及其他仅与字符相关的特殊问题的方法。不过，所有这些操作都相当不常见，因此我们不做介绍。如果你想了解更多关于它们的信息（如果你愿意，那很好），请查看\
  \ `Boolean` 和 `Character` 类的 Javadoc。你可能还记得第 1 章中提到，JavaDoc 是一种内置于代码本身的特殊文档。Oracle（开发\
  \ Java 的公司）为所有标准 Java 库提供了详尽的 JavaDoc。你可以在 [`http://download.oracle.com/javase/7/docs/api/java/lang/Boolean.html`](http://download.oracle.com/javase/7/docs/api/java/lang/Boolean.html)\
  \ 找到 Boolean 类的 JavaDoc，在 [`http://download.oracle.com/javase/7/docs/api/java/lang/Character.html`](http://download.oracle.com/javase/7/docs/api/java/lang/Character.html)\
  \ 找到 Character 类的 JavaDoc。你可以在 [`http://download.oracle.com/javase/7/docs/api/`](http://download.oracle.com/javase/7/docs/api/)\
  \ 找到 Java 7 的所有 JavaDoc（如你所见，其他主题都是整个 API 文档的分支）。\n\n### 数组\n\n*数组*是一种数据结构，它在一个标识符下保存一组变量。Java\
  \ 支持基本类型和对象的数组。变量名后的方括号表示它是一个数组。代码清单 3-7 展示了几个数组以及如何操作它们。\n\n***代码清单 3-7**。基本类型数组*\n\
  \n`int[] a; // 声明数组但不赋值`\n`a = new int[2]; // 指定现有数组的长度`\n`int[] b = {1, 2, 3, 4};\
  \ // 声明数组并赋值`\n`int bLength = b.length; // 如何获取数组的长度`\n\n`// 数组从 0 开始，而不是 1`\n`b[0]\
  \ = 2; // 必须逐个重新赋值数组中的每个值`\n\n让我们逐行查看代码。第一行创建了一个 `int` 基本类型的数组，但没有给它赋值（此时 `a` 为\
  \ null）。第二行展示了如何将数组设置为特定长度。如果 `a` 之前有值，这些值将被新类型的默认值（此处为 0）替换。第三行展示了如何创建一组初始值的数组。你只能在创建数组时使用这种块赋值语法，而不能在给现有数组赋新值时使用。第四行展示了如何获取数组的长度。最后一行展示了如何重新赋值数组中的某个值，并说明数组索引从\
  \ 0 开始（大多数编程语言从 0 开始计数）。\n\n现在让我们看看代码清单 3-8 中的对象数组，它揭示了一些有趣的事情。\n\n***代码清单 3-8**。对象数组*\n\
  \n`Integer[] myIntegers = new Integer[4];`\n`for (int i = 0; i < myIntegers.length;\
  \ i++) {`\n`        myIntegers[i] = new Integer(i);`\n`}`\n\n同样，我们逐行分析。如你所见，创建对象数组的语法与创建基本类型数组略有不同。等号左边的部分看起来相同（对象类型、数组指示符和变量名），但等号右边的部分不同，它在数组元素类型之前使用了\
  \ `new` 关键字。要创建对象的新实例，我们通常使用 `new` 关键字（尽管也存在其他方式），它会调用对象的构造函数。然而，Integer 类的所有构造函数都需要一个对象（一个\
  \ `int` 或一个包含整数值的 `String` 对象），因此这个数组最终包含四个 null 引用（我们稍后会深入探讨 null 的含义）。\n\n这个代码清单还展示了如何遍历数组，并在本例中为每个\
  \ null 对象创建一个对象。请注意，即使我们在创建数组时已经使用了 `new` 关键字，这里仍然必须再次使用它。因为从最初的赋值中我们得到的是四个 null\
  \ 引用而不是实际对象，所以我们必须在这里创建新的对象。在这种情况下，我们最终得到四个 `Integer` 对象，其值分别为 0、1、2 和 3。\n\nJava\
  \ 为数组提供了一个便捷类。`Arrays` 类由许多静态方法组成，用于执行诸如复制和排序数组等便捷操作。例如，代码清单 3-9 展示了一种对 int 数组进行排序的方法。\n\
  \n***代码清单 3-9**。使用 Arrays 便捷类*\n\n`int[] a = {5, 4, 3, 2};`\n`// 在程序顶部，我们必须导入`\n\
  `// java.util.Arrays 才能使此代码正常工作`\n`Arrays.sort(a);`\n`for (int i = 0; i < a.length;\
  \ i++) {`\n`  System.out.println(a[i]);`\n`}`\n\n结果在控制台中输出为 2、3、4、5（每个数字占一行）。\n\n\
  \n\n### 不存在的类型：null\n\nJava 包含一个不代表任何东西的值：`null`。它指向一个尚未分配的内存地址。用 Java 的术语来说，这意味着它指向一个尚未创建的对象或基本类型。正如我在“数组”部分提到的，当你创建一个数组而不指定其值时，你实际上是在创建一个由\
  \ `null` 值组成的集合。这些值没有内存地址，也没有对应的基本类型或对象，因此它们是 `null`。这听起来可能是个问题，而 `null` 的整个概念也常常给新手程序员带来一些麻烦。你可以通过记住\
  \ `null` 是一个不存在的引用来理清这个概念。\n\n经常被诟病的 `null` 也有其用途（否则它就不会存在——程序员大多是务实的人）。例如，我们经常将对象与\
  \ `null` 进行比较，以确保在尝试使用某个对象之前它确实存在。如果图形库本应给我们一个 `Color` 类型的对象，但我们却得到了 `null`，那就出问题了。因此，我们可能会将该\
  \ `Color` 值与 `null` 进行比较，以确保我们得到了一个 `Color` 对象，如果没有，则执行一些有用的操作（例如尝试其他方法，或至少记录一个错误）。\n\
  \n此外，在一个地方创建变量并在另一个地方赋值也是一种常见做法。在创建和赋值之间，该变量的值可能是 `null`（也可能不是 `null`，因为某些基本类型（如\
  \ `int`）有默认值）。这种技术很方便，因为我们可能希望根据某些逻辑为变量赋予不同的值。例如，一系列 `if-else` 语句或一个 `switch` 语句可能包含为变量赋值的代码。让我们考虑一个小例子（来自扫雷游戏），如清单\
  \ 3-10 所示。\n\n***清单 3-10.** 使用 null 值*\n\n`public getMineIcon(int x, int y) {`\n\
  \n`// x 和 y 是游戏网格中的位置`\n`  int numberOfAdjacentMines = getNumberOfAdjacentMines(x,\
  \ y);`\n\n`  MineIcon mineIcon = null; // 这里是我们的 null`\n`  if (numberOfAdjacentMines\
  \ == 1) {`\n`    mineIcon = new MineIcon(1);`\n`  } else if (numberOfAdjacentMines\
  \ == 2) {`\n`    mineIcon = new MineIcon(2);`\n`  }`\n`  // 以此类推，直到 8`\n\n`  return\
  \ mineIcon;`\n`}`\n\n在这种情况下，我们可以假设存在一个 `MineIcon` 类，并且它的构造函数接受两个整数值，并返回一个显示该整数参数值的图标（一种图像类型）。因为扫雷游戏中的一个方格最多只能有八个相邻地雷，所以我们最多处理到八。我们还让该方法返回\
  \ `null`，以表示一个方格没有相邻地雷的情况。因此，调用此方法的代码必须知道如何处理 `null` 值。碰巧的是，我们需要使用的 `setIcon` 方法接受\
  \ `null` 参数，以此表示不需要设置图标。\n\n我们在第 7 章“创建用户界面”中创建了一个完整的扫雷程序。届时，你会看到另一种设置地雷图标的方法，但它仍然使用了\
  \ `null` 引用。现在，只需记住 `null` 只是另一个值（尽管是一个表示不存在的引用的特殊值），并且它可以用于检查缺失对象之外的其他目的。\n\n###\
  \ 枚举\n\n*枚举*（通常写作“enum”）是一种由固定数量的常量组成的数据类型。例如，如果你正在编写一个涉及导航的游戏，你可能需要一个枚举来定义四个基本方向，类似于清单\
  \ 3-11 所示。\n\n***清单 3-11**. 方向的枚举*\n\n`public enum Direction {`\n`    NORTH, EAST,\
  \ SOUTH, WEST;`\n`}`\n\n如清单 3-11 所示，枚举的声明包括 `enum` 关键字、枚举的名称以及构成枚举的值。这些值只是名称，本身没有类型。这样可行，是因为我们需要唯一的标识符，但不需要为每个标识符指定类型。\n\
  \n枚举的价值在于它们是类型安全的（这意味着它不会与其他类型混淆——过去枚举是用整数创建的，因此将枚举与整数混淆是一个真正的问题）。如果没有枚举，我们就必须用另一种方式设置常量——通常使用整数，如清单\
  \ 3-12 所示。\n\n***清单 3-12.** 定义方向的常量*\n\n`public static final int NORTH = 0;`\n`public\
  \ static final int EAST = 1;`\n`public static final int SOUTH = 2;`\n`public static\
  \ final int WEST = 3;`\n\n![images](img/square.jpg) **警告** 不要以这种方式编写常量集合。它们可以与 int\
  \ 值进行比较，而这几乎肯定是错误的做法。这就是 Java 有枚举的原因。枚举值 `Direction.NORTH` 不能被当作整数处理（即使是无意的），而常量\
  \ `NORTH` 却可以。此外，常量是静态和最终的（并且通常是公开的）。枚举消除了对这些修饰符的需求，这使我们在使用枚举时具有更大的灵活性。\n\n每个 `enum`\
  \ 实际上都是一个类。（你可能已经注意到它的声明语法与类相似。）所有 `enum` 对象都隐式地扩展了 `java.lang.Enum`。这使我们能够创建比常量列表更有意义的枚举。继续我们的例子，我们可以为每个方向设置角度，如清单\
  \ 3-13 所示。\n\n***清单 3-13**. 包含更多信息的枚举*\n\n`public enum Direction {`\n`  NORTH (0),`\n\
  `  EAST (90),`\n`  SOUTH (180),`\n`  WEST (270);`\n\n`  private final int degrees;`\n\
  `  Direction(int degrees) {`\n`    this.degrees = degrees;`\n`  }`\n\n`  public\
  \ int getDegrees() {`\n`    return degrees;`\n`  }`\n`}`\n\n由此，我们可以编写代码来获取与枚举中每个值相关的附加信息，如清单\
  \ 3-14 所示。\n\n***清单 3-14**. 从枚举中获取详细信息*\n\n`for (Direction d : Direction.values())\
  \ {`\n`  System.out.println(d + \" is \" + d.degrees + \"degrees.\");`\n`}`\n\n\
  我们还可以编写处理枚举值的方法。例如，我们可以编写一个方法，给定一个以度为单位的方向，告诉你哪个基本方向最接近。清单 3-15 展示了编写此类方法的一种方式。\n\
  \n***清单 3-15**. findCardinalDirection 方法*\n\n`public static Direction findCardinalDirection\
  \ (int degrees) {`\n`  if (degrees < 45) {`\n`    return NORTH;`\n`  } else if (degrees\
  \ < 135) {`\n`    return EAST;`\n`  } else if (degrees < 225) {`\n`    return SOUTH;`\n\
  `  } else if (degrees < 315) {`\n`    return WEST;`\n`  } else {`\n`    return NORTH;`\n\
  `  }`\n`}`\n\n你可能还注意到了遍历 for 循环的不同语法。这种语法并非枚举独有，但对枚举特别方便。我们将在后续章节讨论循环时介绍这些 `for`\
  \ 循环的替代用法。\n\n如你所见，枚举远比简单的常量列表强大得多。它也更为安全，因为没有人会将 `Direction.North` 与 `0` 混淆。\n\n\
  清单 3-16 展示了 `Direction` 枚举的完整代码。\n\n***清单 3-16**. 完整的枚举示例*\n\n`package com.bryantcs.examples.enumExample;`\n\
  \n\n\n`public enum Direction {`\n`  NORTH (0),`\n`  EAST (90),`\n`  SOUTH (180),`\n\
  `  WEST (270);`\n\n`  private final int degrees;`\n`  Direction(int degrees) {`\n\
  `    this.degrees = degrees;`\n`  }`\n\n`  public int getDegrees() {`\n`    return\
  \ degrees;`\n`  }`\n\n`  // 静态方法，因为它不依赖于特定的方向`\n`  public static Direction findCardinalDirection\
  \ (int degrees) {`\n`    if (degrees < 45) {`\n`      return NORTH;`\n`    } else\
  \ if (degrees < 135) {`\n`      return EAST;`\n`    } else if (degrees < 225) {`\n\
  `      return SOUTH;`\n`    } else if (degrees < 315) {`\n`      return WEST;`\n\
  `    } else {`\n`      return NORTH;`\n`    }`\n`  }`\n`}`\n\n现在我们已经完成了枚举的定义，需要一个测试程序来验证其工作方式。清单\
  \ 3-17 展示了一个完成此任务的程序类。\n\n***清单 3-17.** 枚举的测试类*\n\n`package com.bryantcs.examples.enumExample;`\n\
  \n`public class EnumExample {`\n\n`  public static void main(String[] args) {`\n\
  `    int[] compassPoints = {22, 77, 144, 288};`\n`    for (int i = 0; i < compassPoints.length;\
  \ i++) {`\n`      System.out.println(compassPoints[i] + \" 度（大致）对应 \"`\n`      \
  \  + Direction.findCardinalDirection(compassPoints[i]));`\n`    }`\n`    for (Direction\
  \ d : Direction.values()) {`\n`      System.out.println(d + \" 是 \" + d.getDegrees()\
  \ + \" 度。\");`\n`    }`\n`  }`\n`}`\n\n`EnumExample` 在控制台中生成的输出如清单 3-18 所示。\n\n\
  ***清单 3-18**. EnumExample 输出*\n\n`22 度（大致）对应 NORTH`\n`77 度（大致）对应 EAST`\n`144 度（大致）对应\
  \ SOUTH`\n`288 度（大致）对应 WEST`\n`NORTH 是 0 度。`\n`EAST 是 90 度。`\n`SOUTH 是 180 度。`\n\
  `WEST 是 270 度。`\n\n### 本章小结\n\n在本章中，我们学习了 Java 中各种可用数据类型的基础知识。我们了解到：\n\n*   各种数值数据类型的大小限制\n\
  *   `boolean` 数据类型的工作方式\n*   `char` 变量和 `String` 对象的工作方式，以及它们之间如何交互\n*   数组的工作方式\n\
  *   什么是 null 以及如何有效使用它\n*   如何创建和使用枚举\n\n在本书的其余部分，我们将反复使用所有这些概念和技术。随着我们更深入地使用 Java，你将大量使用基本类型、`String`\
  \ 对象、基本类型和 `String` 字面量以及数组。枚举在大多数代码中出现频率较低，但在需要时它们提供了重要的优势（最显著的是类型安全）。\n\n## 第\
  \ 4 章\n\n## 运算符\n\nJava 包含许多运算符，从普通的数学运算符（如减号 −）到仅适用于面向对象编程的运算符（如 `instanceof`）。首先，让我们看看表\
  \ 4-1 中的运算符列表。\n\n![images](img/t0401.jpg)\n\n![images](img/t0401a.jpg)\n\n####\
  \ 运算符优先级\n\n关于运算符，首先要了解的是它们具有优先级。我至今还记得初中代数课上史密斯先生教我们背诵“请原谅我亲爱的萨莉阿姨”这句话。这个奇怪的短语是代数中运算顺序（运算符优先级的另一种说法）的有效助记符。它缩写为\
  \ PEMDAS，代表括号、指数、乘法、除法、加法和减法。得益于运算符优先级（就我而言，还要感谢史密斯先生），在处理代数方程时，我们知道先解析括号，再解析指数，然后解析乘法，以此类推。\n\
  \n同样的情况也适用于 Java（以及许多其他编程语言）。然而，如前所述，Java 的运算符远不止六个。此外，Java 中有些运算符具有相同的优先级。在这种情况下，对于二元运算符（赋值运算符除外），优先级从左到右进行；对于赋值运算符，优先级从右到左进行。这听起来可能有点混乱，但我们很快就会通过一些示例来阐明运算顺序，并指出一些人们经常出错的问题点。\n\
  \n#### 缺失的运算符：括号\n\n括号不在 Java 运算符列表中，但它们充当了优先级最高的运算符。括号内的任何内容都会首先被解析。当一行中有多组括号时，它们会从最内层到最外层、从左到右依次解析。让我们看看清单\
  \ 4-1 中的一些示例。\n\n***清单 4-1.** 作为运算符的括号*\n\n`System.out.println(2 + 4 / 2); // 先处理除法，因此打印\
  \ 4`\n`System.out.println((2 + 4) / 2); // 先处理加法，因此打印 3`\n`System.out.println((2\
  \ + 4) / 3 * 2); // 打印 4，而不是 1 – 原因见下文`\n`System.out.println((2 + 4) / (3 * 2));\
  \ // 打印 1`\n`System.out.println((2 + 4) / (2 * 2)); // 打印 1 – 注意截断`\n`System.out.println((2.0\
  \ + 4.0) / (2.0 * 2.0)); // 打印 1.5`\n\n加粗的那一行打印 4，`因为`除法运算符在乘法运算符之前被处理。这是因为相同优先级的运算符从左到右处理。在代数中，乘法优先于除法。然而，Java\
  \ 不是代数，这有时会让记住代数的 Java 新手感到困惑。（我至少在这个差异上栽过一次跟头。）\n\n第五行打印 1，因为我们使用了整数字面量（如前一章所述）。因此，我们得到的是一个整数字面量。Java\
  \ 在处理整数时会截断（即丢弃）任何余数，所以 1.5 变成了 1。最后一行使用了浮点字面量，因此返回 1.5。值为 1.9 也会被截断为 1。截断不是一种四舍五入；截断后的值会移除小数点右侧的所有值。\n\
  \n作为一条规则，请记住使用括号来澄清你的代码，并确保运算的正确顺序。我首先提到清晰性是有原因的：清晰性大有裨益。如果你能通过将一行代码拆分成多行来使运算对其他开发者（以及日后重新查看代码的自己）更清晰，那么请这样做。如果你的同事能毫不费力地理解你的代码，他们会感谢你的。\n\
  \n#### 后缀运算符\n\n术语 *后缀* 在数学、语言学和其他领域有多种含义。在计算机科学中，它指的是跟在表达式后面的运算符。Java 的两个后缀运算符用于对值进行递增（加一）和递减（减一）。清单\
  \ 4-2 展示了一些示例：\n\n***清单 4-2.** 后缀运算符*\n\n`private int getC() {`\n`  int c = 0;`\n\
  `  c++; // c 现在为 1`\n`  c--; // c 现在为 0`\n`  return c++; // 返回 0`\n`}`\n\n那么为什么返回\
  \ 0 呢？因为后缀运算符首先返回原始值，然后将新值赋给变量。这个特定的语言细节让很多 Java 新手程序员感到困扰。要解决这个问题，可以在表达式之前使用一元\
  \ ++ 运算符（接下来会介绍），而不是在表达式之后使用后缀运算符，或者将 return 语句单独放在一行。顺便提一下，在表达式 `(c++)` 周围加上括号并不会让这个方法返回\
  \ 1，因为 `c` 在括号内已经被设置为 0。\n\n\n\n#### 一元运算符\n\n严格来说，*一元运算符*是只接受一个操作数的运算符。根据这一定义，后缀运算符也属于一元运算符。然而，Java\
  \ 将后缀运算符与其他一元运算符区分开来。正如我们之前所学，后缀运算符返回的是应用后缀运算之前的值。而一元运算符则返回应用运算符之后的值。表 4-2 简要描述了一元运算符（不包括后缀运算符）：\n\
  \n![images](img/t0402.jpg)\n\n让我们看一个使用每个一元运算符的代码示例（见清单 4-3）：\n\n***清单 4-3.** 一元运算符*\n\
  \n`byte a = 0;`\n`++a; // 一元前缀递增运算符 - 现在 a 的值为 1`\n`--a; // 一元前缀递减运算符 - 回到 0`\n\
  `byte b = +1; // 一元正号运算符（非必需）`\n`byte c = -1; // 一元负号运算符，用于创建负数`\n`System.out.println(~b);\
  \ // 按位取反运算符 - 输出 -2`\n`System.out.println(~c); // 按位取反运算符 - 输出 0`\n`boolean myCatScratchesTheCouch\
  \ = false;`\n`System.out.println(!myCatScratchesTheCouch); // 逻辑非运算符 - 输出 true`\n\
  \n##### 理解按位取反运算符\n\nJava（以及所有编程语言）将值存储在一个或多个字节中，每个字节由 32 位组成。当我们在此上下文中讨论字节时，指的是计算机用于内存的单位。这与\
  \ Java 的“Byte”数据类型不同（其最小值为 -128，最大值为 127）。JVM 将值 1 存储为以下二进制字符串：`00000000000000000000000000000001`（一个\
  \ 32 位二进制值，由 31 个 0 和 1 个 1 组成）。当你对其应用按位取反运算符时，JVM 会将所有 0 变为 1，所有 1 变为 0，得到 `11111111111111111111111111111110`，其计算结果为\
  \ -2。类似地，-1 的二进制形式是 `11111111111111111111111111111111`。由于全是 1，按位取反运算符将其变为全 0，因此其值为\
  \ 0。\n\n如果你认为这些都是毫无意义的琐碎知识，我不会责怪你，但按位取反运算符确实有实际用途。例如，在图形编程中，白色通常由所有位均为 1 来表示。应用按位取反运算符会将所有位设置为\
  \ 0，这通常表示黑色。同样的原理也适用于其他颜色（其各种位被设置为 0 或 1）。通过这种方式，图形程序可以快速创建图像的负片，而无需任何数学处理。\n\n\
  按位取反运算符在应用 `~` 运算符之前，会将 `byte`、`short` 和 `char` 变量的值提升为 32 位。在这些情况下，运算符的结果是一个 `int`。这就是二进制字符串有\
  \ 32 个字符的原因。这个过程称为*一元数值提升*。请考虑清单 4-4 中的以下代码：\n\n***清单 4-4**. 一元数值提升*\n\n`byte a\
  \ = 0;`\n`Byte b = new Byte(a); // 没问题`\n`Byte c = new Byte(~a); // 无法编译，因为 Byte\
  \ 构造函数不能接受 int`\n`int d = ~a; // 没问题`\n\n#### 类型转换\n\n软件开发人员经常发现需要将一种类型的变量转换为另一种类型。在\
  \ Java（以及大多数编程语言）中，你不能更改变量的类型。相反，你应该创建一个新变量，并将现有变量转换为新变量的类型。这个过程称为*类型转换*，Java 提供了一种类似运算符的机制来实现它。我说“类似”，是因为类型转换运算符根据你要转换的目标数据类型而有所不同。具体来说，将目标类型的名称用括号括起来，并将该运算符放在要转换的值之前。当我们从一种数据类型转换为另一种数据类型时，类型转换通常是必要的，以防止编译器抛出错误。一如既往，示例有助于澄清问题（见清单\
  \ 4-5）。\n\n***清单 4-5.** 类型转换*\n\n`// 将 byte 转换为 int`\n`byte b = 123;`\n`int bInt\
  \ = b; // 无需类型转换`\n\n`// 将 int 转换为 short`\n`int i = 123;`\n`short s = (short) i;\
  \ // (short) 是类型转换运算符 – 注意值可能过大`\n\n`// 将 float 转换为 int`\n`float f = 12.34f;`\n\
  `int floatInt = (int) f; // floatInt = 12 – 原始值被截断`\n\n`// 将 char 转换为 String – 哎呀`\n\
  `char c = 'c'; // 不能直接将 char 转换为 string`\n`Character cChar = new Character(c); //\
  \ 因此为我们的 char 获取一个 Character 包装对象`\n`String s = cChar.toString(); // 并从包装对象获取 String\
  \ 对象`\n\n在之前展示的第一个示例中，将 `byte` 转换为 `int` 不需要类型转换运算符。由于不存在数据丢失的可能性（`int` 可以容纳 `byte`\
  \ 能容纳的任何值），JVM 执行了有时称为“隐式向上转换”的操作——隐式是因为你无需添加任何语法即可实现，向上转换是因为你在值范围和位数上都从较小类型转到了较大类型。这也称为*拓宽转换*。\n\
  \n在第二个示例中，将 `int` 转换为 `short`，我们必须有一个类型转换运算符，以告诉编译器我们确实打算这样做。这是必要的，因为从位数较多的类型（本例中为\
  \ 32 位）转换为位数较少的类型（本例中为 16 位）时，可能会发生数据丢失。假设 `i` 等于 65537。那么 `s` 将等于 1。这是因为 `short`\
  \ 的最大值是 65536。JVM 将原始值除以你要转换到的变量的最大值，并返回余数。可以想象，这可能会造成严重破坏且难以追踪。作为规则，不要使用缩窄转换（将位数较多的数据类型的值放入位数较少的数据类型中）。拓宽转换（将位数较少的数据类型的值放入位数较多的数据类型中）不是问题（尽管除非有理由，否则不要这样做），但缩窄转换是危险的。\n\
  \n第三个示例展示了类型转换中涉及的另一个危险：精度丢失。如果你将 `float` 或 `double` 转换为整数类型（任何没有浮点部分的数值类型），JVM\
  \ 会截断（即移除）尾数。因此 12.34 变为 12。即使原始值是 12.999，它也会被截断为 12。换句话说，它不会四舍五入；它直接移除。类似地，从 `double`\
  \ 转换为 `float` 可能会丢失精度，因为 `double` 的位数比 `float` 多，因此可以具有更高的精度。再次强调，缩窄转换是有风险的。难以发现的错误可能源于缩窄转换。除非必须，否则不要这样做，并且添加一些防御性代码（我们稍后会讲到）是个好主意。\n\
  \n![images](img/square.jpg) **警告** 拓宽转换没问题；然而，缩窄转换是危险的。请采取措施确保你的缩窄转换不会接收到导致问题的值。\n\
  \n\n\n第四个示例并非类型转换，但它展示了如何从基本类型（本例中的`char`）转换为`String`。同样的模式适用于所有基本类型：首先获取基本类型的包装类，然后使用包装类的`toString`方法。\n\
  \n我提到过在窄化转换中使用防御性编码。当你无法确定提供的值不会引发问题时，防御性编码始终是个好主意。事实上，在某些类型的应用程序中（分布式应用就是一个典型例子），验证方法的所有参数（即确保参数值可用）是标准做法。清单\
  \ 4-6 展示了从`int`到`byte`窄化转换的防御性编码示例：\n\n***清单 4-6.** 窄化转换的防御性编码*\n\n`private static\
  \ byte intToByte(int i) {`\n`  if (i > Byte.MAX_VALUE || i < Byte.MIN_VALUE) {`\n\
  `    throw new IllegalArgumentException(\"integer argument \" +`\n`        \"is\
  \ too large or too small to cast to a byte\");`\n`  }`\n`  return (byte) i;`\n`}`\n\
  \n然后，调用`intToByte`的代码可以决定如何处理该问题。将验证逻辑移至独立方法是个好主意，这既能封装每段验证逻辑，又能允许多个方法复用同一段验证逻辑。许多系统都拥有验证类（有时还有验证包），提供大量此类方法，以便其他类中的方法能够使用一致的验证逻辑。随着你学习使用面向对象语言（包括\
  \ Java），你会逐渐习惯这种设计。\n\n#### 乘法运算符\n\nJava 有三种乘法运算符：乘法（*）、除法（/）和取模（%）（取模运算符常被称为 mod\
  \ 或 modulo；在 Java 开发团队中，当有人朗读代码时，你会听到诸如“a mod b”这样的表达）。\n\n正如我之前在讨论括号时提到的，这三个运算符之间没有隐式的运算顺序。对于\
  \ JVM 而言，它们具有相同的优先级。正因如此，JVM 会从左到右处理它们。再次强调，Java 不是代数，尽管某些运算符和概念在两者中都存在。\n\n乘法和除法足够直观，但让我们来看看取模运算符。一如既往，示例大有帮助（见清单\
  \ 4-7）。\n\n***清单 4-7.** 取模运算符示例*\n\n`int a = 9;`\n`int b = 2;`\n`int c = a % b;\
  \ // c 等于 1`\n`float f = 1.9f;`\n`float g = 0.4f;`\n`float h = f % g; // h 等于 0.3\
  \ – 但要注意舍入问题`\n\n如这个简短清单所示，取模运算符将第一个操作数除以第二个操作数，并返回余数。\n\n![images](img/square.jpg)\
  \ **警告** 在`float`和`double`类型上使用取模运算符时，请注意舍入问题。我将其四舍五入为 0.3，但当我用 Eclipse 运行这段代码时，我的\
  \ JVM 实际上将 0.29999995 赋值给了`h`。如果你是在视频游戏中绘制虚拟角色的位置，这可能无关紧要（因为屏幕像素数量相当少，所以误差不足以让角色出现在错误位置）。然而，想象一下在控制火箭飞往火星的代码中出现同样的误差。那么，这个误差就足以确保你的火箭无法到达正确位置进入轨道，而这确实是一个代价高昂的误差。在许多应用中，舍入问题往往很棘手。\n\
  \n#### 加法运算符\n\n你可能认为我对加号（+）和减号（−）没什么可说的。然而，即使在 Java 应用中使用它们时，也存在值得注意的细微之处。与乘法运算符一样，加法运算符的优先级相同，因此它们会从左到右处理，即使减号在一行中出现在加号之前也是如此。这通常无关紧要。然而，当它确实重要时，这可能是一个难以发现的问题。\n\
  \n此外，加号也是字符串连接运算符。正如我们在各种示例中看到的，`someString + someOtherString = aThirdString`。严格来说，加法运算符和字符串连接运算符是不同的运算符。然而，它们使用相同的字符。JVM\
  \ 通过上下文来判断加号是作为加法运算符还是字符串连接运算符。如果 JVM 确定上下文是数值型的，则执行加法运算。如果 JVM 确定上下文是文本型的，则执行连接运算。清单\
  \ 4-8 演示了 JVM 遇到不同上下文时发生的情况：\n\n***清单 4-8.** ShiftDemo 上下文切换示例*\n\n`int a = 1;`\n\
  `int b = 2;`\n`int c = 3;`\n`System.out.println(a + b + c);`\n`System.out.println(\"\
  a + b + c = \" + a + b + c);`\n`System.out.println(\"a + b + c = \" + (a + b + c));`\n\
  \n在程序中运行时，该代码会产生以下输出（见清单 4-9）：\n\n***清单 4-9.** 上下文切换示例输出*\n\n`6`\n`a + b + c = 123`\n\
  `a + b + c = 6`\n\n第一行的上下文是数值型的，因为`println`方法处理的第一个值是数值型的。第二行的上下文是文本型的，因为`println`方法处理的第一个值是一个字符串字面量。第三行得到了正确的值，因为括号强制先进行加法运算，即使上下文是文本型的。\n\
  \n\n\n#### 移位运算符\n\n移位运算符让我们回到对位（bit）的操作。移位运算符需要两个操作数：要移位的整数值（不允许浮点值）以及构成该值的位要移动的位数。有符号左移运算符（<<）将位向左移动。有符号右移运算符（>>）将位向右移动。无符号右移运算符（>>>）将位向右移动，并用零填充左侧空出的位。\n\
  \n![images](img/square.jpg) **注意** 移位运算符仅适用于整数值。\n\n代码清单 4-10 演示了移位运算符对 `int` 类型变量值的影响。\n\
  \n***代码清单 4-10.** ShiftDemo*\n\n`package com.apress.javaforabsolutebeginners .examples.shiftDemo;`\n\
  \n`public class ShiftDemo {`\n\n`  public static void main(String[] args) throws\
  \ Exception {`\n`    int b = 127;`\n`    System.out.println(\"b: \" + b);`\n`    System.out.println(\"\
  b as binary: \" + Integer.toBinaryString(b));`\n`    String leftShiftString = Integer.toBinaryString(b<<3);`\n\
  `    System.out.println(\"binary after signed left shifting 3 places: \" +`\n`      leftShiftString);`\n\
  `    System.out.println(\"value of b after signed shifting left 3 places: \" +`\n\
  `      Integer.parseInt(leftShiftString, 2));`\n`    String rightShiftString = Integer.toBinaryString(b>>3);`\n\
  `    System.out.println(\"binary after signed shifting right 3 places: \" +`\n`      rightShiftString);`\n\
  `    System.out.println(\"value of b after signed shifting right 3 places: \" +`\n\
  `      Integer.parseInt(rightShiftString, 2));`\n`    String unsignedRightShiftString\
  \ = Integer.toBinaryString(b>>>3);`\n`    System.out.println(\"binary after unsigned\
  \ shifting right 3 places: \" +`\n`      unsignedRightShiftString);`\n`    System.out.println(\"\
  value of b after unsigned shifting right 3 places: \" +`\n`      Integer.parseInt(unsignedRightShiftString,\
  \ 2));`\n`    b = -128;`\n`    System.out.println(\"Resetting b to \" + b);`\n`    System.out.println(\"\
  b as binary: \" + Integer.toBinaryString(b));`\n`    unsignedRightShiftString =\
  \ Integer.toBinaryString(b>>>3);`\n`    System.out.println(\"binary after unsigned\
  \ shifting right 3 places: \" + unsignedRightShiftString);`\n`    System.out.println(\"\
  value of b after unsigned shifting right 3 places: \" +`\n`      Integer.parseInt(unsignedRightShiftString,\
  \ 2));`\n`  }`\n`}`\n\n运行 `ShiftDemo` 会产生以下输出（参见代码清单 4-11）：\n\n***代码清单 4-11.** ShiftDemo\
  \ 输出*\n\n`b: 127`\n`b as binary: 1111111`\n`binary after signed left shifting 3\
  \ places: 1111111000`\n`value of b after signed shifting left 3 places: 1016`\n\
  `binary after signed shifting right 3 places: 1111`\n`value of b after signed shifting\
  \ right 3 places: 15`\n`binary after unsigned shifting right 3 places: 1111`\n`value\
  \ of b after unsigned shifting right 3 places: 15`\n`Resetting b to -128`\n`b as\
  \ binary: 11111111111111111111111110000000`\n`binary after unsigned shifting right\
  \ 3 places: 11111111111111111111111110000`\n`value of b after unsigned shifting\
  \ right 3 places: 536870896`\n\n`ShiftDemo` 及其输出揭示了关于移位运算符的一些值得了解的知识点：\n\n*   左侧操作数表示要移位的值，右侧操作数表示要移动的位数（称为移位距离）。\n\
  *   对 `byte`、`char` 或 `short` 类型的值使用移位运算符会将这些值提升为 `int` 类型。一元数值提升再次发挥作用。之所以称为一元，是因为在执行操作之前，两个操作数会分别被提升。因此，一个\
  \ `byte` 值被另一个 `byte` 值移位，会导致在移位操作发生之前进行两次独立的一元提升。有时这无关紧要。其他时候，在将移位结果赋值给另一个变量时，你可能需要考虑这种提升。\n\
  *   有符号移位会导致负值出现问题。在 `ShiftDemo` 示例中，我没有对负值使用有符号移位运算符（<< 和 >>），因为这样做会产生异常。这是因为 Java\
  \ 存储负数的方式所致；移动构成负数的位会产生一个 Java 无法识别为任何数字的二进制字符串。\n*   `Integer.toBinaryString` 显示的是可能的最少位数。在\
  \ `ShiftDemo` 结果显示的许多值中，内部表示是 32 位长，显示值左侧的所有位都是 0（也就是说，这些值是用 0 填充的）。这就是为什么无符号右移运算符的二进制字符串是\
  \ 32 位长的原因。\n*   当用于一个相对较小的负数时，无符号移位运算符可能会产生一个很大的正数。这是因为操作的结果是一个 JVM 可以识别为数字的二进制数字字符串。然而，这个很大的数字可能并非你所期望的。这就引出了我们的最后一点：\n\
  *   移位操作很棘手。使用移位运算符时，请务必非常仔细地进行测试。\n\n那么为什么要使用移位运算符呢？因为它们是最快的运算符。计算机能执行的最简单、最快的操作就是移位二进制值。如果你能确保移位能产生你想要的值，或者你恰好处理的值并非真正的数值，而是一系列开关（例如图形设置），那么移位运算符可以提供高效的方式来操作这些值或开关。我们将在本章后面介绍按位运算符时，讨论将值用作一系列开关的概念。\n\
  \n\n\n#### 关系运算符\n\n关系运算符用于比较事物。具体来说，它们判断一个值是否大于、小于、等于或不等于另一个值。要使关系运算符正常工作，被比较的项必须具有可比性。这听起来显而易见，但在\
  \ Java 中具有特定含义。语言规范定义了基本类型之间可比性的含义。因此，你可以比较一个 `int` 和一个 `float` 并得到有意义的结果（JVM 会将\
  \ `int` 提升为 `float`，然后进行比较）。只要其中一个可以强制转换为另一个值，Java 就能有意义地比较基本类型，而当它们无法转换时，Eclipse\
  \ 会给出提示。\n\n`>`（大于）、`<`（小于）、`>=`（大于或等于）和 `<=`（小于或等于）都适用于基本类型，但不适用于对象。相反，`instanceof`\
  \ 适用于对象，但不适用于基本类型。Java 确实提供了比较对象的方法，但不是通过任何运算符。我们将在本章后面讨论对象的比较。\n\n代码清单 4-12 演示了基本类型的比较。\n\
  \n***代码清单 4-12.** 比较基本类型*\n\n`int a = 0;`\n`float b = 1.0f;`\n`System.out.println(a\
  \ > b);`\n\n这段代码会在控制台输出 \"false\"。\n\n`instanceof` 运算符可能有点棘手，因为一个继承自另一个类的类也是其父类的一个实例。考虑下面这个由三个类实现的小程序（见代码清单\
  \ 4-13）。\n\n***代码清单 4-13.** instanceof 测试*\n\n`package com.apress.javaforabsolutebeginners\
  \ .examples.instanceofTest;`\n\n`public class Person {`\n`  String firstName;`\n\
  `  String lastName;`\n\n`  public Person (String firstName, String lastName) {`\n\
  `    this.firstName = firstName;`\n`    this.lastName = lastName;`\n`  }`\n`}`\n\
  \n`package com.apress.javaforabsolutebeginners .examples.instanceofTest;`\n\n`public\
  \ class Student extends Person {`\n`  String schoolName;`\n\n`  public Student (String\
  \ firstName, String lastName, String schoolName) {`\n`    super(firstName, lastName);`\n\
  `    this.schoolName = schoolName;`\n`  }`\n`}`\n\n`package com.apress.javaforabsolutebeginners\
  \ .examples.instanceofTest;`\n\n`public class InstanceofTest {`\n\n`  public static\
  \ void main(String[] args) {`\n`    Student student = new Student(\"Sam\", \"Spade\"\
  , \"Noir U\");`\n`    System.out.println(student instanceof Student);`\n`    System.out.println(student\
  \ instanceof Person);`\n`  }`\n\n`}`\n\n两个打印语句都会在控制台输出 \"true\"。毕竟，学生也是人。面向对象编程的本质（一个类总是继承另一个类）要求\
  \ `instanceof` 运算符以这种方式工作。\n\n`instanceof` 运算符可能会引起一些微妙的问题。特别是，如果其右操作数为 `null`，`instanceof`\
  \ 运算符不会抛出错误。相反，在这种情况下它总是返回 `false`。如果你使用了类似 `myClass instanceof myBaseClass` 的表达式，并且无意中将\
  \ `myBaseClass` 设置为 `null`，结果将是 `false`。你可能会因此认为 `myClass` 不是 `myBaseClass` 的实例，但如果你是在与\
  \ `null` 进行比较，你实际上无法确定这一点。这是实践防御性编程的另一个好地方，确保你不会在此处得到 `null`。\n\n如果你小心地确保自己了解所用类之间的关系（这是成为优秀面向对象程序员的一部分），并确保没有与\
  \ `null` 进行比较，那么你就不太会在使用 `instanceof` 运算符时遇到麻烦。\n\n#### 相等运算符\n\nJava 有两个相等运算符：`==`（等于）和\
  \ `!=`（不等于）。（在此上下文及其他上下文中，感叹号有时被软件开发人员称为 \"bang\"）。相等运算符（`==`）和不等运算符（`!=`）的工作方式相同（彼此互为否定），因此我将把讨论范围限定在相等运算符上。\n\
  \nJava 使用单个等号作为基本的赋值运算符（我们将在本章后面讨论赋值运算符），因此它不能使用单个等号进行比较。因此，Java（以及其他共享 Java 基本语法的语言）使用两个等号。\n\
  \nJava 新手（以及那些打字不够仔细的老手）常犯的一个错误是，在应该使用两个等号（相等运算符）时使用了单个等号（赋值运算符），从而意外地将一个值赋给变量，而不是将变量的值与其它值进行比较。考虑代码清单\
  \ 4-14 中的示例：\n\n***代码清单 4-14.** 意外赋值*\n\n`for (int counter = 0; counter < 10; counter++)\
  \ {`\n`  if (counter = 0) { // 应该是 == 而不是 =`\n`    // 执行某些操作`\n`  }`\n`}`\n\n这段代码如果不修正，会导致无限循环。在每次迭代中，`counter`\
  \ 都被设置为 0，因此它的值始终小于 10。幸运的是，Eclipse 和其他现代开发工具会在你这样做时发出警告。你仍然可以这样做，但至少你是故意为之（不过，如果你需要重置某个值，你真的应该重构你的代码）。我必须承认，我遇到过不止一次这种情况（因为打字不熟练），不过自从我开始使用\
  \ Eclipse 以来，就再也没遇到过，这要归功于它的警告。这也是我在本书开头就让你安装 Eclipse 的原因之一。\n\n对于基本类型，相等运算符的工作方式与你想象的完全一致。然而，对于对象，相等运算符指示两个引用是否指向同一个实例。一如既往，示例有助于理解（见代码清单\
  \ 4-15）。\n\n***代码清单 4-15.** 相等运算符示例*\n\n`int a = 0;`\n`int b = 1;`\n`String s =\
  \ \"s\";`\n`String sToo = \"s\";`\n`System.out.println(a == b);`\n`System.out.println(s\
  \ == sToo);`\n\n这段代码对于 `a == b` 输出 \"true\"，对于 `s == sToo` 输出 \"false\"。这是因为 `s`\
  \ 和 `sToo` 是指向 `String` 对象不同实例的引用。因此，即使它们具有相同的值，在相等运算符看来它们也不相等。此外，`s == \"s\"` 输出\
  \ false，因为字符串字面量产生了 `String` 类的另一个实例。\n\n为了比较对象（包括 `String` 类的实例），Java 程序员使用 `equals`\
  \ 方法。任何其实例可以相互比较的对象都应该实现 `equals` 方法（该方法定义在 `Object` 类中）。因为比较 `String` 对象是有意义的，所以\
  \ `String` 类实现了 `equals` 方法。这样，我们就可以使用类似于代码清单 4-16 的代码来比较 `String` 的实例。\n\n***代码清单\
  \ 4-16.** 测试对象的相等性*\n\n`String s = \"s\";`\n`String sToo = \"s\";`\n`System.out.println(s.equals(sToo));`\n\
  `System.out.println(s.equals(\"s\"));`\n\n这两个打印语句都会在控制台输出 \"true\"。我们将在本章后面更深入地讨论对象的比较。\n\
  \n#### 按位与运算符 (&)\n\n按位与运算符 (`&`) 比较两个二进制值，并将两个被比较值中对应位都为 1 的位设置为 1。像往常一样，示例有助于理解（见代码清单\
  \ 4-17）。\n\n***代码清单 4-17.** 按位与运算符 (&)*\n\n`Byte byte1 = Byte.parseByte(\"01010101\"\
  , 2); // byte1 = 85`\n`Byte byte2 = Byte.parseByte(\"00111111\", 2); // byte2 =\
  \ 63`\n`int result = byte1 & byte2; // result = 21`\n\n`result` 的值是 21，因为取两个被比较值中对应位都为\
  \ 1 的位，得到的二进制结果是 `00010101`，这恰好是 21 的二进制表示。\n\n\n\n#### 按位异或运算符 (^)\n\n按位异或运算符（通常缩写为\
  \ XOR）(^) 会比较两个二进制值，如果对应位不同，则将该位设置为 1。同样，通过示例来解释这类概念最为合适（参见清单 4-18）。\n\n***清单 4-18.**\
  \ 按位异或运算符 (^)*\n\n`Byte byte1 = Byte.parseByte(\"01010101\", 2); // byte1 = 85`\n\
  `Byte byte2 = Byte.parseByte(\"00111111\", 2); // byte2 = 63`\n`int result = byte1\
  \ ^ byte2; // result = 106`\n\n结果值为 106，因为取两个比较值中任一为 1 的位，得到的二进制结果为 `01101010`，恰好是\
  \ 106 的二进制表示。\n\n#### 按位或运算符 (|)\n\n按位或运算符 (|) 会比较两个二进制值，如果任一对应位为 1，则将该位设置为 1。同样，通过示例来解释这类概念最为合适（参见清单\
  \ 4-19）。\n\n***清单 4-19.** 按位或运算符 (|)*\n\n`Byte byte1 = Byte.parseByte(\"01010101\"\
  , 2); // byte1 = 85`\n`Byte byte2 = Byte.parseByte(\"00111111\", 2); // byte2 =\
  \ 63`\n`int result = byte1 | byte2; // result = 127`\n\n结果值为 127，因为取两个比较值中任一为 1\
  \ 的位，得到的二进制结果为 `01101010`，恰好是 127 的二进制表示。\n\n你可能会问，什么时候会用到这些位运算符。实际上，它们有许多有用的应用。游戏开发者经常使用位运算进行高速图形处理。再想象一个游戏，其中两个对象以某种方式合并（例如，用红色子弹射击蓝色物体，使其变成紫色）。按位与运算符\
  \ (`&`) 提供了一种高速确定新颜色的方法。位运算符也常用于检测鼠标按钮的组合按下情况，或者检测鼠标移动时某个按钮是否被按住（从而产生拖拽操作）。因此，它们可能看起来像是古怪的运算符，但确实有其用途。\n\
  \n#### 逻辑与运算符 (&&)\n\n逻辑与运算符 (`&&`) 在两个参数都为真时返回 `true`，只要其中一个为假则返回 false。它最常用于 if\
  \ 语句中，但在任何需要确保两个布尔值都为真的场景下都很方便。此外，逻辑与运算符是最常用的运算符之一。如果我们每次输入 `&&` 都能得到五分钱就好了……\n\n\
  清单 4-20 是一个示例。\n\n***清单 4-20.** 逻辑与运算符 (&&)*\n\n`if (2 > 1 && 1 > 0) {`\n`  System.out.println(\"\
  Numbers work as expected\");`\n`}`\n\n在这段代码片段中，我们使用了三个运算符。由于运算符优先级，两个比较运算符 (`>`)\
  \ 会在逻辑与运算符 (`&&`) 之前被求值，因此我们不需要括号来确保正确执行（不过，根据你的编码风格，为了清晰起见，你可能还是想加上括号）。\n\n此外，你可以链式使用多个逻辑与运算符（以及大多数其他运算符），如清单\
  \ 4-21 所示。\n\n***清单 4-21.** 链式逻辑与运算符*\n\n`if (3 > 2 && 2 > 1 && 1 > 0) {`\n`  System.out.println(\"\
  Numbers work as expected\");`\n`}`\n\n中间比较 (2 > 1) 的结果同时作为两个逻辑与运算符的操作数。这种链式操作在所有编程问题中都很常见，无论使用何种语言。幸运的是，Java\
  \ 让这一切变得简单。\n\n#### 逻辑或运算符 (||)\n\n逻辑或运算符 (`||`) 在其任一参数为真时返回 true，仅当两个参数都为假时才返回\
  \ false。除此之外，它的工作方式与逻辑与运算符类似。\n\n清单 4-22 是一个示例。\n\n***清单 4-22.** 逻辑或运算符 (||)*\n\n\
  `if (2 > 1 || 1 < 0) {`\n`  System.out.println(\"Numbers work as expected\");`\n\
  `}`\n\n与逻辑与运算符一样，你可以链式使用多个逻辑或运算符，如清单 4-23 所示。\n\n***清单 4-23.** 链式逻辑或运算符*\n\n`if\
  \ (3 > 2 || 2 < 1 || 1 < 0) {`\n`  System.out.println(\"Numbers work as expected\"\
  );`\n`}`\n\n![images](img/square.jpg) **注意** 当我们运行这段代码时，Eclipse 会警告我们在比较中存在死代码。因为\
  \ 2 总是大于 1，JVM 不会尝试比较 1 和 0，所以 Eclipse 告诉我们，可以移除那个比较。当然，现实世界中的示例会检查以确保数据流不为 null\
  \ 且至少包含一些内容。清单 4-24 包含了这样的代码。\n\n***清单 4-24.** 逻辑或运算符的更实际用法*\n\n`if (dataStream\
  \ == null || dataStream.length == 0) {`\n`  log.error(\"No data available!\");`\n\
  `}`\n\n同样，相等运算符具有更高的优先级，所以我们不需要额外的括号。\n\n#### 赋值运算符\n\n赋值运算符用于设置值并分配对象引用。基本赋值运算符\
  \ (`=`) 是迄今为止最常用的运算符。每当我们像 `int = 0`（为基本类型赋值）或 `Date now = new Date()`（为变量分配对象引用）这样写示例时，我们都在使用基本赋值运算符。\n\
  \nJava 提供了许多复合赋值运算符（通常称为快捷运算符）。清单 4-25 是其中一个复合赋值运算符的示例。\n\n***清单 4-25.** 复合赋值运算符*\n\
  \n`int myInt = 2;`\n`myInt *= 2; // 等价于 myInt = myInt * 2;`\n`System.out.println(myInt);\
  \ // 输出 4;`\n\n每个复合运算符都会先应用复合运算符中的第一个运算符以及复合运算符后面的值，然后再应用赋值运算符。在前面的示例中，乘法运算符应用于\
  \ `myInt` 和复合运算符后面的值（在本例中，将 `myInt` 的值加倍），然后将 `myInt` 设置为结果。\n\n复合赋值运算符可能会导致意想不到的结果。考虑清单\
  \ 4-26 中的以下代码片段。在阅读该片段后面的内容之前，先问问自己：“最后 `myInt` 的值是多少？”\n\n***清单 4-26.** 复合赋值问题*\n\
  \n`int myInt = 2;`\n`myInt *= (myInt = 4);`\n`System.out.println(myInt);`\n\n在打印语句之前的最后一次赋值是\
  \ `myInt = 4`，所以你可能会认为答案一定是 4。但是我们将 `myInt` 设置为 4，然后将其与自身相乘，所以你可能会认为答案一定是 16。事实上，两者都不正确。该代码片段输出\
  \ 8。起初可能看起来很奇怪，但一旦你理解了 JVM 如何处理复合运算符，这就说得通了。当 JVM 遇到复合运算符时，它知道 myInt 等于 2。在整个运算符被解析之前，`myInt`\
  \ 的值不能被改变。（顺便说一下，这是我们知道的唯一一个括号不优先处理的情况。）因此，该行内的赋值被忽略，但赋值中的值被使用。最终，结果是 2 乘以 4，即 8。\n\
  \n![images](img/square.jpg) **注意** 这个问题基本上只是学术上的好奇心。这是 Java 语言开发者必须考虑的一个问题，但聪明的程序员不会编写这样的代码。聪明的程序员会分解他们的操作，使得每一行的效果清晰明了，无需过多解读。请记住，如果你以编程为生，其他程序员必须阅读并理解你的代码，很少有开发团队能容忍这种令人困惑且难以理解的代码。\n\
  \n表 4.3 显示了所有赋值运算符，包括复合运算符。\n\n![images](img/t0403.jpg)\n\n\n\n### 比较与排序对象\n\n如前所述，比较对象与比较基本类型有所不同。比较运算符适用于基本类型，但不适用于对象。相反，Java\
  \ 需要使用多种不同的接口和方法来比较对象。\n\n#### 实现 `equals` 方法\n\n第一个比较是判断一个对象是否等于另一个对象。正如我们之前所见，相等与不等运算符仅能判断两个对象是否使用相同的对象引用（即内存中的同一位置）。因此，两个拥有各自内存地址的不同对象永远不会相等。以下类可能有助于说明这个问题（参见清单\
  \ 4-27）。\n\n***清单 4-27.** 对对象使用相等运算符*\n\n`package com.apress.javaforabsolutebeginners\
  \ .examples.comparing;`\n\n`public class CompareTest {`\n\n`  public static void\
  \ main(String[] args) {`\n`    Object a = new Object();`\n`    Object b = new Object();`\n\
  `    Object c = b;`\n`    System.out.println(a == b);`\n`    System.out.println(b\
  \ == c);`\n`  }`\n\n`}`\n\n这段代码对第一个比较输出“false”，对第二个比较输出“true”。本质上，我们创建了一个对象，却给它起了两个名字（`b`\
  \ 和 `c`），因此第二个比较的结果为“true”。`new` 关键字在此处提供了重要线索。对于 `c`，我们并没有创建新对象，只是创建了另一个指向现有对象的引用。要判断两个对象是否相等，我们必须比较实现了\
  \ `equals` 方法的对象。让我们回到 `Person` 类，并为其扩展一个 `equals` 方法（参见清单 4-28）。\n\n***清单 4-28.**\
  \ 包含 equals 方法的 Person 类*\n\n`package com.apress.javaforabsolutebeginners .examples.comparing;`\n\
  \n`public class Person {`\n`  String firstName;`\n`  String lastName;`\n\n`  public\
  \ Person (String firstName, String lastName) {`\n`    this.firstName = firstName;`\n\
  `    this.lastName = lastName;`\n`  }`\n\n`  public boolean equals(Person p) {`\n\
  `    if (p == null) {`\n`      return false;`\n`    }`\n`    if (p == this) {`\n\
  `      return true;`\n`    }`\n`    if (!(p instanceof Person)) {`\n`      return\
  \ false;`\n`    }`\n`    if (p.lastName.equals(this.lastName)`\n`        && p.firstName.equals(this.firstName))\
  \ {`\n`      return true;`\n`    } else {`\n`      return false;`\n`    }`\n`  }`\n\
  \n`  public int hashCode() {`\n`    int result = 17;`\n`    result *= firstName.hashCode()\
  \ * 37;`\n`    result *= lastName.hashCode() * 37;`\n`    return result;`\n`  }`\n\
  `}`\n\n让我们仔细看看这个 `equals` 方法。我遵循了一个标准的实现步骤。（Java 社区对许多事情都有最佳实践，我们会在遇到时向你展示，就像这里一样。）首先，我检查是否为\
  \ null，以确保我们确实有一个对象。然后，我检查它是否是同一个对象，如果是，则它们肯定相等。接着，我们检查如果确实有一个对象，它是否是 `Person` 对象。如果不是，则比较结果始终为\
  \ false。但请记住，其他类可能会扩展我们的 `Person` 类，因此一个 `Student` 对象可能与我们的 `Person` 对象相等。因为 `Student`\
  \ 扩展了 `Person`，所以这个 `equals` 方法对两者都适用。然而，`Student` 可能会实现自己的 `equals` 方法来考虑每个学生就读的学校。最后，我检查类中所有相关的字段。如果它们都相等，那么这一定是同一个人。当然，现实世界中的\
  \ `Person` 类可能包含中间名、地址字段、社会安全号码，甚至祖先和后代。不过，为了演示，两个字段就足够了。现在，让我们重写 `CompareTest`\
  \ 来使用我们新的 `Person` 对象（参见清单 4-29）。\n\n***清单 4-29.** 检查人员对象的相等性*\n\n`package com.apress.javaforabsolutebeginners\
  \ .examples.comparing;`\n\n`public class CompareTest {`\n\n`  public static void\
  \ main(String[] args) {`\n`    Person samSpade = new Person(\"Sam\", \"Spade\");`\n\
  `    Person greatNoirDetective = new Person(\"Sam\", \"Spade\");`\n`    System.out.println(samSpade\
  \ == greatNoirDetective);`\n`    System.out.println(samSpade.equals(greatNoirDetective));`\n\
  `  }`\n\n`}`\n\n现在，`CompareTest` 会先输出“false”，然后输出“true”，尽管 `samSpade` 和 `greatNoirDetective`\
  \ 是指向不同 `Person` 对象的不同引用。这是因为我们的 `equals` 方法比较的不是引用，而是两个对象的相关字段。\n\n`hashCode` 和\
  \ `equals` 方法密切相关，因为它们基于相同的前提。它们将一组值相加，以创建一个可用于比较的值（对于 `equals` 方法是相等比较，对于 `hashCode`\
  \ 方法则是相等、大于和小于比较）。\n\n![images](img/square.jpg) **注意** 当你实现 `equals` 方法时，也必须实现 `hashCode`\
  \ 方法。`hashCode` 方法决定了当对象引用被放入使用哈希算法的集合（如 `HashMap` 和 `HashTable` 类）时，该引用应被放置的位置。我们将在本书后面讨论数据结构时，再详细介绍这两个集合（以及其他集合）。`hashCode`\
  \ 方法的目标是返回一个唯一（或至少接近唯一）的标识符；这就是为什么它从一个质数开始，并乘以另一个质数。同样，我们会在后面更详细地讨论这一点。\n\n![images](img/square.jpg)\
  \ **警告** 当你同时实现 `equals` 和 `hashCode` 时（如果你实现了其中一个，就应该同时实现另一个），必须确保它们使用相同的字段。例如，如果你在\
  \ `equals` 方法中使用了 `firstName` 和 `lastName`，那么在 `hashCode` 方法中也必须使用 `firstName` 和\
  \ `lastName`。否则，你的比较会失败。更糟糕的是，你不会得到异常；你会得到错误的行为和一个难以发现的 bug。\n\n![images](img/square.jpg)\
  \ **警告** `hashCode` 方法必须为相等的对象生成相等的值。否则，本应成功的比较会失败，你就会遇到另一个难以发现的 bug。\n\n#### 用于排序的比较\n\
  \n我将排序包含在本主题中，因为不进行比较就无法对事物进行排序。假设你想把一堆五颜六色的石头按光谱排序。为此，你拿起每块石头，与其他石头进行比较，然后利用这些信息来决定每块石头在石头序列中的位置。对大多数人来说，排序几乎不需要训练就能轻松掌握。然而，计算机必须被精确地告知如何操作。为此，Java\
  \ 提供了两种机制来创建可用于排序的比较：实现 `java.util.Comparable` 中的 `compareTo` 方法，以及创建一个扩展 `java.util.Comparator`\
  \ 的类。我们将为 `Person` 类实现这两种方式。类不必同时实现两者，但很多类都这样做。顺便提一下，`String` 类就是一个很好的例子，它同时实现了这两个比较接口（以及\
  \ `equals` 和 `hashCode`）。\n\n为了能够以排序为目的来比较对象，我们不仅需要知道一个对象是否等于另一个对象，还需要知道一个对象是大于还是小于另一个对象。对于我们的颜色排序示例，我们可以为每种颜色分配一个整数值，然后通过将每块石头放在所有颜色值大于它的石头的左边，以及所有颜色值小于它的石头的右边来对石头进行排序。当颜色值相同时，石头就会堆成一堆（这类似于\
  \ Java 中哈希码值相同时发生的情况）。\n\n\n\n##### 实现 `java.lang.Comparable`\n\nJava 社区公认的另一项最佳实践是，对于对象的“自然”比较，应使用\
  \ `java.lang.Comparable`。人们通常会按姓名自然排序（看看电话簿就知道了），因此实现 `java.lang.Comparable` 并让其\
  \ `compareTo` 方法告诉我们一个姓名是小于、等于还是大于另一个人的姓名，是很有意义的。代码清单 4-30 再次展示了我们的 `Person` 类，并新增了\
  \ `java.lang.Comparable` 的实现。在我们的 `Person` 示例中，我们获取每个 `String` 字段的数值，将它们相加，并将其用作\
  \ `Person` 对象的数值。\n\n***代码清单 4-30.** 实现 java.lang.Comparable 的 Person 类*\n\n`package\
  \ com.apress.javaforabsolutebeginners .examples.comparing;`\n\n`public class Person\
  \ implements Comparable<Person> {`\n`  String firstName;`\n`  String lastName;`\n\
  `    public Person (String firstName, String lastName) {`\n`    this.firstName =\
  \ firstName;`\n`    this.lastName = lastName;`\n`  }`\n\n`  public boolean equals(Person\
  \ p) {`\n`    if (p == null) {`\n`      return false;`\n`    }`\n`    if (p == this)\
  \ {`\n`      return true;`\n`    }`\n`    if (!(p instanceof Person)) {`\n`      return\
  \ false;`\n`    }`\n`    if (p.lastName.equals(this.lastName)`\n`        && p.firstName.equals(this.firstName))\
  \ {`\n`      return true;`\n`    } else {`\n`      return false;`\n`    }`\n`  }`\n\
  \n`  public int hashCode() {`\n`    int result = 17;`\n`    result *= firstName.hashCode()\
  \ * 37;`\n`    result *= lastName.hashCode() * 37;`\n`    return result;`\n`  }`\n\
  \n`  public int compareTo(Person p) {`\n`    int thisTotal = firstName.hashCode()\
  \ + lastName.hashCode();`\n`    int pTotal = p.firstName.hashCode() + p.lastName.hashCode();`\n\
  `    if (thisTotal > pTotal) {`\n`      return 1;`\n`    }`\n`    if (thisTotal\
  \ < pTotal) {`\n`      return -1;`\n`    }`\n`    // 必须相等`\n`    return 0;`\n`  }`\n\
  `}`\n\n`compareTo` 方法保证的约定（如其文档所述）是：如果当前对象大于参数中的对象，则返回正数；如果当前对象小于参数中的对象，则返回负数；如果两者相等，则返回\
  \ 0。同样重要的是，给定相同的对象作为参数，`equals` 方法应返回 `true`，而 `compareTo` 方法应返回 0。为此，只需在两个方法中使用相同的字段即可。如果你需要打破此规则，请务必在\
  \ `compareTo` 方法的 Javadoc 中记录说明。\n\n![images](img/square.jpg) **提示** 一个常见问题是尝试将实现了\
  \ `java.lang.Comparable` 的类强制转换为你自己的类。由于它们位于不同的包中（你的类位于你自己的包中，而另一个类位于 `java.lang.Comparable`\
  \ 包中），因此你无法将你的类强制转换为另一个类。`Integer` 可能是最常导致此问题的类，但任何扩展了 `java.lang.Comparable` 的类都存在同样的问题。因此，如果你看到\
  \ `ClassCastException`，请记住这个特定问题，因为它很可能是导致该异常的原因。\n\n请记住，要比较 `Person` 对象，你需要创建另一个包含\
  \ `main` 方法的类，设置几个 `Person` 对象，然后比较它们。我在本章末尾包含了一个专门执行此操作的类，但为什么不现在就尝试一下呢？与许多其他事情一样，除非你亲自编程，否则你无法学会编程。\n\
  \n**实现 `java.util.Comparator`** 尽管 Java 社区使用 `java.lang.Comparable` 进行自然比较，但当我们想要以某种任意方式比较对象时，我们会实现一个\
  \ `Comparator`。此外，由于 `Comparator` 对象本身也是类，因此可以为同一个类实现许多不同的 `Comparator` 对象。让我们扩展\
  \ `Person` 对象，添加一个我们通常可能不会用来排序的字段，然后创建一个 `Comparator` 类来按该字段排序。这种事情实际上经常发生，因为它允许按不太明显的特征进行分组。代码清单\
  \ 4-31 显示了修改后的 Person 类。\n\n***代码清单 4-31.** 包含喜爱书籍字段的 Person 类*\n\n`package com.apress.javaforabsolutebeginners\
  \ .examples.comparing;`\n\n`public class Person implements Comparable<Person> {`\n\
  `  String firstName;`\n`  String lastName;`\n`  String favoriteBook;`\n`    public\
  \ Person (String firstName, String lastName, String favoriteBook) {`\n`    this.firstName\
  \ = firstName;`\n\n`    this.lastName = lastName;`\n`    this.favoriteBook = favoriteBook;`\n\
  `  }`\n\n`  public boolean equals(Person p) {`\n`    if (p == null) {`\n`      return\
  \ false;`\n`    }`\n`    if (p == this) {`\n`      return true;`\n`    }`\n`    if\
  \ (!(p instanceof Person)) {`\n`      return false;`\n`    }`\n`    if (p.lastName.equals(this.lastName)`\n\
  `        && p.firstName.equals(this.firstName)) {`\n`      return true;`\n`    }\
  \ else {`\n`      return false;`\n`    }`\n`  }`\n\n`  public int hashCode() {`\n\
  `    int result = 17;`\n`    result *= firstName.hashCode() * 37;`\n`    result\
  \ *= lastName.hashCode() * 37;`\n`    return result;`\n`  }`\n\n`  public int compareTo(Person\
  \ p) {`\n`    // 先按姓氏排序`\n`    if (lastName.compareTo(p.lastName) > 0) {`\n`      return\
  \ 1;`\n`    }`\n`    if (lastName.compareTo(p.lastName) < 0) {`\n`      return -1;`\n\
  `    }`\n`    // 姓氏必须相等`\n`    // 因此比较名字`\n`    if (firstName.compareTo(p.firstName)\
  \ > 0) {`\n`      return 1;`\n`    }`\n`    if (firstName.compareTo(p.firstName)\
  \ < 0) {`\n`      return -1;`\n`    }`\n`    // 两个名字必须相等`\n`    return 0;`\n`  }`\n\
  `}`\n\n代码清单 4-32 显示了书籍比较器类。\n\n***代码清单 4-32.** 书籍比较器类*\n\n`package com.apress.javaforabsolutebeginners\
  \ .examples.comparing;`\n\n`import java.util.Comparator;`\n\n`public class BookComparator\
  \ implements Comparator<Person> {`\n\n`  public int compare(Person p1, Person p2)\
  \ {`\n`    return p1.favoriteBook.compareTo(p2.favoriteBook);`\n`  }`\n`}`\n\n在这种情况下，我们只需使用\
  \ `String` 类的 `compareTo` 方法即可。请注意，我们必须告诉比较器要比较什么类型的事物（使用 `Comparator<Person>`）。否则，我们必须接受\
  \ `Object` 类型的参数并将其强制转换为 `Person` 类型的对象。\n\n![images](img/square.jpg) **注意** 对于原始类型的数组或任何实现了\
  \ `java.lang.Comparable`（例如 `String` 和 `Integer`）的对象的集合，你不需要比较器。这些对象本身已经是可比较的。\n\
  \n最后，代码清单 4-33 展示了扩展后的 `CompareTest`，它使用了两种比较方式。\n\n***代码清单 4-33.** 使用两种比较方式的 CompareTest*\n\
  \n`package com.apress.javaforabsolutebeginners .examples.comparing;`\n\n`import\
  \ java.util.ArrayList;`\n`import java.util.Collections;`\n\n`public class CompareTest\
  \ {`\n\n\n\n`  public static void main(String[] args) {`\n`    Person samSpade =\
  \ new Person(\"Sam\", \"Spade\", \"The Maltese Falcon\");`\n`    Person sherlockHolmes\
  \ =`\n`      new Person(\"Sherlock\", \"Holmes\", \"The Sign of the Four\");`\n\
  `    Person johnWatson = new Person(\"John\", \"Watson\", \"A Study in Scarlet\"\
  );`\n`    Person drWatson = new Person(\"John\", \"Watson\", \"A Study in Scarlet\"\
  );`\n`    // 比较两个真正相等的对象`\n`    System.out.println(johnWatson == drWatson);`\n`    System.out.println(johnWatson.equals(drWatson));`\n\
  `    System.out.println();`\n`    System.out.println(\"按姓名排序\");`\n`    // 从角色中创建一个集合并进行排序`\n\
  `    ArrayList<Person> characters = new ArrayList<Person>();`\n`    characters.add(samSpade);`\n\
  `    characters.add(sherlockHolmes);`\n`    characters.add(johnWatson);`\n`    characters.add(drWatson);`\n\
  `    // 按自然顺序排序（使用 compareTo()）`\n`    Collections.sort(characters);`\n`    for\
  \ (int i = 0; i < characters.size(); i++) {`\n`      Person person = characters.get(i);`\n\
  `      System.out.println(person.firstName + \" \"`\n`        + person.lastName\
  \ + \" likes \" + person.favoriteBook);`\n`    }`\n`    System.out.println();`\n\
  `    System.out.println(\"按喜爱的书籍排序\");`\n`    // 按书籍排序（使用 Comparator）`\n`    Collections.sort(characters,\
  \ new BookComparator());`\n`    for (int i = 0; i < characters.size(); i++) {`\n\
  `      Person person = characters.get(i);`\n`      System.out.println(person.firstName\
  \ + \" \"`\n`        + person.lastName + \" likes \" + person.favoriteBook);`\n\
  `    }`\n`  }`\n`}`\n\n清单 4-34 展示了我们测试类的输出结果。\n\n***清单 4-34.** `CompareTest` 输出*\n\
  \n`false`\n`true`\n`按姓名排序`\n`Sherlock Holmes likes The Sign of the Four`\n`Sam Spade\
  \ likes The Maltese Falcon`\n`John Watson likes A Study in Scarlet`\n`John Watson\
  \ likes A Study in Scarlet`\n`按喜爱的书籍排序`\n`John Watson likes A Study in Scarlet`\n\
  `John Watson likes A Study in Scarlet`\n`Sam Spade likes The Maltese Falcon`\n`Sherlock\
  \ Holmes likes The Sign of the Four`\n\n### 本章小结\n\n在本章中，我们学习了：\n\n*   Java 拥有大量的运算符。\n\
  *   Java 的运算符具有优先级（即某些运算符会先于其他运算符被处理）。\n*   Java 有一些看似古怪的运算符（例如位运算符），但它们都有各自的用途。\n\
  *   每个运算符的详细用法。\n*   何时以及如何使用 `equals` 和 `hashCode` 方法。\n*   如何按自然顺序比较对象，以及如何按任意值比较对象。\n\
  \n本章在相当短的篇幅内呈现了大量复杂信息。我建议你再读一遍。此外，正如我之前提到的，没有什么能替代实际编程练习。你应该创建几个可以用不同方式进行比较的类，并尝试摆弄那些不太直观的运算符（例如位运算符）。\n\
  \n## 第 5 章\n\n## 控制流、循环与分支\n\n控制流、循环和分支是所有编程中的基本概念。控制流指的是在不同条件下执行不同的代码。循环指的是重复执行相同的代码（尽管每次可能使用不同的值或不同的对象），直到满足某个条件。分支指的是在检测到某个条件时执行其他操作。将它们联系在一起的线索就是条件检测。\n\
  \n### 控制流\n\nJava 提供了两种用于控制程序流程的结构。\n\n*   `if` 和 `if`-`else`\n*   `switch`\n\n\
  ![images](img/square.jpg) **注意** try-catch 块提供了一种控制流形式，因为你可以尝试执行某件事，如果第一次尝试抛出异常，则执行其他操作。然而，由于这种机制依赖于捕获异常，它并不是真正的控制流机制。因为异常只在出现问题时才会发生，所以不应将其视为（当然也不应用于）分支。\n\
  \n#### if 和 if-else 语句\n\n你已经见过一些 `if` 语句的例子，但让我们再来看一个。我们先从一个尽可能简单的示例开始，如清单 5-1\
  \ 所示。\n\n***清单 5-1.** 一个简单的 `if` 语句*\n\n`if (a > 0) {`\n`  b = 1;`\n`}`\n\n让我们看一个稍微复杂一点的例子。它更贴近实际，但程序经常进行简单的比较，因此清单\
  \ 5-1 和清单 5-2 都是符合实际的。下面是一个程序的一部分，它根据当前时间生成合适的问候语。\n\n***清单 5-2.** 一个更复杂的 `if` 语句示例*\n\
  \n`GregorianCalendar gregorianCalendar = new GregorianCalendar();`\n`int hour =\
  \ gregorianCalendar.get(Calendar.HOUR_OF_DAY);`\n`String greeting = \"Good \";`\n\
  `if (hour < 12) {`\n`  greeting += \"morning\";`\n`}`\n\n条件仅仅是当前小时是否在 12 点之前（即中午之前）。如果当前时间在中午之前，我们就在问候语中添加“morning”。对于条件判断，通常使用相等运算符（`==`\
  \ 和 `!=`）以及比较运算符（`>`, `<`, `<=`, `>=`）。然而，任何能计算为 true 或 false 的条件都可以用作判断条件。\n\n\
  那么，当不是早晨时，我们的程序应该做什么呢？对于这种情况，我们可以使用 `else` 关键字，并编写另一段代码来处理下午的情况。清单 5-2 展示了这段代码。\n\
  \n***清单 5-2.** if-else 语句示例*\n\n`GregorianCalendar gregorianCalendar = new GregorianCalendar();`\n\
  `int hour = gregorianCalendar.get(Calendar.HOUR_OF_DAY);`\n`String greeting = \"\
  Good \";`\n`if (hour < 12) {`\n`  greeting += \"morning\";`\n`} else {`\n`  greeting\
  \ += \"afternoon\";`\n`}`\n\n这种结构代表了所有软件中常见的一种安排。通常，我们只需要考虑两种选择。不过，在这种情况下，我们遇到了一个问题。在一天中的晚些时候，我们会说“Good\
  \ evening”，而不是“Good afternoon”。那么，让我们用更多的代码来解决这个问题。在这种情况下，我们创建了一种称为 `else`-`if`\
  \ 的结构。正如我们稍后将看到的，可以使用 else-if 结构创建很长的分支链。不过，让我们先从一个相当简单的例子开始，如清单 5-3 所示。\n\n***清单\
  \ 5-3.** else-if 示例*\n\n`GregorianCalendar gregorianCalendar = new GregorianCalendar();`\n\
  `int hour = gregorianCalendar.get(Calendar.HOUR_OF_DAY);`\n`String greeting = \"\
  Good \";`\n`if (hour < 12) {`\n`  greeting += \"morning\";`\n`} else if (hour <\
  \ 18) {`\n`  greeting += \"afterooon\";`\n`} else {`\n`  greeting += \"evening\"\
  ;`\n`}`\n`System.out.println(greeting);`\n\n你可能已经猜到我们要用那个 `greeting` 字符串做什么了。\n\n\
  注意 `else if` 结构。我们可以在 `else` 语句后面附加额外的 `if` 语句。通过这种方式，可以逐步处理任意数量的备选方案，为每个方案提供不同的行为。如果你用不同的值（尝试\
  \ 10、13 和 19）逐步执行代码，就能看到任何可能的值是如何被捕获并正确设置 `greeting` 字符串的。实现这一能力的关键在于最后的 `else`，它不检查任何条件。在这种情况下，这只是一种便利，让我们避免编写\
  \ `if (hour < 24)`。\n\n不过，有时你想使用最后的 `else` 来捕获问题。在许多实际程序中，一组 if-else 语句会捕获所有预期的条件，而最后的无条件\
  \ else 语句则会抛出一个异常（这意味着程序会通知我们它发现了一个问题），因为程序遇到了一个意外条件。这是另一个可以放入你编程工具箱的防御性编码示例。\n\n\
  让我们在清单 5-4 中看一个更大的例子，以更详细地展示这种机制。\n\n***清单 5-4.** 一个更大的 else-if 示例*\n\n\n\n`GregorianCalendar\
  \ gregorianCalendar = new GregorianCalendar();`\n`int day = gregorianCalendar.get(Calendar.DAY_OF_WEEK);`\n\
  `String greeting = \"Good \";`\n`if (day == 1) {`\n`  greeting += \"Sunday\";`\n\
  `} else if (day == 2) {`\n`  greeting += \"Monday\";`\n`} else if (day == 3) {`\n\
  `  greeting += \"Tuesday\";`\n`} else if (day == 4) {`\n`  greeting += \"Wednesday\"\
  ;`\n`} else if (day == 5) {`\n`  greeting += \"Thursday\";`\n`} else if (day ==\
  \ 6) {`\n`  greeting += \"Friday\";`\n`} else if (day == 7) {`\n`  greeting += \"\
  Saturday\";`\n`}`\n`greeting += \" to you.\";`\n`System.out.println(greeting );`\n\
  \n请注意，我们没有添加最终的 `else` 语句。在这种情况下，我们知道 `GregorianCalendar` 类不会产生我们意料之外的值（它甚至会在进入我们的\
  \ `if` 语句之前就抛出异常），因此没有必要添加。当你无法确定是否总能得到预期的条件时，或者（如前面的例子所示）当你可以用它作为快捷方式时，可以使用最终的\
  \ `else` 技巧。\n\n#### switch 语句\n\n`switch` 关键字允许我们构建一个结构，该结构执行与一组 `if`-`else` 语句相同的功能，但使用了不同的语法。就我个人而言，我非常习惯于阅读\
  \ if-else 块，因此更倾向于使用它们，但许多开发者更喜欢 `switch` 语句。此外，如果你的调试器不支持条件断点，`switch` 语句可能更容易调试。幸运的是，Eclipse\
  \ 内置的调试器确实支持条件断点，我们将在第 11 章“调试”中看到这一点。\n\n`if` 语句和 `switch` 块之间的一个区别是，`if` 语句只计算\
  \ `boolean` 条件。也就是说，`if` 语句中的求值表达式必须始终解析为 `true` 或 `false`。而 `switch` 块可以计算用作其参数的类型的任何值。因此，一个计算\
  \ `int` 值的 `switch` 块可以计算任何 `int` 值。这样，`switch` 块支持任意数量的执行路径，而 `if` 语句只有两条路径（`true`\
  \ 和 `false`）。\n\n此外，`switch` 语句只计算整数、`String` 对象和枚举。如果你有一个类会产生一组其他可能性（例如，一个类会为每个可能的结果生成不同类型的对象），那么你需要使用\
  \ `if`-`else` 结构，而不是 `switch` 语句。\n\n一个 `switch` 语句需要多个 `case` 标签，每个标签都与定义为 `switch`\
  \ 语句单个参数的值进行比较。让我们看看清单 5-5：根据一天中的时间创建问候语（输出与清单 5-3 相同，但使用了 `switch` 语句）。\n\n***清单\
  \ 5-5.** switch 语句示例*\n\n`GregorianCalendar gregorianCalendar = new GregorianCalendar();`\n\
  `int hour = gregorianCalendar.get(Calendar.HOUR_OF_DAY);`\n`String greeting = \"\
  Good \";`\n`switch(hour) {`\n`  case (1):`\n`  case (2):`\n`  case (3):`\n`  case\
  \ (4):`\n`  case (5):`\n`  case (6):`\n`  case (7):`\n`  case (8):`\n`  case (9):`\n\
  `  case (10):`\n`  case (11): {`\n`    greeting += \"morning\";`\n`    break;`\n\
  `  }`\n`  case (12):`\n`  case (13):`\n`  case (14):`\n`  case (15):`\n`  case (16):`\n\
  `  case (17): {`\n`    greeting += \"afternoon\";`\n`    break;`\n`  }`\n`  default:\
  \ {`\n`    greeting += \"evening\";`\n`    break;`\n`  }`\n`}`\n`System.out.println(greeting\
  \ );`\n\n注意末尾的 `default` 分支。这是 `switch` 块让你处理不匹配任何分支的输入的一种方式。在这个例子中，我们用它来捕获 18 到\
  \ 24（含）之间的值。我们可以这样做，因为我们知道不会得到任何其他值。如果我们不确定是否会得到意外值，我们可能会在 `default` 分支中抛出一个异常，以便让使用该\
  \ `switch` 块的任何代码知道我们发现了问题。\n\n`switch` 语句的一个问题是它无法对其可能的值进行分组（除了通过 `default` 关键字）。因此，我们最终会得到许多看似什么都不做的\
  \ `case` 标签。实际上，每组 `case` 语句共享它们在 `switch` 语句中遇到的下一个代码块。在这种情况下，这意味着值 1 到 11 共享将“morning”添加到问候语的代码，而值\
  \ 12 到 17 共享将“afternoon”添加到问候语的代码。\n\n`switch` 语句的另一个问题是每个代码块通常需要一个 `break` 语句。每个\
  \ `break` 语句都会使程序从 `break` 语句跳转到 `switch` 语句的末尾。考虑一下，如果我们假设输入是 10，会发生什么。按照代码编写，输出是“Good\
  \ morning”。如果没有 `break` 语句，输出将是“Good morningafternoonevening”。也就是说，每个代码块都会被执行。这是因为任何没有\
  \ `break` 语句的 `case` 标签都会“穿透”到下一个 `case` 语句。正是这种机制允许多个 `case` 标签共享一个代码块。如果没有 `break`\
  \ 语句，`switch` 语句中的每个代码块都会被执行。尽管在某些情况下运行多个代码块可能有用，但这通常是一个错误（并且可能很难发现，因为代码看起来可能是正确的）。\n\
  \n最后一个问题是 `default` 关键字。`switch` 语句不要求必须有 `default` 部分。然而，`switch` 语句通常确实包含 `default`\
  \ 部分。`default` 部分执行与一组 `if`-`else` 语句中最终的 `else` 语句相同的功能。与最终的 `else` 一样，你可以将 `default`\
  \ 部分用于任何剩余的值，前提是你确信不会得到 `switch` 语句参数的意外值。当你无法确定输入时，请使用 `default` 块来捕获意外值并采取适当的操作（通常是执行空操作或抛出异常）。`default`\
  \ 部分不需要 `break` 语句（代码无论如何都会“穿透”到 `switch` 语句的末尾），但为了保持一致性和可读性，习惯上（并且这是一种好习惯）会添加一个。\n\
  \n让我们看看清单 5-6 中另一个 `switch` 语句的例子，这个例子的功能与清单 5-4 类似。\n\n***清单 5-6.** 使用没有 default\
  \ 部分的 switch 语句*\n\n`GregorianCalendar gregorianCalendar = new GregorianCalendar();`\n\
  `int day = gregorianCalendar.get(Calendar.DAY_OF_WEEK);`\n`String greeting = \"\
  Good \";`\n`switch (day) {`\n`  case 1: {`\n`    greeting += \"Sunday\";`\n`  }`\n\
  `  case 2: {`\n`    greeting += \"Monday\";`\n`  }`\n`  case 3: {`\n`    greeting\
  \ += \"Tuesday\";`\n`  }`\n`  case 4: {`\n`    greeting += \"Wednesday\";`\n`  }`\n\
  `  case 5: {`\n`    greeting += \"Thursday\";`\n`  }`\n`  case 6: {`\n`    greeting\
  \ += \"Friday\";`\n`  }`\n`  case 7: {`\n`    greeting += \"Saturday\";`\n`  }`\n\
  `}`\n`greeting += \" to you.\";`\n`System.out.println(greeting );`\n\n清单 5-4 可以使用一个没有比较条件的最终\
  \ `else` 语句。清单 5-6 中的最后一个 `case` 可以是一个 `default` 部分。两者都可行。当我为每个选项都设置一个单独的 `case`\
  \ 时，我倾向于将其填充完整，但这只是风格问题。与最终的 `else` 一样，你可以将 `default` 部分用作所有未定义分支的快捷方式，或者用作捕获意外值的方法。只有在你绝对确定值的情况下（就像我们使用\
  \ `GregorianCalendar` 时那样），才将 `default` 用作快捷方式。\n\n### 循环\n\nJava 提供了三种循环结构：\n\n\
  *   for\n*   while\n*   do-while\n\n`for` 循环是最常用的，但 `while` 和 `do`-`while` 循环当然也有其用途。\n\
  \n![images](img/square.jpg) **注意** 所有循环都有三个操作：初始化一个变量，测试它是否完成，以及更新要再次测试的变量。其他一切都只是额外的细节或替代语法，我们很快就会看到。\n\
  \n\n\n#### For 循环\n\n通常，当你拥有可以计数的值时，应使用 `for` 循环。例如，当你有一个数组、列表或枚举时，你可以根据其中元素的数量使用\
  \ `for` 循环。\n\n还记得第 3 章中的基本方向示例吗？让我们在代码清单 5-7 中更仔细地研究一下。\n\n***代码清单 5-7.** 查找方向的循环*\n\
  \n`int[] compassPoints = {22, 77, 144, 288};`\n`for (int i = 0; i < compassPoints.length;\
  \ i++) {`\n`  System.out.println(compassPoints[i] + \" degrees is (very roughly)\
  \ \"`\n`      + Direction.findCardinalDirection(compassPoints[i]));`\n`}`\n\n`for`\
  \ 循环由两部分组成：控制循环的信息和每次循环时运行的代码块。控制部分（在括号内）由三部分组成：初始化、终止和增量。这三部分中的每一部分都以分号结尾，尽管增量后的分号通常会被省略。这些名称很好地表明了它们的作用。初始化代码设置用于计数的变量，终止代码指示如何知道何时停止循环，增量代码规定每次循环时如何更改初始化变量。在这个简单的例子中，我们将一个名为\
  \ `i` 的 `int` 变量设置为 0，为 `compassPoints` 数组中的每个项运行循环内的代码，并将初始化变量 (`i`) 每次递增 1。\n\n\
  Java 程序员当然可以采取与这里所示不同的做法。请考虑代码清单 5-8 中的以下 `for` 语句。\n\n***代码清单 5-8.** 替代的 for 循环*\n\
  \n`// 仅处理 compassPoints 数组的一半`\n`for (int i = compassPoints.length / 2; i < compassPoints.length;\
  \ i++) {`\n\n`}`\n`// 处理 compassPoints 数组中的每隔一个元素`\n`for (int i = 0; i < compassPoints.length;\
  \ i += 2) {`\n\n`}`\n\n这两个循环中的第一个处理 `compassPoints` 数组中高值的一半（第 2 和第 3 项——记住数组从 0\
  \ 开始）。第二个循环处理第 0 和第 2 项。如果我们使用 `int i = 1`，第二个循环将处理第 1 和第 3 项。通常，任何可以计数的变量（包括 `char`\
  \ 变量，但除非处理单个字符，否则这是不好的做法——出于简单性和性能考虑，字符组应作为 `String` 对象处理）都可以作为初始化值，并且可以从该变量的任何可能值（包括负数）开始。此外，任何有效的数学运算都可以在增量值中执行。当然，如果你还将初始化变量用作数组的索引，使用负数会导致\
  \ `ArrayOutOfBounds` 异常，因为数组索引不使用负数。不过，当你做这类事情时，请彻底测试以确保得到预期的结果。\n\n说到将初始化变量用作索引，这正是我们在代码清单\
  \ 5-7 中所做的。你也可以在循环体中对初始化变量执行数学运算，如代码清单 5-9 所示。\n\n***代码清单 5-9.** 在循环体中修改初始化变量*\n\
  \n`int[] compassPoints = {22, 77, 144, 288};`\n`for (int i = 0; i < compassPoints.length;\
  \ i++) {`\n`  System.out.println(compassPoints[i++] + \" degrees is (very roughly)\
  \ \" + Direction.findCardinalDirection(compassPoints[i]));`\n`}`\n\n注意，我们在初始化变量用作索引的地方添加了一个后缀运算符。因此，这个循环现在处理\
  \ `compassPoints` 数组中的第 0 和第 2 项。如你所见，这提供了另一种处理每隔一个项的方法。如果我们把 `i++` 改成 `i += 2`，循环将处理每三个项中的一项，即处理第\
  \ 0 和第 3 项。虽然可能有用，但这类事情可能会导致问题。再次强调，请彻底测试。\n\n顺便提一下，以不同方式处理交替项的最佳实践不是编写两个 for 循环或对增量值进行数学运算，而是在每个项通过循环时对其进行测试，并在每种情况下执行适当的操作，如代码清单\
  \ 5-10 所示。\n\n***代码清单 5-10.** 在单个循环中处理每隔一个项*\n\n`int[] compassPoints = {22, 77,\
  \ 144, 288};`\n`for (int i = 0; i < compassPoints.length; i++) {`\n`  if (i % 2\
  \ == 1) {`\n`    System.out.println(\"[\" + i + \" is odd] \" + compassPoints[i]\
  \ +`\n`        \" degrees is (very roughly) \" +`\n`        Direction.findCardinalDirection(compassPoints[i]));`\n\
  `  } else {`\n`    System.out.println(\"[\" + i + \" is even] \" + compassPoints[i]\
  \ +`\n`        \" degrees is (very roughly) \" +`\n`        Direction.findCardinalDirection(compassPoints[i]));`\n\
  `  }`\n`}`\n\n代码清单 5-11 显示了该循环的输出。\n\n***代码清单 5-11.** 以不同方式处理交替项的输出*\n\n`[0 is even]\
  \ 22 degrees is (very roughly) NORTH`\n`[1 is odd] 77 degrees is (very roughly)\
  \ EAST`\n`[2 is even] 144 degrees is (very roughly) SOUTH`\n`[3 is odd] 288 degrees\
  \ is (very roughly) WEST`\n\n这类代码常用于在表格行和类似应用中交替颜色。使用 `if (i % 3 == 1)` 可以不同方式处理每三个项中的一项，依此类推。\n\
  \n`for` 循环支持另一种（有时很方便的）语法，称为*增强型 for 语法*。增强型 for 语法由一个初始化变量和一个与该初始化变量关联的对象（此处为数组）组成。对象中的每个项都由循环处理，初始化变量提供对当前索引值（几乎总是需要的）的访问。如果你希望处理每个项（尽管可以在循环体中使用\
  \ `if` 语句跳过某些项），增强型 for 语法提供了一个很好的快捷方式。增强型 for 语法是为集合和数组创建的，但也可以与枚举一起使用（正如我们在第 3\
  \ 章 “运算符”中看到的）。让我们在代码清单 5-12 中考虑一个示例，使用与前面示例中相同的数组。\n\n增强型 for 语法也被称为“for each”。我不喜欢这个叫法，因为其他语言（如\
  \ Perl）有一个实际的 `foreach` 关键字。Java 有“对于这些项中的每一个，运行以下代码”的概念，但它没有一个实际的 `foreach` 关键字。因此，我更喜欢称其为“增强型\
  \ for”。它在 Java 5 中引入时获得了这个名称。在 Java 5 之前，Java 开发者只能使用基本的 `for` 结构。\n\n***代码清单 5-12.**\
  \ 增强型 for 语法示例*\n\n`int[] compassPoints = {22, 77, 144, 288};`\n`for (int i: compassPoints)\
  \ {`\n`  System.out.println(compassPoints[i] + \" degrees is (very roughly) \" +`\n\
  `      Direction.findCardinalDirection(compassPoints[i]));`\n`}`\n\n代码清单 5-12 执行与代码清单\
  \ 5-9 相同的操作。\n\n每个 Java 开发者都应该了解的关于 `for` 循环的最后一点是，它只是 `while` 循环的一种快捷方式。也就是说，每个\
  \ `for` 循环都可以重写为 `while` 循环。让我们在代码清单 5-13 中将代码清单 5-9 中的循环转换为 `while` 循环。\n\n***代码清单\
  \ 5-13.** 将 for 循环转换为 while 循环*\n\n`int i = 0;`\n`while (i < compassPoints.length)\
  \ {`\n`  System.out.println(compassPoints[i] + \" degrees is (very roughly) \" +`\n\
  `      Direction.findCardinalDirection(compassPoints[i]));`\n`  i++;`\n`}`\n\n代码清单\
  \ 5-13 执行与代码清单 5-9 和 5-12 相同的操作。（在大多数编程语言（包括 Java）中，你几乎总能找到多种方法来完成同一件事。）\n\n\n\n\
  #### While 循环\n\n正如我们刚刚学到的，`for` 循环处理的是 `while` 循环更通用用途中的一种特定情况。`for` 循环（通常）处理可以计数的事物。而\
  \ `while` 循环只要某个条件为 `true` 就会持续循环。`while` 循环只有一个参数：一个可以被求值为 `true` 或 `false` 的表达式。\n\
  \n在进一步深入之前，我们先来看一个最简单的 `while` 循环，如代码清单 5-14 所示。\n\n***代码清单 5-14**。一个简单的 while 循环*\n\
  \n`while (counter < 10) {`\n`  System.out.println(counter);`\n`}`\n\n`while` 循环没有显式的初始化变量或递增语句；你必须自己提供这些功能。（发明\
  \ `for` 循环的原因之一，就是将循环的三个部分——初始化、测试和递增——集中在一个地方。）虽然初始化和递增通常出现在 `while` 循环附近（初始化）或内部（递增），但它们并不像在\
  \ `for` 循环中那样是 `while` 循环语法的一部分。因此，让我们看一个更完整的示例，它除了测试之外，还包含了初始化和递增（参见代码清单 5-15）。\n\
  \n***代码清单 5-15**。一个更完整的 while 循环*\n\n`int counter = 0;`\n`while (counter < 10) {`\n\
  `  System.out.println(counter);`\n`  counter++;`\n`}`\n\n这个（仍然简单的）示例展示了 `while`\
  \ 循环的典型结构：声明一个变量，在 `while` 循环顶部测试该变量，在 `while` 循环中执行一些工作，并在 `while` 循环中递增该变量。测试失败后，`while`\
  \ 循环结束，`while` 循环下方的代码开始执行。\n\n你可以通过使用 `while(true)` 创建一个永远运行的 `while` 循环（或者更可能的情况是，直到循环体中的某个\
  \ `if` 语句检查的条件触发 `break` 语句为止）。这种结构在某些情况下很有用，但并非安全之举。精明的程序员会尽量确保循环不会永远运行下去（这被称为无限循环）。如果由于意外的输入数据，循环体中的中断条件从未被触发，那该怎么办？那么你的程序就会卡住（如果它恰好正在写入文件，这可能会带来很多麻烦——你可能会因此迅速给操作系统造成问题）。如果你觉得必须使用\
  \ `while(true)`，请务必进行彻底测试。\n\n`while` 循环的另一个用途是，在不知道每次尝试需要多长时间的情况下，尝试某件事一段固定的时间。例如，假设一个邮件客户端尝试连接邮件服务器一分钟，然后放弃（即超时）。代码清单\
  \ 5-14 展示了一种等待连接的方法。\n\n***代码清单 5-14**。等待事件的 while 循环*\n\n`boolean connected = false;`\n\
  `long now = System.currentTimeMillis();`\n`long oneMinuteFromStart = System.currentTimeMillis()\
  \ + 60000;`\n`while (!connected && now < oneMinuteFromStart) {`\n`  System.out.println(\"\
  正在尝试连接....\");`\n`  if (MailServer.connect()) {`\n`    connected = true;`\n`    break;`\n\
  `  }`\n`  // 暂停两秒钟`\n`  // 也让其他进程运行`\n`  try {`\n`    System.out.println(\"（让其他进程运行）\"\
  );`\n`    Thread.sleep(2000);`\n`  } catch (Exception e) {`\n`    e.printStackTrace();`\n\
  `  }`\n`  // 为下一次比较重置 now`\n`  now = System.currentTimeMillis();`\n`}`\n`if (connected)\
  \ {`\n`  System.out.println(\"已连接到邮件服务器\");`\n`} else {`\n`  System.out.println(\"\
  尝试连接到邮件服务器时超时\");`\n`}`\n\n在实际应用程序中，连接服务器的代码还会检查许多异常，并且不会打印到控制台，而是为用户更新一个状态窗口（其中包含一个取消按钮）。\n\
  \n注意 `break` 语句。如果我们确实连接上了，我们就不想等待其余代码运行（尤其是因为它包含一条休眠指令）。因此，我们在连接后跳出 `while` 循环。方便之处在于，如果第一次尝试就连接成功，我们永远不需要等待，也永远不会循环。我们像执行线性代码一样快速通过（除了\
  \ `while` 中比较的开销），然后就完成了。如果我们通常第一次尝试就能连接成功，那将是一个不错的小优化。我们将在本章后面详细讨论 `break` 语句。\n\
  \n还要注意 try-catch 块以及其中的 `Thread.sleep(2000)` 调用。`Thread.sleep()` 方法告诉当前线程休眠若干毫秒，让其他进程运行。换句话说，它让你的进程休息时，让其他进程完成一些工作。如果没有它，JVM\
  \ 在你的 `while` 循环退出之前不会尝试做任何其他事情。这通常是一种不好的做法，因为它可能会在一切等待你的代码时导致整个应用程序停止。让你的线程休眠多长时间取决于许多因素（你所做的事情需要多长时间，你所做的事情有多重要，等等）。\n\
  \n![images](img/square.jpg) **提示** 当你做任何需要计时的事情时，几乎总是应该让当前线程休眠一小会儿，以便让其他进程工作。\n\n\
  #### Do-while 循环\n\nDo-while 循环的工作方式与 `while` 循环非常相似。区别在于，条件检查是在代码块运行之后进行的。换句话说，测试位于循环的底部而不是顶部。这意味着代码至少会运行一次。因为我们总是希望邮件服务器连接器至少尝试一次，所以这是将其转换为\
  \ do-while 循环的绝佳案例（参见代码清单 5-15）。\n\n***代码清单 5-15**。Do-while 循环*\n\n`boolean connected\
  \ = false;`\n`long now = System.currentTimeMillis();`\n`long oneMinuteFromStart\
  \ = System.currentTimeMillis() + 60000;`\n`do {`\n`  System.out.println(\"正在尝试连接....\"\
  );`\n`  if (MailServer.connect()) {`\n`    connected = true;`\n`    break;`\n`  }`\n\
  `  // 暂停两秒钟`\n`  // 也让其他进程运行`\n`  try {`\n`    System.out.println(\"（让其他进程运行）\"\
  );`\n`    Thread.sleep(2000);`\n`  } catch (Exception e) {`\n`    e.printStackTrace();`\n\
  `  }`\n`  // 为下一次比较重置 now`\n`  now = System.currentTimeMillis();`\n`} while (!connected\
  \ && now < oneMinuteFromStart);`\n`if (connected) {`\n`  System.out.println(\"已连接到邮件服务器\"\
  );`\n`} else {`\n`  System.out.println(\"尝试连接到邮件服务器时超时\");`\n`}`\n\n在带有 `break`\
  \ 语句的 do-while 循环中，我们可以跳过比较的开销。如果我们的代码恰好第一次就成功了，我们就完成了。这是一个微小的优化，但尽可能利用这类事情是一种好习惯，因为这些微小的时间累积起来效果可观。\n\
  \n### 分支\n\n`if` 和 `switch` 结构严格来说并不是分支结构（尽管开发人员经常这样称呼它们）。严格来说，*分支*意味着从程序中的一个位置“跳转”到同一程序中的另一个位置。某些语言（如汇编语言）广泛使用这种分支。Java\
  \ 则更加谨慎地使用这一概念。Java 社区认为，随意跳转到代码中的其他点与面向对象开发的原则相悖。普遍认为，必须依赖跳转的面向对象代码是不良的面向对象代码。因此，Java\
  \ 没有 `goto` 语句，并且 Java 社区在使用 `break` 和 `continue` 关键字时非常谨慎。\n\nJava 提供了三种分支语句：\n\
  \n*   break\n*   continue\n*   return\n\n\n\n#### break 语句\n\n许多编程语言都提供了某种形式的 `break`\
  \ 语句，因为在满足某个条件时停止当前执行路径是一个常见问题。不带标签的 `break` 语句会将执行点（程序当前正在运行的代码片段）移动到包含该 `break`\
  \ 语句的结构之外的下一句代码。唯一可以包含 `break` 语句的结构是 `for`、`while` 和 `do-while` 循环以及 `switch` 语句。\n\
  \n`break` 语句有两种形式，一种不带标签（最常用的形式），另一种带标签。我们在本章中会看到几个 `break` 语句的示例。带标签的 `break` 语句会中断外层循环，这意味着它只在嵌套循环中有用。例如，假设我们在棋盘上搜索某个特定的棋子（比如黑王）。我们可能会实现一个从左到右的循环，再嵌套一个从上到下的循环来遍历整个棋盘。（顺便说一句，如果我们用这种方式搜索棋子的位置，那程序的设计就很糟糕；每个棋子都应该是一个对象，我们通过检查其属性来找到它的位置，但这个想法足以作为清单\
  \ 5-16 的示例。）\n\n***清单 5-16.** 带标签的 break 语句*\n\n`String[][] pieces = {`\n`  {\"\
  Black Castle\", \"Black Knight\", \"Black Bishop\", \"Black Queen\",`\n`    \"Black\
  \ King\", \"\", \"\", \"\"},`\n`  {\"Black Pawn\", \"Black Pawn\", \"Black Pawn\"\
  , \"\", \"\", \"\", \"\", \"\"},`\n`  {\"\", \"\", \"\", \"\", \"\", \"\", \"\"\
  , \"\"},`\n`  {\"\", \"\", \"\", \"\", \"\", \"\", \"\", \"\"},`\n`  {\"\", \"\"\
  , \"\", \"\", \"\", \"\", \"\", \"\"},`\n`  {\"\", \"\", \"\", \"\", \"\", \"\"\
  , \"\", \"\"},`\n`  {\"White Pawn\", \"White Pawn\", \"White Pawn\", \"\", \"\"\
  , \"\", \"\", \"\"},`\n`  {\"White Castle\", \"White Knight\", \"White Bishop\"\
  , \"White Queen\",`\n`    \"White King\", \"\", \"\", \"\"}`\n`    };`\n`int x =\
  \ 0, y = 0;`\n`king:`\n`for (int i = 0; i < 8; i++) {`\n`  for (int j = 0; j < 8;\
  \ j++) {`\n`    if (pieces[i][j].equals(\"Black King\")) {`\n`      x = i;`\n`      y\
  \ = j;`\n`      break king;`\n`    }`\n`  }`\n`}`\n`System.out.println(\"x: \" +\
  \ x + \", y: \" + y);`\n\n`king:` 标签指明了 `break king;` 语句应该终止哪个循环。代码执行随后会从外层循环下面的打印语句继续。\n\
  \n#### continue 语句\n\n`continue` 语句在循环内部工作。它会停止当前循环迭代并进入下一次迭代。而 `break` 语句则会退出整个循环。换句话说，`continue`\
  \ 语句是继续循环，而 `break` 语句是跳出循环（这也解释了这两个关键字的起源）。它的一般用法是，循环中的代码确定不需要继续执行当前迭代，可以跳转到处理下一个项目。这是\
  \ Java 让你表达“不，不是这个。下一个怎么样？”的方式。回到我们的棋盘示例，假设我们要统计存活的兵的数量（见清单 5-17）。\n\n***清单 5-17.**\
  \ continue 语句*\n\n`String[][] pieces = {`\n`  {\"Black Castle\", \"Black Knight\"\
  , \"Black Bishop\", \"Black Queen\", \"Black King\", \"\", \"\", \"\"},`\n`  {\"\
  Black Pawn\", \"Black Pawn\", \"Black Pawn\", \"\", \"\", \"\", \"\", \"\"},`\n\
  `  {\"\", \"\", \"\", \"\", \"\", \"\", \"\", \"\"},`\n`  {\"\", \"\", \"\", \"\"\
  , \"\", \"\", \"\", \"\"},`\n`  {\"\", \"\", \"\", \"\", \"\", \"\", \"\", \"\"\
  },`\n`  {\"\", \"\", \"\", \"\", \"\", \"\", \"\", \"\"},`\n`  {\"White Pawn\",\
  \ \"White Pawn\", \"White Pawn\", \"\", \"\", \"\", \"\", \"\"},`\n`  {\"White Castle\"\
  , \"White Knight\", \"White Bishop\", \"White Queen\", \"White King\", \"\", \"\"\
  , \"\"}`\n`};`\n`int pawns = 0;`\n`for (int i = 0; i < 8; i++) {`\n`  for (int j\
  \ = 0; j < 8; j++) {`\n`    if (!pieces[i][j].contains(\"Pawn\")) {`\n`      continue;`\n\
  `    }`\n`    pawns++;`\n`  }`\n`}`\n`System.out.println(\"Surviving pawns: \" +\
  \ pawns);`\n\n当我们遇到 `continue` 语句时，会跳过循环中的任何其他代码，并处理下一个项目。\n\n请注意，我们可以重写内层循环的主体，使其不使用\
  \ `continue` 语句，如清单 5-18 所示：\n\n***清单 5-18.** 不使用 `continue` 语句的实现*\n\n`if (pieces[i][j].contains(\"\
  Pawn\")) {`\n`  pawns++;`\n`}`\n\n事实证明，要写出一个不使用 `continue` 语句就无法简化实现的 `continue`\
  \ 语句示例是相当困难的，这就是为什么 `continue` 语句在代码中并不常见的原因。\n\n与 `break` 语句类似，`continue` 语句也可以使用标签。碰巧的是，在棋盘示例中为\
  \ `continue` 语句添加标签会产生相同的结果，尽管处理过程更多一些。因此，让我们考虑一个示例，该示例统计字符串数组中每个字符串中第一个空格之前出现的字符数（见清单\
  \ 5-19）。\n\n***清单 5-19.** 带标签的 continue 语句*\n\n`String[] detectives = {\"Sam Spade\"\
  , \"Sherlock Holmes\", \"Charlie Chan\"};`\n`int charactersBeforeSpaces = 0;`\n\
  `outer:`\n`for (String str : detectives) {`\n`    char[] strChars = str.toCharArray();`\n\
  `    for (char ch : strChars) {`\n`        if (ch == ' ') {`\n`            continue\
  \ outer;`\n`        }`\n`        charactersBeforeSpaces++;`\n`    }`\n`}`\n`System.out.println(charactersBeforeSpaces);`\n\
  \n这段代码会打印出 18。\n\n![images](img/square.jpg) **注意** 正如本章前面提到的，Java 社区不赞成使用标签，因为他们不喜欢使用类似\
  \ `goto` 的惯用法，而跳转到标签几乎等同于 `goto` 指令。Java 的设计者有意没有包含 `goto` 指令，社区也接受了无 `goto` 的理念，以至于同样不赞成使用标签。公认的观点是，如果你的代码需要跳来跳去，说明你的代码设计得很糟糕。我同意这一点，因为除了在编写示例来展示它们如何工作之外，我从未发现带标签的\
  \ `break` 或 `continue` 语句有什么用处。\n\n让我们重写那段代码，展示如何在不使用标签的情况下工作，从而符合 Java 社区的最佳实践（见清单\
  \ 5-20）。\n\n***清单 5-20.** 移除标签*\n\n`String[] detectives = {\"Sam Spade\", \"Sherlock\
  \ Holmes\", \"Charlie Chan\"};`\n`int charactersBeforeSpaces = 0;`\n`for (String\
  \ str : detectives) {`\n`    char[] strChars = str.toCharArray();`\n`    for (char\
  \ ch : strChars) {`\n`        if (ch == ' ') {`\n`            break;`\n`        }`\n\
  `        charactersBeforeSpaces++;`\n`    }`\n`}`\n`System.out.println(charactersBeforeSpaces);`\n\
  \n如你所见，移除标签并将 `continue` 语句替换为 `break` 语句会产生相同的结果，并且更易于理解。标签在极少数情况下是合适的，但你可能需要编写很长时间的\
  \ Java 代码才能遇到这种情况。（我从 1995 年开始编写 Java 代码，至今从未需要过标签。）在此期间，请尽量组织你的代码，避免在无标签的 `break`\
  \ 和 `continue` 语句之外进行跳转。相反，要组织好代码，使你的逻辑能够覆盖每一种可能的情况。这样，你就不需要跳转到任何地方了。\n\n\n\n####\
  \ return 语句\n\n最后一种分支指令是 `return` 语句，它有两种形式。如果方法不返回任何内容（即其返回类型为 `void`），则 `return`\
  \ 语句不带参数。如果方法返回一个值或对象（即返回类型不是 `void`），则 `return` 语句带一个参数（即要返回的值或对象）。`return` 语句会停止方法内的任何进一步处理，并将处理流程返回到调用该方法的代码。让我们来看一个返回字符串的方法示例（参见清单\
  \ 5-21）。\n\n***清单 5-21.** 使用 return 停止处理*\n\n`public String getAuthorForDetective\
  \ (String detective) {`\n`  if(detective.equals(\"Sam Spade\")) {`\n`    return\
  \ \"Dashiell Hammett\";`\n`  }`\n`  if (detective.equals(\"Sherlock Holmes\")) {`\n\
  `    return \"Sir Arthur Conan Doyle\";`\n`  }`\n`  if (detective.equals(\"Charlie\
  \ Chan\")) {`\n`    return \"Earl Derr Biggers\";`\n`  }`\n`  return \"Unknown author\"\
  ;`\n`}`\n\n如本例所示，一旦我们找到与虚构角色匹配的作者，就会停止查找并返回该作者的名字。如果所有条件都不匹配，我们就承认不知道作者的名字。我们不需要\
  \ `else` 语句，因为每个 `if` 语句都包含一个 `return` 语句；在每个 `if` 语句处，如果匹配则停止处理，不匹配则继续处理，因此 `else`\
  \ 是多余的语法。这种写法在 Java 程序中很常见。当你能够按可能性大小对匹配项进行排序时，这种方法尤其有效。这样，你通常可以尽可能少地执行处理，从而实现便捷的优化。例如，如果你恰好为福尔摩斯纪念图书馆（如果存在这样的机构）编写代码，你会把“Sherlock\
  \ Holmes”的匹配项放在最前面。\n\n让我们来看清单 5-22 中一个类似的示例，这是一个返回类型为 `void` 的方法。\n\n***清单 5-22.**\
  \ 使用不带返回值的 return*\n\n`public void printAuthorForDetective (String detective) {`\n\
  `  if(detective.equals(\"Sam Spade\")) {`\n`    System.out.println(\"Dashiell Hammett\"\
  );`\n`    return;`\n`  }`\n`  if (detective.equals(\"Sherlock Holmes\")) {`\n`    System.out.println(\"\
  Sir Arthur Conan Doyle\");`\n`    return;`\n`  }`\n`  if (detective.equals(\"Charlie\
  \ Chan\")) {`\n`    System.out.println(\"Earl Derr Biggers\");`\n`    return;`\n\
  `  }`\n`  System.out.println(\"Unknown author\");`\n`}`\n\n同样，`return` 语句会停止方法内的进一步处理，并将处理流程返回到调用该方法的代码。如果我们没有\
  \ `return` 语句，该方法会打印出它找到的任何匹配项（如果有的话），然后打印“Unknown author”。因此，省略 `return` 语句不仅会导致不必要的处理，还会产生一个\
  \ bug。我们不需要在最后一条语句之后添加 `return` 语句，因为方法会在执行完最后一条指令后隐式返回。\n\n### 本章小结\n\n本章涵盖了被许多程序员视为编程主要目的的内容：识别条件并为每种条件执行适当的操作。如果我们无法根据接收到的输入来改变我们的行为，那么任何程序都无法达到实现有用功能的复杂度。为此，每种编程语言都至少提供了几种在代码中改变执行路径的方法。\n\
  \n正如我们在本章中学到的，Java 提供了：\n\n*   `if` 和 `if`-`else`（以及 `else if`）语句，用于简单比较\n*   `switch`\
  \ 块，用于比较大量值\n*   `for`（以及增强型 for 或“for each”）循环，用于编写易读的循环\n*   `while` 循环，用于在满足条件之前持续执行某项操作\n\
  *   `do`-`while` 循环，用于将条件判断放在循环末尾\n*   `break` 语句，用于跳出当前代码块\n*   `continue` 语句，用于继续处理下一项\n\
  *   `return` 语句，用于声明方法执行完毕并返回一个值\n\n得益于所有这些控制逻辑流程的可能性，我们可以编写出能够正确处理任意数量的输入、输出以及中间处理步骤，同时仍然易于阅读的程序。\n\
  \n## 第 6 章\n\n## 面向对象编程\n\nJava 是一种面向对象的语言。这意味着 Java 允许程序员通过开发对象并指定对象之间的关系来开发软件。这些关系在对象内部定义，因此对象是\
  \ Java 中任何软件开发工作的核心焦点。\n\n### 对象\n\n那么什么是对象？从技术角度来说，*对象*是类的一个实例（如果类是静态的或单例的——即只能有一个实例的类，那么对象也可以是类本身）。那么实例到底是什么？可以这样理解：类定义是实例的定义，而由该类定义的特定项就是一个实例。假设我们有一个定义文档（标题、作者等）的类。那么描述特定文档的对象就是一个实例。\n\
  \n通常，对象是代表系统中某个重要部分的软件对象。（系统中不重要的部分应该被消除——大多数软件开发人员天生或很快就会成为极简主义者。）有时，这些对象对应于实际的物理物品。例如，运输软件可能有一个代表运输容器的类，该类的每个实例都对应世界上某个地方的一个真实运输容器。\n\
  \n然而，更常见的情况是，软件中的对象定义的是抽象项——即并非真实存在的事物。例如，`Math` 类定义了一个圆周率常量。你无法触摸到一个数学常量，尽管它对你来说可能感觉很真实（上足够多的数学课，这类东西就会显得非常真实）。但即使是数学常量，也比软件开发中出现的某些东西更不抽象。这是因为像\
  \ Java 这样的面向对象语言允许我们定义纯抽象的对象，例如 `Shape` 类。在许多与形状相关的系统中，`Shape` 本身永远不能被实例化；你必须创建另一个扩展了\
  \ `Shape` 的类（例如 `Circle` 类）的实例。有时，一个抽象类会扩展另一个抽象类，从而形成多层抽象。\n\n让我们考虑其他一些例子。以下都是我为一个或另一个系统开发过的对象：\n\
  \n*   一个处理按钮点击的类\n*   一个包含三维结构（如金字塔或球体）信息的类\n*   一个描述文档中段落（字体样式、字体大小等）的类\n*   一个定义打印作业的类（例如在文字处理器中点击“打印”时创建的类）\n\
  \n请注意，我始终说的是“一个类”。Java 中的所有对象都是类。枚举是一种特殊的类，因为每个枚举都有一个由编译器提供的隐式类。Java 也有基本类型和接口，但基本类型和接口不是对象。正如我们在前面章节中看到的，基本类型定义值，但它们不是对象。我们稍后会解释为什么基本类型和接口都不是对象。现在，只需记住\
  \ Java 对象是类的一个实例，而类是定义某些有用功能的代码。即使是抽象类也定义了有用的东西，尽管它依赖于扩展它的类来提供剩余的信息。\n\n面向对象语言支持三个重要特性：\n\
  \n*   封装\n*   继承\n*   多态\n\n我们依次来看这些特性。\n\n\n\n### 封装\n\n*封装*意味着一个对象以其他对象无法查看或修改其内容的方式持有自身内容（尽管我们有许多方法可以提供对类内容的访问）。这样一来，一个对象的内容就不会与另一个对象的内容纠缠在一起。考虑到一个应用程序可能包含数千个类，将所有类的各个部分分开管理是一个非常好的主意。否则，我们将永远无法找到任何东西。\n\
  \nJava 开发者在创建新类（或修改现有类）时的一个关键考虑因素，是弄清楚哪些部分应该对其他类可见。另一个相关的考虑因素是，哪些类能够看到（并可能修改）当前类的内容。正如这所暗示的，你可以让类的某一部分仅对选定的其他类可见，而不是对所有其他类可见。我们将在第\
  \ 3 章“数据类型”中介绍访问修饰符的机制。我们将在下一章中介绍何时应该使用各种访问修饰符。\n\n### 继承\n\n*继承*定义了面向对象系统中类之间（以及对象之间）的关系。Java\
  \ 中的所有类都有一个其他对象作为其父类。Java 开发者说一个对象*扩展*了另一个对象。如果你稍微思考一下，很快就会意识到必须有一个对象作为这一切的起点。这个特殊的对象（唯一没有父类的对象）是一个名为\
  \ `Object` 的类。所有其他 Java 对象都是 `Object` 的后代（有时经过多层继承）。\n\n让我们从生物学领域举一个简单的例子（对生物学家表示歉意，因为我们做了极大的简化，并感谢\
  \ Valentine Human Resources 的 Caroline Valentine 提供的思路）。假设我们想要表示某些动物（特别是猫、狗和老鼠）。它们都是哺乳动物，所以我们可能从一个名为\
  \ `Mammal` 的类开始。\n\n然后我们有另外三个类，分别叫做 `Cat`、`Dog` 和 `Mouse`。这些类都扩展了 `Mammal` 类。\n\n\
  ![images](img/square.jpg) **注意** 你可以通过问一个简单的问题来判断创建一个新类是否正确：这个新类是否属于旧类？这被称为“is-a”测试或“is-one-of”测试。猫是一种哺乳动物，所以我们可以让\
  \ `Cat` 类扩展 `Mammal` 类。对于 `Dog` 和 `Mouse` 类也是如此。如果我们有一个 `Snake` 类，通过扩展 `Mammal`\
  \ 类来创建它是不明智的。这并不总是那么显而易见，但当你需要弄清楚新类应该扩展哪个类时，这是一个很好的起点。\n\n当然，猫、狗和老鼠之间存在显著差异，我们将在本章后面讨论多态性时介绍如何对这些差异进行建模。\n\
  \n#### 多重继承\n\nJava 不支持*多重继承*（尽管接口为我们提供了一种获得多重继承大部分好处的方法，而无需面对随之而来的一个大问题，我们稍后会讨论这个问题）。也就是说，一个对象不能扩展多个父对象。其他语言（如\
  \ C++）确实允许继承多个父类。Java 的设计者认为，Java 可以在没有这种复杂性的情况下实现。多重继承的问题在于，一个类可以扩展另外两个类，而这两个类又可能扩展同一个祖先类。你的代码如何知道哪个祖先类提供了正确的信息？这有时被称为“菱形问题”，因为它在图形上看起来像一个菱形（参见图\
  \ 6-1）。\n\n![images](img/0601.jpg)\n\n***图 6-1.** 菱形问题*\n\n你可能认为菱形问题很容易避免。然而，请记住，大多数软件是由多个团队共同创建的。在撰写本文时，我正在与两个开发团队和另一个国家的一个测试团队合作，创建一个软件产品，同一家公司中至少有\
  \ 75 个其他软件开发团队将以此为基础开发更多软件。在这种情况下，不难想象一个团队可能实现一个扩展某个类的类，另一个团队可能扩展同一个类，并且，如果我们有多重继承，客户端团队中的某个人可能会尝试同时扩展这两个类，从而直接遇到菱形问题。很容易陷入这样一种情况：单个方法可能扩展来自其他两个类的方法。编译器如何知道我们打算使用哪个方法？Java\
  \ 通过不提供多重继承来防止这一切。\n\n然而，Java 确实提供了一种方法，可以从多重继承中获得大部分好处，而几乎不会遇到问题。你可以在你的类中将其他类的实例作为字段包含进来。这样，你的类就可以访问这些类中的公共（或包级，如果你的类在同一个包中）字段和方法。因为你无法访问私有部分，也无法包含抽象类，所以（如果这些其他类设计良好）你就能很好地避免因拥有多个祖先而产生的问题。这种技术有时被称为*组合*，因为你的新类部分地由其他类的公开可用部分组合而成。与所有技术一样，请确保你确实需要这样做。让你的对象保持越简单、越清晰，你的程序就越容易运行，你的同事开发者也会越欣赏你的工作。\n\
  \n以下是一个组合技术非常适用的例子（感谢 Uplogix 的 Jeremy Conner 提供的思路）。考虑恐怖电影中的经典怪物：狼人。通常，狼人更像人而不是狼（仅仅因为穿着毛茸茸戏服的演员本身就是人类而不是狼）。因此，我们可以通过创建一个名为\
  \ `Wolfman` 的新类来对狼人进行建模，该类扩展 `Man`（`Man` 本身可能扩展 `Human`，并与 `Woman` 平行），并将 `Wolf`\
  \ 类的一个实例作为其字段之一。然后，我们可以获得一个人的所有属性和一只狼的大部分属性（任何声明为公共的属性），从而拥有一个狼人的软件模型。\n\n#### 通过接口建模行为\n\
  \nJava 包含了接口的概念。一个*接口*是一组方法（基本上是对象可以做的事情），如果一个对象使用了（Java 中的关键字是 `implements`）该接口，那么该对象必须拥有这些方法。特别是，实现某个接口的类必须实现该接口中的所有方法。让我们回到我们的三个具体类：`Cat`、`Dog`\
  \ 和 `Mouse`。\n\n猫是捕食者和食肉动物。狗是食肉动物（关于它们是否是杂食动物存在一些争论，但为了我们的例子，我们称它们为食肉动物），并且既是捕食者也是食腐动物。老鼠是食草动物，既不是捕食者也不是食腐动物。因此，我们可以创建一组接口来对我们选择的动物的行为进行建模。我们有以下接口：`Predator`、`Scavenger`、`Carnivore`\
  \ 和 `Herbivore`。如果我们添加熊，我们还需要一个 `Omnivore` 接口。\n\n\n\n#### 抽象类\n\n有时，Java 开发者会编写一个永远不应被实例化的类。也就是说，这个类永远不会有关联的对象。这样的类通常作为其他类的基础。我们的\
  \ `Mammal` 类就是这样一个例子。现实世界中的所有哺乳动物都是特定类型的哺乳动物，而不仅仅是“哺乳动物”。猫、狗、老鼠、人类、鲸鱼等等当然都是哺乳动物，但它们都有更具体的名称和更具体的特征。因此，并不存在一种通用的“哺乳动物”实体。所以，我们不希望任何人创建\
  \ `Mammal` 类的实例，因为那会是糟糕的建模。\n\nJava 允许开发者使用 `abstract` 关键字声明一个类永远不应有实例。在 Java 中，`abstract`\
  \ 意味着该类仍然可以被其他类继承，但永远不能被实例化（转化为对象）。回到我们的例子，我们可以让 `Mammal` 成为 `abstract`（因为不存在通用的哺乳动物这种东西），同时仍然让\
  \ `Cat`、`Dog` 和 `Mouse` 继承 `Mammal`（因为猫、狗和老鼠都是哺乳动物）。\n\n难点在于判断一个类何时应该是抽象的。对动物王国进行建模是一个简单的例子，所以不难看出\
  \ `Mammal` 应该是一个抽象类。\n\n与抽象类相对的概念通常被称为*具体类*。具体类是默认的，因此没有对应的关键字。在大多数程序中，大多数类都是具体类。\n\
  \n##### 抽象类中的方法\n\n抽象类可以包含抽象方法。任何继承包含抽象方法的类的类都必须实现该方法。例如，我们的 `Mammal` 类包含一个抽象的 `speak()`\
  \ 方法。任何继承 `Mammal` 的类都必须实现 `speak` 方法，并且该实现必须具有相同的签名。因此，在这种情况下，实现必须返回 `void` 且不接受任何参数。\n\
  \n抽象类也可以包含常规方法，其子类可以直接使用这些方法而无需实现它们。代码清单 6-1 展示了 Mammal 类中的两种方法。\n\n***代码清单 6-1**.\
  \ 抽象类中的方法*\n\n`package com.apress.java7forabsolutebeginners.examples.animalKingdom;`\n\
  \n`abstract class Mammal {`\n`  // 这是一个发出声音的方法。`\n`  // 每个子类都必须实现它。`\n`  abstract\
  \ void speak();`\n\n`  // 所有子类都可以调用此方法，`\n`  // 并且不需要实现它们自己的版本`\n`  protected void\
  \ sayWhatIAm() {`\n`    System.out.println(\"I am a mammal\");`\n`  }`\n`}`\n\n\
  这是一个简单的方法，但它提出了一个有趣的观点。继承 `Mammal` 类的类也可能具有相同签名的方法。这些方法被称为*重写*此方法。例如，`Cat` 类可能有自己的\
  \ `sayWhatIAm` 方法。假设它完全相同，但向 `System.out` 打印的是“I am a cat”。那么，要使用 `Mammal` 类的方法，我们必须使用\
  \ `super` 关键字，如代码清单 6-2 所示。\n\n![images](img/square.jpg) **注意** 我将 `sayWhatIAm()`\
  \ 方法设为 `protected`，这样只有 `Mammal` 类的子类才能说它们是哺乳动物。如果它是 `public` 的，我们可能会让 `Snake` 对象说它们是哺乳动物，那就不对了。设为\
  \ `protected` 会强制子类中的任何重写方法也必须是 `protected` 的。因此，`Cat` 类中的 `sayWhatIAm()` 方法必须是\
  \ `protected` 的。不过，这完全合理。如果我们添加 `Lion` 和 `Tiger` 类，我们希望它们说自己是哺乳动物和猫科动物。\n\n***代码清单\
  \ 6-2**. 重写了 sayWhatIAm 方法的 Cat 类*\n\n`package com.apress.java7forabsolutebeginners.examples.animalKingdom;`\n\
  \n`class Cat extends Mammal {`\n`  // 实现超类的抽象方法`\n\n`  private static int numberOfCats;`\n\
  \n`  Cat() {`\n`    numberOfCats++;`\n`  }`\n\n`  public static final int getNumberOfCats()\
  \ {`\n`    return numberOfCats;`\n`  }`\n\n`  @Override`\n`  protected void sayWhatIAm()\
  \ {`\n`    System.out.println(\"I am a cat\");`\n`    super.sayWhatIAm();`\n`  }`\n\
  `}`\n\n如果一个测试程序随后调用了 `Cat` 对象的 `sayWhatIAm()` 方法，输出将如代码清单 6-3 所示。\n\n***代码清单 6-3.**\
  \ Cat 对象的 sayWhatIAm 方法的输出*\n\n`I am a cat`\n`I am a mammal`\n\n这是一个简单的例子，但我希望它能让你了解如何利用基类和子类的特性，为用户提供有意义的信息和其他功能。诀窍在于知道将哪些对象放在哪个层级。一条经验法则是：尽可能将每个对象放在类层次结构的高层。这就是为什么我在\
  \ `Mammal` 层级定义 `speak` 方法，但在各个具体动物层级实现它的原因。\n\n\n\n#### 静态成员\n\n类可以拥有*静态成员*，包括字段、方法以及其他类（类中的类称为*内部类*）。类的静态成员通常被称为*类成员*。关于类成员，需要了解的重要一点是：该成员永远只存在一个实例。如果我们的\
  \ `Cat` 类有一个静态方法，我们可能会有十个不同的 `Cat` 类实例，但该静态方法始终只有一个。当 `Cat` 类的每个成员都想使用该方法时，这就成了问题。这些实例最终会相互等待。\n\
  \n不过，静态成员也有其用途。当你希望确保某个特定类的所有实例化对象中，只有唯一一个某事物存在时，`static` 关键字就是实现方式。`static` 关键字的一个明显用途是在\
  \ `main` 方法上。想象一下，如果程序类的每个实例都能启动一个新程序，我们很快就会用程序淹没操作系统。静态成员一个更常见且有用的用途是实现计数器。假设我们要跟踪创建了多少个\
  \ `Cat` 对象。那么 `Cat` 类可以包含一个名为 `numberOfCats` 的静态字段，并且该类的构造函数会在每次创建 `Cat` 对象时递增该字段。这段代码看起来就像清单\
  \ 6-4 中的 `Cat` 类。\n\n***清单 6-4.** 计数 `Cat` 对象*\n\n`class Cat extends Mammal{`\n\n\
  `  static int numberOfCats;`\n\n`  Cat() {`\n`    numberOfCats++;`\n`  }`\n`}`\n\
  \n要获取 `Cat` 对象的数量，我们可以实现一个方法来返回值，或者直接引用该字段并获取其值。要引用静态成员，我们使用类名，后跟句点，再跟静态成员名，如清单\
  \ 6-5 所示。\n\n***清单 6-5** 引用静态成员*\n\n`System.out.println(Cat.numberOfCats);`\n\n\
  然而，我们通常应该更倾向于将静态字段设为私有，并创建一个 get 方法来返回该值。否则，我们会将该字段暴露给其他类进行设置，这很可能是一个 bug。清单 6-6\
  \ 展示了修改后的 `Cat` 类，它使用了私有字段模式（模式是计算机科学中常见的惯用法——有很多种模式，如果你从事编程工作，它们是非常值得研究的东西）。\n\n\
  ***清单 6-6**. 带有私有静态字段的 Cat 类*\n\n`class Cat extends Mammal{`\n\n`  private static\
  \ int numberOfCats;`\n\n`  Cat() {`\n`    numberOfCats++;`\n`  }`\n\n`  public static\
  \ final int getNumberOfCats() {`\n`    return numberOfCats;`\n`  }`\n`}`\n\n你注意到这个方法也是静态的吗？无论我们创建多少个\
  \ `Cat` 对象，都只需要一个这样的方法，因此将 `getNumberOfCats` 设为静态是合理的。我们还将其设为 `final`，因为子类没有理由实现自己的\
  \ `getNumberOfCats` 方法。因此，如果我们有扩展 `Cat` 类的 `Tiger` 和 `Lion` 类，除非这些方法有不同的参数，否则它们不能拥有\
  \ `getNumberOfCats` 方法。\n\n### 多态\n\n*多态*（Polymorphism）源自希腊语 poly（意为“多”）和 morph（意为“形态”），意指同一事物可以具有不同的形态。这是许多领域（包括化学、生物学，当然还有计算机科学）中的一个技术术语。每个领域都根据其研究范畴来定义该术语，但归根结底都是指具有多种形态。\n\
  \n在面向对象的计算机语言中，多态的一种形式是不同类能够对相同的输入做出适当的响应。因此，我们的 `Mammal` 类可能会定义一个 `speak` 方法。`Cat`\
  \ 类会将 speak 方法实现为喵喵叫，狗实现为汪汪叫，老鼠实现为吱吱叫。它们都实现了相同的方法，但各自以适当的方式实现。这些方法被称为被重写。子类中的方法用自己的行为替换了父类的行为——也就是说，它们重写了父类的方法。\n\
  \n另一种多态（称为*重载*）是指相同的行为根据传递给该行为（或方法）的对象而具有不同的含义。例如，我们的 Cat 对象可能有两个名为 chase 的方法，`Cat`\
  \ 的实例对于 `chase(Tail)` 方法和 `chase(Mouse)` 方法会表现出不同的行为。也就是说，我们有同名的方法，但它们有不同的签名（一个接受\
  \ `Tail` 对象作为参数，另一个接受 `Mouse` 对象作为参数）。这是方法重载的经典例子。\n\n\n\n### Java 中的动物类\n\n清单 6-7\
  \ 展示了本章前面用作示例的动物类的不完整定义。当开发者编写这类代码时，他们是在“创建桩代码”或“编写存根代码”。*桩代码*意味着我们创建了结构，但至少将部分细节留待以后处理或由他人完成。\n\
  \n你应该将代码放入包中。这样，一个包中的代码就不会干扰其他包中的代码。如果你把所有内容都放在默认包中，很快就会遇到想要使用已用过的名称来调用类或接口的问题。我建议你养成将所有代码放入包中的习惯。本章使用的包包含一个\
  \ `Predator` 接口。想象一下，如果你想定义另一个对象模型，其中包含 Predator 无人机（近年来因战争而闻名的遥控飞机）。这正是包如此有用的那种纠缠情况。因此，我们为每个类和接口添加一个包定义。在本例中，它们位于同一个包中。\n\
  \n***清单 6-7.** 完成的 Mammal 类*\n\n`package com.apress.java7forabsolutebeginners.examples.animalKingdom;`\n\
  \n`abstract class Mammal {`\n`  // 这里是发出声音的方法。`\n`  // 每个子类都必须实现它。`\n`  abstract\
  \ void speak();`\n\n`  // 所有后代类都可以调用此方法`\n`  // 并且不需要实现它们自己的版本`\n`  protected void\
  \ sayWhatIAm() {`\n`    System.out.println(\"I am a mammal\");`\n`  }`\n`}`\n\n\
  `Mammal` 类是我们其他类的基础。正如我们之前讨论的，我们从不希望创建 `Mammal` 对象，因此它是抽象的。它还有一个抽象方法，因此每个扩展 `Mammal`\
  \ 的类都必须实现一个具有相同签名（返回 void 且不接受参数）的 speak 方法。最后，它包含一个普通方法，后代类可以使用该方法（参见清单 6-8）。\n\
  \n***清单 6-8**. 完成的 Cat 类*\n\n`package com.apress.java7forabsolutebeginners.examples.animalKingdom;`\n\
  \n`class Cat extends Mammal implements Predator, Carnivore {`\n\n`  private static\
  \ int numberOfCats;`\n\n`  Cat() {`\n`    numberOfCats++;`\n`  }`\n\n`  public static\
  \ final int getNumberOfCats() {`\n`    return numberOfCats;`\n`  }`\n\n`  @Override`\n\
  `  protected void sayWhatIAm() {`\n`    System.out.println(\"I am a cat\");`\n`    super.sayWhatIAm();`\n\
  `  }`\n\n`  // 实现超类的抽象方法`\n`  @Override`\n`  void speak() {`\n`    System.out.println(\"\
  The cat says, \\\"meow.\\\"\");`\n`  }`\n\n`  // 这里是重载的示例`\n`  void chase(Mouse\
  \ mouse) {`\n`    // 追逐老鼠`\n`  }`\n`  public void chase (Object tail) {`\n`    //\
  \ 追逐自己的尾巴`\n`  }`\n\n`  // Predator 接口的方法`\n`  @Override`\n`  public void hunt()\
  \ {`\n`    // 去捕猎`\n`  }`\n\n`  // Carnivore 接口的方法`\n`  @Override`\n`  public void\
  \ eat (Object freshMeat) {`\n`    // 吃鲜肉`\n`  }`\n`}`\n\n因为我们在前面的示例中一直使用 Cat 类，所以你已经知道它扩展了\
  \ `Mammal` 类。正如我们在“通过接口建模行为”一节中讨论的，它还实现了 `Predator` 和 `Carnivore` 接口。毕竟，猫是捕食者和食肉动物（参见清单\
  \ 6-9）。\n\n***清单 6-9.** 完成的 Dog 类*\n\n`package com.apress.java7forabsolutebeginners\
  \ .examples.animalKingdom;`\n\n`class Dog extends Mammal implements Predator, Carnivore,\
  \ Scavenger {`\n`  // 实现超类的抽象方法`\n`  @Override`\n`  void speak() {`\n`    System.out.println(\"\
  The dog says, \\\"bark.\\\"\");`\n`  }`\n`    // Predator 接口的方法`\n`  @Override  public\
  \ void hunt() {`\n`    // 去捕猎`\n`  }`\n\n`  // Carnivore 接口的方法`\n`  @Override  public\
  \ void eat (Object freshMeat) {`\n`    // 吃鲜肉`\n`  }`\n\n`  // Scavenger 接口的方法`\n\
  `  @Override  public void eat (Object carrion, boolean tooOld) {`\n`    if (tooOld)\
  \ {`\n`      // 别吃那个！`\n`    } else {`\n`      // 大口咀嚼`\n`    }`\n`  }`\n`}`\n\n\
  `Dog` 类也扩展了 `Mammal` 并实现了 `Predator` 和 `Carnivore` 类。然而，狗也会 scavenge 食物，因此 `Dog`\
  \ 类也实现了 `Scavenger` 接口。\n\n现在，让我们转向另一种仍然是哺乳动物但行为不同的动物：老鼠。清单 6-10 定义了我们的 Mouse 对象。\n\
  \n***清单 6-10.** 完成的 Mouse 类*\n\n`package com.apress.java7forabsolutebeginners .examples.animalKingdom;`\n\
  \n`class Mouse extends Mammal implements Herbivore{`\n`  // 实现超类的抽象方法`\n`  @Override`\n\
  `  void speak() {`\n`    System.out.println(\"The mouse says, \\\"squeak.\\\"\"\
  );`\n`  }`\n`    // Herbivore 接口的方法`\n`  @Override  public void eat (Object plantMatter)\
  \ {`\n`    // 吃植物`\n`  }`\n`}`\n\n与我们的其他动物对象一样，`Mouse` 类扩展了 `Mammal`。然而，老鼠不是食肉动物、捕食者或\
  \ scavenger。相反，老鼠是食草动物，因此我们让 `Mouse` 类实现 `Herbivore` 接口。\n\n现在让我们转向接口。我们从 Predator\
  \ 接口开始（参见清单 6-11）。\n\n***清单 6-11**. Predator 接口*\n\n`package com.apress.java7forabsolutebeginners\
  \ .examples.animalKingdom;`\n\n`interface Predator {`\n`  public void hunt();`\n\
  `}`\n\n所有捕食者都会捕猎，因此我们的 `Predator` 接口包含一个 hunt() 方法。任何实现此 `Predator` 接口的类都必须实现一个具有相同签名（void\
  \ 且无参数）的 `hunt()` 方法。如果我们有一个实现 Predator 接口的 `Drone` 类，该接口可能会实现一个 `launch(Missile\
  \ hellfire)` 方法，这与适合动物的 `Predator` 接口不同（至少在科幻小说领域之外）。\n\n让我们继续讨论 `Carnivore` 接口，如清单\
  \ 6-12 所示。\n\n***清单 6-12**. Carnivore 接口*\n\n`package com.apress.java7forabsolutebeginners\
  \ .examples.animalKingdom;`\n\n`interface Carnivore {`\n`  public void eat(Object\
  \ freshMeat);`\n`}`\n\n食肉动物吃鲜肉，因此我们指定一个名为 `freshMeat` 的对象作为该接口唯一方法的参数。\n\n将其与 `Scavenger`\
  \ 接口进行比较，如清单 6-13 所示。\n\n***清单 6-13**. Scavenger 接口*\n\n`package com.apress.java7forabsolutebeginners\
  \ .examples.animalKingdom;`\n\n`interface Scavenger {`\n`  public void eat(Object\
  \ carrion, boolean tooOld);`\n`}`\n\nScavenger 吃它们能找到的任何肉。当然，一个问题是有些肉可能太臭而不能吃，因此我们包含一个布尔参数，可以用来测试该问题。\n\
  \n最后，我们来到 Herbivore 接口，如清单 6-14 所示。\n\n***清单 6-14**. Herbivore 接口*\n\n`package com.apress.java7forabsolutebeginners\
  \ .examples.animalKingdom;`\n\n`interface Herbivore {`\n`  public void eat(Object\
  \ plantMatter);`\n`}`\n\nHerbivore 接口与 Carnivore 和 Scavenger 接口类似，但食草动物吃植物，因此我们指定一个名为\
  \ plantMatter 的对象作为唯一参数。\n\n最后，这是一个名为 `AnimalVoices` 的程序类，它让我们的动物说话（参见清单 6-15）。\n\
  \n***清单 6-15.** 让我们的动物说话*\n\n`package com.apress.java7forabsolutebeginners .examples.animalKingdom;`\n\
  \n`public class AnimalVoices {`\n\n`  public static void main(String[] args) {`\n\
  `    // 创建我们的动物实例`\n`    Cat cat = new Cat();`\n`    Dog dog = new Dog();`\n`    Mouse\
  \ mouse = new Mouse();`\n\n`    // 让我们的动物说话`\n`    cat.speak();`\n`    dog.speak();`\n\
  `    mouse.speak();`\n`  }`\n`}`\n\n如你所见，它所做的就是创建每种动物的一个实例，然后让每个动物说话。\n\n\n\n###\
  \ 关于粒度的课程\n\n为了让三种动物发出它们各自的声音，却用了五个类和四个接口，这看起来对象数量似乎有点多。老实说，如果我要编写一个只输出三行文本的程序，我只会写一个类。然而，动物王国示例的目的是为了展示如何在\
  \ Java 中建模一个（并非十分）复杂的系统。\n\n如果我真的要编写一个模拟动物王国的系统，我会使用更多的类。首先，如果我是认真做这件事，我不会将通用对象传递给\
  \ `eat` 方法。我会有一个名为 `Food` 的抽象类，以及名为 `FreshMeat`、`Carrion` 和 `PlantMatter` 的具体类，并且很可能还会有这些类的子类。\n\
  \n如果你将程序“分解”成尽可能多的类和接口，你将获得两个好处：\n\n*   **可扩展性**\n*   **可维护性**\n\n**可扩展性**意味着你可以轻松地让程序做更多当前做不到的事情。以我们的动物程序为例，我们可以快速添加更多动物，并让这些动物做更多事情（例如行走、游泳、玩耍和睡觉）。如果我们扩展程序，我们可能还会扩展食物的细节，例如让\
  \ `PlantMatter` 类拥有 `Nut` 和 `Grain` 子类。\n\n**可维护性**意味着当你发现错误时，可以轻松找到代码出错的位置。如果你所有的代码都集中在少数几个类中（或者最糟糕的情况，只有一个类），那么定位问题就会更加困难。当然，调试器可以带你到正确的代码行，但你无法知道问题出在动物的定义上、哺乳动物的定义上，还是其行为（例如捕食者或食草动物）的定义上。创建多个类和接口极大地有助于调试，因为你可以看到是哪一部分包含了问题点。换句话说，粒度使得创建无错误的程序变得更加容易。\n\
  \n真实的程序需要粒度，优秀的程序员会努力实现它。\n\n### 按引用传递与按值传递\n\n**按引用传递**和**按值传递**指的是信息如何从一个对象传递到另一个对象。在\
  \ Java 中，几乎所有信息的传递都是通过方法进行的，但信息也可以通过对象内部的字段传递。\n\n严格来说，Java 只使用按值传递。然而，它传递的值根据传递的内容而有很大不同。对于基本类型，Java\
  \ 传递的是该基本类型的一个副本。因此，如果你将一个 `int` 传递给一个方法，该方法接收到的是该 `int` 的一个副本，而不是原始的 `int`。对于对象，Java\
  \ 传递的是一个指针。**指针**是对象在内存中的地址。这个微妙的区别让许多 Java 新手开发者感到困惑。几个例子应该能（我希望）阐明这个问题（参见清单 6-16）。我说“我希望”，是因为这个话题甚至会让经验丰富的开发者感到棘手。\n\
  \n***清单 6-16.** 按引用传递与按值传递*\n\n`package com.apress.java7forabsolutebeginners .examples.hello;`\n\
  \n`public class IntegerWrapper {`\n\n`  public int objectInt = 0;`\n`}`\n\n`package\
  \ com.apress.java7forabsolutebeginners .examples.hello;`\n\n`public class Hello\
  \ {`\n\n`  static int primitiveInt = 0;`\n`  static IntegerWrapper intWrapper =\
  \ new IntegerWrapper();`\n\n`  public static void main(String[] args) throws Exception\
  \ {`\n`    passBy(primitiveInt, intWrapper);`\n`    System.out.println(\"primitiveInt\
  \ = \" + primitiveInt +`\n`        \"; intWrapper.objectInt = \" + intWrapper.objectInt);`\n\
  `  }`\n`    public static void passBy(int primitiveInt, IntegerWrapper intWrapper)\
  \ {`\n`    primitiveInt++;`\n`    intWrapper.objectInt++;`\n`  }`\n`}`\n\n如你所见，这个程序有两个类：`IntegerWrapper`\
  \ 和 `PassByTest`。`IntegerWrapper` 是一种将基本类型转换为对象的方法（顺便说一句，千万不要真的像这样编写对象——这是一种不好的形式，但为了尽可能简单地说明问题，这样做是合理的）。`PassByTest`\
  \ 演示了按引用传递和按值传递。当我们运行 `PassByTest` 时，它的输出是 `primitiveInt = 0; intWrapper.objectInt\
  \ = 1`。\n\n当你将一个基本类型传递给一个方法时，JVM 会保留原始值，并创建一个具有相同值的新基本类型（字面意义上的副本）供方法使用。因此，JVM 拥有两个值：`PassByTest`\
  \ 中的原始 `primitiveInt` 字段，以及 `passBy` 方法中的 `primitiveInt` 参数。这就是问题的核心所在：因为 JVM 创建了一个新的基本类型，所以原始值永远不会被修改。\n\
  \n即使 `passBy` 方法返回了基本类型的值，它也不会改变原始值。在我们重新赋值之前，原始值始终保持其最初设置的值（本例中为 0）。如果我们将方法的返回值赋给原始的基本类型变量，那就可以生效。但同样，我们有两个不同的值，我们将新值（由方法创建）赋给了旧值。请考虑清单\
  \ 6-17 中修改后的 `PassByTest` 类。\n\n***清单 6-17.** 为 passBy 方法添加返回值的 PassByTest*\n\n\
  `package com.apress.java7forabsolutebeginners .examples.hello;`\n\n`public class\
  \ Hello {`\n\n`  static int primitiveInt = 0;`\n`  static IntegerWrapper intWrapper\
  \ = new IntegerWrapper();`\n\n`  public static void main(String[] args) throws Exception\
  \ {`\n`    passBy(primitiveInt, intWrapper);`\n`    System.out.println(\"primitiveInt\
  \ = \" + primitiveInt +`\n`        \"; intWrapper.objectInt = \" + intWrapper.objectInt);`\n\
  `  }`\n`    public static int passBy(int primitiveInt, IntegerWrapper intWrapper)\
  \ {`\n`    primitiveInt++;`\n`    intWrapper.objectInt++;`\n`    return primitiveInt;`\n\
  `  }`\n`}`\n\n现在 `passBy` 方法返回一个 `int`，但输出保持不变（`primitiveInt` 仍然是 0）。我知道我已经反复强调过这一点，但再次说明，方法中的\
  \ `primitiveInt` 与类中的 `primitiveInt` 字段是不同的基本类型变量。请记住，编译器在调用方法时会创建它的一个副本。\n\n现在，让我们看看\
  \ `IntegerWrapper.objectInt` 发生了什么。因为 `IntegerWrapper` 是一个对象，所以传递的值是它在内存中的地址（即指向该对象的指针）。内存中只有一个名为\
  \ `intWrapper` 的 `IntegerWrapper` 对象（因为我们只对该类使用了一次 `new` 关键字）。因此，对 `intWrapper`\
  \ 所做的任何操作都是针对同一个对象进行的。因此，当我们递增 `intWrapper.objectInt` 时，这个更改会传回 `main` 方法，因为 `main`\
  \ 方法仍然查看的是内存中的同一个位置。也就是说，`intWrapper` 仍然位于内存中的同一位置，因此我们可以更改那个对象，而无法更改基本类型。\n\n如果这一切看起来令人困惑，那你并不孤单。这个问题也曾让我困惑不已，以至于三十年后，我仍然清楚地记得我第一次意识到某些东西（实际上是\
  \ Fortran 中的一个函数）是基于按引用传递模型工作时的情景。这是一个棘手的概念，但你必须掌握它才能在 Java（以及许多其他语言）中编程。\n\n顺便说一句，Java\
  \ 按引用传递对象有其特殊原因。假设你有一个复杂的对象。这样的类可能包含几个字段，其中许多字段本身可能又是对其他对象的引用（回想一下组合技术），以此类推，可以达到你能想象的任何深度（对象栈，正如人们所称，通常有很多层）。这样一个对象的值到底是什么？为了给每个将该对象作为参数的方法创建一个临时副本，会消耗多少内存和处理时间？如果我们递归地使用这样一个对象（即对象可以修改自身），会发生什么？如果你思考这些问题片刻，你就会明白为什么对象是按引用（即作为内存地址）传递的。否则，Java\
  \ 程序的创建将变得异常困难，并且性能会比现在差得多。\n\n\n\n### 摘要\n\n关于对象建模的书籍已经出版了很多（毫无疑问未来还会更多）。它是面向对象编程的基础部分，但也很容易陷入不良实践。掌握对象建模既需要经验也需要学习：经验用于观察对象模型的实际运作，学习则用于了解其中存在的问题。本章通过一个简单示例（动物王国中的几个成员）进行讲解，但这绝非对象建模的完整论述。\n\
  \n在此过程中，我们学习了何时使用抽象类、静态方法和 final 方法，以及静态字段。我们还了解了为什么通常希望将字段设为私有并通过 get 方法访问，而不是让字段在类外部可见。\n\
  \n此外，我们还了解了一些关于粒度化编程（也称为“分块”、模块化及其他类似名称）的价值。请记住将程序“分块”为类和接口，这样既便于理解，也便于在出现问题时进行调试。\n\
  \n最后，我们深入探讨了按引用传递与按值传递这一棘手的理论问题。具体来说，我们了解到 Java 严格采用按值传递。然而，其中某些值是指针（即对象所在的内存地址）。因此，修改已传递的对象会修改原始对象，而修改基本类型则只会修改该基本类型的本地副本，而非原始值。\n\
  \n## 第 7 章\n\n## 编写用户界面\n\n大多数想要开发软件的人，其初衷都是为了编写具有某种丰富用户界面的程序。这种丰富的用户界面可能通过一组窗口实现（例如\
  \ Word 或许多游戏所使用的界面），也可能通过网页浏览器实现。然而，有相当一部分开发者主要开发没有用户界面的程序。他们编写诸如设备驱动程序（让鼠标等设备与计算机配合工作的软件）、服务（在用户界面之外向其他程序提供信息的程序）以及数据库引擎（通常以多程序可访问的方式管理数据）等程序。因此，用户界面之外也有大量工作可做。尽管如此，工作中可见的部分仍然吸引着许多人投身这一行业，这本身并无不妥。\n\
  \n本章将向你展示如何使用 Java 内置最常用的用户界面工具包——Java Swing 来开发用户界面。我们从一些简单的基础知识开始，最后实现一个扫雷游戏。毕竟，学完之后找点乐子又何妨呢？（我敢打赌，很多购买本书的人都想编写一个游戏。这正合我意，我也喜欢游戏。）\n\
  \n### Java Swing 基础\n\nJava Swing 是一个大型工具包，支持你在非网页用户界面中通常（以及某些不常见）看到的所有元素：窗口、按钮（可包含文本、图像、两者皆有或两者皆无）、选项列表、菜单、标签、文本框、文本区域、复选框、下拉列表、绘图区域、文件选择对话框、文件保存对话框、其他对话框等等。简而言之，Swing\
  \ 提供了编写几乎任何程序所需的所有工具。某些专业程序可能需要 Swing 不具备的界面对象，但其他工具包很可能也没有。此外，Swing 确实具备创建新型界面对象的能力，不过这超出了本书的讨论范围。\n\
  \nSwing 使用 Java 基础类（JFC）。JFC 是另一个支持创建可在多种不同操作系统（如 Windows、Unix 和 MacOS）上运行的应用程序的工具包。Swing\
  \ 是 JFC 支持的多个工具包之一。其他工具包包括 Java2D 和抽象窗口工具包（AWT）。在开发 Swing 应用程序时，我们会用到 AWT 的部分功能。例如，Java\
  \ 的 Color 类就是 AWT 的一部分。\n\n有些人并不喜欢 Swing，声称它过于复杂且运行缓慢。不过，这些批评也适用于任何 UI 工具包。Swing\
  \ 虽然冗长，但与我使用过的其他 UI 工具包相比，并不算更啰嗦。当你需要指定大量属性（大小、字体、颜色、屏幕位置、条件显示等）时，每个对象都需要多行代码来指定所有这些信息。无论使用何种工具包，这都是工作的本质。至于速度，Swing\
  \ 的性能可以与其他 UI 工具包相媲美，尽管你需要对工具包有深入了解才能充分发挥其性能。同样，其他 UI 工具包也是如此。顺便提一下，本书中的代码并未针对速度进行优化。我只是向你展示基础知识。要教你关于\
  \ Swing 的一切，我恐怕得再写一本（很可能更厚的）书了。\n\n\n\n#### 基础 Swing 应用程序\n\nSwing 应用程序遵循一个相当常见的流程。首先，我们创建一个\
  \ `JFrame` 对象。`JFrame` 对象是主窗口，它容纳所有其他界面组件（按钮、文本字段等）。\n\n那么，让我们来编写一个 Swing 应用程序。`JFrame`\
  \ 类允许你创建一个窗口，将其他组件放入该窗口，并将其他窗口与第一个窗口关联起来。因此，创建 `JFrame` 对象通常是创建 Swing 应用程序的第一步。与软件开发中的惯例一样，还有其他方法，但我们遵循一种常见路径，如清单\
  \ 7-1 所示。\n\n***清单 7-1.** 最简单的 Swing 应用程序*\n\n`package com.apress.java7forabsolutebeginners.examples.swingdemo;`\n\
  \n`import java.awt.Dimension;`\n\n`import javax.swing.JFrame;`\n\n`public class\
  \ SwingDemo {`\n\n`  private JFrame frame = new JFrame(\"SwingDemo\");`\n\n`  private\
  \ void createAndShowGUI() {`\n`    frame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);`\n\
  `    frame.setPreferredSize(new Dimension(200, 200));`\n`    frame.pack();`\n`    frame.setVisible(true);`\n\
  `  }`\n\n`  public static void main(String[] args) {`\n`    SwingDemo swingDemo\
  \ = new SwingDemo();`\n`    swingDemo.createAndShowGUI();`\n`  }`\n`}`\n\n在进一步讨论之前，图\
  \ 7-1 展示了我们简单的应用程序。\n\n![images](img/0701.jpg)\n\n***图 7-1.** 简单的 SwingDemo 应用程序*\n\
  \n这个程序所做的全部工作就是创建并显示一个空窗口。不过，让我们来看看它是如何做到的。如你所见，我们首先创建了一个 `JFrame` 对象，它定义了窗口。然后，我们为该窗口指定了一些属性：大小以及是否在窗口关闭时停止应用程序。设置完这些属性后，我们使用\
  \ `pack` 和 `setVisible` 方法准备显示窗口。`pack` 方法告诉任何可以包含子组件的 Swing 组件在其内部排列子组件。`setVisible`\
  \ 方法决定一个组件是可见还是隐藏。自然，对于应用程序的主窗口，我们希望它是可见的。不过，在某些情况下，隐藏组件也能很好地工作。如果你有一个窗口，希望有时显示有时不显示，那么将该窗口保留在窗口集合中，并根据需要将其设置为可见或隐藏，比每次都从头创建它要节省大量开销，尤其是当窗口需要沿途维护一些内容时。\n\
  \n请注意 `main` 方法的行为。特别要注意，它创建了包含它的类的一个实例。这是 Swing 程序的一种常见习惯用法。否则，类中的每个方法都必须是静态的，这很麻烦（而且通常根本行不通）。我倾向于尽快创建实例，以排除这个障碍，所以我把它放在\
  \ `main` 方法中。其他开发者则倾向于等到至少有一个 Swing 组件需要实例时再创建。这很大程度上是风格问题。重要的是，你几乎总是需要在某个时刻创建基类的一个实例。\n\
  \n![images](img/square.jpg) **注意** 窗口不是程序。正如 `Jframe.EXIT_ON_CLOSE` 常量所暗示的，应用程序不需要因为其所有窗口都已关闭而停止。事实上，有些应用程序一开始就没有窗口。设备驱动和服务几乎总是在不显示窗口的情况下运行。\n\
  \n在我们继续之前，让我们多了解一些关于 JFrame 的知识。首先让很多人困惑的一点是，JFrame 会进入一个名为“内容面板”的独立组件。你可以通过 `getContentPane()`\
  \ 方法获取内容面板。你也可以通过调用 `setContentPane()` 来替换内容面板。任何扩展了 `Container` 的类都可以作为内容面板。当需要替换\
  \ `JFrame` 的内容面板时，Swing 开发者经常使用 `JPanel` 对象。你可以通过使用 `setContentPane` 来交换内容集。然而，对于隐藏和显示不同的内容集，卡片布局可能效果更好。\n\
  \nSwing 包含“布局”的概念。布局是一个定义其他对象之间关系的对象。例如，如果你使用 `BoxLayout` 对象，你的组件会水平或垂直地排成一行。另一方面，网格布局会创建一个看起来像表格的布局（由一定数量的单元格宽和一定数量的单元格高组成）。Java\
  \ 还有许多其他布局。我们在本章以及本书后面会用到其中一些。布局的一个方便之处在于，你可以在布局内部使用布局。例如，你可以使用一个设置为垂直方向的 `BoxLayout`\
  \ 对象，然后使用多个其他设置为水平方向的 `BoxLayout`，来向你的窗口添加多行组件。你也可以使用 `GridLayout` 对象达到类似的效果，但如果你每行要放置不同数量的对象，那么\
  \ `BoxLayout` 嵌套 `BoxLayout` 的方案可能效果更好。\n\n关于 Swing 中可用的所有选项，我可以讲很长时间（可能一整本书），但我只想再提一个你可能感兴趣的点。Swing\
  \ 为程序提供了不同的外观。如果你使用默认设置（就像我在本章中所做的那样），你会得到 Java 的 Metal 外观，它旨在所有操作系统上看起来都一样。要获得任何特定操作系统的原生布局，请使用\
  \ `SystemLookAndFeel` 对象。如果你使用 `SystemLookAndFeel`，在 Windows 上使用你软件的人会获得 Windows\
  \ 的外观和感觉，而其他操作系统上的用户则会获得那些操作系统的外观和感觉。缺点在于，如果 Java 无法识别系统的外观和感觉，你的程序就无法工作。这就是为什么这么多\
  \ Java 程序（尤其是为演示和书籍编写的程序）使用默认的（Metal）外观和感觉。不过，如果你只是为自己或一群使用相同操作系统的用户编写软件，并且你可以确定\
  \ Java 支持该操作系统的外观和感觉，那么你可以让你的程序看起来就像在该操作系统上运行的其他程序一样。\n\n现在，让我们对我们的程序进行更多操作。让我们从添加许多程序都有的一个功能开始：菜单。清单\
  \ 7.2 展示了如何添加菜单。\n\n***清单 7-2.** 带菜单的 Swing 程序*\n\n`package com.apress.java7forabsolutebeginners.examples.swingdemo;`\n\
  \n`import java.awt.Dimension;`\n`import java.awt.event.ActionEvent;`\n`import java.awt.event.ActionListener;`\n\
  \n`import javax.swing.JFrame;`\n`import javax.swing.JMenu;`\n`import javax.swing.JMenuBar;`\n\
  `import javax.swing.JMenuItem;`\n\n`public class SwingDemo implements ActionListener\
  \ {`\n\n`  private JFrame frame = new JFrame(\"SwingDemo\");`\n\n`  private void\
  \ addMenu(JFrame frame) {`\n`    JMenu file = new JMenu(\"File\");`\n`    file.setMnemonic('F');`\n\
  `    JMenuItem exitItem = new JMenuItem(\"Exit\");`\n`    exitItem.setMnemonic('x');`\n\
  `    exitItem.addActionListener(this);`\n`    file.add(exitItem);`\n`    JMenuBar\
  \ menuBar = new JMenuBar();`\n\n`    menuBar.add(file);`\n`    frame.setJMenuBar(menuBar);`\n\
  `  }`\n\n`  private void createAndShowGUI() {`\n`    frame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);`\n\
  `    frame.setPreferredSize(new Dimension(200, 200));`\n`    addMenu(frame);`\n\
  `    frame.pack();`\n`    frame.setVisible(true);`\n`  }`\n\n`  public static void\
  \ main(String[] args) {`\n`    SwingDemo swingDemo = new SwingDemo();`\n`    swingDemo.createAndShowGUI();`\n\
  `  }`\n\n`  @Override`\n`  public void actionPerformed(ActionEvent e) {`\n`    if\
  \ (e.getActionCommand().equals(\"Exit\")) {`\n`      System.exit(0);`\n`    }`\n\
  `  }`\n`}`\n\n同样，在我们讨论它是如何工作以及为什么能工作之前，让我们先看看它是什么样子。图 7-2 展示了我们添加的内容。\n\n![images](img/0702.jpg)\n\
  \n***图 7-2.** 带菜单的 SwingDemo*\n\n\n\n这段代码展示了为什么有人抱怨 Swing 过于冗长。我们添加了大量代码，仅仅是为了创建一个只包含一个菜单项的菜单。不过，我们可以通过良好的软件设计和编码实践来应对这个问题。可以自由编写辅助类（例如，`ActionListener`\
  \ 可以独立成一个类；这里正是应用我们在第 6 章“面向对象编程”中介绍的设计原则的好地方），并且你应该始终注意让每个方法都服务于一个明确的目的。随着程序规模变大，良好的设计和编码变得愈发重要。事实上，良好的设计是开发者的首要技能（尽管本书中我们经常保持设计简洁，以便提供更易读的示例）。\n\
  \n那么，让我们看看为了得到一个菜单，我们添加了哪些内容。我们将菜单代码封装在一个名为 `addMenu` 的独立方法中（这是一个好习惯）。如你所见，它首先创建一个名为“文件”的菜单，然后创建一个名为“退出”的菜单项，最后创建一个菜单栏来容纳该菜单项，并将该菜单栏附加到\
  \ `JFrame` 对象上。如果我们创建另一个菜单对象并将其添加到菜单栏，就会得到另一个顶级菜单对象。例如，我用来写这本书的文字处理器就有“文件”菜单、“编辑”菜单、“格式”菜单等等。每个顶级菜单在菜单栏中都是可见的，并包含一个或多个菜单项。然后，`createAndShowGUI`\
  \ 方法（程序中的控制方法）会调用 `addMenu` 方法。\n\n让菜单工作所需的另一个重要添加项是 `ActionListener`。在这里，我们通过实现\
  \ `ActionListener` 接口，让程序类本身充当了 `ActionListener`。更复杂的程序通常会有一个单独的类（或几个类）来充当监听器。*监听器*，顾名思义，就是监视（监听）程序中的事件，并允许你指定当某个事件发生时应该执行的操作。在这个例子中，我们希望当有人从“文件”菜单中选择“退出”时程序停止运行，因此我们检查该事件，并在事件发生时退出程序。Java\
  \ 提供了许多监听器，包括鼠标、键盘以及其他许多监听器，所有这些监听器都扩展了 `EventListener` 接口。在 SwingDemo 程序的下一个迭代中，我们将添加另一个监听器。\n\
  \n让我们添加几个其他常用的组件：一个按钮、一个标签、一个文本区域，以及一个称为对话框的独立子窗口。在软件开发中，对话框是一个独立的窗口，用于实现简单、明确的目的，例如显示信息或让用户选择文件。在\
  \ Windows 操作系统中，那些弹出询问你是否要执行某项操作的小窗口，大概是最著名（也最不受欢迎）的对话框。清单 7-3 展示了所有这些新组件的扩展代码。\n\
  \n图 7-3 展示了我们修改后的程序完成时的样子。\n\n![images](img/0703.jpg)\n\n***图 7-3.** 具有更多功能的 SwingDemo*\n\
  \n***清单 7-3.** 一个更复杂的 Swing 程序*\n\n`package com.apress.java7forabsolutebeginners.examples.swingdemo;`\n\
