  \ mouseListener;`\n`  MineSweeperActionListener actionListener;`\n`  MineSweeperHelper\
  \ helper;`\n\n`MineSweeper` 类的其余部分以及构成该程序的其他类都会使用这些值。顶部的三个 int 值控制游戏的大小和地雷数量。它们具有默认值（游戏小型尺寸的值），以便玩家启动扫雷应用程序时游戏可以加载一个版本。`JFrame`、`JPanel`、`JLabel`、`JButton`\
  \ 和 `Dimension` 对象帮助我们定义用户界面。最后四个对象为我们提供了一种引用其他类的方式，这些类用于使程序正常运行。\n\n总结一下我们对 `MineSweeper`\
  \ 类的探索，我们可以对整个类做出一些总体观察。这个类最有趣的地方在于以编程方式创建大量按钮，然后确定用户选择了哪一个。另一个有趣之处在于，当用户想要开始新游戏时（因为获胜、失败或选择放弃当前游戏），能够用新的雷区和按钮替换现有的雷区及其所有按钮。`minePanel`\
  \ 和 `frame` 对象上的 `validate` 方法使这成为可能。在移除现有按钮并添加新按钮后，`validate` 方法会告诉程序重新绘制雷区面板及其所有按钮。如果你自己的应用程序需要知道用户按下了哪个鼠标按钮，请像我们这里一样使用\
  \ `MouseEvent.getButton` 方法。在本例中，我们只检查左键，并将其他任何操作都视为右键单击（尽管它可能是其他按钮，例如中键）。\n\n现在让我们转向问题。这个版本的扫雷只是一个示例，因此远非完美。首先，代码并没有确定点击空白区域时应显示哪些其他按钮，而是遍历了所有地雷。我这样做是因为\
  \ `MineField` 类已经有一个 `cascade` 方法，用于确定点击后会清除哪些相邻位置。此外，我没有尝试优化性能（尽管它在我的 Windows 笔记本电脑上运行得和\
  \ Windows 扫雷游戏一样好）。另外，如你所见，我没有费心解决首次点击永远不会踩到地雷的问题。顺便说一句，如果你想解决这个问题，可以在用户点击第一个地雷按钮后再填充雷区（这称为延迟加载）。最后，我不是艺术家，所以我创建的图标并不好看。不过，它们是我们自己的，所以我们不必担心使用它们的版权问题。请随意创建或寻找你自己的图标。\n\
  \n\n\n我将 `MineField` 和 `Mine` 类与用户界面分离，是因为我可能希望将这些类作为不使用 Swing 的扫雷游戏的基础。具体来说，我可能会为了好玩而编写一个\
  \ Android 版本的扫雷（这当然不会赚钱，因为 Android 上已经有很多扫雷应用了——我的大多数项目都是为了好玩和自己的学习）。此外，这种抽象也是良好设计的体现。当你建模的现实世界情境包含离散对象时，为每个对象创建一个类是一种良好的实践。在这种情况下，地雷是一个离散的现实世界对象（游戏实际上为其添加了另一层抽象），因此\
  \ `Mine` 类是一个不错的选择。同样地，雷区也是如此，所以 `MineField` 类也是一个好的设计思路。现在，让我们继续讨论 `MineField`\
  \ 类。与 `MineSweeper` 类一样，它比我们之前在本章中看到的任何类都要大。同样，请尽可能仔细地阅读它，但如果其中部分内容现在看起来不太合理，也不必担心。在你看到整个类之后，我们会逐个方法地对其进行剖析。清单\
