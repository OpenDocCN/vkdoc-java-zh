  `    if (e.getActionCommand().equals(\"New Game\")) {`\n`      mineSweeperHelper.newGame(mineSweeper.rows,\
  \ mineSweeper.columns);`\n`      return;`\n`    }`\n`    if (e.getActionCommand().equals(\"\
