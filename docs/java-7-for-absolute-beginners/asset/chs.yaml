  `      } else {`\n`        // 我们逆向处理，因为这样做可以轻松检测何时已检查完所有目标`\n`        count--;`\n\
  `      }`\n`    }`\n`    return hit;`\n`  }`\n`  // 我们必须有此方法以满足 MouseListener 接口的约定`\n\
