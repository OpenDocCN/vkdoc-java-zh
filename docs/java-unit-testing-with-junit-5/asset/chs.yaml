  \ 接口，唯一的区别在于 `Runnable` 在其声明中不使用 `throws` 子句。这意味着你的 lambda 表达式必须捕获受检异常，然后重新抛出非受检异常。你可以通过编写自己的使用\
  \ `throws` 子句的函数式接口来避免这种麻烦。这正是 `Executable` 接口所做的。创建函数式接口的另一个优点是允许使用与你领域相对应的名称。`Executable`\
  \ 告诉我们这个 lambda 封装了一次代码执行。\n\n```\n@FunctionalInterface\npublic interface Executable\
  \ {\nvoid execute() throws Throwable;\n}\n```\n\n`assertThrows` 返回捕获到的异常，我们在下一条语句中使用它来断言异常消息，如前面的代码示例所示。\n\
