  \ 5 根据测试用例上存在的注解来区分不同版本。\n\nJUnit 5 精简了断言支持。JUnit 5 中没有 `assertThat` 方法。预期你会使用像\
  \ Hamcrest 或 AssertJ 这样的第三方断言库。我们将在后续章节中使用 AssertJ。在刚刚展示的代码中，我们使用了内置断言 `assertTrue`，它测试条件是否为真。\n\
