  \ JUnit 5 支持的各种方式来处理异常。我们将在本章末尾讨论 JUnit 5 对重复测试执行的支持。当需要处理不稳定的测试时，重复测试执行会很有帮助。当一个测试在相同的代码基础上既表现出通过又表现出失败的结果时，该测试就是不稳定的。\n\
  \n## 上下文设置\n\n让我们考虑一个用例，以确保当添加的书籍超过其容量时，`BookShelf` 会抛出异常。如下面的代码所示，当我们尝试添加的书籍超过\
