  BookShelf capacity of %d is reached. You can't add more books.\", this.capacity));\n\
  }\nbooks.add(book);\n});\n}\n```\n\n## 原始方法：使用 try-catch-fail\n\n当处理可能抛出异常的代码时，首先必须创建一个会抛出异常的条件，然后必须验证它是否是预期的异常。此外，你可能还想验证异常中包含的消息。在前面显示的代码中，我们可以通过向容量为\
  \ 2 的 `BookShelf` 添加书籍来在测试中创建异常条件。\n\n```\n@Test\nvoid throwsExceptionWhenBooksAreAddedAfterCapacityIsReached()\
  \ {\nBookShelf bookShelf = new BookShelf(2);\nbookShelf.add(effectiveJava, codeComplete);\n\
  bookShelf.add(mythicalManMonth);\n}\n```\n\n运行代码会导致测试失败，因为 `bookShelf.add(mythicalManMonth)`\
  \ 这一行会抛出异常。这不是我们想要的。测试用例不仅要引发异常，还要验证异常。代码的预期行为是引发异常；因此测试应该成功，而不是失败。\n\n处理异常的经典方法是使用\
  \ Java 内置的 try-catch 机制。try 块将包装会抛出异常的代码，而 catch 块允许我们捕获代码抛出的异常。\n\n始终在 try-catch\
  \ 块中捕获特定的异常。\n\n```\n@Test\nvoid throwsExceptionWhenBooksAreAddedAfterCapacityIsReached()\
