  \ 的支持有限。这意味着你仍然可以使用 JUnit 4 Rule API 编写/运行测试。对 Rule API 的支持定义在 `junit-jupiter-migration-support`\
  \ 模块中。对于任何新测试，你应该使用 `assertThrows` 方法，但如果你有 JUnit 4 的代码库，则可以依赖此扩展。要使用 Rule API，首先将依赖项添加到你的构建工具中。如果你使用\
  \ Gradle，请将以下内容添加到你的 `build.gradle` 文件中。\n\n```\ntestCompile 'org.junit.jupiter:junit-jupiter-migrationsupport:5.0.1'\n\
  ```\n\nMaven 用户可以将以下内容添加到他们的 `pom.xml` 中。\n\n```\n<dependency>\n    <groupId>org.junit.jupiter</groupId>\n\
  \    <artifactId>junit-jupiter-migrationsupport</artifactId>\n    <version>5.0.1</version>\n\
  \    <scope>test</scope>\n</dependency>\n```\n\n添加依赖项后，你需要通过使用 `@EnableRuleMigrationSupport`\
  \ 注解来注解你的测试类，以在测试用例中启用 Rule API 支持，如下代码所示。\n\n```\nimport org.junit.Rule;\nimport\
  \ org.junit.jupiter.api.Test;\nimport org.junit.jupiter.migrationsupport.rules.EnableRuleMigrationSupport;\n\
  import org.junit.platform.runner.JUnitPlatform;\nimport org.junit.rules.ExpectedException;\n\
  import org.junit.runner.RunWith;\n@EnableRuleMigrationSupport\npublic class BookShelfSpecWithRules\
  \ {\n@Rule\npublic ExpectedException expectedException = ExpectedException.none();\n\
  @Test\nvoid throwsExceptionWhenBooksAreAddedAfterCapacityIsReached() {\nBookShelf\
  \ bookShelf = new BookShelf(1);\nexpectedException.expect(BookShelfCapacityReached.class);\n\
  expectedException.expectMessage(\"BookShelf capacity of 1 is reached. You can't\
  \ add more books.\");\nbookShelf.add(effectiveJava, codeComplete);\n}\n}\n```\n\n\
  除了添加 `@EnableRuleMigrationSupport` 注解之外，你无需对代码库进行任何更改。\n\n现在，你可以运行测试用例，它将成功通过。\n\
  \n\n\n## 异常处理扩展\n\n如第 4 章所述，JUnit 5 通过其扩展 API 提供了可扩展性。我们将在第 7 章详细讨论扩展 API。JUnit\
  \ 5 通过扩展 API 为开发者提供了扩展点。当测试结果出现异常时，会调用 `TestExecutionExceptionHandler` 扩展接口。假设我们有一个用例，需要记录测试用例抛出的所有异常。我们可以编写\
  \ `LoggingTestExecutionExceptionHandler`，如下列代码所示：\n\n```\nimport org.junit.jupiter.api.extension.TestExecutionExceptionHandler;\n\
  import org.junit.jupiter.api.extension. ExtensionContext;\nimport java.util.logging.Level;\n\
  import java.util.logging.Logger;\npublic class LoggingTestExecutionExceptionHandler\
  \ implements TestExecutionExceptionHandler {\nprivate Logger logger = Logger.getLogger(LoggingTestExecutionExceptionHandler.class.getName());\n\
  @Override\npublic void handleTestExecutionException(ExtensionContext context, Throwable\
  \ throwable) throws Throwable {\nlogger.log(Level.INFO, \"Exception thrown \", throwable);\n\
  throw throwable;\n}\n}\n```\n\n接下来，你需要通过使用 `ExtendWith` 注解来注册你的扩展，并将 `LoggingTestExecutionExceptionHandler`\
  \ 扩展传递给它，如下列代码所示：\n\n```\n@ExtendWith(LoggingTestExecutionExceptionHandler.class)\n\
  public class BookShelfSpecWithRules {\n}\n```\n\n当你运行代码时，异常将被记录，如下所示。\n\n```\nbookstoread.LoggingTestExecutionExceptionHandler\
  \ handleTestExecutionException\nINFO: Exception thrown\nbookstoread.BookShelfCapacityReached:\
  \ BookShelf capacity of 1 is reached. You can't add more books.\nat bookstoread.BookShelf.lambda$add$0(BookShelf.java:30)\n\
  at java.util.Spliterators$ArraySpliterator.forEachRemaining(Spliterators.java:948)\n\
  at java.util.stream.ReferencePipeline$Head.forEach(ReferencePipeline.java:580)\n\
  at bookstoread.BookShelf.add(BookShelf.java:28)\nat bookstoread.BookShelfSpecWithRules.throwsExceptionWhenBooksAreAddedAfterCapacityIsReached(BookShelfSpecWithRules.java:27)\n\
  at sun.reflect.NativeMethodAccessorImpl.invoke0(Native Method)\nat sun.reflect.NativeMethodAccessorImpl.invoke(NativeMethodAccessorImpl.java:62)\n\
  at sun.reflect.DelegatingMethodAccessorImpl.invoke(DelegatingMethodAccessorImpl.java:43)\n\
  at java.lang.reflect.Method.invoke(Method.java:498)\n```\n\n## 使用测试超时\n\n当你不想让测试无限期等待时，超时非常有用。在\
  \ JUnit 的旧版本中，`@Test` 注解有一个属性用于提供超时值。JUnit 5 的测试注解不支持任何属性。相反，JUnit 5 提供了断言方法来帮助你处理这种情况。JUnit\
  \ 5 对超时提供了广泛的支持。\n\n让我们先看一个简单的测试用例，我们期望测试在一秒内完成。\n\n```\n@Test\nvoid test_should_complete_in_one_second()\
  \ {\nassertTimeout(Duration.of(1, ChronoUnit.SECONDS), () -> Thread.sleep(2000));\n\
  }\n```\n\n这个测试将会失败，因为代码执行会休眠两秒钟。我们期望测试用例在一秒内成功完成。\n\n`assertTimeout` 有许多重载变体。上面展示的那个接受两个参数——超时持续时间和可执行代码。当你运行前面提到的测试用例时，它会按预期失败。你可能期望测试在一秒后失败，但它会在两秒后失败。\n\
  \n原因是 `assertTimeout` 在与调用代码相同的线程中执行可执行代码。这意味着测试会等待代码执行完成后再抛出异常。这会导致测试在两秒后失败。在本地测试机器上，测试在\
  \ 2 秒 40 毫秒后失败。\n\n还有另一组 `assertTimeout` 的重载方法，它们接受 Duration 和 `ThrowingSupplier`。区别在于\
  \ `ThrowingSupplier` 返回一个值，而 Executable 不返回值。因此，当你想要断言代码执行返回的值时，应该使用 `assertTimeout\
  \ ThrowingSupplier` 变体。\n\n```\nString message = assertTimeout(Duration.of(1, ChronoUnit.SECONDS),\
  \ () -> \"Hello, World!\");\nassertEquals(\"Hello, World!\", message);\n```\n\n\
  ### assertTimeoutPreemptively\n\n这个方法克服了 assertTimeout 的局限性。它确保测试在超时之前完成。它在与调用线程不同的线程中运行测试。当超过超时时间时，它会中止代码。\n\
  \n```\nassertTimeoutPreemptively(Duration.of(1, ChronoUnit.SECONDS), () -> Thread.sleep(2000));\n\
  ```\n\n现在测试将在超时时间过后立即完成。\n\n## 重复测试\n\nJUnit 5 增加了对运行指定次数测试的支持。当你处理本质上不稳定的测试时，这至关重要。不稳定的测试是指那些在相同代码库下既表现出通过又表现出失败行为的测试。要运行一个测试\
  \ X 次，请使用 `RepeatedTest` 注解标记它，如下列代码所示：\n\n```\n@RepeatedTest(10)\nvoid i_am_a_repeated_test()\
  \ {\nassertTrue(true);\n}\n```\n\n这个测试将运行十次，你将在集成开发环境（IDE）的截图中看到测试结果，如图 5-1 所示。\n\
  \n![A429029_1_En_5_Fig1_HTML.jpg](img/A429029_1_En_5_Fig1_HTML.jpg)\n\n图 5-1.\n\n\
  重复测试执行\n\n你可以使用一组预定义的占位符来自定义测试的名称。\n\n```\n@RepeatedTest(value = 10, name = \"i_am_a_repeated_test__{currentRepetition}/{totalRepetitions}\"\
  )\nvoid i_am_a_repeated_test() {\nassertTrue(true);\n}\n```\n\n当你运行测试时，你将在 IDE 中看到以下测试输出，如图\
  \ 5-2 的截图所示。\n\n![A429029_1_En_5_Fig2_HTML.jpg](img/A429029_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2.\n\n带名称的重复测试\n\n## 总结\n\n在本章中，你学习了如何在出现异常时断言测试的正确行为。你学习了如何应用各种策略来处理异常。\n\
  \n在第 6 章中，我们将讨论如何将 JUnit 5 与你的工具集成。我们将涵盖构建工具、代码覆盖率、IDE 以及更多内容。\n\n"
- "# 6. 集成工具\n\n到目前为止，我们一直在 IntelliJ Idea 中进行开发。我们使用了 JUnit 5 的各种功能，并研究了做事的新方法。但是\
  \ Java 生态系统中存在大量的工具。工具有很多类别——构建工具、集成开发环境（IDE）、持续集成（CI）工具等等。每个类别都为开发者提供了多种选择。在本章中，我们将研究如何将\
  \ JUnit 5 与我们选择的工具集成。我们将首先将 JUnit 5 与我们选择的构建工具集成。然后，我们将集成代码覆盖率指标。最后，我们将使用其他 IDE。\n\
  \n## 构建工具\n\n构建工具负责自动化项目构建。构建工具的任务不仅限于源代码编译和二进制文件创建。它还涉及执行任何其他过程，如单元测试、静态代码分析、二进制文件上传等。Java\
  \ 生态系统中有许多构建工具，其中 Apache Ant、Maven 和 Gradle 是最常采用的。对于这些工具中的每一个，都有大量的插件目录可以执行各种操作。但在本章中，我们将专注于围绕单元测试的任务。默认的单元测试插件/扩展基于旧版本的\
  \ JUnit。因此，它们不适用于 JUnit 5 测试。让我们看看如何用这些构建工具中的每一个来执行基于 JUnit 5 的测试。我们将从 Gradle 开始，因为我们的\
  \ bookstoread 应用程序是基于它的。\n\n\n\n### Gradle\n\nGradle 构建工具最初借鉴了其前身（如 Ant 和 Maven）的许多概念。它以\
  \ `build.gradle` 文件作为输入，来确定项目构建的步骤。需要注意的是，该构建文件是用 Groovy 编写的，而非其他工具事实上的标准 XML。Gradle\
  \ 遵循 Maven 的“约定优于配置”方法，即大多数代码构建实践都通过通用默认值进行配置；例如，所有源代码都放在 `src/main/java` 下，测试代码放在\
  \ `src/test/java` 下。\n\n到目前为止，对于我们的 `bookstoread` 项目，我们添加了一个 `build.gradle` 文件（见第\
  \ 1 章）。该构建文件将源代码描述为一个 Java 项目。它还列出了所有必需的依赖项以及用于下载依赖项的仓库。\n\n```\ngroup 'com.junit5book'\n\
  version '1.0-SNAPSHOT'\napply plugin: 'java'\nsourceCompatibility = 1.8\nrepositories\
  \ {\nmavenCentral()\n}\ndependencies {\ndef junitVersion = '5.0.1'\ntestCompile\
  \ 'org.junit.jupiter:junit-jupiter-api:' + junitVersion\ntestCompile 'org.junit.jupiter:junit-jupiter-engine:'\
  \ + junitVersion\ntestCompile 'org.assertj:assertj-core:3.5.2'\n}\n```\n\n那么，我们是否尝试在控制台上运行它呢？\n\
  \n```\n./gradle clean build\nNo command 'gradle' found\n```\n\n啊哈！我们的机器上没有安装 Gradle。但这对于\
  \ Gradle 来说并不是问题。Gradle 最显著的特性之一是“Gradle Wrapper”。其概念是让 Gradle 构建无需事先安装即可运行。它不仅消除了\
  \ Gradle 安装的先决条件，还强制要求所有使用该项目的机器上使用相同版本的 Gradle。\n\nWrapper 是一个小脚本文件 `gradlew.sh/gradlew.bat`，它与必要的文件一起被添加到项目中。现在让我们运行\
  \ wrapper 脚本。\n\n```\n./gradlew clean build\nDownloading https://services.gradle.org/distributions/gradle-3.4.1-all.zip\n\
  .......................................................................\n:clean\n\
  :compileJava\n:processResources UP-TO-DATE\n:classes\n:jar\n:assemble\n:compileTestJava\n\
  :processTestResources UP-TO-DATE\n:testClasses\n:test\n:check\n:build\nBUILD SUCCESSFUL\n\
  ```\n\n哇！通过使用 wrapper，我们无需在机器上安装 Gradle 就能启动构建。Gradle wrapper 进程下载了所需的 Gradle 版本和项目依赖项。然后使用这些来构建应用程序源代码。完整的构建过程由不同的阶段组成，如构建输出所示。\n\
  \n我们的重点是测试执行任务。遵循合理默认值的概念，Gradle 为我们的构建添加了一个测试插件。该插件的目的是执行测试用例并发布相应的报告。但如果我们查看 `:test`\
  \ 下的构建输出，会发现没有执行任何测试用例。这是因为 Gradle 测试插件遵循一个约定，即期望测试类名以 `Test` 或 `Tests` 结尾。在我们的应用程序中，测试类名以\
  \ `Spec` 结尾，因此它们没有被执行。\n\n让我们通过显式指定 Gradle 应查找以 `Spec` 结尾的类来重新运行 Gradle 构建，如下代码所示：\n\
  \n```\n./gradlew clean test --tests *Spec\n:test FAILED\nFAILURE: Build failed with\
  \ an exception.\n* What went wrong:\nExecution failed for task ':test'.\n> No tests\
  \ found for given includes: [*Spec]\n```\n\nGradle 仍然无法找到我们的测试。这是因为 JUnit 5 更改了其\
  \ API（应用程序编程接口）。JUnit 5 版本不仅面向开发者，也面向基于 JUnit 的工具/平台。它们将此类平台所需的测试发现和执行（用于测试过滤和配置）解耦了。由于当前的测试插件不可用，JUnit\
  \ 5 团队提供了一个可用于执行测试的 Gradle 测试插件。\n\n在应用该插件之前，我们必须告诉 Gradle 在哪里可以找到它。这在 `build.gradle`\
  \ 的 `buildscript` 部分中进行了描述。\n\n```\nbuildscript {\nrepositories {\nmavenCentral()\n\
  // 以下内容仅在您想使用 SNAPSHOT 版本时才需要。\n// maven { url 'https://oss.sonatype.org/content/repositories/snapshots'\
  \ }\n}\ndependencies {\nclasspath 'org.junit.platform:junit-platform-gradle-plugin:1.0.1'\n\
  }\n}\napply plugin: 'org.junit.platform.gradle.plugin'\n```\n\n`org.junit.platform.gradle.plugin`\
  \ 插件被配置为查找以 `*Test(s)` 结尾的测试。我们必须重新配置它以发现我们的测试。\n\n```\njunitPlatform{\nfilters{\n\
  includeClassNamePattern '.*Spec'\n}\n}\n```\n\n现在再次运行 gradle 构建，`gradle clean build`。它将运行所有测试并在控制台上打印测试结果摘要。\n\
  \n```\n:junitPlatformTest\nMar 06, 2017 6:56:47 AM org.junit.platform.launcher.core.ServiceLoaderTestEngineRegistry\
  \ loadTestEngines\nINFO: Discovered TestEngines with IDs: [junit-jupiter]\nTest\
  \ run finished after 1095 ms\n[        10 containers found      ]\n[         0 containers\
  \ skipped    ]\n[        10 containers started    ]\n[         0 containers aborted\
  \    ]\n[        10 containers successful ]\n[         0 containers failed     ]\n\
  [        19 tests found           ]\n[         0 tests skipped         ]\n[    \
  \    19 tests started         ]\n[         0 tests aborted         ]\n[        19\
  \ tests successful      ]\n[         0 tests failed          ]\n```\n\n需要注意的是，该插件会将\
  \ XML 报告发布到 `build/test-results/junit-platform` 目录下，而不是标准的 Gradle 测试报告位置（`build/reports`）。该报告按每个测试引擎分别指定。\n\
  \n现在让我们探索该插件提供的各种选项。默认情况下，该插件会发现项目类路径下的所有测试。可以通过使用 `selectors` 块来改变此行为。该块允许我们将测试限制到文件夹、包、类、测试方法或任何其他外部位置。\n\
  \n```\njunitPlatform{\nselectors{\naClass 'bookstoread.BookShelfSpec'\n}\nfilters{\n\
  includeClassNamePattern '.*Spec'\n}\n}\n```\n\n上述块将仅运行 `BookShelfSpec` 类的测试。需要注意的是，即使我们只选择了一个单独的类，`filters`\
  \ 部分也是必需的。基本上，`selectors` 部分用于测试发现元素，而 `filters` 部分实际上负责测试发现。\n\n```\nMar 06, 2017\
  \ 7:53:27 AM org.junit.platform.launcher.core.ServiceLoaderTestEngineRegistry loadTestEngines\n\
  INFO: Discovered TestEngines with IDs: [junit-jupiter]\nTest run finished after\
  \ 304 ms\n[         6 containers found      ]\n[         0 containers skipped  \
  \  ]\n[         6 containers started    ]\n[         0 containers aborted    ]\n\
  [         6 containers successful ]\n[         0 containers failed     ]\n[    \
  \     9 tests found           ]\n[         0 tests skipped         ]\n[        \
  \ 9 tests started         ]\n[         0 tests aborted         ]\n[         9 tests\
  \ successful      ]\n[         0 tests failed          ]\n```\n\n过滤器使我们能够基于 JUnit\
  \ 5 引擎、包、标签或类名来选择测试。以下块将过滤并执行 `Filters` 标签下的测试（见第 4 章）。\n\n```\njunitPlatform{\n\
  filters{\nincludeClassNamePattern '.*Spec'\ntags {\ninclude 'Filter'\n}\n}\n}\n\
  ```\n\nJUnit 5 Gradle 平台插件禁用了标准的 Gradle 任务。可以通过 `junitPlatform` 块下的 `enableStandardTestTask`\
  \ 选项来改变此行为。将其设置为 `true` 以启用标准任务运行。\n\n\n\n### Maven\n\nMaven 旨在提供一个标准统一的构建流程，可用于任何\
  \ Java 项目。它采用基于 XML 的方式来配置项目的构建步骤（项目对象模型，简称 POM）。如前所述，它遵循“约定优于配置”原则，只有例外情况需要显式配置。一个极简的\
  \ Maven 构建文件 `pom.xml` 包含唯一的项目标识符和依赖项列表。在接下来的部分中，我们将尝试为我们的 bookstoread.com 项目配置一个\
  \ pom.xml。\n\n在开始之前，我们必须确保 Maven 已添加到系统路径中。与 Gradle 不同，它没有附带一个可以自动下载并使其工作的包装脚本。可以从\
  \ [`http://maven.apache.org/`](http://maven.apache.org/) 下载最新版本的 Maven。解压归档文件，并将其路径添加到\
  \ PATH 环境变量中。验证它是否按预期工作。\n\n```\n$ mvn --version\nApache Maven 3.3.1\nMaven home:\
  \ /usr/share/maven\nJava version: 1.8.0_101, vendor: Oracle Corporation\nJava home:\
  \ /usr/lib/jvm/java-8-oracle/jre\n```\n\n现在，让我们为项目添加以下 POM 文件：\n\n```\n\n4.0.0\n\
  com.junit5book\nbookstoread\n1.0-SNAPSHOT\n\nUTF-8\n1.8\n1.8\n5.0.1\n\norg.junit.jupiter\n\
  junit-jupiter-api\n${junit.jupiter.version}\ntest\n\norg.assertj\nassertj-core\n\
  3.5.2\ntest\n\nmockito-core\norg.mockito\n2.7.12\ntest\n\n```\n\n现在，我们来看看重要的部分。\n\
  \n*   项目由 `groupId:artifactId` 标识。此外，项目的每个发布版本都由 version 标识。\n*   文件的 properties\
  \ 部分列出了各种键值，这些键值可以在 POM 的其他部分中引用。\n*   默认情况下，Maven 会添加一个 Java 编译器插件。其 JDK 版本由 `maven.compiler.source`\
  \ 和 `maven.compiler.target` 属性描述。\n*   dependencies 标签包含项目所需的依赖项列表，以及它们各自的作用域。从\
  \ Gradle 构建中获取列表，我们添加了所需的依赖项。\n\n现在让我们进行一次构建：\n\n```\n$ mvn clean test\n[INFO] ------------------------------------------------------------------------\n\
  [INFO] Building bookstoread 1.0-SNAPSHOT\n[INFO] ------------------------------------------------------------------------\n\
  [INFO]\n[INFO] --- maven-clean-plugin:2.5:clean (default-clean) @ bookstoread ---\n\
  [INFO] Deleting /home/rahul/projects/bookstoread/target\n[INFO]\n[INFO] --- maven-resources-plugin:2.3:resources\
  \ (default-resources) @ bookstoread ---\n[INFO] Using 'UTF-8' encoding to copy filtered\
  \ resources.\n[INFO] skip non existing resourceDirectory /home/rahul/projects/bookstoread/src/main/resources\n\
  [INFO]\n[INFO] --- maven-compiler-plugin:2.0.2:compile (default-compile) @ bookstoread\
  \ ---\n[INFO] Compiling 4 source files to /home/rahul/projects/bookstoread/target/classes\n\
  [INFO]\n[INFO] --- maven-resources-plugin:2.3:testResources (default-testResources)\
  \ @ bookstoread ---\n[INFO] Using 'UTF-8' encoding to copy filtered resources.\n\
  [INFO] skip non existing resourceDirectory /home/rahul/projects/bookstoread/src/test/resources\n\
  [INFO]\n[INFO] --- maven-compiler-plugin:2.0.2:testCompile (default-testCompile)\
  \ @ bookstoread ---\n[INFO] Compiling 2 source files to /home/rahul/projects/bookstoread/target/test-classes\n\
  [INFO]\n[INFO] --- maven-surefire-plugin:2.10:test (default-test) @ bookstoread\
  \ ---\n[INFO] Surefire report directory : /home/rahul/projects/bookstoread/target/surefire-reports\n\
  \nT E S T S\n\nResults :\nTests run: 0, Failures: 0, Errors: 0, Skipped: 0\n[INFO]\
  \ ------------------------------------------------------------------------\n[INFO]\
  \ BUILD SUCCESS\n[INFO] ------------------------------------------------------------------------\n\
  ```\n\n但是没有运行任何测试。这与我们在修复 Gradle 构建时遇到的问题类似。基本上，测试引擎无法找到测试，因为它遵循命名约定。因此，我们需要配置 surefire\
  \ 插件来识别我们的测试。\n\n```\n\nmaven-surefire-plugin\n2.19.1\n\n**/*Spec.java\n\n```\n\n\
  现在让我们进行一次构建，看看它是否运行我们的测试。\n\n```\n[INFO] --- maven-surefire-plugin:2.19.1:test (default-test)\
  \ @ bookstoread ---\n\nT E S T S\n\nRunning bookstoread.BookShelfSpec\nTests run:\
  \ 0, Failures: 0, Errors: 0, Skipped: 0, Time elapsed: 0.004 sec - in bookstoread.BookShelfSpec\n\
  ```\n\n根据控制台输出，插件找到了所需的测试类，但没有在其中找到任何测试用例。这是因为默认插件配置为与 JUnit 4 一起工作。surefire 插件具有可插拔的架构。可以通过向插件类路径添加额外的\
  \ `surefireProvider` 来配置它。JUnit 5 附带了一个 `junit-platform-surefire-provider`，它可以基于\
  \ Jupiter 引擎或 Vintage 引擎（根据类路径）运行测试。现在，让我们将提供程序和 Jupiter 引擎添加到插件依赖项中。\n\n```\nmaven-surefire-plugin\n\
  2.19.1\n\n**/*Spec.java\n\norg.junit.platform\njunit-platform-surefire-provider\n\
  ${junit.platform.version}\n\norg.junit.jupiter\njunit-jupiter-engine\n${junit.jupiter.version}\n\
  \n```\n\n现在让我们进行一次构建。所有测试用例都应该被执行。执行过程将在控制台生成输出，并在 `target/surefire-reports` 目录下生成测试文件（供后续参考）。\n\
  \n![A429029_1_En_6_Fig1_HTML.jpg](img/A429029_1_En_6_Fig1_HTML.jpg)\n\n图 6-1.\n\n\
  Maven 与 JUnit 5\n\n该插件还支持基于标签的测试过滤。为了执行/排除一组标签，请在 surefire 插件配置中指定 `includeTags`/`excludeTags`\
  \ 属性。\n\n```\n\n**/*Spec.java\n\nFilter\n\n```\n\nMaven surefire 插件有各种参数（例如，`forkcount`\
  \ 和 `parallel`）。这些参数目前不受支持。\n\n\n\n### Ant\n\nAnt 是历史最悠久、功能最全面的项目自动化工具之一。它基于一个名为\
  \ `build.xml` 的文件，该文件配置了项目需要运行的任务。每个任务都可以与其他任务链接，以定义执行顺序。Ant 将构建调用定义为一个“目标”。一个项目可以有多个目标，这些目标可以链接在一起，以定义一个完整的构建周期。在本节中，我们将配置\
  \ Ant，使其在项目构建过程中运行基于 JUnit5 的测试。本节假定读者已了解 Ant。\n\n在开始创建 `build.xml` 之前，请确保我们的操作系统\
  \ PATH 中已包含 Ant。可以从 [`http://ant.apache.org`](http://ant.apache.org) 下载最新版本的 Ant。解压归档文件，并将其路径添加到\
  \ PATH 变量中。验证其是否按预期工作。\n\n```\n$ ant -version\nApache Ant(TM) version 1.9.3 compiled\
  \ on April 8 2014\n```\n\nAnt 有许多扩展，可以执行不同的任务。Apache Ivy 就是这样一个扩展，用于执行依赖解析。在没有依赖管理器的情况下，我们需要将项目依赖项作为源代码的一部分保留。Ivy\
  \ 使得在 Ivy.xml 中表达所有项目依赖项成为可能。当执行构建时，它会下载所有必需的依赖项。要添加 Ivy 扩展，请从 [`http://ant.apache.org/ivy/`](http://ant.apache.org/ivy/)\
  \ 下载最新版本。解压归档文件，并将 `ivy-{version}.jar` 复制到 `${ANT_HOME}/lib` 目录。\n\n现在，让我们添加一个能够执行以下操作的\
  \ `build.xml`：\n\n*   编译 src 文件。\n*   编译测试文件。\n*   运行测试并发布报告。\n\n上述构建会下载 `ivy.xml`\
  \ 中声明的依赖项。然后，它调用 `javac` 任务来编译源代码。接着，它将下载的库添加到类路径中，并再次调用 `javac` 任务来编译测试代码。\n\n\
  该构建仅编译代码。但我们如何调用测试呢？有一个“junit” Ant 任务可以运行单元测试。但该任务只运行基于 JUnit4 的测试用例。因此，该任务不适用于我们基于\
  \ JUnit 5 的测试。\n\nJUnit5 团队提供了一个控制台启动器，可以在控制台上执行测试。该运行器根据测试的成功或失败，分别将进程输出设为 1 或\
  \ 0。该运行器具有大量用于发现和执行测试的选项。可以从 Maven 中央仓库下载控制台运行器。由于 1.0.1 是目前可用的最新版本，可以从 [`http://central.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.0.1/junit-platform-console-standalone-1.0.1.zip`](http://central.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.0.1/junit-platform-console-standalone-1.0.1.zip)\
  \ 下载。\n\n在我们的 `bookstoread` 项目中解压 zip 文件。使用以下命令通过控制台启动器运行测试（见图 6-2）：\n\n![A429029_1_En_6_Fig2_HTML.jpg](img/A429029_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2.\n\n控制台启动器\n\n```\njava -jar lib/junit-platform-console-standalone-1.0.1.jar\
  \ --scan-classpath -cp lib/build/classes\n```\n\n上述命令执行以下操作：\n\n*   发现已添加到类路径中的\
  \ Jupiter 引擎。\n*   ‘-scan-classpath’ 尝试查找属于类路径一部分的测试用例。\n*   该命令不会执行任何测试，因为我们的测试后缀（*spec）与默认约定不匹配。\n\
  \n该命令提供 `-n` 选项来执行与传递的模式匹配的类。因此，我们可以添加 `-n \"^.*Spec?$\"` 来发现我们的测试用例。我们还需要将 assertj\
  \ 和 mockito 的必需依赖项添加到类路径中。\n\n由于控制台运行器可以执行我们所有的测试用例，我们也可以将其添加到我们的 Ant build.xml\
  \ 中。完整的方法包括以下构建步骤：\n\n1.  配置 Ivy.xml 以下载归档文件。需要注意的是，我们需要的是 zip 归档文件，而不是 jar 文件（与其他依赖项一样）。\n\
  2.  将归档文件解压到单独的目录。\n3.  使用 exec Ant 任务执行控制台运行器。\n4.  此外，我们可以向控制台运行器传递一个 `-reports-dir`\
  \ 参数。这将在指定目录中创建一个基于 XML 的报告。\n5.  可以使用 `junitreport` 任务将基于 XML 的测试报告转换为 HTML。\n\n\
  ### 代码覆盖率\n\n代码覆盖率是通过执行测试用例捕获的一个重要指标。它是一个以百分比表示的指标，表示项目被其测试套件测试的程度。有许多工具（付费和开源）可用于确定覆盖率。这些工具中的大多数都有扩展/插件，可以与项目构建工具集成。在本节中，我们将使用\
  \ Java 代码覆盖率（JaCoCo）工具。它是一个开源工具，与所有版本的 Java 都能很好地配合，并且与 IntelliJ Idea、Gradle、Ant、Jenkins\
  \ 等各种工具集成良好。在下一节中，我们将把 JaCoCo 集成到我们的项目构建中。\n\n#### Gradle 扩展\n\nJaCoCo 工具提供了一个 Gradle\
  \ 插件。该插件与 Gradle 测试插件集成。但由于 JUnit 5 测试不是由默认的 Gradle 测试插件执行的，因此无法确定其覆盖率。我们需要将 jacoco\
  \ 与 JUnit 5 团队提供的 junit-platform 测试插件一起配置。现在，让我们将插件添加到我们的 `build.gradle` 中，并尝试将其与\
  \ `junitPlatformTest` 一起配置。\n\n```\napply plugin: 'jacoco'\nsourceCompatibility\
  \ = 1.8\nrepositories {\nmavenCentral()\n}\n// 为简洁起见，省略其余部分\njacoco {\ntoolVersion\
  \ = '0.7.4.201502262128'\napplyTo junitPlatformTest\n}\n```\n\n上述配置将生成一个二进制文件形式的代码覆盖率结果。我们需要一个\
  \ `jacoco` 报告任务来将二进制文件转换为 xml/html 报告。现在，让我们运行 gradle 构建以生成覆盖率。\n\n构建失败，因为 `jacoco`\
  \ 配置无法找到所需的 `junitPlatformTest` 插件（见图 6-3）。这是因为该插件在项目初始化期间不可用。只有在 Gradle 运行器评估项目之后，它才可用。现在我们只需要在项目的\
  \ `afterEvaluate` 部分配置 `jacoco` 插件。让我们也添加 `jacoco` 报告任务；完整的配置应如下所示：\n\n![A429029_1_En_6_Fig3_HTML.jpg](img/A429029_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3.\n\nGradle `JaCoCo` 失败\n\n```\nafterEvaluate {\njacoco {\ntoolVersion =\
  \ '0.7.4.201502262128'\napplyTo junitPlatformTest\n}\ntask junit5JacocoReport(type:JacocoReport,\
  \ dependsOn : junitPlatformTest){\nexecutionData junitPlatformTest\nsourceDirectories\
  \ = files(sourceSets.main.allSource.srcDirs)\nclassDirectories = files(sourceSets.main.output)\n\
  reports {\nxml.enabled = true\nhtml.enabled = true\n}\n}\nbuild.dependsOn junit5JacocoReport\n\
  }\n```\n\n现在进行构建以获取 `jacoco` 报告（见图 6-4）。\n\n![A429029_1_En_6_Fig4_HTML.jpg](img/A429029_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4.\n\n`Jacoco` 覆盖率报告\n\n#### Maven 扩展\n\n用于 `jacoco` 的 Maven 插件（jacoco-maven-plugin）开箱即用，适用于基于\
  \ JUnit 5 的测试。与 Gradle 一样，我们首先确定二进制文件中的代码覆盖率结果，然后将其转换为报告。Maven 插件有不同的目标，这些目标被配置来完成这些任务。以下\
  \ POM 配置为我们的 bookstoread.com 生成了覆盖率报告：\n\n```\norg.jacoco\njacoco-maven-plugin\n\
  \npre-unit-test\n\nprepare-agent\n\n${project.build.directory}/coverage-reports/jacoco-ut.exec\n\
  \nsurefireArgLine\n\npost-unit-test\ntest\n\nreport\n\n${project.build.directory}/coverage-reports/jacoco-ut.exec\n\
  \n${project.reporting.outputDirectory}/jacoco-ut\n\n```\n\n\n\n#### Ant 扩展\n\n现在让我们尝试使用\
  \ Ant 配置 `jacoco`。与之前的配置类似，这里我们也将分两步确定代码覆盖率。`JaCoCo 工具` 提供了一个 Ant 任务，可以通过执行单元测试用例或任何其他\
  \ Java 程序来确定代码覆盖率。由于我们使用控制台运行器执行 JUnit5 测试用例，我们将通过配置一个 Java 可执行程序来确定覆盖率。\n\n在开始配置\
  \ `jacoco` 之前，让我们先查看 `consoleRunner` 脚本，找到完整的 Java 命令。该命令执行 `org.junit.platform.console.ConsoleLauncher`\
  \ 类，其类路径中包含所有测试类。现在我们需要在构建脚本中配置相同的命令。该类是 junit-platform-console 依赖 jar 的一部分。\n\n\
  对 `ivy.xml` 进行以下更改，以确保我们下载 junit-platform-console 的 jar 包（而非发行版 zip 包）以及所需的 `jacoco`\
  \ jar 包：\n\n```\n// 为简洁起见，省略了其余部分\n```\n\n现在我们需要使用 Java 主类配置 `jacoco` 任务。以下 `build.xml`\
  \ 配置确保我们实现相同的目标：\n\n```\n\n// 为简洁起见，省略了其余部分\n\n```\n\n运行 Ant 构建以获取 HTML 格式的覆盖率报告。\n\
  \n## 其他工具\n\n到目前为止，我们一直使用 IntelliJ 开发所有代码，该 IDE 对 JUnit 5 功能的支持正在不断改进。我们已经成功地将 JUnit\
  \ 5 与 Gradle、Maven 和 Ant 集成。但 Java 生态系统包含大量工具。有许多 IDE（Eclipse、STS、IntelliJ、NetBeans\
  \ 等）。那么，如果我们选择的工具尚不支持 JUnit 5，该怎么办？假设我们偏好的 IDE 是 Eclipse；那我们该怎么做？\n\nJUnit 5 提供了一个基于\
  \ JUnit 4 Runner API 的 `PlatformRunner`。该运行器能够在所有支持 JUnit 4 的平台上执行测试。JUnit 5 测试用例必须使用\
  \ `@RunWith` 注解，并将 `PlatformRunner` 作为参数传入。因此，如果我们想在 Eclipse Neon 或更早版本中开发代码，可以执行以下操作：\n\
  \n1.  将 JUnit 4 的依赖添加到我们的 `pom.xml` 或 `build.gradle` 中\n\n    ```\n    testCompile\
  \ 'junit:junit:4.12'\n    ```\n\n2.  添加 junit-platform-runner 的依赖\n\n    ```\n \
  \   testCompile 'org.junit.platform:junit-platform-runner:1.0.1'\n    ```\n\n3.\
  \  将项目作为 Gradle 项目（或 Maven 项目）导入 Eclipse（见图 6-5）\n\n    ![A429029_1_En_6_Fig5_HTML.jpg](img/A429029_1_En_6_Fig5_HTML.jpg)\n\
  \n    图 6-5.\n    Eclipse 导入对话框  \n4.  每个测试类都需要使用 `@RunWith` 进行注解\n\n    ```\n \
  \   @RunWith(JUnitPlatform.class)\n    @DisplayName(\"一个书架\")\n    public class\
  \ BookShelfSpec {\n    private BookShelf shelf;\n    // 为简洁起见，省略了其余部分\n    }\n \
  \   ```\n\n5.  现在执行我们的测试用例\n\n    ![A429029_1_En_6_Fig6_HTML.jpg](img/A429029_1_En_6_Fig6_HTML.jpg)\n\
  \n    图 6-6.\n    Eclipse JUnit 5 报告  \n\nEclipse 团队正在开发一个 Oxygen 版本，该版本将包含对 JUnit\
  \ 5 的支持。在撰写本章时，Eclipse 团队已添加了 JUnit 5 支持 [ [`https://bugs.eclipse.org/bugs/show_bug.cgi?id=488566#c4`](https://bugs.eclipse.org/bugs/show_bug.cgi?id=488566#c4)\
  \ ]，但尚未发布。\n\n## 总结\n\n在本章中，我们探讨了如何根据我们选择的工具配置 JUnit 5。我们为 booktoread.com 添加了基于\
  \ Gradle、Maven 和 Ant 的配置。然后，我们使用 `jacoco` 配合这些工具生成了代码覆盖率指标。最后，我们研究了那些不支持 JUnit 5\
  \ 的工具，并以向后兼容模式配置了 JUnit 5。\n\n在第 7 章中，我们将讨论 JUnit 5 扩展模型以及从 JUnit 4 迁移到新版本的相关内容。\n\
  \n"
- "# 7. JUnit 5 扩展模型\n\nJUnit 的核心原则之一是优先考虑扩展点而非功能。这意味着 JUnit 团队希望提供一种可扩展的机制，供开发者根据自身需求使用，而不是将所有功能都塞进\
  \ JUnit 核心。这一理念在 JUnit 的早期版本中就已存在。在 JUnit 4 中，团队添加了对 Rule API（应用程序编程接口）的支持，以提供诸如创建临时目录和文件、异常验证等功能。这些功能本可以轻松地添加到\
  \ JUnit 核心中，而无需提供扩展机制。相反，JUnit 团队决定构建 Runner 和 Rule API，从而提供一种扩展 JUnit 的机制。这不仅使\
  \ JUnit 能够干净地构建这些功能，还使第三方开发者能够使用该 API 实现自己的功能。其中一个例子是 `MockitoRule`，它允许你将模拟对象注入到测试中。\n\
  \n## JUnit 4 扩展模型\n\n在学习 JUnit 5 的新扩展 API 之前，我们先讨论一下 JUnit 4 的可扩展性方法。这将有助于我们理解为什么\
  \ JUnit 5 团队决定设计和构建一种新的可扩展性机制。如前所述，扩展对 JUnit 来说并不新鲜。JUnit 4 提供了两种扩展机制：Runner API\
  \ 和 Rule API。\n\n1.  Runner API 被添加到 JUnit 4 中，以提供编写自定义运行器的能力。运行器管理测试的完整生命周期——测试类的实例化、调用\
  \ setup 和 tear-down 方法、执行测试用例、通过 `RunNotifier` 通知测试进度。JUnit 4 提供了一个默认使用的实现 `JUnit4`。任何人都可以通过扩展\
  \ `Runner` 类来编写自己的自定义运行器。要告诉 JUnit 使用自定义运行器，可以使用 `@RunWith` 注解并指定自定义运行器，如下面的代码片段所示：\n\
  \n    ```\n    import org.junit.runner.RunWith;\n    @RunWith(MyCustomRunner.class)\n\
  \    public class MyTest {\n    }\n    ```\n\n    Runner API 的两个主要缺点是：\n    1. \
  \ 即使开发者只想为特定生命周期阶段提供扩展，也必须实现完整的生命周期。这使得它在大多数用例中变得复杂且重量级。  \n    2.  每个测试用例只能使用一个运行器类。这使得它们无法组合。例如，你不能在同一个测试类中同时使用\
  \ Parameterized 和 Mockito 运行器。   \n2.  Rule API 在 JUnit 4.7 中引入，提供了一种轻量级的 JUnit\
  \ 扩展机制。要使用规则，你需要创建一个规则的公共实例变量，并使用 `@Rule` 注解对其进行注解。Rule API 通过将测试方法包装到一个语句中来工作。该语句将首先运行任何\
  \ `@Before` 方法，然后运行 `@Test` 方法，最后运行任何 `@After` 方法。Rule API 克服了 Runner API 的局限性，但其能力也有限。Rule\
  \ API 的主要缺点是：\n    1.  Rule API 无法控制测试的完整生命周期，因此不能用于所有用例。它们仅适用于需要在测试用例执行前后执行某些操作的场景。\
  \  \n    2.  你必须为方法级别和类级别的回调创建单独的规则。\n\n\n\n## JUnit 5 扩展模型\n\n扩展 API 是 JUnit Jupiter\
  \ 引擎的一部分。考虑到 JUnit 4 中扩展方法的局限性，JUnit 5 团队决定构建一个统一的扩展 API，使其能够挂钩到测试生命周期的不同阶段。这意味着当到达某个生命周期阶段时，Jupiter\
  \ 引擎将调用所有为该阶段注册的扩展。共有五个主要的扩展点可供挂钩。\n\n1.  测试生命周期回调\n2.  测试实例后处理\n3.  条件测试执行\n4.\
  \  参数解析\n5.  异常处理\n\n让我们逐一详细了解。\n\n后续章节中介绍的每个扩展都实现了与 JUnit 扩展点相对应的接口。所有扩展点接口都扩展了一个名为\
  \ `Extension` 的标记接口。\n\n另一个需要与之交互的接口是 `ExtensionContext`。它用于封装执行测试或测试容器的上下文。这种抽象允许扩展访问有关正在运行的测试的信息，并与\
  \ Jupiter 引擎进行交互。让我们看看该接口的主要方法以进一步了解它。\n\n```\npublic interface ExtensionContext\
  \ {\nOptional getParent();\nString getUniqueId();\nString getDisplayName();\nSet\
  \ getTags();\nOptional getElement();\nOptional> getTestClass();\nOptional getTestInstance();\n\
  Optional getTestMethod();\nOptional getExecutionException();\nvoid publishReportEntry(Map\
  \ map);\ndefault Store getStore() {\nreturn getStore(Namespace.DEFAULT);\n}\nStore\
  \ getStore(Namespace namespace);\n}\n```\n\n`getParent()` 方法返回父级的 ExtensionContext。要理解这里的“父级”含义，必须了解\
  \ Jupiter 会创建一个测试节点树，每个节点都有其 ExtensionContext。一个测试节点会有一个测试类节点作为其父节点。因此，在测试类节点上调用\
  \ `getParent` 时，返回 Optional.empty；而在测试方法上调用 `getParent` 时，则返回非空值。\n\n接下来的一组方法提供测试的唯一标识符、人类可读的名称以及一组测试标签。再下一组扩展方法用于访问测试类、实例和测试方法。你可以利用这些方法通过反射访问测试方法注解或实例字段。\n\
  \n`getExecutionException()` 方法用于获取测试或容器执行期间抛出的异常。`publishReportEntry` 用于发布键/值对，供控制台或\
  \ XML 报告等监听器使用。\n\n最后一个重要的方法是 `getStore()`。JUnit 扩展使用 Store 来读写数据。Store 是一个带命名空间、分层结构的键/值数据存储。要通过\
  \ ExtensionContext 访问 Store，需要使用 Namespace 对象调用 `getStore` 方法。可以使用工厂方法 `create`\
  \ 创建 Namespace，例如 `Namespace.create(\"com\",\"shekhargulati\",\"SummaryExtension\"\
  )`。每个扩展都应使用唯一的命名空间，以避免不同扩展之间的数据混淆。\n\nStore 本身就像一个功能增强的哈希映射。它提供了你期望从 Map 中获得的方法，如下列代码所示：\n\
  \n```\ninterface Store {\nV get(Object key, Class requiredType);\nObject getOrComputeIfAbsent(K\
  \ key, Function defaultCreator);\nvoid put(Object key, Object value);\nV remove(Object\
  \ key, Class requiredType);\n}\n```\n\n## 测试生命周期回调\n\n这组扩展允许你挂钩到测试生命周期的特定阶段。正如我们在第\
  \ 4 章所学，测试类由以下生命周期方法组成：\n\n1.  BeforeAll：标记有 `@BeforeAll` 注解的方法在当前测试类的所有测试之前执行。它们对于每个测试类仅执行一次。\n\
  2.  BeforeEach：标记有 `@BeforeEach` 注解的方法在当前测试类的每个测试方法之前执行。它们对于当前测试类中的每个测试执行一次。\n3.\
  \  Test：所有标记有 `@Test` 注解的方法都是实际的测试方法。\n4.  AfterEach：标记有 `@AfterEach` 注解的方法在当前测试类的每个测试方法之后执行。它们对于当前测试类中的每个测试执行一次。\n\
  5.  AfterAll：标记有 `@AfterAll` 注解的方法在当前测试类的所有测试之后执行。它们对于每个测试类仅执行一次。\n\n对于这些测试生命周期阶段中的每一个，JUnit\
  \ 5 都提供了一个扩展接口。\n\n1.  BeforeAllCallback：此扩展在所有测试方法执行之前执行。\n2.  AfterAllCallback：此扩展在所有测试方法执行之后执行。\n\
  3.  BeforeEachCallback：此扩展在每个测试方法执行之前执行。\n4.  AfterEachCallback：此扩展在每个测试方法执行之后执行。\n\
  5.  BeforeTestExecutionCallback：此扩展在测试即将执行之前立即执行。\n6.  AfterTestExecutionCallback：此扩展在测试执行之后立即执行。\n\
  \n对于一个包含所有扩展和生命周期方法的测试类，其执行顺序为：\n\n1.  BeforeAllCallback\n2.  BeforeAll\n3.  BeforeEachCallback\n\
  4.  BeforeEach\n5.  BeforeTestExecution\n6.  Test\n7.  AfterTestExecution\n8.  AfterEach\n\
  9.  AfterEachCallback\n10. AfterAll\n11. AfterAllCallback\n\n让我们编写一个扩展，用于打印测试类执行的摘要。该摘要将包括测试类所花费的总时间以及每个测试用例所花费的时间。让我们从创建实现某些生命周期扩展接口的扩展开始。\n\
  \n```\npublic class TestSummaryExtension implements\nBeforeAllCallback,\nAfterAllCallback,\n\
  BeforeTestExecutionCallback,\nAfterTestExecutionCallback{\n}\n```\n\n每个接口都有一个需要实现的单一生命周期方法。我们将实现的第一个方法是\
  \ `BeforeAllCallback` 接口的 `beforeAll` 方法。我们将存储测试用例的开始时间。\n\n```\n@Override\npublic\
  \ void beforeAll(ExtensionContext context) throws Exception {\ncontext.getStore().put(\"\
  TEST_CLASS\", System.currentTimeMillis());\n}\n```\n\n接下来，我们将实现 `beforeTestExecution`\
  \ 来存储测试开始时间。然后，我们将实现 `afterTestExecution` 来计算运行测试用例所花费的时间，如下列代码所示：\n\n```\n@Override\n\
  public void beforeTestExecution(ExtensionContext context) throws Exception {\ncontext.getStore().put(\"\
  TEST\", System.currentTimeMillis());\n}\n@Override\npublic void afterTestExecution(ExtensionContext\
  \ context) throws Exception {\nlong startTime = context.getStore().get(\"TEST\"\
  , long.class);\nlong timeTook = System.currentTimeMillis() - startTime;\ncontext.publishReportEntry(Collections.singletonMap(\n\
  \"Summary\",\nString.format(\"%s took %d ms\", context.getDisplayName(), timeTook)));\n\
  }\n```\n\n最后，我们将实现 `afterAll` 方法来计算运行测试类所花费的时间并打印摘要。\n\n```\n@Override\npublic void\
  \ afterAll(ExtensionContext context) throws Exception {\nlong startTime = context.getStore().get(\"\
  TEST_CLASS\", long.class);\nlong timeTook = System.currentTimeMillis() - startTime;\n\
  context.publishReportEntry(Collections.singletonMap(\n\"Summary\",\nString.format(\"\
  %s took %d ms\", context.getDisplayName(), timeTook)));\n}\n```\n\n要使你的测试使用此扩展，你需要使用\
  \ `@ExtendWith` 注解。我们将在本章后面介绍它。\n\n\n\n## 测试实例后处理\n\n此扩展允许你在测试实例创建后执行钩子操作。你需要实现\
  \ `TestInstancePostProcessor` 接口。该接口包含一个需要重写的方法——`postProcessTestInstance`。\n\n\
  正如 `TestInstancePostProcessor` 接口的 JavaDoc 所述，此扩展的典型应用场景是向测试实例注入依赖。例如，让我们编写一个向实例字段注入\
  \ SLF4J 日志器的扩展。\n\n```\nimport java.lang.reflect.Field;\nimport org.junit.jupiter.api.extension.ExtensionContext;\n\
  import org.junit.jupiter.api.extension.TestInstancePostProcessor;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\npublic class LoggingExtension implements TestInstancePostProcessor\
  \ {\n@Override\npublic void postProcessTestInstance(Object testInstance, ExtensionContext\
  \ context) throws Exception {\nLogger logger = LoggerFactory.getLogger(testInstance.getClass());\n\
  Field field = testInstance.getClass().getDeclaredField(\"logger\");\nfield.set(testInstance,\
  \ logger);\n}\n}\n```\n\n在上述代码中，我们获取了 `testInstance` 的访问权限，并通过反射设置了 logger 字段。\n\
  \n## 条件测试执行\n\n在某些情况下，我们需要控制是否运行某个测试用例。JUnit 5 提供了 `ExecutionCondition` 扩展接口来实现这一用例。\n\
  \n让我们创建一个实现 `ExecutionCondition` 接口的 `RunOnCIExtension` 扩展类。\n\n```\nimport org.junit.jupiter.api.extension.ConditionEvaluationResult;\n\
  import org.junit.jupiter.api.extension.ExecutionCondition;\nimport org.junit.jupiter.api.extension.ExtensionContext;\n\
  public class RunOnCIExtension implements ExecutionCondition {\n@Override\npublic\
  \ ConditionEvaluationResult evaluateExecutionCondition(ExtensionContext context)\
  \ {\nString jenkinsHome = System.getenv(\"JENKINS_HOME\");\nif (jenkinsHome != null)\
  \ {\nreturn ConditionEvaluationResult.enabled(\"Test enabled on CI\");\n}\nreturn\
  \ ConditionEvaluationResult.disabled(\"Test disabled as the environment is not CI\"\
  );\n}\n}\n```\n\n## 参数解析\n\n此扩展用于解析构造函数或测试方法接收的参数。\n\n让我们创建一个解析 `Book` 类型的扩展。在测试用例中，我们经常需要处理测试数据，因此参数解析可以在此处提供帮助。\n\
  \n```\npublic class BookParameterResolver implements ParameterResolver {\n@Override\n\
  public boolean supportsParameter(ParameterContext parameterContext,\nExtensionContext\
  \ extensionContext) throws ParameterResolutionException {\nreturn parameterContext.getParameter().getType()\n\
  .equals(Book.class);\n}\n@Override\npublic Object resolveParameter(ParameterContext\
  \ parameterContext,\nExtensionContext extensionContext) throws ParameterResolutionException\
  \ {\nreturn new Book(\"Effective Java\");\n}\n}\n```\n\nJUnit 5 内置了以下三个 `ParameterResolver`：\n\
  \n*   `TestInfoParameterResolver`：该解析器提供 `org.junit.jupiter.api.TestInfo` 实例。`TestInfo`\
  \ 对象保存当前正在执行的测试的元信息。该对象可以提供显示名称、测试类、测试方法以及标签（如果有）。\n*   `TestReporterParameterResolver`：该解析器提供\
  \ `org.junit.jupiter.api.TestReporter` 实例。`TestReporter` 允许我们为当前测试执行提供附加值。所有这些值都会包含在测试报告中，并显示在\
  \ IDE（集成开发环境）中。\n*   `RepetitionInfoParameterResolver`：该解析器提供 `org.junit.jupiter.api.RepetitionInfo`\
  \ 实例。`RepetitionInfo` 对象保存有关测试重复的信息（即当前重复索引和总重复次数）。该对象仅对使用 `org.junit.jupiter.api.RepeatedTest`\
  \ 注解的测试可用。如果测试用例未标记 `@RepeatedTest`，则会抛出 `org.junit.jupiter.api.extension.ParameterResolutionException`。\n\
  \n```\nclass ParameterResolverSpec {\n@BeforeEach\nvoid initialize(TestInfo info,TestReporter\
  \ reporter) {\nreporter.publishEntry(\"Associated tags :\", info.getTags().toString());\n\
  }\n@RepeatedTest(value = 10)\n@Tag(\"Numbers\")\nvoid numberTest(RepetitionInfo\
  \ info) {\nassertTrue(true);\n}\n@Test\nvoid nonRepeated(RepetitionInfo info) {\n\
  assertTrue(true);\n}\n}\n```\n\n`TestReporter` 是 JUnit 5 向标准输出/标准错误输出打印信息的首选方式。另请注意，上述每个\
  \ `ParameterResolver` 都由 JUnit 执行引擎自动激活，无需使用 `@ExtendsWith` 进行显式激活。\n\n## 异常处理\n\
  \n我们将讨论的最后一个扩展点是 `TestExecutionExceptionHandler`。此扩展可用于在测试遇到异常时改变其行为。\n\n假设我们想创建一个扩展，用于记录并忽略所有\
  \ `IOException` 类型的异常，同时重新抛出所有其他异常。\n\n```\npublic class IgnoreIOExceptionExtension\n\
  implements TestExecutionExceptionHandler {\nLogger logger = LoggerFactory\n.getLogger(IgnoreIOExceptionExtension.class);\n\
  @Override\npublic void handleTestExecutionException(ExtensionContext context,\n\
  Throwable throwable) throws Throwable {\nif (throwable instanceof IOException) {\n\
  logger.error(\"IO Exception {}\", throwable);\nreturn;\n}\nthrow throwable;\n}\n\
  }\n```\n\n## 注册扩展\n\n在前几节中，我们创建了测试扩展。现在，我们需要将它们注册到 JUnit 5 测试中。为此，我们使用 `@ExtendWith`\
  \ 注解。你可以多次使用此注解来注册多个扩展，也可以将多个扩展作为数组传递给 `@ExtendWith` 注解。\n\n```\n@ExtendWith({\n\
  IgnoreIOExceptionExtension.class,\nBookParameterResolver.class,\nRunOnCIExtension.class,\n\
  TestSummaryExtension.classs\n})\n@ExtendWith(LoggingExtension.class)\npublic class\
  \ UserServiceTests{\n}\n```\n\n你也可以通过使用 `ServiceLoader` 机制自动注册扩展。你的扩展需要有一个文件 `META-INF/services/org.junit.jupiter.api.extension.Extension`，其中包含扩展的完全限定名称。\n\
  \n```\ncom.shekhargulati.extensions.TestSummaryExtension .\n```\n\n要启用此扩展注册机制，你需要将\
  \ `junit.extensions.autodetection.enabled` 配置属性设置为 `true`。一种方法是通过向 JVM（Java 虚拟机）传递系统属性来实现。另一种方法是将配置参数添加到\
  \ `LauncherDiscoveryRequest` 中，如下代码所示：\n\n```\nLauncherDiscoveryRequest request\n\
  = LauncherDiscoveryRequestBuilder.request()\n.selectors(selectClass(\"com.junit5book.UserServiceTests\"\
  ))\n.configurationParameter(\"junit.extensions.autodetection.enabled\", \"true\"\
  )\n.build();\n```\n\n## JUnit 5 扩展\n\nJUnit 团队使用扩展模型开发了以下新的测试类型：\n\n*   `@TestTemplate`：定义一个在运行时生成测试的模板。\n\
  *   `@ParameterizedTest`：定义一个带参数的测试方法。\n\n在接下来的章节中，我们将介绍如何使用上述每个扩展。这些章节不会涵盖每个扩展的实现细节。如需了解此类细节，请参阅\
  \ JUnit 5 文档。\n\n\n\n### 测试模板\n\nJUnit 5 允许我们创建测试骨架，这些骨架通过 `TestTemplateInvocationContext`\
  \ 实例化，从而在运行时生成测试。生成的测试类似于 `@Test` 方法。模板支持完整的测试生命周期。任何使用 `@BeforeAll`/`@BeforeEach`/`@AfterEach`/`@AfterAll`\
  \ 注解的方法都会根据生成测试的生命周期来执行。\n\n测试模板是通过在非静态方法测试类上标记 `org.junit.jupiter.api.TestTemplate`\
  \ 注解来创建的。此外，我们必须注册一个 `TestTemplateInvocationContextProvider` 扩展的实现，该扩展用于从模板生成实际的测试。\n\
  \n让我们尝试为我们的 `bookstoread` 应用程序添加一个测试模板。在第 4 章中，我们添加了可应用于 `Book` 的 `BookFilter`。该过滤器验证书籍是否满足某个条件。我们还创建了\
  \ `BookPublishedYearFilter`，它可以根据出版年份来过滤书籍。\n\n在当前上下文中，让我们添加一个测试模板，该模板可以接收 `BookFilter`\
  \ 和一个书籍数组，然后断言过滤器的验证结果。\n\n```\nclass BookFilterTemplateSpec {\n@TestTemplate\n\
  @ExtendWith(BookFilterTestInvocationContextProvider.class)\nvoid validateFilters(BookFilter\
  \ filter, Book[] books) {\nassertNotNull(filter);\nassertFalse(filter.apply(books[0]));\n\
  assertTrue(filter.apply(books[1]));\n}\n}\n```\n\n如上述测试用例所示，我们还需要创建一个 `BookFilterTestInvocationContextProvider`，它是\
  \ `org.junit.jupiter.api.extension.TestTemplateInvocationContextProvider` 的一个实现。该提供者需要实现以下方法：\n\
  \n`supportsTestTemplate`：该方法验证提供者是否适用于传入的 `ExecutionContext`。JUnit 执行引擎首先调用此方法来验证提供者是否适用。\n\
  \n`provideTestTemplateInvocationContexts`：该方法提供一个 `org.junit.jupiter.api.extension.TestTemplateInvocationContext`\
  \ 的流。每个 `TestTemplateInvocationContext` 实例负责提供相应的测试名称以及额外的扩展（如果有的话）。\n\n```\nclass\
  \ BookFilterTestInvocationContextProvider implements TestTemplateInvocationContextProvider\
  \ {\n@Override\npublic boolean supportsTestTemplate(ExtensionContext context) {\n\
  return true;\n}\n@Override\npublic Stream provideTestTemplateInvocationContexts(ExtensionContext\
  \ context) {\nBook cleanCode = new Book(\"Clean Code\", \"Robert C. Martin\", LocalDate.of(2008,\
  \ Month.AUGUST, 1));\nBook codeComplete = new Book(\"Code Complete\", \"Steve McConnel\"\
  , LocalDate.of(2004, Month.JUNE, 9));\nreturn Stream.of(bookFilterTestContext(\"\
  Before Filter\", BookPublishedYearFilter.Before(2007), cleanCode, codeComplete),\n\
  bookFilterTestContext(\"After Filter\", BookPublishedYearFilter.After(2007), codeComplete,\
  \ cleanCode));\n}\nprivate TestTemplateInvocationContext bookFilterTestContext(String\
  \ testName, BookFilter bookFilter, Book... array) {\nreturn new TestTemplateInvocationContext()\
  \ {\n@Override\npublic String getDisplayName(int invocationIndex) {\nreturn testName;\n\
  }\n@Override\npublic List getAdditionalExtensions() {\nreturn Lists.newArrayList(new\
  \ TypedParameterResolver(bookFilter), new TypedParameterResolver(array));\n}\n};\n\
  }\n}\n```\n\n让我们详细看看 `provideTestTemplateInvocationContexts` 方法。该方法返回一个 `Stream<TestTemplateInvocationContext>`。每个\
  \ `TestTemplateInvocationContext` 实例提供一个测试显示名称和两个额外的扩展。这些扩展负责为我们的 `validateFilters`\
  \ 测试解析方法参数。\n\n我们的 `BookFilterTestInvocationContextProvider` 生成了以下两个测试用例：\n\n* \
  \  **年份之前测试**：该测试包含 `BookPublishedYearFilter.Before(2007)` 过滤器和一个包含两本书的数组。\n*  \
  \ **年份之后测试**：该测试包含 `BookPublishedYearFilter.After(2007)` 过滤器和一个包含两本书的数组。\n\n我们添加了一个\
  \ `TypedParameterResolver` 扩展。该扩展接收一个值，并验证它是否是传入方法参数之一的实例。如果是，则返回该值。\n\n```\nclass\
  \ TypedParameterResolver implements ParameterResolver {\nT data;\nTypedParameterResolver(T\
  \ data) {\nthis.data = data;\n}\n@Override\npublic boolean supportsParameter(ParameterContext\
  \ parameterContext, ExtensionContext extensionContext) throws ParameterResolutionException\
  \ {\nClass parameterClass = parameterContext.getParameter().getType();\nreturn parameterClass.isInstance(data);\n\
  }\n@Override\npublic Object resolveParameter(ParameterContext parameterContext,\
  \ ExtensionContext extensionContext) throws ParameterResolutionException {\nreturn\
  \ data;\n}\n}\n```\n\n现在我们已经为测试模板添加了所有必需的组件，让我们执行它。将会运行两个测试，一个执行“年份之前”检查，另一个执行“年份之后”检查（参见图\
  \ 7-1）。\n\n![A429029_1_En_7_Fig1_HTML.jpg](img/A429029_1_En_7_Fig1_HTML.jpg)\n\n\
  图 7-1.\n\n测试模板结果\n\n\n\n### 参数化测试\n\n在第 4 章中，我们了解到 JUnit 5 允许我们向测试中注入参数。参数可以注入到测试方法或\
  \ `BeforeEach`/`AfterEach` 方法中。这是通过实现 `org.junit.jupiter.extension.Extension` 接口（该接口可以提供值），然后使用\
  \ `@ExtendWith` 将其注册到测试中来实现的。\n\n但如果只需要向测试方法中注入值，我们可以省去 `org.junit.jupiter.extension.Extension`\
  \ 的自定义实现。相反，我们可以使用 `org.junit.jupiter.params.ParameterizedTest` 注解测试方法。我们还需要注册一个用于提供值的\
  \ `ValueSource`。\n\n在我们的 `bookstoread` 应用中，我们向 `Bookshelf` 添加了一个 `findBookByTitle`\
  \ 方法。让我们添加一个测试用例，在其中按现有标题搜索书架。\n\n```\n@ParameterizedTest\n@ValueSource(strings\
  \ = {\"Effective Java\", \"Code Complete\", \"Clean Code\"})\nvoid shouldGiveBackBooksForTitle(String\
  \ title) {\nBookShelf shelf = new BookShelf();\nBook effectiveJava = new Book(\"\
  Effective Java\", \"Joshua Bloch\", LocalDate.of(2008, Month.MAY, 8));\nBook codeComplete\
  \ = new Book(\"Code Complete\", \"Steve McConnel\", LocalDate.of(2004, Month.JUNE,\
  \ 9));\nBook mythicalManMonth = new Book(\"The Mythical Man-Month\", \"Frederick\
  \ Phillips Brooks\", LocalDate.of(1975, Month.JANUARY, 1));\nBook cleanCode = new\
  \ Book(\"Clean Code\", \"Robert C. Martin\", LocalDate.of(2008, Month.AUGUST, 1));\n\
  shelf.add(effectiveJava, codeComplete, mythicalManMonth, cleanCode);\nList foundBooks\
  \ = shelf.findBooksByTitle(title.toLowerCase());\nassertNotNull(foundBooks);\nassertEquals(1,foundBooks.size());\n\
  foundBooks = shelf.findBooksByTitle(title.toUpperCase());\nassertNotNull(foundBooks);\n\
  assertEquals(0,foundBooks.size());\n}\n```\n\n`shouldGiveBackBooksForTitle` 测试方法接收一个\
  \ `String` 作为输入。该方法随后构建一个包含书籍列表的 `BookShelf`。测试用例接着使用 `findBooksByTitle` 方法对指定的标题进行断言。\n\
  \n`String` 参数值由测试方法上的 `@ValueSource` 指定。该注解接收一个字符串数组作为输入，从而为每个值重复执行测试（见图 7-2）。\n\
  \n![A429029_1_En_7_Fig2_HTML.jpg](img/A429029_1_En_7_Fig2_HTML.jpg)\n\n图 7-2.\n\n\
  字符串参数\n\n`@ValueSource` 可用于指定原始类型（整数/双精度浮点数/长整数）和字符串的数组。该包还提供了以下数据源：\n\n*   `EnumSource`：该数据源可用于从枚举中注入值。它允许选择/取消选择指定枚举值的子集。\n\
  *   `MethodSource`：该数据源可用于提供值的流/数组/可迭代对象。该方法必须是静态的，且不能接受任何参数。\n*   `CSVSource`：该数据源可用于注入逗号分隔值的列表。每个逗号分隔的值可用于匹配测试方法的一个参数。\n\
  *   `CSVFileSource`：该数据源可用于从指定文件中注入逗号分隔值的列表。每个逗号分隔的值可用于匹配测试方法的一个参数。\n*   `ArgumentsSource`：该数据源可用于注册一个自定义的\
  \ `Stream<Arguments>` 提供者。注册的提供者可用于注入自定义类型或多个参数（成对出现）。\n\n现在，让我们为 `bookstoread`\
  \ 应用使用其中一些数据源。我们可以使用 `MethodSource` 来提供一个 `BookFilter` 数组，这些过滤器可以单独进行验证。\n\n```\n\
  @ParameterizedTest\n@MethodSource(\"bookFilterProvider\")\nvoid validateFilterWithNullData(BookFilter\
  \ filter) {\nassertThat(filter.apply(null)).isFalse();\n}\nstatic Stream bookFilterProvider()\
  \ {\nreturn Stream.of(BookPublishedYearFilter.Before(2007), BookPublishedYearFilter.After(2007));\n\
  }\n```\n\n我们还可以注册一个自定义提供者，它可以成对注入值。这可以用来简化我们在上一节中创建的 `BookFilter` 模板测试。同样，测试方法将接收一个\
  \ `BookFilter` 和 `Book[]` 作为参数。然后，它使用提供的过滤器验证 `Book[]` 的值。\n\n```\n@ParameterizedTest\n\
  @ArgumentsSource(BookFilterCompositeArgsProvider.class)\nvoid validateBookFiltersWithBooks(BookFilter\
  \ filter, Book[] books) {\nassertNotNull(filter);\nassertFalse(filter.apply(books[0]));\n\
  assertTrue(filter.apply(books[1]));\n}\nclass BookFilterCompositeArgsProvider implements\
  \ ArgumentsProvider {\n@Override\npublic Stream provideArguments(ExtensionContext\
  \ context) {\nBook cleanCode = new Book(\"Clean Code\", \"Robert C. Martin\", LocalDate.of(2008,\
  \ Month.AUGUST, 1));\nBook codeComplete = new Book(\"Code Complete\", \"Steve McConnel\"\
  , LocalDate.of(2004, Month.JUNE, 9));\nreturn Stream.of(Arguments.of(BookPublishedYearFilter.Before(2007),\
  \ Arrays.array(cleanCode, codeComplete)),\nArguments.of(BookPublishedYearFilter.After(2007),\
  \ Arrays.array(codeComplete, cleanCode)));\n}\n}\n```\n\n`BookFilterCompositeArgsProvider`\
  \ 提供了一个参数流，其中每个参数实例包含两个值（即一个 `BookFilter` 和一个 `Book[]`）。\n\n前面讨论的所有数据源都是可重复的。一个测试可以有多个注解，这些注解可以提供不同的值集。在下面的测试用例中，我们将\
  \ `Book[]` 替换为一个 `Book` 实例。因此，测试方法接收一个 `BookFilter` 和一个 `Book` 作为参数。该测试使用 `BeforeYearArgsProvider`\
  \ 注解（用于满足 `BeforePublishedYear` 过滤器条件的值）和 `AfterYearArgsProvider` 注解（用于满足 `AfterPublishYear`\
  \ 过滤器条件的值）。\n\n```\n@ParameterizedTest(name = \"{index} : Validating {1}\")\n@DisplayName(\"\
  Filter validates a passing book\")\n@ArgumentsSource(BeforeYearArgsProvider.class)\n\
  @ArgumentsSource(AfterYearArgsProvider.class)\nvoid validateBookFiltersWithBooks1(BookFilter\
  \ filter, Book book) {\nassertNotNull(filter);\nassertTrue(filter.apply(book));\n\
  }\n}\nclass BeforeYearArgsProvider implements ArgumentsProvider {\n@Override\npublic\
  \ Stream provideArguments(ExtensionContext context) {\nBook cleanCode = new Book(\"\
  Clean Code\", \"Robert C. Martin\", LocalDate.of(2006, Month.AUGUST, 1));\nBook\
  \ codeComplete = new Book(\"Code Complete\", \"Steve McConnel\", LocalDate.of(2004,\
  \ Month.JUNE, 9));\nreturn Stream.of(Arguments.of(BookPublishedYearFilter.Before(2007),\
  \ cleanCode),\nArguments.of(BookPublishedYearFilter.Before(2007), codeComplete));\n\
  }\n}\nclass AfterYearArgsProvider implements ArgumentsProvider {\n@Override\npublic\
  \ Stream provideArguments(ExtensionContext context) {\nBook cleanCode = new Book(\"\
  Clean Code\", \"Robert C. Martin\", LocalDate.of(2009, Month.AUGUST, 1));\nBook\
  \ codeComplete = new Book(\"Code Complete\", \"Steve McConnel\", LocalDate.of(2008,\
  \ Month.JUNE, 9));\nreturn Stream.of(Arguments.of(BookPublishedYearFilter.After(2007),\
  \ cleanCode),\nArguments.of(BookPublishedYearFilter.After(2007), codeComplete));\n\
  }\n}\n```\n\n现在，在上述代码中我们使用了 `@DisplayName`。该注解为整个测试执行（包含所有传入的值）赋予一个有意义的名称。此外，通过指定\
  \ `@ParameterizedTest` 的 `name` 属性，可以为每次测试执行提供一个有意义的名称。如果我们不提供任何名称，测试执行会使用注入的值生成一个默认名称。现在让我们运行完整的测试（见图\
  \ 7-3）。\n\n![A429029_1_En_7_Fig3_HTML.jpg](img/A429029_1_En_7_Fig3_HTML.jpg)\n\n\
  图 7-3.\n\n参数化测试结果\n\n## 总结\n\n在本章中，我们首先学习了 JUnit 5 的新扩展 API。我们发现扩展 API 支持测试执行的所有生命周期阶段。该\
  \ API 还支持条件测试执行以及测试执行期间生成的异常。JUnit 5 包使用扩展 API 提供了许多功能，如默认提供者、测试模板和参数化测试。\n\n\n\n"
- "# 8. 动态测试与从 JUnit 4 迁移\n\n在本书中，我们通过为 `bookstoread` 应用构建测试，学习了 JUnit 5 的不同特性。到目前为止，我们添加的所有测试本质上都是静态的。JUnit\
  \ 5 为我们提供了一种全新的运行时测试创建范式。在本章中，我们将探讨动态测试的生成。\n\n我们已经介绍了 JUnit 5 的所有特性。现在可以说，JUnit\
  \ 5 将成为未来单元测试的事实标准。各种工具和平台正在构建对 JUnit 5 的支持。我们可以紧跟 JUnit 5 的潮流并开始采用它。但在过去，我们基于 JUnit\
  \ 4 开发了大量测试和工具，这些代码至今仍为我们创造价值。我们可以保留旧工具/基础设施中的所有代码。但随着我们继续前进，这会使事情变得困难。在本章中，我们还将探讨将现有基于\
  \ JUnit 4 的代码迁移到新版本的方法。\n\n## 动态测试\n\n到目前为止，我们已经体验了多种创建测试用例的方式（`@Test`、`@TestTemplate`、`@ParameterizedTest`）。所有这些方法定义的测试都是静态的。此类测试中定义的行为在编译时确定，无法在运行时更改。假设（Assumptions）允许我们添加一些运行时行为，但其能力也有限。JUnit\
  \ 5 引入了 `@TestFactory`，这是一种动态的测试执行模型。该模型使我们能够在运行时生成测试用例。在预期基于环境、操作系统、参数、应用配置等产生不同行为的场景中，该模型非常有用。被\
  \ `@TestFactory` 注解的方法必须返回 `DynamicTest` 的 `Stream`/`Collection`/`Iterable`/`Iterator`。尝试返回其他任何内容都会导致\
  \ `org.junit.platform.commons.JUnitException`。`org.junit.jupiter.api.DynamicTest`\
  \ 类包含一个测试名称和一个可执行体，该可执行体必须作为测试执行的一部分被执行。\n\n```\npublic class DynamicSpec  {\n@TestFactory\n\
  Collection generateFirstTest() {\nreturn Arrays.asList(\ndynamicTest(\"Week Test\"\
  , () -> assertEquals(DayOfWeek.MONDAY,DayOfWeek.of(1))),\ndynamicTest(\"Month Test\"\
  , () -> assertEquals(Month.JANUARY, Month.of(1)))\n);\n}\n}\n```\n\n与静态测试相比，动态测试具有完全不同的生命周期。没有回调/生命周期方法。此外，这些测试不支持\
  \ JUnit 5 扩展模型。因此，我们无法使用扩展模型注入任何参数。但 Java 8 lambda 表达式允许我们将单个方法参数传递给相应的动态生成的测试。有一个\
  \ `DynamicTest.stream` API（应用程序编程接口），它允许我们传递一个输入参数的迭代器。从迭代器中检索到的每个值都会传递给一个新的测试执行。\n\
  \n```\n@TestFactory\nStream generateParameterizedTest() {\nLocalDate startDate =\
  \ LocalDate.now();\nIterator daysIter = Stream.iterate(startDate, date -> date.plusDays(1)).limit(10).iterator();\n\
  return  stream(daysIter, d -> DateTimeFormatter.ISO_LOCAL_DATE.format(d), d -> assertNotNull(d));\n\
  }\n```\n\n让我们运行 `DynamicSpec`。我们应该会看到一个绿色条，表示有 12 个测试用例正在执行。我们已经讨论了动态测试没有测试生命周期和扩展支持的事实。但这并不意味着我们不能在动态测试中使用这些特性。负责生成测试的\
  \ `@TestFactory` 方法支持所有这些特性。我们可以注册一个扩展来向 `@TestFactory` 方法注入值。\n\n```\n@TestFactory\n\
  @ExtendWith(BooksProvider.class)\nStream generateBooksTest(Book[] books) {\nreturn\
  \  stream(Arrays.asList(books).iterator(), b  -> String.format(\"Validating : %s\"\
  ,b.getTitle()), b -> assertFalse(b.isProgress()));\n}\n```\n\n上述测试方法使用 `BooksProvider`\
  \ 注入了一个 `Book[]`，该提供器已在第 4 章中添加。生成的测试将包含一个书名作为测试名称的一部分。\n\n![A429029_1_En_8_Fig1_HTML.jpg](img/A429029_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1.\n\n动态测试\n\n## JUnit 4 支持\n\nJUnit 5 是基于过去经验教训对框架的重写。它为我们提供了新的、简单的方法来完成工作。它构建了一个新的编程模型和一个与旧版本框架不兼容的扩展框架。尽管新版本与旧版本不兼容，但框架编写者确保新旧版本可以在同一基础设施中共存。他们构建了足够的支持，以便开发者能够拥有轻松的迁移路径。\n\
  \n让我们开始向我们的 `bookstoread` 项目添加一个基于 JUnit 4 的示例测试。在第 1 章中，我们添加了 `BookShelfSpec`。这些测试用例定义了\
  \ `BookShelf` 类在各种场景下的行为。现在，添加一个新的测试用例 `bookstoread.junit4.BookShelfSpec`。\n\n```\n\
  @RunWith(MockitoJUnitRunner.class)\npublic class BookShelfSpec {\nprivate BookShelf\
  \ shelf;\n@Mock\nprivate Book effectiveJava;\n@Mock\nprivate Book codeComplete;\n\
  @Rule\npublic TemporaryFolder temporaryFolder = new TemporaryFolder();\n@Before\n\
  public void init() throws Exception{\nshelf = new BookShelf();\ntemporaryFolder.newFile();\n\
  }\n@Test\npublic void emptyBookShelfWhenNoBookAdded() {\nList books = shelf.books();\n\
  assertTrue(books.isEmpty(), () -> \"BookShelf should be empty\");\n}\n@Test\npublic\
  \ void bookshelfContainsTwoBooksWhenTwoBooksAdded() {\nshelf.add(effectiveJava,\
  \ codeComplete);\nList books = shelf.books();\nassertEquals(2, books.size(), ()\
  \ -> \"BookShelf should have two books\");\n}\n}\n```\n\n在上述测试用例中，我们的测试注解来自 `org.juint`\
  \ 包。要使用这个包，我们必须将 `testCompile junit:junit:4.12` 依赖添加到我们的 `build.gradle` 中。\n\n在上述测试用例中，我们添加了\
  \ JUnit 4 的特性，如 Runners 和 Rules，尽管其中一些并非必需。这里的目标是确定我们如何与所有这些特性协同工作。\n\n让我们尝试执行 `./gradlew\
  \ clean build` 以确保构建成功。我们的 `bookstoread` 应用源代码包含一个 `junitPlatformTest` 插件。该插件默认禁用标准的\
  \ Gradle 测试任务。通过添加以下配置来启用它：\n\n```\njunitPlatform{\nenableStandardTestTask true\n\
  }\n```\n\n我们还需要为 `bookstoread.junit4` 包配置测试插件。\n\n```\ntest {\ninclude '**/junit4/**'\n\
  }\n```\n\n构建后，我们将在 `build/reports` 文件夹中获得测试执行报告（见图 8-2）：\n\n![A429029_1_En_8_Fig2_HTML.jpg](img/A429029_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2.\n\nJUnit 4 测试\n\n\n\n### 使用 Vintage 引擎\n\nJUnit 的下一个版本不仅改进了测试 API，还定义了一个平台框架，可供基于\
  \ JUnit 构建的各种工具/插件使用。该平台框架包含面向测试发现、过滤、报告等功能的工具 API。它还定义了一个可插拔的引擎，负责执行测试。这使我们能够拥有独立的引擎来执行不同类型的测试。JUnit\
  \ 5 版本定义了 Jupiter 引擎，用于执行基于 JUnit 5 API 的测试。它还定义了一个 Vintage 引擎，用于执行基于旧版本 JUnit 的测试。\n\
  \nJunitPlatformTest 插件基于前面描述的框架。该插件会发现项目类路径中可用的引擎并执行它们。到目前为止，我们只使用了 Jupiter 引擎。可以通过将其添加到我们的\
  \ `build.gradle` 中来启用 Vintage 引擎。\n\n```\ntestCompile 'org.junit.vintage:junit-vintage-engine:4.12.1'\n\
  ```\n\n现在，执行 `./gradlew clean build` 应该在 `build/test-results/junit-platform` 文件夹中提供一个测试执行报告。该文件夹将为每个执行的引擎提供一个\
  \ XML 报告。\n\nVintage 引擎是一种无缝集成所有现有基于 JUnit 4 代码的方式。需要注意的是，使用 Vintage 引擎将有助于基于不同\
  \ JUnit 版本的测试用例在同一个项目中共存。但这并不会使旧版本的测试使用 JUnit 5 的新特性/方面。如图 8-3 中的 JUnit 执行报告所示，这两个引擎是相互独立执行的。\n\
  \n![A429029_1_En_8_Fig3_HTML.jpg](img/A429029_1_En_8_Fig3_HTML.jpg)\n\n图 8-3.\n\n\
  组合引擎报告\n\n### 迁移到 JUnit 5\n\nVintage 引擎为开发者提供了迁移的灵活性。我们可以从它开始，用新的生态系统构建我们所有的测试用例，然后逐步将我们的测试迁移到新的\
  \ JUnit 5 API。新的 API 位于 `org.junit.jupiter.api` 包下。大多数测试生命周期注解在旧版本和新版本之间都有一一对应的关系。\n\
  \n| Junit 4 (org.juint) | Junit 5 (org.junit.jupiter.api) |\n| --- | --- |\n| Test\
  \ | Test |\n| Before | BeforeEach |\n| BeforeClass | BeforeAll |\n| After | AfterEach\
  \ |\n| AfterClass | AfterAll |\n| Ignore | Disabled |\n| Category | Tag |\n| RunWith\
  \ | ExtendWith |\n\n为了迁移我们现有的基于 JUnit 4 的 `bookstoread.junit4.BookShelfSpec` 测试，我们必须执行以下操作：\n\
  \n*   将所有旧的测试注解替换为对应的新值。\n*   重构 JUnit 4 断言的测试用例。一些 JUnit 4 断言不再被支持。在新版本中，所有断言都是\
  \ `org.junit.jupiter.api.Assertions` 类的一部分。\n*   重构 JUnit 4 假设的测试用例。一些 JUnit 4 假设不再被支持。在新版本中，所有假设都是\
  \ `org.junit.jupiter.api.Assumptions` 类的一部分。\n*   `RunWith` 注解接受一个 `MockitoJunit4Runner`\
  \ 类。但同样的类不能与 `ExtendWith` 一起使用。JUnit 4 的 Runner 模型在新版本中不再被支持。新版本要求使用扩展来代替 Runner。这些扩展需要添加到每个框架的新版本中（例如，Mockito\
  \ 需要有一个 `MockitoExtension`）。类似地，当我们处理基于 Spring 的应用程序时，我们有一个 `SpringJUnit4ClassRunner`，用于通过\
  \ Spring 上下文注入依赖。同一个 Runner 不能与 JUnit 5 一起使用；因此 Spring 开发者添加了一个 `SpringExtension`，目前正在\
  \ Spring 5.0-SNAPSHOT 下开发。\n*   `RunWith` 注解只能应用于一个测试类一次。因此，只能将一个 Runner 应用于一个测试类。但\
  \ `ExtendWith` 注解没有这个限制。它是一个可重复的注解，允许一个测试类拥有多个扩展。\n*   如果扩展不可用，就像我们这种情况，我们需要在测试用例中执行相同的任务（即创建模拟对象）。\n\
  *   JUnit 4 引入了规则（Rules），可用于向每个测试用例添加行为。规则有两种注解。\n    *   `@Rule`，为每个测试执行。\n   \
  \ *   `@ClassRule`，为测试类中的所有测试执行一次。在新版本中，这两者都不再被支持。开发者应该使用扩展来扩展行为，而不是使用规则。但是规则有很多种，用于各种事情，比如添加临时文件、超时、秒表等等。因此，所有这些都需要重构到新模型中，但这意味着我们失去了功能吗？JUnit\
  \ 5 团队提供了特定的扩展，以确保所有现有的规则无需任何更改即可工作。以下扩展已添加到 JUnit 5：\n    *   `ExternalResourceSupport`\n\
  \    *   `VerifierSupport`\n    *   `ExpectedExceptionSupport`\n\n我们可以将每个扩展添加到我们的测试用例中，或者我们可以使用\
  \ `EnableRuleMigrationSupport` 注解，它可以启用所有这些扩展。这些扩展是 `junit-jupiter-migration-support`\
  \ 组件的一部分。因此我们需要将其添加到我们的 `build.gradle` 中：\n\n```\ntestCompile 'org.junit.jupiter:junit-jupiter-migrationsupport:5.0.1'\n\
  ```\n\n最后，我们迁移后的测试用例看起来如下：\n\n```\n@EnableRuleMigrationSupport\nclass BookShelfSpec\
  \ {\nprivate BookShelf shelf;\n@Mock\nprivate Book effectiveJava;\n@Mock\nprivate\
  \ Book codeComplete;\n@Rule\npublic TemporaryFolder temporaryFolder = new TemporaryFolder();\n\
  @BeforeEach\nvoid init() throws Exception {\nshelf = new BookShelf();\nMockitoAnnotations.initMocks(this);\n\
  temporaryFolder.newFile();\n}\n@Test\nvoid emptyBookShelfWhenNoBookAdded() {\nList\
  \ books = shelf.books();\nassertTrue(books.isEmpty(), () -> \"BookShelf should be\
  \ empty\");\n}\n}\n```\n\n在 JUnit 5 中，如果我们运行规则而没有相应的扩展，执行引擎会在执行规则方法时抛出各种异常。这些异常主要与规则中编写的逻辑有关，而不是通用的\
  \ JUnit 5 错误。\n\n上述测试用例不再需要 Vintage 引擎来执行测试。但我们仍然不能移除它的依赖。该测试用例使用了 `TemporaryFolder`\
  \ 规则，这是 JUnit 4 的一部分。\n\n运行 `./gradlew clean build` 以确保所有测试都通过，如图 8-4 中的报告所示。\n\n\
  ![A429029_1_En_8_Fig4_HTML.jpg](img/A429029_1_En_8_Fig4_HTML.jpg)\n\n图 8-4.\n\n\
  从 Vintage 到 Jupiter\n\n\n\n## 总结\n\n在本章中，我们学习了如何将所有现有测试迁移到新版本。JUnit 5 定义了一个平台框架，允许我们使用可插拔的引擎来执行测试。基于\
  \ JUnit 5 API 的测试由 Jupiter 引擎执行，而基于旧版本 JUnit 的测试则由 Vintage 引擎执行。这两个引擎使我们能够在同一个项目中同时使用新旧\
  \ JUnit API 进行测试。但这并不能让旧版本的测试使用 JUnit 5 提供的新特性。如果我们想使用这些新特性，就需要将测试迁移到新版本。最后，我们列出了在迁移到\
