  , expected.getMessage());\n}\n}\n```\n\n在上述代码中，我们将 `bookShelf.add` 语句包装在 try-catch\
  \ 块中。我们捕获了 `BookShelfCapacityReached` 异常，并验证了消息是否符合预期。\n\n上述测试用例完整吗？不，即使 `bookshelf.add`\
  \ 语句没有抛出异常，它也会通过。为了确保在未引发异常时测试失败，我们调用 `org.junit.jupiter.api.Assertions.fail` 方法来实现预期的行为，如下面的代码所示：\n\
  \n```\n@Test\nvoid throwsExceptionWhenBooksAreAddedAfterCapacityIsReached() {\n\
