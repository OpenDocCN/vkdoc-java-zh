  \ 的 `Assertions` 类提供了一个 `org.junit.jupiter.api.Assertions.assertThrows` 方法，让你能够以清晰易读的方式编写代码来验证异常及其关联消息。它还允许你缩小抛出异常的代码范围，从而避免\
