  ### AssertJ


  断言是测试类的关键部分，因为它们提供了结果验证。JUnit 5.0 提供了一组最少的断言 API。JUnit 平台只关心断言结果，而不关心断言 API。有许多第三方
  API 可以帮助我们编写富有表现力的断言。旧版本的 JUnit 曾嵌入 Hamcrest 库来直接提供此功能。但新版本已弃用 Hamcrest；相反，它推荐使用
  AssertJ 来完成这项工作。


  AssertJ [`http://joel-costigliola.github.io/assertj/`](http://joel-costigliola.github.io/assertj/)
  是编写断言的事实标准之一。它提供了丰富的流畅 API 来断言各个方面。总体而言，它带来了测试用例可读性和可维护性的好处。


  在 `bookshelfArrangedByUserProvidedCriteria` 测试用例中，我们尝试将书籍的顺序与预期顺序进行比较。我们认为，该测试用例在验证结果时存在一个小问题。它比较两个不同的集合来检查元素顺序，但没有验证结果中的元素是否根据提供的比较器进行了排序。


  假设我们将比较器改为自然顺序。这将改变结果的完整顺序。但失败的测试用例会提供一个错误，要求将顺序更正为降序。


  ```

  预期 :[Book{title=''人月神话'', author=''弗雷德里克·布鲁克斯'', publishedOn=1975-01-01}, Book{title=''Effective
  Java'', author=''约书亚·布洛克'', publishedOn=2008-05-08}, Book{title=''代码大全'', author=''史蒂夫·麦康奈尔'',
  publishedOn=2004-06-09}]

  实际   :[Book{title=''代码大全'', author=''史蒂夫·麦康奈尔'', publishedOn=2004-06-09}, Book{title=''Effective
  Java'', author=''约书亚·布洛克'', publishedOn=2008-05-08}, Book{title=''人月神话'', author=''弗雷德里克·布鲁克斯'',
  publishedOn=1975-01-01}]

  ```


  如果我们查看测试，代码按预期工作，但断言结果中存在一个错误。如果我们能验证结果是按提供的比较器排序的，而不是将结果与另一个集合进行比较，那么我们可以大大改进这一点。AssertJ
  正好允许我们这样做。让我们先在 build.gradle 的 dependencies 部分添加 AssertJ 依赖。


  ```

  dependencies {

  def junitVersion = ''5.0.1''

  testCompile ''org.junit.jupiter:junit-jupiter-api:'' + junitVersion

  testCompile ''org.junit.jupiter:junit-jupiter-engine:'' + junitVersion

  testCompile ''org.assertj:assertj-core:3.8.0''

  }

  ```


  现在，让我们使用 AssertJ 库的 `assertThat` 方法来修改测试用例。我们希望确保列表是使用提供的 Comparator 排序的。`assertThat`
  断言是 `org.assertj.core.api.Assertions` 类的一部分，因此在使用该断言之前，我们必须导入该类。


  ```

  import static org.assertj.core.api.Assertions.assertThat;

  @Test

  void bookshelfArrangedByUserProvidedCriteria() {

  shelf.add(effectiveJava, codeComplete, mythicalManMonth);

  Comparator reversed = Comparator.naturalOrder().reversed();

  List books = shelf.arrange(reversed);

  assertThat(books).isSortedAccordingTo(reversed);

  }

  ```


  上述测试用例更准确地表达了我们的意图。接下来，我们将进一步探索 AssertJ 库来执行我们的验证。


  ### 使用 @DisplayName


