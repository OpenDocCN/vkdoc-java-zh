  ### 嵌套测试


  在一个编写良好的测试套件中，针对应用程序的不同功能会有多个测试。在我们的示例中，到目前为止，我们实现了三个功能，同时编写了近 10 个测试用例。这常常导致我们的测试类中测试用例激增。JUnit
