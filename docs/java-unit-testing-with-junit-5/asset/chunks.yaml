- fmt: "# Feature: Search BookShelf\n\nAs a user, I should be able to search my bookshelf.\
    \ The search results can be filtered by different attributes of the book like\
    \ author and published date.\n\nThe next feature adds the searching capability\
    \ to the `BookShelf`. As a user, we would like to find a particular title in our\
    \ `BookShelf`. The search should be based on the partial text. This can lead to\
    \ many results for a term, so hints can be passed in the form of additional information\
    \ like published date or the author’s name to filter down the results to the required\
    \ ones.\n\nLet us start on this feature by adding a plain vanilla title-based\
    \ search to the `BookShelf`.\n\n```\n@Nested\n@DisplayName(\"search\")\nclass\
    \ BookShelfSeachSpec {\n    @BeforeEach\n    void setup() {\n        shelf.add(codeComplete,\
    \ effectiveJava, mythicalManMonth, cleanCode);\n    }\n\n    @Test\n    @DisplayName(\"\
    \ should find books with title containing text\")\n    void shouldFindBooksWithTitleContainingText()\
    \ {\n        List books = shelf.findBooksByTitle(\"code\");\n        assertThat(books.size()).isEqualTo(2);\n\
    \    }\n}\n```\n\nWe will leave out the details of the `findBooksByTitle` method.\
    \ The reader must try to add an implementation which makes the foregoing test\
    \ case pass.\n\nNow let’s enhance the API by adding the required hints. In the\
    \ feature description, a user may wish to search on published date, so we should\
    \ add a test case for the same.\n\n```\n@Test\n@DisplayName(\" should find books\
    \ with title containing text and published after specified date.\")\nvoid shouldFilterSearchedBooksBasedOnPublishedDate()\
    \ {\n    List books = shelf.findBooksByTitle(\"code\", b -> b.getPublishedOn().isBefore(LocalDate.of(2014,\
    \ 12, 31)));\n    assertThat(books.size()).isEqualTo(2);\n}\n```\n\nHere we are\
    \ using a new variant of the `findBooksByTitle` method. Now go back to the `BookShelf`\
    \ and add the overloaded method.\n\n```\npublic List findBooksByTitle(String title)\
    \ {\n    return findBooksByTitle(title, b -> true);\n}\n\npublic List findBooksByTitle(String\
    \ title, Predicate filter) {\n    return books.stream()\n        .filter(b ->\
    \ b.getTitle().toLowerCase().contains(title))\n        .filter(filter)\n     \
    \   .collect(toList());\n}\n```\n\nLet’s run our tests. They are green, so, shall\
    \ we proceed further? Perhaps add a test for author name? Let’s first ask if the\
    \ two-argument `findBooksByTitle` API is correct? The foregoing implementation\
    \ is low level and cannot adequately represent the concept of filters. The design\
    \ does not tell anything about filters and their use. Thus, even though the API\
    \ works and serves the purpose, it does not meet the required criteria.\n\n##\
    \ Primitive Obsession\n\nThis is a design smell which is about representing business\
    \ domain concepts as low-level types. It refers to the fact that the system is\
    \ missing required abstractions. In such scenarios, we build interactions based\
    \ on primitives, thus exposing too many details and making it hard to understand\
    \ and maintain.\n\nIn the aforementioned scenario, we need to build the concept\
    \ of a `BookFilter`. There could be variants of the `BookFilter` which can perform\
    \ a different kind of filtering.\n\n```\npublic interface BookFilter {\n    boolean\
    \ apply(Book b);\n}\n```\n\nAlso modify the `findBooksByTitle` API to use the\
    \ `BookFilter` instead of the `java.util.function.Predicate`.\n\n```\npublic List\
    \ findBooksByTitle(String title, BookFilter filter) {\n    return books.stream()\n\
    \        .filter(b -> b.getTitle().toLowerCase().contains(title))\n        .filter(b\
    \ -> filter.apply(b))\n        .collect(toList());\n}\n```\n\nOur test cases work\
    \ fine without any single line of change. We have added a functional interface\
    \ `BookFilter`, and the lambda expression in the test case provides the required\
    \ implementation of the interface (see Figure [4-4](#A429029_1_En_4_Chapter.html#Fig4)).\n\
    \n![A429029_1_En_4_Fig4_HTML.jpg](A429029_1_En_4_Fig4_HTML.jpg)\n\nFigure 4-4.\
    \ Successful test execution of search-related tests\n\nNow that we have added\
    \ the concept of `BookFilter` we would like to build few filters like a published\
    \ year filter, where we will filter books published after the specified year.\
    \ Let’s add a simple test case as `BookPublishedFilterSpec`.\n\n```\nclass BookFilterSpec\
    \ {\n    private Book cleanCode;\n    private Book codeComplete;\n\n    @BeforeEach\n\
    \    void init() {\n        cleanCode = new Book(\"Clean Code\", \"Robert C. Martin\"\
    , LocalDate.of(2008, Month.AUGUST, 1));\n        codeComplete = new Book(\"Code\
    \ Complete\", \"Steve McConnel\", LocalDate.of(2004, Month.JUNE, 9));\n    }\n\
    \n    @Nested\n    @DisplayName(\"book published date\")\n    class BookPulishedFilterSpec\
    \ {\n        @Test\n        @DisplayName(\"is after specified year\")\n      \
    \  void validateBookPublishedDatePostAskedYear() {\n            BookFilter filter\
    \ = BookPublishedYearFilter.After(2007);\n            assertTrue(filter.apply(cleanCode));\n\
    \            assertFalse(filter.apply(codeComplete));\n        }\n    }\n}\n```\n\
    \nIn the previous test case, we are testing the `BookPublishedYearFilter`. The\
    \ filter makes sure that a book must be published after the specified year. So\
    \ now add an implementation for the same and make the test case green.\n\n```\n\
    class BookPublishedYearFilter implements BookFilter {\n    private LocalDate startDate;\n\
    \n    static BookPublishedYearFilter After(int year) {\n        BookPublishedYearFilter\
    \ filter = new BookPublishedYearFilter();\n        filter.startDate = LocalDate.of(year,\
    \ 12, 31);\n        return filter;\n    }\n\n    @Override\n    public boolean\
    \ apply(final Book b) {\n        return b.getPublishedOn().isAfter(startDate);\n\
    \    }\n}\n```\n\nSimilar to the lines of `After` year filter, we would like to\
