- fmt: "### Maven\n\nMaven was built to have a standard unified build process which\
    \ can be used for any Java project. It takes an XML-based approach to configure\
    \ build steps of a project (Project Object Model, or POM). As discussed earlier,\
    \ it follows the convention over configuration principle, and only exceptions\
    \ need to be configured explicitly. A minimalistic Maven build file `pom.xml`\
    \ contains a unique project identifier and a list of dependencies. In the following\
    \ section, we will try to configure a `pom.xml` for our `bookstoread.com`.\n\n\
    Before we can get started we must make sure that Maven is available on our path.\
    \ Unlike Gradle, it does not pack a wrapper script which could download and make\
    \ it work. The latest version of Maven can be downloaded from [http://maven.apache.org/](http://maven.apache.org/).\
    \ Extract the archived artifact and append it to the `PATH` variable. Verify if\
    \ it works as expected.\n\n```\n$ mvn --version\nApache Maven 3.3.1\nMaven home:\
    \ /usr/share/maven\nJava version: 1.8.0_101, vendor: Oracle Corporation\nJava\
    \ home: /usr/lib/jvm/java-8-oracle/jre\n```\n\nNow let us add the following POM\
    \ file for our project:\n\n```\n<project>\n    <modelVersion>4.0.0</modelVersion>\n\
    \    <groupId>com.junit5book</groupId>\n    <artifactId>bookstoread</artifactId>\n\
    \    <version>1.0-SNAPSHOT</version>\n    <properties>\n        <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>\n\
    \        <maven.compiler.source>1.8</maven.compiler.source>\n        <maven.compiler.target>1.8</maven.compiler.target>\n\
    \        <junit.jupiter.version>5.0.1</junit.jupiter.version>\n    </properties>\n\
    \    <dependencies>\n        <dependency>\n            <groupId>org.junit.jupiter</groupId>\n\
    \            <artifactId>junit-jupiter-api</artifactId>\n            <version>${junit.jupiter.version}</version>\n\
    \            <scope>test</scope>\n        </dependency>\n        <dependency>\n\
    \            <groupId>org.assertj</groupId>\n            <artifactId>assertj-core</artifactId>\n\
    \            <version>3.5.2</version>\n            <scope>test</scope>\n     \
    \   </dependency>\n        <dependency>\n            <groupId>org.mockito</groupId>\n\
    \            <artifactId>mockito-core</artifactId>\n            <version>2.7.12</version>\n\
    \            <scope>test</scope>\n        </dependency>\n    </dependencies>\n\
    </project>\n```\n\nNow we will look at the important parts.\n\n- The project is\
    \ identified by a `groupId:artifactId`. In addition, each released version of\
    \ the project is identified by `version`.\n- The properties section of the file\
    \ lists various key values which could be referred to in the other sections of\
    \ the POM.\n- By default, Maven adds a Java compiler plug-in. The JDK versions\
    \ for it are described by the `maven.compiler.source` and `maven.compiler.target`\
    \ properties.\n- The dependencies tag contains a list of dependencies required\
    \ in the project, along with their respective scopes. Taking the list from the\
    \ Gradle build we have added the required dependencies.\n\nNow let us make a build:\n\
    \n```\n$ mvn clean test\n[INFO] ------------------------------------------------------------------------\n\
    [INFO] Building bookstoread 1.0-SNAPSHOT\n[INFO] ------------------------------------------------------------------------\n\
    [INFO]\n[INFO] --- maven-clean-plugin:2.5:clean (default-clean) @ bookstoread\
    \ ---\n[INFO] Deleting /home/rahul/projects/bookstoread/target\n[INFO]\n[INFO]\
    \ --- maven-resources-plugin:2.3:resources (default-resources) @ bookstoread ---\n\
    [INFO] Using 'UTF-8' encoding to copy filtered resources.\n[INFO] skip non existing\
    \ resourceDirectory /home/rahul/projects/bookstoread/src/main/resources\n[INFO]\n\
    [INFO] --- maven-compiler-plugin:2.0.2:compile (default-compile) @ bookstoread\
    \ ---\n[INFO] Compiling 4 source files to /home/rahul/projects/bookstoread/target/classes\n\
    [INFO]\n[INFO] --- maven-resources-plugin:2.3:testResources (default-testResources)\
    \ @ bookstoread ---\n[INFO] Using 'UTF-8' encoding to copy filtered resources.\n\
    [INFO] skip non existing resourceDirectory /home/rahul/projects/bookstoread/src/test/resources\n\
    [INFO]\n[INFO] --- maven-compiler-plugin:2.0.2:testCompile (default-testCompile)\
    \ @ bookstoread ---\n[INFO] Compiling 2 source files to /home/rahul/projects/bookstoread/target/test-classes\n\
    [INFO]\n[INFO] --- maven-surefire-plugin:2.10:test (default-test) @ bookstoread\
    \ ---\n[INFO] Surefire report directory : /home/rahul/projects/bookstoread/target/surefire-reports\n\
    \nT E S T S\n\nResults :\nTests run: 0, Failures: 0, Errors: 0, Skipped: 0\n[INFO]\
    \ ------------------------------------------------------------------------\n[INFO]\
    \ BUILD SUCCESS\n[INFO] ------------------------------------------------------------------------\n\
    ```\n\nBut no tests ran. It is an issue similar to the one we encountered while\
    \ fixing the Gradle build. Basically, the test engine is unable to find the tests,\
    \ as it follows a naming convention. Thus, we need to configure the surefire plug-in\
    \ to identify our tests.\n\n```\n<plugin>\n    <groupId>org.apache.maven.plugins</groupId>\n\
    \    <artifactId>maven-surefire-plugin</artifactId>\n    <version>2.19.1</version>\n\
    \    <configuration>\n        <includes>\n            <include>**/*Spec.java</include>\n\
    \        </includes>\n    </configuration>\n</plugin>\n```\n\nLet us now make\
    \ a build to see if it runs our tests or not.\n\n```\n[INFO] --- maven-surefire-plugin:2.19.1:test\
    \ (default-test) @ bookstoread ---\n\nT E S T S\n\nRunning bookstoread.BookShelfSpec\n\
    Tests run: 0, Failures: 0, Errors: 0, Skipped: 0, Time elapsed: 0.004 sec - in\
    \ bookstoread.BookShelfSpec\n```\n\nAs per the console output, the plug-in found\
    \ the required test class but it did not find any test cases in it. Well, this\
    \ is because the default plug-in is configured to work with JUnit 4. The surefire\
    \ plug-in has a pluggable architecture. It can be configured by adding an additional\
    \ surefireProvider to the plug-in classpath. The JUnit 5 comes with a `junit-platform-surefire-provider`,\
    \ which can run tests based on the Jupiter engine or the Vintage engine (as per\
    \ the classpath). Now let us add the provider and the Jupiter engine to the plug-in\
    \ dependencies.\n\n```\n<plugin>\n    <groupId>org.apache.maven.plugins</groupId>\n\
    \    <artifactId>maven-surefire-plugin</artifactId>\n    <version>2.19.1</version>\n\
    \    <configuration>\n        <includes>\n            <include>**/*Spec.java</include>\n\
    \        </includes>\n    </configuration>\n    <dependencies>\n        <dependency>\n\
    \            <groupId>org.junit.platform</groupId>\n            <artifactId>junit-platform-surefire-provider</artifactId>\n\
    \            <version>${junit.platform.version}</version>\n        </dependency>\n\
    \        <dependency>\n            <groupId>org.junit.jupiter</groupId>\n    \
    \        <artifactId>junit-jupiter-engine</artifactId>\n            <version>${junit.jupiter.version}</version>\n\
    \        </dependency>\n    </dependencies>\n</plugin>\n```\n\nLet us now make\
    \ a build. All our test cases should be executed. The execution will generate\
    \ output on the console as well as test files under `target/surefire-reports`\
    \ (for later reference).\n\n![A429029_1_En_6_Fig1_HTML.jpg](A429029_1_En_6_Fig1_HTML.jpg)\n\
    \n**Figure 6-1.** Maven and JUnit 5\n\nThe plug-in also facilitates test filtering\
    \ based on tags. In order to execute/remove a set of tags specify the `includeTags`/`excludeTags`\
    \ properties to the surefire plug-in configuration.\n\n```\n<plugin>\n    <groupId>org.apache.maven.plugins</groupId>\n\
    \    <artifactId>maven-surefire-plugin</artifactId>\n    <version>2.19.1</version>\n\
    \    <configuration>\n        <includes>\n            <include>**/*Spec.java</include>\n\
    \        </includes>\n        <properties>\n            <includeTags>Filter</includeTags>\n\
    \        </properties>\n    </configuration>\n</plugin>\n```\n\nThe Maven surefire\
    \ plug-in has various parameters (e.g., `forkCount` and `parallel`). These parameters\
    \ are currently not supported."
