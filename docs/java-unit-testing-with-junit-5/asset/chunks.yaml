    ## 总结


    在本章中，我们学习了如何将所有现有测试迁移到新版本。JUnit 5 定义了一个平台框架，允许我们使用可插拔的引擎来执行测试。基于 JUnit 5 API 的测试由
    Jupiter 引擎执行，而基于旧版本 JUnit 的测试则由 Vintage 引擎执行。这两个引擎使我们能够在同一个项目中同时使用新旧 JUnit API
    进行测试。但这并不能让旧版本的测试使用 JUnit 5 提供的新特性。如果我们想使用这些新特性，就需要将测试迁移到新版本。最后，我们列出了在迁移到 JUnit
    5 时需要考虑的重要事项。


    索引 A 应用程序编程接口 (API) 断言 错误与失败 分组 JUnit 4 与 JUnit 5 方法 测试用例 AssertJ B 黑盒测试 BooksToRead
