    ### Refactor


    So far, we have modeled books as a simple `String`. But, we would like users to
    arrange books according to different attributes (author, published date, etc.).
    Thus, we should capture different attributes of a book. This warrants a new class.


    Let’s create a new `Book` class in the `src/main/java/bookstoread` package.


    ```

    package bookstoread;

    import java.time.LocalDate;

    public class Book {

    private final String title;

    private final String author;

    private final LocalDate publishedOn;

    public Book(String title, String author, LocalDate publishedOn) {

    this.title = title;

    this.author = author;

    this.publishedOn = publishedOn;

    }

    public String getTitle() {

    return title;

    }

    public String getAuthor() {

    return author;

    }

    public LocalDate getPublishedOn() {

    return publishedOn;

    }

    @Override

    public String toString() {

    return "Book{" +

    "title=''" + title + ''\'''' +

    ", author=''" + author + ''\'''' +

    ", publishedOn=" + publishedOn +

    ''}'';

    }

    }

    ```


    Let’s change our tests to use `Book` class instead of `String`. We are using the
    same books in every test so we will extract them as part of test initialization.


    ```

    public class BookShelfSpec {

    private BookShelf shelf;

    private Book effectiveJava;

    private Book codeComplete;

    private Book mythicalManMonth;

    @BeforeEach

    void init() throws Exception {

    shelf = new BookShelf();

    effectiveJava = new Book("Effective Java", "Joshua Bloch", LocalDate.of(2008,
    Month.MAY, 8));

    codeComplete = new Book("Code Complete", "Steve McConnel", LocalDate.of(2004,
    Month.JUNE, 9));

    mythicalManMonth = new Book("The Mythical Man-Month", "Frederick Phillips Brooks",
    LocalDate.of(1975, Month.JANUARY, 1));

    }

    @Test

    public void shelfEmptyWhenNoBookAdded() {

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty.");

    }

    @Test

    public void bookshelfContainsTwoBooksWhenTwoBooksAdded() {

    shelf.add(effectiveJava, codeComplete);

    List books = shelf.books();

    assertEquals(2, books.size(), () -> "BookShelf should have two books.");

    }

    @Test

    public void emptyBookShelfWhenAddIsCalledWithoutBooks() {

    shelf.add();

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty.");

    }

    @Test

    public void booksReturnedFromBookShelfIsImmutableForClient() {

    shelf.add(effectiveJava, codeComplete);

    List books = shelf.books();

    try {

    books.add(mythicalManMonth);

    fail(() -> "Should not be able to add book to books");

    } catch (Exception e) {

    assertTrue(e instanceof UnsupportedOperationException, () -> "Should throw UnsupportedOperationException.");

    }

    }

    @Test

    void bookshelfArrangedByBookTitle() {

    shelf.add(effectiveJava, codeComplete, mythicalManMonth);

    List books = shelf.arrange();

    assertEquals(Arrays.asList(codeComplete, effectiveJava, mythicalManMonth), books,
    () -> "Books in a bookshelf should be arranged lexicographically by book title");

    }

    @Test

    void booksInBookShelfAreInInsertionOrderAfterCallingArrange() {

    shelf.add(effectiveJava, codeComplete, mythicalManMonth);

    shelf.arrange();

    List books = shelf.books();

    assertEquals(Arrays.asList(effectiveJava, codeComplete, mythicalManMonth), books,
    () -> "Books in bookshelf are in insertion order");

