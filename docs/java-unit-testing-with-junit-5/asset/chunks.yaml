- fmt: '### Make Test Pass


    Let’s make the test case pass by writing the following code:


    ```java

    package bookstoread;

    import java.util.ArrayList;

    import java.util.List;

    public class BookShelf {

    private final List books = new ArrayList();

    public List books() {

    return books;

    }

    public void add(String bookToAdd) {

    books.add(bookToAdd);

    }

    }

    ```


    In the foregoing code, we did following:


    1. We created an instance variable `books` of the type `List<String>` to store
    books.

    2. We changed the `books` method to return the `books` instance variable.

    3. We implemented the `add` method by adding `bookToAdd` to the `books` list.


    Run the test case and this time the test will pass (see Figure [3-2](#A429029_1_En_3_Chapter.html#Fig2)).


    ![A429029_1_En_3_Fig2_HTML.jpg](A429029_1_En_3_Fig2_HTML.jpg)


    Figure 3-2. Test success


    ### Refactor the Code


    Now that we have two passing tests, let’s see if we have something to refactor.
    One thing that we can improve is allowing the user to add multiple books at once.
    We can refactor the `add` method to take a vararg method argument instead of simple
    `String`. Let’s make this change.


    ```java

    public void add(String... booksToAdd) {

    Arrays.stream(booksToAdd).forEach(book -> books.add(book));

    }

    ```


    In the foregoing code, we first used the Java 8 `Arrays.stream` method to convert
    `booksToAdd` to a `Stream<String>` and then used the `forEach` method on the Stream
    to add each book to the `books` collection.


    We can use Java 8 method references to make the `add` method terser as shown in
    Figure [3-3](#A429029_1_En_3_Chapter.html#Fig3).


    ![A429029_1_En_3_Fig3_HTML.jpg](A429029_1_En_3_Fig3_HTML.jpg)


    Figure 3-3. Replace lambda with method reference


    ```java

    public void add(String... booksToAdd) {

    Arrays.stream(booksToAdd).forEach(books::add);

    }

    ```


    If you are using IntelliJ then you can use the shortcut `ALT+Enter` to convert
    a lambda expression to method reference as shown below.


    Run your test cases again to verify that all tests are still green. Refactoring
    should never change the behavior of the program, so tests written against expected
    behavior should remain green. If you write tests that depend on the internal state
    of the program then there is a good chance that they might stop working after
    refactoring. This is the reason we recommend that you write tests against public
    API (application programming interface) methods and your tests should document
    expected behavior, not implementation.


    We changed the `add` method signature to make it easy for `BookShelf` clients
    to add multiple books in one method call. As the test case is the first client
    of your code, it will tell you if you can improve the API. Let’s refactor our
    test case to pass multiple books in one method call.


    ```java

    @Test

    public void bookshelfContainsTwoBooksWhenTwoBooksAdded() {

    BookShelf shelf = new BookShelf();

    shelf.add("Effective Java", "Code Complete");

    List books = shelf.books();

    assertEquals(2, books.size(), () -> "BookShelf should have two books.");

    }

    ```


    Run the test again and all tests should still be green.


    ### Add Test Cases for Exception Scenarios


    There is nothing more to refactor so let’s move to the next test case. Do we need
    to write a new test case? If you read the user story again you will find that
    we have achieved the functionality that we intended to write in this user story.
    But we can still write a few more behavioral tests to be sure what will happen
    in exceptional situations.


    Let’s write a test case that tests the scenario where we call the `add` method
    without passing any book. We expect that we should get an empty bookshelf as shown
    in the code that follows:


    ```java

    @Test

    public void emptyBookShelfWhenAddIsCalledWithoutBooks() {

    BookShelf shelf = new BookShelf();

    shelf.add();

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty.");

    }

    ```


    Run the tests to verify that all tests still pass. You will find all tests are
    green. Now, we are sure that nothing will go wrong if we call the `add` method
    without any parameters.


    One last test case that we can add for this user story is to make sure that the
    client of `BookShelf` can’t modify the books collection returned by the `books`
    method.


    ```java

    @Test

    void booksReturnedFromBookShelfIsImmutableForClient() {

    BookShelf shelf = new BookShelf();

    shelf.add("Effective Java", "Code Complete");

    List books = shelf.books();

    try {

    books.add("The Mythical Man-Month");

    fail(() -> "Should not be able to add book to books");

    } catch (Exception e) {

    assertTrue(e instanceof UnsupportedOperationException, () -> "Should throw UnsupportedOperationException.");

    }

    }

    ```


    In the foregoing test case, we first added a couple of books to the shelf and
    then tried to add another book (which we got by calling the `books` method of
    `BookShelf`) to the `books` collection. We expected that adding a book to the
    `books` collection would throw an `UnsupportedOperationException`. If no exception
    is thrown then we fail the test by calling the JUnit’s `fail` method. We will
    cover how to test exceptions in detail in Chapter [5](#A429029_1_En_5_Chapter.html).
    JUnit 5 has substantially improved the way you can write tests for exceptions.
    So, stay tuned!


    Run all the test cases again. Our new test case will fail, as the collection that
    we received from the `books` method is mutable so we were able to successfully
    add a book to it.


    To make the test pass, we will change the `books` method to return an immutable
    list as shown in the code snippet that follows:


    ```java

    public List books() {

    return Collections.unmodifiableList(books);

    }

    ```


    Run the test again and all tests should be green.


    ### Using @BeforeEach


    If we look at the test case, the test initialization is being duplicated for each
    test. We can extract the code to a method and annotate it with `@BeforeEach`.


    ```java

    public class BookShelfSpec {

    private BookShelf shelf;

    @BeforeEach

    void init() throws Exception {

    shelf = new BookShelf();

    }

    @Test

    public void emptyBookShelfWhenNoBookAdded() {

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty.");

    }

    @Test

    void bookshelfContainsTwoBooksWhenTwoBooksAdded() {

    shelf.add("Effective Java", "Code Complete");

    List books = shelf.books();

    assertEquals(2, books.size(), () -> "BookShelf should have two books.");

    }

    // Rest code removed for brevity

    }

    ```


    Run all the tests again to verify that they are still green. Now that the code
    is in good shape, we can start working on the next feature.


    ## Second Feature


    > As a user, I should be able to arrange my bookshelf based on certain criteria


    ### Write a Failing Test Case


    The next feature helps the user to arrange the bookshelf based on certain criteria.
    The criteria can be the book name, the author name, the book publication date,
    or a combination of all.


    Let us start on this feature by arranging books lexicographically by their title.


    ```java

    @Test

    void bookshelfArrangedByBookTitle() {

    BookShelf shelf = new BookShelf();

    shelf.add("Effective Java", "Code Complete","The Mythical Man-Month" );

    List books = shelf.arrange();

    assertEquals(Arrays.asList( "Code Complete", "Effective Java", "The Mythical Man-Month"),
    books, () -> "Books in a bookshelf should be arranged lexicographically by book
    title");

    }

    ```


    The foregoing code will not compile as the `arrange` method is not defined. To
    make the code compile, let’s add the `arrange` method to the `BookShelf`.


    ```java

    public List arrange() {

    return null;

    }

    ```


    Run all the test cases and you will find that our new test case fails.'
