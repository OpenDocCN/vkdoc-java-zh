    根据控制台输出，插件找到了所需的测试类，但没有在其中找到任何测试用例。这是因为默认插件配置为与 JUnit 4 一起工作。surefire 插件具有可插拔的架构。可以通过向插件类路径添加额外的
    `surefireProvider` 来配置它。JUnit 5 附带了一个 `junit-platform-surefire-provider`，它可以基于
    Jupiter 引擎或 Vintage 引擎（根据类路径）运行测试。现在，让我们将提供程序和 Jupiter 引擎添加到插件依赖项中。


    ```

    maven-surefire-plugin

    2.19.1


    **/*Spec.java


    org.junit.platform

    junit-platform-surefire-provider

    ${junit.platform.version}


    org.junit.jupiter

    junit-jupiter-engine

    ${junit.jupiter.version}


    ```


    现在让我们进行一次构建。所有测试用例都应该被执行。执行过程将在控制台生成输出，并在 `target/surefire-reports` 目录下生成测试文件（供后续参考）。


    ![A429029_1_En_6_Fig1_HTML.jpg](img/A429029_1_En_6_Fig1_HTML.jpg)


    图 6-1.


    Maven 与 JUnit 5


    该插件还支持基于标签的测试过滤。为了执行/排除一组标签，请在 surefire 插件配置中指定 `includeTags`/`excludeTags` 属性。


    ```


    **/*Spec.java


    Filter


    ```


    Maven surefire 插件有各种参数（例如，`forkcount` 和 `parallel`）。这些参数目前不受支持。

