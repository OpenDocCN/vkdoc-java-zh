- fmt: '# Writing Your First Test


    Let’s start building the `bookstoread` application. The first functionality that
    we will support is the ability to add books to the `BookShelf`. In this chapter,
    we will not fully implement this functionality. We will just write enough code
    to test that when we create the bookshelf there are no books in it (i.e., it is
    empty).


    We will start by writing a test specification. Create a new package `bookstoread`
    inside the `src/main/test` directory. We will keep flat package structures to
    make code easier to read. Inside the `bookstoread` package, we will create a new
    class `BookShelfSpec`. If you have written JUnit test cases before then you would
    have normally written test classes that end with `Test` or `Tests`. In this book,
    we will follow the behavior-driven development (BDD) naming convention. The `*Test`
    naming convention forces you to think that your unit tests are the only quality
    assurance facility. We want you to think in terms of behavior specification so
    our tests will end with `Spec`.


    You will have an empty specification class as shown in the code snippet.


    ```

    package bookstoread;

    public class BookShelfSpec {

    }

    ```


    Let’s write our first test case, which will assert that when no book is added
    to the shelf it should be empty. Inside the `BookShelfSpec`, add test case that
    follows:


    ```

    package bookstoread;

    import org.junit.jupiter.api.Test;

    import java.util.List;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    public class BookShelfSpec {

    @Test

    public void shelfEmptyWhenNoBookAdded() throws Exception {

    BookShelf shelf = new BookShelf();

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty.");

    }

    }

    ```


    The code will not compile, as there is no `BookShelf` class yet. At this point,
    we have just coded our client assuming that `BookShelf` will exist in future.
    We just want to get the feel of our API as a client. We have coded our expectation
    and how we want our API to look. As we learn more, we will refactor our API to
    meet our expectations.


    A test case is broken down into the following three parts:


    - We set up data that our test case needs.

    - We call the unit being tested.

    - We perform assertions to verify if expected behavior is correct.


    This is also called AAA (Arrange, Act, and Assert).


    In the test case just shown, you will notice that we have used `org.unit.jupiter.api.Test`
    annotation. In earlier versions of JUnit, the annotation was `org.junit.Test`.
    To write JUnit 5 test cases you have to use `org.unit.jupiter.api.Test` annotation.
    JUnit 5 distinguishes between different versions based on the annotation present
    on the test case.


    JUnit 5 has trimmed down assertions support. There is no `assertThat` method in
    JUnit 5. It is expected that you will use a third-party assertion library like
    Hamcrest or AssertJ. We will use AssertJ in future chapters. In the code just
    shown, we have used the inbuilt assertion `assertTrue`, which tests whether the
    condition is true or not.


    Let’s write the code to make our test pass. Create a new class `BookShelf` in
    the `src/main/java` directory. Add `books` method to it as shown in Figure [1-8](#A429029_1_En_1_Chapter.html#Fig8).
    This code will be generated if you use IntelliJ to create a class for you. To
    create `BookShelf` using IntelliJ, press `alt + enter` on the `BookShelf` in `BookShelfSpec`
    as shown in Figure [1-8](#A429029_1_En_1_Chapter.html#Fig8).


    ![A429029_1_En_1_Fig8_HTML.jpg](A429029_1_En_1_Fig8_HTML.jpg)


    Figure 1-8. Create class


    To create `books` method using IntelliJ shortcut again press `alt + enter` on
    the `books` method. Finally, you will have a class as shown in the code that follows:


    ```

    package bookstoread;

    import java.util.List;

    public class BookShelf {

    public List books() {

    return null;

    }

    }

    ```


    Now that our code compiles, let’s run our test case. To run the test case, right-click
    the test class and select `Run ''BookShelfSpec''` as shown in Figure [1-9](#A429029_1_En_1_Chapter.html#Fig9).


    ![A429029_1_En_1_Fig9_HTML.jpg](A429029_1_En_1_Fig9_HTML.jpg)


    Figure 1-9. Run test


    When you run the test, you will see test failure as shown in Figure [1-10](#A429029_1_En_1_Chapter.html#Fig10).


    ![A429029_1_En_1_Fig10_HTML.jpg](A429029_1_En_1_Fig10_HTML.jpg)


    Figure 1-10. Test failure


    One thing that you will notice in Figure [1-10](#A429029_1_En_1_Chapter.html#Fig10)
    is a mention of JUnit Jupiter. Figure [1-10](#A429029_1_En_1_Chapter.html#Fig10)
    shows that `BookShelfSpec.shelfEmptyWhenNoBookAdded` test was executed by the
    JUnit Jupiter engine. If you have JUnit 4 test cases as well then you will see
    JUnit Vintage as well. We will cover that in Chapter [8](#A429029_1_En_8_Chapter.html).


    To make this test case pass we will change the `BookShelf.books` method implementation
    to return an empty list as shown in the code that follows:


    ```

    package bookstoread;

    import java.util.Collections;

    import java.util.List;

    public class BookShelf {

    public List books() {

    return Collections.emptyList();

    }

    }

    ```


    Run the test case again. This time you will see the happy green bar (see Figure
    [1-11](#A429029_1_En_1_Chapter.html#Fig11)).


    ![A429029_1_En_1_Fig11_HTML.jpg](A429029_1_En_1_Fig11_HTML.jpg)


    Figure 1-11. Test success


    The green bar signifies that the code meets our expectations. We can now continue
    and add a new test case. We will continue this functionality in Chapter [3](#A429029_1_En_3_Chapter.html)
    after we have discussed the core concepts of JUnit 5.


    ## Summary


    In this chapter, you learned why developer testing is a valuable skill for every
    programmer. We covered TDD in detail and then talked about unit testing. Unit
    testing produces a necessary productivity boost for software developers by providing
    them a safety net against regressions and a guide that will help programmers design
    their applications.


    This chapter also talked about JUnit, the de facto standard for unit testing in
    Java. JUnit 5 is a modular and extensibility version of JUnit. We concluded the
    chapter by creating a Java Gradle project using IntelliJ IDEA IDE and we wrote
    our first test case. In the next chapter, we will learn about the core concepts
    of JUnit 5.


    # Understanding Core JUnit 5


    In the first chapter, we learned the importance of test-driven development (TDD).
    We also discussed the pivotal role of unit testing. But before we move on to building
    an application using JUnit 5, it is important to understand its core concepts.


    The goal of this chapter is to provide an overview of the core concepts of JUnit
    5. JUnit 5 is founded on the following principles:


    - Minimize footprint.

    - Simplify test cases.

    - Provide extensibility over features.

    - Prefer specific plug points to general ones.


    All these concepts make the new version focused on testing needs while being leaner
    and extensible. All in all, JUnit 5 is a complete rewrite of the JUnit framework,
    so a lot has changed underneath. Hence, even if you know the core concepts of
    previous versions of JUnit it is important that you understand how JUnit 5 differs.


    Then, in the next chapter, we will start building a `bookstoread` application
    using JUnit 5. Building an application will help you learn how to apply these
    core concepts to your work.'
