- fmt: '### Streams API


    Streams provide a higher-level abstraction to express computations in Java collections
    in a declarative manner. It is similar to how you use SQL to declaratively query
    data in a database. Declarative means developers write what they want to do rather
    than specifying all the instructions on how the data should be queried. Streams
    only provide read-only operations. They never change the underlying collection.


    Following is an example code snippet that does collection processing in Java 7:


    ```

    public class ExampleJava7 {

    public static void main(String[] args) {

    List books = getBooks();

    List programmingBooks = new ArrayList();

    for (Book book : books) {

    if (book.getType() == BookType.PROGRAMMING) {

    programmingBooks.add(book);

    }

    }

    Collections.sort(programmingBooks, new Comparator() {

    @Override

    public int compare(Book b1, Book b2) {

    return b1.getTitle().length() – b2.getTitle().length();

    }

    });

    for (Book book:  programmingBooks) {

    System.out.println(book.getTitle());

    }

    }

    }

    ```


    The code prints all the programming book titles, sorts them by their title length,
    and finally prints them to console. Java 7 developers write this kind of code
    every day. To write such a simple program, we had to write 15 lines of Java code.
    The bigger problem with the foregoing code is not the number of lines a developer
    has to write but the intent (i.e., filtering books, sorting by title length, and
    finally printing them).


    We can simplify the foregoing code using the Java 8 stream API as shown in the
    following code:


    ```

    public class ExampleJava8Stream {

    public static void main(String[] args) {

    List books = getBooks();

    List programmingBookTitles = books.stream()

    .filter(book -> book.getType() == BookType.PROGRAMMING)

    .sorted((b1, b2) -> b1.getTitle().length() – b2.getTitle().length())

    .map(Book::getTitle)

    .collect(Collectors.toList());

    programmingBookTitles.forEach(System.out::println);

    }

    }

    ```


    The code constructs a pipeline comprising multiple stream operations, each discussed
    next.


    *   `stream()`: Created a stream pipeline by invoking the `stream()` method on
    the source collection (i.e., `tasks List<Book>`).

    *   `filter(Predicate<T>)`: This operation extracted elements in the stream matching
    the condition defined by the predicate. Once you have a stream you can call zero
    or more intermediate operations on it. The lambda expression `book -> book.getType()
    == BookType.PROGRAMMING` defined a predicate to filter all programming books.
    The type of lambda expression is `java.util.function.Predicate<Book>`.

    *   `sorted(Comparator<T>)`: This operation returns a stream consisting of all
    the stream elements sorted by the `Comparator` defined by lambda expression (i.e.,
    `(b1, b2) -> b1.getTitle().length() – b2.getTitle().length()` in the example shown
    above).

    *   `map(Function<T,R>)`: This operation returns a stream after applying the `Function<T,R>`
    on each element of this stream.

    *   `collect(toList())`: This operation collects results of the operations performed
    on the stream into a `List`.


    ### Optional<T>


    Java 8 introduced a new data type, `java.util.Optional<T>`, which encapsulates
    an empty value. It makes the intent of the API clear. If a function returns a
    value of type `Optional<T>`, then it tells the clients that a value might not
    be present. Use of the `Optional` data type makes it explicit to the API client
    when it should expect an optional value. The purpose of using the `Optional` type
    is to help API designers make it visible to their clients, by looking at the method
    signature, whether or not they should expect an optional value. There are three
    creational methods that are part of the `Optional` API.


    *   `Optional.empty`: This is used to create an `Optional` when a value is not
    present. Rather than returning null, you return `Optional.empty`.

    *   `Optional.of(T value)`: This is used to create an `Optional` from a non-null
    value. It throws a `NullPointerException` when value is null. You will use it
    like `Optional<String> mayBeName = Optional.of(name)`.

    *   `Optional.ofNullable(T value)`: This is a static factory method which works
    for both null and non-null values. For null value, it will create an empty `Optional`
    and for non-null value, it will create an `Optional` using the value.'
