    ```\n@Test\n@DisplayName(\"Composite criteria is based on multiple filters\")\n\
    void shouldFilterOnMultiplesCriteria() {\n    CompositeFilter compositeFilter\
    \ = new CompositeFilter();\n    compositeFilter.addFilter(b -> false);\n    assertFalse(compositeFilter.apply(cleanCode));\n\
    }\n```\n\nAdd the composite filter implementation to meet the test criteria.\n\
    \n```\nclass CompositeFilter implements BookFilter {\n    private List filters;\n\
    \n    CompositeFilter() {\n        filters = new ArrayList();\n    }\n\n    @Override\n\
    \    public boolean apply(final Book b) {\n        return filters.stream()\n \
    \           .map(bookFilter -> bookFilter.apply(b))\n            .reduce(true,\
    \ (b1, b2) -> b1 && b2);\n    }\n\n    void addFilter(final BookFilter bookFilter)\
    \ {\n        filters.add(bookFilter);\n    }\n}\n```\n\nThe test case works, but\
    \ there is a nagging question. Did the composite filter invoke the passed filters?\
    \ Also, how can we add a test case for scenarios which involve invocations of\
    \ only a few of the filters? Shall we try to build some tests for the same?\n\n\
    ```\n@DisplayName(\"Composite criteria does not invoke after first failure\")\n\
    void shouldNotInvokeAfterFirstFailure() {\n    CompositeFilter compositeFilter\
    \ = new CompositeFilter();\n    compositeFilter.addFilter(b -> false);\n    compositeFilter.addFilter(b\
    \ -> true);\n    assertFalse(compositeFilter.apply(cleanCode));\n}\n\n@DisplayName(\"\
    Composite criteria invokes all filters\")\nvoid shouldInvokeAllFilters() {\n \
    \   CompositeFilter compositeFilter = new CompositeFilter();\n    compositeFilter.addFilter(b\
    \ -> true);\n    compositeFilter.addFilter(b -> true);\n    assertTrue(compositeFilter.apply(cleanCode));\n\
    }\n```\n\nIn all the foregoing scenarios, it is hard to determine the point at\
    \ which the filter invocation has happened."
  raw: '## Feature: Search BookShelf


    As a user, I should be able to search my bookshelf. The search results can be
    filtered by different attributes of the book like author and published date.


    The next feature adds the searching capability to the BookShelf. As a user, we
    would like to find a particular title in our BookShelf. The search should be based
    on the partial text. This can lead to many results for a term, so hints can be
    passed in the form of additional information like published date or the author’s
    name to filter down the results to the required ones.


    Let us start on this feature by adding a plain vanilla title-based search to the
    BookShelf.


    ```

    @Nested

    @DisplayName("search")

    class BookShelfSeachSpec {

    @BeforeEach

    void setup() {

    shelf.add(codeComplete, effectiveJava, mythicalManMonth, cleanCode);

    }

    @Test

    @DisplayName(" should find books with title containing text")

    void shouldFindBooksWithTitleContainingText() {

    List books = shelf.findBooksByTitle("code");

    assertThat(books.size()).isEqualTo(2);

    }

    }

    ```


    We will leave out the details of the `findBooksByTitle` method. The reader must
    try to add an implementation which makes the foregoing test case pass.


    Now let’s enhance the API by adding the required hints. In the feature description,
    a user may wish to search on published date, so we should add a test case for
    the same.


    ```

    @Test

    @DisplayName(" should find books with title containing text and published after
    specified date.")

    void shouldFilterSearchedBooksBasedOnPublishedDate() {

    List books = shelf.findBooksByTitle("code", b -> b.getPublishedOn().isBefore(LocalDate.of(2014,
    12, 31)));

    assertThat(books.size()).isEqualTo(2);

    }

    ```


    Here we are using a new variant of the `findBooksByTitle` method. Now go back
    to the BookShelf and add the overloaded method.


    ```

    public List findBooksByTitle(String title) {

    return findBooksByTitle(title, b -> true);

    }

    public List findBooksByTitle(String title, Predicate filter) {

    return books.stream()

    .filter(b -> b.getTitle().toLowerCase().contains(title))

    .filter(filter)

    .collect(toList());

    }

    ```


    Let’s run our tests. They are green, so, shall we proceed further? Perhaps add
    a test for author name? Let’s first ask if the two-argument `findBooksByTitle`
    API is correct? The foregoing implementation is low level and cannot adequately
    represent the concept of filters. The design does not tell anything about filters
    and their use. Thus, even though the API works and serves the purpose, it does
    not meet the required criteria.


    Primitive Obsession


    This is a design smell which is about representing business domain concepts as
    low-level types. It refers to the fact that the system is missing required abstractions.
    In such scenarios, we build interactions based on primitives, thus exposing too
    many details and making it hard to understand and maintain.


    In the aforementioned scenario, we need to build the concept of a BookFilter .
    There could be variants of the BookFilter which can perform a different kind of
    filtering.


    ```

    public interface BookFilter {

    boolean apply(Book b);

    }

    ```


    Also modify the `findBooksByTitle` API to use the BookFilter instead of the `java.util.function.Predicate`.


    ```

    public List findBooksByTitle(String title, BookFilter filter) {

    return books.stream()

    .filter(b -> b.getTitle().toLowerCase().contains(title))

    .filter(b -> filter.apply(b))

    .collect(toList());

    }

    ```


    Our test cases work fine without any single line of change. We have added a functional
    interface BookFilter, and the lambda expression in the test case provides the
    required implementation of the interface (see Figure [4-4](#A429029_1_En_4_Chapter.html#Fig4)).


    ![A429029_1_En_4_Fig4_HTML.jpg](A429029_1_En_4_Fig4_HTML.jpg)


    Figure 4-4.


    Successful test execution of search-related tests


    Now that we have added the concept of BookFilter we would like to build few filters
    like a published year filter, where we will filter books published after the specified
    year. Let’s add a simple test case as `BookPublishedFilterSpec`.


    ```

    class BookFilterSpec {

    private Book cleanCode;

    private Book codeComplete;

    @BeforeEach

    void init() {

    cleanCode = new Book("Clean Code", "Robert C. Martin", LocalDate.of(2008, Month.AUGUST,
    1));

    codeComplete = new Book("Code Complete", "Steve McConnel", LocalDate.of(2004,
    Month.JUNE, 9));

    }

    @Nested

    @DisplayName("book published date")

    class BookPulishedFilterSpec{

    @Test

    @DisplayName("is after specified year")

    void validateBookPublishedDatePostAskedYear(){

    BookFilter filter = BookPublishedYearFilter.After(2007);

    assertTrue(filter.apply(cleanCode));

    assertFalse(filter.apply(codeComplete));

    }

    }

    }

    ```


    In the previous test case, we are testing the `BookPublishedYearFilter.` The filter
    makes sure that a book must be published after the specified year. So now add
    an implementation for the same and make the test case green.


    ```

    class BookPublishedYearFilter implements BookFilter {

    private LocalDate startDate;

    static BookPublishedYearFilter After(int year) {

    BookPublishedYearFilter filter = new BookPublishedYearFilter();

    filter.startDate = LocalDate.of(year, 12, 31);

    return filter;

    }

    @Override

    public boolean apply(final Book b) {

    return b.getPublishedOn().isAfter(startDate);

    }

    }

    ```


    Similar to the lines of After year filter, we would like to add a Before year
    filter , to find out books published before the specified year. As an exercise,
    this is left to the reader.


    Run the test cases and make sure that all tests are green (see Figure [4-5](#A429029_1_En_4_Chapter.html#Fig5)).


    ![A429029_1_En_4_Fig5_HTML.jpg](A429029_1_En_4_Fig5_HTML.jpg)


    Figure 4-5.


    Succesful test execution


    Now that we have multiple filters, we would like to build a `CompositeFilter`
    which could be used to combine multiple filters into one single filter. Let’s
    start by adding a test case for the same.


    ```

    @Test

    @DisplayName("Composite criteria is based on multiple filters")

    void shouldFilterOnMultiplesCriteria(){

    CompositeFilter compositeFilter = new CompositeFilter();

    compositeFilter.addFilter( b -> false);

    assertFalse(compositeFilter.apply(cleanCode));

    }

    ```


    Add the composite filter implementation to meet the test criteria.


    ```

    class CompositeFilter implements BookFilter {

    private List filters;

    CompositeFilter() {

    filters = new ArrayList();

    }

    @Override

    public boolean apply(final Book b) {

    return filters.stream()

    .map(bookFilter -> bookFilter.apply(b))

    .reduce(true, (b1, b2) -> b1 && b2);

    }

    void addFilter(final BookFilter bookFilter) {

    filters.add(bookFilter);

    }

    }

    ```


    The test case works, but there is a nagging question. Did the composite filter
    invoke the passed filters ? Also, how can we add a test case for scenarios which
    involve invocations of only a few of the filters? Shall we try to build some tests
    for the same?


    ```

    @DisplayName("Composite criteria does not invoke after first failure")

    void shouldNotInvokeAfterFirstFailure(){

    CompositeFilter compositeFilter = new CompositeFilter();

    compositeFilter.addFilter( b -> false);

    compositeFilter.addFilter( b -> true);

    assertFalse(compositeFilter.apply(cleanCode));

    }

    @DisplayName("Composite criteria invokes all filters")

    void shouldInvokeAllFilters(){

    CompositeFilter compositeFilter = new CompositeFilter();

    compositeFilter.addFilter( b -> true);

    compositeFilter.addFilter( b -> true);

    assertTrue(compositeFilter.apply(cleanCode));

    }

    ```


    In all the foregoing scenarios, it is hard to determine the point at which the
    filter invocation has happened.'
