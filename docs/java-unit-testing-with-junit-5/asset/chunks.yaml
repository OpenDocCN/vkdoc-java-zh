    \ summaryGeneratingListener = new SummaryGeneratingListener();\n        launcher.registerTestExecutionListeners(summaryGeneratingListener);\n\
    \    }\n}\n```\n\n7.  We can register more than one listener with a launcher as\
    \ the `registerTestExecutionListeners` method takes a vararg of `TestExecutionListener`.\
