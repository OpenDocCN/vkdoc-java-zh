    \ previous configurations, here also we will determine the code coverage in two\
    \ steps. The `JaCoCo tool` provides an Ant task which can determine code coverage\
    \ by executing unit test cases or any other Java program. Since we are executing\
    \ JUnit5 test cases using the console runner, we will determine the coverage by\
    \ configuring a Java executable program.\n\nBefore we jump to configure `jacoco`,\
    \ let’s look into the `consoleRunner` script to find the complete Java command.\
    \ The command executes the `org.junit.platform.console.ConsoleLauncher` class,\
    \ with all test classes in its classpath. Now we need to configure the same command\
    \ in our build script. The class is part of `junit-platform-console` dependency\
    \ jar.\n\nMake the following changes to the `ivy.xml` to make sure we download\
    \ `junit-platform-console` jars instead of the distribution zip and the required\
    \ `jacoco` jars:\n\n```\n//  Rest removed for Brevity\n```\n\nNow we need to configure\
    \ the `jacoco` task with the Java main class. The following `build.xml` configuration\
    \ makes sure that we achieve the same:\n\n```\n// Rest removed for Brevity\n```\n\
    \nRun the Ant build to get an html coverage report.\n\n## Other Tools\n\nSo far\
    \ we have developed all our code using IntelliJ, which is constantly improving\
    \ its support of JUnit 5 features. We have successfully integrated JUnit 5 with\
    \ Gradle, Maven, and Ant. But the Java ecosystem contains lots of tools. There\
    \ are many IDEs (Eclipse, STS, IntelliJ, NetBeans, etc.). So what do we do if\
    \ the tool of our choice does not yet support JUnit5? Let’s say our preferred\
    \ IDE is Eclipse; so what should we do?\n\nJUnit 5 provides a `PlatformRunner`\
    \ based on JUnit 4 Runner API. The runner enables test execution on all platforms\
    \ that support JUnit 4. A JUnit 5 test case must be annotated with the `@RunWith`\
    \ annotation, passing the `PlatformRunner` as an argument. So now if we want to\
    \ develop our code in Eclipse Neon or earlier, we do the following:\n\n1.  Add\
    \ the dependency of JUnit 4 to our `pom.xml` or `build.gradle`\n\n    ```\n  \
    \  testCompile 'junit:junit:4.12'\n    ```\n\n2.  Add the dependency of `junit-platform-runner`\n\
    \n    ```\n    testCompile 'org.junit.platform:junit-platform-runner:1.0.1'\n\
    \    ```\n\n3.  Import the project into eclipse as a Gradle project (or Maven\
    \ project) (see Figure [6-5](#A429029_1_En_6_Chapter.html#Fig5))\n\n    ![A429029_1_En_6_Fig5_HTML.jpg](A429029_1_En_6_Fig5_HTML.jpg)\n\
    \n    Figure 6-5. Eclipse import dialog\n\n4.  Each of our test classes needs\
    \ to be annotated with `@RunWith`\n\n    ```\n    @RunWith(JUnitPlatform.class)\n\
    \    @DisplayName(\"A bookshelf\")\n    public class BookShelfSpec {\n    private\
    \ BookShelf shelf;\n    // Removed  for Brevity\n    }\n    ```\n\n5.  Now execute\
    \ our test case\n\n    ![A429029_1_En_6_Fig6_HTML.jpg](A429029_1_En_6_Fig6_HTML.jpg)\n\
    \n    Figure 6-6. Eclipse JUnit 5 Report\n\nEclipse team is working on an Oxygen\
    \ version which will contain support of JUnit 5. At the time we wrote this chapter,\
    \ the Eclipse team had added JUnit 5 support [ `https://bugs.eclipse.org/bugs/show_bug.cgi?id=488566#c4`\
    \ ](https://bugs.eclipse.org/bugs/show_bug.cgi?id=488566#c4), but it has not been\
    \ released.\n\n## Summary\n\nIn this chapter, we looked at ways to configure JUnit\
    \ 5 with the tools of our choice. We added Gradle-, Maven-, and Ant-based configurations\
    \ to our `booktoread.com`. Then we generated the code coverage metric using `jacoco`\
    \ with each of these tools. In the end, we looked at tools that do not have JUnit\
    \ 5 support and configured JUnit 5 in backward-compatible mode.\n\nIn Chapter\
    \ [7](#A429029_1_En_7_Chapter.html), we will talk about the JUnit 5 extension\
    \ model and JUnit 4 migration to the newer version.\n\n# 7. JUnit 5 Extension\
    \ Model\n\nOne of the core principles of JUnit is to prefer extension points over\
    \ features. This principle means that rather than putting all the features in\
    \ the JUnit core, the JUnit team wants to offer an extensible mechanism that can\
    \ be used by developers to meet their needs. This philosophy has existed in previous\
    \ versions of JUnit as well. In JUnit 4, the team added support for the Rule API\
    \ (application programming interface) to provide functionalities like creating\
    \ temporary directories and files, exception verification, and many others. These\
    \ features could have been easily added to the JUnit core without providing an\
    \ extension mechanism. Instead, the JUnit team decided to build the Runner and\
    \ Rule APIs, which offered a mechanism to extend JUnit. This not only enabled\
    \ JUnit to build those features cleanly but also enabled third-party developers\
    \ to implement their own features using the API. One such example is `MockitoRule`,\
    \ which allows you to inject mocks into your tests.\n\n## JUnit 4 Extension Model\n\
    \nBefore we learn about JUnit 5’s new extension API let’s first discuss JUnit\
    \ 4’s approach to extensibility. This will help us understand why the JUnit 5\
    \ team decided to design and build a new extensibility mechanism. As mentioned\
    \ in the previous section, extensions are not new to JUnit. JUnit 4 offered two\
    \ extension mechanisms: Runner API and Rule API.\n\n1.  Runner API was added to\
    \ JUnit 4 to provide capability for writing custom runners. A runner manages the\
    \ full life cycle of a test – instantiation of test class, calling setup and tear-down\
    \ methods, executing test cases, notifying `RunNotifier` with progress of your\
    \ tests. JUnit 4 provides an implementation, `JUnit4`, which is used by default.\
    \ Anyone can write their own custom runner by extending the `Runner` class. To\
    \ tell JUnit to use a custom runner, you use the `@RunWith` annotation and specify\
    \ your custom runner as shown in the following code snippet:\n\n    ```\n    import\
    \ org.junit.runner.RunWith;\n    @RunWith(MyCustomRunner.class)\n    public class\
    \ MyTest {\n    }\n    ```\n\n    The two major drawbacks of the Runner API are\
    \ that\n    1.  Developers must implement a full life cycle even when they want\
    \ to provide an extension for a specific life cycle stage. This makes it complicated\
    \ and heavyweight for most use cases.\n    2.  You can only use one runner class\
    \ per test case. This makes them uncomposable. For example, you cannot use `Parameterized`\
    \ and `Mockito` runners in the same test class.\n\n2.  Rule API was introduced\
    \ in JUnit 4.7 to provide a lightweight mechanism to extend JUnit. To use a rule,\
    \ you create a public instance variable of the rule and annotate it with `@Rule`\
    \ annotation. Rule API works by wrapping test methods into a statement. The statement\
    \ will first run any `@Before` methods, then the `@Test` method, and finally any\
    \ `@After` methods. The Rule API overcomes the limitations of the Runner API,\
    \ but they were limited by what they could do. The main drawback of Rule APIs\
    \ is that\n    1.  Rule API do not control the full life cycle of the test so\
    \ they can’t be used for all the use cases. They only fit use cases where you\
    \ need to do something before and after execution of the test case.\n    2.  You\
    \ have to create separate rules for method-level and class-level callbacks."
