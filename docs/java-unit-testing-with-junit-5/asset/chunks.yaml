- fmt: "### Mocking\n\nUntil now in all our test cases where we passed the `BookFilter`,\
    \ we used a lambda expression. The expression created an implementation of the\
    \ `BookFilter` and passed it to the respective methods. These test-generated implementations\
    \ are known as mock objects (i.e., a substitute for an actual system implementation).\
    \ One of the objectives while creating mocks is to test the required behaviors.\
    \ But the lambda expression-based mock allowed us only to validate the test result,\
    \ not the mock interaction; that is, we could not validate if the mocked instance\
    \ was invoked or not. The problem is more apparent in the `CompositeFilter` where\
    \ we have a chain of filters.\n\nUsing mocks is a good idea, as it allows us to\
    \ test the system in isolation. But the quality of our mocks is not good enough.\
    \ We need to improve our mocks to keep track of interactions. We can keep track\
    \ of this information in an external data structure like a `Map`.\n\n```\n@Test\n\
    @DisplayName(\"Composite criteria invokes multiple filters\")\nvoid shouldFilterOnMultiplesCriteria(){\n\
    \    CompositeFilter compositeFilter = new CompositeFilter();\n    final Map invocationMap\
    \ = new HashMap();\n    compositeFilter.addFilter( b -> {\n        invocationMap.put(1,true);\n\
    \        return true;\n    });\n    compositeFilter.apply(cleanCode);\n}\n```\n\
    \nThe aforementioned solution looks ugly. It has so many low-level details and\
    \ makes the test case hard to understand. As an alternative, we can build a `MockFilter`\
    \ abstraction where we can keep track of the invocation.\n\n```\nclass MockedFilter\
    \ implements BookFilter {\n    boolean returnValue;\n    boolean invoked;\n  \
    \  MockedFilter(boolean returnValue){\n        this.returnValue=returnValue;\n\
    \    }\n    @Override\n    public boolean apply(Book b) {\n        invoked= true;\n\
    \        return returnValue;\n    }\n}\n```\n\nThe problem with this approach\
    \ is that we are trying to reinvent the wheel. In any project, the requirement\
    \ of mocking would increase as we develop more components. Thus, using mocks for\
    \ everything soon becomes quite unmanageable.\n\nThus, as a final solution to\
    \ the foregoing problem, we should try to work with any one of the available Mocking\
    \ frameworks. Here we will be working with Mockito. Let’s first add its dependency\
    \ in our `build.gradle`.\n\n```\ndependencies {\n    def junitVersion = '5.0.1'\n\
    \    testCompile 'org.junit.jupiter:junit-jupiter-api:' + junitVersion\n    testCompile\
    \ 'org.junit.jupiter:junit-jupiter-engine:' + junitVersion\n    testCompile 'org.assertj:assertj-core:3.5.2'\n\
    \    testCompile 'org.mockito:mockito-core:2.+'\n}\n```\n\nThis will add Mockito\
    \ libraries to our project’s test classpath. In order to work with it, we must\
    \ take the following steps:\n\n- Generate mocks by using the `Mockito.mock()`\
    \ API.\n- Record the required invocations using `Mockito.when`. The `when` API\
    \ can be linked with a `thenXXX` API to return a value. These recorded interactions\
    \ will be replayed when the test case makes the required calls.\n- At the end\
    \ of the test verify all interactions that happened with the mock.\n\nSo now our\
    \ test case for the composite filter looks as follows:\n\n```\n@Test\n@DisplayName(\"\
    Composite criteria does not invoke after first failure\")\nvoid shouldNotInvokeAfterFirstFailure()\
    \ {\n    CompositeFilter compositeFilter = new CompositeFilter();\n    BookFilter\
    \ invokedMockedFilter = Mockito.mock(BookFilter.class);\n    Mockito.when(invokedMockedFilter.apply(cleanCode)).thenReturn(false);\n\
    \    compositeFilter.addFilter(invokedMockedFilter);\n    BookFilter nonInvokedMockedFilter\
    \ = Mockito.mock(BookFilter.class);\n    Mockito.when(nonInvokedMockedFilter.apply(cleanCode)).thenReturn(true);\n\
    \    compositeFilter.addFilter(nonInvokedMockedFilter);\n    assertFalse(compositeFilter.apply(cleanCode));\n\
    \    Mockito.verify(invokedMockedFilter).apply(cleanCode);\n    Mockito.verifyZeroInteractions(nonInvokedMockedFilter);\n\
    }\n\n@Test\n@DisplayName(\"Composite criteria invokes all filters\")\nvoid shouldInvokeAllFilters()\
    \ {\n    CompositeFilter compositeFilter = new CompositeFilter();\n    BookFilter\
    \ firstInvokedMockedFilter = Mockito.mock(BookFilter.class);\n    Mockito.when(firstInvokedMockedFilter.apply(cleanCode)).thenReturn(true);\n\
    \    compositeFilter.addFilter(firstInvokedMockedFilter);\n    BookFilter secondInvokedMockedFilter\
    \ = Mockito.mock(BookFilter.class);\n    Mockito.when(secondInvokedMockedFilter.apply(cleanCode)).thenReturn(true);\n\
    \    compositeFilter.addFilter(secondInvokedMockedFilter);\n    assertTrue(compositeFilter.apply(cleanCode));\n\
    \    Mockito.verify(firstInvokedMockedFilter).apply(cleanCode);\n    Mockito.verify(secondInvokedMockedFilter).apply(cleanCode);\n\
    }\n```\n\nLet’s run it! But now there is a failing test as shown in Figure [4-6](#A429029_1_En_4_Chapter.html#Fig6).\n\
    \n![A429029_1_En_4_Fig6_HTML.jpg](A429029_1_En_4_Fig6_HTML.jpg)\n\nFigure 4-6.\
    \ Mocking detected failure\n\nWell, if we look at the failure message, it clearly\
    \ states that no interactions were expected, but the mock was invoked by a lambda\
    \ expression. We did not expect this but the behavior of the `CompositeFilter`\
    \ is otherwise. It always invokes the complete chain of the filters irrespective\
    \ of the end result. For our business scenario, the behavior does not make much\
    \ difference. But the test case serves as a good documentation of what is expected\
    \ from the filter. Let’s modify the test case to make it green.\n\nIn the foregoing\
    \ section, we used Mockito to discover the behavior of our `CompositeFilter`.\
    \ The section was aimed at a brief introduction to the mocking framework and does\
    \ not cover it in detail. Refer to Mockito documentation to learn more about its\
    \ offerings.\n\n### Testing Traits\n\nNow that, we have a bunch of `BookFilters`,\
    \ we can expect a set of common behaviors from them. Each of the filters is having\
    \ its own test scenario. But for all of them, we are missing boundary condition\
    \ test cases. Should a filter fail or throw back an exception if invoked with\
    \ a null book?\n\nIn such cases, where common behavior is expected, we should\
    \ avoid building separate tests for each of the filters. Instead of adding separate\
    \ test methods for each of the filters, we can have a single test case for the\
    \ foregoing scenario and add it as a default method of an interface. The method\
    \ must be annotated with `@Test`.\n\n```\ninterface FilterBoundaryTests {\n  \
    \  BookFilter get();\n\n    @Test\n    @DisplayName(\"should not fail for null\
    \ book.\")\n    default void nullTest() {\n        assertThat(get().apply(null)).isFalse();\n\
    \    }\n}\n```\n\nIt is important to note that the default method of the interface\
    \ implements the complete test case. Things like subject under test can be asked\
    \ as an interface method which will be implemented by the implementing class.\
    \ We can now implement the previous interface in our existing `FilterSpecs`, thereby\
    \ implementing the `get()` method in each test class. As a result, the `nullTest()`\
    \ will become part of each test class.\n\n![A429029_1_En_4_Fig7_HTML.jpg](A429029_1_En_4_Fig7_HTML.jpg)\n\
    \nFigure 4-7. Default Tests\n\n```\nclass BookPublishedBeforeFilterSpec implements\
    \ FilterBoundaryTests {\n    BookFilter filter;\n\n    @BeforeEach\n    void init()\
    \ {\n        filter = BookPublishedYearFilter.Before(2007);\n    }\n\n    @Override\n\
    \    public BookFilter get() {\n        return filter;\n    }\n    // rest removed\
    \ for Brevity\n}\n```\n\nIn addition to test methods, an interface can have default\
    \ methods for `@BeforeEach` and `@AfterEach` life cycle events. Such life cycle\
    \ methods will be invoked for every test in the test class.\n\nDefault methods\
    \ cannot take part in `@BeforeAll` and `@AfterAll` life cycle events. Only static\
    \ methods of an interface can take part in these events."
  raw: '### Mocking


    Until now in all our test cases where we passed the BookFilter, we used a lambda
    expression. The expression created an implementation of the BookFilter and passed
    it to the respective methods. These test-generated implementations are known as
    mock objects (i.e., a substitute for an actual system implementation). One of
    the objectives while creating mocks is to test the required behaviors. But the
    lambda expression-based mock allowed us only to validate the test result, not
    the mock interaction; that is, we could not validate if the mocked instance was
    invoked or not. The problem is more apparent in the CompositeFilter where we have
    a chain of filters.


    Using mocks is a good idea, as it allows us to test the system in isolation. But
    the quality of our mocks is not good enough. We need to improve our mocks to keep
    track of interactions. We can keep track of this information in an external data
    structure like a Map.


    ```

    @Test

    @DisplayName("Composite criteria invokes multiple filters")

    void shouldFilterOnMultiplesCriteria(){

    CompositeFilter compositeFilter = new CompositeFilter();

    final Map invocationMap = new HashMap();

    compositeFilter.addFilter( b -> {

    invocationMap.put(1,true);

    return true;

    });

    compositeFilter.apply(cleanCode);

    }

    ```


    The aforementioned solution looks ugly. It has so many low-level details and makes
    the test case hard to understand. As an alternative, we can build a MockFilter
    abstraction where we can keep track of the invocation.


    ```

    class MockedFilter implements BookFilter {

    boolean returnValue;

    boolean invoked;

    MockedFilter(boolean returnValue){

    this.returnValue=returnValue;

    }

    @Override

    public boolean apply(Book b) {

    invoked= true;

    return returnValue;

    }

    }

    ```


    The problem with this approach is that we are trying to reinvent the wheel. In
    any project, the requirement of mocking would increase as we develop more components.
    Thus, using mocks for everything soon becomes quite unmanageable.


    Thus, as a final solution to the foregoing problem, we should try to work with
    any one of the available Mocking frameworks. Here we will be working with Mockito.
    Let’s first add its dependency in our build.gradle


    ```

    dependencies {

    def junitVersion = ''5.0.1''

    testCompile ''org.junit.jupiter:junit-jupiter-api:'' + junitVersion

    testCompile ''org.junit.jupiter:junit-jupiter-engine:'' + junitVersion

    testCompile ''org.assertj:assertj-core:3.5.2''

    testCompile ''org.mockito:mockito-core:2.+''

    }

    ```


    This will add Mockito libraries to our project’s test classpath. In order to work
    with it, we must take the following steps:


    *   Generate mocks by using the Mockito.mock() API.

    *   Record the required invocations using Mockito.when. The when API can be linked
    with a thenXXX API to return a value. These recorded interactions will be replayed
    when the test case makes the required calls.

    *   At the end of the test verify all interactions that happened with the mock.


    So now our test case for the composite filter looks as follows:


    ```

    @Test

    @DisplayName("Composite criteria does not invoke after first failure")

    void shouldNotInvokeAfterFirstFailure() {

    CompositeFilter compositeFilter = new CompositeFilter();

    BookFilter invokedMockedFilter = Mockito.mock(BookFilter.class);

    Mockito.when(invokedMockedFilter.apply(cleanCode)).thenReturn(false);

    compositeFilter.addFilter(invokedMockedFilter);

    BookFilter nonInvokedMockedFilter = Mockito.mock(BookFilter.class);

    Mockito.when(nonInvokedMockedFilter.apply(cleanCode)).thenReturn(true);

    compositeFilter.addFilter(nonInvokedMockedFilter);

    assertFalse(compositeFilter.apply(cleanCode));

    Mockito.verify(invokedMockedFilter).apply(cleanCode);

    Mockito.verifyZeroInteractions(nonInvokedMockedFilter);

    }

    @Test

    @DisplayName("Composite criteria invokes all filters")

    void shouldInvokeAllFilters() {

    CompositeFilter compositeFilter = new CompositeFilter();

    BookFilter firstInvokedMockedFilter = Mockito.mock(BookFilter.class);

    Mockito.when(firstInvokedMockedFilter.apply(cleanCode)).thenReturn(true);

    compositeFilter.addFilter(firstInvokedMockedFilter);

    BookFilter secondInvokedMockedFilter = Mockito.mock(BookFilter.class);

    Mockito.when(secondInvokedMockedFilter.apply(cleanCode)).thenReturn(true);

    compositeFilter.addFilter(secondInvokedMockedFilter);

    assertTrue(compositeFilter.apply(cleanCode));

    Mockito.verify(firstInvokedMockedFilter).apply(cleanCode);

    Mockito.verify(secondInvokedMockedFilter).apply(cleanCode);

    }

    ```


    Let’s run it! But now there is a failing test as shown in Figure [4-6](#A429029_1_En_4_Chapter.html#Fig6).


    ![A429029_1_En_4_Fig6_HTML.jpg](A429029_1_En_4_Fig6_HTML.jpg)


    Figure 4-6.


    Mocking detected failure


    Well, if we look at the failure message, it clearly states that no interactions
    were expected, but the mock was invoked by a lambda expression. We did not expect
    this but the behavior of the CompositeFilter is otherwise. It always invokes the
    complete chain of the filters irrespective of the end result. For our business
    scenario, the behavior does not make much difference. But the test case serves
    as a good documentation of what is expected from the filter. Let’s modify the
    test case to make it green.


    In the foregoing section, we used Mockito to discover the behavior of our CompositeFilter.
    The section was aimed at a brief introduction to the mocking framework and does
    not cover it in detail. Refer to Mockito documentation to learn more about its
    offerings.


    ### Testing Traits


    Now that, we have a bunch of BookFilters, we can expect a set of common behaviors
    from them. Each of the filters is having its own test scenario. But for all of
    them, we are missing boundary condition test cases. Should a filter fail or throw
    back an exception if invoked with a null book?


    In such cases, where common behavior is expected, we should avoid building separate
    tests for each of the filters. Instead of adding separate test methods for each
    of the filters, we can have a single test case for the foregoing scenario and
    add it as a default method of an interface . The method must be annotated with
    `@Test`.


    ```

    interface FilterBoundaryTests {

    BookFilter get();

    @Test

    @DisplayName("should not fail for null book.")

    default void nullTest() {

    assertThat(get().apply(null)).isFalse();

    }

    }

    ```


    It is important to note that the default method of the interface implements the
    complete test case. Things like subject under test can be asked as an interface
    method which will be implemented by the implementing class. We can now implement
    the previous interface in our existing FilterSpecs, thereby implementing the `get()`
    method in each test class. As a result, the nullTest() will become part of each
    test class.


    ![A429029_1_En_4_Fig7_HTML.jpg](A429029_1_En_4_Fig7_HTML.jpg)


    Figure 4-7.


    Default Tests


    ```

    class BookPublishedBeforeFilterSpec implements FilterBoundaryTests {

    BookFilter filter;

    @BeforeEach

    void init() {

    filter = BookPublishedYearFilter.Before(2007);

    }

    @Override

    public BookFilter get() {

    return filter;

    }

    // rest removed for Brevity

    }

    ```


    In addition to test methods, an interface can have default methods for `@BeforeEach`
    and `@AfterEach` life cycle events. Such life cycle methods will be invoked for
    every test in the test class.


    Default methods cannot take part in @BeforeAll and @AfterAll life cycle events.
    Only static methods of an interface can take part in these events.'
