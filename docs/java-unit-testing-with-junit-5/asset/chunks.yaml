    *   **使用 ExpectedException 规则**：JUnit 4 支持的另一种更具扩展性的方法是使用 `ExpectedException`\
    \ 规则。JUnit Rule API 提供了对代码执行过程中发生情况的更多控制。`ExpectedException` 是 JUnit 4 自身提供的内置规则之一。\n\
    \n    ```\n    public class BookShelfSpecWithRules {\n    @Rule\n    public ExpectedException\
    \ expectedException = ExpectedException.none();\n    @Test\n    void throwsExceptionWhenBooksAreAddedAfterCapacityIsReached()\
    \ {\n    BookShelf bookShelf = new BookShelf(1);\n    expectedException.expect(BookShelfCapacityReached.class);\n\
    \    expectedException.expectMessage(\"BookShelf capacity of 1 is reached. You\
