    This will fix all the compilation issues. Run the test cases again and you will
    find a couple of test cases related to the failed arrange use case. The exception
    message that you will see is shown in the code snippet that follows:


    ```

    java.lang.ClassCastException: bookstoread.Book cannot be cast to java.lang.Comparable

    ```


    As you might have guessed, the reason is that `Book` class does not implement
    the `Comparable` interface. The `sorted` method used earlier assumes that the
    object you are sorting implements the `Comparable` interface. Change the `Book`
    to implement the `Comparable` interface as shown in the following code:


    ```

    public class Book implements Comparable{

    ... // removed for brevity

    @Override

    public int compareTo(Book that) {

    return this.title.compareTo(that.title);

    }

    }

    ```


    Run the test cases again and all the test cases will pass.


    Now that everything is green, let’s add a test case that allows the user to pass
    an arrangement criterion.


    ```

    @Test

    void bookshelfArrangedByUserProvidedCriteria() {

    shelf.add(effectiveJava, codeComplete, mythicalManMonth);

    List books = shelf.arrange(Comparator.naturalOrder().reversed());

    assertEquals(

    asList(mythicalManMonth, effectiveJava, codeComplete),

    books,

    () -> "Books in a bookshelf are arranged in descending order of book title");

    }

    ```


    In the foregoing code, we are passing criteria from the test case. We want to
    arrange the bookshelf in reverse lexicographical order. This code will not compile.
    To make it compile, we will have to either change the existing `arrange` method
    to support passing in `Comparator` or add a new method, which supports criteria.
    We will add a new method and keep the old method for natural sorting (i.e., by
    title).


    ```

    public List arrange() {

    return books.stream().sorted().collect(Collectors.toList());

    }

    public List arrange(Comparator criteria) {

    return null;

    }

    ```


    This will make the code compile, but our new test case will fail. To pass the
    test, we will change the code to the following:


    ```

    public List arrange() {

    return books.stream().sorted().collect(Collectors.toList());

    }

    public List arrange(Comparator criteria) {

    return books.stream().sorted(criteria).collect(Collectors.toList());

    }

    ```


    Run the test cases again. This time all the test cases will be green. Take a moment
    and think about whether you can improve the foregoing code. You will notice that
    there is code duplication in the `arrange` methods. We can refactor the code as
    shown.


    ```

    public List arrange() {

    return arrange(Comparator.naturalOrder());

    }

    public List arrange(Comparator criteria) {

    return books.stream().sorted(criteria).collect(Collectors.toList());

    }

    ```


    Run the test cases again and all the test cases will be again green. You can write
    one more test case to arrange the bookshelf by publication date.


    Before we develop the next feature, let’s talk about few more features of JUnit
    5.'
