- fmt: "# Characteristics of Good Unit Tests\n\nTests should be written with the same\
    \ focus and clarity as the production code. We must refactor test cases so that\
    \ they are kept lean and correct. Tests will only reap benefits if people can\
    \ understand and rely on them.\n\nWhen following TDD, high-quality tests are the\
    \ key to success. It’s one thing merely to have tests, and another thing to have\
    \ high-quality tests. The tests need to have several characteristics so that they\
    \ remain useful throughout their life. They should be:\n\n*   **Readable**: One\
    \ of the goals of a test is to educate its reader about what the unit being tested\
    \ will do. If the tests are not readable then the reader will not be able to understand\
    \ when the tests will fail. A good unit test case has a meaningful name so that\
    \ the reader understands the behavior of unit being tested without looking at\
    \ implementation details.\n*   **Fast**: Tests should run in few seconds so that\
    \ they provide quick feedback. If tests take more time, the programmer will look\
    \ for ways to skip the tests. Unit tests must mock external dependencies so that\
    \ the tests run fast and independent of external services. Mocking allows testing\
    \ of a unit of code by simulating behaviour of its dependencies in a controlled\
    \ manner.\n*   **Independent and Isolated**: Good unit tests are independent of\
    \ execution order. They don’t rely on other unit tests for them to work correctly.\
    \ They should run independently in their own isolated environment.\n*   **Correct**:\
    \ A good unit test does what it says. A test case should correspond to a single\
    \ case (i.e., behavior). Often tests don’t do what their name suggests. This is\
    \ very risky, as in that case you can’t trust your tests.\n*   **Environment agnostic**:\
    \ A litmus test for any software project is the following: “Can you check out\
    \ the code on a clean developer machine and run the full build including tests\
    \ without any problem.” Most of the time, we find that unit tests fail because\
    \ they depend on some external factor. The external factor could be a file at\
    \ a particular location, an environment variable, or something else. This leads\
    \ to brittle tests. A good unit test does not depend on the environment.\n*  \
    \ **Repeatable**: A good unit test produces the same result each time you run\
    \ it. Test execution should be automated using the build tool. They should be\
    \ part of the automated build process so that they run each time you execute build.\
    \ When tests start failing randomly, programmers start ignoring them. These random\
    \ test failures are difficult to reproduce and normally happen on external systems\
    \ like continuous integration servers. Team should ensure that failing tests are\
    \ fixed as soon as they are discovered.\n\n# JUnit Introduction\n\nJUnit, developed\
    \ by Kent Beck and Erich Gamma, is one of the most popular unit-testing frameworks\
    \ for Java developers. It was originally based on SUnit, a unit-testing framework\
    \ written in Smalltalk (developed by Kent Beck). The first version of JUnit was\
    \ released in 1997. It has since become the de facto standard, adopted in many\
    \ different languages and by many tools. Martin Fowler highlights the importance\
    \ of JUnit framework in his quote:\n\n> Never in the field of software development\
    \ have so many owed so much to so few lines of code.\n\nPrior to the introduction\
    \ of JUnit, testing discipline was dominated by capture and replay testing tools.\
    \ These tools were black-box testing tools, which used to capture the state of\
    \ the system with a given input and then try to replay it. The tests written in\
    \ such a framework involved an enormous amount of effort. These tools were not\
    \ designed to unit test a component as they tested the application using its graphical\
    \ user interface (GUI).\n\nJUnit rejected the idea of GUI-based tests. It instead\
    \ provided a lightweight framework, which enabled test creation by writing code\
    \ in Java. This allowed developers to build test suites for every piece of their\
    \ code. Due to its benefits, JUnit was integrated with all kinds of build tools\
    \ and integrated development environments (IDEs).\n\nThe JUnit team has been adept\
    \ at utilizing the new Java language features. Post the release of Java 5, which\
    \ enabled the use of annotations, generics, and so on, JUnit 4.0 was released\
    \ with features like `@Test`, and `@Setup`. Kent Beck said the following about\
    \ JUnit 4:\n\n> The theme of JUnit 4 is to encourage more developers to write\
    \ more tests by further simplifying JUnit.\n\nJUnit 4.0 simplified unit testing\
    \ by getting away from naming conventions and introducing several other features\
    \ like timeouts and test exceptions. JUnit 4.0 was released a decade ago, sometime\
    \ in February 2006. Throughout the next ten years, we have seen multiple minor\
    \ releases of JUnit, with the latest being JUnit 4.12, which was released in December\
    \ 2014. Before we learn more about JUnit 5, let’s understand why we need a new\
    \ version of JUnit framework.\n\n## Why We Need a New Version of JUnit?\n\nAs\
    \ developer testing gained momentum and maturity over the last few years, developers\
    \ began to expect more from their unit-testing framework. Following are the reasons\
    \ a new version was required:\n\n*   **Features**: Developers want their testing\
    \ framework to support integration testing, better assertions, and many other\
    \ features so that they don’t have to rely on other libraries.\n*   **Modularity**:\
    \ Earlier versions of JUnit lack modularity. Everything is packaged as one single\
    \ jar. There is a single JUnit project, which contains all JUnit code base. It\
    \ achieves modularity by using different subpackages. This means everyone is dependent\
    \ on JUnit jar—build tools, IDE, your JUnit tests, extensions, and so on, all\
    \ using the same code. Test discovery and test execution are one example of concern\
    \ regarding tight coupling.\n*   **Extensibility**: JUnit 4 provided extensibility\
    \ using two mechanisms:\n    *   Runner API (application programming interface)\n\
    \    *   Rule API\n    They both had their strengths and limitations. To write\
    \ a custom test runner, you have to implement the complete test life cycle, which\
    \ includes test instantiation, test execution, setup and teardown, and so on.\
    \ The biggest drawback of Runner API is that you can’t combine multiple runners\
    \ together. Rule API introduced in JUnit 4.7 is much simpler to work with but\
    \ is limited in what it can do. One limitation of Rule API was that there couldn’t\
    \ be a single rule for both method-level and class-level callbacks. This left\
    \ a lot from JUnit in terms of extensibility.\n*   **Java 8**: Java 8 introduces\
    \ a lot of new features like lambdas. You can use Java 8 with previous versions\
    \ of JUnit, but JUnit itself can be improved a lot by supporting these features."
  raw: "## Characteristics of Good Unit Tests\n\nTests should be written with the\
    \ same focus and clarity as the production code. We must refactor test cases so\
    \ that they are kept lean and correct. Tests will only reap benefits if people\
    \ can understand and rely on them.\n\nWhen following TDD, high-quality tests are\
    \ the key to success. It’s one thing merely to have tests, and another thing to\
    \ have high-quality tests. The tests need to have several characteristics so that\
    \ they remain useful throughout their life. They should be\n\n*   Readable : One\
    \ of the goals of a test is to educate its reader about what the unit being tested\
    \ will do. If the tests are not readable then the reader will not be able to understand\
    \ when the tests will fail. A good unit test case has a meaningful name so that\
    \ the reader understands the behavior of unit being tested without looking at\
    \ implementation details.\n*   Fast: Tests should run in few seconds so that they\
    \ provide quick feedback. If tests take more time, the programmer will look for\
    \ ways to skip the tests. Unit tests must mock external dependencies so that the\
    \ tests run fast and independent of external services. Mocking allows testing\
    \ of a unit of code by simulating behaviour of its dependencies in a controlled\
    \ manner.\n*   Independent and Isolated: Good unit tests are independent of execution\
    \ order. They don’t rely on other unit tests for them to work correctly. They\
    \ should run independently in their own isolated environment.\n*   Correct: A\
    \ good unit test does what it says. A test case should correspond to a single\
    \ case (i.e., behavior). Often tests don’t do what their name suggests. This is\
    \ very risky, as in that case you can’t trust your tests.\n*   Environment agnostic\
    \ : A litmus test for any software project is the following: “Can you check out\
    \ the code on a clean developer machine and run the full build including tests\
    \ without any problem.” Most of the time, we find that unit tests fail because\
    \ they depend on some external factor. The external factor could be a file at\
    \ a particular location, an environment variable, or something else. This leads\
    \ to brittle tests. A good unit test does not depend on the environment.\n*  \
    \ Repeatable: A good unit test produces the same result each time you run it.\
    \ Test execution should be automated using the build tool. They should be part\
    \ of the automated build process so that they run each time you execute build.\
    \ When tests start failing randomly, programmers start ignoring them. These random\
    \ test failures are difficult to reproduce and normally happen on external systems\
    \ like continuous integration servers. Team should ensure that failing tests are\
    \ fixed as soon as they are discovered.\n\n## JUnit Introduction\n\nJUnit, developed\
    \ by Kent Beck and Erich Gamma, is one of the most popular unit-testing frameworks\
    \ for Java developers. It was originally based on SUnit, a unit-testing framework\
    \ written in Smalltalk (developed by Kent Beck). The first version of JUnit was\
    \ released in 1997\\. It has since become the de facto standard, adopted in many\
    \ different languages and by many tools. Martin Fowler highlights the importance\
    \ of JUnit framework in his quote:\n\n> Never in the field of software development\
    \ have so many owed so much to so few lines of code.\n\nPrior to the introduction\
    \ of JUnit, testing discipline was dominated by capture and replay testing tools.\
    \ These tools were black-box testing tools , which used to capture the state of\
    \ the system with a given input and then try to replay it. The tests written in\
    \ such a framework involved an enormous amount of effort. These tools were not\
    \ designed to unit test a component as they tested the application using its graphical\
    \ user interface (GUI).\n\nJUnit rejected the idea of GUI-based tests. It instead\
    \ provided a lightweight framework, which enabled test creation by writing code\
    \ in Java. This allowed developers to build test suites for every piece of their\
    \ code. Due to its benefits, JUnit was integrated with all kinds of build tools\
    \ and integrated development environments (IDEs).\n\nThe JUnit team has been adept\
    \ at utilizing the new Java language features. Post the release of Java 5, which\
    \ enabled the use of annotations, generics, and so on, JUnit 4.0 was released\
    \ with features like @Test, and @Setup. Kent Beck said the following about JUnit\
    \ 4:\n\n> The theme of JUnit 4 is to encourage more developers to write more tests\
    \ by further simplifying JUnit.\n\nJUnit 4.0 simplified unit testing by getting\
    \ away from naming conventions and introducing several other features like timeouts\
    \ and test exceptions. JUnit 4.0 was released a decade ago, sometime in February\
    \ 2006\\. Throughout the next ten years, we have seen multiple minor releases\
    \ of JUnit, with the latest being JUnit 4.12, which was released in December 2014\\\
    . Before we learn more about JUnit 5, let’s understand why we need a new version\
    \ of JUnit framework.\n\n### Why We Need a New Version of JUnit?\n\nAs developer\
    \ testing gained momentum and maturity over the last few years, developers began\
    \ to expect more from their unit-testing framework . Following are the reasons\
    \ a new version was required:\n\n*   Features: Developers want their testing framework\
    \ to support integration testing, better assertions, and many other features so\
    \ that they don’t have to rely on other libraries.\n*   Modularity: Earlier versions\
    \ of JUnit lack modularity. Everything is packaged as one single jar. There is\
    \ a single JUnit project, which contains all JUnit code base. It achieves modularity\
    \ by using different subpackages. This means everyone is dependent on JUnit jar—build\
    \ tools, IDE, your JUnit tests, extensions, and so on, all using the same code.\
    \ Test discovery and test execution are one example of concern regarding tight\
    \ coupling.\n*   Extensibility : JUnit 4 provided extensibility using two mechanisms:\n\
    \    *   Runner API (application programming interface)\n    *   Rule APIThey\
    \ both had their strengths and limitations. To write a custom test runner, you\
    \ have to implement the complete test life cycle, which includes test instantiation,\
    \ test execution, setup and teardown, and so on. The biggest drawback of Runner\
    \ API is that you can’t combine multiple runners together. Rule API introduced\
    \ in JUnit 4.7 is much simpler to work with but is limited in what it can do.\
    \ One limitation of Rule API was that there couldn’t be a single rule for both\
    \ method-level and class-level callbacks. This left a lot from JUnit in terms\
    \ of extensibility.\n*   Java 8: Java 8 introduces a lot of new features like\
    \ lambdas. You can use Java 8 with previous versions of JUnit, but JUnit itself\
    \ can be improved a lot by supporting these features."
  trans: "\n## 优秀单元测试的特征\n\n测试应像生产代码一样，以同样的专注度和清晰度来编写。我们必须重构测试用例，使其保持简洁和正确。只有当人们能够理解并信赖测试时，它们才能发挥价值。\n\
    \n遵循 TDD（测试驱动开发）时，高质量的测试是成功的关键。拥有测试是一回事，拥有高质量的测试则是另一回事。测试需要具备若干特征，才能在其整个生命周期中保持有用。它们应当：\n\
    \n*   **可读性**：测试的目标之一是让阅读者了解被测试单元的功能。如果测试不可读，阅读者就无法理解测试何时会失败。一个好的单元测试用例拥有有意义的名称，这样阅读者无需查看实现细节就能理解被测试单元的行为。\n\
    *   **快速**：测试应在几秒内运行完毕，以便提供快速反馈。如果测试耗时过长，程序员就会想方设法跳过测试。单元测试必须模拟外部依赖，以便测试运行快速且独立于外部服务。模拟允许通过以可控方式模拟其依赖项的行为来测试代码单元。\n\
    *   **独立且隔离**：优秀的单元测试不依赖于执行顺序。它们不依赖其他单元测试来保证自身正确运行。它们应在各自独立的隔离环境中运行。\n*   **正确性**：一个好的单元测试能做到名副其实。一个测试用例应对应一个单一场景（即行为）。通常，测试并未如其名称所示那样工作。这非常危险，因为在这种情况下，你无法信任你的测试。\n\
    *   **环境无关性**：任何软件项目的试金石如下：“你能在一台干净的开发机器上检出代码，并毫无问题地运行包括测试在内的完整构建吗？”大多数时候，我们发现单元测试失败是因为它们依赖于某些外部因素。外部因素可能是特定位置的文件、环境变量或其他东西。这会导致脆弱的测试。一个好的单元测试不依赖于环境。\n\
    *   **可重复性**：一个好的单元测试每次运行时都会产生相同的结果。测试执行应使用构建工具自动化。它们应成为自动化构建过程的一部分，以便每次执行构建时都能运行。当测试开始随机失败时，程序员会开始忽略它们。这些随机的测试失败难以重现，并且通常发生在持续集成服务器等外部系统上。团队应确保一旦发现失败的测试就立即修复。\n\
    \n## JUnit 简介\n\nJUnit 由 Kent Beck 和 Erich Gamma 开发，是 Java 开发者最流行的单元测试框架之一。它最初基于\
    \ SUnit（一个由 Kent Beck 用 Smalltalk 编写的单元测试框架）。JUnit 的第一个版本于 1997 年发布。此后，它已成为事实上的标准，被许多不同语言和工具所采用。Martin\
    \ Fowler 在其名言中强调了 JUnit 框架的重要性：\n\n> 在软件开发领域，从未有如此多的人，欠了如此少的代码行如此大的恩情。\n\n在 JUnit\
    \ 引入之前，测试领域由“捕获-回放”测试工具主导。这些工具是黑盒测试工具，它们曾用于捕获系统在给定输入下的状态，然后尝试回放。用此类框架编写的测试需要付出巨大的努力。这些工具并非为单元测试组件而设计，因为它们是通过图形用户界面（GUI）来测试应用程序的。\n\
    \nJUnit 摒弃了基于 GUI 的测试理念。相反，它提供了一个轻量级框架，允许通过编写 Java 代码来创建测试。这使得开发者能够为他们代码的每一部分构建测试套件。由于其诸多优点，JUnit\
    \ 被集成到各种构建工具和集成开发环境（IDE）中。\n\nJUnit 团队一直善于利用新的 Java 语言特性。在 Java 5 发布（支持注解、泛型等）之后，JUnit\
    \ 4.0 也随之发布，带来了诸如 `@Test` 和 `@Setup` 等功能。Kent Beck 这样评价 JUnit 4：\n\n> JUnit 4\
    \ 的主题是通过进一步简化 JUnit，鼓励更多开发者编写更多测试。\n\nJUnit 4.0 通过摆脱命名约定并引入超时和测试异常等其他特性，简化了单元测试。JUnit\
    \ 4.0 发布于十年前，大约在 2006 年 2 月。在接下来的十年里，我们看到了 JUnit 的多个小版本发布，最新的是 2014 年 12 月发布的\
    \ JUnit 4.12。在我们进一步了解 JUnit 5 之前，先来理解为什么我们需要一个新版本的 JUnit 框架。\n\n### 为什么我们需要新版本的\
    \ JUnit？\n\n随着开发者测试在过去几年中获得动力并日趋成熟，开发者开始对他们的单元测试框架抱有更多期望。以下是需要新版本的原因：\n\n*   **特性**：开发者希望他们的测试框架支持集成测试、更好的断言以及许多其他特性，这样他们就不必依赖其他库。\n\
    *   **模块化**：早期版本的 JUnit 缺乏模块化。所有东西都打包成一个单一的 jar 文件。只有一个单一的 JUnit 项目，包含了所有 JUnit\
    \ 代码库。它通过使用不同的子包来实现模块化。这意味着每个人都依赖于 JUnit jar——构建工具、IDE、你的 JUnit 测试、扩展等，都使用相同的代码。测试发现和测试执行就是紧密耦合问题的一个例子。\n\
    *   **可扩展性**：JUnit 4 通过两种机制提供了可扩展性：\n    *   Runner API（应用程序编程接口）\n    *   Rule\
    \ API\n    它们各有优缺点。要编写自定义的测试运行器，你必须实现完整的测试生命周期，包括测试实例化、测试执行、设置和清理等。Runner API\
    \ 最大的缺点是你无法组合多个运行器。JUnit 4.7 引入的 Rule API 使用起来简单得多，但其功能有限。Rule API 的一个限制是，不能有一个单一的规则同时处理方法级别和类级别的回调。这使得\
    \ JUnit 在可扩展性方面留下了很多不足。\n*   **Java 8**：Java 8 引入了许多新特性，比如 lambda 表达式。你可以将 Java\
    \ 8 与旧版本的 JUnit 一起使用，但 JUnit 本身可以通过支持这些特性得到很大改进。\n"
- fmt: '### JUnit 5


    To overcome the limitations mentioned previously, JUnit Lambda project was initiated.
    JUnit Lambda was the code name for JUnit 5. JUnit 5 is a complete rewrite of JUnit
    in Java 8. You need Java 8 to use JUnit 5. It is redesigned from the ground up,
    overcoming the mistakes and limitations of previous JUnit versions. This does
    not mean that tests written in JUnit 3 and JUnit 4 will not work with JUnit 5.
    JUnit team has made sure that JUnit 5 is backward compatible, so you can run your
    old JUnit tests with it as well. JUnit 5 supports JUnit 3.8 and above versions.


    JUnit 5 is composed of three subprojects. Each of these subprojects has multiple
    modules, which we will look at later.


    - **JUnit Platform**: This provides a foundation for launching JVM (Java Virtual
    Machine) testing frameworks. This includes a `TestEngine` API that can be used
    to develop a testing framework for JUnit Platform to run. It also provides a `ConsoleLauncher`
    that build tools like Gradle and Maven can use.

    - **JUnit Jupiter**: This provides the new programming model for writing tests.
    Also, the new extension mechanism is part of this subproject. It implements the
    `TestEngine` API defined by JUnit Platform so that JUnit 5 tests can be run.

    - **JUnit Vintage**: This provides a `TestEngine` implementation for running JUnit
    3 and JUnit 4 tests.


    JUnit 5 architecture looks as shown in Figure [1-2](#A429029_1_En_1_Chapter.html#Fig2).
    JUnit 5 replaced the concept of runners with the engine. So, in the middle, there
    is an engine API that is implemented for both JUnit 4 and JUnit 5 API. This allows
    you to run tests written using different versions of JUnit. Tools like Gradle,
    IntelliJ, or Eclipse use the launcher API. Your tests will depend on the JUnit
    5 API keeping you away from JUnit internals.


    ![A429029_1_En_1_Fig2_HTML.gif](A429029_1_En_1_Fig2_HTML.gif)


    Figure 1-2. JUnit 5 architecture


    The main modules in JUnit 5 are:


    - `junit-jupiter-api`: This module defines the API that you need to write your
    tests.

    - `junit-platform-launcher`: This module defines the launcher API that external
    tool use. Launchers can be used to discover, filter, and execute tests.

    - `junit-platform-engine`: This provides the API that you can use to write your
    own `TestEngine`. `TestEngine` is responsible for the discovery and execution
    of tests.

    - `junit-jupiter-engine`: It is the implementation of `junit-platform-engine`
    API for JUnit 5.

    - `junit-vintage-engine`: It is the implementation of `junit-platform-engine`
    API for JUnit 3 and JUnit 4.

    - `junit-platform-commons`: It contains all the utilities which are used across
    different modules.

    - `junit-platform-console`: This provides an implementation of a launcher called
    `ConsoleLauncher`. `ConsoleLauncher` is a stand-alone application used to launch
    JUnit platform from the console.

    - `junit-platform-gradle-plugin`: This is a Gradle plug-in that can be used to
    run JUnit 5 tests.

    - `junit-platform-surefire-provider`: This module provides Maven integration for
    JUnit 5.


    JUnit team is also trying to build a strong foundation for testing tool providers
    and build tools/IDEs. In this version, they have launched an Open Test Alliance
    ( [`https://github.com/ota4j-team/opentest4j`](https://github.com/ota4j-team/opentest4j)
    ), which is aimed at defining standards for test execution on JVM.


    ## Java 8 Primer


    Java 8 is not a new topic anymore. There have been many good books published on
    it. Still, many Java developers are unaware of the power of Java 8. Throughout
    this book, we will be using Java 8, so we will provide a short primer of important
    Java 8 features in this section.


    Java 8 is the biggest release of Java to date. It comes packed with many features
    like lambdas, stream API, optional, new date-time API, default and static methods
    in interfaces, and many others. In this section, we will look at the three most
    important features of Java 8 – lambdas, stream API, and optional — which will
    change the way we work with Java.


    ### Lambdas


    The most important feature introduced in Java 8 is lambda expressions. Lambda
    expressions allow you to pass behavior as data. In earlier versions of Java, we
    used anonymous inner classes for passing behavior. Let’s look at a simple example
    of lambda expression – sort function in Java’s `Collections` class. The sort function
    takes `List` and `Comparator` and sorts based on the provided `Comparator`.


    ```java

    List books = Arrays.asList("Effective Java", "Clean Code", "Refactoring");

    Collections.sort(books, (b1, b2) -> b1.length() – b2.length));

    ```


    The code snippet sorts book titles according to their length. The output of the
    program will be `[Refactoring, Clean Code, Effective Java]`.


    The expression `(b1, b2) -> b1.length() – b2.length()` shown in the code snippet
    is a lambda expression of type `Comparator<String>`.


    - The `(b1, b2)` are parameters of the `compare` method of `Comparator`.

    - `b1.length() – b2.length()` is the function body that compares the length of
    two book titles.

    - `->` is the lambda operator that separates parameters from the body of the lambda.'
