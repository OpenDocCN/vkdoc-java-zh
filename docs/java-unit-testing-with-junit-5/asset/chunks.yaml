- fmt: '# Test Class


    As a programmer, we interact with a unit-testing framework via test classes. In
    the first chapter, we wrote our first test class `BookShelfSpec`. It had one test
    method `shelfEmptyWhenNoBookAdded`, which asserted that `BookShelf` should be
    empty when no book is added to it.


    In the previous versions of JUnit, a class is considered a test class if it has
    the following characteristics:


    * Public access

    * A no-arg constructor

    * At least one test method


    In the first chapter, we wrote the test class `BookShelfSpec`, shown in the following
    code, which satisfied those constraints:


    ```

    package bookstoread;

    import org.junit.jupiter.api.Test;

    import java.util.List;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    public class BookShelfSpec {

    @Test

    public void shelfEmptyWhenNoBookAdded() {

    BookShelf shelf = new BookShelf();

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty");

    }

    }

    ```


    We do not have to write a no-arg constructor as Java creates one implicitly if
    a class does not have any other constructor.


    In JUnit 5, a few of these constraints have been relaxed. JUnit 5 test classes
    and test methods are not required to be public. We can now make them package protected
    as shown in the code that follows:


    ```

    // package and import statements removed for brevity

    class BookShelfSpec {

    @Test

    void shelfEmptyWhenNoBookAdded(){

    BookShelf shelf = new BookShelf();

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty.");

    }

    }

    ```


    The reason for this relaxation is that JUnit internally uses reflection to find
    test classes and test methods. Reflection can discover them even if they have
    limited visibility so there is no need for them to be public. It does not mean
    a lot, as test class and test method stubs can be easily generated using our favorite
    integrated development environment (IDE). So, as a programmer, we didn’t have
    to do much previously as well. But, in my opinion, this is a subtle way to say
    that if you don’t need something why ask for it. In this section, we will only
    focus on test classes. We cover test methods in the next section.


    ## Constructors


    JUnit 5 does not require a test class to have a public no-arg constructor. The
    constructor can be package protected, or protected, or even private. Following
    is the `BookShelfSpec` with the private no-arg constructor. Run the test case
    and you will see that the test still works fine.


    ```

    class BookShelfSpec {

    private BookShelfSpec() {

    /*

    This constructor is private

    */

    }

    // test removed for brevity

    }

    ```


    The other constraint that prior versions of JUnit had on constructors was that
    they couldn’t have parameters. We were required to have a public no-arg constructor.
    We saw that in JUnit 5 visibility constraint is relaxed, but does JUnit 5 also
    relax the no-arg constructor constraint? You would be pleasantly surprised that
    with JUnit 5 test class constructors are allowed to have parameters. Test methods
    can have not only constructors but also parameters. This is achieved by providing
    a `ParameterResolver`. A `ParameterResolver` dynamically resolves parameters at
    runtime. You can only use parameters in constructors or test methods if you have
    a resolver that will resolve these parameters and inject them. We will cover resolvers
    in more detail in a chapter [8](#A429029_1_En_8_Chapter.html). Just to give you
    a quick example, we will use one of the JUnit 5 inbuilt resolvers—`TestInfoParameterResolver`.


    ```

    import org.junit.jupiter.api.TestInfo;

    class BookShelfSpec {

    private BookShelfSpec(TestInfo testInfo) {

    System.out.println("Working on test " + testInfo.getDisplayName());

    }

    // test method removed for brevity

    }

    ```


    In the foregoing code, we defined a parameter of type `TestInfo` in the test class
    constructor that is later used in the `print` statement. `TestInfoParameterResolver`
    supplies an instance of `TestInfo` to the constructor. `TestInfo` contains information
    about the current test. We used it to display the name of the test class.


    When you run, the code shown previously, it will `print` the statement “`Working
    on test BookShelfSpec`” for each test case. As we have just one test case, it
    will be printed only once.


    ## Using @DisplayName


    When they start working with JUnit, most programmers think that a test class name
    needs to end with `Test` suffix. Using `Test` in the test class name is just a
    convention; you are not required to name your test classes like that. These days
    many programmers end their test class names with `Spec` or `Specification`. So,
    rather than writing `BookShelfTest` we could write `BookShelfSpec` or `BookShelfSpecification`.
    The `Spec` naming convention is popularized by behavior-driven development (BDD)
    practice. Your goal should be to pick one naming convention and stick with it
    in your project.


    Behavior-driven development combines TDD principles with domain-driven design
    to provide software teams with shared tools and a shared process to collaborate
    on software development.


    JUnit 5 allows you to use custom names for your test classes. You can use `org.junit.jupiter.api.DisplayName`
    annotation to provide a name that can contain spaces, special characters, or even
    emoji. This allows you to use more meaningful names for your test classes. In
    the next chapter, we will use `@DisplayName` annotation for our test classes.


    ```

    import org.junit.jupiter.api.DisplayName;

    import org.junit.jupiter.api.Test;

    import org.junit.jupiter.api.TestInfo;

    @DisplayName("")

    class BookShelfSpec {

    private BookShelfSpec(TestInfo testInfo) {

    System.out.println("Working on test " + testInfo.getDisplayName());

    }

    @Test

    void shelfEmptyWhenNoBookAdded() {

    // removed for brevity

    }

    }

    ```


    When you run the `BookShelfSpec` in your IDE, you will see BookShelf Specification
    as the name of the test class being executed as shown in Figure [2-1](#A429029_1_En_2_Chapter.html#Fig1).


    ![A429029_1_En_2_Fig1_HTML.jpg](A429029_1_En_2_Fig1_HTML.jpg)


    Figure 2-1.


    Test success


    # Test Method


    In previous versions of JUnit, a test method exhibited the following characteristics:


    * Should be annotated with `org.junt.Test annotation`.

    * Should have public visibility.

    * Should not take any arguments.

    * Should return void.


    In the previous section, we discussed that test methods are no longer required
    to be public in JUnit 5. A test method can be either protected or package protected.
    The preferred is to use package protected as that leads to less typing.


    Tests in JUnit 5 must be annotated with `org.junit.jupiter.api.Test` annotation.
    This is different from the annotation used in JUnit 4. JUnit 5 designers went
    with a different annotation so that they could differentiate between different
    versions of JUnit. JUnit 5 can run both JUnit 4 and JUnit 5 tests based on which
    `@Test` annotation is used.


    ## Parameters in Test Methods


    As with test class constructors, test methods can also take parameters in JUnit
    5. The code that follows is an example of a test method takes `TestInfo` as its
    parameter:


    ```

    @Test

    void shelfEmptyWhenNoBookAdded(TestInfo testInfo) {

    System.out.println("Working on test case " + testInfo.getDisplayName());

    BookShelf shelf = new BookShelf();

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty.");

    }

    ```


    The foregoing code makes use of the `ParameterResolver` API (application programming
    interface) of JUnit 5. We will learn more about it later in this book.'
