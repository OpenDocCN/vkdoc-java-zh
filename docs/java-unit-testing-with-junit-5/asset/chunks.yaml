    convention over configuration principle, and only exceptions need to be configured
    explicitly. A minimalistic Maven build file ‘pom.xml’ contains a unique project
    identifier and a list of dependencies. In the following section, we will try to
    configure a pom.xml for our bookstoread.com.


    Before we can get started we must make sure that Maven is available on our path.
    Unlike Gradle, it does not pack a wrapper script which could download and make
    it work. The latest version of Maven can be downloaded from [`http://maven.apache.org/`](http://maven.apache.org/)
    . Extract the archived artifact and append it to the PATH variable. Verify if
    it works as expected.


    ```

    $ mvn --version

    Apache Maven 3.3.1

    Maven home: /usr/share/maven

    Java version: 1.8.0_101, vendor: Oracle Corporation

