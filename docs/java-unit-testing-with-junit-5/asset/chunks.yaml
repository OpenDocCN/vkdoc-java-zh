  trans: '

    ## 依赖注入


    在过去十年中，对简化软件设计非常有用的软件设计模式之一就是依赖注入（DI）。根据维基百科的定义：


    > 依赖注入是一种技术，通过该技术，一个对象为另一个对象提供其依赖项。


    DI 是 Java 生态系统中广泛使用的模式。它由 Spring 框架在 21 世纪初推广开来。DI 的核心在于使对象的依赖关系显式化。它简化了测试，因为你可以注入桩（stub）或模拟（mock）对象作为依赖项，从而让你能够控制并独立测试组件。DI
    禁止在类内部使用 `new`（用于创建对象）或静态工厂方法。一个组件应暴露可被注入所需对象的方法或字段。DI 提供者将负责创建依赖项的实例，将其注入到所需组件中，并管理它们的生命周期。


    JUnit 5 通过其扩展机制提供了对 DI 的支持。在 JUnit 5 中，你可以将依赖项注入到测试方法或构造函数中。这与早期版本的 JUnit 相比是一个重大变化，因为早期版本要求测试方法和构造函数必须是无参的。这使得测试代码更加灵活，因为你可以在需要的地方声明依赖项。


    让我们看看如何使用 DI 来清理我们在第 3 章中编写的 `BookShelfSpec` 测试。如果你还记得，我们的 `BookShelfSpec` 在其
    `@BeforeEach init` 方法中初始化了测试数据，如下代码所示：


    ```

    public class BookShelfSpec {

    private BookShelf shelf;

    private Book effectiveJava;

    private Book codeComplete;

    private Book mythicalManMonth;

    private Book cleanCode;

    @BeforeEach

    void init() {

    shelf = new BookShelf();

    effectiveJava = new Book("Effective Java", "Joshua Bloch", LocalDate.of(2008,
    Month.MAY, 8));

    codeComplete = new Book("Code Complete", "Steve McConnel", LocalDate.of(2004,
    Month.JUNE, 9));

    mythicalManMonth = new Book("The Mythical Man-Month", "Frederick Phillips Brooks",
    LocalDate.of(1975, Month.JANUARY, 1));

    cleanCode = new Book("Clean Code", "Robert C. Martin", LocalDate.of(2008, Month.AUGUST,
    1));

    }

    // 其余代码已省略，以保持简洁

    }

    ```


    上述代码存在几个问题。


    *   测试代码与测试数据紧密耦合。如果我们想根据某些条件用不同的数据运行 `BookShelfSpec`，该怎么办？

    *   我们无法重用测试数据。大多数情况下，多个测试类需要相同的数据。一种重用测试数据的方法是创建一个工具方法，调用该方法即可获取测试数据。这种解决方案可行，但它没有明确表达程序员的意图（即注入测试数据）。


    现在，我们理解了要解决的问题，接下来学习 JUnit 5 如何帮助我们解决它。我们将从向 `init` 方法注入测试数据开始，如下代码所示：


    ```

    public class BookShelfSpec {

    private BookShelf shelf;

    private Book effectiveJava;

    private Book codeComplete;

    private Book mythicalManMonth;

    private Book cleanCode;

    @BeforeEach

    void init(Map books) {

    shelf = new BookShelf();

    this.effectiveJava = books.get("Effective Java");

    this.codeComplete = books.get("Code Complete");

    this.mythicalManMonth = books.get("The Mythical Man-Month");

    this.cleanCode = books.get("Clean Code");

    }

    }

    ```


    在上述代码中，我们将 `Map<String, Book>` 注入到了 `init` 方法中。Map 的键是书名，值是 Book 对象本身。为了尽量减少对测试的改动，我们将值赋给了不同的
    Book 实例变量。这将确保我们所有的测试照常运行。我们的测试不再关心书籍测试数据的创建；相反，它们期望测试数据被注入进来。


    DI API 允许我们在 JUnit 生命周期的所有阶段注入值。如果测试方法中存在带有 `@BeforeAll`、`@BeforeEach`、`@Test`、`@AfterEach`
    或 `@AfterAll` 注解的参数，框架将尝试确定其值并进行注入。


    但是 JUnit 5 将如何把测试数据注入到我们的 `init` 方法中呢？


    JUnit 5 引入了 `ParameterResolver` 的概念，它提供了一个在运行时解析参数的 API。你可以使用内置的参数解析器，例如 `TestInfoParameterResolver`，或者通过实现
    `ParameterResolver` 接口来提供你自己的解析器。`ParameterResolver` 是 JUnit 5 扩展机制的一部分，我们将在第
    8 章中介绍。为了让你的测试识别自定义解析器，你应该使用 `ExtendWith` 注解来标注测试类，并为其提供解析器类，如下代码所示：


    ```

    @DisplayName("一个书架")

    @ExtendWith(BooksParameterResolver.class)

    public class BookShelfSpec {

    private BookShelf shelf;

    private Book effectiveJava;

    private Book codeComplete;

    private Book mythicalManMonth;

    private Book cleanCode;

    @BeforeEach

    void init(Map books) {

    shelf = new BookShelf();

    this.effectiveJava = books.get("Effective Java");

    this.codeComplete = books.get("Code Complete");

    this.mythicalManMonth = books.get("The Mythical Man-Month");

    this.cleanCode = books.get("Clean Code");

    }

    // 其余代码已省略，以保持简洁

    }

    ```


    让我们看看实现 `BooksParameterResolver` 类需要做些什么。


    ```

    import org.junit.jupiter.api.extension.ExtensionContext;

    import org.junit.jupiter.api.extension.ParameterContext;

    import org.junit.jupiter.api.extension.ParameterResolutionException;

    import org.junit.jupiter.api.extension.ParameterResolver;

    class BooksParameterResolver implements ParameterResolver {

    @Override

    public boolean supportsParameter(final ParameterContext parameterContext, final
    ExtensionContext extensionContext) throws ParameterResolutionException {

    return false;

    }

    @Override

    public Object resolveParameter(final ParameterContext parameterContext, final
    ExtensionContext extensionContext) throws ParameterResolutionException {

    return null;

    }

    }

    ```


    一个类需要实现 `ParameterResolver` 接口，才能被考虑用于参数解析。`ParameterResolver` 接口有两个方法，你的自定义实现必须实现它们。


    *   `supportsParameter` 方法验证该实现是否能为所请求的参数提供解析。`BooksParameterResolver` 需要验证它是否支持
    `Map<String, Book>` 类型的对象。

    *   `resolveParameter` 方法返回所请求参数的值。`BooksParameterResolver` 返回一个包含书籍的 Map。


    让我们以下面的方式查看 `BooksParameterResolver` 的完整实现：

    '
- fmt: '```java

    import org.junit.jupiter.api.extension.ExtensionContext;

    import org.junit.jupiter.api.extension.ParameterContext;

    import org.junit.jupiter.api.extension.ParameterResolutionException;

    import org.junit.jupiter.api.extension.ParameterResolver;

    import java.lang.reflect.Parameter;

    import java.time.LocalDate;

    import java.time.Month;

    import java.util.HashMap;

    import java.util.Map;

    import java.util.Objects;

    class BooksParameterResolver implements ParameterResolver {

    @Override

    public boolean supportsParameter(final ParameterContext parameterContext, final
    ExtensionContext extensionContext) throws ParameterResolutionException {

    Parameter parameter = parameterContext.getParameter();

    return Objects.equals(parameter.getParameterizedType().getTypeName(), "java.util.Map");

    }

    @Override

    public Object resolveParameter(final ParameterContext parameterContext, final
    ExtensionContext extensionContext) throws ParameterResolutionException {

    Map books = new HashMap();

    books.put("Effective Java", new Book("Effective Java", "Joshua Bloch", LocalDate.of(2008,
    Month.MAY, 8)));

    books.put("Code Complete", new Book("Code Complete", "Steve McConnel", LocalDate.of(2004,
    Month.JUNE, 9)));

    books.put("The Mythical Man-Month", new Book("The Mythical Man-Month", "Frederick
    Phillips Brooks", LocalDate.of(1975, Month.JANUARY, 1)));

    books.put("Clean Code", new Book("Clean Code", "Robert C. Martin", LocalDate.of(2008,
    Month.AUGUST, 1)));

    books.put("Refactoring: Improving the Design of Existing Code", new Book("Refactoring:
    Improving the Design of Existing Code", "Martin Fowler", LocalDate.of(2002, Month.MARCH,
    9)));

    return books;

    }

    }

    ```


    In the foregoing code:


    - We implemented the `supportsParameter` method that checked whether the parameterized
    type of the parameter has the type of `java.util.Map<java.lang.String, bookstoread.Book>`.
    You must perform String check as that’s the only way you can check for the parameterized
    type. `ParameterContext` makes use of the Java 8 Parameter API. Prior to JDK 8
    there was no way to query information about method parameters.

    - Next, we implemented the `resolveParameter` method, which returned a `Map` containing
    the test data.


    Now, if you run `BookShelfSpec` all tests should be green as shown in Figure [4-1](#A429029_1_En_4_Chapter.html#Fig1).


    ![A429029_1_En_4_Fig1_HTML.jpg](A429029_1_En_4_Fig1_HTML.jpg)


    Figure 4-1. Test execution after injecting test data


    Let’s implement one more feature that we will use in next sections of this chapter.


    ## Feature: Track Bookshelf Progress


    As a user, I want to track the progress of my bookshelf based on the books I have
    read.


    The feature is all about building a progress metric for a bookshelf. Users of
    `bookstoread` will keep on reading books and mark their progress. Consequently,
    we need to show them a progress indicator of how much they have accomplished.
    The complete metric consists of three items:


    - **To-Do**: Indicating the percentage of books (of total books on shelf) a user
    has not read or started reading

    - **Completed**: Indicating the percentage of books (of total books on shelf)
    a user has finished reading

    - **In Progress**: Indicating the percentage of books (of total books on shelf)
    a user has read to some extent.


    Let’s say we have a bookshelf with the following four books:


    - Effective Java

    - Code Complete

    - Clean Code

    - The Mythical Man-Month


    We have finished Clean Code and are in process of reading Effective Java. In such
    a case the complete metric should state 25% Completed, 25% In-Progress, and 50%
    To-Do.


    Let’s start building the feature by adding a test case for it. We would add a
    new Spec as shown in the following code:


    ```java

    @DisplayName("A bookshelf progress")

    public class BookShelfProgressSpec {

    private BookShelf shelf;

    private Book effectiveJava;

    private Book codeComplete;

    private Book mythicalManMonth;

    private Book cleanCode;

    private Book refactoring;

    @BeforeEach

    void init() {

    shelf = new BookShelf();

    effectiveJava = new Book("Effective Java", "Joshua Bloch", LocalDate.of(2008,
    Month.MAY, 8));

    // removed for brevity

    }

    @Test

    @DisplayName("is 0% completed and 100% to-read when no book is read yet")

    void progress100PercentUnread() {

