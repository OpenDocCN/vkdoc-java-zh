    ## JUnit 生命周期 API


    一个典型的 JUnit 测试类包含多个测试用例。每个测试用例都由一个测试生命周期管理。完整的生命周期包括以下三个阶段：


    1.  首先是设置阶段，在此阶段建立测试基础设施。JUnit 提供了两个级别的设置。一个是类级别，可以创建像数据库连接这样代价高昂的对象，这些对象可以在所有测试中重用而不会产生副作用。影响测试运行的测试对象需要在各个测试的设置方法中创建。

    2.  接下来是测试执行本身。结果验证也是测试执行阶段的一部分。执行结果将表示成功或失败。

    3.  最后一个阶段是清理阶段，在此阶段执行测试后所需的任何清理工作。就像类级别的设置一样，也有类级别的清理，可用于销毁在类级别创建的所有单例对象。


    JUnit API 提供了用于执行测试用例设置和清理的注解（见图 2-6）。


    ![A429029_1_En_2_Fig6_HTML.gif](img/A429029_1_En_2_Fig6_HTML.gif)


    图 2-6.


    测试生命周期


    ### @BeforeAll


    `org.junit.jupiter.api.BeforeAll` 注解负责为类中的所有测试用例执行一次性初始化。该方法必须是静态的且非私有的。它通常用于创建像数据库连接这样代价高昂的对象，这些对象可以在所有测试用例中重用。在
    `BeforeAll` 中完成的工作可以移到 `BeforeEach` 中，但由于这通常是计算开销很大的操作，因此整体测试执行时间可能会大大延长。


    该注解还具有继承行为。如果超类方法标记了 `@BeforeAll`，它们将在测试类的任何此类方法之前执行。'
- fmt: "### `@BeforeEach`\n\n`org.junit.jupiter.api.BeforeEach`注解负责在执行单个测试之前执行任何初始化。对象将为每个测试创建，从而消除了其他测试执行带来的副作用。\n\
    \n保持测试独立是一个好习惯。如果测试相互依赖，那么整个测试套件将变得难以阅读和理解。此外，在测试失败时，调试也会变得非常困难。想象一个场景：`testA`依赖于`testB`，而`testB`又依赖于`testC`。如果`testA`失败，我们需要花费精力来确定之前的所有测试用例是否都正确执行并正确初始化了测试环境。这是一种不受欢迎的测试坏味道（Test\
    \ Smell）。\n\n一个测试用例可以有任意数量的方法标记为`@BeforeEach`，但执行顺序无法保证。JUnit引擎可以按任意顺序运行它们。这些方法在每个测试之前都会执行；因此，请始终确保它们包含对所有测试用例都有意义的初始化代码。\n\
    \n该注解还具有继承行为。如果超类方法或接口默认方法标记了`@BeforeEach`，它们将在测试类的任何此类方法之前执行。\n\n### `@AfterEach`\n\
    \n`org.junit.jupiter.api.AfterEach`注解是`org.junit.jupiter.api.BeforeEach`注解的对应物。它用于实现“有始有终”的原则。标记了`@AfterEach`的方法负责测试执行后的清理工作。该方法必须是静态且非私有的。该注解也具有继承行为。如果超类方法或接口默认方法标记了`@AfterEach`，它们将在测试类的任何此类方法之后执行。\n\
    \n### `@AfterAll`\n\n`org.junit.jupiter.api.AfterAll`注解是`org.junit.jupiter.api.BeforeAll`注解的对应物。`@AfterAll`执行一次方法调用（即在测试类的所有测试用例执行完毕之后）。该方法必须是静态且非私有的。该注解也具有继承行为。如果超类方法标记了`@AfterAll`，它们将在测试类的任何此类方法之后执行。\n\
    \n在我们当前的用户故事中，我们只使用了`@BeforeEach`，但假设明天我们构建了一个由数据库支持的`BookShelf`。那么我们可以按以下方式使用所有这些注解：\n\
    \n```java\nclass BookShelfSpec {\n    @BeforeAll\n    static void connectDBConnectionPool()\
    \ {\n    }\n    @BeforeEach\n    void initializeBookShelfWithDatabase() {\n  \
    \  }\n    @Test\n    void shouldGiveBackAllBooksInShelf() {\n        // Check\
    \ books in shelf\n    }\n    @AfterEach\n    void deleteShelfFromDB() {\n    }\n\
    \    @AfterAll\n    static void closeDBConnectionPool() {\n    }\n}\n```\n\n可选地，我们可以将`@BeforeAll`和`@AfterAll`方法提取到一个超类中。如果数据库在更多测试用例中使用，这将清理重复代码。\n\
    \n```java\nabstract class DBConnectionPool {\n    @BeforeAll\n    static void\
    \ connectDBConnectionPool() {\n    }\n    @AfterAll\n    static void closeDBConnectionPool()\
    \ {\n    }\n}\n\nclass BookShelfSpec extends DBConnectionPool {\n    @BeforeEach\n\
    \    void initializeShelfWithDatabase() {\n    }\n    @Test\n    void shouldGiveBackAllBooksInShelf()\
    \ {\n        // Check books in shelf\n    }\n    @AfterEach\n    void deleteCartFromDB()\
    \ {\n    }\n}\n```\n\nJUnit测试执行引擎会为每个测试方法构建一个测试类的实例。这有助于保持测试执行的独立性，并消除一个测试对其他测试的影响。这种“每个测试一个实例”的行为强制要求`@BeforeAll`和`@AfterAll`方法必须是静态的。可以将“每个测试一个实例”的行为更改为所有测试共享一个实例。为此，需要使用`@TestListener(Lifecycle.PER_CLASS)`注解该类。这样，JUnit测试执行将创建一个单一实例。它将不再要求`@BeforeAll`/`@AfterAll`方法是静态的。在这种情况下，一个测试的执行可能会影响其他测试的执行，因为测试用例状态在所有测试之间共享。因此，任何此类变量都必须在`@BeforeEach`/`@AfterEach`方法中显式清除。\n\
    \n## 测试执行\n\n在本节中，我们将学习如何发现和执行测试。JUnit 5 分为多个模块，我们在第[1](#A429029_1_En_1_Chapter.html)章中讨论过。其中两个有助于我们理解测试发现和执行过程的模块是`junit-platform-launcher`和`junit-platform-engine`。`junit-platform-launcher`定义了IDE等工具用于发现和执行测试的API。`junit-platform-engine`提供了一个API，我们可以用它来编写自己的测试引擎。我们一直使用的测试引擎是`junit-jupiter-engine`。让我们看看运行测试用例时在幕后执行的所有步骤。\n\
    \n1.  一切从创建`org.junit.platform.launcher.Launcher`的实例开始。`Launcher` API是IDE等工具用于发现和执行测试的入口点。测试执行并不在启动器（launcher）中发生。启动器检测支持的测试引擎，而引擎负责执行测试。JUnit\
    \ 5 提供了`Launcher`的默认实现`org.junit.platform.launcher.core.DefaultLauncher`，你可以使用`org.junit.platform.launcher.core.LauncherFactory`创建它。`DefaultLauncher`是包级私有的，因此你不能直接创建它的实例。你必须使用`LauncherFactory`来创建实例。你可以通过实现`Launcher`\
    \ API来编写自己的启动器，但大多数情况下不需要这样做。\n2.  要使用`Launcher` API，你必须将其添加到类路径中。在你的构建文件中，将以下内容添加到依赖项部分。\n\
    \n```\n    testCompile 'org.junit.platform:junit-platform-launcher:1.0.1'\n```\n\
    \n3.  添加依赖项后，你可以按照以下代码所示创建`Launcher`的新实例：\n\n```java\n    import org.junit.platform.launcher.Launcher;\n\
    \    import org.junit.platform.launcher.core.LauncherFactory;\n\n    public class\
    \ TestLauncher {\n        public static void main(String[] args) {\n         \
    \   Launcher launcher = LauncherFactory.create();\n        }\n    }\n```\n\n4.\
    \  `LauncherFactory.create`方法创建`DefaultLauncher`的实例。`DefaultLauncher`的构造函数接受一个`TestEngine`的`Iterable`。如前所述，JUnit\
    \ 支持`TestEngine` API，该API定义在`junit-platform-engine`模块中。目前有两个`TestEngine`实现，分别定义在`junit-jupiter-engine`（用于JUnit\
    \ 5）和`junit-vintage-engine`（用于JUnit 4及更低版本）中。为了发现`TestEngine`的实现，JUnit 5 依赖于JDK的`java.util.ServiceLoader`机制。JDK\
    \ 6 引入了`ServiceLoader`的概念，允许开发者通过向应用程序类路径添加新的JAR来扩展其代码功能。在Service Loader模式中，所有实现都通过`META-INF/services`目录下的一个文件来发现。如果你查看`junit-jupiter-engine`模块内部，你会发现`META-INF/services`目录下有一个名为`org.junit.platform.engine.TestEngine`的文件。它包含一个条目，即`org.junit.platform.engine.TestEngine`的实现。\n\
    \n```\n    org.junit.jupiter.engine.JupiterTestEngine\n```\n\n5.  JUnit 5 执行以下代码来发现类路径上所有可用的`TestEngine`：\n\
    \n```java\n    Iterable testEngines = ServiceLoader.load(TestEngine.class, ReflectionUtils.getDefaultClassLoader());\n\
    ```\n\n6.  一旦发现了测试引擎，就会通过调用`Launcher`上的`registerTestExecutionListeners`方法向启动器注册监听器。监听器的类型是`org.junit.platform.launcher.TestExecutionListener`。JUnit\
    \ 5 自身提供了几个实现。我们将注册JUnit 5提供的`TestExecutionListener`：`org.junit.platform.launcher.listeners.SummaryGeneratingListener`。`SummaryGeneratingListener`生成测试执行的摘要。让我们修改我们的`TestLauncher`来注册一个监听器，如下所示：\n\
    \n```java\n    // 代码示例\n```"
  raw: "### @BeforeEach\n\nThe `org.junit.jupiter.api.` `BeforeEach` annotation is\
    \ responsible for performing any initialization before executing a single test.\
    \ The objects will be created for each test, thus doing away with any side effects\
    \ from other test executions.\n\nIt is a good idea to keep tests independent.\
    \ If tests are dependent then a complete test suite becomes very hard to read\
    \ and understand. Also in the event of a failure tests become very hard to debug.\
    \ Imagine a case of testA dependent on testB that depends on testC. Now if testA\
    \ fails we need to expend effort to determine if all of the previous test cases\
    \ executed fine and properly initialized the test setup. This is unwanted Test\
    \ Smell.\n\nA test case can have any number of methods marked with `BeforeEach`\
    \ but the execution order is not guaranteed. The JUnit engine can run them in\
    \ any order. These methods are executed before each and every test; so always\
    \ make sure they contain initialization code that makes sense for all test cases.\n\
    \nThe annotation also has an inherited behavior. If there are superclass methods\
    \ or interface default methods marked with `@BeforeEach`, they will be executed\
    \ before any such methods of the test class.\n\n### @AfterEach\n\nThe `org.junit.jupiter.api.AfterEach`\
    \ annotation is the counterpart of the `org.junit.jupiter.api.BeforeEach` annotation.\
    \ It is used to implement the “what goes up must come down” principle. A method\
    \ marked with `@AfterEach` is responsible for posttest execution cleanup. The\
    \ method must be static and non-private. The annotation also has an inherited\
    \ behavior. If there are superclass methods or interface default methods marked\
    \ with `@AfterEach`, they will be executed after any such methods of the test\
    \ class.\n\n### @AfterAll\n\nThe `org.junit.jupiter.api.AfterAll` annotation is\
    \ the counterpart of the `org.junit.jupiter.api.` `BeforeAll` annotation. `AfterAll`\
    \ performs a single time method invocation (i.e., post the execution of all test\
    \ cases of a test class). The method must be static and non-private. The annotation\
    \ also has an inherited behavior. If there are superclass methods marked with\
    \ `@AfterAll` they will be executed after any such methods of the test class.\n\
    \nIn our current user story, we have used only `@BeforeEach` but let’s say tomorrow\
    \ we build a BookShelf backed by a database. Then we could use all these annotations\
    \ in the following manner:\n\n```\nclass BookShelf Spec {\n@BeforeAll\nstatic\
    \ void connectDBConnectionPool() {\n}\n@BeforeEach\nvoid initializeBookShelf WithDatabase()\
    \ {\n}\n@Test\nvoid shouldGiveBackAllBooksInShelf() {\n// Check books in shelf\n\
    }\n@AfterEach\nvoid deleteShelfFromDB() {\n}\n@AfterAll\nstatic void closeDBConnectionPool()\
    \ {\n}\n}\n```\n\nOptionally, we could extract out the `@BeforeAll` and `@AfterAll`\
    \ methods to a superclass. This would clean up the duplicate code if the database\
    \ is being used in more test cases.\n\n```\nabstract class DBConnectionPool{\n\
    @BeforeAll\nstatic void connectDBConnectionPool() {\n}\n@AfterAll\nstatic void\
    \ closeDBConnectionPool() {\n}\n}\nclass BookShelf Spec extends DBConnectionPool{\n\
    @BeforeEach\nvoid initializeShelfWithDatabase() {\n}\n@Test\nvoid shouldGiveBackAllBooksInShelf()\
    \ {\n// Check books in shelf\n}\n@AfterEach\nvoid deleteCartFromDB() {\n}\n}\n\
    ```\n\nThe JUnit test execution engine builds an instance of the test class for\
    \ each test method. This helps to keep test execution independent and removes\
    \ the impact of one test on other tests. This per-test instance behavior enforces\
    \ to build static methods for @BeforeAll and @AfterAll. The per-test instance\
    \ can be changed to single instance for all tests. In order to do so annotate\
    \ the class with @TestListener(Lifecycle.PER_CLASS). As a result the JUnit test\
    \ execution will create a single instance. It will no longer ask to make @BeforeAll/@afterAll\
    \ methods static. In such a scenario one test execution can influence other test\
    \ executions, as testcase state is shared across all tests. Thus, any such variables\
    \ must be cleared explicitly in @BeforeEach/@AfterEach methods.\n\n## Test Execution\n\
    \nIn this section , we will learn how tests are discovered and executed. JUnit\
    \ 5 is divided into various modules that we discussed in Chapter [1](#A429029_1_En_1_Chapter.html).\
    \ Two of the modules that will help us understand how test discovery and execution\
    \ happens are `junit-platform-launcher` and `junit-platform-engine. junit-platform-launcher`\
    \ defines the API that is used by tools like IDE to discover and execute tests.\
    \ `junit-platform-engine` provides an API that we can use to write our own test\
    \ engine. The test engine that we have been using so far is `junit-jupiter-engine`.\
    \ Let’s look at all the steps that are executed behind the scenes to run your\
    \ test cases.\n\n1.  It all starts by creating an instance of `org.junit.platform.launcher.Launcher`.\
    \ Launcher API is the entry point that tools like IDE use to discover and execute\
    \ tests. Test execution does not happen in launcher. A launcher detects supported\
    \ test engines and engines do the execution of tests. JUnit 5 provides a default\
    \ implementation of Launcher `org.junit.platform.launcher.core.DefaultLauncher`\
    \ that you can create using the `org.junit.platform.launcher.core.LauncherFactory`.\
    \ DefaultLauncher is package protected so you can’t create its instance directly.\
    \ You have to use LauncherFactory to create an instance. You can write your own\
    \ Launcher by implementing Launcher API, but most of the time it will not be required.\
    \  \n2.  To use Launcher API, you have to add it to your class path. In your build\
    \ file, add the following to the dependencies section.\n\n```\n    testCompile\
    \ 'org.junit.platform:junit-platform-launcher: 1.0.1'\n    ```\n\n3.  Once you\
    \ have added the dependency, you can create a new instance of Launcher as shown\
    \ in the following code:\n\n```\n    import org.junit.platform.launcher.Launcher;\n\
    \    import org.junit.platform.launcher.core.LauncherFactory;\n    public class\
    \ TestLauncher {\n    public static void main(String[] args) {\n    Launcher launcher\
    \ = LauncherFactory.create();\n    }\n    }\n    ```\n\n4.  The `LauncherFactory.create`\
    \ method creates an instance of DefaultLauncher. The DefaultLauncher constructor\
    \ takes an Iterable of TestEngine. As discussed before, JUnit supports a TestEngine\
    \ API, which is defined in module `junit-platform-engine`. There are currently\
    \ two TestEngine implementations defined in `junit-jupiter-engine` (for JUnit\
    \ 5) and `junit-vintage-engine` (for JUnit 4 and below). To discover the TestEngine\
    \ implementations, JUnit 5 relies on JDK java.util.ServiceLoader facility. JDK\
    \ 6 introduced the concept of ServiceLoader that allowed developers to extend\
    \ their code with new functionality by adding a new JAR onto the application class\
    \ path. In the Service Loader pattern, all implementations are discovered using\
    \ a file in the META-INF/services directory. If you look inside the `junit-jupiter-engine`\
    \ module, you will find that there is a file named `org.junit.platform.engine.TestEngine`\
    \ inside the META-INF/services directory. It contains one entry, the implementation\
    \ of `org.junit.platform.engine.TestEngine`.\n\n```\n    org.junit.jupiter.engine.JupiterTestEngine\n\
    \    ```\n\n5.  The code that follows is executed by JUnit 5 to discover all the\
    \ TestEngine’s present on the class path:\n\n```\n    Iterable testEngines = ServiceLoader.load(TestEngine.class,ReflectionUtils.getDefaultClassLoader());\n\
    \    ```\n\n6.  Once the test engines are discovered, listeners are registered\
    \ with the Launcher by calling the `registerTestExecutionListeners` method on\
    \ them. The type of listener is `org.junit.platform.launcher.TestExecutionListener`.\
    \ There are few implementations provided by JUnit 5 itself. We will register the\
    \ JUnit 5 provided `TestExecutionListener org.junit.platform.launcher.listeners.SummaryGeneratingListener.\
    \ SummaryGeneratingListener` generates the summary of test execution. Let’s modify\
    \ our TestLauncher to register a listener as shown in the code that follows:"
