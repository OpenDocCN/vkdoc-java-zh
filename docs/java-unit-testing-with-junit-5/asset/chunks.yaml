    过滤器使我们能够基于 JUnit 5 引擎、包、标签或类名来选择测试。以下块将过滤并执行 `Filters` 标签下的测试（见第 4 章）。


    ```

    junitPlatform{

    filters{

    includeClassNamePattern ''.*Spec''

    tags {

    include ''Filter''

    }

    }

    }

    ```


    JUnit 5 Gradle 平台插件禁用了标准的 Gradle 任务。可以通过 `junitPlatform` 块下的 `enableStandardTestTask`
    选项来改变此行为。将其设置为 `true` 以启用标准任务运行。

