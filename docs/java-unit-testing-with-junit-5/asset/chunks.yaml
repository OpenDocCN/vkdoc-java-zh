    ## 异常处理扩展


    如第 4 章所述，JUnit 5 通过其扩展 API 提供了可扩展性。我们将在第 7 章详细讨论扩展 API。JUnit 5 通过扩展 API 为开发者提供了扩展点。当测试结果出现异常时，会调用
    `TestExecutionExceptionHandler` 扩展接口。假设我们有一个用例，需要记录测试用例抛出的所有异常。我们可以编写 `LoggingTestExecutionExceptionHandler`，如下列代码所示：


    ```

    import org.junit.jupiter.api.extension.TestExecutionExceptionHandler;

    import org.junit.jupiter.api.extension. ExtensionContext;

    import java.util.logging.Level;

    import java.util.logging.Logger;

    public class LoggingTestExecutionExceptionHandler implements TestExecutionExceptionHandler
    {

    private Logger logger = Logger.getLogger(LoggingTestExecutionExceptionHandler.class.getName());

    @Override

    public void handleTestExecutionException(ExtensionContext context, Throwable throwable)
    throws Throwable {

    logger.log(Level.INFO, "Exception thrown ", throwable);

    throw throwable;

    }

    }

    ```


