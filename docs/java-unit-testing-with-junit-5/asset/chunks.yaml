    测试失败的原因是测试套件中的一个测试用例更改了测试数据的状态。该测试期望一份干净的测试数据副本，因此失败了。


    链式反模式：这种反模式指的是一组单元测试必须以特定顺序或作为一组进行处理。每个执行的测试为下一个测试完成一些工作，因此它们相互依赖。


    ### 使用ExtensionContext Store


    到目前为止，在我们的测试用例中，我们在`@BeforeEach init`方法中注入了测试数据，然后将不同的书籍存储在实例变量中。如果我们想在`init`和`test`方法中都注入相同的测试数据，这样就不必将其存储在测试类实例变量中，该怎么办？我们目前看到的两种方法都不能解决这个用例。


    *   为每次调用创建测试数据将传递一份新的测试数据副本。

    *   为测试类中的所有测试缓存测试数据，当另一个测试更改测试数据状态时会失败。


    为了寻找可能的解决方案，让我们深入研究JUnit API的细节。`resolve`方法接受两个参数。


    *   `ParameterContext`：包含所请求参数的详细信息。

    *   `ExtensionContext`：包含当前测试的上下文。每次测试执行都会创建自己的`ExtensionContext`。上下文包含测试方法、ID等详细信息。


    除了测试特定的详细信息外，上下文还提供`ExtensionContext.Store`，可用于保存特定上下文执行的数据。


    *   `Store getStore()`

    *   `Store getStore(Namespace namespace)`


    `Store`是一个键值持有者，提供`get`和`put`方法。每个`Store`实例由命名空间唯一标识，可用于创建新的存储。在每个测试的`ExtensionContext`中，有一个默认命名空间可用，但建议创建自定义命名空间以唯一标识数据并避免任何数据损坏问题。现在修改`BooksParameterResolver`，使用`ExtensionContext.Store`作为自定义的Books命名空间，并从那里提供书籍数组。


    ```

    class BooksParameterResolver implements ParameterResolver {

    @Override

    public Object resolveParameter(final ParameterContext parameterContext, final
    ExtensionContext extensionContext) throws ParameterResolutionException {

    ExtensionContext.Store store = extensionContext.getStore(ExtensionContext.Namespace.create(Book.class));

    return store.getOrComputeIfAbsent("books", k -> getBooks());

    }

    // 为简洁起见，其余部分已删除

    }

    ```


