    Table 1-1.


    Cost to Fix Bugs


    | Software Testing Phase Where Bug Found | Estimate Cost per Bug |

    | --- | --- |

    | System Test | $5,000 |

    | Integration Test | $500 |

    | Full Build | $50 |

    | Unit Test/Test-Driven Development | $5 |


    Some people may not see value in writing tests. They prefer to test the code manually
    or to use log statements to debug code when things go wrong. The act of testing
    manually is cumbersome and time-consuming. Besides this, it is difficult to manually
    cover all the corner cases of any nontrivial software. Humans are usually good
    at checking the happy paths (i.e., scenarios which always work). So, there is
    a great possibility that manual testing will miss some corner cases.


    If the system is written following TDD , then any time you discover a bug, the
    team will add an additional test case that reproduces the error. Now, you will
    be able to make changes to the production code to pass the failing test case.
    This will ensure that the corner case is handled. Also, as this corner case is
