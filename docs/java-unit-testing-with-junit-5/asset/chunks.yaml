  trans: "\n#### Ant 扩展\n\n现在让我们尝试使用 Ant 配置 `jacoco`。与之前的配置类似，这里我们也将分两步确定代码覆盖率。`JaCoCo\
    \ 工具` 提供了一个 Ant 任务，可以通过执行单元测试用例或任何其他 Java 程序来确定代码覆盖率。由于我们使用控制台运行器执行 JUnit5 测试用例，我们将通过配置一个\
    \ Java 可执行程序来确定覆盖率。\n\n在开始配置 `jacoco` 之前，让我们先查看 `consoleRunner` 脚本，找到完整的 Java\
    \ 命令。该命令执行 `org.junit.platform.console.ConsoleLauncher` 类，其类路径中包含所有测试类。现在我们需要在构建脚本中配置相同的命令。该类是\
    \ junit-platform-console 依赖 jar 的一部分。\n\n对 `ivy.xml` 进行以下更改，以确保我们下载 junit-platform-console\
    \ 的 jar 包（而非发行版 zip 包）以及所需的 `jacoco` jar 包：\n\n```\n// 为简洁起见，省略了其余部分\n```\n\n\
    现在我们需要使用 Java 主类配置 `jacoco` 任务。以下 `build.xml` 配置确保我们实现相同的目标：\n\n```\n\n// 为简洁起见，省略了其余部分\n\
    \n```\n\n运行 Ant 构建以获取 HTML 格式的覆盖率报告。\n\n## 其他工具\n\n到目前为止，我们一直使用 IntelliJ 开发所有代码，该\
    \ IDE 对 JUnit 5 功能的支持正在不断改进。我们已经成功地将 JUnit 5 与 Gradle、Maven 和 Ant 集成。但 Java 生态系统包含大量工具。有许多\
    \ IDE（Eclipse、STS、IntelliJ、NetBeans 等）。那么，如果我们选择的工具尚不支持 JUnit 5，该怎么办？假设我们偏好的 IDE\
    \ 是 Eclipse；那我们该怎么做？\n\nJUnit 5 提供了一个基于 JUnit 4 Runner API 的 `PlatformRunner`。该运行器能够在所有支持\
    \ JUnit 4 的平台上执行测试。JUnit 5 测试用例必须使用 `@RunWith` 注解，并将 `PlatformRunner` 作为参数传入。因此，如果我们想在\
    \ Eclipse Neon 或更早版本中开发代码，可以执行以下操作：\n\n1.  将 JUnit 4 的依赖添加到我们的 `pom.xml` 或 `build.gradle`\
    \ 中\n\n    ```\n    testCompile 'junit:junit:4.12'\n    ```\n\n2.  添加 junit-platform-runner\
    \ 的依赖\n\n    ```\n    testCompile 'org.junit.platform:junit-platform-runner:1.0.1'\n\
    \    ```\n\n3.  将项目作为 Gradle 项目（或 Maven 项目）导入 Eclipse（见图 6-5）\n\n    ![A429029_1_En_6_Fig5_HTML.jpg](img/A429029_1_En_6_Fig5_HTML.jpg)\n\
    \n    图 6-5.\n    Eclipse 导入对话框  \n4.  每个测试类都需要使用 `@RunWith` 进行注解\n\n    ```\n\
    \    @RunWith(JUnitPlatform.class)\n    @DisplayName(\"一个书架\")\n    public class\
    \ BookShelfSpec {\n    private BookShelf shelf;\n    // 为简洁起见，省略了其余部分\n    }\n\
    \    ```\n\n5.  现在执行我们的测试用例\n\n    ![A429029_1_En_6_Fig6_HTML.jpg](img/A429029_1_En_6_Fig6_HTML.jpg)\n\
    \n    图 6-6.\n    Eclipse JUnit 5 报告  \n\nEclipse 团队正在开发一个 Oxygen 版本，该版本将包含对 JUnit\
    \ 5 的支持。在撰写本章时，Eclipse 团队已添加了 JUnit 5 支持 [ [`https://bugs.eclipse.org/bugs/show_bug.cgi?id=488566#c4`](https://bugs.eclipse.org/bugs/show_bug.cgi?id=488566#c4)\
    \ ]，但尚未发布。\n\n## 总结\n\n在本章中，我们探讨了如何根据我们选择的工具配置 JUnit 5。我们为 booktoread.com 添加了基于\
    \ Gradle、Maven 和 Ant 的配置。然后，我们使用 `jacoco` 配合这些工具生成了代码覆盖率指标。最后，我们研究了那些不支持 JUnit\
    \ 5 的工具，并以向后兼容模式配置了 JUnit 5。\n\n在第 7 章中，我们将讨论 JUnit 5 扩展模型以及从 JUnit 4 迁移到新版本的相关内容。\n\
    \n# 7. JUnit 5 扩展模型\n\nJUnit 的核心原则之一是优先考虑扩展点而非功能。这意味着 JUnit 团队希望提供一种可扩展的机制，供开发者根据自身需求使用，而不是将所有功能都塞进\
    \ JUnit 核心。这一理念在 JUnit 的早期版本中就已存在。在 JUnit 4 中，团队添加了对 Rule API（应用程序编程接口）的支持，以提供诸如创建临时目录和文件、异常验证等功能。这些功能本可以轻松地添加到\
    \ JUnit 核心中，而无需提供扩展机制。相反，JUnit 团队决定构建 Runner 和 Rule API，从而提供一种扩展 JUnit 的机制。这不仅使\
    \ JUnit 能够干净地构建这些功能，还使第三方开发者能够使用该 API 实现自己的功能。其中一个例子是 `MockitoRule`，它允许你将模拟对象注入到测试中。\n\
    \n## JUnit 4 扩展模型\n\n在学习 JUnit 5 的新扩展 API 之前，我们先讨论一下 JUnit 4 的可扩展性方法。这将有助于我们理解为什么\
    \ JUnit 5 团队决定设计和构建一种新的可扩展性机制。如前所述，扩展对 JUnit 来说并不新鲜。JUnit 4 提供了两种扩展机制：Runner API\
    \ 和 Rule API。\n\n1.  Runner API 被添加到 JUnit 4 中，以提供编写自定义运行器的能力。运行器管理测试的完整生命周期——测试类的实例化、调用\
    \ setup 和 tear-down 方法、执行测试用例、通过 `RunNotifier` 通知测试进度。JUnit 4 提供了一个默认使用的实现 `JUnit4`。任何人都可以通过扩展\
    \ `Runner` 类来编写自己的自定义运行器。要告诉 JUnit 使用自定义运行器，可以使用 `@RunWith` 注解并指定自定义运行器，如下面的代码片段所示：\n\
    \n    ```\n    import org.junit.runner.RunWith;\n    @RunWith(MyCustomRunner.class)\n\
    \    public class MyTest {\n    }\n    ```\n\n    Runner API 的两个主要缺点是：\n    1.\
    \  即使开发者只想为特定生命周期阶段提供扩展，也必须实现完整的生命周期。这使得它在大多数用例中变得复杂且重量级。  \n    2.  每个测试用例只能使用一个运行器类。这使得它们无法组合。例如，你不能在同一个测试类中同时使用\
    \ Parameterized 和 Mockito 运行器。   \n2.  Rule API 在 JUnit 4.7 中引入，提供了一种轻量级的 JUnit\
    \ 扩展机制。要使用规则，你需要创建一个规则的公共实例变量，并使用 `@Rule` 注解对其进行注解。Rule API 通过将测试方法包装到一个语句中来工作。该语句将首先运行任何\
    \ `@Before` 方法，然后运行 `@Test` 方法，最后运行任何 `@After` 方法。Rule API 克服了 Runner API 的局限性，但其能力也有限。Rule\
    \ API 的主要缺点是：\n    1.  Rule API 无法控制测试的完整生命周期，因此不能用于所有用例。它们仅适用于需要在测试用例执行前后执行某些操作的场景。\
    \  \n    2.  你必须为方法级别和类级别的回调创建单独的规则。\n"
- fmt: '# JUnit 5 Extension Model


    The extension API is part of JUnit Jupiter engine. Considering the limitations
    of extension approaches in JUnit 4, the JUnit 5 team decided to build one unified
    extension API that gives the power to hook into different stages of the test life
    cycle. This means that when a certain life cycle phase is reached, the Jupiter
    engine will call all the registered extensions for that phase. There are five
    main extension points that you can hook into.


    1. Test life cycle callbacks

    2. Test instance post-processing

    3. Conditional test execution

    4. Parameter resolution

    5. Exception handling


    Let’s go through each of them in detail.


    Each of the extensions covered in the subsequent sections implements interfaces
    corresponding to JUnit extension points. All the extension point interfaces extend
    a marked interface call `Extension`.


    Another interface that you will have to interact with is `ExtensionContext`. It
    is used to encapsulate the context in which the test or test container is executed.
    This abstraction allows extensions to access information regarding the running
    test and to interact with the Jupiter engine. Let’s look at the main methods of
    the interface to understand more about it.


    ```

    public interface ExtensionContext {

    Optional getParent();

    String getUniqueId();

    String getDisplayName();

    Set getTags();

    Optional getElement();

    Optional> getTestClass();

    Optional getTestInstance();

    Optional getTestMethod();

    Optional getExecutionException();

    void publishReportEntry(Map map);

    default Store getStore() {

    return getStore(Namespace.DEFAULT);

    }

    Store getStore(Namespace namespace);

    }

    ```


    The `getParent()` method gives the `ExtensionContext` of the parent. To understand
    what “parent” means here, you have to understand that Jupiter creates a tree of
    test nodes and each node will have `ExtensionContext`. A test node will have a
    test class node as its parent. So, `getParent` will be `Optional.empty` when called
    on the test class node but it will non-empty when `getParent` is called on the
    test method.


    The next set of methods gives test-unique identifiers, human-readable names, and
    a set of tags for a test. The next set of methods on extension makes test class,
    instance, and test method accessible. You can use this to reflectively access
    test method annotations or instance fields.


    The `getExecutionException()` method is used to get the exception thrown during
    the execution of a test or container. The `publishReportEntry` is used to publish
    key/value pairs to be consumed by listeners like console or XML reports.


    The last important method is `getStore()`. JUnit extensions make use of a `Store`
    to write and read data. `Store` is a namespaced, hierarchical, key/value data
    store. To access a store via `ExtensionContext`, you call the `getStore` method
    with a `Namespace` object. `Namespace` can be created using the factory method
    `create` like `Namespace.create("com","shekhargulati","SummaryExtension")`. Each
    extension should use a unique namespace to avoid mixing data between different
    extensions.


    The store itself is a glorified hash map. It offers methods that you would expect
    from a `Map` as shown in the code that follows:


    ```

    interface Store {

    V get(Object key, Class requiredType);

    Object getOrComputeIfAbsent(K key, Function defaultCreator);

    void put(Object key, Object value);

    V remove(Object key, Class requiredType);

    }

    ```


    ## Test Life Cycle Callbacks


    This set of extensions allows you to hook into specific stages of the test life
    cycle. As we learned in Chapter [4](#A429029_1_En_4_Chapter.html), the test class
    is composed of following life cycle methods:


    1. `BeforeAll`: The methods marked with the `@BeforeAll` annotation are executed
    before all tests in the current test class. They are only executed once for a
    test class.

    2. `BeforeEach`: The methods marked with the `@BeforeEach` annotation are executed
    before each test method in the current test class. They are called once for each
    test in the current test class.

    3. `Test`: All methods marked with the `@Test` annotation are actual test methods.

    4. `AfterEach`: The methods marked with `@AfterEach` are executed after each test
    method in the current test class. They are executed once for each test in the
    current test class.

    5. `AfterAll`: The methods marked with `@AfterAll` are executed after all tests
    in the current test class. They are only called executed once for a test class.


    For each of these test life cycle stages JUnit 5 provides an extension interface.


    1. `BeforeAllCallback`: This extension is executed before all the test methods
    are executed.

    2. `AfterAllCallback`: This extension is executed after all the test methods are
    executed.

    3. `BeforeEachCallback`: This extension is executed before each test method is
    executed.

    4. `AfterEachCallback`: This extension is executed after each test method is executed.

    5. `BeforeTestExecutionCallback`: This extension is executed immediately before
    the test is executed.

    6. `AfterTestExecutionCallback`: This extension is executed immediately after
    the test is executed.


    The order of execution for a test class which has all extensions and life cycle
    methods is:


    1. `BeforeAllCallback`

    2. `BeforeAll`

    3. `BeforeEachCallback`

    4. `BeforeEach`

    5. `BeforeTestExecution`

    6. `Test`

    7. `AfterTestExecution`

    8. `AfterEach`

    9. `AfterEachCallback`

    10. `AfterAll`

    11. `AfterAllCallback`


    Let’s write an extension that prints a summary of the test class execution. The
    summary will include the total time taken by the test class as well as the time
    taken by each test case. Let’s start by creating our extension which implements
    some of the life cycle extension interfaces.


    ```

    public class TestSummaryExtension implements

    BeforeAllCallback,

    AfterAllCallback,

    BeforeTestExecutionCallback,

    AfterTestExecutionCallback{

    }

    ```


    Each interface has a single life cycle method that we need to implement. The first
    method that we will implement is the `beforeAll` method of the `BeforeAllCallback`
    interface. We will store the start time of the test case.


    ```

    @Override

    public void beforeAll(ExtensionContext context) throws Exception {

    context.getStore().put("TEST_CLASS", System.currentTimeMillis());

    }

    ```


    Next, we will implement `beforeTestExecution` to store the test start time. Then,
    we will implement `afterTestExecution` to calculate the time it took to run the
    test case as shown in the code that follows:


    ```

    @Override

    public void beforeTestExecution(ExtensionContext context) throws Exception {

    context.getStore().put("TEST", System.currentTimeMillis());

    }

    @Override

    public void afterTestExecution(ExtensionContext context) throws Exception {

    long startTime = context.getStore().get("TEST", long.class);

    long timeTook = System.currentTimeMillis() - startTime;

    context.publishReportEntry(Collections.singletonMap(

    "Summary",

    String.format("%s took %d ms", context.getDisplayName(), timeTook)));

    }

    ```


    Finally, we will implement the `afterAll` method to calculate the time taken to
    run the test class and print the summary.


    ```

    @Override

    public void afterAll(ExtensionContext context) throws Exception {

    long startTime = context.getStore().get("TEST_CLASS", long.class);

    long timeTook = System.currentTimeMillis() - startTime;

    context.publishReportEntry(Collections.singletonMap(

    "Summary",

    String.format("%s took %d ms", context.getDisplayName(), timeTook)));

    }

    ```


    To make your test use this extension, you will use the `@ExtendWith` annotation.
    We will cover it later in this chapter.'
  raw: '## JUnit 5 Extension Model


    The extension API is part of JUnit Jupiter engine. Considering the limitations
    of extension approaches in JUnit 4, the JUnit 5 team decided to build one unified
    extension API that gives the power to hook into different stages of the test life
    cycle. This means that when a certain life cycle phase is reached, the Jupiter
    engine will call all the registered extensions for that phase. There are five
    main extension points that you can hook into.


    1.  Test life cycle callbacks  

    2.  Test instance post-processing  

    3.  Conditional test execution  

    4.  Parameter resolution  

    5.  Exception handling  


    Let’s go through each of them in detail.


    Each of the extensions covered in the subsequent sections implements interfaces
    corresponding to JUnit extension points. All the extension point interfaces extend
    a marked interface call `Extension`.


    Another interface that you will have to interact with is ExtensionContext. It
    is used to encapsulate the context in which the test or test container is executed.
    This abstraction allows extensions to access information regarding the running
    test and to interact with the Jupiter engine. Let’s look at the main methods of
    the interface to understand more about it.


    ```

    public interface ExtensionContext {

    Optional getParent();

    String getUniqueId();

    String getDisplayName();

    Set getTags();

    Optional getElement();

    Optional> getTestClass();

    Optional getTestInstance();

    Optional getTestMethod();

    Optional getExecutionException();

    void publishReportEntry(Map map);

    default Store getStore() {

    return getStore(Namespace.DEFAULT);

    }

    Store getStore(Namespace namespace);

    }

    ```


    The `getParent()` method gives the ExtensionContext of the parent. To understand
    what “parent” means here, you have to understand that Jupiter creates a tree of
    test nodes and each node will have ExtensionContext. A test node will have a test
    class node as its parent. So, getParent will be Optional.empty when called on
    the test class node but it will non-empty when getParent is called on the test
    method.


    The next set of methods gives test-unique identifiers, human-readable names, and
    a set of tags for a test. The next set of methods on extension makes test class,
    instance, and test method accessible. You can use this to reflectively access
    test method annotations or instance fields.


    The `getExecutionException()` method is used to get the exception thrown during
    the execution of a test or container. The publishReportEntry is used to publish
    key/value pairs to be consumed by listeners like console or XML reports.


    The last important method is `getStore()` . JUnit extensions make use of a Store
    to write and read data. Store is a namespaced, hierarchical, key/value data store.
    To access a store via ExtensionContext, you call the `getStore` method with a
    Namespace object. Namespace can be created using the factory method create like
    Namespace.create(“com”,”shekhargulati”,”SummaryExtension”). Each extension should
    use a unique namespace to avoid mixing data between different extensions.


    The store itself is a glorified hash map. It offers methods that you would expect
    from a Map as shown in the code that follows:


    ```

    interface Store {

    V get(Object key, Class requiredType);

    Object getOrComputeIfAbsent(K key, Function defaultCreator);

    void put(Object key, Object value);

    V remove(Object key, Class requiredType);

    }

    ```


    ## Test Life Cycle Callbacks


    This set of extensions allows you to hook into specific stages of the test life
    cycle. As we learned in Chapter [4](#A429029_1_En_4_Chapter.html), the test class
    is composed of following life cycle methods:


    1.  BeforeAll: The methods marked with the `@BeforeAll` annotation are executed
    before all tests in the current test class. They are only executed once for a
    test class.  

    2.  BeforeEach: The methods marked with the `@BeforeEach` annotation are executed
    before each test method in the current test class. They are called once for each
    test in the current test class.  

    3.  Test: All methods marked with the `@Test` annotation are actual test methods.
     

    4.  AfterEach: The methods marked with `@AfterEach` are executed after each test
    method in the current test class. They are executed once for each test in the
    current test class.  

    5.  AfterAll: The methods marked with `@AfterAll` are executed after all tests
    in the current test class. They are only called executed once for a test class
    .


    For each of these test life cycle stages JUnit 5 provides an extension interface
    .


    1.  BeforeAllCallback: This extension is executed before all the test methods
    are executed.  

    2.  AfterAllCallback: This extension is executed after all the test methods are
    executed.  

    3.  BeforeEachCallback: This extension is executed before each test method is
    executed.  

    4.  AfterEachCallback: This extension is executed after each test method is executed.
     

    5.  BeforeTestExecutionCallback: This extension is executed immediately before
    the test is executed.  

    6.  AfterTestExecutionCallback: This extension is executed immediately after the
    test is executed.


    The order of execution for a test class which has all extensions and life cycle
    methods is:


    1.  BeforeAllCallback  

    2.  BeforeAll  

    3.  BeforeEachCallback  

    4.  BeforeEach  

    5.  BeforeTestExecution  

    6.  Test  

    7.  AfterTestExecution  

    8.  AfterEach  

    9.  AfterEachCallback  

    10.  AfterAll  

    11.  AfterAllCallback


    Let’s write an extension that prints a summary of the test class execution. The
    summary will include the total time taken by the test class as well as the time
    taken by each test case. Let’s start by creating our extension which implements
    some of the life cycle extension interfaces.


    ```

    public class TestSummaryExtension implements

    BeforeAllCallback,

    AfterAllCallback,

    BeforeTestExecutionCallback,

    AfterTestExecutionCallback{

    }

    ```


    Each interface has a single life cycle method that we need to implement. The first
    method that we will implement is the `beforeAll` method of the BeforeAllCallback
    interface. We will store the start time of the test case.


    ```

    @Override

    public void beforeAll(ExtensionContext context) throws Exception {

    context.getStore().put("TEST_CLASS", System.currentTimeMillis());

    }

    ```


    Next, we will implement `beforeTestExecution` to store the test start time. Then,
    we will implement `afterTestExecution` to calculate the time it took to run the
    test case as shown in the code that follows:


    ```

    @Override

    public void beforeTestExecution(ExtensionContext context) throws Exception {

    context.getStore().put("TEST", System.currentTimeMillis());

    }

    @Override

    public void afterTestExecution(ExtensionContext context) throws Exception {

    long startTime = context.getStore().get("TEST", long.class);

    long timeTook = System.currentTimeMillis() - startTime;

    context.publishReportEntry(Collections.singletonMap(

    "Summary",

    String.format("%s took %d ms", context.getDisplayName(), timeTook)));

    }

    ```


    Finally, we will implement the `afterAll` method to calculate the time taken to
    run the test class and print the summary.


    ```

    @Override

    public void afterAll(ExtensionContext context) throws Exception {

    long startTime = context.getStore().get("TEST_CLASS", long.class);

    long timeTook = System.currentTimeMillis() - startTime;

    context.publishReportEntry(Collections.singletonMap(

    "Summary",

    String.format("%s took %d ms", context.getDisplayName(), timeTook)));

    }

    ```


    To make your test use this extension, you will use the `@ExtendWith` annotation
    . We will cover it later in this chapter.'
  trans: '

    ## JUnit 5 扩展模型


    扩展 API 是 JUnit Jupiter 引擎的一部分。考虑到 JUnit 4 中扩展方法的局限性，JUnit 5 团队决定构建一个统一的扩展 API，使其能够挂钩到测试生命周期的不同阶段。这意味着当到达某个生命周期阶段时，Jupiter
    引擎将调用所有为该阶段注册的扩展。共有五个主要的扩展点可供挂钩。


    1.  测试生命周期回调

    2.  测试实例后处理

    3.  条件测试执行

    4.  参数解析

    5.  异常处理


    让我们逐一详细了解。


    后续章节中介绍的每个扩展都实现了与 JUnit 扩展点相对应的接口。所有扩展点接口都扩展了一个名为 `Extension` 的标记接口。


    另一个需要与之交互的接口是 `ExtensionContext`。它用于封装执行测试或测试容器的上下文。这种抽象允许扩展访问有关正在运行的测试的信息，并与
    Jupiter 引擎进行交互。让我们看看该接口的主要方法以进一步了解它。


    ```

    public interface ExtensionContext {

    Optional getParent();

    String getUniqueId();

    String getDisplayName();

    Set getTags();

    Optional getElement();

    Optional> getTestClass();

    Optional getTestInstance();

    Optional getTestMethod();

    Optional getExecutionException();

    void publishReportEntry(Map map);

    default Store getStore() {

    return getStore(Namespace.DEFAULT);

    }

    Store getStore(Namespace namespace);

    }

    ```


    `getParent()` 方法返回父级的 ExtensionContext。要理解这里的“父级”含义，必须了解 Jupiter 会创建一个测试节点树，每个节点都有其
    ExtensionContext。一个测试节点会有一个测试类节点作为其父节点。因此，在测试类节点上调用 `getParent` 时，返回 Optional.empty；而在测试方法上调用
    `getParent` 时，则返回非空值。


    接下来的一组方法提供测试的唯一标识符、人类可读的名称以及一组测试标签。再下一组扩展方法用于访问测试类、实例和测试方法。你可以利用这些方法通过反射访问测试方法注解或实例字段。


    `getExecutionException()` 方法用于获取测试或容器执行期间抛出的异常。`publishReportEntry` 用于发布键/值对，供控制台或
    XML 报告等监听器使用。


    最后一个重要的方法是 `getStore()`。JUnit 扩展使用 Store 来读写数据。Store 是一个带命名空间、分层结构的键/值数据存储。要通过
    ExtensionContext 访问 Store，需要使用 Namespace 对象调用 `getStore` 方法。可以使用工厂方法 `create`
    创建 Namespace，例如 `Namespace.create("com","shekhargulati","SummaryExtension")`。每个扩展都应使用唯一的命名空间，以避免不同扩展之间的数据混淆。


    Store 本身就像一个功能增强的哈希映射。它提供了你期望从 Map 中获得的方法，如下列代码所示：


    ```

    interface Store {

    V get(Object key, Class requiredType);

    Object getOrComputeIfAbsent(K key, Function defaultCreator);

    void put(Object key, Object value);

    V remove(Object key, Class requiredType);

    }

    ```


    ## 测试生命周期回调


    这组扩展允许你挂钩到测试生命周期的特定阶段。正如我们在第 4 章所学，测试类由以下生命周期方法组成：


    1.  BeforeAll：标记有 `@BeforeAll` 注解的方法在当前测试类的所有测试之前执行。它们对于每个测试类仅执行一次。

    2.  BeforeEach：标记有 `@BeforeEach` 注解的方法在当前测试类的每个测试方法之前执行。它们对于当前测试类中的每个测试执行一次。

    3.  Test：所有标记有 `@Test` 注解的方法都是实际的测试方法。

    4.  AfterEach：标记有 `@AfterEach` 注解的方法在当前测试类的每个测试方法之后执行。它们对于当前测试类中的每个测试执行一次。

    5.  AfterAll：标记有 `@AfterAll` 注解的方法在当前测试类的所有测试之后执行。它们对于每个测试类仅执行一次。


    对于这些测试生命周期阶段中的每一个，JUnit 5 都提供了一个扩展接口。


    1.  BeforeAllCallback：此扩展在所有测试方法执行之前执行。

    2.  AfterAllCallback：此扩展在所有测试方法执行之后执行。

    3.  BeforeEachCallback：此扩展在每个测试方法执行之前执行。

    4.  AfterEachCallback：此扩展在每个测试方法执行之后执行。

    5.  BeforeTestExecutionCallback：此扩展在测试即将执行之前立即执行。

    6.  AfterTestExecutionCallback：此扩展在测试执行之后立即执行。


    对于一个包含所有扩展和生命周期方法的测试类，其执行顺序为：


    1.  BeforeAllCallback

    2.  BeforeAll

    3.  BeforeEachCallback

    4.  BeforeEach

    5.  BeforeTestExecution

    6.  Test

    7.  AfterTestExecution

    8.  AfterEach

    9.  AfterEachCallback

    10. AfterAll

    11. AfterAllCallback


    让我们编写一个扩展，用于打印测试类执行的摘要。该摘要将包括测试类所花费的总时间以及每个测试用例所花费的时间。让我们从创建实现某些生命周期扩展接口的扩展开始。


    ```

    public class TestSummaryExtension implements

    BeforeAllCallback,

    AfterAllCallback,

    BeforeTestExecutionCallback,

    AfterTestExecutionCallback{

    }

    ```


    每个接口都有一个需要实现的单一生命周期方法。我们将实现的第一个方法是 `BeforeAllCallback` 接口的 `beforeAll` 方法。我们将存储测试用例的开始时间。


    ```

    @Override

    public void beforeAll(ExtensionContext context) throws Exception {

    context.getStore().put("TEST_CLASS", System.currentTimeMillis());

    }

    ```


    接下来，我们将实现 `beforeTestExecution` 来存储测试开始时间。然后，我们将实现 `afterTestExecution` 来计算运行测试用例所花费的时间，如下列代码所示：


    ```

    @Override

    public void beforeTestExecution(ExtensionContext context) throws Exception {

    context.getStore().put("TEST", System.currentTimeMillis());

    }

    @Override

    public void afterTestExecution(ExtensionContext context) throws Exception {

    long startTime = context.getStore().get("TEST", long.class);

    long timeTook = System.currentTimeMillis() - startTime;

    context.publishReportEntry(Collections.singletonMap(

    "Summary",

    String.format("%s took %d ms", context.getDisplayName(), timeTook)));

    }

    ```


    最后，我们将实现 `afterAll` 方法来计算运行测试类所花费的时间并打印摘要。


    ```

    @Override

    public void afterAll(ExtensionContext context) throws Exception {

    long startTime = context.getStore().get("TEST_CLASS", long.class);

    long timeTook = System.currentTimeMillis() - startTime;

    context.publishReportEntry(Collections.singletonMap(

    "Summary",

    String.format("%s took %d ms", context.getDisplayName(), timeTook)));

    }

    ```


    要使你的测试使用此扩展，你需要使用 `@ExtendWith` 注解。我们将在本章后面介绍它。

    '
- fmt: '# Test Instance Post-Processing


    This extension allows you to hook after a test instance has been created. You
    implement the `TestInstancePostProcessor` interface. This interface has single
    method–`postProcessTestInstance`—that you should override.


    As mentioned in the JavaDoc of the `TestInstancePostProcessor` interface, the
    canonical example of this extension is injecting dependencies into the test instance.
    For example, let’s write an extension that injects SLF4j logger into an instance
    field.


    ```

    import java.lang.reflect.Field;

    import org.junit.jupiter.api.extension.ExtensionContext;

    import org.junit.jupiter.api.extension.TestInstancePostProcessor;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    public class LoggingExtension implements TestInstancePostProcessor {

    @Override

    public void postProcessTestInstance(Object testInstance, ExtensionContext context)
    throws Exception {

    Logger logger = LoggerFactory.getLogger(testInstance.getClass());

    Field field = testInstance.getClass().getDeclaredField("logger");

    field.set(testInstance, logger);

    }

    }

    ```


    In the foregoing code, we have access to the `testInstance`. We set the `logger`
    field using reflection.


    # Conditional Test Execution


    There are situations in which we would like to control whether we should run a
    test case or not. JUnit 5 provides the `ExecutionCondition` extension interface
    for implementing this use case.


    Let’s create an extension `RunOnCIExtension` class which implements the `ExecutionCondition`
    interface.


    ```

    import org.junit.jupiter.api.extension.ConditionEvaluationResult;

    import org.junit.jupiter.api.extension.ExecutionCondition;

    import org.junit.jupiter.api.extension.ExtensionContext;

    public class RunOnCIExtension implements ExecutionCondition {

    @Override

    public ConditionEvaluationResult evaluateExecutionCondition(ExtensionContext context)
    {

    String jenkinsHome = System.getenv("JENKINS_HOME");

    if (jenkinsHome != null) {

    return ConditionEvaluationResult.enabled("Test enabled on CI");

    }

    return ConditionEvaluationResult.disabled("Test disabled as the environment is
    not CI");

    }

    }

    ```


    # Parameter Resolution


    This extension is used to resolve a parameter received by a constructor or test
    method.


    Let’s create an extension that resolves a type `Book`. It is very common in the
    test cases that we need to work with test data. So, parameter resolution can help
    us there.


    ```

    public class BookParameterResolver implements ParameterResolver {

    @Override

    public boolean supportsParameter(ParameterContext parameterContext,

    ExtensionContext extensionContext) throws ParameterResolutionException {

    return parameterContext.getParameter().getType()

    .equals(Book.class);

    }

    @Override

    public Object resolveParameter(ParameterContext parameterContext,

    ExtensionContext extensionContext) throws ParameterResolutionException {

    return new Book("Effective Java");

    }

    }

    ```


    JUnit 5 bundles the following three `ParameterResolver`s:


    *   `TestInfoParameterResolver`: The resolver provides an instance of `org.junit.jupiter.api.TestInfo`.
    The `TestInfo` object holds meta-information about the current test being executed.
    The object can provide display name, text class, test methods, and tags, if any.

    *   `TestReporterParameterResolver`: The resolver provides an instance of `org.junit.jupiter.api.TestReporter`.
    The `TestReporter` allows us to provide additional values for the current test
    execution. All such values are included in test report as well as shown in the
    IDE(s) (integrated development environment(s)).

    *   `RepetitionInfoParameterResolver`: The resolver provides an instance of `org.junit.jupiter.api.RepetitionInfo`.
    The `RepetitionInfo` object holds information about the test repetition (i.e.,
    current repetition index and total repetitions). The object is only available
    for tests annotated with `org.junit.jupiter.api.RepeatedTest`. If the test case
    is not marked with `@RepeatedTest`, an `org.junit.jupiter.api.extension.ParameterResolutionException`
    is thrown.


    ```

    class ParameterResolverSpec {

    @BeforeEach

    void initialize(TestInfo info,TestReporter reporter) {

    reporter.publishEntry("Associated tags :", info.getTags().toString());

    }

    @RepeatedTest(value = 10)

    @Tag("Numbers")

    void numberTest(RepetitionInfo info) {

    assertTrue(true);

    }

    @Test

    void nonRepeated(RepetitionInfo info) {

    assertTrue(true);

    }

    }

    ```


    `TestReporter` is JUnit 5’s preferred way to print any information to sysout/syserror.
    Also note that each of the aforementioned `ParameterResolver`(s) is activated
    automatically by the JUnit execution engine. They do not require any explicit
    activation using `@ExtendWith`.


    # Exception Handling


    The last extension point that we will discuss is `TestExecutionExceptionHandler`.
    This extension can be used to alter the behavior of a test when it encounters
    an exception.


    Let’s suppose, we want to create an extension that will log and ignore all exceptions
    of type `IOException` and rethrow all the other exceptions.


    ```

    public class IgnoreIOExceptionExtension

    implements TestExecutionExceptionHandler {

    Logger logger = LoggerFactory

    .getLogger(IgnoreIOExceptionExtension.class);

    @Override

    public void handleTestExecutionException(ExtensionContext context,

    Throwable throwable) throws Throwable {

    if (throwable instanceof IOException) {

    logger.error("IO Exception {}", throwable);

    return;

    }

    throw throwable;

    }

    }

    ```


    # Registering Extensions


    In the previous few sections, we created our test extensions. Now, we need to
    register them with a JUnit 5 test. To do that, we make use of the `@ExtendWith`
    annotation. You can use this annotation multiple times to register multiple extensions
    or you can pass multiple extensions as an array to the `@ExtendWith` annotation.


    ```

    @ExtendWith({

    IgnoreIOExceptionExtension.class,

    BookParameterResolver.class,

    RunOnCIExtension.class,

    TestSummaryExtension.classs

    })

    @ExtendWith(LoggingExtension.class)

    public class UserServiceTests{

    }

    ```


    You can also automatically register extensions by using the `ServiceLoader` mechanism.
    Your extension needs to have a file `META-INF/services/org.junit.jupiter.api.extension.Extension`
    with the fully qualified name of your extension.


    ```

    com.shekhargulati.extensions.TestSummaryExtension .

    ```


    To enable this extension registry mechanism, you will need to set the `junit.extensions.autodetection.enabled`
    configuration property to `true`. One way to do this is by using a system property
    to the JVM (Java Virtual Machine). The other way is by adding a configuration
    parameter to `LauncherDiscoveryRequest` as shown in the code that follows:


    ```

    LauncherDiscoveryRequest request

    = LauncherDiscoveryRequestBuilder.request()

    .selectors(selectClass("com.junit5book.UserServiceTests"))

    .configurationParameter("junit.extensions.autodetection.enabled", "true")

    .build();

    ```


    # JUnit 5 Extensions


    The JUnit team used the extension model to develop the following new test types:


    *   `@TestTemplate`: Define a template which generates tests at runtime.

    *   `@ParameterizedTest`: Defines a test method with parameters.


    In the following sections we will cover how to use each of the aforementioned
    extensions. The sections will not cover implementation details for each of the
    extensions. Please refer to JUnit 5 documentation for such details.'
