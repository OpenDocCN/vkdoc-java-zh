    ## JUnit Life Cycle API


    A typical JUnit test class has multiple test cases. Each of the test cases is
    governed by a test life cycle. The complete cycle consists of the following three
    phases:


    1.  The first is the setup phase, where the test infrastructure is put in place.
    JUnit provides two levels of setup. One is the class level where a costly object
    like database connection can be created which can be reused for all the tests
    without any side effect. Test objects affecting test runs need to be created in
    the individual test setup methods.  

    2.  The next is the test execution itself. Result verification is also part of
    the test execution phase. The execution result will signify a success or failure.
     

    3.  The last phase is the cleanup phase where any cleanup required after posttest
    execution is performed. Just like the class-level setup, there is a class-level
    cleanup also, which can be used to dispose of all the singletons created at the
    class level.  


    The JUnit API provides the annotations to perform test case setup and cleanup
    (see Figure [2-6](#A429029_1_En_2_Chapter.html#Fig6)).


    ![A429029_1_En_2_Fig6_HTML.gif](A429029_1_En_2_Fig6_HTML.gif)


    Figure 2-6.


    Test life cycle


    ### @BeforeAll


    The `org.junit.jupiter.api.BeforeAll` annotation is responsible for performing
    a single time initialization for all test cases in a class. The method must be
    static and non-private. It is often used to create costly objects like database
    connection, which can be reused for all the test cases. The work done in a `BeforeAll`
    can be moved to `BeforeEach`, but since it is usually a computationally expensive
    operation, the overall test execution can take much longer.


    The annotation also has an inherited behavior. If there are superclass methods
    marked with `@BeforeAll` they will be executed before any such methods of the
    test class.'
