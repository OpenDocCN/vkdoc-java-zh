    In Progress. In order to do this, add `isProgress()` to the `Book` class and use
    it to filter the stream of Books.


    Also, along similar lines, we can add a test case that covers a scenario in which
    all books in a BookShelf are finished. Figure [4-2](#A429029_1_En_4_Chapter.html#Fig2)
    shows successful execution of all the test cases related to bookshelf progress.


    ![A429029_1_En_4_Fig2_HTML.jpg](A429029_1_En_4_Fig2_HTML.jpg)


    Figure 4-2.


    BookShelf progress sucessful test execution


    So, are we done with the feature? Not completely, we have written tests and code
    to make them pass. We still need to refactor our tests to make improvements. If
    we look at our test case then we will find that there is really nothing left to
    improve upon. But now let us compare `BookShelfProgressSpec` with `BookShelfSpec`
    (written in Chapter [3](#A429029_1_En_3_Chapter.html)). We find duplicate test
    data setup. A BookShelf needs books to work. We should use knowledge of DI that
    we gained in the section “Dependency Injection” to make this code better.


    Let’s annotate `BookShelfProgressSpec` with `ExtendWith` annotation and provide
    it `BooksParameterResolver`.


    ```

    @DisplayName("progress")

    @ExtendWith(BooksParameterResolver.class)

    class BookShelfProgressSpec {

    // rest removed for Brevity

    }

    ```


    Run `BookShelfProgressSpec` and all test cases should be green. This way we didn’t
    have to duplicate test data for both our test cases. `ParameterResolver` made
    it easy for us to reuse data setup. Also, if required we can switch the data provided
    by the resolver at runtime in case we want to test with some other data. Our test
    case does not care how Map <string book="">is provided to it. Data could be read
    from the database, read from a file, or created in memory.</string>


    ### Caching Test Data


    The JUnit 5 extension mechanism creates a single instance of parameter resolver
    for a test class, but it calls the `resolve` method for each injection point invocation.
    In our case, we have a single injection point `@BeforeEach init` method, but as
    per the life cycle of `@BeforeEach`, it is called for each test case. This means
    that for each test execution, we have a new copy of test data. If your tests do
    not change the state of data and are read-only, then you can avoid creating new
    copy each time by storing the `Map<String, Book>` in an instance variable of `BooksParameterResolver`
    class as shown in the following code:


    ```

    class BooksParameterResolver implements ParameterResolver {

    private final Map books;

    public BooksParameterResolver() {

    Map books = new HashMap();

    books.put("Effective Java", new Book("Effective Java", "Joshua Bloch", LocalDate.of(2008,
    Month.MAY, 8)));

    // removed for brevity

    this.books = books;

    }

    @Override

    public boolean supportsParameter(final ParameterContext parameterContext, final
    ExtensionContext extensionContext) throws ParameterResolutionException {

    // removed for brevity

    }

    @Override

    public Map resolveParameter(final ParameterContext parameterContext, final ExtensionContext
    extensionContext) throws ParameterResolutionException {

    return books;

    }

    }

    ```


    If you run the all the tests, you will notice that one of the tests fails, as
    shown in the screenshot in Figure [4-3](#A429029_1_En_4_Chapter.html#Fig3).


    ![A429029_1_En_4_Fig3_HTML.jpg](A429029_1_En_4_Fig3_HTML.jpg)


    Figure 4-3.


    Test failure when caching test data


    The reason for the test failure is that one of the test cases in the suite changed
    the state of the test data. This test expected a clean copy of test data so it
    failed.


    The chain gang anti-pattern: This anti-pattern refers to the fact that a bunch
    of unit tests must be processed in a particular order or as a bunch. Each executed
    test does some work for the next one and thus they depend on each other.


    ### Using ExtensionContext Store


    So far, in our test cases, we injected test data in the `@BeforeEach init` method
    and then stored different books in the instance variable. What if we wanted to
    inject the same test data in both the `init` and `test` methods so that we don’t
    have to store it in a test class instance variable. The two approaches that we
    have seen so far do not solve this use case.


    *   Creating test data for each invocation will pass a new copy of test data.

    *   Caching test data for all the tests in a test class will fail when another
    test changes the state of test data.


    To look for a possible solution, let’s delve into the details of the JUnit API.
    The `resolve` method takes two arguments.


    *   ParameterContext: It contains the details of the parameter being asked for.

    *   ExtensionContext: It contains the context of the current test. Each test execution
    creates its own ExentionContext. The context contains details like test method,
    id, and so on.


    Besides the test-specific details, the context also offers ExtenContext.Store,
    which could be used to hold data for the particular context execution.


    *   Store getStore()

    *   Store getStore(Namespace namespace)


    The Store is a key value holder which offers get and put methods. Each Store instance
    is uniquely identified by a namespace, which can be used to create a new store.
    In each test’s `ExtensionContext` there is a default namespace available, but
    it is advisable to create a custom namespace to uniquely identify your data and
    avoid any data corruption issues. So now modify the `BooksParameterResolver` to
    use an `ExtensionContext.Store` for a custom Books namespace and serve the array
    of books from there.


    ```

    class BooksParameterResolver implements ParameterResolver {

    @Override

    public Object resolveParameter(final ParameterContext parameterContext, final
    ExtensionContext extensionContext) throws ParameterResolutionException {

    ExtensionContext.Store store = extensionContext.getStore(ExtensionContext.Namespace.create(Book.class));

    return store.getOrComputeIfAbsent("books", k -> getBooks());

    }

    // removed for brevity

    }

    ```


    Run all the tests and verify that they are green. Now, that the test code is in
    good shape, we can start working on the next feature.


    Before we move to the next section on mocking, let’s build another feature that
    will help us apply mocking in a real scenario.'
  trans: '

    请注意 `isRead` 方法。我们将使用该方法处理 `BookShelf` 中的书籍列表。我们可以将 `List<Books>` 转换为 Stream，然后使用
    `isRead` 方法应用过滤器，以获取已读书籍的数量。


    ```

    int booksRead = Long.valueOf(books.stream().filter(Book::isRead).count()).intValue();

    ```


    现在，基于我们已有的内容，来实现 `BookShelf` 的 `progress` 方法。


    ```

    public Progress progress() {

    int booksRead = Long.valueOf(books.stream().filter(Book::isRead).count()).intValue();

    int booksToRead = books.size() - booksRead;

    int percentageCompleted = booksRead * 100 / books.size();

    int percentageToRead = booksToRead * 100 / books.size();

    return new Progress(percentageCompleted, percentageToRead, 0);

    }

    ```


    这应该能让测试重新通过。到目前为止，我们已经为“已完成”和“待办”添加了进度指示器。现在，让我们添加几个测试用例来计算“进行中”的书籍。为此，请在 `Book`
    类中添加 `isProgress()` 方法，并使用它来过滤书籍流。


    同样地，我们可以添加一个测试用例，覆盖 `BookShelf` 中所有书籍都已完成的情况。图 4-2 展示了所有与书架进度相关的测试用例成功执行的结果。


    ![A429029_1_En_4_Fig2_HTML.jpg](img/A429029_1_En_4_Fig2_HTML.jpg)


    图 4-2.


    BookShelf 进度测试成功执行


    那么，这个功能就完成了吗？还没有完全完成，我们已经编写了测试和代码来让它们通过。我们仍然需要重构测试以进行改进。如果查看我们的测试用例，会发现确实没有什么可以改进的了。但现在让我们将
    `BookShelfProgressSpec` 与 `BookShelfSpec`（在第 3 章中编写）进行比较。我们发现存在重复的测试数据设置。BookShelf
    需要书籍才能工作。我们应该利用在“依赖注入”一节中学到的 DI 知识来改进这段代码。


    让我们用 `ExtendWith` 注解标注 `BookShelfProgressSpec`，并为其提供 `BooksParameterResolver`。


    ```

    @DisplayName("progress")

    @ExtendWith(BooksParameterResolver.class)

    class BookShelfProgressSpec {

    // 为简洁起见，其余部分已删除

    }

    ```


    运行 `BookShelfProgressSpec`，所有测试用例都应该通过。这样，我们就不必为两个测试用例重复测试数据了。`ParameterResolver`
    使我们能够轻松地重用数据设置。此外，如果需要，我们可以在运行时切换解析器提供的数据，以便用其他数据进行测试。我们的测试用例并不关心 `Map<String,
    Book>` 是如何提供给它的。数据可以从数据库读取、从文件读取或在内存中创建。


    ### 缓存测试数据


    JUnit 5 扩展机制会为测试类创建参数解析器的单个实例，但它会为每次注入点调用调用 `resolve` 方法。在我们的例子中，我们有一个注入点 `@BeforeEach
    init` 方法，但根据 `@BeforeEach` 的生命周期，它会为每个测试用例调用。这意味着每次测试执行时，我们都会得到一份新的测试数据副本。如果测试不改变数据状态并且是只读的，那么可以通过将
    `Map<String, Book>` 存储在 `BooksParameterResolver` 类的实例变量中来避免每次都创建新副本，如下代码所示：


    ```

    class BooksParameterResolver implements ParameterResolver {

    private final Map books;

    public BooksParameterResolver() {

    Map books = new HashMap();

    books.put("Effective Java", new Book("Effective Java", "Joshua Bloch", LocalDate.of(2008,
    Month.MAY, 8)));

    // 为简洁起见，其余部分已删除

    this.books = books;

    }

    @Override

    public boolean supportsParameter(final ParameterContext parameterContext, final
    ExtensionContext extensionContext) throws ParameterResolutionException {

    // 为简洁起见，其余部分已删除

    }

    @Override

    public Map resolveParameter(final ParameterContext parameterContext, final ExtensionContext
    extensionContext) throws ParameterResolutionException {

    return books;

    }

    }

    ```


    如果运行所有测试，你会注意到其中一个测试失败，如图 4-3 中的截图所示。


    ![A429029_1_En_4_Fig3_HTML.jpg](img/A429029_1_En_4_Fig3_HTML.jpg)


    图 4-3.


    缓存测试数据时测试失败


    测试失败的原因是测试套件中的一个测试用例更改了测试数据的状态。该测试期望获得一份干净的测试数据副本，因此失败了。


    链式团伙反模式：这种反模式指的是一组单元测试必须以特定顺序或作为一个整体进行处理。每个执行的测试都为下一个测试完成一些工作，因此它们相互依赖。


    ### 使用 ExtensionContext Store


    到目前为止，在我们的测试用例中，我们在 `@BeforeEach init` 方法中注入了测试数据，然后将不同的书籍存储在实例变量中。如果我们想在 `init`
    和 `test` 方法中都注入相同的测试数据，这样就不必将其存储在测试类实例变量中，该怎么办？我们目前看到的两种方法都不能解决这个用例。


    *   为每次调用创建测试数据会传递一份新的测试数据副本。

    *   当另一个测试更改测试数据状态时，为测试类中的所有测试缓存测试数据将会失败。


    为了寻找可能的解决方案，让我们深入研究 JUnit API 的细节。`resolve` 方法接受两个参数。


    *   `ParameterContext`：包含所请求参数的详细信息。

    *   `ExtensionContext`：包含当前测试的上下文。每次测试执行都会创建自己的 `ExtensionContext`。该上下文包含测试方法、ID
    等详细信息。


    除了测试特定的详细信息外，上下文还提供了 `ExtensionContext.Store`，可用于保存特定上下文执行的数据。


    *   `Store getStore()`

    *   `Store getStore(Namespace namespace)`


    Store 是一个键值持有者，提供 get 和 put 方法。每个 Store 实例都由一个命名空间唯一标识，该命名空间可用于创建新的 Store。在每个测试的
    `ExtensionContext` 中，都有一个可用的默认命名空间，但建议创建一个自定义命名空间来唯一标识你的数据，并避免任何数据损坏问题。现在修改 `BooksParameterResolver`，使其使用
    `ExtensionContext.Store` 来存储自定义的 Books 命名空间，并从那里提供书籍数组。


    ```

    class BooksParameterResolver implements ParameterResolver {

    @Override

    public Object resolveParameter(final ParameterContext parameterContext, final
    ExtensionContext extensionContext) throws ParameterResolutionException {

    ExtensionContext.Store store = extensionContext.getStore(ExtensionContext.Namespace.create(Book.class));

    return store.getOrComputeIfAbsent("books", k -> getBooks());

    }

    // 为简洁起见，其余部分已删除

    }

    ```


    运行所有测试，并验证它们是否通过。现在，测试代码已经处于良好状态，我们可以开始处理下一个功能了。


    在进入下一节关于模拟的内容之前，让我们先构建另一个功能，这将帮助我们在实际场景中应用模拟。

