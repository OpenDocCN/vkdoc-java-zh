  trans: '

    ### JUnit 5


    为了克服前述限制，JUnit Lambda 项目应运而生。JUnit Lambda 是 JUnit 5 的代号。JUnit 5 是基于 Java 8 对 JUnit
    的完全重写。你需要 Java 8 才能使用 JUnit 5。它从头开始重新设计，克服了之前 JUnit 版本中的错误和局限。但这并不意味着用 JUnit 3
    和 JUnit 4 编写的测试无法在 JUnit 5 上运行。JUnit 团队确保 JUnit 5 向后兼容，因此你也可以用它来运行旧的 JUnit 测试。JUnit
    5 支持 JUnit 3.8 及以上版本。


    JUnit 5 由三个子项目组成。每个子项目又包含多个模块，我们稍后会逐一介绍。


    *   **JUnit Platform**：它为启动 JVM（Java 虚拟机）测试框架提供了基础。这包括一个可用于为 JUnit Platform 开发测试框架的
    `TestEngine` API。它还提供了一个 `ConsoleLauncher`，可供 Gradle 和 Maven 等构建工具使用。

    *   **JUnit Jupiter**：它提供了用于编写测试的新编程模型。此外，新的扩展机制也属于这个子项目。它实现了 JUnit Platform 定义的
    `TestEngine` API，从而使 JUnit 5 测试能够运行。

    *   **JUnit Vintage**：它提供了用于运行 JUnit 3 和 JUnit 4 测试的 `TestEngine` 实现。


    JUnit 5 的架构如图 1-2 所示。JUnit 5 用引擎（engine）取代了运行器（runner）的概念。因此，中间有一个引擎 API，它为 JUnit
    4 和 JUnit 5 API 都提供了实现。这允许你运行使用不同 JUnit 版本编写的测试。Gradle、IntelliJ 或 Eclipse 等工具使用启动器（launcher）API。你的测试将依赖于
    JUnit 5 API，从而使你无需接触 JUnit 内部实现。


    ![A429029_1_En_1_Fig2_HTML.gif](img/A429029_1_En_1_Fig2_HTML.gif)


    图 1-2.


    JUnit 5 架构


    JUnit 5 的主要模块包括：


    *   **junit-jupiter-api**：该模块定义了编写测试所需的 API。

    *   **junit-platform-launcher**：该模块定义了外部工具使用的启动器 API。启动器可用于发现、过滤和执行测试。

    *   **junit-platform-engine**：它提供了可用于编写自己的 `TestEngine` 的 API。`TestEngine` 负责测试的发现和执行。

    *   **junit-jupiter-engine**：它是针对 JUnit 5 的 `junit-platform-engine` API 的实现。

    *   **junit-vintage-engine**：它是针对 JUnit 3 和 JUnit 4 的 `junit-platform-engine`
    API 的实现。

    *   **junit-platform-commons**：它包含所有跨不同模块使用的工具类。

    *   **junit-platform-console**：它提供了一个名为 `ConsoleLauncher` 的启动器实现。`ConsoleLauncher`
    是一个独立的应用程序，用于从控制台启动 JUnit Platform。

    *   **junit-platform-gradle-plugin**：这是一个 Gradle 插件，可用于运行 JUnit 5 测试。

    *   **junit-platform-surefire-provider**：该模块为 JUnit 5 提供了 Maven 集成。


    JUnit 团队还致力于为测试工具提供商和构建工具/IDE 奠定坚实的基础。在此版本中，他们发起了 Open Test Alliance（[`https://github.com/ota4j-team/opentest4j`](https://github.com/ota4j-team/opentest4j)），旨在为
    JVM 上的测试执行定义标准。


    ## Java 8 入门


    Java 8 已不再是新话题。市面上已经出版了许多关于它的优秀书籍。尽管如此，许多 Java 开发者仍未意识到 Java 8 的强大之处。在本书中，我们将使用
    Java 8，因此本节将简要介绍 Java 8 的重要特性。


    Java 8 是迄今为止 Java 最大的一次版本发布。它包含了众多特性，如 lambda 表达式、流 API、Optional、新的日期时间 API、接口中的默认方法和静态方法等。在本节中，我们将重点介绍
    Java 8 的三个最重要的特性——lambda 表达式、流 API 和 Optional——它们将改变我们使用 Java 的方式。


    ### Lambda 表达式


    Java 8 中引入的最重要的特性是 lambda 表达式。Lambda 表达式允许你将行为作为数据传递。在 Java 的早期版本中，我们使用匿名内部类来传递行为。让我们看一个
    lambda 表达式的简单示例——Java 的 `Collections` 类中的排序函数。`sort` 函数接收 `List` 和 `Comparator`，并根据提供的
    `Comparator` 进行排序。


    ```

    List books = Arrays.asList("Effective Java", "Clean Code", "Refactoring");

    Collections.sort(books, (b1, b2) -> b1.length() – b2.length));

    ```


    这段代码根据书名的长度进行排序。程序的输出将是 [Refactoring, Clean Code, Effective Java]。


    代码片段中显示的表达式 `(b1, b2) -> b1.length() – b2.length()` 是一个类型为 `Comparator<String>`
    的 lambda 表达式。


    *   `(b1, b2)` 是 `Comparator` 的 `compare` 方法的参数。

    *   `b1.length() – b2.length()` 是比较两个书名长度的函数体。

    *   `->` 是 lambda 运算符，用于分隔参数和 lambda 体。

