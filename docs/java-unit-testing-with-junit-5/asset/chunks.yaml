- fmt: '### Parameterized Test


    In Chapter [4](#A429029_1_En_4_Chapter.html), we found out that JUnit 5 allows
    us to inject parameters into a test. The parameter can be injected into the test
    method or the `BeforeEach`/`AfterEach` methods. This is accomplished by implementing
    the `org.juint.jupiter.extension.Extension` interface, which could provide the
    value, and then registering it for the test by using `@ExtendWith`.


    But in case we need to inject values into the test method ONLY, we can do away
    with the custom implementation of `org.juint.jupiter.extension.Extension`. Instead
    we can annotate the test method with `org.junit.jupiter.params.ParameterizedTest`.
    We would also need to register a `ValueSource`, which is used to provide values.


    In our `bookstoread` application, we added a `findBookByTitle` method to our `Bookshelf`.
    Let’s add a test case where we would search our bookshelf for an existing title.


    ```

    @ParameterizedTest

    @ValueSource(strings = {"Effective Java", "Code Complete", "Clean Code"})

    void shouldGiveBackBooksForTitle(String title) {

    BookShelf shelf = new BookShelf();

    Book effectiveJava = new Book("Effective Java", "Joshua Bloch", LocalDate.of(2008,
    Month.MAY, 8));

    Book codeComplete = new Book("Code Complete", "Steve McConnel", LocalDate.of(2004,
    Month.JUNE, 9));

    Book mythicalManMonth = new Book("The Mythical Man-Month", "Frederick Phillips
    Brooks", LocalDate.of(1975, Month.JANUARY, 1));

    Book cleanCode = new Book("Clean Code", "Robert C. Martin", LocalDate.of(2008,
    Month.AUGUST, 1));

    shelf.add(effectiveJava, codeComplete, mythicalManMonth, cleanCode);

    List foundBooks = shelf.findBooksByTitle(title.toLowerCase());

    assertNotNull(foundBooks);

    assertEquals(1,foundBooks.size());

    foundBooks = shelf.findBooksByTitle(title.toUpperCase());

    assertNotNull(foundBooks);

    assertEquals(0,foundBooks.size());

    }

    ```


    The `shouldGiveBackBooksForTitle` test method takes a `String` as an input. The
    method then constructs a `BookShelf` with a list of `Book`s. The test case then
    asserts the specified title using the `findBooksByTitle` method.


    The `String` parameter value is specified by `@ValueSource`, used on the test
    method. The annotation takes a string array as an input and thus repeats the test
    for each value (see Figure [7-2](#A429029_1_En_7_Chapter.html#Fig2)).


    ![A429029_1_En_7_Fig2_HTML.jpg](A429029_1_En_7_Fig2_HTML.jpg)


    Figure 7-2. String parameters


    `@ValueSource` can be used to specify an array of primitive (integer/double/long)
    and `String`. The package also provides the following sources:


    *   `EnumSource`: The source can be used to inject values from an `Enum`. The
    source allows to select/deselect a subset of specified `Enum` values.

    *   `MethodSource`: The source can be used provide a `Stream`/`Array`/`Iterable`
    of values. The method must be static and must not take any arguments.

    *   `CSVSource`: The source can be used to inject a list of comma separated values.
    Each of the comma separated values can be used to match a test method argument.

    *   `CSVFileSource`: The source can be used to inject a list of comma separated
    values from a specified file. Each of the comma separated values can be used to
    match a test method argument.

    *   `ArgumentSource`: The source can be used to register a custom provider of
    `Stream<Arguments>`. The registered provider can be used to inject custom types,
    or multiple arguments (in pairs).


    Now, let’s use some of these sources for our `bookstoread` application. We can
    use a `MethodSource` to provide us an array of `BookFilter`s, which can be validated
    in isolation.


    ```

    @ParameterizedTest

    @MethodSource("bookFilterProvider")

    void validateFilterWithNullData(BookFilter filter) {

    assertThat(filter.apply(null)).isFalse();

    }

    static Stream bookFilterProvider() {

    return Stream.of(BookPublishedYearFilter.Before(2007), BookPublishedYearFilter.After(2007));

    }

    ```


    We could also register a Custom provider which can inject values in pairs. This
    can be used to simplify our `BookFilter` template test created in the previous
    section. Here as well, the test method will take a `BookFilter` and `Book[]` as
    an argument. It then validates the values of `Book[]` using the provided filter.


    ```

    @ParameterizedTest

    @ArgumentsSource(BookFilterCompositeArgsProvider.class)

    void validateBookFiltersWithBooks(BookFilter filter, Book[] books) {

    assertNotNull(filter);

    assertFalse(filter.apply(books[0]));

    assertTrue(filter.apply(books[1]));

    }

    class BookFilterCompositeArgsProvider implements ArgumentsProvider {

    @Override

    public Stream provideArguments(ExtensionContext context) {

    Book cleanCode = new Book("Clean Code", "Robert C. Martin", LocalDate.of(2008,
    Month.AUGUST, 1));

    Book codeComplete = new Book("Code Complete", "Steve McConnel", LocalDate.of(2004,
    Month.JUNE, 9));

    return Stream.of(Arguments.of(BookPublishedYearFilter.Before(2007), Arrays.array(cleanCode,
    codeComplete)),

    Arguments.of(BookPublishedYearFilter.After(2007), Arrays.array(codeComplete, cleanCode)));

    }

    }

    ```


    The `BookFilterCompositeArgsProvider` provides a stream of arguments, where each
    instance of arguments consists of two values (i.e., a `BookFilter` and a `Book[]`).


    All of the previously discussed sources are repeatable. A test can have multiple
    annotations, which could provide different sets of values. In the following test
    case we have replaced `Book[]` with an instance of a `Book`. Thus the test method
    takes a `BookFilter` and a `Book` as an argument. The test is annotated with `BeforeYearArgsProvider`,
    for values satisfying criteria for a `BeforePublishedYear` filter, and `AfterYearArgsProvider`,
    for values satisfying the `AfterPublishYear` filter.


    ```

    @ParameterizedTest(name = "{index} : Validating {1}")

    @DisplayName("Filter validates a passing book")

    @ArgumentsSource(BeforeYearArgsProvider.class)

    @ArgumentsSource(AfterYearArgsProvider.class)

    void validateBookFiltersWithBooks1(BookFilter filter, Book book) {

    assertNotNull(filter);

    assertTrue(filter.apply(book));

    }

    }

    class BeforeYearArgsProvider implements ArgumentsProvider {

    @Override

    public Stream provideArguments(ExtensionContext context) {

    Book cleanCode = new Book("Clean Code", "Robert C. Martin", LocalDate.of(2006,
    Month.AUGUST, 1));

    Book codeComplete = new Book("Code Complete", "Steve McConnel", LocalDate.of(2004,
    Month.JUNE, 9));

    return Stream.of(Arguments.of(BookPublishedYearFilter.Before(2007), cleanCode),

    Arguments.of(BookPublishedYearFilter.Before(2007), codeComplete));

    }

    }

    class AfterYearArgsProvider implements ArgumentsProvider {

    @Override

    public Stream provideArguments(ExtensionContext context) {

    Book cleanCode = new Book("Clean Code", "Robert C. Martin", LocalDate.of(2009,
    Month.AUGUST, 1));

    Book codeComplete = new Book("Code Complete", "Steve McConnel", LocalDate.of(2008,
    Month.JUNE, 9));

    return Stream.of(Arguments.of(BookPublishedYearFilter.After(2007), cleanCode),

    Arguments.of(BookPublishedYearFilter.After(2007), codeComplete));

    }

    }

    ```


    Now, in the foregoing code we have used `@DisplayName`. The annotation gives a
    meaning name to the complete test execution (consisting of all passed values).
    Additionally, each test execution can be provided a meaningful name by specifying
    the `name` attribute of `@ParametrizedTest`. In case we do not provide any name,
    the test execution generates a default name by using the injected values. Let’s
    now run our complete test (see Figure [7-3](#A429029_1_En_7_Chapter.html#Fig3)).


    ![A429029_1_En_7_Fig3_HTML.jpg](A429029_1_En_7_Fig3_HTML.jpg)


    Figure 7-3. Parameterized test result


    ## Summary


    In this chapter, we started our discussion by learning about JUnit 5’s new extension
    API. We discovered that the extension API supports all life cycle phases of test
    execution. The API also supports conditional test execution as well as exceptions
    generated during test execution. The JUnit 5 package uses the extension API to
    provide a host of features like default providers, test templates, and parameterized
    tests.'
