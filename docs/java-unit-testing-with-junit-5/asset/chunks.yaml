- fmt: '### Ant


    `Ant` is one of the oldest and one of most versatile tools for project automation.
    It is based on a `build.xml` file which configures tasks that need to run on a
    project. Each of these tasks can be chained with other tasks to define an order
    of execution. `Ant` defines build invocation as an "target". A project can have
    multiple targets which may have been chained together to define a complete build
    cycle. In this section, we will configure `Ant` to run our `JUnit5`-based tests
    as part of the project build. This section assumes knowledge of `Ant`.


    Before we start creating a `build.xml`, let''s make sure that we have `Ant` in
    our OS `PATH`. The latest version of `Ant` can be downloaded from [`http://ant.apache.org`](http://ant.apache.org).
    Extract the archived artifact and append it to the `PATH` variable. Verify if
    it works as expected.


    ```

    $ ant -version

    Apache Ant(TM) version 1.9.3 compiled on April 8 2014

    ```


    `Ant` has a number of extensions which can perform different tasks. `Apache Ivy`
    is one such extension which is used to perform dependency resolution. In the absence
    of a dependency manager, we would need to keep project dependencies as part of
    our source. `Ivy` makes it possible to express all project dependencies in an
    `Ivy.xml`. It downloads all the required dependencies when the build is executed.
    In order to add the `ivy` extension, download the latest version from [`http://ant.apache.org/ivy/`](http://ant.apache.org/ivy/).
    Extract the archive and copy the `ivy-{version}.jar` to `${ANT_HOME}/lib` directory.


    Now, let''s add a `build.xml` which could do the following:


    *   Compile the src files.

    *   Compile the test files.

    *   Run the tests and publish a report for it.


    The foregoing build downloads the dependencies expressed in the `ivy.xml`. It
    then invokes the `javac` task to compile src. Next, it adds the downloaded libs
    to the classpath and invokes the `javac` task again to compile the test code.


    The build only compiles code. But how do we invoke the tests? There is "junit"
    `Ant` task which can run unit tests. But the task only runs `JUnit4`-based test
    cases. Thus the task is unsuitable for our `JUnit 5`-based tests.


    The `JUnit5` team provides a console launcher which can execute tests on the console.
    The runner gives the process output as 1 or 0 based on a test''s success or failure,
    respectively. The runner has a host of options to discover and execute tests.
    The console runner can be downloaded from maven central. Since the `1.0.1` is
    the currently available latest version, the same can be downloaded from [`http://central.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.0.1/junit-platform-console-standalone-1.0.1.zip`](http://central.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.0.1/junit-platform-console-standalone-1.0.1.zip).


    Extract the zip in our `bookstoread` project. Run the tests using the console
    launcher (see Figure [6-2](#A429029_1_En_6_Chapter.html#Fig2)) using the following
    command:


    ![A429029_1_En_6_Fig2_HTML.jpg](A429029_1_En_6_Fig2_HTML.jpg)


    Figure 6-2. Console launcher


    ```

    java -jar lib/junit-platform-console-standalone-1.0.1.jar --scan-classpath -cp
    lib/build/classes

    ```


    The foregoing command does the following:


    *   Discovers the jupiter engine which has been added to the classpath.

    *   `-scan-classpath` tries to find test cases which are part of the classpath.

    *   The command does not execute any tests as our test suffix (`*spec`) does not
    match the default convention.


    The command provides `-n` option to execute classes matching the passed pattern.
    Thus we can add `-n "^.*Spec?$"` to discover our test cases. We would also need
    to add the required dependencies of `assertj` and `mockito` to the classpath.


    Since the console runner can execute all our test cases, we can also add the same
    to our `Ant` `build.xml`. The complete approach consists of the following build
    steps:


    1.  Configure `Ivy.xml` to download the archive. It is important to note that
    we need the zip archive and not the jar (as with other dependencies).

    2.  Extract the archive to a separate directory.

    3.  Execute the console runner using the `exec` `Ant` task.

    4.  Additionally, we can pass a `-reports-dir` argument to the console runner.
    This will create an XML-based report in the specified directory.

    5.  The XML-based test report can be converted to HTML by using the `junitreport`
    task.


    ### Code Coverage


    Code coverage is an important metric captured via the execution of test cases.
    It is a metric expressed as a percentage of a project being tested by its test
    suite. There are many tools (paid and open source) which can be used to determine
    the coverage. Most of these tools have extensions/plug-ins which can be integrated
    with the project build tool. In this section, we will work with the Java Code
    Coverage (`JaCoCo`) tool. It is an open source tool, works well with all versions
    of Java, and integrates well with various tools like `IntelliJ Idea`, `Gradle`,
    `Ant`, `Jenkins`, and others. In the following section we will integrate `JaCoCo`
    with our project build.


    #### Gradle Extension


    The `JaCoCo` tool provides a `Gradle` plug-in. The plug-in is integrated with
    the `Gradle` test plug-in. But since `JUnit 5` tests are not executed by the default
    `Gradle` test plug-in, the coverage of the same cannot be determined. We need
    to configure `jacoco` with the `junit-platform` test plug-in provided by the `JUnit
    5` team. Now, let''s add the plug-in to our `build.gradle` and try to configure
    it with `junitPlatformTest`.


    ```

    apply plugin: ''jacoco''

    sourceCompatibility = 1.8

    repositories {

    mavenCentral()

    }

    // Rest removed for Brevity

    jacoco {

    toolVersion = ''0.7.4.201502262128''

    applyTo junitPlatformTest

    }

    ```


    The foregoing configuration will generate a code coverage result as a binary file.
    We need a `jacoco` reporting task to convert the binary file into an xml/html
    report. Now, let''s run the gradle build to generate coverage.


    The build failed as the `jacoco` configuration was unable to find the required
    `junitPlatformTest` plug-in (see Figure [6-3](#A429029_1_En_6_Chapter.html#Fig3)).
    This is because the plug-in is not available during project initialization. It
    is available only after the project has been evaluated by the `Gradle Runner`.
    Now we only need to configure the `jacoco` plug-in in the `afterEvaluate` section
    of the project. Let''s also add the `jacoco` reporting task; the complete configuration
    should look as follows:


    ![A429029_1_En_6_Fig3_HTML.jpg](A429029_1_En_6_Fig3_HTML.jpg)


    Figure 6-3. Gradle `JaCoCo` failure


    ```

    afterEvaluate {

    jacoco {

    toolVersion = ''0.7.4.201502262128''

    applyTo junitPlatformTest

    }

    task junit5JacocoReport(type:JacocoReport, dependsOn : junitPlatformTest){

    executionData junitPlatformTest

    sourceDirectories = files(sourceSets.main.allSource.srcDirs)

    classDirectories = files(sourceSets.main.output)

    reports {

    xml.enabled = true

    html.enabled = true

    }

    }

    build.dependsOn junit5JacocoReport

    }

    ```


    Now make a build to get a `jacoco` report (see Figure [6-4](#A429029_1_En_6_Chapter.html#Fig4)).


    ![A429029_1_En_6_Fig4_HTML.jpg](A429029_1_En_6_Fig4_HTML.jpg)


    Figure 6-4. `Jacoco` coverage report


    #### Maven Extension


    The `Maven` plug-in for `jacoco` (`jacoco-maven-plugin`) works out-of-box for
    `JUnit 5`-based tests. Here also, just like `Gradle`, we first determine the code
    coverage result in a binary file and then convert it into a report. The `Maven`
    plug-in has different goals that are configured to accomplish these tasks. The
    following `POM` configuration generates a coverage report for our `bookstoread.com`:


    ```

    org.jacoco

    jacoco-maven-plugin


    pre-unit-test


    prepare-agent


    ${project.build.directory}/coverage-reports/jacoco-ut.exec


    surefireArgLine


    post-unit-test

    test


    report


    ${project.build.directory}/coverage-reports/jacoco-ut.exec


    ${project.reporting.outputDirectory}/jacoco-ut


    ```'
  raw: '### Ant


    Ant is one of the oldest and one of most versatile tools for project automation.
    It is based on a build.xml file which configures tasks that need to run on a project.
    Each of these tasks can be chained with other tasks to define an order of execution.
    Ant defines build invocation as an “arget .” A project can have multiple targets
    which may have been chained together to define a complete build cycle. In this
    section, we will configure Ant to run out JUnit5-based tests as part of the project
    build. This section assumes knowledge of Ant.


    Before we start creating a build.xml, let’s make sure that we have Ant in our
    OS PATH. The latest version of Ant can be downloaded from [`http://ant.apache.org`](http://ant.apache.org)
    . Extract the archived artifact and append it to the PATH variable. Verify if
    it works as expected.


    ```

    $ ant -version

    Apache Ant(TM) version 1.9.3 compiled on April 8 2014

    ```


    Ant has a number of extensions which can perform different tasks. Apache Ivy is
    one such extension which is used to perform dependency resolution. In the absence
    of a dependency manager, we would need to keep project dependencies as part of
    our source. Ivy makes it possible to express all project dependencies in an Ivy.xml.
    It downloads all the required dependencies when the build is executed. In order
    to add the ivy extension, download the latest version from [`http://ant.apache.org/ivy/`](http://ant.apache.org/ivy/)
    . Extract the archive and copy the ivy.-{version}.jar to ${ ANT_HOME }/lib directory.


    Now, let’s add a build.xml which could do the following:


    *   Compile the src files .

    *   Compile the test files.

    *   Run the tests and publish a report for it.


    The foregoing build downloads the dependencies expressed in the ivy.xml. It then
    invokes the javac task to compile src. Next, it adds the downloaded libs to the
    classpath and invokes the javac task again to compile the test code.


    The build only compiles code. But how do we invoke the tests? There is “junit”
    Ant task which can run unit tests. But the task only runs JUnit4-based test cases.
    Thus the task is unsuitable for our JUnit 5-based tests.


    The JUnit5 team provides a console launcher which can execute tests on the console.
    The runner gives the process output as 1 or 0 based on a test’s success or failure,
    respectively. The runner has a host of options to discover and execute tests.
    The console runner can be downloaded from maven central. Since the 1.0.1 is the
    currently available latest version, the same can be downloaded from [`http://central.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.0.1/junit-platform-console-standalone-1.0.1.zip`](http://central.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.0.1/junit-platform-console-standalone-1.0.1.zip)
    .


    Extract the zip in our `bookstoread` project. Run the tests using the console
    launcher (see Figure [6-2](#A429029_1_En_6_Chapter.html#Fig2)) using the following
    command:


    ![A429029_1_En_6_Fig2_HTML.jpg](A429029_1_En_6_Fig2_HTML.jpg)


    Figure 6-2.


    Console launcher


    ```

    java -jar lib/junit-platform-console-standalone-1.0.1.jar --scan-classpath -cp
    lib/build/classes

    ```


    The foregoing command does the following:


    *   Discovers the jupiter engine which has been added to the classpath.

    *   ‘-scan-classpath’ tries to find test cases which are part of the classpath.

    *   The command does not execute any tests as our test suffix (*spec) does not
    match the default convention.


    The command provides -n option to execute classes matching the passed pattern.
    Thus we can add ‘-n "^.*Spec?$"’ to discover our test cases. We would also need
    to add the required dependencies of assertj and mockito to the classpath.


    Since the console runner can execute all our test cases, we can also add the same
    to our Ant build.xml. The complete approach consists of the following build steps:


    1.  Configure Ivy.xml to download the archive. It is important to note that we
    need the zip archive and not the jar (as with other dependencies). 

    2.  Extract the archive to a separate directory.  

    3.  Execute the console runner using the exec Ant task.  

    4.  Additionally, we can pass a `-reports-dir` argument to the console runner.
    This will create an XML-based report in the specified directory.  

    5.  The XML-based test report can be converted to HTML by using the junitreport
    task.


    ### Code Coverage


    Code coverage is an important metric captured via the execution of test cases.
    It is a metric expressed as a percentage of a project being tested by its test
    suite. There are many tools (paid and open source) which can be used to determine
    the coverage. Most of these tools have extensions/plug-ins which can be integrated
    with the project build tool. In this section, we will work with the Java Code
    Coverage (JaCoCo) tool . It is an open source tool, works well with all versions
    of Java, and integrates well with various tools like IntelliJ Idea, Gradle, Ant,
    Jenkins, and others. In the following section we will integrate JaCoCo with our
    project build.


    #### Gradle Extension


    The JaCoCo tool provides a Gradle plug-in. The plug-in is integrated with the
    Gradle test plug-in. But since JUnit 5 tests are not executed by the default Gradle
    test plug-in, so the coverage of the same cannot be determined. We need to configure
    jacoco with the junit-platform test plug-in provided by the JUnit 5 team. Now,
    let’s add the plug-in to our build.gradle and try to configure it with `junitPlatformTest`.


    ```

    apply plugin: ''jacoco''

    sourceCompatibility = 1.8

    repositories {

    mavenCentral()

    }

    // Rest removed for Brevity

    jacoco {

    toolVersion = ''0.7.4.201502262128''

    applyTo junitPlatformTest

    }

    ```


    The foregoing configuration will generate a code coverage result as a binary file.
    We need a `jacoco` reporting task to convert the binary file into an xml/html
    report. Now, let’s run the gradle build to generate coverage.


    The build failed as the `jacoco` configuration was unable to find the required
    `junitPlatformTest` plug-in (see Figure [6-3](#A429029_1_En_6_Chapter.html#Fig3)).
    This is because the plug-in is not available during project initialization . It
    is available only after the project has been evaluated by the Gradle Runner. Now
    we only need to configure the `jacoco` plug-in in the `afterEvaluted` section
    of the project. Let’s also add the `jacoco` reporting task; the complete configuration
    should look as follows:


    ![A429029_1_En_6_Fig3_HTML.jpg](A429029_1_En_6_Fig3_HTML.jpg)


    Figure 6-3.


    Gradle `JaCoCo` failure


    ```

    afterEvaluate {

    jacoco {

    toolVersion = ''0.7.4.201502262128''

    applyTo junitPlatformTest

    }

    task junit5JacocoReport(type:JacocoReport, dependsOn : junitPlatformTest){

    executionData junitPlatformTest

    sourceDirectories = files(sourceSets.main.allSource.srcDirs)

    classDirectories = files(sourceSets.main.output)

    reports {

    xml.enabled = true

    html.enabled = true

    }

    }

    build.dependsOn junit5JacocoReport

    }

    ```


    Now make a build to get a `jacoco` report (see Figure [6-4](#A429029_1_En_6_Chapter.html#Fig4)).


    ![A429029_1_En_6_Fig4_HTML.jpg](A429029_1_En_6_Fig4_HTML.jpg)


    Figure 6-4.


    `Jacoco` coverage report


    #### Maven Extension


    The Maven plug-in for `jacoco` (jacoco-maven-plugin) works out-of-box for JUnit
    5-based tests. Here also, just like Gradle, we first determine the code coverage
    result in a binary file and then convert it into a report. The Maven plug-in has
    different goals that are configured to accomplish these tasks. The following POM
    configuration generates a coverage report for our bookstoread.com:


    ```

    org.jacoco

    jacoco-maven-plugin


    pre-unit-test


    prepare-agent


    ${project.build.directory}/coverage-reports/jacoco-ut.exec


    surefireArgLine


    post-unit-test

    test


    report


    ${project.build.directory}/coverage-reports/jacoco-ut.exec


    ${project.reporting.outputDirectory}/jacoco-ut


    ```'
  trans: '

    ### Ant


    Ant 是历史最悠久、功能最全面的项目自动化工具之一。它基于一个名为 `build.xml` 的文件，该文件配置了项目需要运行的任务。每个任务都可以与其他任务链接，以定义执行顺序。Ant
    将构建调用定义为一个“目标”。一个项目可以有多个目标，这些目标可以链接在一起，以定义一个完整的构建周期。在本节中，我们将配置 Ant，使其在项目构建过程中运行基于
    JUnit5 的测试。本节假定读者已了解 Ant。


    在开始创建 `build.xml` 之前，请确保我们的操作系统 PATH 中已包含 Ant。可以从 [`http://ant.apache.org`](http://ant.apache.org)
    下载最新版本的 Ant。解压归档文件，并将其路径添加到 PATH 变量中。验证其是否按预期工作。


    ```

    $ ant -version

    Apache Ant(TM) version 1.9.3 compiled on April 8 2014

    ```


    Ant 有许多扩展，可以执行不同的任务。Apache Ivy 就是这样一个扩展，用于执行依赖解析。在没有依赖管理器的情况下，我们需要将项目依赖项作为源代码的一部分保留。Ivy
    使得在 Ivy.xml 中表达所有项目依赖项成为可能。当执行构建时，它会下载所有必需的依赖项。要添加 Ivy 扩展，请从 [`http://ant.apache.org/ivy/`](http://ant.apache.org/ivy/)
    下载最新版本。解压归档文件，并将 `ivy-{version}.jar` 复制到 `${ANT_HOME}/lib` 目录。


    现在，让我们添加一个能够执行以下操作的 `build.xml`：


    *   编译 src 文件。

    *   编译测试文件。

    *   运行测试并发布报告。


    上述构建会下载 `ivy.xml` 中声明的依赖项。然后，它调用 `javac` 任务来编译源代码。接着，它将下载的库添加到类路径中，并再次调用 `javac`
    任务来编译测试代码。


    该构建仅编译代码。但我们如何调用测试呢？有一个“junit” Ant 任务可以运行单元测试。但该任务只运行基于 JUnit4 的测试用例。因此，该任务不适用于我们基于
    JUnit 5 的测试。


    JUnit5 团队提供了一个控制台启动器，可以在控制台上执行测试。该运行器根据测试的成功或失败，分别将进程输出设为 1 或 0。该运行器具有大量用于发现和执行测试的选项。可以从
    Maven 中央仓库下载控制台运行器。由于 1.0.1 是目前可用的最新版本，可以从 [`http://central.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.0.1/junit-platform-console-standalone-1.0.1.zip`](http://central.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.0.1/junit-platform-console-standalone-1.0.1.zip)
    下载。


    在我们的 `bookstoread` 项目中解压 zip 文件。使用以下命令通过控制台启动器运行测试（见图 6-2）：


    ![A429029_1_En_6_Fig2_HTML.jpg](img/A429029_1_En_6_Fig2_HTML.jpg)


    图 6-2.


    控制台启动器


    ```

    java -jar lib/junit-platform-console-standalone-1.0.1.jar --scan-classpath -cp
    lib/build/classes

    ```


    上述命令执行以下操作：


    *   发现已添加到类路径中的 Jupiter 引擎。

    *   ‘-scan-classpath’ 尝试查找属于类路径一部分的测试用例。

    *   该命令不会执行任何测试，因为我们的测试后缀（*spec）与默认约定不匹配。


    该命令提供 `-n` 选项来执行与传递的模式匹配的类。因此，我们可以添加 `-n "^.*Spec?$"` 来发现我们的测试用例。我们还需要将 assertj
    和 mockito 的必需依赖项添加到类路径中。


    由于控制台运行器可以执行我们所有的测试用例，我们也可以将其添加到我们的 Ant build.xml 中。完整的方法包括以下构建步骤：


    1.  配置 Ivy.xml 以下载归档文件。需要注意的是，我们需要的是 zip 归档文件，而不是 jar 文件（与其他依赖项一样）。

    2.  将归档文件解压到单独的目录。

    3.  使用 exec Ant 任务执行控制台运行器。

    4.  此外，我们可以向控制台运行器传递一个 `-reports-dir` 参数。这将在指定目录中创建一个基于 XML 的报告。

    5.  可以使用 `junitreport` 任务将基于 XML 的测试报告转换为 HTML。


    ### 代码覆盖率


    代码覆盖率是通过执行测试用例捕获的一个重要指标。它是一个以百分比表示的指标，表示项目被其测试套件测试的程度。有许多工具（付费和开源）可用于确定覆盖率。这些工具中的大多数都有扩展/插件，可以与项目构建工具集成。在本节中，我们将使用
    Java 代码覆盖率（JaCoCo）工具。它是一个开源工具，与所有版本的 Java 都能很好地配合，并且与 IntelliJ Idea、Gradle、Ant、Jenkins
    等各种工具集成良好。在下一节中，我们将把 JaCoCo 集成到我们的项目构建中。


    #### Gradle 扩展


    JaCoCo 工具提供了一个 Gradle 插件。该插件与 Gradle 测试插件集成。但由于 JUnit 5 测试不是由默认的 Gradle 测试插件执行的，因此无法确定其覆盖率。我们需要将
    jacoco 与 JUnit 5 团队提供的 junit-platform 测试插件一起配置。现在，让我们将插件添加到我们的 `build.gradle`
    中，并尝试将其与 `junitPlatformTest` 一起配置。


    ```

    apply plugin: ''jacoco''

    sourceCompatibility = 1.8

    repositories {

    mavenCentral()

    }

    // 为简洁起见，省略其余部分

    jacoco {

    toolVersion = ''0.7.4.201502262128''

    applyTo junitPlatformTest

    }

    ```


    上述配置将生成一个二进制文件形式的代码覆盖率结果。我们需要一个 `jacoco` 报告任务来将二进制文件转换为 xml/html 报告。现在，让我们运行 gradle
    构建以生成覆盖率。


    构建失败，因为 `jacoco` 配置无法找到所需的 `junitPlatformTest` 插件（见图 6-3）。这是因为该插件在项目初始化期间不可用。只有在
    Gradle 运行器评估项目之后，它才可用。现在我们只需要在项目的 `afterEvaluate` 部分配置 `jacoco` 插件。让我们也添加 `jacoco`
    报告任务；完整的配置应如下所示：


    ![A429029_1_En_6_Fig3_HTML.jpg](img/A429029_1_En_6_Fig3_HTML.jpg)


    图 6-3.


    Gradle `JaCoCo` 失败


    ```

    afterEvaluate {

    jacoco {

    toolVersion = ''0.7.4.201502262128''

    applyTo junitPlatformTest

    }

    task junit5JacocoReport(type:JacocoReport, dependsOn : junitPlatformTest){

    executionData junitPlatformTest

    sourceDirectories = files(sourceSets.main.allSource.srcDirs)

    classDirectories = files(sourceSets.main.output)

    reports {

    xml.enabled = true

    html.enabled = true

    }

    }

    build.dependsOn junit5JacocoReport

    }

    ```


    现在进行构建以获取 `jacoco` 报告（见图 6-4）。


    ![A429029_1_En_6_Fig4_HTML.jpg](img/A429029_1_En_6_Fig4_HTML.jpg)


    图 6-4.


    `Jacoco` 覆盖率报告


    #### Maven 扩展


    用于 `jacoco` 的 Maven 插件（jacoco-maven-plugin）开箱即用，适用于基于 JUnit 5 的测试。与 Gradle 一样，我们首先确定二进制文件中的代码覆盖率结果，然后将其转换为报告。Maven
    插件有不同的目标，这些目标被配置来完成这些任务。以下 POM 配置为我们的 bookstoread.com 生成了覆盖率报告：


    ```

    org.jacoco

    jacoco-maven-plugin


    pre-unit-test


    prepare-agent


    ${project.build.directory}/coverage-reports/jacoco-ut.exec


    surefireArgLine


    post-unit-test

    test


    report


    ${project.build.directory}/coverage-reports/jacoco-ut.exec


    ${project.reporting.outputDirectory}/jacoco-ut


    ```

