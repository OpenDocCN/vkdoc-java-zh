- fmt: '# Dependency Injection


    One of the software design patterns that has been very useful in the last decade
    for simplifying software design is dependency injection (DI). According to Wikipedia,


    > Dependency injection is a technique whereby one object supplies the dependencies
    of another object.


    DI is a widely used pattern in the Java ecosystem. It was popularized by the Spring
    framework in early 2000. DI is all about making dependencies of an object explicit.
    They ease testing as you can inject stubs or mocks as dependencies, thus giving
    you control and power to test your component in isolation. DI prohibits the use
    of `new` (for creating objects) or static factory methods within a class. A component
    should expose methods/fields which could be injected with the required objects.
    A DI provider will be responsible for creating instances of dependencies, injecting
    them into the required component, and managing their life cycle.


    JUnit 5 provides support for DI with its extension mechanism. In JUnit 5, you
    can inject dependencies into either test methods or constructors. This is a big
    change from earlier versions of JUnit where test methods and constructors were
    required to be no-arg. This makes test code flexible as you can declare dependencies
    at places where you need them.


    Let’s look at how we can use DI to clean up `BookShelfSpec` tests we have written
    in Chapter [3](#A429029_1_En_3_Chapter.html). If you remember, our `BookShelfSpec`
    initialized test data in its `@BeforeEach init` method as shown in the code that
    follows:


    ```

    public class BookShelfSpec {

    private BookShelf shelf;

    private Book effectiveJava;

    private Book codeComplete;

    private Book mythicalManMonth;

    private Book cleanCode;

    @BeforeEach

    void init() {

    shelf = new BookShelf();

    effectiveJava = new Book("Effective Java", "Joshua Bloch", LocalDate.of(2008,
    Month.MAY, 8));

    codeComplete = new Book("Code Complete", "Steve McConnel", LocalDate.of(2004,
    Month.JUNE, 9));

    mythicalManMonth = new Book("The Mythical Man-Month", "Frederick Phillips Brooks",
    LocalDate.of(1975, Month.JANUARY, 1));

    cleanCode = new Book("Clean Code", "Robert C. Martin", LocalDate.of(2008, Month.AUGUST,
    1));

    }

    // rest removed for brevity

    }

    ```


    The aforementioned code has several problems.


    - The test code is tightly coupled with test data. What if we want to run `BookShelfSpec`
    with different data based on some condition?

    - We can’t reuse test data. Most of the time multiple test classes need the same
    data. One way we can reuse test data is by creating a utility method that can
    be called to get the test data. This solution works fine, but it does not make
    programmer intent clear (i.e., to inject test data).


    Now, that we understand the problem we are trying to solve let’s learn how JUnit
    5 can help us solve it. We will start by injecting test data into the `init` method
    as shown in the code that follows:


    ```

    public class BookShelfSpec {

    private BookShelf shelf;

    private Book effectiveJava;

    private Book codeComplete;

    private Book mythicalManMonth;

    private Book cleanCode;

    @BeforeEach

    void init(Map books) {

    shelf = new BookShelf();

    this.effectiveJava = books.get("Effective Java");

    this.codeComplete = books.get("Code Complete");

    this.mythicalManMonth = books.get("The Mythical Man-Month");

    this.cleanCode = books.get("Clean Code");

    }

    }

    ```


    In the foregoing code, we injected `Map<String, Book>` to the `init` method. The
    key used for `Map` is book title and the value is `Book` itself. To minimize the
    changes in our tests, we assigned values to different `Book` instance variables.
    This will make sure all our tests continue to work as usual. Our tests are no
    longer concerned with creation of books test data; instead they expect the test
    data to be injected.


    The DI API allows us to inject values into all phases of the JUnit life cycle.
    If there is a parameter in a test method annotated with `@BeforeAll`, `@BeforeEach`,
    `@Test`, `@AfterEach`, or `@AfterAll`, the framework would try to determine its
    value and inject it.


    But how will JUnit 5 inject the test data into our `init` method?


    JUnit 5 introduced the concept of `ParameterResolver`, which provides an API to
    resolve parameters at runtime. You can either use a built-in parameter resolver
    like `TestInfoParameterResolver` or provide your own resolver by implementing
    `ParameterResolver` interface. `ParameterResolver` is part of the JUnit 5 extension
    mechanism, which we will cover in a chapter [8](#A429029_1_En_8_Chapter.html).
    To make your test aware of your own custom resolver, you should annotate your
    test class with the `ExtendWith` annotation, providing it the resolver class as
    shown in the following code:


    ```

    @DisplayName("A bookshelf")

    @ExtendWith(BooksParameterResolver.class)

    public class BookShelfSpec {

    private BookShelf shelf;

    private Book effectiveJava;

    private Book codeComplete;

    private Book mythicalManMonth;

    private Book cleanCode;

    @BeforeEach

    void init(Map books) {

    shelf = new BookShelf();

    this.effectiveJava = books.get("Effective Java");

    this.codeComplete = books.get("Code Complete");

    this.mythicalManMonth = books.get("The Mythical Man-Month");

    this.cleanCode = books.get("Clean Code");

    }

    // rest removed for brevity

    }

    ```


    Let’s look at what it takes to implement the `BooksParameterResolver` class.


    ```

    import org.junit.jupiter.api.extension.ExtensionContext;

    import org.junit.jupiter.api.extension.ParameterContext;

    import org.junit.jupiter.api.extension.ParameterResolutionException;

    import org.junit.jupiter.api.extension.ParameterResolver;

    class BooksParameterResolver implements ParameterResolver {

    @Override

    public boolean supportsParameter(final ParameterContext parameterContext, final
    ExtensionContext extensionContext) throws ParameterResolutionException {

    return false;

    }

    @Override

    public Object resolveParameter(final ParameterContext parameterContext, final
    ExtensionContext extensionContext) throws ParameterResolutionException {

    return null;

    }

    }

    ```


    A class needs to implement the `ParameterResolver` interface so that it is considered
    for parameter resolution. The `ParameterResolver` interface has two methods that
    your custom implementation must implement.


    - `supportsParameter` method validates if the implementation can provide the resolution
    for the asked parameter. The `BooksParameterResolver` needs to validate that it
    supports objects of type `Map<String, Book>`.

    - `resolveParameter` method returns the value for the asked parameter. The `BooksParameterResolver`
    returns a `Map` containing books.


    Let’s look at the complete implementation of `BooksParameterResolver` in the following
    manner:'
