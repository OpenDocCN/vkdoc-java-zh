    \    }\n    }\n    ```\n\n    在上述代码中，我们首先创建了一个 `ExpectedException` 实例，然后告诉 `expectedException`\
    \ 规则我们在测试执行期间期望什么。JUnit 4 的规则机制允许我们验证抛出的异常和消息。这种方法也存在局限性，即我们无法缩小抛出异常的代码范围。这意味着你的测试可能因为错误的原因而通过。\n\
    \nJUnit 5 对 Rule API 的支持有限。JUnit 5 支持 `ExpectedException` 规则。这意味着你仍然可以运行使用 `ExpectedException`\
    \ Rule API 编写的现有测试。我们将在本章后面介绍它。\n\n## JUnit 5 方式：使用 assertThrows 断言方法\n\nJUnit\
    \ 5 的 `Assertions` 类提供了一个 `org.junit.jupiter.api.Assertions.assertThrows` 方法，让你能够以清晰易读的方式编写代码来验证异常及其关联消息。它还允许你缩小抛出异常的代码范围，从而避免\
    \ JUnit 4 方法的问题。以下代码重构了测试用例以使用 `assertThrows` 方法：\n\n```\n@Test\nvoid throwsExceptionWhenBooksAreAddedAfterCapacityIsReached()\
    \ {\nBookShelf bookShelf = new BookShelf(2);\nbookShelf.add(effectiveJava, codeComplete);\n\
    BookShelfCapacityReached throwException = assertThrows(BookShelfCapacityReached.class,\
