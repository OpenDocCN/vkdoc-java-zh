  trans: '

    ### Streams API


    Streams 提供了一种更高层次的抽象，让你能以声明式的方式表达 Java 集合中的计算。这类似于你使用 SQL 以声明式方式查询数据库中的数据。声明式意味着开发者编写他们想要做什么，而不是指定所有关于数据应如何查询的指令。Streams
    仅提供只读操作，它们永远不会改变底层的集合。


    以下是 Java 7 中执行集合处理的示例代码片段：


    ```

    public class ExampleJava7 {

    public static void main(String[] args) {

    List books = getBooks();

    List programmingBooks = new ArrayList();

    for (Book book : books) {

    if (book.getType() == BookType.PROGRAMMING) {

    programmingBooks.add(book);

    }

    }

    Collections.sort(programmingBooks, new Comparator() {

    @Override

    public int compare(Book b1, Book b2) {

    return b1.getTitle().length() – b2.getTitle().length();

    }

    });

    for (Book book:  programmingBooks) {

    System.out.println(book.getTitle());

    }

    }

    }

    ```


    这段代码会打印所有编程类书籍的标题，按标题长度排序，最后输出到控制台。Java 7 开发者每天都会编写这类代码。为了编写这样一个简单的程序，我们不得不写了
    15 行 Java 代码。上述代码更大的问题不在于开发者需要编写的行数，而在于其意图（即过滤书籍、按标题长度排序，最后打印它们）。


    我们可以使用 Java 8 的 Stream API 来简化上述代码，如下所示：


    ```

    public class ExampleJava8Stream {

    public static void main(String[] args) {

    List books = getBooks();

    List programmingBookTitles = books.stream()

    .filter(book -> book.getType() == BookType.PROGRAMMING)

    .sorted((b1, b2) -> b1.getTitle().length() – b2.getTitle().length())

    .map(Book::getTitle)

    .collect(Collectors.toList());

    programmingBookTitles.forEach(System.out::println);

    }

    }

    ```


    这段代码构建了一个包含多个流操作的管道，接下来将逐一讨论每个操作。


    *   `stream()`：通过在源集合（即 `tasks List<Book>`）上调用 `stream()` 方法来创建一个流管道。

    *   `filter(Predicate<T>)`：此操作提取流中符合谓词定义条件的元素。一旦你有了一个流，就可以对其调用零个或多个中间操作。Lambda
    表达式 `book -> book.getType() == BookType.PROGRAMMING` 定义了一个谓词，用于过滤所有编程类书籍。该 Lambda
    表达式的类型是 `java.util.function.Predicate<Book>`。

    *   `sorted(Comparator<T>)`：此操作返回一个流，其中包含所有按 Lambda 表达式定义的比较器（即上面示例中的 `(b1, b2)
    -> b1.getTitle().length() – b2.getTitle().length()`）排序后的流元素。

    *   `map(Function<T,R>)`：此操作在对流中的每个元素应用 `Function<T,R>` 后返回一个流。

    *   `collect(toList())`：此操作将对流执行操作的结果收集到一个 `List` 中。


    ### Optional<T>


    Java 8 引入了一种新的数据类型 `java.util.Optional<T>`，它封装了一个空值。这使得 API 的意图更加清晰。如果一个函数返回 `Optional<T>`
    类型的值，那么它就是在告诉调用者该值可能不存在。使用 `Optional` 数据类型可以明确地告知 API 调用者何时应预期一个可选值。使用 `Optional`
    类型的目的是帮助 API 设计者通过查看方法签名，让调用者清楚地知道他们是否应该预期一个可选值。`Optional` API 中包含三种创建方法。


    *   `Optional.empty`：当值不存在时，用于创建一个 `Optional`。与其返回 null，不如返回 `Optional.empty`。

    *   `Optional.of(T value)`：用于从一个非空值创建 Optional。当值为 null 时，它会抛出 `NullPointerException`。你可以这样使用它：`Optional<String>
    mayBeName = Optional.of(name)`。

    *   `Optional.ofNullable(T value)`：这是一个静态工厂方法，适用于 null 和非 null 值。对于 null 值，它会创建一个空的
    `Optional`；对于非 null 值，它会使用该值创建一个 `Optional`。

