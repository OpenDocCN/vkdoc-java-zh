    import java.util.List;\npublic class BookShelf {\npublic List books() {\nreturn\
    \ Collections.emptyList();\n}\n}\n```\n\n让我们编写第二个测试用例，它将验证如果我们向书架添加两本书，书架将包含两本书。我们将保持简单，使用`String`来表示书籍。我们将推迟到合适的时候再决定为书籍创建领域对象。我们的测试将帮助我们决定何时应该为书籍使用合适的类型。\n\
