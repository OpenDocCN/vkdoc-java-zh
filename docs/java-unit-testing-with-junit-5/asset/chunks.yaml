    ## 总结


    在本章中，你学习了如何在出现异常时断言测试的正确行为。你学习了如何应用各种策略来处理异常。


    在第 6 章中，我们将讨论如何将 JUnit 5 与你的工具集成。我们将涵盖构建工具、代码覆盖率、IDE 以及更多内容。


    # 6. 集成工具


    到目前为止，我们一直在 IntelliJ Idea 中进行开发。我们使用了 JUnit 5 的各种功能，并研究了做事的新方法。但是 Java 生态系统中存在大量的工具。工具有很多类别——构建工具、集成开发环境（IDE）、持续集成（CI）工具等等。每个类别都为开发者提供了多种选择。在本章中，我们将研究如何将
    JUnit 5 与我们选择的工具集成。我们将首先将 JUnit 5 与我们选择的构建工具集成。然后，我们将集成代码覆盖率指标。最后，我们将使用其他 IDE。


    ## 构建工具


    构建工具负责自动化项目构建。构建工具的任务不仅限于源代码编译和二进制文件创建。它还涉及执行任何其他过程，如单元测试、静态代码分析、二进制文件上传等。Java
    生态系统中有许多构建工具，其中 Apache Ant、Maven 和 Gradle 是最常采用的。对于这些工具中的每一个，都有大量的插件目录可以执行各种操作。但在本章中，我们将专注于围绕单元测试的任务。默认的单元测试插件/扩展基于旧版本的
    JUnit。因此，它们不适用于 JUnit 5 测试。让我们看看如何用这些构建工具中的每一个来执行基于 JUnit 5 的测试。我们将从 Gradle 开始，因为我们的
    bookstoread 应用程序是基于它的。

    '
- fmt: '### Gradle


    Gradle 构建工具最初借鉴了其前身（如 Ant 和 Maven）的许多概念。它接收一个 `build.gradle` 文件作为输入，以确定项目构建的步骤。需要注意的是，构建文件是用
    Groovy 编写的，而不是其他工具事实上的标准 XML。Gradle 遵循 Maven 的“约定优于配置”方法，其中大多数代码构建实践都使用通用的默认值进行配置；例如，所有源代码都放在
    `src/main/java` 下，测试代码放在 `src/test/java` 下。


    到目前为止，对于我们的 `bookstoread` 项目，我们添加了一个 `build.gradle` 文件（在[第 1 章](#A429029_1_En_1_Chapter.html)中）。该构建文件将源代码描述为一个
    Java 项目。它还列出了所有必需的依赖项以及从中下载依赖项的仓库。


    ```

    group ''com.junit5book''

    version ''1.0-SNAPSHOT''

    apply plugin: ''java''

    sourceCompatibility = 1.8

    repositories {

    mavenCentral()

    }

    dependencies {

    def junitVersion = ''5.0.1''

    testCompile ''org.junit.jupiter:junit-jupiter-api:'' + junitVersion

    testCompile ''org.junit.jupiter:junit-jupiter-engine:'' + junitVersion

    testCompile ''org.assertj:assertj-core:3.5.2''

    }

    ```


    那么，我们是否尝试在控制台上运行它？


    ```

    ./gradle clean build

    No command ''gradle'' found

    ```


    啊！我们的机器上没有安装 Gradle。但这对于 Gradle 来说不是问题。Gradle 最显著的特性之一是“Gradle Wrapper”。其概念是让
    Gradle 构建无需事先安装即可工作。它不仅消除了 Gradle 安装的先决条件，还强制要求所有使用该项目的机器上使用相同版本的 Gradle。


    Wrapper 是一个小脚本文件 `gradlew.sh`/`gradlew.bat`，它与必要的文件一起被添加到项目中。现在让我们运行 wrapper 脚本。


    ```

    ./gradlew clean build

    Downloading https://services.gradle.org/distributions/gradle-3.4.1-all.zip

    .......................................................................

    :clean

    :compileJava

    :processResources UP-TO-DATE

    :classes

    :jar

    :assemble

    :compileTestJava

    :processTestResources UP-TO-DATE

    :testClasses

    :test

    :check

    :build

    BUILD SUCCESSFUL

    ```


    哇！通过使用 wrapper，我们能够在没有安装 Gradle 的情况下启动构建。Gradle wrapper 进程下载了所需的 Gradle 版本和项目依赖项。然后使用这些来构建应用程序源代码。完整的构建过程由不同的阶段组成，如构建输出所示。


    我们的重点是测试执行任务。遵循合理默认值的概念，Gradle 为我们的构建添加了一个测试插件。该插件的目的是执行测试用例并发布相应的报告。但是，如果我们查看
    `:test` 下的构建输出，会发现没有执行任何测试用例。这是因为 Gradle 测试插件遵循一个约定，即期望测试类名以 `Test` 或 `Tests`
    结尾。在我们的应用程序中，测试类名以 `Spec` 结尾，因此它们没有被执行。


    让我们通过显式指定 Gradle 应查找以 `Spec` 结尾的类来重新运行 Gradle 构建，如下代码所示：


    ```

    ./gradlew clean test --tests *Spec

    :test FAILED

    FAILURE: Build failed with an exception.

    * What went wrong:

    Execution failed for task '':test''.

    > No tests found for given includes: [*Spec]

    ```


    Gradle 仍然无法找到我们的测试。这是因为 JUnit 5 改变了其 API（应用程序编程接口）。JUnit 5 版本不仅面向开发者，也面向基于 JUnit
    的工具/平台。他们已经将测试发现和执行（用于测试过滤和配置）解耦，这是此类平台所需要的。由于当前的测试插件不可用，JUnit 5 团队提供了一个可用于执行测试的
    Gradle 测试插件。


    在应用该插件之前，我们必须告诉 Gradle 在哪里可以找到它。这在 `build.gradle` 的 `buildscript` 部分中进行了描述。


    ```

    buildscript {

    repositories {

    mavenCentral()

    // The following is only necessary if you want to use SNAPSHOT releases.

    // maven { url ''https://oss.sonatype.org/content/repositories/snapshots'' }

    }

    dependencies {

    classpath ''org.junit.platform:junit-platform-gradle-plugin:1.0.1''

    }

    }

    apply plugin: ''org.junit.platform.gradle.plugin''

    ```


    `org.junit.platform.gradle.plugin` 插件被配置为查找以 `*Test(s)` 结尾的测试。我们必须重新配置它以发现我们的测试。


    ```

    junitPlatform{

    filters{

    includeClassNamePattern ''.*Spec''

    }

    }

    ```


    现在再次运行 gradle 构建：`gradle clean build`。它将运行所有测试并在控制台上打印测试结果摘要。


    ```

    :junitPlatformTest

    Mar 06, 2017 6:56:47 AM org.junit.platform.launcher.core.ServiceLoaderTestEngineRegistry
    loadTestEngines

    INFO: Discovered TestEngines with IDs: [junit-jupiter]

    Test run finished after 1095 ms

    [        10 containers found      ]

    [         0 containers skipped    ]

    [        10 containers started    ]

    [         0 containers aborted    ]

    [        10 containers successful ]

    [         0 containers failed     ]

    [        19 tests found           ]

    [         0 tests skipped         ]

    [        19 tests started         ]

    [         0 tests aborted         ]

    [        19 tests successful      ]

    [         0 tests failed          ]

    ```


    需要注意的是，该插件会将 XML 报告发布到 `build/test-results/junit-platform`，而不是标准的 Gradle 测试报告位置（`build/reports`）。该报告是按测试引擎指定的。


    现在让我们探索该插件提供的各种选项。默认情况下，该插件会发现项目类路径下的所有测试。可以通过使用 `selectors` 块来改变此行为。该块使我们能够将测试限制到文件夹、包、类、测试方法或任何其他外部位置。


    ```

    junitPlatform{

    selectors{

    aClass ''bookstoread.BookShelfSpec''

    }

    filters{

    includeClassNamePattern ''.*Spec''

    }

    }

    ```


    上述块将只运行 `BookShelfSpec` 类的测试。需要注意的是，即使我们只选择了一个单独的类，`filters` 部分也是必需的。基本上，`selectors`
    部分用于测试发现元素，而 `filters` 部分实际上负责测试发现。


    ```

    Mar 06, 2017 7:53:27 AM org.junit.platform.launcher.core.ServiceLoaderTestEngineRegistry
    loadTestEngines

    INFO: Discovered TestEngines with IDs: [junit-jupiter]

    Test run finished after 304 ms

    [         6 containers found      ]

    [         0 containers skipped    ]

    [         6 containers started    ]

    [         0 containers aborted    ]

    [         6 containers successful ]

    [         0 containers failed     ]

    [         9 tests found           ]

    [         0 tests skipped         ]

    [         9 tests started         ]

    [         0 tests aborted         ]

    [         9 tests successful      ]

    [         0 tests failed          ]

    ```


    过滤器使我们能够根据 JUnit 5 引擎、包、标签或类名来选择测试。以下块将过滤并执行 `Filters` 标签下的测试（参见[第 4 章](#A429029_1_En_4_Chapter.html)）。


    ```

    junitPlatform{

    filters{

    includeClassNamePattern ''.*Spec''

    tags {

    include ''Filter''

    }

    }

    }

    ```


    JUnit 5 Gradle 平台插件禁用了标准的 Gradle 任务。可以通过在 `junitPlatform` 块下使用 `enableStandardTestTask`
    选项来改变此行为。将其设置为 `true` 以启用标准任务运行。'
  raw: '### Gradle


    The Gradle build tool started out by incorporating a lot of concepts from its
    predecessors like Ant and Maven. It takes a build.gradle file as an input to find
    out the steps of a project build. It is important to note that the build file
    is expressed in Groovy, instead of XML, which is the de facto standard for other
    tools. Gradle follows Maven’s “convention over configuration” approach, where
    most code build practices are configured with common default values; for example,
    all src is kept under src/main/java and tests under src/test/java.


    So far, for our project bookstoread, we added a build.gradle file (in Chapter
    [1](#A429029_1_En_1_Chapter.html)). The build file describes the source code as
    a Java project. It also lists all the required dependencies and the repository
    to download dependencies from.


    ```

    group ''com.junit5book''

    version ''1.0-SNAPSHOT''

    apply plugin: ''java''

    sourceCompatibility = 1.8

    repositories {

    mavenCentral()

    }

    dependencies {

    def junitVersion = ''5.0.1''

    testCompile ''org.junit.jupiter:junit-jupiter-api:'' + junitVersion

    testCompile ''org.junit.jupiter:junit-jupiter-engine:'' + junitVersion

    testCompile ''org.assertj:assertj-core:3.5.2''

    }

    ```


    So, shall we try to run it on our console?


    ```

    ./gradle clean build

    No command ''gradle'' found

    ```


    Ahh! we do not have gradle on our machine. But that is not an issue with Gradle
    . One of the most distinguishing features of Gradle is the “Gradle Wrapper.” The
    concept is about getting a Gradle build to work without the need to install it
    first. It not only removes the prerequisite of Gradle installation but also forces
    us to have the same version of gradle on all machines it is worked upon.


    The wrapper is a small script file gradlew.sh/gradlew.bat which is added to the
    project along with the necessary files. Let’s now run the wrapper script .


    ```

    ./gradlew clean build

    Downloading https://services.gradle.org/distributions/gradle-3.4.1-all.zip

    .......................................................................

    :clean

    :compileJava

    :processResources UP-TO-DATE

    :classes

    :jar

    :assemble

    :compileTestJava

    :processTestResources UP-TO-DATE

    :testClasses

    :test

    :check

    :build

    BUILD SUCCESSFUL

    ```


    Wow! So by using the wrapper, we were able to kick-start our build without Gradle
    being installed on our machine. The Gradle wrapper process downloaded the required
    Gradle version and project dependencies. These are then used to build the application
    source code. The complete build process is composed of different phases, as can
    be seen in the build output.


    Our focus is on the test execution task. Following the concept of sensible defaults
    , Gradle adds a test plug-in to our build. The purpose of the plug-in is to execute
    test cases and publish a report for the same. But if we look at the build output
    under `:test`, no test cases were executed. This is because the Gradle test plug-in
    follows a convention that expects a test class name to end with Test or Tests.
    In our application, test class names ended with Spec so they were not executed.


    Let’s rerun the Gradle build by explicitly specifying that Gradle should look
    for classes that end with Spec as shown in the code that follows:


    ```

    ./gradlew clean test --tests *Spec

    :test FAILED

    FAILURE: Build failed with an exception.

    * What went wrong:

    Execution failed for task '':test''.

    > No tests found for given includes: [*Spec]

    ```


    Gradle is still unable to find our tests. This is so because JUnit 5 has changed
    its API (application programming interface ). The JUnit 5 release is not just
    aimed at developers. It is also aimed at the tools/platforms based on JUnit. They
    have decoupled the test discovery and execution (for test filtering and configuration)
    required for such platforms. Since the current test plug-in is not usable, the
    JUnit 5 team has provided a Gradle test plug-in which could be used for executing
    tests.


    Before we can apply the plug-in, we must tell Gradle where it can find the plug-in.
    This is described under the `buildscript` section of build.gradle.


    ```

    buildscript {

    repositories {

    mavenCentral()

    // The following is only necessary if you want to use SNAPSHOT releases.

    // maven { url ''https://oss.sonatype.org/content/repositories/snapshots'' }

    }

    dependencies {

    classpath ''org.junit.platform:junit-platform-gradle-plugin:1.0.1''

    }

    }

    apply plugin: ''org.junit.platform.gradle.plugin''

    ```


    The `` `org.junit.platform.gradle.plugin’ `` plug-in is configured to look for
    tests ending in *Test(s). We must reconfigure it to discover our tests .


    ```

    junitPlatform{

    filters{

    includeClassNamePattern ''.*Spec''

    }

    }

    ```


    Now run the gradle build again, `gradle clean build`. It will run all the tests
    and print a test result summary on the console.


    ```

    :junitPlatformTest

    Mar 06, 2017 6:56:47 AM org.junit.platform.launcher.core.ServiceLoaderTestEngineRegistry
    loadTestEngines

    INFO: Discovered TestEngines with IDs: [junit-jupiter]

    Test run finished after 1095 ms

    [        10 containers found      ]

    [         0 containers skipped    ]

    [        10 containers started    ]

    [         0 containers aborted    ]

    [        10 containers successful ]

    [         0 containers failed     ]

    [        19 tests found           ]

    [         0 tests skipped         ]

    [        19 tests started         ]

    [         0 tests aborted         ]

    [        19 tests successful      ]

    [         0 tests failed          ]

    ```


    It is important to note that the plug-in will publish an XML report under ‘build/test-results/junit-platform’
    instead of the standard Gradle test reports location (build/reports). The report
    is specified one per test engine.


    Let’s now explore the various options provided by the plug-in. By default, the
    plug-in discovers all the tests under the project classpath. The behavior can
    be changed by using the `selectors` block. The block enables us to limit tests
    to folder (s), package (s), class (es), test method (s), or any other external
    location.


    ```

    junitPlatform{

    selectors{

    aClass ''bookstoread.BookShelfSpec''

    }

    filters{

    includeClassNamePattern ''.*Spec''

    }

    }

    ```


    The foregoing block will only run tests of the `BookShelfSpec` class . It is important
    to note that the `filters` section is necessary even when we have selected only
    one single class. Basically, the `selectors` section is for the test discovery
    element, while the `filters` section is actually responsible for the test discovery.


    ```

    Mar 06, 2017 7:53:27 AM org.junit.platform.launcher.core.ServiceLoaderTestEngineRegistry
    loadTestEngines

    INFO: Discovered TestEngines with IDs: [junit-jupiter]

    Test run finished after 304 ms

    [         6 containers found      ]

    [         0 containers skipped    ]

    [         6 containers started    ]

    [         0 containers aborted    ]

    [         6 containers successful ]

    [         0 containers failed     ]

    [         9 tests found           ]

    [         0 tests skipped         ]

    [         9 tests started         ]

    [         0 tests aborted         ]

    [         9 tests successful      ]

    [         0 tests failed          ]

    ```


    The filters enable us to select tests based on JUnit 5 engine, packages , tags,
    or class names. The following block will filter and execute tests under the `Filters`
    tag (see Chapter [4](#A429029_1_En_4_Chapter.html)).


    ```

    junitPlatform{

    filters{

    includeClassNamePattern ''.*Spec''

    tags {

    include ''Filter''

    }

    }

    }

    ```


    The JUnit 5 Gradle platform plug-in disables the standard Gradle task. This behavior
    can be altered using ‘enableStandardTestTask’ option under the ‘junitPlatform’
    block. Set it to “true” to enable the standard task run.'
