    ```


    Now we will look at the important parts.


    *   The project is identified by a `groupId:artifactid`. In addition, each released
    version of the project is identified by version.

    *   The properties section of the file lists various key values which could be
    referred to in the other sections of the POM.

    *   By default, Maven adds a Java compiler plug-in. The JDK versions for it are
    described by the maven.compiler.source and maven.compiler.target properties.

    *   The dependencies tag contains a list of dependencies required in the project,
