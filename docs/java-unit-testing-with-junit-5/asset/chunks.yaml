    ### 按标签对测试进行分组


    在大多数项目中，测试具有多种特性。例如，有些测试运行缓慢，有些运行快速，还有些则与环境相关。因此，我们希望能在测试套件中区分这些测试，并将它们组织成相似的组。这种分组背后的理念是，我们可以选择一个组，并根据需求执行它。JUnit
    5 允许我们通过使用 `@Tag` 注解在测试上标记这些特性。一个测试可以被标记为“慢速”、“快速”、“夜间运行”等。在测试类/方法上标记标签后，我们可以在集成开发环境（IDE）/构建工具运行器中选择该标签。这将选中所有标记了所需标签的测试并执行它们。`@Tag`
    注解是一个 `java.lang.annotation.Repeatable` 注解。因此，我们可以多次向测试方法/类添加该注解，从而为其添加多个元数据。


    在编写本书时，IntelliJ IDEA 尚未提供任何处理标签的选项。它仍在发布里程碑版本以支持 JUnit 5 的所有功能。


    需要注意的是，标签信息仅限于 JUnit 测试运行器。元信息也是 `TestInfo` 对象的一部分。该对象可以被注入到生命周期方法中，以执行一些相关操作。


    ```

    @BeforeEach

    void setup(Book[] books, TestInfo info) {

    System.out.println(" 测试标签是 :  "+ info.getTags());

    }

    @Tag("nightly")

    @Tag("generate-progress")

    @Test

    @DisplayName("当两本书已读且三本书未读时，完成度为 40%，待读度为 60%")

    void progressWithCompletedAndToReadPercentages(Book[] books) {

    // 为简洁起见已删除

    }

    ```


    JUnit 4 API 包含 `@Category` 注解，用于标记带有元信息的测试，这些元信息可用于构建测试组。该 API 在 JUnit 5 中已不再可用。


    ## 总结


    在本章中，我们通过添加几个新功能增强了 `bookstoread` 应用程序。在此过程中，我们使用了依赖注入，并利用假设来验证测试前置条件。我们还快速学习了
    JUnit 扩展模型。本书将在后续章节中更详细地讨论这个主题。


    我们发现业务领域概念应被表达为系统中的抽象。所有这些抽象都可以通过模拟进行单元测试。我们发现可以为接口构建模拟实现，但使用像 Mockito 这样的模拟框架效率更高。最后，我们讨论了如何使用接口中的默认方法来测试抽象的共同行为。


    在第 5 章中，我们将学习 JUnit 5 中新增的异常处理改进。


    # 5. 测试异常


    到目前为止，本书中我们还没有过多讨论如何使用 JUnit 5 处理异常。作为程序员，我们知道异常会发生，并且必须验证异常是否在预期时被抛出。在本章中，你将学习如何使用
    JUnit 5 支持的各种方式来处理异常。我们将在本章末尾讨论 JUnit 5 对重复测试执行的支持。当需要处理不稳定的测试时，重复测试执行会很有帮助。当一个测试在相同的代码基础上既表现出通过又表现出失败的结果时，该测试就是不稳定的。


    ## 上下文设置


    让我们考虑一个用例，以确保当添加的书籍超过其容量时，`BookShelf` 会抛出异常。如下面的代码所示，当我们尝试添加的书籍超过 `BookShelf`
    容量时，会抛出 `BookShelfCapacityReached` 异常。


    ```

    public void add(Book... booksToAdd) throws BookShelfCapacityReached {

    Arrays.stream(booksToAdd).forEach(book -> {

    if (books.size() == capacity) {

    throw new BookShelfCapacityReached(String.format("BookShelf capacity of %d is
    reached. You can''t add more books.", this.capacity));

    }

    books.add(book);

    });

    }

    ```


    ## 原始方法：使用 try-catch-fail


    当处理可能抛出异常的代码时，首先必须创建一个会抛出异常的条件，然后必须验证它是否是预期的异常。此外，你可能还想验证异常中包含的消息。在前面显示的代码中，我们可以通过向容量为
    2 的 `BookShelf` 添加书籍来在测试中创建异常条件。


    ```

    @Test

    void throwsExceptionWhenBooksAreAddedAfterCapacityIsReached() {

    BookShelf bookShelf = new BookShelf(2);

    bookShelf.add(effectiveJava, codeComplete);

    bookShelf.add(mythicalManMonth);

    }

    ```


    运行代码会导致测试失败，因为 `bookShelf.add(mythicalManMonth)` 这一行会抛出异常。这不是我们想要的。测试用例不仅要引发异常，还要验证异常。代码的预期行为是引发异常；因此测试应该成功，而不是失败。


    处理异常的经典方法是使用 Java 内置的 try-catch 机制。try 块将包装会抛出异常的代码，而 catch 块允许我们捕获代码抛出的异常。


    始终在 try-catch 块中捕获特定的异常。


    ```

    @Test

    void throwsExceptionWhenBooksAreAddedAfterCapacityIsReached() {

    BookShelf bookShelf = new BookShelf(2);

    bookShelf.add(effectiveJava, codeComplete);

    try {

    bookShelf.add(mythicalManMonth);

    } catch (BookShelfCapacityReached expected) {

    assertEquals("BookShelf capacity of 2 is reached. You can''t add more books.",
    expected.getMessage());

    }

    }

    ```


    在上述代码中，我们将 `bookShelf.add` 语句包装在 try-catch 块中。我们捕获了 `BookShelfCapacityReached`
    异常，并验证了消息是否符合预期。


    上述测试用例完整吗？不，即使 `bookshelf.add` 语句没有抛出异常，它也会通过。为了确保在未引发异常时测试失败，我们调用 `org.junit.jupiter.api.Assertions.fail`
    方法来实现预期的行为，如下面的代码所示：


    ```

    @Test

    void throwsExceptionWhenBooksAreAddedAfterCapacityIsReached() {

    BookShelf bookShelf = new BookShelf(2);

    bookShelf.add(effectiveJava, codeComplete);

    try {

    bookShelf.add(mythicalManMonth);

    fail("Should throw BookShelfCapacityReached exception as more books are added
    than shelf capacity.");

    } catch (BookShelfCapacityReached expected) {

    assertEquals("BookShelf capacity of 2 is reached. You can''t add more books.",
    expected.getMessage());

    }

    }

    ```


    try-catch-fail 方法自 JUnit 诞生以来就一直存在。它仍然是一种有效的方法，但大多数情况下，使用现代方法会更好。

