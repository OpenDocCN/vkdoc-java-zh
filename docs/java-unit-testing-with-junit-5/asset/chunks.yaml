    ## 使用测试超时


    当你不想让测试无限期等待时，超时非常有用。在 JUnit 的旧版本中，`@Test` 注解有一个属性用于提供超时值。JUnit 5 的测试注解不支持任何属性。相反，JUnit
    5 提供了断言方法来帮助你处理这种情况。JUnit 5 对超时提供了广泛的支持。


    让我们先看一个简单的测试用例，我们期望测试在一秒内完成。


    ```

    @Test

    void test_should_complete_in_one_second() {

    assertTimeout(Duration.of(1, ChronoUnit.SECONDS), () -> Thread.sleep(2000));

    }

    ```


    这个测试将会失败，因为代码执行会休眠两秒钟。我们期望测试用例在一秒内成功完成。


    `assertTimeout` 有许多重载变体。上面展示的那个接受两个参数——超时持续时间和可执行代码。当你运行前面提到的测试用例时，它会按预期失败。你可能期望测试在一秒后失败，但它会在两秒后失败。


    原因是 `assertTimeout` 在与调用代码相同的线程中执行可执行代码。这意味着测试会等待代码执行完成后再抛出异常。这会导致测试在两秒后失败。在本地测试机器上，测试在
    2 秒 40 毫秒后失败。


    还有另一组 `assertTimeout` 的重载方法，它们接受 Duration 和 `ThrowingSupplier`。区别在于 `ThrowingSupplier`
    返回一个值，而 Executable 不返回值。因此，当你想要断言代码执行返回的值时，应该使用 `assertTimeout ThrowingSupplier`
    变体。


    ```

    String message = assertTimeout(Duration.of(1, ChronoUnit.SECONDS), () -> "Hello,
    World!");

    assertEquals("Hello, World!", message);

    ```


    ### assertTimeoutPreemptively


    这个方法克服了 assertTimeout 的局限性。它确保测试在超时之前完成。它在与调用线程不同的线程中运行测试。当超过超时时间时，它会中止代码。


    ```

    assertTimeoutPreemptively(Duration.of(1, ChronoUnit.SECONDS), () -> Thread.sleep(2000));

    ```


    现在测试将在超时时间过后立即完成。


