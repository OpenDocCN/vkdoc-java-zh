    ## Conditional Test Execution


    There are situations in which we would like to control whether we should run a
    test case or not. JUnit 5 provides the ExecutionCondition extension interface
    for implementing this use case.


    Let’s create an extension `RunOnCIExtension` class which implements the ExecutionCondition
    interface.


    ```

    import org.junit.jupiter.api.extension.ConditionEvaluationResult;

    import org.junit.jupiter.api.extension.ExecutionCondition;

    import org.junit.jupiter.api.extension.ExtensionContext;

    public class RunOnCIExtension implements ExecutionCondition {

    @Override

    public ConditionEvaluationResult evaluateExecutionCondition(ExtensionContext context)
    {

    String jenkinsHome = System.getenv("JENKINS_HOME");

    if (jenkinsHome != null) {

    return ConditionEvaluationResult.enabled("Test enabled on CI");

    }

    return ConditionEvaluationResult.disabled("Test disabled as the environment is
    not CI");

    }

    }

    ```


    ## Parameter Resolution


    This extension is used to resolve a parameter received by a constructor or test
    method.


    Let’s create an extension that resolves a type Book. It is very common in the
    test cases that we need to work with test data. So, parameter resolution can help
    us there.


    ```

    public class BookParameterResolver implements ParameterResolver {

    @Override

    public boolean supportsParameter(ParameterContext parameterContext,

    ExtensionContext extensionContext) throws ParameterResolutionException {

    return parameterContext.getParameter().getType()

    .equals(Book.class);

    }

    @Override

    public Object resolveParameter(ParameterContext parameterContext,

    ExtensionContext extensionContext) throws ParameterResolutionException {

    return new Book("Effective Java");

    }

    }

    ```


    JUnit 5 bundles the following three ParameterResolvers:


    *   TestInfoParameterResolver: The resolver provides an instance of org.junit.jupiter.api.TestInfo.
    The TestInfo object holds meta-information about the current test being executed.
    The object can provide display name, text class, test methods, and tags, if any.

    *   TestReporterparameterResolver: The resolver provides an instance of org.junit.jupiter.api.TestReporter.
    The TestReporter allows us to provide additional values for the current test execution.
    All such values are included in test report as well as shown in the IDE(s) (integrated
    development environment(s)).

    *   RepetitionInfoParameterResolver: The resolver provides an instance of org.junit.jupiter.api.RepetitionInfo.
    The RepetitionInfo object holds information about the test repetition (i.e., current
    repetition index and total repetitions). The object is only available for tests
    annotated with org.junit.Jupiter.api.RepeatedTest. If the test case is not marked
    with `@RepeatedTest`, an org.junit.jupiter.api.extension.ParameterResolutionException
    is thrown.


    ```

    class ParameterResolverSpec {

    @BeforeEach

    void initialize(TestInfo info,TestReporter reporter) {

    reporter.publishEntry("Associated tags :", info.getTags().toString());

    }

    @RepeatedTest(value = 10)

    @Tag("Numbers")

    void numberTest(RepetitionInfo info) {

    assertTrue(true);

    }

    @Test

    void nonRepeated(RepetitionInfo info) {

    assertTrue(true);

    }

    }

    ```


    TestReporter is Junit 5’s preferred way to print any information to sysout/syserror.
    Also note that each of the aforementioned ParameterResolver(s) is activated automatically
    by the JUnit execution engine. They do not require any explicit activation using
    @ExtendsWith.


    ## Exception Handling


    The last extension point that we will discuss is TestExecutionExceptionHandler.
    This extension can be used to alter the behavior of a test when it encounters
    an exception.


    Let’s suppose, we want to create an extension that will log and ignore all exceptions
    of type IOException and rethrow all the other exceptions.


    ```

    public class IgnoreIOExceptionExtension

    implements TestExecutionExceptionHandler {

    Logger logger = LoggerFactory

    .getLogger(IgnoreIOExceptionExtension.class);

    @Override

    public void handleTestExecutionException(ExtensionContext context,

    Throwable throwable) throws Throwable {

    if (throwable instanceof IOException) {

    logger.error("IO Exception {}", throwable);

    return;

    }

    throw throwable;

    }

    }

    ```


    ## Registering Extensions


    In the previous few sections, we created our test extensions. Now, we need to
    register them with a JUnit 5 test. To do that, we make use of the `@ExtendWith`
    annotation. You can use this annotation multiple times to register multiple extensions
    or you can pass multiple extensions as an array to the `@ExtendWith` annotation.


    ```

    @ExtendWith({

    IgnoreIOExceptionExtension.class,

    BookParameterResolver.class,

    RunOnCIExtension.class,

    TestSummaryExtension.classs

    })

    @ExtendWith(LoggingExtension.class)

    public class UserServiceTests{

    }

    ```


    You can also automatically register extensions by using the ServiceLoader mechanism.
    Your extension needs to have a file META-INF/services/org.junit.jupiter.api.extension.Extension
    with the fully qualified name of your extension.


    ```

    com.shekhargulati.extensions.TestSummaryExtension .

    ```


    To enable this extension registry mechanism, you will need to set the junit.extensions.autodetection.enabled
    configuration property to true. One way to do this is by using a system property
    to the JVM (Java Virtual Machine). The other way is by adding a configuration
    parameter to LauncherDiscoveryRequest as shown in the code that follows:


    ```

    LauncherDiscoveryRequest request

    = LauncherDiscoveryRequestBuilder.request()

    .selectors(selectClass("com.junit5book.UserServiceTests"))

    .configurationParameter("junit.extensions.autodetection.enabled", "true")

    .build();

    ```


    ## JUnit 5 Extensions


    The JUnit team used the extension model to develop the following new test types:


    *   @TestTemplate: Define a template which generates tests at runtime.

    *   @ParametrerizedTest: Defines a test method with parameters.


    In the following sections we will cover how to use each of the aforementioned
    extensions. The sections will not cover implementation details for each of the
    extensions. Please refer to JUnit 5 documentation for such details.'
  trans: '

    ## 测试实例后处理


    此扩展允许你在测试实例创建后执行钩子操作。你需要实现 `TestInstancePostProcessor` 接口。该接口包含一个需要重写的方法——`postProcessTestInstance`。


    正如 `TestInstancePostProcessor` 接口的 JavaDoc 所述，此扩展的典型应用场景是向测试实例注入依赖。例如，让我们编写一个向实例字段注入
    SLF4J 日志器的扩展。


    ```

    import java.lang.reflect.Field;

    import org.junit.jupiter.api.extension.ExtensionContext;

    import org.junit.jupiter.api.extension.TestInstancePostProcessor;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    public class LoggingExtension implements TestInstancePostProcessor {

    @Override

    public void postProcessTestInstance(Object testInstance, ExtensionContext context)
    throws Exception {

    Logger logger = LoggerFactory.getLogger(testInstance.getClass());

    Field field = testInstance.getClass().getDeclaredField("logger");

    field.set(testInstance, logger);

    }

    }

    ```


    在上述代码中，我们获取了 `testInstance` 的访问权限，并通过反射设置了 logger 字段。


    ## 条件测试执行


    在某些情况下，我们需要控制是否运行某个测试用例。JUnit 5 提供了 `ExecutionCondition` 扩展接口来实现这一用例。


    让我们创建一个实现 `ExecutionCondition` 接口的 `RunOnCIExtension` 扩展类。


    ```

    import org.junit.jupiter.api.extension.ConditionEvaluationResult;

    import org.junit.jupiter.api.extension.ExecutionCondition;

    import org.junit.jupiter.api.extension.ExtensionContext;

    public class RunOnCIExtension implements ExecutionCondition {

    @Override

    public ConditionEvaluationResult evaluateExecutionCondition(ExtensionContext context)
    {

    String jenkinsHome = System.getenv("JENKINS_HOME");

    if (jenkinsHome != null) {

    return ConditionEvaluationResult.enabled("Test enabled on CI");

    }

    return ConditionEvaluationResult.disabled("Test disabled as the environment is
    not CI");

    }

    }

    ```


    ## 参数解析


    此扩展用于解析构造函数或测试方法接收的参数。


    让我们创建一个解析 `Book` 类型的扩展。在测试用例中，我们经常需要处理测试数据，因此参数解析可以在此处提供帮助。


    ```

    public class BookParameterResolver implements ParameterResolver {

    @Override

    public boolean supportsParameter(ParameterContext parameterContext,

    ExtensionContext extensionContext) throws ParameterResolutionException {

    return parameterContext.getParameter().getType()

    .equals(Book.class);

    }

    @Override

    public Object resolveParameter(ParameterContext parameterContext,

    ExtensionContext extensionContext) throws ParameterResolutionException {

    return new Book("Effective Java");

    }

    }

    ```


    JUnit 5 内置了以下三个 `ParameterResolver`：


    *   `TestInfoParameterResolver`：该解析器提供 `org.junit.jupiter.api.TestInfo` 实例。`TestInfo`
    对象保存当前正在执行的测试的元信息。该对象可以提供显示名称、测试类、测试方法以及标签（如果有）。

    *   `TestReporterParameterResolver`：该解析器提供 `org.junit.jupiter.api.TestReporter`
    实例。`TestReporter` 允许我们为当前测试执行提供附加值。所有这些值都会包含在测试报告中，并显示在 IDE（集成开发环境）中。

    *   `RepetitionInfoParameterResolver`：该解析器提供 `org.junit.jupiter.api.RepetitionInfo`
    实例。`RepetitionInfo` 对象保存有关测试重复的信息（即当前重复索引和总重复次数）。该对象仅对使用 `org.junit.jupiter.api.RepeatedTest`
    注解的测试可用。如果测试用例未标记 `@RepeatedTest`，则会抛出 `org.junit.jupiter.api.extension.ParameterResolutionException`。


    ```

    class ParameterResolverSpec {

    @BeforeEach

    void initialize(TestInfo info,TestReporter reporter) {

    reporter.publishEntry("Associated tags :", info.getTags().toString());

    }

    @RepeatedTest(value = 10)

    @Tag("Numbers")

    void numberTest(RepetitionInfo info) {

    assertTrue(true);

    }

    @Test

    void nonRepeated(RepetitionInfo info) {

    assertTrue(true);

    }

    }

    ```


    `TestReporter` 是 JUnit 5 向标准输出/标准错误输出打印信息的首选方式。另请注意，上述每个 `ParameterResolver` 都由
    JUnit 执行引擎自动激活，无需使用 `@ExtendsWith` 进行显式激活。


    ## 异常处理


    我们将讨论的最后一个扩展点是 `TestExecutionExceptionHandler`。此扩展可用于在测试遇到异常时改变其行为。


    假设我们想创建一个扩展，用于记录并忽略所有 `IOException` 类型的异常，同时重新抛出所有其他异常。


    ```

    public class IgnoreIOExceptionExtension

    implements TestExecutionExceptionHandler {

    Logger logger = LoggerFactory

    .getLogger(IgnoreIOExceptionExtension.class);

    @Override

    public void handleTestExecutionException(ExtensionContext context,

    Throwable throwable) throws Throwable {

    if (throwable instanceof IOException) {

    logger.error("IO Exception {}", throwable);

    return;

    }

    throw throwable;

    }

    }

    ```


    ## 注册扩展


    在前几节中，我们创建了测试扩展。现在，我们需要将它们注册到 JUnit 5 测试中。为此，我们使用 `@ExtendWith` 注解。你可以多次使用此注解来注册多个扩展，也可以将多个扩展作为数组传递给
    `@ExtendWith` 注解。


    ```

    @ExtendWith({

    IgnoreIOExceptionExtension.class,

    BookParameterResolver.class,

    RunOnCIExtension.class,

    TestSummaryExtension.classs

    })

    @ExtendWith(LoggingExtension.class)

    public class UserServiceTests{

    }

    ```


    你也可以通过使用 `ServiceLoader` 机制自动注册扩展。你的扩展需要有一个文件 `META-INF/services/org.junit.jupiter.api.extension.Extension`，其中包含扩展的完全限定名称。


    ```

    com.shekhargulati.extensions.TestSummaryExtension .

    ```


    要启用此扩展注册机制，你需要将 `junit.extensions.autodetection.enabled` 配置属性设置为 `true`。一种方法是通过向
    JVM（Java 虚拟机）传递系统属性来实现。另一种方法是将配置参数添加到 `LauncherDiscoveryRequest` 中，如下代码所示：


    ```

    LauncherDiscoveryRequest request

    = LauncherDiscoveryRequestBuilder.request()

    .selectors(selectClass("com.junit5book.UserServiceTests"))

    .configurationParameter("junit.extensions.autodetection.enabled", "true")

    .build();

    ```


    ## JUnit 5 扩展


    JUnit 团队使用扩展模型开发了以下新的测试类型：


    *   `@TestTemplate`：定义一个在运行时生成测试的模板。

    *   `@ParameterizedTest`：定义一个带参数的测试方法。


    在接下来的章节中，我们将介绍如何使用上述每个扩展。这些章节不会涵盖每个扩展的实现细节。如需了解此类细节，请参阅 JUnit 5 文档。

    '
- fmt: '### Test Template


    JUnit 5 enables us to create test skeletons which are instantiated with `TestTemplateInvocationContext`
    to generate tests at runtime. The generated tests are like `@Test` method. The
    templates support the complete test life cycle. Any methods annotated with `@BeforeAll`/`@BeforeEach`/`@AfterEach`/`@AfterAll`
    are executed as per life cycle for the generated test.


    A test template is created by marking a non-static method test class with `org.junit.jupiter.api.TestTemplate`
    annotation. Additionally, we must register an implementation of `TestTemplateInvocationContextProvider`
    Extension, which is used to generate an actual test from the template.


    Let’s try to add a test template for our `bookstoread` application. In Chapter
    [4](#A429029_1_En_4_Chapter.html), we added `BookFilter` which could be applied
    to a `Book`. The filter validates if the book meets a criterion. We also created
    `BookPublishedYearFilter`, which can be used to filter a book based on the year
    of publishing.


    In the current context let’s add a test template which could take `BookFilter`
    and an array of books and then assert the filter validation.


    ```

    class BookFilterTemplateSpec {

    @TestTemplate

    @ExtendWith(BookFilterTestInvocationContextProvider.class)

    void validateFilters(BookFilter filter, Book[] books) {

    assertNotNull(filter);

    assertFalse(filter.apply(books[0]));

    assertTrue(filter.apply(books[1]));

    }

    }

    ```


    As shown in the foregoing test case we also need to create a `BookFilterTestInvocationContextProvider`,
    an implementation of `org.junit.jupiter.api.extension.TestTemplateInvocationContextProvider`.
    The provider needs to implement the following methods:


    - `supportsTestTemplate`: The method validates if the provider is applicable for
    the passed `ExecutionContext`. The JUnit execution engine first calls this method
    to validate if the provider is applicable or not.

    - `provideTestTemplateInvocationContexts`: The method provides a `Stream` of `org.junit.jupiter.api.extension.TestTemplateInvocationContext`.
    Each instance of `TestTemplateInvocationContext` is responsible for providing
    a corresponding test name and additional extensions, if any.


    ```

    class BookFilterTestInvocationContextProvider implements TestTemplateInvocationContextProvider
    {

    @Override

    public boolean supportsTestTemplate(ExtensionContext context) {

    return true;

    }

    @Override

    public Stream provideTestTemplateInvocationContexts(ExtensionContext context)
    {

    Book cleanCode = new Book("Clean Code", "Robert C. Martin", LocalDate.of(2008,
    Month.AUGUST, 1));

    Book codeComplete = new Book("Code Complete", "Steve McConnel", LocalDate.of(2004,
    Month.JUNE, 9));

    return Stream.of(bookFilterTestContext("Before Filter", BookPublishedYearFilter.Before(2007),
    cleanCode, codeComplete),

    bookFilterTestContext("After Filter", BookPublishedYearFilter.After(2007), codeComplete,
    cleanCode));

    }

    private TestTemplateInvocationContext bookFilterTestContext(String testName, BookFilter
    bookFilter, Book... array) {

    return new TestTemplateInvocationContext() {

    @Override

    public String getDisplayName(int invocationIndex) {

    return testName;

    }

    @Override

    public List getAdditionalExtensions() {

    return Lists.newArrayList(new TypedParameterResolver(bookFilter), new TypedParameterResolver(array));

    }

    };

    }

    }

    ```


    Let’s look at the `provideTestTemplateInvocationContexts` method in detail. The
    method returns a `Stream<TestTemplateInvocationContext>`. Each instance of `TestTemplateInvocationContext`
    provides a test display name and two additional extensions. These extensions are
    responsible for resolving method parameters for our `validateFilters` test.


    Our `BookFilterTestInvocationContextProvider` generates the following two test
    cases:


    - **Before Year Test**: The test contains the `BookPublishedYearFilter.Before(2007)`
    filter and an array of two books.

    - **After Year Test**: The test contains the `BookPublishedYearFilter.After(2007)`
    filter and an array of two books.


    We have added a `TypedParameterResolver` extension. The extension takes a value
    and validates if it is an instance of one of the passed method arguments. If so,
    it provides back the value.


    ```

    class TypedParameterResolver implements ParameterResolver {

    T data;

    TypedParameterResolver(T data) {

    this.data = data;

    }

    @Override

    public boolean supportsParameter(ParameterContext parameterContext, ExtensionContext
    extensionContext) throws ParameterResolutionException {

    Class parameterClass = parameterContext.getParameter().getType();

    return parameterClass.isInstance(data);

    }

    @Override

    public Object resolveParameter(ParameterContext parameterContext, ExtensionContext
    extensionContext) throws ParameterResolutionException {

    return data;

    }

    }

    ```


    Now that we have added all the required components for our test template, let’s
    execute it. There will be two tests, one doing the “before year” check and the
    other doing the “after year” check (see Figure [7-1](#A429029_1_En_7_Chapter.html#Fig1)).


    ![A429029_1_En_7_Fig1_HTML.jpg](A429029_1_En_7_Fig1_HTML.jpg)


    **Figure 7-1.** Test template result'
