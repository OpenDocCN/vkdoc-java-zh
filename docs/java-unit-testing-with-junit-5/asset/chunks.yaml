- fmt: "## JUnit 4 Way: `@Test` Annotation and Rule API\n\nYou will agree that the\
    \ try-catch-fail approach discussed previously is verbose and ugly. It leads to\
    \ code that is hard to read and maintain. Prior to JUnit 5, the two recommended\
    \ ways to work with exceptions were:\n\n- **Using `@Test` annotation `expected`\
    \ attribute**: The previous version of the JUnit `@Test` annotation supported\
    \ specifying an argument that identifies the type of expected exception. This\
    \ made the testing exception simple, as shown in the following code.\n\n    ```\n\
    \    @Test(expected=BookShelfCapacityReached.class)\n    public void throwsExceptionWhenBooksAreAddedAfterCapacityIsReached()\
    \ {\n        BookShelf bookShelf = new BookShelf(2);\n        bookShelf.add(effectiveJava,\
    \ codeComplete);\n        bookShelf.add(mythicalManMonth);\n    }\n    ```\n\n\
    \    If the `BookShelfCapacityReached` exception is thrown during test execution,\
    \ the foregoing test passes. Otherwise, the test will fail. There are two drawbacks\
    \ to this approach:\n    - You can’t narrow down the piece of code that throws\
    \ the exception.\n    - You can’t assert the exception message. The JUnit 5 `@Test`\
    \ annotation does not have the `expected` attribute, so this approach will not\
    \ work.\n\n- **Using `ExpectedException` Rule**: Another more extensible approach\
    \ supported by JUnit 4 is to use the `ExpectedException` rule. JUnit Rule API\
    \ provides more control over what happened during the code execution. `ExpectedException`\
    \ is one of the inbuilt rules provided by JUnit 4 itself.\n\n    ```\n    public\
    \ class BookShelfSpecWithRules {\n        @Rule\n        public ExpectedException\
    \ expectedException = ExpectedException.none();\n\n        @Test\n        void\
    \ throwsExceptionWhenBooksAreAddedAfterCapacityIsReached() {\n            BookShelf\
    \ bookShelf = new BookShelf(1);\n            expectedException.expect(BookShelfCapacityReached.class);\n\
    \            expectedException.expectMessage(\"BookShelf capacity of 1 is reached.\
    \ You can't add more books.\");\n            bookShelf.add(effectiveJava, codeComplete);\n\
    \        }\n    }\n    ```\n\n    In the foregoing code, we first created an instance\
    \ of `ExpectedException` and then we told the `expectedException` rule what we\
    \ expect during the execution of the test. The JUnit 4 rule mechanism allows us\
    \ to verify both thrown exception and message. This approach also suffers from\
    \ the limitation that we can’t narrow down the piece of code that threw an exception.\
    \ This means your test might be passing for the wrong reason.\n\nJUnit 5 has limited\
    \ support for the Rule API. The `ExpectedException` rule is supported by JUnit\
    \ 5. This means you can still run your existing tests written using the `ExpectedException`\
    \ Rule API. We will cover it later in this chapter.\n\n## JUnit 5 Way: Using `assertThrows`\
    \ Assertion Method\n\nThe JUnit 5 `Assertions` class provides an `org.junit.jupiter.api.Assertions.assertThrows`\
    \ method that lets you write code to verify both the exception and the associated\
    \ message in a clean and readable manner. It also allows you to narrow down the\
    \ code that throws the exception, avoiding the issues with JUnit 4 approaches.\
    \ The code that follows refactors the test case to use the `assertThrows` method:\n\
    \n```\n@Test\nvoid throwsExceptionWhenBooksAreAddedAfterCapacityIsReached() {\n\
    \    BookShelf bookShelf = new BookShelf(2);\n    bookShelf.add(effectiveJava,\
    \ codeComplete);\n    BookShelfCapacityReached throwException = assertThrows(BookShelfCapacityReached.class,\
    \ () -> bookShelf.add(mythicalManMonth));\n    assertEquals(\"BookShelf capacity\
    \ of 2 is reached. You can't add more books.\", throwException.getMessage());\n\
    }\n```\n\nThe `assertThrows` method takes these arguments – expected Exception\
    \ class and a lambda expression of the type `org.junit.jupiter.api.function.Executable`.\n\
    \n`Executable` is used to encapsulate a piece of code which can throw an exception.\
    \ The `Executable` functional interface is similar to the Java inbuilt `java.lang.Runnable`\
    \ interface, the only difference being that `Runnable` does not use a `throws`\
    \ clause in its declaration. This means your lambda expression must catch the\
    \ checked exception and then rethrow the unchecked exception. You can avoid this\
    \ hassle by writing your own functional interface that uses a `throws` clause.\
    \ This is what an `Executable` interface does. The other advantage of creating\
    \ a functional interface is to allow the use of a name corresponding to your domain.\
    \ `Executable` tells us that this lambda encapsulates a code execution.\n\n```\n\
    @FunctionalInterface\npublic interface Executable {\n    void execute() throws\
    \ Throwable;\n}\n```\n\n`assertThrows` returns the caught exception that we used\
    \ in the next statement to assert the exception message as shown in the preceding\
    \ code example.\n\n## Using JUnit 4 `ExpectedException` Rule with JUnit 5\n\n\
    JUnit 5 has limited support for JUnit 4 Rule API support. This means you can still\
    \ write/run tests using the JUnit 4 Rule API support. The support for Rule API\
    \ is defined in the `junit-jupiter-migration-support` module. For any new test,\
    \ you should use the `assertThrows` method, but if you have a JUnit 4 code base\
    \ then you can rely on this extension. To use Rule API, first add the dependency\
    \ to your build tool. If you are using Gradle, then please add the following to\
    \ your `build.gradle` file.\n\n```\ntestCompile 'org.junit.jupiter:junit-jupiter-migrationsupport:5.0.1'\n\
    ```\n\nMaven users can add the following to their `pom.xml`.\n\n```\n<dependency>\n\
    \    <groupId>org.junit.jupiter</groupId>\n    <artifactId>junit-jupiter-migrationsupport</artifactId>\n\
    \    <version>5.0.1</version>\n    <scope>test</scope>\n</dependency>\n```\n\n\
    After adding the dependency, you have to enable Rule API support in your test\
    \ case by annotating your test class with `EnableRuleMigrationSupport` annotation\
    \ as shown in the code that follows.\n\n```\nimport org.junit.Rule;\nimport org.junit.jupiter.api.Test;\n\
    import org.junit.jupiter.migrationsupport.rules.EnableRuleMigrationSupport;\n\
    import org.junit.platform.runner.JUnitPlatform;\nimport org.junit.rules.ExpectedException;\n\
    import org.junit.runner.RunWith;\n\n@EnableRuleMigrationSupport\npublic class\
    \ BookShelfSpecWithRules {\n    @Rule\n    public ExpectedException expectedException\
    \ = ExpectedException.none();\n\n    @Test\n    void throwsExceptionWhenBooksAreAddedAfterCapacityIsReached()\
    \ {\n        BookShelf bookShelf = new BookShelf(1);\n        expectedException.expect(BookShelfCapacityReached.class);\n\
    \        expectedException.expectMessage(\"BookShelf capacity of 1 is reached.\
    \ You can't add more books.\");\n        bookShelf.add(effectiveJava, codeComplete);\n\
    \    }\n}\n```\n\nApart from adding `EnableRuleMigrationSupport` annotation, you\
    \ don’t have to make any changes in your code base.\n\nNow, you can run the test\
    \ case and it will succeed."
