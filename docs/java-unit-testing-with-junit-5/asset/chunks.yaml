  raw: '### Grouping Tests by Tags


    In most of the projects , tests have various characteristics. Some tests are slow,
    some are fast, and some are environment specific, for example. Thus, we would
    like to distinguish between these tests in our suite and organize them in similar
    groups. The idea behind this grouping is that we can select a group and execute
    it as per our requirement. JUnit 5 enables us to mark these characteristics on
    our tests by using the `@Tag` annotation. A test can be tagged “slow,” “fast,”
    “nightly,” and so on. After marking a test class/method with a tag, we can select
    the tag in our integrated development environment (IDE)/build tool runner. This
    would select all the tests marked with the required tag and execute them. The
    tags annotation is a `java.lang.annoatation.Repeatable` annotation. Thus, we can
    add the annotation multiple times to a test method/class, thereby adding multiple
    metadata to it.


    While we were writing this book, IntelliJ Idea had not provided any option to
    work with tags. It is a still undergoing milestone releases to support all features
    of JUnit 5.


    It is important to note that the tag info is restricted to the Junit test runner.
    The meta-information is also part of the TestInfo object. The object could be
    injected into life cycle methods to take some relevant actions.


    ```

    @BeforeEach

    void setup(Book[] books, TestInfo info) {

    System.out.println(" Test tags are :  "+ info.getTags());

    }

    @Tag("nightly")

    @Tag("generate-progress")

    @Test

    @DisplayName("is 40% completed and 60% to-read when two books read and 3 books
    not read yet")

    void progressWithCompletedAndToReadPercentages(Book[] books) {

    // Removed for Brevity

    }

    ```


    Junit 4 API contained the @Category annotation to mark tests with meta-information
    which could be used to build test groups. The API is no longer available in JUnit
    5.


    ## Summary


    In this chapter, we enhanced the `bookstoread` application by adding a couple
    of new features. In the process, we worked with dependency injection and used
    assumptions to validate our test preconditions. We took a crash course on the
    JUnit Extension model. This book will cover the topic in more detail in future
    chapters.


    We found out that business domain concepts should be expressed as abstractions
    in the system. All such abstractions can be unit tested by Mocking. We discovered
    that we can build mock implementations for our interfaces, but it is more efficient
    to use a mocking framework like Mockito. In the end, we discussed how default
    methods in interfaces can be used to test common behaviors of our abstractions.


    In Chapter [5](#A429029_1_En_5_Chapter.html), we will learn about exception handling
    improvements added in JUnit 5.


    # 5. Testing Exceptions


    So far in this book, we have not talked much about handling exceptions with JUnit
    5\. As programmers, we know exceptions will happen and we must verify that exceptions
    get thrown when expected. In this chapter, you’ll learn how to use various ways
    supported by JUnit 5 to work with exceptions. We will end the chapter by talking
    about JUnit 5 support of repeated test execution. Repeated test execution is helpful
    when you have to work with flaky tests. A test is flaky when it exhibits both
    a passing and a failing result with the same code base.


    ## Context Setting


    Let’s consider a use case to ensure that BookShelf throws an exception when more
    books are added than its capacity. As you can see in the code that follows, the
    `BookShelfCapacityReached` exception is thrown when we try to add more books than
    BookShelf capacity.


    ```

    public void add(Book... booksToAdd) throws BookShelfCapacityReached {

    Arrays.stream(booksToAdd).forEach(book -> {

    if (books.size() == capacity) {

    throw new BookShelfCapacityReached(String.format("BookShelf capacity of %d is
    reached. You can''t add more books.", this.capacity));

    }

    books.add(book);

    });

    }

    ```


    ## Primitive Way: Using the try-catch-fail


    When working with a code that might throw an exception, first you have to create
    a condition that will throw an exception and then you have to verify that it is
    the expected exception. Additionally, you might want to verify the message contained
    in the exception. In the code shown previously, we can create the exception condition
    in a test by adding a book to the BookShelf after reaching its capacity of two.


    ```

    @Test

    void throwsExceptionWhenBooksAreAddedAfterCapacityIsReached() {

    BookShelf bookShelf = new BookShelf(2);

    bookShelf.add(effectiveJava, codeComplete);

    bookShelf.add(mythicalManMonth);

    }

    ```


    Running the code will fail the test as an exception will be thrown by the `bookShelf.add(mythicalManMonth)`
    line. This is not what we want. The test case not only has to raise an exception
    but also verify the exception as well. The expected behavior of the code is to
    raise an exception; thus the test should succeed and not fail.


    The classic approach to work with exceptions is to use Java’s inbuilt try-catch
    mechanism. The try block will wrap the code that throws an exception and the catch
    block allows us to catch the exception thrown by the code.


    Always capture a specific exception in the try-catch block.


    ```

    @Test

    void throwsExceptionWhenBooksAreAddedAfterCapacityIsReached() {

    BookShelf bookShelf = new BookShelf(2);

    bookShelf.add(effectiveJava, codeComplete);

    try {

    bookShelf.add(mythicalManMonth);

    } catch (BookShelfCapacityReached expected) {

    assertEquals("BookShelf capacity of 2 is reached. You can''t add more books.",
    expected.getMessage());

    }

    }

    ```


    In the aforementioned code, we wrapped the `bookShelf.add` statement in a try-catch
    block. We caught the `BookShelfCapacityReached` exception and verified that message
    is the expected one.


    Is the foregoing test case complete? No, it will work even when no exception is
    thrown by the `bookshelf.add` statement. To make sure that the test fails in case
    an exception is not raised, we call the `org.junit.jupiter.api.Assertions.fail`
    method to achieve the expected behavior as shown in the code that follows:


    ```

    @Test

    void throwsExceptionWhenBooksAreAddedAfterCapacityIsReached() {

    BookShelf bookShelf = new BookShelf(2);

    bookShelf.add(effectiveJava, codeComplete);

    try {

    bookShelf.add(mythicalManMonth);

    fail("Should throw BookShelfCapacityReached exception as more books are added
    than shelf capacity.");

    } catch (BookShelfCapacityReached expected) {

    assertEquals("BookShelf capacity of 2 is reached. You can''t add more books.",
    expected.getMessage());

    }

    }

    ```


    The try-catch-fail approach to testing exceptions has existed since JUnit’s beginning.
    It is still a valid approach, but most of the time you will be better off using
    the modern approaches.'
