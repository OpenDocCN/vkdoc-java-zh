  trans: '

    # 1. 以正确的方式构建软件


    程序员很快就会意识到编写软件既困难又容易出错。软件项目屡屡失败，原因在于团队无法应对软件的复杂性。结果，项目无法按时完成，成本远超预期，也无法交付预期的商业价值。


    回顾过去，软件编程作为一个职业仅有几十年的历史。在这短暂的发展历程中，我们见证了多种软件开发流程，并发现了一些最佳实践。我们认识到，如同其他进化过程一样，软件也会随时间演变。因此，我们应该适应变化，而不是固守僵化的计划。我们还发现，开发是一个协作过程——许多人共同参与软件的不同部分，以构建满足客户需求的产品。不同的人以迭代的方式扮演不同角色，共同决定产品的未来。许多组织正在采用敏捷软件开发流程来应对不断变化的业务需求。正如人们所说，唯一不变的就是变化。


    测试驱动开发（TDD）是敏捷软件开发的一种实践，许多开发者都以某种形式使用它。TDD 的前提是，在编写生产代码之前，先编写一个会失败的测试用例。如果正确实施，TDD
    可以帮助你编写出满足客户期望、设计简洁且缺陷更少的软件。


    在本章中，我们将帮助你理解为什么作为一名专业程序员，你应该学习并遵循 TDD 实践。你将学习如何搭建一个基于 Gradle 的 Java 8 JUnit 5
    项目。我们还会简要介绍 Java 8 的新特性，以便即使你之前没有使用过 Java 8，也能轻松上手。本章最后，我们将通过一个遵循 TDD 实践的简单示例来结束。本章将为你后续章节的学习做好准备，在后续章节中，我们将使用
    TDD 构建一个功能完整的应用程序，并演示 JUnit 5 的高级特性。


    ## 测试驱动开发


    你还记得上一次想要修改代码以修复客户发现的关键缺陷是什么时候吗？你当时能确定你的修复不会引入回归错误吗？另外，想想上一次你想要重构代码，却担心你的修改会破坏其他功能是什么时候？这种情况在软件开发中很常见——对破坏软件的恐惧。即使是最优秀的程序员也会犯错并引入缺陷。


    软件项目充满了不确定性。我们与新技术、不断变化的需求、人员流动打交道，或者同时面对这些情况。为了克服恐惧并管理这些不确定性，我们需要一种能够帮助我们产出可用软件的开发实践。它必须保持简单，并在出现问题时为我们提供快速反馈。


    测试驱动开发由 Kent Beck 于 2003 年重新发现，是一种通过倡导为所有软件需求编写测试来增强开发者信心的开发实践。它促使我们在短周期（几分钟）的增量开发循环中工作，从而为我们的进展提供快速反馈。TDD
    强制我们在编写生产代码之前先编写一个会失败的测试。完整流程如下：


    1.  为新的功能或行为添加一个测试。

    2.  看到它失败。

    3.  编写足够的代码使测试通过。

    4.  确保所有之前的测试也都能通过。

    5.  重构代码。

    6.  重复以上步骤，直到完成。


    这里的关键是首先编写一个会失败的测试。测试体现了我们对系统的理解。我们编写的是当执行某个操作时，我们期望系统会做什么。这有助于我们清晰地理解系统。


    本书将重点介绍 TDD 的测试优先方法。有很多程序员是最后才编写测试。我们认为，测试后置的方法无法帮助你获得 TDD 的全部好处。TDD 有时被称为测试驱动设计（即，测试应帮助你设计系统）。TDD
    的设计部分比测试部分更重要。当我们最后才编写测试时，我们无法从该实践中获得设计上的好处。


    在软件开发中，快速反馈是软件生产力的关键。TDD 为我们提供了快速反馈，表明我们正朝着正确的方向前进。从某种意义上说，它让我们的思维保持专注和积极。我们相信自己的代码，因为它满足了写在测试中的最终用户期望。


    TDD 帮助我们实现两个重要目标：


    *   检测回归错误。

    *   保持系统设计简洁。


    让我们详细讨论这两个方面。


    ### 检测回归错误


    遵循 TDD 最明显的原因是以自动化方式检测回归错误。遵循 TDD 的团队可以自由地更改和添加新功能，而无需担心引入回归问题。如果所有之前的测试用例都运行良好，那么我们可以确信没有引入任何回归错误。此外，随着我们不断为新的行为添加测试，安全网也在不断扩大。每当有人进行修改时，这些测试用例都会发挥作用。我们在代码中发现错误越早，修复的速度就越快，成本也越低。谷歌分享的数据验证了这一点，你可以在表
    1-1 中看到。


    表 1-1.


    修复缺陷的成本


    | 发现缺陷的软件测试阶段 | 每个缺陷的预估成本 |

    | --- | --- |

    | 系统测试 | $5,000 |

    | 集成测试 | $500 |

    | 完整构建 | $50 |

    | 单元测试/测试驱动开发 | $5 |


    有些人可能看不到编写测试的价值。他们更倾向于手动测试代码，或者在出现问题时使用日志语句来调试代码。手动测试既繁琐又耗时。除此之外，手动覆盖任何非平凡软件的所有边界情况都很困难。人类通常擅长检查快乐路径（即，总是能正常工作的场景）。因此，手动测试很可能会遗漏一些边界情况。


    如果系统是遵循 TDD 编写的，那么一旦你发现一个缺陷，团队就会添加一个额外的测试用例来重现该错误。现在，你就可以修改生产代码，使这个失败的测试用例通过。这将确保边界情况得到处理。同时，由于这个边界情况现在已成为自动化测试套件的一部分，你可以放心，不会再遗漏它了。

    '
- fmt: '### Keep System Design Simple


    Automated tests written by programmers have traditionally been considered a quality
    assurance effort. They are targeted at verifying the correctness of an implementation
    at the time of writing and verifying its correctness in the future as the code
    evolves. Testing is only one-half of the story. We will demonstrate, throughout
    this book, that TDD is essentially a design tool and testing is just a side effect.


    One of the ways people look at software development is by breaking it into different
    phases. The two most common phases are:


    - Design

    - Coding


    Often, one team designs the system and another team implements it. When people
    try to implement a design created by others, it often does not work. Programmers
    face many challenges when they start implementing the proposed design.


    TDD breaks the myth of separate design and coding phase by promoting the idea
    that code is design. We don’t need a big upfront design that always falls short
    when we implement stuff. We need a just-in-time design that will evolve as the
    system is built.


    When we start writing tests, we start to design the code with a caller in mind.
    Tests become client of the code. Tests help us write just enough code to meet
    the required behavior. Once we have a passing test, we mercilessly refactor the
    code. TDD is often looked at as a continuous cycle of RED -> GREEN -> REFACTOR.
    It is the refactoring stage where design emerges. Refactoring is defined as improving
    the design of existing code without changing its external behavior. Tests help
    us gain confidence that our code works as expected. Now, we can safely refactor
    the code. In case we make a breaking change during the refactoring, the test case
    will fail, hence saving us from introducing an unintended side effect while refactoring.


    The refactoring phase of TDD is the most critical phase. While refactoring, think
    about Boy Scout Code of Conduct:


    > Always leave the campground cleaner than you found it.


    Refactoring does not mean you have to make your code perfect. Try to make the
    code a little better than when you first checked it out. You can improve the name
    of a variable, method, or class. You can break a big function into smaller functions
    or extract out a concern to a different class. The goal is to make the current
    version better than the previous version. If we follow this practice each day,
    we will move toward a simpler, readable code base.


    TDD as a design tool requires a change in mindset. It will not happen in a day.
    It takes constant practice to master and reap the benefits.


    TDD forces us to write loosely coupled classes so that we can easily test them
    in isolation. We are forced to make dependencies explicit to test the specific
    code in isolation. We write small cohesive modules that do one thing so that we
    can test specific behaviors. The modules can be extended in the future to meet
    changing requirements. These are all good design practices enforced by TDD. This
    all makes reading and understanding code much easier. Various studies tell us
    that programmers spend more time reading and understanding code than writing it.
    In 2007, Microsoft conducted a survey where 95% of respondents agreed that understanding
    existing code is a significant part of their job.


    ## Levels of Testing


    As you start practicing TDD, you will write different levels of tests. Your application
    should be composed of tests in each of the following levels. Each of these levels
    focuses on a different aspect of code and provides different feedback. Let’s look
    at them one by one.


    - **Unit testing**: Here you test individual software components to verify if
    the individual unit does the right thing in isolation.

    - **Integration testing**: Here you test multiple units together to verify if
    they work correctly as a unit.

    - **Acceptance testing**: Here you test the full system to verify if it works
    as per user expectations. It is often referred to as functional testing.


    Figure [1-1](#A429029_1_En_1_Chapter.html#Fig1) depicts a test pyramid. The point
    Figure [1-1](#A429029_1_En_1_Chapter.html#Fig1) conveys is that you should have
    many more unit tests than functional or integration tests. This book will mainly
    focus on unit testing, but you should spend time learning about the other two
    types of tests as well.


    ![A429029_1_En_1_Fig1_HTML.gif](A429029_1_En_1_Fig1_HTML.gif)


    Figure 1-1. Test pyramid


    The unit testing concept dates back to 1976 when David J. Panzal presented "Test
    Procedures: A New Approach to Software Verification" at the second international
    conference on software engineering. The paper describes test procedure as a way
    to invoke a test case on a target module to generate a report indicating whether
    the test case has failed. These test procedures are part of product deliverables
    and can be used as initial product validation and subsequent regression testing.
    These procedures were written for FORTRAN in a language called Test Procedure
    Language (TPL).


    ## Benefits of Unit Testing


    As discussed previously, unit testing is no longer a post-development exercise.
    It is as equally important as writing production code and must be done up front.
    It enhances team productivity by providing solid foundations. Let’s look at the
    benefits unit testing offers in detail.


    ### Determines Specifications


    Before we start the journey of coding a component, we must try to determine what
    the component must do. Try to build a test case of the possible inputs and the
    possible outputs. The act of building test cases at the start helps to clarify
    the expected behavior of the component.


    If we are unable to come up with a test, it means that the specifications are
    not explicit enough and require more thinking.


    ### Provides Early Error Detection


    Unit tests are proof of working code. They are executed in every build and can
    detect failures at the first instance.


    Unit tests can detect not only coding bugs but flaws in product specifications
    as well. A unit test demonstrates progress; thus, as soon as a component is complete,
    it can be demoed to the stakeholders to find gaps, if any. The sooner a bug is
    uncovered, the cheaper it is to fix.


    ### Supports Maintenance


    Product specifications evolve over time. These changes lead to development cycles.
    In each of these cycles, the team has to understand how the existing code works
    before team members can make any changes. Unit tests help in understanding the
    intended behavior without being bogged down by the actual code. A well-written
    unit test suite serves as a productivity boost for the team.


    ### Improves Design


    Unit tests are the first client of the code being tested. They uncover various
    issues that a client can face while interfacing with the code being tested. Unit
    tests make us think in terms of the expected input and the expected output. For
    internal components (service, utilities, etc.), this can help in classifying responsibility
    boundaries. It helps in improving product specifications by exposing gaps in the
    interface design.


    ### Product Documentation


    Unit tests describe how a piece of code works—that is, the expected output for
    a given input. They always describe the latest state of a specification, as they
    are kept in sync with the code changes.'
