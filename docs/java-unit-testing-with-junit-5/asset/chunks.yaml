    ### Nested Tests


    In a well-written test suite, there will more than one test for different features
    of the application. In our example, so far, we implemented three features and
    at the same time we wrote close to 10 test cases. This often leads to a situation
    where our test class is exploding with test cases. JUnit 5 provides the `@Nested`
    annotation to provide a logical grouping of test cases in the form of static inner
    member classes. Each of the static inner classes can have its own life cycle methods.
    These methods will be executed in hierarchical order. Additionally, the nested
    classes can be marked with `@DisplayName`, giving us all the benefits of proper
    test names. There is no limit on the level of nesting you can do.


    For our purposes, we can group individual features in the following manner:


    ```

    @DisplayName("A bookshelf")

    public class BookShelfSpec {

    @BeforeEach

    void init() {

    // Test case removed for brevity

    }

    @Nested

    @DisplayName("is empty")

    class IsEmpty {

    @Test

    @DisplayName("when no book is added to it")

    public void emptyBookShelfWhenNoBookAdded() {

    // Test case removed for brevity

    }

    @Test

    @DisplayName("when add is called without books")

    void emptyBookShelfWhenAddIsCalledWithoutBooks() {

    // Test case removed for brevity

    }

    }

    @Nested

    @DisplayName("after adding books")

    class BooksAreAdded {

    @Test

    @DisplayName("contains two books")

    void bookshelfContainsTwoBooksWhenTwoBooksAdded() {

    // Test case removed for brevity

    }

    @Test

    @DisplayName("returns an immutable books collection to client")

    void bookshelfIsImmutableForClient() {

    // Test case removed for brevity

    }

    }

    }

    // Test case removed for brevity

    }

    ```


    Run all the test cases. The resulting tree should express the logical grouping
    as shown in Figure [3-8](#A429029_1_En_3_Chapter.html#Fig8).


    ![A429029_1_En_3_Fig8_HTML.jpg](A429029_1_En_3_Fig8_HTML.jpg)


    Figure 3-8.


    Nested tests


    At the start of the chapter, we did not know the design of the Bookshelf. As we
    progressed through the features (and test cases) we found that it is a composition
    of books. Putting the test case first kept our solution simple and at the same
    time gave us freedom to use the right design choice for the problem at hand. As
    we develop more features using the test-first approach, we will see that they
    force us to build more components, thus propelling the evolution of the overall
    application design.


    ## Summary


    In this chapter, we took a deep dive into TDD using Junit 5.0\. We experienced
    the Red-Green-Refactor cycle while building our application features. We used
    `@BeforeEach` to extract out our initialization procedures. We also used AssertJ
    to accurately express our intentions in test assertions. `@DisplayName` helped
    us to achieve better readability. As we evolved our test pack, we also organized
    it into logical groups using `@Nested`.


    In the next chapter, we will add more features to the bookstoread application
    and will make use of JUnit features like dependency injection, interface default
    methods, and many more.


    # 4. Dependency Injection, Mocking, Testing Traits, and Grouping Tests


    In the last chapter, we started building the bookstoread application. We added
    a few features to the application following TDD (test-driven development) practice
    and conforming to the Red-Green-Refactor cycle. In the process of writing the
    application, you learned about JUnit 5 core concepts and how you can start building
    your JUnit 5 test suite. This chapter will build upon the knowledge gained in
    the first three chapters and cover more advanced concepts of unit testing.


    In any real application, multiple classes will collaborate to do the job. These
    dependencies need to be taken care of so that you can write clean and isolated
    tests. Most of the time test code is littered around with either test data setup
    or collaborator setup, both leading to tests that are difficult to read and comprehend.


    In this chapter, we start by looking at dependency injection support introduced
    in JUnit 5, which can make our test data setup seamless and nonintrusive. Then,
    we will look at how mocking can help us to replace collaborators easily. We will
    use a mocking library, Mockito, which will do the work of creating and managing
    mock objects. It provides a higher-level API (application programming interface)
    that we use to write expectations that the mock should satisfy and we verify if
    those expectations are met. Mocking and dependency injection are linked to each
    other and you will see how dependency injection can help us inject mocks into
    our tests. We will end the chapter by looking at testing traits and support for
    defining test groups in JUnit 5.'
