- fmt: '### Disabled Tests


    There are times when tests are broken for valid reasons. One of the ways to avoid
    the headache of ignoring the execution of failing tests is to use the `@Disabled`
    annotation. This is similar in intent to the JUnit 4 `@Ignore` annotation.


    If a test is marked `@Disabled`, then JUnit engine will not run it. The annotation
    can also be used at class level. If a class is marked with the `@Disabled` annotation
    then it will skip all the tests inside the respective class. The `@Disabled` annotation
    takes a string as an optional parameter which will be printed on the console when
    the test is skipped. Also note that the JUnit engine prints overall statistics
    which contain numbers of ignored, failed, and total executed tests.


    There are multiple ways we can ignore execution of test cases. We could remove
    the `@Test` annotation from the method/class. But, this will stop not only the
    execution of the test but also the discovery of the test. The test case will no
    longer be reported in JUnit statistics. It is far better to disable the test explicitly
    by using the `@Disabled` annotation rather than to delete it or remove the `@Test`
    annotation.


    Let’s mark the `bookshelfArrangedByBookTitle` test as `@Disabled` as shown in
    the code snippet that follows:


    ```

    @Disabled("Needs to implement Comparator")

    @Test

    void bookshelfArrangedByBookTitle() {

    shelf.add(effectiveJava, codeComplete, mythicalManMonth);

    List books = shelf.arrange();

    assertEquals(asList(codeComplete, effectiveJava, mythicalManMonth), books, ()
    -> "Books in a bookshelf should be arranged lexicographically by book title");

    }

    ```


    Figure [3-4](#A429029_1_En_3_Chapter.html#Fig4) illustrates how IntelliJ shows
    a disabled test.


    ![A429029_1_En_3_Fig4_HTML.jpg](A429029_1_En_3_Fig4_HTML.jpg)


    Figure 3-4. Disabled test


    ### AssertJ


    Assertions are a vital part of test classes as they provide the result verification.
    Junit 5.0 provides a minimal set of assertion APIs. The JUnit platform is only
    concerned with assertion results and not with the assertion API. There are many
    third-party APIs that can help us to write expressive assertions. The previous
    version of JUnit used to embed Hamcrest library to provide this out of the box.
    But, the newer version has dropped Hamcrest; instead, it recommends using AssertJ
    to do the job.


    AssertJ [`http://joel-costigliola.github.io/assertj/`](http://joel-costigliola.github.io/assertj/)
    is one of the de facto standards for writing assertions. It provides a rich fluent
    API to assert various aspects. Overall it offers the benefit of test case readability
    and maintenance.


    In the `bookshelfArrangedByUserProvidedCriteria` test case, we tried to compare
    the order of books to an expected order. In our opinion, the test case has a small
    issue while validating the result. It is comparing two different collections to
    check elements order, but it is not validating if the elements in the results
    are ordered according to the provided comparator.


    Let’s say we change the comparator to the natural order. This will change the
    complete order of the result. But the failing test case will provide an error
    to correct the ordering to descending order.


    ```

    Expected :[Book{title=''The Mythical Man-Month'', author=''Frederick Phillips
    Brooks'', publishedOn=1975-01-01}, Book{title=''Effective Java'', author=''Joshua
    Bloch'', publishedOn=2008-05-08}, Book{title=''Code Complete'', author=''Steve
    McConnel'', publishedOn=2004-06-09}]

    Actual   :[Book{title=''Code Complete'', author=''Steve McConnel'', publishedOn=2004-06-09},
    Book{title=''Effective Java'', author=''Joshua Bloch'', publishedOn=2008-05-08},
    Book{title=''The Mythical Man-Month'', author=''Frederick Phillips Brooks'', publishedOn=1975-01-01}]

    ```


    If we look at the test, the code is working as expected, but there is a bug in
    the asserting result. We can improve this a lot if we can validate that the result
    is ordered by the provided comparator rather than comparing the result with another
    collection. AssertJ allows us to do exactly that. Let’s start by adding AssertJ
    dependency under the dependencies section of `build.gradle`.


    ```

    dependencies {

    def junitVersion = ''5.0.1''

    testCompile ''org.junit.jupiter:junit-jupiter-api:'' + junitVersion

    testCompile ''org.junit.jupiter:junit-jupiter-engine:'' + junitVersion

    testCompile ''org.assertj:assertj-core:3.8.0''

    }

    ```


    Now, let’s modify the test case using the `assertThat` method of AssertJ library.
    We would like to make sure that the list is sorted using the provided Comparator.
    The `assertThat` assertion is part of `org.assertj.core.api.Assertions` class,
    so we must import the class before we can use the assertion.


    ```

    import static org.assertj.core.api.Assertions.assertThat;

    @Test

    void bookshelfArrangedByUserProvidedCriteria() {

    shelf.add(effectiveJava, codeComplete, mythicalManMonth);

    Comparator reversed = Comparator.naturalOrder().reversed();

    List books = shelf.arrange(reversed);

    assertThat(books).isSortedAccordingTo(reversed);

    }

    ```


    The foregoing test case more accurately expresses our intent. Going further we
    will explore more of the AssertJ library to perform our verifications.


    ### Using @DisplayName


    We have written a few test cases for a couple of features we have developed. It
    is time to discuss one of the important aspects about tests–test case name. Naming
    a test case is one of the most difficult tasks for developers. The test should
    be named in such a manner that it should be easier to figure out why a test failed
    without looking at the test code.


    > What makes a clean test? Three things. Readability, readability, and readability.
    Readability is perhaps even more important in unit tests than it is in production
    code. - Uncle Bob


    Let’s see how it impacts test cases. In the event of the test failure, the test
    case report for `bookshelfArrangedByBookTitle` looks as shown Figure [3-5](#A429029_1_En_3_Chapter.html#Fig5).


    ![A429029_1_En_3_Fig5_HTML.jpg](A429029_1_En_3_Fig5_HTML.jpg)


    Figure 3-5. Test failure message


    The failure is not descriptive. We need to look into logs or read test code to
    understand more about the failure. We could help ourselves by writing proper test
    names using `@DisplayName` annotation discussed in Chapter [2](#A429029_1_En_2_Chapter.html)
    (see Figure [3-6](#A429029_1_En_3_Chapter.html#Fig6)).


    ![A429029_1_En_3_Fig6_HTML.jpg](A429029_1_En_3_Fig6_HTML.jpg)


    Figure 3-6. Test DisplayName


    ```

    @Test

    @DisplayName("bookshelf is arranged lexicographically by book title")

    void bookshelfArrangedByBookTitle() {

    // Test case

    }

    ```


    The test case name is quite descriptive, and tells us that the bookshelf is not
    arranged in its natural order. Let’s try to give a meaningful description to all
    our tests. The resulting test run should look as shown in Figure [3-7](#A429029_1_En_3_Chapter.html#Fig7).


    ![A429029_1_En_3_Fig7_HTML.jpg](A429029_1_En_3_Fig7_HTML.jpg)


    Figure 3-7. Passing test


    ### Third Feature


    > As a user, I should be able to group books in my bookshelf based on certain
    criteria'
