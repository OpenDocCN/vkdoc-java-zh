- fmt: '# 1. Building Software the Correct Way


    Programmers learn very quickly that writing software is hard and error prone.
    Time and again software projects fail because teams are unable to cope with software
    complexity. As a result, the project fails to meet the deadline, costs much more
    than expected, and doesn’t deliver the intended business value.


    If we look back, software programming as a profession is only a few decades old.
    In its short lifespan, we have seen multiple software development processes and
    discovered a few best practices. We have learned that like any other evolutionary
    process, software also evolves over time. Thus, we should adapt to change rather
    than stick to a strict plan. We have also discovered that development is a collaborative
    process—many individuals work on different parts of the software to build something
    that meets customer needs. Different individuals perform different roles iteratively
    to determine a product’s future. Many organizations are embracing the Agile software
    development process to help them cope with the ever-changing business requirements.
    As they say, the only constant is change.


    Test-driven development (TDD) is one of the practices of Agile software development
    that a lot of developers use in some shape or form. The premise of TDD is that
    you write a failing test case before you write the production code itself. TDD,
    if done correctly, can help you write software that meets customer expectations,
    has a simple design, and has fewer defects.


    In this chapter, we will help you understand why, as a professional programmer,
    you should learn and follow TDD practices. You will learn how to set up a Gradle-based
    Java 8 JUnit 5 project. We will provide a short primer of new features in Java
    8 so that you feel at home in case you have not worked with Java 8 before. We
    will end the chapter by writing a simple example following TDD practice. This
    chapter will prepare you for future chapters in which we will use TDD to build
    a fully working application and demonstrate advance features of JUnit 5.


    ## Test-Driven Development


    Do you remember the last time you wanted to make a change to fix a critical defect
    that a customer discovered? Were you certain that your fix would not introduce
    a regression error? Also, think about the last time you wanted to refactor your
    code but you feared that your change might break something else? This happens
    a lot in software development–the fear of breaking software. Even the best programmers
    make mistakes and introduce defects.


    Software projects involve a lot of uncertainties. We work with new technologies,
    ever-changing requirements, people movement, or a combination of these. To overcome
    the fear and manage these uncertainties, we need a software development practice
    that can help us produce working software. It must keep things simple and provide
    us quick feedback in case things go wrong.


    Test-driven development, rediscovered by Kent Beck in 2003, is a development practice
    that increases developer confidence by advocating tests for all software requirements.
    It makes us work in short (a few minutes) incremental development cycles, thus
    providing quick feedback on our progress. TDD forces us to write a failing test
    before writing the production code. The complete process looks as follows:


    1. Add a test for the new functionality or behavior.

    2. See it fail.

    3. Write enough code to make the test pass.

    4. Make sure all the previous tests pass as well.

    5. Refactor the code.

    6. Repeat until done.


    The key part here is writing a failing test first. The test specifies our understanding
    of the system. We are writing what we expect the system will do when some action
    is performed. This helps us to clearly understand the system.


    This book will focus on the test-first approach of TDD. There are many programmers
    who write test last. We think the test-last approach does not help you achieve
    the full benefit of TDD. TDD is sometimes called test-driven design (i.e., tests
    should help you to design the system). The design part of TDD is more important
    than the testing part. When we do test last, we don’t reap the design benefit
    from the practice.


    In software development, quick feedback is the key to software productivity. TDD
    gives us quick feedback that we are moving in the right direction. In a way, it
    keeps our mind focused and positive. We believe in our code as it is meeting end
    user expectations written in tests.


    TDD helps us achieve two important goals:


    - Detect regression errors.

    - Keep system design simple.


    Let’s discuss each of these aspects in detail.


    ### Detect Regression Errors


    The most obvious reason to follow TDD is to detect regression errors in an automated
    manner. Teams that follow TDD have the freedom to change and add new features
    without worrying about introducing regressions. If all the previous test cases
    ran fine, then we can be sure that we have not introduced any regression error.
    Also, as we keep adding tests for the new behavior the safety net keeps growing.
    These test cases pay off each time someone makes a change. The sooner we detect
    a bug in the code, the faster and cheaper it is to fix. This is validated by the
    data shared by Google which you can see in Table [1-1](#A429029_1_En_1_Chapter.html#Tab1).


    Table 1-1. Cost to Fix Bugs


    | Software Testing Phase Where Bug Found | Estimate Cost per Bug |

    | --- | --- |

    | System Test | $5,000 |

    | Integration Test | $500 |

    | Full Build | $50 |

    | Unit Test/Test-Driven Development | $5 |


    Some people may not see value in writing tests. They prefer to test the code manually
    or to use log statements to debug code when things go wrong. The act of testing
    manually is cumbersome and time-consuming. Besides this, it is difficult to manually
    cover all the corner cases of any nontrivial software. Humans are usually good
    at checking the happy paths (i.e., scenarios which always work). So, there is
    a great possibility that manual testing will miss some corner cases.


    If the system is written following TDD, then any time you discover a bug, the
    team will add an additional test case that reproduces the error. Now, you will
    be able to make changes to the production code to pass the failing test case.
    This will ensure that the corner case is handled. Also, as this corner case is
    now part of the automated test suite you can be rest assured that you will not
    miss it again.'
