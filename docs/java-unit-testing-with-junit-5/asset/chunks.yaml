  trans: '

    ### 参数化测试


    在第 4 章中，我们了解到 JUnit 5 允许我们向测试中注入参数。参数可以注入到测试方法或 `BeforeEach`/`AfterEach` 方法中。这是通过实现
    `org.junit.jupiter.extension.Extension` 接口（该接口可以提供值），然后使用 `@ExtendWith` 将其注册到测试中来实现的。


    但如果只需要向测试方法中注入值，我们可以省去 `org.junit.jupiter.extension.Extension` 的自定义实现。相反，我们可以使用
    `org.junit.jupiter.params.ParameterizedTest` 注解测试方法。我们还需要注册一个用于提供值的 `ValueSource`。


    在我们的 `bookstoread` 应用中，我们向 `Bookshelf` 添加了一个 `findBookByTitle` 方法。让我们添加一个测试用例，在其中按现有标题搜索书架。


    ```

    @ParameterizedTest

    @ValueSource(strings = {"Effective Java", "Code Complete", "Clean Code"})

    void shouldGiveBackBooksForTitle(String title) {

    BookShelf shelf = new BookShelf();

    Book effectiveJava = new Book("Effective Java", "Joshua Bloch", LocalDate.of(2008,
    Month.MAY, 8));

    Book codeComplete = new Book("Code Complete", "Steve McConnel", LocalDate.of(2004,
    Month.JUNE, 9));

    Book mythicalManMonth = new Book("The Mythical Man-Month", "Frederick Phillips
    Brooks", LocalDate.of(1975, Month.JANUARY, 1));

    Book cleanCode = new Book("Clean Code", "Robert C. Martin", LocalDate.of(2008,
    Month.AUGUST, 1));

    shelf.add(effectiveJava, codeComplete, mythicalManMonth, cleanCode);

    List foundBooks = shelf.findBooksByTitle(title.toLowerCase());

    assertNotNull(foundBooks);

    assertEquals(1,foundBooks.size());

    foundBooks = shelf.findBooksByTitle(title.toUpperCase());

    assertNotNull(foundBooks);

    assertEquals(0,foundBooks.size());

    }

    ```


    `shouldGiveBackBooksForTitle` 测试方法接收一个 `String` 作为输入。该方法随后构建一个包含书籍列表的 `BookShelf`。测试用例接着使用
    `findBooksByTitle` 方法对指定的标题进行断言。


    `String` 参数值由测试方法上的 `@ValueSource` 指定。该注解接收一个字符串数组作为输入，从而为每个值重复执行测试（见图 7-2）。


    ![A429029_1_En_7_Fig2_HTML.jpg](img/A429029_1_En_7_Fig2_HTML.jpg)


    图 7-2.


    字符串参数


    `@ValueSource` 可用于指定原始类型（整数/双精度浮点数/长整数）和字符串的数组。该包还提供了以下数据源：


    *   `EnumSource`：该数据源可用于从枚举中注入值。它允许选择/取消选择指定枚举值的子集。

    *   `MethodSource`：该数据源可用于提供值的流/数组/可迭代对象。该方法必须是静态的，且不能接受任何参数。

    *   `CSVSource`：该数据源可用于注入逗号分隔值的列表。每个逗号分隔的值可用于匹配测试方法的一个参数。

    *   `CSVFileSource`：该数据源可用于从指定文件中注入逗号分隔值的列表。每个逗号分隔的值可用于匹配测试方法的一个参数。

    *   `ArgumentsSource`：该数据源可用于注册一个自定义的 `Stream<Arguments>` 提供者。注册的提供者可用于注入自定义类型或多个参数（成对出现）。


    现在，让我们为 `bookstoread` 应用使用其中一些数据源。我们可以使用 `MethodSource` 来提供一个 `BookFilter` 数组，这些过滤器可以单独进行验证。


    ```

    @ParameterizedTest

    @MethodSource("bookFilterProvider")

    void validateFilterWithNullData(BookFilter filter) {

    assertThat(filter.apply(null)).isFalse();

    }

    static Stream bookFilterProvider() {

    return Stream.of(BookPublishedYearFilter.Before(2007), BookPublishedYearFilter.After(2007));

    }

    ```


    我们还可以注册一个自定义提供者，它可以成对注入值。这可以用来简化我们在上一节中创建的 `BookFilter` 模板测试。同样，测试方法将接收一个 `BookFilter`
    和 `Book[]` 作为参数。然后，它使用提供的过滤器验证 `Book[]` 的值。


    ```

    @ParameterizedTest

    @ArgumentsSource(BookFilterCompositeArgsProvider.class)

    void validateBookFiltersWithBooks(BookFilter filter, Book[] books) {

    assertNotNull(filter);

    assertFalse(filter.apply(books[0]));

    assertTrue(filter.apply(books[1]));

    }

    class BookFilterCompositeArgsProvider implements ArgumentsProvider {

    @Override

    public Stream provideArguments(ExtensionContext context) {

    Book cleanCode = new Book("Clean Code", "Robert C. Martin", LocalDate.of(2008,
    Month.AUGUST, 1));

    Book codeComplete = new Book("Code Complete", "Steve McConnel", LocalDate.of(2004,
    Month.JUNE, 9));

    return Stream.of(Arguments.of(BookPublishedYearFilter.Before(2007), Arrays.array(cleanCode,
    codeComplete)),

    Arguments.of(BookPublishedYearFilter.After(2007), Arrays.array(codeComplete, cleanCode)));

    }

    }

    ```


    `BookFilterCompositeArgsProvider` 提供了一个参数流，其中每个参数实例包含两个值（即一个 `BookFilter` 和一个
    `Book[]`）。


    前面讨论的所有数据源都是可重复的。一个测试可以有多个注解，这些注解可以提供不同的值集。在下面的测试用例中，我们将 `Book[]` 替换为一个 `Book`
    实例。因此，测试方法接收一个 `BookFilter` 和一个 `Book` 作为参数。该测试使用 `BeforeYearArgsProvider` 注解（用于满足
    `BeforePublishedYear` 过滤器条件的值）和 `AfterYearArgsProvider` 注解（用于满足 `AfterPublishYear`
    过滤器条件的值）。


    ```

    @ParameterizedTest(name = "{index} : Validating {1}")

    @DisplayName("Filter validates a passing book")

    @ArgumentsSource(BeforeYearArgsProvider.class)

    @ArgumentsSource(AfterYearArgsProvider.class)

    void validateBookFiltersWithBooks1(BookFilter filter, Book book) {

    assertNotNull(filter);

    assertTrue(filter.apply(book));

    }

    }

    class BeforeYearArgsProvider implements ArgumentsProvider {

    @Override

    public Stream provideArguments(ExtensionContext context) {

    Book cleanCode = new Book("Clean Code", "Robert C. Martin", LocalDate.of(2006,
    Month.AUGUST, 1));

    Book codeComplete = new Book("Code Complete", "Steve McConnel", LocalDate.of(2004,
    Month.JUNE, 9));

    return Stream.of(Arguments.of(BookPublishedYearFilter.Before(2007), cleanCode),

    Arguments.of(BookPublishedYearFilter.Before(2007), codeComplete));

    }

    }

    class AfterYearArgsProvider implements ArgumentsProvider {

    @Override

    public Stream provideArguments(ExtensionContext context) {

    Book cleanCode = new Book("Clean Code", "Robert C. Martin", LocalDate.of(2009,
    Month.AUGUST, 1));

    Book codeComplete = new Book("Code Complete", "Steve McConnel", LocalDate.of(2008,
    Month.JUNE, 9));

    return Stream.of(Arguments.of(BookPublishedYearFilter.After(2007), cleanCode),

    Arguments.of(BookPublishedYearFilter.After(2007), codeComplete));

    }

    }

    ```


    现在，在上述代码中我们使用了 `@DisplayName`。该注解为整个测试执行（包含所有传入的值）赋予一个有意义的名称。此外，通过指定 `@ParameterizedTest`
    的 `name` 属性，可以为每次测试执行提供一个有意义的名称。如果我们不提供任何名称，测试执行会使用注入的值生成一个默认名称。现在让我们运行完整的测试（见图
    7-3）。


    ![A429029_1_En_7_Fig3_HTML.jpg](img/A429029_1_En_7_Fig3_HTML.jpg)


    图 7-3.


    参数化测试结果


    ## 总结


    在本章中，我们首先学习了 JUnit 5 的新扩展 API。我们发现扩展 API 支持测试执行的所有生命周期阶段。该 API 还支持条件测试执行以及测试执行期间生成的异常。JUnit
    5 包使用扩展 API 提供了许多功能，如默认提供者、测试模板和参数化测试。

    '
- fmt: '# 8. Dynamic Tests and Migration from JUnit 4


    In the book, so far, we have learned about different features of JUnit 5 by building
    tests for our `bookstoread` application. All tests that we have added thus far
    have been static in nature. JUnit 5 offers us a new paradigm of runtime test creation.
    In this chapter, we will look at dynamic test generation.


    We have addressed all the features of JUnit 5. We can now say that JUnit 5 is
    going to be the de facto standard for unit testing in the future. Various tools
    and platform are in the process of building support for JUnit 5. We can jump on
    the JUnit 5 bandwagon and start adopting it. But in the past, we developed lots
    of tests and utilities on JUnit 4, which are still delivering value to us. We
    could keep all that code from the older tooling/infrastructure. But that would
    make things difficult as we proceed further. In this chapter, we will also look
    at ways to migrate all our existing JUnit 4-based code to the new version.


    ## Dynamic Tests


    Until now we have experienced a couple of ways (`@Test`, `@TestTemplate`, `@ParameterizedTest`)
    to create a test case. All of these methods define tests which are static in nature.
    The behavior defined in such tests is compile time defined and cannot be altered
    at runtime. Assumptions allow us to add some runtime behavior. But they are also
    limited in the capability they offer. JUnit 5 introduces `@TestFactory`, a dynamic
    model of test execution. The model enables us to generate test cases at runtime.
    The model is quite useful in scenarios where we expect different behaviors based
    on environment, operating system, parameters, application configuration, and so
    on. A method annotated with `@TestFactory` must return a `Stream`/`Collection`/`Iterable`/`Iterator`
    of `DynamicTest`. An attempt to return anything else will result in `org.junit.platform.commons.JUnitException`.
    The `org.junit.jupiter.api.DynamicTest` class consists of a test name and an executable
    which must be executed as part of the test execution.


    ```

    public class DynamicSpec  {

    @TestFactory

    Collection generateFirstTest() {

    return Arrays.asList(

    dynamicTest("Week Test", () -> assertEquals(DayOfWeek.MONDAY,DayOfWeek.of(1))),

    dynamicTest("Month Test", () -> assertEquals(Month.JANUARY, Month.of(1)))

    );

    }

    }

    ```


    A dynamic test has a completely different life cycle when compared to a static
    test. There are no callback/life cycle methods. Also, these tests do not support
    the JUnit 5 extension model. As a result, we cannot inject any parameters using
    the extension model. But Java 8 lambda expressions allow us to pass a single method
    argument to the respective dynamically generated tests. There is a `DynamicTest.stream`
    API (application programming interface) which enables us to pass an iterator of
    input parameters. Each value retrieved from the iterator is passed to a new test
    execution.


    ```

    @TestFactory

    Stream generateParameterizedTest() {

    LocalDate startDate = LocalDate.now();

    Iterator daysIter = Stream.iterate(startDate, date -> date.plusDays(1)).limit(10).iterator();

    return  stream(daysIter, d -> DateTimeFormatter.ISO_LOCAL_DATE.format(d), d ->
    assertNotNull(d));

    }

    ```


    Let’s run `DynamicSpec`. We should see a green bar with 12 test cases being executed.
    We have discussed the fact that dynamic tests do not have test life cycle and
    extension support. But this does not mean that we cannot use these features with
    a dynamic test. The `@TestFactory` method, responsible for generating tests, supports
    all these features. We can register an extension to inject values into the `@TestFactory`
    method.


    ```

    @TestFactory

    @ExtendWith(BooksProvider.class)

    Stream generateBooksTest(Book[] books) {

    return  stream(Arrays.asList(books).iterator(), b  -> String.format("Validating
    : %s",b.getTitle()), b -> assertFalse(b.isProgress()));

    }

    ```


    The foregoing test method injects a `Book[]` using `BooksProvider`, added in Chapter
    [4](#A429029_1_En_4_Chapter.html). The generated tests will contain a book name
    as part of the test name.


    ![A429029_1_En_8_Fig1_HTML.jpg](A429029_1_En_8_Fig1_HTML.jpg)


    Figure 8-1. Dynamic tests


    ## JUnit 4 Support


    JUnit 5 is a rewrite of the framework based on lessons learned in the past. It
    offers us new and simple ways to accomplish things. It has built a new programming
    model and an extensions framework that is not compatible with older versions of
    the framework. Even though the new version is not compatible with the older version,
    the framework writers have made sure that the new and the old versions can coexist
    within the same infrastructure. They have built enough support so that developers
    can have an easy migration path.


    Let’s start by adding a sample JUnit 4-based test to our `bookstoread` project.
    In Chapter [1](#A429029_1_En_1_Chapter.html) we added `BookShelfSpec`. The test
    cases define the behavior for the `BookShelf` class under various scenarios. Now,
    add a new test case `bookstoread.junit4.BookShelfSpec`.


    ```

    @RunWith(MockitoJUnitRunner.class)

    public class BookShelfSpec {

    private BookShelf shelf;

    @Mock

    private Book effectiveJava;

    @Mock

    private Book codeComplete;

    @Rule

    public TemporaryFolder temporaryFolder = new TemporaryFolder();

    @Before

    public void init() throws Exception{

    shelf = new BookShelf();

    temporaryFolder.newFile();

    }

    @Test

    public void emptyBookShelfWhenNoBookAdded() {

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty");

    }

    @Test

    public void bookshelfContainsTwoBooksWhenTwoBooksAdded() {

    shelf.add(effectiveJava, codeComplete);

    List books = shelf.books();

    assertEquals(2, books.size(), () -> "BookShelf should have two books");

    }

    }

    ```


    In the foregoing test case, our test annotations are from the `org.juint` package.
    To use this package we must add `testCompile junit:junit:4.12` dependency in our
    `build.gradle`.


    In the foregoing test case, we have added features of JUnit 4 like Runners and
    Rules, even though a few of them are not required. The aim here is to determine
    how we can work with all these features.


    Let’s try a `./gradlew clean build` to have a successful build. Our `bookstoread`
    application source code has a `junitPlatformTest` plug-in. The plug-in by default
    disables the standard Gradle test task. Enable it by adding the following configuration:


    ```

    junitPlatform{

    enableStandardTestTask true

    }

    ```


    We would also configure the test plug-in for the `bookstoread.junit4` package.


    ```

    test {

    include ''**/junit4/**''

    }

    ```


    A build should give us the test execution report in the `build/reports` folder
    (see Figure [8-2](#A429029_1_En_8_Chapter.html#Fig2)):


    ![A429029_1_En_8_Fig2_HTML.jpg](A429029_1_En_8_Fig2_HTML.jpg)


    Figure 8-2. JUnit 4 tests'
