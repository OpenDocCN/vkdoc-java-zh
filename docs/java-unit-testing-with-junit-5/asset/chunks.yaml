  trans: '

    ## 测试类


    作为程序员，我们通过测试类与单元测试框架进行交互。在第一章中，我们编写了第一个测试类 `BookShelfSpec`，它包含一个测试方法 `shelfEmptyWhenNoBookAdded`，该方法断言当没有添加任何书籍时，`BookShelf`
    应为空。


    在 JUnit 的早期版本中，如果一个类具有以下特征，则被视为测试类：


    *   公开访问权限

    *   一个无参构造函数

    *   至少一个测试方法


    在第一章中，我们编写了测试类 `BookShelfSpec`，如下代码所示，它满足了这些约束条件：


    ```

    package bookstoread;

    import org.junit.jupiter.api.Test;

    import java.util.List;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    public class BookShelfSpec {

    @Test

    public void shelfEmptyWhenNoBookAdded() {

    BookShelf shelf = new BookShelf();

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty");

    }

    }

    ```


    我们不必编写无参构造函数，因为如果类没有其他构造函数，Java 会隐式创建一个。


    在 JUnit 5 中，其中一些约束条件已被放宽。JUnit 5 的测试类和测试方法不再要求是公开的。我们现在可以将它们设为包级私有，如下代码所示：


    ```

    // 为简洁起见，省略了包和导入语句

    class BookShelfSpec {

    @Test

    void shelfEmptyWhenNoBookAdded(){

    BookShelf shelf = new BookShelf();

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty.");

    }

    }

    ```


    放宽此限制的原因是 JUnit 内部使用反射来查找测试类和测试方法。即使它们具有有限的可见性，反射也能发现它们，因此无需将它们设为公开。这意义不大，因为我们可以使用我们喜欢的集成开发环境轻松生成测试类和测试方法存根。所以，作为程序员，我们以前也不需要做太多工作。但在我看来，这是一种微妙的方式，表明如果你不需要某样东西，为什么还要要求它呢。在本节中，我们将只关注测试类。我们将在下一节介绍测试方法。


    ### 构造函数


    JUnit 5 不要求测试类具有公开的无参构造函数。构造函数可以是包级私有的、受保护的，甚至是私有的。以下是带有私有无参构造函数的 `BookShelfSpec`。运行测试用例，你会发现测试仍然可以正常工作。


    ```

    class BookShelfSpec {

    private BookShelfSpec() {

    /*

    此构造函数是私有的

    */

    }

    // 为简洁起见，省略了测试方法

    }

    ```


    JUnit 早期版本对构造函数的另一个约束是它们不能有参数。我们被要求有一个公开的无参构造函数。我们看到在 JUnit 5 中可见性约束被放宽了，但 JUnit
    5 是否也放宽了无参构造函数的约束？你会惊喜地发现，在 JUnit 5 中，测试类构造函数允许有参数。测试方法不仅可以有构造函数，还可以有参数。这是通过提供
    `ParameterResolver` 来实现的。`ParameterResolver` 在运行时动态解析参数。只有当你有一个解析器来解析这些参数并注入它们时，你才能在构造函数或测试方法中使用参数。我们将在第
    8 章中更详细地介绍解析器。为了给你一个快速示例，我们将使用 JUnit 5 内置的解析器之一——`TestInfoParameterResolver`。


    ```

    import org.junit.jupiter.api.TestInfo;

    class BookShelfSpec {

    private BookShelfSpec(TestInfo testInfo) {

    System.out.println("Working on test " + testInfo.getDisplayName());

    }

    // 为简洁起见，省略了测试方法

    }

    ```


    在上述代码中，我们在测试类构造函数中定义了一个 `TestInfo` 类型的参数，该参数稍后在 `print` 语句中使用。`TestInfoParameterResolver`
    向构造函数提供一个 `TestInfo` 实例。`TestInfo` 包含有关当前测试的信息。我们用它来显示测试类的名称。


    当你运行上述代码时，它会为每个测试用例打印语句“`Working on test BookShelfSpec`”。因为我们只有一个测试用例，所以它只会被打印一次。


    ### 使用 @DisplayName


    大多数程序员刚开始使用 JUnit 时，认为测试类名称需要以 `Test` 后缀结尾。在测试类名称中使用 `Test` 只是一种约定；你不必像那样命名你的测试类。如今，许多程序员以
    `Spec` 或 `Specification` 结尾来命名他们的测试类。因此，我们可以编写 `BookShelfSpec` 或 `BookShelfSpecification`，而不是编写
    `BookShelfTest`。`Spec` 命名约定是由行为驱动开发实践推广的。你的目标应该是选择一种命名约定，并在你的项目中坚持使用。


    行为驱动开发将 TDD 原则与领域驱动设计相结合，为软件团队提供共享工具和共享流程，以便在软件开发上进行协作。


    JUnit 5 允许你为测试类使用自定义名称。你可以使用 `org.junit.jupiter.api.DisplayName` 注解来提供一个可以包含空格、特殊字符甚至表情符号的名称。这允许你为测试类使用更有意义的名称。在下一章中，我们将为测试类使用
    `@DisplayName` 注解。


    ```

    import org.junit.jupiter.api.DisplayName;

    import org.junit.jupiter.api.Test;

    import org.junit.jupiter.api.TestInfo;

    @DisplayName("")

    class BookShelfSpec {

    private BookShelfSpec(TestInfo testInfo) {

    System.out.println("Working on test " + testInfo.getDisplayName());

    }

    @Test

    void shelfEmptyWhenNoBookAdded() {

    // 为简洁起见，省略了内容

    }

    }

    ```


    当你在 IDE 中运行 `BookShelfSpec` 时，你将看到正在执行的测试类的名称为 BookShelf Specification，如图 2-1
    所示。


    ![A429029_1_En_2_Fig1_HTML.jpg](img/A429029_1_En_2_Fig1_HTML.jpg)


    图 2-1.


    测试成功


    ## 测试方法


    在 JUnit 的早期版本中，测试方法具有以下特征：


    *   应使用 `org.junt.Test` 注解进行注解。

    *   应具有公开可见性。

    *   不应接受任何参数。

    *   应返回 void。


    在上一节中，我们讨论了在 JUnit 5 中测试方法不再需要是公开的。测试方法可以是受保护的或包级私有的。首选是使用包级私有，因为这样可以减少输入。


    JUnit 5 中的测试必须使用 `org.junit.jupiter.api.Test` 注解进行注解。这与 JUnit 4 中使用的注解不同。JUnit
    5 的设计者选择使用不同的注解，以便他们能够区分不同版本的 JUnit。JUnit 5 可以根据使用的 `@Test` 注解来运行 JUnit 4 和 JUnit
    5 的测试。


    ### 测试方法中的参数


    与测试类构造函数一样，在 JUnit 5 中，测试方法也可以接受参数。以下代码是一个测试方法将 `TestInfo` 作为其参数的示例：


    ```

    @Test

    void shelfEmptyWhenNoBookAdded(TestInfo testInfo) {

    System.out.println("Working on test case " + testInfo.getDisplayName());

    BookShelf shelf = new BookShelf();

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty.");

    }

    ```


    上述代码使用了 JUnit 5 的 `ParameterResolver` API。我们将在本书后面进一步了解它。

    '
- fmt: '### Using `@DisplayName`


    It is said that the most difficult problem in programming is naming. Most programmers
    find it difficult to give good names to classes, methods, and variables. This
    is true for test methods also. We have seen test methods with the names `test1`,
    `test2`, `testSomeMethodName`, and so on. The root cause of “test” in the name
    of the test methods is that JUnit versions prior to version 4 required test method
    names to start with “test” so that JUnit could find test methods. After the introduction
    of `@Test` annotation in JUnit 4, programmers were no longer required to use “test”
    in the test method names. But as people say, “old habits die hard,” so most programmers
    stuck with the older convention.


    Many TDD gurus and evangelists have raised test name concerns at various conferences
    and meetups. They have been urging people to start using better names for their
    test cases.


    > Test names should tell what behavior they are testing rather than names of the
    methods they are testing. — Steve Freeman, Agile guru


    Most programmers think a test method name has a one-to-one correspondence between
    a test method and a production class method. This is not true. We usually end
    up writing more than one behavior test for a single method.


    Test method names must express their intent. We gave a behavioral name, `shelfEmptyWhenNoBookAdded`,
    to our test method. If someone reads the test name, he/she will know what behavior
    we are testing. But the problem with using behavior as a method name is that it
    leads to very long method names. Also, we can’t use spaces in method names so
    readability suffers.


    > Test names which are written as short declarative statements are much more expressive
    than names which are machine readable i.e. they only make sense if you have an
    understanding of a hidden code language to dissect their meaning. — Roy Osherove,
    author of The Art of Unit Testing


    In programming languages like Groovy, we can use String as test names, which mean
    we can use spaces in method names. In Java, there are strict rules for method
    naming so programmers often use an underscore (`_`), as shown in the code that
    follows, which makes it more readable:


    ```

    @Test

    void shelf_empty_when_no_book_added() {

    BookShelf shelf = new BookShelf();

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty.");

    }

    ```


    The `@DisplayName` annotation that we discussed in the previous section is used
    with test methods to provide meaningful names, as shown in the code that follows:


    ```

    @DisplayName("A bookshelf")

    class BookShelfSpec {

    @Test

    @DisplayName("is empty when no book is added to it")

    void shelfEmptyWhenNoBookAdded() {

    BookShelf shelf = new BookShelf();

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty.");

    }

    }

    ```


    In the `BookShelfSpec` class shown previously, we used `@DisplayName` annotation
    with both the test class and the test method to provide readable names. Run the
    test again and you will see a more readable test output as shown in Figure [2-2](#A429029_1_En_2_Chapter.html#Fig2).


    ![A429029_1_En_2_Fig2_HTML.jpg](A429029_1_En_2_Fig2_HTML.jpg)


    Figure 2-2.


    Test case execution with `@DisplayName` annotation


    ## Assertions


    Assertions in JUnit are static methods that we call in our test methods to verify
    expected behavior. Each assertion tests whether the given condition is true or
    not. If an asserted condition does not evaluate to true then a test failure is
    reported. All JUnit 5 assertions are defined as part of `org.junit.jupiter.api.Assertions`
    class. In the single test case that we have written so far, we used `assertTrue`.


    As mentioned in Chapter [1](#A429029_1_En_1_Chapter.html), there are fewer assertions
    in JUnit 5 compared to JUnit 4. In future chapters, we will use AssertJ, a third-party
    library that helps in writing clean assertions. For now, let’s learn what comes
    inbuilt with JUnit 5.


    JUnit 4 supported two assertion syntaxes – traditional assertions that shipped
    with original version of JUnit like `assertTrue`, `assertEquals`, etc., and a
    more readable syntax with `assertThat`. JUnit 5 does not support `assertThat`
    syntax. It is expected that you will use third-party libraries like AssertJ or
    Hamcrest to write `assertThat` assertions.


    Each `assertXXX` method provided by JUnit has at least three overloaded methods.
    Let’s look at one of the assertion methods `assertNull`. Following is a test case
    that makes use of all the overloaded `assertNull` methods:


    *   In this case, the first `assertNull` checks that the value (i.e., `str`) is
    null. If the value is not null then `AssertionFailedError` will be thrown and
    the test will fail.

    *   The second overloaded method allows you to pass in a String message that will
    be shown to the user when a test fails. It’s a best practice to provide an error
    message for all your assertion method calls.

    *   The third method makes use of Java 8 `java.util.function.Supplier` functional
    interface. We passed it a lambda expression that will generate the required message.
    The advantage of this method is that failure message will be retrieved lazily
    from the supplier only when an assertion fails. In case you are building a complex
    message, then, by using a supplier, you will only pay the cost if failure happens.


    ```

    @Test

    void nullAssertionTest() {

    String str = null;

    assertNull(str);

    assertNull(str, "str should be null");

    assertNull(str, () -> "str should be null");

    }

    ```


    Assert methods with two value parameters follow a pattern. The first parameter
    is the expected value and second parameter is the actual value.


    Table [2-1](#A429029_1_En_2_Chapter.html#Tab1) lists some of the most popular
    assert methods that exist in JUnit 5.


    Table 2-1.


    Assertions


    | Assert Method | What It Does |

    | --- | --- |

    | `assertTrue` | Assert that condition is true |

    | `assertFalse` | Assert that condition is false |

    | `assertNull` | Assert that object is null |

    | `assertNotNull` | Assert that object is not null |

    | `assertEquals` | Assert that expected and actual are equal |

    | `assertNotEquals` | Assert that expected and actual are not equal |

    | `assertArrayEquals` | Assert that expected and actual arrays are equals |

    | `assertSame` | Assert that expected and actual refer to the same object |

    | `assertNotSame` | Assert that expected and actual do not refer to the same object
    |


    It is important to note that `assertTrue` and `assertFalse` have one more overloaded
    method, besides the previously discussed three variants. It takes a `java.util.function.BooleanSupplier`
    as an argument. The method could be passed a lambda expression or we could combine
    it with stream, predicates, and partial functions to completely express our expectations.'
