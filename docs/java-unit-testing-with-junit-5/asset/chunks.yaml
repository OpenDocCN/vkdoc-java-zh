    ## 编写你的第一个测试


    让我们开始构建 `bookstoread` 应用。我们将支持的第一个功能是向 BookShelf 添加书籍。在本章中，我们不会完全实现此功能。我们只会编写足够的代码来测试：当我们创建书架时，其中没有书籍（即书架是空的）。


    我们将从编写一个测试规范开始。在 `src/main/test` 目录下创建一个新的包 `bookstoread`。我们将保持扁平的包结构，以使代码更易于阅读。在
    bookstoread 包内，我们将创建一个新类 `BookShelfSpec`。如果你之前编写过 JUnit 测试用例，那么你通常会编写以 Test 或
    Tests 结尾的测试类。在本书中，我们将遵循行为驱动开发（BDD）的命名约定。`*Test` 命名约定会迫使你认为单元测试是唯一的质量保证手段。我们希望你能从行为规范的角度思考，因此我们的测试将以
    `Spec` 结尾。


    你将得到一个空的规范类，如代码片段所示。


    ```

    package bookstoread;

    public class BookShelfSpec {

    }

    ```


    让我们编写第一个测试用例，该用例将断言：当没有书籍添加到书架时，它应该是空的。在 `BookShelfSpec` 内部，添加如下测试用例：


    ```

    package bookstoread;

    import org.junit.jupiter.api.Test;

    import java.util.List;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    public class BookShelfSpec {

    @Test

    public void shelfEmptyWhenNoBookAdded() throws Exception {

    BookShelf shelf = new BookShelf();

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty.");

    }

    }

    ```


    这段代码无法编译，因为还没有 `BookShelf` 类。此时，我们只是假设 `BookShelf` 将来会存在，从而编写了客户端代码。我们只是想以客户端的身份感受一下我们的
    API。我们编写了期望以及我们希望 API 呈现的样子。随着学习的深入，我们将重构 API 以满足我们的期望。


    一个测试用例被分解为以下三个部分：


    *   设置测试用例所需的数据。

    *   调用被测试的单元。

    *   执行断言以验证预期行为是否正确。


    这也被称为 AAA（Arrange，Act 和 Assert）。


    在刚刚展示的测试用例中，你会注意到我们使用了 `org.unit.jupiter.api.Test` 注解。在早期版本的 JUnit 中，注解是 `org.junit.Test`。要编写
    JUnit 5 测试用例，你必须使用 `org.unit.jupiter.api.Test` 注解。JUnit 5 根据测试用例上存在的注解来区分不同版本。


    JUnit 5 精简了断言支持。JUnit 5 中没有 `assertThat` 方法。预期你会使用像 Hamcrest 或 AssertJ 这样的第三方断言库。我们将在后续章节中使用
    AssertJ。在刚刚展示的代码中，我们使用了内置断言 `assertTrue`，它测试条件是否为真。


    让我们编写代码使测试通过。在 `src/main/java` 目录下创建一个新类 `BookShelf`。向其中添加 `books` 方法，如图 1-8 所示。如果你使用
    IntelliJ 为你创建类，则会生成此代码。要使用 IntelliJ 创建 BookShelf，请按 alt + enter 键选中 `BookShelfSpec`
    中的 `BookShelf`，如图 1-8 所示。


    ![A429029_1_En_1_Fig8_HTML.jpg](img/A429029_1_En_1_Fig8_HTML.jpg)


    图 1-8.


    创建类


    要使用 IntelliJ 快捷键创建 `books` 方法，请再次按 alt + enter 键选中 `books` 方法。最后，你将得到一个类，如下面代码所示：


    ```

    package bookstoread;

    import java.util.List;

    public class BookShelf {

    public List books() {

    return null;

    }

    }

    ```


    现在我们的代码可以编译了，让我们运行测试用例。要运行测试用例，请右键单击测试类并选择 `Run ‘BookShelfSpec’`，如图 1-9 所示。


    ![A429029_1_En_1_Fig9_HTML.jpg](img/A429029_1_En_1_Fig9_HTML.jpg)


    图 1-9.


    运行测试


    当你运行测试时，你会看到测试失败，如图 1-10 所示。


    ![A429029_1_En_1_Fig10_HTML.jpg](img/A429029_1_En_1_Fig10_HTML.jpg)


    图 1-10.


    测试失败


    在图 1-10 中你会注意到提到了 JUnit Jupiter。图 1-10 显示 `BookShelfSpec shelfEmptyWhenNoBookAdded`
    测试是由 JUnit Jupiter 引擎执行的。如果你也有 JUnit 4 测试用例，那么你还会看到 JUnit Vintage。我们将在第 8 章中介绍这一点。


    为了使这个测试用例通过，我们将修改 `BookShelf books` 方法的实现，使其返回一个空列表，如下面代码所示：


    ```

    package bookstoread;

    import java.util.Collections;

    import java.util.List;

    public class BookShelf {

    public List books() {

    return Collections.emptyList();

    }

    }

    ```


    再次运行测试用例。这次你将看到令人愉悦的绿色条（见图 1-11）。


    ![A429029_1_En_1_Fig11_HTML.jpg](img/A429029_1_En_1_Fig11_HTML.jpg)


    图 1-11.


    测试成功


    绿色条表示代码符合我们的预期。我们现在可以继续并添加一个新的测试用例。我们将在第 3 章讨论完 JUnit 5 的核心概念后，继续实现此功能。


    ## 总结


    在本章中，你了解了为什么开发者测试对每个程序员来说都是一项宝贵的技能。我们详细讨论了 TDD，然后讨论了单元测试。单元测试通过为软件开发人员提供防止回归的安全网和帮助程序员设计应用程序的指南，从而显著提高生产力。


    本章还讨论了 JUnit，它是 Java 中单元测试的事实标准。JUnit 5 是 JUnit 的一个模块化和可扩展的版本。我们通过使用 IntelliJ
    IDEA IDE 创建一个 Java Gradle 项目并编写了第一个测试用例来结束本章。在下一章中，我们将学习 JUnit 5 的核心概念。


    # 2. 理解 JUnit 5 核心概念


    在第一章中，我们学习了测试驱动开发（TDD）的重要性。我们还讨论了单元测试的关键作用。但在我们继续使用 JUnit 5 构建应用程序之前，理解其核心概念非常重要。


    本章的目标是概述 JUnit 5 的核心概念。JUnit 5 基于以下原则：


    *   最小化占用空间。

    *   简化测试用例。

    *   提供功能上的可扩展性。

    *   优先选择特定的扩展点而非通用的。


    所有这些概念使得新版本在保持更精简和可扩展的同时，专注于测试需求。总而言之，JUnit 5 是对 JUnit 框架的完全重写，因此底层发生了很多变化。因此，即使你了解之前版本
    JUnit 的核心概念，理解 JUnit 5 的不同之处也很重要。


    然后，在下一章中，我们将开始使用 JUnit 5 构建一个 bookstoread 应用程序。构建应用程序将帮助你学习如何将这些核心概念应用到你的工作中。

