  trans: '

    ### 使用 @DisplayName


    据说编程中最难的问题就是命名。大多数程序员都觉得给类、方法和变量起个好名字很困难。测试方法也是如此。我们见过名为 `test1`、`test2`、`testSomeMethodName`
    等等的测试方法。测试方法名称中包含“test”的根本原因在于，JUnit 4 之前的版本要求测试方法名必须以“test”开头，这样 JUnit 才能找到测试方法。在
    JUnit 4 引入 `@Test` 注解后，程序员不再需要在测试方法名中使用“test”。但正如人们所说，“旧习难改”，所以大多数程序员仍然沿用旧的惯例。


    许多 TDD 大师和布道者曾在各种会议和聚会上提出过测试名称的问题。他们一直敦促人们开始为测试用例使用更好的名称。


    > 测试名称应该说明它们测试的是什么行为，而不是它们测试的方法名称。 — 敏捷大师 Steve Freeman


    大多数程序员认为测试方法名与生产类方法名之间存在一一对应关系。事实并非如此。我们通常最终会为一个方法编写多个行为测试。


    测试方法名称必须表达其意图。我们为测试方法起了一个行为名称 `shelfEmptyWhenNoBookAdded`。如果有人读到这个测试名称，他/她就会知道我们在测试什么行为。但将行为作为方法名的问题在于，它会导致方法名非常长。此外，我们不能在方法名中使用空格，因此可读性会受到影响。


    > 以简短声明式语句编写的测试名称，比机器可读的名称更具表现力。也就是说，后者只有在你理解了一种用于解析其含义的隐藏代码语言时才有意义。 — 《单元测试的艺术》作者
    Roy Osherove


    在像 Groovy 这样的编程语言中，我们可以使用字符串作为测试名称，这意味着我们可以在方法名中使用空格。在 Java 中，方法命名有严格的规则，因此程序员经常使用下划线
    (_)，如下面的代码所示，这使其更具可读性：


    ```

    @Test

    void shelf_empty_when_no_book_added() {

    BookShelf shelf = new BookShelf();

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty.");

    }

    ```


    我们在上一节讨论的 `@DisplayName` 注解与测试方法一起使用，以提供有意义的名称，如下面的代码所示：


    ```

    @DisplayName("一个书架")

    class BookShelfSpec {

    @Test

    @DisplayName("当没有书添加到其中时是空的")

    void shelfEmptyWhenNoBookAdded() {

    BookShelf shelf = new BookShelf();

    List books = shelf.books();

    assertTrue(books.isEmpty(), () -> "BookShelf should be empty.");

    }

    }

    ```


    在前面展示的 `BookShelfSpec` 类中，我们在测试类和测试方法上都使用了 `@DisplayName` 注解来提供可读的名称。再次运行测试，你将看到更具可读性的测试输出，如图
    2-2 所示。


    ![A429029_1_En_2_Fig2_HTML.jpg](img/A429029_1_En_2_Fig2_HTML.jpg)


    图 2-2.


    使用 @DisplayName 注解执行测试用例


    ## 断言


    JUnit 中的断言是我们在测试方法中调用的静态方法，用于验证预期行为。每个断言都测试给定条件是否为真。如果断言的条件不为真，则会报告测试失败。所有 JUnit
    5 断言都定义在 `org.junit.jupiter.api.Assertions` 类中。在我们迄今为止编写的单个测试用例中，我们使用了 `assertTrue`。


    如第 1 章所述，与 JUnit 4 相比，JUnit 5 中的断言更少。在后续章节中，我们将使用 AssertJ，这是一个有助于编写清晰断言的第三方库。现在，让我们先了解
    JUnit 5 内置的功能。


    JUnit 4 支持两种断言语法——JUnit 原始版本自带的传统断言，如 `assertTrue`、`assertEquals` 等，以及使用 `assertThat`
    的更易读的语法。JUnit 5 不支持 `assertThat` 语法。建议你使用 AssertJ 或 Hamcrest 等第三方库来编写 `assertThat`
    断言。


    JUnit 提供的每个 `assertXXX` 方法至少有三个重载方法。让我们看看其中一个断言方法 `assertNull`。以下是使用了所有重载 `assertNull`
    方法的测试用例：


    *   在这种情况下，第一个 `assertNull` 检查值（即 str）是否为 null。如果该值不为 null，则会抛出 `AssertionFailedError`，并且测试将失败。

    *   第二个重载方法允许你传入一个字符串消息，该消息将在测试失败时显示给用户。最佳实践是为所有断言方法调用提供错误消息。

    *   第三个方法使用了 Java 8 的 `java.util.function.Supplier` 函数式接口。我们向其传递了一个 lambda 表达式，该表达式将生成所需的消息。此方法的优点是，只有在断言失败时，才会从
    supplier 中延迟获取失败消息。如果你正在构建一条复杂的消息，那么通过使用 supplier，你只需在失败发生时付出代价。


    ```

    @Test

    void nullAssertionTest() {

    String str = null;

    assertNull(str);

