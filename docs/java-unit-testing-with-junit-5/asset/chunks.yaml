    \ Gradle，请将以下内容添加到你的 `build.gradle` 文件中。\n\n```\ntestCompile 'org.junit.jupiter:junit-jupiter-migrationsupport:5.0.1'\n\
    ```\n\nMaven 用户可以将以下内容添加到他们的 `pom.xml` 中。\n\n```\n<dependency>\n    <groupId>org.junit.jupiter</groupId>\n\
    \    <artifactId>junit-jupiter-migrationsupport</artifactId>\n    <version>5.0.1</version>\n\
    \    <scope>test</scope>\n</dependency>\n```\n\n添加依赖项后，你需要通过使用 `@EnableRuleMigrationSupport`\
    \ 注解来注解你的测试类，以在测试用例中启用 Rule API 支持，如下代码所示。\n\n```\nimport org.junit.Rule;\nimport\
    \ org.junit.jupiter.api.Test;\nimport org.junit.jupiter.migrationsupport.rules.EnableRuleMigrationSupport;\n\
    import org.junit.platform.runner.JUnitPlatform;\nimport org.junit.rules.ExpectedException;\n\
    import org.junit.runner.RunWith;\n@EnableRuleMigrationSupport\npublic class BookShelfSpecWithRules\
    \ {\n@Rule\npublic ExpectedException expectedException = ExpectedException.none();\n\
    @Test\nvoid throwsExceptionWhenBooksAreAddedAfterCapacityIsReached() {\nBookShelf\
    \ bookShelf = new BookShelf(1);\nexpectedException.expect(BookShelfCapacityReached.class);\n\
    expectedException.expectMessage(\"BookShelf capacity of 1 is reached. You can't\
    \ add more books.\");\nbookShelf.add(effectiveJava, codeComplete);\n}\n}\n```\n\
    \n除了添加 `@EnableRuleMigrationSupport` 注解之外，你无需对代码库进行任何更改。\n\n现在，你可以运行测试用例，它将成功通过。\n"
- fmt: '# Exception Handling Extension


    As mentioned in Chapter [4](#A429029_1_En_4_Chapter.html), JUnit 5 provides extensibility
    using its Extension API. We will cover the extension API in detail in Chapter
    [7](#A429029_1_En_7_Chapter.html). JUnit 5 provides plug points for developers
    by using the extension API. The `TestExecutionExceptionHandler` Extension interface
    is called when the test results in an exception. Let’s consider a use case where
    we need to log all the exceptions that are thrown by the test cases. We can write
    `LoggingTestExecutionExceptionHandler` as shown in the code that follows:


    ```

    import org.junit.jupiter.api.extension.TestExecutionExceptionHandler;

    import org.junit.jupiter.api.extension. ExtensionContext;

    import java.util.logging.Level;

    import java.util.logging.Logger;

    public class LoggingTestExecutionExceptionHandler implements TestExecutionExceptionHandler
    {

    private Logger logger = Logger.getLogger(LoggingTestExecutionExceptionHandler.class.getName());

    @Override

    public void handleTestExecutionException(ExtensionContext context, Throwable throwable)
    throws Throwable {

    logger.log(Level.INFO, "Exception thrown ", throwable);

    throw throwable;

    }

    }

    ```


    Next, you have to register your extension by annotating your test class or method
    with the `ExtendWith` annotation, passing it the `LoggingTestExecutionExceptionHandler`
    extension as shown in the following code:


    ```

    @ExtendWith(LoggingTestExecutionExceptionHandler.class)

    public class BookShelfSpecWithRules {

    }

    ```


    When you run the code, an exception will be logged as shown next.


    ```

    bookstoread.LoggingTestExecutionExceptionHandler handleTestExecutionException

    INFO: Exception thrown

    bookstoread.BookShelfCapacityReached: BookShelf capacity of 1 is reached. You
    can''t add more books.

    at bookstoread.BookShelf.lambda$add$0(BookShelf.java:30)

    at java.util.Spliterators$ArraySpliterator.forEachRemaining(Spliterators.java:948)

    at java.util.stream.ReferencePipeline$Head.forEach(ReferencePipeline.java:580)

    at bookstoread.BookShelf.add(BookShelf.java:28)

    at bookstoread.BookShelfSpecWithRules.throwsExceptionWhenBooksAreAddedAfterCapacityIsReached(BookShelfSpecWithRules.java:27)

    at sun.reflect.NativeMethodAccessorImpl.invoke0(Native Method)

    at sun.reflect.NativeMethodAccessorImpl.invoke(NativeMethodAccessorImpl.java:62)

    at sun.reflect.DelegatingMethodAccessorImpl.invoke(DelegatingMethodAccessorImpl.java:43)

    at java.lang.reflect.Method.invoke(Method.java:498)

    ```


    ## Working with Test Timeout


    Timeouts are useful when you don’t want your test to wait indefinitely. Until
    the previous version of JUnit, the `@Test` annotation had an attribute to provide
    timeout value. The JUnit 5 test annotation does not support any attribute. Instead,
    JUnit 5 provides assertion methods that can help you deal with this situation.
    JUnit 5 provides extensive support for timeout.


    Let’s start by looking at a simple test case where we expect the test to complete
    in under one second.


    ```

    @Test

    void test_should_complete_in_one_second() {

    assertTimeout(Duration.of(1, ChronoUnit.SECONDS), () -> Thread.sleep(2000));

    }

    ```


    This test will fail as the code execution will sleep for two seconds. We are expecting
    the test case to succeed in under one second.


    `assertTimeout` has many overload variants. The one shown previously takes two
    arguments–timeout duration and `Executable` code. When you run the test case mentioned
    previously, it will fail as expected. You might expect the test to fail in one
    second, but it will fail after two seconds.


    The reason for this is that `assertTimeout` executes the executable code in the
    same thread as the calling code. This means the test will wait for the code execution
    to finish before raising an exception. This will lead to test failure after two
    seconds. On the local test machine, the test failed after 2 seconds and 40 milliseconds.


    There is another set of `assertTimeout` overloaded methods that takes `Duration`
    and `ThrowingSupplier`. The difference is that `ThrowingSupplier` returns a value
    whereas `Executable` does not return a value. So, when you want to assert the
    value returned by code execution, you should use the `assertTimeout` `ThrowingSupplier`
    variant.


    ```

    String message = assertTimeout(Duration.of(1, ChronoUnit.SECONDS), () -> "Hello,
    World!");

    assertEquals("Hello, World!", message);

    ```


    ### assertTimeoutPreemptively


    This method overcomes the limitation of `assertTimeout`. It makes sure that the
    test completes before the timeout. It runs the test in a different thread than
    the calling thread. It will abort the code when the timeout is exceeded.


    ```

    assertTimeoutPreemptively(Duration.of(1, ChronoUnit.SECONDS), () -> Thread.sleep(2000));

    ```


    Now the test will finish just after the timeout duration.


    ## Repeated Tests


    JUnit 5 has added support for running a test a specified number of times. This
    is essential when you work with tests that are flaky in nature. Flaky tests are
    those that exhibit both a passing and failing behavior with the same code base.
    To run a test for X number of times, mark it with `@RepeatedTest` annotation as
    shown in the following code:


    ```

    @RepeatedTest(10)

    void i_am_a_repeated_test() {

    assertTrue(true);

    }

    ```


    This test will run ten times and you will see the test result, as shown in the
    screenshot in Figure [5-1](#A429029_1_En_5_Chapter.html#Fig1), of the integrated
    development environment (IDE).


    ![A429029_1_En_5_Fig1_HTML.jpg](A429029_1_En_5_Fig1_HTML.jpg)


    Figure 5-1. Repeated tests execution


    You can customize the name of the test using a predefined set of placeholders.


    ```

    @RepeatedTest(value = 10, name = "i_am_a_repeated_test__{currentRepetition}/{totalRepetitions}")

    void i_am_a_repeated_test() {

    assertTrue(true);

    }

    ```


    When you run the test, you will see following test output in your IDE as shown
    in the screenshot in Figure [5-2](#A429029_1_En_5_Chapter.html#Fig2).


    ![A429029_1_En_5_Fig2_HTML.jpg](A429029_1_En_5_Fig2_HTML.jpg)


    Figure 5-2. Repeated Test with name


    ## Summary


    In this chapter, you learned how to assert the proper behavior of tests in case
    of exceptions. You learned how to apply various strategies to work with the exceptions.


    In Chapter [6](#A429029_1_En_6_Chapter.html), we will discuss how to integrate
    JUnit 5 with your tools. We will cover build tools, code coverage, IDE, and much
    more.


    # Integrating Tools


    Until now we have been doing development in IntelliJ Idea. We worked with various
    features of JUnit 5 and looked at new ways of doing things. But there are a great
    many tools in the Java ecosystem. There are many categories of tools—build tools,
    integrated development environment (IDE), continuous integration (CI) tools, and
    so on. Each of these categories offers several choices to the developer. In this
    chapter, we will look at ways to integrate JUnit 5 with the tool of our choice.
    We will first integrate JUnit 5 with the build tool of our choice. Then, we will
    integrate the code coverage metric. In the end, we will work with other IDE(s).


    ## Build Tools


    Build tools are responsible for automating a project build. The task of a build
    tool is not limited to source code compilation and binary creation. It also involves
    the execution of any other process like unit tests, static code analysis, binary
    upload, and so forth. There are many build tools in Java ecosystem, with Apache
    Ant, Maven, and Gradle being the ones most often adopted. For each of these tools,
    there is a large catalog of plug-ins that can do varied things. But in this chapter,
    we will focus on tasks around unit testing. The default unit testing plug-ins/extensions
    are based on older versions of JUnit. Thus, they are unsuitable for JUnit 5 tests.
    Let’s look at ways we can execute JUnit 5-based tests with each of these build
    tools. We will start with Gradle as we have based the `bookstoread` application
    on it.'
