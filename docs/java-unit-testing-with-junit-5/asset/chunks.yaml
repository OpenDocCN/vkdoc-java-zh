    \ will be using a Gradle wrapper that downloads and installs Gradle for your project.\
    \ To learn more about Gradle you can refer to Gradle documentation [`https://docs.gradle.org/current/userguide/userguide.html`](https://docs.gradle.org/current/userguide/userguide.html)\
    \ .\n\nNow, that we have all the prerequisites, let’s create a Gradle project\
    \ using IntelliJ Idea.\n\n1.  Launch the IntelliJ IDEA and you will see the following\
    \ screen to create a project as shown in the Figure [1-3](#A429029_1_En_1_Chapter.html#Fig3):\n\
    \n![A429029_1_En_1_Fig3_HTML.jpg](A429029_1_En_1_Fig3_HTML.jpg)\n\nFigure 1-3.\n\
    \nIntelliJ start  \n2.  Click Create New Project to start the process of creating\
    \ a Java Gradle project. You will see a screen to create a new project. Please\
    \ select Gradle and Java as shown in Figure [1-4](#A429029_1_En_1_Chapter.html#Fig4).\n\
    \n![A429029_1_En_1_Fig4_HTML.jpg](A429029_1_En_1_Fig4_HTML.jpg)\n\nFigure 1-4.\n\
    \nImport project  \n3.  You will also have to specify the Project SDK. Click the\
    \ New button to select JDK 8\\. Click Next to move to the next screen. Now, you\
    \ will be asked to specify GroupId and ArtifactId as shown in Figure [1-5](#A429029_1_En_1_Chapter.html#Fig5).\n\
    \n![A429029_1_En_1_Fig5_HTML.jpg](A429029_1_En_1_Fig5_HTML.jpg)\n\nFigure 1-5.\n\
    \nProject properties  \n4.  Click the Next button to move the next screen. This\
    \ screen will ask you to specify few Gradle settings. We will select Use auto-import\
    \ so that Gradle automatically adds new dependencies when we add it to the build\
    \ file. Also, we will select Create directories for empty content roots automatically\
    \ option (refer to Figure [1-6](#A429029_1_En_1_Chapter.html#Fig6)).\n\n![A429029_1_En_1_Fig6_HTML.jpg](A429029_1_En_1_Fig6_HTML.jpg)\n\
    \nFigure 1-6.\n\nGradle properties  \n5.  Click the Next button to move to the\
    \ final screen. In this screen, you will be asked the location where you want\
    \ to create the project. Select a convenient directory path for the application.\
    \ Finally, click the Finish button to complete the project creation process as\
    \ shown in Figure [1-7](#A429029_1_En_1_Chapter.html#Fig7).\n\n![A429029_1_En_1_Fig7_HTML.jpg](A429029_1_En_1_Fig7_HTML.jpg)\n\
    \nFigure 1-7.\n\nProject location\n\nWe will cover JUnit 5 Gradle integration\
    \ later in this book. So, for now just follow the steps related to Gradle.\n\n\
    Now, that our Java Gradle project is created we have to make a couple of changes\
    \ in the Gradle build file (i.e., `build.gradle`). Open the `build.gradle` file\
    \ in IDE and change it to match the following contents:\n\n```\ngroup 'com.junit5book'\n\
    version '1.0-SNAPSHOT'\napply plugin: 'java'\nsourceCompatibility = 1.8\nrepositories\
    \ {\nmavenCentral()\n}\ndependencies {\ndef junitVersion = '5.0.1'\ntestCompile\
    \ 'org.junit.jupiter:junit-jupiter-api:' + junitVersion\ntestCompile 'org.junit.jupiter:junit-jupiter-engine:'\
    \ + junitVersion\n}\n```\n\nIn the `build.` `gradle` file showed in the code we\
    \ have done the following:\n\n*   Changed the sourceCompatibility from 1.5 to\
    \ 1.8: This property of the Gradle Java plug-in is used to specify which version\
    \ of JVM to use. As we will be using JDK 1.8, we changed it to 1.8.\n*   We added\
    \ JUnit 5 dependencies in the dependencies section: We need to add two dependencies–junit-jupiter-api\
    \ and junit-jupiter-engine API. As discussed in section “JUnit 5,” junit-jupiter-api\
    \ defines the API that we need to write tests. The junit-jupiter-engine is the\
    \ implementation of the junit-platform-engine API for JUnit 5.\n\nThat’s all we\
    \ need to do to start using JUnit 5\\. We will cover Gradle JUnit 5 integration\
    \ in future chapters so refer to those chapters to learn more. In the next few\
    \ chapters, we will run our test cases from within IDE."
