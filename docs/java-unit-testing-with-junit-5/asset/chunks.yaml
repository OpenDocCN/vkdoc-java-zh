    ### 测试模板


    JUnit 5 允许我们创建测试骨架，这些骨架通过 `TestTemplateInvocationContext` 实例化，从而在运行时生成测试。生成的测试类似于
    `@Test` 方法。模板支持完整的测试生命周期。任何使用 `@BeforeAll`/`@BeforeEach`/`@AfterEach`/`@AfterAll`
    注解的方法都会根据生成测试的生命周期来执行。


    测试模板是通过在非静态方法测试类上标记 `org.junit.jupiter.api.TestTemplate` 注解来创建的。此外，我们必须注册一个 `TestTemplateInvocationContextProvider`
    扩展的实现，该扩展用于从模板生成实际的测试。


    让我们尝试为我们的 `bookstoread` 应用程序添加一个测试模板。在第 4 章中，我们添加了可应用于 `Book` 的 `BookFilter`。该过滤器验证书籍是否满足某个条件。我们还创建了
    `BookPublishedYearFilter`，它可以根据出版年份来过滤书籍。


    在当前上下文中，让我们添加一个测试模板，该模板可以接收 `BookFilter` 和一个书籍数组，然后断言过滤器的验证结果。


    ```

    class BookFilterTemplateSpec {

    @TestTemplate

    @ExtendWith(BookFilterTestInvocationContextProvider.class)

    void validateFilters(BookFilter filter, Book[] books) {

    assertNotNull(filter);

    assertFalse(filter.apply(books[0]));

    assertTrue(filter.apply(books[1]));

    }

    }

    ```


    如上述测试用例所示，我们还需要创建一个 `BookFilterTestInvocationContextProvider`，它是 `org.junit.jupiter.api.extension.TestTemplateInvocationContextProvider`
    的一个实现。该提供者需要实现以下方法：


    `supportsTestTemplate`：该方法验证提供者是否适用于传入的 `ExecutionContext`。JUnit 执行引擎首先调用此方法来验证提供者是否适用。


    `provideTestTemplateInvocationContexts`：该方法提供一个 `org.junit.jupiter.api.extension.TestTemplateInvocationContext`
    的流。每个 `TestTemplateInvocationContext` 实例负责提供相应的测试名称以及额外的扩展（如果有的话）。


    ```

    class BookFilterTestInvocationContextProvider implements TestTemplateInvocationContextProvider
    {

    @Override

    public boolean supportsTestTemplate(ExtensionContext context) {

    return true;

    }

    @Override

    public Stream provideTestTemplateInvocationContexts(ExtensionContext context)
    {

    Book cleanCode = new Book("Clean Code", "Robert C. Martin", LocalDate.of(2008,
    Month.AUGUST, 1));

    Book codeComplete = new Book("Code Complete", "Steve McConnel", LocalDate.of(2004,
    Month.JUNE, 9));

    return Stream.of(bookFilterTestContext("Before Filter", BookPublishedYearFilter.Before(2007),
    cleanCode, codeComplete),

    bookFilterTestContext("After Filter", BookPublishedYearFilter.After(2007), codeComplete,
    cleanCode));

    }

    private TestTemplateInvocationContext bookFilterTestContext(String testName, BookFilter
    bookFilter, Book... array) {

    return new TestTemplateInvocationContext() {

    @Override

    public String getDisplayName(int invocationIndex) {

    return testName;

    }

    @Override

    public List getAdditionalExtensions() {

    return Lists.newArrayList(new TypedParameterResolver(bookFilter), new TypedParameterResolver(array));

    }

    };

    }

    }

    ```


    让我们详细看看 `provideTestTemplateInvocationContexts` 方法。该方法返回一个 `Stream<TestTemplateInvocationContext>`。每个
    `TestTemplateInvocationContext` 实例提供一个测试显示名称和两个额外的扩展。这些扩展负责为我们的 `validateFilters`
    测试解析方法参数。


    我们的 `BookFilterTestInvocationContextProvider` 生成了以下两个测试用例：


    *   **年份之前测试**：该测试包含 `BookPublishedYearFilter.Before(2007)` 过滤器和一个包含两本书的数组。

    *   **年份之后测试**：该测试包含 `BookPublishedYearFilter.After(2007)` 过滤器和一个包含两本书的数组。


    我们添加了一个 `TypedParameterResolver` 扩展。该扩展接收一个值，并验证它是否是传入方法参数之一的实例。如果是，则返回该值。


    ```

    class TypedParameterResolver implements ParameterResolver {

    T data;

    TypedParameterResolver(T data) {

    this.data = data;

    }

    @Override

    public boolean supportsParameter(ParameterContext parameterContext, ExtensionContext
    extensionContext) throws ParameterResolutionException {

    Class parameterClass = parameterContext.getParameter().getType();

    return parameterClass.isInstance(data);

    }

    @Override

    public Object resolveParameter(ParameterContext parameterContext, ExtensionContext
    extensionContext) throws ParameterResolutionException {

    return data;

    }

    }

    ```


    现在我们已经为测试模板添加了所有必需的组件，让我们执行它。将会运行两个测试，一个执行“年份之前”检查，另一个执行“年份之后”检查（参见图 7-1）。


    ![A429029_1_En_7_Fig1_HTML.jpg](img/A429029_1_En_7_Fig1_HTML.jpg)


    图 7-1.


    测试模板结果

