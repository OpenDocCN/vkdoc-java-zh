  raw: '### Life Cycle of CDI Beans


    CDI scopes define a CDI bean’s life cycle, that is, when the bean is created and
    destroyed. Typically, we don’t instantiate CDI beans ourselves; instead, we delegate
    that job to the runtime (Payara Micro, in our case).


    Sometimes, we need to perform some logic right after our bean is initialized,
    or just before our bean is destroyed; for this purpose, CDI provides the `@PostConstruct`
    and `@PreDestroy` annotations.


    Methods annotated with `@PostConstruct` are invoked by the MicroProfile runtime
    right after the CDI bean is initialized; conversely, methods annotated with `@PreDestroy`
    are automatically invoked just before the bean is destroyed. Methods annotated
    with either `@PostConstruct` or `@PreDestroy` must return void, take no arguments,
    and must not be static.


    We can turn any of our Jakarta EE RESTful Web Services (i.e., classes annotated
    with `@Path`) into a CDI bean by adding one of the scope annotations; typically,
    we would use the `@RequestScoped` annotation, which results in a new instance
    of our service being constructed for every request.


    You could also annotate your RESTful web service with the `@ApplicationScoped`
    annotation, which would result in the same instance of the service responding
    to all requests; this, however, may result in code that scales poorly.


    The following example illustrates a web service turned into a request scoped CDI
    bean:


    ```

    package com.ensode.cdiscopes;

    //imports omitted

    @RequestScoped

    @Path("cdiservice")

    public class CdiService {

    private static final Logger LOGGER =

    Logger.getLogger(CdiService.class.getName());

    @PostConstruct

    public void init() {

    LOGGER.log(Level.INFO, "init() method called");

    }

    @PreDestroy

    public void cleanup() {

    LOGGER.log(Level.INFO, "cleanup() method called");

    }

    @POST

    public void handlePostRequest() {

    LOGGER.log(Level.INFO, "HTTP POST request received");

    }

    }

    ```


    Notice that we annotated our class with the `@RequestScoped` annotation; this
    turns our RESTful web service class into a request scoped CDI bean and grants
    us all functionality available to CDI beans, such as having callback methods that
    the runtime can invoke when the bean is initialized or destroyed.


    We created two callback methods; we annotated the `init()` method with the cdi
    `@PostConstruct` annotation, which lets the runtime know it needs to call this
    method right after our class is constructed. Additionally, we annotated the `cleanup()`
    method with `@PreDestroy`; therefore, it will be called automatically just before
    the bean is destroyed.


    In our example, we are simply sending some output to the logs in our callback
    methods. In a typical application, these callback methods are used to perform
    any necessary initialization, obtain and release resources such as database connections,
    etc.


    Since our service is request scoped, a new instance will be created for each HTTP
    request it handles; therefore, we should see the expected log entries in the Payara
    Micro output for each HTTP request.


    Our application is configured as follows in its Maven pom.xml file:


    ```


    fish.payara.maven.plugins

    payara-micro-maven-plugin

    1.4.0


    ${version.payara}

    false


    --autoBindHttp


    --deploy

    ${project.build.directory}/$

    {project.build.finalName}


    /cdiscopes


    ```


    Notice how we set the context root to `/cdiscopes`; we therefore need to use this
    context root when sending an HTTP request to our service.


    We run our application on Payara Micro via the usual Maven goals:


    ```

    mvn war:exploded payara-micro:start

    ```


    We can see in the Payara Micro output that our application was deployed successfully
    and is listening for requests.


    ```

    [2021-08-30T18:21:02.818-0400] [] [INFO] [] [PayaraMicro] [tid: _ThreadID=1 _ThreadName=main]
    [timeMillis: 1630362062818] [levelValue: 800] [[

    Payara Micro URLs:

    http://192.168.1.165:8080/cdiscopes

    ''cdi-scopes-1.0-SNAPSHOT'' REST Endpoints:

    GET  /cdiscopes/webresources/application.wadl

    POST /cdiscopes/webresources/cdiservice

    ]]

    [2021-08-30T18:21:02.818-0400] [] [INFO] [] [PayaraMicro] [tid: _ThreadID=1 _ThreadName=main]
    [timeMillis: 1630362062818] [levelValue: 800] Payara Micro  5.2021.6 #badassmicrofish
    (build 4579) ready in 8,864 (ms)

    ```


    Now we can send a request to our service; since we annotated the method that will
    handle the request with the `@Post` annotation, we need to send an HTTP POST request
    to our service; the easiest way to do this is via the curl command-line utility.


    ```

    curl -X POST http://localhost:8080/cdiscopes/webresources/cdiservice

    ```


    As previously discussed, curl is included out of the box with most modern operating
    systems.


    We then examine the Payara Micro output.


    ```

    [2021-08-30T18:21:02.818-0400] [] [INFO] [] [PayaraMicro] [tid: _ThreadID=1 _ThreadName=main]
