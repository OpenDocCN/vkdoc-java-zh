  trans: '

    #### 应用程序配置源


    可以将多个 WAR 文件部署到单个 Payara Micro 实例中；我们可以通过命令行实现这一点，只需在 Payara Micro 命令行中添加多个 `--deploy`
    参数即可。


    ```

    java -jar pat/to/payara-micro.jar --deploy path/to/mp-config-example-1.0-SNAPSHOT.war:mpconfigex
    --deploy path/to/mp-application-config-example-1.0-SNAPSHOT.war:mpappconfigex

    ```


    在此示例中，我们将部署两个 WAR 文件，一个名为 *mp-config-example-1.0-SNAPSHOT.war*，另一个名为 *mp-application-config-example-1.0-SNAPSHOT.war*。部署到
    Payara Micro 的每个 WAR 文件都会被分配一个应用程序名称，该名称对应于 WAR 文件的基本名称（在我们的示例中为 `mp-config-example-1.0-SNAPSHOT`
    和 `mp-application-config-example-1.0-SNAPSHOT`）。在命令文件中设置属性时，我们需要指定应用程序名称，如下所示：


    ```

    set-config-property --propertyName=my.config.property --propertyValue=''from application
    source'' --source=application --sourceName=mp-config-example-1.0-SNAPSHOT

    set-config-property --propertyName=my.config.property --propertyValue=''A different
    value'' --source=application –sourceName=mp-application-config-example-1.0-SNAPSHOT

    ```


    从传递给 Payara Micro 的 `postbootcommandfile` 参数的命令文件中执行这些命令将会失败，因为运行此命令时文件尚未部署；幸运的是，Payara
    Micro 提供了另一种通过 `postdeploycommandfile` 参数从文件执行命令的方式。


    ```

    java -jar path/to/payara-micro.jar --deploy path/to/mp-config-example-1.0-SNAPSHOT.war:mpconfigex
    --deploy path/to/mp-application-config-example-1.0-SNAPSHOT.war:mpappconfigex
    --postdeploycommandfile src/main/resources/post-deploy-commands.txt

    ```


    文件名可以是任何内容；它只需要是一个包含要传递给 Payara Micro 的 *asadmin* 命令的纯文本文件。


    从 `postdeploymentcommandfile` Payara Micro 参数执行的命令只有在 WAR 文件部署完成后才会执行；因此，如果我们通过这种方式设置
    MicroProfile Config 属性，注入配置值将会失败，因为它们在应用程序部署时尚未设置。在这种情况下，我们需要通过 `Config.getConfigValue()`
    或 `Config.getValue()` 来检索值。


    例如，在我们的一个 WAR 文件中，我们可以按如下方式检索值：


    ```

    value = config.getValue("my.config.property", String.class);

    ```


    如前所述，`getValue()` 的第一个参数是属性名称；第二个参数是我们正在读取的属性的类型。以下示例说明了我们如何以这种方式检索属性值：


    ```

    package com.ensode.mp.config.example;

    //imports omitted

    @RequestScoped

    @Path("mpconfigexample")

    public class MpConfigDemoService {

    private static final Logger LOGGER = Logger.getLogger(MpConfigDemoService.class.getName());

    private String value;

    @Inject

    private Config config;

    @POST

    @Produces(MediaType.APPLICATION_JSON)

    public void processPostRequest() {

    value = config.getValue("my.config.property", String.class);

    LOGGER.log(Level.INFO, String.format(

    "Property value is: %s", value));

    }

    }

    ```


    当此服务收到 HTTP POST 请求时，它会将属性值显示到 Payara Micro 日志中。


    或者，我们可以通过 `Config.getConfigValue()` 检索属性值。


    ```

    ConfigValue configValue = config.getConfigValue("my.config.property");

    return String.format("Property value is %s", configValue.getValue());

    ```


    `Confg.getValue()` 返回一个 `ConfigValue` 实例，该实例又有一个 `getValue()` 方法，该方法以字符串形式返回属性值。


    我们可以在另一个不同的 WAR 文件中创建第二个 RESTful Web 服务，以这种方式检索属性值。


    ```

    package com.ensode.mp.application.config.example;

    //imports omitted

    @RequestScoped

    @Path("appconfig")

    public class AppconfigResource {

    @Inject

    private Config config;

    @GET

    @Produces(MediaType.TEXT_PLAIN)

    public String processGetRequest() {

    ConfigValue configValue =

    config.getConfigValue("my.config.property");

    return String.format("Property value is %s",

    configValue.getValue());

    }

    }

    ```


    此示例会将属性值作为纯文本返回给调用该服务的客户端。


    按照之前的说明，在后部署命令文件中设置属性并将我们的 WAR 文件部署到单个 Payara Micro 实例后，我们可以验证每个应用程序是否获得了适当的值。


    例如，我们可以按如下方式向第一个服务发送 HTTP POST 请求：


    ```

    curl -X POST http://localhost:8080/mpconfigex/webresources/mpconfigexample

    ```


    然后，如果我们检查 Payara Micro 输出，应该会看到预期的值：


    ```

    [2021-09-20T10:05:18.547-0400] [] [INFO] [] [com.ensode.mp.config.example.MpConfigDemoService]
    [tid: _ThreadID=79 _ThreadName=http-thread-pool::http-listener(2)] [timeMillis:
    1632146718547] [levelValue: 800] Property value is: from application source

    ```


    然后，我们可以向第二个服务（已部署在另一个 WAR 文件中）发送 HTTP GET 请求，并验证返回给客户端的值是否符合预期。


    ```

    curl  http://localhost:8080/mpappconfigex/webresources/appconfig

    Property value is A different value

    ```


    请注意，每个服务检索的是相同的属性名称；但检索到的值不同；正如预期的那样，它们与我们在命令行中传递给 Payara Micro 的后部署命令文件中设置的值相匹配。


    #### 模块配置源


    某些 Jakarta EE 应用程序可能有多个模块；例如，我们可以在企业归档（EAR）文件中部署一个或多个 WAR 文件和 EJB JAR 文件。模块配置源允许属性仅对多模块应用程序中的单个模块可见。


    模块配置源更适合 Payara Server，因为 Payara Micro 不支持部署 EAR 文件中的应用程序。不过，如果我们确实需要，可以将模块配置源用作上一节讨论的应用程序配置源的替代方案。


    ```

    set-config-property --propertyName=my.config.property --propertyValue=''from application
    source'' --source=module --sourceName=mp-config-example-1.0-SNAPSHOT --moduleName=mp-config-example-1.0-SNAPSHOT

    set-config-property --propertyName=my.config.property --propertyValue=''A different
    value'' --source=module --sourceName=mp-application-config-example-1.0-SNAPSHOT
    –moduleName=mp-application-config-example-1.0-SNAPSHOT

    ```


    模块配置源需要 `sourceName` 和 `moduleName` 参数；将应用程序部署到 Payara Micro 时，这两个参数的值必须与应用程序名称（即我们正在部署的
    WAR 文件的根名称）匹配。


    与 *application* 配置源一样，*module* 配置源必须从后部署命令文件中设置；否则，命令将失败，因为执行命令时 WAR 文件尚未部署；此外，在
    *module* 配置源上设置的任何属性都必须通过 `Config` 对象中的适当方法检索；注入这些值将导致应用程序无法正确部署，因为这些属性直到应用程序部署完成后才会设置。

    '
- fmt: '### Cluster Configuration Source


    When we start multiple Payara Micro instances on the same network, they automatically
    form a cluster; this is beneficial as all Payara Micro instances in a cluster
    can share data. We can set configuration properties at the cluster level by issuing
    a command in the command file as follows:


    ```

    set-config-property --propertyName=clustered.property.name --propertyValue=''clustered
    property value'' --source=payara

    ```


    We need to use `cluster` as the source and specify the property name and value
    as usual.


    We can then retrieve the property from any instance of Payara Micro in the cluster
    as usual, for instance, via injection:


    ```

    @Inject

    @ConfigProperty(name = "clustered.property.name")

    private String propertyVal;

    ```


    ### JDBC Configuration Source


    We can use a database table as a MicroProfile configuration source; we set this
    up via the `set-jdbc-config-source` asadmin command, specifying the table name,
    the column containing the property names, and the column containing the property
    values.


    ```

    create-jdbc-connection-pool --datasourceclassname org.h2.jdbcx.JdbcDataSource
    --restype javax.sql.DataSource --property user=sa:password=sa:url="jdbc:h2:tcp://localhost//tmp/property"
    PropertyConnectionPool

    create-jdbc-resource --connectionpoolid PropertyConnectionPool PropertyDataSource

    set-jdbc-config-source-configuration --jndiName PropertyDataSource --tableName
    PROP_TABLE --keyColumnName PROP_NAME --valueColumnName PROP_VAL

    ```


    Before setting up a JDBC configuration source, we need to have set up a JDBC connection
    pool and a JDBC resource. In Payara Micro, we can set up a JDBC connection pool
    via the `create-jdbc-connection-pool` command; we specify an RDBMS specific data
    source class name via the `--datasourceclassname` argument, the resource type
    as `javax.sql.DataSource`, and a number of RDBMS specific properties; the last
    argument is the connection pool id; we need this value when creating a JDBC Resource.


    In this example, we are using an H2 database; values for `--datasourceclassname`
    and `--property` will vary depending on the RDBMS we are using (MySQL, Oracle,
    Sybase, PostgreSQL, etc.); consult your RDBMS documentation for the appropriate
    values to use.


    The next step is to create a JDBC resource from the connection pool we just created;
    we do this via the `create-jdbc-resource` asadmin command, passing the connection
    pool id of the connection pool we just created. The last argument for `create-jdbc-resource`
    is the JNDI name of the resource, which we need to create a JDBC configuration
    source.


    Now that we have created a JDBC connection pool and a JDBC resource, we are ready
    to configure our JDBC config source; we can do this via the `set-jdbc-config-source-configuration`
    command. In our example, we created a JDBC resource with the JNDI name of `PropertyDataSource`;
    we pass this value to the `jndiName` argument of the `set-jdbc-config-source-configuration`
    command. We specify the name of the table containing the properties via the `--tableName`
    argument and the columns containing the property names and values via `--keyColumnName`
    and `--valueColumnName`, respectively.


    In our example, we are reading properties from a table named `PROP_TABLE`, with
    property names and values being stored in columns named `PROPERTY_NAME` and `PROPERTY_VAL`,
    respectively. Figure [5-3](#519485_1_En_5_Chapter.xhtml#Fig3) displays our sample
    table and values.


    ![](images/519485_1_En_5_Chapter/519485_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Sample table for JDBC configuration source


    We could retrieve property values via the MicroProfile Config API as usual, for
    instance, by injecting the configuration value via the `@ConfigProperty` annotation.


    ```

    @Inject

    @ConfigProperty(name="prop1")

    private String propertyVal;

    ```


    Behind the scenes, Payara Micro queries the database and retrieves the value for
    us.


    It is worth noting that the JDBC configuration source is dynamic, meaning that
    if property values change in the database, calls to `config.getValue()` or equivalent
    will retrieve the latest value from the database, in real time.


    ### LDAP Configuration Source


    We can use an LDAP directory as a configuration source; to do so, we need to set
    the configuration source via the `set-ldap-config-source-configuration` command.


    For our example, we will be using the sample directory tree from the Apache DS
    Basic User Guide at [`https://directory.apache.org/apacheds/basic-user-guide.html`](https://directory.apache.org/apacheds/basic-user-guide.html).


    Figure [5-4](#519485_1_En_5_Chapter.xhtml#Fig4) illustrates a sample LDAP directory
    tree we could use for the Payara Micro LDAP configuration source.


    ![](images/519485_1_En_5_Chapter/519485_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Sample LDAP directory tree


    When using LDAP as a configuration source, an entry’s attributes serve as property
    names, with their corresponding values as property values.


    In our example, we will retrieve the entry with an `sn` attribute of *Buckley*;
    we can then retrieve any attribute for that entry in our code via the MicroProfile
    Config API.


    ```

    set-ldap-config-source-configuration --enabled=true --dynamic=true --url=ldap://localhost:10389
    --authType=simple --bindDN=uid=admin,ou=system --bindDNPassword=secret --searchBase=ou=people,o=sevenSeas
    --searchScope=subtree --searchFilter=(&(sn=Buckley))

    ```


    We need to enable our configuration source by passing `--enabled=true` as an argument.
    LDAP configuration sources can either be static or dynamic; if they are static,
    properties are read once when our application is initially deployed; if the value
    is updated in the LDAP directory, new values are not read from our application;
    if we set `dynamic` to `true`, then our application will query the LDAP directory
    in real time, retrieving the latest value in the directory.


    We specify the URL of the LDAP server we wish to connect to via the `--url` parameter.
    Authorization type can either be *none* or *simple*; in our example, we are using
    simple authentication; we specify the distinguished name (dn) of the user we are
    connecting to via the `--bindDN` argument and its password via the `--bindDNPassoword`.
    The `--searchBase` argument specifies the starting node in the LDAP directory
    where we will start searching for our properties; `--searchScope` specifies the
    scope of our search; valid values are *subtree*, *onelevel*, and *object*.


    Table [5-3](#519485_1_En_5_Chapter.xhtml#Tab3) lists the different LDAP configuration
    source search scopes.


    Table 5-3


    LDAP Configuration Source Search Scopes


    | Search Scope | Description |

    | --- | --- |

    | subtree | Search performed against all subordinates of the entry specified in
    `--searchBase` |

    | onelevel | Search performed against entries that are immediate subordinates
    of the entry specified in `--searchBase` |

    | object | Search performed only against the entry specified in `--searchBase`
    |


    The `--searchFilter` parameter specifies a search filter to find values starting
    from the base DN specified in `--searchBase` with the scope specified in `--searchScope`.


    Once we have set up our LDAP configuration source, we can retrieve any attribute
    from the entry matching our configuration; for example, to retrieve the `cn` attribute
    of the LDAP entry in our example, we could invoke `Config.getConfigValue()` as
    follows:


    ```

    ConfigValue configValue = config.getConfigValue("cn");

    ```'
  raw: '#### Cluster Configuration Source


    When we start multiple Payara Micro instances on the same network, they automatically
    form a cluster; this is beneficial as all Payara Micro instances in a cluster
    can share data. We can set configuration properties at the cluster level by issuing
    a command in the command file as follows:


    ```

    set-config-property --propertyName=clustered.property.name --propertyValue=''clustered
    property value'' --source=payara

    ```


    We need to use cluster as the source and specify the property name and value as
    usual.


    We can then retrieve the property from any instance of Payara Micro in the cluster
    as usual, for instance, via injection:


    ```

    @Inject

    @ConfigProperty(name = "clustered.property.name")

    private String propertyVal;

    ```


    #### JDBC Configuration Source


    We can use a database table as a MicroProfile configuration source; we set this
    up via the `set-jdbc-config-source` asadmin command, specifying the table name,
    the column containing the property names, and the column containing the property
    values.


    ```

    create-jdbc-connection-pool --datasourceclassname org.h2.jdbcx.JdbcDataSource
    --restype javax.sql.DataSource --property user=sa:password=sa:url="jdbc:h2:tcp://localhost//tmp/property"
    PropertyConnectionPool

    create-jdbc-resource --connectionpoolid PropertyConnectionPool PropertyDataSource

    set-jdbc-config-source-configuration --jndiName PropertyDataSource --tableName
    PROP_TABLE --keyColumnName PROP_NAME --valueColumnName PROP_VAL

    ```


    Before setting up a JDBC configuration source, we need to have set up a JDBC connection
    pool and a JDBC resource. In Payara Micro, we can set up a JDBC connection pool
    via the `create-jdbc-connection-pool` command; we specify an RDBMS specific data
    source class name via the `--datasourceclassname` argument, the resource type
    as `javax.sql.DataSource`, and a number of RDBMS specific properties; the last
    argument is the connection pool id; we need this value when creating a JDBC Resource.


    In this example, we are using an H2 database; values for `--datasourceclassname`
    and `--property` will vary depending on the RDBMS we are using (MySQL, Oracle,
    Sybase, PostgreSQL, etc.); consult your RDBMS documentation for the appropriate
    values to use.


    The next step is to create a JDBC resource from the connection pool we just created;
    we do this via the `create-jdbc-resource` asadmin command, passing the connection
    pool id of the connection pool we just created. The last argument for `create-jdbc-resource`
    is the JNDI name of the resource, which we need to create a JDBC configuration
    source.


    Now that we have created a JDBC connection pool and a JDBC resource, we are ready
    to configure our JDBC config source; we can do this via the `set-jdbc-config-source-configuration`
    command. In our example, we created a JDBC resource with the JNDI name of `PropertyDataSource`;
    we pass this value to the `jndiName` argument of the `set-jdbc-config-source-configuration`
    command. We specify the name of the table containing the properties via the `--tableName`
    argument and the columns containing the property names and values via `--keyColumnName`
    and `--valueColumnName`, respectively.


    In our example, we are reading properties from a table named `PROP_TABLE`, with
    property names and values being stored in columns named `PROPERTY_NAME` and `PROPERTY_VAL`,
    respectively. Figure [5-3](#519485_1_En_5_Chapter.xhtml#Fig3) displays our sample
    table and values.


    ![](images/519485_1_En_5_Chapter/519485_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Sample table for JDBC configuration source


    We could retrieve property values via the MicroProfile Config API as usual, for
    instance, by injecting the configuration value via the `@ConfigProperty` annotation.


    ```

    @Inject

    @ConfigProperty(name="prop1")

    private String propertyVal;

    ```


    Behind the scenes, Payara Micro queries the database and retrieves the value for
    us.


    It is worth noting that the JDBC configuration source is dynamic, meaning that
    if property values change in the database, calls to `config.getValue()` or equivalent
    will retrieve the latest value from the database, in real time.


    #### LDAP Configuration Source


