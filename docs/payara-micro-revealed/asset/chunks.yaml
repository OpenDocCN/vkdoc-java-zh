    ### MicroProfile JWT 注解


    每个 JAX-RS 应用都需要一个继承自 `javax.ws.rs.core.Application` 的类实例；通常，我们会用 `@ApplicationPath`
    注解该类，以指定应用中所有资源 URI 的基 URI。在保护应用时，我们需要用 `@LoginConfig` 注解该类，如下例所示。


    ```

    package com.ensode.jwtdemo;

    import javax.inject.Singleton;

    import javax.ws.rs.ApplicationPath;

    import javax.ws.rs.core.Application;

    import org.eclipse.microprofile.auth.LoginConfig;

    @Singleton

    @ApplicationPath("webresources")

    @LoginConfig(authMethod = "MP-JWT")

    public class ApplicationConfig extends Application {

    }

    ```


    如示例所示，我们需要将 `@LoginConfig` 的 `authMethod` 属性设置为 `"MP-JWT"`；这会告知 MicroProfile 运行时（Payara
    Micro）我们的应用正在使用 JWT 进行身份验证。


    此外，我们的应用类需要通过 `javax.inject.Singleton` 注解变为单例；否则将导致客户端无法正确进行身份验证。


    一旦我们指定了使用 JWT 进行身份验证，就需要指定哪些角色可以访问受保护端点；这通过 `@RolesAllowed` 注解完成，如下例所示：


    ```

    package com.ensode.jwtdemo;

    import javax.annotation.security.RolesAllowed;

    // 其他导入已省略

    @RequestScoped

    @Path("jwtdemo")

    public class JwtDemoResource {

    @GET

    @Produces(MediaType.TEXT_PLAIN)

    @RolesAllowed({"chief"})

    public String secured() {

    return "受保护端点访问成功\n";

    }

    }

    ```


    `@RolesAllowed` 注解可用于类级别，此时它将应用于该类中的所有端点；也可用于方法级别，此时仅应用于被注解的方法。其值必须是一个字符串数组，包含允许访问该端点的有效角色；这些角色取自
    JWT 中的 *groups* 声明。在我们的示例中，我们使用 jwtenizr 生成令牌，默认情况下，它会创建一个包含以下 groups/roles 的令牌："chief"
    和 "hacker"；在我们的示例中，只有拥有 "chief" 角色的用户才能访问该端点。


    为了使 `@RolesAllowed` 注解按预期工作，我们需要通过 `@RequestScoped` 注解将 JAX-RS 类转换为 CDI 请求作用域
    bean，如示例所示。


    我们可以使用 curl 通过将 Base 64 编码的令牌作为 HTTP 头发送来测试受保护端点，例如：


    ```

    curl -H''Authorization: Bearer eyJraWQiOiJqd3Qua2V5IiwidHlwIjoiSldUIiwiYWxnIjoiUlMyNTYifQ.eyJzdWIiOiJkdWtlIiwidXBuIjoiZHVrZSIsImF1dGhfdGltZSI6MTYzOTQzOTIxNCwiaXNzIjoiYWlyaGFja3MiLCJncm91cHMiOlsiY2hpZWYiLCJoYWNrZXIiXSwiZXhwIjoxNjM5NDQwMjE0LCJpYXQiOjE2Mzk0MzkyMTQsImp0aSI6IjQyIn0.gMwd042R8L_pxmj97j9Bzsz8Vg5cZCSZ_uiSJwqnBD5i811Wq_4l9_DQ-LdRGQwgORKrN3emVfkxOiiWnTSSfEIOKDktuCiJuhlcojeaTvpACaFtnYLI5fZ6hCkurj7TEnrJwVqxJVo_dH6AS45UR2Q3z688oBBSb5_i5gtw9g_84nkWp70FkAjDusz-jLWeebOWAEk6NRv6fN_ZAP1JJcz9WoNordMeXgVe2tFmLz8_yDY_ba-0x1F9vEXBalHz4AwJaAYtW97mvshdnLnKkP48mQGoO4X9Ps6eRCG1viTuTmcHRTACt9osb7wssWIDenhuumz_lI9P9sLVFfj29Q''
    http://localhost:8080/jwt-demo/webresources/jwtdemo

    ```


    上述 *curl* 命令将成功调用我们的端点；如果从命令中移除 `-H` 选项，则请求将失败，并返回 HTTP 状态码 401：未授权。


    要通过 MicroProfile REST 客户端 API 授权请求，我们也需要发送 Base 64 编码的令牌；我们将在下一节中介绍如何执行此操作。


    ## 使用 MicroProfile REST 客户端 API 调用受保护微服务


    为了通过 MicroProfile REST 客户端 API 调用受保护的 RESTful Web 服务，我们需要编写一个接口，并像往常一样使用 `@RegisterRestClient`
    注解；但是，在这种情况下，与实现端点的代码相比，客户端接口中的方法签名和注解存在一些细微差异。


    ```

    package com.ensode.jwtclientdemo;

    import javax.ws.rs.HeaderParam;

    import javax.ws.rs.core.HttpHeaders;

    // 其他导入已省略

    @RegisterRestClient

    @Path("jwtdemo")

    public interface JwtDemoResourceClient {

    @GET

    @Produces(MediaType.TEXT_PLAIN)

    public String secured(@HeaderParam(HttpHeaders.AUTHORIZATION)

    String authorizationHeader);

    }

    ```


    首先要注意的是，我们不应在客户端接口上使用 `@RolesAllowed` 注解；这会导致客户端本身受到保护，这不是我们示例中想要的效果；我们在这里的目标是从一个未受保护的端点调用一个受保护的端点；为此，我们需要将
    JWT 令牌作为 HTTP 头发送。


    我们可以通过使用 `@HeaderParam` 注解一个 `String` 参数来发送 HTTP 头；该注解的 `value` 属性指定了头名称；由于 "Authorization"
    是一个标准的 HTTP 头名称，它在 `HttpHeaders` 类中被定义为 `AUTHORIZATION` 常量。


    请注意，方法签名与 JAX-RS 服务代码中的相应签名并不完全匹配；端点没有定义 `authorizationHeader` 参数。


    我们像往常一样使用 REST 客户端接口，通过 `@Inject` 和 `@RestClient` 注解注入它，然后将 JWT 令牌作为参数传递，该参数将作为
    HTTP 头处理，这要归功于 `@HeaderParam` 接口。


    ```

    package com.ensode.jwtclientdemo;

    // 导入已省略

    @ApplicationScoped

    @Path("jwtclient")

    public class JwtClientResource {

    @Inject

    @RestClient

    private JwtDemoResourceClient jwtDemoResourceClient;

    @Inject

    @ConfigProperty(name = "ensode.jwt.header.string")

    private String jwtHeaderString;

    @GET

    public String accessSecuredEndpoint() {

    jwtDemoResourceClient.secured(

    "Bearer ".concat(jwtHeaderString));

    return "受保护端点访问成功";

    }

    }

    ```


    我们可以将 JWT 令牌作为简单字符串获取；在我们的示例中，我们将其设置为 MicroProfile Config 属性并从中检索；然后我们调用客户端方法，将
    JWT 令牌作为参数传递；为了使身份验证按预期工作，我们需要在令牌文本前加上单词 "Bearer"，我们在调用客户端接口上的方法时就是这样做的。


    为了完整和清晰起见，以下是用于存储 JWT 文本的属性文件：


    ```

    com.ensode.jwtclientdemo.JwtDemoResourceClient/mp-rest/url=http://localhost:8080/jwt-demo/webresources

    ensode.jwt.header.string=eyJraWQiOiJqd3Qua2V5IiwidHlwIjoiSldUIiwiYWxnIjoiUlMyNTYifQ.eyJzdWIiOiJkdWtlIiwidXBuIjoiZHVrZSIsImF1dGhfdGltZSI6MTYzOTQ4ODc4OCwiaXNzIjoiYWlyaGFja3MiLCJncm91cHMiOlsiY2hpZWYiLCJoYWNrZXIiXSwiZXhwIjoxNjM5NDg5Nzg4LCJpYXQiOjE2Mzk0ODg3ODgsImp0aSI6IjQyIn0.C9_ejgLALOo8IVHZ6P6fqoTrVIjrmaqJ_gexHrEzwx0jWExDwLmKLIWKcOHWytKPrW0k1ok8cKUj55rKWG8Vp1-gGhIptWeGF2ckSKu5fCOaoBerJn6x8uDJVeURV8-ABHcoJFSePQx3EEGmoLEb2_EqgBvU4didp-MyUwyyIKiDIuOSu_n-mFq_yB9WpZZiY4lyNS9ewt_TDUmIgteJ2VMsmZaHp3n_RygV0S4FPXhOUHRhKOfLLUorvJzGYsT7dgjbnY6kyh4dgAXWrGnX4kaf0ZFyVXCxsmuvks9Ixltv6krqWe_j-0ZkYMzevgnXbvc3MA9LJWQMhauwtGfw1g

    ```


    请注意，JWT 令牌文本被指定为 `ensode.jwt.header.string` 属性的值，我们在代码中通过 `@ConfigProperty` 注解检索它，并将其传递给客户端接口。

