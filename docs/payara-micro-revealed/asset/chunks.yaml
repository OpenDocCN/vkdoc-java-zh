    [timeMillis: 1640961037148] [levelValue: 800] Payara Micro  5 #badassmicrofish
    (build 879) ready in 8,995 (ms)

    ```


    If we wish to change the context root, we can rename the WAR file to have the
    context root name we want; for example, renaming `cdi-remote-events-1.0-SNAPSHOT.war`
    to `cdiremoteevents.war` will result in the application having a context root
    of `/cdiremoteevents`.


    ## Embedding Payara Micro


    We can embed Payara Micro inside other Java applications. Doing so allows us to
    start/stop/deploy apps, etc., programmatically via Payara Micro’s Java API. The
    following example illustrates how to do this:


    ```

    package com.ensode.embeddedpayaramicroexample;

    import fish.payara.micro.BootstrapException;

    import fish.payara.micro.PayaraMicro;

    import java.io.File;

    public class Main {

    public void startPayaraMicro() throws BootstrapException {

    File warFile = new File("/path/to/some.war");

    PayaraMicro.getInstance().

    setHttpAutoBind(true).

    bootStrap().deploy("applicationname",

    "contextroot", warFile);

    }

    public static void main(String[] args)

    throws BootstrapException {

    new Main().startPayaraMicro();

    }

    }

    ```


    The `PayaraMicro` class is a singleton; it has a static `getInstance()` method
    that returns the `PayaraMicro` instance; we can configure Payara Micro programmatically
    by invoking setter and getter methods; for instance, in our example, we are invoking
    `setHttpAutoBind(true)`, which is equivalent to passing the `--autoBind` command-line
    argument to Payara Micro when running from the command line. The API to configure
    Payara Micro is very intuitive for those familiar with running Payara Micro from
    the command line; refer to the official Payara Micro API JavaDoc at [`https://javadoc.io/doc/fish.payara.extras/payara-micro/latest/index.html`](https://javadoc.io/doc/fish.payara.extras/payara-micro/latest/index.html);
    of particular interest is the `fish.payara.micro` package, particularly the `PayaraMicro`
    class and the `PayaraMicroRuntime` interface.


    Once we have configured the embedded Payara Micro instance, we invoke its `bootstrap()`
    method, which returns an implementation of the `PayaraMicroRuntime` interface;
    to deploy our WAR file, we invoke its `deploy()` method, which takes three arguments:
    a `String` defining a name for our application, a second `String` defining the
    context root for the WAR file, and an instance of `java.io.File` representing
    our WAR file.


    We can then run our application like any other stand-alone Java application. For
    Maven projects, the easiest way is to use the Exec Maven plug-in, which automatically
    sets the class path from our project dependencies; for example:


    ```

    mvn exec:java -Dexec.mainClass="com.ensode.embeddedpayaramicroexample.Main"

    ```


    would run our application, which in turn would start a Payara Micro instance;
    we can then send HTTP requests to this Payara Micro instance as usual.


    ## Summary


    In this chapter, we covered Payara Micro features that go beyond the Jakarta EE
    and MicroProfile standards. We explained how Payara Micro instances cluster automatically.
    We also covered how to share application scoped CDI beans across cluster nodes,
    as well as how to send CDI events across the network to listeners deployed to
    other Payara Micro instances on the cluster.


    Additionally, we covered how to create so-called Uber Jars, which are executable
    JAR files that contain both our application code and the Payara Micro runtime
    bundled together, allowing us to run Payara Micro and deploy our code by running
    an executable JAR file.


    We then covered how to embed Payara Micro in our Java applications and how we
    can configure and deploy our applications and start Payara Micro programmatically.


    # 13. Payara Cloud


    Typically, deploying an application to the cloud involves a lot more work than
    “just” developing the application; “pods” (typically stripped-down virtual Linux
    servers) may need to be configured to run our application; there may be complex
    configuration files that may need to be developed before our application can run
    properly.


    Having to perform all of these administration tasks is where the popular *DevOps*
    term came from, where software developers are now responsible for tasks that were
    traditionally performed by system administrators. These tasks frequently fall
    beyond typical software developers’ areas of expertise; it is not uncommon for
    a development team to have to go through a “trial by fire” period when initially
    migrating their applications to the cloud, having to quickly learn all of these
    additional administration tasks now needed to successfully deploy the application.


    Payara Cloud provides a Payara Micro instance in the cloud and automatically performs
    all the necessary configuration; all that is needed is to deploy a standard WAR
    file; all configuration is generated automatically, akin to deploying to a more
    traditional “heavyweight” Jakarta EE application server.


    ## Signing Up for Payara Cloud


    To sign up to Payara Cloud, visit the following URL: [`https://payara.cloud/#subscribe`](https://payara.cloud/%2523subscribe).


    At the time of writing, Payara Cloud is not yet open to the public; the fine folks
    at Payara allowed us to preview Payara Cloud so that we could write about it in
    the book. Thanks Rudy De Busscher, Payara Product Manager and Developer Advocate,
    as well as the Payara Marketing Team!


    There are three plans available, to fit your budget and needs. There are Basic,
    Standard, and Premium plans, each providing additional computing resources such
    as CPU and RAM and levels of support. Visit the preceding URL for details on each
    plan.


    ## Developing Applications for Payara Cloud


    Developing applications to be deployed in Payara Cloud takes no additional effort
    than developing applications to a local Payara Micro instance. If your application
    deploys and runs well in Payara Micro, it will deploy and run well when deployed
    to Payara Cloud.


    ## Deploying Applications to Payara Cloud


    Payara Cloud has a concept of *namespaces*; a namespace is a group of related
    applications.


    Before you can upload an application to Payara Cloud for the first time, you need
    to create a namespace.'
