    ### CDI Bean 的生命周期


    CDI 作用域定义了 CDI Bean 的生命周期，即 Bean 何时被创建和销毁。通常，我们不会自己实例化 CDI Bean；而是将这项工作委托给运行时（在本例中为
    Payara Micro）。


    有时，我们需要在 Bean 初始化之后或销毁之前执行一些逻辑；为此，CDI 提供了 `@PostConstruct` 和 `@PreDestroy` 注解。


    被 `@PostConstruct` 注解的方法会在 CDI Bean 初始化后由 MicroProfile 运行时调用；相反，被 `@PreDestroy`
    注解的方法会在 Bean 销毁前自动调用。被 `@PostConstruct` 或 `@PreDestroy` 注解的方法必须返回 void，不接受任何参数，并且不能是静态的。


    我们可以通过添加一个作用域注解，将任何 Jakarta EE RESTful Web 服务（即被 `@Path` 注解的类）转变为 CDI Bean；通常，我们会使用
    `@RequestScoped` 注解，这会导致每次请求都会构造一个新的服务实例。


    你也可以使用 `@ApplicationScoped` 注解来注解你的 RESTful Web 服务，这将导致同一个服务实例响应所有请求；然而，这可能会导致代码扩展性不佳。


    以下示例展示了一个转变为请求作用域 CDI Bean 的 Web 服务：


    ```

    package com.ensode.cdiscopes;

    //imports omitted

    @RequestScoped

    @Path("cdiservice")

    public class CdiService {

    private static final Logger LOGGER =

    Logger.getLogger(CdiService.class.getName());

    @PostConstruct

    public void init() {

    LOGGER.log(Level.INFO, "init() method called");

    }

    @PreDestroy

    public void cleanup() {

    LOGGER.log(Level.INFO, "cleanup() method called");

    }

    @POST

    public void handlePostRequest() {

    LOGGER.log(Level.INFO, "HTTP POST request received");

    }

    }

    ```


    请注意，我们使用 `@RequestScoped` 注解标注了我们的类；这会将我们的 RESTful Web 服务类转变为请求作用域的 CDI Bean，并赋予我们
    CDI Bean 可用的所有功能，例如拥有运行时可在 Bean 初始化或销毁时调用的回调方法。


    我们创建了两个回调方法；我们使用 CDI 的 `@PostConstruct` 注解标注了 `init()` 方法，这告诉运行时需要在我们的类构造完成后立即调用此方法。此外，我们使用
    `@PreDestroy` 注解标注了 `cleanup()` 方法；因此，它会在 Bean 销毁前自动被调用。


    在我们的示例中，我们只是在回调方法中向日志输出了一些信息。在典型的应用程序中，这些回调方法用于执行任何必要的初始化、获取和释放资源（如数据库连接）等。


    由于我们的服务是请求作用域的，每个 HTTP 请求都会创建一个新的实例；因此，对于每个 HTTP 请求，我们应该能在 Payara Micro 的输出中看到预期的日志条目。


    我们的应用程序在其 Maven pom.xml 文件中配置如下：


    ```


    fish.payara.maven.plugins

    payara-micro-maven-plugin

    1.4.0


    ${version.payara}

    false


    --autoBindHttp


    --deploy

    ${project.build.directory}/$

    {project.build.finalName}


    /cdiscopes


    ```


    请注意我们如何将上下文根设置为 `/cdiscopes`；因此，在向我们的服务发送 HTTP 请求时，我们需要使用这个上下文根。


    我们通过常用的 Maven 目标在 Payara Micro 上运行我们的应用程序：


    ```

    mvn war:exploded payara-micro:start

    ```


    我们可以在 Payara Micro 的输出中看到，我们的应用程序已成功部署并正在监听请求。


    ```

    [2021-08-30T18:21:02.818-0400] [] [INFO] [] [PayaraMicro] [tid: _ThreadID=1 _ThreadName=main]
    [timeMillis: 1630362062818] [levelValue: 800] [[

    Payara Micro URLs:

    http://192.168.1.165:8080/cdiscopes

    ''cdi-scopes-1.0-SNAPSHOT'' REST Endpoints:

    GET  /cdiscopes/webresources/application.wadl

    POST /cdiscopes/webresources/cdiservice

    ]]

    [2021-08-30T18:21:02.818-0400] [] [INFO] [] [PayaraMicro] [tid: _ThreadID=1 _ThreadName=main]
    [timeMillis: 1630362062818] [levelValue: 800] Payara Micro  5.2021.6 #badassmicrofish
    (build 4579) ready in 8,864 (ms)

    ```


    现在我们可以向我们的服务发送一个请求；由于我们使用 `@Post` 注解标注了处理请求的方法，我们需要向我们的服务发送一个 HTTP POST 请求；最简单的方法是使用
    curl 命令行工具。


    ```

    curl -X POST http://localhost:8080/cdiscopes/webresources/cdiservice

    ```


    如前所述，大多数现代操作系统都预装了 curl。


    然后我们检查 Payara Micro 的输出。


    ```

    [2021-08-30T18:21:02.818-0400] [] [INFO] [] [PayaraMicro] [tid: _ThreadID=1 _ThreadName=main]
    [timeMillis: 1630362062818] [levelValue: 800] Payara Micro  5.2021.6 #badassmicrofish
    (build 4579) ready in 8,864 (ms)

    [2021-08-30T18:36:53.102-0400] [] [INFO] [] [com.ensode.cdiscopes.CdiService]
    [tid: _ThreadID=76 _ThreadName=http-thread-pool::http-listener(1)] [timeMillis:
    1630363013102] [levelValue: 800] init() method called

    [2021-08-30T18:36:53.102-0400] [] [INFO] [] [com.ensode.cdiscopes.CdiService]
    [tid: _ThreadID=76 _ThreadName=http-thread-pool::http-listener(1)] [timeMillis:
    1630363013102] [levelValue: 800] HTTP POST request received

    [2021-08-30T18:36:53.111-0400] [] [INFO] [] [com.ensode.cdiscopes.CdiService]
    [tid: _ThreadID=76 _ThreadName=http-thread-pool::http-listener(1)] [timeMillis:
    1630363013111] [levelValue: 800] cleanup() method called

    ```


    从输出中我们可以看到，当我们向服务发送 HTTP POST 请求时，我们的 `init()` 和 `cleanup()` 方法都按预期被调用了；由于该服务是一个请求作用域的
    CDI Bean，该类在处理请求之前被构造，并在处理之后立即被销毁。Payara Micro 在 Bean 实例化后立即调用了被 `@PostConstruct`
    注解的方法，并在 Bean 销毁前调用了被 `@PreDestroy` 注解的方法。换句话说，一切按预期工作。

