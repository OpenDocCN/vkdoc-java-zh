- fmt: '### Programmatic Application Metrics


    Most MicroProfile metrics annotations have an equivalent implementation we can
    use programmatically. For example, the `Counter` interface is the equivalent of
    the `@Counted` annotation. Implementing metrics programmatically allows us to
    exert more control over the value of our annotations; with `Counter`, for example,
    we can increase or even decrease the counter based on our business requirements,
    as opposed to the `@Counted` annotation, which only increases the counter when
    the annotated method is invoked, and there is no way to decrease the counter via
    the annotation.


    The following example illustrates the usage of the MicroProfile metrics `Counted`
    interface.


    ```

    package com.ensode.application.metrics.programmatic;

    //imports omitted

    @ApplicationScoped

    @Path("employeeservice")

    public class EmployeeResource {

    @Inject

    @Metric

    private Counter employeeCounter;

    private List employeeList =

    snew CopyOnWriteArrayList(); //thread safe

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee) {

    employeeList.add(employee);

    employeeCounter.inc();

    }

    @DELETE

    @Consumes(MediaType.APPLICATION_JSON)

    public void fireEmployee(@QueryParam("firstName") String firstName, @QueryParam("lastName")
    String lastName) {

    Optional employeeToFire =

    employeeList.stream().filter(emp →

    emp.getFirstName().equals(firstName) &&

    emp.getLastName().equals(lastName)).findAny();

    employeeToFire.ifPresent(

    emp -> {

    employeeList.remove(emp);

    employeeCounter.inc(-1);

    });

    }

    }

    ```


    In the preceding example, we inject an implementation of the `Counter` interface
    via the CDI `@Inject` annotation and the MicroProfile `@Metric` annotation. `@Metric`
    identifies the counter instance as a metric and lets the MicroProfile Metrics
    API know it needs to use it to generate application-specific metrics.


    Once we have injected a `Counter` implementation, we can increase or decrease
    the counter as our business requirements dictate. In our example, the counter
    is keeping track of the number of employees in a `List`; it increases every time
    an employee is hired and decreases every time an employee is fired.


    Table [6-1](#519485_1_En_6_Chapter.xhtml#Tab1) lists metrics we can use programmatically,
    along with their annotation equivalents.


    **Table 6-1** Programmatic Metrics


    | Metric Interface | Annotation |

    | --- | --- |

    | `Counter` | `@Counted` |

    | `ConcurrentGauge` | `@ConcurrentGauge` |

    | `SimpleTimer` | `@SimpleTimer` |

    | `Timer` | `@Timer` |


    We already saw an example of the `Counter` interface; `ConcurrentGauge` works
    similarly, but it provides a `dec()` method we can use to decrement the counter.
    `Timer` and `SimpleTimer` both provide overloaded methods of a `time()` method;
    taking an instance of a `Callable` or `Runnable` interface implementation (typically
    implemented as a lambda expression), we can use to time-specific events in our
    application. For example, if we wanted to find out how long it takes to add an
    employee to the `Employee` list, we could do it as follows:


    ```

    package com.ensode.application.metrics.programmatic;

    //imports omitted

    @ApplicationScoped

    @Path("employeeservice")

    public class EmployeeResource {

    @Inject

    @Metric

    private SimpleTimer employeeAddSimpleTimer;

    private List employeeList = new CopyOnWriteArrayList(); //thread safe

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee) {

    employeeAddSimpleTimer.time(() -> {

    employeeList.add(employee);

    });

    }

    }

    ```


    In this example, we inject an instance of `SimpleTimer` via the `@Inject` and
    `@Metric` annotations as usual, when we wrap the call to add an employee to the
    list in a lambda expression and pass the resulting `Runnable` implementation to
    the `time()` method in our `SimpleTimer`.


    There is one more metric provided by the MicroProfile API called a `Histogram`,
    which calculates the distribution of a value. To use `Histogram`, we inject it
    as usual and then invoke its `update()` method to add values to the histogram,
    as illustrated in the following example.


    ```

    package com.ensode.application.metrics.programmatic;

    //imports omitted

    @ApplicationScoped

    @Path("employeeservice")

    public class EmployeeResource {

    @Inject

    @Metric

    private Histogram histogram;

    private List employeeList = new CopyOnWriteArrayList(); //thread safe

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee) {

    employeeList.add(employee);

    histogram.update(employeeList.size());

    }

    }

    ```


    ## Configuring MicroProfile Metrics in Payara Micro


    We can configure metrics in Payara Micro via the `set-metrics-configuration` asadmin
    command via a command file passed as a post boot command file or similar.


    ### Disabling Metrics


    Payara Micro enables metrics by default; if we wish to disable them, we can use
    the following asadmin command:


    ```

    set-metrics-configuration --enabled=false

    ```


    ### Securing Metrics


    By default, the `/metrics` endpoint is unsecured, meaning any random unauthenticated
    user can access it.


    If we wish to secure it, we can do so by issuing the following asadmin command:


    ```

    set-metrics-configuation --securityenabled=true

    ```


    When securing the `/metrics` endpoint, we can specify which roles have access
    to it as follows:


    ```

    set-metrics-configuration --roles=role1,role2,role3

    ```


    The value of the `--roles` argument is a comma-separated list of roles allowed
    to access the generated metrics.


    ### Customizing the Metrics Endpoint


    By default, metrics can be retrieved via the `/metrics` endpoint. We can use a
    different endpoint if we wish.


    ```

    set-metrics-configuration --endpoint=foo

    ```


    The value of the `--endpoint` argument is the context root of our custom metrics
    endpoint.


    ### Static Metrics


    By default, metrics are updated dynamically as our application runs; if, instead,
    we wish to have static metrics that won’t update until our application restarts,
    we can do so as follows:


    ```

    set-metrics-configuration --dynamic=false

    ```


    ## Summary


    In this chapter, we covered Payara Micro support for the MicroProfile Metrics
    API. We generate metrics to be consumed by monitoring tools. We covered how to
    use annotations provided by MicroProfile metrics to generate metrics with almost
    no effort on our part; we also saw how we can generate metrics programmatically
    for cases when we need more control on how to generate those metrics.


    # 7. High Availability and Fault Tolerance


    When developing an application using a microservices architecture, we typically
    have a number of services that depend on one another. It is possible that one
    or more of the services may go down, possibly bringing the whole system down with
    them. The MicroProfile Fault Tolerance API provides functionality we can use to
    mitigate this risk, providing several annotations we can use to configure how
    the system behaves when one or more microservices are not available or otherwise
    not working properly.'
