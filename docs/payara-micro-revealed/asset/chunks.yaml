    JSON string’s properties will result in those fields being automatically populated
    with the corresponding values. All we need to do is annotate our method with the
    `@Consumes` and `@Produces` annotations using the appropriate media type.


    ```

    package com.ensode.jsonprocessing;

    //imports omitted

    @Path("messageprocessor")

    public class MessageProcessor {

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    public Message processMessage(Message message) {

    Message returnedMessage = new Message();

    returnedMessage.setMsgText(message.getMsgText().

    toUpperCase());

    return returnedMessage;

    }

    }

    ```


    Our Message class is a simple POJO (plain old Java object).


    ```

    package com.ensode.jsonprocessing;

    public class Message {

    private String msgText;

    public String getMsgText() {

    return msgText;

    }

    public void setMsgText(String msgText) {

    this.msgText = msgText;

    }

    }

    ```


    In our example, the client is expected to send a JSON string that can be parsed
    into a `Message` object. By simply annotating our method with the `@Consumes`
    annotation and specifying *application/JSON* as the media type, data from the
    client is used to automatically populate an instance of our Message class.


    We could invoke our service using curl as follows:


    ```

    curl -X PUT http://localhost:8080/webresources/messageprocessor -H "Content-Type:
    application/json" -d ''{"msgText":"Yay for seamless JSON parsing!"}''

    ```


    Notice that the JSON data we are sending to the service has a `msgText` property;
    this property is used to populate the corresponding `msgText` instance variable
    in our Message class.


    Our example service method returns another instance of the `Message` class, since
    we are using the `@Produces` annotation with a media type of *application/json*;
    this return value is automatically converted to a JSON string, which we can see
    in the output of the preceding `curl` command.


    ```

    {"msgText":"YAY FOR SEAMLESS JSON PARSING!"}

    ```


    ## Summary


    In this chapter, we saw how we can develop RESTful web services with the Jakarta
    RESTful Web Services API. We saw how using a few simple annotations can convert
    a Java class to a RESTful web service and handle HTTP requests, including GET,
    PUT, POST, DELETE, and PATCH requests.


    We also covered parameters to our RESTful web services. We saw how to process
    path parameters via the `@PathParam` annotation. Additionally, we saw how to process
    query parameters via the `@QueryParam` annotation.


    Finally, we saw how we can seamlessly parse JSON strings and populate our Java
    objects and how to easily generate JSON strings from plain old Java objects.


    # 3. Developing Microservice Clients


    In a typical microservice architecture, an application is composed from a number
    of independently developed and deployed microservices. These microservices need
    to communicate with one another over the network. By far, the most common way
    to implement this functionality is to have microservices developed as RESTful
    web services, with some microservices acting as RESTful web service clients for
    others.


    Payara Micro supports the MicroProfile REST client API, which greatly simplifies
    the development of RESTful web service clients.'
  trans: '

    ### 路径参数


    路径参数会在调用 RESTful Web 服务时被添加到路径中；例如，以下 RESTful Web 服务 URI 包含两个路径参数：第一个参数值为“Mr”，第二个参数值为“Heffelfinger”。


    *http://localhost:8080/webresources/pathparams/Mr/Heffelfinger*


    为了让我们的 RESTful Web 服务能够接受路径参数，我们需要在方法级别添加 `@Path` 注解，并为每个对应路径参数的方法参数添加 `@PathParam`
    注解。


    ```

    package com.ensode.pathparams;

    //imports omitted

    @Path("pathparams")

    public class PathParamsSampleService {

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    @Path("/{title}/{lastName}")

    public String sayFormalHello(@PathParam("title") String title,

    @PathParam("lastName") String lastName) {

    return String.format("{\n"

    + "  \"msg\":\"Hello, %s %s\"\n"

    + "}", title, lastName);

    }

    }

    ```


    方法级别的 `@Path` 注解提供了一个 URI 模板，指定了每个路径参数的位置。在我们的示例中，第一个参数名为 `title`，第二个参数名为 `lastName`；我们通过这种方式使用
    `@Path` 注解来指定期望的路径参数顺序。


    为了将路径参数绑定到方法参数，我们使用了示例中所示的 `@PathParameter` 注解；请注意，`@PathParameter` 注解的值必须与方法级别
    `@Path` 注解中指定的 URI 模板变量名称（在我们的示例中为 `title` 和 `lastName`）相匹配。


    当客户端调用我们的服务时，期望客户端按正确顺序传递预期的参数；例如，我们可以使用 `curl` 如下调用我们的服务：


    curl `http://localhost:8080/webresources/pathparams/Mr/Heffelfinger`


    在这种情况下，*Mr* 对应于我们第一个参数的值，如方法级别 *@Path* 注解的 URI 模板中所定义；*Heffelfinger* 对应于第二个路径参数，同样在
    URI 模板中定义；通过使用 *@PathParam* 注解（其值与 URI 模板中定义的 URI 变量（在我们的示例中为 *title* 和 *lastName*）匹配）对这些参数进行注解，这些值会自动绑定到相应的方法参数。


    一旦我们调用服务，它将返回一个包含相应值的 JSON 字符串。


    ```

    {

    "msg":"Hello, Mr Heffelfinger"

    }

    ```


    ### 查询参数


    我们可以向 RESTful Web 服务传递参数的第二种方式是通过查询参数。在这种情况下，参数作为包含名称-值对的查询，在我们的 Web 服务的 URI 中发送。


    例如，使用 curl，我们可以向 RESTful Web 服务端点传递查询参数，如下所示：


    ```

    curl "http://localhost:8080/webresources/queryparams?title=Mr&lastName=Heffelfinger"

    ```


    在此示例中，RESTful Web 服务端点的 URI 是 `http://localhost:8080/webresources/queryparams`；此示例有两个参数，分别名为
    `title` 和 `lastName`。问号用于分隔 URI 和查询之间的边界。


    ```

    package com.ensode.queryparams;

    //imports omitted

    @Path("queryparams")

    public class QueryParamsSampleService {

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public String sayFormalHello(@QueryParam("title") String title,

    @QueryParam("lastName") String lastName) {

    return String.format("{\n"

    + "  \"msg\":\"Hello, %s %s\"\n"

    + "}", title, lastName);

    }

    }

    ```


    参数名称由 `@QueryParam` 注解定义；客户端发送的值会自动绑定到相应的方法参数。此示例的输出与我们上一节讨论的路径参数示例相同。


    ## 解析 JSON 数据


    RESTful Web 服务可以消费和生成多种格式的数据，其中 JSON 是目前最常见的一种。


    Jakarta RESTful Web 服务可以自动在 JSON 数据和 Java 之间进行转换，几乎无需我们付出任何努力。拥有一个字段与 JSON 字符串属性匹配的
    Java 类，将导致这些字段自动填充相应的值。我们所要做的就是使用适当的媒体类型，用 `@Consumes` 和 `@Produces` 注解来注解我们的方法。


    ```

    package com.ensode.jsonprocessing;

    //imports omitted

    @Path("messageprocessor")

    public class MessageProcessor {

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    public Message processMessage(Message message) {

    Message returnedMessage = new Message();

    returnedMessage.setMsgText(message.getMsgText().

    toUpperCase());

    return returnedMessage;

    }

    }

    ```


    我们的 Message 类是一个简单的 POJO（普通 Java 对象）。


    ```

    package com.ensode.jsonprocessing;

    public class Message {

    private String msgText;

    public String getMsgText() {

    return msgText;

    }

    public void setMsgText(String msgText) {

    this.msgText = msgText;

    }

    }

    ```


    在我们的示例中，期望客户端发送一个可以解析为 `Message` 对象的 JSON 字符串。只需用 `@Consumes` 注解我们的方法，并将 *application/JSON*
    指定为媒体类型，来自客户端的数据就会用于自动填充我们 Message 类的一个实例。


    我们可以使用 curl 如下调用我们的服务：


    ```

    curl -X PUT http://localhost:8080/webresources/messageprocessor -H "Content-Type:
    application/json" -d ''{"msgText":"Yay for seamless JSON parsing!"}''

    ```


    请注意，我们发送给服务的 JSON 数据有一个 `msgText` 属性；此属性用于填充我们 Message 类中相应的 `msgText` 实例变量。


    我们的示例服务方法返回 `Message` 类的另一个实例，因为我们使用了媒体类型为 *application/json* 的 `@Produces` 注解；此返回值会自动转换为
    JSON 字符串，我们可以在前面 `curl` 命令的输出中看到它。


    ```

    {"msgText":"YAY FOR SEAMLESS JSON PARSING!"}

    ```


    ## 总结


    在本章中，我们了解了如何使用 Jakarta RESTful Web 服务 API 开发 RESTful Web 服务。我们看到了如何使用几个简单的注解将
    Java 类转换为 RESTful Web 服务并处理 HTTP 请求，包括 GET、PUT、POST、DELETE 和 PATCH 请求。


    我们还介绍了 RESTful Web 服务的参数。我们了解了如何通过 `@PathParam` 注解处理路径参数。此外，我们还了解了如何通过 `@QueryParam`
    注解处理查询参数。


    最后，我们了解了如何无缝地解析 JSON 字符串并填充我们的 Java 对象，以及如何从普通 Java 对象轻松生成 JSON 字符串。


    # 3. 开发微服务客户端


    在典型的微服务架构中，应用程序由许多独立开发和部署的微服务组成。这些微服务需要通过相互通信。到目前为止，实现此功能最常见的方式是将微服务开发为 RESTful
    Web 服务，其中一些微服务充当其他微服务的 RESTful Web 服务客户端。


    Payara Micro 支持 MicroProfile REST 客户端 API，这极大地简化了 RESTful Web 服务客户端的开发。

    '
- fmt: '# MicroProfile REST Client API Overview


    The MicroProfile REST client API makes developing RESTful web service clients
    very easy, especially if we are developing clients for RESTful web services developed
    with Jakarta RESTful Web Services (covered in Chapter [2](#519485_1_En_2_Chapter.xhtml)).


    Essentially, a MicroProfile RESTful web service client consists of a sole Java
    interface with method signatures matching the corresponding RESTful web service
    method signature (i.e., same method name and parameters).


    At the class level, a MicroProfile REST client interface uses the `@Path` annotation;
    its value argument must match the corresponding `@Path` annotation on the service.


    Each abstract method on a MicroProfile REST client interface must have the same
    annotations as the corresponding method on the server (`@Path`, `@PUT`, `@Consumes`,
    `@Produces`, etc.).


    In practice, the easiest way to develop a MicroProfile REST client is to copy
    the source code for the service, change the class to an interface, and remove
    all method bodies. At this point, we are 95% done with “developing” our RESTful
    web client.


    Once we have an interface matching our service, we need to add the `@RegisterRestClient`
    annotation at the interface level; this annotation indicates that the interface
    is a RESTful web service client.


    A typical RESTful web service client interface looks like the following:


    ```

    package com.ensode.jsonparsingclient;

    //Imports omitted

    @RegisterRestClient

    @Path("messageprocessor")

    public interface MessageProcessorClient {

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    public Message processMessage(Message message);

    }

    ```


    This example is a RESTful web service client for the service we developed in the
    “Parsing JSON Data” section in the previous chapter. Notice that all annotations
    match their counterparts on the source code for the service.


    Please note that we don’t (and shouldn’t) write an implementation for our RESTful
    web service client interfaces; the implementation is generated at runtime by Payara
    Micro (or any MicroProfile-compliant runtime). If we don’t write an implementation
    for our RESTful web service client, then how do we specify the URI of the service
    we are interacting with? The answer lies in the MicroProfile Config API.


    We will cover the MicroProfile API in detail later in the book; for now, we will
    just cover what is necessary to indicate the URI of the service we are interacting
    with.


    In order to specify the URI of our service, we need to create a file called `microprofile-config.properties`
    and place it in a directory called `META-INF` in the root of our WAR file. If
    using Maven, this file must be placed under `src/resources/META-INF`; Maven will
    place it in the right location in our WAR file when we build.


    We need a single property per RESTful web service client in our application; the
    property name must follow the following format:


    `<fully qualified RESTful client interface name>/mp-rest/url`


    In our example, the property name would be


    `com.ensode.jsonparsingclient.MessageProcessorClient/mp-rest/url`


    The value of the property must match the URI for our service, including the root
    URL defined in the Application class; in our example, the URI for our service
    is


    `http://localhost:8080/webresources`


    Therefore, the name/value pair in our `microprofile-config.properties` file would
    look as follows:


    ```

    com.ensode.jsonparsingclient.MessageProcessorClient/mp-rest/url=http://localhost:8080/webresources

    ```


    This section described the general pattern we need to follow to develop RESTful
    web service clients using the MicroProfile REST client API. Next, we will cover
    specifics for each type of HTTP requests, path and query parameters, and passing
    data to the services in the body of our requests.


    To use our REST client interface, we need to inject it into another artifact (typically
    a RESTful web service developed against the Jakarta RESTful Web Services API)
    via CDI’s `@Inject` annotation, plus the `@RestClient` annotation provided by
    the MicroProfile REST client API.


    ```

    @ApplicationScoped

    public class MessageProcessorRestClient {

    private static final Logger LOGGER = Logger.getLogger(MessageProcessorRestClient.class.getName());

    @Inject

    @RestClient

    private MessageProcessorClient messageProcessorClient;

    public void init(@Observes @Initialized(ApplicationScoped.class)

    Object object) {

    Message message = new Message();

    Message returnedMessage;

    message.setMsgText(

    "Hello from the MicroProfile REST client!");

    returnedMessage =

    messageProcessorClient.processMessage(message);

    LOGGER.log(Level.INFO, String.format(

    "Server returned the following message: %s",

    returnedMessage.getMsgText()));

    }

    }

    ```


    In this example, we are using a Jakarta Contexts and Dependency Injection (CDI)
    trick to execute code upon application initialization.


    Notice the `@Observes @Initialized(ApplicationScoped.class)` annotations on the
    `object` parameter of the `init()` method; these annotations cause the `init()`
    method to be executed by the runtime when the CDI application scope is initialized,
    which happens to coincide to when the application has been fully deployed. This
    trick allows us to run any arbitrary Java code when our application is initialized,
    combined with the ability to launch MicroProfile applications from the command
    line; this trick allows us to write simple command-line test clients for our RESTful
    web services.


    CDI is covered in detail later in the book.


    We just described the general pattern to develop REST client applications using
    the MicroProfile REST client API; in the following sections, we’ll go into some
    specifics.'
