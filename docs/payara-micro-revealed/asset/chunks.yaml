- fmt: '### Configuration via Property Files


    The easiest and most straightforward way to configure our applications is by adding
    `microprofile-config.properties` file to our WAR file; the standard location for
    this file is inside the `META-INF` directory at the root of the `CLASSPATH` of
    our WAR files. In a typical Maven project, the location of the property file in
    the WAR file would be `WEB-INF/classes/META-INF/microprofile-config.properties`;
    on the source code, we would place it under `src/main/resources/META-INF/microprofile-config.properties`,
    with Maven placing the file in the correct location in the WAR file when we build
    our code.


    To see an example of this, let’s suppose we want to send additional output to
    the Payara Micro log when we are in a development environment but suppress that
    output in other environments such as test or production. To accomplish something
    like this, we could set a `project.stage` property in `microprofile-config.properties`.


    ```

    project.stage=production

    ```


    In a standard Maven project, this file needs to be placed under `src/resources/META-INF`.
    Figure [5-1](#519485_1_En_5_Chapter.xhtml#Fig1) illustrates the directory tree.


    ![](images/519485_1_En_5_Chapter/519485_1_En_5_Fig1_HTML.jpg)


    **Figure 5-1** `microprofile-config.properties` directory location


    We can retrieve the property via the `@ConfigProperty` annotation provided by
    the MicroProfile Config API.


    ```

    package com.ensode.mp.config.example;

    //imports omitted

    @RequestScoped

    @Path("mpconfigexample")

    public class MpConfigDemoService {

    private static final Logger LOGGER =

    Logger.getLogger(MpConfigDemoService.class.getName());

    @Inject

    @ConfigProperty(name = "project.stage")

    private String projectStage;

    @POST

    @Produces(MediaType.APPLICATION_JSON)

    public void processPostRequest() {

    LOGGER.log(Level.INFO, String.format(

    "Project stage is: %s", projectStage));

    ProjectStageEnum projectStageEnum =

    ProjectStageEnum.valueOf(projectStage.toUpperCase());

    if (ProjectStageEnum.DEVELOPMENT.equals(projectStageEnum)) {

    LOGGER.log(Level.INFO,

    "processPostRequest() method invoked");

    }

    if (ProjectStageEnum.DEVELOPMENT.equals(projectStageEnum)) {

    LOGGER.log(Level.INFO,

    "leaving processPostRequest() method");

    }

    }

    }

    ```


    As we can see in the example, we need to use CDI’s `@Inject` annotation in conjunction
    with `@ConfigProperty` to retrieve the value of the property. `@ConfigProperty`
    has a `name` attribute whose value needs to match the name of the property as
    defined in `microprofile-config.properties`.


    When developing our applications, the easiest and most straightforward way to
    run our code is via Maven, as usual.


    ```

    mvn war:exploded payara-micro:start

    ```


    We can send an HTTP POST request using `curl` as follows:


    ```

    curl -X POST http://localhost:8080/mpconfigex/webresources/mpconfigexample

    ```


