  trans: '

    #### 密码配置源


    Payara Server 和 Payara Micro 都允许我们设置密码别名。密码别名的目的是为了安全；密码别名允许我们在需要读取密码时使用别名来代替实际密码。这使我们无需在代码中硬编码密码。


    为了在 Payara Micro 中设置密码别名，我们需要创建一个包含所需密码的密码文件，内容如下：


    ```

    AS_ADMIN_ALIASPASSWORD=secret

    ```


    然后，我们在启动后命令文件中使用 `create-password-alias` 命令：


    ```

    create-password-alias my-password --passwordfile=/path/to/password.txt

    ```


    如果需要创建多个密码别名，我们可以创建多个密码文件，并在启动后命令文件中包含多个 create-password-alias 命令：


    ```

    create-password-alias my-password --passwordfile=/tmp/password.txt

    create-password-alias another-password –passwordfile=/tmp/password2.txt

    ```


    创建好密码别名后，用于检索它们的属性名称遵循以下模式：`${ALIAS=alias-name}`。


    在我们的示例启动后命令文件中，我们创建了两个密码别名，分别名为 *my-password* 和 *another-password*；我们可以通过 `@ConfigSource`
    注解在代码中检索它们，如下所示：


    ```

    @Inject

    @ConfigProperty(name = "${ALIAS=my-password}")

    private String password;

    @Inject

    @ConfigProperty(name = "${ALIAS=another-password}")

    private String password2;

    ```


    当然，我们也可以使用 Config 对象中的等效方法来检索这些值。


    #### 域配置源


    Payara Server 有*域*的概念；我们可以将已部署的应用程序分组到一个域中，它们将共享共同的配置，例如 JDBC 连接池等。我们可以在一个 Payara
    Server 实例中设置多个域。Payara Micro 不支持多个域；但是，已部署的应用程序会被添加到一个默认域中。


    我们可以通过命令文件向 Payara Micro 添加域属性，如下所示：


    ```

    set-config-property --propertyName=domain.property.name --propertyValue=''some
    value'' –source=domain

    ```


    该属性将被添加到默认的 Payara Micro 域中，并且可以像往常一样在我们的代码中检索。


    ```

    @Inject

    @ConfigProperty(name = "domain.property.name")

    private String value;

    ```


    #### JNDI 配置源


    Java 命名和目录接口是一个用于在我们的应用程序中查找资源的 API；例如，数据库连接之类的东西可以被赋予一个 JNDI 名称，并通过 JNDI API
    进行检索。


    Payara Micro 允许我们通过 MicroProfile Config API 及其自定义的 JNDI 配置源来检索 JNDI 属性。


    在通过 JNDI 检索属性之前，我们需要通过启动后命令文件来设置它：


    ```

    create-custom-resource --restype=string --factoryclass=org.glassfish.resources.custom.factory.PrimitivesAndStringFactory
    --property value="jndi-property-val" jndi-property-name

    ```


    关于设置 JNDI 资源的完整解释超出了我们的范围，就我们的目的而言，只需说明 Payara 包含一个 JNDI 工厂类，可用于为 Java 基本类型（int、long、float、double、boolean
    等）和字符串添加 JNDI 名称/值对。我们可以使用这个工厂类创建一个 JNDI 名称/值对，然后通过 MicroProfile Config API 进行检索。在我们之前的示例命令文件中，我们设置了一个
    String 类型的属性，其名称为 *jndi-property-name*，其值为 *jndi-property-value*。


    我们像往常一样指示 Payara Micro 从命令行执行该命令文件；然后，我们可以从 JNDI 配置源中检索在 JNDI 中设置的属性值，例如：


    ```

    @Inject

    @ConfigProperty(name = "jndi-property-name")

    private String propertyVal;

    ```


    #### 配置配置源


    Payara Server 有*命名配置*的概念；同一域中的不同 GlassFish 实例可以拥有独立的配置。Payara Micro 默认域有一个名为 *server-config*
    的单一配置。我们可以通过命令文件向 Payara Micro 的配置添加一个属性，如下所示：


    ```

    set-config-property --propertyName=my.config.property --propertyValue=''config
    property value'' --source=config --sourceName=server-config

    ```


    然后，我们可以像往常一样从代码中检索该属性的值：


    ```

    @Inject

    @ConfigProperty(name = "my.config.property")

    private String value;

    ```


    #### 服务器配置源


    在服务器配置源设置的属性将可以从 Payara Micro 的单个实例中访问。我们可以通过命令文件向服务器 MicroProfile Config 源添加属性，如下例所示。


    ```

    set-config-property --propertyName=my.config.property --propertyValue=''from server
    source'' --source=server –sourceName=server

    ```


    然后，我们可以通过 `@ConfigSource` 注解或像往常一样调用 `Config.getConfigValue()` 从代码中检索属性值。

    '
- fmt: '### Application Configuration Source


    It is possible to deploy more than one WAR file to a single instance of Payara
    Micro; we can do this from the command line, simply by adding multiple `--deploy`
    arguments to the Payara Micro command line.


    ```

    java -jar pat/to/payara-micro.jar --deploy path/to/mp-config-example-1.0-SNAPSHOT.war:mpconfigex
    --deploy path/to/mp-application-config-example-1.0-SNAPSHOT.war:mpappconfigex

    ```


    In this example, we would deploy two WAR files, one named `mp-config-example-1.0-SNAPSHOT.war`
    and the other one named `mp-application-config-example-1.0-SNAPSHOT.war`. Each
    WAR file deployed to Payara Micro is assigned an application name corresponding
    to the base name of the WAR file (`mp-config-example-1.0-SNAPSHOT` and `mp-application-config-example-1.0-SNAPSHOT`
    in our example). We need to specify the application name when we set the property
    in the command file, as follows:


    ```

    set-config-property --propertyName=my.config.property --propertyValue=''from application
    source'' --source=application --sourceName=mp-config-example-1.0-SNAPSHOT

    set-config-property --propertyName=my.config.property --propertyValue=''A different
    value'' --source=application –sourceName=mp-application-config-example-1.0-SNAPSHOT

    ```


    Executing these commands from a command file passed to the `postbootcommandfile`
    Payara Micro argument will fail, since the files have not been deployed yet at
    the time this command is run; thankfully, Payara Micro provides an alternate way
    to execute commands from a file, via the `postdeploycommandfile` argument.


    ```

    java -jar path/to/payara-micro.jar --deploy path/to/mp-config-example-1.0-SNAPSHOT.war:mpconfigex
    --deploy path/to/mp-application-config-example-1.0-SNAPSHOT.war:mpappconfigex
    --postdeploycommandfile src/main/resources/post-deploy-commands.txt

    ```


    The name of the file can be anything; it just needs to be a plain text file containing
    `asadmin` commands to pass to Payara Micro.


    Commands executed from the `postdeploymentcommandfile` Payara Micro argument will
    not be executed until after the WAR files are deployed; therefore, if we are setting
    MicroProfile Config properties this way, injecting configuration values will fail,
    since they are not set at the time the application is deployed. In this case,
    we need to retrieve values via either `Config.getConfigValue()` or `Config.getValue()`.


    For example, in one of our WAR files, we could retrieve the value as follows:


    ```

    value = config.getValue("my.config.property", String.class);

    ```


    As previously mentioned, the first argument to `getValue()` is the property name;
    the second argument is the type of the property we are reading. The following
    example illustrates how we could retrieve the property value in this manner:


    ```

    package com.ensode.mp.config.example;

    //imports omitted

    @RequestScoped

    @Path("mpconfigexample")

    public class MpConfigDemoService {

    private static final Logger LOGGER = Logger.getLogger(MpConfigDemoService.class.getName());

    private String value;

    @Inject

    private Config config;

    @POST

    @Produces(MediaType.APPLICATION_JSON)

    public void processPostRequest() {

    value = config.getValue("my.config.property", String.class);

    LOGGER.log(Level.INFO, String.format(

    "Property value is: %s", value));

    }

    }

    ```


    This service would display the property value to the Payara Micro log when it
    receives an HTTP POST request.


    Alternatively, we could retrieve the property value via `Config.getConfigValue()`.


    ```

    ConfigValue configValue = config.getConfigValue("my.config.property");

    return String.format("Property value is %s", configValue.getValue());

    ```


    `Config.getValue()` returns an instance of `ConfigValue`, which in turn has a
    `getValue()` method that returns the property value as a string.


    We could have a second RESTful web service, in a different WAR file, that could
    retrieve the property value in this manner.


    ```

    package com.ensode.mp.application.config.example;

    //imports omitted

    @RequestScoped

    @Path("appconfig")

    public class AppconfigResource {

    @Inject

    private Config config;

    @GET

    @Produces(MediaType.TEXT_PLAIN)

    public String processGetRequest() {

    ConfigValue configValue =

    config.getConfigValue("my.config.property");

    return String.format("Property value is %s",

    configValue.getValue());

    }

    }

    ```


    This example would return the value of the property as plain text to the client
    invoking the service.


    After setting the properties in the post deploy command file and deploying our
    WAR files to a single instance of Payara Micro as previously explained, we can
    verify we get the appropriate value for each of our applications.


    For example, we could send an HTTP POST request to the first service as follows:


    ```

    curl -X POST http://localhost:8080/mpconfigex/webresources/mpconfigexample

    ```


    Then if we inspect the Payara Micro output, we should see the expected value:


    ```

    [2021-09-20T10:05:18.547-0400] [] [INFO] [] [com.ensode.mp.config.example.MpConfigDemoService]
    [tid: _ThreadID=79 _ThreadName=http-thread-pool::http-listener(2)] [timeMillis:
    1632146718547] [levelValue: 800] Property value is: from application source

    ```


    We can then send an HTTP GET request to the second service, which has been deployed
    in a different WAR file, and verify that the value returned to the client is what
    we expect.


    ```

    curl  http://localhost:8080/mpappconfigex/webresources/appconfig

    Property value is A different value

    ```


    Notice that each service is retrieving the same property name; the values retrieved,
    though, are different; as expected, they match the values set in the post deploy
    command file we passed to Payara Micro from the command line.


    ### Module Configuration Source


    Some Jakarta EE applications may have multiple modules; for example, we could
    deploy one or more WAR files and EJB JAR file inside an Enterprise Archive (EAR)
    file. The module configuration source allows properties to be visible only for
    a single module in a multimodule application.


    The module configuration source is better suited for Payara Server, as Payara
    Micro does not support deploying applications in EAR files. If we really want
    though, we can use the module config source as an alternative to the application
    configuration source discussed in the previous section.


    ```

    set-config-property --propertyName=my.config.property --propertyValue=''from application
    source'' --source=module --sourceName=mp-config-example-1.0-SNAPSHOT --moduleName=mp-config-example-1.0-SNAPSHOT

    set-config-property --propertyName=my.config.property --propertyValue=''A different
    value'' --source=module --sourceName=mp-application-config-example-1.0-SNAPSHOT
    –moduleName=mp-application-config-example-1.0-SNAPSHOT

    ```


    The module configuration source requires `sourceName` and `moduleName` parameters;
    when deploying applications to Payara Micro, the value for both of these parameters
    must match the application name (i.e., the root name of the WAR file we are deploying).


    As with the `application` config source, the `module` config source must be set
    from a post deployment command file; otherwise, the command will fail as the WAR
    files won’t be deployed yet when the commands are executed; additionally, any
    properties set on the `module` config source must be retrieved via the appropriate
    methods in the `Config` object; injecting the values will result in the applications
    not deploying properly as the properties are not set until after the application
    is deployed.'
