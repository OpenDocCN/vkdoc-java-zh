    `set-config-dir` is an `asadmin` command to specify the directory in the file
    system to be used as a configuration source; the path to the directory is specified
    as the value of the `-directory` argument to `set-config-dir`.


    We can then tell Payara Micro to read this file by passing the –`postbootcommandfile`
    parameter as follows:


    ```

    java -jar path/to/payara-micro.jar --deploy path/to/warfile.war --postbootcommandfile=/tmp/props_dir

    ```


    When using the Payara Micro Maven plug-in, we can place the file in src/main/resources
    and configure the plug-in as follows:


    ```

    fish.payara.maven.plugins

    payara-micro-maven-plugin

    1.4.0


    ${version.payara}

    false


    --postbootcommandfile


    ${basedir}/src/main/resources/post-boot-commands.txt


    /mpconfigex


    ```


    Configuring the plug-in this way allows us to configure Payara Micro when we wish
    to run via the `payara-micro:start` Maven goal.


    Once we have configured the directory configuration source, we can retrieve property
    values as usual; for example, using the `@ConfigProperty` annotation, we could
    retrieve the contents of one of the files in the directory as follows:


    ```

    @Inject

    @ConfigProperty(name = "file1")

    private String value;

    ```


    This would read the contents of the file named *file1* in the configuration directory
    and assign its contents to the annotated `value` variable.'
  trans: '

    ### 通过环境变量进行配置


    所有现代操作系统都允许我们定义环境变量，这些变量可以被操作系统上运行的进程读取。


    例如，在 Unix BASH shell 中，我们可以按如下方式定义一个环境变量：


    ```

    $ export PROJECT_STAGE=test

    ```


    这将定义一个名为 `PROJECT_STAGE` 的环境变量，其值为 `"test"`。


    MicroProfile Config 可以读取环境变量并检索其值；以下示例说明了如何做到这一点：


    ```

    package com.ensode.mp.config.example;

    //imports omitted

    @RequestScoped

    @Path("mpconfigexample")

    public class MpConfigDemoService {

    private static final Logger LOGGER = Logger.getLogger(MpConfigDemoService.class.getName());

    @Inject

    @ConfigProperty(name = "PROJECT_STAGE")

    private String projectStage;

    @POST

    @Produces(MediaType.APPLICATION_JSON)

    public void processPostRequest() {

    LOGGER.log(Level.INFO, String.format("Project stage is: %s", projectStage));

    ProjectStageEnum projectStageEnum =

    ProjectStageEnum.valueOf(projectStage.toUpperCase());

    if (ProjectStageEnum.DEVELOPMENT.equals(projectStageEnum)) {

    LOGGER.log(Level.INFO,

    "processPostRequest() method invoked");

    }

    if (ProjectStageEnum.DEVELOPMENT.equals(projectStageEnum)) {

    LOGGER.log(Level.INFO,

    "leaving processPostRequest() method");

    }

    }

    }

    ```


    请注意，与之前的示例相比，我们唯一更改的是 `@ConfigProperty` 注解中的属性名称；其他一切完全相同。无论我们使用何种配置源，MicroProfile
    Config API 都是完全相同的，这非常方便，因为如果我们更改属性源，无需修改代码。


    在我们的示例中，我们使用了 `@ConfigSource` 注解来检索环境变量值；使用 `Config.getValue()` 也同样有效。


    同样值得指出的是，无需特殊配置；我们只需在操作系统 shell 中设置环境变量并运行代码即可；MicroProfile Config 无需我们额外操作就能读取环境变量。


    ### 通过系统属性进行配置


    Java 虚拟机 (JVM) 有许多内置的系统属性，我们可以用来检索有关当前工作环境的信息。它包含诸如我们正在使用的 Java 版本 (`java.version`)、用户主目录
    (`home.dir`) 等属性。我们还可以通过编程方式或命令行添加自己的系统属性。


    如前所述，无论使用何种配置源，用于检索属性值的 MicroProfile Config API 都是相同的；使用系统属性作为配置源也不例外。


    我们可以通过配置 Payara Micro Maven 插件，将系统属性传递给运行 Payara Micro 的 JVM：


    ```

    fish.payara.maven.plugins

    payara-micro-maven-plugin

    1.4.0


    ${version.payara}


    -Dmy.system.property


    "If you don''t see this, it didn''t work"


    false


    --autoBindHttp


    --deploy

    ${project.build.directory}/${project.build.finalName}


    /mpconfigex


    ```


    通常，Payara Micro Maven 插件的 `<javaCommandLineOptions>` 标签允许我们向 JVM 传递参数；在这个特定案例中，我们设置了一个系统属性，以便
    MicroProfile Config API 可以使用它。


    从命令行运行 Payara Micro 时，我们可以按如下方式向 JVM 传递系统属性：


    ```

    java -Dmy.system.property="If you don''t see this, it didn''t work" -jar ~/.m2/repository/fish/payara/extras/payara-micro/5.2021.7/payara-micro-5.2021.7.jar
    --deploy ./target/mp-config-example-1.0-SNAPSHOT.war:mpconfigex

    ```


    到目前为止，我们只讨论了从 Maven 插件运行 Payara Micro；前面的示例直接从命令行启动 Payara Micro；我们将在第 12 章中介绍启动
    Payara Micro 的各种方法。


    然后，我们可以像往常一样读取系统属性，无论是使用 `@ConfigSource` 注解还是通过 `Config.getValue()`。


    ```

    @Inject

    @ConfigProperty(name = "my.system.property")

    private String sysPropVal;

    ```


    然后我们可以像往常一样使用该属性值。


    ### Payara 特定的配置源


    Payara Micro 在 MicroProfile Config 规范定义的配置源之上，还包含了额外的配置源。


    [`https://docs.payara.fish/enterprise/docs/5.25.0/documentation/microprofile/config.html`](https://docs.payara.fish/enterprise/docs/5.25.0/documentation/microprofile/config.html)


    #### 目录配置源


    Payara Micro 可以读取目录中的文件，并将文件名用作属性名称，文件内容作为属性值。


    目录配置源可用于读取 Kubernetes 的 secrets 文件。


    例如，假设我们的文件系统中有一个目录 `/tmp/props_dir`，我们希望该目录中的文件名被用作 MicroProfile Config 的属性名称，其内容作为相应的属性值。图
    5-2 展示了典型 Linux 终端中的目录结构。


    ![](img/519485_1_En_5_Fig2_HTML.jpg)


    图 5-2


    目录配置源的示例目录


    我们需要配置 Payara Micro，以指定包含要作为属性使用的文件的目录。使用 Payara Server 时，这通常通过 `asadmin` 命令行工具完成。该工具不包含在
    Payara Micro 中；但是，我们可以通过文本文件和 `–postbootcommandfile` 命令行参数将 `asadmin` 命令传递给 Payara
    Micro。


    例如，假设我们有一个名为 *post-boot-commands.txt* 的文本文件，内容如下：


    ```

    set-config-dir –directory=/tmp/props_dir

    ```


    `set-config-dir` 是一个 `asadmin` 命令，用于指定文件系统中用作配置源的目录；目录路径通过 `-directory` 参数的值传递给
    `set-config-dir`。


    然后，我们可以通过传递 `–postbootcommandfile` 参数来告诉 Payara Micro 读取此文件，如下所示：


    ```

    java -jar path/to/payara-micro.jar --deploy path/to/warfile.war --postbootcommandfile=/tmp/props_dir

    ```


    使用 Payara Micro Maven 插件时，我们可以将文件放在 `src/main/resources` 中，并按如下方式配置插件：


    ```

    fish.payara.maven.plugins

    payara-micro-maven-plugin

    1.4.0


    ${version.payara}

    false


    --postbootcommandfile


    ${basedir}/src/main/resources/post-boot-commands.txt


    /mpconfigex


    ```


    以这种方式配置插件，允许我们在希望通过 `payara-micro:start` Maven 目标运行时配置 Payara Micro。


    一旦配置了目录配置源，我们就可以像往常一样检索属性值；例如，使用 `@ConfigProperty` 注解，我们可以按如下方式检索目录中某个文件的内容：


    ```

    @Inject

    @ConfigProperty(name = "file1")

    private String value;

    ```


    这将读取配置目录中名为 *file1* 的文件的内容，并将其内容赋值给被注解的 `value` 变量。

