  trans: '

    ### 程序化应用指标


    大多数 MicroProfile 指标注解都有对应的程序化实现可供使用。例如，`Counter` 接口就等同于 `@Counted` 注解。通过程序化方式实现指标，我们可以对注解的值施加更多控制；以
    Counter 为例，我们可以根据业务需求增加甚至减少计数器的值，而 `@Counted` 注解则只能在被注解的方法被调用时增加计数器，并且无法通过注解来减少计数器的值。


    以下示例说明了 MicroProfile 指标 `Counted` 接口的用法。


    ```

    package com.ensode.application.metrics.programmatic;

    //imports omitted

    @ApplicationScoped

    @Path("employeeservice")

    public class EmployeeResource {

    @Inject

    @Metric

    private Counter employeeCounter;

    private List employeeList =

    snew CopyOnWriteArrayList(); //thread safe

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee) {

    employeeList.add(employee);

    employeeCounter.inc();

    }

    @DELETE

    @Consumes(MediaType.APPLICATION_JSON)

    public void fireEmployee(@QueryParam("firstName") String firstName, @QueryParam("lastName")
    String lastName) {

    Optional employeeToFire =

    employeeList.stream().filter(emp →

    emp.getFirstName().equals(firstName) &&

    emp.getLastName().equals(lastName)).findAny();

    employeeToFire.ifPresent(

    emp -> {

    employeeList.remove(emp);

    employeeCounter.inc(-1);

    });

    }

    }

    ```


    在前面的示例中，我们通过 CDI 的 `@Inject` 注解和 MicroProfile 的 `@Metric` 注解注入了一个 `Counter` 接口的实现。`@Metric`
    将计数器实例标识为一个指标，并让 MicroProfile Metrics API 知道需要使用它来生成特定于应用的指标。


    一旦我们注入了 `Counter` 实现，就可以根据业务需求增加或减少计数器的值。在我们的示例中，计数器用于跟踪 `List` 中的员工数量；每当雇佣一名员工时，计数器增加；每当解雇一名员工时，计数器减少。


    表 6-1 列出了我们可以程序化使用的指标及其对应的注解。


    表 6-1


    程序化指标


    | 指标接口 | 注解 |

    | --- | --- |

    | `Counter` | `@Counted` |

    | `ConcurrentGauge` | `@ConcurrentGauge` |

    | `SimpleTimer` | `@SimpleTimer` |

    | `Timer` | `@Timer` |


    我们已经看到了 `Counter` 接口的示例；`ConcurrentGauge` 的工作方式类似，但它提供了一个 `dec()` 方法，我们可以用其来递减计数器。`Timer`
    和 `SimpleTimer` 都提供了 `time()` 方法的重载版本；通过传入一个 `Callable` 或 `Runnable` 接口实现的实例（通常以
    lambda 表达式实现），我们可以用它来计时应用中的特定事件。例如，如果我们想找出向员工列表中添加一名员工需要多长时间，可以这样做：


    ```

    package com.ensode.application.metrics.programmatic;

    //imports omitted

    @ApplicationScoped

    @Path("employeeservice")

    public class EmployeeResource {

    @Inject

    @Metric

    private SimpleTimer employeeAddSimpleTimer;

    private List employeeList = new CopyOnWriteArrayList(); //thread safe

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee) {

    employeeAddSimpleTimer.time(() -> {

    employeeList.add(employee);

    });

    }

    }

    ```


    在这个示例中，我们像往常一样通过 `@Inject` 和 `@Metric` 注解注入了一个 `SimpleTimer` 实例，然后将向列表中添加员工的调用包装在一个
    lambda 表达式中，并将生成的 `Runnable` 实现传递给 `SimpleTimer` 的 `time()` 方法。


    MicroProfile API 还提供了另一种指标，称为 `Histogram`，它用于计算值的分布情况。要使用 Histogram，我们像往常一样注入它，然后调用其
    `update()` 方法向直方图添加值，如下例所示。


    ```

    package com.ensode.application.metrics.programmatic;

    //imports omitted

    @ApplicationScoped

    @Path("employeeservice")

    public class EmployeeResource {

    @Inject

    @Metric

    private Histogram histogram;

    private List employeeList = new CopyOnWriteArrayList(); //thread safe

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee) {

    employeeList.add(employee);

    histogram.update(employeeList.size());

    }

    }

    ```


    ## 在 Payara Micro 中配置 MicroProfile 指标


    我们可以通过 asadmin 命令 `set-metrics-configuration` 在 Payara Micro 中配置指标，该命令可以通过作为启动后命令文件或类似方式传递的命令文件来执行。


    ### 禁用指标


    Payara Micro 默认启用指标；如果我们希望禁用它们，可以使用以下 asadmin 命令：


    ```

    set-metrics-configuration --enabled=false

    ```


    ### 保护指标安全


    默认情况下，`/metrics` 端点是不安全的，这意味着任何未经身份验证的随机用户都可以访问它。


    如果我们希望保护它，可以通过发出以下 asadmin 命令来实现：


    ```

    set-metrics-configuation --securityenabled=true

    ```


    在保护 `/metrics` 端点时，我们可以指定哪些角色可以访问它，如下所示：


    ```

    set-metrics-configuration --roles=role1,role2,role3

    ```


    `--roles` 参数的值是一个逗号分隔的角色列表，这些角色被允许访问生成的指标。


    ### 自定义指标端点


    默认情况下，可以通过 `/metrics` 端点检索指标。如果需要，我们可以使用不同的端点。


    ```

    set-metrics-configuration --endpoint=foo

    ```


    `--endpoint` 参数的值是我们自定义指标端点的上下文根。


    ### 静态指标


    默认情况下，指标会随着应用的运行而动态更新；如果我们希望使用静态指标（在应用重启之前不会更新），可以按如下方式操作：


    ```

    set-metrics-configuration --dynamic=false

    ```


    ## 总结


    在本章中，我们介绍了 Payara Micro 对 MicroProfile Metrics API 的支持。我们生成指标以供监控工具使用。我们介绍了如何使用
    MicroProfile 指标提供的注解来几乎不费吹灰之力地生成指标；我们还了解了如何在需要更多控制指标生成方式的情况下，通过程序化方式生成指标。


    # 7. 高可用性与容错性


    在使用微服务架构开发应用时，我们通常会有许多相互依赖的服务。其中一个或多个服务可能会宕机，并可能拖垮整个系统。MicroProfile Fault Tolerance
    API 提供了我们可以用来减轻这种风险的功能，它提供了几个注解，我们可以用它们来配置当一个或多个微服务不可用或无法正常工作时系统的行为方式。

    '
- fmt: '# Asynchronously Calling RESTful Web Service Endpoints


    MicroProfile Fault Tolerance provides the `@Asynchronous` annotation, which allows
    RESTful web service endpoints to be invoked asynchronously. This allows the client
    to continue processing and not block when invoking a service that may take a long
    time. This is especially useful when the client has to call multiple services
    that may each take a while to return; by invoking them asynchronously, these services
    can execute in parallel, reducing the time the client would have to wait to get
    the results.


    The `@Asynchronous` annotation can be applied to methods in request scoped CDI
    beans; the method must return an implementation of either `Future` or `CompletionStage`
    interfaces. A return type of `CompletionStage` is preferred as in this case any
    other fault tolerance annotations applied to the method will still be applied
    if the invoked method throws an exception; this is not the case with methods returning
    `Future`.


    Recall that we can turn any RESTful web service into a CDI bean simply by applying
    one of the scope annotations, such as `@RequestScoped`.


    The following example illustrates how we can indicate that our endpoint may be
    called asynchronously:


    ```java

    package com.ensode.faulttolerance;

    //imports omitted

    @RequestScoped

    @Path("faulttoleranceexample")

    public class FaulToleranceExampleResource {

    @Asynchronous

    @GET

    @Path("async")

    @Produces(MediaType.TEXT_PLAIN)

    public CompletionStage getAsynchronousValue()

    throws InterruptedException {

    TimeUnit.SECONDS.sleep(5);

    return CompletableFuture.completedStage(18);

    }

    @Asynchronous

    @GET

    @Path("async2")

    @Produces(MediaType.TEXT_PLAIN)

    public CompletionStage getAnotherAsynchronousValue()

    throws InterruptedException {

    TimeUnit.SECONDS.sleep(7);

    return CompletableFuture.completedStage(24);

    }

    }

    ```


    As we can see in the example, all we have to do is annotate any methods to be
    invoked asynchronously with `@Asynchronous` and make sure the method returns either
    a `Future` or a `CompletionStage`; when a client invokes our asynchronous methods,
    control goes back immediately to the client; the client won’t block waiting for
    a result.


    When using the MicroProfile REST client API to develop our client, we apply the
    `@Asynchronous` annotations used on the service to our rest client interface methods.


    ```java

    package com.ensode.fault.toleranceclient;

    //imports omitted

    @RegisterRestClient

    @Path("faulttoleranceexample")

    public interface FaultToleranceExampleResourceClient {

    @Asynchronous

    @GET

    @Path("async")

    @Produces(MediaType.TEXT_PLAIN)

    public CompletionStage getAsynchronousValue()

    throws InterruptedException;

    @Asynchronous

    @GET

    @Path("async2")

    @Produces(MediaType.TEXT_PLAIN)

    public CompletionStage getAnotherAsynchronousValue()

    throws InterruptedException;

    }

    ```


    Then the service acting as a client for the asynchronous methods would use our
    client interface as usual.


    ```java

    package com.ensode.fault.toleranceclient;

    //imports omitted

    @Path("/faulttoleranceclient")

    public class FaultToleranceClientService {

    @Inject

    @RestClient

    private FaultToleranceExampleResourceClient client;

    @GET

    @Produces(MediaType.TEXT_PLAIN)

    public String get() throws InterruptedException,

    ExecutionException {

    Integer answer;

    Integer value1;

    Integer value2;

    String retVal;

    CompletionStage asynchronousValue =

    client.getAsynchronousValue();

    CompletionStage asynchronousValue2 =

    client.getAnotherAsynchronousValue();

    value1 = asynchronousValue.toCompletableFuture().get();

    value2 = asynchronousValue2.toCompletableFuture().get();

    answer = value1 + value2;

    retVal = String.format("The answer is %d\n", answer);

    return retVal;

    }

    }

    ```


    One of the invoked methods takes approximately five seconds to return a value;
    the other one takes approximately seven seconds. Had we called this method synchronously,
    the client would have had to wait approximately 12 seconds to obtain both results;
    since we are calling them asynchronously (they run in parallel), the client only
    has to block for approximately seven seconds to obtain both results.


    # Limit Concurrent Execution to Avoid Overloading the System


    MicroProfile Fault Tolerance provides the `@Bulkhead` annotation, named after
    the Bulkhead design pattern, since it allows us to implement this pattern with
    minimal effort. `@Bulkhead` can be used to specify the maximum number of concurrent
    instances for a RESTful web service endpoint.


    There are two ways to use the `@Bulkhead` annotation: the semaphore style and
    the thread pool style.


    ## Using Semaphores for Synchronous Endpoints


    When using the semaphore style, the value argument of the annotation indicates
    the maximum number of concurrent invocations to a microservice endpoint; any additional
    attempts for concurrent invocations result in a `BulkheadException`.


    The following example illustrates the semaphore style usage of the `@Bulkhead`
    annotation:


    ```java

    package com.ensode.faulttolerance;

    //imports omitted

    @RequestScoped

    @Path("faulttoleranceexample")

    public class FaulToleranceExampleResource {

    @Inject

    private ConcurrentInvocationCounter concurrentInvocationCounter;

    @POST

    @Path("semaphorebulkhead")

    @Bulkhead(3)

    @Produces(MediaType.TEXT_PLAIN)

    public String semaphoreBulkHeadDemo() throws

    InterruptedException {

    String retVal;

    concurrentInvocationCounter.increaseCounter();

    retVal = String.format(

    "There are %d concurrent invocations to this endpoint \n",

    concurrentInvocationCounter.getCounter());

    TimeUnit.SECONDS.sleep(3);

    concurrentInvocationCounter.decreaseCounter();

    return retVal;

    }

    }

    ```


    In our example, we are allowing up to three concurrent invocations to our RESTful
    web service endpoint; any attempt to invoke the endpoint while there are already
    three concurrent invocations will fail with a `BulkheadException`; once the number
    of concurrent invocations decreases below three, the method can be successfully
    invoked again.


    The following example code illustrates what happens when we generate more concurrent
    calls than allowed by the `@Bulkhead` annotation:


    ```java

    package com.ensode.fault.toleranceclient;

    //imports omitted

    @Path("/faulttoleranceclient")

    public class FaultToleranceClientService {

    private static final Logger LOGGER =

    Logger.getLogger(FaultToleranceClientService.class.getName());

    @Inject

    @RestClient

    private FaultToleranceExampleResourceClient client;

    @POST

    @Path("semaphorebulkhead")

    public void semaphoreBulkheadClient() throws

    InterruptedException {

    ExecutorService executorService =

    Executors.newFixedThreadPool(4);

    Callable semaphoreBulkheadCallable =

    () -> client.semaphoreBulkHeadDemo();

    List> callResults = executorService.invokeAll(

    List.of(semaphoreBulkheadCallable,semaphoreBulkheadCallable,

    semaphoreBulkheadCallable,semaphoreBulkheadCallable));

    callResults.forEach(fut -> {

    try {

    LOGGER.log(Level.INFO, fut.get());

    } catch (InterruptedException | ExecutionException ex) {

    LOGGER.log(Level.SEVERE, String.format(

    "%s caught", ex.getClass().getName()), ex);

    }

    });

    }

    }

    ```


    With a little help of the Concurrency Utilities API, we spawn four threads, each
    of which invokes the endpoint on our service annotated with `@Bulkhead` annotation.
    Since we specified a maximum of three concurrent invocations, the last invocation
    will fail with a `@BulkheadException`, as expected.


    Typically, there would be multiple concurrent clients making concurrent requests
    to a service; for simplicity, our example uses a single client generating multiple
    concurrent invocations to the service.


    After running our client service, if we take a look at the Payara Micro output,
    we can verify that the `@Bulkhead` annotation is working as expected.'
  raw: '## Asynchronously Calling RESTful Web Service Endpoints


    MicroProfile Fault Tolerance provides the `@Asynchronous` annotation, which allows
    RESTful web service endpoints to be invoked asynchronously. This allows the client
    to continue processing and not block when invoking a service that may take a long
    time. This is especially useful when the client has to call multiple services
    that may each take a while to return; by invoking them asynchronously, these services
    can execute in parallel, reducing the time the client would have to wait to get
    the results.


    The `@Asynchronous` annotation can be applied to methods in request scoped CDI
    beans; the method must return an implementation of either `Future` or `CompletionStage`
    interfaces. A return type of `CompletionStage` is preferred as in this case any
    other fault tolerance annotations applied to the method will still be applied
    if the invoked method throws an exception; this is not the case with methods returning
    `Future`.


    Recall that we can turn any RESTful web service into a CDI bean simply by applying
    one of the scope annotations, such as `@RequestScoped`.


    The following example illustrates how we can indicate that our endpoint may be
    called asynchronously:


