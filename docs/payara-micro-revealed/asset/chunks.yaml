    ```  \n\nWriting \"command-line\" RESTful web service clients this way is a neat\
    \ way to test our web services without us having to come up with the proper JSON\
    \ strings to pass to the service, leaving MicroProfile to do the tedious work\
    \ for us.\n\n## Summary\n\nIn this chapter, we covered the Contexts and Dependency\
    \ Injection API available to us in our Payara Micro MicroProfile and Jakarta EE\
    \ applications. We saw how we can assign a scope to CDI managed beans and how\
    \ to perform logic on bean initialization or destruction.\n\nAdditionally, we\
    \ covered how we can easily inject CDI beans via the `@Inject` annotation into\
    \ any object managed by Payara Micro, such as RESTful web services, or other CDI\
    \ beans.\n\nWe also explained the CDI event handling mechanism, which allows us\
    \ to write loosely coupled applications. We covered how to use CDI events to write\
    \ application logic when a CDI scope is initialized or destroyed, then used this\
    \ newfound knowledge for a neat trick that allowed us to execute logic as soon\
    \ as our WAR file is deployed, and then exploited this knowledge to develop command-line\
    \ RESTful web service clients using the MicroProfile RESTful web service API.\n\
    \n# 5. Application Configuration\n\nMicroProfile includes a configuration API\
    \ called, appropriately enough, MicroProfile Config that standardizes the way\
    \ we can configure our applications. Configuration is used to set values that\
    \ may vary from environment to environment, for example, things like database\
    \ URLs or directories in a file system. MicroProfile Config standardizes the way\
    \ we retrieve properties to retrieve configuration values for our applications.\n\
    \n## Configuration Sources\n\nThere are three standard ways we can configure our\
    \ applications: via a `microprofile-config.properties` file inside our WAR file,\
    \ via Java system properties, and via environment variables. We can also add our\
    \ own custom configuration sources.\n\nConfiguration sources have priorities defined\
    \ by their *ordinal values*; higher ordinal values have priority over lower ones.\
    \ Table [5-1](#519485_1_En_5_Chapter.xhtml#Tab1) summarizes the ordinal values\
    \ of all standard configuration sources.\n\n**Table 5-1** MicroProfile Config\
    \ Sources Default Ordinal Values\n\n| Configuration Source | Default Ordinal Value\
    \ |\n| --- | --- |\n| `microprofile-config.properties` | 100 |\n| Environment\
    \ variables | 300 |\n| System Properties | 400 |\n\nIn addition to the standard\
    \ MicroProfile Config configuration sources, Payara Micro implements a number\
