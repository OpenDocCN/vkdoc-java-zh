- fmt: '### Generating HTTP DELETE Requests


    When generating HTTP DELETE requests, our REST client interface, unsurprisingly,
    needs to be annotated with the `@Path` and `@RegisterRestClient` annotations;
    the value of the `@Path` annotation needs to match the value of the corresponding
    annotation on the service we are calling. HTTP DELETE requests are handled by
    the `@DELETE` annotation; if the RESTful web service method we are calling returns
    a response, it will typically be a JSON string; therefore, we should add the `@Produces`
    annotation as usual, with the appropriate value.


    The following code snippet illustrates a typical RESTful web service client interface
    that sends an HTTP DELETE request to a RESTful web service:


    ```

    @Path("sample")

    @RegisterRestClient

    public interface SampleRestfulServiceClient {

    @DELETE

    @Produces(value = MediaType.APPLICATION_JSON)

    String processDeleteRequest();

    }

    ```


    Again, we specify the URI of the RESTful web service we are calling via the `microprofile-config.properties`
    file.


    ```

    com.ensode.restclient.SampleRestfulServiceClient/mp-rest/url=http://localhost:8080/webresources

    ```


    As is the case for other HTTP request types, we need to make sure the root URI
    of the service matches the value defined in the `Application` class in the RESTful
    web service project.


    To generate the DELETE request, we need to inject our interface via the CDI `@Inject`
    and `@RestClient` annotations; then we invoke the method annotated with `@DELETE`
    and optionally store the response in a variable.


    ```

    package com.ensode.restclient;

    //imports omitted

    @ApplicationScoped

    public class RestfulClient {

    private static final Logger LOGGER =

    Logger.getLogger(RestfulClient.class.getName());

    @Inject

    @RestClient

    private SampleRestfulServiceClient sampleRestfulServiceClient;

    public void init(

    @Observes @Initialized(ApplicationScoped.class)

    Object object) {

    String returnedDeleteData;

    LOGGER.log(Level.INFO, "--- Sending HTTP DELETE request ");

    returnedDeleteData =

    sampleRestfulServiceClient.processDeleteRequest();

    LOGGER.log(Level.INFO, String.format(

    "--- DELETE request response: %s", returnedDeleteData));

    }

    }

    ```


