- fmt: "### Life Cycle of CDI Beans\n\nCDI scopes define a CDI bean’s life cycle,\
    \ that is, when the bean is created and destroyed. Typically, we don’t instantiate\
    \ CDI beans ourselves; instead, we delegate that job to the runtime (Payara Micro,\
    \ in our case).\n\nSometimes, we need to perform some logic right after our bean\
    \ is initialized, or just before our bean is destroyed; for this purpose, CDI\
    \ provides the `@PostConstruct` and `@PreDestroy` annotations.\n\nMethods annotated\
    \ with `@PostConstruct` are invoked by the MicroProfile runtime right after the\
    \ CDI bean is initialized; conversely, methods annotated with `@PreDestroy` are\
    \ automatically invoked just before the bean is destroyed. Methods annotated with\
    \ either `@PostConstruct` or `@PreDestroy` must return `void`, take no arguments,\
    \ and must not be `static`.\n\nWe can turn any of our Jakarta EE RESTful Web Services\
    \ (i.e., classes annotated with `@Path`) into a CDI bean by adding one of the\
    \ scope annotations; typically, we would use the `@RequestScoped` annotation,\
    \ which results in a new instance of our service being constructed for every request.\n\
    \nYou could also annotate your RESTful web service with the `@ApplicationScoped`\
    \ annotation, which would result in the same instance of the service responding\
    \ to all requests; this, however, may result in code that scales poorly.\n\nThe\
    \ following example illustrates a web service turned into a request scoped CDI\
    \ bean:\n\n```java\npackage com.ensode.cdiscopes;\n//imports omitted\n@RequestScoped\n\
    @Path(\"cdiservice\")\npublic class CdiService {\nprivate static final Logger\
    \ LOGGER =\nLogger.getLogger(CdiService.class.getName());\n@PostConstruct\npublic\
    \ void init() {\nLOGGER.log(Level.INFO, \"init() method called\");\n}\n@PreDestroy\n\
    public void cleanup() {\nLOGGER.log(Level.INFO, \"cleanup() method called\");\n\
    }\n@POST\npublic void handlePostRequest() {\nLOGGER.log(Level.INFO, \"HTTP POST\
    \ request received\");\n}\n}\n```\n\nNotice that we annotated our class with the\
    \ `@RequestScoped` annotation; this turns our RESTful web service class into a\
    \ request scoped CDI bean and grants us all functionality available to CDI beans,\
    \ such as having callback methods that the runtime can invoke when the bean is\
    \ initialized or destroyed.\n\nWe created two callback methods; we annotated the\
    \ `init()` method with the CDI `@PostConstruct` annotation, which lets the runtime\
    \ know it needs to call this method right after our class is constructed. Additionally,\
    \ we annotated the `cleanup()` method with `@PreDestroy`; therefore, it will be\
    \ called automatically just before the bean is destroyed.\n\nIn our example, we\
    \ are simply sending some output to the logs in our callback methods. In a typical\
    \ application, these callback methods are used to perform any necessary initialization,\
    \ obtain and release resources such as database connections, etc.\n\nSince our\
    \ service is request scoped, a new instance will be created for each HTTP request\
    \ it handles; therefore, we should see the expected log entries in the Payara\
