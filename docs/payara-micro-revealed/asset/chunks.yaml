    ## 依赖注入


    如前所述，我们可以通过使用 CDI 作用域注解来标注几乎任何普通的 Java 对象（POJO），从而将其转换为 CDI bean。


    以下类是一个应用作用域的 CDI bean：


    ```

    package com.ensode.dependencyinjection;

    //省略导入语句

    @ApplicationScoped

    public class CountryLookup {

    private List countryList;

    private Map countryMap;

    @PostConstruct

    public void init() {

    countryList = new ArrayList();

    countryMap = new HashMap();

    countryList.add(new Country("AU", "AUSTRALIA"));

    countryList.add(new Country("UK", "United Kingdom"));

    countryList.add(new Country("IN", "India"));

    countryList.add(new Country("US", "United States"));

    countryList.add(new Country("MX", "Mexico"));

    countryList.add(new Country("EG", "Egypt"));

    countryList.forEach(c -> countryMap.put(

    c.getAbbreviation(), c));

    }

    public Country getCountry(String countryAbbrev) {

    return countryMap.get(countryAbbrev);

    }

    }

    ```


    要将该类转换为 CDI bean，我们只需使用 `@ApplicationScoped` 对其进行标注；回想一下我们之前的讨论，应用作用域的 CDI bean
    存在于我们应用程序的整个生命周期中，它们在应用程序启动时（或者更可能是在首次使用时被延迟）初始化，并在我们取消部署应用程序或关闭 Payara Micro（或我们可能使用的任何
    MicroProfile 实现）时被销毁。


    应用作用域的 CDI bean 通常用于缓存不经常变化的数据；这样做是为了提高性能，避免每次需要数据时都访问数据库。


    我们的应用作用域托管 bean 有一个使用 `@PostConstruct` 标注的 `public void init()` 方法；该注解使得该方法在 CDI
    构建 bean 时被自动调用。在我们的示例中，`init()` 方法初始化了要缓存的数据。在生产应用程序中，我们的 `init()` 方法可能会从数据库中检索数据；在这个简单的示例中，我们只是就地初始化数据。


    我们的 `init()` 方法创建了一个 `HashMap`，其中键的类型为 `String`，代表国家缩写；值是名为 `Country` 的类的实例，该类包含两个属性：国家缩写和国家全名。


    `Country` 类非常简单，我们就不展示其源代码了；有关我们示例应用程序的完整源代码，请参阅本书的代码下载。


    我们的应用作用域 bean 还提供了一个名为 `getCountry()` 的方法，该方法接收一个包含国家缩写的 `String`，并返回 `Country`
    类的相应实例。


    由于我们的 `CodeLookup` 类是一个 CDI bean，它不仅可以注入到其他 CDI bean 中，还可以注入到 Payara Micro 管理的任何类中。使用
    `@Path` 注解标注的类由运行时管理；因此，CDI bean 可以注入到这些类中。以下 RESTful Web 服务利用 `CodeLookup` 类根据国家缩写查找国家对象：


    ```

    package com.ensode.dependencyinjection;

    //省略导入语句

    @Path("cdiservice")

    public class CdiService {

    @Inject

    private CountryLookup countryLookup;

    private static final Logger LOGGER = Logger.getLogger(CdiService.class.getName());

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public Country handleGetRequest(

    @QueryParam("countryAbbrev") String countryAbbrev) {

    return countryLookup.getCountry(countryAbbrev);

    }

    }

    ```


    请注意，我们的 RESTful Web 服务本身不是一个 CDI bean，但由于其生命周期由 MicroProfile 运行时管理，我们可以将 CDI bean
    注入其中。在我们的示例中，我们注入了前面讨论过的 `CountryLookup` 类的一个实例。然后，我们通过使用 `@GET` 注解标注方法，实现了一个响应
    HTTP GET 请求的方法；我们让该方法接受一个名为 `countryAbbrev` 的查询参数，这是通过使用 `@QueryParam` 注解标注唯一的参数来实现的。我们的方法体简单地调用了我们在应用作用域
    bean 中实现的 `getCountry()` 方法，并将接收到的缩写作为参数传递；由于我们使用 `@Produces` 注解标注了该方法，表明该方法以
    JSON 格式返回数据，因此该方法返回的 `Country` 实例会自动转换为 JSON 字符串，然后作为响应体返回给客户端。


    我们像往常一样通过 Payara Micro Maven 插件运行服务；然后我们可以调用我们的端点，最简单的方式是使用 `curl` 命令行工具。


    ```

    curl http://localhost:8080/dependency-injection/webresources/cdiservice?countryAbbrev=AU

    ```


    我们应该会立即在控制台上看到 RESTful Web 服务调用的输出，毫不意外，这是我们方法返回的 `Country` 类实例的 JSON 表示。


    ```

    {"abbreviation":"AU","name":"AUSTRALIA"}

    ```


    我们刚刚介绍了赋予该 API 名称的两个 CDI 特性；作用域注解是“上下文与依赖注入”中的“上下文”；`@Inject` 注解提供了 CDI 的“依赖注入”部分。另一个
    CDI 特性是事件机制，它允许我们实现松耦合的应用程序。


    ## CDI 事件


    CDI 事件允许我们松耦合应用程序的不同部分。我们的一个类可以触发一个事件，然后由一个或多个事件监听器处理。触发事件的类对监听器一无所知；它只是触发事件，然后
    CDI 接管，调用所有事件监听器上的监听器方法。


    ### 触发事件


    CDI 提供了 `Event` 类，用于触发事件；该类使用泛型来指示事件类型。该类型可以是任何有效的 Java 类型；例如，它可以是 `java.lang.String`
    的实例，或者任何普通的 Java 对象（POJO）。以下示例说明了如何触发 CDI 事件：


    ```

    package com.ensode.cdievents;

    //省略导入语句

    @Path("countryservice")

    public class CountryService {

    @Inject

    Event countryEvent;

    @Inject

    private CountryLookup countryLookup;

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public Country handleGetRequest(@QueryParam("countryAbbrev") String countryAbbrev)
    {

    return countryLookup.getCountry(countryAbbrev);

    }

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void updateCountry(Country country) {

    countryEvent.fire(country);

    }

    }

    ```


    需要触发 CDI 事件的类需要注入一个 CDI 提供的 `Event` 类的实例；我们像往常一样通过 `@Inject` 注解注入此依赖。`Event` 类的参数化类型指示了正在触发的事件的类型。在这种情况下，我们使用一个表示国家的简单普通
    Java 对象；这个 `Country` 类有两个属性：国家缩写和国家全名。


    要实际触发事件，我们在注入的 `Event` 类实例上调用 `fire()` 方法；该方法接收一个在我们事件声明中指定的泛型类型的实例（在我们的例子中，是
    `Country` 类的一个实例）。


    请注意，在我们的示例代码中，完全没有提及事件的监听器。我们的 RESTful Web 服务对监听器一无所知；它不知道哪些类监听此事件，也不知道有多少个监听器，更不知道其他任何信息；它只是触发事件，然后
    CDI 接管后续处理。

    '
- fmt: '### Listening for Events


    To listen for events, a CDI bean must implement a public void method taking a
    single parameter of the type of event it listens to (an instance of the `Country`
    class, in our case); this parameter must be annotated with the CDI `@Observes`
    annotation. The following code example illustrates the process of listening to
    CDI events:


    ```

    package com.ensode.cdievents;

    //imports omitted

    @ApplicationScoped

    public class CountryEventLogger {

    private static final Logger LOGGER =

    Logger.getLogger(CountryEventLogger.class.getName());

    public void logCountryEvent(@Observes Country country) {

    LOGGER.log(Level.INFO, String.format(

    "Event fired for the following country: %s",

    country.getName()));

    }

    }

    ```


    In this example, we have an application scoped CDI bean listening for events of
    instances of the `Country` class; our example simply sends an entry to the Payara
    log, indicating the name of the country for which the event was fired.


    We can run our example by invoking the usual Maven goals:


    ```

    mvn war:exploded payara-micro:start

    ```


    Toward the end of the Payara Micro output, we see some information about the deployed
    RESTful web service endpoints.


    ```

    Payara Micro URLs:

    http://192.168.1.165:8080/cdi-events

    ''cdi-events-1.0-SNAPSHOT'' REST Endpoints:

    GET /cdi-events/webresources/application.wadl

    GET /cdi-events/webresources/countryservice

    PUT /cdi-events/webresources/countryservice

    ]]

    ```


    In our example, the relevant endpoint accepts an HTTP PUT request; we can invoke
    it via the `curl` command-line utility.


    ```

    curl -X PUT http://localhost:8080/cdi-events/webresources/countryservice -H "Content-Type:
    application/json" --data ''{"abbreviation":"TS","name":"Test"}''

    ```


    In the preceding example, we are passing a JSON string as the request body, passing
    a (obviously fictitious) test country to our RESTful web service endpoint. When
    our RESTful web service endpoint receives the request, since the JSON string we
    passed as the request body conforms to the structure of the JSON class, it automatically
    populates an instance of this class with the data we passed. Our method then simply
    fires an event with this populated object, our listener then is invoked by CDI,
    and its method listening for the event is automatically executed. If we look at
    the output for Payara Micro, we can see the expected log file entry.


    ```

    [2021-09-03T15:06:54.464-0400] [] [INFO] [] [com.ensode.cdievents.CountryEventLogger]
    [tid: _ThreadID=78 _ThreadName=http-thread-pool::http-listener(1)] [timeMillis:
    1630696014464] [levelValue: 800] Event fired for the following country: Test

    ```


    As we can see, it is fairly easy for us as application developers to implement
    event handling in CDI applications, as all the heavy lifting is taken care of
    by CDI; all we need to do is add a couple of annotations (`@Inject`, `@Observable`)
    and call a single method (`Event.fire()`); everything else is taken care of behind
    the scenes.


    What we just explained works great if there is a single event for a given type,
    but what if we need to fire more than one event for the same type? How would the
    event listeners know which event to listen for? This is where CDI qualifiers enter
    the picture.


    ### Qualifiers


    CDI qualifiers are Java annotations that they themselves are annotated with the
    CDI `@Qualifier` annotation. We write qualifiers when we need to differentiate
    between objects of the same type but used for different purposes. When dealing
    with CDI events, we use qualifiers when we need to fire more than one event of
    the same type.


    For example, let’s say we needed to fire an event when a Country was added or
    updated; we could create an `@Updated` qualifier so that we could create an event
    to be fired only when one of these actions is performed.


    ```

    package com.ensode.cdievents.qualifier;

    //imports omitted

    @Qualifier

    @Retention(RetentionPolicy.RUNTIME)

    @Target({ElementType.FIELD, ElementType.PARAMETER})

    public @interface Updated {

    }

    ```


    As we can see, our qualifier is a standard Java annotation to be processed at
    runtime, as specified by the `@Retention(RetentionPolicy.RUNTIME)` annotation.
    Qualifiers for CDI events are applied when we declare the instance of the `Event`
    class and on the corresponding parameter of any listener method; therefore, we
    specify `ElementType.FIELD` and `ElementType.PARAMETER` as the values of the `@Target`
    annotation for our qualifier.


    Suppose then that we needed to fire a different Country event when a country was
    deleted; for this, we would use another qualifier.


    ```

    package com.ensode.cdievents.qualifier;

    //imports omitted

    @Qualifier

    @Retention(RetentionPolicy.RUNTIME)

    @Target({ElementType.FIELD, ElementType.PARAMETER})

    public @interface Deleted {

    }

    ```


    We can now apply these qualifiers to differentiate different types of events for
    the `Country` class.


    ```

    package com.ensode.cdievents;

    //imports omitted

    @Path("countryservice")

    public class CountryService {

    @Inject

    private @Updated Event countryEvent;

    @Inject

    private @Deleted Event countryDeletedEvent;

    @Inject

    private CountryLookup countryLookup;

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public Country handleGetRequest(

    @QueryParam("countryAbbrev") String countryAbbrev) {

    return countryLookup.getCountry(countryAbbrev);

    }

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void updateCountry(Country country) {

    countryEvent.fire(country);

    }

    @DELETE

    @Consumes(MediaType.APPLICATION_JSON)

    public void deleteCountry(

    @QueryParam("countryAbbrev") String countryAbbrev) {

    Country country=countryLookup.getCountry(countryAbbrev);

    countryDeletedEvent.fire(country);

    }

    }

    ```


    Notice that we updated our RESTful web service; we now declare two instances of
    `Event<Country>`; one is meant to be fired when a country is added or updated
    and the other one when a country is deleted; we decorated each instance with our
    custom `@Updated` and `@Deleted` qualifiers.


    In addition to the previously existing `updateCountry()` method, we added a new
    `deleteCountry()` method; this method will be invoked when our service receives
    an HTTP DELETE request, as specified by the `@DELETE` annotation. This new method
    fires the second instance of the `Country` event we added to our service so that
    listeners can perform any necessary logic when a country is deleted.


    On the listener side, we need to use the same qualifier on the corresponding listener
    method. Let’s take a look at a CDI event listener with two listener methods, one
    for each type of event.


    ```

    package com.ensode.cdievents;

    //imports omitted

    @ApplicationScoped

    public class CountryManager {

    private static final Logger LOGGER = Logger.getLogger(CountryManager.class.getName());

    @Inject

    private CountryLookup countryLookup;

    public void updateCountry(@Observes @Updated Country country) {

    LOGGER.log(Level.INFO, String.format("Updating the following country: %s", country.getName()));

    countryLookup.updateCountry(country);

    }

    public void deleteCountry(@Observes @Deleted Country country) {

    LOGGER.log(Level.INFO, String.format("Deleting the following country: %s", country.getName()));

    countryLookup.deleteCountry(country);

    }

    }

    ```'
