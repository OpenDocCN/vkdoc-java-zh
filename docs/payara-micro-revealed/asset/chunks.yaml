    in our example). The root URI we specify here will precede the URIs of the RESTful
    web services we develop; for example, if we write a RESTful web service with a
    “sample” URI, the complete URI for the web service would be `/webresources/sample`.


    ## Running Our Application


    Maven can create an exploded WAR file from any Java web project via the `war:exploded`
    goal. Similarly, we can start Payara Micro straight from Maven via the `payara-micro:start`
    Maven goal provided by the Payara Micro Maven Project.


    By invoking Maven using the aforementioned two Maven goals, we can start Payara
    Micro and automatically deploy our application code.


    ```

    mvn war:exploded payara-micro:start

    ```


