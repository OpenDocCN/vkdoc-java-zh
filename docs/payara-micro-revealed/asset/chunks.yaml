    Reading a configuration property via the `@ConfigProperty` annotation is simple
    and straightforward; however, it isn’t very flexible; it is possible that the
    property we are attempting to read may not exist when our application is deployed,
    in which case we would get an exception; additionally, there is no way to conditionally
    assign the value of a property to a variable. To cover these use cases and provide
    more flexibility, MicroProfile Config provides a `Config` class that can be used
    to programmatically retrieve property values. The following example illustrates
    its usage:


    ```

    package com.ensode.mp.config.example;

    //imports omitted

    @RequestScoped

    @Path("mpconfigexample")

    public class MpConfigDemoService {

    private static final Logger LOGGER = Logger.getLogger(MpConfigDemoService.class.getName());

    @Inject

    private Config config;

    private String projectStage;

    @POST

    @Produces(MediaType.APPLICATION_JSON)

    public void processPostRequest() {

    projectStage = config.getValue("project.stage", String.class);

    LOGGER.log(Level.INFO, String.format("Project stage is: %s", projectStage));

    ProjectStageEnum projectStageEnum = ProjectStageEnum.valueOf(projectStage.toUpperCase());

    if (ProjectStageEnum.DEVELOPMENT.equals(projectStageEnum)) {

    LOGGER.log(Level.INFO, "processPostRequest() method invoked");

    }

    if (ProjectStageEnum.DEVELOPMENT.equals(projectStageEnum)) {

    LOGGER.log(Level.INFO, "leaving processPostRequest() method");

    }

    }

    }

    ```


    Here, we modified our previous example to use the `Config` class; as we can see,
    `Config` can be injected via the CDI `@Inject` annotation; we can then retrieve
    a property value via its `getValue()` method, its first argument being a `String`
    containing the property name we wish to retrieve and the second value being the
    type of the property value variable. In our case, we are assigning the property
    to a `String`; therefore, we use `String.class` as the second argument to `Config.getValue()`;
    had we been retrieving an integer numerical value for example, we would use `Integer.class`
    as the second argument to `Config.getValue()`.


    We can also obtain an instance of `Config` by invoking `ConfigProvider.getConfig()`,
    but injecting via CDI is easier and more straightforward.


    We have now seen how to retrieve properties from the standard *microprofile-config.property*
    file; as we can see, this approach to configuration is simple and straightforward;
    however, if we need to change the value of a property, the file needs to be modified,
    and our code rebuilt and redeployed. In our example, we would need different versions
    of the property file for different environments (development, test, production,
    etc.). For this reason, it is sometimes desirable to have configuration information
    outside of our deployment module. The MicroProfile Config specification defines
    two ways we can accomplish this: retrieving properties via environment variables
    and via Java System properties; we discuss these approaches next.'
  trans: '

    ### 通过属性文件进行配置


    配置应用程序最简单直接的方法是将 *microprofile-config.properties* 文件添加到 WAR 文件中；该文件的标准位置位于 WAR
    文件类路径根目录下的 META-INF 目录中。在一个典型的 Maven 项目中，该属性文件在 WAR 文件中的位置是 *WEB-INF/classes/META-INF/microprofile-config.properties*；在源代码中，我们会将其放置在
    *src/main/resources/META-INF/microprofile-config.properties* 下，当我们构建代码时，Maven
    会将该文件放置在 WAR 文件中的正确位置。


    为了演示这一点，假设我们希望在开发环境中向 Payara Micro 日志发送额外的输出，但在测试或生产等其他环境中抑制该输出。要实现类似功能，我们可以在
    *microprofile-config.properties* 中设置一个 `project.stage` 属性。


    ```

    project.stage=production

    ```


    在一个标准的 Maven 项目中，此文件需要放置在 *src/resources/META-INF* 目录下。图 5-1 展示了目录树结构。


    ![](img/519485_1_En_5_Fig1_HTML.jpg)


    图 5-1


    microprofile-config.properties 目录位置


    我们可以通过 MicroProfile Config API 提供的 `@ConfigProperty` 注解来检索该属性。


    ```

    package com.ensode.mp.config.example;

    //imports omitted

    @RequestScoped

    @Path("mpconfigexample")

    public class MpConfigDemoService {

    private static final Logger LOGGER =

    Logger.getLogger(MpConfigDemoService.class.getName());

    @Inject

    @ConfigProperty(name = "project.stage")

    private String projectStage;

    @POST

    @Produces(MediaType.APPLICATION_JSON)

    public void processPostRequest() {

    LOGGER.log(Level.INFO, String.format(

    "Project stage is: %s", projectStage));

    ProjectStageEnum projectStageEnum =

    ProjectStageEnum.valueOf(projectStage.toUpperCase());

    if (ProjectStageEnum.DEVELOPMENT.equals(projectStageEnum)) {

    LOGGER.log(Level.INFO,

    "processPostRequest() method invoked");

    }

    if (ProjectStageEnum.DEVELOPMENT.equals(projectStageEnum)) {

    LOGGER.log(Level.INFO,

    "leaving processPostRequest() method");

    }

    }

    }

    ```


    正如我们在示例中所见，我们需要将 CDI 的 `@Inject` 注解与 `@ConfigProperty` 结合使用来检索属性的值。`@ConfigProperty`
    有一个 `name` 属性，其值需要与 *microprofile-config.properties* 中定义的属性名称匹配。


    在开发应用程序时，运行代码最简单直接的方法通常是像往常一样通过 Maven 进行。


    ```

    mvn war:exploded payara-micro:start

    ```


    我们可以使用 *curl* 发送 HTTP POST 请求，如下所示：


    ```

    curl -X POST http://localhost:8080/mpconfigex/webresources/mpconfigexample

    ```


    执行此操作后，我们检查 Payara Micro 的输出，发现正如预期的那样，没有记录额外的输出，因为我们将 `project.stage` 属性设置为 `production`。


