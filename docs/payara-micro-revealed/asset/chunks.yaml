    ## Uber JAR


    Uber JAR 是可执行的 JAR 文件，它捆绑了我们的应用程序代码和 Payara Micro 运行时。创建 Uber JAR 可以潜在地简化我们应用程序的执行；我们所要做的就是运行可执行的
    WAR 文件，而无需向 Payara Micro 传递任何参数。

