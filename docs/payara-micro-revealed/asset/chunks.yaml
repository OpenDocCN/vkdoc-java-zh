    ## 自动生成文档


    任何部署到 Payara Micro 的 RESTful Web 服务都会自动生成文档；要查看生成的文档，我们只需向 Payara Micro 实例的 */openapi*
    端点发送一个 HTTP GET 请求即可。


    在前面的章节中，我们使用一个以 Web 服务形式实现的简单人力资源系统来雇佣和解雇员工；在本章中，我们将使用同一个系统来演示 OpenAPI。


    该系统的核心是一个简单的 RESTful Web 服务，它接受 HTTP PUT 请求来雇佣员工，以及 DELETE 请求来解雇员工；作为回顾，以下是这个简单
    RESTful Web 服务的源代码：


    ```

    package com.ensode.openapiexample;

    //imports omitted

    @ApplicationScoped

    @Path("employeeservice")

    public class EmployeeResource {

    private List employeeList = new CopyOnWriteArrayList(); //thread safe

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee) {

    employeeList.add(employee);

    }

    @DELETE

    @Consumes(MediaType.APPLICATION_JSON)

    public void fireEmployee(@QueryParam("firstName")

    String firstName, @QueryParam("lastName") String lastName) {

    Optional employeeToFire =

    employeeList.stream().filter(emp ->

    emp.getFirstName().equals(firstName) &&

    emp.getLastName().equals(lastName)).findAny();

    employeeToFire.ifPresent(

    emp -> {employeeList.remove(emp);});

    }

    }

    ```


    要查看我们 RESTful Web 服务自动生成的文档，只需向 *http://localhost:8080/openapi* 发送一个 HTTP GET
    请求（假设项目已部署到本地工作站并使用默认 HTTP 端口）。发送 GET 请求最简单的方法是将浏览器指向上述 URL，如图 10-1 所示。


    ![](img/519485_1_En_10_Fig1_HTML.jpg)


    图 10-1


    自动生成的文档


    生成的文档采用 YAML 格式。我们可以看到有一个 *webresources/employeeservice* 路径，它接受 HTTP DELETE 或
    PUT 请求。


    对于 DELETE 请求，文档指出该端点期望两个类型为 String 的查询参数：一个名为 *firstName*，另一个名为 *lastName*。


    对于 PUT 请求，我们可以看到请求体必须包含一个遵循特定模式的 JSON 对象，该模式也在文档底部附近作为 `Employee` 模式被记录；这个模式是从我们的
    Employee 类自动生成的。


    OpenAPI 支持的一个好处是文档会自动更新；因此，它永远不会过时。例如，假设我们更新了 `Employee` 类，使其包含一个 `employeeID`
    字段，如下所示：


    ```

    package com.ensode.openapiexample;

    //imports omitted

    public class Employee {

    public Employee() {

    }

    public Employee(Integer employeeId, String firstName,

    String lastName) {

    this.employeeId = employeeId;

    this.firstName = firstName;

    this.lastName = lastName;

    }

    private Integer employeeId;

    private String firstName;

    private String lastName;

    //setters, getters, equals() and hashCode() omitted for brevity

    }

    ```


    然后假设我们更新了 `fireEmployee()` 方法，使其接受 `employeeID` 作为查询参数：


    ```

    package com.ensode.openapiexample;

    //imports omitted

    @ApplicationScoped

    @Path("employeeservice")

    public class EmployeeResource {

    private List employeeList = new CopyOnWriteArrayList(); //thread safe

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee) {

    employeeList.add(employee);

    }

    @DELETE

    @Consumes(MediaType.APPLICATION_JSON)

    public void fireEmployee(

    @QueryParam("employeeId") Integer employeeID) {

    Optional employeeToFire =

    employeeList.stream().filter(emp →

    emp.getEmployeeId().equals(employeeID)).findAny();

    employeeToFire.ifPresent(

    emp -> {

    employeeList.remove(emp);

    });

    }

    }

    ```


    部署我们的应用程序后，我们再次将浏览器指向 *http://localhost:8080/openapi*，发现文档已经自动更新，我们无需任何额外操作。


    请注意，在文档中，*operationID fireEmployee* 现在只接受一个名为 *employeeID* 的参数，并且在文档底部附近，*Employee*
    模式已自动更新，增加了一个类型为 integer 的 *employeeID* 属性；所有这些更新都直接由我们的代码更改驱动，我们甚至无需考虑更新文档。我们可以在图
    10-2 中看到更新后的文档。


    ![](img/519485_1_En_10_Fig2_HTML.jpg)


    图 10-2


    自动更新的文档


    如前所述，默认情况下，文档以 YAML 格式生成；如果我们希望以 JSON 格式生成，可以通过向 */openapi* 端点传递一个名为 *format*、值为
    *json* 的查询参数来实现，例如：


    *http://localhost:8080/openapi?format=json*


    图 10-3 展示了我们更新后的服务对应的等效文档，这次是 JSON 格式。


    ![](img/519485_1_En_10_Fig3_HTML.jpg)


    图 10-3


    自动更新的文档（JSON 格式）


    ## 通过代码注解自定义文档


    OpenAPI 提供了可用于自定义生成文档的注解。


    ### 自定义 HTTP 响应


    我们可以自定义响应的生成文档；此外，我们还可以为端点返回的不同 HTTP 状态码添加描述；这可以通过在 Jakarta RESTful Web 服务的方法上使用
    `@APIResponse` 注解来实现。


    假设我们为人力资源应用程序添加了一个按 ID 查找员工的端点；成功找到员工后，会自动返回 HTTP 状态码 200（“OK”）；如果未找到员工，我们可以通过抛出
    `NotFoundException` 来触发 HTTP 状态码 404（“未找到”）。我们可以通过使用 `@APIResponse` 注解在代码中记录此行为。


    ```

    @GET

    @APIResponse(responseCode = "200",

    description = "Employee found",

    content = @Content(mediaType = APPLICATION_JSON,

    schema =

    @Schema(implementation = Employee.class))

    @APIResponse(responseCode = "404",

    description = "Employee not found ")

    public Employee findEmployee(

    @QueryParam("employeeId") Integer employeeID) {

    Optional employeeToFind =

    employeeList.stream().filter(emp →

    emp.getEmployeeId().equals(employeeID)).findFirst();

    return employeeToFind.orElseThrow(

    () -> new NotFoundException()); //if not found, return a 404

    }

    ```


    从前面的示例可以看出，`@APIResponse` 有三个属性；`responseCode` 和 `description` 不言自明；可选的 `content`
    属性指定了响应体的媒体类型和模式（如果有的话）。


    图 10-4 展示了我们应用程序更新后文档的相关部分。


    ![](img/519485_1_En_10_Fig4_HTML.jpg)


    图 10-4


    由 @APIResponse 注解生成的文档


    我们的新方法被自动添加，无需我们额外操作；请注意 *operationId findEmployee*（我们的新方法）对应的 HTTP 状态码 200 和
    404 的描述；这些是由我们添加到方法上的 `@APIResponse` 注解生成的。

