- fmt: "# MicroProfile\n\nJust like Java EE before it, MicroProfile is a specification\
    \ (a piece of paper, if you will), with multiple implementations. MicroProfile\
    \ provides specifications for APIs commonly needed when deploying to the cloud,\
    \ such as application configuration, health checks, request tracing, metrics,\
    \ fault tolerance, documentation, and security.\n\nMicroProfile also shares some\
    \ APIs with Jakarta EE (the successor to Java EE; see the next section), namely,\
    \ Jakarta RESTful Web Services (formerly known as JAX-RS), Jakarta Contexts and\
    \ Dependency Injection (CDI), Jakarta JSON Binding, and Jakarta JSON Processing.\n\
    \nJakarta RESTful Web Services, unsurprisingly, is an API used to develop RESTful\
    \ web services. Developing RESTful web services with this API is very simple,\
    \ with most of the work done by adding a few simple annotations.\n\nJakarta Contexts\
    \ and Dependency Injection (CDI) is an API that facilitates injecting dependencies\
    \ into application code. It also provides scopes (such as request, session, application,\
    \ and so on) to Java Beans managed by CDI.\n\nJakarta JSON Binding and JSON Processing\
    \ APIs are used when working with data in JavaScript Object Notation (JSON) format,\
    \ which is by far the most common format used when working with microservices\
    \ and web services. Jakarta JSON Binding is a high-level API that does a lot of\
    \ work behind the scenes, while Jakarta JSON Processing is a lower-level API that\
    \ provides more control for application developers.\n\n## Jakarta EE\n\nIn 2017,\
    \ Oracle donated Java EE to the Eclipse Foundation; at this point in time, the\
    \ technology was renamed to Jakarta EE. With the donation to the Eclipse Foundation,\
    \ there was no longer any single entity controlling the standard; instead, several\
    \ equal partner companies contribute equally to it; even individual contributors\
    \ not affiliated with any Jakarta EE vendor can join the foundation and contribute\
    \ to the standard.\n\nAlthough the lines have blurred in recent years, Jakarta\
    \ EE is primarily thought of as a specification for traditional on-site application\
    \ deployments using monolithic application servers. MicroProfile, on the other\
    \ hand, is thought of as a specification meant for lightweight cloud deployments.\n\
    \nAlthough cloud deployment has become very popular in recent years, it isn’t\
    \ a panacea; it doesn’t always make sense to develop applications for the cloud.\n\
    \nAdditionally, there are several applications developed in the days before cloud\
    \ deployments became popular, which would be too costly or impractical to migrate\
    \ to a new architecture.\n\nMost popular Jakarta EE implementations provide a\
    \ lightweight version of their offerings (i.e., Payara Micro), making the task\
    \ of migrating Jakarta EE applications to the cloud easier and even easing the\
    \ task of developing new Jakarta EE–compliant applications specifically for the\
    \ cloud.\n\n## Payara\n\nPayara started as a fork of GlassFish application server.\
    \ For readers not aware, GlassFish used to be an open source Java EE implementation\
    \ from Oracle (and Sun Microsystems before them). GlassFish used to be the Java\
    \ EE reference implementation. For many years, commercial support was available\
    \ for GlassFish; however, at some point, support was dropped, although GlassFish\
    \ was still freely available for download.\n\nMany organizations require support\
    \ contracts for any software they utilize in production; GlassFish commercial\
    \ support being dropped left many companies scrambling looking for a replacement.\n\
    \nC2B2 Consulting, a UK-based company, saw an opportunity and created Payara as\
    \ a fork of GlassFish. Being based on GlassFish, it was seamless to transition\
    \ applications developed for GlassFish to Payara.\n\nC2B2 Consulting has been\
    \ maintaining Payara and adding additional features not originally available in\
    \ GlassFish, including splitting Payara into two editions: “Payara Server,” which\
    \ is a traditional Jakarta EE application server, and “Payara Micro,” which is\
    \ meant to be deployed to a cloud environment.\n\nPayara is fully open source;\
    \ under the Common Development and Distribution License (CDDL) Version 1.1, commercial\
    \ support is available for those that need it.\n\nIn this book, we will focus\
    \ on Payara Micro, with an emphasis on Payara’s implementation of MicroProfile\
    \ APIs.\n\n# 2. Developing Microservices Using Payara Micro\n\nMicroservices are\
    \ nothing but RESTful web services; they typically perform a single task; as such,\
    \ their code bases tend to be small. In a microservices architecture, applications\
    \ are composed of several different microservices communicating with one another.\n\
    \nPayara Micro is a MicroProfile-compliant runtime; as such, applications deployed\
    \ with Payara Micro must conform to the MicroProfile specification. MicroProfile\
    \ uses the Jakarta RESTful Web Services API for RESTful web services deployment.\
    \ In this chapter, we will see how to develop RESTful web services using said\
    \ API and execute them against Payara Micro.\n\n## Setting Up Your Environment\n\
    \nPayara provides a Maven plug-in that makes working with Payara Micro projects\
    \ easier. In this section, we will discuss how to set up Maven projects for Payara\
    \ Micro applications.\n\nNetBeans IDE can create a Payara Micro project out of\
    \ the box with all necessary configuration in place.\n\n### Payara Micro Maven\
    \ Plug-in\n\nTo add the Payara Micro Maven plug-in to your project, add it to\
    \ the `<plugins>` section of your `pom.xml` as illustrated in the following example.\n\
    \n```\n<plugin>\n    <groupId>fish.payara.maven.plugins</groupId>\n    <artifactId>payara-micro-maven-plugin</artifactId>\n\
    \    <version>1.4.0</version>\n    <configuration>\n        <payaraVersion>5.2021.5</payaraVersion>\n\
    \        <deployWar>false</deployWar>\n        <commandLineOptions>\n        \
    \    <option>--autoBindHttp</option>\n            <option>--deploy</option>\n\
    \            <option>${project.build.directory}/${project.build.finalName}</option>\n\
    \            <option>/</option>\n        </commandLineOptions>\n    </configuration>\n\
    </plugin>\n```\n\nUnder the `<configuration>` section, we can set several configuration\
    \ options used when running our application in Payara Micro.\n\nMaven automatically\
    \ downloads the Payara Micro version we specify in the `<payaraVersion>` tag.\n\
    \nWe can specify if we want to automatically deploy the project WAR file in the\
    \ `<deployWar>` tag. Usually when developing an application, it makes sense to\
    \ deploy the application as an exploded WAR file (more on that later); therefore,\
    \ it is a good idea to set this value to `false`.\n\nWe can specify command-line\
    \ options to pass to Payara Micro in the `<commandLineOptions>` tag. Table 2-1\
    \ lists the options that are available.\n\n**Table 2-1** Payara Micro Command-Line\
    \ Options\n\n| Command-Line Option | Description |\n| --- | --- |\n| `autoBindHttp`\
    \ | If set to true, Payara Micro will automatically find an available port and\
    \ bind it as the HTTP port |\n| `deploy` | Specifies either an exploded or standard\
