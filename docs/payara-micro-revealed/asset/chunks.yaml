    ## Summary


    In this chapter, we covered the request tracing capabilities of Payara Micro.
    We saw how to enable request tracing via a command-line argument to Payara Micro,
    which results in all of the RESTful web service endpoints in our application being
    automatically traced. We also covered how to trace additional methods in our applications
    via the `@Traced` annotation, as well as how to disable request tracing in places
    where it is not desired. Additionally, we covered how to customize the operation
    name in the spans generated by our applications, as well as how to add custom
    tags to our spans. Finally, we covered how to programmatically create spans in
    case we need more control than what is provided by the MicroProfile OpenTracing
    API.


    # 10. Documenting Web Services


    Code documentation is an arduous, often thankless task; for this reason, documentation
    can easily become obsolete and out of date, as changes are made to the code base;
    in many occasions, documentation is not updated to reflect the latest changes.


    Payara Micro can alleviate this problem via its support for the MicroProfile OpenAPI,
    which makes generating documentation trivial; in many cases, documentation is
    updated automatically as the code is updated; for example, adding a new parameter
    to an existing web service endpoint can result in the new parameter being automatically
    added to the documentation.

