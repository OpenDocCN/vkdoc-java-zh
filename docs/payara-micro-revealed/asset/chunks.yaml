    #### 集群配置源


    当我们在同一网络上启动多个 Payara Micro 实例时，它们会自动形成一个集群；这非常有用，因为集群中的所有 Payara Micro 实例都可以共享数据。我们可以通过在命令文件中执行如下命令，在集群级别设置配置属性：


    ```

    set-config-property --propertyName=clustered.property.name --propertyValue=''clustered
    property value'' --source=payara

    ```


    我们需要使用 `cluster` 作为源，并像往常一样指定属性名称和值。


    然后，我们可以像往常一样从集群中的任何 Payara Micro 实例检索该属性，例如，通过注入的方式：


    ```

    @Inject

    @ConfigProperty(name = "clustered.property.name")

    private String propertyVal;

    ```


    #### JDBC 配置源


    我们可以使用数据库表作为 MicroProfile 配置源；通过 `set-jdbc-config-source` asadmin 命令进行设置，需要指定表名、包含属性名称的列以及包含属性值的列。


    ```

    create-jdbc-connection-pool --datasourceclassname org.h2.jdbcx.JdbcDataSource
    --restype javax.sql.DataSource --property user=sa:password=sa:url="jdbc:h2:tcp://localhost//tmp/property"
    PropertyConnectionPool

    create-jdbc-resource --connectionpoolid PropertyConnectionPool PropertyDataSource

    set-jdbc-config-source-configuration --jndiName PropertyDataSource --tableName
    PROP_TABLE --keyColumnName PROP_NAME --valueColumnName PROP_VAL

    ```


    在设置 JDBC 配置源之前，我们需要先设置好一个 JDBC 连接池和一个 JDBC 资源。在 Payara Micro 中，我们可以通过 `create-jdbc-connection-pool`
    命令设置 JDBC 连接池；通过 `--datasourceclassname` 参数指定特定于 RDBMS 的数据源类名，通过 `--restype` 参数指定资源类型为
    `javax.sql.DataSource`，并指定一些特定于 RDBMS 的属性；最后一个参数是连接池 ID；在创建 JDBC 资源时需要用到这个值。


    在这个例子中，我们使用的是 H2 数据库；`--datasourceclassname` 和 `--property` 的值会根据我们使用的 RDBMS（MySQL、Oracle、Sybase、PostgreSQL
    等）而有所不同；请查阅您的 RDBMS 文档以获取要使用的适当值。


    下一步是从我们刚刚创建的连接池创建一个 JDBC 资源；我们通过 `create-jdbc-resource` asadmin 命令来完成，传入我们刚刚创建的连接池的
    ID。`create-jdbc-resource` 的最后一个参数是资源的 JNDI 名称，我们需要用它来创建 JDBC 配置源。


    现在我们已经创建了 JDBC 连接池和 JDBC 资源，就可以配置我们的 JDBC 配置源了；我们可以通过 `set-jdbc-config-source-configuration`
    命令来完成。在我们的示例中，我们创建了一个 JNDI 名称为 `PropertyDataSource` 的 JDBC 资源；我们将此值传递给 `set-jdbc-config-source-configuration`
    命令的 `jndiName` 参数。我们通过 `--tableName` 参数指定包含属性的表名，并分别通过 `--keyColumnName` 和 `--valueColumnName`
    参数指定包含属性名称和属性值的列。


    在我们的示例中，我们从名为 `PROP_TABLE` 的表中读取属性，属性名称和属性值分别存储在名为 `PROPERTY_NAME` 和 `PROPERTY_VAL`
    的列中。图 5-3 展示了我们的示例表和值。


    ![](img/519485_1_En_5_Fig3_HTML.jpg)


    图 5-3


    JDBC 配置源的示例表


    我们可以像往常一样通过 MicroProfile Config API 检索属性值，例如，通过 `@ConfigProperty` 注解注入配置值。


    ```

    @Inject

    @ConfigProperty(name="prop1")

    private String propertyVal;

    ```


    在后台，Payara Micro 会查询数据库并为我们检索值。


    值得注意的是，JDBC 配置源是动态的，这意味着如果数据库中的属性值发生变化，调用 `config.getValue()` 或等效方法将实时从数据库中检索最新值。


    #### LDAP 配置源


    我们可以使用 LDAP 目录作为配置源；为此，我们需要通过 `set-ldap-config-source-configuration` 命令设置配置源。


    在我们的示例中，我们将使用 Apache DS 基本用户指南中的示例目录树，网址为 [`https://directory.apache.org/apacheds/basic-user-guide.html`](https://directory.apache.org/apacheds/basic-user-guide.html)。


    图 5-4 展示了一个可用于 Payara Micro LDAP 配置源的示例 LDAP 目录树。


    ![](img/519485_1_En_5_Fig4_HTML.jpg)


    图 5-4


    示例 LDAP 目录树


    当使用 LDAP 作为配置源时，条目的属性充当属性名称，其对应的值作为属性值。


    在我们的示例中，我们将检索 sn 属性为 *Buckley* 的条目；然后，我们可以通过 MicroProfile Config API 在代码中检索该条目的任何属性。


    ```

    set-ldap-config-source-configuration --enabled=true --dynamic=true --url=ldap://localhost:10389
    --authType=simple --bindDN=uid=admin,ou=system --bindDNPassword=secret --searchBase=ou=people,o=sevenSeas
    --searchScope=subtree --searchFilter=(&(sn=Buckley))

    ```


    我们需要通过传递 `--enabled=true` 作为参数来启用我们的配置源。LDAP 配置源可以是静态的，也可以是动态的；如果是静态的，属性只会在应用程序初始部署时读取一次；如果
    LDAP 目录中的值更新了，应用程序不会读取新值；如果我们将 dynamic 设置为 true，那么我们的应用程序将实时查询 LDAP 目录，检索目录中的最新值。


    我们通过 `--url` 参数指定要连接的 LDAP 服务器的 URL。授权类型可以是 *none* 或 *simple*；在我们的示例中，我们使用简单身份验证；我们通过
    `--bindDN` 参数指定要连接用户的专有名称 (dn)，并通过 `--bindDNPassword` 参数指定其密码。`--searchBase` 参数指定
    LDAP 目录中开始搜索属性的起始节点；`--searchScope` 指定搜索范围；有效值为 *subtree*、*onelevel* 和 *object*。


    表 5-3 列出了不同的 LDAP 配置源搜索范围。


    表 5-3


    LDAP 配置源搜索范围


    | 搜索范围 | 描述 |

    | --- | --- |

    | subtree | 对 `–searchBase` 中指定条目的所有下级条目执行搜索 |

    | onelevel | 对 `–searchBase` 中指定条目的直接下级条目执行搜索 |

    | object | 仅对 `-searchBase` 中指定的条目执行搜索 |


    `--searchFilter` 参数指定一个搜索过滤器，用于从 `--searchBase` 中指定的基础 DN 开始，按照 `--searchScope`
    指定的范围查找值。


    一旦我们设置好 LDAP 配置源，就可以检索与我们的配置匹配的条目中的任何属性；例如，要检索我们示例中 LDAP 条目的 cn 属性，我们可以如下调用 `Config.getConfigValue()`：


    ```

    ConfigValue configValue = config.getConfigValue("cn");

    ```

