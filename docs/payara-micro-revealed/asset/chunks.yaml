- fmt: '# Generating JSON from Java Objects


    Any JSON string we need to pass to the service we are invoking needs to be added
    as a parameter to the method we are invoking. The assumption is that the service
    will accept a JSON string as the body of the request adhering to the structure
    of our Java class.


    ```

    package com.ensode.jsonparsingclient;

    //imports omitted

    @RegisterRestClient

    @Path("messageprocessor")

    public interface MessageProcessorClient {

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    public Message processMessage(Message message);

    }

    ```


    The MicroProfile REST client API automates the conversion from Java objects to
    JSON. If we have a Java class with the same structure as the JSON we need to generate,
    we can simply instantiate the class as usual and pass it as a parameter to the
    REST client interface method generating the HTTP request.


    For example, if we needed to generate a JSON string like the following:


    ```

    {

    "msgText":"Hello from the MicroProfile REST client!"

    }

    ```


    we could simply create a Java class with a `String` property matching the key
    name in our JSON string.


    ```

    package com.ensode.jsonparsingclient;

    public class Message {

    private String msgText;

    //getter and setter omitted

    }

    ```


    We then simply instantiate our class, populate its property, and pass it as a
    parameter to the appropriate method; serialization into a JSON string is done
    for us automatically.


    ```

    package com.ensode.jsonparsingclient;

    //imports omitted

    @ApplicationScoped

    public class MessageProcessorRestClient {

    private static final Logger LOGGER = Logger.getLogger(MessageProcessorRestClient.class.getName());

    @Inject

    @RestClient

    private MessageProcessorClient messageProcessorClient;

    public void init(@Observes @Initialized(ApplicationScoped.class) Object object)
    {

    Message message = new Message();

    Message returnedMessage;

    message.setMsgText(

    "Hello from the MicroProfile REST client!");

    returnedMessage =

    messageProcessorClient.processMessage(message);

    LOGGER.log(Level.INFO, String.format("Server returned the following message: %s",
    returnedMessage.getMsgText()));

    }

    }

    ```


    As we can see, all JSON processing is handled automatically for us by the MicroProfile
    REST client API. As a matter of fact, if we are developing both the service and
    the client, there is no need to handle JSON directly at all, as the Jakarta RESTful
    Web Services API handles the conversion on the service and, as we just saw, the
    MicroProfile REST client API handles the conversion on the client.


    If, for any reason, we need to handle raw JSON, we can simply use `String` as
    the parameter type on our method signatures.


    ## Summary


    In this chapter, we saw how we can create RESTful web service clients using the
    MicroProfile REST client API. We covered how we can create a client by writing
    a Java interface with a few simple annotations, without even having to create
    an implementation for the interface. We also discussed how to send different types
    of HTTP requests, including GET, PUT, POST, and DELETE. We saw how creating RESTful
    clients for services created with the Jakarta RESTful Web Service API is so simple
    it’s almost trivial, as all method signatures and annotations follow the pattern
    established in the client.


    Additionally, we covered how to pass parameters to RESTful web services that require
    them, including both path and query parameters.


    Finally, we covered how to add a JSON body to our HTTP requests and how the MicroProfile
    REST client API takes care of most of the grunt work of JSON handling for us.


    # Contexts and Dependency Injection


    Contexts and Dependency Injection (CDI) is a powerful dependency injection mechanism
    that is part of both the Jakarta EE and MicroProfile specifications. CDI allows
    us to easily inject dependencies into our code; it also has an event handling
    mechanism that allows us to loosely couple different parts of our code. In this
    chapter, we will see how we can incorporate CDI into our MicroProfile applications
    deployed to Payara Micro.


    ## CDI Scopes


    CDI beans have *scopes*, which denote their life cycle; a bean’s scope indicates
    when the bean is created and destroyed. CDI beans are given a scope by annotating
    them with one of the scope annotations; for example, to configure a CDI bean to
    have a request scope, it needs to be annotated with the `@RequestScoped` annotation.


    Table [4-1](#519485_1_En_4_Chapter.xhtml#Tab1) summarizes all CDI scopes.


    **Table 4-1** CDI Scopes


    | Scope | Annotation | Description |

    | --- | --- | --- |

    | Application | `@ApplicationScoped` | Initialized during application startup,
    destroyed when the application shuts down. All users of the application share
    the same instance of application scoped CDI beans |

    | Session | `@SessionScoped` | Tied to a single HTTP session, each user gets an
    instance of session scoped CDI beans |

    | Request | `@RequestScoped` | Tied to an HTTP request, bean is created and destroyed
    for every HTTP request |

    | Conversation | `@ConversationScoped` | Life cycle of a conversation scoped CDI
    bean spans two or more HTTP requests |

    | Dependent | `@Dependent` | Dependent CDI beans don’t have a scope of their own;
    instead, they are meant to be injected into another CDI bean and inherit their
    scope. For example, if injected into a request scoped bean, a dependent bean would
    get a request scope; when injected to a session scoped CDI bean, it would get
    a session scope and so on |


    We can turn almost any Java class into a CDI bean by annotating it with one of
    the preceding scope annotations. The main requirement for a CDI bean is that the
    class must not be abstract and most provide a public, no-argument constructor.
    It is worth pointing out that the session and conversation scopes are better suited
    for traditional web applications. For a microservices architecture, we typically
    only use the application, request, and dependent scopes.'
  raw: '## Generating JSON from Java Objects


    Any JSON string we need to pass to the service we are invoking needs to be added
    as a parameter to the method we are invoking. The assumption is that the service
    will accept a JSON string as the body of the request adhering to the structure
    of our Java class.


    ```

    package com.ensode.jsonparsingclient;

    //imports omitted

    @RegisterRestClient

    @Path("messageprocessor")

    public interface MessageProcessorClient {

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    public Message processMessage(Message message);

    }

    ```


    The MicroProfile REST client API automates the conversion from Java objects to
    JSON. If we have a Java class with the same structure as the JSON we need to generate,
    we can simply instantiate the class as usual and pass it as a parameter to the
    REST client interface method generating the HTTP request.


    For example, if we needed to generate a JSON string like the following:


    ```

    {

    "msgText":"Hello from the MicroProfile REST client!"

    }

    ```


    we could simply create a Java class with a `String` property matching the key
    name in our JSON string.


    ```

    package com.ensode.jsonparsingclient;

    public class Message {

    private String msgText;

    //getter and setter omitted

    }

    ```


    We then simply instantiate our class, populate its property, and pass it as a
    parameter to the appropriate method; serialization into a JSON string is done
    for us automatically.


    ```

    package com.ensode.jsonparsingclient;

    //imports omitted

    @ApplicationScoped

    public class MessageProcessorRestClient {

    private static final Logger LOGGER = Logger.getLogger(MessageProcessorRestClient.class.getName());

    @Inject

    @RestClient

    private MessageProcessorClient messageProcessorClient;

    public void init(@Observes @Initialized(ApplicationScoped.class) Object object)
    {

    Message message = new Message();

    Message returnedMessage;

    message.setMsgText(

    "Hello from the MicroProfile REST client!");

    returnedMessage =

    messageProcessorClient.processMessage(message);

    LOGGER.log(Level.INFO, String.format("Server returned the following message: %s",
    returnedMessage.getMsgText()));

    }

    }

    ```


    As we can see, all JSON processing is handled automatically for us by the MicroProfile
    REST client API. As a matter of fact, if we are developing both the service and
    the client, there is no need to handle JSON directly at all, as the Jakarta RESTful
    Web Services API handles the conversion on the service and, as we just saw, the
    MicroProfile REST client API handles the conversion on the client.


    If, for any reason, we need to handle raw JSON, we can simply use String as the
    parameter type on our method signatures.


    ## Summary


    In this chapter, we saw how we can create RESTful web service clients using the
    MicroProfile REST client API. We covered how we can create a client by writing
    a Java interface with a few simple annotations, without even having to create
    an implementation for the interface. We also discussed how to send different types
    of HTTP requests, including GET, PUT, POST, and DELETE. We saw how creating RESTful
    clients for services created with the Jakarta RESTful Web Service API is so simple
    it’s almost trivial, as all method signatures and annotations follow the pattern
    established in the client.


    Additionally, we covered how to pass parameters to RESTful web services that require
    them, including both path and query parameters.


    Finally, we covered how to add a JSON body to our HTTP requests and how the MicroProfile
    REST client API takes care of most of the grunt work of JSON handling for us.


    # 4. Contexts and Dependency Injection


    Contexts and Dependency Injection (CDI) is a powerful dependency injection mechanism
    that is part of both the Jakarta EE and MicroProfile specifications. CDI allows
    us to easily inject dependencies into our code; it also has an event handling
    mechanism that allows us to loosely couple different parts of our code. In this
    chapter, we will see how we can incorporate CDI into our MicroProfile applications
    deployed to Payara Micro.


    ## CDI Scopes


    CDI beans have *scopes*, which denote their life cycle; a bean’s scope indicates
    when the bean is created and destroyed. CDI beans are given a scope by annotating
    them with one of the scope annotations; for example, to configure a CDI bean to
    have a request scope, it needs to be annotated with the `@RequestScoped` annotation.


    Table [4-1](#519485_1_En_4_Chapter.xhtml#Tab1) summarizes all CDI scopes.


    Table 4-1


    CDI Scopes


    | Scope | Annotation | Description |

    | --- | --- | --- |

    | Application | `@ApplicationScoped` | Initialized during application startup,
    destroyed when the application shuts down. All users of the application share
    the same instance of application scoped CDI beans |

    | Session | `@SessionScoped` | Tied to a single HTTP session, each user gets an
    instance of session scoped CDI beans |

    | Request | `@RequestScoped` | Tied to an HTTP request, bean is created and destroyed
    for every HTTP request |

    | Conversation | `@ConversationScoped` | Life cycle of a conversation scoped CDI
    bean spans two or more HTTP requests |

    | Dependent | `@Dependent` | Dependent CDI beans don’t have a scope of their own;
    instead, they are meant to be injected into another CDI bean and inherit their
    scope. For example, if injected into a request scoped bean, a dependent bean would
    get a request scope; when injected to a session scoped CDI bean, it would get
    a session scope and so on |


    We can turn almost any Java class into a CDI bean by annotating it with one of
    the preceding scope annotations. The main requirement for a CDI bean is that the
    class must not be abstract and most provide a public, no-argument constructor.
    It is worth pointing out that the session and conversation scopes are better suited
    for traditional web applications. For a microservices architecture, we typically
    only use the application, request, and dependent scopes.'
  trans: '

    ## 从 Java 对象生成 JSON


    我们需要传递给所调用服务的任何 JSON 字符串，都必须作为参数添加到所调用的方法中。前提是，该服务会接受一个符合我们 Java 类结构的 JSON 字符串作为请求体。


    ```java

    package com.ensode.jsonparsingclient;

    // 省略导入语句

    @RegisterRestClient

    @Path("messageprocessor")

    public interface MessageProcessorClient {

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    public Message processMessage(Message message);

    }

    ```


    MicroProfile REST 客户端 API 会自动完成从 Java 对象到 JSON 的转换。如果我们有一个与需要生成的 JSON 结构相同的 Java
    类，只需像往常一样实例化该类，并将其作为参数传递给生成 HTTP 请求的 REST 客户端接口方法即可。


    例如，如果需要生成如下所示的 JSON 字符串：


    ```json

    {

    "msgText":"Hello from the MicroProfile REST client!"

    }

    ```


    我们可以简单地创建一个包含 `String` 属性的 Java 类，该属性与 JSON 字符串中的键名匹配。


    ```java

    package com.ensode.jsonparsingclient;

    public class Message {

    private String msgText;

    // 省略 getter 和 setter 方法

    }

    ```


    然后，我们只需实例化该类，填充其属性，并将其作为参数传递给相应的方法；序列化为 JSON 字符串的工作会自动为我们完成。


    ```java

    package com.ensode.jsonparsingclient;

    // 省略导入语句

    @ApplicationScoped

    public class MessageProcessorRestClient {

    private static final Logger LOGGER = Logger.getLogger(MessageProcessorRestClient.class.getName());

    @Inject

    @RestClient

    private MessageProcessorClient messageProcessorClient;

    public void init(@Observes @Initialized(ApplicationScoped.class) Object object)
    {

    Message message = new Message();

    Message returnedMessage;

    message.setMsgText(

    "Hello from the MicroProfile REST client!");

    returnedMessage =

    messageProcessorClient.processMessage(message);

    LOGGER.log(Level.INFO, String.format("Server returned the following message: %s",
    returnedMessage.getMsgText()));

    }

    }

    ```


    如我们所见，所有 JSON 处理都由 MicroProfile REST 客户端 API 自动为我们处理。事实上，如果我们同时开发服务和客户端，则完全无需直接处理
    JSON，因为 Jakarta RESTful Web Services API 会在服务端处理转换，而正如我们刚才所见，MicroProfile REST
    客户端 API 会在客户端处理转换。


    如果出于任何原因，我们需要处理原始 JSON，只需在方法签名中使用 `String` 作为参数类型即可。


    ## 总结


    在本章中，我们了解了如何使用 MicroProfile REST 客户端 API 创建 RESTful Web 服务客户端。我们介绍了如何通过编写一个带有几个简单注解的
    Java 接口来创建客户端，甚至无需为该接口创建实现。我们还讨论了如何发送不同类型的 HTTP 请求，包括 GET、PUT、POST 和 DELETE。我们看到了为使用
    Jakarta RESTful Web Service API 创建的服务创建 RESTful 客户端是多么简单，几乎微不足道，因为所有方法签名和注解都遵循客户端中建立的模式。


    此外，我们还介绍了如何向需要参数的 RESTful Web 服务传递参数，包括路径参数和查询参数。


    最后，我们介绍了如何向 HTTP 请求添加 JSON 主体，以及 MicroProfile REST 客户端 API 如何为我们处理大部分 JSON 处理的繁重工作。


    # 4. 上下文与依赖注入


    上下文与依赖注入（CDI）是一种强大的依赖注入机制，它既是 Jakarta EE 规范的一部分，也是 MicroProfile 规范的一部分。CDI 允许我们轻松地将依赖项注入到代码中；它还具有一个事件处理机制，使我们能够松散地耦合代码的不同部分。在本章中，我们将了解如何将
    CDI 集成到部署到 Payara Micro 的 MicroProfile 应用程序中。


    ## CDI 作用域


    CDI Bean 具有*作用域*，用于表示其生命周期；Bean 的作用域指示了 Bean 何时被创建和销毁。通过使用某个作用域注解来标注 CDI Bean，可以为其指定作用域；例如，要将
    CDI Bean 配置为具有请求作用域，需要使用 `@RequestScoped` 注解进行标注。


    表 4-1 总结了所有 CDI 作用域。


    **表 4-1**


    **CDI 作用域**


    | 作用域 | 注解 | 描述 |

    | --- | --- | --- |

    | 应用 | `@ApplicationScoped` | 在应用程序启动时初始化，在应用程序关闭时销毁。应用程序的所有用户共享同一个应用作用域的 CDI
    Bean 实例 |

    | 会话 | `@SessionScoped` | 绑定到单个 HTTP 会话，每个用户获得一个会话作用域的 CDI Bean 实例 |

    | 请求 | `@RequestScoped` | 绑定到 HTTP 请求，Bean 在每个 HTTP 请求时创建和销毁 |

    | 对话 | `@ConversationScoped` | 对话作用域的 CDI Bean 的生命周期跨越两个或多个 HTTP 请求 |

    | 依赖 | `@Dependent` | 依赖 CDI Bean 没有自己的作用域；相反，它们被设计为注入到另一个 CDI Bean 中并继承其作用域。例如，如果注入到请求作用域的
    Bean 中，依赖 Bean 将获得请求作用域；当注入到会话作用域的 CDI Bean 中时，它将获得会话作用域，依此类推 |


    我们可以通过使用上述任一作用域注解来标注，将几乎任何 Java 类转变为 CDI Bean。CDI Bean 的主要要求是：该类不能是抽象的，并且必须提供一个公共的无参构造函数。值得指出的是，会话和对话作用域更适合传统的
    Web 应用程序。对于微服务架构，我们通常只使用应用、请求和依赖作用域。

