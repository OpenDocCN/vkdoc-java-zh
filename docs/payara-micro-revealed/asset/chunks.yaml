- fmt: '# Password Configuration Source


    Both `Payara Server` and `Payara Micro` allow us to set up password aliases. The
    purpose of password aliases is security; password aliases allow us to use an alias
    instead of actual passwords whenever we need to read a password. This prevents
    us from having to hard-code passwords in our code.


    In order to set a password alias in `Payara Micro`, we need to create a password
    file with the desired password, as follows:


    ```

    AS_ADMIN_ALIASPASSWORD=secret

    ```


    Then we use the `create-password-alias` command in the post boot command file:


    ```

    create-password-alias my-password --passwordfile=/path/to/password.txt

    ```


    If we need to create multiple password aliases, we would create multiple password
    files and have multiple `create-password-alias` commands in the post boot command
    file:


    ```

    create-password-alias my-password --passwordfile=/tmp/password.txt

    create-password-alias another-password –passwordfile=/tmp/password2.txt

    ```


    Once we have created our password aliases, the property names to retrieve them
    adhere to the following pattern: `${ALIAS=alias-name}`.


    In our example post boot command file, we created two password aliases, named
    `my-password` and `another-password`; we would retrieve those in our code via
    the `@ConfigSource` annotation as follows:


    ```

    @Inject

    @ConfigProperty(name = "${ALIAS=my-password}")

    private String password;

    @Inject

    @ConfigProperty(name = "${ALIAS=another-password}")

    private String password2;

    ```


    We could, of course, use the equivalent methods in a `Config` object to retrieve
    the values as well.


    # Domain Configuration Source


    `Payara Server` has a concept of *domains*; we can group deployed applications
    into a domain, and they would all share common configuration, things like JDBC
    connection pools, etc. We can set up multiple domains into an instance of `Payara
    Server`. Multiple domains are not possible in `Payara Micro`; however, deployed
    applications are added to a default domain.


    We can add domain properties to `Payara Micro` via a command file as follows:


    ```

    set-config-property --propertyName=domain.property.name --propertyValue=''some
    value'' –source=domain

    ```


    The property would be added to the default `Payara Micro` domain and can be retrieved
    in our code as usual.


    ```

    @Inject

    @ConfigProperty(name = "domain.property.name")

    private String value;

    ```


    # JNDI Configuration Source


    Java Naming and Directory Interface is an API used to look up resources in our
    applications; for example, things like database connections can be given a JNDI
    name and retrieved via the JNDI API.


    `Payara Micro` allows us to retrieve JNDI properties via the MicroProfile Config
    API, via its custom JNDI configuration source.


    Before we can retrieve a property via JNDI, we need to set it via a post boot
    command file:


    ```

    create-custom-resource --restype=string --factoryclass=org.glassfish.resources.custom.factory.PrimitivesAndStringFactory
    --property value="jndi-property-val" jndi-property-name

    ```


    A full explanation on setting JNDI resources is beyond our scope, for our purposes,
    suffice to say that Payara includes a JNDI factory class that can be used to add
    JNDI name/value pairs for Java primitives (`int`, `long`, `float`, `double`, `boolean`,
    etc.) and strings. We can use this factory class to create a JNDI name/value pair
    we can then retrieve via the MicroProfile Config API. In our example command file
    before, we are setting a property of type `String` whose name is `jndi-property-name`,
    and its value is `jndi-property-value`.


    We instruct `Payara Micro` to execute the command file from the command line as
    usual; then we can retrieve property values set in JNDI from the JNDI configuration
    source, for example:


    ```

    @Inject

    @ConfigProperty(name = "jndi-property-name")

    private String propertyVal;

    ```


    # Config Configuration Source


    `Payara Server` has a concept of *named configurations*; different instances of
    `GlassFish` in the same domain can have separate configurations. The `Payara Micro`
    default domain has a single configuration, named `server-config`. We can add a
    property to `Payara Micro`’s configuration via a command file as follows:


    ```

    set-config-property --propertyName=my.config.property --propertyValue=''config
    property value'' --source=config --sourceName=server-config

    ```


    We can then retrieve the value of the property from our code as usual:


    ```

    @Inject

    @ConfigProperty(name = "my.config.property")

    private String value;

    ```


    # Server Configuration Source


    Properties set at the server configuration source will be accessible from a single
    instance of `Payara Micro`. We can add properties to the server MicroProfile Config
    source via a command file as illustrated in the following example.


    ```

    set-config-property --propertyName=my.config.property --propertyValue=''from server
    source'' --source=server –sourceName=server

    ```


    We can then retrieve the property values from our code via the `@ConfigSource`
    annotation or by invoking `Config.getConfigValue()` as usual.'
