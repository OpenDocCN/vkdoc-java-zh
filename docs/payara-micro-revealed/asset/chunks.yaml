- fmt: '### MicroProfile JWT Annotations


    Every JAX-RS application requires an instance of a class that extends `javax.ws.rs.core.Application`;
    typically, we annotate this class with `@ApplicationPath` to specify the base
    URI for all resource URIs in our application. When securing our applications,
    we need to annotate this class with the `@LoginConfig` annotation as illustrated
    in the following example.


    ```

    package com.ensode.jwtdemo;

    import javax.inject.Singleton;

    import javax.ws.rs.ApplicationPath;

    import javax.ws.rs.core.Application;

    import org.eclipse.microprofile.auth.LoginConfig;

    @Singleton

    @ApplicationPath("webresources")

    @LoginConfig(authMethod = "MP-JWT")

    public class ApplicationConfig extends Application {

    }

    ```


    As seen in the example, we need to set the `authMethod` attribute of `@LoginConfig`
    to `"MP-JWT"`; this tells the MicroProfile runtime (Payara Micro) that our application
    is using JWT for authentication.


    Additionally, our application class needs to be turned into a singleton by annotating
    it with `javax.inject.Singleton`; failure to do this will prevent clients from
    being authenticated properly.


    Once we have specified we are using JWT for authentication, we need to specify
    which roles can access our protected endpoints; this is done via the `@RolesAllowed`
    annotation, as illustrated in the following example:


    ```

    package com.ensode.jwtdemo;

    import javax.annotation.security.RolesAllowed;

    //additional imports omitted

    @RequestScoped

    @Path("jwtdemo")

    public class JwtDemoResource {

    @GET

    @Produces(MediaType.TEXT_PLAIN)

    @RolesAllowed({"chief"})

    public String secured() {

    return "Secured endpoint accessed successfully\n";

    }

    }

    ```


    The `@RolesAllowed` annotation can be used at the class level, in which case it
    will apply to all endpoints in the class, or at the method level, in which case
    it will only apply to the annotated method; its value must be an array of strings
    containing valid roles that are allowed to access the endpoint; these roles are
    taken from the *groups* claim in the JWT. In our example, we used jwtenizr to
    generate our token, which, by default, creates a token with the following groups/roles:
    "chief" and "hacker"; in our example, only users with the role of "chief" will
    be able to access the endpoint.


    In order for the `@RolesAllowed` annotation to work as expected, we need to turn
    our JAX-RS class into a CDI request scoped bean via the `@RequestScoped` annotation,
    as illustrated in the example.


    We can test our secured endpoint with `curl` by sending the Base 64 encoded token
    as an HTTP header, for example:


    ```

    curl -H''Authorization: Bearer eyJraWQiOiJqd3Qua2V5IiwidHlwIjoiSldUIiwiYWxnIjoiUlMyNTYifQ.eyJzdWIiOiJkdWtlIiwidXBuIjoiZHVrZSIsImF1dGhfdGltZSI6MTYzOTQzOTIxNCwiaXNzIjoiYWlyaGFja3MiLCJncm91cHMiOlsiY2hpZWYiLCJoYWNrZXIiXSwiZXhwIjoxNjM5NDQwMjE0LCJpYXQiOjE2Mzk0MzkyMTQsImp0aSI6IjQyIn0.gMwd042R8L_pxmj97j9Bzsz8Vg5cZCSZ_uiSJwqnBD5i811Wq_4l9_DQ-LdRGQwgORKrN3emVfkxOiiWnTSSfEIOKDktuCiJuhlcojeaTvpACaFtnYLI5fZ6hCkurj7TEnrJwVqxJVo_dH6AS45UR2Q3z688oBBSb5_i5gtw9g_84nkWp70FkAjDusz-jLWeebOWAEk6NRv6fN_ZAP1JJcz9WoNordMeXgVe2tFmLz8_yDY_ba-0x1F9vEXBalHz4AwJaAYtW97mvshdnLnKkP48mQGoO4X9Ps6eRCG1viTuTmcHRTACt9osb7wssWIDenhuumz_lI9P9sLVFfj29Q''
    http://localhost:8080/jwt-demo/webresources/jwtdemo

    ```


    The preceding `curl` command will result in a successful invocation to our endpoint;
    if we remove the `-H` option from the command, then the request will fail with
    an HTTP status code of 401: Unauthorized.


    To authorize requests via the MicroProfile REST client API, we need to send the
    Base 64 encoded token as well; we will cover how to do this in the next section.


    ## Invoking Secured Microservices with MicroProfile REST Client API


    In order to invoke a secured RESTful web service via the MicroProfile REST client
    API, we need to write an interface, and it needs to be annotated with `@RegisterRestClient`
    as usual; however, in this case, there are some slight differences in the method
    signature and annotations used in the client interface, compared to the code implementing
    the endpoint.


    ```

    package com.ensode.jwtclientdemo;

    import javax.ws.rs.HeaderParam;

    import javax.ws.rs.core.HttpHeaders;

    //other imports omitted

    @RegisterRestClient

    @Path("jwtdemo")

    public interface JwtDemoResourceClient {

    @GET

    @Produces(MediaType.TEXT_PLAIN)

    public String secured(@HeaderParam(HttpHeaders.AUTHORIZATION)

    String authorizationHeader);

    }

    ```


    The first thing to note is that we should not use the `@RolesAllowed` annotation
    on the client interface; this would result in the client itself being secured,
    which is not what we want in our example; what we are aiming to do here is to
    invoke a secured endpoint from an unsecured one; in order to do that, we need
    to send the JWT token as an HTTP header.


    We can send an HTTP header in by annotating a `String` parameter with the `@HeaderParam`
    annotation; the `value` attribute of this annotation specifies the header name;
    since "Authorization" is a standard HTTP header name, it is defined as the `AUTHORIZATION`
    constant in the `HttpHeaders` class.


    Notice that the method signature does not exactly match the corresponding signature
    in the JAX-RS service code; the endpoint does not define the `authorizationHeader`
    parameter.


    We use the REST client interface as usual by injecting it via the `@Inject` and
    `@RestClient` annotations and then passing the JWT token as a parameter that will
    be processed as an HTTP header, thanks to the `@HeaderParam` interface.


    ```

    package com.ensode.jwtclientdemo;

    //imports omitted

    @ApplicationScoped

    @Path("jwtclient")

    public class JwtClientResource {

    @Inject

    @RestClient

    private JwtDemoResourceClient jwtDemoResourceClient;

    @Inject

    @ConfigProperty(name = "ensode.jwt.header.string")

    private String jwtHeaderString;

    @GET

    public String accessSecuredEndpoint() {

    jwtDemoResourceClient.secured(

    "Bearer ".concat(jwtHeaderString));

    return "secured endpoint accessed successfully";

    }

    }

    ```


    We can obtain the JWT token as a simple string; in our example, we are setting
    it up as a MicroProfile Config property and retrieving it from there; we then
    invoke the client method, passing the JWT token as a parameter; in order for authentication
    to work as expected, we need to prefix the token text with the word "Bearer",
    which we are doing as we invoke the method on the client interface.


    For completeness and clarity, here is the property file we used to store the JWT
    text:


    ```

    com.ensode.jwtclientdemo.JwtDemoResourceClient/mp-rest/url=http://localhost:8080/jwt-demo/webresources

    ensode.jwt.header.string=eyJraWQiOiJqd3Qua2V5IiwidHlwIjoiSldUIiwiYWxnIjoiUlMyNTYifQ.eyJzdWIiOiJkdWtlIiwidXBuIjoiZHVrZSIsImF1dGhfdGltZSI6MTYzOTQ4ODc4OCwiaXNzIjoiYWlyaGFja3MiLCJncm91cHMiOlsiY2hpZWYiLCJoYWNrZXIiXSwiZXhwIjoxNjM5NDg5Nzg4LCJpYXQiOjE2Mzk0ODg3ODgsImp0aSI6IjQyIn0.C9_ejgLALOo8IVHZ6P6fqoTrVIjrmaqJ_gexHrEzwx0jWExDwLmKLIWKcOHWytKPrW0k1ok8cKUj55rKWG8Vp1-gGhIptWeGF2ckSKu5fCOaoBerJn6x8uDJVeURV8-ABHcoJFSePQx3EEGmoLEb2_EqgBvU4didp-MyUwyyIKiDIuOSu_n-mFq_yB9WpZZiY4lyNS9ewt_TDUmIgteJ2VMsmZaHp3n_RygV0S4FPXhOUHRhKOfLLUorvJzGYsT7dgjbnY6kyh4dgAXWrGnX4kaf0ZFyVXCxsmuvks9Ixltv6krqWe_j-0ZkYMzevgnXbvc3MA9LJWQMhauwtGfw1g

    ```


    Notice how the JWT token text is specified as the value of the `ensode.jwt.header.string`
    property, which we retrieve in our code via the `@ConfigProperty` annotation and
    pass to the client interface.'
