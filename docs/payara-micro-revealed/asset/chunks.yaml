    --authType=simple --bindDN=uid=admin,ou=system --bindDNPassword=secret --searchBase=ou=people,o=sevenSeas
    --searchScope=subtree --searchFilter=(&(sn=Buckley))

    ```


    We need to enable our configuration source by passing `--enabled=true` as an argument.
