- fmt: '### Remote CDI Events


    With Payara Micro, CDI events can be observed across the network by applications
    deployed in a different node from the application firing the event. To fire a
    remote CDI event, we need to annotate the event being fired with `@Outbound` and
    the parameter in the method handling the event with `@Inbound`. The following
    example illustrates how to fire a remote event; it is a modified version of the
    CDI events example we saw in Chapter [4](#519485_1_En_4_Chapter.xhtml), updated
    to fire remote CDI events.


    ```

    package com.ensode.cdievents;

    import com.ensode.cdievents.qualifier.Deleted;

    import com.ensode.cdievents.qualifier.Updated;

    import fish.payara.micro.cdi.Outbound;

    @Path("countryservice")

    public class CountryService {

    @Inject

    private @Updated @Outbound

    Event countryEvent;

    @Inject

    private @Deleted @Outbound

    Event countryDeletedEvent;

    @Inject

    private CountryLookup countryLookup;

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public Country handleGetRequest(@QueryParam("countryAbbrev") String countryAbbrev)
    {

    return countryLookup.getCountry(countryAbbrev);

    }

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void updateCountry(Country country) {

    countryEvent.fire(country);

    }

    @DELETE

    @Consumes(MediaType.APPLICATION_JSON)

    public void deleteCountry(@QueryParam("countryAbbrev") String countryAbbrev) {

    Country country=countryLookup.getCountry(countryAbbrev);

    countryDeletedEvent.fire(country);

    }

    }

    ```


    The preceding RESTful web service code fires two types of country events: one
    when a country is updated and another when a country is deleted. Recall from Chapter
    [4](#519485_1_En_4_Chapter.xhtml) that we can use qualifiers to distinguish between
    events of the same type; in our example, the `@Updated` and `@Deleted` qualifiers
    are used to distinguish between these two events. In addition to our custom `@Updated`
    and `@Deleted` qualifiers, we annotated both events with the Payara-provided `@Outbound`
    qualifier; this qualifier is used to fire the event across the network so that
    event observer methods in other nodes can handle it. As a matter of fact, the
    only thing we have to do to convert a standard CDI event into a remote CDI event
    is to annotate the `Event` instance declaration with `@Outbound`.


    For this example, we refactored the application so that the event observer is
    deployed in a separate WAR file; this way, we can deploy the observer to a different
    instance of Payara Micro.


    Just like in Chapter [4](#519485_1_En_4_Chapter.xhtml), we have three observer
    methods across two different Java classes; we have a `CountryManager` class that
    has two observer methods: one for country events annotated with `@Updated` and
    another one for events annotated with `@Deleted`.


    ```

    package com.ensode.cdi.remote.event.observer;

    import com.ensode.cdievents.Country;

    import com.ensode.cdievents.CountryLookup;

    import com.ensode.cdievents.qualifier.Deleted;

    import com.ensode.cdievents.qualifier.Updated;

    import fish.payara.micro.cdi.Inbound;

    //additional imports omitted

    @ApplicationScoped

    public class CountryManager {

    private static final Logger LOGGER =

    Logger.getLogger(CountryManager.class.getName());

    @Inject

    private CountryLookup countryLookup;

    public void updateCountry(

    @Observes @Inbound @Updated Country country) {

    LOGGER.log(Level.INFO, String.format(

    "Updating the following country: %s", country.getName()));

    countryLookup.updateCountry(country);

    }

    public void deleteCountry(

    @Observes @Inbound @Deleted Country country) {

    LOGGER.log(Level.INFO, String.format(

    "Deleting the following country: %s", country.getName()));

    countryLookup.deleteCountry(country);

    }

    }

    ```


    The only difference between this example and the corresponding example in Chapter
    [4](#519485_1_En_4_Chapter.xhtml) is the addition of the `@Inbound` annotation
    to the observer method parameter, which is needed to handle events fired across
    the network.


    We have an additional class with an observer method; it listens for any country
    event (i.e., no custom qualifiers like `@Updated` or `@Deleted` are used) and
    simply sends output to the log on the observer method.


    ```

    package com.ensode.cdi.remote.event.observer;

    import com.ensode.cdievents.Country;

    import fish.payara.micro.cdi.Inbound;

    //additional imports omitted

    @ApplicationScoped

    public class CountryEventLogger {

    private static final Logger LOGGER = Logger.getLogger(CountryEventLogger.class.getName());

    public void logCountryEvent(

    @Observes @Inbound Country country) {

    LOGGER.log(Level.INFO, String.format(

    "Event fired for the following country: %s",

    country.getName()));

    }

    }

    ```


    Unsurprisingly, all we had to do to have this observer method listen for remote
    events is to annotate its parameter with the `@Inbound` annotation.


    At this point, we are ready to test our refactored CDI event code; we deploy the
    WAR file containing the code to fire the events to an instance of Payara Micro
    listening on HTTP port 8080. Payara Micro’s output lets us know the endpoints
    we can use to send HTTP requests to our RESTful web service.


    ```

    Payara Micro URLs:

    http://127.0.0.1:8080/cdi-remote-events

    ''cdi-remote-events-1.0-SNAPSHOT'' REST Endpoints:

    GET    /cdi-remote-events/webresources/application.wadl

    DELETE /cdi-remote-events/webresources/countryservice

    GET    /cdi-remote-events/webresources/countryservice

    PUT    /cdi-remote-events/webresources/countryservice

    ]]

    ```


    We then deploy the second WAR file containing event observers to a second instance
    of Payara Micro listening on port 8081.


    ```

    [2021-12-29T18:54:07.730-0500] [] [INFO] [] [PayaraMicro] [tid: _ThreadID=1 _ThreadName=main]
    [timeMillis: 1640822047730] [levelValue: 800] [[

    Payara Micro URLs:

    http://127.0.0.1:8081/cdi-remote-events-observer

    ]]

    ```


    Since we didn’t package any RESTful web services in the second WAR file (only
    CDI beans), no endpoints are displayed on the output of the second Payara Micro
    instance.


    At this point, we are ready to test our code; we can send an HTTP DELETE request
    to the first Payara Micro instance, which will cause it to fire a remote CDI event;
    we can do so via a `curl` command as follows:


    ```

    $ curl -XDELETE http://localhost:8080/cdi-remote-events/webresources/countryservice?countryAbbrev=AU

    ```


    At this point, if we inspect the output of Payara Micro, we should see the log
    entries added by the appropriate CDI remote event observer methods.


    ```

    [2021-12-29T18:59:21.152-0500] [] [INFO] [] [com.ensode.cdi.remote.event.observer.CountryEventLogger]
    [tid: _ThreadID=121 _ThreadName=concurrent/__defaultManagedExecutorService-managedThreadFactory-Thread-9]
    [timeMillis: 1640822361152] [levelValue: 800] Event fired for the following country:
    Australia

    [2021-12-29T18:59:21.156-0500] [] [INFO] [] [com.ensode.cdi.remote.event.observer.CountryManager]
    [tid: _ThreadID=121 _ThreadName=concurrent/__defaultManagedExecutorService-managedThreadFactory-Thread-9]
    [timeMillis: 1640822361156] [levelValue: 800] Deleting the following country:
    Australia

    ```


    As illustrated by our example, firing remote CDI events in Payara Micro takes
    very little work on our part; we simply annotate the event to be fired with `@Outbound`
    and the corresponding event observer method parameters with `@Inbound`; all the
    hard work is done by Payara Micro and is transparent to us as application developers.


    ## Uber Jars


    Uber Jars are executable JAR files that bundle both our application code and the
    Payara Micro runtime. Creating an Uber Jar can potentially simplify executing
    our applications; all we have to do is run the executable WAR file, without having
    to pass any arguments to Payara Micro.'
