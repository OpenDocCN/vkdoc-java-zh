  trans: '

    ## 动态属性


    动态属性允许 MicroProfile Config 实时检索属性的最新值。大多数标准配置源是静态的，这意味着如果底层配置源中的值发生变化，MicroProfile
    Config API 不会捕获该变化；相反，该值将保持为应用程序部署时的值。


    动态属性是指当源中的值发生变化时会实时改变的属性。在大多数情况下，如果要实现动态属性，我们必须开发一个自定义配置源。以下示例是我们在上一节中讨论的外部属性文件配置源的更新版本；此版本将动态更新值。


    ```

    package com.ensode.mpdynamicconfigsource;

    //imports omitted

    public class DynamicExternalPropertyFileConfigSource implements

    ConfigSource {

    private static final String CONFIG_SOURCE_NAME =

    "DynamicExternalPropFile";

    private static final Logger LOGGER = Logger.getLogger(

    DynamicExternalPropertyFileConfigSource.class.getName());

    private Map propertyMap;

    String configFileDir;

    public DynamicExternalPropertyFileConfigSource() throws

    IOException, InterruptedException {

    String homeDir = System.getProperty("user.home");

    configFileDir = String.format("%s/config", homeDir);

    updateProperties();

    }

    private void updateProperties() throws IOException {

    Properties properties = new Properties();

    String configFilePath = String.format(

    "%s/config.properties", configFileDir);

    InputStream inputStream;

    try {

    inputStream = new FileInputStream(configFilePath);

    properties.load(inputStream);

    } catch (FileNotFoundException ex) {

    LOGGER.log(Level.SEVERE, String.format(

    "%s not found!", configFilePath), ex);

    }

    propertyMap = (Map) properties;

    }

    @Override

    public Set getPropertyNames() {

    return propertyMap.keySet();

    }

    @Override

    public String getValue(String propName) {

    String retVal = null;

    try {

    updateProperties();

    var propVal = propertyMap.get(propName);

    if (propVal != null) {

    retVal = propVal.toString();

    }

    } catch (IOException ex) {

    LOGGER.log(Level.SEVERE, null, ex);

    }

    return retVal;

    }

    @Override

    public String getName() {

    return CONFIG_SOURCE_NAME;

    }

    }

    ```


    在此版本的配置源中，我们将填充包含属性的 `Map` 的逻辑移到了 `updateProperties()` 方法中；我们在构造函数和自定义配置源的 `getValue()`
    方法中都调用了此方法。由于每次读取值时我们都会重新填充映射，因此对于任何特定属性，我们始终会返回配置文件中存储的最新值。


    Payara Micro 可能会缓存从配置源读取的值；配置文件中的更改可能需要大约一分钟才能“生效”，并通过用于检索属性值的 MicroProfile API
    调用返回。


    ## 转换器


    配置源中的值通常存储为字符串；然而，有时我们需要读取非字符串类型的属性；例如，它可能是一个数值，甚至是一个自定义对象。


    ### 标准转换器


    MicroProfile Config 包含所有标准 Java 数值类型以及布尔类型的转换器；它们的工作方式正如你所预期的那样。例如，表示整数或浮点数的数字字符串会被转换为相应的数值。对于布尔值，以下值将解析为
    *true：* `"true"`、`"yes"`、`"Y"`、`"on"`、`"1"`；其他任何值都将解析为 *false*。


    以下原始类型及其对应的对象包装器在 MicroProfile Config 中具有标准转换器：


    *   `boolean`


    *   `int`


    *   `long`


    *   `float`


    *   `double`


    此外，还有一个用于 `java.lang.Class` 的转换器，它接受一个包含我们想要初始化的类类型的完全限定名称的字符串；其工作方式类似于标准的 `Class.forName()`
    方法。


    还有一个用于数组和列表的转换器，其中数组元素由逗号分隔；例如，以下属性在分配给数组或列表时，将生成三个单独的元素：“a”、“b”和“c”。


    ```

    my.array.property=a,b,c

    ```


    如果我们需要在某个元素中包含逗号，可以使用反斜杠对其进行转义。


    ```

    array.property.with.comma=a,b\,c

    ```


    上述属性将使用两个元素填充数组或列表：“a”和“b,c”。


    ### Payara Micro 特定转换器


    除了标准的 MicroProfile Config 转换器之外，Payara Micro 还额外包含了两个用于 `java.net.URL` 和 `java.net.InetAddress`
    的转换器，其中包含有效 URL 或 IP 地址的属性将被转换为相应的类型。

    '
- fmt: '### Custom Converters


    If we need to convert to a custom type, we can do so by implementing the `org.eclipse.microprofile.config.spi.Converter`
    interface. This interface has a single abstract method we need to implement:


    ```

    public T convert(String value)

    ```


    The `Converter` interface method uses generics so that we can return the appropriate
    value.


    Let’s say we had a simple `Person` class with `firstName` and `lastName` properties.


    ```

    package com.ensode.mpconfigcustomconverters;

    public class Person {

    private String firstName;

    private String lastName;

    //getters and setters omitted

    }

    ```


    Let’s write a simple converter that will read the value of a property and convert
    it to an instance of `Person`.


    ```

    package com.ensode.mpconfigcustomconverters;

    import org.eclipse.microprofile.config.spi.Converter;

    public class PersonConverter implements Converter {

    @Override

    public Person convert(String value) throws

    IllegalArgumentException, NullPointerException {

    Person person = new Person();

    String[] nameArr = value.split(" ");

    person.setFirstName(nameArr[0]);

    person.setLastName(nameArr[1]);

    return person;

    }

    }

    ```


    As we can see from the example, to implement a converter, we pass the type we
    wish to convert to as a generic type parameter; in our example, we wish to convert
    to an instance of `Person`; therefore, our type parameter is `<Person>`. We then
    implement the body of our `convert()` method, which will now return an instance
    of the class we are converting to. In our (admittedly overly simple) example,
    we simply read a `String` value, split it using spaces as a delimiter, and assign
    the first and second elements of the split string to the `firstName` and `lastName`
    properties of the `Person` class, respectively.


    Before we can use our custom converter, we need to register it; we accomplish
    this by creating a file named `org.eclipse.microprofile.config.spi.Converter`
    under the `META-INF/services` directory of our WAR file and placing the fully
    qualified name of our custom converter in the file. As usual, Maven will place
    the file in the correct directory in the WAR file if we place it under `src/main/resources/META-INF/services`
    in our source code project, as illustrated in Figure [5-6](#519485_1_En_5_Chapter.xhtml#Fig6).


    ![](images/519485_1_En_5_Chapter/519485_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Custom converter registration directory tree


    In our example, the contents of the file would look like this:


    ```

    com.ensode.mpconfigcustomconverters.PersonConverter

    ```


    Suppose we had a couple of properties in `microprofile-config.properties` as follows:


    ```

    customer1=David Heffelfinger

    customer2=John Doe

    ```


    Reading either one of these properties and assigning them to an object of type
    `Person` would trigger our custom converter.


    ```

    package com.ensode.mpconfigcustomconverters;

    //imports omitted

    @RequestScoped

    @Path("customconverter")

    public class CustomConverterService {

    @Inject

    @ConfigProperty(name = "customer1")

    private Person person;

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public Person getCustomer() {

    return person;

    }

    }

    ```


    The preceding RESTful web service would read the value of the `customer1` property;
    our custom converter kicks in since the value is assigned to a variable of type
    `Person`. The `getCustomer()` method would return a JSON representation of the
    populated `Person` object when our service receives an HTTP GET request; for example,
    sending a request with `curl`


    `curl http://localhost:8080/mpconfigcustomconverters/webresources/customconverter`


    would return the following JSON string:


    `{"firstName":"David", "lastName":"Heffelfinger"}`


    ## Summary


    In this chapter, we covered how to configure our applications using the MicroProfile
    Config API.


    We discussed standard configuration sources required by the MicroProfile Config
    specification. Additionally, we covered additional MicroProfile Config configuration
    sources implemented by Payara Micro. We also saw how to implement our own custom
    configuration sources.


    We also covered how to convert string properties to Java objects via converters.
    We discussed standard converters provided by the MicroProfile specification, as
    well as additional converters provided by Payara Micro. Additionally, we saw how
    to implement our own custom MicroProfile Config converters.


    # 6. Metrics


    The MicroProfile Metrics API allows us to easily generate monitoring data (things
    like CPU load, disk space usage, number of HTTP requests, etc.). Payara Micro
    provides a metrics endpoint that can provide this data with no additional effort
    on our part.


    There are four MicroProfile metrics endpoints:


    - `/metrics/base` is defined by the MicroProfile standard, meaning that all MicroProfile
    implementations (such as Payara Micro) must implement it. It provides information
    about the JVM that is running our instance of Payara Micro, things like the number
    of Java classes loaded into memory, JVM uptime, JVM memory information, etc.


    - `/metrics/vendor` allows us to retrieve vendor-specific metric information.


    - `/metrics/application` allows us to retrieve our application-specific metrics,
    which we can generate via annotations.


    - `/metrics` displays all metric information, including the data in `/metrics/base`,
    `/metrics/vendor`, and `/metrics/application`.


    Data generated by the MicroProfile Metrics API is meant to be read by monitoring
    tools that can automatically alert us if an application is using too much CPU,
    memory, disk space, or any other number of warnings. By default, the output of
    the MicroProfile Config endpoints is in Prometheus format.


    Prometheus is a very popular open source monitoring tool. Since Prometheus is
    so popular, the format it uses to read metrics data has been adopted by several
    other monitoring tools. By generating data in Prometheus format, MicroProfile
    Config is automatically compatible with several monitoring tools. If we wish to
    receive metric data in JSON format instead, all we need to do is set the `Accept`
    HTTP header in our request to `application/json`.


    ## Base Metrics


    We can access base metrics by sending a GET request to the `/metrics/base` endpoint
    of our Payara Micro instance.


    For example, using `curl` to send a request to an instance of Payara Micro running
    on our local workstation


    ```

    curl http://localhost:8080/metrics/base

    ```


    would result in output similar to the following:'
  raw: '### Custom Converters


    If we need to convert to a custom type, we can do so by implementing the `org.eclipse.microprofile.config.spi.Converter`
    interface. This interface has a single abstract method we need to implement:


    ```

    public T convert(String value)

    ```


    The `Converter` interface method uses generics so that we can return the appropriate
    value.


    Let’s say we had a simple Person class with `firstName` and `lastName` properties.


    ```

    package com.ensode.mpconfigcustomconverters;

    public class Person {

    private String firstName;

    private String lastName;

    //getters and setters omitted

    }

    ```


    Let’s write a simple converter that will read the value of a property and convert
    it to an instance of `Person`.


    ```

    package com.ensode.mpconfigcustomconverters;

    import org.eclipse.microprofile.config.spi.Converter;

    public class PersonConverter implements Converter {

    @Override

    public Person convert(String value) throws

    IllegalArgumentException, NullPointerException {

    Person person = new Person();

    String[] nameArr = value.split(" ");

    person.setFirstName(nameArr[0]);

    person.setLastName(nameArr[1]);

    return person;

    }

    }

    ```


    As we can see from the example, to implement a converter, we pass the type we
    wish to convert to as a generic type parameter; in our example, we wish to convert
    to an instance of Person; therefore, our type parameter is `<Person>`. We then
    implement the body of our `convert()` method, which will now return an instance
    of the class we are converting to. In our (admittedly overly simple) example,
    we simply read a String value, split it using spaces as a delimiter, and assign
    the first and second elements of the split string to the firstName and `lastName`
    properties of the Person class, respectively.


    Before we can use our custom converter, we need to register it; we accomplish
    this by creating a file named `org.eclipse.microprofile.config.spi.Converter`
    under the *META-INF/services* directory of our WAR file and placing the fully
    qualified name of our custom converted in the file. As usual, Maven will place
    the file in the correct directory in the WAR file if we place it under `src/main/resources/META-INF/services`
    in our source code project, as illustrated in Figure [5-6](#519485_1_En_5_Chapter.xhtml#Fig6).


    ![](images/519485_1_En_5_Chapter/519485_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Custom converter registration directory tree


    In our example, the contents of the file would look like this:


    ```

    com.ensode.mpconfigcustomconverters.PersonConverter

    ```


    Suppose we had a couple of properties in microprofile-config.properties as follows:


    ```

    customer1=David Heffelfinger

    customer2=John Doe

    ```


    Reading either one of these properties and assigning them to an object of type
    Person would trigger our custom converter.


    ```

    package com.ensode.mpconfigcustomconverters;

    //imports omitted

    @RequestScoped

    @Path("customconverter")

    public class CustomConverterService {

    @Inject

    @ConfigProperty(name = "customer1")

    private Person person;

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public Person getCustomer() {

    return person;

    }

    }

    ```


    The preceding RESTful web service would read the value of the customer1 property;
    our custom converter kicks in since the value is assigned to a variable of type
    Person. The `getCustomer()` method would return a JSON representation of the populated
    `Person` object when our service receives an HTTP GET request; for example, sending
    a request with curl


    *curl* *http://localhost:8080/mpconfigcustomconverter/webresources/customconverter*


    would return the following JSON string:


    *{“firstName”:”David”, “lastName”:“Heffelfinger”}*


