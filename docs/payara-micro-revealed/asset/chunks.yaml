    ## 开发 RESTful Web 服务


    为了将任何普通的旧 Java 对象转变为 RESTful Web 服务，我们只需要使用 `@Path` 注解对其进行注解。此注解允许我们为 Web 服务指定
    URI；它还让运行时（在我们的例子中是 Payara Micro）知道该类是一个 Web 服务。


    ```

    package com.ensode.microservice;

    @Path("sample")

    public class SampleRestFulService {

    }

    ```


    `@Path` 注解与我们之前讨论的 `@ApplicationPath` 注解一起，决定了我们 RESTful Web 服务的完整 URI。在我们的示例项目中，RESTful
    Web 服务的完整 URI 将是 `webresources/sample`。


    一个 RESTful Web 服务需要响应一个或多个 HTTP 请求类型（GET、POST、PUT、DELETE 或 PATCH）；这是通过方法级别的注解来实现的。


    ### 处理 HTTP GET 请求


    我们可以通过使用 `@GET` 注解来注解我们的一个方法，从而在我们的 RESTful Web 服务中处理 HTTP GET 请求。如果我们的方法向客户端返回一个值，我们需要通过
    `@Produces` 注解指定返回值的 MIME 类型。


    ```

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public String processGetRequest() {

    String json = "{"

    + "\"msg\":\"Service processed HTTP GET request!\""

    + "}";

    return json;

    }

    ```


    JSON 是迄今为止在 RESTful Web 服务和微服务中用于数据传输的最常见的 MIME 类型，但它绝不是唯一的一种。所有支持的 MIME 类型都在
    `MediaType` 类中定义为常量；其他支持的包括 XML (`MediaType.TEXT_XML`)、HTML (`MediaType.TEXT_HTML`)
    和纯文本 (`MediaType.TEXT_PLAIN`) 等。


    在你的 IDE 中对 `MediaType` 类使用代码补全功能，可以查看所有支持的 MIME 类型。


    在我们的简单示例中，我们只是硬编码了一个 JSON 字符串并返回它。通常，我们会处理一些数据，并使用 Jakarta EE 的 JSON 处理库（JSON-B
    或 JSON-P）之一生成一个 JSON 字符串。我们将在本书后面介绍 JSON 处理。


    ### 处理 HTTP POST 请求


    HTTP POST 请求通过 `@POST` 注解处理；用法与之前讨论的 `@GET` 注解相同。


    ```

    @POST

    @Produces(MediaType.APPLICATION_JSON)

    public String processPostRequest() {

    String json = "{"

    + "\"msg\":\"Service processed HTTP POST request!\""

    + "}";

    return json;

    }

    ```


    这个例子与上一节中的例子几乎相同，主要区别在于我们使用 `@POST` 注解来注解我们的方法，这会导致当我们的服务响应 HTTP POST 请求时调用该方法。


    ### 处理 HTTP PUT 请求


    HTTP PUT 请求通过 `@PUT` 注解处理。


    ```

    @PUT

    @Produces(MediaType.APPLICATION_JSON)

    public String processPutRequest() {

    String json = "{"

    + "\"msg\":\"Service processed HTTP PUT request!\""

    + "}";

    return json;

    }

    ```


    此方法上的 `@PUT` 注解会导致当我们的服务响应 HTTP PUT 请求时调用该方法。


    ### 处理 HTTP DELETE 请求


    HTTP DELETE 请求通过 `@DELETE` 注解处理。


    ```

    @DELETE

    @Produces(MediaType.APPLICATION_JSON)

    public String processDeleteRequest() {

    String json = "{"

    + "\"msg\":\"Service processed HTTP DELETE request!\""

    + "}";

    return json;

    }

    ```


    此方法上的 `@DELETE` 注解会导致当我们的服务响应 HTTP DELETE 请求时调用该方法。


    ### 处理 HTTP PATCH 请求


    我们也可以通过 `@PATCH` 注解来处理 HTTP PATCH 请求。


    ```

    @PATCH

    @Produces(MediaType.APPLICATION_JSON)

    public String processPatchRequest() {

    String json = "{"

    + "\"msg\":\"Service processed HTTP PATCH request!\""

    + "}";

    return json;

    }

    ```


    正如预期的那样，此方法上的 `@PATCH` 注解会导致当我们的服务响应 HTTP PATCH 请求时调用该方法。


    ## 路径参数和查询参数


    你可以向 RESTful Web 服务传递参数；有两种方法可以做到这一点：使用路径参数和查询参数；Jakarta RESTful Web Services
    API 支持这两种方式。

