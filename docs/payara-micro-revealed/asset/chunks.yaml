- fmt: '# Dynamic Properties


    Dynamic properties allow MicroProfile Config to retrieve up-to-date values for
    properties in real time. Most standard configuration sources are static, meaning
    that if the value in the underlying configuration source changes, the MicroProfile
    Config API won’t pick up the change; instead, the value will remain what it was
    when our application was deployed.


    Dynamic properties are properties that will change in real time if the value in
    the source changes. In most cases, we will have to develop a custom configuration
    source if we want to implement dynamic properties. The following example is an
    updated version of the external property file configuration source we discussed
    in the previous section; this version will update values dynamically.


    ```

    package com.ensode.mpdynamicconfigsource;

    //imports omitted

    public class DynamicExternalPropertyFileConfigSource implements

    ConfigSource {

    private static final String CONFIG_SOURCE_NAME =

    "DynamicExternalPropFile";

    private static final Logger LOGGER = Logger.getLogger(

    DynamicExternalPropertyFileConfigSource.class.getName());

    private Map propertyMap;

    String configFileDir;

    public DynamicExternalPropertyFileConfigSource() throws

    IOException, InterruptedException {

    String homeDir = System.getProperty("user.home");

    configFileDir = String.format("%s/config", homeDir);

    updateProperties();

    }

    private void updateProperties() throws IOException {

    Properties properties = new Properties();

    String configFilePath = String.format(

    "%s/config.properties", configFileDir);

    InputStream inputStream;

    try {

    inputStream = new FileInputStream(configFilePath);

    properties.load(inputStream);

    } catch (FileNotFoundException ex) {

    LOGGER.log(Level.SEVERE, String.format(

    "%s not found!", configFilePath), ex);

    }

    propertyMap = (Map) properties;

    }

    @Override

    public Set getPropertyNames() {

    return propertyMap.keySet();

    }

    @Override

    public String getValue(String propName) {

    String retVal = null;

    try {

    updateProperties();

    var propVal = propertyMap.get(propName);

    if (propVal != null) {

    retVal = propVal.toString();

    }

    } catch (IOException ex) {

    LOGGER.log(Level.SEVERE, null, ex);

    }

    return retVal;

    }

    @Override

    public String getName() {

    return CONFIG_SOURCE_NAME;

    }

    }

    ```


    In this version of our configuration source, we moved the logic to populate the
    `Map` containing our properties to the `updateProperties()` method; we invoke
    this method both from the constructor and from the `getValue()` method in our
    custom configuration source. Since we are repopulating the map every time we read
    a value, we will always return the latest value stored in the configuration file
    for any particular property.


    Payara Micro may cache read values from the configuration source; it may take
    up to about a minute for changes in the configuration file to “kick in” and be
    returned from any calls to the MicroProfile API used to retrieve property values.


    ## Converters


    Values in configuration sources are typically stored as strings; however, sometimes,
    we need to read a property that isn’t a string; it could be a numeric value, for
    instance, or even a custom object.


    ### Standard Converters


    MicroProfile Config includes converters for all standard Java numeric types, as
    well as boolean; they work just as you’d expect. For example, a numeric string
    representing an integer or a float is converted to the appropriate numerical value.
    For booleans, the following values will resolve to `true`: `"true"`, `"yes"`,
    `"Y"`, `"on"`, `"1"`; anything else will resolve to `false`.


    The following primitive types and their corresponding object wrappers have standard
    converters in MicroProfile Config:


    *   `boolean`

    *   `int`

    *   `long`

    *   `float`

    *   `double`


    Additionally, there is also a converter for `java.lang.Class` that takes a String
    with the fully qualified name of the class type we wish to initialize; it works
    like the standard `Class.forName()` method.


    There is also a converter for arrays and lists, in which array elements are separated
    by commas; for example, the following property, when assigned to an array or list,
    would result in three separate elements: “a”, “b”, and “c”.


    ```

    my.array.property=a,b,c

    ```


    If we need to include a comma in one of the elements, we can escape it with a
    backslash.


    ```

    array.property.with.comma=a,b\,c

    ```


    The preceding property would populate an array or list with two elements: “a”
    and “b,c”.


    ### Payara Micro Specific Converters


    In addition to the standard MicroProfile Config converters, Payara Micro includes
    an additional two converters for `java.net.URL` and `java.net.InetAddress`, in
    which a property containing a valid URL or IP address will be converted to the
    appropriate type.'
