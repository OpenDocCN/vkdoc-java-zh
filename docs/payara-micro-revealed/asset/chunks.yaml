    method on the `SpanBuilder` instance we created when invoking `buildSpan()`; to
    stop our custom span, we invoke its `finish()` method; when we execute the endpoint
    containing our custom tag, we will be able to see it in the Payara Micro console
    output.'
  trans: '

    ### 为 Span 添加额外信息


    另一种自定义 span 的方式是向生成的 JSON 字符串中添加自定义标签。为此，我们需要为 OpenTracing API 添加一个额外的依赖项；使用 Maven
    时，可以通过在 *pom.xml* 文件中添加一个 `<dependency>` 标签来实现，如下例所示（为简洁起见，仅显示 *pom.xml* 的相关部分）：


    ```


    4.0.0

    com.ensode

    request-tracing

    1.0-SNAPSHOT

    war

    request-tracing


    fish.payara.api

    payara-bom

    ${version.payara}

    pom

    import


    io.opentracing

    opentracing-api


    ```


    大多数部署到 Payara Micro 的应用程序的 Maven 项目，都应在其 `<dependencyManagement>` 部分包含 *payara-bom*
    依赖项。


    Maven 物料清单（BOM）为我们的项目指定了正确的依赖版本。通过使用 BOM，我们可以在不指定版本的情况下向项目添加依赖项，而能够与其它依赖项协同工作的正确版本已在
    BOM 中声明。


    *payara-bom* 在其 `<dependencyManagement>` 部分包含了 `opentracing-api` 的依赖项；因此，在向项目添加此依赖项时，我们无需指定版本，如前面的
    *pom.xml* 文件所示。


    添加必要的依赖项后，我们需要将 `io.opentracing.Tracer` 的实例注入到代码中，并使用它为我们的 span 添加自定义标签。


    ```

    package com.ensode.requesttracing;

    import io.opentracing.Tracer;

    // 其他导入已省略

    @ApplicationScoped

    @Path("employeeservice")

    public class EmployeeResource {

    @Inject

    private Tracer tracer;

    private List employeeList = new CopyOnWriteArrayList(); // 线程安全

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee) throws InterruptedException {

    // 模拟慢速处理

    Thread.sleep(100);

    tracer.activeSpan().setTag(

    "employee", String.format("%s %s", employee.getFirstName(),

    employee.getLastName()));

    employeeList.add(employee);

    }

    }

    ```


    如示例所示，我们通过调用 `Tracer.activeSpan()` 获取代表当前 span 的 `io.opentracing.Span` 实例；然后，我们调用
    `setTag()` 方法，该方法有两个参数：一个用于标签名称的 `String`，以及另一个用于值的参数。`setTag()` 有三个重载版本；第二个参数可以是
    `String`、`boolean` 或 `Number`（任何数值）；在我们的示例中，我们使用了两个 `String` 参数的版本，因为我们添加的标签包含被雇佣员工的名和姓。


    我们可以像往常一样调用 RESTful Web 服务来查看自定义标签；自定义标签将显示在 span 的 JSON 字符串中。


    ```

    {"operationName":"PUT:com.ensode.requesttracing.EmployeeResource.hireEmployee","spanContext":{"spanId":"db583e67-b160-4acd-8e14-1543381848b1","traceId":"3410bb5f-016c-45c4-a0ef-fd67124af853"},"startTime":"2021-11-15T11:33:54.479-05:00[America/New_York]","endTime":"2021-11-15T11:33:54.680121-05:00[America/New_York]","traceDuration":"201116000","spanTags":[{"http.status_code":
    "204"},{"component": "jaxrs"},{"span.kind": "server"},{"http.url": "http://localhost:8080/requesttracing/webresources/employeeservice"},{"employee":
    "Jose Jimenez"},{"http.method": "PUT"}],"references":[{"spanContext":{"spanId":"b7b53629-7890-43d1-9dc4-1c736d21f1cc","traceId":"d5d2cca0-b1b4-4688-8c06-f545c256a1be"},"relationshipType":"ChildOf"},{"spanContext":{"spanId":"42a56b8d-183a-49ef-bc0b-0c322a81930f","traceId":"3410bb5f-016c-45c4-a0ef-fd67124af853"},"relationshipType":"ChildOf"}]}

    ```


    ### 创建额外的 Span


    我们可以通过调用 `Tracer.buildSpan()` 向当前追踪添加自定义 span，如下例所示：


    ```

    package com.ensode.requesttracing;

    // 导入已省略

    @ApplicationScoped

    @Path("employeeservice")

    public class EmployeeResource

    @Inject

    private Tracer tracer;

    private List employeeList = new CopyOnWriteArrayList(); // 线程安全

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee) throws InterruptedException {

    Span customSpan;

    Tracer.SpanBuilder spanBuilder =

    tracer.buildSpan("customSpan");

    customSpan = spanBuilder.start();

    // 模拟慢速处理

    Thread.sleep(215);

    customSpan.finish();

    employeeList.add(employee);

    }

    }

    ```


    `Tracer.buildSpan()` 创建了一个 `SpanBuilder` 类的实例，该类是 `Tracer` 的内部类；此方法接受一个参数，即一个
    `String`，用于指示我们自定义 span 的操作名称。


    当我们实际想要启动自定义 span 时，需要在调用 `buildSpan()` 时创建的 `SpanBuilder` 实例上调用 `start()` 方法；要停止自定义
    span，则调用其 `finish()` 方法；当我们执行包含自定义标签的端点时，将能够在 Payara Micro 控制台输出中看到它。

    '
