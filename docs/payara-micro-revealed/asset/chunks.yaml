    \            <argument>/cdiscopes</argument>\n        </commandLineArguments>\n\
    \    </configuration>\n</plugin>\n```\n\nNotice how we set the context root to\
    \ `/cdiscopes`; we therefore need to use this context root when sending an HTTP\
    \ request to our service.\n\nWe run our application on Payara Micro via the usual\
    \ Maven goals:\n\n```bash\nmvn war:exploded payara-micro:start\n```\n\nWe can\
    \ see in the Payara Micro output that our application was deployed successfully\
    \ and is listening for requests.\n\n```\n[2021-08-30T18:21:02.818-0400] [] [INFO]\
