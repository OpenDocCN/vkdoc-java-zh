- fmt: '### Configuration via Environment Variables


    All modern operating systems allow us to define environment variables that can
    be read by processes running on the operating system.


    For example, in the Unix BASH shell, we could define an environment variable as
    follows:


    ```

    $ export PROJECT_STAGE=test

    ```


    This would define an environment variable named `PROJECT_STAGE` with a value of
    `"test"`.


    MicroProfile Config can read environment variables and retrieve their values;
    the following example illustrates how to do that:


    ```

    package com.ensode.mp.config.example;

    //imports omitted

    @RequestScoped

    @Path("mpconfigexample")

    public class MpConfigDemoService {

    private static final Logger LOGGER = Logger.getLogger(MpConfigDemoService.class.getName());

    @Inject

    @ConfigProperty(name = "PROJECT_STAGE")

    private String projectStage;

    @POST

    @Produces(MediaType.APPLICATION_JSON)

    public void processPostRequest() {

    LOGGER.log(Level.INFO, String.format("Project stage is: %s", projectStage));

    ProjectStageEnum projectStageEnum =

    ProjectStageEnum.valueOf(projectStage.toUpperCase());

    if (ProjectStageEnum.DEVELOPMENT.equals(projectStageEnum)) {

    LOGGER.log(Level.INFO,

    "processPostRequest() method invoked");

    }

    if (ProjectStageEnum.DEVELOPMENT.equals(projectStageEnum)) {

    LOGGER.log(Level.INFO,

    "leaving processPostRequest() method");

    }

    }

    }

    ```


    Notice that the only thing we changed from our previous example was the property
    name in the `@ConfigProperty` annotation; everything else is exactly the same.
    The MicroProfile Config API is exactly the same no matter what configuration source
    we are using, which is very convenient as we don’t need to modify our code if
    we change the source of our properties.


    In our example, we used the `@ConfigSource` annotation to retrieve the environment
    variable value; `Config.getValue()` would have worked just as well.


    It is also worth pointing out that no special configuration is needed; we simply
    set the environment variable on our operating system shell and run our code; MicroProfile
    Config will read the environment variable without additional effort on our part.


    ### Configuration via System Properties


    The Java Virtual Machine (JVM) has a number of built-in system properties we can
    use to retrieve information about the environment we are working on. It has properties
    indicating things like the Java version we are using (`java.version`), the user’s
    home directory (`home.dir`), and many others. We can also add our own system properties
    programmatically or via the command line.


    As previously mentioned, the MicroProfile Config API for retrieving property values
    is the same no matter what configuration source we are using; using system properties
    as a configuration source is no exception.


    We can pass a system property to the JVM running Payara Micro by configuring the
    Payara Micro Maven plug-in:


    ```

    fish.payara.maven.plugins

    payara-micro-maven-plugin

    1.4.0


    ${version.payara}


    -Dmy.system.property


    "If you don''t see this, it didn''t work"


    false


    --autoBindHttp


    --deploy

    ${project.build.directory}/${project.build.finalName}


    /mpconfigex


    ```


    In general, the `<javaCommandLineOptions>` tag of the Payara Micro Maven plug-in
    allows us to pass arguments to the JVM; in this particular case, we are setting
    a system property so that it is available to the MicroProfile Config API.


    When running Payara Micro from the command line, we can pass a system property
    to the JVM as follows:


    ```

    java -Dmy.system.property="If you don''t see this, it didn''t work" -jar ~/.m2/repository/fish/payara/extras/payara-micro/5.2021.7/payara-micro-5.2021.7.jar
    --deploy ./target/mp-config-example-1.0-SNAPSHOT.war:mpconfigex

    ```


    So far, we’ve only discussed running Payara Micro from the Maven plug-in; the
    preceding example starts Payara Micro directly from the command line; we will
    cover various ways of starting Payara Micro in Chapter [12](#519485_1_En_12_Chapter.xhtml).


    We can then read the system property as usual, either by using the `@ConfigSource`
    annotation or via `Config.getValue()`.


    ```

    @Inject

    @ConfigProperty(name = "my.system.property")

    private String sysPropVal;

    ```


    Then we can use the property value as usual.


    ### Payara Specific Config Sources


    Payara Micro includes additional configuration sources on top of the ones defined
    by the MicroProfile Config specification.


    [`https://docs.payara.fish/enterprise/docs/5.25.0/documentation/microprofile/config.html`](https://docs.payara.fish/enterprise/docs/5.25.0/documentation/microprofile/config.html)


    #### Directory Configuration Source


    Payara Micro can read the files in a directory and use the file names as property
    names, with their contents as the values.


    The directory configuration source can be used to read Kubernetes secrets files.


    For example, let’s suppose we had a directory `/tmp/props_dir` in our file system,
    and we wish the file names in the directory to be used as property names for MicroProfile
    Config, with their contents being the corresponding property values. Figure [5-2](#519485_1_En_5_Chapter.xhtml#Fig2)
    illustrates the directory structure in a typical Linux terminal.


    ![](images/519485_1_En_5_Chapter/519485_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Sample directory for the directory configuration source


    We need to configure Payara Micro to specify the directory containing the files
    to be used as properties. Using Payara Server, this is typically done via the
    `asadmin` command-line utility. This utility is not included with Payara Micro;
    however, we can pass `asadmin` commands to Payara Micro via a text file and the
    `--postbootcommandfile` file command-line argument.


    For example, let’s say we had a text file named `post-boot-commands.txt` with
    the following contents:


    ```

    set-config-dir –directory=/tmp/props_dir

    ```


    `set-config-dir` is an `asadmin` command to specify the directory in the file
    system to be used as a configuration source; the path to the directory is specified
    as the value of the `-directory` argument to `set-config-dir`.


    We can then tell Payara Micro to read this file by passing the `--postbootcommandfile`
    parameter as follows:


    ```

    java -jar path/to/payara-micro.jar --deploy path/to/warfile.war --postbootcommandfile=/tmp/props_dir

    ```


    When using the Payara Micro Maven plug-in, we can place the file in `src/main/resources`
    and configure the plug-in as follows:


    ```

    fish.payara.maven.plugins

    payara-micro-maven-plugin

    1.4.0


    ${version.payara}

    false


    --postbootcommandfile


    ${basedir}/src/main/resources/post-boot-commands.txt


    /mpconfigex


    ```


    Configuring the plug-in this way allows us to configure Payara Micro when we wish
    to run via the `payara-micro:start` Maven goal.


    Once we have configured the directory configuration source, we can retrieve property
    values as usual; for example, using the `@ConfigProperty` annotation, we could
    retrieve the contents of one of the files in the directory as follows:


    ```

    @Inject

    @ConfigProperty(name = "file1")

    private String value;

    ```


    This would read the contents of the file named `file1` in the configuration directory
    and assign its contents to the annotated `value` variable.'
