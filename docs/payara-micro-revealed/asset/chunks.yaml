    ### 禁用请求追踪


    我们可以通过简单地使用 `@Traced(false)` 注解来禁用任何 Web 服务端点的追踪，例如，在 `EmployeeResource` 的 `hireEmployee()`
    方法中：


    ```

    @Traced(false)

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee)

    throws InterruptedException {

    //模拟慢速处理

    Thread.sleep(100);

    employeeList.add(employee);

    employeeEvent.fire(employee);

    }

    ```


    ### 自定义操作名称


    默认情况下，跨度中生成的操作名称是被调用方法的完全限定名（如果该方法是作为 HTTP 请求的直接结果被调用的，则方法名称前会加上 HTTP 请求类型（PUT、GET、POST
    等））。


    如果我们希望自定义跨度上显示的操作名称，可以通过设置 `@Traced` 注解上的 `operationName` 属性来实现；例如，在 `EmployeeResource`
    的 `hireEmployee()` 方法中，我们可以这样做：


    ```

    @Traced(operationName = "employeeHire")

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee)

    throws InterruptedException {

    //模拟慢速处理

    Thread.sleep(100);

    employeeList.add(employee);

    employeeEvent.fire(employee);

    }

    ```


    这将导致 Payara Micro 控制台中输出以下内容（为简洁起见，仅显示相关跨度）：


    ```

    {"operationName":"employeeHire","spanContext":{"spanId":"7647b911-4999-48ad-9c7b-a4eb87629a89","traceId":"1d50764c-848c-4f59-aa7e-902df1813fd8"},"startTime":"2021-11-12T15:31:21.145-05:00[America/New_York]","endTime":"2021-11-12T15:31:21.352779-05:00[America/New_York]","traceDuration":"207775000","spanTags":[{"http.status_code":
