    \ REST 客户端 API，客户端服务向前述服务发送了三个 HTTP PUT 请求，生成了三个相关的 HTTP 请求。\n\n```\npackage com.ensode.requesttracing.client;\n\
    //imports omitted\n@ApplicationScoped\n@Path(\"employeeclient\")\npublic class\
    \ EmployeeClientResource {\n@Inject\n@RestClient\nprivate EmployeeResourceClient\
    \ employeeResourceClient;\nprivate List employeesToHire;\n@PostConstruct\npublic\
