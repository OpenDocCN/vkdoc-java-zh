- fmt: '# Retrying Execution in Case of Failure


    We can use the `@Retry` annotation to automatically retry an endpoint invocation
    that fails, as illustrated in the following example:


    ```

    package com.ensode.faulttolerance;

    //imports omitted

    @RequestScoped

    @Path("faulttoleranceexample")

    public class FaulToleranceExampleResource {

    private static final Logger LOGGER = Logger.getLogger

    (FaulToleranceExampleResource.class.getName());

    @Inject

    private EndpointSuccessDeterminator endpointSuccessDeterminator;

    @Retry

    @GET

    @Produces(MediaType.TEXT_PLAIN)

    @Path("retry")

    public String retryExample() {

    LOGGER.log(Level.INFO, "retryExample() invoked");

    boolean success;

    success = endpointSuccessDeterminator.

    allowEndpointToSucceed();

    if (!success) {

    LOGGER.log(

    Level.SEVERE, "retryExample() invocation failed");

    throw new RuntimeException(

    "forcing a failure for demo purposes");

    } else {

    LOGGER.log(Level.INFO,

    "retryExample() invocation succeeded");

    return "Call succeeded\n";

    }

    }

    }

    ```


    In our example, we are using an application scoped CDI bean to force our endpoint
    to fail every other invocation; the bean simply returns a `boolean` value and
    flips the value of the `boolean` after each invocation.


    ```

    package com.ensode.faulttolerance;

    import javax.enterprise.context.ApplicationScoped;

    @ApplicationScoped

    public class EndpointSuccessDeterminator {

    private boolean successIndicator = true;

    public boolean allowEndpointToSucceed() {

    successIndicator = !successIndicator;

    return successIndicator;

    }

    }

    ```


    We use this bean in our endpoint to force a failure so that we can demonstrate
    the `@Retry` annotation in action.


    If we send an HTTP GET request to our endpoint, nothing looks out of the ordinary.


    ```

    $ curl http://localhost:8080/faulttolerance/webresources/faulttoleranceexample/retry

    Call succeeded

    ```


    However, if we look at the Payara Micro output, we can see that the first invocation
    failed, it was automatically retried, and the second invocation succeeded.


    ```

    [2021-10-21T14:25:22.034-0400] [] [INFO] [] [com.ensode.faulttolerance.FaulToleranceExampleResource]
    [tid: _ThreadID=78 _ThreadName=http-thread-pool::http-listener(2)] [timeMillis:
    1634840722034] [levelValue: 800] retryExample() invoked

    [2021-10-21T14:25:22.035-0400] [] [SEVERE] [] [com.ensode.faulttolerance.FaulToleranceExampleResource]
    [tid: _ThreadID=78 _ThreadName=http-thread-pool::http-listener(2)] [timeMillis:
    1634840722035] [levelValue: 1000] retryExample() invocation failed

    [2021-10-21T14:25:22.130-0400] [] [INFO] [] [com.ensode.faulttolerance.FaulToleranceExampleResource]
    [tid: _ThreadID=78 _ThreadName=http-thread-pool::http-listener(2)] [timeMillis:
    1634840722130] [levelValue: 800] retryExample() invoked

    [2021-10-21T14:25:22.131-0400] [] [INFO] [] [com.ensode.faulttolerance.FaulToleranceExampleResource]
    [tid: _ThreadID=78 _ThreadName=http-thread-pool::http-listener(2)] [timeMillis:
    1634840722131] [levelValue: 800] retryExample() invocation succeeded

    ```


    The `@Retry` annotation provides a few attributes we can use to control things
    like how long to retry, how many times to retry, etc. Table [7-1](#519485_1_En_7_Chapter.xhtml#Tab1)
    lists all attributes for `@Retry`.


    **Table 7-1** `@Retry` Annotation Attributes


    | Attribute | Description | Default |

    | --- | --- | --- |

    | `abortOn` | An array of `Throwable` types that should not trigger a retry |
    |

    | `delay` | The delay between retries | 0 |

    | `delayUnit` | The unit of time for the `delay` attribute | `ChronoUnit.MILLIS`
    (milliseconds) |

    | `durationUnit` | The unit of time for the `maxDuration` attribute | `ChronoUnit.MILLIS`
    (milliseconds) |

    | `jitter` | Used to randomly vary retry delays. Actual delay will be [delay -
    jitter, delay + jitter] | 200 |

    | `jitterDelayUnit` | The unit of time for the `jitter` attribute | `ChronoUnit.MILLIS`
    (milliseconds) |

    | `maxDuration` | Specifies how long to retry for | 180000 (when combined with
    the default `durationUnit` of milliseconds, this is equivalent to three minutes)
    |

    | `maxRetries` | The maximum number of times to retry, a value of -1 indicates
    no maximum (retry forever) | 3 |

    | `retryOn` | An array of `Throwable` types that should trigger a retry | `java.lang.Exception`
    |


    ## Defining a Maximum Duration for Execution


    MicroProfile Fault Tolerance provides a `@Timeout` annotation we can use to specify
    the maximum time to allow a RESTful web service endpoint to execute. If the method
    takes longer than the specified amount of time, a `TimeoutException` is thrown.


    The following example illustrates how to use the `@Timeout` annotation:


    ```

    package com.ensode.faulttolerance;

    //imports omitted

    @RequestScoped

    @Path("faulttoleranceexample")

    public class FaulToleranceExampleResource {

    private static final Logger LOGGER = Logger.getLogger(FaulToleranceExampleResource.class.getName());

    @Timeout(value = 3, unit = ChronoUnit.SECONDS)

    @GET

    @Produces(MediaType.TEXT_PLAIN)

    @Path("timeout")

    public String timeoutExample(@QueryParam("delay") long delay) {

    try {

    TimeUnit.SECONDS.sleep(delay);

    } catch (InterruptedException ex) {

    LOGGER.log(Level.INFO, "sleep() interrupted");

    }

    return "Call returned successfully\n";

    }

    }

    ```


    In our example, we are specifying that our RESTful web service endpoint should
    not take more than three seconds to execute, as can be seen in the example, how
    long to wait before a timeout is specified by combining the `value` and `unit`
    attributes of `@Timeout`, with the former containing a `long` value and the latter
    containing the unit of time. Default values for `value` and `unit` are `1000L`
    and `ChronoUnit.MILLIS` (milliseconds), for a default timeout value of one second.
    In our example, we are simply suspending execution for the amount of seconds received
    as a query parameter; this way, we can force the endpoint to time out so that
    we can see it in action.


    If we pass a value of `4` as a query parameter to our endpoint, we can see the
    `@Timeout` annotation in action.


    ```

    $ curl -i  http://localhost:8080/faulttolerance/webresources/faulttoleranceexample/timeout?delay=4

    HTTP/1.1 500 Internal Server Error

    Content-Language:

    Content-Type: text/html

    Connection: close

    Content-Length: 1494

    X-Frame-Options: SAMEORIGIN

    Payara Micro #badassfish - Error report HTTP Status 500 - Internal Server Errortype
    Exception reportmessageInternal Server ErrordescriptionThe server encountered
    an internal error that prevented it from fulfilling this request.exception javax.servlet.ServletException:
    org.eclipse.microprofile.faulttolerance.exceptions.TimeoutExceptionroot cause
    org.eclipse.microprofile.faulttolerance.exceptions.TimeoutExceptionnote The full
    stack traces of the exception and its root causes are available in the Payara
    Micro #badassfish logs.Payara Micro #badassfish

    ```


    As we can see from the output of the `curl` command, we receive an HTTP error
    500; the response body we receive is automatically generated by Payara Micro;
    by examining the output, we can see that a `TimeoutException` was thrown; this
    is the expected behavior since the endpoint took longer than the specified timeout
    of three seconds.


    If the method takes less than the specified timeout value (three seconds, in our
    example), then the method executes normally.


    ```

    $ curl -i  http://localhost:8080/faulttolerance/webresources/faulttoleranceexample/timeout?delay=2

    HTTP/1.1 200 OK

    Server: Payara Micro #badassfish

    Content-Type: text/plain

    Content-Length: 27

    X-Frame-Options: SAMEORIGIN

    Call returned successfully

    ```'
