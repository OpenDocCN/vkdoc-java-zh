    With a little help of the Concurrency Utilities API, we spawn four threads, each
    of which invokes the endpoint on our service annotated with `@Bulkhead` annotation.
    Since we specified a maximum of three concurrent invocations, the last invocation
    will fail with a `@BulkheadException`, as expected.


    Typically, there would be multiple concurrent clients making concurrent requests
