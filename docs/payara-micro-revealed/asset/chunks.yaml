- fmt: '# Dependency Injection


    As previously mentioned, we can turn almost any plain old Java object (POJO) into
    a CDI bean by annotating it with one of the CDI scope annotations.


    The following class is an application scoped CDI bean:


    ```

    package com.ensode.dependencyinjection;

    //imports omitted

    @ApplicationScoped

    public class CountryLookup {

    private List countryList;

    private Map countryMap;

    @PostConstruct

    public void init() {

    countryList = new ArrayList();

    countryMap = new HashMap();

    countryList.add(new Country("AU", "AUSTRALIA"));

    countryList.add(new Country("UK", "United Kingdom"));

    countryList.add(new Country("IN", "India"));

    countryList.add(new Country("US", "United States"));

    countryList.add(new Country("MX", "Mexico"));

    countryList.add(new Country("EG", "Egypt"));

    countryList.forEach(c -> countryMap.put(

    c.getAbbreviation(), c));

    }

    public Country getCountry(String countryAbbrev) {

    return countryMap.get(countryAbbrev);

    }

    }

    ```


    All we had to do to turn the class into a CDI bean was to annotate it with `@ApplicationScoped`;
    recall from our previous discussion that application scoped CDI beans live throughout
    the lifetime of our application, they are initialized when the application starts
    (or, more likely, lazily the first time they are used), and they are destroyed
    when we undeploy our application or shut down Payara Micro (or whichever MicroProfile
    implementation we may be using).


    Application scoped CDI beans are frequently used to cache data that may not change
    frequently; this is done for performance purposes to avoid hitting the database
    every time the data is needed.


    Our application scoped managed bean has a `public void init()` method annotated
    with `@PostConstruct`; this annotation causes the method to be invoked automatically
    when the bean is constructed by CDI. In our example, the `init()` method initializes
    the data to be cached. In a production application, our `init()` method would
    probably retrieve the data from a database; in our simple example, we are simply
    initializing our data in place.


    Our `init()` method creates a `HashMap` in which the keys are of type `String`;
    they represent a country abbreviation; the values are instances of a class called
    `Country`, which contains two properties: the country abbreviation and the full
    name of the country.


    The `Country` class is so simple that we will not show its source; refer to the
    code download for this book for the complete source code for our example application.


    Our application scoped bean also provides a method called `getCountry()` that
    takes a `String` containing the country abbreviation and returns the corresponding
    instance of the `Country` class.


    Since our `CodeLookup` class is a CDI bean, it can be injected not only into other
    CDI beans but also to any class managed by Payara Micro. Classes annotated with
    the `@Path` annotation are managed by the runtime; therefore, CDI beans can be
    injected into them. The following RESTful web service leverages the `CodeLookup`
    class to look up country objects from their abbreviation:


    ```

    package com.ensode.dependencyinjection;

    //imports omitted

    @Path("cdiservice")

    public class CdiService {

    @Inject

    private CountryLookup countryLookup;

    private static final Logger LOGGER = Logger.getLogger(CdiService.class.getName());

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public Country handleGetRequest(

    @QueryParam("countryAbbrev") String countryAbbrev) {

    return countryLookup.getCountry(countryAbbrev);

    }

    }

    ```


    Notice that our RESTful web service is not a CDI bean, but since its life cycle
    is managed by the MicroProfile runtime, we can inject CDI beans into it. In our
    example, we inject an instance of the `CountryLookup` class discussed previously.
    We then implement a method that responds to HTTP GET requests by annotating the
    method with the `@GET` annotation; we have the method accept a query parameter
    called `countryAbbrev`, which we achieve by annotating the sole method argument
    with the `@QueryParam` annotation. Our method body simply invokes the `getCountry()`
    method we implemented in our application scoped bean, passing the abbreviation
    it received as a parameter; since we annotated the method with the `@Produces`
    annotation indicating that the method returns data in JSON format, the `Country`
    instance returned by the method is automatically converted to a JSON string, which
    is then returned as the body of the response sent to the client.


    We run our service as usual via the Payara Micro Maven plug-in; then we can invoke
    our endpoint, with the most straightforward way being the `curl` command-line
    utility.


    ```

    curl http://localhost:8080/dependency-injection/webresources/cdiservice?countryAbbrev=AU

    ```


    We should immediately see the output of our RESTful web service invocation on
    the console, which, unsurprisingly, is a JSON representation of the instance of
    the `Country` class returned by our method.


    ```

    {"abbreviation":"AU","name":"AUSTRALIA"}

    ```


    We have just finished covering the two CDI features that give the API its name;
    scope annotations are the “Contexts” in “Contexts and Dependency Injection”; the
    `@Inject` annotation provides the “Dependency Injection” part of CDI. Another
    CDI feature is an event mechanism, which allows us to implement loosely coupled
    applications.


    ## CDI Events


    CDI events allow us to loosely couple different parts of our application. One
    of our classes may fire an event, which is then handled by one or more event listeners.
    The class firing the event has no knowledge about the listeners; it just fires
    the event and CDI takes over, invoking listener methods on all event listeners.


    ### Firing Events


    CDI provides the `Event` class, which is used to fire events; this class uses
    generics to indicate the event type. The type can be any valid Java type; it could
    be an instance of `java.lang.String`, for example, or any plain old Java object
    (POJO). The following example illustrates how to fire a CDI event:


    ```

    package com.ensode.cdievents;

    //imports omitted

    @Path("countryservice")

    public class CountryService {

    @Inject

    Event countryEvent;

    @Inject

    private CountryLookup countryLookup;

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public Country handleGetRequest(@QueryParam("countryAbbrev") String countryAbbrev)
    {

    return countryLookup.getCountry(countryAbbrev);

    }

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void updateCountry(Country country) {

    countryEvent.fire(country);

    }

    }

    ```


    A class that needs to fire a CDI event needs to have an instance of the CDI provided
    `Event` class injected into it; we inject this dependency via the `@Inject` annotation
    as usual. The parameterized type of the `Event` class indicates the type of event
    being fired. In this case, we are using a simple plain old Java object representing
    a country; this `Country` class has two properties: country abbreviation and country
    full name.


    To actually fire the event, we invoke the `fire()` method on the injected instance
    of the `Event` class; this method takes an instance of the generic type indicated
    in the declaration of our event (an instance of our `Country` class, in our case).


    Notice in our example code, there is no reference whatsoever to the listeners
    for the event. Our RESTful web service has no information about the listeners
    at all; it doesn’t know what classes listen for this event, or how many listeners
    there are, or anything else; it simply fires the event and CDI takes over.'
