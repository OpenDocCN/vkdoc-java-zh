    ## MicroProfile REST 客户端 API 概述


    MicroProfile REST 客户端 API 让开发 RESTful Web 服务客户端变得非常简单，尤其是在我们为使用 Jakarta RESTful
    Web 服务（详见第 2 章）开发的 RESTful Web 服务开发客户端时。


    本质上，一个 MicroProfile RESTful Web 服务客户端由一个单独的 Java 接口组成，该接口的方法签名与对应的 RESTful Web
    服务方法签名相匹配（即相同的方法名和参数）。


    在类级别上，MicroProfile REST 客户端接口使用 `@Path` 注解；其值参数必须与服务上对应的 `@Path` 注解相匹配。


    MicroProfile REST 客户端接口上的每个抽象方法必须具有与服务器上对应方法相同的注解（`@Path`、`@PUT`、`@Consumes`、`@Produces`
    等）。


    在实践中，开发 MicroProfile REST 客户端最简单的方法是复制服务的源代码，将类改为接口，并删除所有方法体。此时，我们“开发”RESTful
    Web 客户端的工作已经完成了 95%。


    一旦我们有了与服务匹配的接口，就需要在接口级别添加 `@RegisterRestClient` 注解；该注解表明该接口是一个 RESTful Web 服务客户端。


    一个典型的 RESTful Web 服务客户端接口如下所示：


    ```

    package com.ensode.jsonparsingclient;

    //导入省略

    @RegisterRestClient

    @Path("messageprocessor")

    public interface MessageProcessorClient {

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    public Message processMessage(Message message);

    }

    ```


    这个示例是上一章“解析 JSON 数据”部分中我们开发的服务对应的 RESTful Web 服务客户端。请注意，所有注解都与服务源代码中的对应注解相匹配。


    请注意，我们不会（也不应该）为 RESTful Web 服务客户端接口编写实现；实现是在运行时由 Payara Micro（或任何符合 MicroProfile
    规范的运行时）生成的。如果我们不为 RESTful Web 服务客户端编写实现，那么如何指定我们正在交互的服务的 URI 呢？答案在于 MicroProfile
    Config API。


    我们将在本书后面详细介绍 MicroProfile API；现在，我们只介绍指定我们正在交互的服务 URI 所必需的内容。


    为了指定我们服务的 URI，我们需要创建一个名为 *microprofile-config.properties* 的文件，并将其放在 WAR 文件根目录下的
    META-INF 目录中。如果使用 Maven，则必须将此文件放在 *src/resources/META-INF* 下；构建时，Maven 会将其放置在
    WAR 文件中的正确位置。


    在我们的应用程序中，每个 RESTful Web 服务客户端需要一个属性；属性名称必须遵循以下格式：


    *<RESTful 客户端接口的完全限定名>/mp-rest/url*


    在我们的示例中，属性名称将是：


    *com.ensode.jsonparsingclient.MessageProcessorClient/mp-rest/url*


    该属性的值必须与服务的 URI 匹配，包括在 Application 类中定义的根 URL；在我们的示例中，服务的 URI 是：


    *http://localhost:8080/webresources*


    因此，microprofile-config 属性文件中的名称/值对如下所示：


    ```

    com.ensode.jsonparsingclient.MessageProcessorClient/mp-rest/url=http://localhost:8080/webresources

    ```


    本节描述了使用 MicroProfile REST 客户端 API 开发 RESTful Web 服务客户端所需遵循的一般模式。接下来，我们将介绍每种 HTTP
    请求类型、路径和查询参数，以及在请求正文中向服务传递数据的具体细节。


    要使用我们的 REST 客户端接口，我们需要通过 CDI 的 `@Inject` 注解以及 MicroProfile REST 客户端 API 提供的 `@RestClient`
    注解，将其注入到另一个工件（通常是针对 Jakarta RESTful Web 服务 API 开发的 RESTful Web 服务）中。


    ```

    @ApplicationScoped

    public class MessageProcessorRestClient {

    private static final Logger LOGGER = Logger.getLogger(MessageProcessorRestClient.class.getName());

    @Inject

    @RestClient

    private MessageProcessorClient messageProcessorClient;

    public void init(@Observes @Initialized(ApplicationScoped.class)

    Object object) {

    Message message = new Message();

    Message returnedMessage;

    message.setMsgText(

    "来自 MicroProfile REST 客户端的问候！");

    returnedMessage =

    messageProcessorClient.processMessage(message);

    LOGGER.log(Level.INFO, String.format(

    "服务器返回了以下消息：%s",

    returnedMessage.getMsgText()));

    }

    }

    ```


    在这个示例中，我们使用了一个 Jakarta 上下文和依赖注入（CDI）技巧，在应用程序初始化时执行代码。


    请注意 `init()` 方法的对象参数上的 `@Observes @Initialized(ApplicationScoped.class)` 注解；这些注解会导致运行时在
    CDI 应用程序作用域初始化时执行 `init()` 方法，而这恰好与应用程序完全部署的时间点一致。这个技巧允许我们在应用程序初始化时运行任意 Java 代码，结合从命令行启动
    MicroProfile 应用程序的能力，这个技巧使我们能够为 RESTful Web 服务编写简单的命令行测试客户端。


    CDI 将在本书后面详细介绍。


    我们刚刚描述了使用 MicroProfile REST 客户端 API 开发 REST 客户端应用程序的一般模式；在接下来的章节中，我们将深入探讨一些具体细节。

