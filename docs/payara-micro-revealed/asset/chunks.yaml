- fmt: '# Customizing Documentation for Operations


    By default, each endpoint on our RESTful web services is given an operation ID
    matching its method name; this is how the `operationID` fields for the documentation
    on how the endpoint responds to HTTP GET, PUT, and DELETE requests were generated
    in our example.


    If we want to override the generated `operationID`, we can do so with the `@Operation`
    annotation; this annotation also allows us to provide summary and detailed descriptions
    of our operations, as illustrated in the following example:


    ```

    @GET

    @Operation(operationId = "Find Employee",

    summary = "Finds an employee",

    description = "Finds an employee from the given employee ID, returns an HTTP code
    404 if the employee is not found")

    @APIResponse(responseCode = "200",

    description = "Employee found",

    content = @Content(mediaType = APPLICATION_JSON, schema =

    @Schema(implementation = Employee.class)))

    @APIResponse(responseCode = "404",

    description = "Employee not found ")

    public Employee findEmployee(@QueryParam("employeeId") Integer employeeID) {

    Optional employeeToFind =

    employeeList.stream().filter(emp →

    emp.getEmployeeId().equals(employeeID)).findFirst();

    return employeeToFind.orElseThrow(

    () -> new NotFoundException());

    }

    ```


    The `operationID` attribute of the `@Operation` annotation overrides the generated
    `operationId` in the documentation. The `summary` and `description` attributes
    provide brief and detailed descriptions of the operation, respectively.


    Figure [10-5](#519485_1_En_10_Chapter.xhtml#Fig5) illustrates the updated documentation
    for the operation.


    ![](images/519485_1_En_10_Chapter/519485_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Custom operation ID


    Notice the updated `operationID`, as well as the new `summary` and `description`
    fields that were generated as a result of the `@Operation` annotation.


    # Customizing Documentation for Path or Query Parameters


    Path or query parameters are annotated with `@PathParam` or `@QueryParam`. OpenAPI
    generates default documentation for either parameter type; if we wish, we can
    add additional information about our parameters to the generated documentation;
    we can do this via the `@Parameter` annotation, as illustrated in the following
    example:


    ```

    @GET

    @Operation(operationId = "Find Employee",

    summary = "Finds an employee",

    description = "Finds an employee from the given employee ID, returns an HTTP code
    404 if the employee is not found")

    @APIResponse(responseCode = "200",

    description = "Employee found",

    content = @Content(mediaType = APPLICATION_JSON, schema =

    @Schema(implementation = Employee.class)))

    @APIResponse(responseCode = "404",

    description = "Employee not found ")

    public Employee findEmployee(@QueryParam("employeeId")

    @Parameter(description = "Employee ID", required = true)

    Integer employeeID) {

    Optional employeeToFind =

    employeeList.stream().filter(emp →

    emp.getEmployeeId().equals(employeeID)).findFirst();

    return employeeToFind.orElseThrow(

    () -> new NotFoundException());

    }

    ```


    In this example, we are adding a description to our `employeeID` query parameter,
    as well as specifying that the parameter is required. Figure [10-6](#519485_1_En_10_Chapter.xhtml#Fig6)
    illustrates the relevant parts of the updated documentation.


    ![](images/519485_1_En_10_Chapter/519485_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Custom parameter documentation


    Notice that the `employeeID` parameter in the documentation now has a description
    and is documented as being required, both as a result of the `@Parameter` annotation
    added to our query parameter.


    # Configuring OpenAPI


    OpenAPI can be configured via the MicroProfile Config API via standard configuration
    properties that must be supported by every MicroProfile implementation. Additionally,
    Payara Micro provides additional configuration options via pre or post boot command
    files.


    ## Configuring OpenAPI via MicroProfile Config


    OpenAPI provides a number of properties that can be used to customize its behavior;
    these properties can be set in any source supported by MicroProfile Config (`microprofile-config.properties`,
    environment variables, system properties, etc.).


    Table [10-1](#519485_1_En_10_Chapter.xhtml#Tab1) summarizes all properties that
    can be used to customize OpenAPI.


    Table 10-1


    OpenAPI MicroProfile Config Properties


    | Property | Description |

    | --- | --- |

    | `mp.openapi.model.reader` | Fully qualified name of an implementation of the
    `OASModelReader` interface, which can be used to programmatically create or augment
    the documentation |

    | `mp.openapi.filter` | Fully qualified name of an implementation of the `OASFilter`
    interface, which can be used to implement callbacks to be executed when OpenAPI
    annotations are processed |

    | `mp.openapi.scan.disable` | Used to disable documentation generation |

    | `mp.openapi.scan.packages` | Used to specify which packages to scan when procession
    OpenAPI annotations |

    | `mp.openapi.scan.classes` | Used to specify which classes to scan when processing
    OpenAPI annotations |

    | `mp.openapi.scan.exclude.packages` | Used to specify which packages to exclude
    when processing OpenAPI annotations |

    | `mp.openapi.scan.exclude.classes` | Used to specify which classes to exclude
    when processing OpenAPI annotations |

    | `mp.openapi.scan.lib` | Used to specify if classes in JAR files inside the WAR
    file should be scanned for OpenAPI annotations |

    | `mp.openapi.servers` | Used to specify a list of global servers that provide
    connectivity information |

    | `mp.openapi.servers.path.` | Prefix of a property used to specify an alternative
    list of servers to service all operations in a path. For example, `mp.openapi.servers.path./employeemanagement=[https://example.com/v1](https://example.com/v1)`
    |

    | `mp.openapi.servers.operation.` | Prefix of a property used to specify an alternative
    list of servers to service an operation. The remainder of the property name must
    be the `operationId` of the endpoint in question. For example, `mp.openapi.servers.operation.hireEmployee=[https://example.com/v1](https://example.com/v1)`
    |

    | `mp.openapi.schema.` | Prefix of a property to specify a schema for a specific
    Java class, in JSON format. The remainder of the property name must be a fully
    qualified Java class name. The value must be a valid OpenAPI schema object, specified
    in JSON format |


    ## Configuring OpenAPI via a Payara Micro Command File


    We can configure OpenAPI in Payara Micro via the `set-openapi-configuration` asadmin
    command via a command file passed as a post boot command file or similar.


    ### Disabling OpenAPI


    Payara Micro enables OpenAPI by default; if we wish to disable it, we can use
    the following asadmin command:


    ```

    set-openapi-configuration --enabled=false

    ```


    ### Enabling CORS Headers


    Cross-Origin Resource Sharing (CORS) headers can be added to OpenAPI endpoint
    responses by issuing the following asadmin command:


    ```

    set-openapi-configuration --corsheaders=true

    ```


    ### Securing OpenAPI


    By default, the `/openapi` endpoint is unsecured, meaning any random unauthenticated
    user can access it.


    If we wish to secure it, we can do so by issuing the following asadmin command:


    ```

    set-openapi-configuration --securityenabled=true

    ```


    When securing the `/openapi` endpoint, we can specify which roles have access
    to it as follows:


    ```

    set-openapi-configuration --roles=role1,role2

    ```


    The value of the `--roles` argument is a comma-separated list of roles allowed
    to access the health endpoint.


    ### Customizing the OpenAPI Endpoint


    By default, documentation can be retrieved via the `/openapi` endpoint. We can
    use a different endpoint if we wish.


    ```

    set-openapi-configuration --endpoint=foo

    ```


    The value of the `--endpoint` argument is the context root of our custom OpenAPI
    endpoint.'
