- fmt: '# Customizing Request Tracing


    As seen in the previous section, by simply enabling request tracing and specifying
    a threshold, we get a lot of functionality, which will suffice for most cases.
    However, we can customize request tracing if the default functionality does not
    fit our needs.


    The MicroProfile OpenTracing API includes a `@Traced` annotation that allows us
    to trace methods other than webservice endpoints; it also allows us to disable
    tracing for any method and to customize the operation name.


    We can also further customize request tracing output via the `Tracer` annotation,
    which can be used to add additional information to spans, as well as to create
    additional spans not bound to a method.


    ## Tracing Additional Methods


    We can trace any method on a CDI bean by decorating it with the `@Traced` annotation.


    Annotating a CDI bean with `@Traced` at the class level will result in all methods
    in the bean being traced.


    For example, let''s say our `EmployeeResource` service fired a CDI event every
    time we hired an employee; we could have the method observing the event be traced
    by annotating it with `@Traced`.


    ```

    package com.ensode.requesttracing;

    //imports omitted

    @ApplicationScoped

    public class EmployeeEventHandler {

    private static final Logger LOGGER =

    Logger.getLogger(EmployeeEventHandler.class.getName());

    @Traced

    public void handleEmployeeEvent(@Observes Employee employee)

    LOGGER.log(Level.INFO,

    String.format("Hired %s %s",

    employee.getFirstName(), employee.getLastName()));

    }

    }

    ```


    The `@Traced` annotation would add a new span to the generated trace.


    ```

