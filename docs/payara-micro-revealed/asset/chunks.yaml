  raw: '## MicroProfile


    Just like Java EE before it, MicroProfile is a specification (a piece of paper,
    if you will), with multiple implementations. MicroProfile provides specifications
    for APIs commonly needed when deploying to the cloud, such as application configuration,
    health checks, request tracing, metrics, fault tolerance, documentation, and security.


    MicroProfile also shares some APIs with Jakarta EE (the successor to Java EE;
    see the next section), namely, Jakarta RESTful Web Services (formerly known as
    JAX-RS), Jakarta Contexts and Dependency Injection (CDI), Jakarta JSON Binding,
    and Jakarta JSON Processing.


    Jakarta RESTful Web Services, unsurprisingly, is an API used to develop RESTful
    web services. Developing RESTful web services with this API is very simple, with
    most of the work done by adding a few simple annotations.


    Jakarta Contexts and Dependency Injection (CDI) is an API that facilitates injecting
    dependencies into application code. It also provides scopes (such as request,
    session, application, and so on) to Java Beans managed by CDI.


    Jakarta JSON Binding and JSON Processing APIs are used when working with data
    in JavaScript Object Notation (JSON) format, which is by far the most common format
    used when working with microservices and web services. Jakarta JSON Binding is
    a high-level API that does a lot of work behind the scenes, while Jakarta JSON
    Processing is a lower-level API that provides more control for application developers.


    ## Jakarta EE


    In 2017, Oracle donated Java EE to the Eclipse Foundation; at this point in time,
    the technology was renamed to Jakarta EE. With the donation to the Eclipse Foundation,
    there was no longer any single entity controlling the standard; instead, several
    equal partner companies contribute equally to it; even individual contributors
    not affiliated with any Jakarta EE vendor can join the foundation and contribute
    to the standard.


    Although the lines have blurred in recent years, Jakarta EE is primarily thought
    of as a specification for traditional on-site application deployments using monolithic
    application servers. MicroProfile, on the other hand, is thought of as a specification
    meant for lightweight cloud deployments.


    Although cloud deployment has become very popular in recent years, it isn’t a
    panacea; it doesn’t always make sense to develop applications for the cloud.


    Additionally, there are several applications developed in the days before cloud
    deployments became popular, which would be too costly or impractical to migrate
    to a new architecture.


    Most popular Jakarta EE implementations provide a lightweight version of their
    offerings (i.e., Payara Micro), making the task of migrating Jakarta EE applications
    to the cloud easier and even easing the task of developing new Jakarta EE`–`compliant
    applications specifically for the cloud.


    ## Payara


    Payara started as a fork of GlassFish application server. For readers not aware,
    GlassFish used to be an open source Java EE implementation from Oracle (and Sun
    Microsystems before them). GlassFish used to be the Java EE reference implementation.
    For many years, commercial support was available for GlassFish; however, at some
    point, support was dropped, although GlassFish was still freely available for
    download.


    Many organizations require support contracts for any software they utilize in
    production; GlassFish commercial support being dropped left many companies scrambling
    looking for a replacement.


    C2B2 Consulting, a UK-based company, saw an opportunity and created Payara as
    a fork of GlassFish. Being based on GlassFish, it was seamless to transition applications
    developed for GlassFish to Payara.


    C2B2 Consulting has been maintaining Payara and adding additional features not
    originally available in GlassFish, including splitting Payara into two editions:
    “Payara Server,” which is a traditional Jakarta EE application server, and “Payara
    Micro,” which is meant to be deployed to a cloud environment.


    Payara is fully open source; under the Common Development and Distribution License
    (CDDL) Version 1.1, commercial support is available for those that need it.


    In this book, we will focus on Payara Micro, with an emphasis on Payara’s implementation
    of MicroProfile APIs.


    # 2. Developing Microservices Using Payara Micro


    Microservices are nothing but RESTful web services; they typically perform a single
    task; as such, their code bases tend to be small. In a microservices architecture,
    applications are composed of several different microservices communicating with
    one another.


    Payara Micro is a MicroProfile-compliant runtime; as such, applications deployed
    with Payara Micro must conform to the MicroProfile specification. MicroProfile
    uses the Jakarta RESTful Web Services API for RESTful web services deployment.
    In this chapter, we will see how to develop RESTful web services using said API
    and execute them against Payara Micro.


    ## Setting Up Your Environment


    Payara provides a Maven plug-in that makes working with Payara Micro projects
    easier. In this section, we will discuss how to set up Maven projects for Payara
    Micro applications.


    NetBeans IDE can create a Payara Micro project out of the box with all necessary
    configuration in place.


    ### Payara Micro Maven Plug-in


    To add the Payara Micro Maven plug-in to your project, add it to the `<plugins>`
    section of your *pom.xml* as illustrated in the following example.


    ```


    fish.payara.maven.plugins

    payara-micro-maven-plugin

    1.4.0


    5.2021.5

    false


    --autoBindHttp


    --deploy


    ${project.build.directory}/${project.build.finalName}


    /


    ```


    Under the `<configuration>` section, we can set several configuration options
    used when running our application in Payara Micro.


    Maven automatically downloads the Payara Micro version we specify in the `<payaraVersion>`
    tag.


    We can specify if we want to automatically deploy the project WAR file in the
    `<deployWar>` tag. Usually when developing an application, it makes sense to deploy
    the application as an exploded WAR file (more on that later); therefore, it is
    a good idea to set this value to `false`.


    We can specify command-line options to pass to Payara Micro in the `<commandLineOptions>`
    tag. Table [2-1](#519485_1_En_2_Chapter.xhtml#Tab1) lists the options that are
    available.


    Table 2-1


    Payara Micro Command-Line Options


    | Command-Line Option | Description |

    | --- | --- |

    | `autoBindHttp` | If set to true, Payara Micro will automatically find an available
    port and bind it as the HTTP port |

    | `deploy` | Specifies either an exploded or standard WAR file to Payara Micro.
    As illustrated in the example, it is a good idea to take advantage of Maven environment
    variables when deploying our project from Maven |

    | `port` | If `autoBindHttp` is set to false, used to specify the HTTP port to
    use |


    The complete list of command-line options for Payara Micro can be found at [*https://docs.payara.fish/community/docs/documentation/payara-micro/appendices/cmd-line-opts.html*](https://docs.payara.fish/community/docs/documentation/payara-micro/appendices/cmd-line-opts.html).


    Additionally, we can specify the context root of our application via the `<contextRoot>`
    tag. In a microservices application, there is typically only one RESTful web service
    per application; therefore, typically, we would use the root context (“/”) here.


    ### Payara BOM


    Maven Bill of Materials (BOM) are a special kind of POM used to keep dependencies
    in sync. Payara provides a BOM that provides all necessary dependencies for Payara
    Micro. In order to successfully build and deploy our code to Payara Micro, we
    need to include the Payara BOM in the `<dependencyManagement>` section of our
    *pom.xml* file. For example:


    ```


    fish.payara.api

    payara-bom

    ${version.payara}

    pom

    import


    ```'
  trans: '

    ## MicroProfile


    与之前的 Java EE 类似，MicroProfile 是一个规范（可以理解为一份文档），拥有多种实现。MicroProfile 为部署到云环境时常用的
    API 提供了规范，例如应用配置、健康检查、请求追踪、指标、容错、文档和安全。


    MicroProfile 还与 Jakarta EE（Java EE 的继任者，见下一节）共享一些 API，即 Jakarta RESTful Web 服务（原名
    JAX-RS）、Jakarta 上下文和依赖注入（CDI）、Jakarta JSON 绑定和 Jakarta JSON 处理。


    不出所料，Jakarta RESTful Web 服务是用于开发 RESTful Web 服务的 API。使用此 API 开发 RESTful Web 服务非常简单，大部分工作只需添加几个简单的注解即可完成。


    Jakarta 上下文和依赖注入（CDI）是一个用于将依赖注入到应用程序代码中的 API。它还为由 CDI 管理的 Java Bean 提供了作用域（例如请求、会话、应用等）。


    Jakarta JSON 绑定和 JSON 处理 API 用于处理 JavaScript 对象表示法（JSON）格式的数据，这是目前处理微服务和 Web 服务时最常用的格式。Jakarta
    JSON 绑定是一个高级 API，在后台完成大量工作，而 Jakarta JSON 处理是一个较低级别的 API，为应用程序开发人员提供了更多控制权。


    ## Jakarta EE


    2017 年，Oracle 将 Java EE 捐赠给了 Eclipse 基金会；此时，该技术更名为 Jakarta EE。随着捐赠给 Eclipse 基金会，不再有单一实体控制该标准；相反，几个平等的合作伙伴公司共同为其做出贡献；甚至与任何
    Jakarta EE 供应商无关的个人贡献者也可以加入基金会并为该标准做出贡献。


    尽管近年来界限变得模糊，但 Jakarta EE 主要被认为是使用单体应用服务器进行传统本地应用部署的规范。另一方面，MicroProfile 被认为是针对轻量级云部署的规范。


    尽管云部署近年来变得非常流行，但它并非万能药；并非所有应用都适合为云开发。


    此外，在云部署流行之前开发的许多应用程序，迁移到新架构的成本过高或不切实际。


    大多数流行的 Jakarta EE 实现都提供了其产品的轻量级版本（例如 Payara Micro），这使得将 Jakarta EE 应用程序迁移到云的任务变得更加容易，甚至简化了专门为云开发新的
    Jakarta EE 兼容应用程序的任务。


    ## Payara


    Payara 最初是 GlassFish 应用服务器的一个分支。对于不了解的读者，GlassFish 曾经是 Oracle（以及之前的 Sun Microsystems）的一个开源
    Java EE 实现。GlassFish 曾是 Java EE 的参考实现。多年来，GlassFish 一直提供商业支持；然而，在某个时间点，支持被停止了，尽管
    GlassFish 仍然可以免费下载。


    许多组织要求为他们生产环境中使用的任何软件提供支持合同；GlassFish 商业支持的停止让许多公司争相寻找替代品。


    总部位于英国的 C2B2 Consulting 看到了机会，并创建了 Payara 作为 GlassFish 的一个分支。由于基于 GlassFish，为
    GlassFish 开发的应用程序可以无缝迁移到 Payara。


    C2B2 Consulting 一直在维护 Payara 并添加 GlassFish 原本不具备的额外功能，包括将 Payara 分为两个版本：“Payara
    Server”，这是一个传统的 Jakarta EE 应用服务器，以及“Payara Micro”，旨在部署到云环境。


    Payara 是完全开源的；根据通用开发和分发许可证（CDDL）1.1 版，需要商业支持的用户可以获得。


    在本书中，我们将重点介绍 Payara Micro，并着重于 Payara 对 MicroProfile API 的实现。


    # 2. 使用 Payara Micro 开发微服务


    微服务本质上就是 RESTful Web 服务；它们通常执行单一任务；因此，它们的代码库往往很小。在微服务架构中，应用程序由多个相互通信的不同微服务组成。


    Payara Micro 是一个符合 MicroProfile 规范的运行时；因此，使用 Payara Micro 部署的应用程序必须符合 MicroProfile
    规范。MicroProfile 使用 Jakarta RESTful Web 服务 API 进行 RESTful Web 服务部署。在本章中，我们将了解如何使用该
    API 开发 RESTful Web 服务，并在 Payara Micro 上执行它们。


    ## 设置环境


    Payara 提供了一个 Maven 插件，可以更轻松地处理 Payara Micro 项目。在本节中，我们将讨论如何为 Payara Micro 应用程序设置
    Maven 项目。


    NetBeans IDE 可以直接创建一个 Payara Micro 项目，并包含所有必要的配置。


    ### Payara Micro Maven 插件


    要将 Payara Micro Maven 插件添加到您的项目中，请将其添加到 *pom.xml* 文件的 `<plugins>` 部分，如下例所示。


    ```


    fish.payara.maven.plugins

    payara-micro-maven-plugin

    1.4.0


    5.2021.5

    false


    --autoBindHttp


    --deploy


    ${project.build.directory}/${project.build.finalName}


    /


    ```


    在 `<configuration>` 部分，我们可以设置多个配置选项，用于在 Payara Micro 中运行我们的应用程序。


    Maven 会自动下载我们在 `<payaraVersion>` 标签中指定的 Payara Micro 版本。


    我们可以在 `<deployWar>` 标签中指定是否要自动部署项目 WAR 文件。通常在开发应用程序时，将应用程序部署为展开的 WAR 文件是有意义的（稍后会详细介绍）；因此，最好将此值设置为
    `false`。


    我们可以在 `<commandLineOptions>` 标签中指定要传递给 Payara Micro 的命令行选项。表 2-1 列出了可用的选项。


    表 2-1


    Payara Micro 命令行选项


    | 命令行选项 | 描述 |

    | --- | --- |

    | `autoBindHttp` | 如果设置为 true，Payara Micro 将自动查找可用端口并将其绑定为 HTTP 端口 |

    | `deploy` | 指定一个展开的或标准的 WAR 文件给 Payara Micro。如示例所示，在从 Maven 部署项目时，最好利用 Maven
    环境变量 |

    | `port` | 如果 `autoBindHttp` 设置为 false，用于指定要使用的 HTTP 端口 |


    Payara Micro 的完整命令行选项列表可在 [*https://docs.payara.fish/community/docs/documentation/payara-micro/appendices/cmd-line-opts.html*](https://docs.payara.fish/community/docs/documentation/payara-micro/appendices/cmd-line-opts.html)
    找到。


    此外，我们可以通过 `<contextRoot>` 标签指定应用程序的上下文根。在微服务应用程序中，每个应用程序通常只有一个 RESTful Web 服务；因此，通常我们会在这里使用根上下文（“/”）。


    ### Payara BOM


    Maven 物料清单（BOM）是一种特殊的 POM，用于保持依赖关系同步。Payara 提供了一个 BOM，其中包含了 Payara Micro 所需的所有依赖项。为了成功构建我们的代码并将其部署到
    Payara Micro，我们需要将 Payara BOM 包含在 *pom.xml* 文件的 `<dependencyManagement>` 部分。例如：


    ```


    fish.payara.api

    payara-bom

    ${version.payara}

    pom

    import


    ```

