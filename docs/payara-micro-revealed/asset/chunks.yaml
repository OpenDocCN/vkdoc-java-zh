    从 `curl` 命令的输出可以看出，我们收到了一个 HTTP 500 错误；返回的响应体是由 Payara Micro 自动生成的；通过检查输出，我们可以看到抛出了一个
    `TimeoutException`；这是预期的行为，因为端点执行时间超过了指定的三秒超时时间。


    如果方法执行时间小于指定的超时值（本例中为三秒），则方法正常执行。


    ```

    $ curl -i  http://localhost:8080/faulttolerance/webresources/faulttoleranceexample/timeout?delay=2

    HTTP/1.1 200 OK

    Server: Payara Micro #badassfish

    Content-Type: text/plain

    Content-Length: 27

    X-Frame-Options: SAMEORIGIN

    Call returned successfully

    ```

