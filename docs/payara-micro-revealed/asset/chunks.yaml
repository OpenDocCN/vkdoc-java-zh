    ## 总结


    在本章中，我们介绍了如何从 JAX-RS 注解自动生成 RESTful Web 服务的文档，从而确保文档与代码始终保持同步。


    接着，我们探讨了如何使用 OpenAPI 注解来自定义生成的文档。


    最后，我们学习了如何通过 MicroProfile Config 和 asadmin 命令来配置 OpenAPI。


    # 11. 使用 JSON Web 令牌进行安全认证


    传统上，Web 应用的安全性是通过在 HTTP 会话中存储已登录用户的数据来实现的。然而，由于微服务天生是无状态的，这种方法并不适用于微服务架构。为了解决安全问题，MicroProfile
    提供了对 JSON Web 令牌（JWT）的支持。


    JSON Web 令牌是一种用于在微服务中实现无状态安全机制的机制。


    JWT 是一种基于 JSON 的文本格式，用于在系统之间交换信息。JWT 是一个开放标准，在 RFC 7519 中进行了规定。JWT 的信息封装在*声明*中，这些声明本质上是键值对。MicroProfile
    要求 JWT 必须使用 RSA-SHA256 算法进行数字签名。


    JWT 可以包含任意声明，所有声明都是可选的；不过，MicroProfile JWT 规范要求包含特定的声明。


    | **JWT 声明** | **描述** |

    | --- | --- |

    | iss | 令牌签发者 |

    | at | 令牌签发时间，以长整型值表示，代表从 UTC 时间 1970 年 1 月 1 日到签发时间之间的秒数 |

    | exp | 令牌过期时间，以长整型值表示，代表从 UTC 时间 1970 年 1 月 1 日到过期时间之间的秒数 |

    | upn | 已登录主体的用户名 |


    除了必需的声明外，MicroProfile JWT 规范还建议 JWT 中包含以下声明：


    | **JWT 声明** | **描述** |

    | --- | --- |

    | jti | JWT 的唯一标识符 |

    | aud | 标识 JWT 的目标接收者，对受众值的解释因应用而异 |

    | groups | 用户所属的任何安全组（也称为角色） |


    ## 获取令牌


    JWT 通常从某种身份服务器获取；当部署到云端时，大多数云提供商都提供了一种获取 JWT 以在其服务器上使用的方法。如果在内部部署应用，JWT 通常通过内部部署的身份服务器工具获取，例如，像开源的
    Keycloak 工具，或者通过商业身份服务器（如 Okta 或类似产品）获取。


    出于测试和学习目的，这些工具有点大材小用；幸运的是，有一位多产的 Java 顾问 Adam Bien 开发了一个开源工具，名为 *jwtenizr*，我们可以用它来快速轻松地生成用于测试的
    JWT。


    可以从 [*http://jwtenizr.sh/*](http://jwtenizr.sh/) 下载 jwtenizr；它是一个自包含的可执行 JAR 文件；我们可以通过在命令行中执行以下命令来生成一个令牌：


    ```

    java -jar jwtenizr.jar

    ```


    上述命令将生成类似于以下的输出：


    ```

    使用 java -Dverbose -jar jwtenizr.jar [可选：为生成的 curl 提供 URI] 启用详细输出

    生成的令牌 token.jwt 包含从 jwt-token.json 加载的信息

    调整 groups[] 以配置角色，并在 jwt-token.json 中更改 upn 以更改主体，然后重新执行 JWTenizr

    jwt-token.json 中的 iss 必须与 microprofile-config.properties 中的 mp.jwt.verify.issuer
    对应

    将 microprofile-config.properties 复制到您的 WAR/src/main/resources/META-INF

    使用以下命令进行测试：

    curl -i -H''Authorization: Bearer eyJraWQiOiJqd3Qua2V5IiwidHlwIjoiSldUIiwiYWxnIjoiUlMyNTYifQ.eyJzdWIiOiJkdWtlIiwidXBuIjoiZHVrZSIsImF1dGhfdGltZSI6MTYzOTQwODk4NywiaXNzIjoiYWlyaGFja3MiLCJncm91cHMiOlsiY2hpZWYiLCJoYWNrZXIiXSwiZXhwIjoxNjM5NDA5OTg3LCJpYXQiOjE2Mzk0MDg5ODcsImp0aSI6IjQyIn0.GnSwzNSO7EfKRD-ANqYhaVQuY8HIRdp29r-8K3lqpjCb2bByRmkdqTl9HPW4ePfqe0K7wpr_1Nfir12CPSb9e4i1PWw-qZxf9pPpEIeLRVB-_8p_n6FaTCkt4uSB12fcBMaLh2PZGOAnK5uWjAY1V-noD-KxmX_BsZnhSOssMa-0FnmevXlYPcRcbauVUxlTOACzFwdxpcRSq_Ms9QMh_5TctQZtq59VTnpOnfOZBIHd3eS0zB6AHqqNNtioPW8syX6iZxweSQkBX0pmYBaQxC2iUExhUOTmzEnDeBjaJ5EcdvAZ0-98w2GIqnZrftBlQvtWt25MKmNIl_NAtmBKZQ''
    http://localhost:8080

    [10:23:07:548]JWT 已生成

    ```


    请注意，该工具的输出包含如何使用 *curl* 调用安全服务的示例用法，这在测试我们的服务时非常方便。


    jwtenizr 会生成多个文件：


    *   **jwtenizr-config.json**：一个 JSON 文件，我们可以用它来配置 jwtenizr，可用于自定义 JWT 签发者和生成的示例
    MicroProfile 配置文件的位置；它将在后续执行 jwtenizr 时被读取。


    *   **jwt-token.json**：生成的 JWT 的明文版本。


    *   **microprofile-config.properties**：示例的 microprofile-config.properties 文件，我们可以用它来配置我们的安全应用。


    *   **token.jwt**：生成的 JWT 的 Base 64 编码版本。


    尽管 JWT 的可配置性相当高，但其默认设置足以满足我们的需求。默认情况下，jwtenizr 会为一个名为“duke”的用户生成一个令牌，该用户属于“chief”和“hacker”组，由“airhacks”签发，并在令牌创建后的
    16 分 40 秒（1000 秒）后过期。


    ## 使用 JSON Web 令牌保护微服务


    保护我们的 RESTful Web 服务主要通过几个简单的 MicroProfile Config 属性和一些注解来完成。


    ### MicroProfile Config JWT 属性


    如前所述，JSON Web 令牌是经过数字签名的；这是通过使用签发者的私钥加密令牌来实现的。要验证令牌的有效性，我们需要使用签发者的公钥对其进行解密。


    MicroProfile JWT 提供了一个标准的配置属性，我们可以用它来指定公钥；该属性的名称是 `mp.jwt.verify.publickey`；其值必须是
    Base 64 编码的公钥；该值通常由我们使用的任何身份服务提供。在我们的示例中，该值出现在 jwtenizr 生成的示例 MicroProfile 配置文件中。


    或者，我们可以将公钥放在一个文本文件中，然后将该文本文件发布到 URL 或将其放在 JAR 文件内部；在一个典型的 Maven 项目中，包含公钥的文件将放在
    *src/main/resources* 或其子目录下。


    例如，如果我们将密钥放在 *src/main/resources/keys/publicKey.pem* 下，那么 `mp.jwt.verify.publickey`
    属性的值将是 `/keys/publicKey.pem`；相反，如果我们将公钥直接放在 *src/main/resources* 中，那么相应的属性值将是
    `/publicKey.pem`。


    除了指定公钥，我们还需要指定令牌的签发者；这在我们使用的 JWT 的 *iss* 声明中指定，并且可以从我们用于身份验证的明文 JSON Web 令牌中获取。jwtenizr
    使用 *airhacks* 作为其默认签发者；因此，我们必须相应地配置我们的应用。jwtenizr 方便地生成了一个我们可以使用的 `microprofile-config.properties`
    文件；它应该类似于以下内容：


    ```

    #由 jwtenizr 生成

    #Mon Dec 13 18:05:17 EST 2021

    mp.jwt.verify.

    mp.jwt.verify.issuer=airhacks

    ```


    将该文件放在我们 Maven 项目的 *src/main/resources/META-INF* 目录下，即可满足我们的 JWT 配置需求。

