    ## Path and Query Parameters


    Just like we can develop our RESTful web services to accept path and query parameters,
    we can develop clients to pass them; all we need to do is annotate our methods
    on the REST client interface with the same annotations used on the service.


    ### Path Parameters


    To pass path parameters to a RESTful web service, we use the `@Path` annotation,
    providing a URI template designating the position of each parameter; additionally,
    we need to annotate each method argument with the `@PathParam` annotation; the
    value of this annotation must match the corresponding parameter in the URI template
    defined in the `@Path` annotation for our method.


    ```

    package com.ensode.pathparamsclient;

    //imports omitted

    @RegisterRestClient

    @Path("pathparams")

    public interface PathParamsSampleServiceClient {

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    @Path("/{title}/{lastName}")

    public String sayFormalHello(@PathParam("title") String title,

    @PathParam("lastName") String lastName);

    }

    ```


    If all of this looks familiar, it’s because the exact same annotations are used
    on the RESTful web service to define path parameters accepted by the service.
    This consistency makes it very easy to develop clients against services developed
    using the Jakarta RESTful Web Services API.


    We then can inject our RESTful interface using the `@RestClient` and `@Inject`
    annotations as usual. To pass our path parameters to the service, we simply invoke
    the appropriate method in our RESTful client interface with appropriate arguments.


    ```

    package com.ensode.pathparamsclient;

    //imports omitted

    @ApplicationScoped

    public class PathParamRestfulClient {

    @Inject

    @RestClient

    private PathParamsSampleServiceClient

    pathParamsSampleServiceClient;

    private static final Logger LOGGER =

    Logger.getLogger(PathParamRestfulClient.class.getName());

    public void init(@Observes @Initialized(ApplicationScoped.class)

    Object object) {

    String formalResponse;

    formalResponse =

    pathParamsSampleServiceClient.sayFormalHello("Mr",

    "Heffelfinger");

    LOGGER.log(Level.INFO, String.format(

    "Received the following formal response: %s",

    formalResponse));

    }

    }

    ```


    After running our application in Payara Micro, we can see the response from the
    service in its command-line output.


    ```

    [2021-08-20T15:06:24.930-0400] [] [INFO] [] [com.ensode.pathparamsclient.PathParamRestfulClient]
    [tid: _ThreadID=1 _ThreadName=main] [timeMillis: 1629486384930] [levelValue: 800]
    [[

    Received the following formal response: {

    "msg":"Hello, Mr Heffelfinger"

    }]]

    ```


    ### Query Parameters


    If we need to pass query parameters to a RESTful web service, we can do so by
    annotating our method arguments with the `@QueryParam` annotation. This annotation
    indicates the query parameter name each method argument will populate.


    ```

    package com.ensode.queryparamsclient;

    //imports omitted

    @RegisterRestClient

    @Path("queryparams")

    public interface QueryParamsSampleServiceClient {

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public String sayFormalHello(@QueryParam("title") String title,

    @QueryParam("lastName") String lastName);

    }

    ```


    Unsurprisingly, the process to create a client that generates query parameters
    is pretty much identical to the process of creating a server that accepts them.


    To pass the query parameters, we inject our client interface via the `@RestClient`
    and `@Inject` annotations as usual and then call its corresponding method with
    the appropriate arguments.


    ```

    package com.ensode.queryparamsclient;

    //imports omitted

    @ApplicationScoped

    public class QueryParamsRestfulClient {

    private static final Logger LOGGER =

    Logger.getLogger(QueryParamsRestfulClient.class.getName());

    @Inject

    @RestClient

    private QueryParamsSampleServiceClient

    queryParamsSampleServiceClient;

    public void init(@Observes @Initialized(ApplicationScoped.class)

    Object object) {

    String serverResponse;

    serverResponse =

    queryParamsSampleServiceClient.sayFormalHello("Mr",

    "Heffelfinger");

    LOGGER.log(Level.INFO, String.format(

    "Received the following response: %s", serverResponse));

    }

    }

    ```


    When running our client application in Payara Micro, we can see the response sent
    by the service.


    ```

    [2021-08-20T15:08:51.480-0400] [] [INFO] [] [com.ensode.queryparamsclient.QueryParamsRestfulClient]
    [tid: _ThreadID=1 _ThreadName=main] [timeMillis: 1629486531480] [levelValue: 800]
    [[

    Received the following response: {

    "msg":"Hello, Mr Heffelfinger"

    }]]

    ```'
