    In our example, we are allowing up to three concurrent invocations to our RESTful
    web service endpoint; any attempt to invoke the endpoint while there are already
    three concurrent invocations will fail with a `BulkheadException`; once the number
    of concurrent invocations decreases below three, the method can be successfully
    invoked again.


    The following example code illustrates what happens when we generate more concurrent
    calls than allowed by the `@Bulkhead` annotation:


    ```

    package com.ensode.fault.toleranceclient;

    //imports omitted

    @Path("/faulttoleranceclient")

    public class FaultToleranceClientService {

    private static final Logger LOGGER =

    Logger.getLogger(FaultToleranceClientService.class.getName());

