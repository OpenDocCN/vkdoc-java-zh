- fmt: '# Stop Invoking Repeatedly Failing Endpoints


    `@CircuitBreaker`注解允许我们停止调用超过阈值后持续失败的端点；默认情况下，如果对某个端点的最近20次调用中至少有50%失败，则对该方法的调用将停止；相反，MicroProfile运行时会抛出`CircuitBreakerOpenException`。我们可以通过`@CircuitBreaker`的`requestVolumeThreshold`和`failureRatio`属性分别指定用于计算的调用次数和失败请求的比例。


    在指定的延迟（默认为500毫秒）之后，断路器会进入半开状态，这意味着允许一定数量的请求（默认为一个请求）通过并执行操作；如果这些请求成功，断路器会自动关闭，允许后续请求访问端点；如果这些请求中至少有一个失败，断路器会重新打开，阻止任何进一步的端点调用。我们可以通过`@CircuitBreaker`的`delay`属性指定半开断路器前的延迟时间，并通过其`delayUnit`属性指定延迟的时间单位；默认时间单位为毫秒。


    以下示例说明了如何使用`@CircuitBreaker`注解：


    ```

    package com.ensode.faulttolerance;

    //imports omitted

    @RequestScoped

    @Path("faulttoleranceexample")

    public class FaulToleranceExampleResource {

    @Inject

    private ConcurrentInvocationCounter concurrentInvocationCounter;

    @CircuitBreaker(requestVolumeThreshold = 3, failureRatio = .66

    delay = 1, delayUnit = ChronoUnit.SECONDS, successThreshold = 2)

    @POST

    @Produces(MediaType.TEXT_PLAIN)

    @Path("circuitbreaker")

    public String circuitBreakerExample(@QueryParam("success") boolean success) {

    if (success == false) {

    throw new RuntimeException("forcing a failure for demo purposes");

    } else {

    return "Call succeeded";

    }

    }

    }

    ```


    为了便于说明，在我们的示例中，当接收到查询参数`false`时，我们故意抛出一个异常。在我们的端点中，我们使用最近三次对端点的调用来计算阈值，如`@CircuitBreaker`的`requestVolumeThreshold`属性所指定。我们通过`failureRatio`属性将失败调用的比例指定为`.66`；在这种情况下，由于请求量阈值为3，失败比例为.66，当连续三次调用中有两次失败时，断路器将打开。


    在我们的示例中，我们指定了半开断路器前的延迟为一秒；秒数在`@CircuitBreaker`的`delay`属性中指定，时间单位在相应的`delayUnit`属性中指定。


    现在让我们编写一个客户端服务，向我们的端点发送多个请求，以便验证`@CircuitBreaker`注解是否按预期工作。


    ```

    package com.ensode.fault.toleranceclient;

    //imports omitted

    @Path("/faulttoleranceclient")

    public class FaultToleranceClientService {

    private static final Logger LOGGER = Logger.getLogger(FaultToleranceClientService.class.getName());

    @Inject

    @RestClient

    private FaultToleranceExampleResourceClient client;

    @POST

    @Path("circuitbreaker")

    public void circuitBreakerClient() throws InterruptedException {

    try {

    LOGGER.log(Level.INFO, client.circuitBreakerExample(true));

    } catch (RuntimeException re) {

    LOGGER.log(Level.SEVERE, re.getMessage());

    }

    try {

    LOGGER.log(Level.INFO, client.circuitBreakerExample(false));

    } catch (RuntimeException re) {

    LOGGER.log(Level.SEVERE, re.getMessage());

    }

    try {

    LOGGER.log(Level.INFO, client.circuitBreakerExample(false));

    } catch (RuntimeException re) {

    LOGGER.log(Level.SEVERE, re.getMessage());

    }

    //circuit opens

    try {

    LOGGER.log(Level.INFO, client.circuitBreakerExample(true));

    //call fails because the circuit is open

    } catch (CircuitBreakerOpenException e) {

    LOGGER.log(Level.SEVERE, "Circuit breaker is open", e);

    }

    //Wait one second, circuit is now half open, call succeeds.

    TimeUnit.SECONDS.sleep(1);

    try {

    LOGGER.log(Level.INFO, client.circuitBreakerExample(true));

    //call succeeds because the circuit is half open

    } catch (RuntimeException re) {

    LOGGER.log(Level.SEVERE, re.getMessage());

    }

    //circuit breaker is now closed

    }

    }

    ```


    回想一下，在我们的服务中，当它接收到`success`路径参数的值为`false`时，我们故意抛出一个异常；因此，第一次调用服务成功，接下来的两次失败；由于达到了失败请求的阈值，断路器打开。


    下一次对服务的调用失败了，即使我们传递了`true`值；失败的原因是断路器现在处于打开状态。在指定的延迟一秒后，断路器变为半开状态；因此，允许调用到达端点；我们客户端的最后一次调用成功。由于我们通过`@CircuitBreaker`的`successThreshold`属性指定了成功阈值为2，此时断路器保持半开状态；如果下一个请求成功，断路器将关闭；如果失败，它将重新打开。


    在继续之前，最后要提一点，默认情况下，如果端点抛出任何异常，`@CircuitBreaker`会增加失败调用的计数器。如果我们希望将断路器功能限制在特定的异常集合上，可以通过`@CircuitBreaker`的`failOn`属性来实现；该属性接受一个`Exception`子类的数组作为其值，例如：


    ```

    @CircuitBreker(failOn={ReallyBadException.class, EvenWorseException.class})

    ```


    类似地，我们可以通过`@CircuitBreaker`的`skipOn`属性指定要忽略的异常。


    ```

    @CircuitBreaker(skipOn={DumbException.class, IsThisEvenAnIssueException.class})

    ```'
  raw: '## Stop Invoking Repeatedly Failing Endpoints


    The `@CircuitBreaker` annotation allows us to stop invoking endpoints that fail
    past a threshold; by default, if at least 50% of the last 20 invocations to an
    endpoint fail, then invocations to that method will stop; instead, the MicroProfile
    runtime will throw a `CircuitBreakerOpenException`. We can specify the number
    of invocations used and the ratio of failed requests via the `requestVolumeThreshold`
    and `failureRatio` attributes of `@CircutiBreaker`, respectively


    After a specified delay (defaulting to 500 milliseconds), the circuit is half
    opened, meaning that number of requests (default of one request) from are allowed
    to pass through and invoke the operation; if these requests are successful, the
    circuit is automatically closed, allowing further requests to access the endpoint;
    if at least one of these requests fails, the circuit is reopened, preventing any
    further calls to the endpoint. We can specify the delay to use before half-opening
    the circuit via the delay attribute of `@CircuitBreaker` and the unit of time
    for the delay via its `delayUnit` attribute; the default unit of time is milliseconds.


    The following example illustrates how to use the `@CircuitBreaker` annotation:


    ```

    package com.ensode.faulttolerance;

    //imports omitted

    @RequestScoped

    @Path("faulttoleranceexample")

    public class FaulToleranceExampleResource {

    @Inject

    private ConcurrentInvocationCounter concurrentInvocationCounter;

    @CircuitBreaker(requestVolumeThreshold = 3, failureRatio = .66

    delay = 1, delayUnit = ChronoUnit.SECONDS, successThreshold = 2)

    @POST

    @Produces(MediaType.TEXT_PLAIN)

    @Path("circuitbreaker")

    public String circuitBreakerExample(@QueryParam("success") boolean success) {

    if (success == false) {

    throw new RuntimeException("forcing a failure for demo purposes");

    } else {

    return "Call succeeded";

    }

    }

    }

    ```


    For illustration purposes, in our example, we are deliberately throwing an exception
    when we receive a value of `false` as a query parameter. In our endpoint, we are
    using the last three invocations to our endpoint to calculate the threshold, as
    specified by the `requestVolumeThreshold` attribute to `@CircuitBreaker`. We specify
    the ratio of failed calls as .66 via the `failureRatio` attribute; in this case,
    since our request volume threshold is 3 and the failure ratio is .66, the circuit
    will open after two out of three consecutive calls fail.


    In our example, we are specifying a delay of one second before we half-open the
    circuit; the number of seconds is specified in the `delay` attribute of `@CircuitBreaker`
    and the unit of time in the corresponding `delayUnit` attribute.


    Let’s now write a client service that sends multiple requests to our endpoint
    so that we can verify that the `@CircuitBreaker` annotation is working as expected.


    ```

    package com.ensode.fault.toleranceclient;

    //imports omitted

    @Path("/faulttoleranceclient")

    public class FaultToleranceClientService {

    private static final Logger LOGGER = Logger.getLogger(FaultToleranceClientService.class.getName());

    @Inject

    @RestClient

    private FaultToleranceExampleResourceClient client;

    @POST

    @Path("circuitbreaker")

    public void circuitBreakerClient() throws InterruptedException {

    try {

    LOGGER.log(Level.INFO, client.circuitBreakerExample(true));

    } catch (RuntimeException re) {

    LOGGER.log(Level.SEVERE, re.getMessage());

    }

    try {

    LOGGER.log(Level.INFO, client.circuitBreakerExample(false));

    } catch (RuntimeException re) {

    LOGGER.log(Level.SEVERE, re.getMessage());

    }

    try {

    LOGGER.log(Level.INFO, client.circuitBreakerExample(false));

    } catch (RuntimeException re) {

    LOGGER.log(Level.SEVERE, re.getMessage());

    }

    //circuit opens

    try {

    LOGGER.log(Level.INFO, client.circuitBreakerExample(true));

    //call fails because the circuit is open

    } catch (CircuitBreakerOpenException e) {

    LOGGER.log(Level.SEVERE, "Circuit breaker is open", e);

    }

    //Wait one second, circuit is now half open, call succeeds.

    TimeUnit.SECONDS.sleep(1);

    try {

    LOGGER.log(Level.INFO, client.circuitBreakerExample(true));

    //call succeeds because the circuit is half open

    } catch (RuntimeException re) {

    LOGGER.log(Level.SEVERE, re.getMessage());

    }

    //circuit breaker is now closed

    }

    }

    ```


    Recall that in our service, we are deliberately throwing an exception when it
    receives a value of `false` for its `success` path parameter; as such, the first
    invocation to the service succeeds, and the next two fail; since we met the threshold
    of failed requests, the circuit opens.


    The next invocation to the service failed, even though we are passing a value
    of `true`; the reason it fails is because the circuit breaker is now open. After
    the specified delay of one second, the circuit breaker is half open; therefore,
    calls are allowed to reach the endpoint; the last call from our client succeeds.
    Since we specified a success threshold of 2 via the `successThreshold` attribute
    of `@CircuitBreaker`, at this point, the circuit breaker remains in half-open
    state; if the next request succeeds, the circuit is then closed; if it fails,
    it will be opened.


    One last thing to mention before moving on, by default, `@CircuitBreaker` will
    increase the counter of failed calls if any exception is thrown from the endpoint.
    If we wish to limit the circuit breaker functionality to a certain set of exceptions,
    we can do so via the `failOn` attribute of `@CircuitBreaker`; this attribute accepts
    an array of child classes of `Exception` as its value, for example:


    ```

    @CircuitBreker(failOn={ReallyBadException.class, EvenWorseException.class})

    ```


    Similarly, we can specify exceptions to ignore via the `skipOn` attribute of `@CircuitBreaker`.


    ```

    @CircuitBreaker(skipOn={DumbException.class, IsThisEvenAnIssueException.class})

    ```'
