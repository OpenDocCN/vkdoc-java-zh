  trans: '

    ## 总结


    本章介绍了 Payara Micro 对 MicroProfile 容错 API 的支持。


    我们讨论了如何使 RESTful Web 服务异步化，这样客户端就无需阻塞等待其返回。


    我们还了解了如何限制 RESTful 服务端点的并发执行次数，从而防止有缺陷或恶意的客户端使系统过载。


    此外，我们介绍了如何透明地停止对持续重复失败的端点的调用。


    同时，我们看到了当 RESTful Web 服务失败时，如何自动调用备用实现。


    另外，我们还了解了如何自动重试失败的 RESTful 服务端点调用；最后，我们介绍了如何指定允许端点执行的最大时间，超时后即停止。


    # 8. 健康检查


    基于云的应用通常会提供一个健康检查端点，供 Kubernetes 等编排工具使用，以验证服务是否正常运行。这些编排工具可以利用这些端点来判断服务是否需要重启或进行其他处理。


    MicroProfile 提供了一个健康检查 API，我们可以用它来开发这些健康检查端点。我们可以提供报告来确定应用是否存活（live）和/或是否就绪（ready）。在这两种情况下，我们都需要实现
    MicroProfile 提供的 `HealthCheck` 接口，该接口定义了一个单一的抽象方法 `call()`，该方法不接受参数并返回一个 `HealthCheckResponse`
    实例；我们的 `HealthCheck` 实现需要是一个应用作用域的 CDI bean。不过，对于基本的健康检查报告，我们实际上无需做任何事；一个默认的健康检查端点会“免费”提供。


    ## 免费的健康检查功能


    只需将任何 Web 应用部署到 Payara Micro，我们就能“免费”获得一个基本的健康检查，无需我们付出任何努力。只需向 Payara Micro 的
    `/health` 上下文根发送一个 HTTP GET 请求，我们就能收到一个 JSON 格式的基本状态报告。


    ```

    $ curl http://localhost:8080/health

    {"status":"UP","checks":[]}

    ```


    默认的健康检查响应报告应用已启动，并且不提供额外的检查。在许多情况下，默认的健康检查就足够了；如果我们需要提供额外信息，可以通过使用 MicroProfile
    健康检查 API 来实现。


    ## 判断服务是否存活


    要提供指示应用是否存活的报告，我们需要用 `@Livenesscheck` 注解我们的 HealthCheck 实现，如下例所示：


    ```

    package com.ensode.healthcheck;

    // 导入省略

    @ApplicationScoped

    @Liveness

    public class LivenessChecker implements HealthCheck {

    @Override

    public HealthCheckResponse call() {

    return HealthCheckResponse.builder().

    name(this.getClass().getSimpleName()).up().build();

    }

    }

    ```


    如示例所示，创建要返回的 `HealthCheckResponse` 实例的最简单方法是使用 `HealthCheckResponseBuilder`。`HealthCheckResponse`
    类提供了一个静态的 `builder()` 方法，我们可以用它来获取 `HealthCheckResponseBuilder` 的实例。


    我们需要为健康检查提供一个名称；可以通过调用 `HealthCheckResponseBuilder` 的 `name()` 方法来实现；名称可以是任意字符串；在我们的示例中，我们使用了类的名称。


    我们通过调用 `HealthCheckResponseBuilder.up()` 或 `HealthCheckResponseBuilder.down()`
    来指示服务是否存活；在我们的示例中，我们简单地调用了 `up()`；在实际应用中，我们会执行一些逻辑来判断服务是启动还是关闭，然后调用相应的方法。我们还可以通过调用
    `HealthCheckResponseBuilder.withData()` 来提供额外的诊断数据（稍后会详细介绍）。


    一旦我们构建完 `HealthCheckResponse` 对象，就调用 `HealthCheckResponseBuilder.build()` 来创建它；然后我们的
    `call()` 方法就可以直接返回它。


    完成存活检查的实现后，我们可以通过向应用的 `/health` 端点提交 HTTP GET 请求来查看其效果。


    ```

    $ curl http://localhost:8080/health/

    {"status":"UP","checks":[{"name":"LivenessChecker","status":"UP","data":{}}]}

    ```

    '
- fmt: '# Determining If a Service Is Ready


    A service could be up but not ready to be used; some of its dependencies, for
    instance, could be down or otherwise unavailable. We can implement health check
    logic to generate a readiness report by developing a `HealthCheck` implementation
    annotated with the `@ReadinessCheck` annotation.


    The process to generate a readiness report is very similar to what we already
    saw when discussing liveness; we implement the `HealthCheck` interface and return
    an instance of `HealthCheckResponse` from its `call()` method.


    The following example illustrates how we can provide additional data in our health
    check reports; in this example, we are simulating checking the status of resources
    our application depends on and returning a status of "up" or "down" as appropriate.
    Although we are illustrating adding additional data in a readiness example, the
    material is also applicable to liveness reports.


    ```

    package com.ensode.healthcheck;

    //imports omitted

    @ApplicationScoped

    @Readiness

    public class ReadinessChecker implements HealthCheck {

    HealthCheckResponseBuilder healthCheckResponseBuilder =

    HealthCheckResponse.builder().

    name(this.getClass().getSimpleName());

    @Override

    public HealthCheckResponse call() {

    boolean databaseUp = isDatabaseUp();

    boolean jmsQueuesUp = areJmsQueuesUp();

    if (databaseUp && jmsQueuesUp) {

    healthCheckResponseBuilder =

    healthCheckResponseBuilder.up();

    } else {

    healthCheckResponseBuilder =

    healthCheckResponseBuilder.down();

    }

    return healthCheckResponseBuilder.

    withData("Database up", databaseUp).

    withData("JMS queue up", jmsQueuesUp).build();

    }

    private boolean isDatabaseUp() {

    //dummy method for illustration purposes

    return new Random().nextBoolean();

    }

    private boolean areJmsQueuesUp() {

    //dummy method for illustration purposes

    return new Random().nextBoolean();

    }

    }

    ```


    In our example, we create an instance of `HealthCheckResponseBuilder` and give
    it a name and then call some methods that simulate checking the status of a database
    and JMS queue (our dummy methods simply return a random `true`/`false` boolean
    value); if both the database and JMS queue are up, we indicate that the service
    is ready by invoking `HealthCheckResponseBuilder.up()`; otherwise, we indicate
    that the service is not ready by invoking `HealthCheckResponseBuilder.down()`;
    simply indicating that the service is not ready would not provide enough information;
    ideally, we need to indicate why the service is not ready; we can do so by invoking
    `HealthCheckResponseBuilder.withData()`; there are three overloaded versions of
    this method; all three take a string as its first argument; the second argument
    can be another string, a `long` or a `boolean`. The first argument is meant to
    provide a brief description for the generated data; the second value is the actual
    value to be displayed; in our example, we are using the `boolean` version of `withData()`
    indicating if the database and JMS queues are up.


    If we have both liveness and readiness checks in our application, sending an HTTP
    GET request to our application will generate data for both checks.


    `curl http://localhost:8080/health/` generates the following output (reformatted
    for readability):


    ```

    {

    "status": "UP",

    "checks": [

    {

    "name": "ReadinessChecker",

    "status": "UP",

    "data": {

    "Database up": "true",

    "JMS queue up": "true"

    }

    },

    {

    "name": "LivenessChecker",

    "status": "UP",

    "data": {}

    }

    ]

    }

    ```


    If we want to see only the readiness check, we can invoke the `/health/ready`
    endpoint; for instance, `curl http://localhost:8080/health/ready` generates the
    following output:


    ```

    {

    "status": "UP",

    "checks": [

    {

    "name": "ReadinessChecker",

    "status": "UP",

    "data": {

    "Database up": "true",

    "JMS queue up": "true"

    }

    }

    ]

    }

    ```


    Similarly, if we only want to see a liveness report, we can send an HTTP GET request
    to `/health/live`, which will result in a JSON response containing the liveness
    check only.


    ```

    {

    "status": "UP",

    "checks": [

    {

    "name": "LivenessChecker",

    "status": "UP",

    "data": {}

    }

    ]

    }

    ```


    ## Configuring MicroProfile Health


    We can configure MicroProfile Health in Payara Micro via the `set-microprofile-healthcheck-configuration`
    asadmin command via a command file passed as a post boot command file or similar.


    ### Disabling MicroProfile Health


    Payara Micro enables MicroProfile Health by default; if we wish to disable it,
    we can use the following asadmin command:


    ```

    set-microprofile-healthcheck-configuration --enabled=false

    ```


    ### Securing MicroProfile Health


    By default, the `/health` endpoint is unsecured, meaning any random unauthenticated
    user can access it.


    If we wish to secure it, we can do so by issuing the following asadmin command:


    ```

    set-microprofile-healthcheck-configuration --securityenabled=true

    ```


    When securing the `/health` endpoint, we can specify which roles have access to
    it as follows:


    ```

    set-microprofile-healthcheck-configuration --roles=role1,role2

    ```


    The value of the `--roles` argument is a comma-separated list of roles allowed
    to access the health endpoint.


    ### Customizing the MicroProfile Health Endpoint


    By default, metrics can be retrieved via the `/health` endpoint. We can use a
    different endpoint if we wish.


    ```

    set-microprofile-healthcheck-configuration --endpoint=foo

    ```


    The value of the `--endpoint` argument is the context root of our custom health
    endpoint.


    ## Summary


    In this chapter, we covered Payara Micro''s support for the MicroProfile Health
    API. We saw how we get basic health functionality "for free"; we also covered
    how to generate custom health data to help determine if a service is ready and/or
    live. Finally, we covered how to configure MicroProfile Health in Payara Micro.


    # 9. Request Tracing


    A typical microservices architecture consists of several microservices. These
    services send output to a log file; traditionally, each service sends output to
    its own log file. When looking at log files across server instances, it is almost
    never trivial to follow a single trace of execution across our microservices;
    for example, let''s say we have two services, A and B, and that service A serves
    as a client for service B. Typically, we will see several calls to service B from
    service A in the logs, but it is seldom trivial to match which calls from service
    A match which calls received from service B. Additionally, it is possible service
    B may be called from clients other than service A, making following a single trace
    of execution in our application a challenging task. This is where the MicroProfile
    OpenTracing API comes in; this API generates spans and traces that allow us to
    trace execution across Payara Micro instances; each span and trace has a unique
    ID that does not change across instances, allowing us to link log entries from
    one instance of Payara Micro to another.


    Before we can use the MicroProfile OpenTracing API, it needs to be enabled in
    Payara Micro.'
