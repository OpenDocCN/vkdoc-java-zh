- fmt: '## Summary


    In this chapter, we covered Payara Micro’s support for the MicroProfile Fault
    Tolerance API.


    We discussed how to make RESTful web services asynchronous so that clients don’t
    have to block waiting for them to return.


    We also saw how we can limit the number of concurrent executions of a RESTful
    service endpoint, preventing a buggy or malicious client from overloading the
    system.


    Additionally, we covered how to transparently stop invocations to an endpoint
    that keeps repeatedly failing.


    Also, we saw how we can automatically invoke a fallback implementation when a
    RESTful web service fails.


    Additionally, we saw how to automatically retry failed RESTful service endpoint
    invocations; lastly, we covered how to specify the maximum amount of time we allow
    an endpoint to execute before it times out.


    # 8. Health Checks


    It is common for cloud-based applications to provide a health check endpoint for
    orchestration tools such as Kubernetes to use to verify that services are up and
    running. These orchestration tools can use these endpoints to determine if a service
    needs to be restarted or otherwise dealt with.


    MicroProfile provides a Health Check API we can use to develop these health check
    endpoints. We can provide reports to determine if the application is live and/or
    if it is ready. In both cases, we do so by implementing the `HealthCheck` interface
    provided by MicroProfile, which provides a single abstract `call()` method that
    takes no arguments and returns an instance of `HealthCheckResponse`; our `HealthCheck`
    implementation needs to be an application scoped CDI bean. For basic health check
    reports, however, we don’t actually have to do anything; a default health check
    endpoint is provided “for free.”


    ## Free Health Check Functionality


    By deploying any web application to Payara Micro, we get a basic health check
    “for free” with no effort whatsoever on our part. Just send an HTTP GET request
    to the `/health` context root or the Payara Micro, and we’ll get a basic status
    report in JSON format.


    ```

    $ curl http://localhost:8080/health

    {"status":"UP","checks":[]}

    ```


    The default health check response reports that the application is up and provides
    no additional checks. In many cases, the default health check suffices; if we
    need to provide additional information, we can do so by utilizing the MicroProfile
    health check API.


    ## Determining If a Service Is Live


    To provide a report indicating if our application is live, we need to annotate
    our `HealthCheck` implementation with `@Livenesscheck`, as illustrated in the
    following example:


    ```

    package com.ensode.healthcheck;

    //imports omitted

    @ApplicationScoped

    @Liveness

    public class LivenessChecker implements HealthCheck {

    @Override

    public HealthCheckResponse call() {

    return HealthCheckResponse.builder().

    name(this.getClass().getSimpleName()).up().build();

    }

    }

    ```


    As can be seen in the example, the easiest way to create the `HealthCheckResponse`
    instance to return is by using `HealthCheckResponseBuilder`. The `HealthCheckResponse`
    class provides a static `builder()` method we can use to obtain an instance of
    `HealthCheckResponseBuilder`.


    We need to provide a name for our health check; we can do so by invoking the `name()`
    method on `HealthCheckResponseBuilder`; the name can be any arbitrary string;
    in our example, we are using the name of our class.


    We indicate if the service is live or not by invoking `HealthCheckResponseBuilder.up()`
    or `HealthCheckResponseBuilder.down()`; in our example, we are simply invoking
    `up()`; in a real application, we would perform some logic to determine if the
    service is up or down and then call the appropriate method. We could also provide
    additional diagnostic data by invoking `HealthCheckResponseBuilder.withData()`
    (more on that later).


    Once we are done building our `HealthCheckResponse` object, we invoke `HealthCheckResponseBuilder.build()`
    to create it; then our `call()` method can simply return it.


    Once we are done implementing our liveness check, we can see it in action by submitting
    an HTTP GET request to the `/health` endpoint of our application.


    ```

    $ curl http://localhost:8080/health/

    {"status":"UP","checks":[{"name":"LivenessChecker","status":"UP","data":{}}]}

    ```'
