    ### @Counted


    `@Counted` 注解用于指示方法被调用的次数；每次调用该方法时，计数器值会自动增加。


    ```

    @GET

    @Counted

    @Path("counted")

    @Produces(MediaType.TEXT_PLAIN)

    public String countedExample() {

    return "Counter was just increased\n";

    }

    ```


    多次调用我们的端点后，可以通过向 Payara Micro 的 `/metrics/application` 端点发送 GET 请求来查看输出：


    ```

    # TYPE application_com_ensode_applicationmetrics_MetricsDemo_countedExample_total
    counter

    application_com_ensode_applicationmetrics_MetricsDemo_countedExample_total{_app="application-metrics-1.0-snapshot"}
    3

    ```


    或者以 JSON 格式输出：


    ```

    {

    "com.ensode.applicationmetrics.MetricsDemo.countedExample;_app=application-metrics-1.0-snapshot":
    3

    }

    ```


    ### @Gauge


    此注解只能应用于返回数值对象（`Long`、`Short`、`Integer`、`Float`、`Double`）或其对应原始类型的方法；它会将返回值作为指标暴露出来。@GET


    ```

    @Gauge(unit = "some unit")

    @Path("gauge")

    @Produces(MediaType.TEXT_PLAIN)

    public int gaugeExample() {

    gaugeVal += 2;

    return gaugeVal;

    }

    ```


    `@Gauge` 的 `unit` 属性是必需的；我们可以为其分配任意字符串值；例如，如果返回的是组织中的员工数量，单位可以是 `"employees"`；如果返回的是工厂生产的零件数量，单位可以是
    `"widgets"`；以此类推。


    `@Gauge` 在 Prometheus 格式下的输出如下所示：


    ```

    # TYPE application_com_ensode_applicationmetrics_MetricsDemo_gaugeExample_some_unit
    gauge

    application_com_ensode_applicationmetrics_MetricsDemo_gaugeExample_some_unit{_app="application-metrics-1.0-snapshot"}
    8

    ```


    或者以 JSON 格式输出：


    ```

    "com.ensode.applicationmetrics.MetricsDemo.gaugeExample;_app=application-metrics-1.0-snapshot":
    10

    {

    "com.ensode.applicationmetrics.MetricsDemo.gaugeExample;_app=application-metrics-1.0-snapshot":
    8

    }

    ```


    ### @ConcurrentGauge


    此注解显示在任意特定时间点对某个方法（通常是 REST 端点）的并发调用次数。


    ```

    @GET

    @ConcurrentGauge

    @Path("concurrentGauge")

    @Produces(MediaType.TEXT_PLAIN)

    public void concurrentGaugeExample() throws InterruptedException {

    TimeUnit.SECONDS.sleep(10);

    }

    ```


    在我们的示例中，我们只是让线程休眠十秒钟；这允许我们对端点进行几次调用，然后调用指标端点，以便获取相关的示例数据。


    `@ConcurrentGauge` 的输出如下所示：


    ```

    # TYPE application_com_ensode_applicationmetrics_MetricsDemo_concurrentGaugeExample_current
    gauge

    application_com_ensode_applicationmetrics_MetricsDemo_concurrentGaugeExample_current{_app="application-metrics-1.0-snapshot"}
    3

    # TYPE application_com_ensode_applicationmetrics_MetricsDemo_concurrentGaugeExample_min
    gauge

    application_com_ensode_applicationmetrics_MetricsDemo_concurrentGaugeExample_min{_app="application-metrics-1.0-snapshot"}
    0

    # TYPE application_com_ensode_applicationmetrics_MetricsDemo_concurrentGaugeExample_max
    gauge

    application_com_ensode_applicationmetrics_MetricsDemo_concurrentGaugeExample_max{_app="application-metrics-1.0-snapshot"}
    3

    ```


    `@ConcurrentGauge` 不仅返回方法的并发调用次数，还返回前一分钟内该方法的最小和最大并发调用次数。


    `@ConcurrentGauge` 的 JSON 格式输出如下所示：


    ```

    {

    "com.ensode.applicationmetrics.MetricsDemo.concurrentGaugeExample": {

    "current;_app=application-metrics-1.0-snapshot": 3,

    "min;_app=application-metrics-1.0-snapshot": 0,

    "max;_app=application-metrics-1.0-snapshot": 3

    }

    }

    ```


    ### @Metered


    此注解生成方法被调用的次数、应用生命周期内的每秒调用速率，以及最近一分钟、最近五分钟和最近十五分钟的每秒调用速率。


