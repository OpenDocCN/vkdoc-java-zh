    By examining the output for Payara Micro, we can see that the first three concurrent
    invocations succeeded; the fourth one generated a `BulkheadException`, as expected.


    We have no control over thread scheduling; it is instead done by the JVM and/or
    the underlying operating system; for this reason, the output indicating the number
    of concurrent invocations may not match our expectations; the line of code sending
    output to the log file for the third thread was executed before the same line
    on the second thread; that’s why we see log entries indicating 1, 3, and 2 concurrent
    invocations, as opposed to 1, 2, and 3.


    ### Using Thread Pools for Asynchronous Endpoints


    Thread pool style `@Bulkhead` usage is limited to asynchronous endpoints; as before,
    we specify the maximum number of concurrent calls allowed for an endpoint via
    the `value` attribute of the `@Bulkhead` annotation; any additional invocations
    are placed in a thread pool and serviced after the maximum number of concurrent
    invocations to our endpoint decreases below the specified value. We can specify
    the maximum number of invocations on the thread pool via the `waitingTaskQueue`
    attribute of the `@Bulkhead` annotation.


    The following example illustrates thread pool style `@Bulkhead` usage:


    ```java

    package com.ensode.faulttolerance;

    //imports omitted

    @RequestScoped

    @Path("faulttoleranceexample")

    public class FaulToleranceExampleResource {

    @Inject

    private ConcurrentInvocationCounter concurrentInvocationCounter;

    @POST

    @Path("threadpoolbulkhead")

    @Asynchronous

    @Bulkhead(value = 3, waitingTaskQueue = 2)

    @Produces(MediaType.TEXT_PLAIN)

