- fmt: '### Cloud Provider Specific Configuration Sources


    `Payara Micro` can retrieve properties from various cloud provider configuration
    sources; setting up these properties is beyond the scope of this chapter; retrieving
    them is no different from what we have already seen. `Payara Micro` can retrieve
    properties from the following cloud provider specific configuration sources:


    - `AWS Secrets`

    - `Azure Secrets`

    - `DynamoDB`

    - `Google Cloud Platform Secrets`

    - `HashiCorp Secrets`


    Consult your cloud provider documentation for instructions on how to set properties
    on the preceding configuration sources.


    ### Custom Configuration Sources


    So far, we’ve discussed all `MicroProfile Config` standard configuration sources,
    as well as `Payara` specific `MicroProfile Config` configuration sources. If none
    of the provided configuration sources meet our needs, we can implement our own
    custom `MicroProfile Config` configuration source.


    To develop a custom `MicroProfile Config` configuration source, we need to implement
    the `org.eclipse.microprofile.config.spi.ConfigSource` interface. This interface
    has three abstract methods:


    - `public Set<String> getPropertyNames()` returns a set containing all the property
    names as strings.

    - `public String getValue(String propName)` returns the `String` value of a property;
    it expects the property name as an argument.

    - `public String getName()` returns the name of our custom configuration source.


    At a minimum, we need to implement the preceding three methods in our custom configuration
    source. Additionally, the `ConfigSource` interface has two default methods, which
    we could optionally override as well:


    `public int getOrdinal()` returns the ordinal value of our custom configuration
    source; if we don’t override this method, then the ordinal value of our configuration
    source defaults to `100`.


    `public Map<String, String> getProperties()` returns a map containing keys of
    our configuration source as keys and the string value of each property as the
    corresponding value.


    The following example illustrates how to implement a custom `MicroProfile Config`
    configuration source:


    ```java

    package com.ensode.mpcustomconfigsource;

    //imports omitted

    public class ExternalPropertyFileConfigSource implements

    ConfigSource {

    private static final Logger LOGGER =

    Logger.getLogger(

    ExternalPropertyFileConfigSource.class.getName());

    private static final String CONFIG_SOURCE_NAME =

    "ExternalPropFile";

    private Map propertyMap;

    public ExternalPropertyFileConfigSource() throws IOException {

    Properties properties = new Properties();

    String homeDir = System.getProperty("user.home");

    String configFilePath = String.format(

    "%s/config/config.properties", homeDir);

    InputStream inputStream;

    try {

    inputStream = new FileInputStream(configFilePath);

    properties.load(inputStream);

    } catch (FileNotFoundException ex) {

    LOGGER.log(Level.SEVERE, String.format(

    "%s not found!", configFilePath), ex);

    }

    propertyMap = (Map) properties;

    }

    @Override

    public Set getPropertyNames() {

    return propertyMap.keySet();

    }

    @Override

    public String getValue(String propName) {

    String retVal = null;

    var propVal = propertyMap.get(propName);

    if (propVal != null) {

    retVal = propVal.toString();

    }

    return retVal;

    }

    @Override

    public String getName() {

    return CONFIG_SOURCE_NAME;

    }

    }

    ```


    In this example, we are reading properties from a property file in a named `config.properties`
    in a `config` subdirectory in the user’s home directory. In the constructor for
    our class, we read the property file and populate a `Map` implementation with
    its property names and keys, with the corresponding values as values.


    Our `getPropertyNames()` implementation simply returns the value of the `keySet()`
    method in our map, which does exactly what we need, return the property names
    in our configuration source in a set.


    Our `getValue()` implementation simply retrieves the value from the map containing
    our properties and returns its `toString()` implementation; if the property name
    does not exist or is null, we simply return null.


    We named our custom configuration source `"ExternalPropFile"`; we assigned this
    value to the `CONFIG_SOURCE_NAME` constant and returned this constant from our
    `getName()` implementation.


    Before we can use our custom configuration source, we need to register it; we
    can do this by creating a file named `org.eclipse.microprofile.config.spi.ConfigSource`
    containing the fully qualified name of our custom configuration source. In our
    example, the file would contain the fully qualified name of the example class
    before, as follows:


    ```

    com.ensode.mpcustomconfigsource.ExternalPropertyFileConfigSource

    ```


    We need to place this file under `META-INF/services` directory in our WAR file.
    When using Maven to build our code, we can place the file under `src/main/resources/META-INF/services`;
    Maven will place it in the correct location when building our code. Figure [5-5](#519485_1_En_5_Chapter.xhtml#Fig5)
    illustrates the correct directory tree.


    ![](images/519485_1_En_5_Chapter/519485_1_En_5_Fig5_HTML.jpg)


    **Figure 5-5** Custom configuration source directory tree


    We can then retrieve properties as usual via the `MicroProfile Config` API. Suppose
    our external property file had a couple of properties as follows:


    ```

    sample.property1=first value

    sample.property2=second value

    ```


    We could retrieve the value of one of the properties via injection or via the
    `Config` class as usual, for instance, injecting the property value as follows:


    ```java

    @Inject

    @ConfigProperty(name = "sample.property1")

    private String prop1;

    ```'
