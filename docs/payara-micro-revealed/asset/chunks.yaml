- fmt: '# Summary


    In this chapter, we covered how documentation for our RESTful web services is
    generated automatically from JAX-RS annotations, resulting in documentation that
    is never out of date with the code.


    Then we covered how to use OpenAPI annotations to customize the generated documentation.


    Lastly, we covered how to configure OpenAPI via MicroProfile Config and via `asadmin`
    commands.


    # 11. Security with JSON Web Tokens


    Traditionally, security in web applications has been implemented by keeping data
    about the logged-in user in the HTTP session. With microservices being inherently
    stateless, this approach is not suitable for a microservices architecture. To
    address security, MicroProfile has support for JSON Web Token (JWT).


    JSON Web Tokens are a mechanism used to implement stateless security in microservices.


    JWT is a JSON-based text format used for exchanging information between systems.
    JWT is an open standard, specified under RFC 7519. A JWT’s information is encapsulated
    in *claims*, which are essentially key value pairs. MicroProfile requires JWTs
    to be digitally signed using the RSA-SHA256 algorithm.


    JWTs can contain arbitrary claims, all of them optional; the MicroProfile JWT
    specification, though, requires specific claims.


    | **JWT Claim** | **Description** |

    | --- | --- |

    | `iss` | Token issuer |

    | `at` | The time the token was issued, it is specified as a long value representing
    the number of seconds between January 1, 1970 UTC and the issued time |

    | `exp` | The time the token will expire, it is specified as a long value representing
    the number of seconds between January 1, 1970 UTC and the expiration time |

    | `upn` | The username of the logged-in principal |


    In addition to the required claims, the MicroProfile JWT specification recommends
    the following claims to be present in a JWT:


    | **JWT Claim** | **Description** |

    | --- | --- |

    | `jti` | Unique identifier for the JWT |

    | `aud` | Identifies the recipients that the JWT is intended for, interpretation
    of audience values is application specific |

    | `groups` | Any security groups (AKA roles) that the user belongs to |


    ## Obtaining a Token


    A JWT is typically obtained from some sort of identity server; when deploying
    to the cloud, most cloud providers provide a way to obtain a JWT to use with their
    servers. If deploying applications in-house, a JWT is typically obtained by an
    identity server tool deployed in-house, for example, something like the open source
    Keycloak tool or through commercial identity servers such as Okta or similar.


    For testing and learning purposes, these tools are a bit overkill; thankfully,
    there is an open source tool developed by the prolific Java consultant Adam Bien,
    the tool is called *jwtenizr*, we can use it to quickly and easily generate a
    JWT for testing purposes.


    `jwtenizr` can be downloaded from [*http://jwtenizr.sh/*](http://jwtenizr.sh/);
    it is a self-contained, executable JAR file; we can generate a token by issuing
    the following command from the command line:


    ```

    java -jar jwtenizr.jar

    ```


    The preceding command will generate output similar to the following:


    ```

    Enable verbose output with java -Dverbose -jar jwtenizr.jar [optional: an URI
    for the generated curl]

    The generated token token.jwt contains information loaded from: jwt-token.json

    Adjust the groups[] to configure roles and upn to change the principal in jwt-token.json
    then re-execute JWTenizr

    The iss in jwt-token.json has to correspond with the mp.jwt.verify.issuer in microprofile-config.properties

    Copy the microprofile-config.properties to your WAR/src/main/resources/META-INF

    Use the following command for testing:

    curl -i -H''Authorization: Bearer eyJraWQiOiJqd3Qua2V5IiwidHlwIjoiSldUIiwiYWxnIjoiUlMyNTYifQ.eyJzdWIiOiJkdWtlIiwidXBuIjoiZHVrZSIsImF1dGhfdGltZSI6MTYzOTQwODk4NywiaXNzIjoiYWlyaGFja3MiLCJncm91cHMiOlsiY2hpZWYiLCJoYWNrZXIiXSwiZXhwIjoxNjM5NDA5OTg3LCJpYXQiOjE2Mzk0MDg5ODcsImp0aSI6IjQyIn0.GnSwzNSO7EfKRD-ANqYhaVQuY8HIRdp29r-8K3lqpjCb2bByRmkdqTl9HPW4ePfqe0K7wpr_1Nfir12CPSb9e4i1PWw-qZxf9pPpEIeLRVB-_8p_n6FaTCkt4uSB12fcBMaLh2PZGOAnK5uWjAY1V-noD-KxmX_BsZnhSOssMa-0FnmevXlYPcRcbauVUxlTOACzFwdxpcRSq_Ms9QMh_5TctQZtq59VTnpOnfOZBIHd3eS0zB6AHqqNNtioPW8syX6iZxweSQkBX0pmYBaQxC2iUExhUOTmzEnDeBjaJ5EcdvAZ0-98w2GIqnZrftBlQvtWt25MKmNIl_NAtmBKZQ''
    http://localhost:8080

    [10:23:07:548]JWT generated

    ```


    Notice that the output of the tool includes example usage on how to invoke secured
    services using `curl`, very handy when testing our services.


    `jwtenizr` generates a number of files:


    - `jwtenizr-config.json`: A JSON file we can use to configure `jwtenizr`, can
    be used to customize the JWT issuer and the location of the generated sample MicroProfile
    configuration file; it will be read in subsequent executions of `jwtenizr`.


    - `jwt-token.json`: Cleartext version of the generated JWT.


    - `microprofile-config.properties`: Sample `microprofile-config.properties` we
    can use to configure our secured applications.


    - `token.jwt`: Base 64 encoded version of the generated JWT.


    Although JWT is fairly configurable, its defaults will suffice for our purposes.
    By default, `jwtenizr` generates a token for a user called "duke", belonging to
    groups "chief" and "hacker", issued by "airhacks", and expiring 16 minutes and
    40 seconds (1,000 seconds) from the time the token was created.


    ## Securing Microservices with JSON Web Tokens


    Securing our RESTful web services is primarily done via a few simple MicroProfile
    Config properties and some annotations.


    ### MicroProfile Config JWT Properties


    As previously mentioned, JSON Web Tokens are digitally signed; this is done by
    encrypting the token with the issuer''s private key. To verify the validity of
    the token, we need to decrypt it with the issuer''s public key.


    MicroProfile JWT provides a standard configuration property we can use to specify
    the public key; the name of the property is `mp.jwt.verify.publickey`; its value
    must be the Base 64 encoded public key; this value is typically provided by whichever
    identity service we may be using. In our example, the value appears in the sample
    MicroProfile configuration file generated by `jwtenizr`.


    Alternatively, we could put the public key in a text file and either publish that
    text file in a URL or place it inside the JAR file; in a typical Maven project,
    the file containing the public key would be placed under `src/main/resources`
    or one of its subdirectories.


    If, for example, we placed the key under `src/main/resources/keys/publicKey.pem`,
    the value of the `mp.jwt.verify.publickey` property would be `/keys/publicKey.pem`;
    if, instead, we placed the public key directly in `src/main/resources`, then the
    corresponding property value would be `/publicKey.pem`.


    In addition to specifying the public key, we need to specify the issuer of the
    token; this is specified in the `iss` claim of the JWT we are using and can be
    obtained from the cleartext JSON Web Token we are using to authenticate. `jwtenizr`
    uses `airhacks` as its default issuer; therefore, we must configure our application
    accordingly. `jwtenizr` conveniently generates a `microprofile-config.properties`
    we can use; it should look similar to the following:


    ```

    #generated by jwtenizr

    #Mon Dec 13 18:05:17 EST 2021

    mp.jwt.verify.

    mp.jwt.verify.issuer=airhacks

    ```


    Placing the file under `src/main/resources/META-INF` in our Maven project will
    take care of our JWT configuration needs.'
