    ## 总结


    本章介绍了在 Payara Micro MicroProfile 和 Jakarta EE 应用程序中可用的上下文与依赖注入 API。我们了解了如何为 CDI
    托管 Bean 分配作用域，以及如何在 Bean 初始化或销毁时执行逻辑。


    此外，我们还介绍了如何通过 `@Inject` 注解，将 CDI Bean 轻松注入到 Payara Micro 管理的任何对象中，例如 RESTful Web
    服务或其他 CDI Bean。


    我们还解释了 CDI 事件处理机制，该机制允许我们编写松耦合的应用程序。我们介绍了如何使用 CDI 事件在 CDI 作用域初始化或销毁时编写应用程序逻辑，然后利用这一新知识实现了一个巧妙技巧：在
    WAR 文件部署后立即执行逻辑。接着，我们进一步运用这一知识，使用 MicroProfile RESTful Web 服务 API 开发了命令行 RESTful
    Web 服务客户端。


    # 5. 应用程序配置


    MicroProfile 包含一个名为 MicroProfile Config 的配置 API（名称恰如其分），它标准化了应用程序的配置方式。配置用于设置可能因环境而异的数值，例如数据库
    URL 或文件系统中的目录。MicroProfile Config 标准化了我们检索属性以获取应用程序配置值的方式。


    ## 配置源


    配置应用程序有三种标准方式：通过 WAR 文件内的 *microprofile-config.properties* 文件、通过 Java 系统属性以及通过环境变量。我们还可以添加自定义配置源。


    配置源具有由其*序数值*定义的优先级；序数值越高，优先级越高。表 5-1 总结了所有标准配置源的序数值。


    表 5-1


    MicroProfile 配置源的默认序数值


    | 配置源 | 默认序数值 |

    | --- | --- |

    | microprofile-config.properties | 100 |

    | 环境变量 | 300 |

    | 系统属性 | 400 |


    除了标准的 MicroProfile Config 配置源之外，Payara Micro 还实现了许多额外的配置源，可用于配置应用程序（本章稍后讨论）。表
    5-2 列出了所有 Payara Micro 特定的配置源及其默认序数值。


    表 5-2


    Payara Micro 配置源的默认序数值


    | 配置源 | 默认序数值 |

    | --- | --- |

    | 目录 | 90 |

    | 密码 | 105 |

    | 域 | 110 |

    | JNDI | 115 |

    | 配置 | 120 |

    | 服务器 | 130 |

    | 应用程序 | 140 |

    | 模块 | 150 |

    | 集群 | 160 |

    | JDBC | 190 |

    | LDAP | 200 |

    | 特定云提供商 | 180 |


    可以通过向配置源添加 `config_ordinal` 属性来覆盖默认序数值；例如，如果我们希望将 *microprofile-config.properties*
    的序数值提高到高于环境变量（序数值为 300）但低于系统属性（序数值为 400），可以在 *microprofile-config.properties*
    中添加一个值介于它们序数值之间的属性，例如：


    ```

    config_ordinal=350

    ```


    如我们所见，*microprofile-config.properties* 在标准配置源中具有最低的序数值；这对于我们希望包含打包在应用程序中的默认配置值非常有用，这些值可以通过设置相应的环境变量或系统属性轻松覆盖。


    请注意，无论使用何种配置源，检索属性的 API 都是完全相同的；MicroProfile Config API 会从优先级最高的源开始查找属性，依次向下到优先级最低的配置源，直到找到匹配的属性名称。

