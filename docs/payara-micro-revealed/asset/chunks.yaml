    在本章中，我们介绍了如何使用 MicroProfile Config API 配置应用程序。


    我们讨论了 MicroProfile Config 规范要求的标准配置源。此外，还介绍了 Payara Micro 实现的额外 MicroProfile Config
    配置源。我们还了解了如何实现自己的自定义配置源。


    我们还介绍了如何通过转换器将字符串属性转换为 Java 对象。我们讨论了 MicroProfile 规范提供的标准转换器，以及 Payara Micro 提供的额外转换器。此外，我们还了解了如何实现自己的自定义
    MicroProfile Config 转换器。


    # 6. 指标


    MicroProfile Metrics API 允许我们轻松生成监控数据（例如 CPU 负载、磁盘空间使用量、HTTP 请求数量等）。Payara Micro
    提供了一个指标端点，无需我们额外操作即可提供这些数据。


    MicroProfile 有四个指标端点：


    *   */metrics/base* 由 MicroProfile 标准定义，意味着所有 MicroProfile 实现（如 Payara Micro）都必须实现它。它提供有关运行
    Payara Micro 实例的 JVM 的信息，例如加载到内存中的 Java 类数量、JVM 运行时间、JVM 内存信息等。


    *   */metrics/vendor* 允许我们检索供应商特定的指标信息。


    *   */metrics/application* 允许我们检索应用程序特定的指标，这些指标可以通过注解生成。


    *   */metrics* 显示所有指标信息，包括 */metrics/base*、*/metrics/vendor* 和 *metrics/application*
    中的数据。


    MicroProfile Metrics API 生成的数据旨在供监控工具读取，这些工具可以在应用程序使用过多 CPU、内存、磁盘空间或出现其他警告时自动提醒我们。默认情况下，MicroProfile
    Config 端点的输出采用 *Prometheus* 格式。


    Prometheus 是一个非常流行的开源监控工具。由于 Prometheus 非常流行，其他几种监控工具也采用了它读取指标数据的格式。通过以 Prometheus
    格式生成数据，MicroProfile Config 自动与多种监控工具兼容。如果我们希望以 JSON 格式接收指标数据，只需在请求中将 *Accept*
    HTTP 头设置为 *application/json* 即可。


    ## 基础指标


    我们可以通过向 Payara Micro 实例的 */metrics/base* 端点发送 GET 请求来访问基础指标。


    例如，使用 curl 向本地工作站上运行的 Payara Micro 实例发送请求


    ```

    curl http://localhost:8080/metrics/base

    ```


    将产生类似以下的输出：

