- fmt: '# Providing an Alternative Solution When Execution Fails


    By default, any exceptions thrown from RESTful web service endpoints result in
    an exception being thrown in the client; however, we can gracefully recover from
    errors via the `@Fallback` annotation. When using `@FallBack`, we can specify
    an alternate method that will be executed instead of the failing endpoint; this
    method can be specified via the `fallbackMethod` attribute of `@Fallback`, as
    illustrated in the following example:


    ```

    package com.ensode.faulttolerance;

    //imports omitted

    @RequestScoped

    @Path("faulttoleranceexample")

    public class FaulToleranceExampleResource {

    @Fallback(fallbackMethod = "fallbackMethod")

    @POST

    @Produces(MediaType.TEXT_PLAIN)

    @Path("fallback")

    public String fallbackExample(@QueryParam("success") boolean success) {

    if (success == false) {

    throw new RuntimeException(

    "forcing a failure for demo purposes");

    } else {

    return "Call succeeded";

    }

    }

    private String fallbackMethod(boolean success) {

    return "Something went wrong";

    }

    }

    ```


    To specify a fallback method, we simply indicate the method name as a `String`
    as the value of the `fallbackMethod` attribute of `@Fallback`; the fallback method
    must have the same return type and parameters as the potentially failing endpoint;
    notice in our example, both the method implementing the endpoint and the fallback
    method return a `String` and take a single `boolean` as a parameter; in general,
    the return value and the parameter types of the endpoint and corresponding fallback
    method must match.


    If the endpoint invocation succeeds, then nothing out of the ordinary happens;
    if it fails, then the fallback method is invoked instead. For instance, if we
    send a request to the endpoint we defined in our example and that method fails,
    we will instead get the output from the fallback method.


    ```

    $ curl -XPOST http://localhost:8080/faulttolerance/webresources/faulttoleranceexample/fallback?success=false

    Something went wrong

    ```


    Using a fallback method is great if we wish to implement alternate functionality
    if our endpoint ends; however, what if instead we would like to get some diagnostic
    information about the failing endpoint? In that case, we can indicate a fallback
    handler class via the `value` attribute of `@Fallback`. A fallback handler must
    be a class implementing the `FallbackHandler` interface; this interface has a
    single abstract method called `handle()` ; this method accepts an instance of
    `ExecutionContext` as a parameter; we can use this parameter to obtain information
    about the failing method.


    The following example illustrates how to implement a fallback handler:


    ```

    package com.ensode.faulttolerance;

    //imports omitted

    @Dependent

    public class ExampleFallbackHandler

    implements FallbackHandler {

    private static final Logger LOGGER =

    Logger.getLogger(ExampleFallbackHandler.class.getName());

    @Override

    public String handle(ExecutionContext ec) {

    Throwable throwable = ec.getFailure();

    Method buggyMethod = ec.getMethod();

    Object[] parameters = ec.getParameters();

    LOGGER.log(Level.SEVERE, String.format(

    "%s thrown when invoking %s method with parameters: %s",

    throwable.getClass().getName(), buggyMethod.getName(),

    Arrays.asList(parameters)));

    return "Something went wrong, check the logs\n";

    }

    }

    ```


    Our `FallbackHandler` implementation must be a CDI bean; the easiest way to turn
    it into one is to use one of the scope annotations; for `FallbackHandler` implementations,
    it is usually a good idea to use the `@Dependent` pseudoscope, which will cause
    the `FallbackHandler` implementation to use the same scope as the RESTful web
    service utilizing it.


    The `FallbackHandler` interface has a generic type argument; its abstract `handle()`
    method returns the type we specify, which, in our example, is `String`; its `handle()`
    method is automatically invoked by the MicroProfile runtime; it passes an instance
    of a class implementing the `ExecutionContext` interface, which we can use to
    obtain information about the failed invocation. As shown in the example, we can
    invoke its `getFailure()` method to obtain the `Throwable` (typically an `Exception`)
    that was thrown from the endpoint.


    Additionally, we can invoke `ExecutionContext.getMethod()` to obtain a reference
    to the method that failed; we can obtain the method name as a `String` by invoking
    its `getName()` method.


    Finally, we can obtain the arguments that were passed to the failing endpoint
    by invoking the `getParameters()` method on `ExecutionContext`.


    Our example sends this information to the Payara Micro log and returns a `String`
    to the client.


    In order to use our `FallbackHandler` implementation, we need to specify it as
    the value of the `@Fallback` annotation in the method implementing the endpoint,
    as illustrated in the following example:


    ```

    package com.ensode.faulttolerance;

    //imports omitted

    @RequestScoped

    @Path("faulttoleranceexample")

    public class FaulToleranceExampleResource {

    @Fallback(ExampleFallbackHandler.class)

    @POST

    @Produces(MediaType.TEXT_PLAIN)

    @Path("fallbackhandler")

    public String fallbackHandlerExample(

    @QueryParam("success") boolean success) {

    if (success == false) {

    throw new RuntimeException(

    "forcing a failure for demo purposes");

    } else {

    return "Call succeeded";

    }

    }

    }

    ```


    As seen in the example, all we have to do to defer to a `FallbackHandler` implementation
    in case of failure is to add the `FallbackHandler` class as the value of the `@Fallback`
    annotation.


    If a call to the endpoint fails, our `FallbackHandler` implementation takes over.


    ```

    $ curl -XPOST http://localhost:8080/faulttolerance/webresources/faulttoleranceexample/fallbackhandler?success=false

    Something went wrong, check the logs

    ```


    If we check the Payara Micro output or log file, we can see the information we
    retrieved from `ExecutionContext`, which can be used to diagnose and correct the
    issue.


    ```

    [2021-10-20T14:00:27.797-0400] [] [SEVERE] [] [com.ensode.faulttolerance.ExampleFallbackHandler]
    [tid: _ThreadID=77 _ThreadName=http-thread-pool::http-listener(2)] [timeMillis:
    1634752827797] [levelValue: 1000] java.lang.RuntimeException thrown when invoking
    fallbackHandlerExample method with parameters: [false]

    ```


    By default, `@Falback` takes over if any exception is thrown from the endpoint.
    If we wish to limit the fallback functionality to a certain set of exceptions,
    we can do so via the `applyOn` attribute of `@Fallback`; this attribute accepts
    an array of child classes of `Exception` as its value, for example:


    ```

    @Fallback(SomeFallBackHandler.class, failOn={ReallyBadException.class, EvenWorseException.class})

    ```


    Similarly, we can specify exceptions to ignore via the `skipOn` attribute of `@Fallback`.


    ```

    @FallBack(fallbackMethod="someMethod", skipOn={DumbException.class, IsThisEvenAnIssueException.class})

    ```'
