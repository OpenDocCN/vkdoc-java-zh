    ## Vendor Metrics


    At the time of writing, Payara Micro provides a single vendor metric; we can access
    it by sending an HTTP request to `/metrics/vendor`:


    ```

    curl http://localhost:8080/metrics/vendor

    ```


    which would result in output similar to the following:


    ```prometheus

    # TYPE vendor_system_cpu_load gauge

    # HELP vendor_system_cpu_load Display the "recent cpu usage" for the whole system.
    This value is a double in the [0.0,1.0] interval. A value of 0.0 means that all
    CPUs were idle during the recent period of time observed, while a value of 1.0
    means that all CPUs were actively running 100% of the time during the recent period
    being observed. All values betweens 0.0 and 1.0 are possible depending of the
    activities going on in the system. If the system recent cpu usage is not available,
    the method returns a negative value.

    vendor_system_cpu_load 0.021788129226145758

    ```


    Or if we wish to receive Payara Micro’s vendor-specific metric data in JSON format,
    we set the `Accept` HTTP header as usual:


    ```

    curl -H "Accept: application/json"  http://localhost:8080/metrics/vendor

    ```


    which would, unsurprisingly, result in getting the Payara Micro vendor-specific
    metric data in JSON format.


    ```json

    {

    "system.cpu.load": 0.015595463137996219

    }

    ```


    Payara Server allows us to expose JMX beans as custom vendor metrics; at the time
    of writing, this functionality is not available in Payara Micro.


    ## Application Metrics


    MicroProfile metrics provides a number of annotations we can use to annotate our
    methods, which can provide application metrics with very little effort on our
    part.


    Most MicroProfile metrics annotations have a common set of attributes:


    *   `absolute`: A boolean value indicating if the name of the metric should be
    absolute or if it should be appended to the fully qualified name of the class.

    *   `description`: A description for our metric.

    *   `displayName`: A human-readable display for the metric.

    *   `name`: The name of the metric, if not specified, defaults to the method name
    we are annotating.

    *   `tags`: Used to differentiate metrics with the same name.

    *   `unit`: The unit of measurement for the metric.'
