    通过 `@ConfigProperty` 注解读取配置属性简单直接；然而，它不够灵活；当我们部署应用程序时，尝试读取的属性可能不存在，在这种情况下我们会得到一个异常；此外，也无法有条件地将属性值赋给变量。为了涵盖这些用例并提供更大的灵活性，MicroProfile
    Config 提供了一个 `Config` 类，可用于以编程方式检索属性值。以下示例说明了其用法：


    ```

    package com.ensode.mp.config.example;

    //imports omitted

    @RequestScoped

    @Path("mpconfigexample")

    public class MpConfigDemoService {

    private static final Logger LOGGER = Logger.getLogger(MpConfigDemoService.class.getName());

    @Inject

    private Config config;

    private String projectStage;

    @POST

    @Produces(MediaType.APPLICATION_JSON)

    public void processPostRequest() {

    projectStage = config.getValue("project.stage", String.class);

    LOGGER.log(Level.INFO, String.format("Project stage is: %s", projectStage));

    ProjectStageEnum projectStageEnum = ProjectStageEnum.valueOf(projectStage.toUpperCase());

    if (ProjectStageEnum.DEVELOPMENT.equals(projectStageEnum)) {

    LOGGER.log(Level.INFO, "processPostRequest() method invoked");

    }

    if (ProjectStageEnum.DEVELOPMENT.equals(projectStageEnum)) {

    LOGGER.log(Level.INFO, "leaving processPostRequest() method");

    }

    }

    }

    ```


    在这里，我们修改了之前的示例以使用 `Config` 类；正如我们所见，`Config` 可以通过 CDI 的 `@Inject` 注解进行注入；然后我们可以通过其
    `getValue()` 方法检索属性值，其第一个参数是一个包含要检索的属性名称的 `String`，第二个参数是属性值变量的类型。在我们的例子中，我们将属性赋值给一个
    `String`；因此，我们使用 `String.class` 作为 `Config.getValue()` 的第二个参数；例如，如果我们检索的是一个整数值，我们会使用
    `Integer.class` 作为 `Config.getValue()` 的第二个参数。


    我们也可以通过调用 `ConfigProvider.getConfig()` 来获取 `Config` 的实例，但通过 CDI 注入更简单直接。


    我们现在已经了解了如何从标准的 *microprofile-config.property* 文件中检索属性；正如我们所见，这种配置方法简单直接；然而，如果需要更改属性的值，则必须修改文件，并重新构建和重新部署代码。在我们的示例中，我们需要为不同的环境（开发、测试、生产等）提供不同版本的属性文件。因此，有时希望将配置信息放在部署模块之外。MicroProfile
    Config 规范定义了两种实现此目的的方法：通过环境变量和通过 Java 系统属性检索属性；我们接下来将讨论这些方法。


