    ## 嵌入 Payara Micro


    我们可以将 Payara Micro 嵌入到其他 Java 应用程序中。这样做允许我们通过 Payara Micro 的 Java API 以编程方式启动/停止/部署应用程序等。以下示例说明了如何执行此操作：


    ```

    package com.ensode.embeddedpayaramicroexample;

    import fish.payara.micro.BootstrapException;

    import fish.payara.micro.PayaraMicro;

    import java.io.File;

    public class Main {

    public void startPayaraMicro() throws BootstrapException {

    File warFile = new File("/path/to/some.war");

    PayaraMicro.getInstance().

    setHttpAutoBind(true).

    bootStrap().deploy("applicationname",

    "contextroot", warFile);

    }

    public static void main(String[] args)

    throws BootstrapException {

    new Main().startPayaraMicro();

    }

    }

    ```


    `PayaraMicro` 类是一个单例；它有一个静态的 `getInstance()` 方法，该方法返回 `PayaraMicro` 实例；我们可以通过调用
    setter 和 getter 方法来以编程方式配置 Payara Micro；例如，在我们的示例中，我们调用了 `setHttpAutoBind(true)`，这相当于在命令行运行时向
    Payara Micro 传递 *--autoBind* 命令行参数。对于熟悉从命令行运行 Payara Micro 的人来说，配置 Payara Micro
    的 API 非常直观；请参阅 [`https://javadoc.io/doc/fish.payara.extras/payara-micro/latest/index.html`](https://javadoc.io/doc/fish.payara.extras/payara-micro/latest/index.html)
    上的官方 Payara Micro API JavaDoc；特别值得关注的是 `fish.payara.micro` 包，尤其是 `PayaraMicro`
    类和 `PayaraMicroRuntime` 接口。


    一旦我们配置了嵌入的 Payara Micro 实例，我们就调用它的 `bootstrap()` 方法，该方法返回一个 `PayaraMicroRuntime`
    接口的实现；要部署我们的 WAR 文件，我们调用它的 `deploy()` 方法，该方法接受三个参数：一个定义我们应用程序名称的 `String`，一个定义
    WAR 文件上下文根的 `String`，以及一个代表我们 WAR 文件的 `java.io.File` 实例。


    然后，我们可以像运行任何其他独立的 Java 应用程序一样运行我们的应用程序。对于 Maven 项目，最简单的方法是使用 Exec Maven 插件，它会自动从我们的项目依赖项中设置类路径；例如：


    ```

    mvn exec:java -Dexec.mainClass="com.ensode.embeddedpayaramicroexample.Main"

    ```


    将运行我们的应用程序，该应用程序又会启动一个 Payara Micro 实例；然后我们可以像往常一样向这个 Payara Micro 实例发送 HTTP 请求。


    ## 总结


    在本章中，我们介绍了 Payara Micro 超越 Jakarta EE 和 MicroProfile 标准的功能。我们解释了 Payara Micro
    实例如何自动集群。我们还介绍了如何在集群节点之间共享应用程序作用域的 CDI Bean，以及如何通过网络将 CDI 事件发送到部署在集群中其他 Payara
    Micro 实例上的监听器。


    此外，我们还介绍了如何创建所谓的 Uber JAR 文件，这些文件是可执行的 JAR 文件，其中包含我们的应用程序代码和 Payara Micro 运行时，允许我们通过运行一个可执行的
    JAR 文件来启动 Payara Micro 并部署我们的代码。


    然后，我们介绍了如何将 Payara Micro 嵌入到我们的 Java 应用程序中，以及如何配置和部署我们的应用程序并以编程方式启动 Payara Micro。


    # 13. Payara Cloud


    通常，将应用程序部署到云环境涉及的工作远不止“仅仅”开发应用程序；可能需要配置“Pod”（通常是精简版的虚拟 Linux 服务器）来运行我们的应用程序；在应用程序正常运行之前，可能需要开发复杂的配置文件。


    必须执行所有这些管理任务正是流行的 *DevOps* 术语的由来，软件开发人员现在需要负责传统上由系统管理员执行的任务。这些任务通常超出了典型软件开发人员的专业领域；开发团队在最初将应用程序迁移到云环境时，经历一段“烈火试炼”期并不罕见，他们必须快速学习所有现在成功部署应用程序所需的额外管理任务。


    Payara Cloud 在云中提供一个 Payara Micro 实例，并自动执行所有必要的配置；只需要部署一个标准的 WAR 文件；所有配置都会自动生成，类似于部署到更传统的“重量级”Jakarta
    EE 应用服务器。


    ## 注册 Payara Cloud


    要注册 Payara Cloud，请访问以下 URL：[`https://payara.cloud/#subscribe`](https://payara.cloud/%2523subscribe)。


    在撰写本文时，Payara Cloud 尚未向公众开放；Payara 的优秀员工允许我们预览 Payara Cloud，以便我们可以在书中进行介绍。感谢 Payara
    产品经理兼开发者倡导者 Rudy De Busscher，以及 Payara 营销团队！


    有三种计划可供选择，以满足您的预算和需求。有基础版、标准版和高级版计划，每个计划都提供额外的计算资源（如 CPU 和 RAM）以及不同级别的支持。请访问上述
    URL 了解每个计划的详细信息。


    ## 为 Payara Cloud 开发应用程序


    为部署到 Payara Cloud 而开发应用程序并不比为本地 Payara Micro 实例开发应用程序需要额外的努力。如果您的应用程序可以在 Payara
    Micro 中成功部署和运行，那么它部署到 Payara Cloud 后也能很好地部署和运行。


    ## 将应用程序部署到 Payara Cloud


    Payara Cloud 有一个 *命名空间* 的概念；命名空间是一组相关的应用程序。


    在您首次将应用程序上传到 Payara Cloud 之前，您需要创建一个命名空间。

    '
- fmt: '### Creating a Namespace


    A namespace can be created by clicking on the `Create New Namespace` button at
    the top right of the welcome screen of the Payara Cloud web-based interface, as
    illustrated in Figure [13-1](#519485_1_En_13_Chapter.xhtml#Fig1).


    ![](images/519485_1_En_13_Chapter/519485_1_En_13_Fig1_HTML.jpg)


    Figure 13-1: Creating a namespace


    When creating a namespace, we need to enter a `Project` name and `Stage`, as illustrated
    in Figure [13-2](#519485_1_En_13_Chapter.xhtml#Fig2).


    ![](images/519485_1_En_13_Chapter/519485_1_En_13_Fig2_HTML.jpg)


    Figure 13-2: Namespace project and stage


    The project name can be anything we want; the stage should be something like "development,"
    "test," "production," or similar.


    After entering our project name and stage, we click on `Create namespace`, and
    our namespace is created, as illustrated in Figure [13-3](#519485_1_En_13_Chapter.xhtml#Fig3).


    ![](images/519485_1_En_13_Chapter/519485_1_En_13_Fig3_HTML.jpg)


    Figure 13-3: Created namespace


    The generated namespace name is derived from the project name and stage we entered
    during creation; the name is suffixed by a few random characters to avoid clashing
    with other namespaces created in Payara Cloud.


    Once we have created a namespace, we are ready to upload an application to Payara
    Cloud.


    ### Uploading Applications


    On any of our namespaces, we can deploy an application by simply uploading any
    WAR file we have successfully deployed to a local Payara Micro instance. We can
    do so by clicking on `Upload Application` at the bottom of our namespace''s web
    user interface, as illustrated in Figure [13-4](#519485_1_En_13_Chapter.xhtml#Fig4).


    ![](images/519485_1_En_13_Chapter/519485_1_En_13_Fig4_HTML.jpg)


    Figure 13-4: Uploading an application to Payara Cloud


    If we check `Deploy Immediately`, the application will be immediately deployed
    using a default configuration; if we leave it unchecked, we will need to configure
    and deploy the application ourselves.


    We can give our application a name; if the application was built with Maven, Payara
    Cloud will use the artifact ID of our WAR file as the application name by default;
    if this is the behavior we want, then we don''t need to specify an application
    name.


    If we did not deploy our application immediately, the application will have a
    status of `Configured` right after we upload it; we can edit the application''s
    default configuration by clicking on `Revision Actions` and then on `Edit Configuration`
    as illustrated in Figure [13-5](#519485_1_En_13_Chapter.xhtml#Fig5).


    ![](images/519485_1_En_13_Chapter/519485_1_En_13_Fig5_HTML.jpg)


    Figure 13-5: Navigation to application configuration


    In the application configuration screen, we can select a runtime size for our
    application, as well as a context root and Internet accessible paths, as illustrated
    in Figure [13-6](#519485_1_En_13_Chapter.xhtml#Fig6).


    ![](images/519485_1_En_13_Chapter/519485_1_En_13_Fig6_HTML.jpg)


    Figure 13-6: Modifying application configuration


    By default, all paths in our application are exposed to the Internet; if we wish
    to expose only certain RESTful web service endpoints or pages to the Internet,
    we can specify space-separated paths in the `Internet-Accessible Paths` field;
    for example, if we only wanted paths starting with `/public` or `/default` to
    be Internet accessible, we would enter the following value to that field:


    ```

    /public* /default*

    ```


    For our example, it is fine to have all paths Internet accessible; therefore,
    we can accept the default `/*` value, which allows this.


    We can save our configuration by clicking `Save`.


    At this point, our application is still in `Configured` status; we need to deploy
    it by clicking on `Revision Actions`, followed by `Deploy`.


    After a few seconds, our application status changes to `Deployed`, as illustrated
    in Figure [13-7](#519485_1_En_13_Chapter.xhtml#Fig7).


    ![](images/519485_1_En_13_Chapter/519485_1_En_13_Fig7_HTML.jpg)


    Figure 13-7: Deployed application


    At this point, our application is live; we can see its URL at the top right of
    the Payara Cloud application management console.


    ## Running Applications in Payara Cloud


    Now that our application is deployed, we can simply click on the URL displayed
    at the top right of the Payara Cloud application management console; we can see
    the default `index.html` page displayed on our browser, served by Payara Cloud,
    as illustrated in Figure [13-8](#519485_1_En_13_Chapter.xhtml#Fig8).


    ![](images/519485_1_En_13_Chapter/519485_1_En_13_Fig8_HTML.jpg)


    Figure 13-8: Application successfully deployed to Payara Cloud


    What we are seeing here is the default `index.html` page created by the Payara
    Maven plug-in; it won''t win any web design contests, but it proves our application
    has been successfully deployed and is online.


    Since we didn''t restrict any paths from being Internet accessible, we can send
    HTTP requests via `curl` or any related tools.


    For example, the following `curl` command sends a request to our Payara Cloud
    deployed application:


    ```

    curl -XGET https://payara-book-test-e3f9afb3.payara.app/cdi-dependency-injection/webresources/cdiservice?countryAbbrev=UK

    ```


    We then get the expected result back:


    ```

    {"abbreviation":"UK","name":"United Kingdom"}

    ```


    ### Default Domains


    As we can see from our examples above, the generated domain name (`https://payarabook-test-e3f9afb3.payara.app`
    in our example) is not very pretty or memorable; it will serve our purposes just
    fine for development or testing purposes; however, for production, we probably
    want to provide our user with a nice, easy-to-remember domain name. Payara Cloud
    Standard and Premium plans allow us to define a custom domain name.


    ### Custom Domains


    To create a custom domain name, click on `Namespace Actions` at the top right
    of the Payara Cloud namespace management console and then click on `Custom Domain`,
    as illustrated in Figure [13-9](#519485_1_En_13_Chapter.xhtml#Fig9).


    ![](images/519485_1_En_13_Chapter/519485_1_En_13_Fig9_HTML.jpg)


    Figure 13-9: Navigating to custom domain name configuration


    We then specify our custom domain in the `Custom Domain Name` field as illustrated
    in Figure [13-10](#519485_1_En_13_Chapter.xhtml#Fig10); the domain name must be
    a valid domain we have registered with a domain registrar.


    ![](images/519485_1_En_13_Chapter/519485_1_En_13_Fig10_HTML.jpg)


    Figure 13-10: Custom domain name configuration


    We then need to click `Set Custom Domain`; on the next page, we are provided with
    a CNAME DNS record we can use to update our domain with the domain name registrar
    we used to obtain our domain. Figure [13-11](#519485_1_En_13_Chapter.xhtml#Fig11)
    illustrates an example CNAME DNS Record provided by Payara Cloud.


    The procedure to update the CNAME DNS Record varies depending on the domain registrar,
    but it typically is done via a web-based interface provided by the registrar.


    ![](images/519485_1_En_13_Chapter/519485_1_En_13_Fig11_HTML.jpg)


    Figure 13-11: CNAME DNS Record configuration


    Once we have updated the CNAME DNS Record, we can click on `Check DNS` to make
    sure it was set up correctly. If that was the case, we can now use our custom
    domain to access our application.


    ## Summary


    In this chapter, we provided an introduction to Payara Cloud and how it can be
    used to deploy applications to the cloud without needing to update complex configuration
    files.


    We covered how to sign up to Payara Cloud and how any application that deploys
    successfully against Payara Micro can be deployed to Payara Cloud.


    We also covered how to configure applications deployed to Payara Cloud, including
    how to set up the runtime size, how to set the context root, and how to hide paths
    from the Internet, if necessary.


    Additionally, we covered how to access our applications after they have been successfully
    deployed to Payara Cloud.


    Finally, we covered how to use custom domains for our Payara Cloud applications.'
