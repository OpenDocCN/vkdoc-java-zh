- fmt: '# Obtaining Information from a Token


    We can inject an instance of `org.eclipse.microprofile.jwt.JsonWebToken` into
    our JAX-RS resource; this class has a number of getter methods we can use to extract
    information from the token that was used to access the page.


    ```

    package com.ensode.jwtdemo;

    //additional imports omitted

    import org.eclipse.microprofile.jwt.JsonWebToken;

    @RequestScoped

    @Path("jwtdemo")

    public class JwtDemoResource {

    private static final Logger LOGGER = Logger.getLogger(JwtDemoResource.class.getName());

    @Inject

    private JsonWebToken jsonWebToken;

    @GET

    @Produces(MediaType.TEXT_PLAIN)

    @RolesAllowed({"chief"})

    public String secured() {

    LOGGER.log(Level.INFO, String.format("Audience: %s",

    jsonWebToken.getAudience()));

    LOGGER.log(Level.INFO, String.format("Expiration Time: %s",

    jsonWebToken.getExpirationTime()));

    LOGGER.log(Level.INFO, String.format("Groups: %s",

    jsonWebToken.getGroups()));

    LOGGER.log(Level.INFO, String.format("Issued at time: %s",

    jsonWebToken.getIssuedAtTime()));

    LOGGER.log(Level.INFO, String.format("Issuer: %s",

    jsonWebToken.getIssuer()));

    LOGGER.log(Level.INFO, String.format("Name: %s",

    jsonWebToken.getName()));

    LOGGER.log(Level.INFO, String.format("Raw Token: %s",

    jsonWebToken.getRawToken()));

    LOGGER.log(Level.INFO, String.format("Subject: %s",

    jsonWebToken.getSubject()));

    LOGGER.log(Level.INFO, String.format("Token ID: %s",

    jsonWebToken.getTokenID()));

    return "Secured endpoint accessed successfully\n";

    }

    }

    ```


    The following table lists all the getter methods we can use to extract information
    from the token, along with the corresponding claim where the information is extracted
    from.


    | Getter Method | JWT Claim | Description |

    | --- | --- | --- |

    | `getAudience()` | aud | Intended audience |

    | `getExpirationTime()` | exp | Expiration time, as the number of seconds since
    January 1, 1970 UTC |

    | `getGroups()` | groups | The groups (or roles) the user belongs to |

    | `getIssuedAtTime()` | iat | The time the token was issued, expiration time,
    as the number of seconds since January 1, 1970 UTC |

    | `getIssuer()` | iss | Organization that issued the token |

    | `getName()` | upn | Unique Principal Name (the username) |

    | `getRawToken()` | N/A | Base 64 encoded string representing the token (the value
    that we pass as the HTTP authorization header) |

    | `getSubject()` | sub | Additional identifier for the user could be used to store
    the user’s full name (i.e., “John Doe”) |

    | `getTokenId()` | jti | JSON Token ID |


    All of the preceding getter methods are for claims that the MicroProfile JWT specification
    either requires or recommends; if any of the recommended claims is not present,
    the getter will return `null`. A JWT token, though, may have an arbitrary number
    of claims, many of which we don’t have a getter method for.


    If we know in advance the name of a claim whose value we would like to retrieve,
    we can do so by invoking the `claim()` method on an instance of `JsonWebToken`;
    for example, if we know our token has a claim named “foo”, we can obtain its value
    by invoking `jsonWebToken.claim("foo")`.


    There may be times when we don’t know in advance all the claim names in our token;
    to handle this situation, the `JsonWebToken` class has a `claimNames()` method
    that returns a set of strings containing all the claim names in our token; we
    can use this set to obtain the values of all claims in our token; the following
    example illustrates how to do this:


    ```

    package com.ensode.jwtdemo;

    //imports omitted

    @RequestScoped

    @Path("jwtdemo")

    public class JwtDemoResource {

    private static final Logger LOGGER = Logger.getLogger(JwtDemoResource.class.getName());

    @Inject

    private JsonWebToken jsonWebToken;

    @GET

    @Produces(MediaType.TEXT_PLAIN)

    @RolesAllowed({"chief"})

    public String secured() {

    Set claimNames = jsonWebToken.getClaimNames();

    LOGGER.log(Level.INFO, "--- Begin Token Claims");

    claimNames.forEach(claimName -> LOGGER.log(Level.INFO,

    String.format("%s: %s", claimName,

    jsonWebToken.claim(claimName).orElse(""))));

    LOGGER.log(Level.INFO, "--- End Token Claims");

    return "Secured endpoint accessed successfully\n";

    }

    }

    ```


    In this example, we obtain a `Set` of `String` containing all the claim names,
    then traverse the set and extract the value of each claim, and then send the output
    to the Payara Micro output. Recall that `JsonWebToken.claim()` returns an `Optional`;
    in our example, if the `Optional` happens to be empty, use an empty `String` (`""`)
    as the corresponding value.


    ## Summary


    In this chapter, we covered how to secure our RESTful web services with JSON Web
    Tokens.


    We covered how to obtain a token so that we can use it to secure our applications;
    we then explained how to configure our RESTful web services so that they require
    authentication.


    Additionally, we covered how to securely invoke a secured RESTful web service.


    Finally, we covered how to extract information from a JSON Web Token in our code.


    # Payara Micro Specific Features


    In previous chapters, we’ve been focusing primarily on Payara Micro’s implementation
    of the MicroProfile standard. The benefit of coding against a standard is that
    we are not tied to a specific implementation, as code written against the standard
    can be deployed to any implementation.


    In this chapter, we will cover some Payara Micro specific features that, while
    very useful, are specific to Payara Micro and not portable across implementations.


    ## Automatic Clustering


    Clustering is done automatically in Payara Micro; when two instances of Payara
    Micro are started on the same network, they automatically cluster together, with
    absolutely no configuration needed.


    If we don’t want Payara Micro instances to join a cluster, we can start Payara
    Micro with the `--noCluster` command-line argument


    Payara Micro (and Payara Server, for that matter) has an in-memory data grid used
    to share data across instances in a cluster. Payara’s data grid is based on the
    popular open source Hazelcast in-memory data grid. For the most part, the data
    grid is transparent to us as application developers deploying applications to
    Payara Micro; however, it is used behind the scenes to implement Payara Micro
    specific clustering features, such as having application scoped CDI beans be shared
    across a cluster and allowing to fire CDI events to observer methods running on
    another instance of Payara Micro on the same cluster.'
