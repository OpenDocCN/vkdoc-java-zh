- fmt: '### Path Parameters


    Path parameters are added to a RESTful web services path when invoked; for example,
    the following RESTful web service URI contains two path parameters; the first
    parameter value is "Mr"; the second one is "Heffelfinger".


    `http://localhost:8080/webresources/pathparams/Mr/Heffelfinger`


    In order for our RESTful web services to accept path parameters, we need to add
    the `@Path` annotation at the method level, as well as the `@PathParam` annotation
    for each method argument corresponding to a path parameter.


    ```

    package com.ensode.pathparams;

    //imports omitted

    @Path("pathparams")

    public class PathParamsSampleService {

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    @Path("/{title}/{lastName}")

    public String sayFormalHello(@PathParam("title") String title,

    @PathParam("lastName") String lastName) {

    return String.format("{\n"

    + "  \"msg\":\"Hello, %s %s\"\n"

    + "}", title, lastName);

    }

    }

    ```


    The method-level `@Path` annotation provides a URI template, specifying the location
    of each path parameter. In our example, the first parameter is called `title`;
    the second parameter is called `lastName`; we specify the order in which we expect
    path parameters by using the `@Path` annotation in this manner.


    To bind path parameters to method arguments, we used the `@PathParam` annotation
    as illustrated in the example; notice that the value of the `@PathParam` annotation
    must match the name of the URI template variables specified in the method-level
    `@Path` annotation (`title` and `lastName`, in our example).


    When a client invokes our service, it is expected for the client to pass the expected
    parameters in the right order; for example, we could invoke our service using
    `curl` as follows:


    `curl http://localhost:8080/webresources/pathparams/Mr/Heffelfinger`


    In this case, `Mr` corresponds to the value of our first parameter, as defined
    in the URI template of the method-level `@Path` annotation; `Heffelfinger` corresponds
    to the second path parameter, again defined in the URI template; these values
    are automatically bound to the corresponding method arguments by annotating these
    arguments with the `@PathParam` annotation whose values match the URI variables
    defined in the URI template (`title` and `lastName`, in our example).


    Once we invoke our service, it will return a JSON string with the corresponding
    values.


    ```

    {

    "msg":"Hello, Mr Heffelfinger"

    }

    ```


    ### Query Parameters


    The second way we can pass parameters to our RESTful web services is via query
    parameters. In this case, parameters are sent as a query containing name value
    pairs in the URI for our web service.


    For example, using `curl`, we could pass query parameters to a RESTful web service
    endpoint as follows:


    ```

    curl "http://localhost:8080/webresources/queryparams?title=Mr&lastName=Heffelfinger"

    ```


    In this example, the URI for the RESTful web service endpoint is `http://localhost:8080/webresources/queryparams`;
    this example has two parameters, named `title` and `lastName`. A question mark
    is used to delimit the boundary between the URI and the query.


    ```

    package com.ensode.queryparams;

    //imports omitted

    @Path("queryparams")

    public class QueryParamsSampleService {

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public String sayFormalHello(@QueryParam("title") String title,

    @QueryParam("lastName") String lastName) {

    return String.format("{\n"

    + "  \"msg\":\"Hello, %s %s\"\n"

    + "}", title, lastName);

    }

    }

    ```


    Parameter names are defined by the `@QueryParam` annotation; values sent by the
    client are automatically bound to the corresponding method arguments. Output of
    this example would be identical to the path parameters examples we discussed in
    the previous section.


    ## Parsing JSON Data


    RESTful web services can consume and produce data in various formats, with JSON
    being by far the most common one.


    Jakarta RESTful Web Services can automatically convert JSON data to and from Java
    with almost no effort on our part. Having a Java class with fields matching a
    JSON string''s properties will result in those fields being automatically populated
    with the corresponding values. All we need to do is annotate our method with the
    `@Consumes` and `@Produces` annotations using the appropriate media type.


    ```

    package com.ensode.jsonprocessing;

    //imports omitted

    @Path("messageprocessor")

    public class MessageProcessor {

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    public Message processMessage(Message message) {

    Message returnedMessage = new Message();

    returnedMessage.setMsgText(message.getMsgText().

    toUpperCase());

    return returnedMessage;

    }

    }

    ```


    Our `Message` class is a simple POJO (plain old Java object).


    ```

    package com.ensode.jsonprocessing;

    public class Message {

    private String msgText;

    public String getMsgText() {

    return msgText;

    }

    public void setMsgText(String msgText) {

    this.msgText = msgText;

    }

    }

    ```


    In our example, the client is expected to send a JSON string that can be parsed
    into a `Message` object. By simply annotating our method with the `@Consumes`
    annotation and specifying `application/json` as the media type, data from the
    client is used to automatically populate an instance of our `Message` class.


    We could invoke our service using `curl` as follows:


    ```

    curl -X PUT http://localhost:8080/webresources/messageprocessor -H "Content-Type:
    application/json" -d ''{"msgText":"Yay for seamless JSON parsing!"}''

    ```


    Notice that the JSON data we are sending to the service has a `msgText` property;
    this property is used to populate the corresponding `msgText` instance variable
    in our `Message` class.


    Our example service method returns another instance of the `Message` class, since
    we are using the `@Produces` annotation with a media type of `application/json`;
    this return value is automatically converted to a JSON string, which we can see
    in the output of the preceding `curl` command.


    ```

    {"msgText":"YAY FOR SEAMLESS JSON PARSING!"}

    ```


    ## Summary


    In this chapter, we saw how we can develop RESTful web services with the Jakarta
    RESTful Web Services API. We saw how using a few simple annotations can convert
    a Java class to a RESTful web service and handle HTTP requests, including GET,
    PUT, POST, DELETE, and PATCH requests.


    We also covered parameters to our RESTful web services. We saw how to process
    path parameters via the `@PathParam` annotation. Additionally, we saw how to process
    query parameters via the `@QueryParam` annotation.


    Finally, we saw how we can seamlessly parse JSON strings and populate our Java
    objects and how to easily generate JSON strings from plain old Java objects.


    # 3. Developing Microservice Clients


    In a typical microservice architecture, an application is composed from a number
    of independently developed and deployed microservices. These microservices need
    to communicate with one another over the network. By far, the most common way
    to implement this functionality is to have microservices developed as RESTful
    web services, with some microservices acting as RESTful web service clients for
    others.


    Payara Micro supports the MicroProfile REST client API, which greatly simplifies
    the development of RESTful web service clients.'
