    ## Disabling Request Tracing


    We can disable tracing of any web service endpoint by simply annotating it with
    `@Traced(false)`, for example, in the `hireEmployee()` method of `EmployeeResource`:


    ```

    @Traced(false)

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee)

    throws InterruptedException {

    //simulate slow processing

    Thread.sleep(100);

    employeeList.add(employee);

    employeeEvent.fire(employee);

    }

    ```


    ## Customizing the Operation Name


    By default, the generated operation name in a span is the fully qualified name
    of the method being invoked (if the method was invoked as the direct result of
    an HTTP request, then the method name is preceded by the HTTP request type (PUT,
    GET, POST, etc.).


    If we wish to customize the operation name displayed on the span, we can do so
    by setting the `operationName` attribute on the `@Traced` annotation; for example,
    in the `hireEmployee()` method of `EmployeeResource`, we could do the following:


    ```

    @Traced(operationName = "employeeHire")

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee)

    throws InterruptedException {

    //simulate slow processing

    Thread.sleep(100);

    employeeList.add(employee);

    employeeEvent.fire(employee);

    }

    ```


    which would result in the following output in the Payara Micro console (for brevity,
    only the relevant span is shown):


    ```

