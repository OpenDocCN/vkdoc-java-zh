  raw: '### @Counted


    The `@Counted` annotation indicates the number of times our method has been called;
    the counter value is increased automatically every time our method gets called.


    ```

    @GET

    @Counted

    @Path("counted")

    @Produces(MediaType.TEXT_PLAIN)

    public String countedExample() {

    return "Counter was just increased\n";

    }

    ```


    After calling our endpoint a few times, we can see the output by sending a GET
    request to the /metrics/application endpoint in Payara Micro:


    ```

    # TYPE application_com_ensode_applicationmetrics_MetricsDemo_countedExample_total
    counter

    application_com_ensode_applicationmetrics_MetricsDemo_countedExample_total{_app="application-metrics-1.0-snapshot"}
    3

    ```


    Or in JSON format:


    ```

    {

    "com.ensode.applicationmetrics.MetricsDemo.countedExample;_app=application-metrics-1.0-snapshot":
    3

    }

    ```


    ### @Gauge


    This annotation can only be applied to methods returning numeric objects (`Long`,
    `Short`, `Integer`, `Float`, `Double`) or their corresponding primitive types;
    it exposes the return value as a metric.@GET


    ```

    @Gauge(unit = "some unit")

    @Path("gauge")

    @Produces(MediaType.TEXT_PLAIN)

    public int gaugeExample() {

    gaugeVal += 2;

    return gaugeVal;

    }

    ```


    The unit attribute of `@Gauge` is required; we can assign any arbitrary string
    value to it; for instance, if we were returning the number of employees in an
    organization, the unit could be `"employees"`; if we were returning the number
    of widgets produced in a factory, the unit could be `"widgets";` and so on and
    so forth.


    Output for `@Gauge` in Prometheus format looks like the following:


    ```

    # TYPE application_com_ensode_applicationmetrics_MetricsDemo_gaugeExample_some_unit
    gauge

    application_com_ensode_applicationmetrics_MetricsDemo_gaugeExample_some_unit{_app="application-metrics-1.0-snapshot"}
    8

    ```


    Or in JSON format:


    ```

    "com.ensode.applicationmetrics.MetricsDemo.gaugeExample;_app=application-metrics-1.0-snapshot":
    10

    {

    "com.ensode.applicationmetrics.MetricsDemo.gaugeExample;_app=application-metrics-1.0-snapshot":
    8

    }

    ```


    ### @ConcurrentGauge


    This annotation displays the number of concurrent calls to a method (typically
    a REST endpoint) at any particular point in time.


    ```

    @GET

    @ConcurrentGauge

    @Path("concurrentGauge")

    @Produces(MediaType.TEXT_PLAIN)

    public void concurrentGaugeExample() throws InterruptedException {

    TimeUnit.SECONDS.sleep(10);

    }

    ```


    In our example, we are simply sleeping for ten seconds; this allows us to make
    a few calls to the endpoint and call the metrics endpoint so that we can get relevant
    example data.


    Output for `@ConcurrentGauge` looks like the following:


    ```

    # TYPE application_com_ensode_applicationmetrics_MetricsDemo_concurrentGaugeExample_current
    gauge

    application_com_ensode_applicationmetrics_MetricsDemo_concurrentGaugeExample_current{_app="application-metrics-1.0-snapshot"}
    3

    # TYPE application_com_ensode_applicationmetrics_MetricsDemo_concurrentGaugeExample_min
    gauge

    application_com_ensode_applicationmetrics_MetricsDemo_concurrentGaugeExample_min{_app="application-metrics-1.0-snapshot"}
    0

    # TYPE application_com_ensode_applicationmetrics_MetricsDemo_concurrentGaugeExample_max
    gauge

    application_com_ensode_applicationmetrics_MetricsDemo_concurrentGaugeExample_max{_app="application-metrics-1.0-snapshot"}
    3

    ```


    `@ConcurrentGauge` returns not only the concurrent number of invocations to the
    method but also the minimum and maximum number of concurrent invocations to the
    method in the previous minute.


    JSON format output of `@ConcurrentGauge` looks as follows:


    ```

    {

    "com.ensode.applicationmetrics.MetricsDemo.concurrentGaugeExample": {

    "current;_app=application-metrics-1.0-snapshot": 3,

    "min;_app=application-metrics-1.0-snapshot": 0,

    "max;_app=application-metrics-1.0-snapshot": 3

    }

    }

    ```


    ### @Metered


    This annotation generates the number of times a method has been called, as well
    as the rate per second of calls during the lifetime of the application, as well
    as the rate per second in the last minute, last five minutes, and last fifteen
    minutes.


    ```

    @GET

    @Metered

    @Path("metered")

    @Produces(MediaType.TEXT_PLAIN)

    public String meteredExample() {

    return "Metered method invoked\n";

    }

    ```


    Output of `@Metered` looks like the following:


    ```

    application_com_ensode_applicationmetrics_MetricsDemo_meteredExample_total{_app="application-metrics-1.0-snapshot"}
    5

    18k

    # TYPE application_com_ensode_applicationmetrics_MetricsDemo_meteredExample_rate_per_second
    gauge

    application_com_ensode_applicationmetrics_MetricsDemo_meteredExample_rate_per_second{_app="application-metrics-1.0-snapshot"}
    0.007269820214059275

    # TYPE application_com_ensode_applicationmetrics_MetricsDemo_meteredExample_one_min_rate_per_second
    gauge

    application_com_ensode_applicationmetrics_MetricsDemo_meteredExample_one_min_rate_per_second{_app="application-metrics-1.0-snapshot"}
    0.01806938732711853

