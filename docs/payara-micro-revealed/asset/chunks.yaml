- fmt: '### Generating HTTP GET Requests


    To handle HTTP GET requests, our REST client interface needs to be annotated with
    the `@Path` and `@RegisterRestClient` annotations; the value of the `@Path` annotation
    needs to match the value of the service we are calling. HTTP GET requests are
    handled by the `@GET` annotation; if the RESTful web service method we are calling
    returns a response, it will typically be a JSON string; therefore, we should add
    the `@Produces` annotation with the appropriate value; matching the annotations
    and values of the service we are calling will typically yield the desired results.


    The following code snippet illustrates a typical RESTful web service client interface
    that sends an HTTP GET request to a RESTful web service:


    ```

    @Path("sample")

    @RegisterRestClient

    public interface SampleRestfulServiceClient {

    @GET

    @Produces(value = MediaType.APPLICATION_JSON)

    String processGetRequest();

    }

    ```


    We specify the URI of the RESTful web service we are calling via the `microprofile-config.properties`
    file.


    ```

    com.ensode.restclient.SampleRestfulServiceClient/mp-rest/url=http://localhost:8080/webresources

    ```


    Recall that the root URI must match the value defined in the `Application` class
    in the RESTful web service project.


    We can then inject our interface via CDI in order to invoke the method and generate
    the GET request. We inject the interface via the `@Inject` and `@RestClient` annotations.
    An implementation of our interface is automatically generated and injected; we
    then simply invoke the method annotated with `@GET` to generate the GET request
    and optionally store the response in a variable.


    The following example illustrates this process:


    ```

    package com.ensode.restclient;

    //imports omitted

    @ApplicationScoped

    public class RestfulClient {

    private static final Logger LOGGER =

    Logger.getLogger(RestfulClient.class.getName());

    @Inject

    @RestClient

    private SampleRestfulServiceClient sampleRestfulServiceClient;

    public void init(

    @Observes @Initialized(ApplicationScoped.class)

    Object object) {

    String returnedGetData;

    LOGGER.log(Level.INFO, "--- Sending HTTP GET request ");

    returnedGetData =

    sampleRestfulServiceClient.processGetRequest();

    LOGGER.log(Level.INFO, String.format(

    "--- GET request response: %s", returnedGetData));

    }

    }

    ```


    We can run our client application in Payara Micro by invoking the `war:exploded`
    and `payara-micro:start` Maven goals from the command line.


    ```

    mvn war:exploded payara-micro:start

    ```


    We should see the expected output of our log statement on the Payara Micro output
    on the console:


    ```

    [2021-08-20T14:58:59.463-0400] [] [INFO] [] [com.ensode.restclient.RestfulClient]
    [tid: _ThreadID=1 _ThreadName=main] [timeMillis: 1629485939463] [levelValue: 800]
    --- GET request response: {"msg":"Service processed HTTP GET request!"}

    ```


    which is the expected output from the service we are invoking, which we developed
    in Chapter [2](#519485_1_En_2_Chapter.xhtml).


