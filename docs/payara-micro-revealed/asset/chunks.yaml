    如我们所见，在监听器端，我们使用限定符来指示每个监听器方法将处理哪个事件。如果未在监听器上指定限定符，则该方法将处理与 `Country` 类对应的所有事件。


    我们可以像之前一样通过 curl 向服务发送 HTTP PUT 请求：


    ```

    curl -X PUT http://localhost:8080/cdi-events/webresources/countryservice -H "Content-Type:
    application/json" --data ''{"abbreviation":"TS","name":"Test"}''

    ```


    如果我们检查 Payara Micro 的输出，可以看到监听器生成的日志条目：


    ```

    [2021-09-07T08:46:39.610-0400] [] [INFO] [] [com.ensode.cdievents.CountryEventLogger]
    [tid: _ThreadID=76 _ThreadName=http-thread-pool::http-listener(1)] [timeMillis:
    1631018799610] [levelValue: 800] Event fired for the following country: Test

    [2021-09-07T08:46:39.610-0400] [] [INFO] [] [com.ensode.cdievents.CountryManager]
    [tid: _ThreadID=76 _ThreadName=http-thread-pool::http-listener(1)] [timeMillis:
    1631018799610] [levelValue: 800] Updating the following country: Test

    ```


    注意，我们之前的监听器被调用了；由于其参数没有限定符，因此对于 `Country` 类任何实例的每个事件，它都会被调用。此外，我们可以看到带有 `@Updated`
    限定符的监听器方法被调用了；这是因为 HTTP PUT 请求导致服务中带有 `@PUT` 注解的 `updateCountry()` 方法被调用，该方法会触发一个带有
    `@Updated` 限定符的 Country 事件。毫不意外，监听带有 `@Deleted` 限定符的 Country 事件的监听器方法没有被调用；为此，我们需要向服务发送
    HTTP DELETE 请求。


    ```

    curl  -X DELETE http://localhost:8080/cdi-events/webresources/countryservice?countryAbbrev=TS

    ```


    当我们检查 Payara Micro 输出时，可以看到相应的事件监听器方法被调用了。


    ```

    [2021-09-07T08:59:31.208-0400] [] [INFO] [] [com.ensode.cdievents.CountryEventLogger]
    [tid: _ThreadID=76 _ThreadName=http-thread-pool::http-listener(1)] [timeMillis:
    1631019571208] [levelValue: 800] Event fired for the following country: Test

    [2021-09-07T08:59:31.209-0400] [] [INFO] [] [com.ensode.cdievents.CountryManager]
    [tid: _ThreadID=76 _ThreadName=http-thread-pool::http-listener(1)] [timeMillis:
    1631019571209] [levelValue: 800] Deleting the following country: Test

    ```


    正如预期，未限定的事件监听器方法和带有 `@Deleted` 限定符的事件方法都被调用了。


    ### 观察 CDI 作用域


    除了允许我们通过限定符创建自定义事件类型外，CDI 还包含一些内置限定符，允许我们在 CDI 作用域初始化或销毁时实现一些逻辑。


    这些限定符接受一个类参数，指示它们将监听哪个 CDI 作用域；例如，要让监听器在应用程序作用域初始化时被调用，我们可以使用类似以下的代码：


    ```

    public void applicationScopeInitListener(@Observes @Initialized(ApplicationScoped.class)
    Object object){

    //实际逻辑写在这里

    }

    ```


    我们需要在监听器中有一个 Object 类型的参数，仅仅是因为它需要用 `@Observes` 和 `@Initialized` 注解进行标注；我们实际上不需要在方法体中使用该参数。`@Destroyed`
    和 `@BeforeDestroyed` 限定符遵循相同的模式；`@BeforeDestroyed` 会导致监听器方法在 CDI 作用域即将销毁时被调用；`@Destroyed`
    则导致监听器方法在作用域销毁后立即被调用。


    表 4-2 列出了每个 CDI 作用域下，用作 `@Initialized`、`@Destroyed` 和 `@BeforeDestroyed` 参数的类型。


    表 4-2


    CDI 作用域类


    | CDI 作用域 | 类型 |

    | --- | --- |

    | 请求 | `RequestScoped.class` |

    | 会话 | `SessionScoped.class` |

    | 应用程序 | `ApplicationScoped.class` |


    注意，这些类型对应于声明 CDI Bean 作用域时使用的注解。


    监听应用程序作用域初始化允许我们在应用程序执行之前执行一些代码。借助此功能，可以编写具有 MicroProfile 和 Jakarta EE API 全部功能的“命令行”应用程序。一个常用的技巧是从监听器方法中使用
    MicroProfile RESTful 客户端 API 编写 RESTful Web 服务客户端。以下示例说明了如何实现：


    ```

    package com.ensode.cdievents.client;

    //导入已省略

    @ApplicationScoped

    public class CountryServiceClient {

    private static final Logger LOGGER = Logger.getLogger(CountryServiceClient.class.getName());

    @Inject

    @RestClient

    private CountryService cdiService;

    public void updateCountries(

    @Observes @Initialized(ApplicationScoped.class) Object o) {

    Country testCountry = new Country("TS", "Test");

    Country albanya = new Country("AL", "Albanya");

    Country albania = new Country("AL", "Albania");

    cdiService.updateCountry(testCountry);

    cdiService.deleteCountry(testCountry.getAbbreviation());

    cdiService.updateCountry(albanya);

    cdiService.updateCountry(albania);

    }

    }

    ```


    在这个例子中，我们有一个应用程序作用域的 Bean，其中包含一个带有 `@Observes` 和 `@Initialized(ApplicationScoped.class)`
    注解的监听器方法，这会导致该方法在应用程序作用域初始化时被调用。由于我们的类是应用程序作用域的 CDI Bean，我们可以通过 `@Inject` 和 `@RestClient`
    注解将 RESTful Web 服务客户端接口注入其中。


    你可能还记得我们之前讨论 MicroProfile RESTful 客户端 API 时提到，RESTful 客户端接口是一个 Java 接口，其方法签名与相应
    RESTful Web 服务的方法签名相匹配。


    在我们的客户端中，我们简单地初始化一个 POJO 传递给客户端，该 POJO 由 MicroProfile 运行时转换为 JSON 字符串，并作为请求体传递给我们的服务，或者将任何必需的查询或路径参数传递给我们的方法。


    我们可以像往常一样，借助 Maven WAR 和 Payara Micro 插件运行我们的客户端：


    ```

    mvn war:exploded payara-micro:start

    ```


    运行客户端后，我们可以在 Payara Micro 的服务输出中看到预期的结果。

