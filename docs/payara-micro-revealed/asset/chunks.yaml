    (build 4579) ready in 8,542 (ms)

    [2021-09-15T08:08:48.085-0400] [] [INFO] [] [com.ensode.mp.config.example.MpConfigDemoService]
    [tid: _ThreadID=78 _ThreadName=http-thread-pool::http-listener(2)] [timeMillis:
    1631707728085] [levelValue: 800] Project stage is: production

    [2021-09-15T08:33:14.192-0400] [] [INFO] [] [fish.payara.micro.cdi.extension.ClusteredCDIEventBusImpl]
    [tid: _ThreadID=83 _ThreadName=payara-executor-service-scheduled-task] [timeMillis:
    1631709194192] [levelValue: 800] Clustered CDI Event bus initialized

    ```


    我们可以通过修改 *microprofile-config.properties* 将属性值更改为 `development`。


    ```

    project.stage=development

    ```


    我们重新运行应用程序并发送另一个 POST 请求；这次额外的输出被发送到了 Payara Micro 日志中。


    ```

    [2021-09-15T08:45:42.535-0400] [] [INFO] [] [com.ensode.mp.config.example.MpConfigDemoService]
    [tid: _ThreadID=76 _ThreadName=http-thread-pool::http-listener(2)] [timeMillis:
    1631709942535] [levelValue: 800] Project stage is: development

    [2021-09-15T08:45:42.537-0400] [] [INFO] [] [com.ensode.mp.config.example.MpConfigDemoService]
    [tid: _ThreadID=76 _ThreadName=http-thread-pool::http-listener(2)] [timeMillis:
    1631709942537] [levelValue: 800] processPostRequest() method invoked

