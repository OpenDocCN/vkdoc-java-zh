- fmt: '### Adding Additional Information to Spans


    Another way we can customize spans is by adding custom tags to the generated JSON
    strings. To do this, we need to add an additional dependency for the OpenTracing
    API; when using Maven, we can do this by adding an additional `<dependency>` tag
    to our `pom.xml` file, as in the following example (for brevity, only relevant
    parts of `pom.xml` are shown):


    ```

    4.0.0

    com.ensode

    request-tracing

    1.0-SNAPSHOT

    war

    request-tracing


    fish.payara.api

    payara-bom

    ${version.payara}

    pom

    import


    io.opentracing

    opentracing-api

    ```


    Most Maven projects for applications to be deployed to Payara Micro should include
    the `payara-bom` dependency in its `<dependencyManagement>` section.


    A Maven Bill of Materials (BOM) dictates the correct version of dependencies to
    our project. By using a BOM, we can add a dependency to our project without specifying
    its version, the correct version that will work with our other dependencies is
    declared in the BOM.


    `payara-bom` includes a dependency for `opentracing-api` in its `<dependencyManagement>`
    section; therefore, when adding this dependency to our project, we don’t need
    to specify a version, as seen in the preceding `pom.xml` file.


    Once we have added the necessary dependency, we need to inject an instance of
    `io.opentracing.Tracer` into our code and use it to add custom tags to our spans.


    ```

    package com.ensode.requesttracing;

    import io.opentracing.Tracer;

    //additional imports omitted

    @ApplicationScoped

    @Path("employeeservice")

    public class EmployeeResource {

    @Inject

    private Tracer tracer;

    private List employeeList = new CopyOnWriteArrayList(); //thread safe

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee) throws InterruptedException {

    //simulate slow processing

    Thread.sleep(100);

    tracer.activeSpan().setTag(

    "employee", String.format("%s %s", employee.getFirstName(),

    employee.getLastName()));

    employeeList.add(employee);

    }

    }

    ```


    As we can see in the example, we obtain an instance of `io.opentracing.Span` representing
    the current span by invoking `Tracer.activeSpan()`; from that, we invoke the `setTag()`
    method, which has two parameters: a `String` for the tag name, plus an additional
    parameter for the value. There are three overloaded versions of `setTag()`; the
    second parameter could be a `String`, a `boolean`, or a `Number` (any numeric
    value); in our example, we used the version with two Strings, since we are adding
    a tag containing the hired employee’s first and last names.


    We can see our custom tag by invoking our RESTful web service as usual; our custom
    tag will be displayed in the JSON string for our span.


    ```

    {"operationName":"PUT:com.ensode.requesttracing.EmployeeResource.hireEmployee","spanContext":{"spanId":"db583e67-b160-4acd-8e14-1543381848b1","traceId":"3410bb5f-016c-45c4-a0ef-fd67124af853"},"startTime":"2021-11-15T11:33:54.479-05:00[America/New_York]","endTime":"2021-11-15T11:33:54.680121-05:00[America/New_York]","traceDuration":"201116000","spanTags":[{"http.status_code":
    "204"},{"component": "jaxrs"},{"span.kind": "server"},{"http.url": "http://localhost:8080/requesttracing/webresources/employeeservice"},{"employee":
    "Jose Jimenez"},{"http.method": "PUT"}],"references":[{"spanContext":{"spanId":"b7b53629-7890-43d1-9dc4-1c736d21f1cc","traceId":"d5d2cca0-b1b4-4688-8c06-f545c256a1be"},"relationshipType":"ChildOf"},{"spanContext":{"spanId":"42a56b8d-183a-49ef-bc0b-0c322a81930f","traceId":"3410bb5f-016c-45c4-a0ef-fd67124af853"},"relationshipType":"ChildOf"}]}

    ```


    ### Creating Additional Spans


    We can add custom spans to the current trace by invoking `Tracer.buildSpan()`,
    as illustrated in the following example:


    ```

    package com.ensode.requesttracing;

    //imports omitted

    @ApplicationScoped

    @Path("employeeservice")

    public class EmployeeResource

    @Inject

    private Tracer tracer;

    private List employeeList = new CopyOnWriteArrayList(); //thread safe

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee) throws InterruptedException {

    Span customSpan;

    Tracer.SpanBuilder spanBuilder =

    tracer.buildSpan("customSpan");

    customSpan = spanBuilder.start();

    //simulate slow processing

    Thread.sleep(215);

    customSpan.finish();

    employeeList.add(employee);

    }

    }

    ```


    `Tracer.buildSpan()` creates an instance of the `SpanBuilder` class, which is
    an inner class of `Tracer`; this method takes a single argument, a `String` indicating
    the operation name of our custom span.


    When we actually want to start our custom span, we need to invoke the `start()`
    method on the `SpanBuilder` instance we created when invoking `buildSpan()`; to
    stop our custom span, we invoke its `finish()` method; when we execute the endpoint
    containing our custom tag, we will be able to see it in the Payara Micro console
    output.'
