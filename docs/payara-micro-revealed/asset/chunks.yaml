    ## Observing CDI Scopes


    In addition to allowing us to create custom event types via qualifiers, CDI includes
    a few built-in qualifiers that allow us to implement some logic whenever a CDI
    scope is initialized or destroyed.


    These qualifiers take a class parameter indicating the CDI scope they will listen
    for; for example, to have a listener invoked when the application scope is initialized,
    we would use code similar to the following:


    ```

    public void applicationScopeInitListener(@Observes @Initialized(ApplicationScoped.class)
    Object object){

    //actual logic goes here

    }

    ```


    We need to have a parameter in the listener of type `Object`, just because it
    needs to be annotated with the `@Observes` and `@Initialized` annotations; we
    don’t actually need to use the parameter in the body of our method. The `@Destroyed`
    and `@BeforeDestroyed` qualifiers follow the same pattern; `@BeforeDestroyed`
    causes a listener method to be invoked just before a CDI scope is destroyed; `@Destroyed`
    results in a listener method being invoked right after a scope is destroyed.


    Table [4-2](#519485_1_En_4_Chapter.xhtml#Tab2) lists the types to use as parameters
    to `@Initialized`, `@Destroyed`, and `@BeforeDestroyed` for each CDI scope.


    **Table 4-2** CDI Scope Classes


    | CDI Scope | Type |

    | --- | --- |

    | Request | `RequestScoped.class` |

    | Session | `SessionScoped.class` |

    | Application | `ApplicationScoped.class` |


    Notice that the types correspond to the annotations used when declaring the scope
    for a CDI bean.


    Listening for application scope initialization allows us to perform some code
    just before our application executes. It is possible to write “command-line” applications
    with the full power of MicroProfile and Jakarta EE APIs with this. A frequently
    used trick is to write RESTful web service clients using the MicroProfile RESTful
    client API from a listener method. The following example illustrates how to do
    this:


    ```

    package com.ensode.cdievents.client;

    //imports omitted

    @ApplicationScoped

    public class CountryServiceClient {

    private static final Logger LOGGER = Logger.getLogger(CountryServiceClient.class.getName());

    @Inject

    @RestClient

    private CountryService cdiService;

    public void updateCountries(

    @Observes @Initialized(ApplicationScoped.class) Object o) {

    Country testCountry = new Country("TS", "Test");

    Country albanya = new Country("AL", "Albanya");

    Country albania = new Country("AL", "Albania");

    cdiService.updateCountry(testCountry);

    cdiService.deleteCountry(testCountry.getAbbreviation());

    cdiService.updateCountry(albanya);

    cdiService.updateCountry(albania);

    }

    }

    ```


    In this example, we have an application scoped bean with a listener method containing
    the `@Observes` and `@Initialized(ApplicationScoped.class)`, which causes the
    method to be invoked when the application scope is initialized. Since our class
    is an application scoped CDI bean, we can inject a RESTful web service client
    interface into it via the `@Inject` and `@RestClient` annotations.


    As you may recall from our discussion of the MicroProfile RESTful client API,
    a RESTful client interface is a Java interface containing method signatures matching
    those of the corresponding RESTful web service.


    In our client, we simply initialize a POJO to be passed to the client, which is
    converted to a JSON string by the MicroProfile runtime and passed as the body
    of the request to our service, or pass any required query or path parameters to
    our method.


    We can run our client as usual with the help of the Maven WAR and Payara Micro
    plug-ins:


    ```

    mvn war:exploded payara-micro:start

    ```


    After running our client, we can see the expected output in the Payara Micro output
    for the service.'
