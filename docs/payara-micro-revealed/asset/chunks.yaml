- fmt: '### Payara Maven Repository


    In order to find Payara-specific dependencies, we need to add the Payara Maven
    Repository to the `<repositories>` section of our `pom.xml`.


    ```

    payara-nexus-artifacts

    Payara Nexus Artifacts

    https://nexus.payara.fish/repository/payara-artifacts


    true


    false

    ```


    `Nexus` is a popular open source repository management tool. The Payara Maven
    Repository uses `Nexus` to manage its Maven artifacts.


    ### Jakarta EE and MicroProfile Dependencies


    Last but not least, we need to add dependencies for any Jakarta EE or MicroProfile
    APIs we will use in our project. Our simple example uses only the Jakarta RESTful
    Web Services API; therefore, we only need one dependency.


    ```

    jakarta.platform

    jakarta.jakartaee-web-api

    provided

    ```


    ## Specifying the Base URI for Our Web Services


    Before we can start developing RESTful web services, we need to specify the base
    URI that all web service endpoints in our module will share. This can be done
    via the `@ApplicationConfig` annotation, as illustrated in the following example.


    ```

    package com.ensode.microservice;

    import javax.ws.rs.ApplicationPath;

    import javax.ws.rs.core.Application;

    @ApplicationPath("webresources")

    public class ApplicationConfig extends Application {

    }

    ```


    The annotated class must extend the `Application` class; the value of the `ApplicationPath`
    annotation corresponds to the root URI of our RESTful web services (`webresources`,
    in our example). The root URI we specify here will precede the URIs of the RESTful
    web services we develop; for example, if we write a RESTful web service with a
    “sample” URI, the complete URI for the web service would be `/webresources/sample`.


    ## Running Our Application


    Maven can create an exploded WAR file from any Java web project via the `war:exploded`
    goal. Similarly, we can start Payara Micro straight from Maven via the `payara-micro:start`
    Maven goal provided by the Payara Micro Maven Project.


    By invoking Maven using the aforementioned two Maven goals, we can start Payara
    Micro and automatically deploy our application code.


    ```

    mvn war:exploded payara-micro:start

    ```


    We should see some output in the command line similar to the following:


    ```

    [2021-08-07T13:21:06.418-0400] [] [INFO] [] [PayaraMicro] [tid: _ThreadID=1 _ThreadName=main]
    [timeMillis: 1628356866418] [levelValue: 800] [[

    Payara Micro URLs:

    http://192.168.1.165:8080/

    ''microservice-1.0-SNAPSHOT'' REST Endpoints:

    GET    /openapi/

    GET    /openapi/application.wadl

    GET    /webresources/application.wadl

    DELETE /webresources/sample

    GET    /webresources/sample

    PATCH  /webresources/sample

    POST   /webresources/sample

    PUT    /webresources/sample

    ]]

    [2021-08-07T13:21:06.418-0400] [] [INFO] [] [PayaraMicro] [tid: _ThreadID=1 _ThreadName=main]
    [timeMillis: 1628356866418] [levelValue: 800] Payara Micro  5.2021.4 #badassmicrofish
    (build 740) ready in 7,751 (ms)

    Handling HTTP GET requests

    ```


    Notice that the output specifies the IP address and HTTP port where Payara Micro
    is listening, as well as all RESTful web service endpoints along with the HTTP
    request types they listen for.


    Some of these endpoints are automatically generated by Payara Micro.


    Starting our application this way, combined with the compile-on-save feature most
    modern Java IDEs possess, allows us to hot deploy our application, meaning that
    code changes are automatically picked up by Payara Micro as we save our code,
    eliminating the need to manually build and run our code to test our code changes.


    ## Developing RESTful Web Services


    In order to turn any plain old Java object into a RESTful web service, all we
    need to do is annotate it with the `@Path` annotation. This annotation allows
    us to specify the URI for our web service; it also lets the runtime (Payara Micro,
    in our case) know that this class is a web service.


    ```

    package com.ensode.microservice;

    @Path("sample")

    public class SampleRestFulService {

    }

    ```


    The `@Path` annotation, combined with the `@ApplicationPath` annotation we previously
    discussed, determines the full URI of our RESTful web service. In our sample project,
    the complete URI for the RESTful web service would be `webresources/sample`.


    A RESTful web service needs to respond to one or more HTTP request types (GET,
    POST, PUT, DELETE, or PATCH); this is accomplished via method-level annotations.


    ### Handling HTTP GET Requests


    We can handle HTTP GET requests in our RESTful web services by annotating one
    of our methods with the `@GET` annotation. If our method returns a value to the
    client, we need to specify the mime type of the returned value via the `@Produces`
    annotation.


    ```

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public String processGetRequest() {

    String json = "{"

    + "\"msg\":\"Service processed HTTP GET request!\""

    + "}";

    return json;

    }

    ```


    JSON is by far the most common mime type used for data transmission in RESTful
    web services and microservices, but it is by no means the only one. All supported
    mime types are defined as constants in the `MediaType` class; others supported
    include XML (`MediaType.TEXT_XML`), HTML (`MediaType.TEXT_HTML`), and plain text
    (`MediaType.TEXT_PLAIN`), among others.


    Use your IDE Code Completion on the `MediaType` class to see all supported mime
    types.


    In our simple example, we are simply hard-coding a JSON string and returning that.
    Typically, we would process some data and generate a JSON string with one of Jakarta
    EE’s JSON processing libraries (JSON-B or JSON-P). We will cover JSON processing
    later in the book.


    ### Handling HTTP POST Requests


    HTTP POST requests are handled via the `@POST` annotation; usage is identical
    to the previously discussed `@GET` annotation.


    ```

    @POST

    @Produces(MediaType.APPLICATION_JSON)

    public String processPostRequest() {

    String json = "{"

    + "\"msg\":\"Service processed HTTP POST request!\""

    + "}";

    return json;

    }

    ```


    This example is nearly identical to the one in the previous section, the main
    difference being we annotated our method with the `@POST` annotation, which causes
    the method to be invoked when our service responds to an HTTP POST request.


    ### Handling HTTP PUT Requests


    HTTP PUT requests are handled via the `@PUT` annotation.


    ```

    @PUT

    @Produces(MediaType.APPLICATION_JSON)

    public String processPutRequest() {

    String json = "{"

    + "\"msg\":\"Service processed HTTP PUT request!\""

    + "}";

    return json;

    }

    ```


    The `@PUT` annotation on this method causes the method to be invoked when our
    service responds to an HTTP PUT request.


    ### Handling HTTP DELETE Requests


    HTTP DELETE requests are handled via the `@DELETE` annotation.


    ```

    @DELETE

    @Produces(MediaType.APPLICATION_JSON)

    public String processDeleteRequest() {

    String json = "{"

    + "\"msg\":\"Service processed HTTP DELETE request!\""

    + "}";

    return json;

    }

    ```


    The `@DELETE` annotation on this method causes the method to be invoked when our
    service responds to an HTTP DELETE request.


    ### Handling HTTP PATCH Requests


    We can also handle HTTP PATCH requests via the `@PATCH` annotation.


    ```

    @PATCH

    @Produces(MediaType.APPLICATION_JSON)

    public String processPatchRequest() {

    String json = "{"

    + "\"msg\":\"Service processed HTTP PATCH request!\""

    + "}";

    return json;

    }

    ```


    As expected, the `@PATCH` annotation on this method causes the method to be invoked
    when our service responds to an HTTP PATCH request.


    ## Path and Query Parameters


    You can pass parameters to a RESTful web service; there are two ways to do that:
    using path parameters and query parameters; both ways are supported by the Jakarta
    RESTful Web Services API.'
