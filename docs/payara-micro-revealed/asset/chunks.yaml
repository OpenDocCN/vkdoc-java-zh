    ## 总结


    在本章中，我们介绍了 Payara Micro 的请求追踪功能。我们了解了如何通过命令行参数为 Payara Micro 启用请求追踪，这会导致应用程序中所有
    RESTful Web 服务端点被自动追踪。我们还介绍了如何通过 `@Traced` 注解追踪应用程序中的其他方法，以及如何在不需要的地方禁用请求追踪。此外，我们还介绍了如何自定义应用程序生成的跨度中的操作名称，以及如何为跨度添加自定义标签。最后，我们介绍了在需要比
    MicroProfile OpenTracing API 提供的更多控制时，如何以编程方式创建跨度。


    # 10. 记录 Web 服务


    代码文档是一项艰巨且常常吃力不讨好的任务；因此，随着代码库的变更，文档很容易变得过时且陈旧；在许多情况下，文档并未更新以反映最新的变更。


    Payara Micro 可以通过其对 MicroProfile OpenAPI 的支持来缓解这一问题，该支持使得生成文档变得轻而易举；在许多情况下，文档会随着代码的更新而自动更新；例如，为现有
    Web 服务端点添加一个新参数，可能会导致该新参数自动添加到文档中。

