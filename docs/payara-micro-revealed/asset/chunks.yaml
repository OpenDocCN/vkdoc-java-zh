    ## Summary


    In this chapter, we covered the Contexts and Dependency Injection API available
    to us in our Payara Micro MicroProfile and Jakarta EE applications. We saw how
    we can assign a scope to CDI managed beans and how to perform logic on bean initialization
    or destruction.


    Additionally, we covered how we can easily inject CDI beans via the @Inject annotation
    into any object managed by Payara Micro, such as RESTful web services, or other
    CDI beans.


    We also explained the CDI event handling mechanism, which allows us to write loosely
    coupled applications. We covered how to use CDI events to write application logic
    when a CDI scope is initialized or destroyed, then used this newfound knowledge
    for a neat trick that allowed us to execute logic as soon as our WAR file is deployed,
    and then exploited this knowledge to develop command-line RESTful web service
    clients using the MicroProfile RESTful web service API.


    # 5. Application Configuration


    MicroProfile includes a configuration API called, appropriately enough, MicroProfile
    Config that standardizes the way we can configure our applications. Configuration
    is used to set values that may vary from environment to environment, for example,
    things like database URLs or directories in a file system. MicroProfile Config
    standardizes the way we retrieve properties to retrieve configuration values for
    our applications.


    ## Configuration Sources


    There are three standard ways we can configure our applications: via a *microprofile-config.properties*
    file inside our WAR file, via Java system properties, and via environment variables.
    We can also add our own custom configuration sources.


    Configuration sources have priorities defined by their *ordinal values*; higher
    ordinal values have priority over lower ones. Table [5-1](#519485_1_En_5_Chapter.xhtml#Tab1)
    summarizes the ordinal values of all standard configuration sources.


    Table 5-1


    MicroProfile Config Sources Default Ordinal Values


    | Configuration Source | Default Ordinal Value |

    | --- | --- |

    | microprofile-config.properties | 100 |

    | Environment variables | 300 |

    | System Properties | 400 |


    In addition to the standard MicroProfile Config configuration sources, Payara
    Micro implements a number of additional configuration sources we can use to configure
    our applications (discussed later in the chapter). Table [5-2](#519485_1_En_5_Chapter.xhtml#Tab2)
    lists all Payara Micro`–`specific configuration sources, along with their default
    ordinal value.


    Table 5-2


    Payara Micro Configuration Sources Default Ordinal Values


    | Configuration Source | Default Ordinal Value |

    | --- | --- |

    | Directory | 90 |

    | Password | 105 |

    | Domain | 110 |

    | JNDI | 115 |

    | Config | 120 |

    | Server | 130 |

    | Application | 140 |

    | Module | 150 |

    | Cluster | 160 |

    | JDBC | 190 |

    | LDAP | 200 |

    | Cloud provider specific | 180 |


    Default ordinal values can be overridden by adding a `config_ordinal` property
    to the configuration source; for example, if we wanted to increase the ordinal
    value of *microprofile-config.properties* to be higher than environment variables
    (which have an ordinal value of 300) but lower than system properties (which have
    an ordinal value of 400), we could add a property to *microprofile-config.properties*
    containing a value between their ordinal values, for example:


    ```

    config_ordinal=350

    ```


    As we can see, *microprofile-config.properties* has the lowest ordinal value of
    the standard configuration sources; this is useful for when we want to include
    default configuration values packaged within our application, which can then be
    easily overridden by setting the appropriate environment variable or system property.


    Please note that the API to retrieve properties is exactly the same no matter
    what configuration source is used; the MicroProfile Config API will look for properties
    starting with the highest priority source and going down the line to the lowest
    priority configuration source until it finds a matching property name.'
