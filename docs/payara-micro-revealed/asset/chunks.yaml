    A typical microservices architecture consists of several microservices. These
    services send output to a log file; traditionally, each service sends output to
    its own log file. When looking at log files across server instances, it is almost
    never trivial to follow a single trace of execution across our microservices;
    for example, let’s say we have two services, A and B, and that service A serves
    as a client for service B. Typically, we will see several calls to service B from
    service A in the logs, but it is seldom trivial to match which calls from service
    A match which calls received from service B. Additionally, it is possible service
    B may be called from clients other than service A, making following a single trace
    of execution in our application a challenging task. This is where the MicroProfile
    OpenTracing API comes in; this API generates spans and traces that allow us to
    trace execution across Payara Micro instances; each span and trace has a unique
    ID that does not change across instances, allowing us to link log entries from
    one instance of Payara Micro to another.


    Before we can use the MicroProfile OpenTracing API, it needs to be enabled in
    Payara Micro.'
  trans: '

    ## 判断服务是否就绪


    服务可能已启动但尚未准备好投入使用；例如，其某些依赖项可能已宕机或不可用。我们可以通过开发一个带有 `@ReadinessCheck` 注解的 `HealthCheck`
    实现，来实现健康检查逻辑，从而生成就绪报告。


    生成就绪报告的过程与我们之前讨论存活检查时非常相似：我们实现 `HealthCheck` 接口，并从其 `call()` 方法返回一个 `HealthCheckResponse`
    实例。


    以下示例说明了如何在健康检查报告中提供附加数据；在此示例中，我们模拟检查应用程序所依赖资源的状态，并相应地返回“up”或“down”状态。虽然我们是在就绪检查示例中演示添加附加数据，但该方法同样适用于存活报告。


    ```

    package com.ensode.healthcheck;

    //imports omitted

    @ApplicationScoped

    @Readiness

    public class ReadinessChecker implements HealthCheck {

    HealthCheckResponseBuilder healthCheckResponseBuilder =

    HealthCheckResponse.builder().

    name(this.getClass().getSimpleName());

    @Override

    public HealthCheckResponse call() {

    boolean databaseUp = isDatabaseUp();

    boolean jmsQueuesUp = areJmsQueuesUp();

    if (databaseUp && jmsQueuesUp) {

    healthCheckResponseBuilder =

    healthCheckResponseBuilder.up();

    } else {

    healthCheckResponseBuilder =

    healthCheckResponseBuilder.down();

    }

    return healthCheckResponseBuilder.

    withData("Database up", databaseUp).

    withData("JMS queue up", jmsQueuesUp).build();

    }

    private boolean isDatabaseUp() {

    //dummy method for illustration purposes

    return new Random().nextBoolean();

    }

    private boolean areJmsQueuesUp() {

    //dummy method for illustration purposes

    return new Random().nextBoolean();

    }

    }

    ```


    在我们的示例中，我们创建了一个 `HealthCheckResponseBuilder` 实例并为其命名，然后调用一些模拟检查数据库和 JMS 队列状态的方法（我们的模拟方法只是返回一个随机的
    `true`/`false` 布尔值）；如果数据库和 JMS 队列都正常，我们通过调用 `HealthCheckResponseBuilder.up()`
    来指示服务已就绪；否则，我们通过调用 `HealthCheckResponseBuilder.down()` 来指示服务未就绪；仅仅指示服务未就绪无法提供足够的信息；理想情况下，我们需要指明服务未就绪的原因；我们可以通过调用
    `HealthCheckResponseBuilder.withData()` 来实现；该方法有三个重载版本；所有版本都将字符串作为第一个参数；第二个参数可以是另一个字符串、一个
    `long` 或一个 `boolean`。第一个参数旨在为生成的数据提供简要描述；第二个值是实际要显示的值；在我们的示例中，我们使用了 `withData()`
    的 `boolean` 版本，用于指示数据库和 JMS 队列是否正常。


    如果我们的应用程序同时包含存活检查和就绪检查，那么向应用程序发送 HTTP GET 请求将为这两项检查生成数据。


    `curl http://localhost:8080/health/` 会生成以下输出（为便于阅读已重新格式化）：


    ```

    {

    "status": "UP",

    "checks": [

    {

    "name": "ReadinessChecker",

    "status": "UP",

    "data": {

    "Database up": "true",

    "JMS queue up": "true"

    }

    },

    {

    "name": "LivenessChecker",

    "status": "UP",

    "data": {}

    }

    ]

    }

    ```


    如果我们只想查看就绪检查，可以调用 `/health/ready` 端点；例如，`curl http://localhost:8080/health/ready`
    会生成以下输出：


    ```

    {

    "status": "UP",

    "checks": [

    {

    "name": "ReadinessChecker",

    "status": "UP",

    "data": {

    "Database up": "true",

    "JMS queue up": "true"

    }

    }

    ]

    }

    ```


    类似地，如果我们只想查看存活报告，可以向 `/health/live` 发送 HTTP GET 请求，这将返回一个仅包含存活检查的 JSON 响应。


    ```

    {

    "status": "UP",

    "checks": [

    {

    "name": "LivenessChecker",

    "status": "UP",

    "data": {}

    }

    ]

    }

    ```


    ## 配置 MicroProfile Health


    我们可以通过作为后启动命令文件或类似方式传递的命令文件，在 Payara Micro 中使用 `set-microprofile-healthcheck-configuration`
    asadmin 命令来配置 MicroProfile Health。


    ### 禁用 MicroProfile Health


    Payara Micro 默认启用 MicroProfile Health；如果我们希望禁用它，可以使用以下 asadmin 命令：


    ```

    set-microprofile-healthcheck-configuration --enabled=false

    ```


    ### 保护 MicroProfile Health


    默认情况下，`/health` 端点是不安全的，这意味着任何未经身份验证的随机用户都可以访问它。


    如果我们希望保护它，可以通过发出以下 asadmin 命令来实现：


    ```

    set-microprofile-healthcheck-configuration --securityenabled=true

    ```


    在保护 `/health` 端点时，我们可以按如下方式指定哪些角色可以访问它：


    ```

    set-microprofile-healthcheck-configuration --roles=role1,role2

    ```


    `--roles` 参数的值是一个逗号分隔的列表，列出了允许访问健康端点的角色。


    ### 自定义 MicroProfile Health 端点


    默认情况下，可以通过 `/health` 端点检索指标。如果需要，我们可以使用不同的端点。


    ```

    set-microprofile-healthcheck-configuration --endpoint=foo

    ```


    `--endpoint` 参数的值是我们自定义健康端点的上下文根。


    ## 总结


    在本章中，我们介绍了 Payara Micro 对 MicroProfile Health API 的支持。我们了解了如何“免费”获得基本的健康功能；我们还介绍了如何生成自定义健康数据，以帮助判断服务是否就绪和/或存活。最后，我们介绍了如何在
    Payara Micro 中配置 MicroProfile Health。


    # 9. 请求追踪


    典型的微服务架构由多个微服务组成。这些服务将输出发送到日志文件；传统上，每个服务都将其输出发送到自己的日志文件。当跨服务器实例查看日志文件时，几乎不可能轻松地追踪跨微服务的单个执行轨迹；例如，假设我们有两个服务
    A 和 B，并且服务 A 充当服务 B 的客户端。通常，我们会在日志中看到从服务 A 到服务 B 的多次调用，但很少能轻松地将服务 A 的哪些调用与服务 B
    接收到的哪些调用匹配起来。此外，服务 B 可能被除服务 A 之外的其他客户端调用，这使得在我们的应用程序中追踪单个执行轨迹成为一项具有挑战性的任务。这就是
    MicroProfile OpenTracing API 的用武之地；该 API 生成跨度和轨迹，使我们能够跨 Payara Micro 实例追踪执行；每个跨度和轨迹都有一个唯一的
    ID，该 ID 在实例之间不会改变，从而允许我们将一个 Payara Micro 实例的日志条目链接到另一个实例。


    在使用 MicroProfile OpenTracing API 之前，需要在 Payara Micro 中启用它。

    '
- fmt: '# Enabling Request Tracing in Payara Micro


    The easiest way to enable request tracing in Payara Micro is via the `--enableRequestTracing`
    command line argument, for example:


    ```

    java -jar payara-micro-5.2021.8.jar --enableRequestTracing --deploy /path/to/my.war

    ```


    By default, any request taking longer than 30 seconds will be traced. Output is
    sent to the Payara Micro console in JSON format.


    If we wish to override the default minimum amount of time a request must take
    before it is traced, we can do so via the `--thresholdValue` and `--thresholdUnit`
    command-line arguments, for example, to trace any request taking longer than 100
    milliseconds:


    ```

    java -jar payara-micro-5.2021.8.jar --enableRequestTracing --requestTracingThresholdValue
    100 --requestTracingThresholdUnit milliseconds --deploy /path/to/my.war

    ```


    The `--requestTracingThresholdUnit` command-line argument accepts the following
    time units:


    * NANOSECONDS

    * MICROSECONDS

    * MILLISECONDS

    * SECONDS

    * MINUTES

    * HOURS

    * DAYS


    All values for `--requestTracingThresholdUnit` are case insensitive.


    Additionally, `--enableRequestTracing` accepts an optional value indicating the
    minimum amount of time a request must take in order to be traced, for example:


    ```

    java -jar payara-micro-5.2021.8.jar --enableRequestTracing 100ms --deploy /path/to/my.war

    ```


    The preceding command is an alternative way to configure request tracing so that
    any request taking longer than 100 milliseconds is traced. The optional value
    of `--enableRequestTracing` must be an integer value followed by a unit of time,
    *without any spaces between them*.


    Valid values for units of time could be the spelled-out unit of time (i.e., "nanoseconds"),
    or the equivalent abbreviation (i.e., "ns").


    Table 9-1 lists valid values for the unit of time portion of the `--enableRequestTracing`
    optional parameter.


    **Table 9-1 Request Tracing Units of Time**


    | Unit of Time | Spelled-Out Value (Case Insensitive) | Abbreviated Value |

    | --- | --- | --- |

    | Nanoseconds | nanoseconds | ns |

    | Microseconds | microseconds | us or μs |

    | Milliseconds | milliseconds | ms |

    | Seconds | seconds | s |

    | Minutes | minutes | m |

    | Hours | hours | h |

    | Days | days | d |


    All spelled-out values also accept their singular counterparts (nanosecond, microsecond,
    etc.).


    ## Spans and Traces


    A *span* represents an individual unit of work, typically a single HTTP request;
    by default, Payara Micro logs spans in JSON format to its console output.


    A *trace* is a collection of related spans; for example, we could send an HTTP
    request to a microservice, which in turn sends two more requests to two additional
    microservices; all three requests in this case would have unique span IDs, but
    all would share the same trace ID; by looking at the trace ID of each span, we
    can find out which requests are related. Trace IDs are unique and match even across
    Payara Micro instances, making it possible to relate log entries in one Payara
    Micro instance to another.


    Let''s look at an example; when discussing programmatic application metrics in
    Chapter 6, we developed a service to hire or fire employees; additionally, we
    developed a client service that would hire three employees from a single endpoint;
    for reference, here is the relevant code for the service implementing the logic
    to hire employees (metrics specific code removed for simplicity):


    ```

    package com.ensode.requesttracing;

    //imports omitted

    @ApplicationScoped

    @Path("employeeservice")

    public class EmployeeResource {

    private List employeeList = new CopyOnWriteArrayList(); //thread safe

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee) throws InterruptedException {

    //simulate slow processing

    Thread.sleep(100);

    employeeList.add(employee);

    }

    }

    ```


    To slow down processing a bit and make sure our `hireEmployee()` method gets traces,
    we added a 100-ms delay to the method.


    Via the MicroProfile REST client API, the client service sends three HTTP PUT
    requests to the preceding service, generating three related HTTP requests.


    ```

    package com.ensode.requesttracing.client;

    //imports omitted

    @ApplicationScoped

    @Path("employeeclient")

    public class EmployeeClientResource {

    @Inject

    @RestClient

    private EmployeeResourceClient employeeResourceClient;

    private List employeesToHire;

    @PostConstruct

    public void init() {

    Employee employee1 = new Employee("Jose", "Jimenez");

    Employee employee2 = new Employee("Meera", "Patel");

    Employee employee3 = new Employee("David", "Heffelfinger");

    employeesToHire = List.of(employee1, employee2, employee3);

    }

    @Path("hire")

    @POST

    public void hireEmployees() {

    employeesToHire.forEach(emp →

    employeeResourceClient.hireEmployee(emp));

    }

    }

    ```


    If we enable request tracing with a threshold of 100 ms and send an HTTP POST
    request to `http://localhost:8081/requesttracingclient/webresources/employeeclient/hire`,
    we can see all generated spans on the Payara Micro output for both instances of
    Payara Micro: the one running the employee client service and the one running
    the employee service.


    On the employee client service Payara Micro instance, we would see output similar
    to the following:'
