    ```


    As we can see in the example, we obtain an instance of `io.opentracing.Span` representing
    the current span by invoking `Tracer.activeSpan()`; from that, we invoke the `setTag()`
    method, which has two parameters: a `String` for the tag name, plus an additional
    parameter for the value. There are three overloaded versions of `setTag()`; the
    second parameter could be a `String`, a `boolean`, or a `Number` (any numeric
    value); in our example, we used the version with two Strings, since we are adding
