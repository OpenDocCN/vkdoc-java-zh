- fmt: '# Automatically Generating Documentation


    Any RESTful web service deployed to Payara Micro is automatically documented;
    to see the generated documentation, all we need to do is send an HTTP GET request
    to the `/openapi` endpoint of the Payara Micro instance.


    In previous chapters, we’ve been using a simple human resources system implemented
    as web services to hire and fire employees; in this chapter, we’ll use this same
    system to illustrate OpenAPI.


    The core of the system is a simple RESTful web service that accepts HTTP PUT requests
    to hire employees and DELETE requests to fire them; as a refresher, here is the
    source code for our simple RESTful web service:


    ```

    package com.ensode.openapiexample;

    //imports omitted

    @ApplicationScoped

    @Path("employeeservice")

    public class EmployeeResource {

    private List employeeList = new CopyOnWriteArrayList(); //thread safe

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee) {

    employeeList.add(employee);

    }

    @DELETE

    @Consumes(MediaType.APPLICATION_JSON)

    public void fireEmployee(@QueryParam("firstName")

    String firstName, @QueryParam("lastName") String lastName) {

    Optional employeeToFire =

    employeeList.stream().filter(emp ->

    emp.getFirstName().equals(firstName) &&

    emp.getLastName().equals(lastName)).findAny();

    employeeToFire.ifPresent(

    emp -> {employeeList.remove(emp);});

    }

    }

    ```


    To see the automatically generated documentation for our RESTful web service,
    we can simply send an HTTP GET request to `http://localhost:8080/openapi` (assuming
    the project is deployed to our local workstation using the default HTTP port).
    The easiest way to send the GET request is to point the browser to the preceding
    URL, as illustrated in Figure 10-1.


    ![Figure 10-1](images/519485_1_En_10_Chapter/519485_1_En_10_Fig1_HTML.jpg)


    Figure 10-1 — Automatically generated documentation


    The generated documentation is in YAML format. We can see that there is a `webresources/employeeservice`
    path that accepts either HTTP DELETE or PUT requests.


    For DELETE requests, documentation points out that the endpoint expects two query
    parameters of type String: one named `firstName` and another one named `lastName`.


    For PUT requests, we can see that the request body must contain a JSON object
    following a determined schema, which is also documented as the `Employee` schema
    near the bottom of the document; this schema was automatically generated from
    our `Employee` class.


    The nice thing about OpenAPI support is that documentation is updated automatically;
    therefore, it is never out of date. Let’s say, for example, that we updated the
    `Employee` class to have an `employeeID` field, as follows:


    ```

    package com.ensode.openapiexample;

    //imports omitted

    public class Employee {

    public Employee() {

    }

    public Employee(Integer employeeId, String firstName,

    String lastName) {

    this.employeeId = employeeId;

    this.firstName = firstName;

    this.lastName = lastName;

    }

    private Integer employeeId;

    private String firstName;

    private String lastName;

    //setters, getters, equals() and hashCode() omitted for brevity

    }

    ```


    Suppose then we updated the `fireEmployee()` method to accept `employeeID` as
    a query parameter:


    ```

    package com.ensode.openapiexample;

    //imports omitted

    @ApplicationScoped

    @Path("employeeservice")

    public class EmployeeResource {

    private List employeeList = new CopyOnWriteArrayList(); //thread safe

    @PUT

    @Consumes(MediaType.APPLICATION_JSON)

    public void hireEmployee(Employee employee) {

    employeeList.add(employee);

    }

    @DELETE

    @Consumes(MediaType.APPLICATION_JSON)

    public void fireEmployee(

    @QueryParam("employeeId") Integer employeeID) {

    Optional employeeToFire =

    employeeList.stream().filter(emp →

    emp.getEmployeeId().equals(employeeID)).findAny();

    employeeToFire.ifPresent(

    emp -> {

    employeeList.remove(emp);

    });

    }

    }

    ```


    After deploying our application, we point our browser to `http://localhost:8080/openapi`
    again and see that our documentation has been updated automatically, with zero
    effort on our part.


    Notice that in the documentation, `operationID fireEmployee` now takes a single
    parameter named `employeeID`, and near the bottom of the document, the `Employee`
    schema has been automatically updated to have an additional `employeeID` property
    of type integer; all of these updates were driven directly by our code changes,
    no need for us to even think about updating the documentation. We can see the
    updated documentation in Figure 10-2.


    ![Figure 10-2](images/519485_1_En_10_Chapter/519485_1_En_10_Fig2_HTML.jpg)


    Figure 10-2 — Automatically updated documentation


    As previously mentioned, by default, documentation is generated in YAML format;
    if we want to generate in JSON instead, we can do it by passing a query parameter
    named `format` with a value of `json` to the `/openapi` endpoint, for example:


    `http://localhost:8080/openapi?format=json`


    Figure 10-3 illustrates the equivalent documentation for our updated service,
    this time in JSON format.


    ![Figure 10-3](images/519485_1_En_10_Chapter/519485_1_En_10_Fig3_HTML.jpg)


    Figure 10-3 — Automatically updated documentation, in JSON format


    ## Customizing Documentation via Code Annotations


    OpenAPI provides annotations we can use to customize the generated documentation.


    ### Customizing HTTP Responses


    We can customize the generated documentation for the response; we can additionally
    add descriptions for different HTTP codes returned by our endpoint; this can be
    achieved by annotating methods in our Jakarta RESTful web services with the `@APIResponse`
    annotation.


    Suppose we added an endpoint to our human resources application to find an employee
    by ID; upon successfully finding an employee, an HTTP code of 200 (“OK”) is automatically
    returned; if we don’t find the employee, we can trigger an HTTP code of 404 (“not
    found”) by throwing a `NotFoundException`. We could document this behavior in
    the code by using the `@APIResponse` annotation.


    ```

    @GET

    @APIResponse(responseCode = "200",

    description = "Employee found",

    content = @Content(mediaType = APPLICATION_JSON,

    schema =

    @Schema(implementation = Employee.class))

    @APIResponse(responseCode = "404",

    description = "Employee not found ")

    public Employee findEmployee(

    @QueryParam("employeeId") Integer employeeID) {

    Optional employeeToFind =

    employeeList.stream().filter(emp →

    emp.getEmployeeId().equals(employeeID)).findFirst();

    return employeeToFind.orElseThrow(

    () -> new NotFoundException()); //if not found, return a 404

    }

    ```


    As we can see from the preceding example, `@APIResponse` has three attributes;
    `responseCode` and `description` are self-explanatory; the optional `content`
    attribute designates the media type and schema of the response body, if any.


    Figure 10-4 illustrates the relevant parts of the updated documentation for our
    application.


    ![Figure 10-4](images/519485_1_En_10_Chapter/519485_1_En_10_Fig4_HTML.jpg)


    Figure 10-4 — Documentation generated by the `@APIResponse` annotation


    Our new method was automatically added, with no additional effort on our part;
    notice the descriptions for HTTP codes 200 and 404 for `operationId findEmployee`
    (our new method); those were generated by the `@APIResponse` annotations we added
    to the method.'
