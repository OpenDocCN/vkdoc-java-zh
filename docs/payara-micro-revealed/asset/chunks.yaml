- fmt: '### Clustered Application Scoped CDI Beans


    With Payara Micro, we can share the same instance of an application scoped bean
    across nodes in a network. To do so, all we have to do is annotate the application
    scoped bean with the `@Clustered` annotation, as illustrated in the following
    example.


    ```

    package com.ensode.clusteredcdiappscopedbeans;

    import fish.payara.cluster.Clustered;

    //additional imports omitted

    @Clustered

    @ApplicationScoped

    //Clustered application scoped bean must be serializable

    public class DataCache implements Serializable {

    private Map cachedValueMap = new HashMap();

    public void addMapEntry(String key, String value) {

    cachedValueMap.put(key, value);

    }

    public String retrieveValue(String key) {

    return cachedValueMap.get(key);

    }

    public Map getCachedValueMap() {

    return cachedValueMap;

    }

    public void setCachedValueMap(Map cachedValueMap) {

    this.cachedValueMap = cachedValueMap;

    }

    }

    ```


    A common use of application scoped CDI beans is to cache frequently used data
    so that we don’t have to hit a database every time we need to retrieve it. With
    standard application scoped CDI beans, we would have to have a copy of the bean
    in each node of a cluster; keeping those instances in sync would not be a trivial
    task. With Payara’s clustered CDI beans, there is a single instance shared across
    nodes.


    As can be seen in the example, all we have to do to share an application scoped
    bean across nodes in a cluster is annotated with `@Clustered` and have it implement
    the `Serializable` interface; all the hard work to share the bean instance is
    done behind the scenes by Payara Micro.


    Clustered application scoped CDI beans must be serializable; otherwise, our code
    will fail to deploy.


    In order to use the `@Clustered` annotation, we need to add `payara-api` as a
    provided dependency to our application. When using Maven, we can do so by adding
    the appropriate dependency to the `<dependencies>` section of `pom.xml`.


    ```

    fish.payara.api

    payara-bom

    ${version.payara}

    pom

    import


    fish.payara.api

    payara-api

    provided

    ```


    When using the Payara Maven Bill of Materials (BOM), dependency versions are specified
    in the BOM; therefore, we shouldn’t specify them in our `pom.xml`.


    To illustrate clustered application scoped CDI beans, we can write a simple RESTful
    web service that, in response to HTTP PUT and GET requests, adds or retrieves
    values to/from the `Map` in our clustered application scoped CDI bean.


    ```

    package com.ensode.clusteredcdiappscopedbeans;

    //imports omitted

    @Path("cachedvalueaccessor")

    public class CachedValueAccessorResource {

    @Inject

    private DataCache dataCache;

    @GET

    @Produces(MediaType.TEXT_PLAIN)

    public String getCachedValue(@QueryParam("key") String key) {

    return dataCache.retrieveValue(key);

    }

    @PUT

    @Consumes(MediaType.TEXT_PLAIN)

    public void addCachedValue(@QueryParam("key") String key,

    @QueryParam("value") String value) {

    dataCache.addMapEntry(key, value);

    }

    }

    ```


    Notice that there is nothing special we need to do to use our clustered application
    scoped CDI bean; we simply inject it via the `@Inject` annotation as usual.


    At this point, we have a simple but complete example we can use to illustrate
    clustered application scoped CDI beans; we simply package our application in a
    WAR file and deploy it to two separate instances of Payara Micro, which will automatically
    form a cluster.


    We can do so from the command line as follows:


    ```

    java -jar path/to/payara-micro-5.2021.10.jar \

    --contextroot clusteredapplicationbeansdemo --autoBindHttp \

    --deploy target/clustered-application-beans-demo-1.0-SNAPSHOT.war

    ```


    If we examine Payara Micro’s output, we can see our application has been deployed
    and it is listening on the default 8080 HTTP port.


    ```

    [2021-12-28T18:49:51.628-0500] [] [INFO] [] [PayaraMicro] [tid: _ThreadID=1 _ThreadName=main]
    [timeMillis: 1640735391628] [levelValue: 800] [[

    Payara Micro URLs:

    http://127.0.0.1:8080/clusteredapplicationbeansdemo

    ''clustered-application-beans-demo-1.0-SNAPSHOT'' REST Endpoints:

    GET /clusteredapplicationbeansdemo/webresources/application.wadl

    GET /clusteredapplicationbeansdemo/webresources/cachedvalueaccessor

    PUT /clusteredapplicationbeansdemo/webresources/cachedvalueaccessor

    ]]

    [2021-12-28T18:49:51.629-0500] [] [INFO] [] [PayaraMicro] [tid: _ThreadID=1 _ThreadName=main]
    [timeMillis: 1640735391629] [levelValue: 800] Payara Micro  5 #badassmicrofish
    (build 879) ready in 7,708 (ms)

    ```


    We then use the same command on a different terminal window to deploy a second
    copy of our WAR file.


    On the second instance of Payara Micro, we should see output similar to the following:


    ```

    [2021-12-28T18:55:32.268-0500] [] [INFO] [] [PayaraMicro] [tid: _ThreadID=1 _ThreadName=main]
    [timeMillis: 1640735732268] [levelValue: 800] [[

    Payara Micro URLs:

    http://127.0.0.1:8081/clusteredapplicationbeansdemo

    ''clustered-application-beans-demo-1.0-SNAPSHOT'' REST Endpoints:

    GET /clusteredapplicationbeansdemo/webresources/application.wadl

    GET /clusteredapplicationbeansdemo/webresources/cachedvalueaccessor

    PUT /clusteredapplicationbeansdemo/webresources/cachedvalueaccessor

    ]]

    [2021-12-28T18:55:32.268-0500] [] [INFO] [] [PayaraMicro] [tid: _ThreadID=1 _ThreadName=main]
    [timeMillis: 1640735732268] [levelValue: 800] Payara Micro  5 #badassmicrofish
    (build 879) ready in 8,235 (ms)

    ```


    Since we used the `--autoBindHttp` command-line argument for Payara Micro, the
    second instance listens for HTTP connections on the next available port (8081).


    Additionally, there will be some output on the first instance of Payara Micro,
    which lets us know that the two instances formed a cluster; the output should
    look similar to the following:


    ```

    [2021-12-28T18:55:28.239-0500] [] [INFO] [] [fish.payara.nucleus.cluster.PayaraCluster]
    [tid: _ThreadID=55 _ThreadName=hz.wonderful_sutherland.event-4] [timeMillis: 1640735728239]
    [levelValue: 800] Data Grid Instance Added f3fc7680-1fec-4544-8d9e-b8e7d20c634b
    at Address /192.168.1.165:6901

    [2021-12-28T18:55:28.242-0500] [] [INFO] [] [fish.payara.nucleus.cluster.PayaraCluster]
    [tid: _ThreadID=55 _ThreadName=hz.wonderful_sutherland.event-4] [timeMillis: 1640735728242]
    [levelValue: 800] [[

    Data Grid Status

    Payara Data Grid State: DG Version: 4 DG Name: development DG Size: 2

    Instances: {

    DataGrid: development Name: Magnanimous-Butterfish Lite: false This: true UUID:
    730a2023-0f47-4822-b2d9-d905ffcd0505 Address: /192.168.1.165:6900

    DataGrid: development Lite: false This: false UUID: f3fc7680-1fec-4544-8d9e-b8e7d20c634b
    Address: /192.168.1.165:6901

    }]]

    ```


    Recall that Payara Micro’s clustering capabilities are implemented via an in-memory
    data grid (Hazelcast); the output on the first instance of Payara Micro is letting
    us know that a data grid instance was added to the cluster.


    If you refer to our example clustered application scoped CDI bean, you’ll notice
    the map holding the cached data is initially empty; we can add an entry to it
    by sending an HTTP PUT request to either instance of Payara Micro in the cluster.
    For example, using curl to send an HTTP PUT request to the first instance:


    ```

    $curl -XPUT ''http://localhost:8080/clusteredapplicationbeansdemo/webresources/cachedvalueaccessor?key=foo&value=bar''

    ```


    At this point, we added an entry to the `Map` in the clustered application scoped
    CDI bean with a key of `foo` and a value of `bar`. Since the bean is clustered,
    the change is reflected across all nodes in the cluster.


    We can now retrieve the value we just added by sending an HTTP GET request to
    either Payara Micro instance in the cluster; to make it interesting, let’s send
    an HTTP GET request to the second instance in the cluster to retrieve the value
    we just added on the first instance:


    ```

    $ curl http://localhost:8081/clusteredapplicationbeansdemo/webresources/cachedvalueaccessor?key=foo

    bar

    ```


    The text below the curl command is the response from the second instance; as we
    can see, we got the expected value, which was set by sending an HTTP PUT request
    to the first instance in the cluster.'
