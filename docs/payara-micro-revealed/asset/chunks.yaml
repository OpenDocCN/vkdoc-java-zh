- fmt: '### Creating Uber Jars


    We can create an Uber Jar by passing the `--outputUberJar` command-line option
    to Payara Micro, as in the following example:


    ```

    java -jar path/to/payara-micro/5.2021.10/payara-micro-5.2021.10.jar --deploy target/cdi-remote-events-1.0-SNAPSHOT.war
    --autoBindHttp --outputUberJar cdiremoteevents.jar

    ```


    The `--outputUberJar` command-line option takes an argument specifying the name
    of the JAR file to be created.


    Most command-line arguments we pass to Payara Micro are recorded so that they
    don’t need to be specified when executing the JAR file; in our example, the generated
    JAR file will execute Payara Micro with the `--autoBindHttp` option enabled by
    default. One notable exception is that the `--contextRoot` command-line argument
    is not recorded; the context root of the generated JAR file will always be the
    name of the deployed WAR file (`cdi-remote-events-1.0-SNAPSHOT.war` in our example).


    The preceding command generates a JAR file with the name we specified in the current
    directory; to execute it, we simply run the same way we run any executable JAR
    file:


    ```

    java -jar cdiremoteevents.jar

    ```


    We should see Payara Micro’s usual output on the terminal window:


    ```

