  trans: "\n作为指导原则，在选择访问级别时，通常最好使用限制最严格的级别。这是因为成员能被访问的地方越多，它被错误访问的可能性就越大，这会使代码更难调试。使用限制性的访问级别还能让你更容易地修改类，而不会破坏使用该类的其他程序员的代码。\n\
    \n第 16 章\n\n![image](img/frontdot.jpg)\n\n常量\n\n在 Java 中，通过在数据类型前添加 `final` 关键字，可以将变量变为常量。这个修饰符意味着变量一旦被赋值就不能再被重新赋值，任何尝试重新赋值的操作都会导致编译时错误。\n\
    \n局部常量\n\n局部常量必须在声明的同时进行初始化。Java 中常量的命名约定是使用全部大写字母，并用下划线分隔单词。\n\n```\nfinal double\
    \ PI = 3.14;\n```\n\n常量字段\n\n类变量和实例变量也可以声明为 `final`。\n\n```\nclass MyClass\n{\
    \ \n  final double E = 2.72;\n  static final double C = 3e8;\n}\n\n```\n\n与局部常量不同，常量字段并不总是在声明时赋值。常量实例字段可以选择在构造函数中赋值，而常量静态字段可以通过使用静态初始化块来赋值。如果常量的值需要计算且无法在一行代码内完成，这些替代赋值方式会很有用。\n\
    \n```\nclass MyClass\n{ \n  final double E;\n  static final double C;\n\npublic\
    \ MyClass() { E = 2.72; }\n  static { C = 3e8; }\n}\n\n```\n\n常量方法参数\n\n`final`\
    \ 修饰符另一个可以应用的地方是方法参数，使其不可更改。\n\n```\nvoid f(final int A) {}\n```\n\n编译时常量与运行时常量\n\
    \n与大多数其他语言一样，Java 既有编译时常量也有运行时常量。然而，在 Java 中，只有类常量可以是编译时常量，并且仅当其值在编译时已知时才是。所有其他使用\
    \ `final` 的情况都会创建运行时常量。对于编译时常量，编译器会在代码中所有出现常量名的地方用其值进行替换。因此，它们比运行时常量更快，运行时常量直到程序运行时才被设置。不过，运行时常量可以被赋予动态值，这些值可以在不同的程序运行之间发生变化。\n\
    \n```\nclass MyClass\n{ \n  final double E = 2.72;         // 运行时常量\n\nfinal static\
    \ double C = 3e8;   // 编译时常量\n\nfinal static int RND = (new\n  java.util.Random()).nextInt();\
    \ // 运行时常量\n}\n\n```\n\n常量使用指南\n\n通常，如果变量不需要重新赋值，最好始终将它们声明为 `final`。这可以确保变量不会在程序中的任何地方被意外更改，从而有助于防止错误。\n\
    \n第 17 章\n\n![image](img/frontdot.jpg)\n\n接口\n\n接口是一种将“接口”与实现解耦的类型。它规定了其实现者与调用其方法（以及访问其常量）的对象之间的契约。接口使用\
    \ `interface` 关键字定义，后跟名称和代码块。其命名约定与类相同，即每个单词的首字母大写。当接口没有嵌套在其他类型内部时，其访问级别可以是包级私有或公共，就像任何其他顶级成员一样。\n\
    \n```\ninterface MyInterface {}\n```\n\n接口成员\n\n接口的代码块首先可以包含实例方法的签名。这些方法不能有任何实现。相反，它们的方法体由分号代替。接口成员必须始终是公共的，并且由于这是接口中的默认访问级别，因此可以省略此修饰符。\n\
    \n```\ninterface MyInterface {\n  int myMethod(); // 方法签名\n}\n\n```\n\n接口可以包含的第二个成员是常量。在接口中创建的任何字段都将被隐式声明为\
    \ `static final`，因此这些修饰符也可以省略。\n"
- fmt: "```java\ninterface MyInterface {\n    int c = 10; // constant\n}\n```\n\n\
    In addition to method signatures and constants, an interface can also contain\
    \ nested containing types, such as classes or other interfaces.\n\n```java\ninterface\
    \ MyInterface\n{ \n    // Types\n    class Class {}\n    interface Interface {}\n\
    \    enum Enum {}\n}\n```\n\n## Interface example\n\nThe example below shows an\
    \ interface called `Comparable`, which has a single method named `compare`.\n\n\
    ```java\ninterface Comparable\n{ \n    int compare(Object o);\n}\n```\n\nThe class\
    \ below implements this interface, by using the `implements` keyword after the\
    \ class name. By convention, the `implements` clause is placed after the `extends`\
    \ clause, if the class has one. Note that although a class can only inherit from\
    \ one superclass it may implement any number of interfaces, by specifying them\
    \ in a comma separated list.\n\n```java\nclass Circle implements Comparable\n\
    { \n    public int r;\n}\n```\n\nBecause `Circle` implements `Comparable` it must\
    \ define the `compare` method. For this class the method will return the difference\
    \ between the circle radiuses. The implemented method must be `public`, in addition\
    \ to having the same signature as the method defined in the interface.\n\n```java\n\
    class Circle implements Comparable\n{ \n    public int r;\n\n    public int compare(Object\
    \ o) {\n        return r - ( (Circle)o ).r;\n    } \n}\n```\n\n## Functionality\
    \ interface\n\n`Comparable` demonstrates the first usage of interfaces, which\
    \ is to define a specific functionality that classes can share. It makes it possible\
    \ to use the interface members without having to know the actual type of a class.\
    \ To illustrate, the example below shows a simple method that takes two `Comparable`\
    \ objects and returns the largest one. This method will work for all classes that\
    \ implement the `Comparable` interface regardless of their type, since the method\
    \ only uses the functionality exposed through that interface.\n\n```java\npublic\
    \ static Object largest(Comparable a, Comparable b)\n{ \n    return (a.compare(b)\
    \ > 0) ? a : b;\n}\n```\n\n## Class interface\n\nA second way to use an interface\
    \ is to provide an actual interface for a class, through which the class can be\
    \ used. The example below defines an interface for `MyClass` called `MyInterface`.\
    \ This interface only includes the functionality that programmers using `MyClass`\
    \ may need.\n\n```java\ninterface MyInterface\n{ \n    void exposed();\n}\n\n\
    class MyClass implements MyInterface\n{ \n    public void exposed() {}\n    public\
    \ void hidden() {}\n}\n```\n\nThe interface type is then used to hold the implementing\
    \ class, so that the class is only seen through this interface.\n\n```java\npublic\
    \ static void main(String[] args)\n{ \n    MyInterface i = new MyClass();\n}\n\
    ```\n\nThis abstraction provides two benefits. First, it makes it easier for other\
    \ programmers to use the class since they now only have access to the methods\
    \ that are relevant. Second, it makes the class more flexible since its implementation\
    \ can change, without being noticeable by other programmers using the class, as\
    \ long as the interface is followed.\n\n## Interface classes\n\nAs mentioned previously,\
    \ an interface can contain nested types, such as classes. In contrast to methods,\
    \ these types are implemented inside the interface. This can, for example, be\
    \ used to provide a class that contains static methods useful for implementing\
    \ classes. These nested types are only visible to classes implementing the interface,\
    \ and not to objects of those classes.\n\n```java\ninterface MyInterface\n{ \n\
    \    class HelperClass {\n        public static void helperMethod() {}\n    }\
    \ \n} \n```\n\n# CHAPTER 18\n\n![image](images/frontdot.jpg)\n\n## Abstract\n\n\
    An abstract class provides a partial implementation that other classes can build\
    \ upon. When a class is declared as `abstract` it means that the class can contain\
    \ incomplete methods that must be implemented in subclasses, in addition to normal\
    \ class members. These methods are left unimplemented and only specify their signatures,\
    \ while their bodies are replaced by semicolons.\n\n```java\nabstract class Shape\n\
    { \n    public int x = 100, y = 100;\n    public abstract int getArea();\n}\n\
    ```\n\n## Abstract class example\n\nIf a class called `Rectangle` inherits from\
    \ the abstract class `Shape`, `Rectangle` is then forced to override the abstract\
    \ `getArea` method. The only exception is if `Rectangle` is also declared `abstract`,\
    \ in which case it does not have to implement any abstract methods.\n\n```java\n\
    class Rectangle extends Shape\n{ \n    @Override public int getArea()\n    {\n\
    \        return x * y;\n    } \n}\n```\n\nAn abstract class cannot be instantiated,\
    \ but it can be used to hold instances of its subclasses.\n\n```java\nShape s\
    \ = new Rectangle();\n```\n\nEven though an abstract class cannot be instantiated\
    \ it may have constructors, which can be called from the subclass’s constructors\
    \ by using the `super` keyword.\n\n```java\nabstract class Shape\n{ \n    public\
    \ int x = 100, y = 100;\n    public Shape(int a, int b) { x = a; y = b; }\n}\n\
    \nclass Rectangle extends Shape\n{ \n    public Rectangle(int a, int b) { super(a,b);\
    \ }\n} \n```\n\n## Abstract classes and interfaces\n\nAbstract classes are similar\
    \ to interfaces in many ways. They can both define method signatures that subclasses\
    \ must implement, and neither one of them can be instantiated. The key differences\
    \ are first that the abstract class can contain non-abstract members, while the\
    \ interface cannot. And second, that a class can implement any number of interfaces\
    \ but only inherit from one class, abstract or not. Note that an abstract class\
    \ can, just as a non-abstract class, extend one superclass and implement any number\
    \ of interfaces. An interface, however, cannot inherit from a class. Although\
    \ it can extend another interface, which effectively combines the two interfaces\
    \ into one.\n\n## Abstract class and interface guideline\n\nAn interface is either\
    \ used to define a specific functionality that a class can have, or to provide\
    \ an interface for other programmers using a class. An abstract class on the other\
    \ hand is used to provide a partial class implementation, leaving it up to subclasses\
    \ to complete it. This is useful when subclasses have a lot of functionality in\
    \ common, but also have some functionality that must be implemented differently\
    \ for each subclass.\n\n# CHAPTER 19\n\n![image](images/frontdot.jpg)\n\n## Enum\n\
    \nAn enumeration is a type that consists of a fixed list of named constants. To\
    \ create one, the `enum` keyword is used followed by a name and a code block,\
    \ containing a comma separated list of constant elements. The access level for\
    \ an enumeration is the same as for a class. Package-private by default, but it\
    \ can also be set to `public` if it is declared in a file of the same name. Just\
    \ as with classes, an enumeration can be contained within a class, where it can\
    \ then be set to any access level.\n\n```java\nenum Speed\n{ \n    STOP, SLOW,\
    \ NORMAL, FAST\n}\n```\n\nAn object of the enum type above can hold any one of\
    \ the four defined constants. The enum constants are accessed as if they were\
    \ static fields of a class.\n\n```java\nSpeed s = Speed.SLOW;\n```\n\n## Enum\
    \ example\n\nThe `switch` statement provides a good example of when an enumeration\
    \ can be useful. Compared to using ordinary constants, an enumeration has the\
    \ advantage of allowing the programmer to clearly specify what constant values\
    \ are allowed. This provides compile-time type safety. Note that when using an\
    \ enum in a `switch` statement, the case labels are not qualified with the name\
    \ of the enum.\n\n```java\nswitch(s) { case SLOW: break; }\n```\n\n## Enum class\n\
    \nIn Java, the enum type is more powerful than its counterparts in other languages,\
    \ such as C++ or C#. It is essentially a special kind of class, and can include\
    \ anything that a class can include. To add a class member the list of constants\
    \ must be terminated with a semicolon, and the member must be declared after the\
    \ constants. In the example below, an integer is added to the enum, which will\
    \ hold the actual speed that the elements represent.\n\n```java\nenum Speed\n\
    { \n    STOP, SLOW, NORMAL, FAST;\n    public int speed;\n}\n```"
