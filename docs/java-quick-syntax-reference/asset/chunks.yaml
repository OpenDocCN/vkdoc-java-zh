  trans: "\n在 J2SE 1.4 之后，出于营销原因，版本号从 1.5 改为了 5.0。从 J2SE 5.0 开始，产品有一个版本号，而开发者内部使用的则是另一个版本号。J2SE\
    \ 5.0 是产品名称，而 Java 1.5 是开发者版本。类似地，Java SE 7 是产品名称，Java 1.7 是内部版本号。为简单起见，本书中将 Java\
    \ 版本统称为 Java 1-7。请注意，Java 被设计为向后兼容的。因此，Java 7 的虚拟机仍然可以运行 Java 1 的类文件。\n\n第 1 章\n\
    \n![image](img/frontdot.jpg)\n\nHello World\n\n安装\n\n在开始用 Java 编程之前，你需要从 Oracle\
    \ 网站下载并安装 Java 开发工具包（JDK）标准版（SE）。¹ JDK 包含 Java 编译器、类库以及运行 Java 应用程序所需的虚拟机。Oracle\
    \ 的下载页面还提供了一个链接，用于获取与 JDK 捆绑的 Netbeans。² Netbeans 是一个集成开发环境（IDE），它能让 Java 开发变得容易得多。或者，你也可以使用另一个免费的\
    \ IDE——Eclipse，³ 如果你根本不想使用任何 IDE，那么一个普通的文本编辑器也完全可以胜任。\n\n创建项目\n\n如果你决定使用 IDE（推荐），你需要创建一个项目来管理\
    \ Java 源文件和其他资源。或者，如果你倾向于不使用 IDE，你可以创建一个扩展名为 .java 的空文件，例如 MyApp.java，然后在你自己选择的文本编辑器中打开它。\n\
    \n要在 Netbeans 中创建项目，请转到“文件”菜单并选择“新建项目”。在对话框中，在“Java”类别下选择“Java 应用程序”项目类型，然后点击“下一步”。在此对话框中，将项目名称设置为“MyProject”，将主类的名称设置为“myproject.MyApp”。如果需要，可以更改项目的位置，然后点击“完成”按钮来生成项目。项目的唯一文件\
    \ MyApp.java 将会打开，其中包含一些默认代码。你可以继续删除所有这些代码，以便从一个空的源文件开始。\n\nHello World\n\n当你设置好项目和编程环境后，要创建的第一个应用程序就是\
    \ Hello World 程序。这个程序将教你如何编译和运行 Java 应用程序，以及如何向命令窗口输出字符串。\n\n创建此程序的第一步是在你的 MyApp.java\
    \ 源文件中添加一个公共类。该类必须与物理源文件同名（不含文件扩展名），在本例中为“MyApp”。在 Java 中，一个文件中可以有多个类，但只允许有一个公共类，并且该名称必须与文件名匹配。请记住，Java\
    \ 是区分大小写的。类名后面的大括号界定了属于该类的部分，并且必须包含在内。大括号及其内容被称为代码块，或简称为块。\n\n```\npublic class\
    \ MyApp {}\n```\n\n接下来，在类内部添加 main 方法。这是应用程序的入口点，并且必须始终以如下所示的形式包含。这些关键字本身将在后续章节中介绍。\n\
    \n```\npublic class MyApp {\n  public static void main(String[] args) {}\n}\n\n\
    ```\n\n完成 Hello World 程序的最后一步是通过调用 `print` 方法来输出文本。此方法位于内置的 `System` 类中，然后在其内部的\
    \ `out` 类中再下一层。该方法接受一个参数——要打印的字符串——并且以分号结尾，Java 中的所有语句都是如此。\n\n```\npublic class\
    \ MyApp {\n  public static void main(String[] args) {\n    System.out.print(\"\
    Hello World\");\n  } \n}\n\n```\n\n请注意，点运算符（`.`）用于访问类的成员。\n\n代码提示\n\n如果你不确定某个特定类包含什么，或者某个方法接受什么参数，你可以利用某些\
    \ IDE（如 Netbeans）中的代码提示功能。当你输入代码并且存在多个预定义的备选项时，代码提示窗口就会出现。你也可以通过按 Ctrl + 空格键手动调出它。这是一个非常强大的功能，可以让你快速访问整个类库及其成员，并附有描述。\n\
    \n¹`http://www.oracle.com/technetwork/java/javase/downloads/index.html`\n\n²`http://www.netbeans.org`\n\
    \n³`http://www.eclipse.org`\n\n第 2 章\n\n![image](img/frontdot.jpg)\n\n编译与运行\n\n\
    从 IDE 中运行\n\n完成 Hello World 程序后，你可以通过两种方式之一来编译和运行它。第一种方法是从你使用的 IDE 的菜单栏中选择“运行”。在\
    \ Netbeans 中，菜单命令是：运行 ➤ 运行主项目。然后 IDE 将编译并运行该应用程序，并显示文本“Hello World”。\n\n从控制台窗口运行\n\
    \n另一种方法是使用控制台窗口（C:\\Windows\\System32\\cmd.exe）手动编译程序。最方便的方法是先将 JDK 的 bin 目录添加到\
    \ `PATH` 环境变量中。在 Windows 中，可以使用 `SET PATH` 命令，然后附加你的 JDK 安装的 bin 文件夹路径，并用分号分隔。\n\
    \n```\nSET PATH=%PATH%;\"C:\\Program Files\\JDK\\bin\"\n```\n\n通过这样做，控制台将能够在此控制台会话期间从任何文件夹找到\
    \ Java 编译器。`PATH` 变量也可以永久更改。¹ 接下来，导航到源文件所在的文件夹，并通过输入“javac”后跟完整的文件名来运行编译器。\n\n\
    ```\njavac MyApp.java\n```\n\n该程序将被编译成一个名为 MyApp.class 的类文件。这个类文件包含的是字节码而不是机器码，因此要执行它，你需要通过输入“java”后跟文件名来调用\
    \ Java 虚拟机。\n\n```\njava MyApp\n```\n\n请注意，编译文件时使用 .java 扩展名，但运行时不使用 .class 扩展名。\n\
    \n注释\n\n注释用于在源代码中插入说明，并且对最终程序没有影响。Java 具有标准的 C++ 注释符号，包括单行注释和多行注释。\n\n```\n//\
    \ 单行注释\n\n/* 多行\n   注释 */\n\n```\n\n除此之外，还有 Javadoc 注释。这种注释用于通过使用 JDK bin 文件夹中包含的一个名为\
    \ Javadoc 的工具来生成文档。\n\n```\n/** javadoc\n    注释 */\n```\n\n¹`http://www.java.com/en/download/help/path.xml`\n\
    \n第 3 章\n\n![image](img/frontdot.jpg)\n\n变量\n\n变量用于在程序执行期间存储数据。\n\n数据类型\n\n根据你需要存储的数据类型，有几种不同的数据类型。Java\
    \ 有八种内置于语言中的类型。这些被称为*基本类型*。整数类型有 `byte`、`short`、`int` 和 `long`。`float` 和 `double`\
    \ 类型表示浮点数（实数）。`char` 类型保存一个 Unicode 字符，`boolean` 类型包含 true 或 false 值。除了这些基本类型之外，Java\
    \ 中的其他所有类型都由类、接口或数组表示。\n\n| 数据类型 | 大小（位） | 描述 |\n| --- | --- | --- |\n| byte short\n\
    int\nlong | 8 16\n\n64 | 有符号整数 |\n| float double | 32 64 | 浮点数 |\n| char | 16\
    \ | Unicode 字符 |\n| boolean | 1 | 布尔值 |\n\n声明变量\n"
- fmt: "要声明（创建）一个变量，你需要先指定它要存储的数据类型，然后跟上一个变量名。变量名可以是任何你想要的，但最好给变量起一个与其将要存储的值密切相关的名称。变量的标准命名约定是：首单词小写，后续单词首字母大写。\n\
    \n```\nint myInt;\n```\n\n**赋值变量**\n\n要给变量赋值，需要使用赋值运算符（`=`），后跟该值。当一个变量被初始化（赋值）后，它就变成了已定义（已声明并赋值）。\n\
    \n```\nmyInt = 10;\n```\n\n声明和赋值可以合并为一条语句。\n\n```\nint myInt = 10;\n```\n\n如果你需要多个相同类型的变量，有一种简写方式，即使用逗号运算符（`,`）来声明或定义它们。\n\
    \n```\nint myInt = 10, myInt2 = 20, myInt3;\n```\n\n**使用变量**\n\n一旦变量被定义，就可以通过直接引用变量名来使用它，例如打印它。\n\
    \n```\nSystem.out.print(myInt);\n```\n\n**整数类型**\n\n如前所述，有四种有符号整数类型，可以根据变量需要存储的数字大小来选择使用。\n\
    \n```\nbyte  myInt8  = 2;  // -128   to +127\nshort myInt16 = 1;  // -32768 to\
    \ +32767\nint   myInt32 = 0;  // -2^31  to +2^31-1\nlong  myInt64 = -1; // -2^63\
    \  to +2^63-1\n```\n\n除了标准的十进制表示法，整数还可以使用八进制或十六进制表示法来赋值。\n\n```\nint myHex = 0xF;\
    \ // hexadecimal (base 16)\nint myOct = 07;  // octal (base 8)\n```\n\n**浮点类型**\n\
    \n浮点类型可以存储整数以及浮点数。它们可以使用十进制或指数表示法来赋值。\n\n```\ndouble myDouble = 3.14;\ndouble\
    \ myDouble2 = 3e2; // 3*10^2 = 300\n```\n\n请注意，Java 中的常量浮点数在内部始终以 `double` 类型保存。因此，如果你尝试将一个\
    \ `double` 赋值给一个 `float`，将会出错，因为 `double` 的精度高于 `float`。要正确赋值，可以在常量后附加一个“F”字符，表示该数字实际上是一个\
    \ `float`。\n\n```\nfloat myFloat = 3.14;  // error: possible loss\n          \
    \             // of precision\nfloat myFloat = 3.14F; // ok\n```\n\n一种更常见且有用的方法是使用显式类型转换。显式类型转换是通过在要转换的变量或常量前放置所需的数据类型（用括号括起来）来执行的。这会在赋值发生之前将值转换为指定的类型，在本例中为\
    \ `float`。\n\n```\nfloat myFloat = (float)3.14;\n```\n\n**字符类型**\n\n`char` 数据类型可以包含单个\
    \ Unicode 字符，由单引号分隔。\n\n```\nchar myChar = 'A';\n```\n\n字符也可以使用一种特殊的十六进制表示法来赋值，该表示法可以访问所有\
    \ Unicode 字符。\n\n```\nchar myChar = '\\u0000'; // \\u0000 to \\uFFFF\n```\n\n\
    **布尔类型**\n\n`boolean` 类型可以存储一个布尔值，即只能为 `true` 或 `false` 的值。这些值使用 `true` 和 `false`\
    \ 关键字来指定。\n\n```\nboolean myBool = false;\n```\n\n**变量作用域**\n\n变量的作用域指的是可以在其中不加限定地使用该变量的代码块。例如，局部变量是在方法内部声明的变量。这样的变量在其声明之后，仅在方法的代码块内可用。一旦方法的作用域（代码块）结束，局部变量就会被销毁。\n\
    \n```\npublic static void main(String[] args)\n{\n  int localVar; // local variable\n\
    }\n```\n\n除了局部变量，Java 还有字段和参数类型的变量，这些将在后续章节中介绍。然而，Java 没有像 C++ 那样的全局变量。\n\n**匿名块**\n\
    \n局部变量的作用域可以通过使用匿名（未命名）代码块来限制。这种结构很少使用，因为如果一个方法大到需要使用匿名块，更好的选择通常是将代码分解为单独的方法。\n\
    \n```\npublic static void main(String[] args)\n{ \n  // Anonymous code block\n\
    \  { \n    int localVar = 10;\n  } \n  // localVar is unavailable from here\n\
    }\n```\n\n## 第四章\n\n![image](images/frontdot.jpg)\n\n## 运算符\n\n运算符用于对值进行操作。它们可以分为五种类型：算术运算符、赋值运算符、比较运算符、逻辑运算符和位运算符。\n\
    \n**算术运算符**\n\n有四个基本的算术运算符，以及模运算符（`%`），用于获取除法余数。\n\n```\nfloat x = 3+2; // 5 //\
    \ addition\n      x = 3-2; // 1 // subtraction\n      x = 3*2; // 6 // multiplication\n\
    \      x = 3/2; // 1 // division\n      x = 3%2; // 1 // modulus (division remainder)\n\
    ```\n\n请注意，除法运算给出了一个不正确的结果。这是因为它对两个整数值进行运算，因此会对结果进行舍入并返回一个整数。要获得正确的值，必须将其中一个数字显式转换为浮点类型。\n\
    \n```\nfloat x = (float)3/2; // 1.5\n```\n\n**赋值运算符**\n\n第二组是赋值运算符。最重要的是赋值运算符（`=`）本身，它将一个值赋给一个变量。\n\
    \n**复合赋值运算符**\n\n赋值运算符和算术运算符的一个常见用法是对一个变量进行运算，然后将结果保存回同一个变量。这些操作可以使用复合赋值运算符来缩短。\n\
    \n```\nint x = 0;\n    x += 5; // x = x+5;\n    x -= 5; // x = x-5;\n    x *=\
    \ 5; // x = x*5;\n    x /= 5; // x = x/5;\n    x %= 5; // x = x%5;\n```\n\n**递增和递减运算符**\n\
    \n另一个常见操作是将变量递增或递减 1。这可以使用递增（`++`）和递减（`--`）运算符来简化。\n\n```\n++x; // x += 1\n--x;\
    \ // x -= 1\n```\n\n这两个运算符都可以用在变量之前或之后。\n\n```\n++x; // pre-increment\n--x; //\
    \ pre-decrement\nx++; // post-increment\nx--; // post-decrement\n```\n\n无论使用哪种方式，对变量的结果都是相同的。区别在于，后置运算符在修改变量之前返回原始值，而前置运算符先修改变量，然后返回值。\n\
    \n```\nx = 5; y = x++; // y=5, x=6\nx = 5; y = ++x; // y=6, x=6\n```\n\n**比较运算符**\n\
    \n比较运算符比较两个值并返回 `true` 或 `false`。它们主要用于指定条件，即计算结果为 `true` 或 `false` 的表达式。\n\n\
    ```\nboolean x = (2==3); // false // equal to\n        x = (2!=3); // true  //\
    \ not equal to\n        x = (2>3);  // false // greater than\n        x = (2<3);\
    \  // true  // less than\n        x = (2>=3); // false // greater than or equal\
    \ to\n        x = (2<=3); // true  // less than or equal to\n```\n\n**逻辑运算符**\n\
    \n逻辑运算符通常与比较运算符一起使用。逻辑与（`&&`）在左右两侧都为 `true` 时计算结果为 `true`，逻辑或（`||`）在左侧或右侧为 `true`\
    \ 时计算结果为 `true`。对于反转布尔结果，有逻辑非（`!`）运算符。请注意，对于“逻辑与”和“逻辑或”，如果左侧已经确定了结果，则右侧将不会被计算。\n\
    \n```\nboolean x = (true && false); // false // logical and\n        x = (true\
    \ || false); // true  // logical or\n        x = !(true);         // false //\
    \ logical not\n```\n\n**位运算符**\n\n位运算符可以操作整数内部的各个位。例如，右移运算符（`>>`）将所有位（符号位除外）向右移动，而无符号右移（`>>>`）将所有位（包括符号位）向右移动。"
  raw: "To declare (create) a variable you start with the data type you want it to\
    \ hold followed by a variable name. The name can be anything you want, but it\
    \ is a good idea to give your variables names that are closely related to the\
    \ values they will hold. The standard naming convention for variables is that\
    \ the first word should be lowercase and any subsequent words initially capitalized.\n\
    \n```\nint myInt;\n```\n\nAssigning variables\n\nTo give the variable a value\
    \ you use the assignment operator (`=`) followed by the value. When a variable\
    \ is initialized (assigned a value) it then becomes defined (declared and assigned).\n\
    \n```\nmyInt = 10;\n```\n\nThe declaration and assignment can be combined into\
    \ a single statement.\n\n```\nint myInt = 10;\n```\n\nIf you need multiple variables\
    \ of the same type, there is a shorthand way of declaring or defining them by\
    \ using the comma operator (`,`).\n\n```\nint myInt = 10, myInt2 = 20, myInt3;\n\
    ```\n\nUsing variables\n\nOnce a variable has been defined it can be used by simply\
    \ referencing the variable’s name, for example to print it.\n\n```\nSystem.out.print(myInt);\n\
    ```\n\nInteger types\n\nAs shown earlier, there are four signed integer types\
    \ that can be used depending on how large a number you need the variable to hold.\n\
    \n```\nbyte  myInt8  = 2;  // -128   to +127\nshort myInt16 = 1;  // -32768 to\
    \ +32767\nint   myInt32 = 0;  // -2^31  to +2^31-1\nlong  myInt64 = -1; // -2^63  to\
    \ +2^63-1\n```\n\nIn addition to standard decimal notation, integers can also\
    \ be assigned by using octal or hexadecimal notation.\n\n```\nint myHex = 0xF;\
    \ // hexadecimal (base 16)\nint myOct = 07;  // octal (base 8)\n```\n\nFloating-point\
    \ types\n\nThe floating-point types can store integers as well as floats. They\
    \ can be assigned with either decimal or exponential notation.\n\n```\ndouble\
    \ myDouble = 3.14;\ndouble myDouble2 = 3e2; // 3*10^2 = 300\n```\n\nNote that\
    \ constant floating-point numbers in Java are always kept internally as doubles.\
    \ Therefore, if you try to assign a `double` to a `float` you will get an error,\
    \ because a `double` has a higher precision than a `float`. To assign it correctly\
    \ you can append an “F” character to the constant, which says that the number\
    \ is in fact a `float`.\n\n```\nfloat myFloat = 3.14;  // error: possible loss\n\
                           // of precision\nfloat myFloat = 3.14F; // ok\n```\n\n\
    A more common and useful way to do this is by using an explicit cast. An explicit\
    \ cast is performed by placing the desired data type in parentheses before the\
    \ variable or constant that is to be converted. This will convert the value to\
    \ the specified type, in this case `float`, before the assignment occurs.\n\n\
    ```\nfloat myFloat = (float)3.14;\n```\n\nChar type\n\nThe `char` data type can\
    \ contain a single Unicode character, delimited by single quotes.\n\n```\nchar\
    \ myChar = 'A';\n```\n\nChars can also be assigned by using a special hexadecimal\
    \ notation that gives access to all Unicode characters.\n\n```\nchar myChar =\
    \ '\\u0000'; // \\u0000 to \\uFFFF\n```\n\nBoolean type\n\nThe `boolean` type\
    \ can store a Boolean value, which is a value that can only be either true or\
    \ false. These values are specified with the `true` and `false` keywords.\n\n\
    `boolean myBool = false;`\n\nVariable scope\n\nThe scope of a variable refers\
    \ to the code block within which it is possible to use that variable without qualification.\
    \ For example, a local variable is a variable declared within a method. Such a\
    \ variable will only be available within the method’s code block, after it has\
    \ been declared. Once the scope (code block) of the method ends, the local variable\
    \ will be destroyed.\n\n```\npublic static void main(String[] args)\n{\n  int\
    \ localVar; // local variable\n}\n```\n\nIn addition to local variables, Java\
    \ has field and parameter type variables, which will be looked at in later chapters.\
    \ Java does not, however, have global variables, as for example does C++.\n\n\
    Anonymous block\n\nThe scope of local variables can be restricted by using an\
    \ anonymous (unnamed) code block. This construct is seldom used, because if a\
    \ method is large enough to warrant the use of an anonymous block, a better choice\
    \ is often to break up the code into separate methods.\n\n```\npublic static void\
    \ main(String[] args)\n{ \n  // Anonymous code block\n  { \n    int localVar =\
    \ 10;\n  } \n  // localVar is unavailable from here\n}\n\n```\n\nCHAPTER 4\n\n\
    ![image](images/frontdot.jpg)\n\nOperators\n\nOperators are used to operate on\
    \ values. They can be grouped into five types: arithmetic, assignment, comparison,\
    \ logical and bitwise operators.\n\nArithmetic operators\n\nThere are the four\
    \ basic arithmetic operators, as well as the modulus operator (`%`) which is used\
    \ to obtain the division remainder.\n\n```\nfloat x = 3+2; // 5 // addition\n\
          x = 3-2; // 1 // subtraction\n      x = 3*2; // 6 // multiplication\n      x\
    \ = 3/2; // 1 // division\n      x = 3%2; // 1 // modulus (division remainder)\n\
    ```\n\nNotice that the division sign gives an incorrect result. This is because\
    \ it operates on two integer values and will therefore round the result and return\
    \ an integer. To get the correct value, one of the numbers must be explicitly\
    \ converted to a floating-point type.\n\n```\nfloat x = (float)3/2; // 1.5\n```\n\
    \nAssignment operators\n\nThe second group is the assignment operators. Most importantly,\
    \ the assignment operator (`=`) itself, which assigns a value to a variable.\n\
    \nCombined assignment operators\n\nA common use of the assignment and arithmetic\
    \ operators is to operate on a variable and then to save the result back into\
    \ that same variable. These operations can be shortened with the combined assignment\
    \ operators.\n\n```\nint x = 0;\n    x += 5; // x = x+5;\n    x -= 5; // x = x-5;\n\
        x *= 5; // x = x*5;\n    x /= 5; // x = x/5;\n    x %= 5; // x = x%5;\n```\n\
    \nIncrement and decrement operators\n\nAnother common operation is to increment\
    \ or decrement a variable by one. This can be simplified with the increment (`++`)\
    \ and decrement (`−−`) operators.\n\n```\n++x; // x += 1\n−−x; // x -= 1\n```\n\
    \nBoth of these can be used either before or after a variable.\n\n```\n++x; //\
    \ pre-increment\n−−x; // pre-decrement\nx++; // post-increment\nx−−; // post-decrement\n\
    ```\n\nThe result on the variable is the same whichever is used. The difference\
    \ is that the post-operator returns the original value before it changes the variable,\
    \ while the pre-operator changes the variable first and then returns the value.\n\
    \n```\nx = 5; y = x++; // y=5, x=6\nx = 5; y = ++x; // y=6, x=6\n```\n\nComparison\
    \ operators\n\nThe comparison operators compare two values and return either true\
    \ or false. They are mainly used to specify conditions, which are expressions\
    \ that evaluate to either true or false.\n\n```\nboolean x = (2==3); // false\
    \ // equal to\n        x = (2!=3); // true  // not equal to\n        x = (2>3);  //\
    \ false // greater than\n        x = (2<3);  // true  // less than\n        x\
    \ = (2>=3); // false // greater than or equal to\n        x = (2<=3); // true  //\
    \ less than or equal to\n```\n\nLogical operators\n\nThe logical operators are\
    \ often used together with the comparison operators. Logical and (`&&`) evaluates\
    \ to true if both the left and right side are true, and logical or (`||`) is true\
    \ if either the left or right side is true. For inverting a Boolean result there\
    \ is the logical not (`!`) operator. Note that for both “logical and” and “logical\
    \ or” the right-hand side will not be evaluated if the result is already determined\
    \ by the left-hand side.\n\n```\nboolean x = (true && false); // false // logical\
    \ and\n        x = (true || false); // true  // logical or\n        x = !(true);        \
    \ // false // logical not\n```\n\nBitwise operators\n\nThe bitwise operators can\
    \ manipulate individual bits inside an integer. For example, the right shift operator\
    \ (`>>`) moves all bits except the sign bit to the right, whereas zero-fill right\
    \ shift (`>>>`) moves all bits right including the sign bit."
