    关于作者


    **Mikael Olsson** 是一位专业的网络创业者、程序员和作家。他在芬兰一家研发公司工作，专注于软件开发。业余时间，他撰写书籍并创建网站，总结各种感兴趣的领域。他写的书专注于以最高效的方式教授主题，只解释相关且实用的内容，没有任何不必要的重复或理论。


    引言


    Java 是一种高级面向对象编程语言，由 Sun Microsystems 开发，该公司于 2010 年成为 Oracle 公司的一部分。该语言与 C++
    非常相似，但经过简化，使其更容易编写无错误的代码。最值得注意的是，Java 中没有指针，所有内存分配和释放都是自动处理的。


    尽管有诸如此类的简化，但由于其庞大的类库，Java 的功能比 C 和 C++ 都要多得多。Java 程序还具有高性能，并且可以做到非常安全，这使 Java
    成为当今使用最广泛的通用编程语言。


    Java 的另一个关键特性是它的平台无关性。这是通过将程序仅编译到一半，即编译成称为字节码的平台无关指令来实现的。然后，字节码由 Java 虚拟机（JVM）解释或运行。这意味着任何安装了该程序及其附带库的系统都可以运行
    Java 应用程序。


    Java 编程语言有三种可用的类库：Java ME、Java SE 和 Java EE。Java ME（移动版）是 Java SE（标准版）的精简版本，而
    Java EE（企业版）是 Java SE 的扩展版本，包含用于构建 Web 应用程序的库。


    Java 语言及其类库自 1996 年首次发布以来经历了重大变化。版本的命名约定也经历了几次修订。主要版本包括：JDK 1.0、JDK 1.1、J2SE 1.2、J2SE
    1.3、J2SE 1.4、J2SE 5.0、Java SE 6 和 Java SE 7，后者是撰写本文时的当前版本。

