    ## Operator precedence


    In Java, expressions are normally evaluated from left to right. However, when
    an expression contains multiple operators, the precedence of those operators decides
    the order that they are evaluated in. The order of precedence can be seen in the
    following table. This same order also applies to many other languages, such as
    C++ and C#.


    ![image](images/Table4-1.jpg)


    For example, logical and (`&&`) binds weaker than relational operators, which
    in turn binds weaker than arithmetic operators.


    ```java

    x = 2+3 > 1*4 && 5/5 == 1; // true

    ```


    To avoid having to learn the precedents of all operators and to clarify the intent,
    parentheses can be used to specify which part of the expression will be evaluated
    first. Parentheses have the highest precedence of all operators.


    ```java

    x = ( (2+3) > (1*4) ) && ( (5/5) == 1 ); // true

    ```


