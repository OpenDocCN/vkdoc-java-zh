    \ 块仅设置为处理 `FileNotFoundException`。如果 try 块中的代码可能抛出更多类型的异常，并且所有这些异常都应以相同方式处理，则可以捕获一个更通用的异常，例如\
    \ `Exception` 类本身。这个 catch 子句随后将能够处理所有继承自该类的异常，包括 `FileNotFoundException`。请记住，更通用的异常需要在更具体的异常之后捕获。catch\
    \ 子句必须始终定义一个异常对象。该对象可用于获取有关异常的更多信息，例如通过使用 `getMessage` 方法获取异常的描述。\n\n```\ncatch(FileNotFoundException\
    \ e) {\n  System.out.print(e.getMessage());\n} \ncatch(Exception e) {\n  System.out.print(e.getMessage());\n\
    }\n\n```\n\nFinally 块\n\n作为 try-catch 语句的最后一个子句，可以添加一个 finally 块。该块用于清理在 try 块中分配的资源，并且无论是否发生异常，它都会执行。在此示例中，在\
    \ try 块中打开的文件应该被关闭，但前提是它已成功打开。为了能够在 finally 子句中访问 `FileReader` 对象，它必须在 try 块外部声明。此外，由于\
    \ close 方法也可能抛出异常，因此它需要被另一个 try-catch 块包围。请记住，如果你忘记关闭文件，Java 的垃圾回收器最终会为你执行此操作，但自己动手关闭文件是一种良好的编程实践。\n\
    \n```\nimport java.io.*;\n// ... \nFileReader in = null;\ntry {\n  in = new FileReader(\"\
    Missing.file\");\n} \ncatch(FileNotFoundException e) {\n  System.out.print(e.getMessage());\n\
    } \nfinally {\n  if (in != null) {\n    try { in.close(); }\n    catch(IOException\
    \ e) {}\n  } \n}\n\n```\n\n抛出异常\n\n当方法遇到无法恢复的情况时，它可以生成自己的异常，以向调用者发出方法失败的信号。这是通过使用\
    \ `throw` 关键字后跟一个 `Throwable` 类型的新实例来完成的。\n\n```\nstatic void MakeException()\n\
    { \n  throw new Throwable(\"我的 Throwable\");\n}\n\n```\n\n已检查异常与未检查异常\n\nJava\
    \ 中的异常分为两类——已检查异常和未检查异常——具体取决于是否需要指定它们。抛出已检查异常（例如 `IOException`）的方法将无法编译，除非在方法参数列表之后使用\
    \ throws 子句指定它，并且调用方法捕获了该异常。另一方面，未检查异常（例如 `ArithmeticException`）不必被捕获或指定。请注意，要指定多个异常，异常类型之间用逗号分隔。\n\
    \n```\nimport java.io.*;\n// ... \nstatic void MakeException() throws IOException,\n\
                                       ArithmeticException\n{ \n  throw new IOException(\"\
    我的 IO 异常\");\n  // ... \n  throw new ArithmeticException(\"除以零\");\n}\n\n```\n\
    \n异常层次结构\n\n与 Java 中的大多数其他事物一样，异常是存在于层次结构中的类。此层次结构的根（在 `Object` 之下）是 `Throwable`\
    \ 类，该类的所有后代都可以被抛出和捕获。继承自 `Throwable` 的有 `Error` 和 `Exception` 类。从 `Error` 派生的类用于指示不可恢复的异常，例如\
    \ `OutOfMemoryError`。这些是未检查异常，因为一旦它们发生，即使被捕获，程序员也不太可能对它们采取任何措施。\n\n从 `Exception`\
    \ 派生的是 `RuntimeExceptions`，它们也是未检查异常。这些异常几乎可能在任何代码中发生，因此捕获和指定它们会很麻烦。例如，除以零会抛出\
    \ `ArithmeticException`，然而用 try-catch 包围每个除法运算会很烦人。检查异常也存在一定的开销，并且检查这些异常的成本超过了捕获它们的好处。其他\
    \ `Exception` 的后代，即那些不继承自 `RuntimeExceptions` 的，都是已检查异常。这些是可以恢复的异常，并且必须被捕获和指定。\n\
    \n第 21 章\n\n![image](img/frontdot.jpg)\n\n装箱与拆箱\n\n将基本类型变量放入对象中称为装箱。这允许在需要对象的地方使用基本类型。为此，Java\
    \ 为每种基本类型提供了包装类，即：`Byte`、`Short`、`Integer`、`Long`、`Float`、`Double`、`Character`\
    \ 和 `Boolean`。例如，一个 `Integer` 对象可以持有一个 int 类型的变量。\n\n```\nint iPrimitive = 5;\n\
    Integer iWrapper = new Integer(iPrimitive); // 装箱\n```\n\n与装箱相反的是拆箱。这会将对象类型转换回其基本类型。\n\
    \n```\niPrimitive = iWrapper.intValue(); // 拆箱\n```\n\n包装类属于 `java.lang` 包，该包始终被导入。与基本类型相比，包装对象是不可变的（不可更改）。要更改它们的值，必须创建一个新实例。基本类型和包装对象之间的另一个区别是它们如何检查相等性。基本类型使用相等运算符\
    \ (==)，而任何类型的对象都使用继承自 `Object` 的 `equals` 方法。还要记住，对象可以设置为 null，而基本类型则不能。\n\n自动装箱与自动拆箱\n"
- fmt: "Java 5 引入了自动装箱（autoboxing）和自动拆箱（autounboxing）。这些特性允许在基本类型与其包装类对象之间进行自动转换。\n\
    \n```\nInteger iWrapper = iPrimitive; // autoboxing\niPrimitive = iWrapper;  \
    \       // autounboxing\n```\n\n请注意，这仅仅是语法糖，旨在使代码更易于阅读。编译器会为你添加必要的代码来对基本类型进行装箱和拆箱——使用`valueOf`和`intValue`方法。\n\
    \n```\nInteger iWrapper = Integer.valueOf(iPrimitive);\niPrimitive = iWrapper.intValue()\n\
    ```\n\n### 基本类型与包装类指南\n\n当不需要对象时，应使用基本类型。这是因为基本类型通常比对象更快且更节省内存。相反，当需要数值但必须使用对象时，包装类就很有用。例如，要将数值存储在集合类（如`ArrayList`）中，就需要使用包装类。\n\
    \n```\njava.util.ArrayList a = new java.util.ArrayList();\na.add(Integer.valueOf(5));\
    \ // 装箱\na.add(10);                 // 自动装箱\n```\n\n请记住，如果速度很重要，则应尽量减少基本类型与包装类对象之间的转换。任何装箱和拆箱操作都伴随着固有的性能开销。\n\
    \n## 第22章\n\n![image](images/frontdot.jpg)\n\n# 泛型\n\n泛型指的是类型参数的使用，它提供了一种定义可操作不同数据类型的类、接口和方法的方式。泛型的好处在于它们提供了编译时的类型安全性，并且消除了大多数类型转换的需要。\n\
    \n## 泛型类\n\n泛型类允许类成员使用类型参数。通过在类名后添加一个类型参数段来定义此类，该段包含一个用尖括号括起来的类型参数。类型参数的命名约定是它们应由单个大写字母组成。通常，使用字母`T`表示类型。下面的示例定义了一个泛型容器类，它可以保存一个泛型类型的元素。\n\
    \n```\n// 泛型容器类\nclass MyBox<T> { public T box; }\n```\n\n当实例化此泛型类的对象时，必须将类型参数替换为实际的数据类型，例如`Integer`。\n\
    \n```\nMyBox<Integer> iBox = new MyBox<Integer>();\n```\n\n或者，从 Java 7 开始，可以使用一组空的类型参数来实例化泛型类。只要编译器能够从上下文中推断（确定）类型参数，这种实例化方式就是可行的。\n\
    \n```\nMyBox<Integer> iBox = new MyBox<>();\n```\n\n当创建`MyBox`的实例时，类定义中的每个类型参数都会被替换为传入的类型实参。因此，该对象的行为就像一个普通对象，具有一个`Integer`类型的字段。\n\
    \n```\niBox.box = 5;\nInteger i = iBox.box;\n```\n\n请注意，在设置或从`box`字段检索存储的值时，不需要进行强制类型转换。此外，如果错误地将泛型字段赋值或设置为不兼容的类型，编译器会指出这一点。\n\
    \n```\niBox.box = \"Hello World\"; // 编译时错误\nString s = iBox.box;      // 编译时错误\n\
    ```\n\n## 泛型方法\n\n通过在方法的返回类型之前声明一个类型参数段，可以使方法成为泛型方法。类型参数可以在方法内部像任何其他类型一样使用。它也可以用于方法的返回类型、`throws`子句以及参数类型。下面的示例展示了一个泛型类方法，它接受一个泛型数组参数，并打印其内容。\n\
    \n```\nclass MyClass\n{ \n  public static <T> void printArray(T[] array)\n  {\
    \ \n    for (T element : array)\n      System.out.print(element + \" \");\n  }\
    \ \n}\n```\n\n方法可以声明为泛型，无论其所在的类或接口是否是泛型的。构造函数也是如此。\n\n### 调用泛型方法\n\n泛型方法通常像普通（非泛型）方法一样被调用，无需指定类型实参。\n\
    \n```\nInteger[] iArray = { 1, 2, 3 };\nMyClass.printArray(iArray);\n```\n\n在大多数情况下，Java\
    \ 编译器可以推断出泛型方法调用的类型实参，因此不必包含它。但是，如果不是这种情况，则需要显式指定类型实参。\n\n```\nMyClass.<Integer>printArray(iArray);\n\
    ```\n\n## 泛型接口\n\n使用类型参数声明的接口成为泛型接口。泛型接口与普通接口有两个相同的目的。它们要么是为了公开将被其他类使用的类的成员而创建，要么是为了强制一个类实现特定的功能。当实现泛型接口时，必须指定类型实参。泛型接口可以由泛型类和非泛型类实现。\n\
    \n```\n// 泛型功能接口\ninterface IGenericCollection<T>\n{ \n  public void store(T t);\n\
    }\n\n// 实现泛型接口的非泛型类\nclass Box implements IGenericCollection<Integer>\n{ \n  public\
    \ Integer myBox;\n  public void store(Integer i) { myBox = i; }\n}\n\n// 实现泛型接口的泛型类\n\
    class GenericBox<T> implements IGenericCollection<T>\n{ \n  public T myBox;\n\
    \  public void store(T t) { myBox = t; }\n}\n```\n\n## 泛型类型参数\n\n为泛型传入的类型实参可以是类类型、接口类型或另一个类型参数。但是，它不能是基本类型。泛型可以定义多个类型参数，只需在尖括号之间以逗号分隔列表的形式添加更多参数即可。请记住，括号内的每个参数必须是唯一的。\n\
    \n```\nclass MyClass<T, U> {}\n```\n\n如果泛型定义了多个类型参数，则在使用泛型时需要指定相同数量的类型实参。\n\n\
    ```\nMyClass<Integer, Float> myClass = new MyClass<Integer,\n                \
    \                              Float>();\n```\n\n## 泛型变量的使用\n\n在 Java 中，泛型仅仅是编译时的构造。在编译器检查了与泛型变量一起使用的类型正确之后，它将擦除泛型代码中的所有类型参数和类型实参信息，并插入适当的强制类型转换。这意味着泛型不会像在\
    \ C# 中那样，因为消除了运行时强制类型转换而带来比非泛型代码更好的性能。这也意味着泛型类型不能用于任何需要运行时信息的事情——例如创建泛型类型的新实例或对类型参数使用`instanceof`运算符。允许的操作包括：声明泛型类型的变量、将`null`赋值给泛型变量以及调用`Object`方法。\n\
    \n```\nclass MyClass<T>\n{ \n  public void myMethod(Object o)\n  { \n    T t1;\
    \                            // 允许\n    t1 = null;                       // 允许\n\
    \    System.out.print(t1.toString()); // 允许\n    if (o instanceof T) {}      \
    \     // 无效\n    T t2 = new T();                  // 无效\n  } \n}\n```\n\n从泛型代码中移除类型信息的过程称为*类型擦除*。例如，`MyBox<Integer>`将被简化为`MyBox`，这被称为*原始类型*。执行此步骤是为了保持与在\
    \ Java 5 中泛型成为语言一部分之前编写的代码的向后兼容性。\n\n## 有界类型参数\n\n可以对泛型可以使用的类型参数种类应用编译时强制限制。这些限制称为*边界*，它们通过在类型参数段中使用`extends`关键字来指定。类型参数可以由超类或接口进行限定。例如，下面的类`B`只能使用类型为`A`或具有该类作为超类的类型实参进行实例化。"
  raw: "Java 5 introduced autoboxing and autounboxing. These features allow for automatic\
    \ conversion between primitives and their wrapper objects.\n\n```\nInteger iWrapper\
    \ = iPrimitive; // autoboxing\niPrimitive = iWrapper;         // autounboxing\n\
    ```\n\nNote that this is only syntactic sugar designed to make the code easier\
    \ to read. The compiler will add the necessary code to box and unbox the primitives\
    \ for you – using the `valueOf` and `intValue` methods.\n\n```\nInteger iWrapper\
    \ = Integer.valueOf(iPrimitive);\niPrimitive = iWrapper.intValue()\n```\n\nPrimitive\
    \ and wrapper guideline\n\nPrimitive types should be used when there is no need\
    \ for objects. This is because primitives are generally faster and more memory\
    \ efficient than objects. Conversely, wrappers are useful when numerical values\
    \ are needed, but objects are required. For example, to store numerical values\
    \ in a collection class, such as `ArrayList`, the wrapper classes are needed.\n\
    \n```\njava.util.ArrayList a = new java.util.ArrayList();\na.add(Integer.valueOf(5));\
    \ // boxing\na.add(10);                 // autoboxing\n```\n\nBear in mind that\
    \ conversions between primitives and wrapper objects should be kept low if speed\
    \ is important. There is an inherit performance penalty associated with any boxing\
    \ and unboxing operation.\n\nCHAPTER 22\n\n![image](images/frontdot.jpg)\n\nGenerics\n\
    \nGenerics refer to the use of type parameters, which provide a way to define\
    \ methods, classes and interfaces that can operate with different data types.\
    \ The benefits of generics is that they provide compile-time type safety, and\
    \ that they eliminate the need for most type conversions.\n\nGeneric classes\n\
    \nGeneric classes allow class members to use type parameters. Such a class is\
    \ defined by adding a type parameter section after the class name, which contains\
    \ a type parameter enclosed between angle brackets. The naming convention for\
    \ type parameters is that they should consist of a single uppercase letter. Typically,\
    \ the letter `T` for type is used. The example below defines a generic container\
    \ class that can hold a single element of the generic type.\n\n```\n// Generic\
    \ container class\nclass MyBox<T> { public T box; }\n```\n\nWhen an object of\
    \ this generic class is instantiated, the type parameter must be replaced with\
    \ an actual data type, such as `Integer`.\n\n```\nMyBox<Integer> iBox = new MyBox<Integer>();\n\
    ```\n\nAlternatively, as of Java 7, a generic class can be instantiated with an\
    \ empty set of type parameters. This type of instantiation is possible as long\
    \ as the compiler can infer (determine) the type parameters from the context.\n\
    \n```\nMyBox<Integer> iBox = new MyBox<>();\n```\n\nWhen an instance of `MyBox`\
    \ is created, each type parameter in the class definition is replaced with the\
    \ passed in type argument. The object therefore behaves as a regular object, with\
    \ a single field of the `Integer` type.\n\n```\niBox.box = 5;\nInteger i = iBox.box;\n\
    ```\n\nNotice that no casting is required when the stored value is set or retrieved\
    \ from the `box` field. Furthermore, if the generic field is mistakenly assigned\
    \ to or set to an incompatible type, the compiler will point this out.\n\n```\n\
    iBox.box = \"Hello World\"; // compile-time error\nString s = iBox.box;      //\
    \ compile-time error\n```\n\nGeneric methods\n\nA method can be made generic by\
    \ declaring it with a type parameter section before the method’s return type.\
    \ The type parameter can be used as any other type inside of the method. It can\
    \ also be used for the method’s return type, in the throws clause and for its\
    \ parameter types. The example below shows a generic class method that accepts\
    \ a generic array parameter, the content of which is printed out.\n\n```\nclass\
    \ MyClass\n{ \n  public static <T> void printArray(T[] array)\n  { \n    for (T\
    \ element : array)\n      System.out.print(element + \" \");\n  } \n}\n\n```\n\
    \nMethods can be declared as generic, independently of whether or not the enclosing\
    \ class or interface is generic. The same is true for constructors.\n\nCalling\
    \ generic methods\n\nA generic method is typically invoked just as a regular (non-generic)\
    \ method, without specifying the type argument.\n\n```\nInteger[] iArray = { 1,\
    \ 2, 3 };\nMyClass.printArray(iArray);\n```\n\nIn most cases, the Java compiler\
    \ can infer the type argument of a generic method call, and so it does not have\
    \ to be included. However, if this is not the case the type argument will then\
    \ need to be explicitly specified.\n\n```\nMyClass.<Integer>printArray(iArray);\n\
    ```\n\nGeneric interfaces\n\nInterfaces that are declared with type parameters\
    \ become generic interfaces. Generic interfaces have the same two purposes as\
    \ regular interfaces. They are either created to expose members of a class that\
    \ will be used by other classes, or to force a class to implement a specific functionality.\
    \ When a generic interface is implemented, the type argument must be specified.\
    \ The generic interface can be implemented by both generic and non-generic classes.\n\
    \n```\n// Generic functionality interface\ninterface IGenericCollection<T>\n{\
    \ \n  public void store(T t);\n}\n\n// Non-generic class implementing generic\
    \ interface\nclass Box implements IGenericCollection<Integer>\n{ \n  public Integer\
    \ myBox;\n  public void store(Integer i) { myBox = i; }\n}\n\n// Generic class\
    \ implementing generic interface\nclass GenericBox<T> implements IGenericCollection<T>\n\
    { \n  public T myBox;\n  public void store(T t) { myBox = t; }\n}\n\n```\n\nGeneric\
    \ type parameters\n\nThe passed in type argument for a generic can either be a\
    \ class type, interface type or another type parameter. It cannot, however, be\
    \ a primitive type. Generics can have more than one type parameter defined, just\
    \ by adding more of them between the angle brackets in a comma-separated list.\
    \ Bear in mind that each parameter within the brackets must be unique.\n\n```\n\
    class MyClass<T, U> {}\n```\n\nIf a generic has multiple type parameters defined,\
    \ the same number of type arguments need to be specified when the generic is used.\n\
    \n```\nMyClass<Integer, Float> myClass = new MyClass<Integer,\n                                              Float>();\n\
    ```\n\nGeneric variable usages\n\nGenerics are only a compile-time construct in\
    \ Java. After the compiler has checked that the types used with generic variables\
    \ are correct, it will then erase all type parameter and argument information\
    \ from the generic code and insert the appropriate casts instead. This means that\
    \ generics do not give any performance benefits over non-generic code, because\
    \ of removed run-time casts, as they do in for example C#. It also means that\
    \ generic types cannot be used for anything that requires run-time information\
    \ – such as creating new instances of generic types or using the `instanceof`\
    \ operator with type parameters. Operations that are allowed include: declaring\
    \ variables of the generic type, assigning null to generic variables and calling\
    \ `Object` methods.\n\n```\nclass MyClass<T>\n{ \n  public void myMethod(Object\
    \ o)\n  { \n    T t1;                            // allowed\n    t1 = null;                      \
    \ // allowed\n    System.out.print(t1.toString()); // allowed\n    if (o instanceof\
    \ T) {}           // invalid\n    T t2 = new T();                  // invalid\n\
      } \n}\n\n```\n\nThe process of removing type information from generic code is\
    \ known as *type erasure*. For example, `MyBox<Integer>` would be reduced to `MyBox`,\
    \ which is called the *raw type*. This step is performed in order to maintain\
    \ backwards compatibility with code written before generics became part of the\
    \ language in Java 5.\n\nBounded type parameters\n\nIt is possible to apply compile-time\
    \ enforced restrictions on the kinds of type parameters that a generic may be\
    \ used with. These restrictions are called *bounds* , and they are specified within\
    \ the type parameter section by using the `extends` keyword. Type parameters can\
    \ be bounded by either superclass or interface. For example, the class `B` below\
    \ may only be instantiated with a type argument that either is of the type `A`,\
    \ or has that class as a superclass."
  trans: "\nJava 5 引入了自动装箱（autoboxing）和自动拆箱（autounboxing）。这些特性允许在基本类型与其对应的包装类对象之间进行自动转换。\n\
    \n```\nInteger iWrapper = iPrimitive; // 自动装箱\niPrimitive = iWrapper;        \
    \ // 自动拆箱\n```\n\n请注意，这仅仅是语法糖，旨在使代码更易于阅读。编译器会为你添加必要的代码来对基本类型进行装箱和拆箱——使用 `valueOf`\
    \ 和 `intValue` 方法。\n\n```\nInteger iWrapper = Integer.valueOf(iPrimitive);\niPrimitive\
    \ = iWrapper.intValue()\n```\n\n基本类型与包装类指南\n\n当不需要对象时，应使用基本类型。这是因为基本类型通常比对象更快且更节省内存。相反，当需要数值但必须使用对象时，包装类就很有用。例如，要将数值存储在像\
    \ `ArrayList` 这样的集合类中，就需要使用包装类。\n\n```\njava.util.ArrayList a = new java.util.ArrayList();\n\
    a.add(Integer.valueOf(5)); // 装箱\na.add(10);                 // 自动装箱\n```\n\n\
    请记住，如果速度很重要，则应尽量减少基本类型与包装类对象之间的转换。任何装箱和拆箱操作都会带来固有的性能开销。\n\n第 22 章\n\n![image](img/frontdot.jpg)\n\
    \n泛型\n\n泛型指的是类型参数的使用，它提供了一种定义可操作不同数据类型的**方法**、**类**和**接口**的方式。泛型的好处在于它们提供了编译时的类型安全性，并且消除了大多数类型转换的需要。\n\
    \n泛型类\n\n泛型类允许类成员使用类型参数。通过在类名后添加一个类型参数部分来定义此类，该部分包含一个用尖括号括起来的类型参数。类型参数的命名约定是它们应由单个大写字母组成。通常，使用字母\
    \ `T` 表示类型。下面的示例定义了一个泛型容器类，它可以容纳一个泛型类型的元素。\n\n```\n// 泛型容器类\nclass MyBox<T> {\
    \ public T box; }\n```\n\n当实例化此泛型类的对象时，必须将类型参数替换为实际的数据类型，例如 `Integer`。\n\n```\n\
    MyBox<Integer> iBox = new MyBox<Integer>();\n```\n\n或者，从 Java 7 开始，可以使用一组空的类型参数来实例化泛型类。只要编译器能够从上下文中推断（确定）类型参数，这种实例化方式就是可行的。\n\
    \n```\nMyBox<Integer> iBox = new MyBox<>();\n```\n\n当创建 `MyBox` 的实例时，类定义中的每个类型参数都会被替换为传入的类型实参。因此，该对象的行为就像一个常规对象，拥有一个\
    \ `Integer` 类型的字段。\n\n```\niBox.box = 5;\nInteger i = iBox.box;\n```\n\n请注意，在设置或从\
    \ `box` 字段检索存储的值时，不需要进行强制类型转换。此外，如果错误地将泛型字段赋值或设置为不兼容的类型，编译器会指出这一点。\n\n```\niBox.box\
    \ = \"Hello World\"; // 编译时错误\nString s = iBox.box;      // 编译时错误\n```\n\n泛型方法\n\
    \n通过在方法的返回类型之前声明一个类型参数部分，可以使方法成为泛型方法。类型参数可以在方法内部像任何其他类型一样使用。它也可以用于方法的返回类型、throws\
    \ 子句以及参数类型。下面的示例展示了一个泛型类方法，它接受一个泛型数组参数，并打印出其内容。\n\n```\nclass MyClass\n{ \n  public\
    \ static <T> void printArray(T[] array)\n  { \n    for (T element : array)\n \
    \     System.out.print(element + \" \");\n  } \n}\n\n```\n\n方法可以声明为泛型，无论其所在的类或接口是否为泛型。构造函数也是如此。\n\
    \n调用泛型方法\n\n泛型方法通常像常规（非泛型）方法一样被调用，无需指定类型实参。\n\n```\nInteger[] iArray = { 1, 2,\
    \ 3 };\nMyClass.printArray(iArray);\n```\n\n在大多数情况下，Java 编译器可以推断出泛型方法调用的类型实参，因此不必包含它。但是，如果不是这种情况，则需要显式指定类型实参。\n\
    \n```\nMyClass.<Integer>printArray(iArray);\n```\n\n泛型接口\n\n使用类型参数声明的接口成为泛型接口。泛型接口与常规接口有两个相同的目的。它们要么是为了公开将被其他类使用的类的成员而创建，要么是为了强制一个类实现特定的功能。当实现泛型接口时，必须指定类型实参。泛型接口可以由泛型类和非泛型类实现。\n\
    \n```\n// 泛型功能接口\ninterface IGenericCollection<T>\n{ \n  public void store(T t);\n\
    }\n\n// 实现泛型接口的非泛型类\nclass Box implements IGenericCollection<Integer>\n{ \n  public\
    \ Integer myBox;\n  public void store(Integer i) { myBox = i; }\n}\n\n// 实现泛型接口的泛型类\n\
    class GenericBox<T> implements IGenericCollection<T>\n{ \n  public T myBox;\n\
    \  public void store(T t) { myBox = t; }\n}\n\n```\n\n泛型类型参数\n\n为泛型传入的类型实参可以是类类型、接口类型或另一个类型参数。但是，它不能是基本类型。泛型可以定义多个类型参数，只需在尖括号之间以逗号分隔列表的形式添加更多参数即可。请记住，括号内的每个参数必须是唯一的。\n\
    \n```\nclass MyClass<T, U> {}\n```\n\n如果泛型定义了多个类型参数，则在**使用**泛型时需要指定相同数量的类型实参。\n\
    \n```\nMyClass<Integer, Float> myClass = new MyClass<Integer,\n              \
    \                                Float>();\n```\n\n泛型变量的使用\n\n在 Java 中，泛型仅仅是编译时的构造。在编译器检查了与泛型变量一起使用的类型正确之后，它将擦除泛型代码中的所有类型参数和类型实参信息，并插入适当的强制类型转换。这意味着泛型不会像在\
    \ C# 中那样，因为消除了运行时强制类型转换而带来比非泛型代码更好的性能。这也意味着泛型类型不能用于任何需要运行时信息的事情——例如创建泛型类型的新实例或对类型参数使用\
    \ `instanceof` 运算符。允许的操作包括：声明泛型类型的变量、将 null 赋值给泛型变量以及调用 `Object` 方法。\n\n```\n\
    class MyClass<T>\n{ \n  public void myMethod(Object o)\n  { \n    T t1;      \
    \                      // 允许\n    t1 = null;                       // 允许\n   \
    \ System.out.print(t1.toString()); // 允许\n    if (o instanceof T) {}         \
    \  // 无效\n    T t2 = new T();                  // 无效\n  } \n}\n\n```\n\n从泛型代码中移除类型信息的过程称为*类型擦除*。例如，`MyBox<Integer>`\
    \ 将被简化为 `MyBox`，这被称为*原始类型*。执行此步骤是为了保持与在 Java 5 中泛型成为语言一部分之前编写的代码的向后兼容性。\n\n受限类型参数\n\
    \n可以对泛型可能使用的类型参数种类应用编译时强制执行的限制。这些限制称为*边界*，它们通过在类型参数部分中使用 `extends` 关键字来指定。类型参数可以由超类或接口限定。例如，下面的类\
    \ `B` 只能使用类型为 `A` 或具有该类作为超类的类型实参进行实例化。\n"
- fmt: "```\n// T must be or inherit from superclass A\nclass B<T extends A> {}\n\
    class A {}\n```\n\nThe second example specifies an interface as the bound. This\
    \ will restrict the type parameter to only those types that implement the specified\
    \ interface, or are of the interface type itself.\n\n```\n// T must be or implement\
    \ interface I\nclass C<T extends I> {}\ninterface I {}\n```\n\nMultiple bounds\
    \ can be applied to a type parameter by specifying them in a list separated by\
    \ ampersands.\n\n```\nclass D<T extends A & I> {}\n```\n\nThe ampersand acts as\
    \ the separator instead of a comma since comma is already used for separating\
    \ type parameters.\n\n```\nclass E<T extends A & I, U extends A & I> {}\n```\n\
    \nAside from restricting the use of a generic to only certain parameter types,\
    \ another reason for applying bounds is to increase the number of permitted method\
    \ calls supported by the bounded type. An unbounded type may only call the `Object`\
    \ methods. However, by applying a superclass or interface bound, the accessible\
    \ members of that type will also become available.\n\n```\nclass Fruit\n{ \n  public\
    \ String name;\n}\n\nclass FruitBox<T extends Fruit>\n{ \n  private T box;\n  public\
    \ void FruitBox(T t) { box = t; }\n  public String getFruitName()\n  { \n    //\
    \ Use of Fruit member allowed since T extends Fruit\n    return box.name;\n  }\
    \ \n}\n```\n\n## Generics and Object\n\nBefore generics were introduced in Java\
    \ 5, the `Object` type was used to create container classes that could store any\
    \ type of objects. Now that generics are available, this use of the `Object` type\
    \ as a universal container should be avoided. This is because the compiler helps\
    \ ensure that generics are type safe at compile-time, which cannot be done when\
    \ using the `Object` type.\n\nThe collection classes in the Java library, among\
    \ them `ArrayList`, have all been replaced with generic versions. Even so, any\
    \ generic class can still be used as if it was not generic, simply by leaving\
    \ out the type argument section. The default `Object` type will then be used as\
    \ the type argument. This is the reason why the non-generic version of `ArrayList`\
    \ is still allowed. Consider the following use of a non-generic `ArrayList`.\n\
    \n```\nimport java.util.ArrayList;\n// ... \n// Object ArrayList\nArrayList a\
    \ = new ArrayList();\na.add(\"Hello World\");\n// ... \nInteger b = (Integer)a.get(0);\
    \ // run-time error\n```\n\nThis `String` to `Integer` conversion will fail at\
    \ run-time by throwing a `ClassCastException`. Had a generic `ArrayList` been\
    \ used instead, the mistaken conversion would have been detected upon compilation,\
    \ or immediately in an IDE such as Netbeans.\n\n```\nimport java.util.ArrayList;\n\
    // ... \n// Generic ArrayList (recommended)\nArrayList<String> a = new ArrayList<String>();\n\
    a.add(\"Hello World\");\n// ... \nInteger b = (Integer)a.get(0); // compile-time\
    \ error\n```\n\nWith the generic alternative only the specified type argument\
    \ will be allowed into the `ArrayList` collection. Additionally, values obtained\
    \ from the collection do not have to be cast to the correct type since the compiler\
    \ takes care of that.\n\n## Index\n\n![images](images/square1.jpg) A\n\n[abstract](#9781430262862_Ch18.xhtml#cXXX.101)\n\
    \n[Access levels](#9781430262862_Ch15.xhtml#cXXX.91)\n\n[Anonymous block](#9781430262862_Ch03.xhtml#cXXX.28)\n\
    \n[Array(s)](#9781430262862_Ch06.xhtml#cXXX.15a)\n\n[ArrayList](#9781430262862_Ch06.xhtml#cXXX.44)\n\
    \n[assignment operator (=)](#9781430262862_Ch03.xhtml#cXXX.15)\n\n![images](images/square1.jpg)\
    \ B\n\n[boolean](#9781430262862_Ch03.xhtml#cXXX.26)\n\n[Bounds](#9781430262862_Ch22.xhtml#cXXX.113)\n\
    \n[Boxing](#9781430262862_Ch21.xhtml#cXXX.109)\n\n[break](#9781430262862_Ch08.xhtml#cXXX.55)\n\
    \n[byte](#9781430262862_Ch03.xhtml#cXXX.19)\n\n![images](images/square1.jpg) C\n\
    \n[catch](#9781430262862_Ch20.xhtml#cXXX.105)\n\n[char](#9781430262862_Ch03.xhtml#cXXX.25)\n\
    \n[class](#9781430262862_Ch10.xhtml#cXXX.63)\n\n[class member](#9781430262862_Ch11.xhtml#cXXX.75)\n\
    \n[code block](#9781430262862_Ch01.xhtml#cXXX.4)\n\n[comma operator (,)](#9781430262862_Ch03.xhtml#cXXX.18)\n\
    \n[Comments](#9781430262862_Ch02.xhtml#cXXX.10)\n\n[compile](#9781430262862_Ch02.xhtml#cXXX.9)"
