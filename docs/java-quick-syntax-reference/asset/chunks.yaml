  trans: "\n```\ninterface MyInterface {\n  int c = 10; // 常量\n}\n\n```\n\n除了方法签名和常量，接口还可以包含嵌套的包含类型，例如类或其他接口。\n\
    \n```\ninterface MyInterface\n{ \n  // 类型\n  class Class {}\n  interface Interface\
    \ {}\n  enum Enum {}\n}\n\n```\n\n接口示例\n\n下面的示例展示了一个名为 `Comparable` 的接口，它有一个名为\
    \ `compare` 的单一方法。\n\n```\ninterface Comparable\n{ \n  int compare(Object o);\n\
    }\n\n```\n\n下面的类通过在类名后使用 `implements` 关键字实现了该接口。按照惯例，如果该类有 `extends` 子句，则 `implements`\
    \ 子句应放在其后。请注意，虽然一个类只能继承自一个超类，但它可以实现任意数量的接口，只需在逗号分隔的列表中指定它们即可。\n\n```\nclass Circle\
    \ implements Comparable\n{ \n  public int r;\n}\n\n```\n\n因为 `Circle` 实现了 `Comparable`，所以它必须定义\
    \ `compare` 方法。对于此类，该方法将返回圆半径之间的差值。实现的方法必须是 `public` 的，并且其签名必须与接口中定义的方法签名相同。\n\
    \n```\nclass Circle implements Comparable\n{ \n  public int r;\n\npublic int compare(Object\
    \ o) {\n    return r - ( (Circle)o ).r;\n  } \n}\n\n```\n\n功能接口\n\n`Comparable`\
    \ 展示了接口的第一种用途，即定义类可以共享的特定功能。它使得在不了解类实际类型的情况下使用接口成员成为可能。为了说明这一点，下面的示例展示了一个简单的方法，它接收两个\
    \ `Comparable` 对象并返回较大的一个。该方法适用于所有实现了 `Comparable` 接口的类，无论其类型如何，因为该方法仅使用通过该接口暴露的功能。\n\
    \n```\npublic static Object largest(Comparable a, Comparable b)\n{ \n  return\
    \ (a.compare(b) > 0) ? a : b;\n}\n\n```\n\n类接口\n\n接口的第二种用途是为类提供一个实际的接口，通过该接口可以使用该类。下面的示例为\
    \ `MyClass` 定义了一个名为 `MyInterface` 的接口。该接口仅包含使用 `MyClass` 的程序员可能需要的功能。\n\n```\n\
    interface MyInterface\n{ \n  void exposed();\n}\n\nclass MyClass implements MyInterface\n\
    { \n  public void exposed() {}\n  public void hidden() {}\n}\n\n```\n\n然后使用接口类型来持有实现类，这样该类就只能通过此接口被看到。\n\
    \n```\npublic static void main(String[] args)\n{ \n  MyInterface i = new MyClass();\n\
    }\n\n```\n\n这种抽象提供了两个好处。首先，它使其他程序员更容易使用该类，因为他们现在只能访问相关的方法。其次，它使该类更加灵活，因为只要遵循接口，其实现可以更改，而使用该类的其他程序员不会察觉到。\n\
    \n接口类\n\n如前所述，接口可以包含嵌套类型，例如类。与方法不同，这些类型是在接口内部实现的。例如，这可以用于提供一个包含对实现类有用的静态方法的类。这些嵌套类型仅对实现接口的类可见，而对这些类的对象不可见。\n\
    \n```\ninterface MyInterface\n{ \n  class HelperClass {\n    public static void\
    \ helperMethod() {}\n  } \n} \n```\n\n第 18 章\n\n![image](img/frontdot.jpg)\n\n\
    抽象\n\n抽象类提供了一个部分实现，其他类可以在此基础上构建。当一个类被声明为 `abstract` 时，意味着除了普通的类成员外，该类还可以包含必须在子类中实现的不完整方法。这些方法未被实现，仅指定了它们的签名，而它们的方法体被分号替换。\n\
    \n```\nabstract class Shape\n{ \n  public int x = 100, y = 100;\n  public abstract\
    \ int getArea();\n}\n\n```\n\n抽象类示例\n\n如果一个名为 `Rectangle` 的类继承自抽象类 `Shape`，那么\
    \ `Rectangle` 必须重写抽象的 `getArea` 方法。唯一的例外是如果 `Rectangle` 也被声明为 `abstract`，在这种情况下它不必实现任何抽象方法。\n\
    \n```\nclass Rectangle extends Shape\n{ \n  @Override public int getArea()\n  {\n\
        return x * y;\n  } \n}\n\n```\n\n抽象类不能被实例化，但可以用来持有其子类的实例。\n\n```\nShape s\
    \ = new Rectangle();\n```\n\n尽管抽象类不能被实例化，但它可以有构造函数，可以通过在子类的构造函数中使用 `super` 关键字来调用这些构造函数。\n\
    \n```\nabstract class Shape\n{ \n  public int x = 100, y = 100;\n  public Shape(int\
    \ a, int b) { x = a; y = b; }\n}\n\nclass Rectangle extends Shape\n{ \n  public\
    \ Rectangle(int a, int b) { super(a,b); }\n} \n```\n\n抽象类与接口\n\n抽象类在许多方面与接口相似。它们都可以定义子类必须实现的方法签名，并且两者都不能被实例化。关键区别在于：首先，抽象类可以包含非抽象成员，而接口不能。其次，一个类可以实现任意数量的接口，但只能继承自一个类，无论其是否为抽象类。请注意，抽象类可以像非抽象类一样，扩展一个超类并实现任意数量的接口。然而，接口不能继承自类。尽管它可以扩展另一个接口，这实际上将两个接口合并为一个。\n\
    \n抽象类与接口使用指南\n\n接口要么用于定义类可以拥有的特定功能，要么为使用类的其他程序员提供接口。另一方面，抽象类用于提供部分类实现，由子类来完成它。当子类有很多共同的功能，但也有一些功能必须为每个子类以不同方式实现时，这非常有用。\n\
    \n第 19 章\n\n![image](img/frontdot.jpg)\n\n枚举\n\n枚举是一种由固定列表的命名常量组成的类型。要创建一个枚举，使用\
    \ `enum` 关键字，后跟一个名称和一个代码块，其中包含一个逗号分隔的常量元素列表。枚举的访问级别与类相同。默认是包级私有，但如果它在同名文件中声明，也可以设置为\
    \ `public`。与类一样，枚举可以包含在类内部，此时它可以设置为任何访问级别。\n\n```\nenum Speed\n{ \n  STOP, SLOW,\
    \ NORMAL, FAST\n}\n\n```\n\n上述枚举类型的对象可以持有四个已定义常量中的任意一个。枚举常量的访问方式如同类的静态字段。\n\n\
    ```\nSpeed s = Speed.SLOW;\n```\n\n枚举示例\n\n`switch` 语句提供了一个很好的例子，说明枚举何时有用。与使用普通常量相比，枚举的优势在于允许程序员明确指定允许哪些常量值。这提供了编译时类型安全。请注意，在\
    \ `switch` 语句中使用枚举时，`case` 标签不需要用枚举名称限定。\n\n```\nswitch(s) { case SLOW: break;\
    \ }\n```\n\n枚举类\n\n在 Java 中，枚举类型比 C++ 或 C# 等其他语言中的对应类型更强大。它本质上是一种特殊的类，可以包含类可以包含的任何内容。要添加类成员，常量列表必须以分号结束，并且成员必须在常量之后声明。在下面的示例中，向枚举添加了一个整数，该整数将保存元素所代表的实际速度。\n\
    \n```\nenum Speed\n{ \n  STOP, SLOW, NORMAL, FAST;\n  public int speed;\n}\n\n\
    ```\n"
- fmt: "# 设置枚举字段\n\n要设置此字段，还需要添加一个构造函数。枚举中的构造函数必须具有`private`或`package-private`访问权限，并且其调用方式与常规类不同。相反，构造函数的参数在常量元素之后给出，如下所示。例如，如果`Speed`枚举对象被赋值为常量`SLOW`，则参数`5`将被传递给该枚举实例的构造函数。\n\
    \n```java\nenum Speed\n{ \n  STOP(0), SLOW(5), NORMAL(10), FAST(20);\n  public\
    \ int speed;\n\nSpeed(int s) { speed = s; }\n}\n```\n\n枚举类型与常规类的另一个区别是，它们隐式地继承自`java.lang.Enum`类。除了从该类继承的成员外，编译器还会自动向枚举添加两个静态方法，即`values`和`valueof`。`values`方法返回枚举中声明的常量元素的数组，`valueof`返回指定枚举名称的枚举常量。\n\
    \n```java\nSpeed[] a = Speed.values();\nSpeed s = Speed.valueOf(a[0].toString());\
    \ // Speed.STOP\n```\n\n# 第20章\n\n![image](images/frontdot.jpg)\n\n# 异常处理\n\n\
    异常处理允许程序员处理程序中可能出现的意外情况。例如，`java.io`包中的`FileReader`类用于打开文件。创建此类的实例时，Netbeans会提醒该类的构造函数可能抛出`FileNotFoundException`。尝试运行程序也会导致编译器指出这一点。\n\
    \n```java\nimport java.io.*;\n// ... \nFileReader in = new FileReader(\"Missing.file\"\
    ); // error\n```\n\n## Try-catch\n\n要消除此编译时错误，必须使用`try-catch`语句捕获异常。该语句由一个包含可能导致异常的代码的`try`块和一个或多个`catch`子句组成。如果`try`块成功执行，程序将在`try-catch`语句之后继续运行；但如果发生异常，执行将传递给第一个能够处理该异常类型的`catch`块。\n\
    \n```java\nimport java.io.*;\n// ... \ntry {\n  FileReader in = new FileReader(\"\
    Missing.file\");\n} \ncatch(FileNotFoundException e) {}\n```\n\n## Catch块\n\n\
    在上面的示例中，`catch`块仅设置为处理`FileNotFoundException`。如果`try`块中的代码可能抛出更多类型的异常，并且所有异常都应以相同方式处理，则可以捕获更通用的异常，例如`Exception`类本身。此`catch`子句将能够处理所有继承自该类的异常，包括`FileNotFoundException`。请记住，更通用的异常需要在更具体的异常之后捕获。`catch`子句必须始终定义一个异常对象。该对象可用于获取有关异常的更多信息，例如通过使用`getMessage`方法获取异常的描述。\n\
    \n```java\ncatch(FileNotFoundException e) {\n  System.out.print(e.getMessage());\n\
    } \ncatch(Exception e) {\n  System.out.print(e.getMessage());\n}\n```\n\n## Finally块\n\
    \n作为`try-catch`语句中的最后一个子句，可以添加`finally`块。此块用于清理在`try`块中分配的资源，并且无论是否发生异常，它都会执行。在此示例中，在`try`块中打开的文件应该被关闭，但仅当它成功打开时。为了能够从`finally`子句访问`FileReader`对象，它必须在`try`块外部声明。此外，由于`close`方法也可能抛出异常，因此需要用另一个`try-catch`块包围它。请记住，如果您忘记关闭文件，Java的垃圾回收器最终会为您执行此操作，但自己关闭文件是一种良好的编程实践。\n\
    \n```java\nimport java.io.*;\n// ... \nFileReader in = null;\ntry {\n  in = new\
    \ FileReader(\"Missing.file\");\n} \ncatch(FileNotFoundException e) {\n  System.out.print(e.getMessage());\n\
    } \nfinally {\n  if (in != null) {\n    try { in.close(); }\n    catch(IOException\
    \ e) {}\n  } \n}\n```\n\n## 抛出异常\n\n当方法无法从某种情况中恢复时，它可以生成自己的异常，以向调用者发出方法失败的信号。这是通过使用`throw`关键字后跟`Throwable`类型的新实例来完成的。\n\
    \n```java\nstatic void MakeException()\n{ \n  throw new Throwable(\"My Throwable\"\
    );\n}\n```\n\n## 已检查异常和未检查异常\n\nJava中的异常分为两类——已检查异常和未检查异常——取决于是否需要指定它们。抛出已检查异常（例如`IOException`）的方法将无法编译，除非在方法的参数列表之后使用`throws`子句指定它，并且调用方法捕获该异常。另一方面，未检查异常（例如`ArithmeticException`）不必被捕获或指定。请注意，要指定多个异常，异常类型之间用逗号分隔。\n\
    \n```java\nimport java.io.*;\n// ... \nstatic void MakeException() throws IOException,\n\
    \                                   ArithmeticException\n{ \n  throw new IOException(\"\
    My IO exception\");\n  // ... \n  throw new ArithmeticException(\"Division by\
    \ zero\");\n}\n```\n\n## 异常层次结构\n\n与Java中的大多数其他事物一样，异常是存在于层次结构中的类。此层次结构的根（在`Object`之下）是`Throwable`类，该类的所有后代都可以被抛出和捕获。继承自`Throwable`的有`Error`和`Exception`类。从`Error`派生的类用于指示不可恢复的异常，例如`OutOfMemoryError`。这些是未检查的，因为一旦它们发生，即使被捕获，程序员也不太可能对它们做任何事情。\n\
    \n从`Exception`派生的是`RuntimeExceptions`，它们也是未检查的。这些异常几乎可以在任何代码中发生，因此捕获和指定它们会很麻烦。例如，除以零会抛出`ArithmeticException`，但是用`try-catch`包围每个除法运算会很烦人。检查异常也存在开销，检查这些异常的成本超过了捕获它们的好处。其他`Exception`后代，即那些不继承自`RuntimeExceptions`的，都是已检查的。这些是可以从中恢复的异常，并且必须被捕获和指定。\n\
    \n# 第21章\n\n![image](images/frontdot.jpg)\n\n# 装箱与拆箱\n\n将基本类型变量放入对象中称为装箱。这允许在需要对象的地方使用基本类型。为此，Java为每种基本类型提供了包装类——即：`Byte`、`Short`、`Integer`、`Long`、`Float`、`Double`、`Character`和`Boolean`。例如，`Integer`对象可以保存`int`类型的变量。\n\
    \n```java\nint iPrimitive = 5;\nInteger iWrapper = new Integer(iPrimitive); //\
    \ 装箱\n```\n\n装箱的反操作是拆箱。这将对象类型转换回其基本类型。\n\n```java\niPrimitive = iWrapper.intValue();\
    \ // 拆箱\n```\n\n包装类属于`java.lang`包，该包始终被导入。与基本类型相比，包装对象是不可变的（不可更改）。要更改它们的值，必须创建一个新实例。基本类型和包装对象之间的另一个区别是它们如何检查相等性。基本类型使用等于运算符（`==`），而任何类型的对象都使用继承自`Object`的`equals`方法。还要记住，对象可以设置为`null`，而基本类型则不能。\n\
    \n## 自动装箱与自动拆箱"
  raw: "To set this field, a constructor needs to be added as well. A constructor\
    \ in an enumeration must have either private or package-private access and is\
    \ not called in the same way as for a regular class. Instead, the parameters to\
    \ the constructor are given after the constant elements, as seen below. For example,\
    \ if a `Speed` enum object is assigned the constant `SLOW`, then the argument\
    \ `5` will be passed to the constructor for that enum instance.\n\n```\nenum Speed\n\
    { \n  STOP(0), SLOW(5), NORMAL(10), FAST(20);\n  public int speed;\n\nSpeed(int\
    \ s) { speed = s; }\n}\n\n```\n\nAnother difference that enum types have when\
    \ compared to regular classes, is that they implicitly extend from the `java.lang.Enum`\
    \ class. In addition to the members inherited from this class, the compiler will\
    \ also automatically add two static methods to the enumeration, namely `values`\
    \ and `valueof`. The `values` method returns an array of the constant elements\
    \ declared in the enum, and `valueof` returns the enum constant of the specified\
    \ enum name.\n\n```\nSpeed[] a = Speed.values();\nSpeed s = Speed.valueOf(a[0].toString());\
    \ // Speed.STOP\n```\n\nCHAPTER 20\n\n![image](images/frontdot.jpg)\n\nException\
    \ Handling\n\nException handling allows programmers to deal with unexpected situations\
    \ that may occur in their programs. As an example, the `FileReader` class in the\
    \ `java.io` package is used to open a file. Creating an instance of this class\
    \ will cause Netbeans to give a reminder that the class’s constructor may throw\
    \ a `FileNotFoundException`. Attempting to run the program will also cause the\
    \ compiler to point this out.\n\n```\nimport java.io.*;\n// ... \nFileReader in\
    \ = new FileReader(\"Missing.file\"); // error\n```\n\nTry-catch\n\nTo get rid\
    \ of this compile-time error the exception must be caught by using a try-catch\
    \ statement. This statement consists of a try block containing the code that may\
    \ cause the exceptions, and one or more catch clauses. If the try block executes\
    \ successfully the program will continue running after the try-catch statement,\
    \ but if an exception occurs, execution will then be passed to the first catch\
    \ block able to handle that exception type.\n\n```\nimport java.io.*;\n// ...\
    \ \ntry {\n  FileReader in = new FileReader(\"Missing.file\");\n} \ncatch(FileNotFoundException\
    \ e) {}\n```\n\nCatch block\n\nIn the example above, the catch block is only set\
    \ to handle the `FileNotFoundException`. If the code in the try block could throw\
    \ more kinds of exceptions, and all of them should be handled in the same way,\
    \ a more general exception can be caught instead, such as the `Exception` class\
    \ itself. This catch clause would then be able to handle all the exceptions that\
    \ inherit from this class, including the `FileNotFoundException`. Bear in mind\
    \ that a more general exception needs to be caught after a more specific exception.\
    \ The catch clause must always define an exception object. This object can be\
    \ used to obtain more information about the exception, such as a description of\
    \ the exception by using the `getMessage` method.\n\n```\ncatch(FileNotFoundException\
    \ e) {\n  System.out.print(e.getMessage());\n} \ncatch(Exception e) {\n  System.out.print(e.getMessage());\n\
    }\n\n```\n\nFinally block\n\nAs the last clause in a try-catch statement, a finally\
    \ block can be added. This block is used to clean up resources allocated in the\
    \ try block and will always execute whether or not there is an exception. In this\
    \ example, the file opened in the try block should be closed, but only if it was\
    \ successfully opened. To be able to access the `FileReader` object from the finally\
    \ clause it must be declared outside of the try block. Additionally, because the\
    \ close method can also throw an exception it needs to be surrounded with another\
    \ try-catch block. Keep in mind that if you forget to close a file Java’s garbage\
    \ collector will eventually do it for you, but it is a good programming practice\
    \ to do it yourself.\n\n```\nimport java.io.*;\n// ... \nFileReader in = null;\n\
    try {\n  in = new FileReader(\"Missing.file\");\n} \ncatch(FileNotFoundException\
    \ e) {\n  System.out.print(e.getMessage());\n} \nfinally {\n  if (in != null)\
    \ {\n    try { in.close(); }\n    catch(IOException e) {}\n  } \n}\n\n```\n\n\
    Throwing exceptions\n\nWhen a situation occurs that a method cannot recover from,\
    \ it can generate its own exception to signal to the caller that the method has\
    \ failed. This is done by using the `throw` keyword followed by a new instance\
    \ of a `Throwable` type.\n\n```\nstatic void MakeException()\n{ \n  throw new\
    \ Throwable(\"My Throwable\");\n}\n\n```\n\nChecked and unchecked exceptions\n\
    \nExceptions in Java are grouped into two categories – checked and unchecked –\
    \ depending on whether or not they need to be specified. A method that throws\
    \ a checked exception, for example `IOException`, will not compile unless it is\
    \ specified by using a throws clause after the method’s parameter list and the\
    \ calling method catches the exception. Unchecked exceptions on the other hand,\
    \ such as the `ArithmeticException`, do not have to be caught or specified. Note\
    \ that to specify multiple exceptions the exception types are separated by a comma.\n\
    \n```\nimport java.io.*;\n// ... \nstatic void MakeException() throws IOException,\n\
                                       ArithmeticException\n{ \n  throw new IOException(\"\
    My IO exception\");\n  // ... \n  throw new ArithmeticException(\"Division by\
    \ zero\");\n}\n\n```\n\nException hierarchy\n\nExceptions, like most everything\
    \ else in Java, are classes that exist in a hierarchy. At the root of this hierarchy\
    \ (below `Object`) is the `Throwable` class, and all descendants of this class\
    \ can be both thrown and caught. Inheriting from `Throwable` there are the `Error`\
    \ and `Exception` classes. Classes descending from `Error` are used to indicate\
    \ non-recoverable exceptions, such as the `OutOfMemoryError`. These are unchecked\
    \ because once they have occurred it is unlikely that the programmer can do anything\
    \ about them even if they are caught.\n\nDescending from `Exception` are the `RuntimeExceptions`,\
    \ which are also unchecked. These are exceptions that can occur in almost any\
    \ code, and it would therefore be cumbersome to catch and specify them. For example,\
    \ a division by zero will throw an `ArithmeticException`, however surrounding\
    \ every division operation with a try-catch would be bothersome. There is also\
    \ an overhead associated with checking for exceptions and the cost of checking\
    \ for these exceptions outweighs the benefit of catching them. The other `Exception`\
    \ descendants, those that do not inherit from `RuntimeExceptions`, are all checked.\
    \ These are exceptions that can be recovered from and that must be both caught\
    \ and specified.\n\nCHAPTER 21\n\n![image](images/frontdot.jpg)\n\nBoxing and\
    \ Unboxing\n\nPlacing a primitive variable in an object is known as boxing. This\
    \ allows the primitive to be used where objects are required. For this purpose\
    \ Java provides wrapper classes for each primitive – namely: `Byte`, `Short`,\
    \ `Integer`, `Long`, `Float`, `Double`, `Character` and `Boolean`. An `Integer`\
    \ object, for example, can hold a variable of the type int.\n\n```\nint iPrimitive\
    \ = 5;\nInteger iWrapper = new Integer(iPrimitive); // boxing\n```\n\nThe opposite\
    \ of boxing is unboxing. This converts the object type back into its primitive\
    \ type.\n\n```\niPrimitive = iWrapper.intValue(); // unboxing\n```\n\nThe wrapper\
    \ classes belong to the `java.lang` package, which is always imported. In contrast\
    \ to primitives, wrapper objects are immutable (unchangeable). To change their\
    \ value, a new instance must be created. Another difference between primitives\
    \ and wrapper objects is how they are checked for equality. Primitives use the\
    \ equal to operator (==), whereas objects of any type use the `equals` method,\
    \ extending from `Object`. Also bear in mind that objects can be set to null whereas\
    \ primitives cannot.\n\nAutoboxing and autounboxing"
