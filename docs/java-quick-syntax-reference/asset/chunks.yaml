  trans: "\n```\n// T 必须继承自超类 A\nclass B<T extends A> {}\nclass A {}\n```\n\n第二个示例将接口指定为边界。这将把类型参数限制为仅实现指定接口的类型，或者本身就是该接口类型的类型。\n\
    \n```\n// T 必须实现接口 I\nclass C<T extends I> {}\ninterface I {}\n```\n\n可以通过在列表中用与号（`&`）分隔来对类型参数应用多个边界。\n\
    \n```\nclass D<T extends A & I> {}\n```\n\n与号用作分隔符，而不是逗号，因为逗号已用于分隔类型参数。\n\n```\n\
    class E<T extends A & I, U extends A & I> {}\n```\n\n除了将泛型的使用限制为仅限某些参数类型之外，应用边界的另一个原因是增加有界类型所支持的方法调用数量。无界类型只能调用\
    \ `Object` 的方法。然而，通过应用超类或接口边界，该类型的可访问成员也将变得可用。\n\n```\nclass Fruit\n{ \n  public\
    \ String name;\n}\n\nclass FruitBox<T extends Fruit>\n{ \n  private T box;\n  public\
    \ void FruitBox(T t) { box = t; }\n  public String getFruitName()\n  { \n    //\
    \ 由于 T extends Fruit，因此允许使用 Fruit 的成员\n    return box.name;\n  } \n}\n\n```\n\n\
    泛型与 Object\n\n在 Java 5 引入泛型之前，`Object` 类型被用于创建可以存储任何类型对象的容器类。既然泛型已经可用，就应该避免将 `Object`\
    \ 类型用作通用容器。这是因为编译器有助于确保泛型在编译时是类型安全的，而使用 `Object` 类型时则无法做到这一点。\n\nJava 库中的集合类（包括\
    \ `ArrayList`）都已替换为泛型版本。即便如此，任何泛型类仍然可以像非泛型类一样使用，只需省略类型参数部分即可。此时，默认的 `Object` 类型将用作类型参数。这就是为什么仍然允许使用非泛型版本的\
    \ `ArrayList`。请考虑以下对非泛型 `ArrayList` 的使用。\n\n```\nimport java.util.ArrayList;\n\
    // ... \n// Object ArrayList\nArrayList a = new ArrayList();\na.add(\"Hello World\"\
    );\n// ... \nInteger b = (Integer)a.get(0); // 运行时错误\n```\n\n这种从 `String` 到 `Integer`\
    \ 的转换将在运行时失败，并抛出 `ClassCastException`。如果改用泛型 `ArrayList`，则在编译时（或在 Netbeans 等 IDE\
    \ 中）就会检测到错误的转换。\n\n```\nimport java.util.ArrayList;\n// ... \n// 泛型 ArrayList（推荐）\n\
    ArrayList<String> a = new ArrayList<String>();\na.add(\"Hello World\");\n// ...\
    \ \nInteger b = (Integer)a.get(0); // 编译时错误\n```\n\n使用泛型替代方案，只有指定的类型参数才允许进入 `ArrayList`\
    \ 集合。此外，从集合中获取的值无需强制转换为正确的类型，因为编译器会处理这一点。\n\n索引\n\n![images](img/square1.jpg)  A\n\
    \n抽象类\n\n访问级别\n\n匿名块\n\n数组\n\nArrayList\n\n赋值运算符 (=)\n\n![images](img/square1.jpg)  B\n\
    \n布尔型\n\n边界\n\n装箱\n\nbreak\n\n字节型\n\n![images](img/square1.jpg)  C\n\ncatch\n\n\
    字符型\n\n类\n\n类成员\n\n代码块\n\n逗号运算符 (,)\n\n注释\n\n编译\n"
