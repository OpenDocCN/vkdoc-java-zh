    \ 子句。该运算符接受三个表达式。如果第一个表达式评估为真，则返回第二个表达式；如果为假，则评估并返回第三个表达式。\n\n```\nx = (x < 0.5)\
    \ ? 0 : 1; // 三元运算符 (?:)\n```\n\n第八章\n\n![image](img/frontdot.jpg)\n\n循环\n\nJava\
    \ 中有四种循环结构。它们用于多次执行特定的代码块。就像条件 `if` 语句一样，如果代码块中只有一条语句，则可以省略循环的花括号。\n\nWhile 循环\n\
    \n`while` 循环仅在条件为真时执行代码块，并且只要条件保持为真，就会继续循环。下面的循环将打印出数字 0 到 9。\n\n```\nint i =\
    \ 0;\nwhile (i < 10) { System.out.print(i++); }\n```\n\n请注意，循环的条件仅在每次迭代（循环）开始时检查。\n\
    \nDo-while 循环\n\n`do-while` 循环的工作方式与 `while` 循环相同，不同之处在于它在代码块之后检查条件。因此，它总是至少执行一次代码块。\n\
    \n```\nint i = 0;\ndo { System.out.print(i++); } while (i < 10);\n```\n\nFor 循环\n\
    \n`for` 循环用于按特定次数执行代码块。它使用三个参数。第一个参数初始化一个计数器，并且在循环之前始终执行一次。第二个参数包含循环的条件，并在每次迭代之前检查。第三个参数包含计数器的增量，并在每次迭代结束时执行。\n\
    \n```\nfor (int i = 0; i < 10; i++)\n{ System.out.print(i); }\n```\n\n`for` 循环有几种变体。例如，第一个和第三个参数可以通过使用逗号运算符拆分为多个语句。\n\
    \n```\nfor (int k = 0, l = 10; k < 10; k++, l--)\n{ System.out.print(k + l); }\n\
    ```\n\n还可以选择省略一个或多个参数。例如，可以将第三个参数移到循环体内部。\n\n```\nfor (int k = 0, l = 10; k <\
    \ 10;)\n{ System.out.print(k + l); k++, l--; }\n```\n\nForeach 循环\n\n`foreach`\
    \ 循环提供了一种遍历数组的简单方法。在每次迭代中，数组中的下一个元素被分配给指定的变量，并且循环继续执行，直到遍历完整个数组。\n\n```\nint[]\
    \ array = { 1,2,3 };\nfor (int element : array) { System.out.print(element); }\n\
    ```\n\nBreak 和 Continue\n\n有两个特殊的关键字可以在循环内部使用——`break` 和 `continue`。`break` 关键字结束循环结构，`continue`\
    \ 跳过当前迭代的剩余部分，并在下一次迭代的开头继续执行。\n\n```\nbreak;    // 结束当前循环\ncontinue; // 开始下一次迭代\n\
    ```\n\n要跳出当前循环之上的循环，必须首先通过在该循环之前添加一个名称后跟冒号来标记该循环。有了这个标签，它就可以用作 `break` 语句的参数，告诉它要跳出哪个循环。这也适用于\
    \ `continue` 关键字，以便跳到命名循环的下一次迭代。请注意，此示例中的 `continue` 语句是不可达的，因为前面的 `break` 语句总是阻止\
    \ `continue` 执行。\n\n```\nmyLoop: for (int i = 0, j = 0; i < 10; i++)\n        {\
    \ \n          while (++j < 10)\n          { \n            break myLoop;    //\
    \ 结束 for 循环\n            continue myLoop; // 开始下一次 for 循环\n          } \n        }\n\
    \n```\n\n标记块\n\n标记块，也称为命名块，是通过在匿名代码块之前放置一个标签来创建的。`break` 关键字可用于跳出此类块，就像在标记循环中一样。例如，在执行验证时，如果某个验证步骤失败，必须中止整个过程，这可能会很有用。\n\
    \n```\nvalidation:\n{ \n  if(true)\n    break validation;\n}\n\n```\n\n标记块对于将大型方法组织成多个部分可能很有用。但在大多数情况下，拆分方法是更好的主意。然而，如果新方法需要大量参数，或者该方法仅从单个位置使用，那么一个或多个标记块可能是更可取的。\n\
    \n第九章\n\n![image](img/frontdot.jpg)\n\n方法\n\n方法是可重用的代码块，仅在调用时执行。\n\n定义方法\n\n可以通过输入\
    \ `void` 后跟方法名、一对圆括号和一个代码块来创建方法。`void` 关键字意味着该方法不会返回值。方法的命名约定与变量相同——一个描述性的名称，首单词小写，其他单词首字母大写。\n\
    \n```\nclass MyApp\n{ \n  void myPrint()\n  { \n    System.out.print(\"Hello\"\
    );\n  } \n}\n\n```\n\n调用方法\n\n上面的方法将简单地打印出一条文本消息。要从 `main` 方法中调用它，必须首先创建 `MyApp`\
    \ 类的一个实例。然后在实例名称后使用点运算符来访问其成员，其中包括 `myPrint` 方法。\n\n```\npublic static void main(String[]\
    \ args)\n{ \n  MyApp m = new MyApp();\n  m.myPrint(); // Hello\n}\n\n```\n\n方法参数\n\
    \n方法名后面的圆括号用于向方法传递参数。为此，必须首先以逗号分隔列表的形式将相应的参数添加到方法声明中。\n\n```\nvoid myPrint(String\
    \ s)\n{ \n  System.out.print(s);\n}\n\n```\n\n一个方法可以定义为接受任意数量的参数，并且它们可以具有任何数据类型，只需确保调用方法时使用相同类型和数量的参数即可。\n\
    \n```\npublic static void main(String[] args)\n{ \n  MyApp m = new MyApp();\n\
      m.myPrint(\"Hello\"); // Hello\n}\n\n```\n\n准确地说，*形参*出现在方法定义中，而*实参*出现在方法调用中。然而，这两个术语有时可以互换使用。\n\
    \nReturn 语句\n"
- fmt: "方法可以返回一个值。此时，返回类型将用方法实际返回的数据类型替换`void`关键字，并在方法体中添加`return`关键字，后跟指定返回类型的参数。\n\
    \n```\nString getPrint()\n{ \n  return \"Hello\";\n}\n```\n\n`return`是一个跳转语句，它会导致方法退出，并将指定的值返回到调用该方法的位置。例如，上述方法可以作为参数传递给`getPrint`方法，因为该方法会计算得到一个字符串。\n\
    \n```\npublic static void main(String[] args)\n{ \n  MyApp m = new MyApp();\n\
    \  System.out.print( getPrint() ); // Hello\n}\n```\n\n`return`语句也可以在`void`方法中使用，以便在到达结束块之前退出。\n\
    \n```\nvoid myPrint(String s)\n{ \n  System.out.print(s);\n}\n```\n\n## 方法重载\n\
    \n可以声明多个同名方法，只要它们的参数在类型或数量上有所不同即可。这被称为方法重载，例如可以在`System.out.print`方法的实现中看到。这是一个强大的特性，它允许一个方法处理各种参数，而程序员无需意识到使用了不同的方法。\n\
    \n```\nvoid myPrint(String s)\n{ \n  System.out.print(s);\n}\n\nvoid myPrint(int\
    \ i)\n{ \n  System.out.print(i);\n}\n```\n\n## 参数传递\n\nJava 与许多其他语言不同，所有方法参数都是按值传递的。事实上，它们不能按引用传递。对于值数据类型（基本类型），这意味着方法内部只改变了变量的一个本地副本，因此更改不会影响原始变量。对于引用数据类型（类、接口和数组），这意味着只有内存地址的副本被传递给方法。因此，如果整个对象被替换，更改不会传播回调用者，但对对象的更改会影响原始对象，因为副本指向相同的内存位置。\n\
    \n```\npublic static void main(String[] args)\n{ \n  int x = 0;              //\
    \ 值数据类型\n  m.set(x);               // 传递的是值\n  System.out.print(x);    // 0\n\n\
    \  int[] y = {0};          // 引用数据类型\n  m.set(y);               // 传递的是地址\n  System.out.print(y[0]);\
    \ // 10\n}\n\nvoid set(int a) { a = 10; }\nvoid set(int[] a) { a[0] = 10; }\n\
    ```\n\n# 第10章\n\n![image](images/frontdot.jpg)\n\n# 类\n\n类是用来创建对象的模板。它们由成员组成，其中主要的两个是字段和方法。字段是保存对象状态的变量，而方法定义了对象可以做什么。\n\
    \n```\nclass MyRectangle\n{ \n  int x, y;\n  int getArea() { return x * y; }\n\
    }\n```\n\n## 对象创建\n\n要从定义类的外部访问类的字段和方法，必须首先创建该类的一个对象。这是通过使用`new`关键字完成的，它将在系统内存中创建一个新对象。\n\
    \n```\npublic class MyApp\n{ \n  public static void main(String[] args)\n  {\n\
    \    // 创建一个 MyRectangle 对象\n    MyRectangle r = new MyRectangle();\n  } \n}\n\
    ```\n\n对象也被称为实例。该对象将包含自己的一组字段，这些字段可以保存与该类其他实例不同的值。\n\n## 访问对象成员\n\n除了创建对象之外，那些需要在其包之外可访问的类成员必须在类定义中声明为`public`。\n\
    \n```\nclass MyRectangle\n{ \n  public int x, y;\n  public int getArea() { return\
    \ x * y; }\n}\n```\n\n现在可以通过在实例名称后使用点运算符来访问该对象的成员。\n\n```\npublic static void\
    \ main(String[] args)\n{ \n  MyRectangle r = new MyRectangle();\n  r.x = 10;\n\
    \  r.y = 5;\n  int z = r.getArea() // 50 (5*10)\n}\n```\n\n## 构造方法\n\n类可以有一个构造方法。这是一种特殊的方法，用于实例化（构造）对象。它总是与类同名，并且没有返回类型，因为它隐式地返回该类的一个新实例。为了能够从不在其包中的另一个类访问，它需要使用`public`访问修饰符声明。当通过`new`语法创建`MyRectangle`类的新实例时，会调用构造方法，在下面的示例中，它将字段设置为一些默认值。\n\
    \n```\nclass MyRectangle\n{ \n  int x, y;\n  public MyRectangle() { x = 10; y\
    \ = 20; }\n\n  public static void main(String[] args)\n  { \n    MyRectangle r\
    \ = new MyRectangle();\n  } \n}\n```\n\n构造方法可以像任何其他方法一样拥有参数列表。如下所示，这可以用来使字段的初始值依赖于创建对象时传递的参数。\n\
    \n```\nclass MyRectangle\n{ \n  int x, y;\n  public MyRectangle(int a, int b)\
    \ { x = a; y = b; }\n\n  public static void main(String[] args)\n  { \n    MyRectangle\
    \ r = new MyRectangle(20,15);\n  } \n}\n```\n\n## `this` 关键字\n\n在构造方法内部，以及属于该对象的其他方法中，可以使用一个名为`this`的特殊关键字。这个关键字是对当前类实例的引用。例如，如果构造方法的参数与相应字段同名，那么即使它们被参数遮蔽，仍然可以通过使用`this`关键字来访问这些字段。\n\
    \n```\nclass MyRectangle\n{ \n  int x, y;\n  public MyRectangle(int x, int y)\n\
    \  { \n    this.x = x; this.y = y;\n  } \n}\n```\n\n## 构造方法重载\n\n为了支持不同的参数列表，构造方法可以被重载。在下面的示例中，如果类在没有参数的情况下实例化，字段将被赋予默认值。如果有一个参数，两个字段都将被设置为该值。如果有两个参数，每个字段将被分配一个单独的值。尝试使用错误数量的参数或错误的数据类型创建对象将导致编译时错误，就像任何其他方法一样。\n\
    \n```\nclass MyRectangle\n{ \n  int x, y;\n  public MyRectangle()            \
    \ { x = 10; y = 20; }\n  public MyRectangle(int a)        { x = a;  y = a;  }\n\
    \  public MyRectangle(int a, int b) { x = a;  y = b;  }\n}\n```\n\n## 构造方法链\n\n\
    `this`关键字也可以用来从一个构造方法调用另一个构造方法。这被称为构造方法链，并允许更大的代码重用。请注意，该关键字以方法调用的形式出现，并且它必须位于构造方法的第一行。\n\
    \n```\npublic MyRectangle()             { this(10,20);  }\npublic MyRectangle(int\
    \ a)        { this(a,a);    }\npublic MyRectangle(int a, int b) { x = a; y = b;\
    \ }\n```\n\n## 初始字段值\n\n如果类中有需要分配默认值的字段，例如上面第一个构造方法中的字段，可以在声明字段的同时直接赋值。这些初始值将在构造方法被调用之前被赋值。\n\
    \n```\nclass MyRectangle\n{ \n  int x = 10, y = 20;\n}\n```\n\n## 默认构造方法\n\n即使没有定义任何构造方法，也可以创建一个类。这是因为编译器会自动创建一个默认的无参构造方法。\n\
    \n```\nclass MyClass\n{ \n  public static void main(String[] args)\n  { \n   \
    \ // 使用默认构造方法\n    MyClass c = new MyClass();\n  } \n}\n```\n\n## `null`\n\n内置常量`null`用于表示未初始化的对象。它只能赋值给对象，不能赋值给基本类型的变量。等于运算符（`==`）可以用来测试一个对象是否为`null`。\n\
    \n```\nString s = null;\nif (s == null) s = new String();\n```\n\n## 默认值"
  raw: "A method can return a value. The `void` keyword is then replaced with the\
    \ data type the method will return, and the `return` keyword is added to the method\
    \ body with an argument of the specified return type.\n\n```\nString getPrint()\n\
    { \n  return \"Hello\";\n}\n\n```\n\nReturn is a jump statement that causes the\
    \ method to exit and return the specified value to the place where the method\
    \ was called. For example, the method above can be passed as an argument to the\
    \ `getPrint` method since the method evaluates to a string.\n\n```\npublic static\
    \ void main(String[] args)\n{ \n  MyApp m = new MyApp();\n  System.out.print(\
    \ getPrint() ); // Hello\n}\n\n```\n\nThe return statement may also be used in\
    \ void methods to exit before the end block is reached.\n\n```\nvoid myPrint(String\
    \ s)\n{ \n  System.out.print(s);\n}\n\n```\n\nMethod overloading\n\nIt is possible\
    \ to declare multiple methods with the same name as long as the parameters vary\
    \ in type or number. This is called method overloading and can for example be\
    \ seen in the implementation of the `System.out.print` method. It is a powerful\
    \ feature that allows a method to handle a variety of arguments without the programmer\
    \ needing to be aware of using different methods.\n\n```\nvoid myPrint(String\
    \ s)\n{ \n  System.out.print(s);\n}\n\nvoid myPrint(int i)\n{ \n  System.out.print(i);\n\
    }\n\n```\n\nPassing arguments\n\nJava is different from many other languages in\
    \ that all method parameters are passed by value. In fact, they cannot be passed\
    \ by reference. For value data types (primitive types) this means that only a\
    \ local copy of the variable is changed within the method, so the change will\
    \ not affect the original variable. For reference data types (classes, interfaces\
    \ and arrays) it means that only a copy of the memory address is passed to the\
    \ method. Therefore, if the entire object is replaced the change will not propagate\
    \ back to the caller, but changes to the object will affect the original since\
    \ the copy points to the same memory location.\n\n```\npublic static void main(String[]\
    \ args)\n{ \n  int x = 0;              // value data type\n  m.set(x);              \
    \ // value is passed\n  System.out.print(x);    // 0\n\nint[] y = {0};          //\
    \ reference data type\n  m.set(y);               // address is passed\n  System.out.print(y[0]);\
    \ // 10\n}\n\nvoid set(int a) { a = 10; }\nvoid set(int[] a) { a[0] = 10; }\n\
    ```\n\nCHAPTER 10\n\n![image](images/frontdot.jpg)\n\nClass\n\nA class is a template\
    \ used to create objects. They are made up of members, the main two of which are\
    \ fields and methods. Fields are variables that hold the state of the object,\
    \ while methods define what the object can do.\n\n```\nclass MyRectangle\n{ \n\
      int x, y;\n  int getArea() { return x * y; }\n}\n\n```\n\nObject creation\n\n\
    To access a class’s fields and methods from outside the defining class, an object\
    \ of the class must first be created. This is done by using the `new` keyword,\
    \ which will create a new object in the system’s memory.\n\n```\npublic class\
    \ MyApp\n{ \n  public static void main(String[] args)\n {\n    // Create an object\
    \ of MyRectangle\n    MyRectangle r = new MyRectangle();\n  } \n}\n\n```\n\nAn\
    \ object is also called an instance. The object will contain its own set of fields,\
    \ which can hold values that are different to those of other instances of the\
    \ class.\n\nAccessing object members\n\nIn addition to creating the object, the\
    \ members of the class that are to be accessible beyond their package need to\
    \ be declared as `public` in the class definition.\n\n```\nclass MyRectangle\n\
    { \n  public int x, y;\n  public int getArea() { return x * y; }\n}\n\n```\n\n\
    The members of this object can now be reached by using the dot operator after\
    \ the instance name.\n\n```\npublic static void main(String[] args)\n{ \n  MyRectangle\
    \ r = new MyRectangle();\n  r.x = 10;\n  r.y = 5;\n  int z = r.getArea() // 50\
    \ (5*10)\n}\n\n```\n\nConstructor\n\nThe class can have a constructor. This is\
    \ a special kind of method used to instantiate (construct) the object. It always\
    \ has the same name as the class and does not have a return type, since it implicitly\
    \ returns a new instance of the class. To be accessible from another class not\
    \ in its package it needs to be declared with the `public` access modifier. When\
    \ a new instance of the `MyRectangle` class is created, by using the `new` syntax,\
    \ the constructor method is called, which in the example below sets the fields\
    \ to some default values.\n\n```\nclass MyRectangle\n{ \n  int x, y;\n  public\
    \ MyRectangle() { x = 10; y = 20; }\n\npublic static void main(String[] args)\n\
      { \n    MyRectangle r = new MyRectangle();\n  } \n}\n\n```\n\nThe constructor\
    \ can have a parameter list, just as any other method. As seen below, this can\
    \ be used to make the fields’ initial values depend on the parameters passed when\
    \ the object is created.\n\n```\nclass MyRectangle\n{ \n  int x, y;\n  public\
    \ MyRectangle(int a, int b) { x = a; y = b; }\n\npublic static void main(String[]\
    \ args)\n  { \n    MyRectangle r = new MyRectangle(20,15);\n  } \n}\n\n```\n\n\
    This keyword\n\nInside the constructor, as well as in other methods belonging\
    \ to the object, a special keyword called `this` can be used. This keyword is\
    \ a reference to the current instance of the class. If, for example, the constructor’s\
    \ parameters have the same names as the corresponding fields, then the fields\
    \ could still be accessed by using the `this` keyword, even though they are shadowed\
    \ by the parameters.\n\n```\nclass MyRectangle\n{ \n  int x, y;\n  public MyRectangle(int\
    \ x, int y)\n  { \n    this.x = x; this.y = y;\n  } \n}\n\n```\n\nConstructor\
    \ overloading\n\nTo support different parameter lists the constructor can be overloaded.\
    \ In the example below, if the class is instantiated without any parameters the\
    \ fields will be assigned default values. With one parameter both fields will\
    \ be set to that value, and with two parameters each field will be assigned a\
    \ separate value. Attempting to create an object with the wrong number of arguments\
    \ or with incorrect data types will result in a compile-time error, just as with\
    \ any other method.\n\n```\nclass MyRectangle\n{ \n  int x, y;\n  public MyRectangle()            \
    \ { x = 10; y = 20; }\n  public MyRectangle(int a)        { x = a;  y = a;  }\n\
      public MyRectangle(int a, int b) { x = a;  y = b;  }\n}\n\n```\n\nConstructor\
    \ chaining\n\nThe `this` keyword can also be used to call one constructor from\
    \ another. This is known as constructor chaining, and allows for greater code\
    \ reuse. Note that the keyword appears as a method call, and that it must be on\
    \ the first line in the constructor.\n\n```\npublic MyRectangle()            \
    \ { this(10,20);  }\npublic MyRectangle(int a)        { this(a,a);    }\npublic\
    \ MyRectangle(int a, int b) { x = a; y = b; }\n```\n\nInitial field values\n\n\
    If there are fields in the class that need to be assigned default values, such\
    \ as in the first constructor above, the fields can simply be assigned at the\
    \ same time as they are declared. These initial values will be assigned before\
    \ the constructor is called.\n\n```\nclass MyRectangle\n{ \n  int x = 10, y =\
    \ 20;\n}\n\n```\n\nDefault constructor\n\nIt is possible to create a class even\
    \ if no constructors are defined. This is because the compiler will then automatically\
    \ create a default parameterless constructor.\n\n```\nclass MyClass\n{ \n  public\
    \ static void main(String[] args)\n  { \n    // Default constructor used\n    MyClass\
    \ c = new MyClass();\n  } \n}\n\n```\n\nNull\n\nThe built-in constant `null` is\
    \ used to represent an uninitialized object. It can only be assigned to objects\
    \ and not to variables of primitive types. The equal to operator (`==`) can be\
    \ used to test whether an object is null.\n\n```\nString s = null;\nif (s == null)\
    \ s = new String();\n```\n\nDefault values"
  trans: "\n方法可以返回一个值。此时，`void` 关键字会被替换为方法将要返回的数据类型，并且需要在方法体中添加 `return` 关键字，后跟指定返回类型的参数。\n\
    \n```\nString getPrint()\n{ \n  return \"Hello\";\n}\n\n```\n\n`return` 是一个跳转语句，它会导致方法退出，并将指定的值返回给调用该方法的地方。例如，上述方法可以作为参数传递给\
    \ `getPrint` 方法，因为该方法求值后得到一个字符串。\n\n```\npublic static void main(String[] args)\n\
    { \n  MyApp m = new MyApp();\n  System.out.print( getPrint() ); // Hello\n}\n\n\
    ```\n\n`return` 语句也可以在 `void` 方法中使用，以便在到达结束块之前退出。\n\n```\nvoid myPrint(String\
    \ s)\n{ \n  System.out.print(s);\n}\n\n```\n\n方法重载\n\n可以声明多个同名方法，只要它们的参数在类型或数量上有所不同即可。这被称为方法重载，例如可以在\
    \ `System.out.print` 方法的实现中看到。这是一个强大的特性，它允许一个方法处理多种参数，而程序员无需意识到使用了不同的方法。\n\n```\n\
    void myPrint(String s)\n{ \n  System.out.print(s);\n}\n\nvoid myPrint(int i)\n\
    { \n  System.out.print(i);\n}\n\n```\n\n传递参数\n\nJava 与许多其他语言不同，所有方法参数都是按值传递的。事实上，它们不能按引用传递。对于值数据类型（基本类型），这意味着在方法内部只会改变变量的一个本地副本，因此这种改变不会影响原始变量。对于引用数据类型（类、接口和数组），这意味着只有内存地址的副本被传递给方法。因此，如果整个对象被替换，这种改变不会传播回调用者，但对对象内部所做的更改会影响原始对象，因为副本指向同一个内存位置。\n\
    \n```\npublic static void main(String[] args)\n{ \n  int x = 0;              //\
    \ 值数据类型\n  m.set(x);               // 传递的是值\n  System.out.print(x);    // 0\n\n\
    int[] y = {0};          // 引用数据类型\n  m.set(y);               // 传递的是地址\n  System.out.print(y[0]);\
    \ // 10\n}\n\nvoid set(int a) { a = 10; }\nvoid set(int[] a) { a[0] = 10; }\n\
    ```\n\n第 10 章\n\n![image](img/frontdot.jpg)\n\n类\n\n类是用于创建对象的模板。它们由成员组成，其中最主要的两个是字段和方法。字段是保存对象状态的变量，而方法则定义了对象可以做什么。\n\
    \n```\nclass MyRectangle\n{ \n  int x, y;\n  int getArea() { return x * y; }\n\
    }\n\n```\n\n创建对象\n\n要从定义类的外部访问类的字段和方法，必须首先创建该类的一个对象。这通过使用 `new` 关键字来完成，它会在系统内存中创建一个新对象。\n\
    \n```\npublic class MyApp\n{ \n  public static void main(String[] args)\n {\n\
        // 创建一个 MyRectangle 对象\n    MyRectangle r = new MyRectangle();\n  } \n}\n\n\
    ```\n\n对象也被称为实例。该对象将包含自己的一组字段，这些字段可以保存与该类其他实例不同的值。\n\n访问对象成员\n\n除了创建对象之外，那些需要在其包之外可访问的类成员，必须在类定义中声明为\
    \ `public`。\n\n```\nclass MyRectangle\n{ \n  public int x, y;\n  public int getArea()\
    \ { return x * y; }\n}\n\n```\n\n现在，可以通过在实例名称后使用点运算符来访问该对象的成员。\n\n```\npublic\
    \ static void main(String[] args)\n{ \n  MyRectangle r = new MyRectangle();\n\
      r.x = 10;\n  r.y = 5;\n  int z = r.getArea() // 50 (5*10)\n}\n\n```\n\n构造方法\n\
    \n类可以有一个构造方法。这是一种特殊的方法，用于实例化（构造）对象。它总是与类同名，并且没有返回类型，因为它隐式地返回该类的一个新实例。为了能够从不在其包中的另一个类访问，它需要使用\
    \ `public` 访问修饰符进行声明。当使用 `new` 语法创建 `MyRectangle` 类的新实例时，会调用构造方法，在下面的示例中，它将字段设置为一些默认值。\n\
    \n```\nclass MyRectangle\n{ \n  int x, y;\n  public MyRectangle() { x = 10; y\
    \ = 20; }\n\npublic static void main(String[] args)\n  { \n    MyRectangle r =\
    \ new MyRectangle();\n  } \n}\n\n```\n\n构造方法可以像任何其他方法一样拥有参数列表。如下所示，这可以用来使字段的初始值依赖于创建对象时传递的参数。\n\
    \n```\nclass MyRectangle\n{ \n  int x, y;\n  public MyRectangle(int a, int b)\
    \ { x = a; y = b; }\n\npublic static void main(String[] args)\n  { \n    MyRectangle\
    \ r = new MyRectangle(20,15);\n  } \n}\n\n```\n\n`this` 关键字\n\n在构造方法内部，以及属于该对象的其他方法中，可以使用一个名为\
    \ `this` 的特殊关键字。这个关键字是对当前类实例的引用。例如，如果构造方法的参数与相应字段同名，那么即使字段被参数遮蔽，仍然可以通过使用 `this`\
    \ 关键字来访问这些字段。\n\n```\nclass MyRectangle\n{ \n  int x, y;\n  public MyRectangle(int\
    \ x, int y)\n  { \n    this.x = x; this.y = y;\n  } \n}\n\n```\n\n构造方法重载\n\n为了支持不同的参数列表，构造方法可以被重载。在下面的示例中，如果类在没有参数的情况下被实例化，字段将被赋予默认值。如果有一个参数，两个字段都将被设置为该值；如果有两个参数，每个字段将被分配一个单独的值。尝试使用错误数量的参数或错误的数据类型创建对象将导致编译时错误，就像任何其他方法一样。\n\
    \n```\nclass MyRectangle\n{ \n  int x, y;\n  public MyRectangle()            \
    \ { x = 10; y = 20; }\n  public MyRectangle(int a)        { x = a;  y = a;  }\n\
      public MyRectangle(int a, int b) { x = a;  y = b;  }\n}\n\n```\n\n构造方法链\n\n\
    `this` 关键字也可以用来从一个构造方法调用另一个构造方法。这被称为构造方法链，并允许更大的代码复用。请注意，该关键字以方法调用的形式出现，并且它必须位于构造方法的第一行。\n\
    \n```\npublic MyRectangle()             { this(10,20);  }\npublic MyRectangle(int\
    \ a)        { this(a,a);    }\npublic MyRectangle(int a, int b) { x = a; y = b;\
    \ }\n```\n\n初始字段值\n\n如果类中有需要分配默认值的字段，例如上面第一个构造方法中的情况，可以在声明字段的同时直接赋值。这些初始值将在构造方法被调用之前被分配。\n\
    \n```\nclass MyRectangle\n{ \n  int x = 10, y = 20;\n}\n\n```\n\n默认构造方法\n\n即使没有定义任何构造方法，也可以创建一个类。这是因为编译器会自动创建一个默认的无参构造方法。\n\
    \n```\nclass MyClass\n{ \n  public static void main(String[] args)\n  { \n    //\
    \ 使用默认构造方法\n    MyClass c = new MyClass();\n  } \n}\n\n```\n\n`null`\n\n内置常量 `null`\
    \ 用于表示一个未初始化的对象。它只能赋值给对象，而不能赋值给基本类型的变量。可以使用等于运算符（`==`）来测试一个对象是否为 null。\n\n```\n\
    String s = null;\nif (s == null) s = new String();\n```\n\n默认值\n"
- fmt: "# 对象的默认值\n\n对象的默认值是`null`。对于基本数据类型，默认值如下：数值类型为`0`，`char`类型为Unicode零字符（`\\\
    0000`），`boolean`类型为`false`。编译器会自动为字段（fields）分配默认值，但不会为局部变量（local variables）分配。然而，显式地为字段指定默认值被认为是良好的编程习惯，因为这使代码更易于理解。对于局部变量，编译器不会设置默认值。相反，编译器会强制程序员为所有使用的局部变量赋值，以避免使用未赋值变量带来的问题。\n\
    \n```\nclass MyApp\n{ \n  int x;   // 字段被分配默认值 0\n\n  int dummy()\n  { \n    int\
    \ x; // 局部变量如果被使用则必须赋值\n  } \n}\n```\n\n# 垃圾回收器\n\nJava运行时环境拥有一个垃圾回收器，它会定期释放不再需要的对象所占用的内存。这使程序员从繁琐且容易出错的内存管理任务中解放出来。当一个对象不再有任何引用指向它时，该对象就符合销毁条件。例如，当对象超出作用域时就会发生这种情况。也可以通过将其引用设置为`null`来显式地丢弃对象。\n\
    \n# 第11章\n\n![image](images/frontdot.jpg)\n\n## Static\n\n`static`关键字用于创建无需实例化类即可访问的字段和方法。静态（类）成员只存在一份副本，属于类本身；而实例（非静态）成员则为每个新对象创建新的副本。这意味着静态方法不能使用实例成员，因为这些方法不属于某个实例。另一方面，实例方法可以同时使用静态成员和实例成员。\n\
    \n```\nclass MyCircle\n{ \n  float r = 10;            // 实例字段\n  static float\
    \ pi = 3.14F; // 静态/类字段\n\n  // 实例方法\n  float getArea() { return newArea(r); }\n\
    \n  // 静态/类方法\n  static float newArea(float a) { return pi*a*a; }\n}\n```\n\n\
    ### 访问静态成员\n\n要从类外部访问静态成员，需要使用类名后跟点运算符。该运算符与用于访问实例成员的运算符相同，但访问实例成员需要对象引用。尝试使用对象引用（而不是类名）来访问静态成员会给出警告，因为这使得更难看出正在使用静态成员。\n\
    \n```\npublic static void main(String[] args)\n{ \n  float f = MyCircle.pi;\n\
    \  MyCircle c = new MyCircle();\n  float g = c.r;\n} \n```\n\n### 静态方法\n\n静态成员的优点在于，其他类无需创建该类的实例即可使用它们。因此，当只需要变量的单个实例时，应将字段声明为`static`。如果方法执行独立于任何实例变量的通用功能，则应将其声明为`static`。`Math`类就是一个很好的例子，它只包含静态方法和字段。\n\
    \n```\ndouble pi = Math.PI;\n```\n\n`Math`是每个Java应用程序默认包含的类之一。原因在于它属于`java.lang`包，该包总是被自动导入。这个包包含Java语言的基础类，例如：`String`、`Object`和`System`。\n\
    \n### 静态字段\n\n静态字段的优点是它们在应用程序的整个生命周期中持续存在。因此，例如，它们可以用来记录某个方法在所有类实例中被调用的次数。静态字段的初始值只会在类或字段被使用之前的某个时间点设置一次。\n\
    \n```\nclass MyCircle\n{ \n  static void dummy() { count++; }\n  static int count\
    \ = 0;\n}\n```\n\n### 静态初始化块\n\n如果静态字段的初始化需要多行代码或一些其他逻辑，则可以使用静态初始化块。与构造函数不同，此块只运行一次，与静态字段的初始化同时进行。\n\
    \n```\nstatic int[] array = new int[5];\nstatic\n{ \n  int i = 0;\n  for(int element\
    \ : array)\n    element = i++;\n}\n```\n\n### 实例初始化块\n\n初始化块为分配实例字段提供了另一种方法。此块放置在类级别，就像静态初始化块一样，但不需要使用`static`关键字。放在花括号之间的任何代码都会被编译器复制到每个构造函数的开头。\n\
    \n```\nint[] array = new int[5];\n{ \n  int i = 0;\n  for(int element : array)\
    \ element = i++;\n}\n```\n\n一个类可以有多个初始化块和静态初始化块。\n\n# 第12章\n\n![image](images/frontdot.jpg)\n\
    \n## 继承\n\n继承允许一个类获取另一个类的成员。在下面的例子中，`Apple`继承自`Fruit`。这是通过`extends`关键字指定的。`Fruit`成为`Apple`的超类，而`Apple`则成为`Fruit`的子类。除了自己的成员外，`Apple`还获得了`Fruit`中所有可访问的成员，但构造函数除外。\n\
    \n```\n// 超类（父类）\nclass Fruit\n{ \n  public String flavor;\n}\n\n// 子类（子类）\nclass\
    \ Apple extends Fruit\n{ \n  public String variety;\n}\n```\n\n### Object\n\n\
    Java中的类只能继承自一个超类，如果没有指定类，它将隐式继承自`Object`。因此，`Object`是所有类的根类。\n\n```\nclass Fruit\
    \ extends Object {}\n```\n\n### 向上转型\n\n从概念上讲，子类是超类的特化。这意味着`Apple`是一种`Fruit`，也是一种`Object`，因此可以在任何期望使用`Fruit`或`Object`的地方使用。例如，如果创建了一个`Apple`实例，它可以向上转型为`Fruit`，因为子类包含了超类中的所有内容。\n\
    \n```\nApple a = new Apple();\nFruit f = a;\n```\n\n此时`Apple`被视为`Fruit`，因此只能访问`Fruit`的成员。\n\
    \n```\nf.flavor = \"Sweet\";\n```\n\n### 向下转型\n\n当类向下转型回`Apple`时，`Apple`特有的字段将被保留。这是因为`Fruit`只是包含了`Apple`，并没有转换它。向下转型必须显式进行，因为将一个实际的`Fruit`向下转型为`Apple`是不允许的。\n\
    \n```\nApple b = (Apple)f;\n```\n\n### instanceof 运算符\n\n作为安全预防措施，你可以使用`instanceof`运算符测试一个对象是否可以转换为特定的类。如果左侧的对象可以转换为右侧的类型而不会引发异常，则此运算符返回`true`。\n\
    \n```\nApple c = (f instanceof Apple) ? (Apple)f : null;\n```\n\n# 第13章\n\n![image](images/frontdot.jpg)\n\
    \n## 重写\n\n子类中的成员可以重新定义其超类中的成员。这最常用于为实例方法提供新的实现。\n\n### 重写成员\n\n在下面的例子中，`Rectangle`的`getArea`方法在`Triangle`中被重写，方法是在`Triangle`中使用相同的方法签名重新声明它。签名包括方法的名称、参数和返回类型。但是，访问级别可以更改，以允许比重写的方法更多的访问权限。\n\
    \n```\nclass Rectangle\n{ \n  public int w = 10, h = 10;\n  public int getArea()\
    \ { return w * h; }\n}\n\nclass Triangle extends Rectangle\n{ \n  public int getArea()\
    \ { return w * h / 2; }\n}\n```\n\n### @Override 注解\n\n为了表明这次重写是有意的，应该在方法前放置`@Override`注解。此注解是在Java\
    \ 5中添加的，用于防止意外重写。\n\n```\nclass Triangle extends Rectangle\n{ \n  @Override public\
    \ int getArea()\n  { \n    return w * h / 2;\n  } \n}\n```\n\n从`Triangle`实例调用`getArea`方法将调用`Triangle`版本的该方法。\n\
    \n```\nTriangle o = new Triangle();\no.getArea(); // (50) 调用 Triangle 的版本\n```"
  raw: "The default value of an object is null. For primitive data types the default\
    \ values are as follows: numerical types become `0`, a char has the Unicode character\
    \ for zero (`\\0000`) and a boolean is false. Default values will be automatically\
    \ assigned by the compiler, but only for fields and not for local variables. However,\
    \ explicitly specifying the default value for fields is considered good programming\
    \ since it makes the code easier to understand. For local variables the default\
    \ values will not be set by the compiler. Instead, the compiler forces the programmer\
    \ to assign values to any local variables that are used, so as to avoid problems\
    \ associated with using unassigned variables.\n\n```\nclass MyApp\n{ \n  int x;  \
    \ // field is assigned default value 0\n\nint dummy()\n  { \n    int x; // local\
    \ variable must be assigned if used\n  } \n}\n\n```\n\nGarbage collector\n\nThe\
    \ Java runtime environment has a garbage collector that periodically releases\
    \ the memory used by objects when they are no longer needed. This frees the programmer\
    \ from the often tedious and error-prone task of memory management. An object\
    \ will be eligible for destruction when there are no more references to it. This\
    \ occurs, for example, when the object goes out of scope. An object can also be\
    \ explicitly dropped by setting its references to null.\n\nCHAPTER 11\n\n![image](images/frontdot.jpg)\n\
    \nStatic\n\nThe `static` keyword is used to create fields and methods that can\
    \ be accessed without having to make an instance of the class. Static (class)\
    \ members only exist in one copy, which belongs to the class itself, whereas instance\
    \ (non-static) members are created as new copies for each new object. This means\
    \ that static methods cannot use instance members since these methods are not\
    \ part of an instance. On the other hand, instance methods can use both static\
    \ and instance members.\n\n```\nclass MyCircle\n{ \n  float r = 10;            //\
    \ instance field\n  static float pi = 3.14F; // static/class field\n\n// Instance\
    \ method\n  float getArea() { return newArea(r); }\n\n// Static/class method\n\
      static float newArea(float a) { return pi*a*a; }\n}\n\n```\n\nAccessing static\
    \ members\n\nTo access a static member from outside the class, the class name\
    \ is used followed by the dot operator. This operator is the same as the one used\
    \ to access instance members, but to reach them an object reference is required.\
    \ Trying to access a static member by using an object reference (instead of the\
    \ class name) will give a warning since this makes it more difficult to see that\
    \ a static member is being used.\n\n```\npublic static void main(String[] args)\n\
    { \n  float f = MyCircle.pi;\n  MyCircle c = new MyCircle();\n  float g = c.r;\n\
    } \n```\n\nStatic methods\n\nThe advantage of static members is that they can\
    \ be used by other classes without having to create an instance of the class.\
    \ Fields should therefore be declared static when only a single instance of the\
    \ variable is needed. Methods should be declared static if they perform a generic\
    \ function that is independent of any instance variables. A good example of this\
    \ is the `Math` class which contains only static methods and fields.\n\n```\n\
    double pi = Math.PI;\n```\n\n`Math` is one of the classes that are included by\
    \ default in every Java application. The reason for this is because it belongs\
    \ to the `java.lang` package, which is always imported. This package contains\
    \ classes fundamental to the Java language, such as: `String`, `Object` and `System`.\n\
    \nStatic fields\n\nStatic fields have the advantage that they persist throughout\
    \ the life of the application. They can therefore, for example, be used to record\
    \ the number of times that a method has been called across all instances of the\
    \ class. The initial value for a static field will only be set once, sometime\
    \ before the class or field is ever used.\n\n```\nclass MyCircle\n{ \n  static\
    \ void dummy() { count++; }\n  static int count = 0;\n}\n\n```\n\nStatic initialization\
    \ blocks\n\nA static initialization block can be used if the initialization of\
    \ static fields requires more than one line, or some other logic. This block,\
    \ in contrast to the constructor, will only be run once, at the same time as the\
    \ static fields are initialized.\n\n```\nstatic int[] array = new int[5];\nstatic\n\
    { \n  int i = 0;\n  for(int element : array)\n    element = i++;\n}\n\n```\n\n\
    Instance initialization blocks\n\nAn initialization block provides an alternative\
    \ method for assigning instance fields. This block is placed on the class level,\
    \ just like the static initialization block, but without the use of the `static`\
    \ keyword. Any code placed between the brackets will be copied to the start of\
    \ every constructor by the compiler.\n\n```\nint[] array = new int[5];\n{ \n  int\
    \ i = 0;\n  for(int element : array) element = i++;\n}\n\n```\n\nA class can have\
    \ multiple initialization and static initialization blocks.\n\nCHAPTER 12\n\n\
    ![image](images/frontdot.jpg)\n\nInheritance\n\nInheritance allows a class to\
    \ acquire the members of another class. In the example below, Apple inherits from\
    \ Fruit. This is specified with the `extends` keyword. Fruit then becomes the\
    \ superclass of Apple, which in turn becomes a subclass of Fruit. In addition\
    \ to its own members, Apple gains all accessible members in Fruit, except for\
    \ its constructors.\n\n```\n// Superclass (parent class)\nclass Fruit\n{ \n  public\
    \ String flavor;\n}\n\n// Subclass (child class)\nclass Apple extends Fruit\n\
    { \n  public String variety;\n}\n\n```\n\nObject\n\nA class in Java may only inherit\
    \ from one superclass, and if no class is specified it will implicitly inherit\
    \ from `Object`. Therefore, `Object` is the root class of all classes.\n\n```\n\
    class Fruit extends Object {}\n```\n\nUpcasting\n\nConceptually, a subclass is\
    \ a specialization of the superclass. This means that Apple is a kind of Fruit,\
    \ as well as an Object, and can therefore be used anywhere a Fruit or Object is\
    \ expected. For example, if an instance of Apple is created, it can be upcast\
    \ to Fruit since the subclass contains everything in the superclass.\n\n```\n\
    Apple a = new Apple();\nFruit f = a;\n```\n\nThe Apple is then seen as a Fruit,\
    \ so only the Fruit members can be accessed.\n\n```\nf.flavor = \"Sweet\";\n```\n\
    \nDowncasting\n\nWhen the class is downcast back into an Apple, the fields that\
    \ are specific to Apple will have been preserved. This is because the Fruit only\
    \ contained the Apple, it did not convert it. The downcast has to be made explicit\
    \ since downcasting an actual Fruit into an Apple is not allowed.\n\n```\nApple\
    \ b = (Apple)f;\n```\n\nInstanceof operator\n\nAs a safety precaution, you can\
    \ test to see whether an object can be cast to a specific class by using the `instanceof`\
    \ operator. This operator returns true if the left side object can be cast into\
    \ the right side type without causing an exception.\n\n```\nApple c = (f instanceof\
    \ Apple) ? (Apple)f : null;\n```\n\nCHAPTER 13\n\n![image](images/frontdot.jpg)\n\
    \nOverriding\n\nA member in a subclass can redefine a member in its superclass.\
    \ This is most often done to give instance methods new implementations.\n\nOverriding\
    \ members\n\nIn the example below, Rectangle’s `getArea` method is overridden\
    \ in Triangle, by redeclaring it there with the same method signature. The signature\
    \ includes the name, parameters and return type of the method. However, the access\
    \ level may be changed to allow for more access than the method being overridden.\n\
    \n```\nclass Rectangle\n{ \n  public int w = 10, h = 10;\n  public int getArea()\
    \ { return w * h; }\n}\n\nclass Triangle extends Rectangle\n{ \n  public int getArea()\
    \ { return w * h / 2; }\n}\n\n```\n\nOverride annotation\n\nIn order to show that\
    \ this override was intentional, the `@Override` annotation should be placed before\
    \ the method. This annotation was added in Java 5 to prevent accidental overrides.\n\
    \n```\nclass Triangle extends Rectangle\n{ \n  @Override public int getArea()\n\
      { \n    return w * h / 2;\n  } \n}\n\n```\n\nInvoking the `getArea` method from\
    \ a Triangle instance will call Triangle’s version of the method.\n\n```\nTriangle\
    \ o = new Triangle();\no.getArea(); // (50) calls Triangle's version\n```"
  trans: "\n对象的默认值为 null。对于基本数据类型，默认值如下：数值类型变为 `0`，char 类型为 Unicode 零字符（`\\0000`），boolean\
    \ 类型为 false。编译器会自动分配默认值，但这仅适用于字段（fields），而不适用于局部变量（local variables）。然而，显式地为字段指定默认值被认为是良好的编程习惯，因为这能使代码更易于理解。对于局部变量，编译器不会设置默认值。相反，编译器会强制程序员为所有使用的局部变量赋值，以避免与使用未赋值变量相关的问题。\n\
    \n```\nclass MyApp\n{ \n  int x;   // 字段被分配默认值 0\n\nint dummy()\n  { \n    int\
    \ x; // 局部变量如果被使用则必须赋值\n  } \n}\n\n```\n\n垃圾回收器\n\nJava 运行时环境拥有一个垃圾回收器，它会定期释放不再需要的对象所占用的内存。这使程序员从通常繁琐且容易出错的内存管理任务中解放出来。当一个对象不再有任何引用时，它就符合销毁条件。例如，当对象超出作用域时就会发生这种情况。也可以通过将其引用设置为\
    \ null 来显式地丢弃对象。\n\n第 11 章\n\n![image](img/frontdot.jpg)\n\n静态\n\n`static` 关键字用于创建无需创建类实例即可访问的字段和方法。静态（类）成员只存在一份副本，属于类本身；而实例（非静态）成员则为每个新对象创建新的副本。这意味着静态方法不能使用实例成员，因为这些方法不是实例的一部分。另一方面，实例方法可以同时使用静态成员和实例成员。\n\
    \n```\nclass MyCircle\n{ \n  float r = 10;            // 实例字段\n  static float\
    \ pi = 3.14F; // 静态/类字段\n\n// 实例方法\n  float getArea() { return newArea(r); }\n\
    \n// 静态/类方法\n  static float newArea(float a) { return pi*a*a; }\n}\n\n```\n\n\
    访问静态成员\n\n要从类外部访问静态成员，需要使用类名后跟点运算符。此运算符与用于访问实例成员的运算符相同，但访问实例成员需要对象引用。尝试使用对象引用（而不是类名）来访问静态成员会给出警告，因为这会使查看正在使用静态成员变得更加困难。\n\
    \n```\npublic static void main(String[] args)\n{ \n  float f = MyCircle.pi;\n\
      MyCircle c = new MyCircle();\n  float g = c.r;\n} \n```\n\n静态方法\n\n静态成员的优点在于，其他类无需创建该类的实例即可使用它们。因此，当只需要变量的单个实例时，应将字段声明为\
    \ static。如果方法执行独立于任何实例变量的通用功能，则应将其声明为 static。`Math` 类就是一个很好的例子，它只包含静态方法和字段。\n\n\
    ```\ndouble pi = Math.PI;\n```\n\n`Math` 是每个 Java 应用程序中默认包含的类之一。原因在于它属于 `java.lang`\
    \ 包，该包总是被自动导入。这个包包含 Java 语言的基础类，例如：`String`、`Object` 和 `System`。\n\n静态字段\n\n静态字段的优点在于它们在整个应用程序的生命周期内持续存在。因此，例如，它们可用于记录某个方法在该类的所有实例中被调用的次数。静态字段的初始值只会在类或字段被使用之前的某个时间点设置一次。\n\
