    About the Author


    **Mikael Olsson** is a professional web entrepreneur, programmer, and author.
    He works for an R&D company in Finland where he specializes in software development.
    In his spare time he writes books and creates websites that summarize various
    fields of interest. The books he writes are focused on teaching their subject
    in the most efficient way possible, by explaining only what is relevant and practical
    without any unnecessary repetition or theory.


    Introduction


    Java is a high-level object-oriented programming language developed by Sun Microsystems,
    which became part of Oracle Corporation in 2010. The language is very similar
    to C++, but has been simplified to make it easier to write bug free code. Most
    notably, there are no pointers in Java, instead all memory allocation and deallocation
    is handled automatically.


    Despite simplifications like this Java has considerably more functionality than
    both C and C++, due to its large class library. Java programs also have high performance
    and can be made very secure, which has contributed to making Java the most popular
    general purpose programming language in use today.


    Another key feature of Java is that it is platform independent. This is achieved
    by only compiling programs half-way, into platform independent instructions called
    bytecode. The bytecode is then interpreted, or run, by the Java Virtual Machine
    (JVM). This means that any system that has this program and its accompanying libraries
    installed can run Java applications.


    There are three class libraries available for the Java programming language: Java
    ME, Java SE and Java EE. Java ME (Mobile Edition) is a stripped down version of
    Java SE (Standard Edition), while Java EE (Enterprise Edition) is an extended
    version of Java SE that includes libraries for building web applications.


    The Java language and class libraries have undergone major changes since their
    initial release in 1996\. The naming conventions for the versions have gone through
    a few revisions as well. The major releases include: JDK 1.0, JDK 1.1, J2SE 1.2,
    J2SE 1.3, J2SE 1.4, J2SE 5.0, Java SE 6 and Java SE 7, which is the current version
    as of writing.'
