- fmt: "# After J2SE 1.4 the version number was changed from 1.5 to 5.0 for marketing\
    \ reasons\n\nAs of J2SE 5.0, there is one version number for the product and another\
    \ one used internally by the developers. J2SE 5.0 is the product name, while Java\
    \ 1.5 is the developer version. Similarly, Java SE 7 is the product and Java 1.7\
    \ the internal version number. For simplicity’s sake, the Java versions will be\
    \ referred to as Java 1-7 in this book. Note that Java is designed to be backwards\
    \ compatible. Thus the Virtual Machine for Java 7 can still run Java 1 class files.\n\
    \n# CHAPTER 1\n\n![image](images/frontdot.jpg)\n\n## Hello World\n\n### Installing\n\
    \nBefore you can program in Java you need to download and install the Java Development\
    \ Kit (JDK) Standard Edition (SE) from Oracle’s website.[¹](#9781430262862_Ch01.xhtml#Fn1)\
    \ Among other things, the JDK includes the Java compiler, the class libraries\
    \ and the virtual machine needed to run Java applications. Oracle’s download page\
    \ also has a link to obtain Netbeans[²](#9781430262862_Ch01.xhtml#Fn2) bundled\
    \ with the JDK. Netbeans is an Integrated Development Environment (IDE) that will\
    \ make development in Java much easier. Alternatively, another free IDE you can\
    \ use is Eclipse,[³](#9781430262862_Ch01.xhtml#Fn3) or if you do not want to use\
    \ any IDE at all a regular text editor will work just fine.\n\n### Creating a\
    \ project\n\nIf you decide to use an IDE (recommended) you need to create a project,\
    \ which will manage the Java source files and other resources. Alternatively,\
    \ if you prefer not to use an IDE you can create an empty file with the `.java`\
    \ extension, for example `MyApp.java`, and open it in your text editor of choice.\n\
    \nTo create a project in Netbeans, go to the File menu and select New Project.\
    \ From the dialog box select the Java Application project type under the Java\
    \ category and click next. On this dialog box set the project name to `MyProject`\
    \ and the name of the main class to `myproject.MyApp`. Change the project’s location\
    \ if you want to, and then hit the Finish button to generate the project. The\
    \ project’s only file, `MyApp.java`, will then open up, containing some default\
    \ code. You can go ahead and remove all of that code so that you start with an\
    \ empty source file.\n\n### Hello world\n\nWhen you have your project and programming\
    \ environment set up the first application you will create is the Hello World\
    \ program. This program will teach you how to compile and run Java applications,\
    \ as well as how to output a string to a command window.\n\nThe first step in\
    \ creating this program is to add a public class to your `MyApp.java` source file.\
    \ The class must have the same name as the physical source file without the file\
    \ extension, in this case `MyApp`. It is legal to have more than one class per\
    \ file in Java, but only one public class is allowed, and that name must match\
    \ the filename. Keep in mind that Java is case sensitive. The curly brackets following\
    \ the class name delimits what belongs to the class and must be included. The\
    \ brackets, along with their content, is referred to as a code block, or just\
    \ a block.\n\n```\npublic class MyApp {}\n```\n\nNext, add the main method inside\
    \ the class. This is the starting point of the application and must always be\
    \ included in the same form as is shown below. The keywords themselves will be\
    \ looked at in later chapters.\n\n```\npublic class MyApp {\n  public static void\
    \ main(String[] args) {}\n}\n```\n\nThe last step in completing the Hello World\
    \ program is to output the text by calling the `print` method. This method is\
    \ located inside the built-in `System` class, and then another level down inside\
    \ the `out` class. The method takes a single argument – the string to be printed\
    \ – and it ends with a semicolon, as do all statements in Java.\n\n```\npublic\
    \ class MyApp {\n  public static void main(String[] args) {\n    System.out.print(\"\
    Hello World\");\n  } \n}\n```\n\nNote that the dot operator (`.`) is used to access\
    \ members of a class.\n\n### Code hints\n\nIf you are unsure of what a specific\
    \ class contains, or what arguments a method takes, you can take advantage of\
    \ code hints in some IDEs, such as Netbeans. The code hint window appears anytime\
    \ you are typing code and there are multiple predetermined alternatives. It can\
    \ also be brought up manually by pressing `Ctrl + Space`. This is a very powerful\
    \ feature that gives you quick access to the whole class library and their members,\
    \ along with descriptions.\n\n[¹](#9781430262862_Ch01.xhtml#_Fn1)`http://www.oracle.com/technetwork/java/javase/downloads/index.html`\n\
    \n[²](#9781430262862_Ch01.xhtml#_Fn2)`http://www.netbeans.org`\n\n[³](#9781430262862_Ch01.xhtml#_Fn3)`http://www.eclipse.org`\n\
    \n# CHAPTER 2\n\n![image](images/frontdot.jpg)\n\n## Compile and Run\n\n### Running\
    \ from the IDE\n\nWith your Hello World program complete you can compile and run\
    \ it in one of two ways. The first method is by selecting run from the menu bar\
    \ of the IDE that you are using. In Netbeans the menu command is: Run ➤ Run Main\
    \ Project. The IDE will then compile and run the application, which displays the\
    \ text `Hello World`.\n\n### Running from a console window\n\nThe other way is\
    \ to manually compile the program by using a console window (`C:\\Windows\\System32\\\
    cmd.exe`). The most convenient way to do this is to first add the JDK bin directory\
    \ to the `PATH` environment variable. In Windows, this can be done by using the\
    \ `SET PATH` command, and then by appending the path to your JDK installation’s\
    \ bin folder separated by a semicolon.\n\n```\nSET PATH=%PATH%;\"C:\\Program Files\\\
    JDK\\bin\"\n```\n\nBy doing this the console will be able to find the Java compiler\
    \ from any folder for the duration of this console session. The `PATH` variable\
    \ can also be permanently changed.[¹](#9781430262862_Ch02.xhtml#Fn1) Next, navigate\
    \ to the folder where the source file is located and run the compiler by typing\
    \ `javac` followed by the complete filename.\n\n```\njavac MyApp.java\n```\n\n\
    The program will be compiled into a class file called `MyApp.class`. This class\
    \ file contains bytecode instead of machine code, so to execute it you need to\
    \ call the Java Virtual Machine by typing `java` followed by the filename.\n\n\
    ```\njava MyApp\n```\n\nNotice that the `.java` extension is used when compiling\
    \ a file, but the `.class` extension is not used when running it.\n\n### Comments\n\
    \nComments are used to insert notes into the source code and will have no effect\
    \ on the end program. Java has the standard C++ comment notation, with both single-line\
    \ and multi-line comments.\n\n```\n// single-line comment\n\n/* multi-line\n \
    \  comment */\n```\n\nIn addition to these, there is the Javadoc comment. This\
    \ comment is used to generate documentation by using a utility included in the\
    \ JDK bin folder which is also called Javadoc.\n\n```\n/** javadoc\n    comment\
    \ */\n```\n\n[¹](#9781430262862_Ch02.xhtml#_Fn1)`http://www.java.com/en/download/help/path.xml`\n\
    \n# CHAPTER 3\n\n![image](images/frontdot.jpg)\n\n## Variables\n\nVariables are\
    \ used for storing data during program execution.\n\n### Data types\n\nDepending\
    \ on what data you need to store there are several kinds of data types. Java has\
    \ eight types that are built into the language. These are called *primitives*.\
    \ The integer (whole number) types are `byte`, `short`, `int` and `long`. The\
    \ `float` and `double` types represent floating-point numbers (real numbers).\
    \ The `char` type holds a Unicode character and the `boolean` type contains either\
    \ a true or false value. Except for these primitive types, every other type in\
    \ Java is represented by either a class, an interface or an array.\n\n| Data Type\
    \ | Size (bits) | Description |\n| --- | --- | --- |\n| `byte` `short` `int` `long`\
    \ | 8 16 32 64 | Signed integer |\n| `float` `double` | 32 64 | Floating-point\
    \ number |\n| `char` | 16 | Unicode character |\n| `boolean` | 1 | Boolean value\
    \ |\n\n### Declaring variables"
