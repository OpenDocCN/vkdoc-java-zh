- fmt: "# CHAPTER 7\n\n![image](images/frontdot.jpg)\n\n## Conditionals\n\nConditional\
    \ statements are used to execute different code blocks based on different conditions.\n\
    \n### If statement\n\nThe `if` statement will only execute if the condition inside\
    \ the parentheses is evaluated to `true`. The condition can include any of the\
    \ comparison and logical operators.\n\n```\nif (x < 1) {\n  System.out.print(x\
    \ + \" < 1\");\n}\n```\n\nTo test for other conditions, the `if` statement can\
    \ be extended by any number of `else if` clauses. Each additional condition will\
    \ only be tested if all previous conditions are `false`.\n\n```\nelse if (x >\
    \ 1) {\n  System.out.print(x + \" > 1\");\n}\n```\n\nThe `if` statement can have\
    \ one `else` clause at the end, which will execute if all previous conditions\
    \ are `false`.\n\n```\nelse {\n  System.out.print(x + \" == 1\");\n}\n```\n\n\
    As for the curly brackets, they can be left out if only a single statement needs\
    \ to be executed conditionally.\n\n```\nif (x < 1)\n  System.out.print(x + \"\
    \ < 1\");\nelse if (x > 1)\n  System.out.print(x + \" > 1\");\nelse\n  System.out.print(x\
    \ + \" == 1\");\n```\n\n### Switch statement\n\nThe `switch` statement checks\
    \ for equality between an integer and a series of `case` labels. It then executes\
    \ the matching case. The statement can contain any number of cases and may end\
    \ with a `default` label for handling all other cases.\n\n```\nswitch (y)\n{ \n\
    \  case 0: System.out.print(y + \" is 0\"); break;\n  case 1: System.out.print(y\
    \ + \" is 1\"); break;\n  default:System.out.print(y + \" is something else\"\
    );\n}\n```\n\nNote that the statements after each `case` label are not surrounded\
    \ by curly brackets. Instead, the statements end with the `break` keyword. Without\
    \ the `break` the execution will fall through to the next case. This can be useful\
    \ if several cases need to be evaluated in the same way.\n\nThe data types that\
    \ can be used with a `switch` statement are: `byte`, `short`, `int` and `char`.\
    \ As of Java 7, `String` types are also permitted.\n\n### Ternary operator\n\n\
    In addition to the `if` and `switch` statements there is the ternary operator\
    \ (`?:`). This operator can replace a single `if`/`else` clause that assigns a\
    \ value to a specific variable. The operator takes three expressions. If the first\
    \ one is evaluated to `true` then the second expression is returned, and if it\
    \ is `false`, the third one is evaluated and returned.\n\n```\nx = (x < 0.5) ?\
    \ 0 : 1; // ternary operator (?:)\n```\n\n# CHAPTER 8\n\n![image](images/frontdot.jpg)\n\
    \n## Loops\n\nThere are four looping structures in Java. These are used to execute\
    \ a specific code block multiple times. Just as with the conditional `if` statement,\
    \ the curly brackets for the loops can be left out if there is only one statement\
    \ in the code block.\n\n### While loop\n\nThe `while` loop runs through the code\
    \ block only if the condition is `true`, and will continue looping for as long\
    \ as the condition remains `true`. The loop below will print out the numbers 0\
    \ to 9.\n\n```\nint i = 0;\nwhile (i < 10) { System.out.print(i++); }\n```\n\n\
    Note that the condition for the loop is only checked at the start of each iteration\
    \ (loop).\n\n### Do-while loop\n\nThe `do-while` loop works the same way as the\
    \ `while` loop, except that it checks the condition after the code block. It will\
    \ therefore always run through the code block at least once.\n\n```\nint i = 0;\n\
    do { System.out.print(i++); } while (i < 10);\n```\n\n### For loop\n\nThe `for`\
    \ loop is used to go through a code block a specific number of times. It uses\
    \ three parameters. The first parameter initializes a counter and is always executed\
    \ once, before the loop. The second parameter holds the condition for the loop\
    \ and is checked before each iteration. The third parameter contains the increment\
    \ of the counter and is executed at the end of each iteration.\n\n```\nfor (int\
    \ i = 0; i < 10; i++)\n{ System.out.print(i); }\n```\n\nThe `for` loop has several\
    \ variations. For instance, the first and third parameters can be split into several\
    \ statements by using the comma operator.\n\n```\nfor (int k = 0, l = 10; k <\
    \ 10; k++, l--)\n{ System.out.print(k + l); }\n```\n\nThere is also the option\
    \ of leaving out one or more of the parameters. For example, the third parameter\
    \ can be moved into the body of the loop.\n\n```\nfor (int k = 0, l = 10; k <\
    \ 10;)\n{ System.out.print(k + l); k++, l--; }\n```\n\n### Foreach loop\n\nThe\
    \ `foreach` loop gives an easy way to iterate through arrays. On each iteration\
    \ the next element in the array is assigned to the specified variable, and the\
    \ loop continues to execute until it has gone through the entire array.\n\n```\n\
    int[] array = { 1,2,3 };\nfor (int element : array) { System.out.print(element);\
    \ }\n```\n\n### Break and continue\n\nThere are two special keywords that can\
    \ be used inside loops – `break` and `continue`. The `break` keyword ends the\
    \ loop structure, and `continue` skips the rest of the current iteration and continues\
    \ at the beginning of the next iteration.\n\n```\nbreak;    // end current loop\n\
    continue; // start next iteration\n```\n\nTo break out of a loop above the current\
    \ one, that loop must first be labeled by adding a name followed by a colon before\
    \ it. With this label in place it can now be used as an argument to the `break`\
    \ statement, telling it which loop to break out of. This also works with the `continue`\
    \ keyword in order to skip to the next iteration of the named loop. Note that\
    \ the `continue` statement in this example is unreachable because the previous\
    \ `break` statement always prevents `continue` from executing.\n\n```\nmyLoop:\
    \ for (int i = 0, j = 0; i < 10; i++)\n        { \n          while (++j < 10)\n\
    \          { \n            break myLoop;    // end for\n            continue myLoop;\
    \ // start next for\n          } \n        }\n```\n\n### Labeled block\n\nA labeled\
    \ block, also called a named block, is created by placing a label before an anonymous\
    \ code block. The `break` keyword can be used to break out of such a block, just\
    \ as in labeled loops. This could for example be useful when performing a validation,\
    \ where if one validation step fails the whole process must be aborted.\n\n```\n\
    validation:\n{ \n  if(true)\n    break validation;\n}\n```\n\nLabeled blocks can\
    \ be useful for organizing a large method into sections. In most cases though,\
    \ splitting the method up is a better idea. However, if the new method would require\
    \ a lot of parameters, or if the method would only be used from a single location,\
    \ then one or more labeled blocks may be preferable.\n\n# CHAPTER 9\n\n![image](images/frontdot.jpg)\n\
    \n## Methods\n\nMethods are reusable code blocks that will only execute when called.\n\
    \n### Defining methods\n\nA method can be created by typing `void` followed by\
    \ the method’s name, a set of parentheses and a code block. The `void` keyword\
    \ means that the method will not return a value. The naming convention for methods\
    \ is the same as for variables – a descriptive name with the first word in lowercase\
    \ and any other words initially capitalized.\n\n```\nclass MyApp\n{ \n  void myPrint()\n\
    \  { \n    System.out.print(\"Hello\");\n  } \n}\n```\n\n### Calling methods\n\
    \nThe method above will simply print out a text message. To invoke (call) it from\
    \ the `main` method an instance of the `MyApp` class must first be created. The\
    \ dot operator is then used after the instance’s name in order to access its members,\
    \ which include the `myPrint` method.\n\n```\npublic static void main(String[]\
    \ args)\n{ \n  MyApp m = new MyApp();\n  m.myPrint(); // Hello\n}\n```\n\n###\
    \ Method parameters\n\nThe parentheses that follow the method name are used to\
    \ pass arguments to the method. To do this the corresponding parameters must first\
    \ be added to the method declaration in the form of a comma separated list.\n\n\
    ```\nvoid myPrint(String s)\n{ \n  System.out.print(s);\n}\n```\n\nA method can\
    \ be defined to take any number of arguments and they can have any data types,\
    \ just ensure the method is called with the same types and number of arguments.\n\
    \n```\npublic static void main(String[] args)\n{ \n  MyApp m = new MyApp();\n\
    \  m.myPrint(\"Hello\"); // Hello\n}\n```\n\nTo be precise, *parameters* appear\
    \ in method definitions, while *arguments* appear in method calls. However, the\
    \ two terms are sometimes used interchangeably.\n\n### Return statement"
