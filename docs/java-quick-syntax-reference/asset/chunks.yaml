    \n重写\n\n子类中的成员可以重新定义其超类中的成员。这最常用于为实例方法提供新的实现。\n\n重写成员\n\n在下面的示例中，Rectangle 的 `getArea`\
    \ 方法在 Triangle 中被重写，方法是在那里使用相同的方法签名重新声明它。签名包括方法的名称、参数和返回类型。但是，可以更改访问级别以允许比重写的方法更多的访问权限。\n\
    \n```\nclass Rectangle\n{ \n  public int w = 10, h = 10;\n  public int getArea()\
    \ { return w * h; }\n}\n\nclass Triangle extends Rectangle\n{ \n  public int getArea()\
    \ { return w * h / 2; }\n}\n\n```\n\n重写注解\n\n为了表明这次重写是有意的，应该在方法之前放置 `@Override`\
    \ 注解。此注解是在 Java 5 中添加的，用于防止意外重写。\n\n```\nclass Triangle extends Rectangle\n{ \n\
      @Override public int getArea()\n  { \n    return w * h / 2;\n  } \n}\n\n```\n\
    \n从 Triangle 实例调用 `getArea` 方法将调用 Triangle 版本的该方法。\n\n```\nTriangle o = new Triangle();\n\
    o.getArea(); // (50) 调用 Triangle 的版本\n```\n"
- fmt: "如果`Triangle`的实例向上转型为`Rectangle`，那么`Triangle`版本的方法仍会被调用，因为`Rectangle`的版本已被覆盖。\n\
    \n```\nRectangle o = new Triangle();\no.getArea();  // (50) 调用 Triangle 的版本\n\
    ```\n\n## 隐藏成员\n\n此规则仅适用于实例方法，不适用于类方法。如果向`Rectangle`添加一个名为`newArea`的类方法，并在`Triangle`中重新定义它，那么`Triangle`的该方法只会隐藏`Rectangle`的实现。因此，不会使用`@Override`注解。\n\
    \n```\nclass Rectangle\n{ \n  public int w = 10, h = 10;\n  public static int\
    \ newArea(int a, int b) {\n    return a * b;\n  } \n}\n\nclass Triangle extends\
    \ Rectangle\n{ \n  public static int newArea(int a, int b) {\n    return a * b\
    \ / 2;\n  } \n}\n```\n\n从`Triangle`的接口调用`newArea`时，会按预期调用`Triangle`的版本，但从`Rectangle`的接口调用该方法时，则会调用`Rectangle`的实现。\n\
    \n```\nTriangle o = new Triangle();\no.newArea(10,10); // (50) 调用 Triangle 的版本\n\
    \nRectangle r = o;\nr.newArea(10,10); // (100) 调用 Rectangle 的版本\n```\n\n在Java中，重新定义的实例方法总是被覆盖，而重新定义的类方法总是被隐藏。无法像在C++或C#中那样改变此行为。\n\
    \n## 阻止方法继承\n\n要防止实例方法在子类中被覆盖，可以使用`final`方法修饰符声明它。\n\n```\npublic final int getArea()\
    \ { return w * h; }\n```\n\n请注意，方法修饰符的顺序不是可选的。当修饰符顺序错误时，编译器会指出。\n\n## 访问被覆盖的方法\n\
    \n在子类的实例方法内部，仍然可以通过`super`关键字访问被覆盖的方法。该关键字是对超类当前实例的引用。\n\n```\n@Override public\
    \ int getArea()\n{ \n  return super.getArea() / 2;\n}\n```\n\n## 调用父类构造器\n\n`super`关键字的另一个用途是在构造器的第一行。在那里，它可以执行一个方法调用来调用超类的构造器。\n\
    \n```\npublic Triangle(int a, int b) { super(a,b); }\n```\n\n如果构造器的第一行不是对另一个构造器的调用，Java编译器会自动添加对超类无参构造器的调用。这确保了所有祖先类都能被正确构造。\n\
    \n```\npublic Triangle() { super(); }\n```\n\n# 第14章\n\n![image](images/frontdot.jpg)\n\
    \n# 包与导入\n\n包用于避免命名冲突，并将代码文件组织到不同的目录中。到目前为止，本书中的代码文件都位于项目源目录的根目录下。因此，它属于所谓的*默认包*。在Java中，文件所属的目录（相对于项目源目录）对应于包名。\n\
    \n要将代码文件分配给一个包，例如`mypackage`，必须将其移动到项目目录下同名的文件夹中。此外，文件必须使用`package`关键字后跟包名（和路径）来指定它所属的包。每个源文件中只能有一条`package`语句，并且它必须是代码的第一行（注释除外）。请注意，包的命名约定是全小写。\n\
    \n```\npackage mypackage; // 此文件属于 mypackage\n```\n\n包的层级深度可以是任意级别，层级之间用点分隔。例如，如果包含代码文件的`mypackage`文件夹位于名为`sub`的项目文件夹中，则包声明应如下所示：\n\
    \n```\npackage sub.mypackage;\n```\n\n假设此文件包含一个名为`MyClass`的公共类。要从另一个源文件访问`MyClass`，有两种选择。第一种是输入完全限定名称。\n\
    \n```\nsub.mypackage.MyClass m;\n```\n\n## 导入特定类"
  raw: "If Triangle’s instance is upcast into Rectangle, then Triangle’s version of\
    \ the method will still get called because Rectangle’s version has been overridden.\n\
    \n```\nRectangle o = new Triangle();\no.getArea();  // (50) calls Triangle's version\n\
    ```\n\nHiding members\n\nThis is only true for instance methods, and not for class\
    \ methods. If a class method called `newArea` is added to Rectangle, and redefined\
    \ in Triangle, then Triangle’s version of the method will only hide Rectangle’s\
    \ implementation. Because of this the `@Override` annotation is not used.\n\n\
    ```\nclass Rectangle\n{ \n  public int w = 10, h = 10;\n  public static int newArea(int\
    \ a, int b) {\n    return a * b;\n  } \n}\n\nclass Triangle extends Rectangle\n\
    { \n  public static int newArea(int a, int b) {\n    return a * b / 2;\n  } \n\
    }\n\n```\n\nCalling `newArea` from Triangle’s interface will, as expected, invoke\
    \ Triangle’s version, but calling the method from Rectangle’s interface will invoke\
    \ Rectangle’s implementation.\n\n```\nTriangle o = new Triangle();\no.newArea(10,10);\
    \ // (50) calls Triangle's version\n\nRectangle r = o;\nr.newArea(10,10); // (100)\
    \ calls Rectangle's version\n```\n\nRedefined instance methods will always be\
    \ overridden in Java and redefined class methods will always be hidden. There\
    \ is no way to change this behavior, as can be done in for example C++ or C#.\n\
    \nPreventing method inheritance\n\nTo prevent an instance method from being overridden\
    \ in subclasses, it can be declared with the `final` method modifier.\n\n```\n\
    public final int getArea() { return w * h; }\n```\n\nBear in mind that the order\
    \ of the method modifiers is not optional. The compiler will point out when the\
    \ modifiers appear in the wrong order.\n\nAccessing overridden methods\n\nAn overridden\
    \ method can still be accessed from inside the subclass’s instance methods by\
    \ using the `super` keyword. This keyword is a reference to the current instance\
    \ of the superclass.\n\n```\n@Override public int getArea()\n{ \n  return super.getArea()\
    \ / 2;\n}\n\n```\n\nCalling parent constructor\n\nAnother place where the `super`\
    \ keyword can be used is on the first line of a constructor. There it can perform\
    \ a method call that invokes the superclass’s constructor.\n\n```\npublic Triangle(int\
    \ a, int b) { super(a,b); }\n```\n\nIf the first line of a constructor is not\
    \ a call to another constructor, the Java compiler will automatically add a call\
    \ to the superclass’s parameterless constructor. This ensures that all ancestor\
    \ classes are properly constructed.\n\n```\npublic Triangle() { super(); }\n```\n\
    \nCHAPTER 14\n\n![image](images/frontdot.jpg)\n\nPackages and Import\n\nPackages\
    \ are used to avoid naming conflicts and to organize code files into different\
    \ directories. So far in this book the code file has been located at the root\
    \ of the project’s source directory. Therefore, it has belonged to the so called\
    \ *default package*. In Java, the directory a file belongs to, relative to the\
    \ project’s source directory, corresponds to the package name.\n\nTo assign a\
    \ code file to a package, for example “mypackage”, it must be moved to a folder\
    \ by that name, under the project directory. Furthermore, the file must specify\
    \ which package it belongs to by using the `package` keyword followed by the package\
    \ name (and path). There may only be one package statement in each source file\
    \ and it must be the first line of code, except for any comments. Note that the\
    \ naming convention for packages is all lowercase.\n\n```\npackage mypackage;\
    \ // this file belongs to mypackage\n```\n\nPackages may be any number of directory\
    \ levels deep and the levels in the hierarchy are separated by dots. For example,\
    \ if the “mypackage” folder containing the code file is placed in a project folder\
    \ called “sub”, the package declaration would need to look like this:\n\n```\n\
    package sub.mypackage;\n```\n\nSay this file contains a public class called MyClass.\
    \ To access MyClass from another source file there are two options. The first\
    \ is to type the fully qualified name.\n\n```\nsub.mypackage.MyClass m;\n```\n\
    \nImport specific class"
