    \ int b) { super(a,b); }\n```\n\n如果构造器的第一行不是对另一个构造器的调用，Java 编译器会自动添加对超类无参构造器的调用。这确保了所有祖先类都能被正确构造。\n\
    \n```\npublic Triangle() { super(); }\n```\n\n第 14 章\n\n![image](img/frontdot.jpg)\n\
    \n包与导入\n\n包用于避免命名冲突，并将代码文件组织到不同的目录中。到目前为止，本书中的代码文件都位于项目源目录的根目录下。因此，它属于所谓的*默认包*。在\
    \ Java 中，文件所属的目录（相对于项目源目录）对应着包名。\n\n要将代码文件分配给某个包，例如“mypackage”，必须将其移动到项目目录下同名的文件夹中。此外，文件必须使用\
    \ `package` 关键字后跟包名（和路径）来指定它所属的包。每个源文件中只能有一条 package 语句，并且它必须是代码的第一行（注释除外）。请注意，包的命名约定是全小写。\n\
    \n```\npackage mypackage; // 此文件属于 mypackage\n```\n\n包的目录层级可以是任意深度，层级之间用点分隔。例如，如果包含代码文件的“mypackage”文件夹位于名为“sub”的项目文件夹中，则包声明应如下所示：\n\
    \n```\npackage sub.mypackage;\n```\n\n假设此文件包含一个名为 MyClass 的公共类。要从另一个源文件访问 MyClass，有两种选择。第一种是输入完全限定名称。\n\
    \n```\nsub.mypackage.MyClass m;\n```\n\n导入特定类\n"
- fmt: "The second option is to shorten the fully qualified name by including the\
    \ class with the `import` keyword. An `import` statement must be located before\
    \ all other members in the code file, and it has no other purpose than to free\
    \ the programmer from having to type the fully qualified name.\n\n```\nimport\
    \ mypackage.sub.MyClass;\n// ... \nMyClass m;\n```\n\n## Import package\n\nIn\
    \ addition to importing a specific class, all types inside of a package can be\
    \ imported by using an asterisk (`*`). Note that this does not import any of the\
    \ subpackages.\n\n```\nimport java.util.*;\n```\n\n## Import static\n\nA third\
    \ variation of the `import` statement is the static import, which imports all\
    \ static members of a class. Once the static members are imported, they can be\
    \ used without having to specify the class name.\n\n```\nimport static java.lang.Math.*;\n\
    // ... \ndouble pi = PI; // Math.PI\n```\n\n# CHAPTER 15\n\n![image](images/frontdot.jpg)\n\
    \n# Access Levels\n\nThere are four access levels available in Java. These are\
    \ `public`, `protected`, `private` and package-private. Package-private cannot\
    \ be explicitly declared by using a keyword. Instead, it is the default access\
    \ level for every member in Java.\n\n```\npublic    int myPublic;   // unrestricted\
    \ access\nprotected int myProtected;// package or subclass access\n          int\
    \ myPackage;  // package access\nprivate   int myPrivate;  // class access\n```\n\
    \n## Private access\n\nThe most restrictive access level is `private`. Members\
    \ with this level can only be used inside of the enclosing (containing) class.\n\
    \n```\npackage mypackage;\npublic class MyApp\n{ \n  public    int myPublic;\n\
      protected int myProtected;\n            int myPackage;\n  private   int myPrivate;\n\
    \nvoid test()\n  { \n    myPublic    = 0; // allowed\n    myProtected = 0; //\
    \ allowed\n    myPackage   = 0; // allowed\n    myPrivate   = 0; // allowed\n\
      } \n}\n```\n\n## Package-private access\n\nPackage-private members can be accessed\
    \ anywhere within the containing package, but not from another package.\n\n```\n\
    package mypackage;\npublic class MyClass\n{ \n  void test(MyApp m)\n  { \n    m.myPublic    =\
    \ 0; // allowed\n    m.myProtected = 0; // allowed\n    m.myPackage   = 0; //\
    \ allowed\n    m.myPrivate   = 0; // inaccessible\n  } \n}\n```\n\n## Protected\
    \ access\n\nProtected members are accessible within subclasses and within the\
    \ containing package. Note that the meaning of `protected` in Java is different\
    \ from other languages – such as C++ and C# – where `protected` members are only\
    \ accessible from subclasses and the containing class.\n\n```\npackage newpackage;\n\
    import mypackage.MyApp;\n\npublic class MyClass extends MyApp\n{ \n  void test()\n\
      { \n    myPublic    = 0; // allowed\n    myProtected = 0; // allowed\n    myPackage\
    \   = 0; // inaccessible\n    myPrivate   = 0; // inaccessible\n  } \n}\n```\n\
    \n## Public access\n\nThe `public` modifier gives unrestricted access from anywhere\
    \ the member can be referenced.\n\n```\npackage newpackage;\nimport mypackage.MyApp;\n\
    \npublic class MyClass\n{ \n  void test(MyApp m)\n  { \n    m.myPublic    = 0;\
    \ // allowed\n    m.myProtected = 0; // inaccessible\n    m.myPackage   = 0; //\
    \ inaccessible\n    m.myPrivate   = 0; // inaccessible\n  } \n}\n```\n\n## Top-level\
    \ access\n\nMembers declared directly in the package – top-level members – may\
    \ only choose between package-private and public access. For instance, a top-level\
    \ class without an access modifier will default to package-private. Such a class\
    \ will only be accessible within the containing package. On the other hand, a\
    \ top-level class explicitly declared as `public` can be reached from other packages\
    \ as well.\n\n```\n// Accessible only from containing package\nclass PackagePrivateClass\
    \ {}\n\n// Accessible from any package\npublic class PublicClass {}\n```\n\n##\
    \ Nested class access\n\nJava allows classes to be defined within other classes,\
    \ so called nested classes. Such a class can have any one of the four access levels.\
    \ If a class is inaccessible, it cannot be instantiated or inherited.\n\n```\n\
    public class MyClass\n{ \n  // Only accessible within MyClass\n  private class\
    \ PrivateNestedClass {}\n}\n```\n\n## Access level guideline"
