  trans: "\n第二种选择是通过 `import` 关键字引入类来缩短完全限定名称。import 语句必须位于代码文件中所有其他成员之前，其唯一用途就是让程序员免于输入完全限定名称。\n\
    \n```\nimport mypackage.sub.MyClass;\n// ... \nMyClass m;\n```\n\n导入包\n\n除了导入特定类之外，还可以使用星号（`*`）导入包内的所有类型。请注意，这并不会导入任何子包。\n\
    \n```\nimport java.util.*;\n```\n\n静态导入\n\nimport 语句的第三种变体是静态导入，它会导入一个类的所有静态成员。一旦静态成员被导入，就可以在不指定类名的情况下使用它们。\n\
    \n```\nimport static java.lang.Math.*;\n// ... \ndouble pi = PI; // Math.PI\n\
    ```\n\n第 15 章\n\n![image](img/frontdot.jpg)\n\n访问级别\n\nJava 中有四种访问级别。分别是 `public`、`protected`、`private`\
    \ 和包级私有。包级私有无法通过关键字显式声明。相反，它是 Java 中每个成员的默认访问级别。\n\n```\npublic    int myPublic;\
    \   // 无限制访问\nprotected int myProtected;// 包或子类访问\n          int myPackage;  //\
    \ 包访问\nprivate   int myPrivate;  // 类访问\n```\n\n私有访问\n\n限制最严格的访问级别是 `private`。具有此级别的成员只能在其所属（包含）类内部使用。\n\
    \n```\npackage mypackage;\npublic class MyApp\n{ \n  public    int myPublic;\n\
      protected int myProtected;\n            int myPackage;\n  private   int myPrivate;\n\
    \nvoid test()\n  { \n    myPublic    = 0; // 允许\n    myProtected = 0; // 允许\n\
        myPackage   = 0; // 允许\n    myPrivate   = 0; // 允许\n  } \n}\n\n```\n\n包级私有访问\n\
    \n包级私有成员可以在所属包内的任何位置访问，但不能从其他包访问。\n\n```\npackage mypackage;\npublic class MyClass\n\
    { \n  void test(MyApp m)\n  { \n    m.myPublic    = 0; // 允许\n    m.myProtected\
    \ = 0; // 允许\n    m.myPackage   = 0; // 允许\n    m.myPrivate   = 0; // 不可访问\n  }\
    \ \n}\n\n```\n\n受保护访问\n\n受保护成员可以在子类以及所属包内访问。请注意，Java 中 protected 的含义与其他语言（如 C++\
    \ 和 C#）不同，在那些语言中，受保护成员只能从子类和所属类访问。\n\n```\npackage newpackage;\nimport mypackage.MyApp;\n\
    \npublic class MyClass extends MyApp\n{ \n  void test()\n  { \n    myPublic    =\
    \ 0; // 允许\n    myProtected = 0; // 允许\n    myPackage   = 0; // 不可访问\n    myPrivate\
    \   = 0; // 不可访问\n  } \n}\n\n```\n\n公共访问\n\n`public` 修饰符允许从任何可以引用该成员的位置进行无限制访问。\n\
    \n```\npackage newpackage;\nimport mypackage.MyApp;\n\npublic class MyClass\n\
    { \n  void test(MyApp m)\n  { \n    m.myPublic    = 0; // 允许\n    m.myProtected\
    \ = 0; // 不可访问\n    m.myPackage   = 0; // 不可访问\n    m.myPrivate   = 0; // 不可访问\n\
      } \n}\n\n```\n\n顶级访问\n\n直接在包中声明的成员（顶级成员）只能在包级私有和公共访问之间选择。例如，没有访问修饰符的顶级类将默认为包级私有。这样的类只能在所属包内访问。另一方面，显式声明为\
    \ `public` 的顶级类也可以从其他包访问。\n\n```\n// 仅能从所属包访问\nclass PackagePrivateClass {}\n\n\
    // 可以从任何包访问\npublic class PublicClass {}\n```\n\n嵌套类访问\n\nJava 允许在其他类内部定义类，即所谓的嵌套类。这样的类可以具有四种访问级别中的任何一种。如果一个类不可访问，则无法被实例化或继承。\n\
    \n```\npublic class MyClass\n{ \n  // 仅在 MyClass 内部可访问\n  private class PrivateNestedClass\
    \ {}\n}\n\n```\n\n访问级别指南\n"
- fmt: "# 排版后的内容\n\nAs a guideline, when choosing an access level it is generally\
    \ best to use the most restrictive level possible. This is because the more places\
    \ a member can be accessed the more places it can be accessed incorrectly, which\
    \ makes the code harder to debug. Using restrictive access levels will also make\
    \ it easier to modify the class without breaking the code for any other programmers\
    \ using that class.\n\n## CHAPTER 16\n\n![image](images/frontdot.jpg)\n\n### Constants\n\
    \nA variable in Java can be made into a constant by adding the `final` keyword\
    \ before the data type. This modifier means that the variable cannot be reassigned\
    \ once it has been set, and any attempts to do so will result in a compile-time\
    \ error.\n\n#### Local constants\n\nA local constant must always be initialized\
    \ at the same time as it is declared. The Java naming convention for constants\
    \ is to use all uppercase letters and to separate the words with underscores.\n\
    \n```\nfinal double PI = 3.14;\n```\n\n#### Constant fields\n\nClass and instance\
    \ variables can also be declared as `final`.\n\n```\nclass MyClass\n{ \n  final\
    \ double E = 2.72;\n  static final double C = 3e8;\n}\n```\n\nIn contrast to local\
    \ constants, constant fields are not always assigned at declaration. A constant\
    \ instance field can optionally be assigned in a constructor, and a constant static\
    \ field may be assigned by using a static initialization block. These alternative\
    \ assignments can be useful if the constant's value needs to be calculated and\
    \ does not fit on a single code line.\n\n```\nclass MyClass\n{ \n  final double\
    \ E;\n  static final double C;\n\n  public MyClass() { E = 2.72; }\n  static {\
    \ C = 3e8; }\n}\n```\n\n#### Constant method parameters\n\nAnother place where\
    \ the `final` modifier may be applied is to method parameters to make them unchangeable.\n\
    \n```\nvoid f(final int A) {}\n```\n\n#### Compile-time and run-time constants\n\
    \nAs in most other languages, Java has both compile-time and run-time constants.\
    \ However, only class constants can be compile-time constants in Java, and only\
    \ if their value is known at compilation. All other uses of `final` will create\
    \ run-time constants. With compile-time constants the compiler will replace the\
    \ constant name everywhere in the code with its value. They are therefore faster\
    \ than run-time constants, which are not set until the program is run. Run-time\
    \ constants, however, can be assigned dynamic values that can change from one\
    \ program run to the next.\n\n```\nclass MyClass\n{ \n  final double E = 2.72;\
    \           // run-time constant\n  final static double C = 3e8;     // compile-time\
    \ constant\n  final static int RND = (new\n    java.util.Random()).nextInt();\
    \ // run-time constant\n}\n```\n\n#### Constant guideline\n\nIn general, it is\
    \ a good idea to always declare variables as `final` if they do not need to be\
    \ reassigned. This ensures that the variables will not be changed anywhere in\
    \ the program by mistake, which in turn helps to prevent bugs.\n\n## CHAPTER 17\n\
    \n![image](images/frontdot.jpg)\n\n### Interface\n\nAn interface is a type that\
    \ decouples \"interface\" from implementation. It specifies a contract between\
    \ its implementors and objects that call its methods (and access its constants).\
    \ They are defined with the `interface` keyword followed by a name and a code\
    \ block. Their naming convention is the same as for classes, which is to have\
    \ each word initially capitalized. When an interface is not nested inside another\
    \ type, its access level can be either package-private or public, just as any\
    \ other top-level member.\n\n```\ninterface MyInterface {}\n```\n\n#### Interface\
    \ members\n\nThe code block for an interface can first of all contain signatures\
    \ for instance methods. These methods cannot have any implementations. Instead,\
    \ their bodies are replaced by semicolons. Interface members must always be public,\
    \ and since this is the default access level in interfaces this modifier can be\
    \ left out.\n\n```\ninterface MyInterface {\n  int myMethod(); // method signature\n\
    }\n```\n\nThe second member that an interface can contain is constants. Any field\
    \ created in an interface will implicitly be declared as `static final`, so these\
    \ modifiers can also be left out."
