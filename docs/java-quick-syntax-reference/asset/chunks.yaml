    \n```\nstatic int[] array = new int[5];\nstatic\n{ \n  int i = 0;\n  for(int element\
    \ : array)\n    element = i++;\n}\n\n```\n\n实例初始化块\n\n初始化块为分配实例字段提供了一种替代方法。此块放置在类级别，就像静态初始化块一样，但无需使用\
    \ `static` 关键字。大括号之间的任何代码都将被编译器复制到每个构造函数的开头。\n\n```\nint[] array = new int[5];\n\
    { \n  int i = 0;\n  for(int element : array) element = i++;\n}\n\n```\n\n一个类可以有多个初始化块和静态初始化块。\n\
    \n第 12 章\n\n![image](img/frontdot.jpg)\n\n继承\n\n继承允许一个类获取另一个类的成员。在下面的示例中，Apple\
    \ 继承自 Fruit。这是通过 `extends` 关键字指定的。Fruit 成为 Apple 的超类，而 Apple 则成为 Fruit 的子类。除了自己的成员之外，Apple\
    \ 还获得了 Fruit 中所有可访问的成员，但其构造函数除外。\n\n```\n// 超类（父类）\nclass Fruit\n{ \n  public\
    \ String flavor;\n}\n\n// 子类（子类）\nclass Apple extends Fruit\n{ \n  public String\
    \ variety;\n}\n\n```\n\nObject\n\nJava 中的类只能继承自一个超类，如果没有指定类，它将隐式继承自 `Object`。因此，`Object`\
