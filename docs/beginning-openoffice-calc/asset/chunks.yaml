- fmt: '### Adding Comments to Cells


    A well-designed worksheet ought to be self-explanatory and you should not need
    to add a lot of extra comments to it, but there are plenty of situations when
    you want to add additional information not meant to be visible when you print
    or show your data to others.


    Something like “Call me when the client asks for a discount bigger than 10%” is
    a good example of a note that you should add as a hidden note. OpenOffice.org
    Calc lets you add notes to any cell. It’s really simple.


    - Choose **Insert** ![image](images/U001.jpg) **Comments**, which opens a yellow
    rectangular box where you can type short comments regarding that particular cell
    (see [Figure 1-9](#Chapter01.html#fig_1_9)).

    - A cell with a note has a tiny red square in the top-right corner.

    - When you want to see the note attached to a cell, right-click on the cell with
    the note and select **Show Comment**.

    - Switching to the note editing mode is simply a matter of clicking on it when
    it is visible on the screen.


    ![images](images/0109.jpg)


    ***Figure 1-9.** The OpenOffice.org Calc version of the famous yellow sticky notes*


    To delete the note, right-click on the cell with the note and choose **Delete
    Comment**.


    ## C H A P T E R 2


    ## Formulas


    In this chapter, you are going to learn how to write OpenOffice.org Calc formulas.
    Formulas are simple, yet powerful tools that let you create smart documents that
    automatically update themselves without too much human intervention. This may
    sound like rocket science, but it''s actually very simple.


    Once you understand how formulas works, it really is a great joy to be able to
    build a complex document that does all the math for you while you focus on solving
    the real problem.


    ### Great Formulas


    No matter what it does, every formula starts with the equal sign (`=`). A formula
    can be as simple as a reference to another cell; for example, `=A4` placed in
    any cell other than A4 copies the value of A4 into that cell.


    Formulas can be even simpler. For example, `=7` is a formula too! But it is not
    very useful.


    ### Understanding Formula Syntax


    OpenOffice.org Calc formulas look and behave a lot like the equations you learned
    in your math classes, only the equal sign (`=`) is on the left hand side of the
    equation, rather than on the more “natural” right hand side.


    All of the standard mathematical operators are available for your perusal, and
    they look and work just as in any other spreadsheet or math software. Their names
    and symbols are as follows:


    - Addition (`+`)

    - Subtraction (`–`)

    - Multiplication (`*`)

    - Division (`/`)

    - Exponentiation (`^`)


    OpenOffice.org Calc follows the standard mathematical order of operations: exponentiation,
    multiplication, and division (from left to right), and addition and subtraction
    (from left to right).


    You can change the order of formula evaluation using parentheses as shown in the
    following examples:


    ```

    =7+9*2^2

    ```


    returns `43`, while


    ```

    =7+(9*2)^2

    ```


    returns `331`, and


    ```

    =(7+9)*2^2

    ```


    returns `64`.


    All parentheses must be matched—that is, any left parenthesis `(` must be matched
    by an appropriately placed right parenthesis `)`.


    ### Referencing Cells


    Typing all sorts of information into a worksheet is a good way to organize it,
    but that is all you can do with it. If you want to process that data, you need
    a way to reference the values stored inside cells and a notation that lets you
    express how you want to process those values.


    Referencing cells and processing data is possible thanks to two powerful tools:
    **cell addressing** and **formulas**.


    - Being able to reference other cells using their addresses lets you create formulas
    that update their results as soon as you finish editing the values to which they
    refer.

    - Any address inside a single sheet in a worksheet is made of two coordinates:
    a column number represented by a sequence of letters (e.g., `AF`) and an integer
    row number (e.g., `125`). Row numbers follow column numbers (e.g., `AF125`).

    - A formula always begins with the equal sign (`=`) and can contain complex calculations
    described using a mixture of mathematical operators and OpenOffice.org Calc''s
    built-in functions.

    - You can use references to other cells as the arguments of OpenOffice.org Calc''s
    functions.


    The best way to see how addressing, references, and formulas work in practice
    is by trying out a simple example (see [Figure 2-1](#Chapter02.html#fig_2_1)):


    ![images](images/0201.jpg)


    ***Figure 2-1.** How addressing and references work in practice*


    *Cell A1 stores number 100; cell B1 stores the formula that references the contents
    of cell A1.*


    1. Type any number or text into any cell and remember its address.

    2. OpenOffice.org Calc displays the current cell''s address on the toolbar in
    the drop-down box on the left. Column and row headers also change their color
    to give you visual cues.

    3. Move the spreadsheet cursor to another cell.

    4. Type the equal sign (`=`) followed by the original cell''s address.

    5. Press **Enter/Return**.


    ![images](images/square.jpg) **Note** OpenOffice.org Calc displays the same numeric
    values or text in both cells, even though they contain different kinds of information.
    The first cell contains raw information, while the second contains a reference
    to the first cell''s contents.


    ### Relative Addressing


    The type of addressing used in the example in the previous section is called “relative,”
    because of the way OpenOffice.org Calc treats such addresses when you decide to
    copy or move the cells.


    When you use relative addressing, OpenOffice.org Calc will update the references
    to point to the cells located within the same relative distance (“two cells to
    the left, one cell up”) to the relocated cells. How does it work in practice?
    Suppose you have a simple formula like `=A1` in cell B1. When you copy that formula
    from cell B1 to C1, OpenOffice.org Calc will automatically change it from `=A1`
    to `=B1`.


    Any time you see an address made up of letters and digits only (e.g., `A1`), it
    is a relative address.


    ### Absolute Addressing


    OpenOffice.org Calc is smart, but it is not smart enough to guess when you''d
    rather not be using relative addressing. Automatic updates of addresses used in
    formulas are convenient, but not always welcome.


    If you don''t keep an eye on what is going on, relative addressing can lead to
    “unexplained” errors in calculations. For example, if you enter a number into
    cell A4, another number into A5, and a reference to A4 (`=A4`) into cell B4 and
    then copy the contents of B4 into B5, B5 displays the value of A5 instead of the
    value of A4. Depending on your needs, this might be good or bad. If you refer
    to a currency exchange table, you wouldn''t necessarily want to switch from one
    currency to another. In such cases, you should use the “absolute” addressing notation.
    It bolts down cell references and tells OpenOffice.org Calc to leave them the
    way they are.


    To make sure that OpenOffice.org Calc leaves some addresses alone, put a dollar
    sign (`$`) in front of the column and the row parts of a cell''s address. So,
    instead of typing `A4`, type `$A$4`. Once you do that, no matter where you copy
    your formula to, it will always point to the right cell.


    You can use partial absolute addressing, such as `A$4` or `$A4`, to limit absolute
    addressing to a particular column or row, if that''s what you need.


    There is an easy way to change addresses from absolute to relative and back again.
    Select the cell in which you want to convert addresses and press **Shift+F4**.
    Pressing those keys repeatedly cycles through absolute rows and absolute columns,
    and relative rows and columns.'
