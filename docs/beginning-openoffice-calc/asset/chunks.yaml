    ### 条件函数


    条件函数用于为电子表格添加一些内置的“人工智能”。它们会比较文本字符串，其结果（**真**或**假**）可用于更改工作表的外观或计算方式。


    ### 比较字符串 (EXACT)


    #### 语法: EXACT(t1; t2)


    **EXACT** 函数比较两个字符串，如果它们完全相同则返回 **1**，否则返回 **0**。例如：


    `=EXACT("OpenOffice.org"; "OpenOffice.org")`


    返回 **1**，而


    `=EXACT("OpenOffice.org"; "openoffice.org")`


    返回 **0**。


    ![images](img/1008.jpg)


    ***图 10-8.** **EXACT** 函数的示例结果*


    ## 第 11 章


    ## 实用函数


    本章讨论的实用函数用于执行各种格式化任务，并返回有关文本字符串的有用信息。它们可以帮助您分析文本数据，使 OpenOffice.org Calc 成为更有用的工具。


    ### ASCII 字符 (CHAR)


    #### 语法: CHAR(Number)


    **CHAR** 函数返回一个 ASCII 字符，其**数字**范围为 **0** 到 **255**。例如：


    `=CHAR(64)`


    返回字符 **@**。


    ![images](img/1101.jpg)


    ***图 11-1.** **CHAR** 函数的示例结果*


    屏幕上显示的字符可能因系统的语言和显示字体设置而异。


    ### ASCII 码 (CODE)


    #### 语法: CODE(Text)


    **CODE** 函数返回给定字符串中第一个字符的代码。例如：


    `=CODE("OpenOffice.org")`


    返回 **32**。


    ![images](img/1102.jpg)


    ***图 11-2.** **CODE** 函数的示例结果*


    ### 左侧子串 (LEFT)


    #### 语法: LEFT(Text; n)


    **LEFT** 函数返回字符串文本中的第一个字符，或从左侧开始指定数量 **n** 的字符。例如：


    `=LEFT("OpenOffice.org")`


    返回 **O**，而


    `=LEFT("OpenOffice.org"; 4)`


    返回 **Open**。


    ![images](img/1103.jpg)


    ***图 11-3.** **LEFT** 函数的示例结果*


    另请参阅 **MID** 和 **RIGHT**。


    ### 字符串长度 (LEN)


    #### 语法: LEN(Text)


    **LEN** 函数返回给定字符串的长度。例如：


    `=LEN("OpenOffice.org")`


    返回 **14**。


    ![images](img/1104.jpg)


    ***图 11-4**. **LEN** 函数的示例结果*


    ### 中间子串 (MID)


    #### 语法: MID(Text; Start; n)


    **MID** 函数返回**文本**字符串的一个子串，从**起始**位置开始，包含给定数量的字符 (**n**)。例如：


    `=MID("OpenOffice.org"; 2; 6)`


    返回 **penOff**。


    ![images](img/1105.jpg)


    ***图 11-5.** **MID** 函数的示例结果*


    另请参阅 **LEFT** 和 **RIGHT**。


    ### 重复字符串 (REPT)


    #### 语法: REPT(Text; Repetitions)


    **REPT** 函数创建一个由给定字符串 (**text**) 重复 (**n**) 次组成的字符串。例如：


    `=REPT("Open"; 4)`


    返回 **OpenOpenOpenOpen**。


    ![images](img/1106.jpg)


    ***图 11-6.** **REPT** 函数的示例结果*


    ### 右侧子串 (RIGHT)


    #### 语法: RIGHT(Text; n)


    **RIGHT** 函数返回字符串文本末尾的最后 **n** 个字符，或从右侧开始指定数量的字符 (**n**)。例如：


    `=RIGHT("OpenOffice.org", 4)`


    返回 **.org**，而


    `=RIGHT("OpenOffice.org"; 6)`


    返回 **ce.org**。


    ![images](img/1107.jpg)


    ***图 11-7.** **RIGHT** 函数的示例结果*


    另请参阅 **LEFT** 和 **MID**。


    ### 混淆 (ROT13)


    #### 语法: ROT13(Text)


    **ROT13** 函数使用一种称为凯撒密码的简单算法对文本进行加密，其中每个字母被拉丁字母表中相隔 **13** 个字符的字母替换。


    将编码后的文本再次旋转 **13** 位即可返回原始字符串。例如：


    `=ROT13("OpenOffice.org")`


    返回 **BcraBssvpr.bet**，而


    `=ROT13(ROT13("OpenOffice.org")`


    返回 **OpenOffice.org**。


    ![images](img/1108.jpg)


    ***图 11-8.** **ROT13** 函数的示例结果*


    这不是一种非常强大的数据保护形式，但足以防止数据被可能“只是随便看看”的人意外发现。


    ### 仅返回文本值 (T)


    #### 语法: T(Value)


    **T** 函数有点奇怪。它返回作为其参数给定的文本字符串。例如：


    `=T("OpenOffice.org")`


    返回 **OpenOffice.org**，但


    `=T(10)`


    返回 **""**，因为 **10** 不是文本字符串。


    ![images](img/1109.jpg)


    ***图 11-9.** **T** 函数的示例结果*


    此函数已过时，此处保留它仅出于与先前 OpenOffice 电子表格软件的兼容性要求。


    ## 第 12 章


    ## 时间与日期函数


    我们都知道日期是什么，以及当我们说“我需要三天内完成”时意味着什么，但计算机处理这类自然表达并不容易。不幸的是，涉及时间和日期的计算在商业中至关重要，不容忽视。没有它们，就很难判断计划中的商业冒险的潜在盈利能力、贷款的实际成本或投资的未来价值。


    许多财务函数都极大地受益于日期函数的使用，因为它们使得自动化大量基于时间的计算成为可能。自动化总是一个好主意，因为它可以节省您的时间和金钱。


    OpenOffice.org Calc 中有两种与时间相关的函数：**日期函数**（用于较大的时间块：天、周、月或年）和**时间函数**（用于较短的时间段：小时、分钟或秒）。这种区分仅是为了您自己的方便，因为
    OpenOffice.org Calc 中的所有日期和时间计算都基于同一个分数（也称为“时间戳”），该分数表示自一个主观选择的称为“纪元”的时间点以来经过的秒数，这其实就是指时间计数器值等于
    **00:00:00.00**（即零）的时刻。


    您可以自行设置纪元（选择**工具** ![images](img/U001.jpg) **选项**，然后在 **OpenOffice.org Calc**
    分支中选择**计算**项，以显示一个面板，您可以在其中选择三个可用纪元之一）（请参阅图 12-1 中的**日期**部分）。


    ![images](img/1201.jpg)


    ***图 12-1.** 在日期部分设置纪元。*


    除非您有在 **2000** 年之前创建的旧文档，否则应始终使用默认纪元 **12/30/1899**。


    无论您选择哪个纪元，计数都从午夜开始。对于标准纪元，OpenOffice.org Calc 可以识别 **1583** 到 **9956** 年之间的年份，或者，如果您以两位数字输入年份，则可以识别从
    19**XX** 到 20**XX**–1 的年份。如果您决定使用较短的表示法，例如使用 **12/15/20** 代替 **12/15/2020**，则必须告诉
    OpenOffice.org Calc 如何将两位数的年份转换为四位数的年份。


    您可以在**常规**分支的**选项**对话框中执行此操作（选择**工具** ![images](img/U001.jpg) **选项**），如图 12-2
    所示。


    ![images](img/1202.jpg)


    ***图 12-2.** 在年份部分设置两位数的年份。*


    更改纪元或两年转换设置时，请务必在打开或创建工作表之前进行，以确保日期以一致的方式解释。


    日期函数可以分为以下几组：


    *   返回时间戳的函数。

    *   提取日期组成部分的函数。

    *   计算日期之间差异的函数。

