- fmt: '### Functions that Return a Timestamp


    Date and time information is stored on modern computer systems as a fractional
    number called a `timestamp`. It is commonly set to the number of seconds that
    have elapsed from midnight January 1, 1970.


    All date and time calculations are done much faster on timestamps than the date
    or time written the way we are used to, because a single number is easier to process.
    For example, to find out the difference between two dates, it is sufficient to
    subtract two timestamps instead of comparing six numbers (two years, two months,
    and two days).


    To make it easy to work with timestamps, we need a helper function like `DATE`.
    It is less often used today than a few years ago thanks to the maturity of the
    OpenOffice.org Calc code.


    ### Timestamp (`DATE`)


    #### Syntax: `DATE(Year; Month; Day)`


    The `DATE` function returns the timestamp for the given year, month, and day.
    To test it, place the following formula into any empty cell on the current worksheet:


    ```

    =DATE(2010; 1; 1)

    ```


    The result should be `40179`.


    ![images](images/1203.jpg)


    ***Figure 12-3.** Sample result of the `DATE` function*


    If you see a date like `01/01/10`, which is not what you wanted in this case,
    change the numeric formatting of that cell to `Text`. In order to do that, choose
    `Format` ![images](images/U001.jpg) `Cells` and click on the `Numbers` tab to
    change the numeric format for that cell to `Text / @`. The value of the timestamp
    might be different if you use a non-default Epoch.


    One useful trick that you might want to remember is using the `DATE` function
    to automatically calculate the timestamp of a day in a year’s time. For example:


    ```

    =DATE((YEAR(TODAY())+1); MONTH(TODAY()); DAY(TODAY()))

    ```


    The formula shown above is useful if you are trying to do financial and other
    calculations based on time.


    ### Today’s Timestamp (`TODAY`)


    #### Syntax: `TODAY()`


    This useful function returns the timestamp to the current day. For example, on
    January 3, 2010:


    ```

    =TODAY()

    ```


    returns `40181`.


    ![images](images/1204.jpg)


    ***Figure 12-4.** Sample result of the `TODAY` function*


    You can use this function in a worksheet that calculates mortgage payment schedules
    for your clients. Instead of typing in a new date into a formula calculating mortgage
    payments, put `TODAY` into the start date values and it will save you a lot of
    time. You can be even more inventive and add or subtract a certain number of days
    to construct even more flexible formulas:


    ```

    =TODAY()+30

    ```


    This formula will regenerate the timestamp for a date 30 days from today. If you
    replace the hard number with a cell reference (e.g., `A2`), you will make the
    formula even more flexible, because you will not have to rewrite it every time
    you change the number of days you want to add or subtract:


    ```

    =TODAY()+A2

    ```


    See also the descriptions of financial functions such as `FV` and `PV` in [Chapter
    8](#Chapter08.html#ch8) for an example on how to use `TODAY`.


    ### Extracting Date Components


    Some date and time operations are surprisingly inconvenient. For example, if you
    have ever had to find out the week number for a date, you know how time-consuming
    such a simple task can be. The following functions help with such mundane tasks.


    ### Extracting Days from a Date (`DAY`)


    #### Syntax: `DAY(t)`


    The `DAY` function is used to convert a date given in any recognizable format
    into a day of the month. For example:


    ```

    =DAY(40179)

    ```


    returns `1` (January 1, 2010).


    ![images](images/1205.jpg)


    ***Figure 12-5.** Sample result of the `DAY` function*


    You can give `DAY` the date in a more natural format:


    ```

    =DAY("3/17/2010")

    ```


    returns `17` (March 17, 2010).


    See the description of the `DATE` function for another example of using the `DAY`
    function in practice.


    ### Extracting Weekdays from a Date (`WEEKDAY`)


    #### Syntax: `WEEKDAY(t; Day)`


    The `WEEKDAY` function is used to convert a date given in any recognizable format
    into a day of the week. Days are numbered from `0` (Sunday) to `6` (Saturday).
    For example:


    ```

    =WEEKDAY("1/1/2010")

    ```


    returns `6`.


    ![images](images/1206.jpg)


    ***Figure 12-6.** Sample result of the `WEEKDAY` function*


    This result is produced by `WEEKDAY` assuming that weeks start on Sunday (day
    `0`).


    You can modify those results with the `day` argument. Its values can be as follows:


    *   `1`: week starts on Sunday (day `0`).

    *   `2`: weeks start on Monday (day `1`).

    *   `3`: weeks start on Monday (day `0`).


    Compare the following formulas and their results for the same date:


    ```

    =WEEKDAY("1/1/2010"; 1)

    ```


    returns `6`;


    ```

    =WEEKDAY("1/1/2010"; 2)

    ```


    returns `5`; and


    ```

    =WEEKDAY("1/1/2010"; 3)

    ```


    returns `4`.


    ### Extract Week Number from a Date (`WEEKNUM`)


    #### Syntax: `WEEKNUM(t; Day)`


    The `WEEKNUM` function is used to convert a date given in any recognizable format
    into the appropriate week number. You need to specify the first day of the week
    using an integer number (Sunday is `1`, Monday is `2`). For example:


    ```

    =WEEKNUM("2/7/2010"; 2)

    ```


    returns `5`, and


    ```

    =WEEKNUM("2/7/2010"; 1)

    ```


    returns `6`.


    ![images](images/1207.jpg)


    ***Figure 12-7.** Sample result of the `WEEKNUM` function*


    ### Extract Month from a Date (`MONTH`)


    #### Syntax: `MONTH(t)`


    The `MONTH` function is used to convert a date given in any recognizable format
    into the month number. For example:


    ```

    =MONTH(DATE(2010; 6; 27))

    ```


    returns `6`.


    ![images](images/1208.jpg)


    ***Figure 12-8.** Sample result of the `MONTH` function*


    You can give `MONTH` the date in a more natural format:


    ```

    =MONTH("3/17/2010")

    ```


    returns `3` (March 17, 2010).


    See the description of the `DATE` function for another example of using the `MONTH`
    function in practice.


    ### Extract Year from a Date (`YEAR`)


    #### Syntax: `YEAR(t)`


    The `YEAR` function is used to convert a date given in any recognizable format
    into a year number. For example:


    ```

    =YEAR(DATE(2010; 11; 1))

    ```


    returns `2010`.


    ![images](images/1209.jpg)


    ***Figure 12-9.** Sample result of the `YEAR` function*


    You can give `YEAR` the date in a more natural format:


    ```

    =YEAR("3/17/2010")

    ```


    returns `2010` (March 17, 2010).


    See the description of the `DATE` function, Number of Days in a Month (`DAYSINMONTH`).


    #### Syntax: `DAYSINMONTH(t)`


    The `DAYSINMONTH` function returns the number of days in the given date. For example:


    ```

    =DAYSINMONTH(DATE(2012; 2; 16))

    ```


    returns `29` (February 2012 has 29 days because the year 2012 is a leap year).


    ![images](images/1210.jpg)


    ***Figure 12-10.** Sample result of the `DAYSINMONTH` function*


    You can give `DAYSINMONTH` the date in a more natural format:


    ```

    =DAYSINMONTH("2/16/2012")

    ```


    returns `29` again.


    ### Number of Days in a Year (`DAYSINYEAR`)


    #### Syntax: `DAYSINYEAR(t)`


    The `DAYSINYEAR` function returns the number of days in the given date. For example:


    ```

    =DAYSINYEAR(DATE(2012; 2; 16))

    ```


    returns `366` (because the year `2012` is a leap year).


    ![images](images/1211.jpg)


    ***Figure 12-11.** Sample result of the `DAYSINYEAR` function*


    You can give `DAYSINYEAR` the date in a more natural format:


    ```

    =DAYSINYEAR("2/16/2012")

    ```


    returns `366` again.


    ### Number of Weeks in a Year (`WEEKSINYEAR`)


    #### Syntax: `WEEKSINYEAR(t)`


    The `WEEKSINYEAR` function returns the number of weeks in the given date. For
    example:


    ```

    =WEEKSINYEAR(DATE(2012; 2; 16))

    ```


    returns `52`.


    ![images](images/1212.jpg)


    ***Figure 12-12.** Sample result of the `WEEKSINYEAR` function*


    You can give `WEEKSINYEAR` the date in a more natural format:


    ```

    =WEEKSINYEAR("2/16/2012")

    ```


    returns `52` again.


    ### Functions that Calculate the Difference Between Two Dates


    Another handy set of functions are those that calculate the difference between
    two dates, which is often used to compute interest or discount in financial calculations.'
