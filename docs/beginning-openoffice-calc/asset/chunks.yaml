- fmt: '# PROPER


    ## Syntax: `PROPER(text)`


    The `PROPER` function capitalizes the first letter in every word in the given
    string. For example:


    `=PROPER("openoffice.org is cool")`


    returns **OpenOffice.org Is Cool**.


    ![images](images/0905.jpg)


    ***Figure 9-5.** Sample result of the `PROPER` function*


    See also the sections on the `LOWER` and `UPPER` functions.


    # ROMAN


    ## Syntax: `ROMAN(number, mode)`


    The `ROMAN` function converts an Arabic number into a Roman numeral string. As
    implemented in OpenOffice.org Calc, Roman numerals can only represent numbers
    from 0 to 3999; therefore, the `number` argument cannot be anything else but an
    integer from that range.


    Here is an example of the use of the `ROMAN` function:


    `=ROMAN(2011)`


    returns **MMXI**.


    ![images](images/0906.jpg)


    ***Figure 9-6.** Sample result of the `ROMAN` function*


    The second argument, `mode`, is an optional numerical value between 0 and 4. It
    specifies the degree of simplification of the resulting Roman numeral. Think of
    it as a way to shorten the resulting Roman numerals. Here is an example of how
    it works:


    `=ROMAN(3999;0)` returns **MMMCMXCIX**;


    `=ROMAN(3999;1)` returns **MMMLMVLIV**;


    `=ROMAN(3999;2)` returns **MMMXMIX**;


    `=ROMAN(3999;3)` returns **MMMVMIV**;


    `=ROMAN(3999;4)` returns **MMMIM**.


    Not all Roman numerals can be simplified, so don''t worry if you get the same
    results with different values of the `mode` argument.


    See also the section on the `ARABIC` function.


    # TEXT


    ## Syntax: `TEXT(number; format)`


    This function returns a given number as a text string formatted according to the
    given numeric format. Designing your own format is described in [Chapter 4](#Chapter04.html#ch4).
    If you already have a numeric format that you like, simply copy it from the **Format
    Code** field in the **Cells Format** dialog box into the **Format** field in the
    **Function Wizard**.


    Always remember to put the format string inside double quotes as in this example:


    `=TEXT(-1000000; "[$$-409]#,##0.00;[RED]-[$$-409]#,##0.00")`


    which returns **–$1,000,000.00**.


    ![images](images/0907.jpg)


    ***Figure 9-7.** Sample result of the `TEXT` function*


    # TRIM


    ## Syntax: `TRIM(text)`


    This function removes extra spaces from strings. For example:


    `=TRIM("OpenOffice.org      is      Cool!")`


    returns **OpenOffice.org is Cool!**.


    ![images](images/0908.jpg)


    ***Figure 9-8.** Sample results of the `TRIM` function*


    # UPPER


    ## Syntax: `UPPER(text)`


    `UPPER` turns all characters into uppercase. For example:


    `=UPPER("OpenOffice.org")`


    returns **OPENOFFICE.ORG**.


    ![images](images/0909.jpg)


    ***Figure 9-9.** Sample results of the `UPPER` function*


    See also `LOWER`.


    # C H A P T E R 10


    # Conversion Functions


    This chapter addresses text conversion functions that convert numbers into strings
    and vice-versa. They are useful for generating strings of text that contain numbers
    in a specific format. Also included in this chapter are some search functions.
    Search functions are used many times in conjunction with conversion functions.


    ## Converting Between Numeric Systems (BASE)


    ### Syntax: `BASE(Number; Base; Min_Length)`


    This function converts numbers into text strings that represent the numbers in
    a different numeric system. It is useful for turning decimal numbers into binary,
    octal, and hexadecimal numbers. For example:


    `=BASE(12; 2; 16)` turns number **12** into the string **0000000000001100** (binary
    number), while


    `=BASE(12; 8; 16)` turns number **12** into the string **0000000000000014** (octal
    number), and


    `=BASE(12; 16; 16)` turns **12** into the string **000000000000000C** (hexadecimal
    number).


    ![images](images/1001.jpg)


    ***Figure 10-1**. Sample result of the `BASE` function*


    As you can see, it is possible to specify the minimum length using the third parameter
    of the generated string, and the empty spaces are filled with zeroes.


    The `base` argument can be any number from 2 to 36.


    ## Converting Numbers into Currency Strings (DOLLAR)


    ### Syntax: `DOLLAR(Value; Decimal_Places)`


    The `DOLLAR` function converts the given `value` into text in currency format.
    For example:


    `=DOLLAR(1,000,000; 2)` returns **$1,000,000.00**.


    ![images](images/1002.jpg)


    ***Figure 10-2.** Sample result of the `DOLLAR` function*


    The second argument indicates the number of places past the `decimal point`. Why
    is that important? Well, it is good for making headlines such as **A Cool $1,000,000.00
    in Sales!**, which you could code as


    `="A cool "&DOLLAR(1,000,000; 2)&" in Sales!"`


    ## Adding Thousand Separators (FIXED)


    ### Syntax: `FIXED(Number; Decimal_Places; No_Commas)`


    The `FIXED` function converts the given number into comma-separated text format.
    For example:


    `=FIXED(1000000; 2)` returns **1,000,000.00** unless you put **1** as the third
    argument to switch commas off.


    ![images](images/1003.jpg)


    ***Figure 10-3.** Sample result of the `FIXED` function*


    The second argument, `decimal_places`, is used to specify the number of decimal
    places. For an idea on how to use this function, see `DOLLAR`.


    ## Searching for Strings (FIND – Case-Sensitive)


    ### Syntax: `FIND(Find_Text; Source_Text; Start_From)`


    This function finds the starting position of the specified text string (`find_text`)
    within another text string (`source_text`). For example:


    `=FIND("Office"; "OpenOffice.org")` returns **5**, the starting position of the
    `Office` string within the `OpenOffice.org` string.


    ![images](images/1004.jpg)


    ***Figure 10-4.** Sample result of the `FIND` function*


    The third, optional argument `start_from` is used to specify the starting position
    within `source_text` from which `FIND` begins looking for the `find_text` string.


    ## Replacing Strings (REPLACE)


    ### Syntax: `REPLACE(Old_Text; Start_Number; Number_of_Chars; New_Text)`


    This function replaces part of a string `old_text` with a new string `new_text`,
    as in


    `=REPLACE("OpenOffice.org"; 5; 10; "Calc")` which returns **OpenCalc**.


    ![images](images/1005.jpg)


    ***Figure 10-5.** Sample result of the `REPLACE` function*


    The two numeric arguments (`start_number` and `number_of_chars`) are the position
    where the replacement ought to begin and the number of characters that are to
    be replaced.


    ## Searching for Strings (SEARCH – Case-Insensitive)


    ### Syntax: `SEARCH(Find_Text; Source_Text; Start_Number)`


    The `SEARCH` function finds the specified text string, `find_text`, within another
    text string, `source_text`, but unlike `FIND`, this function is not case-sensitive.
    For example:


    `=FIND("office"; "OpenOffice.org")` returns error **#VALUE!**, meaning the search
    term was not found, but


    `=SEARCH("office"; "OpenOffice.org")` returns **5**, the starting position of
    the `Office` string within the `OpenOffice.org` string.


    ![images](images/1006.jpg)


    ***Figure 10-6.** Sample result of the `SEARCH` function*


    The `start_number` argument enables you to change the position from which the
    search begins (default value is **1**).


    ## Selectively Replacing Strings (SUBSTITUTE)


    ### Syntax: `SUBSTITUTE(Source_Text; Substring; New_Text; Occurrence)`


    The `SUBSTITUTE` function is similar to `REPLACE`, only here you can choose which
    occurrence of `substring` is to be replaced. For example:


    `=SUBSTITUTE("OpenOffice.org Is Cool! OpenOffice.org Calc Is Cool!"; "Is"; "Is
    Way"; 2)` returns **OpenOffice.org Is Cool! OpenOffice.org Calc Is Way Cool!**


    ![images](images/1007.jpg)


    ***Figure 10-7.** Sample result of the `SUBSTITUTE` function*


    The `source_text` argument is the text string where you need to find a substring
    to be replaced with `new_text`. The `occurrence` argument is used to specify which
    `substring` ought to be replaced.'
