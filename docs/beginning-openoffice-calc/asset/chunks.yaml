  trans: '

    ### 实际年利率（EFFECTIVE）


    #### 语法：EFFECTIVE(名义利率; 期数)


    **EFFECTIVE** 函数根据名义利率和付款期数（如果名义利率是年利率，则通常为月数）返回实际年利率。因此，如果你想检查名义利率为 **10%**、假设每月付款
    **12** 次的实际利率，可以使用


    `=EFFECTIVE(10%; 12)`


    这将返回 **10.47%**。


    ![images](img/0804.jpg)


    ***图 8-4.** **EFFECTIVE** 函数的示例结果*


    此函数的相反函数是 **NOMINAL**。


    ### 未来值（FV）


    #### 语法：FV(利率; 时间; 分期付款额; 存款; 类型)


    **FV** 函数返回一笔初始一次性**存款**投资，随后在**时间**长度内定期、等额分期付款的未来值，假设**利率**恒定。


    ![images](img/0805.jpg)


    ***图 8-5.** **FV** 函数的示例结果*


    **时间**参数指定付款总次数，**分期付款额**参数是每次支付的金额。


    例如，如果你想知道，如果你每月向一个支付恒定 **5%** 利率的储蓄账户存入 **100 美元**，持续 **25** 年，你能存下多少钱，可以使用以下公式：


    `=FV(5%/12; 25*12; -100)`


    答案是 **59,550.97 美元**。这相当不错，但如果你每年存入 **1,200 美元**，你能存下多少呢？让我们看看：


    `=FV(5%; 25; -1,200)`


    返回 **57,272.52 美元**。


    显然，更频繁地支付较小金额更为有利。


    请记住，**利率**后面必须跟百分号（**%**），对于每年付款超过一次的情况，利率必须除以每年的付款次数。对于每月付款，这意味着利率除以 **12**；对于每季度付款，利率除以
    **4**，以此类推。


    **时间**参数必须等于付款次数。例如，对于一项每月供款、持续四年的投资，你应该将时间设为 **48**（**4*12**）。


    在前两个计算中，我们都假设你在会计期初存款。要计算会计期末的付款，你需要使用第五个参数“类型”，该参数可设置为 **0** 表示在每期期末付款。使用 **1**
    表示在每期期初付款。如果你使用第五个参数，则还必须输入第四个参数**存款**，该参数用于给出初始储蓄金额。


    **FV** 函数可用于一些更复杂的计算。例如，你可能想知道，如果你当前的储蓄（比如 **10,000 美元**）加上每月 **100 美元**的供款，**25**
    年后会值多少钱。公式如下：


    `=FV(5%/12; 25*12; -100; -10,000; 0)`


    答案是可观的 **94,363.88 美元**（每期期末付款），相比之下，如果每期期初付款，结果更佳，为 **94,612.00 美元**。


    必须将利率除以月数（或等效的付款期数），并将年数乘以月数，以确保计算正确。利率始终假定为年利率。因此，如果你需要计算每月付款，你需要将利率除以 **12**，并将年数乘以
    **12**。类似地，如果你要计算每季度付款，你应该将利率除以 4，并将年数乘以 4。


    另请参阅 **PV** 函数的说明。


    ### 利息（IPMT）


    #### 语法：IPMT(利率; 期次; 时间; 贷款额; 未来值; 类型)


    **IPMT** 函数返回在特定会计**期次**内，当你借入一定金额（**贷款额**）并持续指定**时间**时，你需要支付的利息金额。例如，如果你以 **7.25%**
    的利率借入 **1,000,000 美元**，期限 **25** 年，并且想知道第一个月需要偿还多少利息，你可以通过以下公式找到答案：


    `=IPMT(7.25%/12; 1; 25*12; 1,000,000)`


    答案是 **–6,041.67 美元**。


    ![images](img/0806.jpg)


    ***图 8-6.** **IPMT** 函数的示例结果*


    **期次**参数指定要计算利息的会计期间，**时间**参数等于会计期间数。**未来值**参数用于输入最后一次付款后剩余的金额。对于贷款，你通常输入 0 或根本不使用此参数，除非你同时使用类型参数。当每期期初付款时，此参数等于
    1；当每期期末付款时，等于 0。


    **IPMT** 与 **CUMIPMT** 类似，但它计算单个会计期间应付的利息，而 **CUMIPMT** 计算一个或多个会计期间的复利。


    另请参阅 **PPMT** 和 **NPER** 函数的章节。


    ### 内部收益率（IRR）


    #### 语法：IRR(现金流; 猜测值)


    **IRR** 函数计算给定初始投资额和一系列现金流的内部收益率。例如，如果你投资 **25,000 美元**开一家咖啡店，并且想知道这项投资的内部收益率（基于四年内你分别获得了
    **30,000 美元**、**40,000 美元**、**28,000 美元**和 **12,000 美元**的回报），你应该将 **–25,000 美元**（初始投资）放入一个单元格，并将所有收入（不带负号）放入其下方或右侧的单元格中。如果你的数值在单元格
    **B212:B216** 中，你可以输入以下公式：


    `=IRR(B212:B216)`


    答案是 **120.23%**。


    ![images](img/0807.jpg)


    ***图 8-7.** **IRR** 函数的示例结果*


    对于一家咖啡店来说，这相当不错。**猜测值**参数用于指定给定系列现金流的内部收益率估计值。


    ### 名义利率（NOMINAL）


    #### 语法：NOMINAL(实际利率; 期数)


    **NOMINAL** 函数根据给定的实际利率和付款次数返回名义利率。因此，如果你想检查实际利率为 **10.47%**、假设每年付款 12 次的名义利率，可以使用
    **=NOMINAL(10.47%; 12)**，这将返回 **10%**。


    ![images](img/0808.jpg)


    ***图 8-8.** **NOMINAL** 函数的示例结果*


    此函数的相反函数是 **EFFECTIVE**。


    ### 贷款偿还时间（NPER）


    #### 语法：NPER(利率; 分期付款额; 贷款额; 未来值; 类型)


    如果你需要回答一个简单的问题，例如“假设我等额还款且利率恒定，我需要多少年才能还清借来的钱？”，那么 **NPER** 函数就是正确的工具。考虑以下情况：你以
    **7.5%** 的年利率借入 **100,000 美元**（**贷款额**），并且你希望每年偿还 **10,000 美元**。要查看这需要多少年，请使用以下公式：


    `=NPER(7.5%; -10,000; 100,000)`


    这将返回 **19.17** 年！


    ![images](img/0809.jpg)


    ***图 8-9.** **NPER** 函数的示例结果*


    **未来值**参数用于输入最后一次付款后剩余的金额。对于贷款，你通常输入 **0**。除非你同时使用**类型**参数，否则不要使用此参数。当每期期初付款时，类型参数等于
    **1**；当每期期末付款时，等于 **0**。


    另请参阅 **IPMT** 和 **PPMT** 函数的章节。

