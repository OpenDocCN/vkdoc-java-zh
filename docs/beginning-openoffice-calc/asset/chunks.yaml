    a feedback window and a cell editing field.*


    ### How OpenOffice.org Calc Treats Your Input


    OpenOffice.org Calc uses an elaborate set of rules to determine how to classify
    and display the information you store inside a worksheet. Most of those rules
    are fairly straightforward, and as long as you properly set the operating system’s
    local settings for date and money formatting, whatever you type or paste ought
    to be interpreted in the right way.


    The following sections explain how OpenOffice.org Calc treats each type of data.
    Read them if you want to understand why your input is being interpreted, displayed,
    and printed the way it is. You will also pick up tips on forcing OpenOffice.org
    Calc to interpret your input in the way you think is correct.


    #### Text


    Entering text into a cell is as straightforward as it can possibly be. Just double-click
    on a cell, type whatever you want to type, and then hit the **Enter**/**Return**
    key.


    OpenOffice.org Calc is smart enough to tell the difference between dates, formulas,
    numbers, text, and time. When it gets confused and does not understand your input
    one way or another, it will treat what you type as text. For example, **Annual
    Report**, **Year 2010 Sales in Omaha**, **1st Quarter Results**, and **2010 Sales
    Summary** are all treated as text.


    You can force OpenOffice.org Calc to treat any kind of input as a string of text
    by placing a single quote (**''**) in front of it. Type **1000** and **''1000**
    into two separate cells to see the difference for yourself (see [Figure 1-3](#Chapter01.html#fig_1_3)).


    ![images](images/0103.jpg)


    ***Figure 1-3.** Forcing numbers to be treated as text*


    ##### Spelling Correction


    Every time you type some text, it is possible that you will make spelling mistakes.
    OpenOffice.org Calc can correct them automatically, or you can turn auto correction
    off and only run the checks when you are ready to do so.


    The default setting is to spell-check everything you type. If OpenOffice.org Calc
    finds either something you misspelled or something it thinks you misspelled, then
    it will underline that part of the text using a red line.


    ![images](images/0104.jpg)


    ***Figure 1-4.** OpenOffice.org Calc underlines incorrectly spelled words.*


    To correct the mistake, click on the cell where the underlined text resides and
    edit it (see section “Editing Data”).


    What if what you typed is correct and OpenOffice.org Calc does not understand
    it, because it simply does not have it in its dictionary? You have two choices.
    If the offending word is a funky name like “xYz,” then you can either tell OpenOffice.org
    Calc to ignore it altogether or add it to the application''s dictionary so it
    knows how to spell it correctly. In either case, what you need to do is double-click
    on the cell where the underlined text is stored, right-click on the underlined
    word, and choose either the Add or Ignore All option.


    ![images](images/0105.jpg)


    ***Figure 1-5.** Choose **Add** or **Ignore All** to either add or ignore words.*


    OpenOffice.org Calc gives you an option to add words to three dictionaries. Choose
    soffice.dic.


    When you work with large documents or on one of those slightly underpowered netbooks
    that have become so popular of late, you may want to turn spell-check off. Choose
    Tools ![image](images/U001.jpg) Options ![image](images/U001.jpg) Language Settings
    ![image](images/U001.jpg) Writing Aids and uncheck all items in the Options list.


    ![images](images/0106.jpg)


    ***Figure 1-6.** Text correction options*


    Once you turn off text correction tools, OpenOffice.org Calc should work a tiny
    bit faster, but it is now up to you to remember to spell-check the document. You
    do this by pressing F7.'
  trans: '

    ## 基本操作


    在本章中，你将学习在 OpenOffice.org Calc 中处理数据的基础知识——如何输入、编辑、组织和格式化信息。


    为了充分利用本书提供的信息，尤其是在你刚开始学习 OpenOffice.org Calc 时，建议你新建一个工作表，以便尝试后续页面中介绍的工具和技巧。


    ### 新建工作表


    你可以通过多种方式新建工作表，但在任何 OpenOffice.org 模块中，选择 **文件** ![image](img/U001.jpg) **新建**
    ![image](img/U001.jpg) **电子表格** 可能是最便捷的方法（参见 图 1-1）。


    ![images](img/0101.jpg)


    ***图 1-1.** 新建工作表*


    当你在 Calc 中工作时，按 **Ctrl+N** 也是一个方便的快捷键。


    ### 输入数据


    在 OpenOffice.org Calc 工作表中输入信息，通常只需双击某个单元格，然后输入你想要的内容。按一次 **回车** 键即可将输入内容存储在当前单元格中。


    按下键盘上的方向键或点击另一个单元格也会产生相同效果，除非你正在输入公式——此时 OpenOffice.org Calc 会插入你移动电子表格光标所指向的单元格引用。要退出该模式，请按
    **Esc** 键。


    电子表格光标是单元格周围的粗黑边框。文本光标则是随着你输入而在屏幕上移动的黑色竖线。


    OpenOffice.org Calc 足够智能，能够识别多种常见数据类型（数字、货币、日期、文本等）。你在单元格中输入的任何内容都会显示在该单元格以及工作表区域顶部的**输入行**字段中。


    **输入行**是一个有用的反馈工具。如果单元格中的内容看起来不对劲，**输入行**总会显示其原始、未格式化的内容。


    **输入行**也是编辑数据的便捷位置。


    要编辑单元格中存储的数据，请执行以下任一操作：双击该单元格、按 **F2** 键，或单击一次**输入行**。


    ![images](img/0102.jpg)


    ***图 1-2.** **输入行**（右上角的字段）既是反馈窗口，也是单元格编辑区域。*


    ### OpenOffice.org Calc 如何处理你的输入


    OpenOffice.org Calc 使用一套复杂的规则来确定如何分类和显示你存储在工作表中的信息。这些规则大多相当直接，只要你正确设置了操作系统中日期和货币格式的区域设置，你输入或粘贴的内容通常都会被正确解释。


    以下部分将解释 OpenOffice.org Calc 如何处理每种数据类型。如果你想了解为何你的输入会以特定方式被解释、显示和打印，请阅读这些内容。你还会学到一些技巧，以强制
    OpenOffice.org Calc 按照你认为正确的方式解释你的输入。


    #### 文本


    在单元格中输入文本非常简单。只需双击单元格，输入你想要的内容，然后按**回车**键即可。


    OpenOffice.org Calc 足够智能，能够区分日期、公式、数字、文本和时间。当它感到困惑，无法以某种方式理解你的输入时，它会将你输入的内容视为文本。例如，**年度报告**、**奥马哈
    2010 年销售额**、**第一季度结果**和**2010 年销售摘要**都会被当作文本处理。


    你可以通过在输入内容前加上单引号（**''**）来强制 OpenOffice.org Calc 将任何输入视为文本字符串。分别在两个单元格中输入 **1000**
    和 **''1000**，亲自看看区别（参见 图 1-3）。


    ![images](img/0103.jpg)


    ***图 1-3.** 强制将数字视为文本处理*


    ##### 拼写检查


    每次输入文本时，你都可能犯拼写错误。OpenOffice.org Calc 可以自动纠正这些错误，或者你也可以关闭自动更正，只在准备好时才运行检查。


    默认设置是对你输入的所有内容进行拼写检查。如果 OpenOffice.org Calc 发现你拼写错误或它认为你拼写错误的内容，它会用红色波浪线标出该部分文本。


    ![images](img/0104.jpg)


    ***图 1-4.** OpenOffice.org Calc 会为拼写错误的单词添加下划线。*


    要纠正错误，请点击包含带下划线文本的单元格并进行编辑（参见“编辑数据”部分）。


    如果你输入的内容是正确的，但 OpenOffice.org Calc 因为其词典中没有该词而无法识别，该怎么办？你有两个选择。如果这个有问题的词是一个像“xYz”这样的古怪名称，你可以告诉
    OpenOffice.org Calc 完全忽略它，或者将其添加到应用程序的词典中，以便它知道如何正确拼写。无论哪种情况，你需要做的是双击存储带下划线文本的单元格，右键点击带下划线的单词，然后选择“添加”或“全部忽略”选项。


    ![images](img/0105.jpg)


    ***图 1-5.** 选择**添加**或**全部忽略**来添加或忽略单词。*


    OpenOffice.org Calc 允许你将单词添加到三个词典中。请选择 `soffice.dic`。


    当你处理大型文档，或使用近期流行的性能稍弱的上网本时，你可能希望关闭拼写检查。选择 **工具** ![image](img/U001.jpg) **选项**
    ![image](img/U001.jpg) **语言设置** ![image](img/U001.jpg) **写作辅助**，然后取消勾选“选项”列表中的所有项目。


    ![images](img/0106.jpg)


    ***图 1-6.** 文本更正选项*


    一旦关闭文本更正工具，OpenOffice.org Calc 的运行速度可能会稍微快一点，但你需要记得手动对文档进行拼写检查。按 **F7** 键即可执行此操作。

