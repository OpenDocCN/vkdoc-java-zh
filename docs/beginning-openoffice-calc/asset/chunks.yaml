  trans: "\n### 为单元格添加注释\n\n设计良好的工作表应当不言自明，你无需为其添加大量额外注释。但在许多情况下，你可能希望添加一些额外信息，而这些信息在打印或向他人展示数据时并不需要显示。\n\
    \n例如，“当客户要求超过 10%的折扣时给我打电话”就是一个很好的例子，这类备注应作为隐藏注释添加。OpenOffice.org Calc 允许你为任何单元格添加注释。操作非常简单。\n\
    \n*   选择 **插入** ![image](img/U001.jpg) **注释**，此时会打开一个黄色矩形框，你可以在其中输入关于该特定单元格的简短注释（参见图\
    \ 1-9）。\n*   带有注释的单元格会在右上角显示一个微小的红色方块。\n*   若要查看附加到单元格的注释，请右键单击该单元格，然后选择 **显示注释**。\n\
    *   切换到注释编辑模式只需在注释显示在屏幕上时单击它即可。\n\n    ![images](img/0109.jpg)\n\n    ***图 1-9.**\
    \ OpenOffice.org Calc 版本的著名黄色便签纸*\n\n若要删除注释，请右键单击带有注释的单元格，然后选择 **删除注释**。\n\n##\
    \ 第 2 章\n\n## 公式\n\n在本章中，你将学习如何编写 OpenOffice.org Calc 公式。公式是简单而强大的工具，可让你创建无需过多人工干预即可自动更新的智能文档。这听起来可能像火箭科学一样复杂，但实际上非常简单。\n\
    \n一旦你理解了公式的工作原理，能够构建一个为你完成所有数学运算的复杂文档，同时让你专注于解决实际问题，这真是一种巨大的乐趣。\n\n### 出色的公式\n\
    \n无论执行何种操作，每个公式都以等号（**=**）开头。一个公式可以简单到只是引用另一个单元格；例如，在除 A4 之外的任何单元格中输入 **=A4**，就会将\
    \ A4 的值复制到该单元格中。\n\n公式甚至可以更简单。例如，**=7** 也是一个公式！但它并不是很有用。\n\n### 理解公式语法\n\nOpenOffice.org\
    \ Calc 公式的外观和行为与你数学课上学到的方程式非常相似，只是等号（**=**）位于等式的左侧，而不是更“自然”的右侧。\n\n所有标准数学运算符都可供你使用，它们的外观和工作方式与其他任何电子表格或数学软件相同。它们的名称和符号如下：\n\
    \n*   加法（**+**）\n*   减法（**–**）\n*   乘法（*****）\n*   除法（**/**）\n*   乘方（**^**）\n\n\
    OpenOffice.org Calc 遵循标准的数学运算顺序：乘方、乘法和除法（从左到右），以及加法和减法（从左到右）。\n\n你可以使用括号更改公式的计算顺序，如下例所示：\n\
    \n`=7+9*2²`\n\n返回 **43**，而\n\n`=7+(9*2)²`\n\n返回 **331**，并且\n\n`=(7+9)*2²`\n\n\
    返回 **64**。\n\n所有括号必须成对出现——也就是说，每个左括号 **(** 必须由一个位置恰当的右括号 **)** 与之匹配。\n\n### 引用单元格\n\
    \n将各种信息输入工作表是组织数据的好方法，但仅此而已。如果你想处理这些数据，就需要一种方法来引用存储在单元格中的值，以及一种表示法来表达你希望如何处理这些值。\n\
    \n引用单元格和处理数据得益于两个强大的工具：**单元格寻址** 和 **公式**。\n\n*   能够使用地址引用其他单元格，可以让你创建这样的公式：一旦你完成编辑公式所引用的值，它们的结果就会立即更新。\n\
    *   工作表中单个工作表内的任何地址都由两个坐标组成：一个由字母序列表示的列号（例如，**AF**）和一个整数行号（例如，**125**）。行号跟在列号后面（例如，**AF125**）。\n\
    *   公式始终以等号（**=**）开头，并且可以包含使用数学运算符和 OpenOffice.org Calc 内置函数混合描述的复杂计算。\n*   你可以使用对其他单元格的引用作为\
    \ OpenOffice.org Calc 函数的参数。\n\n了解寻址、引用和公式在实践中如何工作的最佳方法是尝试一个简单的示例（参见图 2-1）：\n\n\
    ![images](img/0201.jpg)\n\n***图 2-1.** 寻址和引用在实践中如何工作*\n\n*单元格 A1 存储数字 100；单元格\
    \ B1 存储引用单元格 A1 内容的公式。*\n\n1.  在任何单元格中输入任意数字或文本，并记住其地址。\n2.  OpenOffice.org Calc\
    \ 会在工具栏左侧的下拉框中显示当前单元格的地址。列标题和行标题也会改变颜色，以提供视觉提示。\n3.  将电子表格光标移动到另一个单元格。\n4.  输入等号（**=**），后跟原始单元格的地址。\n\
    5.  按 **回车键**。\n\n![images](img/square.jpg) **注意** OpenOffice.org Calc 会在两个单元格中显示相同的数值或文本，即使它们包含不同类型的信息。第一个单元格包含原始信息，而第二个单元格包含对第一个单元格内容的引用。\n\
    \n### 相对寻址\n\n上一节示例中使用的寻址类型称为“相对”寻址，这是因为当你决定复制或移动单元格时，OpenOffice.org Calc 处理此类地址的方式。\n\
    \n当你使用相对寻址时，OpenOffice.org Calc 会更新引用，使其指向与移动后的单元格保持相同相对距离（“向左两格，向上一格”）的单元格。它在实践中是如何工作的？假设你在单元格\
    \ B1 中有一个简单的公式，如 **=A1**。当你将该公式从单元格 B1 复制到 C1 时，OpenOffice.org Calc 会自动将其从 **=A1**\
    \ 更改为 **=B1**。\n\n任何时候，当你看到一个仅由字母和数字组成的地址（例如，**A1**），它就是一个相对地址。\n\n### 绝对寻址\n\n\
    OpenOffice.org Calc 很智能，但还不足以聪明到能猜出你何时不想使用相对寻址。公式中地址的自动更新很方便，但并非总是受欢迎的。\n\n如果你不注意正在发生的事情，相对寻址可能会导致计算中出现“无法解释”的错误。例如，如果你在单元格\
    \ A4 中输入一个数字，在 A5 中输入另一个数字，然后在单元格 B4 中输入对 A4 的引用（**=A4**），然后将 B4 的内容复制到 B5，B5\
    \ 将显示 A5 的值，而不是 A4 的值。根据你的需求，这可能是好事也可能是坏事。如果你引用的是货币汇率表，你未必希望从一个货币切换到另一个货币。在这种情况下，你应该使用“绝对”寻址表示法。它会固定单元格引用，并告诉\
    \ OpenOffice.org Calc 保持它们原样不变。\n\n为了确保 OpenOffice.org Calc 不更改某些地址，请在单元格地址的列部分和行部分前面加上美元符号（**$**）。因此，不要输入\
    \ **A4**，而是输入 **$A$4**。一旦你这样做了，无论你将公式复制到哪里，它都将始终指向正确的单元格。\n\n你可以使用部分绝对寻址，例如 **A$4**\
    \ 或 **$A4**，以便在需要时将绝对寻址限制在特定的列或行。\n\n有一种简单的方法可以在绝对地址和相对地址之间来回切换。选择要转换地址的单元格，然后按\
    \ **Shift+F4**。重复按这些键可以在绝对行和绝对列、以及相对行和相对列之间循环切换。\n"
- fmt: "### Referencing Data Stored on Other Sheets\n\nYou can write formulas that\
    \ point to cells located on other sheets within the same worksheet document. All\
    \ that you need to do is a small change of the target cell's address.\n\nIf you\
    \ want to reference cell `B2` on sheet `California`, type `=California.B2`.\n\n\
    ### Referencing Data Stored in Other Worksheets\n\nWhen you are referencing data\
    \ held in other worksheets (separate spreadsheet document files), OpenOffice.org\
    \ Calc needs some additional information to locate external files.\n\nWhen you\
    \ reference cell `B2` located on sheet `California` in worksheet `USA`, you need\
    \ to type\n\n`='USA.ods'#$California.B2`\n\nThe `.ods` suffix is used to complete\
    \ the name of a worksheet created using OpenOffice.org Calc 3.1; other spreadsheets\
    \ use different suffixes or no suffixes at all and you will have to adjust your\
    \ references accordingly.\n\nThe pound sign (`#`) and the dollar sign (`$`) in\
    \ front of the name of the sheet are obligatory. They have no relation to absolute\
    \ and relative addressing, although you can use both types of addressing in cell\
    \ references, such as\n\n`='USA.ods'#$California.$B$2`\n\nFilenames must be enclosed\
    \ in single quotes (`'`).\n\nIf the worksheet you are referring to is not located\
    \ in the same directory as the file that references it, you must give OpenOffice.org\
    \ Calc a full path to that document, such as\n\n`'/home/jack.white/monthly returns/customers/USA.sdc'#$California.$B$2`\n\
    \nThe reference to the external file shown above is written in the style native\
    \ to Linux and other Unix-like operating systems. On Microsoft Windows, it would\
    \ look like this:\n\n`='C:\\Documents and Settings\\Jack White\\My Documents\\\
    monthly returns\\customers\\USA.sdc'#$California.B2`\n\n#### Referencing Data\
    \ Stored on Other Computers\n\nYou can also refer to external documents stored\
    \ on the intranet or the world-wide web. To do this, choose Insert `![images](images/U001.jpg)`\
    \ Link to External Data…\n\n### Giving Cells Names\n\nAlthough addresses are a\
    \ very powerful mechanism for writing formulas, they are difficult to remember.\
    \ Luckily, there is a way to make your life easier. OpenOffice.org Calc lets you\
    \ name each cell or whole groups of cells and use those names instead of addresses.\
    \ This is how you go about doing it:\n\n1.  Select the cell you want to name.\n\
    2.  Choose Insert `![images](images/U001.jpg)` Names `![images](images/U001.jpg)`\
    \ Define.\n3.  Type the cell name (such as `Total`) into the `Name` field in the\
    \ `Define Names` dialog box (see [Figure 2-2](#Chapter02.html#fig_2_2)).\n\n \
    \   `![images](images/0202.jpg)`\n\n    ***Figure 2-2.** Naming blocks of cells*\n\
    \n4.  The names must begin with a letter and should not contain spaces, and they\
    \ must be unique to distinguish them from other names.\n\n    The `Refers to`\
    \ field contains the absolute address of the cell.\n\n5.  Click on the `Add` button.\
    \ That's it! You can now use the new name instead of the cell's address (e.g.,\
    \ use `=Total` instead of `=A1`).\n\nYou can just as easily create names for blocks\
    \ of cells. Simply select as many as you like and repeat the preceding steps.\n\
    \nTo select any cell or a range of cells that has a defined name, select the name\
    \ from the list in the top-left corner of the worksheet window (see [Figure 2-3](#Chapter02.html#fig_2_3)).\n\
    \n`![images](images/0203.jpg)`\n\n***Figure 2-3.** Selecting groups of named cells*\n\
    \nThere is another method of creating names for blocks of cells if you already\
    \ have labels above, below, to the left, or to the right of each column or row\
    \ of data:\n\n1.  Select cells (as in [Figure 2-3](#Chapter02.html#fig_2_3)) and\
    \ choose Insert `![images](images/U001.jpg)` Names `![images](images/U001.jpg)`\
    \ Create.\n2.  In the `Create Names` dialog box, click one of the options to specify\
    \ the location of the labels you want to use ([Figure 2-4](#Chapter02.html#fig_2_4)).\n\
    \n    `![images](images/0204.jpg)`\n\n    ***Figure 2-4.** The cells you select\
    \ for automatic naming must already have column or row labels.*\n\n3.  Click `OK`\
    \ to turn the labels into cell names.\n\nCheck if OpenOffice.org Calc did its\
    \ job right by selecting one of the names from the drop-down list on the left\
    \ side of the document window (see [Figure 2-3](#Chapter02.html#fig_2_3)).\n\n\
    ## C H A P T E R  3\n\n## Functions\n\nYou might have heard that functions and\
    \ formulas are difficult to master. That used to be the case a long time ago,\
    \ but it is not so anymore, and it is certainly not the case with OpenOffice.org\
    \ Calc.\n\nThere is some jargon to explain, but it's not difficult. As you will\
    \ learn on the following pages, I often use phrases such as “the formula returns\
    \ x” or “the function returns x,” which is just a short way of saying that the\
    \ formula or the function in question has a value of `x` for the given “parameters”\
    \ or “arguments,” as they are called by the creators of OpenOffice.org Calc.\n\
    \nWhat is the difference between a formula and a function? A formula is something\
    \ you create yourself, using standard mathematical operators, numbers, text, cell\
    \ addresses, or cell ranges. You can also add functions to a formula. Functions\
    \ are really just prepackaged formulas that perform certain standardized jobs\
    \ or calculations or even make simple decisions.\n\nTo use a function in a formula,\
    \ you need to type its name followed by parentheses. For example, the following\
    \ formula uses function `SQRT` to calculate the square root of `2`:\n\n`=SQRT(2)`\
    \ `![images](images/0301.jpg)`\n\n***Figure 3-1.** The `Function Wizard` showing\
    \ general information about functions*\n\nThe number `2` in the formula shown\
    \ on the previous page is an example of a formula *argument* that a particular\
    \ function accepts and processes to produce a result, which is then considered\
    \ to be the value of the cell in which the formula is held.\n\nYou do not have\
    \ to type function names in capitals because OpenOffice.org Calc automatically\
    \ corrects them for you.\n\nArguments in a formula are separated by the semicolon\
    \ (`;`).\n\nDifferent functions use different arguments: numbers, text, a reference\
    \ to a cell that holds a number or a text string, or another function that returns\
    \ a number or a piece of text.\n\nUsing one function as an argument of another\
    \ is called *nesting*. For example, you can place function `PI` inside function\
    \ `SQRT`, as in\n\n`=SQRT(PI())`\n\nThe example above shows function `PI` nested\
    \ inside function `SQRT`.\n\nAll functions must be followed by parentheses, even\
    \ if they do not take any arguments. For example, `PI()` returns the number pi\
    \ (π) and doesn't take any arguments but still needs to be followed by parentheses.\n\
    \nIn this book, we do not put parentheses after function names to make the text\
    \ easier to read and to keep in line with the conventions used by the creators\
    \ of OpenOffice.org Calc. The only exception is when we include actual formula\
    \ code, as in `=PI()`.\n\n### Creating Formulas by Hand\n\nCreating formulas is\
    \ as simple as typing the equal sign (`=`) followed by the necessary references,\
    \ numbers, operators, and functions into the chosen cell and then hitting the\
    \ `Enter`/`Return` key.\n\nIf you make mistakes in the formula, OpenOffice.org\
    \ Calc complains and you can edit the formula directly inside the offending cell\
    \ or on the `Input Line`. All you need to do is to place the cursor in the appropriate\
    \ cell and hit `F2`."
