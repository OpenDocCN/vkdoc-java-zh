  trans: '

    ### 大于或等于 X 的最小倍数（CEILING）


    #### 语法：CEILING(数值; 基数; 模式)


    **CEILING** 函数将给定的**数值**向上舍入到最接近的**基数**的倍数，该倍数大于或等于**数值**本身。它常用于从大量数值中过滤噪声、发现数值的显著变化、检测趋势反转等任务中。在这些任务中，使用整数的倍数来更好地理解需要处理的数据海洋会更容易。


    ![images](img/0601.jpg)


    ***图 6-1.** **CEILING** 函数的示例结果*


    **CEILING** 函数也是解决日常问题的绝佳工具，例如为运输订购合适数量的箱子。假设您有 **125,000** 个未售出的 USB 驱动器，想通过老套的“买十三送五”促销方式处理掉它们。为什么是十三和五？因为您能找到的最便宜的箱子最多只能装
    **18** 个驱动器，而且您想听起来有点创意。以下是使用 **CEILING** 的方法：


    `=CEILING(125,000; 18)`


    您将得到的结果是 125,010。这告诉您需要多少 U 盘才能让所有箱子都恰好装满 **18** 个，但您只有 **125,000** 个 U 盘。没关系。其中一个箱子里的
    U 盘会少于 **18** 个。您可以给那个箱子特别折扣，或者直接送掉。但您仍然需要知道需要多少个箱子。以下是获取该数字的方法：


    `=CEILING(125,000; 18)/18`


    答案是 **6945**。


    如果这些箱子按每包一打（12 个）出售呢？您应该订购多少包？


    `=CEILING(CEILING(125,000; 18)/18; 12)/12`


    答案是：**579** 包。


    您可能会说 **CEILING** 类似于 **ROUND** 或 **ROUNDUP**，但这只说对了一部分。**ROUND** 函数会遵循数学规则对小数进行四舍五入，而
    **CEILING** 则始终向上舍入。**ROUNDUP** 函数的行为更接近 **CEILING**，但它需要多输入一些内容；例如，您必须为结果指定小数位数。


    **CEILING** 的第三个参数 **mode**（模式）用于指定负数的舍入规则。当您省略此参数时，数值会向上舍入到给定负数的最近倍数。例如：


    `=CEILING(-13; -2)`


    返回 **–12**，它大于 **–13**，除非您添加 **1** 作为**向下舍入模式**，如下所示：


    `=CEILING(-13; -2; 1)`


    这将返回 **–14**。


    您不能混合使用负数和正数。例如：**CEILING(-13;2)** 是不允许的。


    另请参阅 **EVEN**、**FLOOR**、**INT**、**ODD**、**ROUND**、**ROUNDDOWN**、**ROUNDUP** 和
    **TRUNC** 函数的相关章节。


    ### 最接近的偶数整数（EVEN）


    #### 语法：EVEN(数值)


    当您希望结果以偶数整数形式呈现时，**EVEN** 函数非常有用。它将给定的**数值**向上舍入到最接近的偶数整数，这正是您在计算“袜子双数”或“手套双数”等数量时所需要的。例如，如果您的电子表格显示需要卖出
    **12,467.349888** 只袜子才能还清债务，请使用以下公式将这个冰冷的数字转换成人类可以理解的形式：


    `=EVEN(12,467.349888)/2`


    结果将是 **6234** 双袜子，这是呈现此类数量更实用、更自然的方式。当然，您不必将实际数字直接放入该函数；引用存储待舍入数值的其他单元格同样有用，就像在
    **EVEN** 函数内部嵌套另一个函数一样。


    ![images](img/0602.jpg)


    ***图 6-2.** **EVEN** 函数的示例结果*


    另请参阅 **CEILING**、**INT**、**FLOOR**、**ODD**、**ROUND**、**ROUNDDOWN** 和 **ROUNDUP**
    函数的相关章节。


    ### 小于或等于 X 的最小倍数（FLOOR）


    #### 语法：FLOOR(数值; 基数; 模式)


    **FLOOR** 函数将给定的**数值**向下舍入到最接近的**基数**的倍数。它类似于 **CEILING**，但不是“填充”给定的数字，而是“从顶部削去一点”。例如，在
    **CEILING** 函数的相关章节中，您了解了在已知 U 盘总数且箱子按打出售的情况下，计算需要多少个箱子来装 **18** 个 U 盘。您还记得，有一个箱子里的驱动器会少于
    18 个。您可以使用 **FLOOR** 函数来找出，如果您希望每个箱子恰好装 18 个驱动器，并将剩余部分保持未装箱状态，您需要购买多少个箱子。以下是您需要的公式：


    `=FLOOR(125,000; 18)/18`


    答案是 6944。


    ![images](img/0603.jpg)


    ***图 6-3.** **FLOOR** 函数的示例结果*


    负值会向下舍入到给定负数的最近倍数。例如：


    `=FLOOR(-13; -2)`


    返回 **–14**，除非您添加 **1** 作为**向上舍入模式**，如下所示：


    `=FLOOR(-13; -2; 1)`


    这将返回 **–12**。


    您不能混合使用负数和正数。例如，**FLOOR(-13;2)** 是不允许的。


    另请参阅 **CEILING**、**EVEN**、**INT**、**ODD**、**ROUND**、**ROUNDDOWN**、**ROUNDUP**
    和 **TRUNC** 函数的相关章节。


    ### 最接近的整数（INT）


    #### 语法：INT(数值)


    **INT** 函数将给定的**数值**向下舍入到最接近的整数。例如：


    `=INT(12.3)`


    返回 **12**。


    ![images](img/0604.jpg)


    ***图 6-4.** **INT** 函数的示例结果*


    另请参阅 **CEILING**、**EVEN**、**FLOOR**、**ODD**、**ROUND**、**ROUNDDOWN** 和 **ROUNDUP**
    函数的相关章节。


    ### 最接近的奇数整数（ODD）


    #### 语法：ODD(数值)


    如果您希望结果向上舍入到最接近的奇数整数，请使用此函数。例如：


    `=ODD(12.3)`


    返回 **13**。


    ![images](img/0605.jpg)


    ***图 6-5.** **ODD** 函数的示例结果*


    另请参阅 **CEILING**、**EVEN**、**INT**、**FLOOR**、**ROUND**、**ROUNDDOWN** 和 **ROUNDUP**
    函数的相关章节。


    ### 随机数（RAND）


    #### 语法：RAND()


    **RAND** 函数返回一个介于 **0** 和 **1** 之间的随机小数。为了使其更有用，您可以将其乘以 **10**，然后使用 **TRUNC**
    将结果转换为 **0** 到 **10** 之间的整数。示例如下：


    `=TRUNC(RAND()*10)`


    在前面的示例中，将 **RAND** 乘以 **100** 会返回 **0** 到 **100** 之间的数字。


    ![images](img/0606.jpg)


    ***图 6-6.** **RAND** 函数的示例结果*


    如果您想要不同范围内的随机数，例如 **1970** 到 **2010**，请使用以下技巧：


    `=TRUNC(RAND()*40)+1970`


    另请参阅 **TRUNC** 函数的相关章节。


    ### 数字舍入（ROUND）


    #### 语法：ROUND(x; y)


    **ROUND** 函数将 **x** 舍入到 **y** 位小数，如下所示：


    `=ROUND(1.2533; 1)`


    这将返回参数舍入到一位小数的结果，即 **1.3**。


    ![images](img/0607.jpg)


    ***图 6-7.** **ROUND** 函数的示例结果*


    将小数位数指定为 **0** 会将数字舍入为整数。


    另请参阅 **CEILING**、**EVEN**、**FLOOR**、**INT**、**ODD** 和 **TRUNC** 函数的相关章节。


    ### 向下舍入数字（ROUNDDOWN）


    #### 语法：ROUNDDOWN(x; y)


    **ROUNDDOWN** 函数的功能正如您所期望的那样；它将第一个参数向下舍入到指定的小数位数，如下所示：


    `=ROUNDDOWN(1.2533; 1)`


    返回 **1.2**。


    ![images](img/0608.jpg)


    ***图 6-8.** **ROUNDDOWN** 函数的示例结果*


    将小数位数指定为 **0** 会将数字舍入为整数。


    另请参阅 **CEILING**、**EVEN**、**FLOOR**、**INT**、**ODD** 和 **TRUNC** 函数的相关章节。

