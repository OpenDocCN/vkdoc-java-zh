    \ function, [81](#Chapter10.html#page_81)–[82](#Chapter10.html#page_82)"
  raw: '### Making Decisions (IF)


    #### Syntax: IF(Test; True; False)


    The most important of all conditional functions used in OpenOffice.org Calc is
    **IF**. It takes three arguments:


    *   **Test**: the condition you want to test for.

    *   **True**: what **IF** returns when **test** returns **TRUE**.

    *   **False**: what **IF** returns when **test** returns **FALSE**.


    In the case of the tax rates mentioned on the previous page, you need to build
    a nested formula that uses more than one **IF** function. Let’s do it one step
    at a time.


    The first condition is for the **$5,000** exemption. Put the taxable income into
    cell **A2** and the tax-free allowance into cell **B2**. The formula will look
    like the following one and in [Figure 13-1](#Chapter13.html#fig_13_1). You can
    put it anywhere, but for the purpose of this exercise it will be cell **A5**:


    `=IF(A2 > B2; "Add another IF here"; 0)` ![images](images/1301.jpg)


    ***Figure 13-1.** Testing for the tax-free allowance*


    The text that appears in cell **A5** after you enter a number greater than the
    tax-free allowance stored in cell **B2** needs to be replaced with another test
    implemented as a nested **IF** function. In this case, you drop the **=** sign
    from the front of the nested function. You will now add the first taxable income
    tier and rate and implement it in the following way:


    `=IF(A2 > B2;`

    `        IF(A2 <= C2; (A2-B2)*D2; "Second tier");`

    `        0)` ![images](images/1302.jpg)


    ***Figure 13-2.** Testing for the first tax tier*


    Because you cannot use multiline formulas in OpenOffice.org Calc, you need to
    enter the new formula into cell **A5** in the following way:


    `=IF(A2 > B2; IF(A2 <= C2; (A2-B2)*D2; "Second tier"); 0)`


    As you can see, there is a placeholder (second tier) for the values of taxable
    income greater than the value stored in cell **C2** (first tier) and the placeholder
    will be replaced with another formula for taxable income greater than $20,000:


    `=IF(A2 > B2;`

    `        IF(A2 <= C2;`

    `                (A2-B2)*D2;`

    `                (C2-B2)*D2+(A2-C2)*F2);`

    `        0)`


    That formula has to be typed as a single line of text into cell **A5**:


    `=IF(A2 > B2; IF(A2 <= C2; (A2-B2)*D2; (C2-B2)*D2+(A2-C2)*F2); 0)` ![images](images/1303.jpg)


    ***Figure 13-3.** Testing for the second tax tier*


    As you can see in [Figure 13-3](#Chapter13.html#fig_13_3), there is another cell
    (**E2**) not in use. It is there in case you need to add another tax tier.


    Please note that the example given in this section is not based on any particular
    tax code. Check your local tax code for guidance on tax rates, tax tiers, and
    ways of computing taxes.


    ### Relational Operators


    Relational operators are used inside the **IF** function to compare two values.
    They represent six basic tests that can be employed to construct a conditional
    formula.


    The following examples show formulas that display the first text string if a condition
    is met or the second string if the condition is not met.


    *   **Equal**: **=**—**A1** and **A2** are equal: `=IF(A1=A2; "A1 is equal to
    A2"; "A1 and A2 not equal")`

    *   **Less than**: **<**—**A1** is less than **A2**: `=IF(A1<A2; "A1 is less than
    A2"; "A1 is not less than A2")`

    *   **Greater than**: **>**—**A1** is greater than **A2**: `=IF(A1>A2; "A1 is
    greater than A2"; "A1 is not greater than A2")`

    *   **Less than or equal to**: **<=**—**A1** is less than or equal to **A2**:
    `=IF(A1<=A2; "A1 is less than or equal to A2"; "A1 is not less than or equal to
    A2")`

    *   **Greater than or equal to**: **>=**—**A1** is greater than or equal to **A2**:
    `=IF(A1>=A2; "A1 is greater than or equal to A2"; "A1 is not greater than or equal
    to A2")`

    *   **Different from**: **<>**—**A1** is not equal to **A2**: `=IF(A1<>A2; "A1
    is different than A2"; "A1 is not different than A2")`


    ### Logical Functions


    Logical functions can be used to build long and complex conditional formulas where
    more than one test is required.


    ### AND


    #### Syntax: AND(Cond_1; Cond_2; … Cond_30)


    This function is used to compare results of up to 30 (thirty) conditions. The
    value of **AND** is **TRUE** if all of the conditions tested are **TRUE** as well.
    For example, the following formula is **TRUE** only if **A1** is equal to **A2**
    and **A3**, otherwise, it is **FALSE**:


    `=AND(A1=A2; A2=A3)` ![images](images/1304.jpg)


    ***Figure 13-4.** Sample results of the **AND** function*


    ### FALSE


    #### Syntax: FALSE()


    This function returns the logical value of **FALSE**.


    See also the section on the **TRUE** function.


    ### NOT


    #### Syntax: NOT(Logic_Value)


    **NOT** negates logical values, so **FALSE** becomes **TRUE** and **TRUE** becomes
    **FALSE**, as in these examples:


    `=NOT(1<>1)`


    returns **TRUE**, and


    `=NOT(1=1)`


    returns **FALSE**.


    ![images](images/1305.jpg)


    ***Figure 13-5.** Sample results of the **NOT** function*


    ### OR


    #### Syntax: OR(Cond_1; Cond_2; … Cond_30)


    The **OR** function is used to compare results of up to 30 (thirty) conditions.
    The value of **OR** is **TRUE** if at least one of the conditions tested is **TRUE**.
    For example, the following formula


    `=OR(A1=A2; A2=A3)`


    is **TRUE** if **A1** is equal to **A2**, if **A2** is equal to **A3**, or if
    **A1** is equal to **A2** and **A3**. If **A1** is not equal to **A2**, and **A2**
    is not equal to **A3**, the formula is **FALSE**.


    ![images](images/1306.jpg)


    ***Figure 13-6.** Sample results of the **OR** function*


    ### TRUE


    #### Syntax: TRUE()


    The **TRUE** function returns logical value of **TRUE**.


    See also the section on the **FALSE** function.


