- fmt: '### Rounding Numbers Up (ROUNDUP)


    #### Syntax: `ROUNDUP(x; y)`


    The `ROUNDUP` function, just as you''d expect, rounds numeric values up to the
    specified number of decimal places, as in


    ```

    =ROUNDUP(7.111; 1)

    ```


    which returns `7.2`.


    Using `0` as the number of decimal places rounds numbers to whole integers.


    ![images](images/0609.jpg)


    ***Figure 6-9.** Sample result of the `ROUNDUP` function*


    See also the sections on the `CEILING`, `EVEN`, `FLOOR`, `INT`, `ODD`, and `TRUNC`
    functions.


    ### Truncate (TRUNC)


    #### Syntax: `TRUNC(x; y)`


    The `TRUNC` function is different from other rounding functions. It does not round
    number `x`, but chops off its fractional part, leaving `y` digits after the decimal
    point (if the second argument is omitted, `TRUNC` chops off the whole fractional
    part of a number turning it into an integer). For example:


    ```

    =TRUNC(12.5)

    ```


    returns `12`. The subtle difference between `TRUNC` and `INT` is best explained
    when you use the same negative number as an argument for these functions; for
    example:


    ```

    =TRUNC(-15.72)

    ```


    returns `–15`, while


    ```

    =INT(-15.72)

    ```


    returns `–16`.


    In this example `TRUNC` is used with a second argument and


    ```

    =TRUNC(16.2371; 2)

    ```


    returns `16.23`.


    ![images](images/0610.jpg)


    ***Figure 6-10.** Sample results of the `TRUNC` function*


    See also the sections on the `CEILING`, `EVEN`, `FLOOR`, `INT`, `ODD`, `ROUND`,
    `ROUNDDOWN`, and `ROUNDUP` functions.


    For more mathematical functions click the `Function Wizard` button and choose
    `Mathematical` or `Matrix` from the `Categories` list.


    ## C H A P T E R 7


    ## Useful Statistical Functions


    Statistical functions operate on a series or ranges of values. The examples in
    this chapter are simplified, but adequate for most purposes.


    ### Average (AVERAGE)


    #### Syntax: `AVERAGE(x1; x2; … x30)`


    The `AVERAGE` function returns the average of up to `30` given arguments separated
    with the semicolon sign (`;`). Each such argument may be a range of cells. For
    example:


    ```

    =AVERAGE(12.55; 10.93; 11.78; 12.00; 11.54; 12.67; 23.56; 45.21; 0.67)

    ```


    returns `15.66`.


    ![images](images/0701.jpg)


    ***Figure 7-1.** Sample result of the `AVERAGE` function*


    ### Geometric Mean (GEOMEAN)


    #### Syntax: `GEOMEAN(x1; x2; … x30)`


    The `GEOMEAN` function returns the geometric mean of up to `30` given arguments
    separated with the semicolon sign (`;`). Each such argument may be a range of
    cells. For example:


    ```

    =GEOMEAN(12.55; 10.93; 11.78; 12.00; 11.54; 12.67; 23.56; 45.21; 0.67)

    ```


    returns `10.81`.


    ![images](images/0702.jpg)


    ***Figure 7-2.** Sample result of the `GEOMEAN` function*


    ### Harmonic Mean (HARMEAN)


    #### Syntax: `HARMEAN(x1; x2; … x30)`


    The `HARMEAN` function returns the harmonic mean of up to `30` given arguments
    separated with the semicolon sign (`;`). Each such argument may be a range of
    cells. For example:


    ```

    =HARMEAN(12.55; 10.93; 11.78; 12.00; 11.54; 12.67; 23.56; 45.21; 0.67)

    ```


    returns `4.36`.


    ![images](images/0703.jpg)


    ***Figure 7-3.** Sample result of the `HARMEAN` function*


    ### Median (MEDIAN)


    #### Syntax: `MEDIAN(x1; x2; … x30)`


    The `MEDIAN` function returns the median of up to 30 given arguments separated
    with the semicolon sign (`;`). Each such argument may be a range of cells. For
    example, the following function


    ```

    =MEDIAN(12.55; 10.93; 11.78; 12.00; 11.54; 12.67; 23.56; 45.21; 0.67)

    ```


    returns `12`.


    If the number of arguments is even, then the mean of the two middle values is
    the median.


    ![images](images/0704.jpg)


    ***Figure 7-4.** Sample result of the `MEDIAN` function*


    ### Counting Cells (COUNT)


    #### Syntax: `COUNT(x1; x2; … x30)`


    The `COUNT` function accepts a maximum of `30` separate arguments (single values
    and ranges of cells) and returns the number of arguments that contain numeric
    values. For example:


    ```

    =COUNT("OpenOffice.org"; 7139; 12.99)

    ```


    returns `2`.


    ![images](images/0705.jpg)


    ***Figure 7-5.** Sample result of the `COUNT` function*


    ### Counting Cells (COUNTA)


    #### Syntax: `COUNTA(x1; x2; … x30)`


    The `COUNTA` function accepts a maximum of `30` separate arguments (single values
    and ranges of cells) and returns the number of arguments that contain any kind
    of values (empty cells are ignored). For example:


    ```

    =COUNTA("OpenOffice.org"; 7139; 12.99)

    ```


    returns `3`.


    ![images](images/0706.jpg)


    ***Figure 7-6.** Sample result of the `COUNTA` function*


    ### The Kth Largest Value (LARGE)


    #### Syntax: `LARGE(x; k)`


    The `LARGE` function returns the *k*th largest numeric value found in the given
    set of values `x`; for example, when given the set of values of `12.55`, `10.93`,
    and `11.78`, `LARGE` returns the following result:


    ```

    =LARGE(B128:D128; 3)

    ```


    returns `10.93`, which is the 3rd largest value in the given set.


    ![images](images/0707.jpg)


    ***Figure 7-7.** Sample result of the `LARGE` function*


    You can set the `k` argument to any integer value you like, but it must not be
    zero or larger than the number of elements in the given set of numbers.


    See also the sections on the `SMALL`, `MAX`, and `MIN` functions.


    ### The Kth Smallest Value (SMALL)


    #### Syntax: `SMALL(x; k)`


    The `SMALL` function returns the *k*th largest numeric value found in the given
    set of values `x`; for example, when given the set of values of `12.55`, `10.93`,
    and `11.78`, `SMALL` returns the following result:


    ```

    =SMALL(B133:D133; 3)

    ```


    returns `12.55`. which is the 3rd smallest value in the given set.


    ![images](images/0708.jpg)


    ***Figure 7-8.** Sample result of the `SMALL` function*


    You can set the `k` argument to any integer value you like, but it must not be
    zero or larger than the number of elements in the given set of numbers.


    See also the sections on the `LARGE`, `MAX`, and `MIN` functions.


    ### Maximum (MAX)


    #### Syntax: `MAX(x1; x2; … x30)`


    The `MAX` function can take up to `30` arguments, which can be ranges of cells,
    and returns the maximum value found in the given set. For example:


    ```

    =MAX(B138; C138; D138; B140; C140; D140, B142; C142; D142)

    ```


    results in `100`.


    ![images](images/0709.jpg)


    ***Figure 7-9.** Sample result of the `MAX` function*


    See also the sections on the `LARGE`, `MIN`, and `SMALL` functions.


    ### Minimum (MIN)


    #### Syntax: `MIN(x1; x2; … x30)`


    The `MAX` function can take up to `30` arguments, which can be ranges of cells,
    and returns the maximum value found in the given set. For example:


    ```

    =MIN(B145; C145; D145; B147; C147; D147, B149; C149; D149)

    ```


    returns `2`.


    ![images](images/0710.jpg)


    ***Figure 7-10.** Sample result of the `MIN` function*


    See also the sections on the `LARGE`, `MAX`, and `SMALL` functions.


    ### Mode Function (MODE)


    #### Syntax: `MODE(x1; x2; … x30)`


    The `MODE` function returns the most common value in a data set that can consist
    of up to 30 arguments, which can be single values or ranges of cells. You can
    provide up to `30` arguments.


    For example, if you give `MODE` the following set:


    ```

    MODE(67, 2, 100, 10, 2, 97, 32, 56, 99)

    ```


    `MODE` returns `2`.


    ![images](images/0711.jpg)


    ***Figure 7-11.** Sample result of the `MODE` function*


    See also the section on the `RANK` function.'
