- fmt: '### Net Present Value (NPV)


    #### Syntax: `NPV(Discount; Value1; Value2; … Value30)`


    The `NPV` function returns the Net Present Value of an investment. Consider the
    coffee shop example, discussed previously, in connection with the `IRR` function.


    To calculate the value of the investment after four years, you need to put into
    the `NPV` function the discount rate (such as inflation) and the cash flows for
    each year. Then, subtract the initial investment from the result of the `NPV`.


    Let''s assume that income flows are stored in cells `D233:D236` and the initial
    investment, a negative value, are stored in cell `B233`:


    ```

    =NPV(10%; D233:D236)+B233

    ```


    This returns `$64,563.55`.


    ![images](images/0810.jpg)


    ***Figure 8-10.** Sample result of the `NPV` function*


    The initial investment ought to be subtracted from the received income. We are
    adding it because it is a negative value according to OpenOffice.org Calc''s convention
    of marking money paid out as negative with the minus (`–`) sign and money received
    as positive (no minus sign).


    Now you know how hard your money is working. Another important case is accounting
    for loss. For example, if your little coffee shop made a loss of `$3,000` in the
    fifth year, and then a profit of `$20,000` in the sixth year, you''d need to account
    for that in the following way:


    ```

    =NPV(10%; D233:D236; -3,000; 20,000)+B233

    ```


    And the answer would be `$73,990.27`.


    Although it is possible to insert the initial investment into the `NPV` function
    as a negative value, you really shouldn''t do that. This is only valid in cases
    when we invest at the end of the first accounting period, hardly a typical case,
    because this assumes that our business venture is running for the first year without
    any money.


    ### Payment (PMT)


    #### Syntax: `PMT(Interest; Time; Loan; Future; Type)`


    Wondering how much you would have to pay monthly for your mortgage if you agreed
    to constant monthly repayments? The `PMT` function is the right tool to use. For
    this use:


    ```

    =PMT(7.5%/12; 25*12; 1,000,000)

    ```


    ![images](images/0811.jpg)


    ***Figure 8-11.** Sample result of the `PMT` function*


    In this case you assume that you borrow a cool `$1,000,000` (the `loan`) at a
    constant interest rate of `7.5%` and you would be paying it back over `25` years.
    If that''s the situation, your monthly rate would be `–$7,389.91`. The minus sign
    indicates that this is the money paid out of your pocket.


    The first argument is the annual `interest` rate that must be divided by `12`
    if you are making monthly payments, by `4` if payments are made every quarter,
    or by `2` if payments are made twice a year.


    The second argument, `time`, is the total number of payments to be made.


    The third argument is the present value of the `loan`.


    The last two arguments are the `future` balance after the last payment is made
    and the `type` of payments (`0` indicates that payments are made at the end of
    each accounting period, and `1` indicates that payments are made at the beginning
    of each accounting period).


    See also the sections on the `EFFECTIVE`, `IPMT`, `NOMINAL`, and `PPMT` functions.


    ### Capital (PPMT)


    #### Syntax: `PPMT(Interest; Period; Time; Loan; Future; Type)`


    The `PPMT` function returns the amount of original capital that you need to pay
    back in a given accounting period when you borrow money. For example, if you borrow
    `$1,000,000` (`loan`) at an interest rate of `7.25%` for `25` years and want to
    know how much capital you have to pay back within the first month, you can find
    that out with this formula:


    ```

    =PPMT(7.25%/12; 1; 25*12; 1,000,000)

    ```


    The answer is `–$1,186.40`.


    ![images](images/0812.jpg)


    ***Figure 8-12.** Sample result of the `PPMT` function*


    The `interest` argument is the interest rate at which money is borrowed.


    The `period` argument is the number of the chosen accounting period, and the `time`
    argument is the total number of accounting periods.


    The present value of a loan is given as the `loan` argument.


    The `future` argument is used to enter the amount of money remaining after the
    last payment is made. For loans, you usually enter `0` or don''t use this argument
    at all unless you want to use the `type` argument as well, which is equal to `1`
    when payments are made at the beginning of each accounting period or equal to
    `0` when payments are made at the end of each accounting period.


    This function is similar to `CUMPRINC` but calculates the amount of capital that
    needs to be paid in a single accounting period, and `CUMPRINC` calculates the
    amount of capital that needs to be paid in one or more accounting periods. See
    also the section on the `IPMT` function.


    This function was known as `IPMT` in StarOffice 5.0 (predecessor to OpenOffice.org).
    Make sure that the StarOffice Calc 5.0 documents imported into OpenOffice.org
    Calc contain correct functions.


    ### Present Value (PV)


    #### Syntax: `PV(Interest; Time; Installment; Future; Type)`


    The `PV` function presents the value of an investment. This function returns present
    value of a series of installments. For example, if you are saving `$100` each
    month for `25` years and the interest rate is going to be a constant `5%`, your
    future savings are now worth


    ```

    =PV(5%/12; 25*12; -100)

    ```


    which is `$17,106.00`.


    ![images](images/0813.jpg)


    ***Figure 8-13.** Sample result of the `PV` function*


    The `interest` argument is the annual interest rate (must be divided by `12` if
    payments are made monthly, or by `4` if payments are made quarterly); the `time`
    argument is the total number of payment periods.


    The `installment` is the amount of money paid at the beginning or the end of each
    accounting period.


    The `future` argument is used to enter the amount of money remaining after the
    last payment is made. For loans, you usually enter `0` or don''t use this argument
    at all unless you want to use the `type` argument as well, which is equal to `1`
    when payments are made at the beginning of each accounting period or equal to
    `0` when payments are made at the end of each accounting period.


    See also the section on the `FV` function.


    ### Annual Rate of Interest for Loans (RATE)


    #### Syntax: `RATE(Time; Installment; Investment; Future; Type)`


    Suppose you want to borrow `$1,000,000` and repay it in lump sums of `$100,000`
    over `25` years. What annual interest rate should the lender set? To find out
    the answer use


    ```

    =RATE(25; -100000; 1,000,000)

    ```


    You see that it would be at least `8.78%`.


    ![images](images/0814.jpg)


    ***Figure 8-14.** Sample result of the `RATE` function*


    Do not forget to add a minus sign (`–`) in front of the payment to indicate the
    money paid out.


    The `future` argument is used to enter the amount of money remaining after the
    last payment is made. For loans, you usually enter `0` or don''t use this argument
    at all unless you want to use the type argument as well, which is equal to `1`
    when payments are made at the beginning of each accounting period or equal to
    `0` when payments are made at the end of each accounting period.


    ### Annual Rate of Interest for Savings (RRI)


    #### Syntax: `RRI(Time; Value; Future)`


    What should the interest rate be if you want your investment of `$100,000` to
    turn into a nice, round `$1,000,000` over `25` years?


    ```

    =RRI(25; 100,000; 1,000,000)

    ```


    The answer is `9.65%`.


    ![images](images/0815.jpg)


    ***Figure 8-15.** Sample result of the `RRI` function*


    ### Asset Depreciation


    Use these functions to compute depreciation and amortization of assets.'
