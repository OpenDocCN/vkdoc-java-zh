  trans: "\n### 自动格式化工作表\n\n如果您希望避免手动设置单元格格式的繁琐操作，可以使用预定义的格式：\n\n1.  以某种大致有序的方式将数据输入到工作表中。\n\
    2.  选择“格式” ![images](img/U001.jpg) “自动套用格式”。\n3.  从左侧列表中选择您喜欢的格式（参见图 4-10）。\n\n\
    \    ![images](img/0410.jpg)\n\n    ***图 4-10.** 自动套用格式*\n\n4.  点击**确定**按钮。操作完成。\n\
    \n#### 向自动套用格式列表添加新设计\n\n您可以创建自己的工作表设计，并将其添加到**自动套用格式**对话框的格式列表中：\n\n1.  以某种大致有序的方式将数据输入到工作表中。\n\
    2.  选择已设置格式的区域。\n3.  选择“格式” ![images](img/U001.jpg) “自动套用格式”。\n4.  点击**自动套用格式**对话框中的**添加…**按钮。\n\
    5.  输入您的新格式名称。\n6.  点击**确定**按钮。这样就完成了！\n\n您的新格式大小必须至少为 4 行 4 列，才能被 OpenOffice.org\
    \ Calc 接受。\n\n## 第 5 章\n\n## 简单数学函数\n\n在本章中，您将学习常用的 OpenOffice.org Calc 数学函数。建议尝试本章中的示例，以了解\
    \ OpenOffice.org Calc 的工作方式。\n\n### 数字的绝对值 (ABS)\n\n#### 语法：ABS(n)\n\n**ABS**\
    \ 函数会移除负数中的负号 (**–**)，使其变为正数。它对 **0**（零）或正数不产生任何影响。\n\n![images](img/0501.jpg)\n\
    \n***图 5-1.** **ABS** 函数的示例结果*\n\n当您想进一步处理可能返回负结果的公式或函数的值时，**ABS** 函数非常有用。例如：\n\
    \n`=SQRT(PMT(7.5%/12; 25*12; 1,000,000))`\n\n会产生错误，因为 **PMT** 函数（参见“货币计算”）对应付款项返回的是负值。这在数学上是正确的，但可能会让一些人感到困惑。要将该结果改为正数，请使用：\n\
    \n`=SQRT(ABS(PMT(7.5%/12; 25*12; 1,000,000)))`\n\n顺便提一下，如果您想为每个结果都加上负号，请使用：\n\n\
    `=-SQRT(ABS(PMT(7.5%/12; 25*12; 1,000,000)))`\n\n![images](img/square.jpg) **请记住**\
    \ 当您开始在函数和公式中使用 **ABS** 时，您会以某种方式改变其结果，这可能会出乎依赖这些结果的其他函数和公式的预期。请务必三思此类修改带来的后果。\n\
    \n另请参见 **SIGN** 函数部分。\n\n### 指数函数 (EXP)\n\n#### 语法：EXP(Number)\n\nEXP 函数返回给定数字\
    \ *x* 的指数函数 *e^x* 的值，其中 *e* 约等于 **2.718281828**。例如：\n\n`=EXP(1)`\n\n返回 **2.72**（参见图\
    \ 5-2）。\n\n![images](img/0502.jpg)\n\n***图 5-2.** **EXP** 函数的示例结果*\n\n另请参见 **FACT**、**LN**、**LOG**、**LOG10**、**POWER**\
    \ 和 **SQRT** 函数部分。\n\n### 阶乘函数 (FACT)\n\n#### 语法：FACT(n)\n\n**FACT** 函数返回给定数字的阶乘值（从\
    \ **1** 到 **n** 的所有整数的乘积）。例如：\n\n`=FACT(3)`\n\n返回 **6** 或 **1 * 2 * 3**。\n\n![images](img/0503.jpg)\n\
    \n***图 5-3.** **FACT** 函数的示例结果*\n\n另请参见 **EXP** 函数部分。\n\n### 自然对数 (LN)\n\n####\
    \ 语法：LN(Number)\n\n**LN** 函数返回给定**数字**的自然对数值（以 *e* 为底的对数）。请注意，该数字必须为正数。例如：\n\n\
    `=LN(8)`\n\n返回 2.08 (log[e]8)。\n\n![images](img/0504.jpg)\n\n***图 5-4.** **LN**\
    \ 函数的示例结果*\n\n另请参见 **EXP**、**LOG**、**LOG10** 和 **POWER** 函数部分。\n\n### 对数 (LOG)\n\
    \n#### 语法：LOG(Number; Base)\n\n**LOG** 函数返回给定**数字**的用户自定义底数的对数值。请注意，该数字必须为正数。例如：\n\
    \n`=LOG(8; 4)`\n\n返回 **1.5** (log[8]4)。\n\n![images](img/0505.jpg)\n\n***图 5-5.**\
    \ **LOG** 函数的示例结果*\n\n另请参见 **EXP**、**LN**、**LOG10** 和 **POWER** 函数部分。\n\n### 以\
    \ 10 为底的对数 (LOG10)\n\n#### 语法：LOG10(Number)\n\n**LOG10** 函数返回给定**数字**的以 **10**\
    \ 为底的对数值。请注意，该数字必须为正数。例如：\n\n`=LOG10(8)`\n\n结果为 0.9 (log[10]8)。\n\n![images](img/0506.jpg)\n\
    \n***图 5-6.** **LOG10** 函数的示例结果*\n\n另请参见 **EXP**、**LN**、**LOG** 和 **POWER** 函数部分。\n\
    \n### 幂 (POWER)\n\n#### 语法：POWER(Number; Power)\n\n**POWER** 函数返回**数字**的给定**幂**次方。例如：\n\
    \n`=POWER(10; 2)`\n\n返回 **100**，即 **102**。它等同于以下写法：\n\n`=10²` ![images](img/0507.jpg)\n\
    \n***图 5-7.** **POWER** 函数的示例结果*\n\n另请参见 **EXP**、**FACT**、**LN**、**LOG**、**LOG10**\
    \ 和 **SQRT** 函数部分。\n\n### 多个参数的乘积 (PRODUCT)\n\n#### 语法：PRODUCT(ARG1; ARG2; … ARG30)\n\
    \n**PRODUCT** 函数将最多 30 个参数（**x1**、**x2**、… **x30**）相乘。每个参数可以是单个值或一个单元格区域。例如：\n\
    \n`=PRODUCT(A1:A23; B2:C23)`\n\n将区域 **A1:A23** 和 **B2:C23** 中所有单元格的值相乘。\n\n![images](img/0508.jpg)\n\
    \n***图 5-8.** **PRODUCT** 函数的示例结果*\n\n另请参见 **SUM** 函数部分。\n\n### 平方根 (SQRT)\n\n\
    #### 语法：SQRT(Number)\n\n**SQRT** 函数返回正**数字**的平方根。例如，要计算 **10** 的平方根，您可以输入：\n\n\
    `=SQRT(10)`\n\n答案当然是 **3.16**。\n\n![images](img/0509.jpg)\n\n***图 5-9.** **SQRT**\
    \ 函数的示例结果*\n\n当您需要计算负值的平方根时，请使用 **ABS** 函数移除负号（参见 **ABS** 函数的描述）。严格来说，这在数学上是不正确的，因为您无法计算负数的平方根，但在处理财务函数产生的结果时，这是完全可以接受的。如果您使用的方法明确禁止此技巧，则需要使用复数。\n\
    \n如果您需要遵循数学法则，OpenOffice.org Calc 确实提供了处理复数的函数。对复数的适当讨论超出了本书的范围，但任何一本像样的大学数学教科书都能帮助您理解它们。\n\
    \n另请参见 **POWER** 函数部分。\n\n### 多个参数的和 (SUM)\n\n#### 语法：SUM(x1; x2; … x30)\n\n**SUM**\
    \ 函数将最多 30 个参数 **x1**、**x2**、… **x30** 相加，每个参数可以是一个单元格区域。例如：\n\n`=SUM(M1:N23;\
    \ Z2:AA23)`\n\n将区域 **M1:N23** 和 **Z2:AA23** 中的所有单元格相加。\n\n![images](img/0510.jpg)\n\
    \n***图 5-10.** **SUM** 函数的示例结果*\n\n另请参见 **PRODUCT** 函数部分。\n\n### 多个参数的平方和 (SUMSQ)\n\
    \n#### 语法：SUMSQ(x1; x2; … x30)\n\n**SUMSQ** 函数将最多 30 个参数 **x1**、**x2**、… **x30**\
    \ 的平方相加，每个参数可以是一个单元格区域。例如：\n\n`=SUMSQ(M1:N23; Z2:AA23)`\n\n将区域 **M1:N23** 和 **Z2:AA23**\
    \ 中单元格内数值的平方相加。\n\n![images](img/0511.jpg)\n\n***图 5-11.** **SUMSQ** 函数的示例结果*\n\
    \n另请参见 **SUM** 函数部分。\n\n## 第 6 章\n\n## 实用数学函数\n\n在本章中，您将了解一些有用的函数，它们能帮助您解决许多与数字处理相关的实际问题。\n"
- fmt: '### Nearest Multiple Larger Than or Equal To X (CEILING)


    #### Syntax: `CEILING(Number; Significance; Mode)`


    The `CEILING` function rounds the given `number` up to the nearest multiple of
    `significance` equal to or greater than `number` itself. It is used in filtering
    noises out of a large number of values, spotting significant changes in values,
    detecting trend reversals, and similar tasks where it is easier to work with multiples
    of integers to get a better understanding of the sea of data you need to work
    with.


    ![images](images/0601.jpg)


    ***Figure 6-1.** Sample results of the `CEILING` function*


    The `CEILING` function is also a great tool for solving mundane problems such
    as ordering the right amount of boxes for shipping. For example, suppose you have
    **125,000** unsold USB drives that you want to get rid of using that old “buy-thirteen-get-five-free”
    technique. Why thirteen and five? Because the cheapest boxes you could find will
    hold a maximum of **18** drives and you want to sound original. Here''s how you
    use `CEILING`:


    ```

    =CEILING(125,000; 18)

    ```


    The result you will get is 125,010. This tells you how many USB sticks you would
    need to fill all boxes with exactly **18** USB drives, but you only have **125,000**
    USB drives. That''s OK. One of the boxes will have less than **18** USB drives.
    You will give a special discount on those or just give them away. But you still
    need to know how many boxes you need. Here''s how to get that number:


    ```

    =CEILING(125,000; 18)/18

    ```


    And the answer is **6945**.


    What if those boxes are sold one dozen per package? How many packages should you
    order?


    ```

    =CEILING(CEILING(125,000; 18)/18; 12)/12

    ```


    And here is the answer: **579** packages.


    You could say that `CEILING` is similar to `ROUND` or `ROUNDUP`, but that is only
    partially true. While the `ROUND` function will obey the math rules for rounding
    fractional numbers and round them up and down accordingly, `CEILING` always rounds
    up. The `ROUNDUP` function is closer in its behavior to `CEILING`, but it needs
    a little more typing; for example, you have to specify the number of decimal places
    for results.


    The third argument in `CEILING`, `mode`, is used to specify rounding rules for
    negative numbers. When you omit this argument, the number is rounded up to the
    nearest multiple of a given negative number. For example:


    ```

    =CEILING(-13; -2)

    ```


    returns **–12**, which is greater than **–13**, unless you add **1** as `mode`
    to round down, as in


    ```

    =CEILING(-13; -2; 1)

    ```


    which returns **–14**.


    You cannot mix negative and positive numbers. For example: `CEILING(-13;2)` is
    not allowed.


    See also the sections on the `EVEN`, `FLOOR`, `INT`, `ODD`, `ROUND`, `ROUNDDOWN`,
    `ROUNDUP`, and `TRUNC` functions.


    ### Nearest Even Integer (EVEN)


    #### Syntax: `EVEN(Number)`


    The `EVEN` function is useful when you want results to be presented as even integer
    numbers. It rounds the given `number` up to the nearest even integer, which is
    just what you need if you need to count quantities such as “pairs of socks” or
    “pairs of gloves.” For example, if your worksheet reports that you need to sell
    **12,467.349888** socks to pay off the money gods, use the following formula to
    turn that cold number into something a human can understand:


    ```

    =EVEN(12,467.349888)/2

    ```


    The result will be **6234** pairs of socks, which is a much more useful and natural
    way to present such quantities. Of course, you do not have to put the actual number
    into that function; a reference to another cell that stores the value to be rounded
    up is as useful, as is nesting another function inside the `EVEN` function.


    ![images](images/0602.jpg)


    ***Figure 6-2.** Sample result of the `EVEN` function*


    See also the sections on the `CEILING`, `INT`, `FLOOR`, `ODD`, `ROUND`, `ROUNDDOWN`,
    and `ROUNDUP` functions.


    ### Nearest Multiple Smaller Than or Equal To X (FLOOR)


    #### Syntax: `FLOOR(Number; Significance; Mode)`


    The `FLOOR` function rounds the given `number` down to the nearest multiple of
    `significance`. It is similar to `CEILING`, but instead of “padding” the given
    numbers, it will “shave a little off their top.” For example, in the section on
    the `CEILING` functions you read about looking for the number of boxes needed
    to pack **18** USB drives given the total number of those drives and the fact
    that the boxes are sold in dozens. As you recall, one box will have less than
    18 drives in it. You can use the `FLOOR` function to find out how many boxes you
    would need to buy if you wanted to have exactly 18 drives in each and keep the
    remainder unboxed. Here''s the formula you need:


    ```

    =FLOOR(125,000; 18)/18

    ```


    And the answer is 6944.


    ![images](images/0603.jpg)


    ***Figure 6-3.** Sample results of the `FLOOR` function*


    Negative values are rounded down to the nearest multiple of a given negative number.
    For example:


    ```

    =FLOOR(-13; -2)

    ```


    returns **–14**, unless you add **1** as `mode` to round up, as in


    ```

    =FLOOR(-13; -2; 1)

    ```


    which returns **–12**.


    You cannot mix negative and positive numbers. For example, `FLOOR(-13;2)` is not
    allowed.


    See also the sections on the `CEILING`, `EVEN`, `INT`, `ODD`, `ROUND`, `ROUNDDOWN`,
    `ROUNDUP`, and `TRUNC` functions.


    ### Nearest Integer (INT)


    #### Syntax: `INT(Number)`


    The `INT` function rounds the given `number` down to the nearest integer. For
    example:


    ```

    =INT(12.3)

    ```


    returns **12**.


    ![images](images/0604.jpg)


    ***Figure 6-4.** Sample result of the `INT` function*


    See also the sections on the `CEILING`, `EVEN`, `FLOOR`, `ODD`, `ROUND`, `ROUNDDOWN`,
    and `ROUNDUP` functions.


    ### Nearest Odd Integer (ODD)


    #### Syntax: `ODD(Number)`


    This is the function to use if you want results to be rounded up to the nearest
    odd integer. For example:


    ```

    =ODD(12.3)

    ```


    returns **13**.


    ![images](images/0605.jpg)


    ***Figure 6-5.** Sample result of the `ODD` function*


    See also the sections on the `CEILING`, `EVEN`, `INT`, `FLOOR`, `ROUND`, `ROUNDDOWN`,
    and `ROUNDUP` functions.


    ### Random Number (RAND)


    #### Syntax: `RAND()`


    The `RAND` function returns a random fractional number between **0** and **1**.
    To make it a bit more useful, you can multiply it by **10** and use `TRUNC` to
    turn the results into integers from **0** to **10**. Here''s an example:


    ```

    =TRUNC(RAND()*10)

    ```


    Multiplying `RAND` by **100** in the preceding example returns numbers from **0**
    to **100**.


    ![images](images/0606.jpg)


    ***Figure 6-6.** Sample result of the `RAND` function*


    If you want random numbers from a different range, such as **1970** to **2010**,
    use the following trick:


    ```

    =TRUNC(RAND()*40)+1970

    ```


    See also the section on the `TRUNC` function.


    ### Rounding Numbers (ROUND)


    #### Syntax: `ROUND(x; y)`


    The `ROUND` function rounds `x` to `y` decimal places, as in


    ```

    =ROUND(1.2533; 1)

    ```


    which returns the argument rounded to one decimal place, or **1.3**.


    ![images](images/0607.jpg)


    ***Figure 6-7.** Sample result of the `ROUND` function*


    Using **0** as the number of decimal places rounds numbers to whole integers.


    See also the sections on the `CEILING`, `EVEN`, `FLOOR`, `INT`, `ODD`, and `TRUNC`
    functions.


    ### Rounding Numbers Down (ROUNDDOWN)


    #### Syntax: `ROUNDDOWN(x; y)`


    The `ROUNDDOWN` function does exactly what you''d expect; it rounds the first
    argument down to the specified number of decimal places, as in


    ```

    =ROUNDDOWN(1.2533; 1)

    ```


    which returns **1.2**.


    ![images](images/0608.jpg)


    ***Figure 6-8.** Sample result of the `ROUNDDOWN` function*


    Using **0** as the number of decimal places rounds numbers to whole integers.


    See also the sections on the `CEILING`, `EVEN`, `FLOOR`, `INT`, `ODD`, and `TRUNC`
    functions.'
