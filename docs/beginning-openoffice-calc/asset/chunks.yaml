    ## C H A P T E R 8


    ## Calculations with Money


    尽管OpenOffice.org Calc的数学和统计函数足够高级，可以构建您可能需要的任何财务函数，但您不必亲自构建。OpenOffice.org Calc内置了许多财务函数，例如投资回报率和未来值。本章将介绍这些函数。


    财务函数可以分为以下几组：


    *   投资计算

    *   资产折旧


    ### Investment Calculations


    投资计算函数用于计算利率、还款额以及偿还贷款所需的时间。它们也是比较各种投资盈利能力的良好工具。


    ### Cumulative Compounded Interest (CUMIPMT)


    #### Syntax: `CUMIPMT(Interest; Time; Capital; Start; End; Type)`


    `CUMIPMT`（累计复利）函数返回在借款期间内需要支付的本金或资本的利息金额。它定义为总付款期数（月、季度、年等）。


    ![images](images/0801.jpg)


    ***Figure 8-1.** Sample result of the `CUMIPMT` function*


    假设整个会计期间的利率保持不变。您可以使用`start`和`end`参数计算整个期间或部分期间需要偿还的利息金额。例如，如果您以`7.25%`的固定利率借款`$1,000,000`，期限为`25`年，并想知道第一年第一季度需要支付多少利息（假设每月月初付款），则需要使用以下函数：


    `=CUMIPMT(7.25%/12; 25*12; 1,000,000; 1; 3; 0)`


    结果为`–$18,103.45`。


    必须将利率除以月数（或等效付款期数），并将年数乘以月数，以确保计算正确。对于季度付款，函数如下所示：


    `=CUMIPMT(7.25%/4; 25*4; 1,000,000; 1; 1; 0)`


    第四个和第五个参数（`start`和`end`）指示计算复利金额的起始和结束付款期。


    在第一个示例中，它是第一年的第一个月和第三个月；在第二个示例中，它是第一年的第一季度。第二年的第一个月用`13`表示，第二年的第一季度用`5`表示。


    最后一个参数`type`用于告知OpenOffice.org Calc付款时间。当在每个会计期间开始时付款时，使用`1`；当在每个会计期间结束时付款时，使用`0`。


    一个普遍接受的规则是，当参数和结果表示需要支付给别人的款项时，我们用减号（`–`）标记它们；当收到款项时，则不使用减号。OpenOffice.org Calc的函数会自动为结果执行此操作，但不会为参数执行此操作（但是，如果您在不应该放置减号的地方放置了减号，OpenOffice.org
    Calc会返回错误）。


    另请参阅`CUMPRINC`函数的说明，该函数计算在给定时间段内偿还的复利本金金额。


    请始终记住在需要百分比值的函数中输入正确的百分比值。`10`（OpenOffice.org Calc将其解释为`1,000%`或一千个百分点）与`10%`之间存在巨大差异。


    ### Cumulative Principal Capital (CUMPRINC)


    #### Syntax: `CUMPRINC(Interest; Time; Capital; Start; End; Type)`


    与`CUMIPMT`函数互补，`CUMPRINC`返回在给定时间段内需要偿还的复利本金金额，该时间段定义为总付款期数（月、季度、年等）。假设整个会计期间的利率保持不变。


    ![images](images/0802.jpg)


    ***Figure 8-2.** Sample result of the `CUMPRINC` function*


    如果您想知道在指定时间范围内或由`start`和`end`参数指定的任何更短间隔内需要偿还多少借入本金，此函数非常有用。


    例如，如果您以`7.25%`的固定利率借款`$1,000,000`，期限为`25`年，并想知道第一年第一季度需要偿还多少本金（假设每月月初付款），则需要使用以下函数：


    `=CUMPRINC(7.25%/12; 25*12; 1,000,000; 1; 3; 0)`


    结果为`$3,580.75`。必须将利率除以月数（或等效付款期数），并将年数乘以月数，以确保计算正确。对于季度付款，函数如下所示：


    `=CUMPRINC(7.25%/4; 25*4; 1,000,000; 1; 1; 0)`


    该函数返回`–$3,605.44`，比上一个示例中的`–$3,580.75`多。


    第四个和第五个参数（`start`和`end`）指示计算复利本金金额的起始和结束付款期。


    在第一个示例中，它是第一年的第一个月和第三个月；在第二个示例中，它是第一年的第一季度。第二年的第一个月编号为`13`，第二年的第一季度编号为`5`。


    如果要在每个会计期间开始时付款，请使用`1`而不是`0`作为此函数的最后一个参数（`type`）。


    另请参阅`CUMIPMT`函数的说明，该函数计算在给定时间内需要偿还的本金利息金额。


    ### Time to Maturity (DURATION)


    #### Syntax: `DURATION(Interest; Investment; Future)`


    `DURATION`函数返回给定投资达到期望未来值所需的期数（如果使用年利率，则为年数），假设利率恒定。例如，如果您想知道将`$1,000`存入一个年利率为`3%`的银行账户，需要等待多少年才能使您的资金变成`$2,000`，请使用以下公式：


    `=DURATION(3%; 1000; 2000)`


    ![images](images/0803.jpg)


    ***Figure 8-3.** Sample result of the `DURATION` function*


    答案是漫长的`23.45`年。如果您希望答案以整数年显示（不含小数），请使用`ROUNDUP`函数，如下所示：


    `=ROUNDUP(DURATION(3%; 1000; 2000); 0)`'
