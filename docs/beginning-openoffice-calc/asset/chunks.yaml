    ### 余额递减法 (DB)


    #### 语法：DB(成本；残值；使用寿命；期间；月份)


    若需使用固定余额递减法计算资产折旧，可使用此函数。它能解答诸如“第 x 年的折旧额是多少”之类的问题，即使你在年中某时购买了该资产。例如，当你在五月初购买了一项价值
    **1,000,000 美元**、使用寿命为 **4** 年的资产时，你可以使用以下公式计算第 **2** 年的折旧额：


    `=DB(1,000,000; 100; 4; 2; 8)`


    结果为 **360,000.00 美元**。


    ![images](img/0816.jpg)


    ***图 8-16.** **DB** 函数的示例结果*


    第一个参数 **成本** 是你为资产支付的价格。


    第二个参数 **残值** 是在经过一定会计期间（**使用寿命**——按年折旧则输入年数，按月折旧则输入月数，依此类推）后出售资产所能获得的金额（在前述示例中为
    **100 美元**）。


    **期间** 参数是你试图计算折旧的会计期间，而 **月份** 参数是购买资产当年剩余的月数（即第一年，因此即使你在 12 月初购买了一项使用寿命为 **4**
    年的资产，你也应在 **使用寿命** 参数中输入 **4**，在 **月份** 参数中输入 **1**）。


    ### 双倍余额递减法 (DDB)


    #### 语法：DDB(成本；残值；使用寿命；期间；因子)


    此函数与 **DB** 类似，区别在于它使用双倍余额递减法，并允许你设置自己的折旧因子，默认值为 **2**。使用与 **DB** 函数部分类似的数据，我们得到以下结果：


    `=DDB(1,000,000; 100; 4; 2; 2)`


    结果为 **250,000.00 美元**，但如果你将因子改为 **3**，如：


    `=DDB(1,000,000; 100; 4; 2; 3)`


    结果则为 **187,500.00 美元**。


    ![images](img/0817.jpg)


    ***图 8-17.** **DDB** 函数的示例结果*


    第一个参数 **成本** 是你为资产支付的价格。


    第二个参数 **残值** 是在经过一定会计期间（**使用寿命**——按年折旧则输入年数，按月折旧则输入月数，依此类推）后出售资产所能获得的金额（在前述示例中为
    **100 美元**）。


    **期间** 参数是你试图计算折旧的会计期间。


    另请参阅 **VDB** 函数部分。


    ### 直线折旧法 (SLN)


    #### 语法：SLN(成本；残值；使用寿命)


    **SLN** 函数返回资产在其使用寿命内的直线折旧额。例如，如果你刚刚购买了一台全新的 Cray 超级计算机，价值 **1,000,000 美元**，并且你知道三年后它只值
    **1.00 美元**，那么


    `=SLN(1,000,000; 1; 3)`


    的结果为 **333,333.00 美元**，这笔金额你甚至可能可以注销！


    ![images](img/0818.jpg)


    ***图 8-18.** **SLN** 函数的示例结果*


    第一个参数 **成本** 是你为资产支付的价格。第二个参数 **残值** 是在经过一定会计期间（**使用寿命** 参数——按年折旧则输入年数，按月折旧则输入月数，依此类推）后出售资产所能获得的金额（在前述示例中为
    **1 美元**）。


    ### 年数总和法 (SYD)


    #### 语法：SYD(成本；残值；使用寿命；期间)


    此函数使用年数总和法计算资产折旧。例如：


    `=SLD(1,000,000; 100; 4; 2)`


    等于 **299,970.00 美元**。


    ![images](img/0819.jpg)


    ***图 8-19.** **SYD** 函数的示例结果*


    第一个参数 **成本** 是你为资产支付的价格。


    第二个参数 **残值** 是在经过一定会计期间（**使用寿命** 参数——按年折旧则输入年数，按月折旧则输入月数，依此类推）后出售资产所能获得的金额（在前述示例中为
    100 美元）。


    **期间** 参数是你试图计算折旧的会计期间。


    ### 双倍余额递减曲线法 (VDB)


    #### 语法：VDB(成本；残值；使用寿命；开始期间；结束期间；因子；不切换)


    此函数用于计算给定期间或部分期间内使用双倍余额递减曲线的资产折旧。此函数与 **DDB** 类似，并允许你设置自己的折旧因子（默认值为 **2**）。


    与 **DDB** 不同，**VDB** 允许你计算多个会计期间的折旧。使用与 **DDB** 函数部分类似的数据，我们得到以下结果：


    `=VDB(1,000,000; 100; 4; 2; 3; 1; 0)`


    等于 **249,966.67 美元**。


    ![images](img/0820.jpg)


    ***图 8-20.** **VDB** 函数的示例结果*


    第一个参数 **成本** 是你为资产支付的价格。


    第二个参数 **残值** 是在经过一定会计期间（**使用寿命** 参数——按年折旧则输入年数，按月折旧则输入月数，依此类推）后出售资产所能获得的金额（在前述示例中为
    **100 美元**）。


    **开始期间** 和 **结束期间** 参数用于指定计算中使用的第一个和最后一个会计期间。


    最后两个参数，**因子** 和 **不切换**，用于指定你自己的折旧因子，并告知 OpenOffice.org Calc 当折旧额大于计算出的数值时，是否自动切换到直线折旧法（**不切换**
    参数，默认值为 **0**）。


    另请参阅 **DDB** 函数部分。


    ## 第 9 章


    ## 格式化函数


    OpenOffice.org Calc 可以处理各种类型的数据，包括文本。本章介绍的函数用于格式化那些可能格式不符合你需求的文本。


    ### ARABIC


    #### 语法：ARABIC(文本)


    **ARABIC** 函数将包含罗马数字的文本字符串转换为阿拉伯数字。罗马数字的范围是 0 到 3999。如今在主流使用中很难找到它们，因为阿拉伯数字更具表现力。


    电视和电影行业使用罗马数字来隐藏所展示素材的年代。


    以下是使用 ARABIC 函数的示例：


    `=ARABIC(“MMXI”)`


    返回 **2011**。


    ![images](img/0901.jpg)


    ***图 9-1.** **ARABIC** 函数的示例结果*


    另请参阅 ROMAN 函数部分。


    ### 连接文本字符串（& 或 CONCATENATE）


    #### 语法：& 或 CONCATENATE(文本 1；文本 2；… 文本 30)


    **CONCATENATE** 函数可以连接最多 30 个文本字符串。**&** 运算符则没有限制。例如：


    `=”Bonnie”&”Clyde”`


    变为 **BonnieClyde**。


    如果你想添加空格，需要使用用引号 (`""`) 括起来的空格。例如：


    `="Bonnie"&" "&"Clyde"`


    返回 **Bonnie Clyde**。


    ![images](img/0902.jpg)


    ***图 9-2.** **CONCATENATE** 函数的示例结果*


    如果这些字符串分别存储在三个不同的单元格中，你也可以使用以下表示法：


    `=A1&A2&A3`


    或


    `=CONCATENATE(B311;C311;D311)`


    假设 **B311** 包含 **“Bonnie”**，**C311** 包含 **“ ”**，**D311** 包含 **“Clyde”**。


    ### CLEAN


    #### 语法：CLEAN(文本)


    此函数从 **文本** 字符串中删除不可打印字符。它对于清理数据库文件非常有用，尤其是那些从其他操作系统导入的文件。


    ![images](img/0903.jpg)


    ***图 9-3.** **CLEAN** 函数的示例结果*


    ### LOWER


    #### 语法：LOWER(文本)


    此函数将所有给定字符转换为小写。例如：


    `=LOWER("OpenOffice.org")`


    返回 **openoffice.org**。


    ![images](img/0904.jpg)


    ***图 9-4.** **LOWER** 函数的示例结果*


    另请参阅 **UPPER** 函数部分。

