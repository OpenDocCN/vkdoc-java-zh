  trans: "\n### 驾驭函数向导\n\n有一种比直接在表格中键入公式更好、更方便且更不易出错的方法。它被称为**函数向导**，既可以作为智能公式编辑器，也可以作为便捷的计算器。该向导如图\
    \ 3-1 所示。\n\n以下练习可帮助您掌握**函数向导**：\n\n1.  点击**电子表格**工具栏上的**函数向导**按钮（外观类似于字母 fx）。\n\
    2.  在**函数**选项卡的**类别**下拉列表中，选择一个公式类别，例如**财务**。您有以下类别可供选择：\n    *   **上次使用**：OpenOffice.org\
    \ Calc 会记住您最近使用过的函数，这样您就不必反复查找它们。\n    *   **全部**：OpenOffice.org Calc 中所有 300\
    \ 多个函数的完整列表。\n    *   **数据库**：对按行排列的数据进行操作的类数据库函数。您可以使用它们来编写公式，以类似于数据库的方式处理大量数据。\n\
    \    *   **日期与时间**：用于处理日期和时间值的函数。\n    *   **财务**：财务函数。\n    *   **信息**：提供有关公式结果附加信息的信息函数。\n\
    \    *   **逻辑**：基本逻辑函数。\n    *   **数学**：各种数学函数。\n    *   **数组**：数组/矩阵处理函数。\n \
    \   *   **统计**：统计函数。\n    *   **电子表格**：电子表格信息函数。\n    *   **文本**：文本处理函数。\n   \
    \ *   **加载项**：附加的统计/编程函数。\n3.  点击您想要的函数名称，例如 **EFFECTIVE**。该函数的简短描述会显示在右侧面板中。\n\
    4.  双击所选函数的名称。右侧面板会变为一个填空表单，其中包含每个参数的输入字段。\n5.  在相应的字段中输入函数参数。尝试在 **NOM** 字段中输入\
    \ **10%**，在 **P** 字段中输入 **12**。**函数向导**对话框右上角的**函数结果**框会显示该函数的值。在**公式**字段中，您会看到在您填写表单字段时\
    \ OpenOffice.org Calc 实际写入的公式。请参见图 3-2，了解您的公式应如何显示。\n\n    ![images](img/0302.jpg)\n\
    \n    ***图 3-2.** 填空表单使设计公式比手动操作要容易得多。*\n\n6.  点击**确定**。\n\n就这样。您现在已经创建了一个新公式，无需过多担心语法规则和括号匹配！\n\
    \n当函数的结果是一个矩阵时，**函数向导**对话框左下角的小型**数组**选项框会自动被勾选。除非您想特意阻止 OpenOffice.org Calc 将结果作为矩阵插入，否则您无需手动开启或关闭它。\n\
    \n### 构建复杂公式\n\n**函数向导**可用于构建一些非常复杂的公式。尝试以下练习，看看它的能力。我们将创建一个函数，该函数读取当前日期（年、月、日），将年份数加一，并返回该未来日期对应的星期几：\n\
    \n![images](img/0303.jpg)\n\n***图 3-3.** 当您想将另一个函数用作参数时，请将文本光标置于原始函数的括号内，然后从列表中选择新函数。*\n\
    \n1.  打开 OpenOffice.org Calc 的**函数向导**。\n2.  从**类别**列表中选择**日期与时间**。\n3.  在**函数**列表中双击\
    \ **WEEKDAY** 函数。右侧面板会变为一个填空表单，其中包含该函数的每个参数的输入字段。\n4.  将鼠标指针移到**公式**字段中显示的 **WEEKDAY**\
    \ 函数后的括号上并点击。确保文本光标位于括号内。\n5.  从左侧的**函数**列表中选择 **DATE** 函数并双击它。\n6.  将鼠标指针移到**公式**字段中显示的\
    \ **DATE** 函数后的括号上并点击。确保文本光标位于括号内。\n7.  从左侧的函数列表中选择 **YEAR** 函数并双击它。\n8.  将文本光标置于\
    \ **YEAR** 函数的括号内，然后选择 **TODAY** 函数，如图 3-3 所示。\n9.  将文本光标置于公式的 **YEAR(TODAY())**\
    \ 部分之后，并键入 **+1**。\n10. 将文本光标置于公式的 **(YEAR(TODAY())+1)** 部分之后，并键入分号（**;**）。您已经输入了一个相当复杂的函数的第一个参数。\n\
    11. 使用前面描述的技术，创建以下公式：`DATE((YEAR(TODAY())+1); MONTH(TODAY()); DAY(TODAY()))`\n\
    \n12. 整个公式应如下所示：`=WEEKDAY(DATE((YEAR(TODAY())+1); MONTH(TODAY()); DAY(TODAY())))`\n\
    \n13. 点击**确定**。就这样。您已经创建了一个非常复杂的公式，而且过程并不太难，对吧？\n\n如果您感到困惑，可以使用**函数向导**对话框中的**结构**选项卡，它会以可视化方式显示您正在创建的公式的结构（见图\
    \ 3-4）。如果存在严重错误，它会以列表上的红点形式显示出来。\n\n![images](img/0304.jpg)\n\n***图 3-4.** 当您迷失方向时，请直观地检查公式的结构。*\n\
    \n您可以使用**函数向导**进行计算，而无需将其输入到工作表中。只需编写公式并输入适当的值，但不要点击**确定**。整个公式的结果会显示在**公式**字段上方的**结果**框中。\n\
    \n## 第 4 章\n\n## 格式化\n\nOpenOffice.org Calc 提供高级的数据和文档格式化工具。您可以格式化工作表、单元格、日期、时间、数字、文本、图表以及许多其他对象。您可以更改字体、颜色、对齐方式、数字格式以及介于两者之间和之外的所有内容。可用的调整数量有时会令人不知所措，这就是为什么最常用的格式化操作位于主工具栏上的原因（见图\
    \ 4-1）。我们将在本章中介绍所有格式化工具，并教您如何使用每一种工具。\n\n![images](img/0401.jpg)\n\n***图 4-1.**\
    \ 单元格格式化工具*\n\n### 格式化文本\n\n在 OpenOffice.org Calc 工作表中格式化单元格和工作表，就像使用文字处理器美化您的简历一样简单。文档的布局可能有所不同，因为您将较小的信息片段存储在微小的单元格中，而不是将它们全部放在一个长空白页的段落中，但总体概念是相似的。\n\
    \n在格式化方面，电子表格和文字处理器之间的唯一主要区别在于对数字格式化的精细控制。\n\n#### 格式化工具栏\n\n最常用的格式化内容和文档工具可以在**格式化**工具栏上找到（见表\
    \ 4-1）。我们将在以下各节中详细讨论格式化。\n\n![images](img/t0401.jpg)\n"
- fmt: "#### Cell Content Alignment\n\nThe text you enter into a cell will be treated\
    \ as if it was handled by a word processor on a tiny page. That's OK, it's not\
    \ like you will be using `OpenOffice.org Calc` to write the next *War and Peace*.\n\
    \n`OpenOffice.org Calc` will align text to the left and numbers to the right by\
    \ default. You can change text alignment using four buttons: **Align Left**, **Align\
    \ Center Horizontally**, **Align Right**, **Justified** (see [Table 4-1](#Chapter04.html#tab_4_1)).\n\
    \nAlternatively, you can use the following handy keyboard shortcuts:\n\n* **Left\
    \ (`Ctrl+L`)**: align to the left.\n* **Center (`Ctrl+E`)**: center.\n* **Justify\
    \ (`Ctrl+J`)**: justify.\n* **Right (`Ctrl+R`)**: align to the right.\n\nContent\
    \ alignment tools will align all types of content, not just text and numbers.\n\
    \nIf you want to have even more alignment options, right click on the cell you\
    \ want to boss around or press `Ctrl+1` and click on the **Alignment** tab (see\
    \ [Figure 4-2](#Chapter04.html#fig_4_2)).\n\nThe tools on that tab duplicate most\
    \ of the **Formatting** toolbar's functionality, but add nine additional tools\
    \ that control text orientation, vertical alignment, wrapping, etc.\n\n![images](images/0402.jpg)\n\
    \n***Figure 4-2.** A rich set of content alignments tools can be found on the\
    \ Alignment tab **Format Cells** dialog.*\n\nHere are the additional cell content\
    \ adjustment options:\n\n* **Text alignment** (Horizontal): horizontal alignment:\
    \ left, right, center, justified, filled.\n* **Text alignment** (Indent): paragraph\
    \ indentation (activated when the horizontal alignment is set to left).\n* **Text\
    \ alignment** (Vertical): vertical alignment (top, middle, bottom).\n* **Text\
    \ orientation** (Degrees): the angle of rotation.\n* **Text orientation** (Reference\
    \ edge): the reference edge for rotation.\n* **Text orientation** (Vertically\
    \ stacked): text arranged vertically, but not rotated.\n* **Properties** (Wrap\
    \ text automatically): turn automatic text wrap on/off. When off, the contents\
    \ longer than the cell's width will not overflow the cell's edges.\n* **Properties**\
    \ (Hyphenation active): turn text hyphenation on/off.\n* **Properties** (Shrink\
    \ to fit cell size): activated when you use rotation.\n\n#### Text Styling\n\n\
    Once you sort out content alignment you may want to adjust the styling of text\
    \ and numbers. Just like content adjustment settings, the most popular styling\
    \ options have quick access buttons on the **Formatting** toolbar. These are:\
    \ **Font Name**, **Font Size**, **Bold**, **Italics**, and **Underline** (see\
    \ [Table 4-1](#Chapter04.html#tab_4_1)). They let you change fonts and font size\
    \ and switch between three common type styles.\n\nUsing beautiful, expensive fonts\
    \ can make your documents look professional no matter how bad the numbers presented,\
    \ but try to resist the temptation to do so if those documents are going to be\
    \ shared with others. The people you are going to share your files with are most\
    \ likely not going to have a copy of *066.FONT's Crazy David No 1*.\n\nAlways\
    \ use the standard `Arial`, `Verdana`, `Georgia`, and `Times` fonts for the best\
    \ choice for smooth portability as those fonts are available on Linux, Mac OS\
    \ X, and Microsoft Windows.\n\nIf you don't like clicking on buttons, here are\
    \ useful keyboard shortcuts:\n\n* **Bold (`Ctrl+B`)**: switch to **bold**.\n*\
    \ **Italics (`Ctrl+I`)**: switch to *italics*.\n* **Underline (`Ctrl+U`)**: switch\
    \ to underline.\n* **Remove all formatting (`Ctrl+M`)**.\n\nWhen you can't accomplish\
    \ the desired results using the tools found on the **Formatting** toolbar, use\
    \ the **Format Cells** dialog box (see [Figure 4-3](#Chapter04.html#fig_4_3)).\n\
    \n![images](images/0403.jpg)\n\n***Figure 4-3.** The Font formatting options available\
    \ in the **Format Cells** dialog*\n\nThe **Font** tab duplicates the text formatting\
    \ functionality found on the **Formatting** toolbar and wouldn't be of much interest\
    \ if it wasn't for the **Language** drop-down menu that lets you specify the language\
    \ the text stored inside the selected cells is written in.\n\nAlthough it is not\
    \ immediately obvious, the language setting affects the spelling procedures, which\
    \ is especially beneficial for the user speaking languages that have different\
    \ local “flavors,” such as U.K. English and U.S. English, as well as for those\
    \ who need to create multi-language documents.\n\nAnother use for the **Fonts**\
    \ tab is font preview, the box in the lower part of the **Format Cells** dialog.\n\
    \nTo dismiss the **Format Cells** dialog, press `Esc` or click on the **Cancel**\
    \ button.\n\n#### Numeric Formats\n\nInternally, `OpenOffice.org Calc` doesn't\
    \ make any distinction between different kinds of numbers. No matter what numeric\
    \ data you enter into your worksheet, if it looks like a number, it will be stored\
    \ as a number. How they appear to our eyes is decided using a set of rules called\
    \ numeric formats.\n\nQuick formatting of numbers can be done when you are entering\
    \ them or afterwards using the numeric formatting buttons on the **Formatting**\
    \ toolbar (see [Table 4-1](#Chapter04.html#tab_4_1)). But if you need more, there\
    \ is a list of formats available on the **Numbers** tab in the **Format Cells**\
    \ dialog box (choose Format ![images](images/U001.jpg) Cells or right-click the\
    \ selected cell or cells and choose **Format Cells** from the pop-up menu).\n\n\
    ![images](images/0404.jpg)\n\n***Figure 4-4.** How would you like your numbers?*\n\
    \n`OpenOffice.org Calc` offers literally dozens of predefined numeric formats\
    \ grouped into ten categories: **User-defined**, **Number**, **Percent**, **Currency**,\
    \ **Date**, **Time**, **Scientific**, **Fraction**, **Boolean Value**, and **Text**.\
    \ Simply choose the category that closely matches the kind of information you\
    \ want to enter into the sheet and click OK.\n\nIf you see a format that is almost,\
    \ but not quite, the one you like, choose it and modify in the **Options** section\
    \ of the **Format Cells** dialog box. Also, when you prepare documents in foreign\
    \ languages, it is possible to choose the language used for text in dates (names\
    \ of days, months) and time (AM, PM).\n\nThe display precision is controlled by\
    \ the **Decimal places** scroll box. Internally, the numbers are processed with\
    \ maximum possible precision.\n\nThe numeric formats are independent of the text\
    \ styles applied to them. Any cell can be assigned any combination of numeric\
    \ formats and text styles (font, alignment, etc.).\n\n![images](images/0405.jpg)\n\
    \n***Figure 4-5.** The Conditional Formatting dialog box*\n\n#### Creating Your\
    \ Own Numeric Formats\n\nNot enough numeric formats? Create your own! It is easy,\
    \ although by no means as intuitive as other activities in `OpenOffice.org Calc`.\n\
    \nThe best strategy is to start with the format that closely resembles the one\
    \ you are trying to create and then modify it in the **Format code** input box.\
    \ For example, you might like to create a format that displays money in green\
    \ (when greater than zero) or red (when less than zero). Here is how you go about\
    \ doing it:\n\n1. Place the spreadsheet cursor in the chosen cell.\n2. Choose\
    \ Format ![images](images/U001.jpg) Cells.\n3. In the **Format Cells** dialog\
    \ box, choose category **Currency**.\n4. Choose format **-$1,234.00**.\n5. Click\
    \ the format code at the bottom of the dialog box and add `[GREEN]` at the beginning.\n\
    6. Click the green check mark button to add your new style (it will be listed\
    \ in the **User-defined** category) and the yellow comment button to add comments,\
    \ which are then displayed under the **Format code** box in the **Numbers** tab.\
    \ When you look closely at the various formats' codes, you will notice that they\
    \ use some special commands (see [Figure 4-5](#Chapter04.html#fig_4_5)).\n\n \
    \   ![images](images/0406.jpg)\n\n    ***Figure 4-6.** Your first custom numeric\
    \ format*"
