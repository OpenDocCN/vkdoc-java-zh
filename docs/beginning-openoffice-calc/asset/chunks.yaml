- fmt: '### Effective Rate of Interest (`EFFECTIVE`)


    #### Syntax: `EFFECTIVE(Nominal; Periods)`


    The `EFFECTIVE` function returns the effective annual rate of interest for the
    nominal rate of interest and the number of payment periods (typically months if
    the nominal rate is an annual rate). So, if you want to check the effective rate
    of interest for a nominal rate of `10%`, assuming `12` monthly payments, use


    ```

    =EFFECTIVE(10%; 12)

    ```


    This returns `10.47%`.


    ![images](images/0804.jpg)


    ***Figure 8-4.** Sample result of the `EFFECTIVE` function*


    The opposite of this function is `NOMINAL`.


    ### Future Value (`FV`)


    #### Syntax: `FV(Interest; Time; Installment; Deposit; Type)`


    The `FV` function returns the future value of an initial lump `deposit` investment
    followed by the given number of regular, equal installments made over a length
    of `time`, assuming a constant rate of `interest`.


    ![images](images/0805.jpg)


    ***Figure 8-5.** Sample result of the `FV` function*


    The `time` argument specifies the total number of payments, and the `installment`
    argument is the amount of money paid each time.


    For example, if you want to know how much money you could save if you paid `$100`
    each month for `25` years into a savings account that pays a constant interest
    of `5%`, you could use the following formula:


    ```

    =FV(5%/12; 25*12; -100)

    ```


    The answer is `$59,550.97`. Not bad at all, but how much could you save if you
    paid `$1,200` annually? Let''s see:


    ```

    =FV(5%; 25; -1,200)

    ```


    returns `$57,272.52`.


    Clearly, it is more profitable to pay in smaller amounts but more frequently.


    Remember that the rate of `interest` ought to be followed by the percentage (`%`)
    sign and, for payments made more frequently than once per year, the rate of interest
    must be divided by the number of payments in a year. For monthly payments it means
    that the rate of interest is divided by `12`, for quarterly payments the rate
    of interest is divided by `4`, and so on.


    The `time` argument must be equal to the number of payments made. For example,
    for an investment in which contributions are made monthly for four years, you''d
    make time equal to `48` (`4*12`).


    In both of the previous calculations we assumed that you made deposits at the
    beginning of the accounting period. To calculate payments at the end of the accounting
    period, you need to use the fifth argument `type`, which can be set to `0` for
    payments made at the end of each accounting period. Use `1` for payments made
    at the beginning of each accounting period. If you use the fifth argument, you
    must also enter the fourth, `deposit`, as well, which is used to give the initial
    amount of savings.


    The `FV` function may be used for some more complex calculations. You might want
    to know, for example, how much your current savings, say `$10,000`, will be worth
    in `25` years if you boost it with monthly payments of `$100`. Here you go:


    ```

    =FV(5%/12; 25*12; -100; -10,000; 0)

    ```


    The answer is a healthy `$94,363.88` (payments made at the end of each accounting
    period) compared to an even nicer `$94,612.00` when payments are made at the beginning
    of each accounting period.


    It is necessary to divide the rate of interest, and multiply the number of years,
    by the number of months (or equivalent payment periods) to make sure that the
    calculations are correct. The rate of interest is always assumed to be the annual
    rate of interest. Therefore, if you need to compute monthly payments, you need
    to divide the rate by `12` and multiply the number of years by `12`. Similarly,
    if you were computing quarterly payments, you would divide the interest rate by
    4 and multiply the number of years by 4.


    See also the description of the `PV` function.


    ### Interest (`IPMT`)


    #### Syntax: `IPMT(Interest; Period; Time; Loan; Future; Type)`


    The `IPMT` function returns the amount of interest that you need to pay in a given
    accounting `period` when you borrow a certain amount of money (`loan`) for a specified
    length of time. For example, if you borrow `$1,000,000` at an interest rate of
    `7.25%` for `25` years and want to know how much interest you have to pay back
    within the first month, you can find that out with this formula:


    ```

    =IPMT(7.25%/12; 1; 25*12; 1,000,000)

    ```


    The answer is `–$6041.67`.


    ![images](images/0806.jpg)


    ***Figure 8-6.** Sample result of the `IPMT` function*


    The `period` argument specifies for which accounting period the interest is going
    to be calculated and the `time` argument is equal to the number of accounting
    periods. The `future` argument is used to enter the amount of money remaining
    after the last payment is made. For loans, you usually enter 0 or don''t use this
    argument at all unless you want to use the `type` argument as well. This is equal
    to 1 when payments are made at the beginning of each accounting period or equal
    to 0 when payments are made at the end of each accounting period.


    `IPMT` is similar to `CUMIPMT`, but it calculates interest payable in a single
    accounting period, whereas `CUMIPMT` calculates the compound interest for one
    or more accounting periods.


    See also the sections on the `PPMT` and `NPER` functions.


    ### Internal Rate of Return (`IRR`)


    #### Syntax: `IRR(Cash Flows; Guess)`


    The `IRR` function computes the internal rate of return for a given amount of
    initial investment and a series of cash flows. For example, if you invest `$25,000`
    in a coffee shop and want to know the internal rate of return for this investment
    (based on the fact that you received `$30,000`, `$40,000`, `$28,000`, and `$12,000`
    in return over four years), you should put `–$25,000` (the initial investment)
    into one cell and all of the income, without the minus sign, in cells below or
    to the right. If your values are in cells `B212:B216`, you can type the following
    formula:


    ```

    =IRR(B212:B216)

    ```


    The answer is `120.23%`.


    ![images](images/0807.jpg)


    ***Figure 8-7.** Sample result of the `IRR` function*


    Not bad for a coffee shop. The `guess` argument is used to specify an estimated
    value of the internal rate of return for the given series of cash flows.


    ### Nominal Rate of Interest (`NOMINAL`)


    #### Syntax: `NOMINAL(Effective; Periods)`


    The `NOMINAL` function returns the nominal rate of interest for a given effective
    rate of interest and the number of payments. So, if you want to check the nominal
    rate of interest for an effective rate of `10.47%` assuming 12 payment per year,
    use `=NOMINAL(10.47%; 12)`, which returns `10%`.


    ![images](images/0808.jpg)


    ***Figure 8-8.** Sample result of the `NOMINAL` function*


    The opposite of this function is `EFFECTIVE`.


    ### Time to Repay a Loan (`NPER`)


    #### Syntax: `NPER(Interest; Installment; Loan; Future; Type)`


    If you need an answer to a simple question such as “How many years should it take
    me to pay the money I borrowed, providing that I pay in equal chunks of money
    and the interest rate is constant?”, the `NPER` function is the right tool to
    use. Consider the following case: you borrow `$100,000` (`loan`) at an annual
    rate of interest equal to `7.5%`, and you want to pay back `$10,000` each year.
    To see how many years it would take you to do this, use this formula:


    ```

    =NPER(7.5%; -10,000; 100,000)

    ```


    which returns `19.17` years!


    ![images](images/0809.jpg)


    ***Figure 8-9.** Sample result of the `NPER` function*


    The `future` argument is used to enter the amount of money remaining after the
    last payment is made. For loans, you usually enter `0`. Don''t use this argument
    at all unless you want to use the `type` argument as well, which is equal to `1`
    when payments are made at the beginning of each accounting period or equal to
    `0` when payments are made at the end of each accounting period.


    See also the sections on the `IPMT` and `PPMT` functions.'
