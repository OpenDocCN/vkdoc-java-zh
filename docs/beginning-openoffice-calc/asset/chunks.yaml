  trans: "\n#### 单元格内容对齐\n\n您在单元格中输入的文字，其处理方式就像在微型页面上使用文字处理器一样。这没问题，毕竟您不会用 OpenOffice.org\
    \ Calc 来写下一部《战争与和平》。\n\n默认情况下，OpenOffice.org Calc 会将文字左对齐，数字右对齐。您可以使用四个按钮来更改文本对齐方式：**左对齐**、**水平居中**、**右对齐**、**两端对齐**（参见表\
    \ 4-1）。\n\n或者，您也可以使用以下便捷的键盘快捷键：\n\n*   **左对齐 (Ctrl+L)**：向左对齐。\n*   **居中 (Ctrl+E)**：居中对齐。\n\
    *   **两端对齐 (Ctrl+J)**：两端对齐。\n*   **右对齐 (Ctrl+R)**：向右对齐。\n\n内容对齐工具会对所有类型的内容进行对齐，而不仅仅是文字和数字。\n\
    \n如果您想要更多对齐选项，请右键单击您想要“掌控”的单元格，或按 **Ctrl+1**，然后点击 **对齐** 选项卡（参见图 4-2）。\n\n该选项卡上的工具复制了**格式**工具栏的大部分功能，但额外增加了九个用于控制文字方向、垂直对齐、自动换行等的工具。\n\
    \n![images](img/0402.jpg)\n\n***图 4-2.** 在 **格式单元格** 对话框的“对齐”选项卡中可以找到丰富的内容对齐工具。*\n\
    \n以下是额外的单元格内容调整选项：\n\n*   **文字对齐**（水平）：水平对齐方式：左、右、居中、两端对齐、填充。\n*   **文字对齐**（缩进）：段落缩进（当水平对齐设置为“左”时激活）。\n\
    *   **文字对齐**（垂直）：垂直对齐方式（顶部、居中、底部）。\n*   **文字方向**（度数）：旋转角度。\n*   **文字方向**（参考边）：旋转的参考边。\n\
    *   **文字方向**（垂直堆叠）：文字垂直排列，但不旋转。\n*   **属性**（自动换行）：开启/关闭自动换行。关闭时，超出单元格宽度的内容将不会溢出单元格边缘。\n\
    *   **属性**（启用连字符）：开启/关闭文字连字符功能。\n*   **属性**（缩小字体填充）：在使用旋转时激活。\n\n#### 文本样式\n\n\
    一旦您处理完内容对齐，可能还想调整文字和数字的样式。与内容调整设置一样，最常用的样式选项在**格式**工具栏上有快捷按钮。它们是：**字体名称**、**字号**、**加粗**、**斜体**和**下划线**（参见表\
    \ 4-1）。它们让您可以更改字体和字号，并在三种常见字形之间切换。\n\n使用漂亮、昂贵的字体可以让您的文档看起来专业，无论其中呈现的数字有多糟糕。但如果这些文档要与人共享，请尽量抵制这种诱惑。与您共享文件的人很可能没有安装\
    \ *066.FONT 的疯狂大卫一号* 字体。\n\n为了确保最佳的便携性，请始终使用标准的 Arial、Verdana、Georgia 和 Times\
    \ 字体，因为这些字体在 Linux、Mac OS X 和 Microsoft Windows 上均可使用。\n\n如果您不喜欢点击按钮，这里有一些有用的键盘快捷键：\n\
    \n*   **加粗 (Ctrl+B)**：切换为**加粗**。\n*   **斜体 (Ctrl+I)**：切换为*斜体*。\n*   **下划线 (Ctrl+U)**：切换为下划线。\n\
    *   **清除所有格式 (Ctrl+M)**。\n\n当您无法使用**格式**工具栏上的工具达到预期效果时，请使用**格式单元格**对话框（参见图 4-3）。\n\
    \n![images](img/0403.jpg)\n\n***图 4-3.** **格式单元格** 对话框中可用的字体格式选项*\n\n**字体**选项卡复制了**格式**工具栏上的文本格式功能，如果不是因为**语言**下拉菜单（它允许您指定所选单元格内文本的书写语言），它可能不会引起太大兴趣。\n\
    \n虽然这一点并不显而易见，但语言设置会影响拼写检查过程。这对于使用具有不同本地“风格”语言（如英式英语和美式英语）的用户，以及需要创建多语言文档的用户尤其有益。\n\
    \n**字体**选项卡的另一个用途是字体预览，即**格式单元格**对话框下部的方框。\n\n要关闭**格式单元格**对话框，请按 **Esc** 键或点击**取消**按钮。\n\
    \n#### 数字格式\n\n在内部，OpenOffice.org Calc 并不区分不同类型的数字。无论您在电子表格中输入什么数字数据，只要它看起来像数字，就会以数字形式存储。它们在我们眼中的显示方式由一组称为数字格式的规则决定。\n\
    \n您可以在输入数字时或之后，使用**格式**工具栏上的数字格式按钮（参见表 4-1）快速设置数字格式。但如果需要更多选项，**格式单元格**对话框的**数字**选项卡中提供了格式列表（选择“格式”![images](img/U001.jpg)“单元格”，或右键单击选中的单元格，然后从弹出菜单中选择“**格式单元格**”）。\n\
    \n![images](img/0404.jpg)\n\n***图 4-4.** 您希望数字如何显示？*\n\nOpenOffice.org Calc 提供了数十种预定义的数字格式，分为十个类别：**用户自定义**、**数字**、**百分比**、**货币**、**日期**、**时间**、**科学计数**、**分数**、**布尔值**和**文本**。只需选择与您要输入到工作表中的信息类型最匹配的类别，然后点击“确定”。\n\
    \n如果您看到一个格式与您想要的非常接近但又不完全一致，请选中它并在**格式单元格**对话框的**选项**部分进行修改。此外，当您准备外语文档时，可以选择日期（星期、月份名称）和时间（AM、PM）中文本所使用的语言。\n\
    \n显示精度由**小数位数**微调框控制。在内部，数字会以最大可能的精度进行处理。\n\n数字格式独立于应用于它们的文本样式。任何单元格都可以被分配数字格式和文本样式（字体、对齐方式等）的任意组合。\n\
    \n![images](img/0405.jpg)\n\n***图 4-5.** 条件格式对话框*\n\n#### 创建您自己的数字格式\n\n数字格式还不够用？那就创建您自己的！这很容易，尽管绝不像\
    \ OpenOffice.org Calc 中的其他操作那样直观。\n\n最佳策略是从一个与您想要创建的格式非常相似的格式开始，然后在**格式代码**输入框中修改它。例如，您可能想创建一个格式，当金额大于零时显示为绿色，小于零时显示为红色。操作方法如下：\n\
    \n1.  将电子表格光标置于选定的单元格中。\n2.  选择“格式”![images](img/U001.jpg)“单元格”。\n3.  在**格式单元格**对话框中，选择类别**货币**。\n\
    4.  选择格式 **-$1,234.00**。\n5.  点击对话框底部的格式代码，并在开头添加 **[GREEN]**。\n6.  点击绿色对勾按钮以添加您的新样式（它将列在**用户自定义**类别下），并点击黄色注释按钮以添加注释，注释随后会显示在**数字**选项卡的**格式代码**框下方。当您仔细查看各种格式的代码时，您会注意到它们使用了一些特殊命令（参见图\
    \ 4-5）。\n\n    ![images](img/0406.jpg)\n\n    ***图 4-6.** 您的第一个自定义数字格式*\n"
- fmt: '# Creating Conditional Formatting


    Conditional formatting is one of those brilliant ideas that make your work a little
    bit easier and more enjoyable. Conditional formatting is a great help if you want
    to test several choices. For example, if you are a salesperson or a manager, you
    might want to test several scenarios during negotiations.


    It is not always to your advantage to reveal exact numbers, and this is when conditional
    formatting can help. It changes the style of one or more cells according to the
    preset conditions, which remain unseen to other people. Having visual cues is
    a great thing during negotiations; you know it is OK to give the discount the
    client asks for when you see black or green, and you know that what the client
    is asking for impossible when you see red.


    Each cell can have up to three conditions, based on the value stored inside the
    cell, the value of a formula stored inside that cell, or the value of another
    cell that the current cell refers to.


    To set these conditions, choose Format `![images](images/U001.jpg)` Conditional
    Formatting and enter the numbers into the condition boxes, as shown in [Figure
    4-7](#Chapter04.html#fig_4_7). After you do that, choose a different style for
    each condition and click **OK**. Next, type several numbers that belong to the
    ranges you just defined into that cell and see them displayed in different styles.


    ![images](images/0407.jpg)


    ***Figure 4-7.** Setting up conditional formatting*


    The default cell styles are not very useful; therefore you need to create them,
    one at a time, and import them into the **Styles and Formatting** manager (press
    **F11**). After that, they are available in the **Conditional Formatting** dialog
    box.


    ![images](images/0408.jpg)


    ***Figure 4-8.** The **Styles and Formatting** manager*


    The easiest way to go about creating styles is just to follow the advice presented
    in the previous sections of this chapter and experiment until you are happy with
    how your data looks. Then, simply select the cell whose style you''d like to preserve,
    press `F11`, and click on the **New Style from Selection** button (it has a tiny
    green plus sign) and give it a name.


    Even more advanced conditional formatting can be achieved through the use of the
    OpenOffice.org Calc''s built-in functions, such as `STYLE`, which can change the
    style of a cell or a range of cells according to certain conditions set by the
    user.


    ## Formatting Cells


    Formatting cells (not the contents stored inside them) is done almost purely to
    emphasize certain facts presented on a sheet. From the designer''s point of view,
    a cell consists of the following elements:


    - **Background color**—This can be set with the **Background** button on the **Formatting**
    toolbar or by choosing Format `![images](images/U001.jpg)` Cell, clicking the
    **Background** tab in the **Format Cells** dialog box, and selecting the right
    color.

    - **Borders**—These have their own tab (**Borders**) in the **Format Cells** dialog
    box and can be set to any color from the available list. Also, you can add shadows
    when you want to make something really stand out of the crowd.


    ## Formatting Columns and Rows


    Formatting columns and rows is limited to changing their width or height, hiding
    or showing them, and automatically choosing their optimal width or height. All
    of these can be performed using the Format `![images](images/U001.jpg)` Column
    or Format `![images](images/U001.jpg)` Row submenu.


    You can also change width and height by placing the mouse pointer between the
    buttons with column (or row) numbers and dragging the boundary lines until they
    look the way you want them to.


    Even better, OpenOffice.org Calc can automatically adjust column width and row
    height. Just place the mouse pointer between the separator buttons and double-click.


    ## Formatting Worksheets


    Formatting a worksheet is the top-most level of document design. Here you create
    the final layout of your work on paper and can specify the size of paper used
    for printing, headers, footers, page numbers, and so on.


    You can''t design separate layouts for individual sheets, but that is not a big
    problem, because you can use separate worksheets if you need different layouts.


    The main page layout options are available in the **Page Style** dialog box shown
    in [Figure 4-9](#Chapter04.html#fig_4_9).


    ![images](images/0409.jpg)


    ***Figure 4-9.** The **Page Style** dialog box manages the final look of the printed
    pages.*


    Choose Format `![images](images/U001.jpg)` Page to display the **Page Style**
    dialog box. There are seven tabs in this dialog box:


    - **Organizer**—Enables you to choose one of the page styles available for this
    sheet.

    - **Page**—You can set **Margins** (useful when your printer seems to chop off
    parts of the printout), **Paper Format** (paper size, page orientation, and paper
    source), which you need to specify to make your printer use the right paper, if
    you have more than one source; otherwise use **Printer** settings, and **Orientation**,
    which should really be called **Alignment** of cells on paper—click the options
    and see the preview box to check the results.

    - **Borders**—Here you can set the borders for the page.

    - **Background**—Similar to formatting cells, you can set the page background
    color. It is advisable that you do not use any color for printing (**No fill**)
    even if you have a color printer, because it is very expensive to print pages
    with color background. Use it only if you are printing final versions of promotional
    materials.

    - **Header**—Here you can specify what, if anything, is to be printed at the top
    of each page. Also, headers can have their own borders and background; click **More**
    to edit these properties. If you want to edit the content of the header itself,
    click **Edit**. You can have separate headers for left and right pages, if you
    print on both sides of paper. To use them, deselect the **Same content left/right**
    option.

    - **Footer**—Everything that applies to headers also applies to footers.

    - **Sheet**: Default values on this sheet can be left alone, unless you want to
    print cell notes, grid, formulas, or column and row headers (**A … IV** and **1
    … 32,000**), which is not necessary in most cases. However, you might change the
    **Page order**, if the pages progress from left to right instead of top to bottom,
    and, if necessary, you can specify the maximum number of pages that may be used
    in printing and let OpenOffice.org Calc scale them down accordingly. Do not expect
    miracles, but you might be able to save one page for each 6 to 10 pages. It depends
    on the size of the sheet and the resolution of your printer (600 dpi is best).


    Sometimes OpenOffice.org Calc breaks pages in places where you would rather they
    were not broken. To remedy that, place the cursor in a cell where you want to
    insert a page break and choose Insert `![images](images/U001.jpg)` Manual Break
    `![images](images/U001.jpg)` Row Break or Insert `![images](images/U001.jpg)`
    Manual Break `![images](images/U001.jpg)` Column Break to insert the page break
    either above or to the left of the cell.


    Removing manual breaks is just as easy: choose Edit `![images](images/U001.jpg)`
    Remove Manual Break `![images](images/U001.jpg)` Row Break or Edit `![images](images/U001.jpg)`
    Remove Manual Break `![images](images/U001.jpg)` Column Break.'
