  trans: '

    ### 以实际单位计算两个日期之间的差值（天数）


    #### 语法：DAYS(t1; t2)


    **DAYS** 函数用于计算两个日期之间的天数。例如：


    `=DAYS("12/15/2010"; NOW())`


    在 2009 年 11 月 26 日凌晨 1:35 时，返回 **–383.93**。


    你可以用更自然的格式向 **DAYS** 提供日期：


    `=DAYS(DATE(2010; 12; 15); NOW())` ![images](img/1213.jpg)


    ***图 12-13.** **DAYS** 函数的示例结果*


    结果中出现负号，是因为 OpenOffice.org Calc 总是用 **t1** 减去 **t2**（**t1 – t2**）。


    请记住，你可以使用 **ABS** 函数去除负号，但需要注意此类快捷方式可能给计算引入错误：


    `=ABS(DAYS("12/15/2010"; NOW()))`


    当借款期限以天计算而非月或年时，**DAYS** 函数对于计算短期利息非常有用。


    务必记住，这些计算基于一个包含 **365** 或 **366** 天（闰年）的日历年。


    另请参阅 **DAYS360** 函数的说明。


    ### 以银行家单位计算两个日期之间的差值（DAYS360）


    #### 语法：DAYS360(t1; t2; Year_Type)


    **DAYS360** 函数用于计算两个以时间戳形式给出的日期之间的天数，采用银行家年制。例如：


    `=DAYS360(DATE(2010; 1; 15); DATE(2010; 6; 1); 0)`


    返回 **136**。


    你可以用更自然的格式向 **DAYS360** 提供日期：


    `=DAYS360("1/15/2010"; "6/1/2010"; 0)` ![images](img/1214.jpg)


    ***图 12-14.** **DAYS360** 函数的示例结果*


    银行家年制将一年分为 12 个月，每月 30 天，全年共 360 天。在银行开始使用计算机之前，这种制度曾被使用，有时至今仍在使用。它简化了手工计算，但对银行或借款人都不公平。


    **DAYS360** 函数中的最后一个数字应为 **0** 或 **1**，具体取决于你想使用欧洲（**1**）还是美国（**0**）的 360 天年制。


    如果你需要使用 **DAYS360** 函数，请务必确保选择了正确的制度。


    另请参阅 **DAYS** 函数的说明。


    ### 两个日期之间的月数（MONTHS）


    #### 语法：MONTHS(t1; t2)


    **MONTHS** 函数用于计算两个日期之间的月数，可以按月度间隔（**0**）或日历月（**1**）计算。例如：


    `=MONTHS(DATE(2010; 1; 15); DATE(2010; 2; 1); 0)`


    返回 **0**，因为这两个日期之间的差值不足一个整月的长度，而


    `=MONTHS(DATE(2010; 1; 15); DATE(2010; 2; 1); 1)`


    返回 **1**，因为按日历月计算，两者相差一个月（在二月份，我们会将 1 月 15 日视为上个月的日期）。


    ![images](img/1215.jpg)


    ***图 12-15.** **MONTHS** 函数的示例结果*


    你可以用更自然的格式向 **MONTHS** 提供日期：


    `=MONTHS("1/15/2010"; "2/1/2010"; 0)`


    ### 两个日期之间的周数（WEEKS）


    #### 语法：WEEKS(t1; t2; Week_Type)


    **WEEKS** 函数用于计算两个日期之间的周数，可以按周度间隔（**0**）或日历周（**1**）计算。例如：


    `=WEEKS(DATE(2010; 1; 15); DATE(2010; 2; 1); 0)`


    返回 **2**，因为这两个日期之间的差值不足三个整周的长度（**21** 天），而


    `=WEEKS(DATE(2010; 1; 15); DATE(2010; 2; 1); 1)`


    返回 **3**，因为按日历周计算，在二月份我们会认为 1 月 15 日是三个星期前。


    ![images](img/1216.jpg)


    ***图 12-16.** **WEEKS** 函数的示例结果*


    你可以用更自然的格式向 **WEEKS** 提供日期：


    `=WEEKS("1/15/2010"; "2/1/2010"; 0)`


    ### 两个日期之间的年数（YEARS）


    #### 语法：YEARS(t1; t2; Year_Type)


    **YEARS** 函数用于计算两个日期之间的年数，可以按年度间隔（**0**）或日历年（**1**）计算。例如：


    `=YEARS(DATE(2009; 12; 31); DATE(2010; 1; 1); 0)`


    返回 **0**，因为这两个日期之间的差值不足一整年的长度，而


    `=YEARS(DATE(2009; 12; 31); DATE(2010; 1; 1); 1)`


    返回 **1**，因为按日历年计算，这两个日期之间相差一年。


    ![images](img/1217.jpg)


    ***图 12-17.** **YEARS** 函数的示例结果*


    你可以用更自然的格式向 **YEARS** 提供日期：


    `=YEARS("12/31/2010"; "1/1/2010"; 0)`


    所有这些函数可能会或可能不会受到纪元设置的影响。如果你混合使用不同纪元的多个工作表中的日期，并直接在函数或公式中输入或引用时间戳（例如 **WEEKDAY(36526;
    1)**），它们就会受到影响。为防止这种情况，请使用 **DAY** 函数来提供正确的时间戳。


    ## 第 13 章


    ## 条件函数


    本书前面章节讨论的所有函数都以相当简单的方式工作。你向它们提供一些输入，它们处理这些输入并返回一个单一值。这很有用，但算不上“智能”。


    如果你希望工作表变得智能，就需要使用能够根据一组预定义条件做出决策的条件函数。


    纳税申报表是工作表需要具备智能的一个很好的例子。假设我们只想在工作表中使用两个单元格，一个用于输入应纳税金额，另一个用于显示应缴税额。使用以下虚构的所得税税率：


    *   免税额为 5,000 美元。

    *   超过 5,000 美元的部分按 20% 征税。

    *   超过 20,000 美元的部分按 30% 征税。


    要计算正确的税额，你需要一个能够根据应纳税所得额做出决策的公式。如果你要向别人解释，你会说：


    *   如果应纳税所得额为 5,000 美元或以下，则无需缴税。

    *   如果应纳税所得额大于 5,000 美元但不大于 20,000 美元，则从应纳税所得额中减去 5,000 美元。对剩余应纳税所得额应缴纳的所得税为 20%。

    *   如果应纳税所得额大于 20,000 美元，则从应纳税所得额中减去 20,000 美元。对剩余应纳税所得额应缴纳的所得税为 30% + 3,000 美元。


    如你所见，即使是这样一套简单的规则，也需要不少句子来解释。这对计算机来说可能是个问题，因为它们喜欢简短、精确的指令。


    幸运的是，有一种方法可以使用 **IF** 函数和本章后续部分讨论的一组关系运算符，以简单、简洁的格式描述各种条件。

    '
- fmt: "# Making Decisions (IF)\n\n## Syntax: `IF(Test; True; False)`\n\nThe most\
    \ important of all conditional functions used in OpenOffice.org Calc is `IF`.\
    \ It takes three arguments:\n\n- **Test**: the condition you want to test for.\n\
    - **True**: what `IF` returns when **test** returns `TRUE`.\n- **False**: what\
    \ `IF` returns when **test** returns `FALSE`.\n\nIn the case of the tax rates\
    \ mentioned on the previous page, you need to build a nested formula that uses\
    \ more than one `IF` function. Let’s do it one step at a time.\n\nThe first condition\
    \ is for the **$5,000** exemption. Put the taxable income into cell `A2` and the\
    \ tax-free allowance into cell `B2`. The formula will look like the following\
    \ one and in [Figure 13-1](#Chapter13.html#fig_13_1). You can put it anywhere,\
    \ but for the purpose of this exercise it will be cell `A5`:\n\n```\n=IF(A2 >\
    \ B2; \"Add another IF here\"; 0)\n```\n\n![images](images/1301.jpg)\n\n***Figure\
    \ 13-1.** Testing for the tax-free allowance*\n\nThe text that appears in cell\
    \ `A5` after you enter a number greater than the tax-free allowance stored in\
    \ cell `B2` needs to be replaced with another test implemented as a nested `IF`\
    \ function. In this case, you drop the `=` sign from the front of the nested function.\
    \ You will now add the first taxable income tier and rate and implement it in\
    \ the following way:\n\n```\n=IF(A2 > B2;\n        IF(A2 <= C2; (A2-B2)*D2; \"\
    Second tier\");\n        0)\n```\n\n![images](images/1302.jpg)\n\n***Figure 13-2.**\
    \ Testing for the first tax tier*\n\nBecause you cannot use multiline formulas\
    \ in OpenOffice.org Calc, you need to enter the new formula into cell `A5` in\
    \ the following way:\n\n```\n=IF(A2 > B2; IF(A2 <= C2; (A2-B2)*D2; \"Second tier\"\
    ); 0)\n```\n\nAs you can see, there is a placeholder (second tier) for the values\
    \ of taxable income greater than the value stored in cell `C2` (first tier) and\
    \ the placeholder will be replaced with another formula for taxable income greater\
    \ than $20,000:\n\n```\n=IF(A2 > B2;\n        IF(A2 <= C2;\n                (A2-B2)*D2;\n\
    \                (C2-B2)*D2+(A2-C2)*F2);\n        0)\n```\n\nThat formula has\
    \ to be typed as a single line of text into cell `A5`:\n\n```\n=IF(A2 > B2; IF(A2\
    \ <= C2; (A2-B2)*D2; (C2-B2)*D2+(A2-C2)*F2); 0)\n```\n\n![images](images/1303.jpg)\n\
    \n***Figure 13-3.** Testing for the second tax tier*\n\nAs you can see in [Figure\
    \ 13-3](#Chapter13.html#fig_13_3), there is another cell (`E2`) not in use. It\
    \ is there in case you need to add another tax tier.\n\nPlease note that the example\
    \ given in this section is not based on any particular tax code. Check your local\
    \ tax code for guidance on tax rates, tax tiers, and ways of computing taxes.\n\
    \n# Relational Operators\n\nRelational operators are used inside the `IF` function\
    \ to compare two values. They represent six basic tests that can be employed to\
    \ construct a conditional formula.\n\nThe following examples show formulas that\
    \ display the first text string if a condition is met or the second string if\
    \ the condition is not met.\n\n- **Equal**: `=`—`A1` and `A2` are equal: `=IF(A1=A2;\
    \ \"A1 is equal to A2\"; \"A1 and A2 not equal\")`\n- **Less than**: `<`—`A1`\
    \ is less than `A2`: `=IF(A1<A2; \"A1 is less than A2\"; \"A1 is not less than\
    \ A2\")`\n- **Greater than**: `>`—`A1` is greater than `A2`: `=IF(A1>A2; \"A1\
    \ is greater than A2\"; \"A1 is not greater than A2\")`\n- **Less than or equal\
    \ to**: `<=`—`A1` is less than or equal to `A2`: `=IF(A1<=A2; \"A1 is less than\
    \ or equal to A2\"; \"A1 is not less than or equal to A2\")`\n- **Greater than\
    \ or equal to**: `>=`—`A1` is greater than or equal to `A2`: `=IF(A1>=A2; \"A1\
    \ is greater than or equal to A2\"; \"A1 is not greater than or equal to A2\"\
    )`\n- **Different from**: `<>`—`A1` is not equal to `A2`: `=IF(A1<>A2; \"A1 is\
    \ different than A2\"; \"A1 is not different than A2\")`\n\n# Logical Functions\n\
    \nLogical functions can be used to build long and complex conditional formulas\
    \ where more than one test is required.\n\n## AND\n\n### Syntax: `AND(Cond_1;\
    \ Cond_2; … Cond_30)`\n\nThis function is used to compare results of up to 30\
    \ (thirty) conditions. The value of `AND` is `TRUE` if all of the conditions tested\
    \ are `TRUE` as well. For example, the following formula is `TRUE` only if `A1`\
    \ is equal to `A2` and `A3`, otherwise, it is `FALSE`:\n\n```\n=AND(A1=A2; A2=A3)\n\
    ```\n\n![images](images/1304.jpg)\n\n***Figure 13-4.** Sample results of the `AND`\
    \ function*\n\n## FALSE\n\n### Syntax: `FALSE()`\n\nThis function returns the\
    \ logical value of `FALSE`.\n\nSee also the section on the `TRUE` function.\n\n\
    ## NOT\n\n### Syntax: `NOT(Logic_Value)`\n\n`NOT` negates logical values, so `FALSE`\
    \ becomes `TRUE` and `TRUE` becomes `FALSE`, as in these examples:\n\n```\n=NOT(1<>1)\n\
    ```\n\nreturns `TRUE`, and\n\n```\n=NOT(1=1)\n```\n\nreturns `FALSE`.\n\n![images](images/1305.jpg)\n\
    \n***Figure 13-5.** Sample results of the `NOT` function*\n\n## OR\n\n### Syntax:\
    \ `OR(Cond_1; Cond_2; … Cond_30)`\n\nThe `OR` function is used to compare results\
    \ of up to 30 (thirty) conditions. The value of `OR` is `TRUE` if at least one\
    \ of the conditions tested is `TRUE`. For example, the following formula\n\n```\n\
    =OR(A1=A2; A2=A3)\n```\n\nis `TRUE` if `A1` is equal to `A2`, if `A2` is equal\
    \ to `A3`, or if `A1` is equal to `A2` and `A3`. If `A1` is not equal to `A2`,\
    \ and `A2` is not equal to `A3`, the formula is `FALSE`.\n\n![images](images/1306.jpg)\n\
    \n***Figure 13-6.** Sample results of the `OR` function*\n\n## TRUE\n\n### Syntax:\
    \ `TRUE()`\n\nThe `TRUE` function returns logical value of `TRUE`.\n\nSee also\
    \ the section on the `FALSE` function.\n\n# Index\n\n## ![images](images/square.jpg)A\n\
    \n`ABS` (Absolute Values of Numbers) function, [35](#Chapter05.html#page_35)\n\
    \nabsolute addressing, in formulas, [11](#Chapter02.html#page_11)\n\nAbsolute\
    \ Values of Numbers (`ABS`) function, [35](#Chapter05.html#page_35)\n\nAdd option,\
    \ [3](#Chapter01.html#page_3)\n\nadding thousand separators (`FIXED`) function,\
    \ [82](#Chapter10.html#page_82)\n\naddressing\n\nabsolute, [11](#Chapter02.html#page_11)\n\
    \nrelative, [11](#Chapter02.html#page_11)\n\nalignment, of text, [23](#Chapter04.html#page_23)–[24](#Chapter04.html#page_24)\n\
    \n`AND` function, [110](#Chapter13.html#page_110)–[111](#Chapter13.html#page_111)\n\
    \nannual rate of interest for loans (`RATE`) function, [69](#Chapter08.html#page_69)–[70](#Chapter08.html#page_70)\n\
    \nannual rate of interest for savings (`RRI`) function, [70](#Chapter08.html#page_70)\n\
    \n`ARABIC` function, [75](#Chapter09.html#page_75)\n\nArray option box, [18](#Chapter03.html#page_18)\n\
    \nASCII character (`CHAR`) function, [87](#Chapter11.html#page_87)\n\nASCII code\
    \ (`CODE`) function, [87](#Chapter11.html#page_87)–[88](#Chapter11.html#page_88)\n\
    \nAuto-format dialog box, [33](#Chapter04.html#page_33)\n\nauto-formatting sheets,\
    \ [32](#Chapter04.html#page_32)–[33](#Chapter04.html#page_33)\n\nAutoFormat option,\
    \ [32](#Chapter04.html#page_32)\n\n`AVERAGE` (average) function, [51](#Chapter07.html#page_51)\n\
