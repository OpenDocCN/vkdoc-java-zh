- fmt: '### Numbers


    Numbers are a bit more complex to handle. If you ever get confused by the way
    OpenOffice.org Calc interprets your input, here is a list of rules that will help
    you understand what is happening:


    - If you enter anything that resembles a number, it will be interpreted as you
    would expect. So `1000`, `1.23`, and `1.44444` are all stored and displayed as
    ordinary integer or floating-point (fractional) numbers.

    - Any number that is preceded by the dollar sign (`$`) is treated as a currency
    value and will be formatted using the currency style. So `$1000000` will be displayed
    as `$1,000,000.00`. (Styles and formatting are discussed in [Chapter 4](#Chapter04.html#ch4).)

    - You can separate thousands with the comma sign (`,`), as in `1,000,000`, but
    not with a period (`.`), which is reserved for the decimal point. Numbers with
    commas but without the dollar sign in front of them are displayed as ordinary
    numbers—the commas will be removed and the decimal point will stay in its place.
    This behavior varies depending on the regional settings, as some counties use
    periods (`.`) to separate thousands and commas (`,`) to indicate the decimal point.

    - A number followed by the percent sign (`%`) is treated as a percentage value.
    For example, `10.25%` is shown exactly as you type it in, which is useful if you
    do not have the time to convert percentages to their fractional equivalents.

    - It is OK to use common fractions. You see these numbers fairly often if you
    work with or invest in securities. Remember to put a space between the integer
    part and the fraction, as in `12 3/4`. Use the slash sign (`/`) to separate the
    numerator from the denominator.

    - Whenever you enter a common fraction, OpenOffice.org Calc turns it into a decimal
    fraction to speed up internal calculations. Don’t worry. The cell that stores
    the original input will still display it as a common fraction. The `Input Line`
    shows the fraction after conversion.

    - You can change the number of decimal places shown in cells. You will find the
    necessary information in [Chapter 4](#Chapter04.html#ch4).

    - Scientific exponential notation, such as `10e12` or `–27.4567e–45`, is permitted.

    - Placing the minus sign (`–`) in front of a number turns it into a negative number.


    For more information about the precision of calculations, see the “Numeric Formats”
    section in [Chapter 4](#Chapter04.html#ch4).


    For more tips on formatting numbers, see the “Numeric Formats” section in [Chapter
    4](#Chapter04.html#ch4).


    ### Dates


    Series of numbers separated with a slash (`/`), a period (`.`), or a hyphen (`-`)
    are treated as calendar dates, if they fall within certain limits (see [Chapter
    12](#Chapter12.html#ch12)).


    For example, `12/29/2010`, `12.29.2010`, and `12-29-2010` are all interpreted
    by OpenOffice.org Calc as December 29, 2000, but `12-000/23/19345` will be interpreted
    as text.


    To force OpenOffice.org Calc to interpret the numbers that look like calendar
    dates as text, put a single quote (`‘`) in front of the number; for example, type
    `‘12/29/2010` instead of `12/29/2010`.


    Date formatting for display depends on the operating system’s local settings.
    Internally, the dates you enter are stored in the same format.


    It is a good idea to get used to typing the year in dates as a four-digit number
    and not as the commonly used two-digit number. This prevents subtle errors caused
    by the computer misinterpreting dates.


    ### Time


    Any series of numbers separated with one or two colons (`:`) will be interpreted
    as a time value. For example, `12:13` is displayed as `12:13:00`. Similarly, `9:4:34`
    is displayed as `9:04:34`. You can even enter `9582:3566:23445345` and OpenOffice.org
    Calc will convert it into the proper number of hours, minutes, and seconds, but
    `2:432:7:33` (notice the third colon) is assumed to represent a string of text.
    Minutes and seconds are always displayed as two-digit numbers.


    If you want to prevent OpenOffice.org Calc from automatically interpreting what
    you entered as a time value, place a single quote (`‘`) in front of the time string,
    as in `‘97:45:18`.


    ### Editing Data


    We all make mistakes. Not necessarily because we are careless, but because working
    with numbers is a rather tedious affair and there are plenty of opportunities
    to introduce errors. Fortunately, they can be easily corrected at any time.


    Correcting or changing the content of a worksheet is called *editing*. You can
    tell that you are in the editing mode when you see the black rectangular cursor
    change into a text cursor inside the current cell. Another indicator of working
    in the editing mode is the content “spill” to the neighboring cells (see [Figure
    1-7](#Chapter01.html#fig_1_7)). However, don’t count on it happening at all times,
    as you can turn it off by turning on the cell content wrap mode.


    ![images](images/0107.jpg)


    ***Figure 1-7.** Editing text stored inside a cell*


    Here are a few tips on editing data in OpenOffice.org Calc:


    - To enter the edit mode, select a cell using the mouse or the keyboard cursor
    keys and then either double-click on it or press `F2`.

    - You can move about inside a cell using the `Left` and `Right` keyboard cursor
    keys.

    - The `Up` and `Down` cursor keys should not be used, as they move the spreadsheet
    cursor (the thick, black rectangular frame) to the preceding cell or following
    current one.

    - Press `Shift+7` or `Shift+3` to select a portion of the cell’s content. Press
    `Ctrl+A` to select all of it.

    - Use `Ctrl+C`, `Ctrl+X`, and `Ctrl+V` to copy, cut, and paste the selected content.

    - Use the `Ctrl+Enter` keyboard shortcut to insert line breaks.

    - The `Enter`/`Return` key is used to end the cell edit mode and store the changes
    you have made inside the current cell.

    - If you want to abandon all of your changes while you are still in the edit mode,
    press `Esc`.

    - Undoing recent changes after you hit the `Enter`/`Return` key is done in the
    usual way by using the `Ctrl+Z` keyboard shortcut.

    - When you are editing long pieces of text or complex formulas, you might want
    to do your edits on the `Input Line` (located above the active sheet). It will
    be more comfortable than editing inside the cell itself.


    #### Search and Replace


    If you want to do wholesale changes to your spreadsheet, use the `Search` and
    `Replace` functionality of OpenOffice.org Calc. In order to do that, press `Ctrl+F`
    to display the `Find & Replace` dialog. It is a two-mode dialog; you can use it
    to just search for strings of text or do search and replace. You control its behavior
    with the `Find`, `Find Next`, `Replace`, and `Replace All` buttons.


    ![images](images/0108.jpg)


    ***Figure 1-8.** The `Find & Replace` dialog*


    The `Replace` with field does not have to be empty if you want to use `Find Next`
    to skip a few matching strings. The contents will get used only when you click
    on the `Replace` or `Replace All` buttons.


    Do not worry if you accidentally replace something you did not mean to replace.
    Simply press `Esc` and then `Ctrl+Z` to revert the changes.'
