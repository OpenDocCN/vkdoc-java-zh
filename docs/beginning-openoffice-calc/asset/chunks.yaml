- fmt: '### Declining Balance Method (DB)


    #### Syntax: `DB(Cost; Salvage; Life; Period; Months)`


    If you want to use the fixed-declining balance method for calculation of depreciation
    of assets, this is the function to use. It answers questions such as “What is
    the depreciation in year x,” even if you bought that asset sometime in the middle
    of the year. For example, when you buy an asset worth $1,000,000 with a life of
    4 years at the beginning of May, you can find its depreciation in year 2 using


    ```

    =DB(1,000,000; 100; 4; 2; 8)

    ```


    The answer is $360,000.00.


    ![images](images/0816.jpg)


    ***Figure 8-16.** Sample result of the `DB` function*


    The first argument, `cost`, is the price you pay for the asset.


    The second, `salvage`, is how much you can get for it (in the preceding example
    it was $100) when you sell it after a certain number of accounting periods (`life`—for
    yearly depreciation insert the number of years, for monthly—months, and so on).


    The `period` argument is the accounting period for which you are trying to find
    depreciation and the `months` argument is the number of months left in the year
    you bought the asset (the first year, so even when you buy an asset with a life
    of 4 years at the beginning of December, you put 4 into the `life` and 1 into
    the `month` argument).


    ### Double-Declining Balance Method (DDB)


    #### Syntax: `DDB(Cost; Salvage; Life; Period; Factor)`


    This function is similar to `DB`, only it uses the double-declining balance method
    and lets you set your own depreciation factor, which is set by default to 2. Using
    similar data as in the section on the `DB` function, we get these results:


    ```

    =DDB(1,000,000; 100; 4; 2; 2)

    ```


    The answer is $250,000.00, but if you change the factor to 3, as in


    ```

    =DDB(1,000,000; 100; 4; 2; 3)

    ```


    The result is $187,500.00.


    ![images](images/0817.jpg)


    ***Figure 8-17.** Sample result of the `DDB` function*


    The first argument, `cost`, is the price you pay for the asset.


    The second, `salvage`, is how much you can get for it (in the preceding example
    it was $100) when you sell it after a certain number of accounting periods (`life`—for
    yearly depreciation insert the number of years, for monthly—months, and so on).


    The `period` argument is the accounting period for which you are trying to find
    depreciation.


    See also the section on the `VDB` function.


    ### Straight Line Depreciation (SLN)


    #### Syntax: `SLN(Cost; Salvage; Life)`


    The `SLN` function returns the straight line depreciation of an asset for the
    life of that asset. For example, if you have just bought a brand new Cray supercomputer
    for the amount of $1,000,000, and you know that in three years it should be worth
    $1.00, the value of


    ```

    =SLN(1,000,000; 1; 3)

    ```


    results in $333,333.00, which you might even be able to write off!


    ![images](images/0818.jpg)


    ***Figure 8-18.** Sample result of the `SLN` function*


    The first argument, `cost`, is the price you pay for the asset. The second, `salvage`,
    is how much you can get for it (in the preceding example it was $1) when you sell
    it after a certain number of accounting periods (the `life` argument—for yearly
    depreciation insert the number of years, for monthly—months, and so on).


    ### Sum-of-Years Method (SYD)


    #### Syntax: `SYD(Cost; Salvage; Life; Period)`


    This function gives asset depreciation using the sum-of-years-digits method. For
    example:


    ```

    =SLD(1,000,000; 100; 4; 2)

    ```


    is equal to $299,970.00.


    ![images](images/0819.jpg)


    ***Figure 8-19.** Sample result of the `SYD` function*


    The first argument, `cost`, is the price you pay for the asset.


    The second, `salvage`, is how much you can get for it (in the preceding example
    it was $100) when you sell it after a certain number of accounting periods (the
    `life` argument—for yearly depreciation insert the number of years, for monthly—months,
    and so on).


    The `period` argument is the accounting period for which you are trying to find
    depreciation.


    ### Double Declining Curve Method (VDB)


    #### Syntax: `VDB(Cost; Salvage; Life; Start_Period; End_Period; Factor; No_Switch)`


    Asset depreciation for a given period or partial period using the double declining
    curve is given by this function. This function is similar to `DDB` and lets you
    set your own depreciation factor (default value is 2).


    Unlike `DDB`, `VDB` enables you to compute depreciation for more than one accounting
    period. Using similar data as in the section on the `DDB` function, we get these
    results:


    ```

    =VDB(1,000,000; 100; 4; 2; 3; 1; 0)

    ```


    which is equal to $249,966.67.


    ![images](images/0820.jpg)


    ***Figure 8-20.** Sample result of the `VDB` function*


    The first argument, `cost`, is the price you pay for the asset.


    The second, `salvage`, is how much you can get for it (in the preceding example
    it was $100) when you sell it after a certain number of accounting periods (the
    `life` argument—for yearly depreciation insert the number of years, for monthly—months,
    and so on).


    The `start_period` and `end_period` arguments are used to specify the first and
    last accounting period used in calculations.


    The last two arguments, `factor` and `no_switch`, are used to specify your own
    depreciation factor and tell OpenOffice.org Calc you want it to automatically
    switch to the straight line depreciation method when the depreciation is larger
    than the value for which it was calculated (`no_switch` argument, default value
    0).


    See also the section on the `DDB` function.


    ## C H A P T E R 9


    ## Formatting Functions


    OpenOffice.org Calc can process all sorts of data, including text. The functions
    presented in this chapter are used to format text that might be formatted in a
    way that does not suit your needs.


    ### ARABIC


    #### Syntax: `ARABIC(text)`


    The `ARABIC` function converts a text string that contains a Roman numeral into
    an Arabic number. Roman numerals range from 0 to 3999. It is hard to find them
    in mainstream use nowadays as the Arabic numbers are much more expressive.


    The TV and movie industries use Roman numerals to conceal the age of the material
    they are showing.


    Here is an example of the use of the `ARABIC` function:


    ```

    =ARABIC(“MMXI”)

    ```


    returns 2011.


    ![images](images/0901.jpg)


    ***Figure 9-1.** Sample result of the `ARABIC` function*


    See also the section on the `ROMAN` function.


    ### Join Strings of Text (& or CONCATENATE)


    #### Syntax: `&` or `CONCATENATE(text1; text2; … text30)`


    The `CONCATENATE` function can join up to 30 strings of text. There is no limit
    for the `&` operator. For example:


    ```

    =”Bonnie”&”Clyde”

    ```


    becomes `BonnieClyde`.


    If you want to add spaces you need to use a space enclosed in quotation marks
    (`""`). For example:


    ```

    ="Bonnie"&" "&"Clyde"

    ```


    returns `Bonnie Clyde`.


    ![images](images/0902.jpg)


    ***Figure 9-2.** Sample result of the `CONCATENATE` function*


    If these strings were stored in three separate cells, you could also use this
    notation


    ```

    =A1&A2&A3

    ```


    or


    ```

    =CONCATENATE(B311;C311;D311)

    ```


    assuming that `B311` holds “Bonnie”, `C311` holds “ ”, and `D311` holds “Clyde”.


    ### CLEAN


    #### Syntax: `CLEAN(text)`


    This removes the non-printable characters from the `text` string. It is useful
    for cleaning up database files, especially those imported from other operating
    systems.


    ![images](images/0903.jpg)


    ***Figure 9-3.** Sample result of the `CLEAN` function*


    ### LOWER


    #### Syntax: `LOWER(text)`


    This function turns all given characters into lowercase. For example:


    ```

    =LOWER("OpenOffice.org")

    ```


    returns `openoffice.org`.


    ![images](images/0904.jpg)


    ***Figure 9-4.** Sample result of the `LOWER` function*


    See also the section on the `UPPER` function.'
