- fmt: '### Difference Between Two Dates in Real Units (`DAYS`)


    #### Syntax: `DAYS(t1; t2)`


    The `DAYS` function calculates the number of days between two dates. For example:


    `=DAYS("12/15/2010"; NOW())`


    returns **–383.93**, on Nov. 26, 2009 at 1:35 a.m.


    You can give `DAYS` the date in a more natural format:


    `=DAYS(DATE(2010; 12; 15); NOW())` ![images](images/1213.jpg)


    ***Figure 12-13.** Sample result of the `DAYS` function*


    The minus sign appears in the result because OpenOffice.org Calc always subtracts
    `t2` from `t1` (`t1 – t2`).


    Remember that you can remove the minus sign with the `ABS` function, but you need
    to watch out for errors that such shortcuts may introduce to your calculations:


    `=ABS(DAYS("12/15/2010"; NOW()))`


    The `DAYS` function is useful for calculating short-term interest when money is
    borrowed for days rather than months or years.


    It is important to remember that these calculations are based on a calendar year
    with **365** or **366** days (leap years).


    See also the description of the `DAYS360` function.


    ### Difference Between Two Dates in Banker’s Units (`DAYS360`)


    #### Syntax: `DAYS360(t1; t2; Year_Type)`


    The `DAYS360` function calculates the number of days between two dates given as
    timestamps, in banker’s years. For example:


    `=DAYS360(DATE(2010; 1; 15); DATE(2010; 6; 1); 0)`


    returns **136**.


    You can give `DAYS360` the date in a more natural format:


    `=DAYS360("1/15/2010"; "6/1/2010"; 0)` ![images](images/1214.jpg)


    ***Figure 12-14.** Sample result of the `DAYS360` function*


    The banker’s year has 12 months of 30 days each giving a total of 360 days in
    a year. It was, and sometimes still is, used before banks started using computers.
    It simplifies calculations when they are done by hand, but it is not fair to the
    banks or the borrowers.


    The last number in the `DAYS360` function ought to be **0** or **1**, depending
    on which, European (**1**) or American (**0**), kind of 360-day year you want
    to use.


    If you need to use the `DAYS360` function, always make sure that you choose the
    right system.


    See also the description of the `DAYS` function.


    ### Number of Months Between Two Dates (`MONTHS`)


    #### Syntax: `MONTHS(t1; t2)`


    The `MONTHS` function calculates the number of months between two dates, either
    in monthly intervals (**0**) or in calendar months (**1**). For example:


    `=MONTHS(DATE(2010; 1; 15); DATE(2010; 2; 1); 0)`


    returns **0**, because the difference between these two dates is less than the
    length of one full month, and


    `=MONTHS(DATE(2010; 1; 15); DATE(2010; 2; 1); 1)`


    returns **1**, because in calendar terms there is a difference of one month (in
    February, we think of January 15 as last month’s date).


    ![images](images/1215.jpg)


    ***Figure 12-15.** Sample result of the `MONTHS` function*


    You can give `MONTHS` the date in a more natural format:


    `=MONTHS("1/15/2010"; "2/1/2010"; 0)`


    ### Number of Weeks Between Two Dates (`WEEKS`)


    #### Syntax: `WEEKS(t1; t2; Week_Type)`


    The `WEEKS` function calculates the number of weeks between two dates, either
    in weekly intervals (**0**) or in calendar weeks (**1**). For example:


    `=WEEKS(DATE(2010; 1; 15); DATE(2010; 2; 1); 0)`


    returns **2**, because the difference between these two dates is less than the
    length of three full weeks (**21** days), and


    `=WEEKS(DATE(2010; 1; 15); DATE(2010; 2; 1); 1)`


    returns **3**, because in calendar terms in February we think of January 15 as
    being three weeks ago.


    ![images](images/1216.jpg)


    ***Figure 12-16.** Sample result of the `WEEKS` function*


    You can give `WEEKS` the date in a more natural format:


    `=WEEKS("1/15/2010"; "2/1/2010"; 0)`


    ### Number of Months Between Two Dates (`YEARS`)


    #### Syntax: `YEARS(t1; t2; Year_Type)`


    The `YEARS` function calculates the number of years between two dates, either
    in yearly intervals (**0**) or calendar years (**1**). For example:


    `=YEARS(DATE(2009; 12; 31); DATE(2010; 1; 1); 0)`


    returns **0**, because the difference between these two dates is less than the
    length of a full year, and


    `=YEARS(DATE(2009; 12; 31); DATE(2010; 1; 1); 1)`


    returns **1**, because in calendar terms there is a difference of one year between
    those two dates.


    ![images](images/1217.jpg)


    ***Figure 12-17.** Sample results of the `YEARS` function*


    You can give `YEARS` the date in a more natural format:


    `=YEARS("12/31/2010"; "1/1/2010"; 0)`


    All of these functions may or may not be influenced by the Epoch setting. They
    are affected if you mix dates from different worksheets with different Epochs
    and enter or reference timestamps directly into a function or formula, such as
    `WEEKDAY(36526; 1)`. To prevent this from happening, use the `DAY` function to
    provide correct timestamps.


    ## C H A P T E R  13


    ## Conditional Functions


    All of the functions that were discussed in the previous chapters of this book
    work in a fairly simple way. You give them some input and they process it and
    return a single value. Useful, but not what we would call “smart.”


    If you want your worksheets to be smart, you need to use conditional functions
    that can make decisions based on a set of pre-defined conditions.


    Tax returns are one good example of the need for a worksheet to be smart. Let’s
    assume that we want to use just two cells in a sheet, one to enter the amount
    of money to be taxed and the other to display the amount of tax due. Use the following
    imaginary income tax rates:


    - A tax free allowance of $5,000.

    - 20% tax on any amount above $5,000.

    - 30% tax on any amount above $20,000.


    What you need to compute the correct amount of tax is a formula that can make
    decisions based on the amount of taxable income. If you were to explain them to
    somebody, you would say:


    - If the amount of taxable income is $5,000 or less, there is no tax to pay.

    - If the amount of taxable income is greater than $5,000 but not greater than
    $20,000, subtract $5,000 from the amount of taxable income. The income tax payable
    on the remaining amount of taxable income is 20%.

    - If the amount of taxable income is greater than $20,000, subtract $20,000 from
    the amount of taxable income. The income tax payable on the remaining amount of
    taxable income is 30% + $3,000.


    As you can see, even a simple set of rules like these can take quite a few sentences
    to explain. That can be problematic for computers, because they like short, precise
    instructions.


    Fortunately, there is a way to describe various conditions in a simple, terse
    format using the `IF` function and a set of relational operators discussed in
    the following sections of this chapter.'
