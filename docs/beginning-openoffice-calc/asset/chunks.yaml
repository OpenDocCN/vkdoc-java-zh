    ## C H A P T E R  8


    ## Calculations with Money


    Although OpenOffice.org Calc''s mathematical and statistical functions are advanced
    enough to construct any financial function you might need, you don''t have to
    do it. OpenOffice.org Calc ships with many built-in financial functions such as
    rates of return and future values of investments. This chapter is all about them.


    The financial functions can be divided into the following groups:


    *   Investment calculations.

    *   Asset depreciation.


    ### Investment Calculations


    Investment calculation functions are used to compute interest rates, payments,
    and the length of time needed to repay a loan. They are also a good tool to use
    to compare the profitability of various investments.


    ### Cumulative Compounded Interest (CUMIPMT)


    #### Syntax: CUMIPMT(Interest; Time; Capital; Start; End; Type)


    The **CUMIPMT** (cumulative compounded interest) function returns the amount of
    interest that needs to be paid on the principal or capital, borrowed for a period
    of time. It is defined as the total number of payment periods (months, quarters,
    years, and so on).


    ![images](images/0801.jpg)


    ***Figure 8-1.** Sample result of the **CUMIPMT** function*


    It is assumed that the rate of interest remains constant for the whole accounting
    period. You can calculate the amount of interest to be paid back for the whole
    period or a part of it using the **start** and **end** arguments. For example,
    if you borrow **$1,000,000** for **25** years at a constant rate of interest of
    **7.25%** and want to know how much interest you need to pay in the first quarter
    of the first year, assuming monthly payments made at the beginning of each month,
    you need to use the following function:


    `=CUMIPMT(7.25%/12; 25*12; 1,000,000; 1; 3; 0)`


    The result is **–$18,103.45**.


    It is necessary to divide the rate of interest and multiply the number of years
    by the number of months (or equivalent payment periods) to make sure that the
    calculations are correct. For quarterly payments the function would look like
    this:


    `=CUMIPMT(7.25%/4; 25*4; 1,000,000; 1; 1; 0)`


    The fourth and fifth arguments (**start** and **end**) indicate the start and
    end payment periods for which the amount of compound interest is being calculated.


    In the first example it was the first and the third month of the first year; in
    the second example it was the first quarter of the first year. The first month
    of the second year would be represented by **13**, and the first quarter of the
    second year would be represented by **5**.


    The last argument, **type**, is used to tell OpenOffice.org Calc when payments
    are made. When money is paid at the beginning of each accounting period, use **1**
    and when money is to be made at the end of each accounting period, use **0**.


    It is a generally accepted rule that we mark arguments and results with the minus
    sign (**–**) when they indicate money that needs to be paid out to somebody and
    without the minus sign when the money is received. OpenOffice.org Calc''s functions
    do it automatically for the results but not for the arguments (however, OpenOffice.org
    Calc returns an error if you put a minus sign where it is not supposed to be).


    Also see the description of the **CUMPRINC** function, which calculates the amount
    of compound principal capital paid back over a given period of time.


    Always remember to put the right percentage values into functions that require
    them. There is a big difference between **10** (which OpenOffice.org Calc interprets
    as **1,000%** or one thousand percent) and **10%**.


    ### Cumulative Principal Capital (CUMPRINC)


    #### Syntax: CUMPRINC(Interest; Time; Capital; Start; End; Type)


    Complementary to the **CUMIPMT** function, **CUMPRINC** returns the amount of
    the compound principal capital that needs to be paid back within a given period
    of time defined as the total number of payment periods (months, quarters, years,
    and so on). It is assumed that the rate of interest remains constant for the whole
    accounting period.


    ![images](images/0802.jpg)


    ***Figure 8-2.** Sample result of the **CUMPRINC** function*


    This function is useful if you want to know how much of the principal capital
    borrowed needs to be paid back within the specified amount of time or any shorter
    interval specified by the **start** and **end** arguments.


    For example, if you borrow **$1,000,000** for **25** years at a constant rate
    of interest of **7.25%** and want to know how much capital you need to return
    within the first quarter of the first year (assuming monthly payments made at
    the beginning of each month), you need to use the following function:


    `=CUMPRINC(7.25%/12; 25*12; 1,000,000; 1; 3; 0)`


    The result is $3,580.75\. It is necessary to divide the rate of interest, and
    multiply the number of years, by the number of months (or equivalent payment periods)
    to make sure that the calculations are correct. For quarterly payments, the function
    would look like this:


    `=CUMPRINC7.25%/4; 25*4; 1,000,000; 1; 1; 0)`


    The function returns **–$3,605.44**, which is more than **–$3,580.75** from the
    previous example.


    The fourth and fifth arguments (**start** and **end**) indicate the start and
    end payment periods for which the amount of compound capital is being calculated.


    In the first example it was the first and the third months of the first year;
    in the second example it was the first quarter of the first year. The first month
    of the second year would have number **13** and the first quarter of the second
    year would have number **5**.


    If the payments are to be made at the beginning of each accounting period, use
    **1** instead of **0** as the last argument (**type**) of this function.


    Also see the description of the **CUMIPMT** function, which calculates the amount
    of interest on principal capital to be paid back in a given amount of time.


    ### Time to Maturity (DURATION)


    #### Syntax: DURATION(Interest; Investment; Future)


    The **DURATION** function returns the number of periods (years if a yearly interest
    rate is used) for a given investment to reach the desired future value, assuming
    a constant rate of interest. For example, if you want to know how many years you
    have to wait for **$1,000** deposited in a bank account that pays **3%** interest
    annually for your money to become **$2,000**, use the following formula:


    `=DURATION(3%; 1000; 2000)` ![images](images/0803.jpg)


    ***Figure 8-3.** Sample result of the **DURATION** function*


    The answer is a long **23.45** years. If you want to see the answer given in whole
    years, without fractions, use the **ROUNDUP** function, as in


    `=ROUNDUP(DURATION(3%; 1000; 2000); 0)`'
