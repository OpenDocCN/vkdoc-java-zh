  trans: "\n### 引用其他工作表中存储的数据\n\n您可以编写指向同一电子表格文档内其他工作表中单元格的公式。您只需对目标单元格的地址稍作修改即可。\n\
    \n如果要引用**加利福尼亚**工作表中的单元格 **B2**，请输入 **=California.B2**。\n\n### 引用其他电子表格中存储的数据\n\
    \n当您引用其他电子表格（独立的电子表格文档文件）中存储的数据时，OpenOffice.org Calc 需要一些额外信息来定位外部文件。\n\n当您引用\
    \ **USA** 电子表格中**加利福尼亚**工作表上的单元格 **B2** 时，需要输入\n\n`='USA.ods'#$California.B2`\n\
    \n**.ods** 后缀用于补全使用 OpenOffice.org Calc 3.1 创建的电子表格文件名；其他电子表格程序使用不同的后缀，或者根本不使用后缀，您需要相应地调整您的引用。\n\
    \n工作表名称前的井号（**#**）和美元符号（**$**）是必需的。它们与绝对引用和相对引用无关，尽管您可以在单元格引用中使用这两种寻址方式，例如\n\n\
    `='USA.ods'#$California.$B$2`\n\n文件名必须用单引号（**'**）括起来。\n\n如果您引用的电子表格与引用它的文件不在同一目录下，则必须为\
    \ OpenOffice.org Calc 提供该文档的完整路径，例如\n\n`'/home/jack.white/monthly returns/customers/USA.sdc'#$California.$B$2`\n\
    \n上面显示的外部文件引用是以 Linux 和其他类 Unix 操作系统的原生风格编写的。在 Microsoft Windows 上，它看起来像这样：\n\n\
    `='C:\\Documents and Settings\\Jack White\\My Documents\\monthly returns\\customers\\\
    USA.sdc'#$California.B2`\n\n#### 引用其他计算机上存储的数据\n\n您也可以引用存储在内部网或万维网上的外部文档。为此，请选择“插入”![images](img/U001.jpg)“链接到外部数据…”\n\
    \n### 为单元格命名\n\n虽然地址是编写公式的一种非常强大的机制，但它们很难记忆。幸运的是，有一种方法可以让您的生活更轻松。OpenOffice.org\
    \ Calc 允许您为每个单元格或整组单元格命名，并使用这些名称代替地址。操作方法如下：\n\n1.  选择您要命名的单元格。\n2.  选择“插入”![images](img/U001.jpg)“名称”![images](img/U001.jpg)“定义”。\n\
    3.  在“定义名称”对话框的**名称**字段中键入单元格名称（例如**总计**）（参见图 2-2）。\n\n    ![images](img/0202.jpg)\n\
    \n    ***图 2-2.** 命名单元格区域*\n\n4.  名称必须以字母开头，不应包含空格，并且必须唯一，以便与其他名称区分开来。\n\n   \
    \ **引用位置**字段包含单元格的绝对地址。\n\n5.  单击**添加**按钮。就这样！您现在可以使用新名称代替单元格地址（例如，使用 =**总计**\
    \ 代替 **=A1**）。\n\n您也可以同样轻松地为单元格区域创建名称。只需选择任意数量的单元格，然后重复上述步骤即可。\n\n要选择任何已定义名称的单元格或单元格区域，请从工作表窗口左上角的下拉列表中选择该名称（参见图\
    \ 2-3）。\n\n![images](img/0203.jpg)\n\n***图 2-3.** 选择已命名的单元格组*\n\n如果您已经在每列或每行数据的上方、下方、左侧或右侧有标签，则还有另一种为单元格区域创建名称的方法：\n\
    \n1.  选择单元格（如图 2-3 所示），然后选择“插入”![images](img/U001.jpg)“名称”![images](img/U001.jpg)“创建”。\n\
    2.  在“创建名称”对话框中，单击其中一个选项以指定您要使用的标签的位置（图 2-4）。\n\n    ![images](img/0204.jpg)\n\
    \n    ***图 2-4.** 您为自动命名选择的单元格必须已有列标签或行标签。*\n\n3.  单击**确定**将标签转换为单元格名称。\n\n通过从文档窗口左侧的下拉列表中选择一个名称（参见图\
    \ 2-3），检查 OpenOffice.org Calc 是否正确地完成了工作。\n\n## 第 3 章\n\n## 函数\n\n您可能听说过函数和公式很难掌握。这在很久以前可能是这样，但现在已非如此，对于\
    \ OpenOffice.org Calc 来说当然也不是这样。\n\n虽然需要解释一些术语，但并不难。正如您将在后续页面中学到的，我经常使用诸如“公式返回\
    \ x”或“函数返回 x”之类的短语，这只是表示所讨论的公式或函数对于给定的“参数”或“形参”（如 OpenOffice.org Calc 的创建者所称）具有值\
    \ **x** 的简略说法。\n\n公式和函数有什么区别？公式是您自己创建的内容，使用标准的数学运算符、数字、文本、单元格地址或单元格区域。您还可以在公式中添加函数。函数实际上就是预先打包好的公式，用于执行某些标准化的任务或计算，甚至做出简单的决策。\n\
    \n要在公式中使用函数，您需要键入其名称，后跟括号。例如，以下公式使用函数 **SQRT** 计算 **2** 的平方根：\n\n`=SQRT(2)` ![images](img/0301.jpg)\n\
    \n***图 3-1.** **函数向导**显示函数的常规信息*\n\n上一页所示公式中的数字 **2** 是公式*参数*的一个示例，特定函数接受并处理该参数以产生结果，该结果随后被视为包含该公式的单元格的值。\n\
    \n您不必以大写字母键入函数名称，因为 OpenOffice.org Calc 会自动为您更正。\n\n公式中的参数用分号（**;**）分隔。\n\n不同的函数使用不同的参数：数字、文本、对包含数字或文本字符串的单元格的引用，或者返回数字或文本的另一个函数。\n\
    \n将一个函数用作另一个函数的参数称为*嵌套*。例如，您可以将函数 **PI** 放在函数 **SQRT** 内部，如下所示\n\n`=SQRT(PI())`\n\
    \n上面的示例显示了函数 **PI** 嵌套在函数 **SQRT** 内部。\n\n所有函数后面都必须跟括号，即使它们不接受任何参数。例如，**PI()**\
    \ 返回圆周率 π，不接受任何参数，但仍需后跟括号。\n\n在本书中，为了便于阅读并遵循 OpenOffice.org Calc 创建者使用的惯例，我们在函数名称后不加括号。唯一的例外是当我们包含实际的公式代码时，例如\
    \ **=PI()**。\n\n### 手动创建公式\n\n创建公式很简单，只需在选定的单元格中键入等号（**=**），后跟必要的引用、数字、运算符和函数，然后按\
    \ **Enter**/**Return** 键即可。\n\n如果您在公式中出错，OpenOffice.org Calc 会发出提示，您可以直接在有问题的单元格内或在**输入行**上编辑公式。您只需将光标放在相应的单元格中，然后按\
    \ **F2** 键即可。\n"
- fmt: "### Taming the Function Wizard\n\nThere is a better, more convenient, and\
    \ less error-prone way to build formulas than by typing them into a sheet. It\
    \ is called the **Function Wizard**, and it serves either as an intelligent formula\
    \ editor or as a handy calculator. The wizard is shown in [Figure 3-1](#Chapter03.html#fig_3_1).\n\
    \nHere is an exercise to help you master the **Function Wizard**:\n\n1.  Click\
    \ the **Function Wizard** button on the **Spreadsheet** toolbar (it looks like\
    \ the letters `fx`).\n2.  Choose a formula category, such as **Financial**, from\
    \ the **Category** drop-down list on the **Functions** tab. You have the following\
    \ categories to choose from:\n    *   **Last Used**: OpenOffice.org Calc remembers\
    \ which functions you used recently so you don't have to hunt for them over and\
    \ over again.\n    *   **All**: a long list of all 300+ functions available in\
    \ OpenOffice.org Calc.\n    *   **Database**: database-like functions that operate\
    \ on data arranged in rows. You can use them to write formulas that process large\
    \ amount of data in a way similar to a database.\n    *   **Date&Time**: functions\
    \ for processing date and time values.\n    *   **Financial**: financial functions.\n\
    \    *   **Information**: information functions that provide additional information\
    \ about formula results.\n    *   **Logical**: basic logical functions.\n    *\
    \   **Mathematical**: various math functions.\n    *   **Array**: array/matrix\
    \ processing functions.\n    *   **Statistical**: statistical functions.\n   \
    \ *   **Spreadsheet**: spreadsheet information functions.\n    *   **Text**: text\
    \ processing functions.\n    *   **Add-in**: additional statistical/programmers'\
    \ functions.\n3.  Click the name of the function you want, such as **EFFECTIVE**.\
    \ A short description of that function appears on the right-hand side panel.\n\
    4.  Double-click the name of the chosen function. The right-hand side panel changes\
    \ into a fill-in-the-blank form, with fields for every argument.\n5.  Enter function\
    \ arguments into appropriate fields. Try entering `10%` into the **NOM** field\
    \ and `12` into the **P** field. The **Function result** box in the top-right\
    \ corner of the **Function Wizard** dialog box displays the value of that function.\
    \ In the **Formula** field, you see the actual formula that OpenOffice.org Calc\
    \ wrote while you were filling in the form fields. See [Figure 3-2](#Chapter03.html#fig_3_2)\
    \ to see how your formula should look.\n\n    ![images](images/0302.jpg)\n\n \
    \   ***Figure 3-2.** Fill-in-the-blanks forms make designing formulas much easier\
    \ than doing the work by hand.*\n\n6.  Click **OK**.\n\nThat's it. You have created\
    \ a new formula now, without worrying too much about syntax rules and matching\
    \ parentheses!\n\nThe tiny **Array** option box in the bottom-left corner of the\
    \ **Function Wizard** dialog box is automatically marked with a tick when the\
    \ result of a function is a matrix. You do not have to turn it on or off yourself\
    \ unless you want to specifically stop OpenOffice.org Calc from inserting results\
    \ as a matrix.\n\n### Constructing Complex Formulas\n\nThe **Function Wizard**\
    \ can be used to build some really complex formulas. Try this exercise to see\
    \ what it can do. We are going to create a function that reads the current date\
    \ (year, month, day), adds one to the year number, and returns the day of the\
    \ week for that future date:\n\n![images](images/0303.jpg)\n\n***Figure 3-3.**\
    \ When you want to use another function as an argument, place the text cursor\
    \ inside the original function's parentheses and choose the new function from\
    \ the list.*\n\n1.  Open the OpenOffice.org Calc **Function Wizard**.\n2.  Select\
    \ **Date&Time** from the **Category** list.\n3.  Double-click the **WEEKDAY**\
    \ function on the **Function** list. The right-hand side panel changes into a\
    \ fill-in-the-blanks form, with fields for every argument of that function.\n\
    4.  Place the mouse pointer over the parentheses after the **WEEKDAY** function\
    \ displayed in the **Formula** field and click. Make sure that the text cursor\
    \ is inside the parentheses.\n5.  Choose the **DATE** function from the **Function**\
    \ list on the left and double-click it.\n6.  Place the mouse pointer over the\
    \ parentheses after the **DATE** function displayed in the **Formula** field and\
    \ click. Make sure that the text cursor is inside the parentheses.\n7.  Choose\
    \ the **YEAR** function from the list of functions on the left and double-click\
    \ it.\n8.  Place the text cursor inside the **YEAR** function's parentheses and\
    \ choose the **TODAY** function, as shown in [Figure 3-3](#Chapter03.html#fig_3_3).\n\
    9.  Place the text cursor after the `YEAR(TODAY())` part of the formula and type\
    \ `+1`.\n10.  Place the text cursor after the `(YEAR(TODAY())+1)` part of the\
    \ formula and type the semicolon sign (`;`). You have entered the first argument\
    \ of a rather complex function.\n11.  Using the techniques described previously,\
    \ create the following formula: `DATE((YEAR(TODAY())+1); MONTH(TODAY()); DAY(TODAY()))`\n\
    12.  The whole formula ought to look like this: `=WEEKDAY(DATE((YEAR(TODAY())+1);\
    \ MONTH(TODAY()); DAY(TODAY())))`\n13.  Click **OK**. That's it. You have created\
    \ a really complex formula, and it wasn't too bad, was it?\n\nIf you get lost,\
    \ you might want to use the **Structure** tab in the **Function Wizard** dialog\
    \ box, which visually displays the structure of the formulas you are creating\
    \ (see [Figure 3-4](#Chapter03.html#fig_3_4)). If there are serious errors, it\
    \ shows them as red spots on the list.\n\n![images](images/0304.jpg)\n\n***Figure\
    \ 3-4.** When you're lost, check the structure of the formula visually.*\n\nYou\
    \ can use the **Function Wizard** to do calculations without entering them into\
    \ a sheet. Just compose the formula and enter appropriate values, but do not click\
    \ **OK**. The results for the whole formula are shown in the **Result** box above\
    \ the **Formula** field.\n\n## C H A P T E R 4\n\n## Formatting\n\nOpenOffice.org\
    \ Calc offers advanced data and document formatting tools. You can format sheets,\
    \ cells, dates, time, numbers, text, charts, and many other objects. You can change\
    \ fonts, colors, alignment, numeric formats, and anything in between and beyond.\
    \ The number of available tweaks can be at times overwhelming, which is why the\
    \ most popular formatting actions are located on the main toolbar (see [Figure\
    \ 4-1](#Chapter04.html#fig_4_1)). We'll go through all formatting tools in this\
    \ chapter and teach you how to use each one.\n\n![images](images/0401.jpg)\n\n\
    ***Figure 4-1.** Cell formatting tools*\n\n### Formatting Text\n\nFormatting cells\
    \ and sheets in the OpenOffice.org Calc worksheets is as easy as using a word\
    \ processor to prettify your CV. The layout of the documents may be different\
    \ because you store smaller pieces of information in tiny cells instead of putting\
    \ it all in paragraphs on a long, blank page, but the general concepts are familiar.\n\
    \nWhen it comes to formatting, the only major difference between spreadsheets\
    \ and word processors is the refined control you get over formatting numbers.\n\
    \n#### The Formatting Toolbar\n\nThe most popular formatting content and document\
    \ tools can be found on the **Formatting** toolbar (see [Table 4-1](#Chapter04.html#tab_4_1)).\
    \ We will discuss formatting in detail in the following sections.\n\n![images](images/t0401.jpg)"
