  trans: '

    ### 做出决策（IF）


    #### 语法：IF(测试条件; 真值; 假值)


    OpenOffice.org Calc 中所有条件函数里最重要的是 **IF**。它包含三个参数：


    *   **测试条件**：你想要测试的条件。

    *   **真值**：当**测试条件**返回**TRUE**时，**IF** 返回的值。

    *   **假值**：当**测试条件**返回**FALSE**时，**IF** 返回的值。


    对于上一页提到的税率情况，你需要构建一个使用多个 **IF** 函数的嵌套公式。让我们一步一步来。


    第一个条件是针对 **$5,000** 的免税额。将应税收入放入单元格 **A2**，将免税额放入单元格 **B2**。公式将如下所示，并在图 13-1 中展示。你可以把它放在任何地方，但为了本练习的目的，它将放在单元格
    **A5** 中：


    `=IF(A2 > B2; "在此处添加另一个 IF"; 0)` ![images](img/1301.jpg)


    ***图 13-1.** 测试免税额*


    在你输入一个大于单元格 **B2** 中存储的免税额的数字后，单元格 **A5** 中出现的文本需要被替换为另一个作为嵌套 **IF** 函数实现的测试。在这种情况下，你需要去掉嵌套函数开头的
    **=** 号。现在，你将添加第一个应税收入层级和税率，并按以下方式实现：


    `=IF(A2 > B2;`

    `        IF(A2 <= C2; (A2-B2)*D2; "第二层级");`

    `        0)` ![images](img/1302.jpg)


    ***图 13-2.** 测试第一个税级*


    由于不能在 OpenOffice.org Calc 中使用多行公式，你需要按以下方式将新公式输入到单元格 **A5** 中：


    `=IF(A2 > B2; IF(A2 <= C2; (A2-B2)*D2; "第二层级"); 0)`


    如你所见，对于大于单元格 **C2**（第一层级）中存储值的应税收入值，有一个占位符（第二层级），该占位符将被替换为针对大于 $20,000 的应税收入的另一个公式：


    `=IF(A2 > B2;`

    `        IF(A2 <= C2;`

    `                (A2-B2)*D2;`

    `                (C2-B2)*D2+(A2-C2)*F2);`

    `        0)`


    该公式必须作为一行文本输入到单元格 **A5** 中：


    `=IF(A2 > B2; IF(A2 <= C2; (A2-B2)*D2; (C2-B2)*D2+(A2-C2)*F2); 0)` ![images](img/1303.jpg)


    ***图 13-3.** 测试第二个税级*


    如你在图 13-3 中所见，还有另一个单元格（**E2**）未被使用。它在那里是为了以防你需要添加另一个税级。


    请注意，本节中给出的示例并非基于任何特定的税法。请查阅您当地的税法以了解税率、税级和计算税款的方法。


    ### 关系运算符


    关系运算符在 **IF** 函数内部用于比较两个值。它们代表了可用于构建条件公式的六种基本测试。


    以下示例展示了在满足条件时显示第一个文本字符串，或在条件不满足时显示第二个文本字符串的公式。


    *   **等于**：**=**—**A1** 和 **A2** 相等：`=IF(A1=A2; "A1 等于 A2"; "A1 和 A2 不相等")`

    *   **小于**：**<**—**A1** 小于 **A2**：`=IF(A1<A2; "A1 小于 A2"; "A1 不小于 A2")`

    *   **大于**：**>**—**A1** 大于 **A2**：`=IF(A1>A2; "A1 大于 A2"; "A1 不大于 A2")`

    *   **小于或等于**：**<=**—**A1** 小于或等于 **A2**：`=IF(A1<=A2; "A1 小于或等于 A2"; "A1 不小于或等于
    A2")`

    *   **大于或等于**：**>=**—**A1** 大于或等于 **A2**：`=IF(A1>=A2; "A1 大于或等于 A2"; "A1 不大于或等于
    A2")`

    *   **不等于**：**<>**—**A1** 不等于 **A2**：`=IF(A1<>A2; "A1 不等于 A2"; "A1 并非不等于 A2")`


    ### 逻辑函数


    逻辑函数可用于构建需要多个测试的长而复杂的条件公式。


    ### AND


    #### 语法：AND(条件 _1; 条件 _2; … 条件 _30)


    此函数用于比较最多 30（三十）个条件的结果。如果所有测试的条件都为 **TRUE**，则 **AND** 的值为 **TRUE**。例如，仅当 **A1**
    等于 **A2** 且等于 **A3** 时，以下公式才为 **TRUE**，否则为 **FALSE**：


    `=AND(A1=A2; A2=A3)` ![images](img/1304.jpg)


    ***图 13-4.** **AND** 函数的示例结果*


    ### FALSE


    #### 语法：FALSE()


    此函数返回逻辑值 **FALSE**。


    另请参阅 **TRUE** 函数部分。


    ### NOT


    #### 语法：NOT(逻辑值)


    **NOT** 对逻辑值取反，因此 **FALSE** 变为 **TRUE**，**TRUE** 变为 **FALSE**，如下例所示：


    `=NOT(1<>1)`


    返回 **TRUE**，并且


    `=NOT(1=1)`


    返回 **FALSE**。


    ![images](img/1305.jpg)


    ***图 13-5.** **NOT** 函数的示例结果*


    ### OR


    #### 语法：OR(条件 _1; 条件 _2; … 条件 _30)


    **OR** 函数用于比较最多 30（三十）个条件的结果。如果至少有一个测试的条件为 **TRUE**，则 **OR** 的值为 **TRUE**。例如，以下公式


    `=OR(A1=A2; A2=A3)`


    如果 **A1** 等于 **A2**，或者 **A2** 等于 **A3**，或者 **A1** 等于 **A2** 且等于 **A3**，则为 **TRUE**。如果
    **A1** 不等于 **A2**，且 **A2** 不等于 **A3**，则该公式为 **FALSE**。


    ![images](img/1306.jpg)


    ***图 13-6.** **OR** 函数的示例结果*


    ### TRUE


    #### 语法：TRUE()


    **TRUE** 函数返回逻辑值 **TRUE**。


    另请参阅 **FALSE** 函数部分。


