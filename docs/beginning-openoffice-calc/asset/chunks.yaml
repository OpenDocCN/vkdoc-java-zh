- fmt: "### Auto-formatting Sheets\n\nIf you would like to avoid the tedious formatting\
    \ of cells by hand, use pre-defined formats:\n\n1. Enter data into a sheet in\
    \ some roughly organized manner.\n2. Choose `Format` `![images](images/U001.jpg)`\
    \ `AutoFormat`.\n3. Select the format you like from the list on the left (see\
    \ [Figure 4-10](#Chapter04.html#fig_4_10)).\n\n   `![images](images/0410.jpg)`\n\
    \n   ***Figure 4-10.** Auto-format*\n\n4. Click on the `OK` button. You're done.\n\
    \n#### Adding New Designs to the Auto-format List\n\nYou can create your own sheet\
    \ designs and add them to the list of formats in the `Auto-format` dialog:\n\n\
    1. Enter data into a sheet in some roughly organized manner.\n2. Select the formatted\
    \ area.\n3. Choose `Format` `![images](images/U001.jpg)` `AutoFormat`.\n4. Click\
    \ the `Add…` button in the `Auto-format` dialog box.\n5. Type in the name of your\
    \ new format.\n6. Click on the `OK` button. That's it!\n\nYour new format must\
    \ be at least 4 cells by 4 cells in size to be accepted by OpenOffice.org Calc.\n\
    \n## C H A P T E R  5\n\n## Simple Mathematical Functions\n\nIn this chapter,\
    \ you are going to learn about popular OpenOffice.org Calc mathematical functions.\
    \ It is a good idea to try the examples from this chapter to see how OpenOffice.org\
    \ Calc works.\n\n### Absolute Values of Numbers (ABS)\n\n#### Syntax: `ABS(n)`\n\
    \nThe `ABS` function removes the minus sign (`–`) from a negative number, making\
    \ it positive. It does nothing to `0` (zero) or positive numbers.\n\n`![images](images/0501.jpg)`\n\
    \n***Figure 5-1.** Sample results of the `ABS` function*\n\nThe `ABS` function\
    \ is useful if you want to further process values returned by a formula or function\
    \ that may return negative results. For example:\n\n```\n=SQRT(PMT(7.5%/12; 25*12;\
    \ 1,000,000))\n```\n\nproduces errors because the `PMT` function (see “Calculations\
    \ with Money”) returns negative values for payments due. It is mathematically\
    \ correct but may be confusing to some. To change that result to a positive number,\
    \ use\n\n```\n=SQRT(ABS(PMT(7.5%/12; 25*12; 1,000,000)))\n```\n\nBy the way, if\
    \ you want to add the minus sign on every result, use\n\n```\n=-SQRT(ABS(PMT(7.5%/12;\
    \ 25*12; 1,000,000)))\n```\n\n`![images](images/square.jpg)` **Remember** When\
    \ you start wrapping functions and formulas in `ABS`, you alter their results\
    \ in a way that may not be expected by other functions and formulas that rely\
    \ on those results. Always think twice about the consequences of such modifications.\n\
    \nSee also the section on the `SIGN` function.\n\n### Exponential Function (EXP)\n\
    \n#### Syntax: `EXP(Number)`\n\nThe `EXP` function returns the values of the exponential\
    \ function *e^x* for the given number *x* where *e* is approximately equal to\
    \ `2.718281828`. For example:\n\n```\n=EXP(1)\n```\n\nreturns `2.72` (see [Figure\
    \ 5-2](#Chapter05.html#fig_5_2)).\n\n`![images](images/0502.jpg)`\n\n***Figure\
    \ 5-2.** Sample result of the `EXP` function*\n\nSee also the sections on the\
    \ `FACT`, `LN`, `LOG`, `LOG10`, `POWER`, and `SQRT` functions.\n\n### Factorial\
    \ Function (FACT)\n\n#### Syntax: `FACT(n)`\n\nThe `FACT` function returns the\
    \ value of the factorial function for the given number (the product of all integers\
    \ from `1` to `n`). For example:\n\n```\n=FACT(3)\n```\n\nreturns `6` or `1 *\
    \ 2 * 3`.\n\n`![images](images/0503.jpg)`\n\n***Figure 5-3.** Sample result of\
    \ the `FACT` function*\n\nSee also the section on the `EXP` function.\n\n### Natural\
    \ Logarithm (LN)\n\n#### Syntax: `LN(Number)`\n\nThe `LN` function returns the\
    \ value of the natural logarithm (the logarithm base of *e*) for the given `number`.\
    \ Note that the number must be positive. For example:\n\n```\n=LN(8)\n```\n\n\
    returns 2.08 (log[e]8).\n\n`![images](images/0504.jpg)`\n\n***Figure 5-4.** Sample\
    \ result of the `LN` function*\n\nSee also the sections on the `EXP`, `LOG`, `LOG10`,\
    \ and `POWER` functions.\n\n### Logarithm (LOG)\n\n#### Syntax: `LOG(Number; Base)`\n\
    \nThe `LOG` function returns the value of the user-defined-base logarithm for\
    \ the given `number`. Note that the number must be positive. For example:\n\n\
    ```\n=LOG(8; 4)\n```\n\nreturns `1.5` (log[8]4).\n\n`![images](images/0505.jpg)`\n\
    \n***Figure 5-5.** Sample result of the `LOG` function*\n\nSee also the sections\
    \ on the `EXP`, `LN`, `LOG10`, and `POWER` functions.\n\n### Logarithm Base 10\
    \ (LOG10)\n\n#### Syntax: `LOG10(Number)`\n\nThe `LOG10` function returns the\
    \ value of logarithm base `10` for the given `number`. Note that the number must\
    \ be positive. For example:\n\n```\n=LOG10(8)\n```\n\nis 0.9 (log[10]8).\n\n`![images](images/0506.jpg)`\n\
    \n***Figure 5-6.** Sample result of the `LOG10` function*\n\nSee also the sections\
    \ on the `EXP`, `LN`, `LOG`, and `POWER` functions.\n\n### Power (POWER)\n\n####\
    \ Syntax: `POWER(Number; Power)`\n\nThe `POWER` function returns `number` raised\
    \ to the given `power`. For example:\n\n```\n=POWER(10; 2)\n```\n\nreturns `100`,\
    \ or `102`. It is equivalent to the following notation:\n\n```\n=10^2\n```\n\n\
    `![images](images/0507.jpg)`\n\n***Figure 5-7.** Sample result of the `POWER`\
    \ function*\n\nSee also the sections on the `EXP`, `FACT`, `LN`, `LOG`, `LOG10`,\
    \ and `SQRT` functions.\n\n### Product of Many Arguments (PRODUCT)\n\n#### Syntax:\
    \ `PRODUCT(ARG1; ARG2; … ARG30)`\n\nThe `PRODUCT` function multiplies up to 30\
    \ arguments (`x1`, `x2`, … `x30`). Each argument can be a single value or a range\
    \ of cells. For example:\n\n```\n=PRODUCT(A1:A23; B2:C23)\n```\n\nmultiplies values\
    \ of all cells from ranges `A1:A23` and `B2:C23`.\n\n`![images](images/0508.jpg)`\n\
    \n***Figure 5-8.** Sample result of the `PRODUCT` function*\n\nSee also the section\
    \ on the `SUM` function.\n\n### Square Root (SQRT)\n\n#### Syntax: `SQRT(Number)`\n\
    \nThe `SQRT` function returns the square root of a positive `number`. For example,\
    \ to find a square root of `10`, you'd type\n\n```\n=SQRT(10)\n```\n\nThe answer\
    \ is, of course, `3.16`.\n\n`![images](images/0509.jpg)`\n\n***Figure 5-9.** Sample\
    \ result of the `SQRT` function*\n\nWhen you need to calculate the square root\
    \ of a negative value, use the `ABS` function to remove the minus sign (see the\
    \ description of the `ABS` function). Strictly speaking, this is not correct from\
    \ a mathematical point of view, because you cannot compute a square root of a\
    \ negative number, but it is perfectly acceptable when you deal with the results\
    \ produced by financial functions. If you are using a method that specifically\
    \ forbids this trick, you need to work with complex numbers.\n\nOpenOffice.org\
    \ Calc does provide functions for dealing with complex numbers if you need to\
    \ obey the laws of mathematics. A proper discussion of complex numbers is outside\
    \ of the scope of this book, but any decent college math textbook will help you\
    \ understand them.\n\nAlso see the section on the `POWER` function.\n\n### Sum\
    \ of Many Arguments (SUM)\n\n#### Syntax: `SUM(x1; x2; … x30)`\n\nThe `SUM` function\
    \ adds up to 30 arguments `x1`, `x2`, … `x30` and each such argument can be a\
    \ range of cells. For example:\n\n```\n=SUM(M1:N23; Z2:AA23)\n```\n\nadds all\
    \ cells from ranges `M1:N23` and `Z2:AA23`.\n\n`![images](images/0510.jpg)`\n\n\
    ***Figure 5-10.** Sample result of the `SUM` function*\n\nSee also the section\
    \ on the `PRODUCT` function.\n\n### Sum of Squares of Many Arguments (SUMSQ)\n\
    \n#### Syntax: `SUMSQ(x1; x2; … x30)`\n\nThe `SUMSQ` function adds squares of\
    \ up to 30 arguments `x1`, `x2`, … `x30` and each such argument can be a range\
    \ of cells. For example:\n\n```\n=SUMSQ(M1:N23; Z2:AA23)\n```\n\nadds all squares\
    \ of the numeric values held in cells from ranges `M1:N23` and `Z2:AA23`.\n\n\
    `![images](images/0511.jpg)`\n\n***Figure 5-11.** Sample result of the `SUMSQ`\
    \ function*\n\nSee also the section on the `SUM` function.\n\n## C H A P T E R\
    \  6\n\n## Utility Mathematical Functions\n\nIn this chapter, you will get to\
    \ know useful functions that help you solve many practical problems related to\
    \ crunching numbers."
