- fmt: '### Conditional Functions


    Conditional functions are used to add some built-in “artificial intelligence”
    to your worksheets. They compare text strings and their results (`true` or `false`)
    can be used to change the appearance of the worksheet or the way calculations
    are done.


    ### Comparing Strings (`EXACT`)


    #### Syntax: `EXACT(t1; t2)`


    `EXACT` compares two strings and returns `1` if they are exactly the same or `0`
    if they are not. For example:


    ```

    =EXACT("OpenOffice.org"; "OpenOffice.org")

    ```


    returns `1`, while


    ```

    =EXACT("OpenOffice.org"; "openoffice.org")

    ```


    returns `0`.


    ![images](images/1008.jpg)


    ***Figure 10-8.** Sample result of the `EXACT` function*


    ## C H A P T E R  11


    ## Utility Functions


    Utility functions discussed in this chapter are used to perform various formatting
    chores and return useful information about text strings. They can help you in
    analysis of textual data, making OpenOffice.org Calc an even more useful tool.


    ### ASCII Character (`CHAR`)


    #### Syntax: `CHAR(Number)`


    The `CHAR` function returns an ASCII character whose `number` is `0` to `255`.
    For example:


    ```

    =CHAR(64)

    ```


    returns the character `@`.


    ![images](images/1101.jpg)


    ***Figure 11-1.** Sample result of the `CHAR` function*


    The characters displayed on screen may differ depending on the system’s language
    and display font settings.


    ### ASCII Code (`CODE`)


    #### Syntax: `CODE(Text)`


    The `CODE` function returns the code of the first character in the given string.
    For example:


    ```

    =CODE("OpenOffice.org")

    ```


    returns `32`.


    ![images](images/1102.jpg)


    ***Figure 11-2.** Sample result of the `CODE` function*


    ### Left-Side Substring (`LEFT`)


    #### Syntax: `LEFT(Text; n)`


    The `LEFT` function returns the first character from the string text, or a specified
    number of `n` characters starting from the left. For example:


    ```

    =LEFT("OpenOffice.org")

    ```


    returns `O`, and


    ```

    =LEFT("OpenOffice.org"; 4)

    ```


    returns `Open`.


    ![images](images/1103.jpg)


    ***Figure 11-3.** Sample result of the `LEFT` function*


    See also `MID` and `RIGHT`.


    ### Length of a String (`LEN`)


    #### Syntax: `LEN(Text)`


    The `LEN` function returns the length of the given string. For example:


    ```

    =LEN("OpenOffice.org")

    ```


    returns `14`.


    ![images](images/1104.jpg)


    ***Figure 11-4**. Sample result of the `LEN` function*


    ### Middle (`MID`)


    #### Syntax: `MID(Text; Start; n)`


    The `MID` function returns a substring of the `text` string, starting from the
    `start` position and containing a given number of characters (`n`). For example:


    ```

    =MID("OpenOffice.org"; 2; 6)

    ```


    returns `penOff`.


    ![images](images/1105.jpg)


    ***Figure 11-5.** Sample results of the `MID` function*


    See also `LEFT` and `RIGHT`.


    ### Repeat String (`REPT`)


    #### Syntax: `REPT(Text; Repetitions)`


    The `REPT` function creates a string that consists of a given string (`text`)
    repeated (`n`) number of times. For example:


    ```

    =REPT("Open"; 4)

    ```


    returns `OpenOpenOpenOpen`.


    ![images](images/1106.jpg)


    ***Figure 11-6.** Sample results of the `REPT` function*


    ### Right-Side Substring (`RIGHT`)


    #### Syntax: `RIGHT(Text; n)`


    The `RIGHT` function returns the last `n` characters from the end of the string
    text, or a specified number of characters (`n`) starting from the right. For example:


    ```

    =RIGHT("OpenOffice.org", 4)

    ```


    returns `.org` and


    ```

    =RIGHT("OpenOffice.org"; 6)

    ```


    returns `ce.org`.


    ![images](images/1107.jpg)


    ***Figure 11-7.** Sample results of the `RIGHT` function*


    See also `LEFT` and `MID`.


    ### Obfuscate (`ROT13`)


    #### Syntax: `ROT13(Text)`


    The `ROT13` function encrypts text using a simple algorithm called Caesar’s Code,
    where each letter is replaced by one of the `13` characters in the Latin alphabet.


    Rotating the encoded text by `13` again returns the original string. For example:


    ```

    =ROT13("OpenOffice.org")

    ```


    returns `BcraBssvpr.bet`, while


    ```

    =ROT13(ROT13("OpenOffice.org"))

    ```


    returns `OpenOffice.org`.


    ![images](images/1108.jpg)


    ***Figure 11-8.** Sample results of the `ROT13` function*


    It is not a very strong form of protecting data, but it is enough to keep it from
    being accidentally revealed to someone who might be “just looking.”


    ### Return Text Values Only (`T`)


    #### Syntax: `T(Value)`


    The `T` function is a bit strange. It returns the text string given to it as its
    argument. For example:


    ```

    =T("OpenOffice.org")

    ```


    returns `OpenOffice.org`, but


    ```

    =T(10)

    ```


    returns `""` because `10` is not a text string.


    ![images](images/1109.jpg)


    ***Figure 11-9.** Sample results of the `T` function*


    This function is obsolete and it is here only because of compatibility requirements
    with the previous OpenOffice spreadsheet software.


    ## C H A P T E R  12


    ## Time & Date Functions


    We all know what dates are and what we mean when we say “I need it done in three
    days,” but such natural expressions are not so easy for computers. Unfortunately,
    computations that involve time and dates are essential in business and cannot
    be ignored. Without them it would be very difficult to judge the potential profitability
    of a planned business venture, the real cost of a loan, or the future value of
    an investment.


    A lot of financial functions greatly benefit from the use of date functions, because
    they make it possible to automate a lot of time-based calculations. Automating
    things is always a good idea, because it saves you time and money.


    There are two kinds of OpenOffice.org Calc time-related functions: **date functions**
    (for bigger chunks of time: days, weeks, months, or years) and **time functions**
    (for shorter periods of time: hours, minutes, or seconds). That distinction exists
    for your own comfort only, because all date and time calculations in OpenOffice.org
    Calc are based on the same fractional number (a.k.a. “timestamp”) that represents
    the number of seconds that have elapsed since a subjectively chosen moment in
    time called an Epoch, which is a fancy way of saying the time counter value was
    equal to `00:00:00.00` (i.e., zero).


    You can set the Epoch yourself (choose **Tools** ![images](images/U001.jpg) **Options**
    and select the **Calculate** item in the **OpenOffice.org Calc** branch to display
    a panel where you can choose one of the three available Epochs) (see the **Date**
    section in [Figure 12-1](#Chapter12.html#fig_12_1)).


    ![images](images/1201.jpg)


    ***Figure 12-1.** Set the Epoch in the Date section.*


    Unless you have old documents created well before the year `2000`, you should
    always use the default Epoch of `12/30/1899`.


    Whichever Epoch you choose, the count starts at midnight. For the standard Epoch,
    OpenOffice.org Calc can recognize years between `1583` and `9956`, or, if you
    enter them as two-digit years, from `19XX` to `20XX`–1. If you decide to use the
    shorter notation, i.e., `12/15/20` instead of `12/15/2020`, you will have to tell
    OpenOffice.org Calc how it should convert two-digit years into four-digit years.


    You do this in the **Options** dialog box in the **General** branch (choose **Tools**
    ![images](images/U001.jpg) **Options**) as shown in [Figure 12-2](#Chapter12.html#fig_12_2).


    ![images](images/1202.jpg)


    ***Figure 12-2.** Set two-digit years in the Year section.*


    When you change Epochs or the two-year conversion settings always do it before
    opening or creating a worksheet to make sure that the dates are interpreted in
    a consistent manner.


    The date functions can be divided into the following groups:


    *   Functions that return a timestamp.

    *   Functions that extract date components.

    *   Functions that calculate the difference between dates.'
