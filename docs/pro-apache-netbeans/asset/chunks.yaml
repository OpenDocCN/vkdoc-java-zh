  trans: '

    *   **可扩展开发**：团队可以通过模块系统强制执行的明确边界来并行工作。


    *   **安全性**：无法访问 JVM 的内部类（例如 `Unsafe`）。


    *   **优化**：可以通过检查（传递性）依赖关系来应用优化。这也为创建用于分发的精简模块配置提供了可能性。


    因此，JDK 现在由 19 个平台模块组成。


    正如第 3 章所述，模块具有名称（例如 `java.base`），将相关代码和可能的其他资源分组，并通过*模块描述符*进行描述。就像包在 `package-info.java`
    中定义一样，模块在 `module-info.java`（位于根包中）中定义。模块化 jar 是内部包含 `module-info.class` 的 jar。在第
    3 章中，我们还了解了 NetBeans 如何为 Java 9 模块提供支持。


    表 7-2 提供了 NetBeans 模块 API 与 Java 9 模块化 API 之间的比较。


    表 7-2


    NetBeans 模块 API 与 Java 9 模块对比


    |   | Java 9 模块 | NetBeans 模块 API |

    | --- | --- | --- |

    | **封装** | ✓ | ✓ |

    | **接口** | ✓ | ✓ |

    | **显式依赖** | ✓ | ✓ |

    | **版本控制** | **✗** | ✓ |

    | **循环依赖∗** | ✓ | ✓ |

    | **服务** | `ServiceLoader` | `ServiceProvider` |


    如前所述，两个模块系统都支持封装和导出公共接口，并显式处理依赖关系，同时两者都不允许循环依赖。Java 9 在编译时不允许循环依赖，但在运行时允许。Java
    9 模块系统不支持版本控制，这一点受到了 Java 社区的批评。


    如前所述，NetBeans RCP 通过查找和 `ServiceProvider` 接口实现了模块间的松散耦合。另一方面，Jigsaw 使用了 Java 6
    中基于查询的方法，即 `ServiceLoader`（清单 7-7）。


    ```

    ServiceLoader serviceLoader =

    ServiceLoader.load(Provider.class);

    for (Provider provider : serviceLoader) { return provider; }

    ...

    ServiceLoader serviceLoader =

    ServiceLoader.load(Provider.class).stream().filter(...);

    清单 7-7

    ServiceLoader 接口

    ```


    然而，`ServiceLoader` 存在一些问题：


    *   它不是动态的（无法在运行时安装/卸载插件或服务）。


    *   它在启动时加载所有服务（导致启动时间更长，内存占用更多）。


    *   它无法配置；只有一个标准构造函数，并且不支持工厂方法。


    *   它是一个行为硬编码的 final 类，因此无法扩展。


    *   它不允许排序/定序，即我们无法选择先加载哪个服务。


    Java 9 对 Java 6 的 `ServiceLoader` 引入了一些修改：


    *   无相对服务；新的基于模块的服务定位器没有相对行为。


    *   服务（按其发现顺序）的排序丢失了。


    *   模块路径上的所有服务接口和实现都被扁平化为一个单一的全局命名空间。


    *   服务加载没有可扩展性/可定制性；服务层提供者必须预先提供可用服务的固定映射。


    *   多站点声明；每个使用服务的模块还必须在模块描述符中声明该服务正在被使用；没有全局的层范围服务注册表。


    `ServiceProvider` 没有 `ServiceLoader` 的缺点。它是动态的，因此您可以在应用程序运行时插入/拔出模块，它不会在启动时加载所有服务，并且允许您设置优先级（通过
    `position` 属性）。它是可扩展的，支持监听器，理解 NetBeans 平台模块系统，并且可以根据需要创建任意数量的 `Lookup`（每个类加载器只能有一个
    `ServiceLoader` 实例）。


    现在，关键问题来了：


    *   应该使用哪个模块系统？


    *   Jigsaw 模块系统和 NetBeans 模块 API 能否协同工作？


    正如我们所看到的，两个模块系统各有优缺点。NetBeans 模块系统 API 也可以在 NetBeans 之外使用；只需使用相关的 JAR 文件（可以在 NetBeans
    IDE 安装目录的 `platform/lib` 文件夹中找到）：`boot.jar, core.jar, org-openide-filesystems.jar,
    org-openide-modules.jar` 和 `org-openide-util.jar`。


    不要混淆模块系统，也就是说，不要在项目中同时使用 Jigsaw 和 NetBeans 模块系统。这只会不必要地使事情复杂化，并且不会为您的应用程序带来任何额外的好处。

    '
- fmt: '# The File System API


    The NetBeans Platform File System API provides an abstraction for standard files.
    The File System API handles both files and folders (you can think of them as resources)
    on the physical file system as well as on the NetBeans virtual file system (e.g.,
    they may reside in memory, in a JAR or ZIP or XML file, or even on a remote server).


    A `FileSystem` is a collection of `FileObject`s that can reside anywhere. A `FileSystem`
    is hierarchical and has a root. A `FileObject` represents either a file or a directory
    (folder) in the `FileSystem`; it must physically exist in the `FileSystem` (unlike
    Java''s `java.io.File`) and has a MIME type, which determines how the file is
    handled. A `FileObject` is an implementation of the Composite design pattern,
    that is, it can contain other `FileObject`s (files or subdirectories). A `FileObject`
    also includes support for attributes (which are key-value pairs of type `String`).


    You may listen for changes to a `FileObject` (such as file/folder creation, renaming,
    modification, deletion, or attribute changing) with the `FileChangeListener` interface.
    Finally, `FileUtil` is a utility class with many methods that manipulates `FileSystem`s,
    `FileObject`s, and even standard `java.io.File` objects.


    A summary of the above is depicted in Figure [7-5](#479166_1_En_7_Chapter.xhtml#Fig5)
    in a graphical way.


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig5_HTML.jpg](Images/479166_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Class diagram of the FileSystem API main classes


    Let''s see some code examples (Listings [7-8](#479166_1_En_7_Chapter.xhtml#PC19)
    and [7-9](#479166_1_En_7_Chapter.xhtml#PC20)).


    ```

    String aPath = ...;

    File dir = new File(aPath);

    FileObject myfolder = FileUtil.toFileObject(dir);

    if (null == myfolder) {

    try {

    // Create folder

    myfolder = FileUtil.createFolder(dir);

    } catch (IOException ex) {

    Exceptions.printStackTrace(ex);

    }

    }

    if (myfolder != null) {

    // Is there a file called myfile.txt in this folder?

    FileObject myfile = myfolder.getFileObject("myfile.txt");

    if (null == myfile) {

    try {

    // Create file

    myfile = myfolder.createData("myfile.txt");

    } catch (IOException ex) {

    Exceptions.printStackTrace(ex);

    }

    }

    }

    if (myfile != null) {

    // write some text to myfile

    if (myfile.canWrite()) {

    try (PrintWriter output =

    new PrintWriter(myfile.getOutputStream())) {

    output.println("This is some text");

    } catch (IOException ex) {

    Exceptions.printStackTrace(ex);

    }

    }

    // read file

    if (myfile.canRead()) {

    System.out.println("MIME Type: " + myfile.getMIMEType());

    try {

    for (String line : myfile.asLines()) {

    System.out.println(line);

    }

    } catch (IOException ex) {

    Exceptions.printStackTrace(ex);

    }

    }

    }

    // Rename myfile.txt; requires a lock

    FileLock lock = null;

    try {

    lock = myfile.lock();

    // Rename will fail if the new name already exists.

    myfile.rename(lock, "mynewfile", myfile.getExt());

    } catch (IOException ex) {

    Exceptions.printStackTrace(ex);

    } finally {

    if (lock != null) {

    lock.releaseLock();

    }

    }

    try {

    // delete file; FileObject delete() method takes care of

    // acquiring and releasing a lock. Deleting a FileObject

    // folder recursively deletes its contents.

    myfile.delete();

    } catch (IOException ex) {

    Exceptions.printStackTrace(ex);

    }

    ```


    Listing 7-8


    FileSystem API examples


    The previous example created a new folder, a new file inside it, renamed the file,
    and then deleted it. As already mentioned, you can attach `FileChangeListener`s
    to `FileObject`s (either files or folders) and also attach recursive `FileChangeListener`s
    to folders in a directory tree. The `FileChangeListener` interface has six methods
    to override as shown in Listing [7-9](#479166_1_En_7_Chapter.xhtml#PC20).


    ```

    private final FileChangeListener fcl = new FileChangeListener() {

    @Override

    public void fileFolderCreated(FileEvent fe) { ... }

    @Override

    public void fileDataCreated(FileEvent fe) {    ... }

    @Override

    public void fileChanged(FileEvent fe) { ... }

    @Override

    public void fileDeleted(FileEvent fe) { ... }

    @Override

    public void fileRenamed(FileRenameEvent fre) { ... }

    @Override

    public void fileAttributeChanged(FileAttributeEvent fae) { }

    }

    myfolder.addRecursiveListener(fcl);

    ```


    Listing 7-9


    FileChangeListener interface


    ## System FileSystem or Layer.xml


    A file system in the NetBeans Platform is a generic and highly abstract concept.
    A NetBeans Platform file system is a place where you can hierarchically store
    and read files, and it doesn''t have to be on a physical disk. A concrete implementation
    of this is in the `MultiFileSystem` class, which lets you construct a single namespace
    that merges a set of discrete file systems called layers and acts as if the content
    of all of them live in the same namespace. For example, if two different layers
    contain a folder `MyFolder` with different content, listing the content of the
    `MultiFileSystem MyFolder` folder gives you the content of both. To deal with
    collisions (i.e., two files with the same name and path), `MultiFileSystem` contains
    a stack order of layers, meaning the one on top is used. NetBeans'' implementation
    of a `MultiFileSystem` is the so-called System FileSystem. It is used to define
    all of the actions, menus, menu items, icons, key bindings, toolbars, and services
    available in your application.


    It can be viewed from the Files window under the `build` directory as `classes/METAINF/generated-layer.xml`.
    In previous versions of NetBeans, the developer had to edit a `layer.xml` file
    like the above in order to configure actions, menu and toolbar items, key bindings,
    service providers, etc. Nowadays, all these should be taken care by annotations,
    as we shall see in the next chapter. However, there are still some specialized
    things that you can only do by editing this file. Furthermore, the `layer.xml`
    file is the gateway to your NetBeans Platform application''s complete configuration
    data. The FileSystem API handles this virtual file system in the same way (Listing
    [7-10](#479166_1_En_7_Chapter.xhtml#PC21)).


    ```

    FileObject root = FileUtil.getConfigRoot();

    FileObject someFolder = FileUtil.getConfigFile("someFolder");

    JToolBar tb = FileUtil.getConfigObject("/path/to/fileobject", JToolBar.class)

    ```


    Listing 7-10


    Accessing layer.xml with the FileSystem API


    The System FileSystem provides another type of inter-module communication (the
    other is the `Lookup`). Using the `layer.xml` file, a module can register folders
    and files that another module can use.


    ## The File System API vs. Java NIO


    The NetBeans File System API existed before the Java NIO2, which was introduced
    in Java 7. Java NIO2 provides similar functionalities as the NetBeans FileSystem
    API. Table [7-3](#479166_1_En_7_Chapter.xhtml#Tab3) is a comparison of the basic
    classes of the two (not a 100% match).


    Table 7-3


    FileSystem API vs. Java 7 NIO2


    | FileSystem API | Java 7 NIO2 |

    | --- | --- |

    | `org.openide.filesystems.FileSystem` | `java.nio.file.FileSystem` |

    | `org.openide.filesystems.FileObject` | `java.nio.file.Path` |

    | `-` | `java.nio.file.attribute` |

    | `org.openide.filesystems.FileUtil` | `java.nio.file.Files` / `java.nio.file.FileVisitor`
    |

    | `org.openide.filesystems.FileChangeListener` | `java.nio.file.WatchService`
    / `java.nio.file.Watchable` / `java.nio.file.StandardWatchEventKinds` |

    | `-` | `java.nio.channels.*` |


    Which one to use depends on your application. If you wish to develop an application
    that will display the files/folders to a GUI using the NetBeans RCP, it would
    be better for you to use the NetBeans FileSystem API. NIO2 is a more powerful
    API than the FileSystem API (which was created mainly to manage `layer.xml`),
    however the NetBeans FileSystem API is simpler and more straightforward.'
