  trans: '

    网站

    Apache NetBeans 最显眼的在线存在形式是其网站。

    网站是几乎任何人都可以参与的领域之一，无论是精通编码的技术人员，还是非常出色的编辑……网站可以充分利用来自各个方向的人才。Apache NetBeans 主网站可通过以下
    URL 访问：[`http://netbeans.apache.org`](http://netbeans.apache.org)，构成网站的源代码可在 GitHub
    上获取：[`https://github.com/apache/incubator-netbeans-website`](https://github.com/apache/incubator-netbeans-website)。Apache
    NetBeans 网站的 GitHub 仓库实际上包含了 [`netbeans.apache.org`](https://netbeans.apache.org)
    和 [`bits.netbeans.org`](https://bits.netbeans.org) 的源代码。`bits.netbeans.org` 站点专门用于
    Apache NetBeans 的发布文档。


    开始处理 Apache NetBeans 网站的最佳方式是复刻（fork）GitHub 仓库并将其克隆到您的开发机器上。要复刻仓库，首先使用您的账户登录 GitHub，然后转到
    Apache NetBeans 网站 GitHub 仓库，点击页面右上角标有“Fork”的按钮。这将在您自己的 GitHub 账户下创建该仓库的一个副本。这样，如果您对网站进行更改，就不会影响主
    Apache NetBeans 网站仓库。需要注意的是，发布到 Apache NetBeans 网站仓库的更改会通过 Jenkins 自动部署并集成到网站中。因此，一旦提交更改，所有人都能看到。出于这个原因，务必在您自己的复刻仓库中进行任何网站工作或修改，如果您希望将工作集成到主仓库并进而发布到网站上，请从您的复刻仓库创建一个拉取请求（Pull
    Request）。


    将您的复刻仓库克隆到本地机器后，就可以深入研究网站源代码了。该网站主要通过 Groovy 模板生成，利用 Gradle 构建和一套名为 Jbake 的工具集来准备站点。最终，通过运行
    Gradle 构建来静态编译网站。源代码中还附带了一个 Tomcat Web 服务器，以便您在开发过程中可以非常轻松地构建和运行网站。按照 Apache NetBeans
    网站 GitHub 页面以及随源代码打包的 `README.asciidoc` 文件中的说明，对网站进行更改非常容易。事实上，这些说明非常详细，我建议在开始处理网站源代码之前先查阅文档：

    [`https://github.com/apache/incubator-netbeans-website/tree/master/netbeans.apache.org`](https://github.com/apache/incubator-netbeans-website/tree/master/netbeans.apache.org)


    进行网站页面更新

    首先，让我们逐步了解如何对网站进行简单更改、构建它，并利用内置的 Tomcat 服务器运行它。除了在设备上安装 Java 8 之外，无需进行任何其他安装即可构建和运行站点。Gradle
    构建将负责下载构建所需的所有依赖项。


    有多种类型的文件共同用于创建网站。一系列 `asciidoc` 文档用于构建网站页面本身，而 Groovy 服务器页面（gsp）则用于模板。假设我们需要对
    [`netbeans.apache.org`](https://netbeans.apache.org) 主页进行更改。为此，请进入源代码中的 `netbeans.apache.org`
    文件夹，然后导航到 `src/content` 文件夹。这是网站主要内容所在的位置。通过执行以下操作修改网站索引页面：


    1.  在文本编辑器或 Apache NetBeans 中打开 `index.asciidoc` 文件。


    2.  对页面进行修改。在本例中，我想将索引页面某个卡片中的单词“Participation”改为“Participation!”。转到 `index.asciidoc`
    文件的第 39 行并进行更改。


    3.  通过在命令行或终端中，在 `netbeans.apache.org` 文件夹内执行以下命令来构建站点。


    1.  OS X 和 Linux：`./gradlew build`


    2.  Windows：`gradlew preprocessContent bake`


    4.  构建完成后，您可以在 `netbeans.apache.org/build/bake` 文件夹中看到生成的输出。通过执行以下命令运行 Tomcat
    服务器：


    1.  OS X 和 Linux：`./gradlew run`


    2.  Windows：`gradlew run`


    5.  Tomcat 服务器启动并运行后，将浏览器指向以下站点以查看生成的输出：`http://localhost:8080`


    要停止服务器，请在同一个终端或命令提示符中按 Ctrl+C，或者在 `netbeans.apache.org` 目录下的终端或命令提示符中发出 `gradlew
    stop` 命令。


    进行网站模板更新

    如果您有兴趣修改网站的整体布局和结构，那么修改用于构建页面的模板之一可能是有意义的。可以通过进入 `netbeans.apache.org/src/content/templates`
    文件夹来修改模板。每个模板都由一个 Groovy 服务器页面（gsp）构成。这些文件可以在文本编辑器或 Apache NetBeans 中打开和修改。修改模板页面的总体流程与上一节中的相同。但是，模板修改可能会影响多个生成的页面，因为单个模板可能应用于网站中的一个或多个页面。


    总结

    作为社区成员，有多种方式可以协作并帮助为 Apache NetBeans 项目做出贡献，甚至无需编写一行代码。问题跟踪器（JIRA）是最明显的起点，可以通过提交发现的问题，或在跟踪器中撰写答案和评论来帮助他人。Wiki
    是一个不断变化的文档站点，对 Apache NetBeans 的成功至关重要。我们请求社区成员通过添加必要的文档或更新多年来发生变化的任何文档来参与其中。要扮演更正式的贡献者角色，可以处理网站并提交拉取请求（PR）来修改站点。最终，任何数量的贡献都将大大有助于推动项目走向未来。


    14. 关于测试的 NetCAT 计划


    Apache *Net*Beans IDE *社*区*验*收*测*试（NetCAT）计划（[`https://netbeans.apache.org/participate/netcat.html`](https://netbeans.apache.org/participate/netcat.html)）旨在获取关于主要功能的早期反馈，并从
    NetBeans 社区确认产品质量已达到正式发布的标准。该计划的目标是让活跃的 Apache NetBeans 社区成员参与测试 Apache NetBeans
    IDE 开发版本，并就产品的可用性、质量和性能提供反馈。作为回报，这些志愿者将有机会显著影响 Apache NetBeans IDE 的质量。NetCAT
    计划关注的是*质量验收*，而*不是*功能设计。在计划结束时，您将被要求提交一份*社区验收（CA）*调查，在其中您可以表达您对新主要功能是否准备好发布的观点。


    时间安排

    一个典型的 NetCAT 计划大约需要两个月的活动时间，如下表所述。


    表 14-1

    NetCAT 计划活动


    开始日期 | 描述 |


    | --- | --- | --- | --- | --- |


    2019-02-01 | 准备 - 日程、页面、Synergy（3 天） |


    2019-02-04 | 发送 NetCAT 11.0 邀请，参与者开始加入 |


    2019-02-07 | 准备 Synergy 测试运行 |

    '
- fmt: '# 2019-02-11

    Tribes updated, test assignments created (1 per participant), testing starts on
    `vc1`.


    # 2019-02-21

    Request to switch to `vc2` sent.


    # 2019-02-25

    1/2-way sync-up with tribe leaders.


    # 2019-03-07

    Request to switch to `vc3` sent.


    # 2019-03-11

    Community Acceptance survey launched for `vc3`.


    # 2019-03-18

    Certification completed, blockers fixed in `vc4` or waived.


    # 2019-03-22

    Community Acceptance survey closed and results published, satisfaction survey
    launched.


    # 2019-03-28

    *Apache NetBeans 11.0 released*


    # 2019-03-29

    Satisfaction survey closed and results published, NetCAT 11 closed.


    ## How to Participate

    If you would like to help NetBeans become the best IDE, simply subscribe to `netcat-subscribe@netbeans.incubator.apache.org`
    mailing list to get updates about the NetCAT program. The main communication channels
    are JIRA (`https://issues.apache.org/jira/browse/NETBEANS`) and the `netcat@netbeans.incubator.apache.org`
    mailing list. You must also register yourself in the *NetCAT XX.0*^([⁵](#fn5))
    *Participants Wiki page* (`https://cwiki.apache.org/confluence/display/NETBEANS/NetCAT+XX.0+Participants`)
    or send an e-mail with the requested information to the NetCAT mailing list you
    subscribed to in the previous step if you cannot edit this Wiki page. You need
    to provide your availability per week and also one or more tribes. We describe
    what a tribe is next.


    As a member of the NetCAT team you are expected to provide feedback on the functional
    areas (or tribes) you chose to focus on. Though it is perfectly acceptable to
    only evaluate milestone builds, we would truly appreciate it if you used and tested
    the daily development builds.


    Finally, create an account in NetBeans Synergy (`http://netbeans-vm.apache.org/synergy/client/app/%2523/register`)
    test case management system (`http://netbeans-vm.apache.org/synergy`).


    ## What Are NetCAT Tribes?

    A NetCAT Tribe is a group of NetCAT participants focusing primarily on testing
    one particular functionality area of NetBeans. You declare which tribe you wish
    to participate in when you register in Confluence (see previous section).


    Tribe members review and keep up-to-date test specifications for their functionality
    area, then perform full or sanity testing, and eventually provide either Go or
    NoGo recommendations according to a fixed schedule (see Table [14-1](#479166_1_En_14_Chapter.xhtml#Tab1)).


    A list of tribes and what each tribe includes is provided in Synergy (`http://netbeans-vm.apache.org/synergy/client/app/#/tribes`).
    A summary is provided in Table [14-2](#479166_1_En_14_Chapter.xhtml#Tab2).


    ### Table 14-2 NetCAT Tribes


    | Prefix | Tribe |

    | --- | --- |

    | [ant] | Ant |

    | [c/c++] | C/C++ |

    | [db] | Databases |

    | [debug] | Debugger |

    | [groovy] | Groovy |

    | [gui] | GUI Builder |

    | [jee] | Java EE |

    | [editor] | Editor |

    | [fx] | Java FX |

    | [maven] | Maven |

    | [php] | PHP |

    | [profiler] | Profiler |

    | [python] | Python |

    | [rcp] | Rich Client Platform (RCP) |

    | [services] | Services |

    | [unit] | Unit Testing |

    | [vcs] | Version Control |

    | [web] | Web Client |


    The first column in Table [14-2](#479166_1_En_14_Chapter.xhtml#Tab2) denotes the
    subject prefix to use when you send e-mails to the `netcat@netbeans.incubator.apache.org`
    mailing list.


    ### Tribe Leader

    You may also choose to become a tribe leader. A tribe leader’s main role is to
    distribute the functionality their tribe is focusing on among fellow tribe members
    to achieve maximum testing coverage and then coordinate the works. Such coordination
    could take an hour or two every week. The full testing is typically several weeks
    long and certification of the final GA candidate build just a few days. During
    these periods the tribe leader does the following:'
