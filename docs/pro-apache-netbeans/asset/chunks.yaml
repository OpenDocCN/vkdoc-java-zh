    # 3. Apache NetBeans: New Features


    The Apache NetBeans IDE has made a number of advances since the release of NetBeans
    8.2, the last release under Oracle Corporation. The release cadence has stayed
    closely in-line with the release cadence of Java, and therefore, there has been
    a number of releases in a short period of time since open sourcing of the IDE.
    Apache NetBeans 9 focused on modularity support and JShell. Release 10 contained
    new features such as JDK 11 support and PHP. Apache NetBeans 11 targeted JDK 12
    support, Java EE, and Gradle support.


    ### Note


    It is important to note that in order to utilize support for a particular JDK
    release feature, you must be running Apache NetBeans on the same JDK release or
    a greater JDK release. One can easily set Apache NetBeans to run under a different
    version of the JDK by setting the `netbeans_jdkhome` property within the `netbeans/etc/netbeans.conf`
    configuration file.


    In this chapter, we will take a brief tour covering some of the most important
    new features of these past few releases. This chapter will not take a deep dive
    into these features, as the intention is to provide a quick overview. However,
    many of the features mentioned in this chapter contain larger sections elsewhere
    in this book, which go into much more detail.


    ## Apache NetBeans 9.0


    The significant new features of Apache NetBeans 9.0 included modularity support,
    local variable type inference, and JShell. In this section, we will provide a
    brief look into each of these features, giving you a quick look at their usage.


    ### Jigsaw (Modularity) Support


    Perhaps the largest new feature of the JDK in its entire lifetime has been the
    release of the Java Modularity system, better known as Jigsaw. The modularity
    system in the Java Platform allows one to break down applications into modules,
    rather than as one large monolithic application.


    As part of the module system, the `Modulepath` has taken precedence over the `CLASSPATH`.
    The `Modulepath` was added to Apache NetBeans in order to provide support for
    modules, along with compatibility for those applications that still make use of
    the `CLASSPATH`.


    A standard Java SE project can be made into a module by adding a `module-info.java`
    file to its default package. The Apache NetBeans IDE has full support for `module-info.java`,
    including auto-completion. There is also an Ant-based project type known as the
    Java Modular Project. This project type can be used to create a modular application,
    consisting of a number of modules. To begin, open the **New Project** wizard,
    and choose the **Java with Ant** category, then choose **Java Modular Project**.


    ### Local Variable Type Inference


    Local variable type inference brings the `var` keyword to the Java language. This
    allows the developer to declare a `var` type, while the compiler infers the type
    from the other local variables in the code. The Apache NetBeans IDE contains a
    number of features to assist developers in the use of local variable type inference.
    There are a number of “hints” added to the editor to help signify when code has
    been typed that would support a changeover to utilize local variable type inference.
    Hints can be clicked upon to instantly make the suggested changes.


    For instance, there is a hint to *Replace explicit type with ‘var’*, and vice
    versa. There are also hints to split compound declarations. It is all baked into
    Apache NetBeans, making code easier to read and manage.


    ### JShell


    The JShell was a long overdue feature of the Java language, as many modern languages
    nowadays have a REPL (Read Eval Print Loop) utility packaged with the distribution.
    The Java language gained a REPL in JDK 9, and it is known as JShell. This tool
    provides auto-completion and basic development/testing capabilities. It also allows
    one to execute Java dynamically on the fly, evaluating statements and blocks of
    code without compilation. The Apache NetBeans IDE contains support for JShell
    by providing an instance of the REPL within the editor pane for quick access.
    To open JShell, use the **Tools** ➤ **Open Java Platform Shell** menu option.
    Once selected, an editor window will open the JShell utility for the Java Platform
    on which Apache NetBeans is running.


    ### Note


    You must be running Apache NetBeans on JDK 9 or greater in order to utilize the
    JShell utility.


    Once in the JShell editor, the utility can be used just as it is from the command
    line. That is, one can execute Java statements or blocks without enclosing them
    into a Java class. Moreover, Java code can be executed without compilation. This
    makes the JShell editor perfect for performing testing. See Figure [3-1](#479166_1_En_3_Chapter.xhtml#Fig1).


    ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig1_HTML.jpg](Images/479166_1_En_3_Fig1_HTML.jpg)


    Figure 3-1 Apache NetBeans JShell Editor


    Utilizing JShell from within Apache NetBeans has some great benefits. When working
    within the editor, one can test code and then press the **Save to Class** button
    to save the code into a Java class with one click. JShell can also be configured
    into Ant-based Java SE applications as an agent, allowing JShell to be invoked
    by the application. The preferences pane of Apache NetBeans includes options for
    configuring JShell history, auto-open the JShell, and modifying the JDK used for
    JShell. See Figure [3-2](#479166_1_En_3_Chapter.xhtml#Fig2).


    ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig2_HTML.jpg](Images/479166_1_En_3_Fig2_HTML.jpg)


    Figure 3-2 JShell Support


    ## Apache NetBeans 10.0


    The Apache NetBeans 10.0 release included a couple of major enhancements, those
    being JDK 11 and PHP support. In this section, we will take a brief look at each
    of these features so that you can begin to explore them in their entirety.'
