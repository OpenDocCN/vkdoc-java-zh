    简而言之，你可以将任何类型的 `java.awt.Component` 作为第一个参数传递。例如，让我们通过提供一个 *Login* 对话框来扩展我们的 *TodoRCP*
    应用程序，该对话框在应用程序启动时要求输入凭据，此时应用程序应被阻塞，直到用户通过身份验证。


    保护访问


    我们不希望任何人都能访问我们的任务。我们需要通过要求输入凭据来保护对 *TodoRCP* 应用程序的访问。以下是在应用程序启动时显示登录对话框的步骤：


    1.  按照第 7 章所述创建一个新模块，确保将其添加到 *TodoRCP* 模块套件中。将模块命名为 *Login*，并将其*代码基名称*设置为 `todo.login`。


    2.  如果尚未打开，请打开 *Login* 模块；右键单击 `todo.login` 包；从弹出菜单中选择 **新建 ➤ 其他** 以显示 *新建文件*
    对话框；选择 *Swing GUI 窗体* 类别；然后选择 *JPanel 窗体* 文件类型。单击 **下一步**。


    3.  在步骤 2 中，在 *类名* 字段中输入 `LoginPanel`，然后单击 **完成**。


    4.  使用以下内容创建图 10-6 所示的登录表单：


    *   用户名的标签：`lblUsername`


    *   密码的标签：`lblPassword`


