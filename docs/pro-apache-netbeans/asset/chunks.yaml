  trans: "\n## 查找 API\n\nNetBeans 采用基于组件的开发方式。由独立团队或个人开发的模块或组件，必须能够以松散耦合的方式进行相互通信。\n\
    \n之前我们了解了模块系统如何让你将应用程序拆分为松散耦合的部分。这些模块也需要一种松散耦合的方式来相互通信。这正是 *Lookup* API 发挥作用的地方。\n\
    \n软件设计史上最大的挑战之一，就是如何设计具有*高内聚*特性的*松散耦合*系统。根据维基百科（[`https://en.wikipedia.org/wiki/Loose_coupling`](https://en.wikipedia.org/wiki/Loose_coupling)）的定义：“在[计算](https://en.wikipedia.org/wiki/Computing)和[系统设计](https://en.wikipedia.org/wiki/Systems_design)领域，松散耦合系统是指其每个组件对其他独立组件的定义知之甚少或一无所知，并且很少或完全不加以利用的系统。”\n\
    \n*内聚*意味着与特定功能相关的所有代码（和资源）都应组织在同一个模块或同一组模块中。而*耦合*则指模块之间相互依赖的程度。模块应尽可能相互独立，使得组件可以在不对应用程序产生重大影响的情况下被修改或移动。内聚程度越高，耦合程度越低，架构在未来的修改中就越可持续、越健壮（维护上的麻烦也越少）。\n\
    \n假设 `Client` 和 `ProviderImpl` 存在于两个不同的模块中（见图 7-4）。`Client` 如何（以松散耦合的方式）找到 `ProviderImpl`？Spring\
    \ 通过其 xml 文件使用*依赖注入*或*控制反转*。Java 6 使用基于查询的方法，即 `ServiceLoader`，我们将在本章稍后简要介绍。\n\
    \nNetBeans RCP 引入了一种实现松散耦合的新方式，即 `@ServiceProvider`：\n\n![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig4_HTML.jpg](img/479166_1_En_7_Fig4_HTML.jpg)\n\
    \n图 7-4\n\n一个松散耦合的系统\n\n```\n@ServiceProvider(service = Provider.class, position=1)\n\
    public class ProviderImpl implements Provider { }\n```\n\n神奇之处在于第一行，它告诉 NetBeans\
    \ 这个类是服务 `Provider.class` 的一个实现。NetBeans 会在模块的 `build/classes/META-INF/services/`\
    \ 文件夹内创建一个文本文件 `package.Provider`，其中包含实现类的完全限定名，例如 `package.ProviderImpl`。如果你使用过\
    \ `ServiceLoader`，那么这对你来说并不陌生。\n\n然而，最大的问题尚未解答：客户端如何找到这个实现？在 NetBeans 中，这是通过使用\
    \ *lookups* 来完成的！客户端在*默认查找*中查找*接口*（而非实现）。*默认查找*（也称为*服务注册表*）是一个 `Lookup`，它会评估 `META-INF/services`\
    \ 文件夹中的服务声明。可以通过 `Lookup.getDefault()` 方法调用它。通过这种方式请求一个服务接口，你将收到在 `META-INF/services`\
    \ 文件夹中注册的实现类的实例。\n\n*查找*是一个可观察的映射，以类对象为键，以这些类对象的实例集合为值，即：\n\n```\nLookup = Map<Class,\
    \ Set<Instance>>\n```\n\n例如：`Map<String, Set<String>>` 或 `Map<Provider, Set<Provider>>`。\n\
    \n它被创建出来是为了实现组件间的绑定和依赖关系。\n\nNetBeans 提供了多种访问查找的方法（见清单 7-1）。\n\n```\nProvider\
    \ provider = Lookup.getDefault().lookup(Provider.class);\nprovider.aMethod();\n\
    清单 7-1\n访问单个实现的默认查找\n```\n\n或者，如果你有多个 `Provider` 的实现（见清单 7-2）。\n\n```\nCollection<Provider>\
    \ providers =\nLookup.getDefault().lookupAll(Provider.class);\nfor (Provider provider\
    \ : providers) { ... }\n清单 7-2\n访问多个实现的默认查找\n```\n\n你也可以请求一个 `Lookup.Result<T>`，它允许添加一个\
    \ `LookupListener` 以便获知内容变化（清单 7-3）。\n\n```\nLookup.Result<Provider> providers\
    \ =\nLookup.getDefault().lookupResult(Provider.class);\nCollection<? extends Provider>\
    \ allProviders =\nproviders.allInstances();\nproviders.addLookupListener(new LookupListener(){\n\
    @Override\npublic void resultChanged(LookupEvent e){\n// 执行某些操作\n}}\n);\n清单 7-3\n\
    添加 LookupListener\n```\n\n从上面的代码示例可以看出，客户端完全不知道它使用的是哪个实现；它只知道接口。这就是松散耦合！\n\n你可以将查找想象成内存中的一个映射，它存储了应用程序所有服务的实现。当你使用\
    \ `@ServiceProvider` 注解定义服务实现时，你就将其放入了查找中，然后使用上述命令进行搜索。服务实现可以位于不同的模块以及*非*公开的包中。\n\
    \nNetBeans 还允许你通过升序的 `position` 来排序实现，即 `@ServiceProvider` 注解的 `position` 属性中数值较小的实例会先于数值较大的实例返回。\n\
    \n我们已经看到了 `@ServiceProvider` 注解的两个属性：`service` 和 `position`。还有两个不太常用的属性：`path`，即提供者注册所在的*系统文件系统*中的路径；以及\
    \ `supersedes`，即此实现所取代的实现列表。\n\n除了用于存储服务实现的*默认查找*之外，NetBeans 中还有其他查找，这常常会引起混淆。例如，每个\
    \ `OutlineView` 或 `TopComponent` 都会关联一个查找，用于存储在特定时间被选中的节点。你不应将此查找与默认查找混淆。以下是 *Lookup*\
    \ 的简要总结：\n\n*   *全局查找*是一个单例，像一个中央注册表。有两个重要的全局查找：\n    *   *默认查找*或*服务注册表*，前面已经描述过，可通过\
    \ `Lookup.getDefault()` 获取。它是一个应用程序范围的仓库，供模块发现和提供服务。它是一个*服务*的中央注册表，允许你在 `META-INF/services`\
    \ 文件夹中查找服务实现类。因此，客户端模块可以在不了解或不依赖于其实现的情况下使用服务（模块间的松散耦合）。\n\n    *   *操作全局上下文*可通过\
    \ `Utilities.actionsGlobalContext()` 获取，它代理了当前在应用程序中获得焦点的任何组件的 `Lookup`。\n\n*\
    \   *本地查找*：类可以实现 `Lookup.Provider` 接口，并将对象存储在自己的 `Lookup` 中。你可以将查找视为一个对象可以随身携带的“对象包”（清单\
    \ 7-4）。\n\n```\npublic interface Lookup.Provider {\nLookup getLookup();\n}\n清单\
    \ 7-4\nLookup.Provider 接口\n```\n\n例如，`TopComponent`（我们将在下一章看到）实现了这个接口（清单 7-5）。\n\
    \n```\nTopComponent tc = WindowManager.getDefault().findTopComponent(\"aTopComponent\"\
    );\nLookup tcLookup = tc.getLookup();\n清单 7-5\nTopComponent 的 Lookup\n```\n\n\
    `TopComponent`（类似于 `JFrame`）通常会将任何被选中的内容放入其 `Lookup` 中。你可以通过向 `TopComponent` 添加监听器来跟踪选择内容（清单\
    \ 7-6）。\n\n```\nLookup.Result<Node> result = tcLookup.lookupResult(Node.class);\n\
    Collection<? extends Node> allNodes = result.allInstances();\nresult.addLookupListener(myLookupListener);\n\
    清单 7-6\n向 TopComponent 添加 LookupListener\n```\n\n你也可以为 `TopComponent` 提供你自己的 `Lookup`：\n\
    \n```\ntc.associateLookup(mylookup);\n```\n"
- fmt: '### Creating Your Own Lookups


    In addition to the built-in lookups, you can also create your own. The following
    subsections show the different possibilities that are available.


    #### Empty Lookup


    You may initialize a `Lookup` to an `EMPTY` Lookup:


    ```

    Lookup emptyLookup = Lookups.EMPTY

    ```


    #### Lookup Containing One Object


    The most basic one is `Lookups.Singleton`, a `Lookup` that only contains one object:


    ```

    Lookup singleObjLookup = Lookups.singleton(obj);

    ```


    #### Lookup with Fixed Number of Objects


    There''s also an implementation for creating a lookup with more than one entry,
    still with fixed content:


    ```

    Lookup fixedObjLookup = Lookups.fixed(obj1, obj2);

    ```


    #### Lookup with Dynamic Content


    You may also use a `Lookup` to dynamically add content to it. The most flexible
    way is to use an `InstanceContent` object to add and remove content:


    ```

    InstanceContent content = new InstanceContent();

    Lookup dynamicLookup = new AbstractLookup(content);

    content.add(obj1);

    content.add(obj2);

    ```


    Besides its name, `AbstractLookup`, it is *not* an abstract class; it is a `Lookup`
    whose contents can change. Attaching a `LookupListener` to a `Lookup.Result` assigned
    to the `Lookup` lets you receive notifications of changes in the `AbstractLookup`.


    #### ProxyLookup Merges Other Lookups


    If you would like to query more than one `Lookup` at a time, you may use a `ProxyLookup`.
    The following example combines two Lookups into one:


    ```

    Lookup compoundLookup =

    new ProxyLookup(singleObjLookup, fixedObjLookup);

    ```


    #### Lookup Delegating Searches to Lookup of Some Object


    A `Lookup` returned by a given object may change from time to time: for example,
    under some conditions, it may be the tool that is currently active, such as an
    `ActionMap`, etc. The created `Lookup` delegates to another `Lookup` that checks
    if the returned object is the same, fires change events, and updates all existing
    and referenced results.


    ```

    Lookup delegating = Lookups.proxy(

    new Lookup.Provider () {

    public Lookup getLookup () {

    return lookup;

    }

    }

    );

    ```


    #### Exclude Classes from a Lookup


    You may also filter out specific classes from a `Lookup`:


    ```

    Lookup filtered =

    Lookups.exclude(originalLookup, SomeObj.class, ActionMap.class);

    ```


    If you register your service in the `layer.xml` (see below), you can get a lookup
    for a certain folder like this:


    ```

    Lookup lookup = Lookups.forPath("ServiceProviders");

    ```


    We will see other lookups in the following chapters of Part II of the book.


    ## The NetBeans Module System API versus the Java 9 Module API


    Since JDK 9, project Jigsaw introduced modules in the Java language. A number
    of JEPs implemented the Jigsaw project:


    *   [200: The Modular JDK](http://openjdk.java.net/jeps/200) ([Jigsaw/JSR 376](http://openjdk.java.net/projects/jigsaw/spec/)
    and [JEP 261](http://openjdk.java.net/jeps/261))

    *   [201: Modular Source Code](http://openjdk.java.net/jeps/201)

    *   [220: Modular Run-Time Images](http://openjdk.java.net/jeps/220)

    *   [238: Multi-Release JAR Files](http://openjdk.java.net/jeps/238)

    *   [260: Internal APIs Encapsulation](http://openjdk.java.net/jeps/260)

    *   [261: Module System](http://openjdk.java.net/jeps/261)

    *   [275: Modular Java Application Packaging](http://openjdk.java.net/jeps/275)

    *   [282: jlink: The Java Linker](http://openjdk.java.net/jeps/282)


    The purpose was to make Java SE more flexible, scalable, maintainable, and secure;
    make it easier to construct, maintain, deploy, and upgrade applications; and enable
    improved performance.


    Before Java 9, classes were arranged into *packages*. For example, `com.company.app.MyClass`
    is stored into the file `com/company/app/MyClass.java`. Packages are globally
    visible and open for extension. The unit of delivery is a *Java archive (jar)*.
    Access control is only managed at the level of classes/methods. Classes and methods
    can restrict access by three access modifiers as shown in Table 7-1.


    **Table 7-1** Package Access Modifiers


    | Access Modifier | Class | Package | Subclass | Unrestricted |

    | --- | --- | --- | --- | --- |

    | `Public` | ✓ | ✓ | ✓ | ✓ |

    | `Protected` | ✓ | ✓ | ✓ |   |

    | `- (default or package)` | ✓ | ✓ |   |   |

    | `Private` | ✓ |   |   |   |


    How do you access a class from another package while preventing other classes
    from using it? You can only make the class `public`, thus exposing it to all other
    classes (i.e., break encapsulation). There are no explicit dependencies; explicit
    `import` statements are only at compile time; there is no way to know which other
    JAR files your JAR requires at runtime; the developer has to provide correct jars
    in the classpath during execution and in the correct order.


    *Maven* solves compile-time dependency management by defining POM (Project Object
    Model) files (*Gradle* works in a similar way). *OSGi* solves runtime dependencies
    by requiring imported packages to be listed as metadata in JARs, which are then
    called *bundles*.


    Once a classpath is loaded by the JVM, all classes are sequenced into a flat list,
    in the order defined by the `classpath` argument. When the JVM loads a class,
    it reads the classpath in fixed order to find the right one. As soon as the class
    is found, the search ends and the class is loaded. What happens when duplicate
    classes are in the classpath? Only one (the first one encountered) wins. The JVM
    cannot efficiently verify the completeness of the classpath upon starting. If
    a class cannot be found in the classpath, then you get a runtime exception. The
    term *“Classpath Hell”* or *“JAR Hell”* should now be clearer to you.


    With project Jigsaw, Java now has its own module system. Modules can either export
    or strongly encapsulate packages. Modules express dependencies on other modules
    explicitly. Each JAR becomes a module, containing explicit references to other
    modules. A module has a publicly accessible part and an encapsulated part. All
    this information is available at compile time and runtime; accidental dependencies
    on code from other non-referenced modules can be prevented. Optimizations can
    be applied by inspecting transitive dependencies.


    The benefits of Java 9 module system are these:


    *   **Reliable configuration**: The module system checks whether a given combination
    of modules satisfies all dependencies before compiling or running code.

    *   **Strong encapsulation**: Modules explicitly express dependencies on other
    modules.'
