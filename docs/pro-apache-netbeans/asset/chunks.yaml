    ### 设置基于 Gradle 的项目


    Gradle 是这个领域的新玩家。它的创建是为了缓解 Maven 的一些麻烦，例如冗长的 *pom* 文件。与上述类似，要创建一个新的基于 Gradle 的项目，请创建一个新项目并选择
    *Java with Gradle* 类别，如图 2-23 所示（如果是首次使用，NetBeans 可能会激活该功能）。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig23_HTML.jpg](img/479166_1_En_2_Fig23_HTML.jpg)


    图 2-23


    一个新的基于 Gradle 的项目


    单击**下一步**，填写项目名称和位置等各个字段；以及向导第二步中的可选组、版本、描述等，然后单击**完成**，即可看到您的新 Gradle 项目已创建。


    ## 加速您的应用程序编码


    Apache NetBeans IDE 拥有大量丰富的功能，可帮助您加快编码任务。IDE 具有默认功能，例如代码补全、语法高亮、代码模板等，您可以通过更改各种设置来使用和修改这些功能。


    ### 智能代码补全


    *代码补全*是 IDE 中最令人兴奋且最常用的功能。它特定于源代码编辑器，并且适用于大多数受支持的语言（Java、HTML、PHP 等）。


    有两种方法可以打开代码补全弹出对话框（如图 2-24 所示）：按 `Ctrl+Space` 或在编辑器内键入点（`.`）字符。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig24_HTML.jpg](img/479166_1_En_2_Fig24_HTML.jpg)


    图 2-24


    Java 编辑器中的代码补全


    代码补全功能比以往任何时候都更智能。例如，如果您想调用一个变量、类或方法，自动弹出的代码补全对话框将列出所有已定义的元素，并通过键入元素名称的第一个字符帮助您轻松选择所需的元素。


    还有*驼峰式补全*。您无需键入所有字符，只需键入您感兴趣的单词的大写字母。然后按 `Ctrl+Space`，驼峰式补全功能将补全元素的完整名称。


    您还可以访问元素的 Javadoc。将光标放在元素名称上，然后按 `Ctrl+Space`，如图 2-25 所示。您将看到一个对话框打开，其中包含您所选元素的
    Javadoc。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig25_HTML.jpg](img/479166_1_En_2_Fig25_HTML.jpg)


    图 2-25


    Javadoc 弹出窗口


    IDE 还提供关键字补全。在这种情况下，编辑器会检查上下文并建议最相关的关键字。图 2-26 显示了一个示例，您可以看到编辑器如何识别您正在指定一个类定义，并为您提供扩展另一个类或实现接口的机会。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig26_HTML.jpg](img/479166_1_En_2_Fig26_HTML.jpg)


    图 2-26


    关键字补全


    ### 提示


    *提示*是键入代码时的绝佳指南。提示提供关于如何修复错误以及完成您正在键入的任何语句或表达式的建议。编辑器会在 IDE 左侧边距中为存在提示的代码行显示小的*灯泡*（参见图
    2-27）。单击灯泡，将出现一个或多个提示。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig27_HTML.jpg](img/479166_1_En_2_Fig27_HTML.jpg)


    图 2-27


    解决环绕语句问题的提示

