  trans: '

    如果你需要将快速搜索过滤器工具添加到自己的面板/工具栏中，可以按照以下技巧操作：[`http://layerxml.wordpress.com/2011/02/16/place-the-quicksearch-component-anywhere-you-like/`](http://layerxml.wordpress.com/2011/02/16/place-the-quicksearch-component-anywhere-you-like/)
    以及 [`https://blogs.oracle.com/geertjan/place-the-quicksearch-component-anywhere-you-like-part-2`](https://blogs.oracle.com/geertjan/place-the-quicksearch-component-anywhere-you-like-part-2)。


    你可以搜索操作，但如何搜索任务呢？答案是按照以下步骤操作：


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig12_HTML.jpg](img/479166_1_En_10_Fig12_HTML.jpg)


    图 10-12

    新建快速搜索提供程序向导（第 2 步）


