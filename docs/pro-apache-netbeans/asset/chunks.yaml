    ## Progress


    More often than not, when dealing with large amounts of data, the calculation
    and display of them may take some noticeable time to the user. For example, retrieving
    data from a filesystem or database can take several seconds on a good day. As
    a good *User Experience* rule, the user should be given some visual feedback of
    the progress that a long task takes.


    For example, expanding a `Node` that creates child elements synchronously in the
    *Event Dispatch Thread (EDT)* will freeze the UI. During this time, no UI updates
    are performed and user gestures are ignored, making the UI unusable for the duration
    of the process. That is the reason why creating the child elements is done in
    a different thread. Meanwhile, you should inform the user that child elements
    are being created and are about to be displayed. During this time, normally a
    wait cursor and a status message are shown.


    In Chapter [8](#479166_1_En_8_Chapter.xhtml) we saw how `ChildFactory` class offers
    support for creating child elements asynchronously (by passing `true` as the second
    parameter of the `Children.create()` method).


    By default, the NetBeans Platform status bar has an integrated progress bar. When
    you are working with long-running tasks, you can plug into the progress bar to
    let the user visualize progress, either of a single task or multiple tasks.


    To plug into the progress bar, you need to add a dependency to the *Progress API*.
    The `ProgressHandleFactory` creates `ProgressHandle` objects, which display progress
    and, optionally, enables the user to cancel the progress display. Progress can
    be displayed with a definite or an indefinite runtime.


    For example, the code snippet of Listing [10-27](#479166_1_En_10_Chapter.xhtml#PC27)
    could be used inside the `createKeys()` method of `TaskChildFactory` to display
    the progress of loading and displaying a large number of tasks in the `OutineView`
    of the *TodoRCP* application.


    ```

    ProgressHandle handle = ProgressHandleFactory.creatHandle("Tasks progress");

    handle.start(100);    // 100 percentiles, i.e. 0-100

    ...

    handle.progress(25);

    ...

    handle.progress(50);

    ...

    handle.progress(75);

    ...

    handle.finish();

    Listing 10-27

    Example to display the progress of loading a large number of tasks

    ```


    To handle a long task that spans many modules, use the `ProgressContributor` as
    described in the API ([`http://bits.netbeans.org/dev/javadoc/org-netbeans-api-progress/index.html`](http://bits.netbeans.org/dev/javadoc/org-netbeans-api-progress/index.html)).


    ## Visual Library


    The *Visual Library* is used to display selectable, movable, and changeable graphic
    components (called *widgets*) on a *Scene*. The Visual Library is based on Java2D
    and uses a lightweight window system so that it can be used with Swing, JavaFX,
    etc.


    The Visual Library is normally used in combination with the *Component Palette*,
    which allows for dragging and dropping items onto components (like *Scene*s).
    To open your appetite, you may start your adventure by exploring the Visual Library
    examples ([`https://platform.netbeans.org/graph/examples.html`](https://platform.netbeans.org/graph/examples.html))
    to see the capabilities of the library as well as take a look at some tutorials
    and real applications that actually use it ([`https://platform.netbeans.org/graph/`](https://platform.netbeans.org/graph/)).


    Before you can use the Visual Library in your projects, you need to add the *Visual
    Library API* from the *platform* cluster, which is not added by default. You do
    this by right-clicking on your Module suite and selecting **Properties** as described
    and illustrated earlier in Figure [10-10](#479166_1_En_10_Chapter.xhtml#Fig10).


    The main classes of the Visual Library are described in the subsections to follow.


    ### Widgets


    Widgets are lightweight graphical components that can be used to draw graphs.
    As shown in Figure [10-17](#479166_1_En_10_Chapter.xhtml#Fig17), `Widget` follows
    the *Composite design pattern* (widgets contain widgets), and the various widgets
    are organized into a tree hierarchy.


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig17_HTML.jpg](Images/479166_1_En_10_Fig17_HTML.jpg)


    Figure 10-17

    Visual Library class diagram


    A variety of `Widget` implementations are provided by the Visual Library (see
    Figure [10-18](#479166_1_En_10_Chapter.xhtml#Fig18)), each incorporating predefined
    behavior consisting of customizable actions, borders, and layouts. Together, `Widget`s
    are arranged and displayed in a `Scene`, of which there are various implementations,
    too (see Figure [10-17](#479166_1_En_10_Chapter.xhtml#Fig17)).


    Widgets have efficient validation and repaint mechanisms. A widget (as shown in
    Figure [10-17](#479166_1_En_10_Chapter.xhtml#Fig17)) has also a *state*, and that
    state can take on one of several values: *selected, highlighted* (also called
    *secondary selection*), *object-hovered, widget-hovered, widget-aimed*.


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig18_HTML.jpg](Images/479166_1_En_10_Fig18_HTML.jpg)


    Figure 10-18

    Widget implementations


    Finally, `Widget` has a `Lookup`, which can be used to add objects to it. Listing
    [10-28](#479166_1_En_10_Chapter.xhtml#PC28) provides an example of using a `Lookup`
    in a `Widget`.


    ```

    class MyWidget extends LabelWidget {

    private Lookup lookup;

    private InstanceContent ic;

    public MyWidget(Scene scene) {

    super(scene);

    ic = new InstanceContent();

    }

    @Override

    public Lookup getLookup() {

    if (lookup == null) {

    lookup = new AbstractLookup(ic);

    }

    return lookup;

    }

    Listing 10-28

    A Widget with a Lookup to store model objects

    ```


    This `Lookup` is usually proxied by the `TopComponent` that contains the visual
    components, which is in turn proxied by `Utilities.actionsGlobalContext()`, as
    we have learned in the previous chapters.


    ### Scene


    The `Scene` (see Figures [10-17](#479166_1_En_10_Chapter.xhtml#Fig17) and [10-18](#479166_1_En_10_Chapter.xhtml#Fig18))
    is a kind of `Widget`, too. It is a top-level `Widget` (the *root* element of
    the hierarchical tree structure) that contains other `Widget`s. It is usually
    displayed in a Swing component like, for example, a `JScrollPane`. There are various
    types of `Scene`s as one can see in Figure [10-17](#479166_1_En_10_Chapter.xhtml#Fig17).
    For example, `ObjectScene` maps a `Widget` to a data object. `GraphScene`, `GraphPinScene`
    and `VMDGraphScene` (*VMD* stands for *Visual Mobile Designer*) are used to simplify
    creating graphs.'
