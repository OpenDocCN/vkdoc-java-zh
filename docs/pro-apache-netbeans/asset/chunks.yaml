    The magic of integrating JavaFX to NetBeans platform is provided by `JFXPanel`.
    When the first `JFXPanel` object is created, it initializes the JavaFX runtime
    (the *JavaFX* *Application Thread* ). When the final `JFXPanel` is destroyed,
    the JavaFX runtime exits; this is why we set `Platform.setExplicitExit(false)`.
    This setting is necessary to close and then reopen JavaFX-enabled windows.


    Don’t forget to “Give back to Caesar what is Caesar’s and to God what is God’s.”
    In other words, use `Platform.runLater(() -> {...});` to execute JavaFX code in
    the *JavaFX Application Thread*, and `SwingUtilities.invokeLater(() -> { ...});`
    to execute Swing code in the EDT thread.


    The code in `createScene()` is analogous to the code in a JavaFX application’s
    `start()` method . Copy the method `showTaskDetailsDialog()` from `Main` class
    of *TodoFX*, to `TasksTopComponent` , too (see Listing [9-17](#479166_1_En_9_Chapter.xhtml#PC19)).


