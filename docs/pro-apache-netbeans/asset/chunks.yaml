    你可以将 `retVal` 与 `NotifyDescriptor` 的以下常量值进行比较：


    *   `OK_OPTION`：点击了**确定**按钮。

    *   `YES_OPTION`：点击了**是**按钮。

    *   `NO_OPTION`：点击了**否**按钮。

    *   `CANCEL_OPTION`：点击了**取消**按钮。

    *   `CLOSED_OPTION`：对话框在未按下任何按钮的情况下关闭。


