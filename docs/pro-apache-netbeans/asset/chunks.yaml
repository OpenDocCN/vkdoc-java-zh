    让我们看看如何向 `OutlineView` 显示一些模拟数据。正如我们在前一章所学，我们需要将数据包装成节点，即将我们的模型（`Task`）包装成一个 `Node`，更具体地说，包装成一个
    `BeanNode`，它使用反射来检索*值对象*（本例中为 `Task`）的属性。在 *View* 模块内创建第 8 章代码清单 8-3 的类（并添加对 *Node
    API* 的依赖）。


    要在 `OutlineView` 中显示任务，你需要一个扁平的节点列表。扁平节点列表是一个仅提供叶节点的根节点；也就是说，只有一层深度的子节点。工厂用于创建子节点（参见第
    8 章代码清单 8-4）。


    `OutlineView` 使用模拟数据填充，如第 8 章代码清单 8-4 中的 `createKeys()` 方法所示。看看 `TaskChildFactory`
    如何使用默认查找来获取 `TaskManager` 实现，从而检索所有任务。松耦合！


    最后，需要修改 `TasksTopComponent`，如第 8 章代码清单 8-8 所示。


    `ExplorerManager` 是资源管理器视图的控制器，它需要一个根节点元素。向其传递一个 `AbstractNode`；其 `Children` 派生自
    `TaskChildFactory`。


    与原始的 Swing ToDo 应用程序相比，代码行数大大减少，你现在就有了一个包含填充数据的运行原型。构建并运行它，你将看到类似于图 9-13 所示的视图。


