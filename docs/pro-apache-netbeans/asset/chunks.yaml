- fmt: 'Useful classes are `ProjectUtils` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-projectapi/org/netbeans/api/project/ProjectUtils.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-projectapi/org/netbeans/api/project/ProjectUtils.html))
    that provides utility methods to get information about Projects, and `SourceLevelQuery`
    ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-api-java/org/netbeans/api/java/queries/SourceLevelQuery.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-api-java/org/netbeans/api/java/queries/SourceLevelQuery.html))
    that returns the source level of a Java source file (for example, the Java source
    level can be 7 if the source file uses syntax that was introduced in Java 7).
    There are Java extensions to the generic *Project API* in module `java/api.java`.


    The *Parsing API* (`ide/parsing.api`) (see Figure [15-12](#479166_1_En_15_Chapter.xhtml#Fig12))
    is used for source code parsing (mostly in editor). It allows registering new
    parsers ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserFactory.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserFactory.html)),
    defining some parts of the source code to be actually parts of embedded text in
    a different language `EmbeddingProvider` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/EmbeddingProvider.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/EmbeddingProvider.html))
    and `ParserBasedEmbeddingProvider` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserBasedEmbeddingProvider.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserBasedEmbeddingProvider.html))
    and running tasks on the outcomes of the parsers.


    There are two types of tasks:


    *   `ParserResultTask` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserResultTask.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserResultTask.html))
    is a `SchedulerTask` that processes the result of parsing automatically scheduled
    and run in a defined order.


    *   `ParserManager` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/api/ParserManager.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/api/ParserManager.html))
    allows starting priority parsing requests for one or more sources and immediately
    runs user tasks on demand.


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig12_HTML.jpg](Images/479166_1_En_15_Fig12_HTML.jpg)


    Figure 15-12


    Parsing API module dependencies


    The *Parsing Indexing API* (`ide/parsing.indexing`) is used for “indexing” (e.g.,
    building a “global” index of anything that is important in the source files, so
    that queries like “which files use this class” can be done fast). Interesting
    classes here include:


    *   `EmbeddingIndexer` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/EmbeddingIndexer.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/EmbeddingIndexer.html)),
    which gets a result of the parser, and can add whatever information it needs to
    the index.


    *   `BinaryIndexer` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/BinaryIndexer.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/BinaryIndexer.html)),
    which allows preparing an index for binary dependencies.


    *   `CustomIndexer` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/CustomIndexer.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/CustomIndexer.html)),
    which is given simply the list of changed files, and can perform indexing in a
    custom way. Querying the index can be done through `QuerySupport` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/support/QuerySupport.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/support/QuerySupport.html)).


    ## Issue Tracker


    All programs contain bugs and Apache NetBeans is no deviation from the rule. Bugs
    and new features are stored in JIRA ([`https://issues.apache.org/jira/browse/NETBEANS`](https://issues.apache.org/jira/browse/NETBEANS))
    as already described in Chapter [13](#479166_1_En_13_Chapter.xhtml). The mailing
    list to subscribe to is `dev@netbeans.incubator.apache.org`. Your code contribution
    may be a bug fix, but it can also be a new feature in the form of a plugin. Just
    open a new issue in JIRA and work on whatever it is that you want to contribute.


    ## Debugging Apache NetBeans


    Whether you are fixing an issue or developing a new feature (plugin), sooner or
    later you will need to understand how your or NetBeans’ code works or why it doesn’t!
    Before you start debugging Apache NetBeans, make sure you have set the sources
    correctly.


    Click on **Tools ➤ NetBeans Platforms** to display the *NetBeans Platform Manager*
    dialog (see Figure [15-13](#479166_1_En_15_Chapter.xhtml#Fig13)). You will see
    that there is one platform, *Development IDE*, already registered. This is the
    platform of the NetBeans IDE that you are running, for example, 11.1 if you run
    Apache NetBeans IDE 11.1.


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig13_HTML.jpg](Images/479166_1_En_15_Fig13_HTML.jpg)


    Figure 15-13


    NetBeans Platform Manager dialog'
