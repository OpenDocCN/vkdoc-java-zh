    运行插件，当你在编辑器中更改资产的名称时，你将在导航器中看到效果。\n\n# 签名和共享插件\n\n创建插件后，可以通过 Apache NetBeans 插件门户与社区共享。通过插件门户提供的插件可以由社区中的任何人安装。插件门户可通过\
    \ Web 浏览器在 URL [`http://netbeans-vm.apache.org/pluginportal/`](http://netbeans-vm.apache.org/pluginportal/)\
    \ 在线访问，也可以在 Apache NetBeans IDE 中通过选择“工具” ➤ “插件”来访问。\n\n为了共享插件，必须使用证书（自签名或由证书颁发机构验证）对其进行签名。签名过程与将要分发的任何\
    \ Java JAR 归档文件基本相同。有几种不同的方式可以对 JAR 或 NBM 文件进行签名：手动签名或将签名过程集成到构建中。在本节中，我们将介绍如何将签名过程集成到\
    \ Maven 构建中。\n\n## 签名项目\n\n可以使用 Java `keytool` 实用程序为基于 ANT 或 Maven 的项目创建密钥库，然后更新构建文件以将密钥库合并到构建中，从而对项目进行签名以进行分发。在此示例中，将更新项目的基于\
    \ Maven 的 POM 文件以包含生成的密钥库。首先，打开命令行或终端，进入项目目录，然后执行`keytool`命令来生成密钥库。\n\n```bash\n\
    cd ../path-to-project\nkeytool -genkey -storepass your-password -alias your-project-alias\
    \ -keystore nbproject/private/keystore\n```\n\n> **注意**：确保将密钥库和密钥密码设置为相同的值。确保`nbproject/private`目录不与归档文件一起分发，也不提交到版本控制系统。\n\
    \n生成密钥库并将其保存到`nbproject/private`等目录后，可以更新项目 POM 文件以包含生成 NBM 文件时所需的`nbm-maven-plugin`配置。只需将以下配置添加到`nbm-maven-plugin`插件部分即可。\n\
    \n```xml\n<plugin>\n    <groupId>org.codehaus.mojo</groupId>\n    <artifactId>nbm-maven-plugin</artifactId>\n\
    \    <version>3.14.1</version>\n    <configuration>\n        <signPlugin>true</signPlugin>\n\
    \        <keystore>nbproject/private/keystore</keystore>\n        <alias>your-project-alias</alias>\n\
    \        <storepass>your-password</storepass>\n        <keypass>your-password</keypass>\n\
    \        <licenseName>Creative Commons BY 3.0</licenseName>\n        <licenseUrl>https://creativecommons.org/licenses/by/3.0/</licenseUrl>\n\
    \        <homePageUrl>https://github.com/mario-s/nb-hyperledger</homePageUrl>\n\
    \        <author>Your Name</author>\n        <organization>org.netbeans.modules.hyperledger</organization>\n\
    \    </configuration>\n</plugin>\n```\n\n## 创建 NBM\n\n如果你只有一个要打包分发的插件，最简单的方法是生成一个\
    \ NBM 文件。有几种方法可以创建签名的 NBM。首先，如果你不打算对 NBM 进行签名以使其能够包含在插件中心，只需通过 Apache NetBeans\
    \ 生成 NBM 即可。在 Apache NetBeans 中执行以下步骤：\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig18_HTML.jpg](Images/479166_1_En_11_Fig18_HTML.jpg)\n\
    \n**图 11-18** 为插件分发创建 NBM 文件\n\n*   右键单击 Hyperledger Support 项目，然后选择“创建 NBM”（图\
    \ [11-18](#479166_1_En_11_Chapter.xhtml#Fig18)）。IDE 将编译并将项目打包成一个可分发的二进制 NBM 文件。生成后，该文件将出现在项目的“build”目录中。\n\
    \n要生成签名的 NBM，可以通过命令行或终端进入项目目录并执行以下命令来完成 Maven 构建：\n\n```bash\nmvn clean package\
    \ nbm:nbm -Dkeystorepass=your-password\n```\n\nNBM 被签名并打包后，就可以加载到插件门户中了。使用以下步骤将插件上传到门户。\n\
    \n1.  使用 Sonatype 提供的说明（[`https://central.sonatype.org/pages/ossrh-guide.html`](https://central.sonatype.org/pages/ossrh-guide.html)）将插件上传到\
    \ Maven Central。\n2.  如果你还没有 Google 帐户，请创建一个。\n3.  访问 Apache NetBeans 插件门户（[`http://netbeans-vm.apache.org/pluginportal/`](http://netbeans-vm.apache.org/pluginportal/)）并使用右上角的**登录**按钮进行身份验证。\n\
    4.  在主菜单中单击“**添加插件**”按钮。\n5.  为你的插件提供相关信息（`groupId`和`artifactId`值），然后单击“**添加插件**”按钮。这两个值包含在`maven-metadata.xml`文件中。所有其他信息应自动添加。建议为你的插件添加主页和缩略图。选择“**保存插件**”。\n\
    6.  在“我的插件”页面中选择适合你插件的 Apache NetBeans 版本，这将打开“版本管理”页面。\n7.  选择适当的兼容 Apache NetBeans\
    \ 版本，提供可选的发布信息，然后选择“**保存插件版本**”。"
