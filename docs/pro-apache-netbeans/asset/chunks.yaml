    的查找设置为其节点的查找。为此，修改 `TaskNode`，如第 8 章代码清单 8-5 所示，该操作将任务添加到节点的查找中。


    单例查找仅包含一个对象，在本例中就是你的任务。通过添加第 8 章代码清单 8-9 的代码（在设置 `ExplorerManager` 根上下文的那行代码之后），将
    `TopComponent` 的查找设置为节点的查找。


    ## 处理事件


    现在你已经准备好显示任务，是时候添加一些事件处理了。在原始的 ToDo 应用程序中，将 GUI 事件分为两个互斥的类别是很有用的：


    *   *内部事件*，仅影响视图本身

    *   *外部事件*，会导致模型方法执行


    内部事件包括选择更改和点击**取消**按钮。在原始的 ToDo 应用程序中，这些事件由视图类自身处理，并且不作为视图类公共接口的一部分公开。例如，选择一个任务应该启用**编辑任务**菜单项和**移除任务**菜单项，以及相应的工具栏按钮。现在，这些事件由
    *Controller* 模块中使用 cookie 的条件启用操作处理，而不再在 *View* 包中处理。


    视图类*不应*处理原始 ToDo 应用程序作者称之为“外部”的那类事件。这些事件应转发给控制器类，控制器类通常为特定用例或一组相关用例实现工作流逻辑。


    原始的 ToDo 应用程序包含 `todo.view.ActionSupport` 类，它简单地维护一个 `ActionListeners` 列表，并将 `ActionEvents`
    转发给它们。但 `ActionSupport` 本身就是一个 `ActionListener`。这样做是为了避免大量与事件相关的方法，例如 `addNewTaskListener()`、`removeNewTaskListener()`、`addEditTaskListener()`、`removeEditTaskListener()`
    等等。相反，视图类仅生成一个 `ActionEvent`。`ActionSupport` 类从视图组件捕获 `ActionEvent` 并将其转发给控制器，控制器将自己注册为视图的
    `ActionListener`。


    在 *TodoRCP* 应用程序中不需要所有这些类，因为 NetBeans RCP 框架会处理所有这些。你需要做的就是完成操作的 `actionPerformed()`
    方法。因此，你的工作是将逻辑从 `QueryEditTasks` 转移到你的操作中。代码清单 9-5 展示了它们如何映射。


    ```

