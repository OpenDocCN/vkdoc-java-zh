    \ | 选项**对话框。\n\n*   **extra**：为各种操作系统提供 JavaFX 封装的库。\n\n*   **groovy**：提供对 Groovy\
    \ 和 Gradle 的支持（参见图 15-3）。\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig3_HTML.jpg](img/479166_1_En_15_Fig3_HTML.jpg)\n\
