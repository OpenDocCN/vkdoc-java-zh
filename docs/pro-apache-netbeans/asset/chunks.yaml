  trans: '

    # 7. 掌握核心平台


    正如我们在第[4](https://example.org/479166_1_En_4_Chapter.xhtml)章中所见，NetBeans 简化了使用
    Swing 或 JavaFX 编写的桌面应用程序的开发。虽然 Swing 是一个稳定且根深蒂固的库，但较新的 JavaFX API 提供了改进的富媒体解决方案。然而，这两个库都缺乏一个框架。也就是说，它们都缺少一个开箱即用的解决方案，该方案应包含复杂桌面应用程序所需的窗口管理系统和真正的模型-视图-控制器组件。


    你可能熟悉作为开发工具的 NetBeans IDE。然而，NetBeans 也是一个用于构建模块化应用程序的平台。NetBeans IDE 构建在 *NetBeans
    富客户端平台*（或称 *RCP*）之上。


    NetBeans 富客户端平台是一个通用框架，它为开发桌面应用程序提供了“基础设施”，例如用于管理窗口、将操作连接到菜单项以及在运行时更新应用程序的代码。NetBeans
    平台在一个可靠、灵活且经过充分测试的模块化架构之上，提供了所有这些开箱即用的功能。它之于桌面应用程序，就如同 Java Enterprise Edition
    框架之于 Web 应用程序。


    本章是对 NetBeans 富客户端平台为桌面应用程序开发者提供了什么的大局观描述，也是对你将在本书第二部分中学到内容的执行摘要。


    首先，你将学习 NetBeans 平台（或 RCP）的***核心***（本章）：


    *   模块系统


    *   文件系统


    *   查找


    在你对*核心*有了良好的背景了解之后，我们将转向 GUI 部分（第[8](https://example.org/479166_1_En_8_Chapter.xhtml)章），该部分构建在
    Swing 之上：


    *   窗口系统


    *   节点


    *   资源管理器视图


    *   动作系统


    我们还描述了两种替代技术：


    *   JavaFX 和 NetBeans 平台


    *   HTML/Java UI


    我们在第[9](https://example.org/479166_1_En_9_Chapter.xhtml)章中通过将一个 Swing 应用程序移植到
    NetBeans 平台来应用上述内容。


    最后，我们教你一些额外内容（第[10](https://example.org/479166_1_En_10_Chapter.xhtml)章）：


    *   可视化库


    *   对话框


    *   向导


    *   品牌化、分发和国际化


    第[11](https://example.org/479166_1_En_11_Chapter.xhtml)章使用你在前几章学到的信息，帮助你为 NetBeans
    构建一个插件。


    图 [7-1](https://example.org/479166_1_En_7_Chapter.xhtml#Fig1) 展示了本书第二部分所基于的 NetBeans
    平台架构。


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig1_HTML.png](img/479166_1_En_7_Fig1_HTML.png)


    图 7-1


    NetBeans 平台架构概览


    此链接（[`https://platform.netbeans.org/screenshots.html`](https://platform.netbeans.org/screenshots.html)）提供了构建在
    NetBeans RCP 之上的桌面应用程序列表。


    ## 核心平台


    在本章中，我们将学习 NetBeans 富客户端平台的*核心*（参见第[7](https://example.org/479166_1_En_7_Chapter.xhtml)章中的图
    [7-1](https://example.org/479166_1_En_7_Chapter.xhtml#Fig1)），它由以下系统（API）组成：


    *   **模块系统**：模块化通过让你将代码组织成严格分离且版本化的模块，为“JAR 地狱”提供了解决方案。只有那些显式声明了相互依赖关系的模块，才能使用彼此暴露包中的代码。NetBeans
    模块系统早于 Java 9 模块系统（Jigsaw），并且基于 OSGi。文中提供了这两个模块系统的比较。


    *   **查找** API 是一种松散耦合机制，它使组件能够针对特定接口发起查询，并获取指向该接口在应用程序所有模块中所有已注册实例的指针。简单来说，`Lookup`
    是一个可观察的 `Map`，以 `Class` 对象为键，以这些 `Class` 对象的实例为值，它允许模块之间进行松散耦合的通信。


    *   **文件系统**是一个统一的 API，它提供对流式访问的支持，可访问平面和层次结构，例如本地或远程服务器上基于磁盘的文件、基于内存的文件，甚至 XML
    文档。`FileObject` 和 `DataObject` 是 FileSystem API 的基本类。

    '
- fmt: '# The Module System API


    Before we start describing the NetBeans Module System API, let’s see some definitions
    and characteristics of modular systems in general.


    *Modularization* is the act of decomposing a system into self-contained modules.
    *Modules* are identifiable artifacts containing code, with metadata describing
    the module and its relation to other modules. A *modular application*, in contrast
    to a *monolithic* one of tightly coupled code, in which every unit may interface
    directly with any other, is composed of smaller, separate chunks of code that
    are well isolated.


    Modular systems have a number of characteristics:


    - **Strong encapsulation**: A module must be able to conceal part of its code
    from other modules. Consequently, encapsulated code may change freely without
    affecting users of the module.

    - **Well-defined interfaces**: Modules should expose well-defined and stable interfaces
    to other modules.

    - **Explicit dependencies**: Dependencies must be part of the module definition,
    in order for modules to be self-contained. In a module graph, nodes represent
    modules, and edges represent dependencies between modules.

    - **Versioning**: Dependencies on a specific or a minimum version of a module.


    The NetBeans platform Module API is the following:


    - an architectural framework,

    - an execution environment that supports a module system called the *Runtime Container*.


    It provides a way to divide your application into cohesive parts and helps you
    build loosely coupled applications that can evolve without breaking. It also lets
    you add/remove features during runtime(!) without breaking your application.


    The *Runtime Container* consists of the minimum modules required to load and execute
    your application and manages all of the modules in your application.


    A *module* is a collection of functionally related classes stored in a JAR file
    along with metadata, which provide information to the Runtime Container about
    the module, such as the following:


    - the module’s name,

    - version information,

    - dependencies, and

    - a list of its public packages, if any.


    Figure [7-2](#479166_1_En_7_Chapter.xhtml#Fig2) shows an explicit dependency of
    *Module A* to *Module B*.


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig2_HTML.jpg](Images/479166_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    An explicit dependency between two modules


    In order to use or access code in another module:


    1. You must put *Module B* classes that identify the module’s interface in a `public`
    package, assign a version number, and export it.

    2. *Module A* must declare a dependency on a specified version of *Module B*.


    Usually you put public interfaces of a module into a public package.


    In other words, a module in the NetBeans Module System cannot reference classes
    in another module without declaring a dependency on that other module, and with
    that other module agreeing that the classes referenced are the ones that are the
    actual API of this module. This way you can design applications with high cohesion
    and low coupling.


    All modules have a life cycle, which you can hook into via annotations. Thus,
    you can execute code when a module starts, shuts down, and when the window system
    initializes.


    The *NetBeans* *Runtime Container* consists of the following six modules:


    - *Bootstrap*: loads and executes the *Startup* module;

    - *Startup*: contains the Main method of the application and initializes the module
    system and the virtual file system;

    - *Module system*: manages modules, enforces module visibility and dependencies,
    and provides access to module life-cycle methods;

    - *Utilities*: provides general utility classes;

    - *File System*: provides a virtual file system for your application;

    - *Lookup*: allows modules to communicate with each other.


    Figure [7-3](#479166_1_En_7_Chapter.xhtml#Fig3) shows the relationships between
    these modules.


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig3_HTML.jpg](Images/479166_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    NetBeans Platform Runtime Container'
