    return of(format(ICON_PATH, "asset.png"));

    case CtoLexer.PARTICIPANT:

    return of(format(ICON_PATH, "participant.png"));

    case CtoLexer.TRANSACTION:

    return of(format(ICON_PATH, "transaction.png"));

    default:

    return empty();

    }

    }

    }

