    要开始的模块是 *Bootstrap*（`platform/o.n.bootstrap`），开始学习 NetBeans IDE 源代码的类是：

    [`https://github.com/apache/incubator-netbeans/blob/master/platform/o.n.bootstrap/src/org/netbeans/Main.java`](https://github.com/apache/incubator-netbeans/blob/master/platform/o.n.bootstrap/src/org/netbeans/Main.java)


    图 [15-10](#479166_1_En_15_Chapter.xhtml#Fig10) 显示了此模块的依赖关系。


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig10_HTML.jpg](Images/479166_1_En_15_Fig10_HTML.jpg)


    图 15-10 Bootstrap 模块的模块依赖关系


    # IDE 集群架构


    `ide` 集群提供构建 Apache NetBeans IDE 本身的模块。这些模块包括编辑器、调试器和语言支持。这里我们描述该集群中最重要的模块。


    *Projects API*（模块 *Project API*（`ide/projectapi`）（见图 [15-11](#479166_1_En_15_Chapter.xhtml#Fig11)）和
    *Project UI API*（`ide/projectuiapi`））定义了项目在 NetBeans 中的工作方式。最基础的 `Project`（[`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-projectapi/org/netbeans/api/project/Project.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-projectapi/org/netbeans/api/project/Project.html)）仅由一个空的
    Lookup 和一个项目目录组成。通过简单地将处理程序添加到项目的 `Lookup` 中，可以为项目添加更多功能。


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig11_HTML.jpg](Images/479166_1_En_15_Fig11_HTML.jpg)


    图 15-11 项目 API 模块依赖关系'
