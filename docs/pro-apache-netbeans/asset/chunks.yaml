    Let’s see how we can display some mock data to the `OutlineView`. As we learned
    in the previous chapter, we need to wrap the data to nodes, that is, wrap our
    model (`Task`) to a `Node`, and more specifically, to a `BeanNode`, which uses
    reflection to retrieve the attributes of the *Value Objects* (`Task` in our case).
    Create the class of Listing [8-3](#479166_1_En_8_Chapter.xhtml#PC3) of Chapter
    [8](#479166_1_En_8_Chapter.xhtml) inside the *View* module (and add a dependency
    on the *Node API*).


    To display tasks in `OutlineView`, you need a flat list of nodes. A flat list
    of nodes is a root node that provides leaf nodes only; that is, one-level-deep
    children only. Factories are used to create children (see Listing [8-4](#479166_1_En_8_Chapter.xhtml#PC4)
    in Chapter [8](#479166_1_En_8_Chapter.xhtml)).


