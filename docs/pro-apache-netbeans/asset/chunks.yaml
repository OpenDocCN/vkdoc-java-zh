    WidgetAction


    `Widget` 的行为由其*动作*描述，这些动作由 `WidgetAction` 接口定义（见图 10-21）。该接口定义了由相应事件调用的方法，例如在分配了该动作的
    Widget 上单击鼠标。Visual Library 提供了预定义的动作，这些动作也可以针对标准功能进行自定义，例如移动和编辑 Widget。动作的示例包括
    `MoveAction`、`HoverAction`、`ZoomAction`、`PanAction`。动作无需定义和实例化。相反，它们由 `ActionFactory`
    类分配给 `Widget`。要为 widget 创建动作，请使用 `ActionFactory` 并通过 `addAction()` 方法将它们添加到 widget
    中（见清单 10-32）。某些 `ActionFactory` 方法需要一个提供者（例如 `EditAction`）。其他动作有默认的提供者（例如 `MoveAction`）。但是，如果你希望偏离默认行为，请使用其他提供者。

    可用的提供者：`AcceptProvider`、`ConnectProvider`、`ContiguousSelectProvider`、`CycleFocusProvider`、`EditProvider`、`HoverProvider`、`InplaceEditorProvider`、`MoveControlPointProvider`、`MoveProvider`、`PopupMenuProvider`、`ReconnectProvider`、`RectangularSelectProvider`、`ResizeProvider`、`SelectProvider`、`TwoStateHoverProvider`。


    动作是链式连接的。`WidgetAction.Chain` 类表示一个 widget 动作链；它接收用户事件并将其转发给相关的动作。当你对 `Widget`
    调用 `getActions()` 时，你实际上得到的是 `Chain`。当然，动作的顺序很重要。


    ```

    labelWidget.getActions().addAction(

    ActionFactory.createMoveAction());

    清单 10-32

    向 Widget 添加动作

    ```


    动作也可以分组。这可以通过调用 `Scene.setActiveTool()` 方法，然后使用 `getActions("activeTool")` 而不是
    `getActions()` 来实现。


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig21_HTML.jpg](img/479166_1_En_10_Fig21_HTML.jpg)


    图 10-21

    Widget 动作


    调色板


    你通常将 Visual Library 与 `Palette` 结合使用，将 `Widget` 从 `Palette` 拖放到 `Scene` 中。`Palette`
    是一个 `TopComponent`，包含可以拖放到的组件到你选择的任何其他 `TopComponent` 中的项目。


    `TopComponent` 在其 `Lookup` 中发布一个 `PaletteController`，以及连接到 `Palette` 中类别和项目上的右键单击弹出菜单的
    `Action`。如果在 `TopComponent` 的 `Lookup` 中找到了 `PaletteController`，则 `Palette` 会与
    `TopComponent` 一起打开。`PaletteFactory.createPalette()` 方法返回 `PaletteController`
    的一个实现，并通过将其放入 `TopComponent` 的 `Lookup` 中将其与 `TopComponent` 关联起来（见清单 10-33）。


    ```

    associateLookup(Lookups.singleton(

    PaletteFactory.createPalette(...)));

    清单 10-33

    将 Palette 与 TopComponent 的 Lookup 关联

    ```


    默认情况下，当从调色板拖拽一个项目时，它不能被放置。你必须明确地将一个组件定义为*放置目标*；否则它无法接收调色板的*放置事件*。如果你希望将调色板与 Visual
    Library 结合使用，那么放置目标就是一个 `Scene`。


    清单 10-34 的代码示例展示了每当在 `Scene` 上发生放置操作时，如何创建一个新的 `LabelWidget`。你可以通过右键单击调色板并从弹出菜单中选择**调色板管理器**动作来配置调色板。

    '
