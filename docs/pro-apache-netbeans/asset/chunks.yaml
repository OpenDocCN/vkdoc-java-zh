  trans: "\n## HTML/Java UI API\n\n在前面的章节中，我们了解了如何将 *ToDo* Swing 应用程序的 UI 移植到 NetBeans\
    \ Rich Client Platform 的 *Window* 和 *Explorer and Properties System* API，以及 JavaFX。在本节中，我们将了解如何将\
    \ UI 移植到新的 HTML/Java UI API。\n\n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig20_HTML.jpg](img/479166_1_En_9_Fig20_HTML.jpg)\n\
    \n图 9-20\n\nView 模块的文件结构\n\n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig19_HTML.jpg](img/479166_1_En_9_Fig19_HTML.jpg)\n\
    \n图 9-19\n\n新建 Portable HTML UI 向导\n\n1.  新建一个名为 `TodoHTMLJava` 的 NetBeans Platform\
    \ 应用程序。\n\n2.  在应用程序中新建一个模块（名称：`View`，代码名称基址：`todo.view`）。\n\n3.  新建一个 Portable\
    \ HTML UI。打开该模块（如果尚未打开），右键点击 *todo.view* 包，然后从弹出菜单中选择 **新建 ➤ 其他…**（见图 9-19）。点击\
    \ **下一步**。\n\n4.  提供 `Tasks` 作为 *类名前缀*，为将要创建的按钮提供一个图标，然后点击 **完成**。\n\n5.  生成的文件结构如图\
    \ 9-20 所示。\n\n右键点击 *View* 模块并选择 **运行**。您应该会看到一个类似于图 9-21 所示的窗口。点击您选择的图标按钮，即可看到\
    \ *TasksWindow* 选项卡出现。按下 **Ask!** 按钮以显示对话框。\n\n一个运行在 NetBeans RCP 内部的 HTML UI！\n\
    \n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig21_HTML.jpg](img/479166_1_En_9_Fig21_HTML.jpg)\n\
    \n图 9-21\n\n正在运行的示例应用程序\n\n代码仅包含两个文件：\n\n*   `TasksWindow.html`，它构建了应用程序的 UI，并包含\
    \ Java 类的绑定。\n\n*   `TasksWindowCntrl.java`，它包含应用程序的控制器和模型（更具体地说是 *ViewModel*\
    \ 和 *Model*）。\n\n```\n\nAsk!\n\nHow are you?\n\nOK?\n\nGood\nBad\n\n清单 9-18\n\
    TasksWindow.html\n```\n\n这两个窗口是在 `<script>` 标签内定义的。`data-binds`（如果您熟悉 Knockout\
    \ JS）将 UI 元素与后端 `TasksWindowCntrl.java` 绑定。清单 9-18 的第一行指示 UI 在 Java 文件中查找名为 `templateName()`\
    \ 的方法。在清单 9-19 中，您可以看到定义的 `templateName()` 返回字符串 `\"window\"`，该字符串必须与 *html* 文件中\
    \ `<script type=\"text/html\" id=\"window\">` 的 `id` 匹配。\n\n```\n@Model(className\
    \ = \"TasksWindow\", targetId = \"\", properties = {\n@Property(name = \"text\"\
    , type = String.class)\n})\npublic final class TasksWindowCntrl {\n...\n@ComputedProperty\n\
    static String templateName() {\nreturn \"window\";\n}\n@ActionID(\ncategory =\
    \ \"Tools\",\nid = \"todo.view.TasksWindow\"\n)\n@ActionReferences({\n@ActionReference(path\
    \ = \"Menu/Tools\"),\n@ActionReference(path = \"Toolbars/File\"),})\n@NbBundle.Messages(\"\
    CTL_Tasks=Open HTML Hello World!\")\n@OpenHTMLRegistration(\nurl = \"TasksWindow.html\"\
    ,\ndisplayName = \"#CTL_Tasks\",\niconBase = \"todo/controller/resources/icons/taskmrk_tsk.gif\"\
    \n)\npublic static Tasks onPageLoad() {\nreturn new TasksWindow(\"Hello World!\"\
    ).applyBindings();\n}\n清单 9-19\n带有 @Model 定义的 TasksWindowCntrl 类\n```\n\n`TasksWindowCntrl`\
    \ 类在工具栏和 *Tools* 菜单上定义了一个操作。该操作返回生成的 `TasksWindow` 类的一个新实例。`TasksWindow` 类由 `@Model`\
    \ 注解定义。如清单 9-20 所示，它定义了一个名为 `\"text\"`、类型为 `String` 的属性，该属性绑定到 `<input data-bind=\"\
    value: text\"></input>`。因此，传递给 `TasksWindow` 构造函数的文本（`\"Hello World!\"`）会显示在该文本字段中。\n\
    \n```\n\"Hello World!\" ➔ @Property(name = \"text\", type = String.class) ➔ \n\
    清单 9-20\n属性到 HTML 的绑定\n```\n\n必要的模型类是从注解生成的，从而节省了您手动输入的时间。\n\n我们在前一章已经看到了 `@Model`\
    \ 注解，它定义了一个代表某种模型的类，以及 `@Property`，它代表该类的属性。我们还看到了一个 `@ComputedProperty` 注解的示例。\n\
    \n`@Function` 注解响应用户界面的操作。例如，当用户点击 **Ask!** 按钮 `(<button data-bind=\"click: showDialog,\
    \ enable: text\">Ask!</button>)` 时，会调用以下函数（见清单 9-21）。\n\n```\n@Function\nstatic\
    \ void showDialog(TasksWindow model) {\nString reply = Pages.showTasksWindowDialog(model.getText());\n\
    if (\"OK\".equals(reply)) {\nmodel.setText(\"Happy World!\");\n} else {\nmodel.setText(\"\
    Sad World!\");\n}\n}\n清单 9-21\n一个 @Function 示例\n```\n\n最后，`@HTMLDialog` 注解用于显示一个对话框（见图\
    \ 9-21 和清单 9-22）。\n\n```\n@HTMLDialog(url = \"TasksWindow.html\")\nstatic void\
    \ showTasksWindowDialog (String t) {\nnew TasksWindowDialog (t, false).applyBindings();\n\
    }\n清单 9-22\n用于显示对话框的 @HTMLDialog\n```\n"
- fmt: "### TodoHTMLJava\n\nLet’s see how can we rebuild our *ToDo* application UI\
    \ using this API. Since the UI is HTML with some Knockout bindings, we may use\
    \ any CSS library to create our UI.\n\nWith the help of Bootstrap CSS (`https://getbootstrap.com/`),\
    \ we built our UI as shown in Figures 9-22 and 9-23.\n\n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig23_HTML.jpg](Images/479166_1_En_9_Fig23_HTML.jpg)\n\
    \nFigure 9-23  \nThe Create/Edit task dialog box of the TodoHTMLJava application\n\
    \n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig22_HTML.jpg](Images/479166_1_En_9_Fig22_HTML.jpg)\n\
    \nFigure 9-22  \nThe TasksWindow of the TodoHTMLJava application\n\nWe need to\
    \ define each window inside a `<script>` tag, for example.\n\nWe define three\
    \ windows with ids `tasksWindow` (for the main tasks window), `editor` (to edit\
    \ a task), and `showAlertsDialog` (for the dialog box shown in Figure 9-24 when\
    \ the user clicks on the respective button).\n\n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig24_HTML.jpg](Images/479166_1_En_9_Fig24_HTML.jpg)\n\
    \nFigure 9-24  \nThe Alerts dialog box of the TodoHTMLJava application\n\nNext,\
    \ we need to define our *ViewModels* and apply the bindings. In Listing 9-23 we\
    \ define the `TasksWindow` view model, which contains only one property of type\
    \ `array`, an array of `Task`s.\n\n```\n@Model(className = \"TasksWindow\", targetId\
    \ = \"\", properties = {\n@Property(name = \"tasks\", type = Task.class, array\
    \ = true)\n})\npublic final class TasksWindowCntrl {\n...\n@Model(className =\
    \ \"Task\", targetId = \"\", properties = {\n@Property(name = \"id\", type = int.class),\n\
    @Property(name = \"description\", type = String.class),\n@Property(name = \"priority\"\
    , type = int.class),\n@Property(name = \"dueDate\", type = String.class),\n@Property(name\
    \ = \"alert\", type = boolean.class),\n@Property(name = \"daysBefore\", type =\
    \ int.class),\n@Property(name = \"obs\", type = String.class),\n@Property(name\
    \ = \"completed\", type = boolean.class)\n})\npublic static class TaskModel {\n\
    ...\n}\n...\n}\nListing 9-23\nTaskWindow ViewModel\n```\n\n`Task` view model is\
    \ defined in its own (nested) class. You can now apply the bindings (see Listing\
    \ 9-24).\n\n```\n...\n\nListing 9-24\nBindings with the view model\n```\n\nButtons\
    \ are usually bound to `@Function`s:\n\n```\n@Function\nstatic void showAlerts(TasksWindow\
    \ model) {\nString reply = Pages.showAlertsDialog(getExpiredTasks(model.getTasks()));\n\
    }\n@HTMLDialog(url = \"TasksWindow.html\")\nstatic void showAlertsDialog(String\
    \ t) {\nnew ShowAlertsDialog(t).applyBindings();\n}\n@Model(className = \"ShowAlertsDialog\"\
    , targetId = \"\", properties = {\n@Property(name = \"text\", type = String.class)})\n\
    static final class ShowAlertsDialogCntrl {\n@ComputedProperty\nstatic String templateName()\
    \ {\nreturn \"showAlertsDialog\";\n}\n}\nListing 9-25\nButton bindings to @Functions\n\
    ```\n\nListing 9-25 doesn’t only show how the button is bound to the `showAlerts()`\
    \ function, but also how it calls `showAlertsDialog()` to display a dialog box\
    \ (`@HTMLDialog`) with a properly prepared HTML text passed as a `String` to its\
    \ `text` property, prepared by the `getExpiredTasks()` private method.  \nThe\
    \ source code can be found in the repository of this book.  \nYou may find these\
    \ relevant articles, *TodoKO* (`http://wiki.netbeans.org/TodoKO`) and *TodoDS*\
    \ (`http://wiki.netbeans.org/TodoDS`) useful. The API is here (`http://137.254.56.27/html+java/1.6/index.html`).\
    \  \nThe *HTML UI API* is available here (`https://bits.netbeans.org/10.0/javadoc/`).\n\
    \n### Summary\n\nIn this chapter we applied what we learned in the previous chapter,\
    \ by developing *TodoRCP*, *TodoFXRCP,* and *TodoHTMLJava* module suite applications.\
    \ They all use the same model while the *View* is implemented by using *Explorer\
    \ & Properties Sheets*, *JavaFX* and *HTML/Java UI* respectively.  \nIn the next\
    \ chapter, we will see some extra APIs that you may find useful while developing\
    \ your Rich Client Platform applications.\n\n### Footnotes\n\n10. Learning the\
    \ Extras of the Platform\n\nIn this chapter we will learn some extra features\
    \ provided by the NetBeans RCP that might be useful to your applications:\n\n\
    *   the **Dialogs** API including the **Wizard** API\n*   the **Visual Library**\
    \ and the **Palette**\n*   the **Status Bar** and **Notifications**\n*   How to\
    \ use the **progress bar**\n*   **QuickSearch** and the **Output** window\n* \
    \  How to define and persist the settings of your application in the **Options**\
    \ window\n*   How to brand and distribute your application\n\nLet’s get started.\n\
    \n### Dialogs API\n\nThe *Dialogs API* is similar to `javax.swing.JOptionPane`\
    \ and lets you create and display dialogs and wizards in an easy way. One can\
    \ display predefined dialogs, custom dialogs, and multi-step wizards.  \nDisplaying\
    \ a dialog requires two steps: creating a `NotifyDescriptor` to configure the\
    \ dialog, and a `DialogDisplayer` to display it. Before you use it, add a dependency\
    \ to the *Dialogs API* module.\n\n#### Predefined Dialogs\n\nNetBeans includes\
    \ various predefined dialogs for common use cases such as displaying messages\
    \ to users. Listing 10-1 invokes a dialog that displays a message along with an\
    \ **OK** button.\n\n```\nNotifyDescriptor d = new NotifyDescriptor.Message(\"\
    Message\");\nDialogDisplayer.getDefault().notify(d);\nListing 10-1\nDisplay a\
    \ message dialog using the Dialogs API\n```\n\nThe result is shown in Figure 10-1.\
    \ The commands from Listing 10-1 are equivalent to `JOptionPane.showMessageDialog(...)`.\n\
    \n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig1_HTML.jpg](Images/479166_1_En_10_Fig1_HTML.jpg)\n\
    \nFigure 10-1  \nSimple information message dialog\n\nListing 10-2, on the other\
    \ hand, displays the confirmation dialog shown in Figure 10-2.\n\n```\nNotifyDescriptor\
    \ d = new NotifyDescriptor.Confirmation(\n\"Message\", \"Title\");\nObject retVal\
    \ = DialogDisplayer.getDefault().notify(d);\nif (retVal == NotifyDescriptor.YES_OPTION)\
    \ {\n// do something\n}\nListing 10-2\nDisplay a confirmation dialog using the\
    \ Dialogs API\n```\n\nThese commands are equivalent to `JOptionPane.showConfirmDialog(...)`.\n\
    \n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig2_HTML.jpg](Images/479166_1_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2  \nConfirmation dialog\n\nYou can compare `retVal` to the following\
    \ constant values of `NotifyDescriptor`:\n\n*   `OK_OPTION`: The **OK** button\
    \ was clicked.\n*   `YES_OPTION`: The **Yes** button was clicked.\n*   `NO_OPTION`:\
    \ The **No** button was clicked.\n*   `CANCEL_OPTION`: The **Cancel** button was\
    \ clicked.\n*   `CLOSED_OPTION`: The dialog was closed without any button having\
    \ been pressed.\n\nListing 10-3 displays the input dialog of Figure 10-3.\n\n\
    ```\nNotifyDescriptor d = new NotifyDescriptor.InputLine(\n\"Input:\", \"Title\"\
    );\nObject retVal = DialogDisplayer.getDefault().notify(d);\nif (retVal == NotifyDescriptor.OK_OPTION)\
    \ {\nString text =\n((NotifyDescriptor.InputLine) d).getInputText();\n}\nListing\
    \ 10-3\nDisplay an input dialog using the Dialogs API\n```\n\nThese commands are\
    \ equivalent to `JOptionPane.showInputDialog(...)`.\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig3_HTML.jpg](Images/479166_1_En_10_Fig3_HTML.jpg)\n\
    \nFigure 10-3  \nInput dialog\n\nOne can also use the `NotifyDescriptor` class\
    \ to define the properties of a standard dialog as shown in Listing 10-4."
