    ### DataSystem API


    *Data System API* 是 *FileSystem API* 与 *Nodes API*（我们将在下一章介绍）之间的重要桥梁。该 API 的主要类是
    `DataObject` 和 `DataNode`。`DataObject` 封装了一个 `FileObject`，而 `DataNode` 则在 UI 或表示层中显示它。它们都有一个
    `Lookup`，这对于访问与文件关联的功能非常重要。`DataLoader` 通过其 MIME 类型识别 `FileObject` 类型，并创建与之关联的
    `DataObject`。


    ```

    DataObject dob = DataObject.find(myfile);

    ```


    请注意，多个 `FileObject` 可以与一个 `DataObject` 关联（例如，一个 Swing 设计表单 – 一个 `DataObject` –
    使用了两个文件 – `FileObject` – 一个 `.java` 文件和一个 `.form` 文件）。但是，其中一个被指定为主文件：


    ```

    FileObject fob = dob.getPrimaryFile();

    ```


    最后，以下是如何从 `DataObject` 访问相关的 `Node`，反之亦然：


    ```

    Node node = dob.getNodeDelegate();

    DataObject mydob = ((DataNode)node).getDataObject();

    ```


    我们将在下一章中描述 Node API。此外，我们将在第 11 章中看到 *FileSystem* 和 *DataSystem* API 的一个应用，届时我们将为
    NetBeans 开发一个插件。在那里，我们将学习如何创建新的文件类型，并将此文件类型注册到我们的插件中。


    ## 示例应用程序


    让我们尝试通过将一个 Swing ToDo 应用程序移植到 NetBeans RCP 来应用我们目前所学到的知识。如果您希望下载 ToDo Swing 应用程序并自行构建，请继续；否则，您可以跳到本章的“*Todo
    Swing 应用程序*”部分。您也可以在本书的源代码中找到修复后的版本。


    ### 构建 Todo Swing 应用程序


    从此处下载原始的 Swing 应用程序（[`http://netbeans.org/community/magazine/code/nb-completeapp.zip`](http://netbeans.org/community/magazine/code/nb-completeapp.zip)），解压缩，然后在
    NetBeans 中打开它。由于这是一个相当老的应用程序，您会遇到一些问题。按下**解决项目问题**按钮以获取问题列表。点击**解决…**，让 NetBeans
    尝试解决这些问题。


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig6_HTML.jpg](img/479166_1_En_7_Fig6_HTML.jpg)


    图 7-6


    解决 ToDo 应用程序的项目问题


    NetBeans 将解决第一个和最后一个问题，如图 7-6 所示。另外两个需要手动解决。请按照此常见问题解答（[`http://wiki.netbeans.org/FaqFormLayoutGenerationStyle`](http://wiki.netbeans.org/FaqFormLayoutGenerationStyle)）中的说明来解决“swing-layout”库问题。


    下载 *hsqldb.zip*（来自 [`http://hsqldb.org`](http://hsqldb.org)），在 *TodoNB5* 中创建一个
    `lib` 文件夹，然后将 `hsqldb.zip` 中的 `hsqldb.jar` 文件复制到其中。右键单击 *Libraries*，然后从弹出菜单中选择**添加
    JAR/文件夹…**。导航到 `lib` 文件夹并选择 `hsqldb.jar`（确保您选择了*相对路径*）。


    现在您应该能够运行它了。运行时，您应该在状态栏中看到错误：**“无法从数据库获取”**。这是由于 HSQLDB 的版本问题。打开 `TaskManager.java`，找到方法
    `listTasksWithAlert()` `，` 并将 `curtime()` 替换为 `CURRENT_TIMESTAMP`。重新运行应用程序。您现在应该能够看到一个包含空任务列表的窗口。


    ### Todo Swing 应用程序


    如图 7-7 所示，该应用程序由两个窗口组成。主窗口提供了一个任务列表。*任务详情*对话框允许用户创建新任务或编辑现有任务。


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig7_HTML.jpg](img/479166_1_En_7_Fig7_HTML.jpg)


    图 7-7


    ToDo 应用程序 GUI


    以下是该应用程序需求的简短列表：


    *   任务应有优先级，以便用户可以首先关注优先级更高的任务。


    *   任务应有截止日期，以便用户可以转而关注更接近截止日期的任务。


    *   对于已过期或接近截止日期的任务，应有视觉提示。


    *   任务可以标记为已完成，但这并不意味着它们必须被删除或隐藏。


    Todo 应用程序有两个主窗口：一个*任务列表*和一个*任务编辑表单*。两者的粗略草图如图 7-8 所示。


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig8_HTML.jpg](img/479166_1_En_7_Fig8_HTML.jpg)


    图 7-8


    ToDo 应用程序草图


    Todo 应用程序将分三步开发：


    *   步骤 1. 使用可视化 GUI 构建器构建用户界面的“静态”视觉原型。


    *   步骤 2. 构建应用程序的“动态”原型，编写用户界面事件和相关的业务逻辑代码，并根据需要创建自定义 UI 组件。


    *   步骤 3. 编写持久化逻辑代码。


    它由三个包组成：`todo.model`、`todo.view`、`todo.controller`（见图 7-9）。


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig9_HTML.jpg](img/479166_1_En_7_Fig9_HTML.jpg)


    图 7-9


    ToDo 应用程序的包结构


    如图 7-10 所示，Swing ToDo 应用程序遵循*模型-视图-控制器*架构。


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig10_HTML.jpg](img/479166_1_En_7_Fig10_HTML.jpg)


    图 7-10


    ToDo 应用程序架构


    我们将使用 NetBeans 平台模块系统创建一个类似的架构，使用模块代替包（见图 7-11）。


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig11_HTML.jpg](img/479166_1_En_7_Fig11_HTML.jpg)


    图 7-11


    TodoRCP 应用程序架构


    让我们开始吧。点击**新建项目**工具栏按钮，然后在 *NetBeans 模块*类别中选择 *NetBeans 平台应用程序*（见图 7-12）。使用 *“TodoRCP”*
    作为项目名称，并选择合适的位置。然后点击**完成**。


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig12_HTML.jpg](img/479166_1_En_7_Fig12_HTML.jpg)


    图 7-12


    创建一个新的 NetBeans 平台应用程序项目


    NetBeans 创建了 NetBeans 平台应用程序项目，其中包含一个空的 *Modules* 文件夹和一个 *Important Files* 文件夹。这是本书后续部分将要创建的模块的容器。我们将为我们的
    *TodoRCP* 应用程序创建相同的*模型-视图-控制器*结构。


    右键单击 *Modules* 文件夹图标，然后选择**添加新模块**。输入 *“View”* 作为模块名称，然后点击**下一步**。输入 `todo.view`
    作为*代码库名称*，然后点击**完成**。您应该会看到如图 7-13 所示的结构。


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig13_HTML.jpg](img/479166_1_En_7_Fig13_HTML.jpg)


    图 7-13


    TodoRCP NetBeans 平台应用程序项目的结构


    以相同的方式创建另外两个模块，*“Model”* `(todo.model)` 和 *“Controller”* `(todo.controller)`。最后，创建一个名为
    *“Libraries”* 的新模块，它将封装应用程序所需的任何外部库。

