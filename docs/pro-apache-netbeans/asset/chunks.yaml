    \ NetBeans Project Creation wizard.\n\nThe **JSF Composite Component** file selection\
    \ opens a dialog that can be used to create a composite component file. The dialog\
    \ does not provide many options other than the ability to choose a file location\
    \ and name. The generated file contains the skeleton of a composite component,\
    \ as listed in the following lines:\n\nThe **JSF Pages from Entity Classes** file\
    \ selection can be quite powerful in that it allows you to choose an Entity Class\
    \ from which to generate one or more JSF pages, resulting in the page(s) being\
    \ bound to the entity class for generation and update of those entity records.\
    \ In order to use this option, the project must contain at least one entity class.\n\
    \n## Developing Entity Classes\n\nThe Apache NetBeans IDE provides facilities\
    \ to help develop Entity Bean classes, either manually or based upon a selected\
    \ database table. To access the entity class wizards, right-click a project’s\
    \ *Source Packages* folder to open the context menu, and then choose **New** ➤\
    \ **Other** to open the **New File** dialog. Once it is open, choose the *Persistence*\
    \ category from the left-side list box to display the file types in the right-side\
    \ list box (Figure [5-11](#479166_1_En_5_Chapter.xhtml#Fig11)).\n\n![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig11_HTML.jpg](Images/479166_1_En_5_Fig11_HTML.jpg)\n\
    \nFigure 5-11\n\nPersistence File Types\n\nThe *Entity* *Class* file type allows\
    \ you to generate a blank entity class. The *Entity Classes from Database* file\
    \ type allows you to create entity class(es) based upon the selected database\
    \ tables. In doing so, all of the requisite code for mapping the entity class(es)\
    \ to the selected database tables are automatically generated for you.\n\n## Using\
    \ Java Persistence Query Language (JPQL)\n\nApache NetBeans includes a feature\
    \ that allows one to query a database utilizing the Java Persistence Query Language\
    \ (JPQL) syntax. This can be quite helpful for those who are using JPQL in their\
    \ EJB session beans or RESTful web services. To utilize the JPQL query tool, expand\
    \ an Apache NetBeans web project that contains a `persistence.xml` configuration\
    \ file in the project’s *Configuration Files* directory. Then perform the following\
    \ steps:\n\n![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig12_HTML.jpg](Images/479166_1_En_5_Fig12_HTML.jpg)\n\
    \nFigure 5-12\n\nJPQL Tool\n\n1.  Right-click the `persistence.xml` configuration\
    \ file to open the context menu.\n\n2.  Click **Run JPQL Query** to open the tool\
    \ (Figure [5-12](#479166_1_En_5_Chapter.xhtml#Fig12)), type the query, and click\
    \ the **Run** button on the upper right-hand side of the query editor.\n\n   \
    \ **Note**To add a persistence.xml configuration file for JPA configuration, right-click\
    \ on the project and choose: **Other…**, **Persistence**, **Persistence Unit**.\n\
    \n## Deploying and Debugging\n\nThe Apache NetBeans IDE makes the development\
    \ life cycle for enterprise applications very easy. To deploy and test a Maven\
    \ Web Application, ensure that a local application server container target that\
    \ is registered within Apache NetBeans is set correctly within the “Run” tab of\
    \ the project properties. Once set, a project can be deployed by right-clicking\
    \ on the project and choosing “**Run**” from the contextual menu. Once chosen,\
    \ the project WAR file is deployed to the target application server if everything\
    \ is compiled correctly, and the application is opened in the default browser.\n\
    \n### Note\n\nA different default browser can be configured for each project within\
    \ Apache NetBeans by selecting the browser in the toolbar (Figure [5-13](#479166_1_En_5_Chapter.xhtml#Fig13)).\n\
    \n![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig13_HTML.jpg](Images/479166_1_En_5_Fig13_HTML.jpg)\n\
    \nFigure 5-13\n\nChoosing Default Browser\n\nTo debug a project, right-click on\
    \ the project and choose “**Debug**” from the contextual menu. This will cause\
    \ the target application server container to start in “Debug” mode, and the project\
    \ WAR file will be deployed accordingly. When the application server is started\
    \ in debug mode, breakpoints can be set within the project and watches can also\
    \ be configured, just as is the case with standard Java SE applications. Please\
    \ refer to Chapter [6](#479166_1_En_6_Chapter.xhtml) for more details on debugging\
    \ and profiling applications.\n\n## Other Java EE Support Features\n\nThe Apache\
    \ NetBeans 11.0 IDE contains support for a number of file types to aid the development\
    \ of Java EE applications. There have been a number of wizards covered previously\
    \ in this chapter, and in this section, we will take a brief look at some of the\
    \ file support.\n\nBy right-clicking on a project package, then choosing “**New**”\
    \ ➤ “**Other**” the “*New File*” dialog appears. This dialog contains a number\
    \ of categories, including “Web,” “HTML5/JavaScript,” “Bean Validation,” and “Contexts\
    \ and Dependency Injection” to name a few. Inside each of these categories are\
    \ a number of file options. Each of the supported file types includes auto-complete\
    \ for the syntax, color coding, and nice formatting.\n\nPerhaps the most widely\
    \ used category is the “Web” category. In this category are the following file\
    \ types (geared toward front-end development):\n\n*   JSP\n\n*   JSF\n\n*   Servlet\n\
    \n*   Filter\n\n*   Web Application Listener\n\n*   WebSocket Endpoint\n\n*  \
    \ HTML\n\n*   XHTML\n\n*   Cascading Style Sheet\n\n*   JavaScript\n\n*   Json\n\
    \n*   Tag Libraries\n\nSome of the file types will be placed into the “Web Pages”\
    \ folder of a web project, while others will create Java source files or XML configuration.\
    \ Each of the file types in this section are geared toward front-end development.\n\
    \nOther file type categories that are geared toward enterprise development include\
    \ the following:\n\n*   HTML/JavaScript\n\n*   JavaServer Faces\n\n*   Bean Validation\n\
    \n*   Struts\n\n*   Spring Framework\n\n*   Enterprise JavaBeans\n\n*   Contexts\
    \ and Dependency Injection\n\n*   Selenium Test\n\n*   Persistence\n\n*   Web\
    \ Services\n\n*   GlassFish\n\n*   WebLogic\n\n*   Other"
  trans: "\n### 注意\n\n自 Java EE 7+ 和 Jakarta EE 8 起，不应再创建 JSF 托管 Bean。这是因为 JSF 托管\
    \ Bean 技术已被弃用，转而推荐使用 CDI Bean。因此，JSF 托管 Bean 选项会创建一个 CDI 控制器。\n\n点击**下一步**后，JSF\
    \ 页面文件选择会打开一个对话框，可用于生成新的 JSF 页面（图 5-9）。该对话框允许选择文件位置和名称，并且还可以为页面类型应用不同的选项。页面类型选项包括\
    \ Facelets（默认）、JSP 文件或 JSP 片段。本章中的示例均使用 Facelets 页面类型。\n\n![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig9_HTML.jpg](img/479166_1_En_5_Fig9_HTML.jpg)\n\
    \n图 5-9\n\n新建 JSF 页面对话框\n\nJSF 托管 Bean 文件选择会打开一个对话框，允许生成一个 CDI 托管 Bean 控制器类（图\
    \ 5-10）。该对话框提供了将 Bean 数据添加到 `faces-config.xml` 文件（如果需要）以及选择 Bean 作用域的功能。\n\n###\
    \ 注意\n\n`faces-config.xml`（JSF Faces 配置）文件默认不会生成，因为它不是 JSF 项目的必需文件。但是，可以通过 **其他...**、JavaServer\
    \ Faces 上下文菜单来添加它。\n\n![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig10_HTML.jpg](img/479166_1_En_5_Fig10_HTML.jpg)\n\
    \n图 5-10\n\n新建 JSF 托管 Bean\n\n**JSF Faces 配置**文件选择用于为项目生成 `faces-config.xml` 文件。但是，如果您选择在\
    \ NetBeans 项目创建向导中创建 JSF 项目，则此选项不是必需的。\n\n**JSF 复合组件**文件选择会打开一个对话框，可用于创建复合组件文件。除了能够选择文件位置和名称之外，该对话框没有提供太多其他选项。生成的文件包含复合组件的骨架，如下所示：\n\
    \n**来自实体类的 JSF 页面**文件选择功能非常强大，因为它允许您选择一个实体类，并基于该实体类生成一个或多个 JSF 页面，从而使这些页面与实体类绑定，以便生成和更新这些实体记录。要使用此选项，项目中必须至少包含一个实体类。\n\
    \n## 开发实体类\n\nApache NetBeans IDE 提供了帮助开发实体 Bean 类的工具，既可以手动开发，也可以基于选定的数据库表进行开发。要访问实体类向导，请右键单击项目的*源包*文件夹以打开上下文菜单，然后选择**新建**\
    \ ➤ **其他**以打开**新建文件**对话框。打开后，从左侧列表框中选择*持久性*类别，以在右侧列表框中显示文件类型（图 5-11）。\n\n![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig11_HTML.jpg](img/479166_1_En_5_Fig11_HTML.jpg)\n\
    \n图 5-11\n\n持久性文件类型\n\n*实体* *类*文件类型允许您生成一个空白的实体类。*来自数据库的实体类*文件类型允许您基于选定的数据库表创建实体类。这样做时，所有用于将实体类映射到选定数据库表的必要代码都会自动为您生成。\n\
    \n## 使用 Java 持久性查询语言 (JPQL)\n\nApache NetBeans 包含一个功能，允许使用 Java 持久性查询语言 (JPQL)\
    \ 语法查询数据库。这对于那些在其 EJB 会话 Bean 或 RESTful Web 服务中使用 JPQL 的人来说非常有用。要使用 JPQL 查询工具，请展开一个\
    \ Apache NetBeans Web 项目，该项目在其*配置文件*目录中包含一个 `persistence.xml` 配置文件。然后执行以下步骤：\n\
    \n![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig12_HTML.jpg](img/479166_1_En_5_Fig12_HTML.jpg)\n\
    \n图 5-12\n\nJPQL 工具\n\n1.  右键单击 `persistence.xml` 配置文件以打开上下文菜单。\n\n2.  单击**运行\
    \ JPQL 查询**以打开该工具（图 5-12），键入查询，然后单击查询编辑器右上角的**运行**按钮。\n\n    **注意**要添加用于 JPA 配置的\
    \ `persistence.xml` 配置文件，请右键单击项目并选择：**其他…**、**持久性**、**持久性单元**。\n\n## 部署和调试\n\n\
    Apache NetBeans IDE 使企业应用程序的开发周期变得非常容易。要部署和测试 Maven Web 应用程序，请确保在项目属性的“运行”选项卡中正确设置了在\
    \ Apache NetBeans 中注册的本地应用服务器容器目标。设置完成后，可以通过右键单击项目并从上下文菜单中选择“**运行**”来部署项目。选择后，如果一切编译正确，项目\
    \ WAR 文件将部署到目标应用服务器，并且应用程序将在默认浏览器中打开。\n\n### 注意\n\n可以通过在工具栏中选择浏览器（图 5-13）来为 Apache\
    \ NetBeans 中的每个项目配置不同的默认浏览器。\n\n![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig13_HTML.jpg](img/479166_1_En_5_Fig13_HTML.jpg)\n\
    \n图 5-13\n\n选择默认浏览器\n\n要调试项目，请右键单击项目并从上下文菜单中选择“**调试**”。这将导致目标应用服务器容器以“调试”模式启动，并且项目\
    \ WAR 文件将相应部署。当应用服务器以调试模式启动时，可以在项目中设置断点，也可以配置监视，就像标准 Java SE 应用程序一样。有关调试和分析应用程序的更多详细信息，请参阅第\
    \ 6 章。\n\n## 其他 Java EE 支持功能\n\nApache NetBeans 11.0 IDE 支持多种文件类型，以帮助开发 Java EE\
    \ 应用程序。本章前面已经介绍了一些向导，在本节中，我们将简要介绍一些文件支持。\n\n通过右键单击项目包，然后选择“**新建**” ➤ “**其他**”，会出现“*新建文件*”对话框。此对话框包含多个类别，包括“Web”、“HTML5/JavaScript”、“Bean\
    \ 验证”和“上下文与依赖注入”等。这些类别中的每一个都包含许多文件选项。每种受支持的文件类型都包含语法自动完成、颜色编码和良好的格式。\n\n也许最广泛使用的类别是“Web”类别。此类别中包含以下文件类型（面向前端开发）：\n\
    \n*   JSP\n\n*   JSF\n\n*   Servlet\n\n*   Filter\n\n*   Web 应用程序监听器\n\n*   WebSocket\
    \ 端点\n\n*   HTML\n\n*   XHTML\n\n*   层叠样式表\n\n*   JavaScript\n\n*   Json\n\n*\
    \   标签库\n\n某些文件类型将放置在 Web 项目的“Web 页面”文件夹中，而其他文件类型将创建 Java 源文件或 XML 配置。本节中的每种文件类型都面向前端开发。\n\
    \n其他面向企业开发的文件类型类别包括：\n\n*   HTML/JavaScript\n\n*   JavaServer Faces\n\n*   Bean\
    \ 验证\n\n*   Struts\n\n*   Spring 框架\n\n*   企业 JavaBeans\n\n*   上下文与依赖注入\n\n* \
    \  Selenium 测试\n\n*   持久性\n\n*   Web 服务\n\n*   GlassFish\n\n*   WebLogic\n\n*\
    \   其他\n"
- fmt: '# Summary


    The Apache NetBeans IDE includes exceptional support for Java EE applications.
    It is easy to build a Java EE project from the ground up, with options for generating
    front-end, back-end, and configuration files. By adding a container for deployment,
    the IDE allows for easy debugging and deploy-on-save options. Apache NetBeans
    helps boost productivity for beginner and advanced enterprise developers alike.


    # 6. Debugging and Profiling


    Debugging and profiling are probably the two most important things, besides writing
    code, for which you can use Apache NetBeans. Debugging is the art of figuring
    out problems and their root causes. Apache NetBeans provides a very feature-rich
    debugging environment from multiple sessions to multiple languages. If debugging
    makes your code right, profiling will make it run fast. Apache NetBeans contains
    one of the most advanced profiling engines for memory and CPU profiling based
    on the JFluid technology developed by Sun Microsystems. Although Apache NetBeans
    supports debugging for a lot of different programming languages and project types,
    this chapter focuses on support for the JVM and the Java Language.


    ## Debugging


    ### Getting Started


    Starting a debugging session is simple. As an example, we use the Anagram Game
    sample provided by NetBeans. Just select *New Project*, go to the *Samples* category
    expand *Java* in the tree, and select *Anagram Game* in the *Project* list. Once
    you have it opened, just press the *Debug Project* button in the toolbar or use
    the menu item from the context menu of the project node. Besides just running
    a project in the debugger, Apache NetBeans also supports attaching a debugger
    to a running process. There are different attachment modes: *ProcessAttach*, *SocketAttach*,
    or *SocketListen*. Depending on the installed plugins, it will be possible to
    select different debuggers as well; for example, `gdb` if C++ plugins are available.


    The dialog for attaching a debugger is shown in Figure [6-1](#479166_1_En_6_Chapter.xhtml#Fig1).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig1_HTML.jpg](Images/479166_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Attach debugger to running process


    Once the debugger is running, Apache NetBeans automatically shows two additional
    views, the *Debugging* view and the *Variables* view. The *Debugging* view is
    used to display all threads running (or paused) in the debugged process. The *Variables*
    view displays information about variables in the actual context, once the debugger
    stops. An example of NetBeans showing the initial debugger experience can be seen
    in Figure [6-2](#479166_1_En_6_Chapter.xhtml#Fig2).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig2_HTML.jpg](Images/479166_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Initial debugging experience


    ### Note


    If any of the screenshots show windows that are not immediately visible to you,
    this is typically caused by window presets differing from the default (e.g., caused
    by usage of your IDE). To open the necessary window, just select *Window* from
    the main menu and select the corresponding item from the *Debugging* submenu.


    In addition to the two views, Apache NetBeans shows the *Debug* toolbar. This
    toolbar provides access to all the necessary actions to control the debugging
    session. Besides the toolbar, all actions can also be triggered via the *Debug*
    main menu item or selected ones using the keyboard. All buttons to control the
    debugging workflow can be seen in Figure [6-3](#479166_1_En_6_Chapter.xhtml#Fig3).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig3_HTML.jpg](Images/479166_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Debugging toolbar


    The actions from left to right are the following:


    - **Finish Debugger Session (⇧-F5)**. Ends the debugging session by either detaching
    from or killing the debugged process, depending on the mode the debugger is used
    in.

    - **Pause Debugger Session**. Suspends all running threads of the debugged process.

    - **Continue Debugger Session (F5)**. Resumes all paused threads.

    - **Step over (F8)**. Moves the execution pointer to the next line.

    - **Step over Expression (⇧-F8)**. Moves the execution pointer one expression
    further.

    - **Step into (F7)**. Moves the execution pointer one stack-level down, that is,
    steps into the method call in this line. If multiple method calls are available,
    the exact method call can be selected.

    - **Step out (**⌘**+F7)**. Moves the execution pointer one stack-level up, that
    is, steps out from the actual method debugged.

    - **Run to Cursor (F4)**. Moves the execution pointer to the line that the cursor
    is positioned on.

    - **Apply Code Changes**. Compiles the code in the active editor tab and pushes
    the changed code to the JVM. In addition, the execution pointer may be moved up
    the stack, to accommodate the new code.

    - **Toggle Pause in GraalVM Script**. Schedules a suspend with regard to the Truffle
    multi-language integration. To use this action, NetBeans must run on GraalVM.

    - **Take GUI Snapshot**. Takes a snapshot of the current state of the Swing component
    graph for interactive inspection and modification.


    The last thing needed to have a real debugging session is a *Breakpoint*. A breakpoint
    defines where the debugger will automatically suspend the thread, which happens
    to run past the defined breakpoint. The simplest way to create a new breakpoint
    is to either click into the gutter of the editor on the correct line, or press
    ⌘**-F8** (in Mac) or `Ctrl+F8` (on Windows/Linux) with the cursor being on the
    line where the debugger should suspend the execution. The same actions can be
    taken to remove a breakpoint, that is, the action triggered is called *Toggle
    Breakpoint*. Once a breakpoint is created, it is marked in the gutter with a special
    symbol. This can be seen in Figure [6-4](#479166_1_En_6_Chapter.xhtml#Fig4).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig4_HTML.jpg](Images/479166_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Debugging toolbar'
