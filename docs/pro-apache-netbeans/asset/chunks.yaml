    ## Handling Events


    Now that you have a display of tasks ready, it’s time to add some event handling.
    In the original ToDo application, it was useful to separate GUI events into two
    mutually exclusive categories:


    *   *Internal events*, which affect just the view itself


    *   *External events*, which cause model methods to execute


    Internal events include selection changes and clicks on **Cancel** buttons. In
    the original ToDo application, these were handled by the view classes themselves
    and were not exposed as part of the view classes’ public interfaces. For example,
    the selection of a task should enable the **Edit task** menu item and the **Remove
    task** menu item, and the corresponding toolbar buttons. Such events are now handled
    by conditionally enabled actions with cookies inside the *Controller* module,
    not in the *View* package anymore.


    View classes should *not* handle the category of events that the author of the
    original ToDo application calls “external.” These events should instead be forwarded
    to controller classes, which usually implement the workflow logic for a specific
    use case or a related set of use cases.


    The original ToDo application includes the `todo.view.ActionSupport` class , which
    simply keeps a list of `ActionListeners` and forwards `ActionEvents` to them.
    But `ActionSupport` is itself an `ActionListener`. This is done to avoid having
    lots of event-related methods, such as `addNewTaskListener(), removeNewTaskListener(),
    addEditTaskListener(), removeEditTaskListener()`, and so on. Instead, view classes
    generate only an `ActionEvent`. The `ActionSupport` classes capture `ActionEvent`s
    from the view components and forward them to the controller, which registers itself
    as a view `ActionListener`.


    All these classes aren’t needed in the *TodoRCP* application because the NetBeans
    RCP framework takes care of all this. What you need to do is simply complete the
    `actionPerformed()` methods of your actions. So, your job is to transfer the logic
    from `QueryEditTasks` to your actions. Listing [9-5](#479166_1_En_9_Chapter.xhtml#PC5)
    shows how they map.


