    *Dedicated to our families who have silently supported us in our adventures as
    authors. More specifically:*


    *Ioannis Kostaras:*


    *To my lovely wife Katerina; my adorable little son Nikolaos-Ioannis; and my parents,
    Nikolaos and Zinovia*


    *Constantin Drabo:*


    *I dedicate this book to my lovely mother, my brother Emmanuel, and sister Denise,
    my spouse Mariam, and my little son Johann. Finally, to these special persons:
    Geertjan Wielenga and Malo Sadouanouan*


    *Josh Juneau:*


    *To my wife Angela; and my children, Katie, Jake, Matt, Zach, and Luke*


    *Sven Reimers:*


    *To my beloved wife Isabelle*


    *Mario Schröder:*


    *To my wife Fridah*


    *Geertjan Wielenga:*


    *To my wife Hermine*


    ## Introduction


    *Pro Apache NetBeans* provides a detailed overview of the latest additions to
    NetBeans IDE, like support for JShell, the Jigsaw Module System, and Local Variable
    Type Inference, focusing on what this new version brings to developers. It also
    describes new features in NetBeans Platform, that is, the framework the NetBeans
    IDE has been built upon.


    The book is a practical, hands-on guide providing a number of step-by-step recipes
    that help you take advantage of the power in the latest Java (and other) software
    platforms, and it gives a good grounding in using NetBeans IDE for your projects.
    This book has been written by the Apache community members who have been using
    the IDE and actively contributing and developing Apache NetBeans as an open source
    project.


    *Pro Apache NetBeans* consists of three parts. The first part describes how to
    use the IDE as well as the new features that it brings to support the latest Java
    versions. The second part describes how you can extend NetBeans by creating plugins
    or writing your own standalone applications using the Rich Client Platform. The
    third part describes how you can contribute to develop your favorite IDE further,
    becoming part of the open source team that is driving future developments in the
    toolset.


    In more detail, Chapter [1](#479166_1_En_1_Chapter.xhtml), “What Is NetBeans,”
    provides a gentle introduction to NetBeans. It explains what NetBeans is and what
    it is not, its history, all the way to its new home, the Apache Software Foundation,
    being its second biggest project. It also provides an introduction of the many
    programming languages and tools that NetBeans supports, and it introduces you
    to many other things that are explained in more detail in the rest of the book.


    Chapter [2](#479166_1_En_2_Chapter.xhtml), “Getting Started with NetBeans,” provides
    an overview of the NetBeans IDE, which will help new users to become familiar
    with its User Interface, the various windows, and it introduces you to how to
    build your first Java project. It also provides useful tricks and tips to help
    you speed up your productivity.


    Chapter [3](#479166_1_En_3_Chapter.xhtml) provides an overview of the new features
    that Apache NetBeans IDE, since version 9.0, provides for Java versions 9–12 and
    other programming languages. It describes support for JShell, the Jigsaw Module
    System, `HttpClient` and Local Variable Type Inference, as well as improvements
    for PHP.


    Chapter [4](#479166_1_En_4_Chapter.xhtml) describes how to develop desktop applications.
    These are standalone applications running, typically, locally on your machine
    without the need of a web or an application server. The chapter explains there
    are three ways to develop Java GUI desktop applications: using the Abstract Window
    Toolkit (AWT), Swing, or JavaFX. NetBeans provides a very powerful visual editor
    that you can use to build your GUI with dragging and dropping components onto
    forms (panels). The chapter also guides you through the steps for developing your
    own desktop application.


    Chapter [5](#479166_1_En_5_Chapter.xhtml) describes how to build Enterprise (or
    Web) applications. Contrary to desktop applications, these require a web or application
    server to serve HTML pages. Java EE support has been included with Apache NetBeans
    since release 11.0. Full support for Maven web applications and Java EE technologies
    such as Enterprise JavaBeans (EJB), Contexts and Dependency Injection (CDI), and
    JavaServer Faces (JSF) allows developers the convenience of auto-completion, code
    fragments, and easy syntax recognition. After finishing this chapter, you will
    have a basic understanding of the conveniences provided by Apache NetBeans for
    full stack Java EE development.


    Chapter [6](#479166_1_En_6_Chapter.xhtml), “Debugging and Profiling Applications,”
    explains in detail the powerful debugger and profiler of Apache NetBeans. If debugging
    makes your code right, profiling will make it run fast. Things like breakpoints,
    debugging multi-threaded code, CPU and memory profiling, snapshots, etc., are
    explained in this chapter.


    Part II of the book describes the NetBeans Platform (or Rich Client Platform),
    that is, the framework or libraries that the NetBeans IDE has been built upon.
    With this knowledge you can better understand the NetBeans source code that will
    allow you to fix bugs, or extend it by writing your own plugins. Or you can use
    it to develop your own desktop applications faster than using Swing.


    Chapter [7](#479166_1_En_7_Chapter.xhtml), “Mastering the Core Platform,” introduces
    the reader to the core APIs of the NetBeans Platform, namely, the NetBeans module
    system, the `FileSystem`, and the `Lookups`. NetBeans provides its own module
    system to modularize applications, which supports the use of OSGi. A comparison
    with Java’s module system, Jigsaw, is provided in this chapter. NetBeans also
    provides its own libraries to access the filesystem. A comparison with `NIO.2`,
    introduced in Java 7, is provided. Finally, the `Lookups` are a very powerful
    tool to build loosely coupled applications. A comparison with Java 6 `ServiceLoader`
    is also provided.


    Chapter [8](#479166_1_En_8_Chapter.xhtml), “Mastering the User Interface,” teaches
    the reader the GUI components of the NetBeans Platform, namely the Window system,
    the Action system, the Node System, and the Explorer Views and Property Sheets,
    all reducing the time you need to develop powerful UIs.


    In Chapter [9](#479166_1_En_9_Chapter.xhtml), the reader applies what s/he has
    learned so far by porting a desktop application to NetBeans RCP. The development
    is done in three steps: (1) Build a “static” visual prototype of the user interface;
    (2) Build a “dynamic” prototype of the application, coding user interface events
    and associated business logic and creating customized UI components as needed;
    and (3) Code the persistence logic.


    Chapter [10](#479166_1_En_10_Chapter.xhtml), “Learning the Extras of the Platform,”
    describes many of the other APIs provided by the NetBeans Platform, such as the
    Dialogs API, the Visual Library and the Palette, the Status Bar and Notifications,
    the progress bar, the `QuickSearch` and the Output window, etc.


    Chapter [11](#479166_1_En_11_Chapter.xhtml) teaches you how to extend NetBeans
    by writing a plugin for it. You will learn step by step how to develop a plugin
    for Hyperledger, an open source effort to advance blockchain technologies, hosted
    by the Linux Foundation.


    Part III gives you an overview of the new home that hosts NetBeans, the Apache
    Foundation; its infrastructure to support open source projects like the various
    tools that allow issue tracking, testing, documentation, etc.; and gives you all
    the information you need to become a contributor of Apache NetBeans.


    Chapter [12](#479166_1_En_12_Chapter.xhtml) describes the Apache NetBeans Process.
    After a short history, it explains how the migration of source code was achieved
    from Oracle to Apache, the various NetBeans versions under Apache as an incubator
    project, and the graduation to a top-level Apache Project.


    Chapter [13](#479166_1_En_13_Chapter.xhtml) describes the Apache Infrastructure
    and the various tools that the Apache Software Foundation provides for its projects
    for issue/bug reporting, wikis, websites, etc.


    Chapter [14](#479166_1_En_14_Chapter.xhtml) describes the NetCAT program. The
    **Net**Beans IDE **C**ommunity **A**cceptance **T**esting program is very important
    for the quality of the product. A typical NetCAT program takes around two months
    of activities. The chapter explains how each NetBeans version is tested by the
    community before it is released. You can easily participate in this program and
    execute tests, thus helping to improve your favorite IDE.


    Chapter [15](#479166_1_En_15_Chapter.xhtml) provides an overview of the NetBeans
    source code, its architecture, its various modules, and their dependencies. It
    describes how to download and build the NetBeans source code, load it in NetBeans
    IDE, and debug it. Finally, this chapter encourages you to contribute to the NetBeans
    source code by fixing bugs and committing your changes to a baseline.


    ## Acknowledgments


    Authoring a book is like departing for an adventure. Even though you make a plan,
    you don’t know how long it is going to take, how big the waves will be, and what
    new land you are going to explore. Like Odysseus, we seek our Ithaca and the way
    is not always easy – it is full of adventures and exciting indeed – but rewarding
    in the end.


    This book is our adventure into an IDE we all love and continue to work with.
    So before anybody else, we would like to acknowledge and thank this little team
    from the University of Prague who had the fancy idea of creating NetBeans, its
    never-tired Product Manager, Geertjan Wielenga, as well as all the people that
    have contributed one way or another, all these years, to make this IDE a necessity
    for all of us.


    We would also like to thank the Apress team for their patience and support in
    a multi-author community book that has not always been easy to manage and coordinate,
    their persistent comments leaving nothing to chance, and scrutinizing every sentence
    of the drafts. However, any errors that may still exist are the responsibility
    of the authors.


    Finally, but not least, we would like to thank our families for bearing with us
    during our adventure, when we were spending many hours behind a computer’s screen,
    trying to explain as best as we could the many NetBeans topics you will find in
    this book, as well as writing example programs that would give more value to its
    readers.'
