- fmt: '# 7. Mastering the Core Platform


    As we saw in Chapter [4](#479166_1_En_4_Chapter.xhtml), NetBeans eases the development
    of desktop applications written with either Swing or JavaFX. While Swing is a
    stable and well-entrenched library, the newer JavaFX API offers an improved rich
    media solution. However, both libraries lack a framework. That is, both lack an
    out-of-the-box solution with a window management system and true Model-View-Controller
    parts that sophisticated desktop applications require.


    You’re probably familiar with the NetBeans IDE as a development tool. However,
    NetBeans is also a platform for building modular applications. The NetBeans IDE
    is built on top of the *NetBeans Rich Client Platform* or *RCP*.


    The NetBeans Rich Client Platform is a generic framework that provides the “plumbing”
    when developing desktop applications, such as the code for managing windows, connecting
    actions to menu items, and updating applications at runtime. The NetBeans Platform
    provides all of these out of the box on top of a reliable, flexible, and well-tested
    modular architecture. It is for desktop applications what the Java Enterprise
    Edition framework is for web applications.


    This chapter is a big picture description of what the NetBeans Rich Client Platform
    offers to desktop application developers and an executive summary of what you
    can expect to learn in Part 2 of the book.


    First, you will learn the ***core*** of the NetBeans Platform (or RCP) (this chapter):


    - The Module system

    - The File system

    - Lookups


    After you have acquired a good background of the *core*, we move to the GUI part
    (Chapter [8](#479166_1_En_8_Chapter.xhtml)), which is built on top of Swing:


    - Window system

    - Nodes

    - Explorer Views

    - Action system


    We also describe two alternative technologies:


    - JavaFX and the NetBeans Platform

    - HTML/Java UI


    We apply the above by porting a Swing application to the NetBeans Platform in
    Chapter [9](#479166_1_En_9_Chapter.xhtml).


    Finally, we teach you some extras (Chapter [10](#479166_1_En_10_Chapter.xhtml)):


    - Visual Library

    - Dialogs

    - Wizards

    - Branding, distribution, and internationalization


    Chapter [11](#479166_1_En_11_Chapter.xhtml) uses the information you learned in
    the previous chapters to help you build a plugin for NetBeans.


    Figure [7-1](#479166_1_En_7_Chapter.xhtml#Fig1) shows the architecture of the
    NetBeans platform on which Part 2 of the book is based.


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig1_HTML.png](Images/479166_1_En_7_Fig1_HTML.png)


    Figure 7-1


    Overview of the NetBeans Platform architecture


    This link ([`https://platform.netbeans.org/screenshots.html`](https://platform.netbeans.org/screenshots.html))
    provides a list of desktop applications written on top of NetBeans RCP.


    ## The Core Platform


    In this chapter we will learn the *Core* NetBeans Rich Client Platform (see Figure
    [7-1](#479166_1_En_7_Chapter.xhtml#Fig1) in Chapter [7](#479166_1_En_7_Chapter.xhtml)),
    which consists of the following systems (APIs):


    - The **Module System**: Modularity offers a solution to “JAR hell” by letting
    you organize code into strictly separated and versioned modules. Only modules
    that have explicitly declared dependencies on each other are able to use code
    from each other’s exposed packages. The NetBeans Module system preexisted the
    Java 9 module system (Jigsaw) and is based on OSGi. A comparison of the two module
    systems is provided.


    - The **Lookup** API is a loose coupling mechanism enabling a component to place
    a query for a particular interface and get back pointers to all registered instances
    of that interface across all modules of the application. Simply put, `Lookup`
    is an observable `Map`, with `Class` objects as keys and instances of those `Class`
    objects as values, and it allows loosely coupled communication between modules.


    - The **File System** is a unified API that provides stream-oriented access to
    flat and hierarchical structures, such as disk-based files on local or remote
    servers, memory-based files, and even XML documents. `FileObject`s and `DataObject`s
    are the basic classes of the FileSystem API.'
