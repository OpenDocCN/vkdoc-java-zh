    8.  如果你认为该插件符合插件门户的质量标准（参见维基：[`https://cwiki.apache.org/confluence/display/NETBEANS/Quality+criteria+for+Plugin+Portal+Update+Center`](https://cwiki.apache.org/confluence/display/NETBEANS/Quality%252Bcriteria%252Bfor%252BPlugin%252BPortal%252BUpdate%252BCenter)），你可以选择通过点击“**请求验证**”按钮，让你的插件接受验证并获批发布。


    总结

    在本章中，我们逐步学习了如何使用 Maven 为一种新语言创建 NetBeans 插件的若干指南。你已经看到，为新项目创建模板、识别新文件类型，以及借助 ANTLR
    实现语法高亮和错误提示是多么容易。我们还涉及了代码补全和导航窗口。NetBeans 的查找 API 被用于包之间的通信。最后，你了解了签名和发布插件所需的必要步骤。

    在下一章中，你将了解 NetBeans 为何被移至 Apache 软件基金会的旗下，以及你如何为该项目做出贡献。


    脚注


    第三部分参与 Apache NetBeans


    12. Apache NetBeans 流程


    使 Apache 软件基金会（简称“Apache”）对 NetBeans 而言既特殊又合适的原因在于其治理模式。人们常常会问：“既然 NetBeans 过去是、现在也一直是免费且开源的，它真的需要
    Apache 吗？”这正是我们将在本章中探讨的问题。

    在本章结束时，我们希望你能理解 NetBeans 迁移至 Apache 的背景、此次迁移带来的好处，尤其是你如何亲自参与到该项目中并做出贡献。


    关于酒馆与传说

    传说 NetBeans 起源于布拉格的酒馆和饮酒场所。从很多方面来说，这确实是真的。1996 年，一群来自布拉格工业大学的学生开发了一个工具，用于支持当时尚属新兴且缺乏工具的
    Java 开发。根据同样的传说，当时开发工作进展不多，但酒水消耗不少；尽管该工具的计划描述得很详尽，但直到这些学生毕业并意识到他们拥有一个时机已到的好主意后，这些计划才得以实现。

    “NetBeans”这个奇特的名字也可以从这个角度来理解：当时的两大热门话题是“JavaBeans”和“Network”，将这两个术语合二为一，就像现在的“Facebook”和“Netflix”一样合乎逻辑。不久之后，当
    Java 之父詹姆斯·高斯林和当时领导 Sun 公司工具部门的乔纳森·施瓦茨在一次会议上看到 NetBeans 的演示，并认识到它可以作为让新开发者快速、全面地开启
    Java 之旅的环境基础时，Sun 微系统公司（简称“Sun”）便收购了 NetBeans。

    Sun 将 NetBeans 定位为引导新 Java 开发者入门、并让专业开发者高效工作的工具，随后将其开源，并着手对其进行模块化改造。根据另一个传说，NetBeans
    的开发者无论如何都主要对创建一个模块化框架感兴趣，然后在其模块化框架之上创建了 NetBeans 集成开发环境（IDE），纯粹是为了证明该框架。这样一来，开发环境反而成了事后才考虑的事情，而其底层的
    NetBeans 平台（你在第二部分中已了解）才是开发者关注的核心领域。


    向 Apache 的模块化迁移

    无论如何，模块化已被证明是 NetBeans 的关键优势之一，尤其是在迁移至 Apache 的过程中。

    2010 年甲骨文收购 Sun 后，NetBeans 在其新东家那里有了许多有趣的新用例。它成为了甲骨文 JDeveloper 的基础，其多项功能（如窗口系统、GUI
    构建器和分析器）都在那里被复用。在甲骨文实验室，它成为了围绕新型多语言 GraalVM 的工具链的核心部分。然而，部分由于社区持续要求更直接地参与 NetBeans
    的开发，部分由于优先级调整，部分也是为了分担维护成本，甲骨文于 2016 年 10 月决定将 NetBeans 捐赠给 Apache。

    甲骨文非常明确地表示，它希望继续向 NetBeans 投入资源，并且将其捐赠给 Apache 的决定绝不意味着它在放弃 NetBeans。事实上，作为其既定方向的证据，甲骨文
    Java 组织内的一支开发者团队至今仍在持续为 NetBeans 工作，专注于提供与 Java 开发工具包（JDK）和 Java 语言新特性相关的 Java
    编辑器增强功能。

    此外，甲骨文内部的一个团队从迁移之初就开始工作，并每周开会讨论代码向 Apache 迁移的当前状态、分配任务、报告进展等。

