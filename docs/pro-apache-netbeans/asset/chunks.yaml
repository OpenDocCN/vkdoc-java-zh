- fmt: '## Step 2 – Build the “Dynamic” Prototype


    Let’s now complete our actions.


    For `AddTaskAction` to display `TaskDetailsDialog`, simply copy the code of Listing
    [9-3](#479166_1_En_9_Chapter.xhtml#PC3) inside the `actionPerformed()` method
    of `AddTaskAction`:


    ```

    TaskDetailsDialog taskDetailsDialog = new TaskDetailsDialog(null, true);

    taskDetailsDialog.setNewTask(true);

    taskDetailsDialog.setTask(new Task());

    //        taskDetailsDialog.addActionListener(this);

    taskDetailsDialog.setVisible(true);

    Listing 9-3

    AddTaskAction actionPerformed() method

    ```


    You need to add a dependency from *Controller* to *View* in order to be able to
    fix imports for `TasksDetailsDialog`, making `todo.view` package public first.


    `EditTaskAction` is also easy to write (see Listing [9-4](#479166_1_En_9_Chapter.xhtml#PC4)).


    ```

    public final class EditTaskAction implements ActionListener {

    private final Task context;

    public EditTaskAction(Task context) {

    this.context = context;

    }

    public void actionPerformed(ActionEvent ev) {

    TaskDetailsDialog taskDetailsDialog =

    new TaskDetailsDialog(null, true);

    taskDetailsDialog.setNewTask(false);

    taskDetailsDialog.setTask(context);

    //        taskDetailsDialog.addActionListener(this);

    taskDetailsDialog.setVisible(true);

    }

    }

    Listing 9-4

    EditTaskAction

    ```


    Let’s see how we can display some mock data to the `OutlineView`. As we learned
    in the previous chapter, we need to wrap the data to nodes, that is, wrap our
    model (`Task`) to a `Node`, and more specifically, to a `BeanNode`, which uses
    reflection to retrieve the attributes of the *Value Objects* (`Task` in our case).
    Create the class of Listing [8-3](#479166_1_En_8_Chapter.xhtml#PC3) of Chapter
    [8](#479166_1_En_8_Chapter.xhtml) inside the *View* module (and add a dependency
    on the *Node API*).


    To display tasks in `OutlineView`, you need a flat list of nodes. A flat list
    of nodes is a root node that provides leaf nodes only; that is, one-level-deep
    children only. Factories are used to create children (see Listing [8-4](#479166_1_En_8_Chapter.xhtml#PC4)
    in Chapter [8](#479166_1_En_8_Chapter.xhtml)).


    `OutlineView` is populated with mock data, as shown in the method `createKeys()`
    in Listing [8-4](#479166_1_En_8_Chapter.xhtml#PC4) (Chapter [8](#479166_1_En_8_Chapter.xhtml)).
    Look how `TaskChildFactory` uses the default lookup in order to retrieve the `TaskManager`
    implementation to retrieve all the tasks. Loose-coupling!


    Finally, `TasksTopComponent` needs to be modified, as shown in Listing [8-8](#479166_1_En_8_Chapter.xhtml#PC9)
    (Chapter [8](#479166_1_En_8_Chapter.xhtml)).


    `ExplorerManager`, which is the controller of the explorer views, needs a root
    node element. Pass it an `AbstractNode`; its `Children` are derived from the `TaskChildFactory`.


    With many fewer lines of code than in the original Swing ToDo application, you
    now have a running prototype with populated data. Build and run it to see a view
    similar to that shown in Figure [9-13](#479166_1_En_9_Chapter.xhtml#Fig13).


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig13_HTML.jpg](Images/479166_1_En_9_Fig13_HTML.jpg)


    **Figure 9-13** TodoRCP with sample data


    However, when you select one or more rows, the conditionally enabled actions aren’t
    enabled accordingly. To fix this, you need to add the `Task` object to the `TaskNode`''s
    lookup, and then you need to set the `TopComponent`''s lookup to be that of its
    nodes. To do that, modify `TaskNode` as shown in Listing [8-5](#479166_1_En_8_Chapter.xhtml#PC6)
    (Chapter [8](#479166_1_En_8_Chapter.xhtml)), which adds the task to the node’s
    lookup.


    The singleton lookup contains only one object, which in this case is your task.
    Set the `TopComponent`''s lookup to be that of the node’s by adding the code of
    Listing [8-9](#479166_1_En_8_Chapter.xhtml#PC10) (Chapter [8](#479166_1_En_8_Chapter.xhtml))
    after the line where you set the root context for the `ExplorerManager`.


    ## Handling Events


    Now that you have a display of tasks ready, it’s time to add some event handling.
    In the original ToDo application, it was useful to separate GUI events into two
    mutually exclusive categories:


    - *Internal events*, which affect just the view itself

    - *External events*, which cause model methods to execute


    Internal events include selection changes and clicks on **Cancel** buttons. In
    the original ToDo application, these were handled by the view classes themselves
    and were not exposed as part of the view classes’ public interfaces. For example,
    the selection of a task should enable the **Edit task** menu item and the **Remove
    task** menu item, and the corresponding toolbar buttons. Such events are now handled
    by conditionally enabled actions with cookies inside the *Controller* module,
    not in the *View* package anymore.


    View classes should *not* handle the category of events that the author of the
    original ToDo application calls “external.” These events should instead be forwarded
    to controller classes, which usually implement the workflow logic for a specific
    use case or a related set of use cases.


    The original ToDo application includes the `todo.view.ActionSupport` class, which
    simply keeps a list of `ActionListeners` and forwards `ActionEvents` to them.
    But `ActionSupport` is itself an `ActionListener`. This is done to avoid having
    lots of event-related methods, such as `addNewTaskListener()`, `removeNewTaskListener()`,
    `addEditTaskListener()`, `removeEditTaskListener()`, and so on. Instead, view
    classes generate only an `ActionEvent`. The `ActionSupport` classes capture `ActionEvent`s
    from the view components and forward them to the controller, which registers itself
    as a view `ActionListener`.


