- fmt: '# Development of Standalone Apache NetBeans Modules


    In many cases, developers wish to build extensions to the Apache NetBeans environment.
    There have been many dozens of useful NetBeans modules created by developers in
    the community. Such modules extend the IDE to incorporate new and/or enhanced
    functionality. Extensions can encapsulate almost any functionality. For instance,
    a module can be used for adding new language support to the IDE, or for extending
    existing functionality such as adding enhanced Git support. Whatever it may be,
    Apache NetBeans modules are easy to develop using the project templates.


    To get started, select the “NetBeans Modules” ➤ “Module” project type. Once selected,
    the new module can be created as a “Standalone” module or it can be added to a
    “Module Suite.” On the next panel, a “Code Name Base” must be specified. The “Code
    Name Base” is much the same as a base package name (Figure [1-21](#479166_1_En_1_Chapter.xhtml#Fig21)).
    A package localizing bundle can also be specified, as well as the option to generate
    the module as an OSGI module.


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig21_HTML.jpg](Images/479166_1_En_1_Fig21_HTML.jpg)


    Figure 1-21


    New Module Wizard


    The project structure is very similar to that of a Java SE project, although there
    are a number of configuration files that are generated that are particular to
    the module (Figure [1-22](#479166_1_En_1_Chapter.xhtml#Fig22)).


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig22_HTML.jpg](Images/479166_1_En_1_Fig22_HTML.jpg)


    Figure 1-22


    NetBeans Module Structure


    The module will create an NBM file, which can later be added as an extension to
    NetBeans IDE. The module can also be deployed as a NetBeans plugin for distribution.


    # Development of Applications Built on the NetBeans Platform


    The NetBeans Platform allows developers to architect-rich client applications
    utilizing a skeleton framework that provides many under the cover features for
    free. The platform allows development of Java Swing applications in a fraction
    of the time that it would take to develop one from scratch. The platform includes
    features such as state saving and life-cycle management, standardized UI toolkit,
    window system; and all of these features are easy to implement out of the box.


    When developing on the NetBeans Platform, the IDE allows for easy debugging into
    modules or platform applications. As such, this makes it easy to rapidly create
    stable user interfaces that utilize a standard architecture. Since the platform
    provides many essential client-side application APIs out of the box, you can be
    certain that all standard NetBeans Platform applications behave in a consistent
    manner.


    ## Apache NetBeans Community


    Apache NetBeans has a vibrant community consisting of several online resources,
    frequent conference speakers and sessions, and a rich history of documentation
    and tutorials. The Apache NetBeans community has been around since the early 2000s,
    and it has grown tremendously over the years from a small core group to an entire
    open source community.


    ### Mailing Lists and NetCAT


    One of the most basic and informative ways to become a part of the Apache NetBeans
    community is to join the mailing lists. The lists are frequently used to post
    questions and to discuss new and existing features for the IDE. The lists are
    also useful for learning how an open source community functions, as there are
    always seasoned experts on the lists ready to assist. To join the Apache NetBeans
    mailing lists, visit the following webpage:


    [https://netbeans.apache.org/community/mailing-lists.html](https://netbeans.apache.org/community/mailing-lists.html)


    Prior to an Apache NetBeans release, the impending release must be tested to ensure
    full functionality. One of the phases of Apache NetBeans testing is the NetCAT
    program. NetCAT is a community of testers that are each assigned to test different
    portions of the IDE. The IDE functionality is broken up into different NetCAT
    organizational groups. Each group meets periodically online to formulate plans
    for testing, and each tester completes test cases using an online form. Becoming
    a NetCAT tester can provide you with more knowledge of the Apache NetBeans IDE
    and allow you to give back to the community by helping to weed out issues. Learn
    more about joining NetCAT using the link mentioned for the Apache NetBeans mailing
    lists.


    ### Tackle an Issue


    One of the most important ways that one can contribute to the Apache NetBeans
    ecosystem is to find an issue on the Apache NetBeans JIRA (issue tracker) and
    repair it. This is easy to do by simply creating a fork of the Apache NetBeans
    GitHub repository, and then making the necessary code updates to repair the issue
    within the fork. Once the issue has been repaired, changes within the fork can
    be added back to the Apache NetBeans GitHub repository by submitting a Pull Request.
    To learn more about contributing code to Apache NetBeans, please refer to Chapters
    [14](#479166_1_En_14_Chapter.xhtml) and [15](#479166_1_En_15_Chapter.xhtml).


    # Getting Started with NetBeans


    When you want to quickly develop an application, you can use Apache NetBeans IDE
    to simplify your tasks. In this chapter, you will discover the layout of the editor
    along with some tips that will help you to have some control over your code and
    speed up development.


    ## Default Layout and Purpose


    Each window in the IDE appears as a tab in the pane or position where it resides.
    Additionally, the IDE’s window system enables you to arrange windows anywhere
    in the IDE by dragging and dropping to any of the window positions shown in the
    layout of Figure [2-1](#479166_1_En_2_Chapter.xhtml#Fig1).


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig1_HTML.jpg](Images/479166_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Apache NetBeans Default Layout Windows positions


    The following sections cover some of the specific windows that you will see for
    each of the positions in Figure [2-1](#479166_1_En_2_Chapter.xhtml#Fig1). For
    example, the Explorer window position can show projects, or files, or services,
    all depending upon the context of what you are doing at a given time.


    ### Explorer Window


    The Explorer window position is used by all windows that provide access to user
    objects. These windows include the projects window, files window, services window,
    and the tasks window.


    #### Projects Window


    The Projects Window (`Ctrl+1` or `Cmd+1`) displays project sources. It displays
    the logical view of one or more projects. Each project or view is represented
    by a node, with a specific icon depending on the project type (e.g., a Java application
    node is presented differently from a JavaFX application node) as shown in Figure
    [2-2](#479166_1_En_2_Chapter.xhtml#Fig2).


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig2_HTML.jpg](Images/479166_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Projects Window with different types of projects


    Right-clicking on each node invokes a pop-up menu listing commands that you can
    run on that node. The pop-up menu provides project commands to compile, build,
    run, etc. You can also execute the main file of a Java project by selecting the
    project and pressing the `F6` shortcut key.


    #### Files Window


    The Files Window (`Ctrl+2` or `Cmd+2`) displays the directory-based view of a
    project, including files and folders that are not displayed in the Projects window.
    Right-clicking on each node invokes a menu that has commands to create new files
    or directories, and also copy, cut, and paste actions. Figure [2-3](#479166_1_En_2_Chapter.xhtml#Fig3)
    shows an example of a project structure.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig3_HTML.jpg](Images/479166_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Directory-based structure of a project in Files Window'
