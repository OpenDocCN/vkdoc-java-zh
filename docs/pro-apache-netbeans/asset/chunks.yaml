    *   **webcommon**：支持 JavaScript、Knockout、Angular、Selenium 等（见图 [15-8](#479166_1_En_15_Chapter.xhtml#Fig8)）。


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig8_HTML.jpg](Images/479166_1_En_15_Fig8_HTML.jpg)


