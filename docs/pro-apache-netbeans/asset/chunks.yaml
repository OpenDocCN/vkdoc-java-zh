- fmt: '# Summary


    Table [10-1](#479166_1_En_10_Chapter.xhtml#Tab1) shows a grouping of modules that
    provide functionality from the Apache NetBeans Platform. The table is a summary
    of the provided functionality by that platform. You may use most of the `jar`
    files mentioned in the table outside the NetBeans IDE, that is, using another
    IDE or a text editor to develop an application based on Apache NetBeans RCP.


    In the next chapter you will apply what you have learned so far in order to create
    a plugin for NetBeans.


    ## Table 10-1: Apache NetBeans Platform Modules Overview


    | Modules grouping | Provided functionality |

    | --- | --- |

    | **Core** | |

    | `boot.jar` `core.jar` `org-openide-filesystems.jar` `org-openide-modules.jar`
    `org-openide-util-lookup.jar` `org-openide-util.jar` | Provide the runtime container.
    |

    | `org-netbeans-modules-masterfs.jar` | Provides the central registry file system
    functionality (a.k.a. layer). |

    | **UI** | |

    | `org-netbeans-core.jar` `org-netbeans-core-execution.jar` `org-netbeans-core-ui.jar`
    `org-netbeans-core-windows.jar` | Provide the basic UI components. |

    | `org-netbeans-windows.jar` | Provides the API for processing the window system.
    |

    | `org-openide-actions.jar` | Provides a number of configurable system actions
    (for example “Cut,” “Copy,” “Paste”). |

    | `org-openide-nodes.jar` `org-openide-explorer.jar` `org-netbeans-swing-outline.jar`
    | Provide the APIs for *Nodes* and *Explorer views*, that is, the UI part of the
    platform. |

    | `org-netbeans-core-multiview.jar` | Provides the MultiView window. |

    | `org-netbeans-swing-plaf.jar` `org-netbeans-swing-tabcontrol` `org-jdesktop-layout.jar`
    | Provides the look and feel and the display of tabs and a wrapper for the Swing
    Layout Extensions library. |

    | **Extras** | |

    | `org-openide-awt.jar` | Provides many helper classes for displaying UI elements
    (for example notifications, see Figure [10-8](#479166_1_En_10_Chapter.xhtml#Fig8)).
    |

    | `org-openide-dialogs.jar` | Provides an API for displaying standard and customized
    dialogs and wizards (see beginning of this chapter). |

    | `org-netbeans-api-visual.jar` | Provides the widget and graph library API for
    modeling and displaying visual representations of data. |

    | `org-netbeans-spi-quicksearch.jar` | Provides the API for integrating items
    into the *Quick Search* field (see Figure [10-9](#479166_1_En_10_Chapter.xhtml#Fig9)).
    |

    | `org-netbeans-modules-options-api.jar` | Provides the *Options* window API (see
    Figure [10-14](#479166_1_En_10_Chapter.xhtml#Fig14)). |

    | `org-netbeans-modules-settings.jar` | Provides an API for saving module-specific
    settings in a user-defined format. |

    | `org-netbeans-api-progress.jar` `org-openide-execution.jar` `org-netbeans-modules-progress-ui.jar`
    | Provides support for asynchronous long-running tasks and integration for long-running
    tasks with the NetBeans Platform’s progress bar. |

    | `org-netbeans-core-output2.jar` `org-openide-io.jar` | Provides the Output window
    (see Figure [10-13](#479166_1_En_10_Chapter.xhtml#Fig13)). |

    | `org-netbeans-modules-autoupdate-services.jar` `org-netbeans-modules-autoupdate-ui.jar`
    | Provides the update center and plugins functionality. |

    | `org-netbeans-modules-favorites.jar` | Provides the *Favorites* window functionality
    (menu **Window ➤ Favorites**). |

    | `org-openide-loaders.jar` | Provides an API to work with file types. |

    | `org-netbeans-modules-mimelookup.jar` `org-netbeans-modules-editor-mimelookup.jar`
    | Provides an API for discovery and creation of settings specific to file types.
    |

    | `org-netbeans-modules-javahelp.jar` | Provides the *JavaHelp* runtime library
    that enables JavaHelp sets from different modules to be merged into a single help
    set. |

    | `org-netbeans-modules-queries.jar` | Provides an API for getting information
    about files and an SPI for creating your own queries. |

    | `org-netbeans-modules-sendopts.jar` | Provides an API and SPI for registering
    your own handlers for accessing the command line. |

    | `org-openide-text.jar` | Provides an extension to the `javax.swing.text` API.
    |'
