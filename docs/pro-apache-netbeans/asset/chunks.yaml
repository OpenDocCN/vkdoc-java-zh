- fmt: "![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig3_HTML.jpg](Images/479166_1_En_11_Fig3_HTML.jpg)\n\
    \n**Figure 11-3** Dialog to add dependencies\n\nChange the scope to `test`, untick\
    \ ‘Only NetBeans’, and use the query field for the following dependencies:\n\n\
    *   `org.junit.jupiter:junit-jupiter-api:5.5.1`\n*   `org.junit.jupiter:junit-jupiter-engine:5.5.1`\n\
    *   `org.hamcrest:hamcrest-core:2.1`\n*   `org.mockito:mockito-junit-jupiter:2.28.2`\n\
    \nTo enable an incubating feature in Mockito, which creates mocks for final classes,\
    \ add a new file `src/test/resources/mockito-extensions/org.mockito.plugins.MockMaker`\
    \ with a single line:\n\n```\nmock-maker-inline\n```\n\nFor more information about\
    \ the Mockito library, see the following link: [`http://static.javadoc.io/org.mockito/mockito-core/2.24.0/org/mockito/Mockito.html`](http://static.javadoc.io/org.mockito/mockito-core/2.24.0/org/mockito/Mockito.html).\n\
    \nAll Maven dependencies that are related to NetBeans will have a tag that shows\
    \ the version which you are using to build the plugin. It’s advisable to add a\
    \ new property that holds this version, which gives you an easy way to change\
    \ the version later.\n\n```\nUTF-8\n1.8\n1.8\nRELEASE82\n4.7.1\n```\n\n## Project\
    \ Template\n\nThe business network archive contains several files. For instance,\
    \ there is a JavaScript file that is used to define a business rule that applies\
    \ to a transaction. A model file defines the basic concept involved in the business.\
    \ To avoid creating each one of those files manually for a new project, we are\
    \ going to create a new project type, which will appear in the wizard for projects.\n\
    \nWe start with a new Node.js Application, which will serve as the source folder\
    \ for our template. So again, start the wizard and create a new project as shown\
    \ in Figure [11-4](#479166_1_En_11_Chapter.xhtml#Fig4).\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig4_HTML.jpg](Images/479166_1_En_11_Fig4_HTML.jpg)\n\
    \n**Figure 11-4** Wizard with Node.js Application\n\nRemove the directory `private`\
    \ under `nbproject`, as well as the `main.js`. Copy the source files from the\
    \ business network, which we created in the previous section, into the `src` directory\
    \ of this project.\n\nTo have support for publishing the business network from\
    \ NetBeans, edit the script section of the `package.json` in the IDE:\n\n```\n\
    \"scripts\": {\n\"publish\": \"mkdirp ./dist && composer archive create --sourceType\
    \ dir --sourceName . -a ./dist/ledger.bna\",\n\"pretest\": \"npm run lint\",\n\
    \"lint\": \"eslint .\",\n\"test\": \"nyc mocha -t 0 test/*.js && cucumber-js\"\
    \n}\n```\n\nSwitch to the Files window in the IDE, and create a new `.gitignore`\
    \ file with this content:\n\n```\ndist/\nnode_modules/\n```\n\nEdit the `project.properties`\
    \ within the `nbproject` folder.\n\n```\nauxiliary.org-netbeans-modules-javascript-nodejs.enabled=true\n\
    run.as=node.js\nfiles.encoding=UTF-8\nsource.folder=\n```\n\nChange the name-tag\
    \ in the `project.xml` file:\n\n```\n<project>\n    <name>Hyperledger Business\
    \ Network</name>\n</project>\n```\n\nThe folder for the zip file should look like\
    \ this directory structure:\n\n```\n.\n├── README.md\n├── nbproject\n│   ├── project.properties\n\
    │   └── project.xml\n├── features\n│   ├── sample.feature\n│   └── support\n│\
    \       └── index.js\n├── lib\n│   └── logic.js\n├── models\n│   └── org.example.biznet.cto\n\
    ├── package.json\n├── permissions.acl\n└── test\n    └── logic.js\n```\n\nLet’s\
    \ build a template, which is based on this project. Select the project in NetBeans’\
    \ Projects window, and right-click. Then create a new project template: “New File”\
    \ ➤ “Module Development” ➤ “Project Template.” See Figure [11-5](#479166_1_En_11_Chapter.xhtml#Fig5).\n\
    \n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig5_HTML.jpg](Images/479166_1_En_11_Fig5_HTML.jpg)\n\
    \n**Figure 11-5** Wizard to create a Project Template\n\nSelect the previously\
    \ created Node.js project (Figure [11-6](#479166_1_En_11_Chapter.xhtml#Fig6)).\n\
    \n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig6_HTML.jpg](Images/479166_1_En_11_Fig6_HTML.jpg)\n\
    \n**Figure 11-6** Wizard to select a Project Template\n\nClick “Next,” enter some\
    \ meaningful name, use a package with the name “template,” and click Finish. See\
    \ Figure [11-7](#479166_1_En_11_Chapter.xhtml#Fig7).\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig7_HTML.jpg](Images/479166_1_En_11_Fig7_HTML.jpg)\n\
    \n**Figure 11-7** Wizard to set name and location of the Project Template\n\n\
    This process will add some dependencies to the `pom.xml`, create several new classes,\
    \ some resources, and also a zip file with the content from the other Node.js\
    \ project.\n\nThe starting point for the project template is the annotation `@TemplateRegistration`\
    \ for the `HyperledgerWizardIterator`. Let’s change the icon there.\n\n```\n@TemplateRegistration(folder\
    \ = \"Project/ClientSide\",\ndisplayName = \"#Hyperledger_displayName\",\ndescription\
    \ = \"HyperledgerDescription.html\",\niconBase = \"org/netbeans/modules/hyperledger/template/blockchain.png\"\
    ,\ncontent = \"HyperledgerProject.zip\")\n@Messages(\"Hyperledger_displayName=Hyperledger\"\
    )\npublic class HyperledgerWizardIterator implements WizardDescriptor./*Progress*/InstantiatingIterator\
    \ {\n...\n}\n```\n\nYou can also extend the `HyperledgerDescription.html` to provide\
    \ some more information to the user of the plugin. When we run the plugin, we\
    \ can already see a new project template for Hyperledger. It allows you to create\
    \ a new project from scratch.\n\n## File Support\n\nHowever, when we open the\
    \ `.cto` file within the model folder, we realize that there is no support for\
    \ this file yet. Let’s create the foundation, so that NetBeans recognizes this\
    \ file type.\n\nChoose the menu “File” ➤ “New File” ➤ “Module Development” ➤ “File\
    \ Type.” This will bring up the wizard as shown in Figure [11-8](#479166_1_En_11_Chapter.xhtml#Fig8).\n\
    \n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig8_HTML.jpg](Images/479166_1_En_11_Fig8_HTML.jpg)\n\
    \n**Figure 11-8** Wizard for new file type\n\nIt will create support for our new\
    \ file type. Figure [11-9](#479166_1_En_11_Chapter.xhtml#Fig9) shows the next\
    \ step of the wizard. Define the MIME type and file extension and click “Next”\
    \ to continue. Figure [11-10](#479166_1_En_11_Chapter.xhtml#Fig10) shows the last\
    \ step. There we enter “Cto” for the class name prefix, and select an icon and\
    \ package. Please make sure to deselect the check box “Use Multiview.” Then click\
    \ on “Finish.”\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig10_HTML.jpg](Images/479166_1_En_11_Fig10_HTML.jpg)\n\
    \n**Figure 11-10** Step 3 for Name, Icon, and Location\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig9_HTML.jpg](Images/479166_1_En_11_Fig9_HTML.jpg)\n\
    \n**Figure 11-9** Step 2 to edit File Recognition\n\nNext, create a new interface\
    \ that holds some constants that we are going to use while creating more features.\n\
    \n```\npackage org.netbeans.modules.hyperledger.cto;\nimport org.netbeans.api.annotations.common.StaticResource;\n\
    public interface FileType {\n@StaticResource\nString ICON = \"org/netbeans/modules/hyperledger/cto/value_16x16.png\"\
    ;\nString MIME = \"text/cto\";\n}\n```\n\nYou can exchange the string values for\
    \ the mime type and icon path in the `CtoDataObject` with the reference to the\
    \ constants in the interface.\n\n```\n@MIMEResolver.ExtensionRegistration(\ndisplayName\
    \ = \"#LBL_Cto_LOADER\",\nmimeType = FileType.MIME,\nextension = {\"cto\", \"\
    CTO\"},\nposition=120\n)\n@DataObject.Registration(\nmimeType = FileType.MIME,\n\
    iconBase = FileType.ICON,\ndisplayName = \"#LBL_Cto_LOADER\",\nposition = 300\n\
    )\n```\n\nWhen you run the plugin and use the Favorites Window to open the previous\
    \ created file, you will see that the new file type is now recognized by NetBeans,\
    \ and it is indicated using the previously added icon. But there is no syntax\
    \ coloring and auto-completion available. So let’s work on that."
