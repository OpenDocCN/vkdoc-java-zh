    \ auto-update plugin\n    center, welcome, deadlock detector, etc.\n\n*   **php**:\
    \ PHP support (see Figure\n    [15-5](#479166_1_En_15_Chapter.xhtml#Fig5)).\n\n\
    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig5_HTML.jpg](Images/479166_1_En_15_Fig5_HTML.jpg)\n\
