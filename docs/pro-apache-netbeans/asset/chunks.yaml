  trans: '

    ### 设置基于 Ant 的项目


    默认情况下，Apache NetBeans IDE 使用 Ant 作为构建自动化工具。以下是使用 Ant 创建新项目的步骤：


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig16_HTML.jpg](img/479166_1_En_2_Fig16_HTML.jpg)


    图 2-16


    新建项目向导


    1.  要创建项目，请选择**文件 ➤ 新建项目**（`Ctrl+Shift+N`），或单击**新建项目**工具栏图标（左上角带有绿色加号的文件夹）。将出现*新建项目*向导，如图
    2-16 所示。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig17_HTML.jpg](img/479166_1_En_2_Fig17_HTML.jpg)


    图 2-17


    在向导的步骤 2 中提供项目名称和位置


    1.  选择 *Java with Ant* 类别。右侧会显示多个项目模板，例如 *Java Application*、*Java Modular Project*
    等。选择一个项目模板；如果您正在跟随当前示例操作，请选择 *Java Application*。然后单击**下一步**。


    2.  下一步如图 2-17 所示。在此处，您可以提供项目名称、应用程序的存储目录（项目位置），以及包含 `main()` 方法的类。按图 2-17 所示填写字段。然后单击**完成**。


    您已创建了一个新的 Java 项目。Java Application 模板会设置一个基本的 Java 项目，并包含一个主类，如图 2-18 所示。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig18_HTML.jpg](img/479166_1_En_2_Fig18_HTML.jpg)


    图 2-18


    已创建的新 Java 应用程序


    新应用程序包含 *Ant 构建文件*。您可以通过 *文件* 选项卡显示该构建文件。选择 *Ant 清单* 时，*导航器窗口* 会显示构建目标，如图 2-19
    所示。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig19_HTML.jpg](img/479166_1_En_2_Fig19_HTML.jpg)


    图 2-19


    Ant 构建文件和目标


    ### 设置基于 Maven 的项目


    Maven 是一种非常流行的构建自动化工具，在 Java 生态系统中占据主导地位。Apache NetBeans 原生支持 Maven（即，集成在 IDE
    内部，不像其他 IDE 那样作为插件）。您可以通过执行以下步骤使用 Maven 设置新项目：


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig20_HTML.jpg](img/479166_1_En_2_Fig20_HTML.jpg)


    图 2-20


    新建项目向导


