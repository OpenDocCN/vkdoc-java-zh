- fmt: '- 与个别成员核对进度；

    - 保持他们的积极性；

    - 帮助他们解决潜在问题；

    - 与 *NetCAT 协调员* 沟通，尤其是在遇到障碍时；

    - 鼓励部落成员验证已修复的 Bug。


    根据每个 Apache NetBeans 版本的发布标准（例如，

    [`https://cwiki.apache.org/confluence/display/NETBEANS/NetBeans+11.0+Release+Criteria`](https://cwiki.apache.org/confluence/display/NETBEANS/NetBeans%252B11.0%252BRelease%252BCriteria)），

    部落领袖拥有两项特殊权限：


    - 在部落内部达成共识后，他们可以为 Bug 打上 `WAIVER` 标签。

    - 在部落内部达成共识后，他们可以为 Bug 打上 `BLOCKER` 标签。每个部落一次最多只能有三个此类未关闭的 Bug 被标记为此标签。


    此外，如果部落领袖能在全面测试*之前*，组织对其负责功能的测试规范进行审查，并共同尝试更新这些规范（如果时间允许），将不胜感激。


    ### NetCAT 协调员


    您也可以决定成为 NetCAT 项目的协调员。作为 *NetCAT 协调员*，您将负责以下事项：


    - 监控开发进度并准备 NetCAT 时间表；

    - 在项目开始前更新 NetCAT 时间表；

    - 发送邀请信息并推广该项目，以招募足够的 NetCAT 参与者；

    - 组建 NetCAT 部落，寻找部落领袖，并在整个项目过程中为他们提供支持；

    - 维护 `Synergy`（[`http://netbeans-vm.apache.org/synergy`](http://netbeans-vm.apache.org/synergy)）（用户、部落和测试运行），以确保开发构建版本得到全面测试，候选发布版本得到认证；

    - 通过 `JIRA` Bug 仪表板（[`https://issues.apache.org/jira/browse/NETBEANS`](https://issues.apache.org/jira/browse/NETBEANS)）和
    NetCAT 邮件列表（`netcat@netbeans.incubator.apache.org`）上的讨论，监控质量状态和稳定化进度；

    - 如有需要，通过编写每周状态报告、组织在线会议、创建在线调查等方式，鼓励更多人参与该项目；

    - 创建最终的 *社区验收调查*，处理并发布其结果；

    - 帮助获得必要的 Apache NetBeans 利益相关者对发布的批准；

    - 通过在 NetCAT 参与者中创建满意度调查、评估他们的活动并宣布最佳贡献者来结束该项目。


    如果您认为自己能够完成上述任务，并且每周可以投入两到五个小时用于 NetCAT 协调工作，请联系 NetCAT 邮件列表（`netcat@netbeans.incubator.apache.org`）。


    ### Synergy


    `Synergy`（[`http://netbeans-vm.apache.org/synergy`](http://netbeans-vm.apache.org/synergy)）是
    NetCAT 项目的测试规范和测试运行管理系统（参见图 [14-1](#479166_1_En_14_Chapter.xhtml#Fig1)）。


    ![../images/479166_1_En_14_Chapter/479166_1_En_14_Fig1_HTML.jpg](Images/479166_1_En_14_Fig1_HTML.jpg)


    **图 14-1** Synergy 主页


    在准备阶段，您会收到来自部落领袖的电子邮件，要求您审查/更新一个或多个测试规范。一旦 NetCAT 项目开始运行（参见，例如，表 [14-1](#479166_1_En_14_Chapter.xhtml#Tab1)），您需要执行一个或多个这些测试，记录所花费的时间，并报告任何
    Bug。


    ### 测试规范


    通过从 `Synergy` 的主页（见图 [14-1](#479166_1_En_14_Chapter.xhtml#Fig1)）选择 **Test Specifications**
    菜单项，您将看到一个测试规范列表。您的部落领袖会在 NetCAT 项目开始前几天与您沟通，为您分配一个或多个需要审查的测试规范。


    图 [14-2](#479166_1_En_14_Chapter.xhtml#Fig2) 显示了一个测试规范示例。它为您提供了简短描述、预估执行时间以及具体内容。


    ![../images/479166_1_En_14_Chapter/479166_1_En_14_Fig2_HTML.jpg](Images/479166_1_En_14_Fig2_HTML.jpg)


    **图 14-2** 一个测试规范


    一个测试规范由*测试套件*组成。一个测试套件由*测试用例*组成。一个测试用例包含一系列要执行的步骤和一系列预期的结果（见图 [14-3](#479166_1_En_14_Chapter.xhtml#Fig3)）。


    ![../images/479166_1_En_14_Chapter/479166_1_En_14_Fig3_HTML.jpg](Images/479166_1_En_14_Fig3_HTML.jpg)


    **图 14-3** 一个测试用例


    您可以通过提供的超链接验证现有的 Bug 问题是否仍然有效，或报告新问题。您需要修改测试用例，使其与待测试的 NetBeans 版本保持一致（例如，根据新版本用户界面的任何修改来更新步骤）。如果您发现任何严重问题，可以通知部落领袖。


    ### 测试运行


    当根据 NetCAT 时间表（参见，例如，表 [14-1](#479166_1_En_14_Chapter.xhtml#Tab1)）的时间到来时，实际测试就要开始了。您的部落领袖将为您提供用于测试的
    Apache NetBeans 二进制文件的下载链接。请不要自行编译 NetBeans 源代码，并使用编译好的版本进行官方测试。


    在这种情况下，请从 `Synergy` 主页选择 **Test Runs** 菜单（见图 [14-4](#479166_1_En_14_Chapter.xhtml#Fig4)）。


    ![../images/479166_1_En_14_Chapter/479166_1_En_14_Fig4_HTML.jpg](Images/479166_1_En_14_Fig4_HTML.jpg)


    **图 14-4** 一个测试运行摘要


    NetCAT 协调员将与您的部落领袖一起，已经更新了此页面，您应该会看到一个条目，其中包含您的姓名、您在 `Confluence` 注册时提到的操作系统，以及分配给您的、等待执行的测试规范（见图
    [14-5](#479166_1_En_14_Chapter.xhtml#Fig5)）。


    ![../images/479166_1_En_14_Chapter/479166_1_En_14_Fig5_HTML.jpg](Images/479166_1_En_14_Fig5_HTML.jpg)


    **图 14-5** 一个测试运行执行摘要


    点击 **Run** 按钮来执行测试。您可以随时暂停测试。您会被告知进度和剩余步骤。您有机会在 `JIRA` 中报告任何 Bug 或跳过某些步骤。一旦您完成测试执行，结果将如图
    [14-5](#479166_1_En_14_Chapter.xhtml#Fig5) 所示。在项目结束时，您将被要求提交一份 *社区验收 (CA)* 调查，您可以在其中表达您对新主要功能是否准备好发布的意见。


    ### 总结


    在本章中，我们描述了 NetCAT 项目及其在发布新版本 Apache NetBeans 之前的重要性。我们介绍了时间表、如何参与、部落、部落领袖和 NetCAT
    协调员，最后介绍了如何使用 `Synergy` 进行实际测试。如果您觉得它很有趣并且认为自己可以参与，那么请不要犹豫，联系 NetCAT 邮件列表，以申请成为志愿者并积极为下一个
    Apache NetBeans 版本的发布做准备。


