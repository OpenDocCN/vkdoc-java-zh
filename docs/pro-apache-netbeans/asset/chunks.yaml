- fmt: '### Refactoring


    Sometimes you want to change the name of a specific element (class, variable,
    method) in a project, but this can have a domino effect as it might break dependencies,
    that is, other elements that depend on that name. Instead of modifying each file
    that uses that name, you can use the *refactoring* feature. Refactoring an element
    will replace the old name of each occurrence by the new name.


    Say, for example, that you would like to rename a class from `Animals` to `Animal`.
    Here are the steps to getting the IDE to do the work for you:


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig28_HTML.jpg](Images/479166_1_En_2_Fig28_HTML.jpg)


    Figure 2-28: Rename class refactor window


    1.  Put the cursor on the class name in the Source Editor and press `Ctrl-R`,
    or right-click and select **Refactoring ➤ Rename** from the pop-up menu (see Figure
    [2-28](#479166_1_En_2_Chapter.xhtml#Fig28)).

    2.  Check **Apply Rename on Comments**, if you wish that the modification will
    be applied also to occurrences in comments.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig29_HTML.jpg](Images/479166_1_En_2_Fig29_HTML.jpg)


    Figure 2-29: Preview Refactoring occurrences


    3.  Type the new name of the class and press **Preview** to preview all the occurrences
    or **Refactor** to apply the rename without preview. The IDE will present you
    with both versions of your source file, as shown in Figure [2-29](#479166_1_En_2_Chapter.xhtml#Fig29).

    4.  Does everything look good? Then press **Do Refactoring** to apply the modifications.
    Otherwise press **Cancel**.


    ### Comparing Files


    The editor offers a “diff” feature to deal with the problem of finding differences
    between two files. For example, say that you have two `Animal` class definitions,
    each one in a separate package. Do the following to see whether those definitions
    are the same or different:


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig30_HTML.jpg](Images/479166_1_En_2_Fig30_HTML.jpg)


    Figure 2-30: Differences between two files


    1.  Open both class files in the Source editor.

    2.  Right-click on one of the source files in the *Projects window* and select
    **Tools ➤ Diff to…** A dialog box appears displaying a list with the files that
    open in the Editor.

    3.  Select the second file from the Files Open in Editor list to display the results
    of the diff operation. Figure [2-30](#479166_1_En_2_Chapter.xhtml#Fig30) shows
    how green backgrounds are used to indicate lines of code that are present in one
    file, but missing from the other.


    ### Generating Code


    You can generate pieces of code when coding a Java application. The IDE offers
    some alternatives: by using the *Code Completion* feature, or from the *Code Generation*
    pop-up menu, or by using the *Refactoring* features. The code completion feature
    can be used to add code snippets in a Java class body. For example, the feature
    can help to generate the accessors in a class for which you have defined properties
    that you wish to make available to other classes.


    Figure [2-31](#479166_1_En_2_Chapter.xhtml#Fig31) shows how to create a setter
    function in the class `Animal` for the `name` attribute. If the pop-up menu doesn’t
    appear, type `Ctrl+space`.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig31_HTML.jpg](Images/479166_1_En_2_Fig31_HTML.jpg)


    Figure 2-31: Generate code snippets with code completion


    Use the *Code Generation* pop-up menu by clicking inside the editor and pressing
    `Alt-Insert` (or choosing **Source ➤ Insert code**). It helps, for example, to
    generate a constructor as shown in Figure [2-32](#479166_1_En_2_Chapter.xhtml#Fig32).


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig32_HTML.jpg](Images/479166_1_En_2_Fig32_HTML.jpg)


    Figure 2-32: Code Generation pop-up menu


    Thanks to this feature you can easily generate the body of class with extreme
    speed. It generates getters and setters, `toString()`, `equals()` and `hashCode()`
    methods, overrides methods from the superclasses, etc., in only a few clicks.


    The option **Add property** creates with one action both a field and its accessors.
    Below is a sample of inputs for the *Add Property* dialog box (Figure [2-33](#479166_1_En_2_Chapter.xhtml#Fig33)).


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig33_HTML.jpg](Images/479166_1_En_2_Fig33_HTML.jpg)


    Figure 2-33: Add Property dialog box


    The second alternative to generate accessors is by choosing **Refactor ➤ Encapsulate**.
    The IDE displays the *Encapsulate Fields* dialog box (see Figure [2-34](#479166_1_En_2_Chapter.xhtml#Fig34)).


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig34_HTML.jpg](Images/479166_1_En_2_Fig34_HTML.jpg)


    Figure 2-34: Encapsulate Fields dialog box


    Select one or more fields or select all the fields by pressing the **Select All**
    button. Then press **Refactor** to encapsulate the fields (i.e., generate the
    accessors with the visibility you selected).


    ### Using Code Templates


    The IDE helps with predefined pieces of code provided through code templates.
    Code templates are abbreviations of long code snippets.


    To access a code template, type the abbreviation and hit `Ctrl+Space`. Doing so
    will expand the full code as shown in Figure [2-35](#479166_1_En_2_Chapter.xhtml#Fig35).
    There you can see that I typed the keyword `while`. Then when I pressed `Ctrl+Space`,
    NetBeans suggested several templates with code snippets beginning with that same
    keyword.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig35_HTML.jpg](Images/479166_1_En_2_Fig35_HTML.jpg)


    Figure 2-35: Code template for while


    There are predefined sets of abbreviations with templates you can use, or you
    may customize the existing ones or add your own by displaying the *Options* dialog
    box (see Figure [2-36](#479166_1_En_2_Chapter.xhtml#Fig36)) via **Tools ➤ Options
    ➤ Editor ➤ Code Templates** (**NetBeans ➤ Preferences ➤ Editor ➤ Code Templates**
    on Mac).


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig36_HTML.jpg](Images/479166_1_En_2_Fig36_HTML.jpg)


    Figure 2-36: Code Templates window


    ### Splitting Windows


    It often happens that we want to look at different source files simultaneously.
    You can easily look at two files by *splitting* the Source Editor. Having at least
    two source files open, click on the tab of a file and then drag it to the far
    left, far right, or bottom of the Source Editor window. Release the mouse button
    when the red outline that appeared around the tab when you started dragging changes
    to a rectangle indicating the placement of the split window. Figure [2-37](#479166_1_En_2_Chapter.xhtml#Fig37)
    shows the result.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig37_HTML.jpg](Images/479166_1_En_2_Fig37_HTML.jpg)


    Figure 2-37: View of two files simultaneously


    Splitting windows is applicable to a single source file, too. Below there are
    four ways to split a source file into two views:


    *   On the right side of each editor window, above the vertical scrollbar, there
    is a small plus icon that you can drag to split the window horizontally or vertically.

    *   Use the menu action **Window ➤ Configure Window ➤ Split Document ➤ Horizontally
    or Vertically**.

    *   Right-click the file’s tab and select **Clone**.

    *   Right-click the file’s tab and select **Split ➤ Vertically** or **Split ➤
    Horizontally**.


    Figure [2-38](#479166_1_En_2_Chapter.xhtml#Fig38) shows the same source file being
    edited in two views. The advantage of such an edit is that you can have one view
    positioned on, say, a class definition in order to remind yourself of what the
    class is about while you are writing code later in the document that refers to
    the class. That is one of many reasons why you might want to view the same file
    in two or more tabs.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig38_HTML.jpg](Images/479166_1_En_2_Fig38_HTML.jpg)


    Figure 2-38: A single file split in two views'
