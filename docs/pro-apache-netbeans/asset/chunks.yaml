    ### 系统文件系统或 Layer.xml


    NetBeans 平台中的文件系统是一个通用且高度抽象的概念。NetBeans 平台文件系统是一个可以分层存储和读取文件的地方，它不必位于物理磁盘上。其具体实现位于
    *MultiFileSystem* 类中，该类允许你构建一个单一的命名空间，该命名空间合并了一组称为*层*的离散文件系统，并表现得好像所有这些文件系统的内容都存在于同一个命名空间中。例如，如果两个不同的层包含一个具有不同内容的文件夹
    *MyFolder*，那么列出 *MultiFileSystem MyFolder* 文件夹的内容将得到两者的内容。为了处理冲突（即两个具有相同名称和路径的文件），*MultiFileSystem*
    包含一个层的堆叠顺序，这意味着使用顶部的层。NetBeans 对 *MultiFileSystem* 的实现就是所谓的*系统文件系统*。它用于定义应用程序中所有可用的操作、菜单、菜单项、图标、键绑定、工具栏和服务。


    可以从“文件”窗口中的 `build` 目录下查看，路径为 `classes/METAINF/generated-layer.xml`。在 NetBeans
    的早期版本中，开发人员必须编辑像上面这样的 `layer.xml` 文件来配置操作、菜单和工具栏项、键绑定、服务提供者等。如今，所有这些都应该通过注解来处理，我们将在下一章中看到。但是，仍然有一些专门的事情只能通过编辑此文件来完成。此外，`layer.xml`
    文件是访问 NetBeans 平台应用程序完整配置数据的门户。*文件系统 API* 以相同的方式处理这个虚拟文件系统（清单 7-10）。


    ```

    FileObject root = FileUtil.getConfigRoot();

    FileObject someFolder = FileUtil.getConfigFile("someFolder");

    JToolBar tb = FileUtil.getConfigObject("/path/to/fileobject", JToolBar.class)

    清单 7-10

    使用 FileSystem API 访问 layer.xml

    ```


    *系统文件系统*提供了另一种模块间通信方式（另一种是 `Lookup`）。使用 `layer.xml` 文件，一个模块可以注册另一个模块可以使用的文件夹和文件。


    ### 文件系统 API 与 Java NIO


    NetBeans 文件系统 API 存在于 Java NIO2（在 Java 7 中引入）之前。Java NIO2 提供了与 NetBeans FileSystem
    API 类似的功能。表 7-3 是两者基本类的比较（并非 100% 匹配）。


    表 7-3


    FileSystem API 与 Java 7 NIO2


    | FileSystem API | Java 7 NIO2 |

    | --- | --- |

    | `org.openide.filesystems.FileSystem` | `java.nio.file.FileSystem` |

    | `org.openide.filesystems.FileObject` | `java.nio.file.Path` |

    | `-` | `java.nio.file.attribute` |

    | `org.openide.filesystems.FileUtil` | `java.nio.file.Files``java.nio.file.FileVisitor`
    |

    | `org.openide.filesystems.FileChangeListener` | `java.nio.file.WatchService``java.nio.file.Watchable``java.nio.file.StandardWatchEventKinds`
    |

    | `-` | `java.nio.channels.*` |


    使用哪一个取决于你的应用程序。如果你希望开发一个使用 NetBeans RCP 在 GUI 中显示文件/文件夹的应用程序，那么最好使用 NetBeans FileSystem
    API。NIO2 是一个比 FileSystem API（它主要是为了管理 `layer.xml` 而创建的）更强大的 API，但是 NetBeans FileSystem
    API 更简单、更直接。

