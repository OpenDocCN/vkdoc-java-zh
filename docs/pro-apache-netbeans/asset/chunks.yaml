- fmt: '### AWT/Swing Component Breakpoints


    The `AWT/Swing Component Breakpoint` can only be defined if a snapshot of the
    UI has been taken (see *Visual Swing Debugging*, later in this chapter, for further
    details). If an editor tab is active, it is possible to select one component and
    create a new breakpoint. The component name cannot be manually entered, but is
    based on the selection in the UI snapshot. There are three possible ways to stop
    the debugger with regard to the component:


    - **Add/remove from container**. Stops if the component is removed or added.

    - **Show/hide**. Stops if the component is shown or hidden.

    - **Repaint**. Stops on repainting the component.


    The `Settings` configuration of the `AWT/Swing Component Breakpoint` can be seen
    in Figure [6-30](#479166_1_En_6_Chapter.xhtml#Fig30).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig30_HTML.jpg](Images/479166_1_En_6_Fig30_HTML.jpg)


    Figure 6-30 AWT/Swing Components Breakpoint settings


    All the listed breakpoints are shown in a tabular view in the `Breakpoints` view.


    ### Breakpoints View


    The `Breakpoints` view is the central view to manage and view all defined breakpoints.
    Different breakpoint types may be indicated with different icons. All breakpoints
    can be enabled or disabled by using a check box. In addition, the tabular view
    renders information about the defined breakpoint, for example, the line number
    and source file or exception class. In a column hidden by default, the actual
    hit count of a breakpoint can be shown. A context menu is available on every breakpoint
    with the following actions:


    - **Go to Source**. Opens the source code associated with the breakpoint in the
    editor area. If no source code is available, a disassembled substitute is shown
    instead.

    - **Enable/Disable**. Toggles the state of the breakpoint from enabled to disabled
    or vice versa.

    - **Move Into Group**. Moves the selected breakpoint into a breakpoint group,
    allowing finer-grained control with regard to enabling, disabling, or deletion.

    - **New Breakpoint**. Opens the dialog to create a new breakpoint.

    - **Enable All**. Enables all breakpoints. Only active if at least one breakpoint
    can be enabled.

    - **Disable All**. Disables all breakpoints. Only active if at least one breakpoint
    can be disabled.

    - **Delete**. Deletes the breakpoint.

    - **Delete All**. Deletes all breakpoints.

    - **Properties**. Shows the properties of the breakpoint to allow inspection and
    changing of the `Settings`, `Conditions`, and `Actions`.


    As shown in Figure [6-31](#479166_1_En_6_Chapter.xhtml#Fig31), breakpoints that
    belong to a special group are shown below those groups in a tree-like manner.
    The context menu on a breakpoint group contains the following actions:


    - **Rename Group**. Renames the breakpoint group.

    - **Enable All Grouped**. Enables all breakpoints in the group.

    - **Disable All Grouped**. Disables all breakpoints in the group.

    - **Delete All Grouped**. Deletes all breakpoints in the group, effectively deleting
    the group as well.


    Besides the tabular view, there is a small toolbar on the left-hand side offering
    three actions:


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig31_HTML.jpg](Images/479166_1_En_6_Fig31_HTML.jpg)


    Figure 6-31 Breakpoints view


    - **Create new Breakpoint**. Opens the dialog to create a new breakpoint.

    - **Deactivate all breakpoints in current session**. Deactivates all breakpoints
    in the current debugging session.

    - **Select breakpoint groups**. Shows a list of possible grouping strategies for
    the breakpoints in the list, based on custom groups or a selection of predefined
    groups.


    ### Visual Swing Debugging


    Apache NetBeans has an additional feature for supporting debugging of a Swing
    application. If the debugged process has a Swing UI, it is possible to snapshot
    the actual component hierarchy to inspect it in a visual manner. There is a special
    button in the debug toolbar that triggers the snapshot and opens a `Snapshot Editor`
    tab, which can be seen in Figure [6-32](#479166_1_En_6_Chapter.xhtml#Fig32).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig32_HTML.jpg](Images/479166_1_En_6_Fig32_HTML.jpg)


    Figure 6-32 Snapshot of Swing


    The snapshot allows you to select the different components, for example, buttons
    or text fields, and inspect their field attributes. If a property is writable,
    it is possible to change the value by entering a new value in the property editor
    in the `Properties` view. The context menu of the components shown in the snapshot
    has some very helpful actions:


    - **Go To Component Declaration**. Opens the relevant source code at the line
    where the selected component is declared. This is not the line where the component
    is created, but rather the line of the field definition.

    - **Go To Component Source**. Opens the source code file in an editor tab, which
    defines the component, for example, for `JButton` it opens the `javax.swing.JButton`
    source file (if source is available).

    - **Show Listeners**. Opens a new view called `Events` view. The events view shows
    registered listeners, allows navigation to source code, and displays a log of
    events (if configured).

    - **Create Fixed Watch**. Creates a fixed watch for this component.

    - **Toggle Component Breakpoint**. Creates a component breakpoint based on visual
    selection (for details regarding breakpoints, please refer to the breakpoints
    section).

    - **Breakpoint Properties**. Opens a dialog to show the properties of the component
    breakpoint and allow changes to the properties.

    - **Properties**. Opens a standalone dialog showing the property sheet associated
    with the selected component.


    The `Event` view shows additional logical information based on the selected component
    in the `Snapshot` or `Navigator` view. The first row identifies the selected component,
    followed by two groups of listeners; the first group shows all custom listeners,
    that is, a listener not added by the UI toolkit itself, but by user code. The
    second group lists all listeners added from the UI toolkit itself. The last section
    in the list of information is the `Event Log`. It shows a list of events issued
    by the component. This helps in better understanding the behavior in terms of
    events triggered and reactions of the component hierarchy. If you need to debug
    the Swing component hierarchy behavior, this type of debugging reduces the amount
    of setup you need to do yourself and gives you direct and simple access to the
    internals of Swing. An example view can be seen in Figure [6-33](#479166_1_En_6_Chapter.xhtml#Fig33).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig33_HTML.jpg](Images/479166_1_En_6_Fig33_HTML.jpg)


    Figure 6-33 Event view showing listeners and event log


    For the entries in the `Event Log` section to show up, it is necessary to configure
    some type of listener to be selected for logging. This can be done using the context
    menu `Setup Logging Events` of the `Event Log` item. It will open a dialog showing
    the possible listeners. All listeners selected will lead to entries in the `Event
    Log`, if events are sent to those types. The list of listeners is shown in Figure
    [6-34](#479166_1_En_6_Chapter.xhtml#Fig34).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig34_HTML.jpg](Images/479166_1_En_6_Fig34_HTML.jpg)


    Figure 6-34 Select events for logging


    The context menu item `Clear` on the `Log Event` item can be used to clear the
    current list of log entries.'
