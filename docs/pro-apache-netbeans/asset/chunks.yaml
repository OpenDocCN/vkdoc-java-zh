  trans: '

    ## 节点


    你可能已经熟悉 MVC（模型-视图-控制器）设计模式，其中视图不直接与模型通信，而是仅通过控制器进行。这样做的好处是，你可以让不同的视图显示相同的数据，而无需将视图与模型强耦合。


    Swing 曾试图通过为每个表示类提供模型类来实现此模式。例如，`JList` 由 `ListModel` 支持，`JTree` 由 `TreeModel`
    支持，`JTable` 由 `TableModel` 支持，等等。如果你希望用 `JTree` 和 `JTable` 显示相同的数据，则必须创建两个不同的视图模型，即一个
    `TreeModel` 和一个 `TableModel` 来呈现相同的数据，以便各自的视图能够正确渲染，这非常不方便。


    NetBeans RCP 通过提供 `Node` 类解决了这个问题。`Node` 是特定数据片段（例如，一个 `Task`）的可视化表示。节点是数据和 UI
    类之间的表示层。当你在表格中选择一行时，实际上是在选择一个 `Node` 实例。与 Swing 中为每个 GUI 组件子类化不同的模型类不同，你只需子类化
    `Node` 类，即可在多个不同的 GUI 组件上无缝地同时显示数据。


    `Node` 包含通用的数据表示，例如显示名称、图标、节点上的操作、子节点（用于树状结构），甚至属性（用于在属性表中显示）。节点还实现了 `Lookup.Provider`
    接口；因此，它们可以根据在其查找（历史上称为 *cookies*）中添加的实例来启用/禁用操作。


    *节点 API* 提供了几个节点，如图 8-3 所示，每个节点都有不同的用途。


    ![../images/479166_1_En_8_Chapter/479166_1_En_8_Fig3_HTML.jpg](img/479166_1_En_8_Fig3_HTML.jpg)


    图 8-3


    节点类层次结构


    `Node` 是一个抽象类，而 `AbstractNode` 不是！`BeanNode` 使用反射来检索 JavaBean 的属性，并将其作为节点属性公开，以便在属性表中显示。如果其
    `BeanInfo` 中提供了名称和图标，它也会检索这些信息。如果你希望显示文件，请使用 `DataNode`。`IndexedNode` 允许对其子节点重新排序。最后，`FilterNode`
    是另一个节点的装饰器，顾名思义，它可以通过应用过滤器来过滤特定节点。


    清单 8-3 展示了一个 `BeanNode` 的示例实现。


    ```

    package todo.view;

    import java.beans.IntrospectionException;

    import org.openide.nodes.BeanNode;

    import todo.model.Task;

    class TaskNode extends BeanNode {

    public TaskNode(Task bean) throws IntrospectionException {

    super(bean);

    }

    }

    清单 8-3

    一个 BeanNode 实现

    ```


    清单 8-3 创建了一个通常充当根节点角色的单一节点。节点通常包含子节点，层级深度可以是无限的。如果你需要在树中显示它们，那么你可以创建任意数量的子节点；但在表格中，只需要一个扁平的子节点（或叶节点）列表。


    子节点由 `org.openide.nodes.Children` 对象表示，该对象按需创建子节点。`Children` 节点由 `ChildFactory`
    创建，如清单 8-4 的示例所示。


    ```

    package todo.view;

    import java.beans.IntrospectionException;

    import java.util.List;

    import org.openide.nodes.ChildFactory;

    import org.openide.nodes.Node;

    import org.openide.util.Exceptions;

    import org.openide.util.Lookup;

    import todo.model.Task;

    import todo.model.TaskManagerInterface;

    class TaskChildFactory extends ChildFactory {

    @Override

    protected boolean createKeys(final List toPopulate) {

    final TaskManagerInterface taskManager =

    Lookup.getDefault().lookup(TaskManagerInterface.class);

    toPopulate.addAll(taskManager.listAllTasks(true));

    return true;

    }

    @Override

    protected Node createNodeForKey(final Task key) {

    TaskNode taskNode = null;

    try {

    taskNode = new TaskNode(key);

    } catch (IntrospectionException ex) {

    Exceptions.printStackTrace(ex);

    }

    return taskNode;

    }

    }

    清单 8-4

    一个 ChildFactory 实现

    ```


    当 `TaskChildFactory` 被初始化时，`createKeys()` 方法会被自动调用。一旦 `createKeys()` 返回 `true`，`createNodeForKey()`
    方法就会被自动调用。正如 API 所述，如果键列表已完全填充，则返回 `true`；如果列表仅部分填充，则返回 `false`；并且应再次调用此方法以批量添加更多键（这在大多数情况下是不必要的，因此始终返回
    `true`）。


    上述工厂的一个典型用法是：


    ```

    Children tasks = Children.create(new TaskChildFactory(), true);

    ```


    这里的 `true` 表示 `ChildFactory` 将在后台线程中创建键列表，例如，当用户尝试展开一个 `Node` 时就会发生这种情况。


    ### 查找


    如前所述，`Node` 实现了 `Lookup.Provider` 接口。如何向 `Node` 的查找中添加内容呢？清单 8-5 展示了如何将一个 `Task`
    对象添加到 `TaskNode` 的查找中。


    ```

    class TaskNode extends BeanNode {

    public TaskNode(Task bean) throws IntrospectionException {

    super(bean, Children.LEAF, Lookups.singleton(bean));

    }

    }

    清单 8-5

    向 TaskNode 的查找中添加一个 Task

    ```


    单例查找仅包含一个对象，在本例中是与该节点关联的任务。现在，正如我们将看到的，当你选择一个或多个节点时，那些监听全局查找中 `Task` 的条件启用操作将相应地被启用。具体如何实现将在下一节中解释。


    ### 操作


    用户可以右键单击节点以显示弹出菜单，其中包含多个菜单项或可对节点执行的操作。你可以通过重写 `Node` 类的相应方法来覆盖这些操作，如清单 8-6 所示。


    ```

    @Override

    public Action[] getActions(boolean context) {

    List taskActions = Utilities.actionsForPath("Actions/Task");

    return taskActions.toArray(new Action[taskActions.size()]);

    }

    @Override

    public Action getPreferredAction() {

    return Actions.forID("Task","todo.controller.EditTaskAction");

    }

    清单 8-6

    节点上的操作

    ```


    类似地，`getPreferredAction()` 提供了一个单一的 `Action`，当用户双击 `Node` 时调用该操作。最佳实践是在*系统文件系统*中定义你的操作，以便其他类或模块可以重用它们。

    '
- fmt: '# Explorer Views


    We saw previously how the *Nodes API* provides a universal way of representing
    data to the UI. But what UIs does NetBeans Platform provide?


    The *Explorer & Property Sheet API* consists of a set of GUI components, known
    as explorer views or explorers, which render Nodes. You can display the nodes
    to more than one explorer view or you can easily swap between them without any
    change to the nodes: true MVC. Compare this to the amount of rewriting you would
    need in Swing to change code that uses a `JTree` to use a `JTable` or vice versa.


    Table 8-1 shows the correspondence of the Explorer views to Swing UI classes.


    **Table 8-1** Explorer Views and Swing Classes


    | Explorer View | Swing |

    | --- | --- |

    | `BeanTreeView` | `JTree` |

    | `OutlineView` | `JTable/JTree` |

    | `ListView` | `JList` |

    | `PropertySheetView` | `JList` |

    | `IconView` | `-` |

    | `ChoiceView` | `JComboBox` |


    Listing 8-7 provides an example of an `OutlineView` that can be added in the constructor
    of a `TopComponent`.


    ```

    OutlineView ov = (OutlineView)outlineView;

    //Set the columns of the outline view,

    //using the name of the property

    //followed by the text to be displayed in the column header

    ov.setPropertyColumns(

    "priority", "Priority",

    "description", "Task",

    "alert", "Alert",

    "dueDate", "Due Date");

    add(ov);

    ```


    `priority`, `description`, `alert`, and `duedate` are attributes of the `Task`
    JavaBean. `OutlineView` is a special tree/table view that displays tree nodes,
    and table rows as properties. In the next chapter, we shall see how to use and
    customize an `OutlineView` to display a table of tasks.


    All the explorer views are managed by an `ExplorerManager`, which controls and
    maintains the selection of the nodes in the view. Explorer views automatically
    find their `ExplorerManager` when they are added to a `java.awt.Container` such
    as a `TopComponent`. When they are added to a container, the explorer views search
    through their parent containers until they find the first that implements `ExplorerManager.Provider`.
    The explorer view then starts using the `ExplorerManager` returned by that component’s
    `getExplorerManager()` method. The `ExplorerManager` maintains knowledge about
    the shared state of the `Node`s, and notifies any `PropertyChangeListeners` when
    the selected `Node`s change.


    In Listing 8-8 we have modified our `TasksTopComponent` to implement `ExplorerManager.Provider`
    interface. The `OutlineView` will find the `ExplorerManager` defined in the constructor
    of the `TasksTopComponent`, will call `getExplorerManager()`, and then display
    the root `Node` from the `ExplorerManager`.


    ```

    public final class TasksTopComponent extends TopComponent

    implements ExplorerManager.Provider {

    private final ExplorerManager em = new ExplorerManager();

    public TasksTopComponent() {

    ...

    em.setRootContext(new AbstractNode(Children.create(new TaskChildFactory(), true)));
    // asynchronously

    }

    ...

    @Override

    public ExplorerManager getExplorerManager() {

    return em;

    }

    ```


    You can easily add other explorer views in the same `TopComponent`, and they all
    share the same `ExplorerManager`, and thus nodes. Not only will the same data
    be displayed in all explorer views, but when an item is selected in one of them,
    it will automatically be selected in the other, too.


    So, if you want to map all of these to the MVC design pattern we referred to in
    the beginning of this chapter, you need to remember the following:


    - Nodes represent the *Model*; they are wrappers of the actual model data.

    - Explorer Views represent the *View*.

    - `ExplorerManager` represents the *Controller*.


    ## Lookup


    In Listing 8-8 we saw how we can add something to a `Node`’s lookup. `ExplorerManager`s
    maintain the selected nodes in views. What we didn’t explain is how to make the
    selected `Node`(s) available to the *Global Lookup*, so that other objects such
    as `Action`s and other `TopComponent`s can use them.


    This is done with the help of `ExplorerUtils` class, which lets you define a special
    `Lookup` via its `createLookup()` method, representing the selected `Node`(s).
    Then, simply add this lookup to the `TopComponent`’s lookup via the `TopComponent.associateLookup()`
    method, which must be called in the constructor of the `TopComponent` (see Listing
    8-9).


    ```

    associateLookup (ExplorerUtils.createLookup (em, getActionMap()));

    ```


    Thanks to the statement in Listing 8-9, the `Lookup` of the `TopComponent` will
    automatically proxy the `Lookup`(s) of the selected `Node`(s) in the explorer
    view components. When the `TopComponent` is selected, its `Lookup` is exposed
    via `Utilities.actionsGlobalContext()`.


    When the user selects a `TaskNode` in the `OutlineView`, the `TasksTopComponent`
    that contains the `OutlineView` will automatically proxy the `Lookup` of the `TaskNode`.
    The `TasksTopComponent` will be activated, and as a consequence the Global Lookup,
    `Utilities.actionsGlobalContext()`, will proxy the `Lookup` of the `TasksTopComponent`.
    Any component in the application that listens to the Global Lookup will be notified
    that a new `Task` object is available (e.g., an action will become enabled).


    The action map is a map of actions that can be used in the TopComponent’s views.
    In Listing 8-10, we enhance it with the *Cut, Copy, Paste,* and *Delete* actions.


    ```

    ActionMap map = this.getActionMap();

    map.put(DefaultEditorKit.cutAction, ExplorerUtils.actionCut(em));

    map.put(DefaultEditorKit.copyAction, ExplorerUtils.actionCopy(em));

    map.put(DefaultEditorKit.pasteAction, ExplorerUtils.actionPaste(em));

    map.put("delete", ExplorerUtils.actionDelete(em, true)); // true displays a confirmation
    dialog prior to the deletion

    associateLookup (ExplorerUtils.createLookup (em, map));

    ```


    We shall talk more about Actions later in this chapter.


    ## Properties


    The *Properties* window (**Window ➤ IDE Tools ➤ Properties**) listens to the global
    `Lookup`, `Utilities.actionsGlobalContext()`, for the presence of `Node`s, and
    displays its properties. In other words, the properties of the selected node are
    displayed in the *Properties* window.


    All the properties of a `BeanNode` are displayed in the *Properties* window by
    default. If you need to customize them, either do it in the `BeanInfo.java` of
    the JavaBean, or convert your `Node` to extend `AbstractNode` instead, and override
    the method shown in Listing 8-11.


    ```

    @Override

    protected Sheet createSheet() {

    Sheet sheet = super.createSheet();

    Sheet.Set basicSet = Sheet.createPropertiesSet();

    basicSet.setName("Basic");

    basicSet.setDisplayName("Basic");

    try {

    Property daysBeforeProperty =

    new PropertySupport.Reflection(

    task, Integer.class, "Days Before");

    basicSet.put(daysBeforeProperty);

    Property completedProperty =

    new PropertySupport.Reflection(

    task, Boolean.class, "Completed");

    basicSet.put(completedProperty);

    } catch (NoSuchMethodException ex) {

    Exceptions.printStackTrace(ex);

    }

    sheet.put(basicSet);

    return sheet;

    }

    ```


    `PropertySupport.Reflection` is used to define a `Property` object. Other subclasses
    are `PropertySupport.ReadOnly`, `PropertySupport.ReadWrite`, and `PropertySupport.WriteOnly`.'
  raw: '## Explorer Views


    We saw previously how the *Nodes API* provides a universal way of representing
    data to the UI. But what UIs does NetBeans Platform provide?


    The *Explorer & Property Sheet API* consists of a set of GUI components, known
    as explorer views or explorers, which render Nodes. You can display the nodes
    to more than one explorer view or you can easily swap between them without any
    change to the nodes: true MVC. Compare this to the amount of rewriting you would
    need in Swing to change code that uses a `JTree` to use a `JTable` or vice versa.


    Table [8-1](#479166_1_En_8_Chapter.xhtml#Tab1) shows the correspondence of the
    Explorer views to Swing UI classes.


    Table 8-1


    Explorer Views and Swing Classes


    | Explorer View | Swing |

    | --- | --- |

    | `BeanTreeView` | `JTree` |

    | `OutlineView` | `JTable/JTree` |

    | `ListView` | `JList` |

    | `PropertySheetView` | `JList` |

    | `IconView` | `-` |

    | `ChoiceView` | `JComboBox` |


    Listing [8-7](#479166_1_En_8_Chapter.xhtml#PC8) provides an example of an `OutlineView`
    that can be added in the constructor of a `TopComponent`.


    ```

    OutlineView ov = (OutlineView)outlineView;

    //Set the columns of the outline view,

    //using the name of the property

    //followed by the text to be displayed in the column header

    ov.setPropertyColumns(

    "priority", "Priority",

    "description", "Task",

    "alert", "Alert",

    "dueDate", "Due Date");

    add(ov);

    Listing 8-7

    An OutlineView implementation

    ```


    `priority, description, alert,` and `duedate` are attributes of the `Task` JavaBean.
    `OutlineView` is a special tree/table view that displays tree nodes, and table
    rows as properties. In the next chapter, we shall see how to use and customize
    an `OutlineView` to display a table of tasks.


    All the explorer views are managed by an `ExplorerManager`, which controls and
    maintains the selection of the nodes in the view. Explorer views automatically
    find their `ExplorerManager` when they are added to a `java.awt.Container` such
    as a `TopComponent`. When they are added to a container, the explorer views search
    through their parent containers until they find the first that implements `ExplorerManager.Provider`.
    The explorer view then starts using the `ExplorerManager` returned by that component’s
    `getExplorerManager()` method . The `ExplorerManager` maintains knowledge about
    the shared state of the `Node`s, and notifies any `PropertyChangeListeners` when
    the selected `Node`s change.


    In Listing [8-8](#479166_1_En_8_Chapter.xhtml#PC9) we have modified our `TasksTopComponent`
    to implement `ExplorerManager.Provider` interface. The `OutlineView` will find
    the `ExplorerManager` defined in the constructor of the `TasksTopComponent`, will
    call `getExplorerManager()`, and then display the root `Node` from the `ExplorerManager`.


    ```

    public final class TasksTopComponent extends TopComponent

    implements ExplorerManager.Provider {

    private final ExplorerManager em = new ExplorerManager();

    public TasksTopComponent() {

    ...

    em.setRootContext(new AbstractNode(Children.create(new TaskChildFactory(), true)));
    // asynchronously

    }

    ...

    @Override

    public ExplorerManager getExplorerManager() {

    return em;

    }

    Listing 8-8

    Implementation of ExplorerManager in the TopComponent

    ```


    You can easily add other explorer views in the same `TopComponent`, and they all
    share the same `ExplorerManager`, and thus nodes. Not only will the same data
    be displayed in all explorer views, but when an item is selected in one of them,
    it will automatically be selected in the other, too.


    So, if you want to map all of these to the MVC design pattern we referred to in
    the beginning of this chapter, you need to remember the following:


    *   Nodes represent the *Model*; they are wrappers of the actual model data.


    *   Explorer Views represent the *View.*


    *   `ExplorerManager` represents the *Controller.*


    ### Lookup


    In Listing [8-8](#479166_1_En_8_Chapter.xhtml#PC9) we saw how we can add something
    to a `Node`’s lookup. `ExplorerManager`s maintain the selected nodes in views.
    What we didn’t explain is how to make the selected `Node`(s) available to the
    *Global Lookup*, so that other objects such as `Action`s and other `TopComponent`s
    can use them.


    This is done with the help of `ExplorerUtils` class, which lets you define a special
    `Lookup` via its `createLookup()` method, representing the selected `Node`(s).
    Then, simply add this lookup to the `TopComponent`’s lookup via the `TopComponent.associateLookup()`
    method, which must be called in the constructor of the `TopComponent` (see Listing
    [8-9](#479166_1_En_8_Chapter.xhtml#PC10)).


    ```

    associateLookup (ExplorerUtils.createLookup (em, getActionMap()));

    Listing 8-9

    Make selected nodes available to the Global Lookup

    ```


    Thanks to the statement in Listing [8-9](#479166_1_En_8_Chapter.xhtml#PC10), the
    `Lookup` of the `TopComponent` will automatically proxy the `Lookup`(s) of the
    selected `Node`(s) in the explorer view components. When the `TopComponent` is
    selected, its `Lookup` is exposed via `Utilities.actionsGlobalContext()`.


    When the user selects a `TaskNode` in the `OutlineView`, the `TasksTopComponent`
    that contains the `OutlineView` will automatically proxy the `Lookup` of the `TaskNode`.
    The `TasksTopComponent` will be activated, and as a consequence the Global Lookup,
    `Utilities.actionsGlobalContext()`, will proxy the `Lookup` of the `TasksTopComponent`.
    Any component in the application that listens to the Global Lookup will be notified
    that a new `Task` object is available (e.g., an action will become enabled).


    The action map is a map of actions that can be used in the TopComponent’s views.
    In Listing [8-10](#479166_1_En_8_Chapter.xhtml#PC11), we enhance it with the *Cut,
    Copy, Paste,* and *Delete* actions.


    ```

    ActionMap map = this.getActionMap();

    map.put(DefaultEditorKit.cutAction, ExplorerUtils.actionCut(em));

    map.put(DefaultEditorKit.copyAction, ExplorerUtils.actionCopy(em));

    map.put(DefaultEditorKit.pasteAction, ExplorerUtils.actionPaste(em));

    map.put("delete", ExplorerUtils.actionDelete(em, true)); // true displays a confirmation
    dialog prior to the deletion

    associateLookup (ExplorerUtils.createLookup (em, map));

    Listing 8-10

    Add actions to the ActionMap of the TopComponent

    ```


    We shall talk more about Actions later in this chapter.


    ### Properties


    The *Properties* window (**Window ➤ IDE Tools ➤ Properties**) listens to the global
    `Lookup`, `Utilities.actionsGlobalContext()`, for the presence of `Node`s, and
    displays its properties. In other words, the properties of the selected node are
    displayed in the *Properties* window.


    All the properties of a `BeanNode` are displayed in the *Properties* window by
    default. If you need to customize them, either do it in the `BeanInfo.java` of
    the JavaBean, or convert your `Node` to extend `AbstractNode` instead, and override
    the method shown in Listing [8-11](#479166_1_En_8_Chapter.xhtml#PC12).


    ```

    @Override

    protected Sheet createSheet() {

    Sheet sheet = super.createSheet();

    Sheet.Set basicSet = Sheet.createPropertiesSet();

    basicSet.setName("Basic");

    basicSet.setDisplayName("Basic");

    try {

    Property daysBeforeProperty =

    new PropertySupport.Reflection(

    task, Integer.class, "Days Before");

    basicSet.put(daysBeforeProperty);

    Property completedProperty =

    new PropertySupport.Reflection(

    task, Boolean.class, "Completed");

    basicSet.put(completedProperty);

    } catch (NoSuchMethodException ex) {

    Exceptions.printStackTrace(ex);

    }

