- fmt: '# 5. Apache NetBeans Java EE Development


    Java EE support has been included with Apache NetBeans since release 11.0. Prior
    to this release, Java EE support had to be added to Apache NetBeans 9.0+ as a
    plugin, since it was still licensed under Oracle. If the plugin was added, the
    functionality for developing, debugging, and maintaining Java EE was the same
    in Apache NetBeans 9.0 as it is in release 11.0 and beyond. The support provides
    the ability to add application server containers that can be managed from within
    the IDE. Full support for Maven web applications and Java EE technologies such
    as Enterprise JavaBeans (EJB), Contexts and Dependency Injection (CDI), and JavaServer
    Faces (JSF) allows developers the convenience of auto-completion, code fragments,
    and easy syntax recognition. The bottom line is that Apache NetBeans is a tremendous
    tool for development of Java EE applications … both older and modern.


    In this chapter, we’ll take a look at the support, in detail, that Apache NetBeans
    provides for Java Enterprise development. You will learn how to manage containers
    from within the IDE, develop back-end business logic, and Java Persistence API
    (JPA) queries. In the end, you will have a basic understanding of the conveniences
    provided by Apache NetBeans for full stack Java EE development.


    ## Configuring Server Containers


    Before you can associate application projects with a container for deployment
    or testing, you must register one or more application server containers for use
    by Apache NetBeans. It is a good idea to register a container with Apache NetBeans
    even in the case where you are developing microservices that will be deployed
    to a container, such as Payara Micro or Wildfly. Note that it is good practice
    to only configure application server containers for development purposes within
    Apache NetBeans, and not for deployment to production containers.


    To add a local or remote application server container to Apache NetBeans, perform
    the following tasks:


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig1_HTML.jpg](Images/479166_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Add Application Server Container to Apache NetBeans IDE


    1.  Navigate to the **Services** window and right-click on the **Servers** menu
    selection. Click **Add Server**, as shown in Figure [5-1](#479166_1_En_5_Chapter.xhtml#Fig1).


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig2_HTML.jpg](Images/479166_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Add Server Instance


    1.  When the Add Server Instance dialog appears, choose the server type that you
    wish to add (Figure [5-2](#479166_1_En_5_Chapter.xhtml#Fig2)).


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig3_HTML.jpg](Images/479166_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Set Server Location


    1.  On the next screen, enter the path to the application server installation
    that you would like to configure within Apache NetBeans (Figure [5-3](#479166_1_En_5_Chapter.xhtml#Fig3)).
    Once you have chosen the location, click the Finish button.


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig4_HTML.jpg](Images/479166_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Expand and Administer Server within Apache NetBeans


    1.  It is now possible to deploy applications to the application server container(s)
    that have been registered within the IDE. To do so, right-click on an enterprise
    application project (Maven Web Application, etc.) and then specify the server
    of choice within the project properties. Note that you can also perform some basic
    application server tasks by selecting the application server from within the Servers
    window (Figure [5-4](#479166_1_En_5_Chapter.xhtml#Fig4)).


    ## Creating a Maven Web Application


    There are a variety of configurations from which to choose for the creation of
    Java Enterprise projects within Apache NetBeans. This chapter covers the creation
    of Maven Web Applications in detail, which is the de facto standard and default
    project selection for Java EE and Jakarta EE development within Apache NetBeans.


    To begin the creation of a new Maven Web Application project, open the **New Project**
    dialog by choosing **File** ➤ **New Project**. In the **New Project** dialog,
    you will see a number of different project categories listed in the left-hand
    list box. Selecting one of the categories will display the project types for the
    selected category within the right-hand list box. Select the **Java with Maven**
    category, and then select **Web Application** as the project type (Figure [5-5](#479166_1_En_5_Chapter.xhtml#Fig5)).


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig5_HTML.jpg](Images/479166_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    New Maven Web Application


    ### Note


    The **Java with Maven** category allows the creation of projects using the old-style
    Java EE and J2EE configurations such as **EJB Module** and **Enterprise Application**.
    In most cases, these projects are no longer being used for creating new applications.
    However, they remain supported by Apache NetBeans.


    After a project type is chosen and **Next** is clicked, the **New Web Application**
    dialog will open. Enter a project name and location, as shown in Figure [5-6](#479166_1_En_5_Chapter.xhtml#Fig6).
    Once finished, choose **Next**.


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig6_HTML.jpg](Images/479166_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    New Web Application Dialog


    In the Server and Settings screen, choose the application server container that
    you wish to use for development purposes (see Configuring Application Servers
    in NetBeans), along with the Java EE version that you wish to use. If you plan
    to use CDI, then select the designated check box (Figure [5-7](#479166_1_En_5_Chapter.xhtml#Fig7)).


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig7_HTML.jpg](Images/479166_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Setting the Application Server Container


    ## Developing JSF Applications


    Utilizing the Apache NetBeans IDE, it is easy to develop JSF applications due
    to the wizards and file recognition. In this section, we will walk through the
    development of a JSF application from a standard Maven Web Application project.
    Therefore, if you haven’t done so already, utilize the information in the previous
    section to create a bare-bones project.


    ### Creating JSF Application Files


    If you wish to create JSF views, then right-click on the **Web Pages** node, and
    if you wish to create a Java source file for JSF, right-click on the **Source
    Packages** node. Right-clicking on the appropriate node ensures that the files
    are generated within the correct project area. From within the context menu, choose
    **New**, and then **Other…** in order to open the New File dialog. Within the
    dialog, choose JavaServer Faces from the “Categories” list box to open the JSF
    file types within the left-side list box (Figure [5-8](#479166_1_En_5_Chapter.xhtml#Fig8)).
    In this example, right-click on **Web Pages** and create a new JSF Page.


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig8_HTML.jpg](Images/479166_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Create JSF File


    The JSF file types include the following options:


    *   JSF Page

    *   JSF Managed Bean (This creates a CDI Controller when using Java EE 7+)

    *   JSF Faces Configuration

    *   JSF Composite Component

    *   JSF Resource Library Contract

    *   JSF Pages from Entity Classes

    *   JSF Faces Component

    *   Faces Template

    *   Faces Template Client'
  raw: '# 5. Apache NetBeans Java EE Development


    Java EE support has been included with Apache NetBeans since release 11.0\. Prior
    to this release, Java EE support had to be added to Apache NetBeans 9.0+ as a
    plugin, since it was still licensed under Oracle. If the plugin was added, the
    functionality for developing, debugging, and maintaining Java EE was the same
    in Apache NetBeans 9.0 as it is in release 11.0 and beyond. The support provides
    the ability to add application server containers that can be managed from within
    the IDE. Full support for Maven web applications and Java EE technologies such
    as Enterprise JavaBeans (EJB), Contexts and Dependency Injection (CDI), and JavaServer
    Faces (JSF) allows developers the convenience of auto-completion, code fragments,
    and easy syntax recognition. The bottom line is that Apache NetBeans is a tremendous
    tool for development of Java EE applications … both older and modern.


    In this chapter, we’ll take a look at the support, in detail, that Apache NetBeans
    provides for Java Enterprise development. You will learn how to manage containers
    from within the IDE, develop back-end business logic, and Java Persistence API
    (JPA) queries. In the end, you will have a basic understanding of the conveniences
    provided by Apache NetBeans for full stack Java EE development.


    ## Configuring Server Containers


    Before you can associate application projects with a container for deployment
    or testing, you must register one or more application server containers for use
    by Apache NetBeans. It is a good idea to register a container with Apache NetBeans
    even in the case where you are developing microservices that will be deployed
    to a container, such as Payara Micro or Wildfly. Note that it is good practice
    to only configure application server containers for development purposes within
    Apache NetBeans, and not for deployment to production containers.


    To add a local or remote application server container to Apache NetBeans, perform
    the following tasks:


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig1_HTML.jpg](Images/479166_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Add Application Server Container to Apache NetBeans IDE


    1.  Navigate to the **Services** window and right-click on the **Servers** menu
    selection. Click **Add Server**, as shown in Figure [5-1](#479166_1_En_5_Chapter.xhtml#Fig1).


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig2_HTML.jpg](Images/479166_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Add Server Instance


    1.  When the Add Server Instance dialog appears, choose the server type that you
    wish to add (Figure [5-2](#479166_1_En_5_Chapter.xhtml#Fig2)).


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig3_HTML.jpg](Images/479166_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Set Server Location


    1.  On the next screen, enter the path to the application server installation
    that you would like to configure within Apache NetBeans (Figure [5-3](#479166_1_En_5_Chapter.xhtml#Fig3)).
    Once you have chosen the location, click the Finish button.


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig4_HTML.jpg](Images/479166_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Expand and Administer Server within Apache NetBeans


    1.  It is now possible to deploy applications to the application server container(s)
    that have been registered within the IDE. To do so, right-click on an enterprise
    application project (Maven Web Application, etc.) and then specify the server
    of choice within the project properties. Note that you can also perform some basic
    application server tasks by selecting the application server from within the Servers
    window (Figure [5-4](#479166_1_En_5_Chapter.xhtml#Fig4)).


    ## Creating a Maven Web Application


    There are a variety of configurations from which to choose for the creation of
    Java Enterprise projects within Apache NetBeans. This chapter covers the creation
    of Maven Web Applications in detail, which is the de facto standard and default
    project selection for Java EE and Jakarta EE development within Apache NetBeans.


    To begin the creation of a new Maven Web Application project, open the **New Project**
    dialog by choosing **File** ➤ **New Project**. In the **New Project** dialog,
    you will see a number of different project categories listed in the left-hand
    list box. Selecting one of the categories will display the project types for the
    selected category within the right-hand list box. Select the **Java with Maven**
    category, and then select **Web Application** as the project type (Figure [5-5](#479166_1_En_5_Chapter.xhtml#Fig5)).


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig5_HTML.jpg](Images/479166_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    New Maven Web Application


    ### Note


    The **Java with Maven** category allows the creation of projects using the old-style
    Java EE and J2EE configurations such as **EJB Module** and **Enterprise Application**.
    In most cases, these projects are no longer being used for creating new applications.
    However, they remain supported by Apache NetBeans.


    After a project type is chosen and **Next** is clicked, the **New Web Application**
    dialog will open. Enter a project name and location, as shown in Figure [5-6](#479166_1_En_5_Chapter.xhtml#Fig6).
    Once finished, choose **Next**.


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig6_HTML.jpg](Images/479166_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    New Web Application Dialog


    In the Server and Settings screen, choose the application server container that
    you wish to use for development purposes (see Configuring Application Servers
    in NetBeans), along with the Java EE version that you wish to use. If you plan
    to use CDI, then select the designated check box (Figure [5-7](#479166_1_En_5_Chapter.xhtml#Fig7)).


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig7_HTML.jpg](Images/479166_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Setting the Application Server Container


    ## Developing JSF Applications


    Utilizing the Apache NetBeans IDE, it is easy to develop JSF applications due
    to the wizards and file recognition. In this section, we will walk through the
    development of a JSF application from a standard Maven Web Application project.
    Therefore, if you haven’t done so already, utilize the information in the previous
    section to create a bare-bones project.


    ### Creating JSF Application Files


    If you wish to create JSF views, then right-click on the **Web Pages** node, and
    if you wish to create a Java source file for JSF, right-click on the **Source
    Packages** node. Right-clicking on the appropriate node ensures that the files
    are generated within the correct project area. From within the context menu, choose
    **New**, and then **Other…** in order to open the New File dialog. Within the
    dialog, choose JavaServer Faces from the “Categories” list box to open the JSF
    file types within the left-side list box (Figure [5-8](#479166_1_En_5_Chapter.xhtml#Fig8)).
    In this example, right-click on **Web Pages** and create a new JSF Page.


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig8_HTML.jpg](Images/479166_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Create JSF File


    The JSF file types include the following options:


    *   JSF Page


    *   JSF Managed Bean (This creates a CDI Controller when using Java EE 7+)


    *   JSF Faces Configuration


    *   JSF Composite Component


    *   JSF Resource Library Contract


    *   JSF Pages from Entity Classes


    *   JSF Faces Component


    *   Faces Template


    *   Faces Template Client'
  trans: '

    # 5. Apache NetBeans Java EE 开发


    自 11.0 版本起，Apache NetBeans 已内置 Java EE 支持。在此版本之前，由于 Java EE 仍采用 Oracle 许可，需要以插件形式将其添加到
    Apache NetBeans 9.0+ 中。添加该插件后，Apache NetBeans 9.0 中用于开发、调试和维护 Java EE 的功能与 11.0
    及更高版本相同。该支持提供了添加可在 IDE 内管理的应用服务器容器的能力。对 Maven Web 应用以及诸如 Enterprise JavaBeans
    (EJB)、上下文和依赖注入 (CDI) 以及 JavaServer Faces (JSF) 等 Java EE 技术的全面支持，使开发者能够享受自动补全、代码片段和便捷的语法识别功能。总而言之，Apache
    NetBeans 是开发新旧 Java EE 应用的强大工具。


    在本章中，我们将详细探讨 Apache NetBeans 为 Java 企业级开发提供的支持。你将学习如何在 IDE 内管理容器、开发后端业务逻辑以及 Java
    持久化 API (JPA) 查询。最后，你将基本了解 Apache NetBeans 为全栈 Java EE 开发所提供的便利。


    ## 配置服务器容器


    在将应用项目与容器关联以进行部署或测试之前，必须先注册一个或多个应用服务器容器供 Apache NetBeans 使用。即使你正在开发将部署到容器（如 Payara
    Micro 或 Wildfly）的微服务，也建议在 Apache NetBeans 中注册一个容器。请注意，最佳实践是仅在 Apache NetBeans
    中为开发目的配置应用服务器容器，而非用于部署到生产容器。


    要向 Apache NetBeans 添加本地或远程应用服务器容器，请执行以下步骤：


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig1_HTML.jpg](img/479166_1_En_5_Fig1_HTML.jpg)


    图 5-1


    向 Apache NetBeans IDE 添加应用服务器容器


    1.  导航到**服务**窗口，右键单击**服务器**菜单选项。点击**添加服务器**，如图 5-1 所示。


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig2_HTML.jpg](img/479166_1_En_5_Fig2_HTML.jpg)


    图 5-2


    添加服务器实例


    1.  当出现“添加服务器实例”对话框时，选择要添加的服务器类型（图 5-2）。


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig3_HTML.jpg](img/479166_1_En_5_Fig3_HTML.jpg)


    图 5-3


    设置服务器位置


    1.  在下一个屏幕上，输入要在 Apache NetBeans 中配置的应用服务器安装路径（图 5-3）。选择位置后，点击**完成**按钮。


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig4_HTML.jpg](img/479166_1_En_5_Fig4_HTML.jpg)


    图 5-4


    在 Apache NetBeans 中展开并管理服务器


    1.  现在可以将应用部署到已在 IDE 中注册的应用服务器容器。为此，右键单击企业应用项目（Maven Web 应用等），然后在项目属性中指定所需的服务器。请注意，你也可以通过在“服务器”窗口中选择应用服务器来执行一些基本的应用服务器任务（图
    5-4）。


    ## 创建 Maven Web 应用


    在 Apache NetBeans 中创建 Java 企业项目时，有多种配置可供选择。本章将详细介绍 Maven Web 应用的创建，这是 Apache NetBeans
    中 Java EE 和 Jakarta EE 开发的事实标准及默认项目选择。


    要开始创建新的 Maven Web 应用项目，请通过选择**文件** ➤ **新建项目**打开**新建项目**对话框。在**新建项目**对话框中，左侧列表框中会列出多个不同的项目类别。选择一个类别将在右侧列表框中显示该类别下的项目类型。选择
    **Java with Maven** 类别，然后选择 **Web 应用**作为项目类型（图 5-5）。


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig5_HTML.jpg](img/479166_1_En_5_Fig5_HTML.jpg)


    图 5-5


    新建 Maven Web 应用


    ### 注意


    **Java with Maven** 类别允许使用旧式 Java EE 和 J2EE 配置（如 **EJB 模块**和**企业应用**）创建项目。大多数情况下，这些项目已不再用于创建新应用。不过，Apache
    NetBeans 仍支持它们。


    选择项目类型并点击**下一步**后，将打开**新建 Web 应用**对话框。输入项目名称和位置，如图 5-6 所示。完成后，选择**下一步**。


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig6_HTML.jpg](img/479166_1_En_5_Fig6_HTML.jpg)


    图 5-6


    新建 Web 应用对话框


    在“服务器和设置”屏幕中，选择要用于开发目的的应用服务器容器（参见在 NetBeans 中配置应用服务器），以及要使用的 Java EE 版本。如果计划使用
    CDI，则选中相应的复选框（图 5-7）。


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig7_HTML.jpg](img/479166_1_En_5_Fig7_HTML.jpg)


    图 5-7


    设置应用服务器容器


    ## 开发 JSF 应用


    利用 Apache NetBeans IDE，由于向导和文件识别功能，开发 JSF 应用变得非常容易。在本节中，我们将从标准的 Maven Web 应用项目出发，逐步完成
    JSF 应用的开发。因此，如果你尚未创建，请利用上一节中的信息创建一个基础项目。


    ### 创建 JSF 应用文件


    如果要创建 JSF 视图，请右键单击 **Web 页面**节点；如果要为 JSF 创建 Java 源文件，请右键单击**源包**节点。右键单击适当的节点可确保文件生成在正确的项目区域内。在上下文菜单中，选择**新建**，然后选择**其他…**
    以打开“新建文件”对话框。在对话框中，从“类别”列表框中选择 **JavaServer Faces**，以在左侧列表框中打开 JSF 文件类型（图 5-8）。在此示例中，右键单击
    **Web 页面**并创建一个新的 JSF 页面。


    ![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig8_HTML.jpg](img/479166_1_En_5_Fig8_HTML.jpg)


    图 5-8


    创建 JSF 文件


    JSF 文件类型包括以下选项：


    *   JSF 页面


    *   JSF 托管 Bean（使用 Java EE 7+ 时，这将创建一个 CDI 控制器）


    *   JSF Faces 配置


    *   JSF 复合组件


    *   JSF 资源库契约


    *   来自实体类的 JSF 页面


    *   JSF Faces 组件


    *   Faces 模板


    *   Faces 模板客户端

    '
- fmt: "### Note\n\nAs of Java EE 7+ and Jakarta EE 8, you should not be creating\
    \ JSF Managed Beans any longer. This is because the JSF Managed Bean technology\
    \ is being deprecated in favor of CDI beans. Therefore, the JSF Managed Bean option\
    \ creates a CDI Controller.\n\nAfter clicking **Next**, the JSF Page file selection\
    \ opens a dialog that can be used to generate a new JSF Page (Figure [5-9](#479166_1_En_5_Chapter.xhtml#Fig9)).\
    \ The dialog allows one to choose a file location and name, and it also contains\
    \ the ability to apply different options for the page type. The page type options\
    \ include Facelets (default), JSP File, or JSP Segment. The examples throughout\
    \ this chapter use the Facelets page type.\n\n![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig9_HTML.jpg](Images/479166_1_En_5_Fig9_HTML.jpg)\n\
    \nFigure 5-9\n\nNew JSF Page Dialog\n\nThe JSF Managed Bean file selection opens\
    \ a dialog that allows one to generate a CDI Managed Bean controller class (Figure\
    \ [5-10](#479166_1_En_5_Chapter.xhtml#Fig10)). The dialog provides the ability\
    \ to add the bean data to the `faces-config.xml` file, if desired, as well as\
    \ choose the scope of the bean.\n\n### Note\n\nThe `faces-config.xml` (JSF Faces\
    \ Configuration) file is not generated by default, as it is not a required file\
    \ for a JSF project. However, it can be added using the **Other...**, JavaServer\
    \ Faces context menu.\n\n![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig10_HTML.jpg](Images/479166_1_En_5_Fig10_HTML.jpg)\n\
    \nFigure 5-10\n\nNew JSF Managed Bean\n\nThe **JSF Faces Configuration** file\
    \ selection is used to generate a `faces-config.xml` file for a project. However,\
    \ this option is not required if you choose to create a JSF project within the\
    \ NetBeans Project Creation wizard.\n\nThe **JSF Composite Component** file selection\
    \ opens a dialog that can be used to create a composite component file. The dialog\
    \ does not provide many options other than the ability to choose a file location\
    \ and name. The generated file contains the skeleton of a composite component,\
    \ as listed in the following lines:\n\nThe **JSF Pages from Entity Classes** file\
    \ selection can be quite powerful in that it allows you to choose an Entity Class\
    \ from which to generate one or more JSF pages, resulting in the page(s) being\
    \ bound to the entity class for generation and update of those entity records.\
    \ In order to use this option, the project must contain at least one entity class.\n\
    \n## Developing Entity Classes\n\nThe Apache NetBeans IDE provides facilities\
    \ to help develop Entity Bean classes, either manually or based upon a selected\
    \ database table. To access the entity class wizards, right-click a project’s\
    \ *Source Packages* folder to open the context menu, and then choose **New** ➤\
    \ **Other** to open the **New File** dialog. Once it is open, choose the *Persistence*\
    \ category from the left-side list box to display the file types in the right-side\
    \ list box (Figure [5-11](#479166_1_En_5_Chapter.xhtml#Fig11)).\n\n![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig11_HTML.jpg](Images/479166_1_En_5_Fig11_HTML.jpg)\n\
    \nFigure 5-11\n\nPersistence File Types\n\nThe *Entity Class* file type allows\
    \ you to generate a blank entity class. The *Entity Classes from Database* file\
    \ type allows you to create entity class(es) based upon the selected database\
    \ tables. In doing so, all of the requisite code for mapping the entity class(es)\
    \ to the selected database tables are automatically generated for you.\n\n## Using\
    \ Java Persistence Query Language (JPQL)\n\nApache NetBeans includes a feature\
    \ that allows one to query a database utilizing the Java Persistence Query Language\
    \ (JPQL) syntax. This can be quite helpful for those who are using JPQL in their\
    \ EJB session beans or RESTful web services. To utilize the JPQL query tool, expand\
    \ an Apache NetBeans web project that contains a `persistence.xml` configuration\
    \ file in the project’s *Configuration Files* directory. Then perform the following\
    \ steps:\n\n![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig12_HTML.jpg](Images/479166_1_En_5_Fig12_HTML.jpg)\n\
    \nFigure 5-12\n\nJPQL Tool\n\n1.  Right-click the `persistence.xml` configuration\
    \ file to open the context menu.\n\n2.  Click **Run JPQL Query** to open the tool\
    \ (Figure [5-12](#479166_1_En_5_Chapter.xhtml#Fig12)), type the query, and click\
    \ the **Run** button on the upper right-hand side of the query editor.\n\n   \
    \ **Note** To add a `persistence.xml` configuration file for JPA configuration,\
    \ right-click on the project and choose: **Other…**, **Persistence**, **Persistence\
    \ Unit**.\n\n## Deploying and Debugging\n\nThe Apache NetBeans IDE makes the development\
    \ life cycle for enterprise applications very easy. To deploy and test a Maven\
    \ Web Application, ensure that a local application server container target that\
    \ is registered within Apache NetBeans is set correctly within the “Run” tab of\
    \ the project properties. Once set, a project can be deployed by right-clicking\
    \ on the project and choosing “**Run**” from the contextual menu. Once chosen,\
    \ the project WAR file is deployed to the target application server if everything\
    \ is compiled correctly, and the application is opened in the default browser.\n\
    \n### Note\n\nA different default browser can be configured for each project within\
    \ Apache NetBeans by selecting the browser in the toolbar (Figure [5-13](#479166_1_En_5_Chapter.xhtml#Fig13)).\n\
    \n![../images/479166_1_En_5_Chapter/479166_1_En_5_Fig13_HTML.jpg](Images/479166_1_En_5_Fig13_HTML.jpg)\n\
    \nFigure 5-13\n\nChoosing Default Browser\n\nTo debug a project, right-click on\
    \ the project and choose “**Debug**” from the contextual menu. This will cause\
    \ the target application server container to start in “Debug” mode, and the project\
    \ WAR file will be deployed accordingly. When the application server is started\
    \ in debug mode, breakpoints can be set within the project and watches can also\
    \ be configured, just as is the case with standard Java SE applications. Please\
    \ refer to Chapter [6](#479166_1_En_6_Chapter.xhtml) for more details on debugging\
    \ and profiling applications.\n\n## Other Java EE Support Features\n\nThe Apache\
    \ NetBeans 11.0 IDE contains support for a number of file types to aid the development\
    \ of Java EE applications. There have been a number of wizards covered previously\
    \ in this chapter, and in this section, we will take a brief look at some of the\
    \ file support.\n\nBy right-clicking on a project package, then choosing “**New**”\
    \ ➤ “**Other**” the “*New File*” dialog appears. This dialog contains a number\
    \ of categories, including “Web,” “HTML5/JavaScript,” “Bean Validation,” and “Contexts\
    \ and Dependency Injection” to name a few. Inside each of these categories are\
    \ a number of file options. Each of the supported file types includes auto-complete\
    \ for the syntax, color coding, and nice formatting.\n\nPerhaps the most widely\
    \ used category is the “Web” category. In this category are the following file\
    \ types (geared toward front-end development):\n\n*   JSP\n*   JSF\n*   Servlet\n\
    *   Filter\n*   Web Application Listener\n*   WebSocket Endpoint\n*   HTML\n*\
    \   XHTML\n*   Cascading Style Sheet\n*   JavaScript\n*   Json\n*   Tag Libraries\n\
    \nSome of the file types will be placed into the “Web Pages” folder of a web project,\
    \ while others will create Java source files or XML configuration. Each of the\
    \ file types in this section are geared toward front-end development.\n\nOther\
    \ file type categories that are geared toward enterprise development include the\
    \ following:\n\n*   HTML/JavaScript\n*   JavaServer Faces\n*   Bean Validation\n\
    *   Struts\n*   Spring Framework\n*   Enterprise JavaBeans\n*   Contexts and Dependency\
    \ Injection\n*   Selenium Test\n*   Persistence\n*   Web Services\n*   GlassFish\n\
    *   WebLogic\n*   Other"
