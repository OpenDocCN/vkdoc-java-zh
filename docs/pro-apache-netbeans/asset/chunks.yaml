- fmt: 'However, you may wish, for example, to fix a bug in the latest sources update
    that you have downloaded and unzipped in a folder as explained earlier in this
    chapter. As we already mentioned, when you build the sources, the output is stored
    inside the `nbbuild/netbeans` folder. This contains a NetBeans IDE built from
    the sources, which includes a NetBeans platform, too. You can register that platform
    to your NetBeans IDE you are running by clicking on the **Add Platform…** button
    in the *NetBeans Platform Manager* dialog and selecting the `nbbuild/netbeans`
    folder from the *Add NetBeans Platform* dialog that opens (see Figure [15-14](#479166_1_En_15_Chapter.xhtml#Fig14)).
    You will notice that the **Next** button becomes enabled when you select the `nbbuild/netbeans`
    folder.


    Click the **Next** button to move to the next step where you may optionally provide
    another *Platform Name* than the provided one (something like “Apache NetBeans
    IDE Dev (Build xxx-yyy)”; see Figure [15-15](#479166_1_En_15_Chapter.xhtml#Fig15))
    and click **Finish**. You should now be able to see the two platforms in the *NetBeans
    Platform Manager* dialog. Click on the **Sources** tab, click the **Add ZIP/Folder…**
    button and add the folder that contains the NetBeans sources (i.e., the parent
    folder of `nbbuild`) and click **Close** and **Close**.


    When you are selecting a new NetBeans Platform Application or Module, you can
    now choose among the two platforms to use from for your development (i.e., either
    the one provided by your IDE or the latest one). You can do that by right-clicking
    on your *Module* or *Module suite* in the *Projects* window, selecting **Properties**
    from the pop-up menu to open the *Project Properties* dialog, click on the **Libraries**
    category, and select the appropriate *NetBeans Platform* from the respective combo
    box. In the same dialog, you many also customize which modules you wish to include
    and which not in your module suite (see Figure [15-16](#479166_1_En_15_Chapter.xhtml#Fig16)).
    For example, if you are not developing a JavaFX or HTML/UI application or plugin,
    just uncheck those from the list of modules.


    If you don’t wish to register a NetBeans development platform to your NetBeans
    IDE, you may simply add the latest sources. In the *NetBeans Platform Manager*
    dialog, click on the **Sources** tab and add the folder where you unzipped the
    sources, for example, `incubator-netbeans`, by pressing the **Add ZIP/Folder…**
    button and navigating to that folder. You may also add the zipped sources file
    you downloaded from Apache NetBeans’ website instead, without unzipping it.


    To debug Apache NetBeans:


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig15_HTML.jpg](Images/479166_1_En_15_Fig15_HTML.jpg)


    Figure 15-15

    Add NetBeans Platform dialog (Step 2)


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig14_HTML.jpg](Images/479166_1_En_15_Fig14_HTML.jpg)


    Figure 15-14

    Add NetBeans Platform dialog (Step 1)


    1.  Open an Apache NetBeans module that you''re interested in debugging in Apache
    NetBeans IDE.

    2.  Place a breakpoint somewhere in the source code editor.

    3.  Right-click the module and choose **Debug**.


    Let’s see an example. Let’s debug the *Bootstrap* module, which as we mentioned
    earlier, is the starting point of execution for the NetBeans IDE.


    1.  Open the `platform/o.n.bootstrap` NetBeans project, which can be found inside
    your downloaded Apache NetBeans sources folder.

    2.  Open the `Main.java` file found inside `src/org/netbeans` folder.

    3.  Place a breakpoint on the first line of the `main()` method (`Class.forName(…)`)
    by clicking on the line number on the left of the editor, as explained in Chapter
    [6](#479166_1_En_6_Chapter.xhtml).

    4.  Right-click on the `o.n.bootstrap` module in the Projects window and select
    **Debug** from the pop-up menu.'
