- fmt: '`AddTaskAction`类被创建（参见第[8](#479166_1_En_8_Chapter.xhtml)章中的[8-19](#479166_1_En_8_Chapter.xhtml#PC23)）。查看向导中的输入是如何被翻译成NetBeans
    RCP中的Java注解的。在NetBeans IDE 7.0之前的版本中，这些信息是直接添加到`layer.xml`中的。提醒一下，我们在第[7](#479166_1_En_7_Chapter.xhtml)章中将`layer.xml`添加到了模块中。将两个位置都修改为`10`，以避免与你接下来创建的操作混淆。为每个新操作的位置都加上`10`——也就是说，为`EditTaskAction`设置位置为`20`，为`DeleteTaskAction`设置位置为`30`，以此类推。暂时将操作体留空。


