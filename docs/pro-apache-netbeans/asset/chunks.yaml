  trans: '

    ## 集成开发环境


    Apache NetBeans 最为人所知的身份是集成开发环境（IDE）。因此，它通常被称为 NetBeans IDE。最初，它是为 Java 开发的开发环境，但多年来，Apache
    NetBeans IDE 的适用范围已大幅扩展，成为支持多种不同语言的开发工具。自 Apache NetBeans 10 发布以来，该 IDE 对多种语言提供了一流支持，包括
    Java、PHP 和 JavaScript。这种支持不仅意味着编辑器具备良好的语法着色或关键字高亮功能，通常还包含诸如根据语言标准自动缩进、关键字和代码片段的自动补全，以及在某些情况下为简化调试和开发生命周期而进行的项目自动重建等功能。源代码编辑器使得通过键盘快捷键和鼠标点击轻松跳转到代码的不同部分成为可能。编辑器的字体、颜色等可以在
    Apache NetBeans 的首选项中进行修改。


    我提到调试了吗？是的，该开发环境还包含针对多种语言的完整调试器，包括设置断点、在实时调试期间检查变量值以及执行热代码刷新的能力。该开发环境还包含一个针对 Java
    应用程序的全功能性能调优解决方案。你可以使用性能工具来运行应用程序，并精确定位可能导致问题的代码问题或线程。


    当需要构建项目时，很少有像 Apache Maven 那样被广泛使用的构建框架。Apache NetBeans IDE 对 Apache Maven 提供了出色的支持，使得这个有时令人生畏的构建框架变得易于使用。如果用户选择直接使用
    XML 来引入 Maven 依赖项，那么 XML 编辑器将全程提供协助；但如果用户更愿意直接输入所需的依赖项并让它们自动添加，那也是另一种选择。


    开发过程中最重要的部分之一是工作流程和团队协作。NetBeans IDE 对 Git 和 Subversion 等版本控制系统提供了一流支持，使协作变得轻而易举。你可以在
    IDE 内部直接克隆 Git 仓库、更新代码、提交更改并推送到远程仓库。使用 DIFF 比较工具来比较文件之间的差异也非常容易。


    在接下来的几个章节中，我们将针对一些最常见的用例，介绍 Apache NetBeans IDE 的一些基本功能。


    ## Java 代码编辑器


    首先也是最重要的，Apache NetBeans IDE 是一个世界级的 Java 编辑器。该编辑器包含许多辅助开发者的功能，使应用程序开发的各个方面都更具生产力。尽管本节专门介绍
    Java 代码编辑功能，但需要注意的是，许多相同的功能也适用于其他语言，例如 JavaScript 和 PHP。


    代码补全为开发者提供了助力，它使代码编写更轻松、按键次数更少，并且对于输入那些你不太记得的方法名和变量也非常有用。在输入时按下 `CTRL-Space` 会自动调用代码补全。这样做会出现一个下拉菜单，其中包含许多用于继续当前代码行的代码建议。这些代码建议是基于上下文的，在列表顶部提供对当前代码最有意义的建议，而意义较小的建议则排在底部。当然，代码补全是可配置的，因此可以设置为在输入时或输入特定字符时自动打开代码补全下拉菜单。默认情况下，当输入“.”字符时，会出现基于上下文的建议，这对于轻松完成方法名等操作非常有益。


    代码模板和代码片段对于根据需要插入骨架代码段非常方便，使完成逻辑变得更加容易。可以通过点击建议图标或输入各种代码字符串（例如“sout”）来调用模板。当输入“sout”然后按下空格键时，代码“System.out.println(“”)”会被展开，光标会停留在括号内以便继续输入。你可以为经常使用的代码定义自定义代码片段。此外，还有重构选项，用于自动完成简单的样板代码，例如无需编码即可创建
    getter 和 setter。


    ## Java SE 应用程序


    Apache NetBeans 最初是为开发 Java 标准版（Java SE）应用程序而构建的：即包含一个或多个 Java 类、一个起点以及为用户提供功能的操作或图形用户界面的
    Java 应用程序。传统的 Java 开发要求 Java 类在运行之前必须先编译。应用程序的编译和执行通常通过命令提示符或终端进行，使用 `javac` 编译器和
    `java` 命令来执行生成的类文件。此外，如果应用程序包含多个类文件或资源，则必须在执行之前将其打包成 *Java 归档文件（JAR）*。手动执行这些任务可能既耗时又繁琐。为什么不将这些琐碎的任务自动化，以便开发者可以将更多时间用于创造，而不是执行例行任务呢？这就是
    Apache NetBeans IDE 的初衷……通过减少所需例行任务的数量，使开发更轻松、更高效。

    '
- fmt: '### Note


    Prior to installing Apache NetBeans, be sure to have a JDK installed. If you are
    planning to develop Java EE/Jakarta EE applications, be sure to install the version
    of the JDK that you will be using for the container to which the application is
    deployed. Once installed, the `netbeans_jdkhome` configuration variable, located
    within `etc/netbeans.conf`, should be assigned the path to the JDK you are using
    to run Apache NetBeans.


    Let’s walk through the development of a simple “Hello World” Java application
    and introduce some of the core features of Apache NetBeans IDE. To begin, open
    Apache NetBeans and create a new project by choosing “File” ➤ “New Project” or
    selecting the “New Project” icon in the toolbar.


    Next, within the “New Project” dialog, choose the “Java” category from the *Categories*
    pick list, and then select “Java Application” from the *Projects* pick list. A
    *New Java Application* dialog will appear (Figure [1-2](#479166_1_En_1_Chapter.xhtml#Fig2)),
    and a **Project Name**, **Project Location**, and **Project Folder** can be provided.
    Type “HelloApacheNetBeans” as the project name.


    Next, select a location on your computer in which to store the project files.
    Apache NetBeans allows one to provide a common area for storing third-party libraries,
    but skip that for now, and ensure “Create Main Class” is checked, maintaining
    the default *Main Class* name. Click “Finish” to create the project.


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig2_HTML.jpg](Images/479166_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    New Java Application Dialog


    Apache NetBeans will open the `HelloApacheNetBeans` main class in the editor,
    and you will see that the project has been added to the left-hand navigator (Figure
    [1-3](#479166_1_En_1_Chapter.xhtml#Fig3)). When the project menu in the left-hand
    navigator is expanded, a single source file named `HelloApacheNetBeans.java` is
    displayed within the package `helloapachenetbeans`, and the default JDK that is
    registered with Apache NetBeans can be seen under the Libraries node. The `HelloApacheNetBeans.java`
    file is opened in the source editor by default.


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig3_HTML.jpg](Images/479166_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Project Menu


    The project is displayed in an enhanced format, making it easy to navigate the
    project files and see project dependencies. At the top of the left-hand navigator,
    there are tabs for “Project,” “Files,” and “Services.” The “Project” tab is displayed
    by default, and it will contain each of the currently open Apache NetBeans projects
    in the enhanced view. The “Files” tab shows each of the currently open Apache
    NetBeans projects using the actual project files as they can be seen on disk.
    Sometimes this can be useful if you know where a certain file is placed and you
    need to edit it. It also can be useful because Apache NetBeans will hide some
    of the project files by default to organize the project and make navigation easier,
    and also because these hidden files should not need to be edited in most cases.
    The “Services” tab contains a multitude of options for working with databases,
    web services, Maven repositories, Docker, etc. Many of these various services
    will be covered later in this book in detail.


    To get an opportunity to work within the editor, place the cursor within the `main()`
    method of the `HelloApacheNetBeans.java` file in the open editor, after the code
    comment that reads as follows:


    ```

    // TODO code application logic here

    ```


    Press the return button to start a new blank line, and begin typing: `System.out.println("Hello
    Apache NetBeans");` While typing, auto-completion options are presented to make
    coding easier. In fact, by simply typing `sout` and pressing the tab button, the
    line will be auto-completed using a code template. Type the string “Hello Apache
    NetBeans” within the `println()` method. The code should look like that below:


    ```

    public static void main(String[] args) {

    // TODO code application logic here

    System.out.println("Hello Apache NetBeans");

    }

    ```


    Within the project navigator, the right-click provides many additional options,
    as it brings up the contextual menu. Most of these options will be covered later
    in the book, but for now right-click on the `HelloApacheNetBeans` project within
    the project navigator and select “Clean and Build.” Doing so removes any compiled
    code from disk, and performs a build including any external dependencies for the
    project. Next, right-click on the project name and click “Run.” Below the editor
    resides a number of tabs, and one of them is the “Output” tab. When the project
    is run, the “Output” tab should display the following:


    ```

    run:

    Hello Apache NetBeans

    BUILD SUCCESSFUL (total time: 0 seconds)

    ```


    ## Java Web Applications


    Java web applications typically have a number of processes that need to be coordinated
    in order to develop and test. For instance, most web applications need to be deployed
    to an application server container of some kind, and many access a database. Apache
    NetBeans allows for easy development, deployment, and testing of Java web applications
    by allowing one to maintain all of these separate processes within one place.
    What’s more, it contains a debugger mode that will easily allow one to deploy
    an application in debug mode and then step through breakpoints to help troubleshoot
    issues. See Chapter [5](#479166_1_En_5_Chapter.xhtml) for more details on the
    debugger.


    Java web applications typically contain a number of different code and styling
    files, and the Apache NetBeans code editor is capable of editing just about any
    file. The code editor supports many different languages with features such as
    syntax highlighting, auto-completion, and error marking. When working with web
    applications especially, having the ability to edit different types of files within
    the same editor is essential. The Apache NetBeans plugin portal also provides
    the ability for developers to create third-party extensions for the IDE, making
    the possible supported files and options for expansion unlimited. For instance,
    there are third-party plugins available for many application server containers,
    allowing special functionality to be made available for these servers. See Chapter
    [11](#479166_1_En_11_Chapter.xhtml): Writing a Plugin for NetBeans for more details.


    There are multiple options for developing web applications within Apache NetBeans.
    Each option contains a different project type. There are three options available
    under the “New Project” dialog’s “Java Web” category: Web Application, Web Application
    with Existing Sources, and Web Free-Form Application. The “Web Application” is
    typically used to create a new web application project using Apache Ant for a
    build system. Such a project would require the developer to manually handle resources
    using Apache Ant. The “Web Application with Existing Sources” allows one to create
    a project from an existing Apache Ant-based web application. There are other available
    options for creating web applications utilizing the “Java EE” and “Maven” categories.
    Typically, older style Java Enterprise applications can be created from the options
    within the “Java EE” category. The “Maven” category provides options for creating
    Java EE projects using the Apache Maven build system. If unsure where to start,
    the safest and most modern style of web application project can be created by
    choosing the Maven “Web Application” project.'
  raw: '### Note


    Prior to installing Apache NetBeans, be sure to have a JDK installed. If you are
    planning to develop Java EE/Jakarta EE applications, be sure to install the version
    of the JDK that you will be using for the container to which the application is
    deployed. Once installed, the netbeans_jdkhome configuration variable, located
    within etc/netbeans.conf, should be assigned the path to the JDK you are using
    to run Apache NetBeans.


    Let’s walk through the development of a simple “Hello World” Java application
    and introduce some of the core features of Apache NetBeans IDE. To begin, open
    Apache NetBeans and create a new project by choosing “File” ➤ “New Project” or
    selecting the “New Project” icon in the toolbar.


    Next, within the “New Project” dialog, choose the “Java” category from the *Categories*
    pick list, and then select “Java Application” from the *Projects* pick list. A
    *New Java Application* dialog will appear (Figure [1-2](#479166_1_En_1_Chapter.xhtml#Fig2)),
    and a **Project Name**, **Project Location**, and **Project Folder** can be provided.
    Type “HelloApacheNetBeans” as the project name.


    Next, select a location on your computer in which to store the project files.
    Apache NetBeans allows one to provide a common area for storing third-party libraries,
    but skip that for now, and ensure “Create Main Class” is checked, maintaining
    the default *Main Class* name. Click “Finish” to create the project.


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig2_HTML.jpg](Images/479166_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    New Java Application Dialog


    Apache NetBeans will open the `HelloApacheNetBeans` main class in the editor,
    and you will see that the project has been added to the left-hand navigator (Figure
    [1-3](#479166_1_En_1_Chapter.xhtml#Fig3)). When the project menu in the left-hand
    navigator is expanded, a single source file named HelloApacheNetBeans.java is
    displayed within the package `helloapachenetbeans`, and the default JDK that is
    registered with Apache NetBeans can be seen under the Libraries node. The HelloApacheNetBeans.java
    file is opened in the source editor by default.


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig3_HTML.jpg](Images/479166_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Project Menu


    The project is displayed in an enhanced format, making it easy to navigate the
    project files and see project dependencies. At the top of the left-hand navigator,
    there are tabs for “Project,” “Files,” and “Services.” The “Project” tab is displayed
    by default, and it will contain each of the currently open Apache NetBeans projects
    in the enhanced view. The “Files” tab shows each of the currently open Apache
    NetBeans projects using the actual project files as they can be seen on disk.
    Sometimes this can be useful if you know where a certain file is placed and you
    need to edit it. It also can be useful because Apache NetBeans will hide some
    of the project files by default to organize the project and make navigation easier,
    and also because these hidden files should not need to be edited in most cases.
    The “Services” tab contains a multitude of options for working with databases,
    web services, Maven repositories, Docker, etc. Many of these various services
    will be covered later in this book in detail.


    To get an opportunity to work within the editor, place the cursor within the `main()`
    method of the `HelloApacheNetBeans.java` file in the open editor, after the code
    comment that reads as follows:


    ```

    // TODO code application logic here

    ```


    Press the return button to start a new blank line, and begin typing: `System.out.println("Hello
    Apache NetBeans");` While typing, auto-completion options are presented to make
    coding easier. In fact, by simply typing `sout` and pressing the tab button, the
    line will be auto-completed using a code template. Type the string “Hello Apache
    NetBeans” within the `println()` method. The code should look like that below:


    ```

    public static void main(String[] args) {

    // TODO code application logic here

    System.out.println("Hello Apache NetBeans");

    }

    ```


    Within the project navigator, the right-click provides many additional options,
    as it brings up the contextual menu. Most of these options will be covered later
    in the book, but for now right-click on the HelloApacheNetBeans project within
    the project navigator and select “Clean and Build.” Doing so removes any compiled
    code from disk, and performs a build including any external dependencies for the
    project. Next, right-click on the project name and click “Run.” Below the editor
    resides a number of tabs, and one of them is the “Output” tab. When the project
    is run, the “Output” tab should display the following:


    ```

    run:

    Hello Apache NetBeans

    BUILD SUCCESSFUL (total time: 0 seconds)

    ```


    ## Java Web Applications


    Java web applications typically have a number of processes that need to be coordinated
    in order to develop and test. For instance, most web applications need to be deployed
    to an application server container of some kind, and many access a database. Apache
    NetBeans allows for easy development, deployment, and testing of Java web applications
    by allowing one to maintain all of these separate processes within one place.
    What’s more, it contains a debugger mode that will easily allow one to deploy
    an application in debug mode and then step through breakpoints to help troubleshoot
    issues. See Chapter [5](#479166_1_En_5_Chapter.xhtml) for more details on the
    debugger.


    Java web applications typically contain a number of different code and styling
    files, and the Apache NetBeans code editor is capable of editing just about any
    file. The code editor supports many different languages with features such as
    syntax highlighting, auto-completion, and error marking. When working with web
    applications especially, having the ability to edit different types of files within
