    example, `JButton`, `JToggleButton` etc., this doesn’t guarantee that the NetBeans
    toolbar will render it correctly. For example, the state of a `JToggleButton`
    (pressed/unpressed) is not shown. NetBeans Platform offers some alternatives.
    For example, for non-context actions, one can use the deprecated `org.openide.util.actions.BooleanStateAction`.


