    showTaskDetailsDialog() 方法

    ```


    只需少量修改，*TodoFXRCP* 就可以执行了。请注意，我们没有修改 FXML 文件（除了设置其控制器的正确路径）。


    作为最后一步，从 `layer.xml` 中移除*工具栏*和*菜单栏*，并按照此处（[`https://blogs.oracle.com/geertjan/farewell-to-space-consuming-weird-tabs-part-2`](https://blogs.oracle.com/geertjan/farewell-to-space-consuming-weird-tabs-part-2)）和此处（[`https://blogs.oracle.com/geertjan/farewell-to-space-consuming-weird-tabs`](https://blogs.oracle.com/geertjan/farewell-to-space-consuming-weird-tabs)）的建议操作，以移除
    `TopComponent` 中的选项卡。


    要移除状态栏，请遵循此常见问题解答（[`http://wiki.netbeans.org/DevFaqRemoveStatusBar`](http://wiki.netbeans.org/DevFaqRemoveStatusBar)）。


