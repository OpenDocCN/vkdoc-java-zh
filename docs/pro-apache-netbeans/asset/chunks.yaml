    然而，你可能希望，例如，修复最新源码更新中的某个错误，该更新已按本章前面所述下载并解压到某个文件夹中。


    如前所述，当你构建源码时，输出结果会存储在 `nbbuild/netbeans` 文件夹中。该文件夹包含一个从源码构建的 NetBeans IDE，其中也包含一个
    NetBeans 平台。你可以通过点击 *NetBeans 平台管理器* 对话框中的 **添加平台…** 按钮，并在打开的 *添加 NetBeans 平台*
    对话框中选择 `nbbuild/netbeans` 文件夹（见图 15-14），将该平台注册到你正在运行的 NetBeans IDE 中。你会注意到，当你选择
    `nbbuild/netbeans` 文件夹时，**下一步** 按钮会变为可用状态。


    点击 **下一步** 按钮进入下一步，在此你可以选择为平台提供另一个 *平台名称*（而非默认名称，默认名称类似“Apache NetBeans IDE Dev
    (Build xxx-yyy)”；见图 15-15），然后点击 **完成**。现在，你应该能在 *NetBeans 平台管理器* 对话框中看到这两个平台了。


    点击 **源代码** 标签，点击 **添加 ZIP/文件夹…** 按钮，添加包含 NetBeans 源码的文件夹（即 `nbbuild` 的父文件夹），然后依次点击
    **关闭** 和 **关闭**。


    当你新建一个 NetBeans 平台应用程序或模块时，现在可以在两个平台中选择一个用于开发（即，要么使用你的 IDE 自带的平台，要么使用最新的平台）。你可以通过在
    *项目* 窗口中右键点击你的 *模块* 或 *模块套件*，从弹出菜单中选择 **属性** 以打开 *项目属性* 对话框，点击 **库** 类别，然后从相应的组合框中选择合适的
    *NetBeans 平台*。在同一对话框中，你还可以自定义在模块套件中要包含哪些模块以及不包含哪些模块（见图 15-16）。例如，如果你不是在开发 JavaFX
    或 HTML/UI 应用程序或插件，只需从模块列表中取消勾选这些模块即可。


    如果你不希望将 NetBeans 开发平台注册到你的 NetBeans IDE 中，你可以直接添加最新的源码。在 *NetBeans 平台管理器* 对话框中，点击
    **源代码** 标签，然后通过点击 **添加 ZIP/文件夹…** 按钮并导航到该文件夹，添加你解压源码的文件夹，例如 `incubator-netbeans`。你也可以直接添加从
    Apache NetBeans 网站下载的压缩源码文件，而无需解压。


    调试 Apache NetBeans：


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig15_HTML.jpg](img/479166_1_En_15_Fig15_HTML.jpg)


    图 15-15

    添加 NetBeans 平台对话框（步骤 2）


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig14_HTML.jpg](img/479166_1_En_15_Fig14_HTML.jpg)


    图 15-14

    添加 NetBeans 平台对话框（步骤 1）


    1.  在 Apache NetBeans IDE 中打开你感兴趣调试的 Apache NetBeans 模块。


    2.  在源代码编辑器中某处设置一个断点。


    3.  右键点击该模块并选择 **调试**。


    让我们看一个例子。我们来调试 *Bootstrap* 模块，如前所述，该模块是 NetBeans IDE 执行的起点。


    1.  打开 `platform/o.n.bootstrap` NetBeans 项目，该项目位于你下载的 Apache NetBeans 源码文件夹中。


    2.  打开位于 `src/org/netbeans` 文件夹中的 `Main.java` 文件。


    3.  在 `main()` 方法的第一行（`Class.forName(…)`）上，通过点击编辑器左侧的行号设置一个断点，如第 6 章所述。


    4.  在项目窗口中右键点击 `o.n.bootstrap` 模块，然后从弹出菜单中选择 **调试**。

    '
