    In the `Files` tab, expand the `Model` module as shown in Figure [7-17](#479166_1_En_7_Chapter.xhtml#Fig17)
    to verify that a new file `META-INF/services/todo.model.TaskManagerInterface`
    has been created, which contains the various implementations of the service, in
    our case `todo.model.impl.TaskManager`.


    `TaskManagerDB` will be another service provider of `TaskManagerInterface`. In
    the next chapter, we shall see how we can use these services. Please notice that
    `TaskManager` or `TaskManagerDB` may exist in other modules of your application,
    and in non-public packages.


    As an exercise, you may wish to refactor these two classes to use Java 8 syntax
    and libraries, for example, the new `java.time.*` classes and/or lambdas/streams.


    Finally, we need to expose the `todo.model` package to other modules so that when
    other modules add dependencies to the `Model` module, they can access the classes
    inside this public package. Right-click on the `Model` module, select **Properties
    | API Versioning**, and check the `todo.model` package from the `Public Packages`
    section to make it public (see Figure [7-18](#479166_1_En_7_Chapter.xhtml#Fig18)).
    Clean and build the `Model` module.


