    有用的类包括 `ProjectUtils` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-projectapi/org/netbeans/api/project/ProjectUtils.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-projectapi/org/netbeans/api/project/ProjectUtils.html))，它提供了获取项目信息的实用方法，以及
    `SourceLevelQuery` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-api-java/org/netbeans/api/java/queries/SourceLevelQuery.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-api-java/org/netbeans/api/java/queries/SourceLevelQuery.html))，它返回
    Java 源文件的源级别（例如，如果源文件使用了 Java 7 引入的语法，则 Java 源级别可以是 7）。在模块 `java/api.java` 中，有对通用
    *Project API* 的 Java 扩展。*Parsing API* (`ide/parsing.api`)（见图 15-12）用于源代码解析（主要在编辑器中）。它允许注册新的解析器
    ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserFactory.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserFactory.html))，将源代码的某些部分定义为另一种语言的内嵌文本
    `EmbeddingProvider` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/EmbeddingProvider.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/EmbeddingProvider.html))
    和 `ParserBasedEmbeddingProvider` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserBasedEmbeddingProvider.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserBasedEmbeddingProvider.html))，并在解析结果上运行任务。


    有两种类型的任务：


    *   `ParserResultTask` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserResultTask.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserResultTask.html))
    是一个 `SchedulerTask`，它按定义的顺序自动调度并运行，以处理解析结果。


    *   `ParserManager` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/api/ParserManager.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/api/ParserManager.html))
    允许为一个或多个源启动优先级解析请求，并按需立即运行用户任务。


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig12_HTML.jpg](img/479166_1_En_15_Fig12_HTML.jpg)


    图 15-12


    Parsing API 模块依赖关系


    *Parsing Indexing API* (`ide/parsing.indexing`) 用于“索引”（例如，构建源文件中所有重要内容的“全局”索引，以便可以快速执行诸如“哪些文件使用了这个类”之类的查询）。这里有趣的类包括：


    *   `EmbeddingIndexer` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/EmbeddingIndexer.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/EmbeddingIndexer.html))，它获取解析器的结果，并可以将所需的任何信息添加到索引中。


    *   `BinaryIndexer` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/BinaryIndexer.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/BinaryIndexer.html))，它允许为二进制依赖项准备索引。


    *   `CustomIndexer` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/CustomIndexer.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/CustomIndexer.html))，它仅接收已更改文件的列表，并可以以自定义方式执行索引。可以通过
    `QuerySupport` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/support/QuerySupport.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/support/QuerySupport.html))
    查询索引。


    问题跟踪器

    所有程序都包含错误，Apache NetBeans 也不例外。错误和新功能存储在 JIRA ([`https://issues.apache.org/jira/browse/NETBEANS`](https://issues.apache.org/jira/browse/NETBEANS))
    中，如第 13 章所述。要订阅的邮件列表是 `dev@netbeans.incubator.apache.org`。您的代码贡献可能是一个错误修复，但也可能是一个插件形式的新功能。只需在
    JIRA 中打开一个新问题，然后处理您想要贡献的任何内容。


    调试 Apache NetBeans

    无论您是在修复问题还是开发新功能（插件），迟早您都需要了解您或 NetBeans 的代码是如何工作的，或者为什么它不工作！在开始调试 Apache NetBeans
    之前，请确保您已正确设置源代码。


    点击 **工具 ➤ NetBeans 平台** 以显示 *NetBeans 平台管理器* 对话框（见图 15-13）。您会看到已经注册了一个平台，即 *开发
    IDE*。这是您正在运行的 NetBeans IDE 的平台，例如，如果您运行的是 Apache NetBeans IDE 11.1，则平台为 11.1。


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig13_HTML.jpg](img/479166_1_En_15_Fig13_HTML.jpg)


    图 15-13

    NetBeans 平台管理器对话框

