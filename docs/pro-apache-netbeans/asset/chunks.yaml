  raw: 'The `AddTaskAction` class is created (see Listing [8-19](#479166_1_En_8_Chapter.xhtml#PC23) in
    Chapter [8](#479166_1_En_8_Chapter.xhtml)). Look how the input from the wizard
    is translated into Java annotations in NetBeans RCP. In versions prior to NetBeans
    IDE 7.0, this information was added directly in `layer.xml`. As a reminder, we
    added the `layer.xml` to our module in Chapter [7](#479166_1_En_7_Chapter.xhtml).
    Modify the position to be `10` in both cases to avoid mix-ups with the next actions
    you create. Add `10` to the position of every new action—that is, for `EditTaskAction`
    set the position to `20`, for `DeleteTaskAction` set it to `30`, and so on. Leave
    the action body empty for the moment.


    By executing the old ToDo application, you might have noticed that while the **Add
    Task** action is always enabled, the other task actions are enabled only when
    you select one or more tasks from the table—in other words, they are *context*
    actions. You can accomplish the same functionality by using a *conditionally enabled*
    action. These actions operate on *nodes*. A node is the visual representation
    of a particular piece of data—a task, in our example. When you select a row from
    the table, you are actually selecting a task node. Context sensitivity is constructed
    from interfaces, which are called *cookies* . The node, which the action is to
    operate on, implements an interface specifying the method that the action should
    invoke. The action can specify a set of cookies, the presence of which in the
    active node (if the active node implements one of these interfaces) determines
    whether the action is enabled or not.


    To create `EditTaskAction` , right-click the `todo.controller.edit` package and
    select **New Action**. Select **Conditionally Enabled** and **User Selects One
    Node** (see Figure [9-10](#479166_1_En_9_Chapter.xhtml#Fig10)). The cookie class
    is a `Task`. This means that whenever a task (row) is selected in the `OutlineView`,
    this action is enabled.


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig10_HTML.jpg](Images/479166_1_En_9_Fig10_HTML.jpg)


    Figure 9-10


    Conditionally enabled action


    Click **Next** and complete the rest of the steps as you did for `AddTaskAction`.
    If you completed the wizard correctly, you should see the output shown in Listing
    [8-21](#479166_1_En_8_Chapter.xhtml#PC25) in Chapter [8](#479166_1_En_8_Chapter.xhtml).
    The compiler complains because it can’t find a `Task` class. Add a dependency
    between the *Controller* and the *Model* modules. You do this by right-clicking
    *Libraries* under the *Controller* module and selecting the **Add Module Dependency**
    action. Check **Show Non-API Modules** and search for *Model* and click **OK**.
    Now you may fix imports and have `todo.model.Task` added as an import to `EditTaskAction`.


    Repeat these steps to create the rest of the actions, trying to make the TodoRCP
    application as similar as possible to the Swing ToDo application. That means that
    `EditTaskAction`, `DeleteTaskAction`, and `MarkAsCompletedTaskAction` are conditionally
    enabled while the rest are always enabled. `DeleteTaskAction` and `MarkAsCompletedTaskAction`
    should be conditionally enabled, and you may select multiple nodes since they
    can be applied to many tasks at once (see Listing [8-22](#479166_1_En_8_Chapter.xhtml#PC26)
    in Chapter [8](#479166_1_En_8_Chapter.xhtml)).


    Also, make sure that you use the *Options* toolbar and menu (see Figure [9-11](#479166_1_En_9_Chapter.xhtml#Fig11))
    for the actions that belong to them, that is, **Show completed tasks**, **Sort
    by priority**, **Sort by due date**, and **Show Alerts**.


    The static visual prototype should look similar to Figure [9-12](#479166_1_En_9_Chapter.xhtml#Fig12).
    If the order of the toolbars isn’t correct, you can modify it either by right-clicking
    *XML Layer* and selecting **Open** or by right-clicking the *Toolbars* node and
    selecting **Go to Declaration.** The `layer.xml` file opens, and you can locate
    the toolbars and change their `Position` attribute (a smaller value means that
    the toolbar is displayed first).


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig12_HTML.jpg](Images/479166_1_En_9_Fig12_HTML.jpg)


    Figure 9-12


    Static prototype TodoRCP application


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig11_HTML.jpg](Images/479166_1_En_9_Fig11_HTML.jpg)


    Figure 9-11


    New Action wizard


    The task editing form shown in Figure [7-7](#479166_1_En_7_Chapter.xhtml#Fig7)
    (Chapter [7](#479166_1_En_7_Chapter.xhtml)) needs to be created, too. To save
    time and effort, simply copy the `TaskDetailsDialog` class from the old ToDo application
    and paste it inside `todo.view` in the *View* module. You’ll notice some errors.
    Add a dependency from the *View* to the *Model* module for *View* to be able to
    access the `Task` class.


    The other error can be resolved if you also copy the `ActionSupport` class from
    the old ToDo application.'
