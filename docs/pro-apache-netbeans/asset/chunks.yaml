    layer.xml 文件


    ### 总结


    在本章中，我们学习了 NetBeans 平台的核心：*Module System API*、*Lookup API* 和 *FileSystem API*。模块系统
    API 允许您创建松散耦合的设计代码，明确暴露接口以及模块之间的依赖关系。模块之间的松散耦合通信是通过 Lookup API 实现的。最后，FileSystem
    API 提供了另一种查看文件系统的方式，为您提供了额外的功能。我们探讨了 `FileSystem`、`FileObject`、`FileUtil`、`FileChangeListener`
    和 `DataObject` 类。最后，我们通过将 Swing 应用程序移植到 NetBeans RCP 来开始应用所学知识。


