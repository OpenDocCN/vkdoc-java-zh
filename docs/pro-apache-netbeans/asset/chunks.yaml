    ## 协作


    Apache NetBeans IDE 通过集成对版本控制系统（VCS）的支持（如 Git、Mercurial 和 Subversion），帮助团队轻松协作。IDE
    为这些 VCS 提供了一流支持，因为每个 Apache NetBeans 项目都可以在 IDE 内部单独管理。在与任一 VCS 集成之前，必须将所选系统安装在
    Apache NetBeans 所在的工作站上。然后，可以使用 Apache NetBeans 首选项中的“团队”➤“版本控制”选项卡来管理所选的 VCS（图
    1-9）。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig9_HTML.jpg](img/479166_1_En_1_Fig9_HTML.jpg)


    图 1-9


    Apache NetBeans 版本控制首选项


    接下来的几段将概述 Apache NetBeans 对 Git 的支持。不过，对 Mercurial 或 Subversion 也提供了同等水平的支持。“团队”菜单提供了创建新仓库或浏览现有仓库的选项（图
    1-10）。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig10_HTML.jpg](img/479166_1_En_1_Fig10_HTML.jpg)


    图 1-10


    Apache NetBeans 团队菜单


    “打开全局配置”选项提供了直接在编辑器中管理 `global .gitconfig` 文件的能力，如图 1-11 所示。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig11_HTML.jpg](img/479166_1_En_1_Fig11_HTML.jpg)


    图 1-11


    管理全局 Git 配置文件


    通过右键单击 Apache NetBeans 项目，还可以在上下文菜单中找到 VCS 选项。这些选项包括初始化仓库的能力（图 1-12），并且对于已经初始化并拥有仓库的项目，还提供了一系列可用于处理
    VCS 仓库的选项（图 1-13）。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig13_HTML.jpg](img/479166_1_En_1_Fig13_HTML.jpg)


    图 1-13


    已初始化项目的 Git 选项


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig12_HTML.jpg](img/479166_1_En_1_Fig12_HTML.jpg)


    图 1-12


    为 Apache NetBeans 项目初始化仓库


    IDE 包含一个集成的 VCS 推送/拉取系统，因此，如果项目中的文件已被修改且与 HEAD 不同，则这些文件的文本会变为绿色。然后，可以轻松地在 HEAD
    与当前选中的文件之间执行 DIFF 比较，并通过在上下文菜单中选择选项并使用对话框将更改提交到仓库（图 1-14）。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig14_HTML.jpg](img/479166_1_En_1_Fig14_HTML.jpg)


    图 1-14


    使用 DIFF 比较文件


    Apache NetBeans 涵盖了更多版本控制功能。要了解有关这些功能的更多信息，请参阅在线资源，例如在 Apache NetBeans 中使用 Git：[`https://netbeans.apache.org/kb/docs/ide/git.html`](https://netbeans.org/kb/docs/ide/mercurial.html)
    或 Mercurial：[`https://netbeans.org/kb/docs/ide/mercurial.html`](https://netbeans.org/kb/docs/ide/mercurial.html)，仅举几例。


    ## 性能分析、调试与重构


    Apache NetBeans IDE 拥有出色的性能分析、调试和重构能力。性能分析器允许深入应用程序方法调用的内部，以定位问题区域。遥测分析器屏幕提供了
    CPU 与垃圾回收器、内存、垃圾回收以及线程和类的概览。CPU 与垃圾回收器图表允许深入特定时间点以查找 CPU 和 GC 时间，内存提供堆大小和已用堆，垃圾回收显示存活代，线程和类图表则显示线程数和已加载的类（图
    1-15）。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig15_HTML.jpg](img/479166_1_En_1_Fig15_HTML.jpg)


    图 1-15


    遥测显示


    进程按钮可调用某些功能，例如随时进行垃圾回收。方法分析允许分析所有类、项目类或仅选定的类。用户界面使得深入单个方法调用以定位问题变得容易（图 1-16）。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig16_HTML.jpg](img/479166_1_En_1_Fig16_HTML.jpg)


    图 1-16


    方法分析器


    对象分析器允许按大小对对象进行排序，双击某个对象将直接跳转到其源代码（图 1-17）。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig17_HTML.jpg](img/479166_1_En_1_Fig17_HTML.jpg)


    图 1-17


    对象分析器


    这些功能只是 Apache NetBeans 分析器的冰山一角。调试器允许在代码中设置断点，然后执行代码（本地或部署到服务器），并单步执行代码以帮助调试和查找问题原因。一旦在代码中设置了断点，调试器将在断点处停止执行，IDE
    将显示此时变量的值（图 1-18）。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig18_HTML.jpg](img/479166_1_En_1_Fig18_HTML.jpg)


    图 1-18


    Apache NetBeans 调试器


    调试器还允许对变量设置监视点，当变量包含指定值时，代码执行将停止。还有一个快照选项，允许在指定时间拍摄快照，以便在代码执行时进行监控。如果正在开发 JavaFX
    或 Swing 图形用户界面，还有一个可视化调试器，允许查看组件属性、容器内的组件等。请参阅第 5 章以了解有关调试器和分析器的更多信息。


    IDE 的另一个关键组件是重构代码的能力。Apache NetBeans 允许更改代码文件的名称、自动添加代码（如 getter 和 setter）、更改方法参数等（图
    1-19）。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig19_HTML.jpg](img/479166_1_En_1_Fig19_HTML.jpg)


    图 1-19


    Apache NetBeans 重构上下文菜单


    ### Apache NetBeans 平台


    Apache NetBeans 不仅仅是一个用于应用程序的 IDE。该 IDE 构建在一个专门为创建富客户端桌面应用程序而设计的平台上……即 NetBeans
    平台。事实证明，该平台具有极强的可扩展性，对于为 Java 平台开发任意数量的桌面应用程序非常有用。事实上，有许多成功的应用程序都是基于 NetBeans
    平台构建的，范围从完整的桌面应用程序到有用的实用工具。NetBeans 平台还允许轻松构建可安装的模块，以扩展 Apache NetBeans IDE。IDE
    本身包含可用于构建利用 NetBeans 平台的应用程序和模块的项目模板。


    要开发 NetBeans 模块，请打开“新建项目”对话框并选择“NetBeans 模块”类别（图 1-20）。有许多选项可用于创建 NetBeans 模块，范围从开发单个模块、模块库到整个
    NetBeans 平台应用程序。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig20_HTML.jpg](img/479166_1_En_1_Fig20_HTML.jpg)


    图 1-20


    新建项目：NetBeans 模块

