    导航器面板

    导航器面板让用户能够快速概览编辑器窗口中的内容，即鸟瞰视图。一个典型的例子是 Java 源文件的导航器。让我们为 cto 文件创建这样一个视图。


    首先，我们需要在 `pom.xml` 中添加两个新的 Maven 依赖项。


    ```

    org.netbeans.api

    org-netbeans-spi-navigator

    ${netbeans.version}


    org.netbeans.api

    org-openide-explorer

    ${netbeans.version}


    ```


    让我们定义一个模型类，用于表示 cto 文件中的资源。它包含名称、类型以及出现位置的偏移量：


    ```

    public class CtoResource {

    private final String name;

    private final int type;

    private final int offset;

    public CtoResource(String name, int type, int offset) {

    this.name = name;

    this.type = type;

    this.offset = offset;

    }

    public String getName() {

    return name;

    }

    public int getType() {

    return type;

    }

    public int getOffset() {

    return offset;

    }

    }

    ```


    导航器的起点是实现 `org.netbeans.spi.navigator.NavigatorPanel` 接口，并使用 `NavigatorPanel.Registration`
    注解进行注册。


    ```

    @NbBundle.Messages({

