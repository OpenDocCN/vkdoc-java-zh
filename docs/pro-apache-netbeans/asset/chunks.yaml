    ## Custom Dialogs


    One can also create custom dialogs via the `DialogDescriptor` class that extends
    `NotifyDescriptor`. An example is shown in Listing [10-6](#479166_1_En_10_Chapter.xhtml#PC6),
    which displays a custom Login dialog (designed in `LoginPanel JPanel` class).


    ```java

    DialogDescriptor d = new DialogDescriptor(

    new LoginPanel(), // Component

    "Login",          // title

    true,             // modality

    null);            // ActionListener

    DialogDisplayer.getDefault().createDialog(d).setVisible(true);

    ```

    Listing 10-6

    Display a custom dialog using the Dialogs API


    In short, you can pass any kind of `java.awt.Component` as the first parameter.
    As an example, let’s extend our *TodoRCP* application by providing a *Login* dialog
    asking for credentials when the application starts, at which point the application
    should be blocked until the user has been authenticated.


    ## Securing Access


    We don’t want anybody to be able to access our tasks. We need to secure them by
    asking for credentials to access our *TodoRCP* application. Here are the steps
    to follow in order to display a Login dialog on application start-up:


    1. Create a new module, as explained in Chapter [7](#479166_1_En_7_Chapter.xhtml),
    making sure to add it to the *TodoRCP* module suite. Name the module *Login* and
    give it the *Code Base Name* `todo.login`.


    2. Open the *Login* module, if not already open; right-click on the `todo.login`
    package; select **New ➤ Other** from the pop-up menu to display the *New File*
    dialog; select the category *Swing GUI Forms*; and select the *JPanel Form* file
    type. Click **Next**.


    3. In Step 2, enter `LoginPanel` in the *Class Name* field and click **Finish**.


    4. Create the login form shown in Figure [10-6](#479166_1_En_10_Chapter.xhtml#Fig6)
    using:


    * A label for Username: `lblUsername`

    * A label for Password: `lblPassword`

    * A label for the error message displayed on the bottom (shown as a red rectangle
    in Figure [10-6](#479166_1_En_10_Chapter.xhtml#Fig6) but will be invisible on
    your form): `lblInfo`

    * A text field for Username: `txtUsername`

    * A password field for Password: `txtPassword`


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig6_HTML.jpg](Images/479166_1_En_10_Fig6_HTML.jpg)


    Figure 10-6

    LoginPanel


    5. Switch to *Source* view in the editor window, and add the following methods
    in Listing [10-7](#479166_1_En_10_Chapter.xhtml#PC7) at the end of the `LoginPanel`
    class.


    6. Create a new module installer by right-clicking on the `todo.login` package
    and selecting **New ➤ Other**, then *Module Development* category followed by
    *Installer / Activator* as the file type. Then complete the code as shown in Listing
    [10-8](#479166_1_En_10_Chapter.xhtml#PC8). Notice that apart from `createDialog()`,
    that `DialogDisplayer` also offers both `notify()` and `notifyLater()`. The latter
    allows displaying the `Dialog` immediately after the initialization phase, which
    is directly after the splash screen.


    ```java

    public String getUserName() {

    return txtUsername.getText();

    }

    public char[] getPassword() {

    return txtPassword.getPassword();

    }

    public void setInfo(String info) {

    lblInfo.setText(info);

    }

    ```

    Listing 10-7

    Access methods of the LoginPanel


    ```java

    public class Installer extends ModuleInstall {

    private LoginPanel loginPanel = new LoginPanel();

    private DialogDescriptor d = null;

    @Override

    public void restored() {

    d = new DialogDescriptor(loginPanel, "Login", true, this);

    d.setClosingOptions(new Object[]{}); // not closeable

    DialogDisplayer.getDefault().notifyLater(d);

    }

    ```

    Listing 10-8

    The Module Installer class allows the login dialog to be displayed on application
    start-up


    `DialogDescriptor` expects an `ActionListener` as the constructor’s fourth parameter.
    Listing [10-9](#479166_1_En_10_Chapter.xhtml#PC9) shows an example of what such
    an `ActionListener` would look like.


    ```java

    public class Installer extends ModuleInstall implements ActionListener {

    //...

    @Override

    public void actionPerformed(ActionEvent e) {

    if (e.getSource() == DialogDescriptor.CANCEL_OPTION) {

    LifecycleManager.getDefault().exit();

    } else if (!validate(loginPanel.getUserName(), loginPanel.getPassword())) {

    loginPanel.setInfo("Wrong Username or Password");

    } else {

    d.setClosingOptions(null);// can close

    }

    }

    }

    ```

    Listing 10-9

    Module Installer actionPerformed() method implementation


    The `validate(String username, char[] password)` method checks in the database
    whether the provided credentials are valid. You may find its implementation in
    the source code of the book.


    If you play with the login dialog a bit, you will notice that you can close the
    login window overriding authentication by clicking on the **X** close button of
    the window. We can fix that by adding the code shown in Listing [10-10](#479166_1_En_10_Chapter.xhtml#PC10)
    to the constructor of the `LoginPanel`.


    ```java

    // if someone simply closes the dialog using the X close button

    d.addPropertyChangeListener(new PropertyChangeListener() {

    @Override

    public void propertyChange(PropertyChangeEvent e) {

    if (e.getPropertyName().equals(DialogDescriptor.PROP_VALUE)

    && e.getNewValue() == DialogDescriptor.CLOSED_OPTION) {

    LifecycleManager.getDefault().exit();

    }

    }

    });

    ```

    Listing 10-10

    Disallow closing the dialog from the X close button


    Another way is to create a Java class that implements `Runnable` and annotate
    it with `@OnStart` (which also requires a dependency to the *Module System API*).
    Listing [10-11](#479166_1_En_10_Chapter.xhtml#PC11) is left as an exercise to
    the user.'
