    设置


    NetBeans IDE 提供了 *选项* 窗口（菜单 **工具 ➤ 选项** 或在 MacOS 上为 **NetBeans ➤ 偏好设置**），允许用户对其进行自定义（见图
    10-14）。


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig14_HTML.jpg](img/479166_1_En_10_Fig14_HTML.jpg)


    图 10-14

    选项窗口


    如图 10-14 所示，有 *主面板*（例如 *常规*、*杂项*）和 *次面板*（例如 *格式*、*提示* 等）。主面板可用于配置应用程序中最重要的设置分组。次面板可用于配置应用程序所需的不太重要的设置。你还可以使用
    *选项* 窗口左下角的两个相应按钮导出和导入你的设置。


    Apache NetBeans 平台的 *选项对话框 API 和 SPI* 允许模块自定义选项窗口。要使用此 API，请右键单击你的模块，然后选择 **新建
    ➤ 其他**。选择 *模块开发* 类别和 *选项面板* 文件类型。在下一步中，在主面板和次面板之间进行选择（见图 10-15）。关键字使用户能够像我们之前学到的那样，从
    *快速搜索字段* 快速打开 *选项* 窗口。


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig15_HTML.jpg](img/479166_1_En_10_Fig15_HTML.jpg)


