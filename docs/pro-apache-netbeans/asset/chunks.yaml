    \n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig7_HTML.jpg](img/479166_1_En_10_Fig7_HTML.jpg)\n\
    \n图 10-7\n新建向导向导\n\n对于自定义向导，您可以选择向导是按固定的、不变的线性顺序通过一系列独立步骤（*静态*），还是根据用户的选择*动态*地通过步骤（即，用户可以跳过某些步骤）。第一个选项生成的代码允许用户按顺序向前或向后浏览面板，而不会分支或跳过面板。第二个选项生成的代码默认让您完全控制面板的顺序，并允许创建动态的面板排序。\n\
    \n静态向导\n\n首先，让我们创建一个包含三个面板的自定义静态向导。在 *向导类型* 对话框中点击 **下一步** 会进入 *名称和位置* 对话框。在第二步中将\
    \ *类名前缀* 设置为 `AddTask`，然后点击 **完成**。您最终会得到以下文件：\n\n*   `AddTaskWizardAction`：\n\
    \    用于调用向导的动作。您需要取消注释顶部的注解，才能将该动作注册到菜单或工具栏。清单 10-12 展示了这些注解。\n\n*   在 `actionPerformed()`\
    \ 方法的末尾，您需要收集所有数据并创建/更新您的模型。有关示例，请参见清单 10-13。\n\n```\n@ActionID(category=\"...\"\
    ,   id=\"todo.view.wizard.AddTaskWizardAction\")\n@ActionRegistration(displayName=\"\
    打开 AddTask 向导\")\n@ActionReference(path=\"Menu/Tools\", position=...)\n清单 10-12\n\
    AddTaskWizardAction 的注解，已取消注释以将动作注册到菜单或工具栏\n```\n\n*   `AddTaskWizardPanel1`、`AddTaskWizardPanel2`、`AddTaskWizardPanel3`：`WizardDescriptor.Panel`\
    \ 类负责控制每一步。它们检查输入值的有效性（通过 `isValid()` 方法），支持上下文相关帮助（通过 `getHelp()` 方法返回帮助上下文），并通过读取设置（`readSettings()`\
    \ 方法）和存储设置（`storeSettings()` 方法，供用户下次访问此面板或其他面板时读取）来初始化可视化面板。通常，您会定义一个包含一些常量属性名称的接口，这些方法会将这些名称作为键来保存属性。如果向导面板的有效状态取决于用户输入，则该面板必须实现\
    \ `addChangeListener()` 和 `removeChangeListener()`，并向其 `ChangeListener` 触发状态更改事件。\n\
    \n*   `AddTaskVisualPanel1`、`AddTaskVisualPanel2`、`AddTaskVisualPanel3`：用于每一步可视化表示的\
    \ `JPanel`。\n\n```\nif (DialogDisplayer.getDefault().notify(wiz) ==\nWizardDescriptor.FINISH_OPTION)\
    \ {\nTaskManagerInterface taskManager =\nLookup.getDefault().lookup(TaskManagerInterface.class);\n\
    if (taskManager != null) {\nTask task = new Task(\nwizardDescriptor.getProperty(AddTaskConstants.DESCRIPTION),\n\
    ...);\ntaskManager.addTask(task);\n}\n}\n清单 10-13\nactionPerformed() 方法实现\n```\n\
    \n您也可以使用 *简单验证 API*（`ide/modules/ext/ValidationAPI.jar`）进行验证。您需要将其包装到一个模块中（例如，在\
    \ *TodoRCP* 应用程序的 *库* 模块中），并将 `org.netbeans.validation.api` 设为公开。您还可以将 `ValidationPanel`\
    \ 添加到面板中，以便在您的面板中使用它（借助 *面板管理器*）。该 API 提供了一些有用的验证器：`REQUIRE_NON_EMPTY_STRING`、`NO_WHITESPACE`、`REQUIRE_VALID_INTEGER`、`REQUIRE_NON_NEGATIVE_NUMBER`、`numberRange(minValue,\
    \ maxValue)`、`EMAIL_ADDRESS`、`FILE_MUST_EXIST`、`URL_MUST_BE_VALID`、`REQUIRE_JAVA_IDENTIFIER`、`REQUIRE_VALID_FILENAME`。如果您对它们不满意，也可以创建自己的验证器。一旦您将\
    \ `ValidationPanel` 拖放到您的 `JPanel` 上，就可以通过调用 `group = validationPanel1.getValidationGroup()`\
    \ 然后调用 `group.add()` 添加一个或多个上述验证器，在那里验证输入（而*不是*在 `WizardDescriptor.Panel` 中）。\n\
    \n动态向导\n\n对于动态向导，会创建一个 `AddTaskWizardIterator`（类型为 `WizardDescriptor.Iterator`），而不是\
    \ `AddTaskWizardAction`（清单 10-14）。\n\n```\npublic final class AddTaskWizardIterator\
    \ implements WizardDescriptor.Iterator {\n// 调用此向导的示例：\n// @ActionID(category=\"\
    ...\", id=\"...\")\n// @ActionRegistration(displayName=\"...\")\n// @ActionReference(path=\"\
    Menu/...\")\n// public static ActionListener run() {\n//   return new ActionListener()\
    \ {\n//     @Override public void actionPerformed(ActionEvent e) {\n清单 10-14\n\
    一个动态向导\n```\n\n导航通过以下方法（清单 10-15）完成，这些方法相应地更新 `index`：`current()`、`hasNext()`、`hasPrevious()`、`nextPanel()`、`previousPanel()`。如前所述，**带\
    \ Swing UI 的新文件** 选项会将向导注册到文件类型。\n\n```\n@TemplateRegistration(\nfolder = \"Other\"\
    ,\ndisplayName = \"#AddTaskWizardIterator_displayName\",\niconBase = \"todo/view/wizard/file/addtsk_tsk.gif\"\
    ,\ndescription = \"addTask.html\")\n@Messages(\"AddTaskWizardIterator_displayName=创建新任务\"\
    )\npublic final class AddTaskWizardIterator implements WizardDescriptor.InstantiatingIterator\
    \ {\n清单 10-15\n将动态向导注册到文件类型\n```\n"
- fmt: 'During execution, an entry to execute the above wizard can be found in the
    **File ➤ New** dialog wizard inside category *Other*. To register the dynamic
    wizard that you created earlier to a category of the **File ➤ Project** dialog
    wizard, enter, for example, `folder = "Projects/Other"`. Instead of `InstantiatingIterator`,
    the `AddTaskWizardIterator` may also extend `AsynchronousInstantiatingIterator`
    (the `instantiate()` method is invoked outside the *EDT*), `BackgroundInstantiatingIterator`
    (the wizard closes and the `instantiate()` method is invoked in a background thread),
    or `ProgressInstantiatingIterator` (the `instantiate()` method is invoked outside
    the *EDT* and it is called with a `ProgressHandle` to display its progress in
    a progress bar, which is described later in this chapter). `WizardPanel`, instead
    of `WizardDescriptor.Panel`, may also extend `WizardDescriptor.ValidatingPanel`
    (for additional validation when the **Next** or **Finish** button is clicked),
    `WizardDescriptor.AsynchronousValidatingPanel` (for asynchronous validation),
    `WizardDescriptor.ExtendedAsynchronousValidatingPanel` (prefer this to `AsynchronousValidatingPanel`),
    or `WizardDescriptor.FinishablePanel` (when **Finish** button needs to be dynamically
    enabled; this allows the user to click the **Finish** button before the final
    step, because for example s/he accepts the default values of the following steps).


    ## Other Properties of Wizards


    When using the custom wizard, you can use some properties of `WizardDescriptor`:


    - `PROP_AUTO_WIZARD_STYLE`: set to `true` to enable using the other properties.

    - `PROP_CONTENT_BACK_COLOR`: set background color of left pane.

    - `PROP_CONTENT_DATA`: sets the array of content items.

    - `PROP_CONTENT_DISPLAYED`: set to `true` for displaying the left pane.

    - `PROP_CONTENT_FOREGROUND_COLOR`: set foreground color of left pane.

    - `PROP_CONTENT_NUMBERED`: set to `true` for displaying numbers in the left pane.

    - `PROP_CONTENT_SELECTED_INDEX`: represents index of left pane that will be highlighted.

    - `PROP_ERROR_MESSAGE`: error message displayed at bottom of the wizard. The wizard’s
    **Next** button is disabled when there are errors.

    - `PROP_IMAGE`: set the image to be displayed in the left pane.

    - `PROP_IMAGE_ALIGNMENT`: set the image’s alignment.


    Finally, regarding the other two options displayed in Figure [10-7](#479166_1_En_10_Chapter.xhtml#Fig7),
    consult the documentation at [`http://wiki.netbeans.org/HtmlUIForTemplates`](http://wiki.netbeans.org/HtmlUIForTemplates).
    As an exercise, build a custom static wizard for the `AddTask` action. The wizard
    will contain three steps, and the first panel will ask for the *description* and
    the *priority* of a task (description is mandatory); the second panel the *due
    date*, the *alert*, and the *days before*; and the third panel the *observations*
    and whether the task is *completed* or not. Try also to create the same wizard
    for the *TodoFXRCP* application. Hint! Use `JFXPanel`s in place of `JPanel`s.
    As another exercise, use the **New File with HTML/Java UI** wizard to create a
    wizard to add a new task for the *TodoHTMLJava* application.


    ## Miscellaneous


    Here we describe some APIs of the NetBeans Platform that you may find useful in
    your projects.


    ### Status Bar


    In Listing [9-2](#479166_1_En_8_Chapter.xhtml#PC2) of the previous chapter, we
    saw how to display messages in the status bar by registering to the `StatusLineElementProvider`
    service provider interface. If you want to display simple text, use the command
    of Listing [10-16](#479166_1_En_10_Chapter.xhtml#PC16).


    ```

    StatusDisplayer.getDefault().setStatusText("Status message").

    Listing 10-16

    Display a message in the status bar

    ```


    ### Notifications


    The NetBeans Platform provides a mechanism to display balloon-shaped pop-ups in
    the far right of the status bar. Use `NotificationDisplayer` for that purpose,
    which requires a dependency to the *UI Utilities* module. Listing [10-17](#479166_1_En_10_Chapter.xhtml#PC17)
    provides the various possibilities to customize the balloon.


    ```

    NotificationDisplayer.getDefault().notify(String title, Icon icon, String detailsText,
    ActionListener detailsAction);

    NotificationDisplayer.getDefault().notify(String title, Icon icon, String detailsText,
    ActionListener detailsAction, Priority priority);

    NotificationDisplayer.getDefault().notify(String title, Icon icon, JComponent
    balloonDetails, JComponent popupDetails, Priority priority);

    NotificationDisplayer.getDefault().notify();

    Listing 10-17

    Display a ballon-shaped pop-up in the status bar

    ```


    You can also include an icon in the balloon. An example adding an alert ![../images/479166_1_En_10_Chapter/479166_1_En_10_Figa_HTML.jpg](Images/479166_1_En_10_Figa_HTML.jpg)
    icon is shown in Listing [10-18](#479166_1_En_10_Chapter.xhtml#PC18).


    ```

    NotificationDisplayer.getDefault().notify(

    "Alert1",

    ImageUtilities.loadImageIcon("todo/view/illegal.png", false),

    "Alert Details1",

    null);

    Listing 10-18

    Display a ballon-shaped pop-up with an icon in the status bar

    ```


    As an exercise, modify *TodoRCP* to display the alerts at start-up as notifications
    instead of `JOptionPane` messages (see Figure [10-8](#479166_1_En_10_Chapter.xhtml#Fig8)).


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig8_HTML.jpg](Images/479166_1_En_10_Fig8_HTML.jpg)


    Figure 10-8

    Notifications


    If `ActionListener` is not `null`, then a hyperlink is displayed that, when clicked,
    executes the action. `Priority` can be: `HIGH`, `NORMAL`, `LOW`, or `SILENT`.


    ### ImageUtilities


    `org.openide.util.ImageUtilities` is a utility class providing static methods
    for manipulation and conversion of images and icons. Results are cached. Useful
    methods include `loadImage()`, `loadImageIcon()`, `icon2Image()`, `image2Icon()`,
    `mergeImages()`, etc. We saw an example in Listing [10-18](#479166_1_En_10_Chapter.xhtml#PC18).


    ### Quick Search


    Typically, in the top right of the toolbar a search field is displayed (see Figure
    [10-9](#479166_1_En_10_Chapter.xhtml#Fig9)). A `QuickSearch` box searches for
    keywords you type in its text box.


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig9_HTML.jpg](Images/479166_1_En_10_Fig9_HTML.jpg)


    Figure 10-9

    Quick Search in the toolbar


    If the search field is not shown automatically, then you need to include the XML
    tags shown in Listing [10-19](#479166_1_En_10_Chapter.xhtml#PC19) in `layer.xml`:


    ```


    Listing 10-19

    XML tags in layer.xml to display the quick search field in the toolbar

    ```


    You can choose to display the quick search in the menu bar instead of in the toolbar.
    When doing that, it is good practice to include a spacer, which ensures that the
    search field will be right aligned in the menu bar. You can do these things by
    adding the code from Listing [10-20](#479166_1_En_10_Chapter.xhtml#PC20) to your
    `layer.xml` file.


    ```


    Listing 10-20

    Display the quick search in the menu bar instead of the toolbar

    ```


    To display the quick search on the menu on Mac OSX, you will need to exclude the
    *Apple Application Menu* module from the platform cluster (right-click on the
    *TodoRCP* module suite and select **Properties**, then the *Libraries* category
    as shown in Figure [10-10](#479166_1_En_10_Chapter.xhtml#Fig10)) in order not
    to use the Apple menu bar instead.


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig10_HTML.jpg](Images/479166_1_En_10_Fig10_HTML.jpg)


    Figure 10-10

    Remove Apple Application Menu module from platform cluster'
