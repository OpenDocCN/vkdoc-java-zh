- fmt: 'With HTML/Java UI, you may also call JavaScript from your Java code (use `@JavaScriptResource`
    ([`http://137.254.56.27/html4j/1.0/net/java/html/js/JavaScriptResource.html`](http://137.254.56.27/html4j/1.0/net/java/html/js/JavaScriptResource.html))
    and the `@JavaScriptBody` annotation ([`http://137.254.56.27/html4j/1.0/net/java/html/js/JavaScriptBody.html`](http://137.254.56.27/html4j/1.0/net/java/html/js/JavaScriptBody.html))
    to provide a type-safe way to call its JavaScript functions from Java.


    Finally, HTML/Java UI has also good relations with REST and JSON:


    *   `@OnReceive`: is used to establish a REST endpoint, for example.


    ```

    @OnReceive(method = "DELETE", url = "{url}/{id}", onError = "cannotConnect")

    ```


    `"{url}/{id}"` is a URL pattern and its two parameters are set dynamically.


    This section was a small introduction to the HTML/Java UI API. We shall see an
    application of it in the next chapter.


    ## Action System


    If you have ever developed a standalone Java application in Swing, you will have
    most probably encountered the problem of having the same action as a button in
    a toolbar, a menu item, and/or maybe a pop-up menu item. You may, of course, create
    a `JButton` and a `JMenuItem` and/or a `JPopupMenu` and use the same code in their
    `actionPerformed()` methods, but I guess that you have heard about the *DRY* principle
    (*Don’t Repeat Yourself*), haven’t you? A better way would be to put all the logic
    in a `javax.swing.AbstracAction` instance, and pass it in the `JButton`’s and
    `JMenuItem`’s constructors.


    A display name or tooltip, an icon, and an optional shortcut key identify an action.
    Actions have also state (pressed/not pressed). In Swing, you need to configure
    your `JButton`s, `JMenuItem`s, and `JPopupMenu`s with icons, tooltips, etc.


    The NetBeans’ Platform *Action System* relieves you from all this hassle; it provides
    a configurable UI that allows you to concentrate only on your business logic and
    also provides ways to dynamically enable and disable actions and customize behavior
    based on selection context. Separating the presentation of an `Action` from its
    implementation is a good design decision, and NetBeans achieves this by using
    *annotations* for the presentation and a Swing `ActionListener` interface for
    the implementation, which is done once.


    *Annotations* are used to register an action in the menu or a toolbar and to specify
    the action’s display name, icon, and shortcut key sequence. The only thing that
    the developer needs to complete is the `ActionListener`’s implementation `actionPerformed()`
    method , that is, the business logic of the action. Using an `ActionListener`
    simplifies the process of porting Java Swing applications to the NetBeans Platform,
    too. Additionally, the **New Action** wizard makes the life of the developer easier
    by allowing you to configure the various annotations in the wizard. The wizard
    does the following:


    *   Registers an Action in `layer.xml` (under folder `Actions`)


    *   Creates resource bundle entries (e.g. `CTL_MyAction`)


    *   Registers Icons


    *   Registers key bindings


    *   Creates default implementation


    Actions are registered in a central registry (`layer.xml`). Only one instance
    is generated. They can be reused in different contexts (e.g., Menu bar and Toolbar).
    They can be accessed from different modules. Because all actions are registered
    in the same way, users can configure menus and toolbars as we saw in the previous
    chapter.


    An example `Action` generated by the **New Action** wizard is shown in Listing
    [8-19](#479166_1_En_8_Chapter.xhtml#PC23).


    ```

    @ActionID(

    category = "Edit",

    id = "todo.controller.edit.AddTaskAction"

    )

    @ActionRegistration(

    iconBase = "todo/controller/edit/add_obj.gif",

    displayName = "#CTL_AddTaskAction"

    )

    @ActionReferences({

    @ActionReference(path = "Menu/Edit", position = 10),

    @ActionReference(path = "Toolbars/Edit", position = 10),

    @ActionReference(path = "Shortcuts", name = "INSERT")

    })

    @Messages("CTL_AddTaskAction=Add Task...")

    public final class AddTaskAction implements ActionListener {

    @Override

    public void actionPerformed(ActionEvent e) {

    // TODO implement action body

    }

    }

    Listing 8-19

    An example Action generated by the New Action wizard

    ```'
