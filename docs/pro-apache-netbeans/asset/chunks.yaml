    # 3. Apache NetBeans：新特性


    自 Oracle 公司发布的最后一个版本 NetBeans 8.2 以来，Apache NetBeans IDE 取得了诸多进步。其发布节奏与 Java 的发布节奏保持高度一致，因此，自
    IDE 开源以来，在短时间内发布了多个版本。Apache NetBeans 9 侧重于模块化支持和 JShell。版本 10 包含了 JDK 11 支持和
    PHP 等新特性。Apache NetBeans 11 则针对 JDK 12 支持、Java EE 和 Gradle 支持。


    ### 注意


    需要特别注意的是，为了利用特定 JDK 版本的功能，你必须在相同或更高版本的 JDK 上运行 Apache NetBeans。你可以通过设置 `netbeans/etc/netbeans.conf`
    配置文件中的 `netbeans_jdkhome` 属性，轻松地将 Apache NetBeans 设置为在不同版本的 JDK 上运行。


    在本章中，我们将简要介绍过去几个版本中一些最重要的新特性。本章不会深入探讨这些特性，旨在提供一个快速概览。不过，本章提到的许多特性在本书的其他部分都有更详细的章节进行深入介绍。


    ## Apache NetBeans 9.0


    Apache NetBeans 9.0 的重要新特性包括模块化支持、局部变量类型推断和 JShell。在本节中，我们将简要介绍这些特性，让你快速了解它们的用法。


    ### Jigsaw（模块化）支持


    JDK 在其整个生命周期中最大的新特性之一可能就是 Java 模块化系统的发布，它更广为人知的名字是 Jigsaw。Java 平台中的模块化系统允许将应用程序分解为多个模块，而不是作为一个单一的大型应用程序。


    作为模块系统的一部分，`Modulepath` 已优先于 `CLASSPATH`。Apache NetBeans 中添加了 `Modulepath`，以提供对模块的支持，同时兼容那些仍在使用
    `CLASSPATH` 的应用程序。


    一个标准的 Java SE 项目可以通过在其默认包中添加一个 `module-info.java` 文件来成为一个模块。Apache NetBeans IDE
    完全支持 `module-info.java`，包括自动补全功能。还有一种基于 Ant 的项目类型，称为 Java 模块化项目。此项目类型可用于创建由多个模块组成的模块化应用程序。首先，打开**新建项目**向导，选择
    **Java with Ant** 类别，然后选择 **Java 模块化项目**。


    ### 局部变量类型推断


    局部变量类型推断将 **var** 关键字引入 Java 语言。这允许开发者声明一个 `var` 类型，而编译器会根据代码中的其他局部变量推断其类型。Apache
    NetBeans IDE 包含许多功能来帮助开发者使用局部变量类型推断。编辑器中添加了许多“提示”，用于指示何时输入的代码支持改用局部变量类型推断。可以点击提示以立即应用建议的更改。


    例如，有一个提示是*将显式类型替换为 ''var''*，反之亦然。还有用于拆分复合声明的提示。所有这些都内置于 Apache NetBeans 中，使代码更易于阅读和管理。


    ### JShell


    JShell 是 Java 语言中一个期待已久的功能，因为许多现代语言现在都在发行版中附带了一个 REPL（读取-求值-打印-循环）工具。Java 语言在
    JDK 9 中获得了 REPL，即 JShell。该工具提供自动补全和基本的开发/测试功能。它还允许动态执行 Java 代码，无需编译即可评估语句和代码块。Apache
    NetBeans IDE 通过在编辑器窗格中提供一个 REPL 实例来支持 JShell，以便快速访问。要打开 JShell，请使用 **工具** ➤ **打开
    Java 平台 Shell** 菜单选项。选择后，编辑器窗口将打开运行 Apache NetBeans 的 Java 平台的 JShell 工具。


    ### 注意


    你必须使用 JDK 9 或更高版本运行 Apache NetBeans，才能使用 JShell 工具。


    进入 JShell 编辑器后，该工具的使用方式与在命令行中完全相同。也就是说，可以执行 Java 语句或代码块，而无需将它们封装到 Java 类中。此外，Java
    代码无需编译即可执行。这使得 JShell 编辑器非常适合进行测试。参见图 3-1。


    ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig1_HTML.jpg](img/479166_1_En_3_Fig1_HTML.jpg)


    图 3-1


    Apache NetBeans JShell 编辑器


    在 Apache NetBeans 中使用 JShell 有一些很大的好处。在编辑器中工作时，可以测试代码，然后点击**保存到类**按钮，一键将代码保存到
    Java 类中。JShell 也可以作为代理配置到基于 Ant 的 Java SE 应用程序中，允许应用程序调用 JShell。Apache NetBeans
    的偏好设置面板包含用于配置 JShell 历史记录、自动打开 JShell 以及修改用于 JShell 的 JDK 的选项。参见图 3-2。


    ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig2_HTML.jpg](img/479166_1_En_3_Fig2_HTML.jpg)


    图 3-2


    JShell 支持


    ## Apache NetBeans 10.0


    Apache NetBeans 10.0 版本包含了几项重大增强，即 JDK 11 和 PHP 支持。在本节中，我们将简要介绍这些特性，以便你可以开始全面探索它们。

    '
- fmt: '### JDK 11 Support


    JDK 11 was the first Long Term Support (LTS) release of Java since the new release
    cycle had been introduced. This release included some great new features, which
    are fully supported in Apache NetBeans. JDK 11 has a number of new features, ranging
    from new `String` methods to the new HTTP client. Apache NetBeans contains full
    support for these features.


    Taking a look at the new Java `String` method support, the IDE will auto-complete
    the newly added methods. In the screenshot below (Figure [3-3](#479166_1_En_3_Chapter.xhtml#Fig3)),
    you can see the new `repeat()` functionality.


    ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig3_HTML.jpg](Images/479166_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    ### JDK 12 Support


    The IDE also has complete support for the new HTTP client. As the next screenshot
    demonstrates (Figure [3-4](#479166_1_En_3_Chapter.xhtml#Fig4)), the `HttpClient`
    can be utilized within a Java SE class, and the IDE includes full auto-complete
    support while coding.


    ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig4_HTML.jpg](Images/479166_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    ### HttpClient Support


    ### PHP


    The Apache NetBeans IDE contains full support for PHP 7.0, 7.1, 7.2, and 7.3.
    This enables one to create a new PHP project using some of the latest PHP advances.
    PHP has been a part of Apache NetBeans for years, but only up through PHP 7.0
    was it supported without installing additional plugins. Since Apache NetBeans
    10.0, PHP has become a part of the standard distribution. See Figure [3-5](#479166_1_En_3_Chapter.xhtml#Fig5).


    ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig5_HTML.jpg](Images/479166_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    PHP New Project Dialog


    The Apache NetBeans editor supports such features as the `"void"` type in PHP,
    as well as any of the other PHP enhancements through PHP 7.3. For instance, there
    is support for allowing a trailing comma in function calls. This may help in the
    case where a comma is accidentally forgotten or perhaps a list may continue to
    grow at some point. See Figure [3-6](#479166_1_En_3_Chapter.xhtml#Fig6).


    ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig6_HTML.jpg](Images/479166_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Trailing Comma Support


    Another newer feature of PHP is support for multi-catch exception handling, and
    the Apache NetBeans environment allows support for this feature as well (Figure
    [3-7](#479166_1_En_3_Chapter.xhtml#Fig7)).


    ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig7_HTML.jpg](Images/479166_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    PHP Multi-Catch Exception Handling


    The life of a PHP developer can also be made easier by making use of the native
    debugger. One can set a breakpoint on a line of code and run the debugger, then
    the application will run and once the breakpoint is reached, the editor will be
    opened to the breakpoint, enabling the developer to debug variable values and
    states at that point in time.


    All of these advancements in PHP support make Apache NetBeans one of the foremost
    IDEs for developing in PHP.


    ## Apache NetBeans 11.0


    The Apache NetBeans 11.0 release includes full support for Java EE and Gradle,
    as well as support for JDK 12 features.


    ### JDK 12 Support


    The Java release cadence is allowing for a new release of the JDK every six months.
    As such, the Apache NetBeans release cycle should allow the IDE to continue to
    include the support for the most recent JDK. That said, JDK 12 support has been
    added to Apache NetBeans 11.0, including a preview of switch expression support,
    and support for compact number formatting. This includes hints such as the “convert
    to rule switch” for the new `switch` support.


    ### Java EE Support


    Up through Apache NetBeans 10.0, if one wished to utilize Java EE features, the
    modules needed to be enabled via the Apache NetBeans 8.2 update center. This is
    because Java EE support was not yet part of the Apache NetBeans distribution.
    The full enterprise cluster has been transferred to become part of the Apache
    NetBeans distribution with Apache NetBeans 11.0. This means that out of the box,
    the Apache NetBeans distribution includes full support for Java EE, without the
    requirement to download and install any additional modules.


    Not only does Apache NetBeans 11.0 include support for Java EE, but it also includes
    support for Jakarta EE 8 via the Java EE 8 support that has been added in Apache
    NetBeans 11.1. The new support allows one to create a new Maven-based Jakarta
    EE/Java EE project using Java EE 8. It also allows one to install Java EE 8-compliant
    application server containers and manage them via the IDE, such as GlassFish 5.1.


    ### Gradle


    Another feature that required enablement in previous Apache NetBeans releases
    was Gradle support. As part of Apache NetBeans 11.0, Gradle support has been made
    first-class, so it works out of the box. Gradle projects can now be opened out
    of the box, and a Gradle Task Navigator has been integrated, allowing one to run
    tasks using a double-click. This also allows one to make use of Gradle supported
    unit test frameworks, and make use of run, debug, and test … even with single
    methods.


    ## Conclusion


    The Apache NetBeans IDE continues to progress with each release, supporting newer
    releases of the JDK and adding enhancements to make the IDE more useful to a broader
    spectrum of developers. If you have any features that you would like to see added
    to Apache NetBeans, please join the community and contribute your ideas. Now you
    are ready to develop desktop applications.'
