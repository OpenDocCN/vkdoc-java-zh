- fmt: 'As shown in Figure [7-7](#479166_1_En_7_Chapter.xhtml#Fig7) in Chapter [7](#479166_1_En_7_Chapter.xhtml),
    the task list consists of a menu bar, a toolbar, a table, and a status bar. Apart
    from the table, which in NetBeans RCP is called `OutlineView`, the platform handles
    all the rest. To add an `OutlineView`, you need to add a dependency to the *Explorer
    & Property Sheet API*. Right-click the *Libraries* folder of the *View* module
    and select **Add Module Dependency**, select **Explorer & Property Sheet API**,
    and click **OK**. Right-click `TopComponent` in the Design view and change its
    layout to **BorderLayout**.


    Drag a *Scroll Pane* from the *Palette window* and drop it in the center of `TasksTopComponent`.
    Right-click `JScrollPane` in the *Navigator* window (look at the left bottom)
    and change its variable name to `outlineView`. In the *Properties* window, click
    **Code**, and then click the small button **[...]** of the *Custom Creation Code*
    property, add `new OutlineView(),` and click the **OK** button. Switch to the
    Source view in the *Editor window*, right-click, and select **Fix Imports** to
    fix the errors.


    When you run the application, you will see something similar to Figure [9-4](#479166_1_En_9_Chapter.xhtml#Fig4).


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig4_HTML.jpg](Images/479166_1_En_9_Fig4_HTML.jpg)


    **Figure 9-4** First execution of the TodoRCP application


    Look at how many things you get out of the box with NetBeans RCP, which in a normal
    Swing application you would have to develop yourself: a menu bar and a toolbar
    (which need customization), a status bar, and a strange tree-table component—and
    all of these with just one line of code.


    Let’s start by customizing the menu. As already explained in the previous chapters,
    a central registry holds information about every module of the NetBeans RCP ToDo
    application. You can find the menu bar in this central registry if you click **Important
    Files ➤ XML Layer ➤ <this layer in context> ➤ Menu Bar** (see Figure [9-5](#479166_1_En_9_Chapter.xhtml#Fig5)).


    In Figure [7-7](#479166_1_En_7_Chapter.xhtml#Fig7), we see that we need only *File*,
    *Edit*, and *Options* menus. So, keep *File* and *Edit*, rename *Tools* to *Options*
    (by selecting it, right-clicking, and selecting **Rename**), and remove the rest,
    as well as the content actions (by selecting them, right-clicking, and selecting
    **Delete**). Clean and build *View* module and execute the application again.^([³](#fn3))
    The result should look something like Figure [9-6](#479166_1_En_9_Chapter.xhtml#Fig6).


    You may need to restart NetBeans after you rename *Tools* to *Options*.


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig6_HTML.jpg](Images/479166_1_En_9_Fig6_HTML.jpg)


    **Figure 9-6** TodoRCP application with customized menu bar


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig5_HTML.jpg](Images/479166_1_En_9_Fig5_HTML.jpg)


    **Figure 9-5** Layer XML – central registry


    Let’s build our table with some demo data. Click on **Source**, and at the end
    of the `TasksTopComponent`’s constructor, add the lines of code shown in Listing
    [9-1](#479166_1_En_9_Chapter.xhtml#PC1).


    ```

    OutlineView ov = (OutlineView)outlineView;

    //Set the columns of the outline view,

    //using the name of the property

    //followed by the text to be displayed in the column header

    ov.setPropertyColumns(

    "priority", "Priority",

    "description", "Task",

    "alert", "Alert",

    "dueDate", "Due Date");

    //Hide the root node, since we only care about the children:

    ov.getOutline().setRootVisible(false);

    TableColumnModel columnModel = ov.getOutline().getColumnModel();

    ETableColumn column = (ETableColumn) columnModel.getColumn(0);

    ((ETableColumnModel) columnModel).setColumnHidden(column, true);

    ```


    **Listing 9-1** Creating the OutlineView


    To be able to compile the code, you need to add one more dependency to the *ETable
    and Outline* module (and **Fix Imports**). You remember how to do this, right?
    Here’s a hint: right-click the *Libraries* folder in the *Projects* tab or refer
    to Figure [7-16](#479166_1_En_7_Chapter.xhtml#Fig16) in Chapter [7](#479166_1_En_7_Chapter.xhtml).
    If you are successful, your application should look like Figure [9-7](#479166_1_En_9_Chapter.xhtml#Fig7).


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig7_HTML.jpg](Images/479166_1_En_9_Fig7_HTML.jpg)


    **Figure 9-7** TodoRCP application with OutlineViews’ columns


    Let’s create the status bar next. To display a `StatusBar` in NetBeans, a class
    must implement the `StatusLineElementProvider` interface and declare it as a service.
    Right-click the `todo.view` package and select **New ➤ Java Class**. Name it `StatusBar`
    and click **Finish**. Then copy the code shown in Listing [9-2](#479166_1_En_9_Chapter.xhtml#PC2)
    and paste it in (you may need to format the code; right-click inside the editor
    and select **Format** from the pop-up menu).


    ```

    package todo.view;

    import java.awt.Component;

    import javax.swing.JLabel;

    import org.openide.awt.StatusLineElementProvider;

    import org.openide.util.lookup.ServiceProvider;

    /**

    * The application''s status bar.

    */

    @ServiceProvider(service=StatusLineElementProvider.class, position=1)

    public class StatusBar implements StatusLineElementProvider {

    @Override

    public Component getStatusLineElement() {

    return new JLabel("There are no task alerts for today.");

    }

    }

    ```


    **Listing 9-2** The StatusBar as a Service Provider implementation


    `ServiceProvider`s and `Lookup`s revisited. The `StatusLineElementProvider` interface
    is flexible; you can return any component you want – a `JLabel`, `JButton`, `JPanel`,
    and so on. But of course, the magic thing is the first line, which declares the
    `StatusBar` class as a service provider of `StatusLineElementProvider.class`.
    As you should already know by now, this line adds your class to the application’s
    *default lookup*, which NetBeans then searches for `StatusLineElementProvider.class`,
    and then it adds all the providers it finds to the status bar.


    Next, let’s create the toolbars. A toolbar contains actions, so you’ll create
    the actions and insert them into the appropriate toolbars in the central registry.
    You’ll need the icons from the original ToDo application. Repeat the steps that
    you performed above for the *Menu Bar* in the central registry for the *Toolbars*.
    Leave only two entries: *Edit, Options* (by renaming some and deleting the rest).


    The actions are controllers. Open the *Controller* module and create the Java
    packages `todo.controller.file`, `todo.controller.edit`, and `todo.controller.options`.
    Right-click the `todo.controller.edit` package and select **New Action**. Create
    the *Add Task* action, which is always enabled, and click **Next**.


    Then select a category for the action. The categories represent semantic groupings
    of the actions. You can select a preexisting category or create a new one. In
    our case, select the preexisting *Edit* category. In addition, assign your action
    to the *Edit* menu bar and the *Edit* toolbar, and set the position where the
    action will be displayed. Drop-down menus show you possible locations for display.
    *"HERE"* identifies the location where the display of your action will be inserted.
    Don’t forget to add a keyboard shortcut (*Insert*, as in the old to-do application).
    See Figure [9-8](#479166_1_En_9_Chapter.xhtml#Fig8).


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig8_HTML.jpg](Images/479166_1_En_9_Fig8_HTML.jpg)


    **Figure 9-8** New Action wizard, Step 3


    Name the class as shown in Figure [9-9](#479166_1_En_9_Chapter.xhtml#Fig9), and
    don’t forget to add an icon (browse to the `icons` folder of the original ToDo
    application or use your own icons if you prefer).


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig9_HTML.jpg](Images/479166_1_En_9_Fig9_HTML.jpg)


    **Figure 9-9** New Action wizard, Step 4


    Click **Finish**.'
