    Sorting behavior is delivered out of the box in `OutlineView`s just by clicking
    the specific header/field. Clicking once sorts the column in ascending order,
    clicking once more sorts in descending order, and clicking once more leaves the
    order as it was originally. However, if you want to implement `SortByDateAction`
    and `SortByPriorityAction` to see how sorting can be done programmatically, create
    a new `Utilities` class inside `todo.view`, and then copy the code from Listing
    [9-8](#479166_1_En_9_Chapter.xhtml#PC8) and paste into to the `Utilities` class
    .


    ```

    /**

    * Sort the outline view {@code ov} on the given {@code field}.

    * @param ov outline view to sort

    * @param field to sort upon

    * @param ascending if {@code true} then the list is sorted in ascending order,

    * if {@code false} in descending order.

    */

    public static void sortBy(final OutlineView ov, final String field, final boolean
    ascending) {

    ETableColumnModel columnModel = (ETableColumnModel) ov.getOutline().getColumnModel();

    int columnCount = columnModel.getColumnCount();

    columnModel.clearSortedColumns();

    for (int i = 0; i < columnCount; i++) {

    ETableColumn column = (ETableColumn)columnModel.getColumn(i);

    if (column.getHeaderValue().equals(field)) {

    columnModel.setColumnSorted(column, ascending, 1);

    }

    }

    TableModel model = ov.getOutline().getModel();

    ov.getOutline().tableChanged(new TableModelEvent(model, 0, model.getRowCount()));

    }

