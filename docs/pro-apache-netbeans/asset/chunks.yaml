  trans: '

    ### 注意


    我采用一种名为*匈牙利命名法*的约定来命名各种控件，你可以自由选择是否遵循。在每个控件的变量名前面，我会添加三个描述该控件的字母。例如，我用`btn`表示按钮，`lbl`表示标签，`tbl`表示表格等。如图
    4-24 所示，我将第一个按钮命名为`btnAddTask`。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig24_HTML.jpg](img/479166_1_En_4_Fig24_HTML.jpg)


    图 4-24


    图标属性编辑器


    NetBeans 还提供了一个定制器来定义`JTable`的模型属性。请确保从*导航器*窗口中选择`JTable`控件（而不是`JScrollPane`），然后点击其*model*属性旁的
    **…** 按钮。此时会出现图 4-25 所示的对话框。我已经编辑了列，使其看起来像我们想要开发的应用程序。然而，这种定制仅适用于原型设计，因为在实际应用程序中，模型将由真实的（`Task`）对象创建。通常，对`JTable`的定制需要开发自定义的
    Java 类，例如单元格渲染器和编辑器、列模型等。


    最后，我们需要一个菜单栏。继续操作，从面板中拖拽一个*菜单栏*控件到窗体的顶部。使用*导航器*窗口或直接在 GUI 设计器中点击菜单栏来添加菜单，如图 4-26
    所示（作为练习留给读者）。你可以选择`JMenuItem`、`JCheckBoxMenuItem`、`JRadioButtonMenuItem`、`JMenu`和`JSeparator`。你还可以通过设置菜单项的*mnemonic*属性（和/或*accelerator*属性）来添加*助记符*。*accelerator*是一个直接调用操作的按键组合（例如，图
    4-26 中的`F11`键）。*mnemonic*是一个按键组合，通过键盘与`Alt`键配合来访问菜单项。例如，你可以通过按`Alt+F`来访问`F``ile`菜单（而不是底层的`F`）。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig26_HTML.jpg](img/479166_1_En_4_Fig26_HTML.jpg)


    图 4-26


    TasksWindow 窗体的完整菜单


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig25_HTML.jpg](img/479166_1_En_4_Fig25_HTML.jpg)


    图 4-25


    JTable 模型定制器


    在*设计*视图中点击窗体外部，然后从*导航器*窗口中选择*[JFrame]*树节点（位于*Form TasksWindow*树下），并将其*title*属性更改为`TasksWindow`。你还可以定义一个窗口最小化时使用的图标图像（点击*iconimage*属性，点击
    **…** 按钮，并添加如下一行代码）：


    ```

    new javax.swing.ImageIcon(getClass().getResource(

    "/icons/addtsk_tsk.gif")).getImage()).

    ```


    点击 GUI 设计器工具栏上的**预览**按钮（图 4-7），以查看`TasksWindow`在运行时的行为（见图 4-27）。你可以浏览菜单，与`JTable`交互；预览功能非常强大。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig27_HTML.jpg](img/479166_1_En_4_Fig27_HTML.jpg)


