- fmt: '*   **Scalable development**: Teams can work in parallel by creating explicit
    boundaries that are enforced by the module system.

    *   **Security**: No access to internal classes of the JVM (like `Unsafe`).

    *   **Optimization**: Optimizations can be applied by inspecting (transitive)
    dependencies. It also opens up the possibility to create a minimal configuration
    of modules for distribution.


    As a consequence, JDK now consists of 19 platform modules.


    As already mentioned in Chapter [3](#479166_1_En_3_Chapter.xhtml), a module has
    a name (e.g., `java.base`), groups related code and possibly other resources,
    and is described by a *module descriptor*. Like packages are defined in `package-info.java`,
    modules are defined in `module-info.java` (in root package). A modular jar is
    a jar with a `module-info.class` inside it. In Chapter [3](#479166_1_En_3_Chapter.xhtml),
    we also saw how NetBeans provides support for Java 9 modules.


    Table [7-2](#479166_1_En_7_Chapter.xhtml#Tab2) provides a comparison between the
    NetBeans Module API and the Java 9 modular API.


    **Table 7-2** NetBeans Module API vs. Java 9 Modules Comparison


    | | Java 9 modules | NetBeans Module API |

    | --- | --- | --- |

    | **Encapsulation** | ✓ | ✓ |

    | **Interfaces** | ✓ | ✓ |

    | **Explicit dependencies** | ✓ | ✓ |

    | **Versioning** | **✗** | ✓ |

    | **Cyclic dependencies∗** | ✓ | ✓ |

    | **Services** | `ServiceLoader` | `ServiceProvider` |


    As already described, both modular systems provide support for encapsulation and
    exporting public interfaces and explicitly handle dependencies while both don’t
    allow cyclic dependencies. Java 9 doesn’t allow cyclic dependencies during compile
    time, but it does during runtime. The Java 9 module system doesn’t support versioning,
    something that has been criticized by the Java community.


    As already mentioned, loose coupling between modules is achieved in NetBeans RCP
    via the lookups and the `ServiceProvider` interface. Jigsaw, on the other hand,
    uses a Query-based approach from Java 6, the `ServiceLoader` (Listing [7-7](#479166_1_En_7_Chapter.xhtml#PC18)).


    ```

    ServiceLoader serviceLoader =

    ServiceLoader.load(Provider.class);

    for (Provider provider : serviceLoader) { return provider; }

    ...

    ServiceLoader serviceLoader =

    ServiceLoader.load(Provider.class).stream().filter(...);

    Listing 7-7

    ServiceLoader interface

    ```


    However, the `ServiceLoader` has a number of problems:


    *   It isn’t dynamic (you cannot install/uninstall a plugin/service at runtime).

    *   It does all service loading at startup (as a result it requires longer startup
    time and more memory usage).

    *   It cannot be configured; there is a standard constructor and it doesn’t support
    factory methods.

    *   It is a final class with hard-coded behavior so it cannot be extended.

    *   It doesn’t allow for ranking/ordering, that is, we cannot choose which service
    to load first.


    Java 9 introduced a number of modifications to Java 6 `ServiceLoader`:


    *   No relative services; the new module-based service locator does not have relative
    behavior.

    *   Ordering of services (as they were discovered) is lost.

    *   All service interfaces and implementations on the module path are flattened
    into a single, global namespace.

    *   No extensibility / customizability of service loading; the service layer provider
    must provide a fixed mapping of available services up front.

    *   Multiple-site declarations; every module that uses a service must also declare
    that the service is being used in the module descriptor; no global layer-wide
    service registry.


    `ServiceProvider` does not have the drawbacks of `ServiceLoader`. It is dynamic,
    so you can plug in/unplug modules while your application is running, it doesn’t
    load all services at startup, and it allows you to set priorities (with the `position`
    attribute). It is extensible, supports listeners, understands the NetBeans platform
    module system, and one can create as many `Lookup`s as they wish (there can be
    only one instance of `ServiceLoader` per classloader).


    And now the big questions:


    *   Which module system to use?

    *   Can the Jigsaw module system and the NetBeans Module API work together?


    As we saw, both module systems have their pros and cons. NetBeans Module System
    API can also work outside of NetBeans; just use the related JAR files (they can
    be found inside `platform/lib` folder of your NetBeans IDE installation): `boot.jar`,
    `core.jar`, `org-openide-filesystems.jar`, `org-openide-modules.jar`, and `org-openide-util.jar`.


    Don’t mix up module systems, that is, don’t use both Jigsaw and NetBeans Module
    System in your project. It will unnecessarily complicate things, and it won’t
    give any extra benefit to your application.'
