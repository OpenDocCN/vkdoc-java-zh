  trans: '

    ### 注意


    在安装 Apache NetBeans 之前，请确保已安装 JDK。如果你计划开发 Java EE/Jakarta EE 应用程序，请务必安装与应用程序部署目标容器所用版本一致的
    JDK。安装完成后，应将位于 `etc/netbeans.conf` 中的配置变量 `netbeans_jdkhome` 设置为用于运行 Apache NetBeans
    的 JDK 路径。


    接下来，我们将逐步开发一个简单的“Hello World” Java 应用程序，并介绍 Apache NetBeans IDE 的一些核心功能。首先，打开
    Apache NetBeans，通过选择“文件” ➤ “新建项目”或点击工具栏中的“新建项目”图标来创建一个新项目。


    然后，在“新建项目”对话框中，从 *类别* 选择列表中选择“Java”类别，再从 *项目* 选择列表中选择“Java 应用程序”。此时将出现一个“新建 Java
    应用程序”对话框（图 1-2），您可以在此提供**项目名称**、**项目位置**和**项目文件夹**。输入“HelloApacheNetBeans”作为项目名称。


    接下来，在计算机上选择一个位置来存储项目文件。Apache NetBeans 允许您提供一个公共区域来存储第三方库，但暂时跳过这一步，并确保勾选“创建主类”，保持默认的*主类*名称不变。点击“完成”来创建项目。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig2_HTML.jpg](img/479166_1_En_1_Fig2_HTML.jpg)


    图 1-2


    新建 Java 应用程序对话框


    Apache NetBeans 将在编辑器中打开 `HelloApacheNetBeans` 主类，您会看到该项目已添加到左侧导航器中（图 1-3）。展开左侧导航器中的项目菜单时，会在包
    `helloapachenetbeans` 下显示一个名为 `HelloApacheNetBeans.java` 的源文件，并且在“库”节点下可以看到已在
    Apache NetBeans 中注册的默认 JDK。默认情况下，`HelloApacheNetBeans.java` 文件会在源代码编辑器中打开。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig3_HTML.jpg](img/479166_1_En_1_Fig3_HTML.jpg)


    图 1-3


    项目菜单


    项目以增强格式显示，便于浏览项目文件和查看项目依赖关系。左侧导航器顶部有“项目”、“文件”和“服务”选项卡。默认显示“项目”选项卡，其中将以增强视图显示当前打开的每个
    Apache NetBeans 项目。“文件”选项卡则根据磁盘上的实际项目文件来显示当前打开的每个 Apache NetBeans 项目。如果您知道某个文件的位置并需要编辑它，这有时会很有用。它之所以有用，还因为
    Apache NetBeans 默认会隐藏部分项目文件以组织项目并简化导航，而且这些隐藏文件在大多数情况下无需编辑。“服务”选项卡包含大量用于处理数据库、Web
    服务、Maven 仓库、Docker 等的选项。本书后续章节将详细介绍这些服务中的许多内容。


    为了体验编辑器操作，请将光标置于打开的编辑器中 `HelloApacheNetBeans.java` 文件的 `main()` 方法内，位于如下代码注释之后：


    ```

    // TODO code application logic here

    ```


    按下回车键开始一个新空白行，然后开始输入：`System.out.println("Hello Apache NetBeans");` 在输入过程中，会出现自动补全选项以简化编码。实际上，只需输入
    `sout` 并按下 Tab 键，该行就会通过代码模板自动补全。在 `println()` 方法中输入字符串“Hello Apache NetBeans”。代码应如下所示：


    ```

    public static void main(String[] args) {

    // TODO code application logic here

    System.out.println("Hello Apache NetBeans");

    }

    ```


    在项目导航器中，右键点击会弹出上下文菜单，提供许多额外选项。本书后续将介绍其中大部分选项，但现在请右键点击项目导航器中的 `HelloApacheNetBeans`
    项目，并选择“清理并构建”。此操作会从磁盘中删除所有已编译的代码，并执行构建，包括项目的所有外部依赖项。接下来，右键点击项目名称并点击“运行”。编辑器下方有多个选项卡，其中一个是“输出”选项卡。运行项目时，“输出”选项卡应显示以下内容：


    ```

    run:

    Hello Apache NetBeans

    BUILD SUCCESSFUL (total time: 0 seconds)

    ```


    ## Java Web 应用程序


    Java Web 应用程序通常需要协调多个流程才能进行开发和测试。例如，大多数 Web 应用程序需要部署到某种应用服务器容器中，并且许多应用程序需要访问数据库。Apache
    NetBeans 允许在一个地方维护所有这些独立的流程，从而简化 Java Web 应用程序的开发、部署和测试。此外，它还包含一个调试器模式，可以轻松地以调试模式部署应用程序，然后逐步执行断点以帮助排查问题。有关调试器的更多详细信息，请参见第
    5 章。


    Java Web 应用程序通常包含多种不同的代码和样式文件，而 Apache NetBeans 代码编辑器几乎能够编辑任何类型的文件。该代码编辑器支持多种不同的语言，并提供语法高亮、自动补全和错误标记等功能。尤其是在处理
    Web 应用程序时，能够在同一个编辑器中编辑不同类型的文件至关重要。Apache NetBeans 插件门户还为开发者提供了为 IDE 创建第三方扩展的能力，这使得支持的文件类型和扩展选项变得无限可能。例如，有许多应用服务器容器的第三方插件可用，这些插件为这些服务器提供了特殊功能。更多详细信息，请参见第
    11 章：为 NetBeans 编写插件。


    在 Apache NetBeans 中开发 Web 应用程序有多种选择。每种选择都对应不同的项目类型。在“新建项目”对话框的“Java Web”类别下，有三个可用选项：Web
    应用程序、基于现有源的 Web 应用程序和 Web 自由格式应用程序。“Web 应用程序”通常用于创建一个使用 Apache Ant 作为构建系统的新 Web
    应用程序项目。此类项目要求开发者使用 Apache Ant 手动管理资源。“基于现有源的 Web 应用程序”允许您从现有的基于 Apache Ant 的 Web
    应用程序创建项目。此外，还可以利用“Java EE”和“Maven”类别下的其他选项来创建 Web 应用程序。通常，较旧风格的 Java 企业应用程序可以从“Java
    EE”类别中的选项创建。“Maven”类别提供了使用 Apache Maven 构建系统创建 Java EE 项目的选项。如果不确定从何入手，最安全且最现代的
    Web 应用程序项目风格可以通过选择 Maven 的“Web 应用程序”项目来创建。

    '
- fmt: '### Note


    If using Apache NetBeans release prior to 11.0, you will need to install the “Java
    EE” plugin in order to create a new web application project. In release 11.0+,
    the plugin is integrated within the IDE.


    Let’s walk through the development of a simple “Hello World” web application.
    First, open the “New Project” dialog and choose “Java Web” category, followed
    by the “Web Application” project type. Once selected, the “New Web Application”
    dialog will be displayed. Name the web application “HelloWorldWeb,” and choose
    a good location for the project (Figure [1-4](#479166_1_En_1_Chapter.xhtml#Fig4)).


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig4_HTML.jpg](Images/479166_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    New Web Application Dialog


    Click next, and then select an application server and “Java EE Version” to support.
    In this case, the “Payara 5.183.1” server is selected (see section on how to add
    a new server to Apache NetBeans), and “Java EE 7 Web” is selected as the `Java
    EE Version`. Leave the `Context Path` as is (Figure [1-5](#479166_1_En_1_Chapter.xhtml#Fig5)).


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig5_HTML.jpg](Images/479166_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Server and Settings


    The final section to the “New Web Application” wizard is the `Frameworks` dialog.
    In this section, if you’d like to use a particular Java Web framework, you could
    select it here to add any required dependencies and configuration files for the
    chosen framework. In this case, do not select anything and simply click “Finish.”
    The project will appear within the “Projects” navigator in the left-hand menu,
    and the `index.html` file for the project will open within the editor. The project
    contains the following nodes: “Web Pages,” “Source Packages,” “Libraries,” and
    “Configuration Files,” as seen in Figure [1-6](#479166_1_En_1_Chapter.xhtml#Fig6).


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig6_HTML.jpg](Images/479166_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Java Web Project Structure


    At this point, the project is ready to be deployed to the designated application
    server, and that can be done by right-clicking on the project and choosing “Run.”
    By selecting “Run,” the designated application server will start and the application
    will be compiled and deployed. The editor that contains the HTML file will provide
    options for editing HTML, and if a CSS or JavaScript file is created, then the
    editor will provide options that are specific to those types of files. Of course,
    all of the features that are available for Java SE projects are also available
    for Java Web projects.


    ## PHP and Other Languages


    Although Apache NetBeans was originally created for the development of Java applications,
    over the years the community has added support for a number of other languages.
    One such language that has outstanding support in Apache NetBeans is PHP. Another
    well-supported language is JavaScript. In Apache NetBeans 10, PHP gained full
    support within the IDE, so features such as multi-catch exception handling, nullable
    types, context sensitive lexer, etc., are available. The code editor contains
    PHP-specific features, such as hints for void return types, hints for incorrect
    non-abstract methods, suggestions for strict types declaration, etc. There is
    also support for an HTML forms palette to aid in development of PHP web forms.


    To create a PHP project, there are a few options placed under the “New Project”
    ➤ “PHP” category. The options are as follows: “PHP Application,” “PHP Application
    with Existing Sources,” and “PHP Application from Remote Server.” The first option
    allows one to create a PHP project from scratch, providing flexibility for debugging
    and running the project. The second option, “PHP Application with Existing Sources,”
    allows one to import an existing PHP project into a standard IDE project and begin
    working with it right away. The third option allows one to download a remote project,
    for which a standard IDE project is created. The third option also automatically
    configures the newly created standard IDE project such that it will automatically
    upload local changes to the remote server.


    ## Maven Support


    The most prevalent build system for Java applications is Apache Maven. Therefore,
    it is no surprise that Apache NetBeans has first-class support for this build
    system. The IDE contains various starter projects that are based upon the Apache
    Maven project format. Any Maven project can be opened in Apache NetBeans IDE,
    and immediately it will be recognized so that development can begin.


    To open an existing Maven project within Apache NetBeans, simply browse to the
    project using the file explorer and open. The IDE will automatically detect the
    language type and open a project utilizing the template that pertains to the selected
    project. For instance, if a Java SE Maven project is opened, then the Java SE
    Apache NetBeans project template will be utilized.


    Using Maven, project dependencies are downloaded and added to the resulting archive
    file when a project is built. Therefore, when the “Build with Dependencies” option
    is utilized in Apache NetBeans, Maven does just that. It is also easy to add dependencies
    to a project by right-clicking the “Dependencies” node within the project navigator
    and selecting “Add Dependency” (Figure [1-7](#479166_1_En_1_Chapter.xhtml#Fig7)).


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig7_HTML.jpg](Images/479166_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Add Maven Dependency


    After clicking the “Add Dependency…” option, the “Add Dependency” dialog appears,
    allowing one to easily search for dependencies found in remote or local Maven
    repositories (Figure [1-8](#479166_1_En_1_Chapter.xhtml#Fig8)). When a dependency
    is added to the project, the associated project POM file is modified to include
    it, so that the user does not have to manually modify the XML.


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig8_HTML.jpg](Images/479166_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Add Dependency dialog


    Other Maven support features include the ability to integrate SureFire tests within
    Maven builds; utilizing Apache Maven as build systems for various project types
    including other JVM languages, ApacheNetBeans plugins, etc.; and easy editing
    of POM files with auto-completion for dependencies.'
