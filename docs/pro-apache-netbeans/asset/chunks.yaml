- fmt: '### Benefits and Features


    One of the benefits of the NetBeans RCP Window System API is that application
    code is completely independent of how its components are rendered onscreen.


    A *Window System*:


    - includes a *window manager* that responds to user actions such as dragging,
    undocking, selecting, grouping, resizing, or minimizing windows to manage work
    space;

    - includes a *persistence mechanism* that “remembers” the layout so that users
    aren’t required to reconfigure the application on each restart;

    - provides a way to specify an application’s window layout and a way to group
    windows that have a common behavior;

    - provides *roles* (or perspectives) based on which you can configure the application’s
    layout (e.g. ‘admin’ role, ‘user’ role, etc.)


    The NetBeans Platform Window System includes a window manager that keeps track
    of an application’s windows, modes, window groups, and roles allowing developers
    to focus on building their business logic instead of reinventing the wheel. You
    can configure it by clicking on **Tools ➤ Options** (or **NetBeans ➤ Preferences**
    on MacOS) ➤ **Appearance** (see Figure [8-1](#479166_1_En_8_Chapter.xhtml#Fig1)).


    ![../images/479166_1_En_8_Chapter/479166_1_En_8_Fig1_HTML.jpg](Images/479166_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Configure Appearance


    While creating the main window of a Swing application, you need to create a `JFrame`.
    To take advantage of the NetBeans Platform Window System, one needs to create
    a `TopComponent`. `TopComponent`, in turn, extends `JComponent` (a Swing-based
    container). With `TopComponent`, all application windows automatically integrate
    into the window system, that is, they are managed by the NetBeans Platform Window
    Manager and support a rich set of window operations. *Documents* are `TopComponent`s
    in the editor mode.


    As shown in Listing [8-1](#479166_1_En_8_Chapter.xhtml#PC1), these annotations
    allow the `TopComponent` to be registered with the Window System. The appearance
    and configuration of the `TopComponent` is also done via these annotations.


    ```

    @ConvertAsProperties(

    dtd = "-//todo.view//Tasks//EN",

    autostore = false

    )

    @TopComponent.Description(

    preferredID = "TasksTopComponent",

    //iconBase="SET/PATH/TO/ICON/HERE",

    persistenceType = TopComponent.PERSISTENCE_ALWAYS

    )

    @TopComponent.Registration(mode = "editor", openAtStartup = true)

    @ActionID(category = "Window", id = "todo.view.TasksTopComponent")

    @ActionReference(path = "Menu/Window" /* , position = 333 */)

    @TopComponent.OpenActionRegistration(

    displayName = "#CTL_TasksAction",

    preferredID = "TasksTopComponent"

    )

    @Messages({

    "CTL_TasksAction=Tasks",

    "CTL_TasksTopComponent=Tasks Window",

    "HINT_TasksTopComponent=This is a Tasks window"

    })

    public final class TasksTopComponent extends TopComponent {

    //...

    Listing 8-1

    Annotations to register a TopComponent to the System FileSystem

    ```


    `@TopComponent.Description` contains three attributes:


    - `iconBase` (defines an optional path to an 16x16 pixels image to be displayed
    in the tab of the `TopComponent`)

    - `preferredID` (unique name or identity of the `TopComponent`)

    - `persistenceType` (can be `PERSISTENCE_ALWAYS`, `PERSISTENCE_NEVER`, or `PERSISTENCE_ONLY_OPENED`);
    whether to store or not the state of the `TopComponent` when the application closes.
    This is done by overriding `writeProperties()` and `readProperties()` methods.


    `@TopComponent.Registration` defines the *mode*, that is, the position where the
    `TopComponent` is to be displayed in the window layout (see Figure [8-2](#479166_1_En_8_Chapter.xhtml#Fig2)).
    Optional element `position` specifies the relative position of a window within
    a mode. That is, if more than one `TopComponent` opens in the same mode, a lower
    position value places the window on the left.


    `@ActionID` defines an action that will open the `TopComponent` when it is closed.
    `@ActionReference` defines the path in the *System FileSystem* (`layer.xml`) where
    the menu is to be defined (in this case, it will be an action under the **Window**
    menu). The `position` attribute defines the position of it in the menu (lower
    number means higher in the menu). You can also specify menu item separators with
    optional elements `separatorBefore` and `separatorAfter`. `@TopComponent.OpenActionRegistration`,
    finally, does exactly this: creates the *Open Action* to open the window.


    ![../images/479166_1_En_8_Chapter/479166_1_En_8_Fig2_HTML.jpg](Images/479166_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Window modes


    The following methods control the life cycle of a `TopComponent`: `open()`, `close()`,
    `requestVisible()`, `requestActive()`, while the following are notification methods
    when the `TopComponent`’s state has changed: `componentOpened()`, `componentClosed()`,
    `componentShowing()`, `componentActivated()`, `componentDeactivated()`, `componentHidden()`.


    ### Lookup


    `TopComponent` implements the `Lookup.Provider` interface, so it has its own `Lookup`.
    Normally, it proxies the Lookups of whatever Nodes are currently selected. The
    `Lookup` of a `TopComponent` is defined in its constructor via its `associateLookup()`
    method, for example (see Listing [8-2](#479166_1_En_8_Chapter.xhtml#PC2)).


    ```

    public final class TasksTopComponent extends TopComponent {

    private InstanceContent ic = new InstanceContent();

    public TasksTopComponent() {

    //...

    associateLookup(new AbstractLookup(ic));

    }

    Listing 8-2

    Create a Lookup for the TopComponent

    ```


    In Listing [8-2](#479166_1_En_8_Chapter.xhtml#PC2), we used a dynamic lookup,
    as explained in the previous chapter, but depending on what you need, you might
    use a static lookup (e.g., a singleton lookup). Whatever you add in the `InstanceContent`
    is being proxied to the *Global Lookup*, a.k.a. `Utilities.actionsGlobalContext()`,
    whenever the `TasksTopComponent` receives the focus.'
