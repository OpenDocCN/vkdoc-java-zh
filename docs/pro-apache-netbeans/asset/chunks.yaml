    ## JavaFX and the NetBeans Platform


    In this section we shall learn how to integrate the NetBeans Platform with JavaFX.
    JavaFX is included in JDK in versions 8–10. From version 11 onward, it is developed
    separately and can be downloaded from Gluon’s website ([`https://gluonhq.com/products/javafx/`](https://gluonhq.com/products/javafx/)).


    Gluon’s *SceneBuilder* ([`https://gluonhq.com/products/scene-builder/`](https://gluonhq.com/products/scene-builder/))
    is also useful if you wish to develop the GUI of your JavaFX application. To integrate
    *SceneBuilder* with NetBeans, follow these steps:


    1.  In NetBeans, navigate to **Tools ➤ Options ➤ Java ➤ JavaFX** (Windows/Linux)
    or to **NetBeans ➤ Preferences ➤ Java ➤ JavaFX** (MacOSX) and click **Activate**
    if JavaFX support is not yet activated.


    2.  After activation is finished, set the *Scene Builder Home* to be the Gluon
    directory (on Mac this should typically be `/Applications/SceneBuilder`). Some
    Windows installers install *SceneBuilder* without asking you for a directory.
    *SceneBuilder* is installed by default in `C:\Program Files\SceneBuilder` or in
    `C:\Users\<YourUser>\AppData\Local\SceneBuilder` in previous versions.


    3.  Click on **OK** and you are ready to start.'
