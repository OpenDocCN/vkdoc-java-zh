    ## 开发 JavaFX 应用程序


    我们也将使用 JavaFX 开发图 4-19 中的*Todo*应用程序。我们将使用集成了 JavaFX 的 JDK，例如 JDK 8 或 10。稍后我们将了解如何使用不带
    JavaFX 的 JDK 开发 JavaFX 应用程序。


    开发 JavaFX 应用程序有两种方式：一种是以编程方式，使用 Java（*JavaFX 应用程序*）；另一种是声明式地，在一种称为 FXML 的特殊 XML
    格式中声明 GUI（*JavaFX FXML 应用程序*）。我们在这里选择第二种方式，这种方式还有一个优点，即你可以使用*SceneBuilder*以图形方式设计
    GUI。


    让我们开始吧。通过单击**文件 ➤ 新建项目**，选择**Java with Ant ➤ JavaFX**类别（如图 4-16 所示），然后单击**下一步**，创建一个新的*JavaFX
    FXML 应用程序*。使用 `TodoFX` 作为项目名称，并选择合适的项目位置（硬盘上的任意位置）。按图 4-34 所示修改对话框中的其余条目。然后单击**完成**。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig35_HTML.jpg](img/479166_1_En_4_Fig35_HTML.jpg)


    图 4-35


    新建 JavaFX 应用程序向导


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig34_HTML.jpg](img/479166_1_En_4_Fig34_HTML.jpg)


