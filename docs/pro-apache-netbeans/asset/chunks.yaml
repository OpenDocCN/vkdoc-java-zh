    Signing and Sharing a Plugin\nOnce a plugin has been created, it can be shared\
    \ with the community\nthrough the Apache NetBeans Plugin Portal. Plugins that\
    \ are made\navailable via the Plugin Portal can be installed by anyone in the\n\
    community. The Plugin Portal is available online using a web browser in\nthe URL\
    \ [`http://netbeans-vm.apache.org/pluginportal/`](http://netbeans-vm.apache.org/pluginportal/),^([⁴](#fn4))\
    \ and it is also accessible\nwithin the Apache NetBeans IDE by choosing “Tools”\
    \ ➤ “Plugins.”\nIn order to share the plugin, it\nmust be signed with a certificate,\
    \ either self-signed or verified by a\ncertificate authority. The signing process\
    \ is much the same as with any\nJava JAR archive that is going to be distributed.\
    \ There are a couple of\ndifferent ways to sign a JAR or NBM file, those being\
    \ manual or by\nintegrating the signing process into a build. In this section,\
    \ we will\ncover incorporating the process into the Maven build.\n\nSigning the\
    \ Project\n\nIt is possible to sign an ANT- or\nMaven-based project for distribution\
    \ using the Java keytool utility to\ncreate a keystore and then updating the build\
    \ file to incorporate the\nkeystore into the build. In this example, the Maven-based\
    \ POM file for\nthe project will be updated to include a generated keystore. To\
    \ begin,\ngenerate a keystore by opening a command line or terminal and traversing\n\
    inside of the project directory. Once in the directory, issue the\nkeytool command\
    \ to generate the keystore.\n\n```\ncd ../path-to-project\nkeytool -genkey -storepass\
    \ your-password -alias your-project-alias -keystore nbproject/private/keystore\n\
    ```\n\nNote\nBe sure to set the keystore and key password to the same value.\n\
    Ensure that the nbproject/private directory is not distributed along\nwith the\
    \ archive or committed to a version control system.\n\nOnce the keystore has been\
    \ generated and saved into a directory such as\nnbproject/private, the project\
    \ POM file can be updated to include the\nnbm-maven-plugin configuration that\
    \ will be required to sign the NBM\nfile when generated. Simply add the following\
    \ configuration to the\nnbm-maven-plugin plugin section.\n\n```\norg.codehaus.mojo\n\
    nbm-maven-plugin\n3.14.1\ntrue\n\nfalse\norg.netbeans.modules.hyperledger\nYour\
    \ Name\nhttps://github.com/mario-s/nb-hyperledger\nnbproject/private/keystore\n\
    your-project-alias\nCreative Commons BY 3.0\nhttps://creativecommons.org/licenses/by/3.0/\n\
    \n```\n\nCreate the NBM\n\nIf you have a single plugin to package for distribution,\
    \ the easiest way\nto create a binary file is to generate an NBM. There are a\
    \ few\nways to create a signed NBM. To begin, if you are not planning to sign\n\
    the NBM so that it can be included in the plugin center, simply generate\nthe\
    \ NBM via Apache NetBeans. To do so, use the following procedure\nwithin Apache\
    \ NetBeans:\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig18_HTML.jpg](Images/479166_1_En_11_Fig18_HTML.jpg)\n\
    \nFigure 11-18\nCreate NBM File for Plugin Distribution\n\n*   Right-click on\
    \ the Hyperledger Support project and choose “Create\n    NBM” (Figure [11-18](#479166_1_En_11_Chapter.xhtml#Fig18)).\
    \ The IDE\n    will compile and package the project into a distributable binary\
    \ NBM\n    file. The file will appear within the project “build” directory once\n\
    \    generated.\n\nTo generate a signed NBM, the Maven build can be completed\
    \ via the\ncommand line or terminal by traversing inside of the project directory\n\
    and issuing the following command:\n\n```\nmvn clean package nbm:nbm -Dkeystorepass=your-password\n\
    ```\n\nOnce the NBM has been signed and packaged, it is ready to be loaded into\n\
    the plugin portal. Use the following steps to upload the plugin to the\nportal.\n\
    \n1.  Upload the plugin to Maven Central using the notes provided by\n    Sonatype\
    \ ([`https://central.sonatype.org/pages/ossrh-guide.html`](https://central.sonatype.org/pages/ossrh-guide.html)).\n\
    \n2.  Create Google account if you do not already have one.\n\n3.  Visit the Apache\
    \ NetBeans Plugin Portal ([`http://netbeans-vm.apache.org/pluginportal/`](http://netbeans-vm.apache.org/pluginportal/))\n\
    \    and use the **sign-in** button in the upper corner to\n    authenticate.\n\
    \n4.  Click the “**Add Plugin**” button within the main\n    menu.\n\n5.  Provide\
    \ the pertinent information (`groupId` and `artifactId` values)\n    for your\
