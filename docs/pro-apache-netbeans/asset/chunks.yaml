    提交代码

    一旦你实现并测试了你的修改，一个好的做法不仅是更新 JIRA 问题，还要向 *dev* 邮件列表发送电子邮件，以通知其他人、获取有用的反馈，并可能找到潜在的测试者。当你确信修改已准备就绪后，向主仓库发起一个拉取请求。


    总结

    在本章中，你学习了如何下载和构建 Apache NetBeans IDE 的源代码。你还了解了 Apache NetBeans IDE（基于 Apache
    NetBeans 平台）各个组件的架构概览，并了解了如何将代码提交回 Apache NetBeans `git` 仓库。

    祝你好运，愿源码与你同在！


