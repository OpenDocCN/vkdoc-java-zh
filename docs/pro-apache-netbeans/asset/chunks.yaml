- fmt: "# Syntax Highlighting\n\nThe language support contains a lexer and a parser.\
    \ The `lexer` takes the source and converts it into tokens. The `parser` creates\
    \ a syntax tree based on those tokens. There are several tools available to create\
    \ a lexer/parser, but in this tutorial, we will use `ANTLR`. There is plenty of\
    \ documentation available about `ANTLR`, so it should be relatively easy to get\
    \ yourself on track when you write new grammar.\n\nFor this highlighting, we use\
    \ the `lexer` only. So, we need the lexer grammar file. This file contains the\
    \ tokens that are specific for the language. You can copy the file `CtoLexer.g4`\
    \ from the `ANTLR` grammar repository: [`https://github.com/antlr/grammars-v4/tree/master/cto`](https://github.com/antlr/grammars-v4/tree/master/cto).\
    \ It’s advisable to place the file in a subdirectory of the resource folder in\
    \ you project, for example, `org.netbeans.modules.hyperledger.cto.grammar`.\n\n\
    We also need to adapt the Maven `pom.xml`. Add the `ANTLR` plugin to the build\
    \ section, and the `ANTLR` runtime and NetBeans’ Lexer API to the dependency section.\
    \ The version of the plugin should match the version of the `ANTLR` dependency.\
    \ The following snippet shows the `ANTLR` plugin and runtime dependencies in the\
    \ `pom.xml`.\n\n```\n...\n<plugin>\n    <groupId>org.antlr</groupId>\n    <artifactId>antlr4-maven-plugin</artifactId>\n\
    \    <version>${antlr.version}</version>\n    <executions>\n        <execution>\n\
    \            <goals>\n                <goal>antlr</goal>\n            </goals>\n\
    \        </execution>\n    </executions>\n</plugin>\n...\n\n<dependency>\n   \
    \ <groupId>org.antlr</groupId>\n    <artifactId>antlr4-runtime</artifactId>\n\
    \    <version>${antlr.version}</version>\n</dependency>\n<dependency>\n    <groupId>org.netbeans.api</groupId>\n\
    \    <artifactId>org-netbeans-modules-lexer</artifactId>\n    <version>${netbeans.version}</version>\n\
    </dependency>\n...\n```\n\nAfter a successful build, we will have a `CtoLexer.java`\
    \ in `target/generated-sources`.\n\nNext, we need to set up a service that provides\
    \ the language. Therefore, we will create a new class `CtoLanguageProvider`, which\
    \ extends the `LanguageProvider` from NetBeans:\n\n```\n...\n@ServiceProvider(service=LanguageProvider.class)\n\
    public class CtoLanguageProvider extends LanguageProvider{\n    private final\
    \ Supplier<Language> supplier = () -> new CtoLanguageHierarchy().language();\n\
    \    @Override\n    public Language findLanguage(String mime) {\n        return\
    \ (FileType.MIME.equals(mime)) ? supplier.get() : null;\n    }\n    @Override\n\
    \    public LanguageEmbedding findLanguageEmbedding(Token token,\n           \
    \ LanguagePath lp, InputAttributes ia) {\n        return null;\n    }\n}\n```\n\
    \nThe class `CtoLanguageHierarchy` is a definition of the cto language. The method\
    \ `createTokenIds` will return all tokens, based on the `ANTLR` grammar file.\
    \ It also provides an implementation of the `Lexer` interface, which is a mapping\
    \ for characters, read from an input to the cto tokens.\n\n```\n...\npublic class\
    \ CtoLanguageHierarchy extends LanguageHierarchy {\n    private final List<CtoTokenId>\
    \ tokens;\n    private final Map<Integer, CtoTokenId> idToToken;\n    public CtoLanguageHierarchy()\
    \ {\n        tokens = TokenTaxonomy.getDefault().allTokens();\n        idToToken\
    \ = TokenTaxonomy.getDefault().getIdTokenMap();\n    }\n    @Override\n    protected\
    \ Collection<CtoTokenId> createTokenIds() {\n        return tokens;\n    }\n \
    \   @Override\n    protected Lexer createLexer(LexerRestartInfo info) {\n    \
    \    return new CtoEditorLexer(info, idToToken);\n    }\n    @Override\n    protected\
    \ String mimeType() {\n        return FileType.MIME;\n    }\n}\n```\n\nThe `TokenTaxonomy`\
    \ provides a classification for the tokens, so that we can later on choose a different\
    \ styling for a group of tokens.\n\n```\npublic enum TokenTaxonomy {\n    INSTANCE;\n\
    \    private final List<CtoTokenId> tokens;\n    private TokenTaxonomy() {\n \
    \       tokens = new ArrayList();\n        int max = CtoLexer.VOCABULARY.getMaxTokenType()\
    \ + 1;\n        for (int i = 1; i < max; i++) {\n            Function<Integer,\
    \ String> mapping = t -> {\n                if (t < 0) return \"\";\n        \
    \        return NameMapping.map(t);\n            };\n            String name =\
    \ mapping.apply(i);\n            if (!name.isEmpty()) {\n                tokens.add(new\
    \ CtoTokenId(name, Category.TEXT.name(), i));\n            }\n        }\n    }\n\
    \    public List<CtoTokenId> allTokens() {\n        return tokens;\n    }\n  \
    \  public List<CtoTokenId> tokens(Category category) {\n        return tokens.stream().filter(t\
    \ -> category.name().equals(t.primaryCategory())).collect(toList());\n    }\n\
    \    public Map<Integer, CtoTokenId> getIdTokenMap() {\n        return tokens.stream().collect(toMap(CtoTokenId::ordinal,\
    \ t -> t));\n    }\n}\n```\n\nThe category itself is just another `enum` used\
    \ for the grouping:\n\n```\npublic enum Category {\n    KEYWORD, TYPE, FIELD,\
    \ SEPARATOR, VALUE, COMMENT, TEXT;\n}\n```\n\nThe `NameMapping` interface uses\
    \ a static method to map an `int` to a `String`, using the `CtoLexer.VOCABULARY`\
    \ under the hood. The vocabulary contains some characters that we want to avoid\
    \ later on; therefore, the method `map` removes unwanted characters from the string.\n\
    \n```\npublic interface NameMapping {\n    public static String map(int type)\
    \ {\n        String name = CtoLexer.VOCABULARY.getDisplayName(tokenType);\n  \
    \      return name.replaceAll(\"^\\\\'|\\\\'$\", \"\");\n    }\n}\n```\n\nThe\
    \ class `CtoTokenId` is a very simple implementation of the interface `org.netbeans.api.lexer.TokenId`\
    \ from NetBeans’ Lexer API.\n\n```\npublic class CtoTokenId implements TokenId{\n\
    \    private final String name;\n    private final String primaryCategory;\n \
    \   private final int id;\n    public CtoTokenId(String name, String primaryCategory,\
    \ int id) {\n        this.name = name;\n        this.primaryCategory = primaryCategory;\n\
    \        this.id = id;\n    }\n    @Override\n    public String name() {\n   \
    \     return name;\n    }\n    @Override\n    public int ordinal() {\n       \
    \ return id;\n    }\n    @Override\n    public String primaryCategory() {\n  \
    \      return primaryCategory;\n    }\n}\n```\n\nThe class `CtoEditorLexer` is\
    \ the connection between the Lexer API and `ANTLR`. It converts an `ANTLR` token\
    \ to the `CtoTokenId`. As you can see, the mapping from an id to a token is passed\
    \ to the constructor. We will provide a second constructor that is used for test\
    \ purposes. This way we can easily use a mock to supply a token during testing.\n\
    \n```\npublic final class CtoEditorLexer implements Lexer {\n    private final\
    \ LexerRestartInfo info;\n    private final Map<Integer, CtoTokenId> idToToken;\n\
    \    private final Function<CtoTokenId, Token> tokenFactory;\n    private final\
    \ Supplier<org.antlr.v4.runtime.Token> tokenSupplier;\n    public CtoEditorLexer(LexerRestartInfo\
    \ info, Map<Integer, CtoTokenId> idToToken) {\n        this(info, idToToken, new\
    \ TokenSupplier(info.input()));\n    }\n    CtoEditorLexer(LexerRestartInfo info,\
    \ Map<Integer, CtoTokenId> idToToken,\n            Supplier<org.antlr.v4.runtime.Token>\
    \ tokenSupplier) {\n        this.info = info;\n        this.idToToken = idToToken;\n\
    \        this.tokenSupplier = tokenSupplier;\n        this.tokenFactory = id ->\
    \ info.tokenFactory().createToken(id);\n    }\n    @Override\n    public Token\
    \ nextToken() {\n        Token createdToken = null;\n        org.antlr.v4.runtime.Token\
    \ token = tokenSupplier.get();\n        int type = token.getType();\n        if\
    \ (type != -1) {\n            createdToken = createToken(type);\n        } else\
    \ if (info.input().readLength() > 0) {\n            createdToken = createToken(CtoLexer.WS);\n\
    \        }\n        return createdToken;\n    }\n    private Token createToken(int\
    \ type) {\n        Function<Integer, CtoTokenId> mapping = idToToken::get;\n \
    \       return mapping.andThen(tokenFactory).apply(type);\n    }\n    @Override\n\
    \    public Object state() {\n        return null;\n    }\n    @Override\n   \
    \ public void release() {\n        //nothing todo\n    }\n    private static class\
    \ TokenSupplier implements Supplier<org.antlr.v4.runtime.Token> {\n        private\
    \ final CtoLexer lexer;\n        TokenSupplier(LexerInput input) {\n         \
    \   CharStream stream = new LexerCharStream(input);\n            lexer = new CtoLexer(stream);\n\
    \        }\n        @Override\n        public org.antlr.v4.runtime.Token get()\
    \ {\n            return lexer.nextToken();\n        }\n    }\n}\n```\n\nWe need\
    \ a way to feed the platform’s input into the `CtoLexer`, which was generated\
    \ by `ANTLR`. This lexer accepts an interface of `org.antlr.v4.runtime.CharStream`,\
    \ so let’s implement it. The following source is based on the `org.antlr.v4.runtime.ANTLRInputStream`."
