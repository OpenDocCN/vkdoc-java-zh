    `DataObject`. Finally, we started applying what we have learned by porting a Swing
    application to NetBeans RCP.


    Footnotes [1](#479166_1_En_7_Chapter.xhtml#Fn1_source)   [2](#479166_1_En_7_Chapter.xhtml#Fn2_source)


    # 8. Mastering the User Interface


    In this chapter we will look at the *GUI* components of the NetBeans Rich Client
    Platform:


    *   The **Window System**: is for your application what the Window Manager is
    for an operating system. A window system allows organizing the windows of your
    application workspace (by dragging, undocking, selecting, minimizing, or even
    grouping windows). It also has a persistence mechanism to save the state of the
    windows in order to be available in the same location and size on application
    restart. It also allows you to assign roles to different window configurations.


    *   The **Action System**: built on top of Swing `ActionListener` interface and
    `Action` class, allows you to concentrate on your business logic without worrying
    about presentation and enablement of the actions. Context-sensitive actions and
    capabilities allow you to create loosely coupled, modular applications.


    *   The **Node System**: Nodes are a data wrapper that allows data to be visualized
    in a number of Explorer Views and Property Sheets.


    *   The **Explorer Views and Property Sheets**: are the actual UI components,
    built on top of Swing UI components –the render nodes. You may choose from a number
    of UI components to display trees, tables, lists, images, etc. We shall also see
    alternatives like how to integrate JavaFX to the Window system as well as using
    the new HTML/JAVA UI instead of the Explorer Views and Property Sheets.


    ## Window System


    In Chapter [2](#479166_1_En_2_Chapter.xhtml) we saw that NetBeans IDE supports
    a number of windows that shape the layout. The IDE’s windowing system enables
    you to arrange any window the way you like by dragging and dropping it to the
    appropriate position (see Figure [2-1](#479166_1_En_2_Chapter.xhtml#Fig1)). You
    can also minimize, maximize, float, or dock a window.


    The NetBeans IDE is a very good example of what the NetBeans Window System API
    can offer: pluggable multiple windows that can be arranged logically in a container,
    window state (open/closed, selected/unselected, activated/deactivated), etc.


    Neither Swing nor JavaFX offers a framework with window management features. Developers
    can, of course, build a window management system themselves, but it takes a tremendous
    effort to create such a system. The NetBeans Platform Window System provides this
    functionality in the form of annotations.'
