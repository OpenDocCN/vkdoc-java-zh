  trans: '

    11. 为 NetBeans 编写插件


    Apache NetBeans 是一个模块化 IDE，因此具有极强的可扩展性。不仅扩展 IDE 本身很容易，而且利用 NetBeans 平台开发完整的富桌面应用程序也非常简单。在本章中，我们将讨论如何构建模块（即“插件”），以便扩展
    IDE 以包含新功能。例如，新的编程语言层出不穷，通过开发新插件来扩展 Apache NetBeans 以支持新语言是很容易的。


    模块通常作为插件添加到 IDE 中。在 Apache NetBeans 中，**插件**菜单允许用户管理机器上可用、已安装或已下载的模块，以便加载或卸载它们，从而影响
    Apache NetBeans 的外观或功能。有一个在线门户网站（[`https://netbeans.apache.org/plugins/index.html`](https://netbeans.apache.org/plugins/index.html)），其中包含由社区开发的插件。用户可以访问该门户网站搜索可下载的插件。如果你开发了一个插件，可以将其发布到插件门户网站上供所有人使用。


    在本章中，我们将通过一个教程来学习如何为 NetBeans 创建插件。我们将重点介绍一个区块链用例。请参考本书的源代码仓库作为参考。


    插件的用途


    我们将为区块链实现创建一个 NetBeans 插件。除了支持从头开始设置一个新的区块链项目外，你还将学习如何创建支持新语言的功能：


    *   识别模型文件

    *   语法高亮

    *   错误检测

    *   代码补全

    *   模型文件的导航视图


    你还将了解如何对插件进行签名，并与其他 NetBeans 用户共享。


    区块链简介

    区块链是一个去中心化的点对点网络。该网络的每个参与者都拥有一份共享账本的副本，数据只能通过数字签名的交易进行追加。区块链保证了账本的不可篡改性。


    一个区块包含一定数量的交易和一些元数据。交易和区块都是唯一的，通过哈希值进行标识。该区块还包含按时间顺序排列的前一个区块的哈希值。链中的第一个区块没有前驱，被称为创世区块。这些区块共同构成了区块链。图
    11-1 展示了两个区块及其哈希值，以及前一个区块的哈希值。


    ![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig1_HTML.jpg](img/479166_1_En_11_Fig1_HTML.jpg)


    图 11-1 区块在区块链中的连接方式


    区块链可以分为*公有链*和*私有链*。公有链的一个典型例子是*以太坊*。公有链内置了*工作量证明*或*权益证明*等机制，以防止欺诈行为。私有链的一个例子是*超级账本*。这个开源项目由
    Linux 基金会托管，旨在推动区块链技术的发展。“私有”一词意味着对网络的访问是受限的。每个节点都必须进行身份验证，因此无需采用上述机制来防范欺诈攻击，敏感信息也保留在网络内部。如果你想深入了解超级账本，请访问网站
    [`www.hyperledger.org`](http://www.hyperledger.org)。


    当作者开始编写本书时，设置新*超级账本*项目的推荐方式是使用*Composer*：[`https://hyperledger.github.io/composer/latest/`](https://hyperledger.github.io/composer/latest/)。一个超级账本项目包含一个模型文件，该文件使用*超级账本
    Composer 语言*编写。这些文件以 `cto` 后缀结尾，在本章中我们将它们称为 cto 文件。该语言定义了业务网络中使用的资源：


    *   **资产：** 代表一个有价值的对象，例如，一栋房子；

    '
- fmt: '- `participant`: 代表参与业务的各方；


    - `transaction`: 由参与者提交，是一种影响资产的状态变更；


    - `enum`: 值的集合，类似于 Java 中的枚举；


    - `event`: 可以从交易函数中发出，应用程序可以订阅事件。


    该语言为资源中的字段声明提供了一组原始类型：


    - `Boolean`: 布尔值，`true` 或 `false`；


    - `String`: UTF8 编码的字符串；


    - `Integer`: 32 位有符号数；


    - `Long`: 64 位有符号数；


    - `Double`: 双精度 64 位数值；


    - `DateTime`: ISO-8601 兼容的时间实例，可包含时区和 UTC 偏移量。


    Hyperledger Composer 语言不定义交易的规则；该逻辑位于另一个用 JavaScript 编写的文件中。


    ## 准备 Hyperledger


    为了正常使用 Hyperledger，我们需要安装一些工具。请确保您的机器满足先决条件，详见[`https://hyperledger.github.io/composer/latest/installing/installing-prereqs.html`](https://hyperledger.github.io/composer/latest/installing/installing-prereqs.html)。安装
    VSCode 的部分可以跳过，因为我们正在开发自己的编辑器。


    完成这些步骤后，请全局安装 Hyperledger Composer 命令行工具、应用程序生成器和 Yeoman：


    ```

    npm install -g composer-cli@0.20

    npm install -g generator-hyperledger-composer@0.20

    npm install -g yo

    ```


    您还应该安装 Hyperledger Composer Playground，它提供了用于配置、部署和测试业务网络的用户界面。


    ```

    npm install -g composer-playground@0.20

    ```


    Hyperledger Fabric 是业务网络的运行时。有脚本可以安装此运行时。下载到您选择的目录：


    ```

    mkdir ~/fabric-dev-servers && cd ~/fabric-dev-servers

    curl -O https://raw.githubusercontent.com/hyperledger/composer-tools/master/packages/fabric-dev-servers/fabric-dev-servers.tar.gz

    tar -xvf fabric-dev-servers.tar.gz

    ```


    执行以下命令：


    ```

    export FABRIC_VERSION=hlfv12

    ./downloadFabric.sh

    ```


    您已完成 Hyperledger 环境的准备工作。更多详情，请参阅安装说明：[`https://hyperledger.github.io/composer/latest/installing/development-tools.html`](https://hyperledger.github.io/composer/latest/installing/development-tools.html)。


    让我们在控制台中使用 Yeoman 创建一个新的骨架业务网络。该业务网络将在插件开发过程中使用。


    ```

    yo hyperledger-composer:businessnetwork

    ? Business network name: ledger

    ? Description: sample

    ? Author name: admin

    ? Author email: admin@web.org

    ? License: Apache-2.0

    ? Namespace: org.example.biznet

    ? Do you want to generate an empty template network? No: generate a populated
    sample network

    create package.json

    create README.md

    create models/org.example.biznet.cto

    create permissions.acl

    create .eslintrc.yml

    create features/sample.feature

    create features/support/index.js

    create test/logic.js

    create lib/logic.js

    ```


    ## 创建新模块


    底层我们使用 Maven 作为构建工具。通过以下步骤启动一个新模块：“文件” ➤ “新建项目” ➤ “Java with Maven” ➤ “NetBeans
    模块”。图 [11-2](#479166_1_En_11_Chapter.xhtml#Fig2) 显示了 NetBeans 的项目向导。


    ![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig2_HTML.jpg](Images/479166_1_En_11_Fig2_HTML.jpg)


    **图 11-2** 使用 Maven 创建新 NetBeans 模块的向导


    接下来，为您的项目取一个有意义的名称，例如 `ledger`，然后选择目标平台，可以从 `RELEASE82` 开始。点击“完成”以完成操作。


    我们将添加测试依赖项。选择项目节点“测试依赖项”，右键单击，然后选择“添加依赖项”。这将弹出对话框，如图 [11-3](#479166_1_En_11_Chapter.xhtml#Fig3)
    所示。'
