- fmt: '# About the Authors and About the Technical Reviewer


    ## About the Authors


    ## About the Technical Reviewer


    # Part I: Using Apache NetBeans


    # 1. What Is Apache NetBeans


    It isn’t often that a technology sweeps the world and ends up being a relevant
    piece of the technological universe for over 20 years. However, the Java language
    is one of the few that has. The Java programming language was originally developed
    in 1995 by Sun Microsystems, and it has grown into a massive ecosystem over the
    years. The Java Virtual Machine (`JVM`) is a virtual computer that is defined
    by a specification, and the Java programming language can be used to program applications
    that run on the `JVM`. A `JVM` can be installed on just about any computer or
    hardware device that is available on the market. As such, the `JVM` is installed
    on millions of devices worldwide, and there have been dozens of different programming
    languages built on top of the `JVM` that compile down to Java byte code, allowing
    developers to utilize different language syntax to run on the `JVM`. What does
    this mean? Well, frankly it means that the `JVM` and Java are everywhere, and
    one can use a multitude of languages to program applications that will run just
    about anywhere. Java is an ecosystem that started in 1995, and it will be around
    long into the future.


    As developers on one of the most prominent development platforms, folks can develop
    applications in a number of different ways. It is possible to develop Java code
    in a text editor, compile and run it via a terminal using the `java` executable,
    and then be on your way. It is also possible to create libraries of files and
    projects all via the terminal, without the use of any specialized tools for development.
    However, although it can be done, development without a code editor or a “development
    environment” including a project-based system, can be cumbersome, and Apache NetBeans
    is one of the most popular development environments for the Java Platform that
    helps to make development easy. Although Apache NetBeans is a great development
    tool, it is much more than just an editor. Apache NetBeans is a comprehensive
    development tool with support for several languages; it is a development platform
    for creating rich client applications; and it is a vibrant open source community
    with members from around the globe.


    ## The Journey to Apache NetBeans


    In 1996, a student project was started under the guidance of the Faculty of Mathematics
    and Physics at Charles University in Prague. This student project aimed to make
    the development of Java much easier, providing a syntax editor for the code that
    would help to reduce errors and speed up development time when programming. It
    allowed one to compile and build entire projects with just a few clicks of a button.
    This project was originally named Xelfi, and in 1997 a company was formed around
    the project and it was renamed to NetBeans IDE. Sun Microsystems liked the project
    so much, that they purchased it in 1999 and open sourced the NetBeans IDE a year
    later.


    After Sun Microsystems purchased Apache NetBeans, the user base and community
    began to thrive. Primarily developed and maintained by Sun Microsystems at the
    time, the community was able to provide patches, enhancements, and so forth since
    the IDE was open source. However, the overall road map and direction of NetBeans
    was controlled by the commercial entity. That wasn’t necessarily a bad thing,
    as it helped to foster the IDE and the Java ecosystem as a whole, since NetBeans
    was being targeted toward both beginners and experienced Java developers alike.


    NetBeans was part of the portfolio that Oracle had purchased from Sun Microsystems
    in January of 2010. As part of that portfolio, Oracle strived to drive NetBeans
    forward as the first IDE that would support the latest features of Java SE and
    Java EE alike. Oracle also strove to make NetBeans an IDE for many languages;
    they even hired Python and Ruby developers to help foster the JVM counterparts
    of those languages, Jython and JRuby respectively. As part of that initiative,
    NetBeans IDE gained support for these languages via the use of separately installed
    NetBeans modules. Since NetBeans was developed as a modular IDE, it was easy to
    add functionality as time went on, without increasing the footprint of the core
    IDE.


    Oracle did a great job of moving NetBeans forward: it was still an open source
    IDE, and the community also played an important role. However, Oracle still drove
    the road map, and it was not very straight forward to become involved contributing
    code to NetBeans under the Oracle open source process. The NetBeans community
    has developed conferences organized around the IDE. Many have developed modules
    to extend the IDE. Even more have given talks or written tutorials about NetBeans
    features. The next step in the evolution of the IDE was to make contribution easier,
    and to give the IDE road map and sources to the community.


    Oracle donated the NetBeans IDE sources and tutorials to Apache in the fall of
    2016. Even though Oracle donated the IDE to Apache, it still remains very much
    involved in the development of Apache NetBeans, but the community now controls
    the road map. Contributing to Apache NetBeans is now as easy as creating a GitHub
    Pull Request. Since the donation, Apache NetBeans has changed its release cadence
    so that its releases are now more closely targeting the Java release cycle. Apache
    NetBeans still continues to be the first IDE to support the latest flavors of
    the JDK, and the community is as vibrant as ever.


    ## Installing Apache NetBeans


    There are a couple of different ways to install Apache NetBeans onto your machine,
    depending upon your uses. For those who are interested in modifying Apache NetBeans,
    the IDE can be built from source after cloning the Git repository. For those who
    are simply interested in utilizing Apache NetBeans as a development tool, the
    archive can be downloaded and extracted, and then the executable can be invoked.
    This section will briefly explain how to install by extracting Apache NetBeans.
    If you are interested in building from source, please refer to Chapter [14](#479166_1_En_14_Chapter.xhtml).


    The initial requirement for utilization of Apache NetBeans is the installation
    of a Java Development Kit. Apache NetBeans supports JDK 8 and 11. The JDK must
    be installed in order to build the IDE from source or to run the IDE. To download
    Apache NetBeans, visit the downloads area at [https://netbeans.apache.org/download/](https://netbeans.apache.org/download/)
    and obtain the most recent release. The downloads page includes links to obtain
    the sources or binaries for each of the releases. It also contains information
    about building the IDE from source. To download the binaries, click on the “Binaries”
    link, and then the “Apache Download Mirrors” page will be displayed. Choose a
    download mirror and click to obtain the archive.


    Once the archive has been downloaded, extract within a folder. The extracted archive
    should resemble that in Figure [1-1](#479166_1_En_1_Chapter.xhtml#Fig1). The executable
    is contained within the `bin` directory.


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig1_HTML.jpg](Images/479166_1_En_1_Fig1_HTML.jpg)


    **Figure 1-1** Apache NetBeans Installation


    If more than one Java installation exists, edit the `etc/netbeans.conf` file accordingly
    and add the `JAVA_HOME` that should be used for running Apache NetBeans. To run
    Apache NetBeans, double-click the executable for the corresponding workstation’s
    platform, which resides within the `bin` directory.


    ### Note


    To learn how to build Apache NetBeans from source, please refer to Chapter [14](#479166_1_En_14_Chapter.xhtml).'
