- fmt: '### Note


    I use a convention to name the various widgets, called the *Hungarian notation*,
    which you are free to follow or not. In front of every widget’s variable name,
    I add three letters that describe the widget. For example, I use `btn` for buttons,
    `lbl` for labels, `tbl` for tables, etc. As you can see in Figure [4-24](#479166_1_En_4_Chapter.xhtml#Fig24),
    I have named the first button as `btnAddTask`.


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig24_HTML.jpg](Images/479166_1_En_4_Fig24_HTML.jpg)


    Figure 4-24


    Icon property editor


    NetBeans also provides a customizer to define the `JTable`’s model property. Make
    sure to select the `JTable` widget from the *Navigator* window (and not the `JScrollPane`)
    and click on the … button of its *model* property. The dialog box of Figure [4-25](#479166_1_En_4_Chapter.xhtml#Fig25)
    appears. I have edited the columns to look like the application we wish to develop.
    However, this customization is only useful for prototyping, as in the real application
    the model will be created from real (`Task`) objects. Typically, the customization
    of `JTable`s will require the development of custom Java classes like cell renderers
    and editors, column models, etc.


    Finally, we need a menu bar. Go on and drag a *Menu Bar* widget from the palette
    on the top of the form. Use the *Navigator* window or click directly on the Menu
    Bar on the GUI designer to add the menus, as shown in Figure [4-26](#479166_1_En_4_Chapter.xhtml#Fig26)
    (left as an exercise to the reader). You can choose between `JMenuItem`, `JCheckBoxMenuItem`,
    `JRadioButtonMenuItem`, `JMenu`, and `JSeparator`. You can also add *mnemonic*s
    by setting this property for the menu item (and/or the *accelerator* property).
    The *accelerator* is a key stroke that calls the action directly (e.g., `F11`
    key in Figure [4-26](#479166_1_En_4_Chapter.xhtml#Fig26)). The *mnemonic* is a
    key stroke that accesses the menu item using the keyboard in combination with
    the `Alt` key. For example, you can access the `File` menu (not the underlying
    `F`) by pressing `Alt+F`.


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig26_HTML.jpg](Images/479166_1_En_4_Fig26_HTML.jpg)


    Figure 4-26


    Complete menus for the TasksWindow form


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig25_HTML.jpg](Images/479166_1_En_4_Fig25_HTML.jpg)


    Figure 4-25


    JTable model customizer


    Click outside the form in *Design* view, then select the `[JFrame]` tree node
    (under *Form TasksWindow* tree) from the *Navigator* window, and change its *title*
    property to `TasksWindow`. You may also define an icon image to be used when the
    window is minimized (click on the *iconimage* property, click the **…** button
    and add a line like this):


    ```

    new javax.swing.ImageIcon(getClass().getResource(

    "/icons/addtsk_tsk.gif")).getImage()).

    ```


    Click on the **Preview** button of the GUI designer’s toolbar (Figure [4-7](#479166_1_En_4_Chapter.xhtml#Fig7))
    in order to view how the `TasksWindow` will behave during runtime (see Figure
    [4-27](#479166_1_En_4_Chapter.xhtml#Fig27)). You can navigate the menus, interact
    with the `JTable`; the Preview is quite powerful.


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig27_HTML.jpg](Images/479166_1_En_4_Fig27_HTML.jpg)


    Figure 4-27


    The TasksWindow in Preview


    ### Design the Task Details Dialog


    According to Figure [4-19](#479166_1_En_4_Chapter.xhtml#Fig19), there is a dialog
    to create/edit tasks. Right-click the `todo.view` package and select **New ➤ Other**.
    Select the **Swing GUI Forms** category and the **JDialog Form** file type (see
    Figure [4-4](#479166_1_En_4_Chapter.xhtml#Fig4)). Provide the class name `TaskDetailsDialog`
    and press **Finish**.


    Add a `JLabel` attached to the left, top, and right borders of the dialog, with
    no spacing; it will serve as a message area for validation errors and the like.
    Rename it to `lblMessageArea` (right-click it in the *Design* view, then select
    **Change Variable Name** from the pop-up menu) and set its *opaque* property and
    the *background* color so that it looks like a band at the top of the dialog.
    Also add an `EmptyBorder` (*border* property) so there’s empty space around the
    text and the band’s borders.


    Next add three `JLabel`s for the *description*, *priority,* and *due date* fields
    (edit the text labels to *Description*, *Priority,* and *Due Date* respectively
    and rename the variables to `lblDescription`, `lblPriority`, `lblDueDate` respectively).
    Attach all three to the left of the `JDialog` internal area (the drawing area).
    Leave some spacing between the components and the border. Resize the two shorter
    labels to attach their right borders to the right border of the larger one. Then
    select the three labels (with `Shift + click`) and change the *horizontalAlignment*
    property to `RIGHT`.


    Then add a `JTextField` next to the *Description* label (rename it to `txtDescription`)
    and a `JSpinner` (rename it to `spPriority`) next to the *Priority* label. Make
    sure that the guidelines keep the label and the field baseline aligned. The `JSpinner`
    does not provide any property to set a preferred or minimum width, while the `JTextField`
    uses the *column* property for this. However, you can resize the `JSpinner` and
    Matisse will set the component’s preferred size in pixels.'
