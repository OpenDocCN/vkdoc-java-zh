    ### 注意


    如果 NetBeans 提示“*所选位置...不代表有效的 Java FX Scene Builder 安装*”，请执行以下变通方法。


    1.  导航到 *SceneBuilder* 的安装目录，

    2.  进入 `app` 文件夹，

    3.  在同一文件夹中，将 `SceneBuilder.cfg` 复制一份并重命名为 `SceneBuilder.properties`。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig18_HTML.jpg](img/479166_1_En_4_Fig18_HTML.jpg)


    图 4-18


    Gluon SceneBuilder


    ## 开发 Swing 应用程序


    我们将为个人信息管理器（PIM）桌面应用程序开发图形用户界面，该程序允许您组织任务。此应用程序将在第 2 部分中进一步开发。*Todo* 应用程序由一个任务列表主窗口和一个任务编辑对话框组成。两者的粗略草图如图
    4-19 所示。我们将使用 Swing 构建 *Todo* 应用程序的动态原型。在下一节中，我们将使用 JavaFX 重新构建该动态原型。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig19_HTML.jpg](img/479166_1_En_4_Fig19_HTML.jpg)


    图 4-19


    Todo 应用程序用户界面草图（左侧为主任务列表窗口，右侧为任务编辑表单）


    在 NetBeans 中，通过选择 **文件 ➤ 新建项目** 菜单项，创建一个新的 Java 应用程序，如图 4-20 所示。在向导的步骤 2 中，提供
    `Todo` 作为项目名称，并选择合适的项目位置（硬盘上的任意位置），如图 4-21 所示。然后点击 **完成**。Apache NetBeans 会创建一个项目，其中包含一个以项目名称命名的
    Java 包，以及位于 `todo` 包内的一个名为 `Main` 的类。


    ### 设计主任务列表窗口


    右键单击 `todo` 包，从弹出菜单中选择 **新建 ➤ Java 包**，并指定包名为 `todo.view`，以创建一个新包。


    现在，右键单击 `todo.view` 包图标，选择 **新建 ➤ 其他**（或从主菜单中选择 **文件 ➤ 新建文件**），然后选择 *Swing GUI
    窗体* 类别和 *JFrame 窗体* 文件类型（见图 4-4），并点击 **下一步**。


    在向导的下一步中，输入 `TasksWindow` 作为类名，然后按 **完成**。IDE 将打开可视化窗体编辑器，如图 4-1 所示；同时请注意 *项目*、*导航器*
    和 *属性* 窗口的位置，以及 *组件面板* 和 *编辑器* 区域。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig21_HTML.jpg](img/479166_1_En_4_Fig21_HTML.jpg)


    图 4-21


    在向导的步骤 2 中，提供项目名称和位置


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig20_HTML.jpg](img/479166_1_En_4_Fig20_HTML.jpg)


    图 4-20


    创建一个新的 Java 应用程序项目


    一个橙色框会高亮显示选中的组件（图 4-1 中的 `JFrame` 内容面板）。*导航器* 会显示 `JFrame` 的所有可视和不可视组件，当您需要更改被其他组件隐藏或太小而无法在*编辑器*中选中的组件的属性时，这非常方便。在右侧，您可以看到*组件面板*（默认显示标准
    Swing 组件，您也可以通过右键单击并选择*面板管理器*来添加第三方 JavaBeans）以及*属性*窗口。*属性* 按类别分类，以便于访问最常用的属性，已更改的属性其名称会以粗体高亮显示。


    让我们创建原型的图形用户界面。从组件面板中，将*工具栏*图标拖放到 `JFrame` 上。您会注意到工具栏的占位符会跟随鼠标指针，并且当它靠近 `JFrame`
    的边缘时，可视化编辑器会显示对齐线，如图 4-22 所示。这些对齐线有助于您在容器内保持控件的对齐和间距。Matisse 会生成布局约束，以便在调整容器大小或更改*外观和风格*（L&F）时保持每个组件的位置。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig22_HTML.jpg](img/479166_1_En_4_Fig22_HTML.jpg)


    图 4-22


    可视化对齐线有助于在可视化编辑器中定位和调整控件大小


    将工具栏移动到 `JFrame` 的左上角，然后拖动其右边框，使其附着到 `JFrame` 的右边框，从而填满窗口的整个顶部区域（见图 4-23）。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig23_HTML.jpg](img/479166_1_En_4_Fig23_HTML.jpg)


    图 4-23


    定位并调整工具栏大小


    重复此过程，在 `JFrame` 底部插入一个 `JLabel`。此标签将用作任务窗口的*状态栏*。然后添加一个 `JScrollPane`，填充 `JToolbar`
    和 `JLabel` 之间的区域。


    现在尝试调整 `JFrame` 内容面板的大小。`JToolbar`、`JLabel` 和 `JScrollPane` 应会调整大小，以保持其边框附着在 `JFrame`
    的角落以及彼此之间的边框上。


    您可以通过在*导航器*窗口中右键单击每个小部件，并从弹出菜单中选择**更改变量名**，为各个小部件的变量赋予更具描述性的名称。在同一上下文菜单中，您可以通过选择**编辑文本**操作来修改小部件显示的文本。


    接下来，让我们在 `JScrollPane` 内部添加一个 `JTable`，并创建工具栏按钮，以使 `TasksWindow` 开始类似于图 4-19 的草图。


    您可以使用本书源代码附带的图标。将 `icons` 文件夹复制到 *Todo* 项目的*源包*内。


    *源包*文件夹中的非 Java 文件将由 Apache NetBeans 添加到最终生成的应用程序 `jar` 文件中（该文件将创建在 `dist` 文件夹内），并且应用程序可以将其作为*类路径*资源进行引用，无论该
    jar 文件安装在用户机器的哪个位置。额外的好处是，应用程序代码无需担心特定于平台的细节，如路径分隔符和驱动器号。


    要向工具栏添加按钮，请将其从组件面板拖到工具栏上。清除*文本*属性，然后点击*图标*属性的 … 按钮，以显示图 4-24 所示的编辑器。选择适当的包（`icons`）和适当的图标文件。

