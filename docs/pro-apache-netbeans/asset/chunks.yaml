- fmt: '### Note


    If NetBeans complains with the message “*Selected location ... does not represent
    a valid Java FX Scene Builder installation,*” then do the following workaround.


    1. Navigate to the directory where *SceneBuilder* was installed,

    2. Enter `app` folder,

    3. Make a duplicate of `SceneBuilder.cfg` to `SceneBuilder.properties` in the
    same folder.


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig18_HTML.jpg](Images/479166_1_En_4_Fig18_HTML.jpg)


    Figure 4-18


    Gluon SceneBuilder


    ## Developing a Swing Application


    We shall develop the GUI for a Personal Information Manager (PIM) desktop application
    that allows you to organize your tasks. This application will be further developed
    in part 2. The *Todo* application is composed of a tasks list main window and
    a task-editing dialog box. A rough sketch for both is shown in Figure [4-19](#479166_1_En_4_Chapter.xhtml#Fig19).
    We shall build a dynamic prototype of the *Todo* application using Swing. In the
    next section, we shall rebuild the dynamic prototype using JavaFX.


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig19_HTML.jpg](Images/479166_1_En_4_Fig19_HTML.jpg)


    Figure 4-19


    A sketch of the Todo application user interface (main tasks list window on the
    left and task-editing form on the right)


    In NetBeans, create a new Java Application as shown in Figure [4-20](#479166_1_En_4_Chapter.xhtml#Fig20),
    by selecting the **File ➤ New Project** menu item. In step 2 of the wizard, provide
    `Todo` as the project name and choose a suitable project location (anywhere in
    your hard disk) as shown in Figure [4-21](#479166_1_En_4_Chapter.xhtml#Fig21).
    Then click **Finish**. Apache NetBeans creates the project containing a Java package
    named after the project name and a class named `Main` inside package `todo`.


    ### Design the Main Tasks List Window


    Create a new package by right-clicking on the `todo` package, selecting **New
    ➤ Java package** from the pop-up menu and giving the package name `todo.view`.


    Now right-click the `todo.view` package icon and choose **New ➤ Other** (or choose
    **File ➤ New File** from the main menu), then select the *Swing GUI Forms* category
    and the *JFrame Form* file type (see Figure [4-4](#479166_1_En_4_Chapter.xhtml#Fig4))
    and click **Next.**


    In the next step of the wizard, type `TasksWindow` as the class name and press
    **Finish**. The IDE opens the visual form editor, as shown in Figure [4-1](#479166_1_En_4_Chapter.xhtml#Fig1);
    notice also the location of the *Projects*, *Navigator,* and *Properties* windows;
    the *Palette* and the *editor* area.


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig21_HTML.jpg](Images/479166_1_En_4_Fig21_HTML.jpg)


    Figure 4-21


    In step 2 of the wizard, provide the project name and location


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig20_HTML.jpg](Images/479166_1_En_4_Fig20_HTML.jpg)


    Figure 4-20


    Create a new Java Application project


    An orange frame highlights the selected component (the `JFrame` content pane in
    Figure [4-1](#479166_1_En_4_Chapter.xhtml#Fig1)). The *navigator* displays all
    visual and nonvisual components of the `JFrame`, which is handy when you need
    to change the properties of a component hidden by another or one too small to
    be selected in the *editor*. On the right you see the *component palette* , which
    shows by default the standard Swing components (you can also add third-party JavaBeans
    by right-clicking on it and choosing *Palette Manager*), as well as the *Properties*
    windows. *Properties* are categorized to ease access to the ones most commonly
    used, and changed properties have their names highlighted in bold.


    Let’s create the GUI of our prototype. From the palette, drag the *toolbar* icon
    and drop it over the `JFrame`. You’ll notice that a placeholder for the toolbar
    follows the mouse pointer, and that the visual editor displays guidelines when
    it’s close to the edges of the `JFrame`, as shown in Figure [4-22](#479166_1_En_4_Chapter.xhtml#Fig22).
    These guidelines help you keep controls aligned and spaced out inside the container.
    Matisse generates the layout constraints to maintain the positioning of each component
    when the container is resized or when the *Look and Feel* (L&F) is changed.


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig22_HTML.jpg](Images/479166_1_En_4_Fig22_HTML.jpg)


    Figure 4-22


    Visual guidelines help positioning and sizing controls in the visual editor


    Move the toolbar on the top-left corner of the `JFrame`, and then drag the right
    border so that it becomes attached to the right border of the `JFrame`, thus filling
    up all the top part of the window (see Figure [4-23](#479166_1_En_4_Chapter.xhtml#Fig23)).


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig23_HTML.jpg](Images/479166_1_En_4_Fig23_HTML.jpg)


    Figure 4-23


    Positioning and resizing the toolbar


    Repeat the process to insert a `JLabel` attached to the bottom of the `JFrame`.
    This label will be used as the *status bar* for the tasks window. Then add a `JScrollPane`,
    filling up the area between the `JToolbar` and the `JLabel`.


    Now try resizing the `JFrame` content pane. The `JToolbar`, `JLabel`, and `JScrollPane`
    should resize to keep the borders attached to the `JFrame`’s corners and to each
    of the other borders.


    You may give more descriptive names to the variables of the various widgets, by
    right-clicking on each of them in the *Navigator* window and selecting **Change
    Variable Name** from the pop-up menu. From the same context menu, you can modify
    the widget’s displayed text by selecting **Edit Text** action.


    Next, let’s add a `JTable` inside the `JScrollPane` and create the toolbars’ buttons
    in order for the `TasksWindow` to start resembling the sketch of Figure [4-19](#479166_1_En_4_Chapter.xhtml#Fig19).


    You may use the icons provided together with the sources of this book. Copy the
    `icons` folder inside the *Source Packages* of the *Todo* project.


    Non-Java files inside the *Source Packages* folder will be added by Apache NetBeans
    to the resulted application `jar` file that will be created inside the `dist`
    folder, and the application will be able to refer to them as *classpath* resources,
    no matter where the jar file is installed on the user machine. As a bonus, the
    application code doesn’t have to worry about platform-specific details like path
    separators and drive letters.


    To add a button to the toolbar, drag it from the palette onto the toolbar. Clear
    the *text* property and click on the … button of the *icon* property to display
    the editor shown in Figure [4-24](#479166_1_En_4_Chapter.xhtml#Fig24). Choose
    the appropriate package (`icons`) and the appropriate icon file.'
