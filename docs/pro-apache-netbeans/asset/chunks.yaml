    ### 注意！


    如果 NetBeans 提示“所选位置...不代表有效的 Java FX Scene Builder 安装”，请执行以下变通方法。


    *   导航到 *SceneBuilder* 的安装目录。


    *   进入 `app` 文件夹。


    *   在同一文件夹中，将 `SceneBuilder.cfg` 复制一份并重命名为 `SceneBuilder.properties`。


    Apache NetBeans 提供了两种开发 JavaFX 应用程序的方式：使用 *Ant* 或使用 *Maven*。如果你希望使用 Java 11 和
    JavaFX 11，那么截至本文撰写时，使用 Ant 的向导在 Apache NetBeans 11 中无法正常工作。请观看此视频（[`https://www.youtube.com/watch?v=l9aoicDiQ_A`](https://www.youtube.com/watch%253Fv%253Dl9aoicDiQ_A)）了解如何使用
    Ant 开发 JavaFX 11 应用程序。


    开发 *ToDo* Swing 应用程序的 JavaFX 版本超出了本章的范围。在本书的源代码中，你会找到 *TodoFX*，这是一个独立的 JavaFX
    10 应用程序。图 9-16 展示了源代码的结构。`todofx.model` 包包含模型的一个副本，你可以使用内存存储的 `TaskManager` 或持久化的
    `TaskManagerDB` 类。应用程序的两个窗口（`TaskMain.fxml` 和 `TaskDetailsDialog.fxml`）使用了 FXML，并通过
    *SceneBuilder* 构建。`Stage`、`Scene` 等对象在 `Main` 类中创建。


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig16_HTML.jpg](img/479166_1_En_9_Fig16_HTML.jpg)


    图 9-16


    TodoFX 应用程序源代码结构


    要构建一个使用 JavaFX 作为其 GUI 的 NetBeans RCP 应用程序，请遵循以下步骤：


    1.  创建一个新的 **NetBeans 平台应用程序**，如我们在第 7 章中所学，并将其命名为 *TodoFXRCP*。


    2.  创建两个模块：*Model*（`todo.model`）和 *ViewController*（`todo.viewcontroller`），如我们在第
    7 章中所学。


    3.  将本章开头开发的 *TodoRCP* 应用程序中 *Model* 模块的内容复制到 *TodoFXRCP* 的 *Model* 模块中（见图 9-17）。


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig17_HTML.jpg](img/479166_1_En_9_Fig17_HTML.jpg)


    图 9-17


    TodoFXRCP 应用程序 Model 模块


    1.  向 *View* 模块添加一个新的 `TopComponent`；将其命名为 `TasksTopComponent`，就像我们为 *TodoRCP*
    应用程序所做的那样。


    2.  从 *TodoFX* 应用程序中复制文件 `TaskMain.fxml`、`TaskMainController.java`、`TaskDetailsDialog.fxml`、`TaskDetailsDialogController.java`、`TaskWrapper.java`
    和 `TaskListWrapper.java` 到 *TodoFXRCP* 的 `todo.viewcontroller` 中。添加必要的模块（以及对 *Model*
    模块的依赖）。确保更新 *FXML* 文件中的 `fx:controller` 以指向正确的控制器，例如 `fx:controller="todo.viewcontroller.TaskMainController"`。还需要进行一些其他修改，例如，从默认查找中检索
    `TaskManager`，而不是使用其单例方法。


    如果你使用的 JDK 版本未集成 JavaFX（例如 JDK 7 或 11），则需要创建一个库包装器来包含 `jfxrt.jar`。正如我们为 TodoRCP
    应用程序所做的那样，创建一个名为 *Libraries*（`lib`）的新模块，并包装 `hsqldb.jar` 和 `jfxrt.jar`（对于 JavaFX
    11，你至少需要添加 `javafx.base.jar`、`javafx.control.jar` 和 `javafx.fxml.jar`）。不要忘记在模块的
    *API 版本控制* 类别中将所需的包设为 `public`，并让 *ViewController* 模块依赖于 *Libraries* 模块。


    1.  在设计视图中，将 `TasksTopComponent` 的布局更改为 `BorderLayout`。然后，添加清单 9-16 中的代码（新增内容以粗体显示）。


    ```

    public final class TasksTopComponent extends TopComponent {

    private static JFXPanel fxPanel;

    public TasksTopComponent() {

    initComponents();

    setName(Bundle.CTL_TasksTopComponent());

    setToolTipText(Bundle.HINT_TasksTopComponent());

    putClientProperty(TopComponent.PROP_CLOSING_DISABLED, Boolean.TRUE);

    init();

    }

    private void init() {

    fxPanel = new JFXPanel();

    add(fxPanel, BorderLayout.CENTER);

    Platform.setImplicitExit(false);

    Platform.runLater(() -> createScene());

    }

    private void createScene() {

    try {

    Parent root = FXMLLoader.load(getClass().getResource("TaskMain.fxml"));

    Scene scene = new Scene(root, Color.LIGHTBLUE);

    fxPanel.setScene(scene);

    } catch (IOException ex) {

    Exceptions.printStackTrace(ex);

    }

    }

    清单 9-16

    支持 JavaFX 的 TasksTopComponent

    ```


    或者，如果你需要引用控制器：


    ```

    private TaskMainController mainController;

    private void createScene() {

    try {

    URL location = getClass().getResource("TaskMain.fxml");

    FXMLLoader fxmlLoader = new FXMLLoader();

    fxmlLoader.setLocation(location);

    fxmlLoader.setBuilderFactory(

    new JavaFXBuilderFactory());

    Parent root = fxmlLoader.load(location.openStream());

    Scene scene = new Scene(root, Color.LIGHTBLUE);

    fxPanel.setScene(scene);

    mainController =

    (TaskMainController) fxmlLoader.getController();

    } catch (IOException ex) {

    Exceptions.printStackTrace(ex);

    }

    }

    ```


    将 JavaFX 集成到 NetBeans 平台的魔力由 `JFXPanel` 提供。当创建第一个 `JFXPanel` 对象时，它会初始化 JavaFX
    运行时（*JavaFX 应用程序线程*）。当最后一个 `JFXPanel` 被销毁时，JavaFX 运行时退出；这就是我们设置 `Platform.setExplicitExit(false)`
    的原因。此设置对于关闭然后重新打开支持 JavaFX 的窗口是必要的。


    不要忘记“凯撒的归凯撒，上帝的归上帝。”换句话说，使用 `Platform.runLater(() -> {...});` 在 *JavaFX 应用程序线程*
    中执行 JavaFX 代码，并使用 `SwingUtilities.invokeLater(() -> { ...});` 在 EDT 线程中执行 Swing
    代码。


    `createScene()` 中的代码类似于 JavaFX 应用程序的 `start()` 方法中的代码。也将 *TodoFX* 的 `Main` 类中的
    `showTaskDetailsDialog()` 方法复制到 `TasksTopComponent` 中（见清单 9-17）。


    ```

