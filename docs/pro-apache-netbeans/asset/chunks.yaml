- fmt: '# Graduation to Top-Level Apache Project


    All good things come to an end, and so did the time that was spent by NetBeans
    in the Incubator. For some time already, the helpful mentors assigned to us had
    been suggesting it was time for us to leave. What that means is that NetBeans
    would no longer be in the Incubator, meaning that it would be an official Apache
    project. The Incubator can be kind of confusing to outsiders, that is, some tend
    to wonder about the state of the code coming out of the Incubator; for example,
    “is this Beta quality,” “can we rely on NetBeans while it is in the Incubator,”
    and so on, were questions typically asked.


    Also, the release process outside the Incubator is faster than within it, since
    Incubator releases go through two phases of release voting – first the community
    votes on whether a repository is ready for release, after which the members of
    the Incubator vote. If the latter fails, fixes need to be done, and the first
    phase needs to be restarted. In short, the two-phase release voting process can
    significantly slow releases down, and therefore that in itself is a reason for
    a project, once it is ready, to want to move on and out of the Incubator. The
    Incubator phase is important to go through since it enables a community around
    a project to get to know each other and work together around releases of their
    shared project. However, as soon as it’s clear that everything is working together
    reasonably well, the process begins of moving on to become an official Apache
    project.


    The process entails a discussion on the project’s dev mailing list. This discussion
    began in February 2019, it took some time, since we were also working on a release
    at the same time. After the discussion, a vote thread was started, which completed
    with around 60 votes all agreeing that NetBeans was ready to graduate, which enabled
    the vote around the same theme to be started among the members of the Incubator.
    There the vote passed, too, and in April 2019, NetBeans became an official Apache
    project.


    A variety of small tasks then needed to be completed, mainly involving removing
    the text “incubator” from a variety of places. A press release was put together
    and published and, seamlessly, development continued, with many links being redirected
    to Incubator-free locations, for example, the mailing lists had the word “incubator”
    in them, and so on, the website had a range of disclaimers around incubation,
    and these were fixed and removed.


    It had been a long process of 2 ½ years, though, all things considered, the process
    had been short and relatively painless. Though quite some code still needed to
    be donated from Oracle to complete the donation, in particular, the code related
    to C/C++ features, the community around NetBeans had been working together as
    an Apache project for quite some time, and graduation from the Incubator rounded
    off the process and completed the initial stages of settling NetBeans within Apache.


    # Beyond the Incubator


    What is the road map of Apache NetBeans, now that it has left the Incubator? What
    features can be expected? And when? Well, on the simplest level, Oracle has not
    completed its donation, that is, there’s quite some code, in particular in relation
    to C/C++ features, which are being audited and scrubbed, in Oracle. In other words,
    Oracle staff are looking at the code to be donated and determining whether that
    code really and truly belongs to Oracle and therefore whether Oracle owns that
    code and is, based on its ownership, able to donate that code to Apache. In some
    cases, after analysis, code may be found to be copied from elsewhere or reused
    from other repositories or technologies. Only after this kind of analysis is done
    can the code be handed over to Apache.


    At the same time, a key driver for Apache NetBeans will continue to be new release
    of the Java Development Kit, that is, the JDK. As new releases of the JDK are
    made available, tools such as NetBeans needs to be ready to enable developers
    to work with those new JDK releases. Not only must NetBeans be able to run on
    top of new releases of the JDK, but the Java Editor must offer support, such as
    code completion and syntax coloring, when Java changes on the syntax level. That
    work in NetBeans is primarily done by developers from Oracle and constitutes the
    largest part of Oracle’s commitment to NetBeans in Apache. For example, JEP-330
    provides for the running of individual Java source files, outside the scope of
    a project, and support for this will be very useful in NetBeans for those teaching
    and learning Java, since whole projects will not need to be created to hold single
    Java source files. At the same time, Oracle Labs is focused on GraalVM, the new
    polyglot VM developed at Oracle, for which the tooling, in particular cross-language
    debugging, is provided in Apache NetBeans. In short, Oracle’s commitment to NetBeans
    remains significant, especially now that there is a clear way forward via the
    Apache process that has taken over the governance and release management process
    from Oracle.


    Aside from that, Apache NetBeans will deliver whatever its committers decide to
    commit. A lot of work is being done in the Gradle area, while more and more features
    are being added to the PHP support, too. Once the C/C++ features have been donated,
    expect to see developments there also, as developers making use of those features
    provide feedback, issues, and pull requests.


    # Summary


    The most important message to take from this chapter is that Apache is “you,”
    and Apache NetBeans will not exist without your involvement. There aren’t magic
    pixies anymore developing NetBeans somewhere inside Sun or Oracle. Instead, there
    are individual contributors of all shapes and sizes, and you are needed to be
    part of the process. Is something missing? Now, for the first time, NetBeans is
    truly yours and you can, and in fact must, make it happen. We’re all looking forward
    to your first pull request!


    ## 13. Apache Infrastructure'
