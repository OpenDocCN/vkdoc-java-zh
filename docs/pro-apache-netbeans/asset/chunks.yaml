    ### 堆遍历器


    *堆遍历器*是一套用于分析通过 OpenJDK 内部堆转储机制获取的堆转储文件的工具集（在性能分析过程中也可以通过某些操作触发）。它是一个非常全面的分析工具，具备多种剖析堆转储文件的能力。


    首先，有一个*摘要*视图，可按多个类别显示与堆转储相关的数据：


    *   **基本信息**。显示基本信息，例如文件大小、转储日期。


    *   **环境**。显示有关环境的信息；例如，快照是在哪个操作系统上获取的；JVM 的供应商和版本等详细信息。


    *   **系统属性**。显示被转储 JVM 的所有系统属性。这些属性会内联显示在视图的实际区域中。


    *   **堆转储时的线程**。显示与堆转储一起获取的线程转储。线程转储会内联显示在视图的实际区域中。


    *   **应用程序窗口**。列出所有顶级 Swing 窗口，并可直接访问*实例*视图中的对应实例。


    *   **最大对象**。根据对象树的保留大小（即属于该对象的所有内容），触发确定堆上最大对象的操作。由于需要计算转储中所有对象的保留大小，此操作可能需要一些时间。


    *摘要*视图的示例如图 6-54 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig54_HTML.jpg](img/479166_1_En_6_Fig54_HTML.jpg)


    图 6-54


    堆遍历器摘要


    下一个视图是*类*视图。它显示堆上类实例的直方图。表格视图可以按实例数、大小或类名进行排序。视图底部的过滤器允许更快地向下钻取，例如，仅查找领域类的实例，而不查找
    JDK 核心类的实例。有一个初始隐藏的列，用于显示保留大小。如前所述，计算可能是一个耗时的操作，因此该列默认是隐藏的，尽管这些信息有时确实很有帮助。一个简单的示例如图
    6-55 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig55_HTML.jpg](img/479166_1_En_6_Fig55_HTML.jpg)


    图 6-55


    堆遍历器类视图


    除了统计分析之外，此视图还有一个有趣的操作——*与另一个堆转储进行比较*。它会打开一个对话框，让您选择另一个堆转储，可以是已加载的，也可以是从文件中加载的。如果您正在分析一个项目，对话框会自动检测可比较的转储；如果您从文件加载，则需要自行处理。加载界面如图
    6-56 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig56_HTML.jpg](img/479166_1_En_6_Fig56_HTML.jpg)


    图 6-56


    堆遍历器加载比较堆转储


    加载转储后，视图会切换到一个增量比较视图，显示在比较的堆转储中发现了某个类的多少个更多或更少的实例。完成差异分析后，可以将视图重置为原始状态。一个简单的比较示例如图
    6-57 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig57_HTML.jpg](img/479166_1_En_6_Fig57_HTML.jpg)


    图 6-57


    堆遍历器类视图比较


    在*类*视图中双击某个类，会打开*实例*视图，显示该类的所有实例列表。该视图实际上与*调试器*部分中描述的*实例*视图相同。左上角显示可用的实例（如果实例过多无法以平面列表显示，则会进行分组），左下角（如果可能）显示对象实例的值表示。右侧，在*字段*视图中显示所选实例的结构，其下方是*引用*视图，显示该实例向上直到垃圾回收根的引用链，该引用链使实例在堆上保持存活。如果出现内存泄漏，并且不太清楚为什么某些实例不会被垃圾回收（例如，某个静态字段持有对该实例的强引用），那么这些信息至关重要。图
    6-58 展示了*实例*视图中性能分析结果的示例。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig58_HTML.jpg](img/479166_1_En_6_Fig58_HTML.jpg)


    图 6-58


    堆遍历器实例视图


    最后一个视图是 *OQL 控制台*。此视图允许您使用特殊的 OQL 语法对堆进行交互式分析查询。右下角的*已保存查询*视图中已经提供了一些示例查询。右下角的*查询编辑器*提供代码补全功能，以简化创建新查询的过程，这些查询可以保存以供日后重用。执行查询后，结果将显示在*查询结果*视图中，即
    *OQL 控制台视图*的上半部分。查询结果始终是一个实例列表，可以在*实例*视图中选择和分析这些实例。当存在大量相同对象的实例，并且您想找出其中某个子集（例如，所有空的映射）时，使用
    *OQL 控制台*尤其有用。图 6-59 展示了使用 OQL 控制台的示例会话。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig59_HTML.jpg](img/479166_1_En_6_Fig59_HTML.jpg)


    图 6-59


    堆遍历器 OQL 控制台


    ## 总结


    在本章中，我们详细了解了 Apache NetBeans 的两大核心功能：*调试*和*性能分析*。


    您已经学会了如何使用调试器来解决应用程序代码中的问题、调试多线程应用程序，以及从调试器与您的应用程序进行交互。


    针对性能问题，我们向您展示了如何对应用程序进行性能分析，以了解底层的内存分配和执行性能行为。我们向您介绍了内置功能，这些功能可帮助您分析在性能分析运行期间收集的数据。


    本章展示的这两个功能都易于使用，并且应该成为您开发者工具包的一部分。现在，我们将进入第二部分：“扩展 Apache NetBeans”。


    # 第二部分 扩展 Apache NetBeans

