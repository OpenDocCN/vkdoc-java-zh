    \    设置内容项的数组。\n\n*   `PROP_CONTENT_DISPLAYED`：\n    设置为 `true` 以显示左侧窗格。\n\n*\
    \   `PROP_CONTENT_FOREGROUND_COLOR`：\n    设置左侧窗格的前景颜色。\n\n*   `PROP_CONTENT_NUMBERED`：\n\
    \    设置为 `true` 以在左侧窗格中显示编号。\n\n*   `PROP_CONTENT_SELECTED_INDEX`：\n    表示将被高亮显示的左侧窗格的索引。\n\
    \n*   `PROP_ERROR_MESSAGE`：\n    显示在向导底部的错误消息。当存在错误时，向导的 **下一步** 按钮将被禁用。\n\n*\
    \   `PROP_IMAGE`：设置要在左侧窗格中显示的图像。\n\n*   `PROP_IMAGE_ALIGNMENT`：\n    设置图像的对齐方式。\n\
    \n最后，关于图 10-7 中显示的其他两个选项，请查阅 [`http://wiki.netbeans.org/HtmlUIForTemplates`](http://wiki.netbeans.org/HtmlUIForTemplates)\
    \ 上的文档。\n作为练习，为 `AddTask` 操作构建一个自定义静态向导。该向导将包含三个步骤，第一个面板将询问任务的*描述*和*优先级*（描述是必填项）；第二个面板询问*截止日期*、*提醒*和*提前天数*；第三个面板询问*备注*以及任务是否*完成*。也尝试为\
    \ *TodoFXRCP* 应用程序创建相同的向导。提示！使用 `JFXPanel` 代替 `JPanel`。\n作为另一个练习，使用 **使用 HTML/Java\
    \ UI 新建文件** 向导为 *TodoHTMLJava* 应用程序创建一个用于添加新任务的向导。\n\n其他内容\n这里我们描述一些你可能在你的项目中会用到\
    \ NetBeans 平台 API。\n\n状态栏\n\n在上一章的清单 9-2 中，我们看到了如何通过注册到 `StatusLineElementProvider`\
    \ 服务提供者接口来在状态栏中显示消息。如果你想显示简单的文本，请使用清单 10-16 中的命令。\n\n```\nStatusDisplayer.getDefault().setStatusText(\"\
    状态消息\").\n清单 10-16\n在状态栏中显示一条消息\n```\n\n通知\n\nNetBeans 平台提供了一种在状态栏最右侧显示气球形状弹出窗口的机制。为此目的使用\
    \ `NotificationDisplayer`，它需要依赖 *UI 工具* 模块。清单 10-17 提供了自定义气球的各种可能性。\n\n```\nNotificationDisplayer.getDefault().notify(String\
    \ title, Icon icon, String detailsText, ActionListener detailsAction);\nNotificationDisplayer.getDefault().notify(String\
    \ title, Icon icon, String detailsText, ActionListener detailsAction, Priority\
    \ priority);\nNotificationDisplayer.getDefault().notify(String title, Icon icon,\
    \ JComponent balloonDetails, JComponent popupDetails, Priority priority);\nNotificationDisplayer.getDefault().notify();\n\
    清单 10-17\n在状态栏中显示一个气球形状的弹出窗口\n```\n\n你也可以在气球中包含一个图标。一个添加警报 ![../images/479166_1_En_10_Chapter/479166_1_En_10_Figa_HTML.jpg](img/479166_1_En_10_Figa_HTML.jpg)\
    \ 图标的示例如清单 10-18 所示。\n\n```\nNotificationDisplayer.getDefault().notify(\n\"警报\
    \ 1\",\nImageUtilities.loadImageIcon(\"todo/view/illegal.png\", false),\n\"警报详情\
    \ 1\",\nnull);\n清单 10-18\n在状态栏中显示一个带有图标的气球形状弹出窗口\n```\n\n作为练习，修改 *TodoRCP* 以在启动时将警报显示为通知，而不是\
    \ `JOptionPane` 消息（见图 10-8）。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig8_HTML.jpg](img/479166_1_En_10_Fig8_HTML.jpg)\n\
    \n图 10-8\n通知\n\n如果 `ActionListener` 不是 `null`，则会显示一个超链接，点击该链接将执行该操作。`Priority`\
    \ 可以是：`HIGH`、`NORMAL`、`LOW` 或 `SILENT`。\n\nImageUtilities\n`org.openide.util.ImageUtilities`\n\
    是一个工具类，提供了用于操作和转换图像及图标的静态方法。结果会被缓存。有用的方法包括 `loadImage()`、`loadImageIcon()`、`icon2Image()`、`image2Icon`、`mergeImages()`\
    \ 等。我们在清单 10-18 中看到了一个示例。\n\n快速搜索\n\n通常，在工具栏的右上角会显示一个搜索字段（见图 10-9）。`QuickSearch`\
    \ 框会搜索你在其文本框中输入的关键字。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig9_HTML.jpg](img/479166_1_En_10_Fig9_HTML.jpg)\n\
    \n图 10-9\n工具栏中的快速搜索\n\n如果搜索字段没有自动显示，那么你需要在 `layer.xml` 中包含清单 10-19 中所示的 XML 标签：\n\
    \n```\n\n清单 10-19\n在 layer.xml 中添加 XML 标签以在工具栏中显示快速搜索字段\n```\n\n你可以选择在菜单栏而不是工具栏中显示快速搜索。这样做时，最佳实践是包含一个分隔符，以确保搜索字段在菜单栏中右对齐。你可以通过将清单\
    \ 10-20 中的代码添加到你的 `layer.xml` 文件中来实现这些操作。\n\n```\n\n清单 10-20\n在菜单栏而不是工具栏中显示快速搜索\n\
    ```\n\n要在 Mac OSX 的菜单上显示快速搜索，你需要从平台集群中排除 *Apple 应用程序菜单* 模块（右键单击 *TodoRCP* 模块套件，选择\
    \ **属性**，然后选择 *库* 类别，如图 10-10 所示），以便不使用 Apple 菜单栏。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig10_HTML.jpg](img/479166_1_En_10_Fig10_HTML.jpg)\n\
    \n图 10-10\n从平台集群中移除 Apple 应用程序菜单模块\n"
- fmt: 'If you need to add the quicksearch filter tool to your own panel/toolbar,
    then follow the tricks found here: [`http://layerxml.wordpress.com/2011/02/16/place-the-quicksearch-component-anywhere-you-like/`](http://layerxml.wordpress.com/2011/02/16/place-the-quicksearch-component-anywhere-you-like/),
    and also at [`https://blogs.oracle.com/geertjan/place-the-quicksearch-component-anywhere-you-like-part-2`](https://blogs.oracle.com/geertjan/place-the-quicksearch-component-anywhere-you-like-part-2).


    You can search for actions, but how can you search for tasks? The answer is by
    following these steps:


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig12_HTML.jpg](Images/479166_1_En_10_Fig12_HTML.jpg)


    Figure 10-12 New Quick Search Provider wizard (step 2)


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig11_HTML.jpg](Images/479166_1_En_10_Fig11_HTML.jpg)


    Figure 10-11 New Quick Search Provider wizard (step 1)


    1.  Right-click on the *View* module and select **New ➤ Other**.

    2.  In the *New File* dialog, choose **Module Development ➤ Quick Search Provider**
    (see Figure [10-11](#479166_1_En_10_Chapter.xhtml#Fig11)) and click **Next**.

    3.  In the Quick Search Provider panel, set the provider class name, etc. (see
    Figure [10-12](#479166_1_En_10_Chapter.xhtml#Fig12)).

    4.  Click on **Finish**.


    The wizard will create the stub shown in Listing [10-21](#479166_1_En_10_Chapter.xhtml#PC21).


    ```

    package todo.view;

    import org.netbeans.spi.quicksearch.SearchProvider;

    import org.netbeans.spi.quicksearch.SearchRequest;

    import org.netbeans.spi.quicksearch.SearchResponse;

    public class TaskSearchProvider implements SearchProvider {

    @Override

    public void evaluate(SearchRequest request, SearchResponse response) {

    //sample code

    //for (SearchedItem item : getAllItemsToSearchIn()) {

    //    if (isConditionSatisfied(item, request)) {

    //        if (!response.addResult(item.getRunnable(), item.getDisplayName(),

    //        item.getShortcut(), item.getDisplayHint())) {

    //        break;

    //    }

    //    }

    //}

    }

    }

    Listing 10-21

    TaskSearchProvider generated by the Quick Search Provider wizard

    ```


    The `SearchRequest` class provides the description of the quick search request.
    The methods `getText()` and `getShortcut()` give you access to the text and shortcut
    typed into the search field. Typically, the text entered in the search field is
    matched against an object in the `Lookup`. When a match succeeds, the object is
    added to `SearchResponse`, which is the response object for collecting the results
    of the `SearchRequest` and displaying them in the search field drop-down list.


    As an example, Listing [10-22](#479166_1_En_10_Chapter.xhtml#PC22) provides an
    implementation of `SearchProvider` that finds all `Node`s in `TasksTopComponent`,
    then searches through their `Lookup`s for `Task` objects.


    ```

    @Override

    public void evaluate(final SearchRequest request, final SearchResponse response)
    {

    SwingUtilities.invokeLater(new Runnable() {

    @Override

    public void run() {

    TopComponent tc = WindowManager.getDefault().findTopComponent("TasksTopComponent");

    final ExplorerManager em = ((ExplorerManager.Provider) tc).getExplorerManager();

    Node root = em.getRootContext();

    for (final Node node : root.getChildren().getNodes()) {

    Task task = node.getLookup().lookup(Task.class);

    if (accept(task, request)) {

    response.addResult(new Runnable() {

    @Override

    public void run() {

    try {

    em.setSelectedNodes(new Node[]{node});

    } catch (PropertyVetoException ex) {

    Exceptions.printStackTrace(ex);

    }

    }

    }, task.getDescription());

    }

    }

    }

    });

    }

    private boolean accept(Task task, SearchRequest request) {

    return task != null && task.getDescription().contains(request.getText());

    }

    Listing 10-22

    Example implementation of SearchProvider

    ```


    The wizard also creates the code shown in Listing [10-23](#479166_1_En_10_Chapter.xhtml#PC23),
    placing that code into `layer.xml`.


    ```


    Listing 10-23

    QuickSearch folder generated in layer.xml from the Quick Search Provider wizard

    ```


    `QuickSearch` is not to be confused with *QuickFilter*. Check `ShowCompletedTasksAction`
    implementation in the source code bundle to see how to filter the `OutlineView`
    (see also [*https://jnkjava.wordpress.com/2014/02/26/recipe-9-how-to-filter-an-outlineview/*](https://jnkjava.wordpress.com/2014/02/26/recipe-9-how-to-filter-an-outlineview/)).
    You may also add your own custom quick filter in order to filter the `OutlineView`
    by following the instructions described in this blog ([`https://jnkjava.wordpress.com/2015/02/01/recipe-14-how-to-add-a-quick-filter/`](https://jnkjava.wordpress.com/2015/02/01/recipe-14-how-to-add-a-quick-filter/)).


    ## Output Window


    The *Output window* is a display area, usually at the bottom of the NetBeans IDE
    window, for showing messages to the user (see Figure [10-13](#479166_1_En_10_Chapter.xhtml#Fig13)).
    Messages from multiple sources can be displayed in different tabs simultaneously.


    To use the *Output window* in your application, add a dependency to *I/O API and
    SPI* module. An example use case is shown in Listing [10-24](#479166_1_En_10_Chapter.xhtml#PC24).


    ```

    InputOutput io = IOProvider.getDefault().getIO("Hello World!", true);

    io.show();   // display Output window if it is not open

    try (OutputWriter writer = io.getOut()) {

    writer.println("This is a message.");

    }

    Listing 10-24

    Output window code example

    ```


    Passing `true` as the second parameter to `IOProvider.getDefault().getIO()` ensures
    that a new tab is created in the *Output window* for each call. Pass `false` to
    write the output to the same tab. `InputOutput.show()` ensures that the *Output
    window* opens, if it is closed.


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig13_HTML.jpg](Images/479166_1_En_10_Fig13_HTML.jpg)


    Figure 10-13 Output window


    ## Settings


    NetBeans IDE provides the *Options* window (menu **Tools ➤ Options** or **NetBeans
    ➤ Preferences** on MacOS) that allows the user to customize it (see Figure [10-14](#479166_1_En_10_Chapter.xhtml#Fig14)).


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig14_HTML.jpg](Images/479166_1_En_10_Fig14_HTML.jpg)


    Figure 10-14 Options window


    As you can see in Figure [10-14](#479166_1_En_10_Chapter.xhtml#Fig14), there are
    *Primary panels* (for example *General*, *Miscellaneous*) and *Secondary panels*
    (for example *Formatting*, *Hints*, etc.). The Primary Panels can be used to configure
    the most important groupings of settings in an application. Secondary Panels can
    be used for less important settings needed for configuring the application. You
    can also export and import your settings with the two respective buttons in the
    bottom left of the *Options* window.


    The Apache NetBeans Platform *Options Dialog API and SPI* allow modules to customize
    the Options window. To use this API, right-click on your module, and select **New
    ➤ Other**. Select the *Module Development* category and the *Options Panel* file
    type. In the next step, choose among Primary and Secondary panel (see Figure [10-15](#479166_1_En_10_Chapter.xhtml#Fig15)).
    The keywords enable the user to quickly open the *Options* window from the *Quick
    Search field* as we learned previously.


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig15_HTML.jpg](Images/479166_1_En_10_Fig15_HTML.jpg)


    Figure 10-15 New Options panel wizard


    The wizard will create a `package-info.java` file with the contents shown in Listing
    [10-25](#479166_1_En_10_Chapter.xhtml#PC25) for a primary panel.


    ```

    @OptionsPanelController.ContainerRegistration(

    id = "TaskManager",

    categoryName = "#OptionsCategory_Name_TaskManager",

    iconBase = "todo/view/task_manager.png",

    keywords = "#OptionsCategory_Keywords_TaskManager",

    keywordsCategory = "TaskManager")

    @NbBundle.Messages(

    value = {"OptionsCategory_Name_TaskManager=TaskManager", "OptionsCategory_Keywords_TaskManager=task
    manager"})

    package todo.view;

    import org.netbeans.spi.options.OptionsPanelController;

    import org.openide.util.NbBundle;

    Listing 10-25

    package-info.java contents

    ```'
