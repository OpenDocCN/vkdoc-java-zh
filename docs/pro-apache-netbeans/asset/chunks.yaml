    release was tested on JDK 12, while new editor hints and features were

    provided to support developers making use of the syntax-level features

    in JDK 12.'
  trans: '

    Apache NetBeans（孵化中）10.0

    随着 Apache NetBeans 9.0 的发布，人们首先提出的问题之一是：“嘿，PHP 和 JavaScript 呢？Apache 是否从 NetBeans
    中移除了这些功能？” 一个最令人沮丧但可以理解的方面是，开源项目的用户往往不像其开发者那样密切关注项目进展。随后引发了一阵抱怨声，许多 NetBeans 用户突然冒出来抱怨，显然
    Apache NetBeans 从此以后只会关心 Java 开发者，而不再关心它过去所支持的其他技术和语言的开发者。


    当然，正如之前已经详细解释过的，我们专注于在不同版本中发布 NetBeans 的不同部分，因为构成 NetBeans 的所有组件尚未全部从 Oracle 接收，也尚未全部重新授权给
    Apache。


    Apache NetBeans 10.0 于 2018 年 12 月 27 日发布，其重点是提供 PHP 功能，这也意味着同时提供 HTML5/JavaScript
    功能，因为前者依赖于后者。此次发布的不仅是 Oracle 捐赠的与这些功能相关的代码，此外，在此期间，还首次提供了许多额外功能，特别是对当时最新 PHP 版本
    PHP 7.4 的新支持。


    此外，10.0 版本还重点关注了 JDK 11，特别是除了能够在 JDK 11 上运行之外，还提供了对 lambda 表达式中“var”的新支持。除了其他修复和增强之外，Apache
    NetBeans 10.0 还引入了对 JUnit 5 的支持，特别是针对基于 Apache Maven 的项目。


    Apache NetBeans（孵化中）11.0

    Apache NetBeans 11.0 于 2019 年 4 月 4 日发布，是孵化器中的第三个主要版本。


    多年来，NetBeans 社区一直在讨论如何最好地表达 Apache Maven 和 Gradle 是比 Apache Ant 更现代、更值得关注的选择，但同时又不想暗示使用
    Apache Ant 有任何问题，这一点使问题变得复杂。


    因此，在 Apache NetBeans 11.0 中，重新设计了“新建项目向导”，即 NetBeans 用户的入口点。Java 向导被移到了一个名为“Java
    with Ant”的子文件夹中，同时新增了两个类别：“Java with Maven”和“Java with Gradle”。希望这能让新用户更容易为他们喜欢的项目选择起点，同时突出显示
    Maven 和 Gradle 应优先于 Ant。


    此外，首次引入了对 Gradle 的初步支持。多年来，许多用户一直要求提供将 NetBeans 与 Gradle 集成的功能。对 Oracle 来说，这从来都不是一个高优先级事项，尽管一个提供
    Gradle 集成功能的外部插件被开发出来并广受欢迎。从 Oracle 的角度来看，这是一个足够好的解决方案，因为 Oracle 无需投入任何开发人员时间资源，而需要该集成的用户可以通过外部插件来使用它。当然，直接开箱即用地集成外部技术（如
    Gradle）总是更可取的。随着 NetBeans 归属 Apache，优先级不再由 Oracle 决定，直接开箱即用地集成 Gradle 变得只受限于是否有一个或多个贡献者能够提供它。在
    Apache NetBeans 11.0 的发布周期中，这一目标成功实现了。


    除了这些关注点之外，Apache NetBeans 11.0 的一个关键重点是 Oracle 捐赠给 Apache 的代码的下一阶段集成，即与企业 Java（即
    Java/Jakarta EE）相关的功能集群。在 Apache NetBeans 11.0 发布前的几个月里，我们一直忙于审查“企业”功能集群的许可证，该集群来自
    Oracle 向 Apache 的第二次 NetBeans 捐赠，审查工作在发布前及时完成，使得这些功能能够被纳入其中。因此，从该版本开始，NetBeans
    用户无需安装插件，即可使用 Ant 或 Maven 创建、编辑、构建和部署 Java EE 应用程序，对 Gradle 的支持计划在下一个版本中提供。


    然而，对 Java EE 8 的显式支持，例如 NetBeans 用户界面元素中的特定模板或规范编号的提及，并未包含在 Apache NetBeans 11.0
    中。但与此同时，请注意 Java EE 8 仅能在 JDK 8 上运行，而不能在后续版本上运行，因此对于使用 Java EE 8 进行开发的用户来说，最好还是在
    JDK 8 上运行 NetBeans 本身。


    最后，与 Apache NetBeans 9.0 提供对 JDK 9 和 10 的支持、Apache NetBeans 10.0 提供对 JDK 11 的支持一样，Apache
    NetBeans 11.0 也提供了对 JDK 12 的支持。Apache NetBeans 11.0 版本在 JDK 12 上进行了测试，同时提供了新的编辑器提示和功能，以支持开发者利用
    JDK 12 中的语法级特性。

