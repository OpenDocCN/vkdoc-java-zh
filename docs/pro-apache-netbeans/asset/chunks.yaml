- fmt: '8. 如果你认为该插件符合插件门户的质量标准（参见 wiki：[`https://cwiki.apache.org/confluence/display/NETBEANS/Quality+criteria+for+Plugin+Portal+Update+Center`](https://cwiki.apache.org/confluence/display/NETBEANS/Quality%252Bcriteria%252Bfor%252BPlugin%252BPortal%252BUpdate%252BCenter)），你可以选择通过点击“**Request
    Verification**”按钮来让插件通过验证并批准发布。


    ## Summary


    在本章中，我们通过几个指南了解了如何使用 Maven 为一种新语言创建 NetBeans 插件。你已经看到创建新项目模板、识别新文件类型以及借助 ANTLR
    实现语法高亮和错误提示是多么容易。我们还涉及了代码补全和导航窗口。NetBeans 的`lookup`API 用于包之间的通信。最后，你了解了签名和发布插件所需的必要步骤。


    在下一章中，你将看到 NetBeans 为何被转移到 Apache 软件基金会旗下，以及你如何为该项目做出贡献。


    ## Footnotes


    # Part III：Participating in Apache NetBeans


    ## 12. The Apache NetBeans Process


    使 Apache 软件基金会（简称“Apache”）对 NetBeans 而言既特殊又合适的是其治理模式。人们经常问：“既然 NetBeans 过去是、现在也一直是免费且开源的，它还需要
    Apache 吗？”这正是我们将在本章中探讨的问题。


    在本章结束时，我们希望你能理解 NetBeans 迁移到 Apache 的背景、此次迁移带来的好处，尤其是你如何亲自参与到该项目中并为其做出贡献。


    ### Of Pubs and Legends


    传说 NetBeans 起源于布拉格的酒吧和酒馆。从很多意义上讲，这确实是真的。1996 年，一群来自布拉格理工大学的学生开发了一个工具，用于支持当时尚属新兴且缺乏工具支持的
    Java 开发。根据同样的传说，当时开发工作进展不大，但消耗却不少；尽管该工具的计划描述得很详尽，但直到这些学生毕业并意识到他们有一个好主意且时机已到时，这些计划才得以实现。


    “NetBeans”这个奇特的名字也可以从这个角度来理解：当时的两大热门话题是“JavaBeans”和“Network”，将这两个术语组合成一个词，就像现在的“Facebook”和“Netflix”一样合乎逻辑。不久之后，Sun
    Microsystems（简称“Sun”）收购了 NetBeans，当时 Java 之父 James Gosling 和领导 Sun 工具部门的 Jonathan
    Schwartz 在一次会议上看到了它的演示，并认识到它可以作为基础环境，让新开发者能够快速、全面地开启他们的 Java 之旅。


    Sun 将 NetBeans 定位为帮助新 Java 开发者入门并让专业开发者高效工作的工具，随后将其开源，并开始着手对其进行模块化。根据另一个传说，NetBeans
    的开发者无论如何都主要对创建一个模块化框架感兴趣，然后他们创建了 NetBeans 集成开发环境（IDE），并将其置于模块化框架之上，纯粹是为了证明该框架。这样一来，开发环境反而成了事后才考虑的事情，而其底层的
    NetBeans 平台（你在第二部分中已了解）才是开发者真正关注的核心领域。


    ### Modular Transition to Apache


    无论如何，其模块化特性已被证明是其关键优势之一，尤其是在迁移到 Apache 的过程中。


    2010 年 Oracle 收购 Sun 之后，NetBeans 在其新东家那里有了许多有趣的新用例。它成为了 Oracle 的 JDeveloper 的基础，其多项功能（如窗口系统、GUI
    构建器和分析器）都在 JDeveloper 中被复用。在 Oracle Labs，它成为了围绕新型多语言 GraalVM 的工具链的核心部分。然而，部分由于社区持续要求更直接地参与
    NetBeans 的开发，部分由于优先级调整，部分为了分担维护成本，Oracle 于 2016 年 10 月决定将 NetBeans 捐赠给 Apache。


    Oracle 非常明确地表示，它希望继续向 NetBeans 投入资源，并且将其捐赠给 Apache 的决定绝不意味着放弃它。事实上，作为其既定方向的证据，Oracle
    内部 Java 组织中的一个开发者团队至今仍在继续从事 NetBeans 的工作，专注于提供与 Java 开发工具包（JDK）和 Java 语言新特性相关的
    Java 编辑器增强功能。此外，Oracle 内部的一个团队从迁移之初就开始工作，并每周开会讨论代码向 Apache 迁移的当前状态、分配任务、报告进展等。'
