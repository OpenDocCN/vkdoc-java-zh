- fmt: '### Methods


    `Methods` profiling or execution profiling is a tool to help understand the runtime
    execution performance of an application. If a request to a server takes too long,
    an execution profiling of the application may help to figure out the bottleneck
    (there are other techniques, but these can be studied in deeper detail in a performance
    tuning handbook).


    Starting the profiling session with `methods` will open a view similar to the
    one shown in Figure [6-39](#479166_1_En_6_Chapter.xhtml#Fig39).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig39_HTML.jpg](Images/479166_1_En_6_Fig39_HTML.jpg)


    **Figure 6-39** Methods view live


    The view as shown has two parts, which are live updated. The first is a *thread
    view*, showing where in a special thread most of the time is consumed. The second
    (shown at the bottom) is a view displaying the *hot spots* of the application
    in terms of which methods have been executed, how often, and how long were they
    running on the CPU. This can give a live impression on what is going in the application.
    Because a lot of threads may be running and metrics for thousands of methods will
    be generated, both views can be filtered either by *thread name* or by *class
    name* for the method view. To open the filter bar at the bottom of the view, click
    **Filter** in the context menu of the view. The filter allows for different type
    of matches:


    - **Contains**. Shows all classes with a fully qualified class name containing
    the filter string.

    - **Does not contain**. Shows all classes with a fully qualified class name not
    containing the filter string.

    - **Regular Expression**. Shows all classes with a fully qualified class name
    matching the filter string as a regular expression.


    In addition to these filter expressions, there are predefined filters available:


    - `JPA`

    - `JavaEE`

    - `JavaEE Servers`

    - `Java Reflection`

    - `Java SE`


    Because of the overhead `Methods` profiling introduces overhead into the profiled
    application, it is very important to configure the methods to be profiled. This
    can be done using the gear icon in the upper right-hand corner. This opens up
    a configuration area that allows us to select which methods will be instrumented
    for methods profiling. The default configuration is shown in Figure [6-40](#479166_1_En_6_Chapter.xhtml#Fig40).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig40_HTML.jpg](Images/479166_1_En_6_Fig40_HTML.jpg)


    **Figure 6-40** Methods configuration


    The default configuration is just using a sampling profiling technique for methods
    profiling. It is less overhead compared to the instrumented profiling, but it
    not very exact. The configuration differentiates between different sets of classes
    or methods. The most important mode due to overhead is *Defined* classes. This
    allows for an explicit selection of which classes are of interest for the profiling
    session as can be seen in Figure [6-41](#479166_1_En_6_Chapter.xhtml#Fig41).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig41_HTML.jpg](Images/479166_1_En_6_Fig41_HTML.jpg)


    **Figure 6-41** Methods profile defined classes only


    There is even the possibility to inhibit profiling of the whole tree by using
    the *exclude outgoing calls* option. Having set up all this and having followed
    the live results, you want to have a more detailed look at what is really happening.
    You can do this by creating a result snapshot from the toolbar, which opens a
    separate tab for the snapshot. The result view shown is not very different to
    the live view, as can be seen in Figure [6-42](#479166_1_En_6_Chapter.xhtml#Fig42).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig42_HTML.jpg](Images/479166_1_En_6_Fig42_HTML.jpg)


    **Figure 6-42** Methods Result Snapshot


    In the live view of the `Methods` profiling, another nice feature is available.
    Using a button in the toolbar, you can switch the live view to display delta values,
    that is, all absolute values are used as the baseline and only changes compared
    to this baseline are displayed, so only methods executed after triggering the
    delta mechanism will show up with values larger than 0 in the views. This can
    be used to get rid of the start-up overhead in the analyzed data.


    ### Objects


    `Objects` profiling is a tool to help with the analysis of memory allocation and
    consumption. If we are looking at memory, we typically talk about the Java heap,
    that is, objects allocated on the heap. Starting the profiling session in the
    `Objects` profiling mode will open a live view showing a histogram of all class
    instances (objects). The tabular view shows the full qualified class names, the
    estimated live bytes consumed by this class’s instances on the heap, and a count
    of live objects on the heap per class. The view has the same filtering options
    described for the `Methods` profiling. An example view is shown in Figure [6-43](#479166_1_En_6_Chapter.xhtml#Fig43).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig43_HTML.jpg](Images/479166_1_En_6_Fig43_HTML.jpg)


    **Figure 6-43** Objects View live


    Similar to the `Methods` profiling, the `Objects` profiling can be configured
    with regard to which class instances shall be tracked by the profiler. It is possible
    to use a sampling profiling mode here as well, which just takes samples from the
    heap at defined intervals. However, in this mode the profiler may miss many allocations
    if they die fast enough, that is, allocation and garbage collection happen in
    between two samples. The possible configuration types that can be selected are
    shown in Figure [6-44](#479166_1_En_6_Chapter.xhtml#Fig44).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig44_HTML.jpg](Images/479166_1_En_6_Fig44_HTML.jpg)


    **Figure 6-44** Objects configuration


    The default configuration is to use a low overhead sampling for all classes. This
    may be appropriate if you do not have any clue where a memory problem is originating.
    Using a sampling mode only for project classes reduces the amount of tracked information
    and puts a focus onto your own domain code. Since this may not be enough, for
    example, imagine a leak caused by caching instances of core Java classes, the
    Apache NetBeans Profiler offers two instrumented profiling modes in addition to
    the sampling mode. Let’s first take a look at the *Defined classes* mode. It allows
    us to specify a list of classes to be profiled by using fully qualified class
    names. If you need to profile all classes from a package or package tree, you
    can use an asterisk or a double asterisk as wildcards for those use cases. Once
    you have added what you need to the list (one pattern per line), there are two
    more options to pick from:


    - **Track only live objects**. Defines whether only live objects or also already
    created objects (including released ones) are profiled.

    - **Limit allocations depth**. Defines the depth of the stack that is recorded
    for allocations. If unchecked, always the full stack is recorded, or else only
    the top number of stack frames are stored for analysis. This setting has a major
    impact on the overhead introduced to the target VM during profiling.


    The updated configuration needs to be applied, which triggers an update to the
    instrumentation of the target VM. The configuration UI is shown in Figure [6-45](#479166_1_En_6_Chapter.xhtml#Fig45).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig45_HTML.jpg](Images/479166_1_En_6_Fig45_HTML.jpg)


    **Figure 6-45** Objects defined


    The other mode for defining the classes profiled for allocation is *Selected classes*.
    It is very similar to the *Defined classes* mode, besides the fact that classes
    for profiling are not defined by a pattern, but are selected from projects or
    jar files by selecting them explicitly using a simple UI. To start the selection
    process, you need to click the add button as shown in Figure [6-46](#479166_1_En_6_Chapter.xhtml#Fig46).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig46_HTML.jpg](Images/479166_1_En_6_Fig46_HTML.jpg)


    **Figure 6-46** Objects selected'
  raw: '### Methods


    Methods profiling or execution profiling is a tool to help understand the runtime
    execution performance of an application. If a request to a server takes too long,
    an execution profiling of the application may help to figure out the bottleneck
    (there are other techniques, but these can be studied in deeper detail in a performance
    tuning handbook).


    Starting the profiling session with methods will open a view similar to the one
    shown in Figure [6-39](#479166_1_En_6_Chapter.xhtml#Fig39).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig39_HTML.jpg](Images/479166_1_En_6_Fig39_HTML.jpg)


    Figure 6-39


    Methods view live


    The view as shown has two parts, which are live updated. The first is a *thread
    view*, showing where in a special thread most of the time is consumed. The second
    (shown at the bottom) is a view displaying the *hot spots* of the application
    in terms of which methods have been executed, how often, and how long were they
    running on the CPU. This can give a live impression on what is going in the application.
    Because a lot of threads may be running and metrics for thousands of methods will
    be generated, both views can be filtered either by *thread name* or by *class
    name* for the method view. To open the filter bar at the bottom of the view, click
    **Filter** in the context menu of the view. The filter allows for different type
    of matches:


    *   **Contains**. Shows all classes with a fully qualified class name containing
    the filter string.


    *   **Does not contain**. Shows all classes with a fully qualified class name
    not containing the filter string.


    *   **Regular Expression**. Shows all classes with a fully qualified class name
    matching the filter string as a regular expression.


    In addition to these filter expressions, there are predefined filters available:


    *   JPA


    *   JavaEE


    *   JavaEE Servers


    *   Java Reflection


    *   Java SE


    Because of the overhead *Methods* profiling introduces overhead into the profiled
    application, it is very important to configure the methods to be profiled. This
    can be done using the gear icon in the upper right-hand corner. This opens up
    a configuration area that allows us to select which methods will be instrumented
    for methods profiling. The default configuration is shown in Figure [6-40](#479166_1_En_6_Chapter.xhtml#Fig40).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig40_HTML.jpg](Images/479166_1_En_6_Fig40_HTML.jpg)


    Figure 6-40


    Methods configuration


    The default configuration is just using a sampling profiling technique for methods
    profiling. It is less overhead compared to the instrumented profiling, but it
    not very exact. The configuration differentiates between different sets of classes
    or methods. The most important mode due to overhead is *Defined* classes. This
    allows for an explicit selection of which classes are of interest for the profiling
    session as can be seen in Figure [6-41](#479166_1_En_6_Chapter.xhtml#Fig41).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig41_HTML.jpg](Images/479166_1_En_6_Fig41_HTML.jpg)


    Figure 6-41


    Methods profile defined classes only


    There is even the possibility to inhibit profiling of the whole tree by using
    the *exclude outgoing calls* option. Having set up all this and having followed
    the live results, you want to have a more detailed look at what is really happening.
    You can do this by creating a result snapshot from the toolbar, which opens a
    separate tab for the snapshot. The result view shown is not very different to
    the live view, as can be seen in Figure [6-42](#479166_1_En_6_Chapter.xhtml#Fig42).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig42_HTML.jpg](Images/479166_1_En_6_Fig42_HTML.jpg)


    Figure 6-42


    Methods Result Snapshot


    In the live view of the *Methods* profiling, another nice feature is available.
    Using a button in the toolbar, you can switch the live view to display delta values,
    that is, all absolute values are used as the baseline and only changes compared
    to this baseline are displayed, so only methods executed after triggering the
    delta mechanism will show up with values larger than 0 in the views. This can
    be used to get rid of the start-up overhead in the analyzed data.


    ### Objects


    *Objects* profiling is a tool to help with the analysis of memory allocation and
    consumption. If we are looking at memory, we typically talk about the Java heap,
    that is, objects allocated on the heap. Starting the profiling session in the
    Objects profiling mode will open a live view showing a histogram of all class
    instances (objects). The tabular view shows the full qualified class names, the
    estimated live bytes consumed by this class’s instances on the heap, and a count
    of live objects on the heap per class. The view has the same filtering options
    described for the *Methods* profiling. An example view is shown in Figure [6-43](#479166_1_En_6_Chapter.xhtml#Fig43).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig43_HTML.jpg](Images/479166_1_En_6_Fig43_HTML.jpg)


    Figure 6-43


    Objects View live


    Similar to the *Methods* profiling, the *Objects* profiling can be configured
    with regard to which class instances shall be tracked by the profiler. It is possible
    to use a sampling profiling mode here as well, which just takes samples from the
    heap at defined intervals. However, in this mode the profiler may miss many allocations
    if they die fast enough, that is, allocation and garbage collection happen in
    between two samples. The possible configuration types that can be selected are
    shown in Figure [6-44](#479166_1_En_6_Chapter.xhtml#Fig44).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig44_HTML.jpg](Images/479166_1_En_6_Fig44_HTML.jpg)


    Figure 6-44


    Objects configuration


    The default configuration is to use a low overhead sampling for all classes. This
    may be appropriate if you do not have any clue where a memory problem is originating.
    Using a sampling mode only for project classes reduces the amount of tracked information
    and puts a focus onto your own domain code. Since this may not be enough, for
    example, imagine a leak caused by caching instances of core Java classes, the
    Apache NetBeans Profiler offers two instrumented profiling modes in addition to
    the sampling mode. Let’s first take a look at the *Defined classes* mode. It allows
    us to specify a list of classes to be profiled by using fully qualified class
    names. If you need to profile all classes from a package or package tree, you
    can use an asterisk or a double asterisk as wildcards for those use cases. Once
    you have added what you need to the list (one pattern per line), there are two
    more options to pick from


    *   **Track only live objects**. Defines whether only live objects or also already
    created objects (including released ones) are profiled.


    *   **Limit allocations depth**. Defines the depth of the stack that is recorded
    for allocations. If unchecked, always the full stack is recorded, or else only
    the top number of stack frames are stored for anaylsis. This setting has a major
    impact on the overhead introduced to the target VM during profiling.


    The updated configuration needs to be applied, which triggers an update to the
    instrumentation of the target VM. The configuration UI is shown in Figure [6-45](#479166_1_En_6_Chapter.xhtml#Fig45).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig45_HTML.jpg](Images/479166_1_En_6_Fig45_HTML.jpg)


    Figure 6-45


    Objects defined


    The other mode for defining the classes profiled for allocation is *Selected classes*.
    It is very similar to the *Defined classes* mode, besides the fact that classes
    for profiling are not defined by a pattern, but are selected from projects or
    jar files by selecting them explicitly using a simple UI. To start the selection
    process, you need to click the add button as shown in Figure [6-46](#479166_1_En_6_Chapter.xhtml#Fig46).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig46_HTML.jpg](Images/479166_1_En_6_Fig46_HTML.jpg)


    Figure 6-46


    Objects selected'
  trans: '

    ### 方法


    方法分析或执行分析是一种帮助理解应用程序运行时执行性能的工具。如果对服务器的请求耗时过长，对应用程序进行执行分析可能有助于找出瓶颈（还有其他技术，但这些可以在性能调优手册中进行更深入的研究）。


    使用方法启动分析会话将打开一个视图，类似于图 6-39 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig39_HTML.jpg](img/479166_1_En_6_Fig39_HTML.jpg)


    图 6-39


    方法视图实时显示


    如图所示，该视图包含两个部分，它们会实时更新。第一部分是*线程视图*，显示特定线程中大部分时间消耗在何处。第二部分（显示在底部）是一个视图，显示应用程序的*热点*，即哪些方法已被执行、执行频率以及它们在
    CPU 上运行了多长时间。这可以实时了解应用程序中正在发生的事情。由于可能运行着许多线程，并且会生成数千个方法的指标，因此可以通过*线程名称*或方法视图的*类名称*对这两个视图进行过滤。要打开视图底部的过滤栏，请单击视图上下文菜单中的**过滤**。过滤器支持不同类型的匹配：


    *   **包含**。显示所有完全限定类名包含过滤字符串的类。

    *   **不包含**。显示所有完全限定类名不包含过滤字符串的类。

    *   **正则表达式**。显示所有完全限定类名与作为正则表达式的过滤字符串匹配的类。


    除了这些过滤表达式之外，还有一些预定义的过滤器可用：


    *   JPA

    *   JavaEE

    *   JavaEE 服务器

    *   Java 反射

    *   Java SE


    由于*方法*分析会向被分析应用程序引入开销，因此配置要分析的方法非常重要。这可以使用右上角的齿轮图标来完成。这将打开一个配置区域，允许我们选择哪些方法将被检测以进行方法分析。默认配置如图
    6-40 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig40_HTML.jpg](img/479166_1_En_6_Fig40_HTML.jpg)


    图 6-40


    方法配置


    默认配置仅对方法分析使用采样分析技术。与检测分析相比，它的开销更小，但不够精确。该配置区分不同的类或方法集合。由于开销问题，最重要的模式是*已定义*类。这允许显式选择分析会话感兴趣的类，如图
    6-41 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig41_HTML.jpg](img/479166_1_En_6_Fig41_HTML.jpg)


    图 6-41


    方法分析仅限已定义的类


    甚至还可以通过使用*排除传出调用*选项来禁止分析整个树。完成所有这些设置并跟踪实时结果后，您可能希望更详细地了解实际发生的情况。您可以通过从工具栏创建结果快照来做到这一点，这将为快照打开一个单独的选项卡。显示的结果视图与实时视图差别不大，如图
    6-42 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig42_HTML.jpg](img/479166_1_En_6_Fig42_HTML.jpg)


    图 6-42


    方法结果快照


    在*方法*分析的实时视图中，还有一个不错的功能。使用工具栏中的一个按钮，您可以将实时视图切换为显示增量值，即所有绝对值都用作基线，并且仅显示相对于此基线的变化，因此只有在触发增量机制后执行的方法才会在视图中显示大于
    0 的值。这可用于消除分析数据中的启动开销。


    ### 对象


    *对象*分析是一种帮助分析内存分配和消耗的工具。当我们查看内存时，通常指的是 Java 堆，即堆上分配的对象。在对象分析模式下启动分析会话将打开一个实时视图，显示所有类实例（对象）的直方图。表格视图显示完全限定的类名、该类实例在堆上消耗的估计活动字节数，以及每个类在堆上的活动对象计数。该视图具有与*方法*分析中描述的相同的过滤选项。示例视图如图
    6-43 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig43_HTML.jpg](img/479166_1_En_6_Fig43_HTML.jpg)


    图 6-43


    对象视图实时显示


    与*方法*分析类似，*对象*分析可以配置分析器应跟踪哪些类实例。这里也可以使用采样分析模式，该模式仅按定义的时间间隔从堆中采集样本。但是，在这种模式下，如果许多分配死亡得足够快（即分配和垃圾回收发生在两个样本之间），分析器可能会错过它们。可以选择可能的配置类型如图
    6-44 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig44_HTML.jpg](img/479166_1_En_6_Fig44_HTML.jpg)


    图 6-44


    对象配置


    默认配置是对所有类使用低开销采样。如果您对内存问题的根源毫无头绪，这可能是合适的。仅对项目类使用采样模式可以减少跟踪的信息量，并将重点放在您自己的领域代码上。由于这可能还不够，例如，想象一个由核心
    Java 类的缓存实例引起的泄漏，Apache NetBeans 分析器除了采样模式外，还提供了两种检测分析模式。让我们先看看*已定义类*模式。它允许我们通过使用完全限定的类名来指定要分析的类列表。如果您需要分析来自某个包或包树的所有类，您可以使用星号或双星号作为这些用例的通配符。一旦您将需要的内容添加到列表中（每行一个模式），还有两个选项可供选择：


    *   **仅跟踪活动对象**。定义是仅分析活动对象，还是也分析已创建的对象（包括已释放的对象）。

    *   **限制分配深度**。定义为分配记录的堆栈深度。如果未选中，则始终记录完整的堆栈，否则仅存储顶部的若干堆栈帧用于分析。此设置对分析期间引入目标 VM
    的开销有重大影响。


    需要应用更新后的配置，这会触发对目标 VM 检测的更新。配置 UI 如图 6-45 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig45_HTML.jpg](img/479166_1_En_6_Fig45_HTML.jpg)


    图 6-45


    已定义对象


    另一种定义要分析分配情况的类的模式是*选定类*。它与*已定义类*模式非常相似，不同之处在于，要分析的类不是通过模式定义的，而是通过使用简单的 UI 从项目或
    jar 文件中显式选择来选定的。要开始选择过程，您需要单击添加按钮，如图 6-46 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig46_HTML.jpg](img/479166_1_En_6_Fig46_HTML.jpg)


    图 6-46


    选定对象

    '
- fmt: 'The `add` button opens a new dialog, allowing you to select classes from projects,
    which are opened in the IDE. The dialog consists of three lists (*Projects*, *Packages*,
    and *Classes*), which can all be filtered for faster access to the specific items.
    The content of the *Packages* list can be switched to contain the packages from
    the projects and or contain the packages from dependencies (the two toggle buttons
    below the list view). The *Classes* list shows the classes from the selected package.
    This list can also show inner classes and anonymous classes for selection (using
    the toggle buttons below the list view). The full UI is shown in Figure [6-47](#479166_1_En_6_Chapter.xhtml#Fig47).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig47_HTML.jpg](Images/479166_1_En_6_Fig47_HTML.jpg)


    Figure 6-47


    Objects selected from projects


    The dialog can be switched from the project-based selection to a jar file based
    selection of classes. Files/Folders to use can be added or removed using the buttons
    below the *Files* list, which displays the actual list of files and folders used.
    The *Packages* and *Classes* list work similar to the project-based selection
    list, as can be seen in Figure [6-48](#479166_1_En_6_Chapter.xhtml#Fig48).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig48_HTML.jpg](Images/479166_1_En_6_Fig48_HTML.jpg)


    Figure 6-48


    Objects selected from jars


    Using the live results is very powerful, for example, by making use of the delta
    mode by using the toolbar to switch the view to *Show absolute values*. This is
    similar to what is available for the *Methods* profiling, but even more useful
    for the profiling of the heap. The values shown depict the change in memory consumption
    starting with the moment of toggling the view. This opens the opportunity to baseline
    the actual memory consumption and just follow what happens in terms of memory
    allocation during execution of a special part of your application code. The live
    result shown in Figure [6-49](#479166_1_En_6_Chapter.xhtml#Fig49) depicts the
    additional power of an instrumented profiling session compared to the sampling
    mode, for example, a generational count is available on the right-hand side.


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig49_HTML.jpg](Images/479166_1_En_6_Fig49_HTML.jpg)


    Figure 6-49


    Objects live view with instrumentation


    Below the statistics line for every class, the recorded allocation stack traces
    can be shown by extending the tree view using the small arrows in front of every
    class name. The view will show a merged reverse stack trace tree, which shows
    how many instances have been allocated through which code path. This is crucial
    information for figuring out the culprit of a memory leak. An example of such
    a tree is shown in Figure [6-50](#479166_1_En_6_Chapter.xhtml#Fig50).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig50_HTML.jpg](Images/479166_1_En_6_Fig50_HTML.jpg)


    Figure 6-50


    Objects live view with allocation back traces


    Besides the live results, it is possible to create a result snapshot of the current
    *Objects* profiling session by using the using the toolbar action *Take snapshot
    of collected results.* This allows us to store the results for later consumption
    or comparison with other snapshots taken. An example snapshot view is shown in
    Figure [6-51](#479166_1_En_6_Chapter.xhtml#Fig51).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig51_HTML.jpg](Images/479166_1_En_6_Fig51_HTML.jpg)


    Figure 6-51


    Objects Snapshot Result


    ## Threads and Locks


    *Threads* and *Locks* profiling gives a more in-depth view on how your application
    code is really executed. Both modes together, combined by using the *Enable Multiple
    Modes* setting in the *Profile* drop-down menu, allow for analysis, if your code
    is really running on the CPU or is blocked by waiting for locks or other resources,
    for example, synchronous I/O.


    The *Threads* view shows a filterable list (see Methods section above for handling
    of the filter mechanism) with colored coded thread states. This allows us to see
    live feedback on how your application is using threads and if threads are really
    running or just blocked, for example, for a long time or frequently for a short
    time. A simple example of a live *Threads* view is shown in Figure [6-52](#479166_1_En_6_Chapter.xhtml#Fig52).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig52_HTML.jpg](Images/479166_1_En_6_Fig52_HTML.jpg)


    Figure 6-52


    Threads live view


    In contrast to the *Methods* and *Objects* profiling modes, the *Threads* mode
    does not offer a result snapshot feature. Now that you have seen threads being
    blocked from execution, the question is what blocks them from execution. The answer
    to this question can be given by activating *Locks* profiling. The *Locks* view
    gives a detailed view of why which thread has been blocked and for how long. A
    very simple example is shown in Figure [6-53](#479166_1_En_6_Chapter.xhtml#Fig53).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig53_HTML.jpg](Images/479166_1_En_6_Fig53_HTML.jpg)


    Figure 6-53


    Locks live view


    ### SQL Queries


    Profiling SQL Queries is just an additional layer of sugar. SQL profiling analyses
    of your application’s SQL queries collects the traces and execution times of the
    statements. It can also track the establishing of connections to the database,
    which may be useful in tuning your connection pool.'
