    The *Conditions*, describing the constraints the debugger considers for stopping
    at a reached breakpoint, are not the same for all breakpoint types, but most breakpoint
    types adhere to the following two constraints:


    *   **Condition**. Describes an expression (see evaluation) that must evaluate
    to true for the debugger to stop.


    *   **Break when hit count is**. Describes how often the breakpoint must be hit
    to make the debugger stop.


    There are different comparators available for the hit count:


    *   **Equal to**. The hit count must be equal to the defined value for the debugger
    to stop.


    *   **Greater than**. The hit count must be greater than the defined value for
    the debugger to stop.


    *   **Multiple of**. The hit count must be a multiple of the defined value for
    the debugger to stop.


    The full generic Conditions can be seen in Figure [6-21](#479166_1_En_6_Chapter.xhtml#Fig21).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig21_HTML.jpg](Images/479166_1_En_6_Fig21_HTML.jpg)


    Figure 6-21


    Generic Breakpoint conditions


    The *Settings*, describing the setup of the breakpoint type, are different for
    every breakpoint type so let’s go through them one by one.


    ### Class Breakpoints


    A *Class Breakpoint* is defined by a full qualified class name and the state of
    the class from the class loader perspective, which is observed by the debugger:


    *   **Class Load**. Debugger stops during class loading.


    *   **Class Unload**. Debugger stops during class unloading.


    *   **Class Load or Unload**. Debugger stops during class loading and unloading.


    The *Settings* configuration of the *Class Breakpoint* can be seen in Figure [6-22](#479166_1_En_6_Chapter.xhtml#Fig22).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig22_HTML.jpg](Images/479166_1_En_6_Fig22_HTML.jpg)


    Figure 6-22


    Class Breakpoint settings


    ### Exception Breakpoints


    An *Exception Breakpoint* stops in case of a thrown exception. It is defined by
    a full qualified exception class name and the state of the exception as observed
    by the debugger:


    *   **Caught**. Stops only if the exception is caught.


    *   **Uncaught**. Stops only if the exception is not caught.


    *   **Caught or Uncaught**. Stops in both cases.


    The *Settings* configuration of the *Exception Breakpoint* can be seen in Figure
    [6-23](#479166_1_En_6_Chapter.xhtml#Fig23).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig23_HTML.jpg](Images/479166_1_En_6_Fig23_HTML.jpg)


    Figure 6-23


    Exception Breakpoint settings


    Because the more interesting cases for configuring the breakpoint behavior of
    an *Exception Breakpoint* are not defined by the exception class, the *Conditions*
    of such an exception have an additional customization option:


    *   **Filter on Classes throwing the Exception**. Restricts the breakpoint to
    specific classes throwing the specified exception. Class names for *Match Classes*
    and *Exclude Classes* have to be specified full qualified, but an asterisk can
    be used at the end as a wildcard. Multiple patterns can be specified by separating
    these by commas.


    The *Conditions* configuration of the *Thread Breakpoint* can be seen in Figure
    [6-24](#479166_1_En_6_Chapter.xhtml#Fig24).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig24_HTML.jpg](Images/479166_1_En_6_Fig24_HTML.jpg)


    Figure 6-24


    Exception Breakpoint conditions


    ### Field Breakpoints


    A *Field Breakpoint* stops the debugged process if a field of a defined class
    is accessed. It is defined by a full qualified class name and respective field
    name and selecting in which access cases the debugger will stop:


    *   **Field Access**. Stops if the field is accessed, for example, read access.


    *   **Field Modification**. Stops if the field is written to.


    *   **Field Access or Modification**. Stops if the field is accessed or written
    to.


    The *Settings* configuration of the *Field Breakpoint* can be seen in Figure [6-25](#479166_1_En_6_Chapter.xhtml#Fig25).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig25_HTML.jpg](Images/479166_1_En_6_Fig25_HTML.jpg)


    Figure 6-25


    Field Breakpoint settings


    ### Line Breakpoints


    A *Line Breakpoint* is defined by a line in a source code file, which points to
    an executable line of code, that is, not a class, method, or field declaration.
    The source code file is referenced as an absolute path.


    The *Settings* configuration of the *Line Breakpoint* can be seen in Figure [6-26](#479166_1_En_6_Chapter.xhtml#Fig26).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig26_HTML.jpg](Images/479166_1_En_6_Fig26_HTML.jpg)


    Figure 6-26


    Line Breakpoint settings


    ### Method Breakpoints


    A *Method Breakpoint* is defined by a full qualified class name and a method specification,
    either a concrete method name or all methods of the defined class. In addition,
    it is required to specify when to stop:


    *   **Method Entry**. Stops before entering the method.


    *   **Method Exit**. Stops before exiting the method.


    *   **Method Entry and Exit**. Stops before entering and before exiting the method.


    The *Settings* configuration of the *Method Breakpoint* can be seen in Figure
    [6-27](#479166_1_En_6_Chapter.xhtml#Fig27).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig27_HTML.jpg](Images/479166_1_En_6_Fig27_HTML.jpg)


    Figure 6-27


    Method Breakpoint settings


    ### Thread Breakpoints


    Due to the nature of a *Thread Breakpoint*, there are only limited configuration
    options available. It can be defined when to stop:


    *   **Thread Start**. Stops if a new thread is started.


    *   **Thread Death**. Stops if a thread dies.


    *   **Thread Start or Death**. Stops on new thread starts and thread deaths.


    The *Settings* configuration of the *Thread Breakpoint* can be seen in Figure
    [6-28](#479166_1_En_6_Chapter.xhtml#Fig28).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig28_HTML.jpg](Images/479166_1_En_6_Fig28_HTML.jpg)


    Figure 6-28


    Thread Breakpoint settings


    The only condition that is usable for a *Thread Breakpoint* is the hit count.
    If you use this option, you will only get a stopped debugger for every hit count
    creations and or deaths of a thread. The *Conditions* configuration of the *Thread
    Breakpoint* can be seen in Figure [6-29](#479166_1_En_6_Chapter.xhtml#Fig29).


