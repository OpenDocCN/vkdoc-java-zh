    that applies the bindings between the view model and the HTML code. This is done
    in a static method or a static block.


    Bindings. `data-bind` can take values as shown in the below examples:


    `data-bind=`


    *   `"click: addNew"`


    *   `"event: {mouseover: enable, mouseout: disable"}`


    *   `"submit: validate"`


    *   `"enable: play"`


    *   `"disable: stop"`


    *   `"value: name"`


    *   `"textInput: description"`


    *   `"hasFocus: isSelected"`


    *   `"checked: completed"`


    *   `"options: ides, selectedOptions: chosenIdes"`


    *   `"template: templateName"`


    *   `"foreach: sortedAndFilteredTasks"`


    In Listing [8-13](#479166_1_En_8_Chapter.xhtml#PC16) we see a more realistic example
    of a view model that demonstrates the use of `ObservableArray`s (`array = true`).


    ```

    @Model(className = "TasksWindow", targetId = "", properties = {

    @Property(name = "tasks", type = Task.class, array = true)

    })

    public final class TasksWindowCntrl {

    @Model(className = "Task", targetId = "", properties = {

    @Property(name = "id", type = int.class),

    @Property(name = "description", type = String.class),

    @Property(name = "priority", type = int.class),

    @Property(name = "dueDate", type = String.class),

    @Property(name = "alert", type = boolean.class),

    @Property(name = "daysBefore", type = int.class),

    @Property(name = "obs", type = String.class),

    @Property(name = "completed", type = boolean.class)

    })

    public static class TaskModel {

    //...

    }

    }

    Listing 8-13

    Use of ObservableArrays

    ```


    `TasksWindow` contains a property `tasks` of type `Task`, which has an attribute
    `array = true` making it an observable array. *Observable arrays* let Knockout.js
    track lists of items. Knockout.js automatically updates any associated HTML elements
    whenever items are added to or removed from an observable array.


    Listing [8-14](#479166_1_En_8_Chapter.xhtml#PC17) shows an example binding.


    ```

    ...


    Listing 8-14

    Example binding of an observable array

    ```


    *Computed properties* are observable properties derived from other properties.
    This also means that whenever one of the Properties is depending on changes, the
    `ComputedProperty` changes as well. Computed properties are used wherever we wish
    to return a new value based on other properties (see Listing [8-15](#479166_1_En_8_Chapter.xhtml#PC18)).


    ```

    @ComputedProperty

    public static int numberOfTasksWithAlert(List tasks) {

    return listTasksWithAlert(tasks).size();

    }


    Listing 8-15

    Example binding of a computed property

    ```


    Functions perform actions but do not return a value (`void`) (see Listing [8-16](#479166_1_En_8_Chapter.xhtml#PC19)).


    ```

    @Function

    public static void removeTask(Tasks tasks, Task data) {

    tasks.getTasks().remove(data);

    }


    Listing 8-16

    Example binding of a function

    ```


    Knockout.js defines a number of binding contexts ([`https://knockoutjs.com/documentation/binding-context.html`](https://knockoutjs.com/documentation/binding-context.html)).


    A *binding context* is an object that holds data that you can reference from your
    bindings. While applying bindings, Knockout automatically creates and manages
    a hierarchy of binding contexts. The *root* level of the hierarchy refers to the
    ViewModel that called `applyBindings()` method.


    The following binding contexts are defined:


    *   `$root`: refers to the top-level ViewModel.


    *   `$data`: refers to the ViewModel object of the current context (can be omitted).


    *   `$parent`: refers to the parent ViewModel object (useful for nested loops).


    *   `$index`: contains the current item’s index in the array.


    In Listing [8-16](#479166_1_En_8_Chapter.xhtml#PC19) we call `$parent` because
    we are inside a loop iterating over `Task`s (see Listings [8-13](#479166_1_En_8_Chapter.xhtml#PC16)
    and [8-14](#479166_1_En_8_Chapter.xhtml#PC17)), and we refer to a function defined
    in the parent model.


    HTML/Java UI also supports *Knockout templates* ([`http://knockoutjs.com/documentation/template-binding.html%23note-2-using-the-foreach-option-with-a-named-template`](http://knockoutjs.com/documentation/template-binding.html%2523note-2-using-the-foreach-option-with-a-named-template)).


    The template binding has a name parameter. Knockout will look for a script tag
    with the same `id` as specified by the `templateName` computed property (see Listing
    [8-17](#479166_1_En_8_Chapter.xhtml#PC20)).


    ```

    @ComputedProperty

    static String templateName() {

    return "window";

    }


    Listing 8-17

    Example of a template binding

    ```


    HTML/Java UI gives the capability to display a modal HTML dialog. Listing [8-18](#479166_1_En_8_Chapter.xhtml#PC21)
    shows an example of displaying an alerts dialog, using `@HTMLDialog` annotation
    ([`https://bits.netbeans.org/10.0/javadoc/`](https://bits.netbeans.org/10.0/javadoc/)).


    ```

    @HTMLDialog(url = "TasksWindow.html")

    static void showAlertsDialog(String t) {

    new ShowAlertsDialog(t).applyBindings();

    }

    @Model(className = "ShowAlertsDialog", targetId = "", properties = {

    @Property(name = "text", type = String.class)})

    static final class ShowAlertsDialogCntrl {

    @ComputedProperty

    static String templateName() {

    return "showAlertsDialog";

    }

    }


    Listing 8-18

    Display a modal HTML dialog

    ```'
