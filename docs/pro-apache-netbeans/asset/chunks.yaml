    \nFigure 2-14  \nPalette Window for Java form and html form\n\n### Properties\
    \ Window\n\nElements (nodes) in `Projects`, `Files`, `Services`, `Documents`,\
    \ or `Navigator` windows have properties that can be viewed in the `Properties`\
    \ window as shown in Figure [2-15](#479166_1_En_2_Chapter.xhtml#Fig15). These\
    \ elements can be Java classes, Swing components, and so on.\n\nYou can click\
