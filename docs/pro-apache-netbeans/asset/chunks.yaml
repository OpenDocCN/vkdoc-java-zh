- fmt: "# 排版后的内容\n\nHaving one module that includes all the applications’ external\
    \ libraries has the benefit that we need to add only one new module to our module\
    \ suite and a single reference to it from the modules that need it. The drawback\
    \ is that if a module needs only one jar, it needs to reference all other jars\
    \ that are wrapped inside the *Libraries* module.\n\nWe shall wrap two java libraries\
    \ (a.k.a. `jar` files) inside this module: the `hsqldb.jar` that we downloaded\
    \ earlier in this chapter, and the *SwingX* library that is not included any longer\
    \ in the `ide/modules/ext/` folder. Download it instead from here ([`https://mvnrepository.com/artifact/org.swinglabs.swingx/swingx-all`](https://mvnrepository.com/artifact/org.swinglabs.swingx/swingx-all)).\n\
    \nLet’s create the module and add the external libraries that we will need for\
    \ the *TodoRCP* application:\n\n1.  Right-click the *Modules* folder icon of the\
    \ *TodoRCP* module suite and choose **Add New**. Type `Libraries` as the module\
    \ name and click **Next**. Type `lib` as the *Code Base Name* and then **Finish**.\n\
    \n2.  Right-click on the newly created module and select **Properties ➤ Libraries\
    \ ➤ Wrapped JARs**. Click on **Add JAR** and add the `swingx-all-x.x.x.jar`. Repeat\
    \ the procedure to the add `hsqldb.jar`.\n\n3.  Select the *API Versioning* category\
    \ from the left panel of the opened **Project Properties ➤ Libraries** dialog\
    \ box and make the following packages `public` by checking them:\n    *   `org.hsqldb`\n\
    \    *   `org.jdesktop.swingx`\n\n4.  After clicking on **OK**, clean and build\
    \ the *Libraries* module.\n\nThe *TodoRCP* module suite should now contain four\
    \ modules (see Figure [7-14](#479166_1_En_7_Chapter.xhtml#Fig14)).\n\n![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig14_HTML.jpg](Images/479166_1_En_7_Fig14_HTML.jpg)\n\
    \nFigure 7-14\n\nThe TodoRCP suite with all the modules\n\nThere is a plugin to\
    \ visualize the dependencies between modules. Download the *DisplayDependencies*\
    \ plugin from [`https://sourceforge.net/projects/netbeansmoddep/`](https://sourceforge.net/projects/netbeansmoddep/).\
    \ Click on **Tools ➤ Plugins** menu and then on the **Downloaded** tab. Click\
    \ on the **Add Plugins…** button and navigate to the location that you saved the\
    \ downloaded `1475781757_eu-dagnano-showdependencies.nbm` file. Click on **Install**\
    \ button and follow the wizard to install the plugin. A new button with tooltip\
    \ *Show Dependencies* is displayed on the toolbar. Click on a module or on the\
    \ module suite and then on the **Show Dependencies** button to view a graph like\
    \ the one in Figure [7-11](#479166_1_En_7_Chapter.xhtml#Fig11) (without all the\
    \ dependencies yet).\n\nCopy the `Task.java` from the *ToDo* Swing application\
    \ to the `todo.model` package of the *Model* module. To ease our development,\
    \ we shall use a mock *TaskManager* that stores the tasks to memory instead of\
    \ the database.\n\nThe *TaskManager* class is a *DAO (Data Access Object)*. Being\
    \ the only DAO on the application, it contains many methods that would otherwise\
    \ be in an abstract superclass. Its implementation is very simple, so there’s\
    \ lots of room for improvement. We can extract the following interface in *Model*\
    \ module based on the persistent *TaskManager* of the original article. Copy *TaskManager*\
    \ from *ToDo* application, inside the `todo.model` package of the *Model* module.\
    \ Select the class name inside the editor and click on menu **Refactor ➤ Extract\
    \ Interface**. Select only the methods shown in Figure [7-15](#479166_1_En_7_Chapter.xhtml#Fig15).\n\
    \n![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig15_HTML.jpg](Images/479166_1_En_7_Fig15_HTML.jpg)\n\
    \nFigure 7-15\n\nExtract Interface\n\nYou may adapt it a bit to look like the\
    \ code in Listing [7-11](#479166_1_En_7_Chapter.xhtml#PC25).\n\n```\npackage todo.model;\n\
    import java.util.List;\npublic interface TaskManagerInterface {\nvoid addTask(Task\
    \ task) throws ValidationException;\nvoid updateTask(final Task task) throws ValidationException;\n\
    void removeTask(final int id);\nList listAllTasks(boolean priorityOrDate);\nList\
    \ listTasksWithAlert() throws ModelException;\nvoid markAsCompleted(final int\
    \ id, final boolean completed);\n}\nListing 7-11\nTaskManagerInterface\n```\n\n\
    Copy `ValidationException` and `ModelException` classes from the *ToDo* application\
    \ to resolve the errors, too. Click now on the bulb on the left of the `TaskManagerInterface`\
    \ name and select **Implement Interface**. Give it the name *TaskManager* and\
    \ click **OK**. NetBeans generates a skeleton implementation. Refactor-move it\
    \ to a new package `todo.model.impl`. It is a good strategy to implement *TaskManager*\
    \ as a service provider of the `TaskManagerInterface` service (Listing [7-12](#479166_1_En_7_Chapter.xhtml#PC26)).\n\
    \n```\npackage todo.model.impl;\nimport java.util.*;\nimport todo.model.ModelException;\n\
    import todo.model.Task;\nimport todo.model.TaskManagerInterface;\nimport todo.model.ValidationException;\n\
    import org.openide.util.lookup.ServiceProvider;\n@ServiceProvider(service = TaskManagerInterface.class)\n\
    public class TaskManager implements TaskManagerInterface {\nprivate final List\
    \ tasks = new ArrayList();\npublic TaskManager() { // mock data\nfinal GregorianCalendar\
    \ cal = new GregorianCalendar(TimeZone.getTimeZone(\"Europe/Athens\"));\ncal.set(2019,\
    \ Calendar.JULY, 2, 10, 00, 00);\ntasks.add(new Task(1, \"Hotel Reservation\"\
    , 1, cal.getTime(), true));\ncal.set(2019, Calendar.JULY, 15, 16, 30, 00);\ntasks.add(new\
    \ Task(2, \"JCrete 2019\", 1, cal.getTime(), true));\ncal.set(2019, Calendar.JULY,\
    \ 5, 12, 45, 00);\ntasks.add(new Task(3, \"Reserve time for visit\", 2, cal.getTime(),\
    \ false));\n}\n@Override\npublic List listAllTasks(final boolean priorityOrDate)\
    \ {\nCollections.sort(tasks, priorityOrDate ? new PriorityComparator() : new DueDateComparator());\n\
    return Collections.unmodifiableList(tasks);\n}\n@Override\npublic List listTasksWithAlert()\
    \ throws ModelException {\nfinal List tasksWithAlert = new ArrayList (tasks.size());\n\
    for (Task task : tasks) {\nif (task.hasAlert()) {\ntasksWithAlert.add(task);\n\
    }\n}\nreturn Collections.unmodifiableList(tasksWithAlert);\n}\n@Override\npublic\
    \ void addTask(final Task task) throws ValidationException {\nvalidate(task);\n\
    tasks.add(task);\n}\n@Override\npublic void updateTask(final Task task) throws\
    \ ValidationException {\nvalidate(task);\nTask oldTask = findTask(task.getId());\n\
    tasks.set(tasks.indexOf(oldTask), task);\n}\n@Override\npublic void markAsCompleted(final\
    \ int id, final boolean completed) {\nTask task = findTask(id);\ntask.setCompleted(completed);\n\
    }\n@Override\npublic void removeTask(final int id) {\ntasks.remove(findTask(id));\n\
    }\nprivate boolean isEmpty(final String str) {\nreturn str == null || str.trim().length()\
    \ == 0;\n}\nprivate void validate(final Task task) throws ValidationException\
    \ {\nif (isEmpty(task.getDescription())) {\nthrow new ValidationException(\"Must\
    \ provide a task description\");\n}\n}\nprivate Task findTask(final int id) {\n\
    for (Task task : tasks) {\nif (id == task.getId()) {\nreturn task;\n}\n}\nreturn\
    \ null;\n}\nprivate static class PriorityComparator implements Comparator {\n\
    @Override\npublic int compare(final Task t1, final Task t2) {\nif (t1.getPriority()\
    \ == t2.getPriority()) {\nreturn 0;\n} else if (t1.getPriority() > t2.getPriority())\
    \ {\nreturn 1;\n} else {\nreturn -1;\n}\n}\n}\nprivate static class DueDateComparator\
    \ implements Comparator {\n@Override\npublic int compare(final Task t1, final\
    \ Task t2) {\nreturn t1.getDueDate().compareTo(t2.getDueDate());\n}\n}\n}\nListing\
    \ 7-12\nTaskManager as a service provider\n```"
