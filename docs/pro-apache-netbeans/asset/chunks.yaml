    ### 重构


    有时您想更改项目中某个特定元素（类、变量、方法）的名称，但这可能会产生连锁反应，因为它可能会破坏依赖关系，即依赖于该名称的其他元素。与其修改每个使用了该名称的文件，不如使用*重构*功能。重构一个元素会将所有出现该旧名称的地方替换为新名称。


    例如，假设您想将一个类从 *Animals* 重命名为 *Animal*。以下是让 IDE 为您完成此操作的步骤：


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig28_HTML.jpg](img/479166_1_En_2_Fig28_HTML.jpg)


    图 2-28


    重命名类重构窗口


    1.  将光标放在源编辑器中的类名上，然后按 `Ctrl-R`，或者右键单击并从弹出菜单中选择 **重构 ➤ 重命名**（参见图 2-28）。


    2.  如果您希望修改也应用于注释中的出现位置，请勾选**在注释上应用重命名**。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig29_HTML.jpg](img/479166_1_En_2_Fig29_HTML.jpg)


    图 2-29


    预览重构出现位置


    1.  输入类的新名称，然后按**预览**以预览所有出现位置，或按**重构**以直接应用重命名而不进行预览。IDE 将向您展示源文件的两种版本，如图 2-29
    所示。


    1.  一切看起来都好吗？然后按**执行重构**以应用修改。否则按**取消**。


    ### 比较文件


    编辑器提供了一个“差异”功能来处理查找两个文件之间差异的问题。例如，假设您有两个 *Animal* 类定义，每个定义位于不同的包中。执行以下操作以查看这些定义是否相同或不同：


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig30_HTML.jpg](img/479166_1_En_2_Fig30_HTML.jpg)


    图 2-30


    两个文件之间的差异


    1.  在源编辑器中打开两个类文件。


    2.  右键单击*项目窗口*中的一个源文件，然后选择 **工具 ➤ 比较...** 将出现一个对话框，显示在编辑器中打开的文件列表。


    3.  从“在编辑器中打开的文件”列表中选择第二个文件，以显示差异操作的结果。图 2-30 显示了如何使用绿色背景来指示一个文件中存在但另一个文件中缺失的代码行。


    ### 生成代码


    在编写 Java 应用程序时，您可以生成代码片段。IDE 提供了几种选择：使用*代码补全*功能、通过*代码生成*弹出菜单，或使用*重构*功能。代码补全功能可用于在
    Java 类主体中添加代码片段。例如，该功能可以帮助在类中生成访问器，您已为该类定义了希望提供给其他类的属性。


    图 2-31 展示了如何在 `Animal` 类中为 `name` 属性创建设置器函数。如果弹出菜单没有出现，请键入 `Ctrl+space`。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig31_HTML.jpg](img/479166_1_En_2_Fig31_HTML.jpg)


    图 2-31


    使用代码补全生成代码片段


    通过在编辑器中单击并按 `Alt-Insert`（或选择 **源 ➤ 插入代码**）来使用*代码生成*弹出菜单。例如，它有助于生成构造函数，如图 2-32
    所示。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig32_HTML.jpg](img/479166_1_En_2_Fig32_HTML.jpg)


    图 2-32


    代码生成弹出菜单


    得益于这个功能，您可以极其快速地轻松生成类的主体。它只需点击几下即可生成 getter 和 setter、`toString()`、`equals()` 和
    `hashCode()` 方法、覆盖超类的方法等。


    **添加属性**选项通过一个操作同时创建字段及其访问器。以下是*添加属性*对话框的输入示例（图 2-33）。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig33_HTML.jpg](img/479166_1_En_2_Fig33_HTML.jpg)


    图 2-33


    添加属性对话框


    生成访问器的第二种选择是选择 **重构 ➤ 封装**。IDE 将显示*封装字段*对话框（参见图 2-34）。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig34_HTML.jpg](img/479166_1_En_2_Fig34_HTML.jpg)


    图 2-34


    封装字段对话框


    选择一个或多个字段，或按**全选**按钮选择所有字段。然后按**重构**以封装这些字段（即，使用您选择的可见性生成访问器）。


    ### 使用代码模板


    IDE 通过代码模板提供预定义的代码片段来提供帮助。代码模板是长代码片段的缩写。


    要访问代码模板，请键入缩写并按 `Ctrl+Space`。这样做将展开完整的代码，如图 2-35 所示。您可以看到我键入了关键字 `while`。然后当我按下
    `Ctrl+Space` 时，NetBeans 建议了几个以相同关键字开头的代码片段模板。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig35_HTML.jpg](img/479166_1_En_2_Fig35_HTML.jpg)


    图 2-35


    while 的代码模板


    有预定义的缩写集及其模板可供您使用，或者您可以通过显示*选项*对话框（参见图 2-36）来自定义现有模板或添加您自己的模板，路径为 **工具 ➤ 选项 ➤
    编辑器 ➤ 代码模板**（在 Mac 上为 **NetBeans ➤ 偏好设置 ➤ 编辑器 ➤ 代码模板**）。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig36_HTML.jpg](img/479166_1_En_2_Fig36_HTML.jpg)


    图 2-36


    代码模板窗口


    ### 拆分窗口


    我们经常需要同时查看不同的源文件。通过*拆分*源编辑器，您可以轻松地查看两个文件。至少打开两个源文件后，单击一个文件的选项卡，然后将其拖到源编辑器窗口的最左侧、最右侧或底部。当您开始拖动时出现在选项卡周围的红色轮廓变为指示拆分窗口位置的矩形时，松开鼠标按钮。图
    2-37 显示了结果。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig37_HTML.jpg](img/479166_1_En_2_Fig37_HTML.jpg)


    图 2-37


    同时查看两个文件


    拆分窗口也适用于单个源文件。以下是将源文件拆分为两个视图的四种方法：


    *   在每个编辑器窗口的右侧，垂直滚动条上方，有一个小的加号图标，您可以拖动它以水平或垂直拆分窗口。


    *   使用菜单操作 **窗口 ➤ 配置窗口 ➤ 拆分文档 ➤ 水平或垂直**。


    *   右键单击文件的选项卡并选择**克隆**。


    *   右键单击文件的选项卡并选择**拆分 ➤ 垂直**或**拆分 ➤ 水平**。


    图 2-38 显示了在两个视图中编辑同一个源文件。这种编辑的好处是，您可以将一个视图定位在，例如，一个类定义上，以便在稍后编写文档中引用该类的代码时提醒自己该类是关于什么的。这是您可能希望在两个或多个选项卡中查看同一文件的众多原因之一。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig38_HTML.jpg](img/479166_1_En_2_Fig38_HTML.jpg)


    图 2-38


    单个文件拆分为两个视图

