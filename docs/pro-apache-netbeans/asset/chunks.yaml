    我们在清单 8-19、8-21 和 8-22 中已经展示了如何将`Presenter`与`@ActionReference`注解结合使用。通过使用`Presenter`，可以进一步自定义`Action`的显示方式。在`CallableSystemAction`中，可以重写以下方法：


    *   `public JMenu getMenuPresenter() // Presenter.Menu 接口`


    *   `public JPopupMenu getPopupPresenter() // Presenter.Popup 接口`


    *   `public Component getToolbarPresenter() // Presenter.Toolbar 接口`


    清单 8-24 展示了一个创建子菜单的示例。


    ```

    public final class MyAction extends AbstractAction

    implements Presenter.Menu {

    @Override

    public JMenuItem getMenuPresenter() {

    JMenu m = new JMenu();

    m.setIcon(this.getIcon());

    m.add(new JMenuItem(this));

    return m;

    }

    @Override

    public void actionPerformed(ActionEvent e) {

    // ...

    }

    }

    清单 8-24

    如何创建子菜单

    ```


    在清单 8-22 和 8-23 中，我们看到了 NetBeans 平台如何支持上下文相关的动作。为了获得更细粒度的支持，可以使用实现了`ContextAwareAction`接口的`CookieAction`。当选中的节点实现了某个特定的标记接口（`Cookie`）时，`CookieAction`会被激活。然后，它会在其`performAction()`方法中获取一个或多个选中的`Node`，并对它们执行操作。其`mode()`方法允许在单个（如清单
    8-21 所示）或多个 Cookie（即选中的对象）（如清单 8-22 所示）之间进行选择。清单 8-25 展示了一个`CookieAction`的示例。


    ```

    protected int mode() {

    return CookieAction.MODE_EXACTLY_ONE;

    // MODE_ALL, MODE_ANY, MODE_ONE, MODE_SOME

    }

    清单 8-25

    CookieAction 示例

    ```


    `Actions`类为菜单和工具栏的呈现器提供了辅助方法。它提供了许多静态辅助方法，例如，创建一个*始终启用*的动作（`Actions.alwaysEnabled(...)`）、一个`ContextAwareAction`（`Actions.callback(...)`）、各种`connect()`方法（允许你将菜单项、复选框等附加到动作上），以及通过编程方式定位特定动作的方法（`forID(String
    category, String id)`）。


    ## 总结


    在本章中，我们学习了 NetBeans 平台提供的用户界面组件：*窗口系统 API*、*节点 API* 以及*资源管理器与属性表 API*。窗口系统 API
    通过提供你开箱即用的所有必需功能，让你免去处理窗口布局和窗口动作的所有麻烦。*节点* API 以及*资源管理器与属性表* API 为你提供了真正的 MVC
    设计，以构建强大的 UI 组件来构建你的应用程序。*节点* API 允许你创建一次数据表示，然后由任意数量的资源管理器视图进行渲染。最后，*动作 API*
    构建在`ActionListener`接口之上，并借助*查找*的强大功能，让你能够专注于业务逻辑，而无需担心呈现和启用状态。


    在下一章中，我们将通过实现我们的 *TodoRCP* 应用程序来了解如何应用所有这些知识。


    # 9. 将应用程序移植到 NetBeans 平台


    让我们看看如何应用我们在前一章中学到的知识。在本章中，我们将继续将在第 7 章中开始的 Swing *ToDo* 应用程序移植到 NetBeans RCP。


    在第 7 章中，我们将应用程序模块化，并移植了*模型*部分（使用一个模拟的`TaskManager`类，该类将任务存储在内存中，而不是持久化存储）。在本章中，我们将移植*控制器*和*视图*部分。


    我们的 *ToDo* 应用程序由两个窗口组成，如图 8-7 所示。


    正如我们在第 6 章中提到的，我们将分三部分开发我们的应用程序：


    1.  构建用户界面的“静态”视觉原型。


    2.  构建应用程序的“动态”原型，编写用户界面事件和相关的业务逻辑代码，并根据需要创建自定义的 UI 组件。


    3.  编写持久化逻辑代码。


    ## 步骤 1 – 构建“静态”原型


    为了创建主窗口，我们不会像在 Swing 应用程序中那样创建一个`JFrame Form`，而是按照我们在前一章中学到的方法，在 NetBeans 平台中创建其等效组件，即一个`TopComponent`。


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig1_HTML.jpg](img/479166_1_En_9_Fig1_HTML.jpg)


    图 9-1


    创建新 TopComponent 的向导，步骤 2


    右键单击 *View* 模块，然后选择 **New ➤ Window**（见图 9-1）。


    向导会询问窗口位置。NetBeans IDE 提供了多种位置，如图 8-2 所示。按图 9-1 所示进行选择，然后点击 **Next**。


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig2_HTML.jpg](img/479166_1_En_9_Fig2_HTML.jpg)


    图 9-2


    创建新 TopComponent 的向导，步骤 3


    *类名前缀* 是将要创建的框架或面板的名称，同时还会创建一些其他帮助文件。提供名称“*Tasks*”（而不是 Swing 应用程序中的“*TasksWindow*”），如图
    9-2 所示，然后点击 **Finish**。


    会创建两个文件：`TasksTopComponent.java` 和 `TasksTopComponent.form`，并且该表单已在编辑器的*设计模式*中打开，同时打开的还有*组件面板*（图
    9-3）。


    如果你在*项目*选项卡中看到了 `TasksTopComponent.form` 文件，但打开时 NetBeans 提示无法识别该文件，你需要从 **Tools
    ➤ Plugins ➤ Installed** 中激活 *Java SE* 插件。


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig3_HTML.jpg](img/479166_1_En_9_Fig3_HTML.jpg)


    图 9-3


    设计视图中的 TasksTopComponent


    请注意左侧*项目*和*导航器*窗口的位置，以及中央的*编辑器*窗口。一个红色边框高亮显示了选中的组件（`TopComponent`）。*导航器*显示了`TopComponent`的所有可视和不可视组件，当你需要更改被其他组件隐藏或太小而无法在绘图区域中选中的组件的属性时，这非常方便。


    右侧是*组件面板*窗口，默认显示标准的 Swing 组件（你也可以添加第三方 JavaBeans）。此外，右侧还有*属性*窗口。属性按类别分组，以便于访问最常用的属性，已更改的属性其名称会以粗体高亮显示。


    要更改 IDE 的视觉布局，你可以将每个窗口拖到主窗口的另一个角落，甚至可以通过右键单击其选项卡并选择 **Float** 来让某些窗口浮动。


    点击 **Source** 按钮查看清单 8-1 的注解，并将其与图 9-1 和图 9-2 的对话框进行比较。注意 `mode = "editor"`（如果不是，现在正是更改它的机会）和
    `openAtStartup = true`（同样，如果不是，现在正是更改它的机会）。


    NetBeans IDE 的可视化编辑器允许开发者真正地以可视化方式开发应用程序。只需在`TopComponent`内部右键单击，然后选择 **Set Layout**
    菜单项。你会看到默认选择不是传统的 Swing/AWT 布局管理器，而是一个名为 *Free Design* 的东西。这意味着你正在使用 Matisse 可视化
    GUI 构建器。Matisse 将`TopComponent`配置为使用在 SwingLabs [`java.net`](http://java.net)
    项目中开发的`GroupLayout`布局管理器，该管理器已作为标准布局管理器包含在 Java SE 6 中。

