- fmt: "# Website\n\nThe most visible online presence for Apache NetBeans is the website.\
    \ The website is one of the areas where just about anyone can get involved, whether\
    \ it be someone very technical in coding or someone that is a very good editor\
    \ … the website can utilize talents from all directions. The main Apache NetBeans\
    \ website is accessible at the following URL: [`http://netbeans.apache.org`](http://netbeans.apache.org)\
    \ and the sources that compose the website are available on GitHub: [`https://github.com/apache/incubator-netbeans-website`](https://github.com/apache/incubator-netbeans-website).\
    \ The Apache NetBeans website GitHub repository actually contains sources for\
    \ [`netbeans.apache.org`](https://netbeans.apache.org) and also [`bits.netbeans.org`](https://bits.netbeans.org).\
    \ The `bits.netbeans.org` site is dedicated to Apache NetBeans release documentation.\n\
    \nThe best way to get started working with the Apache NetBeans website is to fork\
    \ the GitHub repository and clone it to your development machine. To fork the\
    \ repository, first log into GitHub with your account and then go to the Apache\
    \ NetBeans website GitHub repository and click on the button entitled “Fork” in\
    \ the upper right-hand side of the page. This will essentially create a copy of\
    \ the repository under your own GitHub account. That way, if you make changes\
    \ to the website, it will not affect the main Apache NetBeans website repository.\
    \ It is important to note that changes published to the Apache NetBeans website\
    \ repository are automatically deployed via Jenkins and integrated into the website.\
    \ Therefore, if a change is committed, it will be made available for all to see.\
    \ For this reason, it is essential to perform any work or modifications to the\
    \ website within your own fork, and then create a Pull Request from your fork\
    \ if you wish to have the work integrated into the main repository, and hence,\
    \ published to the web.\n\nOnce your fork has been cloned to your machine, you\
    \ can dig into the website sources. The website is primarily generated from Groovy\
    \ templates utilizing a Gradle build and a tool set known as Jbake to prepare\
    \ the site. In the end, the website is statically compiled by running a Gradle\
    \ build. There is also a Tomcat web server with the sources so that you can build\
    \ and run the website very easily while working on it. Performing changes to the\
    \ website is very easy to do by following the instructions located on the Apache\
    \ NetBeans website GitHub page and within the `README.asciidoc` files that are\
    \ packaged with the sources. In fact, there are such detailed instructions, I\
    \ recommend reviewing the documentation before beginning to work with the website\
    \ sources: [`https://github.com/apache/incubator-netbeans-website/tree/master/netbeans.apache.org`](https://github.com/apache/incubator-netbeans-website/tree/master/netbeans.apache.org)\n\
    \n## Making a Website Page Update\n\nTo get started, let’s walk through the steps\
    \ for making a simple change to the website, building it, and running it utilizing\
    \ the embedded Tomcat server. There are no installations that will need to be\
    \ made in order to build and run the site, other than having Java 8 installed\
    \ on your device. The Gradle build will take care of downloading all dependencies\
    \ required for the build.\n\nThere are different types of files that are used\
    \ to collectively create the website. A series of `asciidoc` documents is used\
    \ to formulate the website pages themselves, and Groovy Server Pages (gsp) are\
    \ used for the templates. Let’s assume that we need to make a change to the [`netbeans.apache.org`](https://netbeans.apache.org)\
    \ main page. To do so, traverse inside of the `netbeans.apache.org` folder contained\
    \ in the sources, and navigate to the `src/content` folder. This is where the\
    \ main content of the website resides. Modify the website index page by doing\
    \ the following:\n\n1.  Open up the `index.asciidoc` file in a text editor or\
    \ within Apache NetBeans.\n\n2.  Make a modification to the page. In this case,\
    \ I want to change the word “Participation” that resides within one of the cards\
    \ on the index page to “Participation!” Go to line 39 of the `index.asciidoc`\
    \ file and make the change.\n\n3.  Build the site by executing the following command\
    \ from within the `netbeans.apache.org` folder within a command line or terminal.\n\
    \n    1.  OS X and Linux: `./gradlew build`\n\n    2.  Windows: `gradlew preprocessContent\
    \ bake`\n\n4.  Once the build completes, you can see the resulting output within\
    \ the `netbeans.apache.org/build/bake` folder. Run the Tomcat server by executing\
    \ the following:\n\n    1.  OS X and Linux: `./gradlew run`\n\n    2.  Windows:\
    \ `gradlew run`\n\n5.  Once the Tomcat server is up and running, point your browser\
    \ to the following site to see the resulting output: `http://localhost:8080`\n\
    \nTo stop the server, press Ctrl+C from within the same terminal or command prompt,\
    \ or issue the `gradlew stop` command from a terminal or command prompt in the\
    \ `netbeans.apache.org` directory.\n\n## Making a Website Template Update\n\n\
    If you are interested in modifying the overall layout and structure of the website,\
    \ then it may make sense to modify one of the templates that is used for constructing\
    \ the pages. Templates can be modified by traversing inside of the `netbeans.apache.org/src/content/templates`\
    \ folder. Each of the templates is constructed of a Groovy Server Page (gsp).\
    \ These files can be opened and modified within a text editor or Apache NetBeans.\
    \ The general process for modifying a template page is the same as those in the\
    \ previous section. However, template modifications may span across a number of\
    \ generated pages since a single template may be applied to one or more pages\
    \ within the website.\n\n## Summary\n\nAs a community member, there are several\
    \ ways to collaborate and help contribute to the Apache NetBeans project without\
    \ even writing a single line of code. The issue tracker (JIRA) is the most obvious\
    \ place to begin, by submitting issues if any are found, or writing answers and\
    \ comments to help others in the tracker. The wiki is an ever-changing documentation\
    \ site that is integral to the success of Apache NetBeans. Community members are\
    \ requested to participate by adding documentation where it is needed or making\
    \ updates to any documentation that has changed over the years. To take a more\
    \ formal role as a contributor, work on the website and submit pull requests (PRs)\
    \ to modify the site. In the end, any amount of contribution will go a long way\
    \ toward helping to move the project forward into the future.\n\n## 14. The NetCAT\
    \ Program on Testing\n\nThe Apache *Net*Beans IDE *C*ommunity *A*cceptance *T*esting\
    \ (NetCAT) program ([`https://netbeans.apache.org/participate/netcat.html`](https://netbeans.apache.org/participate/netcat.html))\
    \ seeks to get early feedback on the main features and confirmation from the NetBeans\
    \ community that the quality of the product makes it ready for the official release.\
    \ The goal of this program is to get active Apache NetBeans community members\
    \ involved in testing the Apache NetBeans IDE development builds and providing\
    \ feedback on product usability, quality, and performance. In return, these volunteers\
    \ are given an opportunity to significantly impact the quality of the Apache NetBeans\
    \ IDE. The NetCAT program is about *quality acceptance* and *not* about feature\
    \ design. At the end of the program, you will be asked to submit a *Community\
    \ Acceptance (CA)* survey in which you can express your opinion as to whether\
    \ or not the new main features are ready for release.\n\n### Time Schedule\n\n\
    A typical NetCAT program takes around two months of activities, as described in\
    \ the following table.\n\n**Table 14-1 NetCAT Program Activities**\n\n| Start\
    \ Date | Description |\n|---|---|\n| 2019-02-01 | Preparation - schedule, pages,\
    \ Synergy (3 days) |\n| 2019-02-04 | NetCAT 11.0 invitation sent, participants\
    \ start joining |\n| 2019-02-07 | Synergy test run prepared |"
