  trans: '

    ### JDK 11 支持


    JDK 11 是自引入新发布周期以来 Java 的首个长期支持（LTS）版本。此版本包含了一些出色的新特性，Apache NetBeans 完全支持这些特性。JDK
    11 拥有多项新功能，从新的 `String` 方法到新的 HTTP 客户端。Apache NetBeans 对这些特性提供了全面支持。


    以新的 Java `String` 方法支持为例，IDE 将自动补全新增的方法。在下面的截图（图 3-3）中，您可以看到新的 `repeat()` 功能。


    ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig3_HTML.jpg](img/479166_1_En_3_Fig3_HTML.jpg)


    图 3-3


    ### JDK 12 支持


    该 IDE 还完全支持新的 HTTP 客户端。如下一张截图所示（图 3-4），`HttpClient` 可以在 Java SE 类中使用，并且 IDE 在编码时提供完整的自动补全支持。


    ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig4_HTML.jpg](img/479166_1_En_3_Fig4_HTML.jpg)


    图 3-4


    HttpClient 支持


    ### PHP


    Apache NetBeans IDE 完全支持 PHP 7.0、7.1、7.2 和 7.3。这使得用户能够利用一些最新的 PHP 进展来创建新的 PHP
    项目。PHP 成为 Apache NetBeans 的一部分已有多年，但直到 PHP 7.0，无需安装额外插件即可获得支持。自 Apache NetBeans
    10.0 起，PHP 已成为标准发行版的一部分。请参见图 3-5。


    ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig5_HTML.jpg](img/479166_1_En_3_Fig5_HTML.jpg)


    图 3-5


    PHP 新建项目对话框


    Apache NetBeans 编辑器支持 PHP 中的 `"void"` 类型等特性，以及 PHP 7.3 中的其他任何 PHP 增强功能。例如，它支持在函数调用中允许使用尾随逗号。这有助于避免意外忘记逗号，或者列表可能在某个时刻继续增长的情况。请参见图
    3-6。


    ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig6_HTML.jpg](img/479166_1_En_3_Fig6_HTML.jpg)


    图 3-6


    尾随逗号支持


    PHP 的另一个较新特性是支持多重捕获异常处理，Apache NetBeans 环境也支持此特性（图 3-7）。


    ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig7_HTML.jpg](img/479166_1_En_3_Fig7_HTML.jpg)


    图 3-7


    PHP 多重捕获异常处理


    通过使用原生调试器，PHP 开发者的工作也可以变得更加轻松。用户可以在某行代码上设置断点并运行调试器，然后应用程序将运行，一旦到达断点，编辑器将打开到该断点处，使开发者能够调试该时间点的变量值和状态。


    PHP 支持方面的所有这些进步，使得 Apache NetBeans 成为用于 PHP 开发的最重要的 IDE 之一。


    ## Apache NetBeans 11.0


    Apache NetBeans 11.0 版本包含对 Java EE 和 Gradle 的完全支持，以及对 JDK 12 特性的支持。


    ### JDK 12 支持


    Java 的发布节奏使得 JDK 每六个月发布一个新版本。因此，Apache NetBeans 的发布周期应使 IDE 能够持续包含对最新 JDK 的支持。也就是说，JDK
    12 支持已添加到 Apache NetBeans 11.0 中，包括 switch 表达式支持的预览版，以及对紧凑数字格式化的支持。这包括针对新的 `switch`
    支持的“转换为规则 switch”等提示。


    ### Java EE 支持


    在 Apache NetBeans 10.0 及之前版本中，如果用户希望使用 Java EE 特性，需要通过 Apache NetBeans 8.2 更新中心启用相关模块。这是因为
    Java EE 支持尚未成为 Apache NetBeans 发行版的一部分。从 Apache NetBeans 11.0 开始，完整的企业集群已被转移并成为
    Apache NetBeans 发行版的一部分。这意味着，开箱即用，Apache NetBeans 发行版就包含了对 Java EE 的完全支持，无需下载和安装任何额外模块。


    Apache NetBeans 11.0 不仅包含对 Java EE 的支持，还通过 Apache NetBeans 11.1 中添加的 Java EE 8
    支持，包含了对 Jakarta EE 8 的支持。新的支持允许用户使用 Java EE 8 创建一个基于 Maven 的 Jakarta EE/Java EE
    项目。它还允许用户安装符合 Java EE 8 标准的应用服务器容器，并通过 IDE 进行管理，例如 GlassFish 5.1。


    ### Gradle


    在之前的 Apache NetBeans 版本中，另一个需要启用的特性是 Gradle 支持。作为 Apache NetBeans 11.0 的一部分，Gradle
    支持已成为一等公民，因此可以开箱即用。现在可以开箱即用地打开 Gradle 项目，并且集成了 Gradle 任务导航器，允许通过双击来运行任务。这也允许用户使用
    Gradle 支持的单元测试框架，并运行、调试和测试……甚至包括单个方法。


    ## 结论


    Apache NetBeans IDE 随着每个版本的发布而不断进步，支持更新的 JDK 版本，并增加增强功能，使 IDE 对更广泛的开发者群体更有用。如果您有任何希望添加到
    Apache NetBeans 中的特性，请加入社区并贡献您的想法。现在，您已准备好开发桌面应用程序了。

    '
- fmt: '# 4. Developing Desktop Applications


    Apache NetBeans has excellent support for developing desktop applications. By
    desktop applications, we mean applications that do not require a web or application
    server (even though one can be used in the back end), are installed in the user’s
    machine, and provide a richer Graphical User Interface (GUI) than the browser.


    Historically, *Abstract Window Toolkit (AWT)* was the first GUI library released
    with JDK 1.0. The AWT is part of the Java Foundation Classes (JFC), the standard
    [API](https://en.wikipedia.org/wiki/Application_programming_interface) for providing
    a GUI for a Java program. AWT’s components (or widgets) are “heavyweight” or native,
    which means that their look and feel (L&F) depended on the platform they were
    running (when run on Windows, a button would look like a Windows button; when
    run on MacOSX, like a MacOSX button etc.). AWT was multi-threaded, had only basic
    support of GUI components, and could run in the browser without the need for a
    plugin.


    *Swing* was released with JDK 1.2 and was a replacement of AWT. Swing was developed
    to provide a more sophisticated set of “lightweight” GUI components (written entirely
    in Java and therefore platform independent) than the earlier Abstract Window Toolkit
    (AWT) ones. Swing provides a [look and feel](https://en.wikipedia.org/wiki/Look_and_feel)
    that emulates the look and feel of several platforms, and also supports a pluggable
    look and feel that allows applications to have a look and feel unrelated to the
    underlying platform. Swing follows a single-[threaded](https://en.wikipedia.org/wiki/Thread_%28computing%29)
    programming model; all GUI related code is executed in the *Event Dispatch Thread
    (EDT)*. Additionally, the framework provides a layer of abstraction between the
    code structure and the graphic presentation of a Swing-based GUI.


    *JavaFX* ([`https://openjfx.io/`](https://openjfx.io/)) is the most recent GUI
    library provided by Java to build rich GUIs or *Rich Internet Applications* (*RIAs*)
    that can run across a wide variety of devices. JavaFX abstracts the UI presentation
    (typically declared in an XML file – `.fxml`) from the actual logic (action events,
    etc.). This way one can use *Cascading Style Sheets* (*CSS*) to decorate the GUI
    without the need to recompile the application. JavaFX 1.0.2 was released in 2008.
    As of JDK 7u6 it has been integrated in the JDK. JavaFX 8 was included in JDK
    8; however, as of JDK 11, JavaFX has again been separated from the JDK. JavaFX
    is actively maintained by Gluon ([`https://gluonhq.com/`](https://gluonhq.com/)).
    While JavaFX is intended to be a replacement of Swing, both will stay on the market
    for quite some time.


    ## Apache NetBeans Support for Desktop Applications


    The Apache NetBeans IDE provides several tools to simplify the process of building
    GUIs as shown in Figure [4-1](#479166_1_En_4_Chapter.xhtml#Fig1).


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig1_HTML.jpg](Images/479166_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Apache NetBeans GUI Development tools


    * **GUI Builder**: this is where you design the GUI of your application. The GUI
    Builder, or *Matisse*, enables you to lay out forms by placing components where
    you want them and by providing visual feedback in the form of guidelines.

    * **Navigator window**: displays a tree hierarchy of all components contained
    in the currently opened form. These can be visual components and containers, such
    as buttons, labels, menus, panels, etc., as well as nonvisual components such
    as timers and data sources.

    * **Palette window**: contains groups of components or widgets that can be added
    to forms by drag and drop. The palette window can be customized to display its
    contents as icons only, or as icons with component names. With the help of the
    *Palette Manager* you add new components to the palette.

    * **Properties window**: allows changing the properties for the currently selected
    component, such as the displayed text, its size, etc. It also allows adding/modifying
    events and bindings.


    Apache NetBeans supports development of desktop applications using either AWT,
    Swing, or JavaFX. The visual design capabilities are among NetBeans’ strongest
    features. Building prototypes of the application’s UI helps end users to state
    their requirements, and that’s one of the reasons visual GUI builders became so
    popular.


    Typically, you create a new Java Application and then you add GUI components using
    wizards or by dragging and dropping widgets from the Palette.


    Before you proceed, either open an existing Java Application NetBeans project,
    or create a new *Java Application* project, as shown in Figure [4-20](#479166_1_En_4_Chapter.xhtml#Fig20),
    by selecting the **File ➤ New Project** menu item and clicking **Next**. In step
    2 of the wizard, provide a project name and choose a suitable project location
    (anywhere in your hard disk) as shown in Figure [4-21](#479166_1_En_4_Chapter.xhtml#Fig21).
    Then click **Finish**. Last, select the project or the *Source Packages* of the
    project in the *Projects* tab, and click on **File ➤ New File** as explained in
    the following sections.


    ### AWT Support


    Developing in AWT is very rare nowadays, and so it will not be covered in this
    book. However, we shall briefly describe Apache NetBeans’ support for AWT. You
    may create a number of AWT forms as shown in Figure [4-2](#479166_1_En_4_Chapter.xhtml#Fig2).
    You open this wizard by clicking on the menu **File ➤ New File**.


    * **Applet Form**: creates a new `java.applet.Applet`. *Applets* are small applications
    that can run inside a (Java-enabled) browser.

    * **Dialog Form**: creates a new `java.awt.Dialog` within an application or Applet.
    Dialogs can be *modal* (the dialog is blocking the application waiting for user
    input) or *modeless* (the dialog is not blocking the application waiting for user
    input).

    * **Frame Form**: creates a new form that is based on `java.awt.Frame` and is
    usually used as the top-level window within an application.

    * **Panel Form**: creates a `java.awt.Panel` that can be added inside AWT containers
    such as `Frame`s, `Dialog`s, or `Applet`s.


    Once you have added one of the above forms into your application, the Design editor
    appears in NetBeans along with the Palette. Figure [4-3](#479166_1_En_4_Chapter.xhtml#Fig3)
    shows the available widgets you can drag and drop onto the AWT form. AWT forms
    support different layouts, which you can set by right-clicking on the form and
    selecting **Set Layout** from the pop-up menu.


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig3_HTML.jpg](Images/479166_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    AWT GUI widgets


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig2_HTML.jpg](Images/479166_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    AWT GUI Forms'
  raw: '# 4. Developing Desktop Applications


    Apache NetBeans has excellent support for developing desktop applications. By
    desktop applications, we mean applications that do not require a web or application
    server (even though one can be used in the back end), are installed in the user’s
    machine, and provide a richer Graphical User Interface (GUI) than the browser.


    Historically, *Abstract Window Toolkit (AWT)* was the first GUI library released
    with JDK 1.0\. The AWT is part of the Java Foundation Classes (JFC), the standard
    [API](https://en.wikipedia.org/wiki/Application_programming_interface) for providing
    a GUI for a Java program. AWT’s components (or widgets) are “heavyweight” or native,
    which means that their look and feel (L&F) depended on the platform they were
    running (when run on Windows, a button would look like a Windows button; when
    run on MacOSX, like a MacOSX button etc.). AWT was multi-threaded, had only basic
    support of GUI components, and could run in the browser without the need for a
    plugin.


    *Swing* was released with JDK 1.2 and was a replacement of AWT. Swing was developed
    to provide a more sophisticated set of “lightweight” GUI components (written entirely
    in Java and therefore platform independent) than the earlier Abstract Window Toolkit
    (AWT) ones. Swing provides a [look and feel](https://en.wikipedia.org/wiki/Look_and_feel)
    that emulates the look and feel of several platforms, and also supports a pluggable
    look and feel that allows applications to have a look and feel unrelated to the
    underlying platform. Swing follows a single-[threaded](https://en.wikipedia.org/wiki/Thread_%2528computing%2529)
    programming model; all GUI related code is executed in the *Event Dispatch Thread
    (EDT)* . Additionally, the framework provides a layer of abstraction between the
    code structure and the graphic presentation of a Swing-based GUI.


    *JavaFX* *(*[`https://openjfx.io/`](https://openjfx.io/)*)* is the most recent
    GUI library provided by Java to build rich GUIs or *Rich Internet Applications*
    (*RIAs*) that can run across a wide variety of devices. JavaFX abstracts the UI
    presentation (typically declared in an XML file – `.fxml`) from the actual logic
    (action events, etc.). This way one can use *Cascading Style Sheets* (*CSS*) to
    decorate the GUI without the need to recompile the application. JavaFX 1.0.2 was
    released in 2008\. As of JDK 7u6 it has been integrated in the JDK. JavaFX 8 was
    included in JDK 8; however, as of JDK 11, JavaFX has again been separated from
    the JDK. JavaFX is actively maintained by Gluon ([`https://gluonhq.com/`](https://gluonhq.com/)).
    While JavaFX is intended to be a replacement of Swing, both will stay on the market
    for quite some time.


    ## Apache NetBeans Support for Desktop Applications


    The Apache NetBeans IDE provides several tools to simplify the process of building
    GUIs as shown in Figure [4-1](#479166_1_En_4_Chapter.xhtml#Fig1).


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig1_HTML.jpg](Images/479166_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Apache NetBeans GUI Development tools


    *   **GUI Builder**: this is where you design the GUI of your application. The
    GUI Builder, or *Matisse*, enables you to lay out forms by placing components
    where you want them and by providing visual feedback in the form of guidelines.


    *   **Navigator window**: displays a tree hierarchy of all components contained
    in the currently opened form. These can be visual components and containers, such
    as buttons, labels, menus, panels, etc., as well as nonvisual components such
    as timers and data sources.


    *   **Palette window**: contains groups of components or widgets that can be added
    to forms by drag and drop. The palette window can be customized to display its
    contents as icons only, or as icons with component names. With the help of the
    *Palette Manager* you add new components to the palette.


    *   **Properties window**: allows changing the properties for the currently selected
    component, such as the displayed text, its size, etc. It also allows adding/modifying
    events and bindings.


    Apache NetBeans supports development of desktop applications using either AWT,
    Swing, or JavaFX. The visual design capabilities are among NetBeans’ strongest
    features. Building prototypes of the application’s UI helps end users to state
    their requirements, and that’s one of the reasons visual GUI builders became so
    popular.


    Typically, you create a new Java Application and then you add GUI components using
    wizards or by dragging and dropping widgets from the Palette.


    Before you proceed, either open an existing Java Application NetBeans project,
    or create a new *Java Application* project, as shown in Figure [4-20](#479166_1_En_4_Chapter.xhtml#Fig20),
    by selecting the **File ➤ New Project** menu item and clicking **Next**. In step
    2 of the wizard, provide a project name and choose a suitable project location
    (anywhere in your hard disk) as shown in Figure [4-21](#479166_1_En_4_Chapter.xhtml#Fig21).
    Then click **Finish**. Last, select the project or the *Source Packages* of the
    project in the *Projects* tab, and click on **File ➤ New File** as explained in
    the following sections.


    ### AWT Support


    Developing in AWT is very rare nowadays, and so it will not be covered in this
    book. However, we shall briefly describe Apache NetBeans’ support for AWT. You
    may create a number of AWT forms as shown in Figure [4-2](#479166_1_En_4_Chapter.xhtml#Fig2).
    You open this wizard by clicking on the menu **File ➤ New File**.


    *   **Applet Form**: creates a new `java.applet.Applet`. *Applets* are small applications
    that can run inside a (Java-enabled) browser.


    *   **Dialog Form**: creates a new `java.awt.Dialog` within an application or
    Applet. Dialogs can be *modal* (the dialog is blocking the application waiting
    for user input) or *modeless* (the dialog is not blocking the application waiting
    for user input).


    *   **Frame Form**: creates a new form that is based on `java.awt.Frame` and is
    usually used as the top-level window within an application.


    *   **Panel Form**: creates a `java.awt.Panel` that can be added inside AWT containers
    such as `Frame`s, `Dialog`s, or `Applet`s.


    Once you have added one of the above forms into your application, the Design editor
    appears in NetBeans along with the Palette. Figure [4-3](#479166_1_En_4_Chapter.xhtml#Fig3)
    shows the available widgets you can drag and drop onto the AWT form. AWT forms
    support different layouts, which you can set by right-clicking on the form and
    selecting **Set Layout** from the pop-up menu.


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig3_HTML.jpg](Images/479166_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    AWT GUI widgets


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig2_HTML.jpg](Images/479166_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    AWT GUI Forms'
  trans: '

    # 4. 开发桌面应用程序


    Apache NetBeans 对开发桌面应用程序提供了出色的支持。这里所说的桌面应用程序，是指那些不需要 Web 或应用服务器（尽管后端可以使用）、安装在用户机器上、并提供比浏览器更丰富的图形用户界面（GUI）的应用程序。


    从历史上看，*抽象窗口工具包（AWT）* 是随 JDK 1.0 发布的首个 GUI 库。AWT 是 Java 基础类（JFC）的一部分，是为 Java 程序提供
    GUI 的标准 [API](https://en.wikipedia.org/wiki/Application_programming_interface)。AWT
    的组件（或控件）是“重量级”或原生的，这意味着它们的外观和感觉（L&F）取决于其运行平台（在 Windows 上运行时，按钮看起来像 Windows 按钮；在
    MacOSX 上运行时，则像 MacOSX 按钮等）。AWT 是多线程的，仅提供对 GUI 组件的基本支持，并且可以在浏览器中运行而无需插件。


    *Swing* 随 JDK 1.2 发布，是 AWT 的替代品。Swing 的开发目的是提供一套比早期抽象窗口工具包（AWT）组件更复杂的“轻量级”GUI
    组件（完全用 Java 编写，因此与平台无关）。Swing 提供了一种模拟多种平台外观和感觉的[外观和感觉](https://en.wikipedia.org/wiki/Look_and_feel)，并且支持可插拔的外观和感觉，允许应用程序拥有与底层平台无关的外观和感觉。Swing
    遵循单[线程](https://en.wikipedia.org/wiki/Thread_%2528computing%2529)编程模型；所有与 GUI
    相关的代码都在*事件分发线程（EDT）* 中执行。此外，该框架在代码结构和基于 Swing 的 GUI 的图形表示之间提供了一个抽象层。


    *JavaFX* *（*[`https://openjfx.io/`](https://openjfx.io/)*）* 是 Java 提供的最新 GUI 库，用于构建丰富的
    GUI 或*富互联网应用程序（RIA）*，这些应用程序可以在各种设备上运行。JavaFX 将 UI 呈现（通常在 XML 文件 – `.fxml` 中声明）与实际逻辑（动作事件等）分离开来。这样，您就可以使用*层叠样式表（CSS）*
    来装饰 GUI，而无需重新编译应用程序。JavaFX 1.0.2 于 2008 年发布。从 JDK 7u6 开始，它已被集成到 JDK 中。JavaFX 8
    包含在 JDK 8 中；然而，从 JDK 11 开始，JavaFX 再次与 JDK 分离。JavaFX 由 Gluon（[`https://gluonhq.com/`](https://gluonhq.com/)）积极维护。虽然
    JavaFX 旨在替代 Swing，但两者都将在市场上共存相当长一段时间。


    ## Apache NetBeans 对桌面应用程序的支持


    Apache NetBeans IDE 提供了多种工具来简化构建 GUI 的过程，如图 4-1 所示。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig1_HTML.jpg](img/479166_1_En_4_Fig1_HTML.jpg)


    图 4-1


    Apache NetBeans GUI 开发工具


    *   **GUI 构建器**：这是您设计应用程序 GUI 的地方。GUI 构建器，或称 *Matisse*，允许您通过将组件放置在所需位置，并以参考线的形式提供视觉反馈来布局表单。


    *   **导航器窗口**：显示当前打开表单中包含的所有组件的树形层次结构。这些可以是可视组件和容器，例如按钮、标签、菜单、面板等，也可以是非可视组件，例如计时器和数据源。


    *   **组件面板窗口**：包含可以通过拖放添加到表单中的组件或控件组。组件面板窗口可以自定义为仅显示图标，或显示图标及组件名称。借助*组件面板管理器*，您可以向组件面板添加新组件。


    *   **属性窗口**：允许更改当前所选组件的属性，例如显示的文本、大小等。它还允许添加/修改事件和绑定。


    Apache NetBeans 支持使用 AWT、Swing 或 JavaFX 开发桌面应用程序。可视化设计能力是 NetBeans 最强大的功能之一。构建应用程序
    UI 的原型有助于最终用户陈述他们的需求，这也是可视化 GUI 构建器如此受欢迎的原因之一。


    通常，您需要创建一个新的 Java 应用程序，然后使用向导或通过从组件面板拖放控件来添加 GUI 组件。


    在继续之前，请打开一个现有的 Java 应用程序 NetBeans 项目，或者创建一个新的 *Java 应用程序* 项目，如图 4-20 所示，方法是选择
    **文件 ➤ 新建项目** 菜单项，然后单击 **下一步**。在向导的步骤 2 中，提供项目名称并选择合适的项目位置（硬盘上的任意位置），如图 4-21 所示。然后点击
    **完成**。最后，在 *项目* 选项卡中选择项目或项目的 *源包*，然后点击 **文件 ➤ 新建文件**，具体操作将在以下章节中说明。


    ### AWT 支持


    如今使用 AWT 进行开发非常罕见，因此本书将不涉及此内容。不过，我们将简要介绍 Apache NetBeans 对 AWT 的支持。您可以创建多种 AWT
    表单，如图 4-2 所示。您可以通过点击菜单 **文件 ➤ 新建文件** 来打开此向导。


    *   **Applet 表单**：创建一个新的 `java.applet.Applet`。*Applet* 是可以在（支持 Java 的）浏览器中运行的小型应用程序。


    *   **对话框表单**：在应用程序或 Applet 中创建一个新的 `java.awt.Dialog`。对话框可以是*模态*的（对话框会阻塞应用程序，等待用户输入）或*非模态*的（对话框不会阻塞应用程序等待用户输入）。


    *   **框架表单**：创建一个基于 `java.awt.Frame` 的新表单，通常用作应用程序中的顶层窗口。


    *   **面板表单**：创建一个 `java.awt.Panel`，可以添加到 AWT 容器中，例如 `Frame`、`Dialog` 或 `Applet`。


    一旦您将上述任一表单添加到应用程序中，NetBeans 中就会出现设计编辑器以及组件面板。图 4-3 显示了您可以拖放到 AWT 表单上的可用控件。AWT
    表单支持不同的布局，您可以通过右键单击表单并从弹出菜单中选择 **设置布局** 来设置布局。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig3_HTML.jpg](img/479166_1_En_4_Fig3_HTML.jpg)


    图 4-3


    AWT GUI 控件


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig2_HTML.jpg](img/479166_1_En_4_Fig2_HTML.jpg)


    图 4-2


    AWT GUI 表单

    '
- fmt: '### Swing Support


    Similar to AWT, the *New File* wizard offers you the choices shown in Figure [4-4](#479166_1_En_4_Chapter.xhtml#Fig4).


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig4_HTML.jpg](Images/479166_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Swing GUI Forms


    * **JDialog Form**: creates a new `javax.swing.JDialog` within an application.
    Dialogs can be *modal* or *modeless*.

    * **JFrame Form**: creates a new form that is based on `javax.swing.JFrame`, which
    is usually used as the top-level form within an application.

    * **JInternalFrame Form**: creates a new form that is based on `javax.swing.JInternalFrame`,
    which is used to implement *multiple document interface (MDI)* applications. These
    applications contain multiple resizable windows that are all displayed within
    the bounds of the application window (see [`https://docs.oracle.com/javase/tutorial/uiswing/components/internalframe.html`](https://docs.oracle.com/javase/tutorial/uiswing/components/internalframe.html)).

    * **JPanel Form**: creates a `javax.swing.JPanel` that can be used within Swing
    containers such as `JFrame`s and `JDialog`s.

    * **JApplet Form**: creates a Swing applet that can be run from within a browser
    window that has the necessary Java Swing plugin. As applets have fallen out of
    favor and have been replaced by other technologies such as HTML5 and JavaScript,
    we won’t discuss them further in this book.

    * **Bean Form**: creates a new form based upon a JavaBean component.

    * **Application Sample Form**: creates a skeleton form application based on `javax.swing.JFrame`
    that contains the standard **File**, **Edit**, and **Help** menus created within
    the form. This can be a very useful starting point for the main window of your
    application.

    * **MDI Application Sample Form**: same as the previous skeleton form application,
    but it allows adding `JInternalFrame`s to create an MDI application.

    * **OK / Cancel Dialog Sample Form**: creates a sample dialog (either modal or
    modeless) containing **OK** and **Cancel** buttons. You can use this template
    to create message boxes and any other dialogs.


    Figure [4-5](#479166_1_En_4_Chapter.xhtml#Fig5) shows the available widgets in
    the palette to drag and drop onto a Swing form. You see the various widgets grouped
    in categories (e.g., Swing Containers, Swing Controls, Swing Menus, Swing Windows,
    and Swing Fillers).


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig5_HTML.jpg](Images/479166_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Swing GUI widgets


    The Apache NetBeans visual editor allows you to develop your GUIs by using drag
    and drop of components (or widgets) from the palette onto it. Just right-click
    inside the `JFrame` and select the **Set Layout** menu item (see Figure [4-6](#479166_1_En_4_Chapter.xhtml#Fig6)).
    You’ll see the default choice is not a traditional Swing/AWT layout manager; it’s
    something named *Free Design*. This means you are using the *Matisse* visual GUI
    builder, which was introduced in NetBeans 5. *Matisse* configures the `JFrame`
    to use the `GroupLayout` layout manager developed in the SwingLabs [java.​net](http://java.net)
    project.


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig6_HTML.jpg](Images/479166_1_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Swing layouts


    #### Aligning Components


    To help us lay out controls within a form, Apache NetBeans provides a toolbar
    (see Figure [4-7](#479166_1_En_4_Chapter.xhtml#Fig7)) along the top of the design
    view, containing tools to align and preview forms.


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig7_HTML.jpg](Images/479166_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    Swing GUI designer toolbar


    * **Source view** displays the source code for the form.

    * **Design view** displays the GUI designer.

    * **History** displays the source code local history and can be useful if you
    need to revert to previous versions.

    * **Selection mode**: allows components to be selected.

    * **Connection mode**: allows creating connections between two components so that
    an event on one component can trigger an event on another component.

    * **Preview design**: allows previewing how the form will be displayed at runtime.

    * **Align Left In Column**: allows multiple components to be left-aligned.

    * **Align Right In Column**: allows multiple components to be right-aligned.

    * **Center Horizontally**: allows multiple components to be centered horizontally.

    * **Align Top In Row**: allows multiple components to be top-aligned.

    * **Align Bottom In Row**: allows multiple components to be bottom-aligned.

    * **Center Vertically**: allows multiple components to be centered vertically.

    * **Change Horizontal Resizability**: resize the selected component horizontally
    rather than being anchored to the left and right of other components.

    * **Change Vertical Resizability**: resize the selected component vertically rather
    than being anchored to the top and bottom of other components.


    Matisse also allows a group of selected components to be centered down the axis
    of the first selected component. Horizontal and vertical centering are available.
    Multiple components must be selected; then all are centered on the widest selection.
    Another option allows centering components horizontally and vertically in their
    parent container. We shall see some examples later in this chapter.


    #### Anchoring Components


    As the name implies, anchoring a component to a position means that the component
    will stay in that position relative to other components or boundaries even if
    its container is resized.


    When we anchor a component, we are basically saying that when we resize the form,
    we want the component to stay aligned with another component. So, for example,
    if we anchor a `JLabel` to the bottom right of a `JFrame`, when we expand the
    `JFrame`, the label will stay at the bottom right. To indicate that a widget is
    anchored to another object, Apache NetBeans displays a dotted horizontal or vertical
    line, ending at the boundary that the component is anchored to. If a component
    is not anchored on a particular edge, a zigzagged line is displayed indicating
    that the location of the component may expand in the specified direction. In Figure
    [4-8](#479166_1_En_4_Chapter.xhtml#Fig8), the `JLabel` is anchored to the bottom
    right of the frame. There is, therefore, a dotted line between the label and the
    bottom and right edges of the `JFrame` and a zigzagged line between the left and
    top edges of the `JFrame`.


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig8_HTML.jpg](Images/479166_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Anchoring a label


    You may also right-click on the widget and select **Anchor ➤** (**Left, Right,
    Top, Bottom**) from the context menu.


    #### Resizing Components


    When we resize a form, anchored components move along to stay in their position
    while the form is resized, but they are not resized themselves.


    If we want to allow a component to resize when a form is resized, we must specify
    that the component can auto-resize. Right-click on the component and select the
    **Auto-Resizing** menu item and choose either *Horizontal* or *Vertical* (or both).
    Figure [4-9](#479166_1_En_4_Chapter.xhtml#Fig9) shows the `JLabel` of Figure [4-8](#479166_1_En_4_Chapter.xhtml#Fig8)
    that can be auto-resized both horizontally and vertically. You now notice that
    both zigzagged lines have been transformed to dotted lines.


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig9_HTML.jpg](Images/479166_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Auto-resizing a label


    You may also double-click on each of the surrounding empty spaces and define the
    exact size of the space using the *Edit Layout Space* dialog box.


    To set two or more widgets to the same size, select them, right-click any one
    of them, and choose **Set the Same Size ➤ Set Width** (or **Same Size ➤ Set Height**)
    from the contextual menu.'
