    ## Developing a JavaFX Application


    We shall develop the *Todo* application of Figure [4-19](#479166_1_En_4_Chapter.xhtml#Fig19)
    in JavaFX, too. We shall use a JDK with integrated JavaFX such as JDK 8 or 10.
    We shall see how to develop JavaFX applications with JDKs without JavaFX later.


    There are two ways to develop a JavaFX application, either programmatically, using
    Java (*JavaFX Application*); or declaratively, declaring the GUI in a special
    XML format, called FXML (*JavaFX FXML Application*). We shall choose the second
    way here, which has also the advantage that you can use the *SceneBuilder* to
    graphically design the GUI.


    Let’s get started. Create a new *JavaFX FXML Application* by clicking on **File
    ➤ New Project**, selecting the **Java with Ant ➤ JavaFX** category as shown in
    Figure [4-16](#479166_1_En_4_Chapter.xhtml#Fig16), and click **Next**. Use `TodoFX`
    as the project name and choose a suitable project location (anywhere in your hard
    disk). Modify the rest of the dialog box entries as shown in Figure [4-34](#479166_1_En_4_Chapter.xhtml#Fig34).
    Then click **Finish**.


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig35_HTML.jpg](Images/479166_1_En_4_Fig35_HTML.jpg)


    Figure 4-35


    New JavaFX application wizard


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig34_HTML.jpg](Images/479166_1_En_4_Fig34_HTML.jpg)


    Figure 4-34


    New JavaFX application wizard


    The *TodoFX* project’s layout is shown in Figure [4-35](#479166_1_En_4_Chapter.xhtml#Fig35).


    You can easily identify `Main`, the `.fxml` file that represents the main view
    (the tasks list in our case) and the respective `TaskMainController`. NetBeans
    saves you development steps by creating all these for you. You don’t need to create
    the view and the controller separately; they are created in a single step! Run
    the project; you should see a similar application like in Figure [4-36](#479166_1_En_4_Chapter.xhtml#Fig36).


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig36_HTML.jpg](Images/479166_1_En_4_Fig36_HTML.jpg)


    Figure 4-36


    Sample JavaFX application


    Apache NetBeans has created a full-blown sample JavaFX application for you. Double-click
    on `TaskMain.fxml`; the file will open inside *SceneBuilder* (see Figure [4-37](#479166_1_En_4_Chapter.xhtml#Fig37)).


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig37_HTML.jpg](Images/479166_1_En_4_Fig37_HTML.jpg)


    Figure 4-37


    SceneBuilder open from NetBeans


    If you need to create a JavaFX project using a JDK that doesn’t include JavaFX,
    like, for example, JDK 11 and later, you need to follow different steps as described
    in the *JavaFX and NetBeans* article ([`https://openjfx.io/openjfx-docs/#IDE-NetBeans`](https://openjfx.io/openjfx-docs/%2523IDE-NetBeans)).


    ### Note


    The Apache NetBeans JavaFX ant and Maven projects will be fixed to work correctly
    with JDK 11 and later versions in future Apache NetBeans versions.


    With *Scenebuilder* you can quickly design your GUI by using a simple drag and
    drop of widgets, in a similar way that Matisse allows you to build Swing GUIs.


    As this is not a book about JavaFX though, if you wish to develop *TodoFX* application,
    please follow this tutorial ([`http://wiki.netbeans.org/TodoFX`](http://wiki.netbeans.org/TodoFX)).


    ## Conclusion


    In this chapter you learned how to develop Java Desktop Applications using the
    Apache NetBeans IDE. NetBeans allows you to build desktop applications using either
    AWT, or Swing or JavaFX. To develop Swing applications, Apache NetBeans provides
    a very advanced GUI Builder that has the code name *Matisse*. We saw the capabilities
    of Matisse and actually saw how to build a prototype application with it.


    For more information about how to use the Matisse GUI Builder please refer to
    Chapter [11](#479166_1_En_11_Chapter.xhtml) of the “Developing Applications with
    NetBeans IDE” ([`https://docs.oracle.com/netbeans/nb82/netbeans/NBDAG/toc.htm`](https://docs.oracle.com/netbeans/nb82/netbeans/NBDAG/toc.htm))
    guide.


    We also saw how we can integrate the *SceneBuilder* with NetBeans in order to
    develop JavaFX applications. Apache NetBeans provides GUI builders to build web
    applications, too. But let’s wait until the next chapter.'
