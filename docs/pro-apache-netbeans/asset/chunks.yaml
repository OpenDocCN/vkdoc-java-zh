    ### 注意


    如果使用 Apache NetBeans 11.0 之前的版本，你需要安装“Java EE”插件才能创建新的 Web 应用程序项目。在 11.0+ 版本中，该插件已集成到
    IDE 中。


    让我们逐步开发一个简单的“Hello World”Web 应用程序。首先，打开“新建项目”对话框，选择“Java Web”类别，然后选择“Web 应用程序”项目类型。选择后，将显示“新建
    Web 应用程序”对话框。将 Web 应用程序命名为“HelloWorldWeb”，并为项目选择一个合适的存放位置（图 1-4）。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig4_HTML.jpg](img/479166_1_En_1_Fig4_HTML.jpg)


    图 1-4


    新建 Web 应用程序对话框


    点击“下一步”，然后选择要支持的应用程序服务器和“Java EE 版本”。在此示例中，选择了“Payara 5.183.1”服务器（参见如何向 Apache
    NetBeans 添加新服务器的章节），并选择“Java EE 7 Web”作为 **Java EE 版本**。保持**上下文路径**不变（图 1-5）。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig5_HTML.jpg](img/479166_1_En_1_Fig5_HTML.jpg)


    图 1-5


    服务器和设置


    “新建 Web 应用程序”向导的最后一部分是**框架**对话框。在此部分中，如果你想使用特定的 Java Web 框架，可以在此处选择它，以便为所选框架添加任何必需的依赖项和配置文件。在此示例中，不要选择任何内容，直接点击“完成”。该项目将出现在左侧菜单的“项目”导航器中，并且项目的
    `index.html` 文件将在编辑器中打开。该项目包含以下节点：“Web 页面”、“源包”、“库”和“配置文件”，如图 1-6 所示。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig6_HTML.jpg](img/479166_1_En_1_Fig6_HTML.jpg)


    图 1-6


    Java Web 项目结构


    此时，项目已准备好部署到指定的应用程序服务器，可以通过右键单击项目并选择“运行”来完成。选择“运行”后，指定的应用程序服务器将启动，应用程序将被编译和部署。包含
    HTML 文件的编辑器将提供编辑 HTML 的选项，如果创建了 CSS 或 JavaScript 文件，则编辑器将提供特定于这些文件类型的选项。当然，所有适用于
    Java SE 项目的功能也适用于 Java Web 项目。


    ## PHP 和其他语言


    尽管 Apache NetBeans 最初是为开发 Java 应用程序而创建的，但多年来社区已增加了对许多其他语言的支持。在 Apache NetBeans
    中支持出色的语言之一是 PHP。另一个支持良好的语言是 JavaScript。在 Apache NetBeans 10 中，PHP 在 IDE 中获得了完全支持，因此可以使用诸如多重捕获异常处理、可空类型、上下文相关词法分析器等特性。代码编辑器包含
    PHP 特定的功能，例如 void 返回类型的提示、不正确的非抽象方法的提示、严格类型声明的建议等。还支持 HTML 表单面板，以帮助开发 PHP Web
    表单。


    要创建 PHP 项目，在“新建项目”➤“PHP”类别下有几个选项。选项如下：“PHP 应用程序”、“基于现有源的 PHP 应用程序”和“来自远程服务器的 PHP
    应用程序”。第一个选项允许从头开始创建一个 PHP 项目，为调试和运行项目提供了灵活性。第二个选项“基于现有源的 PHP 应用程序”允许将现有的 PHP 项目导入到标准
    IDE 项目中并立即开始使用。第三个选项允许下载一个远程项目，并为其创建一个标准 IDE 项目。第三个选项还会自动配置新创建的标准 IDE 项目，使其自动将本地更改上传到远程服务器。


    ## Maven 支持


    Java 应用程序最流行的构建系统是 Apache Maven。因此，Apache NetBeans 对此构建系统提供了一流支持也就不足为奇了。IDE 包含各种基于
    Apache Maven 项目格式的入门项目。任何 Maven 项目都可以在 Apache NetBeans IDE 中打开，并且会立即被识别，从而可以开始开发。


    要在 Apache NetBeans 中打开现有的 Maven 项目，只需使用文件浏览器浏览到该项目并打开即可。IDE 将自动检测语言类型，并使用与所选项目相关的模板打开一个项目。例如，如果打开一个
    Java SE Maven 项目，则将使用 Java SE Apache NetBeans 项目模板。


    使用 Maven，项目依赖项会在构建项目时被下载并添加到生成的归档文件中。因此，当在 Apache NetBeans 中使用“与依赖项一起构建”选项时，Maven
    正是这样做的。通过右键单击项目导航器中的“依赖项”节点并选择“添加依赖项”，也可以轻松地向项目添加依赖项（图 1-7）。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig7_HTML.jpg](img/479166_1_En_1_Fig7_HTML.jpg)


    图 1-7


    添加 Maven 依赖项


    点击“添加依赖项…”选项后，将出现“添加依赖项”对话框，允许轻松搜索远程或本地 Maven 仓库中的依赖项（图 1-8）。当向项目添加依赖项时，关联的项目
    POM 文件会被修改以包含该依赖项，这样用户就不必手动修改 XML。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig8_HTML.jpg](img/479166_1_En_1_Fig8_HTML.jpg)


    图 1-8


    添加依赖项对话框


    其他 Maven 支持功能包括：能够在 Maven 构建中集成 SureFire 测试；将 Apache Maven 用作各种项目类型（包括其他 JVM 语言、Apache
    NetBeans 插件等）的构建系统；以及通过依赖项的自动补全功能轻松编辑 POM 文件。

