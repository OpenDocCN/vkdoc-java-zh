- fmt: '### Heap Walker


    `Heap Walker`是一个用于分析堆转储的工具集，这些堆转储通过`OpenJDK`内部堆转储机制获取（也可以在性能分析过程中通过某些操作触发）。它是一个非常彻底的分析工具，具有多种剖析堆转储的能力。


    首先，有一个`Summary`视图，它按多个类别显示与堆转储相关的相关数据：


    - **Basic Info**。显示基本信息，例如文件大小、转储日期。

    - **Environment**。显示环境信息；例如，快照是在哪个操作系统上获取的；JVM的供应商和版本等详细信息。

    - **System properties**。显示被转储JVM的所有系统属性。这些属性内联显示在视图的实际区域中。

    - **Threads at the heap dump**。显示与堆转储一起获取的线程转储。线程转储内联显示在视图的实际区域中。

    - **Application windows**。列出所有顶级Swing窗口，并可直接访问`Instances`视图中的实例。

    - **Biggest Objects**。触发对堆上最大对象的确定，基于其对象树（即属于该对象的所有内容）的保留大小。由于需要计算转储中所有对象的保留大小，此操作可能需要一些时间。


    `Summary`视图的示例如图[6-54](#479166_1_En_6_Chapter.xhtml#Fig54)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig54_HTML.jpg](Images/479166_1_En_6_Fig54_HTML.jpg)


    图6-54 Heap Walker Summary


    下一个视图是`Classes`视图。它显示堆上类的实例的直方图。表格视图可以按实例数、大小或类名排序。视图底部的过滤器允许更快地向下钻取，例如，仅查找领域类的实例，而不是JDK核心类的实例。有一个初始隐藏的列，用于显示保留大小。如前所述，计算可能是一个耗时的操作，因此该列默认隐藏，尽管该信息有时确实很有帮助。一个简单的示例如图[6-55](#479166_1_En_6_Chapter.xhtml#Fig55)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig55_HTML.jpg](Images/479166_1_En_6_Fig55_HTML.jpg)


    图6-55 Heap Walker Classes


    除了统计分析之外，此视图还有一个有趣的操作——`Compare with another heap dump`。它会打开一个对话框，让您选择另一个堆转储，可以是已加载的，也可以是从文件加载的。如果您正在分析一个项目，对话框会自动检测可比较的转储；如果您从文件加载，则需要自行处理。加载界面如图[6-56](#479166_1_En_6_Chapter.xhtml#Fig56)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig56_HTML.jpg](Images/479166_1_En_6_Fig56_HTML.jpg)


    图6-56 Heap Walker Load Comparison Heap Dump


    加载转储后，视图会切换到一个增量比较视图，显示在比较的堆转储中发现了多少更多或更少的类实例。如果您完成了差异分析，可以将视图重置为原始状态。一个简单的比较示例如图[6-57](#479166_1_En_6_Chapter.xhtml#Fig57)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig57_HTML.jpg](Images/479166_1_En_6_Fig57_HTML.jpg)


    图6-57 Heap Walker Classes Comparison


    在`Classes`视图中双击一个类会打开`Instances`视图，显示该类的所有实例列表。该视图实际上与`Debugger`部分中描述的`Instances`视图相同。左上角显示可用的实例（如果实例太多无法以平面列表显示，则会进行分组），左下角显示对象实例的值表示（如果可能）。右侧，在`Fields`视图中显示所选实例的结构，其下方是`References`视图，显示该实例向上到垃圾回收根的引用链，该引用链使实例在堆上保持存活。如果出现内存泄漏，并且不清楚为什么某个实例不会被垃圾回收（例如，某个静态字段持有对该实例的强引用），那么这些信息至关重要。在`Instances`视图中显示性能分析结果的示例如图[6-58](#479166_1_En_6_Chapter.xhtml#Fig58)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig58_HTML.jpg](Images/479166_1_En_6_Fig58_HTML.jpg)


    图6-58 Heap Walker Instances


    最后一个视图是`OQL Console`。此视图允许您使用特殊的`OQL`语法对堆进行交互式分析查询。右下角的`Saved Queries`视图中已经提供了一些示例查询。右下角的`Query
    Editor`提供代码补全功能，以简化创建新查询的过程，这些查询可以保存以供以后重用。执行查询后，结果将显示在`Query Results`视图（即`OQL
    Console`视图的上半部分）中。查询结果始终是一个实例列表，可以在`Instances`视图中选择和进行分析。当存在大量相同对象的实例，并且您想找出其中的一个子集（例如，所有空映射）时，使用`OQL
    Console`尤其有用。使用`OQL Console`的示例会话如图[6-59](#479166_1_En_6_Chapter.xhtml#Fig59)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig59_HTML.jpg](Images/479166_1_En_6_Fig59_HTML.jpg)


    图6-59 Heap Walker OQL


    ## Summary


    在本章中，我们详细了解了Apache NetBeans的两颗明珠：`Debugging`和`Profiling`。


    您已经学会了如何使用调试器来解决应用程序代码中的问题、调试多线程应用程序以及从调试器与应用程序进行交互。


    在出现性能问题时，我们向您展示了如何分析应用程序，以了解底层的内存分配和执行性能行为。我们向您介绍了内置功能，这些功能可帮助您分析在性能分析运行期间收集的数据。


    本章中展示的这两个功能都易于使用，并且应该成为您开发者工具包的一部分。现在，我们将继续进入第二部分“Extending Apache NetBeans”。


    # Part II Extending Apache NetBeans'
  raw: '### Heap Walker


    The *Heap Walker* is a tool set for analyzing heap dumps taken with the OpenJDK
    internal heap dump mechanism (can also be triggered using some actions during
    profiling). It is a very thorough analysis tool with lots of capabilities for
    dissecting the heap dump.


    First there is a *Summary* available showing relevant data concerning the heap
    dump in multiple categories:


    *   **Basic Info**. Displays basic information, for example, file size, date of
    dump.


    *   **Environment**. Displays information about the environment; where the snapshot
    was taken on, for example, operating system; JVM details as vendor and version.


    *   **System properties**. Shows all system properties of the dumped JVM. The
    properties are shown inlined in the actual section of the view.


    *   **Threads at the heap dump**. Shows a thread dump taken together with the
    heap dump. The thread dump is shown inlined in the actual section of the view.


    *   **Application windows**. Lists all top-level Swing windows, with direct access
    to the instance in the *Instances* view.


    *   **Biggest Objects**. Triggers the determination of the biggest objects on
    the heap, based on the retained sizes of its object tree, that is, everything
    belonging to the object. This operation may take some time, due to the need for
    the calculation of the retained size of all objects in the dump.


    An example of the *Summary* view is shown in Figure [6-54](#479166_1_En_6_Chapter.xhtml#Fig54).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig54_HTML.jpg](Images/479166_1_En_6_Fig54_HTML.jpg)


    Figure 6-54


    Heap Walker Summary


    The next view is the *Classes* view. It displays the histogram of instances of
    classes on the heap. The tabular view can be sorted by instances, size, or name
    of the class. A filter at the bottom of the view allows for a faster drill down,
    for example, just looking for instances of your domain classes not JDK core classes.
    There is an initial hidden column, which would display the retained size. As already
    described, the computation can be a lengthy operation, so this column is hidden
    by default, although the information is sometimes really helpful. A simple example
    is shown in Figure [6-55](#479166_1_En_6_Chapter.xhtml#Fig55).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig55_HTML.jpg](Images/479166_1_En_6_Fig55_HTML.jpg)


    Figure 6-55


    Heap Walker Classes


    Besides the statistical analysis, there is one interesting action associated with
    this view – *Compare with another heap dump* . It opens a dialog to let you select
    another heap dump, either already loaded or from a file. If you are profiling
    a project, the dialog automatically detects comparable dumps; if you load them
    from file, you need to take care of that for yourself. The loading UI is shown
    in Figure [6-56](#479166_1_En_6_Chapter.xhtml#Fig56).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig56_HTML.jpg](Images/479166_1_En_6_Fig56_HTML.jpg)


    Figure 6-56


    Heap Walker Load Comparison Heap Dump


    Once the dump is loaded, the view switches to a delta comparison view telling
    how many more or less instances of a class have been found in the comparison heap
    dump. If you are done analyzing the difference, there is the possibility to reset
    the view to the original state. A simple comparison is shown in Figure [6-57](#479166_1_En_6_Chapter.xhtml#Fig57).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig57_HTML.jpg](Images/479166_1_En_6_Fig57_HTML.jpg)


    Figure 6-57


    Heap Walker Classes Comparison


    Double-clicking on a class in the *Classes* view opens the *Instances* view showing
    a list of all instances of this class. The view is practically identical to the
    *Instances* view described in the *Debugger* section. The upper-left corner shows
    the instances available (grouped if there are too many for a flat list), the lower-left
    corner shows a value representation of the object instance if possible. On the
    right-hand side the structure of the selected instance is shown in the *Fields*
    view and below this is the *References* view showing the reference chain of this
    instance up to the garbage collection root, which keeps the instance alive on
    the heap. This is critical information if a memory leak appears and it is not
    quite clear, why some instance will not get garbage collected, for example, some
    static field holding a strong reference to the instance. An example showing a
    profiling result in the *Instances* view can be found in Figure [6-58](#479166_1_En_6_Chapter.xhtml#Fig58).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig58_HTML.jpg](Images/479166_1_En_6_Fig58_HTML.jpg)


    Figure 6-58


    Heap Walker Instances


    The final view is the *OQL Console*. This view allows you to do an interactive
    analysis using a special OQL syntax for querying the heap. There are some queries
    as examples already available on the lower right-hand side in the *Saved Queries*
    view. The *Query Editor* on the lower right offers code completion to simplify
    creating new queries, which can be saved for later reusage. Once you execute a
    query, the result will be shown in the *Query Results* view, the upper half of
    the *OQL Console view* . The result of a query is always a list of instances,
    which can be selected and analyzed in the *Instances* view. The usage of the *OQL
    Console* is especially interesting if there are a lot of instances of the same
    object and you want to figure out a subset of those, for example, all empty maps.
    An example session with the OQL Console is shown in Figure [6-59](#479166_1_En_6_Chapter.xhtml#Fig59).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig59_HTML.jpg](Images/479166_1_En_6_Fig59_HTML.jpg)


    Figure 6-59


    Heap Walker OQL


    ## Summary


    In this chapter we had a detailed look at two of the Apache NetBeans crown jewels,
    *Debugging* and *Profiling*.


    You have learned how to use the debugger to tackle issues in your application
    code, debug multi-threaded applications, and interact with your application from
    the debugger.


    In case of performance problems, we showed you how to profile your application
    to understand the underlying memory allocation and execution performance behavior.
    We introduced you to the built-in features, which help you analyze the data collected
    during the profiling runs.


    Both of the features shown in this chapter are easy to use and should be part
    of your developer tool belt. Now we will move on to Part II, “Extending Apache
    NetBeans.”


