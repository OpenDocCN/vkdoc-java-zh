    ### 关于作者与技术审校者


    ### 关于作者


    ### 关于技术审校者


    # 第一部分 使用 Apache NetBeans


    # 1. 什么是 Apache NetBeans


    一项技术能够席卷全球并持续二十多年成为技术领域的重要部分，这种情况并不常见。然而，Java 语言正是少数这样的技术之一。Java 编程语言最初由 Sun Microsystems
    于 1995 年开发，多年来已发展成为一个庞大的生态系统。Java 虚拟机（JVM）是一台由规范定义的虚拟计算机，Java 编程语言可用于编写在 JVM 上运行的应用程序。JVM
    几乎可以安装到市面上任何计算机或硬件设备上。因此，JVM 已安装在全世界数百万台设备上，并且已有数十种不同的编程语言构建在 JVM 之上，这些语言编译成 Java
    字节码，使开发者能够使用不同的语言语法在 JVM 上运行。这意味着什么？坦率地说，这意味着 JVM 和 Java 无处不在，人们可以使用多种语言编写几乎能在任何地方运行的应用程序。Java
    是一个始于 1995 年的生态系统，并且将在未来长期存在。


    作为最著名的开发平台之一的开发者，人们可以通过多种不同的方式开发应用程序。可以在文本编辑器中编写 Java 代码，通过终端使用 `java` 可执行文件编译并运行，然后继续工作。也可以完全通过终端创建文件和项目库，无需使用任何专门的开发工具。然而，尽管可以这样做，但如果没有代码编辑器或包含项目系统的“开发环境”，开发过程可能会变得繁琐，而
    Apache NetBeans 正是 Java 平台上最流行的开发环境之一，它有助于简化开发。虽然 Apache NetBeans 是一个出色的开发工具，但它远不止是一个编辑器。Apache
    NetBeans 是一个全面的开发工具，支持多种语言；它是一个用于创建富客户端应用程序的开发平台；同时也是一个充满活力的开源社区，拥有来自全球的成员。


    ## Apache NetBeans 的发展历程


    1996 年，在布拉格查尔斯大学数学与物理学院的指导下，一个学生项目启动了。该项目旨在让 Java 开发变得更加容易，为代码提供语法编辑器，帮助减少错误并加快编程时的开发速度。它允许用户只需点击几下按钮就能编译和构建整个项目。该项目最初名为
    Xelfi，1997 年围绕该项目成立了一家公司，并将其更名为 NetBeans IDE。Sun Microsystems 非常喜欢这个项目，于 1999
    年收购了它，并在一年后将 NetBeans IDE 开源。


    Sun Microsystems 收购 Apache NetBeans 后，其用户群和社区开始蓬勃发展。由于 IDE 是开源的，当时主要由 Sun Microsystems
    开发和维护的社区能够提供补丁、增强功能等。然而，NetBeans 的整体路线图和方向由商业实体控制。这未必是坏事，因为它有助于促进 IDE 和整个 Java
    生态系统的发展，因为 NetBeans 同时面向初学者和经验丰富的 Java 开发者。


    NetBeans 是 Oracle 于 2010 年 1 月从 Sun Microsystems 收购的投资组合的一部分。作为该投资组合的一部分，Oracle
    努力推动 NetBeans 成为首个支持 Java SE 和 Java EE 最新特性的 IDE。Oracle 还致力于使 NetBeans 成为支持多种语言的
    IDE；他们甚至聘请了 Python 和 Ruby 开发者来帮助促进这些语言在 JVM 上的对应版本，即 Jython 和 JRuby。作为该计划的一部分，NetBeans
    IDE 通过使用单独安装的 NetBeans 模块获得了对这些语言的支持。由于 NetBeans 是作为模块化 IDE 开发的，因此随着时间的推移，可以轻松添加功能，而不会增加核心
    IDE 的占用空间。


    Oracle 在推动 NetBeans 发展方面做得非常出色：它仍然是一个开源 IDE，社区也发挥了重要作用。然而，Oracle 仍然掌控着路线图，并且在
    Oracle 的开源流程下，为 NetBeans 贡献代码并不十分直接。NetBeans 社区围绕该 IDE 组织了会议。许多人开发了模块来扩展 IDE。还有更多人发表了关于
    NetBeans 功能的演讲或编写了教程。IDE 发展的下一步是让贡献变得更加容易，并将 IDE 的路线图和源代码交给社区。


    Oracle 于 2016 年秋季将 NetBeans IDE 的源代码和教程捐赠给了 Apache。尽管 Oracle 将 IDE 捐赠给了 Apache，但它仍然深度参与
    Apache NetBeans 的开发，但现在由社区控制路线图。现在，为 Apache NetBeans 贡献代码就像创建一个 GitHub Pull Request
    一样简单。自捐赠以来，Apache NetBeans 改变了其发布节奏，现在其发布更紧密地针对 Java 发布周期。Apache NetBeans 仍然是首个支持最新版本
    JDK 的 IDE，社区也一如既往地充满活力。


    ## 安装 Apache NetBeans


    根据您的用途，有几种不同的方法可以将 Apache NetBeans 安装到您的机器上。对于那些有兴趣修改 Apache NetBeans 的人，可以在克隆
    Git 仓库后从源代码构建 IDE。对于那些只想将 Apache NetBeans 用作开发工具的人，可以下载并解压归档文件，然后调用可执行文件。本节将简要说明如何通过解压
    Apache NetBeans 进行安装。如果您有兴趣从源代码构建，请参考第 14 章。


    使用 Apache NetBeans 的首要条件是安装 Java 开发工具包。Apache NetBeans 支持 JDK 8 和 11。必须安装 JDK
    才能从源代码构建 IDE 或运行 IDE。要下载 Apache NetBeans，请访问下载区域 [`​netbeans.​apache.​org/​download/​`](https://netbeans.apache.org/download/)
    并获取最新版本。下载页面包含获取每个版本源代码或二进制文件的链接。它还包含有关从源代码构建 IDE 的信息。要下载二进制文件，请单击“Binaries”链接，然后会显示“Apache
    Download Mirrors”页面。选择一个下载镜像并单击以获取归档文件。


    下载归档文件后，将其解压到一个文件夹中。解压后的归档文件应类似于图 1-1 所示。可执行文件位于 `bin` 目录中。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig1_HTML.jpg](img/479166_1_En_1_Fig1_HTML.jpg)


    图 1-1


    Apache NetBeans 安装


    如果安装了多个 Java 版本，请相应地编辑 `etc/netbeans.conf` 文件，并添加应用于运行 Apache NetBeans 的 `JAVA_HOME`。要运行
    Apache NetBeans，请双击位于 `bin` 目录中对应工作站平台的可执行文件。


    ### 注意


    要了解如何从源代码构建 Apache NetBeans，请参考第 14 章。

    '
- fmt: '# Integrated Development Environment


    Apache NetBeans is most widely known as an Integrated Development Environment
    (IDE). That is why it is commonly referred to as NetBeans IDE. Originally made
    to be a development environment for Java, the breadth of Apache NetBeans IDE has
    grown immensely over the years into a development tool for many different languages.
    As of the release of Apache NetBeans 10, the IDE contains first-class support
    for a variety of languages, including Java, PHP, and JavaScript. Support not only
    means that the editor contains nice syntax coloring or keyword highlighting, but
    it also typically contains features such as automatic indentation as per language
    standards, auto-completion for keywords and code fragments, and in some cases
    also automated rebuilds of projects for an easy debugging and development life
    cycle. The source code editor makes it easy to jump to different portions of code
    using keyboard shortcuts and mouse clicks. The editor font, color, etc., can be
    modified within the Apache NetBeans preferences.


    Did I mention debugging? Yes, the development environment also contains a full
    debugger for various languages, including the ability to set breakpoints, review
    variable values during live debugging, and perform hot code refreshes. The development
    environment also contains a full-fledged performance tuning solution for Java
    applications. One can use the performance tools to run an application and pinpoint
    code issues or threads that may be causing problems.


    When it comes time to build a project, few build frameworks that are as widely
    used as Apache Maven. The Apache NetBeans IDE contains outstanding support for
    Apache Maven, making a sometimes daunting build framework easy to use. If one
    chooses to utilize XML directly for pulling in Maven dependencies, then the XML
    editor is there to assist through the process, but if one would rather simply
    type in required dependencies and have them automatically added, then that is
    another option.


    One of the most important pieces of the development process is workflow and team
    collaboration. The NetBeans IDE contains first-class support for version control
    systems such as Git and Subversion, making collaboration a breeze. It is possible
    to clone Git repositories, update code, commit changes, and push to remote repositories
    right within the IDE. It is also easy to compare differences between files using
    the DIFF comparison tool.


    Over the next few sections, we will go through some of the basic Apache NetBeans
    IDE features for some of the most common use cases.


    ## Java Code Editor


    First and foremost, Apache NetBeans IDE is a world-class Java editor. The editor
    contains a number of features to assist developers, making all aspects of application
    development more productive. Although this section highlights Java code editing
    features specifically, it should be noted that many of these same features are
    available for other languages, such as JavaScript and PHP.


    Code completion provides developers with a boost by making code easier to write
    with less keystrokes, and also because it is great for typing those method names
    and variables that you don’t quite remember. The code completion is automatically
    invoked by pressing `CTRL-Space` while typing. Doing so will cause a drop-down
    menu to appear, which includes a number of code suggestions for continuing your
    current line of code. The code suggestions are context-based, providing meaningful
    suggestions for the current code at the top of the list, and less meaningful suggestions
    toward the bottom. Of course, code completion is configurable, so it can be made
    to automatically open the code completion drop-down menu while typing or when
    typing certain characters. By default, when a `.` character is typed, context-based
    suggestions will appear, which can be beneficial for easily completing method
    names and so forth.


    Code templates and snippets are handy for inserting segments of skeleton code,
    as needed, making it easier to complete logic. Templates can be invoked by clicking
    on a suggestion icon or by typing various strings of code such as `sout`. When
    `sout` is typed and then the spacebar is pressed, the code `System.out.println("")`
    is expanded, leaving the cursor within the parentheses to continue typing. One
    can define custom code snippets for code that is often used. There are also refactoring
    options for automatically completing simple boilerplate code, such as creating
    getters and setters, without coding at all.


    ## Java SE Applications


    Apache NetBeans was originally built for development of Java Standard Edition
    (Java SE) applications: that is, a Java application that contains one or more
    Java classes, a starting point, and an action or graphical user interface that
    provides functionality for a user. Traditional Java development requires Java
    classes to be compiled before they can be executed. Compiling and execution of
    an application typically occurs via a command prompt or terminal, utilizing the
    `javac` compiler and the `java` command to execute resulting class files. What’s
    more, if an application consists of more than one class file or resource, then
    it must be packaged into a Java Archive (JAR) before it is executed. Performing
    these tasks manually can be time consuming and cumbersome. Why not automate these
    minuscule tasks so that the developer can spend more time creating, rather than
    performing routine tasks? That is the original intention of Apache NetBeans IDE
    … to make development easier and more productive by reducing the number of required
    routine tasks.'
