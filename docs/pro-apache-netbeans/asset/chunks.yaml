    For an overview of the NetBeans platform modules, right-click on the `TodoRCP`
    module suite, select **Properties**, and click on the **Libraries** category.
    Expand the `platform` node to view a list of all platform modules included or
    not to your application.


    Before we close this chapter, we shall take a brief look at the `System FileSystem`
    or `layer.xml` we described earlier.


    To generate the `layer.xml` file, select the `View` module, right-click and select
    **New ➤ Other** from the context menu, then the **Module Development** category
    and the **XML Layer** file type. Follow the wizard and you will see a new `layer.xml`
    file created in the module’s `Source Package`. In the `Projects` window, expand
    it,^([¹](#fn1)) and you will see `<this layer>` and `<this layer in context>`
    (see Figure [7-19](#479166_1_En_7_Chapter.xhtml#Fig19)). Entry `<this layer>`
    refers to configuration information in this module, and entry `<this layer in
    context>` refers to the entire application (in other words, it combines all `layer.xml`
    file contents of all the modules of the application, that is, it is the `System
    FileSystem`). You will notice that `layer.xml` for our module is empty and only
    contains `<filesystem/>`. The `layer.xml` file consists of four main tags: `<filesystem>`,
    `<folder>`, `<file>`, and `<attr>`.


    One can access/create objects in the `layer.xml` using the `FileSystem API` that
    was described earlier in this chapter.


    We shall learn how we can customize our application by editing this file in the
