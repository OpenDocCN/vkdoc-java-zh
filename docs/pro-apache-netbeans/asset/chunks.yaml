    ### 注意


    在不同平台上，或当用户更改默认的 Swing 外观和感觉（L&F）时，以像素为单位调整 GUI 组件的大小并不能保证正常工作。请谨慎使用此 Matisse
    功能！


    我们需要将任务优先级限制在 1 到 10 之间。选择 `JSpinner` 组件，然后在*属性*窗口中，首先点击 *value* 属性的省略号（**…**）按钮，从组合框中选择**自定义代码**，并设置
    `spPriority.setValue(`**1**`)`。然后点击*代码*按钮，并选择*创建后代码*属性的省略号（**…**）按钮。输入如图 4-28
    所示的代码，然后点击**确定**。转到*源代码*视图，在编辑器中右键单击，然后选择**修复导入**以解决错误。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig28_HTML.jpg](img/479166_1_En_4_Fig28_HTML.jpg)


    图 4-28


    PaletteManager 对话框


    对于截止日期，我们可以使用 `JFormattedText` 来保存日期，但我们将了解如何使用 Date Picker Swing 组件来代替。有许多可用的解决方案，例如：*JDatePicker*
    ([`https://sourceforge.net/projects/jdatepicker/`](https://sourceforge.net/projects/jdatepicker/))、*JDateChooser*
    ([`http://plugins.netbeans.org/plugin/658/jdatechooser-1-2`](http://plugins.netbeans.org/plugin/658/jdatechooser-1-2))、*LGoodDatePicker*
    ([`https://github.com/LGoodDatePicker/LGoodDatePicker`](https://github.com/LGoodDatePicker/LGoodDatePicker))
    以及来自 SwingLabs 但已不再维护的 *SwingX JXDatePicker* ([`http://www.java2s.com/Code/Jar/s/Downloadswingxall165jar.htm`](http://www.java2s.com/Code/Jar/s/Downloadswingxall165jar.htm))。不幸的是，它们都没有使用最新的
    `java.time.LocalDateTime` 来存储选取的日期。我们将了解如何集成来自 SwingLabs 的 *SwingX JXDatePicker*（如果你愿意，集成其他任何一个都留作练习）。下载它并将其解压到您机器上的一个文件夹中。


    右键单击面板，然后从上下文菜单中选择*面板管理器*（参见图 4-29）。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig29_HTML.jpg](img/479166_1_En_4_Fig29_HTML.jpg)


    图 4-29


    PaletteManager 对话框


    点击**新建类别**按钮，并命名为 *SwingX*。点击**从 JAR 添加**按钮，从您之前下载的位置选择 `swingx-all-1.6.5.jar`，然后点击**下一步**。在下一步中，选择所有可用的组件，然后点击**下一步**。在最后一步中，选择您之前创建的
    *SwingX* 类别，然后点击**完成**。您刚刚在*面板*中添加了一个包含所有 *SwingX* 组件的新类别。


    将 `JXDatePicker` 组件拖放到 `TaskDetailsDialog` 窗体上，放在*截止日期*标签旁边。基本上就是这样。如果您对默认的日期格式不满意，我让您自行探索该组件的
    API，以了解如何设置日期格式，以及如何获取/设置日期值。


    ### 提示


    好了，既然您已经通过艰难的方式学会了，我必须承认还有一种更简单的方法。一旦您将库的 `jar` 文件（例如 `swingx-all-1.6.5.jar`）添加到您的项目中（在*项目*选项卡的*库*内），只需展开该
    jar 文件，导航到作为您组件的类，然后将其拖到您的窗体上即可。您无需将组件 bean 添加到面板中。例如，将 `org.desktop.swingx.JXDatePicker.class`
    拖放到 `TaskDetailsDialog` 窗体上，与从面板中拖放具有相同的效果。


    为了辅助无障碍访问，最佳实践是在 `JLabel` 上设置 *labelFor* 属性，以描述该标签用于哪个组件。这可以极大地提升屏幕阅读器和其他无障碍软件的效能。


    添加一个 `JLabel`（标签：`Obs:`，名称：`lblObs`）、一个 `JScrollPane`（名称：`spObs`）并在其中添加一个 `JTextArea`（名称：`txtaObs`）、一个
    `JCheckBox`（文本：`Completed Task`，名称：`chkCompleted`）以及四个 `JButton`（文本：`Save`，名称：`btnSave`；文本：`Cancel`，名称：`btnCancel`；文本：`Clear`，名称：`btnClear`；文本：`Remove`，名称：`btnRemove`）。最终的
    `TaskDetailsDialog` 窗体应如图 4-30 所示。


    良好的 UI 设计会使逻辑组中的所有按钮大小相同。只需选择所有需要的按钮（实际上您可以选择任何控件），然后右键单击任意一个选中的按钮。接着选择**相同大小
    ➤ 相同宽度**和**相同大小 ➤ 相同高度**复选框菜单项。绘图区域将指示这些控件已被配置为始终保持相同大小。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig30_HTML.jpg](img/479166_1_En_4_Fig30_HTML.jpg)


    图 4-30


    TaskDetailsDialog


