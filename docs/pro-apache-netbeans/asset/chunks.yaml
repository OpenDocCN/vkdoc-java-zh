    要创建`EditTaskAction`，右键点击`todo.controller.edit`包，然后选择**New Action**。选择**Conditionally
    Enabled**和**User Selects One Node**（参见图[9-10](#479166_1_En_9_Chapter.xhtml#Fig10)）。cookie类是`Task`。这意味着每当在`OutlineView`中选中一个任务（行）时，此操作就会启用。


