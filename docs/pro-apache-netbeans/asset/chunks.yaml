    ### Multi-Session Debugging


    The Apache NetBeans debugger supports having multiple debugging sessions running
    at the same time. This is very helpful if you have to debug, for example, some
    integration issue between the Java front end and back end, and you can simultaneously
    debug both processes. The debugger seamlessly integrates the multi-session capabilities
    into the default views and workflows. In the *Debugging* view, an additional combo
    box is shown, allowing you to select the debugging session the threads are shown
    for, as in Figure [6-36](#479166_1_En_6_Chapter.xhtml#Fig36).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig36_HTML.jpg](Images/479166_1_En_6_Fig36_HTML.jpg)


    Figure 6-36


    Session selection in Debugging view


    In addition to enhancing the *Debugging* view with necessary information for the
    multi-session workflow, there is a dedicated *Sessions* view showing all debugging
    sessions, with their state, programming language, and the host they are executed
    on (remember debugging sessions could be running attached to a process on a remote
    host). There is a context menu on every session providing interaction with the
    sessions:


    *   **Make Current**. Toggle the debugger to actively debug this session.


    *   **Scope**. Selects if all threads or just the current thread should be debugged.


    *   **Language**. Selects the debugger to use for this process, in case multiples
    may be applicable.


    *   **Finish**. Finishes the debugging session.


    *   **Finish All**. Finishes all debugging sessions.


    An example of the Sessions view showing two processes is shown in Figure [6-37](#479166_1_En_6_Chapter.xhtml#Fig37).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig37_HTML.jpg](Images/479166_1_En_6_Fig37_HTML.jpg)


    Figure 6-37


    Sessions view


    ## Profiling


    ### Getting Started


    Starting a profiling session for a project opened in Apache NetBeans is not as
    simple as debugging, because it requires more setup decisions. So let’s walk through
    the process of starting a profiling session (as an example, we will just use the
    Anagram Game sample from Apache NetBeans). If the project is already open, select
    the project node in the *Projects* view and press the **Profile Project** button
    in the toolbar. The first step you now need to take is the configuration of your
    profiling session. This has to be done, because the Apache NetBeans Profiler supports
    multiple profiling modes:


    *   **Telemetry**. Monitors CPU and Memory usage, number of threads, and loaded
    classes.


    *   **Methods**. Profiles method execution times and invocation counts, including
    call trees.


    *   **Objects**. Profiles size and count of allocated objects, including allocation
    paths and generational count.


    *   **Threads**. Monitors thread states and times.


    *   **Locks**. Collects lock contention statistics.


    *   **SQL Queries**. Display executed SQL Queries, their duration, and invocation
    paths.


    There is a more complex setup for profiling a remote VM, which requires setting
    up the remote JVM with a special agent.


    We will now have a deeper look into all of the profiling modes, but first some
    basics.


    ### Basic Profiling Actions


    During profiling an application, there is a set of generic actions, which can
    always be triggered to support the profiling process. The actions are available
    at the right end of the profiling toolbar labeled with *Process*.


    *   **Take thread dump from profiled process**. Takes a thread dump from the profiled
    process and opens it in a *Thread Dump* view.


    *   **Take heap dump from profiled process**. Takes a heap dump from the profiled
    process and opens it in a *Heap Walker* view (see *Heap Walker* later in this
    chapter).


    *   **Request garbage collection in the profiled process**. Requests an explicit
    garbage collection to be run in the profiled process. This can be used to ensure
    that heap dumps are not polluted with too many objects, which are not live anymore.


    ### Telemetry


    *Telemetry* is a very basic profiling mode. It allows us to track the following:


    *   CPU load differentiated between real CPU time and time consumed by GC.


    *   Heap size and used heap.


    *   Key garbage collection parameters, for example, surviving generations (an
    ever-increasing number indicates either a cache or a memory leak) and GC intervals.


    *   Threads and loaded classes.


    For each of the above bullets, there is a special graph shown in the telemetry
    view as seen in Figure [6-38](#479166_1_En_6_Chapter.xhtml#Fig38).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig38_HTML.jpg](Images/479166_1_En_6_Fig38_HTML.jpg)


    Figure 6-38


    Telemetry view'
