- fmt: '### The Debugging View


    Starting with the simple breakpoint shown in Figure [6-4](#479166_1_En_6_Chapter.xhtml#Fig4),
    we start a new debugging session, and as expected, the debugger stops at line
    73 in the `Anagrams` class. The debugging view will show by default the suspended
    thread with call stack information, as can be seen in Figure [6-5](#479166_1_En_6_Chapter.xhtml#Fig5).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig5_HTML.jpg](Images/479166_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Debugging view


    On the bottom of the view are a couple of buttons to control the behavior of the
    view (options). From left to right, they are:


    - **Show less**. Toggles which threads are shown in the view. By default, only
    the suspended threads are shown, but you can toggle between all threads and suspended
    threads only using this button.

    - **Show thread groups**. Toggles the visibility of thread groups, which switches
    the list-style view to a tree-style view and groups the visible threads by their
    thread group.

    - **Show suspend/resume table**. Toggles the visibility of the column on the right-hand
    side of the view, displaying the actual state of the thread, that is, paused or
    running.

    - **Show system threads**. Toggles the visibility of system threads. By default,
    system threads are hidden.

    - **Show monitors**. Toggles the display of monitors (locks) obtained by a thread.
    By default, monitors are not shown.

    - **Show qualified names**. Toggles the display of full qualified class names.
    This can be helpful to identify where a specific class showing up in the displayed
    stack is really coming from.

    - **Sort by suspended / resumed state**. Toggles sort ordering of the thread list
    according to their state.

    - **Sort by name**. Toggles sort ordering of thread list according to their name.

    - **Sort by default**. Switches to default sort order (sorted by name).


    Besides the options that are available to configure the view, the view also allows
    interaction with the threads. The first thing to control is thread state. By clicking
    on the buttons shown on the right-hand side of the view, running threads can be
    suspended and suspended threads can be resumed. This may be helpful once the application
    really requires multiple threads during debugging, and it is necessary to suspend
    the threads as needed to ensure correct application state. In addition, multiple
    threads often stop at breakpoints, which are currently not interesting (but still
    required to be active). Using these controls, those threads can be resumed.


    Another interesting technique is to investigate the state at different frames
    in the call stack. The active frame is highlighted in bold (as shown in Figure
    [6-5](#479166_1_En_6_Chapter.xhtml#Fig5)) and can be changed by either double-clicking
    onto another stack frame entry or by using the context menu item *Make Current*
    of a stack frame.


    The context menu of a stack frame has an additional interesting feature. Besides
    just inspecting the stack at a different frame, the menu item *Pop To Here* allows
    it to unwind the stack up to the selected stack frame. This is a nice little helper,
    since it allows retrying code fragments – especially if they do not modify the
    state.


    If the context menu is invoked not directly on the call stack entries, you get
    some additional helper actions. Two of them are straightforward, *Resume All Threads*,
    and *Suspend All Threads*, but the third is more interesting. The *Check for Deadlock*
    tool is very useful for addressing tricky multi-threaded situations, where deadlocks
    are often difficult to detect and debug.


    There is more hidden in the *Debugging* view, but we look into this later in the
    context of multi-session debugging.


    Now let’s start stepping through the code. Stepping into code will take us to
    the `WordLibrary`. Apache NetBeans will automatically open a new tab to show the
    source code of the `WorldLibary` class and stops again. This situation is shown
    in Figure [6-6](#479166_1_En_6_Chapter.xhtml#Fig6).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig6_HTML.jpg](Images/479166_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Multiple editor tabs for debugging'
