    The PaletteManager dialog box


    Click on **New Category** button and give the name *SwingX*. Click the **Add from
    JAR** button, select the `swingx-all-1.6.5.jar`, from the location you downloaded
    previously, and click **Next**. In the next step, select all the available components
    and click **Next**. In the final step, choose the *SwingX* category you created
    earlier and click **Finish**. You just added a new category in the *Palette* that
    contains all the *SwingX* components.


    Drag the `JXDatePicker` component on the `TaskDetailsDialog` form next to the
    *Due Date* label. Mainly, this is it. I let you explore the API of the widget
    to find out how to set the date format, if you are not happy with the default
    one, and how to get/set the date value.


    ### Tip


    OK, now that you learned the hard way, I must confess that there is an easier
    way. Once you have added the `jar` file of your library (e.g., `swingx-all-1.6.5.jar`)
    to your project (inside *Libraries* in the *Projects* tab), just expand the jar
    file, navigate to the class that is your widget, and drag it to your form. You
    don’t need to add the widget beans to the palette. For example, dragging `org.desktop.swingx.JXDatePicker.class`
    on the `TaskDetailsDialog` form has the same effect as dragging it from the palette.


    To aid accessibility, it’s a good practice to set the *labelFor* property on a
    `JLabel` to describe which component the label is for. This can greatly enhance
    the performance of screen readers and other accessibility software.


    Add a `JLabel` (label: `Obs:`, name: `lblObs`), a `JScrollPane` (name: `spObs`)
    and inside it add a `JTextArea` (name: `txtaObs`), a `JCheckBox` (text: `Completed
    Task`, name: `chkCompleted`), and four `JButton`s (text: `Save`, name: `btnSave`,
    text: `Cancel`, name: `btnCancel`, text: `Clear`, name: `btnClear`, text: `Remove`,
    name: `btnRemove`). The final `TaskDetailsDialog` form should look like the one
    in Figure [4-30](#479166_1_En_4_Chapter.xhtml#Fig30).


    Good UI design makes all buttons from a logical group the same size. Just select
    all desired buttons (actually you can select any control you want) and right-click
    any of the selected buttons. Then select **Same Size ➤ Same Width** and **Same
    Size ➤ Same Height** check-box menu items. The drawing area will indicate that
    the controls were configured to always have the same size.


