    component that will generate the event:


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Figa_HTML.jpg](Images/479166_1_En_4_Figa_HTML.jpg)


    Upon selecting the source component, NetBeans displays a message, asking to select
    the component that will receive the event:


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Figb_HTML.jpg](Images/479166_1_En_4_Figb_HTML.jpg)


    Upon selecting a component to receive the event, NetBeans will display the *Connection
    Wizard* window of Figure [4-13](#479166_1_En_4_Chapter.xhtml#Fig13).


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig13_HTML.jpg](Images/479166_1_En_4_Fig13_HTML.jpg)


    Figure 4-13


    Connection wizard step 1


    Select the source event, click **Next,** and specify the target operation (see
    Figure [4-14](#479166_1_En_4_Chapter.xhtml#Fig14)).


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig14_HTML.jpg](Images/479166_1_En_4_Fig14_HTML.jpg)


    Figure 4-14


    Connection wizard step 2


    In the next step, you need to enter how the target will be modified (see Figure
    [4-15](#479166_1_En_4_Chapter.xhtml#Fig15)).


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig15_HTML.jpg](Images/479166_1_En_4_Fig15_HTML.jpg)


    Figure 4-15


    Connection wizard step 3


    To view an example project that illustrates Swing forms, create a new project
    (menu **File ➤ New Project**), choose the *Samples/Java* category and the *GUI
    Form Examples* file type. The generated project contains three examples of Swing
    forms (`Antenna`, `ContactEditor`, and `Find`) that give you some ideas of the
    capabilities that Apache NetBeans IDE provides to design GUIs. The *Anagram Game*
    under the same category is another example.


    ### JavaFX Support


    Apache NetBeans allows you to create JavaFX projects by clicking on **File ➤ New
    Project** menu item. You may create Ant-based or Maven-based JavaFX projects.
    Select **Java with Ant ➤ JavaFX** category and choose one of the available JavaFX
    projects as shown in Figure [4-16](#479166_1_En_4_Chapter.xhtml#Fig16). Or select
    the **Java with Maven** category and choose **JavaFX Application** project. In
    the first case, you can create a JavaFX application developing the GUI using Java
    code, or use an FXML file to script the GUI widgets of your application. You may
    also create an application that mixes Swing and JavaFX components.


    Once you have created your JavaFX application, you may add additional JavaFX classes
    of FXML files by using the **File ➤ New File** wizard as shown in Figure [4-17](#479166_1_En_4_Chapter.xhtml#Fig17).


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig17_HTML.jpg](Images/479166_1_En_4_Fig17_HTML.jpg)


    Figure 4-17


    JavaFX file types


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig16_HTML.jpg](Images/479166_1_En_4_Fig16_HTML.jpg)


    Figure 4-16


    JavaFX Project types


    Apache NetBeans doesn’t provide a GUI designer for JavaFX applications, like the
    Matisse GUI builder for Swing. One can, however, integrate *SceneBuilder* with
    NetBeans. *SceneBuilder* (see Figure [4-18](#479166_1_En_4_Chapter.xhtml#Fig18))
    allows you to build JavaFX applications graphically. Oracle has stopped support
    of the SceneBuilder, which latest version is 2.0 ([`http://www.oracle.com/technetwork/java/javase/downloads/javafxscenebuilder-info-2157684.html`](http://www.oracle.com/technetwork/java/javase/downloads/javafxscenebuilder-info-2157684.html)).
    *Gluon* ([`https://gluonhq.com/products/scene-builder/`](https://gluonhq.com/products/scene-builder/))
    has taken over support and development of *SceneBuilder*. We shall see shortly
    how to set up Apache NetBeans to use *SceneBuilder*.


    Sven Reimer’s *Monet* ([`http://plugins.netbeans.org/plugin/55434/monet-the-javafx-scene-builder-integration`](http://plugins.netbeans.org/plugin/55434/monet-the-javafx-scene-builder-integration))
    plugin is an attempt to run *SceneBuilder* from within NetBeans to build the GUI
    of JavaFX applications the same way as when you use Matisse to build the GUI of
    your Swing applications.


    Download and install Oracle’s or (preferably) Gluon’s *SceneBuilder* from the
    sites mentioned earlier using the appropriate installer for your platform. To
    integrate *SceneBuilder* with NetBeans, follow these steps:


    1.  In Apache NetBeans, navigate to **Tools ➤ Options ➤ Java ➤ JavaFX** (Windows/Linux)
    or to **NetBeans ➤ Preferences ➤ Java ➤ JavaFX** (MacOSX), and click **Activate**
    if JavaFX support is not yet activated.


    2.  After activation is finished, set the *Scene Builder Home* to be the Gluon
    directory (e.g., this is the path to `/Applications/SceneBuilder.app` in MacOS).
    Some Windows installers install *SceneBuilder* without asking you for a directory.
    *SceneBuilder* can be found in `C:\Users\<User>\AppData\Local\SceneBuilder` or
    in `C:\Program Files\SceneBuilder`.


    3.  Click on **OK** and you are ready to start.'
