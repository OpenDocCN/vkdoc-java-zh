  raw: 'An `Action` is assigned a *category* and an *ID* via `@ActionID`. Visual attributes
    such as a *display name* or an *icon* are assigned via `@ActionRegistration`.
    You may also define a `key` with a value to delegate its `actionPerformed()` to
    any other `Action` that needs to integrate with it. Default icons are 16x16 pixels
    and you may provide 24x24 pixels, too (for toolbars with small or large icons).
    The actual component (`JMenuItem`, `JButton` etc.) that will be created for the
    `Action` is assigned via `@ActionReference`. Valid attributes are the `path` to
    a folder in the `layer.xml`, the position (i.e., the relative order to other items),
    and `separatorBefore` or `separatorAfter`. Finally, localizable texts are set
    via `@NbBundle.Messages`.


    Shortcuts are defined as shown in Table [8-2](#479166_1_En_8_Chapter.xhtml#Tab2)
    (for platform compatibility).


    Table 8-2


    Shortcut Keys You Can Use in Actions to Be Compatible with Any Platform


    | PC | Mac | Shortcut Key |

    | --- | --- | --- |

    | `Alt-` | `Ctrl-` | `O-` |

    | `Ctrl-` | `Command(`⌘`)-` | `D-` |

    | `Shift-` | `Shift-` | `S-` |


    Two categories of actions are supported:


    *   *Always-enabled actions*. These actions don’t depend on the availability of
    objects, data, or files for their execution or on user-selected item(s) in any
    of the application’s windows. **File ➤ Open** or **Edit ➤ AddTask** are examples
    of always-enabled actions.


    *   *Conditionally enabled actions*. The actions depend on the availability of
    objects, data, or files for their execution or on user-selected item(s) in any
    of the application’s windows. You need to provide what is called a *Cookie class*,
    which when found on a `TopComponent`’s or `Node`’s `Lookup`, enables the action.
    Then that `Lookup` is proxied by the currently selected window, which is proxied
    by `Utilities.actionsGlobalContext()` (which is the equivalent of `Lookup.getDefault()`).
    **Edit ➤ DeleteTask** action is an example of a conditionally enabled action that
    is enabled when one or more tasks are selected in the tasks table. *Context-aware*
    actions fall under this category and they are enabled when their context is in
    the `Lookup` of a selected entity (e.g., a `Node` or a `TopComponent`).


    *Callback actions* are global actions with different behaviors depending on which
    component has the focus registered with a key. In `TopComponent`s callback actions
    are added in the `TopComponent`’s `ActionMap`. An `ActionMap` provides a mapping
    between a key `String` and an `Action` object. You can use the `TopComponent`’s
    `ActionMap` to enable NetBeans Platform actions (such as **Cut**, **Copy**, **Paste**)
    for your `TopComponent`.


    For example, you may add the `cut-to-clipboard` to the `ActionMap` of any `JComponent`,
    together with the `Action` that should be performed like in Listing [8-20](#479166_1_En_8_Chapter.xhtml#PC24).


    ```

    final ActionMap actionMap = getActionMap();

    actionMap.put("copy-to-clipboard", new AbstractAction() {

    @Override

    public void actionPerformed(ActionEvent actionEvent) {

    //do something

    }

    });

