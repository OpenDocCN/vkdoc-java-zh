  raw: '#### Services Window


    The *Services Window* (**Ctrl+5** or **Cmd+5**), shown in Figure [2-4](#479166_1_En_2_Chapter.xhtml#Fig4),
    displays the logical view of runtime resources such as servers, databases, web
    services, Docker containers, issue trackers, and the tasks repository, which are
    registered with Apache NetBeans IDE.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig4_HTML.jpg](Images/479166_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Services Window


    #### Tasks Window


    The *Tasks Window* (**Ctrl+Shift+6** or **Cmd+Shift+6**) is conceived for the
    inventory of tasks registered in a task’s repository such as JIRA, Bugzilla, and
    so forth. Figure [2-5](#479166_1_En_2_Chapter.xhtml#Fig5) shows an example of
    a Tasks Window.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig5_HTML.jpg](Images/479166_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Tasks Window


    ### Navigator Window


    The *Navigator Window* (**Ctrl+7** or **Cmd+7**) provides a compact view of the
    currently selected file and simplifies navigation between different parts of the
    file. For a Java file, the window displays members (constructors, properties,
    and attributes) and Beans Patterns as shown in Figure [2-6](#479166_1_En_2_Chapter.xhtml#Fig6).


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig6_HTML.jpg](Images/479166_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Navigator Window


    The Navigator Window also displays Maven goals in the event the project is a Maven-based
    application. Figure [2-7](#479166_1_En_2_Chapter.xhtml#Fig7) shows an example,
    a list of Maven goals for a Maven application. In the case of Maven, you are able
    to execute a goal by double-clicking its node.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig7_HTML.jpg](Images/479166_1_En_2_Fig7_HTML.jpg)


    Figure 2-7


    Maven goals displayed in a Navigator Window


    ### Editor Window


    *Document windows* are normally displayed in the *Editor Window position*. With
    Document windows you are able to edit Java program files and other source files.
    You are also able to execute commands from the *Java Platform Shell*, because
    the Java 9 shell’s command-line interface has been also integrated within a Document
    Window.


    #### Source Editor


    The *Source Editor* is the part of the IDE layout that is used the most. It is
    the place to write your source code or design graphic user interfaces for Java
    or other types of application.


    The *Java Source Editor* is comprised of tabs: the *Source view* (where the user
    writes code), the *Design view* (where the user designs forms), and the *History
    view* (displays the modification history of the file). All three tabs are shown
    in Figure [2-8](#479166_1_En_2_Chapter.xhtml#Fig8), and you can see in the figure
    that the user is editing some Java source code.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig8_HTML.jpg](Images/479166_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Source Editor for a Java File


    The Source Editor helps you achieve coding tasks more quickly. thanks to many
    interesting features such as code completion, code templates, refactoring, and
    syntax coloring.


    The Source Editor is not limited to just Java code. It can be used for several
    other language file types. The Source Editor offers features that apply to the
    specific type of file the user is working on (for example, Java, JSP, HTML, etc.).


    Figure [2-9](#479166_1_En_2_Chapter.xhtml#Fig9) shows the Source Editor being
    used to edit an HTML file.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig9_HTML.jpg](Images/479166_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    HTML code source in HTML Editor


    #### Java Platform Shells


    The Java Platform Shell (see Figure [2-10](#479166_1_En_2_Chapter.xhtml#Fig10))
    is an interesting use case of the Source Editor window. The Java Platform is the
    place where you can write code snippets and interact with the JShell interpreter.
    You can edit source code but also execute that source code directly from within
    the editor without the need to create a Java file with a `main()` method.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig10_HTML.jpg](Images/479166_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Java Shell Editor


    ### Output Window


    The *Output Window position* (**Ctrl+4** or **Cmd+4**) can dock multi-tabbed windows
    to display messages from the Apache NetBeans IDE. The *Output Window* is displayed
    automatically after an execution succeeds (Figure [2-11](#479166_1_En_2_Chapter.xhtml#Fig11)),
    when compilation errors have occurred, when you debug your application, or in
    other cases where output needs to be presented to you.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig11_HTML.jpg](Images/479166_1_En_2_Fig11_HTML.jpg)


    Figure 2-11


    Output Window after an execution succeeds


    When errors occurred during compilation, the Output Window displays the errors
    with hyperlinks to their location in the source code. Figure [2-12](#479166_1_En_2_Chapter.xhtml#Fig12)
    shows a typical error listing.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig12_HTML.jpg](Images/479166_1_En_2_Fig12_HTML.jpg)


    Figure 2-12


    Output Window when an error occurred


    When a program requires user input, a new tab appears in the Output Window.


    ### Terminal Window


    Apache NetBeans IDE offers a *Terminal Window*, which is also displayed in the
    Output Window position, which allows you to interact with the operating system.
    Click on the menu **Window ➤ IDE Tools ➤ Terminal** to open this window. You can
    run operating system commands and scripts as shown in Figure [2-13](#479166_1_En_2_Chapter.xhtml#Fig13).


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig13_HTML.jpg](Images/479166_1_En_2_Fig13_HTML.jpg)


    Figure 2-13


    Executing commands from the Terminal Window


    ### Palette Window


    The *Palette Window* (**Ctrl+Shift+8** or **Cmd+Shift+8**) contains all the components
    that help in Rapid-Application Development (RAD). The behavior of the Palette
    is associated with the editor, and the list of components differs from one type
    of editor to another. Figure [2-14](#479166_1_En_2_Chapter.xhtml#Fig14) shows
    the contents of the Palette when the Design view is dealing with a Java form (left)
    and an html form (right)


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig14_HTML.jpg](Images/479166_1_En_2_Fig14_HTML.jpg)


    Figure 2-14


    Palette Window for Java form and html form


    ### Properties Window


    Elements (nodes) in *Projects*, *Files*, *Services*, *Documents,* or *Navigator*
    windows have properties that can be viewed in the *Properties* window as shown
    in Figure [2-15](#479166_1_En_2_Chapter.xhtml#Fig15). These elements can be Java
    classes, Swing components, and so on.


    You can click a property to modify its value field. Note that not all properties
    can be modified (for example, *File Size*, *Modification Time*, etc.). A value
    field can be an input box, or it can be a list of values.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig15_HTML.jpg](Images/479166_1_En_2_Fig15_HTML.jpg)


    Figure 2-15


    An example of a Property sheet


    ## Design a Project


    Apache NetBeans offers you the ability to design an application using one of the
    popular build automation tools: *Ant* or *Maven* or *Gradle*. The following sections
    show examples of each of these cases.'
  trans: '

    #### 服务窗口


    *服务窗口*（**Ctrl+5** 或 **Cmd+5**），如图 2-4 所示，显示了已注册到 Apache NetBeans IDE 的运行时资源（如服务器、数据库、Web
    服务、Docker 容器、问题跟踪器和任务仓库）的逻辑视图。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig4_HTML.jpg](img/479166_1_En_2_Fig4_HTML.jpg)


    图 2-4


    服务窗口


    #### 任务窗口


    *任务窗口*（**Ctrl+Shift+6** 或 **Cmd+Shift+6**）用于管理注册在任务仓库（如 JIRA、Bugzilla 等）中的任务清单。图
    2-5 展示了一个任务窗口的示例。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig5_HTML.jpg](img/479166_1_En_2_Fig5_HTML.jpg)


    图 2-5


    任务窗口


    ### 导航器窗口


    *导航器窗口*（**Ctrl+7** 或 **Cmd+7**）提供了当前选中文件的紧凑视图，并简化了文件不同部分之间的导航。对于 Java 文件，该窗口会显示成员（构造函数、属性和特性）以及
    Beans 模式，如图 2-6 所示。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig6_HTML.jpg](img/479166_1_En_2_Fig6_HTML.jpg)


    图 2-6


    导航器窗口


    如果项目是基于 Maven 的应用程序，导航器窗口还会显示 Maven 目标。图 2-7 展示了一个示例，即 Maven 应用程序的 Maven 目标列表。对于
    Maven 项目，你可以通过双击目标节点来执行该目标。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig7_HTML.jpg](img/479166_1_En_2_Fig7_HTML.jpg)


    图 2-7


    导航器窗口中显示的 Maven 目标


    ### 编辑器窗口


    *文档窗口*通常显示在*编辑器窗口位置*。通过文档窗口，你可以编辑 Java 程序文件和其他源文件。你还可以从*Java 平台 Shell* 执行命令，因为
    Java 9 Shell 的命令行界面也已集成到文档窗口中。


    #### 源代码编辑器


    *源代码编辑器*是 IDE 布局中使用最频繁的部分。它是你编写源代码或为 Java 及其他类型应用程序设计图形用户界面的地方。


    *Java 源代码编辑器*由多个选项卡组成：*源代码视图*（用户编写代码的地方）、*设计视图*（用户设计窗体的地方）和*历史视图*（显示文件的修改历史）。这三个选项卡均显示在图
    2-8 中，从图中可以看到用户正在编辑一些 Java 源代码。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig8_HTML.jpg](img/479166_1_En_2_Fig8_HTML.jpg)


    图 2-8


    Java 文件的源代码编辑器


    源代码编辑器通过许多有趣的功能（如代码补全、代码模板、重构和语法着色）帮助你更快速地完成编码任务。


    源代码编辑器不仅限于 Java 代码，还可用于多种其他语言的文件类型。源代码编辑器提供了适用于用户正在处理的特定文件类型（例如 Java、JSP、HTML
    等）的功能。


    图 2-9 展示了正在编辑 HTML 文件的源代码编辑器。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig9_HTML.jpg](img/479166_1_En_2_Fig9_HTML.jpg)


    图 2-9


    HTML 编辑器中的 HTML 代码源


    #### Java 平台 Shell


    Java 平台 Shell（见图 2-10）是源代码编辑器窗口的一个有趣用例。Java 平台是你编写代码片段并与 JShell 解释器交互的地方。你可以编辑源代码，也可以直接在编辑器中执行该源代码，而无需创建带有
    `main()` 方法的 Java 文件。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig10_HTML.jpg](img/479166_1_En_2_Fig10_HTML.jpg)


    图 2-10


    Java Shell 编辑器


    ### 输出窗口


    *输出窗口位置*（**Ctrl+4** 或 **Cmd+4**）可以停靠多选项卡窗口，用于显示来自 Apache NetBeans IDE 的消息。*输出窗口*会在执行成功后（图
    2-11）、编译出错时、调试应用程序时，或其他需要向你呈现输出信息的情况下自动显示。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig11_HTML.jpg](img/479166_1_En_2_Fig11_HTML.jpg)


    图 2-11


    执行成功后的输出窗口


    当编译过程中发生错误时，输出窗口会显示错误信息，并附带指向源代码中错误位置的超链接。图 2-12 展示了一个典型的错误列表。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig12_HTML.jpg](img/479166_1_En_2_Fig12_HTML.jpg)


    图 2-12


    发生错误时的输出窗口


    当程序需要用户输入时，输出窗口中会出现一个新的选项卡。


    ### 终端窗口


    Apache NetBeans IDE 提供了一个*终端窗口*，它也显示在输出窗口位置，允许你与操作系统进行交互。点击菜单 **窗口 ➤ IDE 工具 ➤
    终端** 即可打开此窗口。你可以运行操作系统命令和脚本，如图 2-13 所示。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig13_HTML.jpg](img/479166_1_En_2_Fig13_HTML.jpg)


    图 2-13


    从终端窗口执行命令


    ### 组件面板窗口


    *组件面板窗口*（**Ctrl+Shift+8** 或 **Cmd+Shift+8**）包含所有有助于快速应用程序开发（RAD）的组件。组件面板的行为与编辑器相关联，组件列表因编辑器类型而异。图
    2-14 显示了当设计视图处理 Java 窗体（左侧）和 HTML 窗体（右侧）时组件面板的内容。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig14_HTML.jpg](img/479166_1_En_2_Fig14_HTML.jpg)


    图 2-14


    Java 窗体和 HTML 窗体的组件面板窗口


    ### 属性窗口


    *项目*、*文件*、*服务*、*文档*或*导航器*窗口中的元素（节点）具有可在*属性*窗口中查看的属性，如图 2-15 所示。这些元素可以是 Java 类、Swing
    组件等。


    你可以单击某个属性来修改其值字段。请注意，并非所有属性都可以修改（例如，*文件大小*、*修改时间*等）。值字段可以是输入框，也可以是值列表。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig15_HTML.jpg](img/479166_1_En_2_Fig15_HTML.jpg)


    图 2-15


    属性表示例


    ## 设计项目


    Apache NetBeans 允许你使用流行的构建自动化工具之一来设计应用程序：*Ant*、*Maven* 或 *Gradle*。以下各节展示了每种情况的示例。

    '
- fmt: '### Set Up an Ant-Based Project


    By default, the Apache NetBeans IDE uses `Ant` as a build automation tool. Following
    are the steps to create a new project using `Ant`:


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig16_HTML.jpg](Images/479166_1_En_2_Fig16_HTML.jpg)


    Figure 2-16: New Project wizard


    1. To create a project, choose **File ➤ New Project** (`Ctrl+Shift+N`) or click
    on the **New Project** toolbar icon (a folder with a green plus sign at top left).
    The *New Project* wizard appears as shown in Figure [2-16](#479166_1_En_2_Chapter.xhtml#Fig16).


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig17_HTML.jpg](Images/479166_1_En_2_Fig17_HTML.jpg)


    Figure 2-17: Provide the project name and location in step 2 of the wizard


    2. Select the *Java with Ant* category. A number of project templates is displayed
    on the right side such as *Java Application*, *Java Modular Project*, etc. Select
    a project template; choose *Java Application* if you are following along with
    the current example. Then click **Next**.


    3. The next step is shown in Figure [2-17](#479166_1_En_2_Chapter.xhtml#Fig17).
    Here you can provide the Project Name, the directory where the application will
    be stored (Project Location), as well as the class that will contain the `main()`
    method. Fill in the fields as shown in Figure [2-17](#479166_1_En_2_Chapter.xhtml#Fig17).
    Then click **Finish**.


    You have created a new Java project. The Java Application template sets up a basic
    Java project and includes a main class as shown in Figure [2-18](#479166_1_En_2_Chapter.xhtml#Fig18).


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig18_HTML.jpg](Images/479166_1_En_2_Fig18_HTML.jpg)


    Figure 2-18: A new Java Application created


    The new application contains the *Ant build file*. You can display that build
    file through the *Files* tab. When selecting the *Ant manifest*, the *Navigator
    Window* displays the build targets as shown in Figure [2-19](#479166_1_En_2_Chapter.xhtml#Fig19).


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig19_HTML.jpg](Images/479166_1_En_2_Fig19_HTML.jpg)


    Figure 2-19: Ant build file and targets


    ### Set Up a Maven-Based Project


    Maven is a very popular build automation tool that dominates the Java ecosystem.
    Apache NetBeans supports Maven naturally (i.e., integrated inside the IDE, not
    as a plugin like in other IDEs). You can set up a new project using Maven by performing
    the following steps:


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig20_HTML.jpg](Images/479166_1_En_2_Fig20_HTML.jpg)


    Figure 2-20: New Project wizard


    1. Create a Maven project by choosing **File ➤ New Project** (`Ctrl+Shift+N`),
    or by clicking the **New Project** toolbar icon (![../images/479166_1_En_2_Chapter/479166_1_En_2_Figa_HTML.jpg](Images/479166_1_En_2_Figa_HTML.jpg)).
    The *New Project* wizard opens as shown in Figure [2-20](#479166_1_En_2_Chapter.xhtml#Fig20).


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig21_HTML.jpg](Images/479166_1_En_2_Fig21_HTML.jpg)


    Figure 2-21: Maven-based project name, location, groupid, and version


    2. Select the *Java with Maven* category to display the available project templates
    (see Figure [2-20](#479166_1_En_2_Chapter.xhtml#Fig20)). Choose *Java Application*
    for the current example, and click **Next**.


    3. In the next step (see Figure [2-21](#479166_1_En_2_Chapter.xhtml#Fig21)), you
    can provide the *project name* and *location* as well as the Maven coordinates
    (*groupid*, *version*, and *package*). When you are done, click **Finish**.


    The new project is created with the Maven’s configuration file `pom.xml`. The
    Navigator Window in Figure [2-22](#479166_1_En_2_Chapter.xhtml#Fig22) displays
    the *goals* (each set of predefined commands).


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig22_HTML.jpg](Images/479166_1_En_2_Fig22_HTML.jpg)


    Figure 2-22: A new Maven-based project


    ### Set Up a Gradle-Based Project


    Gradle is the new player on the game. It was created to ease some of the hassles
    of Maven, like, for example, the long *pom* files. Similar to the above, to create
    a new Gradle-based project, create a new project and select the *Java with Gradle*
    category as shown in Figure [2-23](#479166_1_En_2_Chapter.xhtml#Fig23) (NetBeans
    might activate the feature if it is the first time that it is being used).


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig23_HTML.jpg](Images/479166_1_En_2_Fig23_HTML.jpg)


    Figure 2-23: A new Gradle-based project


    Pressing **Next**, complete the various fields like project name and location;
    and the optional group, version, description, etc., of the second step of the
    wizard and click **Finish** in order to see your new Gradle project created.


    ## Speed Up Your Application Coding


    The Apache NetBeans IDE has plenty of rich features that allow you to speed up
    your coding tasks. The IDE has default features such as code completion, syntax
    highlighting, code templates, and so on that you can use and modify by changing
    various settings.


    ### Intelligent Code Completion


    *Code completion* is the most exciting and most-used feature of the IDE. It is
    specific to the Source Editor, and it is available for the majority of the supported
    languages (Java, HTML, PHP, and so on).


    There are two ways to open the code completion pop-up dialog box (shown in Figure
    [2-24](#479166_1_En_2_Chapter.xhtml#Fig24)): by pressing `Ctrl+Space` or by typing
    the dot (`.`) character inside the editor.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig24_HTML.jpg](Images/479166_1_En_2_Fig24_HTML.jpg)


    Figure 2-24: Code completion in the Java editors


    The code completion feature is smarter than it has never been. For example, if
    you want to call a variable, a class, or a method, the auto pop-up code completion
    dialog will list all the elements defined and help you to easily choose the one
    you need by typing the first character of the element’s name.


    There is also *camel case completion*. Instead of typing all the characters, you
    can type just the capital letters of the word you’re interested in. Then press
    `Ctrl+Space` and the camel case completion feature will complete the full name
    of the element.


    You also have access to Javadoc for an element. Put the cursor on an element name
    and press `Ctrl+Space` as shown in Figure [2-25](#479166_1_En_2_Chapter.xhtml#Fig25).
    You’ll see a dialog open with the Javadoc for the element you’ve selected.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig25_HTML.jpg](Images/479166_1_En_2_Fig25_HTML.jpg)


    Figure 2-25: Javadoc pop-up window


    The IDE also provides keyword completion. In this case the editor checks the context
    and suggests the most relevant keywords. Figure [2-26](#479166_1_En_2_Chapter.xhtml#Fig26)
    shows an example, and you can see how the editor sees that you are specifying
    a class definition and offers you the opportunity to either extend another class,
    or to implement an interface.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig26_HTML.jpg](Images/479166_1_En_2_Fig26_HTML.jpg)


    Figure 2-26: Keyword completion


    ### Hints


    *Hints* are excellent guides when typing code. Hints provide suggestions on how
    to fix errors and complete whatever statement or expression you are typing. The
    editor displays small *light bulbs* in the IDE’s left-hand margin for the lines
    of code for which hints are available (see Figure [2-27](#479166_1_En_2_Chapter.xhtml#Fig27)).
    Click on a bulb, and one or more hints appear.


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig27_HTML.jpg](Images/479166_1_En_2_Fig27_HTML.jpg)


    Figure 2-27: Hint to solve surrounding statement issue'
