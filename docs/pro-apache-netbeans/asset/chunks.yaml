  trans: '

    晋升为顶级 Apache 项目

    天下没有不散的筵席，NetBeans 在孵化器中的时光也是如此。一段时间以来，指派给我们的热心导师就一直在建议，是时候离开孵化器了。这意味着 NetBeans
    将不再处于孵化器阶段，而将成为 Apache 的正式项目。对于外界来说，孵化器可能有些令人困惑，也就是说，有些人往往会质疑从孵化器出来的代码状态；例如，“这是
    Beta 版本的质量吗？”、“NetBeans 还在孵化器中，我们能依赖它吗？”等等，这些都是人们常问的问题。


    此外，孵化器外部的发布流程比内部更快，因为孵化器的发布要经过两个阶段的发布投票——首先由社区投票决定某个仓库是否准备好发布，然后由孵化器成员进行投票。如果后者投票失败，就需要进行修复，并且第一阶段需要重新开始。简而言之，两阶段的发布投票过程会显著拖慢发布速度，因此，这本身就是一个项目在准备就绪后，希望离开孵化器继续前进的理由。经历孵化器阶段很重要，因为它能让围绕一个项目的社区成员相互了解，并围绕他们共同项目的发布进行协作。然而，一旦明确一切都能相当顺利地协同运作，就可以启动流程，成为
    Apache 的正式项目。


    这个过程需要在项目的开发者邮件列表中进行讨论。这次讨论始于 2019 年 2 月，花了一些时间，因为我们同时还在进行一个版本的发布工作。讨论之后，发起了一个投票线程，最终收到了大约
    60 票，所有人都同意 NetBeans 已经准备好毕业，这促使孵化器成员之间也启动了关于同一主题的投票。那里的投票也通过了，于是在 2019 年 4 月，NetBeans
    成为了 Apache 的正式项目。


    随后需要完成各种琐碎的任务，主要涉及从多个地方移除“孵化器”字样。一份新闻稿被整理并发布，开发工作无缝地继续进行，许多链接被重定向到没有“孵化器”字样的位置，例如，邮件列表中的“孵化器”一词，以及网站上关于孵化的一系列免责声明，这些都被修复和移除。


    这是一个长达两年半的漫长过程，不过，综合考虑，这个过程算是短暂且相对无痛的。尽管仍有相当多的代码需要由 Oracle 捐赠以完成捐赠，特别是与 C/C++
    特性相关的代码，但围绕 NetBeans 的社区作为 Apache 项目已经协同工作了一段时间，从孵化器毕业为这个过程画上了句号，并完成了 NetBeans
    在 Apache 安家落户的初始阶段。


    超越孵化器

    既然 Apache NetBeans 已经离开了孵化器，它的路线图是什么？可以期待哪些特性？又将在何时实现？嗯，在最简单的层面上，Oracle 尚未完成其捐赠，也就是说，有相当多的代码，特别是与
    C/C++ 特性相关的代码，正在 Oracle 内部进行审计和清理。换句话说，Oracle 的员工正在审查待捐赠的代码，并确定这些代码是否真正属于 Oracle，因此
    Oracle 是否拥有这些代码，并基于其所有权，能够将这些代码捐赠给 Apache。在某些情况下，经过分析，可能会发现代码是从别处复制而来，或者复用了其他仓库或技术中的代码。只有在完成这类分析之后，代码才能移交给
    Apache。


    与此同时，Apache NetBeans 的一个关键驱动力将继续是 Java 开发工具包（JDK）的新版本发布。随着 JDK 新版本的发布，像 NetBeans
    这样的工具需要做好准备，使开发者能够使用这些新的 JDK 版本进行工作。NetBeans 不仅必须能够在新的 JDK 版本之上运行，而且当 Java 在语法层面发生变化时，Java
    编辑器还必须提供支持，例如代码补全和语法着色。NetBeans 中的这项工作主要由 Oracle 的开发者完成，并且构成了 Oracle 在 Apache
    中对 NetBeans 承诺的最大部分。例如，JEP-330 提供了在项目范围之外运行单个 Java 源文件的能力，在 NetBeans 中对此功能的支持对于那些教授和学习
    Java 的人来说将非常有用，因为无需创建整个项目来容纳单个 Java 源文件。同时，Oracle Labs 专注于 GraalVM，这是 Oracle 开发的新型多语言虚拟机，其工具支持，特别是跨语言调试功能，由
    Apache NetBeans 提供。简而言之，Oracle 对 NetBeans 的承诺仍然意义重大，尤其是现在通过接管了 Oracle 治理和发布管理流程的
    Apache 流程，已经有了清晰的前进道路。


    除此之外，Apache NetBeans 将交付其提交者决定提交的任何内容。在 Gradle 领域正在进行大量工作，同时 PHP 支持也在不断增加更多特性。一旦
    C/C++ 特性被捐赠，预计那里也会出现进展，因为使用这些特性的开发者会提供反馈、提交问题和拉取请求。


    总结

    从本章中要传达的最重要信息是，Apache 就是“你”，没有你的参与，Apache NetBeans 就不会存在。不再有神奇的小精灵在 Sun 或 Oracle
    内部的某个地方开发 NetBeans。取而代之的是各种类型和规模的独立贡献者，我们需要你成为这个过程的一部分。缺少什么功能吗？现在，NetBeans 第一次真正属于你，你可以，事实上是必须，让它成为现实。我们都在期待你的第一个拉取请求！


    13. Apache 基础设施

