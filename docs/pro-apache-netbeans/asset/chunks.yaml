- fmt: "# Apache NetBeans 社区参与指南\n\nApache NetBeans 在 Apache 基金会下开源。因此，加入 Apache NetBeans\
    \ 开发社区非常容易，并且有多种方式可以实现。Apache 基金会为新手营造了轻松的入门环境，同时也为长期参与社区的贡献者提供了直观的贡献方式。Apache\
    \ 基金会基础设施中有几个关键部分在参与 Apache NetBeans 社区中发挥着作用。`JIRA` 是一个问题跟踪器，社区成员可以用它来报告问题，也可以跟踪项目中待完成的工作。Apache\
    \ 使用 `Confluence` 作为 Apache NetBeans 维基的项目管理站点。`NetBeans` 维基是一个专用资源，用于记录围绕项目的开发和计划文档。一系列开放的邮件列表用于协调工作。最后，最公开的焦点——Apache\
    \ NetBeans 网站——由社区维护。\n\n即使您不打算编写用于构建 Apache NetBeans IDE 的 Java 代码，您也可以通过阅读邮件列表、向\
    \ `JIRA` 提交问题、帮助维护 `Confluence` 或维基，或者投入时间在 Apache NetBeans 网站上做出贡献。在本章中，我们将介绍如何为构成\
    \ Apache NetBeans 社区的这些领域做出贡献。\n\n## Apache NetBeans JIRA\n\n参与 Apache NetBeans\
    \ 社区最简单的方式是报告错误或提出增强请求。为此，需要使用 Apache NetBeans `JIRA`。您可以通过在您喜欢的网络浏览器中导航到以下 URL\
    \ 来访问 `JIRA`：\n[`https://issues.apache.org/jira/projects/NETBEANS/`](https://issues.apache.org/jira/projects/NETBEANS/)`。`\n\
    \n默认情况下，当首次打开该站点时，会显示所有“开放”问题。如果您有兴趣帮助贡献 Apache NetBeans，`JIRA` 的开放问题是一个很好的起点。浏览开放问题，看看是否有您可以解决的问题，或者是否有引起您兴趣的问题（见图\
    \ [13-1](#479166_1_En_13_Chapter.xhtml#Fig1)）。\n\n![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig1_HTML.jpg](Images/479166_1_En_13_Fig1_HTML.jpg)\n\
    \n**图 13-1** Apache NetBeans JIRA – 开放问题\n\n要充分利用 `JIRA`，您必须创建一个帐户并登录系统。登录后，您就可以根据需要向跟踪器添加新问题。如果您拥有适当的权限，您还可以将问题分配给自己、对问题发表评论或更改问题的状态。\n\
    \n要开始浏览系统，请使用屏幕左侧的菜单（图 [13-2](#479166_1_En_13_Chapter.xhtml#Fig2)）。在该菜单中，您将看到\
    \ `Kanban Board`、`Releases`、`Reports`、`Issues` 和 `Components` 等选项。\n\n![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig2_HTML.jpg](Images/479166_1_En_13_Fig2_HTML.jpg)\n\
    \n**图 13-2** JIRA 导航与看板\n\n`Kanban Board` 是一个很好的展示界面，包含开放问题、分配给自己的问题和已完成问题。如果您点击看板上的一个问题，它会在屏幕右侧的窗格中打开该问题，使看板保持可见。您可以根据需要拖拽看板上的项目，从而按自己的喜好组织看板。`Kanban\
    \ Board` 的一个优点是它在触摸设备上运行良好，可以轻松拖放看板上的项目。\n\n菜单中的下一个是 `Releases` 面板（图 [13-3](#479166_1_En_13_Chapter.xhtml#Fig3)），它允许快速概览\
    \ Apache NetBeans 的发布状态。该面板提供有关先前版本以及未来下一个版本的信息。选择版本时，会弹出一个气泡，提供问题的快速摘要。\n\n![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig3_HTML.jpg](Images/479166_1_En_13_Fig3_HTML.jpg)\n\
    \n**图 13-3** 发布面板\n\n`Reports` 选项提供一系列报告选项，以不同方式呈现问题跟踪器数据。许多报告是可配置的，提供可变的时间线数据。报告类别包括\
    \ `Agile`、`Issue Analysis`、`Forecast & Management` 和 `Other`。每个类别包含一种或多种不同样式的报告。在图\
    \ [13-4](#479166_1_En_13_Chapter.xhtml#Fig4) 中，显示了问题的累积流图。\n\n![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig4_HTML.jpg](Images/479166_1_En_13_Fig4_HTML.jpg)\n\
    \n**图 13-4** 报告选项\n\n`Components` 菜单选项按 Apache NetBeans 组件分组显示所有问题。例如，所有 Maven\
    \ 问题都分组在一起，易于访问。利用 `Components` 菜单，可以按组件解析问题，从而轻松专注于 IDE 中某个特定领域的支持。\n\n## Apache\
    \ NetBeans 维基\n\n围绕 Apache NetBeans 的大部分文档都存放在维基中。维基当然是一系列提供 Apache NetBeans 详细信息和信息的在线网页。可以使用以下\
    \ URL 访问维基：\n[`http://netbeans.apache.org/wiki/index.asciidoc`](http://netbeans.apache.org/wiki/index.asciidoc)`。`\n\
    维基围绕一个“配方”风格的选择索引，这些选择按章节分组，索引中的每个选择都涵盖与开发相关的特定主题。有多种方式可以参与更新和贡献维基。例如，如果某些流程尚未记录，维基是记录它们的正确位置。如果您发现维基上的任何信息已过时或需要修改，您可以通过进行这些更新来提供帮助。维基是\
    \ Apache NetBeans 拼图中非常重要的一部分，因为来自世界各地的贡献者协作使 Apache NetBeans 成为可能。因此，记录良好的流程对于成功至关重要。\n\
    \n## 邮件列表\n\n有许多邮件列表可供加入，以保持信息畅通并与用户或开发社区中的其他人沟通。\n\n- **Announce** (`announce@netbeans.incubator.apache.org`)\
    \  \n  “Announce”邮件列表适用于希望在新版本发布时保持知情的人。此邮件列表通常流量较低，旨在作为一个高级别的列表，在通知的同时最大限度地减少电子邮件数量。\n\
    \n- **Users** (`users@netbeansincubator.apache.org`)  \n  “Users”邮件列表面向 NetBeans\
    \ 用户社区。如果您有关于 IDE 使用的问题，那么这里是您要去的地方。由于此邮件列表涵盖的主题非常广泛，建议在主题行中添加前缀标签，以指示电子邮件中涉及的主题。\n\
    \n- **Netcat** (`netcat@netbeans.incubator.apache.org`)  \n  “NetCat”邮件列表适用于参与\
    \ Apache NetBeans NetCat 测试和社区验收计划的人员。\n\n- **Dev** (`dev@netbeans.incubator.apache.org`)\
    \  \n  开发 Apache NetBeans 的人员应加入开发者邮件列表。此列表也面向致力于通过文档、活动和教程推广 IDE 的人员。\n\n- **Commits**\
    \ (`commits@netbeans.incubator.apache.org`)  \n  如果您希望密切关注 Apache NetBeans GitHub\
    \ 仓库，那么“Commits”邮件列表适合您。此邮件列表的成员每次有提交时都会收到通知。\n\n- **Notifications** (`notifications@netbeans.incubator.apache.org`)\
    \  \n  要密切关注 GitHub 仓库的问题、评论和拉取请求，请关注“Notifications”邮件列表。每当对问题或拉取请求发表评论时，此列表的每个成员都会收到通知。"
  raw: "Apache NetBeans is open sourced under the Apache Foundation. As such,\nbecoming\
    \ a part of the Apache NetBeans development community is quite\neasy, and there\
    \ are many ways to do so. The Apache Foundation is based\nupon an easy environment\
    \ for newcomers to come on board, and it is also\nintuitive for those who have\
    \ been part of the community for years to\ncontribute. There are a few key parts\
    \ of the Apache Foundation\ninfrastructure that play a role in participation within\
    \ the Apache\nNetBeans community. The JIRA is an issue tracker\nthat can be used\
    \ by those in the community for reporting issues and also\nfor tracking work that\
    \ is to be done on a project. Apache uses\nConfluence, a project management site\
    \ for the Apache NetBeans wiki. The\nNetBeans wiki is a dedicated resource for\
    \ documentation of development\nand initiatives around the project. An open set\
    \ of mailing lists is used\nto coordinate work. And finally, the most public focal\
    \ point, the Apache\nNetBeans website is maintained by the community.\nEven if\
    \ you are not planning to work on Java code that is used to\nbuild the Apache\
    \ NetBeans IDE, you can contribute by reading through\nmailing lists, contributing\
    \ issues to the JIRA, helping to maintain\nConfluence, or the wiki, or dedicating\
    \ time on the Apache NetBeans\nwebsite. In this chapter, we will cover how to\
    \ contribute to each of\nthese areas that help to make up the Apache NetBeans\
    \ community.\n\nApache NetBeans JIRA\nThe easiest way to participate in the Apache\
    \ NetBeans community is to\nreport bugs or provide enhancement requests. To do\
    \ so, the Apache\nNetBeans JIRA is used. The JIRA can be accessed by navigating\
    \ to the\nfollowing URL in your favorite web browser:\n[`https://issues.apache.org/jira/projects/NETBEANS/`](https://issues.apache.org/jira/projects/NETBEANS/)`.`\n\
    \nBy default, when the site is first opened, all OPEN issues are\npresented. The\
    \ JIRA open issues are a great place to begin if you are\ninterested in helping\
    \ contribute to Apache NetBeans. Browse through the\nopen issues and see if there\
    \ are any that you may be able to resolve, or\nif there is something that peaks\
    \ your interest (see Figure [13-1](#479166_1_En_13_Chapter.xhtml#Fig1)).\n\n![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig1_HTML.jpg](Images/479166_1_En_13_Fig1_HTML.jpg)\n\
    \nFigure 13-1\nApache NetBeans JIRA – Open Issues\n\nTo take full advantage of\
    \ the JIRA, you must create an account and\nlog into the system. Once you do so,\
    \ then you will be able to add new\nissues to the tracker, if needed. You can\
    \ also assign issues to\nyourself, comment on issues, or change the status of\
    \ issues if you have\nthe proper privileges.\n\nTo begin navigating the system,\
    \ utilize the menu\non the left-hand side of the screen (Figure [13-2](#479166_1_En_13_Chapter.xhtml#Fig2)).\
    \ In that menu\nyou will see there are options for Kanban Board, Releases, Reports,\n\
    Issues, and Components.\n\n![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig2_HTML.jpg](Images/479166_1_En_13_Fig2_HTML.jpg)\n\
    \nFigure 13-2\nJIRA Navigation and Kanban Board\n\nThe **Kanban\nBoard** \n is\
    \ a nice display containing Open Issues, Issues assigned to\nyourself, and Completed\
    \ Issues. If you click on one of the issues in the\nboard, it brings up the issue\
    \ in a pane on the right-hand side of the\nscreen, allowing the board to remain\
    \ visible. The board items can be\ndragged around, as you wish, allowing you to\
    \ organize the board to your\nliking. A nice feature of the Kanban Board is that\
    \ it works well on\ntouch-based devices, allowing for easy dragging and dropping\
    \ of the\nitems on the board.\n\nNext up in the menu is the **Releases** panel\
    \ (Figure [13-3](#479166_1_En_13_Chapter.xhtml#Fig3)), which allows\none to see\
    \ a quick overview of the Apache NetBeans release status. The\npanel provides\
    \ information about previous releases, as well as the next\nrelease in the future.\
    \ When selecting the release, a balloon appears,\nwhich provides a quick summary\
    \ of the issues.\n\n![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig3_HTML.jpg](Images/479166_1_En_13_Fig3_HTML.jpg)\n\
    \nFigure 13-3\nReleases\nPanel\n\nThe **Reports** option provides a\nseries of\
    \ report options to present the issue tracker data in different\nways. Many of\
    \ the reports are configurable, providing a variable\ntimeline of data. The report\
    \ categories include Agile, Issue Analysis,\nForecast & Management, and Other.\
    \ Each category contains one or more\ndifferent styles of report. In Figure [13-4](#479166_1_En_13_Chapter.xhtml#Fig4),\
    \ a Cumulative\nFlow Diagram of the issues is displayed.\n\n![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig4_HTML.jpg](Images/479166_1_En_13_Fig4_HTML.jpg)\n\
    \nFigure 13-4\nReports\nOption\n\nThe **Components** menu option presents\nall\
    \ issues grouped by the Apache NetBeans component. For instance, all\nof the Maven\
    \ issues are grouped together and are easily accessible.\nUtilizing the Components\
    \ menu, one can parse issues by component, making\nit easy to focus on support\
    \ for one particular area with the IDE.\n\nApache NetBeans Wiki\nMuch of the documentation\
    \ around Apache NetBeans resides within the\nwiki. The wiki\nis, of course, a\
    \ series of online webpages that provide details and\ninformation on Apache NetBeans.\
    \ The following URL can be used to access\nthe wiki:\n[`http://netbeans.apache.org/wiki/index.asciidoc`](http://netbeans.apache.org/wiki/index.asciidoc)`.`\n\
    The wiki focuses around an index of “recipe” style choices, grouped\ninto sections,\
    \ and each of the choices within the index covers a\nparticular topic related\
    \ to development. There are a number of ways to\nparticipate in updating and contributing\
    \ to the wiki. For instance, if\nany processes have not yet been documented, the\
    \ wiki is the correct\nplace to do so. If you find any information on the wiki\
    \ that is outdated\nor needs to be modified, you can help by making those updates.\
    \ The wiki\nis a very important piece of the Apache NetBeans puzzle since\ncontributors\
    \ from around the world collaborate to make Apache NetBeans\npossible. Therefore,\
    \ well-documented processes are essential for\nsuccess.\n\nMailing Lists\nThere\
    \ are a number of mailing lists that one\ncan join to keep informed and communicate\
    \ with others in the user or\ndevelopment communities.\n\nAnnounce\n(announce@netbeans.incubator.apache.org)\n\
    The “Announce” mailing list is for those who wish to remain informed\nwhen new\
    \ releases are made. This mailing list is typically low traffic\nand is designed\
    \ as a high-level list to inform while minimizing the\nnumber of e-mails.\n\n\
    Users (users@netbeansincubator.apache.org)\nThe “Users” mailing list is aimed\
    \ at the NetBeans user community. If\nyou have a question pertaining to the usage\
    \ of the IDE, then this is the\nplace to go. Since this mailing list covers such\
    \ a broad array of\ntopics, it is encouraged to add prefix tags to subject lines,\
    \ indicating\nthe topic being addressed within the e-mail.\n\nNetcat (netcat@netbeans.incubator.apache.org)\n\
    The NetCat mailing list is for those who are part of the Apache\nNetBeans NetCat\
    \ testing and community acceptance program.\n\nDev (dev@netbeans.incubator.apache.org)\n\
    Those who develop Apache NetBeans should join the developer mailing\nlist. This\
    \ list is also targeted toward those who are committed to\npromoting the IDE via\
    \ documentation, events, and tutorials.\n\nCommits (commits@netbeans.incubator.apache.org)\n\
    If you wish to pay very close attention to the Apache NetBeans GitHub\nrepository,\
    \ then the Commits mailing list is for you. Members of this\nmailing list receive\
    \ a notification each time a commit is made.\n\nNotifications\n(notifications@netbeans.incubator.apache.org)\n\
    To closely follow the GitHub repository issues,\ncomments, and pull requests,\
    \ follow the Notifications mailing list. Each\nmember of this list is sent a notification\
    \ whenever comments are made on\nissues or pull requests are made."
  trans: '

    Apache NetBeans 在 Apache 基金会下开源发布。因此，加入 Apache NetBeans 开发社区非常容易，并且有多种方式可以实现。Apache
    基金会为新手营造了轻松的入门环境，同时也让多年参与社区的成员能够直观地进行贡献。Apache 基金会基础设施中有几个关键部分，在参与 Apache NetBeans
    社区时发挥着作用。**JIRA** 是一个问题追踪器，社区成员可以用它来报告问题，并跟踪项目中需要完成的工作。Apache 使用 **Confluence**
    作为 Apache NetBeans 维基的项目管理站点。NetBeans 维基是一个专用资源，用于记录围绕项目的开发和计划文档。一系列开放的邮件列表用于协调工作。最后，最公开的焦点——Apache
    NetBeans 网站——由社区维护。

    即使你不打算编写用于构建 Apache NetBeans IDE 的 Java 代码，你也可以通过阅读邮件列表、向 JIRA 提交问题、帮助维护 Confluence
    或维基，或者投入时间在 Apache NetBeans 网站上做出贡献。在本章中，我们将介绍如何为构成 Apache NetBeans 社区的这些领域做出贡献。


    Apache NetBeans JIRA

    参与 Apache NetBeans 社区最简单的方式是报告错误或提出功能增强请求。为此，需要使用 Apache NetBeans JIRA。你可以通过在你喜欢的网络浏览器中访问以下
    URL 来访问 JIRA：

    [`https://issues.apache.org/jira/projects/NETBEANS/`](https://issues.apache.org/jira/projects/NETBEANS/)`.`


    默认情况下，首次打开该网站时，会显示所有“开放”问题。如果你有兴趣为 Apache NetBeans 做出贡献，JIRA 的开放问题是一个很好的起点。浏览这些开放问题，看看是否有你能解决的，或者是否有引起你兴趣的内容（见图
    13-1）。


    ![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig1_HTML.jpg](img/479166_1_En_13_Fig1_HTML.jpg)


    图 13-1

    Apache NetBeans JIRA – 开放问题


    要充分利用 JIRA，你必须创建一个帐户并登录系统。登录后，你就可以根据需要向追踪器添加新问题。如果你拥有适当的权限，还可以将问题分配给自己、对问题发表评论或更改问题的状态。


    要开始浏览系统，请使用屏幕左侧的菜单（图 13-2）。在该菜单中，你会看到看板、发布、报告、问题和组件等选项。


    ![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig2_HTML.jpg](img/479166_1_En_13_Fig2_HTML.jpg)


    图 13-2

    JIRA 导航与看板


    **看板**是一个很好的展示界面，包含开放问题、分配给你的问题以及已完成问题。如果你点击看板中的某个问题，它会在屏幕右侧的窗格中打开，使看板保持可见。你可以根据需要随意拖拽看板上的项目，从而按自己的喜好组织看板。看板的一个不错的功能是它在触摸设备上运行良好，可以轻松拖放看板上的项目。


    菜单中的下一个是**发布**面板（图 13-3），它可以让用户快速概览 Apache NetBeans 的发布状态。该面板提供有关先前版本以及未来下一个版本的信息。选择某个版本时，会弹出一个气泡，提供该版本问题的快速摘要。


    ![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig3_HTML.jpg](img/479166_1_En_13_Fig3_HTML.jpg)


    图 13-3

    发布面板


    **报告**选项提供了一系列报告选项，以不同方式呈现问题追踪器数据。许多报告是可配置的，提供可变的数据时间线。报告类别包括敏捷、问题分析、预测与管理以及其他。每个类别包含一种或多种不同样式的报告。在图
    13-4 中，显示了一个问题的累积流图。


    ![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig4_HTML.jpg](img/479166_1_En_13_Fig4_HTML.jpg)


    图 13-4

    报告选项


    **组件**菜单选项按 Apache NetBeans 组件分组显示所有问题。例如，所有 Maven 问题都分组在一起，易于访问。利用组件菜单，可以按组件解析问题，从而轻松专注于
    IDE 中某个特定领域的支持。


    Apache NetBeans 维基

    围绕 Apache NetBeans 的大部分文档都存放在维基中。维基当然是一系列提供 Apache NetBeans 详细信息和资料的在线网页。可以使用以下
    URL 访问维基：

    [`http://netbeans.apache.org/wiki/index.asciidoc`](http://netbeans.apache.org/wiki/index.asciidoc)`.`

    维基围绕一个“配方”风格选项的索引，这些选项被分组到各个部分，索引中的每个选项都涵盖与开发相关的特定主题。有多种方式可以参与更新和为维基做贡献。例如，如果某些流程尚未记录，维基就是记录它们的正确地方。如果你发现维基上的任何信息已过时或需要修改，你可以通过进行这些更新来提供帮助。维基是
    Apache NetBeans 拼图中非常重要的一部分，因为来自世界各地的贡献者协作使 Apache NetBeans 成为可能。因此，记录良好的流程对于成功至关重要。


    邮件列表

    有许多邮件列表可供加入，以保持信息畅通并与用户或开发社区中的其他人沟通。


    公告 (announce@netbeans.incubator.apache.org)

    “公告”邮件列表适用于希望在新版本发布时及时了解信息的人。此邮件列表通常流量较低，旨在作为一个高级别的通知列表，同时最大限度地减少邮件数量。


    用户 (users@netbeansincubator.apache.org)

    “用户”邮件列表面向 NetBeans 用户社区。如果你有关于 IDE 使用的问题，那么这里就是你要去的地方。由于此邮件列表涵盖的主题非常广泛，建议在主题行中添加前缀标签，以指示邮件中讨论的主题。


    NetCat (netcat@netbeans.incubator.apache.org)

    NetCat 邮件列表适用于参与 Apache NetBeans NetCat 测试和社区验收计划的人员。


    开发 (dev@netbeans.incubator.apache.org)

    开发 Apache NetBeans 的人员应加入开发者邮件列表。此列表也面向那些致力于通过文档、活动和教程推广 IDE 的人员。


    提交 (commits@netbeans.incubator.apache.org)

    如果你希望密切关注 Apache NetBeans GitHub 仓库，那么提交邮件列表适合你。每次有提交时，此邮件列表的成员都会收到通知。


    通知 (notifications@netbeans.incubator.apache.org)

    要密切关注 GitHub 仓库的问题、评论和拉取请求，请关注通知邮件列表。每当问题上有评论或提出拉取请求时，此列表的每位成员都会收到通知。

