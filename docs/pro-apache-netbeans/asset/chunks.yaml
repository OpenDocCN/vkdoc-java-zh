    支持两类操作：


    *   **始终启用操作**。这些操作的执行不依赖于对象、数据或文件的可用性，也不依赖于应用程序任何窗口中用户选定的项目。**文件 ➤ 打开**或**编辑
    ➤ 添加任务**是始终启用操作的示例。


    *   **条件启用操作**。这些操作的执行依赖于对象、数据或文件的可用性，或依赖于应用程序任何窗口中用户选定的项目。您需要提供一个所谓的*Cookie类*，当在`TopComponent`或`Node`的`Lookup`中找到该类时，该操作即被启用。然后，该`Lookup`由当前选中的窗口代理，而该窗口又由`Utilities.actionsGlobalContext()`代理（相当于`Lookup.getDefault()`）。**编辑
    ➤ 删除任务**操作是一个条件启用操作的示例，当在任务表中选中一个或多个任务时，该操作被启用。*上下文感知*操作属于此类别，当它们的上下文位于选定实体（例如`Node`或`TopComponent`）的`Lookup`中时，它们被启用。


    *回调操作*是全局操作，根据哪个组件拥有通过键注册的焦点而具有不同的行为。在`TopComponent`中，回调操作被添加到`TopComponent`的`ActionMap`中。`ActionMap`提供了键`String`与`Action`对象之间的映射。您可以使用`TopComponent`的`ActionMap`为您的`TopComponent`启用NetBeans平台操作（例如**剪切**、**复制**、**粘贴**）。


    例如，您可以将`cut-to-clipboard`添加到任何`JComponent`的`ActionMap`中，同时添加应执行的操作，如清单[8-20](#479166_1_En_8_Chapter.xhtml#PC24)所示。


