- fmt: "# HTML/Java UI API\n\nIn the previous sections, we saw how to port the *ToDo*\
    \ Swing Application UI to the *Window* and *Explorer and Properties System* APIs\
    \ of the NetBeans Rich Client Platform and to JavaFX. In this section we shall\
    \ see how to port the UI to the new HTML/Java UI API.\n\n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig20_HTML.jpg](Images/479166_1_En_9_Fig20_HTML.jpg)\n\
    \nFigure 9-20: File structure of the View module\n\n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig19_HTML.jpg](Images/479166_1_En_9_Fig19_HTML.jpg)\n\
    \nFigure 9-19: Create new Portable HTML UI wizard\n\n1. Create a new NetBeans\
    \ Platform Application named as `TodoHTMLJava`.\n2. Create a new module in the\
    \ application (Name: `View`, Code Name Base: `todo.view`).\n3. Create a new Portable\
    \ HTML UI. Open the module (if not already open), right-click on *todo.view* package,\
    \ and select **New ➤ Other…** from the pop-up menu (see Figure [9-19](#479166_1_En_9_Chapter.xhtml#Fig19)).\
    \ Click **Next**.\n4. Provide `Tasks` as *Class Name Prefix*, provide an icon\
    \ for the button that will be created and click **Finish**.\n5. The generated\
    \ file structure is shown in Figure [9-20](#479166_1_En_9_Chapter.xhtml#Fig20).\n\
    \nRight-click on the *View* module and select **Run**. You should see a window\
    \ similar to the one shown in Figure [9-21](#479166_1_En_9_Chapter.xhtml#Fig21).\
    \ Click on the button with the icon you chose in order to see the *TasksWindow*\
    \ tab appearing. Press the **Ask!** Button to display the dialog box.\n\nAn HTML\
    \ UI running inside a NetBeans RCP!\n\n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig21_HTML.jpg](Images/479166_1_En_9_Fig21_HTML.jpg)\n\
    \nFigure 9-21: The running sample application\n\nThe code consists of only two\
    \ files:\n\n* `TasksWindow.html`, which builds the UI of the application and contains\
    \ bindings for the Java class.\n* `TasksWindowCntrl.java`, which contains the\
    \ controller and model (more specifically the *ViewModel* and the *Model*) of\
    \ the application.\n\n```\nAsk!\n\nHow are you?\n\nOK?\n\nGood\nBad\n\nListing\
    \ 9-18\nTasksWindow.html\n```\n\nThe two windows are defined inside `<script>`\
    \ tags. `data-binds` (if you are familiar with Knockout JS) bind the UI elements\
    \ with the back end, the `TasksWindowCntrl.java`. The first line of Listing [9-18](#479166_1_En_9_Chapter.xhtml#PC20)\
    \ tells the UI to search for a method called `templateName()` in the Java file.\
    \ In Listing [9-19](#479166_1_En_9_Chapter.xhtml#PC21) you see that the defined\
    \ `templateName()` returns the string `\"window\"` that must match the `id` in\
    \ `<script type=\"text/html\" id=\"window\">` in the *html* file.\n\n```\n@Model(className\
    \ = \"TasksWindow\", targetId = \"\", properties = {\n@Property(name = \"text\"\
    , type = String.class)\n})\npublic final class TasksWindowCntrl {\n...\n@ComputedProperty\n\
    static String templateName() {\nreturn \"window\";\n}\n@ActionID(\ncategory =\
    \ \"Tools\",\nid = \"todo.view.TasksWindow\"\n)\n@ActionReferences({\n@ActionReference(path\
    \ = \"Menu/Tools\"),\n@ActionReference(path = \"Toolbars/File\"),})\n@NbBundle.Messages(\"\
    CTL_Tasks=Open HTML Hello World!\")\n@OpenHTMLRegistration(\nurl = \"TasksWindow.html\"\
    ,\ndisplayName = \"#CTL_Tasks\",\niconBase = \"todo/controller/resources/icons/taskmrk_tsk.gif\"\
    \n)\npublic static Tasks onPageLoad() {\nreturn new TasksWindow(\"Hello World!\"\
    ).applyBindings();\n}\nListing 9-19\nTasksWindowCntrl class with the @Model definition\n\
    ```\n\nThe class `TasksWindowCntrl` defines an action on the toolbar and on the\
    \ *Tools* menu. This returns a new instance of the generated class `TasksWindow`.\
    \ `TasksWindow` class is defined by the `@Model` annotation. As you can see in\
    \ Listing [9-20](#479166_1_En_9_Chapter.xhtml#PC22), it defines a property with\
    \ name `\"text\"` of type `String`, which is bound to `<input data-bind=\"value:\
    \ text\"></input>`. So, the text that is passed to the constructor of `TasksWindow`\
    \ (`\"Hello World!\"`) is displayed on that text field.\n\n```\n\"Hello World!\"\
    \ ➔ @Property(name = \"text\", type = String.class) ➔ \nListing 9-20\nProperty\
    \ to HTML binding\n```\n\nThe necessary model classes are generated from annotations,\
    \ thus saving you time from typing them.\n\nWe already saw the `@Model` annotation\
    \ in the previous chapter, which defines a class that represents some kind of\
    \ model and `@Property`, which represents an attribute of this class. We also\
    \ saw an example of the `@ComputedProperty` annotation.\n\nThe `@Function` annotation\
    \ responds to an action from the UI. For example, the following function is being\
    \ called when the user clicks on the **Ask!** button (`<button data-bind=\"click:\
    \ showDialog, enable: text\">Ask!</button>`) (see Listing [9-21](#479166_1_En_9_Chapter.xhtml#PC23)).\n\
    \n```\n@Function\nstatic void showDialog(TasksWindow model) {\nString reply =\
    \ Pages.showTasksWindowDialog(model.getText());\nif (\"OK\".equals(reply)) {\n\
    model.setText(\"Happy World!\");\n} else {\nmodel.setText(\"Sad World!\");\n}\n\
    }\nListing 9-21\nA @Function example\n```\n\nFinally, the `@HTMLDialog` annotation\
    \ is used to display a dialog box (see Figure [9-21](#479166_1_En_9_Chapter.xhtml#Fig21)\
    \ and Listing [9-22](#479166_1_En_9_Chapter.xhtml#PC24)).\n\n```\n@HTMLDialog(url\
    \ = \"TasksWindow.html\")\nstatic void showTasksWindowDialog (String t) {\nnew\
    \ TasksWindowDialog (t, false).applyBindings();\n}\nListing 9-22\n@HTMLDialog\
    \ to display a dialog box\n```"
