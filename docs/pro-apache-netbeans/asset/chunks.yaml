    Apache NetBeans also added an action listener to the `btnAddTask` component under
    the hood (inside `initComponents()` method) so that this method would be invoked
    at the correct time.


    You may add similar methods for `TasksWindow.mnuAddTask` (don’t forget the *DRY*
    principle and do some refactoring here) and `TaskDetailsDialog.btnClose`. Finally,
    you need to implement the `main()` method as shown in Listing [4-3](#479166_1_En_4_Chapter.xhtml#PC4).


