    新建快速搜索提供程序向导（第 1 步）


    1.  右键单击 *View* 模块，然后选择 **新建 ➤ 其他**。


    2.  在 *新建文件* 对话框中，选择 **模块开发 ➤ 快速搜索提供程序**（见图 10-11），然后单击 **下一步**。


    3.  在快速搜索提供程序面板中，设置提供程序类名等（见图 10-12）。


    4.  单击 **完成**。


    该向导将创建清单 10-21 中所示的存根。


