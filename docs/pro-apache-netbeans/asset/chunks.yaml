- fmt: '# Collaboration


    The Apache NetBeans IDE helps teams work easily together using integrated support
    for version control systems (VCS) such as `Git`, `Mercurial`, and `Subversion`.
    The IDE contains first-class support for these VCS, as each Apache NetBeans project
    can be managed separately from within the IDE. Prior to integrating with either
    of the VCS, the system of choice must be installed on the same workstation as
    Apache NetBeans. The Apache NetBeans Preferences “Team” ➤ “Versioning” tab can
    then be used to manage the VCS of choice (Figure [1-9](#479166_1_En_1_Chapter.xhtml#Fig9)).


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig9_HTML.jpg](Images/479166_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Apache NetBeans Version Control Preferences


    The next couple of paragraphs will outline the Apache NetBeans `Git` support.
    However, the same level of support is available for `Mercurial` or `Subversion`
    as well. The “Team” menu provides options for creating new or browsing existing
    repositories (Figure [1-10](#479166_1_En_1_Chapter.xhtml#Fig10)).


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig10_HTML.jpg](Images/479166_1_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Apache NetBeans Team Menu


    The “Open Global Configuration” option provides the ability to manage the `global
    .gitconfig` file directly within the editor, as seen in Figure [1-11](#479166_1_En_1_Chapter.xhtml#Fig11).


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig11_HTML.jpg](Images/479166_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    Managing Global Git Configuration File


    There are also VCS options available within the contextual menu by right-clicking
    an Apache NetBeans project. Options include the ability to initialize a repository
    (Figure [1-12](#479166_1_En_1_Chapter.xhtml#Fig12)), and a host of available options
    are available for working on the VCS repository for projects that have already
    been initialized and have a repository (Figure [1-13](#479166_1_En_1_Chapter.xhtml#Fig13)).


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig13_HTML.jpg](Images/479166_1_En_1_Fig13_HTML.jpg)


    Figure 1-13


    Git Options for Initialized Project


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig12_HTML.jpg](Images/479166_1_En_1_Fig12_HTML.jpg)


    Figure 1-12


    Initializing a Repository for an Apache NetBeans Project


    The IDE contains an integrated Push/Pull system for the VCS, so if a project contains
    files that have been modified and differ from the `HEAD`, then the text for those
    files turns green. It is then easy to perform a `DIFF` comparison between the
    `HEAD` and currently selected file, and commit changes to a repository simply
    by choosing options within the contextual menu and using the dialogs (Figure [1-14](#479166_1_En_1_Chapter.xhtml#Fig14)).


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig14_HTML.jpg](Images/479166_1_En_1_Fig14_HTML.jpg)


    Figure 1-14


    Comparing Files Using DIFF


    Apache NetBeans covers many more version control features. To see more information
    about such features, please refer to online resources for using `Git` with Apache
    NetBeans: [`https://netbeans.apache.org/kb/docs/ide/git.html`](https://netbeans.org/kb/docs/ide/mercurial.html)
    or `Mercurial`: [`https://netbeans.org/kb/docs/ide/mercurial.html`](https://netbeans.org/kb/docs/ide/mercurial.html)
    just to name a few.


    # Profiling, Debugging, and Refactoring


    The Apache NetBeans IDE contains excellent profiling, debugging, and refactoring
    abilities. The profiler allows one to dig into the internals of application method
    calls to pinpoint troublesome areas. The Telemetry profiler screen provides an
    overview of CPU and Garbage Collector, Memory, Garbage Collection, and lastly,
    Threads and Classes. The CPU and Garbage Collector chart allows drilling in to
    specific times to find CPU and GC Time, Memory provides Heap Size and Used Heap,
    Garbage Collection displays Surviving Generations, and the Threads and Classes
    chart shows just that, the number of threads and loaded classes (Figure [1-15](#479166_1_En_1_Chapter.xhtml#Fig15)).


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig15_HTML.jpg](Images/479166_1_En_1_Fig15_HTML.jpg)


    Figure 1-15


    Telemetry Display


    Process buttons invoke certain functions, such as garbage collection at-will.
    Method profiling allows one to profile all classes, project classes, or selected
    classes only. The user interface makes it easy to drill into single method calls
    to pinpoint problems (Figure [1-16](#479166_1_En_1_Chapter.xhtml#Fig16)).


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig16_HTML.jpg](Images/479166_1_En_1_Fig16_HTML.jpg)


    Figure 1-16


    Methods Profiler


    The object profiler enables sorting of objects by size, and double-clicking an
    object will take you directly to the sources (Figure [1-17](#479166_1_En_1_Chapter.xhtml#Fig17)).


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig17_HTML.jpg](Images/479166_1_En_1_Fig17_HTML.jpg)


    Figure 1-17


    Object Profiler


    These features just scratch the surface of the Apache NetBeans profiler. The debugger
    allows one to set breakpoints in code, and then execute the code (locally or deployed
    to server), and step through the code to help debug and find the cause of issues.
    Once a breakpoint is set in the code, the debugger will stop execution at the
    breakpoint, and the IDE will display the values of variables at that time (Figure
    [1-18](#479166_1_En_1_Chapter.xhtml#Fig18)).


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig18_HTML.jpg](Images/479166_1_En_1_Fig18_HTML.jpg)


    Figure 1-18


    Apache NetBeans Debugger


    The debugger also allows one to set watches on variables, enabling the code execution
    to stop when a variable contains a specified value. There is also a snapshot option
    that allows snapshots to be taken at specified times so that code can be monitored
    as it is executing. If developing a JavaFX or Swing graphical user interface,
    there is a visual debugger that allows viewing of component properties, components
    within a container, and more. Please refer to Chapter [5](#479166_1_En_5_Chapter.xhtml)
    to learn more about the debugger and profiler.


    Another key component of an IDE is the ability to refactor code. Apache NetBeans
    allows one to change the name of code files, automatically add code such as getters
    and setters, change method parameters, and more (Figure [1-19](#479166_1_En_1_Chapter.xhtml#Fig19)).


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig19_HTML.jpg](Images/479166_1_En_1_Fig19_HTML.jpg)


    Figure 1-19


    Apache NetBeans Refactor Context Menu


    ## Apache NetBeans Platform


    Apache NetBeans is much more than an IDE for applications. The IDE is built on
    a platform designed specifically for the purpose of creating rich client desktop
    applications ... the NetBeans Platform. As it turns out, the platform is extremely
    extensible and can be very useful for developing any number of desktop-based applications
    for the Java Platform. In fact, there are many successful applications that have
    been built upon the NetBeans Platform ranging from entire desktop applications
    to useful utilities. The NetBeans Platform also enables one to easily build modules
    that can be installed to extend Apache NetBeans IDE. The IDE itself contains project
    templates that can be used for building applications and modules that utilize
    the NetBeans Platform.


    To develop a NetBeans module, open the “New Project” dialog and select the “NetBeans
    Modules” category (Figure [1-20](#479166_1_En_1_Chapter.xhtml#Fig20)). There are
    a number of options from which to choose for creating a NetBeans module, ranging
    from development of a single module, to a module library, to an entire NetBeans
    Platform Application.


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig20_HTML.jpg](Images/479166_1_En_1_Fig20_HTML.jpg)


    Figure 1-20


    New Project: NetBeans Modules'
