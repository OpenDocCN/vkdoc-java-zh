    \ Portal (see wiki: [`https://cwiki.apache.org/confluence/display/NETBEANS/Quality+criteria+for+Plugin+Portal+Update+Center`](https://cwiki.apache.org/confluence/display/NETBEANS/Quality%252Bcriteria%252Bfor%252BPlugin%252BPortal%252BUpdate%252BCenter)),\n\
    \    you can select to have your plugin verified and approved for publication\n\
    \    by choosing the “**Request Verification**” button.\n\nSummary\nIn this chapter\
    \ we walked through several guides about how to create\na NetBeans plugin with\
    \ Maven for a new language. You have seen how easy\nit is to create a template\
    \ for a new project, how to recognize a new\nfile type, and achieve syntax highlighting\
    \ and error hint with the help\nof ANTLR. We also touched on the code completion\
    \ and navigator window.\nNetBeans’ lookup API was used for communication between\
    \ packages. In the\nend, you have seen the necessary steps to sign and publish\
    \ the\nplugin.\nIn the next chapter you will see why NetBeans was shifted under\
    \ the\numbrella of the Apache Software Foundation and how you can contribute to\n\
    the project.\n\nFootnotes\n\nPart\nIIIParticipating in Apache\nNetBeans\n\n12. The\
    \ Apache NetBeans Process\n\nWhat makes the Apache Software Foundation (“Apache”\
    \ for short)\nspecial and well suited to NetBeans is its governance model. Often\
    \ the\nquestion is asked, “Since NetBeans is and always has been free and open\n\
    source, does it need Apache at all?” That is the question we are going\nto address\
    \ in this chapter.\nBy the end of this chapter, we hope you understand the background\
    \ of\nthe transition of NetBeans to Apache, the benefits of that transition,\n\
    and especially how you can get involved in contributing to the project\nyourself.\n\
    \nOf Pubs and Legends\nLegend has it that NetBeans found its origin in the pubs\
    \ and drinking\nhouses of Prague. In many senses, this is true. A group of students\
    \ from\nthe technical university of Prague developed a tool to support the\ndevelopment\
    \ of Java, which was new and toolless at the time, in 1996.\nAccording to the\
    \ same legend, not much was developed, though a lot was\nconsumed; and though\
    \ the plans for the tool were well described, they\nwere only implemented after\
    \ the students graduated and realized that\nthey had a good idea whose time had\
    \ come.\nThe curious name “NetBeans” can also be understood in that light,\nthat\
    \ is, two of the hot topics of that time were “JavaBeans” and\n“Network,” and\
    \ combining those two terms into one was as logical as\ncurrent names such as\
    \ “Facebook” and “Netflix.” Not long\nthereafter, Sun\nMicrosystems (“Sun” for\
    \ short) acquired NetBeans when James\nGosling, the founder of Java, and Jonathan\
    \ Schwartz, who led the tooling\ndivision at Sun, saw it demonstrated at a conference,\
    \ and recognized in\nit the basis of an environment that could enable new developers\
    \ to\nquickly and comprehensively start their journey into the Java\nlandscape.\n\
    Positioning it as a tool for onboarding new Java developers and\nenabling professional\
    \ developers to be productive, Sun open sourced\nNetBeans and work was started\
    \ to modularize it. According to yet another\nlegend, the developers of NetBeans\
    \ were, in any case, primarily\ninterested in creating a modular framework and\
    \ then created the NetBeans\nintegrated development\nenvironment (IDE) on top\
    \ of their modular framework purely as a\nmeans to prove the framework. In this\
    \ way, the development environment\nwas an afterthought, with the underlying NetBeans\
    \ Platform (which you\nlearned about in Part II) being the core domain of interest\
    \ to its\ndevelopers.\n\nModular Transition to Apache\nWhatever the case, its\
    \ modularity has turned\nout to be one of its key strengths, in particular, in\
    \ relation to the\ntransition to Apache.\nAfter Oracle’s acquisition of Sun in\
    \ 2010, NetBeans had a number of\ninteresting new use cases in its newly adopted\
    \ company. It became the\nbasis of Oracle’s JDeveloper and several of its features\
    \ were reused\nthere, such as the window system, the GUI Builder, and the Profiler.\
    \ In\nOracle Labs, it became a central piece of the tooling around the new\npolyglot\
    \ GraalVM. However, partly as a result of continuing requests\nfrom the community\
    \ to be more directly involved in the development of\nNetBeans, partly as a result\
    \ of reprioritization, and partly in an aim\nto share the cost of ownership, Oracle\
    \ decided to donate NetBeans to\nApache, in October 2016.\nVery explicitly, Oracle\
    \ stated that it wanted to continue to invest\nresources in NetBeans and that\
    \ its decision to donate it to Apache did\nnot mean in any sense that it was abandoning\
    \ it. In fact, as evidence of\nits stated direction, a team of developers in Oracle,\
    \ within the Java\norganization, continues to work to this day on NetBeans, specifically\n\
    focused on providing Java editor enhancements related to new language\nfeatures\
    \ in the Java Development Kit (JDK) and Java language.\nMoreover, a team within\
    \ Oracle has been working from the start of the\ntransition and meeting on a weekly\
    \ basis to discuss the current state of\nthe transition of code to Apache, assign\
    \ tasks, report on progress, and\nso on."
