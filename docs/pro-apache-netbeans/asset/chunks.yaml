    With `createView()` or `createSatelliteView()` methods, you create a `JComponent`
    that can be embedded in any Swing container. Similarly, with `getSceneAnimator()`
    method, you can create a `SceneAnimator` (which contains a few built-in animations).
    `LayerWidget` acts like a `JGlassPane` and it is typically used as a container
    for other widgets.


    ## ConnectionWidget


    The `ConnectionWidget` represents a connection between two locations. The locations
    are resolved by `Anchor`s (see Figure [10-19](#479166_1_En_10_Chapter.xhtml#Fig19)).
    The path of the connection is specified by *control points*, which are resolved
    by `Router`s (see Figure [10-20](#479166_1_En_10_Chapter.xhtml#Fig20)).


    A number of anchor types are supported (created by `AnchorFactory`): center, circular,
    directional, fixed, or rectangular. `Router`s (created by `RouterFactory`) can
    be orthogonal, direct, or free (`DirectRouter` is used by default).


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig20_HTML.jpg](Images/479166_1_En_10_Fig20_HTML.jpg)


    Figure 10-20

    ConnectionWidget example with control points


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig19_HTML.jpg](Images/479166_1_En_10_Fig19_HTML.jpg)


    Figure 10-19

    ConnectionWidget


    ## Borders


    Each `Widget` has a border, which by default is an empty border, provided by the
    `EmptyBorder` class. Borders implement the `Border` interface. Examples of borders
    are `LineBorder`, `BevelBorder`, `DashedBorder`, `ImageBorder`, `ResizeBorder`.
    Switching to a different border is done via `Widget.setBorder()` as shown in Listing
    [10-30](#479166_1_En_10_Chapter.xhtml#PC30). Borders are created via `BorderFactory`.


    ```

    widget.setBorder(BorderFactory.createLineBorder(2,Color.BLUE));

    Listing 10-30

    Define a Border for a Widget

    ```


    ## Layouts


    A widget can be a container for additional widgets and also has a layout defined
    and managed by a `LayoutManager`. The following layout variants are provided:


    `AbsoluteLayout`, `FlowLayout`, `CardLayout`, `OverlayLayout`. Listing [10-31](#479166_1_En_10_Chapter.xhtml#PC31)
    shows how to assign a layout to a widget using the `LayoutFactory`.


    ```

    layerWidget.setLayout(LayoutFactory.createVerticalFlowLayout());

    Listing 10-31

    Define a layout for a Widget

    ```


    ## WidgetAction


    The behavior of a `Widget` is described by its *Actions*, which are defined by
    the `WidgetAction` interface (see Figure [10-21](#479166_1_En_10_Chapter.xhtml#Fig21)).
    This interface defines methods called by corresponding events, such as the click
    of a mouse on the Widget to which the Action is assigned. The Visual Library provides
    predefined Actions, which can also be customized, for standard functionality,
    such as moving and editing of Widgets. Examples of Actions include `MoveAction`,
    `HoverAction`, `ZoomAction`, `PanAction`. Actions do not need to be defined and
    instantiated. Instead, they are assigned to a `Widget` by the `ActionFactory`
    class. To create actions for widgets, use `ActionFactory` and add them to the
    widgets with method `addAction()` (see Listing [10-32](#479166_1_En_10_Chapter.xhtml#PC32)).
    Some `ActionFactory` methods require a provider (such as the `EditAction`). Other
    actions have default providers (such as the `MoveAction`). If you wish to deviate
    from the default behavior, though, use another provider. Available providers:
    `AcceptProvider`, `ConnectProvider`, `ContiguousSelectProvider`, `CycleFocusProvider`,
    `EditProvider`, `HoverProvider`, `InplaceEditorProvider`, `MoveControlPointProvider`,
    `MoveProvider`, `PopupMenuProvider`, `ReconnectProvider`, `RectangularSelectProvider`,
    `ResizeProvider`, `SelectProvider`, `TwoStateHoverProvider`.


    Actions are chained. `WidgetAction.Chain` class represents a chain of widget actions;
    it receives user events and forwards them to the related Actions. When you call
    `getActions()` on a `Widget`, you actually get the `Chain`. Of course, order of
    actions is important.


    ```

    labelWidget.getActions().addAction(

    ActionFactory.createMoveAction());

    Listing 10-32

    Add an action to a Widget

    ```


    Actions can also be grouped together. This can be done by calling `Scene.setActiveTool()`
    method and then using `getActions("activeTool")` instead of `getActions()`.


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig21_HTML.jpg](Images/479166_1_En_10_Fig21_HTML.jpg)


    Figure 10-21

    Widget actions


    ## Palette


    You usually use the Visual Library in combination with the `Palette` to drag `Widget`s
    from the `Palette` to a `Scene`. The `Palette` is a `TopComponent` containing
    items that can be dragged and dropped onto a component of your choice within any
    other `TopComponent`.


    The `TopComponent` publishes a `PaletteController` in its `Lookup`, together with
    `Action`s that hook into the right-click pop-up menus on categories and items
    in the `Palette`. The `Palette` opens together with the `TopComponent`, if a `PaletteController`
    is found in the `Lookup` of the `TopComponent`. The `PaletteFactory.createPalette()`
    method returns an implementation of the `PaletteController` and associates it
    with the `TopComponent` by putting it into its `Lookup` (see Listing [10-33](#479166_1_En_10_Chapter.xhtml#PC33)).


    ```

    associateLookup(Lookups.singleton(

    PaletteFactory.createPalette(...)));

    Listing 10-33

    Associate the Palette with the TopComponent’s Lookup

    ```


    By default, when an item is dragged from a Palette, it cannot be dropped. You
    must explicitly define a component as a *drop target*; otherwise it cannot be
    a recipient of a Palette’s *drop event*. If you wish to combine the Palette with
    the Visual Library, then the drop target is a `Scene`.


    The code example of Listing [10-34](#479166_1_En_10_Chapter.xhtml#PC34) shows
    how whenever a drop occurs on the `Scene`, a new `LabelWidget` is created. One
    can configure the `Palette` by right-clicking on it and selecting the **Palette
    Manager** action from the pop-up menu.'
