    \nHyperledger Fabric\nis the runtime for the business networks. There are scripts\
    \ to install\nthis runtime. Download into a directory of your choice:\n\n```\n\
    mkdir ~/fabric-dev-servers && cd ~/fabric-dev-servers\ncurl -O https://raw.githubusercontent.com/hyperledger/composer-tools/master/packages/fabric-dev-servers/fabric-dev-servers.tar.gz\n\
    tar -xvf fabric-dev-servers.tar.gz\n```\n\nExecute the following commands:\n\n\
    ```\nexport FABRIC_VERSION=hlfv12\n./downloadFabric.sh\n```\n\nYou have finished\
    \ preparing your environment to work with\nHyperledger.\nFor more details, consult\
    \ the installation instructions:\n[`https://hyperledger.github.io/composer/latest/installing/development-tools.html`](https://hyperledger.github.io/composer/latest/installing/development-tools.html).\n\
    \nLet’s create a new skeleton business network with Yeoman in the console.\nThis\
    \ business network will be used during the development of the plugin.\n\n```\n\
    yo hyperledger-composer:businessnetwork\n? Business network name: ledger\n? Description:\
    \ sample\n? Author name: admin\n? Author email: admin@web.org\n? License: Apache-2.0\n\
    ? Namespace: org.example.biznet\n? Do you want to generate an empty template network?\
    \ No: generate a populated sample network\ncreate package.json\ncreate README.md\n\
    create models/org.example.biznet.cto\ncreate permissions.acl\ncreate .eslintrc.yml\n\
    create features/sample.feature\ncreate features/support/index.js\ncreate test/logic.js\n\
    create lib/logic.js\n```\n\nCreate a New Module\n\nUnder the hood we are using\
    \ Maven as a build tool.\nStart a new Module with: “File” ➤ “New Project” ➤ “Java\
    \ with Maven” ➤\n“NetBeans Module”. Figure [11-2](#479166_1_En_11_Chapter.xhtml#Fig2)\
    \ shows\nNetBeans’ project wizard.\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig2_HTML.jpg](Images/479166_1_En_11_Fig2_HTML.jpg)\n\
    \nFigure 11-2\nWizard to create a new NetBeans module with Maven\n\nNext, give\
    \ your project a meaningful name like ‘ledger’ and then\nselect your target platform,\
    \ you can start with RELEASE82\\. Click on\nFinish to complete the action.\n\n\
    We will add test dependencies. Select the project node ‘Test\nDependencies’, right-click,\
    \ and choose ‘Add Dependency’. This\nwill bring up the dialog, shown in Figure\
    \ [11-3](#479166_1_En_11_Chapter.xhtml#Fig3)."
  trans: '

    *   **参与者：** 代表参与业务的各方；

    *   **交易：** 由参与者提交，是一种影响资产的状态变更；

    *   **枚举：** 与 Java 中的枚举类似，是一组值的集合；

    *   **事件：** 可由交易函数触发，应用程序可以订阅事件。


    该语言为资源中的字段声明提供了一系列基本类型：


    *   `Boolean`：布尔值，值为 true 或 false；

    *   `String`：UTF-8 编码的字符串；

    *   `Integer`：32 位有符号整数；

    *   `Long`：64 位有符号整数；

    *   `Double`：双精度 64 位数值；

    *   `DateTime`：符合 ISO-8601 标准的时间实例，可包含时区和 UTC 偏移量。


    Hyperledger Composer 语言并未定义交易的规则；该逻辑属于另一个用 JavaScript 编写的文件。


    Hyperledger 准备工作

    为了正常使用 Hyperledger，我们需要安装一些工具。请确保您的机器满足[`https://hyperledger.github.io/composer/latest/installing/installing-prereqs.html`](https://hyperledger.github.io/composer/latest/installing/installing-prereqs.html)中描述的先决条件。由于我们将开发自己的编辑器，因此可以跳过安装
    VSCode 的部分。


    完成这些步骤后，请全局安装 Hyperledger Composer 命令行工具、应用程序生成器和 Yeoman：


    ```

    npm install -g composer-cli@0.20

    npm install -g generator-hyperledger-composer@0.20

    npm install -g yo

    ```


    您还应该安装 Hyperledger Composer Playground，它提供了一个用于配置、部署和测试业务网络的用户界面。


    ```

    npm install -g composer-playground@0.20

    ```


    Hyperledger Fabric 是业务网络的运行时环境。有一些脚本可以安装此运行时。请下载到您选择的目录中：


    ```

    mkdir ~/fabric-dev-servers && cd ~/fabric-dev-servers

    curl -O https://raw.githubusercontent.com/hyperledger/composer-tools/master/packages/fabric-dev-servers/fabric-dev-servers.tar.gz

    tar -xvf fabric-dev-servers.tar.gz

    ```


    执行以下命令：


    ```

    export FABRIC_VERSION=hlfv12

    ./downloadFabric.sh

    ```


    您已完成 Hyperledger 工作环境的准备。

    更多详细信息，请参阅安装说明：[`https://hyperledger.github.io/composer/latest/installing/development-tools.html`](https://hyperledger.github.io/composer/latest/installing/development-tools.html)。


    让我们在控制台中使用 Yeoman 创建一个新的骨架业务网络。该业务网络将在插件开发过程中使用。


    ```

    yo hyperledger-composer:businessnetwork

    ? Business network name: ledger

    ? Description: sample

    ? Author name: admin

    ? Author email: admin@web.org

    ? License: Apache-2.0

    ? Namespace: org.example.biznet

    ? Do you want to generate an empty template network? No: generate a populated
    sample network

    create package.json

    create README.md

    create models/org.example.biznet.cto

    create permissions.acl

    create .eslintrc.yml

    create features/sample.feature

    create features/support/index.js

    create test/logic.js

    create lib/logic.js

    ```


    创建一个新模块


    底层我们使用 Maven 作为构建工具。

    通过以下步骤启动一个新模块：“文件” ➤ “新建项目” ➤ “Java with Maven” ➤ “NetBeans 模块”。图 11-2 展示了 NetBeans
    的项目向导。


    ![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig2_HTML.jpg](img/479166_1_En_11_Fig2_HTML.jpg)


    图 11-2

    使用 Maven 创建新 NetBeans 模块的向导


    接下来，为您的项目取一个有意义的名称，例如“ledger”，然后选择您的目标平台，可以从 RELEASE82 开始。点击“完成”以结束操作。


    我们将添加测试依赖项。选择项目节点“测试依赖项”，右键单击，然后选择“添加依赖项”。这将弹出如图 11-3 所示的对话框。

