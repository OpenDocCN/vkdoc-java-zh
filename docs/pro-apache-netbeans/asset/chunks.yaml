    添加按钮会打开一个新对话框，允许您从 IDE 中已打开的项目中选择类。该对话框由三个列表（*项目*、*包*和*类*）组成，这些列表都可以进行过滤，以便更快地访问特定项。*包*列表的内容可以切换为包含来自项目的包，和/或包含来自依赖项的包（通过列表视图下方的两个切换按钮）。*类*列表显示所选包中的类。此列表还可以显示内部类和匿名类以供选择（使用列表视图下方的切换按钮）。完整的
    UI 如图 6-47 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig47_HTML.jpg](img/479166_1_En_6_Fig47_HTML.jpg)


    图 6-47


    从项目中选择的对象


    该对话框可以从基于项目的选择切换到基于 jar 文件的类选择。可以通过*文件*列表下方的按钮添加或删除要使用的文件/文件夹，该列表显示实际使用的文件和文件夹列表。*包*和*类*列表的工作方式与基于项目的选择列表类似，如图
    6-48 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig48_HTML.jpg](img/479166_1_En_6_Fig48_HTML.jpg)


    图 6-48


    从 jar 文件中选择的对象


    使用实时结果非常强大，例如，通过使用工具栏将视图切换到*显示绝对值*来利用增量模式。这类似于*方法*性能分析中可用的功能，但对于堆的性能分析更为有用。显示的值描述了从切换视图那一刻起内存消耗的变化。这为您提供了一个机会，可以建立实际内存消耗的基线，并仅跟踪在应用程序代码的特定部分执行期间内存分配的情况。图
    6-49 中显示的实时结果展示了与采样模式相比，检测式性能分析会话的额外能力，例如，右侧提供了分代计数。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig49_HTML.jpg](img/479166_1_En_6_Fig49_HTML.jpg)


    图 6-49


    带有检测的对象实时视图


    在每个类的统计行下方，可以通过点击每个类名前面的小箭头展开树视图来显示记录的分配堆栈跟踪。该视图将显示一个合并的反向堆栈跟踪树，展示通过哪些代码路径分配了多少实例。这是找出内存泄漏根源的关键信息。此类树的一个示例如图
    6-50 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig50_HTML.jpg](img/479166_1_En_6_Fig50_HTML.jpg)


    图 6-50


    带有分配回溯的对象实时视图


    除了实时结果，还可以通过使用工具栏操作*获取收集结果的快照*来创建当前*对象*性能分析会话的结果快照。这使我们能够存储结果以供后续使用，或与其他快照进行比较。一个示例快照视图如图
    6-51 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig51_HTML.jpg](img/479166_1_En_6_Fig51_HTML.jpg)


    图 6-51


    对象快照结果


    #### 线程与锁


    *线程*和*锁*性能分析可以更深入地了解应用程序代码的实际执行方式。通过使用*性能分析*下拉菜单中的*启用多模式*设置将两种模式结合起来，可以分析您的代码是真正在
    CPU 上运行，还是因等待锁或其他资源（如同步 I/O）而被阻塞。


    *线程*视图显示一个可过滤的列表（有关过滤机制的处理，请参见上面的“方法”部分），其中包含颜色编码的线程状态。这使我们能够实时了解应用程序如何使用线程，以及线程是真正在运行还是被阻塞（例如，长时间阻塞或频繁短时间阻塞）。一个简单的*线程*实时视图示例如图
    6-52 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig52_HTML.jpg](img/479166_1_En_6_Fig52_HTML.jpg)


    图 6-52


    线程实时视图


    与*方法*和*对象*性能分析模式不同，*线程*模式不提供结果快照功能。既然您已经看到线程被阻塞而无法执行，那么问题来了：是什么阻塞了它们的执行？激活*锁*性能分析可以回答这个问题。*锁*视图详细显示了哪个线程被阻塞以及阻塞了多长时间。一个非常简单的示例如图
    6-53 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig53_HTML.jpg](img/479166_1_En_6_Fig53_HTML.jpg)


    图 6-53


    锁实时视图


    ### SQL 查询


    对 SQL 查询进行性能分析只是锦上添花。对应用程序 SQL 查询的 SQL 性能分析会收集语句的跟踪和执行时间。它还可以跟踪与数据库连接的建立，这可能有助于调整您的连接池。

