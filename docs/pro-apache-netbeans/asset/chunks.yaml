- fmt: '### DataSystem API


    The *Data System API* is an important bridge between the *FileSystem API* and
    the *Nodes API* (that we shall describe in the next chapter). The main classes
    of this API are `DataObject` and `DataNode`. The `DataObject` wraps a `FileObject`,
    and the `DataNode` displays it in the UI or presentation layer. All of them have
    a `Lookup`, which is important for accessing the capabilities associated with
    a file. `DataLoader`s recognize the `FileObject` type via its MIME type, and create
    the `DataObject` associated with it.


    ```

    DataObject dob = DataObject.find(myfile);

    ```


    Note that multiple `FileObject`s can be associated with a `DataObject` (e.g.,
    a Swing Design form – a `DataObject` – uses two files – `FileObject`s - a `.java`
    file and a `.form` file). However, one of them is designated as the primary file:


    ```

    FileObject fob = dob.getPrimaryFile();

    ```


    Finally, here is how you can get access to the relevant `Node` from a `DataObject`
    and vice versa:


    ```

    Node node = dob.getNodeDelegate();

    DataObject mydob = ((DataNode)node).getDataObject();

    ```


    We shall describe the Node API in the next chapter. Additionally, we will see
    an application of the *FileSystem* and *DataSystem* APIs in Chapter [11](#479166_1_En_11_Chapter.xhtml)
    where we will develop a plugin for NetBeans. There we will learn how to create
    a new file type and register this file type with our plugin.


    ## An Example Application


    Let’s try to apply what we have learned so far by porting a Swing ToDo application
    to NetBeans RCP. If you wish to download the ToDo Swing application and build
    it yourself, please proceed; otherwise you may skip to the section of this chapter
    “*The Todo Swing Application*.” You may also find the fixed version in the book’s
    source code.


    ### Build the Todo Swing Application


    Download the original Swing application from here ([`http://netbeans.org/community/magazine/code/nb-completeapp.zip`](http://netbeans.org/community/magazine/code/nb-completeapp.zip)),
    unzip it, and open it in NetBeans. Since this is a rather old application, you
    will encounter a number of problems. Press the **Resolve Problems** button to
    get a list of the problems. Click **Resolve…** in order for NetBeans to try to
    resolve them.


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig6_HTML.jpg](Images/479166_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Resolve Project Problems of the ToDo application


    NetBeans will resolve the first and the last as shown in Figure [7-6](#479166_1_En_7_Chapter.xhtml#Fig6).
    The other two need to be resolved manually. Follow the instructions in this FAQ
    ([`http://wiki.netbeans.org/FaqFormLayoutGenerationStyle`](http://wiki.netbeans.org/FaqFormLayoutGenerationStyle))
    to resolve the “swing-layout” library issue.


    Download *hsqldb.zip* (from [`http://hsqldb.org`](http://hsqldb.org)), create
    a `lib` folder inside *TodoNB5*, and copy in there the `hsqldb.jar` file from
    `hsqldb.zip`. Right-click on *Libraries* and select **Add JAR/folder…** from the
    pop-up menu. Navigate to the `lib` folder and select the `hsqldb.jar` (make sure
    you have *relative path* selected).


    You should now be able to run it. When you run it, you should see the error in
    the status bar: **“Cannot fetch from the database”.** This is due to the version
    of HSQLDB. Open `TaskManager.java`, locate method `listTasksWithAlert()`, and
    replace `curtime()` with `CURRENT_TIMESTAMP`. Rerun the application. You should
    now be able to see a window with empty tasks.


    ### The Todo Swing Application


    As you can see in Figure [7-7](#479166_1_En_7_Chapter.xhtml#Fig7), the application
    consists of two windows. The main window provides a list of tasks. The *Task Details*
    dialog box allows the user to create a new or edit an existing task.


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig7_HTML.jpg](Images/479166_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    The ToDo application GUI


    Here is a short list of requirements of the application:


    *   Tasks should have a priority, so users can focus first on higher-priority
    tasks.

    *   Tasks should have a due date, so users can instead focus on tasks that are
    closer to their deadline.

    *   There should be visual cues for tasks that are either late or near their deadlines.

    *   Tasks can be marked as completed, but this doesn’t mean they have to be deleted
    or hidden.


    There are two main windows for the Todo application: a *tasks list* and a *task-editing
    form*. A rough sketch for both is shown in Figure [7-8](#479166_1_En_7_Chapter.xhtml#Fig8).


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig8_HTML.jpg](Images/479166_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Sketch of the ToDo application


    The Todo application is going to be developed in three steps:


    *   Step 1\. Build a “static” visual prototype of the user interface, using a
    visual GUI builder.

    *   Step 2\. Build a “dynamic” prototype of the application, coding user interface
    events and associated business logic, and creating customized UI components as
    needed.

    *   Step 3\. Code the persistence logic.


    It consists of three packages: `todo.model`, `todo.view`, `todo.controller` (see
    Figure [7-9](#479166_1_En_7_Chapter.xhtml#Fig9)).


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig9_HTML.jpg](Images/479166_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Package structure of the ToDo application


    As shown in Figure [7-10](#479166_1_En_7_Chapter.xhtml#Fig10), the Swing ToDo
    application follows the *Model-View-Controller* architecture.


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig10_HTML.jpg](Images/479166_1_En_7_Fig10_HTML.jpg)


    Figure 7-10


    The ToDo application architecture


    We shall create a similar architecture using the NetBeans platform module system,
    using modules instead of packages (see Figure [7-11](#479166_1_En_7_Chapter.xhtml#Fig11)).


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig11_HTML.jpg](Images/479166_1_En_7_Fig11_HTML.jpg)


    Figure 7-11


    The TodoRCP application architecture


    Let’s get started. Click on the **New Project** toolbar button and select the
    *NetBeans Platform Application* in the *NetBeans Modules* category (see Figure
    [7-12](#479166_1_En_7_Chapter.xhtml#Fig12)). Use *“TodoRCP”* as the project name
    and choose a suitable project location. Then click **Finish**.


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig12_HTML.jpg](Images/479166_1_En_7_Fig12_HTML.jpg)


    Figure 7-12


    Create a new NetBeans Platform Application project


    NetBeans creates the NetBeans Platform Application project containing an empty
    *Modules* folder and an *Important Files* folder. This is the container for the
    modules that will be created in the rest of this part of the book. We shall create
    the same *Model-View-Controller* structure for our *TodoRCP* application.


    Right-click the *Modules* folder icon and choose **Add New**. Type *“View”* as
    the module name and click **Next**. Type `todo.view` as the *Code Base Name* and
    then click on **Finish**. You should see the structure shown in Figure [7-13](#479166_1_En_7_Chapter.xhtml#Fig13).


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig13_HTML.jpg](Images/479166_1_En_7_Fig13_HTML.jpg)


    Figure 7-13


    Structure of the TodoRCP NetBeans Platform Application project


    Create the other two modules, *“Model”* (`todo.model`) and *“Controller”* (`todo.controller`),
    the same way. Finally, create a new module called *“Libraries”* that will wrap
    any external libraries required by the application.'
