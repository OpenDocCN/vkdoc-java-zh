    签名和共享插件

    创建插件后，可以通过 Apache NetBeans 插件门户与社区共享。通过插件门户提供的插件可以被社区中的任何人安装。插件门户可通过 Web 浏览器在网址
    [`http://netbeans-vm.apache.org/pluginportal/`](http://netbeans-vm.apache.org/pluginportal/)
    在线访问，^(⁴) 也可以在 Apache NetBeans IDE 中通过选择“工具” ➤ “插件”来访问。

    为了共享插件，必须使用证书对其进行签名，证书可以是自签名的，也可以是由证书颁发机构验证的。签名过程与将要分发的任何 Java JAR 归档文件的签名过程大致相同。签名
    JAR 或 NBM 文件有几种不同的方法，包括手动签名或将签名过程集成到构建中。在本节中，我们将介绍如何将该过程集成到 Maven 构建中。


    签名项目


    可以使用 Java keytool 实用程序为基于 ANT 或 Maven 的项目创建密钥库，然后更新构建文件以将密钥库集成到构建中，从而对项目进行签名以便分发。在此示例中，将更新项目的基于
    Maven 的 POM 文件以包含生成的密钥库。首先，打开命令行或终端，进入项目目录，然后执行 keytool 命令来生成密钥库。


    ```

    cd ../path-to-project

    keytool -genkey -storepass your-password -alias your-project-alias -keystore nbproject/private/keystore

    ```


    注意

    请务必将密钥库和密钥密码设置为相同的值。

    确保 nbproject/private 目录不会随归档文件一起分发，也不会提交到版本控制系统。


    生成密钥库并将其保存到诸如 nbproject/private 之类的目录后，可以更新项目 POM 文件以包含生成 NBM 文件时所需的 nbm-maven-plugin
    配置。只需将以下配置添加到 nbm-maven-plugin 插件部分即可。


    ```

    org.codehaus.mojo

    nbm-maven-plugin

    3.14.1

    true


    false

    org.netbeans.modules.hyperledger

    Your Name

    https://github.com/mario-s/nb-hyperledger

    nbproject/private/keystore

    your-project-alias

    Creative Commons BY 3.0

    https://creativecommons.org/licenses/by/3.0/


    ```


    创建 NBM


    如果你只有一个插件需要打包分发，最简单的创建二进制文件的方法是生成一个 NBM。有几种方法可以创建已签名的 NBM。首先，如果你不打算对 NBM 进行签名以便将其包含在插件中心，只需通过
    Apache NetBeans 生成 NBM 即可。为此，请在 Apache NetBeans 中执行以下步骤：


    ![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig18_HTML.jpg](img/479166_1_En_11_Fig18_HTML.jpg)


    图 11-18

    为插件分发创建 NBM 文件


    *   右键单击 Hyperledger Support 项目，然后选择“创建 NBM”（图 11-18）。IDE 将编译项目并将其打包成一个可分发的二进制
    NBM 文件。生成后，该文件将出现在项目的“build”目录中。


    要生成已签名的 NBM，可以通过命令行或终端进入项目目录并执行以下命令来完成 Maven 构建：


    ```

    mvn clean package nbm:nbm -Dkeystorepass=your-password

    ```


    NBM 签名并打包完成后，即可将其加载到插件门户中。请按照以下步骤将插件上传到门户。


    1.  使用 Sonatype 提供的说明（[`https://central.sonatype.org/pages/ossrh-guide.html`](https://central.sonatype.org/pages/ossrh-guide.html)）将插件上传到
    Maven Central。


    2.  如果你还没有 Google 帐户，请创建一个。


    3.  访问 Apache NetBeans 插件门户（[`http://netbeans-vm.apache.org/pluginportal/`](http://netbeans-vm.apache.org/pluginportal/)），并使用右上角的**登录**按钮进行身份验证。


    4.  在主菜单中点击“**添加插件**”按钮。


    5.  为你的插件提供相关信息（`groupId` 和 `artifactId` 值），然后点击“**添加插件**”按钮。这两个值包含在 `maven-metadata.xml`
    文件中。所有其他信息应自动添加。建议为你的插件添加主页和缩略图。选择“**保存插件**”。


    6.  在“我的插件”页面中选择适合你插件的 Apache NetBeans 版本，这将打开“版本管理”页面。


    7.  选择适当的兼容 Apache NetBeans 版本，提供可选的发布信息，然后选择“**保存插件版本**”。

