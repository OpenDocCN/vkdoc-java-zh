- fmt: "# Lookup API\n\nNetBeans uses a component-based way of development. Modules\
    \ or components developed by independent groups or individuals must be able to\
    \ communicate with each other in a loosely-coupled way.\n\nPreviously we learned\
    \ about how the Module System allows you to break up your application into loosely\
    \ coupled parts. These modules need a loosely coupled way to communicate with\
    \ each other, too. This is where the `Lookup` API fits in.\n\nOne of the biggest\
    \ challenges in the history of software design is how to design *loosely-coupled*\
    \ systems with *high cohesion*. “In [computing](https://en.wikipedia.org/wiki/Computing)\
    \ and [systems design](https://en.wikipedia.org/wiki/Systems_design) a loosely\
    \ coupled system is one in which each of its components has, or makes use of,\
    \ little or no knowledge of the definitions of other separate components,” according\
    \ to Wikipedia ([`https://en.wikipedia.org/wiki/Loose_coupling`](https://en.wikipedia.org/wiki/Loose_coupling)).\n\
    \n*Cohesion* means that all code (and resources) related to a particular feature\
    \ should be organized within the same module or the same set of modules. *Coupling*,\
    \ on the other hand, refers to the degree to which the modules depend on each\
    \ other. Modules should be independent of each other, as much as possible, enabling\
    \ components to be modified or moved around without a big impact on the application.\
    \ The higher the level of cohesion and the lower the level of coupling, the more\
    \ sustainable and robust with respect to future modifications (less maintenance\
    \ headache) the architecture is.\n\nLet’s assume that the `Client` and the `ProviderImpl`\
    \ exist in two different modules (see Figure [7-4](#479166_1_En_7_Chapter.xhtml#Fig4)).\
    \ How does the `Client` find the `ProviderImpl` (in a loosely coupled way)? Spring\
    \ uses *dependency injection* or *inversion of control* via its xml files. Java\
    \ 6 uses a Query-based approach, the `ServiceLoader` that we briefly describe\
    \ later in this chapter.\n\nNetBeans RCP introduces a new way to accomplish loose\
    \ coupling, the `@ServiceProvider`:\n\n![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig4_HTML.jpg](Images/479166_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4\n\nA loosely coupled system\n\n```\n@ServiceProvider(service = Provider.class,\
    \ position=1)\npublic class ProviderImpl implements Provider { }\n```\n\nThe magic\
    \ line is the first line that tells NetBeans that this class is an implementation\
    \ of the service `Provider.class`. NetBeans creates a text file `package.Provider`\
    \ inside `build/classes/META-INF/services/` folder of the module that contains\
    \ the fully qualified names of the implementation classes, for example, `package.ProviderImpl`.\
    \ If you have worked with `ServiceLoader`, then this is not new to you.\n\nHowever,\
    \ the big question has not been answered yet. How does the client find the implementation?\
    \ In NetBeans this is done with the use of *lookups*! The client looks in the\
    \ *default lookup* for the *interface* (not the implementation). The *default\
    \ Lookup* (also known as *service registry*) is a `Lookup` that evaluates the\
    \ service declarations in the `META-INF/services` folder. It is callable through\
    \ the `Lookup.getDefault()` method. By asking for a service interface in this\
    \ way, you receive instances of implementing classes registered in the `META-INF/services`\
    \ folder.\n\nA *lookup* is an observable map with class objects as keys and sets\
    \ of instances of these class objects as values, that is,\n\n```\nLookup = Map<Class,\
    \ Set<Object>>\n```\n\nfor example: `Map<String, Set<String>>` or `Map<Provider,\
    \ Set<Provider>>`.\n\nIt was created to allow for inter-component binding and\
    \ dependencies.\n\nNetBeans provides a number of methods to access a lookup (see\
    \ Listing [7-1](#479166_1_En_7_Chapter.xhtml#PC3)).\n\n```\nProvider provider\
    \ = Lookup.getDefault().lookup(Provider.class);\nprovider.aMethod();\nListing\
    \ 7-1\nAccessing the default lookup for a single implementation\n```\n\nor if\
    \ you have more than one implementation of `Provider` (see Listing [7-2](#479166_1_En_7_Chapter.xhtml#PC4)).\n\
    \n```\nCollection<? extends Provider> providers =\nLookup.getDefault().lookupAll(Provider.class);\n\
    for (Provider provider : providers) { ... }\nListing 7-2\nAccessing the default\
    \ lookup for many implementations\n```\n\nYou may also request a `Lookup.Result<T>`\
    \ that allows adding a `LookupListener` in order to be informed about content\
    \ changes (Listing [7-3](#479166_1_En_7_Chapter.xhtml#PC5)).\n\n```\nLookup.Result<Provider>\
    \ providers =\nLookup.getDefault().lookupResult(Provider.class);\nCollection<?\
    \ extends Provider> allProviders =\nproviders.allInstances();\nproviders.addLookupListener(new\
    \ LookupListener(){\n@Override\npublic void resultChanged(LookupEvent e){\n//\
    \ do something\n}}\n);\nListing 7-3\nAdding a LookupListener\n```\n\nAs you can\
    \ see from the above code examples, the client has no clue about which implementation\
    \ it uses; it only knows the interface. Loose coupling!\n\nImagine the lookup\
    \ as a map in memory that stores implementations of all the services of your application.\
    \ You put the service implementation in the lookup when you define it with the\
    \ `@ServiceProvider` annotation, and then you search for it using the above commands.\
    \ Service implementations can be in different modules and in *non*-public packages.\n\
    \nNetBeans also allows you to order implementations by ascending `position`s,\
    \ that is, instances with smaller numbers in the `position` attribute of the `@ServiceProvider`\
    \ annotation are returned before instances with larger numbers.\n\nWe have seen\
    \ two attributes of the `@ServiceProvider` annotation, `service` and `position`.\
    \ There are two more, not that commonly used: `path`, a path in the *System FileSystem*\
    \ where the provider is registered; and `supersedes`, a list of implementations,\
    \ which this implementation supersedes.\n\nThere are other lookups in NetBeans\
    \ apart from the *default lookup*, which is used to store services’ implementations,\
    \ and this often brings confusion. For example, each `OutlineView` or `TopComponent`\
    \ associates with it a lookup to store the nodes that are selected at a specific\
    \ time. You should not confuse this lookup with the default lookup. Here is a\
    \ short summary of `Lookup`s:\n\n*   *Global Lookup* is a singleton and works\
    \ like a central registry. There are two important global lookups:\n    *   *Default\
    \ Lookup* or *Service Registry*, which has been already described earlier, is\
    \ available by `Lookup.getDefault()`. It is an application-wide repository for\
    \ modules to discover and provide services. It is a central registry of *services*\
    \ allowing you to look up the service implementation classes inside the `META-INF/services`\
    \ folder. A client module can thus use a service without being aware of or dependent\
    \ on its implementation (loose coupling between modules).\n\n    *   *Actions\
    \ Global Context* available by `Utilities.actionsGlobalContext()` proxies the\
    \ `Lookup` of whatever has currently the focus in the application.\n\n*   *Local\
    \ Lookup*: classes may implement the `Lookup.Provider` interface and store objects\
    \ in their own `Lookup`. You may think of a lookup as a “bag of objects” that\
    \ an object can carry with it (Listing [7-4](#479166_1_En_7_Chapter.xhtml#PC6)).\n\
    \n```\npublic interface Lookup.Provider {\nLookup getLookup();\n}\nListing 7-4\n\
    Lookup.Provider interface\n```\n\nFor example, `TopComponent`, as we shall see\
    \ in the next chapter, implements this interface (Listing [7-5](#479166_1_En_7_Chapter.xhtml#PC7)).\n\
    \n```\nTopComponent tc = WindowManager.getDefault().findTopComponent(\"aTopComponent\"\
    );\nLookup tcLookup = tc.getLookup();\nListing 7-5\nTopComponent’s Lookup\n```\n\
    \n`TopComponent`s (are like `JFrame`s) usually put into their `Lookup` whatever\
    \ is selected. You can track the selection by adding a listener to the `TopComponent`\
    \ (Listing [7-6](#479166_1_En_7_Chapter.xhtml#PC8)).\n\n```\nLookup.Result<Node>\
    \ result = tcLookup.lookupResult(Node.class);\nCollection<? extends Node> allNodes\
    \ = result.allInstances();\nresult.addLookupListener(myLookupListener);\nListing\
    \ 7-6\nAdding a LookupListener to a TopComponent\n```\n\nYou may provide your\
    \ own `Lookup` to the `TopComponent`, too:\n\n```\ntc.associateLookup(mylookup);\n\
    ```"
