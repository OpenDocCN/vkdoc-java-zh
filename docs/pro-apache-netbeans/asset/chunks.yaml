    \ 采用模块化架构，使用了 Apache NetBeans 平台的\n*模块系统 API*。掌握本书第 2 部分的章节\n将帮助你编写代码来修复 bug，并为\
    \ IDE 添加新功能或插件。\n\nApache NetBeans IDE 由以下主要组件或\n集群组成：\n\n*   **apisupport**：包含许多支持\
