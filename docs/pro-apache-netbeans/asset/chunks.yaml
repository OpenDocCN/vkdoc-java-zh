    *Listing 10-34* Create a new `LabelWidget` when drag&drop on a `Scene`


    As an exercise, add a new module (`Visual`, `todo.visual`) to `TodoRCP` that allows
    the user to drop the `Task`s stored in the application from the `Palette` on a
    `Scene`. The user should also be able to connect tasks in order to show dependencies
    among them.


    ## Branding, Distribution, and Internationalization


    What remains to be done is to replace the splash screen and the *About* box, and
    you’re almost ready to distribute your application. The following are a few of
    the things you can do to brand and distribute your application:


    1.  Right-click your project and select **Branding**. Here you can select a splash
    screen and the icon to display when the application is minimized as well as the
    title to show in the application’s title bar. You can also control the windows
    behavior of your application (for example, you may disable floating) and finally
    internationalize the application, that is, change the UI in your preferred language
    (*Internationalization Resource Bundles* tab) by translating the resource bundles
    to that language.


    2.  Right-click your project and select **Properties**. In the *Application* category,
    you can change the application’s name. In the *Libraries* category, you can choose
    which clusters and modules to include to improve performance.


    3.  To create a distributable `.zip` or *installer* of your application, right-click
    your project, select **Properties**, and then the *Installer* category. Check
    the platform(s) that you wish to create installer(s) for (such as Windows, Mac
    OSX, Solaris, and Linux), and click **OK**. You may also provide a license. Right-click
    the project again, and select **Package as** and select one of the available options,
    such as *Installers* or *Zip distribution*.


    If everything ran smoothly, you created a new `dist` folder inside your project’s
    folder, which contains the deployed application. Unzip it, if needed, navigate
    inside (for example, `dist/todorcp/bin`) and execute the executable file (depending
    on your platform, which could be, for example, `todorcp.exe` or something similar).


    You can also allow online updates of your applications’ modules via the *Update
    center*, the same way that you download plugins, in order for example to provide
    bug fixes or new features. To provide this capability for your application, follow
    these steps:


    1.  Enable the *Auto Update Services* and *Auto Update UI* modules in the *platform*
    cluster (see Figure [10-10](#479166_1_En_10_Chapter.xhtml#Fig10)). After clean
    and build, verify that you have a **Tools ➤ Plugins** menu item that opens the
    *Plugin Manager*.


    2.  Right-click on the project, and select **Package as ➤ NBMs**. An `.nbm` (or
    *NetBeans Module*) file is created for each module in the `build/updates/` directory.
    The *Update Center descriptor* (`updates.xml`) is also created. You need to publish
    these files to a web server.


    3.  In the *Plugin Manager* window, click on **Settings** tab, then click **Add**
    and enter the URL to the *Update Center descriptor* (`updates.xml`).


    4.  Here ([`https://www.codenameone.com/blog/netbeans-plugin-update-center.html`](https://www.codenameone.com/blog/netbeans-plugin-update-center.html))
    is an example.'
