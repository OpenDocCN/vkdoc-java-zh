    Figure 4-28


    The PaletteManager dialog box


    For the due date, we can use a `JFormattedText` to save the date, but we shall
    see how to use a Date Picker Swing component instead. There are a number of available
    solutions, for example: *JDatePicker* ([`https://sourceforge.net/projects/jdatepicker/`](https://sourceforge.net/projects/jdatepicker/)),
    *JDateChooser* ([`http://plugins.netbeans.org/plugin/658/jdatechooser-1-2`](http://plugins.netbeans.org/plugin/658/jdatechooser-1-2)),
    *LGoodDatePicker* ([`https://github.com/LGoodDatePicker/LGoodDatePicker`](https://github.com/LGoodDatePicker/LGoodDatePicker))
    and the not maintained anymore *SwingX JXDatePicker* from SwingLabs ([`http://www.java2s.com/Code/Jar/s/Downloadswingxall165jar.htm`](http://www.java2s.com/Code/Jar/s/Downloadswingxall165jar.htm)).
    Unfortunately, none of them stores the picked date using the latest `java.time.LocalDateTime`.
    We will see how to integrate *SwingX JXDatePicker* from SwingLabs (it is left
    as an exercise to integrate any of the others if you wish). Download it and extract
    it to a folder on your machine.


    Right-click on the palette and select the *Palette Manager* from the context menu
    (see Figure [4-29](#479166_1_En_4_Chapter.xhtml#Fig29)).


