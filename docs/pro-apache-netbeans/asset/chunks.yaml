  trans: '

    如第 7 章中的图 7-7 所示，任务列表由菜单栏、工具栏、表格和状态栏组成。除了在 NetBeans RCP 中被称为 `OutlineView` 的表格外，平台负责处理其余所有部分。要添加
    `OutlineView`，你需要添加对 *Explorer & Property Sheet API* 的依赖。右键单击 *View* 模块的 *Libraries*
    文件夹，选择 **Add Module Dependency**，选择 **Explorer & Property Sheet API**，然后点击 **OK**。在设计视图中右键单击
    `TopComponent`，将其布局更改为 **BorderLayout**。


    从 *Palette window* 中拖拽一个 *Scroll Pane* 到 `TasksTopComponent` 的中心。在 *Navigator*
    窗口（查看左下角）中右键单击 `JScrollPane`，将其变量名更改为 `outlineView`。在 *Properties* 窗口中，点击 **Code**，然后点击
    *Custom Creation Code* 属性的小按钮 **[...]**，添加 `new OutlineView(),`，然后点击 **OK** 按钮。切换到
    *Editor window* 中的 Source 视图，右键单击，选择 **Fix Imports** 来修复错误。


    运行应用程序时，你将看到类似于图 9-4 的内容。


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig4_HTML.jpg](img/479166_1_En_9_Fig4_HTML.jpg)


    图 9-4


    TodoRCP 应用程序的首次执行


    看看使用 NetBeans RCP 你能直接获得多少功能，而在普通的 Swing 应用程序中，这些都需要你自己开发：一个菜单栏和一个工具栏（需要自定义）、一个状态栏，以及一个奇特的树表组件——所有这些只需一行代码。


    让我们从自定义菜单开始。如前几章所述，一个中央注册表保存着 NetBeans RCP ToDo 应用程序每个模块的信息。如果你点击 **Important
    Files ➤ XML Layer ➤ <this layer in context> ➤ Menu Bar**（见图 9-5），就可以在这个中央注册表中找到菜单栏。


    在图 7-7 中，我们看到只需要 *File*、*Edit* 和 *Options* 菜单。因此，保留 *File* 和 *Edit*，将 *Tools*
    重命名为 *Options*（通过选中它，右键单击，选择 **Rename**），然后删除其余部分以及内容操作（通过选中它们，右键单击，选择 **Delete**）。清理并构建
    *View* 模块，然后再次执行应用程序。^(³) 结果应该类似于图 9-6。


    将 *Tools* 重命名为 *Options* 后，你可能需要重启 NetBeans。


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig6_HTML.jpg](img/479166_1_En_9_Fig6_HTML.jpg)


    图 9-6


    具有自定义菜单栏的 TodoRCP 应用程序


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig5_HTML.jpg](img/479166_1_En_9_Fig5_HTML.jpg)


    图 9-5


    Layer XML – 中央注册表


    让我们用一些演示数据构建表格。点击 **Source**，在 `TasksTopComponent` 构造函数的末尾，添加清单 9-1 中所示的代码行。


    ```

    OutlineView ov = (OutlineView)outlineView;

    //设置大纲视图的列，

    //使用属性名称

    //后跟列标题中显示的文本

    ov.setPropertyColumns(

    "priority", "Priority",

    "description", "Task",

    "alert", "Alert",

    "dueDate", "Due Date");

    //隐藏根节点，因为我们只关心子节点：

    ov.getOutline().setRootVisible(false);

    TableColumnModel columnModel = ov.getOutline().getColumnModel();

    ETableColumn column = (ETableColumn) columnModel.getColumn(0);

    ((ETableColumnModel) columnModel).setColumnHidden(column, true);

    清单 9-1

    创建 OutlineView

    ```


    为了能够编译代码，你需要向 *ETable and Outline* 模块添加一个额外的依赖（并 **Fix Imports**）。你还记得如何操作吗？提示：右键单击
    *Projects* 选项卡中的 *Libraries* 文件夹，或参考第 7 章中的图 7-16。如果成功，你的应用程序应该看起来像图 9-7。


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig7_HTML.jpg](img/479166_1_En_9_Fig7_HTML.jpg)


    图 9-7


    具有 OutlineViews 列的 TodoRCP 应用程序


    接下来，让我们创建状态栏。要在 NetBeans 中显示 `StatusBar`，类必须实现 `StatusLineElementProvider` 接口并将其声明为服务。右键单击
    `todo.view` 包，选择 **New ➤ Java Class**。将其命名为 `StatusBar`，然后点击 **Finish**。然后复制清单
    9-2 中显示的代码并粘贴进去（你可能需要格式化代码；在编辑器内右键单击，从弹出菜单中选择 **Format**）。


    ```

    package todo.view;

    import java.awt.Component;

    import javax.swing.JLabel;

    import org.openide.awt.StatusLineElementProvider;

    import org.openide.util.lookup.ServiceProvider;

    /**

    * 应用程序的状态栏。

    */

    @ServiceProvider(service=StatusLineElementProvider.class, position=1)

    public class StatusBar implements StatusLineElementProvider {

    @Override

    public Component getStatusLineElement() {

    return new JLabel("There are no task alerts for today.");

    }

    }

    清单 9-2

    作为服务提供者实现的 StatusBar

    ```


    重新审视 `ServiceProvider` 和 `Lookup`。`StatusLineElementProvider` 接口非常灵活；你可以返回任何你想要的组件——`JLabel`、`JButton`、`JPanel`
    等等。当然，神奇之处在于第一行，它将 `StatusBar` 类声明为 `StatusLineElementProvider.class` 的服务提供者。正如你现在应该已经知道的，这一行将你的类添加到应用程序的
    *default lookup* 中，NetBeans 随后会搜索 `StatusLineElementProvider.class`，并将找到的所有提供者添加到状态栏中。


    接下来，让我们创建工具栏。工具栏包含操作，因此你将创建操作并将它们插入到中央注册表中的相应工具栏中。你需要原始 ToDo 应用程序中的图标。重复你在中央注册表中对
    *Menu Bar* 执行的操作，对 *Toolbars* 执行相同操作。只保留两个条目：*Edit, Options*（通过重命名一些并删除其余部分）。


    操作是控制器。打开 *Controller* 模块，创建 Java 包 `todo.controller.file`、`todo.controller.edit`
    和 `todo.controller.options`。右键单击 `todo.controller.edit` 包，选择 **New Action**。创建
    *Add Task* 操作，该操作始终启用，然后点击 **Next**。


    然后为操作选择一个类别。类别代表操作的语义分组。你可以选择一个已有的类别或创建一个新的类别。在我们的例子中，选择已有的 *Edit* 类别。此外，将你的操作分配给
    *Edit* 菜单栏和 *Edit* 工具栏，并设置操作显示的位置。下拉菜单会显示可能的显示位置。*"HERE"* 标识了你的操作显示将被插入的位置。不要忘记添加快捷键（*Insert*，与旧的待办事项应用程序相同）。见图
    9-8。


