    In Listings [8-22](#479166_1_En_8_Chapter.xhtml#PC26) and [8-23](#479166_1_En_8_Chapter.xhtml#PC27),
    we saw how NetBeans Platform can support context-sensitive actions. For more fine-grained
    support, one can use a `CookieAction`, which implements the `ContextAwareAction`
    interface. A `CookieAction` is activated when a selected node implements a certain
    marker interface (`Cookie`). It then gets one or more selected `Node`s in its
    `performAction()` method to perform the action upon them. Its `mode()` method
    allows to choose among one (as in Listing [8-21](#479166_1_En_8_Chapter.xhtml#PC25))
    or more cookies (i.e., selected objects) (as in Listing [8-22](#479166_1_En_8_Chapter.xhtml#PC26)).
    Listing [8-25](#479166_1_En_8_Chapter.xhtml#PC29) shows an example of a `CookieAction`.


    ```

    protected int mode() {

    return CookieAction.MODE_EXACTLY_ONE;

    // MODE_ALL, MODE_ANY, MODE_ONE, MODE_SOME

    }

    Listing 8-25

    An example of a CookieAction

    ```


    The `Actions` class provides helper methods for menu and toolbar presenters. It
    provides a number of static helper methods to, for example, create an *always-enabled*
    action (`Actions.alwaysEnabled(...)`), a `ContextAwareAction` (`Actions.callback(...)`),
    various `connect()` methods that allow you to attach menu items, check boxes,
    etc. to actions or to locate a specific action programmatically (`forID(String
    category, String id)`).


    ## Summary


    In this chapter we learned the User Interface components that the NetBeans Platform
    offers: the *Window System API*, the *Nodes API,* and the *Explorer & Properties
    Sheet API*. The window system API releases you of all the hassle of having to
    take care of window layout and windows actions by providing you all the functionality
    you need out of the box. The *Nodes* and the *Explorer & Properties Sheet* APIs
    offer you a truly MVC design of powerful UI components to build your application.
    The *Nodes* API allows you to create a representation of your data once to be
    rendered by any number of Explorer Views. Finally, the *Actions API*, built on
    top of the `ActionListener` interface, and with the power of *Lookups*, lets you
    concentrate on your business logic without needing to worry about presentation
    and enablement.


    In the next chapter, we shall see how to apply all these by implementing our *TodoRCP*
    application.


    # 9. Porting an Application to the NetBeans Platform


    Let’s see how we can apply what we learned in the previous chapter. In this chapter
    we shall continue porting the Swing *ToDo* application that we started in Chapter
    [7](#479166_1_En_7_Chapter.xhtml), to NetBeans RCP.


    In Chapter [7](#479166_1_En_7_Chapter.xhtml) we modularized our application and
    ported the *Model* part (using a mock `TaskManager` class that stores the tasks
    in memory instead of a persistent storage). In this chapter we shall port the
    *Controller* and the *View* parts.


    Our *ToDo* application consists of two windows as shown in Figure 8-7.


    As we already mentioned in Chapter [6](#479166_1_En_6_Chapter.xhtml), we shall
    develop our application in three parts:


    1. Build a “static” visual prototype of the user interface.

    2. Build a “dynamic” prototype of the application, coding user interface events
    and associated business logic, and creating customized UI components as needed.

    3. Code the persistence logic.


    ## Step 1 – Build the “Static” Prototype


    To create the main window, instead of creating a `JFrame Form` as is done in the
    Swing application, we will create its equivalent in NetBeans platform, as we learned
    in the previous chapter, a `TopComponent`.


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig1_HTML.jpg](Images/479166_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Wizard to create a new TopComponent, Step 2


    Right-click on the *View* module and select **New ➤ Window** (see Figure [9-1](#479166_1_En_9_Chapter.xhtml#Fig1)).


    The wizard asks you for the window position. NetBeans IDE has various positions
    as shown in Figure [8-2](#479166_1_En_8_Chapter.xhtml#Fig2). Make the selections
    shown in Figure [9-1](#479166_1_En_9_Chapter.xhtml#Fig1) and press **Next**.


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig2_HTML.jpg](Images/479166_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Wizard to create a new TopComponent, Step 3


    The *Class Name Prefix* is the name of the Frame or Panel that will be created
    along with some other help files. Provide the name “*Tasks*” (instead of “*TasksWindow*”
    in the Swing application), as shown in Figure [9-2](#479166_1_En_9_Chapter.xhtml#Fig2),
    and press **Finish**.


    Two files are created, `TasksTopComponent.java` and `TasksTopComponent.form`,
    and the form has been opened in *Design mode* in the editor along with the *Palette*
    (Figure [9-3](#479166_1_En_9_Chapter.xhtml#Fig3)).


    If you can see the `TasksTopComponent.form` file in the *Projects* tab and NetBeans
    complains that it cannot recognize the file when you open it, you need to activate
    *Java SE* plugin from **Tools ➤ Plugins ➤ Installed**.


    ![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig3_HTML.jpg](Images/479166_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    TasksTopComponent in Design view


    Notice the location of the *Projects* and *Navigator* windows on the left, and
    the *Editor* window in the center. A red frame highlights the selected component
    (`TopComponent`). The *Navigator* displays all visual and nonvisual components
    of `TopComponent`, which is handy when you need to change the properties of a
    component that’s hidden by another or that’s too small to be selected in the drawing
    area.


    To the right is the *Palette* window, which by default shows the standard Swing
    components (you can also add third-party JavaBeans). Also, to the right is the
    *Properties* window. Properties are categorized to ease access to the ones most
    commonly used, and changed properties have their names highlighted in bold.


    To change the visual layout of the IDE, you can drag each window to another corner
    of the main window or even leave some windows floating around by right-clicking
    their tab and selecting **Float**.


    Click on the **Source** button to view the annotations of Listing [8-1](#479166_1_En_8_Chapter.xhtml#PC1)
    and compare it with the dialog boxes of Figures [9-1](#479166_1_En_9_Chapter.xhtml#Fig1)
    and [9-2](#479166_1_En_9_Chapter.xhtml#Fig2). Notice that `mode = "editor"` (if
    not, here’s your chance to change it) and `openAtStartup = true` (again, if not,
    here’s your chance to change it).


    The NetBeans IDE visual editor allows developers to truly develop applications
    visually. Just right-click inside `TopComponent` and select the **Set Layout**
    menu item. You see that the default choice isn’t a traditional Swing/AWT layout
    manager; it’s something named *Free Design*. This means you’re using the Matisse
    Visual GUI builder. Matisse configures `TopComponent` to use the `GroupLayout`
    layout manager developed in the SwingLabs [`java.net`](http://java.net) project,
    which is included as a standard layout manager in Java SE 6.'
