    *Option type* (3rd parameter) can take one of the following values:


    * `NotifyDescriptor.DEFAULT_OPTION`

    * `NotifyDescriptor.OK_CANCEL_OPTION`

    * `NotifyDescriptor.YES_NO_OPTION`

    * `NotifyDescriptor.YES_NO_CANCEL_OPTION`


    *Message type* (4th parameter) can take one of the following values, which you
    may also pass as the 2nd parameter to `NotifyDescriptor.Message()` described in
    Listing [10-1](#479166_1_En_10_Chapter.xhtml#PC1):


    * `NotifyDescriptor.PLAIN_MESSAGE`

    * `NotifyDescriptor.INFORMATION_MESSAGE`

    * `NotifyDescriptor.QUESTION_MESSAGE`

    * `NotifyDescriptor.WARNING_MESSAGE`

    * `NotifyDescriptor.ERROR_MESSAGE`


    The 5th parameter can be used to pass in an `Object` array to add custom buttons
    to the dialog. Arrays of type `String`, `Component`, or `Icon` can be used. Listing
    [10-5](#479166_1_En_10_Chapter.xhtml#PC5) provides an example.


    ```java

    String[] buttons = new String[3];

    buttons[0] = "Play";

    buttons[1] = "Pause";

    buttons[2] = "Stop";

    NotifyDescriptor d = new NotifyDescriptor(

    "Message", // message

    "Title", // title

    NotifyDescriptor.DEFAULT_OPTION, // option type

    NotifyDescriptor.PLAIN_MESSAGE, // message type

    buttons, // custom buttons (as Object[])

    "Play"); // default value

    DialogDisplayer.getDefault().notify(d);

    ```

    Listing 10-5

    Display a dialog with custom buttons using the Dialogs API


