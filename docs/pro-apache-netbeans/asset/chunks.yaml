    are `PropertySupport.ReadOnly, PropertySupport.ReadWrite,` and `PropertySupport.WriteOnly`.'
  trans: '

    ## 资源管理器视图


    我们之前已经看到，*节点 API* 提供了一种向 UI 表示数据的通用方式。但 NetBeans 平台提供了哪些 UI 呢？


    *资源管理器与属性表 API* 包含一组 GUI 组件，称为资源管理器视图或资源管理器，用于渲染节点。你可以将节点显示在多个资源管理器视图中，也可以轻松地在它们之间切换，而无需对节点进行任何更改：这是真正的
    MVC 模式。相比之下，在 Swing 中，要将使用 `JTree` 的代码改为使用 `JTable`（或反之），需要进行大量的重写工作。


    表 8-1 展示了资源管理器视图与 Swing UI 类的对应关系。


    表 8-1


    资源管理器视图与 Swing 类


    | 资源管理器视图 | Swing 类 |

    | --- | --- |

    | `BeanTreeView` | `JTree` |

    | `OutlineView` | `JTable/JTree` |

    | `ListView` | `JList` |

    | `PropertySheetView` | `JList` |

    | `IconView` | `-` |

    | `ChoiceView` | `JComboBox` |


    清单 8-7 提供了一个 `OutlineView` 的示例，该视图可以添加到 `TopComponent` 的构造函数中。


    ```

    OutlineView ov = (OutlineView)outlineView;

    //设置大纲视图的列，

    //使用属性名称

    //后跟列标题中显示的文本

    ov.setPropertyColumns(

    "priority", "优先级",

    "description", "任务",

    "alert", "警报",

    "dueDate", "截止日期");

    add(ov);

    清单 8-7

    一个 OutlineView 实现

    ```


    `priority`、`description`、`alert` 和 `dueDate` 是 `Task` JavaBean 的属性。`OutlineView`
    是一种特殊的树/表视图，它显示树节点，并将表行显示为属性。在下一章中，我们将了解如何使用和自定义 `OutlineView` 来显示任务表。


    所有资源管理器视图都由一个 `ExplorerManager` 管理，该管理器控制并维护视图中节点的选择状态。当资源管理器视图被添加到 `java.awt.Container`（例如
    `TopComponent`）中时，它们会自动找到其 `ExplorerManager`。当添加到容器中时，资源管理器视图会搜索其父容器，直到找到第一个实现了
    `ExplorerManager.Provider` 的容器。然后，资源管理器视图开始使用由该组件的 `getExplorerManager()` 方法返回的
    `ExplorerManager`。`ExplorerManager` 维护着关于 `Node` 共享状态的信息，并在选中的 `Node` 发生变化时通知任何
    `PropertyChangeListener`。


    在清单 8-8 中，我们修改了 `TasksTopComponent`，使其实现 `ExplorerManager.Provider` 接口。`OutlineView`
    将找到在 `TasksTopComponent` 构造函数中定义的 `ExplorerManager`，调用 `getExplorerManager()`，然后显示来自
    `ExplorerManager` 的根 `Node`。


    ```

    public final class TasksTopComponent extends TopComponent

    implements ExplorerManager.Provider {

    private final ExplorerManager em = new ExplorerManager();

    public TasksTopComponent() {

    ...

    em.setRootContext(new AbstractNode(Children.create(new TaskChildFactory(), true)));
    // 异步方式

    }

    ...

    @Override

    public ExplorerManager getExplorerManager() {

    return em;

    }

    清单 8-8

    在 TopComponent 中实现 ExplorerManager

    ```


    你可以轻松地在同一个 `TopComponent` 中添加其他资源管理器视图，它们都共享同一个 `ExplorerManager`，因此也共享相同的节点。不仅所有资源管理器视图中都会显示相同的数据，而且当在其中某个视图中选中一个项目时，它也会自动在其他视图中被选中。


    因此，如果你想将这些全部映射到我们在本章开头提到的 MVC 设计模式，你需要记住以下几点：


    *   **节点**代表*模型*；它们是实际模型数据的包装器。

    *   **资源管理器视图**代表*视图*。

    *   **`ExplorerManager`** 代表*控制器*。


    ### 查找


    在清单 8-8 中，我们看到了如何向 `Node` 的查找中添加内容。`ExplorerManager` 维护视图中选中的节点。我们没有解释的是，如何使选中的
    `Node` 对*全局查找*可用，以便其他对象（如 `Action` 和其他 `TopComponent`）可以使用它们。


    这是借助 `ExplorerUtils` 类完成的，它允许你通过其 `createLookup()` 方法定义一个特殊的 `Lookup`，代表选中的 `Node`。然后，只需通过
    `TopComponent.associateLookup()` 方法将此查找添加到 `TopComponent` 的查找中，该方法必须在 `TopComponent`
    的构造函数中调用（参见清单 8-9）。


    ```

    associateLookup (ExplorerUtils.createLookup (em, getActionMap()));

    清单 8-9

    使选中的节点对全局查找可用

    ```


    得益于清单 8-9 中的语句，`TopComponent` 的 `Lookup` 将自动代理资源管理器视图组件中选中的 `Node` 的 `Lookup`。当
    `TopComponent` 被选中时，其 `Lookup` 通过 `Utilities.actionsGlobalContext()` 暴露出来。


    当用户在 `OutlineView` 中选择一个 `TaskNode` 时，包含该 `OutlineView` 的 `TasksTopComponent`
    将自动代理 `TaskNode` 的 `Lookup`。`TasksTopComponent` 将被激活，因此全局查找 `Utilities.actionsGlobalContext()`
    将代理 `TasksTopComponent` 的 `Lookup`。应用程序中任何监听全局查找的组件都会收到通知，告知有一个新的 `Task` 对象可用（例如，某个操作将变为启用状态）。


    动作映射是一个可以在 TopComponent 视图中使用的动作映射表。在清单 8-10 中，我们使用*剪切、复制、粘贴*和*删除*动作对其进行了增强。


    ```

    ActionMap map = this.getActionMap();

    map.put(DefaultEditorKit.cutAction, ExplorerUtils.actionCut(em));

    map.put(DefaultEditorKit.copyAction, ExplorerUtils.actionCopy(em));

    map.put(DefaultEditorKit.pasteAction, ExplorerUtils.actionPaste(em));

    map.put("delete", ExplorerUtils.actionDelete(em, true)); // true 表示在删除前显示确认对话框

    associateLookup (ExplorerUtils.createLookup (em, map));

    清单 8-10

    向 TopComponent 的 ActionMap 添加动作

    ```


    我们将在本章后面部分进一步讨论动作。


    ### 属性


    *属性*窗口（**窗口 ➤ IDE 工具 ➤ 属性**）监听全局 `Lookup`（`Utilities.actionsGlobalContext()`），以查找
    `Node` 的存在，并显示其属性。换句话说，所选节点的属性会显示在*属性*窗口中。


    默认情况下，`BeanNode` 的所有属性都会显示在*属性*窗口中。如果需要自定义它们，可以在 JavaBean 的 `BeanInfo.java` 中进行，或者将你的
    `Node` 改为扩展 `AbstractNode`，并重写清单 8-11 中所示的方法。


    ```

    @Override

    protected Sheet createSheet() {

    Sheet sheet = super.createSheet();

    Sheet.Set basicSet = Sheet.createPropertiesSet();

    basicSet.setName("Basic");

    basicSet.setDisplayName("基本");

    try {

    Property daysBeforeProperty =

    new PropertySupport.Reflection(

    task, Integer.class, "Days Before");

    basicSet.put(daysBeforeProperty);

    Property completedProperty =

    new PropertySupport.Reflection(

    task, Boolean.class, "已完成");

    basicSet.put(completedProperty);

    } catch (NoSuchMethodException ex) {

    Exceptions.printStackTrace(ex);

    }

    sheet.put(basicSet);

    return sheet;

    }

    清单 8-11

    为你的节点创建 PropertySheet

    ```


    `PropertySupport.Reflection` 用于定义一个 `Property` 对象。其他子类包括 `PropertySupport.ReadOnly`、`PropertySupport.ReadWrite`
    和 `PropertySupport.WriteOnly`。

    '
- fmt: '### JavaFX and the NetBeans Platform


    The Explorer Views API is based on Swing. However, there is a way to use JavaFX
    components instead. JavaFX is the successor of Swing and allows you to build advanced
    graphical applications. In this chapter we will see how to integrate JavaFX with
    the NetBeans Platform.


    Keep in mind that JavaFX is fully integrated in JDK 8–10 but not from JDK 11 onward,
    where you can download it independently from [`https://gluonhq.com/products/javafx/`](https://gluonhq.com/products/javafx/).


    The secret to integrate JavaFX with the NetBeans Platform is `JFXPanel`. Simply
    add a `JFXPanel` to a `TopComponent`, and you can work with JavaFX as you would
    in a standalone JavaFX application. When the first `JFXPanel` object is created,
    it implicitly initializes the JavaFX runtime (the *JavaFX Application Thread*).
    When the final `JFXPanel` is destroyed, the JavaFX runtime exits. If you set `Platform.setExplicitExit(false)`,
    the JavaFX Application Thread does *not* exit after the last JavaFX content window
    closes. This setting is necessary to close and then reopen JavaFX enabled windows.


    You also need to wrap the code that creates the JavaFX content in a runnable and
    invoke it with `Platform.runLater(() -> createScene());`. `TopComponent` code
    executes on the *Swing EDT*, whereas JavaFX code that creates and manipulates
    the scene graph must run on the *JavaFX Application Thread*.


    `JFXPanel` is a Swing `JComponent` specifically implemented to embed JavaFX content
    in a Swing application. `JFXPanel` starts up the JavaFX runtime and transparently
    forwards all input (mouse, key) and focus events to the JavaFX runtime. `JFXPanel`
    allows both Swing and JavaFX to run concurrently. To manipulate the Swing UI from
    JavaFX, you wrap the code in a `Runnable` and use the following:


    ```

    SwingUtilities.invokeLater(() -> {

    // Change Swing UI

    });

    ```


    Conversely, to manipulate the JavaFX UI from Swing, wrap the code in a `Runnable`
    and call:


    ```

    Platform.runLater(() -> {

    // Change JavaFX UI

    });

    ```


    In the next chapter we shall see how to transform the ToDo Swing application to
    a NetBeans RCP application, where the view is rendered by JavaFX.


    ### HTML/Java API


    So far in this chapter we have learned how to create `TopComponent` objects, Explorer
    Views, Properties Sheets, etc., to build the UI of our application. In the previous
    section we saw how we can use JavaFX instead of these to build our UI. In this
    section we shall see how we can render our UI using HTML 5 and JavaScript.


    The HTML/Java UI API, donated to Apache NetBeans from the architect of NetBeans,
    *Jaroslav Tulach*, allows us to write true cross-platform UIs using Java as the
    back end and HTML 5 and JavaScript in the front end. In other words, you can write
    true *Write Once Run Everywhere* code. It is based on *DukeScript* ([`https://www.dukescript.com`](http://www.dukescript.com)),
    a new technology for creating cross-platform desktop, mobile, and web applications.
    It allows you to write your logic in Java and render the result to a number of
    clients, which can be web browser, portable devices, etc. As of version 1.5.1,
    HTML/Java UI has been donated to Apache Foundation ([`http://apache.org/`](http://apache.org/)),
    and the code is now hosted in the incubator repository ([`http://github.com/apache/incubator-netbeans-html4j`](http://github.com/apache/incubator-netbeans-html4j))
    along other Apache incubating projects.


    HTML/Java UI API claims to have a clean separation of design and development using
    the *Model-View-ViewModel (MVVM)* design pattern. It achieves this by using *Knockout.js*
    ([`http://knockoutjs.com/`](http://knockoutjs.com/)) for binding the rendered
    HTML to the model. It lets you create a direct connection between the underlying
    data and its presentation (automatic dependency tracking).


    Knockout.js (KO) uses the *Model-View-ViewModel (MVVM)* ([`https://en.wikipedia.org/wiki/Model%E2%80%93view%E2%80%93viewmodel`](https://en.wikipedia.org/wiki/Model%25E2%2580%2593view%25E2%2580%2593viewmodel))
    design pattern, which is a variant of the classic *Model-View-Controller (MVC)*
    ([`https://en.wikipedia.org/wiki/Model%E2%80%93view%E2%80%93controller`](https://en.wikipedia.org/wiki/Model%25E2%2580%2593view%25E2%2580%2593controller))
    design pattern. As in the MVC, the *Model* is the stored data, and *View* is a
    visual representation of the data (e.g., in HTML5). But for the connection between
    the two, MVVM uses a *ViewModel* instead of a *Controller*. This is the model
    used by the View. It represents the state of the View. It is the unsaved data
    the user works with. As an example, imagine an application that opens a dialog
    box or form for the user to modify some data. If the user decides to press on
    **Cancel**, then the ViewModel automatically restores the data from the ViewModel.
    In the MVC, we work directly with the Model, so the modifications made by the
    user cannot be undone if s/he decides to press on **Cancel**, unless we keep a
    copy of the model data elsewhere.


    In KO, the *ViewModel* is a JavaScript representation of the model data, along
    with associated functions for manipulating the data. Knockout.js creates a direct
    connection between the *ViewModel* and the *View*, which is how it can detect
    changes to the underlying data and automatically update the relevant aspects of
    the user interface.


    Knockout.js uses *observables* to track a ViewModel''s properties; they observe
    their changes and automatically update the relevant parts of the view. To connect
    a user interface component in the view to a particular observable, you have to
    bind an HTML element to it. After binding an element to an observable, Knockout.js
    is ready to display changes to the *ViewModel* automatically. Knockout.js includes
    several built-in bindings that determine how the observable appears in the user
    interface.


    While Knockout.js uses JavaScript as the back end, HTML/Java UI uses pure Java.
    In other words, HTML/Java UI is a technology that allows you to render Java directly
    to HTML 5.'
  raw: '### JavaFX and the NetBeans Platform


    The Explorer Views API is based on Swing. However, there is a way to use JavaFX
    components instead. JavaFX is the successor of Swing and allows you to build advanced
    graphical applications. In this chapter we will see how to integrate JavaFX with
    the NetBeans Platform.


    Keep in mind that JavaFX is fully integrated in JDK 8–10 but not from JDK 11 onward,
    where you can download it independently from [`https://gluonhq.com/products/javafx/`](https://gluonhq.com/products/javafx/).


    The secret to integrate JavaFX with the NetBeans Platform is `JFXPanel`. Simply
    add a `JFXPanel` to a `TopComponent`, and you can work with JavaFX as you would
    in a standalone JavaFX application. When the first `JFXPanel` object is created,
    it implicitly initializes the JavaFX runtime (the *JavaFX Application Thread*).
    When the final `JFXPanel` is destroyed, the JavaFX runtime exits. If you set `Platform.setExplicitExit(false)`,
    the JavaFX Application Thread does *not* exit after the last JavaFX content window
    closes. This setting is necessary to close and then reopen JavaFX enabled windows.


    You also need to wrap the code that creates the JavaFX content in a runnable and
    invoke it with `Platform.runLater(() -> createScene());`. `TopComponent` code
    executes on the *Swing EDT*, whereas JavaFX code that creates and manipulates
    the scene graph must run on the *JavaFX Application Thread*.


    `JFXPanel` is a Swing JComponent specifically implemented to embed JavaFX content
    in a Swing application. `JFXPanel` starts up the JavaFX runtime and transparently
    forwards all input (mouse, key) and focus events to the JavaFX runtime. `JFXPanel`
    allows both Swing and JavaFX to run concurrently. To manipulate the Swing UI from
    JavaFX, you wrap the code in a Runnable and use the following:


    ```

    SwingUtilities.invokeLater(() -> {

    // Change Swing UI

    });

    ```


    Conversely, to manipulate the JavaFX UI from Swing, wrap the code in a Runnable
    and call:


    ```

    Platform.runLater(() -> {

    // Change JavaFX UI

    });

    ```


    In the next chapter we shall see how to transform the ToDo Swing application to
    a NetBeans RCP application, where the view is rendered by JavaFX.


    ### HTML/Java API


    So far in this chapter we have learned how to create `TopComponent` objects, Explorer
    Views, Properties Sheets, etc., to build the UI of our application. In the previous
    section we saw how we can use JavaFX instead of these to build our UI. In this
    section we shall see how we can render our UI using HTML 5 and JavaScript.


    The HTML/Java UI API, donated to Apache NetBeans from the architect of NetBeans,
    *Jaroslav Tulach*, allows us to write true cross-platform UIs using Java as the
    back end and HTML 5 and JavaScript in the front end. In other words, you can write
    true *Write Once Run Everywhere* code. It is based on *DukeScript* ([`https//www.dukescript.com`](http://www.dukescript.com)),
    a new technology for creating cross-platform desktop, mobile, and web applications.
    It allows you to write your logic in Java and render the result to a number of
    clients, which can be web browser, portable devices, etc. As of version 1.5.1,
    HTML/JAVA UI has been donated to Apache Foundation ([`http://apache.org/`](http://apache.org/)),
    and the code is now hosted in the incubator repository ([`http://github.com/apache/incubator-netbeans-html4j`](http://github.com/apache/incubator-netbeans-html4j))
    along other Apache incubating projects.


    HTML/Java UI API claims to have a clean separation of design and development using
    the *Model-View-ViewModel (MVVM)* design pattern. It achieves this by using *Knockout.js*
    ([`http://knockoutjs.com/`](http://knockoutjs.com/)) for binding the rendered
    HTML to the model. It lets you create a direct connection between the underlying
    data and its presentation (automatic dependency tracking).


    Knockout.js (KO) uses the *Model-View-ViewModel (MVVM)* ([`https://en.wikipedia.org/wiki/Model%E2%80%93view%E2%80%93viewmodel`](https://en.wikipedia.org/wiki/Model%25E2%2580%2593view%25E2%2580%2593viewmodel))
    design pattern, which is a variant of the classic *Model-View-Controller (MVC)*
    ([`https://en.wikipedia.org/wiki/Model%E2%80%93view%E2%80%93controller`](https://en.wikipedia.org/wiki/Model%25E2%2580%2593view%25E2%2580%2593controller)*)*
    design pattern. As in the MVC, the *Model* is the stored data, and *View* is a
    visual representation of the data (e.g., in HTML5). But for the connection between
    the two, MVVM uses a *ViewModel* instead of a *Controller*. This is the model
    used by the View. It represents the state of the View. It is the unsaved data
    the user works with. As an example, imagine an application that opens a dialog
    box or form for the user to modify some data. If the user decides to press on
    **Cancel,** then the ViewModel automatically restores the data from the ViewModel.
    In the MVC, we work directly with the Model, so the modifications made by the
    user cannot be undone if s/he decides to press on **Cancel**, unless we keep a
    copy of the model data elsewhere.


    In KO, the *ViewModel* is a JavaScript representation of the model data, along
    with associated functions for manipulating the data. Knockout.js creates a direct
    connection between the *ViewModel* and the *View*, which is how it can detect
    changes to the underlying data and automatically update the relevant aspects of
    the user interface.


    Knockout.js uses *observables* to track a ViewModel''s properties; they observe
    their changes and automatically update the relevant parts of the view. To connect
    a user interface component in the view to a particular observable, you have to
    bind an HTML element to it. After binding an element to an observable, Knockout.js
    is ready to display changes to the *ViewModel* automatically. Knockout.js includes
    several built-in bindings that determine how the observable appears in the user
    interface.


    While Knockout.js uses JavaScript as the back end, HTML/Java UI uses pure Java.
    In other words, HTML/Java UI is a technology that allows you to render Java directly
    to HTML 5.'
  trans: '

    ### JavaFX 与 NetBeans 平台


    资源管理器视图 API 基于 Swing。然而，有一种方法可以使用 JavaFX 组件来代替。JavaFX 是 Swing 的继任者，允许你构建高级图形应用程序。在本章中，我们将了解如何将
    JavaFX 与 NetBeans 平台集成。


    请记住，JavaFX 已完全集成在 JDK 8–10 中，但从 JDK 11 开始不再集成，你可以从 [`https://gluonhq.com/products/javafx/`](https://gluonhq.com/products/javafx/)
    独立下载它。


    将 JavaFX 与 NetBeans 平台集成的秘诀是 `JFXPanel`。只需将一个 `JFXPanel` 添加到一个 `TopComponent`
    中，你就可以像在独立的 JavaFX 应用程序中一样使用 JavaFX。当创建第一个 `JFXPanel` 对象时，它会隐式地初始化 JavaFX 运行时（即
    *JavaFX 应用程序线程*）。当最后一个 `JFXPanel` 被销毁时，JavaFX 运行时退出。如果你设置了 `Platform.setExplicitExit(false)`，那么即使最后一个
    JavaFX 内容窗口关闭，JavaFX 应用程序线程也*不会*退出。此设置对于关闭然后重新打开启用 JavaFX 的窗口是必要的。


    你还需要将创建 JavaFX 内容的代码包装在一个可运行对象中，并使用 `Platform.runLater(() -> createScene());`
    来调用它。`TopComponent` 代码在 *Swing EDT* 上执行，而创建和操作场景图的 JavaFX 代码必须在 *JavaFX 应用程序线程*
    上运行。


    `JFXPanel` 是一个专门为实现将 JavaFX 内容嵌入 Swing 应用程序而实现的 Swing JComponent。`JFXPanel` 启动
    JavaFX 运行时，并透明地将所有输入（鼠标、键盘）和焦点事件转发给 JavaFX 运行时。`JFXPanel` 允许 Swing 和 JavaFX 同时运行。要从
    JavaFX 操作 Swing UI，请将代码包装在 Runnable 中并使用以下代码：


    ```

    SwingUtilities.invokeLater(() -> {

    // 更改 Swing UI

    });

    ```


    相反，要从 Swing 操作 JavaFX UI，请将代码包装在 Runnable 中并调用：


    ```

    Platform.runLater(() -> {

    // 更改 JavaFX UI

    });

    ```


    在下一章中，我们将了解如何将 ToDo Swing 应用程序转换为 NetBeans RCP 应用程序，其中视图由 JavaFX 渲染。


    ### HTML/Java API


    到目前为止，在本章中，我们已经学习了如何创建 `TopComponent` 对象、资源管理器视图、属性表等，以构建我们应用程序的 UI。在上一节中，我们看到了如何使用
    JavaFX 代替这些来构建我们的 UI。在本节中，我们将了解如何使用 HTML 5 和 JavaScript 来渲染我们的 UI。


    HTML/Java UI API 由 NetBeans 架构师 *Jaroslav Tulach* 捐赠给 Apache NetBeans，它允许我们使用
    Java 作为后端，HTML 5 和 JavaScript 作为前端，编写真正的跨平台 UI。换句话说，你可以编写真正的 *一次编写，到处运行* 的代码。它基于
    *DukeScript* ([`https//www.dukescript.com`](http://www.dukescript.com))，这是一种用于创建跨平台桌面、移动和
    Web 应用程序的新技术。它允许你用 Java 编写逻辑，并将结果渲染到多种客户端，这些客户端可以是 Web 浏览器、便携式设备等。从版本 1.5.1 开始，HTML/Java
    UI 已捐赠给 Apache 基金会 ([`http://apache.org/`](http://apache.org/))，该代码现在与其他 Apache
    孵化项目一起托管在孵化器仓库中 ([`http://github.com/apache/incubator-netbeans-html4j`](http://github.com/apache/incubator-netbeans-html4j))。


    HTML/Java UI API 声称使用 *模型-视图-视图模型 (MVVM)* 设计模式实现了设计与开发的清晰分离。它通过使用 *Knockout.js*
    ([`http://knockoutjs.com/`](http://knockoutjs.com/)) 将渲染的 HTML 绑定到模型来实现这一点。它让你在底层数据及其表示之间建立直接连接（自动依赖跟踪）。


    Knockout.js (KO) 使用 *模型-视图-视图模型 (MVVM)* ([`https://en.wikipedia.org/wiki/Model%E2%80%93view%E2%80%93viewmodel`](https://en.wikipedia.org/wiki/Model%25E2%2580%2593view%25E2%2580%2593viewmodel))
    设计模式，这是经典 *模型-视图-控制器 (MVC)* ([`https://en.wikipedia.org/wiki/Model%E2%80%93view%E2%80%93controller`](https://en.wikipedia.org/wiki/Model%25E2%2580%2593view%25E2%2580%2593controller))
    设计模式的一种变体。与 MVC 一样，*模型* 是存储的数据，*视图* 是数据的可视化表示（例如，在 HTML5 中）。但是，对于两者之间的连接，MVVM
    使用 *视图模型* 而不是 *控制器*。这是视图使用的模型。它表示视图的状态。它是用户正在处理的未保存数据。举个例子，想象一个应用程序打开一个对话框或表单，让用户修改一些数据。如果用户决定按下
    **取消**，那么视图模型会自动从视图模型恢复数据。在 MVC 中，我们直接与模型一起工作，因此如果用户决定按下 **取消**，则无法撤消用户所做的修改，除非我们在其他地方保留模型数据的副本。


    在 KO 中，*视图模型* 是模型数据的 JavaScript 表示，以及用于操作数据的相关函数。Knockout.js 在 *视图模型* 和 *视图* 之间创建直接连接，这就是它能够检测到底层数据的变化并自动更新用户界面相关方面的原因。


    Knockout.js 使用 *可观察对象* 来跟踪视图模型的属性；它们观察这些属性的变化并自动更新视图的相关部分。要将视图中的用户界面组件连接到特定的可观察对象，你必须将一个
    HTML 元素绑定到它。将元素绑定到可观察对象后，Knockout.js 就可以自动显示对 *视图模型* 的更改。Knockout.js 包含几个内置绑定，用于确定可观察对象在用户界面中的显示方式。


    虽然 Knockout.js 使用 JavaScript 作为后端，但 HTML/Java UI 使用纯 Java。换句话说，HTML/Java UI 是一种允许你直接将
    Java 渲染到 HTML 5 的技术。

