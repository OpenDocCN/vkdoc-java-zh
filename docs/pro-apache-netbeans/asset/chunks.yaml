    15. Apache NetBeans 源代码

    概述


    正如我们在本书中所见，有很多方式可以为 Apache NetBeans 做出贡献。您可以通过编写文档、撰写关于 NetBeans 的博客、参与 NetCAT
    项目，甚至修复缺陷并成为 Apache 提交者来提供帮助。

    在本章中，我们将学习如何下载 Apache NetBeans 的源代码文件。我们将学习如何构建 NetBeans，并回顾各个模块的概览以及 Apache NetBeans
    IDE 本身的高级架构。我们还将描述修复缺陷并为源代码做出贡献的流程。所以，请系好安全带。


    下载 Apache NetBeans 源代码

    自从捐赠给 Apache 以来，NetBeans 一直存储在 Apache 下的一个 git 仓库中。不幸的是，不再像以前使用 mercurial 仓库时那样，每个模块套件都有独立的仓库。


    您可以通过以下两种方式之一下载 Apache NetBeans 源代码：

    '
- fmt: '# 从源码构建 Apache NetBeans


    导航至 Apache NetBeans 网站（[`https://netbeans.apache.org/`](https://netbeans.apache.org/)），点击右上角的
    **Download** 按钮，选择以 *Source:* 开头的链接，例如 *incubating-netbeans-11.1-source.zip*。下载该
    zip 文件并解压到你选择的目录。下载页面提供了验证下载文件完整性的说明。


    如果你的机器上安装了 *git*，请导航至机器上的任意目录，在 DOS 命令提示符或终端中执行以下命令：


    ```

    git clone http://github.com/apache/incubator-netbeans/.

    ```


    ## 从源码构建


    要从源码构建 Apache NetBeans（孵化中），你需要以下内容：


    *   Oracle JDK 8 或 Open JDK 8；

    *   Apache Ant 1.10 或更高版本（[`https://ant.apache.org`](https://ant.apache.org)）。


    安装好 Oracle JDK 和 ANT 后，导航至解压 Apache NetBeans 源码的目录，并执行以下命令：


    ```

    ant

    ```


    你需要连接互联网，因为构建过程可能会从互联网下载各种工件。另请注意，构建需要一些时间才能完成。构建完成后，你可以在 Unix 机器的终端窗口中输入以下命令来执行
    IDE：


    ```

    ./nbbuild/netbeans/bin/netbeans

    ```


    在 Windows 机器上，可以通过双击 `netbeans.exe` 或 `netbeans64.exe` 来启动，这些可执行文件位于 `\nbbuild\netbeans\bin`
    目录下。你还可以通过编辑 `nbbuild/netbeans/etc/netbeans.conf` 并将 `netbeans_jdkhome` 键设置为系统中的
    JDK 路径，尝试使用不同版本的 Java 运行 NetBeans。恭喜！你刚刚构建并执行了自己版本的 NetBeans！


    # Apache NetBeans IDE 架构


    Apache NetBeans 是最大的 Apache 项目之一（在撰写本文时是第二大项目）。虽然不了解整体架构也能修复 bug，但如果你希望引入新功能，了解每个部分的架构会有所帮助。了解架构有助于你在源代码中找到方向。


    Apache NetBeans IDE 采用模块化架构，使用了 Apache NetBeans 平台的 *Module System API*。掌握本书第
    2 部分的章节将帮助你编写代码来修复 bug，并为 IDE 添加新功能或插件。


    Apache NetBeans IDE 由以下主要组件或集群组成：


    *   **apisupport**：包含许多支持 NetBeans API 的模块。这些模块支持 Ant、Maven、重构和向导等功能（见图 [15-1](#479166_1_En_15_Chapter.xhtml#Fig1)）。


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig1_HTML.jpg](Images/479166_1_En_15_Fig1_HTML.jpg)


    图 15-1 API 支持模块依赖关系


    *   **enterprise**：包含 JEE 支持（见图 [15-2](#479166_1_En_15_Chapter.xhtml#Fig2)）。


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig2_HTML.jpg](Images/479166_1_En_15_Fig2_HTML.jpg)


    图 15-2 企业模块依赖关系


    *   **ergonomics**：动态启用 IDE 功能，因此用户永远不会因安装完整的 IDE 发行版而浪费系统资源，而只使用其子集。


    *   **extide**：包含 IDE 扩展，如 `ant` 支持模块和 **工具 | 选项** 对话框。


    *   **extra**：为各种操作系统提供 JavaFX 封装的库。


    *   **groovy**：提供对 Groovy 和 Gradle 的支持（见图 [15-3](#479166_1_En_15_Chapter.xhtml#Fig3)）。


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig3_HTML.jpg](Images/479166_1_En_15_Fig3_HTML.jpg)


    图 15-3 Groovy 模块依赖关系


    *   **harness**：顾名思义，它包含 NetBeans 的测试框架；可以在这里找到 *jemmy* 和 *jelly* 等测试工具。


    *   **ide**：提供构建 Apache NetBeans IDE 本身的模块，如编辑器、调试器、语言支持、数据库、HTML 和 CSS 支持等。稍后将更详细地描述。


    *   **java**：支持 Java 编程语言和 JEE、Ant、调试器、Maven、JUnit、TestNG、重构等。例如，*Java Source
    Base*（`java/java.source.base`）模块为 IDE 添加了 Java 特定的 API。


    *   **javafx**：JavaFX 支持（见图 [15-4](#479166_1_En_15_Chapter.xhtml#Fig4)）。


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig4_HTML.jpg](Images/479166_1_En_15_Fig4_HTML.jpg)


    图 15-4 JavaFX 模块依赖关系


    *   **nb**：包含品牌、自动更新插件中心、欢迎页面、死锁检测器等模块。


    *   **php**：PHP 支持（见图 [15-5](#479166_1_En_15_Chapter.xhtml#Fig5)）。


    ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig5_HTML.jpg](Images/479166_1_En_15_Fig5_HTML.jpg)


