    the changed code to the JVM. In addition, the execution pointer may be moved up
    the stack, to accommodate the new code.


    *   **Toggle Pause in GraalVM Script**. Schedules a suspend with regard to the
    Truffle multi-language integration. To use this action, NetBeans must run on GraalVM.


    *   **Take GUI Snapshot**. Takes a snapshot of the current state of the Swing
    component graph for interactive inspection and modification.


    The last thing needed to have a real debugging session is a *Breakpoint* . A breakpoint
    defines where the debugger will automatically suspend the thread, which happens
    to run past the defined breakpoint. The simplest way to create a new breakpoint
    is to either click into the gutter of the editor on the correct line, or press
    ⌘**-F8** (in Mac) or Ctrl+F8 (on Windows/Linux) with the cursor being on the line
    where the debugger should suspend the execution. The same actions can be taken
    to remove a breakpoint, that is, the action triggered is called *Toggle Breakpoint*.
    Once a breakpoint is created, it is marked in the gutter with a special symbol.
    This can be seen in Figure [6-4](#479166_1_En_6_Chapter.xhtml#Fig4).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig4_HTML.jpg](Images/479166_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Debugging toolbar'
  trans: '

    ## 摘要


    Apache NetBeans IDE 为 Java EE 应用程序提供了卓越的支持。从头构建一个 Java EE 项目非常容易，并且可以选择生成前端、后端和配置文件。通过添加用于部署的容器，IDE
    支持轻松的调试和保存时部署选项。Apache NetBeans 有助于提高初学者和高级企业开发人员的生产力。


    # 6. 调试与分析


    调试与分析，除了编写代码之外，可能是使用 Apache NetBeans 最重要的两件事。调试是一门找出问题及其根本原因的艺术。Apache NetBeans
    提供了一个功能非常丰富的调试环境，支持从多会话到多语言的各种场景。如果说调试能让代码正确，那么分析就能让代码运行得更快。Apache NetBeans 包含最先进的分析引擎之一，用于基于
    Sun Microsystems 开发的 JFluid 技术进行内存和 CPU 分析。尽管 Apache NetBeans 支持多种不同编程语言和项目类型的调试，但本章重点介绍对
    JVM 和 Java 语言的支持。


    ## 调试


    ### 入门


    启动调试会话很简单。例如，我们使用 NetBeans 提供的 Anagram Game 示例。只需选择 *新建项目*，转到 *示例* 类别，展开树中的 *Java*，然后在
    *项目* 列表中选择 *Anagram Game*。打开项目后，只需按下工具栏中的 *调试项目* 按钮，或使用项目节点上下文菜单中的菜单项即可。除了在调试器中运行项目外，Apache
    NetBeans 还支持将调试器附加到正在运行的进程。有不同的附加模式：*ProcessAttach*、*SocketAttach* 或 *SocketListen*。根据已安装的插件，还可以选择不同的调试器；例如，如果安装了
    C++ 插件，则可以选择 `gdb`。


    附加调试器的对话框如图 6-1 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig1_HTML.jpg](img/479166_1_En_6_Fig1_HTML.jpg)


    图 6-1


    将调试器附加到正在运行的进程


    调试器运行后，Apache NetBeans 会自动显示两个附加视图：*调试* 视图和 *变量* 视图。*调试* 视图用于显示被调试进程中所有正在运行（或暂停）的线程。*变量*
    视图在调试器停止时，显示当前上下文中的变量信息。NetBeans 显示初始调试体验的示例如图 6-2 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig2_HTML.jpg](img/479166_1_En_6_Fig2_HTML.jpg)


    图 6-2


    初始调试体验


    ### 注意


    如果任何屏幕截图中显示了您无法立即看到的窗口，这通常是由于窗口预设与默认设置不同（例如，由于您使用 IDE 造成的）。要打开所需的窗口，只需从主菜单中选择
    *窗口*，然后从 *调试* 子菜单中选择相应的项目即可。


    除了这两个视图，Apache NetBeans 还会显示 *调试* 工具栏。此工具栏提供了访问控制调试会话所需的所有操作。除了工具栏，所有操作也可以通过 *调试*
    主菜单项触发，或者使用键盘选择特定操作。控制调试工作流程的所有按钮如图 6-3 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig3_HTML.jpg](img/479166_1_En_6_Fig3_HTML.jpg)


    图 6-3


    调试工具栏


    从左到右的操作如下：


    *   **结束调试器会话 (⇧-F5)**。通过分离或终止被调试进程来结束调试会话，具体取决于调试器的使用模式。


    *   **暂停调试器会话**。挂起被调试进程的所有正在运行的线程。


    *   **继续调试器会话 (F5)**。恢复所有暂停的线程。


    *   **单步跳过 (F8)**。将执行指针移动到下一行。


    *   **单步跳过表达式 (⇧-F8)**。将执行指针向前移动一个表达式。


    *   **单步进入 (F7)**。将执行指针向下移动一个堆栈层级，即进入此行中的方法调用。如果有多个方法调用，可以选择具体的方法调用。


    *   **单步跳出 (**⌘**+F7)**。将执行指针向上移动一个堆栈层级，即跳出当前正在调试的方法。


    *   **运行到光标处 (F4)**。将执行指针移动到光标所在的行。


    *   **应用代码更改**。编译活动编辑器选项卡中的代码，并将更改后的代码推送到 JVM。此外，执行指针可能会在堆栈中向上移动，以适应新代码。


    *   **切换在 GraalVM 脚本中暂停**。安排一个与 Truffle 多语言集成相关的挂起。要使用此操作，NetBeans 必须在 GraalVM
    上运行。


    *   **拍摄 GUI 快照**。为 Swing 组件图的当前状态拍摄快照，以便进行交互式检查和修改。


    要进行真正的调试会话，最后需要的是*断点*。断点定义了调试器将自动挂起线程的位置，该线程恰好运行到定义的断点处。创建新断点最简单的方法是：在编辑器的装订线中单击正确的行，或者将光标放在调试器应暂停执行的行上，然后按
    ⌘**-F8**（在 Mac 上）或 Ctrl+F8（在 Windows/Linux 上）。同样的操作可以用于移除断点，即触发的操作称为*切换断点*。一旦创建了断点，它会在装订线中用特殊符号标记出来。如图
    6-4 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig4_HTML.jpg](img/479166_1_En_6_Fig4_HTML.jpg)


    图 6-4


    调试工具栏

