    ## 结论


    本章介绍了 Apache NetBeans IDE 的主要功能。我们了解了 IDE 的布局及默认窗口位置（编辑器、资源管理器、导航器、输出、属性、面板）；我们学习了如何使用
    Ant、Maven 或 Gradle 创建 Java 应用程序项目，以及一些提高效率的技巧。现在，你已经掌握了足够的知识，可以在后续章节中进一步探索 Apache
