- fmt: '# Of Purgatory and Incubation


    The Apache Incubator (“the Incubator” or “incubation phase” for short) is comparable
    to some kind of “purgatory,” the Roman Catholic concept of an intermediate stage
    between earth and heaven where purification takes place. Or it is an “interregnum,”
    where the old has not yet died and the new is still to be born.


    To clear away one point of confusion right at the outset, releases done during
    the incubation phase are in no way “Beta” releases. The Incubator exists to enable
    an aspiring Apache project’s community to figure out how to fully comply with
    Apache’s requirements, while enabling it to learn about Apache’s specific form
    of open governance.


    Mentors are assigned by Apache to guide and assist an aspiring Apache community
    and to make sure the project doesn’t slip off the rails or do things that do not
    comply with The Apache Way, a well-established set of principles according to
    which an Apache project is governed and by means of which source code is released.


    The details of The Apache Way can be found online ([`apache.org/theapacheway`](https://apache.org/theapacheway)),
    and it would be repetitive to go through each and every aspect of it here. However,
    it is sufficient to say that how a community works together and the licensing
    of the code released under the Apache banner are both clearly specified at [`apache.org`](https://apache.org),
    providing the basis of Apache’s strong and reliable brand throughout the industry.
    Each project under the Apache banner can be assumed to conform to its principles,
    meaning that new communities aspiring to become Apache projects have a set of
    principles and concepts to have under its belt.


    Before an aspiring Apache project can leave the Incubator and become an official
    Apache Project, known as a “top-level project,” it needs to jump through a number
    of hoops that entail proving that it understands The Apache Way and is able to
    act as an official Apache project. A key milestone in the incubation process is
    a release; in fact, at least one release must be completed in the Incubator before
    a community is able to attempt to become a top-level project, thus leaving the
    Incubator.


    The Apache NetBeans community achieved three releases in the Incubator and below
    we describe what happened in each release, in terms of the source code released,
    the features provided, and the progress of the project within the Incubator.


    Before going further, it is important to note that Apache releases source code,
    not features, not installers, not executables, and not binaries, which typically
    are created by other organizations, such as *OpenBeans* (see [`openbeans.org`](https://openbeans.org)),
    in the same way as Ubuntu packages Debian. For that reason, the focus of each
    release strictly from Apache’s point of view, is source code only. From Apache’s
    point of view, whether a release provides new features or not or whether it provides
    a convenience binary, as an optional way of helping a user of the source code,
    such as an installer or not is not relevant since it is only focused on source
    code, thus enabling upstream organizations, such as the aforementioned *OpenBeans*,
    to provide business models, as needed, based on binaries and installers and other
    more user-friendly conveniences.


    Another quick point to make is that it was decided to continue the release numbering
    seamlessly, that is, not to start with Apache NetBeans 1.0, but with the major
    release number following the last Oracle NetBeans release number, that is, starting
    from 8.2 onward, which means the first Apache NetBeans release number was set
    at “9.0.”


    ## Apache NetBeans (Incubating) 9.0


    The focus of the first release in the incubator was to simply go through an Apache
    release process, which in itself is a strictly structured procedure, while also
    actually releasing a significant part of the NetBeans source code, under the banner
    of the Apache Incubator, which had been contributed at that stage by Oracle to
    Apache.


    The basis of NetBeans is the underlying application framework, within the “platform”
    cluster of modules, and it would have made sense to purely focus on releasing
    that cluster as the first release Apache release of NetBeans. However, the idea
    was also to include some functionality that would actually be useful for a user
    of Apache NetBeans, that is, not purely a developer making use of the NetBeans
    Platform as the basis of their software.


    For that reason, in addition to the “platform” cluster, the “ide” and “java” clusters
    were focused on for the first Apache NetBeans release, too. In that way, a Java
    developer would be able to use Apache NetBeans 9.0 even while all the remaining
    parts of it were still in the process of being readied for inclusion in subsequent
    releases. The key point here is that for source code to be released from Apache,
    it needs to be relicensed to Apache and, since some parts of NetBeans don’t meet
    Apache’s licensing requirements, parts of it need to be removed or rewritten,
    rather than being released. If we waited until everything has been donated and
    everything has been readied for release by Apache, the first release would take
    years to be ready, while the modular approach, as can be seen in this scenario,
    enables specific parts of Apache NetBeans to be released in an incremental process.


    However, in another twist, the first Apache NetBeans release, focused (as stated
    above) on the source code related to Java development features, didn’t simply
    provide the precise Java features that the last Oracle release of NetBeans provided.
    That’s because since the release of NetBeans IDE 8.2, JDK 9 had been released,
    and developers in Oracle, prior to the donation of NetBeans to Apache, had created
    several features in NetBeans specifically to support new JDK 9 features. The main
    feature of JDK 9 was the introduction of the new Jigsaw module system, primarily
    created to enable the JDK itself to be modularized. However, any Java application
    can make use of that same module system and in Apache NetBeans 9.0, the features
    created by Oracle developers for NetBeans to support the JDK 9 Jigsaw module system
    were also released, in particular a new project type to help NetBeans users get
    started with Jigsaw, as well as support for the related `module-info.java` Jigsaw
    registration file.


    JDK 9 also introduced a REPL (read-eval-print loop), named JShell, as well as
    a packaging tool, named JLink. For both of these new JDK features, Apache NetBeans
    9.0 provided out-of-the box integration and support.


    At the outset, the plan for Apache NetBeans was for it to be focused on JDK 9.
    However, since there were delays in handing over NetBeans from Oracle to Apache,
    JDK 9 had already been released. In fact, JDK 10 had already been released. For
    that reason, Apache NetBeans 9.0 was focused on supporting JDK 10, both in terms
    of being able to run on it as well as in relation to its enhancements. Fortunately,
    for these purposes, purely from a Java developer point of view, that is, in terms
    of the code that a developer writes, JDK 10 introduced only the `var` keyword,
    in other words, “local variable type inference.” To let NetBeans users benefit
    from that, the Java editor was enhanced to enable switching between Java types
    and the `var` keyword, as well as inspections and analyzers to enable switching
    to be done across files, packages, and projects.


    Apache NetBeans 9.0 was released on July 29, 2018, which was less than two years
    after Oracle’s announcement of the donation of NetBeans to Apache. Under the circumstances,
    given the complexity of the auditing process on Oracle’s end together with Apache’s
    licensing requirements, together with the fact that everyone working on NetBeans
    in Apache is a volunteer, that worked out well. In fact, the two years of this
    initial phase gave everyone time to settle in to the new phase of the NetBeans
    project, get to know each other, and understand what working under the Apache
    banner means on a day-to-day basis.'
  raw: 'Of Purgatory and Incubation

    The Apache Incubator (“the Incubator” or “incubation phase” for

    short) is comparable to some kind of “purgatory,” the Roman Catholic

    concept of an intermediate stage between earth and heaven where

    purification takes place. Or it is an “interregnum,” where the old has

    not yet died and the new is still to be born.

    To clear away one point of confusion right at the outset, releases

    done during the incubation phase are in no way “Beta” releases. The

    Incubator exists to enable an aspiring Apache project’s community to

    figure out how to fully comply with Apache’s requirements, while

    enabling it to learn about Apache’s specific form of open

    governance.

    Mentors are assigned by Apache to guide and assist an aspiring Apache

    community and to make sure the project doesn’t slip off the rails or do

    things that do not comply with The Apache Way, a well-established set of

    principles according to which an Apache project is governed and by means

    of which source code is released.

    The details of The Apache Way can be found online ([`apache.org/theapacheway`](https://apache.org/theapacheway)),

    and it would be repetitive to go through each and every aspect of it

    here. However, it is sufficient to say that how a community works

    together and the licensing of the code released under the Apache banner

    are both clearly specified at [`apache.org`](https://apache.org),

    providing the basis of Apache’s strong and reliable brand throughout the

    industry. Each project under the Apache banner can be assumed to conform

    to its principles, meaning that new communities aspiring to become

    Apache projects have a set of principles and concepts to have under its

    belt.

    Before an aspiring Apache project can leave the Incubator and become

    an official Apache Project, known as a “top-level project ,” it needs to jump

    through a number of hoops that entail proving that it understands The

    Apache Way and is able to act as an official Apache project. A key milestone in
    the

    incubation process is a release; in fact, at least one release must be

    completed in the Incubator before a community is able to attempt to

    become a top-level project, thus leaving the Incubator.

    The Apache NetBeans community achieved three releases in the

    Incubator and below we describe what happened in each release, in terms

    of the source code released, the features provided, and the progress of

    the project within the Incubator.

    Before going further, it is important to note that Apache releases

    source code, not

    features, not installers, not executables, and not binaries, which

    typically are created by other organizations, such as *OpenBeans*  (see

    [`openbeans.org`](https://openbeans.org)),

    in the same way as Ubuntu packages Debian. For that reason, the focus of

    each release strictly from Apache’s point of view, is source code only.

    From Apache’s point of view, whether a release provides new features or

    not or whether it provides a convenience binary, as an optional way of

    helping a user of the source code, such as an installer or not is not

    relevant since it is only focused on source code, thus enabling upstream

    organizations, such as the aforementioned *OpenBeans*, to provide

    business models, as needed, based on binaries and installers and other

    more user-friendly conveniences.

    Another quick point to make is that it was decided to continue the

    release numbering seamlessly, that is, not to start with Apache NetBeans

    1.0, but with the major release number following the last Oracle

    NetBeans release number, that is, starting from 8.2 onward, which means

    the first Apache NetBeans release number was set at “9.0.”


    Apache NetBeans (Incubating) 9.0

    The focus of the first release in the incubator was to simply

    go through an Apache release process, which in itself is a strictly

    structured procedure, while also actually releasing a significant part

    of the NetBeans source code, under the banner of the Apache Incubator,

    which had been contributed at that stage by Oracle to Apache.

    The basis of NetBeans is the underlying application framework, within

    the “platform” cluster of modules, and it would have made sense to

    purely focus on releasing that cluster as the first release Apache

    release of NetBeans. However, the idea was also to include some

    functionality that would actually be useful for a user of Apache

    NetBeans, that is, not purely a developer making use of the NetBeans

    Platform as the basis of their software.

    For that reason, in addition to the “platform” cluster, the “ide” and

    “java” clusters were focused on for the first Apache NetBeans release,

    too. In that way, a Java developer would be able to use Apache NetBeans

    9.0 even while all the remaining parts of it were still in the process

    of being readied for inclusion in subsequent releases. The key point

    here is that for source code to be released from Apache, it needs to be

    relicensed to Apache and, since some parts of NetBeans don’t meet

    Apache’s licensing requirements, parts of it need to be removed or

    rewritten, rather than being released. If we waited until everything has

    been donated and everything has been readied for release by Apache, the

    first release would take years to be ready, while the modular approach,

    as can be seen in this scenario, enables specific parts of Apache

    NetBeans to be released in an incremental process.

    However, in another twist, the first Apache NetBeans release, focused

    (as stated above) on the source code related to Java development

    features, didn’t simply provide the precise Java features that the last

    Oracle release of NetBeans provided. That’s because since the release of

    NetBeans IDE 8.2, JDK 9 had been released, and developers in Oracle,

    prior to the donation of NetBeans to Apache, had created several

    features in NetBeans specifically to support new JDK 9 features. The

    main feature of JDK 9 was the introduction of the new Jigsaw module

    system, primarily created to enable the JDK itself to be modularized.

    However, any Java application can make use of that same module system

    and in Apache NetBeans 9.0, the features created by Oracle developers

    for NetBeans to support the JDK 9 Jigsaw module

    system were also released, in particular a new project type to

    help NetBeans users get started with Jigsaw, as well as support for the

    related “module-info.java” Jigsaw registration file.

    JDK 9 also introduced a REPL (read-eval-print loop) , named JShell, as

    well as a packaging tool, named JLink. For both of these new JDK

    features, Apache NetBeans 9.0 provided out-of-the box integration and

    support.

    At the outset, the plan for Apache NetBeans was for it to be focused

    on JDK 9\. However, since there were delays in handing over NetBeans from

    Oracle to Apache, JDK 9 had already been released. In fact, JDK 10 had

    already been released. For that reason, Apache NetBeans 9.0 was focused

    on supporting JDK 10, both in terms of being able to run on it as well

    as in relation to its enhancements. Fortunately, for these purposes,

    purely from a Java developer point of view, that is, in terms of the

    code that a developer writes, JDK 10 introduced only the “var” keyword,

    in other words, “local variable type inference.” To let NetBeans users

    benefit from that, the Java editor was enhanced to enable switching

    between Java types and the “var” keyword, as well as inspections and

    analyzers to enable switching to be done across files, packages, and

    projects.

    Apache NetBeans 9.0 was released on July 29,

    2018, which was less than two years after Oracle’s announcement of the

    donation of NetBeans to Apache. Under the circumstances, given the

    complexity of the auditing process on Oracle’s end together with

    Apache’s licensing requirements, together with the fact that everyone

    working on NetBeans in Apache is a volunteer, that worked out well. In

    fact, the two years of this initial phase gave everyone time to settle

    in to the new phase of the NetBeans project, get to know each other, and

    understand what working under the Apache banner means on a day-to-day

    basis.'
  trans: '

    炼狱与孵化

    Apache 孵化器（简称“孵化器”或“孵化阶段”）类似于某种“炼狱”，即罗马天主教概念中介于尘世与天堂之间的净化阶段。或者说，它是一个“过渡期”，旧事物尚未消亡，新事物尚未诞生。


    首先需要澄清一个误解：孵化阶段发布的版本绝非“Beta”版。孵化器的存在是为了让有志成为 Apache 项目的社区能够学会如何完全遵守 Apache 的要求，同时了解
    Apache 特有的开放治理形式。


    Apache 会指派导师来指导和协助有志成为 Apache 的社区，确保项目不偏离轨道，或做出不符合 Apache 之道的行为。Apache 之道是一套成熟的治理原则，Apache
    项目据此进行管理，源代码也据此发布。


    Apache 之道的详细信息可在网上查阅（[`apache.org/theapacheway`](https://apache.org/theapacheway)），此处不再赘述其方方面面。但足以说明的是，社区如何协作以及以
    Apache 名义发布的代码的许可协议，均在 [`apache.org`](https://apache.org) 上有明确规定，这为 Apache 在整个行业中强大而可靠的品牌形象奠定了基础。每个以
    Apache 名义开展的项目都应被视为符合其原则，这意味着有志成为 Apache 项目的新社区需要掌握一套原则和概念。


    在离开孵化器成为正式 Apache 项目（即“顶级项目”）之前，有志成为 Apache 的项目需要跨越一系列障碍，以证明其理解 Apache 之道，并能够作为正式
    Apache 项目运作。孵化过程中的一个关键里程碑是发布版本；事实上，社区在尝试成为顶级项目并离开孵化器之前，必须在孵化器中完成至少一次发布。


    Apache NetBeans 社区在孵化器中完成了三次发布。下文将描述每次发布在源代码发布、提供功能以及项目在孵化器内进展方面的情况。


    在进一步说明之前，有必要指出：Apache 发布的是源代码，而非功能、安装程序、可执行文件或二进制文件。这些通常由其他组织（例如 *OpenBeans*，参见
    [`openbeans.org`](https://openbeans.org)）创建，就像 Ubuntu 打包 Debian 一样。因此，严格从 Apache
    的角度来看，每次发布的重点仅在于源代码。从 Apache 的角度看，一个版本是否提供新功能，或是否提供便利的二进制文件（作为帮助源代码用户的可选方式，例如安装程序），都无关紧要，因为其关注点仅在于源代码，从而使得上游组织（如前述的
    *OpenBeans*）能够根据需要，基于二进制文件、安装程序及其他更用户友好的便利设施来构建商业模式。


    另需简要说明的是，我们决定延续版本号，即不从 Apache NetBeans 1.0 开始，而是沿用 Oracle NetBeans 最后一个版本号之后的主版本号，即从
    8.2 之后开始，这意味着第一个 Apache NetBeans 版本号定为“9.0”。


    Apache NetBeans（孵化中）9.0

    孵化器中首次发布的重点仅仅是经历一次 Apache 的发布流程（这本身就是一个结构严谨的过程），同时以 Apache 孵化器的名义，实际发布当时 Oracle
    已贡献给 Apache 的 NetBeans 源代码中的重要部分。


    NetBeans 的基础是底层的应用程序框架，位于“平台”模块集群中。按理说，首次发布本应纯粹专注于发布该集群。但我们的想法是，也包含一些对 Apache
    NetBeans 用户实际有用的功能，而不仅仅是让开发者将 NetBeans 平台用作其软件的基础。


    因此，除了“平台”集群外，首次 Apache NetBeans 发布也重点关注了“ide”和“java”集群。这样一来，即使 NetBeans 的其他所有部分仍在准备纳入后续版本的过程中，Java
    开发者也能使用 Apache NetBeans 9.0。这里的关键点是，要从 Apache 发布源代码，需要将其重新许可给 Apache。由于 NetBeans
    的某些部分不符合 Apache 的许可要求，这些部分需要被移除或重写，而非发布。如果我们等到所有代码都捐赠完毕并准备好由 Apache 发布，那么首次发布将需要数年时间才能准备就绪。而正如本场景所示，模块化方法使得
    Apache NetBeans 的特定部分能够以增量方式逐步发布。


    然而，另一个转折点是，首次 Apache NetBeans 发布（如上所述，专注于与 Java 开发功能相关的源代码）并未简单地提供 Oracle 最后发布的
    NetBeans 版本所具备的精确 Java 功能。这是因为自 NetBeans IDE 8.2 发布以来，JDK 9 已经发布，而 Oracle 的开发人员在将
    NetBeans 捐赠给 Apache 之前，已经在 NetBeans 中创建了多项专门支持 JDK 9 新特性的功能。JDK 9 的主要特性是引入了新的
    Jigsaw 模块系统，其初衷主要是为了实现 JDK 自身的模块化。然而，任何 Java 应用程序都可以使用相同的模块系统。在 Apache NetBeans
    9.0 中，Oracle 开发人员为 NetBeans 创建的、用于支持 JDK 9 Jigsaw 模块系统的功能也一并发布了，特别是帮助 NetBeans
    用户入门 Jigsaw 的新项目类型，以及对相关“module-info.java”Jigsaw 注册文件的支持。


    JDK 9 还引入了一个名为 JShell 的 REPL（读取-求值-打印循环）工具，以及一个名为 JLink 的打包工具。对于这两项新的 JDK 特性，Apache
    NetBeans 9.0 都提供了开箱即用的集成和支持。


    最初，Apache NetBeans 的计划是专注于 JDK 9。然而，由于 NetBeans 从 Oracle 移交到 Apache 的过程出现延迟，JDK
    9 已经发布。事实上，JDK 10 也已经发布。因此，Apache NetBeans 9.0 转而专注于支持 JDK 10，既包括在其上运行的能力，也包括对其增强功能的支持。幸运的是，仅从
    Java 开发者的角度来看（即就开发者编写的代码而言），JDK 10 仅引入了“var”关键字，即“局部变量类型推断”。为了让 NetBeans 用户从中受益，Java
    编辑器得到了增强，支持在 Java 类型和“var”关键字之间切换，同时还提供了检查和分析器，以便在文件、包和项目之间进行切换。


    Apache NetBeans 9.0 于 2018 年 7 月 29 日发布，距离 Oracle 宣布将 NetBeans 捐赠给 Apache 不到两年。考虑到
    Oracle 方面审计流程的复杂性、Apache 的许可要求，以及在 Apache 中为 NetBeans 工作的每个人都是志愿者这一事实，这个进度相当不错。事实上，这最初两年的阶段让每个人都有时间适应
    NetBeans 项目的新阶段，相互了解，并理解在 Apache 旗帜下工作在日常层面意味着什么。

    '
- fmt: '# Apache NetBeans (Incubating) 10.0


    With the release of Apache NetBeans 9.0, one of the first questions asked was,
    “Hey, what about PHP and JavaScript? Has Apache dropped those features from NetBeans?”
    One of the most frustrating, but understandable, aspects is that users of an open
    source project tend to not follow it as closely as its developers do. A gnashing
    of teeth ensued, as many users of NetBeans appeared out of the woodwork to complain
    that apparently Apache NetBeans would henceforth only care about Java developers
    and not about developers of the other technologies and languages it had supported
    in the past.


    Of course, as already explained in some detail, we were focused on releasing different
    pieces of NetBeans over different releases, since not everything constituting
    NetBeans had been received from Oracle yet and not everything had yet been relicensed
    to Apache.


    The focus of Apache NetBeans 10.0, released on December 27, 2018, was to make
    the PHP features available, which also meant making the HTML5/JavaScript features
    available, since the former depends on the latter. Not only was the code donated
    by Oracle relating to these features released, since in addition, in the interim,
    a number of additional features, in particular new support for PHP 7.4, the latest
    PHP release at the time was provided for the first time, too.


    In addition, the 10.0 release focused on JDK 11, in particular, aside from being
    able to run on JDK 11, the new support for `var` in lambda expressions. Aside
    from other fixes and enhancements, support for JUnit 5 was introduced in Apache
    NetBeans 10.0, in particular, for Apache Maven-based projects.


    # Apache NetBeans (Incubating) 11.0


    Apache NetBeans 11.0, released on April 4, 2019, was the third major release in
    the Incubator.


    Over the years, there had been discussion in the NetBeans community about how
    best to express the fact that Apache Maven and Gradle are more modern choices
    to be aware of than Apache Ant, complicated by the point that at the same time,
    one would not want to imply that there’s anything wrong with using Apache Ant.


    As a result, in Apache NetBeans 11.0, the “New Project wizard,” that is, the entry
    point for NetBeans users, was redesigned. The Java wizards were moved to a subfolder
    named `Java with Ant`, while two new categories were added: `Java with Maven`
    and `Java with Gradle`. The hope is that this will make it easier for new users
    to choose a starting point of their liking for their projects, while at the same
    time highlighting the fact that Maven and Gradle should be given preference over
    Ant.


    Also, initial support for Gradle was introduced for the first time. Features for
    integrating NetBeans with Gradle has been an open request for many users for many
    years. To Oracle, this was never a high priority, though an external plugin providing
    Gradle integration was developed and proved popular. From Oracle’s perspective,
    this was a good-enough solution, since no resources in terms of developer time
    needed to be invested by Oracle, while users needing that integration had access
    to it via the external plugin. Of course, though, direct out-of-the box integration
    with external technologies, such as Gradle, is always preferable. With NetBeans
    being in Apache, and priorities no longer being determined by Oracle, direct integration
    with Gradle, out of the box, became something that was only blocked to the extent
    that one or more contributors would be able to provide it. That happened, with
    success, during the Apache NetBeans 11.0 release cycle.


    Aside from these concerns, a key focus of Apache NetBeans 11.0 was the next stage
    of integration of code donated by Oracle to Apache, which was the cluster of features
    relating to enterprise Java, that is, Java/Jakarta EE. We had been busy in the
    months leading up to the release of Apache NetBeans 11.0 in reviewing the licenses
    of the “enterprise” cluster, which came from the second donation of NetBeans by
    Oracle to Apache, which ended in time for the release, enabling these features
    to be incorporated in it. As a result, users of NetBeans can, from this release
    onward, without needing to install plugins, create, edit, build, and deploy Java
    EE applications with Ant or Maven, with Gradle support scheduled for the next
    release.


    However, explicit support of Java EE 8, for example, specific templates or mentions
    of the specification number in user interface elements in NetBeans, was not part
    of Apache NetBeans 11.0. At the same time, though, note that Java EE 8 only runs
    on JDK 8, and not on later releases, and so for those doing development with Java
    EE 8 it is best to run NetBeans itself on JDK 8, anyway.


    Finally, in the same way that Apache NetBeans 9.0 provided support for JDK 9 and
    10, and Apache NetBeans 10.0 provided support for JDK 11, Apache NetBeans 11.0
    did the same for JDK 12. The Apache NetBeans 11.0 release was tested on JDK 12,
    while new editor hints and features were provided to support developers making
    use of the syntax-level features in JDK 12.'
