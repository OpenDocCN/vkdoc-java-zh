    Module Dependency**操作来完成。勾选**Show Non-API Modules**，搜索*Model*，然后点击**OK**。现在你可以修复导入，并将`todo.model.Task`作为导入添加到`EditTaskAction`中。


    重复这些步骤来创建其余的操作，尽量使TodoRCP应用程序与Swing ToDo应用程序尽可能相似。这意味着`EditTaskAction`、`DeleteTaskAction`和`MarkAsCompletedTaskAction`是条件启用的，而其余操作始终启用。`DeleteTaskAction`和`MarkAsCompletedTaskAction`应该是条件启用的，并且你可以选择多个节点，因为它们可以同时应用于多个任务（参见第[8](#479166_1_En_8_Chapter.xhtml)章中的[8-22](#479166_1_En_8_Chapter.xhtml#PC26)）。


