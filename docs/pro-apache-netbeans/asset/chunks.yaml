    进度

    通常情况下，在处理大量数据时，其计算和显示可能会花费用户一些明显的时间。例如，从文件系统或数据库检索数据，顺利时也可能需要几秒钟。根据良好的*用户体验*原则，应该向用户提供一些关于长时间任务进度的视觉反馈。

    例如，在*事件分发线程 (EDT)* 中同步创建子元素的 `Node` 展开操作会冻结 UI。在此期间，不会执行任何 UI 更新，用户手势也会被忽略，导致
    UI 在整个过程中无法使用。这就是为什么创建子元素要在不同的线程中完成。同时，您应该通知用户子元素正在创建并即将显示。在此期间，通常会显示一个等待光标和一条状态消息。

    在第 8 章中，我们了解了 `ChildFactory` 类如何支持异步创建子元素（通过将 `true` 作为 `Children.create()` 方法的第二个参数传递）。

    默认情况下，NetBeans Platform 状态栏集成了一个进度条。当您处理长时间运行的任务时，可以接入该进度条，让用户可视化单个或多个任务的进度。

    要接入进度条，您需要添加对*进度 API* 的依赖。`ProgressHandleFactory` 创建 `ProgressHandle` 对象，这些对象显示进度，并且可选地允许用户取消进度显示。进度可以以确定或不确定的运行时间显示。


    例如，清单 10-27 中的代码片段可以在 `TaskChildFactory` 的 `createKeys()` 方法中使用，以显示在 *TodoRCP*
    应用程序的 `OutineView` 中加载和显示大量任务的进度。


    ```

    ProgressHandle handle = ProgressHandleFactory.creatHandle("Tasks progress");

    handle.start(100);    // 100 个百分位，即 0-100

    ...

    handle.progress(25);

    ...

    handle.progress(50);

    ...

    handle.progress(75);

    ...

    handle.finish();

    清单 10-27

    显示加载大量任务进度的示例

    ```


    要处理跨多个模块的长时间任务，请使用 API（[`http://bits.netbeans.org/dev/javadoc/org-netbeans-api-progress/index.html`](http://bits.netbeans.org/dev/javadoc/org-netbeans-api-progress/index.html)）中描述的
    `ProgressContributor`。


    可视化库

    *可视化库*用于在*场景*上显示可选择、可移动和可更改的图形组件（称为*小部件*）。可视化库基于 Java2D，并使用轻量级窗口系统，因此它可以与 Swing、JavaFX
    等一起使用。

    可视化库通常与*组件面板*结合使用，后者允许将项目拖放到组件（如*场景*）上。为了激发您的兴趣，您可以通过探索可视化库示例（[`https://platform.netbeans.org/graph/examples.html`](https://platform.netbeans.org/graph/examples.html)）来开始您的冒险，以了解该库的功能，并查看一些实际使用它的教程和真实应用程序（[`https://platform.netbeans.org/graph/`](https://platform.netbeans.org/graph/)）。

    在您的项目中使用可视化库之前，您需要从 *platform* 集群添加*可视化库 API*，该集群默认情况下未添加。您可以通过右键单击模块套件并选择**属性**来执行此操作，如前文图
    10-10 所述和所示。

    可视化库的主要类将在以下小节中描述。


    小部件


    小部件是可用于绘制图形的轻量级图形组件。如图 10-17 所示，`Widget` 遵循*组合设计模式*（小部件包含小部件），并且各种小部件被组织成树形层次结构。


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig17_HTML.jpg](img/479166_1_En_10_Fig17_HTML.jpg)


    图 10-17

    可视化库类图


    可视化库提供了多种 `Widget` 实现（见图 10-18），每种实现都包含了由可自定义操作、边框和布局组成的预定义行为。`Widget` 被排列并显示在
    `Scene` 中，`Scene` 也有多种实现（见图 10-17）。


    小部件具有高效的验证和重绘机制。一个小部件（如图 10-17 所示）还具有一个*状态*，该状态可以取以下几个值之一：*已选中、高亮显示*（也称为*辅助选择*）、*对象悬停、小部件悬停、小部件瞄准*。


    ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig18_HTML.jpg](img/479166_1_En_10_Fig18_HTML.jpg)


    图 10-18

    小部件实现


    最后，`Widget` 有一个 `Lookup`，可用于向其中添加对象。清单 10-28 提供了在 `Widget` 中使用 `Lookup` 的示例。


    ```

    class MyWidget extends LabelWidget {

    private Lookup lookup;

    private InstanceContent ic;

    public MyWidget(Scene scene) {

    super(scene);

    ic = new InstanceContent();

    }

    @Override

    public Lookup getLookup() {

    if (lookup == null) {

    lookup = new AbstractLookup(ic);

    }

    return lookup;

    }

    清单 10-28

    一个带有 Lookup 以存储模型对象的 Widget

    ```


    这个 `Lookup` 通常由包含可视化组件的 `TopComponent` 代理，而 `TopComponent` 又由 `Utilities.actionsGlobalContext()`
    代理，正如我们在前几章中学到的那样。


    场景

    `Scene`（见图 10-17 和 10-18）也是一种 `Widget`。它是一个顶级 `Widget`（树形层次结构的*根*元素），包含其他 `Widget`。它通常显示在
    Swing 组件中，例如 `JScrollPane`。如图 10-17 所示，有各种类型的 `Scene`。例如，`ObjectScene` 将 `Widget`
    映射到数据对象。`GraphScene`、`GraphPinScene` 和 `VMDGraphScene`（*VMD* 代表*可视化移动设计器*）用于简化图形的创建。

