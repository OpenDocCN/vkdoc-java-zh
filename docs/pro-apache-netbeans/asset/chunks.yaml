  trans: '

    ### 优势与特性


    NetBeans RCP 窗口系统 API 的优势之一在于，应用程序代码完全独立于其组件在屏幕上的渲染方式。


    一个*窗口系统*：


    *   包含一个*窗口管理器*，用于响应用户操作，例如拖拽、分离、选择、分组、调整大小或最小化窗口，以管理工作空间；

    *   包含一个*持久化机制*，能够“记住”布局，使用户无需在每次重启时重新配置应用程序；

    *   提供了一种指定应用程序窗口布局的方法，以及一种对具有共同行为的窗口进行分组的方法；

    *   提供了*角色*（或视角），你可以基于这些角色配置应用程序的布局（例如，“管理员”角色、“用户”角色等）。


    NetBeans 平台窗口系统包含一个窗口管理器，用于跟踪应用程序的窗口、模式、窗口组和角色，使开发者能够专注于构建业务逻辑，而不是重复造轮子。你可以通过点击
    **工具 ➤ 选项**（或在 MacOS 上点击 **NetBeans ➤ 偏好设置**）➤ **外观** 来配置它（见图 8-1）。


    ![../images/479166_1_En_8_Chapter/479166_1_En_8_Fig1_HTML.jpg](img/479166_1_En_8_Fig1_HTML.jpg)


    图 8-1


    配置外观


    在创建 Swing 应用程序的主窗口时，你需要创建一个 `JFrame`。要利用 NetBeans 平台窗口系统，则需要创建一个 `TopComponent`。`TopComponent`
    本身扩展了 `JComponent`（一个基于 Swing 的容器）。使用 `TopComponent`，所有应用程序窗口都会自动集成到窗口系统中，也就是说，它们由
    NetBeans 平台窗口管理器管理，并支持丰富的窗口操作。*文档* 是处于编辑器模式下的 `TopComponent`。


    如清单 8-1 所示，这些注解允许将 `TopComponent` 注册到窗口系统中。`TopComponent` 的外观和配置也通过这些注解完成。


    ```

    @ConvertAsProperties(

    dtd = "-//todo.view//Tasks//EN",

    autostore = false

    )

    @TopComponent.Description(

    preferredID = "TasksTopComponent",

    //iconBase="SET/PATH/TO/ICON/HERE",

    persistenceType = TopComponent.PERSISTENCE_ALWAYS

    )

    @TopComponent.Registration(mode = "editor", openAtStartup = true)

    @ActionID(category = "Window", id = "todo.view.TasksTopComponent")

    @ActionReference(path = "Menu/Window" /* , position = 333 */)

    @TopComponent.OpenActionRegistration(

    displayName = "#CTL_TasksAction",

    preferredID = "TasksTopComponent"

    )

    @Messages({

    "CTL_TasksAction=Tasks",

    "CTL_TasksTopComponent=Tasks Window",

    "HINT_TasksTopComponent=This is a Tasks window"

    })

    public final class TasksTopComponent extends TopComponent {

    //...

    清单 8-1

    用于将 TopComponent 注册到系统文件系统的注解

    ```


    `@TopComponent.Description` 包含三个属性：


    *   `iconBase`（定义一个可选路径，指向一个 16x16 像素的图像，该图像将显示在 `TopComponent` 的标签页中）

    *   `preferredID`（`TopComponent` 的唯一名称或标识）

    *   `persistenceType`（可以是 `PERSISTENCE_ALWAYS`、`PERSISTENCE_NEVER` 或 `PERSISTENCE_ONLY_OPENED`）；用于指定应用程序关闭时是否存储
    `TopComponent` 的状态。这是通过重写 `writeProperties()` 和 `readProperties()` 方法来实现的。


    `@TopComponent.Registration` 定义了*模式*，即 `TopComponent` 在窗口布局中显示的位置（见图 8-2）。可选元素
    `position` 指定了窗口在某个模式内的相对位置。也就是说，如果多个 `TopComponent` 在同一模式下打开，位置值较小的窗口将位于左侧。


    `@ActionID` 定义了一个动作，当 `TopComponent` 关闭时，该动作将打开它。`@ActionReference` 定义了*系统文件系统*（`layer.xml`）中的路径，菜单将在该路径下定义（在此例中，它将作为
    **窗口** 菜单下的一个动作）。`position` 属性定义了它在菜单中的位置（数字越小，在菜单中位置越高）。你还可以使用可选元素 `separatorBefore`
    和 `separatorAfter` 指定菜单项分隔符。最后，`@TopComponent.OpenActionRegistration` 正是执行此操作：创建用于打开窗口的*打开动作*。


    ![../images/479166_1_En_8_Chapter/479166_1_En_8_Fig2_HTML.jpg](img/479166_1_En_8_Fig2_HTML.jpg)


    图 8-2


    窗口模式


    以下方法控制 `TopComponent` 的生命周期：`open(), close(), requestVisible(), requestActive()`，而以下方法是在
    `TopComponent` 状态发生变化时的通知方法：`componentOpened(), componentClosed(), componentShowing(),
    componentActivated(), componentDeactivated(), componentHidden()`。


    ### 查找


    `TopComponent` 实现了 `Lookup.Provider` 接口，因此它拥有自己的 `Lookup`。通常，它会代理当前选中的任何节点的 Lookup。`TopComponent`
    的 `Lookup` 在其构造函数中通过 `associateLookup()` 方法定义，例如（见清单 8-2）。


    ```

    public final class TasksTopComponent extends TopComponent {

    private InstanceContent ic = new InstanceContent();

    public TasksTopComponent() {

    //...

    associateLookup(new AbstractLookup(ic));

    }

    清单 8-2

    为 TopComponent 创建一个 Lookup

    ```


    在清单 8-2 中，我们使用了动态查找，正如前一章所解释的那样，但根据你的需要，你也可以使用静态查找（例如，单例查找）。每当 `TasksTopComponent`
    获得焦点时，你添加到 `InstanceContent` 中的任何内容都会被代理到*全局查找*，也称为 `Utilities.actionsGlobalContext()`。

