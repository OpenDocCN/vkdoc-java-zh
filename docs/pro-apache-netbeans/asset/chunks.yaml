    \n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig10_HTML.jpg](Images/479166_1_En_15_Fig10_HTML.jpg)\n\
    \nFigure 15-10\nModule dependencies of Bootstrap module\n\nIDE Cluster Architecture\n\
    The `ide`\ncluster provides the modules that build Apache NetBeans IDE itself.\n\
    These modules include the editor, the debugger, and language support.\nHere we\
    \ describe the most important modules of this cluster.\n\nThe *Projects API* \
    \ (modules *Project\nAPI* (`ide/projectapi`) (see\nFigure [15-11](#479166_1_En_15_Chapter.xhtml#Fig11))\
    \ and\n*Project UI API* (`ide/projectuiapi`))\ndefine how projects work in NetBeans.\
    \ The most trivial `Project` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-projectapi/org/netbeans/api/project/Project.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-projectapi/org/netbeans/api/project/Project.html))\n\
    consists of only an empty Lookup and a project directory. More features\ncan be\
    \ added to the project by simply adding handlers for them into the\nproject's\
