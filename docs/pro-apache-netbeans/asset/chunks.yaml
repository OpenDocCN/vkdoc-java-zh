- fmt: '### Expression Evaluation


    Now let’s assume we are interested in what `StaticWordLibrary.DEFAULT` is all
    about. Hovering with the mouse over `DEFAULT`, a tooltip shows up displaying basic
    information as seen in Figure [6-7](#479166_1_En_6_Chapter.xhtml#Fig7).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig7_HTML.jpg](Images/479166_1_En_6_Fig7_HTML.jpg)


    Figure 6-7 Tooltip for evaluation


    If we want to know more details, just click on the little arrow in front of the
    text, and you will get a structured view of the object evaluated by hovering.
    You can drill deeper by following the displayed tree structure and can finally
    see the words used, as shown in Figure [6-8](#479166_1_En_6_Chapter.xhtml#Fig8).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig8_HTML.jpg](Images/479166_1_En_6_Fig8_HTML.jpg)


    Figure 6-8 Tooltip for evaluation (expanded)


    This type of evaluation allows for a fast drill down into details of an object
    state. It can even be used to change the state. Just click in the right column
    (value) for a field with a simple type, for example, `String`, and type a new
    value and hit **Enter**. This will change the value of the field to the entered
    value.


    Another helpful shortcut is the possibility to highlight a piece of code and get
    a tooltip with the result. Step further through the code until you reach the `StaticWordLibrary`
    again and the debugger stops for you in line 147. Now select the `SCRAMBLED_WORD_LIST(idx)`
    and hover with the mouse. A tooltip shows up as can be seen in Figure [6-9](#479166_1_En_6_Chapter.xhtml#Fig9).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig9_HTML.jpg](Images/479166_1_En_6_Fig9_HTML.jpg)


    Figure 6-9 Tooltip for expression evaluation


    If you look close enough, there is a pin shown before the arrow icon. Clicking
    the pin (symbol/icon) pins the expression evaluation into the source code. So,
    whenever you come back to the file, the expression is automatically reevaluated
    by the debugger, and the result is shown and kept current. A pinned evaluation
    expression is shown in Figure [6-10](#479166_1_En_6_Chapter.xhtml#Fig10).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig10_HTML.jpg](Images/479166_1_En_6_Fig10_HTML.jpg)


    Figure 6-10 Pinned expression evaluation


    In addition to the expression evaluation as part of the source code editor, there
    is a special view, which can be opened using **⌘+F9** (on Mac) or **Ctrl+F9**
    (on Windows/Linux) or from the main menu in the *Debug* menu. It displays an area
    where you can enter arbitrary code, which can be evaluated by either pressing
    **Ctrl+⏎** or clicking on the button on the lower-right corner. The arbitrary
    code example can be a complex code snippet covering multiple lines. The result
    of the evaluation is shown in the *Variables* view in Figure [6-11](#479166_1_En_6_Chapter.xhtml#Fig11).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig11_HTML.jpg](Images/479166_1_En_6_Fig11_HTML.jpg)


    Figure 6-11 Evaluate Expression and Variables view


    The code editor area is aware of the actual debugging context, that is, it offers
    completion for visible fields and methods from the context and even supports code
    completion during writing code. In case you need some code snippet you already
    used before, there is a button in the upper-right corner showing the last-used
    code snippets from the *Evaluate Expression* view.


    The code snippets evaluated cannot only be used to read data but also write changes
    back to the debugged application. This can be very helpful if it is necessary
    to change the state of a debugged application, for example, after applying a code
    fragment, to ensure a correct retry of the code. A complete history of the evaluated
    expressions can also be seen in the *Evaluation Result* view shown in Figure [6-12](#479166_1_En_6_Chapter.xhtml#Fig12).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig12_HTML.jpg](Images/479166_1_En_6_Fig12_HTML.jpg)


    Figure 6-12 Evaluation Result view


    In contrast to the *Evaluation Result* view that shows multiple results all at
    the same time, the *Variables* view in Figure [6-11](#479166_1_En_6_Chapter.xhtml#Fig11)
    shows only the latest evaluated expression on top of all other information.


    Let’s have a more detailed look at this view, as shown in Figure [6-13](#479166_1_En_6_Chapter.xhtml#Fig13).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig13_HTML.jpg](Images/479166_1_En_6_Fig13_HTML.jpg)


    Figure 6-13 Variables view'
  raw: '### Expression Evaluation


    Now let’s assume we are interested in what `StaticWordLibrary.DEFAULT` is all
    about. Hovering with the mouse over `DEFAULT`, a tooltip shows up displaying basic
    information as seen in Figure [6-7](#479166_1_En_6_Chapter.xhtml#Fig7).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig7_HTML.jpg](Images/479166_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Tooltip for evaluation


    If we want to know more details, just click on the little arrow in front of the
    text, and you will get a structured view of the object evaluated by hovering.
    You can drill deeper by following the displayed tree structure and can finally
    see the words used, as shown in Figure [6-8](#479166_1_En_6_Chapter.xhtml#Fig8).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig8_HTML.jpg](Images/479166_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Tooltip for evaluation (expanded)


    This type of evaluation allows for a fast drill down into details of an object
    state. It can even be used to change the state. Just click in the right colum
    (value) for a field with a simple type, for example, `String`, and type a new
    value and hit **Enter**. This will change the value of the field to the entered
    value.


    Another helpful shortcut is the possibility to highlight a piece of code and get
    a tooltip with the result. Step further through the code until you reach the `StaticWordLibrary`
    again and the debugger stops for you in line 147\. Now select the `SCRAMBLED_WORD_LIST(idx)`
    and hover with the mouse. A tooltip shows up as can be seen in Figure [6-9](#479166_1_En_6_Chapter.xhtml#Fig9).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig9_HTML.jpg](Images/479166_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Tooltip for expression evaluation


    If you look close enough, there is a pin shown before the arrow icon. Clicking
    the pin (symbol/icon) pins the expression evaluation into the source code. So,
    whenever you come back to the file, the expression is automatically reevaluated
    by the debugger, and the result is shown and kept current. A pinned evaluation
    expression is shown in Figure [6-10](#479166_1_En_6_Chapter.xhtml#Fig10).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig10_HTML.jpg](Images/479166_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    Pinned expression evaluation


    In addition to the expression evaluation as part of the source code editor, there
    is a special view, which can be opened using ⌘**+F9** (on Mac) or Ctrl+F9 (on
    Windows/Linux) or from the main menu in the *Debug* menu. It displays an area
    where you can enter arbitrary code, which can be evaluated by either pressing
    CTRL-⏎ or clicking on the button on the lower-right corner. The arbitrary code
    example can be a complex code snippet covering multiple lines. The result of the
    evaluation is shown in the *Variables* view in Figure [6-11](#479166_1_En_6_Chapter.xhtml#Fig11).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig11_HTML.jpg](Images/479166_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    Evaluate Expression and Variables view


    The code editor area is aware of the actual debugging context, that is, it offers
    completion for visible fields and methods from the context and even supports code
    completion during writing code. In case you need some code snippet you already
    used before, there is a button in the upper-right corner showing the last-used
    code snippets from the *Evaluate Expression* view.


    The code snippets evaluated cannot only be used to read data but also write changes
    back to the debugged application. This can be very helpful if it is necessary
    to change the state of a debugged application, for example, after applying a code
    fragment, to ensure a correct retry of the code. A complete history of the evaluated
    expressions can also be seen in the *Evaluation Result* view shown in Figure [6-12](#479166_1_En_6_Chapter.xhtml#Fig12).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig12_HTML.jpg](Images/479166_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Evaluation Result view


    In contrast to the *Evaluation Result* view that shows multiple results all at
    the same time, the *Variables* view in Figure [6-11](#479166_1_En_6_Chapter.xhtml#Fig11)
    shows only the latest evaluated expression on top of all other information.


    Let’s have a more detailed look at this view, as shown in Figure [6-13](#479166_1_En_6_Chapter.xhtml#Fig13).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig13_HTML.jpg](Images/479166_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Variables view'
  trans: '

    ### 表达式求值


    现在，假设我们想了解 `StaticWordLibrary.DEFAULT` 的具体内容。将鼠标悬停在 `DEFAULT` 上，会弹出一个工具提示，显示基本信息，如图
    6-7 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig7_HTML.jpg](img/479166_1_En_6_Fig7_HTML.jpg)


    图 6-7


    求值工具提示


    如果想了解更详细的信息，只需点击文本前面的小箭头，就会看到一个结构化的视图，显示通过悬停求得的对象。你可以沿着显示的树形结构深入查看，最终看到所使用的单词，如图
    6-8 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig8_HTML.jpg](img/479166_1_En_6_Fig8_HTML.jpg)


    图 6-8


    求值工具提示（展开）


    这种求值方式可以快速深入查看对象状态的细节。它甚至可以用来改变状态。只需点击简单类型（例如 `String`）字段的右侧列（值），输入一个新值，然后按 **Enter**
    键。这会将字段的值更改为输入的值。


    另一个有用的快捷方式是，可以高亮一段代码并获取带有结果的工具提示。继续单步执行代码，直到再次到达 `StaticWordLibrary`，调试器会在第 147
    行停下。现在选中 `SCRAMBLED_WORD_LIST(idx)` 并将鼠标悬停其上。会弹出一个工具提示，如图 6-9 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig9_HTML.jpg](img/479166_1_En_6_Fig9_HTML.jpg)


    图 6-9


    表达式求值工具提示


    如果仔细观察，会发现箭头图标前有一个图钉。点击该图钉（符号/图标）可以将表达式求值固定在源代码中。这样，无论何时你回到该文件，调试器都会自动重新求值该表达式，并显示结果且保持最新。固定后的求值表达式如图
    6-10 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig10_HTML.jpg](img/479166_1_En_6_Fig10_HTML.jpg)


    图 6-10


    固定的表达式求值


    除了作为源代码编辑器一部分的表达式求值外，还有一个专门的视图，可以通过 ⌘**+F9**（在 Mac 上）或 Ctrl+F9（在 Windows/Linux
    上）打开，或者从主菜单的 *Debug* 菜单中打开。它会显示一个区域，你可以在其中输入任意代码，通过按 CTRL-⏎ 或点击右下角的按钮来求值。任意代码示例可以是跨越多行的复杂代码片段。求值结果显示在
    *Variables* 视图中，如图 6-11 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig11_HTML.jpg](img/479166_1_En_6_Fig11_HTML.jpg)


    图 6-11


    求值表达式和变量视图


    代码编辑器区域能够感知实际的调试上下文，也就是说，它会为上下文中可见的字段和方法提供补全功能，甚至在编写代码时也支持代码补全。如果你需要之前使用过的某个代码片段，右上角有一个按钮，可以显示
    *Evaluate Expression* 视图中最近使用过的代码片段。


    求值后的代码片段不仅可以用于读取数据，还可以将更改写回正在调试的应用程序。这在需要更改调试应用程序的状态时非常有用，例如，在应用了一个代码片段后，确保能够正确地重试代码。在
    *Evaluation Result* 视图中也可以看到所有已求值表达式的完整历史记录，如图 6-12 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig12_HTML.jpg](img/479166_1_En_6_Fig12_HTML.jpg)


    图 6-12


    求值结果视图


    与同时显示多个结果的 *Evaluation Result* 视图不同，图 6-11 中的 *Variables* 视图仅在所有其他信息之上显示最近一次求值的表达式。


    让我们更详细地看一下这个视图，如图 6-13 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig13_HTML.jpg](img/479166_1_En_6_Fig13_HTML.jpg)


    图 6-13


    变量视图

    '
- fmt: '### Variables View


    `Variables`视图是用于检查（和更改）调试过程中所有对象状态的地方。它分为三个主要区域。


    首先，显示来自`Evaluate Expression`视图的代码片段评估结果（粉色图标）。


    其次，有一个监视列表（蓝色图标）。`Watches`是一种对简单评估结果的持久快捷方式，例如，在变量列表中层级较深的某个特殊字段，即使变量列表在调试器上下文更改（例如，在调试过程中离开某个类）时会刷新，它也能保持静态可见。如果您暂时不需要更新监视，可以通过取消选中显示的监视前面的复选框来禁用每个监视。


    第三，显示变量列表，例如`this`和`local variables`（绿色图标）。


    与其他视图一样，`Variables`视图也可以自定义。可以通过使用视图左侧的按钮之一进行自定义。从上到下：


    - **Show Evaluation Result inside Variable View**：切换在`Variables`视图中显示来自`Evaluate
    Expression`视图的代码片段评估结果的可见性。

    - **Show Watches inside Variables View**：切换在`Variables`视图中显示已定义监视的可见性。

    - **Create new Watch**：打开一个对话框，允许用户输入要监视的表达式。文本字段支持代码补全，以便更快地创建监视，减少输入。

    - **Open Formatter Options**：打开首选项窗口（选项窗口），允许用户定义如何在`Variables`视图中渲染特定类型的对象。

    - **Show values as visual property editors, when available**：如果IDE中为变量（字段）的类型注册了属性编辑器，则使用该属性编辑器进行渲染/编辑，而不是使用定义的格式化逻辑。


    作为替代方案，也可以通过双击`<Enter new watch>`标签来创建监视。显示的文本字段也支持代码补全，如图[6-14](#479166_1_En_6_Chapter.xhtml#Fig14)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig14_HTML.jpg](Images/479166_1_En_6_Fig14_HTML.jpg)


    Figure 6-14


    使用代码补全添加新监视


    `Variables`视图中不同项目上的上下文菜单有助于进一步交互：


    - **Delete**：删除监视：固定、固定或默认监视。

    - **Delete All**：删除所有监视。

    - **Create Fixed Watch**：创建一个不基于实际上下文而是基于全局上下文的监视。

    - **Edit**：打开一个对话框，允许更改要监视的表达式。文本字段支持代码补全，以便更快地创建监视，减少输入。

    - **Show Pinned Watches**：显示所有通过在源代码视图中固定表达式评估而创建的监视。

    - **New Watch**：打开一个对话框，允许用户输入要监视的表达式。文本字段支持代码补全，以便更快地创建监视，减少输入。

    - **Go to Type Source**：在编辑器选项卡中打开附加到类型的源代码。如果没有可用的源代码，则显示反编译的替代内容。

    - **View as**：切换视图组件以使用表格或树形表格显示数据。

    - **Show references**：打开`Heap Walker`视图以检查所选变量的实际引用网络。

    - **Mark Object**：为对象附加标签，以帮助在后续调试过程中识别该对象。

    - **Show Only Rows where**：根据变量类型从视图中过滤行。提供不同的过滤类型。


    凭借所有这些可能性，`Variables`视图是一个非常强大的工具，可以帮助您了解应用程序的状态。在Apache NetBeans中，此视图还附带了一些其他视图，这些视图从不同角度支持调试过程。我们首先深入了解的是`Watches`视图。


    ### Watches View


    `Watches`视图是一个专门的视图，专门用于显示`watches`功能（已在`Variables`视图中描述）并与之交互。示例视图如图[6-15](#479166_1_En_6_Chapter.xhtml#Fig15)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig15_HTML.jpg](Images/479166_1_En_6_Fig15_HTML.jpg)


    Figure 6-15


    Watches视图


    与`Variables`视图的主要区别在于，`Variables`视图提供混合信息，而`Watches`视图仅专注于显示监视。在`Variables`视图部分中描述的所有与监视的交互在此处也可用：


    - **Show Pinned Watches**：显示所有通过在源代码视图中固定表达式评估而创建的监视。

    - **New Watch**：打开一个对话框，允许用户输入要监视的表达式。文本字段支持代码补全，以便更快地创建监视，减少输入。

    - **Create fixed watch**：创建一个不基于实际上下文而是基于全局上下文的监视。


    #### Threads View


    `Threads`视图是`Debugging`视图的简化版本。它以树形视图按名称显示调试进程的所有线程，并按线程组分组。视图示例如图[6-16](#479166_1_En_6_Chapter.xhtml#Fig16)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig16_HTML.jpg](Images/479166_1_En_6_Fig16_HTML.jpg)


    Figure 6-16


    Threads视图


    附加列显示线程状态的描述以及线程是否被调试器挂起。显示挂起状态的列也可用于在调试会话中挂起或恢复线程。我们在`Debugging`视图中已经知道的一些交互也可作为线程上下文菜单的一部分使用。如果需要有关当前正在调试的线程的详细信息，我们需要打开`Call
    Stack`视图。


    ### Call Stack View


    `Call Stack`视图是`Debugging`视图的另一半，作为一个单独的视图。它显示调试线程的调用堆栈，并允许对堆栈帧进行与`Debugging`视图中相同的交互，即`Make
    Current`、`Pop To Here`。通常在调试会话期间，`Debugging`视图足以处理所有与线程管理和控制相关的事情，因此不会使用单独的调用堆栈和线程视图。调用堆栈显示如图[6-17](#479166_1_En_6_Chapter.xhtml#Fig17)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig17_HTML.jpg](Images/479166_1_En_6_Fig17_HTML.jpg)


    Figure 6-17


    Call Stack视图


    我们讨论的许多调试功能和技巧都围绕线程和值评估展开。另一个鲜为人知的功能是在调试会话期间进行堆遍历的可能性。堆遍历是一种调试技术，用于调查堆的内容，可以从单个实例（如`Variables`视图中显示的那样）开始，也可以从堆直方图开始，该直方图显示堆中有多少个（以及总大小）哪种类型（类）的实例。可以通过打开`Loaded
    Classes`视图来显示这样的直方图。'
  raw: '### Variables View


    The *Variables* view is the place to inspect (and change) the state of all objects
    reached during debugging. It is split into three major areas.


    First, the evaluation result of the code snippet from the *Evaluate Expression*
    view is shown (pinkish icon).


    Second, there is a list of watches shown (blue icon). *Watches* are a kind of
    persistent shortcut to simple evaluation results, for example, some special field
    that is some levels down the hierarchy in the list of variables that can be made
    statically visible, despite the variable list refreshing during debugger context
    changes, for example, leaving a class during debugging. If you temporarily do
    not need the watches to be updated anymore, it is possible to disable each watch
    by deselecting the check box in front of the displayed watch.


    Third, the list of variables, for example, *this* and *local variables*, is shown
    (green icon).


    Like other views, the *Variables* view can also be customized. The customization
    can be done by using one of the buttons on the left-hand side of the view. From
    top to bottom:


    *   **Show Evaluation Result inside Variable View**. Toggles the visibility of
    the result from evaluating the code snippet in the *Evaluate Expression* view
    in the *Variables* view.


    *   **Show Watches inside Variables View**. Toggles the visibility of the defined
    watches in the *Variables* view.


    *   **Create new Watch**. Opens up a dialog, which allows the user to enter an
    expression to be watched. The text field supports code completion to allow for
    a faster creation of the watch with less typing.


    *   **Open Formatter Options**. Opens the preferences window (options window)
    allowing the user to define how objects of a special type will be rendered in
    the *Variables* view.


    *   **Show values as visual property editors, when available**. If a property
    editor is available (registered) in the IDE for the type of the variable (field),
    the property editor is used for rendering / editing of the type instead of the
    defined formatter logic.


    As an alternative, a watch can also be created by double-clicking on the label
    *“<Enter new watch>”*. The text field showing up supports code completion as well,
    as can be seen in Figure [6-14](#479166_1_En_6_Chapter.xhtml#Fig14).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig14_HTML.jpg](Images/479166_1_En_6_Fig14_HTML.jpg)


    Figure 6-14


    Adding new watch with code completion


    The context menu on the different items in the *Variables* view helps with further
    interactions:


    *   **Delete**. Deletes a watch: either fixed, pinned, or default watch.


    *   **Delete All**. Deletes all watches.


    *   **Create Fixed Watch**. Creates a watch, which is not based on the actual
    context but on the global context.


    *   **Edit**. Opens up a dialog, which allows changing the expression to be watched.
    The text field supports code completion to allow for a faster creation of the
    watch with less typing.


    *   **Show Pinned Watches**. Shows all watches created by pinning down an expression
    evaluation in the source code view.


    *   **New Watch**. Opens up a dialog, which allows the user to enter an expression
    to be watched. The text field supports code completion to allow for a faster creation
    of the watch with less typing.


    *   **Go to Type Source**. Opens the source code attached to the type in an editor
    tab. If there is no source code available, a disassembled substitute is shown.


    *   **View as**. Toggles the view component to use a table or a tree table for
    displaying the data.


    *   **Show references**. Opens a *Heap Walker* view to inspect the actual reference
    network of the selected variable.


    *   **Mark Object**. Attaches a label to an object to help identify that object
    during the further debugging process.


    *   **Show Only Rows where**. Filters out rows from the view based on the type
    of the variable. Different filter types are available.


    With all these possibilities, the *Variables* view is a very powerful tool to
    help you understand the state of your application. This view is accompanied in
    Apache NetBeans with a couple of other views that support the debugging process
    from different perspectives. The first one that we take a deeper look at is the
    *Watches* view.


    ### Watches View


    The *Watches* view is a spcialized view, which is dedicated only to the display
    of and interaction with the *watches* feature (which has already been described
    as part of the *Variables* view). An example view is shown in Figure [6-15](#479166_1_En_6_Chapter.xhtml#Fig15).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig15_HTML.jpg](Images/479166_1_En_6_Fig15_HTML.jpg)


    Figure 6-15


    Watches view


    The major difference to the *Variables* view is that the *Variables* view provides
    mixed information where the *Watches* view focuses solely on displaying watches.
    All interactions with watches described in the *Variables* view section are available
    here as well:


    *   **Show Pinned Watches**. Shows all watches created by pinning down an expression
    evaluation in the source code view.


    *   **New Watch**. Opens up a dialog, which allows the user to enter an expression
    to be watched. The text field supports code completion to allow for a faster creation
    of the watch with less typing.


    *   **Create fixed watch**. Creates a watch, which is not based on the actual
    context but on the global context.


    #### Threads View


    The *Threads* view is a simplified version of the *Debugging* view. It shows all
    the threads of the debugged process by name in a tree view, grouped by their thread
    groups. An example of the view is shown in Figure [6-16](#479166_1_En_6_Chapter.xhtml#Fig16).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig16_HTML.jpg](Images/479166_1_En_6_Fig16_HTML.jpg)


    Figure 6-16


    Threads view


    Additional columns show a description of the thread state and if the thread is
    suspended by the debugger. The column showing the suspended state can also be
    used to suspend or resume the thread in the debugging session. Some of the interactions
    we already know from the *Debugging* view are also available as part of the context
    menu for thread. If we need details about the thread currently being debugged,
    we need to open the *Call Stack* view.


    ### Call Stack View


    The *Call Stack* view is the other half of the *Debugging* view as a separate
    view . It shows the call stack of the debugged thread and allows the same kind
    of interaction on the stack frames that are available in the *Debugging* view,
    that is, *Make Current*, *Pop To Here*. Typically during a debugging session,
    the *Debugging* view is sufficient for all things around thread management and
    control, so that the separate views for call stacks and threads are not used.
    The call stack display is shown in Figure [6-17](#479166_1_En_6_Chapter.xhtml#Fig17).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig17_HTML.jpg](Images/479166_1_En_6_Fig17_HTML.jpg)


    Figure 6-17


    Call Stack view


    A lot of the debugging features and techniques we discussed so far are centered
    around threading and evaluation of values. One other feature that is far less
    known is the possibility to do a heap walk during the debugging session. A heap
    walk is a debugging technique to investigate the content of the heap starting
    from either a single instance (as displayed in the *Variables* view) or a heap
    histogram showing how many instances (with total size) of which type (class) are
    part of the heap. Such a histogram can be shown by opening the *Loaded Classes*
    view.'
  trans: '

    ### 变量视图


    *变量*视图用于检查（和更改）调试过程中所触及的所有对象的状态。它分为三个主要区域。


    首先，显示来自*计算表达式*视图的代码片段求值结果（粉色图标）。


    其次，显示一个监视列表（蓝色图标）。*监视*是一种对简单求值结果的持久化快捷方式，例如，在变量层级结构中位于较深层次的某个特殊字段，即使变量列表在调试器上下文变化（例如，调试过程中离开某个类）时会刷新，该字段也能保持静态可见。如果你暂时不需要更新监视，可以通过取消选中显示监视前的复选框来禁用每个监视。


    第三，显示变量列表，例如，*this* 和*局部变量*（绿色图标）。


    与其他视图一样，*变量*视图也可以自定义。自定义可以通过使用视图左侧的按钮之一来完成。从上到下依次为：


    *   **在变量视图中显示求值结果**。切换是否在*变量*视图中显示来自*计算表达式*视图的代码片段求值结果。


    *   **在变量视图中显示监视**。切换是否在*变量*视图中显示已定义的监视。


    *   **创建新监视**。打开一个对话框，允许用户输入要监视的表达式。文本字段支持代码补全，以便更快地创建监视，减少输入量。


    *   **打开格式化选项**。打开首选项窗口（选项窗口），允许用户定义特殊类型的对象在*变量*视图中的呈现方式。


    *   **在可用时，将值显示为可视化属性编辑器**。如果 IDE 中为变量（字段）的类型注册了属性编辑器，则使用该属性编辑器来呈现/编辑该类型，而不是使用已定义的格式化逻辑。


    另外，也可以通过双击标签 *“<输入新监视>”* 来创建监视。出现的文本字段也支持代码补全，如图 6-14 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig14_HTML.jpg](img/479166_1_En_6_Fig14_HTML.jpg)


    图 6-14


    使用代码补全添加新监视


    *变量*视图中不同项目上的上下文菜单有助于进一步交互：


    *   **删除**。删除一个监视：无论是固定监视、固定监视还是默认监视。


    *   **全部删除**。删除所有监视。


    *   **创建固定监视**。创建一个不基于当前上下文，而是基于全局上下文的监视。


    *   **编辑**。打开一个对话框，允许更改要监视的表达式。文本字段支持代码补全，以便更快地创建监视，减少输入量。


    *   **显示固定监视**。显示所有通过在源代码视图中固定表达式求值而创建的监视。


    *   **新建监视**。打开一个对话框，允许用户输入要监视的表达式。文本字段支持代码补全，以便更快地创建监视，减少输入量。


    *   **转到类型源代码**。在编辑器选项卡中打开附加到该类型的源代码。如果没有可用的源代码，则显示反编译的替代内容。


    *   **查看方式**。切换视图组件，使用表格或树形表格来显示数据。


    *   **显示引用**。打开*堆遍历器*视图，检查所选变量的实际引用网络。


    *   **标记对象**。为对象附加一个标签，以帮助在后续调试过程中识别该对象。


    *   **仅显示满足条件的行**。根据变量类型从视图中过滤行。提供不同的过滤类型。


    有了所有这些功能，*变量*视图是一个非常强大的工具，可以帮助你了解应用程序的状态。在 Apache NetBeans 中，此视图还附带其他几个从不同角度支持调试过程的视图。我们首先深入了解的是*监视*视图。


    ### 监视视图


    *监视*视图是一个专门的视图，专门用于显示*监视*功能（已在*变量*视图部分描述过）并与之交互。示例视图如图 6-15 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig15_HTML.jpg](img/479166_1_En_6_Fig15_HTML.jpg)


    图 6-15


    监视视图


    与*变量*视图的主要区别在于，*变量*视图提供混合信息，而*监视*视图则专注于显示监视。在*变量*视图部分描述的所有与监视的交互在此处同样可用：


    *   **显示固定监视**。显示所有通过在源代码视图中固定表达式求值而创建的监视。


    *   **新建监视**。打开一个对话框，允许用户输入要监视的表达式。文本字段支持代码补全，以便更快地创建监视，减少输入量。


    *   **创建固定监视**。创建一个不基于当前上下文，而是基于全局上下文的监视。


    #### 线程视图


    *线程*视图是*调试*视图的简化版本。它以树形视图按名称显示被调试进程的所有线程，并按线程组分组。视图示例如图 6-16 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig16_HTML.jpg](img/479166_1_En_6_Fig16_HTML.jpg)


    图 6-16


    线程视图


    附加列显示线程状态的描述以及线程是否被调试器挂起。显示挂起状态的列也可用于在调试会话中挂起或恢复线程。我们在*调试*视图中已经了解的一些交互也可在线程的上下文菜单中使用。如果需要当前正在调试的线程的详细信息，则需要打开*调用栈*视图。


    ### 调用栈视图


    *调用栈*视图是*调试*视图的另一半，作为一个独立的视图存在。它显示被调试线程的调用栈，并允许对栈帧进行与*调试*视图中相同的交互，即*设为当前*、*弹出到此位置*。通常在调试会话期间，*调试*视图足以处理所有与线程管理和控制相关的事情，因此不会使用单独的调用栈和线程视图。调用栈显示如图
    6-17 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig17_HTML.jpg](img/479166_1_En_6_Fig17_HTML.jpg)


    图 6-17


    调用栈视图


    我们目前讨论的许多调试功能和技巧都围绕线程和值求值展开。另一个鲜为人知的功能是在调试会话期间进行堆遍历的可能性。堆遍历是一种调试技术，用于调查堆的内容，可以从单个实例（如*变量*视图中所示）开始，也可以从堆直方图开始，该直方图显示堆中包含多少个（以及总大小）哪种类型（类）的实例。可以通过打开*已加载类*视图来显示这样的直方图。

    '
- fmt: '### Loaded Classes View


    `Loaded Classes`视图显示所有已加载类的直方图，基于每个类的实例数量。这是分析堆组成的简单起点。该视图将实例数量显示为绝对值以及占所有实例的百分比。表格默认按绝对实例计数排序，如图6-18所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig18_HTML.jpg](Images/479166_1_En_6_Fig18_HTML.jpg)


    **图6-18** `Loaded Classes`视图


    由于堆直方图的特性，类列表可能非常长。为了更深入地分析，可以在表格底部定义过滤器。可用的过滤器类型如下：


    - **Contains**：显示所有完全限定类名包含过滤字符串的类。

    - **Does not contain**：显示所有完全限定类名不包含过滤字符串的类。

    - **Regular Expression**：显示所有完全限定类名与作为正则表达式的过滤字符串匹配的类。

    - **Subclass of**：显示所有属于输入类的子类的类。该类需要使用完全限定类名输入。


    过滤器激活后，过滤器文本字段右侧会显示一个红色的**x**，可用于清除过滤器。最右侧是一个类似微调器的控件，用于访问之前输入的过滤字符串。


    对于显示堆中类的每一行，都有一个包含以下操作的上下文菜单：


    - **Show in Instances View**：如果`Instances`视图在编辑器标签页中已关闭，则打开它并显示所选类的实例。

    - **Show Only Subclasses**：基于所选类启用子类过滤功能。

    - **Go to Source**：在编辑器标签页中打开所选类的源代码。如果标签页已存在，则激活并显示它。


    分析堆内容时，首先需要为直方图设置一个良好的过滤器；通常先查找自己的类，然后找出该实例的对象图。此分析通过`Instances`视图完成。


    ### Instances View


    `Instances`视图是堆分析（堆遍历）的核心。该视图主要显示一个类的不同实例列表。通过从左上角的树形列表中选择一个实例，其他三个组件会更新。左下角显示实例的值表示，例如`String`的字符序列。右上角是实例的结构化视图，即允许通过深入树形结构递归查看所有字段及其值。右下角显示实际实例的使用位置，这是引用链，可以跟踪以找出哪个对象持有您的宝贵实例。所有这些细节如图6-19所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig19_HTML.jpg](Images/479166_1_En_6_Fig19_HTML.jpg)


    **图6-19** `Instances`视图


    如果您想查看字段列表中显示的某个实例的详细信息，请打开上下文菜单并选择`Show Instance`。这将切换`Instances`视图，使其渲染与字段列表中选定实例相同类型的实例列表，并在实例列表中预选该实例。这允许快速深入对象层次结构。


    既然我们已经知道如何在调试会话中处理线程、内存和求值，我们还需要了解如何处理断点。


    ### Breakpoints


    断点是调试的关键功能，因为它们允许在代码的任意位置停止调试进程。在Apache NetBeans中，可以使用`Breakpoints`视图跨源文件管理和显示断点。除了将断点视为非结构化列表外，断点还可以分组为自定义或预定义组，例如按编程语言分组的`Breakpoint
    Groups`。一个断点可以属于一个自定义组，并且如果需要，可以从一个组移动到另一个组。在深入探讨这些细节之前，让我们先创建一些新的断点。


    在Apache NetBeans中创建断点有多种方式：


    - 通过切换装订线（显示行号的区域）中的断点，可以创建或删除`Class Breakpoint`、`Field Breakpoint`、`Line Breakpoint`或`Method
    Breakpoint`。

    - 通过主菜单中`Debug`菜单下的`New Breakpoint`菜单项（Mac上为⇧-⌘-F8，Windows/Linux上为Ctrl+Shift+F8），可以创建所有类型的断点。


    使用`New Breakpoint`操作创建新断点可以在创建时完全配置断点。第一步是选择调试器，这会改变可用的断点类型列表。对于`Java`调试器，断点类型如下：


    - **Class**：基于类状态停止调试进程。

    - **Exception**：基于抛出的异常停止调试进程。

    - **Field**：如果访问字段则停止调试进程。

    - **Line**：如果到达文件中的特定行则停止调试进程。

    - **Method**：基于方法相关状态停止调试进程。

    - **Thread**：基于线程相关状态停止调试进程。

    - **AWT/Swing Component**：基于组件相关事件停止调试进程。


    所有断点类型都允许配置附加属性。它们分为两类：`Conditions`和`Actions`，并且可能因断点类型而异。`New Breakpoint`对话框如图6-20所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig20_HTML.jpg](Images/479166_1_En_6_Fig20_HTML.jpg)


    **图6-20** `New Breakpoint`对话框


    `Actions`属性描述了到达断点时发生的情况。每种断点类型都有四种不同的操作。


    - **Suspend**：允许选择到达断点时将挂起哪些线程。可能的值有`Breakpoint Thread`（到达断点的线程）、`All threads`或`No
    thread (continue)`。选择`No thread`将仅打印`Print Text`操作下的文本，但不会停止任何线程。这在仅需要不同点的值列表但不需要与调试进程进一步交互时很有用，例如在多线程应用程序中，停止线程会改变运行时行为。

    - **Enable Group**：到达此断点时启用选定的断点组。结合下一个操作，这可以实现某种自动化的基于上下文的断点控制，以减少在代码特定区域手动启用或禁用断点的工作量。

    - **Disable Group**：到达此断点时禁用选定的断点组。结合上一个操作，这可以实现某种自动化的基于上下文的断点控制，以减少在代码特定区域手动启用或禁用断点的工作量。

    - **Print Text**：到达断点时将配置的文本打印到调试器控制台。


    到达断点时打印文本使用特殊语法来获取动态信息。动态信息由`{}`包围，而外部内容为纯文本。支持以下动态语法：'
  raw: '### Loaded Classes View


    The *Loaded Classes* view displays for all loaded classes a histogram based on
    the number of instances of each class. This is a simple starting point for analyzing
    the composition of the heap. The view displays the instance number as an absolute
    value and as a percentage of all instances. The table is by default sorted by
    the absolute instance count as can be seen in Figure [6-18](#479166_1_En_6_Chapter.xhtml#Fig18).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig18_HTML.jpg](Images/479166_1_En_6_Fig18_HTML.jpg)


    Figure 6-18


    Loaded Classes view


    Due to the nature of such a heap histogram, the list of classes can be really
    long. To make a better drill down possible, a filter can be defined at the bottom
    of the table. There are different filter types available:


    *   **Contains**. Shows all classes with a full qualified class name containing
    the filter string.


    *   **Does not contain**. Shows all classes with a full qualified class name not
    containing the filter string.


    *   **Regular Expression**. Shows all classes with a full qualified class name
    matching the filter string as a regular expression.


    *   **Subclass of**. Shows all classes that are a subclass of the entered class.
    The class needs to be entered with the full qualified class name.


    Once the filter is active, a red **x** is shown on the right-hand side of the
    filter text field. It can be used to clear the filter. On the far right-hand side
    is a kind of spinner control, which gives access to previously entered filter
    strings.


    For each row displaying a class from the heap, there is a context menu with the
    following actions:


    *   **Show in Instances View**. Opens the Instances view if it is closed in an
    editor tab and displays the instances of the selected class.


    *   **Show Only Subclasses**. Enables the subclass filter capability based on
    the selected class.


    *   **Go to Source**. Opens the source for the selected class in an editor tab.
    If the tab is already available, it will be activated and shown.


    Trying to analyze the heap content starts with a good filter for the histogram;
    typically look for your own classes first and figure out what the object graph
    for this instance is. This analysis is done using the *Instances* view.


    ### Instances View


    The *Instances* view is at the heart of the heap analysis (heap walking). The
    major thing shown in this view is a list of the different instances of one class.
    By selecting one instance from the list in the upper-left tree, the other three
    components get updated. The lower-left one shows a value representation of the
    instance, for example, the character sequence for a `String`. The upper right-hand
    side is the structured view of the instance, that is, it allows you to view all
    fields with the values recursively by digging through the tree. The lower right-hand
    side shows where the actual instance is used. This is the reference chain, which
    can be followed up to figure out which object is holding onto your precious instance.
    All these details can be seen in Figure [6-19](#479166_1_En_6_Chapter.xhtml#Fig19).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig19_HTML.jpg](Images/479166_1_En_6_Fig19_HTML.jpg)


    Figure 6-19


    Instances view


    If you want to see details of an instance that is shown as part of the fields
    list, open the context menu and select *Show Instance*. This switches the *Instances*
    view to render the instance list of the same type as the selected instance in
    the fields list and preselects the instance in the instances list. This allows
    for a quick drill into the hierarchy of objects.


    Now that we already know how to deal with threads, memory, and evaluations in
    Apache NetBeans during debugging sessions, we still need to figure out how to
    deal with breakpoints.


    ### Breakpoints


    Breakpoints are a crucial feature for debugging, because they allow to stop the
    debugged process at arbitrary places in the code. Breakpoints in Apache NetBeans
    can be managed and displayed across source files using the *Breakpoints* view.
    Besides viewing breakpoints as an unstructured list, breakpoints can be grouped
    into custom or predefined, for example, by programming language, *Breakpoint Groups*.
    One breakpoint can belong to one custom group and can be moved from one group
    to another if needed. Before we dive deeper into those details, let’s start with
    creating some new breakpoints.


    There are different ways to create a breakpoint in Apache NetBeans:


    *   By toggling a breakpoint in the gutter (the area where the line numbers are
    displayed) will create or delete a *Class Breakpoint*, *Field Breakpoint*, *Line
    Breakpoint*, or *Method Breakpoint*


    *   By using the menu item *New Breakpoint* (⇧-⌘-F8 on Mac or Ctrl+Shift+F8 on
    Windows/Linux) from the *Debug* menu in the main menu, all types of breakpoints
    can be created.


    Creating a new breakpoint using the New Breakpoint action allows a complete configuration
    of a breakpoint at creation time. The first step is the selection of the debugger,
    which in turn changes the list of breakpoint types available. For the *Java* debugger,
    the breakpoint types are the following:


    *   **Class**. Stops the debugged process based on class states.


    *   **Exception**. Stops the debugged process based on exceptions thrown.


    *   **Field**. Stops the debugged process if a field is accessed.


    *   **Line**. Stops the debugged process if special line in a file is reached.


    *   **Method**. Stops the debugged process on method-related states.


    *   **Thread**. Stops the debugged process on thread-related states.


    *   **AWT/Swing Component**. Stops the debugged process on component-related events.


    All breakpoint types allow for additional properties to be configured. They are
    grouped into two categories, *Conditions* and *Actions*, and may differ between
    breakpoint types. The New Breakpoint dialog is shown in Figure [6-20](#479166_1_En_6_Chapter.xhtml#Fig20).


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig20_HTML.jpg](Images/479166_1_En_6_Fig20_HTML.jpg)


    Figure 6-20


    New Breakpoint dialog


    The *Actions* properties describe what happens once a breakpoint is reached. There
    are four different actions associated with every breakpoint type.


    *   **Suspend**. Allows the selection of which threads will be suspended if the
    breakpoint is reached. Possible values are *Breakpoint Thread* (the thread on
    which the breakpoint was reached), *All threads*, or *No thread (continue)*. Selecting
    *No thread* will only print the text under the action *Print Text* but not stop
    any threads. This is helpful if only a list of values at different points is required,
    but no further interaction with the debugged process is needed, for example, in
    a multi-threaded application where stopping threads will change runtime behavior.


    *   **Enable Group**. Enables the selected group of breakpoints once this breakpoint
    is reached. Together with the next action, this enables some kind of automated
    context-based breakpoint control, to reduce the effort to manually enable or disable
    breakpoints in special areas of the code.


    *   **Disable Group**. Disables the selected group of breakpoints once this breakpoint
    is reached. Together with the previous action, this enables some kind of automated
    context-based breakpoint control, to reduce the effort to manually enable or disable
    breakpoints in special areas of the code.


    *   **Print Text**. Prints the configure text to the debugger console, once the
    breakpoint is reached.


    Printing text once a breakpoint is reached uses a special syntax for dynamic information.
    Dynamic information is guarded by `{}`, while everything outside is just plain
    text. The following dynamic syntaxes are supported:'
  trans: '

    ### 已加载类视图


    *已加载类*视图根据每个类的实例数量，以直方图形式显示所有已加载的类。这是分析堆构成的简单起点。该视图将实例数量显示为绝对值以及占所有实例的百分比。默认情况下，表格按绝对实例数量排序，如图
    6-18 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig18_HTML.jpg](img/479166_1_En_6_Fig18_HTML.jpg)


    图 6-18


    已加载类视图


    由于此类堆直方图的特性，类列表可能会非常长。为了能够更好地向下钻取，可以在表格底部定义一个过滤器。可用的过滤器类型如下：


    *   **包含**。显示所有完整限定类名包含过滤字符串的类。

    *   **不包含**。显示所有完整限定类名不包含过滤字符串的类。

    *   **正则表达式**。显示所有完整限定类名与作为正则表达式的过滤字符串匹配的类。

    *   **子类**。显示所有属于所输入类的子类的类。输入的类必须使用完整限定类名。


    一旦过滤器激活，过滤文本字段的右侧会显示一个红色的 **x**。它可以用来清除过滤器。在最右侧是一种旋转控件，用于访问之前输入的过滤字符串。


    对于每一行显示堆中某个类的行，都有一个包含以下操作的上下文菜单：


    *   **在实例视图中显示**。如果实例视图在编辑器标签页中已关闭，则将其打开，并显示所选类的实例。

    *   **仅显示子类**。基于所选类启用子类过滤功能。

    *   **转到源代码**。在编辑器标签页中打开所选类的源代码。如果该标签页已存在，则将其激活并显示。


    分析堆内容的第一步是为直方图设置一个良好的过滤器；通常先查找你自己的类，然后找出该实例的对象图。此分析通过*实例*视图完成。


    ### 实例视图


    *实例*视图是堆分析（堆遍历）的核心。该视图主要显示一个类的不同实例列表。通过从左上角的树形列表中选择一个实例，其他三个组件会随之更新。左下角显示该实例的值表示，例如，一个
    `String` 的字符序列。右上角是实例的结构化视图，即，它允许你通过深入树形结构递归地查看所有字段及其值。右下角显示实际实例被使用的位置。这是引用链，可以顺着它找出哪个对象持有你的宝贵实例。所有这些细节如图
    6-19 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig19_HTML.jpg](img/479166_1_En_6_Fig19_HTML.jpg)


    图 6-19


    实例视图


    如果你想查看作为字段列表一部分显示的某个实例的详细信息，请打开上下文菜单并选择*显示实例*。这会将*实例*视图切换为渲染与字段列表中选定实例相同类型的实例列表，并在实例列表中预选该实例。这允许快速深入对象层次结构。


    既然我们已经知道如何在调试会话期间处理 Apache NetBeans 中的线程、内存和求值，我们还需要弄清楚如何处理断点。


    ### 断点


    断点是调试的关键功能，因为它们允许在代码的任意位置暂停被调试的进程。在 Apache NetBeans 中，可以使用*断点*视图跨源文件管理和显示断点。除了将断点视为非结构化列表外，断点还可以分组到自定义或预定义的组中，例如，按编程语言分组的*断点组*。一个断点可以属于一个自定义组，并且如果需要，可以从一个组移动到另一个组。在我们深入探讨这些细节之前，让我们先创建一些新的断点。


    在 Apache NetBeans 中，有多种创建断点的方法：


    *   通过在装订线（显示行号的区域）中切换断点，可以创建或删除*类断点*、*字段断点*、*行断点*或*方法断点*。

    *   通过使用主菜单中*调试*菜单下的菜单项*新建断点*（Mac 上为 ⇧-⌘-F8，Windows/Linux 上为 Ctrl+Shift+F8），可以创建所有类型的断点。


    使用“新建断点”操作创建新断点可以在创建时对断点进行完整配置。第一步是选择调试器，这反过来会更改可用的断点类型列表。对于 *Java* 调试器，断点类型如下：


    *   **类**。根据类状态暂停被调试的进程。

    *   **异常**。根据抛出的异常暂停被调试的进程。

    *   **字段**。如果访问了某个字段，则暂停被调试的进程。

    *   **行**。如果到达文件中的特定行，则暂停被调试的进程。

    *   **方法**。根据方法相关状态暂停被调试的进程。

    *   **线程**。根据线程相关状态暂停被调试的进程。

    *   **AWT/Swing 组件**。根据组件相关事件暂停被调试的进程。


    所有断点类型都允许配置附加属性。它们分为两类：*条件*和*操作*，并且可能因断点类型而异。“新建断点”对话框如图 6-20 所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig20_HTML.jpg](img/479166_1_En_6_Fig20_HTML.jpg)


    图 6-20


    新建断点对话框


    *操作*属性描述了到达断点时会发生什么。每种断点类型都有四种不同的关联操作。


    *   **挂起**。允许选择到达断点时将挂起哪些线程。可能的值有*断点线程*（到达断点的线程）、*所有线程*或*无线程（继续）*。选择*无线程*将仅打印*打印文本*操作下的文本，但不会停止任何线程。这在只需要不同点的值列表，但不需要与被调试进程进一步交互时很有用，例如，在多线程应用程序中，停止线程会改变运行时行为。

    *   **启用组**。一旦到达此断点，则启用选定的断点组。结合下一个操作，这可以实现某种基于上下文的自动断点控制，以减少在代码特定区域手动启用或禁用断点的工作量。

    *   **禁用组**。一旦到达此断点，则禁用选定的断点组。结合上一个操作，这可以实现某种基于上下文的自动断点控制，以减少在代码特定区域手动启用或禁用断点的工作量。

    *   **打印文本**。一旦到达断点，将配置的文本打印到调试器控制台。


    到达断点时打印文本使用一种特殊的语法来表示动态信息。动态信息由 `{}` 括起来，而外部的所有内容都是纯文本。支持以下动态语法：

    '
- fmt: '`{=<expression>}`。根据到达断点时的上下文，打印表达式求值结果（见上文）。


    `{className}`。打印定义断点的类名。


    `{exceptionClass}`。打印与断点定义相关的异常类名。


    `{exceptionMessage}`。打印与断点定义相关的异常消息。


    `{fieldName}`。打印定义断点的字段的实际名称。


    `{lineNumber}`。打印实际行号。


    `{methodName}`。打印定义断点的方法的实际名称。


    `{threadName}`。打印到达断点的线程名称。


    `{? threadStarted}{}{}`。根据`threadStarted`的状态，打印第一组或第二组中的文本。两组都可以包含动态语法元素。


    并非所有动态元素都适用于所有断点类型，例如`threadStarted`。在*Print Text*操作文本字段中预填了一个示例文本。


    描述调试器在到达断点时停止所考虑约束的*Conditions*，并非对所有断点类型都相同，但大多数断点类型遵循以下两个约束：


    - **Condition**。描述一个表达式（见求值），该表达式必须求值为`true`，调试器才会停止。

    - **Break when hit count is**。描述断点必须被命中多少次，调试器才会停止。


    命中计数有不同的比较器可用：


    - **Equal to**。命中计数必须等于定义的值，调试器才会停止。

    - **Greater than**。命中计数必须大于定义的值，调试器才会停止。

    - **Multiple of**。命中计数必须是定义值的倍数，调试器才会停止。


    完整的通用*Conditions*如图[6-21](#479166_1_En_6_Chapter.xhtml#Fig21)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig21_HTML.jpg](Images/479166_1_En_6_Fig21_HTML.jpg)


    图6-21 通用断点条件


    描述断点类型设置的*Settings*，每种断点类型都不同，因此我们逐一介绍。


    ### 类断点


    *Class Breakpoint*由完全限定的类名以及从类加载器角度观察的类状态定义，调试器会监控该状态：


    - **Class Load**。调试器在类加载时停止。

    - **Class Unload**。调试器在类卸载时停止。

    - **Class Load or Unload**。调试器在类加载和卸载时停止。


    *Class Breakpoint*的*Settings*配置如图[6-22](#479166_1_En_6_Chapter.xhtml#Fig22)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig22_HTML.jpg](Images/479166_1_En_6_Fig22_HTML.jpg)


    图6-22 类断点设置


    ### 异常断点


    *Exception Breakpoint*在抛出异常时停止。它由完全限定的异常类名以及调试器观察到的异常状态定义：


    - **Caught**。仅在异常被捕获时停止。

    - **Uncaught**。仅在异常未被捕获时停止。

    - **Caught or Uncaught**。在两种情况下都停止。


    *Exception Breakpoint*的*Settings*配置如图[6-23](#479166_1_En_6_Chapter.xhtml#Fig23)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig23_HTML.jpg](Images/479166_1_En_6_Fig23_HTML.jpg)


    图6-23 异常断点设置


    由于配置*Exception Breakpoint*断点行为的更有趣情况并非由异常类定义，因此此类异常的*Conditions*有一个额外的自定义选项：


    - **Filter on Classes throwing the Exception**。将断点限制为抛出指定异常的特定类。*Match Classes*和*Exclude
    Classes*的类名必须指定为完全限定名，但可以在末尾使用星号作为通配符。多个模式可以用逗号分隔指定。


    *Thread Breakpoint*的*Conditions*配置如图[6-24](#479166_1_En_6_Chapter.xhtml#Fig24)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig24_HTML.jpg](Images/479166_1_En_6_Fig24_HTML.jpg)


    图6-24 异常断点条件


    ### 字段断点


    *Field Breakpoint*在访问已定义类的字段时停止调试进程。它由完全限定的类名和相应的字段名定义，并选择调试器在哪些访问情况下停止：


    - **Field Access**。在访问字段时停止，例如读取访问。

    - **Field Modification**。在写入字段时停止。

    - **Field Access or Modification**。在访问或写入字段时停止。


    *Field Breakpoint*的*Settings*配置如图[6-25](#479166_1_En_6_Chapter.xhtml#Fig25)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig25_HTML.jpg](Images/479166_1_En_6_Fig25_HTML.jpg)


    图6-25 字段断点设置


    ### 行断点


    *Line Breakpoint*由源代码文件中的一行定义，该行指向可执行的代码行，即不是类、方法或字段声明。源代码文件以绝对路径引用。


    *Line Breakpoint*的*Settings*配置如图[6-26](#479166_1_En_6_Chapter.xhtml#Fig26)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig26_HTML.jpg](Images/479166_1_En_6_Fig26_HTML.jpg)


    图6-26 行断点设置


    ### 方法断点


    *Method Breakpoint*由完全限定的类名和方法规范定义，可以是具体的方法名，也可以是已定义类的所有方法。此外，还需要指定何时停止：


    - **Method Entry**。在进入方法前停止。

    - **Method Exit**。在退出方法前停止。

    - **Method Entry and Exit**。在进入和退出方法前停止。


    *Method Breakpoint*的*Settings*配置如图[6-27](#479166_1_En_6_Chapter.xhtml#Fig27)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig27_HTML.jpg](Images/479166_1_En_6_Fig27_HTML.jpg)


    图6-27 方法断点设置


    ### 线程断点


    由于*Thread Breakpoint*的性质，可用的配置选项有限。可以定义何时停止：


    - **Thread Start**。在新线程启动时停止。

    - **Thread Death**。在线程死亡时停止。

    - **Thread Start or Death**。在新线程启动和线程死亡时停止。


    *Thread Breakpoint*的*Settings*配置如图[6-28](#479166_1_En_6_Chapter.xhtml#Fig28)所示。


    ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig28_HTML.jpg](Images/479166_1_En_6_Fig28_HTML.jpg)


    图6-28 线程断点设置


    唯一可用于*Thread Breakpoint*的条件是命中计数。如果使用此选项，则仅会在每次命中计数创建和/或线程死亡时停止调试器。*Thread Breakpoint*的*Conditions*配置如图[6-29](#479166_1_En_6_Chapter.xhtml#Fig29)所示。


