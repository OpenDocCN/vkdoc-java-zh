    #### 属性


    *属性*窗口分为三个类别：


    *   **属性**选项卡（见图 4-10）：在此部分可编辑所选组件的可编辑属性。属性通常按以下分组进行组织：*属性*、*其他属性*、*布局*和*辅助功能*。


    *   **事件**选项卡（见图 4-11）：允许定义当某些事件（例如，鼠标点击、按键按下等）被触发时，在组件上执行哪些操作。例如，要为一个按钮定义 `actionPerformed()`，请点击
    `actionPerformed` 事件旁边的下拉菜单（一个黑色小向下箭头）；此时会弹出一个窗口，为事件处理程序建议一个名称。该名称由正在编辑的控件名称和事件名称组成。选择事件处理程序的名称后，NetBeans
    会自动打开*源代码*窗口，并将光标置于准备输入事件处理程序代码的位置。你会注意到源代码编辑器包含一些无法编辑的区域。这是必要的，因为这些代码是由 GUI 构建器自动生成的，手动更改这些代码可能会破坏代码与
    GUI 设计器之间的绑定。最后，点击 GUI 设计器中的 **…** 按钮，可以添加、删除或重命名事件处理程序。


    *   **代码**选项卡（见图 4-12）：允许为组件提供自定义代码片段，例如，任何初始化前/初始化后的代码等。


    ### 注意


    旧版本的 NetBeans（在捐赠给 Apache 之前）还有一个*绑定*选项卡。不幸的是，由于许可问题以及 JSR 295 ([`https://jcp.org/en/jsr/detail?id=295`](https://jcp.org/en/jsr/detail%253Fid%253D295))
    尚未成为正式标准，该选项卡已从 Apache NetBeans 中移除。有关更多信息，请查看此 JIRA 条目 ([`https://issues.apache.org/jira/browse/NETBEANS-530`](https://issues.apache.org/jira/browse/NETBEANS-530))。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig10_HTML.jpg](img/479166_1_En_4_Fig10_HTML.jpg)


    图 4-10


    属性窗口


    你可以通过以下三种方式之一修改属性：


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig12_HTML.jpg](img/479166_1_En_4_Fig12_HTML.jpg)


    图 4-12


    自定义代码


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig11_HTML.jpg](img/479166_1_En_4_Fig11_HTML.jpg)


    图 4-11


    事件


    *   直接编辑其值，

    *   使用下拉菜单（如果存在），

    *   使用自定义编辑器（通过 … 按钮）。


    #### 连接工具


    Apache NetBeans 提供了一种简便的方法来建立组件之间的连接，即使用*连接模式*按钮（见图 4-7）。点击该按钮后，NetBeans 会显示一条消息，要求选择将生成事件的组件：


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Figa_HTML.jpg](img/479166_1_En_4_Figa_HTML.jpg)


    选择源组件后，NetBeans 会显示一条消息，要求选择将接收事件的组件：


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Figb_HTML.jpg](img/479166_1_En_4_Figb_HTML.jpg)


    选择接收事件的组件后，NetBeans 将显示图 4-13 的*连接向导*窗口。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig13_HTML.jpg](img/479166_1_En_4_Fig13_HTML.jpg)


    图 4-13


    连接向导步骤 1


    选择源事件，点击**下一步**，并指定目标操作（见图 4-14）。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig14_HTML.jpg](img/479166_1_En_4_Fig14_HTML.jpg)


    图 4-14


    连接向导步骤 2


    在下一步中，你需要输入目标将如何被修改（见图 4-15）。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig15_HTML.jpg](img/479166_1_En_4_Fig15_HTML.jpg)


    图 4-15


    连接向导步骤 3


    要查看演示 Swing 窗体的示例项目，请创建一个新项目（菜单 **文件 ➤ 新建项目**），选择 *Samples/Java* 类别和 *GUI Form
    Examples* 文件类型。生成的项目包含三个 Swing 窗体示例（`Antenna`、`ContactEditor` 和 `Find`），这些示例能让你了解
    Apache NetBeans IDE 在设计 GUI 方面提供的一些功能。同一类别下的 *Anagram Game* 是另一个示例。


    ### JavaFX 支持


    Apache NetBeans 允许你通过点击 **文件 ➤ 新建项目** 菜单项来创建 JavaFX 项目。你可以创建基于 Ant 或基于 Maven 的
    JavaFX 项目。选择 **Java with Ant ➤ JavaFX** 类别，然后选择其中一个可用的 JavaFX 项目，如图 4-16 所示。或者选择
    **Java with Maven** 类别，然后选择 **JavaFX Application** 项目。在第一种情况下，你可以创建一个 JavaFX 应用程序，使用
    Java 代码开发 GUI，或者使用 FXML 文件来编写应用程序的 GUI 控件脚本。你还可以创建一个混合了 Swing 和 JavaFX 组件的应用程序。


    创建 JavaFX 应用程序后，你可以使用 **文件 ➤ 新建文件** 向导添加额外的 FXML 文件的 JavaFX 类，如图 4-17 所示。


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig17_HTML.jpg](img/479166_1_En_4_Fig17_HTML.jpg)


    图 4-17


    JavaFX 文件类型


    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig16_HTML.jpg](img/479166_1_En_4_Fig16_HTML.jpg)


    图 4-16


    JavaFX 项目类型


    Apache NetBeans 没有为 JavaFX 应用程序提供像 Swing 的 Matisse GUI 构建器那样的 GUI 设计器。不过，可以将 *SceneBuilder*
    与 NetBeans 集成。*SceneBuilder*（见图 4-18）允许你以图形方式构建 JavaFX 应用程序。Oracle 已停止对 SceneBuilder
    的支持，其最新版本为 2.0 ([`http://www.oracle.com/technetwork/java/javase/downloads/javafxscenebuilder-info-2157684.html`](http://www.oracle.com/technetwork/java/javase/downloads/javafxscenebuilder-info-2157684.html))。*Gluon*
    ([`https://gluonhq.com/products/scene-builder/`](https://gluonhq.com/products/scene-builder/))
    已接管了 *SceneBuilder* 的支持和开发工作。我们稍后将介绍如何设置 Apache NetBeans 以使用 *SceneBuilder*。


    Sven Reimer 的 *Monet* ([`http://plugins.netbeans.org/plugin/55434/monet-the-javafx-scene-builder-integration`](http://plugins.netbeans.org/plugin/55434/monet-the-javafx-scene-builder-integration))
    插件尝试在 NetBeans 内部运行 *SceneBuilder*，以构建 JavaFX 应用程序的 GUI，其方式与你使用 Matisse 构建 Swing
    应用程序的 GUI 相同。


    从前面提到的网站下载并安装 Oracle 的或（最好）Gluon 的 *SceneBuilder*，使用适合你平台的安装程序。要将 *SceneBuilder*
    与 NetBeans 集成，请按照以下步骤操作：


    1.  在 Apache NetBeans 中，导航到 **工具 ➤ 选项 ➤ Java ➤ JavaFX**（Windows/Linux）或 **NetBeans
    ➤ 偏好设置 ➤ Java ➤ JavaFX**（MacOSX），如果 JavaFX 支持尚未激活，请点击**激活**。


    2.  激活完成后，将 *Scene Builder Home* 设置为 Gluon 目录（例如，在 MacOS 中，这是 `/Applications/SceneBuilder.app`
    的路径）。某些 Windows 安装程序在安装 *SceneBuilder* 时不会询问目录。*SceneBuilder* 可以在 `C:\Users\<用户>\AppData\Local\SceneBuilder`
    或 `C:\Program Files\SceneBuilder` 中找到。


    3.  点击**确定**，即可开始使用。

