    ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig4_HTML.jpg](Images/479166_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Swing GUI Forms


    *   **JDialog Form**: creates a new `javax.swing.JDialog` within an application.
