    \ `JButton` 和 `JMenuItem` 的构造函数。\n\n一个动作由显示名称或工具提示、图标以及可选的快捷键来标识。动作也有状态（按下/未按下）。在\
    \ Swing 中，您需要使用图标、工具提示等来配置您的 `JButton`、`JMenuItem` 和 `JPopupMenu`。\n\nNetBeans\
    \ 平台的*动作系统*让您摆脱所有这些麻烦；它提供了一个可配置的 UI，使您能够只专注于业务逻辑，同时还提供了根据选择上下文动态启用和禁用动作以及自定义行为的方法。将\
    \ `Action` 的表示与其实现分离是一个良好的设计决策，NetBeans 通过使用*注解*进行表示，并使用 Swing 的 `ActionListener`\
    \ 接口进行实现（只需实现一次）来实现这一点。\n\n*注解*用于在菜单或工具栏中注册动作，并指定动作的显示名称、图标和快捷键序列。开发人员唯一需要完成的是\
    \ `ActionListener` 的 `actionPerformed()` 方法实现，即动作的业务逻辑。使用 `ActionListener` 也简化了将\
    \ Java Swing 应用程序移植到 NetBeans 平台的过程。此外，**新建动作**向导允许您在向导中配置各种注解，从而简化了开发人员的工作。该向导执行以下操作：\n\
    \n*   在 `layer.xml` 中注册一个动作（位于 `Actions` 文件夹下）\n\n*   创建资源包条目（例如 `CTL_MyAction`）\n\
    \n*   注册图标\n\n*   注册键绑定\n\n*   创建默认实现\n\n动作在中央注册表（`layer.xml`）中注册。只会生成一个实例。它们可以在不同的上下文中重用（例如，菜单栏和工具栏）。可以从不同的模块访问它们。由于所有动作都以相同的方式注册，因此用户可以像我们在上一章中看到的那样配置菜单和工具栏。\n\
    \n由**新建动作**向导生成的 `Action` 示例如清单 8-19 所示。\n\n```\n@ActionID(\ncategory = \"Edit\"\
    ,\nid = \"todo.controller.edit.AddTaskAction\"\n)\n@ActionRegistration(\niconBase\
    \ = \"todo/controller/edit/add_obj.gif\",\ndisplayName = \"#CTL_AddTaskAction\"\
    \n)\n@ActionReferences({\n@ActionReference(path = \"Menu/Edit\", position = 10),\n\
    @ActionReference(path = \"Toolbars/Edit\", position = 10),\n@ActionReference(path\
    \ = \"Shortcuts\", name = \"INSERT\")\n})\n@Messages(\"CTL_AddTaskAction=添加任务...\"\
    )\npublic final class AddTaskAction implements ActionListener {\n@Override\npublic\
    \ void actionPerformed(ActionEvent e) {\n// TODO 实现动作主体\n}\n}\n清单 8-19\n由新建动作向导生成的示例动作\n"
