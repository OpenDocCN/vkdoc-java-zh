    总结

    在本章中，我们通过开发 *TodoRCP*、*TodoFXRCP* 和 *TodoHTMLJava* 模块套件应用，应用了上一章学到的知识。它们都使用相同的模型，而
    *视图* 则分别通过使用 *Explorer & Properties Sheets*、*JavaFX* 和 *HTML/Java UI* 来实现。

    在下一章中，我们将看到一些在开发富客户端平台应用时可能会用到的额外 API。


    脚注


    10. 学习平台扩展功能


    在本章中，我们将学习 NetBeans RCP 提供的一些可能对你的应用有用的额外功能：


    *   **对话框** API，包括**向导** API

    *   **可视化库**和**面板**

    *   **状态栏**和**通知**

    *   如何使用**进度条**

    *   **快速搜索**和**输出**窗口

    *   如何在**选项**窗口中定义和持久化你的应用设置

    *   如何品牌化和分发你的应用


    让我们开始吧。


    对话框 API

    *对话框 API* 类似于 `javax.swing.JOptionPane`，它让你能够以简单的方式创建和显示对话框及向导。你可以显示预定义的对话框、自定义对话框以及多步骤向导。

    显示一个对话框需要两个步骤：创建一个 `NotifyDescriptor` 来配置对话框，以及一个 `DialogDisplayer` 来显示它。在使用之前，请添加对
    *对话框 API* 模块的依赖。


    预定义对话框


    NetBeans 包含各种用于常见场景（例如向用户显示消息）的预定义对话框。代码清单 10-1 调用了一个显示消息并带有**确定**按钮的对话框。


    ```

    NotifyDescriptor d = new NotifyDescriptor.Message("Message");

    DialogDisplayer.getDefault().notify(d);

    代码清单 10-1

    使用对话框 API 显示消息对话框

    ```


