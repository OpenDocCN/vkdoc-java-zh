    Our *Todo* prototype application is now complete, ready to be shown to your customers
    to get useful feedback before you begin implementing it.


    As a final step, you can ask Matisse to automatically internationalize the application’s
    UI. This means that for each resource that would normally be internationalized
    by hand, Matisse automatically adds the value supplied in the UI designer to a
    resource bundle. This is done for all UI elements. The visual localization feature
    works in harmony with automatic internationalization. Just right-click the root
    form node (`TasksWindow`) in the *Navigator* window, locate the **Design Locale**
    combo box in the *Properties* window (see Figure [4-31](#479166_1_En_4_Chapter.xhtml#Fig31)),
    and then select a locale or add a new one (see Figure [4-32](#479166_1_En_4_Chapter.xhtml#Fig32)).
    Check the **Automatic Internationalization** check box in the *Properties* window,
    too. Once the **Design Locale** is selected, you can now simply edit the text
    in the UI as if normally editing a form. The localization for the *Design Locale*
    takes place automatically with the values entered into the UI. The locale can
    be changed and the form reedited to set the values for the newly selected locale.
    It is as simple as it sounds to create a fully internationalized UI with Apache
    NetBeans (see Figure [4-33](#479166_1_En_4_Chapter.xhtml#Fig33)) to satisfy your
    customers throughout the globe.


