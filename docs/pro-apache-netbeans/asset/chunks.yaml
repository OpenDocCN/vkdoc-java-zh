    ## 文件系统 API


    NetBeans 平台文件系统 API 为标准文件提供了一种抽象。*文件系统 API* 处理物理文件系统以及 NetBeans 虚拟文件系统（例如，它们可能驻留在内存、JAR、ZIP、XML
    文件，甚至远程服务器上）中的文件和文件夹（你可以将它们视为*资源*）。


    一个 `FileSystem` 是 `FileObject` 的集合，这些 `FileObject` 可以位于任何位置。`FileSystem` 是分层的，并且有一个*根*。`FileObject`
    代表 `FileSystem` 中的一个文件或目录（文件夹）；它必须在 `FileSystem` 中物理存在（不同于 Java 的 `java.io.File`），并且具有*MIME
    类型*，该类型决定了文件如何处理。`FileObject` 是*组合*设计模式的一种实现，也就是说，它可以包含其他 `FileObject`（文件或子目录）。`FileObject`
    还支持属性（这些属性是键值对，类型为 `String`）。


    你可以使用 `FileChangeListener` 接口监听 `FileObject` 的更改（例如文件/文件夹的创建、重命名、修改、删除或属性更改）。最后，`FileUtil`
    是一个实用工具类，包含许多操作 `FileSystem`、`FileObject` 甚至标准 `java.io.File` 对象的方法。


    以上内容的总结以图形方式在图 7-5 中进行了描绘。


    ![../images/479166_1_En_7_Chapter/479166_1_En_7_Fig5_HTML.jpg](img/479166_1_En_7_Fig5_HTML.jpg)


