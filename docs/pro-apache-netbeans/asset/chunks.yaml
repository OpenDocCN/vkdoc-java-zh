    1.  选择 *Java with Maven* 类别以显示可用的项目模板（参见图 2-20）。对于当前示例，选择 *Java Application*，然后单击**下一步**。


    2.  在下一步（参见图 2-21）中，您可以提供*项目名称*和*位置*，以及 Maven 坐标（*groupid*、*version* 和 *package*）。完成后，单击**完成**。


    新项目将使用 Maven 的配置文件 `pom.xml` 创建。图 2-22 中的导航器窗口显示了*目标*（每组预定义的命令）。


