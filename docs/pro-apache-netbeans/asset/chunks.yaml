- fmt: '# Nodes


    You are probably aware of the MVC (or Model-View-Controller) design pattern, where
    the View doesn’t communicate directly with the Model but only via the Controller.
    This has the advantage that you can use the same data displayed by different views
    without strongly coupling the views to the model.


    Swing has tried to implement this pattern by providing model classes for each
    of the presentation classes. For example, `JList` is backed up by `ListModel`,
    `JTree` by `TreeModel`, and `JTable` by `TableModel`, etc. If you wish to display
    the same data by a `JTree` and a `JTable`, you must create two different view
    models, that is, a `TreeModel` and a `TableModel` to present the same data in
    order to be rendered correctly by the respective views, which is not very convenient.


    NetBeans RCP solves this problem by providing the `Node` class. A `Node` is the
    visual representation of a particular piece of data — a `Task`, for example. Nodes
    are a presentation layer between data and the UI classes. When you select a row
    on a table, you are actually selecting a `Node` instance. Rather than subclassing
    a different model class for each GUI component, as is done for Swing, simply subclass
    the `Node` class and seamlessly display the data across multiple different GUI
    components simultaneously.


    A `Node` contains what is common data representation, like a display name, an
    icon, actions on the node, children nodes (for tree-like structures), and even
    properties (to be displayed in the Properties Sheet). Nodes also implement the
    `Lookup.Provider` interface; hence they can enable/disable actions based on the
    instances they add in their lookup (called historically *cookies*).


    The *Node API* provides several nodes that are shown in Figure [8-3](#479166_1_En_8_Chapter.xhtml#Fig3),
    each one with a different purpose.


    ![../images/479166_1_En_8_Chapter/479166_1_En_8_Fig3_HTML.jpg](Images/479166_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Node class hierarchy


    `Node` is an abstract class, while `AbstractNode` is not! `BeanNode` uses reflection
    to retrieve the properties of a JavaBean and expose them as Node properties to
    be displayed in a Properties sheet. It also retrieves the name and the icon if
    these are available in its `BeanInfo`. Use a `DataNode` if you wish to display
    files. `IndexedNode` allows reordering of its children. Finally, `FilterNode`
    is a decorator for another node, and as its name suggests, it can filter specific
    nodes by applying a filter.


    Listing [8-3](#479166_1_En_8_Chapter.xhtml#PC3) shows an example implementation
    of a `BeanNode`.


    ```

    package todo.view;

    import java.beans.IntrospectionException;

    import org.openide.nodes.BeanNode;

    import todo.model.Task;

    class TaskNode extends BeanNode {

    public TaskNode(Task bean) throws IntrospectionException {

    super(bean);

    }

    }

    Listing 8-3

    A BeanNode implementation

    ```


    Listing [8-3](#479166_1_En_8_Chapter.xhtml#PC3) creates a single Node that usually
    plays the role of a root node. Nodes usually contain child nodes, in a number
    of levels deep that could be infinite. If you need to display them in a tree,
    then you can create any number of subnodes; in a table though, only a flat list
    of subnodes (or leaf nodes) is needed.


    Subnodes are represented by `org.openide.nodes.Children` object that creates child
    Nodes on demand. `Children` nodes are created by a `ChildFactory`, as shown in
    the example of Listing [8-4](#479166_1_En_8_Chapter.xhtml#PC4).


    ```

    package todo.view;

    import java.beans.IntrospectionException;

    import java.util.List;

    import org.openide.nodes.ChildFactory;

    import org.openide.nodes.Node;

    import org.openide.util.Exceptions;

    import org.openide.util.Lookup;

    import todo.model.Task;

    import todo.model.TaskManagerInterface;

    class TaskChildFactory extends ChildFactory {

    @Override

    protected boolean createKeys(final List toPopulate) {

    final TaskManagerInterface taskManager =

    Lookup.getDefault().lookup(TaskManagerInterface.class);

    toPopulate.addAll(taskManager.listAllTasks(true));

    return true;

    }

    @Override

    protected Node createNodeForKey(final Task key) {

    TaskNode taskNode = null;

    try {

    taskNode = new TaskNode(key);

    } catch (IntrospectionException ex) {

    Exceptions.printStackTrace(ex);

    }

    return taskNode;

    }

    }

    Listing 8-4

    A ChildFactory implementation

    ```


    When `TaskChildFactory` is initialized, the `createKeys()` method is automatically
    called. Once `true` is returned in `createKeys()`, the method `createNodeForKey()`
    is automatically called. As the API mentions, return `true` if the list of keys
    has been completely populated, `false` if the list has only been partially populated;
    and this method should be called again to batch more keys (which is most of the
    times unnecessary, so always return `true`).


    A typical use of the above factory is:


    ```

    Children tasks = Children.create(new TaskChildFactory(), true);

    ```


    `true` here means that the `ChildFactory` will create the list of keys in a background
    thread, which happens, for example, when the user tries to expand a `Node`.


    ## Lookup


    As already mentioned, `Node`s implement the `Lookup.Provider` interface. How can
    one add something to a `Node`’s lookup? Listing [8-5](#479166_1_En_8_Chapter.xhtml#PC6)
    shows how to add a `Task` object to the `TaskNode''s` lookup.


    ```

    class TaskNode extends BeanNode {

    public TaskNode(Task bean) throws IntrospectionException {

    super(bean, Children.LEAF, Lookups.singleton(bean));

    }

    }

    Listing 8-5

    Add a Task to the TaskNode’s lookup

    ```


    The singleton lookup contains only one object, which in this case is the task
    associated to the node. Now, as we shall see, when you select one or more nodes,
    the conditionally enabled actions that listen for `Task`s in the global lookup
    are enabled accordingly. How this is done is explained in the next section.


    ## Actions


    A user can right-click on a node to display a pop-up menu with a number of menu
    items or actions to perform on the node. You can override these actions by overriding
    the respective method of the `Node` class as shown in Listing [8-6](#479166_1_En_8_Chapter.xhtml#PC7).


    ```

    @Override

    public Action[] getActions(boolean context) {

    List taskActions = Utilities.actionsForPath("Actions/Task");

    return taskActions.toArray(new Action[taskActions.size()]);

    }

    @Override

    public Action getPreferredAction() {

    return Actions.forID("Task","todo.controller.EditTaskAction");

    }

    Listing 8-6

    Actions on a Node

    ```


    Similarly, the `getPreferredAction()` provides a single `Action` that is invoked
    when the user double-clicks on a `Node`. It is a good practice to define your
    actions in the *System FileSystem* so that other classes or modules can reuse
    them.'
