  trans: '

    #### 开发独立的 Apache NetBeans 模块


    在许多情况下，开发者希望为 Apache NetBeans 环境构建扩展。社区开发者已经创建了数十个有用的 NetBeans 模块。此类模块扩展了 IDE，以集成新的和/或增强的功能。扩展可以封装几乎任何功能。例如，模块可用于为
    IDE 添加新的语言支持，或扩展现有功能（如添加增强的 Git 支持）。无论是什么，使用项目模板都很容易开发 Apache NetBeans 模块。


    要开始，请选择“NetBeans 模块” ➤ “模块”项目类型。选择后，新模块可以创建为“独立”模块，也可以添加到“模块套件”中。在下一个面板上，必须指定“代码名称基础”。“代码名称基础”与基础包名称非常相似（图
    1-21）。还可以指定包本地化包，以及选择将模块生成为 OSGI 模块。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig21_HTML.jpg](img/479166_1_En_1_Fig21_HTML.jpg)


    图 1-21


    新建模块向导


    项目结构与 Java SE 项目非常相似，尽管会生成许多特定于模块的配置文件（图 1-22）。


    ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig22_HTML.jpg](img/479166_1_En_1_Fig22_HTML.jpg)


    图 1-22


    NetBeans 模块结构


    该模块将创建一个 NBM 文件，该文件稍后可以作为扩展添加到 NetBeans IDE 中。该模块也可以作为 NetBeans 插件部署以进行分发。


    #### 开发基于 NetBeans 平台的应用程序


    NetBeans 平台允许开发者利用一个骨架框架来构建丰富的客户端应用程序，该框架免费提供了许多底层功能。该平台允许以从头开发所需时间的一小部分来开发 Java
    Swing 应用程序。该平台包括诸如状态保存和生命周期管理、标准化的 UI 工具包、窗口系统等功能；所有这些功能都可以开箱即用地轻松实现。


    在 NetBeans 平台上开发时，IDE 允许轻松调试模块或平台应用程序。因此，这使得快速创建使用标准架构的稳定用户界面变得容易。由于该平台开箱即用地提供了许多基本的客户端应用程序
    API，您可以确信所有标准的 NetBeans 平台应用程序都以一致的方式运行。


    ### Apache NetBeans 社区


    Apache NetBeans 拥有一个充满活力的社区，包含多个在线资源、频繁的会议演讲和会议，以及丰富的文档和教程历史。Apache NetBeans 社区自
    2000 年代初就已存在，多年来已从一个小的核心群体发展壮大为整个开源社区。


    #### 邮件列表和 NetCAT


    成为 Apache NetBeans 社区一员的最基本且信息量最大的方式之一是加入邮件列表。这些列表经常用于发布问题和讨论 IDE 的新旧功能。这些列表对于了解开源社区如何运作也很有用，因为列表上总有经验丰富的专家随时准备提供帮助。要加入
    Apache NetBeans 邮件列表，请访问以下网页：


    [`​netbeans.​apache.​org/​community/​mailing-lists.​html`](https://netbeans.apache.org/community/mailing-lists.html)


    在 Apache NetBeans 发布之前，必须对即将发布的版本进行测试以确保其功能完整。Apache NetBeans 测试的阶段之一是 NetCAT
    计划。NetCAT 是一个测试者社区，每个测试者被分配测试 IDE 的不同部分。IDE 功能被分成不同的 NetCAT 组织小组。每个小组定期在线开会以制定测试计划，每个测试者使用在线表单完成测试用例。成为
    NetCAT 测试者可以让您更深入地了解 Apache NetBeans IDE，并通过帮助消除问题来回馈社区。使用上面提到的 Apache NetBeans
    邮件列表链接了解更多关于加入 NetCAT 的信息。


    #### 解决问题


    为 Apache NetBeans 生态系统做出贡献的最重要方式之一是在 Apache NetBeans JIRA（问题跟踪器）上找到一个问题并修复它。这很容易做到，只需创建
    Apache NetBeans GitHub 仓库的一个分支，然后在分支中进行必要的代码更新以修复问题。一旦问题被修复，可以通过提交拉取请求将分支中的更改添加回
    Apache NetBeans GitHub 仓库。要了解更多关于为 Apache NetBeans 贡献代码的信息，请参考第 14 章和第 15 章。


    # 2. NetBeans 入门


    当您想要快速开发应用程序时，可以使用 *Apache NetBeans IDE* 来简化您的任务。在本章中，您将了解编辑器的布局以及一些技巧，这些技巧将帮助您更好地控制代码并加快开发速度。


    ## 默认布局和用途


    IDE 中的每个窗口都以其所在窗格或位置中的选项卡形式出现。此外，IDE 的窗口系统允许您通过拖放操作将窗口排列到图 2-1 布局中所示的任何窗口位置。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig1_HTML.jpg](img/479166_1_En_2_Fig1_HTML.jpg)


    图 2-1


    Apache NetBeans 默认布局窗口位置


    以下各节将介绍您在图 2-1 中每个位置会看到的一些特定窗口。例如，*资源管理器窗口位置* 可以显示项目、文件或服务，具体取决于您在特定时间所做操作的上下文。


    ### 资源管理器窗口


    所有提供对用户对象访问的窗口都使用资源管理器窗口位置。这些窗口包括项目窗口、文件窗口、服务窗口和任务窗口。


    #### 项目窗口


    *项目窗口*（**Ctrl+1** 或 **Cmd+1**）显示项目源文件。它显示一个或多个项目的逻辑视图。每个项目或视图由一个节点表示，并根据项目类型具有特定的图标（例如，Java
    应用程序节点的显示方式与 JavaFX 应用程序节点不同），如图 2-2 所示。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig2_HTML.jpg](img/479166_1_En_2_Fig2_HTML.jpg)


    图 2-2


    包含不同类型项目的项目窗口


    右键单击每个节点会弹出一个菜单，列出您可以在该节点上运行的命令。弹出菜单提供编译、构建、运行等项目命令。您也可以通过选择项目并按 *F6* 快捷键来执行 Java
    项目的主文件。


    #### 文件窗口


    *文件窗口*（**Ctrl+2** 或 **Cmd+2**）显示项目的基于目录的视图，包括项目窗口中未显示的文件和文件夹。右键单击每个节点会弹出一个菜单，其中包含创建新文件或目录的命令，以及复制、剪切和粘贴操作。图
    2-3 显示了一个项目结构的示例。


    ![../images/479166_1_En_2_Chapter/479166_1_En_2_Fig3_HTML.jpg](img/479166_1_En_2_Fig3_HTML.jpg)


    图 2-3


    文件窗口中项目的基于目录的结构

