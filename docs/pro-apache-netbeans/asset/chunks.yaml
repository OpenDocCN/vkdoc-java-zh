- fmt: '# Writing a Plugin for NetBeans


    Apache NetBeans is a modular IDE, and therefore, it is very extensible. Not only
    is it easy to extend the IDE, but it is also very easy to develop entire desktop
    rich applications utilizing the NetBeans Platform. In this chapter, we will discuss
    how to build modules a.k.a. “Plugins” so that the IDE can be extended to encompass
    new functionality. For instance, new programming languages are being created all
    the time, and it is easy to extend Apache NetBeans to support new languages by
    developing a new plugin.


    Modules are typically added to the IDE as plugins. In Apache NetBeans, the Plugins
    menu allows one to manage the modules that are available, installed, or downloaded
    to the machine, such that they can be loaded or unloaded to affect the way that
    Apache NetBeans appears or functions. There is an online portal ([`https://netbeans.apache.org/plugins/index.html`](https://netbeans.apache.org/plugins/index.html))
    containing plugins that have been developed by the community. One can visit the
    portal to search available plugins for download. If you develop a plugin, you
    can make it available on the plugin portal for all to use.


    In this chapter we will walk through a tutorial about creating a plugin for NetBeans.
    We will focus on a blockchain use case. See the source code repository of the
    book as a reference.


    ## Purpose of the Plugin


    We are going to create a NetBeans plugin for a blockchain implementation. Apart
    from support to set up a new blockchain project from scratch, you will also learn
    how to create features to support a new language:


    * recognize the model file

    * syntax highlighting

    * error detection

    * code completion

    * navigation view of the model file


    You will also see how to sign and share the plugin with other users of NetBeans.


    ## Introduction to Blockchain


    A blockchain is a decentralized peer-to-peer network. Each participant of this
    network has a copy of a shared ledger, where data can only be appended by digitally
    signed transactions. The blockchain guarantees the immutability of the ledger.


    A block contains an amount of transactions and some metadata. The transactions
    and the block are unique, identified by a hash. The block also contains a hash
    of the chronological previous block. The first block in the chain, which has no
    predecessor, is called Genesis-Block. Together those blocks build the chain. Figure
    [11-1](#479166_1_En_11_Chapter.xhtml#Fig1) shows two blocks with their hashes
    and the hash of the previous block.


    ![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig1_HTML.jpg](Images/479166_1_En_11_Fig1_HTML.jpg)


    **Figure 11-1** How blocks are connected in the blockchain


    A blockchain can be distinguished between *public* and *private*. A typical example
    of a public blockchain is *Ethereum*. A public blockchain has built in mechanisms,
    *Proof of Work* or *Proof of Stake*, to prevent fraudulent actions. An example
    of a private blockchain is *Hyperledger*. This open source project is an effort
    to advance blockchain technologies, hosted by the Linux Foundation. The term private
    means that the access to the network is restricted. Every node has to authenticate
    itself, so there is no need to have the abovementioned mechanisms against fraudulent
    attacks and the sensitive information stays within the network. Check out the
    website [`www.hyperledger.org`](http://www.hyperledger.org) if you would like
    to dive deeper into Hyperledger.


    When the authors started to write this book, the recommended way to set up a new
    *Hyperledger* project was to use the *Composer:* [`https://hyperledger.github.io/composer/latest/`](https://hyperledger.github.io/composer/latest/).
    A Hyperledger project contains a model file, which is written in the *Hyperledger
    Composer Language*. Those files end with a `cto` suffix, and we will refer to
    them as `cto` files in this chapter. The language defines resources, which are
    used in the business network:


    * **asset:** represents a valuable object, for instance, a house;'
