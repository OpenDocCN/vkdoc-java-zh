  ```\n\n您在此面板中设置的任何内容都会借助 `org.openide.util.NbPreferences` 类持久化（存储）到 NetBeans Platform\
  \ 用户目录中，以便下次打开应用程序时可用。您可以通过显示*关于*对话框（从 **帮助 ➤ 关于** 或 **NetBeans ➤ 关于 NetBeans**（在\
  \ MacOS 中））并查看*用户目录*条目（见图 10-16）来轻松定位 NetBeans Platform 用户目录。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig16_HTML.jpg](img/479166_1_En_10_Fig16_HTML.jpg)\n\
  \n图 10-16\n关于 NetBeans 对话框\n\n进度\n通常情况下，在处理大量数据时，其计算和显示可能会花费用户一些明显的时间。例如，从文件系统或数据库检索数据，顺利时也可能需要几秒钟。根据良好的*用户体验*原则，应该向用户提供一些关于长时间任务进度的视觉反馈。\n\
  例如，在*事件分发线程 (EDT)* 中同步创建子元素的 `Node` 展开操作会冻结 UI。在此期间，不会执行任何 UI 更新，用户手势也会被忽略，导致 UI\
  \ 在整个过程中无法使用。这就是为什么创建子元素要在不同的线程中完成。同时，您应该通知用户子元素正在创建并即将显示。在此期间，通常会显示一个等待光标和一条状态消息。\n\
  在第 8 章中，我们了解了 `ChildFactory` 类如何支持异步创建子元素（通过将 `true` 作为 `Children.create()` 方法的第二个参数传递）。\n\
  默认情况下，NetBeans Platform 状态栏集成了一个进度条。当您处理长时间运行的任务时，可以接入该进度条，让用户可视化单个或多个任务的进度。\n要接入进度条，您需要添加对*进度\
  \ API* 的依赖。`ProgressHandleFactory` 创建 `ProgressHandle` 对象，这些对象显示进度，并且可选地允许用户取消进度显示。进度可以以确定或不确定的运行时间显示。\n\
  \n例如，清单 10-27 中的代码片段可以在 `TaskChildFactory` 的 `createKeys()` 方法中使用，以显示在 *TodoRCP*\
  \ 应用程序的 `OutineView` 中加载和显示大量任务的进度。\n\n```\nProgressHandle handle = ProgressHandleFactory.creatHandle(\"\
  Tasks progress\");\nhandle.start(100);    // 100 个百分位，即 0-100\n...\nhandle.progress(25);\n\
  ...\nhandle.progress(50);\n...\nhandle.progress(75);\n...\nhandle.finish();\n清单\
  \ 10-27\n显示加载大量任务进度的示例\n```\n\n要处理跨多个模块的长时间任务，请使用 API（[`http://bits.netbeans.org/dev/javadoc/org-netbeans-api-progress/index.html`](http://bits.netbeans.org/dev/javadoc/org-netbeans-api-progress/index.html)）中描述的\
  \ `ProgressContributor`。\n\n可视化库\n*可视化库*用于在*场景*上显示可选择、可移动和可更改的图形组件（称为*小部件*）。可视化库基于\
  \ Java2D，并使用轻量级窗口系统，因此它可以与 Swing、JavaFX 等一起使用。\n可视化库通常与*组件面板*结合使用，后者允许将项目拖放到组件（如*场景*）上。为了激发您的兴趣，您可以通过探索可视化库示例（[`https://platform.netbeans.org/graph/examples.html`](https://platform.netbeans.org/graph/examples.html)）来开始您的冒险，以了解该库的功能，并查看一些实际使用它的教程和真实应用程序（[`https://platform.netbeans.org/graph/`](https://platform.netbeans.org/graph/)）。\n\
  在您的项目中使用可视化库之前，您需要从 *platform* 集群添加*可视化库 API*，该集群默认情况下未添加。您可以通过右键单击模块套件并选择**属性**来执行此操作，如前文图\
  \ 10-10 所述和所示。\n可视化库的主要类将在以下小节中描述。\n\n小部件\n\n小部件是可用于绘制图形的轻量级图形组件。如图 10-17 所示，`Widget`\
  \ 遵循*组合设计模式*（小部件包含小部件），并且各种小部件被组织成树形层次结构。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig17_HTML.jpg](img/479166_1_En_10_Fig17_HTML.jpg)\n\
  \n图 10-17\n可视化库类图\n\n可视化库提供了多种 `Widget` 实现（见图 10-18），每种实现都包含了由可自定义操作、边框和布局组成的预定义行为。`Widget`\
  \ 被排列并显示在 `Scene` 中，`Scene` 也有多种实现（见图 10-17）。\n\n小部件具有高效的验证和重绘机制。一个小部件（如图 10-17\
  \ 所示）还具有一个*状态*，该状态可以取以下几个值之一：*已选中、高亮显示*（也称为*辅助选择*）、*对象悬停、小部件悬停、小部件瞄准*。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig18_HTML.jpg](img/479166_1_En_10_Fig18_HTML.jpg)\n\
  \n图 10-18\n小部件实现\n\n最后，`Widget` 有一个 `Lookup`，可用于向其中添加对象。清单 10-28 提供了在 `Widget` 中使用\
  \ `Lookup` 的示例。\n\n```\nclass MyWidget extends LabelWidget {\nprivate Lookup lookup;\n\
  private InstanceContent ic;\npublic MyWidget(Scene scene) {\nsuper(scene);\nic =\
  \ new InstanceContent();\n}\n@Override\npublic Lookup getLookup() {\nif (lookup\
  \ == null) {\nlookup = new AbstractLookup(ic);\n}\nreturn lookup;\n}\n清单 10-28\n\
  一个带有 Lookup 以存储模型对象的 Widget\n```\n\n这个 `Lookup` 通常由包含可视化组件的 `TopComponent` 代理，而\
  \ `TopComponent` 又由 `Utilities.actionsGlobalContext()` 代理，正如我们在前几章中学到的那样。\n\n场景\n\
  `Scene`（见图 10-17 和 10-18）也是一种 `Widget`。它是一个顶级 `Widget`（树形层次结构的*根*元素），包含其他 `Widget`。它通常显示在\
  \ Swing 组件中，例如 `JScrollPane`。如图 10-17 所示，有各种类型的 `Scene`。例如，`ObjectScene` 将 `Widget`\
  \ 映射到数据对象。`GraphScene`、`GraphPinScene` 和 `VMDGraphScene`（*VMD* 代表*可视化移动设计器*）用于简化图形的创建。\n\
  \n\n\n要创建一个`Scene`并向其中添加`Widget`，通常需要遵循清单 10-29 中所示的步骤。\n\n```\npublic class TaskViewerTopComponent\
  \ extends TopComponent {\npublic TaskViewerTopComponent() {\nsetLayout(new BorderLayout());\n\
  Scene scene = new Scene();\nLayerWidget mainLayer = new LayerWidget(scene);\nLabelWidget\
  \ labelWidget =\nnew LabelWidget(scene, \"ATask\");\nmainLayer.addChild(labelWidget);\n\
  scene.addChild(mainLayer);\nadd(new JScrollPane(scene.createView()), BorderLayout.CENTER);\n\
  }\n}\n清单 10-29\n创建 Scene 的步骤\n```\n\n通过 `createView()` 或 `createSatelliteView()`\
  \ 方法，你可以创建一个可嵌入任何 Swing 容器的 `JComponent`。类似地，使用 `getSceneAnimator()` 方法，你可以创建一个\
  \ `SceneAnimator`（其中包含一些内置动画）。`LayerWidget` 的作用类似于 `JGlassPane`，通常用作其他 widget 的容器。\n\
  \nConnectionWidget\n`ConnectionWidget` 表示两个位置之间的连接。这些位置由 `Anchor` 解析（见图 10-19）。连接的路径由*控制点*指定，这些控制点由\
  \ `Router` 解析（见图 10-20）。\n\n支持多种锚点类型（由 `AnchorFactory` 创建）：中心锚点、圆形锚点、方向锚点、固定锚点或矩形锚点。`Router`（由\
  \ `RouterFactory` 创建）可以是正交的、直接的或自由的（默认使用 `DirectRouter`）。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig20_HTML.jpg](img/479166_1_En_10_Fig20_HTML.jpg)\n\
  \n图 10-20\n带有控制点的 ConnectionWidget 示例\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig19_HTML.jpg](img/479166_1_En_10_Fig19_HTML.jpg)\n\
  \n图 10-19\nConnectionWidget\n\n边框\n\n每个 `Widget` 都有一个边框，默认情况下是由 `EmptyBorder` 类提供的空边框。边框实现了\
  \ `Border` 接口。边框的示例包括 `LineBorder`、`BevelBorder`、`DashedBorder`、`ImageBorder`、`ResizeBorder`。通过\
  \ `Widget.setBorder()` 可以切换到不同的边框，如清单 10-30 所示。边框通过 `BorderFactory` 创建。\n\n```\n\
  widget.setBorder(BorderFactory.createLineBorder(2,Color.BLUE));\n清单 10-30\n为 Widget\
  \ 定义边框\n```\n\n布局\n\n一个 widget 可以作为其他 widget 的容器，并且具有由 `LayoutManager` 定义和管理的布局。提供了以下布局变体：\n\
  \n`AbsoluteLayout`、`FlowLayout`、`CardLayout`、`OverlayLayout`。清单 10-31 展示了如何使用 `LayoutFactory`\
  \ 为 widget 分配布局。\n\n```\nlayerWidget.setLayout(LayoutFactory.createVerticalFlowLayout());\n\
  清单 10-31\n为 Widget 定义布局\n```\n\nWidgetAction\n\n`Widget` 的行为由其*动作*描述，这些动作由 `WidgetAction`\
  \ 接口定义（见图 10-21）。该接口定义了由相应事件调用的方法，例如在分配了该动作的 Widget 上单击鼠标。Visual Library 提供了预定义的动作，这些动作也可以针对标准功能进行自定义，例如移动和编辑\
  \ Widget。动作的示例包括 `MoveAction`、`HoverAction`、`ZoomAction`、`PanAction`。动作无需定义和实例化。相反，它们由\
  \ `ActionFactory` 类分配给 `Widget`。要为 widget 创建动作，请使用 `ActionFactory` 并通过 `addAction()`\
  \ 方法将它们添加到 widget 中（见清单 10-32）。某些 `ActionFactory` 方法需要一个提供者（例如 `EditAction`）。其他动作有默认的提供者（例如\
  \ `MoveAction`）。但是，如果你希望偏离默认行为，请使用其他提供者。\n可用的提供者：`AcceptProvider`、`ConnectProvider`、`ContiguousSelectProvider`、`CycleFocusProvider`、`EditProvider`、`HoverProvider`、`InplaceEditorProvider`、`MoveControlPointProvider`、`MoveProvider`、`PopupMenuProvider`、`ReconnectProvider`、`RectangularSelectProvider`、`ResizeProvider`、`SelectProvider`、`TwoStateHoverProvider`。\n\
  \n动作是链式连接的。`WidgetAction.Chain` 类表示一个 widget 动作链；它接收用户事件并将其转发给相关的动作。当你对 `Widget`\
  \ 调用 `getActions()` 时，你实际上得到的是 `Chain`。当然，动作的顺序很重要。\n\n```\nlabelWidget.getActions().addAction(\n\
  ActionFactory.createMoveAction());\n清单 10-32\n向 Widget 添加动作\n```\n\n动作也可以分组。这可以通过调用\
  \ `Scene.setActiveTool()` 方法，然后使用 `getActions(\"activeTool\")` 而不是 `getActions()`\
  \ 来实现。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig21_HTML.jpg](img/479166_1_En_10_Fig21_HTML.jpg)\n\
  \n图 10-21\nWidget 动作\n\n调色板\n\n你通常将 Visual Library 与 `Palette` 结合使用，将 `Widget` 从\
  \ `Palette` 拖放到 `Scene` 中。`Palette` 是一个 `TopComponent`，包含可以拖放到的组件到你选择的任何其他 `TopComponent`\
  \ 中的项目。\n\n`TopComponent` 在其 `Lookup` 中发布一个 `PaletteController`，以及连接到 `Palette`\
  \ 中类别和项目上的右键单击弹出菜单的 `Action`。如果在 `TopComponent` 的 `Lookup` 中找到了 `PaletteController`，则\
  \ `Palette` 会与 `TopComponent` 一起打开。`PaletteFactory.createPalette()` 方法返回 `PaletteController`\
  \ 的一个实现，并通过将其放入 `TopComponent` 的 `Lookup` 中将其与 `TopComponent` 关联起来（见清单 10-33）。\n\
  \n```\nassociateLookup(Lookups.singleton(\nPaletteFactory.createPalette(...)));\n\
  清单 10-33\n将 Palette 与 TopComponent 的 Lookup 关联\n```\n\n默认情况下，当从调色板拖拽一个项目时，它不能被放置。你必须明确地将一个组件定义为*放置目标*；否则它无法接收调色板的*放置事件*。如果你希望将调色板与\
  \ Visual Library 结合使用，那么放置目标就是一个 `Scene`。\n\n清单 10-34 的代码示例展示了每当在 `Scene` 上发生放置操作时，如何创建一个新的\
  \ `LabelWidget`。你可以通过右键单击调色板并从弹出菜单中选择**调色板管理器**动作来配置调色板。\n\n\n\n```\nscene.getActions().addAction(\n\
  ActionFactory.createAcceptAction(\nnew AcceptProvider() {\n@Override\npublic ConnectorState\
  \ isAcceptable(\nWidget widget, Point point, Transferable t) {\nreturn ConnectorState.ACCEPT;\n\
  }\n@Override\npublic void accept(Widget widget, Point point, Transferable t) {\n\
  Node node = NodeTransfer.node(t, NodeTransfer.DND_COPY_OR_MOVE);\nLabelWidget labelWidget\
  \ =\nnew LabelWidget(scene, node.getDisplayName());\nlabelWidget.getActions().addAction(\n\
  ActionFactory.createMoveAction());\nlabelWidget.setPreferredLocation(point);\nlayerWidget.addChild(labelWidget);\n\
  }\n}\n)\n);\n清单 10-34\n在场景上拖放时创建一个新的 LabelWidget\n```\n\n作为练习，添加一个新模块（`Visual, todo.visual`）\n\
  到 *TodoRCP* 中，允许用户将存储在\n应用程序中的 `Task` 从 `Palette` 拖放到 `Scene` 上。用户\n还应能够连接任务，以显示它们之间的依赖关系。\n\
  \n品牌化、分发与\n国际化\n\n剩下的工作是替换启动画面和\n*关于* 对话框，这样你的应用程序就几乎可以分发了。\n以下是一些你可以用来品牌化和分发应用程序的方法：\n\
  \n1.  右键单击项目，选择**品牌化**。在这里\n    你可以选择启动画面、应用程序最小化时显示的图标，以及\n    应用程序标题栏中显示的标题。你还可以控制应用程序的窗口\n\
  \    行为（例如，可以禁用浮动），最后还可以对应用程序进行\n    国际化，即通过将资源包翻译成你偏好的语言\n    （*国际化资源包* 选项卡）来更改用户界面。\n\
  \n2.  右键单击项目，选择**属性**。在\n    *应用程序* 类别中，你可以更改应用程序的\n    名称。在*库* 类别中，你可以选择要包含的集群\n\
  \    和模块以提高性能。\n\n3.  要创建可分发的\n    *.zip* 或应用程序的*安装程序*，请右键单击\n    项目，选择**属性**，然后选择\n\
  \    *安装程序* 类别。勾选你想要为其创建安装程序的平台\n    （例如 Windows、Mac OSX、Solaris 和 Linux），\n   \
  \ 然后点击**确定**。你也可以提供许可证。\n    再次右键单击项目，选择**打包为**，\n    然后选择可用的选项之一，例如*安装程序* 或\n \
  \   *Zip 分发*。\n\n如果一切顺利，你会在项目文件夹内创建一个新的 `dist` 文件夹，\n其中包含已部署的应用程序。如果需要，解压它，\n进入内部（例如，`dist/todorcp/bin`）并\n\
  执行可执行文件（取决于你的平台，可能是\n`todorcp.exe` 或类似文件）。\n\n你还可以通过*更新中心*允许应用程序模块的在线更新，\n就像下载插件一样，例如为了提供错误修复或新功能。\n\
  要为你的应用程序提供此功能，请遵循以下步骤：\n\n1.  在 *platform* 集群中启用 *Auto Update Services* 和 *Auto\
  \ Update UI*\n    模块（见图 10-10）。在\n    清理并构建之后，验证你是否有一个 **工具 ➤ 插件**\n    菜单项，该菜单项可以打开*插件管理器*。\n\
  \n2.  右键单击项目，选择**打包为 ➤\n    NBMs**。每个模块都会在 `build/updates/`\n    目录中创建一个 `.nbm`（或\
  \ *NetBeans 模块*）\n    文件。*更新中心描述符*（`updates.xml`）也会被\n    创建。你需要将这些文件发布到 Web 服务器上。\n\
  \n3.  在*插件管理器*窗口中，点击\n    **设置**选项卡，然后点击**添加**并输入\n    *更新中心描述符*（`updates.xml`）的\
  \ URL。\n\n4.  这里（[`https://www.codenameone.com/blog/netbeans-plugin-update-center.html`](https://www.codenameone.com/blog/netbeans-plugin-update-center.html)）\n\
  \    是一个示例。\n\n\n\n摘要  \n表 10-1 展示了提供 Apache NetBeans 平台功能的一组模块。该表总结了该平台所提供的功能。你可以使用表中提到的大部分\
