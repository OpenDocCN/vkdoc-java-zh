  `java.time.LocalDateTime` 来存储选取的日期。我们将了解如何集成来自 SwingLabs 的 *SwingX JXDatePicker*（如果你愿意，集成其他任何一个都留作练习）。下载它并将其解压到您机器上的一个文件夹中。


