  \n图 5-12\n\nJPQL 工具\n\n1.  右键单击 `persistence.xml` 配置文件以打开上下文菜单。\n\n2.  单击**运行 JPQL\
  \ 查询**以打开该工具（图 5-12），键入查询，然后单击查询编辑器右上角的**运行**按钮。\n\n    **注意**要添加用于 JPA 配置的 `persistence.xml`\
  \ 配置文件，请右键单击项目并选择：**其他…**、**持久性**、**持久性单元**。\n\n## 部署和调试\n\nApache NetBeans IDE\
