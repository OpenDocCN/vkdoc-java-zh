  引言


  *Pro Apache NetBeans* 详细概述了 NetBeans IDE 的最新功能，例如对 JShell、Jigsaw 模块系统和局部变量类型推断的支持，重点介绍了这个新版本为开发者带来的变化。它还描述了
  NetBeans 平台（即构建 NetBeans IDE 的框架）的新特性。


  本书是一本实用的操作指南，提供了许多循序渐进的教程，帮助您充分利用最新 Java（及其他）软件平台的功能，并为在项目中使用 NetBeans IDE 打下坚实基础。本书由
  Apache 社区成员编写，他们一直使用该 IDE，并积极贡献和开发 Apache NetBeans 这一开源项目。


  *Pro Apache NetBeans* 由三部分组成。第一部分描述了如何使用 IDE 以及它为支持最新 Java 版本带来的新特性。第二部分描述了如何通过创建插件或使用富客户端平台编写自己的独立应用程序来扩展
  NetBeans。第三部分描述了如何为继续开发您最喜爱的 IDE 做出贡献，成为推动该工具集未来发展的开源团队的一员。


  更详细地说，第 1 章“什么是 NetBeans”对 NetBeans 进行了简要介绍。它解释了 NetBeans 是什么、不是什么、它的历史，一直到它的新家——Apache
  软件基金会，并成为其第二大项目。它还介绍了 NetBeans 支持的多种编程语言和工具，并向您介绍了本书其余部分将详细解释的许多其他内容。


  第 2 章“NetBeans 入门”概述了 NetBeans IDE，将帮助新用户熟悉其用户界面、各种窗口，并向您介绍如何构建您的第一个 Java 项目。它还提供了有用的技巧和提示，帮助您提高工作效率。


  第 3 章概述了 Apache NetBeans IDE 自 9.0 版本以来为 Java 9-12 版本及其他编程语言提供的新特性。它描述了对 JShell、Jigsaw
  模块系统、HttpClient 和局部变量类型推断的支持，以及对 PHP 的改进。


  第 4 章描述了如何开发桌面应用程序。这些是独立应用程序，通常本地运行在您的机器上，无需 Web 或应用服务器。本章解释了开发 Java GUI 桌面应用程序的三种方法：使用抽象窗口工具包
  (AWT)、Swing 或 JavaFX。NetBeans 提供了一个非常强大的可视化编辑器，您可以通过将组件拖放到窗体（面板）上来构建 GUI。本章还指导您完成开发自己的桌面应用程序的步骤。


  第 5 章描述了如何构建企业（或 Web）应用程序。与桌面应用程序相反，这些应用程序需要 Web 或应用服务器来提供 HTML 页面。自 11.0 版本起，Apache
  NetBeans 已包含对 Java EE 的支持。对 Maven Web 应用程序和 Java EE 技术（如 Enterprise JavaBeans (EJB)、上下文和依赖注入
  (CDI) 以及 JavaServer Faces (JSF)）的全面支持，使开发者能够方便地使用自动完成、代码片段和轻松的语法识别。完成本章后，您将对 Apache
  NetBeans 为全栈 Java EE 开发提供的便利性有基本的了解。


  第 6 章“调试和分析应用程序”详细解释了 Apache NetBeans 强大的调试器和分析器。如果调试能让您的代码正确，那么分析将使其运行得更快。本章解释了诸如断点、调试多线程代码、CPU
  和内存分析、快照等内容。


  本书的第二部分描述了 NetBeans 平台（或富客户端平台），即构建 NetBeans IDE 的框架或库。掌握这些知识，您可以更好地理解 NetBeans
  源代码，从而修复错误，或通过编写自己的插件来扩展它。或者，您可以使用它来开发自己的桌面应用程序，比使用 Swing 更快。


  第 7 章“掌握核心平台”向读者介绍了 NetBeans 平台的核心 API，即 NetBeans 模块系统、FileSystem 和 Lookups。NetBeans
  提供了自己的模块系统来实现应用程序的模块化，并支持使用 OSGi。本章提供了与 Java 模块系统 Jigsaw 的比较。NetBeans 还提供了自己的库来访问文件系统。提供了与
  Java 7 引入的 NIO.2 的比较。最后，Lookups 是构建松散耦合应用程序的非常强大的工具。还提供了与 Java 6 `ServiceLoader`
  的比较。


  第 8 章“掌握用户界面”向读者教授 NetBeans 平台的 GUI 组件，即窗口系统、动作系统、节点系统、资源管理器视图和属性表，所有这些都减少了开发强大
  UI 所需的时间。


  在第 9 章中，读者通过将一个桌面应用程序移植到 NetBeans RCP 来应用所学知识。开发分三步进行：(1) 构建用户界面的“静态”视觉原型；(2) 构建应用程序的“动态”原型，编写用户界面事件和相关的业务逻辑，并根据需要创建自定义
  UI 组件；(3) 编写持久化逻辑。


  第 10 章“学习平台的扩展功能”描述了 NetBeans 平台提供的许多其他 API，例如 Dialogs API、Visual Library 和 Palette、状态栏和通知、进度条、QuickSearch
  和输出窗口等。


  第 11 章教您如何通过为 NetBeans 编写插件来扩展它。您将逐步学习如何为 Hyperledger 开发一个插件，Hyperledger 是由 Linux
  基金会托管的、旨在推进区块链技术的开源项目。


  第三部分概述了 NetBeans 的新家——Apache 基金会；其支持开源项目的基础设施，例如用于问题跟踪、测试、文档等的各种工具；并为您提供了成为 Apache
  NetBeans 贡献者所需的所有信息。


  第 12 章描述了 Apache NetBeans 的流程。在简要介绍历史之后，它解释了源代码如何从 Oracle 迁移到 Apache，作为孵化器项目在 Apache
  下的各种 NetBeans 版本，以及如何毕业成为 Apache 顶级项目。


  第 13 章描述了 Apache 基础设施以及 Apache 软件基金会为其项目提供的用于问题/错误报告、维基、网站等的各种工具。


  第 14 章描述了 NetCAT 计划。***Net*** Beans IDE***C*** ommunity***A*** cceptance***T***
  esting（NetBeans IDE 社区验收测试）计划对产品质量至关重要。一个典型的 NetCAT 计划大约需要两个月的活动。本章解释了每个 NetBeans
  版本在发布前是如何由社区测试的。您可以轻松参与此计划并执行测试，从而帮助改进您最喜爱的 IDE。


  第 15 章概述了 NetBeans 源代码、其架构、各种模块及其依赖关系。它描述了如何下载和构建 NetBeans 源代码，将其加载到 NetBeans IDE
  中并进行调试。最后，本章鼓励您通过修复错误并将更改提交到基线来为 NetBeans 源代码做出贡献。


