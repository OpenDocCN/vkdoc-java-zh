  #### 线程与锁


  *线程*和*锁*性能分析可以更深入地了解应用程序代码的实际执行方式。通过使用*性能分析*下拉菜单中的*启用多模式*设置将两种模式结合起来，可以分析您的代码是真正在
  CPU 上运行，还是因等待锁或其他资源（如同步 I/O）而被阻塞。


  *线程*视图显示一个可过滤的列表（有关过滤机制的处理，请参见上面的“方法”部分），其中包含颜色编码的线程状态。这使我们能够实时了解应用程序如何使用线程，以及线程是真正在运行还是被阻塞（例如，长时间阻塞或频繁短时间阻塞）。一个简单的*线程*实时视图示例如图
  6-52 所示。


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig52_HTML.jpg](img/479166_1_En_6_Fig52_HTML.jpg)


  图 6-52


  线程实时视图


  与*方法*和*对象*性能分析模式不同，*线程*模式不提供结果快照功能。既然您已经看到线程被阻塞而无法执行，那么问题来了：是什么阻塞了它们的执行？激活*锁*性能分析可以回答这个问题。*锁*视图详细显示了哪个线程被阻塞以及阻塞了多长时间。一个非常简单的示例如图
  6-53 所示。


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig53_HTML.jpg](img/479166_1_En_6_Fig53_HTML.jpg)


  图 6-53


  锁实时视图


  ### SQL 查询


  对 SQL 查询进行性能分析只是锦上添花。对应用程序 SQL 查询的 SQL 性能分析会收集语句的跟踪和执行时间。它还可以跟踪与数据库连接的建立，这可能有助于调整您的连接池。




  ### 堆遍历器


  *堆遍历器*是一套用于分析通过 OpenJDK 内部堆转储机制获取的堆转储文件的工具集（在性能分析过程中也可以通过某些操作触发）。它是一个非常全面的分析工具，具备多种剖析堆转储文件的能力。


  首先，有一个*摘要*视图，可按多个类别显示与堆转储相关的数据：


  *   **基本信息**。显示基本信息，例如文件大小、转储日期。


  *   **环境**。显示有关环境的信息；例如，快照是在哪个操作系统上获取的；JVM 的供应商和版本等详细信息。


  *   **系统属性**。显示被转储 JVM 的所有系统属性。这些属性会内联显示在视图的实际区域中。


  *   **堆转储时的线程**。显示与堆转储一起获取的线程转储。线程转储会内联显示在视图的实际区域中。


  *   **应用程序窗口**。列出所有顶级 Swing 窗口，并可直接访问*实例*视图中的对应实例。


  *   **最大对象**。根据对象树的保留大小（即属于该对象的所有内容），触发确定堆上最大对象的操作。由于需要计算转储中所有对象的保留大小，此操作可能需要一些时间。


  *摘要*视图的示例如图 6-54 所示。


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig54_HTML.jpg](img/479166_1_En_6_Fig54_HTML.jpg)


  图 6-54


  堆遍历器摘要


  下一个视图是*类*视图。它显示堆上类实例的直方图。表格视图可以按实例数、大小或类名进行排序。视图底部的过滤器允许更快地向下钻取，例如，仅查找领域类的实例，而不查找
  JDK 核心类的实例。有一个初始隐藏的列，用于显示保留大小。如前所述，计算可能是一个耗时的操作，因此该列默认是隐藏的，尽管这些信息有时确实很有帮助。一个简单的示例如图
