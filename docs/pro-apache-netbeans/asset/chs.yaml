  图 1-7


  添加 Maven 依赖项


  点击“添加依赖项…”选项后，将出现“添加依赖项”对话框，允许轻松搜索远程或本地 Maven 仓库中的依赖项（图 1-8）。当向项目添加依赖项时，关联的项目 POM
  文件会被修改以包含该依赖项，这样用户就不必手动修改 XML。


