  ### JavaFX 支持


  Apache NetBeans 允许你通过点击 **文件 ➤ 新建项目** 菜单项来创建 JavaFX 项目。你可以创建基于 Ant 或基于 Maven 的 JavaFX
  项目。选择 **Java with Ant ➤ JavaFX** 类别，然后选择其中一个可用的 JavaFX 项目，如图 4-16 所示。或者选择 **Java
  with Maven** 类别，然后选择 **JavaFX Application** 项目。在第一种情况下，你可以创建一个 JavaFX 应用程序，使用 Java
  代码开发 GUI，或者使用 FXML 文件来编写应用程序的 GUI 控件脚本。你还可以创建一个混合了 Swing 和 JavaFX 组件的应用程序。


  创建 JavaFX 应用程序后，你可以使用 **文件 ➤ 新建文件** 向导添加额外的 FXML 文件的 JavaFX 类，如图 4-17 所示。


  ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig17_HTML.jpg](img/479166_1_En_4_Fig17_HTML.jpg)


  图 4-17


  JavaFX 文件类型


  ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig16_HTML.jpg](img/479166_1_En_4_Fig16_HTML.jpg)


  图 4-16


  JavaFX 项目类型


  Apache NetBeans 没有为 JavaFX 应用程序提供像 Swing 的 Matisse GUI 构建器那样的 GUI 设计器。不过，可以将 *SceneBuilder*
  与 NetBeans 集成。*SceneBuilder*（见图 4-18）允许你以图形方式构建 JavaFX 应用程序。Oracle 已停止对 SceneBuilder
  的支持，其最新版本为 2.0 ([`http://www.oracle.com/technetwork/java/javase/downloads/javafxscenebuilder-info-2157684.html`](http://www.oracle.com/technetwork/java/javase/downloads/javafxscenebuilder-info-2157684.html))。*Gluon*
  ([`https://gluonhq.com/products/scene-builder/`](https://gluonhq.com/products/scene-builder/))
  已接管了 *SceneBuilder* 的支持和开发工作。我们稍后将介绍如何设置 Apache NetBeans 以使用 *SceneBuilder*。


  Sven Reimer 的 *Monet* ([`http://plugins.netbeans.org/plugin/55434/monet-the-javafx-scene-builder-integration`](http://plugins.netbeans.org/plugin/55434/monet-the-javafx-scene-builder-integration))
  插件尝试在 NetBeans 内部运行 *SceneBuilder*，以构建 JavaFX 应用程序的 GUI，其方式与你使用 Matisse 构建 Swing
  应用程序的 GUI 相同。


  从前面提到的网站下载并安装 Oracle 的或（最好）Gluon 的 *SceneBuilder*，使用适合你平台的安装程序。要将 *SceneBuilder*
  与 NetBeans 集成，请按照以下步骤操作：


  1.  在 Apache NetBeans 中，导航到 **工具 ➤ 选项 ➤ Java ➤ JavaFX**（Windows/Linux）或 **NetBeans
  ➤ 偏好设置 ➤ Java ➤ JavaFX**（MacOSX），如果 JavaFX 支持尚未激活，请点击**激活**。


  2.  激活完成后，将 *Scene Builder Home* 设置为 Gluon 目录（例如，在 MacOS 中，这是 `/Applications/SceneBuilder.app`
  的路径）。某些 Windows 安装程序在安装 *SceneBuilder* 时不会询问目录。*SceneBuilder* 可以在 `C:\Users\<用户>\AppData\Local\SceneBuilder`
  或 `C:\Program Files\SceneBuilder` 中找到。


  3.  点击**确定**，即可开始使用。




  ### 注意


  如果 NetBeans 提示“*所选位置...不代表有效的 Java FX Scene Builder 安装*”，请执行以下变通方法。


  1.  导航到 *SceneBuilder* 的安装目录，

  2.  进入 `app` 文件夹，

  3.  在同一文件夹中，将 `SceneBuilder.cfg` 复制一份并重命名为 `SceneBuilder.properties`。


