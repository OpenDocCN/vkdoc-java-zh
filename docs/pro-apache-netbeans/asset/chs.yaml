  ### 断点视图


  *断点*视图是管理和查看所有已定义断点的中心视图。不同的断点类型可能用不同的图标表示。所有断点都可以通过复选框启用或禁用。此外，表格视图会呈现已定义断点的信息，例如行号和源文件或异常类。在默认隐藏的列中，可以显示断点的实际命中次数。每个断点都有一个上下文菜单，包含以下操作：


  *   **转到源代码**。在编辑器区域中打开与断点关联的源代码。如果没有可用的源代码，则会显示反汇编的替代内容。


  *   **启用/禁用**。切换断点的状态，从启用变为禁用，反之亦然。


  *   **移入组**。将选定的断点移入一个断点组，从而允许对启用、禁用或删除进行更精细的控制。


  *   **新建断点**。打开对话框以创建新断点。


  *   **全部启用**。启用所有断点。仅当至少有一个断点可以启用时才处于活动状态。


  *   **全部禁用**。禁用所有断点。仅当至少有一个断点可以禁用时才处于活动状态。


  *   **删除**。删除该断点。


  *   **全部删除**。删除所有断点。


  *   **属性**。显示断点的属性，以允许检查和更改*设置*、*条件*和*操作*。


  如图 6-31 所示，属于特定组的断点以树状方式显示在这些组下方。断点组的上下文菜单包含以下操作：


  *   **重命名组**。重命名断点组。


  *   **启用组内全部**。启用组内的所有断点。


  *   **禁用组内全部**。禁用组内的所有断点。


  *   **删除组内全部**。删除组内的所有断点，同时也会删除该组。


  除了表格视图外，左侧还有一个小的工具栏，提供三个操作：


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig31_HTML.jpg](img/479166_1_En_6_Fig31_HTML.jpg)


  图 6-31


  断点视图


  *   **创建新断点**。打开对话框以创建新断点。


  *   **停用当前会话中的所有断点**。停用当前调试会话中的所有断点。


  *   **选择断点组**。根据自定义组或预定义组的选择，显示列表中断点可能的分组策略列表。


  ### 可视化 Swing 调试


  Apache NetBeans 有一个额外的功能来支持 Swing 应用程序的调试。如果被调试的进程具有 Swing UI，则可以快照实际的组件层次结构，以便以可视化方式进行检查。调试工具栏中有一个特殊按钮，用于触发快照并打开一个*快照编辑器*选项卡，如图
  6-32 所示。


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig32_HTML.jpg](img/479166_1_En_6_Fig32_HTML.jpg)


  图 6-32


  Swing 快照


  快照允许您选择不同的组件，例如按钮或文本字段，并检查它们的字段属性。如果某个属性是可写的，则可以通过在*属性*视图的属性编辑器中输入新值来更改该值。快照中显示的组件的上下文菜单包含一些非常有用的操作：


  *   **转到组件声明**。在声明所选组件的行处打开相关源代码。这不是创建组件的行，而是字段定义的行。


  *   **转到组件源代码**。在编辑器选项卡中打开定义该组件的源代码文件，例如，对于 JButton，它会打开 `javax.swing.JButton` 源文件（如果源代码可用）。


  *   **显示监听器**。打开一个名为*事件*视图的新视图。事件视图显示已注册的监听器，允许导航到源代码，并显示事件日志（如果已配置）。


  *   **创建固定监视**。为此组件创建一个固定监视。


  *   **切换组件断点**。基于可视化选择创建一个组件断点（有关断点的详细信息，请参阅断点部分）。


  *   **断点属性**。打开一个对话框，显示组件断点的属性并允许更改属性。


  *   **属性**。打开一个独立对话框，显示与所选组件关联的属性表。


  *事件*视图基于在*快照*或*导航器*视图中选择的组件显示额外的逻辑信息。第一行标识所选组件，后面跟着两组监听器；第一组显示所有自定义监听器，即不是由 UI 工具包本身添加，而是由用户代码添加的监听器。第二组列出所有由
  UI 工具包本身添加的监听器。信息列表中的最后一部分是*事件日志*。它显示组件发出的事件列表。这有助于更好地理解组件层次结构在触发事件和反应方面的行为。如果您需要调试
  Swing 组件层次结构的行为，这种调试方式减少了您需要自行进行的设置工作，并让您直接、简单地访问 Swing 的内部机制。示例视图如图 6-33 所示。


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig33_HTML.jpg](img/479166_1_En_6_Fig33_HTML.jpg)


  图 6-33


  显示监听器和事件日志的事件视图


