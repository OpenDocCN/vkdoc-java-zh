  PHP 的另一个较新特性是支持多重捕获异常处理，Apache NetBeans 环境也支持此特性（图 3-7）。


  ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig7_HTML.jpg](img/479166_1_En_3_Fig7_HTML.jpg)


