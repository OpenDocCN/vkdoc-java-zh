  ### 设计任务详情对话框


  根据图 4-19，有一个用于创建/编辑任务的对话框。右键点击`todo.view`包，选择**新建 ➤ 其他**。选择**Swing GUI 表单**类别和**JDialog
  表单**文件类型（见图 4-4）。提供类名`TaskDetailsDialog`，然后点击**完成**。


  添加一个`JLabel`，将其附着到对话框的左侧、顶部和右侧边框，不留间距；它将作为验证错误等信息的消息区域。将其重命名为`lblMessageArea`（在*设计*视图中右键点击它，然后从弹出菜单中选择**更改变量名**），并设置其*opaque*属性和*background*颜色，使其看起来像对话框顶部的一个色带。同时添加一个`EmptyBorder`（*border*属性），以便在文本和色带边框周围留出空白空间。


  接下来，为*description*、*priority*和*due date*字段添加三个`JLabel`（分别将文本标签编辑为*Description*、*Priority*和*Due
  Date*，并将变量分别重命名为`lblDescription`、`lblPriority`、`lblDueDate`）。将这三个标签都附着到`JDialog`内部区域（绘图区域）的左侧。在组件和边框之间留出一些间距。调整两个较短标签的大小，使其右边界与较长标签的右边界对齐。然后选中这三个标签（使用`Shift
  + 点击`），将*horizontalAlignment*属性更改为`RIGHT`。


  然后，在*Description*标签旁边添加一个`JTextField`（将其重命名为`txtDescription`），在*Priority*标签旁边添加一个`JSpinner`（将其重命名为`spPriority`）。确保辅助线使标签和字段的基线对齐。`JSpinner`不提供任何设置首选宽度或最小宽度的属性，而`JTextField`使用*column*属性来实现这一点。但是，你可以调整`JSpinner`的大小，Matisse
  会以像素为单位设置组件的首选大小。




  ### 注意


  在不同平台上，或当用户更改默认的 Swing 外观和感觉（L&F）时，以像素为单位调整 GUI 组件的大小并不能保证正常工作。请谨慎使用此 Matisse 功能！


  我们需要将任务优先级限制在 1 到 10 之间。选择 `JSpinner` 组件，然后在*属性*窗口中，首先点击 *value* 属性的省略号（**…**）按钮，从组合框中选择**自定义代码**，并设置
  `spPriority.setValue(`**1**`)`。然后点击*代码*按钮，并选择*创建后代码*属性的省略号（**…**）按钮。输入如图 4-28 所示的代码，然后点击**确定**。转到*源代码*视图，在编辑器中右键单击，然后选择**修复导入**以解决错误。


