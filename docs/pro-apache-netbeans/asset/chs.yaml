  \ by priority**、**Sort by due date** 和 **Show Alerts**。\n\n静态视觉原型应类似于图 9-12。如果工具栏的顺序不正确，你可以通过右键点击\
  \ *XML Layer* 并选择 **Open**，或者右键点击 *Toolbars* 节点并选择 **Go to Declaration** 来修改它。`layer.xml`\
