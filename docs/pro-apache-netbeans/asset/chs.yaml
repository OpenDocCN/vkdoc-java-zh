  \ **文件 ➤ 项目** 对话框向导的某个类别中，请输入，例如，`folder = \"Projects/Other\"`。除了 `InstantiatingIterator`，`AddTaskWizardIterator`\
  \ 也可以继承 `AsynchronousInstantiatingIterator`（`instantiate()` 方法在 *EDT* 之外被调用）、`BackgroundInstantiatingIterator`（向导关闭，`instantiate()`\
  \ 方法在后台线程中被调用）或 `ProgressInstantiatingIterator`（`instantiate()` 方法在 *EDT* 之外被调用，并且会传入一个\
  \ `ProgressHandle` 以在进度条中显示其进度，这将在本章后面描述）。\n`WizardPanel`，除了 `WizardDescriptor.Panel`，也可以继承\
  \ `WizardDescriptor.ValidatingPanel`（用于在点击 **下一步** 或 **完成** 按钮时进行额外验证）、`WizardDescriptor.AsynchronousValidatingPanel`（用于异步验证）、`WizardDescriptor.ExtendedAsynchronousValidatingPanel`（优先于\
  \ `AsynchronousValidatingPanel`）或 `WizardDescriptor.FinishablePanel`（当 **完成** 按钮需要动态启用时；这允许用户在最后一步之前点击\
  \ **完成** 按钮，例如，因为他/她接受了后续步骤的默认值）。\n\n向导的其他属性\n\n使用自定义向导时，你可以使用 `WizardDescriptor`\
  \ 的一些属性：\n\n*   `PROP_AUTO_WIZARD_STYLE`：\n    设置为 `true` 以启用其他属性的使用。\n\n*   `PROP_CONTENT_BACK_COLOR`：\n\
  \    设置左侧窗格的背景颜色。\n\n*   `PROP_CONTENT_DATA`：\n    设置内容项的数组。\n\n*   `PROP_CONTENT_DISPLAYED`：\n\
  \    设置为 `true` 以显示左侧窗格。\n\n*   `PROP_CONTENT_FOREGROUND_COLOR`：\n    设置左侧窗格的前景颜色。\n\
  \n*   `PROP_CONTENT_NUMBERED`：\n    设置为 `true` 以在左侧窗格中显示编号。\n\n*   `PROP_CONTENT_SELECTED_INDEX`：\n\
  \    表示将被高亮显示的左侧窗格的索引。\n\n*   `PROP_ERROR_MESSAGE`：\n    显示在向导底部的错误消息。当存在错误时，向导的\
  \ **下一步** 按钮将被禁用。\n\n*   `PROP_IMAGE`：设置要在左侧窗格中显示的图像。\n\n*   `PROP_IMAGE_ALIGNMENT`：\n\
  \    设置图像的对齐方式。\n\n最后，关于图 10-7 中显示的其他两个选项，请查阅 [`http://wiki.netbeans.org/HtmlUIForTemplates`](http://wiki.netbeans.org/HtmlUIForTemplates)\
  \ 上的文档。\n作为练习，为 `AddTask` 操作构建一个自定义静态向导。该向导将包含三个步骤，第一个面板将询问任务的*描述*和*优先级*（描述是必填项）；第二个面板询问*截止日期*、*提醒*和*提前天数*；第三个面板询问*备注*以及任务是否*完成*。也尝试为\
  \ *TodoFXRCP* 应用程序创建相同的向导。提示！使用 `JFXPanel` 代替 `JPanel`。\n作为另一个练习，使用 **使用 HTML/Java\
  \ UI 新建文件** 向导为 *TodoHTMLJava* 应用程序创建一个用于添加新任务的向导。\n\n其他内容\n这里我们描述一些你可能在你的项目中会用到\
  \ NetBeans 平台 API。\n\n状态栏\n\n在上一章的清单 9-2 中，我们看到了如何通过注册到 `StatusLineElementProvider`\
  \ 服务提供者接口来在状态栏中显示消息。如果你想显示简单的文本，请使用清单 10-16 中的命令。\n\n```\nStatusDisplayer.getDefault().setStatusText(\"\
  状态消息\").\n清单 10-16\n在状态栏中显示一条消息\n```\n\n通知\n\nNetBeans 平台提供了一种在状态栏最右侧显示气球形状弹出窗口的机制。为此目的使用\
  \ `NotificationDisplayer`，它需要依赖 *UI 工具* 模块。清单 10-17 提供了自定义气球的各种可能性。\n\n```\nNotificationDisplayer.getDefault().notify(String\
  \ title, Icon icon, String detailsText, ActionListener detailsAction);\nNotificationDisplayer.getDefault().notify(String\
  \ title, Icon icon, String detailsText, ActionListener detailsAction, Priority priority);\n\
  NotificationDisplayer.getDefault().notify(String title, Icon icon, JComponent balloonDetails,\
  \ JComponent popupDetails, Priority priority);\nNotificationDisplayer.getDefault().notify();\n\
  清单 10-17\n在状态栏中显示一个气球形状的弹出窗口\n```\n\n你也可以在气球中包含一个图标。一个添加警报 ![../images/479166_1_En_10_Chapter/479166_1_En_10_Figa_HTML.jpg](img/479166_1_En_10_Figa_HTML.jpg)\
  \ 图标的示例如清单 10-18 所示。\n\n```\nNotificationDisplayer.getDefault().notify(\n\"警报 1\"\
  ,\nImageUtilities.loadImageIcon(\"todo/view/illegal.png\", false),\n\"警报详情 1\",\n\
  null);\n清单 10-18\n在状态栏中显示一个带有图标的气球形状弹出窗口\n```\n\n作为练习，修改 *TodoRCP* 以在启动时将警报显示为通知，而不是\
  \ `JOptionPane` 消息（见图 10-8）。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig8_HTML.jpg](img/479166_1_En_10_Fig8_HTML.jpg)\n\
  \n图 10-8\n通知\n\n如果 `ActionListener` 不是 `null`，则会显示一个超链接，点击该链接将执行该操作。`Priority` 可以是：`HIGH`、`NORMAL`、`LOW`\
  \ 或 `SILENT`。\n\nImageUtilities\n`org.openide.util.ImageUtilities`\n是一个工具类，提供了用于操作和转换图像及图标的静态方法。结果会被缓存。有用的方法包括\
  \ `loadImage()`、`loadImageIcon()`、`icon2Image()`、`image2Icon`、`mergeImages()` 等。我们在清单\
  \ 10-18 中看到了一个示例。\n\n快速搜索\n\n通常，在工具栏的右上角会显示一个搜索字段（见图 10-9）。`QuickSearch` 框会搜索你在其文本框中输入的关键字。\n\
  \n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig9_HTML.jpg](img/479166_1_En_10_Fig9_HTML.jpg)\n\
  \n图 10-9\n工具栏中的快速搜索\n\n如果搜索字段没有自动显示，那么你需要在 `layer.xml` 中包含清单 10-19 中所示的 XML 标签：\n\
  \n```\n\n清单 10-19\n在 layer.xml 中添加 XML 标签以在工具栏中显示快速搜索字段\n```\n\n你可以选择在菜单栏而不是工具栏中显示快速搜索。这样做时，最佳实践是包含一个分隔符，以确保搜索字段在菜单栏中右对齐。你可以通过将清单\
  \ 10-20 中的代码添加到你的 `layer.xml` 文件中来实现这些操作。\n\n```\n\n清单 10-20\n在菜单栏而不是工具栏中显示快速搜索\n\
  ```\n\n要在 Mac OSX 的菜单上显示快速搜索，你需要从平台集群中排除 *Apple 应用程序菜单* 模块（右键单击 *TodoRCP* 模块套件，选择\
  \ **属性**，然后选择 *库* 类别，如图 10-10 所示），以便不使用 Apple 菜单栏。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig10_HTML.jpg](img/479166_1_En_10_Fig10_HTML.jpg)\n\
  \n图 10-10\n从平台集群中移除 Apple 应用程序菜单模块\n\n\n\n如果你需要将快速搜索过滤器工具添加到自己的面板/工具栏中，可以按照以下技巧操作：[`http://layerxml.wordpress.com/2011/02/16/place-the-quicksearch-component-anywhere-you-like/`](http://layerxml.wordpress.com/2011/02/16/place-the-quicksearch-component-anywhere-you-like/)\
