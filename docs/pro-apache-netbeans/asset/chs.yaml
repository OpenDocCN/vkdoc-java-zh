  ### 多会话调试


  Apache NetBeans 调试器支持同时运行多个调试会话。如果您需要调试例如 Java 前端和后端之间的某些集成问题，并且可以同时调试这两个进程，这将非常有用。调试器将多会话功能无缝集成到默认视图和工作流程中。在*调试*视图中，会显示一个额外的组合框，允许您选择要显示线程的调试会话，如图
  6-36 所示。


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig36_HTML.jpg](img/479166_1_En_6_Fig36_HTML.jpg)


  图 6-36


  调试视图中的会话选择


  除了使用多会话工作流程所需的信息增强*调试*视图外，还有一个专用的*会话*视图，显示所有调试会话及其状态、编程语言以及它们执行所在的主机（请记住，调试会话可能附加到远程主机上的进程运行）。每个会话都有一个上下文菜单，提供与会话的交互：


  *   **设为当前会话**。切换调试器以主动调试此会话。


  *   **作用域**。选择是调试所有线程还是仅调试当前线程。


  *   **语言**。选择用于此进程的调试器（如果可能适用多个调试器）。


  *   **结束**。结束调试会话。


  *   **全部结束**。结束所有调试会话。


