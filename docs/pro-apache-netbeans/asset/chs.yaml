  Apache NetBeans JavaFX Ant 和 Maven 项目将在未来的 Apache NetBeans 版本中修复，以使其能与 JDK 11 及更高版本正常工作。


  使用*SceneBuilder*，你可以通过简单的拖放小部件来快速设计 GUI，其方式类似于 Matisse 允许你构建 Swing GUI。


  不过，由于这不是一本关于 JavaFX 的书，如果你希望开发*TodoFX*应用程序，请按照本教程（[`http://wiki.netbeans.org/TodoFX`](http://wiki.netbeans.org/TodoFX)）进行操作。


  ## 结论


  在本章中，你学习了如何使用 Apache NetBeans IDE 开发 Java 桌面应用程序。NetBeans 允许你使用 AWT、Swing 或 JavaFX
  构建桌面应用程序。为了开发 Swing 应用程序，Apache NetBeans 提供了一个非常高级的 GUI 构建器，其代号为*Matisse*。我们了解了
  Matisse 的功能，并实际了解了如何使用它构建一个原型应用程序。


  有关如何使用 Matisse GUI 构建器的更多信息，请参阅“使用 NetBeans IDE 开发应用程序”（[`https://docs.oracle.com/netbeans/nb82/netbeans/NBDAG/toc.htm`](https://docs.oracle.com/netbeans/nb82/netbeans/NBDAG/toc.htm)）指南的第
  11 章。


  我们还了解了如何将*SceneBuilder*与 NetBeans 集成以开发 JavaFX 应用程序。Apache NetBeans 也提供了用于构建 Web
  应用程序的 GUI 构建器。但让我们等到下一章再介绍。




