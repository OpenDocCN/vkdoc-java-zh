  HTML 文件的编辑器将提供编辑 HTML 的选项，如果创建了 CSS 或 JavaScript 文件，则编辑器将提供特定于这些文件类型的选项。当然，所有适用于
  Java SE 项目的功能也适用于 Java Web 项目。


  ## PHP 和其他语言


  尽管 Apache NetBeans 最初是为开发 Java 应用程序而创建的，但多年来社区已增加了对许多其他语言的支持。在 Apache NetBeans 中支持出色的语言之一是
  PHP。另一个支持良好的语言是 JavaScript。在 Apache NetBeans 10 中，PHP 在 IDE 中获得了完全支持，因此可以使用诸如多重捕获异常处理、可空类型、上下文相关词法分析器等特性。代码编辑器包含
  PHP 特定的功能，例如 void 返回类型的提示、不正确的非抽象方法的提示、严格类型声明的建议等。还支持 HTML 表单面板，以帮助开发 PHP Web 表单。


  要创建 PHP 项目，在“新建项目”➤“PHP”类别下有几个选项。选项如下：“PHP 应用程序”、“基于现有源的 PHP 应用程序”和“来自远程服务器的 PHP
  应用程序”。第一个选项允许从头开始创建一个 PHP 项目，为调试和运行项目提供了灵活性。第二个选项“基于现有源的 PHP 应用程序”允许将现有的 PHP 项目导入到标准
  IDE 项目中并立即开始使用。第三个选项允许下载一个远程项目，并为其创建一个标准 IDE 项目。第三个选项还会自动配置新创建的标准 IDE 项目，使其自动将本地更改上传到远程服务器。


  ## Maven 支持


  Java 应用程序最流行的构建系统是 Apache Maven。因此，Apache NetBeans 对此构建系统提供了一流支持也就不足为奇了。IDE 包含各种基于
  Apache Maven 项目格式的入门项目。任何 Maven 项目都可以在 Apache NetBeans IDE 中打开，并且会立即被识别，从而可以开始开发。


  要在 Apache NetBeans 中打开现有的 Maven 项目，只需使用文件浏览器浏览到该项目并打开即可。IDE 将自动检测语言类型，并使用与所选项目相关的模板打开一个项目。例如，如果打开一个
  Java SE Maven 项目，则将使用 Java SE Apache NetBeans 项目模板。


  使用 Maven，项目依赖项会在构建项目时被下载并添加到生成的归档文件中。因此，当在 Apache NetBeans 中使用“与依赖项一起构建”选项时，Maven
  正是这样做的。通过右键单击项目导航器中的“依赖项”节点并选择“添加依赖项”，也可以轻松地向项目添加依赖项（图 1-7）。


