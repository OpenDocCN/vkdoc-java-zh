- '# 4. 开发桌面应用程序


  Apache NetBeans 对开发桌面应用程序提供了出色的支持。这里所说的桌面应用程序，是指那些不需要 Web 或应用服务器（尽管后端可以使用）、安装在用户机器上、并提供比浏览器更丰富的图形用户界面（GUI）的应用程序。


  从历史上看，*抽象窗口工具包（AWT）* 是随 JDK 1.0 发布的首个 GUI 库。AWT 是 Java 基础类（JFC）的一部分，是为 Java 程序提供
  GUI 的标准 [API](https://en.wikipedia.org/wiki/Application_programming_interface)。AWT
  的组件（或控件）是“重量级”或原生的，这意味着它们的外观和感觉（L&F）取决于其运行平台（在 Windows 上运行时，按钮看起来像 Windows 按钮；在
  MacOSX 上运行时，则像 MacOSX 按钮等）。AWT 是多线程的，仅提供对 GUI 组件的基本支持，并且可以在浏览器中运行而无需插件。


  *Swing* 随 JDK 1.2 发布，是 AWT 的替代品。Swing 的开发目的是提供一套比早期抽象窗口工具包（AWT）组件更复杂的“轻量级”GUI 组件（完全用
  Java 编写，因此与平台无关）。Swing 提供了一种模拟多种平台外观和感觉的[外观和感觉](https://en.wikipedia.org/wiki/Look_and_feel)，并且支持可插拔的外观和感觉，允许应用程序拥有与底层平台无关的外观和感觉。Swing
  遵循单[线程](https://en.wikipedia.org/wiki/Thread_%2528computing%2529)编程模型；所有与 GUI 相关的代码都在*事件分发线程（EDT）*
  中执行。此外，该框架在代码结构和基于 Swing 的 GUI 的图形表示之间提供了一个抽象层。


  *JavaFX* *（*[`https://openjfx.io/`](https://openjfx.io/)*）* 是 Java 提供的最新 GUI 库，用于构建丰富的
  GUI 或*富互联网应用程序（RIA）*，这些应用程序可以在各种设备上运行。JavaFX 将 UI 呈现（通常在 XML 文件 – `.fxml` 中声明）与实际逻辑（动作事件等）分离开来。这样，您就可以使用*层叠样式表（CSS）*
  来装饰 GUI，而无需重新编译应用程序。JavaFX 1.0.2 于 2008 年发布。从 JDK 7u6 开始，它已被集成到 JDK 中。JavaFX 8 包含在
  JDK 8 中；然而，从 JDK 11 开始，JavaFX 再次与 JDK 分离。JavaFX 由 Gluon（[`https://gluonhq.com/`](https://gluonhq.com/)）积极维护。虽然
  JavaFX 旨在替代 Swing，但两者都将在市场上共存相当长一段时间。


  ## Apache NetBeans 对桌面应用程序的支持


  Apache NetBeans IDE 提供了多种工具来简化构建 GUI 的过程，如图 4-1 所示。


  ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig1_HTML.jpg](img/479166_1_En_4_Fig1_HTML.jpg)


  图 4-1


  Apache NetBeans GUI 开发工具


  *   **GUI 构建器**：这是您设计应用程序 GUI 的地方。GUI 构建器，或称 *Matisse*，允许您通过将组件放置在所需位置，并以参考线的形式提供视觉反馈来布局表单。


  *   **导航器窗口**：显示当前打开表单中包含的所有组件的树形层次结构。这些可以是可视组件和容器，例如按钮、标签、菜单、面板等，也可以是非可视组件，例如计时器和数据源。


  *   **组件面板窗口**：包含可以通过拖放添加到表单中的组件或控件组。组件面板窗口可以自定义为仅显示图标，或显示图标及组件名称。借助*组件面板管理器*，您可以向组件面板添加新组件。


  *   **属性窗口**：允许更改当前所选组件的属性，例如显示的文本、大小等。它还允许添加/修改事件和绑定。


  Apache NetBeans 支持使用 AWT、Swing 或 JavaFX 开发桌面应用程序。可视化设计能力是 NetBeans 最强大的功能之一。构建应用程序
  UI 的原型有助于最终用户陈述他们的需求，这也是可视化 GUI 构建器如此受欢迎的原因之一。


  通常，您需要创建一个新的 Java 应用程序，然后使用向导或通过从组件面板拖放控件来添加 GUI 组件。


  在继续之前，请打开一个现有的 Java 应用程序 NetBeans 项目，或者创建一个新的 *Java 应用程序* 项目，如图 4-20 所示，方法是选择 **文件
  ➤ 新建项目** 菜单项，然后单击 **下一步**。在向导的步骤 2 中，提供项目名称并选择合适的项目位置（硬盘上的任意位置），如图 4-21 所示。然后点击
  **完成**。最后，在 *项目* 选项卡中选择项目或项目的 *源包*，然后点击 **文件 ➤ 新建文件**，具体操作将在以下章节中说明。


  ### AWT 支持


  如今使用 AWT 进行开发非常罕见，因此本书将不涉及此内容。不过，我们将简要介绍 Apache NetBeans 对 AWT 的支持。您可以创建多种 AWT 表单，如图
  4-2 所示。您可以通过点击菜单 **文件 ➤ 新建文件** 来打开此向导。


  *   **Applet 表单**：创建一个新的 `java.applet.Applet`。*Applet* 是可以在（支持 Java 的）浏览器中运行的小型应用程序。


  *   **对话框表单**：在应用程序或 Applet 中创建一个新的 `java.awt.Dialog`。对话框可以是*模态*的（对话框会阻塞应用程序，等待用户输入）或*非模态*的（对话框不会阻塞应用程序等待用户输入）。


