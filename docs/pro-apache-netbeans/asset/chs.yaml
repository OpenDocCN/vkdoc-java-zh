  \n图 9-7\n\n具有 OutlineViews 列的 TodoRCP 应用程序\n\n接下来，让我们创建状态栏。要在 NetBeans 中显示 `StatusBar`，类必须实现\
  \ `StatusLineElementProvider` 接口并将其声明为服务。右键单击 `todo.view` 包，选择 **New ➤ Java Class**。将其命名为\
  \ `StatusBar`，然后点击 **Finish**。然后复制清单 9-2 中显示的代码并粘贴进去（你可能需要格式化代码；在编辑器内右键单击，从弹出菜单中选择\
  \ **Format**）。\n\n```\npackage todo.view;\nimport java.awt.Component;\nimport javax.swing.JLabel;\n\
  import org.openide.awt.StatusLineElementProvider;\nimport org.openide.util.lookup.ServiceProvider;\n\
  /**\n* 应用程序的状态栏。\n*/\n@ServiceProvider(service=StatusLineElementProvider.class,\
  \ position=1)\npublic class StatusBar implements StatusLineElementProvider {\n@Override\n\
  public Component getStatusLineElement() {\nreturn new JLabel(\"There are no task\
  \ alerts for today.\");\n}\n}\n清单 9-2\n作为服务提供者实现的 StatusBar\n```\n\n重新审视 `ServiceProvider`\
  \ 和 `Lookup`。`StatusLineElementProvider` 接口非常灵活；你可以返回任何你想要的组件——`JLabel`、`JButton`、`JPanel`\
  \ 等等。当然，神奇之处在于第一行，它将 `StatusBar` 类声明为 `StatusLineElementProvider.class` 的服务提供者。正如你现在应该已经知道的，这一行将你的类添加到应用程序的\
  \ *default lookup* 中，NetBeans 随后会搜索 `StatusLineElementProvider.class`，并将找到的所有提供者添加到状态栏中。\n\
  \n接下来，让我们创建工具栏。工具栏包含操作，因此你将创建操作并将它们插入到中央注册表中的相应工具栏中。你需要原始 ToDo 应用程序中的图标。重复你在中央注册表中对\
  \ *Menu Bar* 执行的操作，对 *Toolbars* 执行相同操作。只保留两个条目：*Edit, Options*（通过重命名一些并删除其余部分）。\n\
  \n操作是控制器。打开 *Controller* 模块，创建 Java 包 `todo.controller.file`、`todo.controller.edit`\
