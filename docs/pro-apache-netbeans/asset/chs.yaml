  }\n@Override\npublic void removeTask(final int id) {\ntasks.remove(findTask(id));\n\
  }\nprivate boolean isEmpty(final String str) {\nreturn str == null || str.trim().length()\
  \ == 0;\n}\nprivate void validate(final Task task) throws ValidationException {\n\
