  \n输出窗口\n*输出窗口* 是一个显示区域，通常位于 NetBeans IDE 窗口的底部，用于向用户显示消息（见图 10-13）。来自多个来源的消息可以同时显示在不同的选项卡中。\n\
  \n要在你的应用程序中使用 *输出窗口*，请添加对 *I/O API and SPI* 模块的依赖。清单 10-24 显示了一个用例示例。\n\n```\nInputOutput\
  \ io = IOProvider.getDefault().getIO(\"Hello World!\", true);\nio.show();   // 如果输出窗口未打开，则显示它\n\
  try (OutputWriter writer = io.getOut()) {\nwriter.println(\"This is a message.\"\
  );\n}\n清单 10-24\n输出窗口代码示例\n```\n\n将 `true` 作为第二个参数传递给 `IOProvider.getDefault().getIO()`\
  \ 可确保每次调用都在 *输出窗口* 中创建一个新选项卡。传递 `false` 则将输出写入同一选项卡。`InputOutput.show()` 确保在 *输出窗口*\
  \ 关闭时将其打开。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig13_HTML.jpg](img/479166_1_En_10_Fig13_HTML.jpg)\n\
  \n图 10-13\n输出窗口\n\n设置\n\nNetBeans IDE 提供了 *选项* 窗口（菜单 **工具 ➤ 选项** 或在 MacOS 上为 **NetBeans\
  \ ➤ 偏好设置**），允许用户对其进行自定义（见图 10-14）。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig14_HTML.jpg](img/479166_1_En_10_Fig14_HTML.jpg)\n\
  \n图 10-14\n选项窗口\n\n如图 10-14 所示，有 *主面板*（例如 *常规*、*杂项*）和 *次面板*（例如 *格式*、*提示* 等）。主面板可用于配置应用程序中最重要的设置分组。次面板可用于配置应用程序所需的不太重要的设置。你还可以使用\
  \ *选项* 窗口左下角的两个相应按钮导出和导入你的设置。\n\nApache NetBeans 平台的 *选项对话框 API 和 SPI* 允许模块自定义选项窗口。要使用此\
  \ API，请右键单击你的模块，然后选择 **新建 ➤ 其他**。选择 *模块开发* 类别和 *选项面板* 文件类型。在下一步中，在主面板和次面板之间进行选择（见图\
  \ 10-15）。关键字使用户能够像我们之前学到的那样，从 *快速搜索字段* 快速打开 *选项* 窗口。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig15_HTML.jpg](img/479166_1_En_10_Fig15_HTML.jpg)\n\
