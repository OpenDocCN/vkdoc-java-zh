  ### PHP


  Apache NetBeans IDE 完全支持 PHP 7.0、7.1、7.2 和 7.3。这使得用户能够利用一些最新的 PHP 进展来创建新的 PHP 项目。PHP
  成为 Apache NetBeans 的一部分已有多年，但直到 PHP 7.0，无需安装额外插件即可获得支持。自 Apache NetBeans 10.0 起，PHP
  已成为标准发行版的一部分。请参见图 3-5。


  ![../images/479166_1_En_3_Chapter/479166_1_En_3_Fig5_HTML.jpg](img/479166_1_En_3_Fig5_HTML.jpg)


