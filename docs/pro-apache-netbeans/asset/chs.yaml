  最后一个视图是 *OQL 控制台*。此视图允许您使用特殊的 OQL 语法对堆进行交互式分析查询。右下角的*已保存查询*视图中已经提供了一些示例查询。右下角的*查询编辑器*提供代码补全功能，以简化创建新查询的过程，这些查询可以保存以供日后重用。执行查询后，结果将显示在*查询结果*视图中，即
  *OQL 控制台视图*的上半部分。查询结果始终是一个实例列表，可以在*实例*视图中选择和分析这些实例。当存在大量相同对象的实例，并且您想找出其中某个子集（例如，所有空的映射）时，使用
