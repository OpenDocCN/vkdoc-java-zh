  ### 资源管理器窗口


  所有提供对用户对象访问的窗口都使用资源管理器窗口位置。这些窗口包括项目窗口、文件窗口、服务窗口和任务窗口。


  #### 项目窗口


  *项目窗口*（**Ctrl+1** 或 **Cmd+1**）显示项目源文件。它显示一个或多个项目的逻辑视图。每个项目或视图由一个节点表示，并根据项目类型具有特定的图标（例如，Java
  应用程序节点的显示方式与 JavaFX 应用程序节点不同），如图 2-2 所示。


