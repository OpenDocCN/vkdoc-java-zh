  *   **面板表单**：创建一个 `java.awt.Panel`，可以添加到 AWT 容器中，例如 `Frame`、`Dialog` 或 `Applet`。


  一旦您将上述任一表单添加到应用程序中，NetBeans 中就会出现设计编辑器以及组件面板。图 4-3 显示了您可以拖放到 AWT 表单上的可用控件。AWT 表单支持不同的布局，您可以通过右键单击表单并从弹出菜单中选择
  **设置布局** 来设置布局。


