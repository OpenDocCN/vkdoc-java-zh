  清单 9-13\nTaskChildFactory 类\n```\n\n这些更改应能使 `OutlineView` 相应更新。然而，你还会注意到另一个问题：编辑任务时，必须点击另一个单元格后才会更新。要解决此问题，你需要进行更多修改。首先修改\
  \ `Task` 类（使其成为可观察对象，以便在字段更改时通知监听器）；其次，在所有影响大纲视图的 setter 方法中添加 `firePropertyChange()`。清单\
  \ 9-14 展示了一个示例，但你需要对其他 setter 也执行相同操作。\n\n```\npublic class Task implements Serializable\
  \ {\n...\nprivate PropertyChangeSupport pcs = null;\n/** @return 一个线程安全的 PropertyChangeSupport\
  \ */\nprivate PropertyChangeSupport getPropertyChangeSupport() {\nif (pcs == null)\
  \ {\npcs = new PropertyChangeSupport(this);\n}\nreturn pcs;\n}\npublic void addPropertyChangeListener(final\
  \ PropertyChangeListener listener) {\ngetPropertyChangeSupport().addPropertyChangeListener(listener);\n\
  }\npublic void removePropertyChangeListener(final PropertyChangeListener listener)\
