  \n总结\n在本章中，我们通过开发 *TodoRCP*、*TodoFXRCP* 和 *TodoHTMLJava* 模块套件应用，应用了上一章学到的知识。它们都使用相同的模型，而\
  \ *视图* 则分别通过使用 *Explorer & Properties Sheets*、*JavaFX* 和 *HTML/Java UI* 来实现。\n在下一章中，我们将看到一些在开发富客户端平台应用时可能会用到的额外\
  \ API。\n\n脚注\n\n10. 学习平台扩展功能\n\n在本章中，我们将学习 NetBeans RCP 提供的一些可能对你的应用有用的额外功能：\n\n\
  *   **对话框** API，包括**向导** API\n*   **可视化库**和**面板**\n*   **状态栏**和**通知**\n*   如何使用**进度条**\n\
  *   **快速搜索**和**输出**窗口\n*   如何在**选项**窗口中定义和持久化你的应用设置\n*   如何品牌化和分发你的应用\n\n让我们开始吧。\n\
  \n对话框 API\n*对话框 API* 类似于 `javax.swing.JOptionPane`，它让你能够以简单的方式创建和显示对话框及向导。你可以显示预定义的对话框、自定义对话框以及多步骤向导。\n\
  显示一个对话框需要两个步骤：创建一个 `NotifyDescriptor` 来配置对话框，以及一个 `DialogDisplayer` 来显示它。在使用之前，请添加对\
  \ *对话框 API* 模块的依赖。\n\n预定义对话框\n\nNetBeans 包含各种用于常见场景（例如向用户显示消息）的预定义对话框。代码清单 10-1\
  \ 调用了一个显示消息并带有**确定**按钮的对话框。\n\n```\nNotifyDescriptor d = new NotifyDescriptor.Message(\"\
  Message\");\nDialogDisplayer.getDefault().notify(d);\n代码清单 10-1\n使用对话框 API 显示消息对话框\n\
  ```\n\n结果如图 10-1 所示。代码清单 10-1 中的命令等同于 `JOptionPane.showMessageDialog(...)`。\n\n\
  ![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig1_HTML.jpg](img/479166_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1\n简单的信息消息对话框\n\n另一方面，代码清单 10-2 显示了图 10-2 所示的确认对话框。\n\n```\nNotifyDescriptor\
  \ d = new NotifyDescriptor.Confirmation(\n\"Message\", \"Title\");\nObject retVal\
  \ = DialogDisplayer.getDefault().notify(d);\nif (retVal == NotifyDescriptor.YES_OPTION)\
  \ {\n// 执行某些操作\n}\n代码清单 10-2\n使用对话框 API 显示确认对话框\n```\n\n这些命令等同于 `JOptionPane.showConfirmDialog(...)`。\n\
  \n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig2_HTML.jpg](img/479166_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2\n确认对话框\n\n你可以将 `retVal` 与 `NotifyDescriptor` 的以下常量值进行比较：\n\n*   `OK_OPTION`：点击了**确定**按钮。\n\
  *   `YES_OPTION`：点击了**是**按钮。\n*   `NO_OPTION`：点击了**否**按钮。\n*   `CANCEL_OPTION`：点击了**取消**按钮。\n\
  *   `CLOSED_OPTION`：对话框在未按下任何按钮的情况下关闭。\n\n代码清单 10-3 显示了图 10-3 的输入对话框。\n\n```\nNotifyDescriptor\
  \ d = new NotifyDescriptor.InputLine(\n\"Input:\", \"Title\");\nObject retVal =\
  \ DialogDisplayer.getDefault().notify(d);\nif (retVal == NotifyDescriptor.OK_OPTION)\
  \ {\nString text =\n((NotifyDescriptor.InputLine) d).getInputText();\n}\n代码清单 10-3\n\
  使用对话框 API 显示输入对话框\n```\n\n这些命令等同于 `JOptionPane.showInputDialog(...)`。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig3_HTML.jpg](img/479166_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3\n输入对话框\n\n也可以使用 `NotifyDescriptor` 类来定义标准对话框的属性，如代码清单 10-4 所示。\n\n\n\n\
  ```\nNotifyDescriptor d = new NotifyDescriptor(\n\"Message\", // 消息\n\"Title\",\
  \ // 标题\nNotifyDescriptor. DEFAULT_OPTION, // 选项类型\nNotifyDescriptor.ERROR_MESSAGE,\
  \ // 消息类型\nnull, // 自定义按钮（作为 Object[]）\nnull); // 默认值\nDialogDisplayer.getDefault().notify(d);\n\
  清单 10-4\n使用 Dialogs API 显示错误对话框\n```\n\n结果如图 10-4 所示。这些命令等同于 `JOptionPane.showOptionDialog(...)`。\n\
  \n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig4_HTML.jpg](img/479166_1_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4\n错误消息对话框\n\n*选项类型*（第 3 个参数）可以取以下值之一：\n\n*   `NotifyDescriptor.DEFAULT_OPTION`\n\
  \n*   `NotifyDescriptor.OK_CANCEL_OPTION`\n\n*   `NotifyDescriptor.YES_NO_OPTION`\n\
  \n*   `NotifyDescriptor.YES_NO_CANCEL_OPTION`\n\n*消息类型*（第 4 个参数）可以取以下值之一，你也可以将其作为第二个参数传递给清单\
  \ 10-1 中描述的 `NotifyDescriptor.Message()`：\n\n*   `NotifyDescriptor.PLAIN_MESSAGE`\n\
  \n*   `NotifyDescriptor.INFORMATION_MESSAGE`\n\n*   `NotifyDescriptor.QUESTION_MESSAGE`\n\
  \n*   `NotifyDescriptor.WARNING_MESSAGE`\n\n*   `NotifyDescriptor.ERROR_MESSAGE`\n\
  \n第 5 个参数可用于传入一个 `Object` 数组，以向对话框添加自定义按钮。可以使用类型为 `String`、`Component` 或 `Icon`\
  \ 的数组。清单 10-5 提供了一个示例。\n\n```\nString[] buttons = new String[3];\nbuttons[0] = \"\
  Play\";\nbuttons[1] = \"Pause\";\nbuttons[2] = \"Stop\";\nNotifyDescriptor d = new\
  \ NotifyDescriptor(\n\"Message\", // 消息\n\"Title\", // 标题\nNotifyDescriptor.DEFAULT_OPTION,\
  \ // 选项类型\nNotifyDescriptor.PLAIN_MESSAGE, // 消息类型\nbuttons, // 自定义按钮（作为 Object[]）\n\
  \"Play\"); // 默认值\nDialogDisplayer.getDefault().notify(d);\n清单 10-5\n使用 Dialogs\
  \ API 显示带有自定义按钮的对话框\n```\n\n生成的对话框如图 10-5 所示。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig5_HTML.jpg](img/479166_1_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5\n带有自定义按钮的对话框\n\n作为练习，请将上一章 *TodoRCP* 应用程序中的 `JOptionPane` 实例替换为 *Dialogs\
  \ API*。\n\n自定义对话框\n\n还可以通过扩展 `NotifyDescriptor` 的 `DialogDescriptor` 类来创建自定义对话框。清单\
  \ 10-6 显示了一个示例，该示例显示了一个自定义的登录对话框（在 `LoginPanel JPanel` 类中设计）。\n\n```\nDialogDescriptor\
  \ d = new DialogDescriptor(\nnew LoginPanel(), // 组件\n\"Login\",          // 标题\n\
  true,             // 模态\nnull);            // ActionListener\nDialogDisplayer.getDefault().createDialog(d).setVisible(true);\n\
  清单 10-6\n使用 Dialogs API 显示自定义对话框\n```\n\n简而言之，你可以将任何类型的 `java.awt.Component` 作为第一个参数传递。例如，让我们通过提供一个\
  \ *Login* 对话框来扩展我们的 *TodoRCP* 应用程序，该对话框在应用程序启动时要求输入凭据，此时应用程序应被阻塞，直到用户通过身份验证。\n\n\
  保护访问\n\n我们不希望任何人都能访问我们的任务。我们需要通过要求输入凭据来保护对 *TodoRCP* 应用程序的访问。以下是在应用程序启动时显示登录对话框的步骤：\n\
  \n1.  按照第 7 章所述创建一个新模块，确保将其添加到 *TodoRCP* 模块套件中。将模块命名为 *Login*，并将其*代码基名称*设置为 `todo.login`。\n\
  \n2.  如果尚未打开，请打开 *Login* 模块；右键单击 `todo.login` 包；从弹出菜单中选择 **新建 ➤ 其他** 以显示 *新建文件*\
  \ 对话框；选择 *Swing GUI 窗体* 类别；然后选择 *JPanel 窗体* 文件类型。单击 **下一步**。\n\n3.  在步骤 2 中，在 *类名*\
  \ 字段中输入 `LoginPanel`，然后单击 **完成**。\n\n4.  使用以下内容创建图 10-6 所示的登录表单：\n\n*   用户名的标签：`lblUsername`\n\
  \n*   密码的标签：`lblPassword`\n\n*   底部显示的错误消息标签（在图 10-6 中显示为红色矩形，但在你的表单上将是不可见的）：`lblInfo`\n\
  \n*   用户名的文本字段：`txtUsername`\n\n*   密码的密码字段：`txtPassword`\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig6_HTML.jpg](img/479166_1_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6\nLoginPanel\n\n1.  切换到编辑器窗口中的*源*视图，并在 `LoginPanel` 类的末尾添加清单 10-7 中的以下方法\n\
  \n1.  通过右键单击 `todo.login` 包并选择 **新建 ➤ 其他**，然后选择 *模块开发* 类别，再选择 *安装程序/激活器* 作为文件类型，创建一个新的模块安装程序。然后按照清单\
  \ 10-8 所示完成代码。请注意，除了 `createDialog()` 之外，`DialogDisplayer` 还提供了 `notify()` 和 `notifyLater()`。后者允许在初始化阶段之后立即显示\
