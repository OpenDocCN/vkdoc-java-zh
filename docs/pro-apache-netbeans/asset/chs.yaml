  \n图 9-15\n\n警报信息对话框\n\n关于过滤，你可以在 `OutlineView` 中右键单击一行，然后选择**仅显示满足以下条件的行**，再选择一个条件进行过滤。按照相同的过程并选择**无过滤器**来移除过滤器。但是，`ShowCompletedTasksAction`\
