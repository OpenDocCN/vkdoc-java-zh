  \n### 创建 JSF 应用文件\n\n如果要创建 JSF 视图，请右键单击 **Web 页面**节点；如果要为 JSF 创建 Java 源文件，请右键单击**源包**节点。右键单击适当的节点可确保文件生成在正确的项目区域内。在上下文菜单中，选择**新建**，然后选择**其他…**\
