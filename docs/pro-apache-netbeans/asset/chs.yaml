  ## 性能分析


  ### 入门


  为在 Apache NetBeans 中打开的项目启动性能分析会话并不像调试那么简单，因为它需要更多的设置决策。因此，让我们逐步了解启动性能分析会话的过程（作为示例，我们将仅使用
  Apache NetBeans 中的 Anagram Game 示例）。如果项目已打开，请在*项目*视图中选择项目节点，然后按工具栏中的**分析项目**按钮。现在需要执行的第一步是配置您的性能分析会话。必须执行此操作，因为
  Apache NetBeans 分析器支持多种性能分析模式：


  *   **遥测**。监控 CPU 和内存使用情况、线程数以及已加载的类。


  *   **方法**。分析方法执行时间和调用次数，包括调用树。


  *   **对象**。分析已分配对象的大小和数量，包括分配路径和代际计数。


  *   **线程**。监控线程状态和时间。


  *   **锁**。收集锁竞争统计信息。


  *   **SQL 查询**。显示已执行的 SQL 查询、其持续时间和调用路径。


  分析远程 VM 需要更复杂的设置，这需要使用特殊代理设置远程 JVM。


  我们现在将更深入地了解所有性能分析模式，但首先了解一些基础知识。


  ### 基本性能分析操作


  在分析应用程序期间，有一组通用操作，可以随时触发以支持性能分析过程。这些操作位于标有*进程*的性能分析工具栏的右端。


  *   **从被分析进程获取线程转储**。从被分析进程获取线程转储，并在*线程转储*视图中打开它。


  *   **从被分析进程获取堆转储**。从被分析进程获取堆转储，并在*堆遍历器*视图中打开它（请参阅本章后面的*堆遍历器*）。


  *   **在被分析进程中请求垃圾回收**。请求在被分析进程中运行显式垃圾回收。这可用于确保堆转储不会被太多不再存活的对象污染。


  ### 遥测


  *遥测*是一种非常基础的性能分析模式。它允许我们跟踪以下内容：


  *   CPU 负载，区分实际 CPU 时间和 GC 消耗的时间。


  *   堆大小和已使用的堆。


  *   关键垃圾回收参数，例如，存活代（持续增加的数字表示缓存或内存泄漏）和 GC 间隔。


  *   线程和已加载的类。


  对于上述每一项，遥测视图中都会显示一个专门的图表，如图 6-38 所示。


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig38_HTML.jpg](img/479166_1_En_6_Fig38_HTML.jpg)


  图 6-38


  遥测视图




  ### 方法


  方法分析或执行分析是一种帮助理解应用程序运行时执行性能的工具。如果对服务器的请求耗时过长，对应用程序进行执行分析可能有助于找出瓶颈（还有其他技术，但这些可以在性能调优手册中进行更深入的研究）。


  使用方法启动分析会话将打开一个视图，类似于图 6-39 所示。


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig39_HTML.jpg](img/479166_1_En_6_Fig39_HTML.jpg)


  图 6-39


  方法视图实时显示


  如图所示，该视图包含两个部分，它们会实时更新。第一部分是*线程视图*，显示特定线程中大部分时间消耗在何处。第二部分（显示在底部）是一个视图，显示应用程序的*热点*，即哪些方法已被执行、执行频率以及它们在
  CPU 上运行了多长时间。这可以实时了解应用程序中正在发生的事情。由于可能运行着许多线程，并且会生成数千个方法的指标，因此可以通过*线程名称*或方法视图的*类名称*对这两个视图进行过滤。要打开视图底部的过滤栏，请单击视图上下文菜单中的**过滤**。过滤器支持不同类型的匹配：


  *   **包含**。显示所有完全限定类名包含过滤字符串的类。

  *   **不包含**。显示所有完全限定类名不包含过滤字符串的类。

  *   **正则表达式**。显示所有完全限定类名与作为正则表达式的过滤字符串匹配的类。


  除了这些过滤表达式之外，还有一些预定义的过滤器可用：


  *   JPA

  *   JavaEE

  *   JavaEE 服务器

  *   Java 反射

  *   Java SE


  由于*方法*分析会向被分析应用程序引入开销，因此配置要分析的方法非常重要。这可以使用右上角的齿轮图标来完成。这将打开一个配置区域，允许我们选择哪些方法将被检测以进行方法分析。默认配置如图
  6-40 所示。


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig40_HTML.jpg](img/479166_1_En_6_Fig40_HTML.jpg)


  图 6-40


  方法配置


  默认配置仅对方法分析使用采样分析技术。与检测分析相比，它的开销更小，但不够精确。该配置区分不同的类或方法集合。由于开销问题，最重要的模式是*已定义*类。这允许显式选择分析会话感兴趣的类，如图
  6-41 所示。


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig41_HTML.jpg](img/479166_1_En_6_Fig41_HTML.jpg)


  图 6-41


  方法分析仅限已定义的类


  甚至还可以通过使用*排除传出调用*选项来禁止分析整个树。完成所有这些设置并跟踪实时结果后，您可能希望更详细地了解实际发生的情况。您可以通过从工具栏创建结果快照来做到这一点，这将为快照打开一个单独的选项卡。显示的结果视图与实时视图差别不大，如图
  6-42 所示。


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig42_HTML.jpg](img/479166_1_En_6_Fig42_HTML.jpg)


  图 6-42


  方法结果快照


  在*方法*分析的实时视图中，还有一个不错的功能。使用工具栏中的一个按钮，您可以将实时视图切换为显示增量值，即所有绝对值都用作基线，并且仅显示相对于此基线的变化，因此只有在触发增量机制后执行的方法才会在视图中显示大于
  0 的值。这可用于消除分析数据中的启动开销。


  ### 对象


  *对象*分析是一种帮助分析内存分配和消耗的工具。当我们查看内存时，通常指的是 Java 堆，即堆上分配的对象。在对象分析模式下启动分析会话将打开一个实时视图，显示所有类实例（对象）的直方图。表格视图显示完全限定的类名、该类实例在堆上消耗的估计活动字节数，以及每个类在堆上的活动对象计数。该视图具有与*方法*分析中描述的相同的过滤选项。示例视图如图
  6-43 所示。


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig43_HTML.jpg](img/479166_1_En_6_Fig43_HTML.jpg)


  图 6-43


  对象视图实时显示


  与*方法*分析类似，*对象*分析可以配置分析器应跟踪哪些类实例。这里也可以使用采样分析模式，该模式仅按定义的时间间隔从堆中采集样本。但是，在这种模式下，如果许多分配死亡得足够快（即分配和垃圾回收发生在两个样本之间），分析器可能会错过它们。可以选择可能的配置类型如图
  6-44 所示。


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig44_HTML.jpg](img/479166_1_En_6_Fig44_HTML.jpg)


  图 6-44


  对象配置


  默认配置是对所有类使用低开销采样。如果您对内存问题的根源毫无头绪，这可能是合适的。仅对项目类使用采样模式可以减少跟踪的信息量，并将重点放在您自己的领域代码上。由于这可能还不够，例如，想象一个由核心
  Java 类的缓存实例引起的泄漏，Apache NetBeans 分析器除了采样模式外，还提供了两种检测分析模式。让我们先看看*已定义类*模式。它允许我们通过使用完全限定的类名来指定要分析的类列表。如果您需要分析来自某个包或包树的所有类，您可以使用星号或双星号作为这些用例的通配符。一旦您将需要的内容添加到列表中（每行一个模式），还有两个选项可供选择：


  *   **仅跟踪活动对象**。定义是仅分析活动对象，还是也分析已创建的对象（包括已释放的对象）。

  *   **限制分配深度**。定义为分配记录的堆栈深度。如果未选中，则始终记录完整的堆栈，否则仅存储顶部的若干堆栈帧用于分析。此设置对分析期间引入目标 VM 的开销有重大影响。


  需要应用更新后的配置，这会触发对目标 VM 检测的更新。配置 UI 如图 6-45 所示。


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig45_HTML.jpg](img/479166_1_En_6_Fig45_HTML.jpg)


  图 6-45


  已定义对象


  另一种定义要分析分配情况的类的模式是*选定类*。它与*已定义类*模式非常相似，不同之处在于，要分析的类不是通过模式定义的，而是通过使用简单的 UI 从项目或 jar
  文件中显式选择来选定的。要开始选择过程，您需要单击添加按钮，如图 6-46 所示。


  ![../images/479166_1_En_6_Chapter/479166_1_En_6_Fig46_HTML.jpg](img/479166_1_En_6_Fig46_HTML.jpg)


  图 6-46


  选定对象




  添加按钮会打开一个新对话框，允许您从 IDE 中已打开的项目中选择类。该对话框由三个列表（*项目*、*包*和*类*）组成，这些列表都可以进行过滤，以便更快地访问特定项。*包*列表的内容可以切换为包含来自项目的包，和/或包含来自依赖项的包（通过列表视图下方的两个切换按钮）。*类*列表显示所选包中的类。此列表还可以显示内部类和匿名类以供选择（使用列表视图下方的切换按钮）。完整的
  UI 如图 6-47 所示。


