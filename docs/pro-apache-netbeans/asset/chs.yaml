  ## 性能分析、调试与重构


  Apache NetBeans IDE 拥有出色的性能分析、调试和重构能力。性能分析器允许深入应用程序方法调用的内部，以定位问题区域。遥测分析器屏幕提供了 CPU
  与垃圾回收器、内存、垃圾回收以及线程和类的概览。CPU 与垃圾回收器图表允许深入特定时间点以查找 CPU 和 GC 时间，内存提供堆大小和已用堆，垃圾回收显示存活代，线程和类图表则显示线程数和已加载的类（图
  1-15）。


  ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig15_HTML.jpg](img/479166_1_En_1_Fig15_HTML.jpg)


  图 1-15


  遥测显示


  进程按钮可调用某些功能，例如随时进行垃圾回收。方法分析允许分析所有类、项目类或仅选定的类。用户界面使得深入单个方法调用以定位问题变得容易（图 1-16）。


  ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig16_HTML.jpg](img/479166_1_En_1_Fig16_HTML.jpg)


  图 1-16


  方法分析器


  对象分析器允许按大小对对象进行排序，双击某个对象将直接跳转到其源代码（图 1-17）。


  ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig17_HTML.jpg](img/479166_1_En_1_Fig17_HTML.jpg)


  图 1-17


  对象分析器


  这些功能只是 Apache NetBeans 分析器的冰山一角。调试器允许在代码中设置断点，然后执行代码（本地或部署到服务器），并单步执行代码以帮助调试和查找问题原因。一旦在代码中设置了断点，调试器将在断点处停止执行，IDE
  将显示此时变量的值（图 1-18）。


  ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig18_HTML.jpg](img/479166_1_En_1_Fig18_HTML.jpg)


  图 1-18


  Apache NetBeans 调试器


  调试器还允许对变量设置监视点，当变量包含指定值时，代码执行将停止。还有一个快照选项，允许在指定时间拍摄快照，以便在代码执行时进行监控。如果正在开发 JavaFX
  或 Swing 图形用户界面，还有一个可视化调试器，允许查看组件属性、容器内的组件等。请参阅第 5 章以了解有关调试器和分析器的更多信息。


  IDE 的另一个关键组件是重构代码的能力。Apache NetBeans 允许更改代码文件的名称、自动添加代码（如 getter 和 setter）、更改方法参数等（图
  1-19）。


  ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig19_HTML.jpg](img/479166_1_En_1_Fig19_HTML.jpg)


  图 1-19


  Apache NetBeans 重构上下文菜单


  ### Apache NetBeans 平台


  Apache NetBeans 不仅仅是一个用于应用程序的 IDE。该 IDE 构建在一个专门为创建富客户端桌面应用程序而设计的平台上……即 NetBeans
  平台。事实证明，该平台具有极强的可扩展性，对于为 Java 平台开发任意数量的桌面应用程序非常有用。事实上，有许多成功的应用程序都是基于 NetBeans 平台构建的，范围从完整的桌面应用程序到有用的实用工具。NetBeans
  平台还允许轻松构建可安装的模块，以扩展 Apache NetBeans IDE。IDE 本身包含可用于构建利用 NetBeans 平台的应用程序和模块的项目模板。


  要开发 NetBeans 模块，请打开“新建项目”对话框并选择“NetBeans 模块”类别（图 1-20）。有许多选项可用于创建 NetBeans 模块，范围从开发单个模块、模块库到整个
  NetBeans 平台应用程序。


  ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig20_HTML.jpg](img/479166_1_En_1_Fig20_HTML.jpg)


  图 1-20


  新建项目：NetBeans 模块




  #### 开发独立的 Apache NetBeans 模块


  在许多情况下，开发者希望为 Apache NetBeans 环境构建扩展。社区开发者已经创建了数十个有用的 NetBeans 模块。此类模块扩展了 IDE，以集成新的和/或增强的功能。扩展可以封装几乎任何功能。例如，模块可用于为
  IDE 添加新的语言支持，或扩展现有功能（如添加增强的 Git 支持）。无论是什么，使用项目模板都很容易开发 Apache NetBeans 模块。


  要开始，请选择“NetBeans 模块” ➤ “模块”项目类型。选择后，新模块可以创建为“独立”模块，也可以添加到“模块套件”中。在下一个面板上，必须指定“代码名称基础”。“代码名称基础”与基础包名称非常相似（图
  1-21）。还可以指定包本地化包，以及选择将模块生成为 OSGI 模块。


  ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig21_HTML.jpg](img/479166_1_En_1_Fig21_HTML.jpg)


  图 1-21


  新建模块向导


  项目结构与 Java SE 项目非常相似，尽管会生成许多特定于模块的配置文件（图 1-22）。


  ![../images/479166_1_En_1_Chapter/479166_1_En_1_Fig22_HTML.jpg](img/479166_1_En_1_Fig22_HTML.jpg)


  图 1-22


  NetBeans 模块结构


  该模块将创建一个 NBM 文件，该文件稍后可以作为扩展添加到 NetBeans IDE 中。该模块也可以作为 NetBeans 插件部署以进行分发。


  #### 开发基于 NetBeans 平台的应用程序


  NetBeans 平台允许开发者利用一个骨架框架来构建丰富的客户端应用程序，该框架免费提供了许多底层功能。该平台允许以从头开发所需时间的一小部分来开发 Java
  Swing 应用程序。该平台包括诸如状态保存和生命周期管理、标准化的 UI 工具包、窗口系统等功能；所有这些功能都可以开箱即用地轻松实现。


  在 NetBeans 平台上开发时，IDE 允许轻松调试模块或平台应用程序。因此，这使得快速创建使用标准架构的稳定用户界面变得容易。由于该平台开箱即用地提供了许多基本的客户端应用程序
  API，您可以确信所有标准的 NetBeans 平台应用程序都以一致的方式运行。


  ### Apache NetBeans 社区


  Apache NetBeans 拥有一个充满活力的社区，包含多个在线资源、频繁的会议演讲和会议，以及丰富的文档和教程历史。Apache NetBeans 社区自
  2000 年代初就已存在，多年来已从一个小的核心群体发展壮大为整个开源社区。


  #### 邮件列表和 NetCAT


  成为 Apache NetBeans 社区一员的最基本且信息量最大的方式之一是加入邮件列表。这些列表经常用于发布问题和讨论 IDE 的新旧功能。这些列表对于了解开源社区如何运作也很有用，因为列表上总有经验丰富的专家随时准备提供帮助。要加入
  Apache NetBeans 邮件列表，请访问以下网页：


  [`​netbeans.​apache.​org/​community/​mailing-lists.​html`](https://netbeans.apache.org/community/mailing-lists.html)


  在 Apache NetBeans 发布之前，必须对即将发布的版本进行测试以确保其功能完整。Apache NetBeans 测试的阶段之一是 NetCAT 计划。NetCAT
  是一个测试者社区，每个测试者被分配测试 IDE 的不同部分。IDE 功能被分成不同的 NetCAT 组织小组。每个小组定期在线开会以制定测试计划，每个测试者使用在线表单完成测试用例。成为
  NetCAT 测试者可以让您更深入地了解 Apache NetBeans IDE，并通过帮助消除问题来回馈社区。使用上面提到的 Apache NetBeans
  邮件列表链接了解更多关于加入 NetCAT 的信息。


  #### 解决问题


  为 Apache NetBeans 生态系统做出贡献的最重要方式之一是在 Apache NetBeans JIRA（问题跟踪器）上找到一个问题并修复它。这很容易做到，只需创建
  Apache NetBeans GitHub 仓库的一个分支，然后在分支中进行必要的代码更新以修复问题。一旦问题被修复，可以通过提交拉取请求将分支中的更改添加回
  Apache NetBeans GitHub 仓库。要了解更多关于为 Apache NetBeans 贡献代码的信息，请参考第 14 章和第 15 章。


  '
