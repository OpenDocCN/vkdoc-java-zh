  \ *Add Task* 操作，该操作始终启用，然后点击 **Next**。\n\n然后为操作选择一个类别。类别代表操作的语义分组。你可以选择一个已有的类别或创建一个新的类别。在我们的例子中，选择已有的\
  \ *Edit* 类别。此外，将你的操作分配给 *Edit* 菜单栏和 *Edit* 工具栏，并设置操作显示的位置。下拉菜单会显示可能的显示位置。*\"HERE\"\
  * 标识了你的操作显示将被插入的位置。不要忘记添加快捷键（*Insert*，与旧的待办事项应用程序相同）。见图 9-8。\n\n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig8_HTML.jpg](img/479166_1_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8\n\n新建操作向导，第 3 步\n\n如图 9-9 所示命名类，不要忘记添加图标（浏览到原始 ToDo 应用程序的 `icons` 文件夹，或者如果你愿意，也可以使用你自己的图标）。\n\
  \n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig9_HTML.jpg](img/479166_1_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9\n\n新建操作向导，第 4 步\n\n点击 **Finish**。\n\n\n\n`AddTaskAction` 类被创建（参见第 8 章中的清单\
  \ 8-19）。观察在 NetBeans RCP 中，向导的输入是如何被翻译成 Java 注解的。在 NetBeans IDE 7.0 之前的版本中，这些信息是直接添加到\
  \ `layer.xml` 中的。提醒一下，我们在第 7 章中将 `layer.xml` 添加到了我们的模块中。将两种情况下的位置都修改为 `10`，以避免与你接下来创建的操作混淆。为每个新操作的位置都加上\
  \ `10`——也就是说，将 `EditTaskAction` 的位置设置为 `20`，将 `DeleteTaskAction` 的位置设置为 `30`，以此类推。暂时将操作主体留空。\n\
  \n通过运行旧的 ToDo 应用程序，你可能已经注意到，虽然 **Add Task** 操作始终处于启用状态，但其他任务操作只有在从表格中选择一个或多个任务时才启用——换句话说，它们是*上下文*操作。你可以通过使用*条件启用*操作来实现相同的功能。这些操作作用于*节点*。节点是特定数据片段的可视化表示——在我们的示例中，就是任务。当你从表格中选择一行时，实际上是在选择一个任务节点。上下文敏感性是通过称为*cookies*的接口构建的。操作要作用的节点实现了一个接口，该接口指定了操作应调用的方法。操作可以指定一组\
  \ cookies，这些 cookies 在活动节点中的存在情况（如果活动节点实现了这些接口之一）决定了该操作是否启用。\n\n要创建 `EditTaskAction`，请右键点击\
