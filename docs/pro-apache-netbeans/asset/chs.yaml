  \n## 开发实体类\n\nApache NetBeans IDE 提供了帮助开发实体 Bean 类的工具，既可以手动开发，也可以基于选定的数据库表进行开发。要访问实体类向导，请右键单击项目的*源包*文件夹以打开上下文菜单，然后选择**新建**\
