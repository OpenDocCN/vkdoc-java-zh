  #### 对齐组件


  为了帮助我们在窗体中布局控件，Apache NetBeans 在设计视图顶部提供了一个工具栏（见图 4-7），其中包含用于对齐和预览窗体的工具。


  ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig7_HTML.jpg](img/479166_1_En_4_Fig7_HTML.jpg)


  图 4-7


  Swing GUI 设计器工具栏


  *   **源代码视图**：显示窗体的源代码。


  *   **设计视图**：显示 GUI 设计器。


  *   **历史记录**：显示源代码的本地历史记录，如果您需要恢复到以前的版本，这会很有用。


  *   **选择模式**：允许选择组件。


  *   **连接模式**：允许在两个组件之间创建连接，以便一个组件上的事件可以触发另一个组件上的事件。


  *   **预览设计**：允许预览窗体在运行时的显示方式。


  *   **列左对齐**：允许将多个组件左对齐。


  *   **列右对齐**：允许将多个组件右对齐。


  *   **水平居中**：允许将多个组件水平居中。


  *   **行顶对齐**：允许将多个组件顶部对齐。


  *   **行底对齐**：允许将多个组件底部对齐。


  *   **垂直居中**：允许将多个组件垂直居中。


  *   **更改水平可调整大小性**：水平调整所选组件的大小，而不是将其锚定到其他组件的左侧和右侧。


  *   **更改垂直可调整大小性**：垂直调整所选组件的大小，而不是将其锚定到其他组件的顶部和底部。


  Matisse 还允许将一组选定的组件沿第一个选定组件的轴居中。水平和垂直居中均可用。必须选择多个组件；然后所有组件都基于最宽的选择居中。另一个选项允许组件在其父容器中水平和垂直居中。我们将在本章后面看到一些示例。


  #### 锚定组件


  顾名思义，将组件锚定到一个位置意味着，即使其容器调整大小，该组件也将相对于其他组件或边界保持在该位置。


  当我们锚定一个组件时，基本上是在说，当我们调整窗体大小时，我们希望该组件与另一个组件保持对齐。例如，如果我们将一个 `JLabel` 锚定到 `JFrame`
  的右下角，那么当我们展开 `JFrame` 时，该标签将保持在右下角。为了指示一个小部件已锚定到另一个对象，Apache NetBeans 会显示一条水平或垂直的虚线，终止于该组件所锚定的边界。如果组件在特定边缘未锚定，则会显示一条锯齿线，指示该组件的位置可能在指定方向上扩展。在图
  4-8 中，`JLabel` 被锚定到框架的右下角。因此，在标签与 `JFrame` 的底部和右侧边缘之间有一条虚线，而在 `JFrame` 的左侧和顶部边缘之间有一条锯齿线。


  ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig8_HTML.jpg](img/479166_1_En_4_Fig8_HTML.jpg)


  图 4-8


  锚定标签


  您也可以右键单击小部件，然后从上下文菜单中选择**锚定 ➤**（**左、右、上、下**）。


  #### 调整组件大小


  当我们调整窗体大小时，锚定的组件会移动以保持其位置，但组件本身不会被调整大小。


  如果我们希望允许组件在窗体调整大小时自动调整大小，我们必须指定该组件可以自动调整大小。右键单击该组件，选择**自动调整大小**菜单项，然后选择*水平*或*垂直*（或两者）。图
  4-9 显示了图 4-8 中的 `JLabel`，它可以在水平和垂直方向上自动调整大小。您现在会注意到两条锯齿线都已转换为虚线。


  ![../images/479166_1_En_4_Chapter/479166_1_En_4_Fig9_HTML.jpg](img/479166_1_En_4_Fig9_HTML.jpg)


  图 4-9


  自动调整标签大小


  您也可以双击每个周围的空白区域，并使用*编辑布局空间*对话框定义空间的精确大小。


  要将两个或多个小部件设置为相同大小，请选择它们，右键单击其中任何一个，然后从上下文菜单中选择**设置相同大小 ➤ 设置宽度**（或**相同大小 ➤ 设置高度**）。




  #### 属性


  *属性*窗口分为三个类别：


  *   **属性**选项卡（见图 4-10）：在此部分可编辑所选组件的可编辑属性。属性通常按以下分组进行组织：*属性*、*其他属性*、*布局*和*辅助功能*。


  *   **事件**选项卡（见图 4-11）：允许定义当某些事件（例如，鼠标点击、按键按下等）被触发时，在组件上执行哪些操作。例如，要为一个按钮定义 `actionPerformed()`，请点击
  `actionPerformed` 事件旁边的下拉菜单（一个黑色小向下箭头）；此时会弹出一个窗口，为事件处理程序建议一个名称。该名称由正在编辑的控件名称和事件名称组成。选择事件处理程序的名称后，NetBeans
  会自动打开*源代码*窗口，并将光标置于准备输入事件处理程序代码的位置。你会注意到源代码编辑器包含一些无法编辑的区域。这是必要的，因为这些代码是由 GUI 构建器自动生成的，手动更改这些代码可能会破坏代码与
  GUI 设计器之间的绑定。最后，点击 GUI 设计器中的 **…** 按钮，可以添加、删除或重命名事件处理程序。


  *   **代码**选项卡（见图 4-12）：允许为组件提供自定义代码片段，例如，任何初始化前/初始化后的代码等。


  ### 注意


