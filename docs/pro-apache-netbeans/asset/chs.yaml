  在*类*视图中双击某个类，会打开*实例*视图，显示该类的所有实例列表。该视图实际上与*调试器*部分中描述的*实例*视图相同。左上角显示可用的实例（如果实例过多无法以平面列表显示，则会进行分组），左下角（如果可能）显示对象实例的值表示。右侧，在*字段*视图中显示所选实例的结构，其下方是*引用*视图，显示该实例向上直到垃圾回收根的引用链，该引用链使实例在堆上保持存活。如果出现内存泄漏，并且不太清楚为什么某些实例不会被垃圾回收（例如，某个静态字段持有对该实例的强引用），那么这些信息至关重要。图
