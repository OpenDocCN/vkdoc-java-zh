  \ 类负责控制每一步。它们检查输入值的有效性（通过 `isValid()` 方法），支持上下文相关帮助（通过 `getHelp()` 方法返回帮助上下文），并通过读取设置（`readSettings()`\
  \ 方法）和存储设置（`storeSettings()` 方法，供用户下次访问此面板或其他面板时读取）来初始化可视化面板。通常，您会定义一个包含一些常量属性名称的接口，这些方法会将这些名称作为键来保存属性。如果向导面板的有效状态取决于用户输入，则该面板必须实现\
  \ `addChangeListener()` 和 `removeChangeListener()`，并向其 `ChangeListener` 触发状态更改事件。\n\
  \n*   `AddTaskVisualPanel1`、`AddTaskVisualPanel2`、`AddTaskVisualPanel3`：用于每一步可视化表示的\
