  public void setDueDate(Date dueDate) {\nDate oldValue = this.dueDate;\nthis.dueDate\
  \ = dueDate;\ngetPropertyChangeSupport().firePropertyChange(\"DUE DATE CHANGED\"\
  , oldValue, dueDate);\n}\n...\n}\n清单 9-14\n使 Task 成为可观察对象\n```\n\n然后，必须通知 `TaskNode`\
