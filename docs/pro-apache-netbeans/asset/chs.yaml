  \n图 9-18\n\nTodoFXRCP 应用程序\n\n\n\n## HTML/Java UI API\n\n在前面的章节中，我们了解了如何将 *ToDo*\
  \ Swing 应用程序的 UI 移植到 NetBeans Rich Client Platform 的 *Window* 和 *Explorer and Properties\
  \ System* API，以及 JavaFX。在本节中，我们将了解如何将 UI 移植到新的 HTML/Java UI API。\n\n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig20_HTML.jpg](img/479166_1_En_9_Fig20_HTML.jpg)\n\
  \n图 9-20\n\nView 模块的文件结构\n\n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig19_HTML.jpg](img/479166_1_En_9_Fig19_HTML.jpg)\n\
  \n图 9-19\n\n新建 Portable HTML UI 向导\n\n1.  新建一个名为 `TodoHTMLJava` 的 NetBeans Platform\
  \ 应用程序。\n\n2.  在应用程序中新建一个模块（名称：`View`，代码名称基址：`todo.view`）。\n\n3.  新建一个 Portable\
  \ HTML UI。打开该模块（如果尚未打开），右键点击 *todo.view* 包，然后从弹出菜单中选择 **新建 ➤ 其他…**（见图 9-19）。点击 **下一步**。\n\
  \n4.  提供 `Tasks` 作为 *类名前缀*，为将要创建的按钮提供一个图标，然后点击 **完成**。\n\n5.  生成的文件结构如图 9-20 所示。\n\
  \n右键点击 *View* 模块并选择 **运行**。您应该会看到一个类似于图 9-21 所示的窗口。点击您选择的图标按钮，即可看到 *TasksWindow*\
  \ 选项卡出现。按下 **Ask!** 按钮以显示对话框。\n\n一个运行在 NetBeans RCP 内部的 HTML UI！\n\n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig21_HTML.jpg](img/479166_1_En_9_Fig21_HTML.jpg)\n\
  \n图 9-21\n\n正在运行的示例应用程序\n\n代码仅包含两个文件：\n\n*   `TasksWindow.html`，它构建了应用程序的 UI，并包含\
  \ Java 类的绑定。\n\n*   `TasksWindowCntrl.java`，它包含应用程序的控制器和模型（更具体地说是 *ViewModel* 和\
  \ *Model*）。\n\n```\n\nAsk!\n\nHow are you?\n\nOK?\n\nGood\nBad\n\n清单 9-18\nTasksWindow.html\n\
  ```\n\n这两个窗口是在 `<script>` 标签内定义的。`data-binds`（如果您熟悉 Knockout JS）将 UI 元素与后端 `TasksWindowCntrl.java`\
  \ 绑定。清单 9-18 的第一行指示 UI 在 Java 文件中查找名为 `templateName()` 的方法。在清单 9-19 中，您可以看到定义的 `templateName()`\
  \ 返回字符串 `\"window\"`，该字符串必须与 *html* 文件中 `<script type=\"text/html\" id=\"window\"\
  >` 的 `id` 匹配。\n\n```\n@Model(className = \"TasksWindow\", targetId = \"\", properties\
  \ = {\n@Property(name = \"text\", type = String.class)\n})\npublic final class TasksWindowCntrl\
  \ {\n...\n@ComputedProperty\nstatic String templateName() {\nreturn \"window\";\n\
  }\n@ActionID(\ncategory = \"Tools\",\nid = \"todo.view.TasksWindow\"\n)\n@ActionReferences({\n\
  @ActionReference(path = \"Menu/Tools\"),\n@ActionReference(path = \"Toolbars/File\"\
  ),})\n@NbBundle.Messages(\"CTL_Tasks=Open HTML Hello World!\")\n@OpenHTMLRegistration(\n\
  url = \"TasksWindow.html\",\ndisplayName = \"#CTL_Tasks\",\niconBase = \"todo/controller/resources/icons/taskmrk_tsk.gif\"\
  \n)\npublic static Tasks onPageLoad() {\nreturn new TasksWindow(\"Hello World!\"\
  ).applyBindings();\n}\n清单 9-19\n带有 @Model 定义的 TasksWindowCntrl 类\n```\n\n`TasksWindowCntrl`\
  \ 类在工具栏和 *Tools* 菜单上定义了一个操作。该操作返回生成的 `TasksWindow` 类的一个新实例。`TasksWindow` 类由 `@Model`\
  \ 注解定义。如清单 9-20 所示，它定义了一个名为 `\"text\"`、类型为 `String` 的属性，该属性绑定到 `<input data-bind=\"\
  value: text\"></input>`。因此，传递给 `TasksWindow` 构造函数的文本（`\"Hello World!\"`）会显示在该文本字段中。\n\
  \n```\n\"Hello World!\" ➔ @Property(name = \"text\", type = String.class) ➔ \n清单\
  \ 9-20\n属性到 HTML 的绑定\n```\n\n必要的模型类是从注解生成的，从而节省了您手动输入的时间。\n\n我们在前一章已经看到了 `@Model`\
  \ 注解，它定义了一个代表某种模型的类，以及 `@Property`，它代表该类的属性。我们还看到了一个 `@ComputedProperty` 注解的示例。\n\
  \n`@Function` 注解响应用户界面的操作。例如，当用户点击 **Ask!** 按钮 `(<button data-bind=\"click: showDialog,\
  \ enable: text\">Ask!</button>)` 时，会调用以下函数（见清单 9-21）。\n\n```\n@Function\nstatic\
  \ void showDialog(TasksWindow model) {\nString reply = Pages.showTasksWindowDialog(model.getText());\n\
  if (\"OK\".equals(reply)) {\nmodel.setText(\"Happy World!\");\n} else {\nmodel.setText(\"\
  Sad World!\");\n}\n}\n清单 9-21\n一个 @Function 示例\n```\n\n最后，`@HTMLDialog` 注解用于显示一个对话框（见图\
  \ 9-21 和清单 9-22）。\n\n```\n@HTMLDialog(url = \"TasksWindow.html\")\nstatic void showTasksWindowDialog\
  \ (String t) {\nnew TasksWindowDialog (t, false).applyBindings();\n}\n清单 9-22\n\
  用于显示对话框的 @HTMLDialog\n```\n\n\n\n### TodoHTMLJava\n\n让我们看看如何使用此 API 重建我们的 *ToDo*\
