  \n您也可以使用 *简单验证 API*（`ide/modules/ext/ValidationAPI.jar`）进行验证。您需要将其包装到一个模块中（例如，在\
  \ *TodoRCP* 应用程序的 *库* 模块中），并将 `org.netbeans.validation.api` 设为公开。您还可以将 `ValidationPanel`\
  \ 添加到面板中，以便在您的面板中使用它（借助 *面板管理器*）。该 API 提供了一些有用的验证器：`REQUIRE_NON_EMPTY_STRING`、`NO_WHITESPACE`、`REQUIRE_VALID_INTEGER`、`REQUIRE_NON_NEGATIVE_NUMBER`、`numberRange(minValue,\
  \ maxValue)`、`EMAIL_ADDRESS`、`FILE_MUST_EXIST`、`URL_MUST_BE_VALID`、`REQUIRE_JAVA_IDENTIFIER`、`REQUIRE_VALID_FILENAME`。如果您对它们不满意，也可以创建自己的验证器。一旦您将\
