  }\n}\n清单 9-15\nTaskNode 更改通知\n```\n\n现在你已拥有功能完备的视图和模型类，可以用使用持久化存储的真实逻辑来替换模型类的模拟实现。在大型应用程序项目中，你可以让一个团队负责\
  \ UI（像你一样依次构建两个原型），另一个团队负责业务和持久化逻辑（最好采用测试驱动开发，即 TDD）。他们可以并行工作，最后汇合，将功能性的视图和控制器实现与功能性的模型实现整合在一起。\n\
  \n本步骤（步骤 2）的大部分工作只是编码。NetBeans IDE 提供了优秀的代码编辑器和调试器，带来了常见的好处：代码补全、Javadoc 集成和重构支持。但\
  \ NetBeans IDE 的功能不止于此：它可以轻松构建新的插件模块，以打包你的项目编码标准，例如项目模板、控制器类模板等。\n\n在本书的源代码中，你将找到\
  \ `TaskManagerDB`，它是 `TaskManagerInterface` 的另一个实现，用于将任务持久化到 HSQLDB 数据库。**文件**菜单下的最后两个操作——**新建任务列表**和**打开任务列表**——的实现应该很直接。\n\
  \n## JavaFX 与 NetBeans 平台\n\n在本节中，我们将学习如何将 NetBeans 平台与 JavaFX 集成。JavaFX 包含在 JDK\
  \ 8 至 10 版本中。从版本 11 开始，它被独立开发，可以从 Gluon 网站（[`https://gluonhq.com/products/javafx/`](https://gluonhq.com/products/javafx/)）下载。\n\
  \n如果你希望开发 JavaFX 应用程序的 GUI，Gluon 的 *SceneBuilder*（[`https://gluonhq.com/products/scene-builder/`](https://gluonhq.com/products/scene-builder/)）也很有用。要将\
  \ *SceneBuilder* 与 NetBeans 集成，请按照以下步骤操作：\n\n1.  在 NetBeans 中，导航至 **工具 ➤ 选项 ➤ Java\
  \ ➤ JavaFX**（Windows/Linux）或 **NetBeans ➤ 偏好设置 ➤ Java ➤ JavaFX**（MacOSX），如果 JavaFX\
  \ 支持尚未激活，请点击**激活**。\n\n2.  激活完成后，将 *Scene Builder Home* 设置为 Gluon 目录（在 Mac 上通常为\
  \ `/Applications/SceneBuilder`）。某些 Windows 安装程序在安装 *SceneBuilder* 时不会询问目录。*SceneBuilder*\
  \ 默认安装在 `C:\\Program Files\\SceneBuilder` 中，早期版本则安装在 `C:\\Users\\<YourUser>\\AppData\\\
  Local\\SceneBuilder` 中。\n\n3.  点击**确定**，即可开始使用。\n\n\n\n### 注意！\n\n如果 NetBeans 提示“所选位置...不代表有效的\
  \ Java FX Scene Builder 安装”，请执行以下变通方法。\n\n*   导航到 *SceneBuilder* 的安装目录。\n\n*   进入\
  \ `app` 文件夹。\n\n*   在同一文件夹中，将 `SceneBuilder.cfg` 复制一份并重命名为 `SceneBuilder.properties`。\n\
  \nApache NetBeans 提供了两种开发 JavaFX 应用程序的方式：使用 *Ant* 或使用 *Maven*。如果你希望使用 Java 11 和\
  \ JavaFX 11，那么截至本文撰写时，使用 Ant 的向导在 Apache NetBeans 11 中无法正常工作。请观看此视频（[`https://www.youtube.com/watch?v=l9aoicDiQ_A`](https://www.youtube.com/watch%253Fv%253Dl9aoicDiQ_A)）了解如何使用\
  \ Ant 开发 JavaFX 11 应用程序。\n\n开发 *ToDo* Swing 应用程序的 JavaFX 版本超出了本章的范围。在本书的源代码中，你会找到\
  \ *TodoFX*，这是一个独立的 JavaFX 10 应用程序。图 9-16 展示了源代码的结构。`todofx.model` 包包含模型的一个副本，你可以使用内存存储的\
  \ `TaskManager` 或持久化的 `TaskManagerDB` 类。应用程序的两个窗口（`TaskMain.fxml` 和 `TaskDetailsDialog.fxml`）使用了\
  \ FXML，并通过 *SceneBuilder* 构建。`Stage`、`Scene` 等对象在 `Main` 类中创建。\n\n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig16_HTML.jpg](img/479166_1_En_9_Fig16_HTML.jpg)\n\
  \n图 9-16\n\nTodoFX 应用程序源代码结构\n\n要构建一个使用 JavaFX 作为其 GUI 的 NetBeans RCP 应用程序，请遵循以下步骤：\n\
  \n1.  创建一个新的 **NetBeans 平台应用程序**，如我们在第 7 章中所学，并将其命名为 *TodoFXRCP*。\n\n2.  创建两个模块：*Model*（`todo.model`）和\
  \ *ViewController*（`todo.viewcontroller`），如我们在第 7 章中所学。\n\n3.  将本章开头开发的 *TodoRCP*\
  \ 应用程序中 *Model* 模块的内容复制到 *TodoFXRCP* 的 *Model* 模块中（见图 9-17）。\n\n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig17_HTML.jpg](img/479166_1_En_9_Fig17_HTML.jpg)\n\
  \n图 9-17\n\nTodoFXRCP 应用程序 Model 模块\n\n1.  向 *View* 模块添加一个新的 `TopComponent`；将其命名为\
  \ `TasksTopComponent`，就像我们为 *TodoRCP* 应用程序所做的那样。\n\n2.  从 *TodoFX* 应用程序中复制文件 `TaskMain.fxml`、`TaskMainController.java`、`TaskDetailsDialog.fxml`、`TaskDetailsDialogController.java`、`TaskWrapper.java`\
  \ 和 `TaskListWrapper.java` 到 *TodoFXRCP* 的 `todo.viewcontroller` 中。添加必要的模块（以及对 *Model*\
  \ 模块的依赖）。确保更新 *FXML* 文件中的 `fx:controller` 以指向正确的控制器，例如 `fx:controller=\"todo.viewcontroller.TaskMainController\"\
  `。还需要进行一些其他修改，例如，从默认查找中检索 `TaskManager`，而不是使用其单例方法。\n\n如果你使用的 JDK 版本未集成 JavaFX（例如\
  \ JDK 7 或 11），则需要创建一个库包装器来包含 `jfxrt.jar`。正如我们为 TodoRCP 应用程序所做的那样，创建一个名为 *Libraries*（`lib`）的新模块，并包装\
  \ `hsqldb.jar` 和 `jfxrt.jar`（对于 JavaFX 11，你至少需要添加 `javafx.base.jar`、`javafx.control.jar`\
  \ 和 `javafx.fxml.jar`）。不要忘记在模块的 *API 版本控制* 类别中将所需的包设为 `public`，并让 *ViewController*\
  \ 模块依赖于 *Libraries* 模块。\n\n1.  在设计视图中，将 `TasksTopComponent` 的布局更改为 `BorderLayout`。然后，添加清单\
  \ 9-16 中的代码（新增内容以粗体显示）。\n\n```\npublic final class TasksTopComponent extends TopComponent\
  \ {\nprivate static JFXPanel fxPanel;\npublic TasksTopComponent() {\ninitComponents();\n\
  setName(Bundle.CTL_TasksTopComponent());\nsetToolTipText(Bundle.HINT_TasksTopComponent());\n\
  putClientProperty(TopComponent.PROP_CLOSING_DISABLED, Boolean.TRUE);\ninit();\n\
  }\nprivate void init() {\nfxPanel = new JFXPanel();\nadd(fxPanel, BorderLayout.CENTER);\n\
  Platform.setImplicitExit(false);\nPlatform.runLater(() -> createScene());\n}\nprivate\
  \ void createScene() {\ntry {\nParent root = FXMLLoader.load(getClass().getResource(\"\
  TaskMain.fxml\"));\nScene scene = new Scene(root, Color.LIGHTBLUE);\nfxPanel.setScene(scene);\n\
  } catch (IOException ex) {\nExceptions.printStackTrace(ex);\n}\n}\n清单 9-16\n支持 JavaFX\
  \ 的 TasksTopComponent\n```\n\n或者，如果你需要引用控制器：\n\n```\nprivate TaskMainController\
  \ mainController;\nprivate void createScene() {\ntry {\nURL location = getClass().getResource(\"\
  TaskMain.fxml\");\nFXMLLoader fxmlLoader = new FXMLLoader();\nfxmlLoader.setLocation(location);\n\
  fxmlLoader.setBuilderFactory(\nnew JavaFXBuilderFactory());\nParent root = fxmlLoader.load(location.openStream());\n\
  Scene scene = new Scene(root, Color.LIGHTBLUE);\nfxPanel.setScene(scene);\nmainController\
  \ =\n(TaskMainController) fxmlLoader.getController();\n} catch (IOException ex)\
  \ {\nExceptions.printStackTrace(ex);\n}\n}\n```\n\n将 JavaFX 集成到 NetBeans 平台的魔力由\
  \ `JFXPanel` 提供。当创建第一个 `JFXPanel` 对象时，它会初始化 JavaFX 运行时（*JavaFX 应用程序线程*）。当最后一个 `JFXPanel`\
  \ 被销毁时，JavaFX 运行时退出；这就是我们设置 `Platform.setExplicitExit(false)` 的原因。此设置对于关闭然后重新打开支持\
  \ JavaFX 的窗口是必要的。\n\n不要忘记“凯撒的归凯撒，上帝的归上帝。”换句话说，使用 `Platform.runLater(() -> {...});`\
  \ 在 *JavaFX 应用程序线程* 中执行 JavaFX 代码，并使用 `SwingUtilities.invokeLater(() -> { ...});`\
  \ 在 EDT 线程中执行 Swing 代码。\n\n`createScene()` 中的代码类似于 JavaFX 应用程序的 `start()` 方法中的代码。也将\
  \ *TodoFX* 的 `Main` 类中的 `showTaskDetailsDialog()` 方法复制到 `TasksTopComponent` 中（见清单\
  \ 9-17）。\n\n```\npublic boolean showTaskDetailsDialog(TaskWrapper task) {\ntry {\n\
  // 加载 fxml 文件并为弹出对话框创建一个新舞台。\nFXMLLoader loader = new FXMLLoader();\nloader.setLocation(\n\
  TasksTopComponent.class.getResource(\"TaskDetailsDialog.fxml\"));\n//...\n清单 9-17\n\
  showTaskDetailsDialog() 方法\n```\n\n只需少量修改，*TodoFXRCP* 就可以执行了。请注意，我们没有修改 FXML 文件（除了设置其控制器的正确路径）。\n\
