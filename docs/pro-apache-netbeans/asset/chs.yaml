  \ {\n//         break;\n//     }\n//     }\n// }\n}\n}\n清单 10-21\n由快速搜索提供程序向导生成的\
  \ TaskSearchProvider\n```\n\n`SearchRequest` 类提供了快速搜索请求的描述。方法 `getText()` 和 `getShortcut()`\
  \ 允许你访问在搜索字段中输入的文本和快捷键。通常，在搜索字段中输入的文本会与 `Lookup` 中的对象进行匹配。匹配成功后，该对象会被添加到 `SearchResponse`\
  \ 中，`SearchResponse` 是用于收集 `SearchRequest` 结果并将其显示在搜索字段下拉列表中的响应对象。\n\n例如，清单 10-22\
  \ 提供了一个 `SearchProvider` 的实现，该实现会查找 `TasksTopComponent` 中的所有 `Node`，然后在其 `Lookup`\
  \ 中搜索 `Task` 对象。\n\n```\n@Override\npublic void evaluate(final SearchRequest request,\
  \ final SearchResponse response) {\nSwingUtilities.invokeLater(new Runnable() {\n\
  @Override\npublic void run() {\nTopComponent tc = WindowManager.getDefault().findTopComponent(\"\
