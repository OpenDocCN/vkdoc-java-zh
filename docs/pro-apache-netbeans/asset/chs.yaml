  图 1-8


  添加依赖项对话框


  其他 Maven 支持功能包括：能够在 Maven 构建中集成 SureFire 测试；将 Apache Maven 用作各种项目类型（包括其他 JVM 语言、Apache
  NetBeans 插件等）的构建系统；以及通过依赖项的自动补全功能轻松编辑 POM 文件。




