  \ 的新文件** 和 **带 HTML/JS UI 的新文件** 会将一个 *文件类型* 注册到应用程序的 **新建文件** 或 **新建项目** 对话框中，并置于您选择的\
  \ *类别* 下。*自定义* 注册类型则不会，它需要从代码中的某个位置（通常是从一个 `Action`）以编程方式调用。\n\n![../images/479166_1_En_10_Chapter/479166_1_En_10_Fig7_HTML.jpg](img/479166_1_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7\n新建向导向导\n\n对于自定义向导，您可以选择向导是按固定的、不变的线性顺序通过一系列独立步骤（*静态*），还是根据用户的选择*动态*地通过步骤（即，用户可以跳过某些步骤）。第一个选项生成的代码允许用户按顺序向前或向后浏览面板，而不会分支或跳过面板。第二个选项生成的代码默认让您完全控制面板的顺序，并允许创建动态的面板排序。\n\
  \n静态向导\n\n首先，让我们创建一个包含三个面板的自定义静态向导。在 *向导类型* 对话框中点击 **下一步** 会进入 *名称和位置* 对话框。在第二步中将\
  \ *类名前缀* 设置为 `AddTask`，然后点击 **完成**。您最终会得到以下文件：\n\n*   `AddTaskWizardAction`：\n \
  \   用于调用向导的动作。您需要取消注释顶部的注解，才能将该动作注册到菜单或工具栏。清单 10-12 展示了这些注解。\n\n*   在 `actionPerformed()`\
  \ 方法的末尾，您需要收集所有数据并创建/更新您的模型。有关示例，请参见清单 10-13。\n\n```\n@ActionID(category=\"...\"\
  ,   id=\"todo.view.wizard.AddTaskWizardAction\")\n@ActionRegistration(displayName=\"\
  打开 AddTask 向导\")\n@ActionReference(path=\"Menu/Tools\", position=...)\n清单 10-12\n\
