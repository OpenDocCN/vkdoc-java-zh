  \ API 的扩展。 |\n\n\n\n11. 为 NetBeans 编写插件\n\nApache NetBeans 是一个模块化 IDE，因此具有极强的可扩展性。不仅扩展\
  \ IDE 本身很容易，而且利用 NetBeans 平台开发完整的富桌面应用程序也非常简单。在本章中，我们将讨论如何构建模块（即“插件”），以便扩展 IDE 以包含新功能。例如，新的编程语言层出不穷，通过开发新插件来扩展\
  \ Apache NetBeans 以支持新语言是很容易的。\n\n模块通常作为插件添加到 IDE 中。在 Apache NetBeans 中，**插件**菜单允许用户管理机器上可用、已安装或已下载的模块，以便加载或卸载它们，从而影响\
  \ Apache NetBeans 的外观或功能。有一个在线门户网站（[`https://netbeans.apache.org/plugins/index.html`](https://netbeans.apache.org/plugins/index.html)），其中包含由社区开发的插件。用户可以访问该门户网站搜索可下载的插件。如果你开发了一个插件，可以将其发布到插件门户网站上供所有人使用。\n\
  \n在本章中，我们将通过一个教程来学习如何为 NetBeans 创建插件。我们将重点介绍一个区块链用例。请参考本书的源代码仓库作为参考。\n\n插件的用途\n\n\
  我们将为区块链实现创建一个 NetBeans 插件。除了支持从头开始设置一个新的区块链项目外，你还将学习如何创建支持新语言的功能：\n\n*   识别模型文件\n\
  *   语法高亮\n*   错误检测\n*   代码补全\n*   模型文件的导航视图\n\n你还将了解如何对插件进行签名，并与其他 NetBeans 用户共享。\n\
  \n区块链简介\n区块链是一个去中心化的点对点网络。该网络的每个参与者都拥有一份共享账本的副本，数据只能通过数字签名的交易进行追加。区块链保证了账本的不可篡改性。\n\
  \n一个区块包含一定数量的交易和一些元数据。交易和区块都是唯一的，通过哈希值进行标识。该区块还包含按时间顺序排列的前一个区块的哈希值。链中的第一个区块没有前驱，被称为创世区块。这些区块共同构成了区块链。图\
  \ 11-1 展示了两个区块及其哈希值，以及前一个区块的哈希值。\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig1_HTML.jpg](img/479166_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1 区块在区块链中的连接方式\n\n区块链可以分为*公有链*和*私有链*。公有链的一个典型例子是*以太坊*。公有链内置了*工作量证明*或*权益证明*等机制，以防止欺诈行为。私有链的一个例子是*超级账本*。这个开源项目由\
  \ Linux 基金会托管，旨在推动区块链技术的发展。“私有”一词意味着对网络的访问是受限的。每个节点都必须进行身份验证，因此无需采用上述机制来防范欺诈攻击，敏感信息也保留在网络内部。如果你想深入了解超级账本，请访问网站\
  \ [`www.hyperledger.org`](http://www.hyperledger.org)。\n\n当作者开始编写本书时，设置新*超级账本*项目的推荐方式是使用*Composer*：[`https://hyperledger.github.io/composer/latest/`](https://hyperledger.github.io/composer/latest/)。一个超级账本项目包含一个模型文件，该文件使用*超级账本\
  \ Composer 语言*编写。这些文件以 `cto` 后缀结尾，在本章中我们将它们称为 cto 文件。该语言定义了业务网络中使用的资源：\n\n*   **资产：**\
  \ 代表一个有价值的对象，例如，一栋房子；\n\n\n\n*   **参与者：** 代表参与业务的各方；\n*   **交易：** 由参与者提交，是一种影响资产的状态变更；\n\
  *   **枚举：** 与 Java 中的枚举类似，是一组值的集合；\n*   **事件：** 可由交易函数触发，应用程序可以订阅事件。\n\n该语言为资源中的字段声明提供了一系列基本类型：\n\
  \n*   `Boolean`：布尔值，值为 true 或 false；\n*   `String`：UTF-8 编码的字符串；\n*   `Integer`：32\
  \ 位有符号整数；\n*   `Long`：64 位有符号整数；\n*   `Double`：双精度 64 位数值；\n*   `DateTime`：符合 ISO-8601\
  \ 标准的时间实例，可包含时区和 UTC 偏移量。\n\nHyperledger Composer 语言并未定义交易的规则；该逻辑属于另一个用 JavaScript\
  \ 编写的文件。\n\nHyperledger 准备工作\n为了正常使用 Hyperledger，我们需要安装一些工具。请确保您的机器满足[`https://hyperledger.github.io/composer/latest/installing/installing-prereqs.html`](https://hyperledger.github.io/composer/latest/installing/installing-prereqs.html)中描述的先决条件。由于我们将开发自己的编辑器，因此可以跳过安装\
  \ VSCode 的部分。\n\n完成这些步骤后，请全局安装 Hyperledger Composer 命令行工具、应用程序生成器和 Yeoman：\n\n```\n\
  npm install -g composer-cli@0.20\nnpm install -g generator-hyperledger-composer@0.20\n\
  npm install -g yo\n```\n\n您还应该安装 Hyperledger Composer Playground，它提供了一个用于配置、部署和测试业务网络的用户界面。\n\
  \n```\nnpm install -g composer-playground@0.20\n```\n\nHyperledger Fabric 是业务网络的运行时环境。有一些脚本可以安装此运行时。请下载到您选择的目录中：\n\
  \n```\nmkdir ~/fabric-dev-servers && cd ~/fabric-dev-servers\ncurl -O https://raw.githubusercontent.com/hyperledger/composer-tools/master/packages/fabric-dev-servers/fabric-dev-servers.tar.gz\n\
  tar -xvf fabric-dev-servers.tar.gz\n```\n\n执行以下命令：\n\n```\nexport FABRIC_VERSION=hlfv12\n\
  ./downloadFabric.sh\n```\n\n您已完成 Hyperledger 工作环境的准备。\n更多详细信息，请参阅安装说明：[`https://hyperledger.github.io/composer/latest/installing/development-tools.html`](https://hyperledger.github.io/composer/latest/installing/development-tools.html)。\n\
  \n让我们在控制台中使用 Yeoman 创建一个新的骨架业务网络。该业务网络将在插件开发过程中使用。\n\n```\nyo hyperledger-composer:businessnetwork\n\
  ? Business network name: ledger\n? Description: sample\n? Author name: admin\n?\
  \ Author email: admin@web.org\n? License: Apache-2.0\n? Namespace: org.example.biznet\n\
  ? Do you want to generate an empty template network? No: generate a populated sample\
  \ network\ncreate package.json\ncreate README.md\ncreate models/org.example.biznet.cto\n\
  create permissions.acl\ncreate .eslintrc.yml\ncreate features/sample.feature\ncreate\
  \ features/support/index.js\ncreate test/logic.js\ncreate lib/logic.js\n```\n\n\
  创建一个新模块\n\n底层我们使用 Maven 作为构建工具。\n通过以下步骤启动一个新模块：“文件” ➤ “新建项目” ➤ “Java with Maven”\
  \ ➤ “NetBeans 模块”。图 11-2 展示了 NetBeans 的项目向导。\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig2_HTML.jpg](img/479166_1_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2\n使用 Maven 创建新 NetBeans 模块的向导\n\n接下来，为您的项目取一个有意义的名称，例如“ledger”，然后选择您的目标平台，可以从\
  \ RELEASE82 开始。点击“完成”以结束操作。\n\n我们将添加测试依赖项。选择项目节点“测试依赖项”，右键单击，然后选择“添加依赖项”。这将弹出如图\
  \ 11-3 所示的对话框。\n\n\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig3_HTML.jpg](img/479166_1_En_11_Fig3_HTML.jpg)\n\
  \n**图 11-3**\n添加依赖项的对话框\n\n将作用域更改为 test，取消勾选“仅限 NetBeans”，并使用查询字段查找以下依赖项：\n\n* \
  \  `org.junit.jupiter:junit-jupiter-api:5.5.1`\n\n*   `org.junit.jupiter:junit-jupiter-engine:5.5.1`\n\
  \n*   `org.hamcrest:hamcrest-core:2.1`\n\n*   `org.mockito:mockito-junit-jupiter:2.28.2`\n\
  \n要启用 Mockito 中一个用于为 final 类创建模拟对象的孵化功能，请添加一个新文件 `src/test/resources/mockito-extensions/org.mockito.plugins.MockMaker`，其中包含一行内容：\n\
  \n```\nmock-maker-inline\n```\n\n有关 Mockito 库的更多信息，请参见以下链接：\n[`http://static.javadoc.io/org.mockito/mockito-core/2.24.0/org/mockito/Mockito.html`](http://static.javadoc.io/org.mockito/mockito-core/2.24.0/org/mockito/Mockito.html)。\n\
  \n所有与 NetBeans 相关的 Maven 依赖项都会有一个标签，显示你用于构建插件的版本。建议添加一个保存此版本的新属性，这样你就可以轻松地更改版本。\n\
  \n```\nUTF-8\n1.8\n1.8\nRELEASE82\n4.7.1\n\n```\n\n项目模板\n业务网络存档包含多个文件。例如，有一个 JavaScript\
  \ 文件用于定义适用于交易的业务规则。模型文件定义了业务中涉及的基本概念。为了避免为新项目手动创建这些文件中的每一个，我们将创建一个新的项目类型，它将出现在项目向导中。\n\
  \n我们从一个新的 Node.js 应用程序开始，它将作为我们模板的源文件夹。因此，再次启动向导并创建一个新项目，如图 11-4 所示。\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig4_HTML.jpg](img/479166_1_En_11_Fig4_HTML.jpg)\n\
  \n**图 11-4**\n包含 Node.js 应用程序的向导\n\n删除 `nbproject` 下的 `private` 目录，以及 `main.js`\
  \ 文件。\n将上一节中创建的业务网络源文件复制到此项目的 `src` 目录中。\n\n为了支持从 NetBeans 发布业务网络，请在 IDE 中编辑 `package.json`\
  \ 的脚本部分：\n\n```\n\"scripts\": {\n\"publish\": \"mkdirp ./dist && composer archive\
  \ create --sourceType dir --sourceName . -a ./dist/ledger.bna\",\n\"pretest\": \"\
  npm run lint\",\n\"lint\": \"eslint .\",\n\"test\": \"nyc mocha -t 0 test/*.js &&\
  \ cucumber-js\"\n}\n```\n\n切换到 IDE 中的“文件”窗口，并创建一个包含以下内容的新 `.gitignore` 文件：\n\n```\n\
  dist/\nnode_modules/\n```\n\n编辑 `nbproject` 文件夹中的 `project.properties` 文件。\n\n```\n\
  auxiliary.org-netbeans-modules-javascript-nodejs.enabled=true\nrun.as=node.js\n\
  files.encoding=UTF-8\nsource.folder=\n```\n\n更改 `project.xml` 文件中的 name 标签：\n\n\
  ```\n\norg.netbeans.modules.web.clientproject\n\nHyperledger Business Network\n\n\
  ```\n\nzip 文件的文件夹应如下所示：\n\n```\n.\n├── README.md\n├── nbproject\n│   ├── project.properties\n\
  │   └── project.xml\n├── features\n│   ├── sample.feature\n│   └── support\n│  \
  \ └── index.js\n├── lib\n│   └── logic.js\n├── models\n│   └── org.example.biznet.cto\n\
  ├── package.json\n├── permissions.acl\n└── test\n└── logic.js\n```\n\n让我们构建一个基于此项目的模板。在\
  \ NetBeans 的“项目”窗口中选择该项目，然后右键单击。接着创建一个新的项目模板：“新建文件” ➤ “模块开发” ➤ “项目模板”。参见图 11-5。\n\
  \n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig5_HTML.jpg](img/479166_1_En_11_Fig5_HTML.jpg)\n\
  \n**图 11-5**\n创建项目模板的向导\n\n选择之前创建的 Node.js 项目（图 11-6）。\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig6_HTML.jpg](img/479166_1_En_11_Fig6_HTML.jpg)\n\
  \n**图 11-6**\n选择项目模板的向导\n\n点击“下一步”，输入一个有意义的名称，使用名为“template”的包，然后点击“完成”。参见图 11-7。\n\
  \n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig7_HTML.jpg](img/479166_1_En_11_Fig7_HTML.jpg)\n\
  \n**图 11-7**\n设置项目模板名称和位置的向导\n\n此过程将向 `pom.xml` 添加一些依赖项，创建几个新类、一些资源，以及一个包含另一个 Node.js\
  \ 项目内容的 zip 文件。\n\n项目模板的起点是 `HyperledgerWizardIterator` 的 `TemplateRegistration`\
  \ 注解。让我们更改那里的图标。\n\n```\n...\n@TemplateRegistration(folder = \"Project/ClientSide\"\
  ,\ndisplayName = \"#Hyperledger_displayName\",\ndescription = \"HyperledgerDescription.html\"\
  ,\niconBase = \"org/netbeans/modules/hyperledger/template/blockchain.png\",\ncontent\
  \ = \"HyperledgerProject.zip\")\n@Messages(\"Hyperledger_displayName=Hyperledger\"\
  )\npublic class HyperledgerWizardIterator implements WizardDescriptor./*Progress*/InstantiatingIterator\
  \ {\n...\n```\n\n你还可以扩展 `HyperledgerDescription.html`，为插件的用户提供更多信息。\n当我们运行插件时，已经可以看到一个用于\
  \ Hyperledger 的新项目模板。它允许你从头开始创建一个新项目。\n\n文件支持\n然而，当我们打开模型文件夹中的 cto 文件时，我们发现还没有对此文件的支持。让我们创建基础，以便\
  \ NetBeans 能够识别此文件类型。\n\n选择菜单“文件” ➤ “新建文件” ➤ “模块开发” ➤ “文件类型”。这将调出如图 11-8 所示的向导。\n\
  \n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig8_HTML.jpg](img/479166_1_En_11_Fig8_HTML.jpg)\n\
  \n**图 11-8**\n新建文件类型的向导\n\n它将为我们的新文件类型创建支持。图 11-9 显示了向导的下一步。定义 MIME 类型和文件扩展名，然后点击“下一步”继续。图\
  \ 11-10 显示了最后一步。在那里，我们为类名前缀输入“Cto”，并选择一个图标和包。请确保取消选中“使用多视图”复选框。然后点击“完成”。\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig10_HTML.jpg](img/479166_1_En_11_Fig10_HTML.jpg)\n\
  \n**图 11-10**\n步骤 3：名称、图标和位置\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig9_HTML.jpg](img/479166_1_En_11_Fig9_HTML.jpg)\n\
  \n**图 11-9**\n步骤 2：编辑文件识别\n\n接下来，创建一个新的接口，其中包含一些我们将在创建更多功能时使用的常量。\n\n```\npackage\
  \ org.netbeans.modules.hyperledger.cto;\nimport org.netbeans.api.annotations.common.StaticResource;\n\
  public interface FileType {\n@StaticResource\nString ICON = \"org/netbeans/modules/hyperledger/cto/value_16x16.png\"\
  ;\nString MIME = \"text/cto\";\n}\n```\n\n你可以将 `CtoDataObject` 中的 MIME 类型和图标路径的字符串值替换为对接口中常量的引用。\n\
  \n```\n@MIMEResolver.ExtensionRegistration(\ndisplayName = \"#LBL_Cto_LOADER\",\n\
  mimeType = FileType.MIME,\nextension = {\"cto\", \"CTO\"},\nposition=120\n)\n@DataObject.Registration(\n\
  mimeType = FileType.MIME,\niconBase = FileType.ICON,\ndisplayName = \"#LBL_Cto_LOADER\"\
  ,\nposition = 300\n)\n```\n\n当你运行插件并使用“收藏夹”窗口打开之前创建的文件时，你会看到 NetBeans 现在能够识别新的文件类型，并使用之前添加的图标进行指示。\n\
  但是，还没有语法着色和自动补全功能。所以，让我们来处理这个问题。\n\n\n\n语法高亮\n语言支持包含一个词法分析器和一个解析器。词法分析器接收源代码并将其转换为词法单元。解析器基于这些词法单元创建语法树。有多种工具可用于创建词法分析器/解析器，但在本教程中，我们将使用\
  \ ANTLR。关于 ANTLR 有大量文档可供参考，因此在编写新语法时，你应该能相对轻松地入门。\n\n对于此高亮功能，我们仅使用词法分析器。因此，我们需要词法分析器语法文件。该文件包含该语言特有的词法单元。你可以从\
  \ ANTLR 语法仓库复制 `CtoLexer.g4` 文件：[`https://github.com/antlr/grammars-v4/tree/master/cto`](https://github.com/antlr/grammars-v4/tree/master/cto)。建议将该文件放置在项目资源文件夹的子目录中，例如\
  \ `org.netbeans.modules.hyperledger.cto.grammar`。\n\n我们还需要调整 Maven 的 `pom.xml`。将\
  \ ANTLR 插件添加到构建部分，并将 ANTLR 运行时和 NetBeans 的 Lexer API 添加到依赖部分。插件的版本应与 ANTLR 依赖的版本匹配。以下代码片段展示了\
  \ `pom.xml` 中的 ANTLR 插件和运行时依赖。\n\n```\n...\n\norg.antlr\nantlr4-maven-plugin\n${antlr.version}\n\
  \nantlr\n\nantlr4\n\n...\n\norg.antlr\nantlr4-runtime\n${antlr.version}\n\norg.netbeans.api\n\
  org-netbeans-modules-lexer\n${netbeans.version}\n\n...\n```\n\n构建成功后，我们将在 `target/generated-sources`\
  \ 目录下得到一个 `CtoLexer.java` 文件。\n\n接下来，我们需要设置一个提供该语言的服务。因此，我们将创建一个新类 `CtoLanguageProvider`，它继承自\
  \ NetBeans 的 `LanguageProvider`：\n\n```\n...\n@ServiceProvider(service=LanguageProvider.class)\n\
  public class CtoLanguageProvider extends LanguageProvider{\nprivate final Supplier>\
  \ supplier = () -> new CtoLanguageHierarchy().language();\n@Override\npublic Language\
  \ findLanguage(String mime) {\nreturn (FileType.MIME.equals(mime)) ? supplier.get()\
  \ : null;\n}\n@Override\npublic LanguageEmbedding findLanguageEmbedding(Token token,\n\
  LanguagePath lp, InputAttributes ia) {\nreturn null;\n}\n}\n```\n\n`CtoLanguageHierarchy`\
  \ 类是对 cto 语言的定义。`createTokenIds` 方法将基于 ANTLR 语法文件返回所有词法单元。它还提供了 `Lexer` 接口的实现，该接口将输入中读取的字符映射到\
  \ cto 词法单元。\n\n```\n...\npublic class CtoLanguageHierarchy extends LanguageHierarchy\
  \ {\nprivate final List tokens;\nprivate final Map idToToken;\npublic CtoLanguageHierarchy()\
  \ {\ntokens = TokenTaxonomy.getDefault().allTokens();\nidToToken = TokenTaxonomy.getDefault().getIdTokenMap();\n\
  }\n@Override\nprotected Collection createTokenIds() {\nreturn tokens;\n}\n@Override\n\
  protected Lexer createLexer(LexerRestartInfo info) {\nreturn new CtoEditorLexer(info,\
  \ idToToken);\n}\n@Override\nprotected String mimeType() {\nreturn FileType.MIME;\n\
  }\n}\n```\n\n`TokenTaxonomy` 为词法单元提供了分类，以便我们后续可以为不同组的词法单元选择不同的样式。\n\n```\npublic\
  \ enum TokenTaxonomy {\nINSTANCE;\nprivate final List tokens;\nprivate TokenTaxonomy()\
  \ {\ntokens = new ArrayList();\nint max = CtoLexer.VOCABULARY.getMaxTokenType()\
  \ + 1;\nfor (int i = 1; i  mapping = t -> {\nif (t  allTokens() {\nreturn tokens;\n\
  }\npublic List tokens(Category category) {\nreturn tokens.stream().filter(t -> category.name().equals(t.primaryCategory())).collect(toList());\n\
  }\npublic Map getIdTokenMap() {\nreturn tokens.stream().collect(toMap(CtoTokenId::ordinal,\
  \ t -> t));\n}\n}\n```\n\n类别本身只是另一个用于分组的 `enum`：\n\n```\npublic enum Category {\n\
  KEYWORD, TYPE, FIELD, SEPARATOR, VALUE, COMMENT, TEXT;\n}\n```\n\n`NameMapping`\
  \ 接口使用一个静态方法，通过底层的 `CtoLexer.VOCABULARY` 将 `int` 映射为 `String`。词汇表包含一些我们后续希望避免的字符；因此，`map`\
  \ 方法会从字符串中移除不需要的字符。\n\n```\npublic interface NameMapping {\npublic static String\
  \ map(int type) {\nString name = CtoLexer.VOCABULARY.getDisplayName(tokenType);\n\
  return name.replaceAll(\"^\\\\'|\\\\'$\", \"\");\n}\n}\n```\n\n`CtoTokenId` 类是对\
  \ NetBeans Lexer API 中 `org.netbeans.api.lexer.TokenId` 接口的一个非常简单的实现。\n\n```\npublic\
  \ class CtoTokenId implements TokenId{\nprivate final String name;\nprivate final\
  \ String primaryCategory;\nprivate final int id;\npublic CtoTokenId(String name,\
  \ String primaryCategory, int id) {\nthis.name = name;\nthis.primaryCategory = primaryCategory;\n\
  this.id = id;\n}\n@Override\npublic String name() {\nreturn name;\n}\n@Override\n\
  public int ordinal() {\nreturn id;\n}\n@Override\npublic String primaryCategory()\
  \ {\nreturn primaryCategory;\n}\n}\n```\n\n`CtoEditorLexer` 类是 Lexer API 和 ANTLR\
  \ 之间的桥梁。它将 ANTLR 词法单元转换为 `CtoTokenId`。如你所见，从 id 到词法单元的映射被传递给了构造函数。我们将提供第二个构造函数，用于测试目的。这样，我们可以在测试期间轻松使用模拟对象来提供词法单元。\n\
  \n```\npublic final class CtoEditorLexer implements Lexer {\nprivate final LexerRestartInfo\
  \ info;\nprivate final Map idToToken;\nprivate final Function> tokenFactory;\nprivate\
  \ final Supplier tokenSupplier;\npublic CtoEditorLexer(LexerRestartInfo info, Map\
  \ idToToken) {\nthis(info, idToToken, new TokenSupplier(info.input()));\n}\nCtoEditorLexer(LexerRestartInfo\
  \ info, Map idToToken,\nSupplier tokenSupplier) {\nthis.info = info;\nthis.idToToken\
  \ = idToToken;\nthis.tokenSupplier = tokenSupplier;\nthis.tokenFactory = id -> info.tokenFactory().createToken(id);\n\
  }\n@Override\npublic Token nextToken() {\nToken createdToken = null;\norg.antlr.v4.runtime.Token\
  \ token = tokenSupplier.get();\nint type = token.getType();\nif (type != -1) {\n\
  createdToken = createToken(type);\n} else if (info.input().readLength() > 0) {\n\
  createdToken = createToken(CtoLexer.WS);\n}\nreturn createdToken;\n}\nprivate Token\
  \ createToken(int type) {\nFunction mapping = idToToken::get;\nreturn mapping.andThen(tokenFactory).apply(type);\n\
  }\n@Override\npublic Object state() {\nreturn null;\n}\n@Override\npublic void release()\
  \ {\n//nothing todo\n}\nprivate static class TokenSupplier implements Supplier {\n\
  private final CtoLexer lexer;\nTokenSupplier(LexerInput input) {\nCharStream stream\
  \ = new LexerCharStream(input);\nlexer = new CtoLexer(stream);\n}\n@Override\npublic\
  \ org.antlr.v4.runtime.Token get() {\nreturn lexer.nextToken();\n}\n}\n}\n```\n\n\
  我们需要一种方法将平台的输入馈送到由 ANTLR 生成的 `CtoLexer` 中。该词法分析器接受 `org.antlr.v4.runtime.CharStream`\
  \ 接口，因此让我们实现它。以下源代码基于 `org.antlr.v4.runtime.ANTLRInputStream`。\n\n\n\n```\nfinal\
  \ class LexerCharStream implements CharStream {\nprivate final static String NAME\
  \ = \"CtoChar\";\nprivate final LexerInput input;\nprivate final Deque markers =\
  \ new ArrayDeque();\npublic LexerCharStream(LexerInput input) {\nthis.input = input;\n\
  }\n@Override\npublic String getText(Interval interval) {\nObjects.requireNonNull(interval,\
  \ \"Interval may not be null\");\nif (interval.a < 0 || interval.b < interval.a\
  \ - 1) {\nthrow new IllegalArgumentException(\"Invalid interval!\");\n}\nreturn\
  \ input.readText(interval.a, interval.b).toString();\n}\n@Override\npublic void\
  \ consume() {\nread();\n}\n@Override\npublic int LA(int ahead) {\nif (ahead == 0)\
  \ {\nreturn 0;\n}\nint c = 0;\nfor (int j = 0; j < ahead; j++) {\nc = read();\n\
  }\nbackup(ahead);\nreturn c;\n}\n@Override\npublic int mark() {\nmarkers.push(index());\n\
  return markers.size() - 1;\n}\n@Override\npublic void release(int marker) {\nif(markers.size()\
  \ < marker) {\nreturn;\n}\n//remove all markers from the given one\nfor(int i =\
  \ marker; i < markers.size(); i++) {\nmarkers.remove(i);\n}\n}\n@Override\npublic\
  \ int index() {\nreturn input.readLengthEOF();\n}\n@Override\npublic void seek(int\
  \ index) {\nint len = index();\nif (index < len) {\n//seek backward\nbackup(len\
  \ - index);\n} else {\n// seek forward\nwhile (len < index) {\nconsume();\n}\n}\n\
  }\n@Override\npublic int size() {\nreturn -1; //unknown\n}\n@Override\npublic String\
  \ getSourceName() {\nreturn NAME;\n}\nprivate int read() {\nint result = input.read();\n\
  if (result == LexerInput.EOF) {\nresult = CharStream.EOF;\n}\nreturn result;\n}\n\
  private void backup(int count) {\ninput.backup(count);\n}\n}\n```\n\n让我们用 JUnit\
  \ 5 创建第一个单元测试。在项目窗口中选择枚举 `TokenTaxonomy`，右键单击，然后选择“工具” ➤ “创建/更新测试”。图 11-11 显示了创建或更新测试的对话框。\n\
  \n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig11_HTML.jpg](img/479166_1_En_11_Fig11_HTML.jpg)\n\
  \n图 11-11\n测试对话框\n\n按如下方式实现测试：\n\n```\npublic class TokenTaxonomyTest {\n@Test\n\
  @DisplayName(\"It should return a list of keyword tokens.\")\npublic void tokens_Keywords()\
  \ {\nList result = TokenTaxonomy.INSTANCE.tokens(Category.KEYWORD);\nassertThat(result.isEmpty(),\
  \ is(false));\n}\n}\n```\n\n至此，我们完成了语法高亮相关的 Java 源代码。然而，还有一些拼图尚未完成。首先，我们需要提供一个 xml\
  \ 文件，将枚举 `Category` 的值映射到一种颜色。因此，在 `src/main/resources/org/netbeans/modules/hyperledger/cto`\
  \ 目录下创建一个 `fontColors.xml` 文件，并使用以下内容：\n\n在该模块的包文件 `src/main/resources/org/netbeans/modules/hyperledger/Bundle.properties`\
  \ 中为这些值提供翻译：\n\n```\nKEYWORD=关键字\nTYPE=原始类型\nFIELD=字段\nCOMMENT=注释\nSEPARATOR=分隔符\n\
  VALUE=值\n```\n\n我们需要注册此映射，并为选项对话框提供一个预览，以便用户在更改颜色时可以快速预览效果。这通过 NetBeans 层系统完成。请在与\
  \ `Bundle.properties` 相同的目录中添加一个 `layer.xml` 文件，内容如下：\n\n在项目视图中展开“重要文件”节点，并在模块清单\
  \ (`manifest.mf`) 中注册 `layer.xml` 文件。参见图 11-12。\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig12_HTML.jpg](img/479166_1_En_11_Fig12_HTML.jpg)\n\
  \n图 11-12\n展开“重要文件”节点的项目视图\n\n`manifest.mf` 文件的内容：\n\n```\nManifest-Version: 1.0\n\
  OpenIDE-Module: org.netbeans.modules.hyperledger\nOpenIDE-Module-Localizing-Bundle:\
  \ org/netbeans/modules/hyperledger/Bundle.properties\nOpenIDE-Module-Layer: org/netbeans/modules/hyperledger/layer.xml\n\
  ```\n\n如您所见，我们还在 `layer.xml` 中注册了一个示例 cto 文件用于颜色预览。因此，让我们将此文件添加到 `src/main/resources/org/netbeans/modules/hyperledger/cto`\
  \ 目录中。\n\n```\n/*\n* 模型文件示例\n*/\nnamespace org.basic.sample\nimport foo.bar\n//\
  \ 资产\n@foo(\"arg\", 2)\nabstract asset SampleAsset identified by assetId{\no String\
  \ assetId\no Integer [] cols\n--> SampleParticipant owner\n}\n```\n\n当我们运行插件时，编辑器中将出现语法高亮（见图\
  \ 11-13），并且可以在选项对话框中更改颜色（见图 11-14）。\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig14_HTML.jpg](img/479166_1_En_11_Fig14_HTML.jpg)\n\
  \n图 11-14\n带有颜色预览的选项对话框\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig13_HTML.jpg](img/479166_1_En_11_Fig13_HTML.jpg)\n\
  \n图 11-13\n带有语法高亮的编辑器\n\n错误提示\n语法高亮可以给我们一些提示，表明输入的单词是否为关键字。然而，当出现语法错误时，它并不能告诉我们实际应该输入什么。这里我们可以利用\
  \ NetBeans 的错误提示功能和由 ANTLR 生成的解析器。解析器允许我们附加一个监听器的实现，该监听器会收集所有语法错误。这些语法错误可用于错误提示。\n\
  \n首先，我们在 `pom.xml` 文件中添加一些新的依赖项：\n\n```\norg.netbeans.api\norg-netbeans-modules-parsing-api\n\
  ${netbeans.version}\n\norg.netbeans.api\norg-netbeans-spi-editor-hints\n${netbeans.version}\n\
  \n```\n\nParsing API 将充当 ANTLR 解析器的代理，并处理解析结果。\n\n我们需要在与词法分析器语法文件相同的目录中定义一个新的语法文件。它被称为\
  \ `CtoParser.g4`。它包含用于识别 cto 文件中资源的规则。以下代码片段显示了此文件的开始部分，其中包含入口点 `modelUnit`。完整内容请参见\
  \ GitHub 上的源代码仓库：[`https://github.com/antlr/grammars-v4/blob/master/cto/CtoLexer.g4`](https://github.com/antlr/grammars-v4/blob/master/cto/CtoLexer.g4)。\n\
  \n```\nparser grammar CtoParser;\noptions { tokenVocab=CtoLexer; }\nmodelUnit\n\
  : namespaceDeclaration importDeclaration* typeDeclaration* EOF;\n```\n\nMaven 插件将生成\
  \ `CtoParser.java` 文件。它在项目视图的“生成的源文件”下可见。\n\n接下来，我们必须创建一系列新类。让我们从一个创建解析器的新类开始。注意\
  \ `MimeRegistration` 注解。这会将我们的工厂注册到 NetBeans 的 MIME 查找中。\n\n```\n@MimeRegistration(mimeType\
  \ = FileType.MIME, service = ParserFactory.class)\npublic class CtoParserFactory\
  \ extends ParserFactory {\n@Override\npublic Parser createParser(Collection coll)\
  \ {\nreturn new CtoProxyParser(ParserProvider.INSTANCE);\n}\n}\n```\n\n`ParserProvider`\
  \ 实现了 `Function` 接口，并为给定的文本创建一个新的 `CtoParser`。\n\n```\npublic enum ParserProvider\
  \ implements Function {\nINSTANCE;\n@Override\npublic CtoParser apply(String text)\
  \ {\nCharStream input = CharStreams.fromString(text);\nLexer lexer = new CtoLexer(input);\n\
  TokenStream tokenStream = new CommonTokenStream(lexer);\nreturn new CtoParser(tokenStream);\n\
  }\n}\n```\n\n类 `CtoProxyParser` 是 ANTLR `CtoParser` 的代理。它解析编辑器内容的快照并提供解析结果；在本例中，结果包含一个语法错误列表。\n\
  \n\n\n```\npublic class CtoProxyParser extends Parser {\nprivate final Function\
  \ parserProvider;\nprivate CtoParserResult parserResult;\npublic CtoProxyParser(Function\
  \ parserProvider) {\nthis.parserProvider = parserProvider;\n}\n@Override\npublic\
  \ void parse(Snapshot snapshot, Task task, SourceModificationEvent sme) throws ParseException\
  \ {\nString text = snapshot.getText().toString();\nCtoParser ctoParser = parserProvider.apply(text);\n\
  ErrorParserListener errorListener = new ErrorParserListener();\nctoParser.addErrorListener(errorListener);\n\
  //do the parsing\nctoParser.modelUnit();\nList errors = errorListener.getSyntaxErrors();\n\
  parserResult = new CtoParserResult(snapshot, errors);\n}\n@Override\npublic Result\
  \ getResult(Task task) throws ParseException {\nreturn parserResult;\n}\n@Override\n\
  public void addChangeListener(ChangeListener cl) {\n}\n@Override\npublic void removeChangeListener(ChangeListener\
  \ cl) {\n}\npublic static class CtoParserResult extends Parser.Result {\nprivate\
  \ boolean valid = true;\nprivate final List errors;\npublic CtoParserResult(Snapshot\
  \ snapshot, List errors) {\nsuper(snapshot);\nthis.errors = errors;\n}\npublic List\
  \ getErrors() {\nreturn errors;\n}\n@Override\nprotected void invalidate() {\nvalid\
  \ = false;\n}\npublic boolean isValid() {\nreturn valid;\n}\n}\n}\n```\n\n`SyntaxError`\
  \ 类非常简单。它保存了消息和对应的行号。\n\n```\npublic final class SyntaxError {\nprivate final String\
  \ message;\nprivate final int line;\npublic SyntaxError(String message, int line)\
  \ {\nthis.message = message;\nthis.line = line;\n}\npublic String getMessage() {\n\
  return message;\n}\npublic int getLine() {\nreturn line;\n}\n}\n```\n\n而 `ErrorParserListener`\
  \ 则负责收集所有语法错误。\n\n```\npublic class ErrorParserListener extends BaseErrorListener{\n\
  private final List syntaxErrors = new ArrayList();\npublic List getSyntaxErrors()\
  \ {\nreturn syntaxErrors;\n}\n@Override\npublic void syntaxError(Recognizer recognizer,\
  \ Object offendingSymbol, int line, int charPositionInLine, String msg, RecognitionException\
  \ e) {\nsyntaxErrors.add(new SyntaxError(msg, line));\n}\n}\n```\n\n那么，当我们收集到所有语法错误后，该如何处理它们呢？我们需要告诉编辑器标记这些行。让我们在一个低优先级的任务中完成这项工作。NetBeans\
  \ 提供了 `org.netbeans.modules.parsing.spi.ParserResultTask`，它会在解析器完成工作后处理我们的结果。`NotificationResultTask`\
  \ 使用解析器中的语法错误，并将其提供给 `HintsController`，后者会在编辑器中显示错误提示。\n\n```\npublic class NotificationResultTask\
  \ extends ParserResultTask {\nprivate static final String LAYER = \"cto\";\n@Override\n\
  public void run(Parser.Result result, SchedulerEvent se) {\nCtoProxyParser.CtoParserResult\
  \ ctoResult = (CtoProxyParser.CtoParserResult) result;\nif (ctoResult.isValid())\
  \ {\nDocument document = result.getSnapshot().getSource().getDocument(false);\n\
  List errors = ctoResult.getErrors();\nList descriptions = errors.stream().map(e\n\
  -> ErrorDescriptionFactory.createErrorDescription(\nSeverity.ERROR,\ne.getMessage(),\n\
  document,\ne.getLine())).collect(toList());\nsetErrors(document, descriptions);\n\
  }\n}\nvoid setErrors(Document document, List descriptions) {\nHintsController.setErrors(document,\
  \ LAYER, descriptions);\n}\n@Override\npublic int getPriority() {\nreturn 100; //数值越小，优先级越高\n\
  }\n@Override\npublic Class getSchedulerClass() {\nreturn Scheduler.EDITOR_SENSITIVE_TASK_SCHEDULER;\n\
  }\n@Override\npublic void cancel() {\n}\n}\n```\n\n对 `HintsController` 的调用被放在一个额外的方法中，因为这样我们可以在单元测试中通过\
  \ spy 来验证它。那么，让我们为这个类创建一个新的测试：\n\n```\n@ExtendWith(MockitoExtension.class)\npublic\
  \ class NotificationResultTaskTest {\n@Mock\nprivate Snapshot snapshot;\n@Mock\n\
  private Source source;\n@Mock\nprivate Document document;\n@Spy\nprivate NotificationResultTask\
  \ classUnderTest;\n@Test\n@DisplayName(\"它应该在 HintsController 中设置错误\")\npublic void\
  \ run() {\ngiven(snapshot.getSource()).willReturn(source);\ngiven(source.getDocument(false)).willReturn(document);\n\
  List res = singletonList(new CtoResource(\"foo\", 0, 0));\nList errs = singletonList(new\
  \ SyntaxError(\"bar\", 0));\nCtoParserResult ctoResult = new CtoParserResult(snapshot,\
  \ res, errs);\nclassUnderTest.run(ctoResult, null);\nverify(classUnderTest).setErrors(eq(document),\
  \ any(List.class));\n}\n}\n```\n\n最后，我们需要编写一个类来创建上述结果任务。\n\n```\n@MimeRegistration(mimeType\
  \ = FileType.MIME, service = TaskFactory.class)\npublic class NotificationResultTaskFactory\
  \ extends TaskFactory{\n@Override\npublic Collection create(Snapshot snpsht) {\n\
  return singletonList(new NotificationResultTask());\n}\n}\n```\n\n运行插件，打开 cto 文件，编辑器将标记错误行，如图\
  \ 11-15 所示。\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig15_HTML.jpg](img/479166_1_En_11_Fig15_HTML.jpg)\n\
  \n图 11-15 带有错误提示的编辑器\n\n代码补全\n\n在这一部分，我们将为 cto 文件添加代码补全功能。首先，我们需要在 Maven 的 `pom.xml`\
  \ 文件中添加以下依赖：\n\n```\norg.netbeans.api\norg-netbeans-modules-editor-completion\n\
  ${netbeans.version}\n\n```\n\n起点是 `CompletionProvider` 接口。我们将提供自己的实现。\n\n```\n@MimeRegistration(mimeType\
  \ = FileType.MIME, service = CompletionProvider.class)\npublic class CtoCompletionProvider\
  \ implements CompletionProvider{\n@Override\npublic CompletionTask createTask(int\
  \ type, JTextComponent jtc) {\nif(type == CompletionProvider.COMPLETION_QUERY_TYPE)\
  \ {\nreturn new AsyncCompletionTask(new CtoCompletionQuery(), jtc);\n}\nreturn null;\n\
  }\n@Override\npublic int getAutoQueryTypes(JTextComponent jtc, String string) {\n\
  return 0;\n}\n}\n```\n\n如果查询类型是补全查询，则返回一个新任务。这允许我们异步执行查询。对于 `getAutoQueryTypes`\
  \ 方法，我们将返回 0。这意味着代码补全只会在用户按下正确的按键时弹出。\n\n实际工作由 `CtoCompletionQuery` 完成。这个类负责向建议列表中添加条目，并在用户输入时进行过滤。我们的类继承自\
  \ `AsyncCompletionQuery`。因此，我们需要实现 `query` 方法，在其中添加条目。我们将使用关键字和原始类型作为建议。关键字类别中的某些条目会带有图标，以表明这些类型对于业务网络定义至关重要。\n\
  \n\n\n```\nfinal class CtoCompletionQuery extends AsyncCompletionQuery {\nprivate\
  \ static final String ICON_PATH = \"org/netbeans/modules/hyperledger/cto/%s\";\n\
  private final CompletionFilter completionFilter;\nCtoCompletionQuery() {\nthis(new\
  \ CompletionFilter.FilterImpl());\n}\nCtoCompletionQuery(CompletionFilter completionFilter)\
  \ {\nthis.completionFilter = completionFilter;\n}\n@Override\nprotected void query(CompletionResultSet\
  \ crs, Document document, int offset) {\nCompletionFilter.FilterResult filterResult\
  \ = completionFilter.filter(document, offset);\ncrs.addAllItems(getKeywordItems(filterResult));\n\
  crs.addAllItems(getPrimitiveTypeItems(filterResult));\ncrs.finish();\n}\nprivate\
  \ ListgetKeywordItems(CompletionFilter.FilterResult              filterResult) {\n\
  Function mapping = token -> {\nOptional iconPath = iconPath(token.ordinal());\n\
  return new KeywordCompletionItem(iconPath, token.name(), filterResult. location);\n\
  };\nreturn map(filterResult.filter, Category.KEYWORD, mapping);\n}\nprivate List\
  \ getPrimitiveTypeItems(CompletionFilter.FilterResult filterResult) {\nFunction\
  \ mapping = token -> {\nreturn new PrimitiveTypeCompletionItem(token.name(), filterResult.location);\n\
  };\nreturn map(filterResult.filter, Category.TYPE, mapping);\n}\nprivate List map(Optional\
  \ filter, Category category, Function mapping) {\nStream tokens = TokenTaxonomy.INSTANCE.tokens(category).stream();\n\
  String name = filter.orElse(\"\");\nif(!name.isEmpty()){\ntokens = tokens.filter(t\
  \ -> t.name().startsWith(name));\n}\nreturn tokens.map(mapping::apply).collect(toList());\n\
  }\nprivate Optional iconPath(int type) {\nswitch (type) {\ncase CtoLexer.ASSET:\n\
  return of(format(ICON_PATH, \"asset.png\"));\ncase CtoLexer.PARTICIPANT:\nreturn\
  \ of(format(ICON_PATH, \"participant.png\"));\ncase CtoLexer.TRANSACTION:\nreturn\
  \ of(format(ICON_PATH, \"transaction.png\"));\ndefault:\nreturn empty();\n}\n}\n\
  }\n```\n\n补全项有一个过滤器。它从文档中返回一个可选类型的字符串，以及从弹出菜单中选择项后插入该项值的位置。创建一个包含以下内容的新接口：\n\n```\n\
  interface CompletionFilter {\nchar SPC = ' ';\nstatic class FilterResult {\nOptional\
  \ filter = empty();\nPair location;\n}\nFilterResult filter(Document document, int\
  \ offset);\nstatic class FilterImpl implements CompletionFilter {\n@Override\npublic\
  \ FilterResult filter(Document document, int offset) {\nString filter = null;\n\
  int startOffset = offset - 1;\ntry {\nStyledDocument styledDocument = (StyledDocument)\
  \ document;\nint lineStartOffset = firstRowNotWhitespace(styledDocument, offset);\n\
  char[] line = styledDocument.getText(lineStartOffset, offset - lineStartOffset).toCharArray();\n\
  int whiteOffset = indexOfWhitespace(line);\nfilter = new String(line, whiteOffset\
  \ + 1, line.length - whiteOffset - 1);\nstartOffset = (whiteOffset > 0 ) ? lineStartOffset\
  \ + whiteOffset + 1 : lineStartOffset;\n} catch (BadLocationException ex) {\nExceptions.printStackTrace(ex);\n\
  }\nFilterResult result = new FilterResult();\nresult.filter = Optional.ofNullable(filter);\n\
  result.location = Pair.of(startOffset, offset);\nreturn result;\n}\nprivate int\
  \ firstRowNotWhitespace(StyledDocument doc, int offset)\nthrows BadLocationException\
  \ {\nElement paragraph = doc.getParagraphElement(offset);\nint start = paragraph.getStartOffset();\n\
  int end = paragraph.getEndOffset();\nwhile (start + 1  -1; i--) {\nif (Character.isWhitespace(line[i]))\
  \ {\nreturn i;\n}\n}\nreturn -1;\n}\n}\n}\n```\n\n我们区分了原始类型的补全项和其他关键字的补全项。你在 Hyperledger\
  \ 的介绍中已经看到了可用的原始类型。\n\n```\npublic class PrimitiveTypeCompletionItem extends AbstractCompletionItem{\n\
  public PrimitiveTypeCompletionItem(String name, Pair location) {\nsuper(name, location);\n\
  }\n@Override\npublic int getSortPriority() {\n//值越大，表示该项在弹出菜单中越靠后\nreturn 200;\n\
  }\n@Override\nprotected ImageIcon getIcon() {\nreturn null;\n}\n}\n```\n\n某些关键字项带有图标，表明它们对于模型定义至关重要。如果它们有图标，则排序优先级更高，会出现在建议列表的顶部。\n\
  \n```\n@NbBundle.Messages({\n\"asset=Asset 是一种类定义，代表在网络中交换的有价值的东西。\",\n\"participant=Participant\
  \ 是网络中的成员，可能持有资产。\",\n\"transaction=Transaction 是资产变更所有者（例如从一个参与者转移到另一个参与者）的过程。\"\
  \n})\npublic class KeywordCompletionItem extends AbstractCompletionItem {\nprivate\
  \ final ImageIcon icon;\npublic KeywordCompletionItem(Optional iconPath, String\
  \ name, Pair location) {\nsuper(name, location);\nicon = iconPath.map(path -> new\
  \ ImageIcon(ImageUtilities.loadImage(path))).orElse(null);\n}\n@Override\npublic\
  \ int getSortPriority() {\nreturn (icon != null) ? 50 : 100;\n}\n@Override\nprotected\
  \ ImageIcon getIcon() {\nreturn icon;\n}\n}\n```\n\n两种项类型都继承了 `AbstractCompletionItem`，该类提供了接口\
  \ `org.netbeans.spi.editor.completion.CompletionItem` 的基本实现。\n\n\n\n```\n@NbBundle.Messages({\n\
  \"docUrl=https://hyperledger.github.io/composer/latest/reference/cto_language.html\"\
  \n})\npublic abstract class AbstractCompletionItem implements CompletionItem {\n\
  private static final String TEMPLATE = \"%s \";\nprivate static final Color SELECTED_COLOR\
  \ = Color.decode(\"0x0000B2\");\nprivate final String name;\nprivate final int startOffset;\n\
  private final int endOffset;\npublic AbstractCompletionItem(String name, Pair location)\
  \ {\nthis.name = name;\nthis.startOffset = location.first();\nthis.endOffset = location.second();\n\
  }\n@Override\npublic void defaultAction(JTextComponent jtc) {\ntry {\nDocument doc\
  \ = jtc.getDocument();\ndoc.remove(startOffset, endOffset - startOffset);\ndoc.insertString(startOffset,\
  \ format(TEMPLATE, name), null);\nCompletion.get().hideAll();\n} catch (BadLocationException\
  \ ex) {\nExceptions.printStackTrace(ex);\n}\n}\n@Override\npublic void processKeyEvent(KeyEvent\
  \ ke) {\n}\n@Override\npublic int getPreferredWidth(Graphics graphics, Font font)\
  \ {\nreturn CompletionUtilities.getPreferredWidth(name, null, graphics, font);\n\
  }\n@Override\npublic void render(Graphics grphcs, Font font, Color frontCol, Color\
  \ backCol, int width, int height, boolean selected) {\nCompletionUtilities.renderHtml(getIcon(),\
  \ name, null, grphcs, font,\n(selected ? Color.white : SELECTED_COLOR), width, height,\
  \ selected);\n}\n@Override\npublic CompletionTask createDocumentationTask() {\n\
  Optional opt = getMessage(name);\nreturn opt.map(msg -> new AsyncCompletionTask(new\
  \ AsyncCompletionQuery() {\n@Override\nprotected void query(CompletionResultSet\
  \ completionResultSet, Document document, int i) {\ncompletionResultSet.setDocumentation(new\
  \ Documentation(msg, getDocumentationURL()));\ncompletionResultSet.finish();\n}\n\
  })).orElse(null);\n}\n@Override\npublic CompletionTask createToolTipTask() {\nreturn\
  \ null;\n}\n@Override\npublic boolean instantSubstitution(JTextComponent jtc) {\n\
  return false;\n}\n@Override\npublic CharSequence getSortText() {\nreturn name;\n\
  }\n@Override\npublic CharSequence getInsertPrefix() {\nreturn name;\n}\nprivate\
  \ URL getDocumentationURL() {\nString docUrl = getMessage(\"docUrl\").orElse(\"\"\
  );\ntry {\nreturn new URL(docUrl);\n} catch (MalformedURLException ex) {\nreturn\
  \ null;\n}\n}\nprivate Optional getMessage(String key) {\ntry {\nreturn of(NbBundle.getMessage(AbstractCompletionItem.class,\
  \ key));\n} catch (MissingResourceException e) {\nreturn empty();\n}\n}\nprotected\
  \ abstract ImageIcon getIcon();\nstatic class Documentation implements CompletionDocumentation\
  \ {\nprivate final String message;\nprivate final URL docUrl;\npublic Documentation(String\
  \ message, URL docUrl) {\nthis.message = message;\nthis.docUrl = docUrl;\n}\n@Override\n\
  public String getText() {\nreturn message;\n}\n@Override\npublic URL getURL() {\n\
  return docUrl;\n}\n@Override\npublic CompletionDocumentation resolveLink(String\
  \ string) {\nreturn null;\n}\n@Override\npublic Action getGotoSourceAction() {\n\
  return null;\n}\n}\n}\n```\n\n现在可以运行插件了。如果在编辑器中调用代码补全功能，NetBeans 会建议一个词条来完成你的输入，如图\
  \ 11-16 所示。\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig16_HTML.jpg](img/479166_1_En_11_Fig16_HTML.jpg)\n\
  \n图 11-16\n带有自动建议的编辑器\n\n导航器面板\n导航器面板让用户能够快速概览编辑器窗口中的内容，即鸟瞰视图。一个典型的例子是 Java 源文件的导航器。让我们为\
  \ cto 文件创建这样一个视图。\n\n首先，我们需要在 `pom.xml` 中添加两个新的 Maven 依赖项。\n\n```\norg.netbeans.api\n\
  org-netbeans-spi-navigator\n${netbeans.version}\n\norg.netbeans.api\norg-openide-explorer\n\
  ${netbeans.version}\n\n```\n\n让我们定义一个模型类，用于表示 cto 文件中的资源。它包含名称、类型以及出现位置的偏移量：\n\n\
  ```\npublic class CtoResource {\nprivate final String name;\nprivate final int type;\n\
  private final int offset;\npublic CtoResource(String name, int type, int offset)\
  \ {\nthis.name = name;\nthis.type = type;\nthis.offset = offset;\n}\npublic String\
  \ getName() {\nreturn name;\n}\npublic int getType() {\nreturn type;\n}\npublic\
  \ int getOffset() {\nreturn offset;\n}\n}\n```\n\n导航器的起点是实现 `org.netbeans.spi.navigator.NavigatorPanel`\
  \ 接口，并使用 `NavigatorPanel.Registration` 注解进行注册。\n\n```\n@NbBundle.Messages({\n\"\
  CTO_NAV_NAME=Composer 模型\",\n\"CTO_NAV_HINT=文件资源定义的概览。\"\n})\n@NavigatorPanel.Registration(mimeType\
  \ = FileType.MIME, position = 500, displayName = \"#CTO_NAV_NAME\")\npublic class\
  \ CtoNavigatorPanel implements NavigatorPanel {\nprivate static final RequestProcessor\
  \ RP = new  RequestProcessor(CtoNavigatorPanel.class.getName(), 1);\nprivate final\
  \ JComponent view = new MembersView();\nprivate Optional rootNode = empty();\nprivate\
  \ Lookup.Result selection;\nprivate final LookupListener selectionListener = ev\
  \ -> {\nRP.post(() -> {\nrootNode.ifPresent(n -> {\nn.getFactory().cleanup();\n\
  rootNode = empty();\n});\nif (selection != null) {\ndisplay(selection.allInstances());\n\
  }\n});\n};\n@Override\npublic String getDisplayName() {\nreturn CTO_NAV_NAME();\n\
  }\n@Override\npublic String getDisplayHint() {\nreturn CTO_NAV_HINT();\n}\n@Override\n\
  public JComponent getComponent() {\nreturn view;\n}\n@Override\npublic void panelActivated(Lookup\
  \ lkp) {\nselection = lkp.lookupResult(DataObject.class);\nselection.addLookupListener(selectionListener);\n\
  selectionListener.resultChanged(null);\n}\n@Override\npublic void panelDeactivated()\
  \ {\nselectionListener.resultChanged(null);\nselection.removeLookupListener(selectionListener);\n\
  selection = null;\n}\n@Override\npublic Lookup getLookup() {\nreturn view.getLookup();\n\
  }\nprivate void display(Collection selectedFiles) {\nif (selectedFiles.size() ==\
  \ 1) {\nDataObject dataObject = selectedFiles.iterator().next();\nRootNode node\
  \ = new RootNode(dataObject);\nnode.getFactory().register();\nrootNode = of(node);\n\
  view.getExplorerManager().setRootContext(node);\n} else {\nview.getExplorerManager().setRootContext(Node.EMPTY);\n\
  }\n}\n}\n```\n\n`MembersView` 类是一个 Swing 组件，它包含来自 Explorer API 的 `org.openide.explorer.view.BeanTreeView`，并将其与\
  \ `org.openide.explorer.ExplorerManager` 和 `org.openide.util.Lookup` 连接起来。\n\n```\n\
  final class MembersView extends JPanel implements ExplorerManager.Provider, Lookup.Provider\
  \ {\nprivate final ExplorerManager manager;\nprivate final Lookup lookup;\nprivate\
  \ final BeanTreeView view;\nMembersView() {\nthis.manager = new ExplorerManager();\n\
  this.lookup = ExplorerUtils.createLookup(manager, new ActionMap());\nview = new\
  \ BeanTreeView();\nview.setSelectionMode(ListSelectionModel.SINGLE_SELECTION);\n\
  setLayout(new BorderLayout());\nadd(view, BorderLayout.CENTER);\n}\n@Override\n\
  public ExplorerManager getExplorerManager() {\nreturn manager;\n}\n@Override\npublic\
  \ Lookup getLookup() {\nreturn lookup;\n}\n@Override\npublic boolean requestFocusInWindow()\
  \ {\nreturn view.requestFocusInWindow();\n}\n}\n```\n\n`CtoNavigatorPanel` 类中的可选根节点是\
  \ cto 文件中资源的父节点。创建节点时，它会从文件本身获取名称，但在解析内容后，会使用命名空间进行更新。\n\n```\nfinal class RootNode\
  \ extends DataNode {\nprivate final MembersFactory factory;\nRootNode(DataObject\
  \ obj) {\nsuper(obj, Children.LEAF);\nfactory = new MembersFactory(this);\nsetIconBaseWithExtension(FileType.ICON);\n\
  setChildren(Children.create(factory, true));\n}\nMembersFactory getFactory() {\n\
  return factory;\n}\n}\n```\n\n`ChildNode` 类是 cto 文件中资源的可视化表示。该类还提供了一个操作，允许用户导航到编辑器中的源代码位置。对于此功能，我们使用\
  \ `NbDocument` 工具类：\n\n\n\n```\npublic final class ChildNode extends AbstractNode{\n\
  @StaticResource\nprivate static final String ICON = \"org/netbeans/modules/hyperledger/cto/blue.png\"\
  ;\nprivate static final String MEMBER = \"%s : %s\";\nprivate static final RequestProcessor\
  \ RP = new RequestProcessor();\nprivate final DataObject dataObject;\nprivate final\
  \ CtoResource resource;\nprivate final Action openAction = new AbstractAction()\
  \ {\n@Override\npublic void actionPerformed(ActionEvent event) {\nRP.post(() ->\
  \ {\nNbDocument.openDocument(dataObject, resource.getOffset(),\nLine.ShowOpenType.OPEN,\
  \ Line.ShowVisibilityType.FOCUS);\n});\n}\n};\npublic ChildNode(DataObject dataObject,\
  \ CtoResource resource) {\nsuper(Children.LEAF);\nthis.dataObject = dataObject;\n\
  this.resource = resource;\nsetIconBaseWithExtension(ICON);\nString type = NameMapping.map(resource.getType());\n\
  setDisplayName(format(MEMBER, resource.getName(), type));\n}\n@Override\npublic\
  \ Action getPreferredAction() {\nreturn openAction;\n}\n}\n```\n\n子节点的构建委托给一个继承自\
  \ `org.openide.nodes.ChildFactory` 的工厂。\n子节点将借助 `CtoParser` 创建。\n请创建一个包含以下内容的新类：\n\
  \n```\nfinal class MembersFactory extends ChildFactory {\nprivate Collection resources\
  \ = new ArrayList();\nprivate final DataNode root;\nprivate final FileChangeAdapter\
  \ adapter = new FileChangeAdapter() {\n@Override\npublic void fileChanged(FileEvent\
  \ fe) {\nrefresh(false);\n}\n};\nMembersFactory(DataNode root) {\nthis.root = root;\n\
  }\nprivate FileObject getPrimaryFile() {\nreturn getDataObject().getPrimaryFile();\n\
  }\nprivate DataObject getDataObject() {\nreturn root.getDataObject();\n}\n@Override\n\
  protected Node createNodeForKey(CtoResource resource) {\nif (CtoLexer.NAMESPACE\
  \ == resource.getType()) {\nupdateRootName(resource.getName());\nreturn null;\n\
  } else {\nreturn new ChildNode(getDataObject(), resource);\n}\n}\n@Override\nprotected\
  \ boolean createKeys(List toPopulate) {\nParserListener listener = new ParserListener();\n\
  try {\nString text = getPrimaryFile().asText();\nCtoParser parser = ParserProvider.INSTANCE.apply(text);\n\
  parser.addParseListener(listener);\nparser.modelUnit();\n} catch (IOException ex)\
  \ {\nExceptions.printStackTrace(ex);\n}\nresources = listener.getResources();\n\
  resources.forEach(toPopulate::add);\nreturn true;\n}\nprivate void updateRootName(String\
  \ rootName) {\nString oldName = root.getDisplayName();\nif (!rootName.equals(oldName))\
  \ {\nroot.setDisplayName(rootName);\n}\n}\nvoid register() {\ngetPrimaryFile().addFileChangeListener(adapter);\n\
  }\nvoid cleanup() {\ngetPrimaryFile().removeFileChangeListener(adapter);\n}\n}\n\
  ```\n\n`ParserListener` 可以附加到解析器上。它监听解析器进入或退出规则时发生的事件，这些规则先前已在语法文件中定义。监听器将收集我们希望在导航器中显示的规则名称和类型。\n\
  \n```\npublic final class ParserListener extends CtoParserBaseListener {\nprivate\
  \ final List resources = new ArrayList();\npublic List getResources() {\nreturn\
  \ resources;\n}\nprivate void addNode(TerminalNode node, int type, int offset) {\n\
  if (node != null && !(node instanceof ErrorNode)) {\naddNode(node.getText(), type,\
  \ offset);\n}\n}\nprivate void addNode(String text, int type, int offset) {\nresources.add(new\
  \ CtoResource(text, type, offset));\n}\nprivate int getStart(ParserRuleContext ctx)\
  \ {\nreturn ctx.getStart().getStartIndex();\n}\n@Override\npublic void exitNamespaceDeclaration(CtoParser.NamespaceDeclarationContext\
  \ ctx) {\nCtoParser.QualifiedNameContext qualCtx = ctx.qualifiedName();\nif (qualCtx\
  \ != null) {\nList identifiers = qualCtx.IDENTIFIER();\nString name = identifiers.stream().map(TerminalNode::getText).collect(Collectors.joining(\"\
  .\"));\naddNode(name, CtoLexer.NAMESPACE, getStart(ctx));\n}\n}\n@Override\npublic\
  \ void exitAssetDeclaration(CtoParser.AssetDeclarationContext ctx) {\naddNode(ctx.IDENTIFIER(),\
  \ CtoLexer.ASSET, getStart(ctx));\n}\n@Override\npublic void exitParticipantDeclaration(CtoParser.ParticipantDeclarationContext\
  \ ctx) {\naddNode(ctx.IDENTIFIER(), CtoLexer.PARTICIPANT, getStart(ctx));\n}\n@Override\n\
  public void exitTransactionDeclaration(CtoParser.TransactionDeclarationContext ctx)\
  \ {\naddNode(ctx.IDENTIFIER(), CtoLexer.TRANSACTION, getStart(ctx));\n}\n@Override\n\
  public void exitEventDeclaration(CtoParser.EventDeclarationContext ctx) {\naddNode(ctx.IDENTIFIER(),\
  \ CtoLexer.EVENT, getStart(ctx));\n}\n@Override\npublic void exitEnumDeclaration(CtoParser.EnumDeclarationContext\
  \ ctx) {\naddNode(ctx.IDENTIFIER(), CtoLexer.ENUM, getStart(ctx));\n}\n@Override\n\
  public void exitConceptDeclaration(CtoParser.ConceptDeclarationContext ctx) {\n\
  addNode(ctx.IDENTIFIER(0), CtoLexer.CONCEPT, getStart(ctx));\n}\n}\n```\n\n现在，当我们打开模型文件时，导航器窗口（图\
  \ 11-17）将显示文件中资源的概览。\n\n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig17_HTML.jpg](img/479166_1_En_11_Fig17_HTML.jpg)\n\
  \n**图 11-17** 导航器显示文件中的资源\n\n但是，如果你在编辑器中更改了这些名称之一，你会注意到它对导航器没有即时影响。只有在保存文件后，导航器的内容才会更新。我们需要监听编辑器中的更改，并触发一个事件来强制导航器更新节点。一种方法是查找当前打开的编辑器，并在其中附加一个文档监听器。但这意味着大量的样板代码。不过，我们已经在语法高亮部分创建了一种处理编辑器文本的方法。让我们将其扩展以处理来自解析器监听器的结果，然后将其传递给导航器窗口中节点的工厂。\n\
  \n首先，打开 `CtoProxyParser` 类，并将资源添加到解析器结果中：\n\n```\npublic static class CtoParserResult\
  \ extends Parser.Result {\nprivate boolean valid = true;\nprivate final List resources;\n\
  private final List errors;\npublic CtoParserResult(Snapshot snapshot, List resources,\
  \ List errors) {\nsuper(snapshot);\nthis.resources = resources;\nthis.errors = errors;\n\
  }\npublic List getResources() {\nif (!valid) {\nreturn emptyList();\n}\nreturn resources;\n\
  }\n```\n\n通过使用解析器监听器，扩展 `CtoProxyParser` 的解析方法，并将监听器的结果传递给我们更新过的类：\n\n```\n@Override\n\
  public void parse(Snapshot snapshot, Task task, SourceModificationEvent sme) throws\
  \ ParseException {\nString text = snapshot.getText().toString();\nCtoParser ctoParser\
  \ = parserProvider.apply(text);\nParserListener listener = new ParserListener();\n\
  ErrorParserListener errorListener = new ErrorParserListener();\nctoParser.addParseListener(listener);\n\
  ctoParser.addErrorListener(errorListener);\n//执行解析\nctoParser.modelUnit();\nList\
  \ resources = listener.getResources();\nList errors = errorListener.getSyntaxErrors();\n\
  parserResult = new CtoParserResult(snapshot, resources, errors);\n}\n```\n\n\n\n\
  我们需要一个解决方案来将这些资源发送到节点工厂。为此，我们将使用 NetBeans Lookup。因此，创建一个实现 `Lookup.Provider` 的新枚举。建议将该枚举放在一个全新的包中的\
  \ `LookupContext.java` 文件里，因为它将充当不相关类或包之间的中介。\n\n```\npublic enum LookupContext\
  \ implements Lookup.Provider{\nINSTANCE;\nprivate final InstanceContent content;\n\
  private final Lookup lookup;\nprivate LookupContext() {\nthis.content = new InstanceContent();\n\
  this.lookup = new AbstractLookup(content);\n}\n@Override\npublic Lookup getLookup()\
  \ {\nreturn lookup;\n}\npublic void add(Object inst) {\ncontent.add(inst);\n}\n\
  public void remove(Object inst) {\ncontent.remove(inst);\n}\n}\n```\n\n我们将在为错误提示创建的\
  \ `NotificationResultTask.java` 中使用这个 `LookupContext`。在该类的 `run` 方法中添加以下代码行：\n\n\
  ```\n@Override\npublic void run(Parser.Result result, SchedulerEvent se) {\nCtoProxyParser.CtoParserResult\
  \ ctoResult = (CtoProxyParser.CtoParserResult) result;\nif (ctoResult.isValid())\
  \ {\nLookupContext.INSTANCE.add(ctoResult.getResources());\n...\n```\n\n让我们在 `MembersFactory.java`\
  \ 中消费这些资源。请注意，仅显示了该类中所需的更改：\n\n```\nfinal class MembersFactory extends ChildFactory\
  \ implements LookupListener {\nprivate final LookupContext lookupContext = LookupContext.INSTANCE;\n\
  private boolean fromFile = true;\nprivate Lookup.Result selection;\nprivate final\
  \ FileChangeAdapter adapter = new FileChangeAdapter() {\n@Override\npublic void\
  \ fileChanged(FileEvent fe) {\nfromFile = true;\nrefresh(false);\n}\n};\n@Override\n\
  protected boolean createKeys(List toPopulate) {\nif(fromFile) {\nresources = parseFile();\n\
  fromFile = false;\n}\nresources.forEach(toPopulate::add);\nreturn true;\n}\nprivate\
  \ List parseFile() {\nParserListener listener = new ParserListener();\ntry {\nString\
  \ text = getPrimaryFile().asText();\nCtoParser parser = ParserProvider.INSTANCE.apply(text);\n\
  parser.addParseListener(listener);\nparser.modelUnit();\n} catch (IOException ex)\
  \ {\nExceptions.printStackTrace(ex);\n}\nreturn listener.getResources();\n};\nvoid\
  \ register() {\ngetPrimaryFile().addFileChangeListener(adapter);\nselection = lookupContext.getLookup().lookupResult(List.class);\n\
  selection.addLookupListener(this);\n}\nvoid cleanup() {\ngetPrimaryFile().removeFileChangeListener(adapter);\n\
  selection.removeLookupListener(this);\n}\n@Override\npublic void resultChanged(LookupEvent\
  \ ev) {\nif (selection != null) {\n//消费并移除\nCollection results = selection.allInstances();\n\
  if (!results.isEmpty()) {\nmembers = results.iterator().next();\nlookupContext.remove(members);\n\
  refresh(false);\n}\n}\n}\n}\n```\n\n运行该插件，当你在编辑器中更改资源的名称时，你将在导航器中看到效果。\n\n签名和共享插件\n\
  创建插件后，可以通过 Apache NetBeans 插件门户与社区共享。通过插件门户提供的插件可以被社区中的任何人安装。插件门户可通过 Web 浏览器在网址\
  \ [`http://netbeans-vm.apache.org/pluginportal/`](http://netbeans-vm.apache.org/pluginportal/)\
  \ 在线访问，^(⁴) 也可以在 Apache NetBeans IDE 中通过选择“工具” ➤ “插件”来访问。\n为了共享插件，必须使用证书对其进行签名，证书可以是自签名的，也可以是由证书颁发机构验证的。签名过程与将要分发的任何\
  \ Java JAR 归档文件的签名过程大致相同。签名 JAR 或 NBM 文件有几种不同的方法，包括手动签名或将签名过程集成到构建中。在本节中，我们将介绍如何将该过程集成到\
  \ Maven 构建中。\n\n签名项目\n\n可以使用 Java keytool 实用程序为基于 ANT 或 Maven 的项目创建密钥库，然后更新构建文件以将密钥库集成到构建中，从而对项目进行签名以便分发。在此示例中，将更新项目的基于\
  \ Maven 的 POM 文件以包含生成的密钥库。首先，打开命令行或终端，进入项目目录，然后执行 keytool 命令来生成密钥库。\n\n```\ncd ../path-to-project\n\
  keytool -genkey -storepass your-password -alias your-project-alias -keystore nbproject/private/keystore\n\
  ```\n\n注意\n请务必将密钥库和密钥密码设置为相同的值。\n确保 nbproject/private 目录不会随归档文件一起分发，也不会提交到版本控制系统。\n\
  \n生成密钥库并将其保存到诸如 nbproject/private 之类的目录后，可以更新项目 POM 文件以包含生成 NBM 文件时所需的 nbm-maven-plugin\
  \ 配置。只需将以下配置添加到 nbm-maven-plugin 插件部分即可。\n\n```\norg.codehaus.mojo\nnbm-maven-plugin\n\
  3.14.1\ntrue\n\nfalse\norg.netbeans.modules.hyperledger\nYour Name\nhttps://github.com/mario-s/nb-hyperledger\n\
  nbproject/private/keystore\nyour-project-alias\nCreative Commons BY 3.0\nhttps://creativecommons.org/licenses/by/3.0/\n\
  \n```\n\n创建 NBM\n\n如果你只有一个插件需要打包分发，最简单的创建二进制文件的方法是生成一个 NBM。有几种方法可以创建已签名的 NBM。首先，如果你不打算对\
  \ NBM 进行签名以便将其包含在插件中心，只需通过 Apache NetBeans 生成 NBM 即可。为此，请在 Apache NetBeans 中执行以下步骤：\n\
  \n![../images/479166_1_En_11_Chapter/479166_1_En_11_Fig18_HTML.jpg](img/479166_1_En_11_Fig18_HTML.jpg)\n\
  \n图 11-18\n为插件分发创建 NBM 文件\n\n*   右键单击 Hyperledger Support 项目，然后选择“创建 NBM”（图 11-18）。IDE\
  \ 将编译项目并将其打包成一个可分发的二进制 NBM 文件。生成后，该文件将出现在项目的“build”目录中。\n\n要生成已签名的 NBM，可以通过命令行或终端进入项目目录并执行以下命令来完成\
  \ Maven 构建：\n\n```\nmvn clean package nbm:nbm -Dkeystorepass=your-password\n```\n\
  \nNBM 签名并打包完成后，即可将其加载到插件门户中。请按照以下步骤将插件上传到门户。\n\n1.  使用 Sonatype 提供的说明（[`https://central.sonatype.org/pages/ossrh-guide.html`](https://central.sonatype.org/pages/ossrh-guide.html)）将插件上传到\
  \ Maven Central。\n\n2.  如果你还没有 Google 帐户，请创建一个。\n\n3.  访问 Apache NetBeans 插件门户（[`http://netbeans-vm.apache.org/pluginportal/`](http://netbeans-vm.apache.org/pluginportal/)），并使用右上角的**登录**按钮进行身份验证。\n\
  \n4.  在主菜单中点击“**添加插件**”按钮。\n\n5.  为你的插件提供相关信息（`groupId` 和 `artifactId` 值），然后点击“**添加插件**”按钮。这两个值包含在\
  \ `maven-metadata.xml` 文件中。所有其他信息应自动添加。建议为你的插件添加主页和缩略图。选择“**保存插件**”。\n\n6.  在“我的插件”页面中选择适合你插件的\
  \ Apache NetBeans 版本，这将打开“版本管理”页面。\n\n7.  选择适当的兼容 Apache NetBeans 版本，提供可选的发布信息，然后选择“**保存插件版本**”。\n\
  \n\n\n8.  如果你认为该插件符合插件门户的质量标准（参见维基：[`https://cwiki.apache.org/confluence/display/NETBEANS/Quality+criteria+for+Plugin+Portal+Update+Center`](https://cwiki.apache.org/confluence/display/NETBEANS/Quality%252Bcriteria%252Bfor%252BPlugin%252BPortal%252BUpdate%252BCenter)），你可以选择通过点击“**请求验证**”按钮，让你的插件接受验证并获批发布。\n\
  \n总结\n在本章中，我们逐步学习了如何使用 Maven 为一种新语言创建 NetBeans 插件的若干指南。你已经看到，为新项目创建模板、识别新文件类型，以及借助\
  \ ANTLR 实现语法高亮和错误提示是多么容易。我们还涉及了代码补全和导航窗口。NetBeans 的查找 API 被用于包之间的通信。最后，你了解了签名和发布插件所需的必要步骤。\n\
  在下一章中，你将了解 NetBeans 为何被移至 Apache 软件基金会的旗下，以及你如何为该项目做出贡献。\n\n脚注\n\n第三部分参与 Apache\
  \ NetBeans\n\n12. Apache NetBeans 流程\n\n使 Apache 软件基金会（简称“Apache”）对 NetBeans 而言既特殊又合适的原因在于其治理模式。人们常常会问：“既然\
  \ NetBeans 过去是、现在也一直是免费且开源的，它真的需要 Apache 吗？”这正是我们将在本章中探讨的问题。\n在本章结束时，我们希望你能理解 NetBeans\
  \ 迁移至 Apache 的背景、此次迁移带来的好处，尤其是你如何亲自参与到该项目中并做出贡献。\n\n关于酒馆与传说\n传说 NetBeans 起源于布拉格的酒馆和饮酒场所。从很多方面来说，这确实是真的。1996\
  \ 年，一群来自布拉格工业大学的学生开发了一个工具，用于支持当时尚属新兴且缺乏工具的 Java 开发。根据同样的传说，当时开发工作进展不多，但酒水消耗不少；尽管该工具的计划描述得很详尽，但直到这些学生毕业并意识到他们拥有一个时机已到的好主意后，这些计划才得以实现。\n\
  “NetBeans”这个奇特的名字也可以从这个角度来理解：当时的两大热门话题是“JavaBeans”和“Network”，将这两个术语合二为一，就像现在的“Facebook”和“Netflix”一样合乎逻辑。不久之后，当\
  \ Java 之父詹姆斯·高斯林和当时领导 Sun 公司工具部门的乔纳森·施瓦茨在一次会议上看到 NetBeans 的演示，并认识到它可以作为让新开发者快速、全面地开启\
  \ Java 之旅的环境基础时，Sun 微系统公司（简称“Sun”）便收购了 NetBeans。\nSun 将 NetBeans 定位为引导新 Java 开发者入门、并让专业开发者高效工作的工具，随后将其开源，并着手对其进行模块化改造。根据另一个传说，NetBeans\
  \ 的开发者无论如何都主要对创建一个模块化框架感兴趣，然后在其模块化框架之上创建了 NetBeans 集成开发环境（IDE），纯粹是为了证明该框架。这样一来，开发环境反而成了事后才考虑的事情，而其底层的\
  \ NetBeans 平台（你在第二部分中已了解）才是开发者关注的核心领域。\n\n向 Apache 的模块化迁移\n无论如何，模块化已被证明是 NetBeans\
  \ 的关键优势之一，尤其是在迁移至 Apache 的过程中。\n2010 年甲骨文收购 Sun 后，NetBeans 在其新东家那里有了许多有趣的新用例。它成为了甲骨文\
  \ JDeveloper 的基础，其多项功能（如窗口系统、GUI 构建器和分析器）都在那里被复用。在甲骨文实验室，它成为了围绕新型多语言 GraalVM 的工具链的核心部分。然而，部分由于社区持续要求更直接地参与\
  \ NetBeans 的开发，部分由于优先级调整，部分也是为了分担维护成本，甲骨文于 2016 年 10 月决定将 NetBeans 捐赠给 Apache。\n\
  甲骨文非常明确地表示，它希望继续向 NetBeans 投入资源，并且将其捐赠给 Apache 的决定绝不意味着它在放弃 NetBeans。事实上，作为其既定方向的证据，甲骨文\
  \ Java 组织内的一支开发者团队至今仍在持续为 NetBeans 工作，专注于提供与 Java 开发工具包（JDK）和 Java 语言新特性相关的 Java\
  \ 编辑器增强功能。\n此外，甲骨文内部的一个团队从迁移之初就开始工作，并每周开会讨论代码向 Apache 迁移的当前状态、分配任务、报告进展等。\n\n\n\n\
  炼狱与孵化\nApache 孵化器（简称“孵化器”或“孵化阶段”）类似于某种“炼狱”，即罗马天主教概念中介于尘世与天堂之间的净化阶段。或者说，它是一个“过渡期”，旧事物尚未消亡，新事物尚未诞生。\n\
  \n首先需要澄清一个误解：孵化阶段发布的版本绝非“Beta”版。孵化器的存在是为了让有志成为 Apache 项目的社区能够学会如何完全遵守 Apache 的要求，同时了解\
  \ Apache 特有的开放治理形式。\n\nApache 会指派导师来指导和协助有志成为 Apache 的社区，确保项目不偏离轨道，或做出不符合 Apache\
  \ 之道的行为。Apache 之道是一套成熟的治理原则，Apache 项目据此进行管理，源代码也据此发布。\n\nApache 之道的详细信息可在网上查阅（[`apache.org/theapacheway`](https://apache.org/theapacheway)），此处不再赘述其方方面面。但足以说明的是，社区如何协作以及以\
  \ Apache 名义发布的代码的许可协议，均在 [`apache.org`](https://apache.org) 上有明确规定，这为 Apache 在整个行业中强大而可靠的品牌形象奠定了基础。每个以\
  \ Apache 名义开展的项目都应被视为符合其原则，这意味着有志成为 Apache 项目的新社区需要掌握一套原则和概念。\n\n在离开孵化器成为正式 Apache\
  \ 项目（即“顶级项目”）之前，有志成为 Apache 的项目需要跨越一系列障碍，以证明其理解 Apache 之道，并能够作为正式 Apache 项目运作。孵化过程中的一个关键里程碑是发布版本；事实上，社区在尝试成为顶级项目并离开孵化器之前，必须在孵化器中完成至少一次发布。\n\
  \nApache NetBeans 社区在孵化器中完成了三次发布。下文将描述每次发布在源代码发布、提供功能以及项目在孵化器内进展方面的情况。\n\n在进一步说明之前，有必要指出：Apache\
  \ 发布的是源代码，而非功能、安装程序、可执行文件或二进制文件。这些通常由其他组织（例如 *OpenBeans*，参见 [`openbeans.org`](https://openbeans.org)）创建，就像\
  \ Ubuntu 打包 Debian 一样。因此，严格从 Apache 的角度来看，每次发布的重点仅在于源代码。从 Apache 的角度看，一个版本是否提供新功能，或是否提供便利的二进制文件（作为帮助源代码用户的可选方式，例如安装程序），都无关紧要，因为其关注点仅在于源代码，从而使得上游组织（如前述的\
  \ *OpenBeans*）能够根据需要，基于二进制文件、安装程序及其他更用户友好的便利设施来构建商业模式。\n\n另需简要说明的是，我们决定延续版本号，即不从\
  \ Apache NetBeans 1.0 开始，而是沿用 Oracle NetBeans 最后一个版本号之后的主版本号，即从 8.2 之后开始，这意味着第一个\
  \ Apache NetBeans 版本号定为“9.0”。\n\nApache NetBeans（孵化中）9.0\n孵化器中首次发布的重点仅仅是经历一次 Apache\
  \ 的发布流程（这本身就是一个结构严谨的过程），同时以 Apache 孵化器的名义，实际发布当时 Oracle 已贡献给 Apache 的 NetBeans 源代码中的重要部分。\n\
  \nNetBeans 的基础是底层的应用程序框架，位于“平台”模块集群中。按理说，首次发布本应纯粹专注于发布该集群。但我们的想法是，也包含一些对 Apache\
  \ NetBeans 用户实际有用的功能，而不仅仅是让开发者将 NetBeans 平台用作其软件的基础。\n\n因此，除了“平台”集群外，首次 Apache NetBeans\
  \ 发布也重点关注了“ide”和“java”集群。这样一来，即使 NetBeans 的其他所有部分仍在准备纳入后续版本的过程中，Java 开发者也能使用 Apache\
  \ NetBeans 9.0。这里的关键点是，要从 Apache 发布源代码，需要将其重新许可给 Apache。由于 NetBeans 的某些部分不符合 Apache\
  \ 的许可要求，这些部分需要被移除或重写，而非发布。如果我们等到所有代码都捐赠完毕并准备好由 Apache 发布，那么首次发布将需要数年时间才能准备就绪。而正如本场景所示，模块化方法使得\
  \ Apache NetBeans 的特定部分能够以增量方式逐步发布。\n\n然而，另一个转折点是，首次 Apache NetBeans 发布（如上所述，专注于与\
  \ Java 开发功能相关的源代码）并未简单地提供 Oracle 最后发布的 NetBeans 版本所具备的精确 Java 功能。这是因为自 NetBeans\
  \ IDE 8.2 发布以来，JDK 9 已经发布，而 Oracle 的开发人员在将 NetBeans 捐赠给 Apache 之前，已经在 NetBeans 中创建了多项专门支持\
  \ JDK 9 新特性的功能。JDK 9 的主要特性是引入了新的 Jigsaw 模块系统，其初衷主要是为了实现 JDK 自身的模块化。然而，任何 Java 应用程序都可以使用相同的模块系统。在\
  \ Apache NetBeans 9.0 中，Oracle 开发人员为 NetBeans 创建的、用于支持 JDK 9 Jigsaw 模块系统的功能也一并发布了，特别是帮助\
  \ NetBeans 用户入门 Jigsaw 的新项目类型，以及对相关“module-info.java”Jigsaw 注册文件的支持。\n\nJDK 9 还引入了一个名为\
  \ JShell 的 REPL（读取-求值-打印循环）工具，以及一个名为 JLink 的打包工具。对于这两项新的 JDK 特性，Apache NetBeans\
  \ 9.0 都提供了开箱即用的集成和支持。\n\n最初，Apache NetBeans 的计划是专注于 JDK 9。然而，由于 NetBeans 从 Oracle\
  \ 移交到 Apache 的过程出现延迟，JDK 9 已经发布。事实上，JDK 10 也已经发布。因此，Apache NetBeans 9.0 转而专注于支持\
  \ JDK 10，既包括在其上运行的能力，也包括对其增强功能的支持。幸运的是，仅从 Java 开发者的角度来看（即就开发者编写的代码而言），JDK 10 仅引入了“var”关键字，即“局部变量类型推断”。为了让\
  \ NetBeans 用户从中受益，Java 编辑器得到了增强，支持在 Java 类型和“var”关键字之间切换，同时还提供了检查和分析器，以便在文件、包和项目之间进行切换。\n\
  \nApache NetBeans 9.0 于 2018 年 7 月 29 日发布，距离 Oracle 宣布将 NetBeans 捐赠给 Apache 不到两年。考虑到\
  \ Oracle 方面审计流程的复杂性、Apache 的许可要求，以及在 Apache 中为 NetBeans 工作的每个人都是志愿者这一事实，这个进度相当不错。事实上，这最初两年的阶段让每个人都有时间适应\
  \ NetBeans 项目的新阶段，相互了解，并理解在 Apache 旗帜下工作在日常层面意味着什么。\n\n\n\nApache NetBeans（孵化中）10.0\n\
  随着 Apache NetBeans 9.0 的发布，人们首先提出的问题之一是：“嘿，PHP 和 JavaScript 呢？Apache 是否从 NetBeans\
  \ 中移除了这些功能？” 一个最令人沮丧但可以理解的方面是，开源项目的用户往往不像其开发者那样密切关注项目进展。随后引发了一阵抱怨声，许多 NetBeans 用户突然冒出来抱怨，显然\
  \ Apache NetBeans 从此以后只会关心 Java 开发者，而不再关心它过去所支持的其他技术和语言的开发者。\n\n当然，正如之前已经详细解释过的，我们专注于在不同版本中发布\
  \ NetBeans 的不同部分，因为构成 NetBeans 的所有组件尚未全部从 Oracle 接收，也尚未全部重新授权给 Apache。\n\nApache\
  \ NetBeans 10.0 于 2018 年 12 月 27 日发布，其重点是提供 PHP 功能，这也意味着同时提供 HTML5/JavaScript 功能，因为前者依赖于后者。此次发布的不仅是\
  \ Oracle 捐赠的与这些功能相关的代码，此外，在此期间，还首次提供了许多额外功能，特别是对当时最新 PHP 版本 PHP 7.4 的新支持。\n\n此外，10.0\
  \ 版本还重点关注了 JDK 11，特别是除了能够在 JDK 11 上运行之外，还提供了对 lambda 表达式中“var”的新支持。除了其他修复和增强之外，Apache\
  \ NetBeans 10.0 还引入了对 JUnit 5 的支持，特别是针对基于 Apache Maven 的项目。\n\nApache NetBeans（孵化中）11.0\n\
  Apache NetBeans 11.0 于 2019 年 4 月 4 日发布，是孵化器中的第三个主要版本。\n\n多年来，NetBeans 社区一直在讨论如何最好地表达\
  \ Apache Maven 和 Gradle 是比 Apache Ant 更现代、更值得关注的选择，但同时又不想暗示使用 Apache Ant 有任何问题，这一点使问题变得复杂。\n\
  \n因此，在 Apache NetBeans 11.0 中，重新设计了“新建项目向导”，即 NetBeans 用户的入口点。Java 向导被移到了一个名为“Java\
  \ with Ant”的子文件夹中，同时新增了两个类别：“Java with Maven”和“Java with Gradle”。希望这能让新用户更容易为他们喜欢的项目选择起点，同时突出显示\
  \ Maven 和 Gradle 应优先于 Ant。\n\n此外，首次引入了对 Gradle 的初步支持。多年来，许多用户一直要求提供将 NetBeans 与\
  \ Gradle 集成的功能。对 Oracle 来说，这从来都不是一个高优先级事项，尽管一个提供 Gradle 集成功能的外部插件被开发出来并广受欢迎。从 Oracle\
  \ 的角度来看，这是一个足够好的解决方案，因为 Oracle 无需投入任何开发人员时间资源，而需要该集成的用户可以通过外部插件来使用它。当然，直接开箱即用地集成外部技术（如\
  \ Gradle）总是更可取的。随着 NetBeans 归属 Apache，优先级不再由 Oracle 决定，直接开箱即用地集成 Gradle 变得只受限于是否有一个或多个贡献者能够提供它。在\
  \ Apache NetBeans 11.0 的发布周期中，这一目标成功实现了。\n\n除了这些关注点之外，Apache NetBeans 11.0 的一个关键重点是\
  \ Oracle 捐赠给 Apache 的代码的下一阶段集成，即与企业 Java（即 Java/Jakarta EE）相关的功能集群。在 Apache NetBeans\
  \ 11.0 发布前的几个月里，我们一直忙于审查“企业”功能集群的许可证，该集群来自 Oracle 向 Apache 的第二次 NetBeans 捐赠，审查工作在发布前及时完成，使得这些功能能够被纳入其中。因此，从该版本开始，NetBeans\
  \ 用户无需安装插件，即可使用 Ant 或 Maven 创建、编辑、构建和部署 Java EE 应用程序，对 Gradle 的支持计划在下一个版本中提供。\n\n\
  然而，对 Java EE 8 的显式支持，例如 NetBeans 用户界面元素中的特定模板或规范编号的提及，并未包含在 Apache NetBeans 11.0\
  \ 中。但与此同时，请注意 Java EE 8 仅能在 JDK 8 上运行，而不能在后续版本上运行，因此对于使用 Java EE 8 进行开发的用户来说，最好还是在\
  \ JDK 8 上运行 NetBeans 本身。\n\n最后，与 Apache NetBeans 9.0 提供对 JDK 9 和 10 的支持、Apache NetBeans\
  \ 10.0 提供对 JDK 11 的支持一样，Apache NetBeans 11.0 也提供了对 JDK 12 的支持。Apache NetBeans 11.0\
  \ 版本在 JDK 12 上进行了测试，同时提供了新的编辑器提示和功能，以支持开发者利用 JDK 12 中的语法级特性。\n\n\n\n晋升为顶级 Apache\
  \ 项目\n天下没有不散的筵席，NetBeans 在孵化器中的时光也是如此。一段时间以来，指派给我们的热心导师就一直在建议，是时候离开孵化器了。这意味着 NetBeans\
  \ 将不再处于孵化器阶段，而将成为 Apache 的正式项目。对于外界来说，孵化器可能有些令人困惑，也就是说，有些人往往会质疑从孵化器出来的代码状态；例如，“这是\
  \ Beta 版本的质量吗？”、“NetBeans 还在孵化器中，我们能依赖它吗？”等等，这些都是人们常问的问题。\n\n此外，孵化器外部的发布流程比内部更快，因为孵化器的发布要经过两个阶段的发布投票——首先由社区投票决定某个仓库是否准备好发布，然后由孵化器成员进行投票。如果后者投票失败，就需要进行修复，并且第一阶段需要重新开始。简而言之，两阶段的发布投票过程会显著拖慢发布速度，因此，这本身就是一个项目在准备就绪后，希望离开孵化器继续前进的理由。经历孵化器阶段很重要，因为它能让围绕一个项目的社区成员相互了解，并围绕他们共同项目的发布进行协作。然而，一旦明确一切都能相当顺利地协同运作，就可以启动流程，成为\
  \ Apache 的正式项目。\n\n这个过程需要在项目的开发者邮件列表中进行讨论。这次讨论始于 2019 年 2 月，花了一些时间，因为我们同时还在进行一个版本的发布工作。讨论之后，发起了一个投票线程，最终收到了大约\
  \ 60 票，所有人都同意 NetBeans 已经准备好毕业，这促使孵化器成员之间也启动了关于同一主题的投票。那里的投票也通过了，于是在 2019 年 4 月，NetBeans\
  \ 成为了 Apache 的正式项目。\n\n随后需要完成各种琐碎的任务，主要涉及从多个地方移除“孵化器”字样。一份新闻稿被整理并发布，开发工作无缝地继续进行，许多链接被重定向到没有“孵化器”字样的位置，例如，邮件列表中的“孵化器”一词，以及网站上关于孵化的一系列免责声明，这些都被修复和移除。\n\
  \n这是一个长达两年半的漫长过程，不过，综合考虑，这个过程算是短暂且相对无痛的。尽管仍有相当多的代码需要由 Oracle 捐赠以完成捐赠，特别是与 C/C++\
  \ 特性相关的代码，但围绕 NetBeans 的社区作为 Apache 项目已经协同工作了一段时间，从孵化器毕业为这个过程画上了句号，并完成了 NetBeans\
  \ 在 Apache 安家落户的初始阶段。\n\n超越孵化器\n既然 Apache NetBeans 已经离开了孵化器，它的路线图是什么？可以期待哪些特性？又将在何时实现？嗯，在最简单的层面上，Oracle\
  \ 尚未完成其捐赠，也就是说，有相当多的代码，特别是与 C/C++ 特性相关的代码，正在 Oracle 内部进行审计和清理。换句话说，Oracle 的员工正在审查待捐赠的代码，并确定这些代码是否真正属于\
  \ Oracle，因此 Oracle 是否拥有这些代码，并基于其所有权，能够将这些代码捐赠给 Apache。在某些情况下，经过分析，可能会发现代码是从别处复制而来，或者复用了其他仓库或技术中的代码。只有在完成这类分析之后，代码才能移交给\
  \ Apache。\n\n与此同时，Apache NetBeans 的一个关键驱动力将继续是 Java 开发工具包（JDK）的新版本发布。随着 JDK 新版本的发布，像\
  \ NetBeans 这样的工具需要做好准备，使开发者能够使用这些新的 JDK 版本进行工作。NetBeans 不仅必须能够在新的 JDK 版本之上运行，而且当\
  \ Java 在语法层面发生变化时，Java 编辑器还必须提供支持，例如代码补全和语法着色。NetBeans 中的这项工作主要由 Oracle 的开发者完成，并且构成了\
  \ Oracle 在 Apache 中对 NetBeans 承诺的最大部分。例如，JEP-330 提供了在项目范围之外运行单个 Java 源文件的能力，在 NetBeans\
  \ 中对此功能的支持对于那些教授和学习 Java 的人来说将非常有用，因为无需创建整个项目来容纳单个 Java 源文件。同时，Oracle Labs 专注于 GraalVM，这是\
  \ Oracle 开发的新型多语言虚拟机，其工具支持，特别是跨语言调试功能，由 Apache NetBeans 提供。简而言之，Oracle 对 NetBeans\
  \ 的承诺仍然意义重大，尤其是现在通过接管了 Oracle 治理和发布管理流程的 Apache 流程，已经有了清晰的前进道路。\n\n除此之外，Apache NetBeans\
  \ 将交付其提交者决定提交的任何内容。在 Gradle 领域正在进行大量工作，同时 PHP 支持也在不断增加更多特性。一旦 C/C++ 特性被捐赠，预计那里也会出现进展，因为使用这些特性的开发者会提供反馈、提交问题和拉取请求。\n\
  \n总结\n从本章中要传达的最重要信息是，Apache 就是“你”，没有你的参与，Apache NetBeans 就不会存在。不再有神奇的小精灵在 Sun 或\
  \ Oracle 内部的某个地方开发 NetBeans。取而代之的是各种类型和规模的独立贡献者，我们需要你成为这个过程的一部分。缺少什么功能吗？现在，NetBeans\
  \ 第一次真正属于你，你可以，事实上是必须，让它成为现实。我们都在期待你的第一个拉取请求！\n\n13. Apache 基础设施\n\n\n\nApache NetBeans\
  \ 在 Apache 基金会下开源发布。因此，加入 Apache NetBeans 开发社区非常容易，并且有多种方式可以实现。Apache 基金会为新手营造了轻松的入门环境，同时也让多年参与社区的成员能够直观地进行贡献。Apache\
  \ 基金会基础设施中有几个关键部分，在参与 Apache NetBeans 社区时发挥着作用。**JIRA** 是一个问题追踪器，社区成员可以用它来报告问题，并跟踪项目中需要完成的工作。Apache\
  \ 使用 **Confluence** 作为 Apache NetBeans 维基的项目管理站点。NetBeans 维基是一个专用资源，用于记录围绕项目的开发和计划文档。一系列开放的邮件列表用于协调工作。最后，最公开的焦点——Apache\
  \ NetBeans 网站——由社区维护。\n即使你不打算编写用于构建 Apache NetBeans IDE 的 Java 代码，你也可以通过阅读邮件列表、向\
  \ JIRA 提交问题、帮助维护 Confluence 或维基，或者投入时间在 Apache NetBeans 网站上做出贡献。在本章中，我们将介绍如何为构成\
  \ Apache NetBeans 社区的这些领域做出贡献。\n\nApache NetBeans JIRA\n参与 Apache NetBeans 社区最简单的方式是报告错误或提出功能增强请求。为此，需要使用\
  \ Apache NetBeans JIRA。你可以通过在你喜欢的网络浏览器中访问以下 URL 来访问 JIRA：\n[`https://issues.apache.org/jira/projects/NETBEANS/`](https://issues.apache.org/jira/projects/NETBEANS/)`.`\n\
  \n默认情况下，首次打开该网站时，会显示所有“开放”问题。如果你有兴趣为 Apache NetBeans 做出贡献，JIRA 的开放问题是一个很好的起点。浏览这些开放问题，看看是否有你能解决的，或者是否有引起你兴趣的内容（见图\
  \ 13-1）。\n\n![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig1_HTML.jpg](img/479166_1_En_13_Fig1_HTML.jpg)\n\
  \n图 13-1\nApache NetBeans JIRA – 开放问题\n\n要充分利用 JIRA，你必须创建一个帐户并登录系统。登录后，你就可以根据需要向追踪器添加新问题。如果你拥有适当的权限，还可以将问题分配给自己、对问题发表评论或更改问题的状态。\n\
  \n要开始浏览系统，请使用屏幕左侧的菜单（图 13-2）。在该菜单中，你会看到看板、发布、报告、问题和组件等选项。\n\n![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig2_HTML.jpg](img/479166_1_En_13_Fig2_HTML.jpg)\n\
  \n图 13-2\nJIRA 导航与看板\n\n**看板**是一个很好的展示界面，包含开放问题、分配给你的问题以及已完成问题。如果你点击看板中的某个问题，它会在屏幕右侧的窗格中打开，使看板保持可见。你可以根据需要随意拖拽看板上的项目，从而按自己的喜好组织看板。看板的一个不错的功能是它在触摸设备上运行良好，可以轻松拖放看板上的项目。\n\
  \n菜单中的下一个是**发布**面板（图 13-3），它可以让用户快速概览 Apache NetBeans 的发布状态。该面板提供有关先前版本以及未来下一个版本的信息。选择某个版本时，会弹出一个气泡，提供该版本问题的快速摘要。\n\
  \n![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig3_HTML.jpg](img/479166_1_En_13_Fig3_HTML.jpg)\n\
  \n图 13-3\n发布面板\n\n**报告**选项提供了一系列报告选项，以不同方式呈现问题追踪器数据。许多报告是可配置的，提供可变的数据时间线。报告类别包括敏捷、问题分析、预测与管理以及其他。每个类别包含一种或多种不同样式的报告。在图\
  \ 13-4 中，显示了一个问题的累积流图。\n\n![../images/479166_1_En_13_Chapter/479166_1_En_13_Fig4_HTML.jpg](img/479166_1_En_13_Fig4_HTML.jpg)\n\
  \n图 13-4\n报告选项\n\n**组件**菜单选项按 Apache NetBeans 组件分组显示所有问题。例如，所有 Maven 问题都分组在一起，易于访问。利用组件菜单，可以按组件解析问题，从而轻松专注于\
  \ IDE 中某个特定领域的支持。\n\nApache NetBeans 维基\n围绕 Apache NetBeans 的大部分文档都存放在维基中。维基当然是一系列提供\
  \ Apache NetBeans 详细信息和资料的在线网页。可以使用以下 URL 访问维基：\n[`http://netbeans.apache.org/wiki/index.asciidoc`](http://netbeans.apache.org/wiki/index.asciidoc)`.`\n\
  维基围绕一个“配方”风格选项的索引，这些选项被分组到各个部分，索引中的每个选项都涵盖与开发相关的特定主题。有多种方式可以参与更新和为维基做贡献。例如，如果某些流程尚未记录，维基就是记录它们的正确地方。如果你发现维基上的任何信息已过时或需要修改，你可以通过进行这些更新来提供帮助。维基是\
  \ Apache NetBeans 拼图中非常重要的一部分，因为来自世界各地的贡献者协作使 Apache NetBeans 成为可能。因此，记录良好的流程对于成功至关重要。\n\
  \n邮件列表\n有许多邮件列表可供加入，以保持信息畅通并与用户或开发社区中的其他人沟通。\n\n公告 (announce@netbeans.incubator.apache.org)\n\
  “公告”邮件列表适用于希望在新版本发布时及时了解信息的人。此邮件列表通常流量较低，旨在作为一个高级别的通知列表，同时最大限度地减少邮件数量。\n\n用户 (users@netbeansincubator.apache.org)\n\
  “用户”邮件列表面向 NetBeans 用户社区。如果你有关于 IDE 使用的问题，那么这里就是你要去的地方。由于此邮件列表涵盖的主题非常广泛，建议在主题行中添加前缀标签，以指示邮件中讨论的主题。\n\
  \nNetCat (netcat@netbeans.incubator.apache.org)\nNetCat 邮件列表适用于参与 Apache NetBeans\
  \ NetCat 测试和社区验收计划的人员。\n\n开发 (dev@netbeans.incubator.apache.org)\n开发 Apache NetBeans\
  \ 的人员应加入开发者邮件列表。此列表也面向那些致力于通过文档、活动和教程推广 IDE 的人员。\n\n提交 (commits@netbeans.incubator.apache.org)\n\
  如果你希望密切关注 Apache NetBeans GitHub 仓库，那么提交邮件列表适合你。每次有提交时，此邮件列表的成员都会收到通知。\n\n通知 (notifications@netbeans.incubator.apache.org)\n\
  要密切关注 GitHub 仓库的问题、评论和拉取请求，请关注通知邮件列表。每当问题上有评论或提出拉取请求时，此列表的每位成员都会收到通知。\n\n\n\n网站\n\
  Apache NetBeans 最显眼的在线存在形式是其网站。\n网站是几乎任何人都可以参与的领域之一，无论是精通编码的技术人员，还是非常出色的编辑……网站可以充分利用来自各个方向的人才。Apache\
  \ NetBeans 主网站可通过以下 URL 访问：[`http://netbeans.apache.org`](http://netbeans.apache.org)，构成网站的源代码可在\
  \ GitHub 上获取：[`https://github.com/apache/incubator-netbeans-website`](https://github.com/apache/incubator-netbeans-website)。Apache\
  \ NetBeans 网站的 GitHub 仓库实际上包含了 [`netbeans.apache.org`](https://netbeans.apache.org)\
  \ 和 [`bits.netbeans.org`](https://bits.netbeans.org) 的源代码。`bits.netbeans.org` 站点专门用于\
  \ Apache NetBeans 的发布文档。\n\n开始处理 Apache NetBeans 网站的最佳方式是复刻（fork）GitHub 仓库并将其克隆到您的开发机器上。要复刻仓库，首先使用您的账户登录\
  \ GitHub，然后转到 Apache NetBeans 网站 GitHub 仓库，点击页面右上角标有“Fork”的按钮。这将在您自己的 GitHub 账户下创建该仓库的一个副本。这样，如果您对网站进行更改，就不会影响主\
  \ Apache NetBeans 网站仓库。需要注意的是，发布到 Apache NetBeans 网站仓库的更改会通过 Jenkins 自动部署并集成到网站中。因此，一旦提交更改，所有人都能看到。出于这个原因，务必在您自己的复刻仓库中进行任何网站工作或修改，如果您希望将工作集成到主仓库并进而发布到网站上，请从您的复刻仓库创建一个拉取请求（Pull\
  \ Request）。\n\n将您的复刻仓库克隆到本地机器后，就可以深入研究网站源代码了。该网站主要通过 Groovy 模板生成，利用 Gradle 构建和一套名为\
  \ Jbake 的工具集来准备站点。最终，通过运行 Gradle 构建来静态编译网站。源代码中还附带了一个 Tomcat Web 服务器，以便您在开发过程中可以非常轻松地构建和运行网站。按照\
  \ Apache NetBeans 网站 GitHub 页面以及随源代码打包的 `README.asciidoc` 文件中的说明，对网站进行更改非常容易。事实上，这些说明非常详细，我建议在开始处理网站源代码之前先查阅文档：\n\
  [`https://github.com/apache/incubator-netbeans-website/tree/master/netbeans.apache.org`](https://github.com/apache/incubator-netbeans-website/tree/master/netbeans.apache.org)\n\
  \n进行网站页面更新\n首先，让我们逐步了解如何对网站进行简单更改、构建它，并利用内置的 Tomcat 服务器运行它。除了在设备上安装 Java 8 之外，无需进行任何其他安装即可构建和运行站点。Gradle\
  \ 构建将负责下载构建所需的所有依赖项。\n\n有多种类型的文件共同用于创建网站。一系列 `asciidoc` 文档用于构建网站页面本身，而 Groovy 服务器页面（gsp）则用于模板。假设我们需要对\
  \ [`netbeans.apache.org`](https://netbeans.apache.org) 主页进行更改。为此，请进入源代码中的 `netbeans.apache.org`\
  \ 文件夹，然后导航到 `src/content` 文件夹。这是网站主要内容所在的位置。通过执行以下操作修改网站索引页面：\n\n1.  在文本编辑器或 Apache\
  \ NetBeans 中打开 `index.asciidoc` 文件。\n\n2.  对页面进行修改。在本例中，我想将索引页面某个卡片中的单词“Participation”改为“Participation!”。转到\
  \ `index.asciidoc` 文件的第 39 行并进行更改。\n\n3.  通过在命令行或终端中，在 `netbeans.apache.org` 文件夹内执行以下命令来构建站点。\n\
  \n1.  OS X 和 Linux：`./gradlew build`\n\n2.  Windows：`gradlew preprocessContent bake`\n\
  \n4.  构建完成后，您可以在 `netbeans.apache.org/build/bake` 文件夹中看到生成的输出。通过执行以下命令运行 Tomcat\
  \ 服务器：\n\n1.  OS X 和 Linux：`./gradlew run`\n\n2.  Windows：`gradlew run`\n\n5.  Tomcat\
  \ 服务器启动并运行后，将浏览器指向以下站点以查看生成的输出：`http://localhost:8080`\n\n要停止服务器，请在同一个终端或命令提示符中按\
  \ Ctrl+C，或者在 `netbeans.apache.org` 目录下的终端或命令提示符中发出 `gradlew stop` 命令。\n\n进行网站模板更新\n\
  如果您有兴趣修改网站的整体布局和结构，那么修改用于构建页面的模板之一可能是有意义的。可以通过进入 `netbeans.apache.org/src/content/templates`\
  \ 文件夹来修改模板。每个模板都由一个 Groovy 服务器页面（gsp）构成。这些文件可以在文本编辑器或 Apache NetBeans 中打开和修改。修改模板页面的总体流程与上一节中的相同。但是，模板修改可能会影响多个生成的页面，因为单个模板可能应用于网站中的一个或多个页面。\n\
  \n总结\n作为社区成员，有多种方式可以协作并帮助为 Apache NetBeans 项目做出贡献，甚至无需编写一行代码。问题跟踪器（JIRA）是最明显的起点，可以通过提交发现的问题，或在跟踪器中撰写答案和评论来帮助他人。Wiki\
  \ 是一个不断变化的文档站点，对 Apache NetBeans 的成功至关重要。我们请求社区成员通过添加必要的文档或更新多年来发生变化的任何文档来参与其中。要扮演更正式的贡献者角色，可以处理网站并提交拉取请求（PR）来修改站点。最终，任何数量的贡献都将大大有助于推动项目走向未来。\n\
  \n14. 关于测试的 NetCAT 计划\n\nApache *Net*Beans IDE *社*区*验*收*测*试（NetCAT）计划（[`https://netbeans.apache.org/participate/netcat.html`](https://netbeans.apache.org/participate/netcat.html)）旨在获取关于主要功能的早期反馈，并从\
  \ NetBeans 社区确认产品质量已达到正式发布的标准。该计划的目标是让活跃的 Apache NetBeans 社区成员参与测试 Apache NetBeans\
  \ IDE 开发版本，并就产品的可用性、质量和性能提供反馈。作为回报，这些志愿者将有机会显著影响 Apache NetBeans IDE 的质量。NetCAT\
  \ 计划关注的是*质量验收*，而*不是*功能设计。在计划结束时，您将被要求提交一份*社区验收（CA）*调查，在其中您可以表达您对新主要功能是否准备好发布的观点。\n\
  \n时间安排\n一个典型的 NetCAT 计划大约需要两个月的活动时间，如下表所述。\n\n表 14-1\nNetCAT 计划活动\n\n开始日期 | 描述 |\n\
  \n| --- | --- | --- | --- | --- |\n\n2019-02-01 | 准备 - 日程、页面、Synergy（3 天） |\n\n\
  2019-02-04 | 发送 NetCAT 11.0 邀请，参与者开始加入 |\n\n2019-02-07 | 准备 Synergy 测试运行 |\n\n\n\
  \n2019-02-11 |\n 部落已更新，测试任务已创建（每位参与者 1 个），测试开始于\n*vc1* |\n\n2019-02-21 |\n 已发送切换至\
  \ *vc2* 的请求 |\n\n2019-02-25 |\n 与部落负责人进行 1/2 进度同步 |\n\n2019-03-07 |\n 已发送切换至 *vc3*\
  \ 的请求 |\n\n2019-03-11 |\n 针对 *vc3* 启动社区验收调查 |\n\n2019-03-18 |\n 认证完成，*vc4* 中的阻塞问题已修复或豁免\
  \ |\n\n2019-03-22 |\n 社区验收调查结束并公布结果，满意度调查\n启动 |\n\n*2019-03-28* |\n *Apache NetBeans\
  \ 11.0 发布* |\n\n2019-03-29 |\n 满意度调查结束并公布结果，NetCAT 11 关闭 |\n\n如何参与\n如果您希望帮助 NetBeans\
  \ 成为最好的 IDE，只需订阅\n`netcat-subscribe@netbeans.incubator.apache.org`\n邮件列表，即可获取 NetCAT\
  \ 项目的最新动态。主要的沟通渠道是 *JIRA* ([`https://issues.apache.org/jira/browse/NETBEANS`](https://issues.apache.org/jira/browse/NETBEANS))\n\
  以及 `netcat@netbeans.incubator.apache.org`\n邮件列表。\n您还必须在 *NetCAT XX.0*^(⁵) *参与者 Wiki\
  \ 页面*\n ([`https://cwiki.apache.org/confluence/display/NETBEANS/NetCAT+XX.0+Participants`](https://cwiki.apache.org/confluence/display/NETBEANS/NetCAT%252BXX.0%252BParticipants))\n\
  上注册，或者如果您无法编辑此 Wiki 页面，请将所需信息通过电子邮件发送给您在上一步中订阅的 NetCAT 邮件列表。您需要提供每周的空闲时间，以及一个或多个\n\
  *部落*。我们接下来会解释什么是部落。\n作为 NetCAT 团队的成员，您需要针对您选择关注的职能领域（或部落）提供反馈。虽然仅评估里程碑版本也是完全可以接受的，但我们衷心希望您能使用并测试日常开发版本。\n\
  最后，请在 *NetBeans* [*Synergy*](http://netbeans-vm.apache.org/synergy/client/app/%2523/register)\
  \ *测试用例管理系统*\n ([`http://netbeans-vm.apache.org/synergy`](http://netbeans-vm.apache.org/synergy))\
  \ 中创建一个账户。\n\n什么是 NetCAT 部落？\nNetCAT *部落* 是一组 NetCAT 参与者，主要专注于测试 NetBeans 的某个特定功能领域。当您在\
  \ *Confluence* 中注册时（参见上一节），需声明您希望加入哪个部落。\n部落成员负责审查并更新其功能领域的测试规范，然后执行完整测试或冒烟测试，最终根据固定时间表（见表\
  \ 14-1）提供 *通过* 或 *不通过* 建议。\n\n部落列表及其各自包含的内容已在 Synergy 中提供\n([`http://netbeans-vm.apache.org/synergy/client/app/#/tribes`](http://netbeans-vm.apache.org/synergy/client/app/%2523/tribes))。\n\
  表 14-2 提供了摘要信息。\n\n表 14-2\nNetCAT\n部落\n\n前缀 |\n 部落 |\n\n| --- | --- | --- | ---\
  \ | --- |\n\n[ant] |\n Ant |\n\n[c/c++] |\n C/C++ |\n\n[db] |\n 数据库 |\n\n[debug]\
  \ |\n 调试器 |\n\n[groovy] |\n Groovy |\n\n[gui] |\n GUI 构建器 |\n\n[jee] |\n Java EE\
  \ |\n\n[editor] |\n 编辑器 |\n\n[fx] |\n Java FX |\n\n[maven] |\n Maven |\n\n[php]\
  \ |\n PHP |\n\n[profiler] |\n 分析器 |\n\n[python] |\n Python |\n\n[rcp] |\n 富客户端平台\
  \ (RCP) |\n\n[services] |\n 服务 |\n\n[unit] |\n 单元测试 |\n\n[vcs] |\n 版本控制 |\n\n[web]\
  \ |\n Web 客户端 |\n\n表 14-2 中的第一列表示在向 `netcat@netbeans.incubator.apache.org`\n邮件列表发送电子邮件时应使用的主体前缀。\n\
  \n部落负责人\n\n您也可以选择成为 *部落负责人*。部落负责人的主要职责是在部落成员之间分配其部落所关注的功能，以实现最大的测试覆盖率，然后协调各项工作。这种协调工作每周可能需要花费一两个小时。完整测试通常持续数周，而对最终\
  \ GA 候选版本的认证仅需几天。在这些期间，部落负责人需执行以下操作：\n\n\n\n*   检查各成员的进度；\n*   保持他们的积极性；\n*   帮助他们解决潜在问题；\n\
  *   与 *NetCAT 协调员* 沟通，尤其是在遇到障碍时；\n*   鼓励部落成员验证已修复的缺陷。\n\n根据每个 Apache NetBeans 版本的发布标准（例如，\n\
  [`https://cwiki.apache.org/confluence/display/NETBEANS/NetBeans+11.0+Release+Criteria`](https://cwiki.apache.org/confluence/display/NETBEANS/NetBeans%252B11.0%252BRelease%252BCriteria)），\n\
  部落领袖拥有两项特殊权限：\n\n*   在部落内部达成共识后，他们可以为缺陷打上 **WAIVER** 标签。\n*   在部落内部达成共识后，他们可以为缺陷打上\
  \ **BLOCKER** 标签。每个部落同时最多只能有三个此类未关闭的缺陷被打上此标签。\n\n此外，如果部落领袖能组织对其功能领域的测试规范进行评审，并在时间允许的情况下，在全面测试*之前*共同尝试更新这些规范，我们将不胜感激。\n\
  \nNetCAT 协调员\n\n您也可以决定成为 NetCAT 项目的协调员。作为 *NetCAT 协调员*，您将负责以下事项：\n\n*   监控开发进度并制定\
  \ NetCAT 时间表；\n*   在项目开始前更新 NetCAT 时间表；\n*   发送邀请信息并推广该项目，以招募足够的 NetCAT 参与者；\n*\
  \   组建 NetCAT 部落，寻找部落领袖，并在整个项目过程中为他们提供支持；\n*   维护 Synergy ([`http://netbeans-vm.apache.org/synergy`](http://netbeans-vm.apache.org/synergy))（用户、部落和测试运行），以确保开发构建版本得到充分测试，并且候选发布版本得到认证；\n\
  *   通过 JIRA 缺陷仪表板 ([`https://issues.apache.org/jira/browse/NETBEANS`](https://issues.apache.org/jira/browse/NETBEANS))\
  \ 和 NetCAT 邮件列表（`netcat@netbeans.incubator.apache.org`）上的讨论，监控质量状态和稳定化进度；\n*   如有需要，通过编写每周状态报告、组织在线会议、创建在线调查等方式，鼓励更多人参与该项目；\n\
  *   创建最终的 *社区验收调查*，处理并发布其结果；\n*   帮助获得必要的 Apache NetBeans 利益相关者对发布的批准；\n*   通过在\
  \ NetCAT 参与者中创建满意度调查、评估他们的活动并宣布最佳贡献者来结束该项目。\n\n如果您认为自己能够完成上述任务，并且每周可以投入两到五个小时用于\
  \ NetCAT 协调工作，请联系 NetCAT 邮件列表（netcat@netbeans.incubator.apache.org）。\n\nSynergy\n\
  \nSynergy ([`http://netbeans-vm.apache.org/synergy`](http://netbeans-vm.apache.org/synergy))\n\
  是 NetCAT 项目的测试规范和测试运行管理系统（参见\n图 14-1）。\n\n![../images/479166_1_En_14_Chapter/479166_1_En_14_Fig1_HTML.jpg](img/479166_1_En_14_Fig1_HTML.jpg)\n\
  \n图 14-1\nSynergy 主页\n\n在准备阶段，您会收到来自部落领袖的电子邮件，要求您评审/更新一个或多个测试规范。一旦 NetCAT 项目开始运行（参见，例如，表\
  \ 14-1），您需要执行一个或多个这些测试，记录所花费的时间，并报告任何缺陷。\n\n测试规范\n通过从 Synergy 主页（参见图 14-1）选择 **测试规范**\
  \ 菜单项，您将看到一个测试规范列表。您的部落领袖会在 NetCAT 项目开始前几天与您沟通，为您分配一个或多个需要评审的测试规范。\n\n图 14-2 显示了一个测试规范示例。它为您提供了简短描述、预估执行时间以及具体内容。\n\
  \n![../images/479166_1_En_14_Chapter/479166_1_En_14_Fig2_HTML.jpg](img/479166_1_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2\n一个测试规范\n\n一个测试规范由 *测试套件* 组成。一个测试套件由 *测试用例* 组成。一个测试用例包含一系列要执行的步骤和一系列预期结果（参见图\
  \ 14-3）。\n\n![../images/479166_1_En_14_Chapter/479166_1_En_14_Fig3_HTML.jpg](img/479166_1_En_14_Fig3_HTML.jpg)\n\
  \n图 14-3\n一个测试用例\n\n您可以验证现有的缺陷问题是否仍然有效，或者通过提供的超链接报告新问题。您需要修改测试用例，使其与待测试的 NetBeans\
  \ 版本保持一致（例如，根据新版本用户界面的任何修改来更新步骤）。\n如果您发现任何严重问题，可以通知部落领袖。\n\n测试运行\n当 NetCAT 时间表（参见，例如，表\
  \ 14-1）规定的时间到来时，实际测试就要开始了。您的部落领袖会提供 Apache NetBeans 二进制文件的下载链接供您测试。请不要自行编译 NetBeans\
  \ 源代码，请使用编译好的版本进行官方测试。\n\n在这种情况下，请从 Synergy 主页选择 **测试运行** 菜单（参见图 14-4）。\n\n![../images/479166_1_En_14_Chapter/479166_1_En_14_Fig4_HTML.jpg](img/479166_1_En_14_Fig4_HTML.jpg)\n\
  \n图 14-4\n测试运行摘要\n\nNetCAT 协调员将与您的部落领袖一起，已经更新了此页面，您应该会看到一个条目，其中包含您的姓名、您在 Confluence\
  \ 注册时提到的操作系统，以及分配给您的、等待执行的测试规范（参见图 14-5）。\n\n![../images/479166_1_En_14_Chapter/479166_1_En_14_Fig5_HTML.jpg](img/479166_1_En_14_Fig5_HTML.jpg)\n\
  \n图 14-5\n测试运行执行摘要\n\n点击 **运行** 按钮来执行测试。您可以随时暂停测试。您会看到进度和剩余步骤。您有机会在 JIRA 中报告任何缺陷或跳过某些步骤。一旦您完成测试执行，结果将如图\
  \ 14-5 所示。\n在项目结束时，您将被要求提交一份 *社区验收 (CA)* 调查，您可以在其中表达您对新主要功能是否准备好发布的意见。\n\n总结\n在本章中，我们描述了\
  \ NetCAT 项目及其在发布新版本 Apache NetBeans 之前的重要性。我们介绍了时间表、如何参与、部落、部落领袖和 NetCAT 协调员，最后介绍了如何使用\
  \ Synergy 进行实际测试。\n如果您觉得它很有趣并且认为自己可以参与，那么请不要犹豫，联系 NetCAT 邮件列表，请求作为志愿者并积极为下一个 Apache\
  \ NetBeans 版本的发布做准备。\n\n脚注\n\n15. Apache NetBeans 源代码\n概述\n\n正如我们在本书中所见，有很多方式可以为\
  \ Apache NetBeans 做出贡献。您可以通过编写文档、撰写关于 NetBeans 的博客、参与 NetCAT 项目，甚至修复缺陷并成为 Apache\
  \ 提交者来提供帮助。\n在本章中，我们将学习如何下载 Apache NetBeans 的源代码文件。我们将学习如何构建 NetBeans，并回顾各个模块的概览以及\
  \ Apache NetBeans IDE 本身的高级架构。我们还将描述修复缺陷并为源代码做出贡献的流程。所以，请系好安全带。\n\n下载 Apache NetBeans\
  \ 源代码\n自从捐赠给 Apache 以来，NetBeans 一直存储在 Apache 下的一个 git 仓库中。不幸的是，不再像以前使用 mercurial\
  \ 仓库时那样，每个模块套件都有独立的仓库。\n\n您可以通过以下两种方式之一下载 Apache NetBeans 源代码：\n\n\n\n*   导航至 Apache\
  \ NetBeans 网站（[`https://netbeans.apache.org/`](https://netbeans.apache.org/)），\n\
  \    点击右上角的**下载**按钮，并选择\n    以*源代码：*开头的链接，例如，\n    *incubating-netbeans-11.1-source.zip*。下载该\
  \ zip 文件并\n    将其解压到你选择的目录。下载页面提供了\n    验证下载文件完整性的说明。\n\n*   如果你的机器上安装了 *git*，请导航至\n\
  \    机器上你选择的目录，并在 DOS 命令提示符或终端中\n    执行以下命令：\n\n```\n    git clone http://github.com/apache/incubator-netbeans/.\n\
  \    ```\n\n从源代码构建\n\n要从源代码构建 Apache NetBeans（孵化中），\n你需要以下内容：\n\n*   Oracle 的 JDK\
  \ 8 或 Open JDK 8；\n\n*   Apache Ant 1.10 或更高版本（[`https://ant.apache.org`](https://ant.apache.org)）。\n\
  \n安装好 Oracle JDK 和 ANT 后，导航至\n你解压 Apache NetBeans 源代码的目录，并执行\n命令：\n\n```\nant\n\
  ```\n\n你需要一个互联网连接，因为构建过程可能会从互联网下载各种\n工件。另请注意，构建需要一些\n时间才能完成。构建完成后，你可以通过在 Unix 机器的终端窗口中\n\
  输入以下命令来执行 IDE：\n\n```\n./nbbuild/netbeans/bin/netbeans\n```\n\n或者在 Windows 机器上，通过双击\
  \ `netbeans.exe` 或 `netbeans64.exe` 来执行，\n这些可执行文件位于 `\\nbbuild\\netbeans\\bin` 目录下。\n\
  你还可以通过编辑 `nbbuild/netbeans/etc/netbeans.conf`\n并将 `netbeans_jdkhome` 键\n设置为系统中 JDK\
  \ 的路径，来尝试使用不同版本的 Java 运行 NetBeans。\n恭喜！你刚刚构建并执行了你自己版本的\nNetBeans！\n\nApache NetBeans\
  \ IDE 架构\nApache NetBeans 是最大的 Apache 项目之一（在撰写本文时是\n第二大项目）。虽然不了解整体架构也能修复 bug，\n\
  但如果你希望引入新功能，了解每个部分的架构会有所帮助。\n了解架构将有助于你在源代码中找到方向。\nApache NetBeans IDE 采用模块化架构，使用了\
  \ Apache NetBeans 平台的\n*模块系统 API*。掌握本书第 2 部分的章节\n将帮助你编写代码来修复 bug，并为 IDE 添加新功能或插件。\n\
  \nApache NetBeans IDE 由以下主要组件或\n集群组成：\n\n*   **apisupport**：包含许多支持 NetBeans API\
  \ 的模块。\n    这些模块支持诸如 Ant、Maven、重构和向导等功能（参见\n    图 15-1）。\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig1_HTML.jpg](img/479166_1_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1\nAPI 支持模块依赖关系\n\n*   **enterprise**：包含 JEE 支持（参见图\n    15-2）。\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig2_HTML.jpg](img/479166_1_En_15_Fig2_HTML.jpg)\n\
  \n图 15-2\n企业模块依赖关系\n\n*   **ergonomics**：动态启用 IDE 功能，\n    因此用户永远不会因安装完整的 IDE 发行版而浪费系统资源，\n\
  \    而只使用其子集。\n\n*   **extide**：包含 IDE 扩展，例如 `ant` 支持模块\n    和**工具 | 选项**对话框。\n\n\
  *   **extra**：为各种操作系统提供 JavaFX 封装的库。\n\n*   **groovy**：提供对 Groovy 和 Gradle 的支持（参见图\
  \ 15-3）。\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig3_HTML.jpg](img/479166_1_En_15_Fig3_HTML.jpg)\n\
  \n图 15-3\nGroovy 模块依赖关系\n\n*   **harness**：顾名思义，它包含 NetBeans 的测试框架；\n    可以在这里找到诸如\
  \ *jemmy* 和 *jelly* 之类的测试工具。\n\n*   **ide**：提供构建 Apache NetBeans IDE 本身的模块，\n  \
  \  例如编辑器、调试器、语言支持、数据库、HTML 和 CSS 支持等。\n    稍后将更详细地描述。\n\n*   **java**：支持 Java 编程语言\n\
  \    和 JEE、Ant、调试器、Maven、JUnit、TestNG、重构等。例如，\n    *Java 源代码基础*（`java/java.source.base`）\n\
  \    模块为 IDE 添加了 Java 特定的 API。\n\n*   **javafx**：JavaFX 支持（参见\n    图 15-4）。\n\n\
  ![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig4_HTML.jpg](img/479166_1_En_15_Fig4_HTML.jpg)\n\
  \n图 15-4\nJavaFX 模块依赖关系\n\n*   **nb**：包含品牌、自动更新插件中心、\n    欢迎页面、死锁检测器等模块。\n\n*  \
  \ **php**：PHP 支持（参见图\n    15-5）。\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig5_HTML.jpg](img/479166_1_En_15_Fig5_HTML.jpg)\n\
  \n图 15-5\nPHP 模块依赖关系\n\n*   **platform**：构成 NetBeans 富客户端平台的模块（参见图\n    15-6）。\n\
  \n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig6_HTML.jpg](img/479166_1_En_15_Fig6_HTML.jpg)\n\
  \n图 15-6\nNetBeans 平台模块依赖关系\n\n*   **profiler**：顾名思义，NetBeans 分析器模块\n    （参见图 15-7）。\n\
  \n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig7_HTML.jpg](img/479166_1_En_15_Fig7_HTML.jpg)\n\
  \n图 15-7\nJava 分析器模块依赖关系\n\n*   **webcommon**：支持 JavaScript、Knockout、Angular、Selenium\
  \ 等\n    （参见图 15-8）。\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig8_HTML.jpg](img/479166_1_En_15_Fig8_HTML.jpg)\n\
  \n图 15-8\nWeb 通用模块依赖关系\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig9_HTML.jpg](img/479166_1_En_15_Fig9_HTML.jpg)\n\
  \n图 15-9\nWeb 服务模块依赖关系\n\n*   **websvccommon**：SAAS 支持（例如，\n    Amazon、Facebook\
  \ 等）（参见图 15-9）。\n\n起始模块是 *Bootstrap*（`platform/o.n.bootstrap`），\n开始学习 NetBeans IDE\
  \ 源代码的类是：\n[`https://github.com/apache/incubator-netbeans/blob/master/platform/o.n.bootstrap/src/org/netbeans/Main.java`](https://github.com/apache/incubator-netbeans/blob/master/platform/o.n.bootstrap/src/org/netbeans/Main.java)\n\
  \n图 15-10 显示了此\n模块的依赖关系。\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig10_HTML.jpg](img/479166_1_En_15_Fig10_HTML.jpg)\n\
  \n图 15-10\nBootstrap 模块的模块依赖关系\n\nIDE 集群架构\n`ide`\n集群提供构建 Apache NetBeans IDE 本身的模块。\n\
  这些模块包括编辑器、调试器和语言支持。\n这里我们描述该集群中最重要的模块。\n\n*项目 API*（模块 *项目\nAPI*（`ide/projectapi`）（参见\n\
  图 15-11）和\n*项目 UI API*（`ide/projectuiapi`））\n定义了项目在 NetBeans 中的工作方式。最基础的 `Project`（[`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-projectapi/org/netbeans/api/project/Project.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-projectapi/org/netbeans/api/project/Project.html)）\n\
  仅由一个空的 Lookup 和一个项目目录组成。可以通过简单地将处理程序添加到项目的\n`Lookup` 中来为项目添加更多功能。\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig11_HTML.jpg](img/479166_1_En_15_Fig11_HTML.jpg)\n\
  \n图 15-11\n项目 API 模块依赖关系\n\n\n\n有用的类包括 `ProjectUtils` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-projectapi/org/netbeans/api/project/ProjectUtils.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-projectapi/org/netbeans/api/project/ProjectUtils.html))，它提供了获取项目信息的实用方法，以及\
  \ `SourceLevelQuery` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-api-java/org/netbeans/api/java/queries/SourceLevelQuery.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-api-java/org/netbeans/api/java/queries/SourceLevelQuery.html))，它返回\
  \ Java 源文件的源级别（例如，如果源文件使用了 Java 7 引入的语法，则 Java 源级别可以是 7）。在模块 `java/api.java` 中，有对通用\
  \ *Project API* 的 Java 扩展。*Parsing API* (`ide/parsing.api`)（见图 15-12）用于源代码解析（主要在编辑器中）。它允许注册新的解析器\
  \ ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserFactory.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserFactory.html))，将源代码的某些部分定义为另一种语言的内嵌文本\
  \ `EmbeddingProvider` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/EmbeddingProvider.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/EmbeddingProvider.html))\
  \ 和 `ParserBasedEmbeddingProvider` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserBasedEmbeddingProvider.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserBasedEmbeddingProvider.html))，并在解析结果上运行任务。\n\
  \n有两种类型的任务：\n\n*   `ParserResultTask` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserResultTask.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/spi/ParserResultTask.html))\
  \ 是一个 `SchedulerTask`，它按定义的顺序自动调度并运行，以处理解析结果。\n\n*   `ParserManager` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/api/ParserManager.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-api/org/netbeans/modules/parsing/api/ParserManager.html))\
  \ 允许为一个或多个源启动优先级解析请求，并按需立即运行用户任务。\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig12_HTML.jpg](img/479166_1_En_15_Fig12_HTML.jpg)\n\
  \n图 15-12\n\nParsing API 模块依赖关系\n\n*Parsing Indexing API* (`ide/parsing.indexing`)\
  \ 用于“索引”（例如，构建源文件中所有重要内容的“全局”索引，以便可以快速执行诸如“哪些文件使用了这个类”之类的查询）。这里有趣的类包括：\n\n*   `EmbeddingIndexer`\
  \ ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/EmbeddingIndexer.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/EmbeddingIndexer.html))，它获取解析器的结果，并可以将所需的任何信息添加到索引中。\n\
  \n*   `BinaryIndexer` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/BinaryIndexer.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/BinaryIndexer.html))，它允许为二进制依赖项准备索引。\n\
  \n*   `CustomIndexer` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/CustomIndexer.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/CustomIndexer.html))，它仅接收已更改文件的列表，并可以以自定义方式执行索引。可以通过\
  \ `QuerySupport` ([`http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/support/QuerySupport.html`](http://bits.netbeans.org/11.0/javadoc/org-netbeans-modules-parsing-indexing/org/netbeans/modules/parsing/spi/indexing/support/QuerySupport.html))\
  \ 查询索引。\n\n问题跟踪器\n所有程序都包含错误，Apache NetBeans 也不例外。错误和新功能存储在 JIRA ([`https://issues.apache.org/jira/browse/NETBEANS`](https://issues.apache.org/jira/browse/NETBEANS))\
  \ 中，如第 13 章所述。要订阅的邮件列表是 `dev@netbeans.incubator.apache.org`。您的代码贡献可能是一个错误修复，但也可能是一个插件形式的新功能。只需在\
  \ JIRA 中打开一个新问题，然后处理您想要贡献的任何内容。\n\n调试 Apache NetBeans\n无论您是在修复问题还是开发新功能（插件），迟早您都需要了解您或\
  \ NetBeans 的代码是如何工作的，或者为什么它不工作！在开始调试 Apache NetBeans 之前，请确保您已正确设置源代码。\n\n点击 **工具\
  \ ➤ NetBeans 平台** 以显示 *NetBeans 平台管理器* 对话框（见图 15-13）。您会看到已经注册了一个平台，即 *开发 IDE*。这是您正在运行的\
  \ NetBeans IDE 的平台，例如，如果您运行的是 Apache NetBeans IDE 11.1，则平台为 11.1。\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig13_HTML.jpg](img/479166_1_En_15_Fig13_HTML.jpg)\n\
  \n图 15-13\nNetBeans 平台管理器对话框\n\n\n\n然而，你可能希望，例如，修复最新源码更新中的某个错误，该更新已按本章前面所述下载并解压到某个文件夹中。\n\
  \n如前所述，当你构建源码时，输出结果会存储在 `nbbuild/netbeans` 文件夹中。该文件夹包含一个从源码构建的 NetBeans IDE，其中也包含一个\
  \ NetBeans 平台。你可以通过点击 *NetBeans 平台管理器* 对话框中的 **添加平台…** 按钮，并在打开的 *添加 NetBeans 平台*\
  \ 对话框中选择 `nbbuild/netbeans` 文件夹（见图 15-14），将该平台注册到你正在运行的 NetBeans IDE 中。你会注意到，当你选择\
  \ `nbbuild/netbeans` 文件夹时，**下一步** 按钮会变为可用状态。\n\n点击 **下一步** 按钮进入下一步，在此你可以选择为平台提供另一个\
  \ *平台名称*（而非默认名称，默认名称类似“Apache NetBeans IDE Dev (Build xxx-yyy)”；见图 15-15），然后点击 **完成**。现在，你应该能在\
  \ *NetBeans 平台管理器* 对话框中看到这两个平台了。\n\n点击 **源代码** 标签，点击 **添加 ZIP/文件夹…** 按钮，添加包含 NetBeans\
  \ 源码的文件夹（即 `nbbuild` 的父文件夹），然后依次点击 **关闭** 和 **关闭**。\n\n当你新建一个 NetBeans 平台应用程序或模块时，现在可以在两个平台中选择一个用于开发（即，要么使用你的\
  \ IDE 自带的平台，要么使用最新的平台）。你可以通过在 *项目* 窗口中右键点击你的 *模块* 或 *模块套件*，从弹出菜单中选择 **属性** 以打开 *项目属性*\
  \ 对话框，点击 **库** 类别，然后从相应的组合框中选择合适的 *NetBeans 平台*。在同一对话框中，你还可以自定义在模块套件中要包含哪些模块以及不包含哪些模块（见图\
  \ 15-16）。例如，如果你不是在开发 JavaFX 或 HTML/UI 应用程序或插件，只需从模块列表中取消勾选这些模块即可。\n\n如果你不希望将 NetBeans\
  \ 开发平台注册到你的 NetBeans IDE 中，你可以直接添加最新的源码。在 *NetBeans 平台管理器* 对话框中，点击 **源代码** 标签，然后通过点击\
  \ **添加 ZIP/文件夹…** 按钮并导航到该文件夹，添加你解压源码的文件夹，例如 `incubator-netbeans`。你也可以直接添加从 Apache\
  \ NetBeans 网站下载的压缩源码文件，而无需解压。\n\n调试 Apache NetBeans：\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig15_HTML.jpg](img/479166_1_En_15_Fig15_HTML.jpg)\n\
  \n图 15-15\n添加 NetBeans 平台对话框（步骤 2）\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig14_HTML.jpg](img/479166_1_En_15_Fig14_HTML.jpg)\n\
  \n图 15-14\n添加 NetBeans 平台对话框（步骤 1）\n\n1.  在 Apache NetBeans IDE 中打开你感兴趣调试的 Apache\
  \ NetBeans 模块。\n\n2.  在源代码编辑器中某处设置一个断点。\n\n3.  右键点击该模块并选择 **调试**。\n\n让我们看一个例子。我们来调试\
  \ *Bootstrap* 模块，如前所述，该模块是 NetBeans IDE 执行的起点。\n\n1.  打开 `platform/o.n.bootstrap`\
  \ NetBeans 项目，该项目位于你下载的 Apache NetBeans 源码文件夹中。\n\n2.  打开位于 `src/org/netbeans` 文件夹中的\
  \ `Main.java` 文件。\n\n3.  在 `main()` 方法的第一行（`Class.forName(…)`）上，通过点击编辑器左侧的行号设置一个断点，如第\
  \ 6 章所述。\n\n4.  在项目窗口中右键点击 `o.n.bootstrap` 模块，然后从弹出菜单中选择 **调试**。\n\n\n\n你会看到执行在断点处停止，该行会以绿色高亮显示（见图\
  \ 15-17），现在你可以使用调试工具栏的按钮（见图 15-18）逐步进入代码，如第 6 章所述。\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig18_HTML.jpg](img/479166_1_En_15_Fig18_HTML.jpg)\n\
  \n图 15-18\n调试工具栏\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig17_HTML.jpg](img/479166_1_En_15_Fig17_HTML.jpg)\n\
  \n图 15-17\n调试 o.n.bootstrap NetBeans 平台模块\n\n![../images/479166_1_En_15_Chapter/479166_1_En_15_Fig16_HTML.jpg](img/479166_1_En_15_Fig16_HTML.jpg)\n\
  \n图 15-16\n为你的模块套件以及所需的平台模块选择一个 NetBeans 平台\n\n提交代码\n一旦你实现并测试了你的修改，一个好的做法不仅是更新 JIRA\
  \ 问题，还要向 *dev* 邮件列表发送电子邮件，以通知其他人、获取有用的反馈，并可能找到潜在的测试者。当你确信修改已准备就绪后，向主仓库发起一个拉取请求。\n\
  \n总结\n在本章中，你学习了如何下载和构建 Apache NetBeans IDE 的源代码。你还了解了 Apache NetBeans IDE（基于 Apache\
  \ NetBeans 平台）各个组件的架构概览，并了解了如何将代码提交回 Apache NetBeans `git` 仓库。\n祝你好运，愿源码与你同在！\n\n\
