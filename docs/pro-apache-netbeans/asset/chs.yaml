  \n图 9-12\n\nTodoRCP 应用程序的静态原型\n\n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig11_HTML.jpg](img/479166_1_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11\n\n新建操作向导\n\n图 7-7（第 7 章）中显示的任务编辑表单也需要创建。为了节省时间和精力，只需从旧的 ToDo 应用程序中复制 `TaskDetailsDialog`\
  \ 类，并将其粘贴到 *View* 模块中的 `todo.view` 包内。你会注意到一些错误。为 *View* 模块添加一个从 *View* 到 *Model*\
  \ 模块的依赖关系，以便 *View* 能够访问 `Task` 类。\n\n如果你也从旧的 ToDo 应用程序中复制 `ActionSupport` 类，另一个错误就可以解决。\n\
  \n\n\n## 步骤 2 – 构建“动态”原型\n\n现在让我们完成各项操作。\n\n要让 `AddTaskAction` 显示 `TaskDetailsDialog`，只需将代码清单\
  \ 9-3 的代码复制到 `AddTaskAction` 的 `actionPerformed()` 方法中：\n\n```\nTaskDetailsDialog\
  \ taskDetailsDialog = new TaskDetailsDialog(null, true);\ntaskDetailsDialog.setNewTask(true);\n\
  taskDetailsDialog.setTask(new Task());\n//        taskDetailsDialog.addActionListener(this);\n\
  taskDetailsDialog.setVisible(true);\n代码清单 9-3\nAddTaskAction 的 actionPerformed()\
  \ 方法\n```\n\n你需要添加从 *Controller* 到 *View* 的依赖关系，以便能够修复 `TasksDetailsDialog` 的导入，首先需要将\
  \ `todo.view` 包设为公开。\n\n`EditTaskAction` 也很容易编写（参见代码清单 9-4）。\n\n```\npublic final\
  \ class EditTaskAction implements ActionListener {\nprivate final Task context;\n\
  public EditTaskAction(Task context) {\nthis.context = context;\n}\npublic void actionPerformed(ActionEvent\
  \ ev) {\nTaskDetailsDialog taskDetailsDialog =\nnew TaskDetailsDialog(null, true);\n\
  taskDetailsDialog.setNewTask(false);\ntaskDetailsDialog.setTask(context);\n//  \
  \      taskDetailsDialog.addActionListener(this);\ntaskDetailsDialog.setVisible(true);\n\
  }\n}\n代码清单 9-4\nEditTaskAction\n```\n\n让我们看看如何向 `OutlineView` 显示一些模拟数据。正如我们在前一章所学，我们需要将数据包装成节点，即将我们的模型（`Task`）包装成一个\
  \ `Node`，更具体地说，包装成一个 `BeanNode`，它使用反射来检索*值对象*（本例中为 `Task`）的属性。在 *View* 模块内创建第 8\
  \ 章代码清单 8-3 的类（并添加对 *Node API* 的依赖）。\n\n要在 `OutlineView` 中显示任务，你需要一个扁平的节点列表。扁平节点列表是一个仅提供叶节点的根节点；也就是说，只有一层深度的子节点。工厂用于创建子节点（参见第\
  \ 8 章代码清单 8-4）。\n\n`OutlineView` 使用模拟数据填充，如第 8 章代码清单 8-4 中的 `createKeys()` 方法所示。看看\
  \ `TaskChildFactory` 如何使用默认查找来获取 `TaskManager` 实现，从而检索所有任务。松耦合！\n\n最后，需要修改 `TasksTopComponent`，如第\
  \ 8 章代码清单 8-8 所示。\n\n`ExplorerManager` 是资源管理器视图的控制器，它需要一个根节点元素。向其传递一个 `AbstractNode`；其\
  \ `Children` 派生自 `TaskChildFactory`。\n\n与原始的 Swing ToDo 应用程序相比，代码行数大大减少，你现在就有了一个包含填充数据的运行原型。构建并运行它，你将看到类似于图\
  \ 9-13 所示的视图。\n\n![../images/479166_1_En_9_Chapter/479166_1_En_9_Fig13_HTML.jpg](img/479166_1_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13\n\n包含示例数据的 TodoRCP\n\n然而，当你选择一行或多行时，条件启用的操作并不会相应地启用。要解决这个问题，你需要将 `Task`\
  \ 对象添加到 `TaskNode` 的查找中，然后将 `TopComponent` 的查找设置为其节点的查找。为此，修改 `TaskNode`，如第 8 章代码清单\
  \ 8-5 所示，该操作将任务添加到节点的查找中。\n\n单例查找仅包含一个对象，在本例中就是你的任务。通过添加第 8 章代码清单 8-9 的代码（在设置 `ExplorerManager`\
  \ 根上下文的那行代码之后），将 `TopComponent` 的查找设置为节点的查找。\n\n## 处理事件\n\n现在你已经准备好显示任务，是时候添加一些事件处理了。在原始的\
  \ ToDo 应用程序中，将 GUI 事件分为两个互斥的类别是很有用的：\n\n*   *内部事件*，仅影响视图本身\n*   *外部事件*，会导致模型方法执行\n\
  \n内部事件包括选择更改和点击**取消**按钮。在原始的 ToDo 应用程序中，这些事件由视图类自身处理，并且不作为视图类公共接口的一部分公开。例如，选择一个任务应该启用**编辑任务**菜单项和**移除任务**菜单项，以及相应的工具栏按钮。现在，这些事件由\
  \ *Controller* 模块中使用 cookie 的条件启用操作处理，而不再在 *View* 包中处理。\n\n视图类*不应*处理原始 ToDo 应用程序作者称之为“外部”的那类事件。这些事件应转发给控制器类，控制器类通常为特定用例或一组相关用例实现工作流逻辑。\n\
  \n原始的 ToDo 应用程序包含 `todo.view.ActionSupport` 类，它简单地维护一个 `ActionListeners` 列表，并将 `ActionEvents`\
  \ 转发给它们。但 `ActionSupport` 本身就是一个 `ActionListener`。这样做是为了避免大量与事件相关的方法，例如 `addNewTaskListener()`、`removeNewTaskListener()`、`addEditTaskListener()`、`removeEditTaskListener()`\
  \ 等等。相反，视图类仅生成一个 `ActionEvent`。`ActionSupport` 类从视图组件捕获 `ActionEvent` 并将其转发给控制器，控制器将自己注册为视图的\
  \ `ActionListener`。\n\n在 *TodoRCP* 应用程序中不需要所有这些类，因为 NetBeans RCP 框架会处理所有这些。你需要做的就是完成操作的\
  \ `actionPerformed()` 方法。因此，你的工作是将逻辑从 `QueryEditTasks` 转移到你的操作中。代码清单 9-5 展示了它们如何映射。\n\
  \n```\npublic final class MarkAsCompletedTaskAction implements ActionListener {\n\
  private final List context;\nprivate final TaskManagerInterface taskManager;\npublic\
  \ MarkAsCompletedTaskAction(List context) {\nthis.context = context;\nthis.taskManager\
  \ =\nLookup.getDefault().lookup(TaskManagerInterface.class);\n}\n@Override\npublic\
