- "# 5. Apache NetBeans Java EE 开发\n\n自 11.0 版本起，Apache NetBeans 已内置 Java EE 支持。在此版本之前，由于\
  \ Java EE 仍采用 Oracle 许可，需要以插件形式将其添加到 Apache NetBeans 9.0+ 中。添加该插件后，Apache NetBeans\
  \ 9.0 中用于开发、调试和维护 Java EE 的功能与 11.0 及更高版本相同。该支持提供了添加可在 IDE 内管理的应用服务器容器的能力。对 Maven\
  \ Web 应用以及诸如 Enterprise JavaBeans (EJB)、上下文和依赖注入 (CDI) 以及 JavaServer Faces (JSF)\
  \ 等 Java EE 技术的全面支持，使开发者能够享受自动补全、代码片段和便捷的语法识别功能。总而言之，Apache NetBeans 是开发新旧 Java\
  \ EE 应用的强大工具。\n\n在本章中，我们将详细探讨 Apache NetBeans 为 Java 企业级开发提供的支持。你将学习如何在 IDE 内管理容器、开发后端业务逻辑以及\
  \ Java 持久化 API (JPA) 查询。最后，你将基本了解 Apache NetBeans 为全栈 Java EE 开发所提供的便利。\n\n## 配置服务器容器\n\
