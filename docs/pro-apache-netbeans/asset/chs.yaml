  if (column.getHeaderValue().equals(field)) {\ncolumnModel.setColumnSorted(column,\
  \ ascending, 1);\n}\n}\nTableModel model = ov.getOutline().getModel();\nov.getOutline().tableChanged(new\
  \ TableModelEvent(model, 0, model.getRowCount()));\n}\n代码清单 9-8\nUtilities.sortBy()\
