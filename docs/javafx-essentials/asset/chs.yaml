- '# 第 1 章 JavaFX 8 入门


  JavaFX 是 Java 的下一代**图形用户界面（GUI）**工具包。它是一个能够轻松快速构建高性能 Java 客户端应用程序的平台。


  JavaFX 的底层引擎通过硬件加速图形利用现代 GPU，同时提供设计良好的编程接口，使开发者能够结合图形、动画和 UI 控件。


  这些功能使您能够为客户提供引人入胜、复杂且完全可定制的客户端 GUI，给他们留下深刻印象。


  虽然 Java 最初的目标是*嵌入式*和*客户端*领域，但自 2006 年以来，许多原因促使 Java 语言成为企业级领域的顶级开发平台。


  但最近，随着 JavaFX 平台作为标准客户端 GUI 的引入，这些最初的目标再次开始流行。


  尽管 JavaFX 远不止是一个 GUI 工具包，但它允许 Java 开发者创建具有引人入胜用户界面的客户端应用程序，并轻松连接到后端系统。


  此外，JavaFX 灵活的 FXML 支持使您能够轻松构建**MVC**（**模型-视图-控制器**）架构模式的应用程序，并使用 Scene Builder 工具实现所见即所得的方法。


  JavaFX 的绑定功能简化了实体间的通信，并进一步支持 MVC。除此之外，JavaFX 还提供了使用 CSS 进行快速、可定制的 UI 建模。


  通过添加一个具有文档模型的完整`WebView`组件，映射到 Java 代码变得容易，并为 3D 和媒体功能提供了强大支持。


  在本章中，我们将涵盖以下主题：


  *   什么是 JavaFX 及其目标平台？

  *   JavaFX 历史回顾

  *   JavaFX 的目标、特性以及 JavaFX 8 的新功能

  *   如何安装 Java SE 8、JavaFX 8、NetBeans 以及配置环境变量

  *   开发一个"Hello World" JavaFX 8 应用程序，并理解 JavaFX 8 基本应用程序架构和构建块




  '
- '# JavaFX 目标


  JavaFX 的诞生主要目标是在多种设备上使用，例如嵌入式设备、智能手机、电视、平板电脑和台式机。JavaFX 也遵循 Java 的*一次编写，随处运行*范式。


  JavaFX 8 完全用 Java 语言从头编写，让你感觉宾至如归。因此，用 JavaFX 编写的应用程序可以部署在台式机、笔记本电脑、Web、嵌入式系统、手机和平板电脑上。


  Oracle 已不再支持嵌入式系统；这项工作留给了 ARM 等公司。从 JavaFX 2.x 到 8.x，移动设备从未得到官方支持；现在之所以存在支持，完全是因为
  **OpenJFX**。开源社区将 JavaFX 带到移动环境，使大家从中受益。


  有关 OpenJFX 的更多信息，请访问 [`wiki.openjdk.java.net/display/OpenJFX/Main`](https://wiki.openjdk.java.net/display/OpenJFX/Main)。


  JavaFX 是一套图形和媒体包，使开发人员能够设计、创建、测试、调试和部署富客户端应用程序，这些应用程序能在不同平台上一致运行，且只需一个捆绑包，无需使用许多单独的库、框架和
  API 来实现相同目标。这些单独的库包括媒体、UI 控件、`WebView`、3D 和 2D API。


  因此，如果你是一名 Java 前端开发人员，或是一位经验丰富的 Java Swing、Flash/Flex、SWT 或 Web 开发人员，希望将你的客户端应用程序提升到新水平，并想为客户开发一个美观且复杂的用户界面，那么你正在学习
  JavaFX 技能的正确道路上——这本书就是为你准备的。


  '
- '# 入门


  本章是对 JavaFX 8 的介绍；我们已经讨论了 JavaFX 8 作为一种技术以及你为何应该关注它。


  接下来，我们将回顾其历史，探索其核心功能以及它的应用场景。


  在开始使用本书学习 JavaFX 8 之前，我们将通过安装各种必需的软件包来准备你的开发环境，以便能够编译和运行书中的许多示例。


  在本章中，你将学习如何安装所需软件，例如 **Java 开发工具包 JDK** 和 NetBeans **集成开发环境**（**IDE**）。


  安装完所需软件后，你将开始创建一个传统的 *Hello JavaFX 8* 示例。当你对开发环境感到熟悉后，作为最终验证我们是否走在正确轨道上的步骤，我们将逐步分析
  Hello JavaFX 8 的源代码，以了解基本的 JavaFX 8 应用程序架构。


  ### 注意


  如果你已经熟悉 JDK 和 NetBeans IDE 的安装，可以跳到第 2 章，*JavaFX 8 要点与创建自定义 UI*，该章涵盖了 JavaFX 8 基础知识以及如何创建自定义
  UI 组件。


  那你还在等什么？让我们开始吧！


  '
- '# JavaFX 历史


  你可能认为 JavaFX 是一项相当新的技术，但实际上并非如此。JavaFX 已经存在很长时间了；非正式地说，自 2005 年起。自从 Sun Microsystems
  收购了 *SeeBeyond* 公司以来，就存在一种名为 **F3**（**形**式**追**随**功**能）的图形丰富脚本语言，由工程师 Chris Oliver
  创建。


  在 2007 年的 JavaOne 大会上，Sun Microsystems 正式将 JavaFX 作为该语言的名称，取代了 F3。在 2007 年至 2010
  年期间，Oracle 收购了许多大公司，如 BEA Systems、JD Edwards、Siebel Systems 等。我当时在 Oracle 工作，负责将不同的客户支持渠道整合到当时被称为
  *MetaLink* 的 Oracle 支持网站。


  2009 年 4 月 20 日，Oracle 公司宣布收购 Sun Microsystems，使 Oracle 成为 JavaFX 的新管理者。


  在 2010 年的 JavaOne 大会上，Oracle 宣布了 JavaFX 路线图，其中包括逐步淘汰 JavaFX 1.3 脚本语言，并基于 Java 平台将
  JavaFX 平台重建为基于 Java 的 API。正如承诺的那样，JavaFX 2.0 SDK 于 2011 年 10 月在 JavaOne 大会上发布。


  除了发布 JavaFX 2.0，Oracle 还通过宣布承诺采取措施使 JavaFX 开源，将平台提升到了新水平，从而允许 Java 强大且多才多艺的社区帮助推动平台向前发展。使
  JavaFX 开源增加了其采用率，加快了错误修复的周转时间，并产生了新的增强功能。


  在 JavaFX 2.1 和 2.2 版本之间，新功能的数量迅速增长。JavaFX 2.1 是 Mac OS 上 Java SDK 的官方版本。JavaFX 2.2
  是 Linux 操作系统上 Java SDK 的官方版本。


  并没有 JavaFX 3.x 这样的版本，但 Java 开发领域的重大变化发生在 Java SE 8 发布之时，该版本于 2014 年 3 月 18 日宣布。Java
  SE 8 有许多新的 API 和语言增强功能，包括 **Lambdas**、Stream API、Nashorn JavaScript 引擎，以及 *JavaFX
  API*，这些都被整合到标准 JDK 捆绑包中，JavaFX 版本变为 8，作为 JavaFX 2.0 的直接继承者。


  要查看 Java SE 8 中的所有新功能，请访问 [`www.oracle.com/technetwork/java/javase/8-whats-new-2157071.html`](http://www.oracle.com/technetwork/java/javase/8-whats-new-2157071.html)。


  ## JavaFX 8 何时可用？


  答案是*现在*。如前所述，Java SE 8 于 2014 年 3 月 18 日发布。对于使用 Java 构建客户端应用程序的开发人员来说，JavaFX 富互联网应用框架现在支持
  Java 8。


  大多数 Java 企业版供应商也支持 Java 8。你是否立即迁移到 Java SE 8 取决于你正在从事的项目类型。


  ### 注意


  事实上，根据 Oracle JDK 支持路线图，2015 年 4 月之后，Oracle 将不再在其公共下载站点上发布 Java SE 7 的进一步更新。


  JavaFX API 作为 **Java SE 运行时环境**（**JRE**）和 JDK 的完全集成功能提供。JDK 适用于所有主要桌面平台（*Windows*、*Mac
  OS X*、*Solaris* 和 *Linux*），因此 JavaFX 也将在所有主要桌面平台上运行。


  关于 JavaFX 8，它支持以下 API：


  *   3D 图形

  *   富文本支持

  *   打印 API




  '
- '# JavaFX 特性


  根据 JavaFX 官方文档，JavaFX 8 及更高版本包含以下特性：


  *   **Java API**：JavaFX 是一个 Java 库，包含用 Java 代码编写的类和接口。

  *   **FXML 和 Scene Builder**：这是一种基于 XML 的声明式标记语言，用于构建 JavaFX 应用程序用户界面。你可以使用 FXML
  编码，或使用 JavaFX Scene Builder 以交互方式设计 GUI。Scene Builder 生成的 FXML 标记可以移植到 NetBeans
  等 IDE 中，你可以在其中添加业务逻辑。此外，生成的 FXML 文件可以直接在 JavaFX 应用程序内部使用。

  *   **WebView**：这是一个 Web 组件，它使用 `WebKit`（一种 HTML 渲染引擎技术）使得在 JavaFX 应用程序中嵌入网页成为可能。在
  `WebView` 中运行的 JavaScript 可以调用 Java API，反之亦然。

  *   **Swing/SWT 互操作性**：现有的 Swing 和 SWT 应用程序可以利用 JavaFX 的特性，例如丰富的图形、媒体播放和嵌入式 Web
  内容。

  *   **内置 UI 控件和 CSS**：JavaFX 提供了所有主要的 UI 控件，以及一些开发全功能应用程序所需的额外不常见控件，如图表、分页和手风琴式布局。组件可以使用标准
  Web 技术（如 CSS）进行皮肤定制。

  *   **3D 图形特性**：包含对 3D 图形库的支持。

  *   **Canvas API**：你可以使用 Canvas API 直接在 JavaFX 场景区域内绘图，该 API 包含一个图形元素（节点）。

  *   **多点触控支持**：基于底层平台的能力支持多点触控操作。

  *   **硬件加速图形管线**：JavaFX 图形基于图形渲染管线 *Prism*。当与支持的显卡或**图形处理单元**（**GPU**）一起使用时，Prism
  引擎可以平滑快速地渲染 JavaFX 图形。如果系统不具备这些条件，则 Prism 默认使用软件渲染堆栈。

  *   **高性能媒体引擎**：该引擎提供了一个稳定、低延迟的媒体框架，该框架基于 `GStreamer` 多媒体框架。通过媒体管线支持 Web 多媒体内容的播放。

  *   **自包含部署模型**：自包含应用程序包包含所有应用程序资源以及 Java 和 JavaFX 运行时的私有副本。它们作为本机可安装包分发，并提供与该操作系统本机应用程序相同的安装和启动体验。


  ## JavaFX 8 的新特性


  以下是 Java SE 8 版本中 JavaFX 组件的新特性和重大产品变更的简要总结：


  *   新的 *Modena 主题* 现在是 JavaFX 应用程序的默认主题。

  *   增加了对更多 HTML5 特性的支持，包括 Web Sockets、Web Workers、Web Fonts 和打印功能。

  *   API 通过新的 `SwingNode` 类使你能够将 **Swing** 内容嵌入到 JavaFX 应用程序中，从而改进了 Swing 互操作性特性。

  *   现在提供了 `DatePicker`、`Spinner` 和 `TableView` 内置 UI 控件。

  *   通过 `javafx.print` 包提供了公共的 JavaFX 打印 API。

  *   提供了对高 DPI 显示器的支持。

  *   CSS 样式类成为公共 API。

  *   引入了一个计划服务类。

  *   3D 图形库通过几个新的 API 类得到了增强。

  *   此版本中对 *Camera API* 类进行了重大更新。

  *   现在 JavaFX 8 支持富文本功能。这包括 UI 控件中的双向和复杂文本脚本（如泰语和印地语），以及文本节点中的多行、多样式文本。

  *   支持对话框和辅助功能 API。


  在附录 *成为 JavaFX 大师* 中，我提供了成为 JavaFX 大师所需的所有参考资料（链接、书籍、杂志、文章、博客和工具）以及真实的 JavaFX 8
  生产应用程序列表。


  下图展示了使用 JavaFX 8 构建的 `Ensemble8.jar` 应用程序，显示了涉及各种 JavaFX 8 组件、主题和概念的示例。更有趣的是，其源代码可供学习和修改——请参阅最后一章了解如何安装此应用程序。


  ![JavaFX 8 的新特性](img/B03998_01_01.jpg)


  JavaFX 8 应用程序


  该应用程序涵盖了许多主题，尤其是新的 JavaFX 8 3D API，可以在“Graphics 3D”部分找到，如下图所示：


  ![JavaFX 8 的新特性](img/B03998_01_02.jpg)


  JavaFX 8 3D 应用程序


  '
- "# 安装所需软件\n\n到目前为止，我们已经对 JavaFX 有了很好的了解，我和你一样渴望开始创建并启动我们的第一个 `\"Hello JavaFX 8\"\
  ` 应用程序。但这需要下载并安装正确的工具，以便我们能够创建和编译本书中的大部分代码。\n\n你需要下载并安装 *Java 8 开发工具包*（JDK）或更高版本。注意不是运行时版本（JRE）。\n\
  \n从以下位置下载最新的 Java SE 8u45 JDK 或更高版本：\n\n[`www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\n\
  \n从以下链接 [`netbeans.org/downloads`](https://netbeans.org/downloads) 下载并安装 NetBeans\
  \ 8.0.2 或更高版本，虽然推荐使用 NetBeans IDE **All** 捆绑包，*你也可以使用 Java EE 捆绑包*，如下图所示：\n\n![安装所需软件](img/B03998_01_03.jpg)\n\
  \nNetBeans 捆绑包下载。\n\n目前，JavaFX 8 支持以下操作系统：\n\n*   Windows 操作系统（XP、Vista、7、8）32 位和\
  \ 64 位\n*   Mac OS X（64 位）\n*   Linux（32 位和 64 位）、Linux ARMv6/7 VFP、HardFP ABI（32\
  \ 位）\n*   Solaris（32 位和 64 位）\n\n\n\n## 安装 Java SE 8 JDK\n\n本节概述的步骤将指导您成功下载并安装 Java\
  \ SE 8。请从以下位置下载 Java SE 8 JDK：\n\n[`www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html`](http://www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html)\n\
  \n在以下步骤中，将以 Mac OS X Yosemite (10.10.3) 操作系统上的 Java SE 8u45 JDK 64 位版本（撰写本文时的版本）为例。\n\
  \n其他操作系统和 JDK 版本的步骤类似。但是，如果您的环境不同，请参考以下链接获取更多详细信息：\n\n[`docs.oracle.com/javase/8/docs/technotes/guides/install/toc.html`](http://docs.oracle.com/javase/8/docs/technotes/guides/install/toc.html)\n\
  \n以下是安装 Java SE 8 JDK 的步骤：\n\n1.  通过启动镜像文件 `jdk-8u45-macosx-x64.dmg` 来安装 Java 8\
  \ JDK。启动 JDK 8 安装镜像文件后，将出现如下截图所示的屏幕。这是软件包安装文件。双击它，安装程序将启动：![安装 Java SE 8 JDK](img/B03998_01_04.jpg)\n\
  \n    JDK 8 安装镜像文件\n\n    ### 提示\n\n    通常，您需要拥有机器的管理员权限才能安装软件。\n\n2.  开始安装 Java\
  \ 8 JDK。安装过程开始时将出现如下截图所示的屏幕。点击**继续**按钮，然后在**安装类型**屏幕向导中，点击**安装**以开始安装。![安装 Java\
  \ SE 8 JDK](img/B03998_01_05.jpg)\n\n    Java SE 开发工具包 8 安装\n\n3.  点击**安装**后，系统可能会要求您提供密码。提供密码，点击**确定**，安装将继续并显示进度条，如下图所示：![安装\
  \ Java SE 8 JDK](img/B03998_01_06.jpg)\n\n    Java SE 开发工具包 8 安装进行中\n\n4.  安装程序将完成\
  \ Java 8 SE 开发工具包的安装。点击**关闭**按钮退出。\n\n### 设置环境变量\n\n现在您需要设置几个关键的环境变量。设置方式及其值取决于您的操作系统。需要设置的两个变量是：\n\
  \n*   **JAVA_HOME**：此变量告诉您的操作系统 Java 的安装目录在哪里。\n*   **PATH**：此变量指定 Java 可执行文件目录的位置。此环境变量允许系统搜索包含可执行文件的路径或目录。Java\
  \ 可执行文件位于 `JAVA_HOME` 主目录下的 bin 目录中。\n\n为了使 `JAVA_HOME` 和 `PATH` 的设置更持久，您需要将它们添加到系统中，以便在每次启动或登录时始终可用。根据您的操作系统，您需要能够编辑环境变量名称和值。\n\
  \n在 *Windows 环境*中，您可以使用键盘快捷键 *Windows 徽标键 + Pause/Break 键*，然后点击**高级系统设置**以显示**系统属性**对话框。\n\
  \n接下来，点击**环境变量**。您可以在此处添加、编辑和删除环境变量。您将通过使用已安装的主目录作为值来添加或编辑 `JAVA_HOME` 环境变量。此截图显示了\
  \ Windows 操作系统上的环境变量对话框：\n\n![设置环境变量](img/B03998_01_07.jpg)\n\nWindows 环境变量\n\n\
  让我们设置环境变量：\n\n*   要为 **Mac OS X** 平台设置您的 `JAVA_HOME` 环境变量，您需要启动一个终端窗口，通过添加以下 export\
  \ 命令来编辑您主目录下的 `.bash_profile` 文件：\n\n    ```\n    export JAVA_HOME=$(/usr/libexec/java_home\
  \ -v 1.8)\n    ```\n\n*   在 **Linux** 和其他使用 Bash shell 环境的 **Unix** 操作系统上，启动一个终端窗口，编辑\
  \ `~/.bashrc` 或 `~/.profile` 文件，使其包含 export 命令：\n\n    ```\n    export JAVA_HOME=/usr/java/jdk1.8.0\n\
  \    export PATH=$PATH:$JAVA_HOME/bin\n    ```\n\n*   在 Linux 和其他使用 `C` shell (csh)\
  \ 环境的 Unix 操作系统上，启动一个终端窗口，编辑 `~/.cshrc` 或 `~/.login` 文件，使其包含 `setenv` 命令：\n\n  \
  \  ```\n    setenv JAVA_HOME /usr/java/jdk1.8.0_45\n    setenv PATH ${JAVA_HOME}/bin:${PATH}\n\
  \    ```\n\n设置好路径和 `JAVA_HOME` 环境变量后，您需要验证设置，方法是启动一个终端窗口，并在命令提示符下执行以下两个命令：\n\n```\n\
  java -version\njavac –version\n```\n\n### 注意\n\n每个命令的输出都应显示一条消息，指示 Java SE 8 的语言和运行时版本。\n\
  \n## 安装 NetBeans IDE\n\n在开发 JavaFX 应用程序时，您将使用 NetBeans IDE（或您喜欢的任何其他 IDE）。请务必下载包含\
  \ JavaFX 的正确 NetBeans 版本。要安装 NetBeans IDE，请遵循以下步骤：\n\n1.  从以下位置下载 NetBeans IDE 8.0.2\
  \ 或更高版本：\n\n    [`netbeans.org/downloads/index.html`](https://netbeans.org/downloads/index.html)\n\
  \n2.  启动 `.dmg` 镜像文件 `netbeans-8.0.2-macosx.dmg`。镜像将被验证，然后会打开一个包含安装程序包存档 `netbeans-8.0.2.pkg`\
  \ 的文件夹；双击它以启动安装程序。将出现一个对话框，显示消息：*此软件包将运行一个程序以确定是否可以安装该软件。* 点击**继续**按钮。\n3.  启动 NetBeans\
  \ 安装对话框后，再次点击**继续**。接下来，接受许可协议，点击**继续**，然后点击**同意**。\n4.  点击**安装**按钮继续。以下截图显示了一个\
  \ **Mac** 安全警告提示；提供您的密码并点击**安装软件**。![安装 NetBeans IDE](img/B03998_01_08.jpg)\n\n\
  \    Mac 安全警告对话框\n\n5.  NetBeans IDE 安装过程将开始。以下截图显示了安装进度条：![安装 NetBeans IDE](img/B03998_01_09.jpg)\n\
  \n    安装进度\n\n6.  点击**关闭**按钮完成安装，如下所示：![安装 NetBeans IDE](img/B03998_01_10.jpg)\n\
  \n    安装完成\n\n现在您可以继续创建 JavaFX 应用程序了。\n\n"
- "# 创建 \"Hello World\" JavaFX 风格的应用程序\n\n向您展示创建和构建 JavaFX 应用程序是什么样的最好方式，就是通过一个 `Hello\
  \ World` 应用程序。\n\n在本节中，您将使用我们刚刚安装的 NetBeans IDE 来开发、编译和运行一个基于 JavaFX 的 `Hello World`\
  \ 应用程序。\n\n\n\n## 使用 NetBeans IDE\n\n要快速开始使用 NetBeans IDE 创建、编码、编译并运行一个简单的 JavaFX\
  \ 风格的 `Hello World` 应用程序，请遵循本节概述的步骤：\n\n1.  从 **文件** 菜单中，选择 **新建项目**。\n2.  从 **JavaFX\
  \ 应用程序类别** 中，选择 **JavaFX 应用程序**。点击 **下一步**。\n3.  将项目命名为 `HelloJavaFX`。你也可以选择为应用程序类定义包结构。然后点击\
  \ **完成**，如下图所示：\n\n    ![使用 NetBeans IDE](img/B03998_01_11.jpg)\n\n    新建 JavaFX\
  \ 应用程序向导\n\n    NetBeans 会打开 `HelloJavaFX.java` 文件，并用一个基本的“Hello World”应用程序代码填充它。\n\
  \n    ### 注意\n\n    你会发现此版本的代码与 NetBeans 实际生成的代码略有不同，你可以比较它们以找出差异，但它们具有相同的结构。我这样做是为了在点击\
  \ **说“Hello World”** 按钮时，将结果显示在 `Scene` 上的文本节点中，而不是控制台中。为此，还使用了一个 `VBox` 容器。\n\n\
  4.  右键点击项目，然后从菜单中选择 **运行**，如下图所示：![使用 NetBeans IDE](img/B03998_01_12.jpg)\n\n  \
  \  运行应用程序\n\n5.  NetBeans 将编译并运行该应用程序。输出应如下图所示：![使用 NetBeans IDE](img/B03998_01_13.jpg)\n\
  \n    从 NetBeans IDE 启动的 JavaFX Hello World\n\n6.  点击按钮，你应该会看到以下结果：![使用 NetBeans\
  \ IDE](img/B03998_01_14.jpg)\n\n    JavaFX Hello World 结果\n\n以下是基本 Hello World 应用程序\
  \ (`HelloJavaFX.java`) 的修改后代码：\n\n```\nimport javafx.application.Application;\n\
  import javafx.scene.Scene;\nimport javafx.scene.control.Button;\nimport javafx.scene.text.Text;\n\
  import javafx.stage.Stage;\nimport static javafx.geometry.Pos.CENTER;\nimport javafx.scene.layout.VBox;\n\
  \n/**\n  * @author mohamed_taman\n */\npublic class HelloJavaFX extends Application\
  \ {\n\n  @Override\n  public void start(Stage primaryStage) {\n\n    Button btn\
  \ = new Button();\n    Text message = new Text();\n\n    btn.setText(\"Say 'Hello\
  \ World'\");\n\n    btn.setOnAction(event -> {\n      message.setText(\"Hello World!\
  \ JavaFX style :)\");\n    });\n\n    VBox root = new VBox(10,btn,message);\n  \
  \  root.setAlignment(CENTER);\n\n    Scene scene = new Scene(root, 300, 250);\n\n\
  \    primaryStage.setTitle(\"Hello JavaFX 8 World!\");\n    primaryStage.setScene(scene);\n\
  \    primaryStage.show();\n  }\n  public static void main(String[] args) {\n   \
  \ launch(args);\n  }\n}\n```\n\n## 工作原理\n\n以下是关于 JavaFX 应用程序基本结构需要了解的重要事项：\n\n*\
  \   JavaFX 应用程序的主类应继承 `javafx.application.Application` 类。`start()` 方法是所有 JavaFX\
  \ 应用程序的*主入口点*。\n*   JavaFX 应用程序通过*舞台*和*场景*来定义用户界面容器。JavaFX `Stage` 类是顶层的 JavaFX\
  \ 容器。JavaFX `Scene` 类是所有内容的容器。以下代码片段创建了一个舞台和场景，并使场景在给定的像素大小下可见——`new Scene(root,\
  \ 300, 250)`。\n*   在 JavaFX 中，场景的内容表示为节点的分层场景图。在此示例中，根节点是一个 `VBox` 布局对象，它是一个可调整大小的布局节点。这意味着根节点的大小会跟随场景的大小，并在用户调整舞台大小时发生变化。\n\
  *   这里使用 `VBox` 作为容器，将其内容节点垂直排列成单列多行。我们将按钮 **btn** 控件添加到列的第一行，然后将文本 **message**\
  \ 控件添加到同一列的第二行，垂直间距为 10 像素，如下代码片段所示：\n\n    ```\n    VBox root = new VBox(10,btn,message);\n\
  \    root.setAlignment(CENTER);\n    ```\n\n*   我们为按钮控件设置了文本，并添加了一个事件处理器，当按钮被点击时，将消息文本控件设置为\
  \ **Hello World! JavaFX style :)**。\n*   你可能会注意到一段用 Java 编写的奇怪代码语法，却没有编译器错误。这是一个\
  \ **Lambda** 表达式，它已被添加到 Java SE 8 中，我们将在第 2 章 *JavaFX 8 要点与创建自定义 UI* 中简要讨论它。与旧的匿名内部类风格稍作比较，现在使用\
  \ Lambda 表达式更简洁、更精炼。请看这段代码对比：\n\n    旧式写法：\n\n    ```\n    btn.setOnAction(new EventHandler<ActionEvent>()\
  \ {\n      @Override\n      public void handle(ActionEvent event) {\n        message.setText(\"\
  Hello World! JavaFX style :)\");\n      }\n    });\n    ```\n\n    新时代写法：\n\n  \
  \  ```\n    btn.setOnAction(event -> {\n        message.setText(\"Hello World! JavaFX\
  \ style :)\");\n    });\n    ```\n\n*   当应用程序的 **JAR** 文件是使用 JavaFX Packager 工具创建时，该工具会将\
  \ JavaFX Launcher 嵌入到 JAR 文件中，因此 JavaFX 应用程序不需要 `main()` 方法。\n*   然而，包含 `main()`\
  \ 方法是有用的，这样你就可以运行那些没有使用 JavaFX Launcher 创建的 JAR 文件，例如在使用 JavaFX 工具未完全集成的 IDE 时。此外，嵌入\
  \ JavaFX 代码的 **Swing** 应用程序也需要 `main()` 方法。\n*   在这里，在我们的 `main()` 方法的入口点，我们通过简单地将命令行参数传递给\
  \ `Application.launch()` 方法来启动 JavaFX 应用程序。\n*   在 `Application.launch()` 方法执行后，应用程序将进入就绪状态，框架内部将调用\
  \ `start()` 方法来开始。\n*   此时，程序执行发生在 *JavaFX 应用程序线程* 上，而不是 **主线程** 上。当调用 `start()`\
  \ 方法时，一个 JavaFX `javafx.stage.Stage` 对象可供你使用和操作。\n\n### 注意\n\n高级主题将在接下来的章节中详细讨论。更重要的是，我们将在接下来的章节中深入了解\
  \ JavaFX 应用程序线程。在最后三章中，我们将看到如何将其他线程的结果带入 JavaFX 应用程序线程，以便在场景上正确渲染。\n\n"
- '# 总结


  到目前为止，你已经了解了 JavaFX 是什么，并看到了它的强大之处。你已经成功下载并安装了 Java 8 JDK 和 NetBeans IDE。在成功安装必备软件后，你通过
  NetBeans IDE 创建了一个 JavaFX Hello World GUI 应用程序。在学习了如何编译和运行 JavaFX 应用程序之后，你对源文件 `HelloJavaFX.java`
  进行了快速的代码走查。


  接下来，在第 2 章 *JavaFX 8 要点与创建自定义 UI* 中，你将了解 JavaFX 8 的架构组件和引擎，它们使 JavaFX 应用程序能够在底层高效、流畅地运行。你还将学习最常见的布局
  UI 组件，并了解如何为整个应用程序或单个场景节点设置主题。


  我们还将介绍 Java SE 8 最重要的特性——Lambda 表达式及其工作原理。然后，我们将深入了解 **Scene Builder**，将其作为声明式 UI
  和高效工具，接着学习生成的基于 FXML 的标记文档，以及如何将其导入 NetBeans IDE，以继续实现你的应用程序逻辑，并将其与你已在 FXML 文档中声明的
  UI 控件关联起来。


  最后，你将能够创建一个未随默认 JavaFX 8 UI 控件一起提供的自定义 UI 组件。




  '
- '# 第 2 章 JavaFX 8 核心知识与创建自定义 UI


  了解 JavaFX 的核心知识将帮助你轻松构建复杂且精巧的 UI 解决方案。


  在本章中，你将简要了解 JavaFX 8 的架构，从而理解 JavaFX 架构组件和引擎如何与你的 JavaFX 应用程序高效协同工作，并流畅地渲染其图形。


  你将学习如何在 JavaFX 场景上渲染图形，为此，我们将使用场景、一些控件和样式创建一个基础应用程序。


  我们将探讨 Java SE 8 特性的基础知识（例如 **Lambda 表达式**和**函数式接口**），以帮助提高代码的可读性、质量和生产力。


  当我们创建了第一个结构化的 JavaFX 8 应用程序后，如果能够在不改变其功能的情况下更改应用程序的 UI，那岂不是很好？你将通过了解 JavaFX CSS
  样式的基础知识来学习主题化。


  最后，你将了解如何使用 Scene Builder 以图形方式创建和定义 UI 屏幕，并将其保存为 JavaFX FXML 格式的文件。你还将获得创建*自定义控件*的实践经验。


  在本章中，我们将涵盖以下主题：


  *   理解 JavaFX 架构组件

  *   使用 JavaFX 组件设置 UI

  *   使用 Java SE 8、Lambda 表达式和其他特性

  *   为你的应用程序设置主题以适配不同平台

  *   使用 CSS 自定义应用程序 UI

  *   使用 Scene Builder 工具以可视化方式创建 UI

  *   使用 FXML 构建自定义 UI


  '
- "# JavaFX 8 架构快速回顾\n\n为了更好地理解框架的组件和引擎如何协同工作来运行你的 JavaFX 应用程序，本节将对 JavaFX 架构和生态系统进行高层描述。\n\
  \n下图展示了 JavaFX 平台的架构组件。它显示了每个组件以及它们之间如何相互连接。\n\n负责运行你的 JavaFX 应用程序代码的引擎位于 JavaFX\
  \ 公共 API 之下。\n\n该引擎由子组件组成。这些组件包括 **Prism**（一个 JavaFX 高性能图形引擎）、Glass 工具包（一个小巧高效的窗口系统）、一个媒体引擎和一个\
  \ Web 引擎。\n\n### 注意\n\n虽然这些组件未通过公共 API 公开，但我们仍将对其进行描述，以便你更好地了解是什么让 JavaFX 应用程序能够高效地成功运行。\n\
  \n![JavaFX 8 架构快速回顾](img/B03998_02_01.jpg)\n\nJavaFX 架构图\n\n有关 JavaFX 架构和生态系统的更多信息和描述，请访问\
  \ [`docs.oracle.com/javase/8/javafx/get-started-tutorial/jfx-architecture.htm`](http://docs.oracle.com/javase/8/javafx/get-started-tutorial/jfx-architecture.htm)。\n\
  \n## 场景图\n\n每个应用程序都有一个起始根节点来构建 UI 层次结构，而 JavaFX 应用程序的起点是*场景图*。在上面的截图中，它显示为顶层蓝色部分的一部分。它是节点的根树，代表了应用程序用户界面的所有视觉元素。它还跟踪并处理任何用户输入，并且可以被渲染，因为它本身就是一个\
  \ UI 节点。\n\n*节点*是场景图树中的任何一个元素。每个节点默认具有以下属性：用于标识的 ID、用于更改其视觉属性的样式类列表，以及一个边界体积，以便与场景上的其他组件及其父布局容器节点（场景图的根节点除外）正确适配。\n\
  \n场景图树中的每个节点都有一个父节点，但可以有零个或多个子节点；然而，场景根节点没有父节点（为 null）。此外，JavaFX 有一种机制来确保一个节点只能有一个父节点；它还可以具有以下内容：\n\
  \n*   视觉效果，例如模糊和阴影\n*   通过不透明度控制组件透明度\n*   CPU 加速的 2D 变换、过渡和旋转\n*   3D 变换，例如过渡、缩放和旋转\n\
  *   事件处理器（例如鼠标事件、键盘事件或其他输入方法，如触摸事件）\n*   特定于应用程序的状态\n\n下图显示了舞台、场景、UI 节点和图形树之间的关系：\n\
  \n![场景图](img/B03998_02_02.jpg)\n\nJavaFX UI 树层次结构关系\n\n图形基元也是 JavaFX 场景图不可或缺的一部分，例如线条、矩形和文本，以及图像、媒体、UI\
  \ 控件和布局容器。\n\n在为客户提供复杂且丰富的 UI 时，场景图简化了这项任务。此外，你可以使用 `javafx.animation` API 快速轻松地动画化场景图中的各种图形。\n\
  \n除了这些特性之外，`javafx.scene` API 还允许创建和指定以下几种内容类型：\n\n*   **节点**：任何表示为 UI 控件、图表、组、容器、嵌入式\
  \ Web 浏览器、形状（2D 和 3D）、图像、媒体和文本的节点元素\n*   **效果**：这些是简单的对象，当应用于 UI 节点时，会改变其在场景图节点上的外观，例如模糊、阴影和颜色调整\n\
  *   **状态**：任何特定于应用程序的状态，例如变换（节点的定位和方向）和视觉效果\n\n## 用于 JavaFX 特性的 Java 公共 API\n\n\
  这是你的瑞士军刀工具包，以一套完整的 Java 公共 API 形式提供，支持富客户端应用程序开发。\n\n这些 API 为你提供了前所未有的灵活性，通过将 Java\
  \ SE 平台的最佳功能与全面、沉浸式的媒体功能相结合，构建你的富客户端 UI 应用程序，形成一个直观且全面的、触手可及的一站式开发环境。\n\n这些用于 JavaFX\
  \ 的 Java API 允许你执行以下操作：\n\n*   使用 Java SE 的强大功能，从泛型、注解和多线程，到新的 Lambda 表达式（在 Java\
  \ SE 8 中引入）。\n*   为 Web 开发人员提供了一种更简单的方法，从其他基于 JVM 的动态语言（例如 *JavaScript*）中使用 JavaFX。\n\
  *   通过集成其他系统语言（例如 *Groovy*）来编写大型且复杂的 JavaFX 应用程序。\n*   将你的 UI 控件绑定到控制器属性，以便自动通知和更新从模型反映到绑定的\
  \ UI 节点。绑定包括对高性能惰性绑定、绑定表达式、绑定序列表达式和部分绑定重新评估的支持。我们将在第 3 章 *开发 JavaFX 桌面和 Web 应用程序*中看到这一点以及更多内容。\n\
  *   引入可观察列表和映射，通过扩展 Java 集合库，允许应用程序将 UI 连接到数据模型，以观察这些数据模型中的变化并相应地更新相应的 UI 控件。\n\n\
  \n\n## 图形系统\n\nJavaFX 图形系统（上图中以紫色显示）支持 2D 和 3D 场景图，使其能够在 JavaFX 场景图层上流畅运行。作为该层之下的实现细节，当系统缺乏足够的图形硬件来支持硬件加速渲染时，它会提供渲染软件栈。\n\
  \nJavaFX 平台拥有两条实现图形加速的管线：\n\n*   **Prism**：这是处理所有渲染作业的引擎。它可以在硬件和软件渲染器上运行，包括 3D 渲染。JavaFX\
  \ 场景的栅格化和渲染均由该引擎负责。根据所使用的设备，可能采用以下多种渲染路径：\n    *   Windows XP 和 Vista 上的 DirectX\
  \ 9，以及 Windows 7 上的 DirectX 11\n    *   Linux、Mac 和嵌入式系统上的 OpenGL\n    *   当无法进行硬件加速时的软件渲染\n\
  *   **Quantum Toolkit**：负责将 Prism 引擎和 Glass 窗口工具包连接在一起，使其可供堆栈中上层的 JavaFX 层使用。此外，它还管理与渲染和事件处理相关的任何线程规则。\n\
  \n## Glass 窗口工具包\n\nGlass 窗口工具包（上图中部以红色显示）作为平台相关层，负责将 JavaFX 平台连接到原生操作系统。\n\n其主要职责是提供原生操作系统服务，例如管理定时器、窗口和表面，因此它在渲染堆栈中的位置是最低的。\n\
  \n## JavaFX 线程\n\n通常，系统在任何给定时间会运行以下两个或多个线程：\n\n*   **JavaFX 应用程序线程**：这是 JavaFX 应用程序运行所使用的主要线程。\n\
  *   **Prism 渲染线程**：该线程独立于事件分发器处理渲染。它在准备处理下一帧（第 N+1 帧）的同时，渲染当前帧（第 N 帧）。其巨大优势在于能够执行并发处理，尤其是在拥有多个处理器的现代系统上。\n\
  *   **媒体线程**：该线程在后台运行，并通过使用 JavaFX 应用程序线程，经由场景图同步最新的帧。\n*   **脉冲**：它提供了一种异步处理事件的方式。它有助于管理\
  \ JavaFX 场景图元素状态与 Prism 引擎中场景图事件之间的同步。当脉冲被触发时，场景图上元素的状态会同步到渲染层。\n\n### 注意\n\n任何布局节点和\
  \ CSS 也都与脉冲事件相关联。\n\n*Glass 窗口工具包*使用高精度原生定时器来执行所有脉冲事件。\n\n## 媒体与图像\n\nJavaFX 的 `javafx.scene.media`\
  \ API 提供了媒体功能。JavaFX 支持视觉和音频媒体。对于音频文件，它支持 `MP3`、`AIFF` 和 `WAV` 文件以及 `FLV` 视频文件。\n\
  \n你可以通过 JavaFX 媒体提供的三个主要独立组件来访问媒体功能——`Media` 对象代表一个媒体文件，`MediaPlayer` 播放媒体文件，`MediaView`\
  \ 是一个节点，用于将媒体显示到场景图中。\n\n### 注意\n\n媒体引擎组件（上图中以橙色显示）在设计时充分考虑了稳定性和性能，以在所有支持的平台上提供一致的行为。\n\
  \n## Web 组件\n\nWeb 引擎组件（上图中以绿色显示）是最重要的 JavaFX UI 控件之一，它基于 WebKit 引擎构建，WebKit 是一个开源\
  \ Web 浏览器引擎，支持 HTML5、JavaScript、CSS、DOM 渲染和 SVG 图形。它通过其 API 提供 Web 查看器和完整的浏览功能。我们将在第\
  \ 3 章 *开发 JavaFX 桌面和 Web 应用程序*中深入探讨这一点，届时将开发 Web 应用程序。\n\n它允许你在 Java 应用程序中添加和实现以下功能：\n\
  \n*   渲染来自本地或远程 URL 的任何 HTML 内容\n*   提供前进和后退导航，并支持历史记录\n*   重新加载内容以获取任何更新\n*   为\
  \ Web 组件添加动画并应用 CSS 效果\n*   为 HTML 内容提供丰富的编辑控件\n*   可以执行 JavaScript 命令并处理 Web 控件事件\n\
  \n## 布局组件\n\n在构建丰富且复杂的 UI 时，我们需要一种方法来灵活、动态地安排 JavaFX 应用程序中的 UI 控件。这是使用布局容器或窗格的最佳场景。\n\
  \n布局 API 包含以下容器类，它们可以自动化常见的布局 UI 模式：\n\n*   **BorderPane**：将其内容节点布局在顶部、底部、右侧、左侧或中心区域\n\
  *   **HBox**：将其内容节点水平排列成单行\n*   **VBox**：将其内容节点垂直排列成单列\n*   **StackPane**：将其内容节点以从后到前的顺序堆叠在窗格中心\n\
  *   **GridPane**：允许创建灵活的行列网格，用于布局内容节点\n*   **FlowPane**：将其内容节点按水平或垂直方向流动排列，并在达到指定宽度（水平方向）或高度（垂直方向）边界时自动换行\n\
  *   **TilePane**：将其内容节点放置在统一大小的布局单元格或磁贴中\n*   **AnchorPane**：允许创建锚定节点到布局的顶部、底部、左侧或中心，并且我们可以自由定位其子节点\n\
  \n### 提示\n\n不同的容器可以在 JavaFX 应用程序中嵌套使用；为了实现所需的布局结构，我们将在接下来开发自定义 UI 时看到实际应用。\n\n##\
  \ JavaFX 控件\n\nJavaFX 控件是 UI 布局的构建块，它们作为一组 JavaFX API 位于 `javafx.scene.control`\
  \ 包中。它们通过使用场景图中的节点构建而成。可以通过 JavaFX CSS 对它们进行主题化和外观定制。它们可跨不同平台*移植*。它们充分利用了 JavaFX\
  \ 平台丰富的视觉特性。\n\n下图展示了一些当前支持的 UI 控件，此外还有更多未在此显示：\n\n![JavaFX 控件](img/B03998_02_03.jpg)\n\
  \nJavaFX UI 控件示例\n\n### 注意\n\n有关所有可用 JavaFX UI 控件的更多详细信息，请参阅官方教程 [`docs.oracle.com/javase/8/javafx/user-interface-tutorial/ui_controls.htm#JFXUI336`](http://docs.oracle.com/javase/8/javafx/user-interface-tutorial/ui_controls.htm#JFXUI336)\
  \ 以及 `javafx.scene.control` 包的 API 文档。\n\n"
- "# Java SE 8 特性\n\n我们将浅尝 Java SE 8，以理解两个最重要的特性——lambda 或 lambda 表达式以及函数式接口（它们使 lambda\
  \ 可用），从而帮助我们编写更好、更简洁、样板代码更少的 JavaFX 8 代码。但请记住，本书不会涉及每个 lambda 细节，因为这不是一本关于 Java\
  \ SE 8 的书。\n\n### 注意\n\n要更好地了解 Java 的 lambda 路线图，请访问以下官方教程：[`docs.oracle.com/javase/tutorial/java/javaOO/lambdaexpressions.html`](http://docs.oracle.com/javase/tutorial/java/javaOO/lambdaexpressions.html)。\n\
  \n\n\n## Lambda 表达式\n\nJava 语言中 **lambda** 项目的首要目标是解决函数式编程缺失的问题，并提供一种通过创建匿名（未命名）函数来轻松实现函数式编程的方式，其方式类似于在\
  \ Java 中创建匿名对象而非方法。\n\n正如你在第 1 章的示例中所见，*JavaFX 8 入门*，我们讨论了为 JavaFX 按钮的按下事件定义处理器的常规方法——使用匿名内部类：\n\
  \n```\nbtn.setOnAction(new EventHandler<ActionEvent>() {\n   @Override\n   public\
  \ void handle(ActionEvent event) {\n     message.setText(\"Hello World! JavaFX style\
  \ :)\");\n   }\n});\n```\n\n这段代码与仅仅编写一行设置按钮动作中消息文本字段 `text` 属性的代码相比，显得非常冗长。如果能重写这段包含逻辑的代码，而无需这么多样板代码，那该多好啊？\n\
  \nJava SE 8 通过 Lambda 表达式解决了这个问题，如下所示：\n\n```\nbtn.setOnAction(event -> {\n    message.setText(\"\
  Hello World! JavaFX style :)\");\n});\n```\n\n除了使代码更简洁易读之外，lambda 表达式还能让你的代码性能更佳。\n\
  \n### 语法\n\n编写 lambda 表达式有两种方式，其通用形式如下图所示：\n\n![语法](img/B03998_02_04.jpg)\n\nLambda\
  \ 表达式通用形式——以创建新线程为例\n\n这两种方式如下：\n\n*   `(param1, param2, ...) -> expression;`\n\
  *   `(param1, param2, ...) -> { /* 代码语句 */ };`\n\n第一种形式，即表达式形式，用于我们只分配一行代码或一个简单表达式的情况。而第二种形式，即代码块形式，包含单行或多行代码体，并带有\
  \ return 语句，因此我们需要用花括号将它们括起来。\n\n以下三条语句是等价的：\n\n*   `btn.setOnAction((ActionEvent\
  \ event) -> {message.setText(\"Hello World!\");});`\n*   `btn.setOnAction( (event)\
  \ -> message.setText(\"Hello World!\"));`\n*   `btn.setOnAction(event -> message.setText(\"\
  Hello World!\"));`\n\n### 提示\n\n为了更深入地了解新的 lambda 表达式及其相关特性，以及 Java SE 8 的功能，我建议你阅读这个系列文章——Java\
  \ SE 8 新特性之旅：[`tamanmohamed.blogspot.com/2014/06/java-se-8-new-features-tour-big-change.html`](http://tamanmohamed.blogspot.com/2014/06/java-se-8-new-features-tour-big-change.html)\n\
  \n## 函数式接口\n\nLambda 表达式很棒，不是吗？但你可能想知道它的确切类型是什么，这样它才能被赋值给变量并传递给方法。\n\n答案在于函数式接口的强大功能。如何实现呢？函数式接口由\
  \ Java 语言设计者/架构师巧妙地创建为闭包，它使用了**单一抽象方法**（**SAM**）的概念，提供了一个仅包含一个抽象方法的接口，以及 `@FunctionalInterface`\
  \ 注解。单一抽象方法模式是 Java SE 8 lambda 表达式不可或缺的一部分。\n\n让我们通过一个示例来阐明函数式接口和 lambda 表达式的概念。我创建了一个名为\
  \ `Calculator.java` 的函数式接口，其中包含一个名为 `calculate()` 的单一抽象方法。一旦创建完成，你就可以声明变量并将 lambda\
  \ 表达式赋值给它们。以下是该函数式接口：\n\n```\n@FunctionalInterface\npublic interface Calculator\
  \ {\n    double calculate(double width, double height);\n}\n```\n\n现在，我们准备创建变量并将\
  \ lambda 表达式赋值给它们。以下代码创建了 lambda 表达式并将其赋值给我们的函数式接口变量：\n\n```\nCalculator area =\
  \ (width, height) -> width * height; //面积 = 宽 × 高\n//周长 = 2(宽+高)\nCalculator perimeter\
  \ = (width, height) -> 2 * (height + width);\nout.println(\"矩形面积: \"+ area.calculate(4,\
  \ 5)+\" 厘米.\");\nout.println(\"矩形周长: \"+ perimeter.calculate(4, 5)+\" 厘米.\");\n\
  ```\n\n代码的输出应如下所示：\n\n```\n矩形面积: 20.0 厘米.\n矩形周长: 18.0 厘米.\n```\n\n"
- "# 主题化\n\n当与设计师和 UX/UI 专家合作时，你会听到关于为应用程序换肤或更改其外观的说法。这两个术语通常可以互换使用，并且都反映了*主题化*的基本概念。\n\
  \n主题化的思想是通过更改控件的样式来改变整个应用程序的风格，而不改变其底层功能。\n\n在 JavaFX 中，你可以创建、修改或使用现有主题来为你的应用程序、场景甚至只是一个\
  \ UI 控件换肤。\n\n## CSS\n\nJavaFX **层叠样式表**（**CSS**）可以应用于 JavaFX 场景图中的任何节点；它们是异步应用于节点的。样式也可以在运行时轻松地分配给场景，从而允许应用程序的外观动态变化。\n\
  \n它基于 W3C CSS 2.1 规范，并且目前兼容当前版本 3 工作草案中的一些新增内容。JavaFX CSS 支持和扩展的设计允许任何兼容的 CSS 解析器干净地解析\
  \ JavaFX CSS 样式表。这使得可以将用于 JavaFX 的 CSS 样式与用于其他目的（例如 HTML 页面）的 CSS 样式混合到单个样式表中。\n\
  \n所有 JavaFX 属性名称都带有 `-fx-` 扩展前缀，包括那些看起来可能与标准 HTML CSS 兼容的属性，因为某些 JavaFX 值的语义与标准值略有不同。\n\
  \n### 注意\n\n有关 JavaFX CSS 的更多信息，请参阅《使用 CSS 为 JavaFX 应用程序换肤》文档以及位于 [`docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html`](http://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html)\
  \ 的参考指南。\n\n\n\n### 应用 CSS 主题\n\n以下是一个自定义的简单 JavaFX CSS 规则文件 `ButtonStyle.css`，它将在我们的主题化过程中用于为按钮设置主题：\n\
  \n```\n/* ButtonStyle.css */\n.button {\n-fx-text-fill: SKYBLUE;\n-fx-border-color:\
  \ rgba(255, 255, 255, .80);\n-fx-border-radius: 8;\n-fx-padding: 6 6 6 6;\n-fx-font:\
  \ bold italic 20pt \"Arial\";\n}\n```\n\n我们有两种方法应用 CSS 样式表来更改 JavaFX 应用程序的外观主题：\n\
  \n1.  使用 JavaFX 应用程序（`javafx.application.Application`）类的静态方法 `setUserAgentStylesheet(String\
  \ URL)`，该方法会为整个应用程序层级设置样式，包括 JavaFX 应用程序中的每个场景及其所有子节点。使用方法如下：\n\n    ```\n    Application.setUserAgentStylesheet(getClass().getResource(\"\
  ButtonStyle.css\").toExternalForm());\n    ```\n\n    现在，你可以使用 JavaFX 8 预装的两个样式表：Caspian\
  \ 和 Modena，并且我们可以使用相同的方法在它们之间切换，如下所示：\n\n    ```\n    // 切换到 JavaFX 2.x 的 CASPIAN\
  \ 外观。\n    Application.setUserAgentStylesheet(STYLESHEET_CASPIAN);\n\n    // 切换到\
  \ JavaFX 8 的 Modena 外观。\n    Application.setUserAgentStylesheet(STYLESHEET_MODENA);\n\
  \    ```\n\n    ### 提示\n\n    如果你通过传递 `null` 值来调用 `setUserAgentStylesheet(null)`，则会加载默认外观（此处为\
  \ Modena）；而如果你使用的是 JavaFX 2.x Caspian，则会加载默认的 Caspian 外观。\n\n2.  使用场景的 `getStylesheets().add(String\
  \ URL)` 方法将自动为单个场景及其子节点设置样式，如下所示：\n\n    ```\n    Application.setUserAgentStylesheet(null);\
  \ // 默认为 Modena\n    // 为场景应用自定义外观。\n    scene.getStylesheets()\n    .add(getClass().getResource(\"\
  ButtonStyle.css\")\n    .toExternalForm());\n    ```\n\n    基本上，由于调用了 `Application.setUserAgentStylesheet(null)`，会加载默认主题（Modena）。然后，通过调用\
  \ `getStylesheets().add()` 方法为场景设置额外的样式。\n\n样式首先应用于父节点，然后应用于其子节点。节点在添加到场景图后即被设置样式，无论其是否显示。\n\
  \nJavaFX CSS 实现遵循以下优先级顺序——来自用户代理样式表的样式优先级低于来自代码设置的值，而来自代码设置的值优先级又低于场景或父节点的样式表。\n\
  \n内联样式具有最高优先级。来自父节点实例的样式表被认为比来自场景样式表的样式更具体。\n\n"
- '# Scene Builder


  对于大多数复杂且精细的 UI 需求，设计师使用一种工具，通过所见即所得的界面来设计 UI，无需编写任何代码，然后将结果（`FXML` 文件）加载到他们的 JavaFX
  应用程序逻辑中，这样不是更容易吗？


  因此，你需要 JavaFX Scene Builder；它是一个可视化布局工具，允许你轻松布局 UI 控件，以便快速构建带有效果和动画的应用程序原型。Scene
  Builder（2.0 及以上版本）是与 JavaFX 8 兼容的版本。


  在项目创建过程中的任何时候，你都可以预览你的工作，以检查其在实际部署前的真实外观。


  它是开源的，因此可以与大多数 IDE 集成，但与 NetBeans IDE 的集成更为紧密。它也是一个跨平台、自包含的应用程序，可在大多数平台上运行。


  除了支持 CSS 之外，它还允许你轻松地为原型应用自定义主题。


  ## 下载与启动


  2015 年初，Oracle 发布了 JavaFX Scene Builder 工具 2.0 版本，并宣布将不再提供 JavaFX Scene Builder
  工具（编译形式）的构建版本。


  一家名为 **Gluon** ([`gluonhq.com`](http://gluonhq.com)) 的公司深知工具可以成就或破坏编码体验。因此，他们决定开始提供基于他们将在公开可访问的仓库中维护的一个分支的构建版本。


  Gluon 提供 IDE 插件，以及基于 OpenJFX 最新源码改进的 JavaFX Scene Builder 工具构建版本，这些改进源于社区参与以及更好地支持第三方项目的愿望，例如
  **ControlsFX** ([`www.controlsfx.org/`](http://www.controlsfx.org/))、**FXyz** ([`github.com/FXyz/FXyz`](https://github.com/FXyz/FXyz))
  和 **DataFX** ([`www.datafx.io/`](http://www.datafx.io/))。


  让我们开始从以下 URL 下载该工具：[`gluonhq.com/products/downloads/`](http://gluonhq.com/products/downloads/)。


  下载 8.0 版本并安装后，启动它，Scene Builder 工具应打开，如下图所示：


  ![下载与启动](img/B03998_02_05.jpg)


  JavaFX 8 Scene Builder 工具。


  ## FXML


  在添加组件并构建你精美的 UI 布局时，Scene Builder 会在后台自动为你生成一个基于 FXML 和 XML 的标记文件，该文件稍后将用于将你的 UI
  绑定到 Java 应用程序逻辑。


  FXML 提供的主要优势之一是关注点分离，因为它将 UI 层（*视图*）与逻辑（*控制器*）解耦；这意味着你可以随时更改 UI，而无需更改底层逻辑。由于 FXML
  文件不被编译，它可以在运行时动态加载，无需任何编译。这意味着它有助于你进行快速原型设计。


  ### 将 FXML 加载到 JavaFX 应用程序中


  从 Scene Builder 工具生成 UI 设计后，将其添加到应用程序中是非常容易的。以下是在 `start()` 方法中加载 FXML 文件的代码：


  ```

  BorderPane root = new BorderPane();

  Parent content = FXMLLoader.load(getClass().getResource("filename.fxml"));

  root.setCenter(content);

  ```


  如你所见，我使用了 `javafx.fxml.FXMLLoader` 类的静态方法 `load`。`load()` 方法将加载（反序列化）由 Scene Builder
  工具创建的 FXML 文件。


