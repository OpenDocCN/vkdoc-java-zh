    # About the Author


    **Mohamed Taman**, chief of architects and software development manager at e-finance,
    lives in Cairo, Egypt. He graduated in electrical engineering from Faculty of
    Engineering, Cairo University. He is an experienced Java developer who has worked
    on the Web, mobile, and IoT for industries, including finance, banking, tourism,
    government, and healthcare. Before that, he worked with Pfizer, Intercom Enterprise
    (a Gold IBM partner), Silicon Expert, and Oracle using varied technologies, such
    as user-facing GUI frontends, backends, mid-tiers, and integrations of large-scale
    systems.


    He enjoys speaking at many conferences evangelizing Java standards and his experience
    worldwide, as he is a strong Java community member and a Java Champion since 2015.


    In addition, Mohamed is a member of Adopts Java EE 8, OpenJDK, and JavaFX programs.
    He was an executive member of Java Community Process Organisation, being the first
    African to join its board.


    He is also a member of the expert group JSR 354, 363, and 373. He is also the
    leader of EGJUG and MoroccoJUG member, a board member of Oracle Egypt Architects
    Club. He won the 2014 Duke’s choice and 11th annual JCP adopt 2013 awards.


    You can read more about the author at [http://about.me/mohamedtaman](http://about.me/mohamedtaman).


    # About the Reviewers


    **Sergey Grinev** is an experienced software development and QA engineer focused
    on building reliable quality processes for Java platforms. He started to work
    in this area during his employment with Oracle, where he was responsible for JavaFX
    quality. Since the past few years, he has been working for Azul Systems on the
    quality of their custom JVMs.


    Also, Sergey enjoys teaching people, presenting on various Java conferences, giving
    lessons, and answering Java-related questions on [http://stackoverflow.com](http://stackoverflow.com).


    He graduated from St. Petersburg State University and currently resides in St.
    Petersburg, Russia.


    **José Pereda** has done his PhD in structural engineering and works as an assistant
    professor in the School of Industrial Engineering at the University of Valladolid
    in Spain. His passion lies in applying programming to solve real problems. Working
    with Java since 1999, he is now a JavaFX advocate, developing commercial applications
    and open source projects (JFXtras, FXyz, [https://github.com/jperedadnr](https://github.com/jperedadnr)),
    coauthoring a JavaFX book (*JavaFX 8 Introduction by Example*), blogging ([http://jperedadnr.blogspot.com.es/](http://jperedadnr.blogspot.com.es/)),
    tweeting (`@JPeredaDnr`), and speaking at conferences (JavaOne, JAX, Jfokus, JavaLand,
    and so on). José lives with his wife and kids in Valladolid, Spain.


    # www.PacktPub.com


    # Support files, eBooks, discount offers, and more


    For support files and downloads related to your book, please visit [www.PacktPub.com](http://www.PacktPub.com).


    Did you know that Packt offers eBook versions of every book published, with PDF
    and ePub files available? You can upgrade to the eBook version at [www.PacktPub.com](http://www.PacktPub.com)
    and as a print book customer, you are entitled to a discount on the eBook copy.
    Get in touch with us at `<service@packtpub.com>` for more details.


    At [www.PacktPub.com](http://www.PacktPub.com), you can also read a collection
    of free technical articles, sign up for a range of free newsletters, and receive
    exclusive discounts and offers on Packt books and eBooks.


    ![Support files, eBooks, discount offers, and more](graphics/PacktLibLogo.jpg)


    [https://www2.packtpub.com/books/subscription/packtlib](https://www2.packtpub.com/books/subscription/packtlib)


    Do you need instant solutions to your IT questions? PacktLib is Packt''s online
    digital book library. Here, you can search, access, and read Packt''s entire library
    of books.


    ## Why subscribe?


    *   Fully searchable across every book published by Packt

    *   Copy-and-paste, print, and bookmark content

    *   On-demand and accessible via a web browser


    ## Free access for Packt account holders


    If you have an account with Packt at [www.PacktPub.com](http://www.PacktPub.com),
    you can use this to access PacktLib today and view nine entirely free books. Simply
    use your login credentials for immediate access.


    # Preface


    This book, as its title (*JavaFX 8 Essentials*) suggests, is a pragmatic book
    that provides you with a robust set of essential skills that will guide you to
    become confident enough to rapidly build high-performance JavaFX 8 client applications.
    These applications take advantage of modern GPUs through hardware-accelerated
    graphics while delivering a compelling, complex, and fancy rich-client GUI for
    your customer, which will impress them quite a bit.


    Learning the JavaFX 8 essentials is the first step to plunging into creating applications
    that most importantly run on any platform, from the *desktop, Web, mobile, tablets*,
    to *embedded* devices such as *Arduino*, *Raspberry Pi*, and multi-core development.
    Following Java''s *Write once, run anywhere* paradigm, JavaFX also preserves the
    same. Because JavaFX 8 is written totally from scratch in the Java language, you
    will feel at home.


    Most of the chapters are a fast-paced guide that will help you get a head start
    on Java GUI programming, leveraging JavaFX 8 and deploying and running on any
    platform.


    While working through the book examples, you will find code is written with JavaFX
    8 on Java 8 (yes, Java SE 8) so that the new APIs and language enhancements will
    help you become a more productive developer. Having said this, it will be handy
    (and I encourage you to go for this) to explore all of the new Java 8 capabilities.


    Finally, yet importantly, you will be able to develop amazing touch-less interactive
    motion applications with JavaFX that interact with Leap motion devices.'
