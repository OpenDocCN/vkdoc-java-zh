  trans: "\n### 在 Google Play 商店部署\n\n要在 Google Play 商店部署你的应用程序，你需要执行以下步骤：\n\n1. \
    \ 你必须先注册成为 Google Play 开发者（[`play.google.com/apps/publish/`](https://play.google.com/apps/publish/)），填写包含应用描述和若干截图的表单，最后提交\
    \ DialPad2 的 apk 文件。\n2.  在 `AndroidManifest.xml` 文件中，你需要通过在 `application` 标签中添加\
    \ `android:debuggable=\"false\"` 来禁用调试选项。\n3.  你还可以在 `application` 标签下添加应用图标（`android:icon=\"\
    @icons/ic_launcher\"`）。这里的 `icons-*` 是包含多种分辨率图片的文件夹。\n\n#### 签署 APK\n\n`apk` 文件必须经过签署才能发布。**签署**意味着你需要一个私钥；为此，我们可以使用\
    \ keytool（[`developer.android.com/tools/publishing/app-signing.html#signing-manually`](http://developer.android.com/tools/publishing/app-signing.html#signing-manually)）。\n\
    \n而**发布**则意味着我们需要将签署配置添加到 `build.gradle` 文件中，如下所示：\n\n```\njfxmobile {\n    android\
    \ {\n        signingConfig {\n            storeFile file(\"path/to/my-release-key.keystore\"\
    )\n            storePassword 'STORE_PASSWORD'\n            keyAlias 'KEY_ALIAS'\n\
    \            keyPassword 'KEY_PASSWORD'\n        }\n        manifest = 'lib/android/AndroidManifest.xml'\n\
    \        resDirectory = 'src/android/resources'\n    }\n}\n```\n\n右键点击 **DialPad2**\
    \ 项目，从 **Tasks** 菜单中选择 **apk**，然后选择 **apkRelease**。\n\n恭喜！生成的 `DialPad2.apk` 文件已准备好提交到\
    \ Google Play 商店。\n\n## 测试技巧\n\n在交付应用之前，最重要的一点是进行测试，尤其是在各种基于 Android 的移动设备上进行测试。\n\
    \n根据我在移动行业的经验，我接触过十多个厂商的测试手机和平板电脑，它们都运行 Android 平台，但每个设备都定制了不同功能和性能的 UI 层。\n\n\
    根据我的经验，移动测试领域的四条黄金法则是：\n\n1.  尽可能在多种真实设备和 Android 平台上进行测试，以覆盖你的应用可能运行的所有情况，并了解其在生产环境中的表现。\n\
    2.  模拟器仅适用于 *GUI 测试和功能测试*，不适用于*性能测试*。所有模拟器都依赖于你底层的 PC/笔记本电脑硬件和内存，而移动硬件的情况则大不相同，要达到相同的性能非常具有挑战性。\n\
    3.  有一个名为 ARC Welder 的新模拟器，适用于 Chrome。请访问 [`developer.chrome.com/apps/getstarted_arc`](https://developer.chrome.com/apps/getstarted_arc)\
    \ 查看。\n4.  在真实设备上进行最终的生产和性能测试。这样你才能确保你的应用在目标市场的设备上能够正常运行。\n\n# 总结\n\n本章让你深入了解了移动行业，以及如何利用不同的项目（例如用于\
    \ **iOS** 的 **RoboVM** 和用于 **Android** 的 **JavaFXPorts**）来开发和定制基于 JavaFX 的应用程序，从而使其能够在两个平台上运行。\n\
    \n接着，我们学习了如何安装 Android 开发所需的软件和工具，以及如何启用 Android SDK 和 *JavaFXPorts* 库，以便将我们基于\
    \ JavaFX 的拨号器应用打包并安装到真实的 Android 设备上，并提交到 Google Play 商店。\n\n我们看到了如何使用 CSS 来自定义应用，为同一个应用提供不同的外观和风格，以确保你为\
    \ Android 版本提供了不同的 CSS。\n\n接下来，我们学习了如何将设备置于调试模式，以便通过命令行从 `jfxmobile-plugin` 成功安装应用。最后，我们介绍了测试的四条黄金法则。\n\
    \n下一章与本章内容不会有太大差异，但它将为你提供很好的入门指导，让你了解如何将 JavaFX 8 应用定位到 iOS 设备上运行。你还将学习如何使用其开发工具。\n\
    \n# 第 5 章. 为 iOS 开发 JavaFX 应用\n\n苹果在移动和 PC/笔记本电脑领域拥有巨大的市场份额，拥有众多不同的设备，从 iPhone\
    \ 等手机到 iPod 等音乐设备，再到 iPad 等平板电脑。\n\n它拥有一个快速增长的应用市场，称为 Apple Store，为其社区服务，其中可用的应用数量每天都在增加。移动应用开发者应该为这样的市场做好准备。\n\
    \n同时针对 iOS 和 Android 的移动应用开发者面临着许多挑战。只需比较这两个平台的原生开发环境，你就会发现它们存在巨大差异。\n\n根据苹果的说法，iOS\
    \ 开发基于 **Xcode IDE**（[`developer.apple.com/xcode/`](https://developer.apple.com/xcode/)）及其编程语言。传统上是\
    \ **Objective-C**，而在 2014 年 6 月，苹果推出了 **Swift**（[`developer.apple.com/swift/`](https://developer.apple.com/swift/)）；另一方面，根据谷歌的定义，*Android*\
    \ 开发基于 Intellij IDEA IDE 和 Java 编程语言。\n\n没有多少开发者能精通这两种环境。此外，这些差异排除了平台之间的任何代码复用。\n\
    \n正如我们将在本章中看到的，JavaFX 8 通过让两个平台共享同一个应用程序，正在填补平台间代码复用的空白。\n\n在本章结束时，你将掌握以下技能：\n\
    \n*   安装和配置 iOS 环境工具和软件\n*   创建 iOS JavaFX 8 应用程序\n*   模拟和调试 JavaFX 移动应用程序\n*\
    \   在 iOS 移动设备上打包和部署应用程序\n\n# 使用 RoboVM 在 iOS 上运行 JavaFX\n\n**RoboVM** 是连接 Java\
    \ 和 Objective-C 的桥梁。使用它，开发要在 iOS 设备上运行的 JavaFX 8 应用程序变得很容易，因为 **RoboVM** 项目的最终目标是在不牺牲开发者体验或应用用户体验的情况下解决这个问题。\n\
    \n正如我们在上一章关于 Android 的内容中所看到的，使用 *JavaFXPorts* 生成 APK 是一项相对容易的任务，因为 Android 基于\
    \ Java 和 **Dalvik 虚拟机**。\n\n相反，iOS 没有用于 Java 的虚拟机，并且不允许动态加载原生库。\n\n因此需要另一种方法。RoboVM\
    \ 开源项目试图通过使用*提前*编译器将 Java 字节码转换为原生 ARM 或 x86 机器码，从而在 Java 和 Objective-C 之间建立一座桥梁，为\
    \ Java 开发者弥合这一差距。\n\n## 特性\n\n让我们来了解一下 RoboVM 的特性：\n\n*   将 Java 和其他 JVM 语言（如\
    \ Scala、Clojure 和 Groovy）引入 iOS 设备\n*   提前将 Java 字节码转换为机器码，以便直接在 CPU 上快速执行，没有任何开销\n\
    *   主要目标是 iOS 和 ARM 处理器（32 位和 64 位），但也支持在 x86 CPU（32 位和 64 位）上运行的 Mac OS X 和 Linux\n\
    *   不对开发者可访问的 Java 平台功能施加任何限制，例如反射或文件 I/O\n*   支持标准 JAR 文件，让开发者能够复用庞大的第三方 Java\
    \ 库生态系统\n*   通过 Java 到 Objective-C 的桥接提供对完整原生 iOS API 的访问，从而能够开发具有真正原生 UI 和完全硬件访问权限的应用\n\
    *   与最流行的工具集成，如 NetBeans、Eclipse、Intellij IDEA、Maven 和 Gradle\n*   已为 App Store\
    \ 做好准备，商店中已有数百个应用\n"
- fmt: "# Limitations\n\nMainly due to the restrictions of the iOS platform, there\
    \ are a few limitations when using `RoboVM`:\n\n- Loading custom bytecode at runtime\
    \ is not supported. All class files comprising the app have to be available at\
    \ compile time on the developer machine.\n- The Java Native Interface technology\
    \ as used on the desktop or on servers usually loads native code from dynamic\
    \ libraries, but Apple does not permit custom dynamic libraries to be shipped\
    \ with an iOS app. `RoboVM` supports a variant of JNI based on static libraries.\n\
    - Another big limitation is that `RoboVM` is an alpha-state project under development\
    \ and not yet recommended for production usage.\n\n## Note\n\n`RoboVM` has full\
    \ support for reflection.\n\n# How it works\n\nAs mentioned in [Chapter 4](#ch04.html\
    \ \"Chapter 4. Developing a JavaFX Application for Android\"), *Developing a JavaFX\
    \ Application for Android*, since February 2015 there has been an agreement between\
    \ the companies behind `RoboVM` and `JavaFXPorts`, and now a single plugin called\
    \ `jfxmobile-plugin` allows us to build applications for three platforms—desktop,\
    \ Android, and iOS—from the same codebase.\n\nThe `JavaFXMobile` plugin adds a\
    \ number of tasks to your Java application that allow you to create `.ipa` packages\
    \ that can be submitted to the Apple Store.\n\nAndroid mostly uses Java as the\
    \ main development language, so it is easy to merge your JavaFX 8 code with it.\
    \ On iOS, the situation is internally totally different—but with similar Gradle\
    \ commands.\n\nThe plugin will download and install the `RoboVM` compiler, and\
    \ it will use `RoboVM` compiler commands to create an iOS application in `build/javafxports/ios`.\n\
    \n# Getting started\n\nIn this section, you will learn how to install the `RoboVM`\
    \ compiler using the `JavaFXMobile` plugin, and make sure the tool chain works\
    \ correctly by reusing the same application, Phone Dial version 1.0, we developed\
    \ previously for the Android platform in [Chapter 4](#ch04.html \"Chapter 4. Developing\
    \ a JavaFX Application for Android\"), *Developing a JavaFX Application for Android*.\n\
    \n## Prerequisites\n\nIn order to use the `RoboVM` compiler to build iOS apps,\
    \ the following tools are required:\n\n- Oracle's Java SE JDK 8 update 45. Refer\
    \ to [Chapter 1](#ch01.html \"Chapter 1. Getting Started with JavaFX 8\"), *Getting\
    \ Started with JavaFX 8*, The *Installing Java SE 8 JDK* section.\n- Gradle 2.4\
    \ or higher is required to build applications with the `jfxmobile` plugin. Refer\
    \ to [Chapter 4](#ch04.html \"Chapter 4. Developing a JavaFX Application for Android\"\
    ), *Developing a JavaFX Application for Android*, The Installing *Gradle 2.4*\
    \ section.\n- A Mac running Mac OS X 10.9 or later.\n- Xcode 6.x from the Mac\
    \ App Store ([https://itunes.apple.com/us/app/xcode/id497799835?mt=12](https://itunes.apple.com/us/app/xcode/id497799835?mt=12)).\n\
    \n### Tip\n\nThe first time you install Xcode, and every time you update to a\
    \ new version, you have to open it once to agree to the Xcode terms.\n\n## Preparing\
    \ a project for iOS\n\nWe will reuse the project we developed before in [Chapter\
    \ 4](#ch04.html \"Chapter 4. Developing a JavaFX Application for Android\"), *Developing\
    \ a JavaFX Application for Android*, for the Android platform, since there is\
    \ no difference in code, project structure, or Gradle build script when targeting\
    \ iOS.\n\nThey share the same properties and features, but with different Gradle\
    \ commands that serve iOS development, and a minor change in the Gradle build\
    \ script for the `RoboVM` compiler.\n\nTherefore, we will see the power of WORA\
    \ *Write Once, Run Everywhere* with the same application.\n\n### Project structure\n\
    \nBased on the same project structure from the Android example from [Chapter 4](#ch04.html\
    \ \"Chapter 4. Developing a JavaFX Application for Android\"), *Developing a JavaFX\
    \ Application for Android*, the project structure for our iOS app should be as\
    \ shown in the following figure:\n\n![Project structure](graphics/B03998_05_01.jpg)\n\
    \n### The application\n\nWe are going to reuse the same application from [Chapter\
    \ 4](#ch04.html \"Chapter 4. Developing a JavaFX Application for Android\"), *Developing\
    \ a JavaFX Application for Android*: the Phone DialPad version 2.0 JavaFX 8 application:\n\
    \n![The application](graphics/B03998_05_02.jpg)\n\nAs you can see, reusing the\
    \ same codebase is a very powerful and useful feature, especially when you are\
    \ developing to target many mobile platforms such as iOS and Android at the same\
    \ time.\n\n#### Interoperability with low-level iOS APIs\n\nTo have the same functionality\
    \ of natively calling the default iOS phone dialer from our application as we\
    \ did with Android, we have to provide the native solution for iOS as the following\
    \ `IosPlatform` implementation:\n\n```\nimport org.robovm.apple.foundation.NSURL;\n\
    import org.robovm.apple.uikit.UIApplication;\nimport packt.taman.jfx8.ch4.Platform;\n\
    \npublic class IosPlatform implements Platform {\n\n  @Override\n  public void\
    \ callNumber(String number) {\n    if (!number.equals(\"\")) {\n      NSURL nsURL\
    \ = new NSURL(\"telprompt://\" + number);\n      UIApplication.getSharedApplication().openURL(nsURL);\n\
    \    }\n  }\n}\n```\n\n### Gradle build files\n\nWe will use the same Gradle build\
    \ script file that was used in [Chapter 4](#ch04.html \"Chapter 4. Developing\
    \ a JavaFX Application for Android\"), *Developing a JavaFX Application for Android*,\
    \ but with a minor change by adding the following lines to the end of the script:\n\
    \n```\njfxmobile {\n  ios {\n    forceLinkClasses = [ 'packt.taman.jfx8.ch4.**.*'\
    \ ]\n  }\n  android {\n    manifest = 'lib/android/AndroidManifest.xml' \n  }\n\
    }\n```\n\nAll the work involved in installing and using `robovm` compilers is\
    \ done by the `jfxmobile` plugin.\n\nThe purpose of those lines is to give the\
    \ `RoboVM` compiler the location of the main application class that has to be\
    \ loaded at runtime is, as it is not visible by default to the compiler.\n\nThe\
    \ `forceLinkClasses` property ensures that those classes are linked in during\
    \ `RoboVM` compilation.\n\n#### Building the application\n\nAfter we have added\
    \ the necessary configuration set to build the script for iOS, its time to build\
    \ the application in order to deploy it to different iOS target devices. To do\
    \ so, we have to run the following command:\n\n```\n$ gradle build\n```\n\nWe\
    \ should have the following output:\n\n```\nBUILD SUCCESSFUL\n\nTotal time: 44.74\
    \ secs\n```\n\nWe have built our application successfully; next, we need to generate\
    \ the `.ipa` and, in the case of production, you have to test it by deploying\
    \ it to as many iOS versions as you can.\n\n#### Generating the iOS .ipa package\
    \ file\n\nIn order to generate the final `.ipa` iOS package for our JavaFX 8 application,\
    \ which is necessary for the final distribution to any device or the AppStore,\
    \ you have to run the following `gradle` command:\n\n```\ngradle ios \n```\n\n\
    This will generate the `.ipa` file in the directory `build/javafxports/ios`."
