- fmt: "# Getting started\n\nWe now have enough information on how the tools and SDKs\
    \ discussed previously will let us get started on developing our JavaFX applications\
    \ and porting them to Android mobile devices.\n\nBut before moving to the development\
    \ stage, we should have the tools and software installed and configured properly\
    \ in order to complete the development process, based on the provided SDKs, to\
    \ have a final `.apk` package at hand.\n\nWe will deploy this `.apk` package on\
    \ real devices and finally we will sign it for final submission to Google Play\
    \ Store.\n\nSo let's get started with installing the prerequisite tools and software\
    \ to start developing our application.\n\n## Preparing and installing the prerequisite\
    \ software\n\nWe need to install the following list of tools and software in order\
    \ to have our build process complete without any problem.\n\n### Java SE 8 JDK8\
    \ u45\n\nWe have already done this before; refer to the *Installing Java SE 8\
    \ JDK* section in [Chapter 1](#ch01.html \"Chapter 1. Getting Started with JavaFX\
    \ 8\"), *Getting Started with JavaFX 8*.\n\n### Note\n\nJava SE 8 update 40 is\
    \ the minimum version required in order to develop JavaFX applications for Android.\n\
    \n### Gradle\n\nFrom their website, this is the definition of Gradle:\n\n> *Gradle\
    \ is an open source build automation system. Gradle can automate the building,\
    \ testing, publishing, deployment, and more of software packages or other types\
    \ of projects, such as generated static websites, generated documentation, or\
    \ indeed anything else.*\n\nRecently, Android development tools changed their\
    \ build system to Gradle. The RoboVM and JavaFXPorts porting projects mimic the\
    \ same tools.\n\nInstalling Gradle is a very straightforward task:\n\n1.  Go to\
    \ [https://gradle.org](https://gradle.org).\n2.  From the right-hand side, under\
    \ the **GET GRADLE!** Section, click on **Downloads 2.4** (as of this writing)\
    \ and the download process will start for the `gradle-2.4-all.zip` file.\n3. \
    \ Copy the downloaded `.zip` file into a convenient location of your choice and\
    \ unzip it.\n4.  The final step is to set the environment variable into your system\
    \ as the following:\n    *   On Windows – Assume Gradle is installed at `c:\\\
    tools\\gradle_2.4`:\n\n        ```\n        set GRADLE_HOME=c:\\tools\\gradle_2.4\n\
    \        set PATH=%PATH%;%GRADLE_HOME%\\bin\n        ```\n\n    *   On Mac – Assume\
    \ Gradle is installed at `/usr/local/tools/gradle_2.4`:\n\n        ```\n     \
    \   export GRADLE_HOME=/usr/local/tools/gradle_2.4\n        export PATH=${PATH}:${GRADLE_HOME}/bin\n\
    \        ```\n\n### Android SDK\n\nThe Android SDK includes the complete set of\
    \ development and debugging tools for the Android platform.\n\nInstalling Android\
    \ SDK is a very straightforward task:\n\n1.  Go to [http://developer.android.com/sdk/index.html#Other](http://developer.android.com/sdk/index.html#Other).\n\
    2.  Under SDK Tools Only, click on `android-sdk_r24.2-{platform}.{exe|zip|tgz}`\
    \ (as of this writing) against the name of your favorite platform: ![Android SDK](graphics/B03998_04_01.jpg)\n\
    3.  A `Download` page will open; accept the terms, click on the `Download android-sdk_r24.2-{platform}.{exe|zip|tgz}`\
    \ button, and the download process will start.\n4.  Copy the downloaded `.zip`\
    \ file into a convenient location and unzip it, or double-click the `.exe` on\
    \ Windows to start the installation.\n5.  From the command line, run the following:\n\
    \n    ```\n    $ android\n    ```\n\n    The Android SDK Manager will open; click\
    \ on `Build-tools version 21.1.2` or higher and the SDK Platform for API 21 or\
    \ higher.\n\n    Click on **Install x packages**, accept the license, and click\
    \ on **Install**. You are done.\n\n    A good reference for Android SDK Manager\
    \ is at [http://developer.android.com/sdk/installing/adding-packages.html](http://developer.android.com/sdk/installing/adding-packages.html).\n\
    \n6.  The final step is to set the environment variable in your system as follows:\n\
    \    *   On Windows – Assume the Android SDK is installed at `c:\\tools\\android_ADT`:\n\
    \n        ```\n        set ANDROID_HOME=c:\\tools\\android_ADT\\sdk\n        set\
    \ PATH=%PATH%;%ANDROID_HOME%\\platform-tools;%ANDROID_HOME%\\tools\n        ```\n\
    \n    *   On Mac – Assume the Android SDK is installed at `/usr/local/tools/android_ADT`:\n\
    \n        ```\n        export ANDROID_HOME=/usr/local/tools/android_adt/sdk\n\
    \        export PATH=${PATH}:${ANDROID_HOME}/tools:${ANDROID_HOME}/platform-tools\n\
    \        ```\n\n    *   The best approach for this is to create a Gradle property\
    \ with the name `ANDROID_HOME` defined under `C:\\Users\\<user>\\.gradle\\gradle.properties`\n\
    \n## Preparing the project for Android\n\nWe have successfully installed the prerequisite\
    \ software and tools and configured the environmental variables, so we are ready\
    \ to start developing the application that will be ported into the Android device.\n\
    \nBut before we do so, we need to prepare our project structure and the build\
    \ file as well in order to be ready for building and packaging our application\
    \ with JavaFXPorts libraries.\n\nSetting up a complex project with three different\
    \ platforms would have been a hard task, until now. But recently, Gluon (http://gluonhq.com/)\
    \ has released a NetBeans plugin ([http://gluonhq.com/gluon-plugin-for-netbeans/](http://gluonhq.com/gluon-plugin-for-netbeans/))\
    \ that simplifies this task to a great degree.\n\n### Project structure\n\nThe\
    \ easiest way is to use the Gluon plugin for NetBeans. This will create everything\
    \ for you a Java project, where you just need to add the JavaFX sources, and a\
    \ `build.gradle` file with all the tasks ready.\n\nOnce you have installed the\
    \ plugin, perform the following tasks:\n\n1.  Just create a new JavaFX project\
    \ and select **Basic Gluon Application**, as shown here: ![Project structure](graphics/B03998_04_02.jpg)\n\
    2.  Select valid names for the project (`DialPad2`), packages (`packt.taman.jfx8.ch4`),\
    \ and the main class (`DialPad2`) and you will find a bunch of folders in your\
    \ new project.\n3.  The top project structure following the Gluon plugin will\
    \ bring a more complex structure and should be as seen in the following screenshot:\
    \ ![Project structure](graphics/B03998_04_04.jpg)\n\n    The Gluon plugin project\
    \ structure\n\nNext, we are going to add our build script file to complete our\
    \ mission.\n\n#### Using Gradle\n\nTo build a Gradle project, we need the `build.gradle`\
    \ script file. The Gluon plugin has already added this file for you by default,\
    \ including all the properties to allow our application to run and compile successfully.\n\
    \nThe default Gradle build file created `build.gradle` file should be as follows:\n\
    \n```\nbuildscript {\n    repositories {\n        jcenter()\n    }\n    dependencies\
    \ {\n        classpath 'org.javafxports:jfxmobile-plugin:1.0.0-b8'\n    }\n}\n\
    \napply plugin: 'org.javafxports.jfxmobile'\n\nrepositories {\n    jcenter()\n\
    }\n\nmainClassName = 'packt.taman.jfx8.ch4.DialPad2'\n\njfxmobile {\n\n    android\
    \ {\n        manifest = 'lib/android/AndroidManifest.xml'\n    }\n}\n```\n\nThe\
    \ only important thing to change is the `jfxmobile-plugin` version to 1.0.0-b8\
    \ (or the most recent one; check [https://bitbucket.org/javafxports/javafxmobile-plugin/overview](https://bitbucket.org/javafxports/javafxmobile-plugin/overview)\
    \ frequently to keep it updated).\n\n## The application\n\nThe fact that you have\
    \ reached this section means that we have finished setting up the application\
    \ project structure correctly, and it's now ready for mobile device development.\n\
    \nOur application will be a new smart phone dial pad interface to perform calls\
    \ on our device with its default dialer. It will be customized with CSS to control\
    \ its skinning style, which can be modified to get the native look and feel for\
    \ different platforms.\n\nThe main aim of this application is to provide a new\
    \ UI concept (to customize an application using CSS), and you will learn how to\
    \ use the CSS id and class selectors as well as setting them from inside the code\
    \ to be applied to different controls.\n\nThe following screenshots show the application\
    \ before and after applying the CSS file:\n\n![The application](graphics/B03998_04_03.jpg)"
