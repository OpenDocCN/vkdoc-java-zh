  trans: "\n## 获取设备\n\n受到这项神奇技术的启发，我们需要着手使用该设备进行开发。因此，我们首先需要获取一个。\n\n该设备可从亚马逊、百思买等众多供应商处购买。当然，你也可以直接从\
    \ Leap Motion 商店购买（[`store-world.leapmotion.com`](http://store-world.leapmotion.com)）。\n\
    \n我是在 2014 年底购买的设备，现在你或许能在某些商店找到特别折扣。\n\n### 包装内容\n\n当你购买 Leap Motion 套装时，至少应包含下图所示的物品：\n\
    \n![包装内容](img/B03998_08_7.jpg)\n\nLeap Motion 套装内容\n\n在撰写本文时，套装包含：\n\n*   Leap\
    \ Motion 控制器\n*   两根定制长度的 USB 2.0 数据线\n*   欢迎卡\n*   重要信息指南\n\n## Leap SDK 入门\n\
    \n现在我们已经有了硬件，接下来需要安装软件并开始开发。这非常简单；只需将鼠标指向你常用浏览器的地址栏，输入网址 [`developer.leapmotion.com/downloads`](https://developer.leapmotion.com/downloads)，然后按下\
    \ *Enter* 键即可。\n\n在撰写本文时，最新版本是 SDK 2.2.6.29154。点击你的操作系统图标开始下载支持的版本。或者，直接点击标有 **Download\
    \ SDK 2.2.6.29154 for OSX**（适用于 Mac OS X）的绿色按钮。这将自动检测你的电脑/笔记本操作系统，并允许你下载适合的 SDK。\n\
    \n### 安装控制器驱动和软件\n\n安装过程以及让设备准备好进行交互只需几个简单步骤。下载`zip`文件后，解压并运行软件安装程序，一切就绪：\n\n\
    1.  下载、解压并运行软件安装程序。\n2.  安装完成后，连接你的 Leap Motion 控制器并打开可视化工具，如下方截图所示：![安装控制器驱动和软件](img/B03998_08_8.jpg)\n\
    \n    运行可视化工具\n\n3.  SDK 包含一个 `LeapJava.jar` 库以及一系列用于控制器集成的原生库。在系统上集成 `LeapJava.jar`\
    \ 的一个简单方法是在 Linux 或 Windows 上将该 JAR 文件添加到 `<JAVA_HOME>/jre/lib/ext` 目录（或在 Mac\
    \ 上添加到 `/Library/Java/Extensions` 目录）。\n4.  将原生库（Windows 下的 `LeapJava.dll`、`Leap.dll`\
    \ 和 `Leapd.dll`；Mac 下的 `libLeapJava.dylib` 和 `libLeap.dylib`；Linux 下的 `libLeapJava.so`\
    \ 和 `libLeap.so`）复制到 `<JAVA_HOME>/jre/bin` 文件夹。\n5.  或者，你也可以直接将 JAR 文件作为依赖项添加到每个项目中，并通过\
    \ VM 参数 `-Djava.library.path=<原生库路径>` 加载原生库。\n\n    ### 注意\n\n    SDK 还包含许多基于支持语言的示例，包括\
    \ `HelloWorld.java` 示例，这是一个非常好的起点，可以帮助你理解如何将控制器与 Java 应用程序集成。\n\n#### 验证是否正常工作\n\
    \n如果一切正常，任务栏通知区域（Windows）或菜单栏（Mac）上应该会出现一个小的 Leap Motion 图标，并且该图标应为绿色，如上图所示。设备上的\
    \ LED 指示灯应亮起绿光，并且*朝向您以确保设备方向正确*。\n\n如果你能够交互并在可视化工具打开时看到手指和手的可视化图像，如下方截图所示，那么就可以开始开发了。\n\
    \n![验证是否正常工作](img/B03998_08_9.jpg)\n\nLeap Motion 诊断可视化工具应用程序\n\n## 支持的语言\n\n\
    在深入探讨我们的应用程序之前，我想提一下，Leap Motion SDK 支持多种语言，包括 Java 以及其他语言，例如用于 Web 的 JavaScript、C#、C++、Python、Unity、Objective-C\
    \ 和 Unreal 游戏引擎。\n\n# Leap JavaFX 应用程序\n\n和你一样，我也迫不及待地想开始开发过程，现在你将学习如何与连接到 Leap\
    \ Motion 设备的基于 JavaFX 8 3D 的应用程序进行非接触式交互。\n\n鉴于本书尚未介绍 3D API，这是一个很好的机会来简要描述 3D\
    \ API，并将 Leap Motion v2 骨骼建模（3D 手部）以及一些 3D 交互引入到我们的 JavaFX 应用程序中。\n\nLeap Motion\
    \ API v2.0 引入了一种新的骨骼跟踪模型，该模型提供有关手部和手指的额外信息，预测未清晰可见的手指和手部的位置，并改进整体跟踪数据。有关 API 的更多信息，请访问\
    \ [`developer.leapmotion.com/documentation/java/devguide/Intro_Skeleton_API.html?proglang=java`](https://developer.leapmotion.com/documentation/java/devguide/Intro_Skeleton_API.html?proglang=java)。\n\
    \n我们将构建并展示如何将 Leap Motion v2 的新骨骼模型轻松集成到 JavaFX 3D 场景中。我们将使用 JavaFX 提供的预定义 3D\
    \ 形状 API 来快速创建开箱即用的 3D 对象。这些形状包括我们将在应用程序中使用的长方体、圆柱体和球体。\n\n## JavaFX 3D API 概览\n\
    \n3D 意味着*三维*或具有*宽度*、*高度*和*深度*（或*长度*）的物体。我们的物理环境是三维的，我们每天都在三维空间中活动。\n\nJavaFX 3D\
    \ 图形库包含 Shape3D API，JavaFX 中有两种类型的 3D 形状：\n\n*   **预定义形状**：这些形状旨在让你更轻松地快速创建开箱即用的\
    \ 3D 对象。这些形状包括长方体、圆柱体和球体。\n*   **用户定义形状**：JavaFX Mesh 类层次结构包含 `TriangleMesh` 子类。三角形网格是\
    \ 3D 布局中最常用的一种网格。\n\n在我们的应用程序中，我们将使用预定义形状。有关 JavaFX 3D API 及示例的更多信息，请访问 [`docs.oracle.com/javase/8/javafx/graphics-tutorial/javafx-3d-graphics.htm`](http://docs.oracle.com/javase/8/javafx/graphics-tutorial/javafx-3d-graphics.htm)。\n\
    \n## 更多学习资源\n\n一个丰富的资源是 SDK 附带的 `HelloWorld.java` 示例，它将帮助你在 Leap Motion 控制器和普通\
    \ Java 应用程序之间进行开发和集成。\n\n另一个讨论与 Java 集成的资源是 Leap Motion 文档中的 *Java 开发入门* 部分，可访问\
    \ [`developer.leapmotion.com/documentation/java/devguide/Leap_Guides.html`](https://developer.leapmotion.com/documentation/java/devguide/Leap_Guides.html)。\n\
    \n## 基本应用程序结构\n\n在查看了 `HelloWorld.java` 示例和文档示例后，你会注意到以下几点：\n\n*   我们需要一个 `Controller`\
    \ 对象，用于建立 Leap 设备与应用程序之间的连接。\n*   我们需要一个 `Listener` 子类来处理来自控制器的事件。\n*   在 `onConnect()`\
    \ 方法中启用手势跟踪。\n*   该类中的主要方法是 `onFrame()`，这是一个 `回调` 方法，当包含运动跟踪数据的新的 `Frame` 对象可用时被调度。该对象包含手部、手指或工具的列表，以及多个表示其位置、方向和运动速度的向量。\n\
    *   如果启用了手势，我们还将根据对最近帧的分析获得已发现手势的列表。此外，你还可以了解手势的状态，是刚刚开始、正在进行还是已经结束。\n"
- fmt: "### The JavaFX 8 3D Application\n\nThe application we are going to discuss\
    \ here is a complex JavaFX 8 3D application that will help you understand the\
    \ Leap-based application development structure, interact with the device to recognize\
    \ *hand positions*, and interact with *gestures* to model our hand in a 3D environment.\n\
    \nYou can find more resources, including more advanced concepts for developing\
    \ Leap-based applications with JavaFX, in the examples section later on.\n\nIn\
    \ this application, we are going to detect bones, arms, and joints (position and\
    \ directions) in the form of cylinder and sphere shapes to model our hands in\
    \ 3D into our JavaFX application `SubScene`. Then, we will detect their position\
    \ to model our real hand movement above the Leap Motion device.\n\nWe will also\
    \ add the raw `image` so that you can see the model and your real hand in the\
    \ application's background.\n\nThe application consists of three classes:\n\n\
    - `LeapListener.java`: This class is the listener that interacts with the Leap\
    \ Motion controller thread to transfer all the analyzed data (arms, bones, fingers,\
    \ and joints) to the JavaFX application.\n- `LeapJavaFX.java`: This class is a\
    \ JavaFX application thread that will interact with `LeapListener.java` in order\
    \ to create 3D shapes (on every frame), without keeping track of previous ones.\
    \ Thanks to the power of Observable JavaFX bean properties, which allows data\
    \ transferred from the Leap thread to be rendered into the JavaFX thread.\n- `Pair.java`:\
    \ This is a small pair convenience class to store the two bones linked in every\
    \ joint.\n\nSo, let's start and see how we can do this.\n\n### Tip\n\nYou have\
    \ to enable images on the Leap Motion control panel by checking the **Allow Images**\
    \ option under the **General** tab, and make sure you disable the **Robust Mode**\
    \ option for higher image under the **Tracking** tab.\n\n### How it works\n\n\
    First, we will explain the main bridge to our application, which is the Leap event\
    \ listener `LeapListener.java`.\n\nThe main concern when developing a JavaFX application\
    \ is how to mix the JavaFX thread with other non-JavaFX threads, which in our\
    \ case is the Leap Motion Event `Listener` subclass that handles events at a very\
    \ high rate.\n\nIn order to bring these events to a JavaFX thread, we will use\
    \ the `BooleanProperty` objects in the `LeapListener.java` class. Since we will\
    \ be listening to changes only in `doneList` object, we don't need the lists to\
    \ be observable too, because they will be triggering events with any change (adding\
    \ one bone).\n\nThat is why they are plain lists and we use only one Boolean observable\
    \ property to set it to true after creating all the lists in every Leap `Frame`\
    \ object:\n\n```java\nprivate final BooleanProperty doneList = new SimpleBooleanProperty(false);\n\
    private final List<Bone> bones = new ArrayList<>();\nprivate final List<Arm> arms\
    \ = new ArrayList<>();\nprivate final List<Pair> joints = new ArrayList<>();\n\
    private final List<WritableImage> raw = new ArrayList<>();\n```\n\nTo get the\
    \ raw images we have to set this policy `onInit()` and, due to privacy reasons,\
    \ the user must also enable the feature in the Leap Motion control panel for any\
    \ application to get the raw camera images.\n\n```java\n@Override\npublic void\
    \ onInit(Controller controller) {\n    controller.setPolicy(Controller.PolicyFlag.POLICY_IMAGES);\n\
    }\n```\n\n(*As you know, if you want to process gestures, here is where you enable\
    \ this feature, so maybe you can keep them commented.*)\n\nLet's go ahead with\
    \ creating the Frame method:\n\n```java\n@Override\npublic void onFrame(Controller\
    \ controller) {\n    Frame frame = controller.frame();\n    doneList.set(false);\n\
    \    doneList.set(!bones.isEmpty() || !arms.isEmpty());\n}\n\npublic BooleanProperty\
    \ doneListProperty() {\n    return doneList;\n}\n```\n\nFor every frame, reset\
    \ `doneList`, process the data, and finally set it to `true` if we have bones\
    \ or arms (if no hand is over the Leap, the frames are still being processed).\
    \ Expose the property to be listened on the JavaFX app.\n\nNow processing the\
    \ frame object data. First, images (this could be done at the end). Clear the\
    \ list on every frame and then retrieve the images (from the left and right cameras).\
    \ The Leap documentation is really helpful if you want to understand how this\
    \ works. Visit [https://developer.leapmotion.com/documentation/java/devguide/Leap_Images.html](https://developer.leapmotion.com/documentation/java/devguide/Leap_Images.html).\n\
    \nIn fact, this code is part of the first example, adding `PixelWriter` to generate\
    \ a JavaFX image. Since Leap gives bright pixels, I've negated them *(1 - (r|g|b))*\
    \ to get a negative image, more visible on the hands. Also, I flipped the image\
    \ from left to right as the following:\n\n```java\n(newPixels[i * width + (width\
    \ - j - 1)]).raw.clear();\nImageList images = frame.images();\nfor (Image image\
    \ : images) {\n    int width = (int) image.width();\n    int height = (int) image.height();\n\
    \    int[] newPixels = new int[width * height];\n    WritablePixelFormat<IntBuffer>\
    \ pixelFormat = PixelFormat.getIntArgbPreInstance();\n    WritableImage wi = new\
    \ WritableImage(width, height);\n    PixelWriter pw = wi.getPixelWriter();\n \
    \   // Get byte array containing the image data from Image object\n    byte[]\
    \ imageData = image.data();\n\n    // Copy image data into display object\n  \
    \  for (int i = 0; i < height; i++) {\n        for (int j = 0; j < width; j++)\
    \ {\n            // convert to unsigned and shift into place\n            int\
    \ r = (imageData[i * width + j] & 0xFF) << 16;\n            int g = (imageData[i\
    \ * width + j] & 0xFF) << 8;\n            int b = imageData[i * width + j] & 0xFF;\n\
    \            // reverse image\n            newPixels[i * width + (width - j -\
    \ 1)] = 1 - (r | g | b);\n        }\n    }\n    pw.setPixels(0, 0, width, height,\
    \ pixelFormat, newPixels, 0, width);\n    raw.add(wi);\n}\n```\n\nThen clear the\
    \ bone, arms, and joint lists, as shown in the following code:\n\n```java\nbones.clear();\n\
    arms.clear();\njoints.clear();\nif (!frame.hands().isEmpty()) {\n    Screen screen\
    \ = controller.locatedScreens().get(0);\n    if (screen != null && screen.isValid())\
    \ {\n```"
