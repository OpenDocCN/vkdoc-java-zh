    \n# Chapter 1. Getting Started with JavaFX 8\n\nJavaFX is Java's next-generation\
    \ **Graphical User Interface (GUI)** toolkit. It's a platform that makes it easy\
    \ to rapidly build high-performance Java client-side applications.\n\nJavaFX's\
    \ underlying engines take advantage of modern GPUs through hardware-accelerated\
    \ graphics, while providing well-designed programming interfaces, thus enabling\
    \ developers to combine graphics, animation, and UI controls.\n\nThese capabilities\
    \ allow you to deliver a compelling, complex, and fully customizable client GUI\
    \ for your customer that will make them quite impressed.\n\nWhile the original\
    \ targets of Java were the *embedded* and *client* worlds, since 2006, many reasons\
    \ pushed the Java language to become the top development platform for the Enterprise\
    \ world.\n\nBut recently, with the JavaFX platform's entrance as the standard\
    \ client GUI, those original targets have started to gain popularity again.\n\n\
    Although it is much more than just a GUI toolkit, JavaFX allows Java developers\
    \ to create client applications with compelling user interfaces that easily connect\
    \ to backend systems.\n\nIn addition, JavaFX's flexible FXML support allows you\
    \ to build **MVC** (**Model-View-Controller**) architectural pattern applications\
    \ easily, and use the WYSIWYG approach using the Scene Builder tool.\n\nJavaFX's\
    \ bindings feature simplified communication between entities and support MVC even\
    \ further. In addition to that, JavaFX provides fast, customizable UI modeling\
    \ using CSS.\n\nBy adding a full-fledged `WebView` component with a document model,\
    \ mapping to Java code is easy and provides great support for 3D and media capabilities.\n\
    \nIn this chapter, we are going to cover the following topics:\n\n* What is JavaFX\
    \ and what are its targeted platforms?\n* A walk through JavaFX history\n* JavaFX\
    \ goals, features, and what's new in JavaFX 8\n* How to install Java SE 8, JavaFX\
    \ 8, NetBeans, and configuring environment variables\n* Developing a *\"Hello\
    \ World\"* JavaFX 8 application, and understanding the JavaFX 8 basic application\
    \ architecture and building blocks"
