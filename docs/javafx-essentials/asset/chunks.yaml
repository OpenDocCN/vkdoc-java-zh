  trans: "\n## 安装 Java SE 8 JDK\n\n本节概述的步骤将指导您成功下载并安装 Java SE 8。请从以下位置下载 Java SE 8\
    \ JDK：\n\n[`www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html`](http://www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html)\n\
    \n在以下步骤中，将以 Mac OS X Yosemite (10.10.3) 操作系统上的 Java SE 8u45 JDK 64 位版本（撰写本文时的版本）为例。\n\
    \n其他操作系统和 JDK 版本的步骤类似。但是，如果您的环境不同，请参考以下链接获取更多详细信息：\n\n[`docs.oracle.com/javase/8/docs/technotes/guides/install/toc.html`](http://docs.oracle.com/javase/8/docs/technotes/guides/install/toc.html)\n\
    \n以下是安装 Java SE 8 JDK 的步骤：\n\n1.  通过启动镜像文件 `jdk-8u45-macosx-x64.dmg` 来安装 Java\
    \ 8 JDK。启动 JDK 8 安装镜像文件后，将出现如下截图所示的屏幕。这是软件包安装文件。双击它，安装程序将启动：![安装 Java SE 8 JDK](img/B03998_01_04.jpg)\n\
    \n    JDK 8 安装镜像文件\n\n    ### 提示\n\n    通常，您需要拥有机器的管理员权限才能安装软件。\n\n2.  开始安装 Java\
    \ 8 JDK。安装过程开始时将出现如下截图所示的屏幕。点击**继续**按钮，然后在**安装类型**屏幕向导中，点击**安装**以开始安装。![安装 Java\
    \ SE 8 JDK](img/B03998_01_05.jpg)\n\n    Java SE 开发工具包 8 安装\n\n3.  点击**安装**后，系统可能会要求您提供密码。提供密码，点击**确定**，安装将继续并显示进度条，如下图所示：![安装\
    \ Java SE 8 JDK](img/B03998_01_06.jpg)\n\n    Java SE 开发工具包 8 安装进行中\n\n4.  安装程序将完成\
    \ Java 8 SE 开发工具包的安装。点击**关闭**按钮退出。\n\n### 设置环境变量\n\n现在您需要设置几个关键的环境变量。设置方式及其值取决于您的操作系统。需要设置的两个变量是：\n\
    \n*   **JAVA_HOME**：此变量告诉您的操作系统 Java 的安装目录在哪里。\n*   **PATH**：此变量指定 Java 可执行文件目录的位置。此环境变量允许系统搜索包含可执行文件的路径或目录。Java\
    \ 可执行文件位于 `JAVA_HOME` 主目录下的 bin 目录中。\n\n为了使 `JAVA_HOME` 和 `PATH` 的设置更持久，您需要将它们添加到系统中，以便在每次启动或登录时始终可用。根据您的操作系统，您需要能够编辑环境变量名称和值。\n\
    \n在 *Windows 环境*中，您可以使用键盘快捷键 *Windows 徽标键 + Pause/Break 键*，然后点击**高级系统设置**以显示**系统属性**对话框。\n\
    \n接下来，点击**环境变量**。您可以在此处添加、编辑和删除环境变量。您将通过使用已安装的主目录作为值来添加或编辑 `JAVA_HOME` 环境变量。此截图显示了\
    \ Windows 操作系统上的环境变量对话框：\n\n![设置环境变量](img/B03998_01_07.jpg)\n\nWindows 环境变量\n\n\
    让我们设置环境变量：\n\n*   要为 **Mac OS X** 平台设置您的 `JAVA_HOME` 环境变量，您需要启动一个终端窗口，通过添加以下 export\
    \ 命令来编辑您主目录下的 `.bash_profile` 文件：\n\n    ```\n    export JAVA_HOME=$(/usr/libexec/java_home\
    \ -v 1.8)\n    ```\n\n*   在 **Linux** 和其他使用 Bash shell 环境的 **Unix** 操作系统上，启动一个终端窗口，编辑\
    \ `~/.bashrc` 或 `~/.profile` 文件，使其包含 export 命令：\n\n    ```\n    export JAVA_HOME=/usr/java/jdk1.8.0\n\
    \    export PATH=$PATH:$JAVA_HOME/bin\n    ```\n\n*   在 Linux 和其他使用 `C` shell\
    \ (csh) 环境的 Unix 操作系统上，启动一个终端窗口，编辑 `~/.cshrc` 或 `~/.login` 文件，使其包含 `setenv` 命令：\n\
    \n    ```\n    setenv JAVA_HOME /usr/java/jdk1.8.0_45\n    setenv PATH ${JAVA_HOME}/bin:${PATH}\n\
    \    ```\n\n设置好路径和 `JAVA_HOME` 环境变量后，您需要验证设置，方法是启动一个终端窗口，并在命令提示符下执行以下两个命令：\n\n\
    ```\njava -version\njavac –version\n```\n\n### 注意\n\n每个命令的输出都应显示一条消息，指示 Java SE\
    \ 8 的语言和运行时版本。\n\n## 安装 NetBeans IDE\n\n在开发 JavaFX 应用程序时，您将使用 NetBeans IDE（或您喜欢的任何其他\
    \ IDE）。请务必下载包含 JavaFX 的正确 NetBeans 版本。要安装 NetBeans IDE，请遵循以下步骤：\n\n1.  从以下位置下载\
    \ NetBeans IDE 8.0.2 或更高版本：\n\n    [`netbeans.org/downloads/index.html`](https://netbeans.org/downloads/index.html)\n\
    \n2.  启动 `.dmg` 镜像文件 `netbeans-8.0.2-macosx.dmg`。镜像将被验证，然后会打开一个包含安装程序包存档 `netbeans-8.0.2.pkg`\
    \ 的文件夹；双击它以启动安装程序。将出现一个对话框，显示消息：*此软件包将运行一个程序以确定是否可以安装该软件。* 点击**继续**按钮。\n3.  启动\
    \ NetBeans 安装对话框后，再次点击**继续**。接下来，接受许可协议，点击**继续**，然后点击**同意**。\n4.  点击**安装**按钮继续。以下截图显示了一个\
    \ **Mac** 安全警告提示；提供您的密码并点击**安装软件**。![安装 NetBeans IDE](img/B03998_01_08.jpg)\n\n\
    \    Mac 安全警告对话框\n\n5.  NetBeans IDE 安装过程将开始。以下截图显示了安装进度条：![安装 NetBeans IDE](img/B03998_01_09.jpg)\n\
    \n    安装进度\n\n6.  点击**关闭**按钮完成安装，如下所示：![安装 NetBeans IDE](img/B03998_01_10.jpg)\n\
    \n    安装完成\n\n现在您可以继续创建 JavaFX 应用程序了。\n\n# 创建 \"Hello World\" JavaFX 风格的应用程序\n\
    \n向您展示创建和构建 JavaFX 应用程序是什么样的最好方式，就是通过一个 `Hello World` 应用程序。\n\n在本节中，您将使用我们刚刚安装的\
    \ NetBeans IDE 来开发、编译和运行一个基于 JavaFX 的 `Hello World` 应用程序。\n"
- fmt: "# Using the Netbeans IDE\n\nTo quickly get started with creating, coding,\
    \ compiling, and running a simple JavaFX-style `Hello World` application using\
    \ the NetBeans IDE, follow the steps outlined in this section:\n\n1. From the\
    \ **File** menu, choose **New Project**.\n2. From **JavaFX application category**,\
    \ choose **JavaFX Application**. Click on **Next**.\n3. Name the project `HelloJavaFX`.\
    \ Optionally, you can define the package structure for application classes. Then\
    \ click on **Finish** as shown in the following screenshot:\n\n   ![Using the\
    \ Netbeans IDE](graphics/B03998_01_11.jpg)\n\n   New JavaFX application wizard\n\
    \n   NetBeans opens the `HelloJavaFX.java` file and populates it with the code\
    \ for a basic \"Hello World\" application.\n\n   ### Note\n\n   You will find\
    \ that this version of code has been modified a bit from the one NetBeans actually\
    \ creates, and you can compare them to find differences, but they have the same\
    \ structure. I did that to show the result on the text node on the `Scene` instead\
    \ of the console when clicking on the **Say 'Hello World'** button. For that,\
    \ a `VBox` container has also been used.\n\n4. Right-click on the project and\
    \ click on **Run** from the menu as shown here: ![Using the Netbeans IDE](graphics/B03998_01_12.jpg)\n\
    \n   Running the application\n\n5. NetBeans will compile and run the application.\
    \ The output should be as shown in the following screenshot: ![Using the Netbeans\
    \ IDE](graphics/B03998_01_13.jpg)\n\n   JavaFX Hello World launched from the NetBeans\
    \ IDE\n\n6. Click on the button and you should see the following result: ![Using\
    \ the Netbeans IDE](graphics/B03998_01_14.jpg)\n\n   JavaFX Hello World results\n\
    \nHere is the modified code of the basic Hello world application (`HelloJavaFX.java`):\n\
    \n```\nimport javafx.application.Application;\nimport javafx.scene.Scene;\nimport\
    \ javafx.scene.control.Button;\nimport javafx.scene.text.Text;\nimport javafx.stage.Stage;\n\
    import static javafx.geometry.Pos.CENTER;\nimport javafx.scene.layout.VBox;\n\n\
    /**\n  * @author mohamed_taman\n */\npublic class HelloJavaFX extends Application\
    \ {\n\n  @Override\n  public void start(Stage primaryStage) {\n\n    Button btn\
    \ = new Button();\n    Text message = new Text();\n\n    btn.setText(\"Say 'Hello\
    \ World'\");\n\n    btn.setOnAction(event -> {\n      message.setText(\"Hello\
    \ World! JavaFX style :)\");\n    });\n\n    VBox root = new VBox(10,btn,message);\n\
    \    root.setAlignment(CENTER);\n\n    Scene scene = new Scene(root, 300, 250);\n\
    \n    primaryStage.setTitle(\"Hello JavaFX 8 World!\");\n    primaryStage.setScene(scene);\n\
    \    primaryStage.show();\n  }\n  public static void main(String[] args) {\n \
    \   launch(args);\n  }\n}\n```\n\n## How it works\n\nHere are the important things\
    \ to know about the basic structure of a JavaFX application:\n\n* The main class\
    \ for a JavaFX application should extend the `javafx.application.Application`\
    \ class. The `start()` method is the *main entry point* for all JavaFX applications.\n\
    * A JavaFX application defines the user interface container by means of a *stage*\
    \ and a *scene*. The JavaFX `Stage` class is the top-level JavaFX container. The\
    \ JavaFX `Scene` class is the container for all content. The following code snippet\
    \ creates a stage and scene and makes the scene visible in a given pixel size\
    \ – `new Scene(root, 300, 250)`.\n* In JavaFX, the content of the scene is represented\
    \ as a hierarchical scene graph of nodes. In this example, the root node is a\
    \ `VBox` layout object, which is a resizable layout node. This means that the\
    \ root node's size tracks the scene's size and changes when a user resizes the\
    \ stage.\n* The `VBox` is used here as the container that arranges its content\
    \ nodes vertically in a single column with multiple rows. We have added the button\
    \ **btn** control to the first row in the column, then the text **message** control\
    \ to the second row on the same column, with vertical space of 10 pixels, as in\
    \ the following code snippet:\n\n  ```\n  VBox root = new VBox(10,btn,message);\n\
    \  root.setAlignment(CENTER);\n  ```\n\n* We set the button control with text,\
    \ plus an event handler to set the message text control to **Hello World! JavaFX\
    \ style :)** when the button is clicked on.\n* You might note a strange code syntax\
    \ written in Java, with no compiler errors. This is a **Lambda** expression, which\
    \ has been added to Java SE 8, and we are going to talk about it briefly in [Chapter\
    \ 2](#ch02.html \"Chapter 2. JavaFX 8 Essentials and Creating a Custom UI\"),\
    \ *JavaFX 8 Essentials and Creating a custom UI*. With a slight comparison to\
    \ old anonymous inner classes style, it is cleaner and more concise to use Lambda\
    \ expression now. Have a look at this comparison of code:\n\n  Old School:\n\n\
    \  ```\n  btn.setOnAction(new EventHandler<ActionEvent>() {\n    @Override\n \
    \   public void handle(ActionEvent event) {\n      message.setText(\"Hello World!\
    \ JavaFX style :)\");\n    }\n  });\n  ```\n\n  New Era:\n\n  ```\n  btn.setOnAction(event\
    \ -> {\n      message.setText(\"Hello World! JavaFX style :)\");\n  });\n  ```\n\
    \n* The `main()` method is not required for JavaFX applications when the **JAR**\
    \ file for the application is created with the JavaFX Packager tool, which embeds\
    \ the JavaFX Launcher in the JAR file.\n* However, it is useful to include the\
    \ `main()` method so you can run JAR files that were created without the JavaFX\
    \ Launcher, such as when using an IDE in which the JavaFX tools are not fully\
    \ integrated. Also, **Swing** applications that embed JavaFX code require the\
    \ `main()` method.\n* Here, in our `main()` method's entry point, we launch the\
    \ JavaFX application by simply passing in the command-line arguments to the `Application.launch()`\
    \ method.\n* After the `Application.launch()` method has executed, the application\
    \ will enter a ready state and the framework internals will invoke the `start()`\
    \ method to begin.\n* At this point, the program execution occurs on the *JavaFX\
    \ application thread* and not on the **main thread**. When the `start()` method\
    \ is invoked, a JavaFX `javafx.stage.Stage` object is available for you to use\
    \ and manipulate.\n\n### Note\n\nAdvanced topics will be discussed at length in\
    \ the next chapters. More importantly, we will go through the JavaFX application\
    \ thread in the coming chapters. In the last three chapters, we will see how to\
    \ bring the result from other threads into the JavaFX application thread in order\
    \ to render it correctly on the scene.\n\n# Summary\n\nSo far, you have learned\
    \ what JavaFX is and seen its power. You have managed to download and install\
    \ both Java 8 JDK and NetBeans IDE. After successfully installing the prerequisite\
    \ software, you created a JavaFX Hello World GUI application through the NetBeans\
    \ IDE. After learning how to compile and run a JavaFX application, you did a quick\
    \ code walkthrough of the source file `HelloJavaFX.java`.\n\nNext, in [Chapter\
    \ 2](#ch02.html \"Chapter 2. JavaFX 8 Essentials and Creating a Custom UI\"),\
    \ *JavaFX 8 Essentials and Creating a custom* you'll learn about JavaFX 8 architecture\
    \ components and engines, which allow JavaFX applications to run efficiently and\
    \ smoothly under the hood. You will also learn about the most common layout UI\
    \ components and get an idea about theming your application as a whole or as individual\
    \ scene nodes.\n\nWe will also be covering Java SE 8's most important feature,\
    \ Lambda expressions, and how it works. We will then get insights into **Scene\
    \ Builder** as a declarative UI and productive tool, then learn about generated\
    \ FXML-based markup document and how to import it into NetBeans IDE to continue\
    \ your application logic implementation to associate it to the already declared\
    \ UI controls inside your FXML document.\n\nFinally, you will be able to create\
    \ a custom UI component that isn't bundled with default JavaFX 8 UI controls."
