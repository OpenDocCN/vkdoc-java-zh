  trans: "\n# 开始入门\n\n现在我们已经掌握了足够的信息，了解之前讨论的工具和 SDK 如何帮助我们开始开发 JavaFX 应用程序，并将其移植到\
    \ Android 移动设备上。\n\n但在进入开发阶段之前，我们需要正确安装和配置相关工具与软件，以便基于所提供的 SDK 完成整个开发流程，最终生成一个可用的\
    \ `.apk` 包。\n\n我们将把这个 `.apk` 包部署到真实设备上，最后对其进行签名，以便最终提交到 Google Play 商店。\n\n那么，让我们开始安装必要的工具和软件，以便着手开发我们的应用程序。\n\
    \n## 准备并安装必备软件\n\n我们需要安装以下工具和软件，以确保构建过程能够顺利完成，不会出现任何问题。\n\n### Java SE 8 JDK8\
    \ u45\n\n我们之前已经完成过这一步；请参考第 1 章中的*安装 Java SE 8 JDK* 部分，该章节标题为*开始使用 JavaFX 8*。\n\
    \n### 注意\n\n开发适用于 Android 的 JavaFX 应用程序，至少需要 Java SE 8 update 40 版本。\n\n### Gradle\n\
    \n根据其官网的定义，Gradle 是：\n\n> *Gradle 是一个开源构建自动化系统。Gradle 可以自动化完成软件包或其他类型项目（例如生成的静态网站、生成的文档，或者实际上任何其他内容）的构建、测试、发布、部署等任务。*\n\
    \n最近，Android 开发工具将其构建系统切换到了 Gradle。RoboVM 和 JavaFXPorts 移植项目也采用了相同的工具。\n\n安装 Gradle\
    \ 是一项非常直接的任务：\n\n1.  访问 [`gradle.org`](https://gradle.org)。\n2.  在右侧的 **GET GRADLE!**\
    \ 部分下，点击 **Downloads 2.4**（截至撰写本文时），将开始下载 `gradle-2.4-all.zip` 文件。\n3.  将下载的 `.zip`\
    \ 文件复制到你选择的方便位置，并解压缩。\n4.  最后一步是在你的系统中设置环境变量，如下所示：\n    *   在 Windows 上 – 假设 Gradle\
    \ 安装在 `c:\\tools\\gradle_2.4`：\n\n        ```\n        set GRADLE_HOME=c:\\tools\\\
    gradle_2.4\n        set PATH=%PATH%;%GRADLE_HOME%\\bin\n        ```\n\n    * \
    \  在 Mac 上 – 假设 Gradle 安装在 `/usr/local/tools/gradle_2.4`：\n\n        ```\n   \
    \     export GRADLE_HOME=/usr/local/tools/gradle_2.4\n        export PATH=${PATH}:${GRADLE_HOME}/bin\n\
    \        ```\n\n### Android SDK\n\nAndroid SDK 包含了 Android 平台完整的开发和调试工具集。\n\n\
    安装 Android SDK 也是一项非常直接的任务：\n\n1.  访问 [`developer.android.com/sdk/index.html#Other`](http://developer.android.com/sdk/index.html#Other)。\n\
    2.  在“仅 SDK 工具”下，根据你偏好的平台名称，点击对应的 `android-sdk_r24.2-{platform}`。`{exe|zip|tgz}`（截至撰写本文时）：![Android\
    \ SDK](img/B03998_04_01.jpg)\n3.  将打开一个 `Download` 页面；接受条款，点击 `Download android-sdk_r24.2-{platform}`。`{exe|zip|tgz}`\
    \ 按钮，下载过程将开始。\n4.  将下载的 `.zip` 文件复制到一个方便的位置并解压缩，或者在 Windows 上双击 `.exe` 文件开始安装。\n\
    5.  在命令行中运行以下命令：\n\n    ```\n    $ android\n    ```\n\n    Android SDK Manager\
    \ 将打开；点击 `Build-tools version 21.1.2` 或更高版本，以及 API 21 或更高版本的 SDK Platform。\n\n\
    \    点击 **Install x packages**，接受许可协议，然后点击 **Install**。这样就完成了。\n\n    Android\
    \ SDK Manager 的一个很好的参考文档位于 [`developer.android.com/sdk/installing/adding-packages.html`](http://developer.android.com/sdk/installing/adding-packages.html)。\n\
    \n6.  最后一步是在你的系统中设置环境变量，如下所示：\n    *   在 Windows 上 – 假设 Android SDK 安装在 `c:\\\
    tools\\android_ADT`：\n\n        ```\n        set ANDROID_HOME=c:\\tools\\android_ADT\\\
    sdk\n        set PATH=%PATH%;%ANDROID_HOME%\\platform-tools;%ANDROID_HOME%\\tools\n\
    \        ```\n\n    *   在 Mac 上 – 假设 Android SDK 安装在 `/usr/local/tools/android_ADT`：\n\
    \n        ```\n        export ANDROID_HOME=/usr/local/tools/android_adt/sdk\n\
    \        export PATH=${PATH}:${ANDROID_HOME}/tools:${ANDROID_HOME}/platform-tools\n\
    \        ```\n\n    *   最佳做法是在 `C:\\Users\\<user>\\.gradle\\gradle.properties`\
    \ 下创建一个名为 ANDROID_HOME 的 Gradle 属性。\n\n## 为 Android 准备项目\n\n我们已经成功安装了必备的软件和工具，并配置了环境变量，因此我们已经准备好开始开发将要移植到\
    \ Android 设备上的应用程序了。\n\n但在开始之前，我们还需要准备好项目结构和构建文件，以便能够使用 JavaFXPorts 库来构建和打包我们的应用程序。\n\
    \n在此之前，搭建一个包含三个不同平台的复杂项目是一项艰巨的任务。但最近，Gluon (http://gluonhq.com/) 发布了一个 NetBeans\
    \ 插件 ([`gluonhq.com/gluon-plugin-for-netbeans/`](http://gluonhq.com/gluon-plugin-for-netbeans/))，极大地简化了这项任务。\n\
    \n### 项目结构\n\n最简单的方法是使用 Gluon 的 NetBeans 插件。这将为你创建一切：一个 Java 项目，你只需添加 JavaFX 源代码，以及一个包含所有就绪任务的\
    \ `build.gradle` 文件。\n\n安装好插件后，执行以下任务：\n\n1.  只需创建一个新的 JavaFX 项目，并选择 **Basic Gluon\
    \ Application**，如下所示：![项目结构](img/B03998_04_02.jpg)\n2.  为项目（`DialPad2`）、包（`packt.taman.jfx8.ch4`）和主类（`DialPad2`）选择有效的名称，你会在新项目中看到一堆文件夹。\n\
    3.  使用 Gluon 插件后的顶层项目结构将更加复杂，应如下图所示：![项目结构](img/B03998_04_04.jpg)\n\n    Gluon\
    \ 插件项目结构\n\n接下来，我们将添加构建脚本文件以完成我们的任务。\n\n#### 使用 Gradle\n\n要构建一个 Gradle 项目，我们需要\
    \ `build.gradle` 脚本文件。Gluon 插件默认已经为你添加了这个文件，其中包含了允许我们的应用程序成功运行和编译的所有属性。\n\n默认的\
    \ Gradle 构建文件 `build.gradle` 内容应如下所示：\n\n```\nbuildscript {\n    repositories\
    \ {\n        jcenter()\n    }\n    dependencies {\n        classpath 'org.javafxports:jfxmobile-plugin:1.0.0-b8'\n\
    \    }\n}\n\napply plugin: 'org.javafxports.jfxmobile'\n\nrepositories {\n   \
    \ jcenter()\n}\n\nmainClassName = 'packt.taman.jfx8.ch4.DialPad2'\n\njfxmobile\
    \ {\n\n    android {\n        manifest = 'lib/android/AndroidManifest.xml'\n \
    \   }\n}\n```\n\n唯一需要更改的重要事项是将 `jfxmobile-plugin` 版本更新为 1.0.0-b8（或最新版本；请经常查看 [`bitbucket.org/javafxports/javafxmobile-plugin/overview`](https://bitbucket.org/javafxports/javafxmobile-plugin/overview)\
    \ 以保持更新）。\n\n## 应用程序\n\n既然你已经读到了这一部分，说明我们已经正确完成了应用程序项目结构的搭建，现在它已准备好用于移动设备开发。\n\
    \n我们的应用程序将是一个新的智能手机拨号盘界面，用于通过设备的默认拨号器进行通话。它将使用 CSS 进行定制，以控制其外观样式，并且可以修改以获得不同平台的原生外观和感觉。\n\
    \n该应用程序的主要目的是提供一个全新的 UI 概念（使用 CSS 定制应用程序），你将学习如何使用 CSS 的 id 和类选择器，以及如何从代码内部设置它们以应用于不同的控件。\n\
    \n以下截图显示了应用 CSS 文件前后的应用程序界面：\n\n![应用程序](img/B03998_04_03.jpg)\n"
- fmt: "### Developing and styling an application UI with CSS\n\nAs we have learned\
    \ before, I will start prototyping our application; after the prototyping, we\
    \ should have the application UI we saw earlier.\n\nThis application UI is written\
    \ directly inside the `start(Stage)` function of the class `DialPad2.java`, as\
    \ an alternative way to develop UIs rather than using static FXML design.\n\n\
    Here, we nested controls from inside the code in case we need to dynamically generate\
    \ UI controls and assign them different settings, `CSS` classes, `ids` selectors,\
    \ and `listeners`.\n\nThe following code snippet shows how we produced the preceding\
    \ application UI:\n\n```\nBorderPane root = new BorderPane();\nRectangle2D bounds\
    \ = Screen.getPrimary().getVisualBounds();\nScene scene = new Scene(root, bounds.getWidth(),\
    \ bounds.getHeight());\nscene.getStylesheets().add(getClass().getResource(\"ui/Mobile_UI.\"\
    +PlatformFactory.getName()+\".css\").toExternalForm());\nTextField output = new\
    \ TextField(\"\");\noutput.setDisable(true);\n\nroot.setTop(output);\nString[]\
    \ keys = {\"1\", \"2\", \"3\",\n                 \"4\", \"5\", \"6\",\n      \
    \           \"7\", \"8\", \"9\",\n                 \"*\", \"0\", \"#\"};\n\nGridPane\
    \ numPad = new GridPane();\nnumPad.setAlignment(Pos.CENTER);\nnumPad.getStyleClass().add(\"\
    num-pad\");\nfor (int i = 0; i < keys.length; i++) {\n       Button button = new\
    \ Button(keys[i]);\n       button.getStyleClass().add(\"dial-num-btn\");\n   \
    \    button.setOnAction(e -> output.setText(output.getText().concat(Button.class.\n\
    \      cast(e.getSource()).getText())));\n      numPad.add(button, i % 3, (int)\
    \ Math.ceil(i / 3));\n}\n// Call button\nButton call = new Button(\"Call\");\n\
    call.setOnAction(e->PlatformFactory.getPlatform().callNumber(output.getText()));\n\
    call.setId(\"call-btn\");\ncall.setMaxSize(Double.MAX_VALUE, Double.MAX_VALUE);\n\
    numPad.add(call, 0, 4);\nGridPane.setColumnSpan(call, 3);\nGridPane.setHgrow(call,\
    \ Priority.ALWAYS);\nroot.setCenter(numPad);\n\n//Stage setup\nstage.setScene(scene);\n\
    stage.setTitle(\"Phone Dial v2.0\");\nstage.show();\n```\n\nThe code starts by\
    \ creating a scene that has `BorderPane` as a root node. After the scene is created,\
    \ the code loads the CSS style sheet file, `Mobile_UI.<platform>.css`, to style\
    \ the current scene's nodes via the `getStylesheets().add()` method as follows:\n\
    \n```\nscene.getStylesheets().add(getClass().getResource(\"ui/Mobile_UI.\"+PlatformFactory.getName()+\"\
    .css\").toExternalForm());\n```\n\nAfter we have created a `TextField` output\
    \ to show the dial result and set it to be disabled so we can't edit it, the numbers\
    \ are added and displayed just by clicking on the buttons.\n\nNext, the code simply\
    \ creates a grid using the `GridPane` class and generates 12 buttons to be placed\
    \ in each cell. Notice in the for loop that each button is set with the style\
    \ class named `dial-num-btn` via the `getStyleClass().add()` method.\n\n### Note\n\
    \nWe use here an old classic `for` loop for adding the buttons, and not a fancy\
    \ Java 8 stream. Be aware that `Dalvik VM` runs only on Java 7, and only lambdas\
    \ can be used (since, internally, JavaFXPorts uses the Retrolambda project).\n\
    \nLastly, the dark blue **Call** button will be added to the last row of the grid\
    \ pane. Because the **Call** button is unique, its id selector is set with `#call-btn`,\
    \ and it will be styled using the id selector, which means the selector named\
    \ inside the CSS file will be prefixed with the `#` symbol.\n\nThe following is\
    \ the CSS file used to style the application:\n\n```\n.root {\n    -fx-background-color:\
    \ white;\n    -fx-font-size: 20px;\n    bright-green: rgb(59,223, 86);\n    bluish-gray:\
    \ rgb(189,218,230);\n}\n.num-pad {\n    -fx-padding: 15px, 15px, 15px, 15px;\n\
    \    -fx-hgap: 10px;\n    -fx-vgap: 8px;\n}\n\n#call-btn {\n    -fx-background-color:\
    \ \n        #090a0c,\n        linear-gradient(#38424b 0%, #1f2429 20%, #191d22\
    \ 100%),\n        linear-gradient(#20262b, #191d22),\n        radial-gradient(center\
    \ 50% 0%, radius 100%, rgba(114,131,148,0.9), rgba(255,255,255,0));\n    -fx-background-radius:\
    \ 5,4,3,5;\n    -fx-background-insets: 0,1,2,0;\n    -fx-text-fill: white;\n \
    \   -fx-effect: dropshadow( three-pass-box , rgba(0,0,0,0.6) , 5, 0.0 , 0 , 1\
    \ );\n    -fx-font-family: \"Arial\";\n    -fx-text-fill: linear-gradient(white,\
    \ #d0d0d0);\n    -fx-font-size: 16px;\n    -fx-padding: 10 20 10 20;\n}\n#call-btn\
    \ .text {\n    -fx-effect: dropshadow( one-pass-box , rgba(0,0,0,0.9) , 1, 0.0\
    \ , 0 , 1 );\n}\n\n.dial-num-btn {\n    -fx-background-color:\n        linear-gradient(#f0ff35,\
    \ #a9ff00),\n        radial-gradient(center 50% -40%, radius 200%, #b8ee36 45%,\
    \ #80c800 50%);\n    -fx-background-radius: 30;\n    -fx-background-insets: 0,1,1;\n\
    \    -fx-effect: dropshadow( three-pass-box , rgba(0,0,0,0.4) , 5, 0.0 , 0 , 1\
    \ );\n    -fx-text-fill: #395306;\n}\n\n.dial-num-btn:hover {\n    -fx-background-color:\
    \ \n        #c3c4c4,\n        linear-gradient(#d6d6d6 50%, white 100%),\n    \
    \    radial-gradient(center 50% -40%, radius 200%, #e6e6e6 45%, rgba(230,230,230,0)\
    \ 50%);\n    -fx-background-radius: 30;\n    -fx-background-insets: 0,1,1;\n \
    \   -fx-text-fill: black;\n    -fx-effect: dropshadow( three-pass-box , rgba(0,0,0,0.6)\
    \ , 3, 0.0 , 0 , 1 );\n}\n\n.dial-num-btn:pressed {\n    -fx-background-color:\
    \ linear-gradient(#ff5400, #be1d00);\n    -fx-background-radius: 30;\n    -fx-background-insets:\
    \ 0,1,1;\n    -fx-text-fill: white;\n}\n```\n\nFor more information about JavaFX\
    \ 8 CSS properties, visit the following JavaFX 8 CSS reference:\n\n[http://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html](http://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html)\n\
    \n### Adding some logic\n\nAs you have seen in the code snippet, each of the 12\
    \ buttons has an action assigned using a lambda expression that is dynamically\
    \ created as follows:\n\n```\nbutton.setOnAction(e -> output.setText(output.getText().concat(Button.class.cast(e.getSource()).getText())));\n\
    ```\n\nWe get the output `TextField` and concatenate the next number, asterisk,\
    \ or hash symbol by getting the source of the event `e`, which in our case is\
    \ the clicked button, and then its text value, containing the number to dial."
