  trans: "\n#### 应用逻辑与图表 API\n\n我们应用的主要组件是 `LineChart<Number, Number>` 图表类 API，它将用于绘制你的血液温度水平（Y\
    \ 轴）随时间（X 轴）变化的曲线。\n\n自 JavaFX 2 以来，双轴图表（如折线图、柱状图和面积图）就已可用，它们属于 `Node` 类，这使得它们可以像其他节点一样轻松添加到\
    \ `Scene` 中。\n\n在我们的应用中，我们将添加以下 `createBloodChart()` 方法，该方法负责创建和准备图表，并将其返回以添加到主应用场景中。\n\
    \n在应用开始时，我们有一些实例变量：一个用于处理 Arduino 连接和读取数据的 `Serial` 对象；一个注册到 `Serial` 线路对象的 `listener`；一个用于跟踪连接状态的\
    \ `BooleanProperty`；以及三个分别跟踪所有传感器数据实际值、电压转换值以及最终将电压转换为摄氏温度的浮点属性。代码如下：\n\n```\n\
    private final Serial serial = new Serial();\nprivate ChangeListener<String> listener;\n\
    private final BooleanProperty connection = new SimpleBooleanProperty(false);\n\
    private final FloatProperty bloodTemp = new SimpleFloatProperty(0);\nprivate final\
    \ FloatProperty volts = new SimpleFloatProperty(0);\nprivate final FloatProperty\
    \ sensorVal = new SimpleFloatProperty(0);\n```\n\n我们将添加 `LineChart` 来绘制来自温度传感器的温度水平，其中包含一个\
    \ `Series`，它接收成对的数字以对应每个轴进行绘制；这些数字是 `NumberAxis` 实例。`XYChart.Data` 作为每个点的 *X*\
    \ 和 *Y* 值对添加到系列数据中，以绘制读数。\n\n每当 `Series` 的大小超过 40 个点时，为了内存效率，将移除第一个值。代码如下：\n\n\
    ```\nprivate LineChart<Number, Number> createBloodChart() {\n  final NumberAxis\
    \ xAxis = new NumberAxis();\n  xAxis.setLabel(\"温度时间\");\n  xAxis.setAutoRanging(true);\n\
    \  xAxis.setForceZeroInRange(false);\n  xAxis.setTickLabelFormatter(new StringConverter<Number>()\
    \ {\n    @Override\n    public String toString(Number t) {\n      return new SimpleDateFormat(\"\
    HH:mm:ss\").format(new Date(t.longValue()));\n    }\n    @Override\n    public\
    \ Number fromString(String string) {\n      throw new UnsupportedOperationException(\"\
    Not supported yet.\");\n    }\n  });\n  final NumberAxis yAxis = new NumberAxis(\"\
    温度值\", baselineTemp - 10, 40.0, 10);\n  final LineChart<Number, Number> bc = new\
    \ LineChart<>(xAxis, yAxis);\n  bc.setTitle(\"血液温度 vs 时间\");\n  bc.setLegendVisible(false);\n\
    \n  Series series = new Series();\n  series.getData().add(new Data(currentTimeMillis(),\
    \ baselineTemp));\n  bc.getData().add(series);\n\n  listener = (ov, t, t1) ->\
    \ {\n    runLater(() -> {\n      String[] values = t1.split(\",\");\n      if\
    \ (values.length == 3) {\n        sensorVal.set(parseFloat(values[0].split(\"\
    :\")[1].trim()));\n        volts.set(parseFloat(values[1].split(\":\")[1].trim()));\n\
    \        bloodTemp.set(parseFloat(values[2].split(\":\")[1].trim()));\n      \
    \  series.getData().add(new Data(currentTimeMillis(),\n        bloodTemp.getValue()));\n\
    \n        if (series.getData().size() > 40) {\n          series.getData().remove(0);\n\
    \        }\n      }\n\n    });\n  };\n  serial.getLine().addListener(listener);\n\
    \n  return bc;\n}\n```\n\n这里最有趣的部分是我们使用 lambda 表达式创建的更改监听器 `listener = (ov, t,\
    \ t1) -> {}`，它将被注册到我们之前描述的 `Serial` 类的 `line` 对象上。通过这样做，一旦检测到来自 Arduino 的任何输入，我们就能够更改图表数据。\n\
    \n为此，我们将 *x* 坐标值设置为添加读数时的时间（以毫秒为单位）（在图表上，它将格式化为 *HH:MM:SS*），而 *y* 坐标值则是 Arduino\
    \ 在字符串 `t1` 中报告的温度水平的浮点测量值。\n\n### 注意\n\n`Platform.runLater()` 的主要用途是将使用传入的 Arduino\
    \ 输入填充系列数据的任务放入 JavaFX 线程中，但它也为 `Scene` 图形渲染图表提供了所需的时间，如果值添加得太快，则会跳过这些值。\n\n我添加了四个\
    \ `Circle` 形状，它们将用于根据温度水平模拟电路 LED 的亮灭，一旦通过更改监听器对 `FloatProperty` `bloodTemp` 进行了任何更改。代码如下：\n\
    \n```\nCircle IndicatorLevel1 = new Circle(26.0, Color.BLACK);\nbloodTemp.addListener((ol,\
    \ ov, nv) -> {\n  tempLbl.setText(\"摄氏度: \".concat(nv.toString()));\n\n  // 如果当前温度低于基线，则关闭所有\
    \ LED\n  if (nv.floatValue() < baselineTemp +2) {\n    IndictorLevel1.setFill(Paint.valueOf(\"\
    Black\"));\n    IndictorLevel2.setFill(Paint.valueOf(\"Black\"));\n    IndictorLevel3.setFill(Paint.valueOf(\"\
    Black\"));\n  } // 如果温度升高 1-3 度，则打开一个 LED\n  else if (nv.floatValue() >= baselineTemp\
    \ + 1 && nv.floatValue()< baselineTemp + 3) {\n      IndictorLevel1.setFill(Paint.valueOf(\"\
    RED\"));\n      IndictorLevel2.setFill(Paint.valueOf(\"Black\"));\n      IndictorLevel3.setFill(Paint.valueOf(\"\
    Black\"));\n    } // 如果温度升高 3-5 度，则打开第二个 LED\n    else if (nv.floatValue() >=\
    \ baselineTemp + 4 && nv.floatValue() < baselineTemp + 6) {\n      IndictorLevel1.setFill(Paint.valueOf(\"\
    RED\"));\n      IndictorLevel2.setFill(Paint.valueOf(\"RED\"));\n      IndictorLevel3.setFill(Paint.valueOf(\"\
    Black\"));\n    }//如果温度升高超过 6 度，则打开所有 LED\n    else if (nv.floatValue() >= baselineTemp\
    \ + 6 {\n    IndictorLevel1.setFill(Paint.valueOf(\"RED\"));\n    IndictorLevel2.setFill(Paint.valueOf(\"\
    RED\"));\n    IndictorLevel3.setFill(Paint.valueOf(\"RED\"));\n  }\n});\n```\n\
    \n最后，主 UI 由 `loadMainUI()` 方法创建，该方法负责创建整个 UI 并将所有必需的变量绑定到 UI 控件，以便动态地与来自 Arduino\
    \ 输入的事件进行交互。\n\n一旦场景根节点（`BorderPane`）对象由 `loadMainUI()` 准备和设置好，我们就创建场景并将其添加到舞台中，以便按如下方式运行我们的应用：\n\
    \n```\nScene scene = new Scene(loadMainUI(), 660, 510);\nstage.setTitle(\"血液测量仪\
    \ v1.0\");\nstage.setScene(scene);\nstage.show();\n//连接到 Arduino 端口并开始监听\nconnectArduino();\n\
    ```\n\n最后，从 `Application` 类继承的重写的 `stop()` 方法将通过关闭 `Serial` 端口连接并从线路对象中移除 `listener`\
    \ 来处理任何资源释放。代码如下：\n\n```\n@Override\npublic void stop() {\n  System.out.println(\"\
    串口正在关闭...\");\n  serial.getLine().removeListener(listener);\n  if (connection.get())\
    \ {\n  serial.disconnect();\n  connection.set(false);\n}}\n```\n\n#### 运行应用\n\n\
    一切就绪后——包含前面描述的类和已添加的 `jSSC.jar` 库的 JavaFX 项目——在 Arduino 板连接到你的笔记本电脑/PC 时编译并运行你的应用。如果一切正常，你将看到以下截图，其中显示了图表上随时间变化的温度值，这些值将基于你的室温。\n\
    \n恭喜，你现在正在监控 Arduino 输入，并且可以通过 `jSSC.jar` 库与 Arduino 交互以控制它。\n\n![运行应用](img/B03998_07_10.jpg)\n\
    \n初始血液测量仪应用读数，温度为 24.71 度\n\n尝试用手指握住传感器并监控图表上的读数。在我的案例中，它达到了 30.57 度。同时，观察工具栏上的指示灯级别和板上的\
    \ LED。你应该会看到类似于以下截图的内容：\n\n![运行应用](img/B03998_07_11.jpg)\n\n血液测量仪应用读数，温度为 30.57\
    \ 度\n"
- fmt: '# Summary


    In this chapter, you learned what can be achieved by combining Arduino and JavaFX.
    You began by learning about Arduino, its different boards, main specifications,
    where to buy it and its components. Then, we discussed more sites for projects
    inspirations.


    Next you saw how to download and set up the Arduino IDE to communicate with Arduino.
    After learning about loading examples in the IDE, you got the chance to try it
    for yourself by building a simple circuit with an Arduino Uno and a temperature
    sensor to create a sketch and read the temperature levels in the IDE Serial Monitor.


    Then you learned how to read serial port data from your computer using the Java
    Simple Serial Connector library.


    You learned how to use the JavaFX Line Chart API to monitor and display the Arduino
    readings. Then, you saw an example in which a JavaFX chart is plotted with a series
    of data from the serial port, using an Arduino board to measure the level of blood
    temperature with a temperature sensor.


    In the next chapter, you will learn about touchless interaction with your computer—without
    any input devices such as a keyboard, mouse, or even touch devices—using only
    your hand gestures to control your JavaFX application.


    # Chapter 8. Interactive Leap Motion Apps with JavaFX


    Now we have come to the most exciting part of the book, where we will dive into
    the new touchless era of computer-human interaction through body language translated
    into commands to control surrounding objects and computers.


    Every day we notice the rise of input interfaces that are less mouse-centric and
    more in favor of touchless input. Gestures are one of the ways humans can communicate
    with machines naturally these days.


    For decades, motion controls have held a persistent place in our visions of the
    future. We''ve watched the super heroes, mad scientists, and space cowboys of
    popular media control digital experiences with just a wave of their hands.


    ![Interactive Leap Motion Apps with JavaFX](graphics/B03998_08_1.jpg)


    Tom Cruise does his computing by gesturing


    We''ve been captivated by these powerful, natural, and intuitive interactions—imagining
    what it would be like to have that power at our own fingertips. For example, Star
    Trek''s Holodeck and Minority Report''s pre-crime visioning computers. Do you
    remember how Tom Cruise does his computing in the latter using gestures on a transparent
    display? All exude a sense of power and mastery, along with paradoxical perceptions
    of simplicity, ease, intuitiveness, and humanity. Simply, these experiences feel
    magical.


    There are several devices on the market that actually allow us to interact with
    computers using just some parts of our body: many games for the Xbox, the Microsoft
    game console, use the Kinect controller to recognize the user''s body movements.
    The myoelectric armband detects movements in your muscles and translates them
    into gestures so that you can interact with your computer. Leap Motion controller
    recognizes users'' hands and fingers and translate the movements and gestures
    to the computer.


    In this chapter, you will learn about gesture recognition using the Leap Motion
    device, an awesome device that allows a touchless approach to developing enhanced
    JavaFX applications.


    Here are some of the topics that we will discuss in this chapter:


    * Introducing the Leap controller, how it works, and where to get one

    * Getting and installing the SDK, configuring its driver, and verifying whether
    it works

    * Basics of Leap-based application building blocks

    * Developing amazing touchless JavaFX applications


    # The Leap Motion controller


    Here is a very tiny device with 13 mm height, 30 mm width, 76 mm depth, and a
    weight of 45 grams (*final dimensions: 0.5" x 1.2" x 3"*). With the Leap Motion
    software running on your computer, just plug the controller into the USB on your
    Mac or PC and you are ready to go (without any external power source).


    Here it works with what it finds above it, capturing the individual movements
    of your hands and fingers in almost real time (200-300 fps) and translating the
    gestures into different actions on the application running on your computer. Launched
    in 2013, this $79.99 device is called the Leap Motion controller.


    ![The Leap Motion controller](graphics/B03998_08_2.jpg)


    Leap Motion size compared to human hand


    From the developer''s point of view, this device allows designing applications
    that can be controlled simply by gestures and movements of the user''s hands and
    fingers, just like in Minority Report!


    It senses how you naturally move your hands and lets you use your computer in
    a whole new way—point, wave, reach, grab, or pick something up and move it. You
    can do things you never dreamed possible.


    Check your hand; just one hand has 29 bones, 29 joints, 123 ligaments, 48 nerves,
    and 30 arteries. That''s sophisticated and complicated. The controller has come
    really close to figuring it all out.


    Actually, when you think about it, the magic of Leap Motion comes in the software,
    but the company works hard on the hardware to deliver their technology. It has
    been in development since they started in 2011. The evolution is shown in the
    following figure:


    ![The Leap Motion controller](graphics/B03998_08_3.jpg)


    The evolution of the Leap Motion controller


    ## How it works


    Leap Motion''s technology, which relies on special receiver hardware and custom
    software, can track movements to 1/100th millimeter with no visible lag time.
    The Leap Motion controller has a 150-degree field of view, and it tracks individual
    hands and all 10 fingers at 290 fps.


    The main hardware of the device consists of three infrared LEDs combined with
    two monochromatic infrared (IR) cameras. While the LEDs generate a 3D pattern
    of dots of IR light, the cameras scan the reflected data at nearly 290 fps. Everything
    within a radius of 50 cm will be scanned and processed, with a resolution of 0.01
    mm. The main components of the device are shown in the following figure:


    ![How it works](graphics/B03998_08_4.jpg)


    Leap Motion Controller Hardware layers and internal components


    This is the future of computer interaction Leap Motion''s incredibly fast and
    accurate natural user interface, which sends all movement data to the computer
    in a very precise way. The data will be analyzed in the host computer by the Leap
    Motion proprietary software detection algorithm, and any Leap-enabled application
    can be interfaced directly without using any other physical input device.


    ### The coordinate system


    Mapping the coordinate values received from the controller to the appropriate
    JavaFX coordinate system is a fundamental task when using the Leap Motion controller
    in your application.


    From the previous discussion, you can observe that the device can detect hands,
    fingers, and reflective tools within a super-wide 150-degree field of view and
    a z-axis for depth. This means you can move your hands in 3D, just like you do
    in the real world.


    The device coordinate system uses a right-handed Cartesian coordinate system,
    with the origin at the center of the device. This is shown in the following figure:


    ![The coordinate system](graphics/B03998_08_6.jpg)


    Coordinate system centered in the device


    Every time the device scans and analyzes your hand movement into data, a `Frame`
    object containing a list of all the processed and tracked data in terms of instances
    (hands, fingers, and tools) is generated, including a set of motion gestures found
    in the frame (*swipe, tap, or circle*).


    As you may have noticed, the y-axis positive direction is the opposite of the
    downward orientation in most computer graphics systems, including JavaFX.


    However, the fact that the data is referred to the device position and not to
    the screen, as we are accustomed to with mouse and touch events, changes dramatically
    the way we need to think.


    Fortunately, the API provides several useful methods to find where our hands and
    fingers are pointing at any time.'
