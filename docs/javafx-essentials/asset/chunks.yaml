  trans: "\n### 使用 CSS 开发和设计应用程序 UI\n\n正如我们之前所学，我将开始制作应用程序的原型；原型制作完成后，我们应该能看到之前见过的应用程序\
    \ UI。\n\n这个应用程序 UI 是直接写在 `DialPad2.java` 类的 `start(Stage)` 函数中的，这是一种不使用静态 FXML\
    \ 设计来开发 UI 的替代方法。\n\n在这里，我们从代码内部嵌套控件，以便在需要动态生成 UI 控件并为其分配不同的设置、`CSS` 类、`id` 选择器和`监听器`时使用。\n\
    \n以下代码片段展示了我们如何生成上述应用程序 UI：\n\n```\nBorderPane root = new BorderPane();\nRectangle2D\
    \ bounds = Screen.getPrimary().getVisualBounds();\nScene scene = new Scene(root,\
    \ bounds.getWidth(), bounds.getHeight());\nscene.getStylesheets().add(getClass().getResource(\"\
    ui/Mobile_UI.\"+PlatformFactory.getName()+\".css\").toExternalForm());\nTextField\
    \ output = new TextField(\"\");\noutput.setDisable(true);\n\nroot.setTop(output);\n\
    String[] keys = {\"1\", \"2\", \"3\",\n                 \"4\", \"5\", \"6\",\n\
    \                 \"7\", \"8\", \"9\",\n                 \"*\", \"0\", \"#\"};\n\
    \nGridPane numPad = new GridPane();\nnumPad.setAlignment(Pos.CENTER);\nnumPad.getStyleClass().add(\"\
    num-pad\");\nfor (int i = 0; i < keys.length; i++) {\n       Button button = new\
    \ Button(keys[i]);\n       button.getStyleClass().add(\"dial-num-btn\");\n   \
    \    button.setOnAction(e -> output.setText(output.getText().concat(Button.class.\n\
    \      cast(e.getSource()).getText())));\n      numPad.add(button, i % 3, (int)\
    \ Math.ceil(i / 3));\n}\n// 呼叫按钮\nButton call = new Button(\"Call\");\ncall.setOnAction(e->PlatformFactory.getPlatform().callNumber(output.getText()));\n\
    call.setId(\"call-btn\");\ncall.setMaxSize(Double.MAX_VALUE, Double.MAX_VALUE);\n\
    numPad.add(call, 0, 4);\nGridPane.setColumnSpan(call, 3);\nGridPane.setHgrow(call,\
    \ Priority.ALWAYS);\nroot.setCenter(numPad);\n\n// 舞台设置\nstage.setScene(scene);\n\
    stage.setTitle(\"Phone Dial v2.0\");\nstage.show();\n```\n\n代码首先创建一个以 `BorderPane`\
    \ 为根节点的场景。创建场景后，代码通过 `getStylesheets().add()` 方法加载 CSS 样式表文件 `Mobile_UI.<platform>.css`，以设置当前场景节点的样式，如下所示：\n\
    \n```\nscene.getStylesheets().add(getClass().getResource(\"ui/Mobile_UI.\"+PlatformFactory.getName()+\"\
    .css\").toExternalForm());\n```\n\n在我们创建了一个 `TextField` 输出来显示拨号结果，并将其设置为禁用状态（这样我们就无法编辑它）之后，只需点击按钮即可添加并显示数字。\n\
    \n接下来，代码简单地使用 `GridPane` 类创建了一个网格，并生成了 12 个按钮放置在每个单元格中。注意在 for 循环中，每个按钮都通过 `getStyleClass().add()`\
    \ 方法设置了名为 `dial-num-btn` 的样式类。\n\n### 注意\n\n我们在这里使用了一个经典的旧式 `for` 循环来添加按钮，而不是花哨的\
    \ Java 8 流。请注意，`Dalvik VM` 仅在 Java 7 上运行，并且只能使用 lambda 表达式（因为 JavaFXPorts 内部使用了\
    \ Retrolambda 项目）。\n\n最后，深蓝色的**呼叫**按钮将被添加到网格面板的最后一行。由于**呼叫**按钮是唯一的，其 id 选择器被设置为\
    \ `#call-btn`，并且它将使用 id 选择器进行样式设置，这意味着 CSS 文件中命名的选择器将以 `#` 符号为前缀。\n\n以下是用于设置应用程序样式的\
    \ CSS 文件：\n\n```\n.root {\n    -fx-background-color: white;\n    -fx-font-size:\
    \ 20px;\n    bright-green: rgb(59,223, 86);\n    bluish-gray: rgb(189,218,230);\n\
    }\n.num-pad {\n    -fx-padding: 15px, 15px, 15px, 15px;\n    -fx-hgap: 10px;\n\
    \    -fx-vgap: 8px;\n}\n\n#call-btn {\n    -fx-background-color: \n        #090a0c,\n\
    \        linear-gradient(#38424b 0%, #1f2429 20%, #191d22 100%),\n        linear-gradient(#20262b,\
    \ #191d22),\n        radial-gradient(center 50% 0%, radius 100%, rgba(114,131,148,0.9),\
    \ rgba(255,255,255,0));\n    -fx-background-radius: 5,4,3,5;\n    -fx-background-insets:\
    \ 0,1,2,0;\n    -fx-text-fill: white;\n    -fx-effect: dropshadow( three-pass-box\
    \ , rgba(0,0,0,0.6) , 5, 0.0 , 0 , 1 );\n    -fx-font-family: \"Arial\";\n   \
    \ -fx-text-fill: linear-gradient(white, #d0d0d0);\n    -fx-font-size: 16px;\n\
    \    -fx-padding: 10 20 10 20;\n}\n#call-btn .text {\n    -fx-effect: dropshadow(\
    \ one-pass-box , rgba(0,0,0,0.9) , 1, 0.0 , 0 , 1 );\n}\n\n.dial-num-btn {\n \
    \   -fx-background-color:\n        linear-gradient(#f0ff35, #a9ff00),\n      \
    \  radial-gradient(center 50% -40%, radius 200%, #b8ee36 45%, #80c800 50%);\n\
    \    -fx-background-radius: 30;\n    -fx-background-insets: 0,1,1;\n    -fx-effect:\
    \ dropshadow( three-pass-box , rgba(0,0,0,0.4) , 5, 0.0 , 0 , 1 );\n    -fx-text-fill:\
    \ #395306;\n}\n\n.dial-num-btn:hover {\n    -fx-background-color: \n        #c3c4c4,\n\
    \        linear-gradient(#d6d6d6 50%, white 100%),\n        radial-gradient(center\
    \ 50% -40%, radius 200%, #e6e6e6 45%, rgba(230,230,230,0) 50%);\n    -fx-background-radius:\
    \ 30;\n    -fx-background-insets: 0,1,1;\n    -fx-text-fill: black;\n    -fx-effect:\
    \ dropshadow( three-pass-box , rgba(0,0,0,0.6) , 3, 0.0 , 0 , 1 );\n}\n\n.dial-num-btn:pressed\
    \ {\n    -fx-background-color: linear-gradient(#ff5400, #be1d00);\n    -fx-background-radius:\
    \ 30;\n    -fx-background-insets: 0,1,1;\n    -fx-text-fill: white;\n}\n```\n\n\
    有关 JavaFX 8 CSS 属性的更多信息，请访问以下 JavaFX 8 CSS 参考文档：\n\n[`docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html`](http://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html)\n\
    \n### 添加一些逻辑\n\n正如你在代码片段中所见，12 个按钮中的每一个都使用动态创建的 lambda 表达式分配了一个动作，如下所示：\n\n```\n\
    button.setOnAction(e -> output.setText(output.getText().concat(Button.class.cast(e.getSource()).getText())));\n\
    ```\n\n我们获取输出 `TextField`，并通过获取事件 `e` 的源（在我们的例子中是点击的按钮），然后获取其文本值（包含要拨打的号码），来拼接下一个数字、星号或井号。\n"
- fmt: "### Making your project ready for mobile devices\n\nBasically, this new project\
    \ was generated with the Gluon plugin (`build.gradle` updated to **b8**).\n\n\
    In order to make the application ready for mobile devices, we need to adjust its\
    \ height and width to the target device screen and make the UI tree respond to\
    \ that accordingly.\n\nThis is a very simple yet important step and we can adjust\
    \ the following line of code by setting the scene height and width to the target\
    \ device screen dimensions dynamically. Have a look at the following line:\n\n\
    ```\nScene scene = new Scene(root, 175, 300);\n```\n\nChange this to the following\
    \ lines of code:\n\n```\nRectangle2D bounds = Screen.getPrimary().getVisualBounds();\n\
    Scene scene = new Scene(root, bounds.getWidth(), bounds.getHeight());\n```\n\n\
    The first line gets the device screen `bounds`. Then we set the scene height and\
    \ width from this bounds variable.\n\nThe second line adds your sources to the\
    \ Sources Packages [Java] and Resources [Main]. It then adds a `PlatformFactory`\
    \ class, which is in charge of finding which platform the project is running from.\
    \ Have a look at the `Platform` interface with a method signature:\n\n```\npublic\
    \ interface Platform {   \n    void callNumber(String number);\n}\n```\n\nThis\
    \ allows you to call the following method on your source:\n\n```\nButton call\
    \ = new Button(\"Call\");\ncall.setOnAction(e-> PlatformFactory.getPlatform().callNumber(output.getText()));\n\
    ```\n\nFinally, you provide the native solution for each platform. For instance,\
    \ for Android:\n\n```\npublic class AndroidPlatform implements Platform {\n\n\
    \    @Override\n    public void callNumber(String number) {\n        if (!number.equals(\"\
    \")) {\n            Uri uriNumber = Uri.parse(\"tel:\" + number);\n          \
    \  Intent dial = new Intent(Intent.ACTION_CALL, uriNumber);\n            FXActivity.getInstance().startActivity(dial);\n\
    \         }\n    }\n}\n```\n\nFor this to work on Android, we only need to modify\
    \ `AndroidManifest.xml`, adding the required permission and the activity intent.\
    \ This custom manifest has to be referenced on the `build.gradle` file as follows:\n\
    \n```\nandroid {\n    manifest = 'lib/android/AndroidManifest.xml'\n  }\n```\n\
    \n#### Interoperability with low-level Android APIs\n\nYou need `android.jar`\
    \ in order to use the Android API's, and you need `jfxdvk.jar` in order to access\
    \ the `FXActivity` class, which is the bridge between `JavaFX` and the `Dalvik`\
    \ runtime. We use a static method on the `FXActivity` to retrieve the `FXActivity`,\
    \ which extends the Android `Context`. This `Context` can be used to look up Android\
    \ services.\n\n## Building the application\n\nIn order to create our Android `.apk`\
    \ package file for our application, we need to build our application first; it\
    \ is a very easy task. With the command line (or from NetBeans, right-click on\
    \ the **project** tab and select `Tasks/task`) pointing to the current project\
    \ folder, run the following command:\n\n```\n$ gradle build\n```\n\nGradle will\
    \ download all the required libraries and start building our application. Once\
    \ finished, you should see the successful output as follows:\n\n```\n$ gradle\
    \ build\nDownload https://jcenter.bintray.com/org/robovm/robovm-rt/1.0.0-beta-04/robovm-rt-1.0.0-beta-08.pom\n\
    :compileJava\n:compileRetrolambdaMain\nDownload https://jcenter.bintray.com/net/orfjackal/retrolambda/retrolambda/1.8.0/retrolambda-1.8.0.pom\n\
    :processResources UP-TO-DATE\n:classes\n:compileDesktopJava UP-TO-DATE\n:compileRetrolambdaDesktop\
    \ SKIPPED\n……...…\n:check UP-TO-DATE\n:build\n\nBUILD SUCCESSFUL\nTotal time:\
    \ 44.74 secs\n```\n\nUntil now, we have built our application successfully. Next\
    \ we need to generate the `.apk` and deploy it to many sources.\n\n### Building\
    \ the final .apk Android package\n\nWe have two options when it comes to building\
    \ our `.apk` file. The first is by running the following command:\n\n```\ngradle\
    \ android \n```\n\nThis will generate the `.apk` file in the directory `build/javafxports/android`.\n\
    \nThe second is by running this command:\n\n```\nandroidInstall \n```\n\nThis\
    \ will deploy the generated `.apk` package onto a device that is connected to\
    \ your desktop or laptop device.\n\nWe will use the first option (`gradle android`)\
    \ to make sure that we are able to generate the `.apk` file successfully. When\
    \ done successfully, you should have a file named `DialPad2.apk` under the path\
    \ mentioned previously.\n\n## Deploying the application\n\nTo be able to deploy\
    \ our application on the connected mobile device using the `gradle androidInstall`\
    \ command, you have to enable **Developer Options** and enable some other settings\
    \ inside it on your device, as follows:\n\n1.  From your device, tap on **Settings**\
    \ to open the setting menu.\n2.  From the top menu, choose **More**. The options\
    \ depend on your device.\n3.  At the end of the **More Options** menu list, you\
    \ should see **Developer Options**.\n4.  Tap on the **Developer Options** menu.\n\
    5.  Enable **Developer Options** by turning on the slider at the top-right corner.\n\
    6.  Under **debugging**, enable **USB debugging**, click on the **OK** button\
    \ in the **Allow USB debugging** alert window, and enable **Unknown sources**.\n\
    7.  Congratulations! You are done—let's go and install our application.\n\n###\
    \ Note\n\n**Optional**: if you don't see **Developer Options**, don't worry. It\
    \ is present but hidden. Here is the magic—tap on **About device**, locate **Build\
    \ number**, and tap on it 5 times (7 times on Lollipop). You will see a countdown\
    \ of numbers, and at the end **Developer Options** will be enabled.\n\n### Deploying\
    \ on Android-based devices\n\nNo as we are ready run the following command:\n\n\
    ```\n$ gradle androidinstall\n```\n\nAfter issuing this command, it will start\
    \ building and packaging the JavaFX 8 application. The plugin will connect to\
    \ your connected device and install the application into it. This is the result\
    \ you should have:\n\n```\n:compileJava\n:compileRetrolambdaMain\n………...…\n:processAndroidResources\
    \ UP-TO-DATE\n:apk\n:zipalign\n:androidInstall\nInstalled on device.\n\nBUILD\
    \ SUCCESSFUL\nTotal time: 47.537 secs\n```\n\nNow open your device and locate\
    \ your applications icon from the home screen; in the bottom-right corner, you\
    \ should see your `DialPad2` JavaFX application installed as seen in the following\
    \ screenshot, with the default Android icon:\n\n![Deploying on Android-based devices](graphics/B03998_04_05.jpg)\n\
    \nThe JavaFX 8 application installed on the Android device\n\nTap the **DialPad2**\
    \ application, and you should see your application up-and-running on your device\
    \ and fully functional as intended:\n\n![Deploying on Android-based devices](graphics/B03998_04_06.jpg)\n\
    \nThe JavaFX 8 application running on Android device\n\nTap the **Call** button\
    \ and the Android default dialer will be launched, dialing the number you have\
    \ typed in, as shown here:\n\n![Deploying on Android-based devices](graphics/B03998_04_07.jpg)\n\
    \nThe JavaFX 8 application dialing a number\n\nIf something doesn't work as expected,\
    \ go to the command line and type in:\n\n```\n$ adb logcat \n```\n\nAnd you will\
    \ have the output from all the applications on your device."
