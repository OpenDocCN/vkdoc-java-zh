    # 关于作者


    **Mohamed Taman**，e-finance 公司的首席架构师和软件开发经理，居住在埃及开罗。他毕业于开罗大学工程学院电气工程专业。他是一位经验丰富的
    Java 开发者，曾从事 Web、移动和物联网领域的开发，涉及金融、银行、旅游、政府和医疗保健等行业。在此之前，他曾在辉瑞、Intercom Enterprise（IBM
    金牌合作伙伴）、Silicon Expert 和 Oracle 工作，使用过多种技术，包括面向用户的 GUI 前端、后端、中间件以及大型系统的集成。


    他热衷于在许多会议上演讲，推广 Java 标准并分享他的全球经验，他是 Java 社区的活跃成员，自 2015 年起成为 Java 冠军。


    此外，Mohamed 还是 Adopts Java EE 8、OpenJDK 和 JavaFX 项目的成员。他曾是 Java 社区流程组织的执行成员，是首位加入其董事会的非洲人。


    他还是 JSR 354、363 和 373 专家组的成员。他也是 EGJUG 和 MoroccoJUG 的领导者，以及 Oracle 埃及架构师俱乐部的董事会成员。他获得了
    2014 年 Duke 选择奖和第 11 届年度 JCP adopt 2013 奖项。


    您可以在 [`about.me/mohamedtaman`](http://about.me/mohamedtaman) 了解更多关于作者的信息。


    # 关于审校者


    **Sergey Grinev** 是一位经验丰富的软件开发和 QA 工程师，专注于为 Java 平台构建可靠的质量流程。他在 Oracle 工作期间开始涉足该领域，负责
    JavaFX 的质量。过去几年，他一直在 Azul Systems 工作，负责其定制 JVM 的质量。


    此外，Sergey 喜欢教学，在各种 Java 会议上演讲，授课，并在 [`stackoverflow.com`](http://stackoverflow.com)
    上回答与 Java 相关的问题。


    他毕业于圣彼得堡国立大学，目前居住在俄罗斯圣彼得堡。


    **José Pereda** 拥有结构工程博士学位，并在西班牙巴利亚多利德大学工业工程学院担任助理教授。他的热情在于应用编程解决实际问题。自 1999 年开始使用
    Java，他现在是 JavaFX 的倡导者，开发商业应用和开源项目（JFXtras、FXyz、[`github.com/jperedadnr`](https://github.com/jperedadnr)），合著了一本
    JavaFX 书籍（*JavaFX 8 Introduction by Example*），撰写博客（[`jperedadnr.blogspot.com.es/`](http://jperedadnr.blogspot.com.es/)），发推文（`@JPeredaDnr`），并在会议（JavaOne、JAX、Jfokus、JavaLand
    等）上发表演讲。José 与妻子和孩子居住在西班牙巴利亚多利德。


