  trans: "\n## 图形系统\n\nJavaFX 图形系统（上图中以紫色显示）支持 2D 和 3D 场景图，使其能够在 JavaFX 场景图层上流畅运行。作为该层之下的实现细节，当系统缺乏足够的图形硬件来支持硬件加速渲染时，它会提供渲染软件栈。\n\
    \nJavaFX 平台拥有两条实现图形加速的管线：\n\n*   **Prism**：这是处理所有渲染作业的引擎。它可以在硬件和软件渲染器上运行，包括 3D\
    \ 渲染。JavaFX 场景的栅格化和渲染均由该引擎负责。根据所使用的设备，可能采用以下多种渲染路径：\n    *   Windows XP 和 Vista\
    \ 上的 DirectX 9，以及 Windows 7 上的 DirectX 11\n    *   Linux、Mac 和嵌入式系统上的 OpenGL\n\
    \    *   当无法进行硬件加速时的软件渲染\n*   **Quantum Toolkit**：负责将 Prism 引擎和 Glass 窗口工具包连接在一起，使其可供堆栈中上层的\
    \ JavaFX 层使用。此外，它还管理与渲染和事件处理相关的任何线程规则。\n\n## Glass 窗口工具包\n\nGlass 窗口工具包（上图中部以红色显示）作为平台相关层，负责将\
    \ JavaFX 平台连接到原生操作系统。\n\n其主要职责是提供原生操作系统服务，例如管理定时器、窗口和表面，因此它在渲染堆栈中的位置是最低的。\n\n\
    ## JavaFX 线程\n\n通常，系统在任何给定时间会运行以下两个或多个线程：\n\n*   **JavaFX 应用程序线程**：这是 JavaFX 应用程序运行所使用的主要线程。\n\
    *   **Prism 渲染线程**：该线程独立于事件分发器处理渲染。它在准备处理下一帧（第 N+1 帧）的同时，渲染当前帧（第 N 帧）。其巨大优势在于能够执行并发处理，尤其是在拥有多个处理器的现代系统上。\n\
    *   **媒体线程**：该线程在后台运行，并通过使用 JavaFX 应用程序线程，经由场景图同步最新的帧。\n*   **脉冲**：它提供了一种异步处理事件的方式。它有助于管理\
    \ JavaFX 场景图元素状态与 Prism 引擎中场景图事件之间的同步。当脉冲被触发时，场景图上元素的状态会同步到渲染层。\n\n### 注意\n\n\
    任何布局节点和 CSS 也都与脉冲事件相关联。\n\n*Glass 窗口工具包*使用高精度原生定时器来执行所有脉冲事件。\n\n## 媒体与图像\n\nJavaFX\
    \ 的 `javafx.scene.media` API 提供了媒体功能。JavaFX 支持视觉和音频媒体。对于音频文件，它支持 `MP3`、`AIFF`\
    \ 和 `WAV` 文件以及 `FLV` 视频文件。\n\n你可以通过 JavaFX 媒体提供的三个主要独立组件来访问媒体功能——`Media` 对象代表一个媒体文件，`MediaPlayer`\
    \ 播放媒体文件，`MediaView` 是一个节点，用于将媒体显示到场景图中。\n\n### 注意\n\n媒体引擎组件（上图中以橙色显示）在设计时充分考虑了稳定性和性能，以在所有支持的平台上提供一致的行为。\n\
    \n## Web 组件\n\nWeb 引擎组件（上图中以绿色显示）是最重要的 JavaFX UI 控件之一，它基于 WebKit 引擎构建，WebKit 是一个开源\
    \ Web 浏览器引擎，支持 HTML5、JavaScript、CSS、DOM 渲染和 SVG 图形。它通过其 API 提供 Web 查看器和完整的浏览功能。我们将在第\
    \ 3 章 *开发 JavaFX 桌面和 Web 应用程序*中深入探讨这一点，届时将开发 Web 应用程序。\n\n它允许你在 Java 应用程序中添加和实现以下功能：\n\
    \n*   渲染来自本地或远程 URL 的任何 HTML 内容\n*   提供前进和后退导航，并支持历史记录\n*   重新加载内容以获取任何更新\n* \
    \  为 Web 组件添加动画并应用 CSS 效果\n*   为 HTML 内容提供丰富的编辑控件\n*   可以执行 JavaScript 命令并处理 Web\
    \ 控件事件\n\n## 布局组件\n\n在构建丰富且复杂的 UI 时，我们需要一种方法来灵活、动态地安排 JavaFX 应用程序中的 UI 控件。这是使用布局容器或窗格的最佳场景。\n\
    \n布局 API 包含以下容器类，它们可以自动化常见的布局 UI 模式：\n\n*   **BorderPane**：将其内容节点布局在顶部、底部、右侧、左侧或中心区域\n\
    *   **HBox**：将其内容节点水平排列成单行\n*   **VBox**：将其内容节点垂直排列成单列\n*   **StackPane**：将其内容节点以从后到前的顺序堆叠在窗格中心\n\
    *   **GridPane**：允许创建灵活的行列网格，用于布局内容节点\n*   **FlowPane**：将其内容节点按水平或垂直方向流动排列，并在达到指定宽度（水平方向）或高度（垂直方向）边界时自动换行\n\
    *   **TilePane**：将其内容节点放置在统一大小的布局单元格或磁贴中\n*   **AnchorPane**：允许创建锚定节点到布局的顶部、底部、左侧或中心，并且我们可以自由定位其子节点\n\
    \n### 提示\n\n不同的容器可以在 JavaFX 应用程序中嵌套使用；为了实现所需的布局结构，我们将在接下来开发自定义 UI 时看到实际应用。\n\n\
    ## JavaFX 控件\n\nJavaFX 控件是 UI 布局的构建块，它们作为一组 JavaFX API 位于 `javafx.scene.control`\
    \ 包中。它们通过使用场景图中的节点构建而成。可以通过 JavaFX CSS 对它们进行主题化和外观定制。它们可跨不同平台*移植*。它们充分利用了 JavaFX\
    \ 平台丰富的视觉特性。\n\n下图展示了一些当前支持的 UI 控件，此外还有更多未在此显示：\n\n![JavaFX 控件](img/B03998_02_03.jpg)\n\
    \nJavaFX UI 控件示例\n\n### 注意\n\n有关所有可用 JavaFX UI 控件的更多详细信息，请参阅官方教程 [`docs.oracle.com/javase/8/javafx/user-interface-tutorial/ui_controls.htm#JFXUI336`](http://docs.oracle.com/javase/8/javafx/user-interface-tutorial/ui_controls.htm#JFXUI336)\
    \ 以及 `javafx.scene.control` 包的 API 文档。\n\n# Java SE 8 特性\n\n我们将浅尝 Java SE 8，以理解两个最重要的特性——lambda\
    \ 或 lambda 表达式以及函数式接口（它们使 lambda 可用），从而帮助我们编写更好、更简洁、样板代码更少的 JavaFX 8 代码。但请记住，本书不会涉及每个\
    \ lambda 细节，因为这不是一本关于 Java SE 8 的书。\n\n### 注意\n\n要更好地了解 Java 的 lambda 路线图，请访问以下官方教程：[`docs.oracle.com/javase/tutorial/java/javaOO/lambdaexpressions.html`](http://docs.oracle.com/javase/tutorial/java/javaOO/lambdaexpressions.html)。\n"
- fmt: "# Lambda expressions\n\nThe primary goal of project `lambda` in the Java language\
    \ is to address the lack of functional programming and provide a way to do functional\
    \ programming easily by creating anonymous (unnamed) functions in a similar manner\
    \ to creating anonymous objects instead of methods in Java.\n\nAs you saw in the\
    \ example from [Chapter 1](#ch01.html \"Chapter 1. Getting Started with JavaFX\
    \ 8\"), *Getting Started with JavaFX 8*, we talked about the usual approach for\
    \ defining a handler for the pressed event on a JavaFX button by using an anonymous\
    \ inner class:\n\n```\nbtn.setOnAction(new EventHandler<ActionEvent>() {\n   @Override\n\
    \   public void handle(ActionEvent event) {\n     message.setText(\"Hello World!\
    \ JavaFX style :)\");\n   }\n});\n```\n\nThis code is very verbose as compared\
    \ to just wiring up a single line of code that sets the `text` attribute of the\
    \ `message` text field in a button action. Wouldn't it be nice to be able to rewrite\
    \ this block of code containing your logic without the need of so much boilerplate\
    \ code?\n\nJava SE 8 solves this with a Lambda expressions as follows:\n\n```\n\
    btn.setOnAction(event -> {\n    message.setText(\"Hello World! JavaFX style :)\"\
    );\n});\n```\n\nBeyond making your code more concise and easy to read, lambda\
    \ expressions make your code perform better as well.\n\n## Syntax\n\nThere are\
    \ two ways to write lambda expressions, and the general form is as shown in the\
    \ following figure:\n\n![Syntax](graphics/B03998_02_04.jpg)\n\nLambda expression\
    \ general form – creating a new thread as an example\n\nThese two ways are as\
    \ follows:\n\n* `(param1, param2, ...) -> expression;`\n* `(param1, param2, ...)\
    \ -> { /* code statements */ };`\n\nThe first form, the expression form, is used\
    \ when we assign only one line of code or just a simple expression. While the\
    \ second one, the block form, is a body of single or multiple lines of code, with\
    \ a return statement, so we need to wrap them with curly braces.\n\nThe following\
    \ three statements are equivalent:\n\n* `btn.setOnAction((ActionEvent event) ->\
    \ {message.setText(\"Hello World!\");});`\n* `btn.setOnAction( (event) -> message.setText(\"\
    Hello World!\"));`\n* `btn.setOnAction(event -> message.setText(\"Hello World!\"\
    ));`\n\n### Tip\n\nTo dive deeper into the new lambda expressions and their related\
    \ features alongside the Java SE 8 features, I encourage you to try this articles\
    \ series – Java SE 8 new features tour: [http://tamanmohamed.blogspot.com/2014/06/java-se-8-new-features-tour-big-change.html](http://tamanmohamed.blogspot.com/2014/06/java-se-8-new-features-tour-big-change.html)\n\
    \n## Functional interfaces\n\nA lambda expression is fantastic, isn't it?, but\
    \ you may be wondering what its exact type is, so it can be assigned to variables\
    \ and passed to methods.\n\nThe answer is in the power of functional interfaces.\
    \ How? Functional interfaces, cleverly created by Java language designers/architects\
    \ as closures, use the concept of **Single Abstract Method** (**SAM**), providing\
    \ an interface with just one abstract method, and the `@FunctionalInterface` annotation.\
    \ The single abstract method pattern is an integral part of Java SE 8's lambda\
    \ expressions.\n\nLet's clear things up with an example to illustrate the concept\
    \ of both functional interfaces and lambda expressions. I have created a functional\
    \ interface called `Calculator.java` containing a single abstract method, `calculate()`.\
    \ Once it is created, you can declare and assign variables to lambda expressions.\
    \ The following is the functional interface:\n\n```\n@FunctionalInterface\npublic\
    \ interface Calculator {\n    double calculate(double width, double height);\n\
    }\n```\n\nNow we are ready to create variables and assign them lambda expressions.\
    \ The following code creates and assigns lambda expressions to our functional\
    \ interface variables:\n\n```\nCalculator area = (width, height) -> width * height;\
    \ //Area = w × h\n//Perimeter = 2(w+h)\nCalculator perimeter = (width, height)\
    \ -> 2 * (height + width);\nout.println(\"Rectangle area: \"+ area.calculate(4,\
    \ 5)+\" cm.\");\nout.println(\"Rectangle perimeter: \"+ perimeter.calculate(4,\
    \ 5)+\" cm.\");\n```\n\nThe output of the code should be as follows:\n\n```\n\
    Rectangle area: 20.0 cm.\nRectangle perimeter: 18.0 cm.\n```\n\n# Theming\n\n\
    When working with designers and UX/UI specialists, you will hear about skinning\
    \ the application or changing its appearance. Both terms are often interchangeable,\
    \ and both of them reflect the basic concept of *theming*.\n\nThe idea of theming\
    \ is to change the entire application style by changing its control appearance\
    \ and without altering its underlying functionality.\n\nIn JavaFX, you have the\
    \ ability to create, modify, or use existing themes to skin your applications,\
    \ scene, or even just a UI control.\n\n## CSS\n\nJavaFX **Cascading Style Sheets**\
    \ (**CSS**) can be applied to any node in the JavaFX scene graph; they are applied\
    \ to the nodes asynchronously. Styles can also be easily assigned to the scene\
    \ at runtime, allowing an application's appearance to change dynamically.\n\n\
    It is based on the W3C CSS version 2.1 specifications, and is currently compatible\
    \ with some additions from the current work on version 3. The JavaFX CSS support\
    \ and extensions have been designed to allow JavaFX CSS style sheets to be parsed\
    \ cleanly by any compliant CSS parser. This enables the mixing of CSS styles for\
    \ JavaFX and for other purposes (such as for HTML pages) into a single style sheet.\n\
    \nAll JavaFX property names are prefixed with an extension of `-fx-`, including\
    \ those that might looks compatible with standard HTML CSS, because some JavaFX\
    \ values have slightly different semantics from standard ones.\n\n### Note\n\n\
    For more about JavaFX CSS, see the Skinning JavaFX Applications with CSS document\
    \ and the reference guide at [http://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html](http://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html)."
  raw: "## Lambda expressions\n\nThe primary goal of project **lambda** in the Java\
    \ language is to address the lack of functional programming and provide a way\
