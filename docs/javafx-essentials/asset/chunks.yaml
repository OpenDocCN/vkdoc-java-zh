- fmt: "# Graphics System\n\nThe JavaFX Graphics System, shown in Purple in the preceding\
    \ figure, supports both 2D and 3D scene graphs to run smoothly on the JavaFX scene\
    \ graph layer. As it is the implementation detail beneath this layer, it provides\
    \ the rendering software stack when running on a system that doesn't have sufficient\
    \ graphics hardware to support hardware-accelerated rendering.\n\nThe JavaFX platform\
    \ has two graphics-accelerated pipelines that implement:\n\n* **Prism**: This\
    \ is the engine that processes all render jobs. It can run on both hardware and\
    \ software renderers, including 3D. Rasterization and rendering of JavaFX scenes\
    \ are taken care of by this engine. Based on the device being used, the following\
    \ multiple render paths are possible:\n  * `DirectX 9` on Windows XP and Vista,\
    \ and `DirectX 11` on Windows 7\n  * `OpenGL` on Linux, Mac, and Embedded\n  *\
    \ Software rendering when hardware acceleration is not possible\n* **Quantum Toolkit**:\
    \ This is responsible for linking the `Prism` engine and `Glass Windowing Toolkit`\
    \ together to make them available to the JavaFX layer above them in the stack.\
    \ This is in addition to managing any threading rules related to rendering versus\
    \ event handling.\n\n# Glass Windowing Toolkit\n\nThe `Glass Windowing Toolkit`,\
    \ shown in red in the middle portion of the preceding figure, serves as the platform-dependent\
    \ layer that connects the JavaFX platform to the native operating system.\n\n\
    As its main responsibility is to provide native operating services, such as managing\
    \ the timers, windows, and surfaces, its position in the rendering stack is the\
    \ lowest.\n\n# JavaFX threads\n\nNormally, the system runs two or more of the\
    \ following threads at any given time:\n\n* **JavaFX application thread**: This\
    \ is the main and primary thread used by the JavaFX application to run.\n* **Prism\
    \ render thread**: This handles rendering separately from the event dispatcher.\
    \ It renders frame N while frame N +1 is being prepared to process next. Its big\
    \ advantage is the ability to perform concurrent processing, especially on modern\
    \ systems that have multiple processors.\n* **Media thread**: This runs in the\
    \ background and synchronizes the latest frames through the scene graph by using\
    \ the JavaFX application thread.\n* **Pulse**: This enables you to have a way\
    \ to handle events asynchronously. It helps you manage synchronization between\
    \ the JavaFX scene graph elements state and an event of the scene graph with the\
    \ `Prism` engine. When it is fired, the state of the elements on the scene graph\
    \ is synchronized to the rendering layer.\n\n### Note\n\nAny Layout nodes and\
    \ CSS are also tied to pulse events.\n\nThe `Glass Windowing Toolkit` executes\
    \ all pulse events using high-resolution native timers to make the execution.\n\
    \n# Media and images\n\nThe JavaFX `javafx.scene.media` APIs provide media functionality.\
    \ JavaFX supports both visual and audio media. For audio files, it supports `MP3`,\
    \ `AIFF`, and `WAV` files and `FLV` video files.\n\nYou can access your media\
    \ functionalities through three main separate components provided by JavaFX media\
    \ – the `Media` object represents a media file, `MediaPlayer` plays a media file,\
    \ and `MediaView` is a node that displays the media into your scene graph.\n\n\
    ### Note\n\nThe Media Engine component, shown in orange in the preceding figure,\
    \ has been designed carefully with stability and performance in mind to provide\
    \ a consistent behavior across all supported platforms.\n\n# Web component\n\n\
    The web engine component, shown in green in the preceding figure, is one of the\
    \ most important JavaFX UI controls and is built based on the `WebKit` engine,\
    \ which is an open source web browser engine that supports HTML5, JavaScript,\
    \ CSS, DOM rendering, and SVG graphics. It provides a web viewer and full browsing\
    \ functionality through its API. We will dive deep into this in [Chapter 3](#ch03.html\
    \ \"Chapter 3. Developing a JavaFX Desktop and Web Application\"), *Developing\
    \ a JavaFX Desktop and Web Application*, when developing web applications.\n\n\
    It allows you to add and implement the following features in your Java applications:\n\
    \n* Render any HTML content from a local or remote URL\n* Provide Back and Forward\
    \ navigation, and support history\n* Reload the content for any updates\n* Animate\
    \ and apply CSS effects to the web component\n* Provide rich editing control for\
    \ HTML content\n* Can execute JavaScript commands and handle web control events\n\
    \n# Layout components\n\nWhen building a rich and complex UI, we need a way to\
    \ allow for flexible and dynamic arrangements of the UI controls within the JavaFX\
    \ application. This is the best place to use Layout containers or panes.\n\nThe\
    \ Layout API includes the following container classes that automate common layout\
    \ UI patterns:\n\n* **BorderPane**: This lays out its content nodes in the top,\
    \ bottom, right, left, or center region\n* **HBox**: This arranges its content\
    \ nodes horizontally in a single row\n* **VBox**: This arranges its content nodes\
    \ vertically in a single column\n* **StackPane**: This places its content nodes\
    \ in a back-to-front single stack at the center of the pane\n* **GridPane**: This\
    \ enable the creation of a flexible grid of rows and columns in which to lay out\
    \ content nodes\n* **FlowPane**: This arranges its content nodes in either a horizontal\
    \ or vertical flow, wrapping at the specified width (for horizontal) or height\
    \ (for vertical) boundaries\n* **TilePane**: This places its content nodes in\
    \ uniformly sized layout cells or tiles\n* **AnchorPane**: This enables the creation\
    \ of anchor nodes to the top, bottom, left-hand side, or center of the layout,\
    \ and we can freely position its child nodes\n\n### Tip\n\nDifferent containers\
    \ can be nested within a JavaFX application; to achieve the desired layout structure,\
    \ we will see this in action next when developing our Custom UI.\n\n# JavaFX controls\n\
    \nJavaFX controls are the building blocks of your UI layout, and they reside in\
    \ the `javafx.scene.control` package as a set of JavaFX APIs. They are built by\
    \ using nodes in the scene graph. They can be themed and skinned by JavaFX CSS.\
    \ They are portable across different platforms. They take full advantage of the\
    \ visually rich features of the JavaFX platform.\n\nThis figure shows some of\
    \ the UI controls that are currently supported and there are more not shown here\
    \ as well:\n\n![JavaFX controls](graphics/B03998_02_03.jpg)\n\nJavaFX UI controls\
    \ sample\n\n### Note\n\nFor more detailed information about all the available\
    \ JavaFX UI controls, see the official tutorial at [http://docs.oracle.com/javase/8/javafx/user-interface-tutorial/ui_controls.htm#JFXUI336](http://docs.oracle.com/javase/8/javafx/user-interface-tutorial/ui_controls.htm#JFXUI336)\
    \ and the API documentation for the `javafx.scene.control` package.\n\n# Java\
    \ SE 8 features\n\nWe will scratch the surface of Java SE 8 to understand two\
    \ of the most important features – lambda or lambda expressions and functional\
    \ interfaces, which make the lambdas available to us, to help write better, concise,\
    \ and low-boilerplate JavaFX 8 code. However, keep in mind that we will not address\
    \ every lambda detail in this book, as this is not a Java SE 8 book.\n\n### Note\n\
    \nTo get a better idea of Java's lambda roadmap, visit the following official\
    \ tutorial: [http://docs.oracle.com/javase/tutorial/java/javaOO/lambdaexpressions.html](http://docs.oracle.com/javase/tutorial/java/javaOO/lambdaexpressions.html)."
