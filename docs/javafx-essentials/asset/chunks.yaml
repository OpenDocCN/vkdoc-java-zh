  trans: "\n#### Java 中的串行通信\n\n首先，我们来解释一下 `Serial.java` 类。该类代码大部分取自 *JavaFX 8 入门示例（Apress\
    \ 出版社）*，但核心读取函数有所改动，如下列代码片段所示：\n\n你需要将 `jSSC.jar` 文件添加到类路径中，可以通过将其放入 Linux 或 Windows\
    \ 系统的 `<JAVA_HOME>/jre/lib/ext` 目录（Mac 系统则为 `/Library/Java/Extensions`），或者更推荐的做法是，如果你打算分发你的应用程序，可以像上一张截图那样，将其添加到你的项目库中。\n\
    \n为了能够读取串口，我们需要导入以下 jSSC 类：\n\n```\nimport jssc.SerialPort;\nimport static jssc.SerialPort.*;\n\
    import jssc.SerialPortException;\nimport jssc.SerialPortList;\n```\n\n为了动态读取端口，如果你不知道要通过该类的构造函数设置的确切端口名称，我们提供了一组端口名称，帮助你选择\
    \ Arduino 板可能连接的正确端口。\n\n```\nprivate static final List<String> USUAL_PORTS =\
    \ Arrays.asList(\n  \"/dev/tty.usbmodem\", \"/dev/tty.usbserial\", //Mac OS X\n\
    \  \"/dev/usbdev\", \"/dev/ttyUSB\", \"/dev/ttyACM\", \"/dev/serial\", //Linux\n\
    \  \"COM3\", \"COM4\", \"COM5\", \"COM6\" //Windows\n);\n\nprivate final String\
    \ ardPort;\n\npublic Serial() {\n      ardPort = \"\";\n}\n\npublic Serial(String\
    \ port) {\n      ardPort = port;\n}\n```\n\n`connect()` 方法会查找一个有效的串口（如果尚未设置连接\
    \ Arduino 板的端口）。如果找到，则打开该端口并添加一个监听器。每当 Arduino 输出返回一行数据时，该监听器负责从串口获取输入读数。`stringProperty`\
    \ 会设置为该行内容。我们使用了一个 `StringBuilder` 来存储字符，并在找到 `'\\r\\n'` 时提取行内容。我们在此处使用了 lambda\
    \ 表达式提供的集合批量操作，以便简化端口列表的查找过程，并根据操作系统返回有效的端口。\n\n找到的每一行都通过 `set()` 方法设置到 `line`\
    \ 变量中，以便通过注册到 `line` 变量的变更监听器事件来对图表进行必要的更改，该变量通过 `getLine()` 方法暴露。代码如下：\n\n```\n\
    public boolean connect() {\n  out.println(\"Serial port is openning now...\");\n\
    \  Arrays.asList(SerialPortList.getPortNames()).stream()\n  .filter(name -> ((!ardPort.isEmpty()\
    \ && name.equals(ardPort))|| (ardPort.isEmpty() && USUAL_PORTS.stream()\n  .anyMatch(p\
    \ -> name.startsWith(p)))))\n  .findFirst()\n  .ifPresent(name -> {\n  try {\n\
    \    serPort = new SerialPort(name);\n      out.println(\"Connecting to \" + serPort.getPortName());\n\
    \      if (serPort.openPort()) {\n        serPort.setParams(BAUDRATE_9600,\n \
    \       DATABITS_8,\n        STOPBITS_1,\n        PARITY_NONE);\n        serPort.setEventsMask(MASK_RXCHAR);\n\
    \        serPort.addEventListener(event -> {\n         if (event.isRXCHAR()) {\n\
    \           try {\n             sb.append(serPort.readString(event.getEventValue()));\n\
    \             String ch = sb.toString();\n             if (ch.endsWith(\"\\r\\\
    n\")) {\n               line.set(ch.substring(0, ch.indexOf(\"\\r\\n\")));\n \
    \              sb = new StringBuilder();\n             }\n           } catch (SerialPortException\
    \ e) {\n             out.println(\"SerialEvent error:\" + e.toString());\n   \
    \        }\n         }\n       });\n     }\n  } catch (SerialPortException ex)\
    \ {\n    out.println(\"ERROR: Port '\" + name + \"': \" + ex.toString());\n  }});\n\
    \  return serPort != null;\n}\n```\n\n最后，`disconnect()` 方法负责从端口移除监听器并关闭端口连接，以释放应用程序使用的资源。代码如下：\n\
    \n```\npublic void disconnect() {\n  if (serPort != null) {\n    try {\n     \
    \ serPort.removeEventListener();\n      if (serPort.isOpened()) {\n        serPort.closePort();\n\
    \      }\n      } catch (SerialPortException ex) {\n      out.println(\"ERROR\
    \ closing port exception: \" + ex.toString());\n    }\n    out.println(\"Disconnecting:\
    \ comm port closed.\");\n  }\n}\n```\n"
- fmt: "# Application logic and charting API\n\nThe main component of our application\
    \ is the `LineChart<Number, Number>` chart class API, which will be used to plot\
    \ your blood temperature level on the Y-axis versus time on the X-axis.\n\nCharts\
    \ with two axes (such as line, bar, and area charts) have been available since\
    \ JavaFX 2, and they are of type `Node` class, which makes it easy to add them\
    \ to `Scene` like any other nodes.\n\nIn our application, we will add the following\
    \ `createBloodChart()` method, which is responsible for creating and preparing\
    \ the chart and returning it to be added to the main application scene.\n\nAt\
    \ the beginning of the application, we have instance variables: a `Serial` object\
    \ to handle Arduino connectivity and readings; `listener` to be registered with\
    \ the `Serial` line object; `BooleanProperty` to keep track of the connection\
    \ status; and three float properties that keep track of all sensor data its actual\
    \ value, its voltage conversion, and finally the voltage converted to temperature\
    \ in degree Celsius, respectively. The code is as follows:\n\n```\nprivate final\
    \ Serial serial = new Serial();\nprivate ChangeListener<String> listener;\nprivate\
    \ final BooleanProperty connection = new SimpleBooleanProperty(false);\nprivate\
    \ final FloatProperty bloodTemp = new SimpleFloatProperty(0);\nprivate final FloatProperty\
    \ volts = new SimpleFloatProperty(0);\nprivate final FloatProperty sensorVal =\
    \ new SimpleFloatProperty(0);\n```\n\nWe'll add `LineChart` to plot the temperature\
    \ level from the temperature sensor, with one `Series` that take pairs of numbers\
    \ to be plotted against each axis; these are `NumberAxis` instances. `XYChart.Data`\
    \ is added to the series data as a pair of *X* and *Y* values for every point\
    \ to plot the readings.\n\nWhenever the size of `Series` is greater than 40 points,\
    \ the first values will be removed for memory efficiency. The code is as follows:\n\
    \n```\nprivate LineChart<Number, Number> createBloodChart() {\n  final NumberAxis\
    \ xAxis = new NumberAxis();\n  xAxis.setLabel(\"Temperature Time\");\n  xAxis.setAutoRanging(true);\n\
    \  xAxis.setForceZeroInRange(false);\n  xAxis.setTickLabelFormatter(new StringConverter<Number>()\
    \ {\n    @Override\n    public String toString(Number t) {\n      return new SimpleDateFormat(\"\
    HH:mm:ss\").format(new Date(t.longValue()));\n    }\n    @Override\n    public\
    \ Number fromString(String string) {\n      throw new UnsupportedOperationException(\"\
    Not supported yet.\");\n    }\n  });\n  final NumberAxis yAxis = new NumberAxis(\"\
    Temperature value\", baselineTemp - 10, 40.0, 10);\n  final LineChart<Number,\
    \ Number> bc = new LineChart<>(xAxis, yAxis);\n  bc.setTitle(\"Blood temperature\
    \ vs time\");\n  bc.setLegendVisible(false);\n\n  Series series = new Series();\n\
    \  series.getData().add(new Data(currentTimeMillis(), baselineTemp));\n  bc.getData().add(series);\n\
    \n  listener = (ov, t, t1) -> {\n    runLater(() -> {\n      String[] values =\
    \ t1.split(\",\");\n      if (values.length == 3) {\n        sensorVal.set(parseFloat(values[0].split(\"\
    :\")[1].trim()));\n        volts.set(parseFloat(values[1].split(\":\")[1].trim()));\n\
    \        bloodTemp.set(parseFloat(values[2].split(\":\")[1].trim()));\n      \
    \  series.getData().add(new Data(currentTimeMillis(),\n        bloodTemp.getValue()));\n\
    \n        if (series.getData().size() > 40) {\n          series.getData().remove(0);\n\
    \        }\n      }\n\n    });\n  };\n  serial.getLine().addListener(listener);\n\
    \n  return bc;\n}\n```\n\nThe most interesting part here is the change listener\
    \ `listener = (ov, t, t1) -> {}` we have created using lambda expressions, which\
    \ will be registered to the `Serial` class `line` object we have described earlier.\
    \ By doing so, we are able to change chart data once any input from Arduino is\
    \ detected.\n\nFor that, we set the *x* coordinate value as the time when we add\
    \ the reading in milliseconds (on the chart, it will be formatted as *HH:MM:SS*)\
    \ and the *y* coordinate value is a float measurement of the level of temperature\
    \ reported by the Arduino in the String `t1`.\n\n## Note\n\nThe main use of `Platform.runLater()`\
    \ is placing the task of filling the series data with the incoming Arduino input\
    \ in the JavaFX thread, but also it gives the required time to the `Scene` graph\
    \ to render the chart, skipping values if they are added too fast.\n\nI have added\
    \ four shapes of type `Circle`, which will be used to simulate the circuit LEDs\
    \ on and off based on the temperature level, once any changes are done to `FloatProperty`\
    \ `bloodTemp` via the change listener. The code is as follows:\n\n```\nCircle\
    \ IndicatorLevel1 = new Circle(26.0, Color.BLACK);\nbloodTemp.addListener((ol,\
    \ ov, nv) -> {\n  tempLbl.setText(\"Degrees C: \".concat(nv.toString()));\n\n\
    \  // if the current temperature is lower than the baseline turn off all LEDs\n\
    \  if (nv.floatValue() < baselineTemp +2) {\n    IndictorLevel1.setFill(Paint.valueOf(\"\
    Black\"));\n    IndictorLevel2.setFill(Paint.valueOf(\"Black\"));\n    IndictorLevel3.setFill(Paint.valueOf(\"\
    Black\"));\n  } // if the temperature rises 1-3 degrees, turn an LED on\n  else\
    \ if (nv.floatValue() >= baselineTemp + 1 && nv.floatValue()< baselineTemp + 3)\
    \ {\n      IndictorLevel1.setFill(Paint.valueOf(\"RED\"));\n      IndictorLevel2.setFill(Paint.valueOf(\"\
    Black\"));\n      IndictorLevel3.setFill(Paint.valueOf(\"Black\"));\n    } //\
    \ if the temperature rises 3-5 degrees, turn a second LED on\n    else if (nv.floatValue()\
    \ >= baselineTemp + 4 && nv.floatValue() < baselineTemp + 6) {\n      IndictorLevel1.setFill(Paint.valueOf(\"\
    RED\"));\n      IndictorLevel2.setFill(Paint.valueOf(\"RED\"));\n      IndictorLevel3.setFill(Paint.valueOf(\"\
    Black\"));\n    }//if the temperature rises more than 6 degrees, turn all LEDs\
    \ on\n    else if (nv.floatValue() >= baselineTemp + 6 {\n    IndictorLevel1.setFill(Paint.valueOf(\"\
    RED\"));\n    IndictorLevel2.setFill(Paint.valueOf(\"RED\"));\n    IndictorLevel3.setFill(Paint.valueOf(\"\
    RED\"));\n  }\n});\n```\n\nFinally, the main UI is created by the `loadMainUI()`\
    \ method, which is responsible for creating the whole UI and binding all the required\
    \ variables to the UI controls, in order to interact dynamically with the events\
    \ coming from the Arduino input.\n\nOnce the scene root (`BorderPane`) object\
    \ is prepared and set up by `loadMainUI()`, we create the scene and add it to\
    \ stage in order to run our application as the following:\n\n```\nScene scene\
    \ = new Scene(loadMainUI(), 660, 510);\nstage.setTitle(\"Blood Meter v1.0\");\n\
    stage.setScene(scene);\nstage.show();\n//Connect to Arduino port and start listening\n\
    connectArduino();\n```\n\nFinally, the overridden `stop()` method inherited from\
    \ the `Application` class will take care of any resource freeing by closing the\
    \ `Serial` ports connection and removing `listener` from line object. The code\
    \ is as follows:\n\n```\n@Override\npublic void stop() {\n  System.out.println(\"\
    Serial port is closing now...\");\n  serial.getLine().removeListener(listener);\n\
    \  if (connection.get()) {\n  serial.disconnect();\n  connection.set(false);\n\
    }}\n```\n\n# Running the application\n\nWith everything in place— the JavaFX project\
    \ with earlier described classes and the `jSSC.jar` library added to it—compile\
    \ and run your application while your Arduino board is connected to your laptop/PC.\
    \ If everything is okay, you will see the following screenshot that shows temperature\
    \ values on the chart against time values, which will be based on your room temperature.\n\
    \nCongratulations, you are now monitoring the Arduino input and you can interact\
    \ with Arduino through the `jSSC.jar` library to control it.\n\n![Running the\
    \ application](graphics/B03998_07_10.jpg)\n\nInitial blood meter application readings,\
    \ with temperature of 24.71 degree\n\nTry to hold the sensor with your fingers\
    \ and monitor the readings on the chart. In my case, it reached 30.57 degrees.\
    \ Also, watch the indicator levels on the toolbar and the LEDs on the board. You\
    \ should see something similar to the following screenshot:\n\n![Running the application](graphics/B03998_07_11.jpg)\n\
    \nBlood meter application readings, with a temperature of 30.57 degrees"
