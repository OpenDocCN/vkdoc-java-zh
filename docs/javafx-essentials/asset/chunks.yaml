  trans: '

    # JavaFX 目标


    JavaFX 的诞生主要目标是在多种设备上使用，例如嵌入式设备、智能手机、电视、平板电脑和台式机。JavaFX 也遵循 Java 的*一次编写，随处运行*范式。


    JavaFX 8 完全用 Java 语言从头编写，让你感觉宾至如归。因此，用 JavaFX 编写的应用程序可以部署在台式机、笔记本电脑、Web、嵌入式系统、手机和平板电脑上。


    Oracle 已不再支持嵌入式系统；这项工作留给了 ARM 等公司。从 JavaFX 2.x 到 8.x，移动设备从未得到官方支持；现在之所以存在支持，完全是因为
    **OpenJFX**。开源社区将 JavaFX 带到移动环境，使大家从中受益。


    有关 OpenJFX 的更多信息，请访问 [`wiki.openjdk.java.net/display/OpenJFX/Main`](https://wiki.openjdk.java.net/display/OpenJFX/Main)。


    JavaFX 是一套图形和媒体包，使开发人员能够设计、创建、测试、调试和部署富客户端应用程序，这些应用程序能在不同平台上一致运行，且只需一个捆绑包，无需使用许多单独的库、框架和
    API 来实现相同目标。这些单独的库包括媒体、UI 控件、`WebView`、3D 和 2D API。


    因此，如果你是一名 Java 前端开发人员，或是一位经验丰富的 Java Swing、Flash/Flex、SWT 或 Web 开发人员，希望将你的客户端应用程序提升到新水平，并想为客户开发一个美观且复杂的用户界面，那么你正在学习
    JavaFX 技能的正确道路上——这本书就是为你准备的。


    # 入门


    本章是对 JavaFX 8 的介绍；我们已经讨论了 JavaFX 8 作为一种技术以及你为何应该关注它。


    接下来，我们将回顾其历史，探索其核心功能以及它的应用场景。


    在开始使用本书学习 JavaFX 8 之前，我们将通过安装各种必需的软件包来准备你的开发环境，以便能够编译和运行书中的许多示例。


    在本章中，你将学习如何安装所需软件，例如 **Java 开发工具包 JDK** 和 NetBeans **集成开发环境**（**IDE**）。


    安装完所需软件后，你将开始创建一个传统的 *Hello JavaFX 8* 示例。当你对开发环境感到熟悉后，作为最终验证我们是否走在正确轨道上的步骤，我们将逐步分析
    Hello JavaFX 8 的源代码，以了解基本的 JavaFX 8 应用程序架构。


    ### 注意


    如果你已经熟悉 JDK 和 NetBeans IDE 的安装，可以跳到第 2 章，*JavaFX 8 要点与创建自定义 UI*，该章涵盖了 JavaFX 8
    基础知识以及如何创建自定义 UI 组件。


    那你还在等什么？让我们开始吧！


    # JavaFX 历史


    你可能认为 JavaFX 是一项相当新的技术，但实际上并非如此。JavaFX 已经存在很长时间了；非正式地说，自 2005 年起。自从 Sun Microsystems
    收购了 *SeeBeyond* 公司以来，就存在一种名为 **F3**（**形**式**追**随**功**能）的图形丰富脚本语言，由工程师 Chris Oliver
    创建。


    在 2007 年的 JavaOne 大会上，Sun Microsystems 正式将 JavaFX 作为该语言的名称，取代了 F3。在 2007 年至 2010
    年期间，Oracle 收购了许多大公司，如 BEA Systems、JD Edwards、Siebel Systems 等。我当时在 Oracle 工作，负责将不同的客户支持渠道整合到当时被称为
    *MetaLink* 的 Oracle 支持网站。


    2009 年 4 月 20 日，Oracle 公司宣布收购 Sun Microsystems，使 Oracle 成为 JavaFX 的新管理者。


    在 2010 年的 JavaOne 大会上，Oracle 宣布了 JavaFX 路线图，其中包括逐步淘汰 JavaFX 1.3 脚本语言，并基于 Java
    平台将 JavaFX 平台重建为基于 Java 的 API。正如承诺的那样，JavaFX 2.0 SDK 于 2011 年 10 月在 JavaOne 大会上发布。


    除了发布 JavaFX 2.0，Oracle 还通过宣布承诺采取措施使 JavaFX 开源，将平台提升到了新水平，从而允许 Java 强大且多才多艺的社区帮助推动平台向前发展。使
    JavaFX 开源增加了其采用率，加快了错误修复的周转时间，并产生了新的增强功能。


    在 JavaFX 2.1 和 2.2 版本之间，新功能的数量迅速增长。JavaFX 2.1 是 Mac OS 上 Java SDK 的官方版本。JavaFX
    2.2 是 Linux 操作系统上 Java SDK 的官方版本。


    并没有 JavaFX 3.x 这样的版本，但 Java 开发领域的重大变化发生在 Java SE 8 发布之时，该版本于 2014 年 3 月 18 日宣布。Java
    SE 8 有许多新的 API 和语言增强功能，包括 **Lambdas**、Stream API、Nashorn JavaScript 引擎，以及 *JavaFX
    API*，这些都被整合到标准 JDK 捆绑包中，JavaFX 版本变为 8，作为 JavaFX 2.0 的直接继承者。


    要查看 Java SE 8 中的所有新功能，请访问 [`www.oracle.com/technetwork/java/javase/8-whats-new-2157071.html`](http://www.oracle.com/technetwork/java/javase/8-whats-new-2157071.html)。


    ## JavaFX 8 何时可用？


    答案是*现在*。如前所述，Java SE 8 于 2014 年 3 月 18 日发布。对于使用 Java 构建客户端应用程序的开发人员来说，JavaFX 富互联网应用框架现在支持
    Java 8。


    大多数 Java 企业版供应商也支持 Java 8。你是否立即迁移到 Java SE 8 取决于你正在从事的项目类型。


    ### 注意


    事实上，根据 Oracle JDK 支持路线图，2015 年 4 月之后，Oracle 将不再在其公共下载站点上发布 Java SE 7 的进一步更新。


    JavaFX API 作为 **Java SE 运行时环境**（**JRE**）和 JDK 的完全集成功能提供。JDK 适用于所有主要桌面平台（*Windows*、*Mac
    OS X*、*Solaris* 和 *Linux*），因此 JavaFX 也将在所有主要桌面平台上运行。


    关于 JavaFX 8，它支持以下 API：


    *   3D 图形

    *   富文本支持

    *   打印 API

    '
- fmt: '# JavaFX features


    The following features are included in JavaFX 8 and later releases as per JavaFX''s
    official documentation:


    - **Java APIs**: JavaFX is a Java library that consists of classes and interfaces
    that are written in Java code.

    - **FXML and Scene Builder**: This is an XML-based declarative markup language
    for constructing a JavaFX application user interface. You can code in FXML or
    use JavaFX Scene Builder to interactively design the GUI. Scene Builder generates
    FXML markup that can be ported to an IDE like NetBeans, where you can add the
    business logic. Moreover, the FXML file that is generated can be used directly
    inside the JavaFX application.

    - **WebView**: This is a web component that uses `WebKit`, an HTML render engine
    technology, to make it possible to embed web pages within a JavaFX application.
    JavaScript running in `WebView` can call Java APIs and vice-versa.

    - **Swing/SWT interoperability**: The existing Swing and SWT applications can
    benefit from JavaFX features such as rich graphics, media playback, and embedded
    web content.

    - **Built-in UI controls and CSS**: JavaFX provides all the major UI controls,
    and some extra uncommon controls like charts, pagination, and accordion that are
    required to develop a full-featured application. Components can be skinned with
    standard web technologies such as CSS.

    - **3D graphics features**: Support for the 3D graphics library is included.

    - **Canvas API**: You can draw directly inside a JavaFX scene area using the Canvas
    API, which consists of one graphical element (node).

    - **Multitouch support**: Multitouch operations are supported based on the capabilities
    of the underlying platform.

    - **Hardware-accelerated graphics pipeline**: JavaFX graphics are based on the
    graphics-rendering pipeline, *Prism*. The Prism engine smoothly and quickly renders
    JavaFX graphics when used with a supported graphics card or **graphics processing
    unit** (**GPU**). If a system does not feature one of them, then Prism defaults
    to the software-rendering stack.

    - **High-performance media engine**: This engine provides a stable, low-latency
    media framework that is based on the `GStreamer` multimedia framework. The playback
    of web multimedia content is supported with the media pipeline.

    - **Self-contained deployment model**: Self-contained application packages have
    all of the application resources and a private copy of the Java and JavaFX runtimes.
    They are distributed as native installable packages and provide the same installation
    and launch experience as native applications for that operating system.


    ## What''s new in JavaFX 8


    The following is a brief summary of the new features and significant product changes
    made in the JavaFX component of the Java SE 8 release:


    - The new *Modena theme* is now the default theme for JavaFX applications.

    - Support for additional HTML5 features, including Web Sockets, Web Workers, Web
    Fonts, and printing capabilities have been added.

    - The API enables you to embed Swing content into JavaFX applications with the
    new `SwingNode` class, which improves the Swing interoperability feature.

    - `DatePicker`, `Spinner`, and `TableView` built-in UI controls are now available.

    - It provides the public JavaFX printing APIs through the `javafx.print` package.

    - Support for Hi-DPI displays has been made available.

    - CSS-styleable classes became public APIs.

    - A scheduled service class has been introduced.

    - The 3D graphics library has been enhanced with several new API classes.

    - Major updates have been added to the *Camera API* class in this release.

    - Now JavaFX 8 supports rich text capabilities. These include bidirectional and
    complex text scripts such as Thai and Hindi in UI controls, and multiline, multistyle
    text in text nodes.

    - Dialogs and accessibility APIs are supported.


    In [Appendix](#apa.html "Appendix A. Become a JavaFX Guru"), *Become a JavaFX
    Guru*, I have provided a list of all the references (links, books, magazines,
    articles, blogs, and tools) and real JavaFX 8 production applications you will
    need to become a JavaFX guru.


    The following figure shows the `Ensemble8.jar` application built using JavaFX
    8, showing examples dealing with various JavaFX 8 components, topics and concepts.
    More interestingly, the source code is available to learn from and modify – consult
    the last chapter to see how to install this application.


    ![What''s new in JavaFX 8](graphics/B03998_01_01.jpg)


    JavaFX 8 applications


    There are many topics covered by the application, especially the new JavaFX 8
    3D APIs, which can be found under the Graphics 3D section as seen in the following
    figure:


    ![What''s new in JavaFX 8](graphics/B03998_01_02.jpg)


    JavaFX 8 3D applications


    # Installing the required software


    So far, we have had a good introduction to JavaFX and I am as eager as you to
    start creating and launching our first `"Hello JavaFX 8"` application. But this
    can''t happen without downloading and installing the right tools that will allow
    us to create and compile most of the book''s code.


    You''ll need to download and install *Java 8 Java Development Kit* (JDK) or a
    later version. Not the runtime version (JRE).


    Download the latest Java SE 8u45 JDK or higher from the following location:


    [http://www.oracle.com/technetwork/java/javase/downloads/index.html](http://www.oracle.com/technetwork/java/javase/downloads/index.html)


    Download and install NetBeans 8.0.2 or higher from the following link [https://netbeans.org/downloads](https://netbeans.org/downloads),
    though the NetBeans IDE **All** Bundle is recommended, *you can use the Java EE
    bundle as well*, as shown in the figure:


    ![Installing the required software](graphics/B03998_01_03.jpg)


    NetBeans bundles download.


    Currently, JavaFX 8 runs on the following operating systems:


    - Windows OS (XP, Vista, 7, 8) 32- and 64-bit

    - Mac OS X (64-bit)

    - Linux (32- and 64-bit), Linux ARMv6/7 VFP, HardFP ABI (32-bit)

    - Solaris (32- and 64-bit)'
