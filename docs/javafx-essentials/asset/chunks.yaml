    \ approach for defining a handler for the pressed event on a JavaFX button by\
    \ using an anonymous inner class:\n\n```\nbtn.setOnAction(new EventHandler<ActionEvent>()\
    \ {\n   @Override\n   public void handle(ActionEvent event) {\n     message.setText(\"\
    Hello World! JavaFX style :)\");\n   }\n});\n```\n\nThis code is very verbose\
    \ as compared to just wiring up a single line of code that sets the `text` attribute\
    \ of the message text field in a button action. Wouldn't it be nice to be able\
    \ to rewrite this block of code containing your logic without the need of so much\
    \ boilerplate code?\n\nJava SE 8 solves this with a Lambda expressions as follows:\n\
    \n```\nbtn.setOnAction(event -> {\n    message.setText(\"Hello World! JavaFX style\
    \ :)\");\n});\n```\n\nBeyond making your code more concise and easy to read, lambda\
    \ expressions make your code perform better as well.\n\n### Syntax\n\nThere are\
    \ two ways to write lambda expressions, and the general form is as shown in the\
