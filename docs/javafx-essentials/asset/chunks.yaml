- fmt: "### Buying an Arduino\n\nWhile an Arduino Uno costs around $25, you can purchase\
    \ different kits, including the board—starting from a basic Budget Pack ($50)\
    \ to the Starter Pack for Arduino ($65) from [http://adafruit.com](http://adafruit.com)\
    \ or a Starter Kit ($90) from [http://arduino.cc](http://arduino.cc). These kits\
    \ have the same components as the budget pack. But they also include some extras\
    \ for more advanced tinkering.\n\nOne nice advantage of the starter kit from [http://arduino.cc](http://arduino.cc)\
    \ is that it includes a guidebook that features 15 different projects of varying\
    \ skill levels.\n\nIf you are an Amazon user, you can usually find the same kits\
    \ available on their site, but the prices may vary.\n\nMost of the boards have\
    \ core components in the same locations. So, more advanced boards have lengthened\
    \ in size to accommodate additional components.\n\nHere are some sites for purchasing\
    \ components and some books: [http://arduino.cc](http://arduino.cc), [http://Adafruit.com](http://Adafruit.com),\
    \ [http://makershed.com](http://makershed.com), [http://sparkfun.com](http://sparkfun.com),\
    \ and [http://Amazon.com](http://Amazon.com).\n\n### Other components you will\
    \ need\n\nIn addition to the Arduino, you will also need a computer with Windows,\
    \ Mac OS, or Linux, with the USB port to connect your computer to the board.\n\
    \nFor the blood meter project, you will need some of the components that already\
    \ come in the Arduino Starter kit. Here is a short list of the components you\
    \ should have handy.\n\nA computer with a USB port, a USB cable, a solderless\
    \ breadboard, flexible wires, a TMP36 temperature sensor, three 220 Ohms resistors,\
    \ and three LEDs (yellow, blue, and red), as shown in the following image:\n\n\
    ![Other components you will need](graphics/B03998_07_04.jpg)\n\nThe blood meter\
    \ project tools and material\n\n### The Arduino IDE\n\nIn order to interact and\
    \ program the Arduino microcontroller, we need to download and install the Arduino\
    \ Integrated Development Environment.\n\nThe Arduino software includes all the\
    \ components you need to write code, a text editor, and compiler to convert it\
    \ to machine language, and upload it to your board and run the code.\n\n#### Downloading\
    \ the IDE\n\nAt the time writing, the Arduino IDE version is 1.6.3 but you can\
    \ get the latest version of the Arduino software from the link [http://www.arduino.cc/en/Main/Software](http://www.arduino.cc/en/Main/Software).\
    \ Besides the Arduino version shown in the following screenshot, click on the\
    \ preferred operating system link; in my case, I have chosen Mac OS X.\n\nFrom\
    \ the donation page, either donate or just click on the **JUST DOWNLOAD** link\
    \ to start downloading the IDE; in my case, I chose `arduino-1.6.4-macosx.zip`.\n\
    \nAfter downloading, unzip the file and copy the `Arduino.app` file to the application\
    \ folder on your Mac or link the Arduino executable to a location easy for you\
    \ to access.\n\nOnce you have the IDE downloaded, you still need to take care\
    \ of a few more hardware issues before you can start programming.\n\n![Downloading\
    \ the IDE](graphics/B03998_07_05.jpg)\n\nDownload the Arduino IDE 1.6.4\n\n####\
    \ Installing the drivers\n\nFirst you need to connect the Arduino board to your\
    \ computer using the USB cable. The green LED power indicator (labeled PWR or\
    \ ON) should be on.\n\n##### Windows Setup\n\nLet's set up the Arduino in Windows:\n\
    \n1.  Plug in your board and wait for Windows to begin its driver installation\
    \ process.\n2.  Click on the **Start Menu** and open up the **Control Panel**.\n\
    3.  From the **Control Panel**, navigate to **System and Security**. Next, click\
    \ on **System**. Once the System window is open, select **Device Manager**.\n\
    4.  Look under **Ports (COM & LPT)**. You should see an open port named `Arduino\
    \ UNO (COMxx)`. If there is no **COM & LPT** section, look under **Other Devices**\
    \ for **Unknown Device**.\n5.  Right-click on the **Arduino UNO (COMxx)** port\
    \ and choose the **Update Driver Software** option.\n6.  Next choose the **Browse\
    \ my computer for Driver software** option.\n7.  Finally, navigate to and select\
    \ the driver file named `arduino.inf`, which is located in the `Drivers` folder\
    \ of the Arduino software download (not the `FTDI USB Drivers` sub-directory).\n\
    8.  Windows will finish the driver installation from there.\n\n    > **Tip:**\
    \ If you have Windows 8 and the driver is not well installed, try to disable the\
    \ driver signature enforcement.\n\n##### Mac OS X and Linux setup\n\nFor both\
    \ the Mac OS X and Linux operating systems, no drivers have to be installed.\n\
    \nFor Mac OS X, when you connect the Arduino board, you should see it listed under\
    \ `/dev/tty.usbmodemXXXX` or `/dev/tty.usbserialXXXX`.\n\nOn Linux, when you connect\
    \ the Arduino board, you should see it listed under `/dev/ttyACMX` or `/dev/ttyUSBX`.\n\
    \n#### Exploring the IDE and sketches\n\nAssuming your installation ends successfully,\
    \ double-click on the Arduino application and you should see the following screen:\n\
    \n![Exploring the IDE and sketches](graphics/B03998_07_06.jpg)\n\nThe Arduino\
    \ IDE, first run with an empty sketch\n\nThere are two important things you need\
    \ to do now to properly connect and upload your sketches to the Arduino board.\
    \ First, select your board by navigating to **Tools** | **Board**. Then select\
    \ the serial port of the Arduino board by going to **Tools** | **Serial Port**.\n\
    \nThe final verification step is to run a `Hello world` for Arduino, and you can\
    \ do so by opening the LED blink example sketch at **File** | **Examples** | **1.Basics**\
    \ | **Blink**.\n\nNow, simply click on the **Upload** button in the environment.\
    \ If the upload is successful, the message **Done uploading** will appear in the\
    \ status bar.\n\nWait for a few seconds and you will see the **RX** and **TX**\
    \ LEDs on the board flashing.\n\nIf you have any problems, check out the troubleshooting\
    \ suggestions at [http://arduino.cc/en/Guide/Troubleshooting](http://arduino.cc/en/Guide/Troubleshooting).\n\
    \nCongratulations, your Arduino is up-and-running!\n\n## The blood meter project\n\
    \nIn this project, we will use a temperature sensor to measure the warmth of your\
    \ skin and then start to turn on (or off) the LEDs indicated by the temperature.\n\
    \nFirst, we will tinker with our board and prepare the project with components\
    \ described earlier in the *Other components you will need* section. Then, we\
    \ will write the sketch to read sensor data and, based on the data of your skin\
    \ temperature, we will turn LEDs on and off.\n\nFinally, we will feed our JavaFX\
    \ application with temperature sensor data and show the result with a chart API\
    \ to indicate the level of your skin temperature.\n\n### Tinkering with the circuit\n\
    \nNow, we are going to tinker with our blood meter circuit shown in the following\
    \ diagram. Start by connecting the jumper wires between Arduino UNO and the breadboard.\
    \ I have attached the TMP36 temperature sensor on the breadboard, so the rounded\
    \ part of the sensor faces away from Arduino. The order of the pins is very important!\
    \ Note that we have connected the left pin to the power, the right one is grounded,\
    \ and the center pin that gives the voltage output is connected to the analog\
    \ pin A0 on the board. The screenshot as follows:\n\n![Tinkering with the circuit](graphics/B03998_07_07.jpg)\n\
    \nCircuit layout for Blood Meter example\n\nFinally, I have attached the three\
    \ LED lights and the resistors, and connected them with Arduino pins 4, ~3, and\
    \ 2 of the digital PMW~ pins row.\n\nAs usual, I have connected the breadboard\
    \ + row to power (5V) and - row to the ground (GND).\n\n> **Note:** Remember to\
    \ keep the board unplugged while you set up your components."
