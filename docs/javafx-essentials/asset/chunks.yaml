  trans: "\n### 使用属性实现电源应用变更同步\n\n属性是基于 JavaFX 的对象属性（如 String 或 Integer）的包装器对象。属性允许你添加监听器代码，以便在对象包装值发生更改或被标记为无效时做出响应。此外，属性对象可以相互绑定。\n\
    \n绑定行为允许属性根据另一个属性的更改值来更新或同步其值。\n\n属性是包装器对象，能够使值以可读写或只读的方式访问。\n\n简而言之，JavaFX 的属性是持有实际值的包装器对象，同时提供变更支持、失效支持和绑定功能。我稍后会讨论绑定，但现在，让我们先看看常用的属性类。\n\
    \n所有包装器属性类都位于 `javafx.beans.property.* package` 命名空间中。下面列出的是常用的属性类。要查看所有属性类，请参阅\
    \ Javadoc 中的文档（[`docs.oracle.com/javase/8/javafx/api/index.html?javafx/beans/property.html`](https://docs.oracle.com/javase/8/javafx/api/index.html?javafx/beans/property.html)）。\n\
    \n*   `javafx.beans.property.SimpleBooleanProperty`\n*   `javafx.beans.property.ReadOnlyBooleanWrapper`\n\
    *   `javafx.beans.property.SimpleIntegerProperty`\n*   `javafx.beans.property.ReadOnlyIntegerWrapper`\n\
    *   `javafx.beans.property.SimpleDoubleProperty`\n*   `javafx.beans.property.ReadOnlyDoubleWrapper`\n\
    *   `javafx.beans.property.SimpleStringProperty`\n*   `javafx.beans.property.ReadOnlyStringWrapper`\n\
    \n前缀为 `Simple`、后缀为 `Property` 的属性是*可读写属性*类，而前缀为 `ReadOnly`、后缀为 `Wrapper` 的类是只读属性。稍后，你将看到如何使用这些常用属性创建\
    \ JavaFX bean。\n\n让我们快进到 JavaFX 的 Properties API，看看它如何处理常见问题。你可能已经注意到，主页面中添加了\
    \ `TableView` 控件，用于列出当前加载的笔记以及任何新添加的笔记。\n\n为了用数据正确填充 `TableView`，我们应该有一个数据模型来表示笔记数据，这也是我第一次在\
    \ JavaFX JavaBean 风格的 Note 类中使用 Properties API 的地方，该类定义如下：\n\n```\npublic class\
    \ Note {\n    private final SimpleStringProperty title;\n    private final SimpleStringProperty\
    \ description;\n    public Note(String title, String description) {\n        this.title\
    \ = new SimpleStringProperty(title);\n        this.description = new SimpleStringProperty(description);\n\
    \    }\n    public String getTitle() {\n        return title.get();\n    }\n \
    \   public void setTitle(String title) {\n        this.title.set(title);\n   \
    \ }\n    public String getDescription() {\n        return description.get();\n\
    \    }\n    public void setDescription(String description) {\n        this.description.set(description);\n\
    \    }\n}\n```\n\n为了用已存储在应用程序数据库中的数据填充 `TableView` 类，例如（我们这里的数据库是瞬态的，使用笔记对象 data\
    \ 的 `ObservableList<Note>`），我们必须传递一个此数据的集合。\n\n我们需要摆脱每次笔记数据集合更新时手动更新 UI 控件（在我们的例子中是\
    \ `TableView` 控件）的负担。因此，我们需要一个解决方案，能够自动同步表格视图和笔记数据集合模型之间的变更，例如添加、更新或删除数据，而无需从代码中对\
    \ UI 控件进行任何进一步修改。只有数据模型集合得到更新——UI 应该自动同步。\n\n此功能已经是 JavaFX 集合的一个组成部分。我们将使用 JavaFX\
    \ 的 `ObservableList` 类。`ObservableList` 类是一个集合，能够在对象被添加、更新或删除时通知 UI 控件。\n\nJavaFX\
    \ 的 `ObservableList` 类通常用于列表 UI 控件，例如 `ListView` 和 `TableView`。让我们看看我们将如何使用 `ObservableList`\
    \ 集合类。\n\n在 `BaseController` 中，我创建了静态数据作为 `ObservableList<Note>`，以便在所有控制器之间共享，从而能够从中添加、更新和删除笔记。此外，它还用一些数据进行了初始化，如下所示：\n\
    \n```\nprotected static ObservableList<Note> data = FXCollections.<Note>observableArrayList(\n\
    \  new Note(\"笔记 1\", \"笔记 41 的描述\"),\n    new Note(\"笔记 2\", \"笔记 32 的描述\"),\n\
    \    new Note(\"笔记 3\", \"笔记 23 的描述\"),\n    new Note(\"笔记 4\", \"笔记 14 的描述\"\
    ));\n```\n\n在 `ListNotesUIController.java` 类的 `initialize()` 方法中，我创建了一个 `javafx.collections.transformation.FilteredList`\
    \ 类的实例，该实例将用作我们在表格内容中搜索时的过滤类。它将传递类型为 `ObservableList<Note>` 的 `data` 对象作为源数据：\n\
    \n```\nFilteredList<Note> filteredData = new FilteredList<>(data, n -> true);\n\
    ```\n\n`FilteredList` 的第二个参数是用于过滤数据的谓词；这里它返回 `true`，表示不过滤，我们稍后会添加过滤谓词。\n\n创建的类型为\
    \ `ObservableList<Note>` 的数据列表应传递给我们的 `TableView` 数据，以便表格视图监视当前数据集合的操作，例如添加、删除、编辑和过滤，如下面的\
    \ `ListNotesUIController.java` 类的 `initialize()` 方法所示，但我们传递的是 `filteredData` 包装器实例：\n\
    \n```\nnotesListTable.setItems(filteredData);\n```\n\n最后一步是告知我们的 `notesListTable`\
    \ 列（类型为 `TableColumn`）以及要渲染和处理的 Note 类的哪个属性。我们使用 `setCellValueFactory()` 方法来实现这一点，如下所示：\n\
    \n```\ntitleTc.setCellValueFactory(new PropertyValueFactory<>(\"title\"));\ndescriptionTc.setCellValueFactory(new\
    \ PropertyValueFactory<>(\"description\"));\n```\n\n请注意，`title` 和 `description`\
    \ 是 `Note` 类的实例变量名。\n\n查看最终项目代码以获取完整实现。然后，从 NetBeans 主菜单运行应用程序，选择“运行”，然后单击**运行主项目**。\n\
    \n尝试添加一条新笔记，并在表格视图中查看你新添加的笔记。尝试选择并删除笔记，或更新现有笔记。你将立即看到更改。\n\n通过检查应用程序代码，你将看到我们所做的只是操作数据列表，而所有其他同步工作都是借助\
    \ `ObservableList` 类完成的。\n"
- fmt: "# Filtering the TableView data list\n\nWe will get in touch here with two\
    \ of the most powerful Java SE 8 and JavaFX 8 features `Predicate` and `FilteredList`.\
    \ Let's state the problem we have at hand and how we are going to solve it with\
    \ the `stream` feature.\n\nIn our `ListNotesUI.fxml` page, you may notice the\
    \ text field located above the notes table; its purpose here is to filter the\
    \ current table data to narrow the result to get a specific note. Also, we need\
    \ to maintain the current list being careful not to remove any data from it or\
    \ query the database for each search hit.\n\nWe already have the notes data list\
    \ and we are going to use the text field to filter this list for any note title\
    \ or description containing this character or a combination of characters, as\
    \ shown here:\n\n![Filtering the TableView data list](graphics/B03998_03_10.jpg)\n\
    \nTable populated with data\n\nNow, after typing in `d`, `de`, `dev`, or `developing`,\
    \ `JavaFX`, a table will be filtered, as seen in the following screenshot. Also,\
    \ try to remove all the text; you will find that the data comes back again. Next,\
    \ we will discover how we did that.\n\n![Filtering the TableView data list](graphics/B03998_03_11.jpg)\n\
    \nTable data filtered with text in the search field\n\nThe following is the magical\
    \ piece of code that did that:\n\n```\nsearchNotes.setOnKeyReleased(e ->\n{\n\
    \  filteredData.setPredicate(n ->\n  {              \nif (searchNotes.getText()\
    \ == null || searchNotes.getText().isEmpty())\nreturn true;\n\nreturn n.getTitle().contains(searchNotes.getText())\n\
    || n.getDescription().contains(searchNotes.getText());\n  });\n});\n```\n\nThe\
    \ `searchNotes` is a reference to the text field we are using to filter the notes\
    \ data. We have registered it with a `setOnKeyReleased(EventHandler<? super KeyEvent>\
    \ value)` method that gets our text to filter once any character is typed in.\
    \ Also, note that we used the Lambda expression here to make the code more concise\
    \ and clean.\n\nInside the definition of the action method, `filteredData` is\
    \ a `FilteredList<Note>` class, we have passed a predicate `test()` method implementation\
    \ to `setPredicate(Predicate<? super E> predicate)` filter only the notes title\
    \ or a description matching the `searchNotes` text input.\n\nThe filtered data\
    \ is automatically updated to the table UI.\n\nFor more information about the\
    \ `Predicate` API, visit [http://docs.oracle.com/javase/8/docs/api/java/util/function/Predicate.html](http://docs.oracle.com/javase/8/docs/api/java/util/function/Predicate.html).\n\
    \n## Note-taking as a desktop application\n\nOnce you have finished the application,\
    \ it will be more professional to not distribute the final jar and instead ask\
    \ the user to install the JRE environment to be able to run your application,\
    \ especially if you targeting a large audience.\n\nIt's more professional to prepare\
    \ your native installer packages as `.exe`, `.msi`, `.dmg`. or `.img`.\n\nEvery\
    \ installer manages the application requirements from the required assets and\
    \ runtime environments. This ensures that your application will run on multiple\
    \ platforms too.\n\n### Deploying the application for desktop distribution\n\n\
    One of the advanced NetBeans features is to allow you to bundle your application\
    \ for different platforms via its deployment handler, which gives you the following\
    \ main features:\n\n* Deploy your application through native installers\n* Manage\
    \ application assets as application icons, splash screens, and native installer\
    \ icons\n* Accept the certificate for the final signing of your application when\
    \ preparing the final package\n* Manage the required JavaFX runtime version\n\
    * Adding desktop shortcuts of the Start menu when using Windows\n* Handling the\
    \ Java Web Start technology requirements and customizations\n\nLet's see the configuration\
    \ of NetBeans deployment:\n\n![Deploying the application for desktop distribution](graphics/B03998_03_12.jpg)\n\
    \nNetBeans deployment configurations\n\nTo know how to package your application\
    \ into the native installer for each platform you are targeting, visit the following\
    \ URL, which provides you with all the required steps and software to complete\
    \ the task:\n\n[https://netbeans.org/kb/docs/java/native_pkg.html](https://netbeans.org/kb/docs/java/native_pkg.html)\n\
    \n# JavaFX on the Web\n\nIn this section, we will learn about JavaFX on the Web\
    \ and how to deploy our note-taking application there.\n\n## WebEngine\n\nJavaFX\
    \ provides a non-GUI component capable of loading HTML5 content, called the **WebEngine**\
    \ API (`javafx.scene.web.WebEngine`). This API is basically an object instance\
    \ of the `WebEngine` class to be used to load a file containing HTML5 content.\
    \ The HTML5 file could be loaded from a local file system, a web server, or from\
    \ inside a JAR file.\n\nWhen a file is loaded using a web engine object, a background\
    \ thread is used to load the file content to not block the *JavaFX application\
    \ thread*.\n\nThe following are two `WebEngine` methods for loading HTML5 content:\n\
    \n* `load(String URL)`\n* `loadContent(String HTML)`\n\n## WebView\n\nJavaFX provides\
    \ a GUI `WebView` (`javafx.scene.web.WebView`) node that can render HTML5 content\
    \ onto the Scene graph. A `WebView` node is basically a mini-browser that is capable\
    \ of responding to web events and allows a developer to interact with the HTML5\
    \ content.\n\nBecause of the close relationship between loading web content and\
    \ the ability to display web content, the `WebView` node object also contains\
    \ a `WebEngine` instance.\n\nThe JavaFX 8 `WebView` class implementation provides\
    \ support for the following HTML5 features:\n\n* Canvas and SVG\n* Media playback\n\
    * Form controls\n* History maintenance\n* Interactive element tags\n* DOM\n* Web\
    \ workers\n* Web sockets\n* Web fonts"
