    \nTable populated with data\n\nNow, after typing in `d`, `de`, `dev`, or `developing`,\
    \ `JavaFX`, a table will be filtered, as seen in the following screenshot. Also,\
    \ try to remove all the text; you will find that the data comes back again. Next,\
    \ we will discover how we did that.\n\n![Filtering the TableView data list](graphics/B03998_03_11.jpg)\n\
    \nTable data filtered with text in the search field\n\nThe following is the magical\
    \ piece of code that did that:\n\n```\nsearchNotes.setOnKeyReleased(e ->\n{\n\
    \  filteredData.setPredicate(n ->\n  {              \nif (searchNotes.getText()\
    \ == null || searchNotes.getText().isEmpty())\nreturn true;\n\nreturn n.getTitle().contains(searchNotes.getText())\n\
    || n.getDescription().contains(searchNotes.getText());\n  });\n});\n```\n\nThe\
    \ `searchNotes` is a reference to the text field we are using to filter the notes\
    \ data. We have registered it with a `setOnKeyReleased(EventHandler<? super KeyEvent>\
    \ value)` method that gets our text to filter once any character is typed in.\
    \ Also, note that we used the Lambda expression here to make the code more concise\
    \ and clean.\n\nInside the definition of the action method, `filteredData` is\
    \ a `FilteredList<Note>` class, we have passed a predicate `test()` method implementation\
    \ to `setPredicate(Predicate<? super E> predicate)` filter only the notes title\
    \ or a description matching the `searchNotes` text input.\n\nThe filtered data\
    \ is automatically updated to the table UI.\n\nFor more information about the\
    \ Predicate API, visit [http://docs.oracle.com/javase/8/docs/api/java/util/function/Predicate.html](http://docs.oracle.com/javase/8/docs/api/java/util/function/Predicate.html).\n\
    \n## Note-taking as a desktop application\n\nOnce you have finished the application,\
    \ it will be more professional to not distribute the final jar and instead ask\
    \ the user to install the JRE environment to be able to run your application,\
    \ especially if you targeting a large audience.\n\nIt's more professional to prepare\
    \ your native installer packages as `.exe`, `.msi`, `.dmg`. or `.img`.\n\nEvery\
    \ installer manages the application requirements from the required assets and\
    \ runtime environments. This ensures that your application will run on multiple\
    \ platforms too.\n\n### Deploying the application for desktop distribution\n\n\
    One of the advanced NetBeans features is to allow you to bundle your application\
    \ for different platforms via its deployment handler, which gives you the following\
    \ main features:\n\n*   Deploy your application through native installers\n* \
    \  Manage application assets as application icons, splash screens, and native\
    \ installer icons\n*   Accept the certificate for the final signing of your application\
    \ when preparing the final package\n*   Manage the required JavaFX runtime version\n\
    *   Adding desktop shortcuts of the Start menu when using Windows\n*   Handling\
    \ the Java Web Start technology requirements and customizations\n\nLet's see the\
    \ configuration of NetBeans deployment:\n\n![Deploying the application for desktop\
    \ distribution](graphics/B03998_03_12.jpg)\n\nNetBeans deployment configurations\n\
    \nTo know how to package your application into the native installer for each platform\
    \ you are targeting, visit the following URL, which provides you with all the\
    \ required steps and software to complete the task:\n\n[https://netbeans.org/kb/docs/java/native_pkg.html](https://netbeans.org/kb/docs/java/native_pkg.html)\n\
    \n# JavaFX on the Web\n\nIn this section, we will learn about JavaFX on the Web\
    \ and how to deploy our note-taking application there.\n\n## WebEngine\n\nJavaFX\
    \ provides a non-GUI component capable of loading HTML5 content, called the **WebEngine**\
    \ API (`javafx.scene.web.WebEngine`). This API is basically an object instance\
    \ of the `WebEngine` class to be used to load a file containing HTML5 content.\
    \ The HTML5 file could be loaded from a local file system, a web server, or from\
    \ inside a JAR file.\n\nWhen a file is loaded using a web engine object, a background\
    \ thread is used to load the file content to not block the *JavaFX application\
    \ thread*.\n\nThe following are two `WebEngine` methods for loading HTML5 content:\n\
    \n*   load(String URL)\n*   loadContent(String HTML)\n\n## WebView\n\nJavaFX provides\
    \ a GUI `WebView` (`javafx.scene.web.WebView`) node that can render HTML5 content\
    \ onto the Scene graph. A `WebView` node is basically a mini-browser that is capable\
    \ of responding to web events and allows a developer to interact with the HTML5\
    \ content.\n\nBecause of the close relationship between loading web content and\
    \ the ability to display web content, the `WebView` node object also contains\
    \ a `WebEngine` instance.\n\nThe JavaFX 8 `WebView` class implementation provides\
    \ support for the following HTML5 features:\n\n*   Canvas and SVG\n*   Media playback\n\
    *   Form controls\n*   History maintenance\n*   Interactive element tags\n*  \
    \ DOM\n*   Web workers\n*   Web sockets\n*   Web fonts"
  trans: "\n#### 过滤 TableView 数据列表\n\n在此，我们将接触到 Java SE 8 和 JavaFX 8 两个最强大的特性：`Predicate`\
    \ 和 `FilteredList`。让我们说明当前面临的问题，以及如何利用 `stream` 特性来解决它。\n\n在我们的 `ListNotesUI.fxml`\
    \ 页面中，你可能会注意到笔记表格上方的文本字段；其作用是过滤当前表格数据，缩小结果范围以找到特定笔记。同时，我们需要维护当前列表，注意不要从中移除任何数据，也不要为每次搜索命中而查询数据库。\n\
    \n我们已经有了笔记数据列表，接下来将使用文本字段来过滤该列表，查找任何笔记标题或描述中包含该字符或字符组合的内容，如下图所示：\n\n![过滤 TableView\
    \ 数据列表](img/B03998_03_10.jpg)\n\n填充了数据的表格\n\n现在，输入 `d`、`de`、`dev` 或 `developing`、`JavaFX`\
    \ 后，表格将被过滤，如下截图所示。此外，尝试删除所有文本，你会发现数据会再次恢复。接下来，我们将揭示如何实现这一效果。\n\n![过滤 TableView\
    \ 数据列表](img/B03998_03_11.jpg)\n\n通过搜索字段中的文本过滤后的表格数据\n\n以下是实现这一功能的神奇代码片段：\n\n```\n\
    searchNotes.setOnKeyReleased(e ->\n{\n  filteredData.setPredicate(n ->\n  {  \
    \            \nif (searchNotes.getText() == null || searchNotes.getText().isEmpty())\n\
    return true;\n\nreturn n.getTitle().contains(searchNotes.getText())\n|| n.getDescription().contains(searchNotes.getText());\n\
    \  });\n});\n```\n\n`searchNotes` 是我们用于过滤笔记数据的文本字段的引用。我们为其注册了一个 `setOnKeyReleased(EventHandler<?\
    \ super KeyEvent> value)` 方法，一旦输入任何字符，该方法就会获取我们的文本进行过滤。同时，请注意我们在此处使用了 Lambda 表达式，使代码更加简洁清晰。\n\
    \n在动作方法的定义内部，`filteredData` 是一个 `FilteredList<Note>` 类，我们将一个谓词 `test()` 方法的实现传递给了\
    \ `setPredicate(Predicate<? super E> predicate)`，以仅过滤与 `searchNotes` 文本输入匹配的笔记标题或描述。\n\
    \n过滤后的数据会自动更新到表格 UI 中。\n\n有关 Predicate API 的更多信息，请访问 [`docs.oracle.com/javase/8/docs/api/java/util/function/Predicate.html`](http://docs.oracle.com/javase/8/docs/api/java/util/function/Predicate.html)。\n\
    \n## 作为桌面应用的笔记应用\n\n完成应用程序后，更专业的做法不是分发最终的 jar 文件，而是要求用户安装 JRE 环境才能运行你的应用程序，尤其是当你面向大量用户时。\n\
    \n更专业的做法是准备本机安装程序包，如 `.exe`、`.msi`、`.dmg` 或 `.img` 格式。\n\n每个安装程序都会管理应用程序所需的资源和运行时环境。这也能确保你的应用程序在多个平台上运行。\n\
    \n### 为桌面分发部署应用程序\n\nNetBeans 的高级特性之一是允许你通过其部署处理程序为不同平台打包应用程序，这提供了以下主要功能：\n\n\
    *   通过本机安装程序部署应用程序\n*   管理应用程序资源，如应用程序图标、启动画面和本机安装程序图标\n*   在准备最终包时接受应用程序最终签名的证书\n\
    *   管理所需的 JavaFX 运行时版本\n*   在 Windows 上添加开始菜单的桌面快捷方式\n*   处理 Java Web Start 技术的需求和自定义设置\n\
    \n让我们看看 NetBeans 部署的配置：\n\n![为桌面分发部署应用程序](img/B03998_03_12.jpg)\n\nNetBeans 部署配置\n\
    \n要了解如何将应用程序打包成针对每个目标平台的本机安装程序，请访问以下 URL，其中提供了完成该任务所需的所有步骤和软件：\n\n[`netbeans.org/kb/docs/java/native_pkg.html`](https://netbeans.org/kb/docs/java/native_pkg.html)\n\
    \n# Web 上的 JavaFX\n\n在本节中，我们将了解 Web 上的 JavaFX，以及如何将我们的笔记应用部署到 Web 上。\n\n## WebEngine\n\
    \nJavaFX 提供了一个能够加载 HTML5 内容的非 GUI 组件，称为 **WebEngine** API（`javafx.scene.web.WebEngine`）。该\
    \ API 本质上是 `WebEngine` 类的一个对象实例，用于加载包含 HTML5 内容的文件。HTML5 文件可以从本地文件系统、Web 服务器或\
    \ JAR 文件内部加载。\n\n当使用 Web 引擎对象加载文件时，会使用后台线程来加载文件内容，以避免阻塞 *JavaFX 应用程序线程*。\n\n以下是两个用于加载\
    \ HTML5 内容的 `WebEngine` 方法：\n\n*   load(String URL)\n*   loadContent(String HTML)\n\
    \n## WebView\n\nJavaFX 提供了一个 GUI `WebView`（`javafx.scene.web.WebView`）节点，可以将 HTML5\
    \ 内容渲染到场景图上。`WebView` 节点本质上是一个迷你浏览器，能够响应 Web 事件，并允许开发者与 HTML5 内容进行交互。\n\n由于加载\
    \ Web 内容与显示 Web 内容之间的紧密关系，`WebView` 节点对象也包含一个 `WebEngine` 实例。\n\nJavaFX 8 的 `WebView`\
    \ 类实现支持以下 HTML5 特性：\n\n*   Canvas 和 SVG\n*   媒体播放\n*   表单控件\n*   历史记录维护\n*   交互式元素标签\n\
    *   DOM\n*   Web Workers\n*   Web Sockets\n*   Web 字体\n"
- fmt: "### WebView and engine in action\n\nWe are going to have a simple example\
    \ of how to load an HTML5 web document that contains Google Maps integrated with\
    \ JavaFX as the scene control using `WebView`. We then use `WebEngine` to get\
    \ the longitude and latitude from the JavaFX `TextField` controls to execute a\
    \ JavaScript method that passes those parameters to position the map to be centered\
    \ to the newly passed position with the marker indication, as shown in the following\
    \ figure:\n\n![WebView and engine in action](graphics/B03998_03_13.jpg)\n\nThe\
    \ Google Maps viewer from the JavaFX 8 application\n\nFor the sake of clarity,\
    \ I will show and explain only the important parts of the code, which demonstrates\
    \ the concept mentioned in the preceding paragraph. For the complete code in this\
    \ chapter, check the `web` package code `GoogleMapViewerFX.java` class and `map.html`\
    \ file.\n\nTo view Google Maps inside the JavaFX application, we need to first\
    \ create an HTML file to load and integrate with the Maps API, and this is defined\
    \ in the `map.html` file. As seen in the preceding picture, the location is centered\
    \ on Cairo, Egypt, my city, and this is set as the longitude and latitude values\
    \ passed to the map when we create it, as in the following code snippet:\n\n```\n\
    var latlng = new google.maps.LatLng(30.0594885, 31.2584644);\nvar Options = {\n\
    \    zoom: 13,\n    center: latlng,\n    mapTypeId: google.maps.MapTypeId.ROADMAP\n\
    };\nvar map = new google.maps.Map(document.getElementById(\"canvas\"), Options);\n\
    ```\n\nNext, we have to notice the JavaScript `goToLocation(lng, lat)` method;\
    \ this will be called from the JavaFX application using the `webEngine` instance\
    \ to position the map based on the passed longitude and latitude from the JavaFX\
    \ controls.\n\nInside `GoogleMapViewerFX.java`, we have created four controls\
    \ to compose our UI – two `TextField` classes for the longitude and latitude,\
    \ one update button, and a `WebView` object to view the `map.html` document:\n\
    \n```\nWebView webView = new WebView();\nWebEngine webEngine = webView.getEngine();\n\
    final TextField latitude = new TextField(\"\" + 29.8770037);\nfinal TextField\
    \ longitude = new TextField(\"\" + 31.3154412);\nButton update = new Button(\"\
    Update\");\n```\n\nNote that I have created text controls with the initial longitude\
    \ and latitude, which is different from the original map position. This position\
    \ is my home position, and you can change it to yours and hit update to view the\
    \ new position.\n\nTo load the `map.html` file, we have to pass it to the `WebEngine`\
    \ class that we created from the `WebView` class we have created already, as seen\
    \ in the previous code snippet.\n\nImplement the button's `onAction()` method\
    \ to allow integration between JavaFX controls and JavaScript using the `webEngine`\
    \ `executeScript()` method, as in the following code:\n\n```\nupdate.setOnAction(evt\
    \ -> {\n   double lat = Double.parseDouble(latitude.getText());\n   double lon\
    \ = Double.parseDouble(longitude.getText());\n\n   webEngine.executeScript(\"\"\
    \ +\n             \"window.lat = \" + lat + \";\" +\n             \"window.lon\
    \ = \" + lon + \";\" +\n             \"document.goToLocation(window.lat, window.lon);\"\
    );\n});\n```\n\nRun the application and you should see the previous figure positioned\
    \ to Cairo city! Hit update and you should reach my home, as seen in the following\
    \ figure.\n\nTry getting your position longitude and latitude; then go to your\
    \ home too!\n\nPowerful, isn't it? It is very easy to integrate HTML5 content\
    \ and interact with already developed web applications to add more rich content\
    \ from the Web to your existing JavaFX application.\n\n![WebView and engine in\
    \ action](graphics/B03998_03_14.jpg)\n\nChange the Google Map position in the\
    \ JavaFX 8 application\n\n## Note-taking as a web application\n\nOnce your application\
    \ is tested, as we have discussed before, you can distribute your application\
    \ to multiple platforms and environments. We did that already for desktops with\
    \ native installers using the distributed in this chapter, `.jar` file under the\
    \ project's `dist` folder.\n\nThe same `.jar` file will be used for web deployment,\
    \ and the application could be deployed as a web application in many ways, as\
    \ we will see next.\n\n### Running the application for the Web\n\nThere are three\
    \ ways to run your JavaFX application on the Web:\n\n1.  Using **Java Web Start**\
    \ to download and start your application once; then, you can use it offline from\
    \ your machine\n2.  Embed your JAR into your HTML file to run from an enterprise\
    \ environment\n3.  Load your HTML content from the `WebEngine` class and view\
    \ it from the `WebView` class, as discussed previously\n\n#### Java Web Start\n\
    \nThe Java Web Start software provides the power to launch full-featured applications\
    \ with a single click. Users can download and launch applications, such as a complete\
    \ spreadsheet program or an Internet chat client, without going through lengthy\
    \ installation procedures.\n\nWith Java Web Start, users can launch a Java application\
    \ by clicking on a link on a web page. The link points to a **JNLP** (**Java Network\
    \ Launch Protocol**) file, which instructs Java Web Start to download, cache,\
    \ and run the application.\n\nJava Web Start provides Java developers and users\
    \ with many deployment advantages:\n\n*   With Java Web Start, you can place a\
    \ single Java application on a web server for deployment to a wide variety of\
    \ platforms, including Windows, Linux, and Solaris.\n*   It supports multiple\
    \ simultaneous versions of the Java platform. An application can request a specific\
    \ version of the Java Runtime Environment (JRE) software without conflicting with\
    \ the needs of other applications.\n*   Users can create a desktop shortcut to\
    \ launch a Java Web Start application outside a browser.\n*   Java Web Start takes\
    \ advantage of the inherent security of the Java platform. By default, applications\
    \ have restricted access to local disk and network resources.\n*   Applications\
    \ launched with Java Web Start are cached locally for improved performance.\n\
    *   Updates to a Java Web Start application are automatically downloaded when\
    \ the application is run standalone from the user's desktop.\n\nJava Web Start\
    \ is installed as part of the JRE software. Users do not have to install Java\
    \ Web Start separately or perform additional tasks to use Java Web Start applications.\n\
    \nFor more information about **Java Web Start**, see the following links:\n\n\
    *   Java Web Start Guide ([http://docs.oracle.com/javase/8/docs/technotes/guides/javaws/developersguide/contents.html](http://docs.oracle.com/javase/8/docs/technotes/guides/javaws/developersguide/contents.html))\n\
    *   The `javax.jnlp` API Documentation ([http://docs.oracle.com/javase/8/docs/jre/api/javaws/jnlp/index.html](http://docs.oracle.com/javase/8/docs/jre/api/javaws/jnlp/index.html))\n\
    *   The Java Web Start Developers Site ([http://www.oracle.com/technetwork/java/javase/javawebstart/index.html](http://www.oracle.com/technetwork/java/javase/javawebstart/index.html))\n\
    \n### Deploying the application for a web distribution\n\nTo deploy your JavaFX\
    \ applications on to the Web, there is a very simple way using NetBeans.\n\nNetBeans\
    \ already provides three deployment types for your JavaFX application – desktop,\
    \ Java Web Start, and Web-as seen in the following figure:\n\n![Deploying the\
    \ application for a web distribution](graphics/B03998_03_15.jpg)"
