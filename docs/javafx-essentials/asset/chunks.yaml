    For more about JavaFX CSS, see the Skinning JavaFX Applications with CSS document\
    \ and the reference guide at [http://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html](http://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html)."
  trans: "\n## Lambda 表达式\n\nJava 语言中 **lambda** 项目的首要目标是解决函数式编程缺失的问题，并提供一种通过创建匿名（未命名）函数来轻松实现函数式编程的方式，其方式类似于在\
    \ Java 中创建匿名对象而非方法。\n\n正如你在第 1 章的示例中所见，*JavaFX 8 入门*，我们讨论了为 JavaFX 按钮的按下事件定义处理器的常规方法——使用匿名内部类：\n\
    \n```\nbtn.setOnAction(new EventHandler<ActionEvent>() {\n   @Override\n   public\
    \ void handle(ActionEvent event) {\n     message.setText(\"Hello World! JavaFX\
    \ style :)\");\n   }\n});\n```\n\n这段代码与仅仅编写一行设置按钮动作中消息文本字段 `text` 属性的代码相比，显得非常冗长。如果能重写这段包含逻辑的代码，而无需这么多样板代码，那该多好啊？\n\
    \nJava SE 8 通过 Lambda 表达式解决了这个问题，如下所示：\n\n```\nbtn.setOnAction(event -> {\n  \
    \  message.setText(\"Hello World! JavaFX style :)\");\n});\n```\n\n除了使代码更简洁易读之外，lambda\
    \ 表达式还能让你的代码性能更佳。\n\n### 语法\n\n编写 lambda 表达式有两种方式，其通用形式如下图所示：\n\n![语法](img/B03998_02_04.jpg)\n\
    \nLambda 表达式通用形式——以创建新线程为例\n\n这两种方式如下：\n\n*   `(param1, param2, ...) -> expression;`\n\
    *   `(param1, param2, ...) -> { /* 代码语句 */ };`\n\n第一种形式，即表达式形式，用于我们只分配一行代码或一个简单表达式的情况。而第二种形式，即代码块形式，包含单行或多行代码体，并带有\
    \ return 语句，因此我们需要用花括号将它们括起来。\n\n以下三条语句是等价的：\n\n*   `btn.setOnAction((ActionEvent\
    \ event) -> {message.setText(\"Hello World!\");});`\n*   `btn.setOnAction( (event)\
    \ -> message.setText(\"Hello World!\"));`\n*   `btn.setOnAction(event -> message.setText(\"\
    Hello World!\"));`\n\n### 提示\n\n为了更深入地了解新的 lambda 表达式及其相关特性，以及 Java SE 8 的功能，我建议你阅读这个系列文章——Java\
    \ SE 8 新特性之旅：[`tamanmohamed.blogspot.com/2014/06/java-se-8-new-features-tour-big-change.html`](http://tamanmohamed.blogspot.com/2014/06/java-se-8-new-features-tour-big-change.html)\n\
    \n## 函数式接口\n\nLambda 表达式很棒，不是吗？但你可能想知道它的确切类型是什么，这样它才能被赋值给变量并传递给方法。\n\n答案在于函数式接口的强大功能。如何实现呢？函数式接口由\
    \ Java 语言设计者/架构师巧妙地创建为闭包，它使用了**单一抽象方法**（**SAM**）的概念，提供了一个仅包含一个抽象方法的接口，以及 `@FunctionalInterface`\
    \ 注解。单一抽象方法模式是 Java SE 8 lambda 表达式不可或缺的一部分。\n\n让我们通过一个示例来阐明函数式接口和 lambda 表达式的概念。我创建了一个名为\
    \ `Calculator.java` 的函数式接口，其中包含一个名为 `calculate()` 的单一抽象方法。一旦创建完成，你就可以声明变量并将 lambda\
    \ 表达式赋值给它们。以下是该函数式接口：\n\n```\n@FunctionalInterface\npublic interface Calculator\
    \ {\n    double calculate(double width, double height);\n}\n```\n\n现在，我们准备创建变量并将\
    \ lambda 表达式赋值给它们。以下代码创建了 lambda 表达式并将其赋值给我们的函数式接口变量：\n\n```\nCalculator area\
    \ = (width, height) -> width * height; //面积 = 宽 × 高\n//周长 = 2(宽+高)\nCalculator\
    \ perimeter = (width, height) -> 2 * (height + width);\nout.println(\"矩形面积: \"\
    + area.calculate(4, 5)+\" 厘米.\");\nout.println(\"矩形周长: \"+ perimeter.calculate(4,\
    \ 5)+\" 厘米.\");\n```\n\n代码的输出应如下所示：\n\n```\n矩形面积: 20.0 厘米.\n矩形周长: 18.0 厘米.\n```\n\
    \n# 主题化\n\n当与设计师和 UX/UI 专家合作时，你会听到关于为应用程序换肤或更改其外观的说法。这两个术语通常可以互换使用，并且都反映了*主题化*的基本概念。\n\
    \n主题化的思想是通过更改控件的样式来改变整个应用程序的风格，而不改变其底层功能。\n\n在 JavaFX 中，你可以创建、修改或使用现有主题来为你的应用程序、场景甚至只是一个\
    \ UI 控件换肤。\n\n## CSS\n\nJavaFX **层叠样式表**（**CSS**）可以应用于 JavaFX 场景图中的任何节点；它们是异步应用于节点的。样式也可以在运行时轻松地分配给场景，从而允许应用程序的外观动态变化。\n\
    \n它基于 W3C CSS 2.1 规范，并且目前兼容当前版本 3 工作草案中的一些新增内容。JavaFX CSS 支持和扩展的设计允许任何兼容的 CSS\
    \ 解析器干净地解析 JavaFX CSS 样式表。这使得可以将用于 JavaFX 的 CSS 样式与用于其他目的（例如 HTML 页面）的 CSS 样式混合到单个样式表中。\n\
    \n所有 JavaFX 属性名称都带有 `-fx-` 扩展前缀，包括那些看起来可能与标准 HTML CSS 兼容的属性，因为某些 JavaFX 值的语义与标准值略有不同。\n\
    \n### 注意\n\n有关 JavaFX CSS 的更多信息，请参阅《使用 CSS 为 JavaFX 应用程序换肤》文档以及位于 [`docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html`](http://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html)\
    \ 的参考指南。\n"
- fmt: "### Applying CSS theme\n\nHere is a custom simple JavaFX CSS rule, `ButtonStyle.css`,\
    \ that is to be used in our theming process to theme a button:\n\n```css\n/* ButtonStyle.css\
    \ */\n.button {\n-fx-text-fill: SKYBLUE;\n-fx-border-color: rgba(255, 255, 255,\
    \ .80);\n-fx-border-radius: 8;\n-fx-padding: 6 6 6 6;\n-fx-font: bold italic 20pt\
    \ \"Arial\";\n}\n```\n\nWe have two ways to apply CSS style sheets to change the\
    \ look-and-feel theming of our JavaFX applications:\n\n1. Using a JavaFX Application\
    \ (`javafx.application.Application`) class static method `setUserAgentStylesheet(String\
    \ URL)` method, which styles all the application hierarchy, including every scene\
    \ and all child nodes in a JavaFX application. It is used as follows:\n\n    ```java\n\
    \    Application.setUserAgentStylesheet(getClass().getResource(\"ButtonStyle.css\"\
    ).toExternalForm());\n    ```\n\n    Now you can use JavaFX 8's two style sheets\
    \ that currently come preshipped, Caspian and Modena, and we can switch between\
    \ them using the same method as shown here:\n\n    ```java\n    // Switch to JavaFX\
    \ 2.x's CASPIAN Look and Feel.\n    Application.setUserAgentStylesheet(STYLESHEET_CASPIAN);\n\
    \n    // Switch to JavaFX 8's Modena Look and Feel.\n    Application.setUserAgentStylesheet(STYLESHEET_MODENA);\n\
    \    ```\n\n    ### Tip\n\n    If you are invoking `setUserAgentStylesheet(null)`\
    \ by passing a null value, the default look and feel will be loaded (in this case,\
    \ Modena) whereas, if you are using JavaFX 2.x Caspian, the default one will be\
    \ loaded.\n\n2. Using scene's `getStylesheets().add(String URL)` method will style\
    \ the individual scene and its child node automatically as follows:\n\n    ```java\n\
    \    Application.setUserAgentStylesheet(null); // defaults to Modena\n    // apply\
    \ custom look and feel to the scene.\n    scene.getStylesheets()\n    .add(getClass().getResource(\"\
    ButtonStyle.css\")\n    .toExternalForm());\n    ```\n\n    Basically, the default\
    \ theme (Modena) will be loaded, as `Application.setUserAgentStylesheet(null)`\
    \ is called. It then sets the scene's additional styling by invoking the `getStylesheets().add()`\
    \ method.\n\nStyles are first applied to the parent and then to its children.\
    \ A node is styled after it is added to the scene graph, regardless of whether\
    \ it's shown or not.\n\nThe JavaFX CSS implementation applies the following order\
    \ of precedence – a style from a user agent style sheet has lower priority than\
    \ a value set from code, which has lower priority than a Scene or Parent style\
    \ sheet.\n\nInline styles have the highest precedence. Style sheets from a Parent\
    \ instance are considered to be more specific than styles from Scene style sheets.\n\
    \n# Scene Builder\n\nFor most complex and sophisticated UI requirements, wouldn't\
    \ it be easier for designers to use a tool to design their UI with a WYSIWYG interface,\
    \ without writing any code, and then load the result (`FXML` file) into their\
    \ JavaFX application logic?\n\nTherefore, you need JavaFX Scene Builder; it is\
    \ a visual layout tool that allows you to easily lay out your UI controls so that\
    \ you can quickly prototype your application with effects and animations. Scene\
    \ Builder (version 2.0 upwards) is the compatible version for JavaFX 8.\n\nAt\
    \ any time during the creation of your project, you can preview your work to check\
    \ its real appearance before deploying it.\n\nIt is open source and therefore\
    \ it integrates with most IDEs, but more tightly with the NetBeans IDE. It is\
    \ also a cross-platform, self-contained application that runs on most platforms.\n\
    \nIn addition to supporting CSS, it allows you to easily apply custom theming\
    \ to your prototype.\n\n## Downloading and launching\n\nAt the beginning of 2015,\
    \ Oracle release JavaFX Scene Builder tool version 2.0, and announced that it\
    \ will no longer be providing builds of the JavaFX Scene Builder tool (in compiled\
    \ form).\n\nA company called **Gluon** ([http://gluonhq.com](http://gluonhq.com))\
    \ understands that tools can make or break a coding experience. So they have decided\
    \ to begin providing builds, based on a fork they will maintain in a publicly\
    \ accessible repository.\n\nGluon provides IDE plugins, as well as improved builds\
    \ of the JavaFX Scene Builder tool based on the latest sources from OpenJFX, with\
    \ additional improvements based on community involvement and a desire to better\
    \ support third party projects such as **ControlsFX** ([http://www.controlsfx.org/](http://www.controlsfx.org/)),\
    \ **FXyz** ([https://github.com/FXyz/FXyz](https://github.com/FXyz/FXyz)), and\
    \ **DataFX** ([http://www.datafx.io/](http://www.datafx.io/)).\n\nTo get started\
    \ let's download the tool from the following URL [http://gluonhq.com/products/downloads/](http://gluonhq.com/products/downloads/).\n\
    \nAfter downloading version 8.0 and installing it, launch it and the Scene Builder\
    \ tool should open as in the following screenshot:\n\n![Downloading and launching](graphics/B03998_02_05.jpg)\n\
    \nThe JavaFX 8 Scene Builder tool.\n\n## FXML\n\nWhile adding components and building\
    \ your beautiful UI layout, Scene Builder under the hood generates a FXML - and\
    \ XML-based markup file for you automatically, which will be used later to be\
    \ bind your UI to your Java application logic.\n\nOne of the main advantages FXML\
    \ provide is separation of concerns, as it decouples UI layer (*view*) from logic\
    \ (*Controller*); this means you can alter UI at anytime without changing underlying\
    \ logic. Since the FXML file is not compiled, it can be dynamically loaded at\
    \ runtime without any required compilation. This means it helps you with rapid\
    \ prototyping.\n\n### Loading FXML into JavaFX applications\n\nIt is very easy\
    \ task to add your UI design after generating it from the Scene Builder tool.\
    \ Shown here is code to load an FXML file in a `start()` method:\n\n```java\n\
    BorderPane root = new BorderPane();\nParent content = FXMLLoader.load(getClass().getResource(\"\
    filename.fxml\"));\nroot.setCenter(content);\n```\n\nAs you can see, I am using\
    \ the static method `load` on the `javafx.fxml.FXMLLoader` class, The `load()`\
    \ method will load (`deserialize`) the FXML file that was created by the Scene\
    \ Builder tool.\n\n# Developing a custom UI\n\nFor the final part of this chapter,\
    \ we are going to develop a custom UI component based on JavaFX 8 built-in controls.\n\
    \nWe will develop this custom UI with concepts discussed before that are based\
    \ on FXML; the primary advantage is the separation of concerns to customize the\
    \ component later on without altering its functionality and any other logic bound\
    \ to it.\n\n## The Login dialog custom UI\n\nWe will use most of the previously\
    \ covered tools and techniques to develop our custom UI: the Login Dialog, which\
    \ is a necessary component in every Enterprise application. Our UI component will\
    \ be as shown in the following screenshot:\n\n![The Login dialog custom UI](graphics/B03998_02_06.jpg)\n\
    \nLogin custom UI component\n\n### Structure of the Login dialog custom UI\n\n\
    The most common structure and stages in custom component development based on\
    \ FXML markup are these:\n\n* Develop the UI inside the Scene Builder tool; then\
    \ export the result to the FXML-based file\n* Extract the controller skeleton\
    \ from the Scene builder\n* Create a controller that binds the UI (view) to its\
    \ logic and extends either a control or a layout\n* Load the FXML file inside\
    \ the Controller constructor\n* Create an initialization method that makes sure\
    \ that all FXML controls are initialized and loaded successfully\n* Expose public\
    \ attributes to get and set control data and action methods that need our implementation\
    \ logic\n* Develop a separate CSS file\n* Use the custom component inside your\
    \ application"
  raw: "### Applying CSS theme\n\nHere is a custom simple JavaFX CSS rule, `ButtonStyle.css`,\
    \ that is to be used in our theming process to theme a button:\n\n```\n/* ButtonStyle.css\
    \ */\n.button {\n-fx-text-fill: SKYBLUE;\n-fx-border-color: rgba(255, 255, 255,\
    \ .80);\n-fx-border-radius: 8;\n-fx-padding: 6 6 6 6;\n-fx-font: bold italic 20pt\
    \ \"Arial\";\n}\n```\n\nWe have two ways to apply CSS style sheets to change the\
    \ look-and-feel theming of our JavaFX applications:\n\n1.  Using a JavaFX Application\
    \ (`javafx.application.Application`) class static method `setUserAgentStylesheet(String\
    \ URL)` method, which styles all the application hierarchy, including every scene\
    \ and all child nodes in a JavaFX application. It is used as follows:\n\n    ```\n\
    \    Application.setUserAgentStylesheet(getClass().getResource(\"ButtonStyle.css\"\
    ).toExternalForm());\n    ```\n\n    Now you can use JavaFX 8's two style sheets\
    \ that currently come preshipped, Caspian and Modena, and we can switch between\
    \ them using the same method as shown here:\n\n    ```\n    // Switch to JavaFX\
    \ 2.x's CASPIAN Look and Feel.\n    Application.setUserAgentStylesheet(STYLESHEET_CASPIAN);\n\
    \n    // Switch to JavaFX 8's Modena Look and Feel.\n    Application.setUserAgentStylesheet(STYLESHEET_MODENA);\n\
    \    ```\n\n    ### Tip\n\n    If you are invoking `setUserAgentStylesheet(null)`\
    \ by passing a null value, the default look and feel will be loaded (in this case,\
    \ Modena) whereas, if you are using JavaFX 2.x Caspian, the default one will be\
    \ loaded.\n\n2.  Using scene's `getStylesheets().add(String URL)` method will\
    \ style the individual scene and its child node automatically as follows:\n\n\
    \    ```\n    Application.setUserAgentStylesheet(null); // defaults to Modena\n\
    \    // apply custom look and feel to the scene.\n    scene.getStylesheets()\n\
    \    .add(getClass().getResource(\"ButtonStyle.css\")\n    .toExternalForm());\n\
    \    ```\n\n    Basically, the default theme (Modena) will be loaded, as `Application.setUserAgentStylesheet(null)`\
    \ is called. It then sets the scene's additional styling by invoking the `getStylesheets().add()`\
    \ method.\n\nStyles are first applied to the parent and then to its children.\
    \ A node is styled after it is added to the scene graph, regardless of whether\
    \ it's shown or not.\n\nThe JavaFX CSS implementation applies the following order\
    \ of precedence – a style from a user agent style sheet has lower priority than\
    \ a value set from code, which has lower priority than a Scene or Parent style\
    \ sheet.\n\nInline styles have the highest precedence. Style sheets from a Parent\
    \ instance are considered to be more specific than styles from Scene style sheets.\n\
    \n# Scene Builder\n\nFor most complex and sophisticated UI requirements, wouldn't\
    \ it be easier for designers to use a tool to design their UI with a WYSIWYG interface,\
    \ without writing any code, and then load the result (`FXML` file) into their\
    \ JavaFX application logic?\n\nTherefore, you need JavaFX Scene Builder; it is\
    \ a visual layout tool that allows you to easily lay out your UI controls so that\
    \ you can quickly prototype your application with effects and animations. Scene\
    \ Builder (version 2.0 upwards) is the compatible version for JavaFX 8.\n\nAt\
    \ any time during the creation of your project, you can preview your work to check\
    \ its real appearance before deploying it.\n\nIt is open source and therefore\
    \ it integrates with most IDEs, but more tightly with the NetBeans IDE. It is\
    \ also a cross-platform, self-contained application that runs on most platforms.\n\
    \nIn addition to supporting CSS, it allows you to easily apply custom theming\
    \ to your prototype.\n\n## Downloading and launching\n\nAt the beginning of 2015,\
    \ Oracle release JavaFX Scene Builder tool version 2.0, and announced that it\
    \ will no longer be providing builds of the JavaFX Scene Builder tool (in compiled\
    \ form).\n\nA company called **Gluon** ([http://gluonhq.com](http://gluonhq.com))\
    \ understands that tools can make or break a coding experience. So they have decided\
    \ to begin providing builds, based on a fork they will maintain in a publicly\
    \ accessible repository.\n\nGluon provides IDE plugins, as well as improved builds\
    \ of the JavaFX Scene Builder tool based on the latest sources from OpenJFX, with\
    \ additional improvements based on community involvement and a desire to better\
    \ support third party projects such as **ControlsFX** ([http://www.controlsfx.org/](http://www.controlsfx.org/)),\
    \ **FXyz** ([https://github.com/FXyz/FXyz](https://github.com/FXyz/FXyz)), and\
    \ **DataFX** ([http://www.datafx.io/](http://www.datafx.io/)).\n\nTo get started\
    \ let's download the tool from the following URL [http://gluonhq.com/products/downloads/](http://gluonhq.com/products/downloads/).\n\
    \nAfter downloading version 8.0 and installing it, launch it and the Scene Builder\
    \ tool should open as in the following screenshot:\n\n![Downloading and launching](graphics/B03998_02_05.jpg)\n\
    \nThe JavaFX 8 Scene Builder tool.\n\n## FXML\n\nWhile adding components and building\
    \ your beautiful UI layout, Scene Builder under the hood generates a FXML - and\
    \ XML-based markup file for you automatically, which will be used later to be\
    \ bind your UI to your Java application logic.\n\nOne of the main advantages FXML\
    \ provide is separation of concerns, as it decouples UI layer (*view*) from logic\
    \ (*Controller*); this means you can alter UI at anytime without changing underlying\
    \ logic. Since the FXML file is not compiled, it can be dynamically loaded at\
    \ runtime without any required compilation. This means it helps you with rapid\
    \ prototyping.\n\n### Loading FXML into JavaFX applications\n\nIt is very easy\
    \ task to add your UI design after generating it from the Scene Builder tool.\
    \ Shown here is code to load an FXML file in a `start()` method:\n\n```\nBorderPane\
    \ root = new BorderPane();\nParent content = FXMLLoader.load(getClass().getResource(\"\
    filename.fxml\"));\nroot.setCenter(content);\n```\n\nAs you can see, I am using\
    \ the static method load on the `javafx.fxml.FXMLLoaderclass`, The `load()` method\
    \ will load (`deserialize`) the FXML file that was created by the Scene Builder\
    \ tool.\n\n# Developing a custom UI\n\nFor the final part of this chapter, we\
    \ are going to develop a custom UI component based on JavaFX 8 built-in controls.\n\
    \nWe will develop this custom UI with concepts discussed before that are based\
    \ on FXML; the primary advantage is the separation of concerns to customize the\
    \ component later on without altering its functionality and any other logic bound\
    \ to it.\n\n## The Login dialog custom UI\n\nWe will use most of the previously\
    \ covered tools and techniques to develop our custom UI: the Login Dialog, which\
    \ is a necessary component in every Enterprise application. Our UI component will\
    \ be as shown in the following screenshot:\n\n![The Login dialog custom UI](graphics/B03998_02_06.jpg)\n\
    \nLogin custom UI component\n\n### Structure of the Login dialog custom UI\n\n\
    The most common structure and stages in custom component development based on\
    \ FXML markup are these:\n\n*   Develop the UI inside the Scene Builder tool;\
    \ then export the result to the FXML-based file\n*   Extract the controller skeleton\
    \ from the Scene builder\n*   Create a controller that binds the UI (view) to\
    \ its logic and extends either a control or a layout\n*   Load the FXML file inside\
    \ the Controller constructor\n*   Create an initialization method that makes sure\
    \ that all FXML controls are initialized and loaded successfully\n*   Expose public\
    \ attributes to get and set control data and action methods that need our implementation\
    \ logic\n*   Develop a separate CSS file\n*   Use the custom component inside\
    \ your application"
  trans: "\n### 应用 CSS 主题\n\n以下是一个自定义的简单 JavaFX CSS 规则文件 `ButtonStyle.css`，它将在我们的主题化过程中用于为按钮设置主题：\n\
    \n```\n/* ButtonStyle.css */\n.button {\n-fx-text-fill: SKYBLUE;\n-fx-border-color:\
    \ rgba(255, 255, 255, .80);\n-fx-border-radius: 8;\n-fx-padding: 6 6 6 6;\n-fx-font:\
    \ bold italic 20pt \"Arial\";\n}\n```\n\n我们有两种方法应用 CSS 样式表来更改 JavaFX 应用程序的外观主题：\n\
    \n1.  使用 JavaFX 应用程序（`javafx.application.Application`）类的静态方法 `setUserAgentStylesheet(String\
    \ URL)`，该方法会为整个应用程序层级设置样式，包括 JavaFX 应用程序中的每个场景及其所有子节点。使用方法如下：\n\n    ```\n   \
    \ Application.setUserAgentStylesheet(getClass().getResource(\"ButtonStyle.css\"\
    ).toExternalForm());\n    ```\n\n    现在，你可以使用 JavaFX 8 预装的两个样式表：Caspian 和 Modena，并且我们可以使用相同的方法在它们之间切换，如下所示：\n\
    \n    ```\n    // 切换到 JavaFX 2.x 的 CASPIAN 外观。\n    Application.setUserAgentStylesheet(STYLESHEET_CASPIAN);\n\
    \n    // 切换到 JavaFX 8 的 Modena 外观。\n    Application.setUserAgentStylesheet(STYLESHEET_MODENA);\n\
    \    ```\n\n    ### 提示\n\n    如果你通过传递 `null` 值来调用 `setUserAgentStylesheet(null)`，则会加载默认外观（此处为\
    \ Modena）；而如果你使用的是 JavaFX 2.x Caspian，则会加载默认的 Caspian 外观。\n\n2.  使用场景的 `getStylesheets().add(String\
    \ URL)` 方法将自动为单个场景及其子节点设置样式，如下所示：\n\n    ```\n    Application.setUserAgentStylesheet(null);\
    \ // 默认为 Modena\n    // 为场景应用自定义外观。\n    scene.getStylesheets()\n    .add(getClass().getResource(\"\
    ButtonStyle.css\")\n    .toExternalForm());\n    ```\n\n    基本上，由于调用了 `Application.setUserAgentStylesheet(null)`，会加载默认主题（Modena）。然后，通过调用\
    \ `getStylesheets().add()` 方法为场景设置额外的样式。\n\n样式首先应用于父节点，然后应用于其子节点。节点在添加到场景图后即被设置样式，无论其是否显示。\n\
    \nJavaFX CSS 实现遵循以下优先级顺序——来自用户代理样式表的样式优先级低于来自代码设置的值，而来自代码设置的值优先级又低于场景或父节点的样式表。\n\
    \n内联样式具有最高优先级。来自父节点实例的样式表被认为比来自场景样式表的样式更具体。\n\n# Scene Builder\n\n对于大多数复杂且精细的\
    \ UI 需求，设计师使用一种工具，通过所见即所得的界面来设计 UI，无需编写任何代码，然后将结果（`FXML` 文件）加载到他们的 JavaFX 应用程序逻辑中，这样不是更容易吗？\n\
    \n因此，你需要 JavaFX Scene Builder；它是一个可视化布局工具，允许你轻松布局 UI 控件，以便快速构建带有效果和动画的应用程序原型。Scene\
    \ Builder（2.0 及以上版本）是与 JavaFX 8 兼容的版本。\n\n在项目创建过程中的任何时候，你都可以预览你的工作，以检查其在实际部署前的真实外观。\n\
    \n它是开源的，因此可以与大多数 IDE 集成，但与 NetBeans IDE 的集成更为紧密。它也是一个跨平台、自包含的应用程序，可在大多数平台上运行。\n\
    \n除了支持 CSS 之外，它还允许你轻松地为原型应用自定义主题。\n\n## 下载与启动\n\n2015 年初，Oracle 发布了 JavaFX Scene\
    \ Builder 工具 2.0 版本，并宣布将不再提供 JavaFX Scene Builder 工具（编译形式）的构建版本。\n\n一家名为 **Gluon**\
    \ ([`gluonhq.com`](http://gluonhq.com)) 的公司深知工具可以成就或破坏编码体验。因此，他们决定开始提供基于他们将在公开可访问的仓库中维护的一个分支的构建版本。\n\
    \nGluon 提供 IDE 插件，以及基于 OpenJFX 最新源码改进的 JavaFX Scene Builder 工具构建版本，这些改进源于社区参与以及更好地支持第三方项目的愿望，例如\
    \ **ControlsFX** ([`www.controlsfx.org/`](http://www.controlsfx.org/))、**FXyz**\
    \ ([`github.com/FXyz/FXyz`](https://github.com/FXyz/FXyz)) 和 **DataFX** ([`www.datafx.io/`](http://www.datafx.io/))。\n\
    \n让我们开始从以下 URL 下载该工具：[`gluonhq.com/products/downloads/`](http://gluonhq.com/products/downloads/)。\n\
    \n下载 8.0 版本并安装后，启动它，Scene Builder 工具应打开，如下图所示：\n\n![下载与启动](img/B03998_02_05.jpg)\n\
    \nJavaFX 8 Scene Builder 工具。\n\n## FXML\n\n在添加组件并构建你精美的 UI 布局时，Scene Builder 会在后台自动为你生成一个基于\
    \ FXML 和 XML 的标记文件，该文件稍后将用于将你的 UI 绑定到 Java 应用程序逻辑。\n\nFXML 提供的主要优势之一是关注点分离，因为它将\
    \ UI 层（*视图*）与逻辑（*控制器*）解耦；这意味着你可以随时更改 UI，而无需更改底层逻辑。由于 FXML 文件不被编译，它可以在运行时动态加载，无需任何编译。这意味着它有助于你进行快速原型设计。\n\
    \n### 将 FXML 加载到 JavaFX 应用程序中\n\n从 Scene Builder 工具生成 UI 设计后，将其添加到应用程序中是非常容易的。以下是在\
    \ `start()` 方法中加载 FXML 文件的代码：\n\n```\nBorderPane root = new BorderPane();\nParent\
    \ content = FXMLLoader.load(getClass().getResource(\"filename.fxml\"));\nroot.setCenter(content);\n\
    ```\n\n如你所见，我使用了 `javafx.fxml.FXMLLoader` 类的静态方法 `load`。`load()` 方法将加载（反序列化）由\
    \ Scene Builder 工具创建的 FXML 文件。\n\n# 开发自定义 UI\n\n在本章的最后一节，我们将基于 JavaFX 8 的内置控件开发一个自定义\
    \ UI 组件。\n\n我们将使用之前讨论过的基于 FXML 的概念来开发这个自定义 UI；其主要优势是关注点分离，以便以后自定义组件时无需更改其功能或与之绑定的任何其他逻辑。\n\
    \n## 登录对话框自定义 UI\n\n我们将使用前面介绍的大部分工具和技术来开发我们的自定义 UI：登录对话框，这是每个企业应用程序中必不可少的组件。我们的\
    \ UI 组件将如下图所示：\n\n![登录对话框自定义 UI](img/B03998_02_06.jpg)\n\n登录自定义 UI 组件\n\n### 登录对话框自定义\
    \ UI 的结构\n\n基于 FXML 标记的自定义组件开发中最常见的结构和阶段如下：\n\n*   在 Scene Builder 工具中开发 UI；然后将结果导出为基于\
    \ FXML 的文件\n*   从 Scene Builder 中提取控制器骨架\n*   创建一个控制器，将 UI（视图）绑定到其逻辑，并扩展一个控件或布局\n\
    *   在控制器构造函数中加载 FXML 文件\n*   创建一个初始化方法，确保所有 FXML 控件都已成功初始化和加载\n*   公开公共属性以获取和设置控件数据，以及需要实现逻辑的操作方法\n\
    *   开发一个单独的 CSS 文件\n*   在你的应用程序中使用自定义组件\n"
- fmt: "### Coding the Login dialog custom UI\n\nLet's code and develop our custom\
    \ UI, the Login Dialog:\n\n1. Open the Scene Builder tool and create the UI. Its\
    \ properties are as shown in the following figure: ![Coding the Login dialog custom\
    \ UI](graphics/B03998_02_07.jpg)\n2. The login dialog layout hierarchy will be\
    \ as shown here: ![Coding the Login dialog custom UI](graphics/B03998_02_08.jpg)\n\
    \nIt consists of a `Pane` layout as the top and root layout node. Then, `GridPane(1,4)`\
    \ is used to lay out the controls in a grid of one column and four rows using\
    \ these:\n\n- The **first** row contains the `HBox` layout control at location\
    \ (`0,0`) to lay out the controls horizontally. It consists of the `ImageView`\
    \ control to show the logo and `Label` for the title.\n  - The **second** row\
    \ lays out the username `TextField` for the username attribute, at location (`0,1`).\n\
    \  - The **third** row lays out the password `PasswordField` for password attribute,\
    \ at location (`0,2`).\n  - The **last** row, at location (`0,3`), has a root\
    \ layout control `HBox`, and it lays out another `HBox` that contains the `CheckBox`\
    \ and `Label` (for showing errors and other messages) controls aligned to the\
    \ center-left. We then have two button controls, **Reset** and **Login**, which\
    \ are aligned to the center-right.\n  - In the Code tab, add a proper **fx:id**\
    \ name to all of the controls in the dialog, and a name to `onAction` for buttons\
    \ and checkbox events as in the following screenshot: ![Coding the Login dialog\
    \ custom UI](graphics/B03998_02_09.jpg)\n\nLogin button properties\n\n3. From\
    \ the Scene Builder **Preview** menu, choose **Show preview in windows**. Your\
    \ layout will pop up. If everything is okay and you are satisfied with the resulting\
    \ design, from the menu bar, click on **File**, then **Save**, and enter the file\
    \ name as `LoginUI.fxml`. Congratulations! You have created your first JavaFX\
    \ UI layout.\n4. Now we will open NetBeans to set up a JavaFX FXML project, so\
    \ launch NetBeans, and from the **File** menu, choose **New Project**.\n5. In\
    \ the **JavaFX** category, choose **JavaFX FXML Application**. Click on **Next**.\
    \ Then name the project **LoginControl**, change **FXML name** to `LoginUI`, and\
    \ click on **Finish**.\n\n### Tip\n\nMake sure that the JavaFX platform is Java\
    \ SE 8.\n\n6. NetBeans will create a project structure as shown here: ![Coding\
    \ the Login dialog custom UI](graphics/B03998_02_10.jpg)\n\nLogin Control NetBeans\
    \ project structure.\n\n### Note\n\nMake sure to *clean and build* your project\
    \ before running it, to avoid any problems you may face, especially when running\
    \ your application and possibility loading the `*.fxml` file during runtime may\
    \ return `null`.\n\n7. Go to the Scene Builder tool and, from **View**, select\
    \ **Show sample controller skeleton**. The window shown in the following screenshot\
    \ will open, which we will copy to replace `LoginUIController.java` (this which\
    \ extends the `Pane` class content code with the copied content in NetBeans) and\
    \ then fix the missing imports.\n8. Replace the previously generated and saved\
    \ `LoginUI.fxml` file from Scene Builder with one already created by NetBeans.\n\
    9. Right-click on the `LoginController.java` file, choose **Refactor**, then **Rename**,\
    \ and rename it to `Main.java`.\n10. Finally, add the following code in the `start(Stage\
    \ stage)` method of `Main.java class` as shown here. We are creating a new instance\
    \ of the login component as a root node of our scene and adding it to the stage:\n\
    \n```\nLoginUIController loginPane = new LoginUIController();\n\nstage.setScene(new\
    \ Scene(loginPane));\nstage.setTitle(\"Login Dialog Control\");\nstage.setWidth(500);\n\
    stage.setHeight(220);\nstage.show();\n```\n\n![Coding the Login dialog custom\
    \ UI](graphics/B03998_02_11.jpg)\n\n11. In the `LoginUIController.java` class,\
    \ right-click under the class name and choose **Insert Code**; then choose **Constructor**\
    \ and finally add the following code inside the constructor:\n\n```\npublic LoginUIController()\
    \ throws IOException {\n  FXMLLoader fxmlLoader = new FXMLLoader(getClass().getResource(\"\
    LoginUI.fxml\"));\n  fxmlLoader.setRoot(this);\n  fxmlLoader.setController(this);\n\
    \  fxmlLoader.load();\n}\n```\n\nThis code loads our `LoginUI.fxml` document and\
    \ returns it as the `Pane` layout with its hierarchy. It then binds it to the\
    \ current controller instance as the Controller and root node at the same time.\
    \ Note that the controller extends `Pane` as the root element definition in `LoginUI.fxml`.\n\
    \n12. From NetBeans, choose **Clean and Build** and then right-click on the project\
    \ and choose **Run**. The same screen we saw earlier should appear.\n13. While\
    \ the program is running, enter any credentials and click on the **Login** button;\
    \ an error message will appear in red as shown in the following screenshot: ![Coding\
    \ the Login dialog custom UI](graphics/B03998_02_12.jpg)\n\nLogin Control invalid\
    \ login.\n\n14. If the right credentials (user: `tamanm`, pass: `Tamanm`) are\
    \ entered, the green message appears with \"Valid Credentials\", as shown in the\
    \ following figure.\n15. If the **Reset** button is clicked, then all controls\
    \ return to the default values.\n\nCongratulations! You have successfully created\
    \ and implemented a UI custom control.\n\n![Coding the Login dialog custom UI](graphics/B03998_02_13.jpg)\n\
    \n# Summary\n\nIn this chapter, we have covered a lot of ground – getting started\
    \ with a brief introduction about JavaFX 8 architecture components that act as\
    \ the foundation layer to run your JavaFX application smoothly and efficiently.\
    \ Then followed we explored how to render graphics on the scene with a brief explanation\
    \ about the most common layouts and UI controls.\n\nYou were introduced to new\
    \ features in Java SE 8 such as lambda expressions and functional interfaces,\
    \ which was supported by examples showing the power of each.\n\nYou learned how\
    \ to style your application with custom CSS files by using the `setUserAgentStylesheet(String\
    \ URL)` and `getStylesheets().add(String URL)` methods. Next, you took a short\
    \ look at the Scene Builder and how to load FXML into a scene. Finally, you learned\
    \ about custom UI components in JavaFX and how to create them.\n\nIn the next\
    \ chapter, you will learn how to create a desktop application that consists of\
    \ multiple scenes and then how to package it. Additionally, we will learn how\
    \ to interact with the Web and develop web applications using JavaFX 8."
