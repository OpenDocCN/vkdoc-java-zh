  trans: "\n## 局限性\n\n主要由于 iOS 平台的限制，使用 RoboVM 时存在一些局限性：\n\n*   不支持在运行时加载自定义字节码。构成应用的所有类文件必须在开发机器上编译时可用。\n\
    *   桌面或服务器上常用的 Java 原生接口技术通常从动态库加载原生代码，但 Apple 不允许在 iOS 应用中附带自定义动态库。RoboVM 支持一种基于静态库的\
    \ JNI 变体。\n*   另一个重大局限是 RoboVM 是一个正在开发中的 alpha 阶段项目，尚不建议用于生产环境。\n\n### 注意\n\n\
    RoboVM 完全支持反射。\n\n## 工作原理\n\n如第 4 章 *为 Android 开发 JavaFX 应用程序* 所述，自 2015 年 2 月起，RoboVM\
    \ 和 JavaFXPorts 背后的公司达成了一项协议，现在一个名为 `jfxmobile-plugin` 的单一插件允许我们从同一代码库为三个平台（桌面、Android\
    \ 和 iOS）构建应用程序。\n\nJavaFXMobile 插件为你的 Java 应用添加了许多任务，使你能够创建可提交至 Apple Store 的\
    \ .ipa 包。\n\nAndroid 主要使用 Java 作为主要开发语言，因此很容易将你的 JavaFX 8 代码与之合并。在 iOS 上，内部情况则完全不同——但使用了类似的\
    \ Gradle 命令。\n\n该插件将下载并安装 RoboVM 编译器，并使用 RoboVM 编译器命令在 `build/javafxports/ios`\
    \ 目录中创建 iOS 应用程序。\n\n# 入门指南\n\n在本节中，你将学习如何使用 `JavaFXMobile` 插件安装 RoboVM 编译器，并通过重用我们之前在第\
    \ 4 章 *为 Android 开发 JavaFX 应用程序* 中为 Android 平台开发的同一应用（Phone Dial 版本 1.0）来确保工具链正常工作。\n\
    \n## 前提条件\n\n为了使用 RoboVM 编译器构建 iOS 应用，需要以下工具：\n\n*   Oracle 的 Java SE JDK 8 update\
    \ 45。请参考第 1 章 *JavaFX 8 入门* 中的 *安装 Java SE 8 JDK* 部分。\n*   需要 Gradle 2.4 或更高版本才能使用\
    \ `jfxmobile` 插件构建应用程序。请参考第 4 章 *为 Android 开发 JavaFX 应用程序* 中的 *安装 Gradle 2.4*\
    \ 部分。\n*   一台运行 **Mac OS X** 10.9 或更高版本的 Mac。\n*   来自 Mac App Store 的 Xcode 6.x\
    \ ([`itunes.apple.com/us/app/xcode/id497799835?mt=12`](https://itunes.apple.com/us/app/xcode/id497799835?mt=12))。\n\
    \n### 提示\n\n首次安装 **Xcode** 时，以及每次更新到新版本时，都必须打开一次以同意 Xcode 条款。\n\n## 为 iOS 准备项目\n\
    \n我们将重用之前在第 4 章 *为 Android 开发 JavaFX 应用程序* 中为 Android 平台开发的项目，因为针对 iOS 时，代码、项目结构或\
    \ Gradle 构建脚本没有区别。\n\n它们共享相同的属性和特性，但使用不同的 Gradle 命令来服务于 iOS 开发，并且 Gradle 构建脚本针对\
    \ RoboVM 编译器做了微小改动。\n\n因此，我们将通过同一个应用看到 **WORA** *一次编写，到处运行* 的强大之处。\n\n### 项目结构\n\
    \n基于第 4 章 *为 Android 开发 JavaFX 应用程序* 中 Android 示例的相同项目结构，我们 iOS 应用的项目结构应如下图所示：\n\
    \n![项目结构](img/B03998_05_01.jpg)\n\n### 应用程序\n\n我们将重用第 4 章 *为 Android 开发 JavaFX\
    \ 应用程序* 中的同一个应用：Phone DialPad 版本 2.0 JavaFX 8 应用程序：\n\n![应用程序](img/B03998_05_02.jpg)\n\
    \n如你所见，重用同一代码库是一个非常强大且有用的特性，尤其是当你同时针对 iOS 和 Android 等多个移动平台进行开发时。\n\n#### 与底层\
    \ iOS API 的互操作性\n\n为了像我们在 Android 上所做的那样，从我们的应用中实现原生调用默认 iOS 电话拨号器的相同功能，我们必须为\
    \ iOS 提供原生解决方案，如下面的 `IosPlatform` 实现所示：\n\n```\nimport org.robovm.apple.foundation.NSURL;\n\
    import org.robovm.apple.uikit.UIApplication;\nimport packt.taman.jfx8.ch4.Platform;\n\
    \npublic class IosPlatform implements Platform {\n\n  @Override\n  public void\
    \ callNumber(String number) {\n    if (!number.equals(\"\")) {\n      NSURL nsURL\
    \ = new NSURL(\"telprompt://\" + number);\n      UIApplication.getSharedApplication().openURL(nsURL);\n\
    \    }\n  }\n}\n```\n\n### Gradle 构建文件\n\n我们将使用第 4 章 *为 Android 开发 JavaFX 应用程序*\
    \ 中使用的相同 Gradle 构建脚本文件，但做了一处微小改动，在脚本末尾添加了以下几行：\n\n```\njfxmobile {\n  ios {\n\
    \    forceLinkClasses = [ 'packt.taman.jfx8.ch4.**.*' ]\n  }\n  android {\n  \
    \  manifest = 'lib/android/AndroidManifest.xml' \n  }\n}\n```\n\n安装和使用 `robovm`\
    \ 编译器的所有工作都由 `jfxmobile` 插件完成。\n\n这些行的目的是告诉 RoboVM 编译器需要在运行时加载的主应用类的位置，因为编译器默认情况下无法看到它。\n\
    \n`forceLinkClasses` 属性确保这些类在 RoboVM 编译期间被链接进来。\n\n#### 构建应用程序\n\n在添加了为 iOS 构建脚本所需的配置集之后，是时候构建应用程序以将其部署到不同的\
    \ iOS 目标设备上了。为此，我们需要运行以下命令：\n\n```\n$ gradle build\n```\n\n我们应该会看到以下输出：\n\n```\n\
    BUILD SUCCESSFUL\n\nTotal time: 44.74 secs\n```\n\n我们已经成功构建了应用程序；接下来，我们需要生成 .`ipa`\
    \ 文件，并且在生产环境中，你必须通过将其部署到尽可能多的 iOS 版本上进行测试。\n\n#### 生成 iOS .ipa 包文件\n\n为了为我们的 JavaFX\
    \ 8 应用程序生成最终的 .ipa iOS 包（这对于最终分发到任何设备或 AppStore 是必需的），你需要运行以下 `gradle` 命令：\n\n\
    ```\ngradle ios \n```\n\n这将在 `build/javafxports/ios` 目录中生成 .`ipa` 文件。\n"
- fmt: "### Deploying the application\n\nDuring development, we need to check our\
    \ application GUI and final application prototype on iOS simulators and measure\
    \ the application performance and functionality on different devices. These procedures\
    \ are very useful, especially for testers.\n\nLet's see how it is a very easy\
    \ task to run our application on either simulators or on real devices.\n\n####\
    \ Deploying to a simulator\n\nOn a simulator, you can simply run the following\
    \ command to check if your application is running:\n\n```\n$ gradle launchIPhoneSimulator\
    \ \n```\n\nThis command will package and launch the application in an *iPhone\
    \ simulator* as shown in the following screenshot:\n\n![Deploying to a simulator](graphics/B03998_05_03.jpg)\n\
    \n`DialPad2` JavaFX 8 application running on the iOS 8.3/iPhone 4s simulator\n\
    \nThis command will launch the application in an iPad simulator:\n\n```\n$ gradle\
    \ launchIPadSimulator \n```\n\n#### Deploying to an Apple device\n\nIn order to\
    \ package a JavaFX 8 application and deploy it to an Apple device, simply run\
    \ the following command:\n\n```\n$ gradle launchIOSDevice \n```\n\nThis command\
    \ will launch the JavaFX 8 application in the device that is connected to your\
    \ desktop/laptop.\n\nThen, once the application is launched on your device, type\
    \ in any number and then tap Call.\n\nThe iPhone will ask for permission to dial\
    \ using the default mobile dialer; tap on **Ok**. The default mobile dialer will\
    \ be launched and will the number as shown in the following figure:\n\n![Deploying\
    \ to an Apple device](graphics/B03998_05_04.jpg)\n\nDefault mobile dialer\n\n\
    ### Note\n\nTo be able to test and deploy your apps on your devices, you will\
    \ need an active subscription with the Apple Developer Program. Visit the Apple\
    \ Developer Portal, [https://developer.apple.com/register/index.action](https://developer.apple.com/register/index.action),\
    \ to sign up. You will also need to provision your device for development. You\
    \ can find information on device provisioning in the Apple Developer Portal, or\
    \ follow this guide: [http://www.bignerdranch.com/we-teach/how-to-prepare/ios-device-provisioning/](http://www.bignerdranch.com/we-teach/how-to-prepare/ios-device-provisioning/).\n\
    \n# Summary\n\nThis chapter gave us a very good understanding of how JavaFX-based\
    \ applications can be developed and customized using RoboVM for **iOS** to make\
    \ it possible to run your applications on Apple platforms.\n\nYou learned about\
    \ RoboVM features and limitations, and how it works; you also gained skills that\
    \ you can use for developing.\n\nYou then learned how to install the required\
    \ software and tools for iOS development and how to enable Xcode along with the\
    \ *RoboVM* compiler, to package and install the Phone Dial JavaFX-8-based application\
    \ on OS simulators.\n\nWe have seen how we reused the same application we already\
    \ developed in [Chapter 4](#ch04.html \"Chapter 4. Developing a JavaFX Application\
    \ for Android\"), *Developing a JavaFX Application for Android*, proving that\
    \ the Java WORA paradigm works.\n\nFinally, we provided tips on how to run and\
    \ deploy your application on real devices.\n\nThe next chapter will open a window\
    \ on the IoT development world; we are going to see how to buy a RaspberryPi model\
    \ 2, install and configure *raspbian-wheezy* OS for development, and how to install\
    \ the Java SE for embedded devices. We will then develop a JavaFX 8 application\
    \ that will run on our credit-card-sized microcomputer.\n\n# Chapter 6. Running\
    \ JavaFX Applications on the Raspberry Pi\n\nWelcome to the **IoT** (**Internet\
    \ of Things**) world. There is no doubt that you hear this term around all the\
    \ time. IoT has become a hot topic of late, and for good reason too. Some estimates\
    \ put the number of connected small devices somewhere around 9 billion currently;\
    \ it's projected to jump to 24 billion devices by 2020. While the projections\
    \ vary, the assessment really doesn't: in terms of sheer numbers, the IoT is going\
    \ to dwarf any computing models ever seen.\n\nVery closely related to the IoT\
    \ world, we have the Raspberry Pi—a credit card-sized microcomputer designed by\
    \ the Raspberry Pi Foundation for experimentation and education.\n\nWhat you should\
    \ know about the Raspberry Pi is that it is nothing but a small computer. Small\
    \ power requirements, small physical size, small memory, and most importantly\
    \ a low-cost device. Everything about it is small, but it is still just a computer\
    \ and it uses Linux.\n\nJava was made for IoT from the first day of its invention.\
    \ Java was created with a clear vision in mind: to control small devices such\
    \ as television set-top boxes. With the explosion of IoT, Java returns to its\
    \ roots.\n\nYou may think that JavaFX, a platform for rich-client development,\
    \ would miss the IoT party—but it is not so! According to the *JavaFX Overview*\
    \ page on the Oracle Technology Network:\n\n> *\"It is designed to provide a lightweight,\
    \ hardware-accelerated Java UI platform\"*\n\nThis statement holds the key to\
    \ graphically rich-and-powerful JavaFX: hardware acceleration and; luckily, the\
    \ Raspberry Pi comes with a powerful GPU.\n\nIn this chapter, we will learn about:\n\
    \n*   Buying, preparing, and configuring the Raspberry Pi\n*   Preparing the Raspberry\
    \ Pi for JavaFX 8\n*   Connecting to the Raspberry Pi remotely\n*   Installing\
    \ and configuring Java SE 8 on the Raspberry Pi\n*   Developing and running JavaFX\
    \ 8 applications on the Raspberry Pi\n*   Using NetBeans with the Raspberry Pi\n\
    \nExcited? Need to have fun! Right, let's dive straight in and play with our Raspberry\
    \ Pi.\n\n### Note\n\nSince the release of JDK 8u33 for ARM version on January\
    \ 2015, Oracle has removed JavaFX Embedded from the ARM distribution. See [http://www.oracle.com/technetwork/java/javase/jdk-8u33-arm-relnotes-2406696.html#CACHGFJC](http://www.oracle.com/technetwork/java/javase/jdk-8u33-arm-relnotes-2406696.html#CACHGFJC)\
    \ and [http://jaxenter.com/jdk-arm-without-javafx-end-javafx-embedded-114212.html](http://jaxenter.com/jdk-arm-without-javafx-end-javafx-embedded-114212.html).\n\
    \nCode for JavaFX Embedded has been given to the open source project OpenJFX ([https://wiki.openjdk.java.net/display/OpenJFX/Main](https://wiki.openjdk.java.net/display/OpenJFX/Main)).\
    \ It is recommended that developers who are looking for alternatives to JavaFX\
    \ Embedded come out and contribute to the project.\n\nIn this chapter, we will\
    \ learn a few ways to overcome this problem.\n\n# What is the Raspberry Pi?\n\n\
    As we mentioned previously, the Raspberry Pi is a computer a very small and low-cost\
    \ computer. In fact, it is roughly the size of a credit card. Do not be fooled\
    \ by its size; as we know, good things come in small packages. However, the Raspberry\
    \ Pi does not come in a package at all.\n\nIt does not come in a case and its\
    \ circuit board and chips are fully visible, as you can see in the following image.\
    \ You can plug a Raspberry Pi into a digital TV or monitor and use a USB keyboard\
    \ and mouse with it, making it very easy to use. Because of its small size, you\
    \ can easily transport it anywhere.\n\nThe Raspberry Pi is a capable device that\
    \ allows people of all ages to explore computing, and to learn how to program\
    \ in languages such as Java, JavaFX, Python, and Scratch. In addition, it will\
    \ do everything a desktop computer can do—from browsing the Internet and playing\
    \ high-definition videos or games to working with spreadsheets or word processing\
    \ software.\n\n![What is the Raspberry Pi?](graphics/B03998_06_01.jpg)\n\nThe\
    \ new Raspberry Pi 2 model B\n\n## What can you do with it?\n\nThe Raspberry Pi\
    \ gives you the opportunity to build and control a device that does what you want\
    \ it to do. For example, you can deploy your very own robot arm, controlled by\
    \ a program that you have written. You can design and create your own role-playing\
    \ game, or produce beautiful computer art or music—all by using code.\n\nMoreover,\
    \ the Raspberry Pi Foundation's main aim is to make it fun for kids all over the\
    \ world to learn to program and understand how computers work."
