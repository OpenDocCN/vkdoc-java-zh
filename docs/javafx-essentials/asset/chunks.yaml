    \ -> bone.isValid() && bone.length()>0).forEach(bone -> {\n```\n\n现在为每根骨骼创建一个圆柱体。这涉及一些计算。如果你想深入了解细节，可以将每根骨骼视为一个具有位置和方向的向量。创建一个垂直圆柱体，其半径是骨骼宽度的一半，高度与骨骼长度相同。然后为其指定材质。代码如下：\n\
    \n```\nfinal Vector p=bone.center();\n// create bone as a vertical cylinder and\
    \ locate it at its center position\nCylinder c=new Cylinder(bone.width()/2,bone.length());\n\
    c.setMaterial(materialFinger);\n```\n\n然后我们计算实际骨骼方向与垂直方向的叉积；这将得到旋转的垂直向量。（符号因坐标系变化而异）。`ang`\
    \ 对象是这两个向量之间的夹角。可以通过平移至骨骼中心并围绕给定向量旋转 `ang` 角度来应用变换。代码如下：\n\n```\n// translate\
    \ and rotate the cylinder towards its direction\nfinal Vector v=bone.direction();\n\
    Vector cross = (new Vector(v.getX(),-v.getY(), v.getZ())).cross(new Vector(0,-1,0));\n\
    double ang=(new Vector(v.getX(),-v.getY(),-v.getZ())).angleTo(new Vector(0,-1,0));\n\
    c.getTransforms().addAll(new Translate(p.getX(),-p.getY(),-p.getZ()),new Rotate(-Math.toDegrees(ang),\
    \ 0, 0, 0, new Point3D(cross.getX(),-cross.getY(),cross.getZ())));\n  // add bone\
    \ to scene\nroot.getChildren().add(c);\n```\n\n现在在每根骨骼的起点和终点添加球体：\n\n```\n// add\
    \ sphere at the end of the bone\nSphere s=new Sphere(bone.width()/2f);\ns.setMaterial(materialFinger);\n\
    s.getTransforms().addAll(new Translate(p.getX(),-p.getY()+bone.length()/2d,-p.getZ()),new\
    \ Rotate(-Math.toDegrees(ang), 0, -bone.length()/2d, 0, new Point3D(cross.getX(),-cross.getY(),cross.getZ())));\n\
    \  // add sphere to scene\n  root.getChildren().add(s);\n  // add sphere at the\
    \ beginning of the bone\n  Sphere s2=new Sphere(bone.width()/2f);\n  s2.setMaterial(materialFinger);\n\
    \  s2.getTransforms().addAll(new Translate(p.getX(),-p.getY()-bone.length()/2d,-p.getZ()),new\
    \ Rotate(Math.toDegrees(ang), 0, bone.length()/2d, 0, new Point3D(cross.getX(),-cross.getY(),cross.getZ())));\n\
    \  // add sphere to scene\n  root.getChildren().add(s2);\n});\n```\n"
- fmt: "Now for the joints; we use cylinders again. The distance between the two elements\
    \ connected gives the length and we get the position and direction to generate\
    \ and transform the cylinder. The code is as follows:\n\n```\njoints.stream().forEach(joint->{\n\
    \  double length=joint.getV0().distanceTo(joint.getV1());\n  Cylinder c=new Cylinder(bones.get(0).width()/3,length);\n\
    \  c.setMaterial(materialArm);\n  final Vector p=joint.getCenter();\n  final Vector\
    \ v=joint.getDirection();\n  Vector cross = (new Vector(v.getX(),-v.getY(), v.getZ())).cross(new\
    \ Vector(0,-1,0));\n  double ang = (new Vector(v.getX(),-v.getY(),-v.getZ())).angleTo(new\
    \ Vector(0,-1,0));\n  c.getTransforms().addAll(new Translate(p.getX(),-p.getY(),-p.getZ()),\
    \ new Rotate(-Math.toDegrees(ang), 0, 0, 0, new Point3D(cross.getX(),-cross.getY(),cross.getZ())));\n\
    \  // add joint to scene\n  root.getChildren().add(c);\n});\n```\n\nFinally, we\
    \ take the length from the distance between elbow and wrist. All of this is in\
    \ the API at: [https://developer.leapmotion.com/documentation/java/api/Leap.Arm.html](https://developer.leapmotion.com/documentation/java/api/Leap.Arm.html).\
    \ The code is as follows:\n\n```\narms.stream().\nfilter(arm->arm.isValid()).\n\
    forEach(arm->{\n  final Vector p=arm.center();\n  // create arm as a cylinder\
    \ and locate it at its center position\n  Cylinder c=new Cylinder(arm.width()/2,arm.elbowPosition().\n\
    \  minus(arm.wristPosition()).magnitude());\n  c.setMaterial(materialArm);\n \
    \ // rotate the cylinder towards its direction\n  final Vector v=arm.direction();\n\
    \  Vector cross = (new Vector(v.getX(),-v.getY(),-v.getZ())).cross(new Vector(0,-1,0));\n\
    \  double ang=(new Vector(v.getX(),-v.getY(),-v.getZ())).\n  angleTo(new Vector(0,-1,0));\n\
    \  c.getTransforms().addAll(new Translate(p.getX(),-p.getY(),-p.getZ()),new Rotate(-\
    \ Math.toDegrees(ang), 0, 0, 0, new Point3D(cross.getX(),- cross.getY(),cross.getZ())));\n\
    \  // add arm to scene\n  root.getChildren().add(c);\n});\n```\n\n### Running\
    \ the application\n\nCongratulations! Now connect your Leap controller (the leap\
    \ icon should be green) and run your application. If everything is okay, you should\
    \ initially see an empty application scene, as shown in the following screenshot:\n\
    \n![Running the application](graphics/B03998_08_10.jpg)\n\nInitial run of the\
    \ Leap JavaFX application\n\nMove and wave your hand around and the skeletal modeling\
    \ of your hand should appear with your real hands in the background, responding\
    \ to your real movements as shown here:\n\n![Running the application](graphics/B03998_08_11.jpg)\n\
    \nInteraction of Leap JavaFX application and Leap Controller\n\nTry a different\
    \ arm or hand pattern and position; you should have this replicated in your JavaFX\
    \ application scene, as shown in the following screenshot:\n\n![Running the application](graphics/B03998_08_12.jpg)\n\
    \nInteraction of Leap JavaFX application and Leap Controller, with a different\
    \ hand pattern\n\n# More examples\n\nFor more examples of using JavaFX with the\
    \ Leap Motion device, please refer to online resources such as [http://www.parleys.com/share.html#play/525467d6e4b0a43ac12124ad](http://www.parleys.com/share.html#play/525467d6e4b0a43ac12124ad)\
    \ or [http://jperedadnr.blogspot.com.es/2013/06/leap-motion-controller-and-javafx-new.html](http://jperedadnr.blogspot.com.es/2013/06/leap-motion-controller-and-javafx-new.html).\
    \ For interaction with other programming languages, please visit [https://developer.leapmotion.com/gallery](https://developer.leapmotion.com/gallery).\n\
    \n# Summary\n\nIn this chapter, you learned about the impressive Leap Motion device,\
    \ and the really nice combination effects that result from using it to enhance\
    \ JavaFX applications.\n\nYou began by learning about the device and how it works.\
    \ Next, we discussed its SDK for Java and explored a simple application where\
    \ you learned about listening and processing the data from the Leap device in\
    \ one thread, while triggering events in the JavaFX thread to deal with them in\
    \ the scene graph.\n\nIn the next chapter, I'll provide advanced tools and resources\
    \ intended for true JavaFX gurus.\n\n# Appendix A. Become a JavaFX Guru\n\nWill\
    \ your JavaFX 8 journey stop here? Definitely not! JavaFX is a very big topic,\
    \ which grows day by day, from its core releases from Oracle with new features,\
    \ functionalities, and stability, to many community individuals and companies\
    \ that create third-party libraries to fill any missing gaps you may experience,\
    \ or invent new ones around it, that don't exist in the core.\n\nOf course, with\
    \ this book, I cannot cover all JavaFX 8 topics. Instead, I tried to scratch the\
    \ surface of many JavaFX areas, and open topics keys in order to make your adventure\
    \ easier, by finding your way and getting an idea of how to do it yourself.\n\n\
    However, we also discussed many other tools and technologies, by developing traditional\
    \ web and desktop applications, and then moved to a more advanced and market demanding\
    \ area, which is mobile development.\n\nThe more we explore the future by learning\
    \ about **IoT**, which is the next era of information technology, the more we\
    \ cover interesting topics. We have seen motion many times in movies and have\
    \ imagined it, and we have made our dreams come true by developing an enhanced\
    \ touch-less based JavaFX 8 with an amazing Leap Motion v2 gadget.\n\nThere is\
    \ much more to become a JavaFX subject matter and gaining other experiences, which\
    \ we did not discuss in this book.\n\n*So, where do we go from here?*\n\nNow,\
    \ since you have many up and running JavaFX 8 applications, and an understanding\
    \ of how it works on many platforms and hardware, the rest is up to you and your\
    \ ingenuity.\n\nJoin the community on Facebook, Twitter, and follow the technology\
    \ expert's blogs, JavaFX blog at [http://blogs.oracle.com/javafx/](http://blogs.oracle.com/javafx/),\
    \ and find news, demos, and insight at [http://fxexperience.com/](http://fxexperience.com/).\
    \ Above all, experiment.\n\nAt the end of this chapter, be sure to check out the\
    \ many *frameworks*, *libraries*, and *projects* that use JavaFX in production\
    \ today.\n\n## Official documentation\n\n*   **JavaFX documentation**: This is\
    \ a great resource pointing toward all JavaFX resources, news, experiences, videos,\
    \ books, API documentation, technical articles, and tutorials:\n\n    [http://www.oracle.com/technetwork/java/javase/documentation/javafx-docs-2159875.html](http://www.oracle.com/technetwork/java/javase/documentation/javafx-docs-2159875.html)\n\
    \n*   **Java Platform, Standard Edition (Java SE) 8**: These are *Client Technologies*,\
    \ contains many samples covering all JavaFX topics: [http://docs.oracle.com/javase/8/javase-clienttechnologies.htm](http://docs.oracle.com/javase/8/javase-clienttechnologies.htm)"
