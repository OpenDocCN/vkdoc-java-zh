    \ JavaFX UI layout.\n4.  Now we will open NetBeans to set up a JavaFX FXML project,\
    \ so launch NetBeans, and from the **File** menu, choose **New Project**.\n5.\
    \  In the **JavaFX** category, choose **JavaFX FXML Application**. Click on **Next**.\
    \ Then name the project **LoginControl**, change **FXML name** to `LoginUI`, and\
    \ click on **Finish**.\n\n### Tip\n\nMake sure that the JavaFX platform is Java\
    \ SE 8.\n\n6.  NetBeans will create a project structure as shown here: ![Coding\
    \ the Login dialog custom UI](graphics/B03998_02_10.jpg)\n\nLogin Control NetBeans\
    \ project structure.\n\n### Note\n\nMake sure to *clean and build* your project\
    \ before running it, to avoid any problems you may face, especially when running\
    \ your application and possibility loading the `*.fxml` file during runtime may\
    \ return `null`.\n\n7.  Go to the Scene Builder tool and, from **View**, select\
    \ **Show sample controller skeleton**. The window shown in the following screenshot\
    \ will open, which we will copy to replace `LoginUIController.java` (this which\
    \ extends the `Pane` class content code with the copied content in NetBeans) and\
    \ then fix the missing imports.\n8.  Replace the previously generated and saved\
    \ `LoginUI.fxml` file from Scene Builder with one already created by NetBeans.\n\
    9.  Right-click on the `LoginController.java` file, choose **Refactor**, then\
    \ **Rename**, and rename it to `Main.java`.\n10.  Finally, add the following code\
    \ in the `start(Stage stage)` method of `Main.java class` as shown here. We are\
    \ creating a new instance of the login component as a root node of our scene and\
    \ adding it to the stage:\n\n```\n    LoginUIController loginPane = new LoginUIController();\n\
    \nstage.setScene(new Scene(loginPane));\n    stage.setTitle(\"Login Dialog Control\"\
    );\n    stage.setWidth(500);\n    stage.setHeight(220);\n    stage.show();\n \
    \   ```\n\n![Coding the Login dialog custom UI](graphics/B03998_02_11.jpg)\n11.\
    \  In the `LoginUIController.java` class, right-click under the class name and\
    \ choose **Insert Code**; then choose **Constructor** and finally add the following\
    \ code inside the constructor:\n\n```\n    public LoginUIController() throws IOException\
    \ {\n      FXMLLoader fxmlLoader = new FXMLLoader(getClass().getResource(\"LoginUI.fxml\"\
    ));\n      fxmlLoader.setRoot(this);\n      fxmlLoader.setController(this);\n\
    \      fxmlLoader.load();\n    }\n    ```\n\nThis code loads our `LoginUI.fxml`\
    \ document and returns it as the Pane layout with its hierarchy. It then binds\
    \ it to the current controller instance as the Controller and root node at the\
    \ same time. Note that the controller extends Pane as the root element definition\
    \ in `LoginUI.fxml`.\n\n12.  From NetBeans, choose **Clean and Build** and then\
    \ right-click on the project and choose **Run**. The same screen we saw earlier\
    \ should appear.\n13.  While the program is running, enter any credentials and\
    \ click on the **Login** button; an error message will appear in red as shown\
    \ in the following screenshot: ![Coding the Login dialog custom UI](graphics/B03998_02_12.jpg)\n\
    \nLogin Control invalid login.\n\n14.  If the right credentials (user: *tamanm*,\
    \ pass: *Tamanm*) are entered, the green message appears with \"*Valid Credentials*\"\
    , as shown in the following figure.\n15.  If the **Reset** button is clicked,\
    \ then all controls return to the default values.\n\nCongratulations! You have\
    \ successfully created and implemented a UI custom control.\n\n![Coding the Login\
    \ dialog custom UI](graphics/B03998_02_13.jpg)\n\n# Summary\n\nIn this chapter,\
    \ we have covered a lot of ground – getting started with a brief introduction\
    \ about JavaFX 8 architecture components that act as the foundation layer to run\
    \ your JavaFX application smoothly and efficiently. Then followed we explored\
    \ how to render graphics on the scene with a brief explanation about the most\
    \ common layouts and UI controls.\n\nYou were introduced to new features in Java\
    \ SE 8 such as lambda expressions and functional interfaces, which was supported\
    \ by examples showing the power of each.\n\nYou learned how to style your application\
    \ with custom CSS files by using the `setUserAgentStylesheet(String URL)` and\
    \ `getStylesheets().add(String URL)` methods. Next, you took a short look at the\
    \ Scene Builder and how to load FXML into a scene. Finally, you learned about\
    \ custom UI components in JavaFX and how to create them.\n\nIn the next chapter,\
    \ you will learn how to create a desktop application that consists of multiple\
    \ scenes and then how to package it. Additionally, we will learn how to interact\
    \ with the Web and develop web applications using JavaFX 8."
  trans: "\n### 编写登录对话框自定义 UI\n\n让我们来编写并开发自定义 UI——登录对话框：\n\n1.  打开 Scene Builder 工具并创建\
    \ UI。其属性如下图所示：![编写登录对话框自定义 UI](img/B03998_02_07.jpg)\n2.  登录对话框的布局层级结构如下所示：\n\n\
    ![编写登录对话框自定义 UI](img/B03998_02_08.jpg)\n\n它由一个 Pane 布局作为顶层和根布局节点。然后，使用 `GridPane(1,4)`\
    \ 将控件排列成一行四列的网格，具体如下：\n\n*   **第一**行在位置 (`0,0`) 处包含 `HBox` 布局控件，用于水平排列控件。它由显示徽标的\
    \ `ImageView` 控件和显示标题的 Label 组成。\n    *   **第二**行在位置 (`0,1`) 处放置用于输入用户名的 `TextField`\
    \ 控件。\n    *   **第三**行在位置 (`0,2`) 处放置用于输入密码的 `PasswordField` 控件。\n    *   **最后**一行位于位置\
    \ (`0,3`)，包含一个根布局控件 `HBox`，该控件内部又包含另一个 HBox，其中放置了 `CheckBox` 和 `Label`（用于显示错误及其他消息）控件，并居左对齐。然后我们有两个按钮控件，**Reset**\
    \ 和 **Login**，它们居右对齐。\n    *   在“代码”选项卡中，为对话框中的所有控件添加合适的 **fx:id** 名称，并为按钮和复选框事件的\
    \ `onAction` 添加名称，如下截图所示：![编写登录对话框自定义 UI](img/B03998_02_09.jpg)\n\n登录按钮属性\n\n\
    3.  从 Scene Builder 的 **Preview** 菜单中选择 **Show preview in windows**。你的布局将会弹出。如果一切正常且你对最终设计满意，从菜单栏点击\
    \ **File**，然后 **Save**，并将文件名输入为 `LoginUI.fxml`。恭喜！你已经创建了第一个 JavaFX UI 布局。\n4.\
    \  现在我们将打开 NetBeans 来设置一个 JavaFX FXML 项目，因此启动 NetBeans，并从 **File** 菜单中选择 **New\
    \ Project**。\n5.  在 **JavaFX** 类别中，选择 **JavaFX FXML Application**。点击 **Next**。然后将项目命名为\
    \ **LoginControl**，将 **FXML name** 改为 `LoginUI`，并点击 **Finish**。\n\n### 提示\n\n\
    确保 JavaFX 平台为 Java SE 8。\n\n6.  NetBeans 将创建一个如下所示的项目结构：![编写登录对话框自定义 UI](img/B03998_02_10.jpg)\n\
    \nLogin Control NetBeans 项目结构。\n\n### 注意\n\n在运行项目之前，务必*清理并构建*项目，以避免可能遇到的问题，尤其是在运行应用程序时，运行时加载\
    \ `*.fxml` 文件可能返回 `null`。\n\n7.  转到 Scene Builder 工具，从 **View** 中选择 **Show sample\
    \ controller skeleton**。将打开如下截图所示的窗口，我们将复制其内容，替换 `LoginUIController.java`（该类扩展了\
    \ `Pane` 类，将 NetBeans 中复制的内容替换原有代码），然后修复缺失的导入。\n8.  用 NetBeans 已创建的 `LoginUI.fxml`\
    \ 文件替换之前从 Scene Builder 生成并保存的文件。\n9.  右键点击 `LoginController.java` 文件，选择 **Refactor**，然后\
    \ **Rename**，将其重命名为 `Main.java`。\n10. 最后，在 `Main.java` 类的 `start(Stage stage)`\
    \ 方法中添加如下代码。我们正在创建一个登录组件的新实例，作为场景的根节点，并将其添加到舞台中：\n\n```\n    LoginUIController\
    \ loginPane = new LoginUIController();\n\nstage.setScene(new Scene(loginPane));\n\
    \    stage.setTitle(\"Login Dialog Control\");\n    stage.setWidth(500);\n   \
    \ stage.setHeight(220);\n    stage.show();\n    ```\n\n![编写登录对话框自定义 UI](img/B03998_02_11.jpg)\n\
    11. 在 `LoginUIController.java` 类中，右键点击类名下方，选择 **Insert Code**；然后选择 **Constructor**，最后在构造函数中添加以下代码：\n\
    \n```\n    public LoginUIController() throws IOException {\n      FXMLLoader fxmlLoader\
    \ = new FXMLLoader(getClass().getResource(\"LoginUI.fxml\"));\n      fxmlLoader.setRoot(this);\n\
    \      fxmlLoader.setController(this);\n      fxmlLoader.load();\n    }\n    ```\n\
    \n此代码加载我们的 `LoginUI.fxml` 文档，并将其作为包含层级结构的 Pane 布局返回。然后，它将其绑定到当前控制器实例，同时作为控制器和根节点。请注意，控制器扩展了\
    \ Pane，这与 `LoginUI.fxml` 中的根元素定义一致。\n\n12. 在 NetBeans 中，选择 **Clean and Build**，然后右键点击项目并选择\
    \ **Run**。之前看到的相同屏幕应该会出现。\n13. 程序运行时，输入任意凭据并点击 **Login** 按钮；将出现一条红色错误消息，如下截图所示：![编写登录对话框自定义\
    \ UI](img/B03998_02_12.jpg)\n\nLogin Control 无效登录。\n\n14. 如果输入了正确的凭据（用户名：*tamanm*，密码：*Tamanm*），则会显示绿色消息“*Valid\
    \ Credentials*”，如下图所示。\n15. 如果点击 **Reset** 按钮，则所有控件将恢复为默认值。\n\n恭喜！您已成功创建并实现了一个自定义\
    \ UI 控件。\n\n![编写登录对话框自定义 UI](img/B03998_02_13.jpg)\n\n# 总结\n\n在本章中，我们涵盖了大量内容——首先简要介绍了\
    \ JavaFX 8 架构组件，这些组件是流畅高效运行 JavaFX 应用程序的基础层。接着，我们探讨了如何在场景上渲染图形，并简要说明了最常用的布局和 UI\
    \ 控件。\n\n您了解了 Java SE 8 中的新特性，如 lambda 表达式和函数式接口，并通过示例展示了各自的强大功能。\n\n您学习了如何使用\
    \ `setUserAgentStylesheet(String URL)` 和 `getStylesheets().add(String URL)` 方法，通过自定义\
    \ CSS 文件为应用程序设置样式。接下来，您简要了解了 Scene Builder 以及如何将 FXML 加载到场景中。最后，您学习了 JavaFX 中的自定义\
    \ UI 组件及其创建方法。\n\n在下一章中，您将学习如何创建包含多个场景的桌面应用程序，以及如何对其进行打包。此外，我们还将学习如何与 Web 交互，并使用\
    \ JavaFX 8 开发 Web 应用程序。\n"
- fmt: '# Chapter 3. Developing a JavaFX Desktop and Web Application


    This chapter will cover how to develop compelling desktop and web applications
    that take advantage of the multicore, hardware-accelerated GPU to deliver high-performance
    UI-based applications that have an amazing look and feel.


    As JavaFX is totally written from the ground up in Java, some Java SE 8 built-in
    core libraries will be used to power our application. In addition, we will learn
    how to package our application as a standalone application to be launched and
    distributed.


    Also, we will cover the essential core web APIs in any web application levered
    by JavaFX 8, such as `javafx.scene.web.WebEngine`, `java.net.HttpURLConnection`
    and `javafx.scene.web.WebView`.


    We will discuss the relationship between JavaFX and HTML5, which is important
    because JavaFX''s APIs and the features of HTML5 complement one another. HTML5
    is a platform for rich web content to create a user experience that resembles
    a **RIA** (**Rich Internet Application**) web application with the characteristics
    of native desktop software.


    More importantly, we will go through the development of a desktop version of the
    *Note-taking Application* and then run it on the Web.


    Additionally, we will cover all the required knowledge and skills to deploy the
    *Note-taking as a web application* on the desktop and the Web.


    Here are the skills that will be learned during this chapter:


    * Developing and running desktop and web applications

    * Controlling application UIs

    * How to package a JavaFX 8 desktop application

    * Loading HTML5 content inside a JavaFX application

    * Sending data from JavaFX to JavaScript and vice versa

    * Deploying a JavaFX web application


    # Developing a note-taking application


    Building an application for one platform just isn''t good enough anymore. Desktop,
    Web, mobile, and embedded support are all required for a successful product, but
    learning the different environments is difficult. Here comes into play the power
    of JavaFX to write an application that will run on different platforms with simple
    tweaks, as we will see in this chapter.


    Here, we are going to build a *note-taking* application for desktop and the Web
    as well. In this project, I''ll show you how to create a complete JavaFX application
    from scratch using the JavaFX 8 SDK and the Java programming language using our
    previously installed developer tools (refer to [Chapter 1](#ch01.html "Chapter
    1. Getting Started with JavaFX 8"), *Getting Started with JavaFX 8*).


    I''ll then show you how to create the application''s two screen layouts and create
    the Java classes that control them. I''ll create buttons that control navigation
    between different scenes, saves data, and then gets your UI controls updated dynamically
    with the power of property bindings.


    The final project will look like the following screenshot:


    ![Developing a note-taking application](graphics/B03998_03_01.jpg)


    P''Note-Taking Application


    This figure shows the add and edit screen opened from the main screen new note
    button to add new note, or edit button to edit one of listed notes as the following:


    ![Developing a note-taking application](graphics/B03998_03_02.jpg)


    So, what are you waiting for? Let''s go!


    ## Building the UI prototype


    The first step in building any successful application with **complex UI** (even
    simple ones) is prototyping your layout, screens relationship, their state, and
    their navigation. Sketch it on a piece of paper and then get feedback from your
    team and manager. Rework it and, once approved, start building a real interactive
    prototype for your customers, in order to get their feedback for final production.


    This is what we are going to do now, and our application has been laid out on
    piece of paper on any easy to use UI sketcher tools as in the following image.
    We will then develop it with the Scene Builder tool as a complete prototype.


    In addition, we are going to see the interoperability between NetBeans and the
    Scene builder tool.


    ### Note


    Note that it is easier to sketch your layout by drawing it on paper first, as
    it is a very quick way to edit, enhance, and figure out the final application
    layout before interacting with the tools to develop it.


    Now, as we have sketched our application, we are ready to build our application''s
    real prototype.


    The best way to get the most out of the tools is to create your application skeleton
    (*controller classes and FXML base page definitions*) inside the NetBeans IDE,
    and then create and develop FXML pages inside the Scene builder tool. Here comes
    the powerful interoperability between the two tools.


    ![Building the UI prototype](graphics/B03998_03_03.jpg)


    Here are the steps to start with JavaFX FXML application:


    1. Open up the NetBeans IDE, and from the main menu, choose **File**, and then
    **New Project** a **New Project** dialog will open. From **Categories**, choose
    **JavaFX**, and then under **Projects**, choose JavaFX FXML Application. Then,
    click on the **Next** button: ![Building the UI prototype](graphics/B03998_03_04.jpg)


    A new JavaFX FXML application


    2. In the **JavaFX FXML application** dialog, add the relevant information. From
    **Project name**, add the location and **FXML name** (in my case, `ListNotesUI`).
    In **Create Application class**, I have added `packt.taman.jfx8.ch3.NoteTakingApp`,
    as shown in the following figure. Hit **Finish**. ![Building the UI prototype](graphics/B03998_03_05.jpg)


    3. Now we have a project with the first FXML UI document (`ListNotesUI.fxml`),
    and we need to add the second FXML UI document (`AddEditUI.fxml`) alongside its
    controller.


    4. To do that from the file, choose **New File**; then, under the **Categories**
    list, choose **JavaFX**, and from the **File Types** list, choose Empty FXML,
    and finally, click on **Next**, as shown in the following figure.


    5. In the **New Empty FXML and Location** dialog, edit the **FXML Name** field
    to be `AddEditUI`, and then click on **Next**. ![Building the UI prototype](graphics/B03998_03_06.jpg)


    Adding a new empty FXML document


    6. In the Controller Class dialog as in the following screen, tick the **Use Java
    Controller** checkbox. Make sure that **Create New Controller** has been selected,
    with the **Controller Name** as `AddEditUIController`. Then, click on **Next**,
    skip the **Cascading Style Sheet** dialog, and finally, click on **Finish**: ![Building
    the UI prototype](graphics/B03998_03_07.jpg)


    Adding a new controller to the FXML document


    As we have built our project structure, it''s time to add our controls into our
    pages UI using Scene Builder, similar to what we sketched on paper. To do so is
    easy:


    1. From NetBeans, right-click on `ListNotesUI.fxml` and select Open or just double-click
    on it. **Scene Builder** will open with your FXML document in design mode.


    ### Note


    Note: It works only if Scene Builder is installed on your machine.


    2. Design the page as per the following screenshot. Most importantly, don''t forget
    to save your changes before returning back to NetBeans or closing **Scene Builder**
    for logic implementation. ![Building the UI prototype](graphics/B03998_03_08.jpg)


    Complete `ListNotesUI.fxml` document design


    3. Perform the same steps for `AddEditUI.fxml`, and your design should end up
    like this: ![Building the UI prototype](graphics/B03998_03_09.jpg)


    Complete `AddEditUI.fxml` document design


    You need to check the FXML document to see how we nested many containers and UI
    controls to achieve the desired UI we had sketched earlier, in addition to using
    their properties to control the spacing, alignment, font, and coloring.


    Congratulations! You have converted your sketched layout to something vivid that
    could be presented as a project without logic to your team leaders and managers
    to get their feedback regarding colors, theming, and the final layout. Moreover,
    once it gets approved, you can proceed for the final customer feedback before
    diving deeper into the business logic.'
