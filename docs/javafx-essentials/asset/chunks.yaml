    # 第 1 章 JavaFX 8 入门\n\nJavaFX 是 Java 的下一代**图形用户界面（GUI）**工具包。它是一个能够轻松快速构建高性能 Java\
    \ 客户端应用程序的平台。\n\nJavaFX 的底层引擎通过硬件加速图形利用现代 GPU，同时提供设计良好的编程接口，使开发者能够结合图形、动画和 UI\
    \ 控件。\n\n这些功能使您能够为客户提供引人入胜、复杂且完全可定制的客户端 GUI，给他们留下深刻印象。\n\n虽然 Java 最初的目标是*嵌入式*和*客户端*领域，但自\
    \ 2006 年以来，许多原因促使 Java 语言成为企业级领域的顶级开发平台。\n\n但最近，随着 JavaFX 平台作为标准客户端 GUI 的引入，这些最初的目标再次开始流行。\n\
    \n尽管 JavaFX 远不止是一个 GUI 工具包，但它允许 Java 开发者创建具有引人入胜用户界面的客户端应用程序，并轻松连接到后端系统。\n\n此外，JavaFX\
    \ 灵活的 FXML 支持使您能够轻松构建**MVC**（**模型-视图-控制器**）架构模式的应用程序，并使用 Scene Builder 工具实现所见即所得的方法。\n\
    \nJavaFX 的绑定功能简化了实体间的通信，并进一步支持 MVC。除此之外，JavaFX 还提供了使用 CSS 进行快速、可定制的 UI 建模。\n\n\
    通过添加一个具有文档模型的完整`WebView`组件，映射到 Java 代码变得容易，并为 3D 和媒体功能提供了强大支持。\n\n在本章中，我们将涵盖以下主题：\n\
    \n*   什么是 JavaFX 及其目标平台？\n*   JavaFX 历史回顾\n*   JavaFX 的目标、特性以及 JavaFX 8 的新功能\n\
    *   如何安装 Java SE 8、JavaFX 8、NetBeans 以及配置环境变量\n*   开发一个\"Hello World\" JavaFX\
    \ 8 应用程序，并理解 JavaFX 8 基本应用程序架构和构建块\n"
- fmt: '# JavaFX goals


    JavaFX came to light with a primary goal – to be used across many types of devices,
    such as embedded devices, smartphones, TVs, tablet computers, and desktops. JavaFX
    also follows Java''s *write once, run anywhere* paradigm.


    JavaFX 8 is written totally from scratch in Java language, it makes you feel at
    home. Therefore, applications written in JavaFX can be deployed on desktops, laptops,
    the Web, embedded systems, mobiles, and tablets.


    Embedded systems are no longer supported by Oracle; it is left to companies like
    ARM and others to support it. Mobile devices have never been supported from JavaFX
    2.x to 8.x; the support exists now only because of **OpenJFX**. The community
    has benefitted from open source bringing JavaFX to mobile environments.


    For more about OpenJFX, visit [https://wiki.openjdk.java.net/display/OpenJFX/Main](https://wiki.openjdk.java.net/display/OpenJFX/Main).


    JavaFX is a set of graphics and a media package that enables developers to design,
    create, test, debug, and deploy rich client applications that operate consistently
    across diverse platforms, in one bundle, without the need for many separate libraries,
    frameworks, and APIs to achieve the same goal. These separate libraries include
    media, UI controls, `WebView`, 3D, and 2D APIs.


    So if you are a Java frontend developer, an experienced Java Swing, Flash/Flex,
    SWT, or web developer looking to take your client-side applications to the next
    level, and you want to develop an attractive and complex user interface for your
    customer, then you are on track learning JavaFX skills – this book is for you.


    # Getting started


    This chapter is an introduction to JavaFX 8; we have already talked about JavaFX
    8 as a technology and why you should care about it.


    Next, we will navigate its history, exploring its core features and where it could
    be used.


    Before you start using this book to learn JavaFX 8, we will go through the preparation
    of your development environment by installing various required software bundles,
    to be able to compile and run many of its examples.


    In this chapter, you will learn how to install the required software, such as
    the **Java Development Kit JDK** and the NetBeans **Integrated Development Environment**
    (**IDE**).


    After installing the required software, you will begin by creating a traditional
    *Hello JavaFX 8* example. Once you feel comfortable with the development environment,
    as a final verification that we are on the right track, we will walk through the
    Hello JavaFX 8 source code to understand the basic JavaFX 8 application architecture.


    ### Note


    If you are already familiar with the installation of the JDK and the NetBeans
    IDE, you can skip to [Chapter 2](#ch02.html "Chapter 2. JavaFX 8 Essentials and
    Creating a Custom UI"), *JavaFX 8 Essentials and Creating a custom UI*, which
    covers JavaFX 8 fundamentals and how to create a custom UI component.


    So what you are waiting for? Let''s get started!


    # JavaFX history


    You might believe JavaFX is quite a new technology, but it actually isn''t. JavaFX
    has been here for a long time; unofficially since 2005. Ever since Sun Microsystems
    acquired the company *SeeBeyond*, there has been a graphics-rich scripting language
    known as **F3** (**F**orm **F**ollows **F**unction), which was created by engineer
    Chris Oliver.


    At the JavaOne 2007 conference, Sun Microsystems officially unveiled JavaFX as
    the language''s name instead of F3. During the period 2007 to 2010, Oracle acquired
    many big companies like BEA Systems, JD Edwards, Siebel Systems, and so on. I
    was working for Oracle with the responsibility of integrating different customer
    support channels to the Oracle support website *MetaLink*, as it was called at
    that time.


    On April 20, 2009, Oracle Corporation announced the acquisition of Sun Microsystems,
    making Oracle the new steward of JavaFX.


    At JavaOne 2010, Oracle announced the JavaFX roadmap, which included its plans
    to phase out the JavaFX 1.3 scripting language and recreate the JavaFX platform
    for the Java platform as Java-based APIs. As promised, JavaFX 2.0 SDK was released
    at JavaOne in October 2011.


    In addition to the release of JavaFX 2.0, Oracle took the platform to the next
    level by announcing its commitment to take steps to make JavaFX open source, thus
    allowing Java''s versatile and strong community to help move the platform forward.
    Making JavaFX open source increased its adoption, enabled a quicker turnaround
    time on bug fixes, and generated new enhancements.


    Between the versions JavaFX 2.1 and 2.2, the number of new features grew rapidly.
    JavaFX 2.1 was the official release of the Java SDK on Mac OS. JavaFX 2.2 was
    the official release of the Java SDK on the Linux operating system.


    There was no such thing as JavaFX 3.x, but the big change in the Java development
    world happened with the Java SE 8 release, which was announced on March 18, 2014.
    Java SE 8 has many new APIs and language enhancements, which include **Lambdas**,
    Stream API, Nashorn JavaScript engine, and *JavaFX APIs*, which are being incorporated
    into standard JDK bundles, and JavaFX version becomes 8 as direct successor to
    JavaFX 2.0.


    To see all of the new features in Java SE 8, visit [http://www.oracle.com/technetwork/java/javase/8-whats-new-2157071.html](http://www.oracle.com/technetwork/java/javase/8-whats-new-2157071.html).


    ## When is JavaFX 8 available?


    The answer is *now*. As mentioned before, Java SE 8 was released on March 18,
    2014. For developers who use Java to build client-site applications, the JavaFX
    rich Internet application framework supports Java 8 now.


    Most of the Java enterprise edition vendors support Java 8 too. Whether you move
    to Java SE 8 right away depends on the kind of projects you''re working on.


    ### Note


    In fact, as outlined in the Oracle JDK Support Roadmap, after April 2015, Oracle
    will not post further updates of Java SE 7 to its public download sites.


    The JavaFX APIs are available as a fully integrated feature of the **Java SE Runtime
    Environment** (**JRE**) and JDK. The JDK is available for all major desktop platforms
    (*Windows*, *Mac OS X*, *Solaris*, and *Linux*), therefore JavaFX will also run
    on all major desktop platforms.


    Relating to JavaFX 8, it supports the following APIs:


    * 3D graphics

    * Rich text support

    * Printing APIs.'
