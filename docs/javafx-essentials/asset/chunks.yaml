    pages UI using Scene Builder, similar to what we sketched on paper. To do so is
    easy:


    1.  From NetBeans, right-click on `ListNotesUI.fxml` and select Open or just double-click
    on it. **Scene Builder** will open with your FXML document in design mode.


    ### Note


    Note: It works only if Scene Builder is installed on your machine.


    2.  Design the page as per the following screenshot. Most importantly, don''t
    forget to save your changes before returning back to NetBeans or closing **Scene
    Builder** for logic implementation. ![Building the UI prototype](graphics/B03998_03_08.jpg)


    Complete ListNotesUI.fxml document design


    3.  Perform the same steps for `AddEditUI.fxml`, and your design should end up
    like this: ![Building the UI prototype](graphics/B03998_03_09.jpg)


    Complete AddEditUI.fxml document design


    You need to check the FXML document to see how we nested many containers and UI
    controls to achieve the desired UI we had sketched earlier, in addition to using
    their properties to control the spacing, alignment, font, and coloring.


    Congratulations! You have converted your sketched layout to something vivid that
    could be presented as a project without logic to your team leaders and managers
    to get their feedback regarding colors, theming, and the final layout. Moreover,
    once it gets approved, you can proceed for the final customer feedback before
    diving deeper into the business logic.'
  trans: '

    # 第 3 章 开发 JavaFX 桌面与 Web 应用程序


    本章将介绍如何开发引人入胜的桌面和 Web 应用程序，利用多核硬件加速 GPU，交付具有惊艳外观和体验的高性能 UI 应用。


    由于 JavaFX 完全用 Java 从头编写，我们将使用一些 Java SE 8 内置核心库来驱动应用程序。此外，我们还将学习如何将应用程序打包为独立应用，以便启动和分发。


    同时，我们还将介绍 JavaFX 8 中任何 Web 应用所必需的核心 Web API，例如`javafx.scene.web.WebEngine`、`java.net.HttpURLConnection`和`javafx.scene.web.WebView`。


    我们将讨论 JavaFX 与 HTML5 之间的关系，这一点很重要，因为 JavaFX 的 API 与 HTML5 的特性相辅相成。HTML5 是一个富 Web
    内容平台，用于创建类似**RIA**（**富互联网应用**）Web 应用的用户体验，同时具备原生桌面软件的特性。


    更重要的是，我们将逐步开发桌面版的*笔记应用*，然后将其在 Web 上运行。


    此外，我们还将涵盖将*笔记应用作为 Web 应用*部署到桌面和 Web 所需的所有知识和技能。


    以下是本章将学到的技能：


    *   开发和运行桌面与 Web 应用程序

    *   控制应用程序 UI

    *   如何打包 JavaFX 8 桌面应用程序

    *   在 JavaFX 应用程序中加载 HTML5 内容

    *   从 JavaFX 向 JavaScript 发送数据，反之亦然

    *   部署 JavaFX Web 应用程序


    # 开发笔记应用


    仅为一个平台构建应用程序已经不够了。成功的产品需要支持桌面、Web、移动和嵌入式环境，但学习不同环境很困难。这时 JavaFX 的强大之处就体现出来了——只需简单调整，就能编写出在不同平台上运行的应用程序，正如本章将要展示的那样。


    在这里，我们将同时为桌面和 Web 构建一个*笔记*应用。在这个项目中，我将向你展示如何使用 JavaFX 8 SDK 和 Java 编程语言，利用之前安装的开发工具（参考第
    1 章，*开始使用 JavaFX 8*），从零开始创建一个完整的 JavaFX 应用程序。


    然后，我将展示如何创建应用程序的两个屏幕布局，并创建控制它们的 Java 类。我将创建按钮来控制不同场景之间的导航、保存数据，并通过属性绑定的强大功能动态更新
    UI 控件。


    最终项目将如下图所示：


    ![开发笔记应用](img/B03998_03_01.jpg)


    笔记应用


    此图显示了从主屏幕的“新建笔记”按钮打开的添加和编辑屏幕，用于添加新笔记，或通过“编辑”按钮编辑列出的笔记之一，如下所示：


    ![开发笔记应用](img/B03998_03_02.jpg)


    那么，你还在等什么？让我们开始吧！


    ## 构建 UI 原型


    构建任何成功的**复杂 UI**（即使是简单的 UI）应用的第一步，都是对布局、屏幕关系、状态和导航进行原型设计。先在纸上画出草图，然后从团队和经理那里获取反馈。修改后，一旦获得批准，就开始为客户构建一个真正的交互式原型，以便获取他们对最终产品的反馈。


    这就是我们现在要做的。我们的应用已经在纸上或任何易于使用的 UI 草图工具中布局好了，如下图所示。然后，我们将使用 Scene Builder 工具将其开发为完整的原型。


    此外，我们还将看到 NetBeans 与 Scene Builder 工具之间的互操作性。


    ### 注意


    请注意，先在纸上画出布局草图更容易，因为这是一种非常快速的方法，可以在使用工具开发之前编辑、改进并确定最终的应用布局。


    现在，我们已经画好了草图，准备构建应用的真实原型。


    充分利用这些工具的最佳方式是在 NetBeans IDE 中创建应用骨架（*控制器类和 FXML 基础页面定义*），然后在 Scene Builder 工具中创建和开发
    FXML 页面。这就是两个工具之间强大的互操作性。


    ![构建 UI 原型](img/B03998_03_03.jpg)


    以下是开始使用 JavaFX FXML 应用的步骤：


    1.  打开 NetBeans IDE，从主菜单中选择**文件**，然后选择**新建项目**，将打开**新建项目**对话框。从**类别**中选择**JavaFX**，然后在**项目**下选择**JavaFX
    FXML 应用程序**。然后点击**下一步**按钮：![构建 UI 原型](img/B03998_03_04.jpg)


    一个新的 JavaFX FXML 应用程序


    2.  在**JavaFX FXML 应用程序**对话框中，添加相关信息。在**项目名称**中，添加位置和**FXML 名称**（在我的例子中是`ListNotesUI`）。在**创建应用程序类**中，我添加了`packt.taman.jfx8.ch3.NoteTakingApp`，如下图所示。点击**完成**。![构建
    UI 原型](img/B03998_03_05.jpg)

    3.  现在我们有了一个包含第一个 FXML UI 文档（`ListNotesUI.fxml`）的项目，我们需要添加第二个 FXML UI 文档（`AddEditUI.fxml`）及其控制器。

    4.  为此，从文件菜单中选择**新建文件**；然后在**类别**列表中选择**JavaFX**，从**文件类型**列表中选择**空 FXML**，最后点击**下一步**，如下图所示。

    5.  在**新建空 FXML 和位置**对话框中，将**FXML 名称**字段编辑为`AddEditUI`，然后点击**下一步**。![构建 UI 原型](img/B03998_03_06.jpg)


    添加新的空 FXML 文档


    6.  在如下屏幕所示的**控制器类**对话框中，勾选**使用 Java 控制器**复选框。确保已选择**创建新控制器**，并将**控制器名称**设为`AddEditUIController`。然后点击**下一步**，跳过**层叠样式表**对话框，最后点击**完成**：![构建
    UI 原型](img/B03998_03_07.jpg)


    为 FXML 文档添加新控制器


    构建好项目结构后，是时候使用 Scene Builder 将控件添加到页面 UI 中了，就像我们在纸上画的那样。操作很简单：


    1.  在 NetBeans 中，右键点击`ListNotesUI.fxml`并选择**打开**，或者直接双击它。**Scene Builder**将以设计模式打开你的
    FXML 文档。


    ### 注意


    注意：仅当你的机器上安装了 Scene Builder 时才有效。


    2.  按照以下截图设计页面。最重要的是，在返回 NetBeans 或关闭**Scene Builder**进行逻辑实现之前，别忘了保存更改。![构建 UI
    原型](img/B03998_03_08.jpg)


    完整的 ListNotesUI.fxml 文档设计


    3.  对`AddEditUI.fxml`执行相同步骤，你的设计应如下所示：![构建 UI 原型](img/B03998_03_09.jpg)


    完整的 AddEditUI.fxml 文档设计


    你需要检查 FXML 文档，看看我们是如何嵌套许多容器和 UI 控件来实现之前草图的 UI 的，此外还使用了它们的属性来控制间距、对齐、字体和颜色。


    恭喜！你已经将草图布局转化为生动的原型，可以作为无逻辑的项目展示给团队领导和经理，获取他们对颜色、主题和最终布局的反馈。而且，一旦获得批准，你就可以在深入业务逻辑之前，继续获取最终客户的反馈。

    '
- fmt: "# Bringing your application to life – adding interactions\n\nAfter designing\
    \ your application, you need to bring it to life by making it more interactive\
    \ and responsive to the functionality it is supposed to perform and act on the\
    \ customer's proposed functional requirement.\n\nThe first thing I always do is\
    \ to add the navigation handler from page to page, and I have done that in each\
    \ FXML document controller class.\n\nTo eliminate redundancy and be modular, I\
    \ have created a base navigation method in the `BaseController.java` class, which\
    \ will be extended by all controllers in the system. This class will be useful\
    \ for adding any common functionality and shared attributes.\n\nThe following\
    \ method, `navigate(Event event, URL fxmlDocName)`, is one of the most important\
    \ pieces of code that will be used in all of our system navigation (the comments\
    \ illustrate the working mechanism):\n\n```\nprotected void navigate(Event event,\
    \ URL fxmlDocName) throws IOException {\n  //Loading new fxml UI document\n  Parent\
    \ pageParent = FXMLLoader.load(fxmlDocName);\n  //Creating new scene\n  Scene\
    \ scene = new Scene(pageParent);\n  //get current stage\n  Stage appStage = (Stage)((Node)\
    \ event.getSource()).getScene().getWindow();\n  //Hide old stage\n  appStage.hide();\
    \ // Optional\n  //Set stage with new Scene\n  appStage.setScene(scene);\n  //Show\
    \ up the stage\n  appStage.show();\n}\n```\n\nThis method will be called from\
    \ the action handler of the **New Note** and edit button in the `ListNotesUI.fxml`\
    \ page at `ListNotesUIController.java` and the **List Notes**, save, and **Cancel**\
    \ buttons in the `AddEditUI.fxml` page at `AddEditUIController.java` as the following\
    \ respectively.\n\nPay attention to the relationship between buttons defined in\
    \ the FXML document and the controller. The `@FXML` annotation comes into play\
    \ here to bind FXML attributes (*using #*) with the defined actions in the controller:\n\
    \nThe **New Note** button definition in the `ListNotesUI.fxml` file is as follows:\n\
    \n```\n<Button alignment=\"TOP_CENTER\"\n        contentDisplay=\"TEXT_ONLY\"\n\
    \        mnemonicParsing=\"false\"\n        onAction=\"#newNote\" \n        text=\"\
    New Note\" \n        textAlignment=\"CENTER\" \n        wrapText=\"true\" \n/>\n\
    ```\n\nThe **New Note** action is defined in `ListNotesUIController.java`, bound\
    \ to the preceding button using `onAction=\"#newNote\"`:\n\n```\n@FXML\n private\
    \ void newNote(ActionEvent event) throws IOException {\n        editNote = null;\n\
    \        navigate(event, ADD.getPage());\n }\n```\n\nThe **Back** button definition\
    \ in the `AddEditUI.fxml` file is as follows:\n\n```\n<Button alignment=\"TOP_CENTER\"\
    \    \n        contentDisplay=\"TEXT_ONLY\"\n        mnemonicParsing=\"false\"\
    \n        onAction=\"#back\" \n        text=\"Notes List\" \n        textAlignment=\"\
    CENTER\"\n        wrapText=\"true\"\n/>\n```\n\nThe **Back** action is defined\
    \ in `AddEditUIController.java`, bound to the preceding button using `onAction=\"\
    #back\"`:\n\n```\n@FXML\nprivate void back(ActionEvent event) throws IOException\
    \ {\n        navigate(event, FXMLPage.LIST.getPage());\n}\n```\n\nYou may be wondering\
    \ what the `FXMLPage.java` class does. It is an enum (for more about enums, visit\
    \ [https://docs.oracle.com/javase/tutorial/java/javaOO/enum.html](https://docs.oracle.com/javase/tutorial/java/javaOO/enum.html)).\
    \ I have created enums to define all our FXML document names and their locations,\
    \ in addition to any utility methods relevant to those FXML document, helping\
    \ to ease coding in our system.\n\n### Tip\n\nThis concept of maintainability\
    \ helps in large systems to maintain constant properties and functionality in\
    \ one place for future ease of refactoring, and allows us to change names in one\
    \ place instead of roaming all over the system to change just one name.\n\nIf\
    \ you check system controllers, you will find all the logic for handling other\
    \ button's actions – deleting, editing, clearing, and saving notes."
