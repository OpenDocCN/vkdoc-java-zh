  trans: "\n## 使用 NetBeans IDE\n\n要快速开始使用 NetBeans IDE 创建、编码、编译并运行一个简单的 JavaFX 风格的\
    \ `Hello World` 应用程序，请遵循本节概述的步骤：\n\n1.  从 **文件** 菜单中，选择 **新建项目**。\n2.  从 **JavaFX\
    \ 应用程序类别** 中，选择 **JavaFX 应用程序**。点击 **下一步**。\n3.  将项目命名为 `HelloJavaFX`。你也可以选择为应用程序类定义包结构。然后点击\
    \ **完成**，如下图所示：\n\n    ![使用 NetBeans IDE](img/B03998_01_11.jpg)\n\n    新建 JavaFX\
    \ 应用程序向导\n\n    NetBeans 会打开 `HelloJavaFX.java` 文件，并用一个基本的“Hello World”应用程序代码填充它。\n\
    \n    ### 注意\n\n    你会发现此版本的代码与 NetBeans 实际生成的代码略有不同，你可以比较它们以找出差异，但它们具有相同的结构。我这样做是为了在点击\
    \ **说“Hello World”** 按钮时，将结果显示在 `Scene` 上的文本节点中，而不是控制台中。为此，还使用了一个 `VBox` 容器。\n\
    \n4.  右键点击项目，然后从菜单中选择 **运行**，如下图所示：![使用 NetBeans IDE](img/B03998_01_12.jpg)\n\n\
    \    运行应用程序\n\n5.  NetBeans 将编译并运行该应用程序。输出应如下图所示：![使用 NetBeans IDE](img/B03998_01_13.jpg)\n\
    \n    从 NetBeans IDE 启动的 JavaFX Hello World\n\n6.  点击按钮，你应该会看到以下结果：![使用 NetBeans\
    \ IDE](img/B03998_01_14.jpg)\n\n    JavaFX Hello World 结果\n\n以下是基本 Hello World\
    \ 应用程序 (`HelloJavaFX.java`) 的修改后代码：\n\n```\nimport javafx.application.Application;\n\
    import javafx.scene.Scene;\nimport javafx.scene.control.Button;\nimport javafx.scene.text.Text;\n\
    import javafx.stage.Stage;\nimport static javafx.geometry.Pos.CENTER;\nimport\
    \ javafx.scene.layout.VBox;\n\n/**\n  * @author mohamed_taman\n */\npublic class\
    \ HelloJavaFX extends Application {\n\n  @Override\n  public void start(Stage\
    \ primaryStage) {\n\n    Button btn = new Button();\n    Text message = new Text();\n\
    \n    btn.setText(\"Say 'Hello World'\");\n\n    btn.setOnAction(event -> {\n\
    \      message.setText(\"Hello World! JavaFX style :)\");\n    });\n\n    VBox\
    \ root = new VBox(10,btn,message);\n    root.setAlignment(CENTER);\n\n    Scene\
    \ scene = new Scene(root, 300, 250);\n\n    primaryStage.setTitle(\"Hello JavaFX\
    \ 8 World!\");\n    primaryStage.setScene(scene);\n    primaryStage.show();\n\
    \  }\n  public static void main(String[] args) {\n    launch(args);\n  }\n}\n\
    ```\n\n## 工作原理\n\n以下是关于 JavaFX 应用程序基本结构需要了解的重要事项：\n\n*   JavaFX 应用程序的主类应继承 `javafx.application.Application`\
    \ 类。`start()` 方法是所有 JavaFX 应用程序的*主入口点*。\n*   JavaFX 应用程序通过*舞台*和*场景*来定义用户界面容器。JavaFX\
    \ `Stage` 类是顶层的 JavaFX 容器。JavaFX `Scene` 类是所有内容的容器。以下代码片段创建了一个舞台和场景，并使场景在给定的像素大小下可见——`new\
    \ Scene(root, 300, 250)`。\n*   在 JavaFX 中，场景的内容表示为节点的分层场景图。在此示例中，根节点是一个 `VBox`\
    \ 布局对象，它是一个可调整大小的布局节点。这意味着根节点的大小会跟随场景的大小，并在用户调整舞台大小时发生变化。\n*   这里使用 `VBox` 作为容器，将其内容节点垂直排列成单列多行。我们将按钮\
    \ **btn** 控件添加到列的第一行，然后将文本 **message** 控件添加到同一列的第二行，垂直间距为 10 像素，如下代码片段所示：\n\n\
    \    ```\n    VBox root = new VBox(10,btn,message);\n    root.setAlignment(CENTER);\n\
    \    ```\n\n*   我们为按钮控件设置了文本，并添加了一个事件处理器，当按钮被点击时，将消息文本控件设置为 **Hello World! JavaFX\
    \ style :)**。\n*   你可能会注意到一段用 Java 编写的奇怪代码语法，却没有编译器错误。这是一个 **Lambda** 表达式，它已被添加到\
    \ Java SE 8 中，我们将在第 2 章 *JavaFX 8 要点与创建自定义 UI* 中简要讨论它。与旧的匿名内部类风格稍作比较，现在使用 Lambda\
    \ 表达式更简洁、更精炼。请看这段代码对比：\n\n    旧式写法：\n\n    ```\n    btn.setOnAction(new EventHandler<ActionEvent>()\
    \ {\n      @Override\n      public void handle(ActionEvent event) {\n        message.setText(\"\
    Hello World! JavaFX style :)\");\n      }\n    });\n    ```\n\n    新时代写法：\n\n\
    \    ```\n    btn.setOnAction(event -> {\n        message.setText(\"Hello World!\
    \ JavaFX style :)\");\n    });\n    ```\n\n*   当应用程序的 **JAR** 文件是使用 JavaFX Packager\
    \ 工具创建时，该工具会将 JavaFX Launcher 嵌入到 JAR 文件中，因此 JavaFX 应用程序不需要 `main()` 方法。\n*  \
    \ 然而，包含 `main()` 方法是有用的，这样你就可以运行那些没有使用 JavaFX Launcher 创建的 JAR 文件，例如在使用 JavaFX\
    \ 工具未完全集成的 IDE 时。此外，嵌入 JavaFX 代码的 **Swing** 应用程序也需要 `main()` 方法。\n*   在这里，在我们的\
    \ `main()` 方法的入口点，我们通过简单地将命令行参数传递给 `Application.launch()` 方法来启动 JavaFX 应用程序。\n\
    *   在 `Application.launch()` 方法执行后，应用程序将进入就绪状态，框架内部将调用 `start()` 方法来开始。\n*   此时，程序执行发生在\
    \ *JavaFX 应用程序线程* 上，而不是 **主线程** 上。当调用 `start()` 方法时，一个 JavaFX `javafx.stage.Stage`\
    \ 对象可供你使用和操作。\n\n### 注意\n\n高级主题将在接下来的章节中详细讨论。更重要的是，我们将在接下来的章节中深入了解 JavaFX 应用程序线程。在最后三章中，我们将看到如何将其他线程的结果带入\
    \ JavaFX 应用程序线程，以便在场景上正确渲染。\n\n# 总结\n\n到目前为止，你已经了解了 JavaFX 是什么，并看到了它的强大之处。你已经成功下载并安装了\
    \ Java 8 JDK 和 NetBeans IDE。在成功安装必备软件后，你通过 NetBeans IDE 创建了一个 JavaFX Hello World\
    \ GUI 应用程序。在学习了如何编译和运行 JavaFX 应用程序之后，你对源文件 `HelloJavaFX.java` 进行了快速的代码走查。\n\n\
    接下来，在第 2 章 *JavaFX 8 要点与创建自定义 UI* 中，你将了解 JavaFX 8 的架构组件和引擎，它们使 JavaFX 应用程序能够在底层高效、流畅地运行。你还将学习最常见的布局\
    \ UI 组件，并了解如何为整个应用程序或单个场景节点设置主题。\n\n我们还将介绍 Java SE 8 最重要的特性——Lambda 表达式及其工作原理。然后，我们将深入了解\
    \ **Scene Builder**，将其作为声明式 UI 和高效工具，接着学习生成的基于 FXML 的标记文档，以及如何将其导入 NetBeans IDE，以继续实现你的应用程序逻辑，并将其与你已在\
    \ FXML 文档中声明的 UI 控件关联起来。\n\n最后，你将能够创建一个未随默认 JavaFX 8 UI 控件一起提供的自定义 UI 组件。\n"
- fmt: '# Chapter 2. JavaFX 8 Essentials and Creating a Custom UI


    Getting to know the essentials of JavaFX will definitely help you to easily build
    complicated and complex UI solutions.


    In this chapter, you will get a brief introduction about JavaFX 8 architecture,
    so you get an idea of how JavaFX architecture components and engines interconnect
    together with your JavaFX application efficiently and render its graphics smoothly.


    You will learn how to render graphics on the JavaFX scene and, for that, we will
    create a basic application using a scene, some controls, and styling.


    We will touch upon the fundamentals of Java SE 8 features (such as `Lambda` and
    `functional interfaces`) to help increase code readability, quality, and productivity.


    Once we have our first structured JavaFX 8 application, wouldn''t it be nice if
    you could change the UI of your application without altering its functionality?
    You will learn about theming by having a glance at the fundamentals of JavaFX
    CSS styling.


    Finally, you will find out how to use Scene Builder to create and define UI screens
    graphically and save them as a JavaFX FXML-formatted file. And you will get hands-on
    experience of creating `custom controls`.


    In this chapter, we''ll cover the following topics:


    * Understanding JavaFX architecture components

    * Using JavaFX components to set up the UI

    * Using Java SE 8, Lambda expressions, and other features

    * Theming your application to target different platforms

    * Customizing the application UI with CSS

    * Using the Scene Builder tool to create the UI visually

    * Building a custom UI with FXML


    # Quick review of the JavaFX 8 architecture


    To better understand how the framework''s components and engines interact together
    to run your JavaFX application, this section gives a high-level description of
    the JavaFX architecture and ecosystem.


    The following figure illustrates the JavaFX platform''s architectural components.
    It displays each component and how each of them interconnects.


    The engine that is responsible for running your JavaFX application code lies below
    the JavaFX public APIs.


    This engine is composed of subcomponents. These include `Prism`, a JavaFX high-performance
    graphics engine; the Glass toolkit, a small and efficient windowing system; a
    media engine; and a web engine.


    ### Note


    While these components are not exposed through public APIs, we will describe them
    so you have a better idea of what makes JavaFX applications run successfully in
    an efficient way.


    ![Quick review of the JavaFX 8 architecture](graphics/B03998_02_01.jpg)


    JavaFX architecture diagram


    For more information and a description of the JavaFX architecture and ecosystem,
    visit [http://docs.oracle.com/javase/8/javafx/get-started-tutorial/jfx-architecture.htm](http://docs.oracle.com/javase/8/javafx/get-started-tutorial/jfx-architecture.htm).


    ## Scene graphs


    Every application has a starting root point to construct a UI hierarchy, and the
    starting point for JavaFX applications is the `scene graph`. In the preceding
    screenshot, it is shown as part of the top layer in blue. It is the root tree
    of nodes that represents all of the visual elements of the application''s user
    interface. It also tracks and handles any user input and can be rendered, as it
    is itself a UI node.


    `Node` is any single element in the scene graph tree. Each node has these properties
    by default – an ID for identification, a list of style classes for changing its
    visual properties, and a bounding volume to fit correctly on the scene with other
    components and inside its parent layout container node, with the exception of
    the root node of a scene graph.


    Each node in a scene graph tree has a single parent but could have zero or more
    children; however, the scene root has no parent (is null). Moreover, JavaFX has
    a mechanism to ensure a node could have only a single parent; it can also have
    the following:


    * Visual effects, such as blurs and shadows

    * Controlling components transparency via opacity

    * CPU-accelerated 2D transforms, transitions, and rotations

    * 3D transforms such as transitions, scaling, and rotations

    * Event handlers (such as mouse events, key events, or other input methods such
    as touch events)

    * An application-specific state


    The following figure shows the relationship between the stage, scene, UI nodes,
    and graphical tree:


    ![Scene graphs](graphics/B03998_02_02.jpg)


    JavaFX UI tree hierarchy relationship


    The graphics primitives also are an integral part of the JavaFX scene graph, such
    as lines, rectangles, and text in addition to images, media, UI controls, and
    layout containers.


    When it comes to delivering complex and rich UIs for customers, scene graphs simplify
    this task. Also, you can use the `javafx.animation` APIs to quickly and easily
    animate various graphics in the scene graph.


    In addition to these features, the `javafx.scene` API allows the creation and
    specification of several content types as the following:


    * **Nodes**: Any node element represented as UI controls, charts, groups, containers,
    embedded web browser, shapes (2-D and 3-D), images, media, and text

    * **Effects**: These are simple objects that, when applied to a UI node, change
    its appearance on the scene graph node, such as blurs, shadows, and color adjustment

    * **State**: Any application-specific state such as transforms (positioning and
    orientation of nodes) and visual effects


    ## Java public APIs for JavaFX features


    This is your Swiss-knife toolkit provided as a complete set of Java public APIs
    that support rich client application development.


    These APIs provide you with unprecedented flexibility to construct your rich client
    UI applications by combining the best capabilities of the Java SE platform with
    comprehensive, immersive media functionality into an intuitive and comprehensive
    one-stop development environment at hand.


    These Java APIs for JavaFX allow you to do the following:


    * Use the powerful features of Java SE, from generics, annotations, and multithreading,
    to new Lambda Expressions (introduced in Java SE 8).

    * Provides an easier way for web developers to use JavaFX from other JVM-based
    dynamic languages, such as `JavaScript`.

    * Writing large and complex JavaFX applications by integrating other system languages,
    such as `Groovy`.

    * Binding your UI controls to your controller attributes for automatic notifications
    and updates to be reflected from your model to bound UI nodes. Binding includes
    support for high-performance lazy binding, binding expressions, bound sequence
    expressions, and partial bind reevaluation. We will see this in action and more
    in [Chapter 3](#ch03.html "Chapter 3. Developing a JavaFX Desktop and Web Application"),
    *Developing a JavaFX Desktop and Web Application*.

    * Introducing observable lists and maps, which allow applications to wire UIs
    to data models to observe the changes in those data models and update the corresponding
    UI control accordingly by extending the Java collections library.'
