    \  minus(arm.wristPosition()).magnitude());\n  c.setMaterial(materialArm);\n \
    \ // 将圆柱体旋转至其方向\n  final Vector v=arm.direction();\n  Vector cross = (new Vector(v.getX(),-v.getY(),-v.getZ())).cross(new\
    \ Vector(0,-1,0));\n  double ang=(new Vector(v.getX(),-v.getY(),-v.getZ())).\n\
    \  angleTo(new Vector(0,-1,0));\n  c.getTransforms().addAll(new Translate(p.getX(),-p.getY(),-p.getZ()),new\
    \ Rotate(- Math.toDegrees(ang), 0, 0, 0, new Point3D(cross.getX(),- cross.getY(),cross.getZ())));\n\
    \  // 将手臂添加到场景中\n  root.getChildren().add(c);\n});\n```\n\n### 运行应用程序\n\n恭喜！现在连接你的\
    \ Leap 控制器（Leap 图标应为绿色）并运行你的应用程序。如果一切正常，你最初应该会看到一个空的应用程序场景，如下面的截图所示：\n\n![运行应用程序](img/B03998_08_10.jpg)\n\
    \nLeap JavaFX 应用程序的初始运行\n\n移动并挥动你的手，你手部的骨骼模型应该会随着你真实的手在背景中显现，并响应你的真实动作，如下所示：\n\
    \n![运行应用程序](img/B03998_08_11.jpg)\n\nLeap JavaFX 应用程序与 Leap 控制器的交互\n\n尝试不同的手臂或手部姿势和位置；你应该会在你的\
    \ JavaFX 应用程序场景中看到相应的复制效果，如下面的截图所示：\n\n![运行应用程序](img/B03998_08_12.jpg)\n\nLeap\
    \ JavaFX 应用程序与 Leap 控制器的交互（不同手部姿势）\n\n# 更多示例\n\n有关将 JavaFX 与 Leap Motion 设备结合使用的更多示例，请参考在线资源，例如\
    \ [`www.parleys.com/share.html#play/525467d6e4b0a43ac12124ad`](http://www.parleys.com/share.html#play/525467d6e4b0a43ac12124ad)\
    \ 或 [`jperedadnr.blogspot.com.es/2013/06/leap-motion-controller-and-javafx-new.html`](http://jperedadnr.blogspot.com.es/2013/06/leap-motion-controller-and-javafx-new.html)。如需与其他编程语言交互，请访问\
    \ [`developer.leapmotion.com/gallery`](https://developer.leapmotion.com/gallery)。\n\
    \n# 总结\n\n在本章中，你了解了令人印象深刻的 Leap Motion 设备，以及使用它来增强 JavaFX 应用程序所产生的绝佳组合效果。\n\n\
    你首先了解了该设备及其工作原理。接着，我们讨论了它的 Java SDK，并探索了一个简单的应用程序，在其中你学习了如何在一个线程中监听和处理来自 Leap\
    \ 设备的数据，同时在 JavaFX 线程中触发事件以在场景图中处理它们。\n\n在下一章中，我将提供专为真正的 JavaFX 专家准备的高级工具和资源。\n\
    \n# 附录 A. 成为 JavaFX 专家\n\n你的 JavaFX 8 之旅会止步于此吗？绝对不会！JavaFX 是一个非常庞大的主题，它每天都在发展，从\
    \ Oracle 发布的核心版本（包含新特性、功能和稳定性），到许多社区个人和公司创建的第三方库，以填补你可能遇到的任何空白，或者围绕它发明核心中不存在的新功能。\n\
    \n当然，通过本书，我无法涵盖所有 JavaFX 8 主题。相反，我试图触及许多 JavaFX 领域的表面，并打开关键主题，以便通过找到你自己的方法并了解如何自行操作，让你的探索之旅更加轻松。\n\
    \n然而，我们还通过开发传统的 Web 和桌面应用程序讨论了许多其他工具和技术，然后转向了一个更高级且市场需求更大的领域——移动开发。\n\n我们通过了解**物联网**（**IoT**，即信息技术的下一个时代）来探索未来，我们涵盖的主题就越有趣。我们曾在电影中多次看到运动并想象过它，通过使用令人惊叹的\
    \ Leap Motion v2 小工具开发增强型非接触式 JavaFX 8，我们让梦想成真。\n\n要成为 JavaFX 专家并获得其他经验，还有很多内容本书没有讨论。\n\
    \n*那么，我们接下来该何去何从？*\n\n现在，既然你已经拥有许多可运行的 JavaFX 8 应用程序，并了解了它在多个平台和硬件上的工作原理，剩下的就取决于你和你的创造力了。\n\
    \n加入 Facebook、Twitter 上的社区，关注技术专家的博客、JavaFX 博客 [`blogs.oracle.com/javafx/`](http://blogs.oracle.com/javafx/)，并在\
    \ [`fxexperience.com/`](http://fxexperience.com/) 上查找新闻、演示和见解。最重要的是，要动手实验。\n\n\
    在本章末尾，请务必查看当今在生产环境中使用 JavaFX 的许多*框架*、*库*和*项目*。\n\n## 官方文档\n\n*   **JavaFX 文档**：这是一个指向所有\
    \ JavaFX 资源、新闻、经验、视频、书籍、API 文档、技术文章和教程的绝佳资源：\n\n    [`www.oracle.com/technetwork/java/javase/documentation/javafx-docs-2159875.html`](http://www.oracle.com/technetwork/java/javase/documentation/javafx-docs-2159875.html)\n\
    \n*   **Java 平台标准版 (Java SE) 8**：其中的*客户端技术*包含许多涵盖所有 JavaFX 主题的示例：[`docs.oracle.com/javase/8/javase-clienttechnologies.htm`](http://docs.oracle.com/javase/8/javase-clienttechnologies.htm)\n"
- fmt: "# JavaFX samples\n\nOne of the greatest resources to start learning JavaFX\
    \ 8 is the Java Development Kit 8 samples and demos, which include a JavaFX demo\
    \ folder that contains many fantastic and advanced applications that cover all\
    \ JavaFX topics with source code that you can experiment with yourself.\n\nYou\
    \ can download the samples, by just visiting the following link [http://www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html](http://www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html),\
    \ and then go to the **Java SE Development Kit 8u45 Demos and Samples Downloads**\
    \ table, check the **Accept License Agreement** radio button, and click on the\
    \ zip file link relevant to your operating system, as shown in the following figure:\n\
    \n![JavaFX samples](graphics/B03998_09_1.jpg)\n\nDownload JDK & JavaFX 8 demos\
    \ and samples\n\nThe `samples` zip file contains pre-built samples that you can\
    \ run, plus the NetBeans project files for each sample.\n\nExtracting the zip\
    \ file produces the following directory structure:\n\n```\n--src  (Contains a\
    \ NetBeans project for each sample)\n --<Sample1>\n  --nbproject\n  --src\n  --build.xml\n\
    \  --manifest.mf\n  --<Sample2>\n  <sample1>.jar(Runs the sample as a standalone\
    \ application)\n<sample2>.jar\n```\n\n![JavaFX samples](graphics/B03998_09_2.jpg)\n\
    \nJavaFX samples folder contents\n\nAny `sample.jar` can run as a standalone application;\
    \ double-click on the JAR file and we have four applications:\n\n1.  `Ensemble8.jar`:\
    \ A gallery of sample applications that demonstrate a large variety of JavaFX\
    \ features, including animation, charts, and controls. For each sample, you can\
    \ do the following on all platforms:\n\n*   View and interact with the running\
    \ sample\n    *   Read its description.\n\nYou can do the following for each sample\
    \ on desktop platforms only:\n\n*   Copy its source code\n    *   For several\
    \ samples, you can adjust the properties of the sample components\n    *   If\
    \ you are connected to the Internet, you can also follow links to the relevant\
    \ API documentation *Ensemble8 also runs with JavaFX for ARM (means running on\
    \ Raspberry Pi)*.![JavaFX samples](graphics/B03998_09_3.jpg)\n\nThe Ensemble8\
    \ application running\n\n2.  `MandelbrotSet.jar`: A sample application that demonstrates\
    \ the advantages of parallel execution done using the Java Parallel API.\n\nThe\
    \ application renders an image using the Mandelbrot set algorithm and provides\
    \ intuitive navigation within the range of input parameters.\n\nMore information\
    \ is available in the `index.html` file inside the `MandelbrotSet` folder.\n\n\
    ![JavaFX samples](graphics/B03998_09_4.jpg)\n\nThe MandelbrotSet application running\n\
    \n3.  `Modena.jar`: A sample application that demonstrates the look and feel of\
    \ UI components using the `Modena` theme. It gives you the option to contrast\
    \ the `Modena` and `Caspian` themes and explore various aspects of these themes.\
    \ ![JavaFX samples](graphics/B03998_09_5.jpg)\n\nThe Modena application running\n\
    \n4.  `3DViewer.jar`: 3DViewer is a sample application that allows the user to\
    \ navigate and examine a 3D scene with a mouse or a track pad. 3DViewer has importers\
    \ for a subset of the features in **OBJ** and Maya files.\n\nThe ability to import\
    \ animation is also provided for Maya files. (Note that, in the case of Maya files,\
    \ the construction history should be deleted on all the objects when saving as\
    \ a Maya file.) 3DViewer also has the ability to export the contents of the scene\
    \ as Java or `FXML` files.\n\n![JavaFX samples](graphics/B03998_09_6.jpg)\n\n\
    The 3DViewer application running\n\nIn order to play with the code yourself and\
    \ to experiment with any changes you may have, congratulations, you have this\
    \ chance to do this by running all the previously mentioned applications from\
    \ **NetBeans** as follows:\n\n5.  In the NetBeans IDE, click on **Open Project**\
    \ in the toolbar, or on the **File** menu and select **Open Project**.\n6.  Navigate\
    \ to the location in which you unzipped the samples, and in the `src` directory,\
    \ select a project and then click on **Open**.\n7.  To run the application in\
    \ the NetBeans IDE, in the **Project** pane, right-click on the project and choose\
    \ **Run**.\n\n# Java SE 8\n\nAs a reminder, JavaFX 8 is built into the Java 8\
    \ SDK. This means that you only need to download the Java 8 SDK. The Java 8 software\
    \ development kit and related information can be downloaded from the following\
    \ locations:\n\n*   Java 8 at Oracle Technology Network:\n\n    [http://oracle.com/java8](http://oracle.com/java8)\n\
    \n*   The Java development kit:\n\n    [http://www.oracle.com/technetwork/java/javase/downloads/index.html](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\n\
    \n*   What is new in Java 8? Let's check the new features of Java 8:\n\n    [http://www.oracle.com/technetwork/java/javase/8-whats-new-2157071.html](http://www.oracle.com/technetwork/java/javase/8-whats-new-2157071.html)\n\
    \n*   Java SE 8 new features tour:\n\n    [http://tamanmohamed.blogspot.com/2014/06/java-se-8-new-features-tour-big-change.html](http://tamanmohamed.blogspot.com/2014/06/java-se-8-new-features-tour-big-change.html)\n\
    \n## The Java SE 8 API documentation and tutorials\n\nThe Java 8 documentation\
    \ and guides are at the following links:\n\n*   The Java SE 8 Javadoc API documentation:\n\
    \n    [http://docs.oracle.com/javase/8](http://docs.oracle.com/javase/8)\n\n*\
    \   The JavaFX 8 Javadoc API documentation:\n\n    [http://docs.oracle.com/javase/8/javafx/api](http://docs.oracle.com/javase/8/javafx/api)\n\
    \n*   The Java SE 8 Overview Documentation:\n\n    [http://docs.oracle.com/javase/8/docs/index.html](http://docs.oracle.com/javase/8/docs/index.html)\n\
    \n*   The Java SE 8 tutorial:\n\n    [http://docs.oracle.com/javase/tutorial/tutorialLearningPaths.html](http://docs.oracle.com/javase/tutorial/tutorialLearningPaths.html)\n\
    \n## Project Lambda\n\nThe core Java SE 8 added language features are lambda expressions\
    \ and the stream API. The following references are road maps, blogs, and videos\
    \ of topics surrounding project lambda:\n\n*   State of the Lambda, Brian Goetz\
    \ (Oracle):\n\n    [http://cr.openjdk.java.net/~briangoetz/lambda/lambda-state-final.html](http://cr.openjdk.java.net/~briangoetz/lambda/lambda-state-final.html)\n\
    \n*   Java 8 Revealed: Lambdas, Default Methods and Bulk Data Operations, Anton\
    \ Arhipov:\n\n    [http://zeroturnaround.com/rebellabs/java-8-revealed-lambdas-defaultmethods-and-bulk-data-operations](http://zeroturnaround.com/rebellabs/java-8-revealed-lambdas-defaultmethods-and-bulk-data-operations)\n\
    \n*   10 examples of Lambda Expressions and Streams in Java 8, Javin Paul:\n\n\
    \    [http://javarevisited.blogspot.com/2014/02/10-example-of-lambdaexpressions-in-java8.html](http://javarevisited.blogspot.com/2014/02/10-example-of-lambdaexpressions-in-java8.html)\n\
    \n*   Java SE 8: Lambda Quick Start, Oracle:\n\n    [http://www.oracle.com/webfolder/technetwork/tutorials/obe/java/Lambda-QuickStart/index.html](http://www.oracle.com/webfolder/technetwork/tutorials/obe/java/Lambda-QuickStart/index.html)\n\
    \n*   Java 8: Closures, Lambda Expressions Demystified, Frank Hinkel:\n\n    [http://frankhinkel.blogspot.com/2012/11/java-8-closures-lambdaexpressions.html](http://frankhinkel.blogspot.com/2012/11/java-8-closures-lambdaexpressions.html)\n\
    \n## Nashorn\n\nJava SE 8 includes a new scripting engine called **Nashorn**,\
    \ which is a new and improved JavaScript engine for the Java runtime. The engine\
    \ enables developers to use the JavaScript language to program applications.\n\
    \nThe following links and references are articles and blogs describing Nashorn:\n\
    \n*   Oracle's Nashorn: A next Generation JavaScript Engine for the JVM, Julien\
    \ Ponge:\n\n    [http://www.oraclejavamagazine-digital.com/javamagazine_twitter/20140102/?pg=60#pg60](http://www.oraclejavamagazine-digital.com/javamagazine_twitter/20140102/?pg=60#pg60)\n\
    \n*   Open JDK's Nashorn site:\n\n    [https://wiki.openjdk.java.net/display/Nashorn/Main](https://wiki.openjdk.java.net/display/Nashorn/Main)\n\
    \n*   The Nashorn blog:\n\n    [https://blogs.oracle.com/Nashorn](https://blogs.oracle.com/Nashorn)"
