    \ this baseline, a LED will turn on.\n\nInside the `setup()` method, we initialize\
    \ the serial port to the desired speed of 9,600 bits per second, and we use a\
    \ `for` loop to set some pins as directions (output pins) and turn them off.\n\
    \nInside the `loop()` method, we start reading the temperature sensor as voltage\
    \ values between 0 and 1,023, then send the sensor values to the serial port using\
    \ `Serial.print()` so that any connected device (for example, our computer) can\
    \ read them. These analog readings measure the temperature of the room or of your\
    \ skin if you touch the sensor.\n\nWe need to convert the analog sensor readings\
    \ into voltage values using the following equation:\n\n```\nvoltage = (sensorVal\
    \ / 1024.0) * 5.0\n```\n\nFrom the datasheet, we use the sensor specifications\
    \ to convert the voltage into temperature using this equation:\n\n```\ntemperature\
    \ = (voltage - .5) * 100\n```\n\nWith the real temperature, you can set up an\
    \ `if else` statement to light the LEDs. Using the baseline temperature as a starting\
    \ point, you will turn on one LED for every 2 degrees of temperature increase\
    \ above that baseline.\n\nYou are going to look for a range of values as you move\
    \ through the temperature scale.\n\nThe **Analog-to-Digital Converter** (**ADC**)\
    \ reads really fast (in terms of microseconds), and a delay of 1 ms at the end\
    \ of the `loop()` function is advised. But given that this is going to be sent\
    \ to the serial port, a 100 ms delay is finally set.\n\n#### Testing, verifying,\
    \ and uploading the sketch into the Arduino\n\nWith the code uploaded to the Arduino,\
    \ click on the serial monitor icon as illustrated in the following screenshot:\n\
    \n![Testing, verifying, and uploading the sketch into the Arduino](graphics/B03998_07_08.jpg)\n\
    \nArduino IDE toolbar icons\n\nYou should see a stream of values coming out, formatted\
    \ like this:\n\n```\nSensor Value: 158, Volts: 0.77, degrees C: 27.15\n```\n\n\
    Now try touching your finger around the sensor while it is plugged into the breadboard\
    \ and see what happens to the values in the serial monitor.\n\nMake a note of\
    \ the temperature when the sensor is left in the open air. Close the serial monitor\
    \ and change the `baselineTemp` constant to what you have observed earlier. Upload\
    \ the code again and try holding the sensor again; as the temperature increases,\
    \ you should see LEDs turn on one by one.\n\nCongratulations, hot stuff!\n\n###\
    \ Reading data from serial ports\n\nThere is no standard way to read serial ports\
    \ in Java, as it is a hardware-specific task that breaks the Java multiplatform\
    \ concept. So, we need a third party library to do the job and it should be written\
    \ in Java for integration with our application.\n\nArduino IDE used the first\
    \ library for serial communication, called **RXTX**. Originally from Trent Jarvi\
    \ and distributed under LGPL v2.1+ Linking Over Controlled Interface license,\
    \ it was distributed with Arduino IDE until the 1.5.5 beta version to communicate\
    \ with the board. However, it was very slow and it is now deprecated.\n\nThe new\
    \ **Java Simple Serial Connector** (**jSSC**) library is developed by Alexey Sokolov\
    \ and licensed under GNU Lesser GPL. Since the 1.5.6 beta version, the Arduino\
    \ IDE uses the new library for board communication, as it is faster than its predecessor.\n\
    \nAnother big advantage of this library is that it is distributed as a single\
    \ `jssc.jar` file, which includes all the native interfaces for all platforms\
    \ to reduce the pain of local installation for each platform and operating system.\
    \ It adds them to the `classpath` at runtime, as shown in the following screenshot:\n\
    \n![Reading data from serial ports](graphics/B03998_07_09.jpg)\n\njSSC 2.8.0 native\
    \ libraries\n\nYou can download the latest version from [https://github.com/scream3r/java-simple-serial-connector/releases](https://github.com/scream3r/java-simple-serial-connector/releases).\
    \ At the time of writing, the jSSC version is 2.8.0.\n\n### The JavaFX blood meter\
    \ monitoring application\n\nWe will design a JavaFX 8 application that takes the\
    \ readings from the temperature sensor and displays the values in a line chart.\
    \ We will also show what happens to the LEDs on the board with a set of a shapes\
    \ simulating board LEDs. For the sake of clarity, we'll use two classes one for\
    \ the serial readings and one for the JavaFX UI and main application `BloodMeterFX`\
    \ file, including chart APIs.\n\nWe'll bind these classes (Serial and BloodMeterFX)\
    \ using a StringProperty containing the last line read from the serial port. By\
    \ listening to changes in this property in the JavaFX thread, we'll know when\
    \ there's a new reading to add to the chart.\n\nThe full project code can be downloaded\
    \ from the *Packt Publishing* website."
  trans: "\n#### 草图\n\n在完成电路搭建和配置后，我们需要对微控制器进行编程。这正是草图（sketch）施展魔法的地方：\n\n```\n/*\n\
    \  第 7 章示例\n  项目 - 血液温度计\n\n  本草图是为《JavaFX 8 精髓》一书中的项目编写的\n\n  所需零件：\n  1 个 TMP36\
    \ 温度传感器\n  3 个 红色 LED\n  3 个 220 欧姆电阻\n\n  创建于 2015 年 4 月 5 日\n  作者：Mohamed Mahmoud\
    \ Taman\n  */\n\n// 传感器所连接引脚的命名常量\nconst int sensorPin = A0;\n// 室温（摄氏度）\nconst\
    \ float baselineTemp = 25.0;\n\nvoid setup() {\n  // 打开串行连接以显示数值\n  Serial.begin(9600);\n\
    \  // 将 LED 引脚设置为输出模式\n  // for() 循环节省了一些额外编码\n  for (int pinNumber = 2; pinNumber\
    \ < 5; pinNumber++) {\n    pinMode(pinNumber, OUTPUT);\n    digitalWrite(pinNumber,\
    \ LOW);\n  }\n}\n\nvoid loop() {\n  // 读取模拟输入引脚 0 的值\n  // 并将其存储在一个变量中\n  int\
    \ sensorVal = analogRead(sensorPin);\n\n  // 将 10 位传感器值发送到串行端口\n  Serial.print(\"\
    传感器值: \");\n  Serial.print(sensorVal);\n\n  // 将 ADC 读数转换为电压\n  float voltage\
    \ = (sensorVal / 1024.0) * 5.0;\n\n  // 将电压值发送到串行端口\n  Serial.print(\", 电压: \"\
    );\n  Serial.print(voltage);\n\n  // 将电压转换为摄氏度温度\n  // 传感器每度变化 10 mV\n  // 数据手册显示有\
    \ 500 mV 的偏移量\n  // ((电压 - 500mV) 乘以 100)\n  Serial.print(\", 摄氏度: \");\n  float\
    \ temperature = (voltage - .5) * 100;\n  Serial.println(temperature);\n\n  //\
    \ 如果当前温度低于基准温度\n  // 关闭所有 LED\n  if (temperature < baselineTemp) {\n    digitalWrite(2,\
    \ LOW);\n    digitalWrite(3, LOW);\n    digitalWrite(4, LOW);\n  } // 如果温度升高 2-4\
    \ 度，点亮一个 LED\n  else if (temperature >= baselineTemp + 2 && temperature < baselineTemp\
    \ + 4) {\n    digitalWrite(2, HIGH);\n    digitalWrite(3, LOW);\n    digitalWrite(4,\
    \ LOW);\n  } // 如果温度升高 4-6 度，点亮第二个 LED\n  else if (temperature >= baselineTemp\
    \ + 4 && temperature < baselineTemp + 6) {\n    digitalWrite(2, HIGH);\n    digitalWrite(3,\
    \ HIGH);\n    digitalWrite(4, LOW);\n  } // 如果温度升高超过 6 度，点亮所有 LED\n  else if (temperature\
    \ >= baselineTemp + 6) {\n    digitalWrite(2, HIGH);\n    digitalWrite(3, HIGH);\n\
    \    digitalWrite(4, HIGH);\n  }\n  delay(100);\n}\n```\n\n#### 工作原理\n\n如果你阅读了每一行的注释，就能理解这段代码。在不深入细节的情况下，以下是草图的主要要点。\n\
    \n每个 Arduino 草图都有两个主要方法：`setup()` 和 `loop()`。第一个方法用于初始化引脚（作为输入或输出）、打开串行端口、设置其速度等。第二个方法在微控制器内重复执行任务。\n\
    \n在开头，我们有一对有用的常量：一个引用模拟输入，另一个保存基准温度。每当温度比基准温度高出 *2 度*，就会有一个 LED 点亮。\n\n在 `setup()`\
    \ 方法内部，我们将串行端口初始化为所需的 9600 比特/秒的速度，并使用一个 `for` 循环将一些引脚设置为方向（输出引脚）并关闭它们。\n\n在 `loop()`\
    \ 方法内部，我们开始读取温度传感器，其电压值介于 0 到 1023 之间，然后使用 `Serial.print()` 将传感器值发送到串行端口，以便任何连接的设备（例如，我们的计算机）都能读取它们。这些模拟读数测量的是室温，或者如果你触摸传感器，则测量的是你的皮肤温度。\n\
    \n我们需要使用以下公式将模拟传感器读数转换为电压值：\n\n```\nvoltage = (sensorVal / 1024.0) * 5.0\n```\n\
    \n根据数据手册，我们使用传感器规格通过以下公式将电压转换为温度：\n\n```\ntemperature = (voltage - .5) * 100\n\
    ```\n\n有了实际温度，你可以设置一个 `if else` 语句来点亮 LED。以基准温度为起点，每当温度比基准温度升高 2 度，你就点亮一个 LED。\n\
    \n当你在温度范围内移动时，需要寻找一系列的值。\n\n**模数转换器**（**ADC**）读取速度非常快（微秒级），建议在 `loop()` 函数末尾添加\
    \ 1 毫秒的延迟。但由于数据要发送到串行端口，最终设置了 100 毫秒的延迟。\n\n#### 测试、验证并将草图上传到 Arduino\n\n将代码上传到\
    \ Arduino 后，点击串行监视器图标，如下图所示：\n\n![测试、验证并将草图上传到 Arduino](img/B03998_07_08.jpg)\n\
    \nArduino IDE 工具栏图标\n\n你应该会看到一串数值输出，格式如下：\n\n```\n传感器值: 158, 电压: 0.77, 摄氏度: 27.15\n\
    ```\n\n现在，当传感器插在面包板上时，尝试用手指触摸传感器周围，观察串行监视器中的数值变化。\n\n记下传感器暴露在空气中时的温度。关闭串行监视器，将\
    \ `baselineTemp` 常量修改为你刚才观察到的值。再次上传代码并尝试握住传感器；随着温度升高，你应该会看到 LED 一个接一个地亮起。\n\n\
    恭喜，你真是个高手！\n\n### 从串行端口读取数据\n\nJava 中没有读取串行端口的标准方法，因为这是一个特定于硬件的任务，打破了 Java 跨平台的概念。因此，我们需要一个第三方库来完成这项工作，并且它应该用\
    \ Java 编写，以便与我们的应用程序集成。\n\nArduino IDE 使用了第一个用于串行通信的库，称为 **RXTX**。该库最初由 Trent\
    \ Jarvi 开发，并在 LGPL v2.1+ 链接受控接口许可下分发，它随 Arduino IDE 一起分发，直到 1.5.5 beta 版本，用于与开发板通信。然而，它非常慢，现在已被弃用。\n\
    \n新的 **Java 简单串行连接器**（**jSSC**）库由 Alexey Sokolov 开发，并在 GNU Lesser GPL 许可下发布。从\
    \ 1.5.6 beta 版本开始，Arduino IDE 使用这个新库进行开发板通信，因为它比其前身更快。\n\n这个库的另一个巨大优势是它作为一个单独的\
    \ `jssc.jar` 文件分发，其中包含所有平台的原生接口，以减少在每个平台和操作系统上进行本地安装的麻烦。它在运行时将它们添加到 `classpath`\
    \ 中，如下图所示：\n\n![从串行端口读取数据](img/B03998_07_09.jpg)\n\njSSC 2.8.0 原生库\n\n你可以从 [`github.com/scream3r/java-simple-serial-connector/releases`](https://github.com/scream3r/java-simple-serial-connector/releases)\
    \ 下载最新版本。在撰写本文时，jSSC 的版本是 2.8.0。\n\n### JavaFX 血液温度计监控应用\n\n我们将设计一个 JavaFX 8 应用程序，它从温度传感器读取数据，并在折线图中显示这些值。我们还将使用一组模拟开发板\
    \ LED 的形状来显示开发板上 LED 的状态。为了清晰起见，我们将使用两个类：一个用于串行读取，另一个用于 JavaFX UI 和主应用程序 `BloodMeterFX`\
    \ 文件，其中包含图表 API。\n\n我们将使用一个包含从串行端口读取的最后一行内容的 `StringProperty` 来绑定这两个类（Serial 和\
    \ BloodMeterFX）。通过监听 JavaFX 线程中此属性的变化，我们就能知道何时有新读数可以添加到图表中。\n\n完整的项目代码可以从 *Packt\
    \ Publishing* 网站下载。\n"
- fmt: "#### Serial communication in Java\n\nLet's first begin by explaining the `Serial.java`\
    \ class. This class code is mostly taken from *JavaFX 8 Introduction By Example,\
    \ Apress*, with changes in the core reading function, as shown in the following\
    \ code snippets:\n\nYou should include the `jSSC.jar` file into your classpath,\
    \ either by adding it to `<JAVA_HOME>/jre/lib/ext` on Linux or Windows (or `/Library/Java/Extensions`\
    \ on the Mac), or preferably by adding it to your project libraries, as in the\
    \ previous screenshot, if you intended to distribute your application.\n\nIn order\
    \ to be able to read the serial port, we need the following imported jSSC classes:\n\
    \n```\nimport jssc.SerialPort;\nimport static jssc.SerialPort.*;\nimport jssc.SerialPortException;\n\
    import jssc.SerialPortList;\n```\n\nFor dynamically reading the port, if you don't\
    \ know the exact port name to set through the constructor of this class we have\
    \ a set of port names to help you select the proper port that the Arduino board\
    \ can be connected to.\n\n```\nprivate static final List<String> USUAL_PORTS =\
    \ Arrays.asList(\n  \"/dev/tty.usbmodem\", \"/dev/tty.usbserial\", //Mac OS X\n\
    \  \"/dev/usbdev\", \"/dev/ttyUSB\", \"/dev/ttyACM\", \"/dev/serial\", //Linux\n\
    \  \"COM3\", \"COM4\", \"COM5\", \"COM6\" //Windows\n);\n\nprivate final String\
    \ ardPort;\n\npublic Serial() {\n      ardPort = \"\";\n}\n\npublic Serial(String\
    \ port) {\n      ardPort = port;\n}\n```\n\nThe `connect()` method looks for a\
    \ valid serial port if it is not set with an Arduino board connected to it. If\
    \ it is found, it's opened and a listener is added. This listener is responsible\
    \ for getting the input readings from the serial port every time a line is returned\
    \ from the Arduino output. The `stringProperty` is set with that line. We used\
    \ a `StringBuilder` to store the chars and extract the line content whenever `'\\\
    r\\n'` is found. We have used bulk operations over collections provided by lambda\
    \ expressions here to make it simple to look up the port list and return the valid\
    \ port, depending on the operating system.\n\nEvery line found is set to the `line`\
    \ variable through the `set()` method in order to make the necessary changes to\
    \ the chart via a registered change listener event to `line` variable, which is\
    \ exposed through the `getLine()` method. The code is as follows:\n\n```\npublic\
    \ boolean connect() {\n  out.println(\"Serial port is openning now...\");\n  Arrays.asList(SerialPortList.getPortNames()).stream()\n\
    \  .filter(name -> ((!ardPort.isEmpty() && name.equals(ardPort))|| (ardPort.isEmpty()\
    \ && USUAL_PORTS.stream()\n  .anyMatch(p -> name.startsWith(p)))))\n  .findFirst()\n\
    \  .ifPresent(name -> {\n  try {\n    serPort = new SerialPort(name);\n      out.println(\"\
    Connecting to \" + serPort.getPortName());\n      if (serPort.openPort()) {\n\
    \        serPort.setParams(BAUDRATE_9600,\n        DATABITS_8,\n        STOPBITS_1,\n\
    \        PARITY_NONE);\n        serPort.setEventsMask(MASK_RXCHAR);\n        serPort.addEventListener(event\
    \ -> {\n         if (event.isRXCHAR()) {\n           try {\n             sb.append(serPort.readString(event.getEventValue()));\n\
    \             String ch = sb.toString();\n             if (ch.endsWith(\"\\r\\\
    n\")) {\n               line.set(ch.substring(0, ch.indexOf(\"\\r\\n\")));\n \
    \              sb = new StringBuilder();\n             }\n           } catch (SerialPortException\
    \ e) {\n             out.println(\"SerialEvent error:\" + e.toString());\n   \
    \        }\n         }\n       });\n     }\n  } catch (SerialPortException ex)\
    \ {\n    out.println(\"ERROR: Port '\" + name + \"': \" + ex.toString());\n  }});\n\
    \  return serPort != null;\n}\n```\n\nFinally, the `disconnect()` method is responsible\
    \ for removing a listener from the port and closing the port connection to free\
    \ up resources used by the application. The code is as follows:\n\n```\npublic\
    \ void disconnect() {\n  if (serPort != null) {\n    try {\n      serPort.removeEventListener();\n\
    \      if (serPort.isOpened()) {\n        serPort.closePort();\n      }\n    \
    \  } catch (SerialPortException ex) {\n      out.println(\"ERROR closing port\
    \ exception: \" + ex.toString());\n    }\n    out.println(\"Disconnecting: comm\
    \ port closed.\");\n  }\n}\n```"
