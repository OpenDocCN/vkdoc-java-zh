    *   The Java Web Start Developers Site ([http://www.oracle.com/technetwork/java/javase/javawebstart/index.html](http://www.oracle.com/technetwork/java/javase/javawebstart/index.html))\n\
    \n### Deploying the application for a web distribution\n\nTo deploy your JavaFX\
    \ applications on to the Web, there is a very simple way using NetBeans.\n\nNetBeans\
    \ already provides three deployment types for your JavaFX application – desktop,\
    \ Java Web Start, and Web-as seen in the following figure:\n\n![Deploying the\
    \ application for a web distribution](graphics/B03998_03_15.jpg)"
  trans: "\n### WebView 与引擎实战\n\n接下来，我们将通过一个简单示例，演示如何使用 `WebView` 加载包含谷歌地图的 HTML5\
    \ 网页文档，并将其作为 JavaFX 场景控件进行集成。随后，我们利用 `WebEngine` 从 JavaFX 的 `TextField` 控件中获取经纬度，执行一个\
    \ JavaScript 方法，将地图定位到新传入的位置并显示标记，如下图所示：\n\n![WebView 与引擎实战](img/B03998_03_13.jpg)\n\
    \nJavaFX 8 应用中的谷歌地图查看器\n\n为清晰起见，我将仅展示并解释代码中体现前述概念的关键部分。本章的完整代码请查看 `web` 包中的 `GoogleMapViewerFX.java`\
    \ 类和 `map.html` 文件。\n\n要在 JavaFX 应用中显示谷歌地图，首先需要创建一个 HTML 文件来加载并集成 Maps API，该文件定义在\
    \ `map.html` 中。如上图所示，地图中心定位在埃及开罗（我的城市），这是在创建地图时作为经纬度值传入的，如以下代码片段所示：\n\n```\nvar\
    \ latlng = new google.maps.LatLng(30.0594885, 31.2584644);\nvar Options = {\n\
    \    zoom: 13,\n    center: latlng,\n    mapTypeId: google.maps.MapTypeId.ROADMAP\n\
    };\nvar map = new google.maps.Map(document.getElementById(\"canvas\"), Options);\n\
    ```\n\n接下来，请注意 JavaScript 方法 `goToLocation(lng, lat)`；该方法将通过 `webEngine` 实例从 JavaFX\
    \ 应用中被调用，以便根据 JavaFX 控件传入的经纬度来定位地图。\n\n在 `GoogleMapViewerFX.java` 中，我们创建了四个控件来组成用户界面——两个用于输入经纬度的\
    \ `TextField` 类、一个更新按钮，以及一个用于显示 `map.html` 文档的 `WebView` 对象：\n\n```\nWebView webView\
    \ = new WebView();\nWebEngine webEngine = webView.getEngine();\nfinal TextField\
    \ latitude = new TextField(\"\" + 29.8770037);\nfinal TextField longitude = new\
    \ TextField(\"\" + 31.3154412);\nButton update = new Button(\"Update\");\n```\n\
    \n请注意，我创建的文本控件中初始经纬度与原始地图位置不同。这个位置是我的家庭住址，你可以将其改为你自己的位置，然后点击更新按钮查看新位置。\n\n要加载\
    \ `map.html` 文件，我们需要将其传递给从已创建的 `WebView` 类中实例化的 `WebEngine` 类，如上文代码片段所示。\n\n实现按钮的\
    \ `onAction()` 方法，通过 `webEngine` 的 `executeScript()` 方法实现 JavaFX 控件与 JavaScript\
    \ 之间的集成，代码如下：\n\n```\nupdate.setOnAction(evt -> {\n   double lat = Double.parseDouble(latitude.getText());\n\
    \   double lon = Double.parseDouble(longitude.getText());\n\n   webEngine.executeScript(\"\
    \" +\n             \"window.lat = \" + lat + \";\" +\n             \"window.lon\
    \ = \" + lon + \";\" +\n             \"document.goToLocation(window.lat, window.lon);\"\
    );\n});\n```\n\n运行应用，你应该会看到上图定位到开罗市！点击更新按钮，你应该会看到我的家，如下图所示。\n\n尝试获取你所在位置的经纬度，然后也定位到你的家吧！\n\
    \n很强大，不是吗？集成 HTML5 内容并与已有的 Web 应用交互，从而为现有的 JavaFX 应用添加更丰富的网络内容，这非常容易。\n\n![WebView\
    \ 与引擎实战](img/B03998_03_14.jpg)\n\n在 JavaFX 8 应用中更改谷歌地图位置\n\n## 作为 Web 应用的笔记功能\n\
    \n一旦你的应用经过测试（如前所述），你就可以将其分发到多个平台和环境。我们已经通过本章介绍的方法，使用项目 `dist` 文件夹下的 `.jar` 文件，为桌面平台生成了原生安装程序。\n\
    \n同样的 `.jar` 文件也可用于 Web 部署，并且可以通过多种方式将应用部署为 Web 应用，我们将在下文介绍。\n\n### 在 Web 上运行应用\n\
    \n在 Web 上运行 JavaFX 应用有三种方式：\n\n1.  使用 **Java Web Start** 一次性下载并启动应用；之后，你可以从本地机器离线使用它。\n\
    2.  将你的 JAR 文件嵌入 HTML 文件中，以便在企业环境中运行。\n3.  如前所述，从 `WebEngine` 类加载 HTML 内容，并通过\
    \ `WebView` 类进行显示。\n\n#### Java Web Start\n\nJava Web Start 软件提供了单击启动全功能应用的能力。用户可以下载并启动诸如完整电子表格程序或互联网聊天客户端等应用，而无需经历冗长的安装过程。\n\
    \n使用 Java Web Start，用户只需点击网页上的链接即可启动 Java 应用。该链接指向一个 **JNLP**（**Java 网络启动协议**）文件，该文件指示\
    \ Java Web Start 下载、缓存并运行该应用。\n\nJava Web Start 为 Java 开发者和用户提供了许多部署优势：\n\n* \
    \  使用 Java Web Start，你可以将单个 Java 应用放置在 Web 服务器上，以部署到包括 Windows、Linux 和 Solaris\
    \ 在内的多种平台。\n*   它支持 Java 平台的多个并发版本。应用可以请求特定版本的 Java 运行时环境（JRE）软件，而不会与其他应用的需求冲突。\n\
    *   用户可以在浏览器外创建桌面快捷方式，以启动 Java Web Start 应用。\n*   Java Web Start 利用了 Java 平台固有的安全性。默认情况下，应用对本地磁盘和网络资源的访问受到限制。\n\
    *   使用 Java Web Start 启动的应用会被缓存到本地，以提高性能。\n*   当 Java Web Start 应用在用户桌面上独立运行时，其更新会自动下载。\n\
    \nJava Web Start 作为 JRE 软件的一部分安装。用户无需单独安装 Java Web Start 或执行额外任务即可使用 Java Web\
    \ Start 应用。\n\n有关 **Java Web Start** 的更多信息，请参阅以下链接：\n\n*   Java Web Start 指南 ([`docs.oracle.com/javase/8/docs/technotes/guides/javaws/developersguide/contents.html`](http://docs.oracle.com/javase/8/docs/technotes/guides/javaws/developersguide/contents.html))\n\
    *   `javax.jnlp` API 文档 ([`docs.oracle.com/javase/8/docs/jre/api/javaws/jnlp/index.html`](http://docs.oracle.com/javase/8/docs/jre/api/javaws/jnlp/index.html))\n\
    *   Java Web Start 开发者网站 ([`www.oracle.com/technetwork/java/javase/javawebstart/index.html`](http://www.oracle.com/technetwork/java/javase/javawebstart/index.html))\n\
    \n### 为 Web 分发部署应用\n\n要将 JavaFX 应用部署到 Web 上，有一种使用 NetBeans 的非常简单的方法。\n\nNetBeans\
    \ 已经为你的 JavaFX 应用提供了三种部署类型——桌面、Java Web Start 和 Web——如下图所示：\n\n![为 Web 分发部署应用](img/B03998_03_15.jpg)\n"
- fmt: '# Summary


    So far, we have been learning how to develop JavaFX enterprise applications for
    both desktops and the Web.


    In this chapter, we gained the skills to develop any application, starting with
    sketching a layout on a piece of paper; next, we translated it into an actual
    interactive, colorful UI prototype. We saw how to nest our containers and controls
    to achieve the desired layout. Once we got the approvals for final development,
    we brought the application to life by making it respond to customer actions and
    by delivering the functional requirements.


    We made our code more powerful, clean, and concise with the power of Java SE 8
    features and JavaFX bindings. Finally, we learned how to deploy our application
    either to the target desktop customers or Web users for different platforms and
    environments.


    In the next chapter, we are going to learn how to develop a JavaFX application
    for Android-based smart phones. Additionally, we will learn the required skills
    to download and install Android SDK tools and interact with loggers, emulators,
    and other tools that will help you in any future mobile development you need to
    do that isn''t related to JavaFX.


    # Chapter 4. Developing a JavaFX Application for Android


    There is no doubt that we are seeing a rise in non-PC clients every day. Almost
    everyone has at least one mobile phone or tablet, maybe from different vendors,
    but certainly with Android or iOS, given that they represent 96 percent of smart
    phone OSs sold in 2014.


    Smart phones and tablets are extremely popular nowadays and these figures are
    increasing every year. And that is why developers should consider gaining the
    skills required to develop applications for such a great market.


    JavaFX 8 already delivers rich client applications for Web and desktop, as we
    have seen in [Chapter 3](#ch03.html "Chapter 3. Developing a JavaFX Desktop and
    Web Application"), *Developing a JavaFX Desktop and Web Application*. But, like
    me, if you have written a JavaFX application, you definitely want it to run on
    as many devices as possible to follow the true spirit of *Write Once, Run Anywhere*.
    I would like to take this opportunity to inform you that, yes, we can run JavaFX
    on mobile devices.


    Based on the official support from Oracle Corporation for JavaFX, a number of
    people inside the JavaFX community are working to port JavaFX to make it run on
    as many devices and platforms as possible (desktop, mobile, and embedded) and
    different operating systems, with the same codebase.


    They have successfully created SDKs that allow us to develop JavaFX applications
    as native applications to run on Android or iOS-based devices in one bundle (*JVM
    plus application*) without any extra software needed to run them as in desktop
    or Web.


    This chapter will give you the essential hands-on knowledge about SDKs that will
    allow you to create, package, and deploy native applications for Android.


    Here are some skills that will be gained during this chapter:


    - Installing and configuring Android environment tools and software

    - Preparing and creating the JavaFX 8 mobile project structure

    - Creating an Android JavaFX 8 application

    - Interoperability between JavaFX 8 and Android low-level APIs

    - Packaging and deploying applications on mobile devices

    - Signing the application for final Google Play Store submission


    # Why port JavaFX into the mobile environment?


    Why port JavaFX into the mobile environment? Isn''t it **Write Once Run Anywhere**
    (**WORA**)? This is a very good question to ask. Any Java application follows
    the WORA paradigm, but with a very critical abstract piece of software that it
    relies on to run and is called **Java Virtual Machine** (**JVM**).


    JVM is the software responsible for translating the compiled byte code (`*.class
    file*`) for a specific machine and providing platform instructions that it can
    understand and run, so you can run your application. Therefore, you will find
    different versions of JRE or **JDK** for each hardware (Intel, AMD, SPARC, or
    ARM) and platform (Windows, Mac, Linux, or Solaris).


    On Desktop, Web, or embedded devices, you have to first install the **Java Runtime
    Environment** (**JRE**) to be able to run your Java application. But, for mobile
    devices, you will notice that you just download your application from the Store,
    install it, and finally run it without any extra software. Also, some closed platforms
    don''t allow the JVM to be installed.


    For a better end user experience, there should be no difference between running
    JavaFX applications and running other applications targeting Android or iOS.


    Therefore, we should have a self-contained (the application plus JVM) JavaFX application
    that can run on mobile devices. In addition to the ability to interact with Android
    low-level APIs to control device features, it will be treated similarly to other
    applications in the Google Play Store.


    We should thank the community for bringing up such porting SDKs and filling this
    gap to allow us to create and run our JavaFX applications on iOS using the port
    from RoboVM ([http://www.robovm.org/](http://www.robovm.org/)) and on Android
    using the port from JavaFXPorts ([http://javafxports.org/](http://javafxports.org/)).


    Since February 2015, an agreement between the companies behind those projects
    has been in force, and now a single plugin called `jfxmobile-plugin` allows us
    to build applications for three platforms desktop, Android, and iOS from the same
    codebase.


    Also, a new company called **Gluon** offers a free plugin ([http://gluonhq.com/products/tools/ide-plugins/](http://gluonhq.com/products/tools/ide-plugins/))
    for **NetBeans** that creates a project with everything required to build applications
    based on `jfxmobile-plugin`.


    ### Note


    But bear in mind that all of this is constantly evolving and things may change
    from what is stated here.


    ## How it works


    Both RoboVM for iOS porting and JavaFXPorts for Android porting contain all the
    required libraries to make it easy to package your JavaFX 8 application with the
    required runtime environment.


    When using RoboVM for iOS to package your JavaFX application (to an `.ipa` package
    file), all your JavaFX applications are transformed into **Objective-C** (currently
    **Swift**) applications.


    When packaging your JavaFX application using JavaFXPorts for Android (to the `.apk`
    package file), the applications are transformed into Android packages running
    on top of the **Dalvik** VM.


    These SDKs contain a lot of native code that will be ported to iOS and Android
    after injecting them inside your JavaFX application in order to increase application
    performance.


    Using these SDK''s, we can package our applications into formats (`.ipa` for iOS
    and `.apk` for Android) that are suitable for submission to Stores.


    ## Who is maintaining it?


    Don''t worry—there is free support on a large scale for porting JavaFX to both
    Android and iOS, as well as commercial support.


    ### Note


    For free and commercial support, both the RoboVM and JavaFXPorts communities use
    this Google group:


    [https://groups.google.com/forum/#!forum/javafxports](https://groups.google.com/forum/#!forum/javafxports)


    Free and commercial support is mainly available from people in the community and
    those who are actively involved in both projects. And they encourage more third
    parties to be involved as well.


    For iOS, RoboVM has different plans for developers; you can check them at [http://robovm.com/pricing/](http://robovm.com/pricing/).


    While for Android, the company **LodgON** offers support for JavaFX-Android integration
    as part of their support for JavaFX porting ([http://www.lodgon.com/dali/page/JavaFX_Consulting](http://www.lodgon.com/dali/page/JavaFX_Consulting)).'
