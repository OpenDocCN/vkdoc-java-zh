  trans: "\n### 部署应用程序\n\n在开发过程中，我们需要在 iOS 模拟器上检查应用程序的图形界面和最终原型，并在不同设备上衡量应用的性能和功能。这些步骤非常有用，尤其对于测试人员而言。\n\
    \n接下来，我们将看到在模拟器或真实设备上运行应用程序是多么简单的事情。\n\n#### 部署到模拟器\n\n在模拟器上，你可以直接运行以下命令来检查应用程序是否正常运行：\n\
    \n```\n$ gradle launchIPhoneSimulator \n```\n\n该命令将打包并在 *iPhone 模拟器* 中启动应用程序，如下图所示：\n\
    \n![部署到模拟器](img/B03998_05_03.jpg)\n\n在 iOS 8.3/iPhone 4s 模拟器上运行的 DialPad2 JavaFX\
    \ 8 应用程序\n\n以下命令将在 iPad 模拟器中启动应用程序：\n\n```\n$ gradle launchIPadSimulator \n```\n\
    \n#### 部署到 Apple 设备\n\n为了打包 JavaFX 8 应用程序并将其部署到 Apple 设备，只需运行以下命令：\n\n```\n$ gradle\
    \ launchIOSDevice \n```\n\n该命令将在连接到你的台式机/笔记本电脑的设备上启动 JavaFX 8 应用程序。\n\n然后，一旦应用程序在你的设备上启动，输入任意号码并点击“呼叫”。\n\
    \niPhone 会请求使用默认拨号器拨号的权限；点击**确定**。默认拨号器将启动并显示该号码，如下图所示：\n\n![部署到 Apple 设备](img/B03998_05_04.jpg)\n\
    \n默认拨号器\n\n### 注意\n\n要在你的设备上测试和部署应用，你需要拥有 Apple 开发者计划的活跃订阅。请访问 Apple 开发者门户 [`developer.apple.com/register/index.action`](https://developer.apple.com/register/index.action)\
    \ 进行注册。你还需要为开发配置你的设备。你可以在 Apple 开发者门户中找到关于设备配置的信息，或参考本指南：[`www.bignerdranch.com/we-teach/how-to-prepare/ios-device-provisioning/`](http://www.bignerdranch.com/we-teach/how-to-prepare/ios-device-provisioning/)。\n\
    \n# 总结\n\n本章让我们很好地理解了如何利用 RoboVM 为 **iOS** 开发和定制基于 JavaFX 的应用程序，从而使其能够在 Apple\
    \ 平台上运行。\n\n你了解了 RoboVM 的功能和局限性，以及它的工作原理；同时，你也掌握了可用于开发的技能。\n\n接着，你学习了如何安装 iOS\
    \ 开发所需的软件和工具，以及如何启用 Xcode 并结合 *RoboVM* 编译器，在操作系统模拟器上打包和安装基于 Phone Dial JavaFX\
    \ 8 的应用程序。\n\n我们看到了如何重用已在第 4 章《为 Android 开发 JavaFX 应用程序》中开发的同一应用程序，这证明了 Java 的“一次编写，到处运行”范式是可行的。\n\
    \n最后，我们提供了关于如何在真实设备上运行和部署应用程序的提示。\n\n下一章将打开物联网开发世界的一扇窗；我们将了解如何购买 Raspberry Pi\
    \ 2 型号，安装并配置 *raspbian-wheezy* 操作系统用于开发，以及如何为嵌入式设备安装 Java SE。然后，我们将开发一个 JavaFX\
    \ 8 应用程序，运行在这张信用卡大小的微型计算机上。\n\n# 第 6 章. 在 Raspberry Pi 上运行 JavaFX 应用程序\n\n欢迎来到\
    \ **IoT**（**物联网**）世界。毫无疑问，你经常听到这个术语。物联网近来已成为热门话题，而且理由充分。一些估计显示，目前连接的小型设备数量约为 90\
    \ 亿；预计到 2020 年将跃升至 240 亿。虽然预测数字各不相同，但评估结果是一致的：从绝对数量来看，物联网将使以往任何计算模型都相形见绌。\n\n\
    与物联网世界紧密相关的是 Raspberry Pi——一款由 Raspberry Pi 基金会设计的信用卡大小的微型计算机，用于实验和教育。\n\n关于 Raspberry\
    \ Pi，你需要知道的是，它不过是一台小型计算机。功耗小、体积小、内存小，最重要的是成本低。它的一切都很小，但它仍然是一台计算机，并且使用 Linux。\n\
    \nJava 从发明之初就是为物联网而生的。Java 的创建有着清晰的愿景：控制小型设备，如电视机顶盒。随着物联网的爆发，Java 回归了它的本源。\n\n\
    你可能会认为，作为富客户端开发平台的 JavaFX 会错过物联网的盛宴——但事实并非如此！根据 Oracle 技术网络上的 *JavaFX 概述* 页面：\n\
    \n> *“它旨在提供一个轻量级、硬件加速的 Java UI 平台”*\n\n这句话揭示了图形丰富且强大的 JavaFX 的关键：硬件加速；幸运的是，Raspberry\
    \ Pi 配备了强大的 GPU。\n\n在本章中，我们将学习：\n\n*   购买、准备和配置 Raspberry Pi\n*   为 JavaFX 8 准备\
    \ Raspberry Pi\n*   远程连接到 Raspberry Pi\n*   在 Raspberry Pi 上安装和配置 Java SE 8\n\
    *   在 Raspberry Pi 上开发和运行 JavaFX 8 应用程序\n*   将 NetBeans 与 Raspberry Pi 结合使用\n\n\
    兴奋吗？需要找点乐子！没错，让我们直接深入，与我们的 Raspberry Pi 一起玩耍吧。\n\n### 注意\n\n自 2015 年 1 月发布 JDK\
    \ 8u33 ARM 版本以来，Oracle 已从 ARM 发行版中移除了 JavaFX Embedded。请参见 [`www.oracle.com/technetwork/java/javase/jdk-8u33-arm-relnotes-2406696.html#CACHGFJC`](http://www.oracle.com/technetwork/java/javase/jdk-8u33-arm-relnotes-2406696.html#CACHGFJC)\
    \ 和 [`jaxenter.com/jdk-arm-without-javafx-end-javafx-embedded-114212.html`](http://jaxenter.com/jdk-arm-without-javafx-end-javafx-embedded-114212.html)。\n\
    \nJavaFX Embedded 的代码已交给开源项目 OpenJFX ([`wiki.openjdk.java.net/display/OpenJFX/Main`](https://wiki.openjdk.java.net/display/OpenJFX/Main))。建议正在寻找\
    \ JavaFX Embedded 替代方案的开发者积极参与该项目。\n\n在本章中，我们将学习几种克服此问题的方法。\n\n# 什么是 Raspberry\
    \ Pi？\n\n正如我们之前提到的，Raspberry Pi 是一台计算机——一台非常小巧且低成本的计算机。事实上，它大约只有信用卡大小。不要被它的尺寸所迷惑；正如我们所知，好东西往往是小包装。然而，Raspberry\
    \ Pi 根本没有包装。\n\n它没有外壳，其电路板和芯片完全可见，如下图所示。你可以将 Raspberry Pi 插入数字电视或显示器，并使用 USB 键盘和鼠标进行操作，使用起来非常方便。由于其体积小巧，你可以轻松地将其携带到任何地方。\n\
    \nRaspberry Pi 是一款功能强大的设备，允许所有年龄段的人探索计算，并学习如何使用 Java、JavaFX、Python 和 Scratch 等语言进行编程。此外，它能完成台式计算机能做的所有事情——从浏览互联网、播放高清视频或游戏，到处理电子表格或文字处理软件。\n\
    \n![什么是 Raspberry Pi？](img/B03998_06_01.jpg)\n\n新款 Raspberry Pi 2 型号 B\n\n## 你能用它做什么？\n\
    \nRaspberry Pi 让你有机会构建并控制一个能按你意愿工作的设备。例如，你可以部署一个由你编写的程序控制的机械臂。你可以设计并创建自己的角色扮演游戏，或者通过代码创作出精美的计算机艺术或音乐。\n\
    \n此外，Raspberry Pi 基金会的主要目标是让全世界的孩子们在学习编程和理解计算机工作原理的过程中感到乐趣。\n"
- fmt: '# Why is the Raspberry Pi a perfect fit for JavaFX?


    So what makes the Raspberry Pi such a perfect fit for Java and JavaFX? The answer
    can be found in the following points:


    - It is faster than the specifications seem to indicate. As noted, the default
    clock speed for the Pi is 900 MHz. But with its 900 MHz clock speed that can be
    safely overclocked to 1 GHz and its 1 GB RAM, this small computer can run really
    bigger and powerful applications.

    - Very wisely, the Foundation chose a CPU with floating-point support, often referred
    to as hard float, which offers greater performance than so-called soft float-only
    chips. Operating systems available for the Pi take advantage of that extra power
    and speed.

    - Finally, the Pi has a fairly beefy Graphics Processing Unit (GPU) with a fast
    3D core that is capable of BluRay quality playback, using H.264 at 40MBits/s ([https://www.raspberrypi.org/help/faqs/#generalSoCUsed](https://www.raspberrypi.org/help/faqs/#generalSoCUsed)).


    # Which module should you buy?


    At the time of writing, there are five models of the Raspberry Pi: A, A+, B, B+,
    and since February 2015 the new model Pi 2 model B. Here is a comparison between
    the versions A+ and 2 B.


    | Model A+ | Model 2 B |

    | --- | --- |

    | Costs ~$25 | Costs ~$35 |

    | One USB port | Four USB ports |

    | No Ethernet | Standard Ethernet connection |

    | 256 MB RAM | 1 GB RAM |


    The model A+ is cheaper, but only has one USB port and no Ethernet connection.
    This may not be a problem. If you connect a powered USB hub to the Model A+ and
    then employ a USB-to-WiFi adapter, you have all the networking capabilities of
    Model B+. One main difference between the two models is the amount of RAM. Model
    A+ has 256 MB of RAM. The model B+ has a 512 MB RAM and 2 B has a 1 GB RAM. This
    is not upgradable on either model.


    All Raspberry Pi microcomputers come with a slot for an SD memory card, audio
    out-jack, video ports for RCA and HDMI, and a row of pins for general purpose
    input and output. There are two additional connectors for display and a camera,
    but both require highly specialized hardware. Given a small price difference,
    typically $10 to $25, I recommend getting the model 2 B to start with. If you
    are purchasing more than one for, say, a classroom, the model A+ may be sufficient.


    You can buy a kit with all you need to start from any online store for no more
    than $100, and it would include:


    - The new Raspberry Pi 2 (RPi2) quad-core 900 MHz 1GB RAM and CanaKit WiFi adapter

    - Premium-quality 6-foot HDMI cable, GPIO to breadboard interface board, ribbon
    cable, breadboard, jumper wires, GPIO Quick Reference Card, and Resistor Colors
    Quick Reference Card

    - 8 GB Samsung MicroSD card (a Raspberry Pi Foundation-recommended MicroSD card
    preloaded with NOOBS), a high-quality Raspberry Pi 2 case, and heat sink

    - RGB LED, 8 LEDs (blue/red/yellow/green), 15 resistors, 2 push button switches,
    and General Guide for Beginners to Electronic Components

    - 2.5A USB power supply with 5-foot micro USB cable specially designed for the
    Raspberry Pi 2 (UL listed)


    ![Which module should you buy?](graphics/B03998_06_02.jpg)


    Typical kit components for a Raspberry Pi B Model 2


    ## Buying the Raspberry Pi


    The Raspberry Pi Foundation in the United Kingdom makes the Raspberry Pi. Unfortunately,
    it has a history of being back-ordered. Fortunately, you can buy from several
    vendors and a few of them are listed on the main page of [https://www.raspberrypi.org/](https://www.raspberrypi.org/).
    You can also buy it from [http://www.amazon.com](http://www.amazon.com), although
    you will have to pay a bit more. Prices vary from what you will see here.


    Finally, check out [http://www.adafruit.com](http://www.adafruit.com). They are
    reasonably priced and also carry some useful accessories that you will need in
    your future projects. In these stores you can also find starter kits including
    the Raspberry Pi and the necessary components to start.


    ## Related websites and documentation


    The Internet contains a wealth of information about the Raspberry Pi. As you work
    on more advanced topics, you will find it helpful to know where to find answers.


    The official website for the Raspberry Pi Foundation is [http://www.rasberrypi.org](http://www.rasberrypi.org).
    It lists sources from which to purchase the Raspberry Pi microcomputer. It has
    a variety of tutorials and helpful forums.


    For more information about the version of Linux running on the Raspberry Pi, visit
    [http://elinux.org/index.php?title=RPi_Hub&redirect=no](http://elinux.org/index.php?title=RPi_Hub&redirect=no).
    There is information about the general-purpose and input/output pins; Raspbian
    Wheezy, the version of Linux designed for the Raspberry Pi; and sample projects.
    You will also find information about other embedded systems, such as the **Minnow
    board** and **BeagleBoard**.


    Neil Black has created a stellar beginner''s guide to the Raspberry Pi and deserves
    a round of applause. Please visit [http://neil-black.co.uk/the-updated-raspberry-pi-beginners-guide](http://neil-black.co.uk/the-updated-raspberry-pi-beginners-guide)
    if you ever find yourself confused during the setup process.


    Finally, visit [http://www.adafruit.com](http://www.adafruit.com) to buy the Raspberry
    Pi as well as power supplies, motor control boards, and experimentation kits.
    If you cannot buy parts locally, this group is an excellent place to purchase
    accessories and other components.


    # Preparing the Raspberry Pi for JavaFX 8


    Your Raspberry Pi will do nothing without an operating system, which is loaded
    from the SD Card. We need a way to interact with it by first installing the supported
    operating system, which in our case is Raspbian Wheezy; all official supported
    operating systems for the Pi are listed and can be downloaded from the link [http://www.raspberrypi.org/downloads/](http://www.raspberrypi.org/downloads/).


    Then, we will configure the network settings for our Pi to connect it remotely.
    Finally, we will check the Java SE 8 version installed by default and proceed
    to check for updates, if not prepackaged with OS already.


    As mentioned before, the last update doesn''t include JavaFX so we will find a
    way to add it. Let''s start preparing our SD card to install the Raspbian Wheezy
    operating system and have the Raspberry Pi up and running.


    ## Creating a bootable SD card


    Now, we are going to prepare our SD card with the Raspbian Wheezy OS, which will
    allow us to interact with our Raspberry Pi. This is a very important step. There
    are two ways to do this:'
