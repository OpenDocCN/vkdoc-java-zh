  trans: "\n## JavaFX 示例\n\n学习 JavaFX 8 的最佳资源之一是 Java 开发工具包 8 的示例和演示，其中包含一个 JavaFX\
    \ 演示文件夹，里面有许多精彩且高级的应用程序，涵盖了所有 JavaFX 主题，并附带了可供您自行实验的源代码。\n\n您只需访问以下链接即可下载示例：[`www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html`](http://www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html)，然后转到\
    \ **Java SE Development Kit 8u45 Demos and Samples Downloads** 表格，选中 **Accept\
    \ License Agreement** 单选按钮，并点击与您操作系统相关的 zip 文件链接，如下图所示：\n\n![JavaFX 示例](img/B03998_09_1.jpg)\n\
    \n下载 JDK 和 JavaFX 8 演示及示例\n\n`samples` zip 文件包含可运行的预构建示例，以及每个示例的 NetBeans 项目文件。\n\
    \n解压 zip 文件后，会生成以下目录结构：\n\n```\n--src  (包含每个示例的 NetBeans 项目)\n --<Sample1>\n \
    \ --nbproject\n  --src\n  --build.xml\n  --manifest.mf\n  --<Sample2>\n  <sample1>.jar(作为独立应用程序运行示例)\n\
    <sample2>.jar\n```\n\n![JavaFX 示例](img/B03998_09_2.jpg)\n\nJavaFX 示例文件夹内容\n\n\
    任何 `sample.jar` 都可以作为独立应用程序运行；双击 JAR 文件，我们将看到四个应用程序：\n\n1.  `Ensemble8.jar`：一个示例应用程序库，展示了大量\
    \ JavaFX 功能，包括动画、图表和控件。对于每个示例，您可以在所有平台上执行以下操作：\n\n*   查看正在运行的示例并与之交互\n    *  \
    \ 阅读其描述。\n\n您只能在桌面平台上对每个示例执行以下操作：\n\n*   复制其源代码\n    *   对于某些示例，您可以调整示例组件的属性\n\
    \    *   如果您已连接到互联网，还可以点击链接访问相关的 API 文档 *Ensemble8 也可以在 JavaFX for ARM（意味着在树莓派上运行）上运行*。![JavaFX\
    \ 示例](img/B03998_09_3.jpg)\n\n正在运行的 Ensemble8 应用程序\n\n2.  `MandelbrotSet.jar`：一个示例应用程序，演示了使用\
    \ Java 并行 API 进行并行执行的优势。\n\n该应用程序使用曼德勃罗集算法渲染图像，并提供了在输入参数范围内的直观导航。\n\n更多信息请参见 `MandelbrotSet`\
    \ 文件夹内的 `index.html` 文件。\n\n![JavaFX 示例](img/B03998_09_4.jpg)\n\n正在运行的 MandelbrotSet\
    \ 应用程序\n\n3.  `Modena.jar`：一个示例应用程序，演示了使用 `Modena` 主题的 UI 组件外观。它让您可以选择对比 `Modena`\
    \ 和 `Caspian` 主题，并探索这些主题的各个方面。 ![JavaFX 示例](img/B03998_09_5.jpg)\n\n正在运行的 Modena\
    \ 应用程序\n\n4.  `3DViewer.jar`：3DViewer 是一个示例应用程序，允许用户使用鼠标或触控板导航和检查 3D 场景。3DViewer\
    \ 支持导入 **OBJ** 和 Maya 文件的部分功能。\n\n对于 Maya 文件，还提供了导入动画的功能。（请注意，对于 Maya 文件，在保存为\
    \ Maya 文件时，应删除所有对象的构建历史。）3DViewer 还具有将场景内容导出为 Java 或 `FXML` 文件的功能。\n\n![JavaFX\
    \ 示例](img/B03998_09_6.jpg)\n\n正在运行的 3DViewer 应用程序\n\n为了亲自尝试代码并实验您可能做出的任何更改，恭喜您，您有机会通过从\
    \ **NetBeans** 运行上述所有应用程序来实现，具体步骤如下：\n\n5.  在 NetBeans IDE 中，点击工具栏上的 **Open Project**，或点击\
    \ **File** 菜单并选择 **Open Project**。\n6.  导航到您解压示例的位置，在 `src` 目录中，选择一个项目，然后点击 **Open**。\n\
    7.  要在 NetBeans IDE 中运行应用程序，请在 **Project** 窗格中，右键点击该项目并选择 **Run**。\n\n## Java\
    \ SE 8\n\n提醒一下，JavaFX 8 已内置于 Java 8 SDK 中。这意味着您只需下载 Java 8 SDK。Java 8 软件开发工具包及相关信息可从以下位置下载：\n\
    \n*   Oracle 技术网络上的 Java 8：\n\n    [`oracle.com/java8`](http://oracle.com/java8)\n\
    \n*   Java 开发工具包：\n\n    [`www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\n\
    \n*   Java 8 有哪些新特性？让我们查看 Java 8 的新功能：\n\n    [`www.oracle.com/technetwork/java/javase/8-whats-new-2157071.html`](http://www.oracle.com/technetwork/java/javase/8-whats-new-2157071.html)\n\
    \n*   Java SE 8 新特性之旅：\n\n    [`tamanmohamed.blogspot.com/2014/06/java-se-8-new-features-tour-big-change.html`](http://tamanmohamed.blogspot.com/2014/06/java-se-8-new-features-tour-big-change.html)\n\
    \n### Java SE 8 API 文档和教程\n\nJava 8 文档和指南位于以下链接：\n\n*   Java SE 8 Javadoc API\
    \ 文档：\n\n    [`docs.oracle.com/javase/8`](http://docs.oracle.com/javase/8)\n\n\
    *   JavaFX 8 Javadoc API 文档：\n\n    [`docs.oracle.com/javase/8/javafx/api`](http://docs.oracle.com/javase/8/javafx/api)\n\
    \n*   Java SE 8 概述文档：\n\n    [`docs.oracle.com/javase/8/docs/index.html`](http://docs.oracle.com/javase/8/docs/index.html)\n\
    \n*   Java SE 8 教程：\n\n    [`docs.oracle.com/javase/tutorial/tutorialLearningPaths.html`](http://docs.oracle.com/javase/tutorial/tutorialLearningPaths.html)\n\
    \n### Lambda 项目\n\nJava SE 8 核心新增的语言特性是 lambda 表达式和流 API。以下参考资料是关于 Lambda 项目的路线图、博客和视频：\n\
    \n*   Lambda 现状，Brian Goetz (Oracle)：\n\n    [`cr.openjdk.java.net/~briangoetz/lambda/lambda-state-final.html`](http://cr.openjdk.java.net/~briangoetz/lambda/lambda-state-final.html)\n\
    \n*   Java 8 揭秘：Lambda、默认方法和批量数据操作，Anton Arhipov：\n\n    [`zeroturnaround.com/rebellabs/java-8-revealed-lambdas-defaultmethods-and-bulk-data-operations`](http://zeroturnaround.com/rebellabs/java-8-revealed-lambdas-defaultmethods-and-bulk-data-operations)\n\
    \n*   Java 8 中 Lambda 表达式和流的 10 个示例，Javin Paul：\n\n    [`javarevisited.blogspot.com/2014/02/10-example-of-lambdaexpressions-in-java8.html`](http://javarevisited.blogspot.com/2014/02/10-example-of-lambdaexpressions-in-java8.html)\n\
    \n*   Java SE 8：Lambda 快速入门，Oracle：\n\n    [`www.oracle.com/webfolder/technetwork/tutorials/obe/java/Lambda-QuickStart/index.html`](http://www.oracle.com/webfolder/technetwork/tutorials/obe/java/Lambda-QuickStart/index.html)\n\
    \n*   Java 8：闭包、Lambda 表达式解析，Frank Hinkel：\n\n    [`frankhinkel.blogspot.com/2012/11/java-8-closures-lambdaexpressions.html`](http://frankhinkel.blogspot.com/2012/11/java-8-closures-lambdaexpressions.html)\n\
    \n### Nashorn\n\nJava SE 8 包含一个名为 **Nashorn** 的新脚本引擎，这是一个用于 Java 运行时的全新改进版 JavaScript\
    \ 引擎。该引擎使开发人员能够使用 JavaScript 语言编写应用程序。\n\n以下链接和参考资料是描述 Nashorn 的文章和博客：\n\n*  \
    \ Oracle 的 Nashorn：JVM 的下一代 JavaScript 引擎，Julien Ponge：\n\n    [`www.oraclejavamagazine-digital.com/javamagazine_twitter/20140102/?pg=60#pg60`](http://www.oraclejavamagazine-digital.com/javamagazine_twitter/20140102/?pg=60#pg60)\n\
    \n*   Open JDK 的 Nashorn 站点：\n\n    [`wiki.openjdk.java.net/display/Nashorn/Main`](https://wiki.openjdk.java.net/display/Nashorn/Main)\n\
    \n*   Nashorn 博客：\n\n    [`blogs.oracle.com/Nashorn`](https://blogs.oracle.com/Nashorn)\n"
- fmt: "# JavaFX properties and bindings\n\nProperties and bindings are essential\
    \ to JavaFX when synchronizing values between JavaFX nodes.\n\nThe following are\
    \ great resources about read-only properties, listeners, and the role of JavaFX\
    \ Beans:\n\n- Creating Read-Only Properties in JavaFX, Michael Heinrichs: [http://blog.netopyr.com/2012/02/02/creating-read-only-properties-injavafx](http://blog.netopyr.com/2012/02/02/creating-read-only-properties-injavafx)\n\
    - The Unknown JavaBean, Richard Bair: [https://weblogs.java.net/blog/rbair/archive/2006/05/the_unknown_jav.html](https://weblogs.java.net/blog/rbair/archive/2006/05/the_unknown_jav.html)\n\
    - Using JavaFX Properties and Binding, Scott Hommel: [http://docs.oracle.com/javafx/2/binding/jfxpub-binding.htm](http://docs.oracle.com/javafx/2/binding/jfxpub-binding.htm)\n\
    - Pro JavaFX 8, ([Chapter 4](#ch04.html \"Chapter 4. Developing a JavaFX Application\
    \ for Android\"), *Properties and Bindings*), Johan Vos, James Weaver, Weiqi Gao,\
    \ Stephen Chin, and Dean Iverson, (Apress, 2014): [http://www.apress.com/9781430265740](http://www.apress.com/9781430265740)\n\
    - Open Dolphin: A JavaFX MVC framework (founded by Dierk Koenig of Canoo Engineering):\
    \ [http://open-dolphin.org/dolphin_website/Home.html](http://open-dolphin.org/dolphin_website/Home.html)\n\
    - JavaFX MVP framework based on Convention over Configuration and Dependency Injection\
    \ (founded by Adam Bien): [http://afterburner.adam-bien.com](http://afterburner.adam-bien.com)\n\
    \n## JavaFX communities\n\nSo you want to get involved with the JavaFX community?\
    \ Please check out the following links:\n\n- The Java.net JavaFX community site:\
    \ [https://www.java.net/community/javafx](https://www.java.net/community/javafx)\n\
