- fmt: "# Installing Java SE 8 JDK\n\nThe steps outlined in this section will guide\
    \ you to successfully download and install Java SE 8. Download the Java SE 8 JDK\
    \ from the following location:\n\n[http://www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html](http://www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html)\n\
    \nIn the following steps, the Java SE 8u45 JDK 64-bit version (at the time of\
    \ writing) on the Mac OS X Yosemite (10.10.3) operating system will be used as\
    \ an example.\n\nThe steps are similar on other operating systems and JDK versions.\
    \ However, if your environment is different, refer to the following link for additional\
    \ details:\n\n[http://docs.oracle.com/javase/8/docs/technotes/guides/install/toc.html](http://docs.oracle.com/javase/8/docs/technotes/guides/install/toc.html)\n\
    \nThe following are steps to install the Java SE 8 JDK:\n\n1. Install the Java\
    \ 8 JDK by launching the image file `jdk-8u45-macosx-x64.dmg`. A screen will appear\
    \ that looks like the following screenshot once you've launched the JDK 8 setup\
    \ image file. That's the package setup file. Double-click on it and the installer\
    \ will launch: ![Installing Java SE 8 JDK](graphics/B03998_01_04.jpg)\n\n   JDK\
    \ 8 setup image file\n\n   ### Tip\n\n   Typically, you will need administrator\
    \ rights on the machine to install the software.\n\n2. Begin the setup of the\
    \ Java 8 JDK. The screen in the following screenshot will appear at the beginning\
    \ of the installation process. Click on the **Continue** button, next on the **Installation**\
    \ type screen wizard, click on **Install** to begin the installation. ![Installing\
    \ Java SE 8 JDK](graphics/B03998_01_05.jpg)\n\n   Java SE Development Kit 8 setup\n\
    \n3. Once you hit **Install**, you may be asked to supply your password. Supply\
    \ it, click on **Ok** and the installation will proceed with a progress bar, as\
    \ shown in following figure: ![Installing Java SE 8 JDK](graphics/B03998_01_06.jpg)\n\
    \n   Java SE Development Kit 8 installation in progress\n\n4. The setup will complete\
    \ the installation of the Java 8 SE Development Kit. Click on the **Close** button\
    \ to exit.\n\n## Setting environment variables\n\nNow you need to set a couple\
    \ of key environment variables. How you set them and the values they should be\
    \ set to vary depending on your operating system. The two variables to be set\
    \ are:\n\n* **JAVA_HOME**: This tells your operating system where the Java installation\
    \ directory is.\n* **PATH**: This specifies where the Java executable directory\
    \ resides. This environment variable lets the system search paths or directories\
    \ containing executable files. The Java executables reside in the `bin` directory\
    \ under the `JAVA_HOME` home directory.\n\nTo make `JAVA_HOME` and `PATH` more\
    \ permanent, you will want to add them to your system in such a way that they\
    \ are always made available whenever you boot or log in. Depending on your operating\
    \ system, you will need to be able to edit environment variable names and values.\n\
    \nIn the *Windows environment*, you can use the keyboard shortcut *Windows logo\
    \ key + Pause/Break key* and then click on **Advanced system settings** to display\
    \ the **Systems Property** dialog.\n\nNext, click on **Environment Variables**.\
    \ This is where you can add, edit, and delete environment variables. You will\
    \ add or edit the `JAVA_HOME` environment variable by using the installed home\
    \ directory as the value. Shown in this screenshot is the Environment Variables\
    \ dialog on the Windows operating system:\n\n![Setting environment variables](graphics/B03998_01_07.jpg)\n\
    \nWindows Environment Variables\n\nLet's set the environment variables:\n\n* To\
    \ set your `JAVA_HOME` environment variable for the **Mac OS X** platform, you\
    \ will need to launch a terminal window to edit your home directory's `.bash_profile`\
    \ file by adding the following `export` command:\n\n  ```\n  export JAVA_HOME=$(/usr/libexec/java_home\
    \ -v 1.8)\n  ```\n\n* On **Linux** and other **Unix** operating systems that use\
    \ Bash shell environments, launch a terminal window and edit either the `~/.bashrc`\
    \ or `~/.profile` file to contain the `export` commands:\n\n  ```\n  export JAVA_HOME=/usr/java/jdk1.8.0\n\
    \  export PATH=$PATH:$JAVA_HOME/bin\n  ```\n\n* On Linux and other Unix operating\
    \ systems that use `C` shell (csh) environments, launch a terminal window and\
    \ edit either the `~/.cshrc` or `~/.login` file to contain the `setenv` commands:\n\
    \n  ```\n  setenv JAVA_HOME /usr/java/jdk1.8.0_45\n  setenv PATH ${JAVA_HOME}/bin:${PATH}\n\
    \  ```\n\nOnce you've set up your path and the `JAVA_HOME` environment variables,\
    \ you will want to verify your setup by launching a terminal window and executing\
    \ the following two commands from the command prompt:\n\n```\njava -version\n\
    javac –version\n```\n\n### Note\n\nThe output in each case should display a message\
    \ indicating the Java SE 8 version of the language and runtime.\n\n## Installing\
    \ the NetBeans IDE\n\nWhen developing JavaFX applications, you will be using the\
    \ NetBeans IDE (or any other IDE of your preference). Be sure to download the\
    \ correct NetBeans version containing JavaFX. To install the NetBeans IDE, follow\
    \ these steps:\n\n1. Download the NetBeans IDE 8.0.2 or later from the following\
    \ location:\n\n   [https://netbeans.org/downloads/index.html](https://netbeans.org/downloads/index.html)\n\
    \n2. Launch the `.dmg` image file `netbeans-8.0.2-macosx.dmg`. The image will\
    \ be verified and a folder containing the installer package archive, `netbeans-8.0.2.pkg`,\
    \ will open; double-click on it to launch the installer. A dialog box will appear\
    \ with the message: *This package will run a program to determine if the software\
    \ can be installed.* Click on the **Continue** button.\n\n3. Once you've launched\
    \ the NetBeans installation dialog, click on **continue** again. Next, accept\
    \ the license and click on **Continue** and then on **Agree**.\n\n4. Click on\
    \ the **Install** button to proceed. The following screenshot shows a **Mac**\
    \ security warning prompt; supply your password and click on **Install Software**.\
    \ ![Installing the NetBeans IDE](graphics/B03998_01_08.jpg)\n\n   The Mac Security\
    \ Warning dialog\n\n5. The NetBeans IDE installation processes will begin. The\
    \ following screenshot shows the installation progress bar: ![Installing the NetBeans\
    \ IDE](graphics/B03998_01_09.jpg)\n\n   Installation progress\n\n6. Click on the\
    \ **Close** button to complete the installation, as shown here: ![Installing the\
    \ NetBeans IDE](graphics/B03998_01_10.jpg)\n\n   Setup complete\n\nNow you are\
    \ ready to move on and create JavaFX applications.\n\n# Creating \"Hello World\"\
    \ JavaFX-style applications\n\nThe best way to show you what it is like to create\
    \ and build a JavaFX application would be with a `Hello World` application.\n\n\
    In this section, you will be using the NetBeans IDE we just installed to develop,\
    \ compile, and run a JavaFX-based `Hello World` application."
