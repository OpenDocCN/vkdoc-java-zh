  trans: '

    # 为什么树莓派是 JavaFX 的完美选择？


    那么，是什么让树莓派成为 Java 和 JavaFX 的完美选择呢？答案可以从以下几点中找到：


    *   它的运行速度比规格参数所显示的要快。如前所述，树莓派的默认时钟频率为 900 MHz。但凭借其可安全超频至 1 GHz 的 900 MHz 时钟频率和
    1 GB 内存，这台小型计算机能够运行真正庞大且强大的应用程序。

    *   非常明智的是，树莓派基金会选择了一款支持浮点运算的 CPU（通常称为硬浮点），其性能优于所谓的纯软浮点芯片。适用于树莓派的操作系统充分利用了这一额外的性能和速度优势。

    *   最后，树莓派拥有一个相当强大的图形处理单元（GPU），其快速的 3D 核心能够以 40MBits/s 的 H.264 编码实现蓝光画质播放（[`www.raspberrypi.org/help/faqs/#generalSoCUsed`](https://www.raspberrypi.org/help/faqs/#generalSoCUsed)）。


    # 应该购买哪个型号？


    在撰写本文时，树莓派共有五个型号：A、A+、B、B+，以及自 2015 年 2 月起推出的新型号 Pi 2 Model B。以下是 A+ 和 2 B 两个版本的对比。


    | Model A+ | Model 2 B |

    | --- | --- |

    | 售价约 25 美元 | 售价约 35 美元 |

    | 一个 USB 端口 | 四个 USB 端口 |

    | 无以太网接口 | 标准以太网连接 |

    | 256 MB 内存 | 1 GB 内存 |


    Model A+ 更便宜，但只有一个 USB 端口且没有以太网连接。这可能不是问题。如果你为 Model A+ 连接一个带电源的 USB 集线器，再使用一个
    USB 转 WiFi 适配器，就能拥有 Model B+ 的所有网络功能。两个型号之间的一个主要区别是内存大小。Model A+ 有 256 MB 内存，Model
    B+ 有 512 MB 内存，而 2 B 有 1 GB 内存。这两个型号的内存均不可升级。


    所有树莓派微型计算机都配有一个 SD 存储卡插槽、音频输出插孔、RCA 和 HDMI 视频端口，以及一排通用输入输出引脚。还有两个用于连接显示屏和摄像头的额外接口，但两者都需要高度专业化的硬件。考虑到价格差异很小（通常在
    10 到 25 美元之间），我建议从 Model 2 B 开始入手。如果你要为（例如）一个教室购买多台，那么 Model A+ 可能就足够了。


    你可以从任何在线商店以不超过 100 美元的价格购买一个包含所有入门所需物品的套件，它将包括：


    *   新型树莓派 2（RPi2）四核 900 MHz 1GB 内存和 CanaKit WiFi 适配器

    *   优质 6 英尺 HDMI 线缆、GPIO 转面包板接口板、排线、面包板、跳线、GPIO 快速参考卡和电阻色环快速参考卡

    *   8 GB 三星 MicroSD 卡（树莓派基金会推荐的预装 NOOBS 的 MicroSD 卡）、高品质树莓派 2 外壳和散热片

    *   RGB LED、8 个 LED（蓝/红/黄/绿）、15 个电阻、2 个按钮开关和电子元件初学者通用指南

    *   专为树莓派 2 设计的 2.5A USB 电源适配器，带 5 英尺 Micro USB 线缆（UL 认证）


    ![应该购买哪个型号？](img/B03998_06_02.jpg)


    树莓派 B Model 2 的典型套件组件


    ## 购买树莓派


    树莓派由英国的树莓派基金会制造。不幸的是，它历来有缺货待发的历史。幸运的是，你可以从多家供应商处购买，其中一些列在 [`www.raspberrypi.org/`](https://www.raspberrypi.org/)
    的主页上。你也可以从 [`www.amazon.com`](http://www.amazon.com) 购买，尽管价格会稍高一些。价格与你在此处看到的会有所不同。


    最后，请查看 [`www.adafruit.com`](http://www.adafruit.com)。他们的价格合理，并且还提供一些你未来项目中会用到的有用配件。在这些商店里，你还可以找到包含树莓派和入门所需组件的入门套件。


    ## 相关网站和文档


    互联网上有大量关于树莓派的信息。当你研究更高级的主题时，知道在哪里寻找答案会很有帮助。


    树莓派基金会的官方网站是 [`www.rasberrypi.org`](http://www.rasberrypi.org)。它列出了购买树莓派微型计算机的渠道。网站上还有各种教程和有用的论坛。


    有关在树莓派上运行的 Linux 版本的更多信息，请访问 [`elinux.org/index.php?title=RPi_Hub&redirect=no`](http://elinux.org/index.php?title=RPi_Hub&redirect=no)。那里有关于通用输入输出引脚的信息；Raspbian
    Wheezy（专为树莓派设计的 Linux 版本）；以及示例项目。你还会找到关于其他嵌入式系统的信息，例如 **Minnow board** 和 **BeagleBoard**。


    Neil Black 编写了一份出色的树莓派初学者指南，值得掌声。如果你在设置过程中感到困惑，请访问 [`neil-black.co.uk/the-updated-raspberry-pi-beginners-guide`](http://neil-black.co.uk/the-updated-raspberry-pi-beginners-guide)。


    最后，访问 [`www.adafruit.com`](http://www.adafruit.com) 购买树莓派以及电源、电机控制板和实验套件。如果你无法在当地购买零件，这个团队是购买配件和其他组件的绝佳选择。


    # 为 JavaFX 8 准备树莓派


    没有操作系统，你的树莓派将无法工作，操作系统从 SD 卡加载。我们需要一种与之交互的方式，首先安装支持的操作系统，在我们的例子中是 Raspbian Wheezy；所有官方支持的树莓派操作系统都已列出，并可从链接
    [`www.raspberrypi.org/downloads/`](http://www.raspberrypi.org/downloads/) 下载。


    然后，我们将配置树莓派的网络设置，以便远程连接它。最后，我们将检查默认安装的 Java SE 8 版本，并继续检查更新（如果操作系统尚未预装的话）。


    如前所述，最新的更新不包含 JavaFX，因此我们将找到添加它的方法。让我们开始准备 SD 卡以安装 Raspbian Wheezy 操作系统，并使树莓派启动并运行。


    ## 创建可启动 SD 卡


    现在，我们将准备带有 Raspbian Wheezy 操作系统的 SD 卡，这将使我们能够与树莓派进行交互。这是非常重要的一步。有两种方法可以做到这一点：

    '
- fmt: "### Using NOOBS\n\n`NOOBS` is an easy operating system installer that contains\
    \ `Raspbian`. But the lite version doesn't bundle a `Raspbian`. It also provides\
    \ a selection of alternative operating systems, which are then downloaded from\
    \ the Internet and installed.\n\nBeginners should start with the `NOOBS` method,\
    \ but it requires an Internet connection with good speed to download the preferred\
    \ OS.\n\nIf you have bought a kit that comes with a preinstalled `NOOBS` SD card,\
    \ you can skip to the next step. Alternatively, if you need an SD card, you can\
    \ order one from the Swag store at [http://swag.raspberrypi.org/products/noobs-8gb-sd-card](http://swag.raspberrypi.org/products/noobs-8gb-sd-card)\
    \ or even download and set it up to your SD card yourself. All steps are provided\
    \ at the link [http://www.raspberrypi.org/help/noobs-setup/](http://www.raspberrypi.org/help/noobs-setup/).\n\
    \n### Burning Raspbian Wheezy OS to your SD card\n\nThis is my favorite setup\
    \ as I have already downloaded the OS and will burn it directly to my SD card;\
    \ here are the steps to do it from Mac OS X (make sure you have a valid SD card,\
    \ with 4/8/16 GB memory and of class 10):\n\nWe need to have our SD card formatted\
    \ in `FAT32`. We will do this easily with `SD Formatter 4.0` for either Windows\
    \ or Mac, which is available for download from the SD Association's site at [https://www.sdcard.org/downloads/formatter_4/eula_mac/index.html](https://www.sdcard.org/downloads/formatter_4/eula_mac/index.html).\n\
    \nFollow the instructions to install the software package:\n\n1.  Insert your\
    \ SD card into the computer or laptop's SD card reader and *make a note of the\
    \ drive letter* allocated to it—for example, `/disk2` in my case.\n2.  In `SDFormatter`,\
    \ select the drive letter for your SD card, go to **Format Option** and select\
    \ **Overwrite format**, name it `RaspWheezy` (optional), and click on **Format**.\
    \ It may take a while to format the SD depending on the size of the card. ![Using\
    \ NOOBS](graphics/B03998_06_03.jpg)\n\n    Formatting SD card with `SDFormatter`\
    \ application\n\n3.  Once the format is completed, close `SDFormatter`. If you\
    \ are on Mac or Linux, run the following command line from your terminal to check\
    \ the disk letter and format type:\n\n    ```\n    $ diskutil list\n    ```\n\n\
    \    In this case, the SD card is `/dev/disk2`, with the `DOS_FAT_32` format type\
    \ and `RASPWHEEZY` as the name. On Windows, open Windows Explorer and check the\
    \ drive.\n\n    ### Note\n\n    Do not get this wrong, or you may destroy all\
    \ the data on the wrong `disk/card/drive`.\n\n4.  Download `Raspbian Wheezy` OS\
    \ from the link [http://downloads.raspberrypi.org/raspbian_latest](http://downloads.raspberrypi.org/raspbian_latest),\
    \ unzip it, and you should have the `2015-02-16-raspbian-wheezy.img` file.\n5.\
    \  From the command line on Mac or Linux, unmount the disk but don't eject:\n\n\
    \    ```\n    $ diskutil unmountDisk /dev/disk2\n    ```\n\n6.  Then write the\
    \ image to the SD card with the `dd` command line:\n\n    ```\n    $ sudo dd if=/path/to/2015-02-16-raspbian-wheezy.img\
    \ of=/dev/rdisk2 bs=1m\n    ```\n\n    Once you have typed your password, the\
    \ writing process begins and you have to wait till you get the prompt again. As\
    \ this will take a few minutes, on Windows, you can use `Win32DiskImager` (It\
    \ can be downloaded from [http://www.raspberry-projects.com/pi/pi-operating-systems/win32diskimager](http://www.raspberry-projects.com/pi/pi-operating-systems/win32diskimager)).\n\
    \n7.  After the `dd` command finishes, eject the card:\n\n    ```\n    $ sudo\
    \ diskutil eject /dev/rdisk2\n    ```\n\n    ### Note\n\n    Note that `dd` will\
    \ not feedback any information until there is an error or it is finished; information\
    \ will be shown and the disk will remount when complete. However, if you wish\
    \ to view the progress, you can use the *Ctrl* + *T* shortcut. This generates\
    \ `SIGINFO`, the status argument of your `tty`, and will display information about\
    \ the process.\n\nCongratulations, now mount your SD card to the Raspberry Pi\
    \ and connect it to a proper monitor to start it up.\n\n## Configuring the Raspberry\
    \ Pi\n\nNow, we need to set up the Pi for the first booting time and also configure\
    \ a static IP in order to connect to it from our laptop and remotely:\n\n1.  Mount\
    \ the SD card we prepared previously.\n2.  Plug in your keyboard, mouse, and monitor\
    \ cables.\n3.  Plug your WiFi Adapter into one of the USB ports.\n4.  Now, plug\
    \ in the power cable to your Pi.\n5.  You should see some verbose output on the\
    \ screen booting up the `Raspbian` OS. Proceed boldly and with no fear.\n6.  On\
    \ the first boot, the Raspberry Pi configuration screen will show up and will\
    \ give you a series of options that you can use to configure your Raspberry Pi.\
    \ Basically, you will want to set up your time-zone and own locale configuration.\
    \ Review the settings of memory split between CPU and GPU, or enable SSH. But\
    \ for the most part, you can simply ignore them, move to the last step with the\
    \ arrow keys, and hit Return.\n7.  If you selected something you don't like during\
    \ the configuration process, you can restart the configuration by typing from\
    \ the console `sudo raspi-config`.\n8.  If the Raspberry Pi was correctly configured,\
    \ you'll see a series of Linux boot messages scroll by followed by a request to\
    \ log in. The default user log in is `pi` and the password is `raspberry`. Now,\
    \ you'll be presented with a standard Linux prompt. Congratulations, your Raspberry\
    \ Pi is up-and-running.\n9.  `Wheezy` comes with a graphical user interface. Simply\
    \ type `sudo startx` and you'll see a colorful user interface complete with games,\
    \ word processors, and web browsers, as shown in the following screenshot: ![Configuring\
    \ the Raspberry Pi](graphics/B03998_06_04.jpg)\n\n    Raspberry Pi Desktop\n\n\
    The Raspberry Pi Desktop is the **Lightweight X11 Desktop Environment** (**LXDE**).\
    \ Spend some time exploring it. You'll find it very familiar, although a bit slower\
    \ than your high-powered desktop computer.\n\nWhen you're done with `LXDE`, simply\
    \ log out and you'll be back at the Linux prompt. For the sake of the information\
    \ on your SD card, it's important to gracefully shut down your Raspberry Pi. Before\
    \ you yank out the power cord, issue a shutdown command:\n\n```\n$ sudo shutdown\
    \ -h now.\n```\n\nThis will make sure that everything is written to the SD card\
    \ before all the processes are shut down. Now, you can safely pull out the power\
    \ cord and that's the extent of the on/off switch for the Raspberry Pi.\n\nCongratulations,\
    \ you have finished your first session with your Raspberry Pi."
  raw: "### Using NOOBS\n\nNOOBS is an easy operating system installer that contains\
    \ Raspbian. But the lite version doesn't bundle a Raspbian. It also provides a\
    \ selection of alternative operating systems, which are then downloaded from the\
    \ Internet and installed.\n\nBeginners should start with the NOOBS method, but\
    \ it requires an Internet connection with good speed to download the preferred\
    \ OS.\n\nIf you have bought a kit that comes with a preinstalled NOOBS SD card,\
    \ you can skip to the next step. Alternatively, if you need an SD card, you can\
    \ order one from the Swag store at [http://swag.raspberrypi.org/products/noobs-8gb-sd-card](http://swag.raspberrypi.org/products/noobs-8gb-sd-card)\
    \ or even download and set it up to your SD card yourself. All steps are provided\
    \ at the link [http://www.raspberrypi.org/help/noobs-setup/](http://www.raspberrypi.org/help/noobs-setup/).\n\
    \nBurning Raspbian Wheezy OS to your SD card:\n\nThis is my favorite setup as\
    \ I have already downloaded the OS and will burn it directly to my SD card; here\
    \ are the steps to do it from Mac OS X (make sure you have a valid SD card, with\
    \ 4/8/16 GB memory and of class 10):\n\nWe need to have our SD card formatted\
    \ in FAT32\\. We will do this easily with SD Formatter 4.0 for either Windows\
    \ or Mac, which is available for download from the SD Association's site at [https://www.sdcard.org/downloads/formatter_4/eula_mac/index.html](https://www.sdcard.org/downloads/formatter_4/eula_mac/index.html).\n\
    \nFollow the instructions to install the software package:\n\n1.  Insert your\
    \ SD card into the computer or laptop's SD card reader and *make a note of the\
    \ drive letter* allocated to it—for example, `/disk2` in my case.\n2.  In **SDFormatter**,\
    \ select the drive letter for your SD card, go to **Format Option** and select\
    \ **Overwrite format**, name it `RaspWheezy` (optional), and click on **Format**.\
    \ It may take a while to format the SD depending on the size of the card. ![Using\
    \ NOOBS](graphics/B03998_06_03.jpg)\n\n    Formatting SD card with SDFormatter\
    \ application\n\n3.  Once the format is completed, close SDFormatter. If you are\
    \ on Mac or Linux, run the following command line from your terminal to check\
    \ the disk letter and format type:\n\n    ```\n    $ diskutil list\n    ```\n\n\
    \    In this case, the SD card is `/dev/disk2`, with the `DOS_FAT_32` format type\
    \ and `RASPWHEEZY` as the name. On Windows. Open Windows Explorer and check the\
    \ drive.\n\n    ### Note\n\n    Do not get this wrong, or you may destroy all\
    \ the data on the wrong `disk/card/drive`.\n\n4.  Download Raspbian Wheezy OS\
    \ from the link [http://downloads.raspberrypi.org/raspbian_latest](http://downloads.raspberrypi.org/raspbian_latest),\
    \ unzip it, and you should have the `2015-02-16-raspbian-wheezy.img` file.\n5.\
    \  From the command line on Mac or Linux, unmount the disk but don't eject:\n\n\
    \    ```\n    $ diskutil unmountDisk /dev/disk2\n    ```\n\n6.  Then write the\
    \ image to the SD card with the `dd` command line:\n\n    ```\n    $ sudo dd if=/path/to/2015-02-16-raspbian-wheezy.img\
    \ of=/dev/rdisk2 bs=1m\n    ```\n\n    Once you have typed your password, the\
    \ writing process begins and you have to wait till you get the prompt again. As\
    \ this will take a few minutes, on Windows, you can use Win32DiskImager (It can\
    \ be downloaded from [http://www.raspberry-projects.com/pi/pi-operating-systems/win32diskimager](http://www.raspberry-projects.com/pi/pi-operating-systems/win32diskimager)).\n\
    \n7.  After the `dd` command finishes, eject the card:\n\n    ```\n    $ sudo\
    \ diskutil eject /dev/rdisk2\n    ```\n\n    ### Note\n\n    Note that `dd` will\
    \ not feedback any information until there is an error or it is finished; information\
    \ will be shown and the disk will remount when complete. However, if you wish\
    \ to view the progress, you can use the *Ctrl* + *T* shortcut. This generates\
    \ **SIGINFO**, the status argument of your `tty`, and will display information\
    \ about the process.\n\nCongratulations, now mount your SD card to the Raspberry\
    \ Pi and connect it to a proper monitor to start it up.\n\n## Configuring the\
    \ Raspberry Pi\n\nNow, we need to set up the Pi for the first booting time and\
    \ also configure a static IP in order to connect to it from our laptop and remotely:\n\
    \n1.  Mount the SD card we prepared previously.\n2.  Plug in your keyboard, mouse,\
    \ and monitor cables.\n3.  Plug your WiFi Adapter into one of the USB ports.\n\
    4.  Now, plug in the power cable to your Pi.\n5.  You should see some verbose\
    \ output on the screen booting up the Raspbian OS. Proceed boldly and with no\
    \ fear.\n6.  On the first boot, the Raspberry Pi configuration screen will show\
    \ up and will gave you a series of options that you can use to configure your\
    \ Raspberry Pi. Basically, you will want to set up your time-zone and own locale\
    \ configuration. Review the settings of memory split between CPU and GPU, or enable\
    \ SSH. But for the most part, you can simply ignore them, move to the last step\
    \ with the arrow keys, and hit Return.\n7.  If you selected something you don't\
    \ like during the configuration process, you can restart the configuration by\
    \ typing from the console `sudo raspi-config`.\n8.  If the Raspberry Pi was correctly\
    \ configured, you'll see a series of Linux boot messages scroll by followed by\
    \ a request to log in. The default user log in is `pi` and the password is `raspberry`.\
    \ Now, you'll be presented with a standard Linux prop. Congratulations, your Raspberry\
    \ Pi is up-and-running.\n9.  Wheezy comes with a graphical user interface. Simply\
    \ type `sudo startx` and you'll see a colorful user interface complete with games,\
    \ word processors, and web browsers, as shown in the following screenshot: ![Configuring\
    \ the Raspberry Pi](graphics/B03998_06_04.jpg)\n\n    Raspberry Pi Desktop\n\n\
    The Raspberry Pi Desktop is the **Lightweight X11 Desktop Environment** (**LXDE**).\
    \ Spend some time exploring it. You'll find it very familiar, although a bit slower\
    \ than your high-powered desktop computer.\n\nWhen you're done with LXDE, simply\
    \ log out and you'll be back at the Linux prompt. For the sake of the information\
    \ on your SD card, it's important to gracefully shut down your Raspberry Pi. Before\
    \ you yank out the power cord, issue a shutdown command:\n\n```\n$ Sudo shutdown\
    \ -h now.\n```\n\nThis will make sure that everything is written to the SD card\
    \ before all the processes are shut down. Now, you can safely pull out the power\
    \ cord and that's the extent of the on/off switch for the Raspberry Pi.\n\nCongratulations,\
    \ you have finished your first session with your Raspberry Pi."
  trans: "\n### 使用 NOOBS\n\nNOOBS 是一款简易的操作系统安装器，其中包含 Raspbian。但精简版并未捆绑 Raspbian。它还提供了一系列可供选择的其他操作系统，这些系统会从互联网下载并安装。\n\
    \n初学者应从 NOOBS 方法入手，但这需要网速良好的互联网连接来下载首选操作系统。\n\n如果你购买的套件中已包含预装 NOOBS 的 SD 卡，可以直接跳到下一步。或者，如果你需要\
    \ SD 卡，可以从 Swag 商店订购一张，网址为 [`swag.raspberrypi.org/products/noobs-8gb-sd-card`](http://swag.raspberrypi.org/products/noobs-8gb-sd-card)；你也可以自行下载并将其设置到你的\
    \ SD 卡上。所有步骤均可在链接 [`www.raspberrypi.org/help/noobs-setup/`](http://www.raspberrypi.org/help/noobs-setup/)\
    \ 中找到。\n\n**将 Raspbian Wheezy 操作系统烧录到你的 SD 卡：**\n\n这是我最喜欢的设置方式，因为我已下载好操作系统，并会直接将其烧录到我的\
    \ SD 卡上；以下是在 Mac OS X 上操作的步骤（请确保你有一张有效的 SD 卡，容量为 4/8/16 GB，且为 Class 10 级别）：\n\n\
    我们需要将 SD 卡格式化为 FAT32 格式。我们可以使用适用于 Windows 或 Mac 的 SD Formatter 4.0 轻松完成此操作，该软件可从\
    \ SD 协会网站下载，网址为 [`www.sdcard.org/downloads/formatter_4/eula_mac/index.html`](https://www.sdcard.org/downloads/formatter_4/eula_mac/index.html)。\n\
    \n按照说明安装该软件包：\n\n1.  将你的 SD 卡插入电脑或笔记本电脑的 SD 卡读卡器，并*记下*分配给它的驱动器盘符——例如，在我的电脑上是 `/disk2`。\n\
    2.  在 **SDFormatter** 中，选择你的 SD 卡的驱动器盘符，进入 **Format Option** 并选择 **Overwrite format**，将其命名为\
    \ `RaspWheezy`（可选），然后点击 **Format**。根据卡的大小，格式化 SD 卡可能需要一些时间。![使用 NOOBS](img/B03998_06_03.jpg)\n\
    \n    使用 SDFormatter 应用程序格式化 SD 卡\n\n3.  格式化完成后，关闭 SDFormatter。如果你使用的是 Mac 或 Linux，请在终端中运行以下命令行来检查磁盘盘符和格式类型：\n\
    \n    ```\n    $ diskutil list\n    ```\n\n    在此例中，SD 卡是 `/dev/disk2`，格式类型为 `DOS_FAT_32`，名称为\
    \ `RASPWHEEZY`。在 Windows 上，请打开 Windows 资源管理器并检查驱动器。\n\n    ### 注意\n\n    切勿搞错，否则你可能会销毁错误\
    \ `disk/card/drive` 上的所有数据。\n\n4.  从链接 [`downloads.raspberrypi.org/raspbian_latest`](http://downloads.raspberrypi.org/raspbian_latest)\
    \ 下载 Raspbian Wheezy 操作系统，解压缩后，你应该会得到 `2015-02-16-raspbian-wheezy.img` 文件。\n5.\
    \  在 Mac 或 Linux 的命令行中，卸载磁盘但不要弹出：\n\n    ```\n    $ diskutil unmountDisk /dev/disk2\n\
    \    ```\n\n6.  然后使用 `dd` 命令行将镜像写入 SD 卡：\n\n    ```\n    $ sudo dd if=/path/to/2015-02-16-raspbian-wheezy.img\
    \ of=/dev/rdisk2 bs=1m\n    ```\n\n    输入密码后，写入过程开始，你需要等待直到再次看到提示符。这需要几分钟时间。在\
    \ Windows 上，你可以使用 Win32DiskImager（可从 [`www.raspberry-projects.com/pi/pi-operating-systems/win32diskimager`](http://www.raspberry-projects.com/pi/pi-operating-systems/win32diskimager)\
    \ 下载）。\n\n7.  `dd` 命令完成后，弹出卡片：\n\n    ```\n    $ sudo diskutil eject /dev/rdisk2\n\
    \    ```\n\n    ### 注意\n\n    请注意，`dd` 在出现错误或完成之前不会反馈任何信息；完成后会显示信息，并且磁盘会重新挂载。但是，如果你想查看进度，可以使用\
    \ *Ctrl* + *T* 快捷键。这会生成 **SIGINFO**，即你 `tty` 的状态参数，并显示有关进程的信息。\n\n恭喜，现在将你的 SD\
    \ 卡装入 Raspberry Pi，并连接合适的显示器以启动它。\n\n## 配置 Raspberry Pi\n\n现在，我们需要为 Pi 的首次启动进行设置，并配置一个静态\
    \ IP，以便从我们的笔记本电脑远程连接：\n\n1.  装入我们之前准备好的 SD 卡。\n2.  插入键盘、鼠标和显示器线缆。\n3.  将你的 WiFi\
    \ 适配器插入其中一个 USB 端口。\n4.  现在，将电源线插入你的 Pi。\n5.  你应该会在屏幕上看到一些详细输出，显示 Raspbian 操作系统正在启动。大胆前进，无需畏惧。\n\
    6.  首次启动时，Raspberry Pi 配置屏幕将会显示，并为你提供一系列可用于配置 Raspberry Pi 的选项。基本上，你需要设置时区和本地化配置。检查\
    \ CPU 和 GPU 之间的内存分配设置，或启用 SSH。但大多数情况下，你可以直接忽略它们，使用箭头键移动到最后一个选项，然后按回车键。\n7.  如果在配置过程中选择了不喜欢的选项，你可以通过在控制台输入\
    \ `sudo raspi-config` 来重新启动配置。\n8.  如果 Raspberry Pi 配置正确，你会看到一系列 Linux 启动信息滚动而过，随后出现登录请求。默认用户登录名是\
    \ `pi`，密码是 `raspberry`。现在，你将看到一个标准的 Linux 提示符。恭喜，你的 Raspberry Pi 已启动并运行。\n9. \
    \ Wheezy 带有图形用户界面。只需输入 `sudo startx`，你就会看到一个色彩丰富的用户界面，其中包含游戏、文字处理器和网页浏览器，如下面的截图所示：![配置\
    \ Raspberry Pi](img/B03998_06_04.jpg)\n\n    Raspberry Pi 桌面\n\nRaspberry Pi 桌面是**轻量级\
    \ X11 桌面环境**（**LXDE**）。花些时间探索一下。你会发现它非常熟悉，尽管比你的高性能台式电脑稍慢一些。\n\n当你完成 LXDE 的使用后，只需注销，你就会回到\
    \ Linux 提示符。为了 SD 卡上数据的安全，优雅地关闭你的 Raspberry Pi 非常重要。在拔出电源线之前，请发出关机命令：\n\n```\n\
    $ sudo shutdown -h now.\n```\n\n这将确保在所有进程关闭之前，所有内容都已写入 SD 卡。现在，你可以安全地拔出电源线，这就是\
    \ Raspberry Pi 开关的全部操作。\n\n恭喜，你已经完成了 Raspberry Pi 的首次使用。\n"
- fmt: "# Connecting to the Raspberry Pi remotely\n\nUsually, you will connect to\
    \ your Raspberry Pi using peripherals and monitor, but this will not always be\
    \ the case since you will need to control your Pi from your computer, browser,\
    \ or even mobile at the development stage or when the Pi itself is used as a cool\
    \ server controlling your home appliances.\n\nGiving your Raspberry Pi a fixed\
    \ network address isn't necessary, but it is strongly recommended. Doing so means\
    \ you always connect to your Pi using the same address (or name, if you create\
    \ an entry in your `hosts` file), and thus it removes one potential variable from\
    \ your development process.\n\nIt's also a good idea to update your network DHCP\
    \ device/router with the Pi's IP address so that it doesn't try to assign it to\
    \ another device on your network. The steps required to do so will vary by switch/router\
    \ manufacturer.\n\nWe will install VNC server on our Raspberry Pi. **Virtual Network\
    \ Computing** (**VNC**) allows you to control one computer from another over a\
    \ network. It provides a graphical user interface, including the mouse and keyboard.\
    \ In our case, it will allow us to see and use the Raspberry Pi GUI without the\
    \ need for a physical keyboard and mouse connected to the Raspberry Pi.\n\nRight\
    \ now, this is a convenience and if you're happy with your current mouse, keyboard,\
    \ and monitor setup, you can skip this part. When you begin experimenting with\
    \ devices that require one or more USB ports, VNC will become a necessity.\n\n\
    There are five steps to set up VNC:\n\n1. Connect to a home WiFi Internet connection.\n\
    2. Install VNC on the Raspberry Pi.\n3. Set up to start at boot.\n4. Set up a\
    \ static IP address.\n5. Connect to VNC with a client.\n\nConnecting to WiFi Internet\
    \ connection, Raspbian Wheezy includes a WiFi configuration utility. Also, all\
    \ Raspbians released after October 28, 2012 are prebundled with this utility.\n\
    \n### Note\n\nSetting up WiFi requires that your router is broadcasting the SSID.\
    \ Make sure you have *Broadcast SSID* set up on your router! This will not work\
    \ with private SSID setups.\n\nNow, Let's connect to the Raspberry Pi remotely:\n\
    \n1. From the Raspbian desktop, go to **Menu** | **Preferences** | **WiFi Configuration**,\
    \ as shown in the following screenshot: ![Connecting to the Raspberry Pi remotely](graphics/B03998_06_05.jpg)\n\
    \n   Choosing the WiFi Configuration utility\n\n2. Double-click on the icon and\
    \ you will see the following window: ![Connecting to the Raspberry Pi remotely](graphics/B03998_06_06.jpg)\n\
    \n   WiFi Configuration utility GUI\n\n3. Click on the **Scan** button and a second\
    \ window will open. Find your wireless access point in the list and double-click\
    \ on it. This will open another window: ![Connecting to the Raspberry Pi remotely](graphics/B03998_06_07.jpg)\n\
    \n   List of access points\n\n4. Enter your password in the `PSK` field and then\
    \ click on **Add**. When you look at the first window, you should see that the\
    \ connection is all set up for use. ![Connecting to the Raspberry Pi remotely](graphics/B03998_06_08.jpg)\n\
    \n   Final status in adding an access point\n\nYou can connect or disconnect using\
    \ the buttons. You can see in the preceding screenshot that the IP address of\
    \ the Pi is shown at the bottom of the window.\n\nNote that there's a manual procedure\
    \ to set up the WiFi connection on a terminal. This requires editing the `config`\
    \ files and manually adding the SSID and password of the network. For more information,\
    \ go to [https://www.raspberrypi.org/documentation/configuration/wireless/wireless-cli.md](https://www.raspberrypi.org/documentation/configuration/wireless/wireless-cli.md).\n\
    \nCongratulations, your Pi is connected to Internet. Now let's install a VNC server.\n\
    \n### Installing VNC on the Raspberry Pi\n\nNow that you have an Internet connection,\
    \ you can install a VNC server on your Raspberry Pi. If you're using Raspbian\
    \ Wheezy, this is simple. At a command prompt, enter the following line:\n\n```\n\
    $ sudo apt-get install tightvncserver\n```\n\nYou'll get the message: **Do you\
    \ want to continue? Yes or No?**\n\nLet's answer with a capital *Y* and take a\
    \ break. When the installation is complete, enter the following command:\n\n```\n\
    $ vncserver\n```\n\nYou'll be asked to create a password, I use *raspberry*. It\
    \ notes that the password is longer than eight characters; go ahead and retype\
    \ `raspberry`. Next, you'll be asked: **Would you like to enter a view only password?**\
    \ Enter *N* for no.\n\nCongratulations, you're running VNC on your Raspberry Pi.\n\
    \n#### Setting up VNC to start at boot\n\nAs you become more advanced, you may\
    \ not always need VNC but let's assume you want VNC to run every time you start\
    \ your Raspberry Pi:\n\n1. Edit the `rc.local` file using the following command\
    \ from the Pi **LX Terminal**:\n\n   ```\n   $ sudo nano /etc/rc.local\n   ```\n\
    \n2. Scroll to the bottom and add the following line above `exit 0`:\n\n   ```\n\
    \   su -c \"/usr/bin/tightvncserver -geometry 1280x1024\" pi\n   ```\n\n3. Save\
    \ the file and restart your Raspberry Pi using the following command:\n\n   ```\n\
    \   $ sudo shutdown -r now\n   ```\n\n4. Now, every time you start your Raspberry\
    \ Pi, VNC will be available.\n\n### Setting up a static IP address\n\nConnecting\
    \ with the Raspberry Pi over VNC requires a static IP address, one that doesn't\
    \ change. I'll show you how to get that for wired and wireless networking in the\
    \ next few steps:\n\n1. If you are on a home network, you'll need to discover\
    \ a usable IP address. To do this, turn to your Raspberry Pi, open Pi LX Terminal,\
    \ and type:\n\n   ```\n   mohamed_taman$ ifconfig –a\n   ```\n\n   Then, type\
    \ the following command:\n\n   ```\n   mohamed_taman$ netstat -nr\n   ```\n\n\
    2. Gather the following information: *current IP* (if you want to keep it), *netmask*,\
    \ *gateway*, *destination*, and *broadcast*. Write these down, you'll need them\
    \ soon!\n\n3. On the Pi, make a backup of `/etc/network/interfaces` by running\
    \ the following command:\n\n   ```\n   $ sudo cp /etc/network/interfaces /etc/network/interfaces.org\n\
    \   ```\n\n4. Modify the `interfaces` file with the following command:\n\n   ```\n\
    \   $ sudo nano /etc/network/interfaces\n   ```\n\n5. Change the `interfaces`\
    \ file from: ![Setting up a static IP address](graphics/B03998_06_09.jpg)\n\n\
    \   Interfaces file before editing\n\n6. Select the IP numbers that suit your\
    \ network; also change `wpa-ssid` to your wireless network name and `wpa-psk`\
    \ to wireless password: ![Setting up a static IP address](graphics/B03998_06_10.jpg)\n\
    \n   Interfaces file after editing\n\n7. Save the file and restart your Raspberry\
    \ Pi. These settings work for both wired and wireless connections. Congratulations,\
    \ you can now connect to your Pi with the VNC client."
  raw: "## Connecting to the Raspberry Pi remotely\n\nUsually, you will connect to\
    \ your Raspberry Pi using peripherals and monitor, but this will not always be\
    \ the case since you will need to control your Pi from your computer, browser,\
    \ or even mobile at the development stage or when the Pi itself is used as a cool\
    \ server controlling your home appliances.\n\nGiving your Raspberry Pi a fixed\
    \ network address isn't necessary, but it is strongly recommended. Doing so means\
    \ you always connect to your Pi using the same address (or name, if you create\
    \ an entry in your hosts file), and thus it removes one potential variable from\
    \ your development process.\n\nIt's also a good idea to update your network DHCP\
    \ device/router with the Pi's IP address so that it doesn't try to assign it to\
    \ another device on your network. The steps required to do so will vary by switch/router\
    \ manufacturer.\n\nWe will install VNC server on our Raspberry Pi. **Virtual Network\
    \ Computing** (**VNC**) allows you to control one computer from another over a\
    \ network. It provides a graphical user interface, including the mouse and keyboard.\
    \ In our case, it will allow us to see and use the Raspberry Pi GUI without the\
    \ need for a physical keyboard and mouse connected to the Raspberry Pi.\n\nRight\
    \ now, this is a convenience and if you're happy with your current mouse, keyboard,\
    \ and monitor setup, you can skip this part. When you begin experimenting with\
    \ devices that require one or more USB ports, VNC will become a necessity.\n\n\
    There are five steps to set up VNC:\n\n1.  Connect to a home WiFi Internet connection.\n\
    2.  Install VNC on the Raspberry Pi.\n3.  Set up to start at boot.\n4.  Set up\
    \ a static IP address.\n5.  Connect to VNC with a client.\n\nConnecting to WiFi\
    \ Internet connection, Raspbian Wheezy includes a WiFi configuration utility.\
    \ Also, all Raspbians released after October 28, 2012 are prebundled with this\
    \ utility.\n\n### Note\n\nSetting up WiFi requires that your router is broadcasting\
    \ the SSID. Make sure you have *Broadcast SSID* set up on your router! This will\
    \ not work with private SSID setups.\n\nNow, Let's connect to the Raspberry Pi\
    \ remotely:\n\n1.  From the Raspbian desktop, go to **Menu** | **Preferences**\
    \ | **WiFi Configuration**, as shown in the following screenshot: ![Connecting\
    \ to the Raspberry Pi remotely](graphics/B03998_06_05.jpg)\n\n    Choosing the\
    \ WiFi Configuration utility\n\n2.  Double-click on the icon and you will see\
    \ the following window: ![Connecting to the Raspberry Pi remotely](graphics/B03998_06_06.jpg)\n\
    \n    WiFi Configuration utility GUI\n\n3.  Click on the **Scan** button and a\
    \ second window will open. Find your wireless access point in the list and double-click\
    \ on it. This will open another window: ![Connecting to the Raspberry Pi remotely](graphics/B03998_06_07.jpg)\n\
    \n    List of access points\n\n4.  Enter your password in the `PSK` field and\
    \ then click on **Add**. When you look at the first window, you should see that\
    \ the connection is all set up for use. ![Connecting to the Raspberry Pi remotely](graphics/B03998_06_08.jpg)\n\
    \n    Final status in adding an access point\n\nYou can connect or disconnect\
    \ using the buttons. You can see in the preceding screenshot that the IP address\
    \ of the Pi is shown at the bottom of the window.\n\nNote that there's a manual\
    \ procedure to set up the WiFi connection on a terminal. This requires editing\
    \ the `config` files and manually adding the SSID and password of the network.\
    \ For more information, go to [https://www.raspberrypi.org/documentation/configuration/wireless/wireless-cli.md](https://www.raspberrypi.org/documentation/configuration/wireless/wireless-cli.md).\n\
    \nCongratulations, your Pi is connected to Internet. Now let's install a VNC server.\n\
    \n### Installing VNC on the Raspberry Pi\n\nNow that you have an Internet connection,\
    \ you can install a VNC server on your Raspberry Pi. If you're using Raspbian\
    \ Wheezy, this is simple. At a command prompt, enter the following line:\n\n```\n\
    $ sudo apt-get install tightvncserver\n```\n\nYou'll get the message: **Do you\
    \ want to continue? Yes or No?**\n\nLet's answer with a capital *Y* and take a\
    \ break. When the installation is complete, enter the following command:\n\n```\n\
    $ vncserver\n```\n\nYou'll be asked to create a password, I use *raspberry*. It\
    \ notes that the password is longer than eight characters; go ahead and retype\
    \ `raspberry`. Next, you'll be asked: **Would you like to enter a view only password?**\
    \ Enter *N* for no.\n\nCongratulations, you're running VNC on your Raspberry Pi.\n\
    \n#### Setting up VNC to start at boot\n\nAs you become more advanced, you may\
    \ not always need VNC but let's assume you want VNC to run every time you start\
    \ your Raspberry Pi:\n\n1.  Edit the `rc.local` file using the following command\
    \ from the Pi **LX Terminal**:\n\n    ```\n    $ sudo nano /etc/rc.local\n   \
    \ ```\n\n2.  Scroll to the bottom and add the following line above `exit 0`:\n\
    \n    ```\n    su -c \"/usr/bin/tightvncserver -geometry 1280x1024\" pi\n    ```\n\
    \n3.  Save the file and restart your Raspberry Pi using the following command:\n\
    \n    ```\n    $ sudo shutdown -r now\n    ```\n\n4.  Now, every time you start\
    \ your Raspberry Pi, VNC will be available.\n\n### Setting up a static IP address\n\
    \nConnecting with the Raspberry Pi over VNC requires a static IP address, one\
    \ that doesn't change. I'll show you how to get that for wired and wireless networking\
    \ in the next few steps:\n\n1.  If you are on a home network, you'll need to discover\
    \ a usable IP address. To do this, turn to your Raspberry Pi, open Pi LX Terminal,\
    \ and type:\n\n    ```\n    mohamed_taman$ ifconfig –a\n    ```\n\n    Then, type\
    \ the following command:\n\n    ```\n    mohamed_taman$ netstat -nr\n    ```\n\
    \n2.  Gather the following information: *current IP* (if you want to keep it),\
    \ *netmask*, *gateway*, *destination*, and *broadcast*. Write these down, you'll\
    \ need them soon!\n3.  On the Pi, make a backup of `/etc/network/interfaces` by\
    \ running the following command:\n\n    ```\n    $ sudo cp /etc/network/interfaces\
    \ /etc/network/interfaces.org\n    ```\n\n4.  Modify the `interfaces` file with\
    \ the following command:\n\n    ```\n    $ sudo nano /etc/network/interfaces\n\
    \    ```\n\n5.  Change the `interfaces` file from: ![Setting up a static IP address](graphics/B03998_06_09.jpg)\n\
    \n    Interfaces file before editing\n\n6.  Select the IP numbers that suit your\
    \ network; also change `wpa-ssid` to your wireless network name and `wpa-psk`\
    \ to wireless password: ![Setting up a static IP address](graphics/B03998_06_10.jpg)\n\
    \n    Interfaces file after editing\n\n7.  Save the file and restart your Raspberry\
    \ Pi. These settings work for both wired and wireless connections. Congratulations,\
    \ you can now connect to your Pi with the VNC client."
  trans: "\n## 远程连接树莓派\n\n通常情况下，你会使用外设和显示器来连接树莓派，但并非总是如此——在开发阶段，或者当树莓派本身被用作控制家用电器的酷炫服务器时，你需要从电脑、浏览器甚至手机来控制它。\n\
    \n为树莓派设置固定网络地址并非必需，但强烈建议这样做。这样一来，你就能始终使用相同的地址（或名称，如果你在 hosts 文件中创建了条目）连接到树莓派，从而消除了开发过程中的一个潜在变量。\n\
    \n同时，最好将树莓派的 IP 地址更新到网络 DHCP 设备/路由器中，这样它就不会尝试将该地址分配给网络上的其他设备。具体操作步骤因交换机/路由器制造商而异。\n\
    \n我们将在树莓派上安装 VNC 服务器。**虚拟网络计算**（**VNC**）允许你通过网络从一台电脑控制另一台电脑。它提供了一个图形用户界面，包括鼠标和键盘。在我们的场景中，它将使我们无需在树莓派上连接实体键盘和鼠标，就能查看和使用树莓派的图形用户界面。\n\
    \n目前，这只是一个便利功能，如果你对当前的鼠标、键盘和显示器设置感到满意，可以跳过此部分。当你开始使用需要占用一个或多个 USB 端口的设备时，VNC 将成为必需品。\n\
    \n设置 VNC 需要五个步骤：\n\n1.  连接到家庭 WiFi 互联网连接。\n2.  在树莓派上安装 VNC。\n3.  设置为开机自启动。\n4.\
    \  设置静态 IP 地址。\n5.  使用客户端连接到 VNC。\n\n连接到 WiFi 互联网连接，Raspbian Wheezy 包含一个 WiFi\
    \ 配置工具。此外，所有在 2012 年 10 月 28 日之后发布的 Raspbian 版本都预装了此工具。\n\n### 注意\n\n设置 WiFi 需要你的路由器正在广播\
    \ SSID。请确保你的路由器已设置*广播 SSID*！这对于私有 SSID 设置无效。\n\n现在，让我们远程连接到树莓派：\n\n1.  在 Raspbian\
    \ 桌面上，转到 **菜单** | **首选项** | **WiFi 配置**，如下截图所示：![远程连接树莓派](img/B03998_06_05.jpg)\n\
    \n    选择 WiFi 配置工具\n\n2.  双击该图标，你将看到以下窗口：![远程连接树莓派](img/B03998_06_06.jpg)\n\n\
    \    WiFi 配置工具图形用户界面\n\n3.  点击 **扫描** 按钮，将打开第二个窗口。在列表中找到你的无线接入点并双击它。这将打开另一个窗口：![远程连接树莓派](img/B03998_06_07.jpg)\n\
    \n    接入点列表\n\n4.  在 `PSK` 字段中输入你的密码，然后点击 **添加**。查看第一个窗口时，你应该会看到连接已设置完毕，可供使用。![远程连接树莓派](img/B03998_06_08.jpg)\n\
    \n    添加接入点的最终状态\n\n你可以使用按钮进行连接或断开连接。在上面的截图中，你可以看到树莓派的 IP 地址显示在窗口底部。\n\n请注意，在终端上设置\
    \ WiFi 连接有一个手动方法。这需要编辑 `config` 文件并手动添加网络的 SSID 和密码。更多信息，请访问 [`www.raspberrypi.org/documentation/configuration/wireless/wireless-cli.md`](https://www.raspberrypi.org/documentation/configuration/wireless/wireless-cli.md)。\n\
    \n恭喜，你的树莓派已连接到互联网。现在让我们安装一个 VNC 服务器。\n\n### 在树莓派上安装 VNC\n\n现在你已经有了互联网连接，可以在树莓派上安装\
    \ VNC 服务器了。如果你使用的是 Raspbian Wheezy，这很简单。在命令提示符下，输入以下行：\n\n```\n$ sudo apt-get\
    \ install tightvncserver\n```\n\n你会看到消息：**是否继续？是或否？**\n\n让我们用大写字母 *Y* 回答，然后休息一下。当安装完成时，输入以下命令：\n\
    \n```\n$ vncserver\n```\n\n系统会要求你创建一个密码，我使用 *raspberry*。它会提示密码长度超过八个字符；继续重新输入\
    \ `raspberry`。接下来，系统会询问：**是否要输入一个仅供查看的密码？** 输入 *N* 表示否。\n\n恭喜，你已经在树莓派上运行 VNC 了。\n\
    \n#### 设置 VNC 开机自启动\n\n随着你越来越熟练，你可能并不总是需要 VNC，但假设你希望每次启动树莓派时 VNC 都运行：\n\n1.  使用树莓派\
    \ **LX 终端** 中的以下命令编辑 `rc.local` 文件：\n\n    ```\n    $ sudo nano /etc/rc.local\n\
    \    ```\n\n2.  滚动到底部，在 `exit 0` 上方添加以下行：\n\n    ```\n    su -c \"/usr/bin/tightvncserver\
    \ -geometry 1280x1024\" pi\n    ```\n\n3.  保存文件并使用以下命令重启树莓派：\n\n    ```\n    $\
    \ sudo shutdown -r now\n    ```\n\n4.  现在，每次启动树莓派时，VNC 都将可用。\n\n### 设置静态 IP 地址\n\
    \n通过 VNC 连接树莓派需要一个静态 IP 地址，即一个不会改变的地址。接下来我将向你展示如何为有线和无线网络获取静态 IP：\n\n1.  如果你在家庭网络中，需要找到一个可用的\
    \ IP 地址。为此，打开树莓派 LX 终端，输入：\n\n    ```\n    mohamed_taman$ ifconfig –a\n    ```\n\
    \n    然后，输入以下命令：\n\n    ```\n    mohamed_taman$ netstat -nr\n    ```\n\n2.  收集以下信息：*当前\
    \ IP*（如果你想保留它）、*子网掩码*、*网关*、*目标地址*和*广播地址*。记下这些信息，你很快就会用到！\n3.  在树莓派上，通过运行以下命令备份\
    \ `/etc/network/interfaces`：\n\n    ```\n    $ sudo cp /etc/network/interfaces\
    \ /etc/network/interfaces.org\n    ```\n\n4.  使用以下命令修改 `interfaces` 文件：\n\n  \
    \  ```\n    $ sudo nano /etc/network/interfaces\n    ```\n\n5.  将 `interfaces`\
    \ 文件从：![设置静态 IP 地址](img/B03998_06_09.jpg)\n\n    编辑前的 interfaces 文件\n\n6.  选择适合你网络的\
    \ IP 号码；同时将 `wpa-ssid` 改为你的无线网络名称，将 `wpa-psk` 改为无线密码：![设置静态 IP 地址](img/B03998_06_10.jpg)\n\
    \n    编辑后的 interfaces 文件\n\n7.  保存文件并重启树莓派。这些设置对有线和无线连接都有效。恭喜，你现在可以使用 VNC 客户端连接到你的树莓派了。\n"
- fmt: "### Auto login in the Raspberry Pi\n\nLike most people, you might have bought\
    \ the Raspberry Pi to build your own appliance for home or office. The next thing\
    \ you should do is set up the Raspberry Pi, connect your peripherals, and install\
    \ or develop the necessary software.\n\nWhat you want at the end of your project\
    \ is to power on the appliance and have it should show you all the magic you were\
    \ expecting.\n\nThe spoiler comes when the Pi boots to the login prompt and waits\
    \ for you to enter the username and password. So, let's automate the Raspberry\
    \ Pi login:\n\n1. From your Pi, open a terminal and edit the `inittab` file with\
    \ the following command:\n\n    ```\n    sudo nano /etc/inittab\n    ```\n\n2.\
    \ Disable the `getty` program by navigating to the following line in `inittab`:\n\
    \n    ```\n    1:2345:respawn:/sbin/getty 115200 tty1\n    ```\n\n3. Add a `#`\
    \ at the beginning of the line to comment it out, as shown in the following line:\n\
    \n    ```\n    #1:2345:respawn:/sbin/getty 115200 tty1\n    ```\n\n4. Add a login\
    \ program to `inittab` just below the commented line:\n\n    ```\n    1:2345:respawn:/bin/login\
    \ -f pi tty1 </dev/tty1 >/dev/tty1 2>&1\n    ```\n\n5. This will run the login\
    \ program with `pi` user and without any authentication.\n6. Save and exit by\
    \ pressing *Ctrl* + *X*, followed by *Y* to save the file, and then press *Enter*\
    \ to confirm the filename.\n\nReboot the Pi and it will boot straight to the shell\
    \ prompt `pi@raspberrypi` without prompting you to enter your username or password.\n\
    \n### Connecting to VNC with a client\n\nBefore going any further, let's make\
    \ sure everything is working correctly. To do this, you'll need a VNC client.\
    \ If you're using a Macintosh with a recent version of Mac OS X, this is simple.\n\
    \nGo to **Finder** | **Go** | **Connect to Server**. Enter `vnc://` and the IP\
    \ address you have given to your Raspberry Pi. In my case, it was `192.168.2.150`\
    \ followed by a colon and the number `5901`, as shown in the following screenshot.\
    \ The full URL should be `vnc://192.168.2.150:5901`.\n\n![Connecting to VNC with\
    \ a client](graphics/B03998_06_11.jpg)\n\nConnect to the Pi VNC server.\n\nAs\
    \ shown in the image `5901` is the number of the port the Raspberry Pi VNC server\
    \ is listening to. Hit **Connect**. Don't worry about the screen sharing encryption,\
    \ hit **Connect** again. Now type in the password you created earlier (`raspberry`).\
    \ If everything is working correctly, you'll see a large raspberry. Congratulations!\n\
    \nIf you're not on a Macintosh computer, you'll need to download a VNC client.\
    \ You can obtain free viewers from [http://realvnc.com/](http://realvnc.com/).\
    \ There are clients for Windows, iOS, Android, and the Chrome browser. Yes, you\
    \ can control your Raspberry Pi from your cell phone.\n\n## JavaFX 8 development\
    \ prerequisites\n\nNow as we have set up and configured our Raspberry Pi for development,\
    \ we need to install the same correct matching JDK 8 build version on both our\
    \ development machine and the Pi. This is very important to avoid library/versioning\
    \ issues when running our JavaFX 8 application, and this is what we are going\
    \ to do next.\n\n### Installing Java SE 8 on the Raspberry Pi\n\nAt the time of\
    \ writing, Raspbian Wheezy is shipped with JDK 8 preinstalled. To check, simply\
    \ type the following at your Pi command prompt:\n\n```\npi@raspberrypi ~ $ java\
    \ –version\n```\n\nYou will see something like this, depending upon the version\
    \ that is currently installed and accessible:\n\n![Installing Java SE 8 on the\
    \ Raspberry Pi](graphics/B03998_06_12.jpg)\n\nRaspbian Wheezy Java version on\
    \ Raspberry Pi\n\nThe important bit is the second line: if it doesn't say `1.8.n`,\
    \ you'll need to install JDK8.\n\n### Installing Java SE 8\n\nWe have already\
    \ installed our JDK 8 before and all necessary steps are described in the *Installing\
    \ Java SE 8 JDK* section in [Chapter 1](#ch01.html \"Chapter 1. Getting Started\
    \ with JavaFX 8\"), *Getting Started with JavaFX 8*.\n\n### Adding JavaFX\n\n\
    As mentioned previously, Oracle has withdrawn its support for JavaFX Embedded.\
    \ If you have installed JDK 8u45 or the prebundled version installed on Raspbian\
    \ Wheezy, there is no `jfxrt.jar` bundled, so we need to provide it in order to\
    \ run JavaFX applications on our Pi.\n\nOne-way to do this is to follow the tutorial\
    \ at [https://wiki.openjdk.java.net/display/OpenJFX/Cross+Building+for+ARM+Hard+Float](https://wiki.openjdk.java.net/display/OpenJFX/Cross+Building+for+ARM+Hard+Float)),\
    \ cross-building OpenJFX for ARM. This is for really advanced developers.\n\n\
    An easier way is to download a prebuilt distribution such as `armv6hf-sdk.zip`\
    \ hosted on the JavaFXPorts project ([https://bitbucket.org/javafxports/arm/downloads](https://bitbucket.org/javafxports/arm/downloads)).\n\
    \nOnce you have downloaded `armv6hf-sdk.zip`, unzip it and add this command-line\
    \ option to attach the external source to the `classpath` with the extension mechanism:\n\
    \n```\n-Djava.ext.dirs=<path to armv6hf-sdk>/rt/lib/ext\n```\n\nAlternatively,\
    \ you can copy the contents of `rt/lib/ext` and `rt/lib/arm` from this zip into\
    \ your JVM folders, avoiding the use of the extension mechanism.\n\n### Configuring\
    \ NetBeans for the Raspberry Pi\n\nNetBeans 8 adds the capability to point to\
    \ a remote JDK and use it to debug and execute programs remotely that you write\
    \ locally on your development machine. It even deploys your applications automatically\
    \ and seamlessly. As documented by José Pereda in his article at [http://netbeans.dzone.com/articles/nb-8-raspberry-pi-end2end](http://netbeans.dzone.com/articles/nb-8-raspberry-pi-end2end),\
    \ you can enable this capability with the following steps:\n\n1. Start NetBeans\
    \ on your machine.\n2. Choose **Tools** from the menu bar and then select **Java\
    \ Platforms**. Click on the **Add Platform** button.\n3. Select the **Remote Java\
    \ Standard Edition** radio button and click on **Next**.\n4. Provide the following\
    \ entries (shown in the following screenshot as an example):\n\n    **Platform\
    \ Name**: `JavaFX on Raspberry Pi JDK 8`\n\n    **Host**: Enter the static IP\
    \ address or hostname of your Raspberry Pi you already assigned before\n\n   \
    \ **Username**: `pi`\n\n    **Password**: `raspberry`\n\n    **Remote JRE Path**:\
    \ `/usr/lib/jvm/jdk-8-oracle-arm-vfp-hflt/jre`\n\n    ![Configuring NetBeans for\
    \ the Raspberry Pi](graphics/B03998_06_13.jpg)\n\n    Setting up a remote platform\
    \ for Pi\n\n5. Click on the **Finish** button and wait for NetBeans to establish\
    \ and configure the remote JDK connection.\n6. Click on the **Close** button once\
    \ the remote JDK is in place.\n\nNow that we've completed the setup, you should\
    \ have a development environment that is among the best available to develop JavaFX\
    \ 8 applications for the Raspberry Pi. So let's get started!\n\n## The switch\
    \ application\n\nThe switch application is very simple in its nature, but the\
    \ idea is mainly divided into two main points: how to run JavaFX 8 applications\
    \ on Raspberry Pi and how to control the outside world from the Raspberry Pi **General-purpose\
    \ input/output** (**GPIO**). We will use a project called **Pi4j** for such purpose.\n\
    \nThe idea is simple; we are going to create a JavaFX application that will act\
    \ as a switch controller to control a LED associated to an electrical circuit\
    \ connected to your Raspberry Pi.\n\nThe following screenshots show the application\
    \ in the ON and OFF states:\n\n![The switch application](graphics/B03998_06_14.jpg)\n\
    \nSwitch Application ON state\n\n![The switch application](graphics/B03998_06_15.jpg)\n\
    \nSwitch Application OFF state"
  raw: "### Auto login in the Raspberry Pi\n\nLike most people, you might have bought\
    \ the Raspberry Pi to build your own appliance for home or office. The next thing\
    \ you should do is set up the Raspberry Pi, connect your peripherals, and install\
    \ or develop the necessary software.\n\nWhat you want at the end of your project\
    \ is to power on the appliance and have it should show you all the magic you were\
    \ expecting.\n\nThe spoiler comes when the Pi boots to the login prompt and waits\
    \ for you to enter the username and password. So, let's automate the Raspberry\
    \ Pi login:\n\n1.  From your Pi, open a terminal and edit the `inittab` file with\
    \ the following command:\n\n    ```\n    sudo nano /etc/inittab\n    ```\n\n2.\
    \  Disable the `getty` program by navigating to the following line in `inittab`:\n\
    \n    ```\n    1:2345:respawn:/sbin/getty 115200 tty1\n    ```\n\n3.  Add a `#`\
    \ at the beginning of the line to comment it out, as shown in the following line:\n\
    \n    ```\n    #1:2345:respawn:/sbin/getty 115200 tty1\n    ```\n\n4.  Add a login\
    \ program to `inittab` just below the commented line:\n\n    ```\n    1:2345:respawn:/bin/login\
    \ -f pi tty1 </dev/tty1 >/dev/tty1 2>&1\n    ```\n\n5.  This will run the login\
    \ program with `pi` user and without any authentication.\n6.  Save and exit by\
    \ pressing *Ctrl* + *X*, followed by *Y* to save the file, and then press *Enter*\
    \ to confirm the filename.\n\nReboot the Pi and it will boot straight to the shell\
    \ prompt `pi@raspberrypi` without prompting you to enter your username or password.\n\
    \n### Connecting to VNC with a client\n\nBefore going any further, let's make\
    \ sure everything is working correctly. To do this, you'll need a VNC client.\
    \ If you're using a Macintosh with a recent version of Mac OS X, this is simple.\n\
    \nGo to **Finder** | **Go** | **Connect to Server**. Enter `vnc://` and the IP\
    \ address you have given to your Raspberry Pi. In my case, it was 192.168.2.150\
    \ followed by a colon and the number 5901, as shown in the following screenshot.\
    \ The full URL should be **vnc://192.168.2.150:5901**.\n\n![Connecting to VNC\
    \ with a client](graphics/B03998_06_11.jpg)\n\nConnect to the Pi VNC server.\n\
    \nAs shown in the image `5901` is the number of the port the Raspberry Pi VNC\
    \ server is listening to. Hit **Connect**. Don't worry about the screen sharing\
    \ encryption, hit **Connect** again. Now type in the password you created earlier\
    \ (`raspberry`). If everything is working correctly, you'll see a large raspberry.\
    \ Congratulations!\n\nIf you're not on a Macintosh computer, you'll need to download\
    \ a VNC client. You can obtain free viewers from [http://realvnc.com/](http://realvnc.com/).\
    \ There are clients for Windows, iOS, Android, and the Chrome browser. Yes, you\
    \ can control your Raspberry Pi from your cell phone.\n\n# JavaFX 8 development\
    \ prerequisites\n\nNow as we have set up and configured our Raspberry Pi for development,\
    \ we need to install the same correct matching JDK 8 build version on both our\
    \ development machine and the Pi. This is very important to avoid library/versioning\
    \ issues when running our JavaFX 8 application, and this is what we are going\
    \ to do next.\n\n## Installing Java SE 8 on the Raspberry Pi\n\nAt the time of\
    \ writing, Raspbian Wheezy is shipped with JDK 8 preinstalled. To check, simply\
    \ type the following at your Pi command prompt:\n\n```\npi@raspberrypi ~ $ java\
    \ –version\n```\n\nYou will see something like this, depending upon the version\
    \ that is currently installed and accessible:\n\n![Installing Java SE 8 on the\
    \ Raspberry Pi](graphics/B03998_06_12.jpg)\n\nRaspbian Wheezy Java version on\
    \ Raspberry Pi\n\nThe important bit is the second line: if it doesn't say 1.8.n,\
    \ you'll need to install JDK8.\n\n## Installing Java SE 8\n\nWe have already installed\
    \ our JDK 8 before and all necessary steps are described in the *Installing Java\
    \ SE 8 JDK* section in [Chapter 1](#ch01.html \"Chapter 1. Getting Started with\
    \ JavaFX 8\"), *Getting Started with JavaFX 8*.\n\n## Adding JavaFX\n\nAs mentioned\
    \ previously, Oracle has withdrawn its support for JavaFX Embedded. If you have\
    \ installed JDK 8u45 or the prebundled version installed on Raspbian Wheezy, there\
    \ is no `jfxrt.jar` bundled, so we need to provide it in order to run JavaFX applications\
    \ on our Pi.\n\nOne-way to do this is to follow the tutorial at [https://wiki.openjdk.java.net/display/OpenJFX/Cross+Building+for+ARM+Hard+Float](https://wiki.openjdk.java.net/display/OpenJFX/Cross+Building+for+ARM+Hard+Float)),\
    \ cross-building OpenJFX for ARM. This is for really advanced developers.\n\n\
    An easier way is to download a prebuilt distribution such as `armv6hf-sdk.zip`\
    \ hosted on the JavaFXPorts project ([https://bitbucket.org/javafxports/arm/downloads](https://bitbucket.org/javafxports/arm/downloads)).\n\
    \nOnce you have downloaded `armv6hf-sdk.zip`, unzip it and add this command-line\
    \ option to attach the external source to the `classpath` with the extension mechanism:\n\
    \n```\n-Djava.ext.dirs=<path to armv6hf-sdk>/rt/lib/ext\n```\n\nAlternatively,\
    \ you can copy the contents of `rt/lib/ext` and `rt/lib/arm` from this zip into\
    \ your JVM folders, avoiding the use of the extension mechanism.\n\n## Configuring\
    \ NetBeans for the Raspberry Pi\n\nNetBeans 8 adds the capability to point to\
    \ a remote JDK and use it to debug and execute programs remotely that you write\
    \ locally on your development machine. It even deploys your applications automatically\
    \ and seamlessly. As documented by José Pereda in his article at [http://netbeans.dzone.com/articles/nb-8-raspberry-pi-end2end](http://netbeans.dzone.com/articles/nb-8-raspberry-pi-end2end),\
    \ you can enable this capability with the following steps:\n\n1.  Start NetBeans\
    \ on your machine.\n2.  Choose **Tools** from the menu bar and then select **Java\
    \ Platforms**. Click on the **Add Platform** button.\n3.  Select the **Remote\
    \ Java Standard Edition** radio button and click on **Next**.\n4.  Provide the\
    \ following entries (shown in the following screenshot as an example):\n\n   \
    \ **Platform Name**: `JavaFX on Raspberry Pi JDK 8`\n\n    **Host**: Enter the\
    \ static IP address or hostname of your Raspberry Pi you already assigned before\n\
    \n    **Username**: `pi`\n\n    **Password**: `raspberry`\n\n    **Remote JRE\
    \ Path**: `/usr/lib/jvm/jdk-8-oracle-arm-vfp-hflt/jre`\n\n    ![Configuring NetBeans\
    \ for the Raspberry Pi](graphics/B03998_06_13.jpg)\n\n    Setting up a remote\
    \ platform for Pi\n\n5.  Click on the **Finish** button and wait for NetBeans\
    \ to establish and configure the remote JDK connection.\n6.  Click on the **Close**\
    \ button once the remote JDK is in place.\n\nNow that we've completed the setup,\
    \ you should have a development environment that is among the best available to\
    \ develop JavaFX 8 applications for the Raspberry Pi. So let's get started!\n\n\
    # The switch application\n\nThe switch application is very simple in its nature,\
    \ but the idea is mainly divided into two main points: how to run JavaFX 8 applications\
    \ on Raspberry Pi and how to control the outside world from the Raspberry Pi **General-purpose\
    \ input/output** (**GPIO**). We will use a project called **Pi4j** for such purpose.\n\
    \nThe idea is simple; we are going to create a JavaFX application that will act\
    \ as a switch controller to control a LED associated to an electrical circuit\
    \ connected to your Raspberry Pi.\n\nThe following screenshots show the application\
    \ in the ON and OFF states:\n\n![The switch application](graphics/B03998_06_14.jpg)\n\
    \nSwitch Application ON state\n\n.\n\n![The switch application](graphics/B03998_06_15.jpg)\n\
    \nSwitch Application OFF state"
  trans: "\n### 树莓派自动登录\n\n和大多数人一样，你购买树莓派可能是为了搭建家庭或办公室的专属设备。接下来你需要设置树莓派，连接外设，并安装或开发必要的软件。\n\
    \n项目最终的目标是：通电后，设备能直接展现出你所期待的全部神奇功能。\n\n然而，当树莓派启动到登录提示符并等待你输入用户名和密码时，这种体验就大打折扣了。那么，让我们来实现树莓派的自动登录：\n\
    \n1.  在树莓派上，打开终端，使用以下命令编辑 `inittab` 文件：\n\n    ```\n    sudo nano /etc/inittab\n\
    \    ```\n\n2.  通过定位到 `inittab` 中的以下行来禁用 `getty` 程序：\n\n    ```\n    1:2345:respawn:/sbin/getty\
    \ 115200 tty1\n    ```\n\n3.  在该行开头添加一个 `#` 将其注释掉，如下所示：\n\n    ```\n    #1:2345:respawn:/sbin/getty\
    \ 115200 tty1\n    ```\n\n4.  在注释行的正下方，向 `inittab` 添加一个登录程序：\n\n    ```\n    1:2345:respawn:/bin/login\
    \ -f pi tty1 </dev/tty1 >/dev/tty1 2>&1\n    ```\n\n5.  这将使用 `pi` 用户运行登录程序，无需任何身份验证。\n\
    6.  按 *Ctrl* + *X* 保存并退出，然后按 *Y* 保存文件，最后按 *Enter* 确认文件名。\n\n重启树莓派，它将直接启动到 shell\
    \ 提示符 `pi@raspberrypi`，而不会提示你输入用户名或密码。\n\n### 使用客户端连接 VNC\n\n在继续之前，让我们确保一切工作正常。为此，你需要一个\
    \ VNC 客户端。如果你使用的是装有较新版本 Mac OS X 的 Macintosh 电脑，这很简单。\n\n前往 **Finder** | **前往**\
    \ | **连接服务器**。输入 `vnc://` 以及你分配给树莓派的 IP 地址。在我的例子中，IP 地址是 192.168.2.150，后面跟一个冒号和端口号\
    \ 5901，如下面的截图所示。完整的 URL 应为 **vnc://192.168.2.150:5901**。\n\n![使用客户端连接 VNC](img/B03998_06_11.jpg)\n\
    \n连接到树莓派 VNC 服务器。\n\n如图所示，`5901` 是树莓派 VNC 服务器监听的端口号。点击 **连接**。不用担心屏幕共享加密，再次点击\
    \ **连接**。然后输入你之前创建的密码（`raspberry`）。如果一切正常，你将看到一个巨大的树莓图标。恭喜你！\n\n如果你不是 Macintosh\
    \ 电脑用户，则需要下载一个 VNC 客户端。你可以从 [`realvnc.com/`](http://realvnc.com/) 获取免费查看器。这里有适用于\
    \ Windows、iOS、Android 和 Chrome 浏览器的客户端。是的，你可以通过手机控制树莓派。\n\n# JavaFX 8 开发前提条件\n\
    \n现在我们已经设置并配置好了用于开发的树莓派，我们需要在开发机器和树莓派上安装相同且正确匹配的 JDK 8 构建版本。这对于在运行 JavaFX 8 应用程序时避免库/版本问题非常重要，这也是我们接下来要做的事情。\n\
    \n## 在树莓派上安装 Java SE 8\n\n在撰写本文时，Raspbian Wheezy 系统预装了 JDK 8。要检查，只需在树莓派命令提示符下输入以下命令：\n\
    \n```\npi@raspberrypi ~ $ java –version\n```\n\n根据当前安装并可访问的版本，你将看到类似如下的信息：\n\n\
    ![在树莓派上安装 Java SE 8](img/B03998_06_12.jpg)\n\n树莓派上的 Raspbian Wheezy Java 版本\n\n\
    关键信息在第二行：如果它没有显示 1.8.n，你就需要安装 JDK 8。\n\n## 安装 Java SE 8\n\n我们之前已经安装过 JDK 8，所有必要的步骤都在第\
    \ 1 章 *JavaFX 8 入门* 的 *安装 Java SE 8 JDK* 部分中进行了描述。\n\n## 添加 JavaFX\n\n如前所述，Oracle\
    \ 已停止对 JavaFX Embedded 的支持。如果你安装了 JDK 8u45 或 Raspbian Wheezy 上预装的版本，则没有捆绑 `jfxrt.jar`，因此我们需要提供它才能在树莓派上运行\
    \ JavaFX 应用程序。\n\n一种方法是按照 [`wiki.openjdk.java.net/display/OpenJFX/Cross+Building+for+ARM+Hard+Float`](https://wiki.openjdk.java.net/display/OpenJFX/Cross+Building+for+ARM+Hard+Float)\
    \ 上的教程，为 ARM 交叉构建 OpenJFX。这适合真正的高级开发者。\n\n更简单的方法是下载一个预构建的发行版，例如托管在 JavaFXPorts\
    \ 项目上的 `armv6hf-sdk.zip`（[`bitbucket.org/javafxports/arm/downloads`](https://bitbucket.org/javafxports/arm/downloads)）。\n\
    \n下载 `armv6hf-sdk.zip` 后，解压缩它，并添加以下命令行选项，通过扩展机制将外部源附加到 `classpath`：\n\n```\n-Djava.ext.dirs=<path\
    \ to armv6hf-sdk>/rt/lib/ext\n```\n\n或者，你可以将此 zip 文件中 `rt/lib/ext` 和 `rt/lib/arm`\
    \ 的内容复制到你的 JVM 文件夹中，从而避免使用扩展机制。\n\n## 为树莓派配置 NetBeans\n\nNetBeans 8 增加了指向远程 JDK\
    \ 的能力，并用于远程调试和执行你在本地开发机器上编写的程序。它甚至能自动无缝地部署你的应用程序。正如 José Pereda 在他的文章 [`netbeans.dzone.com/articles/nb-8-raspberry-pi-end2end`](http://netbeans.dzone.com/articles/nb-8-raspberry-pi-end2end)\
    \ 中所记载的，你可以通过以下步骤启用此功能：\n\n1.  在你的机器上启动 NetBeans。\n2.  从菜单栏中选择 **工具**，然后选择 **Java\
    \ 平台**。点击 **添加平台** 按钮。\n3.  选择 **远程 Java 标准版** 单选按钮，然后点击 **下一步**。\n4.  提供以下条目（如下面的截图示例所示）：\n\
    \n    **平台名称**：`JavaFX on Raspberry Pi JDK 8`\n\n    **主机**：输入你之前分配给树莓派的静态 IP\
    \ 地址或主机名\n\n    **用户名**：`pi`\n\n    **密码**：`raspberry`\n\n    **远程 JRE 路径**：`/usr/lib/jvm/jdk-8-oracle-arm-vfp-hflt/jre`\n\
    \n    ![为树莓派配置 NetBeans](img/B03998_06_13.jpg)\n\n    为树莓派设置远程平台\n\n5.  点击 **完成**\
    \ 按钮，等待 NetBeans 建立并配置远程 JDK 连接。\n6.  远程 JDK 就位后，点击 **关闭** 按钮。\n\n现在我们已经完成了设置，你应该拥有一个为树莓派开发\
    \ JavaFX 8 应用程序的最佳开发环境之一。那么，让我们开始吧！\n\n# 开关应用程序\n\n开关应用程序本质上非常简单，但其理念主要分为两个要点：如何在树莓派上运行\
    \ JavaFX 8 应用程序，以及如何从树莓派的**通用输入/输出**（**GPIO**）控制外部世界。为此，我们将使用一个名为 **Pi4j** 的项目。\n\
    \n思路很简单；我们将创建一个 JavaFX 应用程序，它将作为一个开关控制器，用于控制一个连接到树莓派电路上的 LED。\n\n以下截图显示了应用程序在开启和关闭状态下的样子：\n\
    \n![开关应用程序](img/B03998_06_14.jpg)\n\n开关应用程序开启状态\n\n.\n\n![开关应用程序](img/B03998_06_15.jpg)\n\
    \n开关应用程序关闭状态\n"
- fmt: "# What is the Pi4J library?\n\nThe `Pi4J` library ([http://pi4j.com](http://pi4j.com))\
    \ is a project intended to provide a bridge between the native libraries and Java\
    \ for full access to the Raspberry Pi features and controls, so you can easily\
    \ access the GPIO pins for your Java project.\n\nVisit [http://pi4j.com/pins/model-2b-rev1.html](http://pi4j.com/pins/model-2b-rev1.html)\
    \ for Raspberry Pi 2 model B (J8 header) for GPIO pin numbering. Also, your kit's\
    \ GPIO adapter may come with a GPIO header quick reference.\n\nFor this example,\
    \ you will need some basic electronic components such as a LED, a resistor, and\
    \ a breadboard. If those are not included in your kit, you can acquire them from\
    \ online stores.\n\n## Circuit setup\n\nNow we need to set up our circuit by adding\
    \ a LED with a 220 Ohms pull-up resistor in a breadboard, and connect the anode\
    \ to GPIO pin #1 and cathode to the GPIO GND pin, as shown in the following figure\
    \ (CanaKit comes with a general assembly guide for the most commonly used electronic\
    \ parts):\n\n![Circuit setup](graphics/B03998_06_16.jpg)\n\nSwitcher application\
    \ circuit setup\n\n## The application\n\nAs previously mentioned, the application\
    \ UI contains two buttons. **Exit Me!** is responsible for shutting down the GPIO\
    \ controller and closing the application. The second button is a toggle button\
    \ (**ON**/**OFF**) that works as a switch. It has two states: when selected, its\
    \ state is true and it becomes false when not selected. Additionally, we change\
    \ its label programmatically to indicate the state of the current controlled LED.\n\
    \nIn addition, there is one circle shape that mimics the physical LED state. So,\
    \ when the toggle button is ON, then the circle will be filled with red. OFF turns\
    \ it to black, which is the default state.\n\nFinally, at the bottom of the application\
    \ scene, we add a `TitledPane` labeled Pi Information displaying some Raspberry\
    \ Pi information.\n\nBy looking at the `SwitchUIController.java` class, you will\
    \ find that we have very important fields to declare before interacting with the\
    \ `Pi4J` library:\n\n```java\nprivate GpioController gpio;\nprivate GpioPinDigitalOutput\
    \ pin;\n```\n\nThe first line is responsible for creating a new GPIO controller\
    \ instance, which is done in the `initialize()` method via `GpioFactory` as it\
    \ includes a `createInstance` method to create the GPIO controller:\n\n```java\n\
    gpio = GpioFactory.getInstance();\n```\n\n### Note\n\nYour project should only\
    \ instantiate a single GPIO controller instance and that instance should be shared\
    \ across your project.\n\nTo access a GPIO pin, you must first provision the pin.\
    \ Provisioning configures the pin based on how you intend to use it. Provisioning\
    \ can automatically export the pin, set its direction, and set up any edge detection\
    \ for interrupt-based events:\n\n```java\n// provision gpio pin #01 as an output\
    \ pin and turn on\npin = gpio.provisionDigitalOutputPin(GPIO_01);\n```\n\nThis\
    \ is how to provision an output pin #1. Your program will be able to control the\
    \ state only of those pins that are provisioned as output pins. Output pins are\
    \ used for controlling relays, LEDs, and transistors.\n\nNow all we want to do\
    \ is to control the LED from our application using the toggle button. This is\
    \ done via the `doOnOff()` event function that is registered to toggle the button,\
    \ as shown in the following code:\n\n```java\n @FXML\n    private void doOnOff(ActionEvent\
    \ event) {\n        if (switchTgl.isSelected()) {\n            pin.high();\n \
    \           led.setFill(RED);\n            switchTgl.setText(\"OFF\");\n     \
    \       System.out.println(\"Switch is On\");\n        } else {\n            pin.low();\n\
    \            led.setFill(BLACK);\n            switchTgl.setText(\"ON\");\n   \
    \         System.out.println(\"Switch is Off\");\n        }\n    }\n```\n\nThe\
    \ `Pi4J` library provides a number of convenience methods for controlling or writing\
    \ a state to a GPIO pin. In our application, we use `pin.high()` to turn the LED\
    \ on and `pin.low()` to turn the LED off.\n\nFinally, when the application exits,\
    \ we have to shut down the GPIO controller. The Pi4J project provides an implementation\
    \ to automatically set GPIO pin states as inactive when the application is terminated.\n\
    \nThis is useful to ensure that the GPIO pins states are not active or leaving\
    \ some activity engaged if the program is shutdown. We can simply do this with\
    \ the following line of code from the GPIO instance we have created previously:\n\
    \n```java\ngpio.shutdown();\n```\n\nWhen you press the toggle button to turn ON\
    \ the LED, you will see your green LED glows. When it is OFF, you will see that\
    \ the LED is faded.\n\n![The application](graphics/B03998_06_17.jpg)\n\nApplication\
    \ circuit—LED OFF\n\n![The application](graphics/B03998_06_18.jpg)\n\nApplication\
    \ circuit—LED ON\n\nNext, let's configure our project to run our JavaFX switch\
    \ application directly on the Raspberry Pi from NetBeans.\n\n# Using NetBeans\
    \ with the Pi\n\nAfter discussing our application logic and seeing how it works,\
    \ it's time for the best part: building your application and running it on the\
    \ Raspberry Pi using NetBeans. The steps are as follows:\n\n1.  Right-click on\
    \ the `Chapter6` project in NetBeans **Projects** tab and select **Properties**.\n\
    2.  From the **Project Properties** box, select **Run** from the **Categories**\
    \ menu to the left. You will see a dialog similar to the following screenshot:\
    \ ![Using NetBeans with the Pi](graphics/B03998_06_19.jpg)\n\n    Project Properties\
    \ dialog and the Run incarnation\n\n3.  Click on the **New** button to the right\
    \ of the selected **Configuration**. Set a name for the **New Configuration**\
    \ (`Pi Remote Config`) and click on the **OK** button, as shown in the following\
    \ screenshot: ![Using NetBeans with the Pi](graphics/B03998_06_20.jpg)\n\n   \
    \ New Configuration\n\n4.  Now you have to associate a remote JDK with your remote\
    \ configuration. To do so, click on the combo box labeled **Runtime Platform**\
    \ and select `JavaFX on Raspberry Pi JDK 8` that you configured earlier. Don't\
    \ forget to add the path for `jfxrt.jar` in **VM Options**: ![Using NetBeans with\
    \ the Pi](graphics/B03998_06_21.jpg)\n\n    Remote Pi JDK association\n\n5.  The\
    \ final step is to build and deploy the application to the Raspberry Pi. To do\
    \ so, go to the **Run** menu, select **Run Project,** and watch the NetBeans Output\
    \ window/tab. If you keep an eye on the Pi's screen when running the application,\
    \ you will see the following output messages:\n\n    ```\n    jfx-deployment-script:\n\
    \    jfx-deployment:\n    jar:\n    Connecting to 192.168.2.150:22\n    cmd :\
    \ mkdir -p '/home/pi/NetBeansProjects/Chapter6/dist'\n    Connecting to 192.168.2.150:22\n\
    \    done.\n    profile-rp-calibrate-passwd:\n    Connecting to 192.168.2.150:22\n\
    \    cmd : cd '/home/pi/NetBeansProjects/Chapter6';\n    '/usr/lib/jvm/jdk-8-oracle-arm-vfp-hflt/jre/bin/java'\
    \  -Dfile.encoding=UTF-8 -jar /home/pi/NetBeansProjects/Chapter6/dist/Chapter6.jar\n\
    \    ```"
  raw: "## What is the Pi4J library?\n\nThe Pi4j library ([http://pi4j.com](http://pi4j.com))\
    \ is a project intended to provide a bridge between the native libraries and Java\
    \ for full access to the Raspberry Pi features and controls, so you can easily\
    \ access the GPIO pins for your Java project.\n\nVisit [http://pi4j.com/pins/model-2b-rev1.html](http://pi4j.com/pins/model-2b-rev1.html)\
    \ for Raspberry Pi 2 model B (J8 header) for GPIO pin numbering. Also, your kit's\
    \ GPIO adapter may come with a GPIO header quick reference.\n\nFor this example,\
    \ you will need some basic electronic components such as a LED, a resistor, and\
    \ a breadboard. If those are not included in your kit, you can acquire them from\
    \ online stores.\n\n### Circuit setup\n\nNow we need to set up our circuit by\
    \ adding a LED with a 220 Ohms pull-up resistor in a breadboard, and connect the\
    \ anode to GPIO pin #1 and cathode to the GPIO GND pin, as shown in the following\
    \ figure (CanaKit comes with a general assembly guide for the most commonly used\
    \ electronic parts):\n\n![Circuit setup](graphics/B03998_06_16.jpg)\n\nSwitcher\
    \ application circuit setup\n\n## The application\n\nAs previously mentioned,\
    \ the application UI contains two buttons. **Exit Me!** is responsible for shutting\
    \ down the GPIO controller and closing the application. The second button is a\
    \ toggle button (**ON**/**OFF**) that works as a switch. It has two states: when\
    \ selected, its state is true and it becomes false when not selected. Additionally,\
    \ we change its label programmatically to indicate the state of the current controlled\
    \ LED.\n\nIn addition, there is one circle shape that mimics the physical LED\
    \ state. So, when the toggle button is ON, then the circle will be filled with\
    \ red. OFF turns it to black, which is the default state.\n\nFinally, at the bottom\
    \ of the application scene, we add a `TitledPane` labeled Pi Information displaying\
    \ some Raspberry Pi information.\n\nBy looking at the `SwitchUIController.java`\
    \ class, you will find that we have very important fields to declare before interacting\
    \ with the `Pi4J` library:\n\n```\nprivate GpioController gpio;\nprivate GpioPinDigitalOutput\
    \ pin;\n```\n\nThe first line is responsible for creating a new GPIO controller\
    \ instance, which is done in the `initialize()` method via `GpioFactory` as it\
    \ includes a `createInstance` method to create the GPIO controller:\n\n```\ngpio\
    \ = GpioFactory.getInstance();\n```\n\n### Note\n\nYour project should only instantiate\
    \ a single GPIO controller instance and that instance should be shared across\
    \ your project.\n\nTo access a GPIO pin, you must first provision the pin. Provisioning\
    \ configures the pin based on how you intend to use it. Provisioning can automatically\
    \ export the pin, set its direction, and set up any edge detection for interrupt-based\
    \ events:\n\n```\n// provision gpio pin #01 as an output pin and turn on\npin\
    \ = gpio.provisionDigitalOutputPin(GPIO_01);\n```\n\nThis is how to provision\
    \ an output pin #1\\. Your program will be able to control the state only of those\
    \ pins that are provisioned as output pins. Output pins are used for controlling\
    \ relays, LEDs, and transistors.\n\nNow all we want to do is to control the LED\
    \ from our application using the toggle button. This is done via the `doOnOff()`\
    \ event function that is registered to toggle the button, as shown in the following\
    \ code:\n\n```\n @FXML\n    private void doOnOff(ActionEvent event) {\n      \
    \  if (switchTgl.isSelected()) {\n            pin.high();\n            led.setFill(RED);\n\
    \            switchTgl.setText(\"OFF\");\n            System.out.println(\"Switch\
    \ is On\");\n        } else {\n            pin.low();\n            led.setFill(BLACK);\n\
    \            switchTgl.setText(\"ON\");\n            System.out.println(\"Switch\
    \ is Off\");\n        }\n    }\n```\n\nThe `P14J` library provides a number of\
    \ convenience methods for controlling or writing a state to a GPIO pin. In our\
    \ application, we use `pin.high()` to turn the LED on and `pin.low()` to turn\
    \ the LED off.\n\nFinally, when the application exits, we have to shut down the\
    \ GPIO controller. The Pi4J project provides an implementation to automatically\
    \ set GPIO pin states as inactive when the application is terminated.\n\nThis\
    \ is useful to ensure that the GPIO pins states are not active or leaving some\
    \ activity engaged if the program is shutdown. We can simply do this with the\
    \ following line of code from the GPIO instance we have created previously:\n\n\
    ```\ngpio.shutdown();\n```\n\nWhen you press the toggle button to turn ON the\
    \ LED, you will see your green LED glows. When it is OFF, you will see that the\
    \ LED is faded.\n\n![The application](graphics/B03998_06_17.jpg)\n\nApplication\
    \ circuit—LED OFF\n\n![The application](graphics/B03998_06_18.jpg)\n\nApplication\
    \ circuit—LED ON\n\nNext, let's configure our project to run our JavaFX switch\
    \ application directly on the Raspberry Pi from NetBeans.\n\n# Using NetBeans\
    \ with the Pi\n\nAfter discussing our application logic and seeing how it works,\
    \ it's time for the best part: building your application and running it on the\
    \ Raspberry Pi using NetBeans. The steps are as follows:\n\n1.  Right-click on\
    \ the `Chapter6` project in NetBeans **Projects** tab and select **Properties**.\n\
    2.  From the **Project Properties** box, select **Run** from the **Categories**\
    \ menu to the left. You will see a dialog similar to the following screenshot:\
    \ ![Using NetBeans with the Pi](graphics/B03998_06_19.jpg)\n\n    Project Properties\
    \ dialog and the Run incarnation\n\n3.  Click on the **New** button to the right\
    \ of the selected **Configuration**. Set a name for the **New Configuration**\
    \ (`Pi Remote Config`) and click on the **OK** button, as shown in the following\
    \ screenshot: ![Using NetBeans with the Pi](graphics/B03998_06_20.jpg)\n\n   \
    \ New Configuration\n\n4.  Now you have to associate a remote JDK with your remote\
    \ configuration. To do so, click on the combo box labeled **Runtime Platform**\
    \ and select `JavaFX on Raspberry Pi JDK 8` that you configured earlier. Don't\
    \ forget to add the path for `jfxrt.jar` in **VM Options**: ![Using NetBeans with\
    \ the Pi](graphics/B03998_06_21.jpg)\n\n    Remote Pi JDK association\n\n5.  The\
    \ final step is to build and deploy the application to the Raspberry Pi. To do\
    \ so, go to the **Run** menu, select **Run Project,** and watch the NetBeans Output\
    \ window/tab. If you keep an eye on the Pi's screen when running the application,\
    \ you will see the following output messages:\n\n    ```\n    jfx-deployment-script:\n\
    \    jfx-deployment:\n    jar:\n    Connecting to 192.168.2.150:22\n    cmd :\
    \ mkdir -p '/home/pi/NetBeansProjects/Chapter6/dist'\n    Connecting to 192.168.2.150:22\n\
    \    done.\n    profile-rp-calibrate-passwd:\n    Connecting to 192.168.2.150:22\n\
    \    cmd : cd '/home/pi/NetBeansProjects/Chapter6';\n    '/usr/lib/jvm/jdk-8-oracle-arm-vfp-hflt/jre/bin/java'\
    \  -Dfile.encoding=UTF-8 -jar /home/pi/NetBeansProjects/Chapter6/dist/Chapter6.jar\n\
    \    ```"
  trans: "\n## 什么是 Pi4J 库？\n\nPi4J 库（[`pi4j.com`](http://pi4j.com)）是一个旨在为原生库与 Java\
    \ 之间搭建桥梁的项目，以便全面访问树莓派的功能和控制接口，从而让你能够轻松地在 Java 项目中访问 GPIO 引脚。\n\n请访问 [`pi4j.com/pins/model-2b-rev1.html`](http://pi4j.com/pins/model-2b-rev1.html)\
    \ 查看树莓派 2 代 B 型（J8 排针）的 GPIO 引脚编号。此外，你的套件中的 GPIO 适配器可能附带一份 GPIO 排针快速参考指南。\n\n\
    对于本示例，你需要一些基本的电子元件，例如一个 LED、一个电阻和一个面包板。如果你的套件中没有包含这些元件，可以从网上商店购买。\n\n### 电路搭建\n\
    \n现在我们需要搭建电路：在面包板上放置一个 LED 并串联一个 220 欧姆的上拉电阻，然后将 LED 的阳极连接到 GPIO 引脚 #1，阴极连接到 GPIO\
    \ 的 GND 引脚，如下图所示（CanaKit 套件附带了一份常用电子元件的通用组装指南）：\n\n![电路搭建](img/B03998_06_16.jpg)\n\
    \n开关应用电路搭建\n\n## 应用程序\n\n如前所述，应用程序界面包含两个按钮。**退出我！** 按钮负责关闭 GPIO 控制器并退出应用程序。第二个按钮是一个开关按钮（**开**/**关**），用作开关。它有两种状态：选中时状态为\
    \ true，未选中时为 false。此外，我们通过编程方式更改其标签，以指示当前受控 LED 的状态。\n\n此外，还有一个圆形图形用于模拟物理 LED\
    \ 的状态。因此，当开关按钮处于“开”状态时，圆形将填充为红色。“关”状态则将其变为黑色，这是默认状态。\n\n最后，在应用程序场景的底部，我们添加了一个标签为“Pi\
    \ 信息”的 `TitledPane`，用于显示一些树莓派信息。\n\n查看 `SwitchUIController.java` 类，你会发现在与 `Pi4J`\
    \ 库交互之前，我们需要声明一些非常重要的字段：\n\n```\nprivate GpioController gpio;\nprivate GpioPinDigitalOutput\
    \ pin;\n```\n\n第一行代码负责创建一个新的 GPIO 控制器实例，这是在 `initialize()` 方法中通过 `GpioFactory`\
    \ 完成的，因为它包含一个用于创建 GPIO 控制器的 `createInstance` 方法：\n\n```\ngpio = GpioFactory.getInstance();\n\
    ```\n\n### 注意\n\n你的项目应仅实例化一个 GPIO 控制器实例，并且该实例应在整个项目中共享。\n\n要访问 GPIO 引脚，你必须首先配置（provision）该引脚。配置过程会根据你的使用意图来设置引脚。配置可以自动导出引脚、设置其方向，并为基于中断的事件建立任何边缘检测：\n\
    \n```\n// 将 GPIO 引脚 #01 配置为输出引脚并开启\npin = gpio.provisionDigitalOutputPin(GPIO_01);\n\
    ```\n\n这就是配置输出引脚 #1 的方法。你的程序将只能控制那些被配置为输出引脚的引脚状态。输出引脚用于控制继电器、LED 和晶体管。\n\n现在，我们想要做的就是从应用程序中通过开关按钮来控制\
    \ LED。这是通过注册到开关按钮的 `doOnOff()` 事件函数实现的，如下代码所示：\n\n```\n @FXML\n    private void\
    \ doOnOff(ActionEvent event) {\n        if (switchTgl.isSelected()) {\n      \
    \      pin.high();\n            led.setFill(RED);\n            switchTgl.setText(\"\
    OFF\");\n            System.out.println(\"Switch is On\");\n        } else {\n\
    \            pin.low();\n            led.setFill(BLACK);\n            switchTgl.setText(\"\
    ON\");\n            System.out.println(\"Switch is Off\");\n        }\n    }\n\
    ```\n\n`Pi4J` 库提供了许多便捷方法来控制 GPIO 引脚或向其写入状态。在我们的应用程序中，我们使用 `pin.high()` 来点亮 LED，使用\
    \ `pin.low()` 来熄灭 LED。\n\n最后，当应用程序退出时，我们必须关闭 GPIO 控制器。Pi4J 项目提供了一种实现，可以在应用程序终止时自动将\
    \ GPIO 引脚状态设置为非活动状态。\n\n这对于确保程序关闭时 GPIO 引脚状态不会保持活动或留下某些活动状态非常有用。我们可以通过之前创建的 GPIO\
    \ 实例，使用下面这行代码轻松实现这一点：\n\n```\ngpio.shutdown();\n```\n\n当你按下开关按钮打开 LED 时，你会看到绿色的\
    \ LED 亮起。当它关闭时，你会看到 LED 熄灭。\n\n![应用程序](img/B03998_06_17.jpg)\n\n应用电路——LED 关闭\n\
    \n![应用程序](img/B03998_06_18.jpg)\n\n应用电路——LED 开启\n\n接下来，让我们配置项目，以便从 NetBeans 直接在树莓派上运行我们的\
    \ JavaFX 开关应用程序。\n\n# 在树莓派上使用 NetBeans\n\n在讨论了应用程序逻辑并了解了其工作原理之后，接下来是最精彩的部分：构建你的应用程序并使用\
    \ NetBeans 在树莓派上运行它。步骤如下：\n\n1.  在 NetBeans 的 **项目** 选项卡中，右键点击 `Chapter6` 项目，然后选择\
    \ **属性**。\n2.  在 **项目属性** 对话框中，从左侧的 **类别** 菜单中选择 **运行**。你将看到一个类似于以下截图的对话框：![在树莓派上使用\
    \ NetBeans](img/B03998_06_19.jpg)\n\n    项目属性对话框与运行配置\n\n3.  点击所选 **配置** 右侧的 **新建**\
    \ 按钮。为 **新建配置** 设置一个名称（`Pi 远程配置`），然后点击 **确定** 按钮，如下图所示：![在树莓派上使用 NetBeans](img/B03998_06_20.jpg)\n\
    \n    新建配置\n\n4.  现在，你需要将一个远程 JDK 与你的远程配置关联起来。为此，点击标记为 **运行时平台** 的下拉框，然后选择你之前配置的\
    \ `JavaFX on Raspberry Pi JDK 8`。别忘了在 **VM 选项** 中添加 `jfxrt.jar` 的路径：![在树莓派上使用\
    \ NetBeans](img/B03998_06_21.jpg)\n\n    远程 Pi JDK 关联\n\n5.  最后一步是构建应用程序并将其部署到树莓派上。为此，请转到\
    \ **运行** 菜单，选择 **运行项目**，然后观察 NetBeans 的输出窗口/选项卡。如果在运行应用程序时留意树莓派的屏幕，你将看到以下输出信息：\n\
    \n    ```\n    jfx-deployment-script:\n    jfx-deployment:\n    jar:\n    Connecting\
    \ to 192.168.2.150:22\n    cmd : mkdir -p '/home/pi/NetBeansProjects/Chapter6/dist'\n\
    \    Connecting to 192.168.2.150:22\n    done.\n    profile-rp-calibrate-passwd:\n\
    \    Connecting to 192.168.2.150:22\n    cmd : cd '/home/pi/NetBeansProjects/Chapter6';\n\
    \    '/usr/lib/jvm/jdk-8-oracle-arm-vfp-hflt/jre/bin/java'  -Dfile.encoding=UTF-8\
    \ -jar /home/pi/NetBeansProjects/Chapter6/dist/Chapter6.jar\n    ```\n"
- fmt: '# Summary


    In this chapter, we took a credit card-sized microcomputer no larger than a deck
    of playing cards and transformed it into a JavaFX Switch controller machine. Along
    the way, you learned about the Raspberry Pi, how to create a bootable SD card,
    how to install an operating system to it, how to configure it for best performance
    and remote connectivity, how to give it a fixed network (`IP`) address, and how
    to connect to the Pi from your development machine.


    We also revisited how to install `JDK 8`/`JavaFX 8` to both the Raspberry Pi and
    your development machine, and you learned how to install and configure `NetBeans`
    on your development machine so that it can use the `JDK` on the Pi as a remote
    platform for debugging and execution.


    With both your development machine and the Raspberry Pi ready for action, we discussed
    the principles needed to develop a simple but great application to control the
    outside world from the Raspberry Pi using JavaFX and a few select tools/APIs,
    including `Pi4j`, to control `GPIO`.


    Finally, you saw how to remotely deploy your application from `NetBeans` to your
    Raspberry Pi, all with just a few clicks.


    In the next chapter, we are going to monitor a temperature sensor, measuring how
    hot your blood is from an Arduino board.


    # Chapter 7. Monitoring and Controlling Arduino with JavaFX


    **Arduino** is an open source electronics tool based on a simple programmable
    microcontroller board that can be programmed using a free open source IDE. Alone
    or attached to a computer, it creates interactive devices that can sense by taking
    inputs from a variety of switches or sensors and can act by controlling a variety
    of lights, motors, and other outputs physical devices.


    As one of the first **Internet of Things** (**IoT**) devices, it was created in
    2005. It has been here from the very beginning of the IoT concept.


    Arduino runs standalone or can communicate with software running on your computer
    (Java, JavaFX, Python, and so on) and the boards can be assembled by hand or purchased
    preassembled.


    It is a fact that Arduino simplifies the process of working with microcontrollers.
    Also, it more lucrative than other systems for teachers, students, and interested
    amateurs, as it is *inexpensive*—an Arduino board cost less than $50.


    A simple, clear, and easy-to-use programming environment; an open source and extensible
    software; and open source and extensible hardware these features, among others,
    make Arduino support the do-it-yourself and do-it-with-others concepts that define
    the maker movement.


    This chapter will show you how to develop a desktop application using JavaFX along
    with an Arduino board in order to monitor data coming from a real world temperature
    sensor and report it on a chart, *How HOT blooded you really are!*


    In this chapter, you will:


    - Get familiar with Arduino boards and their components

    - Install and prepare the Arduino software and environment, IDE, and drivers

    - Develop an Arduino blood meter sketch to control and monitor the circuit

    - Read Arduino data into a JavaFX application using serial communication

    - Present data using the JavaFX Charting API


    # What is an Arduino board?


    The Arduino Uno, the most well-known Arduino board, is a microcontroller board
    based on the **ATmega328** datasheet ([http://www.atmel.com/dyn/resources/prod_documents/doc8161.pdf](http://www.atmel.com/dyn/resources/prod_documents/doc8161.pdf)),
    which is the brains of the board. It is about 3 x 2 inches in size. It has 14
    digital input/output pins, 6 analog input pins, and 32 kilobytes of flash memory.


    Each board contains a reset button. In addition, it includes a USB port so that,
    when it is connected to a computer, it becomes a source of power as well as a
    communication tool. If you are not connected to a computer, you can use an alternate
    power source such as an AC 9-to-12 V DC adapters that can be connected by plugging
    a 2.1 mm center-positive plug into the board''s power jack, or a 9 V battery pack.


    The six digital pins with tilde symbol next to the number are the pins that allow
    for **Pulse Width Modulation** (**PWM**), which is a technique for controlling
    power and simulating an analog signal on a digital input pin. One reason for using
    these pins might be to control the brightness of LED''s.


    The official specs for the Arduino Uno can be found on the [http://arduino.cc](http://arduino.cc)
    website at [http://arduino.cc/en/Main/ArduinoBoardUno](http://arduino.cc/en/Main/ArduinoBoardUno).
    Visit [http://www.arduino.cc/en/Main/Products](http://www.arduino.cc/en/Main/Products)
    to find information about other Arduino boards, such as **Mega**, **Due**, or
    **Yun**, as well as the next releases **Tre** and **Zero**.


    The following images show the Arduino Uno R3 board:


    ![What is an Arduino board?](graphics/B03998_07_01.jpg)

    ![What is an Arduino board?](graphics/B03998_07_02.jpg)


    ## What can you do with it?


    Your Arduino board might be small, but don''t let its size deceive you. It is
    powerful and has a lot of room for growth. It is especially powerful because it
    is built on an open hardware and open software platform. We won''t be spending
    time talking about open source; in a nutshell, it means that the information about
    the hardware and software is freely available and easy to find.


    Arduino can be used to sense the environment by receiving input. It can also control
    output such as lights, motors, sensors, and more.


    You can program the microcontroller on the board using the open source Arduino
    programming language.


    ### Related websites and documentation


    One of the great advantages of an open source and open hardware platform is that
    you can find information on the Internet.


    A great place to start looking for information about Arduino is the official page:
    [http://arduino.cc](http://arduino.cc) website at [http://arduino.cc/en/Guide/HomePage](http://arduino.cc/en/Guide/HomePage).
    As your skills grow, you will want to work on more advanced topics and you''ll
    find it helpful to know where to find answers.


    Another great site is [http://adafruit.com](http://adafruit.com). This site has
    tutorials, examples, helpful forums, and a store to buy the parts you need.


    Another interesting and fun application for kids is to combine **Lego Mindstorm**
    sensors and motors to the Arduino. I recommend the site [http://wayneandlayne.com](http://wayneandlayne.com),
    as it has been the inspiration and starting point for my integration of Lego and
    Arduino. If you are looking for parts and projects, this is a great site to visit.


    ## Setting up your Arduino


    If this is your first exposure to Arduino, I strongly suggest that you start with
    a kit rather than assembling all the individual components.


    Most of the activities in this chapter can be completed with a kit called the
    Arduino Starter Kit from `arduino.cc`, as shown in the following image. It includes
    an Arduino Uno R3 and other components to accomplish most of the prebundled projects.
    For a full description of the kit, visit [http://store.arduino.cc/product/K000007](http://store.arduino.cc/product/K000007).


    ![Setting up your Arduino](graphics/B03998_07_03.jpg)


    Arduino Starter kit (Kit including components, Board, and projects book)'
