- fmt: "# Getting the device\n\nAs we have been inspired by this amazing technology,\
    \ we need to engage and start developing something with the device. So, we need\
    \ to get one first.\n\nThe device is available from many vendors such as Amazon,\
    \ Best buy, and others. However, you can also buy it from the Leap Motion store\
    \ ([http://store-world.leapmotion.com](http://store-world.leapmotion.com)).\n\n\
    I bought my device at the end of 2014, and it is possible that you can find special\
    \ discounts in some of the stores now.\n\n## Package contents\n\nWhen you buy\
    \ the Leap Motion package, it should contain at least the items shown in the following\
    \ image:\n\n![Package contents](graphics/B03998_08_7.jpg)\n\nLeap Motion package\
    \ contents\n\nAt the time of writing, the package includes:\n\n- Leap Motion controller\n\
    - Two custom-length USB 2.0 cables\n- Welcome card\n- Important information guide\n\
    \n# Getting started with the Leap SDK\n\nNow that we have the hardware, we need\
    \ to install the software and start development. This is a very easy task; just\
    \ point your mouse to the address bar of your favorite browser, type the URL [https://developer.leapmotion.com/downloads](https://developer.leapmotion.com/downloads),\
    \ and click on the *Enter* key.\n\nAt the time of writing, the latest version\
    \ is SDK 2.2.6.29154. Click on your operating system icon to start downloading\
    \ the supported version. Alternatively, just click on the green button with the\
    \ label **Download SDK 2.2.6.29154 for OSX** (for Mac OS X). This will detect\
    \ your PC/laptop OS and allow you to download the suitable SDK for your OS.\n\n\
    ## Installing the controller driver and software\n\nThe installation process and\
    \ getting your device ready for interaction require a few simple steps. After\
    \ downloading the `zip` content, extract it, install the software installer, and\
    \ everything should be in place:\n\n1. Download, extract, and run the software\
    \ installer.\n2. After installation, connect your Leap Motion controller and open\
    \ the Visualizer, as shown in the following screenshot: ![Installing the controller\
    \ driver and software](graphics/B03998_08_8.jpg)\n\n   Running the Visualizer\n\
    \n3. The SDK consists of a `LeapJava.jar` libraries and a bunch of native libraries\
    \ for controller integration. One easy way to integrate `LeapJava.jar` on your\
    \ system is by adding the JAR to `<JAVA_HOME>/jre/lib/ext` on Linux or Windows\
    \ (or `/Library/Java/Extensions on the Mac`).\n4. Copy the native libraries (`LeapJava.dll`,\
    \ `Leap.dll`, and `Leapd.dll` for Windows; `libLeapJava.dylib` and `libLeap.dylib`\
    \ for the Mac; and `libLeapJava.so` and `libLeap.so` for Linux) to the `<JAVA_HOME>/jre/bin`\
    \ folder.\n5. Alternatively, you can just add the JAR to every project as a dependency\
    \ and load the native libraries as a VM argument `-Djava.library.path=<native\
    \ library path>`.\n\n### Note\n\nThe SDK also includes many examples based on\
    \ supported languages, including the `HelloWorld.java` example, which is a very\
    \ good base from which to start understanding how to integrate your controller\
    \ with your Java application.\n\n## Verifying whether it works\n\nIf everything\
    \ is okay, a small Leap Motion icon should appear on the taskbar notification\
    \ area (Windows) or menu bar (Mac), and it should be green as shown in the previous\
    \ screenshot. The LED indicator on the device should be lit with a green light\
    \ and *facing you for the correct orientation of the device*.\n\nIf you are able\
    \ to interact and see the visualization of your fingers and hands when the visualizer\
    \ opens, as shown in the following screenshot, then it is time to start development.\n\
    \n![Verifying whether it works](graphics/B03998_08_9.jpg)\n\nThe Leap Motion Diagnostic\
    \ Visualizer application\n\n# Supported languages\n\nBefore we deep dive into\
    \ our application, I would like to just mention that the Leap Motion SDK supports\
    \ many languages, including Java and others such as JavaScript for Web, C#, C++,\
    \ Python, Unity, Objective-C, and the Unreal gaming engine.\n\n# The Leap JavaFX\
    \ application\n\nLike you, I can't wait to start the development process, and\
    \ now you will learn how to interact touchlessly with a JavaFX 8 3D-based application\
    \ connected to a Leap motion device.\n\nGiven that the 3D API has not so far been\
    \ covered in this book, this is good opportunity to briefly describe the 3D API\
    \ and bring Leap Motion v2 skeletal modeling (hand in 3D) with some 3D interaction\
    \ into our JavaFX application.\n\nThe Leap Motion API v2.0 introduces a new skeletal\
    \ tracking model that provides additional information about hands and fingers,\
    \ predicts the positions of fingers and hands that are not clearly in view, and\
    \ also improves overall tracking data. For more information on the API, visit\
    \ [https://developer.leapmotion.com/documentation/java/devguide/Intro_Skeleton_API.html?proglang=java](https://developer.leapmotion.com/documentation/java/devguide/Intro_Skeleton_API.html?proglang=java).\n\
    \nWe are going to build and show how the new skeletal model from Leap Motion v2\
    \ can be easily integrated into a JavaFX 3D scene. We will use the predefined\
    \ 3D shapes API provided by JavaFX to quickly create 3D objects out of the box.\
    \ These shapes include boxes, cylinders, and spheres that we will use in our application.\n\
    \n## The JavaFX 3D API at a glance\n\n3D means *three-dimensional* or something\
    \ that has *width*, *height*, and *depth* (or *length*). Our physical environment\
    \ is three-dimensional and we move around in 3D every day.\n\nThe JavaFX 3D Graphics\
    \ library includes Shape3D API, and there are two types of 3D shapes in JavaFX:\n\
    \n- **Predefined shapes**: These are provided to make it easier for you to quickly\
    \ create 3D objects out-of-the-box. These shapes include boxes, cylinders, and\
    \ spheres.\n- **User-defined shapes**: The JavaFX Mesh class hierarchy contains\
    \ the `TriangleMesh` subclass. The Triangle mesh is the most typical kind of mesh\
    \ used in 3D layouts.\n\nIn our application, we are going to use the predefined\
    \ shapes. For more information about the JavaFX 3D API and examples, please visit\
    \ [http://docs.oracle.com/javase/8/javafx/graphics-tutorial/javafx-3d-graphics.htm](http://docs.oracle.com/javase/8/javafx/graphics-tutorial/javafx-3d-graphics.htm).\n\
    \n## More learning resources\n\nOne of the rich resources that will help you in\
    \ the development and integration process between the Leap Motion controller and\
    \ your normal Java application is the `HelloWorld.java` example bundled with the\
    \ SDK.\n\nAnother resource that discusses integration with Java is the *Getting\
    \ Started with Java Development* section from Leap motion documentation, and it\
    \ is available at [https://developer.leapmotion.com/documentation/java/devguide/Leap_Guides.html](https://developer.leapmotion.com/documentation/java/devguide/Leap_Guides.html).\n\
    \n## The basic application structure\n\nAfter taking a look inside the `HelloWorld.java`\
    \ example and the documentation example, you will notice the following points:\n\
    \n- We need a `Controller` object, allowing the connection between the Leap device\
    \ and the application.\n- We need a `Listener` subclass to handle events from\
    \ the controller.\n- Gesture tracking is enabled in the `onConnect()` method.\n\
    - The main method in this class is `onFrame()`, a `callback` method dispatched\
    \ when a new `Frame` object with motion tracking data is available. This object\
    \ contains list of hands, fingers, or tools and several vectors with their position,\
    \ orientation, and velocity of movement.\n- If gestures are enabled, we'll also\
    \ get a list of the gestures found, based on the analysis of the last frames.\
    \ In addition, you will know the status of the gesture whether it has just begun,\
    \ is in progress, or has ended."
