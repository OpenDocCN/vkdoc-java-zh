  trans: "\n### JavaFX 8 3D 应用程序\n\n我们在此讨论的应用程序是一个复杂的 JavaFX 8 3D 应用程序，它将帮助你理解基于 Leap\
    \ 的应用程序开发结构，与设备交互以识别*手部位置*，并通过*手势*交互在 3D 环境中为我们的手部建模。\n\n你可以在后面的示例部分找到更多资源，包括使用\
    \ JavaFX 开发基于 Leap 的应用程序的更高级概念。\n\n在此应用程序中，我们将以圆柱体和球体的形式检测骨骼、手臂和关节（位置和方向），以便在我们的\
    \ JavaFX 应用程序 `SubScene` 中为手部进行 3D 建模。然后，我们将检测它们的位置，以模拟我们在 Leap Motion 设备上方的真实手部运动。\n\
    \n我们还将添加原始 `image`，以便你可以在应用程序背景中看到模型和你的真实手部。\n\n该应用程序由三个类组成：\n\n*   `LeapListener.java`：这个类是一个监听器，它与\
    \ Leap Motion 控制器线程交互，将所有分析后的数据（手臂、骨骼、手指和关节）传输到 JavaFX 应用程序。\n*   `LeapJavaFX.java`：这个类是一个\
    \ JavaFX 应用程序线程，它将与 `LeapListener.java` 交互，以便创建 3D 形状（在每一帧上），而无需跟踪之前的形状。这得益于 Observable\
    \ JavaFX bean 属性的强大功能，它允许从 Leap 线程传输的数据在 JavaFX 线程中渲染。\n*   `Pair.java`：这是一个便捷的小型配对类，用于存储每个关节中连接的两块骨骼。\n\
    \n那么，让我们开始看看如何实现这一点。\n\n### 提示\n\n你必须通过在 **常规** 选项卡下勾选 **允许图像** 选项来在 Leap Motion\
    \ 控制面板上启用图像，并确保在 **追踪** 选项卡下禁用 **稳健模式** 选项以获得更高质量的图像。\n\n### 工作原理\n\n首先，我们将解释我们应用程序的主要桥梁，即\
    \ Leap 事件监听器 `LeapListener.java`。\n\n开发 JavaFX 应用程序时的主要关注点是如何将 JavaFX 线程与其他非 JavaFX\
    \ 线程混合，在我们的案例中，这个非 JavaFX 线程是以非常高的速率处理事件的 Leap Motion 事件 `Listener` 子类。\n\n为了将这些事件引入\
    \ JavaFX 线程，我们将在 `LeapListener.java` 类中使用 `BooleanProperty` 对象。由于我们只监听 `doneList`\
    \ 对象的变化，我们不需要列表本身也是可观察的，因为它们会在任何变化（添加一块骨骼）时触发事件。\n\n这就是为什么它们是普通列表，并且我们只使用一个布尔可观察属性，在创建每个\
    \ Leap `Frame` 对象中的所有列表后将其设置为 true：\n\n```\nprivate final BooleanProperty doneList=\
    \ new\nSimpleBooleanProperty(false);\nprivate final List<Bone> bones=new ArrayList<>();\n\
    private final List<Arm> arms=new ArrayList<>();\nprivate final List<Pair> joints=new\
    \ ArrayList<>();\nprivate final List<WritableImage> raw =new ArrayList<>();\n\
    ```\n\n为了获取原始图像，我们必须在 `onInit()` 中设置此策略，并且出于隐私原因，用户还必须在 Leap Motion 控制面板中为任何应用程序启用该功能，才能获取原始相机图像。\n\
    \n```\n@Override\npublic void onInit(Controller controller){\n controller.setPolicy(Controller.PolicyFlag.POLICY_IMAGES);\n\
    }\n```\n\n（*如你所知，如果你想处理手势，就在这里启用此功能，所以你可以暂时将它们注释掉。*）\n\n让我们继续创建 Frame 方法：\n\n\
    ```\n@Override\npublic void onFrame(Controller controller) {\n  Frame frame =\
    \ controller.frame();\n  doneList.set(false);\n  doneList.set(!bones.isEmpty()\
    \ || !arms.isEmpty());\n}\npublic BooleanProperty doneListProperty() {\n  return\
    \ doneList;\n}\n```\n\n对于每一帧，重置 `doneList`，处理数据，最后如果存在骨骼或手臂（如果手没有放在 Leap 上方，帧仍会被处理），则将其设置为\
    \ `true`。公开该属性以便在 JavaFX 应用程序中监听。\n\n现在处理帧对象数据。首先，处理图像（这也可以在最后完成）。在每一帧清除列表，然后检索图像（来自左、右相机）。如果你想了解其工作原理，Leap\
    \ 文档非常有帮助。请访问 [`developer.leapmotion.com/documentation/java/devguide/Leap_Images.html`](https://developer.leapmotion.com/documentation/java/devguide/Leap_Images.html)。\n\
    \n实际上，这段代码是第一个示例的一部分，添加了 `PixelWriter` 来生成 JavaFX 图像。由于 Leap 提供的是亮像素，我对其进行了取反\
    \ *(1- (r|g|b))* 以获得负片图像，使手部更清晰可见。同时，我还将图像从左到右翻转，如下所示：\n\n```\n(newPixels[i*width+(width-j-1)]).raw.clear();\n\
    ImageList images = frame.images();\nfor(Image image : images){\n  int width =\
    \ (int)image.width();\n  int height = (int)image.height();\n  int[] newPixels\
    \ = new int[width * height];\n  WritablePixelFormat<IntBuffer> pixelFormat = PixelFormat.getIntArgbPreInstance();\n\
    \  WritableImage wi=new WritableImage(width, height);\n  PixelWriter pw = wi.getPixelWriter();\n\
    \  //从 Image 对象获取包含图像数据的字节数组\n  byte[] imageData = image.data();\n\n//将图像数据复制到显示对象中\n\
    \  for(int i = 0; i < height; i++){\n  for(int j = 0; j < width; j++){\n    //转换为无符号数并移位到正确位置\n\
    \    int r = (imageData[i*width+j] & 0xFF) << 16;\n    int g = (imageData[i*width+j]\
    \ & 0xFF) << 8;\n    int b = imageData[i*width+j] & 0xFF;\n    // 反转图像\n    newPixels[i*width+(width-j-1)]\
    \ = 1- (r | g | b);\n  }\n  }\n  pw.setPixels(0, 0, width, height, pixelFormat,\
    \ newPixels, 0,width);\n  raw.add(wi);\n}\n```\n\n然后清除骨骼、手臂和关节列表，如下代码所示：\n\n```\n\
    bones.clear();\narms.clear();\njoints.clear();\nif (!frame.hands().isEmpty())\
    \ {\nScreen screen = controller.locatedScreens().get(0);\nif (screen != null &&\
    \ screen.isValid()){\n```\n"
- fmt: "获取骨骼列表；对于找到的每根手指，遍历该手指的骨骼类型（最多5种），以避免无名指和中指的掌骨。代码如下：\n\n```\nfor(Finger finger\
    \ : frame.fingers()){\n  if(finger.isValid()){\n  for(Bone.Type b : Bone.Type.values())\
    \ {\n    if((!finger.type().equals(Finger.Type.TYPE_RING) &&!finger.type().equals(Finger.Type.TYPE_MIDDLE))\
    \ ||!b.equals(Bone.Type.TYPE_METACARPAL)){\n          bones.add(finger.bone(b));\n\
    \      }\n    }\n  }\n}\n```\n\n现在我们将遍历手部列表以获取每只手的手臂，并将其添加到手臂列表中，如下所示：\n\n```\n\
    for(Hand h: frame.hands()){\n  if(h.isValid()){\n  // arm\n  arms.add(h.arm());\n\
    ```\n\n现在获取手指关节。详细解释如何获取每个关节有点复杂。基本上，我找到每只手的手指，识别除拇指外的四根手指。代码如下：\n\n```\nFingerList\
    \ fingers = h.fingers();\nFinger index=null, middle=null, ring=null, pinky=null;\n\
    for(Finger f: fingers){\n  if(f.isFinger() && f.isValid()){\n    switch(f.type()){\n\
    \    case TYPE_INDEX: index=f; break;\n    case TYPE_MIDDLE: middle=f; break;\n\
    \    case TYPE_RING: ring=f; break;\n    case TYPE_PINKY: pinky=f; break;\n  \
    \  }\n  }\n}\n```\n\n一旦识别出手指，我就定义每对手指之间的关节（前三个关节）以及手腕的关节（最后一个）。代码如下：\n\n```\n\
    // joints\nif(index!=null && middle!=null){\n  Pair p=new Pair(index.bone(Bone.Type.TYPE_METACARPAL).nextJoint(),middle.bone(Bone.Type.TYPE_METACARPAL).nextJoint());\n\
    \  joints.add(p);\n  }\n  if(middle!=null && ring!=null){\n    Pair p=new Pair(middle.bone(Bone.Type.TYPE_METACARPAL).nextJoint(),\n\
    \    ring.bone(Bone.Type.TYPE_METACARPAL).nextJoint());\n    joints.add(p);\n\
    \  }\n  if(ring!=null && pinky!=null){\n    Pair p=new Pair(ring.bone(Bone.Type.TYPE_METACARPAL).nextJoint(),\n\
    \    pinky.bone(Bone.Type.TYPE_METACARPAL).nextJoint());\n    joints.add(p);\n\
