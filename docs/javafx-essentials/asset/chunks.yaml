    \ the driver file named `arduino.inf`, which is located in the `Drivers` folder\
    \ of the Arduino software download (not the `FTDI USB Drivers` sub-directory).\n\
    8.  Windows will finish the driver installation from there.\n\n    ### Tip\n\n\
    \    If you have Windows 8 and the driver is not well installed, try to disable\
    \ the driver signature enforcement.\n\n##### Mac OS X and Linux setup\n\nFor both\
    \ the Mac OS X and Linux operating systems, no drivers have to be installed.\n\
    \nFor Mac OS X, when you connect the Arduino board, you should see it listed under\
    \ `/dev/tty.usbmodemXXXX or /dev/tty.usbserialXXXX`.\n\nOn Linux, when you connect\
    \ the Arduino board, you should see it listed under `/dev/ttyACMX or /dev/ttyUSBX`.\n\
    \n#### Exploring the IDE and sketches\n\nAssuming your installation ends successfully,\
    \ double-click on the Arduino application and you should see the following screen:\n\
    \n![Exploring the IDE and sketches](graphics/B03998_07_06.jpg)\n\nThe Arduino\
    \ IDE, first run with an empty sketch\n\nThere are two important things you need\
    \ to do now to properly connect and upload your sketches to the Arduino board.\
    \ First, select your board by navigating to **Tools** | **Board**. Then select\
    \ the serial port of the Arduino board by going to **Tools** | **Serial Port**.\n\
    \nThe final verification step is to run a `Hello world` for Arduino, and you can\
    \ do so by opening the LED blink example sketch at **File** | **Examples** | **1.Basics**\
    \ | **Blink**.\n\nNow, simply click on the **Upload** button in the environment.\
    \ If the upload is successful, the message **Done uploading** will appear in the\
    \ status bar.\n\nWait for a few seconds and you will see the **RX** and **TX**\
    \ LEDs on the board flashing.\n\nIf you have any problems, check out the troubleshooting\
    \ suggestions at [http://arduino.cc/en/Guide/Troubleshooting](http://arduino.cc/en/Guide/Troubleshooting).\n\
    \nCongratulations, your Arduino is up-and-running!\n\n## The blood meter project\n\
    \nIn this project, we will use a temperature sensor to measure the warmth of your\
    \ skin and then start to turn on (or off) the LEDs indicated by the temperature.\n\
    \nFirst, we will tinker with our board and prepare the project with components\
    \ described earlier in the *Other components you will need* section. Then, we\
    \ will write the sketch to read sensor data and, based on the data of your skin\
    \ temperature, we will turn LEDs on and off.\n\nFinally, we will feed our JavaFX\
    \ application with temperature sensor data and show the result with a chart API\
    \ to indicate the level of your skin temperature.\n\n### Tinkering with the circuit\n\
    \nNow, we are going to tinker with our blood meter circuit shown in the following\
    \ diagram. Start by connecting the jumper wires between Arduino UNO and the breadboard.\
    \ I have attached the TMP36 temperature sensor on the breadboard, so the rounded\
    \ part of the sensor faces away from Arduino. The order of the pins is very important!\
    \ Note that we have connected the left pin to the power, the right one is grounded,\
    \ and the center pin that gives the voltage output is connected to the analog\
    \ pin A0 on the board. The screenshot as follows:\n\n![Tinkering with the circuit](graphics/B03998_07_07.jpg)\n\
    \nCircuit layout for Blood Meter example\n\nFinally, I have attached the three\
    \ LED lights and the resistors, and connected them with Arduino pins 4, ~3, and\
    \ 2 of the digital PMW~ pins row.\n\nAs usual, I have connected the breadboard\
    \ + row to power (5V) and - row to the ground (GND).\n\n### Note\n\nRemember to\
    \ keep the board unplugged while you set up your components."
  trans: "\n### 购买 Arduino\n\n虽然一块 Arduino Uno 板的价格约为 25 美元，但你可以购买包含该板在内的各种套件——从基础的预算包（50\
    \ 美元）到 Arduino 入门套件（65 美元），可在 [`adafruit.com`](http://adafruit.com) 购买；或者从 [`arduino.cc`](http://arduino.cc)\
    \ 购买入门套件（90 美元）。这些套件包含与预算包相同的组件，但还额外提供了一些用于更高级动手实践的配件。\n\n从 [`arduino.cc`](http://arduino.cc)\
    \ 购买的入门套件有一个不错的优势：它附带一本指南手册，其中包含 15 个不同技能水平的项目。\n\n如果你是亚马逊用户，通常可以在其网站上找到相同的套件，但价格可能有所不同。\n\
    \n大多数电路板的核心组件位于相同位置。因此，更高级的电路板会通过增大尺寸来容纳额外的组件。\n\n以下是一些购买组件和书籍的网站：[`arduino.cc`](http://arduino.cc)、[`Adafruit.com`](http://Adafruit.com)、[`makershed.com`](http://makershed.com)、[`sparkfun.com`](http://sparkfun.com)\
    \ 和 [`Amazon.com`](http://Amazon.com)。\n\n### 你需要的其他组件\n\n除了 Arduino 之外，你还需要一台装有\
    \ Windows、Mac OS 或 Linux 系统的电脑，并带有 USB 端口，用于将电脑连接到电路板。\n\n对于血氧仪项目，你需要用到 Arduino\
    \ 入门套件中已包含的一些组件。以下是你应该备好的组件简要清单。\n\n一台带有 USB 端口的电脑、一根 USB 线缆、一块无焊面包板、柔性导线、一个 TMP36\
    \ 温度传感器、三个 220 欧姆电阻以及三个 LED 灯（黄色、蓝色和红色），如下图所示：\n\n![你需要的其他组件](img/B03998_07_04.jpg)\n\
    \n血氧仪项目的工具和材料\n\n### Arduino IDE\n\n为了与 Arduino 微控制器交互并为其编程，我们需要下载并安装 Arduino\
    \ 集成开发环境。\n\nArduino 软件包含编写代码所需的所有组件：一个文本编辑器，以及一个用于将代码转换为机器语言、上传到电路板并运行代码的编译器。\n\
    \n#### 下载 IDE\n\n在撰写本文时，Arduino IDE 的版本是 1.6.3，但你可以从链接 [`www.arduino.cc/en/Main/Software`](http://www.arduino.cc/en/Main/Software)\
    \ 获取最新版本的 Arduino 软件。除了下图中显示的 Arduino 版本外，请点击首选操作系统的链接；就我而言，我选择了 Mac OS X。\n\n\
    在捐赠页面，你可以选择捐赠，或者直接点击 **仅下载** 链接开始下载 IDE；就我而言，我选择了 `arduino-1.6.4-macosx.zip`。\n\
    \n下载完成后，解压文件并将 `Arduino.app` 文件复制到 Mac 的应用程序文件夹中，或者将 Arduino 可执行文件链接到一个方便你访问的位置。\n\
    \n下载好 IDE 后，在开始编程之前，你还需要处理一些硬件方面的问题。\n\n![下载 IDE](img/B03998_07_05.jpg)\n\n下载\
    \ Arduino IDE 1.6.4\n\n#### 安装驱动程序\n\n首先，你需要使用 USB 线缆将 Arduino 电路板连接到电脑。绿色的电源指示灯（标有\
    \ PWR 或 ON）应该会亮起。\n\n##### Windows 设置\n\n让我们在 Windows 中设置 Arduino：\n\n1.  插入电路板，等待\
    \ Windows 开始其驱动程序安装过程。\n2.  点击 **开始菜单**，打开 **控制面板**。\n3.  在 **控制面板** 中，导航到 **系统和安全**。接着，点击\
    \ **系统**。系统窗口打开后，选择 **设备管理器**。\n4.  查看 **端口 (COM 和 LPT)** 下方。你应该会看到一个名为 `Arduino\
    \ UNO (COMxx)` 的开放端口。如果没有 **COM 和 LPT** 部分，请查看 **其他设备** 下的 **未知设备**。\n5.  右键点击\
    \ **Arduino UNO (COMxx)** 端口，选择 **更新驱动程序软件** 选项。\n6.  接着选择 **浏览我的电脑以查找驱动程序软件**\
    \ 选项。\n7.  最后，导航并选择名为 `arduino.inf` 的驱动程序文件，该文件位于 Arduino 软件下载目录的 `Drivers` 文件夹中（而不是\
    \ `FTDI USB Drivers` 子目录）。\n8.  Windows 将从那里完成驱动程序安装。\n\n    ### 提示\n\n    如果你使用的是\
    \ Windows 8 并且驱动程序未正确安装，请尝试禁用驱动程序签名强制。\n\n##### Mac OS X 和 Linux 设置\n\n对于 Mac\
    \ OS X 和 Linux 操作系统，无需安装驱动程序。\n\n对于 Mac OS X，当你连接 Arduino 电路板时，应该会在 `/dev/tty.usbmodemXXXX\
    \ 或 /dev/tty.usbserialXXXX` 下看到它。\n\n在 Linux 上，当你连接 Arduino 电路板时，应该会在 `/dev/ttyACMX\
    \ 或 /dev/ttyUSBX` 下看到它。\n\n#### 探索 IDE 和草图\n\n假设安装成功结束，双击 Arduino 应用程序，你应该会看到以下屏幕：\n\
    \n![探索 IDE 和草图](img/B03998_07_06.jpg)\n\nArduino IDE，首次运行，带有一个空草图\n\n现在你需要做两件重要的事情，以便正确连接并将你的草图上传到\
    \ Arduino 电路板。首先，通过导航到 **工具** | **开发板** 来选择你的电路板。然后，通过进入 **工具** | **串口** 来选择 Arduino\
    \ 电路板的串口。\n\n最后的验证步骤是运行一个 Arduino 的 `Hello world`，你可以通过打开 LED 闪烁示例草图来实现，路径为 **文件**\
    \ | **示例** | **1.基础** | **闪烁**。\n\n现在，只需点击环境中的 **上传** 按钮。如果上传成功，状态栏中会出现 **上传完成**\
    \ 的消息。\n\n等待几秒钟，你会看到电路板上的 **RX** 和 **TX** LED 灯闪烁。\n\n如果遇到任何问题，请查看 [`arduino.cc/en/Guide/Troubleshooting`](http://arduino.cc/en/Guide/Troubleshooting)\
    \ 上的故障排除建议。\n\n恭喜你，你的 Arduino 已经成功运行！\n\n## 血氧仪项目\n\n在这个项目中，我们将使用一个温度传感器来测量你皮肤的温度，然后根据温度指示开始打开（或关闭）LED\
    \ 灯。\n\n首先，我们将动手操作电路板，并使用前面 *你需要的其他组件* 部分描述的组件来准备项目。然后，我们将编写草图来读取传感器数据，并根据你皮肤温度的数据，打开和关闭\
    \ LED 灯。\n\n最后，我们将把温度传感器数据输入到我们的 JavaFX 应用程序中，并使用图表 API 显示结果，以指示你皮肤温度的水平。\n\n\
    ### 动手搭建电路\n\n现在，我们将动手搭建下图所示的血氧仪电路。首先，将杜邦线连接到 Arduino UNO 和面包板之间。我已经将 TMP36 温度传感器安装在面包板上，传感器的圆角部分背对\
    \ Arduino。引脚的顺序非常重要！请注意，我们将左侧引脚连接到电源，右侧引脚接地，而提供电压输出的中心引脚连接到电路板上的模拟引脚 A0。截图如下：\n\
    \n![动手搭建电路](img/B03998_07_07.jpg)\n\n血氧仪示例的电路布局\n\n最后，我连接了三个 LED 灯和电阻，并将它们连接到\
    \ Arduino 数字 PMW~ 引脚排的引脚 4、~3 和 2。\n\n像往常一样，我将面包板的 + 行连接到电源（5V），- 行连接到地（GND）。\n\
    \n### 注意\n\n请记住，在设置组件时，保持电路板断电。\n"
- fmt: "### The sketch\n\nAfter we have tinkered with our circuit and have configured\
    \ everything, we need to program our microcontroller. This is where the sketch\
    \ will do its magic:\n\n```\n/*\n  Chapter 7 example\n  Project  - Blood-Meter\n\
    \n  This sketch is written to accompany Project in the\n  JavaFX 8 essentials\
    \ book\n\n  Parts required:\n  1 TMP36 temperature sensor\n  3 red LEDs\n  3 220\
    \ ohm resistors\n\n  Created 5 April 2015\n  by Mohamed Mahmoud Taman\n  */\n\n\
    // named constant for the pin the sensor is connected to\nconst int sensorPin\
    \ = A0;\n// Room temperature in Celsius\nconst float baselineTemp = 25.0;\n\n\
    void setup() {\n  // open a serial connection to display values\n  Serial.begin(9600);\n\
    \  // set the LED pins as outputs\n  // the for() loop saves some extra coding\n\
    \  for (int pinNumber = 2; pinNumber < 5; pinNumber++) {\n    pinMode(pinNumber,\
    \ OUTPUT);\n    digitalWrite(pinNumber, LOW);\n  }\n}\n\nvoid loop() {\n  // read\
    \ the value on AnalogIn pin 0\n  // and store it in a variable\n  int sensorVal\
    \ = analogRead(sensorPin);\n\n  // send the 10-bit sensor value out the serial\
    \ port\n  Serial.print(\"Sensor Value: \");\n  Serial.print(sensorVal);\n\n  //\
    \ convert the ADC reading to voltage\n  float voltage = (sensorVal / 1024.0) *\
    \ 5.0;\n\n  // Send the voltage level out the Serial port\n  Serial.print(\",\
    \ Volts: \");\n  Serial.print(voltage);\n\n  // convert the voltage to temperature\
    \ in degrees C\n  // the sensor changes 10 mV per degree\n  // the datasheet says\
    \ there's a 500 mV offset\n  // ((voltage - 500mV) times 100)\n  Serial.print(\"\
    , degrees C: \");\n  float temperature = (voltage - .5) * 100;\n  Serial.println(temperature);\n\
    \n  // if the current temperature is lower than the baseline\n  // turn off all\
    \ LEDs\n  if (temperature < baselineTemp) {\n    digitalWrite(2, LOW);\n    digitalWrite(3,\
    \ LOW);\n    digitalWrite(4, LOW);\n  } // if the temperature rises 2-4 degrees,\
    \ turn an LED on\n  else if (temperature >= baselineTemp + 2 && temperature <\
    \ baselineTemp + 4) {\n    digitalWrite(2, HIGH);\n    digitalWrite(3, LOW);\n\
    \    digitalWrite(4, LOW);\n  } // if the temperature rises 4-6 degrees, turn\
    \ a second LED on\n  else if (temperature >= baselineTemp + 4 && temperature <\
    \ baselineTemp + 6) {\n    digitalWrite(2, HIGH);\n    digitalWrite(3, HIGH);\n\
    \    digitalWrite(4, LOW);\n  } // if the temperature rises more than 6 degrees,\
    \ turn all LEDs on\n  else if (temperature >= baselineTemp + 6) {\n    digitalWrite(2,\
    \ HIGH);\n    digitalWrite(3, HIGH);\n    digitalWrite(4, HIGH);\n  }\n  delay(100);\n\
    }\n```\n\n### How it works\n\nIf you are reading the comments of each line, you\
    \ will understand the code. Without going into the details, the following are\
    \ the main points of the sketch.\n\nEvery Arduino sketch has two main primary\
    \ methods: `setup()` and `loop()`. The first method is for initialization of the\
    \ pins as input or output, opening the serial ports, setting their speed, and\
    \ so on. The second method executes the task repeatedly inside the microcontroller.\n\
    \nAt the beginning, we have a pair of useful constants: one references analog\
    \ input and the other holds the baseline temperature. For every *2 degrees* above\
    \ this baseline, a LED will turn on.\n\nInside the `setup()` method, we initialize\
    \ the serial port to the desired speed of 9,600 bits per second, and we use a\
    \ `for` loop to set some pins as directions (output pins) and turn them off.\n\
    \nInside the `loop()` method, we start reading the temperature sensor as voltage\
    \ values between 0 and 1,023, then send the sensor values to the serial port using\
    \ `Serial.print()` so that any connected device (for example, our computer) can\
    \ read them. These analog readings measure the temperature of the room or of your\
    \ skin if you touch the sensor.\n\nWe need to convert the analog sensor readings\
    \ into voltage values using the following equation:\n\n```\nvoltage = (sensorVal\
    \ / 1024.0) * 5.0\n```\n\nFrom the datasheet, we use the sensor specifications\
    \ to convert the voltage into temperature using this equation:\n\n```\ntemperature\
    \ = (voltage - .5) * 100\n```\n\nWith the real temperature, you can set up an\
    \ `if else` statement to light the LEDs. Using the baseline temperature as a starting\
    \ point, you will turn on one LED for every 2 degrees of temperature increase\
    \ above that baseline.\n\nYou are going to look for a range of values as you move\
    \ through the temperature scale.\n\nThe **Analog-to-Digital Converter** (**ADC**)\
    \ reads really fast (in terms of microseconds), and a delay of 1 ms at the end\
    \ of the `loop()` function is advised. But given that this is going to be sent\
    \ to the serial port, a 100 ms delay is finally set.\n\n### Testing, verifying,\
    \ and uploading the sketch into the Arduino\n\nWith the code uploaded to the Arduino,\
    \ click on the serial monitor icon as illustrated in the following screenshot:\n\
    \n![Testing, verifying, and uploading the sketch into the Arduino](graphics/B03998_07_08.jpg)\n\
    \nArduino IDE toolbar icons\n\nYou should see a stream of values coming out, formatted\
    \ like this:\n\n```\nSensor Value: 158, Volts: 0.77, degrees C: 27.15\n```\n\n\
    Now try touching your finger around the sensor while it is plugged into the breadboard\
    \ and see what happens to the values in the serial monitor.\n\nMake a note of\
    \ the temperature when the sensor is left in the open air. Close the serial monitor\
    \ and change the `baselineTemp` constant to what you have observed earlier. Upload\
    \ the code again and try holding the sensor again; as the temperature increases,\
    \ you should see LEDs turn on one by one.\n\nCongratulations, hot stuff!\n\n###\
    \ Reading data from serial ports\n\nThere is no standard way to read serial ports\
    \ in Java, as it is a hardware-specific task that breaks the Java multiplatform\
    \ concept. So, we need a third party library to do the job and it should be written\
    \ in Java for integration with our application.\n\nArduino IDE used the first\
    \ library for serial communication, called **RXTX**. Originally from Trent Jarvi\
    \ and distributed under LGPL v2.1+ Linking Over Controlled Interface license,\
    \ it was distributed with Arduino IDE until the 1.5.5 beta version to communicate\
    \ with the board. However, it was very slow and it is now deprecated.\n\nThe new\
    \ **Java Simple Serial Connector** (**jSSC**) library is developed by Alexey Sokolov\
    \ and licensed under GNU Lesser GPL. Since the 1.5.6 beta version, the Arduino\
    \ IDE uses the new library for board communication, as it is faster than its predecessor.\n\
    \nAnother big advantage of this library is that it is distributed as a single\
    \ `jssc.jar` file, which includes all the native interfaces for all platforms\
    \ to reduce the pain of local installation for each platform and operating system.\
    \ It adds them to the `classpath` at runtime, as shown in the following screenshot:\n\
    \n![Reading data from serial ports](graphics/B03998_07_09.jpg)\n\njSSC 2.8.0 native\
    \ libraries\n\nYou can download the latest version from [https://github.com/scream3r/java-simple-serial-connector/releases](https://github.com/scream3r/java-simple-serial-connector/releases).\
    \ At the time of writing, the jSSC version is 2.8.0.\n\n### The JavaFX blood meter\
    \ monitoring application\n\nWe will design a JavaFX 8 application that takes the\
    \ readings from the temperature sensor and displays the values in a line chart.\
    \ We will also show what happens to the LEDs on the board with a set of a shapes\
    \ simulating board LEDs. For the sake of clarity, we'll use two classes one for\
    \ the serial readings and one for the JavaFX UI and main application `BloodMeterFX`\
    \ file, including chart APIs.\n\nWe'll bind these classes (`Serial` and `BloodMeterFX`)\
    \ using a `StringProperty` containing the last line read from the serial port.\
    \ By listening to changes in this property in the JavaFX thread, we'll know when\
    \ there's a new reading to add to the chart.\n\nThe full project code can be downloaded\
    \ from the *Packt Publishing* website."
