    \ Oracle: [http://fxexperience.com/controlsfx](http://fxexperience.com/controlsfx)\n\
    - Silicon valley JavaFX users group: [http://www.meetup.com/svjugfx](http://www.meetup.com/svjugfx)\n\
    - Silicon valley JavaFX users group Live stream: [http://www.ustream.tv/channel/silicon-valley-javafx-user-group](http://www.ustream.tv/channel/silicon-valley-javafx-user-group)\n\
    - Oracle Forums on JavaFX: [https://community.oracle.com/community/developer/english/java/javafx/javafx_2.0_and_later](https://community.oracle.com/community/developer/english/java/javafx/javafx_2.0_and_later)\n\
    \n## Java SE / JavaFX books and magazines\n\nThe following links are newer book\
    \ titles that relate to the new Java SE 8 and JavaFX 8 platform:\n\n- An Amazing\
    \ book, *JavaFX 8: Introduction by Example, Second Edition*, Carl Dea, Mark Heckler,\
