  trans: "\n### 让项目适配移动设备\n\n基本上，这个新项目是使用 Gluon 插件生成的（`build.gradle` 已更新至 **b8**）。\n\
    \n为了让应用程序适配移动设备，我们需要根据目标设备的屏幕调整其高度和宽度，并使 UI 树做出相应响应。\n\n这是一个非常简单但重要的步骤，我们可以通过动态地将场景的高度和宽度设置为目标设备的屏幕尺寸来调整以下代码行。请看下面这行代码：\n\
    \n```\nScene scene = new Scene(root, 175, 300);\n```\n\n将其修改为以下代码行：\n\n```\nRectangle2D\
    \ bounds = Screen.getPrimary().getVisualBounds();\nScene scene = new Scene(root,\
    \ bounds.getWidth(), bounds.getHeight());\n```\n\n第一行代码获取设备屏幕的 `bounds`（边界）。然后，我们根据这个边界变量设置场景的高度和宽度。\n\
    \n第二行代码将你的源代码添加到“源包”[Java] 和“资源”[Main] 中。然后，它会添加一个 `PlatformFactory` 类，该类负责查找项目运行在哪个平台上。请看带有方法签名的\
    \ `Platform` 接口：\n\n```\npublic interface Platform {   \n    void callNumber(String\
    \ number);\n}\n```\n\n这允许你在源代码中调用以下方法：\n\n```\nButton call = new Button(\"Call\"\
    );\ncall.setOnAction(e-> PlatformFactory.getPlatform().callNumber(output.getText()));\n\
    ```\n\n最后，你需要为每个平台提供原生解决方案。例如，对于 Android：\n\n```\npublic class AndroidPlatform\
    \ implements Platform {\n\n    @Override\n    public void callNumber(String number)\
    \ {\n        if (!number.equals(\"\")) {\n            Uri uriNumber = Uri.parse(\"\
    tel:\" + number);\n            Intent dial = new Intent(Intent.ACTION_CALL, uriNumber);\n\
    \            FXActivity.getInstance().startActivity(dial);\n         }\n    }\n\
    }\n```\n\n为了在 Android 上运行，我们只需要修改 `AndroidManifest.xml`，添加所需的权限和 Activity Intent。这个自定义清单文件必须在\
    \ `build.gradle` 文件中被引用，如下所示：\n\n```\nandroid {\n    manifest = 'lib/android/AndroidManifest.xml'\n\
    \  }\n```\n\n#### 与底层 Android API 的互操作性\n\n你需要 `android.jar` 来使用 Android API，并且需要\
    \ `jfxdvk.jar` 来访问 `FXActivity` 类，该类是 `JavaFX` 和 `Dalvik` 运行时之间的桥梁。我们在 `FXActivity`\
    \ 上使用一个静态方法来获取 `FXActivity`，它继承了 Android 的 `Context`。这个 `Context` 可用于查找 Android\
    \ 服务。\n\n## 构建应用程序\n\n为了为我们的应用程序创建 Android `.apk` 包文件，我们首先需要构建应用程序；这是一项非常简单的任务。在命令行中（或者在\
    \ NetBeans 中，右键单击**项目**选项卡并选择 `Tasks/task`），定位到当前项目文件夹，运行以下命令：\n\n```\n$ gradle\
    \ build\n```\n\nGradle 将下载所有必需的库并开始构建我们的应用程序。完成后，你应该看到类似如下的成功输出：\n\n```\n$ gradle\
    \ build\nDownload https://jcenter.bintray.com/org/robovm/robovm-rt/1.0.0-beta-04/robovm-rt-1.0.0-beta-08.pom\n\
    :compileJava\n:compileRetrolambdaMain\nDownload https://jcenter.bintray.com/net/orfjackal/retrolambda/retrolambda/1.8.0/retrolambda-1.8.0.pom\n\
    :processResources UP-TO-DATE\n:classes\n:compileDesktopJava UP-TO-DATE\n:compileRetrolambdaDesktop\
    \ SKIPPED\n……...…\n:check UP-TO-DATE\n:build\n\nBUILD SUCCESSFUL\nTotal time:\
    \ 44.74 secs\n```\n\n到目前为止，我们已经成功构建了应用程序。接下来，我们需要生成 `.apk` 并将其部署到多个源。\n\n### 构建最终的\
    \ .apk Android 包\n\n在构建 `.apk` 文件时，我们有两个选项。第一个是运行以下命令：\n\n```\ngradle android\
    \ \n```\n\n这将在目录 `build/javafxports/android` 中生成 `.apk` 文件。\n\n第二个是运行以下命令：\n\n\
    ```\nandroidInstall \n```\n\n这会将生成的 `.apk` 包部署到连接到你的台式机或笔记本电脑的设备上。\n\n我们将使用第一个选项（`gradle\
    \ android`）来确保我们能够成功生成 `.apk` 文件。成功完成后，你应该会在前面提到的路径下找到一个名为 `DialPad2.apk` 的文件。\n\
    \n## 部署应用程序\n\n为了能够使用 `gradle androidInstall` 命令将我们的应用程序部署到已连接的移动设备上，你需要在设备上启用**开发者选项**并在其中启用一些其他设置，具体步骤如下：\n\
    \n1.  在你的设备上，点击**设置**以打开设置菜单。\n2.  从顶部菜单中，选择**更多**。具体选项取决于你的设备。\n3.  在**更多选项**菜单列表的末尾，你应该会看到**开发者选项**。\n\
    4.  点击**开发者选项**菜单。\n5.  通过打开右上角的滑块来启用**开发者选项**。\n6.  在**调试**下，启用 **USB 调试**，点击**允许\
    \ USB 调试**警告窗口中的**确定**按钮，并启用**未知来源**。\n7.  恭喜！你已经完成了——让我们去安装我们的应用程序吧。\n\n### 注意\n\
    \n**可选**：如果你没有看到**开发者选项**，请不要担心。它存在但被隐藏了。诀窍如下——点击**关于设备**，找到**版本号**，并连续点击 7 次（在\
    \ Lollipop 系统上）。你会看到一个数字倒计时，最后**开发者选项**将被启用。\n\n### 在基于 Android 的设备上部署\n\n现在我们已经准备好了，运行以下命令：\n\
    \n```\n$ gradle androidinstall\n```\n\n发出此命令后，它将开始构建和打包 JavaFX 8 应用程序。该插件将连接到你的已连接设备并将应用程序安装到其中。你应该会得到如下结果：\n\
    \n```\n:compileJava\n:compileRetrolambdaMain\n………...…\n:processAndroidResources\
    \ UP-TO-DATE\n:apk\n:zipalign\n:androidInstall\nInstalled on device.\n\nBUILD\
    \ SUCCESSFUL\nTotal time: 47.537 secs\n```\n\n现在打开你的设备，从主屏幕找到你的应用程序图标；在右下角，你应该会看到你的\
    \ `DialPad2` JavaFX 应用程序已安装，如下面的屏幕截图所示，带有默认的 Android 图标：\n\n![在基于 Android 的设备上部署](img/B03998_04_05.jpg)\n\
    \n安装在 Android 设备上的 JavaFX 8 应用程序\n\n点击 **DialPad2** 应用程序，你应该会看到你的应用程序在你的设备上启动并运行，并且功能完全符合预期：\n\
    \n![在基于 Android 的设备上部署](img/B03998_04_06.jpg)\n\n在 Android 设备上运行的 JavaFX 8 应用程序\n\
    \n点击**呼叫**按钮，Android 默认拨号器将被启动，并拨打你输入的号码，如下所示：\n\n![在基于 Android 的设备上部署](img/B03998_04_07.jpg)\n\
    \nJavaFX 8 应用程序正在拨号\n\n如果某些功能未按预期工作，请转到命令行并输入：\n\n```\n$ adb logcat \n```\n\n\
    你将看到设备上所有应用程序的输出。\n"
- fmt: "### Deploying on the Google Play Store\n\nIn order to deploy your application\
    \ on the Google Play Store, you have to perform the following:\n\n1.  You have\
    \ to be enroll yourself with Google Play Developers ([https://play.google.com/apps/publish/](https://play.google.com/apps/publish/)),\
    \ fill a form with the description and several screenshots, and finally submit\
    \ the `DialPad2` apk.\n2.  In the `AndroidManifest.xml`, you have to disable the\
    \ debugging option by adding `android:debuggable=\"false\"` on the `application`\
    \ tag.\n3.  You can also add the icon of your app (`android:icon=\"@icons/ic_launcher\"\
    `) under the `application` tag. Here, `icons-*` are image folders with several\
    \ resolutions.\n\n#### Signing the APK\n\nThe `apk` must be signed for release.\
    \ **Signed** means you need a private key; for that, we can use `keytool` ([http://developer.android.com/tools/publishing/app-signing.html#signing-manually](http://developer.android.com/tools/publishing/app-signing.html#signing-manually)).\n\
    \nAnd **release** means that we need to add the signing configuration to `build.gradle`\
    \ as follows:\n\n```\njfxmobile {\n    android {\n        signingConfig {\n  \
    \          storeFile file(\"path/to/my-release-key.keystore\")\n            storePassword\
    \ 'STORE_PASSWORD'\n            keyAlias 'KEY_ALIAS'\n            keyPassword\
    \ 'KEY_PASSWORD'\n        }\n        manifest = 'lib/android/AndroidManifest.xml'\n\
    \        resDirectory = 'src/android/resources'\n    }\n}\n```\n\nRight-click\
    \ on the **DialPad2** project and, from **Tasks**, choose **apk** and then **apkRelease**.\n\
    \nCongratulations! The resulting `DialPad2.apk` is ready for submission to Google\
    \ Play Store.\n\n## Testing tips\n\nThe most important point before delivering\
    \ your application is to test it, especially on different Android based mobile\
    \ devices.\n\nIn my experience with the mobile industry, I have found a dozen\
    \ vendors' test mobile and tablets running the Android platform, each of them\
    \ customizing the UI layer of each device with different capabilities and performance.\n\
    \nThe four golden rules in the mobile testing field from my experience are:\n\n\
    1.  Test on as many real devices and Android platforms as possible to cover all\
    \ cases that your application will run on and to know how it will behave in production.\n\
    2.  Use simulators only for *GUI testing and functionality* and not for *performance\
    \ testing*. All simulators rely on your underlying PC/laptop hardware and memory,\
    \ while on mobile hardware it will be quite different and very challenging to\
    \ achieve the same performance.\n3.  There is a new simulator called `ARC Welder`\
    \ for Chrome. Check it out at [https://developer.chrome.com/apps/getstarted_arc](https://developer.chrome.com/apps/getstarted_arc).\n\
    4.  Test on real devices for final production and performance testing. This is\
    \ so you are assured that your application will act accordingly on the targeted\
    \ market devices.\n\n# Summary\n\nThis chapter gave you a very good understanding\
    \ of the mobile industry and how JavaFX-based applications can be developed and\
    \ customized using different projects such as **RoboVM** for **iOS** and **JavaFXPorts**\
    \ for **Android** to make it possible to run your application on both platforms.\n\
    \nWe then learned how to install the required software and tools for Android development\
    \ and to enable Android SDK along with *JavaFXPorts* libraries to package and\
    \ install our dialer JavaFX-based application on a real Android device and submit\
    \ it to Google Play Store.\n\nWe saw how to customize our application using CSS\
    \ to have a different look and feel for the same application to make sure you\
    \ have provided a different CSS for the Android version.\n\nNext, we learned how\
    \ to enable our device in the debugging mode to successfully install the application\
    \ from `jfxmobile-plugin` via the command line. Finally, we covered the four golden\
    \ rules of testing.\n\nThe next chapter will not differ too much from this one,\
    \ but will give you a very good introduction to, and knowledge of, targeting your\
    \ JavaFX 8 application to run on iOS-based devices. You will also learn how to\
    \ use its development tools.\n\n# Chapter 5. Developing a JavaFX Application for\
    \ iOS\n\nApple has a great market share in the mobile and PC/Laptop world, with\
    \ many different devices, from mobile phones such as the iPhone to musical devices\
    \ such as the iPod and tablets such as the iPad.\n\nIt has a rapidly growing application\
    \ market, called the Apple Store, serving its community, where the number of available\
    \ apps increases daily. Mobile application developers should be ready for such\
    \ a market.\n\nMobile application developers targeting both iOS and Android face\
    \ many challenges. By just comparing the native development environments of these\
    \ two platforms, you will find that they differ substantially.\n\niOS development,\
    \ according to Apple, is based on the **Xcode IDE** ([https://developer.apple.com/xcode/](https://developer.apple.com/xcode/))\
    \ and its programming languages. Traditionally, it was **Objective-C** and, in\
    \ June 2014, Apple introduced **Swift** ([https://developer.apple.com/swift/](https://developer.apple.com/swift/));\
    \ on the other hand, *Android* development, as defined by Google, is based on\
    \ the Intellij IDEA IDE and the Java programming language.\n\nNot many developers\
    \ are proficient in both environments. In addition, these differences rule out\
    \ any code reuse between the platforms.\n\nJavaFX 8 is filling the gap for reusable\
    \ code between the platforms, as we will see in this chapter, by sharing the same\
    \ application in both platforms.\n\nHere are some skills that you will have gained\
    \ by the end of this chapter:\n\n*   Installing and configuring iOS environment\
    \ tools and software\n*   Creating iOS JavaFX 8 applications\n*   Simulating and\
    \ debugging JavaFX mobile applications\n*   Packaging and deploying applications\
    \ on iOS mobile devices\n\n# Using RoboVM to run JavaFX on iOS\n\n**RoboVM** is\
    \ the bridge from Java to Objective-C. Using this, it becomes easy to develop\
    \ JavaFX 8 applications that are to be run on iOS-based devices, as the ultimate\
    \ goal of the **RoboVM** project is to solve this problem without compromising\
    \ on developer experience or app user experience.\n\nAs we saw in the previous\
    \ chapter about Android, using *JavaFXPorts* to generate APKs was a relatively\
    \ easy task due to the fact that Android is based on Java and the **Dalvik VM**.\n\
    \nOn the contrary, iOS doesn't have a VM for Java, and it doesn't allow dynamic\
    \ loading of native libraries.\n\nAnother approach is required. The `RoboVM` open\
    \ source project tries to close the gap for Java developers by creating a bridge\
    \ between Java and Objective-C using an *ahead-of-time* compiler that translates\
    \ Java bytecode into native ARM or x86 machine code.\n\n## Features\n\nLet's go\
    \ through the `RoboVM` features:\n\n*   Brings Java and other JVM languages, such\
    \ as Scala, Clojure, and Groovy, to iOS-based devices\n*   Translates Java bytecode\
    \ into machine code ahead of time for fast execution directly on the CPU without\
    \ any overhead\n*   The main target is iOS and the ARM processor (32- and 64-bit),\
    \ but there is also support for Mac OS X and Linux running on x86 CPUs (both 32-\
    \ and 64-bit)\n*   Does not impose any restrictions on the Java platform features\
    \ accessible to the developer, such as reflection or file I/O\n*   Supports standard\
    \ JAR files that let the developer reuse the vast ecosystem of third-party Java\
    \ libraries\n*   Provides access to the full native iOS APIs through a Java-to-Objective-C\
    \ bridge, enabling the development of apps with truly native UIs and with full\
    \ hardware access\n*   Integrates with the most popular tools such as NetBeans,\
    \ Eclipse, Intellij IDEA, Maven, and Gradle\n*   App Store ready, with hundreds\
    \ of apps already in the store"
