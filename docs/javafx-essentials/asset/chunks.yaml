  trans: "\n## 为应用程序注入活力——添加交互功能\n\n设计好应用程序后，你需要通过使其更具交互性，并能对客户提出的功能需求做出响应，来让它真正“活”起来。\n\
    \n我做的第一件事总是添加页面间的导航处理器，并且我已经在每个 FXML 文档的控制器类中完成了这项工作。\n\n为了消除冗余并实现模块化，我在 `BaseController.java`\
    \ 类中创建了一个基础的导航方法，系统中所有的控制器都将继承这个类。这个类对于添加任何通用功能和共享属性都非常有用。\n\n以下 `navigate(Event\
    \ event, URL fxmlDocName)` 方法是我们所有系统导航中最重要的代码片段之一（注释说明了其工作机制）：\n\n```\nprotected\
    \ void navigate(Event event, URL fxmlDocName) throws IOException {\n  //加载新的 fxml\
    \ UI 文档\n  Parent pageParent = FXMLLoader.load(fxmlDocName);\n  //创建新场景\n  Scene\
    \ scene = new Scene(pageParent);\n  //获取当前舞台\n  Stage appStage = (Stage)((Node)\
    \ event.getSource()).getScene().getWindow();\n  //隐藏旧舞台\n  appStage.hide(); //\
    \ 可选\n  //为舞台设置新场景\n  appStage.setScene(scene);\n  //显示舞台\n  appStage.show();\n\
    }\n```\n\n此方法将分别从 `ListNotesUI.fxml` 页面（位于 `ListNotesUIController.java`）中的**新建笔记**和编辑按钮，以及\
    \ `AddEditUI.fxml` 页面（位于 `AddEditUIController.java`）中的**笔记列表**、保存和**取消**按钮的动作处理器中调用，具体如下所示。\n\
    \n请注意 FXML 文档中定义的按钮与控制器之间的关系。`@FXML` 注解在此发挥作用，它将 FXML 属性（*使用 #*）与控制器中定义的动作绑定在一起：\n\
    \n`ListNotesUI.fxml` 文件中的**新建笔记**按钮定义如下：\n\n```\n<Button alignment=\"TOP_CENTER\"\
    \n        contentDisplay=\"TEXT_ONLY\"\n        mnemonicParsing=\"false\"\n  \
    \      onAction=\"#newNote\" \n        text=\"新建笔记\" \n        textAlignment=\"\
    CENTER\" \n        wrapText=\"true\" \n/>\n```\n\n**新建笔记**动作在 `ListNotesUIController.java`\
    \ 中定义，并通过 `onAction=\"#newNote\"` 与上述按钮绑定：\n\n```\n@FXML\n private void newNote(ActionEvent\
    \ event) throws IOException {\n        editNote = null;\n        navigate(event,\
    \ ADD.getPage());\n }\n```\n\n`AddEditUI.fxml` 文件中的**返回**按钮定义如下：\n\n```\n<Button\
    \ alignment=\"TOP_CENTER\"    \n        contentDisplay=\"TEXT_ONLY\"\n       \
    \ mnemonicParsing=\"false\"\n        onAction=\"#back\" \n        text=\"笔记列表\"\
    \ \n        textAlignment=\"CENTER\"\n        wrapText=\"true\"\n/>\n```\n\n**返回**动作在\
    \ `AddEditUIController.java` 中定义，并通过 `onAction=\"#back\"` 与上述按钮绑定：\n\n```\n@FXML\n\
    private void back(ActionEvent event) throws IOException {\n        navigate(event,\
    \ FXMLPage.LIST.getPage());\n}\n```\n\n你可能想知道 `FXMLPage.java` 类是做什么的。它是一个枚举（关于枚举的更多信息，请访问\
    \ [`docs.oracle.com/javase/tutorial/java/javaOO/enum.html`](https://docs.oracle.com/javase/tutorial/java/javaOO/enum.html)）。我创建了枚举来定义我们所有的\
    \ FXML 文档名称及其位置，以及与这些 FXML 文档相关的任何实用方法，这有助于简化我们系统中的编码工作。\n\n### 提示\n\n这种可维护性的概念有助于在大型系统中将恒定的属性和功能集中在一个地方，以便将来轻松重构，并允许我们在一个地方更改名称，而无需在整个系统中四处寻找并修改同一个名称。\n\
    \n如果你检查系统控制器，你会发现处理其他按钮动作（删除、编辑、清除和保存笔记）的所有逻辑。\n"
- fmt: "### Power application change synchronization with properties\n\n`Properties`\
    \ are wrapper objects for JavaFX-based object attributes such as `String` or `Integer`.\
    \ `Properties` allow you to add listener code to respond when the wrapped value\
    \ of an object has changed or is flagged as invalid. In addition, property objects\
    \ can be bound to one another.\n\nBinding behavior allows properties to update\
    \ or synchronize their values based on a changed value from another property.\n\
    \n`Properties` are wrapper objects that have the ability to make values accessible\
    \ as read/writable or read-only.\n\nIn short, JavaFX's properties are wrapper\
    \ objects holding actual values while providing change support, invalidation support,\
    \ and binding capabilities. I will address binding later, but for now, let's examine\
    \ the commonly used property classes.\n\nAll wrapper property classes are located\
    \ in the `javafx.beans.property.*` package namespace. Listed here are the commonly\
    \ used property classes. To see all of the property classes, refer to the documentation\
    \ in Javadoc ([https://docs.oracle.com/javase/8/javafx/api/index.html?javafx/beans/property.html](https://docs.oracle.com/javase/8/javafx/api/index.html?javafx/beans/property.html)).\n\
    \n- `javafx.beans.property.SimpleBooleanProperty`\n- `javafx.beans.property.ReadOnlyBooleanWrapper`\n\
    - `javafx.beans.property.SimpleIntegerProperty`\n- `javafx.beans.property.ReadOnlyIntegerWrapper`\n\
    - `javafx.beans.property.SimpleDoubleProperty`\n- `javafx.beans.property.ReadOnlyDoubleWrapper`\n\
    - `javafx.beans.property.SimpleStringProperty`\n- `javafx.beans.property.ReadOnlyStringWrapper`\n\
    \nThe properties that have a prefix of `Simple` and a suffix of `Property` are\
    \ the *read/writable property* classes, and the classes with a prefix of `ReadOnly`\
    \ and a suffix of `Wrapper` are the read-only properties. Later, you will see\
    \ how to create a JavaFX bean using these commonly used properties.\n\nLet's fast-forward\
    \ to JavaFX's Properties API to see how it handles the common issues. You may\
    \ notice that the `TableView` control has been added to the main page to list\
    \ the currently loaded notes and any new added notes.\n\nIn order to populate\
    \ `TableView` correctly with data, we should have a data model to represent the\
    \ notes data, and this is the first place I used the Properties API in the JavaFX\
    \ JavaBean-style `Note` class, which is defined as the following:\n\n```\npublic\
    \ class Note {\n    private final SimpleStringProperty title;\n    private final\
    \ SimpleStringProperty description;\n    public Note(String title, String description)\
    \ {\n        this.title = new SimpleStringProperty(title);\n        this.description\
    \ = new SimpleStringProperty(description);\n    }\n    public String getTitle()\
    \ {\n        return title.get();\n    }\n    public void setTitle(String title)\
    \ {\n        this.title.set(title);\n    }\n    public String getDescription()\
    \ {\n        return description.get();\n    }\n    public void setDescription(String\
    \ description) {\n        this.description.set(description);\n    }\n}\n```\n\n\
    In order to populate the `TableView` class with data already stored in the application\
    \ database, for example (our database here is transient using `ObservableList<Note>`\
    \ of the note object called `data`), we have to pass a collection of this data.\n\
    \nWe need to remove the burden of updating the UI control (in our case, the `TableView`\
    \ control) manually each time the notes data collection get updated. Therefore,\
    \ we need a solution to automatically synchronize the changes between the table\
    \ view and notes data collection model, for example, adding, updating, or deleting\
    \ data, without any further modification to the UI controls from the code. Only\
    \ the data model collection gets updated – the UI should be synchronized automatically.\n\
    \nThis feature is already an integral part of JavaFX collections. We will use\
    \ JavaFX's `ObservableList` class. The `ObservableList` class is a collection\
    \ that is capable of notifying UI controls when objects are added, updated, or\
    \ removed.\n\nJavaFX's `ObservableList` class is typically used in list UI controls,\
    \ such as `ListView` and `TableView`. Let's look at how we will use the `ObservableList`\
    \ collection class.\n\nIn `BaseController`, I have created static data as `ObservableList<Note>`\
    \ to be shared between all controllers, to be able to add, update, and remove\
    \ notes from it. Also, it is initialized with some data as follows:\n\n```\nprotected\
    \ static ObservableList<Note> data = FXCollections.<Note>observableArrayList(\n\
    \  new Note(\"Note 1\", \"Description of note 41\"),\n    new Note(\"Note 2\"\
    , \"Description of note 32\"),\n    new Note(\"Note 3\", \"Description of note\
    \ 23\"),\n    new Note(\"Note 4\", \"Description of note 14\"));\n```\n\nIn the\
    \ `ListNotesUIController.java` class, inside the `initialize()` method, I have\
    \ created an instance of the `javafx.collections.transformation.FilteredList`\
    \ class that will be used as the filtering class when we search in the table contents.\
    \ It will pass the `data` object of type `ObservableList<Note>` as the source\
    \ data:\n\n```\nFilteredList<Note> filteredData = new FilteredList<>(data, n ->\
    \ true);\n```\n\nThe second argument of `FilteredList` is the predicate used to\
    \ filter data; here, it returns `true`, meaning no filtration, and we will add\
    \ the filtration predicate later on.\n\nThe created data list of type `ObservableList<Note>`\
    \ should be passed to our `TableView` data in order for the table view to monitor\
    \ the current data collection manipulations, such as addition, deletion, editing,\
    \ and filtering, as the following in the `initialize()` method of the `ListNotesUIController.java`\
    \ class, but instead we have passed the `filteredData` wrapper instance:\n\n```\n\
    notesListTable.setItems(filteredData);\n```\n\nThe final step is to acknowledge\
    \ our `notesListTable` columns, of type `TableColumn`, and to which property of\
    \ `Note` class to render and take care of. We use the `setCellValueFactory()`\
    \ method to do the trick, as shown here:\n\n```\ntitleTc.setCellValueFactory(new\
    \ PropertyValueFactory<>(\"title\"));\ndescriptionTc.setCellValueFactory(new PropertyValueFactory<>(\"\
    description\"));\n```\n\nNote that `title` and `description` are the instance\
    \ variable names of the `Note` class.\n\nCheck the final project code for the\
    \ full implementation. Then, run the application from the NetBeans main menu,\
    \ choose Run, and then click on **Run Main Project**.\n\nTry to add a new note\
    \ and watch the table view for your newly added note. Try to select and delete\
    \ the note or update an existing note. You will notice the change immediately.\n\
    \nBy checking the application code, you will see that all we have done is manipulated\
    \ the data list and all the other synchronization work efforts are carried out\
    \ with the help of the `ObservableList` class."
  raw: "### Power application change synchronization with properties\n\nProperties\
