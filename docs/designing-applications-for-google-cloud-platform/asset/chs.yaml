  ### Google Cloud Spanner


  Google Cloud Spanner 是 Google Cloud 提供的一种高度可扩展、全球分布式的托管关系型数据库服务。它旨在跨所有节点提供水平扩展性和强一致性，使其成为需要强一致性和高性能的应用程序的绝佳选择。凭借其对
  SQL、事务和二级索引的支持，Spanner 提供了熟悉的数据库抽象，使开发人员易于使用并集成到现有应用程序中。Spanner 的全球分布式架构、自动故障转移和低延迟使其成为高可用性和关键任务应用程序的理想选择。凭借其可扩展性、可靠性和一致性，Cloud
  Spanner 为希望实现数据架构现代化并将其应用程序迁移到云端的组织，提供了一种经济高效且可扩展的传统关系型数据库替代方案。


  即使使用 GCP 的 300 美元、90 天试用期，您也可以为 Cloud Spanner 单独开始一个 90 天的免费试用。您将获得 10 GB 的存储空间，该存储空间不会从您的信用额度中扣费。


  如图 1-25 所示，点击“开始免费试用”按钮，您可以通过提供实例名称、实例 ID 和配置中的位置来创建一个 Spanner 实例。


