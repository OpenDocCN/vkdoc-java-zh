  ![](img/603470_1_En_1_Fig18_HTML.jpg)


  一个页面的截图，在默认类别下有 4 个选项。它有一个设置默认类别的选项被选中，后面跟着 4 个选项：标准、近线、冷线和归档，以及它们各自的优势。选项 1 标准已被选中。


  图 1-18


  选择存储类别


  *标准存储*是默认的存储类别，也是最昂贵的。如果你需要频繁且快速地访问数据，这种存储类别最适合你。例如，你可能将标准存储类别用于客户订单和发票，因为你需要能够快速且频繁地访问这些数据。


  *近线存储*比标准存储便宜，是偶尔需要访问但对业务不关键的数据的不错选择。例如，你可以使用近线存储来备份你的网站数据。


  *冷线存储*比近线和标准存储便宜，是访问频率低且对业务不关键的数据的不错选择。例如，你可能将冷线存储用于财务记录，这些记录每季度仅访问一次用于报告目的。


  *归档存储*是成本最低的存储类别，但访问成本最高，最适合很少或从不访问的数据。例如，你可能选择归档存储类别用于因法律或监管原因而保留的备份。




  ### Google BigQuery


  Google BigQuery (GBQ) 是一项全托管、无服务器的云数据仓库服务，能够利用谷歌基础设施的处理能力实现超快速的 SQL 查询。它使组织能够快速且经济高效地分析大量数据，因此成为大数据分析的热门选择。BigQuery
  与多种其他 GCP 服务和工具集成，包括 Google Cloud Dataflow、Google Cloud Dataproc 和 Google Cloud
  Storage，使其成为适用于各种规模组织的灵活且可扩展的解决方案。使用 BigQuery，无需担心硬件或基础设施维护，因为谷歌会管理所有底层基础设施。这使得组织能够专注于分析和洞察，而不是管理和维护硬件。


  BigQuery 是企业级数据仓库，您可以将相关的应用程序数据导出到其中，用于报告和分析目的。如果您进入 BigQuery 控制台，GCP 会提供公共数据，以便您在这些数据上探索
  BigQuery 的功能。图 1-19 展示了 BigQuery 仪表板。


  ![](img/603470_1_En_1_Fig19_HTML.jpg)


  一张 Google Cloud SQL 仪表板的截图。上面有一行文字写着“欢迎来到您的 SQL 工作区”，接着是一段文字提示“尝试 Google Trends
  演示查询”。页面上有一个“打开查询”按钮，以及两个用于“编写新查询”和“添加数据”的按钮，位于页面底部。


  图 1-19


  Google BigQuery


  在 BigQuery 中，您可以使用查询编辑器编写类似 RDBMS 数据库的查询。您可以通过从存储桶上传数据文件、从外部来源（如移至 BigQuery 的应用程序日志）上传文件、通过
  Pub/Sub 将数据推送到 BigQuery 等方式向 BigQuery 添加数据。谷歌提供了一个示例数据集，供您在学习 BigQuery 时试用。要获取此数据集，请点击“开始使用”窗口中的“查看数据集”，如图
  1-19 所示。


  BigQuery 中的数据按层次结构组织。顶层是*项目*，它是数据集的逻辑容器。数据集用于组织表，而表用于存储数据，如图 1-20 所示。


  ![](img/603470_1_En_1_Fig20_HTML.jpg)


  一张页面的截图，分为 3 列。第一列是 BigQuery，包含分析、迁移和管理选项。第二列是资源管理器，包含工作区资源，其中标记了 3 个资源：GCP 项目、数据集和表。第三列是一个查询编辑器，包含几行编程代码和一个用于显示查询结果的表格。


  图 1-20


