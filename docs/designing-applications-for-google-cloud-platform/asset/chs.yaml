  ### Google Cloud Translation API


  Google Cloud Translation API 是 Google Cloud 提供的一项基于云的机器翻译服务。它可以在不同语言之间翻译文本，包括英语、西班牙语、法语、德语、中文以及许多其他语言。该
  API 使用先进的机器学习技术来提供准确且自然的翻译。它用于在各种场景中翻译文本，包括网站、移动应用、客户服务和文档翻译。该 API 易于使用，可以通过简单的
  API 请求轻松集成到广泛的 Web 和移动应用中。借助 Google Cloud Translation API，开发者可以快速轻松地为其应用添加多语言支持，从而帮助覆盖更广泛的全球受众。


  如果你在 GCP 项目中首次使用 Translation API，则需要启用它，如图 1-32 所示。


