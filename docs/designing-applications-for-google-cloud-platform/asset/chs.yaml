- "# 3. Google App Engine\n\n在本章中，你将了解 Google App Engine（GAE），这是一个用于开发和部署 Web 应用及服务的全托管平台。GAE\
  \ 允许开发者专注于编写代码，而无需担心底层基础设施以及随着流量增长而扩展应用的问题。本章涵盖了 GAE 的主要特性，包括支持的编程语言和框架、存储选项以及部署方法。你还将学习如何扩展和优化\
  \ GAE 应用，以应对流量变化并提升性能。最后，本章涵盖了部署和管理 GAE 应用时的安全注意事项及最佳实践。学完本章后，你将全面了解 Google App\
  \ Engine 以及如何使用它来开发和部署 Web 应用。\n\nGoogle App Engine 是 Google 提供的一种平台即服务（PaaS）产品，允许开发者在可扩展且安全的环境中构建和托管\
  \ Web 应用。借助 GAE，开发者可以使用标准语言和框架（如 Java、Python、Go 和 PHP）来构建 Web 应用。\n\nGAE 的主要特性是其自动扩展能力，这使得平台能够根据应用的流量调整正在运行的实例数量。这消除了开发者自行配置和手动管理底层基础设施的需求。\n\
  \nGoogle App Engine 还提供了多种内置服务和 API，例如 Cloud Datastore（NoSQL）、Memcache 和任务队列，这些都可以轻松集成到应用中。此外，它还提供了内置的安全特性，如自动\
  \ SSL 终止以及对 OAuth 和 OpenID Connect 的支持。\n\nGAE 还为小型应用提供免费使用层级，并对超出免费使用层级的应用进行收费。它是一个全托管平台，简化了构建和部署\
  \ Web 应用的过程，同时提供了高可扩展性、安全性和性能。\n\n## 为何使用 Google App Engine？\n\n在多种场景下，Google App\
  \ Engine 是 Web 应用开发的绝佳选择。\n\n*   *可扩展且高性能的 Web 应用*：GAE 的自动扩展特性确保你的应用能够处理大量用户和请求。其内置的服务和\
  \ API 可帮助你构建高性能应用。\n\n*   *快速开发与部署*：GAE 提供了简单的流程，让开发者能够专注于编写代码，而无需担心基础设施的配置和管理。\n\
  \n*   *与其他 Google Cloud 服务的集成*：GAE 可与 Cloud Storage、Cloud SQL 和 BigQuery 等其他 Google\
  \ Cloud 服务无缝集成，使开发者能够构建复杂的多层应用。\n\n*   *多语言支持*：GAE 支持 Java、Python、Go、PHP 等多种语言，这使得开发者能够使用自己偏好的语言轻松构建\
  \ Web 应用。\n\n*   *成本效益*：GAE 为小型应用提供免费使用层级，并对超出免费使用层级的应用进行收费。\n\nGAE 的一个用例是小型企业的\
  \ Web 应用，允许客户在线下单。该应用需要在高峰时段处理大量请求，并且需要具备高可用性和可扩展性。借助 GAE，企业可以轻松构建和部署该应用。GAE 的自动扩展特性将确保应用无需额外工作即可处理大量用户。\n\
  \n### Google App Engine 的用例\n\nGoogle App Engine 的一个良好用例是需要高可扩展性和自动管理的 Web 应用。App\
  \ Engine 的 PaaS 模型允许开发者专注于为应用编写代码，而无需担心底层基础设施。它还允许轻松扩展资源以应对流量高峰，并提供内置服务，如数据存储和任务队列。此外，App\
  \ Engine 与其他 Google Cloud Platform 服务集成良好，使其成为构建完整端到端解决方案的合适选择。\n\n## 理解 Google\
  \ App Engine 运行时和服务选项\n\nGoogle App Engine 是一个在 Google 管理的数据中心中开发和托管 Web 应用的平台。GAE\
  \ 的关键特性之一是能够为应用选择运行时。\n\n### GAE 运行时\n\n运行时是应用代码运行的环境，它包括特定版本的编程语言以及任何必要的库或框架。\n\
  \n图 3-1 展示了 GAE 当前支持的部分运行时。\n\n![](img/603470_1_En_3_Fig1_HTML.jpg)\n\n一个窗口截图，显示了一个包含两列的表格，分别对应第二代和第一代。它有一行用于支持的语言。第一列有\
  \ 6 种语言，第二列有 4 种不同版本的语言。\n\n图 3-1\n\nGAE 支持的运行时\n\n每种运行时都有自己的一套支持的库和框架，运行时的选择会影响应用的性能和可扩展性。\n\
  \n除了运行时，GAE 还提供了一组可供应用使用的服务，例如用于存储数据的数据存储、用于管理后台任务的任务队列，以及用于发送电子邮件的服务。这些服务可以通过简单的\
  \ API 进行访问，从而抽象掉底层基础设施，让开发者能够专注于编写应用代码。\n\nGAE 还提供了对扩展、负载均衡和自动故障转移的内置支持，因此应用无需手动配置或维护即可处理大量用户和流量。\n\
  \nGoogle App Engine 运行时为开发和部署 Web 应用提供了一个灵活且易于使用的平台，具有广泛的语言和框架支持，以及用于扩展和基础设施管理的内置服务。\n\
  \n\n\n### GAE 服务选项\n\nGoogle App Engine 提供了一系列可供平台上运行的应用使用的服务。这些服务抽象化了底层基础设施，并为访问标准功能（如数据存储和后台任务处理）提供了简单的\
  \ API。以下是 GAE 提供的一些主要服务：\n\n*   *数据存储 (Datastore)*：这项 NoSQL 数据存储服务允许你存储和检索结构化数据。它基于\
  \ Google Cloud Datastore，并提供自动扩缩容和内置事务支持。你可以使用 Datastore API 通过多种编程语言（包括 Python、Java\
  \ 和 Go）来存储和检索数据。\n\n*   *Cloud SQL*：此服务允许你在 GAE 平台上运行完全托管的 MySQL 或 PostgreSQL 数据库。你可以使用标准\
  \ SQL 语法对数据库执行操作，并且它与其他 GAE 服务完全集成。\n\n*   *Cloud Memorystore*：此服务为 GAE 应用提供完全托管的内存数据存储。它允许你将数据存储在内存中以实现更快的访问，并且构建在\
  \ Redis 之上。\n\n*   *Cloud Firestore*：这项 NoSQL 文档数据库服务允许你存储、检索和查询结构化数据，并支持实时同步。其数据模型基于文档和集合，该服务提供自动扩缩容、实时更新和离线支持。\n\
  \n*   *Cloud Storage*：此服务允许你存储和检索大量非结构化数据，例如图像、视频和音频文件。它提供自动扩缩容，并内置对数据完整性和版本控制的支持。\n\
  \n*   *任务队列 (Task Queue)*：此服务允许你管理应用中的后台任务。你可以使用它来异步执行任务，例如发送电子邮件、处理图像或更新数据存储。\n\
  \n*   *Cloud Pub/Sub*：此服务允许你在 GAE 应用与其他 Google Cloud 服务之间发送和接收消息。它提供用于消息传递的发布-订阅模型，可用于各种场景，例如事件驱动架构和实时流处理。\n\
  \n*   *Cloud Endpoints*：此服务允许你轻松地为 GAE 应用构建、部署和管理 API。它内置了对身份验证、监控和日志记录等标准功能的支持。\n\
  \n*   *Cloud Logging*：此服务允许你收集、搜索、分析来自 GAE 应用的日志数据并设置告警。它提供来自所有 GAE 服务的日志的统一视图，并且可以与其他\
  \ Google Cloud 服务集成。\n\n*   *Cloud Trace*：此服务允许你跟踪在 GAE 应用中传播的请求。它提供详细的性能指标，例如请求延迟和错误率，可用于识别和修复应用中的性能瓶颈。Cloud\
  \ Trace 为在 GAE 上运行的应用提供分布式追踪能力。分布式追踪是一种用于跟踪请求在分布式系统的多个服务和组件中传播的技术。它允许开发者追踪请求在不同服务中的路径和性能，从而更容易地在复杂系统中识别和诊断问题。\n\
  \n还有其他可用的服务，例如 Cloud Translation、Cloud Natural Language、Cloud Speech-to-Text 等。这些服务中的每一个都为不同的用例提供特定功能，并且可以组合使用以构建强大、可扩展的\
  \ Web 应用。\n\n现在，让我们在 Google App Engine 上创建并部署一个 Java Web 应用。\n\n## 为 GAE 构建 Web\
  \ 应用\n\n在 Google App Engine 上开发 Web 应用涉及构建和部署在 Google 云基础设施上运行的 Web 应用。在 GAE 上开发\
  \ Web 应用的过程可能相对简单，特别是如果你已经熟悉 Web 开发并且对 GAE 使用的工具和技术有经验的话。\n\n要在 GAE 上开发 Web 应用，你首先需要选择\
  \ GAE 支持的编程语言和运行时环境。GAE 支持多种编程语言，包括 Java、Python、PHP、Go 和 Node.js，并且它还提供了多种可用于运行\
  \ Web 应用的运行时环境。\n\n一旦你选择了编程语言和运行时环境，就可以开始使用 GAE 支持的框架或库来构建你的 Web 应用。\n\n构建完 Web\
  \ 应用后，你可以使用 GAE 命令行工具或 GAE 控制台将其部署到 GAE。部署过程包括将你的 Web 应用和配置文件打包成一个部署包，然后上传到 GAE。一旦你的\
  \ Web 应用部署完成，就可以通过 GAE 提供的唯一 URL 进行访问。\n\nGoogle App Engine (GAE) 提供了一系列可供平台上运行的应用使用的服务。这些服务抽象化了底层基础设施，并为访问标准功能（如数据存储和后台任务处理）提供了简单的\
  \ API。\n\n\n\n### 创建示例 Web 应用程序\n\n在 Google App Engine 上使用 Java 创建示例 Web 应用程序是一个相对直接的过程。不过，它确实需要一些设置和配置。以下是创建示例\
