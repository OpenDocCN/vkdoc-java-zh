  ### Google Kubernetes Engine


  Google Kubernetes Engine（GKE）是 GCP 提供的一项完全托管的 Kubernetes 服务，可让您轻松利用 Google 基础设施部署、管理和扩缩容器化应用。GKE
  为部署、管理和扩缩容器提供了完整的解决方案，使开发者能够专注于编写代码和交付功能。它还提供自动升级、自动扩缩和自修复等功能，让开发者可以专注于应用本身，而无需操心底层基础设施。此外，GKE
  还与其他 GCP 服务（如 Cloud Load Balancing、Cloud Operations Suite、Cloud Monitoring and Logging
  以及 Cloud DNS）集成，从而可以轻松地在单一平台上管理完整的应用栈。


  *容器化应用*是指将其所有依赖项打包成一个称为*容器*的单一单元的应用。容器彼此隔离，也与宿主机操作系统隔离，这使得它们成为更高效、更安全的部署应用方式。可以将容器想象成一个盒子，里面包含了应用运行所需的一切，例如代码、库和设置。这使得将应用部署到不同环境（例如本地环境、云端或混合环境）变得非常容易。容器也比传统虚拟机更高效。虚拟机需要完整的操作系统，而容器只需要应用的资源。这可以节省硬件成本并提高性能。容器比传统虚拟机更安全。容器彼此隔离，也与宿主机操作系统隔离，这使得恶意软件更难传播，从而使容器成为需要高度安全的应用的理想选择。


