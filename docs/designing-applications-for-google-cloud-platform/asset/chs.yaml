  \n注意\n\n上述步骤是完整的；但是，可能还有其他特定于您的应用程序或环境的步骤或注意事项。\n\n## 扩展和优化 App Engine 应用程序\n\n\
  扩展和优化 Google App Engine (GAE) 应用程序涉及调整应用程序的资源和设置，以处理流量变化并提高性能。\n\n在 GAE 上扩展应用程序是指调整正在运行的实例数量以处理流量变化。扩展\
  \ GAE 应用程序主要有两种方式：手动扩展和自动扩展。手动扩展涉及手动调整正在运行的实例数量，而自动扩展则根据应用程序的流量自动调整实例数量。\n\n优化 GAE\
  \ 应用程序涉及进行更改以提高应用程序的性能。以下是优化 GAE 应用程序的一些方法：\n\n*   *使用缓存*：缓存可以通过减少对后端的请求次数来显著提高应用程序的性能。缓存是临时存储频繁访问的数据或内容的过程，以提高性能并减少后端负载。\n\
  \n*   *优化数据库*：使用索引、反规范化和其他技术来提高数据库查询的性能。提高数据库查询性能的其他技术可能包括优化数据库架构、使用高效的数据类型、优化数据库查询和事务，以及最小化检索的数据量。\n\
  \n*   *减少请求次数*：通过设计能够在单个 HTTP 请求中检索或操作多个相关资源的 API，或使用客户端缓存来减少往返次数，从而最大限度地减少对后端的请求次数。\n\
  \n*   *使用内置性能工具*：GAE 提供了多种工具来帮助您识别和修复性能问题，例如 App Engine Performance Dashboard、Cloud\
  \ Trace 和 Cloud Profiler。\n\n*   *使用合适的实例类别*：GAE 提供多种实例类别，每种类别具有不同的资源和定价。为您的应用程序选择合适的实例类别，以优化性能和成本。\n\
  \n*   *使用负载均衡*：使用负载均衡将流量分配到多个实例，以处理增加的流量。\n\n*   *使用内容分发网络 (**CDN)*：CDN 可以通过缓存内容并将其更靠近最终用户交付，来帮助减少应用程序负载并提高应用程序性能。\n\
  \n请务必记住，扩展和优化应用程序是一个迭代过程，您可能需要进行多次更改并监控应用程序的性能，才能达到预期效果。\n\n### 在 GAE 中设置手动和自动扩展\n\
  \n在 Google App Engine 上扩展 Web 应用程序是指调整正在运行的应用程序实例数量，以处理流量变化。在 GAE 上扩展 Web 应用程序主要有两种方式：手动扩展和自动扩展。\n\
  \n#### 手动扩展\n\n使用手动扩展，您可以手动调整正在运行的实例数量以处理流量变化。要手动扩展 GAE 应用程序，您可以使用 Google Cloud\
  \ 控制台中的 App Engine 仪表板。您可以为应用程序设置正在运行的实例数量，App Engine 将确保该数量的实例正在运行。\n\n\n\n####\
  \ 自动缩放\n\n自动缩放功能会自动调整运行中的实例数量，以应对流量变化。\n\n你需要在应用的 `app.yaml` 文件中进行配置，以便在 GAE 上设置自动缩放。在此文件中，你可以设置\
  \ `automatic_scaling` 选项来配置应用的自动缩放设置。\n\n以下是你可以为自动缩放设置的选项：\n\n*   `min_idle_instances`：App\
  \ Engine 应为你的应用维护的最小空闲实例数。\n*   `max_idle_instances`：App Engine 应为你的应用维护的最大空闲实例数。\n\
  *   `min_pending_latency`：请求在启动新实例前应等待的最短时间。\n*   `max_pending_latency`：请求在启动新实例前应等待的最长时间。\n\
  *   `target_cpu_utilization`：你的应用的目标 CPU 利用率。App Engine 将调整实例数量以维持此 CPU 利用率。\n\n\
  你还可以设置其他选项，例如 `max_concurrent_requests` 和 `max_instances`*，*以便对应用的缩放进行更精细的控制。\n\n\
  配置好这些选项后，App Engine 将根据应用的流量自动调整运行中的实例数量。\n\n需要注意的是，在自动缩放模式下，App Engine 会根据流量自动调整应用的运行实例数量。但更改生效可能需要一些时间。\n\
  \n同样重要的是，要监控应用的行为，并根据需要调整自动缩放设置，以确保应用性能良好，并将成本控制在合理范围内。\n\n"
- "# 4. Google Cloud 中的数据存储\n\n在本章中，我们将探讨 Google Cloud Storage (GCS) 以及如何在 Java 应用程序中使用它来存储和管理文件。GCS\
  \ 是 Google Cloud Platform (GCP) 提供的一种基于云的对象存储服务，允许用户在世界任何地方存储和访问其数据。它是一种高度可扩展且可靠的存储解决方案，提供数据加密、数据持久性和数据生命周期管理等功能。\n\
  \n我们将从理解 GCS 的基础知识开始，包括其关键概念和特性。然后，我们将学习如何设置 GCS 存储桶、使用 GCS 进行身份验证以及安装 GCS Java\
  \ 客户端库。我们还将介绍如何使用 Java 代码在 GCS 存储桶中上传、下载和管理文件。在本章结束时，你应该对如何在 Java 应用程序中使用 GCS 进行文件存储有扎实的理解。\n\
  \nGoogle Cloud 为各种用例提供了多种数据存储解决方案，包括关系型数据库、NoSQL 数据库和对象存储。这些存储解决方案旨在实现高可用性、可扩展性和可靠性，并内置了备份和恢复选项。\n\
  \n组织需要数据存储解决方案来有效且高效地存储和管理其数据。这些解决方案使组织能够访问、管理和分析数据，使其成为任何现代企业的重要组成部分。\n\n随着组织生成的数据量不断增加，基于云的数据存储解决方案因其灵活性、可扩展性和成本效益而成为热门选择。Google\
  \ Cloud 的数据存储解决方案旨在满足任何组织的需求，从小型初创公司到大型企业，通过提供广泛的选择，让用户可以根据其特定要求进行选择。\n\n假设你有一个网站，用户可以在其中创建帐户并登录以访问某些功能。该网站需要存储用户信息，例如他们的姓名、电子邮件、密码和其他详细信息。你可以将这些信息存储在云数据库（如\
  \ Google Cloud Datastore）中，而不是存储在网站的服务器上。\n\n当用户创建帐户或登录时，他们的信息会存储在云数据库中，当他们注销或离开网站时，这些信息将保持安全，并在他们下次登录时仍然可以访问。\n\
  \n类似地，假设你有一个需要用户输入数据的移动应用程序，例如一个健身应用，用户可以在其中跟踪他们的锻炼和进度。在这种情况下，你可以将此数据存储在云数据库（如 Google\
  \ Cloud Firestore）中。这确保了数据可以在多个设备上访问，并保持安全。\n\n使用云数据存储可以让你轻松扩展应用程序，确保数据的持久性和可用性，并提供从任何地方安全访问数据的能力。\n\
  \n接下来，让我们更详细地讨论 GCP 中的各种存储选项。\n\n## 了解 GCP 中的各种存储选项\n\nGoogle Cloud Platform 提供了广泛的存储选项，以满足不同的数据存储和管理需求。以下是\
  \ GCP 提供的一些关键存储选项：\n\n*   **Cloud Storage** 是一种可扩展、经济高效的对象存储服务，支持非结构化数据存储。它可用于各种用例，例如备份和归档、数据仓库、媒体和娱乐以及\
  \ Web 和移动应用程序。\n*   **Cloud SQL** 是一种完全托管的关系型数据库服务，支持流行的数据库引擎，如 MySQL、PostgreSQL\
  \ 和 SQL Server。它适用于结构化数据存储，可用于各种用例，包括 Web 和移动应用程序、数据仓库以及在线事务处理 (OLTP)。\n*   **Cloud\
  \ Spanner** 是一种全球分布、强一致性且完全托管的关系型数据库服务，支持结构化数据存储。它适用于各种用例，例如 Web 和移动应用程序、数据仓库以及\
  \ OLTP。\n*   **Cloud Bigtable** 是一种完全托管的 NoSQL 宽列数据库服务，支持结构化和半结构化数据存储。它可用于各种用例，例如\
  \ Web 和移动应用程序、数据仓库以及 OLAP。\n*   **Cloud Datastore** 是一种完全托管的 NoSQL 文档数据库服务，支持结构化和半结构化数据存储。它可用于各种用例，例如\
  \ Web 和移动应用程序、数据仓库以及 OLAP。\n*   **Cloud Memorystore** 是一种内存数据存储服务，支持快速数据访问。它适用于各种用例，例如\
  \ Web 和移动应用程序、数据仓库以及 OLAP。\n\n这些存储选项中的每一个都有其独特的功能和特性。你应该根据所存储数据的类型、数据大小以及应用程序的性能和可扩展性要求，选择最适合你需求的选项。\n\
  \n让我们从云存储开始，更详细地了解每个选项。\n\n\n\n### 云存储\n\nGoogle Cloud Storage 是一种在云端（通过互联网）存储和访问大量数据的方式。它由\
  \ Google 管理，并设计为可扩展，这意味着它可以随着您的存储需求增长而扩展。它具有成本效益，因为您只需为使用的存储量付费。它可以存储各种类型的数据，例如视频、图像和备份。它可用于不同的目的，例如媒体和娱乐、数据仓库以及\
  \ Web 和移动应用程序。\n\nGoogle Cloud Storage 中的存储桶（如图 4-1 所示）就像一个虚拟容器，您可以在其中存储文件，就像您可能使用物理容器在家中存放物品一样。这是一种在云端存储数据的安全且可扩展的方式。您可以根据需要创建、管理和删除存储桶，并控制谁有权访问您存储桶中的文件。可以把它想象成一个巨大的数字盒子，您可以将文件放入其中，然后只要有互联网连接，就可以从任何地方轻松访问这些文件。\n\
  \n![](img/603470_1_En_4_Fig1_HTML.jpg)\n\n存储桶页面的屏幕截图显示了创建或刷新存储桶的选项。它有一个用于过滤存储桶的过滤器，后跟一个包含三列（名称、创建时间和位置类型）和两行（用于不同存储桶）的表格。\n\
  \n图 4-1\n\nCloud Storage 存储桶\n\nCloud Storage 中的对象由一个文件以及包含对象信息（如其名称、大小、内容类型和创建时间）的元数据组成。对象可以存储在以下三种存储类别之一中：\n\
  \n*   *标准*：此类适用于频繁访问的数据，适合存储需要快速检索的数据。\n*   *近线*：此类适用于访问频率较低的数据，适合存储可在几秒或几分钟内检索的数据。\n\
  *   *冷线*：此类适用于访问频率更低的数据，适合存储可在几小时内检索的数据。\n\nGoogle Cloud Storage 是一项在线服务，允许您使用互联网从世界任何地方存储和访问数据。它提供了一个\
  \ API 和基于 Web 的界面，让您可以执行各种操作，例如上传和下载数据、管理元数据以及控制对数据的访问。\n\nCloud Storage 提供了多项功能来帮助您管理和保护数据，例如访问控制、版本控制、生命周期管理、数据完整性、加密、多区域位置和备份。\n\
  \n访问控制允许您通过向单个用户、用户组或服务账号授予权限来决定谁可以访问您的数据。版本控制允许您保留同一对象的多个版本，并在需要时恢复到早期版本。可以设置生命周期管理规则，以自动将对象转换到不同的存储类别或在特定时间段后将其删除。包括校验和在内的数据完整性技术可确保您的数据在存储和检索时不会出错。您还可以使用\
  \ Google 管理的密钥或客户管理的密钥对传输中和静态数据进行加密。Cloud Storage 还提供多区域位置功能，可将数据存储在多个区域，并提供用于数据恢复的备份。\n\
  \nCloud Storage 可用于多种目的，例如备份和归档、数据仓库、媒体和娱乐、协作开发以及 Web 和移动应用程序。它是一种经济高效的存储大量数据的解决方案，并且可以根据需要扩展或缩减。\n\
  \n接下来，我们来谈谈 Cloud SQL。\n\n### Cloud SQL\n\nGoogle Cloud SQL 是 Google Cloud Platform\
  \ 提供的一种完全托管的关系型数据库服务。它允许开发者和组织在云端创建和管理数据库，而无需配置和维护自己的硬件。Cloud SQL 支持流行的数据库引擎，例如\
  \ MySQL、PostgreSQL 和 SQL Server。\n\nAlloyDB 是一种新推出的、完全托管的、兼容 PostgreSQL 的数据库服务，适用于要求苛刻的事务和分析工作负载。它提供企业级的性能和可用性，同时保持与开源\
  \ PostgreSQL 的 100% 兼容性。\n\n您只需点击几下即可创建一个 Cloud SQL 实例，并选择最适合您需求的规模和配置。实例启动并运行后，您可以使用标准\
  \ SQL 命令来创建表、插入数据和查询数据库。图 4-2 显示了 Cloud SQL 实例。\n\n![](img/603470_1_En_4_Fig2_HTML.jpg)\n\
  \nSQL 实例页面的屏幕截图显示了创建实例或迁移数据的选项。它有一个用于输入属性名称或值的过滤器，后跟一个包含三列（名称、创建时间、公共 IP 地址）和一行（例如，实例\
  \ ID student）的表格。\n\n图 4-2\n\nCloud SQL 实例\n\nCloud SQL 提供了几个关键特性和优势。\n\n*   *自动备份*：Cloud\
  \ SQL 会自动创建数据库的备份，可用于在数据丢失或损坏时恢复数据。您也可以随时创建手动备份。\n*   *自动修补*：Cloud SQL 会自动将安全补丁和其他更新应用到您的数据库引擎，而无需停机。\n\
  *   *高可用性*：Cloud SQL 提供高可用性选项，例如故障转移复制和只读副本，这有助于确保您的数据库始终可用，即使在发生故障时也是如此。\n*   *云原生*：Cloud\
  \ SQL 设计为在云端运行，这意味着它可以利用 GCP 的可扩展性和性能。\n*   *数据加密*：Cloud SQL 支持使用 Google 管理的密钥或客户管理的密钥对传输中和静态数据进行加密。\n\
  *   *与其他 GCP 服务集成*：Cloud SQL 可以轻松与其他 GCP 服务集成，例如 App Engine、Kubernetes Engine 和\
  \ Cloud Dataflow。\n*   *复制和故障转移*：Cloud SQL 允许您跨多个可用区或区域为数据库设置复制和故障转移。这确保了您的数据始终可用，并防止特定可用区或区域发生灾难或中断。\n\
  \n您可以使用 Google Cloud Console 或 Cloud SQL API 来创建和管理 Cloud SQL 实例。Google Cloud Console\
  \ 是一个基于 Web 的界面，允许您创建和管理实例、创建和管理数据库以及执行其他任务。Cloud SQL API 允许您以编程方式创建、配置和管理实例和数据库。\n\
  \nCloud SQL 实例有两种类型。\n\n*   第一代（也称为 MySQL 或 PostgreSQL）\n*   第二代（也称为 MySQL 或 PostgreSQL\
  \ 或 SQL Server）\n\nCloud SQL 实例可用于多种目的，例如：\n\n*   为 Web 和移动应用程序存储和管理数据\n*   为数据仓库和分析存储和管理数据\n\
  *   为电子商务和金融系统存储和管理数据\n\nCloud SQL 是一种完全托管、高可用且可扩展的关系型数据库服务，可让您轻松地在云端创建和管理数据库。它非常适合许多用例，并且可以轻松与其他\
  \ GCP 服务集成。\n\n下一节，我们来谈谈 Cloud Spanner。\n\n\n\n### Cloud Spanner\n\nCloud Spanner\
  \ 是 Google Cloud Platform 提供的一种全托管、水平可扩展的关系型数据库服务。它跨多个区域提供 SQL 和事务一致性，是任务关键型全球分布式应用的理想选择。Cloud\
  \ Spanner 支持自动同步复制和自动故障转移，确保高可用性和数据持久性。它还提供强一致性保证，允许即时准确地检索数据。此外，Cloud Spanner 支持使用二级索引、存储过程和触发器，并可通过\
  \ JDBC 和 ODBC 驱动程序以及 REST API 进行访问。Cloud Spanner 可与 Bigtable 和 Cloud Dataflow 等其他\
  \ Google Cloud 服务一起使用，以构建完整的数据处理管道。\n\n您可以通过导航到 Cloud Spanner 控制台来创建 Cloud Spanner\
  \ 实例。点击“创建实例”并提供详细信息，例如实例名称、实例 ID 以及您希望创建实例的区域，然后选择配置选项，例如节点数、实例类型和存储大小。最后点击“创建”即可创建\
  \ Cloud Spanner 实例。\n\n创建 Cloud Spanner 实例后，您就可以开始使用它来存储和检索数据，如图 4-3 所示。您可以创建表并定义其架构，向表中插入数据，并使用\
  \ SQL 查询数据。\n\n![](img/603470_1_En_4_Fig3_HTML.jpg)\n\nSpanner 实例页面的屏幕截图显示了一个创建实例选项。它有一个用于输入属性名称或值的筛选器，以及一个包含\
  \ 4 列（名称、ID、配置和处理单元）和 1 行（主题）的表格。\n\n图 4-3\n\nCloud Spanner 实例\n\n以下是 Google Cloud\
  \ Spanner 的一些主要特性：\n\n*   *水平可扩展*：Cloud Spanner 可以自动水平扩展以处理不断增加的工作负载，无需手动分片或数据分区。\n\
  *   *全球分布*：Cloud Spanner 可以跨多个区域复制数据，为全球用户提供低延迟的数据访问。\n*   *强一致性*：Cloud Spanner\
  \ 提供强一致性保证，确保所有查询都返回最新的数据。\n*   *自动故障转移*：Cloud Spanner 在发生故障时会自动检测并故障转移到副本，确保高可用性。\n\
  *   *SQL 支持*：Cloud Spanner 支持基于 SQL 的查询语言，使熟悉 SQL 的开发人员能够轻松使用该服务。\n*   *二级索引*：Cloud\
  \ Spanner 支持使用二级索引，这可以提高查询性能并实现更高效的数据检索。\n*   *存储过程和触发器*：Cloud Spanner 支持存储过程和触发器，允许进行复杂的数据处理和操作。\n\
  *   *通过 JDBC/ODBC 访问*：Cloud Spanner 可通过 JDBC 和 ODBC 驱动程序访问，便于与各种编程语言和框架集成。\n\n现在我们将讨论\
  \ Cloud Spanner 的用例。\n\n#### Cloud Spanner 的用例\n\nGoogle Cloud Spanner 可用于多种用例；以下是一些示例：\n\
  \n*   *在线事务处理 (OLTP)*：Cloud Spanner 非常适合需要强一致性保证和低延迟的 OLTP 工作负载，例如电子商务、金融和医疗保健应用。例如，电子商务公司可以使用\
  \ Cloud Spanner 处理数百万客户订单和金融交易，确保数据始终是最新且准确的。与 MySQL 或 PostgreSQL 等其他数据库相比，Cloud\
  \ Spanner 提供更强的一致性保证，并能处理更大的工作负载。\n*   *游戏*：Cloud Spanner 可以处理大量并发玩家和实时数据更新，使其适用于需要高可用性和低延迟的游戏应用。例如，移动游戏开发者可以使用\
  \ Cloud Spanner 存储和检索玩家数据及游戏状态，确保游戏始终可用且响应迅速。与 NoSQL 数据库等其他数据库相比，Cloud Spanner 提供更强的一致性保证，并能处理更大的工作负载。\n\
  *   *物联网 (IoT)*：Cloud Spanner 可以处理来自 IoT 设备的高速数据流，并近乎实时地处理和分析这些数据。例如，制造公司可以使用 Cloud\
  \ Spanner 存储和检索其生产线的传感器数据，从而实时监控和优化生产。与时序数据库等其他数据库相比，Cloud Spanner 提供更强的一致性保证，并能处理更大的工作负载。\n\
  *   *媒体与娱乐*：Cloud Spanner 可以处理高流量工作负载，并存储和提供大量多媒体数据，使其适用于媒体和娱乐应用。凭借其强一致性保证、可扩展性和全球分布式架构，Cloud\
  \ Spanner 可以为全球受众提供对多媒体数据的可靠快速访问。\n*   *广告技术*：Cloud Spanner 可以处理高流量和高速数据流，使其适用于需要实时数据处理和分析的广告技术应用。\n\
  *   *供应链管理*：Cloud Spanner 可以处理大量数据并提供供应链的实时可见性，使其适用于供应链管理应用。例如，物流公司可以使用 Cloud Spanner\
  \ 实时跟踪和管理库存、货运和物流。与传统关系型数据库等其他数据库相比，Cloud Spanner 提供更强的一致性保证，并能处理更大的工作负载。\n*   *医疗保健*：Cloud\
  \ Spanner 可以处理大量患者数据并提供实时访问，使其适用于电子健康记录 (EHR) 系统等医疗保健应用。\n*   *金融科技*：Cloud Spanner\
  \ 可以处理大量金融交易并提供对这些数据的实时访问，使其适用于交易平台和欺诈检测系统等金融科技应用。\n\n下一节我们将讨论 Cloud Bigtable。\n\
  \n\n\n### Cloud Bigtable\n\nGoogle Cloud Bigtable 是 Google Cloud Platform 提供的一种全托管、高性能的\
  \ NoSQL 数据库服务。它专为处理海量数据和高流量工作负载而设计，其底层技术正是支撑 Google 搜索和 Google Analytics 等 Google\
  \ 服务的技术。它旨在提供低延迟的快速性能，并且基于与 Google 搜索和 Analytics 等 Google 服务相同的技术。作为一种 NoSQL 数据库，它可以存储和管理各种非结构化和半结构化数据，例如时间序列数据、机器生成的日志和社交媒体数据。Cloud\
  \ Bigtable 是一项全托管服务，这意味着 Google 负责该服务的基础设施、安全性和维护，因此您可以专注于使用它来存储和分析数据。\n\n您可以通过点击仪表板上的“创建实例”按钮来创建一个\
  \ Bigtable 实例。您需要提供实例的名称以及要在实例中使用的节点数量，然后点击“创建”。图 4-4 展示了 Bigtable 实例。\n\n![](img/603470_1_En_4_Fig4_HTML.jpg)\n\
  \nBigtable 实例页面的截图显示了一个创建实例的选项。它有一个用于筛选实例的过滤器，后面是一个包含 4 列（实例 ID、实例名称、应用配置文件、区域和节点）和\
  \ 1 行（ID 为 student performance）的表格。\n\n图 4-4\nBigtable 实例\n\n以下是 Cloud Bigtable\
  \ 的一些关键特性：\n\n*   *水平可扩展*：Cloud Bigtable 可以自动水平扩展以处理不断增加的工作负载，无需手动分片或数据分区。\n*  \
  \ *低延迟*：Cloud Bigtable 提供低延迟的数据访问，使其适用于高流量工作负载，例如实时分析和服务大量数据。\n*   *高性能*：Cloud Bigtable\
  \ 针对高性能数据访问进行了优化，使其适用于大规模数据处理和分析。\n*   *列族数据模型*：Cloud Bigtable 使用针对高性能数据访问优化的列族数据模型，非常适合存储和检索大量数据。\n\
  *   *自动数据压缩*：Cloud Bigtable 会自动压缩数据，从而减少所需的存储空间并提高性能。\n*   *自动故障转移*：Cloud Bigtable\
  \ 会在发生故障时自动检测并故障转移到副本，从而确保高可用性。\n*   *云原生*：Cloud Bigtable 是一项云原生服务，这意味着它专为在云上运行而设计，并且可以利用云的弹性和可扩展性。\n\
  *   *通过 HBase API 访问*：可以通过 HBase API 访问 Cloud Bigtable，这使得它易于与各种编程语言和框架集成。\n\n我们将在下一节讨论\
  \ Cloud Bigtable 的用例。\n\n#### Cloud Bigtable 的用例\n\nGoogle Cloud Bigtable 可用于各种用例，并且最适合高性能、大规模的数据处理和存储。以下是一些示例：\n\
  \n*   *实时分析*：Cloud Bigtable 非常适合实时分析和数据处理，例如跟踪和分析网站流量、社交媒体数据和传感器数据。例如，一家公司可以使用 Cloud\
  \ Bigtable 实时跟踪和分析客户互动，从而做出数据驱动的决策并改善客户体验。\n*   *物联网 (IoT)*：Cloud Bigtable 非常适合处理来自物联网设备（例如传感器数据）的大量数据，并且可以近乎实时地处理和分析这些数据。例如，一家制造公司可以使用\
  \ Cloud Bigtable 存储和检索其生产线上的传感器数据，从而实时监控和优化生产。\n*   *游戏*：Cloud Bigtable 可以处理大量并发玩家和实时数据更新，使其适用于需要高性能和低延迟数据访问的游戏应用。例如，移动游戏开发者可以使用\
  \ Cloud Bigtable 存储和检索玩家数据及游戏状态，确保游戏始终可用且响应迅速。\n*   *广告技术*：Cloud Bigtable 非常适合处理大量数据并为广告技术提供实时可见性，例如存储和分析广告展示、竞价请求和其他广告相关数据。例如，广告网络可以使用\
  \ Cloud Bigtable 跟踪和分析广告效果，从而做出数据驱动的决策并改进广告定向。\n*   *基因组数据*：Cloud Bigtable 非常适合处理大规模基因组数据并提供数据的实时可见性。例如，一家生物技术公司可以使用\
  \ Cloud Bigtable 存储和分析基因组数据，从而做出数据驱动的决策并改进其研究。\n\nCloud Bigtable 最适合高性能、大规模的数据处理和存储。它非常适合需要实时数据访问和处理、低延迟数据访问以及高可用性的用例。\n\
  \n在下一节中，我们将讨论 Cloud Datastore。\n\n\n\n### Cloud Datastore\n\nGoogle Cloud Datastore\
  \ 是一项完全托管的 NoSQL 文档数据库服务，是 Google Cloud Platform 的一部分。它旨在帮助开发人员为其 Web 和移动应用程序存储和管理结构化数据。作为一种\
  \ NoSQL 数据库，它提供了一种灵活且可扩展的解决方案，用于以非关系格式存储数据。这意味着 Datastore 可以处理不同的数据类型和结构，例如嵌套数据和数组，这对于存储无法整齐地放入传统关系数据库的数据非常有用。\n\
  \nDatastore 是完全托管的，这意味着 Google 负责该服务的底层基础设施、安全性和维护。这使得开发人员可以专注于构建他们的应用程序，并使用 Datastore\
  \ 来存储和检索数据。Datastore 也是可扩展的，允许开发人员从少量数据开始，然后随着应用程序的增长进行扩展。\n\nDatastore 用于许多不同类型的应用程序，例如电子商务、社交媒体和游戏。它特别适用于需要存储和查询大量结构化数据的应用程序，例如用户配置文件或产品目录。此外，Datastore\
  \ 还提供索引和查询等功能，使开发人员能够快速轻松地搜索和过滤数据。\n\n要创建 Google Cloud Datastore 实例，请打开 Datastore\
  \ 仪表板，并通过提供实例名称和存储类型来创建一个实例，如图 4-5 所示。\n\n创建 Datastore 实例后，您可以使用 Google Cloud Datastore\
  \ API 或 Cloud Console 访问它。您可以使用 API 执行读取和写入数据、管理索引以及控制对数据的访问等操作。Cloud Console 提供了一个基于\
  \ Web 的界面，允许您通过图形用户界面与数据进行交互。\n\n![](img/603470_1_En_4_Fig5_HTML.jpg)\n\n一个 Datastore\
  \ 页面的截图，其中包含一个创建实体的选项，后面是一个按种类查询的选项卡。它有一个运行按钮、一个输入种类的文本框、一个用于添加到查询的下拉菜单，以及查询结果下的名称或\
  \ ID 列。\n\n图 4-5\n\nCloud Datastore\n\n以下是 Cloud Datastore 的一些关键特性：\n\n*   *无模式数据模型*：Cloud\
  \ Datastore 使用无模式数据模型，这意味着它不对数据强制执行固定模式，从而在数据结构方面提供了更大的灵活性。\n\n*   *自动分片*：Cloud\
  \ Datastore 自动对数据进行分片，以处理不断增加的工作负载，而无需手动分区数据。Datastore 使用键的值生成一个哈希值，该哈希值决定实体存储在哪个服务器上。Datastore\
  \ 使用的哈希函数旨在将实体均匀分布在各个服务器上，以确保负载均衡和最佳性能。\n\n*   *高可用性*：Cloud Datastore 自动将数据复制到多个数据中心，以确保高可用性，即使在发生故障时也是如此。它为区域实例提供\
  \ 99.99% 的服务等级协议 (SLA)，为多区域实例提供 99.999% 的 SLA。\n\n*   *云原生*：Cloud Datastore 是一项云原生服务，这意味着它专为在云上运行而设计，并且可以利用云的扩展性和弹性。\n\
  \n*   *通过 Google Cloud SDK 访问*：Cloud Datastore 可以通过 Google Cloud SDK 访问，这使得它易于与各种编程语言和框架集成。\n\
  \n*   *一致性*：Cloud Datastore 支持强一致性和最终一致性。\n\n*   *数据类型*：Cloud Datastore 支持多种数据类型，包括字符串、整数、浮点数、日期和二进制数据。\n\
  \nCloud Datastore 可用于各种用例，例如 Web 和移动应用程序、游戏、物联网、电子商务等。它最适合需要灵活且可扩展的数据存储，且不需要复杂 SQL\
  \ 查询或高级索引的用例。\n\n接下来，我们将讨论 Cloud Datastore 的用例。\n\n#### Cloud Datastore 的用例\n\n\
  Cloud Datastore 是 Google Cloud Platform 提供的一种 NoSQL 文档数据库，用于在云中存储和查询数据。它旨在处理大量结构化和半结构化数据。它非常适合涉及存储和查询大量数据且需要高可用性和低延迟的用例。\n\
  \nCloud Datastore 的一个示例用例是社交媒体应用程序，它需要存储和检索用户配置文件、帖子和评论。每个用户配置文件、帖子和评论的数据都可以作为单独的文档存储在\
  \ Cloud Datastore 中。该应用程序可以使用 Cloud Datastore 的查询功能来检索特定用户或用户组的数据。\n\nCloud Datastore\
  \ 的另一个示例用例是电子商务应用程序，它需要存储和检索产品信息和客户订单。每个产品和客户订单的数据都可以作为单独的文档存储在 Cloud Datastore\
  \ 中。该应用程序可以使用 Cloud Datastore 的查询功能来检索特定产品或产品组的数据。\n\nCloud Datastore 是这些用例的不错选择，因为它提供了一种灵活且可扩展的解决方案，用于在云中存储和查询数据。它可以处理大量数据，并根据需要自动扩展或缩减以满足应用程序的性能和可用性要求。此外，Cloud\
  \ Datastore 提供强一致性保证、自动索引和内置事务支持，这使其非常适合涉及存储和查询大量数据且需要高可用性和低延迟的用例。\n\nDatastore\
  \ 可用于各种用例，包括以下内容：\n\n*   为 Web 和移动应用程序存储和检索用户数据。\n\n*   存储和查询数据以进行分析和报告。\n\n*  \
  \ 为机器学习和人工智能应用程序存储和检索数据。\n\n*   为数据湖和数据仓库存储和管理元数据。\n\n*   为物联网应用程序存储和管理时间序列数据。在物联网应用程序中，时间序列数据可以包括传感器数据、日志和其他需要实时收集、分析和存储的机器生成数据。\n\
  \n*   为实时和离线处理存储和管理数据。\n\n*   为备份和灾难恢复存储和管理数据。您可以使用它来存储应用程序中关键数据的备份副本，例如配置文件、用户数据和日志。您还可以使用\
  \ Datastore 跨多个区域复制数据，以确保在发生灾难时的数据持久性和高可用性。\n\n*   为内容管理系统存储和管理数据。\n\n*   为电子商务和在线市场存储和管理数据。\n\
  \n*   为游戏和社交媒体平台存储和管理数据。\n\nCloud Datastore 可以通过多种不同的方式和技术实现，例如数据库、云存储，甚至简单的文件系统。\n\
  \n在下一节中，我们将讨论 Cloud Memorystore。\n\n\n\n### Cloud Memorystore（云内存存储）\n\nCloud Memorystore\
  \ 是 Google Cloud Platform 提供的一种全托管式内存数据存储服务。它基于开源的 Redis 协议，能够实时存储、检索和操作数据。\n\n\
  您可以通过在 Memorystore 控制面板上点击“创建实例”来创建 Memorystore 实例。您可以选择 Redis Memorystore 选项，选择实例位置和内存大小，并为实例命名，如图\
  \ 4-6 所示。\n\n![](img/603470_1_En_4_Fig6_HTML.jpg)\n\n内存存储页面的截图显示了创建实例的选项，随后是选中 Redis\
  \ 的选项卡。它有一个用于输入属性名称或值的筛选器，一个包含实例 ID、类型、版本、位置和主端点这 5 列以及 1 行主题 ID 的表格。\n\n图 4-6\n\
  \nCloud Memorystore（云内存存储）\n\nCloud Memorystore 专为需要低延迟、高吞吐量数据访问的场景而设计，例如游戏、实时分析和会话管理。它既可以用作频繁访问数据的缓存，也可以用作实时数据处理的主数据存储。\n\
  \n以下是 Cloud Memorystore 的一些特性：\n\n*   自动故障转移和复制，以实现高可用性和灾难恢复\n*   纵向扩展和缩减能力，以应对工作负载的变化\n\
  *   对静态数据和传输中数据进行加密\n*   与其他 GCP 服务集成，例如 Cloud Load Balancing、Cloud Firewall 以及\
  \ Cloud Monitoring and Logging\n\nCloud Memorystore 还提供两个服务层级。\n\n*   *标准层级*：在性能和成本之间取得平衡，每个实例最大存储容量为\
  \ 30 GB。\n*   *Memorystore for Redis*：提供更高级别的性能和更大的存储容量，最高可达 100 TB。\n\n它对于游戏、实时分析、会话管理、缓存等多种应用场景都很有帮助。\n\
  \n我们来谈谈 Memorystore。\n\n#### Memorystore 的特性\n\n以下是 Google Cloud Memorystore 的一些主要特性：\n\
  \n*   *内存数据存储*：Cloud Memorystore 是一种内存数据存储，它将数据存储在随机存取存储器 (RAM) 中，提供低延迟和高吞吐量的数据访问。\n\
  *   *Redis 兼容性*：Cloud Memorystore 基于开源的 Redis 协议，并与 Redis 客户端、命令和数据结构兼容。\n*   *自动故障转移和复制*：Cloud\
  \ Memorystore 会自动跨多个区域复制数据，以实现高可用性和灾难恢复。\n*   *纵向扩展和缩减能力*：Cloud Memorystore 可以自动纵向扩展或缩减，以应对工作负载的变化。\n\
  *   *加密*：Cloud Memorystore 对静态数据和传输中数据进行加密，以提供额外的安全层。\n*   *与其他 GCP 服务集成*：Cloud\
  \ Memorystore 可以与其他 GCP 服务集成，例如 Cloud Load Balancing、Cloud Firewall 以及 Cloud Monitoring\
  \ and Logging。\n*   *标准层级和 Memorystore for Redis 层级*：Cloud Memorystore 提供两个服务层级：标准层级和\
  \ Memorystore for Redis 层级。标准层级在性能和成本之间取得平衡，而 Memorystore for Redis 层级则提供更高级别的性能和更大的存储容量。\n\
  *   *灵活的部署选项*：Cloud Memorystore 可以部署在本地、混合环境或云端。\n*   *Cloud Memorystore for Firebase*：Cloud\
  \ Memorystore for Firebase 允许从 Firebase 客户端 SDK 快速安全地访问 Cloud Memorystore，从而实现实时数据访问和轻松扩展。\n\
  *   *监控和日志记录*：Cloud Memorystore 提供详细的监控和日志记录功能，帮助您了解数据存储的性能和使用情况。\n\n接下来，我们将在下一节讨论\
  \ Memorystore 的使用场景。\n\n##### Memorystore 的使用场景\n\nCloud Memorystore 可用于多种场景；以下是一些示例：\n\
  \n*   *缓存*：Cloud Memorystore 可用作频繁访问数据的缓存，例如网页内容、图像和会话数据。将数据缓存在内存中可以显著减少响应时间，并提高应用程序的整体性能。\n\
  *   *游戏*：Cloud Memorystore 可以实时存储游戏状态、玩家数据和排行榜。其低延迟和高吞吐量的特性使其非常适合处理游戏应用中的大量数据和高并发需求。\n\
  *   *实时分析*：Cloud Memorystore 可以实时存储和处理大量数据。这对于日志分析、欺诈检测和客户行为跟踪等场景非常有用。\n*   *会话管理*：Cloud\
  \ Memorystore 可以存储 Web 应用程序的会话数据。将会话数据存储在内存中可以提高应用程序的性能和可扩展性。\n*   *电子商务*：Cloud\
  \ Memorystore 可以存储和检索电子商务应用程序的数据，例如产品信息、用户资料和购物车数据。\n*   *物联网*：Cloud Memorystore\
  \ 可以存储和管理物联网应用的时间序列数据，例如传感器数据、设备状态和遥测数据。\n*   *社交媒体*：Cloud Memorystore 可以存储和检索社交媒体平台的数据，例如用户资料、帖子和评论。\n\
  *   *用户会话数据*：Cloud Memorystore 可以存储用户会话数据，例如用户资料、购物车和订单历史。\n*   *用作消息代理*：Cloud Memorystore\
  \ 也可以用作消息代理，这有助于解耦消息的发送者和接收者。它还有助于实现发布-订阅模式，即向所有订阅者发送消息。\n\n根据您应用程序的具体需求，Cloud Memorystore\
  \ 还有许多其他用途。\n\n现在您应该对 Cloud SQL 和 Cloud Spanner 有了更好的理解。让我们在下一节中对两者进行比较。\n\n\n\n\
  ### Cloud SQL 与 Cloud Spanner 对比\n\n决定为您的应用选择 Cloud SQL 还是 Cloud Spanner，可能取决于多种因素，包括您的数据模型、性能需求以及用例。以下是决策时需要考虑的几个关键点：\n\
  \n*   *数据模型*：Cloud SQL 是一种关系型数据库管理系统 (RDBMS)，使用表、行和列来组织数据。它最适合需要传统关系数据模型的应用。另一方面，Cloud\
  \ Spanner 是一种全球分布式的关系型数据库服务，它结合了关系型和非关系型数据模型。它最适合需要高度可扩展、全球分布式数据模型的应用。\n\n*   *性能*：Cloud\
  \ SQL 是那些需要高性能但无需全球扩展的应用的不错选择。而 Cloud Spanner 则是需要高性能和全球可扩展性的应用的理想选择。\n\n*   *用例*：Cloud\
  \ SQL 通常用于读写流量适中的中小型应用，并能处理结构化和半结构化数据。Cloud Spanner 通常用于读写流量高的大型应用，并能处理结构化和半结构化数据。\n\
  \n*   *一致性与可用性*：Cloud SQL 提供最终一致性，最适合能容忍一定程度不一致性的用例。而 Cloud Spanner 提供强一致性，最适合需要强一致性的用例。Cloud\
  \ Spanner 的强一致性和自动故障转移功能使其非常适合需要高可用性和灾难恢复的应用。\n\n*   *成本*：Cloud Spanner 比 Cloud\
  \ SQL 昂贵得多。这是因为 Cloud Spanner 提供了额外的特性和功能，例如全球可扩展性、强一致性和自动故障转移。\n\n最适合您应用的选择可能取决于多种因素。建议根据您的具体用例，全面评估这两个选项，然后做出最符合您业务需求的决策。为了充分利用\
  \ Cloud Spanner 的能力，应用应设计为无状态并部署在多个区域。Cloud Spanner 旨在提供强一致性和高可用性，这意味着它可以跨多个区域处理实时数据操作。这要求应用具备处理来自任何区域请求的能力，并能够通过故障转移到另一个区域来从一个区域的故障中恢复。通过设计应用以利用\
  \ Cloud Spanner 的能力，组织可以实现高可用、全局一致且可扩展的系统。\n\n现在，我们来谈谈在哪些情况下应该使用 Cloud Spanner 而非\
  \ Cloud SQL。\n\n#### 何时使用 Cloud Spanner 而非 Cloud SQL\n\n一个 Cloud Spanner 可能比 Cloud\
  \ SQL 更合适的真实用例是大型全球电子商务平台。\n\n电子商务平台必须同时处理大量事务和用户查询，以及海量数据。它需要全球可用并能处理数据不一致性。此外，它需要确保客户的财务信息始终安全可用，并且客户的订单能被正确处理。\n\
  \n在这种情况下，Cloud Spanner 可能是一个很好的选择，因为它提供全球分布式数据存储，允许平台跨多个区域存储数据，并自动复制数据以实现高可用性和灾难恢复。它还提供强一致性，确保所有数据库节点同时看到相同的数据。当应用需要跨所有节点获得一致的数据视图时，这非常有用。这对于电子商务平台至关重要，因为它需要为客户财务信息和订单维护单一事实来源。\n\
  \n另一方面，Cloud SQL 可能不是此用例的最佳选择，因为它无法提供与 Cloud Spanner 相同级别的全球可扩展性和强一致性。此外，Cloud Spanner\
  \ 不具备相同的安全特性和自动故障转移能力。\n\n在这个例子中，电子商务平台将从 Cloud Spanner 的全球可扩展性和强一致性中受益，这将使其能够处理海量数据，确保数据可用性和一致性，并为客户提供一个安全可靠的平台。\n\
  \n在下一节中，我们将讨论在哪些情况下使用 Cloud SQL 比 Cloud Spanner 更好。\n\n#### 何时使用 Cloud SQL 而非 Cloud\
  \ Spanner\n\n一个 Cloud SQL/AlloyDB 可能比 Cloud Spanner 更合适的真实例子是，当一个小型非营利组织需要存储和管理其捐赠者信息时。该组织可能只有少量捐赠者，需要存储的数据包括捐赠者姓名、联系方式、捐赠历史和捐赠偏好等基本信息。该组织的网站流量可能适中，任何时候只有少量捐赠者更新信息或进行捐赠。\n\
  \n在这种情况下，Cloud SQL 比 Cloud Spanner 更合适，因为该组织的需求相对简单，不需要 Cloud Spanner 提供的高可扩展性和全局一致性功能。Cloud\
  \ SQL 提供了一个熟悉且易于使用的关系型数据库管理系统，可以处理该组织适中的流量，而且该组织的预算可能无法支持 Cloud Spanner 的相关成本。此外，该组织可能没有太多数据库经验，因此使用\
  \ Cloud SQL 会不那么令人生畏，也更容易管理。\n\n另一个例子是，一个仅服务于特定区域客户的小型电子商务网站，可能不需要 Cloud Spanner\
  \ 提供的全球可扩展性和高可用性。相反，Cloud SQL 可能是存储和管理其数据更具成本效益且更简单的选择。\n\n如果应用的数据是结构化的，并且不需要复杂的事务或严格的一致性保证，那么\
  \ Cloud SQL 也是一个不错的选择。Cloud SQL 是一种完全托管的关系型数据库服务，支持 MySQL 和 PostgreSQL 等流行的数据库引擎，对于熟悉这些技术的开发人员来说，这是一个直接明了的选择。\n\
  \n简而言之，对于需要存储和管理相对简单的结构化数据、读写操作规模较小的组织来说，Cloud SQL 是一种经济高效且易于使用的选择。它适用于预算和数据库管理专业知识有限，且组织需求不像大型企业那样苛刻的情况。\n\
  \n如果您的应用需要复杂的 SQL 查询或涉及大量的表连接，那么 Cloud SQL 可能更合适。此外，如果您的应用需要支持 Cloud Spanner 当前不可用的某些数据库功能，例如存储过程或用户定义函数，那么\
  \ Cloud SQL 可能是更好的选择。\n\n在下一节中，我们将比较 Cloud Spanner 与 Cloud Datastore。\n\n\n\n###\
  \ Cloud Spanner 与 Cloud Datastore 对比\n\n在为您的应用选择 Cloud Spanner 还是 Cloud Datastore\
  \ 时，取决于多种因素，包括您的数据模型、性能需求以及使用场景。以下是一些需要考虑的关键点：\n\n*   *数据模型*：Cloud Spanner 可配置为全球分布式关系型数据库服务，融合了关系型和非关系型数据模型。它最适合需要高度可扩展、全球分布式数据模型和结构化数据的应用。另一方面，Cloud\
  \ Datastore 是一种 NoSQL 文档数据库服务，采用灵活的分层数据模型。它最适合需要灵活、非规范化数据模型以及半结构化或非结构化数据的应用。\n\n\
  *   *性能*：Cloud Spanner 是那些需要高性能但无需全球扩展的应用的理想选择。而 Cloud Datastore 则适合需要高性能和全球可扩展性的应用。\n\
  \n*   *使用场景*：Cloud Spanner 通常用于具有高读写流量的大型应用，并能处理结构化数据。Cloud Datastore 通常用于读写流量适中的中小型应用，并能处理半结构化和非结构化数据。\n\
  \n*   *一致性与可用性*：Cloud Spanner 提供强一致性，最适合需要强一致性的场景。而 Cloud Datastore 提供最终一致性，最适合能够容忍一定程度不一致性的场景。Cloud\
  \ Spanner 的强一致性和自动故障转移功能使其非常适合需要高可用性和灾难恢复的应用。\n\n*   *成本*：Cloud Spanner 通常比 Cloud\
  \ Datastore 更昂贵。这是因为 Cloud Spanner 提供了额外的特性和功能，例如全球可扩展性、强一致性和自动故障转移。\n\n最适合您应用的选择可能取决于多种因素。建议根据您的具体使用场景，全面评估这两种方案，并做出最符合您业务需求的决策。\n\
  \n在下一节中，我们将讨论在哪些情况下应优先使用 Cloud Datastore 而非 Cloud Spanner。\n\n#### 何时使用 Cloud Datastore\
  \ 而非 Cloud Spanner\n\nCloud Datastore 是一种 NoSQL 文档数据库，适用于存储和检索半结构化数据，例如 JSON 或 XML\
  \ 文档。它是一种完全托管式服务，提供可扩展性、自动分片和灵活的模式。\n\n另一方面，Cloud Spanner 是一种关系型数据库，提供更强的一致性，旨在全球范围内处理结构化数据。它适用于需要跨多个区域的事务一致性和高可用性的场景。然而，与\
  \ Cloud Datastore 相比，Cloud Spanner 的设置和维护可能更复杂且更昂贵。\n\n如果您要存储的数据是半结构化的，并且不需要全局一致性或事务能力，那么\
  \ Cloud Datastore 可能是更好的选择。它使用更简单，并且可以随着数据增长自动扩展。但是，如果您需要跨多个区域的强一致性和事务能力，那么 Cloud\
  \ Spanner 可能是更好的选择，尽管它可能需要更多的精力和资源来设置和维护。\n\n例如，考虑一家开发移动应用的公司，该应用允许用户记录和追踪他们的户外活动，如徒步、骑行、跑步等。该应用需要存储大量位置数据，包括\
  \ GPS 坐标、时间戳和用户生成的评论。这些数据是半结构化的，意味着它们不太适合传统的关系型数据库结构。该应用还需要处理大量的写入操作，因为用户会实时更新他们的活动。\n\
  \n在这种情况下，Cloud Datastore 比 Cloud Spanner 更合适，因为存储的数据是半结构化的，并且应用不需要复杂的数据事务或连接操作。Cloud\
  \ Datastore 是一种专为处理半结构化数据而设计的 NoSQL 文档数据库，提供自动扩展和高可用性。此外，Cloud Datastore 易于使用，不需要大量的数据库管理专业知识。\n\
  \n在这种情况下，使用 Cloud Datastore 的另一个优势是它构建在 Google 的基础设施之上，专为处理高写入负载而设计；这对于需要实时处理大量位置数据更新的移动应用至关重要。\n\
  \n再举一个例子，考虑一个允许用户创建和分享文本、图片和视频等内容的社交媒体平台。该平台需要存储用户信息（如姓名和联系方式），以及用户创建和分享的内容。该平台还需要处理中等流量的访问，在任何时候都有大量用户创建和查看内容。\n\
  \n在这种情况下，Cloud Datastore 比 Cloud Spanner 更合适，因为该平台的需求相对简单，不需要 Cloud Spanner 提供的高度可扩展性和全局一致性功能。Cloud\
  \ Datastore 是一种专为处理非结构化数据而设计的 NoSQL 文档数据库服务，易于扩展。此外，对于这种使用场景，Cloud Datastore 是一种经济高效的解决方案，因为它不需要像\
  \ Cloud Spanner 那样的复杂性和资源。\n\n在前一个案例中，使用 Cloud Datastore 的另一个优势是能够处理大量用户请求，并以灵活且可扩展的方式存储数据。它可以处理大量用户的数据并对其执行查询，这对于社交媒体平台向用户提供个性化推荐和推广是必要的。\n\
  \n简而言之，Cloud Datastore 适用于存储和管理非结构化、半结构化或非关系型数据，且不需要复杂数据事务或连接操作的组织。它特别适用于组织需要处理大量写入操作，且数据不太适合传统关系型数据库结构的情况。对于那些需求不如需要\
  \ Cloud Spanner 提供的可扩展性和全局一致性的大型企业那么苛刻的组织来说，它是一种经济高效且易于使用的选择。\n\n现在，让我们在下一节中讨论 Cloud\
  \ Datastore 优于 Cloud SQL 的情况。\n\n\n\n#### 何时使用 Cloud Datastore 而非 Cloud SQL\n\n\
  一个实际场景中，Cloud Datastore 可能比 Cloud SQL 更合适，即当公司需要存储和管理半结构化或非结构化数据（例如 JSON），且不需要 Cloud\
  \ SQL 提供的关系型结构时。\n\n例如，考虑一家开发和发布手机游戏的游戏公司。该公司需要存储玩家信息，如玩家姓名、等级、成就，以及玩家在游戏中的事件和操作。该公司还需要在任何给定时间处理大量玩家和事件。\n\
  \n在这种情况下，Cloud Datastore 比 Cloud SQL 更合适，因为公司的数据是半结构化的，且不需要 Cloud SQL 提供的关系型结构。Cloud\
  \ Datastore 是一种 NoSQL 文档数据库服务，专为处理非结构化数据而设计，易于扩展，非常适合此用例。此外，Cloud Datastore 允许公司以多种方式对数据进行索引和查询，使其易于扩展。它可以处理来自玩家的大量请求。\n\
  \n在这种情况下，使用 Cloud Datastore 的另一个优势是能够实时处理大量玩家和事件，并以灵活且可扩展的方式存储它们。它可以处理大量玩家数据并对其执行查询，这对于游戏公司向玩家提供个性化推荐和促销活动是必要的。\n\
  \n再举一个例子，考虑一家物联网公司，需要存储和管理来自许多设备的传感器数据。传感器数据是非结构化的，包含各种数据类型，如文本、图像和视频，并且可能具有不同的格式和结构。该公司还需要随时处理来自设备的大量读写操作。\n\
  \n在这种情况下，Cloud Datastore 比 Cloud SQL 更合适，因为公司的需求要求很高，需要高水平的可扩展性。Cloud Datastore\
  \ 专为处理非结构化数据而设计，并且可以轻松扩展以处理大量数据。Cloud Datastore 是一种 NoSQL 文档数据库服务，不需要像 Cloud SQL\
  \ 那样复杂和占用资源，因此是一种经济高效的解决方案。\n\n在前一种情况下，使用 Cloud Datastore 的另一个优势是能够处理来自设备的大量请求，并以灵活且可扩展的方式存储数据。它可以处理大量数据并对其执行查询，这对于物联网公司执行数据分析和进行预测是必要的。\n\
  \n简而言之，Cloud Datastore 适用于组织需要存储和管理半结构化或非结构化数据（例如 JSON），并且具有大规模读写操作的情况。对于需求不如大型企业那么苛刻，且组织不需要\
  \ Cloud SQL 提供的关系型结构的情况，它是一种经济高效且易于使用的选择。\n\n现在，让我们在下一节讨论何时使用 Cloud SQL 而非 Cloud\
  \ Datastore。\n\n#### 何时使用 Cloud SQL 而非 Cloud Datastore\n\n一个场景中，Cloud SQL 可能比 Cloud\
  \ Datastore 更合适，即当公司需要存储和管理遵循特定模式的结构化数据，并且需要 Cloud SQL 提供的传统关系型数据库的全部功能时。\n\n例如，考虑一家电子商务公司，需要存储和管理客户信息、库存和销售数据。这些数据是结构化的，并遵循特定的模式，例如客户信息包含姓名、地址和联系方式等字段。该公司还需要随时处理来自客户和员工的中等数量的读写操作。\n\
  \n在这种情况下，Cloud SQL 比 Cloud Datastore 更合适，因为公司的需求相对复杂，需要传统关系型数据库的全部功能。Cloud SQL 是一种完全托管的关系型数据库服务，支持\
  \ SQL（管理和查询关系型数据的行业标准语言）。它提供了事务、索引和存储过程等功能。在这种情况下，Cloud SQL 更具成本效益，因为它不需要像 Cloud\
  \ Datastore 那样复杂和占用资源。\n\n在这种情况下，使用 Cloud SQL 的另一个优势是能够对数据执行复杂查询，并提供了一种强制数据完整性和一致性的方法。这对于电子商务公司向客户和员工提供准确信息并防止系统错误是必要的。\n\
  \n再举一个例子，考虑一家金融公司，需要存储和管理金融交易和客户信息。这些数据是高度结构化的，并且需要遵守严格的法规。该公司还必须处理复杂的查询和数据分析，并运行高级报告和合规性检查。\n\
  \n在这种情况下，Cloud SQL 比 Cloud Datastore 更合适，因为公司的需求要求很高，需要传统关系型数据库的全部功能。Cloud SQL 是一种完全托管的关系型数据库服务，提供高级功能，例如支持\
  \ SQL、静态数据加密和高可用性选项。此外，Cloud SQL 允许进行复杂查询和高级报告，这对于金融公司执行数据分析和遵守法规是必要的。\n\n在这种情况下，使用\
  \ Cloud SQL 的另一个优势是能够处理大量复杂查询，并以保证数据完整性和一致性的结构化方式存储数据。它还具有高级安全选项和合规性功能，这对于金融公司保护敏感数据和遵守法规是必要的。\n\
  \n简而言之，Cloud SQL 适用于组织需要存储和管理遵循特定模式的结构化数据，并且具有中等规模读写操作的情况。对于组织需求相对复杂，且需要 Cloud SQL\
  \ 提供的传统关系型数据库的全部功能的情况，它是一种经济高效且易于使用的选择。\n\n现在，让我们看看如何使用 Java 代码与 Cloud Storage 交互。\n\
  \n## 使用 Java 与 Cloud Storage 交互\n\n以下是一个使用 Google Cloud Storage API 与 Cloud Storage\
  \ 交互的 Java 项目示例：\n\n1.  在 Google Cloud Console 中设置一个项目，并启用 Google Cloud Storage\
  \ API。\n\n2.  为你的项目创建凭据，例如 API 密钥或服务账号密钥。\n\n3.  使用诸如 Google Cloud Storage Java\
  \ Client 之类的库与 API 交互。\n\n清单 4-1 展示了如何与 Google Cloud Storage 交互的示例。\n\n```\n// 导入\
  \ Google Cloud Storage Java Client 库\nimport com.google.cloud.storage.Storage;\n\
  import com.google.cloud.storage.StorageOptions;\npublic class CloudStorageExample\
  \ {\npublic static void main(String[] args) {\n// 创建一个存储客户端\nStorage storage = StorageOptions.getDefaultInstance().getService();\n\
  // 列出项目中的所有存储桶\nfor (Bucket bucket : storage.list().iterateAll()) {\nSystem.out.println(bucket.getName());\n\
  }\n}\n}\n清单 4-1\n用于与 Cloud Storage 交互的 Java 代码\n```\n\n你可以在 [`https://cloud.google.com/storage/docs/reference/libraries#client-libraries-install-java`](https://cloud.google.com/storage/docs/reference/libraries%2523client-libraries-install-java)\
  \ 找到更多详细信息。\n\n你也可以使用其他库，例如 Apache Hadoop，它提供了与其他云存储服务（如 Amazon S3、Microsoft Azure\
  \ 等）交互的支持。\n\n下一步是创建一个存储桶，并使用 Java 将文件上传到该存储桶。我们将在下一节讨论这个问题。\n\n\n\n### 用于创建存储桶并将文件上传至存储桶的\
  \ Java 代码\n\n以下是一个 Java 项目示例，演示如何连接到云存储服务、创建存储桶，并使用 Google Cloud Storage API 将文件上传到该存储桶：\n\
  \n1.  在你偏好的集成开发环境（IDE）中创建一个新的 Java 项目。\n\n2.  将 Google Cloud Storage API 依赖项添加到项目的\
