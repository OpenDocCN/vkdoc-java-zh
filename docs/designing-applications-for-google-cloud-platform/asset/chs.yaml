  \ GCP 项目，请按照以下步骤操作：\n\n1.  访问 Google Cloud 控制台 ([`https://console.cloud.google.com/`](https://console.cloud.google.com/))。\n\
  \n2.  点击项目下拉菜单，选择或创建你想要使用的项目。\n\n3.  点击汉堡菜单 (☰)，然后选择 APIs & Services ➤ Dashboard。\n\
  \n4.  点击页面顶部的“启用 API 和服务”按钮。\n\n5.  搜索你想要启用的 API 并点击它。\n\n6.  点击“启用”按钮。\n\n7.  为该\
  \ API 设置必要的凭据，例如 API 密钥或 OAuth 客户端 ID。\n\n8.  通过引用必要的客户端库并使用你设置的凭据，在你的应用程序中使用该 API。\n\
  \n或者，使用 Google Cloud SDK 通过命令行创建和管理项目。请按照以下步骤操作：\n\n1.  安装 Google Cloud SDK。\n\n\
  2.  打开命令行界面 (CLI) 或终端。\n\n3.  运行命令 `gcloud init` 来初始化 SDK。\n\n4.  运行命令 `gcloud projects\
  \ create <project-name>` 来创建一个新项目。\n\n5.  运行命令 `gcloud projects list` 来验证项目是否已创建。\n\
  \n6.  最后，运行命令 `gcloud config set project <project-name>` 来设置活动项目。\n\n现在，你可以使用 SDK\
  \ 来管理你的项目，例如创建和管理资源与服务。\n\n注意\n\n你必须拥有有效的结算账户和创建项目的权限。\n\n\n\n### 设置凭据\n\nAPI 密钥、OAuth\
  \ 客户端 ID、服务账号和用户账号都是用于对 Google Cloud Platform 上各项服务的访问进行身份验证和授权的凭据类型。这些都是证明你有权限访问\
  \ Google Cloud Platform 上特定资源的不同方式。\n\n*API 密钥*是一个简单的字符串，用于向 GCP 服务标识你的应用。它通常用于访问不需要用户身份验证的公共数据或服务。\n\
  \n*OAuth 客户端 ID* 用于代表用户对访问受保护资源的用户进行身份验证和授权。它用于在你的应用和 GCP 服务之间启用单点登录（SSO）。\n\n*服务账号*是一种特殊账号，用于以编程方式访问\
  \ GCP 服务和资源。服务账号通常用于服务器到服务器的交互和自动化。\n\n*用户账号*是标识单个用户的账号，用于授予其对 GCP 资源的访问权限。用户账号可以通过\
  \ Google Cloud Console 创建和管理。\n\n在 Google Cloud Platform 上设置凭据，可以让你的应用与各种 GCP 服务进行身份验证和授权。以下是在\
  \ GCP 上设置凭据的一般步骤：\n\n![](img/603470_1_En_2_Fig9_HTML.jpg)\n\n服务账号创建页面的截图，包含 3 个步骤。步骤\
  \ 1 是服务账号详细信息，包含账号名称、ID 和描述的文本框。步骤 2 是服务账号对项目的访问权限，步骤 3 是授予用户对服务账号的访问权限。\n\n图 2-9\n\
  \n创建服务账号\n\n![](img/603470_1_En_2_Fig8_HTML.jpg)\n\n凭据页面的截图，包含创建、删除和恢复已删除凭据的选项。它有一个弹出窗口，包含\
  \ 4 行，分别对应 API 密钥、OAuth 客户端 ID、服务账号和“帮我选择”的详细信息，其中第二行用箭头指示。\n\n图 2-8\n\nOAuth 客户端\
  \ ID\n\n![](img/603470_1_En_2_Fig7_HTML.jpg)\n\n凭据页面的截图，包含创建、删除和恢复已删除凭据的选项。它有一个弹出窗口，包含\
  \ 4 行，分别对应 API 密钥、OAuth 客户端 ID、服务账号和“帮我选择”的详细信息，其中第一行用箭头指示。\n\n图 2-7\n\nAPI 密钥\n\
  \n![](img/603470_1_En_2_Fig6_HTML.jpg)\n\n凭据页面的截图，包含创建、删除和恢复已删除凭据的选项。它有一个表格，用于显示\
  \ API 密钥和 OAuth 2.0 客户端 ID，包含“名称”和“创建日期”两列，且没有数据行。页面底部有两行用于服务账号。\n\n图 2-6\n\n凭据控制面板\n\
  \n![](img/603470_1_En_2_Fig5_HTML.jpg)\n\n产品详情页面的截图。页面左侧有一个徽标，其右侧是标题“IAM 服务账号凭据\
  \ API”。页面底部有一个“管理”按钮，以及一个用于“API 已启用”的复选框。\n\n图 2-5\n\n服务账号凭据 API\n\n1.  转到 Google\
  \ Cloud Console ([`https://console.cloud.google.com/`](https://console.cloud.google.com/))\
  \ 并导航到你要设置凭据的项目。\n\n2.  搜索“凭据”并打开 IAM 服务账号凭据 API，如图 2-5 所示。\n\n然后点击“管理”。在“API 和服务”中，你可以点击“凭据”打开凭据控制面板，如图\
  \ 2-6 所示。\n\n3.  在“凭据”页面上，你可以创建不同类型的凭据，例如 API 密钥、OAuth 客户端 ID 或服务账号密钥。\n\n4.  要创建\
  \ API 密钥，请点击“创建凭据”按钮并选择“API 密钥”，如图 2-7 所示。密钥将显示出来，你可以根据需要限制其使用。\n\n5.  要创建 OAuth\
  \ 客户端 ID，请点击“创建凭据”按钮并选择“OAuth 客户端 ID”，如图 2-8 所示。在创建客户端 ID 之前，你必须配置同意屏幕并选择应用类型。\n\
  \n6.  要创建服务账号密钥，请点击“创建凭据”按钮并选择“服务账号密钥”。你需要选择一个现有的服务账号或创建一个新的服务账号，然后选择密钥类型以及授予该账号的任何角色。\n\
  \n创建服务账号后，它将带你进入 GCP Console 上的“IAM 与管理”页面，如图 2-9 所示。\n\n7.  凭据创建完成后，你可以通过引用必要的客户端库并使用你设置的凭据，在你的应用中使用它们。\n\
  \n注意\n\n根据凭据类型和你尝试使用的服务，你可能需要先向该账号或密钥授予权限，然后才能使用它。\n\n## 设置 IDE 并配置 GCP 插件\n\nGCP\
  \ 插件是可以添加到 IntelliJ IDEA、Eclipse 和 Visual Studio Code 等 IDE 中的软件工具，使开发者能够更轻松地直接从其开发环境与\
  \ GCP 服务进行交互。\n\n它们提供项目设置、身份验证、调试、部署和管理 GCP 资源等功能，这有助于开发者专注于编码和开发应用，而不是设置和配置 GCP\
  \ 服务。\n\nGCP 插件使开发者无需离开开发环境即可轻松使用 GCP 服务，从而提高了他们的生产力并简化了开发流程。\n\n有几种 IDE 非常适合为 Google\
  \ Cloud Platform 开发 Java 项目。以下是一些流行的选择：\n\n*   *IntelliJ IDEA*：这款流行的 Java IDE 为\
  \ GCP 开发提供了强大的支持，包括集成 Google Cloud SDK 以及将应用部署到 App Engine 和其他 GCP 服务。\n\n*   *Eclipse*：Eclipse\
  \ 是另一款流行的 Java IDE，它有一个用于 Google Cloud 开发的插件，允许开发者快速在 GCP 上部署和管理应用。\n\n*   *Visual\
  \ Studio Code*：Visual Studio Code 是一款轻量级且流行的代码编辑器，可用于 Java 开发。它还有一个 Google Cloud\
  \ SDK 扩展，允许开发者快速在 GCP 上部署和管理应用。\n\n最终，最适合你特定需求的 IDE 将取决于你的个人偏好和项目的具体要求。\n\n### 配置\
  \ GCP 插件\n\n要为你的 IDE 配置 Google Cloud Platform 插件，你需要遵循以下一般步骤：\n\n1.  如果尚未安装，请为你的特定\
  \ IDE 安装 GCP 插件。这通常可以通过 IDE 的插件市场或仓库完成。\n\n2.  打开 GCP 插件并登录你的 GCP 账号。\n\n3.  使用你的项目凭据（例如项目\
  \ ID 和服务账号密钥）配置插件，并最好创建一个单独的服务账号在 IDE 中进行配置。\n\n4.  设置你想要的 GCP 资源，例如 Cloud SQL 实例或\
  \ Kubernetes 集群。\n\n5.  如果尚未设置，你可能还需要指定本地机器上 Google Cloud SDK 的路径。\n\n注意\n\n具体步骤可能因你的\
  \ IDE 和 GCP 插件的版本而异。你可以使用依赖管理器添加依赖项，而不是将 GCP 插件添加到 IDE 中。\n\n\n\n## 总结\n\n在本章中，你学习了为\
  \ GCP 搭建 Java 开发环境的基本步骤。你学会了安装 Java 开发工具包和自选的集成开发环境（IDE），接着安装了适用于 Java 的 Google\
  \ Cloud SDK。然后，我解释了如何创建 GCP 项目，以及如何通过 Google Cloud 控制台或命令行界面设置凭据。我还介绍了如何为不同的 IDE（如\
  \ IntelliJ IDEA、Eclipse 和 Visual Studio Code）配置 GCP 插件。最后，我提供了如何为这些 IDE 设置凭据和配置\
  \ GCP 插件的说明。\n\n以下是一些供进一步参考的资源：\n\n*   *Google Cloud Java 客户端库*：[`https://cloud.google.com/java/docs/reference`](https://cloud.google.com/java/docs/reference)\n\
  \n*   *适用于 Eclipse 的 Google Cloud Tools*：[`https://cloud.google.com/eclipse/docs`](https://cloud.google.com/eclipse/docs)\n\
  \n*   *适用于 IntelliJ 的 Cloud Code*：[`https://cloud.google.com/code/docs/intellij/install`](https://cloud.google.com/code/docs/intellij/install)\n\
  \n*   *适用于 VS Code 的 Cloud Code*：[`https://cloud.google.com/code/docs/vscode/install`](https://cloud.google.com/code/docs/vscode/install)\n\
