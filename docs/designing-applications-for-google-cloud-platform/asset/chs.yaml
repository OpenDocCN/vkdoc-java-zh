  ### Vertex AI


  Vertex AI 是一个用于开发、训练和部署机器学习模型的托管机器学习平台。它提供了基于云的基础设施来运行大规模机器学习工作流，并提供多种服务，包括托管模型、训练算法和部署机器学习应用。该平台专为需要快速轻松地构建和部署大规模复杂模型的数据科学家和机器学习工程师而设计。借助
  Vertex AI，用户可以充分利用 Google 在机器学习方面的基础设施和专业知识，专注于开发模型的核心任务，而无需担心底层基础设施的管理。


  例如，你可以使用 Vertex AI 创建一个推荐引擎。你可以通过使用提供的数据和机器学习，通过批量请求获取预测结果。图 1-30 展示了 Vertex AI
  控制台。


