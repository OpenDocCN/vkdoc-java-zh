  在为你数据创建存储桶时，请选择合适的存储类别。GCS 提供四种存储类别：标准、近线、冷线和归档。每种存储类别都有其自身的一组特性，例如性能、可用性、持久性和成本。在创建存储桶时，你可以选择一种存储类别来设置存储桶的默认存储类别，如图
