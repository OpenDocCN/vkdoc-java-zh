  \ GCS 进行交互。\n\n务必确保服务账号密钥的安全，不要共享它或将其检入版本控制系统。\n\n你也可以使用 OAuth2 客户端 ID 和密钥来验证你的应用程序。在这种情况下，你可以使用\
  \ Google Cloud SDK 库，并通过以下方式获取凭据。\n\n```\nGoogleCredentials.getApplicationDefault()\n\
  ```\n\n要访问 GCS，你需要创建服务账号并将其下载，以便在代码中使用。\n\n### 创建服务账号、下载并在项目中使用\n\n以下是在你的 Java 项目中创建服务账号、下载密钥并使用它通过\
  \ Google Cloud Storage 进行身份验证的详细步骤：\n\n1.  创建服务账号：\n    *   前往 Google Cloud 控制台（[`https://console.cloud.google.com/`](https://console.cloud.google.com/)）。\n\
  \n    *   选择你要为其创建服务账号的项目。\n\n    *   在导航菜单中，点击“IAM 和管理”，然后点击“服务账号”。\n\n    *  \
  \ 点击“创建服务账号”按钮。\n\n    *   为服务账号指定名称和描述。\n\n    *   为其授予访问目标 GCS 存储桶所需的适当权限，例如 Storage\
  \ Object Admin 和 Storage Object Creator。\n\n    *   点击“创建”来创建服务账号。\n\n2.  下载服务账号密钥：\n\
  \    *   创建服务账号后，你将进入服务账号详情页面。\n\n    *   点击“操作”按钮，然后选择“创建密钥”。\n\n    *   选择 JSON\
  \ 格式，然后点击“创建”。\n\n    *   包含密钥的 JSON 文件将下载到你的计算机上。\n\n3.  设置环境变量：\n    *   将 `GOOGLE_APPLICATION_CREDENTIALS`\
  \ 环境变量设置为已下载 JSON 文件的路径。\n\n4.  在代码中使用服务账号密钥，如清单 4-10 所示：\n    *   在你的 Java 代码中，使用\
  \ Google Cloud SDK 中的 `Credentials` 类来加载服务账号密钥，并从中创建一个 `Storage` 对象。\n\n    *  \
  \ 然后你可以使用该对象与 GCS 进行交互。\n\n```\nimport com.google.auth.Credentials;\nimport com.google.auth.oauth2.GoogleCredentials;\n\
  import com.google.cloud.storage.Storage;\nimport com.google.cloud.storage.StorageOptions;\n\
  import java.io.FileInputStream;\nimport java.io.IOException;\npublic class GCSExample\
  \ {\npublic static void main(String[] args) throws IOException {\n// 加载服务账号密钥\n\
  Credentials credentials = GoogleCredentials.fromStream(new FileInputStream(\"path/to/service_account.json\"\
  ));\n// 创建存储客户端\nStorage storage = StorageOptions.newBuilder().setCredentials(credentials).build().getService();\n\
  // 使用存储客户端与 GCS 进行交互\n// ...\n}\n}\n清单 4-10\n提供服务账号 JSON 的路径\n```\n\n或者，你可以使用 `GoogleCredentials.getApplicationDefault()`\
  \ 方法来获取凭据，而无需设置环境变量。\n\n务必确保服务账号密钥的安全，不要共享它或将其检入版本控制系统。\n\n你还可以使用 `GoogleCredentials.fromStream`\
  \ 方法从流中加载凭据，例如应用程序中的文件或资源。\n\n接下来，我们将讨论安装 GCS 客户端库。\n\n#### 安装 GCS Java 客户端库\n\n\
  要在你的应用程序中安装 Google Cloud Storage Java 客户端库，你需要将该库作为依赖项添加到项目中。GCS Java 客户端库可在 Maven\
  \ 中央仓库中找到，因此你可以将其作为依赖项添加到构建文件中（例如，Maven 项目的 `pom.xml`，Gradle 项目的 `build.gradle`\
  \ 等）。\n\n以下是安装 GCS Java 客户端库的一般步骤：\n\n1.  将 GCS Java 客户端库作为依赖项添加到你的构建文件中。\n\n  \
  \  对于 Maven，将以下依赖项添加到你的 `pom.xml` 文件中，如清单 4-11 所示。此处提到的版本是本书编写时的版本；请在你实际操作时检查最新版本。\n\
  \n    ```\n    com.google.cloud\n    google-cloud-storage\n    1.143.0\n\n    清单\
  \ 4-11\n    Cloud Storage 依赖项\n    ```\n\n    对于 Gradle，将以下行添加到你的 `build.gradle`\
  \ 文件中：\n\n    ```\n    implementation 'com.google.cloud:google-cloud-storage:1.143.0'\n\
  \    ```\n\n2.  运行构建命令以下载该依赖项及其传递依赖项。\n\n    对于 Maven，运行以下命令：\n\n    ```\n    mvn\
  \ clean install\n    ```\n\n    对于 Gradle，运行以下命令：\n\n    ```\n    gradle build\n\
  \    ```\n\nGCS Java 客户端库包含与 GCS 交互所需的类，例如用于创建和管理存储桶的 `Storage` 类，以及用于创建和管理对象的 `Blob`\
  \ 类。\n\n你可以从 Maven 中央仓库（[`https://mvnrepository.com/artifact/com.google.cloud/google-cloud-storage`](https://mvnrepository.com/artifact/com.google.cloud/google-cloud-storage)）查看该库的最新版本。\n\
  \n请确保你的系统已安装 Google Cloud SDK，并且环境变量 `GOOGLE_APPLICATION_CREDENTIALS` 已正确设置；否则，代码将抛出异常\
  \ `com.google.auth.oauth2.GoogleCredentials` not found。\n\n\n\n#### 上传文件\n\n要使用\
  \ Java 客户端库将文件上传到 Google Cloud Storage，你需要创建一个用于向 GCS 账户进行身份验证的 `Storage` 对象，创建一个代表要上传文件的\
  \ `Blob` 对象，然后使用 `Blob.create` 或 `Blob.createFrom` 方法将文件上传到 GCS。\n\n清单 4-12 展示了一个如何使用\
  \ Java 客户端库将文件上传到 GCS 的示例。\n\n```\nimport com.google.cloud.storage.Blob;\nimport\
  \ com.google.cloud.storage.BlobId;\nimport com.google.cloud.storage.BlobInfo;\n\
  import com.google.cloud.storage.Storage;\nimport com.google.cloud.storage.StorageOptions;\n\
  import java.io.File;\npublic class GCSUploadExample {\npublic static void main(String[]\
  \ args) {\n// 使用服务账号向 GCS 进行身份验证\nStorage storage = StorageOptions.newBuilder()\n\
  .setCredentials(GoogleCredentials.fromStream(new FileInputStream(\"path/to/credentials.json\"\
  )))\n.build()\n.getService();\n// 创建一个代表要上传文件的 BlobId 对象\nString bucketName = \"\
  my-bucket\";\nString fileName = \"path/to/file.txt\";\nBlobId blobId = BlobId.of(bucketName,\
  \ fileName);\n// 创建一个代表要上传文件的 BlobInfo 对象\nBlobInfo blobInfo = BlobInfo.newBuilder(blobId).build();\n\
  // 使用 Blob.create 方法将文件上传到 GCS\nFile file = new File(fileName);\nBlob blob = storage.create(blobInfo,\
  \ file);\n// 打印上传文件的公共 URL\nSystem.out.println(\"File uploaded to: \" + blob.getMediaLink());\n\
  }\n}\n清单 4-12\n上传文件到 GCS\n```\n\n在清单 4-12 中，`StorageOptions.newBuilder().setCredentials()`\
  \ 方法用于使用服务账号向 GCS 进行身份验证。`BlobId.of()` 方法用于创建一个代表要上传文件的 `BlobId` 对象，`BlobInfo.newBuilder()`\
  \ 方法用于创建一个代表文件元数据的 `BlobInfo` 对象。\n\n`storage.create(blobInfo, file)` 方法用于将文件上传到\
  \ GCS，`blob.getMediaLink()` 方法用于打印上传文件的公共 URL。\n\n你也可以使用 `Blob.createFrom` 方法，该方法也接受\
  \ `inputStream`。\n\n```\nBlob blob = storage.createFrom(blobInfo, fileInputStream);\n\
  ```\n\n请确保你使用的服务账号具有向存储桶上传文件的正确权限，否则你会收到错误信息。\n\n#### 下载文件\n\n要使用 Java 客户端库从 Google\
  \ Cloud Storage 下载文件，你需要创建一个用于向 GCS 账户进行身份验证的 `Storage` 对象，创建一个代表要下载文件的 `Blob` 对象，然后使用\
  \ `Blob.downloadTo` 方法从 GCS 下载文件。\n\n清单 4-13 展示了一个如何使用 Java 客户端库从 GCS 下载文件的示例。\n\
  \n```\nimport com.google.cloud.storage.Blob;\nimport com.google.cloud.storage.BlobId;\n\
  import com.google.cloud.storage.Storage;\nimport com.google.cloud.storage.StorageOptions;\n\
  import java.io.FileOutputStream;\nimport java.io.IOException;\npublic class GCSDownloadExample\
  \ {\npublic static void main(String[] args) throws IOException {\n// 使用服务账号向 GCS\
  \ 进行身份验证\nStorage storage = StorageOptions.newBuilder()\n.setCredentials(GoogleCredentials.fromStream(new\
  \ FileInputStream(\"path/to/credentials.json\")))\n.build()\n.getService();\n//\
  \ 创建一个代表要下载文件的 BlobId 对象\nString bucketName = \"my-bucket\";\nString fileName =\
  \ \"path/to/file.txt\";\nBlobId blobId = BlobId.of(bucketName, fileName);\n// 创建一个代表要下载文件的\
  \ Blob 对象\nBlob blob = storage.get(blobId);\n// 使用 Blob.downloadTo 方法从 GCS 下载文件\n\
  FileOutputStream outputStream = new FileOutputStream(\"path/to/download/location/file.txt\"\
  );\nblob.downloadTo(outputStream);\noutputStream.close();\n}\n}\n清单 4-13\n从 GCS\
  \ 下载文件\n```\n\n在清单 4-13 的示例中，`StorageOptions.newBuilder().setCredentials()` 方法用于使用服务账号向\
  \ GCS 进行身份验证。`BlobId.of()` 方法用于创建一个代表要下载文件的 `BlobId` 对象，`storage.get(blobId)` 方法用于创建一个代表该文件的\
  \ `Blob` 对象。\n\n`blob.downloadTo(outputStream)` 方法用于从 GCS 下载文件，`outputStream.close()`\
  \ 方法用于在下载完成后关闭输出流。\n\n请确保你使用的服务账号具有从存储桶下载文件的正确权限，否则你会收到错误信息。\n\n你也可以通过 `blob.getContent()`\
  \ 方法将文件下载到 `byte[]`，或者使用 `blob.downloadTo(Path path)` 下载到特定文件夹。\n\n#### 删除文件\n\n\
  要使用 Java 客户端库从 Google Cloud Storage 删除文件，你需要创建一个用于向 GCS 账户进行身份验证的 `Storage` 对象，创建一个代表要删除文件的\
  \ `BlobId` 对象，然后使用 `Storage.delete` 方法从 GCS 删除文件。\n\n清单 4-14 展示了一个如何使用 Java 客户端库从\
  \ GCS 删除文件的示例。\n\n```\nimport com.google.cloud.storage.BlobId;\nimport com.google.cloud.storage.Storage;\n\
  import com.google.cloud.storage.StorageOptions;\npublic class GCSDeleteExample {\n\
  public static void main(String[] args) {\n// 使用服务账号向 GCS 进行身份验证\nStorage storage\
  \ = StorageOptions.newBuilder()\n.setCredentials(GoogleCredentials.fromStream(new\
  \ FileInputStream(\"path/to/credentials.json\")))\n.build()\n.getService();\n//\
  \ 创建一个代表要删除文件的 BlobId 对象\nString bucketName = \"my-bucket\";\nString fileName =\
  \ \"path/to/file.txt\";\nBlobId blobId = BlobId.of(bucketName, fileName);\n// 使用\
  \ Storage.delete 方法从 GCS 删除文件\nboolean deleted = storage.delete(blobId);\nif(deleted)\
  \ {\nSystem.out.println(\"文件删除成功！\");\n} else {\nSystem.out.println(\"文件删除失败！\"\
  );\n}\n}\n}\n清单 4-14\n从 GCS 删除文件\n```\n\n在清单 4-14 的示例中，`StorageOptions.newBuilder().setCredentials()`\
  \ 方法用于使用服务账号向 GCS 进行身份验证。`BlobId.of()` 方法用于创建一个代表要删除文件的 `BlobId` 对象，`storage.delete(blobId)`\
  \ 方法用于从 GCS 删除文件。\n\n请确保你使用的服务账号具有从存储桶删除文件的正确权限，否则你会收到错误信息。\n\n此外，`storage.delete(blobId)`\
  \ 方法返回一个布尔值，如果文件删除成功则返回 `true`，如果文件删除失败则返回 `false`。\n\n## 总结\n\n在本章中，你学习了如何在 Java\
  \ 应用程序中使用 Google Cloud Storage 来存储和管理文件。我们涵盖了 GCS 的基础知识，包括创建存储桶、向 GCS 进行身份验证以及管理存储桶中的文件。我们还讨论了\
