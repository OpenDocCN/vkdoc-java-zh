  \n8.  设置好权限后，你就可以开始在 Java 应用程序中使用该存储桶来存储文件了。\n\n注意\n\nGCS 存储桶名称是全局唯一的，因此你需要选择一个未被其他人使用过的唯一名称。\n\
  \n接下来，我们将讨论如何在 Java 应用程序中通过 GCS 进行身份验证。\n\n### 通过 GCS 进行身份验证\n\n要在 Java 应用程序中通过\
  \ Google Cloud Storage 进行身份验证，你需要向 GCS Java 客户端库提供身份验证凭据，例如 API 密钥或服务账号密钥。\n\n以下是通过\
  \ GCS 进行身份验证的一般步骤：\n\n1.  *创建服务账号*：前往 Google Cloud 控制台，导航至“IAM 和管理”部分。创建一个新的服务账号，并为其授予访问目标\
  \ GCS 存储桶所需的适当权限。\n\n2.  *下载服务账号密钥*：创建服务账号后，你可以下载 JSON 格式的密钥。\n\n3.  *设置环境变量*：将\
  \ `GOOGLE_APPLICATION_CREDENTIALS` 环境变量设置为已下载 JSON 文件的路径。\n\n4.  *在代码中使用服务账号密钥*：在你的\
