  .setMasterConfig(InstanceGroupConfig.newBuilder()\n.setMachineTypeUri(\"n1-standard-4\"\
  )\n.setNumInstances(2)\n.build())\n.setWorkerConfig(InstanceGroupConfig.newBuilder()\n\
  .setMachineTypeUri(\"n1-standard-4\")\n.setNumInstances(4)\n.build())\n.setSoftwareConfig(SoftwareConfig.newBuilder()\n\
  .setImageVersion(\"1.4\")\n.build())\n.build();\n清单 6-12\n配置集群\n```\n\n我希望你现在对 Dataproc\
  \ 有了很好的了解。让我们在下一节讨论 Cloud Functions。\n\n### Cloud Functions\n\nCloud Functions 是\
  \ Google Cloud Platform 提供的一项无服务器计算服务，允许你运行代码而无需预置或管理服务器。使用 Cloud Functions，你可以用多种语言编写和部署代码，包括\
  \ JavaScript、Python、Go 和 Java。代码部署后，Cloud Functions 会自动为你扩展和管理底层基础设施。\n\n以下是 Cloud\
  \ Functions 的一些关键特性和用例：\n\n*   *事件驱动*：Cloud Functions 允许你触发代码运行以响应特定事件，例如 Cloud\
  \ Storage 存储桶中的数据更改或 Cloud Pub/Sub 主题中的新消息。这使得构建响应数据实时变化的事件驱动架构变得容易。\n\n*   *无服务器*：Cloud\
  \ Functions 抽象了底层基础设施，因此你可以专注于编写代码。你无需担心预置或管理服务器，并且只需为代码实际使用的资源付费。\n\n*   *与其他 GCP\
  \ 服务集成*：Cloud Functions 与 Cloud Storage、Cloud Pub/Sub 和 Firebase 等其他 GCP 服务无缝集成。这使你可以轻松构建涉及不同\
  \ GCP 服务的复杂多步骤工作流。\n\n*   *易于部署*：Cloud Functions 允许你通过单个命令将代码部署到多个区域，并且你可以使用版本控制和回滚来轻松管理代码的不同版本。\n\
  \n清单 6-13 是一个简单的 Java 函数，由向 Cloud Storage 存储桶添加新文件触发。\n\n```\nimport com.google.cloud.functions.BackgroundFunction;\n\
  import com.google.cloud.functions.Context;\nimport java.io.IOException;\npublic\
  \ class ProcessFile implements BackgroundFunction {\npublic void accept(StorageObject\
  \ object, Context context) throws IOException {\n// 你的代码在此处处理文件\nString bucket =\
  \ object.getBucket();\nString file = object.getName();\nSystem.out.println(\"正在处理文件:\
  \ \" + file + \" 位于存储桶 \" + bucket);\n}\n}\n清单 6-13\n由向 Cloud Storage 存储桶添加新文件触发的\
  \ Java 函数\n```\n\n在此示例中，函数 `accept` 由向指定存储桶添加新文件触发。作为参数传递的 `StorageObject` 包含有关所添加文件的信息。在此示例中，它仅记录有关所添加文件的信息。\n\
  \n你可以根据需要自定义函数，例如，通过处理文件并将处理后的数据存储在另一个 GCP 服务（如 BigQuery 或 Datastore）中。\n\n####\
  \ Cloud Functions 的用例\n\n以下是 Cloud Functions 的一些用例示例：\n\n*   *数据处理*：你可以使用 Cloud\
  \ Functions 实时处理添加到 Cloud Storage 存储桶或 Cloud Pub/Sub 主题的数据。例如，你可以编写一个函数，在上传图片到存储桶时自动调整其大小，或者从主题读取数据并将其存储在\
  \ BigQuery 表中。\n\n*   *自动化*：你可以使用 Cloud Functions 自动化由特定事件触发的任务。例如，你可以编写一个函数，在向存储桶添加新文件时发送电子邮件，或者在移动应用中点击按钮时自动在\
  \ Compute Engine 中创建新实例。\n\n*   *集成*：你可以使用 Cloud Functions 将不同的 GCP 服务集成在一起。例如，你可以编写一个函数，从\
  \ Firebase Realtime Database 读取数据并将其存储在 BigQuery 中，或者监听 Cloud Spanner 表中的更改并更新 Firebase\
  \ Cloud Firestore。\n\n*   *Web 应用程序*：Cloud Functions 可用于构建 Web 应用程序，方法是编写处理 HTTP\
  \ 请求并以 JSON 响应的函数。\n\n\n\n#### Cloud Functions 的局限性\n\n以下是 Cloud Functions 的局限性：\n\
  \n*   *执行时间*：Cloud Functions 的最大执行时间为 9 分钟。如果你的函数需要运行更长时间，则需使用其他服务。\n\n*   *内存与\
  \ CPU*：Cloud Functions 每个实例有最大内存和 CPU 分配量，通常足以满足简单函数的需求。但如果你的函数需要更多资源，则可能需要使用其他服务。\n\
  \n*   *冷启动*：Cloud Functions 在长时间未使用时可能会经历“冷启动”，这会导致函数初始执行出现延迟。可以通过定期触发函数使其保持“热状态”，或使用能够处理更长空闲时间的其他服务来缓解此问题。\n\
  \n*   *流量整形*：Cloud Functions 不提供任何内置的流量整形机制，例如速率限制或自动扩缩容。这意味着，如果你预期会有大量流量，则可能需要使用提供这些功能的其他服务。\n\
  \nCloud Functions 是一种无服务器计算服务，专为处理小型、短时任务而设计。它不能替代 Compute Engine 或 Kubernetes Engine\
  \ 等其他计算服务。\n\n#### Cloud Functions 的 Java 示例\n\n清单 6-14 展示了一个用 Java 编写的 Cloud Functions\
  \ 函数，该函数由 REST 调用触发，并从测验数据库（Firestore 数据库）中随机检索 10 个问题（5 个简单，5 个困难）。\n\n```\nimport\
  \ com.google.cloud.firestore.Firestore;\nimport com.google.cloud.firestore.QueryDocumentSnapshot;\n\
  import com.google.cloud.firestore.QuerySnapshot;\nimport com.google.firebase.cloud.FirestoreClient;\n\
  import java.util.ArrayList;\nimport java.util.List;\nimport java.util.Random;\n\
