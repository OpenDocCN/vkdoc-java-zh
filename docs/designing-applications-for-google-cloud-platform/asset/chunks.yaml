    在本章中，你学习了为 GCP 搭建 Java 开发环境的基本步骤。你学会了安装 Java 开发工具包和自选的集成开发环境（IDE），接着安装了适用于 Java
    的 Google Cloud SDK。然后，我解释了如何创建 GCP 项目，以及如何通过 Google Cloud 控制台或命令行界面设置凭据。我还介绍了如何为不同的
    IDE（如 IntelliJ IDEA、Eclipse 和 Visual Studio Code）配置 GCP 插件。最后，我提供了如何为这些 IDE 设置凭据和配置
    GCP 插件的说明。


    以下是一些供进一步参考的资源：


    *   *Google Cloud Java 客户端库*：[`https://cloud.google.com/java/docs/reference`](https://cloud.google.com/java/docs/reference)


    *   *适用于 Eclipse 的 Google Cloud Tools*：[`https://cloud.google.com/eclipse/docs`](https://cloud.google.com/eclipse/docs)


