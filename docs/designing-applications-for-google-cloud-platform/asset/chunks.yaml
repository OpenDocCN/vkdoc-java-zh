    \ file (e.g., `pom.xml` for a Maven project, `build.gradle` for a Gradle project,\
    \ etc.).\n\nHere are the general steps for installing the GCS Java client library:\n\
    \n1.  Add the GCS Java client library as a dependency in your build file.\n\n\
    \    For Maven, add the following dependency to your `pom.xml` file, as shown\
    \ in Listing [4-11](#603470_1_En_4_Chapter.xhtml#PC12). The version mentioned\
    \ is at the time of writing this book; check for latest version when you are working\
    \ on it.\n\n    ```\n    com.google.cloud\n    google-cloud-storage\n    1.143.0\n\
    \n    Listing 4-11\n    Cloud Storage Dependency\n    ```\n\n    For Gradle, add\
    \ the following line to your `build.gradle` file:\n\n    ```\n    implementation\
    \ 'com.google.cloud:google-cloud-storage:1.143.0'\n    ```\n\n2.  Run the build\
    \ command to download the dependency and its transitive dependencies.\n\n    For\
    \ Maven, run the following command:\n\n    ```\n    mvn clean install\n    ```\n\
    \n    For Gradle, run the following command:\n\n    ```\n    gradle build\n  \
    \  ```\n\nThe GCS Java client library includes the classes needed to interact\
    \ with GCS, such as the `Storage` class for creating and managing buckets, and\
    \ the `Blob` class for creating and managing objects.\n\nYou can check the latest\
    \ version of the library from the maven central repository, [`https://mvnrepository.com/artifact/com.google.cloud/google-cloud-storage`](https://mvnrepository.com/artifact/com.google.cloud/google-cloud-storage).\n\
    \nMake sure to also have the Google Cloud SDK installed in your system and also\
    \ the environment variable `GOOGLE_APPLICATION_CREDENTIALS` is set properly; if\
    \ not, the code will throw the exception `com.google.auth.oauth2.GoogleCredentials`\
    \ not found."
  trans: "\n### 设置 GCS 存储桶\n\n要设置 Google Cloud Storage 存储桶，可以按照以下步骤操作：\n\n1.  使用你的\
