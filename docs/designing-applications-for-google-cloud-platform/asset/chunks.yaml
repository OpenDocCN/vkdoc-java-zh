    ## 总结


    在本章中，你学习了 Google Cloud Platform 提供的强大服务：Cloud Pub/Sub、Cloud Dataflow、Cloud Dataproc
    和 Cloud Functions。Cloud Pub/Sub 可用于解耦微服务，并在独立系统之间发送/接收消息。Cloud Dataflow 可用于创建数据处理管道，通过批处理或流式数据处理来处理大量数据。Cloud
    Dataproc 是一种托管的 Hadoop 和 Spark 服务，允许你使用开源工具轻松处理大量数据。本章涵盖了如何创建集群、提交作业以及配置集群和作业的各个方面。Cloud
