  raw: 'Projects in GCP can be linked to each other in different ways. For example,
    you can link projects to enable shared resources, such as a shared VPC network
    or a billing account. You can also link projects to control access to resources
    across multiple projects or to grant permissions to users or service accounts.


    Here are some key things to know about GCP projects:


    *   Projects must use GCP services and resources.


    *   Each project has a globally unique ID, name, and number across all GCP services.


    *   A project can contain multiple resources, such as compute instances, storage
    buckets, and databases.


    *   Projects can be organized into folders and hierarchies to manage resource
    ownership and access.


    *   Billing and usage are managed at the project level.


    *   Projects can be linked to each other to enable shared resources and access
    control.


    *   Each project has its own Identity and Access Management (IAM) policies to
    control who can access and manage the project’s resources.


    *   You can configure monitoring, logging, and alerting for each project to get
    insights into its health and performance.


    *   Projects can be used for different purposes, such as development, testing,
    staging, or production.


    *   You can create and manage projects using the GCP console, the Cloud SDK, or
    the API.


    *   Projects can be deleted when they are no longer needed, but you need to remove
    all the associated resources and data before doing so.


    When working with GCP projects, keeping track of their configuration and usage
    and following best practices for security, scalability, and cost optimization
    are important. You should also consider using tools such as Terraform, Cloud Deployment
    Manager, or Kubernetes Engine to manage your infrastructure as code and to ensure
    consistency and reproducibility across multiple projects and environments.


    ### Creating a New Project


    To create a new project, click the existing project (My First Project) in the
    top-left corner of the GCP console. A window like the one shown in Figure [1-3](#603470_1_En_1_Chapter.xhtml#Fig3)
    will appear.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig3_HTML.jpg)


    A screenshot of the project selection window. It has the heading, select a project
    on the left side of the page. It has a search box to search for projects and folders.
    It has a recent tab of a table with 2 columns for name and I D, and a row with
    name, my first project.


    Figure 1-3


    Selecting a project


    You can click the New Project button in the top-right corner to create a new project.
    A window like the one shown in Figure [1-4](#603470_1_En_1_Chapter.xhtml#Fig4)
    will appear.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig4_HTML.jpg)


    A screenshot of the Google Cloud page to create a new project. It has a warning
    text with the remaining number of projects in the quota and a tab for the project
    name and location. It has a button to create at the bottom left side of the page.


    Figure 1-4


    Creating a new GCP project


    Here you can see the message that you have only 24 projects remaining. By default,
    GCP allows you to create 25 projects; if you need to create more projects, you
    can request to increase the quota. The name of the project must be between 4 and
    30 characters.


    Note


    A *quota* in GCP is a flexible limit, but a *limit* is a hard cap on the amount
    of a resource you can use.


    You can name the project as you choose to reflect the purpose of the project.
    The project ID is the globally unique identifier for your project. You cannot
    change the project ID after the project is created. The projects can be associated
    with the organization you can select for location. If your project name is globally
    unique, the project ID will be the same as a project name, or else the project
    ID can be created automatically by adding numbers in front of the project name.
    You can set your custom project name project ID by clicking in front of the project
    ID, as shown in Figure [1-5](#603470_1_En_1_Chapter.xhtml#Fig5).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig5_HTML.jpg)


    A screenshot of the Google Cloud page to create a new project. It has a warning
    text with the remaining number of projects in the quota, a tab for the project
    name, a project I D, and location. It has a button to create at the bottom left
    side of the page.


    Figure 1-5


    Project ID for GCP project


    After you click Create, you will see it in your activity list. Whenever you create
    any resource in GCP, you can see it in your activity list, as shown in Figure
    [1-6](#603470_1_En_1_Chapter.xhtml#Fig6).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig6_HTML.jpg)


    A screenshot of the Google Cloud notifications page. It has 2 rows of recent notifications
    for project creation. Row 1 has a recent notification for e-learning, and row
    2 has a 9-day old notification for my first project. It has a link to view all
    activities at the bottom left side of the page.


    Figure 1-6


    GCP project activities


    For example, if you use GCP for the EdTech application, you can create a project
    for all your development environments and another project for all the production
    environments. You can have a separate project for analytics and marketing. By
    doing that, you can easily see the expenses for nonprod, prod, and analytics for
    your EdTech applications.


    Once the new project is created, you can choose the project you are working on
    by clicking the project button at the top-left corner of the GCP console, as shown
    in Figure [1-7](#603470_1_En_1_Chapter.xhtml#Fig7). If you don’t see your project
    on the Recent tab of the window, you can click the All tab to see all the projects.
    To see the project, you need permission for it.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig7_HTML.jpg)


    A screenshot of a window to select a project. It has a search box to search projects
    and folders. It has a recent tab of a table with 2 columns for name and I D, and
    2 rows for e-learning dev and my first project.


    Figure 1-7


    Recent projects


    Select the services from the GCP console in the left pane or search for the service
    name with the top search button, like the one shown in Figure [1-8](#603470_1_En_1_Chapter.xhtml#Fig8).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig8_HTML.jpg)


    A screenshot of a Google Cloud window has a search box on the right side of the
    page with G C E written. It has 3 results under products and pages, compute engine,
    monitoring, and infrastructure summary dashboard.


    Figure 1-8


    Searching for GCP services'
  trans: '

    GCP 中的项目可以通过多种方式相互关联。例如，你可以关联项目以启用共享资源，例如共享 VPC 网络或结算账户。你还可以关联项目以控制跨多个项目的资源访问，或向用户或服务账号授予权限。


    以下是关于 GCP 项目需要了解的一些关键事项：


    *   项目必须使用 GCP 服务和资源。


    *   每个项目在所有 GCP 服务中都有一个全局唯一的 ID、名称和编号。


    *   一个项目可以包含多个资源，例如计算实例、存储桶和数据库。


    *   项目可以组织到文件夹和层级结构中，以管理资源所有权和访问权限。


    *   结算和使用情况在项目级别进行管理。


    *   项目可以相互关联，以启用共享资源和访问控制。


    *   每个项目都有自己的身份和访问管理 (IAM) 策略，用于控制谁可以访问和管理项目的资源。


    *   你可以为每个项目配置监控、日志记录和告警，以了解其运行状况和性能。


    *   项目可用于不同目的，例如开发、测试、预发布或生产。


    *   你可以使用 GCP 控制台、Cloud SDK 或 API 创建和管理项目。


    *   当项目不再需要时可以删除，但在此之前需要移除所有关联的资源和数据。


    在使用 GCP 项目时，跟踪其配置和使用情况，并遵循安全、可扩展性和成本优化的最佳实践非常重要。你还应考虑使用 Terraform、Cloud Deployment
    Manager 或 Kubernetes Engine 等工具，将基础设施作为代码进行管理，并确保跨多个项目和环境的一致性和可重复性。


    ### 创建新项目


