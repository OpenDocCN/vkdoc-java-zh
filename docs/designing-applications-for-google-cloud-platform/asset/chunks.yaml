- fmt: '# GCP 项目概述


    在 GCP 中，项目可以通过多种方式相互关联。例如，您可以关联项目以启用共享资源，例如共享 VPC 网络或结算账号。您还可以关联项目以控制跨多个项目的资源访问，或向用户或服务账号授予权限。


    以下是关于 GCP 项目的一些关键信息：


    - 项目必须使用 GCP 服务和资源。

    - 每个项目在所有 GCP 服务中都有一个全局唯一的 ID、名称和编号。

    - 一个项目可以包含多个资源，例如计算实例、存储桶和数据库。

    - 项目可以组织到文件夹和层级结构中，以管理资源所有权和访问权限。

    - 结算和使用情况在项目级别进行管理。

    - 项目可以相互关联，以启用共享资源和访问控制。

    - 每个项目都有自己的身份和访问管理（IAM）策略，用于控制谁可以访问和管理项目的资源。

    - 您可以为每个项目配置监控、日志记录和警报，以了解其运行状况和性能。

    - 项目可用于不同目的，例如开发、测试、预发布或生产。

    - 您可以使用 GCP 控制台、Cloud SDK 或 API 创建和管理项目。

    - 当项目不再需要时可以删除，但在删除之前，您需要移除所有关联的资源和数据。


    在使用 GCP 项目时，跟踪其配置和使用情况，并遵循安全、可扩展性和成本优化的最佳实践非常重要。您还应考虑使用诸如 `Terraform`、`Cloud Deployment
    Manager` 或 `Kubernetes Engine` 之类的工具，将基础设施作为代码进行管理，并确保跨多个项目和环境的一致性和可重复性。


    ## 创建新项目


    要创建新项目，请点击 GCP 控制台左上角的现有项目（`My First Project`）。将出现一个如图 [1-3](#603470_1_En_1_Chapter.xhtml#Fig3)
    所示的窗口。


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig3_HTML.jpg)


    图 1-3：选择项目


    您可以点击右上角的 `New Project` 按钮来创建新项目。将出现一个如图 [1-4](#603470_1_En_1_Chapter.xhtml#Fig4)
    所示的窗口。


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig4_HTML.jpg)


    图 1-4：创建新的 GCP 项目


    在这里您可以看到一条消息，提示您只剩下 24 个项目。默认情况下，GCP 允许您创建 25 个项目；如果您需要创建更多项目，可以请求增加配额。项目名称的长度必须在
    4 到 30 个字符之间。


    > **注意**：GCP 中的*配额*是一个灵活的限制，但*限制*是您可以使用的资源量的硬性上限。


    您可以根据项目的用途为其命名。项目 ID 是您项目的全局唯一标识符。项目创建后，您无法更改项目 ID。项目可以与您为位置选择的组织关联。如果您的项目名称是全局唯一的，则项目
    ID 将与项目名称相同；否则，项目 ID 可以通过在项目名称前添加数字来自动创建。您可以通过点击项目 ID 前面的区域来设置自定义项目名称和项目 ID，如图
    [1-5](#603470_1_En_1_Chapter.xhtml#Fig5) 所示。


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig5_HTML.jpg)


    图 1-5：GCP 项目的项目 ID


    点击 `Create` 后，您将在活动列表中看到它。每当您在 GCP 中创建任何资源时，您都可以在活动列表中看到它，如图 [1-6](#603470_1_En_1_Chapter.xhtml#Fig6)
    所示。


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig6_HTML.jpg)


    图 1-6：GCP 项目活动


    例如，如果您将 GCP 用于 EdTech 应用程序，您可以为所有开发环境创建一个项目，并为所有生产环境创建另一个项目。您可以为分析和营销设立单独的项目。通过这样做，您可以轻松查看
    EdTech 应用程序的非生产、生产和分析费用。


    创建新项目后，您可以通过点击 GCP 控制台左上角的项目按钮来选择您正在处理的项目，如图 [1-7](#603470_1_En_1_Chapter.xhtml#Fig7)
    所示。如果您在窗口的 `Recent` 选项卡中没有看到您的项目，可以点击 `All` 选项卡查看所有项目。要查看项目，您需要拥有相应的权限。


