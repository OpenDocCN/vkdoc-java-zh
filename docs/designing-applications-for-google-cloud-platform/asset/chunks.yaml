  trans: '

    ### 云存储


    Google Cloud Storage 是一种在云端（通过互联网）存储和访问大量数据的方式。它由 Google 管理，并设计为可扩展，这意味着它可以随着您的存储需求增长而扩展。它具有成本效益，因为您只需为使用的存储量付费。它可以存储各种类型的数据，例如视频、图像和备份。它可用于不同的目的，例如媒体和娱乐、数据仓库以及
    Web 和移动应用程序。


    Google Cloud Storage 中的存储桶（如图 4-1 所示）就像一个虚拟容器，您可以在其中存储文件，就像您可能使用物理容器在家中存放物品一样。这是一种在云端存储数据的安全且可扩展的方式。您可以根据需要创建、管理和删除存储桶，并控制谁有权访问您存储桶中的文件。可以把它想象成一个巨大的数字盒子，您可以将文件放入其中，然后只要有互联网连接，就可以从任何地方轻松访问这些文件。


    ![](img/603470_1_En_4_Fig1_HTML.jpg)


    存储桶页面的屏幕截图显示了创建或刷新存储桶的选项。它有一个用于过滤存储桶的过滤器，后跟一个包含三列（名称、创建时间和位置类型）和两行（用于不同存储桶）的表格。


    图 4-1


    Cloud Storage 存储桶


    Cloud Storage 中的对象由一个文件以及包含对象信息（如其名称、大小、内容类型和创建时间）的元数据组成。对象可以存储在以下三种存储类别之一中：


    *   *标准*：此类适用于频繁访问的数据，适合存储需要快速检索的数据。

    *   *近线*：此类适用于访问频率较低的数据，适合存储可在几秒或几分钟内检索的数据。

    *   *冷线*：此类适用于访问频率更低的数据，适合存储可在几小时内检索的数据。


    Google Cloud Storage 是一项在线服务，允许您使用互联网从世界任何地方存储和访问数据。它提供了一个 API 和基于 Web 的界面，让您可以执行各种操作，例如上传和下载数据、管理元数据以及控制对数据的访问。


    Cloud Storage 提供了多项功能来帮助您管理和保护数据，例如访问控制、版本控制、生命周期管理、数据完整性、加密、多区域位置和备份。


    访问控制允许您通过向单个用户、用户组或服务账号授予权限来决定谁可以访问您的数据。版本控制允许您保留同一对象的多个版本，并在需要时恢复到早期版本。可以设置生命周期管理规则，以自动将对象转换到不同的存储类别或在特定时间段后将其删除。包括校验和在内的数据完整性技术可确保您的数据在存储和检索时不会出错。您还可以使用
    Google 管理的密钥或客户管理的密钥对传输中和静态数据进行加密。Cloud Storage 还提供多区域位置功能，可将数据存储在多个区域，并提供用于数据恢复的备份。


    Cloud Storage 可用于多种目的，例如备份和归档、数据仓库、媒体和娱乐、协作开发以及 Web 和移动应用程序。它是一种经济高效的存储大量数据的解决方案，并且可以根据需要扩展或缩减。


    接下来，我们来谈谈 Cloud SQL。


    ### Cloud SQL


    Google Cloud SQL 是 Google Cloud Platform 提供的一种完全托管的关系型数据库服务。它允许开发者和组织在云端创建和管理数据库，而无需配置和维护自己的硬件。Cloud
    SQL 支持流行的数据库引擎，例如 MySQL、PostgreSQL 和 SQL Server。


    AlloyDB 是一种新推出的、完全托管的、兼容 PostgreSQL 的数据库服务，适用于要求苛刻的事务和分析工作负载。它提供企业级的性能和可用性，同时保持与开源
    PostgreSQL 的 100% 兼容性。


    您只需点击几下即可创建一个 Cloud SQL 实例，并选择最适合您需求的规模和配置。实例启动并运行后，您可以使用标准 SQL 命令来创建表、插入数据和查询数据库。图
    4-2 显示了 Cloud SQL 实例。


    ![](img/603470_1_En_4_Fig2_HTML.jpg)


    SQL 实例页面的屏幕截图显示了创建实例或迁移数据的选项。它有一个用于输入属性名称或值的过滤器，后跟一个包含三列（名称、创建时间、公共 IP 地址）和一行（例如，实例
    ID student）的表格。


    图 4-2


    Cloud SQL 实例


    Cloud SQL 提供了几个关键特性和优势。


    *   *自动备份*：Cloud SQL 会自动创建数据库的备份，可用于在数据丢失或损坏时恢复数据。您也可以随时创建手动备份。

    *   *自动修补*：Cloud SQL 会自动将安全补丁和其他更新应用到您的数据库引擎，而无需停机。

    *   *高可用性*：Cloud SQL 提供高可用性选项，例如故障转移复制和只读副本，这有助于确保您的数据库始终可用，即使在发生故障时也是如此。

    *   *云原生*：Cloud SQL 设计为在云端运行，这意味着它可以利用 GCP 的可扩展性和性能。

    *   *数据加密*：Cloud SQL 支持使用 Google 管理的密钥或客户管理的密钥对传输中和静态数据进行加密。

    *   *与其他 GCP 服务集成*：Cloud SQL 可以轻松与其他 GCP 服务集成，例如 App Engine、Kubernetes Engine
    和 Cloud Dataflow。

    *   *复制和故障转移*：Cloud SQL 允许您跨多个可用区或区域为数据库设置复制和故障转移。这确保了您的数据始终可用，并防止特定可用区或区域发生灾难或中断。


    您可以使用 Google Cloud Console 或 Cloud SQL API 来创建和管理 Cloud SQL 实例。Google Cloud Console
    是一个基于 Web 的界面，允许您创建和管理实例、创建和管理数据库以及执行其他任务。Cloud SQL API 允许您以编程方式创建、配置和管理实例和数据库。


    Cloud SQL 实例有两种类型。


    *   第一代（也称为 MySQL 或 PostgreSQL）

    *   第二代（也称为 MySQL 或 PostgreSQL 或 SQL Server）


    Cloud SQL 实例可用于多种目的，例如：


    *   为 Web 和移动应用程序存储和管理数据

    *   为数据仓库和分析存储和管理数据

    *   为电子商务和金融系统存储和管理数据


    Cloud SQL 是一种完全托管、高可用且可扩展的关系型数据库服务，可让您轻松地在云端创建和管理数据库。它非常适合许多用例，并且可以轻松与其他 GCP 服务集成。


    下一节，我们来谈谈 Cloud Spanner。

    '
- fmt: '# Cloud Spanner


    `Cloud Spanner` is a fully managed, horizontally scalable, relational database
    service offered by Google Cloud Platform. It provides SQL and transactional consistency
    across multiple regions, making it a good choice for mission-critical, globally
    distributed applications. `Cloud Spanner` supports automatic, synchronous replication,
    and automatic failover, ensuring high availability and data durability. It also
    offers strong consistency guarantees, allowing immediate and accurate data retrieval.
    Additionally, `Cloud Spanner` supports the use of secondary indexes, stored procedures,
    and triggers, and it can be accessed using the JDBC and ODBC drivers, as well
    as a REST API. `Cloud Spanner` can be used with other Google Cloud services such
    as `Bigtable` and `Cloud Dataflow` to build a complete data processing pipeline.


    You can create `Cloud Spanner` instance through navigating to the `Cloud Spanner`
    dashboard. Once you click `Create Instance` and provide details such as the instance
    name, instance ID, and the region where you want to create the instance, choose
    the configuration options, such as the number of nodes, the instance type, and
    the storage size. And then click `Create` to create the `Cloud Spanner` instance.


    Once you have created the `Cloud Spanner` instance, you can start using it to
    store and retrieve data, as shown in Figure [4-3](#603470_1_En_4_Chapter.xhtml#Fig3).
    You can create tables and define their schemas, insert data into the tables, and
    query the data using SQL.


    ![](images/603470_1_En_4_Chapter/603470_1_En_4_Fig3_HTML.jpg)


    A screenshot for the Spanner instances page has a create instance option. It has
    a filter to enter property name or value, a table with 4 columns for name, ID,
    configuration, and processing units, and 1 row for subject topics.


    **Figure 4-3** Cloud Spanner instance


    The following are some key features of Google Cloud Spanner:


    - **Horizontally scalable**: `Cloud Spanner` can automatically scale horizontally
    to handle increasing workloads without requiring manual sharding or data partitioning.

    - **Globally distributed**: `Cloud Spanner` can replicate data across multiple
    regions, providing low-latency data access for users worldwide.

    - **Strong consistency**: `Cloud Spanner` provides strong consistency guarantees,
    ensuring that all queries return the most up-to-date data.

    - **Automatic failover**: `Cloud Spanner` automatically detects and fails over
    to a replica in the event of a failure, ensuring high availability.

    - **SQL support**: `Cloud Spanner` supports a SQL-based query language, making
    it easy for developers familiar with SQL to work with the service.

    - **Secondary indexes**: `Cloud Spanner` supports using secondary indexes, which
    can improve query performance and allow for more efficient data retrieval.

    - **Stored procedures and triggers**: `Cloud Spanner` supports storing procedures
    and triggers, allowing for complex data processing and manipulation.

    - **Access via JDBC/ODBC**: `Cloud Spanner` can be accessed via JDBC and ODBC
    drivers, making it easy to integrate with various programming languages and frameworks.


    Now we will discuss the use cases of `Cloud Spanner`.


    ## The Use Cases for Cloud Spanner


    Google Cloud Spanner can be used in a variety of use cases; some examples include
    the following:


    - **Online Transaction Processing (OLTP)**: `Cloud Spanner` is well suited for
    OLTP workloads that require strong consistency guarantees and low latency, such
    as e-commerce, financial, and healthcare applications. For example, an e-commerce
    company could use `Cloud Spanner` to handle millions of customer orders and financial
    transactions, ensuring that the data is always up-to-date and accurate. Compared
    to other databases such as `MySQL` or `PostgreSQL`, `Cloud Spanner` provides stronger
    consistency guarantees and can handle larger workloads.

    - **Gaming**: `Cloud Spanner` can handle large numbers of concurrent players and
    real-time data updates, making it suitable for gaming applications that require
    high availability and low latency. For example, a mobile game developer could
    use `Cloud Spanner` to store and retrieve player data and game state, ensuring
    that the game is always available and responsive. Compared to other databases,
    such as NoSQL databases, `Cloud Spanner` provides stronger consistency guarantees
    and can handle larger workloads.

    - **IoT**: `Cloud Spanner` can handle high-velocity data streams from IoT devices
    and process and analyze that data in near real time. For example, a manufacturing
    company could use `Cloud Spanner` to store and retrieve sensor data from its production
    line, allowing it to monitor and optimize production in real time. `Cloud Spanner`
    provides stronger consistency guarantees and can handle larger workloads than
    other databases, such as time-series databases.

    - **Media and entertainment**: `Cloud Spanner` can handle high-traffic workloads
    and can store and serve large amounts of multimedia data, making it suitable for
    media and entertainment applications. With its strong consistency guarantees,
    scalability, and globally distributed architecture, `Cloud Spanner` can provide
    reliable and fast access to multimedia data for a global audience.

    - **Ad Tech**: `Cloud Spanner` can handle high-traffic and high-velocity data
    streams, making it suitable for ad tech applications that require real-time data
    processing and analysis.

    - **Supply chain management**: `Cloud Spanner` can handle large amounts of data
    and provide real-time visibility into the supply chain, making it suitable for
    supply chain management applications. For example, a logistics company could use
    `Cloud Spanner` to track and manage inventory, shipments, and logistics in real
    time. `Cloud Spanner` provides stronger consistency guarantees and can handle
    larger workloads than other databases, such as traditional relational databases.

    - **Healthcare**: `Cloud Spanner` can handle large amounts of patient data and
    provide real-time access, making it suitable for healthcare applications such
    as electronic health record (EHR) systems.

    - **FinTech**: `Cloud Spanner` can handle large numbers of financial transactions
    and provide real-time access to that data, making it suitable for FinTech applications
    such as trading platforms and fraud detection systems.


    Let’s talk about `Cloud Bigtable` in the next section.'
