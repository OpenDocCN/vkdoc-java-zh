- fmt: '### Cloud Dataflow


    Cloud Dataflow is a fully managed service for data processing on the Google Cloud
    Platform. It can be used to create data pipelines that can process large amounts
    of data from various sources, such as Cloud Storage, BigQuery, and Cloud Pub/Sub,
    and output the results to various destinations, such as Cloud Storage, BigQuery,
    and Cloud Datastore. It supports both batch and streaming data processing.


    Here’s an example of how you might use Cloud Dataflow to process a batch of data
    stored in a Cloud Storage bucket:


    1. Create a new Cloud Dataflow job using the Dataflow API or the Cloud SDK.

    2. Define the input and output sources and destinations for the job. For example,
    you can use the `TextIO` class to read text files from a Cloud Storage bucket
    and write the output to another bucket.

    3. Define the data processing logic using the Dataflow SDK. For example, you can
    use the `ParDo` class to perform a transformation on the data, such as filtering,
    mapping, or aggregating.

    4. Run the Dataflow job.


    Listing [6-6](#603470_1_En_6_Chapter.xhtml#PC6) presents an example of a simple
    pipeline that reads data from a Cloud Storage bucket, performs a transformation
    on the data, and writes the output to another bucket:


    ```

    Pipeline pipeline = Pipeline.create();

    PCollection input = pipeline.apply(TextIO.read().from("gs://input-bucket/*.txt"));

    PCollection output = input

    .apply("ExtractWords", ParDo.of(new ExtractWordsFn()))

    .apply("CountWords", Count.perElement());

    output.apply(TextIO.write().to("gs://output-bucket/counts.txt"));

    pipeline.run();

    Listing 6-6

    Reading Data from a Storage Bucket and Writing Output to Another Bucket

    ```


    Cloud Dataflow also provides a way to process streaming data with the same API,
    by simply replacing `TextIO` with `PubSubIO` to read from a Pub/Sub topic and
    replacing `TextIO.write()` with `PubsubIO.write()` to write to a Pub/Sub topic.


    Cloud Dataflow also provides a way to automatically scale the resources based
    on the size of the data and to handle errors and retries.


    Another benefit of Cloud Dataflow is its ability to integrate with other GCP services,
    such as BigQuery, Cloud Storage, Cloud Pub/Sub, and Cloud Bigtable. This allows
    you to easily read and write data from and to these services and perform complex
    data processing and analysis tasks using Dataflow’s built-in transforms and windowing
    capabilities.


    Dataflow provides a web-based UI called the Dataflow Monitoring Interface, which
    allows you to monitor the progress and status of your Dataflow jobs, view job
    metrics, and debug any issues that may arise.


    Additionally, Cloud Dataflow has built-in support for Apache Beam, which is an
    open-source programming model for data processing pipelines. This allows you to
    write Dataflow pipelines using the Beam API, which is available in multiple programming
    languages, including Java, Python, and Go.


    However, Cloud Dataflow has certain drawbacks, such as a steeper learning curve
    compared to some other data processing tools and higher costs for certain types
    of jobs.


    Another drawback is that it may not be the best fit for certain use cases, such
    as low-latency, real-time data processing, where other tools such as Cloud Stream
    might be more appropriate.


    Cloud Dataflow is a powerful tool for data processing and analysis on the GCP,
    with many built-in features and integrations with other GCP services. It is well-suited
    for large-scale, batch, or streaming data processing tasks, and it can be a good
    choice for organizations that need a highly scalable and fault-tolerant data processing
    platform.


    #### Java Example of Cloud Dataflow


    Let’s look at a Java example of a dataflow that will be triggered by Cloud Storage,
    when any file is dropped in to a Cloud Storage bucket. Cloud Dataflow reads the
    file from the Cloud Storage bucket and, based on the identifier data it reads
    from the file, the Cloud Dataflow pipeline stores the file data into different
    BigQuery table.


    In Cloud Dataflow, a pipeline is a directed acyclic graph of data transformations,
    where each node in the graph represents a processing step that takes one or more
    inputs and produces one or more outputs. A `DoFn` (short for “do function”) is
    a user-defined function that processes input elements and emits output elements.
    A `ParDo` is a Dataflow transform that applies a `DoFn` to each element in a `PCollection`,
    producing zero or more output elements for each input element.


    Listing [6-7](#603470_1_En_6_Chapter.xhtml#PC7) depicts an example of a Java dataflow
    that is triggered by a file being added to a Cloud Storage bucket.


    ```

    import com.google.cloud.dataflow.sdk.Pipeline;

    import com.google.cloud.dataflow.sdk.io.TextIO;

    import com.google.cloud.dataflow.sdk.options.DataflowPipelineOptions;

    import com.google.cloud.dataflow.sdk.options.Default;

    import com.google.cloud.dataflow.sdk.options.Description;

    import com.google.cloud.dataflow.sdk.options.PipelineOptionsFactory;

    import com.google.cloud.dataflow.sdk.transforms.DoFn;

    import com.google.cloud.dataflow.sdk.transforms.ParDo;

    import com.google.cloud.dataflow.sdk.transforms.GroupByKey;

    import com.google.cloud.dataflow.sdk.values.KV;

    public class DataflowExample {

    public static class ExtractIdentifierFn extends DoFn<String, KV<String, String>>
    {

    @Override

    public void processElement(ProcessContext c) {

    String line = c.element();

    // Extract the identifier from the file data

    String identifier = extractIdentifier(line);

    c.output(KV.of(identifier, line));

    }

    }

    public static class WriteToBigQueryFn extends DoFn<KV<String, Iterable<String>>,
    Void> {

    @Override

    public void processElement(ProcessContext c) {

    String identifier = c.element().getKey();

    Iterable<String> lines = c.element().getValue();

    // Write the data to the appropriate BigQuery table based on the identifier

    writeToBigQuery(identifier, lines);

    }

    }

    public static void main(String[] args) {

    DataflowPipelineOptions options = PipelineOptionsFactory.fromArgs(args).as(DataflowPipelineOptions.class);

    options.setStreaming(true);

    Pipeline p = Pipeline.create(options);

    p.apply(TextIO.Read.from("gs://<bucket>/*"))

    .apply(ParDo.of(new ExtractIdentifierFn()))

    .apply(GroupByKey.create())

    .apply(ParDo.of(new WriteToBigQueryFn()));

    p.run();

    }

    }

    Listing 6-7

    A Java Dataflow Triggered by a File Added to the Cloud Storage Bucket

    ```


    This example uses the Cloud Dataflow SDK to create a pipeline that reads data
    from a Cloud Storage bucket, extracts an identifier from the file data, groups
    the data by the identifier, and writes the data to the appropriate BigQuery table
    based on the identifier.


    Note that the example uses the `TextIO` class to read data from the Cloud Storage
    bucket, but you could also use the `BigQueryIO` class if you want to read data
    directly from BigQuery.


    Also, the example uses some methods that are not implemented here, like `extractIdentifier()`
    and `writeToBigQuery()`, which should be implemented by you and contain the logic
    for extracting the identifier from the data and writing the data to the BigQuery
    table, respectively.


    Listing [6-8](#603470_1_En_6_Chapter.xhtml#PC8) is an example of the `extractIdentifier()`
    method that could be used in the `ExtractIdentifierFn` class.


    ```

    private static String extractIdentifier(String line) {

    // Example logic for extracting the identifier from the file data

    String[] parts = line.split(",");

    return parts[0];

    }

    Listing 6-8

    Using the extractidentifier() Method

    ```


    This example uses the `split()` method to split the line of data with a comma
    and then returns the first element as the identifier.'
