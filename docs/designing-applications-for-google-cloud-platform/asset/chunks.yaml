    \ FileInputStream(\"path/to/service_account.json\"));\n// 创建存储客户端\nStorage storage\
    \ = StorageOptions.newBuilder().setCredentials(credentials).build().getService();\n\
    // 使用存储客户端与 GCS 进行交互\n// ...\n}\n}\n清单 4-10\n提供服务账号 JSON 的路径\n```\n\n或者，你可以使用\
    \ `GoogleCredentials.getApplicationDefault()` 方法来获取凭据，而无需设置环境变量。\n\n务必确保服务账号密钥的安全，不要共享它或将其检入版本控制系统。\n\
    \n你还可以使用 `GoogleCredentials.fromStream` 方法从流中加载凭据，例如应用程序中的文件或资源。\n\n接下来，我们将讨论安装\
    \ GCS 客户端库。\n\n#### 安装 GCS Java 客户端库\n\n要在你的应用程序中安装 Google Cloud Storage Java\
    \ 客户端库，你需要将该库作为依赖项添加到项目中。GCS Java 客户端库可在 Maven 中央仓库中找到，因此你可以将其作为依赖项添加到构建文件中（例如，Maven\
    \ 项目的 `pom.xml`，Gradle 项目的 `build.gradle` 等）。\n\n以下是安装 GCS Java 客户端库的一般步骤：\n\n\
    1.  将 GCS Java 客户端库作为依赖项添加到你的构建文件中。\n\n    对于 Maven，将以下依赖项添加到你的 `pom.xml` 文件中，如清单\
    \ 4-11 所示。此处提到的版本是本书编写时的版本；请在你实际操作时检查最新版本。\n\n    ```\n    com.google.cloud\n\
    \    google-cloud-storage\n    1.143.0\n\n    清单 4-11\n    Cloud Storage 依赖项\n\
    \    ```\n\n    对于 Gradle，将以下行添加到你的 `build.gradle` 文件中：\n\n    ```\n    implementation\
    \ 'com.google.cloud:google-cloud-storage:1.143.0'\n    ```\n\n2.  运行构建命令以下载该依赖项及其传递依赖项。\n\
    \n    对于 Maven，运行以下命令：\n\n    ```\n    mvn clean install\n    ```\n\n    对于 Gradle，运行以下命令：\n\
    \n    ```\n    gradle build\n    ```\n\nGCS Java 客户端库包含与 GCS 交互所需的类，例如用于创建和管理存储桶的\
    \ `Storage` 类，以及用于创建和管理对象的 `Blob` 类。\n\n你可以从 Maven 中央仓库（[`https://mvnrepository.com/artifact/com.google.cloud/google-cloud-storage`](https://mvnrepository.com/artifact/com.google.cloud/google-cloud-storage)）查看该库的最新版本。\n\
    \n请确保你的系统已安装 Google Cloud SDK，并且环境变量 `GOOGLE_APPLICATION_CREDENTIALS` 已正确设置；否则，代码将抛出异常\
