    of data in real time. This can be useful for use cases such as log analysis, fraud
    detection, and customer behavior tracking.


    *   *Session management*: Cloud Memorystore can store session data for web applications.
    Storing session data in memory can improve the performance and scalability of
    your application.


    *   *E-commerce*: Cloud Memorystore can store and retrieve data for e-commerce
    applications, such as product information, user profiles, and shopping cart data.


    *   *IoT*: Cloud Memorystore can store and manage time-series data for IoT applications,
    such as sensor data, device status, and telemetry data.


    *   *Social media*: Cloud Memorystore can store and retrieve data for social media
    platforms, such as user profiles, posts, and comments.


    *   *User-session data*: Cloud Memorystore can store user-session data, such as
    user profiles, shopping carts, and order history.


    *   *Use as a message broker*: Cloud Memorystore can also be used as a message
    broker, which can help decouple the sender and receiver of a message. It can also
    help implement a pub-sub pattern, where a message is sent to all subscribers.


    Cloud Memorystore can be used in many other ways depending on the specific needs
    of your application.


    Now you should have a better understanding of Cloud SQL and Cloud Spanner. Let’s
    compare both in the next section.'
  trans: '

    ### Cloud Memorystore（云内存存储）


    Cloud Memorystore 是 Google Cloud Platform 提供的一种全托管式内存数据存储服务。它基于开源的 Redis 协议，能够实时存储、检索和操作数据。


    您可以通过在 Memorystore 控制面板上点击“创建实例”来创建 Memorystore 实例。您可以选择 Redis Memorystore 选项，选择实例位置和内存大小，并为实例命名，如图
    4-6 所示。


    ![](img/603470_1_En_4_Fig6_HTML.jpg)


    内存存储页面的截图显示了创建实例的选项，随后是选中 Redis 的选项卡。它有一个用于输入属性名称或值的筛选器，一个包含实例 ID、类型、版本、位置和主端点这
    5 列以及 1 行主题 ID 的表格。


    图 4-6


    Cloud Memorystore（云内存存储）


    Cloud Memorystore 专为需要低延迟、高吞吐量数据访问的场景而设计，例如游戏、实时分析和会话管理。它既可以用作频繁访问数据的缓存，也可以用作实时数据处理的主数据存储。


    以下是 Cloud Memorystore 的一些特性：


    *   自动故障转移和复制，以实现高可用性和灾难恢复

    *   纵向扩展和缩减能力，以应对工作负载的变化

    *   对静态数据和传输中数据进行加密

    *   与其他 GCP 服务集成，例如 Cloud Load Balancing、Cloud Firewall 以及 Cloud Monitoring and
    Logging


    Cloud Memorystore 还提供两个服务层级。


    *   *标准层级*：在性能和成本之间取得平衡，每个实例最大存储容量为 30 GB。

    *   *Memorystore for Redis*：提供更高级别的性能和更大的存储容量，最高可达 100 TB。


    它对于游戏、实时分析、会话管理、缓存等多种应用场景都很有帮助。


    我们来谈谈 Memorystore。


    #### Memorystore 的特性


    以下是 Google Cloud Memorystore 的一些主要特性：


    *   *内存数据存储*：Cloud Memorystore 是一种内存数据存储，它将数据存储在随机存取存储器 (RAM) 中，提供低延迟和高吞吐量的数据访问。

    *   *Redis 兼容性*：Cloud Memorystore 基于开源的 Redis 协议，并与 Redis 客户端、命令和数据结构兼容。

    *   *自动故障转移和复制*：Cloud Memorystore 会自动跨多个区域复制数据，以实现高可用性和灾难恢复。

    *   *纵向扩展和缩减能力*：Cloud Memorystore 可以自动纵向扩展或缩减，以应对工作负载的变化。

    *   *加密*：Cloud Memorystore 对静态数据和传输中数据进行加密，以提供额外的安全层。

    *   *与其他 GCP 服务集成*：Cloud Memorystore 可以与其他 GCP 服务集成，例如 Cloud Load Balancing、Cloud
    Firewall 以及 Cloud Monitoring and Logging。

    *   *标准层级和 Memorystore for Redis 层级*：Cloud Memorystore 提供两个服务层级：标准层级和 Memorystore
    for Redis 层级。标准层级在性能和成本之间取得平衡，而 Memorystore for Redis 层级则提供更高级别的性能和更大的存储容量。

    *   *灵活的部署选项*：Cloud Memorystore 可以部署在本地、混合环境或云端。

    *   *Cloud Memorystore for Firebase*：Cloud Memorystore for Firebase 允许从 Firebase
    客户端 SDK 快速安全地访问 Cloud Memorystore，从而实现实时数据访问和轻松扩展。

    *   *监控和日志记录*：Cloud Memorystore 提供详细的监控和日志记录功能，帮助您了解数据存储的性能和使用情况。


    接下来，我们将在下一节讨论 Memorystore 的使用场景。


    ##### Memorystore 的使用场景


    Cloud Memorystore 可用于多种场景；以下是一些示例：


    *   *缓存*：Cloud Memorystore 可用作频繁访问数据的缓存，例如网页内容、图像和会话数据。将数据缓存在内存中可以显著减少响应时间，并提高应用程序的整体性能。

    *   *游戏*：Cloud Memorystore 可以实时存储游戏状态、玩家数据和排行榜。其低延迟和高吞吐量的特性使其非常适合处理游戏应用中的大量数据和高并发需求。

    *   *实时分析*：Cloud Memorystore 可以实时存储和处理大量数据。这对于日志分析、欺诈检测和客户行为跟踪等场景非常有用。

    *   *会话管理*：Cloud Memorystore 可以存储 Web 应用程序的会话数据。将会话数据存储在内存中可以提高应用程序的性能和可扩展性。

    *   *电子商务*：Cloud Memorystore 可以存储和检索电子商务应用程序的数据，例如产品信息、用户资料和购物车数据。

    *   *物联网*：Cloud Memorystore 可以存储和管理物联网应用的时间序列数据，例如传感器数据、设备状态和遥测数据。

    *   *社交媒体*：Cloud Memorystore 可以存储和检索社交媒体平台的数据，例如用户资料、帖子和评论。

    *   *用户会话数据*：Cloud Memorystore 可以存储用户会话数据，例如用户资料、购物车和订单历史。

    *   *用作消息代理*：Cloud Memorystore 也可以用作消息代理，这有助于解耦消息的发送者和接收者。它还有助于实现发布-订阅模式，即向所有订阅者发送消息。


    根据您应用程序的具体需求，Cloud Memorystore 还有许多其他用途。


    现在您应该对 Cloud SQL 和 Cloud Spanner 有了更好的理解。让我们在下一节中对两者进行比较。

