  trans: "\n# 5. Google Cloud SQL\n\n在本章中，我们将讨论如何使用 Google Cloud SQL 在基于云的 SQL 数据库中存储和管理数据。我们将介绍使用\
    \ Cloud SQL 的各个方面，例如创建 Cloud SQL 实例、连接到该实例、创建表，以及插入、更新和查询数据。我们还将讨论如何使用 Java 编程语言与\
    \ Cloud SQL 进行交互。\n\nGoogle Cloud SQL 是 Google Cloud Platform (GCP) 提供的一种全托管关系型数据库服务，允许用户使用\
    \ MySQL、PostgreSQL 或 SQL Server 数据库引擎创建和管理数据库。它提供了一个基于 Web 的简单界面来管理数据库，并与 App\
    \ Engine、Compute Engine 和 Cloud Storage 等其他 GCP 服务集成。\n\n借助 Cloud SQL，用户可以轻松创建、配置和管理数据库，并享受自动备份、自动软件更新以及内置的监控和日志记录功能。用户还可以选择创建新数据库或导入现有数据库。\n\
    \nCloud SQL 提供了多种功能来帮助用户管理其数据库，例如：\n\n*   *自动备份*：Cloud SQL 会自动创建和管理数据库备份，以便您可以轻松地从数据丢失或损坏中恢复。\n\
    \n*   *自动软件更新*：Cloud SQL 会自动将数据库软件更新到最新版本，确保您的数据库始终拥有最新的安全性和性能增强功能。\n\n*   *高可用性*：Cloud\
    \ SQL 是 Google Cloud Platform 提供的一项服务，允许您在云中运行数据库。它就像一个数字仓库，以有序的方式存储信息。Cloud SQL\
    \ 的优势之一在于，即使出现问题，它也能确保您的信息安全且可用。它通过在主副本出现问题时自动切换到数据库的备份副本来实现这一点。\n\n*   *可伸缩性*：Cloud\
    \ SQL 允许您根据需要轻松地向上或向下扩展数据库，且停机时间最短。\n\n*   *安全性*：Cloud SQL 提供了多种安全功能来帮助保护您的数据库，例如静态和传输中加密，以及使用防火墙规则控制对数据库的访问。\n\
    \n*   *监控和日志记录*：Cloud SQL 提供内置的监控和日志记录功能，因此您可以轻松跟踪数据库的性能和活动。\n\n*   *与其他 GCP 服务的集成*：Cloud\
    \ SQL 可以轻松地与 App Engine、Compute Engine 和 Cloud Storage 等其他 GCP 服务集成，从而轻松为您的应用程序构建完整的基于云的解决方案。\n\
    \n对于寻求易于使用且易于与其他 GCP 服务集成的全托管、高性能关系型数据库服务的用户来说，Cloud SQL 是一个绝佳的选择。\n\n## Cloud\
    \ SQL 数据库的自动备份\n\n自动备份是 Google Cloud SQL 的一项功能，允许该服务自动创建和管理数据库备份。这些备份存储在单独的存储位置，可用于从数据丢失或损坏中恢复。\n\
    \n备份的频率和保留期可由用户配置。例如，您可以设置每天、每周或每月进行备份，最多可保留 365 个备份。您还可以设置备份的保留期，这意味着超过您设置的保留期的备份将被自动删除。\n\
    \nCloud SQL 备份是增量备份，这意味着新备份仅包含自上次备份以来对数据库所做的更改。这使得备份过程更高效，并降低了存储成本。这意味着 Cloud\
    \ SQL 会对您的数据库实例进行一次完整备份，然后使用增量备份仅捕获自上次备份以来所做的更改。这意味着第一个备份包含数据库中的所有数据，但后续备份仅捕获新的或更改的数据，而不是在每个备份中复制所有数据。\n\
    \n这些备份可用于恢复整个数据库或特定表，也可用于创建与原始数据库具有相同数据的新 Cloud SQL 实例。\n\nGoogle Cloud SQL 中的自动备份功能允许用户自动创建和管理数据库备份，并具有可配置的频率和保留期。这些备份可用于从数据丢失或损坏中恢复，也可用于创建与原始数据库具有相同数据的新\
    \ Cloud SQL 实例。\n\n现在我们将讨论配置自动备份。\n\n### 配置自动备份\n\n要为 Cloud SQL 实例配置自动备份，您可以按照以下步骤操作：\n\
    \n1.  转到 Google Cloud Console 中的 Cloud SQL 实例页面。\n\n2.  单击要为其配置自动备份的实例。\n\n3.\
    \  在实例详细信息页面上，单击“备份”选项卡。\n\n4.  在“自动备份”部分，您可以配置以下选项：\n    *   *备份窗口*：执行备份的时间窗口。您可以选择预定义的窗口或指定自定义窗口。\n\
    \n    *   *保留期*：备份将被保留的天数。达到保留期后，备份将被自动删除。\n\n5.  单击“保存”以应用更改。\n\n需要注意的是，备份仅会在您指定的备份窗口内执行，并且仅当实例在该窗口期间处于运行状态时才会执行。\n\
    \n您还可以在“备份”选项卡上查看备份状态并下载备份。\n\n注意\n\n当您创建新的 Cloud SQL 实例时，默认启用自动备份，保留期设置为 7 天。\n\
    \n## 数据库软件自动更新到最新版本\n\nGoogle Cloud SQL 的自动软件更新功能允许该服务自动将数据库软件更新到最新版本。这确保了您的数据库始终拥有最新的安全性和性能增强功能。\n\
    \n当数据库软件的新版本发布时，Cloud SQL 会安排一个更新窗口，在此期间应用更新。用户可以自定义更新窗口。更新过程设计为无中断，这意味着在更新过程中您的数据库将继续可用。\n\
    \n需要注意的是，自动软件更新仅适用于数据库软件，而不适用于数据库中存储的数据。此外，在将更新应用于生产数据库之前，最好先在非生产环境中进行测试。\n\n\
    要为 Cloud SQL 实例配置自动软件更新，您可以按照以下步骤操作：\n\n1.  转到 Google Cloud Console 中的 Cloud SQL\
    \ 实例页面。\n\n2.  单击要为其配置自动更新的实例。\n\n3.  在实例详细信息页面上，单击“设置”选项卡。\n\n4.  在“自动更新”部分，您可以选择“自动修补次要版本升级”选项。\n\
    \n5.  单击“保存”以应用更改。\n\n需要注意的是，自动软件更新仅适用于次要版本更新，而不适用于主要版本更新。对于主要版本更新，用户将收到通知，并且必须手动执行更新。\n\
    \n简而言之，自动软件更新是 Google Cloud SQL 中的一项功能，允许该服务自动将数据库软件更新到最新版本，确保数据库始终拥有最新的安全性和性能增强功能。此功能可以在\
    \ Cloud SQL 实例中进行配置，并且是无中断的，这意味着在更新过程中数据库将继续可用。\n"
- fmt: '# High Availability of Google Cloud SQL


    High availability (HA) is a feature that ensures that a system or service is continuously
    operational and available to users, even in the event of planned or unplanned
    outages. In the context of Google Cloud SQL, high availability refers to the ability
    of the service to keep databases running and accessible, even in the event of
    an unexpected failure or maintenance.


    Google Cloud SQL offers several options for achieving high availability.


    - **Read replicas**: This feature allows you to create one or more read-only replicas
    of a master database. The replicas are updated in real time with the master database
    and can be used to offload read traffic from the master. This helps to improve
    performance and reduce the risk of overloading the master database.


    - **Automatic failover**: This feature automatically switches over to a standby
    replica if the primary instance fails. This ensures that the service remains available
    even in the case of an unexpected failure. For high availability, you can set
    up read replicas in different regions and failover on it if the whole region is
    down.


    - **Multizone deployment**: This feature allows you to deploy your Cloud SQL instances
    across multiple availability zones within a region. This provides additional protection
    against failures and outages caused by zone-specific issues, such as power outages
    or network failures.


    - **Cloud SQL for PostgreSQL and MySQL support for replication**: This means that
    you can use replication to create a highly available setup.


    - **Cloud SQL for PostgreSQL and MySQL support Cloud SQL managed replication**:
    This means you can use replication and managed by Cloud SQL service to create
    a highly available setup.


    It’s worth noting that some of these options may come with additional costs, and
    it’s important to evaluate the specific requirements and cost implications of
    each option before deciding on a high availability solution for your Cloud SQL
    instances.


    Google Cloud SQL offers several options for achieving high availability such as
    read replicas, automatic failover, multizone deployment, and replication support
    for both PostgreSQL and MySQL. These options can help to improve performance and
    reduce the risk of overloading the master database, ensuring service availability
    even in the case of unexpected failure or maintenance.


    Let’s talk read replicas in detail in the next section.


    ## Cloud SQL Read Replicas


    Read replicas are a feature in Google Cloud SQL that allows you to create one
    or more read-only copies of a master database. These replicas are updated in real
    time with the master database and can be used to offload read traffic from the
    master. This helps to improve performance and reduce the risk of overloading the
    master database.


    When a read replica is created, it initially replicates the data from the master
    database. After that, it continuously receives updates from the master database
    through the replication process. This ensures that the replica always has the
    most recent data.


    Read replicas can be used for several purposes, such as the following:


    - **Scaling read performance**: By offloading read traffic to replicas, you can
    improve the overall performance of your database. This is particularly useful
    for read-heavy workloads or for serving users in different geographic locations.


    - **Analytical workloads**: By having read replicas, you can create a separate
    replica for analytical workloads; this will help to avoid impacting the performance
    of the primary replica.


    - **Backups**: Read replicas can be used as a source for creating backups.


    - **Multiregion deployments**: By having read replicas in different regions, you
    can serve users in different geographic locations with lower latency.


    Read replicas are supported for Cloud SQL for MySQL and Cloud SQL for PostgreSQL.


    It’s important to note that while read replicas can be used to offload read traffic,
    they cannot be used to offload write traffic. Writes must be directed to the master
    database. Also, it’s important to evaluate the cost implications of creating read
    replicas, as each replica instance incurs additional charges.


    The replicas can be used for several purposes such as scaling read performance,
    analytical workloads, backups, and multiregion deployments. They are supported
    for Cloud SQL for MySQL and Cloud SQL for PostgreSQL, but it’s important to evaluate
    the cost implications of creating read replicas as each replica instance incurs
    additional charges.


    Next, we will discuss the automatic failover of Cloud SQL.


    ## Cloud SQL: Automatic Failover


    Automatic failover is a feature in Google Cloud SQL that automatically switches
    to a standby replica if the primary instance fails. This ensures that the service
    remains available even if there is an unexpected failure.


    When a primary instance fails, the system automatically switches to a healthy
    replica, which becomes the new primary instance. This process is transparent to
    users and applications and should not disrupt service availability.


    Automatic failover is supported for Cloud SQL for MySQL and Cloud SQL for PostgreSQL
    instances with replication enabled.


    When you create a new Cloud SQL instance, you can specify whether you want to
    enable automatic failover. If you choose to enable automatic failover, you can
    also specify the number of replicas you want to create, as well as the zone or
    region where you want to create them.


    It’s worth noting that automatic failover comes with additional costs, and it’s
    important to evaluate the specific requirements and cost implications of this
    feature before deciding to enable it for your Cloud SQL instances.


    Automatic failover is supported for Cloud SQL for MySQL and Cloud SQL for PostgreSQL
    instances with replication enabled. When you create a new Cloud SQL instance,
    you can specify whether you want to enable automatic failover and the number of
    replicas you want to create. However, it’s important to evaluate the specific
    requirements and cost implications of this feature before deciding to enable it
    for your Cloud SQL instances.


    ### Multizone Deployment


    Multizone deployment is a feature in Google Cloud SQL that allows you to create
    replicas of a master database across multiple zones within a region. This improves
    the availability and durability of your database by providing protection against
    zone-level failures.


    When you create a Cloud SQL instance, you can specify the number of zones you
    want to create replicas in. Google Cloud SQL automatically creates replicas in
    different zones and keeps them in sync with the master database.


    If the primary instance fails, one of the replicas in a different zone will automatically
    be promoted to primary and take over. This process is transparent to users and
    applications and should not disrupt service availability.


    Multizone deployment is supported for Cloud SQL for MySQL and Cloud SQL for PostgreSQL
    instances.


    It’s worth noting that using multiple zones for replication increases the cost
    of running the Cloud SQL instances. It’s important to evaluate the specific requirements
    and cost implications of this feature before deciding to enable it for your Cloud
    SQL instances.


    This feature is supported for Cloud SQL for MySQL and Cloud SQL for PostgreSQL
    instances. When creating a new Cloud SQL instance, you can specify the number
    of zones you want to create replicas in. However, it’s important to evaluate the
    specific requirements and cost implications of this feature before deciding to
    enable it for your Cloud SQL instances.'
