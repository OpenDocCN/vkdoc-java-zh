    \ at the bottom of the page.\n\n**Figure 3-3** – App Engine application creation\n\
    \n![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig2_HTML.jpg)\n\nA screenshot\
    \ of the cloud shell terminal has a few lines of text. It has a welcome note and\
    \ different commands for help and to set a cloud platform project in a particular\
    \ session.\n\n**Figure 3-2** – Cloud shell\n\n1. **Install the Google Cloud SDK**:\
    \ The first step is to install the Google Cloud SDK, a set of tools for working\
    \ with GAE and other Google Cloud services. You can download the SDK from the\
    \ Google Cloud website and follow the instructions for installation.\n\n2. **Create\
    \ a new project**: Once the SDK is installed, you can use the `gcloud` command-line\
    \ tool to create a new project.\n\n   `gcloud app create --project=[PROJECT-ID]`\n\
    \n   This project will contain all the resources needed for your web application,\
    \ such as the runtime, services, and configuration files. You can use your already\
    \ created project.\n\n3. **Create a new application**: After creating the project,\
    \ you can use the `gcloud` command-line tool to create a new application within\
    \ the project. Figure [3-2](#603470_1_En_3_Chapter.xhtml#Fig2) shows the Cloud\
    \ Shell terminal. This application will be the container for your web application\
    \ code, and it will have a unique URL that you can use to access it.\n\n4. **Create\
    \ a new module**: Once you have created the application, you can create a new\
    \ module within the application. This module will contain the code for your web\
    \ application and will be configured to use the Java runtime.\n\n5. **Write the\
    \ application code**: You can now write the code for your web application using\
    \ Java. You can use any Java framework or library you like, such as Spring or\
    \ JSP, but you will also need to use the GAE Java SDK to access the services provided\
    \ by GAE.\n\n6. Make sure that you have required IAM permission. You can check\
    \ the Cloud Build Settings page to make sure that the App Engine Admin role and\
    \ Service Account User role are enabled. If not, you should enable them, as shown\
    \ in Figure [3-4](#603470_1_En_3_Chapter.xhtml#Fig4).\n\n7. **Deploy the application**:\
    \ Once the code is written, you can use the `gcloud` command-line tool to deploy\
    \ the application to GAE. The tool will package the code and configuration files\
    \ and then upload them to the GAE servers, as shown in Listing [3-1](#603470_1_En_3_Chapter.xhtml#PC1).\n\
    \n   ```\n   bdayhajipur11@cloudshell:~ (elearning-dev-377915)$ gcloud app deploy\n\
    \   Services to deploy:\n   descriptor:                  [/home/bdayhajipur11/app.yaml]\n\
    \   source:                      [/home/bdayhajipur11]\n   target project:   \
    \           [elearning-dev-377915]\n   target service:              [default]\n\
    \   target version:              [20230226t202402]\n   target url:           \
    \       [https://elearning-dev-377915.uc.r.appspot.com]\n   target service account:\
    \      [App Engine default service account]\n   Do you want to continue (Y/n)?\
    \  y\n   Beginning deployment of service [default]...\n   Uploading 16 files to\
    \ Google Cloud Storage\n   6%\n   12%\n   19%\n   25%\n   31%\n   38%\n   44%\n\
    \   50%\n   56%\n   62%\n   69%\n   75%\n   81%\n   88%\n   94%\n   100%\n   100%\n\
    \   File upload done.\n   Updating service [default]...done.\n   Setting traffic\
    \ split for service [default]...done.\n   Deployed service [default] to [https://elearning-dev-377915.uc.r.appspot.com]\n\
    \   You can stream logs from the command line by running:\n   $ gcloud app logs\
    \ tail -s default\n   To view your application in the web browser run:\n   $ gcloud\
    \ app browse\n   bdayhajipur11@cloudshell:~ (elearning-dev-377915)$\n   Listing\
    \ 3-1\n   Deploying the Application on GAE\n   ```\n\n8. **Test the application**:\
    \ Once the application is deployed, you can use the URL of your application to\
    \ access it and test it. You can also use the GAE console to view the logs and\
    \ monitor the performance of your application, as shown in Figure [3-5](#603470_1_En_3_Chapter.xhtml#Fig5).\n\
    \nYou can follow the previous steps to create a sample web application using Java\
    \ on GAE. The exact details of the process will depend on the specific requirements\
    \ of your application, such as the framework you choose and the services you need\
    \ to use.\n\nGoogle also provides several sample applications with different languages\
    \ and frameworks that you can use as a starting point and reference. You can find\
    \ them at [`https://github.com/GoogleCloudPlatform/java-docs-samples`](https://github.com/GoogleCloudPlatform/java-docs-samples)."
