- fmt: '# Using Cloud SQL for Data Storage in a Java Application


    Listing [5-2](#603470_1_En_5_Chapter.xhtml#PC14) shows a detailed example of how
    you can use the Google Cloud SQL JDBC driver to connect to a Cloud SQL instance
    running MySQL and perform some basic CRUD operations in a Java application.


    ```

    import java.sql.Connection;

    import java.sql.DriverManager;

    import java.sql.PreparedStatement;

    import java.sql.ResultSet;

    import java.sql.SQLException;

    import java.sql.Statement;

    public class CloudSQL {

    // Replace with your Cloud SQL instance connection name

    private static final String INSTANCE_CONNECTION_NAME = "my-gcp-project:us-central1:my-cloud-sql-instance";

    // Replace with your Cloud SQL instance username

    private static final String USERNAME = "myusername";

    // Replace with your Cloud SQL instance password

    private static final String PASSWORD = "mypassword";

    // Replace with your database name

    private static final String DATABASE_NAME = "mydatabase";

    // JDBC URL format: jdbc:mysql://[HOST]:[PORT]/[DB_NAME]

    private static final String JDBC_URL = String.format("jdbc:mysql://google/%s?cloudSqlInstance=%s&"

    + "socketFactory=com.google.cloud.sql.mysql.SocketFactory", DATABASE_NAME, INSTANCE_CONNECTION_NAME);

    public static void main(String[] args) throws SQLException {

    // Connect to the Cloud SQL instance

    Connection connection = DriverManager.getConnection(JDBC_URL, USERNAME, PASSWORD);

    // Create a table

    createTable(connection);

    // Insert some data

    insertData(connection);

    // Read the data

    readData(connection);

    // Update the data

    updateData(connection);

    // Delete the data

    deleteData(connection);

    // Close the connection

    connection.close();

    }

    private static void createTable(Connection connection) throws SQLException {

    Statement statement = connection.createStatement();

    statement.executeUpdate("CREATE TABLE mytable (id INT PRIMARY KEY, name VARCHAR(255))");

    }

    private static void insertData(Connection connection) throws SQLException {

    PreparedStatement statement = connection.prepareStatement("INSERT INTO mytable
    (id, name) VALUES (?, ?)");

    statement.setInt(1, 1);

    statement.setString(2, "John Doe");

    statement.executeUpdate();

    }

    private static void readData(Connection connection) throws SQLException {

    Statement statement = connection.createStatement();

    ResultSet resultSet = statement.executeQuery("SELECT * FROM mytable");

    while (resultSet.next()) {

    int id = resultSet.getInt("id");

    String name = resultSet.getString("name");

    System.out.println("ID: " + id + ", Name: " + name);

    }

    }

    private static void updateData(Connection connection) throws SQLException {

    PreparedStatement statement = connection.prepareStatement("UPDATE mytable SET
    name = ? WHERE id = ?");

    statement.setString(1,"Jane Doe");

    statement.setInt(2, 1);

    statement.executeUpdate();

    }

    private static void deleteData(Connection connection) throws SQLException {

    PreparedStatement statement = connection.prepareStatement("DELETE FROM mytable
    WHERE id = ?");

    statement.setInt(1, 1);

    statement.executeUpdate();

    }

    }

    }

    Listing 5-2

    Using Google Cloud SQL JDBC Driver to Connect to a Cloud SQL Instance Running
    MySQL

    ```


    This example assumes you have a Cloud SQL instance running MySQL and that you
    have created a database named `mydatabase`. You will need to replace the `INSTANCE_CONNECTION_NAME`,
    `USERNAME`, `PASSWORD`, and `DATABASE_NAME` variables with the appropriate values
    for your Cloud SQL instance.


    The example starts by connecting to the Cloud SQL instance using the JDBC URL,
    username, and password, and then creates a table named `mytable` with two columns:
    `id` and `name`.


    It then inserts a single row of data into the table, reads the data back, updates
    the data, and finally deletes the data.


    It is important to note that you will need to add the Google Cloud SQL JDBC driver
    to your application’s classpath for this example to work. You can download the
    driver from the following link: [`https://github.com/GoogleCloudPlatform/cloud-sql-jdbc-driver`](https://github.com/GoogleCloudPlatform/cloud-sql-jdbc-driver).


    Also, you will need to enable the Cloud SQL API and create a service account with
    the appropriate permissions to access your Cloud SQL instance.


    In this example, I am storing the password in a variable and providing inline
    database connection string. In production code, you should follow the best practice
    for storing password and connection strings in secrets.


    ## Summary


    In this chapter, you learned about using Google Cloud SQL, a fully managed database
    service, to store and manage data in the cloud. We discussed the benefits of using
    Cloud SQL, the types of databases supported, and how to create and manage instances
    using the Cloud Console, `gcloud` command-line tool, and API. We also explored
    how to interact with Cloud SQL using programming languages such as Java and how
    to create tables, insert data, and run queries on Cloud SQL instances. Finally,
    we walked through an example of using the Google Cloud SQL JDBC driver to connect
    to a Cloud SQL instance running MySQL and perform basic CRUD operations in a Java
    application.


    # Advanced GCP Services


    In this chapter, we will explore the practical aspects of GCP’s advanced services.
    It covers key topics such as Big Data and Machine Learning, Cloud Pub/Sub, Cloud
    Dataflow, Cloud Dataproc, and Cloud Functions. Through real-world examples, the
    chapter showcases the use of these services in building scalable, resilient, and
    data-driven applications. By the end of this chapter, readers will understand
    how to leverage Cloud Pub/Sub, Cloud Dataflow, Cloud Dataproc, and Cloud Functions
    to design and implement powerful solutions on GCP.


    Let’s go through the advanced services of GCP.


    ## GCP Advanced Services


    There are many advanced services offered by Google Cloud Platform (GCP) that can
    be used to build and deploy complex applications. We will discuss some of these
    services in this section.


    ### Big Data and Machine Learning


    **Cloud Dataflow** allows you to build, deploy, and execute data pipelines for
    batch and streaming data. It can process data using both batch and streaming execution
    models and can be used for data integration, data transformation and data analysis.
    For example, you can use Cloud Dataflow to process data from a real-time streaming
    service like Twitter and perform sentiment analysis on the tweets.


    **Cloud Dataproc** allows you to create, configure, and manage clusters of virtual
    machines that are preconfigured with popular big data tools like Apache Hadoop
    and Apache Spark. It can be used to process large amounts of data with the help
    of Hadoop and Spark jobs. For example, you can use Cloud Dataproc to process a
    large dataset of customer records and perform customer segmentation.


    **Cloud Datalab** is an interactive tool for data exploration, visualization,
    and machine learning on GCP. It runs on top of a Jupyter Notebook and allows you
    to connect to various GCP services such as BigQuery and Cloud Storage. For example,
    you can use Cloud Datalab to connect to a BigQuery dataset, perform SQL queries,
    visualize the results, and build a machine learning model to predict customer
    churn.


