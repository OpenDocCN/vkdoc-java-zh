  trans: '

    选择 Cloud SQL 还是 AlloyDB 将取决于您的具体需求和条件。如果您需要兼容 MySQL 的数据库服务，Cloud SQL 会是一个不错的选择。如果您需要兼容
    PostgreSQL 的数据库服务，那么 AlloyDB 会是一个不错的选择。如果您需要提供最新特性和技术的数据库服务，那么 AlloyDB 会是一个不错的选择。对于不需要大量数据处理的工作负载，Cloud
    SQL 通常比 AlloyDB 更便宜。然而，对于需要大量数据处理的工作负载，AlloyDB 可能更具成本效益。


    ### Google Cloud Spanner


    Google Cloud Spanner 是 Google Cloud 提供的一种高度可扩展、全球分布式的托管关系型数据库服务。它旨在跨所有节点提供水平扩展性和强一致性，使其成为需要强一致性和高性能的应用程序的绝佳选择。凭借其对
    SQL、事务和二级索引的支持，Spanner 提供了熟悉的数据库抽象，使开发人员易于使用并集成到现有应用程序中。Spanner 的全球分布式架构、自动故障转移和低延迟使其成为高可用性和关键任务应用程序的理想选择。凭借其可扩展性、可靠性和一致性，Cloud
    Spanner 为希望实现数据架构现代化并将其应用程序迁移到云端的组织，提供了一种经济高效且可扩展的传统关系型数据库替代方案。


    即使使用 GCP 的 300 美元、90 天试用期，您也可以为 Cloud Spanner 单独开始一个 90 天的免费试用。您将获得 10 GB 的存储空间，该存储空间不会从您的信用额度中扣费。


    如图 1-25 所示，点击“开始免费试用”按钮，您可以通过提供实例名称、实例 ID 和配置中的位置来创建一个 Spanner 实例。


    ![](img/603470_1_En_1_Fig25_HTML.jpg)


    Google Cloud Spanner 页面的截图。页面顶部有一条欢迎消息，接着是几行关于 Spanner 的文本，页面底部有一个开始免费试用的按钮。


    图 1-25


    Cloud Spanner


    创建 Cloud Spanner 实例时（见图 1-26），请指定您希望用于运行数据库的节点数量。每个节点提供一定量的计算和存储资源，您使用的节点越多，可用于运行数据库的计算和存储资源就越多。


    ![](img/603470_1_En_1_Fig26_HTML.jpg)


    试用实例创建页面的截图。页面中有几行关于试用实例详情的文本，一个用于输入实例名称和实例 ID 的文本框，以及一个用于选择配置的下拉菜单。页面底部有一个创建免费试用实例的按钮。


    图 1-26


    为 Spanner 创建实例


    节点是作为 Cloud Spanner 服务一部分运行的计算和存储资源单元。一个节点可以被视为一个为运行 Cloud Spanner 软件而优化的虚拟机。


    Cloud Spanner 使用分布式架构来提供高可用性和可扩展性。数据库被分区为多个分片，这些分片分布在多个节点上。每个节点存储一部分数据，并处理针对该部分数据的查询。这使得
    Cloud Spanner 能够高速处理大型数据库和复杂查询。


    Cloud Spanner 还跨所有节点和分片提供强一致性。这意味着所有客户端将在同一时间看到相同的数据，即使在重负载下也是如此。为了实现强一致性，Cloud
    Spanner 使用一种分布式提交协议，确保所有节点就事务提交的顺序达成一致。


    创建 Cloud Spanner 实例后，您可以放心使用它，无需担心扩展问题，同时仍能获得像 MySQL 这样的 RDBMS 的 ACID 特性带来的好处。


    ### Google Cloud Dataflow


    Google Cloud Dataflow 是一种用于实时转换和分析数据的全托管服务。它旨在帮助开发人员处理和分析来自各种来源（如批处理和流式数据）的数据。Cloud
    Dataflow 允许开发人员使用支持批处理和流处理的高级、简单 API 来构建数据处理管道。它提供了许多功能来优化数据处理管道的性能和可扩展性，包括自动并行处理、优化的数据移动和集成的错误处理。此外，Dataflow
    与其他 Google Cloud Platform 服务（如 BigQuery、Cloud Storage 和 Cloud Pub/Sub）集成，使开发人员能够轻松地在云端分析和存储数据。


    您可以创建批处理或流式数据作业、创建数据管道，并将流式管道的状态保存为快照。图 1-27 显示了 Dataflow 仪表板。


    ![](img/603470_1_En_1_Fig27_HTML.jpg)


    Cloud Dataflow 页面的截图。页面左侧选中了“概览”选项。右侧显示了 Cloud Dataflow 的详细信息、一个 Dataflow 图表，以及四个常见操作：创建作业、查看协议、创建数据管道和查看快照。


    图 1-27


    Cloud Dataflow 仪表板


    要创建任何新作业，如果尚未启用，您需要为您的项目启用 Dataflow API；图 1-28 显示了“启用”按钮。


    ![](img/603470_1_En_1_Fig28_HTML.jpg)


    Google Cloud 产品详情窗口的截图。页面左侧有一个徽标，其右侧是标题“Dataflow API”。页面底部有一个“启用”按钮。


    图 1-28


    启用 Dataflow API


    Dataflow 内部使用 Apache Beam，并且它有一些预构建的模板，用于创建涵盖大多数常见场景的作业。您可以使用预构建模板创建 Dataflow
    作业，也可以根据项目需求创建模板。图 1-29 展示了如何从模板创建 Dataflow 作业。


    ![](img/603470_1_En_1_Fig29_HTML.png)


    从模板创建作业的页面截图。页面中有一个用于输入作业名称的文本框，两个用于选择区域端点和数据流模板的下拉菜单，以及三个用于浏览必需参数的选项。


    图 1-29


    从模板创建作业


    要创建 Cloud Dataflow 管道，您首先需要确定数据的来源，例如文件或数据库。然后，您需要使用支持的编程语言编写代码，以定义数据的处理方式，例如通过过滤或分组。代码编写完成后，您需要将其打包成一种可以分发并在
    Cloud Dataflow 服务上执行的格式。

