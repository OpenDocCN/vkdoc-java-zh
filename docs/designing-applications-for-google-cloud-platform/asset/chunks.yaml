  trans: "\n### 创建示例 Web 应用程序\n\n在 Google App Engine 上使用 Java 创建示例 Web 应用程序是一个相对直接的过程。不过，它确实需要一些设置和配置。以下是创建示例\
    \ Web 应用程序时可以遵循的一般步骤：\n\n![](img/603470_1_En_3_Fig5_HTML.jpg)\n\n应用控制台的截图，显示了几行命令。其中包含一条浏览\
    \ g cloud 应用的命令，第二行显示一条消息，提示未检测到浏览器，随后是一个查看应用的链接，最后一行没有消息。\n\n图 3-5\n\n访问已部署的应用\n\
    \n![](img/603470_1_En_3_Fig4_HTML.jpg)\n\n设置页面的截图。右侧选中了服务账号选项卡。其中包含一段关于服务账号权限的详细说明、一个服务账号电子邮件地址，以及一个包含三列（G\
    \ C P 服务、角色和状态）的表格。\n\n图 3-4\n\nIAM 权限\n\n![](img/603470_1_En_3_Fig3_HTML.jpg)\n\
    \n应用程序窗口的截图，显示一行文字“欢迎使用 App Engine”，随后是引擎的详细信息。它有一个复选框，显示“App Engine 应用程序已创建”，页面底部有一个“开始使用”按钮。\n\
    \n图 3-3\n\n创建 App Engine 应用程序\n\n![](img/603470_1_En_3_Fig2_HTML.jpg)\n\nCloud\
    \ Shell 终端的截图，显示了几行文本。其中包含一条欢迎信息，以及用于获取帮助和在特定会话中设置云平台项目的不同命令。\n\n图 3-2\n\nCloud\
    \ Shell\n\n1.  *安装 Google Cloud SDK*：第一步是安装 Google Cloud SDK，这是一套用于处理 GAE 和其他\
    \ Google Cloud 服务的工具。您可以从 Google Cloud 网站下载 SDK，并按照说明进行安装。\n\n2.  *创建新项目*：安装 SDK\
    \ 后，您可以使用 `gcloud` 命令行工具创建一个新项目。\n\n*gcloud app create --project=[项目 ID]*\n\n\
    该项目将包含您的 Web 应用程序所需的所有资源，例如运行时、服务和配置文件。您也可以使用已创建的项目。\n\n3.  *创建新应用程序*：创建项目后，您可以使用\
    \ `gcloud` 命令行工具在项目中创建一个新应用程序。图 3-2 显示了 Cloud Shell 终端。此应用程序将是您的 Web 应用程序代码的容器，并且会有一个唯一的\
    \ URL 供您访问。\n\n4.  *创建新模块*：创建应用程序后，您可以在应用程序中创建一个新模块。此模块将包含您的 Web 应用程序的代码，并配置为使用\
    \ Java 运行时。\n\n5.  *编写应用程序代码*：现在，您可以使用 Java 编写 Web 应用程序的代码。您可以使用任何喜欢的 Java 框架或库，例如\
    \ Spring 或 JSP，但您还需要使用 GAE Java SDK 来访问 GAE 提供的服务。\n\n6.  确保您拥有所需的 IAM 权限。您可以检查\
    \ Cloud Build 设置页面，确保已启用 App Engine 管理员角色和服务账号用户角色。如果未启用，您应该启用它们，如图 3-4 所示。\n\n\
    7.  *部署应用程序*：代码编写完成后，您可以使用 `gcloud` 命令行工具将应用程序部署到 GAE。该工具将打包代码和配置文件，然后将其上传到 GAE\
    \ 服务器，如代码清单 3-1 所示。\n\n```\n    bdayhajipur11@cloudshell:~ (elearning-dev-377915)$\
    \ gcloud app deploy\n    Services to deploy:\n    descriptor:                \
    \  [/home/bdayhajipur11/app.yaml]\n    source:                      [/home/bdayhajipur11]\n\
    \    target project:              [elearning-dev-377915]\n    target service:\
    \              [default]\n    target version:              [20230226t202402]\n\
    \    target url:                  [https://elearning-dev-377915.uc.r.appspot.com]\n\
    \    target service account:      [App Engine default service account]\n    Do\
    \ you want to continue (Y/n)?  y\n    Beginning deployment of service [default]...\n\
    \    Uploading 16 files to Google Cloud Storage\n    6%\n    12%\n    19%\n  \
    \  25%\n    31%\n    38%\n    44%\n    50%\n    56%\n    62%\n    69%\n    75%\n\
    \    81%\n    88%\n    94%\n    100%\n    100%\n    File upload done.\n    Updating\
    \ service [default]...done.\n    Setting traffic split for service [default]...done.\n\
    \    Deployed service [default] to [https://elearning-dev-377915.uc.r.appspot.com]\n\
    \    You can stream logs from the command line by running:\n    $ gcloud app logs\
    \ tail -s default\n    To view your application in the web browser run:\n    $\
    \ gcloud app browse\n    bdayhajipur11@cloudshell:~ (elearning-dev-377915)$\n\
    \    代码清单 3-1\n    在 GAE 上部署应用程序\n    ```\n\n8.  *测试应用程序*：部署应用程序后，您可以使用应用程序的 URL\
    \ 访问并测试它。您还可以使用 GAE 控制台查看日志并监控应用程序的性能，如图 3-5 所示。\n\n您可以按照上述步骤在 GAE 上使用 Java 创建示例\
    \ Web 应用程序。该过程的具体细节将取决于您应用程序的特定要求，例如您选择的框架以及需要使用的服务。\n\nGoogle 还提供了几个使用不同语言和框架的示例应用程序，您可以将其作为起点和参考。您可以在\
    \ [`https://github.com/GoogleCloudPlatform/java-docs-samples`](https://github.com/GoogleCloudPlatform/java-docs-samples)\
    \ 找到它们。\n"
- fmt: "### Deploying a Web Application\n\nHere is a step-by-step example of deploying\
    \ a web application on the Google App Engine:\n\n![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig8_HTML.jpg)\n\
    \nA screenshot of a window has 2 drop-down menus to select a language and environment\
    \ under resources. The right side has a line of text that reads, deploy with google\
    \ cloud S D K, followed by a button to download the cloud S D K, and 2 options\
    \ to initialise S D K and deploy to the app engine.\n\n**Figure 3-8** App configuration\n\
    \n![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig7_HTML.jpg)\n\nA screenshot\
    \ of the app creation page. The right side has the option to configure the application,\
    \ a world map under the region with different marked locations, a drop box to\
    \ select a region, and a drop box under identity and A P I access to select a\
    \ service account.\n\n**Figure 3-7** Creating an app\n\n![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig6_HTML.jpg)\n\
    \nA screenshot of the App Engine page has the dashboard option selected on the\
    \ left side of the page. The right side has a line of text that reads, welcome\
    \ to app engine, followed by a description of the engine. It has a button to create\
    \ the application at the bottom of the page.\n\n**Figure 3-6** App Engine Dashboard\n\
    \n1.  Create a new project in the Google Cloud Console or use the existing one.\n\
    2.  Install the Google Cloud SDK and initialize it with your project (not needed\
    \ if you have already done this).\n3.  Create a new directory for your web application\
    \ and navigate to it in the command line.\n    - Clicking Create Application will\
    \ take you to the Create Application dashboard, as shown in Figure [3-6](#603470_1_En_3_Chapter.xhtml#Fig6).\n\
    \    - Now select the region and select the service account. If no service account\
    \ is selected, then it will use the default permissions, as shown in Figure [3-7](#603470_1_En_3_Chapter.xhtml#Fig7).\n\
    \    - After clicking the Next button, it will show the app configuration screen,\
    \ as shown in Figure [3-8](#603470_1_En_3_Chapter.xhtml#Fig8).\n    - You can\
    \ select programming language and environment. The Java code sample provided by\
    \ GCP is in GitHub: [`https://github.com/GoogleCloudPlatform/java-docs-samples`](https://github.com/GoogleCloudPlatform/java-docs-samples).\n\
    4.  Create a file named `app.yaml` in the root directory of your application.\
    \ This file will contain the configuration for your App Engine app.\n5.  Create\
    \ a file named `main.py` or `app.py` in the root directory of your application.\
    \ This file will contain the code for your web application.\n6.  Create a virtual\
    \ environment and install the dependencies for your application.\n7.  Run the\
    \ command `gcloud app deploy` to deploy your application.\n8.  Once the deployment\
    \ is complete, navigate to `https://[YOUR_PROJECT_ID].appspot.com` in your browser\
    \ to access your web application.\n\n### Deploying a Java Web Application\n\n\
    The following is a step-by-step guide of deploying a Java web application on the\
    \ Google App Engine:\n\n1.  Create a new project in the Google Cloud Console or\
    \ use the existing one.\n2.  Install the Google Cloud SDK and initialize it with\
    \ your project (not needed if you have already done it).\n3.  Create a new directory\
    \ for your web application and navigate to it in the command line.\n4.  Create\
    \ a file named `app.yaml` in the root directory of your application. This file\
    \ will contain the configuration for your App Engine app.\n5.  Create a file named\
    \ `web.xml` in the `WEB-INF` directory of your application. This file will contain\
    \ the web application deployment descriptor.\n    - The sample application is\
    \ provided by GCP and is at [`https://github.com/GoogleCloudPlatform/java-docs-samples`](https://github.com/GoogleCloudPlatform/java-docs-samples).\n\
    6.  Create a file named `appengine-web.xml` in the `WEB-INF` directory of your\
    \ application. This file will contain the App Engine–specific configuration for\
    \ your application.\n7.  Create a new file named `build.gradle` in the root directory\
    \ of your application. This file will contain the build configuration for your\
    \ application.\n8.  Run the command `./gradlew appengineDeploy` to deploy your\
    \ application.\n9.  Once the deployment is complete, navigate to the URL `https://[YOUR_PROJECT_ID].appspot.com`\
    \ in your browser to access your web application."
