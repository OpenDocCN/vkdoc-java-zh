  trans: "\n#### Cloud Pub/Sub 不适用场景\n\nCloud Pub/Sub 的一个错误使用场景是，当低延迟和精确一次投递是关键需求时，但\
    \ Cloud Pub/Sub 并不保证精确一次投递，并且可能存在一定的延迟。\n\n另一个错误使用场景是，当数据需要长期存储时，但 Cloud Pub/Sub\
    \ 默认仅保留消息 7 天。如果你需要更长时间地保留消息，则需要显式配置。\n\nCloud Pub/Sub 可能不是最佳选择的另一种情况是，当你拥有少量但负载较大的消息时，因为\
    \ Cloud Pub/Sub 的最大消息大小为 10 MB。\n\n此外，如果你不需要实时处理数据流，并且可以容忍一定的延迟，那么 Cloud Storage\
    \ 和 BigQuery 等其他服务可能更合适。\n\n需要理解的是，Cloud Pub/Sub 是一项强大的服务，但它并非万能解决方案，可能并非适用于所有场景。了解你的使用场景需求，并选择合适的\
    \ GCP 服务来满足这些需求至关重要。\n\n#### 在 Java 应用程序中使用 Cloud Pub/Sub\n\n清单 6-1 展示了如何在 Java\
    \ 应用程序中使用 Cloud Pub/Sub 的示例。步骤如下：\n\n1.  首先，在 GCP 控制台中创建一个项目，并启用 Cloud Pub/Sub\
    \ API。\n\n2.  接下来，在 Cloud Pub/Sub 控制台中创建一个主题和一个订阅。\n\n3.  在你的 Java 应用程序中，将以下依赖项添加到\
    \ `pom.xml` 文件中。\n\n```\n    com.google.cloud\n    google-cloud-pubsub\n    1.103.0\n\
    \n清单 6-1\n    在 Java 应用程序中使用 Cloud Pub/Sub\n    ```\n\n4.  如清单 6-2 所示，创建一个 Pub/Sub\
    \ 客户端并设置项目 ID 和凭据。项目 ID 和凭据不应硬编码在生产代码中，应遵循最佳实践进行存储和访问。\n\n```\n    import com.google.cloud.pubsub.v1.Publisher;\n\
    \    import com.google.cloud.pubsub.v1.Subscriber;\n    import com.google.cloud.pubsub.v1.TopicAdminClient;\n\
    \    import com.google.cloud.pubsub.v1.SubscriptionAdminClient;\n    import com.google.pubsub.v1.ProjectTopicName;\n\
    \    import com.google.pubsub.v1.ProjectSubscriptionName;\n    import com.google.auth.oauth2.GoogleCredentials;\n\
    \    import java.io.FileInputStream;\n    GoogleCredentials credentials = GoogleCredentials.fromStream(new\
    \ FileInputStream(\"path/to/credentials.json\"))\n    .createScoped(Collections.singletonList(\"\
    https://www.googleapis.com/auth/pubsub\"));\n    String projectId = \"your-project-id\"\
    ;\n    String topicId = \"your-topic-id\";\n    String subscriptionId = \"your-subscription-id\"\
    ;\n    ProjectTopicName topicName = ProjectTopicName.of(projectId, topicId);\n\
    \    ProjectSubscriptionName subscriptionName = ProjectSubscriptionName.of(projectId,\
    \ subscriptionId);\n    TopicAdminClient topicAdminClient = TopicAdminClient.create(credentials);\n\
    \    SubscriptionAdminClient subscriptionAdminClient = SubscriptionAdminClient.create(credentials);\n\
    \    清单 6-2\n    创建 Pub/Sub 客户端并设置项目 ID 和凭据\n    ```\n\n5.  使用发布者向主题发布消息，如清单 6-3\
    \ 所示。\n\n```\n    Publisher publisher = Publisher.newBuilder(topicName).build();\n\
    \    ByteString data = ByteString.copyFromUtf8(\"Hello, Cloud Pub/Sub!\");\n \
