- fmt: '### Uploading a File


    To upload a file to Google Cloud Storage using the Java client library, you will
    need to create a `Storage` object that authenticates with your GCS account, create
    a `Blob` object that represents the file you want to upload, and then use the
    `Blob.create` or `Blob.createFrom` method to upload the file to GCS.


    Listing [4-12](#603470_1_En_4_Chapter.xhtml#PC16) shows an example of how to upload
    a file to GCS using the Java client library.


    ```

    import com.google.cloud.storage.Blob;

    import com.google.cloud.storage.BlobId;

    import com.google.cloud.storage.BlobInfo;

    import com.google.cloud.storage.Storage;

    import com.google.cloud.storage.StorageOptions;

    import java.io.File;

    public class GCSUploadExample {

    public static void main(String[] args) {

    // Authenticate with GCS using a service account

    Storage storage = StorageOptions.newBuilder()

    .setCredentials(GoogleCredentials.fromStream(new FileInputStream("path/to/credentials.json")))

    .build()

    .getService();

    // Create a BlobId object representing the file you want to upload

    String bucketName = "my-bucket";

    String fileName = "path/to/file.txt";

    BlobId blobId = BlobId.of(bucketName, fileName);

    // Create a BlobInfo object representing the file you want to upload

    BlobInfo blobInfo = BlobInfo.newBuilder(blobId).build();

    // Use the Blob.create method to upload the file to GCS

    File file = new File(fileName);

    Blob blob = storage.create(blobInfo, file);

    // Print the public URL of the uploaded file

    System.out.println("File uploaded to: " + blob.getMediaLink());

    }

    }

    Listing 4-12

    Uploading File to GCS

    ```


    In Listing [4-12](#603470_1_En_4_Chapter.xhtml#PC16), the `StorageOptions.newBuilder().setCredentials()`
    method is used to authenticate with GCS using a service account. The `BlobId.of()`
    method is used to create a `BlobId` object that represents the file you want to
    upload, and the `BlobInfo.newBuilder()` method is used to create a `BlobInfo`
    object that represents the file’s metadata.


    The `storage.create(blobInfo, file)` method is used to upload the file to GCS,
    and the `blob.getMediaLink()` method is used to print the public URL of the uploaded
    file.


    You can also use the `Blob.createFrom` method, which accepts `inputStream` as
    well.


    ```

    Blob blob = storage.createFrom(blobInfo, fileInputStream);

    ```


    Make sure that the service account you are using has the correct permissions to
    upload files to the bucket, else you’ll get an error.


    ### Downloading a File


    To download a file from Google Cloud Storage using the Java client library, you
    will need to create a `Storage` object that authenticates with your GCS account,
    create a `Blob` object that represents the file you want to download, and then
    use the `Blob.downloadTo` method to download the file from GCS.


    Listing [4-13](#603470_1_En_4_Chapter.xhtml#PC18) shows an example given in Listing
    [4-13](#603470_1_En_4_Chapter.xhtml#PC18) of how to download a file from GCS using
    the Java client library.


    ```

    import com.google.cloud.storage.Blob;

    import com.google.cloud.storage.BlobId;

    import com.google.cloud.storage.Storage;

    import com.google.cloud.storage.StorageOptions;

    import java.io.FileOutputStream;

    import java.io.IOException;

    public class GCSDownloadExample {

    public static void main(String[] args) throws IOException {

    // Authenticate with GCS using a service account

    Storage storage = StorageOptions.newBuilder()

    .setCredentials(GoogleCredentials.fromStream(new FileInputStream("path/to/credentials.json")))

    .build()

    .getService();

    // Create a BlobId object representing the file you want to download

    String bucketName = "my-bucket";

    String fileName = "path/to/file.txt";

    BlobId blobId = BlobId.of(bucketName, fileName);

    // Create a Blob object representing the file you want to download

    Blob blob = storage.get(blobId);

    // Use the Blob.downloadTo method to download the file from GCS

    FileOutputStream outputStream = new FileOutputStream("path/to/download/location/file.txt");

    blob.downloadTo(outputStream);

    outputStream.close();

    }

    }

    Listing 4-13

    Downloading File from GCS

    ```


    In the Listing [4-13](#603470_1_En_4_Chapter.xhtml#PC18) example, the `StorageOptions.newBuilder().setCredentials()`
    method is used to authenticate with GCS using a service account. The `BlobId.of()`
    method is used to create a `BlobId` object that represents the file you want to
    download, and the `storage.get(blobId)` method is used to create a `Blob` object
    that represents the file.


    The `blob.downloadTo(outputStream)` method is used to download the file from GCS,
    and the `outputStream.close()` method is used to close the output stream after
    the download is complete.


    Make sure the service account you are using has the correct permissions to download
    files from the bucket; otherwise, you’ll get an error.


    You can also download the file to `byte[]` by using `blob.getContent()` method,
    and you can download to a specific folder using `blob.downloadTo(Path path)`.


    ### Deleting a File


    To delete a file from Google Cloud Storage using the Java client library, you
    will need to create a `Storage` object that authenticates with your GCS account,
    create a `BlobId` object that represents the file you want to delete, and then
    use the `Storage.delete` method to delete the file from GCS.


    Listing [4-14](#603470_1_En_4_Chapter.xhtml#PC19) shows an example of how to delete
    a file from GCS using the Java client library.


    ```

    import com.google.cloud.storage.BlobId;

    import com.google.cloud.storage.Storage;

    import com.google.cloud.storage.StorageOptions;

    public class GCSDeleteExample {

    public static void main(String[] args) {

    // Authenticate with GCS using a service account

    Storage storage = StorageOptions.newBuilder()

    .setCredentials(GoogleCredentials.fromStream(new FileInputStream("path/to/credentials.json")))

    .build()

    .getService();

    // Create a BlobId object representing the file you want to delete

    String bucketName = "my-bucket";

    String fileName = "path/to/file.txt";

    BlobId blobId = BlobId.of(bucketName, fileName);

    // Use the Storage.delete method to delete the file from GCS

    boolean deleted = storage.delete(blobId);

    if(deleted) {

    System.out.println("File deleted successfully!");

    } else {

    System.out.println("File deletion failed!");

    }

    }

    }

    Listing 4-14

    Deleting a File from GCS

    ```


    In the Listing [4-14](#603470_1_En_4_Chapter.xhtml#PC19) example, the `StorageOptions.newBuilder().setCredentials()`
    method is used to authenticate with GCS using a service account. The `BlobId.of()`
    method is used to create a `BlobId` object that represents the file you want to
    delete, and the `storage.delete(blobId)` method is used to delete the file from
    GCS.


    Make sure the service account you are using has the correct permissions to delete
    files from the bucket; otherwise, you’ll get an error.


    Also, the `storage.delete(blobId)` method returns a Boolean value, which is `true`
    if the file is deleted successfully and `false` if the file deletion fails.


    ## Summary


    In this chapter, you learned about using Google Cloud Storage to store and manage
    files in a Java application. We covered the basics of GCS, including creating
    a bucket, authenticating with GCS, and managing files in a bucket. We also discussed
    the GCS Java client library, which provides a set of classes and methods for interacting
    with GCS and installing and using it in a Java application. Finally, we covered
    how to upload and download files from a GCS bucket using Java code. Overall, this
    chapter provided a comprehensive guide to using GCS in a Java application.'
