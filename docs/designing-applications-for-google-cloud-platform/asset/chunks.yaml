    [1-15](#603470_1_En_1_Chapter.xhtml#Fig15).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig15_HTML.jpg)


    A block diagram for G K E clusters has 4 blocks, each with their respective cluster
    definition. Block 1 for the production cluster, block 2 for the development cluster,
    block 3 for the big data cluster, and block 4 for G P U accelerated cluster.


    Figure 1-15


    GKE clusters


    You can also create GKE clusters with different machine types, network configurations,
    and storage options, depending on the specific requirements of your workloads.
    This allows you to optimize your GKE clusters for performance, cost-effectiveness,
    and other factors. You might have one GKE cluster for batch processing workloads
    and another GKE cluster for web applications. This can help prevent resource contention
    and improve overall performance and reliability.'
  trans: '

    ### Google Kubernetes Engine


    Google Kubernetes Engine（GKE）是 GCP 提供的一项完全托管的 Kubernetes 服务，可让您轻松利用 Google 基础设施部署、管理和扩缩容器化应用。GKE
    为部署、管理和扩缩容器提供了完整的解决方案，使开发者能够专注于编写代码和交付功能。它还提供自动升级、自动扩缩和自修复等功能，让开发者可以专注于应用本身，而无需操心底层基础设施。此外，GKE
    还与其他 GCP 服务（如 Cloud Load Balancing、Cloud Operations Suite、Cloud Monitoring and
    Logging 以及 Cloud DNS）集成，从而可以轻松地在单一平台上管理完整的应用栈。


    *容器化应用*是指将其所有依赖项打包成一个称为*容器*的单一单元的应用。容器彼此隔离，也与宿主机操作系统隔离，这使得它们成为更高效、更安全的部署应用方式。可以将容器想象成一个盒子，里面包含了应用运行所需的一切，例如代码、库和设置。这使得将应用部署到不同环境（例如本地环境、云端或混合环境）变得非常容易。容器也比传统虚拟机更高效。虚拟机需要完整的操作系统，而容器只需要应用的资源。这可以节省硬件成本并提高性能。容器比传统虚拟机更安全。容器彼此隔离，也与宿主机操作系统隔离，这使得恶意软件更难传播，从而使容器成为需要高度安全的应用的理想选择。


    与 GCE 类似，如果您是首次使用 Kubernetes Engine API，则需要启用它。图 1-13 显示了“启用”按钮。


    ![](img/603470_1_En_1_Fig13_HTML.jpg)


    产品详情页面的截图。页面左侧有一个徽标，后面跟着标题“Kubernetes Engine API”，以及几行 API 说明文字。页面左下角有一个“启用”按钮。


    图 1-13


    启用 Kubernetes Engine API


    点击“启用”按钮后，GCP 将需要一些时间来启用它。启用后，您将看到 GKE 仪表板。同样，如果您是组织成员，并且给定项目已启用 GKE，您将直接看到 GKE
    仪表板。


    在左侧窗格中，您将看到集群、工作负载、服务与入站流量、应用、密钥与配置映射等选项。


    如图 1-14 所示，GCP 提供了两种创建 Kubernetes 集群和部署容器的选项：一种是按 Pod 付费的 Kubernetes 集群，称为 Autopilot，GKE
    会以最少的配置要求管理您的节点。另一种是按节点付费的 Kubernetes 集群，称为 Standard，您需要自行配置和管理节点。


    ![](img/603470_1_En_1_Fig14_HTML.jpg)


    集群创建窗口的截图，显示了两种模式。模式 1 用于 Autopilot，模式 2 用于 Standard 模式，每种模式后面都有一个用于配置的按钮。模式 1
    的“配置”按钮已被选中。页面底部有一个“比较”选项卡，用于比较集群模式。


    图 1-14


    创建 Kubernetes 集群


    您可以为不同类型的工作负载创建具有不同配置的多个集群。例如，您可以为需要高可用性和可扩展性的生产应用创建一个 GKE 集群，该集群具有跨多个可用区的多个节点。您可以为开发或测试环境创建另一个
    GKE 集群，该集群具有较少的节点和更简单的配置，如图 1-15 所示。


    ![](img/603470_1_En_1_Fig15_HTML.jpg)


    GKE 集群的框图有 4 个区块，每个区块都有各自的集群定义。区块 1 用于生产集群，区块 2 用于开发集群，区块 3 用于大数据集群，区块 4 用于 GPU
    加速集群。


    图 1-15


    GKE 集群


    您还可以根据工作负载的具体要求，创建具有不同机器类型、网络配置和存储选项的 GKE 集群。这使您可以针对性能、成本效益等因素优化 GKE 集群。您可能有一个用于批处理工作负载的
    GKE 集群，以及另一个用于 Web 应用的 GKE 集群。这有助于防止资源争用，并提高整体性能和可靠性。

    '
- fmt: '### Google Cloud Storage


    `Google Cloud Storage`（`GCS`）是一个可扩展且高度持久的对象存储服务，由`Google Cloud Platform`提供。它为客户提供对非结构化数据的高性能访问，是存储和提供大量数据（如图像、视频、备份和日志）的理想解决方案。`Google
    Cloud Storage`是一个统一的对象存储，为非结构化数据提供单一平台，为客户提供所有数据的单一存储库。它提供高性能和可扩展性，非常适合要求苛刻的应用，包括媒体与娱乐、游戏和科学计算。使用`Google
    Cloud Storage`，客户可以轻松地在任何需要的地方存储和访问数据，并确信其数据已安全存储且始终可用。


    `Cloud Storage`提供了一种存储所有文件和对象的方式。所有存储都安排在存储桶（`bucket`）内。您可以为不同目的创建不同的存储桶，然后在其中创建文件夹和子文件夹来放置文件。图
    [1-16](#603470_1_En_1_Chapter.xhtml#Fig16) 显示了`Cloud Storage`仪表板。


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig16_HTML.jpg)


    一个窗口的截图，在云存储下有存储桶选项。右侧有创建和刷新选项、一个用于过滤存储桶的筛选器，以及一个包含名称、创建时间、位置类型、位置、默认存储类别、最后修改时间、公共访问权限、访问控制和保护等列的表。


    **图 1-16** `Cloud Storage`仪表板


    从`Cloud Storage`仪表板，您可以创建存储桶。存储桶名称是全局唯一的。全局范围内不能有两个存储桶名称相同。如果您正在删除您的存储桶，并希望立即使用相同的名称创建一个新的存储桶，您可以这样做。


    存储桶名称不应包含任何敏感信息，因为存储桶名称是公开可见的。您可以向存储桶添加标签，以便将相似的存储桶分组。


    在创建存储桶时，如图 [1-17](#603470_1_En_1_Chapter.xhtml#Fig17) 所示，您可以选择存储桶的位置为单区域或多区域。您可以选择存储类别、访问控制、谁可以访问它，以及是否使用数据加密来保护您的数据。在`GCP`中，您可以使用`Google
    Managed Key`或`Customer Managed Key`进行加密。


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig17_HTML.jpg)


    存储桶创建窗口的截图。它有一个选项卡用于为存储桶提供名称，并选择数据存储位置、数据存储类别、如何控制对对象的访问以及如何保护对象数据的选项。页面左下角有一个创建按钮。


    **图 1-17** 创建`Cloud Storage`存储桶


    在为您的数据创建存储桶时，请选择合适的存储类别。`GCS`提供四种存储类别：`Standard`、`Nearline`、`Coldline`和`Archive`。每种存储类别都有其自身的一组特性，例如性能、可用性、持久性和成本。在创建存储桶时，您可以选择一个存储类别来设置存储桶的默认存储类别，如图
    [1-18](#603470_1_En_1_Chapter.xhtml#Fig18) 所示。


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig18_HTML.jpg)


    一个页面的截图，在默认类别下有4个选项。它有一个设置默认类别的选项被选中，后面跟着4个选项：`Standard`、`Nearline`、`Coldline`和`Archive`，以及它们各自的优势。选项1（`Standard`）被选中。


    **图 1-18** 选择存储类别


    `Standard storage`是默认的存储类别，也是最昂贵的。如果您需要频繁且快速地访问数据，这种存储类别最适合您。例如，您可能会将`Standard`存储类别用于客户订单和发票，因为您需要能够快速且频繁地访问这些数据。


    `Nearline storage`比`Standard`存储便宜，是偶尔需要访问但对业务不关键的数据的不错选择。例如，您可以使用`Nearline`存储来备份您的网站数据。


    `Coldline storage`比`Nearline`和`Standard`存储更便宜，是访问频率低且对业务不关键的数据的不错选择。例如，您可能会将`Coldline`存储用于财务记录，这些记录每季度仅访问一次用于报告目的。


    `Archive storage`是成本最低的存储类别，但访问成本最高，最适合很少或从未访问的数据。例如，您可能会为出于法律或监管原因而保留的备份选择`Archive`存储类别。'
  raw: '### Google Cloud Storage


    Google Cloud Storage (GCS) is a scalable and highly durable object storage service
    provided by Google Cloud Platform. It provides customers with high-performance
    access to unstructured data, making it an ideal solution for storing and serving
    large amounts of data such as images, videos, backups, backups, and logs. Google
    Cloud Storage is a unified object storage that provides a single platform for
    unstructured data, providing customers with a single repository for all their
    data. It provides high performance and scalability, making it ideal for demanding
    applications, including media and entertainment, gaming, and scientific computing.
    With Google Cloud Storage, customers can easily store and access their data wherever
    they need it, with the peace of mind that their data is securely stored and always
    available.


    Cloud Storage provides a way to store all of your files and objects. All the storage
    is arranged inside the bucket. You can create different buckets for different
    purposes, and then you can create folders and subfolders in them to place the
    files. Figure [1-16](#603470_1_En_1_Chapter.xhtml#Fig16) shows the Cloud Storage
    dashboard.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig16_HTML.jpg)


    A screenshot of a window has the buckets option under cloud storage. The right
    side has create and refresh options, a filter option for the bucket, and a table
    with columns for name, created, location type, location, default storage class,
    last modified, public access, access control, and protection.


    Figure 1-16


    Cloud Storage dashboard


    From the Cloud Storage dashboard, you can create buckets. Bucket names are globally
    unique. No two bucket names can be the same globally. If you are deleting your
    bucket and want to create a new bucket with the same name you are deleting right
    now, you can do that.


    The bucket name should not be carrying any sensitive information, as bucket names
    are publicly visible. You can add labels to your bucket to group together similar
    buckets.


    While creating a bucket, as shown in Figure [1-17](#603470_1_En_1_Chapter.xhtml#Fig17),
    you can choose the location of the bucket as single or multiregion. You can choose
    the storage class, access control, who can access it, and whether to use data
    encryption to protect your data. In GCP, you can do encryption either with Google
    Managed Key or with Customer Managed Key.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig17_HTML.jpg)


    A screenshot of the bucket creation window. It has a tab to provide a name for
    the bucket and choose options for where to store the data, storage class for the
    data, how to control access to objects, and how to protect object data. It has
    a create button at the bottom left side of the page.


    Figure 1-17


    Creating a Cloud Storage bucket


    Choose the appropriate storage class while creating a storage bucket for your
    data. GCS offers four storage classes: standard, nearline, coldline, and archive.
    Each storage class has its own set of characteristics, such as performance, availability,
    durability, and cost. While creating a bucket, you can choose a storage class
    to set the default storage class for the bucket, as shown in Figure [1-18](#603470_1_En_1_Chapter.xhtml#Fig18).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig18_HTML.jpg)


    A screenshot of a page has 4 options under the default class. It has the option
    to set a default class selected, followed by 4 options standard, nearline, cold
    line, and archive, and their respective benefits. Option 1 for the standard is
    selected.


    Figure 1-18


    Choosing a storage class


    *Standard storage* is the default storage class and is the most expensive. If
    you need to access data frequently and quickly, this storage class is best for
    you. For example, you might use the standard storage class for customer orders
    and invoices, as you need to be able to access this data quickly and frequently.


    *Nearline storage* is less expensive than standard storage and is a good choice
    for data that needs to be accessed occasionally but is not critical for your business.
    For example, you can use nearline storage to back up your website data.


    *Coldline storage* is less expensive than nearline and standard storage and is
    a good choice for data accessed infrequently and not critical for your business.
    For example, you might use coldline storage for financial records that are accessed
    only once a quarter for reporting purposes.


    *Archive storage* is the lowest-cost storage class with the highest access cost
    and is best for rarely or never accessed data. For example, you might choose the
    archive storage class for backups that are kept for legal or regulatory reasons.'
  trans: '

    ### Google Cloud Storage


    Google Cloud Storage（GCS）是 Google Cloud Platform 提供的一种可扩展且高度耐用的对象存储服务。它为客户提供对非结构化数据的高性能访问，是存储和提供大量数据（如图像、视频、备份和日志）的理想解决方案。Google
    Cloud Storage 是一种统一的对象存储，为非结构化数据提供单一平台，为客户提供所有数据的单一存储库。它提供高性能和可扩展性，非常适合要求苛刻的应用，包括媒体与娱乐、游戏和科学计算。借助
    Google Cloud Storage，客户可以轻松地在任何需要的地方存储和访问数据，并确信其数据已安全存储且始终可用。


    Cloud Storage 提供了一种存储所有文件和对象的方式。所有存储都安排在存储桶内。你可以为不同目的创建不同的存储桶，然后在其中创建文件夹和子文件夹来放置文件。图
    1-16 展示了 Cloud Storage 控制台。


    ![](img/603470_1_En_1_Fig16_HTML.jpg)


    一个窗口的截图，在云存储下显示了存储桶选项。右侧有创建和刷新选项、一个用于过滤存储桶的筛选器，以及一个包含名称、创建时间、位置类型、位置、默认存储类别、最后修改时间、公开访问权限、访问控制和保护等列的表格。


    图 1-16


    Cloud Storage 控制台


    在 Cloud Storage 控制台中，你可以创建存储桶。存储桶名称是全局唯一的。全局范围内不能有两个同名的存储桶。如果你正在删除你的存储桶，并希望使用当前正在删除的相同名称创建一个新存储桶，这是可以的。


    存储桶名称不应包含任何敏感信息，因为存储桶名称是公开可见的。你可以为存储桶添加标签，以便将相似的存储桶分组。


    在创建存储桶时，如图 1-17 所示，你可以选择存储桶的位置为单区域或多区域。你可以选择存储类别、访问控制、谁可以访问它，以及是否使用数据加密来保护你的数据。在
    GCP 中，你可以使用 Google 管理密钥或客户管理密钥进行加密。


    ![](img/603470_1_En_1_Fig17_HTML.jpg)


    创建存储桶窗口的截图。它有一个选项卡用于提供存储桶名称，并选择数据存储位置、数据存储类别、如何控制对对象的访问以及如何保护对象数据的选项。页面左下角有一个创建按钮。


    图 1-17


    创建 Cloud Storage 存储桶


    在为你数据创建存储桶时，请选择合适的存储类别。GCS 提供四种存储类别：标准、近线、冷线和归档。每种存储类别都有其自身的一组特性，例如性能、可用性、持久性和成本。在创建存储桶时，你可以选择一种存储类别来设置存储桶的默认存储类别，如图
    1-18 所示。


    ![](img/603470_1_En_1_Fig18_HTML.jpg)


    一个页面的截图，在默认类别下有 4 个选项。它有一个设置默认类别的选项被选中，后面跟着 4 个选项：标准、近线、冷线和归档，以及它们各自的优势。选项 1 标准已被选中。


    图 1-18


    选择存储类别


    *标准存储*是默认的存储类别，也是最昂贵的。如果你需要频繁且快速地访问数据，这种存储类别最适合你。例如，你可能将标准存储类别用于客户订单和发票，因为你需要能够快速且频繁地访问这些数据。


    *近线存储*比标准存储便宜，是偶尔需要访问但对业务不关键的数据的不错选择。例如，你可以使用近线存储来备份你的网站数据。


    *冷线存储*比近线和标准存储便宜，是访问频率低且对业务不关键的数据的不错选择。例如，你可能将冷线存储用于财务记录，这些记录每季度仅访问一次用于报告目的。


    *归档存储*是成本最低的存储类别，但访问成本最高，最适合很少或从不访问的数据。例如，你可能选择归档存储类别用于因法律或监管原因而保留的备份。

