    \n6.  在应用的 `WEB-INF` 目录中创建一个名为 `appengine-web.xml` 的文件。该文件将包含应用特定的 App Engine\
    \ 配置。\n\n7.  在应用的根目录中创建一个名为 `build.gradle` 的新文件。该文件将包含应用的构建配置。\n\n8.  运行命令 `./gradlew\
    \ appengineDeploy` 来部署你的应用。\n\n9.  部署完成后，在浏览器中导航至 URL `https://[YOUR_PROJECT_ID].appspot.com`\
    \ 以访问你的 Web 应用。\n"
- fmt: "### Setting Firewall and Security Considerations\n\nWhen you deploy your web\
    \ application on Google App Engine, you want to make sure that your application\
    \ is safe and secure from malicious attacks. To do this, you need to take certain\
    \ security measures, such as setting up firewall rules to allow traffic to your\
    \ application, controlling access to your application with Identity-Aware Proxy,\
    \ encrypting data in transit and at rest, using `SSL` to secure traffic to your\
    \ app, protecting sensitive data with Cloud Key Management Service, keeping your\
    \ app and dependencies up-to-date, and using App Engine’s built-in security features\
    \ to secure your application. By following these security measures, you can ensure\
    \ that your web application is safe and secure for your users.\n\nThe following\
    \ are the key terms being used in this section:\n\n- A *firewall* is a security\
    \ system that monitors and controls incoming and outgoing network traffic based\
    \ on predetermined security rules.\n- *Identity-Aware Proxy* (`IAP`) is a service\
    \ that controls access to cloud applications and VMs without exposing them to\
    \ the Internet.\n- *OAuth* is an authorization protocol that allows applications\
    \ to access user data from a third-party service without needing to store the\
    \ user’s password.\n\n![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig14_HTML.jpg)\n\
    \nA screenshot of the key ring creation page. It has a few lines of text for the\
    \ details of the key rings, a project name, a text box for the key ring name,\
    \ 2 options of region and multi-region under location type, a drop-down menu for\
    \ the multi-region, and a button to create.\n\n**Figure 3-14** Creating a key\
    \ ring\n\n![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig13_HTML.jpg)\n\nA\
    \ screenshot of the security page. The right side has the key rings tab selected\
    \ under key management, followed by a paragraph for the description of the key\
    \ rings. It has a filter for property name or value, and a table with 3 columns\
    \ for name, location, and keys and 0 rows.\n\n**Figure 3-13** Key management screen\n\
    \n![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig12_HTML.jpg)\n\nA screenshot\
    \ of the product details page. It has a logo on the left side of the page and\
    \ a heading, Cloud Key Management Service API on its right. It has an enable button\
    \ at the bottom side of the page.\n\n**Figure 3-12** KMS API\n\n![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig11_HTML.jpg)\n\
    \nA screenshot of a page with a heading, Identity-Aware Proxy. It has a few lines\
    \ of text for the description of the proxy, followed by an error message that\
    \ reads, Identity-Aware Proxy API is not enabled, and a link to enable the API.\n\
    \n**Figure 3-11** IAP\n\n![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig10_HTML.jpg)\n\
    \nA screenshot of the firewall rule creation page. The right side has a text box\
    \ for priority, 2 options of allow or deny under action on match, a text box for\
    \ the IP range, and a text box to enter a description. It has a button to save\
    \ at the bottom of the page.\n\n**Figure 3-10** Creating a firewall rule\n\n![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig9_HTML.jpg)\n\
    \nA screenshot of the App Engine firewall rules page. It has the purpose of the\
    \ firewall rules, a filter for priority, actions, IP range or description keyword,\
    \ followed by a table with 1 row with a default priority, allow action, a star\
    \ under IP range, and the default action as the description.\n\n**Figure 3-9**\
    \ Firewall rule dashboard of GAE\n\n1.  Create firewall rules on GCP Console’s\
    \ “Firewall rules” page to allow traffic to your App Engine app, as shown in Figure\
    \ [3-9](#603470_1_En_3_Chapter.xhtml#Fig9).\n2.  Use `IAP` to control access to\
    \ your application. To use it, you need to enable the API first, if it is not\
    \ enabled already, as shown in Figure [3-11](#603470_1_En_3_Chapter.xhtml#Fig11).\
    \ Once you enable it, you need to configure `OAuth` first.\n3.  Enable encryption\
    \ for data in transit and at rest.\n4.  Use Secure Sockets Layer (`SSL`) to secure\
    \ traffic to your app.\n5.  Use the Cloud Key Management Service (`KMS`) to protect\
    \ sensitive data. Enable the `KMS` API if it is not already enabled, as shown\
    \ in Figure [3-12](#603470_1_En_3_Chapter.xhtml#Fig12). Once it’s enabled, it\
    \ will take you to the dashboard, as shown in Figure [3-13](#603470_1_En_3_Chapter.xhtml#Fig13).\
    \ From the dashboard you can create a key ring (key rings are organized collections\
    \ of keys) to use it, as shown in Figure [3-14](#603470_1_En_3_Chapter.xhtml#Fig14).\n\
    6.  Keep your app and dependencies up-to-date.\n7.  Use App Engine’s built-in\
    \ security features, such as the App Engine security rules to secure your application.\n\
    \n> **Note**  \n> The previous steps are complete; however, additional steps or\
    \ considerations may be specific to your application or environment.\n\n## Scaling\
    \ and Optimizing App Engine Applications\n\nScaling and optimizing a Google App\
    \ Engine (`GAE`) application involves adjusting the application’s resources and\
    \ settings to handle traffic changes and improve performance.\n\nScaling an application\
    \ on `GAE` refers to adjusting the number of instances running to handle changes\
    \ in traffic. There are two main ways to scale a `GAE` application: manual scaling\
    \ and automatic scaling. Manual scaling involves adjusting the number of instances\
    \ running, while automatic scaling automatically adjusts the number of instances\
    \ based on the traffic to the application.\n\nOptimizing a `GAE` application involves\
    \ making changes to improve the performance of the application. Here are some\
    \ ways to optimize a `GAE` application:\n\n- **Use caching**: Caching can significantly\
    \ improve the performance of an application by reducing the number of requests\
    \ to the back end. Caching is the process of temporarily storing frequently accessed\
    \ data or content to improve the performance and reduce the load on the backend.\n\
    - **Optimize the database**: Use indexes, denormalization, and other techniques\
    \ to improve the performance of database queries. Other techniques to improve\
    \ the performance of database queries could include optimizing the database schema,\
    \ using efficient data types, optimizing database queries and transactions, and\
    \ minimizing the amount of data retrieved.\n- **Reduce the number of requests**:\
    \ Minimize the number of requests made to the back end by reducing the number\
    \ of round-trips by designing APIs that can retrieve or manipulate multiple related\
    \ resources in a single HTTP request or using client-side caching.\n- **Use the\
    \ built-in performance tools**: `GAE` provides several tools to help you identify\
    \ and fix performance issues, such as the App Engine Performance Dashboard, Cloud\
    \ Trace, and Cloud Profiler.\n- **Use the appropriate instance class**: `GAE`\
    \ offers several classes, each with different resources and pricing. Choose the\
    \ appropriate instance class for your application to optimize performance and\
    \ costs.\n- **Use load balancing**: Use load balancing to distribute traffic across\
    \ multiple instances and handle increased traffic.\n- **Use content delivery network\
    \ (`CDN`)**: `CDN`s can help reduce the application load and improve the application’s\
    \ performance by caching and delivering content closer to the end users.\n\nIt’s\
    \ essential to keep in mind that the process of scaling and optimizing an application\
    \ is an iterative process, and you may need to make multiple changes and monitor\
    \ the performance of your application to achieve the desired results.\n\n### Setting\
    \ Up Manual and Autoscaling in GAE\n\nScaling a web application on Google App\
    \ Engine refers to adjusting the number of instances of the application running\
    \ to handle changes in traffic. There are two main ways to scale a web application\
    \ on `GAE`: manual scaling and automatic scaling.\n\n#### Manual Scaling\n\nWith\
    \ manual scaling, you manually adjust the number of instances running to handle\
    \ changes in traffic. To manually scale a `GAE` application, you can use the App\
    \ Engine dashboard in the Google Cloud Console. You can set the number of instances\
    \ running for your application, and App Engine will ensure that that number of\
    \ instances is running."
  raw: '### Setting Firewall and Security Considerations


    When you deploy your web application on Google App Engine, you want to make sure
    that your application is safe and secure from malicious attacks. To do this, you
    need to take certain security measures, such as setting up firewall rules to allow
    traffic to your application, controlling access to your application with Identity-Aware
    Proxy, encrypting data in transit and at rest, using SSL to secure traffic to
    your app, protecting sensitive data with Cloud Key Management Service, keeping
    your app and dependencies up-to-date, and using App Engine’s built-in security
    features to secure your application. By following these security measures, you
    can ensure that your web application is safe and secure for your users.


    The following are the key terms is being used in this section:


    A *firewall* is a security system that monitors and controls incoming and outgoing
    network traffic based on predetermined security rules.


    *Identity-Aware Proxy* (IAP) is a service that controls access to cloud applications
    and VMs without exposing them to the Internet.


    *OAuth* is an authorization protocol that allows applications to access user data
    from a third-party service without needing to store the user’s password.


    ![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig14_HTML.jpg)


    A screenshot of the key ring creation page. It has a few lines of text for the
    details of the key rings, a project name, a text box for the key ring name, 2
    options of region and multi-region under location type, a drop-down menu for the
    multi-region, and a button to create.


    Figure 3-14


    Creating a key ring


    ![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig13_HTML.jpg)


    A screenshot of the security page. The right side has the key rings tab selected
    under key management, followed by a paragraph for the description of the key rings.
    It has a filter for property name or value, and a table with 3 columns for name,
    location, and keys and 0 rows.


    Figure 3-13


    Key management screen


    ![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig12_HTML.jpg)


    A screenshot of the product details page. It has a logo on the left side of the
    page and a heading, cloud key management service A P I on its right. It has an
    enable button at the bottom side of the page.


    Figure 3-12


    KMS API


    ![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig11_HTML.jpg)


    A screenshot of a page with a heading, identity-aware proxy. It has a few lines
    of text for the description of the proxy, followed by an error message that reads,
    identity-aware proxy A P I is not enabled, and a link to enable the A P I.


    Figure 3-11


    IAP


    ![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig10_HTML.jpg)


    A screenshot of the firewall rule creation page. The right side has a text box
    for priority, 2 options of allow or deny under action on match, a text box for
    the I P range, and a text box to enter a description. It has a button to save
    at the bottom of the page.


    Figure 3-10


    Creating a firewall rule


    ![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig9_HTML.jpg)


    A screenshot of the app engine firewall rules page. It has the purpose of the
    firewall rules, a filter for priority, actions, I P range or description keyword,
    followed by a table with 1 row with a default priority, allow action, a star under
    I P range, and the default action as the description.


    Figure 3-9


    Firewall rule dashboard of GAE


    1.  Create firewall rules on GCP Console’s “Firewall rules” page to allow traffic
    to your App Engine app, as shown in Figure [3-9](#603470_1_En_3_Chapter.xhtml#Fig9).


    2.  Use IAP to control access to your application.


    To use it, you need to enable the API first, if it is not enabled already, as
    shown in Figure [3-11](#603470_1_En_3_Chapter.xhtml#Fig11).


    Once you enable it, you need to configure OAuth first.


    3.  Enable encryption for data in transit and at rest.


    4.  Use Secure Sockets Layer (SSL) to secure traffic to your app.


    5.  Use the Cloud Key Management Service (KMS) to protect sensitive data.


    Enable the KMS API if it is not already enabled, as shown in Figure [3-12](#603470_1_En_3_Chapter.xhtml#Fig12).


    Once it’s enabled, it will take you to the dashboard, as shown in Figure [3-13](#603470_1_En_3_Chapter.xhtml#Fig13).


    From the dashboard you can create a key ring (key rings are organized collections
    of keys) to use it, as shown in Figure [3-14](#603470_1_En_3_Chapter.xhtml#Fig14).


    6.  Keep your app and dependencies up-to-date.


    7.  Use App Engine’s built-in security features, such as the App Engine security
    rules to secure your application.


    Note


    The previous steps are complete; however, additional steps or considerations may
    be specific to your application or environment.


    ## Scaling and Optimizing App Engine Applications


    Scaling and optimizing a Google App Engine (GAE) application involves adjusting
    the application’s resources and settings to handle traffic changes and improve
    performance.


    Scaling an application on GAE refers to adjusting the number of instances running
    to handle changes in traffic. There are two main ways to scale a GAE application:
    manual scaling and automatic scaling. Manual scaling involves adjusting the number
    of instances running, while automatic scaling automatically adjusts the number
    of instances based on the traffic to the application.


    Optimizing a GAE application involves making changes to improve the performance
    of the application. Here are some ways to optimize a GAE application:


    *   *Use caching*: Caching can significantly improve the performance of an application
    by reducing the number of requests to the back end. Caching is the process of
    temporarily storing frequently accessed data or content to improve the performance
    and reduce the load on the backend.


    *   *Optimize the database*: Use indexes, denormalization, and other techniques
    to improve the performance of database queries. Other techniques to improve the
    performance of database queries could include optimizing the database schema,
    using efficient data types, optimizing database queries and transactions, and
    minimizing the amount of data retrieved.


    *   *Reduce the number of requests*: Minimize the number of requests made to the
    back end by reducing the number of round-trips by designing APIs that can retrieve
    or manipulate multiple related resources in a single HTTP request or using client-side
    caching.


    *   *Use the* *built-in performance tools*: GAE provides several tools to help
    you identify and fix performance issues, such as the App Engine Performance Dashboard,
    Cloud Trace, and Cloud Profiler.


    *   *Use the* *appropriate instance class*: GAE offers several classes, each with
    different resources and pricing. Choose the appropriate instance class for your
    application to optimize performance and costs.


    *   *Use* *load balancing*: Use load balancing to distribute traffic across multiple
    instances and handle increased traffic.


    *   *Use content delivery network (**CDN)*: CDNs can help reduce the application
    load and improve the application’s performance by caching and delivering content
    closer to the end users.


    It’s essential to keep in mind that the process of scaling and optimizing an application
    is an iterative process, and you may need to make multiple changes and monitor
    the performance of your application to achieve the desired results.


    ### Setting Up Manual and Autoscaling in GAE


    Scaling a web application on Google App Engine refers to adjusting the number
    of instances of the application running to handle changes in traffic. There are
    two main ways to scale a web application on GAE: manual scaling and automatic
    scaling.


    #### Manual Scaling


    With manual scaling, you manually adjust the number of instances running to handle
    changes in traffic. To manually scale a GAE application, you can use the App Engine
    dashboard in the Google Cloud Console. You can set the number of instances running
    for your application, and App Engine will ensure that that number of instances
    is running.'
