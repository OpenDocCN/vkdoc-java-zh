- fmt: "#### Use Case Where Cloud Pub/Sub Is Bad Choice\n\nA wrong use case for `Cloud\
    \ Pub/Sub` would be a scenario where low latency and exactly-once delivery are\
    \ critical requirements, but `Cloud Pub/Sub` does not guarantee exactly-once delivery\
    \ and may have some latency.\n\nAnother wrong use case for `Cloud Pub/Sub` would\
    \ be a scenario where data needs to be stored for a long time, but `Cloud Pub/Sub`\
    \ retains messages for only 7 days by default. If you need to retain messages\
    \ for a longer period, you need to configure it explicitly.\n\nAnother case where\
    \ `Cloud Pub/Sub` might not be the best fit is if you have a small number of messages\
    \ with large payloads, as `Cloud Pub/Sub` has a maximum message size of 10 MB.\n\
    \nAdditionally, if you don’t need to process data streams in real time and you\
    \ can afford some delay, other services such as `Cloud Storage` and `BigQuery`\
    \ may be more appropriate.\n\nIt’s important to understand that `Cloud Pub/Sub`\
    \ is a powerful service, but it’s not a one-size-fits-all solution, and it may\
    \ not be the best fit for every use case. It’s essential to understand the requirements\
    \ of your use case and select the appropriate GCP services to meet those requirements.\n\
    \n#### Using Cloud Pub/Sub in Java Application\n\nListing [6-1](#603470_1_En_6_Chapter.xhtml#PC1)\
    \ shows an example of how you can use `Cloud Pub/Sub` in a Java application. These\
    \ are the steps:\n\n1.  First, create a project in the GCP Console and enable\
    \ the `Cloud Pub/Sub` API.\n\n2.  Next, create a topic and a subscription in the\
    \ `Cloud Pub/Sub` Console.\n\n3.  In your Java application, add the following\
    \ dependencies to your `pom.xml` file.\n\n```\n    com.google.cloud\n    google-cloud-pubsub\n\
    \    1.103.0\n\nListing 6-1\n    Using Cloud Pub/Sub in a Java Application\n```\n\
    \n4.  As shown in Listing [6-2](#603470_1_En_6_Chapter.xhtml#PC2), create a Pub/Sub\
    \ client and set the project ID and credentials. The project ID and credentials\
    \ should not be hard-coded in production code and should follow the best practices\
    \ to store and access it from there.\n\n```\n    import com.google.cloud.pubsub.v1.Publisher;\n\
    \    import com.google.cloud.pubsub.v1.Subscriber;\n    import com.google.cloud.pubsub.v1.TopicAdminClient;\n\
    \    import com.google.cloud.pubsub.v1.SubscriptionAdminClient;\n    import com.google.pubsub.v1.ProjectTopicName;\n\
    \    import com.google.pubsub.v1.ProjectSubscriptionName;\n    import com.google.auth.oauth2.GoogleCredentials;\n\
    \    import java.io.FileInputStream;\n    GoogleCredentials credentials = GoogleCredentials.fromStream(new\
    \ FileInputStream(\"path/to/credentials.json\"))\n    .createScoped(Collections.singletonList(\"\
    https://www.googleapis.com/auth/pubsub\"));\n    String projectId = \"your-project-id\"\
    ;\n    String topicId = \"your-topic-id\";\n    String subscriptionId = \"your-subscription-id\"\
    ;\n    ProjectTopicName topicName = ProjectTopicName.of(projectId, topicId);\n\
    \    ProjectSubscriptionName subscriptionName = ProjectSubscriptionName.of(projectId,\
    \ subscriptionId);\n    TopicAdminClient topicAdminClient = TopicAdminClient.create(credentials);\n\
    \    SubscriptionAdminClient subscriptionAdminClient = SubscriptionAdminClient.create(credentials);\n\
    \    Listing 6-2\n    Creating a Pub/Sub Client and Setting the Project ID and\
    \ Credentials\n```\n\n5.  Use the publisher to publish messages to the topic,\
    \ as shown in Listing [6-3](#603470_1_En_6_Chapter.xhtml#PC3).\n\n```\n    Publisher\
    \ publisher = Publisher.newBuilder(topicName).build();\n    ByteString data =\
    \ ByteString.copyFromUtf8(\"Hello, Cloud Pub/Sub!\");\n    com.google.pubsub.v1.PubsubMessage\
    \ pubsubMessage = com.google.pubsub.v1.PubsubMessage.newBuilder().setData(data).build();\n\
    \    ApiFuture future = publisher.publish(pubsubMessage);\n    String messageId\
    \ = future.get();\n    System.out.println(\"Published message with ID: \" + messageId);\n\
    \    publisher.shutdown();\n    Listing 6-3\n    Use the Publisher to Publish\
    \ Messages\n```\n\n6.  Use the subscriber to receive messages from the subscription,\
    \ as demonstrated in Listing [6-4](#603470_1_En_6_Chapter.xhtml#PC4).\n\n```\n\
    \    Subscriber subscriber = Subscriber.newBuilder(subscriptionName, new MessageReceiver()).build();\n\
    \    subscriber.startAsync();\n    class MessageReceiver implements MessageReceiver\
    \ {\n    @Override\n    public void receiveMessage(com.google.pubsub.v1.PubsubMessage\
    \ message, AckReplyConsumer consumer) {\n    System.out.println(\"Received message:\
    \ \" + message.getData().toStringUtf8());\n    consumer.ack();\n    }\n    }\n\
    \    Listing 6-4\n    Using the Subscriber to Receive Messages\n```\n\n7.  Finally,\
    \ don’t forget to clean up resources when you’re done using them by deleting the\
    \ topic and subscription, as shown in Listing [6-5](#603470_1_En_6_Chapter.xhtml#PC5).\n\
    \n```\n    topicAdminClient.deleteTopic(topicName);\n    subscriptionAdminClient.deleteSubscription(subscriptionName);\n\
    \    Listing 6-5\n    Deleting the Topic and Description\n```\n\nThis is a basic\
    \ example of how you can use `Cloud Pub/Sub` in a Java application to publish\
    \ and receive messages. In a real-world application, you may want to handle errors,\
    \ retries, and other edge cases. You may also want to use other features provided\
    \ by the `Cloud Pub/Sub` API such as batching, flow control, and message attributes.\n\
    \nAdditionally, you may want to use `Cloud Pub/Sub` in combination with other\
    \ GCP services such as `Cloud Dataflow`, `Cloud Functions`, and `BigQuery` to\
    \ process and analyze your data streams in real time.\n\nThe code examples here\
    \ in this section use the default settings, which may not be appropriate for your\
    \ specific use case. You should carefully read the documentation and choose the\
    \ appropriate settings for your use case, such as message retention, ordering,\
    \ and delivery semantics.\n\nLet’s run `Cloud Dataflow` in the next section."
