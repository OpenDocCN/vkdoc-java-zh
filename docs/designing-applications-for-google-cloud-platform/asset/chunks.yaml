- fmt: '### Vertex AI


    `Vertex AI`是一个托管式机器学习平台，用于开发、训练和部署机器学习模型。它提供基于云的基础设施来运行大规模机器学习工作流，并提供多种服务，包括托管模型、训练算法和部署机器学习应用。该平台专为数据科学家和机器学习工程师设计，使他们能够快速轻松地构建和部署复杂的大规模模型。通过`Vertex
    AI`，用户可以借助谷歌在机器学习方面的基础设施和专业知识，专注于开发模型的核心任务，而无需管理底层基础设施。


    例如，你可以使用`Vertex AI`创建推荐引擎。你可以通过使用提供的数据和机器学习，通过批量请求获取预测。图[1-30](#603470_1_En_1_Chapter.xhtml#Fig30)展示了`Vertex
    AI`仪表盘。


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig30_HTML.jpg)


    `Vertex AI`页面的截图，右侧有一个图表，左侧有文本“开始使用`Vertex AI`”。页面上有一个“启用所有推荐API”的按钮，后面跟着三个模块：准备训练数据、训练模型和获取预测。


    **图 1-30** `Vertex AI`仪表盘


    存在一些机器学习API（`ML API`），包括`Cloud Vision API`、`Video Intelligence API`和`Product Search
    API`，如图[1-31](#603470_1_En_1_Chapter.xhtml#Fig31)所示。


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig31_HTML.jpg)


    `ML API`页面的截图，有三个模块，包含定义以及启用API和查看文档的选项。模块1是`Cloud Vision API`，模块2是`Cloud Video
    Intelligence API`，模块3是`Product Search API`。


    **图 1-31** `ML API`


    `Vertex AI`为常见的机器学习任务（如图像和文本分类）提供了预构建模型和工具。这意味着你可以使用这些预构建模型快速上手，而无需从头开发自己的模型。


    ### Google Cloud Translation API


    `Google Cloud Translation API`是谷歌云提供的一项基于云的机器翻译服务。它可以翻译不同语言之间的文本，包括英语、西班牙语、法语、德语、中文等。该API使用先进的机器学习技术，提供准确且自然的翻译。它用于各种场景下的文本翻译，包括网站、移动应用、客户服务和文档翻译。该API易于使用，可以通过简单的API请求轻松集成到各种Web和移动应用中。通过`Google
    Cloud Translation API`，开发者可以快速轻松地为其应用添加多语言支持，从而触达更广泛的全球受众。


    如果你在GCP项目中首次使用`Translation API`，你需要启用它，如图[1-32](#603470_1_En_1_Chapter.xhtml#Fig32)所示。


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig32_HTML.jpg)


    产品详情页的截图。页面左侧有一个Logo，后面跟着标题“`Cloud Translation API`”，以及几行关于该API的说明文字。页面左下角有一个“启用”按钮。


    **图 1-32** 启用`Translation API`


    一旦启用，你就可以在项目或Web应用中使用此API，将字符串或文本从一种语言翻译成另一种语言。你可以在仪表盘上查看流量，如图[1-33](#603470_1_En_1_Chapter.xhtml#Fig33)所示。


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig33_HTML.jpg)


    `Cloud Translation API`页面的截图。左侧高亮显示了“启用API和服务”的选项。右侧显示了API详情，包括服务名称、类型和状态。页面底部有“指标”选项卡，其中包含一个下拉菜单，用于选择图表和筛选条件。


    **图 1-33** `Cloud Translation API`仪表盘


    `Cloud Translation API`支持超过100种语言，并且可以在这些语言之间进行文本翻译。你还可以自定义翻译模型，以提高针对特定用例的翻译准确性。


    GCP还提供许多其他服务，以满足不同的用例和业务需求。


    现在你已经了解了GCP提供的众多服务，接下来我将对Java编程语言进行一个高层次的概述。


    ## Java及其能力概述


    Java是一种流行的编程语言，用于在GCP上构建各种应用。此外，GCP提供了许多服务和工具，你可以与Java结合使用，以构建、部署和扩展应用。以下是为Java应用提供的一些GCP服务示例：


    *   **Google App Engine**：一个完全托管的平台，用于构建和托管多种语言（包括Java）的Web应用。

    *   **Google Cloud Storage**：一个完全托管的对象存储服务，可以为Java应用存储和检索数据。

    *   **Google Cloud SQL**：一个完全托管的关系型数据库服务，可以为Java应用存储和检索数据。

    *   **Google Cloud Datastore**：一个完全托管的NoSQL文档数据库服务，可以为Java应用存储和检索数据。

    *   **Google Cloud Bigtable**：一个完全托管的高性能NoSQL数据库服务，可以为Java应用存储和检索大量数据。

    *   **Google Kubernetes Engine**：你可以使用`GKE`创建一个完全托管的Kubernetes集群。你可以将容器化的Java应用部署到`Google
    Kubernetes Engine`。


    GCP还提供了多种工具和库，可用于构建、部署和扩展Java应用，包括`Google Cloud SDK for Java`，它提供了一套用于与GCP服务交互的命令行工具和库。接下来，我们来谈谈使用Java进行GCP应用开发的优势。'
  raw: '### Vertex AI


    Vertex AI is a managed machine learning platform for developing, training, and
    deploying machine learning models. It provides cloud-based infrastructure for
    running large-scale machine learning workflows and offers various services, including
    hosting models, training algorithms, and deploying machine learning applications.
    The platform is designed for data scientists and machine learning engineers who
    need to quickly and easily build and deploy complex models at scale. With Vertex
    AI, users can take advantage of Google’s infrastructure and expertise in machine
    learning and focus on their core task of developing models without worrying about
    managing the underlying infrastructure.


    For example, you can use Vertex AI to create a recommendation engine. You can
    get predictions through batch requests by using the data provided and machine
    learning. Figure [1-30](#603470_1_En_1_Chapter.xhtml#Fig30) shows the Vertex AI
    dashboard.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig30_HTML.jpg)


    A screenshot of the Vertex A I page has a diagram on the right side and text,
    get started with Vertex A I on the left side of the page. It has a button to enable
    all recommended A P Is, followed by 3 blocks for preparing the training data,
    training model, and fetching the predictions.


    Figure 1-30


    Vettex AI dashboard


    There are machine learning APIs (ML APIs) that have the Cloud Vision API, Video
    Intelligence API, and Product Search API, as shown in Figure [1-31](#603470_1_En_1_Chapter.xhtml#Fig31).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig31_HTML.jpg)


    A screenshot of the M L A P Is page has 3 blocks with definitions and options
    to enable the A P I and view the docs. Block 1 has cloud vision A P I, block 2
    is for cloud video intelligence A P I, and block 3 is for product search A P I.


    Figure 1-31


    MP APIs


    Vertex AI provides prebuilt models and tools for common machine learning tasks,
    such as image and text classification. This means you can use these prebuilt models
    to get started quickly, without needing to develop your own models from scratch.


    ### Google Cloud Translation API


    The Google Cloud Translation API is a cloud-based machine translation service
    offered by Google Cloud. It can translate text between different languages, including
    English, Spanish, French, German, Chinese, and many others. The API uses advanced
    machine learning techniques to provide accurate and natural-sounding translations.
    It is used to translate text in various use cases, including websites, mobile
    apps, customer service, and document translation. The API is easy to use and can
    be easily integrated into a wide range of web and mobile applications through
    a simple API request. With the Google Cloud Translation API, developers can quickly
    and easily add multilingual support to their applications, helping to reach a
    wider global audience.


    If you are using the Translation API for the first time in your GCP project, you
    need to enable it, as shown in Figure [1-32](#603470_1_En_1_Chapter.xhtml#Fig32).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig32_HTML.jpg)


    A screenshot of the product details page. It has a logo on the left side of the
    page followed by a heading, cloud translation A P I, with a few lines of text
    for the A P I. It has an enable button at the bottom left side of the page.


    Figure 1-32


    Enabling the Translation API


    Once it’s enabled, you can use this API in your project or web application to
    translate the string or text from one language to another. You can see the traffic
    on the dashboard, as shown in Figure [1-33](#603470_1_En_1_Chapter.xhtml#Fig33).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig33_HTML.jpg)


    A screenshot of the cloud translation A P I page. The left side has the option
    to enable A P Is and services highlighted. The right side has A P I details with
    the service name, type, and status. It has the metrics tab at the bottom of the
    page with a drop-down menu to select graphs and filters.


    Figure 1-33


    Cloud Translation API dashboard


    The Cloud Translation API supports more than 100 languages and can translate text
    between any of these languages. You can also customize the translation model to
    improve the accuracy of translations for your specific use case.


    GCP offers many other services to suit different use cases and businesses.


    Now that you have a sense of the many services available through GCP, I’m going
    to give you a high-level overview of the Java programming language.


    ## Overview of Java and Its Capabilities


    Java is a popular programming language used to build various applications on the
    GCP. In addition, the GCP provides many services and tools you can use in conjunction
    with Java to build, deploy, and scale applications. The following are some examples
    of GCP services for Java applications:


    *   *Google App Engine*: A fully managed platform for building and hosting web
    applications in various languages, including Java.


    *   *Google Cloud Storage*: A fully managed object storage service that can store
    and retrieve data for Java applications.


    *   *Google Cloud SQL*: A fully managed relational database service that can store
    and retrieve data for Java applications.


    *   *Google Cloud Datastore*: A fully managed NoSQL document database service
    that can store and retrieve data for Java applications.


    *   *Google Cloud Bigtable*: A fully managed, high-performance NoSQL database
    service that can store and retrieve large amounts of data for Java applications.


    *   *Google Kubernetes Engine*: You can create a fully managed Kubernetes cluster
    using GKE. You can deploy containerized java applications to the Google Kubernetes
    Engine.


    The GCP also provides several tools and libraries that can be used to build, deploy,
    and scale Java applications, including the Google Cloud SDK for Java, which provides
    a set of command-line tools and libraries for interacting with GCP services. Let’s
    talk about the benefits of using Java for application development for GCP.'
