    要使用它，您需要先启用 API（如果尚未启用），如图 3-11 所示。


    启用后，您需要先配置 OAuth。


    3.  为传输中和静态数据启用加密。


    4.  使用安全套接字层 (SSL) 保护应用程序流量。


    5.  使用 Cloud Key Management Service (KMS) 保护敏感数据。


    如果尚未启用 KMS API，请启用它，如图 3-12 所示。


    启用后，它将带您进入仪表板，如图 3-13 所示。


    在仪表板中，您可以创建一个密钥环（密钥环是密钥的有组织集合）来使用它，如图 3-14 所示。


    6.  保持您的应用程序及其依赖项更新。


    7.  使用 App Engine 的内置安全功能（例如 App Engine 安全规则）来保护您的应用程序。


    注意


    上述步骤是完整的；但是，可能还有其他特定于您的应用程序或环境的步骤或注意事项。


    ## 扩展和优化 App Engine 应用程序


    扩展和优化 Google App Engine (GAE) 应用程序涉及调整应用程序的资源和设置，以处理流量变化并提高性能。


    在 GAE 上扩展应用程序是指调整正在运行的实例数量以处理流量变化。扩展 GAE 应用程序主要有两种方式：手动扩展和自动扩展。手动扩展涉及手动调整正在运行的实例数量，而自动扩展则根据应用程序的流量自动调整实例数量。


    优化 GAE 应用程序涉及进行更改以提高应用程序的性能。以下是优化 GAE 应用程序的一些方法：


    *   *使用缓存*：缓存可以通过减少对后端的请求次数来显著提高应用程序的性能。缓存是临时存储频繁访问的数据或内容的过程，以提高性能并减少后端负载。


    *   *优化数据库*：使用索引、反规范化和其他技术来提高数据库查询的性能。提高数据库查询性能的其他技术可能包括优化数据库架构、使用高效的数据类型、优化数据库查询和事务，以及最小化检索的数据量。


    *   *减少请求次数*：通过设计能够在单个 HTTP 请求中检索或操作多个相关资源的 API，或使用客户端缓存来减少往返次数，从而最大限度地减少对后端的请求次数。


    *   *使用内置性能工具*：GAE 提供了多种工具来帮助您识别和修复性能问题，例如 App Engine Performance Dashboard、Cloud
    Trace 和 Cloud Profiler。


    *   *使用合适的实例类别*：GAE 提供多种实例类别，每种类别具有不同的资源和定价。为您的应用程序选择合适的实例类别，以优化性能和成本。


    *   *使用负载均衡*：使用负载均衡将流量分配到多个实例，以处理增加的流量。


    *   *使用内容分发网络 (**CDN)*：CDN 可以通过缓存内容并将其更靠近最终用户交付，来帮助减少应用程序负载并提高应用程序性能。


    请务必记住，扩展和优化应用程序是一个迭代过程，您可能需要进行多次更改并监控应用程序的性能，才能达到预期效果。


    ### 在 GAE 中设置手动和自动扩展


    在 Google App Engine 上扩展 Web 应用程序是指调整正在运行的应用程序实例数量，以处理流量变化。在 GAE 上扩展 Web 应用程序主要有两种方式：手动扩展和自动扩展。


    #### 手动扩展


    使用手动扩展，您可以手动调整正在运行的实例数量以处理流量变化。要手动扩展 GAE 应用程序，您可以使用 Google Cloud 控制台中的 App Engine
    仪表板。您可以为应用程序设置正在运行的实例数量，App Engine 将确保该数量的实例正在运行。

    '
- fmt: '### Automatic Scaling


    Automatic scaling automatically adjusts the number of instances running to handle
    changes in traffic.


    You will need to configure the `app.yaml` file for your application to set up
    automatic scaling on GAE. In this file, you can set the `automatic_scaling` option
    to configure the automatic scaling settings for your application.


    Here are the options you can set for automatic scaling:


    - `min_idle_instances`: The minimum number of idle instances that App Engine should
    maintain for your application.

    - `max_idle_instances`: The maximum number of idle instances that App Engine should
    maintain for your application.

    - `min_pending_latency`: The minimum amount of time that a request should wait
    before starting a new instance.

    - `max_pending_latency`: The maximum amount of time that a request should wait
    before starting a new instance.

    - `target_cpu_utilization`: The target CPU utilization for your application. App
    Engine will adjust the number of instances to maintain this CPU utilization.


    You can also set other options, such as `max_concurrent_requests` and `max_instances`,
    for more fine-grained control over the scaling of your application.


    Once you’ve configured these options, App Engine will automatically adjust the
    number of instances running for your application based on the traffic to your
    application.


    It is important to note that in automatic scaling, App Engine will automatically
    adjust the number of instances running for your application based on the traffic.
    Still, it may take some time for the changes to take effect.


    It is also important to monitor the behavior of your application and adjust the
    automatic scaling settings as necessary to ensure that your application is performing
    well and that costs are kept under control.


    # Data Storage in Google Cloud


    In this chapter, we will explore Google Cloud Storage (GCS) and how to use it
    to store and manage files in a Java application. GCS is a cloud-based object storage
    service provided by Google Cloud Platform (GCP), which allows users to store and
    access their data from anywhere in the world. It is a highly scalable and reliable
    storage solution that offers features such as data encryption, data durability,
    and data life-cycle management.


    We will start by understanding the basics of GCS, including its key concepts and
    features. We will then learn how to set up a GCS bucket, authenticate with GCS,
    and install the GCS Java client library. We will also cover how to upload, download,
    and manage files in a GCS bucket using Java code. By the end of this chapter,
    you should have a solid understanding of how to use GCS for file storage in a
    Java application.


    Google Cloud offers several data storage solutions for various use cases, including
    relational databases, NoSQL databases, and object storage. These storage solutions
    are designed to be highly available, scalable, and reliable, with built-in backup
    and recovery options.


    Organizations need data storage solutions to store and manage their data effectively
    and efficiently. These solutions enable organizations to access, manage, and analyze
    data, making it an essential part of any modern business.


    With the increasing amount of data generated by organizations, cloud-based data
    storage solutions have become a popular choice because of their flexibility, scalability,
    and cost-effectiveness. Google Cloud’s data storage solutions are designed to
    meet the needs of any organization, from small startups to large enterprises,
    by providing a wide range of options to choose from based on their specific requirements.


    Let’s say you have a website where users can create accounts and log in to access
    certain features. The website needs to store user information such as their name,
    email, password, and other details. Instead of storing this information on your
    website’s server, you can store it in a cloud database like Google Cloud Datastore.


    When a user creates an account or logs in, their information is stored in the
    cloud database, and when they log out or leave the website, the information remains
    secure and accessible the next time they log in.


    Similarly, suppose you have a mobile application that requires users to input
    data, such as a fitness app where users can track their workouts and progress.
    In that case, you can store this data in a cloud database such as Google Cloud
    Firestore. This ensures that the data is accessible across multiple devices and
    remains secure.


    Using cloud data storage allows you to scale your applications easily, ensures
    data durability and availability, and provides secure access to your data from
    anywhere.


    Let’s talk more about the various storage options in GCP.


    ## Understanding the Various Storage Options in GCP


    Google Cloud Platform offers a wide range of storage options to meet different
    data storage and management requirements. The following are some of the key storage
    options provided by GCP:


    - **Cloud Storage** is a scalable, cost-effective object storage service supporting
    unstructured data storage. It can be used for various use cases such as backup
    and archiving, data warehousing, media and entertainment, and web and mobile applications.

    - **Cloud SQL** is a fully managed relational database service that supports popular
    database engines such as MySQL, PostgreSQL, and SQL Server. It is suitable for
    structured data storage and can be used for various use cases including web and
    mobile applications, data warehousing, and online transaction processing (OLTP).

    - **Cloud Spanner** is a globally distributed, strongly consistent, and fully
    managed relational database service that supports structured data storage. It
    is suitable for various use cases such as web and mobile applications, data warehousing,
    and OLTP.

    - **Cloud Bigtable** is a fully managed, NoSQL, wide-column database service that
    supports structured and semistructured data storage. It can be used for various
    use cases such as web and mobile applications, data warehousing, and OLAP.

    - **Cloud Datastore** is a fully managed, NoSQL document database service that
    supports structured and semistructured data storage. It can be used for various
    use cases such as web and mobile applications, data warehousing, and OLAP.

    - **Cloud Memorystore** is an in-memory data store service that supports fast
    access to data. It is suitable for various use cases such as web and mobile applications,
    data warehousing, and OLAP.


    Each of these storage options has its unique features and capabilities. You should
    choose the one that best fits your needs based on the type of data you are storing,
    the size of your data, and your application’s performance and scalability requirements.


    Let’s go through each of these options in greater detail, beginning with cloud
    storage.'
