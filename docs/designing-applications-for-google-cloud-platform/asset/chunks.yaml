- fmt: 'The choice between `Cloud SQL` and `AlloyDB` will depend on your specific
    needs and requirements. `Cloud SQL` can be a good choice if you need a MySQL-compatible
    database service. If you need a PostgreSQL-compatible database service, then `AlloyDB`
    can be a good choice. If you need a database service that offers the latest features
    and technology, then `AlloyDB` can be a good choice. `Cloud SQL` is generally
    less expensive than `AlloyDB` for workloads that do not require a lot of data
    processing. However, `AlloyDB` can be more cost-effective for workloads requiring
    much data processing.


    ### Google Cloud Spanner


    `Google Cloud Spanner` is a highly scalable, globally distributed, and managed
    relational database service offered by Google Cloud. It is designed to provide
    horizontal scalability and strong consistency across all nodes, making it a great
    choice for applications that require strong consistency and high performance.
    With its support for SQL, transactions, and secondary indexes, `Spanner` provides
    familiar database abstractions, making it easy for developers to use and integrate
    into existing applications. `Spanner`’s globally distributed architecture, automatic
    failover, and low latency make it ideal for high-availability and mission-critical
    applications. With its scalability, reliability, and consistency, `Cloud Spanner`
    offers a cost-effective and scalable alternative to traditional relational databases
    for organizations looking to modernize their data architecture and migrate their
    applications to the cloud.


    Even with the $300, 90-day trial of GCP, you can start a separate free trial for
    `Cloud Spanner` for 90 days. You get 10 GB of storage that is not charged against
    your credits.


    By clicking the `Start a Free Trial` button, as shown in Figure [1-25](#603470_1_En_1_Chapter.xhtml#Fig25),
    you can create a `Spanner` instance by providing the instance name, instance ID,
    and location in the configuration.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig25_HTML.jpg)


    A screenshot of the Google Cloud spanner page. It has a welcome message, followed
    by a few lines of text for the spanner, and a button to start a free trial at
    the bottom of the page.


    Figure 1-25


    Cloud Spanner


    When creating a `Cloud Spanner` instance (see Figure [1-26](#603470_1_En_1_Chapter.xhtml#Fig26)),
    specify the number of nodes you want to use to run the database. Each node provides
    a certain amount of computing and storage resources, and the more nodes you use,
    the more computing and storage resources you have available to run your database.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig26_HTML.jpg)


    A screenshot of the trial instance creation page. It has a few lines of text for
    the details of the trial instance, a text box for the name of the instance and
    instance I D, and a drop-down menu to select a configuration. It has a button
    to create a free trial instance at the bottom of the page.


    Figure 1-26


    Creating an instance for Spanner


    A node is a unit of computing and storage resources that runs as part of the `Cloud
    Spanner` service. A node can be considered a virtual machine optimized for running
    the `Cloud Spanner` software.


    `Cloud Spanner` uses a distributed architecture to provide high availability and
    scalability. The database is partitioned into shards, which are distributed across
    multiple nodes. Each node stores a portion of the data and processes queries for
    that portion of the data. This allows `Cloud Spanner` to handle large databases
    and complex queries at high speed.


    `Cloud Spanner` also provides strong consistency across all nodes and shards.
    This means that all clients will see the same data at the same time, even under
    heavy loads. To achieve strong consistency, `Cloud Spanner` uses a distributed
    commit protocol that ensures that all nodes agree on the order in which transactions
    are committed.


    After creating an instance for `Cloud Spanner`, you can use it without worrying
    about scaling and still get the benefits of the ACID properties of RDBMSs like
    with MySQL.


    ### Google Cloud Dataflow


    `Google Cloud Dataflow` is a fully managed service for transforming and analyzing
    data in real time. It is designed to help developers process and analyze data
    from various sources, such as batch and streaming data. `Cloud Dataflow` allows
    developers to build data processing pipelines using a high-level, simple API that
    supports both batch and stream processing. It offers a number of features for
    optimizing the performance and scalability of data processing pipelines, including
    automatic parallel processing, optimized data movement, and integrated error handling.
    Additionally, `Dataflow` integrates with other Google Cloud Platform services
    such as `BigQuery`, `Cloud Storage`, and `Cloud Pub/Sub`, allowing developers
    to easily analyze and store data in the cloud.


    You can create batch or streaming data jobs, create a data pipeline, and save
    the state of a streaming pipeline in snapshots. Figure [1-27](#603470_1_En_1_Chapter.xhtml#Fig27)
    shows the `Dataflow` dashboard.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig27_HTML.jpg)


    A screenshot of the cloud dataflow page. It has the overview option selected on
    the left side of the page. The right side has details for the cloud dataflow,
    a diagram for the dataflow, and 4 common actions of job creation, viewing protocols,
    data pipeline creation, and viewing snapshots.


    Figure 1-27


    Cloud Dataflow dashboard


    To create any new job, you need to enable the `Dataflow API` for your project
    if it’s not already enabled; Figure [1-28](#603470_1_En_1_Chapter.xhtml#Fig28)
    shows the `Enable` button.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig28_HTML.jpg)


    A screenshot of a Google Cloud product details window. It has a logo on the left
    side of the page with a header dataflow A P I on its right. It has an enable button
    at the bottom side of the page.


    Figure 1-28


    Enabling the Dataflow API


    `Dataflow` internally used `Apache Beam`, and it has a few prebuilt templates
    for creating jobs that cover most common scenarios. You can create a `Dataflow`
    job using a prebuilt template or create a template based on your project needs.
    Figure [1-29](#603470_1_En_1_Chapter.xhtml#Fig29) shows how to create a `Dataflow`
    job from the template.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig29_HTML.png)


    A screenshot of the page for job creation from the template. It has a text box
    for the job name, 2 drop-down menus for the regional endpoint and data flow template,
    and 3 browse options for required parameters.


    Figure 1-29


    Creating a job from templete


    To create a `Cloud Dataflow` pipeline, you need to first decide where your data
    is coming from, like a file or a database. Then, you’ll write code in a supported
    programming language to define how your data will be processed, such as by filtering
    or grouping. Once your code is written, you’ll package it up into a format that
    can be distributed and executed on the `Cloud Dataflow` service.'
