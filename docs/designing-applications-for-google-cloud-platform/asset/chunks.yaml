    ### 设置防火墙与安全注意事项


    当您在 Google App Engine 上部署 Web 应用程序时，需要确保应用程序安全可靠，免受恶意攻击。为此，您需要采取特定的安全措施，例如设置防火墙规则以允许流量进入应用程序、使用身份感知代理控制对应用程序的访问、加密传输中和静态数据、使用
    SSL 保护应用程序流量、使用 Cloud Key Management Service 保护敏感数据、保持应用程序及其依赖项更新，以及使用 App Engine
    的内置安全功能来保护应用程序。遵循这些安全措施，您可以确保您的 Web 应用程序对用户来说是安全可靠的。


    本节中使用的关键术语如下：


    *防火墙*是一种安全系统，它根据预定义的安全规则监控和控制进出网络的流量。


    *身份感知代理* (IAP) 是一种服务，用于控制对云应用和虚拟机的访问，而无需将它们暴露在互联网上。


    *OAuth* 是一种授权协议，允许应用程序从第三方服务访问用户数据，而无需存储用户密码。


