    \ Google Cloud SDK 库，并通过以下方式获取凭据。\n\n```\nGoogleCredentials.getApplicationDefault()\n\
    ```\n\n要访问 GCS，你需要创建服务账号并将其下载，以便在代码中使用。\n\n### 创建服务账号、下载并在项目中使用\n\n以下是在你的 Java\
