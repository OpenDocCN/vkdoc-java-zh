- fmt: '### Cloud Spanner vs. Cloud Datastore


    Deciding between `Cloud Spanner` and `Cloud Datastore` for your application can
    depend on several factors, including your data model, performance requirements,
    and use case. Here are a few key points to consider:


    - **Data model**: `Cloud Spanner` can be set up as a globally distributed, relational
    database service that combines a relational and a nonrelational data model. It
    is best suited for applications that require a highly scalable, globally distributed
    data model and structured data. `Cloud Datastore`, on the other hand, is a NoSQL
    document database service that uses a flexible, hierarchical data model. It is
    best suited for applications that require a flexible, denormalized data model
    and semistructured or unstructured data.


    - **Performance**: `Cloud Spanner` is a good choice for applications that require
    high performance but do not need to scale globally. `Cloud Datastore`, on the
    other hand, is a good choice for applications that require high performance and
    global scalability.


    - **Use case**: `Cloud Spanner` is typically used for large-scale applications
    with high read-write traffic and can handle structured data. `Cloud Datastore`
    is typically used for small-to-medium size applications with moderate read-write
    traffic and can handle semistructured and unstructured data.


    - **Consistency and availability**: `Cloud Spanner` provides strong consistency
    and is best for use cases that require strong consistency. `Cloud Datastore`,
    on the other hand, provides eventual consistency and is best for use cases that
    can handle some level of inconsistency. `Cloud Spanner`’s strong consistency and
    automatic failover features make it well-suited for applications that require
    high availability and disaster recovery.


    - **Cost**: `Cloud Spanner` is generally more expensive than `Cloud Datastore`.
    This is because of the additional features and functionalities that `Cloud Spanner`
    provides, such as global scalability, strong consistency, and automatic failover.


    The best choice for your application may depend on various factors. It’s recommended
    to evaluate both options thoroughly, based on your specific use case, and make
    the decision that best aligns with your business requirements.


    In the next section, we will talk about the situation when using `Cloud Datastore`
    over `Cloud Spanner`.


    #### When to Use Cloud Datastore Instead of Cloud Spanner


    `Cloud Datastore` is a NoSQL document database that is suitable for storing and
    retrieving semistructured data, such as JSON or XML documents. It is a fully managed
    service and provides scalability, automatic sharding, and a flexible schema.


    On the other hand, `Cloud Spanner` is a relational database that provides stronger
    consistency and is designed to handle structured data at a global scale. It is
    suitable for use cases that require transactional consistency across multiple
    regions and high availability. However, `Cloud Spanner` may be more complex and
    expensive to set up and maintain compared to `Cloud Datastore`.


    If the data you want to store is semistructured and you don’t need global consistency
    or transactional capabilities, then `Cloud Datastore` may be a better choice.
    It is simpler to use and can scale automatically as your data grows. However,
    if you need strong consistency and transactional capabilities across multiple
    regions, then `Cloud Spanner` may be a better choice, even though it may require
    more effort and resources to set up and maintain.


    For example, consider a company that develops a mobile application that allows
    users to log and track their outdoor activities, such as hiking, biking, running,
    etc. The application must store many location data, including GPS coordinates,
    timestamps, and user-generated comments. The data is semistructured, meaning it
    does not fit well into a traditional relational database structure. The application
    also needs to handle a high volume of write operations, as users constantly update
    their activities in real time.


    In this case, `Cloud Datastore` would be more suitable than `Cloud Spanner` because
    the stored data is semistructured, and the application does not require complex
    data transactions or joins. `Cloud Datastore` is a NoSQL document database designed
    to handle semistructured data, providing automatic scaling and high availability.
    Additionally, `Cloud Datastore` is easy to use and does not require significant
    database management expertise.


    Another advantage of using `Cloud Datastore`, in this case, is that it is built
    on top of Google’s infrastructure and is designed to handle high write loads;
    this is essential for the mobile application as it needs to handle a large amount
    of location data updates in real time.


    For another example, consider a social media platform that allows users to create
    and share content, such as text, images, and videos. The platform must store user
    information, such as name and contact information, and store the content users
    create and share. The platform also needs to handle a moderate amount of traffic,
    with many users creating and viewing content at any given time.


    In this case, `Cloud Datastore` would be more suitable than `Cloud Spanner` because
    the platform’s needs are relatively simple and do not require the high scalability
    and global consistency features provided by `Cloud Spanner`. `Cloud Datastore`
    is a NoSQL document database service designed to handle unstructured data and
    is easy to scale. Additionally, `Cloud Datastore` is a cost-effective solution
    for this use case, as it does not require the same complexity and resources as
    `Cloud Spanner`.


    Another advantage of using `Cloud Datastore`, in the previous case, is the ability
    to handle many user requests and store the data in a flexible and scalable way.
    It can handle many users’ data and perform queries over it, which is necessary
    for the social media platform to provide personalized recommendations and promotions
    to their users.


    In short, `Cloud Datastore` is suitable for organizations that store and manage
    unstructured, semistructured, or nonrelational data and do not require complex
    data transactions or joins. It is particularly useful for cases where the organization
    must handle a high volume of write operations and the data needs to fit better
    into a traditional relational database structure. It is a cost-effective and easy-to-use
    option for cases where the organization’s needs are less demanding than those
    of large-scale businesses that do not require the scalability and global consistency
    provided by `Cloud Spanner`.


    Now let’s talk about the situations when `Cloud Datastore` is better than `Cloud
    SQL` in the next section.'
