    When you search and select GCE the first time, you must enable it by clicking
    the Enable button, as shown in Figure [1-9](#603470_1_En_1_Chapter.xhtml#Fig9).
    You will not see this option if you are part of the organization and it is already
    enabled for the selected project.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig9_HTML.jpg)


    A screenshot of a Google Cloud product details window. It has a logo on the left
    side of the page with a header, and compute engine A P I on its right. It has
    an enable button at the bottom side of the page.


    Figure 1-9


    Enabling Compute Engine for first time


    When you click the Enable button, you will see it being enabled, as shown in Figure
    [1-10](#603470_1_En_1_Chapter.xhtml#Fig10).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig10_HTML.jpg)


    A screenshot of the notifications page has a bell icon at the top right corner
    of the page. It has a line of text that reads, enable service colon compute dot
    google a p i s dot com, e-learning dev.


    Figure 1-10


    Enabling the Compute Engine API


    Enabling the Compute Engine API will take some time.


    Once the API is enabled, you will see the Compute Engine dashboard, as shown in
    Figure [1-11](#603470_1_En_1_Chapter.xhtml#Fig11). From here, you can create virtual
    machines. By clicking Create Instance, you can create a VM instance. You can migrate
    your VMs directly from on-prem or other clouds using Google Cloud’s Migrate to
    Virtual Machines feature. Supported sources include on-prem VMware, Amazon EC2,
    and Microsoft Azure. To migrate, you can click the Import VM button. You can see
    these two buttons at the top of the screen.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig11_HTML.jpg)


    A screenshot of the compute engine page has the option of V M instances selected
    on the left side. The right side has an instances tab, a search box to enter property
    name or value, and a table with columns for status, name, zone, recommendations,
    in use by, internal and external I P, and connect.


    Figure 1-11


    Compute Engine dashboard


    There are various configurations and instance options available to create a compute
    instance. Importing an existing VM is a separate topic outside this book’s scope.


    You can create a VM with the desired configurations such as machine type, operating
    system, disk type, and size. The best practice is to use a VM template to create
    a VM for a similar purpose. You can choose the ready-to-go deployable VMs from
    the marketplace; the Google Cloud Marketplace is a platform for discovering, deploying,
    and managing preconfigured software solutions on the Google Compute Engine. You
    will see these options when you click the “Create an instance” button, as shown
    in Figure [1-12](#603470_1_En_1_Chapter.xhtml#Fig12).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig12_HTML.jpg)


    A screenshot of the Google Cloud window to create an instance has 4 options. It
    has option 1 for the new V M instance, option 2 for the new V M instance from
    the template, option 3 for the new V M instance from the machine image, and option
    4 for the marketplace.


    Figure 1-12


    Creating an instance


    GCE can be used for variety of use cases, including batch processing workloads
    such as rendering and data processing, high-performance computing workloads such
    as scientific simulation and machine learning, big data processing such as processing
    and analyzing large datasets, and high-performance, scalable infrastructure for
    gaming workloads.'
  trans: '

    ## GCP 及其服务概览


    *GCP* *架构*指的是构成 Google Cloud Platform 的基础设施和服务的设计与布局。从高层来看，GCP 架构包括计算、存储、数据库、网络和安全。它被设计为可扩展、可靠且安全的。它使用多层抽象和隔离机制，确保应用程序和服务能够在同一基础设施上独立且安全地运行。它还提供了各种工具和服务，使开发人员能够自动化开发流程、监控性能并实时排查问题。


    GCP *区域*和*可用区*是 GCP 资源的特定地理位置。GCP 区域是托管资源的特定位置。区域由一个或多个可用区（AZ）组成，这些可用区是物理上分离的位置，称为*数据中心*。可用区被设计为相互独立，因此如果一个可用区发生故障，不会影响同一区域内另一个可用区中资源的可用性。GCP
    区域和可用区非常重要，因为它们会影响应用程序的性能和可用性。当您创建 GCP 资源时，需要指定要创建资源的区域和可用区。


    GCP 的定价基于按需付费模式，这意味着您只需为使用的资源和服务付费。成本取决于多个因素，包括所用资源的类型和数量、使用时长以及资源的位置。价格可能因区域和可用区而异，某些区域和可用区的成本会高于其他区域。GCP
    通过承诺在一定时期内使用一定量的 Compute Engine 和云存储来提供承诺使用折扣。


    GCP 提供多种服务，包括计算、存储、网络、大数据、机器学习、物联网（IoT）、安全和应用程序开发。让我们快速了解一些最受欢迎的服务。


    ### Google Compute Engine


    Google Compute Engine (GCE) 是 GCP 的一部分，它提供可扩展、高可用且高性能的虚拟机，用于运行应用程序和服务。它使客户能够创建、配置和管理在
    Google 基础设施上运行的虚拟机（VM）。GCE 提供一系列可配置选项，包括可定制的机器类型、磁盘存储选项和操作系统，包括流行的 Linux 发行版和
    Microsoft Windows。GCE 还提供高级网络功能，如负载均衡、防火墙和自动备份，使其成为部署和管理应用程序与服务的理想平台。


    GCE 与其他 GCP 服务（如 Google Kubernetes Engine、Google Cloud Storage、Google Cloud SQL
    和 Cloud Pub/Sub）的集成并非受限，但可能取决于网络连接和配置。这种集成能力使得构建复杂的多层应用程序变得容易。


    让我们看一个例子：GCE 实例与其需要通信的其他 GCP 服务位于不同的区域或可用区。在这种情况下，可能会出现延迟和性能问题。如果网络配置设置不当，可能会影响
    GCE 实例与其他 GCP 服务之间的连接和集成。为了优化 GCE 实例与其他 GCP 服务之间的集成，将网络连接和配置作为架构设计的一部分来考虑非常重要，这包括选择合适的区域和可用区、设置正确的网络配置，以及使用负载均衡和
    Cloud CDN 等服务来提高性能和可用性。


    当您首次搜索并选择 GCE 时，必须点击“启用”按钮来启用它，如图 1-9 所示。如果您是组织成员且该服务已为所选项目启用，则不会看到此选项。


    ![](img/603470_1_En_1_Fig9_HTML.jpg)


    一张 Google Cloud 产品详情窗口的截图。页面左侧有一个带有标题的徽标，其右侧是 Compute Engine API。页面底部有一个“启用”按钮。


    图 1-9


    首次启用 Compute Engine


    当您点击“启用”按钮时，您将看到它正在被启用，如图 1-10 所示。


    ![](img/603470_1_En_1_Fig10_HTML.jpg)


    一张通知页面的截图，页面右上角有一个铃铛图标。其中有一行文字显示：“启用服务：compute.googleapis.com，e-learning dev”。


    图 1-10


    启用 Compute Engine API


    启用 Compute Engine API 需要一些时间。


    一旦 API 启用，您将看到 Compute Engine 控制面板，如图 1-11 所示。从这里，您可以创建虚拟机。通过点击“创建实例”，您可以创建一个
    VM 实例。您可以使用 Google Cloud 的“迁移到虚拟机”功能，将您的虚拟机直接从本地或其他云环境迁移过来。支持的来源包括本地 VMware、Amazon
    EC2 和 Microsoft Azure。要迁移，您可以点击“导入 VM”按钮。您可以在屏幕顶部看到这两个按钮。


    ![](img/603470_1_En_1_Fig11_HTML.jpg)


    一张 Compute Engine 页面的截图，左侧选中了“VM 实例”选项。右侧有一个“实例”选项卡、一个用于输入属性名称或值的搜索框，以及一个包含状态、名称、可用区、建议、使用者、内外部
    IP 和连接等列的表格。


    图 1-11


    Compute Engine 控制面板


    有多种配置和实例选项可用于创建计算实例。导入现有 VM 是一个单独的主题，不在本书的讨论范围之内。


    您可以使用所需的配置（如机器类型、操作系统、磁盘类型和大小）来创建 VM。最佳实践是使用 VM 模板来创建用于类似目的的 VM。您可以从市场中选择即用型可部署
    VM；Google Cloud Marketplace 是一个用于在 Google Compute Engine 上发现、部署和管理预配置软件解决方案的平台。当您点击“创建实例”按钮时，您将看到这些选项，如图
    1-12 所示。


    ![](img/603470_1_En_1_Fig12_HTML.jpg)


    一张用于创建实例的 Google Cloud 窗口截图，其中有 4 个选项。选项 1 是“新建 VM 实例”，选项 2 是“从模板新建 VM 实例”，选项
    3 是“从机器映像新建 VM 实例”，选项 4 是“市场”。


    图 1-12


    创建实例


    GCE 可用于多种用例，包括批处理工作负载（如渲染和数据处理）、高性能计算工作负载（如科学模拟和机器学习）、大数据处理（如处理和分析大型数据集），以及为游戏工作负载提供高性能、可扩展的基础设施。

    '
- fmt: '### Google Kubernetes Engine


    `Google Kubernetes Engine` (GKE) is a fully managed Kubernetes service offered
    by GCP that makes it easy to deploy, manage, and scale containerized applications
    using Google infrastructure. GKE provides a complete solution for deploying, managing,
    and scaling containers, allowing developers to focus on writing code and delivering
    features. It also provides features such as automatic upgrades, automatic scaling,
    and self-healing so that developers can focus on their applications, not the underlying
    infrastructure. Additionally, GKE integrates with other GCP services, such as
    `cloud load balancing`, `cloud Operations Suite`, `cloud monitoring` and `Logging`,
    and `cloud DNS`, making it easy to manage a complete application stack in a single
    platform.


    A *containerized application* is an application that has been packaged with all
    of its dependencies into a single unit called a *container*. Containers are isolated
    from each other and the host operating system, making them a more efficient and
    secure way to deploy applications. Think of a container as a box containing everything
    your application needs to run, such as the code, libraries, and settings. This
    makes it easy to deploy applications to different environments, such as on-premises,
    in the cloud, or in a hybrid environment. Containers are also more efficient than
    traditional virtual machines. Virtual machines require a full operating system,
    while containers require only the application’s resources. This can save money
    on hardware costs and improve performance. Containers are more secure than traditional
    virtual machines. Containers are isolated from each other and the host operating
    system, making it more difficult for malware to spread, which makes containers
    an ideal choice for applications that need to be highly secure.


    Like the GCE, you need to enable the `Kubernetes Engine API` if you are using
    it for the first time. Figure [1-13](#603470_1_En_1_Chapter.xhtml#Fig13) shows
    the Enable button.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig13_HTML.jpg)


    A screenshot of the product details page. It has a logo on the left side of the
    page followed by a heading, `Kubernetes Engine API`, with a few lines of text
    for the API. It has an enable button at the bottom left side of the page.


    Figure 1-13


    Enabling the `Kubernetes Engine API`


    After you click the Enable button, GCP will take some time to enable it. After
    it’s enabled, you will see the GKE dashboard. Again, if you are part of the organization
    and GKE is already enabled for the given project, you will see the GKE dashboard
    straightaway.


    In the left pane, you will see options for the cluster, Workload, Services and
    Ingress, Applications, Secret and ConfigMaps, etc.


    As shown in Figure [1-14](#603470_1_En_1_Chapter.xhtml#Fig14), GCP provides two
    options to create a Kubernetes cluster and deploy a container: a pay-per-pod Kubernetes
    cluster called Autopilot, where GKE manages your nodes with minimal configuration
    required. The other option is a pay-per-node Kubernetes cluster called Standard,
    where you configure and manage your nodes.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig14_HTML.jpg)


    A screenshot of the cluster creation window has 2 modes. It has mode 1 for the
    autopilot, and mode 2 for the standard mode, each followed by a button for configuration.
    The configure button for mode 1 is selected. It has a compare tab at the bottom
    of the page to compare the cluster modes.


    Figure 1-14


    Creating a Kubernetes cluster


    You can have multiple clusters with different configurations for different types
    of workloads. For example, you might create one GKE cluster for a production application
    that requires high availability and scalability, with multiple nodes spread across
    multiple zones. You might create another GKE cluster for a development or testing
    environment with fewer nodes and simpler configurations, as illustrated in Figure
    [1-15](#603470_1_En_1_Chapter.xhtml#Fig15).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig15_HTML.jpg)


    A block diagram for GKE clusters has 4 blocks, each with their respective cluster
    definition. Block 1 for the production cluster, block 2 for the development cluster,
    block 3 for the big data cluster, and block 4 for GPU accelerated cluster.


    Figure 1-15


    GKE clusters


    You can also create GKE clusters with different machine types, network configurations,
    and storage options, depending on the specific requirements of your workloads.
    This allows you to optimize your GKE clusters for performance, cost-effectiveness,
    and other factors. You might have one GKE cluster for batch processing workloads
    and another GKE cluster for web applications. This can help prevent resource contention
    and improve overall performance and reliability.'
