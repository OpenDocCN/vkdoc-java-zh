    data from many devices. The sensor data is unstructured and includes various data
    types, such as text, images, and videos, and it can be of different formats and
    structures. The company also needs to handle many read-and-write operations from
    devices at any time.


    In this case, Cloud Datastore would be more suitable than Cloud SQL because the
    company’s needs are demanding and require a high level of scalability. Cloud Datastore
    is designed to handle unstructured data and can be easily scaled to handle a large
    amount of data. Cloud Datastore is a NoSQL document database service that does
    not require the same level of complexity and resources as Cloud SQL, making it
    a cost-effective solution.


    Another advantage of using Cloud Datastore, in the previous case, is the ability
    to handle many requests from the devices and store the data in a flexible and
    scalable way. It can handle a large amount of data and perform queries over it,
    which is necessary for the IoT company to perform data analysis and make predictions.


    In short, Cloud Datastore is suitable for cases where the organization needs to
    store and manage semistructured or unstructured data, such as JSON, and has a
    large scale of read-and-write operations. It is a cost-effective and easy-to-use
    option for cases where the organization’s needs are not as demanding as those
    of large-scale businesses, and the organization does not require the relational
    structure provided by Cloud SQL.


    Now let’s talk about using Cloud SQL over Cloud Datastore in the next section.


    #### When to Use Cloud SQL Instead of Cloud Datastore


    A use case where Cloud SQL may be more suitable over Cloud Datastore is when a
    company needs to store and manage structured data that follows a specific schema
    and requires the full functionality of a traditional relational database provided
    by Cloud SQL.


    For example, consider an e-commerce company that needs to store and manage customer
    information, inventory, and sales data. The data is structured and follows a specific
    schema, such as customer information having fields like name, address, and contact
    information. The company also needs to handle a moderate number of read-and-write
    operations from customers and employees at any time.


    In this case, Cloud SQL would be more suitable than Cloud Datastore because the
    company’s needs are relatively complex and require the full functionality of a
    traditional relational database. Cloud SQL is a fully managed relational database
    service that supports SQL, the industry-standard language for managing and querying
    relational data. It provides features such as transactions, indexes, and stored
    procedures. Cloud SQL is more cost-effective in this case as it does not require
    the same level of complexity and resources as Cloud Datastore.


    Another advantage of using Cloud SQL, in this case, is the ability to handle complex
    queries over the data, and it provides a way to enforce data integrity and consistency.
    This is necessary for the e-commerce company to provide accurate information to
    the customers and employees and prevent system errors.


    For another example, consider a financial company that needs to store and manage
    financial transactions and customer information. The data is highly structured
    and needs to follow strict regulations. The company must also handle complex queries
    and data analysis and run advanced reporting and compliance.


    In this case, Cloud SQL would be more suitable than Cloud Datastore because the
    company’s needs are demanding and require full functionality of a traditional
    relational database. Cloud SQL is a fully managed relational database service
    that provides advanced features such as support for SQL, encryption at rest, and
    high-availability options. Additionally, Cloud SQL allows for complex queries
    and advanced reporting, which is necessary for the financial company to perform
    data analysis and comply with regulations.


    Another advantage of using Cloud SQL, in this case, is handling many complex queries
    and storing the data in a structured way that guarantees data integrity and consistency.
    It also has advanced security options and compliance features, which are necessary
    for the financial company to protect sensitive data and comply with regulations.


    In short, Cloud SQL is suitable for cases where the organization needs to store
    and manage structured data that follows a specific schema and has a moderate scale
    of read-and-write operations. It is a cost-effective and easy-to-use option for
    cases where the organization’s needs are relatively complex and the organization
    requires the full functionality of a traditional relational database provided
    by Cloud SQL.


    Now let’s see how we can use the Java code to work with Cloud Storage.


    ## Using Java to Interact with Cloud Storage


    The following is an example of a Java project that interacts with Cloud Storage
    using the Google Cloud Storage API:


    1.  Set up a project in the Google Cloud Console and enable the Google Cloud Storage
    API.


    2.  Create credentials for your project, such as an API key or a service account
    key.


    3.  Use a library such as the Google Cloud Storage Java Client to interact with
    the API.


    Listing [4-1](#603470_1_En_4_Chapter.xhtml#PC1) shows an example of how you can
    interact with Google Cloud Storage.


    ```

    // Import the Google Cloud Storage Java Client library

    import com.google.cloud.storage.Storage;

    import com.google.cloud.storage.StorageOptions;

    public class CloudStorageExample {

    public static void main(String[] args) {

    // Create a storage client

    Storage storage = StorageOptions.getDefaultInstance().getService();

    // List all of the buckets in the project

    for (Bucket bucket : storage.list().iterateAll()) {

    System.out.println(bucket.getName());

    }

    }

    }

    Listing 4-1

    Java Code for Interaction with Cloud Storage

    ```


    You can find more details at [`https://cloud.google.com/storage/docs/reference/libraries#client-libraries-install-java`](https://cloud.google.com/storage/docs/reference/libraries%2523client-libraries-install-java).


    You can also use other libraries such as Apache Hadoop, which provide support
    for interacting with other cloud storage services such as Amazon S3, Microsoft
    Azure, etc.


    The next step is to create a bucket and upload the file to the bucket using Java.
    Let’s discuss this in the next section.'
  trans: '

    #### 何时使用 Cloud Datastore 而非 Cloud SQL


    一个实际场景中，Cloud Datastore 可能比 Cloud SQL 更合适，即当公司需要存储和管理半结构化或非结构化数据（例如 JSON），且不需要
    Cloud SQL 提供的关系型结构时。


    例如，考虑一家开发和发布手机游戏的游戏公司。该公司需要存储玩家信息，如玩家姓名、等级、成就，以及玩家在游戏中的事件和操作。该公司还需要在任何给定时间处理大量玩家和事件。


    在这种情况下，Cloud Datastore 比 Cloud SQL 更合适，因为公司的数据是半结构化的，且不需要 Cloud SQL 提供的关系型结构。Cloud
    Datastore 是一种 NoSQL 文档数据库服务，专为处理非结构化数据而设计，易于扩展，非常适合此用例。此外，Cloud Datastore 允许公司以多种方式对数据进行索引和查询，使其易于扩展。它可以处理来自玩家的大量请求。


    在这种情况下，使用 Cloud Datastore 的另一个优势是能够实时处理大量玩家和事件，并以灵活且可扩展的方式存储它们。它可以处理大量玩家数据并对其执行查询，这对于游戏公司向玩家提供个性化推荐和促销活动是必要的。


    再举一个例子，考虑一家物联网公司，需要存储和管理来自许多设备的传感器数据。传感器数据是非结构化的，包含各种数据类型，如文本、图像和视频，并且可能具有不同的格式和结构。该公司还需要随时处理来自设备的大量读写操作。


    在这种情况下，Cloud Datastore 比 Cloud SQL 更合适，因为公司的需求要求很高，需要高水平的可扩展性。Cloud Datastore
    专为处理非结构化数据而设计，并且可以轻松扩展以处理大量数据。Cloud Datastore 是一种 NoSQL 文档数据库服务，不需要像 Cloud SQL
    那样复杂和占用资源，因此是一种经济高效的解决方案。


    在前一种情况下，使用 Cloud Datastore 的另一个优势是能够处理来自设备的大量请求，并以灵活且可扩展的方式存储数据。它可以处理大量数据并对其执行查询，这对于物联网公司执行数据分析和进行预测是必要的。


    简而言之，Cloud Datastore 适用于组织需要存储和管理半结构化或非结构化数据（例如 JSON），并且具有大规模读写操作的情况。对于需求不如大型企业那么苛刻，且组织不需要
    Cloud SQL 提供的关系型结构的情况，它是一种经济高效且易于使用的选择。


    现在，让我们在下一节讨论何时使用 Cloud SQL 而非 Cloud Datastore。


    #### 何时使用 Cloud SQL 而非 Cloud Datastore


    一个场景中，Cloud SQL 可能比 Cloud Datastore 更合适，即当公司需要存储和管理遵循特定模式的结构化数据，并且需要 Cloud SQL
    提供的传统关系型数据库的全部功能时。


    例如，考虑一家电子商务公司，需要存储和管理客户信息、库存和销售数据。这些数据是结构化的，并遵循特定的模式，例如客户信息包含姓名、地址和联系方式等字段。该公司还需要随时处理来自客户和员工的中等数量的读写操作。


    在这种情况下，Cloud SQL 比 Cloud Datastore 更合适，因为公司的需求相对复杂，需要传统关系型数据库的全部功能。Cloud SQL 是一种完全托管的关系型数据库服务，支持
    SQL（管理和查询关系型数据的行业标准语言）。它提供了事务、索引和存储过程等功能。在这种情况下，Cloud SQL 更具成本效益，因为它不需要像 Cloud
    Datastore 那样复杂和占用资源。


    在这种情况下，使用 Cloud SQL 的另一个优势是能够对数据执行复杂查询，并提供了一种强制数据完整性和一致性的方法。这对于电子商务公司向客户和员工提供准确信息并防止系统错误是必要的。


    再举一个例子，考虑一家金融公司，需要存储和管理金融交易和客户信息。这些数据是高度结构化的，并且需要遵守严格的法规。该公司还必须处理复杂的查询和数据分析，并运行高级报告和合规性检查。


    在这种情况下，Cloud SQL 比 Cloud Datastore 更合适，因为公司的需求要求很高，需要传统关系型数据库的全部功能。Cloud SQL 是一种完全托管的关系型数据库服务，提供高级功能，例如支持
    SQL、静态数据加密和高可用性选项。此外，Cloud SQL 允许进行复杂查询和高级报告，这对于金融公司执行数据分析和遵守法规是必要的。


    在这种情况下，使用 Cloud SQL 的另一个优势是能够处理大量复杂查询，并以保证数据完整性和一致性的结构化方式存储数据。它还具有高级安全选项和合规性功能，这对于金融公司保护敏感数据和遵守法规是必要的。


    简而言之，Cloud SQL 适用于组织需要存储和管理遵循特定模式的结构化数据，并且具有中等规模读写操作的情况。对于组织需求相对复杂，且需要 Cloud SQL
    提供的传统关系型数据库的全部功能的情况，它是一种经济高效且易于使用的选择。


    现在，让我们看看如何使用 Java 代码与 Cloud Storage 交互。


    ## 使用 Java 与 Cloud Storage 交互


    以下是一个使用 Google Cloud Storage API 与 Cloud Storage 交互的 Java 项目示例：


    1.  在 Google Cloud Console 中设置一个项目，并启用 Google Cloud Storage API。


    2.  为你的项目创建凭据，例如 API 密钥或服务账号密钥。


    3.  使用诸如 Google Cloud Storage Java Client 之类的库与 API 交互。


    清单 4-1 展示了如何与 Google Cloud Storage 交互的示例。


    ```

    // 导入 Google Cloud Storage Java Client 库

    import com.google.cloud.storage.Storage;

    import com.google.cloud.storage.StorageOptions;

    public class CloudStorageExample {

    public static void main(String[] args) {

    // 创建一个存储客户端

    Storage storage = StorageOptions.getDefaultInstance().getService();

    // 列出项目中的所有存储桶

    for (Bucket bucket : storage.list().iterateAll()) {

    System.out.println(bucket.getName());

    }

    }

    }

    清单 4-1

    用于与 Cloud Storage 交互的 Java 代码

    ```


    你可以在 [`https://cloud.google.com/storage/docs/reference/libraries#client-libraries-install-java`](https://cloud.google.com/storage/docs/reference/libraries%2523client-libraries-install-java)
    找到更多详细信息。


    你也可以使用其他库，例如 Apache Hadoop，它提供了与其他云存储服务（如 Amazon S3、Microsoft Azure 等）交互的支持。


    下一步是创建一个存储桶，并使用 Java 将文件上传到该存储桶。我们将在下一节讨论这个问题。

