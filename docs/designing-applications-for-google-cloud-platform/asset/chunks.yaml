  trans: '

    #### 自动缩放


    自动缩放功能会自动调整运行中的实例数量，以应对流量变化。


    你需要在应用的 `app.yaml` 文件中进行配置，以便在 GAE 上设置自动缩放。在此文件中，你可以设置 `automatic_scaling` 选项来配置应用的自动缩放设置。


    以下是你可以为自动缩放设置的选项：


    *   `min_idle_instances`：App Engine 应为你的应用维护的最小空闲实例数。

    *   `max_idle_instances`：App Engine 应为你的应用维护的最大空闲实例数。

    *   `min_pending_latency`：请求在启动新实例前应等待的最短时间。

    *   `max_pending_latency`：请求在启动新实例前应等待的最长时间。

    *   `target_cpu_utilization`：你的应用的目标 CPU 利用率。App Engine 将调整实例数量以维持此 CPU 利用率。


    你还可以设置其他选项，例如 `max_concurrent_requests` 和 `max_instances`*，*以便对应用的缩放进行更精细的控制。


    配置好这些选项后，App Engine 将根据应用的流量自动调整运行中的实例数量。


    需要注意的是，在自动缩放模式下，App Engine 会根据流量自动调整应用的运行实例数量。但更改生效可能需要一些时间。


    同样重要的是，要监控应用的行为，并根据需要调整自动缩放设置，以确保应用性能良好，并将成本控制在合理范围内。


    # 4. Google Cloud 中的数据存储


    在本章中，我们将探讨 Google Cloud Storage (GCS) 以及如何在 Java 应用程序中使用它来存储和管理文件。GCS 是 Google
    Cloud Platform (GCP) 提供的一种基于云的对象存储服务，允许用户在世界任何地方存储和访问其数据。它是一种高度可扩展且可靠的存储解决方案，提供数据加密、数据持久性和数据生命周期管理等功能。


    我们将从理解 GCS 的基础知识开始，包括其关键概念和特性。然后，我们将学习如何设置 GCS 存储桶、使用 GCS 进行身份验证以及安装 GCS Java
    客户端库。我们还将介绍如何使用 Java 代码在 GCS 存储桶中上传、下载和管理文件。在本章结束时，你应该对如何在 Java 应用程序中使用 GCS 进行文件存储有扎实的理解。


    Google Cloud 为各种用例提供了多种数据存储解决方案，包括关系型数据库、NoSQL 数据库和对象存储。这些存储解决方案旨在实现高可用性、可扩展性和可靠性，并内置了备份和恢复选项。


    组织需要数据存储解决方案来有效且高效地存储和管理其数据。这些解决方案使组织能够访问、管理和分析数据，使其成为任何现代企业的重要组成部分。


    随着组织生成的数据量不断增加，基于云的数据存储解决方案因其灵活性、可扩展性和成本效益而成为热门选择。Google Cloud 的数据存储解决方案旨在满足任何组织的需求，从小型初创公司到大型企业，通过提供广泛的选择，让用户可以根据其特定要求进行选择。


    假设你有一个网站，用户可以在其中创建帐户并登录以访问某些功能。该网站需要存储用户信息，例如他们的姓名、电子邮件、密码和其他详细信息。你可以将这些信息存储在云数据库（如
    Google Cloud Datastore）中，而不是存储在网站的服务器上。


    当用户创建帐户或登录时，他们的信息会存储在云数据库中，当他们注销或离开网站时，这些信息将保持安全，并在他们下次登录时仍然可以访问。


    类似地，假设你有一个需要用户输入数据的移动应用程序，例如一个健身应用，用户可以在其中跟踪他们的锻炼和进度。在这种情况下，你可以将此数据存储在云数据库（如 Google
    Cloud Firestore）中。这确保了数据可以在多个设备上访问，并保持安全。


    使用云数据存储可以让你轻松扩展应用程序，确保数据的持久性和可用性，并提供从任何地方安全访问数据的能力。


    接下来，让我们更详细地讨论 GCP 中的各种存储选项。


    ## 了解 GCP 中的各种存储选项


    Google Cloud Platform 提供了广泛的存储选项，以满足不同的数据存储和管理需求。以下是 GCP 提供的一些关键存储选项：


    *   **Cloud Storage** 是一种可扩展、经济高效的对象存储服务，支持非结构化数据存储。它可用于各种用例，例如备份和归档、数据仓库、媒体和娱乐以及
    Web 和移动应用程序。

    *   **Cloud SQL** 是一种完全托管的关系型数据库服务，支持流行的数据库引擎，如 MySQL、PostgreSQL 和 SQL Server。它适用于结构化数据存储，可用于各种用例，包括
    Web 和移动应用程序、数据仓库以及在线事务处理 (OLTP)。

    *   **Cloud Spanner** 是一种全球分布、强一致性且完全托管的关系型数据库服务，支持结构化数据存储。它适用于各种用例，例如 Web 和移动应用程序、数据仓库以及
    OLTP。

    *   **Cloud Bigtable** 是一种完全托管的 NoSQL 宽列数据库服务，支持结构化和半结构化数据存储。它可用于各种用例，例如 Web 和移动应用程序、数据仓库以及
    OLAP。

    *   **Cloud Datastore** 是一种完全托管的 NoSQL 文档数据库服务，支持结构化和半结构化数据存储。它可用于各种用例，例如 Web
    和移动应用程序、数据仓库以及 OLAP。

    *   **Cloud Memorystore** 是一种内存数据存储服务，支持快速数据访问。它适用于各种用例，例如 Web 和移动应用程序、数据仓库以及
    OLAP。


    这些存储选项中的每一个都有其独特的功能和特性。你应该根据所存储数据的类型、数据大小以及应用程序的性能和可扩展性要求，选择最适合你需求的选项。


    让我们从云存储开始，更详细地了解每个选项。

    '
- fmt: '### Cloud Storage


    Google Cloud Storage is a way to store and access large amounts of data in the
    cloud (over the Internet). It is managed by Google and is designed to be scalable,
    meaning it can grow as your storage needs grow. It is cost-effective because you
    pay only for the amount of storage you use. It can store various types of data,
    such as videos, images, and backups. It can be used for different purposes such
    as media and entertainment, data warehousing, and web and mobile applications.


    A bucket (shown in Figure [4-1](#603470_1_En_4_Chapter.xhtml#Fig1)) in Google
    Cloud Storage is like a virtual container where you can store your files, just
    like you might use a physical container to store things at home. It’s a secure
    and scalable way to store your data in the cloud. You can create, manage, and
    delete buckets as needed and control who has access to the files in your bucket.
    Think of it as a big digital box in which you can put your files, and then you
    can easily access those files from anywhere with an Internet connection.


    ![](images/603470_1_En_4_Chapter/603470_1_En_4_Fig1_HTML.jpg)


    A screenshot for the buckets page has options to create or refresh a bucket. It
    has a filter to filter the buckets, followed by a table with 3 columns for name,
    created time, and location type, and 2 rows for different buckets.


    Figure 4-1


    Cloud Storage bucket


    An object in Cloud Storage consists of a file and metadata containing information
    about the object, such as its name, size, content type, and creation time. Objects
    can be stored in one of three storage classes:


    *   *Standard*: This class is intended for frequently accessed data and is suitable
    for storing data that needs to be retrieved quickly.

    *   *Nearline*: This class is intended for data accessed less frequently and is
    suitable for storing data that can be retrieved within a few seconds or minutes.

    *   *Coldline*: This class is intended for data accessed even less frequently
    and is suitable for storing data that can be retrieved within several hours.


    Google Cloud Storage is an online service that allows you to store and access
    your data from anywhere in the world using the Internet. It provides an API and
    web-based interface that lets you perform various operations, such as uploading
    and downloading data, managing metadata, and controlling access to your data.


    Cloud Storage offers several features to help you manage and secure your data,
    such as access control, versioning, life-cycle management, data integrity, encryption,
    multiregional location, and backups.


    Access control lets you decide who has access to your data by granting permissions
    to individual users, groups of users, or service accounts. Versioning allows you
    to keep multiple versions of the same object and revert to an earlier version
    if needed. Life-cycle management rules can be set up to automatically transition
    objects to different storage classes or delete them after a certain period. Data
    integrity techniques, including checksums, ensure that your data is stored and
    retrieved without errors. You can also encrypt your data both in transit and at
    rest using either Google-managed keys or customer-managed keys. Cloud Storage
    also provides the multiregional location feature to store data in multiple regions
    and backups for data recovery.


    Cloud Storage can be used for various purposes such as backup and archiving, data
    warehousing, media and entertainment, collaborative development, and web and mobile
    applications. It is a cost-effective solution for storing large amounts of data
    and can be scaled up or down as needed.


    Let’s talk about Cloud SQL next.


    ### Cloud SQL


    Google Cloud SQL is a fully managed, relational database service provided by Google
    Cloud Platform. It allows developers and organizations to create and manage databases
    in the cloud without the need to provision and maintain their hardware. Cloud
    SQL supports popular database engines such as MySQL, PostgreSQL, and SQL Server.


    AlloyDB is a newly introduced fully managed, PostgreSQL-compatible database service
    for demanding transactional and analytical workloads. It provides enterprise-grade
    performance and availability while maintaining 100 percent compatibility with
    open-source PostgreSQL.


    You can create a Cloud SQL instance with just a few clicks and choose the size
    and configuration that best fits your needs. Once your instance is up and running,
    you can use standard SQL commands to create tables, insert data, and query the
    database. Figure [4-2](#603470_1_En_4_Chapter.xhtml#Fig2) shows the Cloud SQL
    instance.


    ![](images/603470_1_En_4_Chapter/603470_1_En_4_Fig2_HTML.jpg)


    A screenshot for the SQL instances page has options to create an instance or migrate
    data. It has a filter to enter property name or value, followed by a table with
    3 columns for name, created time, public IP address, and 1 row, for instance,
    ID student.


    Figure 4-2


    Cloud SQL instance


    Cloud SQL provides several key features and benefits.


    *   *Automatic backups*: Cloud SQL automatically creates backups of your databases,
    which can be used to restore your data in case of data loss or corruption. You
    can also create manual backups at any time.

    *   *Automatic patching*: Cloud SQL automatically applies security patches and
    other updates to your database engines without downtime.

    *   *High availability*: Cloud SQL provides high availability options such as
    failover replication and read replicas, which can help ensure that your databases
    are always available, even in the event of a failure.

    *   *Cloud-native*: Cloud SQL is designed to run in the cloud, which means that
    it can take advantage of the scalability and performance of GCP.

    *   *Data encryption*: Cloud SQL supports data encryption both in transit and
    at rest, using either Google-managed keys or customer-managed keys.

    *   *Integration with other GCP services*: Cloud SQL can be easily integrated
    with other GCP services, such as App Engine, Kubernetes Engine, and Cloud Dataflow.

    *   *Replication and failover*: Cloud SQL allows you to set up replication and
    failover for your databases across multiple zones or regions. This ensures that
    your data is always available and protected against disasters or outages in a
    particular zone or region.


    You can create and manage Cloud SQL instances using the Google Cloud Console or
    the Cloud SQL API. The Google Cloud Console is a web-based interface that allows
    you to create and manage instances, create and manage databases, and perform other
    tasks. The Cloud SQL API allows you to create, configure, and manage instances
    and databases programmatically.


    Cloud SQL instances come in two types.


    *   First generation (also known as MySQL or PostgreSQL)

    *   Second generation (also known as MySQL or PostgreSQL or SQL Server)


    Cloud SQL instances can be used for various purposes, such as the following:


    *   Storing and managing data for web and mobile applications

    *   Storing and managing data for data warehousing and analytics

    *   Storing and managing data for e-commerce and financial systems


    Cloud SQL is a fully managed, highly available, and scalable relational database
    service that makes it easy to create and manage databases in the cloud. It is
    well-suited for many use cases and can easily integrate with other GCP services.


    Let’s talk about Cloud Spanner in the next section.'
  raw: '### Cloud Storage


    Google Cloud Storage is a way to store and access large amounts of data in the
    cloud (over the Internet). It is managed by Google and is designed to be scalable,
    meaning it can grow as your storage needs grow. It is cost-effective because you
    pay only for the amount of storage you use. It can store various types of data,
    such as videos, images, and backups. It can be used for different purposes such
    as media and entertainment, data warehousing, and web and mobile applications.


    A bucket (shown in Figure [4-1](#603470_1_En_4_Chapter.xhtml#Fig1)) in Google
    Cloud Storage is like a virtual container where you can store your files, just
    like you might use a physical container to store things at home. It’s a secure
    and scalable way to store your data in the cloud. You can create, manage, and
    delete buckets as needed and control who has access to the files in your bucket.
    Think of it as a big digital box in which you can put your files, and then you
    can easily access those files from anywhere with an Internet connection.


    ![](images/603470_1_En_4_Chapter/603470_1_En_4_Fig1_HTML.jpg)


    A screenshot for the buckets page has options to create or refresh a bucket. It
    has a filter to filter the buckets, followed by a table with 3 columns for name,
    created time, and location type, and 2 rows for different buckets.


    Figure 4-1


    Cloud Storage bucket


    An object in Cloud Storage consists of a file and metadata containing information
    about the object, such as its name, size, content type, and creation time. Objects
    can be stored in one of three storage classes:


    *   *Standard*: This class is intended for frequently accessed data and is suitable
    for storing data that needs to be retrieved quickly.


    *   *Nearline*: This class is intended for data accessed less frequently and is
    suitable for storing data that can be retrieved within a few seconds or minutes.


    *   *Coldline*: This class is intended for data accessed even less frequently
    and is suitable for storing data that can be retrieved within several hours.


    Google Cloud Storage is an online service that allows you to store and access
    your data from anywhere in the world using the Internet. It provides an API and
    web-based interface that lets you perform various operations, such as uploading
    and downloading data, managing metadata, and controlling access to your data.


    Cloud Storage offers several features to help you manage and secure your data,
    such as access control, versioning, life-cycle management, data integrity, encryption,
    multiregional location, and backups.


    Access control lets you decide who has access to your data by granting permissions
    to individual users, groups of users, or service accounts. Versioning allows you
    to keep multiple versions of the same object and revert to an earlier version
    if needed. Life-cycle management rules can be set up to automatically transition
    objects to different storage classes or delete them after a certain period. Data
    integrity techniques, including checksums, ensure that your data is stored and
    retrieved without errors. You can also encrypt your data both in transit and at
    rest using either Google-managed keys or customer-managed keys. Cloud Storage
    also provides the multiregional location feature to store data in multiple regions
    and backups for data recovery.


    Cloud Storage can be used for various purposes such as backup and archiving, data
    warehousing, media and entertainment, collaborative development, and web and mobile
    applications. It is a cost-effective solution for storing large amounts of data
