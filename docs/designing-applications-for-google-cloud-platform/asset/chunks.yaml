    \ file will contain the web application deployment descriptor.\n\n    The sample\
    \ application is provided by GCP and is at [`https://github.com/GoogleCloudPlatform/java-docs-samples`](https://github.com/GoogleCloudPlatform/java-docs-samples).\n\
    \n6.  Create a file named `appengine-web.xml` in the `WEB-INF` directory of your\
    \ application. This file will contain the App Engine–specific configuration for\
    \ your application.\n\n7.  Create a new file named `build.gradle` in the root\
    \ directory of your application. This file will contain the build configuration\
    \ for your application.\n\n8.  Run the command `./gradlew appengineDeploy` to\
    \ deploy your application.\n\n9.  Once the deployment is complete, navigate to\
    \ the URL `https://[YOUR_PROJECT_ID].appspot.com` in your browser to access your\
    \ web application."
