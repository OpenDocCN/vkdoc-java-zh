    *   *IoT*: Cloud Spanner can handle high-velocity data streams from IoT devices
    and process and analyze that data in near real time. For example, a manufacturing
    company could use Cloud Spanner to store and retrieve sensor data from its production
    line, allowing it to monitor and optimize production in real time. Cloud Spanner
    provides stronger consistency guarantees and can handle larger workloads than
    other databases, such as time-series databases.


    *   *Media and entertainment*: Cloud Spanner can handle high-traffic workloads
    and can store and serve large amounts of multimedia data, making it suitable for
    media and entertainment applications. With its strong consistency guarantees,
    scalability, and globally distributed architecture, Cloud Spanner can provide
    reliable and fast access to multimedia data for a global audience.


    *   *Ad Tech*: Cloud Spanner can handle high-traffic and high-velocity data streams,
    making it suitable for ad tech applications that require real-time data processing
    and analysis.


    *   *Supply chain management*: Cloud Spanner can handle large amounts of data
    and provide real-time visibility into the supply chain, making it suitable for
    supply chain management applications. For example, a logistics company could use
    Cloud Spanner to track and manage inventory, shipments, and logistics in real
    time. Cloud Spanner provides stronger consistency guarantees and can handle larger
    workloads than other databases, such as traditional relational databases.


    *   *Healthcare*: Cloud Spanner can handle large amounts of patient data and provide
    real-time access, making it suitable for healthcare applications such as electronic
    health record (EHR) systems.


    *   *FinTech*: Cloud Spanner can handle large numbers of financial transactions
    and provide real-time access to that data, making it suitable for FinTech applications
    such as trading platforms and fraud detection systems.


    Let’s talk about Cloud Bigtable in the next section.'
  trans: '

    ### Cloud Spanner


    Cloud Spanner 是 Google Cloud Platform 提供的一种全托管、水平可扩展的关系型数据库服务。它跨多个区域提供 SQL 和事务一致性，是任务关键型全球分布式应用的理想选择。Cloud
    Spanner 支持自动同步复制和自动故障转移，确保高可用性和数据持久性。它还提供强一致性保证，允许即时准确地检索数据。此外，Cloud Spanner 支持使用二级索引、存储过程和触发器，并可通过
    JDBC 和 ODBC 驱动程序以及 REST API 进行访问。Cloud Spanner 可与 Bigtable 和 Cloud Dataflow 等其他
    Google Cloud 服务一起使用，以构建完整的数据处理管道。


    您可以通过导航到 Cloud Spanner 控制台来创建 Cloud Spanner 实例。点击“创建实例”并提供详细信息，例如实例名称、实例 ID 以及您希望创建实例的区域，然后选择配置选项，例如节点数、实例类型和存储大小。最后点击“创建”即可创建
    Cloud Spanner 实例。


    创建 Cloud Spanner 实例后，您就可以开始使用它来存储和检索数据，如图 4-3 所示。您可以创建表并定义其架构，向表中插入数据，并使用 SQL
    查询数据。


    ![](img/603470_1_En_4_Fig3_HTML.jpg)


    Spanner 实例页面的屏幕截图显示了一个创建实例选项。它有一个用于输入属性名称或值的筛选器，以及一个包含 4 列（名称、ID、配置和处理单元）和 1 行（主题）的表格。


    图 4-3


    Cloud Spanner 实例


    以下是 Google Cloud Spanner 的一些主要特性：


    *   *水平可扩展*：Cloud Spanner 可以自动水平扩展以处理不断增加的工作负载，无需手动分片或数据分区。

    *   *全球分布*：Cloud Spanner 可以跨多个区域复制数据，为全球用户提供低延迟的数据访问。

    *   *强一致性*：Cloud Spanner 提供强一致性保证，确保所有查询都返回最新的数据。

    *   *自动故障转移*：Cloud Spanner 在发生故障时会自动检测并故障转移到副本，确保高可用性。

    *   *SQL 支持*：Cloud Spanner 支持基于 SQL 的查询语言，使熟悉 SQL 的开发人员能够轻松使用该服务。

    *   *二级索引*：Cloud Spanner 支持使用二级索引，这可以提高查询性能并实现更高效的数据检索。

    *   *存储过程和触发器*：Cloud Spanner 支持存储过程和触发器，允许进行复杂的数据处理和操作。

    *   *通过 JDBC/ODBC 访问*：Cloud Spanner 可通过 JDBC 和 ODBC 驱动程序访问，便于与各种编程语言和框架集成。


    现在我们将讨论 Cloud Spanner 的用例。


    #### Cloud Spanner 的用例


    Google Cloud Spanner 可用于多种用例；以下是一些示例：


    *   *在线事务处理 (OLTP)*：Cloud Spanner 非常适合需要强一致性保证和低延迟的 OLTP 工作负载，例如电子商务、金融和医疗保健应用。例如，电子商务公司可以使用
    Cloud Spanner 处理数百万客户订单和金融交易，确保数据始终是最新且准确的。与 MySQL 或 PostgreSQL 等其他数据库相比，Cloud
    Spanner 提供更强的一致性保证，并能处理更大的工作负载。

    *   *游戏*：Cloud Spanner 可以处理大量并发玩家和实时数据更新，使其适用于需要高可用性和低延迟的游戏应用。例如，移动游戏开发者可以使用 Cloud
    Spanner 存储和检索玩家数据及游戏状态，确保游戏始终可用且响应迅速。与 NoSQL 数据库等其他数据库相比，Cloud Spanner 提供更强的一致性保证，并能处理更大的工作负载。

    *   *物联网 (IoT)*：Cloud Spanner 可以处理来自 IoT 设备的高速数据流，并近乎实时地处理和分析这些数据。例如，制造公司可以使用
    Cloud Spanner 存储和检索其生产线的传感器数据，从而实时监控和优化生产。与时序数据库等其他数据库相比，Cloud Spanner 提供更强的一致性保证，并能处理更大的工作负载。

    *   *媒体与娱乐*：Cloud Spanner 可以处理高流量工作负载，并存储和提供大量多媒体数据，使其适用于媒体和娱乐应用。凭借其强一致性保证、可扩展性和全球分布式架构，Cloud
    Spanner 可以为全球受众提供对多媒体数据的可靠快速访问。

    *   *广告技术*：Cloud Spanner 可以处理高流量和高速数据流，使其适用于需要实时数据处理和分析的广告技术应用。

    *   *供应链管理*：Cloud Spanner 可以处理大量数据并提供供应链的实时可见性，使其适用于供应链管理应用。例如，物流公司可以使用 Cloud
    Spanner 实时跟踪和管理库存、货运和物流。与传统关系型数据库等其他数据库相比，Cloud Spanner 提供更强的一致性保证，并能处理更大的工作负载。

    *   *医疗保健*：Cloud Spanner 可以处理大量患者数据并提供实时访问，使其适用于电子健康记录 (EHR) 系统等医疗保健应用。

    *   *金融科技*：Cloud Spanner 可以处理大量金融交易并提供对这些数据的实时访问，使其适用于交易平台和欺诈检测系统等金融科技应用。


    下一节我们将讨论 Cloud Bigtable。

    '
- fmt: '### Cloud Bigtable


    Google Cloud Bigtable is a fully managed, high-performance NoSQL database service
    offered by Google Cloud Platform. It is designed to handle large amounts of data
    and high-traffic workloads and is based on the same technology that powers Google’s
    services, such as Google Search and Google Analytics. It’s designed to deliver
    fast performance with low latency and is based on the same technology that powers
    Google’s services such as Google Search and Analytics. It’s a NoSQL database,
    which means that it can store and manage a wide variety of unstructured and semistructured
    data, such as time-series data, machine-generated logs, and social media data.
    Cloud Bigtable is a fully managed service, which means that Google takes care
    of the infrastructure, security, and maintenance of the service, so you can focus
    on using it to store and analyze your data.


    You can create a Bigtable instance by clicking the `Create Instance` button on
    the dashboard. You need to provide name of the instance and number of nodes you
    want to use in your instance; then click `Create`. Figure [4-4](#603470_1_En_4_Chapter.xhtml#Fig4)
    shows the Bigtable instance.


    ![](images/603470_1_En_4_Chapter/603470_1_En_4_Fig4_HTML.jpg)


    A screenshot for the Bigtable instances page has a create instance option. It
    has a filter for the instances, followed by a table with 4 columns, for instance
    I D, instance name, application profiles, zones, and nodes, and 1 row for I D
    student performance.


    **Figure 4-4** Bigtable instance


    The following are some key features of Cloud Bigtable:


    - **Horizontally scalable**: Cloud Bigtable can automatically scale horizontally
    to handle increasing workloads without requiring manual sharding or data partitioning.

    - **Low latency**: Cloud Bigtable provides low-latency data access, making it
    suitable for high-traffic workloads such as real-time analytics and serving large
    amounts of data.

    - **High performance**: Cloud Bigtable is optimized for high-performance data
    access, making it suitable for large-scale data processing and analytics.

    - **Column-family data model**: Cloud Bigtable uses a column-family data model
    optimized for high-performance data access and well-suited for storing and retrieving
    large amounts of data.

    - **Automatic data compaction**: Cloud Bigtable automatically compacts data, reducing
    the amount of storage space required and improving performance.

    - **Automatic failover**: Cloud Bigtable automatically detects and fails over
    to a replica in the event of a failure, ensuring high availability.

    - **Cloud-native**: Cloud Bigtable is a cloud-native service, which means that
    it is designed to run on the cloud and can take advantage of the scalability and
    elasticity of the cloud.

    - **Access via HBase API**: Cloud Bigtable can be accessed via the HBase API,
    which makes it easy to integrate with various programming languages and frameworks.


    We’ll talk about the use cases of Cloud Bigtable in the next section.


    #### The Use Cases for Cloud Bigtable


    Google Cloud Bigtable can be used in various use cases, and it is best suited
    for high-performance, large-scale data processing, and storage. The following
    are some examples:


    - **Real-time analytics**: Cloud Bigtable is well-suited for real-time analytics
    and data processing, such as tracking and analyzing website traffic, social media
    data, and sensor data. For example, a company could use Cloud Bigtable to track
    and analyze customer interactions in real time, allowing them to make data-driven
    decisions and improve customer experience.

    - **Internet of Things (IoT)**: Cloud Bigtable is well-suited for handling large
    amounts of data from IoT devices, such as sensor data, and can process and analyze
    that data in near real time. For example, a manufacturing company could use Cloud
    Bigtable to store and retrieve sensor data from its production line, allowing
    it to monitor and optimize production in real time.

    - **Gaming**: Cloud Bigtable can handle large numbers of concurrent players and
    real-time data updates, making it suitable for gaming applications that require
    high-performance and low-latency data access. For example, a mobile game developer
    could use Cloud Bigtable to store and retrieve player data and game state, ensuring
    that the game is always available and responsive.

    - **Ad tech**: Cloud Bigtable is well-suited for handling a large amount of data
    and providing real-time visibility into the ad tech, such as storing and analyzing
    ad impressions, bid requests, and other ad-related data. For example, an ad network
    could use Cloud Bigtable to track and analyze ad performance, allowing them to
    make data-driven decisions and improve ad targeting.

    - **Genomic data**: Cloud Bigtable is well-suited for handling large-scale genomic
    data and providing real-time visibility into the data. For example, a biotech
    company could use Cloud Bigtable to store and analyze genomic data, allowing them
    to make data-driven decisions and improve their research.


    Cloud Bigtable is best suited for high-performance, large-scale data processing
    and storage. It is well-suited for use cases requiring real-time data access and
    processing, low-latency data access, and high availability.


    In the next section, we will discuss Cloud Datastore.'
