- fmt: '### Cloud SQL vs. Cloud Spanner


    Deciding whether to use `Cloud SQL` or `Cloud Spanner` for your application can
    depend on several factors, including your data model, performance requirements,
    and use case. Here are a few key points to consider when deciding:


    - **Data model**: `Cloud SQL` is a relational database management system (RDBMS)
    that uses tables, rows, and columns to organize data. It is best suited for applications
    that require a traditional relational data model. `Cloud Spanner`, on the other
    hand, is a globally distributed, relational database service that uses a combination
    of a relational and a nonrelational data model. It is best suited for applications
    that require a highly scalable, globally distributed data model.


    - **Performance**: `Cloud SQL` is a good choice for applications that require
    high performance but do not need to scale globally. `Cloud Spanner`, on the other
    hand, is a good choice for applications that require high performance and global
    scalability.


    - **Use case**: `Cloud SQL` is typically used for small-to-medium applications
    with moderate read-write traffic and can handle structured and semistructured
    data. `Cloud Spanner` is typically used for large-scale applications with high
    read-write traffic and can handle structured and semistructured data.


    - **Consistency and availability**: `Cloud SQL` provides eventual consistency
    and is best for use cases that can handle some inconsistency. `Cloud Spanner`,
    on the other hand, provides strong consistency and is best for use cases that
    require strong consistency. `Cloud Spanner`’s strong consistency and automatic
    failover features make it well-suited for applications that require high availability
    and disaster recovery.


    - **Cost**: `Cloud Spanner` is significantly more expensive than `Cloud SQL`.
    This is because of the additional features and functionalities that `Cloud Spanner`
    provides, such as global scalability, strong consistency, and automatic failover.


    The best choice for your application may depend on various factors. It’s recommended
    to evaluate both options thoroughly, based on your specific use case, and make
    the decision that best aligns with your business requirements. To fully leverage
    the capabilities of `Cloud Spanner`, the application should be designed to be
    stateless and deployed in multiple regions. `Cloud Spanner` is designed to provide
    strong consistency and high availability, which means it can handle real-time
    data operations across multiple regions. This requires the application to be designed
    with the capability to handle requests from any region and to be able to recover
    from failures in one region by failing over to another region. Organizations can
    achieve highly available, globally consistent, and scalable systems by designing
    applications to leverage `Cloud Spanner`’s capabilities.


    Now let’s talk about the situations when using `Cloud Spanner` over `Cloud SQL`.


    #### When to Use Cloud Spanner Instead of Cloud SQL


    A real-world example of a use case where `Cloud Spanner` may be more suitable
    over `Cloud SQL` is for a large, global e-commerce platform.


    An e-commerce platform must handle many transactions and user queries simultaneously,
    as well as a high volume of data. It needs to be globally available and able to
    handle data inconsistencies. Additionally, it needs to ensure that customers’
    financial information is secure and available at all times and that customers’
    orders are processed correctly.


    In this scenario, `Cloud Spanner` could be a good fit because it provides globally
    distributed data storage, which allows the platform to store data across multiple
    regions and automatically replicates data for high availability and disaster recovery.
    It also provides strong consistency, ensuring that all database nodes see the
    same data simultaneously. It is useful when the application requires a consistent
    data view across all nodes. This is important for an e-commerce platform, as it
    needs to maintain a single version of the truth for customers’ financial information
    and orders.


    `Cloud SQL`, on the other hand, may not be the best fit for this use case because
    it does not provide the same level of global scalability and strong consistency
    as `Cloud Spanner`. Additionally, `Cloud Spanner` does not have the same security
    features and automatic failover capabilities.


    In this example, the e-commerce platform would benefit from the global scalability
    and strong consistency of `Cloud Spanner`, which would allow it to handle a high
    volume of data, ensure data availability and consistency, and provide a secure
    and reliable platform for customers.


    In the next section, we will talk about the situation when `Cloud SQL` is better
    to use over `Cloud Spanner`.


    #### When to Use Cloud SQL Instead of Cloud Spanner


    A real-world example of when `Cloud SQL`/`AlloyDB` may be more suitable over `Cloud
    Spanner` is when a small nonprofit organization needs to store and manage its
    donor information. The organization may have a small number of donors, and the
    data that needs to be stored includes basic information such as donor name, contact
    information, donation history, and donation preferences. The organization may
    have a moderate amount of traffic to its website, with a small number of donors
    updating their information or making donations at any time.


    In this case, `Cloud SQL` would be more suitable than `Cloud Spanner` because
    the organization’s needs are relatively simple and do not require the high scalability
    and global consistency features provided by `Cloud Spanner`. `Cloud SQL` provides
    a familiar and easy-to-use relational database management system that can handle
    the organization’s moderate amount of traffic, and the organization’s budget may
    not be able to support the costs associated with `Cloud Spanner`. Additionally,
    the organization may not have much database experience, so using `Cloud SQL` would
    be less intimidating and easier to manage.


    Another example of a small e-commerce website that serves customers in only a
    specific region may not require the global scalability and high availability provided
    by `Cloud Spanner`. Instead, `Cloud SQL` could be a more cost-effective and simpler
    option for storing and managing its data.


    `Cloud SQL` is also a good choice if the application’s data is structured and
    doesn’t require complex transactions or strict consistency guarantees. `Cloud
    SQL` is a fully managed relational database service that supports popular database
    engines like `MySQL` and `PostgreSQL`, making it a straightforward option for
    developers who are familiar with these technologies.


    In short, `Cloud SQL` is a cost-effective and easy-to-use option for small organizations
    that need to store and manage relatively simple structured data and have a lower
    scale of read and write operations. It is suitable for cases where budget and
    database management expertise are limited and where the organization’s needs are
    not as demanding as those of large-scale businesses.


    If your application requires complex SQL queries or has a large number of joins
    between tables, `Cloud SQL` may be a better fit. Additionally, suppose your application
    requires support for certain database features that are not currently available
    in `Cloud Spanner`, such as stored procedures or user-defined functions. In that
    case, `Cloud SQL` may be the better choice.


    Let’s compare `Cloud Spanner` with `Cloud Datastore` in the next section.'
