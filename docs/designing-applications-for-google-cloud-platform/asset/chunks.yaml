    first project”的数据。


    图 1-3


    选择项目


    你可以点击右上角的“新建项目”按钮来创建新项目。将出现一个如图 1-4 所示的窗口。


    ![](img/603470_1_En_1_Fig4_HTML.jpg)


    Google Cloud 创建新项目页面的截图。它有一个显示配额中剩余项目数量的警告文本，以及一个用于输入项目名称和位置的选项卡。页面左下角有一个“创建”按钮。


    图 1-4


    创建新的 GCP 项目


    在这里你可以看到一条消息，提示你只剩下 24 个项目。默认情况下，GCP 允许你创建 25 个项目；如果你需要创建更多项目，可以请求增加配额。项目名称的长度必须在
    4 到 30 个字符之间。


    注意


    GCP 中的*配额*是一个灵活的限制，但*限制*是你可以使用资源数量的硬性上限。


    你可以根据需要为项目命名，以反映其用途。项目 ID 是你的项目的全局唯一标识符。项目创建后，你无法更改项目 ID。项目可以与你在位置中选择的组织相关联。如果你的项目名称是全局唯一的，则项目
    ID 将与项目名称相同；否则，可以通过在项目名称前添加数字来自动创建项目 ID。你可以通过点击项目 ID 前面的部分来设置自定义的项目名称和项目 ID，如图
    1-5 所示。


    ![](img/603470_1_En_1_Fig5_HTML.jpg)


    Google Cloud 创建新项目页面的截图。它有一个显示配额中剩余项目数量的警告文本，以及用于输入项目名称、项目 ID 和位置的选项卡。页面左下角有一个“创建”按钮。


    图 1-5


    GCP 项目的项目 ID


    点击“创建”后，你将在活动列表中看到它。每当你在 GCP 中创建任何资源时，你都可以在活动列表中看到它，如图 1-6 所示。


    ![](img/603470_1_En_1_Fig6_HTML.jpg)


    Google Cloud 通知页面的截图。它有 2 行关于项目创建的最近通知。第 1 行是“e-learning”的最近通知，第 2 行是 9 天前的“my
    first project”通知。页面左下角有一个“查看所有活动”的链接。


    图 1-6


    GCP 项目活动


    例如，如果你将 GCP 用于 EdTech 应用程序，你可以为所有开发环境创建一个项目，并为所有生产环境创建另一个项目。你可以为分析和营销设立一个单独的项目。通过这样做，你可以轻松查看
    EdTech 应用程序的非生产、生产和分析环境的费用。


    新项目创建完成后，你可以通过点击 GCP 控制台左上角的项目按钮来选择你正在处理的项目，如图 1-7 所示。如果你在窗口的“最近”选项卡中没有看到你的项目，可以点击“全部”选项卡查看所有项目。要查看项目，你需要拥有相应的权限。


