  trans: '

    ### Cloud SQL 的用例


    Cloud SQL 有多种使用场景。


    *   *传统关系型数据库*：Cloud SQL 是在完全托管的环境中运行传统关系型数据库（如 MySQL 和 PostgreSQL）的理想选择。这使您可以轻松扩展和管理数据库，而无需担心底层基础设施。


    *   *电子商务与零售*：Cloud SQL 可用于存储和管理电子商务及零售网站的客户数据、库存和销售信息。


    *   *内容管理系统*：Cloud SQL 可用于存储和管理网站及其他数字媒体（如图片、视频和文章）的内容。


    *   *商业智能与分析*：Cloud SQL 可用于存储和管理商业智能与分析应用（如数据仓库和报表）的数据。


    *   *移动与网络应用*：Cloud SQL 可用于存储和管理移动及网络应用（如用户资料、偏好设置和交易记录）的数据。


    *   *物联网与传感器数据*：Cloud SQL 可用于存储和管理来自物联网设备及传感器（如温度、湿度和其他环境数据）的数据。


    *   *微服务*：Cloud SQL 可用于存储和管理基于微服务的应用数据，允许每个微服务拥有自己的数据库。


    *   *多云与混合云*：Cloud SQL 可作为多云或混合云策略的一部分，使组织能够在云端存储和管理数据，同时为特定用例维护本地数据库。


    这些只是 Cloud SQL 众多可能用例中的几个例子。凭借其可扩展性、高可用性和自动备份功能，Cloud SQL 可用于各种应用和工作负载。


    以下是使用 Cloud SQL 的一个真实用例。


    假设一家公司想要构建一个电子商务网站，该网站需要一个数据库来存储客户订单、产品详情和客户信息。他们决定使用 Google Cloud SQL 来管理数据库，因为它提供了完全托管的
    SQL 数据库服务，能够处理高流量并确保数据库的高可用性。


    他们使用 Google Cloud Console 创建一个 Cloud SQL 实例，并将其配置为使用 MySQL。然后，他们创建一个数据库模式，其中包含用于存储客户订单、产品详情和客户信息的表。该
    Cloud SQL 实例提供一个公共 IP 地址，可用于从互联网连接到数据库。


    接下来，他们使用 Java 或 Python 等编程语言创建一个 Web 应用。该 Web 应用使用 JDBC 驱动程序连接到 Cloud SQL 实例，并运行
    SQL 查询来插入、更新和检索数据库中的数据。他们还使用 Cloud SQL 的内置备份功能，以确保数据安全，并在发生任何故障时能够恢复。


    随着电子商务网站的发展以及更多用户开始使用，他们决定为 Cloud SQL 实例添加只读副本。只读副本使他们能够扩展读取性能并提高网站的响应速度。他们还可以使用这些副本来运行分析工作负载和生成报告。


    此外，他们使用 Cloud SQL 的私有 IP 功能，从其 VPC 网络内部安全且私密地连接到数据库。这确保了数据在 Web 应用和数据库之间传输时受到保护和加密。


    在这个案例中，通过使用 Cloud SQL，该公司能够为其电子商务网站构建一个可扩展且高可用的数据库，同时最大限度地减少了管理数据库基础设施所需的工作量。


    现在，我们来讨论一下 Cloud SQL 是最佳选择的情况。


    ### Cloud SQL 是最佳选择的情况


    在以下几种情况下，使用 Cloud SQL 是最佳选择：


    *   *当您的工作负载可变时*：当您的工作负载可变时，Cloud SQL 是一个不错的选择，因为您只需为使用的资源付费，并且可以根据需要轻松扩展或缩减。


    *   *当您需要完全托管的关系型数据库时*：Cloud SQL 是一项完全托管的服务，因此您无需担心管理和维护底层基础设施（如服务器和存储）。这使您可以专注于开发和部署应用。


    *   *当您需要高可用性时*：Cloud SQL 会自动跨多个可用区复制数据，以确保即使在某个可用区发生故障时，您的数据也始终可用。


    *   *当您需要自动备份时*：Cloud SQL 会自动每天备份您的数据，因此您无需担心手动备份数据库。


    *   *当您需要与其他 GCP 服务集成时*：Cloud SQL 可以轻松与其他 GCP 服务（如 Cloud App Engine、Cloud Dataflow
    和 BigQuery）集成，从而方便地构建和部署使用 Cloud SQL 中存储数据的应用。


    *   *当您需要经济高效的解决方案时*：Cloud SQL 可能比运行自管理数据库更具成本效益，尤其是在您的工作负载可变的情况下。您只需为使用的资源付费，并且可以根据需要轻松扩展或缩减。


    *   *当您需要灵活的解决方案时*：Cloud SQL 支持不同类型的 SQL 数据库，使您能够选择最符合需求的数据库。


    *   *当您需要满足特定合规性要求时*：Cloud SQL 可用于存储和管理受特定合规性要求（如 HIPAA 和 PCI DSS）约束的数据。


    对于希望获得关系型数据库的优势，但又不想承担管理和扩展基础设施的运营开销和成本的组织来说，Cloud SQL 是一个绝佳的选择。当您需要一个完全托管、可扩展、高可用且能与其他
    GCP 服务集成，并可用于各种应用和工作负载的关系型数据库解决方案时，它是最佳选择。

    '
- fmt: "# Using Java to Interact with Cloud SQL\n\nJava is a popular programming language\
    \ that can be used to interact with Cloud SQL. To use Java to interact with Cloud\
    \ SQL, you will need to use a JDBC driver that supports the database you are using\
    \ (e.g., MySQL or PostgreSQL) and the version of the database you are using.\n\
    \nHere is an example of how to connect to a Cloud SQL instance running MySQL using\
    \ Java:\n\n1. Add the MySQL JDBC driver to your classpath. You can download the\
    \ driver from the MySQL website.\n\n2. Use the JDBC driver to create a connection\
    \ to the Cloud SQL instance. This can be done using the following code:\n\n  \
    \  ```\n    String url = \"jdbc:mysql://\" + hostname + \":\" + port + \"/\" +\
    \ dbName;\n    Connection connection = DriverManager.getConnection(url, username,\
    \ password);\n    ```\n\n3. Once the connection is established, you can use standard\
    \ JDBC calls to interact with the database. For example, to execute a SQL query,\
    \ you can use the following code:\n\n    ```\n    Statement statement = connection.createStatement();\n\
    \    ResultSet resultSet = statement.executeQuery(\"SELECT * FROM myTable\");\n\
    \    ```\n\n4. After you have finished interacting with the database, you should\
    \ close the connection by calling the following code:\n\n    ```\n    connection.close();\n\
    \    ```\n\nThere are also several libraries and frameworks that can be used to\
    \ interact with Cloud SQL in Java. For example, Spring Framework provides an abstraction\
    \ layer that makes it easy to interact with databases, including Cloud SQL. As\
    \ another example, Hibernate is an object-relational mapping (ORM) framework that\
    \ can be used to interact with databases in a more object-oriented way, it can\
    \ be integrated with Spring to make it more efficient.\n\nYou can use the JDBC\
    \ driver for the database you are using, along with standard JDBC calls, to interact\
    \ with Cloud SQL in Java. Additionally, you can use libraries and frameworks,\
    \ such as Spring and Hibernate, to make interacting with the database even easier.\n\
    \n## Creating Tables in Cloud SQL Using Java\n\nTo create tables in Cloud SQL,\
    \ you can use standard SQL commands. The syntax for creating tables will depend\
    \ on the database management system (DBMS) you are using (e.g., MySQL or PostgreSQL).\
    \ Here is an example of how to create a table in a Cloud SQL instance running\
    \ MySQL:\n\n```\nCREATE TABLE myTable (\nid INT PRIMARY KEY,\nname VARCHAR(255)\
    \ NOT NULL,\nage INT NOT NULL\n);\n```\n\nThis example creates a table called\
    \ `myTable` with three columns: `id`, `name`, and `age`. The `id` column is set\
    \ as the primary key and cannot contain null values. The `name` and `age` columns\
    \ cannot contain null values either.\n\nYou can also add additional constraints\
    \ to the table. For example, you can add a unique constraint to a column like\
    \ this:\n\n```\nCREATE TABLE myTable (\nid INT PRIMARY KEY,\nname VARCHAR(255)\
    \ NOT NULL UNIQUE,\nage INT NOT NULL\n);\n```\n\nYou can also create tables with\
    \ foreign key constraints, indexes, and more. The syntax for these additional\
    \ features will depend on the DBMS you are using.\n\nYou can also create tables\
    \ using a programming language like Java. The process will be similar to the process\
    \ of interacting with Cloud SQL using Java, as I described earlier: you’ll need\
    \ to open a connection to your Cloud SQL instance, create a statement, and execute\
    \ the query.\n\n```\nString createTableSQL = \"CREATE TABLE myTable (\"\n+ \"\
    id INT PRIMARY KEY, \"\n+ \"name VARCHAR(255) NOT NULL, \"\n+ \"age INT NOT NULL)\"\
    ;\nStatement createTable = connection.createStatement();\n// execute the query,\
    \ and get a boolean indicating whether it returned a result set\ncreateTable.execute(createTableSQL);\n\
    ```\n\nIt’s important to note that creating tables can also be done using the\
    \ Cloud SQL web console, the Cloud SQL command-line tool, and the `gcloud` command-line\
    \ tool.\n\nIn short, to create tables in Cloud SQL, you can use standard SQL commands\
    \ or a programming language like Java. Depending on your use case and the database\
    \ management system you are using, you may find it more convenient to use one\
    \ method over the other.\n\n## Inserting Data into Cloud SQL Tables Using Java\n\
    \nTo insert data into a table in Cloud SQL, you can use the standard SQL `INSERT`\
    \ command. The following is an example of how to insert data into a table called\
    \ `myTable` in a Cloud SQL instance running MySQL:\n\n```\nINSERT INTO myTable\
    \ (id, name, age) VALUES (1, 'John', 25);\n```\n\nThis example inserts a new row\
    \ into the `myTable` table with the values 1 for the `id` column, `John` for the\
    \ `name` column, and 25 for the `age` column.\n\nYou can also insert multiple\
    \ rows at once using the following syntax:\n\n```\nINSERT INTO myTable (id, name,\
    \ age) VALUES (1, 'John', 25), (2, 'Mike', 30), (3, 'Sara', 35);\n```\n\nYou can\
    \ also insert data into a table using a programming language like Java. Listing\
    \ [5-1](#603470_1_En_5_Chapter.xhtml#PC9) shows an example of how to insert data\
    \ into a table called `myTable` using Java.\n\n```\nPreparedStatement insertData\
    \ = connection.prepareStatement(\"INSERT INTO myTable (id, name, age) VALUES (?,\
    \ ?, ?)\");\ninsertData.setInt(1, 1);\ninsertData.setString(2, \"John\");\ninsertData.setInt(3,\
    \ 25);\ninsertData.execute();\nListing 5-1\nInserting Data into a Table Using\
    \ Java\n```\n\nThis example uses a prepared statement to insert data into the\
    \ `myTable` table. The `setInt()` and `setString()` methods are used to set the\
    \ values for the `id`, `name`, and `age` columns. The `execute()` method is used\
    \ to execute the prepared statement and insert the data into the table.\n\nYou\
    \ can also insert data into a table using the Cloud SQL web console, the Cloud\
    \ SQL command-line tool, and the `gcloud` command-line tool.\n\nIn short, to insert\
    \ data into a table in Cloud SQL, you can use the standard SQL `INSERT` command\
    \ or a programming language like Java. Depending on your use case, you may find\
    \ it more convenient to use one method over the other.\n\n## Running Queries on\
    \ a Cloud SQL Instance Using Java\n\nTo run queries on a Cloud SQL instance, you\
