    \ Cloud Console 中创建一个新项目，或使用现有项目。\n\n2.  安装 Google Cloud SDK 并使用你的项目对其进行初始化（如果已完成此操作，则无需执行此步骤）。\n\
    \n3.  为你的 Web 应用创建一个新目录，并在命令行中导航到该目录。\n\n    点击“创建应用”将跳转到“创建应用”仪表盘，如图 3-6 所示。\n\
