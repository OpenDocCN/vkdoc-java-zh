- fmt: '### Limitations of Cloud Functions


    The following are the limitations of Cloud Functions:


    - **Execution time**: Cloud Functions has a maximum execution time of 9 minutes.
    If your function needs to run for longer than that, you will need to use a different
    service.

    - **Memory and CPU**: Cloud Functions has a maximum memory and CPU allocation
    per instance, which is generally enough for simple functions. However, if your
    function requires more resources, you may need to use a different service.

    - **Cold starts**: Cloud Functions may experience "cold starts" when they haven''t
    been used in a while, which can cause a delay in the initial execution of the
    function. This can be mitigated by keeping the function warm by triggering it
    regularly or by using a different service that can handle longer idle periods.

    - **Traffic shaping**: Cloud Functions does not provide any built-in mechanisms
    for traffic shaping, such as rate limiting or autoscaling. This means that if
    you expect a lot of traffic, you may need to use a different service that provides
    these features.


    Cloud Functions is a serverless computing service, and it is designed to handle
    small, short-lived tasks. It is not meant to be used as a replacement for other
    compute services such as Compute Engine or Kubernetes Engine.


    ### Java Example of Cloud Functions


    Listing [6-14](#603470_1_En_6_Chapter.xhtml#PC14) shows a Cloud Functions function
    written in Java that is triggered by a REST call and retrieves random 10 questions
    (5 easy and 5 hard) from a Quiz database (Firestore database).


    ```java

    import com.google.cloud.firestore.Firestore;

    import com.google.cloud.firestore.QueryDocumentSnapshot;

    import com.google.cloud.firestore.QuerySnapshot;

    import com.google.firebase.cloud.FirestoreClient;

    import java.util.ArrayList;

    import java.util.List;

    import java.util.Random;

    import com.google.gson.Gson;

    import com.google.gson.JsonObject;

    import java.io.IOException;

    import javax.servlet.http.HttpServletResponse;

    import com.google.cloud.functions.HttpFunction;

    import com.google.cloud.functions.HttpRequest;

    import com.google.cloud.functions.HttpResponse;

    public class GetQuizFunction implements HttpFunction {

    private Firestore db;

    private Random random;

    private Gson gson;

    public GetQuizFunction() {

    db = FirestoreClient.getFirestore();

    random = new Random();

    gson = new Gson();

    }

    @Override

    public void service(HttpRequest request, HttpResponse response) throws IOException
    {

    List easyQuestions = new ArrayList();

    List hardQuestions = new ArrayList();

    // Get all questions from the Firestore database

    QuerySnapshot questionsSnapshot = db.collection("quiz").get().get();

    for (QueryDocumentSnapshot question : questionsSnapshot) {

    JsonObject jsonQuestion = gson.fromJson(question.toJson(), JsonObject.class);

    String difficulty = jsonQuestion.get("difficulty").getAsString();

    if (difficulty.equals("easy")) {

    easyQuestions.add(jsonQuestion);

    } else if (difficulty.equals("hard")) {

    hardQuestions.add(jsonQuestion);

    }

    }

    // Select 5 random easy questions

    List selectedEasyQuestions = new ArrayList();

    for (int i = 0; i < 5; i++) {

    int index = random.nextInt(easyQuestions.size());

    selectedEasyQuestions.add(easyQuestions.get(index));

    easyQuestions.remove(index);

    }

    // Select 5 random hard questions

    List selectedHardQuestions = new ArrayList();

    for (int i = 0; i < 5; i++) {

    int index = random.nextInt(hardQuestions.size());

    selectedHardQuestions.add(hardQuestions.get(index));

    hardQuestions.remove(index);

    }

    // Combine the selected easy and hard questions

    List selectedQuestions = new ArrayList();

    selectedQuestions.addAll(selectedEasyQuestions);

    selectedQuestions.addAll(selectedHardQuestions);

    // Convert the selected questions to JSON and set the content type to JSON

    String json = gson.toJson(selectedQuestions);

    response.setContentType("application/json");

    response.setStatusCode(HttpServletResponse.SC_OK);

    response.getWriter().write(json);

    }

    }

    ```


    *Listing 6-14* A Cloud Function Written in Java Triggered by a REST Call to Retrieve
    Questions from a Quiz Database


    This example uses the Firestore client library to connect to a Firestore database
    and retrieve all questions from a collection called `quiz`. It then uses a `Random`
    object to select five random easy questions and five random hard questions from
    the retrieved questions. The selected questions are then combined into a single
    list and converted to a JSON string using the Gson library. The JSON string is
    then returned as the response to the REST call, and the content type is set to
    `application/json`.


    Note the following about this program:


    - Listing [6-14](#603470_1_En_6_Chapter.xhtml#PC14) uses the Firebase Admin SDK;
    you will have to configure the credentials of your function to access the Firestore
    database.

    - Listing [6-14](#603470_1_En_6_Chapter.xhtml#PC14) does not include error handling.
    It''s recommended to include error handling for production.

    - I have assumed the field name `difficulty` in the Firestore document to be `easy`
    or `hard`.

    - You can use the `.whereEqualTo()` method to filter the documents by the `difficulty`
    field.


    ## Summary


    In this chapter, you learned about powerful services offered by Google Cloud Platform:
    Cloud Pub/Sub, Cloud Dataflow, Cloud Dataproc and Cloud Functions. Cloud Pub/Sub
    can be used to decouple microservices and send/receive messages between independent
    systems. Cloud Dataflow can be used to create a data pipeline that can process
    large amounts if data by creating a batch or stream data processing. Cloud Dataproc
    is a managed Hadoop and Spark service that allows you to easily process large
    amounts of data using open-source tools. The chapter covered how to create a cluster,
    submit a job, and configure various aspects of the cluster and job. Cloud Functions
    is a serverless compute service that allows you to run code in response to specific
    events. The chapter covered some of the key features, use cases, and limitations
    of Cloud Functions and provided an example of how to write a Java function that
    retrieves random quiz questions from a Firestore database.


    # 7. Deployment and Scaling


    This chapter focuses on designing and building scalable and resilient architectures
    on Google Cloud Platform (GCP). The chapter begins by introducing the principles
    of scalable and resilient design, including fault tolerance, elasticity, and scalability.
    You will learn about the key components of scalable and resilient architectures
    on GCP, including load balancing, autoscaling, and distributed databases. The
    chapter also covers best practices for building scalable and resilient architectures
    on GCP, including using managed services, designing for failure, and monitoring
    and alerting. Overall, this chapter provides a comprehensive guide to building
    scalable and resilient architectures on GCP, with practical examples and real-world
    use cases.


    *Deployment and scaling* in GCP refers to the process of making your application
    or service available to users and ensuring that it can handle the expected load.


    There are several ways to deploy and scale your application or service in GCP.


    In this chapter, we will explore the deployment and scaling GCP services and applications.'
