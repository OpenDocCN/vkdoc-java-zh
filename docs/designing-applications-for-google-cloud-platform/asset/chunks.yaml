    for sensitive data.


    4.  In the DLP job configuration, specify the type of data you want to scan for
    (e.g., credit card numbers, Social Security numbers, etc.), and specify the actions
    you want DLP to take if sensitive data is detected (e.g., redact, mask, etc.).


    5.  Once the DLP job is configured, you can run it and view the results in the
    Cloud DLP logs.


    6.  You can also set up periodic scans or even real-time scanning of your Cloud
    SQL databases.


    By integrating Cloud SQL with Cloud DLP, you can protect sensitive data in your
    Cloud SQL databases, based on your organization’s security policies. This integration
    can help you improve the security of your Cloud SQL instances and ensure that
    sensitive data is protected against data loss or leakage.


    The previous steps may change or be different based on the Cloud SQL version you
    are using. It’s always recommended to check the official documentation for the
    updated instructions.'
  trans: '

    ### Cloud SQL 与 Cloud Storage 的集成


    Google Cloud SQL 可与 Google Cloud Storage 集成，用于存储备份和二进制日志，以便在发生故障或数据丢失时恢复您的 Cloud
    SQL 实例。这种集成使您能够确保数据安全且可恢复，即使在灾难情况下也是如此。


    以下是一个如何将 Cloud SQL 与 Cloud Storage 集成的示例：


    1.  创建一个 Cloud SQL 实例和一个 Cloud Storage 存储桶。


    2.  在 Cloud SQL 实例中，转到“备份”标签页并设置备份配置。您可以选择按天、周或月进行备份，并指定保留期限。


    3.  在“备份”标签页上，选择要存储备份的 Cloud Storage 存储桶。您还可以选择对备份进行加密以增强安全性。


    4.  配置好备份后，您可以转到 Cloud SQL 实例中的“复制”标签页，并设置复制到另一个区域或另一个 Cloud SQL 实例。


    5.  您还可以在 Cloud SQL 实例中启用二进制日志记录，这将允许您创建时间点恢复快照。


    6.  设置复制到另一个区域或另一个 Cloud SQL 实例。


    7.  启用二进制日志记录后，您可以创建一个 Cloud Storage 存储桶来存储二进制日志。


    8.  转到 Cloud SQL 实例中的“二进制日志”标签页，选择要存储二进制日志的 Cloud Storage 存储桶，并设置保留期限。


    9.  将二进制日志存储在 Cloud Storage 后，您可以使用它们将 Cloud SQL 实例恢复到特定时间点。


    通过将 Cloud SQL 与 Cloud Storage 集成，您可以确保数据安全且可恢复，即使在灾难情况下也是如此。这种集成有助于提高 Cloud SQL
    实例的可用性和弹性，并保护您的数据免遭丢失或损坏。


    上述步骤可能会根据您使用的 Cloud SQL 版本而有所变化或不同。建议始终查阅官方文档以获取最新说明。


    ### Cloud SQL 与 Cloud Load Balancing 的集成


    Google Cloud SQL 可与 Google Cloud Load Balancing 集成，以将传入流量分发到您的 Cloud SQL 实例，这有助于提高性能和可用性。这种集成使您能够创建高可用且可扩展的
    Cloud SQL 基础设施，以处理大量并发连接。


    以下是一个如何将 Cloud SQL 与 Cloud Load Balancing 集成的示例：


    1.  创建一个 Cloud SQL 实例和一个 Cloud Load Balancing 实例。


    2.  在 Cloud SQL 实例中，转到“连接”标签页，并设置最大连接数。这将帮助您控制任何给定时间可以连接到 Cloud SQL 实例的连接数。


    3.  在 Cloud Load Balancing 实例中，创建一个新的后端服务，并将其指向 Cloud SQL 实例。


    4.  创建一个新的负载均衡器，并将后端服务附加到其上。


    5.  创建负载均衡器后，您可以配置健康检查和自动故障转移，以确保 Cloud SQL 实例始终可用。


    6.  根据您的特定需求，配置负载均衡器以将传入流量分发到 Cloud SQL 实例。


    7.  配置好负载均衡器后，您可以使用它将传入流量分发到 Cloud SQL 实例，并确保 Cloud SQL 实例始终可用，即使在发生故障时也是如此。


    通过将 Cloud SQL 与 Cloud Load Balancing 集成，您可以创建高可用且可扩展的 Cloud SQL 基础设施，以处理大量并发连接。这种集成有助于提高
    Cloud SQL 实例的性能和可用性，并确保您的用户始终可以访问您的数据。


    上述步骤可能会根据您使用的 Cloud SQL 版本而有所变化或不同。建议始终查阅官方文档以获取最新说明。


    ### Cloud SQL 与 IAM 的集成


    Google Cloud SQL 可与 Google Cloud IAM 集成，以控制对您的 Cloud SQL 实例和资源的访问。这种集成允许您根据组织的安全策略，授予或拒绝对特定用户、组或服务的访问权限。


    以下是一个如何将 Cloud SQL 与 IAM 集成的示例：


    1.  在 Google Cloud Console 中创建一个 Cloud SQL 实例和一个项目。


    2.  在 Cloud SQL 实例中，转到“访问控制”标签页并创建一个新的 IAM 策略。


    3.  在 IAM 策略中，指定应授予或拒绝特定用户、组或服务的角色和权限。例如，您可以将 Cloud SQL Editor 角色授予特定用户组，或拒绝对特定服务账号访问
    Cloud SQL 实例。


    4.  创建 IAM 策略后，您可以将其与 Cloud SQL 实例关联。


    5.  在 Cloud SQL 实例中，转到“访问控制”标签页，并将 IAM 策略添加到 Cloud SQL 实例。


    6.  将 IAM 策略与 Cloud SQL 实例关联后，将为指定的用户、组或服务强制执行指定的角色和权限。


    通过将 Cloud SQL 与 IAM 集成，您可以根据组织的安全策略控制对 Cloud SQL 实例和资源的访问。这种集成有助于提高 Cloud SQL
    实例的安全性，并确保只有授权的用户、组或服务才能访问您的数据。


    上述步骤可能会根据您使用的 Cloud SQL 版本而有所变化或不同。建议始终查阅官方文档以获取最新说明。


    ### Cloud SQL 与 Cloud Data Loss Prevention 的集成


    Google Cloud SQL 可与 Google Cloud DLP 集成，以保护 Cloud SQL 数据库中的敏感数据。这种集成允许您根据组织的安全策略，自动发现、分类和编辑
    Cloud SQL 数据库中的敏感数据。由于监管要求，这也是必要的。


    以下是一个如何将 Cloud SQL 与 Cloud DLP 集成的示例：


    1.  在 Google Cloud Console 中创建一个 Cloud SQL 实例和一个项目。


    2.  在 Cloud SQL 实例中，转到“安全”标签页，然后点击“数据丢失防护”。


    3.  点击“创建新的 DLP 作业”，并将其配置为扫描 Cloud SQL 实例以查找敏感数据。


    4.  在 DLP 作业配置中，指定要扫描的数据类型（例如，信用卡号、社会安全号码等），并指定如果检测到敏感数据，您希望 DLP 执行的操作（例如，编辑、掩码等）。


    5.  配置好 DLP 作业后，您可以运行它并在 Cloud DLP 日志中查看结果。


    6.  您还可以设置对 Cloud SQL 数据库的定期扫描甚至实时扫描。


    通过将 Cloud SQL 与 Cloud DLP 集成，您可以根据组织的安全策略保护 Cloud SQL 数据库中的敏感数据。这种集成有助于提高 Cloud
    SQL 实例的安全性，并确保敏感数据免遭丢失或泄露。


    上述步骤可能会根据您使用的 Cloud SQL 版本而有所变化或不同。建议始终查阅官方文档以获取最新说明。

