  trans: '

    ### 设置凭据


    API 密钥、OAuth 客户端 ID、服务账号和用户账号都是用于对 Google Cloud Platform 上各项服务的访问进行身份验证和授权的凭据类型。这些都是证明你有权限访问
    Google Cloud Platform 上特定资源的不同方式。


    *API 密钥*是一个简单的字符串，用于向 GCP 服务标识你的应用。它通常用于访问不需要用户身份验证的公共数据或服务。


    *OAuth 客户端 ID* 用于代表用户对访问受保护资源的用户进行身份验证和授权。它用于在你的应用和 GCP 服务之间启用单点登录（SSO）。


    *服务账号*是一种特殊账号，用于以编程方式访问 GCP 服务和资源。服务账号通常用于服务器到服务器的交互和自动化。


    *用户账号*是标识单个用户的账号，用于授予其对 GCP 资源的访问权限。用户账号可以通过 Google Cloud Console 创建和管理。


    在 Google Cloud Platform 上设置凭据，可以让你的应用与各种 GCP 服务进行身份验证和授权。以下是在 GCP 上设置凭据的一般步骤：


    ![](img/603470_1_En_2_Fig9_HTML.jpg)


    服务账号创建页面的截图，包含 3 个步骤。步骤 1 是服务账号详细信息，包含账号名称、ID 和描述的文本框。步骤 2 是服务账号对项目的访问权限，步骤 3
    是授予用户对服务账号的访问权限。


    图 2-9


    创建服务账号


    ![](img/603470_1_En_2_Fig8_HTML.jpg)


    凭据页面的截图，包含创建、删除和恢复已删除凭据的选项。它有一个弹出窗口，包含 4 行，分别对应 API 密钥、OAuth 客户端 ID、服务账号和“帮我选择”的详细信息，其中第二行用箭头指示。


    图 2-8


    OAuth 客户端 ID


    ![](img/603470_1_En_2_Fig7_HTML.jpg)


    凭据页面的截图，包含创建、删除和恢复已删除凭据的选项。它有一个弹出窗口，包含 4 行，分别对应 API 密钥、OAuth 客户端 ID、服务账号和“帮我选择”的详细信息，其中第一行用箭头指示。


    图 2-7


    API 密钥


    ![](img/603470_1_En_2_Fig6_HTML.jpg)


    凭据页面的截图，包含创建、删除和恢复已删除凭据的选项。它有一个表格，用于显示 API 密钥和 OAuth 2.0 客户端 ID，包含“名称”和“创建日期”两列，且没有数据行。页面底部有两行用于服务账号。


    图 2-6


    凭据控制面板


    ![](img/603470_1_En_2_Fig5_HTML.jpg)


    产品详情页面的截图。页面左侧有一个徽标，其右侧是标题“IAM 服务账号凭据 API”。页面底部有一个“管理”按钮，以及一个用于“API 已启用”的复选框。


    图 2-5


    服务账号凭据 API


    1.  转到 Google Cloud Console ([`https://console.cloud.google.com/`](https://console.cloud.google.com/))
    并导航到你要设置凭据的项目。


    2.  搜索“凭据”并打开 IAM 服务账号凭据 API，如图 2-5 所示。


    然后点击“管理”。在“API 和服务”中，你可以点击“凭据”打开凭据控制面板，如图 2-6 所示。


    3.  在“凭据”页面上，你可以创建不同类型的凭据，例如 API 密钥、OAuth 客户端 ID 或服务账号密钥。


    4.  要创建 API 密钥，请点击“创建凭据”按钮并选择“API 密钥”，如图 2-7 所示。密钥将显示出来，你可以根据需要限制其使用。


    5.  要创建 OAuth 客户端 ID，请点击“创建凭据”按钮并选择“OAuth 客户端 ID”，如图 2-8 所示。在创建客户端 ID 之前，你必须配置同意屏幕并选择应用类型。


    6.  要创建服务账号密钥，请点击“创建凭据”按钮并选择“服务账号密钥”。你需要选择一个现有的服务账号或创建一个新的服务账号，然后选择密钥类型以及授予该账号的任何角色。


    创建服务账号后，它将带你进入 GCP Console 上的“IAM 与管理”页面，如图 2-9 所示。


    7.  凭据创建完成后，你可以通过引用必要的客户端库并使用你设置的凭据，在你的应用中使用它们。


    注意


    根据凭据类型和你尝试使用的服务，你可能需要先向该账号或密钥授予权限，然后才能使用它。


    ## 设置 IDE 并配置 GCP 插件


    GCP 插件是可以添加到 IntelliJ IDEA、Eclipse 和 Visual Studio Code 等 IDE 中的软件工具，使开发者能够更轻松地直接从其开发环境与
    GCP 服务进行交互。


    它们提供项目设置、身份验证、调试、部署和管理 GCP 资源等功能，这有助于开发者专注于编码和开发应用，而不是设置和配置 GCP 服务。


    GCP 插件使开发者无需离开开发环境即可轻松使用 GCP 服务，从而提高了他们的生产力并简化了开发流程。


    有几种 IDE 非常适合为 Google Cloud Platform 开发 Java 项目。以下是一些流行的选择：


    *   *IntelliJ IDEA*：这款流行的 Java IDE 为 GCP 开发提供了强大的支持，包括集成 Google Cloud SDK 以及将应用部署到
    App Engine 和其他 GCP 服务。


    *   *Eclipse*：Eclipse 是另一款流行的 Java IDE，它有一个用于 Google Cloud 开发的插件，允许开发者快速在 GCP
    上部署和管理应用。


    *   *Visual Studio Code*：Visual Studio Code 是一款轻量级且流行的代码编辑器，可用于 Java 开发。它还有一个
    Google Cloud SDK 扩展，允许开发者快速在 GCP 上部署和管理应用。


    最终，最适合你特定需求的 IDE 将取决于你的个人偏好和项目的具体要求。


    ### 配置 GCP 插件


    要为你的 IDE 配置 Google Cloud Platform 插件，你需要遵循以下一般步骤：


    1.  如果尚未安装，请为你的特定 IDE 安装 GCP 插件。这通常可以通过 IDE 的插件市场或仓库完成。


    2.  打开 GCP 插件并登录你的 GCP 账号。


    3.  使用你的项目凭据（例如项目 ID 和服务账号密钥）配置插件，并最好创建一个单独的服务账号在 IDE 中进行配置。


    4.  设置你想要的 GCP 资源，例如 Cloud SQL 实例或 Kubernetes 集群。


    5.  如果尚未设置，你可能还需要指定本地机器上 Google Cloud SDK 的路径。


    注意


    具体步骤可能因你的 IDE 和 GCP 插件的版本而异。你可以使用依赖管理器添加依赖项，而不是将 GCP 插件添加到 IDE 中。

    '
- fmt: '# Summary


    In this chapter, you learned the essential steps to set up a Java development
    environment for GCP. You learned to install the Java Development Kit and an IDE
    of your choice, followed by installing the Google Cloud SDK for Java. Then I explained
    how to create a GCP project and set up credentials using the Google Cloud Console
    or the command-line interface. I also covered how to configure the GCP plugin
    for different IDEs such as IntelliJ IDEA, Eclipse, and Visual Studio Code. Finally,
    I provided the instructions on how to set up credentials and configure the GCP
    plugin for each of these IDEs.


    Here are some resources for further reference:


    - *Google Cloud Java Client Libraries*: [`https://cloud.google.com/java/docs/reference`](https://cloud.google.com/java/docs/reference)

    - *Google Cloud Tools for Eclipse*: [`https://cloud.google.com/eclipse/docs`](https://cloud.google.com/eclipse/docs)

    - *Cloud Code for IntelliJ*: [`https://cloud.google.com/code/docs/intellij/install`](https://cloud.google.com/code/docs/intellij/install)

    - *Cloud Code for VS Code*: [`https://cloud.google.com/code/docs/vscode/install`](https://cloud.google.com/code/docs/vscode/install)


    # 3. Google App Engine


    In this chapter, you will learn about Google App Engine (GAE), a fully managed
    platform for developing and deploying web applications and services. GAE allows
    developers to focus on writing code without worrying about the underlying infrastructure
    and about scaling the application as traffic increases. The chapter covers the
    key features of GAE, including the programming languages and frameworks supported,
    storage options, and deployment methods. You will also learn about scaling and
    optimizing GAE applications to handle changes in traffic and improve performance.
    Finally, the chapter covers security considerations and best practices for deploying
    and managing GAE applications. By the end of this chapter, you will have a comprehensive
    understanding of Google App Engine and how to use it to develop and deploy web
    applications.


    Google App Engine is a platform-as-a-service (PaaS) offering from Google that
    allows developers to build and host web applications in a scalable and secure
    environment. With GAE, developers can build web applications using standard languages
    and frameworks such as Java, Python, Go, and PHP.


    The key feature of GAE is its automatic scaling capabilities, which allows the
    platform to adjust the number of instances running based on the traffic to the
    application. This eliminates developers’ need to provision and manually manage
    the underlying infrastructure.


    Google App Engine also provides several built-in services and APIs, such as Cloud
    Datastore (NoSQL), Memcache, and task queues, that can be easily integrated into
    the application. Additionally, it offers built-in security features such as automatic
    SSL termination and support for OAuth and OpenID Connect.


    GAE also has a free usage tier for small applications and charges for applications
    that exceed the free usage tier. It is a fully managed platform that simplifies
    the process of building and deploying web applications while providing high scalability,
    security, and performance.


    ## Why Use Google App Engine?


    Google App Engine is an excellent choice for web application development in several
    scenarios.


    - *Scalable and high-performance web applications*: GAE’s automatic scaling feature
    ensures that your application can handle many users and requests. Its built-in
    services and APIs can help you build a high-performance application.

    - *Rapid development and deployment*: GAE provides a simple process, allowing
    developers to focus on writing code without worrying about provisioning and managing
    infrastructure.

    - *Integration with other Google Cloud services*: GAE integrates seamlessly with
    other Google Cloud services, such as Cloud Storage, Cloud SQL, and BigQuery, allowing
    developers to build complex, multitier applications.

    - *Multilanguage support*: GAE supports multiple languages like Java, Python,
    Go, PHP, and more, which makes it easy for developers to build web applications
    using their preferred language.

    - *Cost-effective*: GAE has a free usage tier for small applications and charges
    for applications that exceed the free usage tier.


    An example use case of GAE would be a web application for a small business that
    allows customers to place orders online. The application would need to handle
    a large number of requests during peak hours and would need to be highly available
    and scalable. With GAE, the business could easily build and deploy the application.
    GAE’s automatic scaling feature would ensure that the application can handle many
    users without additional effort.


    ### Use Case of Google App Engine


    A good use case for Google App Engine would be a web application that requires
    high scalability and automatic management. App Engine’s PaaS model allows developers
    to focus on writing code for their applications rather than worrying about the
    underlying infrastructure. It also allows for easy scaling of resources to accommodate
    traffic spikes and provides built-in services such as a data store and task queues.
    Additionally, App Engine integrates well with other Google Cloud Platform services,
    making it a suitable choice for building a complete, end-to-end solution.


    ## Understanding the Google App Engine Runtime and Service Options


    Google App Engine is a platform for developing and hosting web applications in
    Google-managed data centers. One of the critical features of GAE is the ability
    to choose a runtime for the application.


    ### GAE Runtime


    Runtime is the environment in which the application code runs, and it includes
    a specific version of a programming language and any necessary libraries or frameworks.


    Figure [3-1](#603470_1_En_3_Chapter.xhtml#Fig1) shows some of the runtimes currently
    supported by GAE.


    ![](images/603470_1_En_3_Chapter/603470_1_En_3_Fig1_HTML.jpg)


    A screenshot of a window has a table with 2 columns for second-generation and
    first-generation. It has a single row for supported languages. Column 1 has 6
    languages, and column 2 has 4 languages with different versions.


    **Figure 3-1** GAE-supported runtime


    Each runtime has its own set of supported libraries and frameworks, and the choice
    of the runtime can affect the performance and scalability of the application.


    In addition to the runtime, GAE also provides a set of services that can be used
    by the application, such as a data store for storing data, a task queue for managing
    background tasks, and a service for sending an email. These services can be accessed
    using a simple API, abstracting away the underlying infrastructure and allowing
    developers to focus on writing application code.


    GAE also provides built-in support for scaling, load balancing, and automatic
    failover so that the application can handle many users and traffic without requiring
    manual configuration or maintenance.


    Google App Engine runtime provides a flexible and easy-to-use platform for developing
    and deploying web applications, with a wide range of language and framework support
    and built-in services for scaling and infrastructure management.'
