  trans: '

    ### Cloud Bigtable


    Google Cloud Bigtable 是 Google Cloud Platform 提供的一种全托管、高性能的 NoSQL 数据库服务。它专为处理海量数据和高流量工作负载而设计，其底层技术正是支撑
    Google 搜索和 Google Analytics 等 Google 服务的技术。它旨在提供低延迟的快速性能，并且基于与 Google 搜索和 Analytics
    等 Google 服务相同的技术。作为一种 NoSQL 数据库，它可以存储和管理各种非结构化和半结构化数据，例如时间序列数据、机器生成的日志和社交媒体数据。Cloud
    Bigtable 是一项全托管服务，这意味着 Google 负责该服务的基础设施、安全性和维护，因此您可以专注于使用它来存储和分析数据。


    您可以通过点击仪表板上的“创建实例”按钮来创建一个 Bigtable 实例。您需要提供实例的名称以及要在实例中使用的节点数量，然后点击“创建”。图 4-4
    展示了 Bigtable 实例。


    ![](img/603470_1_En_4_Fig4_HTML.jpg)


    Bigtable 实例页面的截图显示了一个创建实例的选项。它有一个用于筛选实例的过滤器，后面是一个包含 4 列（实例 ID、实例名称、应用配置文件、区域和节点）和
    1 行（ID 为 student performance）的表格。


    图 4-4

    Bigtable 实例


    以下是 Cloud Bigtable 的一些关键特性：


    *   *水平可扩展*：Cloud Bigtable 可以自动水平扩展以处理不断增加的工作负载，无需手动分片或数据分区。

    *   *低延迟*：Cloud Bigtable 提供低延迟的数据访问，使其适用于高流量工作负载，例如实时分析和服务大量数据。

    *   *高性能*：Cloud Bigtable 针对高性能数据访问进行了优化，使其适用于大规模数据处理和分析。

    *   *列族数据模型*：Cloud Bigtable 使用针对高性能数据访问优化的列族数据模型，非常适合存储和检索大量数据。

    *   *自动数据压缩*：Cloud Bigtable 会自动压缩数据，从而减少所需的存储空间并提高性能。

    *   *自动故障转移*：Cloud Bigtable 会在发生故障时自动检测并故障转移到副本，从而确保高可用性。

    *   *云原生*：Cloud Bigtable 是一项云原生服务，这意味着它专为在云上运行而设计，并且可以利用云的弹性和可扩展性。

    *   *通过 HBase API 访问*：可以通过 HBase API 访问 Cloud Bigtable，这使得它易于与各种编程语言和框架集成。


    我们将在下一节讨论 Cloud Bigtable 的用例。


    #### Cloud Bigtable 的用例


    Google Cloud Bigtable 可用于各种用例，并且最适合高性能、大规模的数据处理和存储。以下是一些示例：


    *   *实时分析*：Cloud Bigtable 非常适合实时分析和数据处理，例如跟踪和分析网站流量、社交媒体数据和传感器数据。例如，一家公司可以使用 Cloud
    Bigtable 实时跟踪和分析客户互动，从而做出数据驱动的决策并改善客户体验。

    *   *物联网 (IoT)*：Cloud Bigtable 非常适合处理来自物联网设备（例如传感器数据）的大量数据，并且可以近乎实时地处理和分析这些数据。例如，一家制造公司可以使用
    Cloud Bigtable 存储和检索其生产线上的传感器数据，从而实时监控和优化生产。

    *   *游戏*：Cloud Bigtable 可以处理大量并发玩家和实时数据更新，使其适用于需要高性能和低延迟数据访问的游戏应用。例如，移动游戏开发者可以使用
    Cloud Bigtable 存储和检索玩家数据及游戏状态，确保游戏始终可用且响应迅速。

    *   *广告技术*：Cloud Bigtable 非常适合处理大量数据并为广告技术提供实时可见性，例如存储和分析广告展示、竞价请求和其他广告相关数据。例如，广告网络可以使用
    Cloud Bigtable 跟踪和分析广告效果，从而做出数据驱动的决策并改进广告定向。

    *   *基因组数据*：Cloud Bigtable 非常适合处理大规模基因组数据并提供数据的实时可见性。例如，一家生物技术公司可以使用 Cloud Bigtable
    存储和分析基因组数据，从而做出数据驱动的决策并改进其研究。


    Cloud Bigtable 最适合高性能、大规模的数据处理和存储。它非常适合需要实时数据访问和处理、低延迟数据访问以及高可用性的用例。


    在下一节中，我们将讨论 Cloud Datastore。

    '
- fmt: '### Cloud Datastore


    `Google Cloud Datastore` is a fully managed, NoSQL document database service that
    is part of `Google Cloud Platform`. It’s designed to help developers store and
    manage structured data for their web and mobile applications. As a NoSQL database,
    it provides a flexible and scalable solution for storing data in a nonrelational
    format. This means that `Datastore` can handle different data types and structures,
    such as nested data and arrays, which is useful for storing data that doesn’t
    fit neatly into a traditional relational database.


    `Datastore` is fully managed, meaning that Google takes care of the service’s
    underlying infrastructure, security, and maintenance. This allows developers to
    focus on building their applications and using `Datastore` to store and retrieve
    their data. `Datastore` is also scalable, allowing developers to start with a
    small amount of data and then scale up as their application grows.


    `Datastore` is used in many different types of applications, such as e-commerce,
    social media, and gaming. It is particularly well-suited for applications that
    need to store and query large amounts of structured data, such as user profiles
    or product catalogs. Additionally, `Datastore` provides features such as indexing
    and querying, which allows developers to search and filter their data quickly
    and easily.


    To create a `Google Cloud Datastore` instance, open the `Datastore` dashboard,
    and create an instance by providing the instance name and storage type, as shown
    in Figure [4-5](#603470_1_En_4_Chapter.xhtml#Fig5).


    After you create your `Datastore` instance, you can access it using the `Google
    Cloud Datastore API` or the `Cloud Console`. You can use the API to perform operations
    such as reading and writing data, managing indexes, and controlling access to
    your data. The `Cloud Console` provides a web-based interface that allows you
    to interact with your data through a graphical user interface.


    ![](images/603470_1_En_4_Chapter/603470_1_En_4_Fig5_HTML.jpg)


    A screenshot of the datastore page has an option to create an entity, followed
    by a tab for query by kind selected. It has a button for the run, a text box to
    enter the kind, a drop-down menu for adding to the query, and a column for the
    name or I D under query results.


    **Figure 4-5** Cloud Datastore


    The following are some key features of `Cloud Datastore`:


    - **Schemaless data model**: `Cloud Datastore` uses a schemaless data model, which
    means it does not enforce a fixed schema on the data, allowing for more flexibility
    in the data structure.

    - **Automatic sharding**: `Cloud Datastore` automatically shards the data to handle
    increasing workloads without requiring manual data partitioning. `Datastore` uses
    the key’s value to generate a hash that determines which server the entity is
    stored on. The hash function used by `Datastore` is designed to distribute entities
    evenly across servers to ensure balanced load distribution and optimal performance.

    - **High availability**: `Cloud Datastore` automatically replicates the data to
    multiple data centers to ensure high availability, even in the event of a failure.
    It provides a 99.99 percent service-level agreement (SLA) for regional instances
    and 99.999 percent for multiregional instances.

    - **Cloud-native**: `Cloud Datastore` is a cloud-native service, which means that
    it is designed to run on the cloud and can take advantage of the scalability and
    elasticity of the cloud.

    - **Access via Google Cloud SDK**: `Cloud Datastore` can be accessed via the `Google
    Cloud SDK`, which makes it easy to integrate with various programming languages
    and frameworks.

    - **Consistency**: `Cloud Datastore` supports both strong and eventual consistency.

    - **Data types**: `Cloud Datastore` supports many data types, including strings,
    integers, floating-point numbers, dates, and binary data.


    `Cloud Datastore` can be used in various use cases, such as web and mobile applications,
    gaming, IoT, e-commerce, and more. It is best suited for use cases requiring flexible
    and scalable data storage and not requiring complex SQL queries or advanced indexing.


    Next, we will discuss the use cases of `Cloud Datastore`.


    ### The Use Cases for Cloud Datastore


    `Cloud Datastore` is a NoSQL document database provided by `Google Cloud Platform`
    for storing and querying data in the cloud. It is designed to handle large amounts
    of structured and semistructured data. It is a good fit for use cases that involve
    storing and querying large amounts of data with high availability and low latency.


    One example use case for `Cloud Datastore` is a social media application that
    needs to store and retrieve user profiles, posts, and comments. The data for each
    user profile, post, and comment can be stored as a separate document in `Cloud
    Datastore`. The application can use the query capabilities of `Cloud Datastore`
    to retrieve the data for a particular user or group of users.


    Another example use case for `Cloud Datastore` is an e-commerce application that
    needs to store and retrieve product information and customer orders. The data
    for each product and customer order can be stored as separate documents in `Cloud
    Datastore`. The application can use the query capabilities of `Cloud Datastore`
    to retrieve the data for a particular product or group of products.


    `Cloud Datastore` is a good choice for these use cases because it provides a flexible
    and scalable solution for storing and querying data in the cloud. It can handle
    large amounts of data and automatically scale up or down as needed to meet the
    performance and availability requirements of the application. Additionally, `Cloud
    Datastore` provides strong consistency guarantees, automatic indexing, and built-in
    support for transactions, which makes it well-suited for use cases that involve
    storing and querying large amounts of data with high availability and low latency.


    `Datastore` can be used in various use cases, including the following:


    - Storing and retrieving user data for web and mobile applications.

    - Storing and querying data for analysis and reporting.

    - Storing and retrieving data for machine learning and artificial intelligence
    applications.

    - Storing and managing metadata for data lakes and data warehouses.

    - Storing and managing time series data for IoT applications. In IoT applications,
    time-series data can include sensor data, logs, and other machine-generated data
    that needs to be collected, analyzed, and stored in real time.

    - Storing and managing data for real-time and offline processing.

