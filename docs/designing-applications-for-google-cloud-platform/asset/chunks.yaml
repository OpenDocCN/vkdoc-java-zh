  trans: '

    ## Google Cloud SQL 的高可用性


    高可用性（HA）是一项确保系统或服务能够持续运行并可供用户使用的功能，即使在计划内或计划外中断的情况下也是如此。在 Google Cloud SQL 的语境中，高可用性指的是该服务在发生意外故障或维护时，仍能保持数据库运行和可访问的能力。


    Google Cloud SQL 提供了多种实现高可用性的选项。


    *   *只读副本*：此功能允许您创建一个或多个主数据库的只读副本。这些副本会与主数据库实时同步更新，可用于分流主数据库的读取流量。这有助于提升性能并降低主数据库过载的风险。


    *   *自动故障转移*：如果主实例发生故障，此功能会自动切换到备用副本。这确保了即使在意外故障的情况下，服务也能保持可用。为了实现高可用性，您可以在不同区域设置只读副本，并在整个区域宕机时进行故障转移。


    *   *多可用区部署*：此功能允许您将 Cloud SQL 实例部署在一个区域内的多个可用区中。这提供了针对因区域特定问题（如断电或网络故障）导致的故障和中断的额外保护。


    *   *Cloud SQL for PostgreSQL 和 MySQL 支持复制*：这意味着您可以使用复制来创建高可用性设置。


    *   *Cloud SQL for PostgreSQL 和 MySQL 支持 Cloud SQL 托管复制*：这意味着您可以使用复制并由 Cloud SQL
    服务进行管理，以创建高可用性设置。


    值得注意的是，其中一些选项可能会产生额外费用。在决定为您的 Cloud SQL 实例采用哪种高可用性解决方案之前，务必评估每个选项的具体要求和成本影响。


    Google Cloud SQL 提供了多种实现高可用性的选项，例如只读副本、自动故障转移、多可用区部署以及对 PostgreSQL 和 MySQL 的复制支持。这些选项有助于提升性能并降低主数据库过载的风险，确保即使在意外故障或维护期间也能保证服务可用性。


    下一节我们将详细讨论只读副本。


    ## Cloud SQL 只读副本


    只读副本是 Google Cloud SQL 的一项功能，允许您创建一个或多个主数据库的只读副本。这些副本会与主数据库实时同步更新，可用于分流主数据库的读取流量。这有助于提升性能并降低主数据库过载的风险。


    创建只读副本时，它会首先复制主数据库中的数据。之后，它会通过复制过程持续接收来自主数据库的更新。这确保了副本始终拥有最新的数据。


    只读副本可用于多种目的，例如：


    *   *扩展读取性能*：通过将读取流量分流到副本，您可以提升数据库的整体性能。这对于读取密集型工作负载或为不同地理位置的用户提供服务特别有用。


    *   *分析工作负载*：通过拥有只读副本，您可以创建一个专门用于分析工作负载的独立副本；这将有助于避免影响主副本的性能。


    *   *备份*：只读副本可用作创建备份的数据源。


    *   *多区域部署*：通过在不同区域拥有只读副本，您可以为不同地理位置的用户提供更低的延迟服务。


    Cloud SQL for MySQL 和 Cloud SQL for PostgreSQL 均支持只读副本。


    需要注意的是，虽然只读副本可用于分流读取流量，但不能用于分流写入流量。写入操作必须指向主数据库。此外，务必评估创建只读副本的成本影响，因为每个副本实例都会产生额外费用。


    这些副本可用于多种目的，例如扩展读取性能、分析工作负载、备份和多区域部署。Cloud SQL for MySQL 和 Cloud SQL for PostgreSQL
    均支持只读副本，但务必评估创建只读副本的成本影响，因为每个副本实例都会产生额外费用。


    接下来，我们将讨论 Cloud SQL 的自动故障转移。


    ## Cloud SQL：自动故障转移


    自动故障转移是 Google Cloud SQL 的一项功能，如果主实例发生故障，它会自动切换到备用副本。这确保了即使在意外故障的情况下，服务也能保持可用。


    当主实例发生故障时，系统会自动切换到一个健康的副本，该副本将成为新的主实例。此过程对用户和应用程序是透明的，不应中断服务的可用性。


    对于启用了复制功能的 Cloud SQL for MySQL 和 Cloud SQL for PostgreSQL 实例，均支持自动故障转移。


    当您创建新的 Cloud SQL 实例时，可以指定是否要启用自动故障转移。如果您选择启用自动故障转移，还可以指定要创建的副本数量，以及创建副本的可用区或区域。


    值得注意的是，自动故障转移会产生额外费用。在决定为您的 Cloud SQL 实例启用此功能之前，务必评估其具体要求和成本影响。


    对于启用了复制功能的 Cloud SQL for MySQL 和 Cloud SQL for PostgreSQL 实例，均支持自动故障转移。当您创建新的
    Cloud SQL 实例时，可以指定是否要启用自动故障转移以及要创建的副本数量。然而，在决定为您的 Cloud SQL 实例启用此功能之前，务必评估其具体要求和成本影响。


    ### 多可用区部署


    多可用区部署是 Google Cloud SQL 的一项功能，允许您在一个区域内的多个可用区中创建主数据库的副本。这通过提供针对可用区级别故障的保护，提高了数据库的可用性和持久性。


    当您创建 Cloud SQL 实例时，可以指定要在其中创建副本的可用区数量。Google Cloud SQL 会自动在不同可用区中创建副本，并使其与主数据库保持同步。


    如果主实例发生故障，位于不同可用区中的一个副本将自动提升为主实例并接管工作。此过程对用户和应用程序是透明的，不应中断服务的可用性。


    Cloud SQL for MySQL 和 Cloud SQL for PostgreSQL 实例均支持多可用区部署。


    值得注意的是，使用多个可用区进行复制会增加运行 Cloud SQL 实例的成本。在决定为您的 Cloud SQL 实例启用此功能之前，务必评估其具体要求和成本影响。


    此功能适用于 Cloud SQL for MySQL 和 Cloud SQL for PostgreSQL 实例。在创建新的 Cloud SQL 实例时，您可以指定要在其中创建副本的可用区数量。然而，在决定为您的
    Cloud SQL 实例启用此功能之前，务必评估其具体要求和成本影响。

    '
- fmt: '# Cloud SQL: Scalability


    Scalability is the ability of a system, such as a database, to handle an increasing
    amount of work or load. Google Cloud SQL provides several options for scaling
    your database depending on your needs.


    One way to scale a Cloud SQL instance is by increasing its memory and CPU resources.
    This can be done by modifying the machine type of the instance. This allows you
    to handle more concurrent connections and perform more complex queries.


    Another way to scale a Cloud SQL instance is by creating read replicas. Read replicas
    are copies of the primary instance that can be used to handle read-only workloads
    such as read-heavy workloads. This allows you to offload read traffic from the
    primary instance and improve performance.


    Additionally, Google Cloud SQL allows you to scale out your database by sharding
    it across multiple instances. This is a more advanced technique, but it allows
    you to horizontally scale your database and handle very large workloads.


    Google Cloud SQL provides several options for scaling your database depending
    on your needs, such as increasing its memory and CPU resources, creating read
    replicas, or sharding it across multiple instances. You can modify the machine
    type of the instance for more concurrent connections and complex queries, create
    read replicas for read-heavy workloads, offload read traffic from the primary
    instance, and implement sharding for very large workloads.


    # Cloud SQL: Security


    To secure your Google Cloud SQL instances, you can take several steps.


    1. Use Cloud SQL Authentication to control access to your instances. This feature
    allows you to use Google Cloud Identity and Access Management (IAM) to grant or
    deny access to specific users or groups.


    2. Use Cloud SQL Authorization to control access to specific databases and tables
    within your instances.


    3. Enable encryption for your instances to protect data at rest and in transit.
    Cloud SQL supports both customer-managed encryption keys and Google-managed encryption
    keys.


    4. Use Cloud SQL Private IP to connect to your instances securely and privately
    from within your Google Cloud Virtual Private Cloud (VPC) network.


    5. Use Cloud SQL backups and replication to ensure that your data is protected
    and available in the event of a disaster.


    6. Regularly check the Cloud SQL audit logs to monitor for unusual activity and
    ensure compliance with security policies.


    To configure security settings, you can use the Cloud SQL web interface, the `gcloud`
    command-line tool, or the Cloud SQL API. You will need to have the appropriate
    permissions to configure security settings for your instances.


    Security is a continuous process, and you need to regularly review and update
    your security configurations to ensure that they are meeting your needs and protecting
    your data.


    ## Authentication


    Cloud SQL authentication is a feature of Google Cloud SQL that allows you to control
    access to your instances using Google Cloud IAM permissions.


    With Cloud SQL Authentication, you can grant or deny access to specific users
    or groups based on their Google Cloud Platform identity. This means you can use
    the same authentication and authorization mechanisms that you use for other GCP
    resources to control access to your Cloud SQL instances.


    There are two types of authentication methods you can use with Cloud SQL.


    - *Cloud IAM authentication*: This method uses Google Cloud IAM to grant or deny
    access to specific users or groups based on their GCP identity.


    - *Database authentication*: This method uses the standard authentication mechanisms
    provided by the underlying database engine. For example, you can use username
    and password authentication to grant or deny access to specific users.


    You can configure authentication settings for a Cloud SQL instance using the Cloud
    SQL web interface, the `gcloud` command-line tool, or the Cloud SQL API.


    To use Cloud SQL authentication, you need to enable the Cloud SQL API, create
    a service account with the appropriate permissions, and configure your Cloud SQL
    instances to use the service account.


    ## Authorization


    Cloud SQL authorization refers to the process of controlling access to specific
    databases and tables within your Cloud SQL instances. This allows you to specify
    which users or groups have permission to perform specific actions on your instances,
    such as `SELECT`, `INSERT`, `UPDATE`, or `DELETE`.


    Cloud SQL supports two types of authorization methods.


    - *Cloud IAM authorization*: This method uses Google Cloud IAM to grant or deny
    access to specific users or groups based on their GCP identity. You can specify
    the permissions that each user or group has for a particular Cloud SQL instance
    or specific database or table.


    - *Database authorization*: This method uses the standard authorization mechanisms
    provided by the underlying database engine. For example, you can create users
    and roles in MySQL and grant or revoke specific privileges to them.


    You can configure authorization settings for a Cloud SQL instance using the Cloud
    SQL web interface, the `gcloud` command-line tool, or the Cloud SQL API.


    Authorization works in conjunction with authentication, and it is a best practice
    to use both methods together to ensure that only authorized users can access your
    Cloud SQL instances and perform specific actions on the databases and tables within
    them.


    ## Encryption


    Encryption is a process of converting plain text into ciphertext to protect data
    from unauthorized access. Google Cloud SQL supports encryption to protect data
    at rest and in transit.


    **Encryption at rest:**


    - Google Cloud SQL supports customer-managed encryption keys (CMEK) and Google-managed
    encryption keys (GMEK) for encrypting data stored on disk.


    - With CMEK, you can manage your own encryption keys, while with GMEK, Google
    handles the key management for you.


    - Both methods use the Advanced Encryption Standard (AES) algorithm with 256-bit
    keys to encrypt data.


    **Encryption in transit:**


    - Cloud SQL supports Transport Layer Security (TLS) to encrypt data in transit
    between the client and the Cloud SQL instance.


    - You can configure the encryption settings for an instance and use the SSL/TLS
    certificates to establish secure connections.


    It is important to keep in mind that encryption does not protect you from security
    breaches caused by misconfigurations, such as a weak password, so it is important
    to use encryption in conjunction with other security measures to ensure the overall
    security of your data.


    You can configure encryption settings for a Cloud SQL instance using the Cloud
    SQL web interface, the `gcloud` command-line tool, or the Cloud SQL API.'
