- fmt: '# Deploying a Containerized Java Application on Google Cloud Run


    Google Cloud Run is a serverless, fully managed compute platform for deploying
    containerized applications. It provides a quick and easy way to deploy and run
    Java applications with automatic scaling, load balancing, and monitoring.


    Here are the steps to deploy a Java application on Cloud Run:


    1. **Containerize the application**: Package the Java application and its dependencies
    in a Docker container.

    2. **Upload the container to a container registry**: Store the container in a
    container registry, such as Google Container Registry or Docker Hub.

    3. **Deploy to Cloud Run**: Use the Cloud Run web console, `gcloud` command-line
    tool, or Cloud Run API to deploy the container to Cloud Run.

    4. **Configure environment variables**: Configure environment variables for the
    application as needed.

    5. **Test the deployment**: Test the deployment by accessing the generated URL.


    Listing [7-8](#603470_1_En_7_Chapter.xhtml#PC8) shows an example of deploying
    a Java application on Cloud Run using the `gcloud` command-line tool.


    ```

    # Build and push the Docker container to Google Container Registry

    docker build -t gcr.io/<PROJECT_ID>/<IMAGE_NAME> .

    docker push gcr.io/<PROJECT_ID>/<IMAGE_NAME>

    # Deploy the container to Cloud Run

    gcloud run deploy <SERVICE_NAME> \

    --image gcr.io/<PROJECT_ID>/<IMAGE_NAME> \

    --platform managed

    Listing 7-8

    gcloud Command to Deploy an Application on Cloud Run

    ```


    In this example, the Docker container is built and pushed to Google Container
    Registry and then deployed to Cloud Run using the `gcloud run deploy` command.
    The `--platform managed` option specifies that Cloud Run should manage the deployment
    and infrastructure.


    By using Cloud Run, organizations can deploy Java applications quickly and easily,
    with automatic scaling, load balancing, and monitoring. This can help organizations
    focus on building and enhancing their applications, without having to worry about
    infrastructure management.


    Additionally, Cloud Run also provides several other features and options that
    can enhance the deployment and management of Java applications.


    - **Custom domains**: Associate a custom domain name with the Cloud Run deployment
    to make the application accessible via a branded URL.

    - **HTTPS**: Automatically secure incoming traffic to the application with HTTPS.

    - **Environment variables**: Pass configuration values to the application through
    environment variables, making it easier to manage configuration without changing
    code.

    - **Concurrency control**: Control the maximum number of concurrent requests to
    the application to prevent overloading.

    - **IAM**: Control access to the Cloud Run deployment with fine-grained Identity
    and Access Management (IAM) policies.

    - **Logging**: Monitor and debug the application with Cloud Logging, which integrates
    with other Operations Suite tools.

    - **Tracing**: Identify performance issues and optimize the application with Cloud
    Trace.

    - **Monitoring**: Monitor the health and performance of the application with Cloud
    Monitoring.


    Organizations can use these features and options to deploy and manage Java applications
    on Cloud Run with more control and flexibility, ensuring a robust and scalable
    environment for their applications.


    # Deploying a Java Application on Cloud Functions


    Google Cloud Functions is a serverless compute platform that allows you to run
    your code in response to events, without having to manage the underlying infrastructure.
    You can deploy Java applications on Cloud Functions and trigger them in response
    to events, such as changes to a Google Cloud Storage bucket or a message on a
    Cloud Pub/Sub topic.


    Here are the steps to deploy a Java application on Cloud Functions:


    1. **Write the function code**: Write the Java code for the function, using the
    Java 8 runtime.

    2. **Package the function**: Package the Java code and its dependencies into a
    JAR file.

    3. **Deploy the function**: Use the `gcloud` command-line tool, Cloud Functions
    web console, or API to deploy the function to Cloud Functions.

    4. **Trigger the function**: Configure the function to be triggered by an event,
    such as a change to a Google Cloud Storage bucket or a message on a Cloud Pub/Sub
    topic.


    Listing [7-9](#603470_1_En_7_Chapter.xhtml#PC9) shows an example of deploying
    a Java function to Cloud Functions using the `gcloud` command-line tool.


    ```

    # Package the function code and dependencies into a JAR file

    ./gradlew build

    # Deploy the function to Cloud Functions

    gcloud functions deploy <FUNCTION_NAME> \

    --runtime java8 \

    --trigger-http \

    --entry-point <CLASS_NAME>.<METHOD_NAME> \

    --jar <JAR_FILE_PATH>

    Listing 7-9

    Deploying a Cloud Function

    ```


    In this example, the function code is packaged into a JAR file using Gradle and
    then deployed to Cloud Functions using the `gcloud functions deploy` command.
    The `--runtime java8` option specifies that the Java 8 runtime should be used,
    and the `--trigger-http` option specifies that the function should be triggered
    by an HTTP request. The `--entry-point` option specifies the class and method
    name of the function entry point, and the `--jar` option specifies the JAR file
    that contains the function code and dependencies.


    By using Cloud Functions, organizations can deploy and run Java applications quickly
    and easily, with automatic scaling and monitoring. This can help organizations
    focus on building and enhancing their applications, without having to worry about
    infrastructure management. Additionally, organizations can take advantage of the
    event-driven architecture provided by Cloud Functions to build highly scalable,
    efficient, and responsive applications.


    Another feature of Cloud Functions is that it supports environment variables,
    which can be used to pass configuration values to the function at runtime, as
    shown in Listing [7-10](#603470_1_En_7_Chapter.xhtml#PC10).


    ```

    gcloud functions deploy <FUNCTION_NAME> \

    --runtime java8 \

    --trigger-http \

    --entry-point <CLASS_NAME>.<METHOD_NAME> \

    --jar <JAR_FILE_PATH> \

    --set-env-vars <ENV_VAR_NAME>=<ENV_VAR_VALUE>

    Listing 7-10

    Deploying a Cloud Function with Setting Environment Variables

    ```


    In Listing [7-10](#603470_1_En_7_Chapter.xhtml#PC10), the `--set-env-vars` option
    is used to set the value of an environment variable named `ENV_VAR_NAME` to `ENV_VAR_VALUE`.
    The function code can then access this value using `System.getenv("ENV_VAR_NAME")`.


    Cloud Functions also provides several other features and options that can enhance
    the deployment and management of Java applications, including the following:


    - **Custom domains**: Associate a custom domain name with the Cloud Functions
    deployment to make the function accessible via a branded URL.

    - **HTTPS**: Automatically secure incoming traffic to the function with HTTPS.

    - **IAM**: Control access to the Cloud Functions deployment with fine-grained
    IAM policies.

    - **Logging**: Monitor and debug the function with Cloud Logging, which integrates
    with other Operations Suite tools.

    - **Tracing**: Identify performance issues and optimize the function with Cloud
    Trace.

    - **Monitoring**: Monitor the health and performance of the function with Cloud
    Monitoring.


    Organizations can use these features and options to deploy and manage Java applications
    on Cloud Functions with more control and flexibility, ensuring a robust and scalable
    environment for their functions.'
