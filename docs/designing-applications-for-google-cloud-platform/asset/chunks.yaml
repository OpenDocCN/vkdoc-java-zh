    A screenshot of the product details page. It has a logo on the left side of the
    page followed by a heading, database migration A P I, with a few lines of text
    for the A P I. It has an enable button at the bottom left side of the page.


    Figure 1-22


    Database Migration API


    Once it’s enabled, you can create a data migration job to start migrating data
    to GCP. Figure [1-23](#603470_1_En_1_Chapter.xhtml#Fig23) shows the Database Migration
    dashboard.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig23_HTML.jpg)


    A screenshot of the Google Cloud migration window. It has the option for migration
    jobs, selected on the left side of the page. The right side has the option to
    create a migration job, a tab for the jobs selected, and a filter option to filter
    migration jobs.


    Figure 1-23


    Database Migration dashboard


    The Database Migration Service (DMS) is a fully managed service that allows you
    to migrate your on-premises databases, or databases running on other cloud platforms,
    to Google Cloud Platform. With DMS, you can perform one-time or ongoing migrations
    of your databases with minimal downtime and disruption to your business operations.


    DMS is a fully managed service with minimal downtime, it supports live and offline
    migration, and you can keep running your business while the migration is taking
    place. It supports migrating multiple on-premises and cloud databases, including
    MySQL, PostgreSQL, SQL Server, and Oracle to Cloud SQL or Spanner.


    If you decided to create a new instance, click the “Create an instance” button.
    It will ask you which database engine you are trying to create the instance for,
    as shown in Figure [1-24](#603470_1_En_1_Chapter.xhtml#Fig24).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig24_HTML.jpg)


    A screenshot of the S Q L instance creation page. It has 3 options for the database
    engine, my S Q L, post gre S Q L, and S Q L server, each followed by the available
    versions and a button to choose the same.


    Figure 1-24


    Creating a cloud SQL instance


    For example, if you choose MySQL, it will configure MySQL based on the option
    you select for your server, such as which region, single zone or multizone, machine
    type, etc.


    GCP introduced a new AlloyDB for an open-source PostgreSQL-compatible database
    service. AlloyDB offers some features that are not available in Cloud SQL, such
    as point-in-time recovery and automatic vacuuming and compression.'
  trans: '

    ### Google BigQuery


    Google BigQuery (GBQ) 是一项全托管、无服务器的云数据仓库服务，能够利用谷歌基础设施的处理能力实现超快速的 SQL 查询。它使组织能够快速且经济高效地分析大量数据，因此成为大数据分析的热门选择。BigQuery
    与多种其他 GCP 服务和工具集成，包括 Google Cloud Dataflow、Google Cloud Dataproc 和 Google Cloud
    Storage，使其成为适用于各种规模组织的灵活且可扩展的解决方案。使用 BigQuery，无需担心硬件或基础设施维护，因为谷歌会管理所有底层基础设施。这使得组织能够专注于分析和洞察，而不是管理和维护硬件。


    BigQuery 是企业级数据仓库，您可以将相关的应用程序数据导出到其中，用于报告和分析目的。如果您进入 BigQuery 控制台，GCP 会提供公共数据，以便您在这些数据上探索
    BigQuery 的功能。图 1-19 展示了 BigQuery 仪表板。


    ![](img/603470_1_En_1_Fig19_HTML.jpg)


    一张 Google Cloud SQL 仪表板的截图。上面有一行文字写着“欢迎来到您的 SQL 工作区”，接着是一段文字提示“尝试 Google Trends
    演示查询”。页面上有一个“打开查询”按钮，以及两个用于“编写新查询”和“添加数据”的按钮，位于页面底部。


    图 1-19


    Google BigQuery


    在 BigQuery 中，您可以使用查询编辑器编写类似 RDBMS 数据库的查询。您可以通过从存储桶上传数据文件、从外部来源（如移至 BigQuery 的应用程序日志）上传文件、通过
    Pub/Sub 将数据推送到 BigQuery 等方式向 BigQuery 添加数据。谷歌提供了一个示例数据集，供您在学习 BigQuery 时试用。要获取此数据集，请点击“开始使用”窗口中的“查看数据集”，如图
    1-19 所示。


    BigQuery 中的数据按层次结构组织。顶层是*项目*，它是数据集的逻辑容器。数据集用于组织表，而表用于存储数据，如图 1-20 所示。


    ![](img/603470_1_En_1_Fig20_HTML.jpg)


    一张页面的截图，分为 3 列。第一列是 BigQuery，包含分析、迁移和管理选项。第二列是资源管理器，包含工作区资源，其中标记了 3 个资源：GCP 项目、数据集和表。第三列是一个查询编辑器，包含几行编程代码和一个用于显示查询结果的表格。


    图 1-20


    BigQuery 资源管理器


    每个表都有一个定义表中数据结构的模式。模式包括表中列的名称和列的数据类型。


    BigQuery 还支持数据集内的视图，这些视图是表示一个或多个表中数据子集的虚拟表。视图可以提供表中数据的不同视角，或组合来自多个表的数据。


    在内部，BigQuery 使用列式存储格式组织数据，这意味着数据是按列而非行进行存储和处理的。这允许快速查询和高效利用资源，尤其适用于大型数据集。


    BigQuery 可用于集成来自不同来源的数据，这对于创建数据的单一视图非常有用。它可用于数据仓库，因为它可以存储大量数据并且运行查询速度快。您可以使用它创建仪表板和报告，以深入了解您的业务数据。来自
    BigQuery 的大量数据可用于训练机器学习模型或执行数据分析，以发现数据中的模式。


    ### Google Cloud SQL


    Google Cloud SQL 是 Google Cloud Platform 提供的一项全托管关系型数据库服务。它支持 MySQL、PostgreSQL
    和 SQL Server 等 SQL 数据库。Cloud SQL 提供了一个易于使用的 Web 界面来管理数据库，以及许多用于与其他 Google Cloud
    Platform 服务集成的工具和 API。使用 Cloud SQL 的一些好处包括自动备份、高可用性和可扩展性，使您能够专注于开发应用程序，而不是管理基础设施。此外，Cloud
    SQL 是安全的，并符合行业标准，因此您可以相信您的数据是受到保护的。图 1-21 展示了 Cloud SQL 仪表板。


    ![](img/603470_1_En_1_Fig21_HTML.jpg)


    一张 Google Cloud 电子学习开发窗口的截图，分为两列，分别显示“SQL”和“实例”，随后是“创建实例”和“迁移数据”的选项。


    图 1-21


    Cloud SQL


    您可以在 Google Cloud SQL 中为 MySQL、PostgreSQL 或 SQL Server 创建实例。您可以使用数据迁移服务将数据迁移到
    Cloud SQL。


    您需要启用 Database Migration API 才能使用数据迁移服务将数据迁移到 Cloud SQL，如图 1-22 所示。


    ![](img/603470_1_En_1_Fig22_HTML.jpg)


    一张产品详情页的截图。页面左侧有一个徽标，后面跟着标题“Database Migration API”，以及几行关于该 API 的说明文字。页面左下角有一个“启用”按钮。


    图 1-22


    Database Migration API


    一旦启用，您就可以创建一个数据迁移任务，开始将数据迁移到 GCP。图 1-23 展示了 Database Migration 仪表板。


    ![](img/603470_1_En_1_Fig23_HTML.jpg)


    一张 Google Cloud 迁移窗口的截图。页面左侧选中了“迁移任务”选项。右侧有“创建迁移任务”选项、一个已选中的“任务”选项卡，以及一个用于筛选迁移任务的筛选选项。


    图 1-23


    Database Migration 仪表板


    Database Migration Service (DMS) 是一项全托管服务，允许您将本地数据库或运行在其他云平台上的数据库迁移到 Google Cloud
    Platform。使用 DMS，您可以以最小的停机时间和业务运营中断，执行一次性或持续性的数据库迁移。


    DMS 是一项全托管服务，停机时间极短，支持在线和离线迁移，您可以在迁移进行期间继续运行业务。它支持迁移多种本地和云数据库，包括 MySQL、PostgreSQL、SQL
    Server 和 Oracle，迁移目标可以是 Cloud SQL 或 Spanner。


    如果您决定创建一个新实例，请点击“创建实例”按钮。系统会询问您要为哪个数据库引擎创建实例，如图 1-24 所示。


    ![](img/603470_1_En_1_Fig24_HTML.jpg)


    一张 SQL 实例创建页面的截图。页面提供了 3 个数据库引擎选项：MySQL、PostgreSQL 和 SQL Server，每个选项后面都列出了可用的版本以及一个“选择”按钮。


    图 1-24


    创建 Cloud SQL 实例


    例如，如果您选择 MySQL，它将根据您为服务器选择的选项（例如区域、单区域或多区域、机器类型等）来配置 MySQL。


    GCP 推出了一项新的 AlloyDB 服务，用于兼容开源 PostgreSQL 的数据库。AlloyDB 提供了一些 Cloud SQL 不具备的功能，例如时间点恢复、自动清理和压缩。

