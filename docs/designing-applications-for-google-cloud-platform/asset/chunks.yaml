- fmt: '# Overview of GCP and Its Services


    `GCP` *architecture* refers to the design and layout of infrastructure and services
    that make up Google Cloud Platform. At a high level, the GCP architecture includes
    computing, storage, database, networking, and security. It is designed to be scalable,
    reliable, and secure. It uses multiple layers of abstraction and isolation to
    ensure that applications and services can run independently and securely on the
    same infrastructure. It also provides tools and services that allow developers
    to automate development, monitor performance, and troubleshoot issues in real
    time.


    GCP *regions* and *zones* are the specific geographic locations of GCP resources.
    A GCP region is a specific location where resources are hosted. The regions comprise
    one or more availability zones (AZs), physically separated locations called *data
    centers*. AZs are designed to be independent of each other, so if one AZ experiences
    an outage, it does not affect the availability of resources in another AZ within
    the same region. GCP regions and zones are important because they affect the performance
    and availability of your applications. When you create a GCP resource, you need
    to specify the region and zone where you want to create the resource.


    GCP pricing is based on the pay-as-you-go model, meaning that you pay only for
    the resources and services you use. The cost depends on several factors, including
    the type and amount of resources used, the duration of use, and the location of
    resources. The price may vary by region and AZ, with some regions and AZs costing
    more than others. GCP provides committed use discounts by committing the use of
    Compute Engine and cloud storage for a certain amount of uses over a period of
    time.


    GCP provides various services, including computing, storage, networking, big data,
    machine learning, the Internet of Things (IoT), security, and application development.
    Let’s run through some of the most popular services.


    ## Google Compute Engine


    Google Compute Engine (GCE) is the part of GCP that provides scalable, highly
    available, and high-performance virtual machines for running applications and
    services. It enables customers to create, configure, and manage virtual machines
    (VMs) running on the Google infrastructure. GCE offers a range of configurable
    options, including customizable machine types, disk storage options, and operating
    systems, including popular Linux distributions and Microsoft Windows. GCE also
    provides advanced networking features such as load balancing, firewalls, and automatic
    backups, making it an ideal platform for deploying and managing applications and
    services.


    The integration of GCE with other GCP services, such as Google Kubernetes Engine,
    Google Cloud Storage, Google Cloud SQL, and Cloud Pub/Sub, is not limited but
    can depend on the network connectivity and configuration. The ability of integration
    makes it easy to build complex, multitier applications.


    Let’s look at an example of a GCE instance in a different region or AZ than the
    other GCP services it needs to communicate with. In this case, there may be latency
    and performance issues. If network configuration is not set up properly, it can
    affect the connectivity and integration between GCE instances and the other GCP
    services. To optimize integration between GCE instances and the other GCP service,
    it is important to consider network connectivity and configuration as part of
    your architecture design, which can include selecting the appropriate region and
    availability zone, setting up proper network configuration, and using services
    such as load balancing and cloud CDN to improve performance and availability.


    When you search and select GCE the first time, you must enable it by clicking
    the Enable button, as shown in Figure [1-9](#603470_1_En_1_Chapter.xhtml#Fig9).
    You will not see this option if you are part of the organization and it is already
    enabled for the selected project.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig9_HTML.jpg)


    A screenshot of a Google Cloud product details window. It has a logo on the left
    side of the page with a header, and compute engine A P I on its right. It has
    an enable button at the bottom side of the page.


    Figure 1-9


    Enabling Compute Engine for first time


    When you click the Enable button, you will see it being enabled, as shown in Figure
    [1-10](#603470_1_En_1_Chapter.xhtml#Fig10).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig10_HTML.jpg)


    A screenshot of the notifications page has a bell icon at the top right corner
    of the page. It has a line of text that reads, enable service colon compute dot
    google a p i s dot com, e-learning dev.


    Figure 1-10


    Enabling the Compute Engine API


    Enabling the Compute Engine API will take some time.


    Once the API is enabled, you will see the Compute Engine dashboard, as shown in
    Figure [1-11](#603470_1_En_1_Chapter.xhtml#Fig11). From here, you can create virtual
    machines. By clicking Create Instance, you can create a VM instance. You can migrate
    your VMs directly from on-prem or other clouds using Google Cloud’s Migrate to
    Virtual Machines feature. Supported sources include on-prem VMware, Amazon EC2,
    and Microsoft Azure. To migrate, you can click the Import VM button. You can see
    these two buttons at the top of the screen.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig11_HTML.jpg)


    A screenshot of the compute engine page has the option of V M instances selected
    on the left side. The right side has an instances tab, a search box to enter property
    name or value, and a table with columns for status, name, zone, recommendations,
    in use by, internal and external I P, and connect.


    Figure 1-11


    Compute Engine dashboard


    There are various configurations and instance options available to create a compute
    instance. Importing an existing VM is a separate topic outside this book’s scope.


    You can create a VM with the desired configurations such as machine type, operating
    system, disk type, and size. The best practice is to use a VM template to create
    a VM for a similar purpose. You can choose the ready-to-go deployable VMs from
    the marketplace; the Google Cloud Marketplace is a platform for discovering, deploying,
    and managing preconfigured software solutions on the Google Compute Engine. You
    will see these options when you click the “Create an instance” button, as shown
    in Figure [1-12](#603470_1_En_1_Chapter.xhtml#Fig12).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig12_HTML.jpg)


    A screenshot of the Google Cloud window to create an instance has 4 options. It
    has option 1 for the new V M instance, option 2 for the new V M instance from
    the template, option 3 for the new V M instance from the machine image, and option
    4 for the marketplace.


    Figure 1-12


    Creating an instance


    GCE can be used for variety of use cases, including batch processing workloads
    such as rendering and data processing, high-performance computing workloads such
    as scientific simulation and machine learning, big data processing such as processing
    and analyzing large datasets, and high-performance, scalable infrastructure for
    gaming workloads.'
