  trans: '

    ### Cloud Spanner 与 Cloud Datastore 对比


    在为您的应用选择 Cloud Spanner 还是 Cloud Datastore 时，取决于多种因素，包括您的数据模型、性能需求以及使用场景。以下是一些需要考虑的关键点：


    *   *数据模型*：Cloud Spanner 可配置为全球分布式关系型数据库服务，融合了关系型和非关系型数据模型。它最适合需要高度可扩展、全球分布式数据模型和结构化数据的应用。另一方面，Cloud
    Datastore 是一种 NoSQL 文档数据库服务，采用灵活的分层数据模型。它最适合需要灵活、非规范化数据模型以及半结构化或非结构化数据的应用。


    *   *性能*：Cloud Spanner 是那些需要高性能但无需全球扩展的应用的理想选择。而 Cloud Datastore 则适合需要高性能和全球可扩展性的应用。


    *   *使用场景*：Cloud Spanner 通常用于具有高读写流量的大型应用，并能处理结构化数据。Cloud Datastore 通常用于读写流量适中的中小型应用，并能处理半结构化和非结构化数据。


    *   *一致性与可用性*：Cloud Spanner 提供强一致性，最适合需要强一致性的场景。而 Cloud Datastore 提供最终一致性，最适合能够容忍一定程度不一致性的场景。Cloud
    Spanner 的强一致性和自动故障转移功能使其非常适合需要高可用性和灾难恢复的应用。


    *   *成本*：Cloud Spanner 通常比 Cloud Datastore 更昂贵。这是因为 Cloud Spanner 提供了额外的特性和功能，例如全球可扩展性、强一致性和自动故障转移。


    最适合您应用的选择可能取决于多种因素。建议根据您的具体使用场景，全面评估这两种方案，并做出最符合您业务需求的决策。


    在下一节中，我们将讨论在哪些情况下应优先使用 Cloud Datastore 而非 Cloud Spanner。


    #### 何时使用 Cloud Datastore 而非 Cloud Spanner


    Cloud Datastore 是一种 NoSQL 文档数据库，适用于存储和检索半结构化数据，例如 JSON 或 XML 文档。它是一种完全托管式服务，提供可扩展性、自动分片和灵活的模式。


    另一方面，Cloud Spanner 是一种关系型数据库，提供更强的一致性，旨在全球范围内处理结构化数据。它适用于需要跨多个区域的事务一致性和高可用性的场景。然而，与
    Cloud Datastore 相比，Cloud Spanner 的设置和维护可能更复杂且更昂贵。


    如果您要存储的数据是半结构化的，并且不需要全局一致性或事务能力，那么 Cloud Datastore 可能是更好的选择。它使用更简单，并且可以随着数据增长自动扩展。但是，如果您需要跨多个区域的强一致性和事务能力，那么
    Cloud Spanner 可能是更好的选择，尽管它可能需要更多的精力和资源来设置和维护。


    例如，考虑一家开发移动应用的公司，该应用允许用户记录和追踪他们的户外活动，如徒步、骑行、跑步等。该应用需要存储大量位置数据，包括 GPS 坐标、时间戳和用户生成的评论。这些数据是半结构化的，意味着它们不太适合传统的关系型数据库结构。该应用还需要处理大量的写入操作，因为用户会实时更新他们的活动。


    在这种情况下，Cloud Datastore 比 Cloud Spanner 更合适，因为存储的数据是半结构化的，并且应用不需要复杂的数据事务或连接操作。Cloud
    Datastore 是一种专为处理半结构化数据而设计的 NoSQL 文档数据库，提供自动扩展和高可用性。此外，Cloud Datastore 易于使用，不需要大量的数据库管理专业知识。


    在这种情况下，使用 Cloud Datastore 的另一个优势是它构建在 Google 的基础设施之上，专为处理高写入负载而设计；这对于需要实时处理大量位置数据更新的移动应用至关重要。


    再举一个例子，考虑一个允许用户创建和分享文本、图片和视频等内容的社交媒体平台。该平台需要存储用户信息（如姓名和联系方式），以及用户创建和分享的内容。该平台还需要处理中等流量的访问，在任何时候都有大量用户创建和查看内容。


    在这种情况下，Cloud Datastore 比 Cloud Spanner 更合适，因为该平台的需求相对简单，不需要 Cloud Spanner 提供的高度可扩展性和全局一致性功能。Cloud
    Datastore 是一种专为处理非结构化数据而设计的 NoSQL 文档数据库服务，易于扩展。此外，对于这种使用场景，Cloud Datastore 是一种经济高效的解决方案，因为它不需要像
    Cloud Spanner 那样的复杂性和资源。


    在前一个案例中，使用 Cloud Datastore 的另一个优势是能够处理大量用户请求，并以灵活且可扩展的方式存储数据。它可以处理大量用户的数据并对其执行查询，这对于社交媒体平台向用户提供个性化推荐和推广是必要的。


    简而言之，Cloud Datastore 适用于存储和管理非结构化、半结构化或非关系型数据，且不需要复杂数据事务或连接操作的组织。它特别适用于组织需要处理大量写入操作，且数据不太适合传统关系型数据库结构的情况。对于那些需求不如需要
    Cloud Spanner 提供的可扩展性和全局一致性的大型企业那么苛刻的组织来说，它是一种经济高效且易于使用的选择。


    现在，让我们在下一节中讨论 Cloud Datastore 优于 Cloud SQL 的情况。

    '
- fmt: '# When to Use Cloud Datastore Instead of Cloud SQL


    An actual use case where `Cloud Datastore` may be more suitable over `Cloud SQL`
    is when a company needs to store and manage semistructured or unstructured data,
    such as JSON, and does not require the relational structure provided by `Cloud
    SQL`.


    For example, consider a gaming company that develops and publishes mobile games.
    The company needs to store player information, such as player name, level, achievements,
    and the in-game events and actions players take. The company also needs to handle
    many players and events at any given time.


    In this case, `Cloud Datastore` would be more suitable than `Cloud SQL` because
    the company’s data is semistructured, and the relational structure provided by
    `Cloud SQL` is not necessary. `Cloud Datastore` is a NoSQL document database service
    designed to handle unstructured data and is easy to scale, making it a good fit
    for this use case. Additionally, `Cloud Datastore` allows the company to index
    and query data in various ways, making it easy to scale. It can handle a large
    number of requests from players.


    Another advantage of using `Cloud Datastore`, in this case, is the ability to
    handle many players and events in real time and store them in a flexible and scalable
    way. It can handle many players’ data and perform queries over it, which is necessary
    for the gaming company to provide personalized recommendations and promotions
    to their players.


    For another example, consider an IoT company that needs to store and manage sensor
    data from many devices. The sensor data is unstructured and includes various data
    types, such as text, images, and videos, and it can be of different formats and
    structures. The company also needs to handle many read-and-write operations from
    devices at any time.


    In this case, `Cloud Datastore` would be more suitable than `Cloud SQL` because
    the company’s needs are demanding and require a high level of scalability. `Cloud
    Datastore` is designed to handle unstructured data and can be easily scaled to
    handle a large amount of data. `Cloud Datastore` is a NoSQL document database
    service that does not require the same level of complexity and resources as `Cloud
    SQL`, making it a cost-effective solution.


    Another advantage of using `Cloud Datastore`, in the previous case, is the ability
    to handle many requests from the devices and store the data in a flexible and
    scalable way. It can handle a large amount of data and perform queries over it,
    which is necessary for the IoT company to perform data analysis and make predictions.


    In short, `Cloud Datastore` is suitable for cases where the organization needs
    to store and manage semistructured or unstructured data, such as JSON, and has
    a large scale of read-and-write operations. It is a cost-effective and easy-to-use
    option for cases where the organization’s needs are not as demanding as those
    of large-scale businesses, and the organization does not require the relational
    structure provided by `Cloud SQL`.


    Now let’s talk about using `Cloud SQL` over `Cloud Datastore` in the next section.


    # When to Use Cloud SQL Instead of Cloud Datastore


    A use case where `Cloud SQL` may be more suitable over `Cloud Datastore` is when
    a company needs to store and manage structured data that follows a specific schema
    and requires the full functionality of a traditional relational database provided
    by `Cloud SQL`.


    For example, consider an e-commerce company that needs to store and manage customer
    information, inventory, and sales data. The data is structured and follows a specific
    schema, such as customer information having fields like name, address, and contact
    information. The company also needs to handle a moderate number of read-and-write
    operations from customers and employees at any time.


    In this case, `Cloud SQL` would be more suitable than `Cloud Datastore` because
    the company’s needs are relatively complex and require the full functionality
    of a traditional relational database. `Cloud SQL` is a fully managed relational
    database service that supports SQL, the industry-standard language for managing
    and querying relational data. It provides features such as transactions, indexes,
    and stored procedures. `Cloud SQL` is more cost-effective in this case as it does
    not require the same level of complexity and resources as `Cloud Datastore`.


    Another advantage of using `Cloud SQL`, in this case, is the ability to handle
    complex queries over the data, and it provides a way to enforce data integrity
    and consistency. This is necessary for the e-commerce company to provide accurate
    information to the customers and employees and prevent system errors.


    For another example, consider a financial company that needs to store and manage
    financial transactions and customer information. The data is highly structured
    and needs to follow strict regulations. The company must also handle complex queries
    and data analysis and run advanced reporting and compliance.


    In this case, `Cloud SQL` would be more suitable than `Cloud Datastore` because
    the company’s needs are demanding and require full functionality of a traditional
    relational database. `Cloud SQL` is a fully managed relational database service
    that provides advanced features such as support for SQL, encryption at rest, and
    high-availability options. Additionally, `Cloud SQL` allows for complex queries
    and advanced reporting, which is necessary for the financial company to perform
    data analysis and comply with regulations.


    Another advantage of using `Cloud SQL`, in this case, is handling many complex
    queries and storing the data in a structured way that guarantees data integrity
    and consistency. It also has advanced security options and compliance features,
    which are necessary for the financial company to protect sensitive data and comply
    with regulations.


    In short, `Cloud SQL` is suitable for cases where the organization needs to store
    and manage structured data that follows a specific schema and has a moderate scale
    of read-and-write operations. It is a cost-effective and easy-to-use option for
    cases where the organization’s needs are relatively complex and the organization
    requires the full functionality of a traditional relational database provided
    by `Cloud SQL`.


    Now let’s see how we can use the Java code to work with Cloud Storage.


    # Using Java to Interact with Cloud Storage


    The following is an example of a Java project that interacts with Cloud Storage
    using the Google Cloud Storage API:


    1. Set up a project in the Google Cloud Console and enable the Google Cloud Storage
    API.

    2. Create credentials for your project, such as an API key or a service account
    key.

    3. Use a library such as the Google Cloud Storage Java Client to interact with
    the API.


    Listing 4-1 shows an example of how you can interact with Google Cloud Storage.


    ```java

    // Import the Google Cloud Storage Java Client library

    import com.google.cloud.storage.Storage;

    import com.google.cloud.storage.StorageOptions;

    public class CloudStorageExample {

    public static void main(String[] args) {

    // Create a storage client

    Storage storage = StorageOptions.getDefaultInstance().getService();

    // List all of the buckets in the project

    for (Bucket bucket : storage.list().iterateAll()) {

    System.out.println(bucket.getName());

    }

    }

    }

    ```


    You can find more details at [`https://cloud.google.com/storage/docs/reference/libraries#client-libraries-install-java`](https://cloud.google.com/storage/docs/reference/libraries%2523client-libraries-install-java).


    You can also use other libraries such as Apache Hadoop, which provide support
    for interacting with other cloud storage services such as Amazon S3, Microsoft
    Azure, etc.


    The next step is to create a bucket and upload the file to the bucket using Java.
    Let’s discuss this in the next section.'
