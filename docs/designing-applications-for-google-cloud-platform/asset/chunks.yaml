    #### Drawbacks of Using Cloud Pub/Sub


    Like any service, Cloud Pub/Sub also has some drawbacks.


    *   *Latency*: While Cloud Pub/Sub is designed to handle high throughput and low
    latency, some use cases may still experience higher latency because of factors
    such as network conditions or message size.


    *   *Durability*: While Cloud Pub/Sub guarantees at-least-once delivery of messages,
    it does not guarantee exactly-once delivery. This means messages may be delivered
    multiple times in some cases, which can lead to duplicates.


    *   *Complexity*: Cloud Pub/Sub can be complex to set up and manage, especially
    for large-scale, high-throughput use cases. It requires a good understanding of
    its features and how to use them effectively.


    *   *Cost*: While Cloud Pub/Sub is a cost-effective service, it can become expensive
    for large-scale, high-throughput use cases that involve a lot of data transfer
    and message processing.


    *   *Limited retention*: By default, Cloud Pub/Sub retains messages for 7 days,
    after which they are deleted. If you need to retain messages for a longer period,
    you need to configure it explicitly.


    *   *Limited support for big messages*: The maximum size of a message that can
    be sent to a topic is 10 MB. So if you have big messages that need to be transmitted,
    you need to split them or consider alternative options.


    *   *Pub/Sub sequencing*: Cloud Pub/Sub sequencing can lead to increased latency
    and reduced throughput.


    It’s important to understand these limitations when planning to use Cloud Pub/Sub
    for your use case. It might not be the best solution for all types of problems,
    but it’s a powerful service when used correctly.'
  trans: '

    ### Kubernetes 与容器


    **Kubernetes Engine** 让您能够在 GCP 上轻松创建、配置和管理 Kubernetes 集群。它提供了自动扩缩、负载均衡和自动升级等功能。例如，您可以使用
    Kubernetes Engine 来部署和管理基于微服务的应用。


    **Cloud Run** 让您能够在 GCP 上轻松部署容器化应用。它提供了自动扩缩、负载均衡和自动更新等功能。例如，您可以使用 Cloud Run 来部署一个处理图像并执行目标检测的网络服务。


    **Container Registry** 让您能够在 GCP 上存储和管理容器镜像。它提供了镜像存储、版本控制和访问控制等功能。例如，您可以使用 Container
    Registry 来存储和管理基于微服务的应用的容器镜像，并轻松将其部署到 Kubernetes Engine 或 Cloud Run。


    **Cloud Build** 让您能够自动化应用的构建、测试和部署。它可用于构建容器镜像、部署到各种环境，并与 Container Registry 和
    Kubernetes Engine 等其他 GCP 服务集成。例如，您可以使用 Cloud Build 来自动化基于微服务的应用的构建、测试和部署流水线。


    ### 安全与身份


    **Cloud Identity and Access Management** (IAM) 使您能够管理对 GCP 资源的访问权限。它提供了基于角色的访问控制、身份感知代理和安全密钥强制执行等功能。例如，您可以使用
    Cloud IAM 为 BigQuery 数据集设置细粒度的访问控制，仅允许特定用户查询数据。


    **Cloud Key Management Service** (KMS) 让您能够在 GCP 上管理和使用加密密钥。它提供了密钥存储、密钥轮换和密钥版本控制等功能。例如，您可以使用
    Cloud KMS 加密 Cloud Storage 中的静态数据，并使用加密密钥加密传输中的数据。


    **Cloud Security Command Center** (CSCC) 帮助您更深入地了解 GCP 环境中的安全状况。它提供了资产清单、漏洞管理和威胁检测等功能。例如，您可以使用
    Cloud CSCC 监控 GCP 资源是否存在安全威胁和漏洞，并采取相应措施。


    以上只是 GCP 提供的众多高级服务中的几个例子。每项服务都有其特定的用例，并且可以与其他服务结合使用，在 GCP 上构建强大且可扩展的解决方案。


    ## 常用的 GCP 高级服务


    在本节中，我们将详细讨论四项 GCP 服务。这四项 GCP 服务的使用频率高于前述服务，并且包含在大多数应用中。


    *   Cloud Pub/Sub


    *   Cloud Dataflow


    *   Cloud Dataproc


    *   Cloud Functions


    ### Cloud Pub/Sub


    Cloud Pub/Sub 是 GCP 提供的一项消息传递服务，允许您在独立系统之间发送和接收消息。它提供了消息排序、至少一次投递以及支持推送和拉取消息等功能。


    Cloud Pub/Sub 的一个用例是在分布式系统中解耦微服务。您可以使用 Pub/Sub 在不同的微服务之间发送消息，使它们能够在不紧密耦合的情况下进行通信。这可以使您的系统更能适应变化，并且更易于扩展。


    另一个用例是实时数据处理。您可以使用 Cloud Pub/Sub 接收高容量数据流（例如日志或传感器数据），然后使用 Dataflow 或 Cloud Functions
    等独立服务实时处理这些数据。


    您还可以将 Cloud Pub/Sub 与 Cloud Storage、BigQuery 和 Cloud Dataflow 等其他 GCP 服务结合使用。例如，当新文件上传到
    Cloud Storage 时，您可以使用 Cloud Pub/Sub 触发 Cloud Functions，然后由 Cloud Functions 处理该文件并将数据加载到
    BigQuery 中。


    Cloud Pub/Sub 是一项功能强大的消息传递服务，可通过多种方式实现实时数据处理、解耦微服务，并使您的系统更能适应变化。


    #### 使用 Cloud Pub/Sub 的理由


    Cloud Pub/Sub 成为 GCP 中一项重要服务的原因有几点。


    *   *解耦*：Cloud Pub/Sub 允许您通过在系统之间发送和接收消息来解耦系统。这使您可以更改或更新一个系统而不影响其他系统，从而使您的整体系统更能适应变化。


    *   *实时处理*：Cloud Pub/Sub 允许您实时处理高容量数据流。这对于日志分析、监控和告警等任务非常有用。


    *   *可扩展性*：Cloud Pub/Sub 旨在处理高吞吐量和低延迟，使其适用于处理大量数据和流量。


    *   *灵活性*：Cloud Pub/Sub 同时支持推送和拉取消息，允许您为用例选择最合适的消息传递模型。


    *   *集成性*：Cloud Pub/Sub 可以与 Cloud Storage、BigQuery 和 Cloud Dataflow 等其他 GCP 服务集成，使您能够构建强大且高效的数据处理流水线。


    *   *成本效益*：Cloud Pub/Sub 是一项经济高效的服务，仅根据您发布和消费的消息收费。


    所有这些特性使 Cloud Pub/Sub 成为一项功能强大的消息传递服务，可用于各种用例，以实现实时数据处理、解耦微服务，并使您的系统更能适应变化。


    #### 使用 Cloud Pub/Sub 的缺点


    与任何服务一样，Cloud Pub/Sub 也存在一些缺点。


    *   *延迟*：虽然 Cloud Pub/Sub 旨在处理高吞吐量和低延迟，但由于网络状况或消息大小等因素，某些用例可能仍会经历较高的延迟。


    *   *持久性*：虽然 Cloud Pub/Sub 保证消息的至少一次投递，但不保证精确一次投递。这意味着在某些情况下，消息可能会被多次投递，从而导致重复。


    *   *复杂性*：Cloud Pub/Sub 的设置和管理可能很复杂，尤其是在大规模、高吞吐量的用例中。这需要对其功能以及如何有效使用它们有很好的理解。


    *   *成本*：虽然 Cloud Pub/Sub 是一项经济高效的服务，但对于涉及大量数据传输和消息处理的大规模、高吞吐量用例，它可能会变得昂贵。


    *   *有限的保留期*：默认情况下，Cloud Pub/Sub 将消息保留 7 天，之后将被删除。如果您需要将消息保留更长时间，则需要显式配置。


    *   *对大消息的支持有限*：可以发送到主题的消息最大大小为 10 MB。因此，如果您需要传输大消息，则需要拆分它们或考虑其他方案。


    *   *Pub/Sub 排序*：Cloud Pub/Sub 的排序可能导致延迟增加和吞吐量降低。


    在计划为您的用例使用 Cloud Pub/Sub 时，了解这些限制非常重要。它可能不是所有类型问题的最佳解决方案，但如果使用得当，它是一项强大的服务。

