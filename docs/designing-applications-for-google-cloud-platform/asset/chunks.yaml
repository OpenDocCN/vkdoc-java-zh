    # 3. Google App Engine


    在本章中，你将了解 Google App Engine（GAE），这是一个用于开发和部署 Web 应用及服务的全托管平台。GAE 允许开发者专注于编写代码，而无需担心底层基础设施以及随着流量增长而扩展应用的问题。本章涵盖了
    GAE 的主要特性，包括支持的编程语言和框架、存储选项以及部署方法。你还将学习如何扩展和优化 GAE 应用，以应对流量变化并提升性能。最后，本章涵盖了部署和管理
    GAE 应用时的安全注意事项及最佳实践。学完本章后，你将全面了解 Google App Engine 以及如何使用它来开发和部署 Web 应用。


    Google App Engine 是 Google 提供的一种平台即服务（PaaS）产品，允许开发者在可扩展且安全的环境中构建和托管 Web 应用。借助
    GAE，开发者可以使用标准语言和框架（如 Java、Python、Go 和 PHP）来构建 Web 应用。


    GAE 的主要特性是其自动扩展能力，这使得平台能够根据应用的流量调整正在运行的实例数量。这消除了开发者自行配置和手动管理底层基础设施的需求。


    Google App Engine 还提供了多种内置服务和 API，例如 Cloud Datastore（NoSQL）、Memcache 和任务队列，这些都可以轻松集成到应用中。此外，它还提供了内置的安全特性，如自动
    SSL 终止以及对 OAuth 和 OpenID Connect 的支持。


    GAE 还为小型应用提供免费使用层级，并对超出免费使用层级的应用进行收费。它是一个全托管平台，简化了构建和部署 Web 应用的过程，同时提供了高可扩展性、安全性和性能。


    ## 为何使用 Google App Engine？


    在多种场景下，Google App Engine 是 Web 应用开发的绝佳选择。


    *   *可扩展且高性能的 Web 应用*：GAE 的自动扩展特性确保你的应用能够处理大量用户和请求。其内置的服务和 API 可帮助你构建高性能应用。


    *   *快速开发与部署*：GAE 提供了简单的流程，让开发者能够专注于编写代码，而无需担心基础设施的配置和管理。


    *   *与其他 Google Cloud 服务的集成*：GAE 可与 Cloud Storage、Cloud SQL 和 BigQuery 等其他 Google
    Cloud 服务无缝集成，使开发者能够构建复杂的多层应用。


    *   *多语言支持*：GAE 支持 Java、Python、Go、PHP 等多种语言，这使得开发者能够使用自己偏好的语言轻松构建 Web 应用。


    *   *成本效益*：GAE 为小型应用提供免费使用层级，并对超出免费使用层级的应用进行收费。


    GAE 的一个用例是小型企业的 Web 应用，允许客户在线下单。该应用需要在高峰时段处理大量请求，并且需要具备高可用性和可扩展性。借助 GAE，企业可以轻松构建和部署该应用。GAE
    的自动扩展特性将确保应用无需额外工作即可处理大量用户。


    ### Google App Engine 的用例


    Google App Engine 的一个良好用例是需要高可扩展性和自动管理的 Web 应用。App Engine 的 PaaS 模型允许开发者专注于为应用编写代码，而无需担心底层基础设施。它还允许轻松扩展资源以应对流量高峰，并提供内置服务，如数据存储和任务队列。此外，App
    Engine 与其他 Google Cloud Platform 服务集成良好，使其成为构建完整端到端解决方案的合适选择。


    ## 理解 Google App Engine 运行时和服务选项


    Google App Engine 是一个在 Google 管理的数据中心中开发和托管 Web 应用的平台。GAE 的关键特性之一是能够为应用选择运行时。


    ### GAE 运行时


    运行时是应用代码运行的环境，它包括特定版本的编程语言以及任何必要的库或框架。


    图 3-1 展示了 GAE 当前支持的部分运行时。


    ![](img/603470_1_En_3_Fig1_HTML.jpg)


    一个窗口截图，显示了一个包含两列的表格，分别对应第二代和第一代。它有一行用于支持的语言。第一列有 6 种语言，第二列有 4 种不同版本的语言。


    图 3-1


    GAE 支持的运行时


    每种运行时都有自己的一套支持的库和框架，运行时的选择会影响应用的性能和可扩展性。


    除了运行时，GAE 还提供了一组可供应用使用的服务，例如用于存储数据的数据存储、用于管理后台任务的任务队列，以及用于发送电子邮件的服务。这些服务可以通过简单的
    API 进行访问，从而抽象掉底层基础设施，让开发者能够专注于编写应用代码。


    GAE 还提供了对扩展、负载均衡和自动故障转移的内置支持，因此应用无需手动配置或维护即可处理大量用户和流量。


    Google App Engine 运行时为开发和部署 Web 应用提供了一个灵活且易于使用的平台，具有广泛的语言和框架支持，以及用于扩展和基础设施管理的内置服务。

