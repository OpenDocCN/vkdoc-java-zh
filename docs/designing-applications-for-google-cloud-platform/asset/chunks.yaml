- fmt: "# Installing the GCP SDK and Java Development Kit\n\nThe Google Cloud SDK\
    \ can be installed on various operating systems, including Windows, macOS, and\
    \ Linux.\n\nYou can install the SDK via a package manager such as `apt-get`, `yum`,\
    \ etc. Another way to install SDK in a virtual environment is by using the `gcloud`\
    \ command-line tool to install the SDK in a specific directory.\n\nHere are the\
    \ general steps to install the SDK on your local machine by downloading it manually:\n\
    \n![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig4_HTML.jpg)\n\nA screenshot\
    \ of the command page for the installer. It has a few lines of text for the `gcloud`\
    \ version, including the versions for Google Cloud SDK, `bq`, core, `gcloud crc32c`,\
    \ and `gsutil`.\n\nFigure 2-4: Checking the Cloud SDK version\n\n![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig3_HTML.jpg)\n\
    \nA screenshot of the command page for the installer. It has a few lines of command\
    \ for the configuration of `gcloud`, details of the current configuration, and\
    \ network diagnostic skipping command using `gcloud init`. The last line has a\
    \ yes or no option to log in.\n\nFigure 2-3: Initialization with the `gcloud init`\
    \ command\n\n![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig2_HTML.jpg)\n\n\
    A screenshot of the command page for the installer. It has a few lines of text\
    \ that read, \"Welcome to the Google Cloud CLI\", followed by a few lines about\
    \ the product and other available resources. The last line has the status of the\
    \ `gcloud` configuration.\n\nFigure 2-2: Installing the Google Cloud CLI\n\n![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig1_HTML.jpg)\n\
    \nA screenshot of the page has a table with 4 columns for platform, package, size,\
    \ and SHA 256 checksum. It has 3 rows for different platforms, and the row 2 second\
    \ column package for the macOS 64-bit platform is indicated by an arrow.\n\nFigure\
    \ 2-1: Cloud SDK installer\n\n1.  Download the Cloud SDK installer for your operating\
    \ system from the Google Cloud SDK website.\n\n    For example, you can download\
    \ the macOS M1 chip by using the following link. You will see the package to download\
    \ and install it, as shown in Figure [2-1](#603470_1_En_2_Chapter.xhtml#Fig1).\n\
    \n    [`https://cloud.google.com/sdk/docs/install`](https://cloud.google.com/sdk/docs/install)\n\
    \n2.  Run the installer and follow the prompts to install the SDK. The installer\
    \ will also install the `gcloud` command-line tool, which interacts with GCP services,\
    \ as shown in Figure [2-2](#603470_1_En_2_Chapter.xhtml#Fig2).\n\n3.  After the\
    \ installation, open a command-line terminal and run the command `gcloud init`\
    \ to initialize the SDK. This command will prompt you to log in to your Google\
    \ account and select a project to use with the SDK, as shown in Figure [2-3](#603470_1_En_2_Chapter.xhtml#Fig3).\n\
    \n4.  Verify that the SDK is installed correctly by running the command `gcloud\
    \ version`. This will display the version number of the SDK and other installed\
    \ components, as shown in Figure [2-4](#603470_1_En_2_Chapter.xhtml#Fig4).\n\n\
    **Note:** You can refer to the Google Cloud SDK documentation for updated instructions.\n\
    \n## Installing Java (Oracle) JDK\n\nTo install the latest version of Oracle Java\
    \ JDK, you can follow these steps:\n\n1.  Go to Oracle’s official Java website:\
    \ [`https://www.oracle.com/java/technologies/javase-downloads.html`](https://www.oracle.com/java/technologies/javase-downloads.html).\n\
    \n2.  Click the Download button next to the 17.0.6 version of the JDK.\n\n3. \
    \ Select the JDK version 17.0.6 for your operating system (Windows, Mac, Linux,\
    \ etc.).\n\n4.  Follow the prompts to complete the installation process.\n\nIt\
    \ is also important to note that you may have to set the `JAVA_HOME` environment\
    \ variable and add the JDK’s `bin` folder to your system’s `PATH` variable to\
    \ use the JDK from the command line.\n\nThe Oracle Java JDK is an Oracle proprietary\
    \ tool. If you are building a business application that will run on your production\
    \ server, you may need a license from Oracle. If you want to use open-source Java,\
    \ you can install OpenJDK for development.\n\n## Installing Java OpenJDK\n\nTo\
    \ install the latest version of OpenJDK (the open-source version of the Java Development\
    \ Kit), you can follow these steps:\n\n1.  Go to any vendor site that provides\
    \ OpenJDK. You can download OpenJDK from [`https://adoptium.net/temurin/releases/?version=17`](https://adoptium.net/temurin/releases/%253Fversion%253D17).\n\
    \n2.  Click the appropriate link to download the installer for your operating\
    \ system (Windows, Mac, Linux, etc.).\n\n3.  Follow the prompts to complete the\
    \ installation process.\n\nAlternatively, you can install OpenJDK through a package\
    \ manager if your operating system supports it. For example, on Ubuntu or Debian-based\
    \ Linux distributions, you can use the command listed in Listing [2-1](#603470_1_En_2_Chapter.xhtml#PC1)\
    \ to install the latest version of OpenJDK.\n\n```\nsudo apt-get update\nsudo\
    \ apt-get install openjdk--jdk\n```\nListing 2-1: OpenJDK Installation Through\
    \ Linux Package Manager\n\nYou can install OpenJDK on macOS using the `brew` package\
    \ manager, as given in Listing [2-2](#603470_1_En_2_Chapter.xhtml#PC2).\n\n```\n\
    brew tap AdoptOpenJDK/openjdk\nbrew install \n```\nListing 2-2: Installing OpenJDK\
    \ Using the `brew` Package Manager\n\nIt is also important to note that you may\
    \ have to set the `JAVA_HOME` environment variable and add the JDK’s `bin` folder\
    \ to your system’s `PATH` variable to use the JDK from the command line.\n\n#\
    \ Creating a GCP Project and Setting Up Credentials\n\nWhen you use any application,\
    \ you need to provide your identity or credentials to access it. Similarly, to\
    \ use Google Cloud Platform (GCP) services, you need to create a GCP project and\
    \ set up credentials.\n\nCredentials are a set of access keys or tokens that allow\
    \ you to authenticate and authorize access to GCP services. For example, an API\
    \ key can allow an application to access a particular API, while a service account\
    \ key can grant access to all resources within a project.\n\nWhen you create a\
    \ project, you will also create a set of credentials that you can use to authenticate\
    \ and authorize access to GCP services. These credentials can be managed in the\
    \ GCP Console or through the Google Cloud SDK.\n\n## Creating a Project\n\nCreating\
    \ a GCP project and setting up credentials are essential steps for accessing and\
    \ using GCP services securely and effectively. They allow you to authenticate\
    \ and authorize access to GCP services and manage your resources efficiently.\n\
    \nTo create a GCP project, follow these steps:\n\n1.  Go to the Google Cloud Console\
    \ ([`https://console.cloud.google.com/`](https://console.cloud.google.com/)).\n\
    \n2.  Click the project drop-down and select or create the project you want to\
    \ use.\n\n3.  Click the hamburger menu (☰) and select **APIs & Services** ➤ **Dashboard**.\n\
    \n4.  Click the **Enable APIs and Services** button at the top of the page.\n\n\
    5.  Search for the API you want to enable and click it.\n\n6.  Click the **Enable**\
    \ button.\n\n7.  Set up the necessary credentials for the API, such as an API\
    \ key or OAuth client ID.\n\n8.  Use the API in your application by referencing\
    \ the necessary client library and using the credentials you set up.\n\nAlternatively,\
    \ use the Google Cloud SDK to create and manage projects using a command line.\
    \ Follow these steps:\n\n1.  Install the Google Cloud SDK.\n\n2.  Open the command-line\
    \ interface (CLI) or terminal.\n\n3.  Run the command `gcloud init` to initialize\
    \ the SDK.\n\n4.  Run the command `gcloud projects create <project-name>` to create\
    \ a new project.\n\n5.  Run the command `gcloud projects list` to verify that\
    \ the project was created.\n\n6.  Finally, run the command `gcloud config set\
    \ project <project-name>` to set the active project.\n\nYou can now use the SDK\
    \ to manage your project, such as creating and managing resources and services.\n\
    \n**Note:** You must have a valid billing account and permission to create a project."
  raw: "## Installing the GCP SDK and Java Development Kit\n\nThe Google Cloud SDK\
    \ can be installed on various operating systems, including Windows, macOS, and\
    \ Linux.\n\nYou can install the SDK via a package manager such as `apt-get`, `yum`,\
    \ etc. Another way to install SDK in a virtual environment is by using the `gcloud`\
    \ command-line tool to install the SDK in a specific directory.\n\nHere are the\
    \ general steps to install the SDK on your local machine by downloading it manually:\n\
    \n![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig4_HTML.jpg)\n\nA screenshot\
    \ of the command page for the installer. It has a few lines of text for the g\
    \ cloud version, including the versions for google cloud S D K, b q, core, g cloud\
    \ c r c 32 c, and g s u t I l.\n\nFigure 2-4\n\nChecking the cloud SDK version\n\
    \n![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig3_HTML.jpg)\n\nA screenshot\
    \ of the command page for the installer. It has a few lines of command for the\
    \ configuration of g cloud, details of the current configuration, and network\
    \ diagnostic skipping command using g cloud-init. The last line has a yes or no\
    \ option to log in.\n\nFigure 2-3\n\nInitialization with the gcloud init command\n\
    \n![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig2_HTML.jpg)\n\nA screenshot\
    \ of the command page for the installer. It has a few lines of text that read,\
    \ welcome to the Google Cloud C L I, followed by a few lines about the product\
    \ and other available resources. The last line has the status of the g cloud configuration.\n\
    \nFigure 2-2\n\nInstalling the Google Cloud CLI\n\n![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig1_HTML.jpg)\n\
    \nA screenshot of the page has a table with 4 columns for platform, package, size,\
    \ and S H A 256 checksum. It has 3 rows for different platforms, and the row 2\
    \ second column package for the Mac O S 64-bit platform is indicated by an arrow.\n\
    \nFigure 2-1\n\nCloud SDK installer\n\n1.  Download the Cloud SDK installer for\
    \ your operating system from the Google Cloud SDK website.\n\n    For example,\
    \ you can download the macOS M1 chip by using the following link. You will see\
    \ the package to download and install it, as shown in Figure [2-1](#603470_1_En_2_Chapter.xhtml#Fig1).\n\
    \n    [`https://cloud.google.com/sdk/docs/install`](https://cloud.google.com/sdk/docs/install)\n\
    \n2.  Run the installer and follow the prompts to install the SDK. The installer\
    \ will also install the `gcloud` command-line tool, which interacts with GCP services,\
    \ as shown in Figure [2-2](#603470_1_En_2_Chapter.xhtml#Fig2).\n\n3.  After the\
    \ installation, open a command-line terminal and run the command `gcloud init`\
    \ to initialize the SDK. This command will prompt you to log in to your Google\
    \ account and select a project to use with the SDK, as shown in Figure [2-3](#603470_1_En_2_Chapter.xhtml#Fig3).\n\
    \n4.  Verify that the SDK is installed correctly by running the command `gcloud\
    \ version`. This will display the version number of the SDK and other installed\
    \ components, as shown in Figure [2-4](#603470_1_En_2_Chapter.xhtml#Fig4).\n\n\
    Note\n\nYou can refer to the Google Cloud SDK documentation for updated instructions.\n\
    \n### Installing Java (Oracle) JDK\n\nTo install the latest version of Oracle\
    \ Java JDK, you can follow these steps:\n\n1.  Go to Oracle’s official Java website:\
    \ [`https://www.oracle.com/java/technologies/javase-downloads.html`](https://www.oracle.com/java/technologies/javase-downloads.html).\n\
    \n2.  Click the Download button next to the 17.0.6 version of the JDK.\n\n3. \
    \ Select the JDK version 17.0.6 for your operating system (Windows, Mac, Linux,\
    \ etc.).\n\n4.  Follow the prompts to complete the installation process.\n\nIt\
    \ is also important to note that you may have to set the `JAVA_HOME` environment\
    \ variable and add the JDK’s `bin` folder to your system’s `PATH` variable to\
    \ use the JDK from the command line.\n\nThe Oracle Java JDK is an Oracle proprietary\
    \ tool. If you are building a business application that will run on your production\
    \ server, you may need a license from Oracle. If you want to use open-source Java,\
    \ you can install Open JDK for development.\n\n### Installing Java Open JDK\n\n\
    To install the latest version of OpenJDK (the open-source version of the Java\
    \ Development Kit), you can follow these steps:\n\n1.  Go to any vendor site that\
    \ provides OpenJDK. You can download OpenJDK from [`https://adoptium.net/temurin/releases/?version=17`](https://adoptium.net/temurin/releases/%253Fversion%253D17).\n\
    \n2.  Click the appropriate link to download the installer for your operating\
    \ system (Windows, Mac, Linux, etc.).\n\n3.  Follow the prompts to complete the\
    \ installation process.\n\nAlternatively, you can install OpenJDK through a package\
    \ manager if your operating system supports it. For example, on Ubuntu or Debian-based\
    \ Linux distributions, you can use the command listed in Listing [2-1](#603470_1_En_2_Chapter.xhtml#PC1)\
    \ to install the latest version of OpenJDK.\n\n```\nsudo apt-get update\nsudo\
    \ apt-get install openjdk--jdk\nListing 2-1\nOpenJDK Installation Through Linux\
    \ Package Manager\n```\n\nYou can install OpenJDK on macOS using the `brew` package\
    \ manager, as given in Listing [2-2](#603470_1_En_2_Chapter.xhtml#PC2).\n\n```\n\
    brew tap AdoptOpenJDK/openjdk\nbrew install \nListing 2-2\nInstalling OpenJDK\
    \ Using the brew Package Manager\n```\n\nIt is also important to note that you\
    \ may have to set the `JAVA_HOME` environment variable and add the JDK’s `bin`\
    \ folder to your system’s `PATH` variable to use the JDK from the command line.\n\
    \n## Creating a GCP Project and Setting Up Credentials\n\nWhen you use any application,\
    \ you need to provide your identity or credentials to access it. Similarly, to\
    \ use Google Cloud Platform (GCP) services, you need to create a GCP project and\
    \ set up credentials.\n\nCredentials are a set of access keys or tokens that allow\
    \ you to authenticate and authorize access to GCP services. For example, an API\
    \ key can allow an application to access a particular API, while a service account\
    \ key can grant access to all resources within a project.\n\nWhen you create a\
    \ project, you will also create a set of credentials that you can use to authenticate\
    \ and authorize access to GCP services. These credentials can be managed in the\
    \ GCP Console or through the Google Cloud SDK.\n\n### Creating a Project\n\nCreating\
    \ a GCP project and setting up credentials are essential steps for accessing and\
    \ using GCP services securely and effectively. They allow you to authenticate\
    \ and authorize access to GCP services and manage your resources efficiently.\n\
    \nTo create a GCP project, follow these steps:\n\n1.  Go to the Google Cloud Console\
    \ ([`https://console.cloud.google.com/`](https://console.cloud.google.com/)).\n\
    \n2.  Click the project drop-down and select or create the project you want to\
    \ use.\n\n3.  Click the hamburger menu (☰) and select APIs & Services ➤ Dashboard.\n\
    \n4.  Click the Enable APIs and Services button at the top of the page.\n\n5.\
    \  Search for the API you want to enable and click it.\n\n6.  Click the Enable\
    \ button.\n\n7.  Set up the necessary credentials for the API, such as an API\
    \ key or OAuth client ID.\n\n8.  Use the API in your application by referencing\
    \ the necessary client library and using the credentials you set up.\n\nAlternatively,\
    \ use the Google Cloud SDK to create and manage projects using a command line.\
    \ Follow these steps:\n\n1.  Install the Google Cloud SDK.\n\n2.  Open the command-line\
    \ interface (CLI) or terminal.\n\n3.  Run the command `gcloud init` to initialize\
    \ the SDK.\n\n4.  Run the command `gcloud projects create <project-name>` to create\
    \ a new project.\n\n5.  Run the command `gcloud projects list` to verify that\
    \ the project was created.\n\n6.  Finally, run the command `gcloud config set\
    \ project <project-name>` to set the active project.\n\nYou can now use the SDK\
    \ to manage your project, such as creating and managing resources and services.\n\
    \nNote\n\nYou must have a valid billing account and permission to create a project."
  trans: "\n## 安装 GCP SDK 和 Java 开发工具包\n\nGoogle Cloud SDK 可安装在多种操作系统上，包括 Windows、macOS\
    \ 和 Linux。\n\n你可以通过包管理器（如 `apt-get`、`yum` 等）来安装 SDK。另一种在虚拟环境中安装 SDK 的方法是使用 `gcloud`\
    \ 命令行工具，将其安装到特定目录中。\n\n以下是通过手动下载在本地机器上安装 SDK 的一般步骤：\n\n![](img/603470_1_En_2_Fig4_HTML.jpg)\n\
    \n安装程序的命令页面截图。其中包含几行关于 g cloud 版本的文本，包括 google cloud S D K、b q、core、g cloud c\
    \ r c 32 c 和 g s u t I l 的版本信息。\n\n图 2-4\n\n检查 Cloud SDK 版本\n\n![](img/603470_1_En_2_Fig3_HTML.jpg)\n\
    \n安装程序的命令页面截图。其中包含几行用于配置 g cloud 的命令、当前配置的详细信息，以及使用 g cloud-init 跳过网络诊断的命令。最后一行是询问是否登录的是/否选项。\n\
    \n图 2-3\n\n使用 `gcloud init` 命令进行初始化\n\n![](img/603470_1_En_2_Fig2_HTML.jpg)\n\n\
    安装程序的命令页面截图。其中包含几行文本，显示“欢迎使用 Google Cloud C L I”，随后是几行关于产品和其他可用资源的信息。最后一行显示 g\
    \ cloud 配置的状态。\n\n图 2-2\n\n安装 Google Cloud CLI\n\n![](img/603470_1_En_2_Fig1_HTML.jpg)\n\
    \n页面截图显示一个包含平台、包、大小和 S H A 256 校验和四列的表格。表格有三行，对应不同平台，其中第二行第二列（Mac O S 64 位平台的包）用一个箭头标出。\n\
    \n图 2-1\n\nCloud SDK 安装程序\n\n1.  从 Google Cloud SDK 网站下载适用于你操作系统的 Cloud SDK 安装程序。\n\
    \n    例如，你可以通过以下链接下载适用于 macOS M1 芯片的版本。你将看到需要下载并安装的包，如图 2-1 所示。\n\n    [`https://cloud.google.com/sdk/docs/install`](https://cloud.google.com/sdk/docs/install)\n\
    \n2.  运行安装程序并按照提示安装 SDK。安装程序还会安装 `gcloud` 命令行工具，该工具用于与 GCP 服务交互，如图 2-2 所示。\n\n\
    3.  安装完成后，打开命令行终端并运行命令 `gcloud init` 来初始化 SDK。此命令将提示你登录 Google 账户并选择一个项目供 SDK\
    \ 使用，如图 2-3 所示。\n\n4.  通过运行命令 `gcloud version` 验证 SDK 是否正确安装。这将显示 SDK 的版本号以及其他已安装的组件，如图\
    \ 2-4 所示。\n\n注意\n\n你可以参考 Google Cloud SDK 文档以获取最新的安装说明。\n\n### 安装 Java (Oracle)\
    \ JDK\n\n要安装最新版本的 Oracle Java JDK，可以按照以下步骤操作：\n\n1.  访问 Oracle 官方 Java 网站：[`https://www.oracle.com/java/technologies/javase-downloads.html`](https://www.oracle.com/java/technologies/javase-downloads.html)。\n\
    \n2.  点击 JDK 17.0.6 版本旁边的“下载”按钮。\n\n3.  为你的操作系统（Windows、Mac、Linux 等）选择 JDK 版本\
    \ 17.0.6。\n\n4.  按照提示完成安装过程。\n\n同样重要的是，你可能需要设置 `JAVA_HOME` 环境变量，并将 JDK 的 `bin`\
    \ 文件夹添加到系统的 `PATH` 变量中，以便在命令行中使用 JDK。\n\nOracle Java JDK 是 Oracle 的专有工具。如果你正在构建一个将在生产服务器上运行的商业应用程序，你可能需要从\
    \ Oracle 获取许可证。如果你想使用开源 Java，可以安装 Open JDK 用于开发。\n\n### 安装 Java Open JDK\n\n要安装最新版本的\
    \ OpenJDK（Java 开发工具包的开源版本），可以按照以下步骤操作：\n\n1.  访问任何提供 OpenJDK 的供应商网站。你可以从 [`https://adoptium.net/temurin/releases/?version=17`](https://adoptium.net/temurin/releases/%253Fversion%253D17)\
    \ 下载 OpenJDK。\n\n2.  点击相应链接，为你的操作系统（Windows、Mac、Linux 等）下载安装程序。\n\n3.  按照提示完成安装过程。\n\
    \n或者，如果你的操作系统支持，你也可以通过包管理器安装 OpenJDK。例如，在基于 Ubuntu 或 Debian 的 Linux 发行版上，你可以使用代码清单\
    \ 2-1 中列出的命令来安装最新版本的 OpenJDK。\n\n```\nsudo apt-get update\nsudo apt-get install\
    \ openjdk--jdk\n代码清单 2-1\n通过 Linux 包管理器安装 OpenJDK\n```\n\n你可以使用 `brew` 包管理器在 macOS\
    \ 上安装 OpenJDK，如代码清单 2-2 所示。\n\n```\nbrew tap AdoptOpenJDK/openjdk\nbrew install\
    \ \n代码清单 2-2\n使用 brew 包管理器安装 OpenJDK\n```\n\n同样重要的是，你可能需要设置 `JAVA_HOME` 环境变量，并将\
    \ JDK 的 `bin` 文件夹添加到系统的 `PATH` 变量中，以便在命令行中使用 JDK。\n\n## 创建 GCP 项目并设置凭据\n\n当你使用任何应用程序时，都需要提供你的身份或凭据才能访问它。类似地，要使用\
    \ Google Cloud Platform (GCP) 服务，你需要创建一个 GCP 项目并设置凭据。\n\n凭据是一组访问密钥或令牌，允许你对 GCP\
    \ 服务进行身份验证和授权访问。例如，API 密钥可以允许应用程序访问特定的 API，而服务账号密钥则可以授予对项目内所有资源的访问权限。\n\n当你创建项目时，你也会创建一组凭据，你可以使用这些凭据对\
    \ GCP 服务进行身份验证和授权访问。这些凭据可以在 GCP 控制台或通过 Google Cloud SDK 进行管理。\n\n### 创建项目\n\n\
    创建 GCP 项目和设置凭据是安全有效地访问和使用 GCP 服务的关键步骤。它们允许你对 GCP 服务进行身份验证和授权访问，并高效地管理你的资源。\n\n\
    要创建 GCP 项目，请按照以下步骤操作：\n\n1.  访问 Google Cloud 控制台 ([`https://console.cloud.google.com/`](https://console.cloud.google.com/))。\n\
    \n2.  点击项目下拉菜单，选择或创建你想要使用的项目。\n\n3.  点击汉堡菜单 (☰)，然后选择 APIs & Services ➤ Dashboard。\n\
    \n4.  点击页面顶部的“启用 API 和服务”按钮。\n\n5.  搜索你想要启用的 API 并点击它。\n\n6.  点击“启用”按钮。\n\n7.\
    \  为该 API 设置必要的凭据，例如 API 密钥或 OAuth 客户端 ID。\n\n8.  通过引用必要的客户端库并使用你设置的凭据，在你的应用程序中使用该\
    \ API。\n\n或者，使用 Google Cloud SDK 通过命令行创建和管理项目。请按照以下步骤操作：\n\n1.  安装 Google Cloud\
    \ SDK。\n\n2.  打开命令行界面 (CLI) 或终端。\n\n3.  运行命令 `gcloud init` 来初始化 SDK。\n\n4.  运行命令\
    \ `gcloud projects create <project-name>` 来创建一个新项目。\n\n5.  运行命令 `gcloud projects\
    \ list` 来验证项目是否已创建。\n\n6.  最后，运行命令 `gcloud config set project <project-name>`\
    \ 来设置活动项目。\n\n现在，你可以使用 SDK 来管理你的项目，例如创建和管理资源与服务。\n\n注意\n\n你必须拥有有效的结算账户和创建项目的权限。\n"
- fmt: '### Setting Up Credentials


    The API key, OAuth client ID, service account, and user account are all types
    of credentials that are used to authenticate and authorize access to various services
    on the Google Cloud Platform. These are all different ways to prove that you have
    permission to access certain resources on Google Cloud Platform.


    An `API key` is a simple string that identifies your application to the GCP services.
    It’s usually used to access public data or services that don’t require user authentication.


    An `OAuth client ID` is used to authenticate and authorize users to access protected
    resources on behalf of a user. It is used to enable single sign-on (SSO) between
    your application and GCP services.


    A `service account` is a special account used to programmatically access GCP services
    and resources. Service accounts are usually used for server-to-server interactions
    and automation.


    A `user account` is an account that identifies an individual user and is used
    to grant them access to GCP resources. User accounts can be created and managed
    through the Google Cloud Console.


    Setting up credentials on the Google Cloud Platform allows your application to
    authenticate and authorize with the various GCP services. Here are the general
    steps to set up credentials on GCP:


    ![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig9_HTML.jpg)


    A screenshot of the service account creation page has 3 steps. Step 1 for service
    account details has text boxes for account name, ID, and description. Step 2 is
    for service account access to the project, and step 3 grants users access to the
    service account.


    **Figure 2-9** Creating a service account


    ![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig8_HTML.jpg)


    A screenshot of the credentials page has options to create, delete, and restore
    deleted credentials. It has a pop-up window with 4 rows for the details of API
    key, OAuth client ID, service account, and help me choose, with the second row
    indicated by an arrow.


    **Figure 2-8** OAuth Client ID


    ![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig7_HTML.jpg)


    A screenshot of the credentials page has options to create, delete, and restore
    deleted credentials. It has a pop-up window with 4 rows for the details of API
    key, OAuth client ID, service account, and help me choose, with the first row
    indicated by an arrow.


    **Figure 2-7** API key


    ![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig6_HTML.jpg)


    A screenshot of the credentials page has options to create, delete, and restore
    deleted credentials. It has a table for API keys and OAuth 2.0 client IDs with
    2 columns for name and creation date and 0 rows. It has 2 rows for service accounts
    at the bottom of the page.


    **Figure 2-6** Credentials dashboard


    ![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig5_HTML.jpg)


    A screenshot of the product details page. It has a logo on the left side of the
    page and the heading "IAM & Service Account Credentials API" on its right. It
    has a manage button at the bottom side of the page with a check box for API enabled.


    **Figure 2-5** Service Account Credentials API


    1.  Go to the Google Cloud Console (`https://console.cloud.google.com/`) and navigate
    to the project you want to set up credentials.

    2.  Search for credentials and open IAM & Service Account Credentials API, as
    shown in Figure [2-5](#603470_1_En_2_Chapter.xhtml#Fig5). Then click Manage. In
    API and services, you can click Credentials to open the Credentials dashboard,
    as shown in Figure [2-6](#603470_1_En_2_Chapter.xhtml#Fig6).

    3.  On the Credentials page, you can create different types of credentials, such
    as an API key, OAuth client ID, or service account key.

    4.  To create an API key, click the "Create credentials" button and select "API
    key," as shown in Figure [2-7](#603470_1_En_2_Chapter.xhtml#Fig7). The key will
    be displayed, and you can restrict its usage if desired.

    5.  To create an OAuth client ID, click the "Create credentials" button and select
    "OAuth client ID," as shown in Figure [2-8](#603470_1_En_2_Chapter.xhtml#Fig8).
    Before creating the client ID, you must configure the consent screen and select
    the application type.

    6.  To create a service account key, click the "Create credentials" button and
    select "Service account key." You will need to select an existing service account
    or create a new one and then choose the key type and any roles granted to the
    account. After creating a service account, it will take you to the IAM & Admin
    on the GCP Console, as shown in Figure [2-9](#603470_1_En_2_Chapter.xhtml#Fig9).

    7.  Once the credentials are created, you can use them in your application by
    referencing the necessary client library and using the credentials you set up.


    > **Note:** Depending on the type of credentials and the service you are trying
    to use, you may need to grant permissions to the account or key before it can
    be used.


    ## Setting Up an IDE and Configuring a GCP Plugin


    GCP plugins are software tools that can be added to IDEs such as IntelliJ IDEA,
    Eclipse, and Visual Studio Code to make it easier for developers to interact with
    GCP services directly from their development environment.


    They provide features such as project setup, authentication, debugging, deployment,
    and management of GCP resources, which helps developers focus on coding and developing
    their application rather than setting up and configuring GCP services.


    GCP plugins make it easy for developers to work with GCP services without leaving
    their development environment, which improves their productivity and streamlines
    the development process.


    Several IDEs are well-suited for developing Java projects for Google Cloud Platform.
    The following are some popular options:


    *   **IntelliJ IDEA**: This popular Java IDE offers strong support for GCP development,
    including integrating the Google Cloud SDK and deploying applications to App Engine
    and other GCP services.

    *   **Eclipse**: Eclipse is another popular Java IDE with a plugin for Google
    Cloud Development, allowing developers to deploy and manage applications on GCP
    quickly.

    *   **Visual Studio Code**: Visual Studio Code is a lightweight and popular code
    editor that can be used for Java development. It also has a Google Cloud SDK extension
    that allows developers to deploy and manage their applications on GCP quickly.


    Ultimately, the best IDE for your specific needs will depend on your personal
    preferences and the particular requirements of your project.


    ### Configuring the GCP Plugin


    To configure the Google Cloud Platform plugin for your IDE, you will need to follow
    these general steps:


    1.  Install the GCP plugin for your specific IDE if it is not installed. This
    can typically be done through the IDE’s plugin marketplace or repository.

    2.  Open the GCP plugin and sign in to your GCP account.

    3.  Configure the plugin with your project’s credentials, such as the project
    ID and service account key, and prefer creating a separate service account to
    configure in your IDE.

    4.  Set up your desired GCP resources, such as a Cloud SQL instance or a Kubernetes
    cluster.

    5.  You may also need to specify the path to the Google Cloud SDK on your local
    machine if it is not already set.


    > **Note:** Specific steps may vary depending on your IDE and version of the GCP
    plugin. You can use dependency manager to add dependency instead of adding GCP
    plugin to the IDE.'
  raw: '### Setting Up Credentials


    The API key, OAuth client ID, service account, and user account are all types
    of credentials that are used to authenticate and authorize access to various services
    on the Google Cloud Platform. These are all different ways to prove that you have
    permission to access certain resources on Google Cloud Platform.


    An *API key* is a simple string that identifies your application to the GCP services.
    It’s usually used to access public data or services that don’t require user authentication.


    An *OAuth client ID* is used to authenticate and authorize users to access protected
    resources on behalf of a user. It is used to enable single sign-on (SSO) between
    your application and GCP services.


    A *service account* is a special account used to programmatically access GCP services
    and resources. Service accounts are usually used for server-to-server interactions
    and automation.


    A *user account* is an account that identifies an individual user and is used
    to grant them access to GCP resources. User accounts can be created and managed
    through the Google Cloud Console.


    Setting up credentials on the Google Cloud Platform allows your application to
    authenticate and authorize with the various GCP services. Here are the general
    steps to set up credentials on GCP:


    ![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig9_HTML.jpg)


    A screenshot of the service account creation page has 3 steps. Step 1 for service
    account details has text boxes for account name, I D, and description. Step 2
    is for service account access to the project, and step 3 grants users access to
    the service account.


    Figure 2-9


    Creating a service account


    ![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig8_HTML.jpg)


    A screenshot of the credentials page has options to create, delete, and restore
    deleted credentials. It has a pop-up window with 4 rows for the details of A P
    I key, Q auth client I D, service account, and help me choose, with the second
    row indicated by an arrow.


    Figure 2-8


    OAuth Client ID


    ![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig7_HTML.jpg)


    A screenshot of the credentials page has options to create, delete, and restore
    deleted credentials. It has a pop-up window with 4 rows for the details of A P
    I key, Q auth client I D, service account, and help me choose, with the first
    row indicated by an arrow.


    Figure 2-7


    API key


    ![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig6_HTML.jpg)


    A screenshot of the credentials page has options to create, delete, and restore
    deleted credentials. It has a table for A P I keys and O auth 2.0 client I ds
    with 2 columns for name and creation date and 0 rows. It has 2 rows for service
    accounts at the bottom of the page.


    Figure 2-6


    Credentials dashboard


    ![](images/603470_1_En_2_Chapter/603470_1_En_2_Fig5_HTML.jpg)


    A screenshot of the product details page. It has a logo on the left side of the
    page and the heading I A M services account credentials A P I on its right. It
    has a manage button at the bottom side of the page with a check box for A P I
    enabled.


    Figure 2-5


    Service Account Credentials API


    1.  Go to the Google Cloud Console ([`https://console.cloud.google.com/`](https://console.cloud.google.com/))
    and navigate to the project you want to set up credentials.


    2.  Search for credentials and open IAM service account credentials API, as shown
    in Figure [2-5](#603470_1_En_2_Chapter.xhtml#Fig5).


    Then click Manage. In API and services, you can click Credentials to open the
    Credentials dashboard, as shown in Figure [2-6](#603470_1_En_2_Chapter.xhtml#Fig6).


    3.  On the Credentials page, you can create different types of credentials, such
    as an API key, OAuth client ID, or service account key.


    4.  To create an API key, click the “Create credentials” button and select “API
    key,” as shown in Figure [2-7](#603470_1_En_2_Chapter.xhtml#Fig7). The key will
    be displayed, and you can restrict its usage if desired.


    5.  To create an OAuth client ID, click the “Create credentials” button and select
    “OAuth client ID,” as shown in Figure [2-8](#603470_1_En_2_Chapter.xhtml#Fig8).
    Before creating the client ID, you must configure the consent screen and select
    the application type.


    6.  To create a service account key, click the “Create credentials” button and
    select “Service account key.” You will need to select an existing service account
    or create a new one and then choose the key type and any roles granted to the
    account.


    After creating a service account, it will take you to the IAM & Admin on the GCP
    Console, as shown in Figure [2-9](#603470_1_En_2_Chapter.xhtml#Fig9).


    7.  Once the credentials are created, you can use them in your application by
    referencing the necessary client library and using the credentials you set up.


    Note


    Depending on the type of credentials and the service you are trying to use, you
    may need to grant permissions to the account or key before it can be used.


