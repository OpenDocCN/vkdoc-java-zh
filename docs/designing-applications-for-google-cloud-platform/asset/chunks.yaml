    # 1. Introduction


    This chapter will introduce Google Cloud Platform (GCP) services and how they
    can be used to build, deploy, and scale applications. This chapter will guide
    you in setting up a GCP environment and give a brief overview of the most common
    GCP services. By the end of this chapter, you will be able to understand the basics
    of GCP, create a GCP project, and know which GCP services you can use to build
    and deploy applications.


    You’ll want to create a login on Google or use your existing Google account to
    start a free GCP trial to follow along with the exercises in this book.


    ## Start a Free Trial on GCP


    To start a free trial on GCP, you can follow these steps:


    1.  Go to the GCP website at [`https://cloud.google.com/`](https://cloud.google.com/)
    and click the Start Free button at the top-right corner of the web page.

    2.  Sign in using your Google account or create a new one if you don’t have a
    Google account.

    3.  Fill out the details with your personal and billing information. You must
    provide a valid credit card to verify your identity, but you will get charged
    if you upgrade to a paid account.

    4.  Review the terms and conditions of the free trial and click the “Agree and
    continue” button.

    5.  Once you have created your account, you can start using GCP services for free
    for 90 days. You will receive $300 in credits for any GCP service during this
    time. Remember that some services may not be eligible for the free trial, so check
    the details before using them.

    6.  Explore the GCP dashboard and try some of the services. Many resources are
    available to help you get started, including documentation, tutorials, and community
    forums.


    Remember to monitor your usage and billing during the trial period to avoid unexpected
    charges. If you decide to upgrade to a paid account, you can do so anytime by
    adding a billing account to your project.


    Once the trial starts, you can see the trial status and remaining balance at the
    top of the GCP console, as shown in Figure [1-1](#603470_1_En_1_Chapter.xhtml#Fig1).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig1_HTML.jpg)


    A screenshot of the Google Cloud window has an icon on the left side and a drop
    box with my first project selected on the right side of the icon. It has a line
    of text above the drop box with details of the free trial status, including the
    credit and the number of days remaining.


    **Figure 1-1** Monitoring your usage and billing


    The GCP project “My First Project” will be created automatically as soon as you
    start the free trial. You can create more projects as needed.


    A project in GCP is used to organize resources. Each project in GCP has its own
    set of resources and billing, and you can track billing based on the project.


    In GCP, a *project* is like a box or a folder containing all the resources, services,
    and configurations related to a specific application, system, or workload. A project
    serves as a boundary for resources to ensure they are isolated and can be managed
    independently.


    A project organizes resources in GCP, defines resource ownership and access, manages
    billing and usage, and enables collaboration among team members. You can think
    of a project as a logical grouping of resources, which makes it easier to manage,
    secure, and monitor them.


    Figure [1-2](#603470_1_En_1_Chapter.xhtml#Fig2) shows a single GCP project that
    contains Compute Engine (VMs) that can run applications and software, Cloud Storage
    that can store files and data, Cloud SQL that provides managed database, a load
    balancer that can distribute traffic between VMs, two firewall rules that can
    control access to the VMs, and a DNS server that can map domain names to the IP
    addresses, billing service allows you to manage spending and costs, IAM allows
    you to control access to your resources and services by adding or removing users,
    groups, or roles.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig2_HTML.jpg)


    A schematic represents a G C P project window. It has 5 rows. Row 1 has 5 components
    for compute engine, cloud storage, cloud S Q L, load balancer, and big query.
    Row 2 has 2 modules for cloud firewall rules. Row 3 has cloud D N S. Row 4 for
    billing, and 5 for cloud I A M module.


    **Figure 1-2** A GCP project


    It is not possible to use GCP without a project. You must create at least one
    project to access GCP services and resources. When you sign up for a GCP account,
    you automatically create a default project, which is used for billing and other
    administrative purposes. You can also create additional projects for your workloads
    and applications.'
