- fmt: '### Google BigQuery


    Google BigQuery (`GBQ`) is a fully managed, serverless, cloud data warehouse that
    enables super-fast SQL queries using the processing power of Google’s infrastructure.
    It allows organizations to analyze large amounts of data quickly and cost-effectively,
    making it a popular choice for big data analytics. `BigQuery` integrates with
    various other GCP services and tools, including `Google Cloud Dataflow`, `Google
    Cloud Dataproc`, and `Google Cloud Storage`, making it a flexible and scalable
    solution for organizations of all sizes. With `BigQuery`, there’s no need to worry
    about hardware or infrastructure maintenance, as Google manages all the underlying
    infrastructure. This enables organizations to focus on analysis and insights rather
    than managing and maintaining hardware.


    `BigQuery` is the enterprise data warehouse where you can export your relevant
    application data for reporting and analytical purposes. If you go to the `BigQuery`
    console, GCP provides public data so that you can explore `BigQuery` functionality
    on that data. Figure [1-19](#603470_1_En_1_Chapter.xhtml#Fig19) shows the `BigQuery`
    dashboard.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig19_HTML.jpg)


    A screenshot of the Google Cloud SQL dashboard. It has a line of text that reads,
    welcome to your SQL workspace followed by a text to try the google trends demo
    query. It has a button to open the query, and 2 buttons for composing a new query
    and adding data at the bottom of the page.


    **Figure 1-19** Google BigQuery


    In `BigQuery`, you can use a query editor to write RDBMS database-like queries.
    You can add data in `BigQuery` by uploading data files from the bucket, uploading
    files from external sources like application logs moved to `BigQuery`, pushing
    data through `pub/sub` to `BigQuery`, etc. Google provides a sample dataset to
    try when learning `BigQuery`. To get this dataset, click to view the dataset in
    the “Get started” window, as shown on Figure [1-19](#603470_1_En_1_Chapter.xhtml#Fig19).


    The data in `BigQuery` is organized in a hierarchical structure. The top level
    is the *project*, which is a logical container for datasets. The datasets are
    used to organize tables, and tables are used to store data, as shown in Figure
    [1-20](#603470_1_En_1_Chapter.xhtml#Fig20).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig20_HTML.jpg)


    A screenshot of a page has 3 columns. 1 for the big query has analysis, migration,
    and administration options. 2 for explorer has workspace resources with 3 resources
    marked GCP project, dataset, and table. 3 has a query editor with a few lines
    of programming codes and a table for query results.


    **Figure 1-20** BigQuery Explorer


    Each table has a schema that defines the structure of the data in the table. The
    schema includes the names of the columns in the table and the data types of the
    columns.


    `BigQuery` also supports views within a dataset, which are virtual tables representing
    a subset of data from one or more tables. Views can provide a different view of
    the data in the tables or combine data from multiple tables.


    Internally, data in `BigQuery` is organized using a columnar storage format, meaning
    that data is stored and processed by columns rather than rows. This allows for
    fast querying and efficient use of resources, especially for large datasets.


    `BigQuery` can be used to integrate data from different sources, which can be
    useful for creating a single view of your data. It can be used for data warehousing
    because it can store large amounts of data and is fast at running queries. You
    can use it to create dashboards and reports that provide insights into your business
    data. The large amount of data from `BigQuery` can be used to train machine learning
    models or perform data analysis to find patterns in your data.


    ### Google Cloud SQL


    Google Cloud SQL is a fully managed relational database service provided by Google
    Cloud Platform. It supports SQL databases such as `MySQL`, `PostgreSQL`, and `SQL
    Server`. Cloud SQL provides an easy-to-use web interface for managing databases,
    as well as a number of tools and APIs for integrating with other Google Cloud
    Platform services. Some of the benefits of using Cloud SQL include automatic backups,
    high availability, and scalability, allowing you to focus on developing your applications
    instead of managing infrastructure. Additionally, Cloud SQL is secure and compliant
    with industry standards, so you can trust that your data is protected. Figure
    [1-21](#603470_1_En_1_Chapter.xhtml#Fig21) shows the cloud SQL dashboard.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig21_HTML.jpg)


    A screenshot of the Google Cloud e-learning dev window has 2 columns for SQL and
    instances, followed by options to create an instance and migrate the data.


    **Figure 1-21** Cloud SQL


    You can create instances for `MySQL`, `PostgreSQL`, or `SQL Server` in Google
    Cloud SQL. You can migrate your data to Cloud SQL using the data migration service.


    You need to enable the Database Migration API to use the data migration service
    for migrating data to Cloud SQL, as shown in Figure [1-22](#603470_1_En_1_Chapter.xhtml#Fig22).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig22_HTML.jpg)


    A screenshot of the product details page. It has a logo on the left side of the
    page followed by a heading, database migration API, with a few lines of text for
    the API. It has an enable button at the bottom left side of the page.


    **Figure 1-22** Database Migration API


    Once it’s enabled, you can create a data migration job to start migrating data
    to GCP. Figure [1-23](#603470_1_En_1_Chapter.xhtml#Fig23) shows the Database Migration
    dashboard.


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig23_HTML.jpg)


    A screenshot of the Google Cloud migration window. It has the option for migration
    jobs, selected on the left side of the page. The right side has the option to
    create a migration job, a tab for the jobs selected, and a filter option to filter
    migration jobs.


    **Figure 1-23** Database Migration dashboard


    The Database Migration Service (`DMS`) is a fully managed service that allows
    you to migrate your on-premises databases, or databases running on other cloud
    platforms, to Google Cloud Platform. With `DMS`, you can perform one-time or ongoing
    migrations of your databases with minimal downtime and disruption to your business
    operations.


    `DMS` is a fully managed service with minimal downtime, it supports live and offline
    migration, and you can keep running your business while the migration is taking
    place. It supports migrating multiple on-premises and cloud databases, including
    `MySQL`, `PostgreSQL`, `SQL Server`, and `Oracle` to Cloud SQL or `Spanner`.


    If you decided to create a new instance, click the “Create an instance” button.
    It will ask you which database engine you are trying to create the instance for,
    as shown in Figure [1-24](#603470_1_En_1_Chapter.xhtml#Fig24).


    ![](images/603470_1_En_1_Chapter/603470_1_En_1_Fig24_HTML.jpg)


    A screenshot of the SQL instance creation page. It has 3 options for the database
    engine, MySQL, PostgreSQL, and SQL Server, each followed by the available versions
    and a button to choose the same.


    **Figure 1-24** Creating a cloud SQL instance


    For example, if you choose `MySQL`, it will configure `MySQL` based on the option
    you select for your server, such as which region, single zone or multizone, machine
    type, etc.


    GCP introduced a new `AlloyDB` for an open-source PostgreSQL-compatible database
    service. `AlloyDB` offers some features that are not available in Cloud SQL, such
    as point-in-time recovery and automatic vacuuming and compression.'
