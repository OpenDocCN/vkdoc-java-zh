    \ write Java code to manage files in the Cloud Storage bucket.\n\n### Java Code\
    \ for Managing Files in a Cloud Storage Bucket\n\nThe code provided in Listing\
    \ [4-7](#603470_1_En_4_Chapter.xhtml#PC7) is sample Java code for managing files.\
    \ This code uses the `java.io.File` class to interact with files. It creates a\
    \ new file, checks if the file exists, gets the file size, and then deletes the\
    \ file.\n\n```\nimport java.io.File;\nimport java.io.IOException;\npublic class\
    \ FileManager {\npublic static void main(String[] args) throws IOException {\n\
    // specify the file name\nString fileName = \"file.txt\";\n// create a file object\n\
    File file = new File(fileName);\n// create a new file\nfile.createNewFile();\n\
    // check if the file exists\nif (file.exists()) {\nSystem.out.println(\"File exists\"\
    );\n}\n// get the file size\nlong fileSize = file.length();\nSystem.out.println(\"\
    File size: \" + fileSize);\n// delete the file\nfile.delete();\n// check if the\
    \ file was deleted\nif (!file.exists()) {\nSystem.out.println(\"File deleted\"\
    );\n}\n}\n}\nListing 4-7\nManaging Files in the Bucket\n```\n\nYou can also use\
    \ the `File` class to create directories, list files in a directory, and move,\
    \ copy, and rename files, as demonstrated in Listings [4-8](#603470_1_En_4_Chapter.xhtml#PC8)\
    \ and [4-9](#603470_1_En_4_Chapter.xhtml#PC9).\n\n```\nFile dir = new File(\"\
    /path/to/directory\");\nif(dir.isDirectory()){\nFile[] files = dir.listFiles();\n\
    for(File f : files){\n//do something with file\n}\n}\nListing 4-9\nIterating File\
    \ for Performing Any File Operations\n```\n\n```\nfile.renameTo(new File(\"newName.txt\"\
    ));\nListing 4-8\nRenaming File\n```\n\nThe following section will show you how\
    \ to use Cloud Storage for file storage.\n\n## Using Cloud Storage for File Storage\
    \ in a Java Application\n\nTo use Google Cloud Storage for file storage in a Java\
    \ application, you can use the GCS Java client library, which provides a set of\
    \ classes and methods for interacting with GCS.\n\nHere are the general steps\
    \ for using GCS for file storage in a Java application:\n\n1.  *Set up a GCS bucket*:\
    \ You will need to create a GCS bucket in the Google Cloud Console and set up\
    \ the appropriate permissions for the bucket.\n\n2.  *Authenticate with GCS*:\
    \ You will need to provide authentication credentials, such as an API key or service\
    \ account key, to the client library to access the cloud storage.\n\n3.  *Install\
    \ the GCS Java client library*: You can install it via Maven or Gradle and import\
    \ it into your project.\n\n4.  *Upload a file*: Use the provided classes and methods\
    \ to upload a file to your GCS bucket.\n\n5.  *Download a file*: Use the provided\
    \ classes and methods to download a file from your GCS bucket.\n\n6.  *Delete\
    \ a file*: Use the provided classes and methods to delete a file from your GCS\
    \ bucket.\n\nYou can refer to the GCS Java client library documentation for detailed\
    \ instructions on how to use the library and its various classes and methods.\n\
    \nLet’s talk about setting up the GCS bucket."
  trans: "\n### 用于创建存储桶并将文件上传至存储桶的 Java 代码\n\n以下是一个 Java 项目示例，演示如何连接到云存储服务、创建存储桶，并使用\
    \ Google Cloud Storage API 将文件上传到该存储桶：\n\n1.  在你偏好的集成开发环境（IDE）中创建一个新的 Java 项目。\n\
    \n2.  将 Google Cloud Storage API 依赖项添加到项目的 `pom.xml` 文件中，如清单 4-2 所示。\n\n    ```\n\
    \    com.google.cloud\n    google-cloud-storage\n    1.117.0\n\n    清单 4-2\n \
    \   Cloud Storage 的 POM 依赖项\n    ```\n\n3.  在你的项目中，创建一个新类并导入清单 4-3 中所示的库。\n\n\
    \    ```\n    import com.google.cloud.storage.Bucket;\n    import com.google.cloud.storage.BucketInfo;\n\
    \    import com.google.cloud.storage.Storage;\n    import com.google.cloud.storage.StorageOptions;\n\
    \    清单 4-3\n    导入库\n    ```\n\n4.  在该类中，创建一个方法来连接到云存储服务并创建一个新的存储桶，如清单 4-4 所示。\n\
    \n    ```\n    public void createBucket(String bucketName) {\n    // 连接到云存储\n\
    \    Storage storage = StorageOptions.getDefaultInstance().getService();\n   \
    \ // 创建一个新的存储桶\n    Bucket bucket = storage.create(BucketInfo.of(bucketName));\n\
    \    System.out.println(\"存储桶 \" + bucket.getName() + \" 已创建。\");\n    }\n   \
    \ 清单 4-4\n    连接到云存储服务\n    ```\n\n5.  创建另一个方法来将文件上传到存储桶，如清单 4-5 所示。\n\n    ```\n\
    \    public void uploadFile(String bucketName, String filePath) {\n    // 连接到云存储\n\
    \    Storage storage = StorageOptions.getDefaultInstance().getService();\n   \
    \ // 获取存储桶\n    Bucket bucket = storage.get(bucketName);\n    // 将文件上传到存储桶\n \
    \   bucket.create(filePath, new FileInputStream(filePath), Bucket.BlobWriteOption.userProject(\"\
    your-project-id\"));\n    System.out.println(\"文件已上传到存储桶。\");\n    }\n    清单 4-5\n\
    \    将文件上传到存储桶的方法\n    ```\n\n6.  在 main 方法中，使用适当的参数调用先前创建的方法，以创建一个存储桶并将文件上传到该存储桶。\n\
    \n注意\n\n你必须传递你的项目 ID，并确保拥有访问云存储服务的适当凭据。\n\n我们已经创建了连接并将文件上传到了存储桶；接下来，我们将编写用于从存储桶下载文件的\
    \ Java 代码。\n\n### 用于从云存储桶下载文件的 Java 代码\n\n清单 4-6 提供了可使用 `google-cloud-storage`\
    \ 库从 Google Cloud Storage 存储桶下载文件的代码。\n\n```\nimport com.google.cloud.storage.Blob;\n\
    import com.google.cloud.storage.BlobId;\nimport com.google.cloud.storage.Storage;\n\
    import com.google.cloud.storage.StorageOptions;\nimport java.io.File;\nimport\
    \ java.io.IOException;\npublic class DownloadFile {\npublic static void main(String[]\
    \ args) throws IOException {\n// 创建一个存储客户端\nStorage storage = StorageOptions.getDefaultInstance().getService();\n\
    // 指定存储桶和文件名\nString bucketName = \"my-bucket\";\nString fileName = \"file.txt\"\
    ;\n// 创建一个 blob ID\nBlobId blobId = BlobId.of(bucketName, fileName);\n// 创建一个\
    \ blob 对象\nBlob blob = storage.get(blobId);\n// 下载文件\nFile file = new File(fileName);\n\
    blob.downloadTo(file.toPath());\n}\n}\n清单 4-6\n从存储桶下载文件\n```\n\n此代码使用 `com.google.cloud.storage`\
    \ 包与 Google Cloud Storage 进行交互。它创建一个存储客户端，指定存储桶和文件名，创建一个 blob 对象，然后使用 `downloadTo`\
    \ 方法将文件下载到本地文件系统。\n\n你需要将 `google-cloud-storage` 库添加到项目依赖项中，并且需要提供访问 GCS 存储桶的凭据。\n\
    \n现在，我们将编写用于管理云存储桶中文件的 Java 代码。\n\n### 用于管理云存储桶中文件的 Java 代码\n\n清单 4-7 中提供的代码是用于管理文件的示例\
    \ Java 代码。此代码使用 `java.io.File` 类与文件进行交互。它创建一个新文件，检查文件是否存在，获取文件大小，然后删除文件。\n\n```\n\
    import java.io.File;\nimport java.io.IOException;\npublic class FileManager {\n\
    public static void main(String[] args) throws IOException {\n// 指定文件名\nString\
    \ fileName = \"file.txt\";\n// 创建一个文件对象\nFile file = new File(fileName);\n// 创建一个新文件\n\
    file.createNewFile();\n// 检查文件是否存在\nif (file.exists()) {\nSystem.out.println(\"\
    文件存在\");\n}\n// 获取文件大小\nlong fileSize = file.length();\nSystem.out.println(\"\
    文件大小: \" + fileSize);\n// 删除文件\nfile.delete();\n// 检查文件是否已被删除\nif (!file.exists())\
    \ {\nSystem.out.println(\"文件已删除\");\n}\n}\n}\n清单 4-7\n管理存储桶中的文件\n```\n\n你还可以使用\
    \ `File` 类来创建目录、列出目录中的文件，以及移动、复制和重命名文件，如清单 4-8 和 4-9 所示。\n\n```\nFile dir = new\
    \ File(\"/path/to/directory\");\nif(dir.isDirectory()){\nFile[] files = dir.listFiles();\n\
    for(File f : files){\n//对文件执行某些操作\n}\n}\n清单 4-9\n迭代文件以执行任何文件操作\n```\n\n```\nfile.renameTo(new\
    \ File(\"newName.txt\"));\n清单 4-8\n重命名文件\n```\n\n下一节将向你展示如何使用 Cloud Storage 进行文件存储。\n\
    \n## 在 Java 应用程序中使用 Cloud Storage 进行文件存储\n\n要在 Java 应用程序中使用 Google Cloud Storage\
    \ 进行文件存储，你可以使用 GCS Java 客户端库，该库提供了一组用于与 GCS 交互的类和方法。\n\n以下是在 Java 应用程序中使用 GCS\
    \ 进行文件存储的一般步骤：\n\n1.  *设置 GCS 存储桶*：你需要在 Google Cloud Console 中创建一个 GCS 存储桶，并为该存储桶设置适当的权限。\n\
    \n2.  *向 GCS 进行身份验证*：你需要向客户端库提供身份验证凭据，例如 API 密钥或服务账户密钥，以访问云存储。\n\n3.  *安装 GCS\
    \ Java 客户端库*：你可以通过 Maven 或 Gradle 安装它，并将其导入到你的项目中。\n\n4.  *上传文件*：使用提供的类和方法将文件上传到你的\
    \ GCS 存储桶。\n\n5.  *下载文件*：使用提供的类和方法从你的 GCS 存储桶下载文件。\n\n6.  *删除文件*：使用提供的类和方法从你的\
    \ GCS 存储桶中删除文件。\n\n你可以参考 GCS Java 客户端库文档，以获取有关如何使用该库及其各种类和方法的详细说明。\n\n接下来，我们来谈谈如何设置\
    \ GCS 存储桶。\n"
- fmt: "### Setting Up a GCS Bucket\n\nTo set up a Google Cloud Storage bucket, you\
    \ can follow these steps:\n\n1. Log in to the Google Cloud Console (`https://console.cloud.google.com/`)\
    \ using your Google account.\n2. Select the project in which you want to create\
    \ the bucket. If you haven’t created a project yet, you can create one by clicking\
    \ the project drop-down in the top bar and selecting New Project.\n3. Click the\
    \ Storage option in the navigation menu on the left. This will take you to the\
    \ Cloud Storage browser.\n4. Click the Create Bucket button.\n5. Fill in the required\
    \ information for the bucket, such as the bucket name, storage class, and location.\
    \ Make sure the name you choose is unique across all of GCS.\n6. Click the Create\
    \ button to create the bucket.\n7. Now you have to set up the appropriate permissions\
    \ for the bucket. You can set the access control for the bucket by going to the\
    \ Permissions tab in the bucket’s settings and adding members to the bucket.\n\
    8. Once you’ve set up the permissions, you’re ready to start using the bucket\
    \ to store files in your Java application.\n\n**Note:** GCS bucket names are globally\
    \ unique, so you’ll need to choose a unique name that has not been used by anyone\
    \ else.\n\nNext, we will talk about authenticating with GCS in a Java application.\n\
    \n### Authenticating with GCS\n\nTo authenticate with Google Cloud Storage in\
    \ a Java application, you will need to provide authentication credentials, such\
    \ as an API key or service account key, to the GCS Java client library.\n\nHere\
    \ are the general steps for authenticating with GCS:\n\n1. **Create a service\
    \ account**: Go to the Google Cloud Console and navigate to the “IAM & admin”\
    \ section. Create a new service account and grant it the appropriate permissions\
    \ for the GCS bucket you want to access.\n2. **Download the service account key**:\
    \ Once the service account is created, you can download the key in JSON format.\n\
    3. **Set the environment variable**: Set the `GOOGLE_APPLICATION_CREDENTIALS`\
    \ environment variable to the path of the downloaded JSON file.\n4. **Use the\
    \ service account key in your code**: In your Java code, use the `Credentials`\
    \ class from the Google Cloud SDK to load the service account key and create a\
    \ `Storage` object from it. You can then use this object to interact with GCS.\n\
    \nAlternatively, you can use the `StorageOptions.newBuilder()` class to create\
    \ a storage client with the service account key and use it to interact with GCS.\n\
    \nIt’s important to keep the service account key secure and not share it or check\
    \ it into version control.\n\nYou may also use OAuth2 client ID and the secret\
    \ to authenticate your application. In that case, you can use the Google Cloud\
    \ SDK library and use the following to get the credentials:\n\n```\nGoogleCredentials.getApplicationDefault()\n\
    ```\n\nTo get access to GCS, you need to create a service account and download\
    \ it to use in your code.\n\n### Creating a Service Account, Downloading It, and\
    \ Using It in the Project\n\nHere are the detailed steps for creating a service\
    \ account, downloading the key, and using it in your Java project to authenticate\
    \ with Google Cloud Storage:\n\n1. **Create a service account**:\n   - Go to the\
    \ Google Cloud Console (`https://console.cloud.google.com/`).\n   - Select the\
    \ project that you want to create the service account for.\n   - In the navigation\
    \ menu, click “IAM & admin” and then “Service accounts.”\n   - Click the Create\
    \ Service Account button.\n   - Give the service account a name and description.\n\
    \   - Grant it the appropriate permissions for the GCS bucket you want to access,\
    \ such as Storage Object Admin and Storage Object Creator.\n   - Click Create\
    \ to create the service account.\n\n2. **Download the service account key**:\n\
    \   - After creating the service account, you will be taken to the service account\
    \ details page.\n   - Click the Actions button and select Create key.\n   - Select\
    \ the JSON format and click Create.\n   - A JSON file containing the key will\
    \ be downloaded to your computer.\n\n3. **Set the environment variable**:\n  \
    \ - Set the `GOOGLE_APPLICATION_CREDENTIALS` environment variable to the path\
    \ of the downloaded JSON file.\n\n4. **Use the service account key in your code**,\
    \ as shown in Listing [4-10](#603470_1_En_4_Chapter.xhtml#PC11):\n   - In your\
    \ Java code, use the `Credentials` class from the Google Cloud SDK to load the\
    \ service account key and create a `Storage` object from it.\n   - You can then\
    \ use this object to interact with GCS.\n\n```\nimport com.google.auth.Credentials;\n\
    import com.google.auth.oauth2.GoogleCredentials;\nimport com.google.cloud.storage.Storage;\n\
    import com.google.cloud.storage.StorageOptions;\nimport java.io.FileInputStream;\n\
    import java.io.IOException;\n\npublic class GCSExample {\n    public static void\
    \ main(String[] args) throws IOException {\n        // Load the service account\
    \ key\n        Credentials credentials = GoogleCredentials.fromStream(new FileInputStream(\"\
    path/to/service_account.json\"));\n        // Create a storage client\n      \
    \  Storage storage = StorageOptions.newBuilder().setCredentials(credentials).build().getService();\n\
    \        // Use the storage client to interact with GCS\n        // ...\n    }\n\
    }\n```\n\n**Listing 4-10** Providing Path of Service Account JSON\n\nAlternatively,\
    \ you can use the `GoogleCredentials.getApplicationDefault()` method to get the\
    \ credentials without setting the environment variable.\n\nIt’s essential to keep\
    \ the service account key secure and not to share it or check it into version\
    \ control.\n\nYou can also use the `GoogleCredentials.fromStream` method to load\
    \ the credentials from a stream, such as a file or a resource in your application.\n\
    \nNext, we will talk about installing the GCS client library.\n\n#### Installing\
    \ the GCS Java Client Library\n\nTo install the Google Cloud Storage Java client\
    \ library in your application, you will need to add the library as a dependency\
    \ in your project. The GCS Java client library is available on the Maven Central\
    \ Repository so that you can add it as a dependency in your build file (e.g.,\
    \ `pom.xml` for a Maven project, `build.gradle` for a Gradle project, etc.).\n\
    \nHere are the general steps for installing the GCS Java client library:\n\n1.\
    \ **Add the GCS Java client library as a dependency in your build file**.\n\n\
    \   For Maven, add the following dependency to your `pom.xml` file, as shown in\
    \ Listing [4-11](#603470_1_En_4_Chapter.xhtml#PC12). The version mentioned is\
    \ at the time of writing this book; check for the latest version when you are\
    \ working on it.\n\n   ```\n   <dependency>\n       <groupId>com.google.cloud</groupId>\n\
    \       <artifactId>google-cloud-storage</artifactId>\n       <version>1.143.0</version>\n\
    \   </dependency>\n   ```\n\n   **Listing 4-11** Cloud Storage Dependency\n\n\
    \   For Gradle, add the following line to your `build.gradle` file:\n\n   ```\n\
    \   implementation 'com.google.cloud:google-cloud-storage:1.143.0'\n   ```\n\n\
    2. **Run the build command to download the dependency and its transitive dependencies**.\n\
    \n   For Maven, run the following command:\n\n   ```\n   mvn clean install\n \
    \  ```\n\n   For Gradle, run the following command:\n\n   ```\n   gradle build\n\
    \   ```\n\nThe GCS Java client library includes the classes needed to interact\
    \ with GCS, such as the `Storage` class for creating and managing buckets, and\
    \ the `Blob` class for creating and managing objects.\n\nYou can check the latest\
    \ version of the library from the Maven Central Repository: `https://mvnrepository.com/artifact/com.google.cloud/google-cloud-storage`.\n\
    \nMake sure to also have the Google Cloud SDK installed in your system and the\
    \ environment variable `GOOGLE_APPLICATION_CREDENTIALS` set properly; if not,\
    \ the code will throw the exception `com.google.auth.oauth2.GoogleCredentials`\
    \ not found."
