    本示例演示了创建集群、提交作业，然后删除集群的基本步骤。你需要将 `my-project-id` 和 `my-cluster` 等占位符替换为你的实际项目
    ID 和集群名称。此外，你还需要指定作业类型，例如 Hadoop、Spark、Pig 等，并设置作业详情，如主类、JAR 文件、参数等。


    让我们先定义一下这里使用的几个术语。


    *   *MR 作业* 代表 MapReduce 作业。它是一种用于大数据处理的处理模型，涉及在集群节点间并行处理大量数据。


    *   *作业* 是提交给 Dataproc 集群进行处理的工作单元。作业可以是 MapReduce 作业、Spark 作业、Hive 作业，或任何其他可以在
    Hadoop 或 Spark 集群上运行的作业类型。


    *   *作业放置* 指的是决定作业在 Dataproc 集群中运行位置的规则。例如，你可以指定作业应在特定节点集上运行，或者应在具有特定特征（如一定量的内存或一定数量的
    CPU 核心）的节点上运行。


    *   *作业引用* 是 Dataproc 中作业的唯一标识符。它可用于监控作业状态、检索作业信息或取消作业。


    *   *作业类型* 指的是在 Dataproc 集群上运行的作业类型。例如，作业可以是 MapReduce 作业、Spark 作业、Hive 作业，或任何其他可以在
    Hadoop 或 Spark 集群上运行的作业类型。


    *   *作业配置* 指的是控制作业如何在 Dataproc 集群上运行的设置。这包括诸如要使用的工作节点数量、工作节点使用的机器类型、要使用的软件类型（如
    Hadoop 或 Spark）以及许多其他可根据作业特定需求进行自定义的选项。


    注意


    Cloud Dataproc 可能需要根据具体用例进行额外的配置和错误处理。


    #### 配置 Cloud Dataproc


    使用 Cloud Dataproc 时，你可以设置多个配置选项来自定义集群和作业。以下是一些示例：


    *   *集群配置*：你可以指定集群中工作节点和主节点的数量、每个节点的机器类型，以及分配给每个节点的内存和 CPU 数量。此外，你还可以配置网络和防火墙设置，并设置自动缩放以根据工作负载自动添加或移除节点。


    *   *软件配置*：你可以指定要在集群上使用的 Hadoop、Spark、Pig 或其他软件的版本。你还可以配置环境变量和初始化操作，以便在作业启动前运行。


    *   *作业配置*：对于每个作业，你可以指定要运行的主类、JAR 文件和参数。你还可以配置作业放置，例如运行作业的集群以及要使用的工作节点数量。


    *   *安全配置*：你可以为集群和作业配置身份验证和授权设置。你还可以为静态数据和传输中的数据设置加密。


    清单 6-12 演示了如何配置一个包含四个工作节点和两个主节点的集群，使用机器类型 `n1-standard-4` 并安装特定版本的软件。


