  \n第 9 章 ■ 使用媒体类\n\n这个类确保所有视图都能访问应用程序的 SongModel 实例。它还提供了一种轻松编写新视图的模式。每个新视图只需提供 initView\
  \ 方法的具体实现。该方法返回一个顶级 Node，作为该视图场景图的根节点。\n\n有了这两个基础设施组件，我们就可以继续创建一些实际的视图了。最明显的起点是将\
  \ AudioPlayer2 中显示元数据的 GridPane、Labels 和 ImageView 移动到一个名为 MetadataView 的新视图类中。此处未展示该类的源代码，因为它与清单\
  \ 9-9 中 createGridPane 和 createControls 方法显示的 UI 代码基本相同。如果你好奇，可以在 AudioPlayer3 项目的源代码中找到该视图。\n\
  \n\n\n现在我们回到最初的目标：让用户通过 FileChooser 对话框，或者通过将文件或 URL 拖放到应用程序上，来选择要播放的媒体资源。我们创建了一个新视图来容纳音频播放器的控件。它的第一个组件是一个按钮，点击后会显示\
  \ FileChooser。该按钮的事件处理器将获取用户选择的文件，并将文件的 URL 传递给 SongModel。这个名为 PlayerControlsView\
  \ 的视图如清单 9-12 所示。\n\n***清单 9-12.*** PlayerControlsView 类\n\nclass PlayerControlsView\
  \ extends AbstractView {\n\npublic PlayerControlsView(SongModel songModel) {\n\n\
  super(songModel);\n\n}\n\n@Override\n\nprotected Node initView() {\n\nfinal HBox\
