  \n第 10 章 ■ JavaFX 3D\n\n另请注意，当您调整窗口大小时，场景的内容会随窗口一起调整大小。这是我们在创建`PerspectiveCamera`时将`fixedEyeAtCameraZero`设置为`true`的结果。\n\
  \n向 JavaFX 场景添加灯光\n\n\n\nJavaFX 3D 图形 API 的光照类层次结构由抽象类 `LightBase` 及其具体子类 `AmbientLight`\
  \ 和 `PointLight` 组成。它们属于 `javafx.scene` 包。`AmbientLight` 是一种似乎来自四面八方的光源。`PointLight`\
  \ 是一种在空间中具有固定点，并向远离自身的各个方向均匀辐射光线的光源。它们都是节点（Node），因此可以添加到 JavaFX 场景中为场景提供光照。它们也可以使用平移变换（Translate\
  \ transform）移动到所需位置。如果将它们添加到容器中，那么当容器被变换时，它们会随容器一起移动。\n\n**理解 LightBase 类**\n\n\
  `LightBase` 抽象类具有以下公共方法：\n\n• `void setColor(Color)`\n\n• `Color getColor()`\n\n\
  • `ObjectProperty<Color> colorProperty()`\n\n• `void setLightOn(boolean)`\n\n• `boolean\
  \ isLightOn()`\n\n• `BooleanProperty lightOnProperty()`\n\n• `ObservableList<Node>\
  \ getScope()`\n\n这些方法为 `LightBase` 类定义了 `color` 和 `lightOn` 两个属性。`color` 属性的类型为\
  \ `Color`，用于定义光的颜色。`lightOn` 属性是一个布尔属性，用于控制光是否开启。`getScope()` 方法返回一个 `ObservableList<Node>`。当此列表为空时，光照会影响场景中的所有节点。当此列表不为空时，光照仅影响列表中包含的节点。\n\
  \n**理解 AmbientLight 类**\n\n`AmbientLight` 类具有以下构造方法：\n\n• `AmbientLight()`\n\n•\
  \ `AmbientLight(Color color)`\n\n默认构造方法创建一个默认颜色为 `Color.WHITE` 的 `AmbientLight`。单参数构造方法创建一个具有指定颜色的\
  \ `AmbientLight`。除了从基类 `LightBase` 继承的方法外，`AmbientLight` 类没有额外的公共方法。\n\n**理解 PointLight\
  \ 类**\n\n`PointLight` 类具有以下构造方法：\n\n• `PointLight()`\n\n• `PointLight(Color color)`\n\
