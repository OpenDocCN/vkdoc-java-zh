  \n第 8 章 ■ 在 JavaFX 中创建图表\n\n***图 8-5.** 使用 CSS 设置饼图样式*\n\n现在我们逐一介绍所做的更改。在详细讨论各个更改之前，我们先展示如何将\
  \ CSS 集成到应用程序中。这是通过将样式表添加到场景中来实现的，具体操作如下：\n\n`scene.getStylesheets().add(\"/chartappstyle.css\"\
  );`\n\n包含样式表的文件 `chartappstyle.css` 必须在应用程序运行时位于类路径中。\n\n在清单 8-2 中，我们使用以下代码设置了顺时针配置：\n\
  \n`pieChart.setClockwise(false)`\n\n我们在清单 8-3 的代码中移除了这一行，而是在样式表的 `.chart` 类上定义了\
  \ `-fx-clockwise` 属性：\n\n.chart {\n\n-fx-clockwise: false;\n\n-fx-pie-label-visible:\
  \ true;\n\n-fx-label-line-length: 5;\n\n-fx-start-angle: 90;\n\n-fx-legend-side:\
  \ right;\n\n}\n\n在同一个 `.chart` 类定义中，我们通过将 `-fx-pie-label-visible` 属性设置为 true 来使饼图上的标签可见，并指定每个标签的线条长度为\
  \ 5。\n\n此外，我们通过定义 `-fx-start-angle` 属性将整个饼图旋转了 90 度。现在标签在样式表中定义，我们通过省略以下代码行来移除代码中的相应定义：\n\
  \n`pieChart.setLabelsVisible(false)`\n\n为了确保图例显示在图表的右侧，我们指定了 `-fx-legend-side` 属性。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 8 章 ■ 在 JavaFX 中创建图表\n\n\
  默认情况下，饼图使用 `caspian` 样式表中定义的默认颜色。第一个扇区填充 `default-color0`，第二个扇区填充 `default-color1`，依此类推。更改不同扇区颜色的最简单方法是覆盖默认颜色的定义。在我们的样式表中，这是通过以下方式完成的：\n\
  \n.default-color0.chart-pie {\n\n-fx-pie-color: blue;\n\n}\n\n其他扇区也可以进行同样的操作。\n\n\
  如果你在没有 CSS 其他部分的情况下运行此示例，你会注意到图表本身相当小，并且标签的大小占用了太多空间。因此，我们按如下方式修改标签的字体大小：\n\n.chart-pie-label\
  \ {\n\n-fx-font-size:9px;\n\n}\n\n\n\n此外，我们减少了图表区域的内边距：\n\n.chart-content {\n\n\
  -fx-padding:1;\n\n}\n\n最后，我们修改了图例的背景和描边。这可以通过重写 chart-legend 类来实现，具体如下：\n\n.chart-legend\
  \ {\n\n-fx-background-color: #f0e68c;\n\n-fx-border-color: #696969;\n\n-fx-border-width:1;\n\
  \n}\n\n再次提醒，关于在 JavaFX 图表中使用 CSS 的更多信息，请读者参考 [`docs.oracle.com/javase/8/javafx/user-interface-tutorial/css-styles.htm`](http://docs.oracle.com/javase/8/javafx/user-interface-tutorial/css-styles.htm)。\n\
  \n使用 XYChart\n\nXYChart 类是一个抽象类，有七个直接已知的子类。这些类与 PieChart 类的区别在于，XYChart 有两个坐标轴，以及一个可选的\
  \ alternativeColumn 或 alternativeRow。这对应着 XYChart 的以下附加属性列表。\n\nBooleanProperty\
  \ alternativeColumnFillVisible\n\nBooleanProperty alternativeRowFillVisible\n\n\
  ObjectProperty<ObservableList<XYChart.Series<X,Y>>>data\n\nBooleanProperty horizontalGridLinesVisible\n\
  \nBooleanProperty horizontalZeroLineVisible\n\nBooleanProperty verticalGridLinesVisible\n\
  \nBooleanProperty verticalZeroLineVisible\n\nXYChart 中的数据是按系列（series）组织的。这些系列如何渲染取决于\
  \ XYChart 子类的具体实现。通常，一个系列中的单个元素包含若干对数据。以下示例使用了一个假设的未来三种编程语言市场份额预测。我们从 TIOBE 指数开始\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 8 章 ■ 在 JavaFX 中创建图表\n\n\
  以 2011 年 Java、C 和 C++ 的指数为基础，并为每年（直到 2020 年）添加随机值（介于 –2 和 +2 之间）。由此得到的（年份，数值）对构成了\
  \ Java 系列，C 和 C++ 同理。最终，我们得到了三个系列，每个系列包含 10 对数据。\n\nPieChart 和 XYChart 的一个主要区别在于\
  \ XYChart 中存在 x 轴和 y 轴。\n\n从以下构造函数可以看出，在创建 XYChart 时需要指定这些坐标轴。\n\nXYChart (Axis<X>\
  \ xAxis, Axis<Y> yAxis)\n\nAxis 类是一个抽象类，它继承自 Region（因此也继承自 Parent 和 Node），并有两个子类：CategoryAxis\
  \ 和 ValueAxis。从类定义可以看出，CategoryAxis 用于渲染 String 格式的标签：\n\npublic class CategoryAxis\
  \ extends Axis<java.lang.String>\n\nValueAxis 用于渲染表示 Number 的数据条目。它本身是一个抽象类，定义如下：\n\
  \npublic abstract class ValueAxis <T extends java.lang.Number> extends Axis<T>\n\
  \nValueAxis 类有一个具体的子类，即 NumberAxis：\n\npublic final class NumberAxis extends ValueAxis<java.lang.Number>\n\
  \n这些 Axis 类之间的区别将在示例中逐渐清晰。我们现在展示一些不同 XYChart 实现的示例，从 ScatterChart 开始。所有 XYChart\
  \ 共有的某些特性也将在 ScatterChart 部分进行说明。\n\n■ **注意** 由于 Axis 类继承自 Region，它们允许像其他任何 Region\
  \ 一样应用相同的 CSS 元素。这使得可以高度自定义 Axis 实例。\n\n使用 ScatterChart\n\nScatterChart 类的实例用于渲染数据，其中每个数据项在二维区域中表示为一个符号。如前所述，我们将渲染一个包含三个数据系列的图表，分别代表\
  \ Java、C 和 C++ 的 TIOBE 指数假设演变。我们首先展示一个简单实现的代码，然后将其优化为更有用的形式。\n\n一个简单的实现\n\n使用 ScatterChart\
  \ 的应用程序的第一个实现如清单 8-5 所示。\n\n***清单 8-5.*** 在 ScatterChart 中渲染数据的第一个实现\n\npackage\
  \ projavafx ;\n\nimport javafx.application.Application;\n\nimport javafx.collections.FXCollections;\n\
  \n\n\nimport javafx.collections.ObservableList;\n\nimport javafx.scene.Scene;\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 8 章 ■ 在 JavaFX 中创建图表\n\nimport\
  \ javafx.scene.chart.NumberAxis;\n\nimport javafx.scene.chart.ScatterChart;\n\n\
  import javafx.scene.chart.XYChart;\n\nimport javafx.scene.chart.XYChart.Series;\n\
  \nimport javafx.scene.layout.StackPane;\n\nimport javafx.stage.Stage;\n\npublic\
  \ class ChartApp3 extends Application {\n\npublic static void main(String[] args)\
  \ {\n\nlaunch(args);\n\n}\n\n@Override\n\npublic void start(Stage primaryStage)\
  \ {\n\nNumberAxis xAxis = new NumberAxis();\n\nNumberAxis yAxis = new NumberAxis();\n\
  \nScatterChart scatterChart = new ScatterChart(xAxis, yAxis);\n\nscatterChart.setData(getChartData());\n\
  \nprimaryStage.setTitle(\"ScatterChart\");\n\nStackPane root = new StackPane();\n\
  \nroot.getChildren().add(scatterChart);\n\nprimaryStage.setScene(new Scene(root,\
  \ 400, 250));\n\nprimaryStage.show();\n\n}\n\nprivate ObservableList<XYChart.Series<Integer,\
  \ Double>>getChartData() {\n\ndouble javaValue = 17.56;\n\ndouble cValue = 17.06;\n\
  \ndouble cppValue = 8.25;\n\nObservableList<XYChart.Series<Integer, Double>>answer\
  \ = FXCollections.observableArrayList(); Series<Integer, Double> java = new Series<>();\n\
  \nSeries<Integer, Double> c = new Series<>();\n\nSeries<Integer, Double> cpp = new\
  \ Series<>();\n\nfor (int i = 2011; i < 2021; i++) {\n\njava.getData().add(new XYChart.Data(i,\
  \ javaValue));\n\njavaValue = javaValue + 4 * Math.random() - 2;\n\nc.getData().add(new\
  \ XYChart.Data(i, cValue));\n\ncValue = cValue + Math.random() - .5;\n\ncpp.getData().add(new\
  \ XYChart.Data(i, cppValue));\n\ncppValue = cppValue + 4 * Math.random() - 2;\n\n\
  }\n\nanswer.addAll(java, c, cpp);\n\nreturn answer;\n\n}\n\n}\n\n执行此应用程序将生成一个类似于图\
  \ 8-6 所示的图表。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 122](img/index-363_1.jpg)\n\
  \n第 8 章 ■ 在 JavaFX 中创建图表\n\n***图 8-6.** 散点图简单实现的结果*\n\n尽管图表显示了所需信息，但可读性并不高。我们将添加一些增强功能，但首先让我们更深入地了解代码的不同部分。\n\
