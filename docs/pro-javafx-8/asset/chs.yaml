  \n**判断舞台是否处于焦点状态**\n\n要了解你的 JavaFX 应用程序当前是否处于焦点状态（例如，按键输入是否传递给该应用程序），只需查询 `Stage`\
  \ 实例的 `focused` 属性即可。以下来自代码清单 2-1 的片段演示了这一点。\n\n```java\ntextStageF.textProperty().bind(new\
  \ SimpleStringProperty(\"focused: \")\n    .concat(stageRef.focusedProperty().asString()));\n\
  ```\n\n**控制舞台的 Z 轴顺序**\n\n如果你希望 JavaFX 应用程序显示在其他窗口之上或之下，可以分别使用 `toFront()` 和 `toBack()`\
  \ 方法。以下来自代码清单 2-1 的片段展示了如何实现这一点。\n\n```java\nButton toBackButton = new Button(\"\
  toBack()\");\ntoBackButton.setOnAction(e -> stageRef.toBack());\n\nButton toFrontButton\
  \ = new Button(\"toFront()\");\ntoFrontButton.setOnAction(e -> stageRef.toFront());\n\
  ```\n\n再次注意，使用 lambda 表达式如何增强了代码的可读性。从片段的第一行可以清晰地看出，创建了一个名为 `toBackButton` 的按钮，其上显示文本\
  \ `\"toBack()\"`。第二行定义了当对该按钮执行操作时（即点击按钮），舞台将被发送到后台。\n\n如果不使用 lambda 表达式，第二行将被替换为对匿名内部类的调用，如下所示：\n\
  \n```java\ntoBackButton.setOnAction(new EventHandler<javafx.event.ActionEvent>()\
  \ {\n    @Override public void handle(javafx.event.ActionEvent e) {\n        stageRef.toBack();\n\
  \    }\n})\n```\n\n这种方法不仅需要更多代码，而且不允许 Java 运行时优化调用，可读性也差得多。\n\n**关闭舞台并检测其关闭事件**\n\
  \n如下方来自代码清单 2-1 的代码片段所示，你可以通过 `Stage` 的 `close()` 方法以编程方式关闭它。当 `stageStyle` 设置为无装饰或透明时，这一点尤为重要，因为窗口系统提供的关闭按钮将不存在。\n\
  \n```java\nButton closeButton = new Button(\"close()\");\ncloseButton.setOnAction(e\
  \ -> stageRef.close());\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
