  \ 发起，并作为开源 Groovy 模块进行开发。Groovy 领域的知名专家 Russel Winder 已将其更新为适用于 Java 8。GroovyFX\
  \ 的主页位于 GitHub 上：[`groovyfx-project.github.com/`](http://groovyfx-project.github.com/)。\n\
  \n使用 GroovyFX 编写代码，而不是直接针对 JavaFX API 编码，其好处包括：\n\n• *构建器模式*：GroovyFX 为所有主要的 JavaFX\
