  \n在此示例中，我们使用了简化的属性格式，通过一个泛型类型为 Owner 的 SimpleObjectProperty 在对象初始化时创建。它提供了获取属性、获取和设置值的公共方法，默认值为\
  \ Owner.NONE，表示不显示任何棋子。\n\n为了创建棋子的样式，我们在构造函数中使用了条件绑定，以便在 owner 发生变化时更改样式。对于 WHITE\
  \ 棋子，我们使用从白色到灰色再到黑色的径向渐变（模拟阴影）。对于 BLACK 棋子，我们使用从白色快速过渡到黑色的径向渐变（模拟高光）。\n\n\n\n当所有者（owner）为\
