  \n第 4 章 ■ 属性和绑定\n\n•   一个 `SimpleIntegerProperty` 对象（例如 `intProperty` 和 `otherProperty`）持有一个\
  \ `int` 值。该值可以通过 `get()`、`set()`、`getValue()` 和 `setValue()` 方法进行操作。`get()` 和 `set()`\
  \ 方法使用原始 `int` 类型执行操作。`getValue()` 和 `setValue()` 方法使用 `Integer` 包装类型。\n\n•   你可以向\
  \ `intProperty` 添加和移除 `InvalidationListener` 对象。\n\n•   你可以向 `intProperty` 添加和移除\
  \ `ChangeListener` 对象。\n\n•   另一个 `Property` 对象（例如 `otherProperty`）可以绑定到 `intProperty`。当这种情况发生时，`otherProperty`\
  \ 会接收 `intProperty` 的值。\n\n•   当为 `intProperty` 设置新值时，任何附加到其上的对象都会收到通知。如果该对象已被移除，则不会发送通知。\n\
  \n•   收到通知时，`InvalidationListener` 对象仅被告知哪个对象正在发送通知，并且该对象仅被识别为 `Observable`。\n\n\
  •   收到通知时，`ChangeListener` 对象除了收到发送通知的对象外，还会被告知另外两条信息——`oldValue` 和 `newValue`。发送通知的对象被识别为\
  \ `ObservableValue`。\n\n•   对于像 `otherProperty` 这样的绑定属性，我们无法从输出中判断它何时或如何收到 `intProperty`\
  \ 值变更的通知。但是，我们可以推断它一定知道了变更，因为当我们询问 `otherProperty` 的值时，我们得到的是 `intProperty` 的最新值。\n\
  \n■ **注意** 尽管这个激励示例使用了 `Integer` 属性，但类似的示例也可以使用基于 `Boolean`、`Long`、`Float`、`Double`、`String`\
  \ 和 `Object` 类型的属性。在 JavaFX 属性和绑定框架中，当接口为具体类型进行扩展或实现时，总是针对 `Boolean`、`Integer`、`Long`、`Float`、`Double`、`String`\
  \ 和 `Object` 类型进行的。\n\n这个示例让我们注意到了 JavaFX 属性和绑定框架的一些关键接口和概念：包括 `Observable` 及其关联的\
  \ `InvalidationListener` 接口，`ObservableValue` 及其关联的 `ChangeListener` 接口，允许我们直接操作\
  \ `SimpleIntegerProperty` 对象值的 `get()`、`set()`、`getValue()` 和 `setValue()` 方法，以及允许我们通过将\
  \ `SimpleIntegerProperty` 对象从属于另一个 `SimpleIntegerProperty` 对象来放弃对其值的直接操作的 `bind()`\
  \ 方法。\n\n在下一节中，我们将更详细地向你介绍这些以及 JavaFX 属性和绑定框架的其他一些关键接口和概念。\n\n理解关键接口和概念\n\n图 4-1\
  \ 是一个 UML 图，展示了 JavaFX 属性和绑定框架的关键接口。它包含了一些你在上一节中已经见过的接口，以及一些你尚未见过的接口。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图片 67](img/index-152_1.png)\n\n第 4 章 ■ 属性和绑定\n\n***图 4-1.** JavaFX 属性和绑定框架的关键接口*\n\
  \n■ **注意** 我们在 UML 图中没有显示接口的完全限定名称。这些接口分布在四个包中：`javafx.beans`、`javafx.beans.binding`、`javafx.beans.property`\
  \ 和 `javafx.beans.value`。你可以通过查阅 JavaFX API 文档或使用你喜欢的 IDE 的“查找类”功能轻松找出哪个接口属于哪个包。\n\
  \n理解 Observable 接口\n\n层次结构的根是 `Observable` 接口。你可以向一个 `Observable` 对象注册 `InvalidationListener`\
  \ 对象以接收*失效*事件。你已经在上一节的激励示例中看到过从一种 `Observable` 对象（`SimpleIntegerProperty` 对象 `intProperty`）触发的失效事件。\n\
  \n当调用 `set()` 或 `setValue()` 方法将底层值从一个 `int` 更改为另一个不同的 `int` 时，就会触发该事件。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 ■ 属性和绑定\n\n■ **注意** 如果你连续多次使用相同的值调用 setter，JavaFX 属性和绑定框架中 `Property` 接口的任何实现都只会触发一次失效事件。\n\
  \n失效事件触发的另一个来源是 `Binding` 对象。你还没有见过 `Binding` 对象的示例，但本章后半部分会有大量 `Binding` 对象。目前我们只需注意，`Binding`\
  \ 对象可能会变得无效，例如，当调用其 `invalidate()` 方法时，或者，正如我们将在本章后面展示的，当其某个依赖项触发失效事件时。\n\n■ **注意**\
  \ 如果 `Binding` 对象连续多次变得无效，JavaFX 属性和绑定框架中 `Binding` 接口的任何实现都只会触发一次失效事件。\n\n理解 ObservableValue\
  \ 接口\n\n层次结构中的下一个是 `ObservableValue` 接口。它只是一个具有值的 `Observable`。其 `getValue()` 方法返回其值。我们在激励示例中对\
  \ `SimpleIntegerProperty` 对象调用的 `getValue()` 方法可以被认为来自此接口。你可以向一个 `ObservableValue`\
  \ 对象注册 `ChangeListener` 对象以接收*变更*事件。\n\n你在上一节的激励示例中看到了变更事件的触发。当变更事件触发时，`ChangeListener`\
  \ 会收到另外两条信息：`ObservableValue` 对象的旧值和新值。\n\n■ **注意** 如果你连续多次使用相同的值调用 setter，JavaFX\
  \ 属性和绑定框架中 `ObservableValue` 接口的任何实现都只会触发一次变更事件。\n\n\n\n区分失效事件和变更事件，是为了让 JavaFX\
  \ 属性和绑定框架能够支持*惰性求值*。我们通过查看示例中的三行代码来展示这一点：\n\notherProperty.bind(intProperty);\n\n\
  intProperty.set(7168);\n\nSystem.out.println(\"otherProperty.get() = \" + otherProperty.get());\n\
  \n当调用 `intProperty.set(7168)` 时，它会向 `otherProperty` 触发一个失效事件。收到此失效事件后，`otherProperty`\
  \ 仅记录其值不再有效这一事实。它不会立即通过查询 `intProperty` 的值来重新计算自己的值。重新计算会在稍后调用 `otherProperty.get()`\
  \ 时执行。想象一下，如果我们在前面的代码中不是只调用一次 `intProperty.set()`，而是多次调用；`otherProperty` 仍然只重新计算一次其值。\n\
  \n■ **注意** `ObservableValue` 接口并不是 `Observable` 的唯一直接子接口。`Observable` 还有另外四个直接子接口，它们位于\
  \ `javafx.collections` 包中：`ObservableList`、`ObservableMap`、`ObservableSet` 和 `ObservableArray`，并分别对应\
  \ `ListChangeListener`、`MapChangeListener`、`SetChangeListener` 和 `ArrayChangeListener`\
  \ 作为回调机制。这些 JavaFX 可观察集合将在第 7 章“集合与并发”中介绍。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 ■ 属性与绑定\n\n理解 WritableValue 接口\n\n这可能是整章中最简单的小节，因为 `WritableValue` 接口确实如其表面所见般简单。其目的是将\
  \ `getValue()` 和 `setValue()` 方法注入到该接口的实现中。\n\n在 JavaFX 属性和绑定框架中，`WritableValue`\
  \ 的所有实现类也都实现了 `ObservableValue`，因此你可以认为 `WritableValue` 的价值仅在于提供 `setValue()` 方法。\n\
  \n你已经在示例中看到了 `setValue()` 方法的工作方式。\n\n理解 ReadOnlyProperty 接口\n\n`ReadOnlyProperty`\
  \ 接口向其实现中注入了两个方法。`getBean()` 方法应返回包含该 `ReadOnlyProperty` 的对象，如果它不包含在任何对象中，则返回 `null`。`getName()`\
  \ 方法应返回 `ReadOnlyProperty` 的名称，如果该 `ReadOnlyProperty` 没有名称，则返回空字符串。\n\n包含对象和名称提供了关于\
  \ `ReadOnlyProperty` 的*上下文*信息。属性的上下文信息在失效事件的传播或值的重新计算中不扮演任何直接角色。但是，如果提供了这些信息，它们会在一些外围计算中被考虑。\n\
  \n在我们的示例中，`intProperty` 是在没有任何上下文信息的情况下构建的。如果我们使用完整的构造函数为其提供一个名称：\n\nintProperty\
  \ = new SimpleIntegerProperty(null, \"intProperty\", 1024);\n\n输出将包含属性名称：\n\nintProperty\
  \ = IntegerProperty [name: intProperty, value: 1024]\n\n理解 Property 接口\n\n现在我们来到了关键接口层次结构的底部。`Property`\
  \ 接口的父接口包括我们迄今为止研究过的所有四个接口：`Observable`、`ObservableValue`、`ReadOnlyProperty` 和 `WritableValue`。\n\
  \n因此，它继承了所有这些接口的方法。它还提供了五个自己的方法：`void bind(ObservableValue<? extends T> observableValue);`\n\
  \n`void unbind();`\n\n`boolean isBound();`\n\n`void bindBidirectional(Property<T>\
  \ tProperty);`\n\n`void unbindBidirectional(Property<T> tProperty);`\n\n你在上一节的示例中已经看到了其中两个方法的工作方式：`bind()`\
  \ 和 `unbind()`。\n\n调用 `bind()` 会在 `Property` 对象和 `ObservableValue` 参数之间创建一个*单向绑定*或依赖关系。一旦它们进入这种关系，在\
  \ `Property` 对象上调用 `set()` 或 `setValue()` 方法将导致抛出 `RuntimeException`。在 `Property`\
  \ 对象上调用 `get()` 或 `getValue()` 方法将返回 `ObservableValue` 对象的值。当然，更改 `ObservableValue`\
  \ 对象的值将使 `Property` 对象失效。调用 `unbind()` 会释放 `Property` 对象可能存在的任何现有单向绑定。如果单向绑定生效，`isBound()`\
  \ 方法返回 `true`；否则返回 `false`。\n\n调用 `bindBidirectional()` 会在调用者 `Property` 和参数 `Property`\
  \ 之间创建一个*双向绑定*。请注意，与接受 `ObservableValue` 参数的 `bind()` 方法不同，`bindBidirectional()`\
  \ 方法接受一个 `Property` 参数。只有两个 `Property` 对象可以双向绑定在一起。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 ■ 属性与绑定\n\n一旦它们进入这种关系，在任一 `Property` 对象上调用 `set()` 或 `setValue()` 方法都会导致两个对象的值都被更新。调用\
  \ `unbindBidirectional()` 会释放调用者和参数之间可能存在的任何现有双向绑定。清单 4-2 中的程序展示了一个简单的双向绑定工作示例。\n\
  \n***清单 4-2.*** BidirectionalBindingExample.java\n\nimport javafx.beans.property.SimpleStringProperty;\n\
  \nimport javafx.beans.property.StringProperty;\n\npublic class BidirectionalBindingExample\
  \ {\n\npublic static void main(String[] args) {\n\nSystem.out.println(\"Constructing\
  \ two StringProperty objects.\");\n\nStringProperty prop1 = new SimpleStringProperty(\"\
  \");\n\nStringProperty prop2 = new SimpleStringProperty(\"\");\n\nSystem.out.println(\"\
  Calling bindBidirectional.\");\n\nprop2.bindBidirectional(prop1);\n\nSystem.out.println(\"\
  prop1.isBound() = \" + prop1.isBound());\n\nSystem.out.println(\"prop2.isBound()\
  \ = \" + prop2.isBound());\n\nSystem.out.println(\"Calling prop1.set(\\\"prop1 says:\
  \ Hi!\\\")\");\n\nprop1.set(\"prop1 says: Hi!\");\n\nSystem.out.println(\"prop2.get()\
  \ returned:\");\n\nSystem.out.println(prop2.get());\n\nSystem.out.println(\"Calling\
  \ prop2.set(prop2.get() + \\\"\\\\nprop2 says: Bye!\\\")\"); prop2.set(prop2.get()\
  \ + \"\\nprop2 says: Bye!\");\n\nSystem.out.println(\"prop1.get() returned:\");\n\
  \nSystem.out.println(prop1.get());\n\n}\n\n}\n\n在这个例子中，我们创建了两个名为 `prop1` 和 `prop2`\
  \ 的 `SimpleStringProperty` 对象，在它们之间创建了一个双向绑定，然后对两个属性都调用了 `set()` 和 `get()` 方法。\n\
  \n当我们运行清单 4-2 中的程序时，控制台会打印以下输出：\n\nConstructing two StringProperty objects.\n\n\
  Calling bindBidirectional.\n\nprop1.isBound() = false\n\nprop2.isBound() = false\n\
  \nCalling prop1.set(\"prop1 says: Hi!\")\n\nprop2.get() returned:\n\nprop1 says:\
  \ Hi!\n\nCalling prop2.set(prop2.get() + \"\\nprop2 says: Bye!\")\n\nprop1.get()\
  \ returned:\n\nprop1 says: Hi!\n\nprop2 says: Bye!\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 ■ 属性与绑定\n\n■ **警告** 每个 `Property` 对象一次最多只能有一个活动的单向绑定。它可以拥有任意数量的双向绑定。`isBound()`\
  \ 方法仅适用于单向绑定。在单向绑定已经生效的情况下，使用不同的 `ObservableValue` 参数第二次调用 `bind()` 将解除现有绑定并用新绑定替换它。\n\
  \n理解 Binding 接口\n\n`Binding` 接口定义了四个方法，揭示了该接口的意图。一个 `Binding` 对象是一个 `ObservableValue`，其有效性可以通过\
  \ `isValid()` 方法查询，并通过 `invalidate()` 方法设置。\n\n它有一个依赖项列表，可以通过 `getDependencies()`\
  \ 方法获取。最后，`dispose()` 方法表示该绑定将不再被使用，并且其使用的资源可以被清理。\n\n\n\n从上述对 Binding 接口的简要描述中，我们可以推断出它代表一种*具有多重依赖关系的单向绑定*。我们设想，每个依赖项都是一个\
  \ ObservableValue，Binding 会注册到该依赖项上以接收失效事件。当调用 get() 或 getValue() 方法时，如果绑定已失效，则会重新计算其值。\n\
  \nJavaFX 属性和绑定框架并未提供任何实现 Binding 接口的具体类。不过，它提供了多种轻松创建自定义 Binding 对象的方法：你可以扩展框架中的抽象基类；可以使用工具类\
  \ `Bindings` 中的一组静态方法，基于现有的常规 Java 值（即不可观察值）、属性和绑定来创建新绑定；还可以使用各种属性和绑定类中提供的一组方法，这些方法构成了流畅接口\
  \ API，用于创建新绑定。我们将在本章后面的“创建绑定”一节中详细介绍这些工具方法和流畅接口 API。现在，我们先通过扩展 `DoubleBinding` 抽象类来展示绑定的第一个示例。\n\
  \n清单 4-3 中的程序使用绑定来计算矩形的面积。\n\n***清单 4-3.*** RectangleAreaExample.java\n\nimport\
  \ javafx.beans.binding.DoubleBinding;\n\nimport javafx.beans.property.DoubleProperty;\n\
  \nimport javafx.beans.property.SimpleDoubleProperty;\n\npublic class RectangleAreaExample\
  \ {\n\npublic static void main(String[] args) {\n\nSystem.out.println(\"构造 x，初始值为\
  \ 2.0。\");\n\nfinal DoubleProperty x = new SimpleDoubleProperty(null, \"x\", 2.0);\n\
  \nSystem.out.println(\"构造 y，初始值为 3.0。\");\n\nfinal DoubleProperty y = new SimpleDoubleProperty(null,\
  \ \"y\", 3.0);\n\nSystem.out.println(\"创建绑定 area，依赖项为 x 和 y。\");\n\nDoubleBinding\
  \ area = new DoubleBinding() {\n\nprivate double value;\n\n{\n\nsuper.bind(x, y);\n\
  \n}\n\n@Override\n\nprotected double computeValue() {\n\nSystem.out.println(\"调用了\
  \ computeValue()。\");\n\nreturn x.get() * y.get();\n\n}\n\n};\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 ■ 属性和绑定\n\nSystem.out.println(\"area.get() = \" + area.get());\n\nSystem.out.println(\"\
  area.get() = \" + area.get());\n\nSystem.out.println(\"将 x 设置为 5\");\n\nx.set(5);\n\
  \nSystem.out.println(\"将 y 设置为 7\");\n\ny.set(7);\n\nSystem.out.println(\"area.get()\
  \ = \" + area.get());\n\n}\n\n}\n\n在匿名内部类中，我们调用了父类 `DoubleBinding` 中的受保护方法 `bind()`，告知父类我们希望监听\
  \ `DoubleProperty` 对象 x 和 y 的失效事件。\n\n最后，我们在父类 `DoubleBinding` 中实现了受保护的抽象方法 `computeValue()`，以便在需要重新计算时执行实际计算。\n\
  \n运行清单 4-3 中的程序时，控制台会输出以下内容：\n\n构造 x，初始值为 2.0。\n\n构造 y，初始值为 3.0。\n\n创建绑定 area，依赖项为\
  \ x 和 y。\n\n调用了 computeValue()。\n\narea.get() = 6.0\n\narea.get() = 6.0\n\n将 x 设置为\
  \ 5\n\n将 y 设置为 7\n\n调用了 computeValue()。\n\narea.get() = 35.0\n\n请注意，当我们连续两次调用 area.get()\
  \ 时，computeValue() 只被调用了一次。\n\n■ **注意** `DoubleBinding` 抽象类包含一个默认的 `dispose()` 实现（为空）和一个默认的\
  \ `getDependencies()` 实现（返回空列表）。为了使此示例成为正确的 Binding 实现，我们应该重写这两个方法以使其行为正确。\n\n现在，你已经牢固掌握了\
  \ JavaFX 属性和绑定框架的关键接口和概念，接下来我们将展示这些通用接口如何特化为特定类型的接口，并在特定类型的抽象类和具体类中实现。\n\n关键接口的类型特定特化\n\
  \n\n\n上一节中我们并未强调这一事实，因为我们认为省略它不会影响那里的解释，但除了 `Observable` 和 `InvalidationListener`\
  \ 之外，其余接口都是带有类型参数 `<T>` 的泛型接口。本节我们将探讨这些泛型接口如何特化为特定类型：`Boolean`、`Integer`、`Long`、`Float`、`Double`、`String`\
  \ 和 `Object`。同时，我们还将研究框架中的一些抽象类和具体类，并探索每个类的典型使用场景。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 ■ 属性和绑定\n\n■ **注意** 这些接口也针对 `List`、`Map` 和 `Set` 存在特化版本，它们用于处理可观察集合。我们将在第\
  \ 7 章介绍可观察集合。\n\n类型特定接口的通用主题\n\n尽管这些泛型接口并非以完全相同的方式特化，但存在一个通用主题：\n\n• `Boolean` 类型被直接特化。\n\
  \n• `Integer`、`Long`、`Float` 和 `Double` 类型通过 `Number` 超类型进行特化。\n\n• `String` 类型通过\
  \ `Object` 类型进行特化。\n\n这一主题存在于所有关键接口的类型特定特化中。例如，我们来看 `ObservableValue<T>` 接口的子接口：\n\
  \n• `ObservableBooleanValue` 继承 `ObservableValue<Boolean>`，并额外提供一个方法：\n\n• `boolean\
  \ get();`\n\n• `ObservableNumberValue` 继承 `ObservableValue<Number>`，并额外提供四个方法：\n\
  \n• `int intValue();`\n\n• `long longValue();`\n\n• `float floatValue();`\n\n• `double\
  \ doubleValue();`\n\n• `ObservableObjectValue<T>` 继承 `ObservableValue<T>`，并额外提供一个方法：\n\
  \n• `T get();`\n\n• `ObservableIntegerValue`、`ObservableLongValue`、`ObservableFloatValue`\
  \ 和 `ObservableDoubleValue` 继承 `ObservableNumberValue`，每个都额外提供一个返回相应原始类型值的 `get()`\
  \ 方法。\n\n• `ObservableStringValue` 继承 `ObservableObjectValue<String>`，并继承其返回 `String`\
  \ 的 `get()` 方法。\n\n请注意，我们在示例中一直使用的 `get()` 方法是在类型特定的 `ObservableValue` 子接口中定义的。类似地，我们在示例中一直使用的\
  \ `set()` 方法是在类型特定的 `WritableValue` 子接口中定义的。\n\n这种派生层次结构的一个实际结果是：任何数值属性都可以在任何其他数值属性或绑定上调用\
  \ `bind()`。实际上，任何数值属性上的 `bind()` 方法的签名都是 `void bind(ObservableValue<? extends Number>\
  \ observable);`，并且任何数值属性和绑定都可以赋值给该泛型参数类型。清单 4-4 中的程序展示了不同特定类型的数值属性可以相互绑定。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
