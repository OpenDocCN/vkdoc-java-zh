  \ 端点检索和读取 JSON 数据，并将结果转换为 ListView 是非常容易的。在下一节中，我们将演示针对 XML 响应的类似过程。\n\nXML 响应格式\n\
  \n\n\nXML 格式在 Java 平台中得到了广泛应用。因此，多年前 Java 就已实现了基于 XML 操作的标准。Java 平台标准版内置了多种 XML\
  \ 工具，我们可以在 JavaFX 中直接使用这些 API 和工具，无需任何外部依赖。在本节中，我们首先使用 DOM 处理器来解析我们人工构建的 XML 响应。接着，我们使用\
  \ JAXB 标准来自动获取 Java 对象。\n\n将应用程序从 JSON 输入改为 XML 输入，只需修改 `getObservableList` 方法。新的实现如清单\
  \ 11-8 所示。\n\n***清单 11-8.*** 从基于 XML 的响应中获取问题\n\n```java\nObservableList<Question>\
  \ getObservableList() throws IOException, ParserConfigurationException, SAXException\
  \ {\n\n    ObservableList<Question> answer = FXCollections.observableArrayList();\n\
  \n    InputStream inputStream = this.getClass().getResourceAsStream(\"/stackoverflow.xml\"\
  );\n    DocumentBuilderFactory dbf = DocumentBuilderFactory.newInstance();\n\n \
  \   DocumentBuilder db = dbf.newDocumentBuilder();\n\n    Document doc = db.parse(inputStream);\n\
  \n    NodeList questionNodes = doc.getElementsByTagName(\"item\");\n\n    int count\
  \ = questionNodes.getLength();\n\n    for (int i = 0; i < count; i++) {\n\n    \
  \    Question question = new Question();\n\n        Element questionNode = (Element)\
  \ questionNodes.item(i);\n\n        NodeList childNodes = questionNode.getChildNodes();\n\
  \n        int cnt2 = childNodes.getLength();\n\n        for (int j = 0; j < cnt2;\
  \ j++) {\n\n            Node me = childNodes.item(j);\n\n            String nodeName\
  \ = me.getNodeName();\n\n            if (\"creation_date\".equals(nodeName)) {\n\
  \n                question.setTimestamp(Long.parseLong(me.getTextContent()));\n\n\
  \            }\n\n            if (\"owner\".equals(nodeName)) {\n\n            \
  \    question.setOwner(me.getTextContent());\n\n            }\n\n            if\
  \ (\"title\".equals(nodeName)) {\n\n                question.setQuestion(me.getTextContent());\n\
  \n            }\n\n        }\n\n        answer.add(question);\n\n    }\n\n    return\
  \ answer;\n\n}\n```\n\n同样，本节的目的并非全面介绍 DOM API。互联网上有大量资源提供了关于 XML（特别是 DOM）的详细信息。\n\
  \n为了能够编译清单 11-8 中的代码，需要添加以下 import 语句。\n\n```java\nimport javax.xml.parsers.DocumentBuilder;\n\
  import javax.xml.parsers.DocumentBuilderFactory;\nimport javax.xml.parsers.ParserConfigurationException;\n\
  import org.w3c.dom.Document;\nimport org.w3c.dom.Node;\nimport org.w3c.dom.NodeList;\n\
  import org.xml.sax.SAXException;\n```\n\n在深入讲解代码细节之前，我们先在图 11-6 中展示此示例的输出结果。\n\n\
  ![Image 166](img/index-506_1.jpg)\n\n***图 11-6.** 使用 XML 响应的问题应用程序结果*\n\n清单 11-8\
  \ 中的代码与清单 11-7 中的代码有一些相似之处。两者都处理文本格式（JSON 或 XML）的数据，并将数据转换为 Question 实例。在清单 11-8\
  \ 中，我们使用 DOM 方法来检查接收到的响应。\n\n使用以下代码获取 `org.w3c.dom.Document` 实例。\n\n```java\nInputStream\
  \ inputStream = this.getClass().getResourceAsStream(\"/stackoverflow.xml\");\nDocumentBuilderFactory\
  \ dbf = DocumentBuilderFactory.newInstance();\nDocumentBuilder db = dbf.newDocumentBuilder();\n\
  Document doc = db.parse(inputStream);\n```\n\n在此例中，我们基于 `InputStream` 创建了一个 `Document`。该\
  \ `InputStream` 是从人工创建的文件中获取的。我们也可以从 `URLConnection` 创建 `InputStream`，并将此 `InputStream`\
  \ 传递给 `db.parse()` 方法。更简单的方法是，`DocumentBuilder.parse` 方法也接受一个包含（REST）端点 URL 的 `String`\
  \ 参数。\n\n这表明，尽管本例中我们使用的是包含问题的静态文件，但在使用真实的 REST 端点时，我们也可以轻松地使用相同的代码。\n\n\n现在可以对生成的文档进行查询了。从清单\
  \ 11-6 所示的 XML 响应中，我们了解到每个问题都包含在名为“item”的 XML 元素中。我们使用以下代码来获取这些 XML 元素的列表。\n\nNodeList\
  \ questionNodes = doc.getElementsByTagName(\"item\");\n\n然后，我们遍历这个列表，并通过检查各个 XML\
  \ 元素中的子节点来获取问题特定的字段。最后，我们将得到的问题添加到名为 answer 的 ObservableList<Question> 对象中。\n\n\
  这种方法相当简单，但我们仍然需要手动进行一些 XML 解析。虽然这提供了灵活性，但随着数据结构的复杂性增加，解析会变得更加困难且更容易出错。\n\n幸运的是，Java\
  \ 标准版 API 包含了一些工具，可以直接将 XML 转换为 Java 对象。这些 API 的规范由 JAXB 标准定义，可在 javax.xml.bind\
  \ 包中找到。将 XML 数据转换为 Java 对象的过程称为解组（unmarshalling）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 11 章 ■ 访问 Web 服务\n\n现在，我们修改示例，使其混合使用 DOM 解析和 JAXB 解组。同样，我们只更改 getObservableList()\
  \ 方法。修改后的实现如清单 11-9 所示。\n\n***清单 11-9.*** 结合 XML 解析与 JAXB\n\nObservableList<Question>\
  \ getObservableList() throws IOException, ParserConfigurationException, SAXException\
  \ {\n\nObservableList<Question> answer = FXCollections.observableArrayList();\n\n\
  InputStream inputStream = this.getClass().getResourceAsStream(\"/stackoverflow.xml\"\
  ); DocumentBuilderFactory dbf = DocumentBuilderFactory.newInstance();\n\nDocumentBuilder\
  \ db = dbf.newDocumentBuilder();\n\nDocument doc = db.parse(inputStream);\n\nNodeList\
  \ questionNodes = doc.getElementsByTagName(\"item\");\n\nint count = questionNodes.getLength();\n\
  \nfor (int i = 0; i < count; i++) {\n\nElement questionNode = (Element) questionNodes.item(i);\n\
  \nDOMSource source = new DOMSource(questionNode);\n\nfinal Question question = (Question)\
  \ JAXB.unmarshal(source, Question.class);\n\nanswer.add(question);\n\n}\n\nreturn\
  \ answer;\n\n}\n\n这种方法与清单 11-8 中使用的方法之间的唯一区别在于对各个问题的解析。我们不再使用 DOM 解析来获取各个问题的特定字段，而是使用\
  \ JAXB 中的 unmarshal 方法。JAXB 规范提供了极大的灵活性和配置选项，而 JAXB.unmarshal 方法只是一个便捷方法。然而，在许多情况下，这个方法已经足够使用。JAXB.unmarshal\
  \ 方法接受两个参数：输入源和转换结果对应的类。\n\n我们希望将 XML 源转换为 Question 类的实例，但 JAXB 框架如何知道如何映射这些字段呢？在许多情况下，映射是直接的，不需要更改现有代码，但在其他情况下，映射会稍微复杂一些。幸运的是，存在一个包含注解的完整包，我们可以使用它来帮助\
  \ JAXB 确定 XML 与 Java 对象之间的转换。\n\n为了使清单 11-9 中的代码能够工作，我们对 Question 类进行了一些小的修改。Question\
