  \ = {\n\nTimeline(at (3 s) {radius -> 0}).play()\n\n}\n\n}\n\ncontent = circles\n\
  \n}\n\n}\n\nnew Timeline {\n\ncycleCount = INDEFINITE\n\nautoReverse = true\n\n\
  keyFrames = for (circle <- circles) yield at (40 s) {\n\nSet(\n\ncircle.centerX\
