  \n第 11 章 ■ 访问 Web 服务\n\n尽管 JSON 响应中的数据与 XML 响应中的数据包含相同的信息，但格式当然截然不同。JSON 和 XML 在互联网上都被广泛使用，大量\
  \ Web 服务提供这两种格式的响应。\n\n根据用例和开发者的不同，一种格式可能比另一种更受青睐。通常，JavaFX 应用程序应能处理这两种格式，因为它们需要连接第三方数据，而\
  \ JavaFX 开发者并不总能影响后端使用的数据格式。\n\n■ **注意** 许多应用程序支持多种格式，通过指定 HTTP “accept” 头，客户端可以在不同格式之间进行选择。\n\
  \n在下一个示例中，我们将展示如何检索和解析 StackExchange 搜索 API 中使用的 JSON 响应。\n\nJSON 响应格式\n\nJSON 是互联网上非常流行的格式，尤其是在使用\
  \ JavaScript 解析传入数据的 Web 应用程序中。JSON 数据相当紧凑，并且或多或少具有可读性。\n\nJava 中存在多种用于读写 JSON 数据的工具。自\
  \ 2013 年 6 月 Java 企业版 7 发布以来，Java 中有了一个标准规范，用于描述如何读写 JSON 数据。该 Java 规范定义为 JSR 353，更多信息可访问\
  \ [`www.jcp.org/en/jsr/detail?id=353`](http://www.jcp.org/en/jsr/detail?id=353)。\n\
  \nJSR 353 仅定义了一个规范，实际工作仍需一个实现来完成。在我们的示例中，我们将使用 jsonp，它是 JSR 353 的参考实现。该参考实现可在 [`jsonp.java.net/`](https://jsonp.java.net/)\
  \ 找到。不过，我们鼓励读者尝试他们自己喜欢的 JSR 353 实现。\n\n尽管 JSR 353 是 Java 企业版体系的一部分，但其参考实现也能在 Java\
  \ 标准版环境中运行。它没有外部依赖。\n\n现在，我们将包含两个虚假问题的硬编码列表替换为通过 StackExchange REST API 获取的真实问题。我们保留现有代码，但修改\
