  \ 方法的最后两个参数设置为零，但这两个参数可用于指定播放 `AudioClip` 时的声像和优先级。我们将在下一节讨论这两个属性。\n\nAudioClip\
  \ 总结\n\n在前面的示例中，我们没有展示 `AudioClip` 的两个属性：声像（pan）和优先级（priority）。`pan` 属性允许你移动剪辑的中心。将其设置为\
  \ –1.0 会将剪辑完全移至左声道，设置为 1.0 则完全移至右声道。默认设置 0.0 保持剪辑的原始状态。与仅调整左右声道相对音量的 `balance` 属性不同，`pan`\
  \ 属性实际上会重新混合两个声道。这允许你将左声道的部分或全部内容引入右声道，反之亦然。只有在左右声道不同的真实立体声效果上使用 `pan` 属性才有意义。在单声道声音上设置\
  \ `pan` 与调整 `balance` 的效果完全相同，而 `balance` 的计算成本要低得多。你可以使用 `setPan` 和 `getPan` 方法设置或检索剪辑当前的声像设置，该属性通过\
  \ `panProperty` 方法暴露。\n\n\n\n你可以选择为你的 `AudioClip` 分配优先级。这是一个 `IntegerProperty`，用于指定音效的相对优先级。数字越大，表示你分配给该\
  \ `AudioClip` 的重要性越高。如果系统播放的 `AudioClip` 数量超过了其处理能力，系统将根据优先级来决定停止哪些剪辑。系统能同时播放的剪辑数量没有精确规定，也无法在当前版本的\
  \ JavaFX 中查询。因此，如果你一次性播放大量 `AudioClip`（例如在游戏中），你应该考虑为你的音效分配优先级。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 136](img/index-386_1.jpg)\n\n第 9 章 ■ 使用媒体类\n\n`AudioClip` 非常适合播放短小、低延迟的音效。如果你需要播放歌曲或背景音乐，JavaFX\
  \ 媒体类是更好的选择。\n\n使用媒体\n\nJavaFX 媒体类通过将音频和视频文件简单地视为两种不同类型的媒体，使得处理它们变得非常容易。因此，播放音频或视频文件的基本功能只需几行（几乎相同的）代码即可完成。另一方面，该\
  \ API 也具有一定的深度，允许你超越简单的播放功能，从而增强用户的体验。在本章的剩余部分，我们将从简单的音频播放开始，然后向你展示如何利用此 API 的强大功能，将你的媒体应用提升到新的水平。\n\
  \nJavaFX 媒体类位于 `javafx.scene.media` 包中。主要有三个类——`Media`、`MediaPlayer` 和 `MediaView`——以及许多辅助类。`Media`\
  \ 类封装了要播放的音频或视频资源。标识此资源的 URI 的字符串表示形式作为其唯一参数传递给 `Media` 构造函数。`Media` 对象公开了一些属性，用于描述媒体的宽度和高度（处理视频时）、其持续时间，以及两个与错误处理相关的属性。构造完成后，`Media`\
  \ 对象可以传递给 `MediaPlayer` 实例的构造函数，该实例提供了一组用于控制音频或视频资源播放的方法。最后，`MediaPlayer` 可以传递给\
  \ `MediaView` 节点的构造函数，以便在场景图中显示视频。这三个类之间的关系如图 9-3 所示。2\n\n***图 9-3.** JavaFX 8 媒体类*\n\
  \n2 当然，入侵者最初会遭到恐惧和不信任。在一个出人意料的剧情转折中，他们被证明是一群能干且乐于助人的人。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\n需要重申的是，在这三个类中，只有 `MediaView` 是一个节点，因此能够被插入到场景图中。这意味着我们在图 9-3\
  \ 中展示与 `MediaPlayer` 类相关的一组视觉控件时，稍微有些自由发挥。实际上，你需要创建自己的按钮和滑块，并将它们连接到 `MediaPlayer`\
  \ 的方法，以便用户能够控制应用中媒体的播放。在本章接下来的示例中，我们有很多机会向你展示如何做到这一点。让我们通过创建一个播放音频文件的应用程序，开始深入探讨这些媒体类。\n\
  \n播放音频\n\n播放音频文件只涉及 `Media` 和 `MediaPlayer` 类。没有视频需要处理，因此不需要 `MediaView`。清单 9-6\
  \ 展示了使用 JavaFX 播放音频所需的最少代码。\n\n***清单 9-6.*** 一个播放音频文件的非常简单的应用程序\n\n```java\npublic\
  \ class AudioPlayer1 extends Application {\n\n    public static void main(String[]\
  \ args) {\n        launch(args);\n    }\n\n    @Override\n    public void start(Stage\
  \ primaryStage) {\n        URL resource = getClass().getResource(\"resources/keeper.mp3\"\
  );\n        Media media = new Media(resource.toString());\n        MediaPlayer mediaPlayer\
  \ = new MediaPlayer(media);\n        mediaPlayer.play();\n\n        primaryStage.setTitle(\"\
  Audio Player 1\");\n        primaryStage.setWidth(200);\n        primaryStage.setHeight(200);\n\
  \        primaryStage.show();\n    }\n}\n```\n\n这个简单的应用程序首先找到其 jar 文件中打包的音频文件资源的\
  \ URL。\n\n资源 URL 的字符串形式作为源参数传递给 `Media` 构造函数。`Media` 类也可以像 `AudioClip` 一样从互联网或本地文件系统加载资源。一旦\
  \ `Media` 对象构建完成，它就被用来构建一个新的 `MediaPlayer`，并调用 `MediaPlayer` 的 `play` 方法开始播放。这个应用程序没有实际的场景要显示，因此将舞台的宽度和高度设置为\
  \ 200，以便生成的窗口可见。如果你的音频需求仅仅是加载一个声音文件并播放它，那么你的工作就完成了。然而，清单 9-6 中的代码还不是生产质量的代码。\n\n\
  ■ **注意** 一旦创建了 `MediaPlayer`，其 `Media` 对象就不能更改。如果你想更改当前正在播放的歌曲或视频，必须为新的 `Media`\
  \ 对象创建一个新的 `MediaPlayer`。多个 `MediaPlayer` 可以共享一个 `Media` 对象。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\n错误处理\n\n`Media` 类有两个属性，`error` 和 `onError`，可以帮助你处理播放期间发生的任何错误。你可以通过调用\
  \ `getError` 方法手动检查错误，如果发生错误，该方法将从底层的 `errorProperty` 返回一个 `MediaException` 对象。你可以通过向\
  \ `Media` 类的 `errorProperty` 附加一个 `InvalidationListener` 或 `ChangeListener` 来监听错误。为了方便起见，你可以简单地将一个\
  \ `Runnable` 传递给 `setOnError` 方法以达到相同的结果。如果发生错误，将调用 `Runnable` 的 `run` 方法。由于 `run`\
  \ 方法是在 JavaFX 应用程序线程上调用的，因此从该方法更新场景图是安全的。\n\n`Media` 实例很少单独使用。通常，它们会作为构造函数参数传递给\
  \ `MediaPlayer`。`MediaPlayer` 类复制了 `Media` 的 `error` 和 `onError` 属性，并且所有 `Media`\
  \ 错误都会被转发到封闭的 `MediaPlayer` 实例的 `error` 属性和 `onError` 回调。因此，你只需要使用 `MediaPlayer`\
  \ 的错误属性，就可以在一个地方捕获来自 `MediaPlayer` 及其底层 `Media` 对象的错误。\n\n异常，包括 `MediaException`，也可能在构造\
  \ `Media` 或 `MediaPlayer` 实例期间发生。显然，这些异常在对象的 `error` 属性中是不可用的，因为该对象尚不存在。如果你想在错误处理方面做到彻底，除了设置\
  \ `MediaPlayer` 的 `onError` 处理器之外，还应该将构造函数包裹在 `try-catch` 块中。这种错误处理技术在清单 9-7 中进行了演示。\n\
  \n***清单 9-7.*** 使用媒体类进行错误处理\n\n```java\ntry {\n    final URL resource = getClass().getResource(\"\
  resources/keeper.mp3\");\n    final Media media = new Media(resource.toString());\n\
  \    final MediaPlayer mediaPlayer = new MediaPlayer(media);\n    mediaPlayer.setOnError(()\
  \ -> {\n        final String errorMessage = media.getError().getMessage();\n   \
  \     ...\n    });\n    mediaPlayer.play();\n} catch (RuntimeException re) {\n \
  \   // 处理 Media 和 MediaPlayer 构造错误...\n}\n```\n\n显示元数据\n\n\n\n大多数媒体文件格式都具备嵌入*元数据*的能力，这些数据用于描述歌曲或视频。例如，MP3\
  \ 文件包含 ID3 标签，可用于标识艺术家、专辑、曲目编号，甚至歌曲的发行年份。许多 MP3 文件还嵌入了艺术家图片、专辑封面或徽标（例如播客等）。JavaFX\
  \ 的 Media 类会读取这些元数据，并以键/值对的 ObservableMap 形式呈现给开发者。键是标识元数据的字符串，值是对象，通常是字符串或图像。\n\
  \n虽然无法保证任何给定媒体文件中存在哪些元数据，但有几个字段非常常见：艺术家、标题、专辑和年份。此外，如果文件的元数据中嵌入了任何图像，Media 类将允许你使用“image”键访问它。清单\
  \ 9-8 展示了如何在创建新的 Media 对象时添加接收元数据通知的功能。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\n在此清单中，我们通过互联网 URL 加载了一集 Java Posse 播客。在创建 Media 实例后，我们立即通过调用\
  \ getMetadata 方法获取其元数据映射的引用。然后，我们向元数据映射附加一个 MapChangeListener，用于检查是否有新的键/值对被添加到映射中。\n\
  \n如果有，新的键和值会被传递给 handleMetadata 辅助方法，该方法会检查这是否是我们感兴趣处理的元数据。这就是清单 9-8 中以粗体显示的代码。\n\
  \n***清单 9-8.*** 监听来自 Media 类的元数据\n\nprivate Label artist;\n\nprivate Label album;\n\
  \nprivate Label title;\n\nprivate Label year;\n\nprivate ImageView albumCover;\n\
