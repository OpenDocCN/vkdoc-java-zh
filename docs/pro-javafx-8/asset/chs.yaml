  Two_1\", \"Zero_1\");\n\n}\n\nprivate static class MyListener implements ListChangeListener<String>\
  \ {\n\n@Override\n\npublic void onChanged(Change<? extends String> change) {\n\n\
  System.out.println(\"\\t 列表 = \" + change.getList());\n\nSystem.out.println(prettyPrint(change));\n\
  \n}\n\nprivate String prettyPrint(Change<? extends String> change) {\n\nStringBuilder\
  \ sb = new StringBuilder(\"\\t 变更事件数据:\\n\");\n\nint i = 0;\n\nwhile (change.next())\
  \ {\n\nsb.append(\"\\t\\t 游标 = \")\n\n.append(i++)\n\n.append(\"\\n\");\n\nfinal\
  \ String kind =\n\nchange.wasPermutated() ? \"permutated\" :\n\nchange.wasReplaced()\
  \ ? \"replaced\" :\n\nchange.wasRemoved() ? \"removed\" :\n\nchange.wasAdded() ?\
  \ \"added\" : \"none\";\n\nsb.append(\"\\t\\t 变更类型: \")\n\n.append(kind)\n\n.append(\"\
  \\n\");\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 ■ 集合与并发\n\n\
  sb.append(\"\\t\\t 影响范围: [\")\n\n.append(change.getFrom())\n\n.append(\", \")\n\n\
  .append(change.getTo())\n\n.append(\"]\\n\");\n\nif (kind.equals(\"added\") || kind.equals(\"\
  replaced\")) {\n\nsb.append(\"\\t\\t 新增大小: \")\n\n.append(change.getAddedSize())\n\
  \n.append(\"\\n\");\n\nsb.append(\"\\t\\t 新增子列表: \")\n\n.append(change.getAddedSubList())\n\
  \n.append(\"\\n\");\n\n}\n\nif (kind.equals(\"removed\") || kind.equals(\"replaced\"\
  )) {\n\nsb.append(\"\\t\\t 移除大小: \")\n\n.append(change.getRemovedSize())\n\n.append(\"\
  \\n\");\n\nsb.append(\"\\t\\t 移除内容: \")\n\n.append(change.getRemoved())\n\n.append(\"\
  \\n\");\n\n}\n\nif (kind.equals(\"permutated\")) {\n\nStringBuilder permutationStringBuilder\
  \ = new StringBuilder(\"[\");\n\nfor (int k = change.getFrom(); k < change.getTo();\
  \ k++) {\n\npermutationStringBuilder.append(k)\n\n.append(\"->\")\n\n.append(change.getPermutation(k));\n\
  \nif (k < change.getTo() - 1) {\n\npermutationStringBuilder.append(\", \");\n\n\
  }\n\n}\n\npermutationStringBuilder.append(\"]\");\n\nString permutation = permutationStringBuilder.toString();\n\
  \nsb.append(\"\\t\\t 排列映射: \").append(permutation).append(\"\\n\");\n\n}\n\n}\n\n\
  return sb.toString();\n\n}\n\n}\n\n}\n\n在前面的示例中，我们触发了可观察列表中的四种离散变更。由于 `ObservableList`\
  \ 上的方法不会触发排列事件，我们使用了 `FXCollections` 类中的 `sort()` 工具方法来产生排列效果。关于 `FXCollections`，我们将在后续章节中进一步讨论。我们触发了两次替换事件，一次通过\
  \ `set()`，另一次通过 `setAll()`。`setAll()` 的妙处在于，它实际上在一次操作中完成了 `clear()` 和 `addAll()`，并且只生成一个变更事件。\n\
