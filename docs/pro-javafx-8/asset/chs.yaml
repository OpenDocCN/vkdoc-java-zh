  \ added: true`\n\n`Was removed: false`\n\n`Element added: Second`\n\n`Element removed:\
  \ null`\n\n`set = [Second, First, Third]`\n\n`Change event data:`\n\n`Was added:\
  \ true`\n\n`Was removed: false`\n\n`Element added: Third`\n\n`Element removed: null`\n\
