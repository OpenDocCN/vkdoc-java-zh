  \ 创建用户界面\n\n使用脚本或控制器属性进行事件处理\n\n在上一节中，我们向您介绍了如何使用控制器的方法作为 FXML 文件中节点的事件处理器。JavaFX\
  \ 还提供了另外两种在 FXML 文件中设置事件处理器的方法。一种方法是使用脚本。任何兼容 JSR-223 的基于 `javax.script` 的脚本引擎都可以使用。用于脚本的语言必须在\
  \ FXML 文件的顶部指定。要使用 Oracle JDK 8 附带的 Nashorn JavaScript 引擎，必须在 FXML 文件的顶部包含以下处理指令：\n\
  \n<?language javascript?>\n\n`fx:script` 元素用于引入脚本。支持内联脚本和外部文件脚本。\n\n以下是内联脚本：\n\n\
  <fx:script>\n\nfunction actionHandler(event) {\n\nwebView.getEngine().load(address.getText());\n\
  \n}\n\n</fx:script>\n\n外部脚本采用以下形式：\n\n<fx:script source=\"myscript.js\"/>\n\nFXML\
  \ 文件中任何具有 `fx:id` 的节点都可以通过其 `fx:id` 名称从脚本环境中访问。如果 FXML 文件有控制器，则该控制器可作为名为 `controller`\
  \ 的变量使用。在 `fx:script` 部分中声明的变量也可用作 FXML 文件其余部分中属性的变量。要将 `fx:script` 部分中定义的 `actionHandler(event)`\
  \ 函数用作事件处理器，可以按如下方式指定：\n\n<TextField fx:id=\"address\"\n\nonAction=\"actionHandler(event)\"\
  \n\n■ **注意** 如果事件处理器不需要检查事件对象，则可以使用不带参数的函数；或者使用带一个参数的函数作为事件处理器属性的值，例如 `onAction`。如果调用带一个参数的函数，则必须将系统提供的\
  \ `event` 变量传递给它。\n\n清单 3-29 和 3-30 中的 `ScriptingExample` 演示了使用脚本进行事件处理。\n\n***清单\
  \ 3-29.*** ScriptingExample.fxml\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
  \n<?language javascript?>\n\n<?import javafx.geometry.Insets?>\n\n<?import javafx.scene.control.Button?>\n\
  \n<?import javafx.scene.control.TextField?>\n\n<?import javafx.scene.layout.HBox?>\n\
