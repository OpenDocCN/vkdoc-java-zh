  \ SceneBuilder 2.0 中编辑，这是一个用于编辑 FXML 文件的开源工具。\n\n• JavaFX SceneBuilder 是一个用于指定 JavaFX\
  \ UI 的高效工具。您可以将容器、控件和其他 JavaFX 节点添加到 FXML 文件的内容中。\n\n• 您可以设置控制器并定义场景中各个节点的 fx:id。\n\
