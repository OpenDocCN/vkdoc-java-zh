  \ `Question` 对象可以通过 `CellDataFeatures` 实例获取，该实例作为 lambda 表达式中的唯一参数传入。由于我们要显示时间戳，因此返回一个\
  \ `SimpleStringProperty`，其内容设置为指定 `Question` 对象的时间戳。\n\n对于其他 `TableColumn`（包含 `owner`\
  \ 和 `question` 字段的列），也必须使用相同的技术。\n\n最后，我们需要将这些列添加到 `TableView` 中：\n\n```java\ntableView.getColumns().addAll(dateColumn,\
  \ ownerColumn, questionColumn);\n```\n\n运行此示例将产生如图 11-7 所示的视觉输出。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 167](img/index-516_1.jpg)\n\n第 11 章 ■ 访问 Web 服务\n\n***图 11-7.** 使用 TableView\
  \ 渲染问题列表*\n\n这个示例为了一个简单的表格需要大量样板代码，但幸运的是，JavaFX 平台提供了一种减少代码量的方法。手动为每一列设置 `CellValueFactory`\
  \ 实例很繁琐，但我们可以使用另一种方法，即利用 JavaFX 属性。清单 11-16 包含了主类中 `start` 方法的修改版本，其中我们利用了 JavaFX\
  \ 属性概念。\n\n***清单 11-16.*** 基于 JavaFX 属性在列中渲染数据\n\n```java\n@Override\npublic void\
  \ start(Stage primaryStage) throws IOException {\n    TableView<Question> tableView\
  \ = new TableView<>();\n    tableView.setItems(getObservableList());\n    TableColumn<Question,\
  \ String> dateColumn = new TableColumn<>(\"Date\");\n    TableColumn<Question, String>\
  \ ownerColumn = new TableColumn<>(\"Owner\");\n    TableColumn<Question, String>\
  \ questionColumn = new TableColumn<>(\"Question\");\n    dateColumn.setCellValueFactory(new\
  \ PropertyValueFactory<>(\"timestampString\"));\n    ownerColumn.setCellValueFactory(new\
  \ PropertyValueFactory<>(\"owner\"));\n    questionColumn.setCellValueFactory(new\
  \ PropertyValueFactory<>(\"question\"));\n    questionColumn.setPrefWidth(350);\n\
  \    tableView.getColumns().addAll(dateColumn, ownerColumn, questionColumn);\n \
  \   StackPane root = new StackPane();\n    root.getChildren().add(tableView);\n\
  \    Scene scene = new Scene(root, 500, 300);\n    primaryStage.setTitle(\"StackOverflow\
  \ Table\");\n    primaryStage.setScene(scene);\n    primaryStage.show();\n}\n```\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 11 章 ■ 访问 Web 服务\n\n这段代码明显比上一个示例中的代码更短。我们实际上将\n\
  \n```java\ndateColumn.setCellValueFactory((CellDataFeatures<Question, String> cdf)\
  \ -> {\n    Question q = cdf.getValue();\n    return new SimpleStringProperty(getTimeStampString(q.getTimestamp()));\n\
  });\n```\n\n替换为\n\n\n\n`dateColumn.setCellValueFactory(new PropertyValueFactory<>(\"\
  timestampString\"));` 对于 `ownerColumn` 和 `questionColumn` 也是如此。\n\n我们使用 `javafx.scene.control.cell.PropertyValueFactory<S,T>(String\
  \ name)` 的实例来定义每个单元格中应渲染哪些具体数据。\n\n`PropertyValueFactory` 会查找具有指定名称的 JavaFX 属性，并在调用时返回该属性的\
  \ `ObservableValue`。如果找不到具有该名称的属性，JavaDoc 会说明如下。\n\n*在此示例中，“firstName”字符串用作对 Person\
  \ 类类型（即 TableView 项列表的类类型）中假设的 firstNameProperty() 方法的引用。此外，此方法必须返回一个 Property 实例。如果找到满足这些要求的方法，则\
  \ TableCell 将使用此 ObservableValue 填充。此外，TableView 将自动向返回的值添加一个观察者，以便 TableView 能够观察到任何触发的更改，从而使单元格立即更新。*\n\
  \n*如果不存在匹配此模式的方法，则会回退尝试调用 get<property>() 或 is<property>()（即上述示例中的 getFirstName()\
  \ 或 isFirstName()）。*\n\n*如果存在匹配此模式的方法，则从此方法返回的值会被包装在 ReadOnlyObjectWrapper 中，并返回给\
  \ TableCell。然而，在这种情况下，这意味着 TableCell 将无法观察 ObservableValue 的更改（就像上述第一种方法中的情况一样）。*\n\
  \n由此可知，JavaFX 属性是在 TableView 中渲染信息的首选方式。到目前为止，我们使用了带有 JavaBean getter 和 setter 方法的\
  \ POJO Question 类，作为在 ListView 和 TableView 中显示的值对象。\n\n尽管前面的示例在不使用 JavaFX 属性的情况下也能工作，但根据\
  \ JavaDoc 所述，我们现在修改 Question 类，为 owner 信息使用 JavaFX 属性。`timeStamp` 和 `text` 字段也可以修改为使用\
  \ JavaFX 属性，但这个混合示例表明 JavaDoc 中描述的回退场景确实有效。修改后的 Question 类如清单 11-17 所示。\n\n***清单\
  \ 11-17.*** 为作者字段使用 JavaFX 属性的 Question 类实现\n```java\npackage projavafx;\n\nimport\
  \ java.text.SimpleDateFormat;\n\nimport java.util.Date;\n\nimport javafx.beans.property.SimpleStringProperty;\n\
  \nimport javafx.beans.property.StringProperty;\n\nimport javax.xml.bind.annotation.XmlAccessType;\n\
  \nimport javax.xml.bind.annotation.XmlAccessorType;\n```\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
