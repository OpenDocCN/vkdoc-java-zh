  现在你已经对使用 Stage 和 Scene 类、几个 Node 子类以及 CSS 样式有了一些经验，我们将向你展示如何处理 JavaFX 程序运行时可能发生的事件。\n\
  \n**处理输入事件**\n\n到目前为止，我们已经向你展示了一些事件处理的示例。例如，我们使用 `onAction` 事件处理程序在点击按钮时执行代码。我们还使用了\
  \ Stage 类的 `onCloseRequest` 事件处理程序，在外部请求关闭 Stage 时执行代码。在本节中，我们将探索 JavaFX 中更多可用的事件处理程序。\n\
  \n**概览鼠标、键盘、触摸和手势事件及处理程序**\n\nJavaFX 程序中发生的大多数事件都与用户操作输入设备（如鼠标、键盘或多点触摸屏）有关。为了查看可用的事件处理程序及其关联的事件对象，我们再次查看\
  \ JavaFX API 文档。首先，导航到 `javafx.scene.Node` 类，查找以字母“on”开头的属性。这些属性代表了 JavaFX 中所有节点通用的事件处理程序。以下是\
  \ JavaFX 8 API 中这些事件处理程序的列表：\n\n• 键盘事件处理程序：onKeyPressed, onKeyReleased, onKeyTyped\n\
  \n• 鼠标事件处理程序：onMouseClicked, onMouseDragEntered, onMouseDragExited,\n\nonMouseDragged,\
  \ onMouseDragOver, onMouseDragReleased, onMouseEntered, onMouseExited,\n\nonMouseMoved,\
  \ onMousePressed, onMouseReleased\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 章 ■ 在 JavaFX 中创建用户界面\n\n• 拖放处理程序\n\n:onDragDetected, onDragDone, onDragDropped,\
  \ onDragEntered, onDragExited, onDragOver\n\n• 触摸处理程序：onTouchMoved, onTouchPressed,\
  \ onTouchReleased, onTouchStationary\n\n• 手势处理程序：onRotate, onRotationFinished, onRotationStarted,\
  \ onScroll,\n\nonScrollStarted, onScrollFinished, onSwipeLeft, onSwipeRight, onSwipeUp,\
  \ onSwipeDown,\n\nonZoom, onZoomStarted, onZoomFinished\n\n这些属性中的每一个都定义了一个方法，当特定的输入事件发生时调用该方法。对于键盘事件处理程序，如\
  \ JavaFX API 文档所示，该方法的参数是一个 `javafx.scene.input.KeyEvent` 实例。鼠标事件处理程序的方法参数是一个 `javafx.scene.input.MouseEvent`。触摸处理程序使用一个\
  \ `javafx.scene.input.TouchEvent` 实例，而当手势事件发生时，处理事件的方法参数是一个 `javafx.scene.input.GestureInput`\
  \ 实例。\n\n**理解 KeyEvent 类**\n\n查看 JavaFX API 文档中关于 `KeyEvent` 类的部分，你会发现它包含几个方法，其中一个常用的是\
  \ `getCode()`。`getCode()` 方法返回一个 `KeyCode` 实例，代表按下时导致该事件的键。查看 JavaFX API 文档中的 `javafx.scene.input.KeyCode`\
  \ 类，会发现存在大量常量，代表国际键盘集上的按键。另一种找出按下了哪个键的方法是调用 `getCharacter()` 方法，该方法返回一个字符串，代表与按下的键关联的\
  \ Unicode 字符。\n\n`KeyEvent` 类还允许你通过分别调用 `isAltDown()`、`isControlDown()`、`isMetaDown()`\
  \ 或 `isShiftDown()` 方法来查看事件发生时 Alt、Ctrl、Meta 和/或 Shift 键是否被按下。\n\n**理解 MouseEvent\
  \ 类**\n\n\n\n查看 JavaFX API 文档中的 `MouseEvent` 类，你会发现它提供的方法比 `KeyEvent` 多得多。与 `KeyEvent`\
  \ 类似，`MouseEvent` 也包含 `isAltDown()`、`isControlDown()`、`isMetaDown()` 和 `isShiftDown()`\
  \ 方法，以及 `source` 字段，该字段是对事件来源对象的引用。\n\n此外，它还有几个方法可以精确定位鼠标事件发生的各种坐标空间，所有坐标均以像素为单位表示：\n\
  \n• `getX()` 和 `getY()` 返回鼠标事件相对于发生该事件的节点原点的水平和垂直位置。\n\n• `getSceneX()` 和 `getSceneY()`\
  \ 返回鼠标事件相对于场景（Scene）的水平和垂直位置。\n\n• `getScreenX()` 和 `getScreenY()` 返回鼠标事件相对于屏幕的水平和垂直位置。\n\
  \n以下是一些其他常用的方法：\n\n• `isDragDetect()` 如果检测到拖拽事件则返回 `true`。\n\n• `getButton()`、`isPrimaryButtonDown()`、`isSecondaryButtonDown()`、`isMiddleButtonDown()`\
  \ 和 `getClickCount()` 包含关于点击了哪个按钮以及点击了多少次的信息。\n\n在本章稍后的内容中，你将通过 ZenPong 示例程序获得创建键盘和鼠标事件处理程序的经验。为了继续为你准备\
  \ ZenPong 示例，我们现在向你展示如何为放置在场景中的节点添加动画效果。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 章 ■ 在 JavaFX 中创建用户界面\n\n理解 TouchEvent 类\n\n随着越来越多的设备配备触摸屏，对触摸事件的内置支持使 JavaFX\
  \ 成为一个用于创建利用多点触控功能的应用程序的先进平台。这里所说的多点触控是指平台能够在单个事件集中跟踪多个触摸点。\n\n`TouchEvent` 类提供了\
  \ `getTouchPoint()` 方法，该方法返回一个特定的触摸点。该 `TouchPoint` 上的方法与 `MouseEvent` 上的方法类似，例如，你可以通过调用\
  \ `getX()` 和 `getY()`、或 `getSceneX()` 和 `getSceneY()`、或 `getScreenX()` 和 `getScreenY()`\
  \ 来获取相对和绝对位置。\n\n`TouchEvent` 类还允许开发者获取关于属于同一事件集的其他触摸点的信息。通过调用 `getEventSetId()`，你可以获得该组\
  \ `TouchEvent` 实例的唯一标识符，并且可以通过调用 `getTouchPoints()` 获取该事件集中所有触摸点的列表，该方法返回一个 `TouchPoint`\
  \ 实例的列表。\n\n理解 GestureEvent 类\n\n除了处理多点触控事件，JavaFX 还支持手势事件的创建和分发。手势越来越多地用于智能手机、平板电脑、触摸屏和其他输入设备。它们提供了一种执行操作的直观方式，例如，让用户滑动手指。`GestureEvent`\
  \ 类目前有四个子类，每个子类代表一种特定的手势：`RotateEvent`、`ScrollEvent`、`SwipeEvent` 和 `ZoomEvent`。所有这些事件都拥有与\
  \ `MouseEvent` 类似的方法，用于获取操作的位置——`getX()` 和 `getY()`、`getSceneX()` 和 `getSceneY()`，以及\
  \ `getScreenX()` 和 `getScreenY()` 方法。\n\n特定的子类都允许检索更详细的事件类型。例如，`SwipeEvent` 可以是向右或向左、向上或向下的滑动。此信息通过调用\
  \ `GestureEvent` 上的 `getEventType()` 方法获得。\n\n为场景中的节点添加动画\n\nJavaFX 的优势之一在于能够轻松创建图形丰富的用户界面。这种丰富性部分体现在能够为场景中的节点添加动画效果。其核心思想是，为节点添加动画涉及在一段时间内更改其属性的值。为节点添加动画的示例包括以下内容。\n\
  \n• 当鼠标进入节点边界时逐渐增大节点的大小，当鼠标离开节点边界时逐渐减小节点的大小。请注意，这需要缩放节点，这被称为变换（transform）。\n\n•\
  \ 逐渐增加或减少节点的不透明度，以分别实现淡入或淡出效果。\n\n• 逐渐改变节点中改变其位置的属性值，使其从一个位置移动到另一个位置。例如，在创建像 Pong\
  \ 这样的游戏时，这非常有用。\n\n一个相关的功能是检测节点何时与另一个节点发生碰撞。\n\n为节点添加动画涉及使用位于 `javafx.animation`\
  \ 包中的 `Timeline` 类。根据动画的需求和个人偏好，可以使用以下两种通用技术之一：\n\n• 直接创建 `Timeline` 类的实例，并提供指定特定时间点上的值和动作的关键帧（key\
  \ frames）。\n\n• 使用 `javafx.animation.Transition` 子类来定义特定的过渡效果并将其与节点关联。过渡效果的示例包括使节点在一段时间内沿定义路径移动，以及在一段时间内旋转节点。这些过渡类中的每一个都扩展了\
  \ `Timeline` 类。\n\n我们现在将介绍这些技术，并展示每个技术的示例，从第一个列出的技术开始。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 32](img/index-60_1.jpg)\n\n第 2 章 ■ 在 JavaFX 中创建用户界面\n\n使用 Timeline 进行动画制作\n\
  \n查看 JavaFX API 文档中的 `javafx.animation` 包，你会看到在直接创建时间线时使用的三个类：`Timeline`、`KeyFrame`\
  \ 和 `Interpolator`。仔细阅读这些类的文档，然后回来，我们将向你展示一些使用它们的示例。\n\n■ **提示** 请记得查阅 JavaFX API\
  \ 文档，了解你遇到的任何新包、类、属性和方法。\n\nMetronome1 示例\n\n我们使用一个简单的节拍器示例来演示如何创建时间线。\n\n如图 2-8\
  \ 的截图所示，Metronome1 程序有一个摆锤以及四个按钮，分别用于启动、暂停、恢复和停止动画。此示例中的摆锤是一个 `Line` 节点，我们将通过在一秒内*插值*其\
  \ `startX` 属性来为该节点添加动画效果。请通过执行以下练习来尝试运行此示例。\n\n***图 2-8.** Metronome1 程序*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 章 ■ 在 JavaFX 中创建用户界面\n\n**检查 Metronome1 程序的行为**\n\n当 Metronome1 程序启动时，其外观应类似于图\
  \ 2-8 中的截图。要全面检查其行为，请执行以下步骤。\n\n1. 观察场景中的四个按钮，只有“启动”按钮是启用的。\n2. 点击“启动”。注意线条的顶部来回移动，每个方向移动需要一秒钟。同时，观察“启动”和“恢复”按钮被禁用，而“暂停”和“停止”按钮被启用。\n\
  3. 点击“暂停”，注意动画暂停。同时，观察“启动”和“暂停”按钮被禁用，而“恢复”和“停止”按钮被启用。\n4. 点击“恢复”，注意动画从暂停处恢复。\n5.\
  \ 点击“停止”，注意动画停止，并且按钮状态与程序首次启动时相同（参见步骤 1）。\n6. 再次点击“启动”，注意线条在开始动画之前会跳回其起始点（而不是像步骤\
  \ 4 中那样简单地恢复）。\n7. 点击“停止”。\n\n现在你已经体验了 Metronome1 程序的行为，让我们来了解其背后的代码。\n\n理解 Metronome1\
  \ 程序\n\n在我们讨论相关概念之前，请先查看清单 2-5 中 Metronome1 程序的代码。\n\n***清单 2-5.*** Metronome1Main.java\n\
  \npackage projavafx.metronome1.ui;\n\n\n\nimport javafx.animation.Animation;\n\n\
  import javafx.animation.Interpolator;\n\nimport javafx.animation.KeyFrame;\n\nimport\
  \ javafx.animation.KeyValue;\n\nimport javafx.animation.Timeline;\n\nimport javafx.application.Application;\n\
  \nimport javafx.beans.property.DoubleProperty;\n\nimport javafx.beans.property.SimpleDoubleProperty;\n\
  \nimport javafx.scene.Group;\n\nimport javafx.scene.Scene;\n\nimport javafx.scene.control.Button;\n\
  \nimport javafx.scene.layout.HBox;\n\nimport javafx.scene.paint.Color;\n\nimport\
  \ javafx.scene.shape.Line;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 章 ■ 在 JavaFX 中创建用户界面\n\nimport javafx.stage.Stage;\n\nimport javafx.util.Duration;\n\
  \npublic class Metronome1Main extends Application {\n\nDoubleProperty startXVal\
  \ = new SimpleDoubleProperty(100.0);\n\nButton startButton;\n\nButton pauseButton;\n\
  \nButton resumeButton;\n\nButton stopButton;\n\nLine line;\n\nTimeline anim;\n\n\
  public static void main(String[] args) {\n\nApplication.launch(args);\n\n}\n\n@Override\n\
  \npublic void start(Stage stage) {\n\nanim = new Timeline(\n\nnew KeyFrame(new Duration(0.0),\
  \ new KeyValue(startXVal, 100.)),\n\nnew KeyFrame(new Duration(1000.0), new KeyValue(startXVal,\
  \ 300., Interpolator.LINEAR))\n\n);\n\nanim.setAutoReverse(true);\n\nanim.setCycleCount(Animation.INDEFINITE);\n\
  \nline = new Line(0, 50, 200, 400);\n\nline.setStrokeWidth(4);\n\nline.setStroke(Color.BLUE);\n\
  \nstartButton = new Button(\"start\");\n\nstartButton.setOnAction(e -> anim.playFromStart());\n\
  \npauseButton = new Button(\"pause\");\n\npauseButton.setOnAction(e -> anim.pause());\n\
  \nresumeButton = new Button(\"resume\");\n\nresumeButton.setOnAction(e -> anim.play());\n\
  \nstopButton = new Button(\"stop\");\n\nstopButton.setOnAction(e -> anim.stop());\n\
  \nHBox commands = new HBox(10,\n\nstartButton,\n\npauseButton,\n\nresumeButton,\n\
