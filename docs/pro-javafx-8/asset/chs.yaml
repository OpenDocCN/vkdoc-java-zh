  \n该程序的 Model 嵌套类持有一个类型为 Worker 的 worker 字段，以及一个类型为 AtomicBoolean 的 shouldThrow 字段。worker\
  \ 字段被初始化为一个 Task<String> 的匿名子类的实例，该子类通过模拟以每项 20 毫秒的速度处理 250 个项目来实现其 call() 方法。它在\
  \ call 方法开始时以及循环的每次迭代中更新任务的属性。它在两处处理取消操作。它在每次迭代的顶部检查 isCancelled() 标志，并且还在 Thread.sleep()\
  \ 调用的 InterruptedException 处理器中检查 isCancelled() 标志。如果任务被取消，它会调用 updateValue()，然后跳出循环并快速返回。框架会忽略返回值。shouldThrow\
  \ 字段由 View 控制，用于向任务传达它应该抛出异常的信息。\n\n该程序的 View 嵌套类创建了一个简单的用户界面，顶部有一个进度条，中间有一组显示 worker\
  \ 各种属性的标签，底部有三个按钮。标签的内容绑定到 worker 的各种属性。按钮的禁用属性也绑定到 worker 的 state 属性，以便在任何时候只有相关的按钮处于启用状态。例如，程序启动时“开始”按钮是启用的，但在按下按钮且任务开始执行后，该按钮就会被禁用。类似地，“取消”和“异常”按钮仅在任务运行时才启用。\n\
