  \n第 7 章 ■ 集合与并发\n\n为避免混乱，我们在图 7-2 中省略了 java.util.Map 接口。java.util.Map 接口是 ObservableMap\
  \ 的另一个超接口。ObservableMap 接口上的以下方法允许你注册和注销 MapChangeListener：\n\n• addListener(MapChangeListener<?\
