  \n![Image 203](img/index-601_2.jpg)\n\n■ 关于作者\n\n**Dean Iverson** 从事专业软件开发已超过 15\
  \ 年。他就职于弗吉尼亚理工大学交通研究所，担任高级研究员和富客户端应用程序开发人员。他还与妻子共同创立了一家名为 Pleasing Software Solutions\
  \ 的小型软件咨询公司。\n\n**James Weaver** 是一位专注于客户端 Java 和物联网的开发人员、作者、教师和国际演讲者。他的推特账号是 [@JavaFXpert](http://@JavaFXpert)。\n\
  \nxvi\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 204](img/index-602_1.jpg)\n\
  \n**关于技术审校**\n\n**Mark Heckler** 是一位 Java 软件架构师/工程师，拥有在多种环境中的开发经验。他曾为制造业、新兴市场、零售业、医疗、电信和金融行业的关键参与者工作，并与他们合作，按时按预算开发和交付关键功能。目前，他主要与企业客户合作，在整个技术栈中使用\
  \ Java。他也抓住每一个机会参与开源开发，是 JFXtras 项目的提交者、DialogFX 和 MonologFX 的开发者、Autonomous4j 的共同开发者等等。当\
  \ Mark 不从事 Java 工作时，他喜欢在会议上以及通过 Java Jungle 网站 [(https://blogs.oracle.com/javajungle)](https://blogs.oracle.com/javajungle)、他的个人网站\
  \ [(http://www.thehecklers.org)](http://www.thehecklers.org) 和 Twitter ([@MkHeck](http://@MkHeck))\
  \ 分享他的经验。Mark 与非常善解人意的妻子、三个孩子和一条狗住在密苏里州圣路易斯市。\n\nxvii\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**致谢**\n\n写书通常是在业余时间完成的。我要感谢我的妻子 Kathleen 以及我们的孩子 Merlijn 和 Linde，允许我在晚上和周末时间坐在电脑前。我要感谢作者\
  \ Jim Weaver、Weiqi Gao、Stephen Chin 和 Dean Iverson；技术审校 Mark Heckler；以及 Apress 团队对我的信任。特别感谢我的\
  \ LodgON 同事 Joeri Sykora 和 Erwin Morrhey 在示例方面给予我的帮助。\n\nOracle 的 JavaFX 团队出色地发布了\
  \ JavaFX 8。他们的努力与 Java 社区的努力相结合，使 JavaFX 成为面向越来越多客户端的优秀平台。\n\n——Johan Vos\n\n我要感谢我的妻子龚友红，在写作过程中给予我的支持、理解和鼓励。我还要感谢作者和技术审校团队：Johan\
  \ Vos、Jim Weaver、Stephen Chin、Dean Iverson 和 Mark Heckler，让这本书成为一个有趣的项目。我与合著者们共同感谢\
  \ Oracle 的 JavaFX 团队和 Apress 的编辑团队。\n\n——Weiqi Gao\n\n献给我的妻子 Justine，以及女儿 Cassandra\
  \ 和 Priscilla，她们在我承担所有其他责任的同时支持我撰写本书。同时，非常感谢整个作者团队，包括我们的新成员 Johan Vos 和 Mark Heckler，他们为本书做出了超乎寻常的贡献。最后，衷心感谢\
  \ JavaFX 团队和 JVM 语言设计者，他们创造的技术将深刻改变我们未来设计和编写用户界面的方式。\n\n——Stephen Chin\n\n我要感谢我的家人\
  \ Sondra、Alex 和 Matt，在又一个写作项目中给予我的支持和理解。是你们让这一切成为可能。我还要感谢 Jim Weaver、Stephen Chin、Weiqi\
  \ Gao、Johan Vos 和 Mark Heckler 组成的写作和审校团队的奉献和耐心。Apress 的编辑团队一如既往地一流且极其专业。当然，如果没有\
  \ Oracle 的 JavaFX 团队中一群才华横溢的工程师的辛勤工作，这一切都不可能实现。\n\n——Dean Iverson\n\n献给我的妻子 Julie、女儿\
  \ Lori 和 Kelli、儿子 Marty，以及孙子 Kaleb 和 Jillian。感谢 Merrill 和 Barbara Bishir、Ken 和 Marilyn\
  \ Prater 以及 Walter Weaver，你们是如此出色的榜样。我将本书的贡献献给 Merrill Bishir 和 Ken Prater 的回忆。*“我将这些事告诉你们，是要叫你们在我里面有平安。在世上你们有苦难，但你们可以放心，我已经胜了世界。”（约翰福音\
  \ 16:33）*\n\n——Jim Weaver\n\nxix\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**前言**\n\n我清楚地记得，仿佛就在昨天：在 2007 年 JavaOne 大会上，我们站在 Moscone 中心的舞台中央发布了 JavaFX。我们承诺为\
  \ Java 构建一个世界级的客户端平台。在世界带着怀疑的目光注视下，在拥挤的客户端领域中，我们开始构建这个梦想。事后看来，这是一个相当雄心勃勃的目标。\n\n\
  时光飞逝，七年过去了，随着 Java SE 8 的发布，我们在兑现这一承诺方面迈出了一大步。随着愿景的展开，我们的产品计划也随之调整，以适应不断变化的 RIA\
  \ 市场以及开发者和 Java 社区告诉我们他们正在寻找的东西。作为从 JavaFX 诞生之初就参与其中，并目睹它在过去七年中发展到当前版本的人，我的感觉就像一位父母看着蹒跚学步的孩子茁壮成长。\n\
  \n\n\n詹姆斯·韦弗和斯蒂芬·钦与我一同见证了 JavaFX 的发展历程。他们多次在国际会议上发表关于 JavaFX 的演讲，并从 2007 年起就开始开发\
  \ JavaFX 并撰写相关博客。詹姆斯拥有 30 年软件开发经验，曾撰写多本 Java 相关书籍，并为《Java Magazine》和 Oracle 技术网络供稿。他还为各类客户开发了大量\
  \ JavaFX 应用程序。\n\n斯蒂芬热衷于开源技术，是 WidgetFX 和 JFXtras 的创始人。他对改进开发技术、开发流程以及敏捷开发方法同样充满热情。\n\
  \n约翰·沃斯是 LodgON 的联合创始人，拥有应用物理学博士学位，是 JavaFX 社区非常活跃的成员。他的兴趣在于 JavaFX 的企业通信领域，致力于将大型服务器世界与终端用户设备相结合。约翰用物理学类比：大统一理论将量子力学（微观）与相对论（宏观）相结合；同样，在软件领域，Java\
  \ 将 JavaFX 与 Java EE 相结合。\n\n迪恩·艾弗森是一位资深的客户端开发者，在创建优雅用户界面方面独具慧眼。他开发了 GroovyFX 库，并为\
  \ JFXtras 项目做出了贡献。他从 2007 年起就开始开发 JavaFX 并撰写相关博客。高伟奇拥有数学博士学位。他的专长在于 JavaFX 的语言层面，这体现在关于属性与绑定、集合与并发的章节中。\n\
  \n如今，Oracle 的 JavaFX 核心团队中仍有几位参与过 JavaFX 早期版本的开发者，同时也有新加入的工程师。随着我们推进 JavaFX 的开源进程，我们期待更多来自\
  \ Java 社区的开发者和专家加入我们，共同使 JavaFX 成为客户端开发的首选。\n\n能够成为这项关键软件技术的一部分，我感到无比自豪和荣幸。鉴于他们在\
  \ JavaFX 各个方面以及整个 Java 平台上丰富的经验和深厚的专业知识，我想不出还有比他们更合适的作者团队来为您呈现 JavaFX 8。希望您能喜欢这本书，并像我多年来一样，发现\
  \ JavaFX 的魅力。希望它能充分激发您的兴趣，加入 JavaFX 社区，共同将 JavaFX 打造成客户端开发的首选平台。\n\n——南迪尼·拉马尼\n\n\
  Java 客户端开发副总裁\n\n甲骨文公司\n\nxxi\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
