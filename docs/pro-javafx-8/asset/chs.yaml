  \ 程序*\n\n从上述截图可以看出，在文本字段中输入的数字确实会影响服务每次运行中处理的项目数量，这一点可以从截图中 UI 反映的消息中得到证实。\n\n■\
  \ **注意** 由于通过 JavaFX 工作线程框架启动的任务在后台线程中执行，因此在任务代码中不要访问任何活动场景非常重要。\n\n理解 **ScheduledService<V>**\
  \ 抽象类\n\n`ScheduledService<V>`抽象类扩展了`Service<V>`抽象类，并提供由服务创建的任务的重复执行。`ScheduledService<V>`类通过以下属性控制其任务的重复方式：\n\
  \n• delay（延迟）\n\n• period（周期）\n\n• backOffStrategy（退避策略）\n\n• restartOnFailure（失败时重启）\n\
  \n• maximumFailureCount（最大失败次数）\n\n• currentFailureCount（当前失败次数）\n\n• cumulativePeriod（累积周期）\n\
  \n• maximumCumulativePeriod（最大累积周期）\n\n• lastValue（最后一个值）\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 集合与并发\n\n\n\n`delay` 属性控制的是在调度服务上调用 `start()` 后，任务开始运行前必须经过的时间。`period`\
  \ 属性控制的是任务一次运行结束后，下一次运行开始前必须经过的时间。`period` 衡量的是某次运行开始与下一次运行开始之间的时间差。`delay` 和 `period`\
  \ 都是 `Duration` 类型的对象属性。如果在任务执行过程中没有发生故障条件，`ScheduledService` 将无限期地重复执行该任务。\n\n\
  如果在任务执行过程中发生了故障条件，接下来会发生什么由 `restartOnFailure` 属性控制。如果该属性为 `false`，`ScheduledService`\
  \ 将保持在 `FAILED` 状态，不再进行任何操作。\n\n如果 `restartOnFailure` 属性为 `true`，`ScheduledService`\
  \ 将重新运行该任务。失败任务的重试由 `backOffStrategy`、`maximumFailureCount` 和 `maximumCumulativePeriod`\
  \ 属性控制。退避策略本质上是一个 lambda 表达式，它接受 `ScheduledService` 作为参数并返回一个 `Duration`，该值被设置为\
  \ `cumulativePeriod` 属性的值。当自上次任务运行失败开始所经过的时间达到 `cumulativePeriod` 时，任务将开始重新运行。除了\
  \ `cumulativePeriod` 之外，`ScheduledService` 还会跟踪 `currentFailureCount` 属性，该属性表示当前连续失败运行序列中的连续失败次数。如果任务重新运行成功，`ScheduledService`\
  \ 将恢复其正常行为，即按 `period` 时间间隔运行任务。否则——也就是说，如果重新运行再次失败——`ScheduledService` 将向 `backOffStrategy`\
  \ 请求一个新的 `cumulativePeriod`，并再次尝试重新运行。如果 `currentFailureCount` 达到 `maximumFailureCount`，或者\
  \ `cumulativePeriod` 变得大于或等于 `maximumCumulativePeriod`，`ScheduledService` 将进入 `FAILED`\
  \ 状态，不再进行任何操作。\n\n系统提供了三种退避策略。它们是 `ScheduledService` 中的常量。`LINEAR_BACKOFF_STRATEGY`\
  \ 返回线性增长的、越来越长的 `Duration`。`EXPONENTIAL_BACKOFF_STRATEGY` 返回指数增长的、越来越长的 `Duration`。`LOGARITHMIC_BACKOFF_STRATEGY`\
  \ 返回对数增长的、越来越长的 `Duration`。你可以轻松定义自己的退避策略。\n\n你可以通过调用 `reset()` 和 `start()` 方法来重置并重新启动一个\
  \ `ScheduledService`。\n\n**将 JavaFX 与其他 GUI 工具包混合使用**\n\n在研究了 JavaFX 运行时的线程模型以及从\
  \ JavaFX 应用程序线程执行代码的方法之后，我们现在来看看如何让 JavaFX 与其他一些 GUI 工具包共存。JavaFX 提供了类和框架，使得将 JavaFX\
  \ 与 Swing 或 SWT 混合使用成为可能。你可以将 JavaFX 场景嵌入到 Swing 应用程序中。你可以将 JavaFX 场景嵌入到 SWT 应用程序中。你也可以将\
  \ Swing 组件嵌入到 JavaFX 应用程序中。\n\n**在 Swing 应用程序中嵌入 JavaFX 场景**\n\nJavaFX 支持通过 `javafx.embed.swing`\
  \ 包中的类将 JavaFX 场景嵌入到 Swing 应用程序中。这是一个非常小的包，包含一个用于将 JavaFX 场景嵌入到 Swing 中的公共类 `JFXPanel`，以及另一个用于将\
  \ Swing 组件嵌入到 JavaFX 应用程序中的类 `SwingNode`。`JFXPanel` 类继承自 `javax.swing.JComponent`，因此可以像任何其他\
  \ Swing 组件一样被放置在 Swing 程序中。`JFXPanel` 也可以托管一个 JavaFX 场景，因此可以将 JavaFX 场景添加到 Swing\
  \ 程序中。\n\n然而，这个嵌入了 JavaFX 场景的 Swing 程序需要同时具备 Swing 运行时（以确保其 Swing 部分正常运行）和 JavaFX\
  \ 运行时（以确保其 JavaFX 部分正常运行）。因此，它同时拥有 Swing 事件分发线程 (EDT) 和 JavaFX 应用程序线程。`JFXPanel`\
  \ 类在 Swing 和 JavaFX 之间对所有用户事件进行双向转换。\n\n\n\n正如 JavaFX 要求所有对活动场景的访问都必须在 JavaFX 应用程序线程中执行一样，Swing\
  \ 也要求所有对 Swing GUI 的访问都必须在 EDT 中执行。如果你想要从 JavaFX 事件处理器中修改 Swing 组件，或者反过来，你仍然需要进行线程切换。正如我们之前所见，在\
  \ JavaFX 应用程序线程上执行代码的正确方式是使用 `Platform.runLater()`。在 Swing EDT 上执行代码的正确方式是使用 `EventQueue.invokeLater()`。\n\
  \n在本节中，我们将把一个纯 Swing 程序转换为 Swing 和 JavaFX 混合程序。我们从清单 7-11 中的 Swing 程序开始，该程序与 ResponsiveUIExample\
  \ 程序非常相似。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 ■ 集合与并发\n\
