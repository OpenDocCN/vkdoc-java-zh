  \n• *Michael Heinrichs 的博客包含关于 JavaFX 属性和绑定的文章*：\n\n[`blog.netopyr.com/`](http://blog.netopyr.com/)\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 5 章**\n\n**在 JavaFX 中构建动态\
  \ UI 布局**\n\n\n\n*当我研究一个问题时，我从不考虑美。我只思考如何解决这个问题。但当我完成时，如果解决方案不美，我就知道它错了。*\n\n—巴克敏斯特·富勒\n\
  \nJavaFX 提供了创建动态布局的功能，使您能够轻松构建外观精美的 UI，这些 UI 可缩放至任意分辨率，并由简洁的代码支撑。您可以利用简单而优雅的绑定功能；基于\
  \ Pane 和 Region 类构建的强大自定义布局；以及内置布局，包括 HBox、VBox、AnchorPane、BorderPane、FlowPane、TilePane、StackPane、GridPane\
  \ 和 TextFlow。\n\n在本章中，我们将展示如何利用这些动态布局机制来构建零静态定位的复杂 UI。\n\n介绍 JavaFX Reversi\n\n\
  为了演示 JavaFX 中动态布局的强大功能，本章的目标是构建一个功能完备的流行 Reversi 游戏版本。Reversi 是一种策略游戏，玩家轮流在八乘八的游戏棋盘上放置黑白棋子。游戏的目标是通过包围对手的棋子并将其翻转为己方颜色，从而在棋盘上拥有最多的棋子。\n\
  \nReversi 最初由 Lewis Waterman 和 James Mollett 于 1880 年发明，在 19 世纪的英格兰获得了相当大的 popularity，并且是德国游戏制造商\
  \ Ravensburger 最早发行的游戏之一。\n\n如今它更常被称为 Othello，这是由 Pressman 公司注册商标并销售的。\n\nReversi\
  \ 的规则极其简单，这让我们可以专注于 JavaFX 布局。为了增加一点挑战性，我们将把 Reversi 带入 21 世纪，采用现代 RIA 风格的界面和完全可调整大小的布局。\n\
  \n棋盘布局与基本规则\n\nReversi 是一款回合制游戏，两名玩家分别选择白方和黑方。每位玩家有 32 枚棋子；黑方先手。\n\n初始棋盘布局在棋盘中央的交替格子中放置四枚棋子（见图\
  \ 5-1）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 68](img/index-192_1.jpg)\n\
  \n![Image 69](img/index-192_2.jpg)\n\n第 5 章 ■ 在 JavaFX 中构建动态 UI 布局\n\n***图 5-1.**\
  \ 这是 Reversi 的起始棋盘位置*\n\n黑方先手，可以在与白方棋子相邻的任意位置放置一枚棋子，前提是在同一行（垂直、水平或对角线）上有一个匹配的黑方棋子。从起始位置开始，只有四个合法走法，如图\
