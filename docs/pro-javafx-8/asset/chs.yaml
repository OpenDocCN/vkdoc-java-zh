  \n第 7 章 ■ 集合与并发\n\n在 JavaFX 应用程序中嵌入 Swing 组件\n\n`javafx.embed.swing` 包中的 `SwingNode`\
  \ 类是一个 JavaFX Node，它可以托管一个 Swing `JComponent`，因此允许你将 Swing 组件嵌入到 JavaFX 应用程序中。这为遗留的\
  \ Swing 应用程序提供了一种逐步迁移到 JavaFX 的方式。除了默认构造函数之外，专为应用程序开发者设计的其他公共方法只有一对用于获取和设置嵌入 `JComponent`\
  \ 的 getter 和 setter 方法：\n\n• `public void setContent(JComponent)`\n• `public JComponent\
  \ getContent()`\n\n\n\n当一个包含 JComponent 的 SwingNode 被附加到活动的 JavaFX 场景时，SwingNode\
  \ 类会负责将所有 JavaFX 输入和焦点事件转发给嵌入的 JComponent。只有轻量级 Swing 组件才允许嵌入到 JavaFX 应用程序中。与 Swing\
  \ 应用程序中嵌入 JavaFX 场景的情况类似，在包含嵌入 Swing 组件的 JavaFX 应用程序中，存在两个事件调度线程——JavaFX 应用程序线程和\
  \ Swing EDT，这值得我们关注。特别地，应遵循在 JavaFX 应用程序线程中执行 JavaFX 活动场景操作的要求，以及在 Swing EDT 中执行\
  \ Swing UI 操作的要求。实际应用中，这意味着如果你想在 JavaFX 事件处理器中操作 Swing UI，应通过 `EventQueue.invokeLater()`\
  \ 将其发送到 Swing EDT；如果你想在 Swing 事件监听方法中操作 JavaFX 节点，应通过 `Platform.runLater()` 将其发送到\
  \ JavaFX 应用程序线程。\n\n在本节中，我们将本章一直使用的示例程序改造成一个嵌入了自定义 Swing 组件的 JavaFX 应用程序。该自定义 Swing\
  \ 组件是 JComponent 的一个简单子类，用于绘制一个带有粗边框的矩形，边框和填充使用两种不同颜色。\n\n```java\nprivate static\
  \ class MyRectangle extends JComponent {\n\n    private final Model model;\n\n \
  \   public MyRectangle(Model model) {\n        this.model = model;\n    }\n\n  \
  \  @Override\n    public void paint(Graphics g) {\n        g.setColor(model.getStrokeColor());\n\
  \        g.fillRect(0, 0, 200, 200);\n        g.setColor(model.getFillColor());\n\
  \        g.fillRect(10, 10, 180, 180);\n    }\n\n    @Override\n    public Dimension\
  \ getMaximumSize() {\n        return new Dimension(200, 200);\n    }\n}\n```\n\n\
  SwingNode 的当前实现缺乏对其 JavaFX 容器节点布局请求的良好响应能力。我们对其进行扩展，以改进应用程序的布局：\n\n```java\nprivate\
