  \ncenterY.setValue(centerY.getValue() + vertPixels);\n\n})\n\n);\n\npongAnimation.setCycleCount(Timeline.INDEFINITE);\n\
  \n如片段所示，我们只使用了一个 KeyFrame，并且它的时间非常短（10 毫秒）。\n\n当一个 KeyFrame 拥有动作事件处理器时，该处理器中的代码（本例中同样是一个\
  \ lambda 表达式）会在该 KeyFrame 的时间到达时执行。由于此时间线的 cycleCount 是无限的，因此动作事件处理器将每 10 毫秒执行一次。此事件处理器中的代码执行两项操作：\n\
