  \n第 9 章 ■ 使用媒体类\n\n总结\n\n在本章中，你学习了 JavaFX 平台的一个非常重要的方面：媒体类。我们向你展示了如何完成以下任务。\n\n\
  • 使用 AudioClip 类播放低延迟音效。\n\n• 将 JavaFX 支持的各种媒体类型加载到 Media 对象中。\n\n• 使用 MediaPlayer\
  \ 类从 .jar 文件、磁盘以及通过网络加载播放音频文件。\n\n• 构建一个包含图形用户界面的简单媒体播放器，用于控制音频文件的播放。\n\n• 利用 MediaPlayer\
  \ 的均衡器和音频频谱功能。\n\n• 使用 MediaView 类播放视频文件。\n\n• 使用媒体标记在媒体播放期间触发事件。\n\n• 将视频播放分割到多个视口中。\n\
  \n资源\n\n有关 JavaFX Media API 的更多信息，请参阅以下资源：\n\n• [`docs.oracle.com/javase/8/javafx/media-tutorial/overview.htm`](http://docs.oracle.com/javase/8/javafx/media-tutorial/overview.htm)\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 10 章**\n\n**JavaFX 3D**\n\
  \n*我不知道是我在梦中变成了蝴蝶，还是现在的我是一只蝴蝶，在梦中变成了人。*\n\n——庄子\n\n在学习了 JavaFX 的媒体功能之后，我们现在将重点放在\
  \ JavaFX 的 3D 功能上。JavaFX 3D 图形 API 通过一个设计精良、非常规范的 Java API 提供了对现代个人计算机和设备中普遍存在的加速图形硬件的访问，该\
  \ API 与 JavaFX 的其他 API 无缝协作。\n\nJavaFX 3D 功能使 JavaFX 平台成为更多类型应用程序的合适开发平台，包括科学、工程和工业可视化；医学和科学成像；增强用户体验；娱乐以及许多其他创新应用。\n\
  \n在本章中，我们将介绍 JavaFX 3D 图形 API 的类和方法。你将学习如何将 JavaFX 3D 形状放入场景中，用灯光照亮它们，为它们赋予材质纹理，以及使用摄像机创建场景视图。你还将学习如何使用变换和动画来操作它们，以及如何使用事件与它们交互。虽然\
  \ Canvas 和 Image Ops API 不属于 JavaFX 3D 图形 API 的一部分，但本章也会对其进行介绍。\n\n概述\n\n只有当你的计算机配备了符合\
  \ JavaFX 系统要求的显卡时，JavaFX 3D 图形 API 才可用。表 10-1 列出了支持的显卡。\n\n***表 10-1.** 支持的显卡*\n\
  \nNVIDIA\n\n移动 GPU：GeForce 8M 和 100M 系列或更高版本，NVS 2100M 系列或更高版本，以及 Mobility Quadro\
  \ FX 300M 系列或更高版本\n\n桌面 GPU：GeForce 8 和 100 系列或更高版本\n\n\n\n工作站 GPU：Quadro FX 300\
  \ 系列或更高版本\n\nATI\n\n移动 GPU：Mobility Radeon HD 3000、4000 和 5000 系列\n\n桌面 GPU：Radeon\
  \ HD 2400、3000、4000、5000 和 6000 系列\n\nIntel\n\n移动 GPU：GMA 4500MHD 和 GMA HD\n\n桌面\
  \ GPU：GMA 4500 和 GMA HD\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  第 10 章 ■ JavaFX 3D\n\n你可以使用 `Platform.isSupported()` 方法并传入 `ConditionalFeature.SCENE3D`\
  \ 来测试系统是否支持 JavaFX 3D 图形 API：\n\n`boolean supported = Platform.isSupported(ConditionalFeature.SCENE3D);`\n\
  \n只有当此测试结果为 `true` 时，本章其余示例才能正常工作。\n\n作为我们首次涉足 JavaFX 3D 世界的尝试，我们来看清单 10-1 中的第一个\
  \ JavaFX 3D 示例。\n\n***清单 10-1.*** First3DExample.java\n\n`import javafx.application.Application;`\n\
  \n`import javafx.scene.Group;`\n\n`import javafx.scene.Scene;`\n\n`import javafx.scene.shape.Sphere;`\n\
  \n`import javafx.stage.Stage;`\n\n`public class First3DExample extends Application\
  \ {`\n\n`@Override`\n\n`public void start(Stage stage) throws Exception {`\n\n`stage.setTitle(\"\
  First 3D Example\");`\n\n`stage.setScene(makeScene());`\n\n`stage.show();`\n\n`}`\n\
  \n`private Scene makeScene() {`\n\n`**Sphere sphere = new Sphere(100);**`\n\n`Group\
  \ root = new Group(sphere);`\n\n`root.setTranslateX(320);`\n\n`root.setTranslateY(240);`\n\
  \n`Scene scene = new Scene(root, 640, 480);`\n\n`return scene;`\n\n`}`\n\n`public\
  \ static void main(String[] args) {`\n\n`launch(args);`\n\n`}`\n\n`}`\n\n尽管这个非常简单的程序中唯一的\
  \ 3D 元素是 `Sphere` 类（它表示三维空间中的一个球体），但它在场景中的出现会触发 JavaFX 运行时系统的几个响应。它会向场景中添加一个相机和一盏灯光。它还会赋予球体一种材质属性。相机、灯光、3D\
  \ 对象以及 3D 对象的材质属性是 *3D 模型*的基本要素。它们协同工作，将 3D 模型呈现在我们的二维屏幕上。\n\n运行清单 10-1 中的程序时，会显示图\
  \ 10-1 中的“First 3D Example”窗口。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 146](img/index-431_1.jpg)\n\n第 10 章 ■ JavaFX 3D\n\n***图 10-1.** First3DExample\
  \ 程序*\n\n3D 对象、灯光和相机存在于一个三维空间中，该空间中的每个点都由三个浮点数（*x*、*y*、*z*）组成的元组表示。这个三维空间是右手坐标系，这意味着如果你伸出右手的前三个手指，使拇指指向\
  \ *x* 正方向，食指指向 *y* 正方向，那么中指就指向 *z* 正方向。\n\n我们在程序中创建的球体位于原点 (0, 0, 0)，半径为 100。JavaFX\
  \ 运行时系统为我们添加的相机是一个平行相机，位于 *z* 轴负半轴，朝向 *xy* 平面，使得 *x* 正方向指向右侧；因此 *y* 正方向指向下方，*z*\
  \ 正方向指向屏幕内部。JavaFX 运行时系统为我们添加的灯光与相机位于同一位置，并且向所有方向均匀辐射光线。\n\n在“First 3D Example”窗口中显示的是该\
  \ 3D 模型的二维表示。并非 3D 模型中的所有内容都会显示在窗口中。例如，球体的背面是不可见的。任何位于场景边界之外的 3D 模型部分也是不可见的。确定二维表示中显示内容的过程称为*渲染*。\n\
  \n在这个渲染场景中，左上角的 *xy* 坐标为 (0, 0)，右下角的 *xy* 坐标为 (640, 480)。为了让球体出现在屏幕中央，我们将容器根节点沿\
  \ *x* 方向平移了屏幕宽度的一半，沿 *y* 方向平移了屏幕高度的一半。请注意，球体似乎被一个位于 (0, 0, *z*)（*z* 为负值）的光源照亮。\n\
  \n为了了解在具有默认相机和灯光的 3D 场景中坐标系的方向，我们可以通过引入一个字段来让球体在 *x* 方向上的位置产生动画效果：\n\n`DoubleProperty\
  \ translateX = new SimpleDoubleProperty();`\n\n在创建球体后，将球体的 `translateX` 属性绑定到该字段：\n\
  \n`sphere.translateXProperty().bind(translateX);`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 ■ JavaFX 3D\n\n在舞台显示后，调用以下 `animate()` 方法：\n\n`private void animate() {`\n\
  \n`Timeline timeline = new Timeline(`\n\n`new KeyFrame(Duration.seconds(0), new\
  \ KeyValue(translateX, -320)),`\n\n`new KeyFrame(Duration.seconds(2), new KeyValue(translateX,\
  \ 320)));`\n\n`timeline.setCycleCount(Animation.INDEFINITE);`\n\n`timeline.play();`\n\
  \n`}`\n\n当使用上述动画运行 First3DExample 程序时，你会看到球体从窗口左侧移动到窗口右侧，这证实了 *x* 坐标从左到右递增。同样，你可以让球体的\
  \ `translateY` 属性从 -240 到 240 进行动画，并看到球体从窗口顶部移动到底部，这证实了 *y* 坐标从上到下递增。在这两个动画中，球体的高光会随着球体在屏幕上移动而改变，其变化方式与灯光位于窗口中心的情况一致。理论上，你可以尝试让球体的\
  \ `translateZ` 属性从 -500 到 500 进行动画。然而，由于默认相机是平行相机，即使球体确实从 *z* 负坐标移动到 *z* 正坐标，球体的大小保持不变。你只能通过球体高光的变化来辨别其移动。当球体的\
  \ `translateZ` 属性进行动画时，可以观察到的另一个现象是，在 *z* 坐标范围的两个极端位置，球体是不可见的。\n\n最后，请注意球体的颜色。在我们的程序中，我们没有指定球体的材质。你所看到的是\
  \ JavaFX 运行时系统为球体赋予默认材质的结果。\n\n在接下来的几节中，我们将向你全面介绍 JavaFX 3D 图形 API 中可用的 3D 对象、相机、灯光和材质。\n\
  \n理解 JavaFX 3D 对象\n\nJavaFX 3D 图形 API 提供了几个表示 3D 对象的 `Node`。这些类与它们的 2D 同类一起位于 `javafx.scene.shape`\
  \ 包中。有一个公共基类 `Shape3D` 和四个具体子类：`Sphere`、`Box`、`Cylinder` 和 `MeshView`。`Sphere`、`Box`\
  \ 和 `Cylinder` 是预定义的 3D 形状，也称为 3D 图元。`MeshView` 是用户定义的形状。\n\n理解 Shape3D 基类\n\n`Shape3D`\
  \ 类是 `Node` 的子类。它包含以下公共方法：\n\n• `void setMaterial(Material)`\n\n• `Material getMaterial()`\n\
  \n• `ObjectProperty<Material> materialProperty()`\n\n• `void setDrawMode(DrawMode)`\n\
  \n• `DrawMode getDrawMode()`\n\n• `ObjectProperty<DrawMode> drawModeProperty()`\n\
  \n• `void setCullFace(CullFace)`\n\n• `CullFace getCullFace()`\n\n• `ObjectProperty<CullFace>\
  \ cullFaceProperty()`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 10\
  \ 章 ■ JavaFX 3D\n\n它们定义了三个可读写的对象属性：`material`、`drawMode` 和 `cullFace`。它们控制 `Shape3D`\
  \ 的表面材质、绘制模式和面剔除设置。`material` 属性的对象类型是 `javafx.scene.paint.Material` 类。`drawMode`\
  \ 属性的类型是枚举 `javafx.scene.shape.DrawMode`。`cullFace` 属性的类型是枚举 `javafx.scene.shape.CullFace`。\n\
  \n\n\n`Material` 类包含一组渲染属性，用于控制 3D 形状如何对光照做出反应。它赋予了 3D 形状独特的外观。我们将在后续章节中介绍 `Material`\
  \ 类的层次结构。目前，只需知道该层次结构中有一个名为 `PhongMaterial` 的具体类，并且它有一个构造函数，该构造函数接受一个 `Color` 参数作为其漫反射颜色。`DrawMode`\
  \ 枚举有两个声明符：`LINE` 和 `FILL`。`drawMode` 属性设置为 `DrawMode.LINE` 将导致 JavaFX 运行时将 3D 形状渲染为线框。`drawMode`\
  \ 属性设置为 `DrawMode.FILL` 将导致 JavaFX 运行时将 3D 形状渲染为实体。`CullFace` 枚举有三个声明符：`NONE`、`BACK`\
  \ 和 `FRONT`。它控制 JavaFX 运行时如何渲染 3D 形状的每个组成多边形（也称为*面*）。通过一个称为*面剔除*的过程，JavaFX 运行时可能会移除\
  \ 3D 形状中的某些面，使其不被渲染，从而提高 3D 模型的性能。`cullFace` 属性设置为 `CullFace.NONE` 将导致 JavaFX 运行时不执行任何面剔除。`cullFace`\
  \ 属性设置为 `CullFace.BACK` 将导致 JavaFX 运行时剔除所有背面。`cullFace` 属性设置为 `CullFace.FRONT` 将导致\
  \ JavaFX 运行时剔除所有正面。我们将在关于用户自定义 3D 形状的章节中更详细地讨论 3D 形状的面。\n\n清单 10-2 中的程序允许您试验更改 `material`、`drawMode`\
