  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 ■ JavaFX 语言与标记\n\n\
  Scala 与 JavaFX\n\nScala 是一种强大的 JVM 语言，它将函数式编程和面向对象编程的最佳特性融合于一身。与本章讨论的其他 JVM 语言一样，它直接将源文件编译为\
  \ Java 字节码，并且所有常用的现有 Java 语言库都与它兼容。此外，Scala 还增加了强大的类型安全集合、优雅的并发 Actor 模型，以及包括闭包、模式匹配和柯里化在内的函数式语言特性。\n\
  \nScala 由 Martin Odersky 于 2001 年在洛桑联邦理工学院 (EPFL) 创立，多年来不断成熟并日益流行。Odersky 实际上多年来一直是\
  \ Java 编译器幕后工作的天才，包括扩展了 Java 的 Pizza 语言以及 GJ，后者在 Sun 公司于 Java 1.3 中采用后，成为了现代 Java\
  \ 编译器的鼻祖。通过在 JVM 上开发一种全新的语言，Odersky 得以克服 Java 的若干固有设计限制。\n\n如今，Scala 被许多大型企业使用，例如\
  \ Twitter、LinkedIn、Foursquare 和 Morgan Stanley。此外，该语言的创建者还通过 Scala 语言公司 TypeSafe\
  \ 提供商业支持。而且，Scala 已被 Java 之父 James Gosling、Groovy 创建者 James Strachan 以及 JRuby 核心开发者\
  \ Charles Nutter 等人誉为 Java 的继任者。有了 Scala 语言背后的所有这些支持，它也成为为 JavaFX 开发提供卓越 API 的绝佳候选！\n\
  \n虽然你可以直接针对 JavaFX API 使用 Scala 进行编码，但最终结果看起来会与我们到目前为止编写的 Java 代码非常相似，并且无法充分利用该语言的优势。ScalaFX\
  \ 项目就是为了提供更符合 Scala 风格的 API 来进行 JavaFX 开发而启动的，我们在本书的所有示例中都使用了它。\n\nScalaFX 是一个开源项目，由本书作者之一\
  \ Stephen Chin 创建，并且有许多额外的贡献者帮助进行了库的设计和测试。它与本章前面描述的 GroovyFX 库非常相似，因为它也是一个开源库，构成了\
  \ JVM 语言与 JavaFX API 之间的桥梁。然而，ScalaFX 的不同之处在于它优先考虑类型安全和一致的语义，这符合 Scala 语言设计目标的精神。\n\
  \n\n\nScalaFX 库中的许多结构都受到了 JavaFX 2.0 之前版本所使用的 JavaFX Script 语言的启发，因此，如果你熟悉 JavaFX\
  \ Script，你会觉得其语法非常亲切。它利用了 Scala 中许多高级特性，但不会让最终用户为了构建漂亮的 UI 应用程序而被迫去理解这些特性。\n\n让你成为\
  \ Scala 专家并非本书的目标，但我们会在 ScalaFX 代码中使用 Scala 特性时对其进行描述，因此，对于任何已经精通 Java 的开发者来说，这也可以作为一份温和的\
  \ Scala 入门指南。\n\n开始使用 ScalaFX\n\n要编写你的第一个 ScalaFX 应用程序，你需要下载并安装 Scala 以及 ScalaFX\
  \ 库。由于 ScalaFX 代码是用 Scala 语言编写的 DSL，你可以使用任何支持 Scala 开发的 IDE，例如 IntelliJ、Eclipse\
  \ 或 NetBeans，不过你可能想从 Scala IDE for Eclipse 开始，因为这是 TypeSafe 的 Scala 语言团队所支持的 IDE。我们将在本章演示\
  \ Eclipse 环境的基本设置，但这些概念同样适用于其他 IDE。\n\n首先，安装最新版本的 Eclipse 并启动它。从 **Help** 菜单中选择\
  \ **Install New Software...**\n\n并将 Scala IDE 的更新 URL 粘贴到 **Work with** 字段中。你可以从他们的网站\
  \ [`scala-ide.org/download/current.html`](http://scala-ide.org/download/current.html)\
  \ 获取 Scala IDE 的最新更新 URL。\n\n这将允许你选择 Scala IDE for Eclipse 插件，如图 13-10 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 194](img/index-567_1.jpg)\n\n第 13 章 ■ JavaFX 语言与标记\n\n***图 13-10.** 在\
  \ Eclipse 中安装 Scala IDE*\n\n继续向导，接受许可协议和默认设置。下载并安装插件并重启 Eclipse 后，你就可以开始 Scala 开发了。\n\
  \n首先，我们创建一个新的 Scala 项目。转到 **File** 菜单并选择 **New ➤ Project...** 以打开图 13-11 所示的新建项目向导。从选项列表中选择\
  \ **Scala Wizards/Scala Project**，然后点击 **Next**。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 195](img/index-568_1.jpg)\n\n第 13 章 ■ JavaFX 语言与标记\n\n***图 13-11.** 在\
  \ Eclipse 中创建 Scala 项目*\n\n我们将项目命名为 **Hello ScalaFX**，并使用默认项目设置。当被询问是否切换到 Scala\
  \ 透视图时，选择 **Yes**，你将进入编辑 Scala 代码的正确视图。\n\n除了标准的项目设置外，我们还需要将 ScalaFX 和 JavaFX 库添加到代码中，以便使用此\
  \ DSL。ScalaFX 可以从 Google Code 网站 [`code.google.com/p/scalafx/`](http://code.google.com/p/scalafx/)\
  \ 下载。\n\n作为 JavaFX 运行时和 SDK 的一部分，你已经安装了 JavaFX 库。要安装 ScalaFX，只需下载最新的 jar 发行版，并将其作为依赖库添加到你的项目中。最简单的方法如下：\n\
  \n1.  将 `ScalaFX.jar` 文件复制到项目根目录下的 `lib` 文件夹中。\n2.  右键点击你的项目，从上下文菜单中选择 **Properties...**。\n\
  3.  导航到 **Java Build Path** 条目，选择 **Libraries** 选项卡，然后点击 **Add Jars**。\n4.  选择你在步骤\
  \ 1 中添加到项目中的 `ScalaFX.jar` 文件。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 196](img/index-569_1.jpg)\n\n第 13 章 ■ JavaFX 语言与标记\n\n步骤 2 到 4 如图 13-12\
  \ 所示。\n\n***图 13-12.** 将 ScalaFX jar 文件添加到你的项目中*\n\n现在，你已经准备好创建你的第一个 ScalaFX 应用程序了。首先，我们创建一个非常简单的\
  \ ScalaFX 应用程序，它显示一个包含单个 Label 的 Stage 和 Scene。这是 JavaFX 应用程序的 Hello World，它将确保你所有的项目设置都正确无误，并且你已经准备好构建更大的应用程序。\n\
  \n要创建一个新的 ScalaFX 类，请从 **File** 菜单中选择 **New ➤ Scala Object**。这将打开一个向导，你可以在其中将类名设置为\
  \ `HelloScalaFX`，并选择它应该继承的 `scalafx.application.JFXApp` 类。完成向导后，Eclipse 将为你创建一个存根类。\n\
  \n为了完成这个示例，你需要向应用程序添加一个 Stage、Scene 和 Label。Hello ScalaFX 应用程序的完整代码如清单 13-10 所示。\n\
  \n***清单 13-10.** 用于测试你新创建项目的 Hello ScalaFX 应用程序*\n```scala\nimport scalafx.application.JFXApp\n\
  import scalafx.application.JFXApp.PrimaryStage\nimport scalafx.scene.Scene\nimport\
  \ scalafx.scene.control.Label\n\nobject HelloScalaFX extends JFXApp {\n  stage =\
  \ new PrimaryStage {\n    scene = new Scene {\n      content = new Label {\n   \
  \     text = \"Hello ScalaFX\"\n      }\n    }\n  }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 197](img/index-570_1.jpg)\n\n第 13 章 ■ JavaFX 语言与标记\n\n你可能注意到与 Java 代码的一些明显区别。在\
  \ Scala 中，如果换行符已经表明语句结束，那么分号几乎总是可选的。这就是为什么 import 语句和 `text` 赋值语句后面没有分号的原因。此外，Scala\
  \ 既有类也有对象，两者或其中之一都可以在给定的文件中定义。在这个例子中，我们创建了一个继承 `scalafx.application.JFXApp` 的对象，这提供了一种一步到位地定义和启动应用程序的方式。\n\
  \n创建一个继承 `scalafx.application.JFXApp` 的对象是使用 ScalaFX 构建 JavaFX 应用程序的基本模式。这个基类拥有实例化\
  \ JavaFX 应用程序所需的所有核心功能，让你免于通常所需的样板代码。你只需要处理所需的任何初始化工作，并用你自己的 ScalaFX stage 对象覆盖\
  \ `stage` 变量即可。\n\n`PrimaryStage`、`Scene` 和 `Label` 都遵循相同的模式，它们都是 ScalaFX 对象，其属性对应于相同\
  \ JavaFX 类的每个可用 JavaFX 属性。如果你注意到导入语句，我们实际上并没有引用 JavaFX 类，而是使用了一组并行的 ScalaFX 类中的代理类。\n\
  \n这些代理类可以使用 Scala 中称为隐式转换的特性与等效的 JavaFX 类互换，但具有支持这种嵌套对象字面量式语法的额外功能。\n\n要运行此应用程序，请右键点击该文件并选择\
  \ **Run As ➤ Scala Application**。执行后，此应用程序将打开一个窗口，其中显示文字 \"Hello ScalaFX\"，如图 13-13\
  \ 所示。\n\n***图 13-13.** 从 Eclipse 启动的 Hello ScalaFX 应用程序*\n\n恭喜！你已经成功运行了你的第一个 ScalaFX\
  \ 应用程序。现在，我们将更深入地探讨 ScalaFX 的设计和特性，向你展示如何在 Scala 中构建更复杂的 JavaFX 应用程序。\n\nScalaFX\
  \ 代理与隐式转换\n\n几乎对于每一个 JavaFX API 类，都有一个等效的 ScalaFX 代理类。ScalaFX 代理类位于一个并行的包结构中，其中\
  \ `javafx` 被替换为 `scalafx`，并在 JavaFX API 之上提供了额外的功能。每个代理类都包含以下一项或多项内容：\n\n*   **委托对象**：每个代理都包含一个指向它所扩展和包装的\
  \ JavaFX 类的引用。\n*   **属性别名**：对于所有属性，你可以直接将其作为 `foo` 访问，而无需引用为 `fooProperty`。\n*\
  \   **属性赋值**：为了支持对象字面量式的语法，赋值运算符被重载，允许你直接设置可写属性。\n\n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 ■ JavaFX 语言与标记\n\n• *列表访问*：所有 JavaFX ObservableList 都通过一个属性进行包装，以便访问该列表，从而让你能够将其视为\
  \ Scala 集合。\n\n• *API 增强*：部分 JavaFX API 在设计时并未考虑 Scala 语言和对象字面量构造方式，因此 API 作者在添加策略性增强方面采取了一些灵活处理。\n\
  \n对于大多数使用场景，你实际上可以忽略存在一组并行类的事实，因为 Scala 的隐式转换特性允许你互换使用它们。在任何需要 JavaFX 类的 API 中，你都可以传入\
  \ ScalaFX 代理对象，它会自动转换回 JavaFX 版本。同样，如果某个 API 需要 ScalaFX 版本，也存在一个 Scala 隐式转换，会自动将\
  \ JavaFX 类包装到 ScalaFX 代理中。\n\n例如，你可以修改 Hello ScalaFX 代码，直接使用 JavaFX 标签，代码依然可以正常编译和运行。修改后的版本如代码清单\
  \ 13-11 所示。\n\n***代码清单 13-11.*** 用于测试新建项目的 Hello ScalaFX 应用程序\n```scala\nimport\
  \ scalafx.Includes._\n\nimport scalafx.application.JFXApp\n\nimport scalafx.application.JFXApp.PrimaryStage\n\
  \nimport scalafx.scene.Scene\n\nimport javafx.scene.control.Label\n\nobject HelloScalaFXImplicits\
  \ extends JFXApp {\n\n  stage = new PrimaryStage {\n\n    scene = new Scene {\n\n\
  \      content = new Label(\"Hello ScalaFX Implicits\")\n\n    }\n\n  }\n\n}\n```\n\
  \n请注意，我们将导入语句改为了普通的 JavaFX 导入，并使用了带字符串参数的标准构造器。尽管 Scene 的 content 被定义为 ScalaFX Node\
  \ 的集合，但 Scala 隐式转换会自动介入，将 JavaFX 对象转换为 ScalaFX 代理。\n\nScalaFX 隐式转换要求你导入 `scalafx.Includes._`，这是我们展示的所有程序中的第一行代码。这是\
  \ Scala 的一种特殊语法，相当于 Java 中的静态导入，会自动包含多个实用方法以及所有从 JavaFX 到 ScalaFX 的隐式转换。就 ScalaFX\
  \ 开发而言，你只需将其视为前置声明，并在所有 ScalaFX 源文件中包含它即可。\n\nScala 中的 JavaFX 属性\n\n虽然我们一直在直接使用\
  \ ScalaFX 属性，但并未直接展示它们的工作原理。特别需要注意的是，JavaFX 中常见的 getter/setter 模式在这里消失了。这是因为 ScalaFX\
  \ 允许我们重写运算符和赋值的行为，以替换为更高效的相同操作版本。为了理解这一点，让我们再次审视 JavaFX 属性模式。\n\n在 Java 中为 JavaFX\
  \ 创建属性时，每个属性定义包含一个变量和三个不同的访问器方法，如代码清单 13-12 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 ■ JavaFX 语言与标记\n\n***代码清单 13-12.*** 在 Java 中创建新属性的 JavaFX 属性模式\n```java\n\
  import javafx.beans.property.SimpleStringProperty\n\nimport javafx.beans.property.StringProperty\n\
  \npublic class Person {\n\n  private StringProperty name;\n\n  public void setName(String\
  \ val) { nameProperty().set(val); }\n\n  public String getName() { return nameProperty().get();\
  \ }\n\n  public StringProperty nameProperty() {\n\n    if (name == null) {\n\n \
  \     name = new SimpleStringProperty(this, \"name\");\n\n    }\n\n    return name;\n\
  \n  }\n\n}\n```\n\n对属性的直接访问受到限制，以便在首次使用时进行懒加载。初始化发生在 `nameProperty` 方法中（如果属性为 null），然后\
  \ get 和 set 方法仅将调用委托给属性上同名的方法。\n\n在 ScalaFX 中，你可以通过一行代码获得相同的懒加载优势，如代码清单 13-13 所示。\n\
  \n***代码清单 13-13.*** 使用 ScalaFX API 适配的简化版 JavaFX 属性模式\n```scala\nimport scalafx.beans.property.StringProperty\n\
  \nclass Person {\n\n  lazy val name = new StringProperty(this, \"name\")\n\n  //\
  \ 以下代码为可选，但支持对象字面量构造模式：\n```\n\n\ndef name_=(v: String) {\n\nname() = v\n\n}\n\n\
  }\n\n定义属性的第一行就足以完成前面 Java 代码所做的所有工作。将 name 声明为 val 告诉 Scala 它是一个常量变量。声明前的 lazy 关键字表示它直到首次使用时才会被初始化。因此，你可以直接从用户代码访问此变量，并且初始化逻辑会在需要时自动调用。\n\
  \n■ **提示** Scala 支持三种不同类型的变量定义：val、var 和 def。var 关键字的行为与你熟悉的 Java 最相似，它定义了一个可以原地修改的变量。我们这里使用的\
  \ val 关键字声明了一个常量变量，与 Java 中的 final 变量最为相似。最后一个关键字 def 声明了一个每次调用时都会重新求值的表达式，因此它的行为就像\
  \ Java 中的方法。\n\n第二个定义 name_= 方法是在 Scala 中重载赋值运算符的特殊语法。这就是我们之前使用的对象字面量风格语法的工作原理；然而，它只是访问属性并赋值的一种快捷方式。这也展示了\
  \ ScalaFX 中属性使用的基本模式。\n\n表 13-1 比较了在 Java 和 ScalaFX 中访问和设置属性的所有不同组合。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 ■ JavaFX 语言与标记\n\n***表 13-1.** ScalaFX 与 Java 中的属性操作*\n\n**操作**\n\n**Java**\n\
  \n**ScalaFX**\n\n**描述**\n\n获取属性\n\ngetFooProperty()\n\nfoo\n\n获取原始属性（通常用于设置绑定或监听器）\n\
  \n获取属性值\n\n1: getFoo()\n\n1: foo()\n\n获取属性的值\n\n2: getFooProperty.get()\n\n2: foo.get()\
  \ [长格式]\n\n[长格式]\n\n设置属性值\n\n1: setFoo(val)\n\n1: foo() = val\n\n设置属性的值\n\n2: getFooProperty.set(val)\
  \ 2: foo.set(val) [长格式]\n\n[长格式]\n\n3: obj.foo = val [对象字面量快捷方式]\n\n一旦你习惯了 ScalaFX\
  \ 语法，它就会变得非常自然。通常，如果你直接引用一个属性，你将访问到完整的属性对象，该对象拥有用于绑定、监听器等所有方法。然而，如果你在属性名后加上括号，你将获取（或设置）属性的值。\n\
  \n■ **提示** 这种括号的使用是通过 Scala 的 apply 和 update 语法支持的，该语法常用于数组和列表，但在 ScalaFX 中用于区分原始属性及其值。\n\
  \n此规则的一个例外是对象字面量情况（设置属性值的第三个示例），你可以直接使用赋值运算符来设置属性的值（无需括号）。这是一个明确无误的情况，之所以允许这样做，是因为\
  \ JavaFX 属性引用是只读的，并且这能显著简化用户代码的语法。\n\n如果你在属性和值之间感到困惑，Scala 的类型系统会来帮忙。通常，ScalaFX\
  \ API 的设计旨在保持强类型，并在开发者意图不明确的地方产生类型错误。因此，如果你在需要类型的地方使用了属性，或者反之，编译器很可能会在你运行应用程序之前就捕获到错误。\n\
  \nScalaFX 绑定 API\n\n绑定可以说是 JavaFX 库中最具创新性的特性之一；然而，API 使用起来可能有点繁琐，尤其是在绑定逻辑复杂的情况下。考虑到\
  \ Java 语言的限制，所提供的流畅 API 相当强大且富有表现力，但缺乏许多让绑定在 JavaFX Script 中如此强大的优雅性。\n\nScalaFX\
  \ 绑定 API 建立在 JavaFX 绑定支持之上，但将它们封装在一种自然编写和理解的编程语言语法中。通过利用运算符重载和中缀表示法，你可以在甚至不了解 JavaFX\
  \ 附带的所有绑定 API 方法的情况下，编写复杂的 ScalaFX 绑定表达式。\n\n\n\n例如，以下是将一个矩形的高度绑定到另外两个矩形高度之和的方法：`rect1.height\
  \ <== rect2.height + rect3.height`\n\n除了特殊的绑定操作符（`<==`）以及缺少将属性转换为值的括号外，这段代码与你静态计算高度之和时编写的代码完全相同。然而，一旦绑定建立，对\
  \ `rect2` 或 `rect3` 的任何更新都会动态地改变 `rect1` 的高度。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 ■ JavaFX 语言与标记\n\n这个表达式实际上会翻译成以下 Java 中的 JavaFX 代码：\n\n`rect1.heightProperty().bind(rect2.heightProperty().add(rect3.heightProperty()));`\n\
  \n即使对于这样一个简单的绑定表达式，也很容易迷失在 Java 所需的所有括号和方法调用中。\n\n你也可以在 ScalaFX 中使用聚合操作符。无需使用 JavaFX\
  \ `Bindings` 类上的静态方法，ScalaFX 的 `Includes` 导入为你提供了所有这些可以直接调用的函数方法，例如以下代码将一个矩形的宽度绑定到其他三个矩形的最大宽度。\n\
  \n`rect1.width <== max(rect2.width, rect3.width, rect4.width)`\n\n另一种极其常见的绑定表达式是条件语句。使用\
  \ JavaFX API 创建条件语句是可行的，同样需要借助静态的 `Bindings` 类，但使用 ScalaFX API 则简单得多。\n\n以下代码根据光标是否悬停来改变\
  \ `strokeWidth`（正如我们之前在“消失的圆圈”应用中所做的那样）。\n\n`strokeWidth <== when (hover) then 4\
  \ otherwise 0`\n\n传递给条件值和结果子句的表达式可以任意复杂。以下示例结合了布尔逻辑、字符串拼接和条件表达式。\n\n`text <== when\
  \ (rect.hover || circle.hover && !disabled) then textField.text + \" is enabled\"\
  `\n\n`otherwise \"disabled\"`\n\n在所有这些示例中，由于你编写的代码直接位于 JavaFX 绑定 API 之上，因此你可以获得所有相同的好处，例如惰性求值。此外，由于\
  \ Scala 像 Java 一样是一种静态类型语言，你在获得这些好处的同时，不会像使用其他动态语言那样牺牲类型安全。事实上，使用 ScalaFX API 可以获得更好的类型安全，因为它还支持子属性的类型安全解引用。例如，在\
  \ ScalaFX 中，要将矩形的宽度绑定到场景的宽度，你只需编写：\n\n`rect1.width <== stage.scene.width`\n\n即使场景尚未创建（例如在\
  \ `Stage` 对象初始化期间），这也能正常工作。你也可以在 Java 中完成同样的事情，但这需要一个非类型安全的属性选择器：`rect.widthProperty().bind(Bindings.selectDouble(stage,\
  \ \"scene.width\"));`\n\n在底层，ScalaFX 调用了这个精确的 JavaFX API，但它保护了应用程序开发者，使其不会访问可能拼写错误或类型错误的属性。\n\
  \n最后，如果不举一个双向绑定的例子，关于绑定的讨论就不算完整。这在 ScalaFX 中同样简单，可以通过对绑定操作符稍作变体来实现，如下例所示。\n\n`textField.text\
  \ <==> model.name`\n\n这在模型中的 `name` 属性和一个 `TextField` 之间创建了一个双向绑定，这样如果用户编辑了文本字段，模型对象也会自动更新。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 ■ JavaFX 语言与标记\n\n\
  尽管大多数 ScalaFX 操作符相当直观，但在少数情况下无法使用标准操作符。这些情况包括：\n\n*   `if/else`：这些是 Scala 语言的关键字，因此如前所述，它们已被替换为\
  \ `when/otherwise`，就像在相应的 JavaFX API 中一样。\n*   `==/!=`：直接使用相等和不相等操作符会与核心 Scala 对象基类上的相同操作产生一些不必要的交互。请改用\
  \ `===` 和 `=!=`，这两个操作符都经过精心选择，具有与它们所替换的操作符相同的优先级规则。\n\n作为额外的好处，你可以使用以下语法为数值比较指定\
  \ `===` 和 `=!=` 操作符的精度。\n\n`aboutFiveHundred <== value1 === 500+-.1`\n\n这将测试 `value1`\
  \ 与 500 的差值是否小于 0.1。\n\nAPI 增强\n\n到目前为止，你应该已经很好地理解了如何将你一直在构建的 JavaFX 应用程序转换为等效的\
  \ ScalaFX 代码。通常，ScalaFX API 镜像了 JavaFX API，提供了等效的功能。\n\n然而，在某些情况下，实际上可以提供改进的 API\
  \ 或替代选择，以匹配 ScalaFX 所鼓励的声明式编程风格。在本节中，我们将介绍 ScalaFX 在 JavaFX API 基础上进行改进的几个不同领域。\n\
  \n闭包\n\nJava 8 的新特性之一是 lambda 表达式或闭包。这简化了创建事件监听器或类似回调的情况，在这些情况下你需要实现一个包含单个方法的接口。\n\
  \n大多数现代 JVM 语言（如 Scala 语言）早已将闭包作为核心语言特性。这意味着在任何通常需要实现事件或属性监听器的地方，你都可以改用闭包来简化代码。\n\
  \n之前在“消失的圆圈”应用中，我们展示了一个设置鼠标点击处理器的闭包示例：`onMouseClicked = {`\n\n`Timeline(at (3 s)\
  \ {radius -> 0}).play()`\n\n`}`\n\n闭包部分确实就这么简单；你只需用花括号包围你的方法逻辑，并将其赋值给事件处理器的属性即可。如果你还需要访问传入的一些变量（例如\
  \ `MouseEvent`），还有另一种变体：\n\n`onMouseClicked = { (e: MouseEvent) =>`\n\n`Timeline(at\
  \ (3 s) {radius -> 0}).play()`\n\n`}`\n\n布局约束\n\nJavaFX 2 中引入的布局约束机制非常灵活，因为它允许布局作者定义自己的约束并存储在\
  \ `Node` 上，但从应用程序开发者的角度来看，它并不理想。它迫使你的代码进入一种命令式模式，即先在一个步骤中添加子节点，然后再设置约束。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 ■ JavaFX 语言与标记\n\n由于有用的布局约束集合相当小，ScalaFX API 直接将常见的约束添加到了 `Node` 类上。这让你可以在创建对象树时以声明方式指定约束，例如对齐、边距和增长。\n\
  \n例如，要在我们的 Hello ScalaFX 示例中为 `Label` 添加边距，只需设置 `Label` 上的 `margin` 属性即可：\n\n`object\
  \ HelloScalaFXMargin extends JFXApp {`\n\n`stage = new PrimaryStage {`\n\n`scene\
  \ = new Scene {`\n\n`content = new Label {`\n\n`text = \"Hello ScalaFX Margin\"\
  `\n\n`margin = new Insets(20)`\n\n`}`\n\n`}`\n\n`}`\n\n`}`\n\n这会在 `Label` 周围添加 20\
  \ 像素的间距，使其在窗口中留出空间。如果没有这个 ScalaFX 特性，你将需要保存对 `Label` 的引用，然后稍后调用以下代码：\n\n`StackPane.setMargin(new\
  \ Insets(20));`\n\nScalaFX 节点布局约束的一个额外好处是，它们适用于所有 JavaFX 布局，无论你使用哪种类型的容器。使用普通的 JavaFX\
  \ 布局约束，你需要使用来自正确布局类型的静态方法，否则约束将不起作用。\n\n■ **提示** 对于希望使用 ScalaFX 节点布局约束的布局作者，ScalaFX\
  \ 还会以无前缀的形式存储布局约束，你可以直接访问。例如，要获取边距约束，只需调用 `node.getProperties().get(\"margin\")`。对于对齐，你可以选择以“alignment”、“halignment”或“valignment”的形式访问它，当用户设置对齐属性时，所有这些都会更新。\n\
  \n动画\n\n\n\nScalaFX 提供了一种受 JavaFX Script 中相同语法启发的快捷语法，用于表达时间线。它允许你使用适合单行的快捷语法来指定持续时间、关键帧、关键值和补间。我们之前在“消失的圆圈”示例中使用了这种语法，来指定点击圆圈时使其缩小的动画：`Timeline(at\
  \ (3 s) {radius -> 0}).play()`\n\n这段代码等价于以下使用 JavaFX 动画 API 编写的 Java 代码：\n\n```java\n\
  KeyValue collapse = new KeyValue(circle.radiusProperty(), 0);\nnew Timeline(new\
  \ KeyFrame(Duration.seconds(3), collapse)).play();\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 ■ JavaFX 语言与标记\n\n如你所见，即使在这个简单的示例中，ScalaFX 变体也更为简洁且可读性更强。ScalaFX 中动画的基本语法是：\n\
  \n`at (duration) {[property -> value]}`\n\n该语句会转换为一个 `KeyFrame`，可以直接添加到 `Timeline`\
  \ 中。你可以向 `Timeline` 传递多个 `KeyFrame`，或者在前述语法中使用多个 `property->value` 对，从而灵活地指定任意复杂的动画。\n\
  \n进一步分解这个示例，请注意我们使用了快捷语法来创建 `Duration` 和 `KeyValue`。对于前者，ScalaFX 有一个隐式转换，它为 `Double`\
  \ 类型添加了 `ms()`、`s()`、`m()` 和 `h()` 函数，允许你通过调用相应的函数来创建一个新的 `Duration`。通过使用 Scala\
  \ 中的后缀运算符快捷语法，而不是调用 `\"3.s()\"` 或 `\"3.s\"`，你可以进一步将其缩写为 `\"3 s\"`（其中 3 和 s 之间需要空格）。\n\
  \n对于后者，ScalaFX 属性有一个重载的 `\"->\"` 运算符，它接受一个值并返回一个 `KeyValue` 对象。事实上，你不仅可以指定目标值，还可以像这样添加一个补间表达式：`radius\
  \ -> 0 tween EASE_OUT`\n\n这种添加会使动画在接近结束时减速，从而实现更平滑的过渡。\n\n**总结**\n\n正如我们在本章中所示，除了使用\
  \ Java 语言之外，你还有更多编写 JavaFX 代码的选择。目前已有几种用流行的 JVM 语言（如 Groovy 和 Scala）编写的 DSL 可用。\n\
  \n很棒的一点是，你可以选择最适合项目需求的语言和标记。所有这些技术都能与用 Java 编写的 JavaFX 代码干净地集成，并且根据项目需求，你可以利用它们各自的好处。\n\
