  \n构建器（Builder）怎么了？\n\n如果您之前使用过 JavaFX 2，您可能对所谓的构建器模式很熟悉。构建器提供了一种声明式的编程风格。构建器模式不是通过调用类实例的\
  \ set() 方法来指定其字段，而是使用 Builder 类的实例来定义目标类应该如何组合。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 1 章 ■ JavaFX 快速入门\n\n构建器在 JavaFX 中非常流行。然而，事实证明，将它们保留在平台中存在重大的技术障碍。因此，决定逐步淘汰构建器。在\
  \ Java 8 中，Builder 类仍然可以使用，但已被弃用。在 Java 9 中，Builder 类可能会被完全移除。\n\n关于 Builder 类不再被推荐使用的更多原因，可以在\
  \ JavaFX 首席架构师 Richard Bair 的邮件列表条目中找到，地址为 [`mail.openjdk.java.net/pipermail/openjfx-dev/2013-`](http://mail.openjdk.java.net/pipermail/openjfx-dev/2013-March/006725.html)\n\
  \n[March/006725.html。](http://mail.openjdk.java.net/pipermail/openjfx-dev/2013-March/006725.html)该条目的末尾包含一个非常重要的声明：“我相信\
  \ FXML 或 Lambda 表达式或替代语言都提供了其他途径来实现与构建器相同的目标，而无需增加字节码或类的额外成本。”\n\n这正是我们将在本书中展示的内容。在本章末尾，我们将在代码中展示\
  \ Lambda 表达式的第一个示例。在第 3 章中，我们将展示 SceneBuilder 和 FXML 如何让您以声明方式定义 UI。\n\n在当前示例中，我们以编程方式定义\
  \ UI 的不同组件，并将它们组合在一起。在第 3 章中，我们将使用基于 FXML 的声明式方法展示相同的示例。\n\nJavaFX 应用程序\n\n让我们看一下第一个示例中的类声明：\n\
  \npublic class HelloEarthRiseMain extends Application\n\n这个声明表明我们的应用程序继承了 javafx.application.Application\
  \ 类。该类有一个我们需要实现的抽象方法：\n\npublic void start(Stage stage) {}\n\n这个方法将由执行我们 JavaFX\
  \ 应用程序的环境调用。\n\n根据环境的不同，JavaFX 应用程序将以不同的方式启动。作为开发人员，您不必担心应用程序如何启动，以及如何连接到物理屏幕。\n\
  \n您需要实现“start”方法，并使用提供的 Stage 参数来创建您的 UI，如下一段所述。\n\n在我们的命令行示例中，我们通过执行应用程序类的 main\
  \ 方法来启动应用程序。main 方法的实现非常简单：\n\npublic static void main(String[] args) {\n\nApplication.launch(args);\n\
  \n}\n\n这个 main 方法中唯一的指令是调用 Application 的静态 launch 方法，该方法将启动应用程序。\n\n■ **提示** JavaFX\
  \ 应用程序必须始终继承 javafx.application.Application 类。\n\n舞台（Stage）和场景（Scene）\n\nStage 包含\
  \ JavaFX 应用程序的 UI，无论它部署在桌面、嵌入式系统还是其他设备上。例如，在桌面上，Stage 拥有自己的顶级窗口，通常包含边框和标题栏。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 1 章 ■ JavaFX 快速入门\n\n初始 Stage\
  \ 由 JavaFX 运行时创建，并通过 start() 方法传递给您的应用程序，如上一段所述。Stage 类具有一组属性和方法。从清单中的以下代码片段可以看出，其中一些属性和方法如下：\n\
  \n• 一个包含 UI 中图形节点的场景（Scene）\n• 出现在窗口标题栏中的标题（当部署在桌面时）\n• Stage 的可见性\n\nstage.setScene(scene);\n\
  \nstage.setTitle(\"Hello Earthrise\");\n\nstage.show();\n\nScene 是 JavaFX 场景图中的顶级容器。Scene\
  \ 包含显示在 Stage 上的图形元素。Scene 中的每个元素都是一个图形节点，即任何继承自 javafx.scene.Node 的类。场景图是 Scene\
  \ 的层次化表示。场景图中的元素可以包含子元素，并且所有元素都是 Node 类的实例。\n\n\n\n`Scene` 类包含许多属性，例如其宽度和高度。`Scene`\
  \ 还有一个名为 `root` 的属性，用于保存在场景中显示的图形元素，在本例中是一个包含 `ImageView` 实例（用于显示图像）和一个 `Group`\
  \ 实例的 `Group` 对象。后一个 `Group` 内部嵌套了一个 `Text` 实例（它是一种图形元素，通常称为图形节点，或简称为节点）。\n\n请注意，`Scene`\
  \ 的 `root` 属性包含一个 `Group` 类的实例。`root` 属性可以包含 `javafx.scene.Node` 任何子类的实例，并且通常包含一个能够容纳其自身\
  \ `Node` 实例集合的实例。请查看我们之前教你如何访问的 JavaFX API 文档（在“使用官方规范”部分），并查阅 `Node` 类，以了解任何图形节点可用的属性和方法。同时，也请查看\
  \ `javafx.scene.image` 包中的 `ImageView` 类和 `javafx.scene` 包中的 `Group` 类。在这两种情况下，它们都继承自\
  \ `Node` 类。\n\n■ **提示** 我们怎么强调都不为过：在阅读本书时，手边备好 JavaFX API 文档非常重要。当提到类、变量和函数时，最好查阅文档以获取更多信息。此外，这个习惯能帮助你更熟悉\
  \ API 中可用的内容。\n\n显示图像\n\n如下代码所示，显示图像需要使用 `ImageView` 实例与 `Image` 实例配合。\n\n```java\n\
  Image image = new Image (\"http://projavafx.com/images/earthrise.jpg\");\nImageView\
  \ imageView = new ImageView(image);\n```\n\n`Image` 实例标识图像资源，并从分配给其 `URL` 变量的 URL\
  \ 加载该资源。这两个类都位于 `javafx.scene.image` 包中。\n\n显示文本\n\n在示例中，我们按如下方式创建了一个 `Text` 节点：\n\
  \n```java\nText textRef = new Text(message);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 1 章 ■ 快速入门 JavaFX\n\n如果你查阅 JavaFX API 文档，你会注意到 `Text` 实例（位于 `javafx.scene.text`\
  \ 包中）扩展了 `Shape`，而 `Shape` 又扩展了 `Node`。因此，`Text` 实例也是一个 `Node`，并且 `Node` 上的所有属性同样适用于\
  \ `Text`。此外，`Text` 实例可以像其他节点一样在场景图中使用。\n\n正如你从示例中可以看到的，`Text` 实例包含许多可以修改的属性。大多数属性不言自明，但同样，在操作对象时查阅\
  \ JavaFX API 文档总是很有用的。\n\n由于 JavaFX 中的所有图形元素都直接或间接地扩展了 `Node` 类，并且由于 `Node` 类已经包含了许多有用的属性，因此特定图形元素（如\
  \ `Text`）的属性数量可能相当多。\n\n在我们的示例中，我们设置了一些有限的属性，接下来简要解释一下。\n\n方法\n\n```java\ntextRef.setLayoutY(100)\n\
  ```\n\n对 `Text` 内容应用了 100 像素的垂直平移。\n\n`fill` 方法用于指定文本的颜色。\n\n当你在 API 文档中查看 `javafx.scene.text`\
  \ 包时，也请查看 `Font` 类的 `font` 函数，该函数用于定义 `Text` 的字体系列、粗细和大小。\n\n`textOrigin` 属性指定文本如何与其区域对齐。\n\
  \n再次参考 JavaFX API 文档，请注意 `VPos` 枚举（位于 `javafx.geometry` 包中）包含作为常量的字段，例如 `BASELINE`、`BOTTOM`\
  \ 和 `TOP`。这些常量控制文本相对于显示文本垂直位置的起点：\n\n• 正如我们在前面的代码片段中所使用的，`TOP` 起点将文本的顶部（包括上升部分）放置在\
  \ `layoutY` 位置，相对于 `Text` 所在的坐标空间。\n\n\n\n• **BOTTOM** 原点会将文本底部（包括下行部分，例如小写字母 g\
  \ 的底部）放置在 `layoutY` 位置。\n• **BASELINE** 原点会将文本基线（不包括下行部分）放置在 `layoutY` 位置。这是 `Text`\
  \ 实例的 `textOrigin` 属性的默认值。\n\n`wrappingWidth` 属性允许您指定文本在多少像素处换行。\n\n`textAlignment`\
  \ 属性允许您控制文本的对齐方式。在我们的示例中，`TextAlignment.JUSTIFY` 使文本在左右两侧都对齐，通过增加单词之间的间距来实现这一点。\n\
  \n我们显示的文本足够长，可以换行并绘制在地球上，因此我们需要定义一个矩形区域，文本不能超出该区域显示。\n\n■ **提示** 我们建议您修改一些值，重新编译示例，然后再次运行。这将帮助您理解不同属性的工作方式。或者，通过使用\
  \ ScenicView，您可以在运行时检查和修改不同的属性。\n\n将图形节点作为一个组来使用\n\nJavaFX 的一个强大图形功能是能够创建场景图，它由图形节点的树状结构组成。然后，您可以为层次结构中的\
  \ `Group` 的属性赋值，该 `Group` 中包含的节点将受到影响。在我们当前来自清单 1-1 的示例中，我们使用一个 `Group` 来包含一个 `Text`\
  \ 节点，并在该 `Group` 内裁剪一个特定的矩形区域，以便文本在向上动画时不会出现在月球或地球上。以下是相关的代码片段：\n\n```java\nGroup\
  \ textGroup = new Group(textRef);\ntextGroup.setLayoutX(50);\ntextGroup.setLayoutY(180);\n\
  textGroup.setClip(new Rectangle(430, 85));\n```\n\n请注意，该 `Group` 位于其默认位置右侧 50 像素、下方\
  \ 180 像素处。这是由于为 `Group` 实例的 `layoutX` 和 `layoutY` 变量赋值所致。由于此 `Group` 直接包含在 `Scene`\
  \ 中，其左上角的位置位于 `Scene` 左上角右侧 50 像素、下方 180 像素处。在阅读其余解释时，请查看图 1-5 以查看此示例的图示。\n\n***图\
  \ 1-5.** Scene、Group、Text 和裁剪区域的图示*\n\n一个 `Group` 实例通过 `children()` 方法将 `Node` 子类的实例集合分配给它自身来包含这些实例。在前面的代码片段中，`Group`\
  \ 包含一个 `Text` 实例，该实例的 `layoutY` 属性已被赋值。由于此 `Text` 包含在 `Group` 中，它采用 `Group` 的二维空间（也称为坐标空间），`Text`\
  \ 节点的原点 (0,0) 与 `Group` 的左上角重合。\n\n将 `layoutY` 属性赋值为 100 会导致 `Text` 位于 `Group` 顶部下方\
  \ 100 像素处，刚好在裁剪区域底部下方，从而使其在动画开始前不可见。\n\n由于没有为 `layoutX` 变量赋值，其值为 0（默认值）。\n\n刚才描述的\
