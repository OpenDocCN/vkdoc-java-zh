  \ 程序的参数。\n\n`javafx.application`包中包含一个名为`Application`的类，该类具有与应用程序生命周期相关的方法，例如`launch()`、`init()`、`start()`和`stop()`。`Application`类中的另一个方法是`getParameters()`，它使应用程序能够访问命令行传递的参数，以及\
