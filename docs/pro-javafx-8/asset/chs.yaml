  \n第 10 章 ■ JavaFX 3D\n\npublic class MandelbrotSetExample extends Application {\n\
  \n@Override\n\npublic void start(Stage primaryStage) throws Exception {\n\nprimaryStage.setTitle(\"\
  Mandelbrot iSet Example\");\n\nprimaryStage.setScene(makeScene());\n\nprimaryStage.show();\n\
  \n}\n\nprivate Scene makeScene() {\n\nWritableImage mandelbrotSet = new WritableImage(840,\
  \ 480);\n\npopulateMandelbrotSet(mandelbrotSet);\n\nCanvas canvas = new Canvas(840,\
  \ 480);\n\nfinal GraphicsContext graphicsContext =\n\ncanvas.getGraphicsContext2D();\n\
  \ngraphicsContext.drawImage(mandelbrotSet, 0, 0);\n\nGroup root = new Group(canvas);\n\
  \nScene scene = new Scene(root);\n\nreturn scene;\n\n}\n\nprivate void populateMandelbrotSet(WritableImage\
  \ mandelbrotSet) {\n\nfinal PixelWriter pixelWriter = mandelbrotSet.getPixelWriter();\n\
  \nfor (int i = 0; i < 840; i++) {\n\nfor (int j = 0; j < 480; j++) {\n\ndouble x\
  \ = (i - 600) / 240.0d;\n\ndouble y = (240 - j) / 240.0d;\n\nColor color = calculateColor(x,\
  \ y);\n\nSystem.out.println(\"argb = \" + color);\n\npixelWriter.setColor(i, j,\
  \ color);\n\n}\n\n}\n\n}\n\nprivate Color calculateColor(double x0, double y0) {\n\
  \ndouble x = 0.0;\n\ndouble y = 0.0;\n\nint iteration = 0;\n\nint max_iteration\
  \ = 1000;\n\nwhile (x * x + y * y < 2 * 2 && iteration < max_iteration) {\n\ndouble\
  \ xtemp = x * x - y * y + x0;\n\ny = 2 * x * y + y0;\n\nx = xtemp;\n\niteration\
  \ = iteration + 1;\n\n}\n\ndouble r = (iteration % 10) / 10.0d;\n\ndouble g = ((iteration\
  \ / 10) % 10) / 10.0d;\n\ndouble b = ((iteration / 100) % 10) / 10.0d;\n\nreturn\
  \ Color.color(r, g, b);\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
