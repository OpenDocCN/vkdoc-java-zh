  \ UI。运行此应用程序的结果与典型的 UI 表单完全一致，如图 13-9 所示。\n\n***图 13-9.** 运行中的狗狗领养表单示例，背景是一只 Cavapoo（卡瓦利国王查理士猎犬与贵宾犬的混种）*3\n\
