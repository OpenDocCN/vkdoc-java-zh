  \ 总结\n\n\n\n通过 JavaFX 媒体 API，播放网络媒体文件是自动完成的。你只需将 `Media` 对象指向一个 HTTP 资源，并将其附加到 `MediaPlayer`\
  \ 上，同时将 `autoPlay` 设置为 `true` 即可。然而，如果你有兴趣监控下载缓冲区的进度，可以使用 `MediaPlayer` 类中的 `bufferProgressTime`\
  \ 属性。当数据从流或磁盘加载时，系统会计算这些数据播放所需的时间，并且该时间会作为 `bufferProgressTime` 的值定期更新。通过绑定此属性，你可以接收这些更新，从而有效监控媒体的缓冲区。\n\
  \n我们要讨论的最后两个 `MediaPlayer` 属性是 `rate` 和 `currentRate` 属性。调用 `setRate` 可以控制播放速率。传入参数\
  \ `1.0` 将以正常速率播放。参数 `2.0` 将使媒体以两倍正常速率播放。你可以传入 `0.0` 到 `8.0` 之间的任意值。`currentRate`\
  \ 属性始终反映实际的播放速率，无论 `rate` 属性的值是多少。例如，如果播放当前处于暂停状态，即使 `rate` 可能设置为 `4.0`，`currentRate`\
  \ 也会是 `0.0`。\n\n**播放视频**\n\n从 API 的角度来看，播放视频而非音频，只需将 `MediaPlayer` 包装在 `MediaView`\
  \ 中，并将 `MediaView` 添加到场景图中即可。清单 9-31 展示了如何实现这一点。你只需将 `Media` 对象指向一个有效的源（本例中是一个 Flash\
  \ 影片），并将其包装在一个自动播放的 `MediaPlayer` 中，然后再将 `MediaPlayer` 包装在 `MediaView` 中。最后一步是将\
  \ `MediaView` 添加到场景中，并设置场景的大小以匹配影片的大小。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\n***清单 9-31.*** 一个极简但功能完整的影片播放器\n\n```java\npublic class VideoPlayer1\
  \ extends Application {\n\n    public static void main(String[] args) {\n      \
  \  launch(args);\n    }\n\n    @Override\n    public void start(Stage primaryStage)\
  \ {\n        String workingDir = System.getProperty(\"user.dir\");\n        File\
  \ f = new File(workingDir, \"../media/omgrobots.flv\");\n        Media m = new Media(f.toURI().toString());\n\
  \        MediaPlayer mp = new MediaPlayer(m);\n        MediaView mv = new MediaView(mp);\n\
  \n        StackPane root = new StackPane();\n        root.getChildren().add(mv);\n\
  \        primaryStage.setScene(new Scene(root, 960, 540));\n        primaryStage.setTitle(\"\
  Video Player 1\");\n        primaryStage.show();\n        mp.play();\n    }\n}\n\
  ```\n\n此示例从文件系统加载视频文件。使用 HTTP URL 从互联网加载视频同样有效，但不建议将任何体积较大的影片打包到 jar 文件中，因为这会显著增加应用程序的大小。一旦我们有了文件\
  \ URL，一切就变得熟悉了。你使用该 URL 创建 `Media` 对象，并将该 `Media` 对象包装在 `MediaPlayer` 中。唯一新增的步骤是使用\
  \ `MediaPlayer` 作为构造函数参数来构造一个 `MediaView` 节点，并将其添加到场景图的根节点（本例中为 `StackPane`）。我们创建一个大小适合影片尺寸的\
  \ `Scene`，然后将其传递给舞台并显示。最后一步是通过调用熟悉的 `MediaPlayer` 的 `play` 方法来启动影片播放。图 9-9 展示了这个简单影片播放器的运行效果。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 142](img/index-420_1.jpg)\n\
  \n第 9 章 ■ 使用媒体类\n\n***图 9-9.** 在 JavaFX 中播放机器人影片*\n\n到目前为止，你学到的关于使用 `Media` 和 `MediaPlayer`\
  \ 播放音频的所有知识，同样适用于使用 `MediaView` 播放视频。你只需要了解几个额外的概念。\n\n**控制 MediaView 的大小**\n\n\
  `MediaView` 只是场景图中的另一个节点，因此可以使用常规的变换或 `Node` 类的 `scaleX` 和 `scaleY` 属性来缩放其内容。然而，在处理\
  \ `MediaView` 时，有更方便的方法来完成这项工作。可以使用 `fitWidth` 和 `fitHeight` 属性来使 `MediaView` 拉伸或收缩到所需大小。一次只使用其中一个属性，将使\
  \ `MediaView` 仅在该维度上进行缩放，而另一个维度的大小保持不变。\n\n如果你希望在缩放影片以适应应用程序时保持其原始宽高比，可以将 `preserveRatio`\
  \ 属性设置为 `true`。如果你在设置 `preserveRatio` 为 `true` 的同时指定了一个维度的适配大小，那么另一个维度将自动缩放，以在沿指定维度适配时匹配影片的原始宽高比。例如，假设我们的影片原始尺寸为\
  \ 640 × 352 像素，宽高比为 640 ÷ 352，约等于 1.82。如果你指定 `fitWidth` 为 400 并启用 `preserveRatio`，则影片的最终高度将从\
  \ 352 像素变为 400 ÷ 1.82 = 220 像素。请注意，宽高比得以保留，因为 400 ÷ 220 也等于 1.82。\n\n你也可以通过同时指定\
  \ `fitWidth` 和 `fitHeight` 值并启用 `preserveRatio` 来在两个维度上进行缩放。在这种情况下，系统将计算影片的最佳适配方式，另一个维度将被缩放以保持原始宽高比。例如，如果适配区域和影片都是宽大于高（常见情况），则影片将水平缩放以适配，高度将通过使用宽高比计算匹配新宽度所需的高度来确定。\n\
  \n最后一个与调整影片大小相关的值得了解的属性是 `smooth` 属性。这是一个布尔属性，用于控制缩放后生成图像的质量。如果 `smooth` 为 `true`，缩放算法将以额外的计算时间为代价，生成更高质量的图像。如果为\
  \ `false`，缩放会更快完成，但结果看起来效果较差。这使开发者可以在时间与质量之间进行权衡。当缩小影片时，平滑与非平滑选项之间的质量差异不大。虽然放大时质量差异很明显，但对于某些应用程序来说可能仍然可以接受。因此，如果你需要生成并显示影片的缩略图，这是一个值得考虑的选项。默认情况下，`smooth`\
  \ 通常设置为 `true`，但这可能取决于你运行应用程序的平台。\n\n清单 9-32 展示了一个全屏影片播放器，它使用 `fitWidth`、`fitHeight`\
  \ 和 `preserveRatio` 来缩放影片，使其在整个屏幕上播放。这是通过使用 `Stage` 的 `fullScreen` 属性来确保屏幕上只能看到影片来实现的。按下\
  \ Escape 键将使应用程序恢复到其正常窗口。\n\n***清单 9-32.*** 一个全屏影片播放器\n\n```java\npublic class FullScreenVideoPlayer\
  \ extends Application {\n\n    public static void main(String[] args) {\n      \
  \  launch(args);\n    }\n\n    @Override\n    public void start(Stage primaryStage)\
  \ {\n        String workingDir = System.getProperty(\"user.dir\");\n        final\
  \ File f = new File(workingDir, \"../media/omgrobots.flv\");\n        final Media\
  \ m = new Media(f.toURI().toString());\n        final MediaPlayer mp = new MediaPlayer(m);\n\
  \        final MediaView mv = new MediaView(mp);\n\n        final DoubleProperty\
  \ width = mv.fitWidthProperty();\n        final DoubleProperty height = mv.fitHeightProperty();\n\
  \        width.bind(Bindings.selectDouble(mv.sceneProperty(), \"width\"));\n   \
  \     height.bind(Bindings.selectDouble(mv.sceneProperty(), \"height\"));\n    \
  \    mv.setPreserveRatio(true);\n\n        StackPane root = new StackPane();\n \
  \       root.getChildren().add(mv);\n        final Scene scene = new Scene(root,\
  \ 960, 540);\n        scene.setFill(Color.BLACK);\n        primaryStage.setScene(scene);\n\
  ```\n\n\nprimaryStage.setTitle(\"全屏视频播放器\");\n\nprimaryStage.setFullScreen(true);\n\
  \nprimaryStage.show();\n\nmp.play();\n\n}\n\n}\n\n清单 9-32 中高亮显示的代码表明，MediaView 的\
  \ fitWidth 和 fitHeight 属性已绑定到 MediaView 的 Scene 对象的 width 和 height 属性。使用 `Bindings.selectDouble`\
  \ 是为了确保当 MediaView 添加到活动场景图时，fitWidth 和 fitHeight 能够更新。为了使影片正确缩放，必须将 preserveRatio\
  \ 属性设置为 true。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 9 章 ■ 使用媒体类\n\
  \nMediaView 与特效\n\n所有可应用于节点的常规特效同样可以应用于 MediaView。必须注意确保这些特效不会过于消耗资源，以免干扰影片的流畅播放。有了这个前提，我们来介绍一些媒体播放器应用中常用的特效。反射（参见\
  \ `javafx.scene.effect.Reflection`）是一种流行的特效，尤其是在旨在展示平台图形处理能力的演示中。反射效果可以让影片看起来像是放在一个光滑的表面上。这种效果非常引人注目，因为反射会实时更新以匹配影片内容。JavaFX\
  \ 的 ColorAdjust 特效可用于改变影片中的颜色，产生有趣且视觉上引人入胜的效果。如果你心情比较文艺，那么 SepiaTone 特效可能正合你意。当然，还有经典可靠的\
  \ DropShadow 特效，可以让影片看起来像是悬浮在背景之上。我们鼓励你使用示例程序，并尝试 `javafx.scene.effect` 包中的不同特效。这是一种有趣且富有启发性的学习方式。\n\
  \n使用标记\n\nJavaFX 2.0 媒体 API 还支持媒体标记。这些标记可用于在媒体播放期间触发事件。每个 Media 对象都包含一个 ObservableMap，其键是字符串，值是\
  \ Duration。在播放过程中，这些标记会在标记指定的 Duration 处触发 MediaMarkerEvent。通过将 EventHandler 传递给\
  \ MediaPlayer 的 `setOnMarker` 方法，可以捕获这些事件。清单 9-33 包含了 VideoPlayer2 应用程序的代码，该应用程序在视频播放期间设置并显示这些标记的文本。\n\
  \n虽然我们在此处展示的是视频播放期间的功能，但标记功能在音频播放期间同样可用。\n\n***清单 9-33.*** 在影片中显示媒体标记\n\npublic\
  \ class VideoPlayer2 extends Application {\n\npublic static void main(String[] args)\
  \ {\n\nlaunch(args);\n\n}\n\n@Override\n\npublic void start(Stage primaryStage)\
  \ {\n\nfinal Label markerText = new Label();\n\nStackPane.setAlignment(markerText,\
  \ Pos.TOP_CENTER);\n\nString workingDir = System.getProperty(\"user.dir\");\n\n\
  final File f = new File(workingDir, \"../media/omgrobots.flv\");\n\nfinal Media\
  \ m = new Media(f.toURI().toString());\n\n**final ObservableMap<String, Duration>\
  \ markers = m.getMarkers();**\n\n**markers.put(\"机器人发现墙壁\", Duration.millis(3100));**\n\
  \n**markers.put(\"然后发现绿线\", Duration.millis(5600));**\n\n**markers.put(\"机器人抓住雪橇\"\
  , Duration.millis(8000));**\n\n**markers.put(\"并朝家前进\", Duration.millis(11500));**\n\
  \nfinal MediaPlayer mp = new MediaPlayer(m);\n\nmp.setOnMarker((event) -> {\n\n\
  Platform.runLater(() -> {\n\nmarkerText.setText(event.getMarker().getKey());\n\n\
  });\n\n});\n\nfinal MediaView mv = new MediaView(mp);\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 143](img/index-423_1.jpg)\n\n第 9 章 ■ 使用媒体类\n\nfinal StackPane root = new\
  \ StackPane();\n\nroot.getChildren().addAll(mv, markerText);\n\nroot.setOnMouseClicked((event)\
  \ -> {\n\nmp.seek(Duration.ZERO);\n\nmarkerText.setText(\"\");\n\n});\n\nfinal Scene\
  \ scene = new Scene(root, 960, 540);\n\nfinal URL stylesheet = getClass().getResource(\"\
