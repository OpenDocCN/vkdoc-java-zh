  第 2 章 ■ 在 JavaFX 中创建用户界面\n\n使用 KeyFrame 动作事件处理器\n\n我们在时间线中使用的技术与本章前面演示的 Metronome1\
  \ 程序（见图 2-8 和清单 2-5）不同。我们没有在一段时间内对两个值进行插值，而是在时间线中使用了 KeyFrame 实例的动作事件处理器。请查看清单 2-8\
  \ 中的以下片段，了解该技术的实际应用。\n\npongAnimation = new Timeline(\n\nnew KeyFrame(new Duration(10.0),\
  \ t -> {\n\ncheckForCollision();\n\nint horzPixels = movingRight ? 1 : -1;\n\nint\
