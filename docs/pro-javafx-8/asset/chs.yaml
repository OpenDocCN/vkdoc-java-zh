  \ = 0x000000ff\n\n理解惰性实例化属性策略\n\n如果你的 JavaFX Bean 有很多属性，那么在 Bean 创建时立即实例化所有属性对象可能是一种过于沉重的方法。如果实际上只使用了其中少数几个属性，那么所有属性对象的内存就真的被浪费了。在这种情况下，你可以使用几种惰性实例化属性策略之一。两种典型的策略是*半惰性实例化*策略和*完全惰性实例化*策略。\n\
  \n在半惰性策略中，只有当 setter 被调用且传入的值与默认值不同时，或者当属性 getter 被调用时，属性对象才会被实例化。清单 4-13 中的程序说明了如何实现此策略。\n\
  \n***清单 4-13.*** JavaFXBeanModelHalfLazyExample.java\n\nimport javafx.beans.property.SimpleStringProperty;\n\
  \nimport javafx.beans.property.StringProperty;\n\npublic class JavaFXBeanModelHalfLazyExample\
  \ {\n\nprivate static final String DEFAULT_STR = \"Hello\";\n\nprivate StringProperty\
  \ str;\n\npublic final String getStr() {\n\nif (str != null) {\n\nreturn str.get();\n\
  \n} else {\n\nreturn DEFAULT_STR;\n\n}\n\n}\n\npublic final void setStr(String str)\
  \ {\n\nif ((this.str != null) || !(str.equals(DEFAULT_STR))) {\n\nstrProperty().set(str);\n\
  \n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 4 章 ■ 属性和绑定\n\n\
  public StringProperty strProperty() {\n\nif (str == null) {\n\nstr = new SimpleStringProperty(this,\
  \ \"str\", DEFAULT_STR);\n\n}\n\nreturn str;\n\n}\n\n}\n\n在这种策略中，客户端代码可以多次调用 getter\
  \ 而无需实例化属性对象。如果属性对象为 null，getter 仅返回默认值。一旦 setter 被调用且传入的值与默认值不同，它就会调用属性 getter，而属性\
  \ getter 会惰性地实例化属性对象。如果客户端代码直接调用属性 getter，属性对象也会被实例化。\n\n在完全惰性策略中，只有当属性 getter 被调用时，属性对象才会被实例化。getter\
  \ 和 setter 仅在属性对象已实例化时才通过它进行操作。否则，它们会通过一个单独的字段进行操作。\n\n清单 4-14 中的程序展示了一个完全惰性属性的示例。\n\
  \n***清单 4-14.*** JavaFXBeanModelFullLazyExample.java\n\nimport javafx.beans.property.SimpleStringProperty;\n\
  \nimport javafx.beans.property.StringProperty;\n\npublic class JavaFXBeanModelFullLazyExample\
  \ {\n\nprivate static final String DEFAULT_STR = \"Hello\";\n\nprivate StringProperty\
  \ str;\n\nprivate String _str = DEFAULT_STR;\n\npublic final String getStr() {\n\
  \nif (str != null) {\n\nreturn str.get();\n\n} else {\n\nreturn _str;\n\n}\n\n}\n\
  \npublic final void setStr(String str) {\n\nif (this.str != null) {\n\nthis.str.set(str);\n\
  \n} else {\n\n_str = str;\n\n}\n\n}\n\npublic StringProperty strProperty() {\n\n\
  if (str == null) {\n\nstr = new SimpleStringProperty(this, \"str\", DEFAULT_STR);\n\
  \n}\n\nreturn str;\n\n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 ■ 属性和绑定\n\n■ **注意** 完全惰性实例化策略会引入一个额外字段的开销，以便将属性实例化的需求再推迟一段时间。同样，半惰性和完全惰性实例化策略都会带来实现复杂性和运行时性能方面的开销，以换取可能减少运行时内存占用的好处。这是软件工程中一个经典的权衡取舍情况。选择哪种策略将取决于你的应用程序的具体情况。我们的建议是，只有在有需要时才引入优化。\n\
  \n使用选择绑定\n\n正如你在前面“理解绑定工具类”一节中所看到的，绑定工具类包含七个选择运算符。这些运算符的方法签名是：\n\n• select(Object\
  \ root, String... steps)\n\n• selectBoolean(Object root, String... steps)\n\n• selectDouble(Object\
  \ root, String... steps)\n\n• selectFloat(Object root, String... steps)\n\n• selectInteger(Object\
  \ root, String... steps)\n\n• selectLong(Object root, String... steps)\n\n• selectString(Object\
  \ root, String... steps)\n\n这些选择运算符允许你创建能够观察深度嵌套的 JavaFX Bean 属性的绑定。\n\n\n\n假设你有一个\
  \ JavaFX bean，它包含一个属性，该属性的类型是另一个 JavaFX bean，而这个 bean 又包含一个属性，其类型是另一个 JavaFX bean，以此类推。同时，假设你正在通过一个\
  \ `ObjectProperty` 来观察这个属性链的根节点。那么，你可以通过调用某个 `select` 方法来创建一个绑定，用于观察深层嵌套的 JavaFX\
  \ Bean 属性。该方法的第一个参数是作为根节点的 `ObjectProperty`，其余参数是依次指向深层嵌套 JavaFX Bean 属性的属性名称，且该方法的类型需与深层嵌套的\
  \ JavaFX Bean 属性的类型相匹配。\n\n■ **注意** 还有另一组 `select` 方法，它们将 `ObservableValue` 作为第一个参数。这些方法是在\
  \ JavaFX 2.0 中引入的。而将 `Object` 作为第一个参数的 `select` 方法集允许我们使用任何 Java 对象（而不仅仅是 JavaFX\
  \ Bean）作为选择绑定的根节点。\n\n在下面的示例中，我们使用了 `javafx.scene.effect` 包中的几个类——`Lighting` 和 `Light`——来说明选择运算符的工作原理。我们将在本书的后续章节中教你如何将光照应用于\
  \ JavaFX 场景图。目前，我们关注的是：`Lighting` 是一个 JavaFX bean，它有一个名为 `light` 的属性，其类型是 `Light`；而\
  \ `Light` 也是一个 JavaFX bean，它有一个名为 `color` 的属性，其类型是 `Color`（位于 `javafx.scene.paint`\
  \ 包中）。\n\n清单 4-15 中的程序演示了如何观察光照中灯光的颜色。\n\n***清单 4-15.*** SelectBindingExample.java\n\
  \n```java\nimport javafx.beans.binding.Bindings;\n\nimport javafx.beans.binding.ObjectBinding;\n\
