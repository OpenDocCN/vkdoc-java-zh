  \ 2-2、2-4 和 2-5 中。\n\n控制舞台是否可调整大小\n\n如下面的清单 2-1 摘录所示，为了使此应用程序的窗口最初可调整大小，我们调用了`Stage`实例的`setResizable()`方法。为了保持`Stage`的可调整大小属性与可调整大小复选框的状态同步，该复选框与`Stage`实例的`resizable`属性进行了双向绑定。\n\
