  QuestionResponse 类本身有两个注解：\n\n@XmlAccessorType(XmlAccessType.FIELD)\n\n之前已经讨论过，而\n\
  \n@XmlRootElement(name=\"items\")\n\n表明这个类对应于 XML 结构中的一个根对象，名称为“items”。这确实与我们之前在清单\
  \ 11-6 中创建的 XML 响应的语法相对应。\n\n前面的示例展示了如何使用 Java 2 平台标准版中已有的技术从 Web 服务获取数据，并将这些数据注入\
  \ JavaFX 控件中。现在我们修改示例代码，以利用 JavaFX 平台的一些特定功能。\n\n异步处理\n\n到目前为止，这些示例的一个主要问题是它们在数据检索和解析过程中会阻塞用户界面。在许多实际场景中，这是不可接受的。由于网络或服务器问题，对外部\
  \ Web 服务的调用可能比预期花费更长时间。即使外部调用很快，暂时无响应的用户界面也会降低应用程序的整体质量。\n\n幸运的是，JavaFX 平台支持并发和异步任务。Task、Worker\
