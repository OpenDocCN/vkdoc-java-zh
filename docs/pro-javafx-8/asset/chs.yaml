  \n***图 3-26.** 菜单打开的文档面板*\n\n理解内容面板\n\n内容面板是组合用户界面的地方。您首先将一个容器拖到内容面板中。然后，您将其他节点拖到内容面板中，并将其定位到容器节点上。当您拖动节点时，当拖动的节点达到某些对齐和间距位置时，会出现红色参考线。借助这些参考线，您应该能够创建视觉上令人愉悦的用户界面。\n\
