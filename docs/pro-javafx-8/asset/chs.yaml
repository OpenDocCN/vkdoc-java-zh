  \n总结\n\nJavaFX 图表 API 为不同类型的图表提供了多种即用型实现。每种实现都有其特定用途，开发者需要选择最合适的图表类型。\n\n通过应用 CSS\
  \ 规则或使用图表特定的方法或属性，可以对图表进行修改并针对特定应用进行调优。\n\n如果你需要更定制化的图表，可以扩展抽象的`Chart`类并利用该类上的现有属性，或者如果你的图表需要两个坐标轴，则可以扩展抽象的`XYChart`类。\n\
  \n资源\n\n有关 JavaFX 图表 API 的更多信息，请参考以下资源：\n\n• [`docs.oracle.com/javase/8/javafx/user-interface-tutorial/charts.htm`](http://docs.oracle.com/javase/8/javafx/user-interface-tutorial/charts.htm)\n\
  \n• [`docs.oracle.com/javase/8/javafx/user-interface-tutorial/css-styles.htm`](http://docs.oracle.com/javase/8/javafx/user-interface-tutorial/css-styles.htm)\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 9 章**\n\n**使用媒体类**\n\n\
  *我们不断前进，开启新的大门，尝试新的事物，因为我们充满好奇，而好奇心不断引领我们探索新的道路。*\n\n—沃尔特·迪士尼\n\n在前几章中，你已经学会了如何使用\
  \ JavaFX 库创建应用程序。现在，我们将充分利用这些知识，创建探索 JavaFX 平台音频和视频功能的应用程序。\n\n基础\n\n自 JavaFX 2.0\
  \ 起，JavaFX 中的媒体类基于一个名为 GStreamer1 的开源多媒体框架。\n\n这与早期版本 JavaFX 中的媒体库相比是一个重大变化，早期版本直接使用了各种支持平台的原生媒体功能。相比之下，基于\
  \ GStreamer 的库提供了更好的稳定性和跨平台一致性。后者应结合 Java“一次编写，到处运行”的范式来看待。在 JavaFX 1 中，不同平台上的 JavaFX\
  \ 媒体应用程序之间存在巨大差异。\n\n如今，这种一致性的缺点是某些情况下提供的功能较少，但不同平台提供了相同的功能。\n\n支持的媒体格式\n\n表 9-1\
  \ 显示了 JavaFX 媒体类支持的文件格式。支持四种音频格式和三种视频格式。JavaFX 支持的四种音频格式（MP3、WAV、AIFF 和 AAC）非常常见，并且都得到了市场上大多数音频工具的很好支持。你应该能够轻松地将源音频文件获取为\
  \ JavaFX 支持的格式之一，或将其转换为这些格式。\n\n1[`gstreamer.freedesktop.org/`](http://gstreamer.freedesktop.org/)\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 9 章 ■ 使用媒体类\n\n***表 9-1.**\
  \ JavaFX 支持的媒体格式*\n\n**文件扩展名类型**\n\n**格式**\n\n**MIME 类型**\n\n.mp3\n\n音频\n\nMP3：MPEG-1、2、2.5\
  \ 音频，带有 ID3 v2.3、v2.4 元数据\n\naudio/mpeg\n\n.aif, .aiff\n\n音频\n\n音频交换文件格式：未压缩音频\n\
  \naudio/x-aiff\n\n.wav\n\n音频\n\n波形音频格式：未压缩音频\n\naudio/x-wav\n\n.aac, .m4a\n\n音频\n\
  \nMPEG-4 多媒体容器，包含高级音频编码（AAC）音频\n\naudio/aac\n\n.fxm\n\n视频\n\nFX 媒体：VP6 视频与 MP3 音频\n\
  \nvideo/x-javafx\n\n.flv\n\n视频\n\nFlash 视频：VP6 视频与 MP3 音频\n\nvideo/x-flv\n\n.mp4\n\
  \n视频\n\nMPEG-4 多媒体容器，采用 H.264/AVC（高级视频编码）视频压缩\n\nvideo/mp4\n\nFXM 是“原生”JavaFX 视频格式。它由\
  \ VP6 编码的视频和 MP3 音频组成，这种组合也用于 Flash 视频（FLV）文件。FLV 容器除了 VP6 和 MP3 之外，还可以承载多种不同的视频和音频编码选项。因此，说\
  \ JavaFX 可以播放任何 FLV 文件是不准确的。然而，VP6/MP3 组合非常常见，因此可以说 JavaFX 应该能够播放互联网上能找到的大多数 FLV\
  \ 文件。FLV 视频得到了 Adobe 等公司工具的广泛支持，因此你应该能够轻松地转换或制作这种格式的视频。\n\n从 JavaFX 2.1 开始，支持 H.264。JavaFX\
  \ 现在支持带有 H.264 视频和 AAC 音频的 MPEG-4 多媒体。\n\n使用音频剪辑\n\n\n在 JavaFX 的早期版本中，无法播放低延迟音频。这一急需的功能在\
  \ 2.0 版本中通过新的 `AudioClip` 类得以实现。音频剪辑不适合用于大型或长时间的声音，因为与之相关的音频数据会被解压缩并完全存储在内存中。如果你需要播放一首歌曲或其他较长的音频文件，则应改用\
  \ `Media` 对象，这将在下一节中讨论。\n\n`AudioClip` 非常适合在游戏或其他富媒体应用中播放短促的声音以响应用户操作。构造 `AudioClip`\
  \ 实例时，只需将 URI 字符串作为唯一参数传递给构造函数。该 URI 可以指向互联网上的资源、本地文件系统，或通过分别使用 `http:`、`file:`\
  \ 和 `jar:` 协议指向 jar 文件内的资源。构造 `AudioClip` 后，你可以调整多个影响剪辑播放的属性，例如音量、播放速率、声像和平衡。调用其\
  \ `play` 方法将开始播放 `AudioClip`。你可以重复调用 `play` 方法来开始对给定剪辑进行多次重叠播放。\n\n实际上，`AudioClip`\
  \ 类中有三个重载版本的 `play` 方法。不带参数调用该方法将使用 `AudioClip` 实例的当前属性进行播放。还有一个 `play` 方法的变体，它接受一个音量参数，允许你仅针对该次播放覆盖剪辑的音量。\n\
  \n`play` 方法的最后一个变体允许你指定该次播放的音量、平衡、速率、声像和优先级。\n\n将这些参数指定为 `play` 方法的参数并不会导致它们被永久保存；它们仅是一次性的覆盖，覆盖\
  \ `AudioClip` 的实例数据。还有一个 `stop` 方法，用于停止 `AudioClip` 的所有播放。\n\n清单 9-1 演示了创建和播放 `AudioClip`\
  \ 所需的简单步骤。此源代码位于本书源代码 Chapter09 目录下的 BasicAudioClip 示例项目中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\n***清单 9-1.*** 播放音频剪辑\n\npublic class BasicAudioClip extends Application\
  \ {\n\npublic static void main(String[] args) {\n\nlaunch(args);\n\n}\n\n@Override\n\
  \npublic void start(Stage primaryStage) {\n\nfinal URL resource = getClass().getResource(\"\
  resources/beep.wav\");\n\nfinal AudioClip clip = new AudioClip(resource.toString());\n\
  \nfinal Button button = new Button(\"Bing Zzzzt!\");\n\nbutton.setOnAction((ActionEvent\
  \ event) -> {\n\nclip.play(1.0);\n\n});\n\nfinal StackPane stackPane = new StackPane();\n\
  \nstackPane.setPadding(new Insets(10));\n\nstackPane.getChildren().add(button);\n\
  \nfinal Scene scene = new Scene(stackPane, 200, 200);\n\nfinal URL stylesheet =\
  \ getClass().getResource(\"media.css\");\n\nscene.getStylesheets().add(stylesheet.toString());\n\
  \nprimaryStage.setTitle(\"Basic AudioClip Example\");\n\nprimaryStage.setScene(scene);\n\
  \nprimaryStage.show();\n\n}\n\n}\n\n创建 `AudioClip` 的前提是为要加载的资源创建 URI 字符串。在清单 9-1\
  \ 中，我们使用 `getResource` 方法返回嵌入在 jar 文件中的音频文件的 URI。该 URI 被转换为字符串，然后传递给 `AudioClip`\
  \ 构造函数。如前所述，`AudioClip` 构造函数会将整个声音加载到内存中，并在必要时对其进行解码。如果你的音效文件很小，你可以将它们存储为未压缩的格式，例如本例中使用的\
  \ `.wav` 文件，以避免解码开销。一旦声音文件大小超过 100 KB 左右，你应该考虑将其存储为压缩的 MP3 文件，因为较小的文件大小可以远远弥补解码声音的开销。如果你是从互联网上的服务器加载声音文件，这一点尤其重要。你还应记住，`AudioClip`\
  \ 构造函数会阻塞当前线程，直到声音完全加载。因此，如果你要加载大量文件或文件很大，应考虑在后台线程上加载音效。有关使用 JavaFX 并发类的详细信息，请参见第\
  \ 7 章。\n\n一旦构造了 `AudioClip`，你只需调用其 `play` 方法之一即可开始播放。清单 9-1 中的声音通过调用 `play` 方法并传递音量参数\
  \ `1.0` 来响应按钮点击，这会使声音以最大音量播放。然后将按钮添加到 `StackPane`，使其自动保持在场景中心。最后，将场景添加到舞台并显示给用户。请注意，`media.css`\
  \ 样式表已应用于场景。本章中的所有示例应用程序都使用此样式表。该样式表如清单 9-2 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 134](img/index-381_1.jpg)\n\n第 9 章 ■ 使用媒体类\n\n***清单 9-2.*** 本章应用程序使用的样式表的第一版\n\
