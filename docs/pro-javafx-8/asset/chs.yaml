  \ 和 `javafx.beans.value` 包中的所有 API，可以超越 JavaFX 属性和绑定框架的细节，学习如何将这些属性组织成更大的组件，即 JavaFX\
  \ Bean。\n\n理解 JavaFX Bean 约定\n\nJavaFX 引入了 JavaFX Bean 的概念，这是一组为 Java 对象提供属性支持的约定。\n\
  \n在本节中，我们将讨论指定 JavaFX Bean 属性的命名约定、实现 JavaFX Bean 属性的几种方法，以及最后的选择绑定用法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 ■ 属性和绑定\n\nJavaFX Bean 规范\n\n多年来，Java 一直使用 JavaBeans API 来表示对象的属性。JavaBeans\
  \ 属性由一对 getter 和 setter 方法表示。属性变化通过 setter 代码中触发属性变化事件来传播给属性变化监听器。\n\nJavaFX 引入了\
  \ JavaFX Bean 规范，该规范借助 JavaFX 属性和绑定框架中的属性类，为 Java 对象增加了属性支持。\n\n■ **注意** 这里的“属性”一词有两种不同的含义。当我们说\
  \ JavaFX Bean 属性时，应理解为类似于 JavaBeans 属性的更高级概念。当我们说 JavaFX 属性和绑定框架属性时，应理解为 `Property`\
  \ 或 `ReadOnlyProperty` 接口的各种实现，例如 `IntegerProperty`、`StringProperty` 等。JavaFX Bean\
  \ 属性是使用 JavaFX 属性和绑定框架属性来指定的。\n\n与 JavaBeans 类似，*JavaFX Bean 属性* 由 Java 类中的一组方法指定。要在\
  \ Java 类中定义 JavaFX Bean 属性，你需要提供三个方法：getter、setter 和属性 getter。对于类型为 `double`、名为\
  \ `height` 的属性，这三个方法是：\n\npublic final double getHeight();\n\npublic final void\
  \ setHeight(double h);\n\n\n\n`public DoubleProperty heightProperty();`\n\ngetter\
  \ 和 setter 方法的命名遵循 JavaBeans 规范。它们是通过将“get”和“set”与属性名称拼接而成，且属性名称的首字母大写。对于布尔类型的属性，getter\
  \ 方法名也可以以“is”开头。属性 getter 的名称是通过将属性名称与“Property”拼接而成。要定义一个*只读的 JavaFX Beans 属性*，你可以移除\
  \ setter 方法，或将其改为私有方法，并将属性 getter 的返回类型改为 `ReadOnlyProperty`。\n\n本规范仅涉及 JavaFX Beans\
  \ 属性的接口，并未施加任何实现约束。根据 JavaFX Bean 可能拥有的属性数量以及这些属性的使用模式，存在多种实现策略。毫不意外的是，所有这些策略都使用\
  \ JavaFX 属性和绑定框架属性作为 JavaFX Beans 属性值的后备存储。我们将在接下来的两个小节中向你展示这些策略。\n\n**理解急切实例化属性策略**\n\
  \n*急切实例化属性*策略是实现 JavaFX Beans 属性最简单的方法。对于你想在对象中定义的每个 JavaFX Beans 属性，你需要在类中引入一个私有字段，其类型为相应的\
  \ JavaFX 属性和绑定框架属性类型。这些私有字段在 Bean 构造时被实例化。getter 和 setter 方法只需调用私有字段的 `get()` 和\
  \ `set()` 方法。属性 getter 则直接返回该私有字段本身。\n\n清单 4-9 中的程序定义了一个 JavaFX Bean，它包含一个 int 属性\
  \ i、一个 String 属性 str 和一个 Color 属性 color。\n\n***清单 4-9.*** JavaFXBeanModelExample.java\n\
