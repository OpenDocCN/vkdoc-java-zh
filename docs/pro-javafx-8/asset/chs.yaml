  \n此 `TriangleMesh` 没有定义面平滑组。\n\n运行清单 10-4 中的程序时，将显示图 10-5 中的 `MeshView` 示例窗口。您可以通过控制面板更改材质、绘制模式和剔除面属性。您还可以绕\
  \ (1, 1, 1) 轴旋转，以查看单纯形的不同面。\n\n***图 10-5.** MeshViewExample 程序*\n\n现在我们已经了解了预定义和用户定义的\
  \ 3D 形状，接下来将介绍 JavaFX 3D 图形 API 中的其他重要类。\n\n向 JavaFX 3D 场景添加摄像机\n\n到目前为止，在本章中，我们还没有向\
  \ JavaFX 3D 场景添加自己的摄像机。我们一直依赖 JavaFX 运行时提供给场景的默认摄像机。它允许我们从负 *z* 位置观察场景。要从任何其他角度观察场景，我们需要提供自己的摄像机。\n\
  \n摄像机的类层次结构由一个抽象基类 `Camera` 及其具体子类 `ParallelCamera` 和 `PerspectiveCamera` 组成。它们属于\
  \ `javafx.scene` 包。当我们没有设置自己的摄像机时，JavaFX 运行时提供的摄像机就是 `ParallelCamera`。无论物体距离摄像机多远，它总是以相同的大小显示物体。这被称为*正交投影*，虽然计算起来容易得多，但看起来并不真实。对于\
  \ 3D 建模来说，`PerspectiveCamera` 更有趣。使用 `PerspectiveCamera` 时，远处的物体比近处的物体小。\n\n理解 PerspectiveCamera\n\
  \n`PerspectiveCamera` 类具有以下公共构造函数：\n\n• `PerspectiveCamera()`\n\n• `PerspectiveCamera(boolean\
  \ fixedEyeAtCameraZero)`\n\n默认构造函数创建一个 `PerspectiveCamera`，其 `fixedEyeAtCameraZero`\
  \ 设置为 `false`。单参数构造函数创建一个 `PerspectiveCamera`，其 `fixedEyeAtCameraZero` 为指定值。摄像机是\
  \ `Node`，可以放置在 JavaFX 场景中。新创建的 `PerspectiveCamera`，就像新创建的 `Sphere`、`Cylinder` 或\
  \ `Box` 一样，其中心或眼睛位于三维空间的原点 (0, 0, 0)。眼睛朝向正 *z* 方向。作为 `Node`，`PerspectiveCamera`\
  \ 本身可以通过 3D 变换（如旋转、平移、缩放，甚至通用的 `Affine`）进行变换。将 `fixedEyeAtCameraZero` 设置为 `true`\
  \ 可以保证在此类变换之后，`PerspectiveCamera` 的眼睛随之移动，并保持在摄像机的零位置。将 `fixedEyeAtCameraZero` 设置为\
  \ `false` 允许眼睛偏离摄像机的零位置，以适应场景中的内容。这对于渲染 2D 场景很有用，并且仅在摄像机本身未以任何方式变换时才有意义。因此，对于 3D\
  \ 模型的使用，您应始终使用单参数构造函数，并传入 `fixedEyeAtCameraZero` 为 `true`。\n\n`PerspectiveCamera`\
  \ 类具有以下公共方法：\n\n• `void setFieldOfView(double)`\n\n• `double getFieldOfView()`\n\
  \n• `DoubleProperty fieldOfViewProperty()`\n\n• `void setVerticalFieldOfView(boolean)`\n\
  \n• `boolean isVerticalFieldOfView()`\n\n• `BooleanProperty verticalFieldOfViewProperty()`\n\
  \n• `boolean isFixedEyeAtCameraZero()`\n\n这些方法为 `PerspectiveCamera` 类定义了两个属性：`fieldOfView`\
  \ 和 `verticalFieldOfView`。`fieldOfView` 是一个 `double` 属性，表示透视摄像机的视野，单位为度。\n\n\n\n\
  默认值为 30 度。`verticalFieldOfView`是一个布尔属性，用于确定视野属性是否应用于投影平面的垂直维度。`isFixedEyeAtCameraZero()`方法返回构造`PerspectiveCamera`时使用的`fixedEyeAtCameraZero`标志。\n\
  \n`PerspectiveCamera`还从`Camera`抽象类继承了两个双精度属性：`nearClip`和`farClip`。比`nearClip`更靠近眼睛的物体以及比`farClip`更远离眼睛的物体都不会在场景中渲染。\n\
  \n在清单 10-5 的程序中，我们创建了一个`Box`和一个`PerspectiveCamera`。与之前示例中对`Box`等 3D 对象本身进行变换不同，在此程序中，我们保持`Box`固定，并通过绕*x*轴旋转、绕*y*轴旋转以及沿*z*轴平移的组合方式来变换`PerspectiveCamera`。我们在一个五秒的`Timeline`中，将旋转角度从\
  \ 90 度动画变化到-90 度，并将*z*轴平移从-20 动画变化到-80。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 ■ JavaFX 3D\n\n***清单 10-5.*** PerspectiveCameraExample.java\n\nimport javafx.animation.Animation;\n\
  \nimport javafx.animation.KeyFrame;\n\nimport javafx.animation.KeyValue;\n\nimport\
  \ javafx.animation.Timeline;\n\nimport javafx.application.Application;\n\nimport\
  \ javafx.scene.Group;\n\nimport javafx.scene.PerspectiveCamera;\n\nimport javafx.scene.Scene;\n\
  \nimport javafx.scene.shape.Box;\n\nimport javafx.scene.transform.Rotate;\n\nimport\
  \ javafx.scene.transform.Translate;\n\nimport javafx.stage.Stage;\n\nimport javafx.util.Duration;\n\
  \npublic class PerspectiveCameraExample extends Application {\n\nprivate View view;\n\
  \n@Override\n\npublic void start(Stage stage) throws Exception {\n\nview = new View();\n\
  \nstage.setTitle(\"PerspectiveCamera 示例\");\n\nstage.setScene(view.scene);\n\nstage.show();\n\
  \nview.animate();\n\n}\n\npublic static void main(String[] args) {\n\nlaunch(args);\n\
  \n}\n\nprivate static class View {\n\npublic Scene scene;\n\npublic Box box;\n\n\
  public PerspectiveCamera camera;\n\nprivate final Rotate rotateX;\n\nprivate final\
  \ Rotate rotateY;\n\nprivate final Rotate rotateZ;\n\nprivate final Translate translateZ;\n\
  \nprivate View() {\n\nbox = new Box(10, 10, 10);\n\ncamera = new PerspectiveCamera(true);\n\
  \nrotateX = new Rotate(-20, Rotate.X_AXIS);\n\nrotateY = new Rotate(-20, Rotate.Y_AXIS);\n\
  \nrotateZ = new Rotate(-20, Rotate.Z_AXIS);\n\ntranslateZ = new Translate(0, 0,\
  \ -100);\n\ncamera.getTransforms().addAll(rotateX, rotateY, rotateZ, translateZ);\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 151](img/index-451_1.jpg)\n\
  \n第 10 章 ■ JavaFX 3D\n\nGroup group = new Group(box, camera);\n\nscene = new Scene(group,\
  \ 640, 480);\n\nscene.setCamera(camera);\n\n}\n\npublic void animate() {\n\nTimeline\
  \ timeline = new Timeline(\n\nnew KeyFrame(Duration.seconds(0),\n\nnew KeyValue(translateZ.zProperty(),\
  \ -20),\n\nnew KeyValue(rotateX.angleProperty(), 90),\n\nnew KeyValue(rotateY.angleProperty(),\
  \ 90),\n\nnew KeyValue(rotateZ.angleProperty(), 90)),\n\nnew KeyFrame(Duration.seconds(5),\n\
  \nnew KeyValue(translateZ.zProperty(), -80),\n\nnew KeyValue(rotateX.angleProperty(),\
  \ -90),\n\nnew KeyValue(rotateY.angleProperty(), -90),\n\nnew KeyValue(rotateZ.angleProperty(),\
  \ -90))\n\n);\n\ntimeline.setCycleCount(Animation.INDEFINITE);\n\ntimeline.play();\n\
  \n}\n\n}\n\n}\n\n请注意，相机需要作为`Node`添加到场景中，这样我们才能对其应用变换。同时，它还需要被设置为场景用于渲染 3D 模型的相机。\n\
  \n运行清单 10-5 中的程序时，会显示图 10-6 中的“PerspectiveCamera 示例”窗口。我们可以看到盒子从不同角度和不同距离被观察。当相机远离盒子时，盒子会变小。\n\
