  \ super V> listener)\n\nObservableMap 上没有其他便捷方法。\n\nMapChangeListener 接口只有一个方法：onChange(MapChangeListener.Change<?\
  \ extends K, ? extends V> change)。当 ObservableMap 的内容被操作时，此方法会被回调。请注意，此方法的参数类型是在\
  \ MapChangeListener 接口中声明的嵌套类 Change。与 ListChangeListener.Change 类不同，MapChangeListener.Change\
  \ 类旨在报告映射中单个键的变更。如果对 ObservableMap 的方法调用影响了多个键，则会触发与受影响键数量相同数量的映射变更事件。\n\nMapChangeListener.Change\
