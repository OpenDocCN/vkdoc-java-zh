  \n■ **注意** 在 JavaFX 2 中，推荐使用构建器模式来创建节点。因此，创建一条线的方式如下：\n\nline = LineBuilder.create()\n\
  \n.startY(50)\n\n.endX(200)\n\n.endY(400)\n\n.strokeWidth(4)\n\n.stroke(Color.BLUE)\n\
  \n.build();\n\n这种方法的优点在于，第二行中的参数“50”的含义非常清晰：该线在垂直方向上的起始坐标为 50。通过调用 setter 方法也可以达到同样的可读性，例如：\n\
  \nline.setStartY(50);\n\n\n\n然而，在实际应用中，许多参数是通过 Node 的构造函数传递的。以 Line 实例为例，第二个参数是\
  \ startY 参数。这种方法可以减少代码行数，但开发者需要留意构造函数中参数的顺序和含义。我们再次强烈建议在编写 JavaFX 应用程序时准备好 JavaDoc。\n\
  \n将关键帧插入时间线\n\n我们的时间线包含两个 KeyFrame 实例的集合。使用 KeyValue 构造函数，其中一个实例在时间线开始时将 startXVal\
  \ 属性赋值为 100，另一个实例在时间线运行一秒后将 startXVal 属性赋值为 300。由于 Line 的 startX 属性绑定到 startXVal\
  \ 属性的值，最终结果是线条的顶端在一秒内水平移动了 200 像素。\n\n在时间线的第二个 KeyFrame 中，KeyValue 构造函数传递了第三个参数，该参数指定从\
  \ 100 到 300 的插值将在一秒的持续时间内以线性方式进行。其他插值常量包括 EASE_IN、EASE_OUT 和 EASE_BOTH。这些常量分别使关键帧中的插值在开始、结束或开始和结束时速度变慢。\n\
  \n以下是本示例中使用的其他 Timeline 属性（继承自 Animation 类）：\n\n• autoReverse，我们将其初始化为 true。这会导致时间线在到达最后一个\
  \ KeyFrame 时自动反向播放。反向播放时，插值会在一秒内从 300 变为 100。\n\n• cycleCount，我们将其初始化为 Animation.INDEFINITE。这会导致时间线无限重复，直到被\
  \ Timeline 类的 stop() 方法停止。\n\n说到 Timeline 类的方法，现在是向您展示如何控制时间线并监控其状态的好时机。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 章 ■ 在 JavaFX 中创建用户界面\n\n控制与监控时间线\n\n正如您在使用 Metronome1 程序时所观察到的，点击按钮会导致动画开始、暂停、恢复和停止。这反过来会影响动画的状态（运行中、已暂停或已停止）。这些状态以启用或禁用的形式反映在按钮上。以下来自清单\
  \ 2-5 的代码片段展示了如何启动、暂停、恢复和停止时间线，以及如何判断时间线是正在运行还是已暂停。\n\nstartButton = new Button(\"\
  start\");\n\nstartButton.setOnAction(e -> anim.playFromStart());\n\npauseButton\
  \ = new Button(\"pause\");\n\npauseButton.setOnAction(e -> anim.pause());\n\nresumeButton\
  \ = new Button(\"resume\");\n\nresumeButton.setOnAction(e -> anim.play());\n\nstopButton\
  \ = new Button(\"stop\");\n\nstopButton.setOnAction(e -> anim.stop());\n\n**...代码省略...**\n\
  \nstartButton.disableProperty().bind(anim.statusProperty()\n\n.isNotEqualTo(Animation.Status.STOPPED));\n\
  \npauseButton.disableProperty().bind(anim.statusProperty()\n\n.isNotEqualTo(Animation.Status.RUNNING));\n\
  \nresumeButton.disableProperty().bind(anim.statusProperty()\n\n.isNotEqualTo(Animation.Status.PAUSED));\n\
  \nstopButton.disableProperty().bind(anim.statusProperty()\n\n.isEqualTo(Animation.Status.STOPPED));\n\
  \n如 Start 按钮的动作事件处理器所示，调用了 Timeline 实例的 playFromStart() 方法，该方法从开头开始播放时间线。此外，该 Button\
  \ 的 disable 属性绑定到一个表达式，该表达式评估时间线的 status 属性是否不等于 Animation.Status.STOPPED。这会导致当时间线未停止时（此时它必须处于运行或暂停状态），该按钮被禁用。\n\
  \n当用户点击 Pause 按钮时，动作事件处理器会调用时间线的 pause() 方法，该方法会暂停动画。该 Button 的 disable 属性绑定到一个表达式，该表达式评估时间线是否未在运行。\n\
  \n\n\n“恢复”按钮仅在时间线未暂停时禁用。要从暂停位置恢复时间线，动作事件处理器会调用时间线的 `play()` 方法。\n\n最后，当时间线停止时，“停止”按钮会被禁用。要停止时间线，动作事件处理器会调用时间线的\
  \ `stop()` 方法。\n\n现在你已经了解了如何通过创建 `Timeline` 类和 `KeyFrame` 实例来为节点制作动画，接下来该学习如何使用过渡类来为节点制作动画了。\n\
  \n**使用过渡类进行动画制作**\n\n使用 `TimeLine` 可以实现非常灵活的动画效果。JavaFX 内置支持多种常见动画，这些动画便于实现从一种状态到另一种状态的转换。`javafx.animation`\
  \ 包中包含多个类，旨在为这些常用的动画任务提供便捷的实现方式。\n\n`TimeLine` 和 `Transition`（所有具体过渡类的抽象根类）都继承自\
  \ `Animation` 类。\n\n表 2-1 列出了该包中的过渡类。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 章 ■ 在 JavaFX 中创建用户界面\n\n***表 2-1.** javafx.animation 包中用于节点动画的过渡类* **过渡类名称**\n\
  \n**描述**\n\n`TranslateTransition`\n\n在指定时间段内将节点从一个位置平移（移动）到另一个位置。\n\n第 1 章的 Hello\
  \ Earthrise 示例程序中使用了该过渡。\n\n`PathTransition`\n\n沿指定路径移动节点。\n\n`RotateTransition`\n\
  \n在指定时间段内旋转节点。\n\n`ScaleTransition`\n\n在指定时间段内缩放（增大或减小尺寸）节点。\n\n`FadeTransition`\n\
  \n在指定时间段内淡入或淡出（增大或减小不透明度）节点。\n\n`FillTransition`\n\n在指定时间段内更改形状的填充颜色。\n\n`StrokeTransition`\n\
  \n在指定时间段内更改形状的描边颜色。\n\n`PauseTransition`\n\n在其持续时间结束时执行一个动作；主要用于在 `SequentialTransition`\
  \ 中作为等待一段时间的手段。\n\n`SequentialTransition`\n\n允许你定义一系列按顺序执行的过渡。\n\n`ParallelTransition`\n\
  \n允许你定义一系列并行执行的过渡。\n\n让我们来看一个节拍器主题的变体，其中我们使用 `TranslateTransition` 来创建动画。\n\n**MetronomeTransition\
  \ 示例**\n\n使用过渡类时，我们采用与直接使用 `Timeline` 类不同的动画方法：\n\n• 在基于时间线的 Metronome1 程序中，我们将节点的一个属性（具体是\
  \ `startX`）绑定到模型中的一个属性（`startXVal`），然后使用时间线对模型中的属性值进行插值。\n\n• 然而，在使用过渡类时，我们为 `Transition`\
  \ 子类的属性赋值，其中一个属性就是节点。最终结果是节点本身受到影响，而不仅仅是节点的绑定属性受到影响。\n\n当我们逐步讲解 MetronomeTransition\
