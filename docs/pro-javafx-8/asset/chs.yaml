  \ [Zero, One, Two, Three]\n\n变更事件数据:\n\n游标 = 0\n\n变更类型: added\n\n影响范围: [0, 4]\n\n\
  新增大小: 4\n\n新增子列表: [Zero, One, Two, Three]\n\n调用 FXCollections.sort(strings):\n\n\
