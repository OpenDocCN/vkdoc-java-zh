  \ 程序，线框形式*\n\n创建用户自定义的 3D 形状\n\n`MeshView` 类是一个 `Node`，它允许将任意用户自定义的 3D 形状集成到 JavaFX\
  \ 场景中。它具有以下构造函数：\n\n• `MeshView()`\n\n• `MeshView(Mesh mesh)`\n\n默认构造函数创建一个没有 `Mesh`\
  \ 的 `MeshView`。单参数构造函数使用指定的网格创建一个 `MeshView`。该网格作为一个可读写的对象属性提供。`Mesh` 抽象类及其具体子类\
  \ `TriangleMesh` 用于存储 3D 形状的几何信息。`TriangleMesh` 中的几何信息包括：\n\n• 3D 形状所有顶点（或点）的三维坐标\n\
  \n• 3D 形状使用的二维纹理坐标\n\n• 3D 形状的面，每个面都是一个三角形，其顶点来自顶点列表，纹理坐标来自纹理坐标列表\n\n• 面平滑组，它使 JavaFX\
  \ 运行时能够平滑地连接同一平滑组中的面，使其公共边缘平滑过渡，而不同平滑组之间的面边缘则保留为硬边\n\n出于效率考虑，`TriangleMesh` 类将这些信息存储在可观察数组中。以下公共方法允许你访问这些可观察数组及其大小：\n\
  \n• `ObservableFloatArray getPoints()`\n\n• `ObservableFloatArray getTexCoords()`\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 10 章 ■ JavaFX 3D\n\n• `ObservableFaceArray\
  \ getFaces()`\n\n• `ObservableIntegerArray getFaceSmoothingGroups()`\n\n• `int getPointElementSize()`\n\
  \n• `int getTexCoordElementSize()`\n\n• `int getFaceElementSize()`\n\n`getPoints()`\
  \ 方法返回一个 `ObservableFloatArray`，你可以用它来添加三维顶点坐标。这个可观察浮点数组的大小必须是 3 的倍数，数组元素被解释为 *x0*、*y0*、*z0*、*x1*、*y1*、*z1*、……，其中\
  \ (*x0*、*y0*、*z0*) 是第一个顶点 *p0* 的坐标，(*x1*、*y1*、*z1*) 是第二个顶点 *p1* 的坐标，依此类推。\n\n`getTexCoords()`\
  \ 方法返回一个 `ObservableFloatArray`，你可以用它来添加二维纹理坐标。这个可观察浮点数组的大小必须是 2 的倍数，数组元素被解释为 *u0*、*v0*、*u1*、*v1*、……，其中\
  \ (*u0*、*v0*) 是第一个纹理点，(*u1*、*v1*) 是第二个纹理点，依此类推。\n\n我们将在材质部分更详细地介绍纹理坐标。目前，将纹理坐标理解为二维图像中的点就足够了，该图像的左上角坐标为\
  \ (0, 0)，右下角坐标为 (1, 1)。\n\n`getFaces()` 方法返回一个 `ObservableFaceArray`，你可以用它来向 3D\
  \ 形状添加面。`ObservableFaceArray` 是 `ObservableIntegerArray` 接口的子接口。该数组的大小必须是 6 的倍数，数组元素被解释为\
  \ *p0*、*t0*、*p1*、*t1*、*p2*、*t2*、*p3*、*t3*、*p4*、*t4*、*p5*、*t5*、……，其中 *p0*、*t0*、*p1*、*t1*、*p2*、*t2*\
  \ 定义第一个面，*p3*、*t3*、*p4*、*t4*、*p5*、*t5* 定义第二个面，依此类推。在定义面的六个整数中，*p* 值是概念点数组的索引，该数组的长度是实际点数组长度的三分之一，因为我们将实际点数组中的三个浮点元素视为构成一个概念点；而\
  \ *t* 值是概念纹理坐标数组的索引，该数组的长度是实际纹理坐标数组长度的二分之一，因为我们将实际纹理坐标数组中的两个浮点元素视为构成一个概念纹理坐标对。\n\
  \n\n\n`getFaceSmoothingGroups()` 方法返回一个 `ObservableIntegerArray`，你可以用它来为 3D 形状的面定义平滑组。你可以将此数组留空，在这种情况下，JavaFX\
  \ 运行时会认为 3D 形状的所有面都属于同一个平滑组，从而生成一个表面处处平滑的 3D 形状。预定义的 3D 形状 `Sphere` 的底层 `TriangleMesh`\
  \ 就是这种情况。如果你填充此数组，则必须用与概念面数量相同的元素来填充它，该数量是实际面数组长度的六分之一，因为我们把实际面数组中的六个 `int` 元素视为构成一个概念面。面平滑组数组中的每个元素代表\
  \ 3D 形状的一个面，当每个 `int` 值被视为 32 个独立位时，当且仅当两个面的表示共享一个公共的开启位时，它们才属于同一个平滑组。一个 `TriangleMesh`\
  \ 中最多可以有 32 个面平滑组。\n\n`getPointElementSize()` 方法始终返回 3。`getTexCoordElementSize()`\
  \ 方法始终返回 2。`getFaceElementSize()` 方法始终返回 6。\n\n3D 形状中的每个面都有两侧。在 3D 图形编程中，区分这两侧为正面或背面非常重要。JavaFX\
  \ 3D 使用逆时针绕序来定义正面。想象你站在三角形的一侧，并按照面定义中每个顶点出现的顺序追踪三角形的边。如果你发现是以逆时针方式追踪边，那么你就站在该面的正面。面的正面和背面这一概念正是\
  \ `CullFace.FRONT` 和 `CullFace.BACK` 枚举声明符所指代的。默认情况下，`Shape3D` 使用 `CullFace.BACK`\
  \ 设置，这意味着面的背面不会被渲染。\n\n清单 10-4 中的程序演示了在 JavaFX 中使用用户定义的 3D 形状。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
