  \n}\n\n.chart-content {\n\n-fx-padding:1;\n\n}\n\n.default-color0.chart-pie {\n\n\
  -fx-pie-color:blue;\n\n}\n\n.chart-legend {\n\n-fx-background-color: #f0e68c;\n\n\
  -fx-border-color: #696969;\n\n-fx-border-width:1;\n\n}\n\n运行此代码将产生如图 8-5 所示的输出。\n\
