  \ a Sound File\");**\n\n**File song = fc.showOpenDialog(viewNode.getScene().getWindow());**\n\
  \n**if (song != null) {**\n\n**songModel.setURL(song.toURI().toString());**\n\n\
  **songModel.getMediaPlayer().play();**\n\n**}**\n\n**}**\n\n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\n以下代码片段通过 CSS 样式表设置了 openButton 的图标。\n\n#openButton {\n\n-fx-graphic:\
  \ url(\"resources/music_note.png\");\n\n}\n\n下一步是添加拖放支持。我们将拖放事件处理器添加到 Scene 上，因为我们希望支持将文件或\
  \ URL 拖放到应用程序的任意位置。清单 9-13 展示了创建这些事件处理器的 initSceneDragAndDrop 方法。\n\n***清单 9-13.***\
  \ Scene 的 DragEvent 处理器\n\nprivate void initSceneDragAndDrop(Scene scene) {\n\n\
  scene.setOnDragOver(event -> {\n\nDragboard db = event.getDragboard();\n\nif (db.hasFiles()\
  \ || db.hasUrl()) {\n\nevent.acceptTransferModes(TransferMode.ANY);\n\n}\n\nevent.consume();\n\
  \n});\n\nscene.setOnDragDropped(event -> {\n\nDragboard db = event.getDragboard();\n\
  \nString url = null;\n\nif (db.hasFiles()) {\n\nurl = db.getFiles().get(0).toURI().toString();\n\
  \n} else if (db.hasUrl()) {\n\nurl = db.getUrl();\n\n}\n\nif (url != null) {\n\n\
  songModel.setURL(url);\n\nsongModel.getMediaPlayer().play();\n\n}\n\nevent.setDropCompleted(url\
  \ != null);\n\nevent.consume();\n\n});\n\n}\n\nDRAG_OVER 事件的处理器会检查此次拖放是否包含文件或 URL。如果是，它会调用\
  \ DragEvent 的 acceptTransferModes 方法来设置支持哪些 TransferMode 类型。在本例中，我们表示支持任何类型的传输。其他选项包括\
  \ COPY、LINK 和 MOVE。由于我们只关心文件 URL 的字符串形式或实际的 URL 字符串，因此可以接受任何类型的传输。在 DRAG_OVER 处理器中调用\
  \ acceptTransferModes 方法非常重要，因为在许多平台上，这会影响用户将拖放光标移过窗口时所看到的视觉反馈。\n\nDRAG_DROPPED\
  \ 处理器会获取拖放文件列表中第一个文件的 URL，或者如果拖放的是 URL 本身，则直接获取该 URL。与文件选择器代码一样，它会将此 URL 传递给 SongModel\
  \ 并开始播放歌曲。拖放操作的最后一步是调用 DragEvent 的 setDropCompleted 方法，以通知它拖放操作已成功完成。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\n清单 9-14 展示了新的 Application 类，它创建了视图并初始化了拖放处理。\n\nSongModel 实例在\
