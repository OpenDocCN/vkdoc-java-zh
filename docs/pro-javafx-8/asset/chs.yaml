  \n***图 3-30.** 检查器面板的“代码”部分*\n\n总结\n\n在本章中，您学习了在 JavaFX 中以声明方式创建用户界面的方法。您学习了以下重要的工具和信息：\n\
  \n• FXML 文件是声明式 UI 信息的载体，是 JavaFX 项目的核心资产。\n\n• FXML 文件通过 FXMLLoader 加载到 JavaFX\
  \ 应用程序中。加载的结果是一个可以合并到场景中的节点。\n\n• FXML 文件可以有一个配套的控制器类，该类在运行时代表 FXML 文件中声明的节点执行程序化功能，例如事件处理。\n\
