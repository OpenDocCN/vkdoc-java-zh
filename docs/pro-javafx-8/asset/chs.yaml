  \n在清单 11-2 中，我们展示了如何显示问题。在这个第一个示例中，问题并非通过 StackExchange API 获取，而是硬编码在示例中的。\n\n***清单\
  \ 11-2.*** 在 ListView 中渲染问题的框架\n\npackage projavafx;\n\nimport javafx.application.Application;\n\
