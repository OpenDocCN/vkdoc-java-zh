  );](http://traffic.libsyn.com/dickwall/JavaPosse373.mp3)\n\n**media.getMetadata().addListener((Change<?\
  \ extends String, ? extends Object> ch) -> {**\n\n**if (ch.wasAdded()) {**\n\n**handleMetadata(ch.getKey(),\
  \ ch.getValueAdded());**\n\n**}**\n\n**});**\n\nmediaPlayer = new MediaPlayer(media);\n\
  \nmediaPlayer.setOnError(() -> {\n\nfinal String errorMessage = media.getError().getMessage();\n\
  \n// 处理播放期间的错误\n\nSystem.out.println(\"MediaPlayer Error: \" + errorMessage);\n\n\
  });\n\nmediaPlayer.play();\n\n} catch (RuntimeException re) {\n\n// 处理构造错误\n\nSystem.out.println(\"\
  Caught Exception: \" + re.getMessage());\n\n}\n\n}\n\nprivate void handleMetadata(String\
  \ key, Object value) {\n\nswitch (key) {\n\ncase \"album\":\n\nalbum.setText(value.toString());\n\
  \nbreak;\n\ncase \"artist\":\n\nartist.setText(value.toString());\n\nbreak;\n\n\
  case \"title\":\n\ntitle.setText(value.toString());\n\nbreak;\n\ncase \"year\":\n\
  \nyear.setText(value.toString());\n\nbreak;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\ncase \"image\":\n\nalbumCover.setImage((Image)value);\n\nbreak;\n\
  \n}\n\n}\n\n如果 handleMetadata 方法确定新的元数据对程序有用，它会将元数据的值设置为 Label 控件的字符串或 ImageView\
  \ 节点的图像。清单 9-9 展示了此应用程序的其余代码，其中创建了这些控件并将其放入 GridPane 中供用户查看。此外，还对 media.css 样式表进行了一些小修改，以设置标签中使用的字体大小。你可以在本书示例代码的\
