  \n■ **提示** 已绑定的属性无法显式设置。在上述代码片段中，可调整大小属性是在下一行绑定属性*之前*通过 setResizable()方法设置的。\n\n\
  使舞台全屏显示\n\n要使舞台以全屏模式显示，只需将 Stage 实例的 fullScreen 属性设置为 true 即可。\n\n如清单 2-1 的以下片段所示，为了保持\
  \ Stage 的 fullScreen 属性与全屏复选框的状态同步，每当复选框的 selected 属性发生变化时，都会更新 Stage 实例的 fullScreen\
  \ 属性。\n\ncheckBoxFullScreen.selectedProperty().addListener((ov, oldValue, newValue)\
  \ -> {\n\nstageRef.setFullScreen(checkBoxFullScreen.selectedProperty().getValue());\n\
  \n});\n\n处理舞台的边界\n\n舞台的边界由其 x、y、width 和 height 属性表示，这些属性的值可以随意更改。清单 2-1 的以下片段演示了这一点：在\
  \ Stage 初始化后，将其放置在主屏幕顶部附近并水平居中。\n\nRectangle2D primScreenBounds = Screen.getPrimary().getVisualBounds();\n\
  \nstage.setX((primScreenBounds.getWidth() - stage.getWidth()) / 2);\n\nstage.setY((primScreenBounds.getHeight()\
  \ - stage.getHeight()) / 4);\n\n我们使用 javafx.stage 包中的 Screen 类来获取主屏幕的尺寸，以便计算所需位置。\n\
  \n■ **注意** 我们特意将图 2-2 中的 Stage 做得比其包含的 Scene 更大，以说明以下观点。Stage 的宽度和高度包括其装饰（标题栏和边框），这些在不同平台上有所不同。\n\
  \n因此，通常更好的做法是控制 Scene 的宽度和高度（稍后我们将展示如何操作），并让 Stage 适应该尺寸。\n\n绘制圆角矩形\n\n如第 1 章所述，您可以通过为矩形的角指定\
  \ arcWidth 和 arcHeight 来绘制圆角矩形。清单 2-1 中的以下片段绘制了天蓝色圆角矩形，该矩形成为图 2-5 中透明窗口示例的背景。\n\n\
  Rectangle blue = new Rectangle(250, 350, Color.SKYBLUE);\n\nblue.setArcHeight(50);\n\
  \nblue.setArcWidth(50);\n\n在此片段中，我们使用了 Rectangle 的三参数构造函数，其中前两个参数指定矩形的宽度和高度。第三个参数定义矩形的填充颜色。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 2 章 ■ 在 JavaFX 中创建用户界面\n\
  \n从这段代码可以看出，使用 arcWidth(double v)和 arcHeight(double v)方法可以轻松创建圆角矩形，其中参数 v 定义了弧的直径。\n\
  \n在无标题栏时在桌面上拖动舞台\n\nStage 可以使用其标题栏在桌面上拖动，但当其 StageStyle 为 UNDECORATED 或 TRANSPARENT\
  \ 时，标题栏不可用。为了在这种情况下允许拖动，我们添加了清单 2-1 中以下代码片段所示的代码。\n\n//当鼠标按下时，保存屏幕的初始位置\n\nrootGroup.setOnMousePressed((MouseEvent\
  \ me) -> {\n\ndragAnchorX = me.getScreenX() - stageRef.getX();\n\ndragAnchorY =\
  \ me.getScreenY() - stageRef.getY();\n\n});\n\n//当屏幕被拖动时，相应地平移它\n\nrootGroup.setOnMouseDragged((MouseEvent\
  \ me) -> {\n\nstageRef.setX(me.getScreenX() - dragAnchorX);\n\nstageRef.setY(me.getScreenY()\
  \ - dragAnchorY);\n\n});\n\n事件处理程序将在本章稍后部分介绍，但作为预览，当鼠标被拖动时，会调用提供给 onMouseDragged()方法的\
  \ lambda 表达式。结果，x 和 y 属性的值会根据鼠标拖动的像素数而改变，从而在鼠标拖动时移动 Stage。\n\n使用 UI 布局容器\n\n\n\n\
  在开发需要部署于跨平台环境或进行国际化的应用程序时，使用*布局容器*是一个好习惯。使用布局容器的优势之一在于，当节点尺寸发生变化时，它们之间的视觉关系是可预测的。另一个优势是，你无需计算放置在用户界面中每个节点的位置。\n\
  \n以下来自代码清单 2-1 的片段展示了如何使用位于 `javafx.scene.layout` 包中的 `VBox` 布局类，将 `Text`、`CheckBox`、`HBox`\
  \ 和 `Button` 节点排列成一列。该片段还展示了布局容器可以嵌套，如名为 `titleBox` 的 `HBox` 所示，它水平排列了 `Label` 和\
  \ `TextField` 节点。请注意，为了清晰展示布局嵌套，该片段中省略了若干行代码：\n\n```java\nHBox titleBox = new HBox(titleLabel,\
  \ titleTextField);\n\nVBox contentBox = new VBox(\n    textStageX, textStageY, textStageW,\
  \ textStageH, textStageF,\n    checkBoxResizable, checkBoxFullScreen,\n    titleBox,\
  \ toBackButton, toFrontButton, closeButton);\n```\n\n`VBox` 布局类与第 1 章“Hello Earthrise”示例中讨论的\
  \ `Group` 类类似，因为它内部包含一组节点。与 `Group` 类不同的是，`VBox` 类会垂直排列其包含的节点，并通过 `spacing` 属性中指定的像素数来设置节点之间的间距。\n\
