  }\n\n}\n```\n\n\n\n`Thread.sleep(Long.MAX_VALUE)` 模拟了需要长时间执行的代码。在实际应用中，这可能是数据库调用、Web\
  \ 服务调用或一段复杂的代码。因此，如果你点击“更改填充”按钮，矩形中不会看到颜色变化。更糟糕的是，整个 UI 似乎被锁定了：“更改填充”和“更改描边”按钮停止工作；操作系统提供的关闭窗口按钮也不会产生预期效果。操作系统还可能将该程序标记为“未响应”，停止程序的唯一方法是使用操作系统的强制终止功能。\n\
  \n要解决此类问题，我们需要将长时间运行的代码卸载到工作线程，并将长时间计算的结果传回 JavaFX 应用程序线程，以更新 UI 的状态，从而让用户看到结果。根据你学习\
  \ Java 的时间，你对将代码卸载到工作线程这一首要问题的答案可能有所不同。如果你是一位资深的 Java 程序员，你的本能反应可能是实例化一个 `Runnable`，将其包装在\
  \ `Thread` 中，并调用其 `start()` 方法。如果你是在 Java 5 之后开始学习 Java，并学习了 `java.util.concurrent`\
  \ 类层次结构，你的反应可能是创建一个 `java.util.concurrent.ExecutorService` 并向其提交 `java.util.concurrent.FutureTasks`。JavaFX\
  \ 在 `javafx.concurrent` 包中提供了一个基于后一种方法的工作线程框架。\n\n在接下来的几节中，我们将研究此框架中的接口和类，但在此之前，我们使用\
  \ `Runnable` 和 `Thread` 方法将计算卸载到工作线程。我们在此的目的是强调第二个问题的答案：如何从工作线程让代码在 JavaFX 应用程序线程上运行。\n\
  \n完整的修正程序可以在 `ResponsiveUIExample.java` 中找到。以下是“更改填充”按钮事件处理程序的新代码：\n\n```java\n\
  view.changeFillButton.setOnAction(actionEvent -> {\n\n    final Paint fillPaint\
  \ = model.getFillPaint();\n\n    if (fillPaint.equals(Color.LIGHTGRAY)) {\n\n  \
  \      model.setFillPaint(Color.GRAY);\n\n    } else {\n\n        model.setFillPaint(Color.LIGHTGRAY);\n\
  \n    }\n\n    Runnable task = () -> {\n\n        try {\n\n            Thread.sleep(3000);\n\
  \n            Platform.runLater(() -> {\n\n                final Rectangle rect\
  \ = view.rectangle;\n\n                double newArcSize =\n\n                 \
  \       rect.getArcHeight() < 20 ? 30 : 0;\n\n                rect.setArcWidth(newArcSize);\n\
  \n                rect.setArcHeight(newArcSize);\n\n            });\n\n        }\
  \ catch (InterruptedException e) {\n\n            // TODO 正确处理中断\n\n        }\n\n\
  \    };\n\n    new Thread(task).start();\n\n});\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 集合与并发\n\n我们已经用在工作线程中执行的代码替换了长时间的休眠。在休眠三秒后，工作线程调用 `javafx.application.Platform`\
  \ 类的 `runLater()` 方法，并向其传递另一个 `Runnable`，该 `Runnable` 用于切换矩形的圆角。由于长时间运行的计算在工作线程中完成，事件处理程序不会阻塞\
  \ JavaFX 应用程序线程。填充的更改现在会立即在 UI 中反映出来。由于 `Platform.runLater()` 调用会导致 `Runnable` 在\
  \ JavaFX 应用程序线程上执行，因此圆角的更改会在三秒后反映在 UI 中。我们必须在 JavaFX 应用程序线程上执行 `Runnable` 的原因是它修改了活动场景的状态。\n\
  \n`Platform` 类包含以下其他有用的实用方法：\n\n- `public static boolean isFxApplicationThread()`：如果在\
  \ JavaFX 应用程序线程上执行则返回 `true`，否则返回 `false`。\n- `public static boolean isSupported(ConditionalFeature)`：测试执行环境是否支持某个\
  \ `ConditionalFeature`。可测试的 `ConditionalFeature` 包括：`GRAPHICS`、`CONTROLS`、`MEDIA`、`WEB`、`SWT`、`SWING`、`FXML`、`SCENE3D`、`EFFECT`、`SHAPE_CLIP`、`INPUT_METHOD`、`TRANSPARENT_WINDOW`、`UNIFIED_WINDOW`、`TWO_LEVEL_FOCUS`、`VIRTUAL_KEYBOARD`、`INPUT_TOUCH`、`INPUT_MULTITOUCH`\
  \ 和 `INPUT_POINTER`。\n- `public static void exit()`：如果在应用程序的 `start()` 方法被调用后调用，则会导致应用程序的\
  \ `stop()` 方法在 JavaFX 应用程序线程上执行，然后 JavaFX 应用程序线程和其他 JavaFX 平台线程才会被关闭。如果应用程序的 `start()`\
  \ 方法尚未被调用，则应用程序的 `stop()` 方法可能不会被调用。\n- `public static boolean isImplicitExit()`\
  \ 和 `public static void setImplicitExit(boolean)`：测试和设置隐式退出标志。当此标志为 `true` 时，JavaFX\
  \ 运行时将在最后一个应用程序窗口关闭时关闭。否则，你必须显式调用 `Platform.exit()` 来关闭 JavaFX 运行时。此标志的默认值为 `true`。\n\
  \n■ **注意** 如果你熟悉 Swing 编程，你应该会看到 JavaFX 的 `Platform.runLater()` 与 Swing 的 `EventQueue.invokerLater()`\
  \ 或 `SwingUtilities.invokeLater()` 之间的相似性。\n\n现在我们已经使用 `Runnable`、`Thread` 和 `Platform.runLater()`\
  \ 解决了问题，是时候看看如何使用 JavaFX 内置的工作线程框架以更灵活、更优雅的方式解决这个问题了。\n\n理解 `javafx.concurrent`\
  \ 框架\n\n`javafx.concurrent` 包中的 JavaFX 工作线程框架将 Java 5 中引入的 Java 并发框架的多功能性和灵活性与 JavaFX\
  \ 属性和绑定框架的便利性相结合，产生了一个易于使用的工具集，该工具集既了解 JavaFX 应用程序线程规则，又非常易于使用。它由一个接口 `Worker` 和三个实现该接口的抽象基类\
  \ `Task<V>`、`Service<V>` 和 `ScheduledService<V>` 组成。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 集合与并发\n\n理解 **Worker** 接口\n\n`Worker` 接口指定了一个具有九个只读属性、一个名为 `cancel()`\
  \ 的方法以及一个状态模型和状态转换规则的 JavaFX bean。`Worker` 表示一个工作单元，它在一个或多个后台线程中运行，但其某些内部状态对 JavaFX\
  \ 应用程序线程是安全可观察的。九个只读属性如下：\n\n- `title` 是一个 `String` 属性，表示任务的标题。\n- `message` 是一个\
  \ `String` 属性，表示随着任务进展的更详细消息。\n- `running` 是一个 `boolean` 属性，仅当 `Worker` 处于 `Worker.State.SCHEDULED`\
  \ 或 `Worker.State.RUNNING` 状态时为 `true`。\n- `state` 是一个 `Object` 属性，表示任务的 `Worker.State`。\n\
  - `totalWork` 是一个 `double` 属性，表示任务的总工作量。当总工作量未知时，其值为 `-1.0`。\n- `workDone` 是一个 `double`\
  \ 属性，表示任务到目前为止已完成的工作量。其值为 `-1.0` 或介于 0 和 `totalWork` 之间的数字。\n- `progress` 是一个 `double`\
  \ 属性，表示任务到目前为止已完成工作量占总工作量的百分比。其值为 `-1.0` 或 `workDone` 与 `totalWork` 的比率。\n- `value`\
  \ 是一个 `Object` 属性，表示任务的输出。仅当任务成功完成时，即达到 `Worker.State.SUCCEEDED` 状态时，其值才为非 `null`。\n\
  - `exception` 是一个 `Object` 属性，表示任务实现向 JavaFX 工作线程框架抛出的 `Throwable`。仅当任务处于 `Worker.State.FAILED`\
  \ 状态时，其值才为非 `null`。\n\n上述属性旨在从 JavaFX 应用程序线程访问。将场景图属性绑定到它们是安全的，因为这些属性的失效事件和更改事件是在\
  \ JavaFX 上触发的。\n\n\n\n应用程序线程。通过想象在许多 GUI 应用中常见的任务进度消息框，有助于理解这些属性。这些消息框通常有一个标题、一个指示已完成工作百分比的进度条，以及一条告知用户已处理多少项、还剩多少项的消息。所有这些属性都由\
  \ JavaFX 工作线程框架本身或任务的实际实现来设置。\n\n`running`、`state`、`value` 和 `exception` 属性由框架控制，无需用户干预即可在\
  \ JavaFX 应用程序线程中观察到。当框架想要更改这些属性时，它会承担繁重的工作，确保更改在 JavaFX 应用程序线程上完成。`title`、`message`、`totalWork`、`workDone`\
  \ 和 `progress` 属性可由任务的实现代码通过调用框架提供的受保护方法来更新，这些方法会承担繁重的工作，确保更改在 JavaFX 应用程序线程上完成。\n\
  \n`Worker.State` 是一个嵌套枚举，定义了 Worker 的以下六种状态：\n\n• READY（初始状态）\n• SCHEDULED（过渡状态）\n\
  • RUNNING（过渡状态）\n• SUCCEEDED（终止状态）\n• CANCELLED（终止状态）\n• FAILED（终止状态）\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 集合与并发\n\n如果 Worker 尚未处于 SUCCEEDED 或 FAILED 状态，`cancel()` 方法将使其转换到 CANCELLED\
  \ 状态。\n\n现在你已经熟悉了 Worker 接口的属性和状态，可以继续学习 JavaFX 工作线程框架中实现该接口的三个抽象类：`Task<V>`、`Service<V>`\
  \ 和 `ScheduledService<V>`。\n\n理解 **Task<V>** 抽象类\n\n`Task<V>` 抽象类是 Worker 接口的一个实现，旨在用于一次性任务。一旦其状态进入\
  \ SUCCEEDED、FAILED 或 CANCELLED，它将永远停留在终止状态。`Task<V>` 抽象类扩展了 `FutureTask<V>` 类，因此除了支持\
  \ Worker 接口外，还支持 `Runnable`、`Future<V>` 和 `RunnableFuture<V>` 接口。`Future<V>`、`RunnableFuture<V>`\
  \ 和 `FutureTask<V>` 接口及类属于 `java.util.concurrent` 包。由于这一继承关系，`Task<V>` 对象可以以其父类适用的各种方式使用。然而，对于典型的\
  \ JavaFX 用法，仅使用 `Task<V>` 类本身的方法就足够了，这些方法的列表可以在该类的 Javadoc 中找到。以下是这些方法的列表，不包括上一节讨论的只读属性：\n\
  \n• `protected abstract V call() throws Exception`\n• `public final boolean cancel()`\n\
  • `public boolean cancel(boolean mayInterruptIfRunning)`\n• `protected void updateTitle(String\
  \ title)`\n• `protected void updateMessage(String message)`\n• `protected void updateProgress(long\
  \ workDone, long totalWork)`\n• `protected void updateProgress(double workDone,\
  \ double totalWork)`\n• `protected void updateValue(V)`\n\n`Task<V>` 抽象类实现了 `javafx.event.EventTarget`\
  \ 接口。它支持的事件由 `WorkerStateEvent` 类表示。五个 `Worker.State` 中的每一个都有一个对应的 `WorkerStateEvent`。\n\
  \n当 `Task<V>` 转换到某个状态时，会触发相应事件。`Task<V>` 中有五个类型为 `EventHandler<WorkerStateEvent>`\
  \ 的对象属性，以及五个受保护的方法。当相应事件被触发时，这些事件处理器和受保护方法会被调用：\n\n• `onScheduled` 属性\n• `onRunning`\
  \ 属性\n• `onSucceeded` 属性\n• `onCancelled` 属性\n• `onFailed` 属性\n• `protected void\
  \ scheduled()`\n• `protected void running()`\n• `protected void succeeded()`\n•\
  \ `protected void cancelled()`\n• `protected void failed()`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 集合与并发\n\n\n\n`Task<V>` 的扩展必须重写受保护的抽象方法 `call()` 来执行实际工作。\n\n`call()` 方法的实现可以调用受保护的方法\
  \ `updateTitle()`、`updateMessage()`、`updateProgress()` 和 `updateValue()`，将其内部状态发布到\
  \ JavaFX 应用程序线程。实现完全控制任务的标题和消息内容。对于接受两个长整型参数的 `updateProgress()` 调用，`workDone` 和\
  \ `totalWork` 必须同时为 –1（表示进度不确定），或者满足 `workDone >= 0` 且 `workDone <= totalWork` 的关系，从而得到介于\
  \ 0.0 和 1.0（0% 到 100%）之间的进度值。\n\n■ **注意** 如果 `workDone > totalWork`，或者其中一个值小于 –1，`updateProgress()`\
  \ API 将抛出异常。\n\n不过，它允许传入 (0, 0)，这会导致进度值为 `NaN`。\n\n两个 `cancel()` 方法可以从任何线程调用，如果任务尚未处于\
  \ `SUCCEEDED` 或 `FAILED` 状态，则会将任务移至 `CANCELLED` 状态。如果在任务运行之前调用了任一 `cancel()` 方法，任务将移至\
  \ `CANCELLED` 状态并且永远不会运行。这两个 `cancel()` 方法仅在任务处于 `RUNNING` 状态时有所不同，并且仅在对运行线程的处理上有所不同。如果调用\
  \ `cancel(true)`，线程将收到一个中断。为了使此中断达到使任务快速完成处理的预期效果，`call()` 方法的实现必须以能够检测到中断并跳过任何进一步处理的方式进行编码。无参数的\
  \ `cancel()` 方法只是转发到 `cancel(true)`。\n\n清单 7-9 演示了如何创建 Task、启动它，并通过一个显示所有九个属性的简单\
