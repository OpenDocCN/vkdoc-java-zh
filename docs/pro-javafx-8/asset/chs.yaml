  \n第 2 章 ■ 在 JavaFX 中创建用户界面\n\n此处展示的 Node 类的 `intersects()` 方法接受一个 `Bounds` 类型的参数，该参数位于\
  \ `javafx.geometry` 包中。它表示节点的矩形边界，例如前面代码片段中所示的 `leftPaddle` 节点。请注意，为了获取包含左挡板的 Group\
  \ 中左挡板的位置，我们使用了 `leftPaddle`（一个 `Rectangle`）从 `Node` 类继承的 `boundsInParent` 属性。\n\
  \n前面代码片段中 `intersect` 方法调用的最终结果如下。\n\n• 如果球与 `rightWall` 或 `leftWall` 的边界相交，则 `pongAnimation`\
  \ `Timeline` 会停止，并初始化游戏以进行下一轮。请注意，`rightWall` 和 `leftWall` 节点是场景左右两侧宽度为一个像素的矩形。请查看清单\
  \ 2-8 以了解这些节点的定义位置。\n\n• 如果球与 `bottomWall` 或 `topWall` 的边界相交，则球的垂直方向将通过取反程序的布尔变量\
  \ `movingDown` 来改变。\n\n• 如果球与 `leftPaddle` 或 `rightPaddle` 的边界相交，则球的水平方向将通过取反程序的布尔变量\
  \ `movingRight` 来改变。\n\n■ **提示** 有关 `boundsInParent` 及其相关属性 `layoutBounds` 和 `boundsInLocal`\
