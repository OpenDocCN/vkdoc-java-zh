  \n**理解 ObservableArrays**\n\n\n\n`ObservableArray` 接口的引入，是为了应对需要观察原始 int 或 float\
  \ 值列表，但每次从列表中添加或移除元素时，因装箱和拆箱原始值而带来的性能开销不可接受的情况。`ObservableArray` 及其两个子接口 `ObservableIntegerArray`\
  \ 和 `ObservableFloatArray` 的实现，预期会使用原始数组作为其内容的底层存储。JavaFX 3D API 使用了 `ObservableArray`、`ObservableIntegerArray`\
  \ 和 `ObservableFloatArray`。图 7-4 是一个 UML 图，展示了 `ObservableArray` 及其支持接口。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 100](img/index-289_1.jpg)\n\n第 7 章 ■ 集合与并发\n\n***图 7-4.** 支持 JavaFX 可观察数组的关键接口*\n\
  \n与 `ObservableList`、`ObservableMap` 和 `ObservableSet` 接口不同，`ObservableArray` 接口并未实现任何\
  \ Java 集合框架接口。`ObservableArray` 接口上的以下方法允许你注册和注销 `ArrayChangeListener`：\n\n• `addListener(ArrayChangeListener<T>\
  \ listener)`\n\n• `removeListener(ArrayChangeListener<T> listener)`\n\n`ObservableArray`\
  \ 上的以下额外方法让你能够控制底层的原始数组：\n\n• `resize(int size)`\n\n• `ensureCapacity(int capacity)`\n\
  \n• `trimToSize()`\n\n• `clear()`\n\n• `size()`\n\n这些方法处理 `ObservableArray` 的容量和大小。*容量*\
  \ 是底层原始数组的长度。*大小* 是实际包含应用程序数据的元素数量。容量总是大于或等于大小。如果当前底层原始数组的长度小于所需的新容量，`ensureCapacity()`\
  \ 方法会分配一个新的底层原始数组。`resize()` 方法会改变 `ObservableArray` 的大小。如果新大小大于当前容量，则容量会增加。如果新大小大于当前大小，则额外的元素会用零填充。如果新大小小于当前大小，`resize()`\
  \ 实际上不会缩小数组，但“丢失”的元素会用零填充。`trimToSize()` 方法会将底层原始数组替换为一个长度与 `ObservableArray` 大小相同的数组。`clear()`\
  \ 方法将 `ObservableArray` 的大小调整为 0。`size()` 方法返回 `ObservableArray` 的当前大小。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 集合与并发\n\n`ArrayChangeListener` 接口只有一个方法：`onChanged(T observableArray,\
  \ boolean sizeChanged, int from, int to)`。请注意，与 `ListChangeListener`、`MapChangeListener`\
  \ 和 `SetChangeListener` 中将 `Change` 对象传递给 `onChange()` 方法不同，`ArrayChangeListener`\
  \ 直接将变更的特征作为参数传递。第一个参数是 `ObservableArray` 本身。如果可观察数组的大小发生了变化，`sizeChanged` 参数将为\
  \ `true`。`from` 和 `to` 参数标记了变更元素的范围，`from` 端包含在内，`to` 端不包含在内。\n\n`ObservableIntegerArray`\
  \ 和 `ObservableFloatArray` 接口具有以类型特定方式操作数据的方法。我们列出 `ObservableIntegerArray` 的方法（`ObservableFloatArray`\
  \ 的方法类似）：\n\n• `copyTo(int srcIndex, int[] dest, int destIndex, int length)`\n\n\
  • `copyTo(int srcIndex, ObservableIntegerArray dest, int destIndex, int length)`\n\
  \n• `int get(int index)`\n\n• `addAll(int... elements)`\n\n• `addAll(ObservableIntegerArray\
  \ src)`\n\n• `addAll(int[] src, int srcIndex, int length)`\n\n• `addAll(ObservableIntegerArray\
  \ src, int srcIndex, int length)`\n\n• `setAll(int... elements)`\n\n• `setAll(int[]\
  \ src, int srcIndex, int length)`\n\n• `setAll(ObservableIntegerArray src)`\n\n\
  • `setAll(ObservableIntegerArray src, int srcIndex, int length)`\n\n• `set(int destIndex,\
  \ int[] src, int srcIndex, int length)`\n\n\n\n• set(int destIndex, ObservableIntegerArray\
  \ src, int srcIndex, int length)\n\n• set(int index, int value)\n\n• int[] toArray(int[]\
  \ dest)\n\n• int[] toArray(int srcIndex, int[] dest, int length)\n\n`addAll()` 方法用于向\
  \ `ObservableIntegerArray` 追加元素。`setAll()` 方法用于替换 `ObservableIntegerArray` 的内容。这两组方法的源数据可以是：一个\
  \ int 类型的可变参数数组、一个 `ObservableIntegerArray`、一个带有起始索引和长度的 int 数组，或者一个带有起始索引和长度的 `ObservableIntegerArray`。`get()`\
  \ 方法返回指定索引处的值。`set()` 方法使用从第一个参数指定索引开始的新值替换 `ObservableIntegerArray` 的一部分。替换数据可以是一个单独的\
  \ int 值、一个带有起始索引和长度的 int 数组，或者一个带有起始索引和长度的 `ObservableIntegerArray`。如果原始 `ObservableIntegerArray`\
  \ 中没有足够的空间来容纳替换数据，则会抛出 `ArrayIndexOutOfBoundsException`。`copyTo()` 方法将从指定 `srcIndex`\
  \ 开始的 `ObservableIntegerArray` 的一部分复制到从指定 `destIndex` 开始的目标 int 数组或 `ObservableIntegerArray`\
  \ 中。`length` 参数指定了要复制的部分的长度。如果源 `ObservableIntegerArray` 中没有足够的元素来形成指定长度的部分，或者目标中没有足够的空间来容纳复制的部分，则会抛出\
  \ `ArrayIndexOutOfBoundsException`。\n\n`toArray()` 方法将 `ObservableIntegerArray`\
  \ 的内容复制到一个 int 数组中。如果 `dest` 参数不为 null 且有足够的空间，则填充并返回该数组；否则，将分配、填充并返回一个新的 int 数组。在指定了\
  \ `srcIndex` 和 `length` 的形式中，如果 `ObservableIntegerArray` 中没有足够的元素，则会抛出 `ArrayIndexOutOfBoundsException`。\n\
