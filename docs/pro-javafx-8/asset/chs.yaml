  \n**第 13 章**\n\n**JavaFX 语言与标记**\n\n*计算机编程非常有趣。就像音乐一样，它是一种源于天赋与持续练习的未知融合的技能。就像绘画一样，它可以被塑造成各种目的——商业、艺术和纯粹的娱乐。程序员因长时间工作而享有盛誉，但很少有人将其归因于创造力的驱动。程序员在周末、假期和用餐时谈论软件开发，并非因为他们缺乏想象力，而是因为他们的想象力揭示了他人无法看到的世界。*\n\
  \n—拉里·奥布莱恩和布鲁斯·埃克尔\n\nJavaFX 提供了丰富的功能集来构建应用程序，让您可以创建超越传统 UI 工具包所能实现的沉浸式用户界面。然而，它并不仅限于此，因为\
  \ JavaFX 构建在 Java 语言之上，因此您还可以充分利用为 Java 平台开发的所有语言和工具。此外，JavaFX 还附带 FXML，这是其用 XML\
  \ 编写的 UI 声明语言，本身功能相当强大。\n\n在本章中，我们将展示如何利用不同的语言和标记，用更少的代码创建外观精美的 JavaFX UI。本章讨论的所有语言和功能的妙处在于，您可以选择使用。您可以继续使用命令式风格，用纯\
  \ Java 构建 JavaFX 应用程序，也可以利用您喜爱的 JVM 语言。谁知道呢？您甚至可能仅仅因为 JavaFX 的使用而成为本章讨论的某种语言的皈依者。\n\
  \n替代语言的快速比较\n\n为了让您了解使用不同 JVM 语言的能力和表现力，我们首先从一个简单的示例开始，并以六种不同的表示形式展示它。该示例是 JavaFX\
  \ 团队的 Jasper Potts 设计的“彩色圆圈”应用程序的扩展。这是一个用极少量代码展示形状、动画和效果的绝佳示例，我们对其进行了改编，以同时展示绑定和交互性。运行中的“消失的圆圈”应用程序如图\
  \ 13-1 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 185](img/index-549_1.jpg)\n\
  \n第 13 章 ■ JavaFX 语言与标记\n\n***图 13-1.** 展示 JavaFX 效果、动画和交互的“消失的圆圈”应用程序* Java 中的“消失的圆圈”\n\
  \n首先，让我们用标准的 Java 命令式风格展示代码。这是编写 JavaFX 代码最冗长的方式，但对于熟悉 Java 编程语言和早期 UI 工具包（如 Swing）的人来说，也是最直接的方式。编写此示例的完整代码清单如清单\
  \ 13-1 所示。\n\n***清单 13-1.*** 以命令式 Java 风格编写的“消失的圆圈”应用程序 public class VanishingCircles\
  \ extends Application {\n\npublic static void main(String[] args) {\n\nlaunch(args);\n\
  \n}\n\n@Override\n\npublic void start(Stage primaryStage) {\n\nprimaryStage.setTitle(\"\
  Vanishing Circles\");\n\nGroup root = new Group();\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 ■ JavaFX 语言与标记\n\nScene scene = new Scene(root, 800, 600, Color.BLACK);\n\
