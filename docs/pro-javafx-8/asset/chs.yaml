  \ 中自定义绘制的 `JComponent` 长期来看难以维护，我们将其替换为 JavaFX 的 `Rectangle`。具体做法是将 Swing 代码替换为等效的\
  \ `JFXPanel` 代码。以下是 Swing 代码：\n\n```java\ncanvas = new JComponent() {\n\n    @Override\n\
  \    public void paint(Graphics g) {\n        g.setColor(model.strokeColor);\n \
  \       g.fillRect(0, 0, 200, 200);\n        g.setColor(model.fillColor);\n    \
  \    g.fillRect(10, 10, 180, 180);\n    }\n\n    @Override\n    public Dimension\
  \ getPreferredSize() {\n        return new Dimension(200, 200);\n    }\n};\n```\n\
  \n以下是 `JFXPanel` 代码：\n\n```java\ncanvas = new JFXPanel();\ncanvas.setPreferredSize(new\
  \ Dimension(210, 210));\nPlatform.runLater(new Runnable() {\n    @Override\n   \
  \ public void run() {\n        final Rectangle rectangle = new Rectangle(200, 200);\n\
  \        rectangle.setStrokeWidth(10);\n        rectangle.fillProperty().bind(model.fillProperty());\n\
  \        rectangle.strokeProperty().bind(model.strokeProperty());\n        final\
  \ VBox vBox = new VBox(rectangle);\n        final Scene scene = new Scene(vBox);\n\
  \        canvas.setScene(scene);\n    }\n});\n```\n\n`JFXPanel` 的构造方法会引导 JavaFX\
  \ 运行时系统启动。我们为 `JFXPanel` 设置了首选大小，以确保它在 Swing 容器中能正确布局。然后，我们在 JavaFX 应用程序线程上构建场景图，并将其绑定到模型（该模型已改为\
  \ JavaFX Bean）。另一组需要修改的地方是两个 `JButton` 的 `ActionListener`。修改模型会触发 JavaFX 矩形的变化，因此以下代码需要在\
  \ JavaFX 应用程序线程上运行：\n\n```java\nthis.view.changeFillButton.addActionListener(e ->\
  \ {\n    Platform.runLater(() -> {\n        final Paint fillPaint = model.getFill();\n\
  \        if (fillPaint.equals(Color.LIGHTGRAY)) {\n            model.setFill(Color.GRAY);\n\
  \        } else {\n            model.setFill(Color.LIGHTGRAY);\n        }\n    });\n\
  });\n```\n\n完整的 Swing 与 JavaFX 混合程序如代码清单 7-12 所示。\n\n***代码清单 7-12.*** JavaFXSceneInSwingExample.java\n\
