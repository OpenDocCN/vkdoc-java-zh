  \ 检索 JSON 数据的结果*\n\n清单 11-7 中的代码可以分为四个部分：\n\n1. 调用 REST 端点。\n2. 获取原始 JSON 数据。\n\
  3. 将每个条目转换为一个问题。\n4. 将问题添加到结果中。\n\n调用 REST 端点非常简单：\n\nString url = \" [`api.stackexchange.com/2.2/search?tagged=javafx&site=stackoverflow\"\
