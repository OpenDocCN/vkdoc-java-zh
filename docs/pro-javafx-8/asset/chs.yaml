  \ -> new QuestionCell());\n\nStackPane root = new StackPane();\n\nroot.getChildren().add(listView);\n\
  \nScene scene = new Scene(root, 500, 300);\n\nprimaryStage.setTitle(\"StackOverflow\
  \ 列表\");\n\nprimaryStage.setScene(scene);\n\nprimaryStage.show();\n\nSystem.out.println\
  \ (\"设置完成\");\n\n}\n\nObservableList<Question> getObservableList() throws IOException\
  \ {\n\nInputStreamConverter converter = new JsonConverter(\"item\", Question.class);\n\
  \nRestSource restSource = RestSourceBuilder.create()\n\n.converter(converter)\n\n\
  [.host(\"http://api.stackexchange.com](http://api.stackexchange.com/)\")\n\n.path(\"\
  2.2\").path(\"search\")\n\n.queryParam(\"order\", \"desc\")\n\n.queryParam(\"sort\"\
  , \"activity\")\n\n.queryParam(\"tagged\", \"javafx\")\n\n.queryParam(\"site\",\
  \ \"stackoverflow\").build();\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 11 章 ■ 访问 Web 服务\n\nListDataProvider<Question> ldp = ListDataProviderBuilder.create()\n\
  \n.dataReader(restSource)\n\n.build();\n\nWorker<ObservableList<Question>>retrieve\
  \ = ldp.retrieve();\n\nreturn retrieve.getValue();\n\n}\n\npublic static void main(String[]\
  \ args) {\n\nlaunch(args);\n\n}\n\n}\n\n相关部分，即 `getObservableList` 方法的实现，非常简单。我们首先构建一个\
  \ `JsonConverter`，它将把名为“item”的 JSON 对象转换为 `Question` 实例。\n\n接下来，我们创建一个 `RestSource`，并将转换器分配给它。我们还提供了关于\
  \ REST 端点的信息。\n\n然后，我们创建一个 `ListDataSource`，它将使用 `RestSource` 并检索数据。\n\n调用 `ListDataSource.retrieve`\
  \ 方法会启动一个异步服务。我们无需等待结果，而是可以立即将结果对象返回给我们的可视化控件。DataFX 框架会在读取和解析传入数据的同时更新结果对象。对于大量数据，这非常有用，因为这种方法允许开发者在部分数据仍在传入或处理时，先渲染已就绪的数据部分。\n\
  \n■ **注意** 在撰写本文时，DataFX 8 的 API 尚未最终确定。建议开发者访问 [`datafx.io`](http://datafx.io)\
  \ 并查看文档以获取最新的 API 文档。\n\nJAX-RS\n\nJava 企业版 7 的发布包含了 JAX-RS 2.0 的发布。该规范不仅定义了 Java\
  \ 开发者如何提供 REST 端点，还定义了 Java 代码如何消费 REST 端点。\n\n在下一个示例中，我们修改了清单 11-14 中的 `QuestionRetrievalService`，以使用\
  \ JAX-RS API。如清单 11-19 所示。\n\n***清单 11-19.*** 使用 JAX-RS 检索问题\n\npackage projavafx.jerseystackoverflow;\n\
  \nimport javafx.collections.FXCollections;\n\nimport javafx.collections.ObservableList;\n\
  \nimport javafx.concurrent.Service;\n\nimport javafx.concurrent.Task;\n\nimport\
  \ javax.ws.rs.client.Client;\n\nimport javax.ws.rs.client.ClientBuilder;\n\nimport\
  \ javax.ws.rs.client.WebTarget;\n\nimport javax.ws.rs.core.MediaType;\n\npublic\
  \ class QuestionRetrievalService extends Service<ObservableList<Question>> {\n\n\
  private String loc;\n\nprivate String path;\n\nprivate String search;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 11 章 ■ 访问 Web 服务\n\npublic QuestionRetrievalService(String loc, String path,\
  \ String search) {\n\nthis.loc = loc;\n\nthis.path = path;\n\nthis.search = search;\n\
  \n}\n\n@Override\n\nprotected Task<ObservableList<Question>>createTask() {\n\nreturn\
  \ new Task<ObservableList<Question>>() {\n\n@Override\n\n\n\nprotected ObservableList<Question>\
  \ call() throws Exception {\n\n    Client client = ClientBuilder.newClient();\n\n\
  \    WebTarget target = client.target(loc).path(path).queryParam(\"tagged\", search).\n\
  \n    queryParam(\"site\", \"stackoverflow\");\n\n    QuestionResponse response\
  \ = target.request(MediaType.APPLICATION_JSON).\n\n    get(QuestionResponse.class);\n\
  \n    return FXCollections.observableArrayList(response.getItem());\n\n}\n\n};\n\
  \n}\n\n}\n\n为了展示 JAX-RS 的一个优秀工具，我们对 `QuestionRetrievalService` 的构造函数稍作修改，使其接受三个参数：\n\
  \npublic QuestionRetrievalService(String host, String path, String search);\n\n\
  这是因为 JAX-RS 允许我们使用建造者模式来构建 REST 资源，从而能够区分主机名、路径、查询参数等。\n\n因此，我们需要对清单 11-13 进行轻微修改：\n\
  \nString url = \" [`api.stackexchange.com/2.2/search?order=desc&sort=activity&tagged=`](http://api.stackexchange.com/2.2/search?order=desc&sort=activity&tagged=javafx&site=stackoverflow)\n\
