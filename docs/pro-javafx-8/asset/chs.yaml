  \n`Value removed: 3`\n\n在前面的示例中，请注意 `putAll()` 调用生成了两个映射更改事件，因为另一个映射包含两个键。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 99](img/index-286_1.jpg)\n\n第 7 章 ■ 集合与并发\n\n**理解 ObservableSet**\n\n\
  `ObservableSet` 接口与 `ObservableMap` 接口类似，其 `SetChangeListener.Change` 对象跟踪单个元素。图\
  \ 7-3 是一个 UML 图，展示了 `ObservableSet` 及其支持接口。\n\n***图 7-3.** 支持 JavaFX 可观察集合的关键接口*\n\
  \n为避免混乱，我们在图 7-3 中省略了 `java.util.Set` 接口。`java.util.Set` 接口是 `ObservableSet` 的另一个超接口。`ObservableSet`\
  \ 接口上的以下方法允许您注册和注销 `SetChangeListener`：\n\n• `addListener(SetChangeListener<? super\
  \ E> listener)`\n\n• `removeListener(SetChangeListener<? super E> listener)`\n\n\
  `ObservableSet` 上没有其他便捷方法。\n\n`SetChangeListener` 接口只有一个方法：`onChange(SetChangeListener.Change<?\
  \ extends E> change)`。当 `ObservableSet` 的内容被操作时，会回调此方法。请注意，此方法的参数类型是 `SetChangeListener`\
  \ 接口中声明的嵌套类 `Change`。`SetChangeListener.Change` 类旨在报告集合中单个元素的更改。如果对 `ObservableSet`\
  \ 的方法调用影响了多个元素，则会触发与受影响元素数量相同的集合更改事件。\n\n`SetChangeListener.Change` 类提供了以下方法供您检查对元素所做的更改。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 ■ 集合与并发\n\n• `boolean\
  \ wasAdded()` 如果向集合中添加了新元素，则返回 `true`。\n\n• `boolean wasRemoved()` 如果从集合中移除了一个元素，则返回\
  \ `true`。\n\n• `E getElementAdded()` 返回添加到集合中的元素。\n\n• `E getElementRemoved()` 返回从集合中移除的元素。\n\
  \n• `ObservableSet<E> getSet()`\n\n在清单 7-4 的示例中，我们在将 `SetChangeListener` 附加到 `ObservableSet`\
  \ 后执行了各种集合操作。`SetChangeListener` 的实现（称为 `MyListener`）包含一个用于 `SetChangeListener.Change`\
  \ 对象的格式化打印器，并在事件触发时打印出集合更改事件对象。\n\n***清单 7-4.*** SetChangeEventExample.java\n\n\
  `import javafx.collections.FXCollections;`\n\n`import javafx.collections.ObservableSet;`\n\
  \n`import javafx.collections.SetChangeListener;`\n\n`import java.util.Arrays;`\n\
  \n`public class SetChangeEventExample {`\n\n`public static void main(String[] args)\
  \ {`\n\n`ObservableSet<String> set = FXCollections.observableSet();`\n\n`set.addListener(new\
  \ MyListener());`\n\n`System.out.println(\"Calling add(\\\"First\\\"): \");`\n\n\
  `set.add(\"First\");`\n\n`System.out.println(\"Calling addAll(Arrays.asList(\\\"\
  Second\\\", \\\"Third\\\")): \"); set.addAll(Arrays.asList(\"Second\", \"Third\"\
  ));`\n\n`System.out.println(\"Calling remove(\\\"Third\\\"): \");`\n\n`set.remove(\"\
  Third\");`\n\n`}`\n\n`private static class MyListener implements SetChangeListener<String>\
  \ {`\n\n`@Override`\n\n`public void onChanged(Change<? extends String> change) {`\n\
  \n`System.out.println(\"\\tset = \" + change.getSet());`\n\n`System.out.println(prettyPrint(change));`\n\
  \n`}`\n\n`private String prettyPrint(Change<? extends String> change) {`\n\n`StringBuilder\
  \ sb = new StringBuilder(\"\\tChange event data:\\n\");`\n\n`sb.append(\"\\t\\tWas\
  \ added: \").append(change.wasAdded()).append(\"\\n\");`\n\n`sb.append(\"\\t\\tWas\
  \ removed: \").append(change.wasRemoved()).append(\"\\n\"); sb.append(\"\\t\\tElement\
  \ added: \").append(change.getElementAdded()).append(\"\\n\"); sb.append(\"\\t\\\
  tElement removed: \").append(change.getElementRemoved()).append(\"\\n\"); return\
  \ sb.toString();`\n\n`}`\n\n`}`\n\n`}`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 集合与并发\n\n当我们运行清单 7-4 中的程序时，控制台会输出以下内容：\n\n`Calling add(\"First\"):`\n\n\
  `set = [First]`\n\n`Change event data:`\n\n`Was added: true`\n\n`Was removed: false`\n\
  \n`Element added: First`\n\n`Element removed: null`\n\n`Calling addAll(Arrays.asList(\"\
