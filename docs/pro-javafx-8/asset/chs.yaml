  \n第 7 章 ■ 集合与并发\n\n这是一个非常精简的 JavaFX GUI 应用程序。在让你运行这个程序之前，我们先指出该程序的几个特点。首先，请留意 `main()`\
  \ 方法：\n\npublic static void main(String[] args) {\n\nlaunch(args);\n\n}\n\n这个方法你已经见过多次了。这种固定格式的\
  \ `main()` 方法总是出现在继承 `javafx.application.Application` 类的类中。`Application.launch()`\
  \ 方法有一个重载版本，它接受一个 `Class` 对象作为第一个参数，可以从其他类中调用：`launch(Class<? Extends Application>\
  \ appClass, String[] args)`\n\n因此，你可以将 `main()` 方法移到另一个类中：\n\npublic class Main\
  \ {\n\npublic static void main(String[] args) {\n\nApplication.launch(JavaFXThreadsExample.class,\
  \ args);\n\n}\n\n}\n\n以达到同样的效果。\n\n接下来，请注意嵌套类 `Model` 在其 `update()` 方法中构建了数据模型，该模型包含所有活动线程的列表以及每个线程的堆栈跟踪信息：\n\
  \npublic void update() {\n\nthreadNames.clear();\n\nstackTraces.clear();\n\nfinal\
  \ Map<Thread, StackTraceElement[]> map = Thread.getAllStackTraces();\n\nfor (Map.Entry<Thread,\
  \ StackTraceElement[]> entry : map.entrySet()) {\n\nthreadNames.add(\"\\\"\" + entry.getKey().getName()\
  \ + \"\\\"\");\n\nstackTraces.add(formatStackTrace(entry.getValue()));\n\n}\n\n\
  }\n\n这个方法在 `Model` 的构造函数中被调用一次（该构造函数从 `JavaFXThreadsExample` 的构造函数中调用），并在“Update”按钮的事件处理器中被调用一次。\n\
  \n当我们运行清单 7-7 中的程序时，屏幕上会显示图 7-5 中的 GUI。你可以通过点击列表中的每个线程名称，并在文本区域中查看该线程的堆栈跟踪信息，来探索这个\
  \ JavaFX 程序中的线程。以下是一些有趣的观察结果：\n\n• “main”线程的调用栈包含对 `com.sun.javafx.application.LauncherImpl.launchApplication()`\
  \ 的调用。\n\n• “JavaFX-Launcher”线程的调用栈包含对 `com.sun.javafx.application.PlatformImpl.runAndWait()`\
  \ 的调用。这会将代码（包括构造函数的调用）放入 JavaFX 应用程序线程中。\n\n• “JavaFX Application Thread”线程的调用栈在\
  \ Windows 系统上包含原生方法 `com.sun.glass.ui.win.WinApplication._runLoop()`，在 Mac 或 Linux\
  \ 系统上则包含类似的方法。\n\n• “QuantumRenderer-0”线程的调用栈包含方法 `com.sun.javafx.tk.quantum.QuantumRenderer$PipelineRunnable.run()`。\n\
