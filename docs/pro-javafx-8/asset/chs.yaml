  \nGroovyFX 中的属性\n\n在 Java 中使用 JavaFX 进行 UI 开发时，最能受益的特性之一是在语言中拥有一流的、可观察的属性概念。由于目前尚不存在这种特性，JavaFX\
  \ 团队在 API 层面添加了属性，这虽然足够，但比原生语法要冗长得多。\n\n幸运的是，使用像 Groovy 这样的动态语言，可以很容易地添加强大的特性，包括原生属性语法。Groovy\
  \ 已经内置了简化的 getter/setter 访问概念，因此你可以像处理普通变量一样检索和存储 JavaFX 属性。例如，要在 Groovy 中设置矩形的宽度，你只需编写：\n\
  \nrectangle.width = 500\n\n这将自动转换为 setter 调用，如下所示：\n\nrectangle.setWidth(500);\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 ■ JavaFX 语言与标记\n\n\
  JavaFX 属性模式中更繁琐的另一部分是创建新属性。要以与 JavaFX API 定义属性相同的方式在类上定义新属性，每个属性需要一个字段和三个方法。在 Person\
  \ 对象上创建 name 属性的标准样板代码如清单 13-5 所示。\n\n***清单 13-5.*** 在 Java 中创建新属性的 JavaFX 属性模式\n\
  \nimport javafx.beans.property.SimpleStringProperty\n\nimport javafx.beans.property.StringProperty\n\
  \npublic class Person {\n\nprivate StringProperty name;\n\npublic final void setName(String\
  \ val) { nameProperty().set(val); }\n\npublic final String getName() { return nameProperty().get();\
  \ }\n\npublic StringProperty nameProperty() {\n\nif (name == null) {\n\nname = new\
  \ SimpleStringProperty(this, \"name\");\n\n}\n\nreturn name;\n\n}\n\n}\n\n■ **注意**\
  \ 上述代码可以通过在 getName 方法中检查属性是否已创建来进一步优化，如果尚未创建则返回 null（从而避免初始化 name 属性）。\n\n虽然这段代码只比标准的\
  \ Java 属性 bean 模式稍微冗长一点，但将其乘以你需要在应用程序中定义的属性数量，你就会得到相当多的代码需要维护，并且在出现意外问题时进行调试。\n\n\
  GroovyFX 对此有一个非常优雅的解决方案，即使用 AST 转换的编译器钩子。与其每次想定义新属性时都复制粘贴属性样板代码，你只需用 `@FXBindable`\
  \ 注解标注一个变量，GroovyFX 就会处理其余的事情。它会生成与你手动编写完全相同的优化代码，但在编译阶段在后台完成，这样你的源代码就不会被额外的逻辑弄得杂乱无章。\n\
  \n清单 13-6 展示了 name 属性在 Groovy 中的样子。\n\n***清单 13-6.*** 在 Groovy 中创建新属性的 GroovyFX\
  \ 属性模式\n\nimport groovyx.javafx.beans.FXBindable\n\nclass Person {\n\n@FXBindable\
  \ String name\n\n}\n\nGroovyFX 的 `@FXBindable` 注解还支持处理属性具有默认初始化值的情况：\n\nclass Person\
  \ {\n\n@FXBindable String name = \"Guillaume Laforge\"\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 ■ JavaFX 语言与标记\n\n它还有一个便捷的快捷语法，用于将类中的所有变量转换为属性：\n\n@FXBindable\n\nclass\
  \ Person {\n\nString name;\n\nint age;\n\nString gender;\n\nDate dob;\n\n}\n\nGroovyFX\
  \ 绑定\n\n\n\nJavaFX 中的绑定是一项极其强大的功能，但 JavaFX 2 引入的基于 API 的语法常常会妨碍理解绑定代码的实际作用。GroovyFX\
  \ 通过利用 Groovy 语言的运算符重载特性，为常见的绑定表达式提供了中缀表示法，从而解决了这个问题。\n\n例如，要将一个矩形的宽度绑定到另一个矩形的宽度，你可以在\
  \ GroovyFX 中编写如下代码：\n\nrect1.widthProperty.bind(rect2.widthProperty)\n\n此外，还有另一种等效的代码写法可供使用：\n\
  \nrect1.widthProperty.bind(rect2, 'width')\n\n然而，GroovyFX 绑定的真正威力体现在将多个属性组合到一个绑定语句中时。再举一个例子，假设你想将一个矩形的宽度绑定到另外两个矩形的宽度之和。\n\
  \n在 GroovyFX 中，你可以编写如下代码：\n\nrect1.widthProperty.bind(rect2.widthProperty + rect3.widthProperty)\n\
  \n这将会转换为下面这段长得多的 JavaFX Java 代码：\n\nrect1.getWidthProperty().bind(rect2.getWidthProperty().add(rect3.getWidthProperty()));\n\
  \nGroovyFX 发行版附带了一个绑定代码示例，用于制作模拟时钟的指针动画。该示例由 Jim Clark 编写，其中展示属性和绑定的相关代码如清单 13-7\
  \ 所示。\n\n***清单 13-7.*** GroovyFX 演示包中的模拟时钟节选\n\n@FXBindable\n\nclass Time {\n\n\
  Integer hours\n\nInteger minutes\n\nInteger seconds\n\nDouble hourAngle\n\nDouble\
  \ minuteAngle\n\nDouble secondAngle\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 191](img/index-561_1.jpg)\n\n第 13 章 ■ JavaFX 语言与标记\n\npublic Time() {\n\
  \n// 将角度属性绑定到时钟时间\n\nhourAngleProperty.bind((hoursProperty * 30.0) + (minutesProperty\
  \ * 0.5))\n\nminuteAngleProperty.bind(minutesProperty * 6.0)\n\nsecondAngleProperty.bind(secondsProperty\
  \ * 6.0)\n\n...\n\n}\n\n通过 AST 转换实现的自动属性扩展与中缀表示法绑定的结合，让你无需编写大量代码就能表达相当复杂的逻辑。运行该示例后得到的\
  \ Groovy 模拟时钟图形用户界面如图 13-7 所示。\n\n***图 13-7.** Groovy 模拟时钟演示*\n\nGroovyFX API 增强功能\n\
  \n除了使用 Groovy 替代 JavaFX 带来的核心语言优势外，GroovyFX 还对许多 JavaFX API 进行了 Groovy 化改造，使其在动态语言中更易于使用。本节我们将介绍三个主要方面：用于动画的\
  \ GroovyFX 自定义 DSL、简化的表格构建模式以及精简的 JavaFX 布局。与核心 JavaFX API 相比，所有这些都带来了显著优势，让你能够编写更少的代码，完成更多的工作。\n\
  \n动画\n\nGroovyFX 支持使用一种特殊的 DSL 来构建动画，该 DSL 拥有创建 Duration、KeyFrame 和 KeyValue 的语法，且所有语法都简洁明了。我们之前在“消失的圆圈”应用程序中展示过一个\
  \ Groovy 动画语法示例，如下所示：\n\ntimeline {\n\nat(3.s) { change e.source.radiusProperty()\
  \ to 0 }\n\n}.play()\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13\
  \ 章 ■ JavaFX 语言与标记\n\n基本模式如下，你可以在一个时间线（timeline）中包含多个 at 表达式，并在一个 at 中包含多个 change\
  \ 表达式。\n\ntimeline {\n\nat(duration) {\n\n[change property to value]\n\n}\n\n}\n\
  \n与绑定类似，还有第二种格式用于引用构成 change 表达式的属性：\n\ntimeline {\n\nat(3.s) { change(e.source,\
  \ 'radius') to 0 }\n\n}.play()\n\n该语法还支持一个可选的 tween，让你可以为动画进行的速度提供一条曲线：\n\ntimeline\
  \ {\n\nat(3.s) { change e.source.radiusProperty() to 0 tween ease_both }\n\n}.play()\n\
  \n通过上述更改，动画将开始缓慢，然后加速到正常速度，最后再以同样的方式减速。\n\n与完整的 Java 代码相比，Groovy 动画语法在字符数上节省了大量篇幅，并且让你更容易看清动画的实际效果。\n\
  \n\n\n表格\n\n由于构建器或命令式 Java 需要额外的语法糖，并且需要在多个层级指定泛型，因此在 Java 代码中构建简单的数据表格往往需要编写大量代码。Groovy\
  \ 通过一种相当直观的构建器格式来简化表格创建，同时还提供了一些便利功能，例如内置的类型转换器，允许你指定一个闭包来更改某个字段的输出类型。\n\n因此，你可以用很少的代码编写相当复杂的表格。下面的示例基于我们之前创建的\
  \ Person 类构建，以表格格式显示人员列表。完整代码如清单 13-8 所示。\n\n***清单 13-8.*** 演示 Groovy 中包含字符串、整数和日期的表格的代码\n\
  ```groovy\nimport groovyx.javafx.GroovyFX\nimport groovyx.javafx.SceneGraphBuilder\n\
  import binding.Person\nimport java.text.SimpleDateFormat\n\ndef dateFormat = new\
  \ SimpleDateFormat(\"MM/dd/yyyy\")\n\ndef persons = [\n    new Person(name: \"Ada\
  \ Lovelace\", age: 36, gender: \"Female\",\n               dob: dateFormat.parse(\"\
  10/10/1815\")),\n    new Person(name: \"Henrietta Swan Leavitt\", age: 53, gender:\
  \ \"Female\",\n               dob: dateFormat.parse(\"7/4/1868\")),\n    new Person(name:\
  \ \"Grete Hermann\", age: 83, gender: \"Female\",\n               dob: dateFormat.parse(\"\
  3/2/1901\"))\n]\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image\
  \ 192](img/index-563_1.jpg)\n\n第 13 章 ■ JavaFX 语言与标记\n\n```groovy\nGroovyFX.start\
  \ {\n    new SceneGraphBuilder().stage(visible: true) {\n        scene {\n     \
  \       tableView(items: persons) {\n                tableColumn(property: \"name\"\
  , text: \"Name\", prefWidth: 160)\n                tableColumn(property: \"age\"\
  , text: \"Age\", prefWidth: 70)\n                tableColumn(property: \"gender\"\
  , text: \"Gender\", prefWidth: 90)\n                tableColumn(property: \"dob\"\
  , text: \"Birth\", prefWidth: 100,\n                            type: Date,\n  \
  \                          converter: { d -> return dateFormat.format(d) })\n  \
  \          }\n        }\n    }\n}\n```\n\n请注意，显示表格的代码几乎和设置数据的代码一样简短。最后一列中用于格式化日期的转换器在\
  \ Groovy 中是一行代码，但在 Java 中则需要一个 `CellValueFactory` 以及 `Callback` 接口的实现，这需要节省好几行 Java\
  \ 代码。\n\n图 13-8 dis 展示了在 Groovy 中运行此表格应用程序的结果。\n\n***图 13-8.** 列出计算机领域著名女性的 Groovy\
  \ 表格演示*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 ■ JavaFX 语言与标记\n\
  \n布局\n\n另一组以声明式方式使用相对具有挑战性的 API 是 JavaFX 布局。它们拥有强大的约束系统，你可以利用它来为节点赋予基于特定布局的特殊布局行为，但这同时也意味着向布局添加节点需要两个步骤：(1)\
  \ 将其添加到容器中，(2) 分配约束。\n\nGroovyFX API 通过一种非常简洁的解决方案解决了布局问题，该方案涉及为节点对象添加额外的伪属性来表示布局约束。这允许你在构建场景图时定义约束，然后在布局阶段，JavaFX\
  \ 布局系统会使用这些约束来控制节点的定位和大小。\n\n清单 13-9 展示了一个更复杂的布局示例——GridPaneLayout，整个应用程序以声明式风格编写。\n\
