  \niii\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**引言**\n\n作为一名自 2007\
  \ 年 JavaFX 诞生以来就一直是其开发者、作者、演讲者和倡导者，我对 JavaFX 8 感到非常兴奋。\n\n它于 2014 年 3 月作为 Java SE\
  \ 8 的组成部分发布，是 Java Swing 的继任者。正如您将在本书中读到的，JavaFX 不仅可以在桌面端（Mac、Windows、Linux）运行，还可以在树莓派等嵌入式设备上运行。随着物联网（IoT）的日益普及，JavaFX\
  \ 已做好充分准备，能够为物联网提供用户界面。此外，得益于 Johan Vos 和 Niklas Therning 等人领导的社区项目，开发者们正在将 JavaFX\
  \ 应用部署到 Android 和 iOS 设备上。\n\nJavaFX 社区拥有许多才华横溢、充满热情且友善的开发者，我很荣幸能称他们为我的同事。其中一位同事\
  \ Johan Vos 是我们《Pro JavaFX 2》一书的合著者，也是这本《Pro JavaFX 8》的主要作者。我很高兴能继续在他的领导下与他合作完成本书。\n\
  \n请与我一起欢迎并祝贺他担任此角色，或许可以在 Twitter 上@Johan Vos，或在亚马逊上为本书发表评论。我希望您能发现本书既有趣又有助于您学习 JavaFX！\n\
  \n——James L. Weaver\n\nJava 技术大使\n\n甲骨文公司\n\nxxiii\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 1 章**\n\n**快速入门 JavaFX**\n\n*不要问世界需要什么。问问是什么让你充满活力，然后去做。因为世界需要的正是那些充满活力的人。*\n\
  \n——霍华德·瑟曼\n\n在 2007 年 5 月的一年一度的 JavaOne 大会上，Sun Microsystems 宣布了一个名为 JavaFX 的新产品系列。\n\
  \n其既定目标包括支持在消费设备（如手机、电视、车载系统和浏览器）上开发和部署内容丰富型应用程序。Sun 公司的软件工程师 Josh Marinacci 在 Java\
  \ Posse 的一次采访中非常恰当地表示：“JavaFX 某种程度上是重塑客户端 Java 并修正过去错误的代名词。”他指的是 Java Swing 和 Java\
  \ 2D\n\n\n\n功能强大，但也非常复杂。通过使用 FXML，JavaFX 允许我们以声明式编程风格简洁而优雅地表达用户界面（UI）。它还充分利用了 Java\
  \ 的全部能力，因为你可以实例化并使用当今存在的数百万个 Java 类。再加上诸如将 UI 绑定到模型中的属性以及减少对 setter 方法需求的变更监听器等特性，你将拥有一个有助于将\
  \ Java 重新带回客户端互联网应用的组合。\n\n在本章中，我们将带你快速入门 JavaFX 应用的开发。在让你了解 JavaFX 的简要历史之后，我们将向你展示如何获取所需的工具。我们还将探索一些优秀的\
  \ JavaFX 资源，并引导你完成编译和运行 JavaFX 应用的过程。在此过程中，当我们一起浏览应用代码时，你将学到很多关于 JavaFX 应用编程接口（API）的知识。\n\
  \nJavaFX 简史\n\nJavaFX 最初是 Chris Oliver 在名为 SeeBeyond 的公司工作时的创意。他们需要更丰富的用户界面，因此 Chris\
  \ 为此创建了一种他称之为 F3（形式追随功能）的语言。在文章《令人脑洞大开的创新》（本章末尾的参考资料部分有引用）中，Chris 被引述如下：“当谈到将人员整合到业务流程中时，你需要图形用户界面供他们交互，因此在企业应用领域存在对图形的用例，并且\
  \ SeeBeyond 对拥有更丰富的用户界面感兴趣。”\n\nSeeBeyond 被 Sun 收购，Sun 随后将 F3 更名为 JavaFX，并在 2007\
  \ 年的 JavaOne 大会上宣布。Chris Oliver 在收购期间加入了 Sun，并继续领导 JavaFX 的开发。\n\nJavaFX Script\
  \ 的第一个版本是一种解释型语言，被认为是后来编译型 JavaFX Script 语言的原型。解释型 JavaFX Script 非常健壮，并且在 2007 年下半年出版了两本基于该版本的\
  \ JavaFX 书籍。一本是用日文写的，另一本是用英文写的，由 Apress 出版（*JavaFX Script: Dynamic Java Scripting\
  \ for Rich Internet/Client-Side Applications*，Apress，2007 年）。\n\n在开发者们试验 JavaFX\
  \ 并提供改进反馈的同时，Sun 的 JavaFX Script 编译器团队正忙于创建该语言的编译版本。这包括一套新的运行时 API 库。JavaFX Script\
  \ 编译器项目在 2007 年 12 月初达到了一个临界点，这在一篇题为“祝贺 JavaFX Script 编译器团队——大象已经穿过门”的博客文章中得到了纪念。这句话来自\
  \ JavaFX Script 编译器项目负责人 Tom Ball 的一篇博客文章，其中包含以下摘录。\n\n*当我最近被问及 JavaFX Script 编译器团队究竟何时会交付我们的第一个里程碑版本时，我想到了一个关于大象的比喻。“我无法给你一个准确的日期，”我说。“这就像把一头大象推过一扇门；在达到临界质量使其越过门槛之前，你根本不知道什么时候能完成。然而，一旦你越过了那个门槛，剩下的部分就会很快完成，并且可以更准确地预测。”*\n\
  \n图 1-1 显示了本书作者之一 Jim Weaver 为那篇文章编写的一个搞笑的已编译 JavaFX 应用的截图，证明该项目确实已经达到了 Tom Ball\
  \ 所说的临界质量。\n\n***图 1-1.** “大象穿过门”程序的截图*\n\n2008 年，JavaFX 继续取得巨大进展：\n\n• 2008 年 3\
  \ 月，NetBeans JavaFX 插件可用于编译版本。\n\n• 许多 JavaFX 运行时库（主要关注 JavaFX 的 UI 方面）由一个包括来自 Java\
  \ Swing 团队的一些非常有才华的开发者的团队重写。\n\n• 2008 年 7 月，JavaFX 预览版软件开发工具包（SDK）发布，并且在 2008 年的\
  \ JavaOne 大会上，Sun 宣布 JavaFX 1.0 SDK 将于 2008 年秋季发布。\n\n• 2008 年 12 月 4 日，JavaFX 1.0\
  \ SDK 发布。这一事件提高了开发者和 IT 经理对 JavaFX 的采用率，因为它代表了一个稳定的代码库。\n\n• 2009 年 4 月，Oracle 和\
  \ Sun 宣布 Oracle 将收购 Sun。JavaFX 1.2 SDK 在 2009 年的 JavaOne 大会上发布。\n\n• 2010 年 1 月，Oracle\
  \ 完成了对 Sun 的收购。JavaFX 1.3 SDK 于 2010 年 4 月发布，JavaFX 1.3.1 是 1.3 系列的最后一个版本。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 15](img/index-6_1.jpg)\n\n第一章 ■ 快速入门 JavaFX\n\n在 2010 年的 JavaOne 大会上，JavaFX\
  \ 2.0 被宣布。Oracle 发布了 JavaFX 2.0 路线图，其中包括以下内容。\n\n• 弃用 JavaFX Script 语言，转而使用 Java\
  \ 和 JavaFX 2.0 API。这使得 JavaFX 能够被任何在 Java 虚拟机（JVM）上运行的语言（例如 Java、Groovy 和 JRuby）所使用，从而进入主流。因此，现有开发者无需学习新语言，而是可以利用现有技能开始开发\
  \ JavaFX 应用。\n\n• 将 JavaFX Script 的引人注目的特性（包括绑定到表达式）引入 JavaFX 2.0 API。\n\n• 在 JavaFX\
  \ 1.3 中已有的组件基础上，提供日益丰富的 UI 组件集。\n\n• 提供一个用于将 HTML 和 JavaScript 内容嵌入 JavaFX 应用的 Web\
  \ 组件。\n\n• 实现 JavaFX 与 Swing 的互操作性。\n\n• 从头重写媒体栈。\n\nJavaFX 2.0 在 2011 年的 JavaOne\
  \ 大会上发布，并且由于前面阐述的创新特性，其采用率大幅提高。\n\nJavaFX 8 标志着另一个重要的里程碑。JavaFX 现在是 Java 平台标准版的一个组成部分。\n\
  \n• 这清楚地表明 JavaFX 被认为足够成熟，并且是 Java 在客户端的未来。\n\n• 这极大地惠及了开发者，因为他们无需下载两个 SDK 和工具套件。\n\
  \n• Java 8 中的新技术，特别是 Lambda 表达式、Stream API 和默认接口方法，在 JavaFX 中非常有用。\n\n• 增加了许多新特性，包括原生\
  \ 3D 支持、打印 API，以及一些新控件，包括日期选择器。\n\n现在你已经完成了 JavaFX 的必修历史课，让我们通过向你展示一些示例、工具和其他资源的位置，离编写代码更近一步。\n\
  \n准备你的 JavaFX 之旅\n\n所需工具\n\n由于 JavaFX 现在是 Java 的一部分，你无需下载单独的 JavaFX SDK。整个 JavaFX\
  \ API 和实现是 Java 8 SE SDK 的一部分，可以从以下网址下载：\n\n[`www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\n\
  \n该 SDK 包含开发、运行和打包 JavaFX 应用所需的一切。你可以使用 Java 8 SE SDK 中包含的命令行工具编译 JavaFX 应用。\n\n\
  然而，大多数开发者更喜欢集成开发环境（IDE）以提高生产力。\n\n根据定义，支持 Java 8 的 IDE 也支持 JavaFX 8。因此，你可以使用你最喜欢的\
  \ IDE 来开发 JavaFX 应用。在本书中，我们主要使用 NetBeans IDE，因为它允许与 SceneBuilder（见下一段）更紧密地集成。NetBeans\
  \ IDE 可以从以下网址下载：\n\n[`netbeans.org/downloads`](https://netbeans.org/downloads)\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 16](img/index-8_1.jpg)\n\
  \n第一章 ■ 快速入门 JavaFX\n\n\n\nSceneBuilder 是一款独立工具，可让你通过设计而非编码来创建 JavaFX 界面。我们将在第 3\
  \ 章讨论 SceneBuilder。尽管 SceneBuilder 生成的是 FXML（我们也会在第 3 章讨论 FXML），且 FXML 可用于任何 IDE，但\
  \ NetBeans 提供了与 SceneBuilder 的紧密集成。SceneBuilder 工具可从 [`www.oracle.com/technetwork/java/javase/downloads/sb2download-2177776.html`](http://www.oracle.com/technetwork/java/javase/downloads/sb2download-2177776.html)\
  \ 下载。\n\nJavaFX 社区\n\nJavaFX 并非一个在秘密基地中开发的闭源项目。恰恰相反，JavaFX 以开放精神进行开发，拥有开放的源代码库、开放的邮件列表，以及一个开放且活跃的知识共享社区。\n\
  \n其源代码在 OpenJFX 项目中开发，而 OpenJFX 是开发 Java SE 的 OpenJDK 项目的一个子项目。如果你想查看源代码或架构，或者想阅读邮件列表中的技术讨论，请访问\
  \ [`openjdk.java.net/projects/openjfx`](http://openjdk.java.net/projects/openjfx)。\n\
  \n开发者社区非常活跃，无论是在 OpenJFX 领域还是在特定应用领域。开发者的起点是 JavaFX 社区网站 [`javafxcommunity.com`](http://javafxcommunity.com/)。这是一个由\
  \ Oracle 创建，但吸纳了许多 JavaFX 开发者意见的社区网站。JavaFX 社区的内容经常更新，图 1-2 展示了该社区网站在撰写本书时的快照。\n\
  \n***图 1-2.** JavaFX 社区网站快照*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 1 章 ■ 快速入门 JavaFX\n\n此外，由 JavaFX 工程师和开发者维护的博客是获取 JavaFX 最新技术信息的绝佳资源。例如，Oracle\
  \ JavaFX 工程师 Richard Bair、Jasper Potts 和 Jonathan Giles 在 [`fxexperience.com`](http://fxexperience.com/)\
  \ 上向开发者社区通报 JavaFX 的最新创新。本章末尾的“资源”部分包含了本书作者用于与 JavaFX 开发者社区互动的博客网址。\n\nJavaFX 社区的两个重要特点是其自身的创造力和分享意愿。有许多开源项目为\
  \ JavaFX 平台带来了附加价值。由于 JavaFX 平台工程师与外部 JavaFX 开发者之间的良好合作，这些开源项目与官方 JavaFX 平台非常契合。\n\
  \n以下列出了一些最有趣的项目：\n\n• RoboVM 允许你使用 Java 和 JavaFX 创建 iOS 应用程序。因此，你的 JavaFX 应用可用于为\
  \ iPhone 或 iPad 创建应用。\n\n• JavaFX-Android 项目维护了一个用于 Android 开发的 JavaFX SDK。因此，你的\
  \ JavaFX 应用可用于为 Android 设备创建应用。\n\nJavaFX 的 iOS 和 Android 移植版将在第 12 章中详细讨论。\n\n\
  • [JFXtras.org](https://JFXtras.org) 是一个致力于为 JavaFX 平台添加高质量控件和附加组件的项目。\n\n• ControlsFX\
  \ 是另一个为 JavaFX 平台添加高质量控件和工具的项目。\n\n值得一提的是，JavaFX 团队密切关注着 JFXtras.org 和 ControlsFX\
  \ 这两个项目的努力，其中一个项目中启动的想法可能会被纳入 JavaFX 的下一个版本中。\n\n• DataFX 是一个开源项目，旨在简化 JavaFX 应用中外部数据的检索，并为\
  \ JavaFX 开发者提供注入和流程管理等企业级功能。\n\n• OpenDolphin 是另一个帮助开发者分离和同步客户端与服务器开发的项目，它实现了最高程度的模型-视图-控制器分离。\n\
