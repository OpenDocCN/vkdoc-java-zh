  \ 程序*\n\n与 JavaFX 3D 场景交互\n\nJavaFX 3D 图形 API 中的 3D 形状支持完整的 JavaFX 鼠标和触摸事件。您的 JavaFX\
  \ 3D 程序可以充分利用这些事件来实现交互行为。事实上，我们已经在 EarthSphere、EarthCylinder、EarthBox 和 MeshCube\
  \ 程序中实现了鼠标交互。在 EarthSphere 中，我们在场景上设置了事件处理器：\n\nscene.setOnMousePressed((MouseEvent\
  \ event) -> {\n\nanchorX = event.getSceneX();\n\nanchorY = event.getSceneY();\n\n\
  anchorAngleX = angleX.get();\n\nanchorAngleY = angleY.get();\n\n});\n\nscene.setOnMouseDragged((MouseEvent\
  \ event) -> {\n\nangleY.set(anchorAngleY + anchorX - event.getSceneX());\n\n});\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 10 章 ■ JavaFX 3D\n\n在这段代码中，`anchorX`\
  \ 和 `anchorY` 是类的双精度字段，而 `angleX` 和 `angleY` 是双精度属性，它们绑定到包含球体的父节点绕 *x* 轴和 *y* 轴的旋转角度。这里，当鼠标在屏幕上按下时，我们将鼠标指针的屏幕坐标捕获为\
  \ `anchorX` 和 `anchorY`。同时，我们查询包含球体的父节点绕 *x* 轴和 *y* 轴的旋转角度。\n\n当鼠标拖动时，我们通过将 `anchorX`\
  \ 与鼠标新位置的屏幕 *x* 坐标之差相加，来改变包含球体的父节点绕 *y* 轴的旋转角度。因此，如果您点击屏幕并将鼠标向右拖动，`anchorX – event.getScreenX()`\
  \ 是一个负数，从而我们减小了绕 *y* 轴的旋转角度。由于在此程序中，*y* 轴指向下方，绕 *y* 轴旋转角度的减小实际上会使球体看起来向右旋转，与鼠标拖动的方向一致。\n\
  \n理解 PickResult 类\n\nJavaFX 3D 运行时提供了关于鼠标指针与 3D 场景交互的增强信息。\n\n\n\n此信息以相关事件对象中 `PickResult`\
  \ 类的对象形式提供。它包含在 `javafx.scene.input` 包中。以下事件对象提供了 `getPickResult()` 方法，允许你检索此 `PickResult`\
  \ 对象：\n\n• `ContextMenuEvent`\n\n• `DragEvent`\n\n• `GestureEvent`\n\n• `RotateEvent`\n\
  \n• `ScrollEvent`\n\n• `SwipeEvent`\n\n• `ZoomEvent`\n\n• `MouseEvent`\n\n• `MouseDragEvent`\n\
  \n• `TouchPoint`\n\n`PickResult` 类提供了以下公共构造方法：\n\n• `PickResult(EventTarget, double,\
  \ double)`\n\n• `PickResult(Node, Point3D, double)`\n\n• `PickResult(Node, Point3D,\
  \ double, int, Point2D)`\n\n前两个构造方法用于创建与 2D 场景配合使用的 `PickResult`，第三个构造方法创建包含 3D\
  \ 信息的 `PickResult`。`PickResult` 通常由 JavaFX 3D 运行时创建。\n\nJavaFX 应用程序代码通常通过调用事件对象上的访问器方法来获取\
  \ `PickResult`。\n\n`PickResult` 类提供了以下公共方法：\n\n• `Node getIntersectedNode()`\n\n\
  • `Point3D getIntersectedPoint()`\n\n• `double getIntersectedDistance()`\n\n• `int\
  \ getIntersectedFace()`\n\n• `Point2D getIntersectedTexCoord()`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 ■ JavaFX 3D\n\n当用户在 3D 形状上点击鼠标时，它会触及该 3D 形状特定面上的特定点。\n\n从场景或子场景有效相机的视点出发，到\
  \ 3D 形状上该点的线段被称为*拾取射线*。3D 形状上的该点被称为*相交点*。`PickResult` 提供了关于此相交点的信息。`getIntersectedNode()`\
  \ 方法返回 3D 形状本身，可以是 `Sphere`、`Cylinder`、`Box` 或 `MeshView`。`getIntersectedPoint()`\
  \ 方法返回相交点的 3D 坐标。这些坐标是相对于 3D 形状的局部坐标系而言的。对于一个半径为 100 的球体，返回的 `Point3D` 的坐标 ( *x*,\
  \ *y*, *z* ) 将满足 *x²* *+ y²* *+ z²* *=* 100²，无论对其本身或其任何包含节点应用了何种变换。`getIntersectedDistance()`\
  \ 方法返回从相机视点到相交点的距离。这是在 3D 模型的世界坐标系中拾取射线的长度。\n\n`getIntersectedFace()` 方法返回包含相交点的面的面编号，适用于具有用户定义面的\
  \ `MeshView`。对于预定义的 3D 形状 `Sphere`、`Cylinder` 和 `Box`，它返回 `FACE_UNDEFINED`。`getIntersectedTexCoord()`\
  \ 方法返回相交点的纹理坐标。与 `getIntersectedFace()` 方法不同，此方法会为用户定义和预定义的 3D 形状都返回纹理坐标。\n\n清单\
  \ 10-10 中的程序为一个球体设置了鼠标点击和鼠标拖拽事件的事件处理器，并根据你在球体上点击或拖拽鼠标时相交点的坐标来改变球体的颜色。\n\n***清单 10-10.***\
