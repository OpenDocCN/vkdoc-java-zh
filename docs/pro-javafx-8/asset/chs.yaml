  Metronome 1\");\n\nstage.show();\n\n}\n\n}\n\n理解**Timeline**类\n\nTimeline 类的主要目的是提供在给定时间段内逐步更改属性值的能力。请看清单\
  \ 2-5 中的以下片段，了解时间线的创建过程及其一些常用属性。\n\nDoubleProperty startXVal = new SimpleDoubleProperty(100.0);\n\
  \n**...代码省略...**\n\nTimeline anim = new Timeline(\n\nnew KeyFrame(new Duration(0.0),\
