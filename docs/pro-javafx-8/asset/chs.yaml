  \ class Question {\n\n    static final SimpleDateFormat sdf = new SimpleDateFormat\
  \ (\"dd-MM-YY\");\n\n    private StringProperty ownerProperty = new SimpleStringProperty();\n\
  \n    private String question;\n\n    private long timestamp;\n\n    public Question\
  \ (String o, String q, long t) {\n\n        this.ownerProperty.set(o);\n\n     \
  \   this.question = q;\n\n        this.timestamp = t;\n\n    }\n\n    public String\
  \ getOwner() {\n\n        return ownerProperty.get();\n\n    }\n\n    public void\
  \ setOwner(String owner) {\n\n        this.ownerProperty.set(owner);\n\n    }\n\n\
  \    public String getQuestion() {\n\n        return question;\n\n    }\n\n    public\
  \ void setQuestion(String question) {\n\n        this.question = question;\n\n \
  \   }\n\n    public long getTimestamp() {\n\n        return timestamp;\n\n    }\n\
  \n    public void setTimestamp(long timestamp) {\n\n        this.timestamp = timestamp;\n\
  \n    }\n\n    public String getTimestampString() {\n\n        return sdf.format(new\
  \ Date(timestamp));\n\n    }\n\n}\n```\n关于此实现，有几点需要注意。`ownerProperty` 遵循标准的 JavaFX\
  \ 约定，如第 3 章所述。\n\n除了引入 JavaFX 属性之外，Question 类的实现还有另一个重大变化。该类现在使用以下注解进行标注：\n\n`@XmlAccessorType(XmlAccessType.PROPERTY)`\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 11 章 ■ 访问 Web 服务\n\n\n\n\
  这样做的原因是，当 JAXB.unmarshal 方法创建带有特定信息的 Question 实例时，setter 方法会被调用。由于我们现在使用的是 JavaFX\
  \ 属性而非原始类型，因此这是必需的。JAXB 框架可以轻松地将 XML 元素 \"owner\" 的值赋给 owner 字符串字段，但默认情况下它无法将值赋给\
  \ JavaFX 属性对象。\n\n通过使用 `XmlAccessType.PROPERTY`，JAXB 框架会调用 `setOwner(String v)`\
  \ 方法，并将 XML 元素的值传递给 setOwner 方法。该方法实现中的 `ownerProperty.set(owner);` 随后会更新 JavaFX\
  \ 属性，该属性随后被 TableColumn 和 TableView 使用。\n\nQuestion 实现中的另一个重要变化是，我们添加了一个方法：\n\n\
  `String getTimestampString()`\n\n该方法将以人类可读的格式返回时间戳。你可能已经注意到，在清单 11-16 中，我们将 dateColumn\
  \ 的 CellValueFactory 设置为指向 \"timestampString\" 而非 \"timeStamp\" 的 PropertyValueFactory：\n\
  \n`dateColumn.setCellValueFactory(new PropertyValueFactory<>(\"timestampString\"\
  ));` 这样做的原因是，`getTimestamp()` 方法返回一个 long 值，而我们更倾向于以更易读的格式显示时间戳。通过添加 `getTimestampString()`\
  \ 方法并将 CellValueFactory 指向该方法，该列单元格的内容将显示为可读的时间指示。\n\n本章到目前为止展示的示例表明，Java 平台标准版已经包含了许多在访问\
  \ Web 服务时非常有用的 API。我们还展示了如何使用 JavaFX 并发框架、ObservableList 模式、JavaFX 属性和 PropertyValueFactory\
  \ 类来增强调用 Web 服务与在 JavaFX 控件中渲染数据之间的流程。\n\n虽然这些示例中不涉及高深的技术，但额外的需求会使事情变得更加复杂，并且需要更多的样板代码。幸运的是，JavaFX\
  \ 社区中已经涌现出许多旨在简化我们工作的方案。\n\n**使用外部库**\n\n到目前为止，我们所有的示例都不需要任何额外的外部库。Java 2 平台标准版和\
  \ JavaFX 平台提供了一个可用于访问 Web 服务的优秀环境。在本节中，我们将使用两个外部库，并展示它们如何使访问 Web 服务变得更加容易。\n\n**DataFX**\n\
  \nDataFX 库在 [`datafx.io`](http://datafx.io) 上有介绍，它提供了一个端到端的工具包，用于检索、解析、处理、填充、查看和渲染数据。这些数据可以通过使用\
  \ REST、SSE 或 WebSockets 等知名协议进行通信的 Web 服务获得，也可以从本地文件系统、数据库或许多其他数据源获得。DataFX 2 于\
  \ 2013 年底发布，DataFX 8 预计于 2014 年 9 月发布。\n\nDataFX 8 包含多个模块：\n\n• **Cell Factories**：提供许多有用的\
  \ CellFactory，从而减少项目中通常需要的样板代码\n\n• **DataSources**：提供关于数据来源的抽象层，既涉及物理位置（文件、网络资源），也涉及格式（JSON、XML、JDBC\
  \ 等）\n\n• **DataFlow API**：为开发者提供一种便捷的方式来管理工作流中的数据，并使用依赖注入\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 11 章 ■ 访问 Web 服务\n\n在下一个示例中，我们将 DataFX 集成到我们的 StackExchange 示例中。同样，唯一的变化在 `getObservableList`\
  \ 方法中，但为了清晰起见，我们在清单 11-18 中展示了整个主类。\n\n***清单 11-18.*** 使用 DataFX 获取问题\n\n```java\n\
  import java.io.IOException;\n\nimport javafx.application.Application;\n\nimport\
  \ static javafx.application.Application.launch;\n```\n\n\n\nimport javafx.collections.ObservableList;\n\
