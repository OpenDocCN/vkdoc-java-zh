  \n可观察值已变更：旧值 = 4096，新值 = 5120\n\n已移除变更监听器。\n\n调用 intProperty.set(6144)。\n\notherProperty.get()\
  \ = 0\n\n将 otherProperty 绑定到 intProperty。\n\notherProperty.get() = 6144\n\n调用 intProperty.set(7168)。\n\
