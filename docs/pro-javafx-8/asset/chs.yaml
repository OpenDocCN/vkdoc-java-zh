  \n第 5 章 ■ 在 JavaFX 中构建动态 UI 布局\n\n***清单 5-2.** 在场景中居中文本的示例*\n\npublic class CenterUsingBind\
  \ extends Application {\n\npublic static void main(String[] args) {\n\nlaunch(args);\n\
  \n}\n\n@Override\n\npublic void start(Stage primaryStage) {\n\nText text = new Text(\"\
  JavaFX Reversi\");\n\ntext.setTextOrigin(VPos.TOP);\n\ntext.setFont(Font.font(null,\
  \ FontWeight.BOLD, 18));\n\nScene scene = new Scene(new Group(text), 400, 100);\n\
  \ntext.layoutXProperty().bind(scene.widthProperty().subtract(text.prefWidth(-1)).divide(2));\
  \ text.layoutYProperty().bind(scene.heightProperty().subtract(text.prefHeight(-1)).divide(2));\
  \ primaryStage.setScene(scene);\n\nprimaryStage.show();\n\n}\n\n}\n\n以下是关于清单 5-2\
  \ 需要强调的几个要点：\n\n• `Text` 的 `textOrigin` 属性默认值为 `BASELINE`，该值将原点对齐到字母底部（不包括下伸部分）。我们选择使用\
  \ `TOP` 替代，这样原点与字母顶部对齐。这使得 `Text` 的行为与大多数其他 `Node` 类似，并且更容易居中。\n\n• 我们必须将 `Text`\
  \ 节点添加到 `Group` 中，才能将其添加到期望 `Parent` 类型容器的 `Scene` 中。使用 `Group` 并非最佳选择，如我们在下一节所示，因为它会禁用任何自动调整大小功能。\n\
  \n• 在获取 `prefWidth` 和 `prefHeight` 时，我们传入参数 `-1` 作为反维度值，因为这不会影响 `Text` 节点返回的尺寸。（`Text`\
  \ 节点没有内容偏差。）\n\n运行此程序会产生一个窗口，即使调整窗口大小，标题也会保持居中，如图 5-4 所示。\n\n***图 5-4.** 使用绑定在场景中居中的\
