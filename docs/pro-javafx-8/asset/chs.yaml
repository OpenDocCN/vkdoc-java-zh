  -fx-text-fill: #808080;\n\n}\n\n图 9-1 显示了此简单的 AudioClip 示例在运行时的外观。每次点击按钮都会开始一次新的\
  \ AudioClip 播放。如果你的动作非常快，可能会同时播放两到三次。\n\n***图 9-1.** BasicAudioClip 应用程序*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 135](img/index-382_1.jpg)\n\n第 9 章 ■ 使用媒体类\n\n控制 AudioClip 的播放参数\n\n我们现在基于前面的示例进行扩展，展示\
  \ AudioClip 如何允许以不同的音量和速率播放音效。我们还展示了如何调整音频剪辑的平衡以控制左右声道的音量。当你想在音效中实现一点 2D 空间化效果时，这会很有用。\n\
  \n我们最终得到的应用程序如图 9-2 所示。\n\n***图 9-2.** CodeMonkeyToDo 应用程序*\n\n我们首先检查 Application\
  \ 类，并查看声音是如何加载的。清单 9-3 显示了移除了场景构建代码的应用程序。这让你更容易看到我们再次使用 `getResource` 方法从 jar 文件中加载\
  \ MP3 文件。在本例中，我们的音效相对于我们的应用程序类位于不同的位置。因此，我们使用诸如 `resources/coffee.mp3` 之类的路径来定位它们。这些剪辑稍长一些，因此决定使用\
  \ MP3 文件以保持 jar 文件大小最小化，代价是在启动期间需要额外一点解码时间。\n\n\n\n音频剪辑均在 `CodeMonkeyToDo` 类的构造函数中加载。在构造函数中加载它们，可以确保它们在程序启动之初、`start`\
  \ 方法被调用之前就已加载完毕。另一种做法是重写 `Application` 类的 `init` 方法，并在其中加载剪辑。请注意，三个 `AudioClip`\
  \ 和三个 `Slider` 控件被声明为 `Application` 类中的字段。这样，当稍后使用图 9-2 中 `Slider` 控件的当前值播放 `AudioClip`\
  \ 时，可以方便地访问它们。\n\n***清单 9-3.*** CodeMonkeyToDo 示例程序的 Application 类\n\npublic class\
  \ CodeMonkeyToDo extends Application {\n\nprivate final AudioClip coffeeClip;\n\n\
