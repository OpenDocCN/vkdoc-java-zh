  Changing secondLighting's light to firstLight\");\n\nsecondLighting.setLight(firstLight);\n\
  \nSystem.out.println(\"Changing firstLight's color to red\");\n\nfirstLight.setColor(Color.RED);\n\
  \n}\n\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nChapter 4 ■\
  \ properties and Bindings\n\n在这个示例中，根节点是一个观察 `Lighting` 对象的 `ObjectProperty`。绑定\
  \ `colorBinding` 观察的是根节点值（即 `Lighting` 对象）的 `light` 属性中的 `color` 属性。然后，我们创建了一些 `Light`\
  \ 和 `Lighting` 对象，并以多种方式更改了它们的配置。\n\n当我们运行清单 4-15 中的程序时，控制台会输出以下内容：\n\n```\nfirstLight\
  \ is black.\n\nsecondLight is white.\n\nfirstLighting has firstLight.\n\nsecondLighting\
  \ has secondLight.\n\nMaking root observe firstLighting.\n\nThe color changed:\n\
  \nold color = 0xffffffff,\n```\n\n\nnew color = 0x000000ff\n\n使根对象观察 secondLighting。\n\
  \n颜色已更改：\n\nold color = 0x000000ff,\n\nnew color = 0xffffffff\n\n将 secondLighting\
  \ 的光源更改为 firstLight\n\n颜色已更改：\n\nold color = 0xffffffff,\n\nnew color = 0x000000ff\n\
  \n将 firstLight 的颜色更改为红色\n\n颜色已更改：\n\nold color = 0x000000ff,\n\nnew color = 0xff0000ff\n\
  \n正如预期的那样，每当根对象所观察的对象的配置发生更改时，都会触发一个更改事件，并且 colorBinding 的值始终反映根对象中当前 Lighting 对象的光源颜色。\n\
  \n■ **注意**：如果提供的属性名称与 JavaFX bean 中的任何属性名称都不匹配，JavaFX 属性和绑定框架不会发出任何警告。它只会使用该类型的默认值：对象类型为\
  \ null，数值类型为零，布尔类型为 false，字符串类型为空字符串。\n\n将 JavaBeans 属性适配为 JavaFX 属性\n\n自 JavaBeans\
  \ 规范发布以来的许多年里，针对各种项目、产品和库编写了大量 JavaBeans。为了更好地帮助 Java 开发人员利用这些 JavaBeans，在 `javafx.beans.properties.adapter`\
  \ 包中提供了一组适配器，通过从 JavaBeans 属性创建 JavaFX 属性，使它们在 JavaFX 世界中发挥作用。\n\n在本节中，我们首先通过一个简单的示例简要回顾\
  \ JavaBeans 规范中关于属性、绑定属性和约束属性的定义。然后，我们将展示如何使用适配器从 JavaBeans 属性创建 JavaFX 属性。\n\n\
  理解 JavaBeans 属性\n\nJavaBeans *属性*是使用熟悉的 getter 和 setter 命名约定来定义的。如果只提供 getter，则该属性是“只读”的；如果同时提供\
  \ getter 和 setter，则该属性是“读/写”的。JavaBeans 事件由事件对象、事件监听器接口以及 JavaBean 上的监听器注册方法组成。两种特定\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 4 章 ■ 属性和绑定\n\n类型的事件可供 JavaBeans\
  \ 属性使用：当 JavaBeans 属性发生更改时，可以触发 `PropertyChange` 事件；当 JavaBeans 属性发生更改时，也可以触发 `VetoableChange`\
  \ 事件；如果监听器抛出 `PropertyVetoException`，则该属性更改不应生效。其 setter 触发 `PropertyChange` 事件的属性称为*绑定属性*。其\
  \ setter 触发 `VetoableChange` 事件的属性称为*约束属性*。辅助类 `PropertyChangeSupport` 和 `VetoableChangeSupport`\
  \ 允许在 JavaBean 类中轻松定义绑定属性和约束属性。\n\n清单 4-16 定义了一个具有三个属性的 JavaBean `Person`：name、address\
  \ 和 phoneNumber。address 属性是一个绑定属性，phoneNumber 属性是一个约束属性。\n\n***清单 4-16.*** Person.java\n\
  \nimport java.beans.PropertyChangeListener;\n\nimport java.beans.PropertyChangeSupport;\n\
  \nimport java.beans.PropertyVetoException;\n\nimport java.beans.VetoableChangeListener;\n\
  \nimport java.beans.VetoableChangeSupport;\n\npublic class Person {\n\nprivate PropertyChangeSupport\
  \ propertyChangeSupport;\n\nprivate VetoableChangeSupport vetoableChangeSupport;\n\
  \nprivate String name;\n\nprivate String address;\n\nprivate String phoneNumber;\n\
  \npublic Person() {\n\npropertyChangeSupport = new PropertyChangeSupport(this);\n\
  \nvetoableChangeSupport = new VetoableChangeSupport(this);\n\n}\n\npublic String\
  \ getName() {\n\nreturn name;\n\n}\n\npublic void setName(String name) {\n\nthis.name\
  \ = name;\n\n}\n\npublic String getAddress() {\n\nreturn address;\n\n}\n\npublic\
  \ void setAddress(String address) {\n\nString oldAddress = this.address;\n\nthis.address\
  \ = address;\n\npropertyChangeSupport.firePropertyChange(\"address\", oldAddress,\
  \ this.address);\n\n}\n\npublic String getPhoneNumber() {\n\nreturn phoneNumber;\n\
  \n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 4 章 ■ 属性和绑定\n\npublic\
  \ void setPhoneNumber(String phoneNumber) throws PropertyVetoException {\n\nString\
  \ oldPhoneNumber = this.phoneNumber;\n\n\n\nvetoableChangeSupport.fireVetoableChange(\"\
  phoneNumber\", oldPhoneNumber, phoneNumber);  \nthis.phoneNumber = phoneNumber;\n\
  \npropertyChangeSupport.firePropertyChange(\"phoneNumber\", oldPhoneNumber, this.phoneNumber);\n\
  \n}\n\npublic void addPropertyChangeListener(PropertyChangeListener l) {\n\npropertyChangeSupport.addPropertyChangeListener(l);\n\
  \n}\n\npublic void removePropertyChangeListener(PropertyChangeListener l) {\n\n\
  propertyChangeSupport.removePropertyChangeListener(l);\n\n}\n\npublic PropertyChangeListener[]\
  \ getPropertyChangeListeners() {\n\nreturn propertyChangeSupport.getPropertyChangeListeners();\n\
  \n}\n\npublic void addVetoableChangeListener(VetoableChangeListener l) {\n\nvetoableChangeSupport.addVetoableChangeListener(l);\n\
  \n}\n\npublic void removeVetoableChangeListener(VetoableChangeListener l) {\n\n\
  vetoableChangeSupport.removeVetoableChangeListener(l);\n\n}\n\npublic VetoableChangeListener[]\
  \ getVetoableChangeListeners() {\n\nreturn vetoableChangeSupport.getVetoableChangeListeners();\n\
  \n}\n\n}\n\n理解 JavaFX 属性适配器\n\n`javafx.beans.property.adapter` 包中的接口和类可用于轻松地将 JavaBeans\
  \ 属性适配为 JavaFX 属性。`ReadOnlyJavaBeanProperty` 接口是 `ReadOnlyProperty` 的子接口，并增加了两个方法：\n\
  \nvoid dispose()\n\nvoid fireValueChangedEvent()\n\n`JavaBeanProperty` 接口扩展了 `ReadOnlyJavaBeanProperty`\
  \ 和 `Property` 接口。这两个接口各自都有针对 Boolean、Integer、Long、Float、Double、Object 和 String\
  \ 类型的具体类特化。这些类没有公共构造函数，而是提供了构建器类来创建这些类型的实例。在以下示例代码中，我们使用了 `JavaBeanStringProperty`\
  \ 类。同样的模式适用于所有其他 JavaFX 属性适配器。`JavaBeanStringPropertyBuilder` 支持以下方法：  \npublic\
  \ static JavaBeanStringPropertyBuilder create()\n\npublic JavaBeanStringProperty\
  \ build()\n\npublic JavaBeanStringPropertyBuilder name(java.lang.String)\n\npublic\
  \ JavaBeanStringPropertyBuilder bean(java.lang.Object)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 ■ 属性和绑定\n\npublic JavaBeanStringPropertyBuilder beanClass(java.lang.Class<?>)\n\
  \npublic JavaBeanStringPropertyBuilder getter(java.lang.String)\n\npublic JavaBeanStringPropertyBuilder\
  \ setter(java.lang.String)\n\npublic JavaBeanStringPropertyBuilder getter(java.lang.reflect.Method)\n\
  \npublic JavaBeanStringPropertyBuilder setter(java.lang.reflect.Method)\n\n要使用构建器，首先调用其静态方法\
  \ `create()`，然后链式调用返回构建器自身的方法。最后，调用 `build()` 方法来创建属性。在大多数情况下，只需调用 `bean()` 和 `name()`\
  \ 方法来指定 JavaBean 实例和属性名称即可。`getter()` 和 `setter()` 方法可用于指定不遵循命名约定的 getter 和 setter。`beanClass()`\
  \ 方法可用于指定 JavaBean 类。在构建器上预先设置 JavaBean 类，可以更高效地为同一 JavaBean 类的多个实例创建适配器。\n\n**注意**\n\
  \n■\n\n尽管 JavaFX 场景、控件等类的构建器已被弃用，但 `javafx.beans.property.adapter` 包中的构建器并未被弃用。它们是生成\
  \ JavaBeans 属性适配器所必需的。\n\n清单 4-17 中的程序演示了如何将 Person 类的三个 JavaBeans 属性适配为 `JavaBeanStringProperty`\
  \ 对象。\n\n***清单 4-17.*** JavaBeanPropertiesExamples.java\n\nimport javafx.beans.property.SimpleStringProperty;\n\
  \nimport javafx.beans.property.adapter.JavaBeanStringProperty;\n\nimport javafx.beans.property.adapter.JavaBeanStringPropertyBuilder;\n\
  \nimport java.beans.PropertyVetoException;\n\npublic class JavaBeanPropertiesExample\
  \ {\n\npublic static void main(String[] args) throws NoSuchMethodException {\n\n\
  adaptJavaBeansProperty();\n\nadaptBoundProperty();\n\nadaptConstrainedProperty();\n\
  \n}\n\n\n\nprivate static void adaptJavaBeansProperty() throws NoSuchMethodException\
