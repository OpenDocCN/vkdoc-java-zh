  \n第 10 章 ■ JavaFX 3D\n\n理解 SubScene\n\n在上一节的 LightExample 中，我们使用了一个尚未介绍的 JavaFX\
  \ 3D 图形 API，即 SubScene 类。它属于 javafx.scene 包。SubScene 是一个容器节点，可以向更大的场景中添加内容，但它可以拥有自己的摄像机、深度缓冲区和抗锯齿策略，并能独立于场景的其他部分渲染自己的内容。\n\
  \nSubScene 类具有以下构造方法：\n\n• SubScene(Parent parent, double width, double height)\n\
  \n• SubScene(Parent parent, double width, double height, boolean depthBuffer,\n\n\
  SceneAntialiasing antiAliasing)\n\n三参数构造方法使用指定的父节点、宽度和高度创建一个 SubScene，但不包含自身的深度缓冲区，并且抗锯齿级别为\
  \ SceneAntiAliasing.DISABLED。五参数构造方法进一步允许你指定深度缓冲区和抗锯齿级别。它具有以下公共方法：\n\n• SceneAntialiasing\
  \ getAntiAliasing()\n\n• boolean isDepthBuffer()\n\n• void setRoot(Parent)\n\n•\
  \ Parent getRoot()\n\n• ObjectProperty<Parent> rootProperty()\n\n• void setCamera(Camera)\n\
  \n• Camera getCamera()\n\n• ObjectProperty<Camera> cameraProperty()\n\n• void setWidth(double)\n\
  \n• double getWidth()\n\n• DoubleProperty widthProperty()\n\n• void setHeight(double)\n\
  \n• double getHeight()\n\n• DoubleProperty heightProperty()\n\n• void setFill(paint.Paint)\n\
  \n• paint.Paint getFill()\n\n• ObjectProperty< Paint> fillProperty()\n\ngetAntiAliasing()\
  \ 和 isDepthBuffer() 方法返回传入构造方法的抗锯齿级别和深度缓冲区参数。其他方法为 SubScene 类定义了五个读写属性。\n\n这些属性分别是\
  \ root、camera、width、height 和 fill。它们的行为与 Scene 类中同名属性的行为相同。\n\nSubScene 的主要用途是在需要同时使用\
  \ 2D 和 3D 内容的 JavaFX 程序中，将两者分离开来。这正是我们在 LightExample 中使用它的方式。我们将程序的 3D 部分放入一个 SubScene\
  \ 中，使其与程序的其余部分（由 JavaFX 控件组成）分离。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 ■ JavaFX 3D\n\n指定 3D 形状的材质\n\n现在我们已经介绍了 3D 形状（包括预定义和用户自定义的）、摄像机和光照，在本节中，我们将处理\
  \ JavaFX 3D 图形 API 中最后一个剩余的主题。材质 API 由 Material 抽象类及其具体子类 PhongMaterial 组成。Material\
  \ 类是一个没有公共方法的抽象基类。在所有实际情况下，使用的都是 PhongMaterial 类。材质类描述了 3D 表面的物理属性以及它们如何与光照相互作用。\n\
  \n理解 PhongMaterial 类\n\n\n\n`PhongMaterial` 类包含以下构造方法：\n\n• `PhongMaterial()`\n\n\
  • `PhongMaterial(Color diffuseColor)`\n\n• `PhongMaterial(Color diffuseColor, Image\
  \ diffuseMap, Image specularMap, Image bumpMap, Image selfIlluminationMap)`\n\n\
  默认构造方法会创建一个 `PhongMaterial`，其默认漫反射颜色为 `Color.WHITE`。单参数构造方法使用指定的漫反射颜色创建 `PhongMaterial`。第三个构造方法则使用指定的漫反射颜色、漫反射贴图、高光贴图、凹凸贴图和自发光贴图来创建\
  \ `PhongMaterial`。我们将在介绍 `PhongMaterial` 类的属性之后，讨论这些参数的含义。\n\n`PhongMaterial` 类包含以下公有方法：\n\
  \n• `void setDiffuseColor(Color)`\n\n• `Color getDiffuseColor()`\n\n• `ObjectProperty<Color>\
  \ diffuseColorProperty()`\n\n• `void setSpecularColor(Color)`\n\n• `Color getSpecularColor()`\n\
  \n• `ObjectProperty<Color> specularColorProperty()`\n\n• `void setSpecularPower(double)`\n\
  \n• `double getSpecularPower()`\n\n• `DoubleProperty specularPowerProperty()`\n\n\
  • `void setDiffuseMap(Image)`\n\n• `Image getDiffuseMap()`\n\n• `ObjectProperty<Image>\
  \ diffuseMapProperty()`\n\n• `void setSpecularMap(Image)`\n\n• `Image getSpecularMap()`\n\
  \n• `ObjectProperty<Image> specularMapProperty()`\n\n• `void setBumpMap(Image)`\n\
  \n• `Image getBumpMap()`\n\n• `ObjectProperty<Image> bumpMapProperty()`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 ■ JavaFX 3D\n\n• `void setSelfIlluminationMap(Image)`\n\n• `Image getSelfIlluminationMap()`\n\
  \n• `ObjectProperty<Image> selfIlluminationMapProperty()`\n\n这些方法为 `PhongMaterial`\
  \ 类定义了七个可读写属性。`diffuseColor` 和 `specularColor` 是 `Color` 类型的对象属性。`specularPower`\
  \ 是一个双精度浮点型属性。`diffuseMap`、`specularMap`、`bumpMap` 和 `selfIlluminationMap` 属性是 `Image`\
  \ 类型的对象属性。这七个属性中有五个可以在第三个构造方法中指定。然而，一旦 `PhongMaterial` 被构造，其属性也可以被修改。\n\n在我们之前的一些示例中，我们使用了单参数的\
  \ `PhongMaterial` 构造方法，在其中指定了 3D 形状的漫反射颜色。漫反射颜色通常就是我们理解的对象颜色。\n\n高光颜色是从光滑表面（如镜子或其他抛光表面）反射出的高光颜色。\n\
