  \n第 7 章 ■ 集合与并发\n\n***图 7-5.** JavaFXThreadsExample 程序*\n\n现在，当你点击“Update”按钮并检查“JavaFX\
  \ Application Thread”线程的调用栈时，你会发现“Update”按钮的事件处理器是在 JavaFX 应用程序线程上执行的。\n\n这个小实验揭示了\
  \ JavaFX 运行时系统的一些架构元素。虽然这些信息中的一部分包含了由 `com.sun` 层级中的类所代表的实现细节——因此不应在普通 JavaFX 应用程序的代码中使用——但了解一些内部工作原理仍然是有益的。\n\
  \n■ **注意** 在接下来的讨论中，我们会提及包名以 `com.sun` 开头的 Java 类。\n\n\n\n这些类是 JavaFX 运行时系统的实现细节，不适用于常规的\
  \ JavaFX 应用程序。它们可能会在未来的 JavaFX 版本中发生变更。\n\n`javafx.application.Application` 类为 JavaFX\
  \ 应用程序提供了生命周期支持。除了我们在本节前面提到的两个静态 `launch()` 方法之外，它还提供了以下生命周期方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 集合与并发\n\n• `public void init() throws Exception`\n\n• `public abstract\
  \ void start(Stage stage) throws Exception`\n\n• `public void stop() throws Exception`\n\
  \n`init()` 方法在“JavaFX-Launcher”线程中被调用。构造函数、`start()` 和 `stop()` 方法在“JavaFX Application\
  \ Thread”线程中被调用。JavaFX 应用程序线程是 `com.sun.glass` 包层次结构中 *Glass Windowing Toolkit*\
  \ 的一部分。JavaFX 事件在 JavaFX 应用程序线程上处理。所有对活动场景的操作都必须在 JavaFX 应用程序线程中执行。未附加到活动场景的节点可以在其他线程中创建和操作，直到它们被附加到活动场景。\n\
  \n■ **注意** Glass Windowing Toolkit 在 JavaFX 应用程序中的作用类似于 Swing 应用程序中的 AWT。它提供来自原生平台的绘图表面和输入事件。与\
  \ AWT 不同（在 AWT 中，EDT 与原生平台的 UI 线程不同，并且它们之间必须进行通信），Glass Windowing Toolkit 中的 JavaFX\
  \ 应用程序线程直接使用原生平台的 UI 线程。\n\n“QuantumRenderer-0”线程的所有者是位于 `com.sun.javafx.tk.quantum`\
  \ 包层次结构中的 *Quantum Toolkit*。该线程负责使用 `com.sun.prism` 包层次结构中的 *Prism Graphics Engine*\
  \ 来渲染 JavaFX 场景图。如果 JavaFX 支持图形硬件，Prism 将使用完全加速的渲染路径；如果 JavaFX 不支持图形硬件，则会回退到 Java2D\
  \ 渲染路径。Quantum Toolkit 还负责协调事件线程和渲染线程的活动。它通过脉冲事件来进行协调。\n\n■ **注意** *脉冲事件* 是一个被放入\
  \ JavaFX 应用程序线程队列中的事件。当它被处理时，它会将场景图元素的状态同步到渲染层。如果场景图的状态发生变化（无论是通过运行动画还是直接修改场景图），都会调度脉冲事件。脉冲事件被限制在每秒\
  \ 60 帧。\n\n如果 `JavaFXThreadsExample` 程序包含媒体播放，那么列表中还会出现一个名为“JFXMedia Player EventQueueThread”的线程。该线程负责通过使用\
  \ JavaFX 应用程序线程来同步场景图中的最新帧。\n\n修复无响应的 UI\n\n事件处理器在 JavaFX 应用程序线程上执行，因此，如果一个事件处理器花费太长时间来完成其工作，整个\
  \ UI 将变得无响应，因为任何后续的用户操作都只会排队，直到长时间运行的事件处理器完成才会被处理。\n\n我们在清单 7-8 中演示了这一点。\n\n***清单\
