  \n<TextField fx:id=\"address\"\n\nonAction=\"$controller.actionHandler\"\n\n这将把控制器中的\
  \ `actionHandler` 属性设置为 `onActionEvent` 的事件处理器。\n\n在控制器中，`actionHandler` 属性应具有正确的事件处理器类型。对于\
  \ `onAction` 事件，该属性应如下所示：\n\n@FXML\n\npublic EventHandler<ActionEvent> getActionHandler()\
  \ {\n\nreturn event -> {\n\n// 处理事件\n\n};\n\n}\n\n现在，我们已经深入理解了 FXML 文件格式，可以有效地利用\
