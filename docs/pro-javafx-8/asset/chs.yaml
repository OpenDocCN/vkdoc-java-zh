  \ JavaFX 语言与标记\n\nScala 示例利用对象字面量模式来构建场景图，这与 Java 和 Groovy 构建器具有相同的优势。它还受益于 ScalaFX\
  \ 库内置的强大绑定支持。该代码所利用的一些 Scala 语言特性包括：\n\n• *运算符重载*：Scala 允许你重载现有运算符并创建全新的运算符。这在多个地方得到应用，包括绑定和动画语法。\n\
  \n• *隐式转换*：Scala 通过隐式转换来实现类扩展。这使得可以为 JavaFX API 类添加便捷方法，用于对象字面量构建，从而让你在核心类上获得构建器的全部能力。\n\
  \n• *闭包*：Scala 也支持闭包，这使得事件处理程序更加简洁，并允许强大的循环结构，例如`for . . . yield`语法。\n\n• *DSL 友好语法*：常见的代码标点符号（如点和括号）在大多数情况下是可选的，这使得可以构建读起来像语言关键字的流畅\
  \ API。\n\n尽管代码最终相当简短且易于理解，但 Scala 语言本身具有相当的深度。我们将在本章稍后的“Scala 与 JavaFX”一节中展示如何利用\
  \ Scala 的一些内置特性来进一步改进你的应用程序。\n\n如你所见，使用 DSL 编写 JavaFX 代码相比使用命令式或构建器风格在 Java 中编写代码，能带来显著的好处。此外，由于所有这些语言都基于相同的底层\
  \ JavaFX API，它们与纯 Java 编写的应用程序具有相同的功能。因此，你可以自行选择使用哪种语言来编写 JavaFX 应用程序。\n\n在接下来的几节中，我们将更详细地介绍每种语言，以帮助你开始使用它们开发\
  \ JavaFX 应用程序。此外，实际上可以使用任何 JVM 语言来编写 JavaFX 应用程序，因此如果你有这里未列出的偏爱语言，也值得一试！\n\n让你的\
  \ JavaFX 更 Groovy\n\n根据就业趋势，Groovy 是 JVM 上除 Java 之外最流行的语言.1。这得益于 Groovy 极易上手；除了一些细微差异,2\
  \ 外，任何 Java 程序也都是有效的 Groovy 应用程序。这使得 Java 开发者即使尚未充分领略 Groovy 为 Java 生态系统带来的所有强大功能和便利性，也能轻松开始使用它。\n\
  \nGroovy 源文件直接编译为 Java 字节码，可以在任何拥有 JVM 的地方运行。因此，你可以直接访问任何 Java 库，包括 JavaFX API。由于语言内置了诸多便利性，编写良好的\
  \ Groovy 应用程序几乎总是比等效的 Java 版本更简短。Groovy 语言的一些特性使其成为 Java 和 JavaFX 代码的有吸引力的替代品，包括：\n\
  \n• *闭包*：最近在 Java 8 中引入，闭包对 GUI 编程尤其重要，因为它们使得编写事件发生时调用的代码更加简单。\n\n• *运算符重载*：Groovy\
  \ 允许你重载现有运算符或定义新运算符，这对于编写可读的 DSL 至关重要。\n\n• *动态类型*：在 Groovy 代码中类型是可选的，这使得编写简洁代码更加容易。\n\
  \n• *Getter/Setter 访问*：Groovy 会自动将直接字段访问转换为 getter 和 setter，从而缩短了这种访问 Java API 的常见模式。\n\
