  \ 程序*\n\n理解 Canvas 和 Image Ops API\n\nCanvas 和 Image Ops API 允许你操作屏幕画布或离屏图像的 2D\
  \ 图形内容。\n\n理解 Canvas API\n\nCanvas API 包含两个公共类：`javafx.scene.canvas` 包中的 `Canvas`\
  \ 和 `GraphicsContext`。\n\n`Canvas` 是一个可以添加到场景（Scene）中的节点（Node）。\n\n`Canvas` 类包含两个公共构造方法：\n\
  \n• `Canvas()`\n\n• `Canvas(double width, double height)`\n\n默认构造方法创建一个宽度和高度均为零的\
  \ `Canvas`。双参数构造方法创建一个具有指定宽度和高度的 `Canvas`。\n\n`Canvas` 类包含以下公共方法：\n\n• `GraphicsContext\
  \ getGraphicsContext2D()`\n\n• `void setWidth(double width)`\n\n• `double getWidth()`\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 10 章 ■ JavaFX 3D\n\n• `DoubleProperty\
  \ widthProperty()`\n\n• `void setHeight(double height)`\n\n• `double getHeight()`\n\
  \n• `DoubleProperty heightProperty()`\n\n`getGraphicsContext2D()` 方法返回可用于执行 2D 图形操作的\
  \ `GraphicsContext`。如果在同一个 `Canvas` 对象上多次调用 `getGraphicsContext2D()`，则返回同一个对象。其他方法定义了\
  \ `Canvas` 的读写属性 `width` 和 `height`。\n\n`GraphicsContext` 类没有任何公共构造方法。获取 `GraphicsContext`\
  \ 实例的唯一途径是通过 `Canvas` 对象。\n\n`GraphicsContext` 支持一种类似于其他图形工具包（如 `java.awt.Canvas`、`javax.swing.Component`\
  \ 和 HTML 5 Canvas API）中的即时模式 2D 操作的 2D 操作风格。与 AWT 或 Java2D 中在 `paint()` 回调方法中进行表面绘制不同，JavaFX\
  \ Canvas 的典型使用场景是：创建 `Canvas`，从中获取 `GraphicsContext`，通过调用 `GraphicsContext` 的方法在\
  \ `Canvas` 上绘制，然后将 `Canvas` 添加到场景图中。在将 `Canvas` 添加到场景图后，你仍然可以继续调用 `GraphicsContext`\
  \ 的方法。但是，所有 `GraphicsContext` 方法都被视为 UI 操作方法，并且只应在 `Canvas` 已添加到场景图后，在 JavaFX 应用程序线程中调用。\n\
  \n`GraphicsContext` 类拥有一整套公共方法，允许你在其所属的 `Canvas` 上执行 2D 操作。以下方法不会在 `Canvas` 上放置任何图形元素；但是，它们控制\
  \ `GraphicsContext` 的状态并影响后续的渲染调用：\n\n• `void save()`\n\n• `void restore()`\n\n\
  • `void translate(double x, double y)`\n\n• `void scale(double x, double y)`\n\n\
  • `void rotate(double degrees)`\n\n• `void transform(double mxx, double myx, double\
  \ mxy, double myy, double mxt, double myt)`\n\n• `void transform(Affine xform)`\n\
  \n• `void setTransform(double mxx, double myx, double mxy, double myy, double mxt,\
  \ double myt)`\n\n• `void setTransform(Affine xform)`\n\n• `Affine getTransform(Affine\
  \ xform)`\n\n• `Affine getTransform()`\n\n• `void setGlobalAlpha(double alpha)`\n\
  \n• `double getGlobalAlpha()`\n\n• `void setGlobalBlendMode(BlendMode op)`\n\n•\
  \ `BlendMode getGlobalBlendMode()`\n\n• `void setFill(Paint p)`\n\n• `Paint getFill()`\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 10 章 ■ JavaFX 3D\n\n• `void\
  \ setStroke(Paint p)`\n\n• `Paint getStroke()`\n\n• `void setLineWidth(double lw)`\n\
  \n• `double getLineWidth()`\n\n• `void setLineCap(StrokeLineCap cap)`\n\n• `StrokeLineCap\
  \ getLineCap()`\n\n• `void setLineJoin(StrokeLineJoin join)`\n\n• `StrokeLineJoin\
  \ getLineJoin()`\n\n• `void setMiterLimit(double ml)`\n\n• `double getMiterLimit()`\n\
  \n• `void setFont(Font f)`\n\n• `Font getFont()`\n\n• `void setTextAlign(TextAlignment\
  \ align)`\n\n• `TextAlignment getTextAlign()`\n\n• `void setTextBaseline(VPos baseline)`\n\
  \n• `VPos getTextBaseline()`\n\n• `void setFillRule(FillRule fillRule)`\n\n• `FillRule\
  \ getFillRule()`\n\n• `void setEffect(Effect e)`\n\n• `Effect getEffect(Effect e)`\n\
  \n• `void applyEffect(Effect e)`\n\n各种 setter 和 getter 方法用于改变 `GraphicsContext`\
  \ 的特性。它们影响坐标变换、全局透明度、全局混合模式、填充画笔、描边画笔、线宽、线帽、线连接、斜接限制、字体、文本对齐、文本基线、填充规则以及在下一次渲染方法调用时将使用的效果。`save()`\
  \ 方法会将这些特性的当前设置推入一个栈中。`restore()` 方法会将保存的设置弹出并恢复到 `GraphicsContext` 中。\n\n以下方法会在\
  \ `Canvas` 上放置图形元素：\n\n• `void fillText(String text, double x, double y)`\n\n• `void\
  \ strokeText(String text, double x, double y)`\n\n• `void fillText(String text,\
  \ double x, double y, double maxWidth)`\n\n• `void strokeText(String text, double\
  \ x, double y, double maxWidth)`\n\n• `void beginPath()`\n\n• `void moveTo(double\
  \ x0, double y0)`\n\n• `void lineTo(double x1, double y1)`\n\n• `void quadraticCurveTo(double\
  \ xc, double yc, double x1, double y1)`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 ■ JavaFX 3D\n\n• `void bezierCurveTo(double xc1, double yc1, double xc2,\
  \ double yc2, double x1, double y1)`\n\n• `void arcTo(double x1, double y1, double\
  \ x2, double y2, double radius)`\n\n• `void arc(double centerX, double centerY,\
  \ double radiusX, double radiusY, double startAngle, double length)`\n\n• `void\
  \ rect(double x, double y, double w, double h)`\n\n• `void appendSVGPath(String\
  \ svgPath)`\n\n• `void closePath()`\n\n• `void fill()`\n\n• `void stroke()`\n\n\
  • `void clip()`\n\n• `void clearRect(double x, double y, double w, double h)`\n\n\
  • `void fillRect(double x, double y, double w, double h)`\n\n• `void strokeRect(double\
  \ x, double y, double w, double h)`\n\n• `void fillOval(double x, double y, double\
  \ w, double h)`\n\n• `void strokeOval(double x, double y, double w, double h)`\n\
  \n• `void fillArc(double x, double y, double w, double h, double startAngle, double\
  \ arcExtent, ArcType closure)`\n\n• `void strokeArc(double x, double y, double w,\
  \ double h, double startAngle, double arcExtent, ArcType closure)`\n\n• `void fillRoundRect(double\
  \ x, double y, double w, double h, double arcWidth, double arcHeight)`\n\n• `void\
  \ strokeRoundRect(double x, double y, double w, double h, double arcWidth, double\
  \ arcHeight)`\n\n• `void strokeLine(double x1, double y1, double x2, double y2)`\n\
  \n• `void fillPolygon(double[] xPoints, double[] yPoints, int nPoints)`\n\n• `void\
  \ strokePolygon(double[] xPoints, double[] yPoints, int nPoints)`\n\n• `void strokePolyline(double[]\
  \ xPoints, double[] yPoints, int nPoints)`\n\n• `void drawImage(Image img, double\
  \ x, double y)`\n\n• `void drawImage(Image img, double x, double y, double w, double\
  \ h)`\n\n• `void drawImage(Image img, double sx, double sy, double sw, double sh,\
  \ double dx, double dy, double dw, double dh)`\n\n`fillXXX` 方法将一个具有填充内部的形状放置到 `Canvas`\
  \ 上。`strokeXXX` 方法将一个具有空心内部的形状放置到 `Canvas` 上。三个 `drawImage()` 方法将一个 `javafx.scene.image.Image`\
  \ 绘制到 `Canvas` 上，并支持缩放和子区域选取。`beginPath()` 方法开始构建一个路径，该路径可以渲染到 `Canvas` 上或用作裁剪蒙版。`moveTo()`、`lineTo()`、`quadraticCurveTo()`、`bezierCurveTo()`、`arcTo()`、`arc()`、`rect()`、`appendSVGPath()`\
  \ 和 `closePath()` 方法用于向路径添加内容。`fill()` 方法将路径渲染到 `Canvas` 上，并填充其内部。`stroke()` 方法将路径渲染到\
  \ `Canvas` 上，但内部为空。`clip()` 方法使用路径裁剪 `Canvas`，以便后续的渲染方法调用在路径外部不会产生任何效果。`clearRect()`\
  \ 方法将使用透明颜色值清除 `Canvas` 上的一个矩形区域。要清除整个 `Canvas`，可以调用 `clearRect(0, 0, width, height)`。\n\
  \n以下方法用于提供关于 `GraphicsContext` 的额外信息：\n\n• `Canvas getCanvas()`\n\n• `PixelWriter\
  \ getPixelWriter()`\n\n• `boolean isPointInPath(double x, double y)`\n\n\n\n`getCanvas()`\
  \ 方法返回 Canvas 对象。`getPixelWriter()` 方法返回一个 PixelWriter，可用于逐像素操作 Canvas。PixelWriter\
  \ 类是 JavaFX 图像操作 API 的一部分，我们将在下一小节中介绍。`isPointInPath()` 方法在点 (x, y) 位于 GraphicsContext\
  \ 当前路径内时返回 true。\n\n清单 10-12 中的程序显示了一个 Canvas，并允许用户通过鼠标在屏幕上拖拽来绘制椭圆。椭圆的位置和大小也会显示在\
  \ Canvas 上。\n\n***清单 10-12.*** CanvasExample.java\n\nimport javafx.application.Application;\n\
  \nimport javafx.geometry.Point2D;\n\nimport javafx.scene.Group;\n\nimport javafx.scene.Scene;\n\
  \nimport javafx.scene.canvas.Canvas;\n\nimport javafx.scene.canvas.GraphicsContext;\n\
  \nimport javafx.scene.paint.Color;\n\nimport javafx.scene.text.Font;\n\nimport javafx.stage.Stage;\n\
  \nimport static java.lang.Math.abs;\n\nimport static java.lang.Math.min;\n\npublic\
  \ class CanvasExample extends Application {\n\nprivate Point2D p0;\n\npublic static\
  \ void main(String[] args) {\n\nlaunch(args);\n\n}\n\n@Override\n\npublic void start(Stage\
  \ stage) {\n\nstage.setTitle(\"Canvas 示例\");\n\nstage.setScene(makeScene());\n\n\
  stage.show();\n\n}\n\nprivate Scene makeScene() {\n\nCanvas canvas = new Canvas(640,\
  \ 480);\n\nGraphicsContext graphicsContext = canvas.getGraphicsContext2D();\n\n\
  graphicsContext.setFill(Color.BLUE);\n\ngraphicsContext.setStroke(Color.RED);\n\n\
  graphicsContext.setFont(Font.font(14));\n\ngraphicsContext.strokeText(\"点击并拖拽鼠标绘制椭圆\"\
  , 20, 20);\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 160](img/index-484_1.jpg)\n\
  \n第 10 章 ■ JavaFX 3D\n\ncanvas.setOnMousePressed(event -> {\n\ngraphicsContext.clearRect(0,\
  \ 0, 640, 480);\n\np0 = new Point2D(event.getX(), event.getY());\n\n});\n\ncanvas.setOnMouseDragged(event\
  \ -> {\n\nPoint2D p1 = new Point2D(event.getX(), event.getY());\n\ngraphicsContext.clearRect(0,\
  \ 0, 640, 480);\n\ndouble x = min(p0.getX(), p1.getX());\n\ndouble y = min(p0.getY(),\
  \ p1.getY());\n\ndouble width = abs(p1.getX() - p0.getX());\n\ndouble height = abs(p1.getY()\
  \ - p0.getY());\n\ngraphicsContext.fillOval(x, y, width, height);\n\ngraphicsContext.strokeText(\"\
  椭圆(\" + x + \", \" + y + \", \" +\n\nwidth + \", \" + height + \")\", x, y - 10);\n\
  \n});\n\nGroup group = new Group(canvas);\n\nreturn new Scene(group, 640, 480);\n\
  \n}\n\n}\n\n运行清单 10-12 中的程序，并在用户进行一些交互后，将显示图 10-15 中的 Canvas 示例窗口。\n\n***图 10-15.**\
