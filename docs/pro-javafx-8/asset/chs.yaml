  \n理解 @FXML 注解\n\n\n\n我们已经看到了 `@FXML` 注解的两种用途。它可以应用于 FXML 文件控制器中的字段，这些字段的名称和类型与要注入节点的\
  \ FXML 元素的 `fx:id` 属性和元素名称相匹配。它还可以应用于无返回类型的方法，这些方法要么没有参数，要么只有一个 `javafx.event.Event`\
  \ 或其子类型的参数，使它们能够作为 FXML 文件中元素的事件处理器使用。\n\n如果控制器中有相应的字段，`FXMLLoader` 会将其位置和资源注入到控制器中：\n\
  \n@FXML\n\nprivate URL location;\n\n@FXML\n\nprivate ResourceBundle resources;\n\
  \n`FXMLLoader` 还会调用一个带有以下签名的 `@FXML` 注解的初始化方法：\n\n@FXML\n\npublic void initialize()\
  \ {\n\n// ...\n\n}\n\n清单 3-7、3-8 和 3-9 中的 `FXMLInjectionExample` 演示了这些功能如何工作。在此示例中，我们在\
