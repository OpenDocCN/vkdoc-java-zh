  \n**第 2 章**\n\n**在 JavaFX 中创建用户界面**\n\n*生活是一门不用橡皮擦的艺术。*\n——约翰·W·加德纳\n\n第 1 章通过介绍开发和执行\
  \ JavaFX 程序的基础知识，让您快速入门了 JavaFX。\n\n现在，我们将介绍第 1 章中略过的关于在 JavaFX 中创建 UI 的许多细节。议程上的第一件事是让您熟悉\
  \ JavaFX 用于表达 UI 的*剧场*隐喻，并介绍我们称之为*以节点为中心的 UI* 的重要性。\n\n以编程方式与声明方式创建用户界面\n\nJavaFX\
  \ 平台提供了两种互补的方式来创建 UI。在本章中，我们将讨论如何使用 Java API 来创建和填充 UI。对于习惯于编写代码来利用 API 的 Java 开发人员来说，这是一种便捷的方式。\n\
  \n设计师通常使用允许他们声明而非编程 UI 的图形工具。JavaFX 平台定义了 FXML，这是一种基于 XML 的标记语言，可用于声明式地描述 UI。此外，Oracle\
  \ 提供了一个名为 SceneBuilder 的图形工具，该工具能够处理 FXML 文件。\n\nSceneBuilder 的使用将在第 3 章中演示。\n\n\
  请注意，UI 的一部分可以使用 API 创建，而其他部分可以使用 SceneBuilder 创建。FXML\nAPI 提供了两种方法之间的桥梁和集成粘合剂。\n\
  \n以节点为中心的 UI 简介\n\n在 JavaFX 中创建 UI 就像创作一部舞台剧，通常包含以下几个非常简单的步骤：\n1. *创建一个舞台，您的程序将在其上表演。*\
  \ 舞台的具体实现将取决于其部署的平台（例如，桌面、平板电脑或嵌入式系统）。\n2. *创建一个场景，演员和道具（节点）将在其中进行视觉交互，并与观众（程序的用户）互动。*\
  \ 就像剧场行业中任何优秀的布景设计师一样，优秀的 JavaFX 开发人员会努力使他们的场景在视觉上吸引人。为此，与图形设计师合作通常是一个好主意，共同打造您的“舞台剧”。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 2 章 ■ 在 JavaFX 中创建用户界面\n\
  \n3. *在场景中创建节点。* 这些节点是 `javafx.scene.Node` 类的子类，包括 UI 控件、形状、文本（一种形状类型）、图像、媒体播放器、嵌入式浏览器以及您创建的自定义\
  \ UI 组件。节点也可以是其他节点的容器，通常提供跨平台的布局能力。一个场景拥有一个场景图，其中包含一个有向的节点图。通过更改非常丰富的 Node 属性集中的值，可以以多种方式（例如，移动、缩放和设置不透明度）操作单个节点和节点组。\n\
  \n\n\n4. *创建代表场景中节点模型的变量和类。* 如第 1 章所述，JavaFX 最强大的特性之一就是绑定，它能使应用程序的 UI 轻松地与应用程序的状态（即模型）保持同步。\n\
  \n■ **注意** 本章中的大多数示例都是用于演示 UI 概念的小程序。因此，许多示例中的模型由主程序中的变量组成，而不是包含在单独的 Java 类中（例如，第\
  \ 1 章中的 `AudioConfigModel` 类）。\n\n5. *创建事件处理器，例如* `onMousePressed`*，使用户能够与程序交互。*\
  \ 这些事件处理器通常会操作模型中的实例变量。许多处理器需要实现一个单一的抽象方法，因此这为使用 lambda 表达式提供了绝佳的机会。\n\n6. *创建时间线和过渡动画来为场景添加动画效果。*\
  \ 例如，你可能希望书籍列表的缩略图在场景中平滑移动，或者 UI 中的某个页面淡入视野。你可能只是想让一个乒乓球在场景中移动，从墙壁和球拍上反弹，这将在本章后面的“节点碰撞检测的禅意”一节中演示。\n\
  \n让我们从更仔细地审视步骤 1 开始，在这一步中，我们将研究舞台（Stage）的能力。\n\n## 设置舞台\n\n舞台的外观和功能将取决于其部署的平台。例如，如果部署在带有触摸屏的嵌入式设备上，你的舞台可能就是整个触摸屏。通过\
  \ Java Web Start 部署的 JavaFX 程序的舞台将是一个窗口。\n\n## 理解 Stage 类\n\nStage 类是任何具有图形 UI 的\
  \ JavaFX 程序的顶级容器。它拥有多个属性和方法，例如，可以定位、调整大小、设置标题、使其不可见或设置一定程度的透明度。据我们所知，了解一个类能力的最佳两种方法是研究\
  \ JavaFX API 文档以及检查（并编写）使用它的程序。在本节中，我们要求你两者都做，首先从查看 API 文档开始。\n\nJavaFX API 文档位于\
  \ JavaFX SDK 安装目录下的 `docs/api` 子目录中。此外，你也可以通过本章末尾“资源”部分提供的 URL 在线获取。\n\n在浏览器中打开\
  \ `index.html` 文件，导航到 `javafx.stage` 包，然后选择 `Stage` 类。该页面应包含属性、构造函数和方法的表格，包括图 2-1\
  \ 摘录中显示的部分内容。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 25](img/index-37_1.jpg)\n\
