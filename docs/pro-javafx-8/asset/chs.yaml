  \ = \" + f.get());\n\nSystem.out.println(\"d.get() = \" + d.get());\n\nSystem.out.println(\"\
  调用 i.set(2048)。\");\n\ni.set(2048);\n\nSystem.out.println(\"i.get() = \" + i.get());\n\
  \nSystem.out.println(\"l.get() = \" + l.get());\n\nSystem.out.println(\"f.get()\
  \ = \" + f.get());\n\nSystem.out.println(\"d.get() = \" + d.get());\n\nd.unbind();\n\
  \nf.unbind();\n\nl.unbind();\n\nSystem.out.println(\"已解除 l 到 i、f 到 l、d 到 f 的绑定。\"\
  );\n\nf.bind(d);\n\nl.bind(f);\n\ni.bind(l);\n\nSystem.out.println(\"已绑定 f 到 d、l\
