  \n常用类\n\n现在，我们对 `javafx.beans`、`javafx.beans.binding`、`javafx.beans.property` 和\
  \ `javafx.beans.value` 这四个包的内容进行概述。在本节中，“SimpleIntegerProperty 系列类”指的是在 Boolean、Integer、Long、Float、Double、String\
  \ 和 Object 类型上外推得到的类。因此，所述内容同样适用于 SimpleBooleanProperty 等。\n\n• JavaFX 属性和绑定框架中最常用的类是\
  \ SimpleIntegerProperty 系列类。它们提供了 Property 接口的所有功能，包括惰性求值。到目前为止，本章的所有示例中都使用了它们。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 4 章 ■ 属性和绑定\n\n• JavaFX\
  \ 属性和绑定框架中的另一组具体类是 ReadOnlyIntegerWrapper 系列类。这些类实现了 Property 接口，但还有一个 `getReadOnlyProperty()`\
  \ 方法，该方法返回一个与主 Property 同步的 ReadOnlyProperty。当你需要为组件的实现提供一个功能完备的 Property，但又只想向组件的客户端提供一个\
  \ ReadOnlyProperty 时，它们非常方便使用。\n\n• 可以扩展 IntegerPropertyBase 系列抽象类来提供完整 Property\
  \ 类的实现，尽管在实践中，SimpleIntegerProperty 系列类更易于使用。IntegerPropertyBase 系列类中唯一的抽象方法是 `getBean()`\
  \ 和 `getName()`。\n\n• 可以扩展 ReadOnlyIntegerPropertyBase 系列抽象类来提供 ReadOnlyProperty\
  \ 类的实现。这很少有必要。ReadOnlyIntegerPropertyBase 系列类中唯一的抽象方法是 `get()`、`getBean()` 和 `getName()`。\n\
  \n• 可以在调用 `addListener()` 之前，使用 WeakInvalidationListener 和 WeakChangeListener 类来包装\
  \ InvalidationListener 和 ChangeListener 实例。它们持有被包装监听器实例的弱引用。只要你在自己这边持有对被包装监听器的引用，弱引用就会保持活跃，你就能接收到事件。当你处理完被包装的监听器并从自己这边取消对其的引用后，弱引用就有资格被垃圾回收，并随后被回收。所有\
  \ JavaFX 属性和绑定框架的 Observable 对象都知道如何在弱引用被垃圾回收后清理弱监听器。这可以防止在监听器使用后未被移除时发生内存泄漏。WeakInvalidationListener\
  \ 和 WeakListener 类实现了 WeakListener 接口，如果被包装的监听器实例已被垃圾回收，其 `wasGarbageCollected()`\
  \ 方法将返回 true。\n\n以上涵盖了位于 `javafx.beans`、`javafx.beans.property` 和 `javafx.beans.value`\
  \ 包中的所有 JavaFX 属性和绑定 API，以及 `javafx.beans.binding` 包中的部分（而非全部）API。\n\n`javafx.beans.property.adapters`\
  \ 包提供了旧式 JavaBeans 属性和 JavaFX 属性之间的适配器。我们将在“将 JavaBeans 属性适配为 JavaFX 属性”一节中介绍这些适配器。\n\
  \n`javafx.beans.binding` 包中剩余的类是帮助您从现有属性和绑定创建新绑定的 API。这是下一节的重点。\n\n创建绑定\n\n现在，我们将重点转向从现有属性和绑定创建新绑定。您在本章前面的“理解关键接口和概念”一节中了解到，绑定是一个可观察的值，它有一个依赖项列表，这些依赖项也是可观察的值。\n\
  \nJavaFX 属性和绑定框架提供了三种创建新绑定的方式：\n\n• 扩展 IntegerBinding 系列抽象类。\n• 使用工具类 Bindings 中创建绑定的静态方法。\n\
  • 使用 IntegerExpression 系列抽象类提供的流畅接口 API。\n\n您在本章前面的“理解 Binding 接口”一节中已经看到了直接扩展的方法。接下来，我们将探讨\
  \ Bindings 工具类。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 4 章 ■ 属性和绑定\n\
  \n理解 Bindings 工具类\n\nBindings 类包含 236 个工厂方法，这些方法利用现有的可观察值和常规值来创建新的绑定。大多数方法都被重载，以考虑到可观察值和常规\
  \ Java（不可观察）值都可以用来构建新的绑定。至少有一个参数必须是可观察值。\n\n以下是九个重载的 `add()` 方法的签名：\n\npublic static\
  \ NumberBinding add(ObservableNumberValue n1, ObservableNumberValue n2)\n\npublic\
  \ static DoubleBinding add(ObservableNumberValue n, double d)\n\npublic static DoubleBinding\
  \ add(double d, ObservableNumberValue n)\n\npublic static NumberBinding add(ObservableNumberValue\
  \ n, float f)\n\npublic static NumberBinding add(float f, ObservableNumberValue\
  \ n)\n\npublic static NumberBinding add(ObservableNumberValue n, long l)\n\npublic\
  \ static NumberBinding add(long l, ObservableNumberValue n)\n\npublic static NumberBinding\
  \ add(ObservableNumberValue n, int i)\n\npublic static NumberBinding add(int i,\
  \ ObservableNumberValue n)\n\n当调用 `add()` 方法时，它会返回一个 NumberBinding，其依赖项包括所有可观察值参数，并且其值是两个参数值的和。类似的重载方法也存在于\
  \ `subtract()`、`multiply()` 和 `divide()` 中。\n\n■ **注意** 回顾上一节，ObservableIntegerValue、ObservableLongValue、ObservableFloatValue\
  \ 和 ObservableDoubleValue 是 ObservableNumberValue 的子类。因此，刚才提到的四种算术方法可以接受这些可观察数值类型以及任何不可观察值的任意组合。\n\
  \n\n\n清单 4-5 中的程序使用 Bindings 中的算术方法，通过以下公式计算笛卡尔平面上顶点为(x1, y1)、(x2, y2)、(x3, y3)的三角形面积：\n\
  \n面积 = (x1*y2 + x2*y3 + x3*y1 – x1*y3 – x2*y1 – x3*y2) / 2\n\n***清单 4-5.*** TriangleAreaExample.java\n\
  \nimport javafx.beans.binding.Bindings;\n\nimport javafx.beans.binding.NumberBinding;\n\
  \nimport javafx.beans.property.IntegerProperty;\n\nimport javafx.beans.property.SimpleIntegerProperty;\n\
  \npublic class TriangleAreaExample {\n\npublic static void main(String[] args) {\n\
  \nIntegerProperty x1 = new SimpleIntegerProperty(0);\n\nIntegerProperty y1 = new\
  \ SimpleIntegerProperty(0);\n\nIntegerProperty x2 = new SimpleIntegerProperty(0);\n\
  \nIntegerProperty y2 = new SimpleIntegerProperty(0);\n\nIntegerProperty x3 = new\
  \ SimpleIntegerProperty(0);\n\nIntegerProperty y3 = new SimpleIntegerProperty(0);\n\
  \nfinal NumberBinding x1y2 = Bindings.multiply(x1, y2);\n\nfinal NumberBinding x2y3\
  \ = Bindings.multiply(x2, y3);\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 ■ 属性和绑定\n\nfinal NumberBinding x3y1 = Bindings.multiply(x3, y1);\n\nfinal\
  \ NumberBinding x1y3 = Bindings.multiply(x1, y3);\n\nfinal NumberBinding x2y1 =\
  \ Bindings.multiply(x2, y1);\n\nfinal NumberBinding x3y2 = Bindings.multiply(x3,\
  \ y2);\n\nfinal NumberBinding sum1 = Bindings.add(x1y2, x2y3);\n\nfinal NumberBinding\
  \ sum2 = Bindings.add(sum1, x3y1);\n\nfinal NumberBinding sum3 = Bindings.add(sum2,\
  \ x3y1);\n\nfinal NumberBinding diff1 = Bindings.subtract(sum3, x1y3);\n\nfinal\
  \ NumberBinding diff2 = Bindings.subtract(diff1, x2y1);\n\nfinal NumberBinding determinant\
  \ = Bindings.subtract(diff2, x3y2);\n\nfinal NumberBinding area = Bindings.divide(determinant,\
  \ 2.0D);\n\nx1.set(0); y1.set(0);\n\nx2.set(6); y2.set(0);\n\nx3.set(4); y3.set(3);\n\
  \nprintResult(x1, y1, x2, y2, x3, y3, area);\n\nx1.set(1); y1.set(0);\n\nx2.set(2);\
  \ y2.set(2);\n\nx3.set(0); y3.set(1);\n\nprintResult(x1, y1, x2, y2, x3, y3, area);\n\
  \n}\n\nprivate static void printResult(IntegerProperty x1, IntegerProperty y1,\n\
  \nIntegerProperty x2, IntegerProperty y2,\n\nIntegerProperty x3, IntegerProperty\
  \ y3,\n\nNumberBinding area) {\n\nSystem.out.println(\"对于 A(\" +\n\nx1.get() + \"\
  ,\" + y1.get() + \"), B(\" +\n\nx2.get() + \",\" + y2.get() + \"), C(\" +\n\nx3.get()\
  \ + \",\" + y3.get() + \")，三角形 ABC 的面积为 \" + area.getValue());\n\n}\n\n}\n\n我们使用`IntegerProperty`来表示坐标。`NumberBinding\
  \ area`的构建使用了`Bindings`中所有四个算术工厂方法。由于我们从`IntegerProperty`对象开始，尽管`Bindings`算术工厂方法的返回类型是`NumberBinding`，但实际返回的对象（直到`determinant`）都是`IntegerBinding`对象。我们在`divide()`调用中使用了`2.0D`而不是单纯的`2`，以强制除法按双精度除法执行，而非整数除法。我们构建的所有属性和绑定形成了一个树状结构，其中`area`是根节点，中间绑定是内部节点，而属性`x1`、`y1`、`x2`、`y2`、`x3`、`y3`是叶子节点。这棵树类似于我们使用常规算术表达式语法解析面积公式的数学表达式时得到的解析树。\n\
  \n当我们运行清单 4-5 中的程序时，控制台会输出以下内容：\n\n对于 A(0,0), B(6,0), C(4,3)，三角形 ABC 的面积为 9.0\n\n\
  对于 A(1,0), B(2,2), C(0,1)，三角形 ABC 的面积为 1.5\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 ■ 属性和绑定\n\n除了算术方法之外，`Bindings`类还包含以下工厂方法。\n\n*   逻辑运算符：`and`、`or`、`not`\n\
  *   数值运算符：`min`、`max`、`negate`\n*   对象运算符：`isNull`、`isNotNull`\n*   字符串运算符：`length`、`isEmpty`、`isNotEmpty`\n\
  *   关系运算符：\n    *   `equal`\n    *   `equalIgnoreCase`\n    *   `greaterThan`\n\
  \    *   `greaterThanOrEqual`\n    *   `lessThan`\n    *   `lessThanOrEqual`\n \
  \   *   `notEqual`\n    *   `notEqualIgnoreCase`\n*   创建运算符：\n    *   `createBooleanBinding`\n\
  \    *   `createIntegerBinding`\n    *   `createLongBinding`\n    *   `createFloatBinding`\n\
  \    *   `createDoubleBinding`\n    *   `createStringBinding`\n    *   `createObjectBinding`\n\
  *   选择运算符：`select`\n    *   `selectBoolean`\n    *   `selectInteger`\n    *   `selectLong`\n\
  \    *   `selectFloat`\n    *   `selectDouble`\n    *   `selectString`\n\n\n\n除了创建运算符和选择运算符之外，前面的运算符都能实现你所期望的功能。对象运算符仅对可观察的字符串值和可观察的对象值有意义。字符串运算符仅对可观察的字符串值有意义。除\
  \ `IgnoreCase` 之外的所有关系运算符都适用于数值。对于数值类型的 `equal` 和 `notEqual` 运算符，存在一个带有第三个双精度参数的版本，用于在比较\
  \ `float` 或 `double` 值时指定容差。`equal` 和 `notEqual` 运算符也适用于布尔值、字符串值和对象值。对于字符串值和对象值，`equal`\
  \ 和 `notEqual` 运算符会使用 `equals()` 方法来比较它们的值。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 ■ 属性和绑定\n\n创建运算符提供了一种便捷的方式来创建绑定，而无需直接扩展抽象基类。它接受一个 `Callable` 和任意数量的依赖项作为参数。清单\
  \ 4-3 中的 `area` 双精度绑定可以重写如下，使用 lambda 表达式作为 `Callable`：\n\nDoubleBinding area =\
  \ Bindings.createDoubleBinding(() -> {\n\nreturn x.get() * y.get();\n\n}, x, y);\n\
  \n选择运算符作用于所谓的 *JavaFX Beans*，即根据 JavaFX Beans 规范构建的 Java 类。我们将在本章后面的“理解 JavaFX Beans\
  \ 约定”一节中讨论 JavaFX Beans。\n\n`Bindings` 中有许多方法用于处理可观察集合。我们将在第 7 章中介绍它们。\n\n以上涵盖了\
  \ `Bindings` 中所有返回绑定对象的方法。`Bindings` 中有 18 个方法不返回绑定对象。各种 `bindBidirectional()` 和\
  \ `unbindBidirectional()` 方法用于创建双向绑定。事实上，各个属性类中的 `bindBidirectional()` 和 `unbindBidirectional()`\
  \ 方法只是简单地调用了 `Bindings` 类中对应的方法。`bindContent()` 和 `unbindContent()` 方法用于将普通集合绑定到可观察集合。`convert()`、`concat()`\
  \ 以及一对重载的 `format()` 方法返回 `StringExpression` 对象。最后，`when()` 方法返回一个 `When` 对象。\n\n\
  `When` 和 `StringExpression` 类是用于创建绑定的流畅接口 API 的一部分，我们将在下一小节中介绍。\n\n理解流畅接口 API\n\n\
  如果你曾问过“为什么会有人给方法起名叫 `when()`？`When` 类又会封装什么样的信息？”，那么欢迎加入我们的行列。在你未曾留意的时候，面向对象编程社区发明了一种全新的\
  \ API 设计方法，它完全无视了沿用数十年的面向对象实践原则。这种新方法论不再封装数据并将业务逻辑分配到相关的领域对象中，而是产生了一种 API 风格，鼓励方法链式调用，并利用一个方法的返回类型来决定下一个方法（如同火车车厢般）可用的方法。方法名称的选择并非为了传达完整含义，而是为了让整个方法链读起来像一个流畅的句子。这种\
  \ API 风格被称为 *流畅接口 API*。\n\n■ **注意** 你可以在本章末尾引用的 Martin Fowler 网站上找到关于流畅接口的更详尽阐述。\n\
  \n用于创建绑定的流畅接口 API 定义在 `IntegerExpression` 系列类中。\n\n`IntegerExpression` 是 `IntegerProperty`\
  \ 和 `IntegerBinding` 的父类，这使得 `IntegerExpression` 的方法也可用于 `IntegerProperty` 和 `IntegerBinding`\
  \ 类。四个数值表达式类共享一个共同的父接口 `NumberExpression`，所有方法都在该接口中定义。特定类型的表达式类会重写一些返回 `NumberBinding`\
  \ 的方法，以返回更合适的绑定类型。\n\n以下列出了七种属性和绑定可用的方法：\n\n\n\n• 对于 `BooleanProperty` 和 `BooleanBinding`\n\
