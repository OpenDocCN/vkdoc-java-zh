  \n第 8 章 ■ 在 JavaFX 中创建图表\n\n***图 8-14.** 使用 AreaChart 渲染面积图*\n\n使用 StackedAreaChart\n\
  \nStackedAreaChart 与 AreaChart 的关系，类似于 StackedBarChart 与 BarChart 的关系。StackedAreaChart\
