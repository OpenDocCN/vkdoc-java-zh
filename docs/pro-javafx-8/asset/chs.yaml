  \n打包与分发\n\n用于向最终用户交付软件的技术一直在变化。过去，交付 Java 应用的首选方式是通过 Java 网络启动协议（JNLP）。通过这种方式，小程序和独立应用都可以安装在客户端上。然而，这种技术存在一些问题。该想法仅在最终用户安装了能够执行应用的\
  \ JVM 时才有效，但这并非总是如此。即使在桌面领域，系统可以预装 JVM 交付，也存在版本控制和安全性问题。事实上，有些应用是硬编码针对特定 JVM 版本的。尽管\
  \ JVM 中的漏洞在大多数情况下修复得非常快，但这仍然要求最终用户始终安装最新版本的 JVM，这可能会相当令人沮丧。\n\n除此之外，浏览器制造商越来越不愿意支持替代的嵌入式平台。总之，依赖浏览器和本地预装的\
  \ JVM 并不能提供最佳的最终用户体验。\n\n客户端软件行业正越来越多地向所谓的“应用商店”转变。在这种概念中，可以下载和安装自包含的应用。它们不依赖于预装的执行环境。这一原则起源于移动领域，其中苹果的\
  \ AppStore 和安卓的 Play 商店引领市场。尤其是在这些市场中，一键安装相比本地下载、解压、手动配置等噩梦具有巨大优势。\n\n\n\n在 Java\
  \ 术语中，自包含应用程序是指将应用程序与能够运行该应用程序的 JVM 捆绑在一起。过去，这个想法常常被拒绝，因为它会使应用程序包变得过于庞大。然而，随着内存和存储容量的增加，以及通过互联网发送字节的成本降低，这一劣势正变得不那么重要。\n\
  \n目前正在开发多种技术，可帮助你将应用程序与正确的 JVM 版本捆绑并打包。\n\n在 OpenJFX 项目区域内开发的 JavaFXPackager 包含一个用于创建自包含包的\
  \ API。NetBeans 使用了此工具，只需点击几下即可生成自包含包。\n\nMaven 用户可以使用 Daniel Zwolenski 创建的 Maven\
  \ 插件。该插件的文档位于\n\n[`zenjava.com/javafx/maven/`](http://zenjava.com/javafx/maven/)，允许使用熟悉的\
  \ Maven 命令创建 JavaFX 自包含包。\n\n现在你已经安装了这些工具，我们将向你展示如何创建一个简单的 JavaFX 程序，然后详细讲解它。我们为你选择的第一个程序叫做“Hello\
  \ Earthrise”，它比典型的入门级“Hello World”程序展示了更多功能。\n\n开发你的第一个 JavaFX 程序：Hello Earthrise\n\
