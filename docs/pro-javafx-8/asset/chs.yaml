  \nstage.titleProperty().bind(title);\n\nstage.initStyle(stageStyle);\n\n}\n\n@FXML\n\
  \npublic void toBackEventHandler(ActionEvent e) {\n\nstage.toBack();\n\n}\n\n@FXML\n\
  \npublic void toFrontEventHandler(ActionEvent e) {\n\nstage.toFront();\n\n}\n\n\
  @FXML\n\npublic void closeEventHandler(ActionEvent e) {\n\nstage.close();\n\n}\n\
  \n@FXML\n\npublic void mousePressedHandler(MouseEvent me) {\n\ndragAnchorX = me.getScreenX()\
  \ - stage.getX();\n\ndragAnchorY = me.getScreenY() - stage.getY();\n\n}\n\n@FXML\n\
  \npublic void mouseDraggedHandler(MouseEvent me) {\n\nstage.setX(me.getScreenX()\
  \ - dragAnchorX);\n\nstage.setY(me.getScreenY() - dragAnchorY);\n\n}\n\n}\n\n该类是从第\
  \ 2 章的`StageCoachMain`类中提取出来的，并且是我们为 FXML 文件`StageCoach.fxml`指定的控制器类。实际上，它包含了与 FXML\
  \ 文件中`fx:ids`匹配的类型和名称的字段。它还包含了名称和签名与 FXML 文件中各个节点的事件处理程序相匹配的方法。\n\n唯一需要解释的是`@FXML`注解。它属于`javafx.fxml`包。这是一个标记注解，具有运行时保留策略，可以应用于字段和方法。当应用于字段时，`@FXML`注解告诉\
  \ JavaFX SceneBuilder，该字段的名称可以用作 FXML 文件中适当类型元素的`fx:id`。当应用于方法时，`@FXML`注解告诉 JavaFX\
  \ SceneBuilder，该方法的名称可以用作适当类型事件处理程序属性的值。无论修饰符如何，使用`@FXML`注解的字段和方法都对 FXML 加载机制可访问。因此，将所有`@FXML`注解的字段从`public`改为`private`是安全的，不会对\
  \ FXML 加载过程产生不利影响。\n\n`StageCoachController`类包含了与 FXML 文件中声明的所有`fx:ids`相匹配的字段。它还包含了\
  \ FXML 文件中事件处理程序属性所指向的五个事件处理方法。所有这些字段和方法都使用了`@FXML`注解。\n\n`StageCoachController`还包含了一些未使用`@FXML`注解的字段和方法。这些字段和方法存在于类中是为了其他目的。例如，`stage`字段、`setStage()`和`setupBindings()`方法直接在\
