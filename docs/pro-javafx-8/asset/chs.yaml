  \n■ **注意** JavaFX SceneBuilder 生成的 FXML 文件行较长。我们对 FXML 文件进行了重新格式化，以适配本书页面。\n\n该\
  \ FXML 文件的大部分内容可以直观理解：它表示一个包含两个子节点（一个 Rectangle 和一个 VBox）的 Group。VBox 又包含五个 Text\
  \ 节点、两个 CheckBox、一个 HBox 和三个 Button。HBox 包含一个 Label 和一个 TextField。这些节点的各种属性被设置为合理的值；例如，三个\
  \ Button 的文本分别设置为\"toBack()\"、\"toFront()\"和\"close()\"。\n\n该 FXML 文件中的某些结构需要稍作解释。文件顶部的\
  \ XML 处理指令\n\n<?import javafx.scene.control.Button?>\n\n<?import javafx.scene.control.CheckBox?>\n\
  \n<?import javafx.scene.control.Label?>\n\n<?import javafx.scene.control.TextField?>\n\
  \n<?import javafx.scene.Group?>\n\n<?import javafx.scene.layout.HBox?>\n\n<?import\
  \ javafx.scene.layout.VBox?>\n\n<?import javafx.scene.shape.Rectangle?>\n\n<?import\
  \ javafx.scene.text.Text?>\n\n告知该文件的消费者（设计时的 JavaFX SceneBuilder 或运行时的 FXMLLoader）导入所提及的\
  \ Java 类。这些指令与 Java 源文件中的 import 指令具有相同效果。\n\n顶层元素 Group 提供了两个命名空间声明。JavaFX SceneBuilder\
  \ 会将这些命名空间放入其创建的每个 FXML 文件中：\n\nxmlns:fx=\" [`javafx.com/fxml/1\"`](http://javafx.com/fxml/1)\n\
  \n**警告**\n\n■\n\nFXML 文件不会针对任何 XML 模式进行验证。此处指定的命名空间由 FXMLLoader、JavaFX SceneBuilder\
  \ 以及 NetBeans、Eclipse 和 IntelliJ IDEA 等 Java IDE 使用，以便在编辑 FXML 文件时提供辅助。实际的前缀（第一个命名空间为空字符串，第二个命名空间为“fx”）不应更改。\n\
  \n此 FXML 文件包含两种带有 fx 前缀的属性：fx:controller 和 fx:id。fx:controller 属性出现在顶层元素 Group 上。它告知\
  \ JavaFX 运行时，当前 FXML 文件中设计的 UI 旨在与一个称为其*控制器*的 Java 类协同工作：\n\nfx:controller=\"projavafx.stagecoach.ui.StageCoachController\"\
  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 ■ 使用 SceneBuilder\
  \ 创建用户界面\n\n上述属性声明 StageCoach.fxml 将与 Java 类 projavafx.stagecoach.ui.StageCoachController\
  \ 协同工作。fx:id 属性可以出现在每个表示 JavaFX 节点的元素中。fx:id 的值是控制器中代表该节点（在 FXML 文件加载后）的字段名称。StageCoach.fxml\
  \ 文件声明了以下 fx:id（仅显示包含 fx:id 属性的行）：\n\n<Group fx:id=\"rootGroup\"\n\n<Rectangle fx:id=\"\
  blue\"\n\n<VBox fx:id=\"contentBox\"\n\n<Text fx:id=\"textStageX\"\n\n<Text fx:id=\"\
  textStageY\"\n\n<Text fx:id=\"textStageH\"\n\n<Text fx:id=\"textStageW\"\n\n<Text\
  \ fx:id=\"textStageF\"\n\n<CheckBox fx:id=\"checkBoxResizable\"\n\n<CheckBox fx:id=\"\
  checkBoxFullScreen\"\n\n<HBox fx:id=\"titleBox\">\n\n<Label fx:id=\"titleLabel\"\
  \n\n<TextField fx:id=\"titleTextField\"\n\n<Button fx:id=\"toBackButton\"\n\n<Button\
  \ fx:id=\"toFrontButton\"\n\n<Button fx:id=\"closeButton\"\n\n因此，在 FXMLLoader 完成加载\
  \ FXML 文件后，FXML 文件中的顶层 Group 节点可以在 Java 代码中作为 StageCoachController 类的 rootGroup\
  \ 字段进行访问和操作。在此 FXML 文件中，我们为创建的所有节点都分配了 fx:id。这仅用于说明目的。如果没有理由以编程方式操作某个节点（例如静态标签的情况），则可以省略\
  \ fx:id 属性以及控制器中对应的字段。\n\n为 FXML 文件中的节点提供编程访问是控制器扮演的角色之一。控制器扮演的另一个角色是提供处理来自 FXML\
  \ 文件中节点的用户输入和交互事件的方法。这些事件处理器由名称以“on”开头的属性指定，例如 onMouseDragged、onMousePressed 和 onAction。它们对应于\
  \ Node 类或其子类中的 setOnMouseDragged()、setOnMousePressed()和 setOnAction()方法。要将事件处理器设置为控制器中的方法，请使用以“#”字符开头的方法名称作为\
  \ onMouseDragged、onMousePressed 和 onAction 属性的值。StageCoach.fxml 文件声明了以下事件处理器（仅显示包含事件处理器的行）：\n\
  \n<Group fx:id=\"rootGroup\"\n\nonMouseDragged=\"#mouseDraggedHandler\"\n\nonMousePressed=\"\
  #mousePressedHandler\"\n\n<Button fx:id=\"toBackButton\"\n\nonAction=\"#toBackEventHandler\"\
  \n\n<Button fx:id=\"toFrontButton\"\n\nonAction=\"#toFrontEventHandler\"\n\n<Button\
  \ fx:id=\"closeButton\"\n\nonAction=\"#closeEventHandler\"\n\n控制器类中的事件处理方法通常应符合\
  \ EventHandler<T>接口中单一方法的签名\n\nvoid handle(T event)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 3 章 ■ 使用 SceneBuilder 创建用户界面\n\n其中 T 是适当的事件对象，对于 onMouseDragged 和 onMousePressed\
  \ 事件处理器为 MouseEvent，对于 onAction 事件处理器为 ActionEvent。不接受任何参数的方法也可以设置为事件处理方法。如果您不打算使用事件对象，则可以使用此类方法。\n\
  \n现在我们已经理解了 FXML 文件，接下来将介绍控制器类。\n\n理解控制器\n\n清单 3-2 显示了与我们在上一小节中创建的 FXML 文件协同工作的控制器类。\n\
  \n***清单 3-2.*** StageCoachController.java\n\npackage projavafx.stagecoach.ui;\n\n\
  import javafx.beans.property.SimpleStringProperty;\n\nimport javafx.beans.property.StringProperty;\n\
