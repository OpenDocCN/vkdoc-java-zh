  *知之为知之，不知为不知，是知也。*\n\n——孔子\n\n在经历了第 5 章对 JavaFX 布局和第 6 章对 JavaFX UI 控件的快速探索之后，本章我们将重新聚焦于\
  \ JavaFX 的一些底层设施。\n\n回顾一下，在第 4 章中你学习了 `Observable` 接口及其子接口之一 `ObservableValue`。在本章中，我们将研究\
  \ `Observable` 的其他四个子接口——`ObservableList`、`ObservableMap`、`ObservableSet` 和 `ObservableArray`，从而完整讲述\
  \ `Observable` 接口和类家族的故事。\n\n接着，我们将介绍 JavaFX 中的并发。我们会解释 JavaFX 的线程模型，指出 JavaFX 应用程序中最重要的线程。我们将探讨你必须遵循的规则，以确保你的\
  \ JavaFX 应用程序能够响应用户输入，并且不会因执行时间过长的事件处理程序而卡死。我们还将展示如何使用 `javafx.concurrent` 框架将长时间运行的任务卸载到后台线程。\n\
  \n在本章的最后，我们将通过示例展示如何利用 `JFXPanel` 将 JavaFX 场景图嵌入到 Swing 应用程序中，如何利用 `FXCanvas` 将其嵌入到\
  \ SWT 应用程序中，同时关注如何使 JavaFX 事件线程与 Swing 事件分发线程良好协作，以及如何利用 `SwingNode` 将 Swing 组件嵌入到\
  \ JavaFX 场景中。\n\n理解 Observable 集合与数组\n\n正如我们在第 4 章中所见，`Observable` 接口有五个直接子接口——`ObservableValue`\
  \ 接口、`ObservableList` 接口、`ObservableMap` 接口、`ObservableSet` 接口和 `ObservableArray`\
  \ 接口。\n\n我们了解到，`ObservableValue` 接口在 JavaFX 属性和绑定框架中扮演着核心角色。\n\n\n\n`ObservableList`、`ObservableMap`、`ObservableSet`\
  \ 和 `ObservableArray` 接口位于 `javafx.collections` 包中，统称为 JavaFX 可观察集合与数组。除了扩展 `Observable`\
  \ 接口外，`ObservableList`、`ObservableMap` 和 `ObservableSet` 还分别扩展了 `java.util.List`、`java.util.Map`\
  \ 和 `java.util.Set` 接口，这使得它们在 Java 集合框架中成为真正的集合。你可以对这些接口的对象调用所有熟悉的 Java 集合框架方法，并期望得到完全相同的结果。JavaFX\
  \ 可观察集合与数组在标准 Java 集合框架基础上提供的额外功能，是向已注册的监听器发送通知。由于它们是可观察对象，你可以向 JavaFX 可观察集合与数组对象注册\
  \ `InvalidationListener`，并在可观察集合与数组的内容失效时收到通知。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图片 97](img/index-274_1.png)\n\n第 7 章 ■ 集合与并发\n\n每个 JavaFX 可观察集合与数组接口都支持一个变更事件，该事件会传达更详细的变更信息。我们将在以下章节中探讨\
  \ JavaFX 可观察集合与数组及其支持的变更事件。\n\n理解 ObservableList\n\n图 7-1 是一个 UML 图，展示了 `ObservableList`\
  \ 及其支持接口。\n\n***图 7-1.** 支持 JavaFX 可观察列表的关键接口*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 集合与并发\n\n为避免杂乱，我们在图 7-1 中省略了 `java.util.List` 接口。`java.util.List` 接口是\
  \ `ObservableList` 的另一个父接口。`ObservableList` 接口上的以下两个方法允许你注册和注销 `ListChangeListener`：\n\
  \n• `addListener(ListChangeListener<? super E> listener)`\n\n• `removeListener(ListChangeListener<?\
  \ super E> listener)`\n\n`ObservableList` 上的以下额外方法使该接口更易于使用：\n\n• `addAll(E... elements)`\n\
  \n• `setAll(E... elements)`\n\n• `setAll(Collection<? extends E> col)`\n\n• `removeAll(E...\
  \ elements)`\n\n• `retainAll(E... elements)`\n\n• `remove(int from, int to)`\n\n\
  • `filtered(Predicate<E>)`\n\n• `sorted(Comparator<E>)`\n\n• `sorted()`\n\n`filtered()`\
  \ 方法和两个 `sorted()` 方法返回一个包装了 `ObservableList` 的 `FilteredList` 或 `SortedList`。当原始\
  \ `ObservableList` 发生变化时，包装后的 `FilteredList` 和 `SortedList` 会反映这些变化。\n\n`ListChangeListener`\
  \ 接口只有一个方法：`onChange(ListChangeListener.Change<? extends E> change)`。当 `ObservableList`\
  \ 的内容被操作时，此方法会被回调。请注意，此方法的参数类型是 `ListChangeListener` 接口中声明的嵌套类 `Change`。我们将在下一小节中向你展示如何使用\
  \ `ListChangeListener.Change` 类。现在，我们先看一个简单的示例（清单 7-1），该示例演示了在操作 `ObservableList`\
  \ 时，失效事件和列表变更事件的触发过程。\n\n***清单 7-1.*** ObservableListExample.java\n\n```java\nimport\
  \ javafx.beans.Observable;\nimport javafx.collections.FXCollections;\nimport javafx.collections.ObservableList;\n\
  import java.util.Arrays;\nimport java.util.Iterator;\nimport java.util.List;\nimport\
  \ static javafx.collections.ListChangeListener.Change;\n\npublic class ObservableListExample\
  \ {\n    public static void main(String[] args) {\n        ObservableList<String>\
  \ strings = FXCollections.observableArrayList();\n        strings.addListener((Observable\
  \ observable) -> {\n            System.out.println(\"\\tlist invalidated\");\n \
  \       });\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 ■\
  \ 集合与并发\n\n```java\n        strings.addListener((Change<? extends String> change)\
  \ -> {\n            System.out.println(\"\\tstrings = \" + change.getList());\n\
  \        });\n        System.out.println(\"Calling add(\\\"First\\\"): \");\n  \
  \      strings.add(\"First\");\n```\n\n\n\nSystem.out.println(\"Calling add(0, \\\
  \"Zeroth\\\"): \");\n\nstrings.add(0, \"Zeroth\");\n\nSystem.out.println(\"Calling\
  \ addAll(\\\"Second\\\", \\\"Third\\\"): \"); strings.addAll(\"Second\", \"Third\"\
  );\n\nSystem.out.println(\"Calling set(1, \\\"New First\\\"): \");\n\nstrings.set(1,\
  \ \"New First\");\n\nfinal List<String> list = Arrays.asList(\"Second_1\", \"Second_2\"\
  ); System.out.println(\"Calling addAll(3, list): \");\n\nstrings.addAll(3, list);\n\
  \nSystem.out.println(\"Calling remove(2, 4): \");\n\nstrings.remove(2, 4);\n\nfinal\
  \ Iterator<String> iterator = strings.iterator();\n\nwhile (iterator.hasNext())\
  \ {\n\nfinal String next = iterator.next();\n\nif (next.contains(\"t\")) {\n\nSystem.out.println(\"\
  Calling remove() on iterator: \");\n\niterator.remove();\n\n}\n\n}\n\nSystem.out.println(\"\
  Calling removeAll(\\\"Third\\\", \\\"Fourth\\\"): \"); strings.removeAll(\"Third\"\
  , \"Fourth\");\n\n}\n\n}\n\n与 Java 集合框架不同（其公共 API 既包含 `List`、`Map` 和 `Set` 等接口，也包含可实例化的具体实现类，如\
  \ `ArrayList`、`HashMap` 和 `HashSet`），JavaFX 可观察集合框架仅提供 `ObservableList`、`ObservableMap`、`ObservableSet`\
  \ 和 `ObservableArray` 接口，而不提供具体实现类。要获取 JavaFX 可观察集合和数组接口的对象，需要使用工具类 `FXCollections`。在清单\
  \ 7-1 中，我们通过调用 `FXCollections` 上的工厂方法获取了一个 `ObservableList<String>` 对象：\n\nObservableList<String>\
  \ strings = FXCollections.observableArrayList();\n\n然后，我们向该可观察列表挂载了一个 `InvalidationListener`\
  \ 和一个 `ListChangeListener`。由于这两个监听器都只有一个参数的方法，并且通过 `addListener()` 添加，因此我们必须在 lambda\
  \ 表达式中指定参数类型。失效监听器在每次被调用时仅打印一条消息。列表变更监听器则打印可观察列表的内容。程序的其余部分通过多种方式操作可观察列表的内容：调用 `java.util.List`\
  \ 接口的方法、调用 `ObservableList` 新增的一些便捷方法，以及调用从可观察列表获取的 `Iterator` 上的 `remove()` 方法。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 ■ 集合与并发\n\n运行清单 7-1\
  \ 中的程序时，控制台会输出以下内容：\n\nCalling add(\"First\"):\n\nlist invalidated\n\nstrings =\
  \ [First]\n\nCalling add(0, \"Zeroth\"):\n\nlist invalidated\n\nstrings = [Zeroth,\
  \ First]\n\nCalling addAll(\"Second\", \"Third\"):\n\nlist invalidated\n\nstrings\
  \ = [Zeroth, First, Second, Third]\n\nCalling set(1, \"New First\"):\n\nlist invalidated\n\
  \nstrings = [Zeroth, New First, Second, Third]\n\nCalling addAll(3, list):\n\nlist\
  \ invalidated\n\nstrings = [Zeroth, New First, Second, Second_1, Second_2, Third]\n\
  \nCalling remove(2, 4):\n\nlist invalidated\n\nstrings = [Zeroth, New First, Second_2,\
  \ Third]\n\nCalling remove() on iterator:\n\nlist invalidated\n\nstrings = [New\
  \ First, Second_2, Third]\n\nCalling remove() on iterator:\n\nlist invalidated\n\
  \nstrings = [Second_2, Third]\n\nCalling removeAll(\"Third\", \"Fourth\"):\n\nlist\
  \ invalidated\n\nstrings = [Second_2]\n\n确实，代码中每次更改可观察列表内容的调用，都会触发失效监听器和列表变更监听器的回调。\n\
  \n如果某个失效监听器或列表变更监听器的实例已作为监听器添加到可观察列表中，那么后续所有以该实例为参数的 `addListener()` 调用都将被忽略。当然，你可以根据需要向一个可观察列表添加任意多个不同的失效监听器和列表变更监听器。\n\
  \n处理 ListChangeListener 中的变更事件\n\n在本节中，我们将更深入地研究 `ListChangeListener.Change` 类，并讨论\
  \ `onChange()` 回调方法应如何处理列表变更事件。\n\n正如我们在上一节中看到的，对于通过调用 `FXCollections` 获取的 `ObservableList`\
  \ 而言……\n\n\n\n`observableArrayList()`的每个修改器调用——即每次调用改变可观察列表内容的单个方法——都会生成一个列表变更事件，并传递给每个已注册的观察者。该事件对象是实现了`ListChangeListener.Change`接口的类的实例，可视为代表一个或多个离散变更，每个变更属于以下四种类型之一：添加元素、移除元素、替换元素或重排元素。`ListChangeListener.Change`类提供了以下方法，使您能够获取关于变更的详细信息：\n\
  \n• `boolean next()`\n\n• `void reset()`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 集合与并发\n\n• `boolean wasAdded()`\n\n• `boolean wasRemoved()`\n\n• `boolean\
  \ wasReplaced()`\n\n• `boolean wasPermutated()`\n\n• `int getFrom()`\n\n• `int getTo()`\n\
  \n• `int getAddedSize()`\n\n• `List<E> getAddedSublist()`\n\n• `int getRemovedSize()`\n\
  \n• `List<E> getRemoved()`\n\n• `int getPermutation(int i)`\n\n• `ObservableList<E>\
  \ getList()`\n\n`next()`和`reset()`方法控制一个游标，用于遍历事件对象中的所有离散变更。进入`ListChangeListener`的`onChange()`方法时，游标位于第一个离散变更之前。您必须调用`next()`方法将游标移动到第一个离散变更。后续对`next()`方法的调用会将游标移动到剩余的离散变更。如果到达下一个离散变更，返回值将为`true`。如果游标已在最后一个离散变更上，返回值将为`false`。一旦游标定位到有效的离散变更，即可调用`wasAdded()`、`wasRemoved()`、`wasReplaced()`和`wasPermutated()`方法来确定该离散变更的类型。\n\
  \n■ **注意** `wasAdded()`、`wasRemoved()`、`wasReplaced()`和`wasPermutated()`方法并非正交。\n\
  \n只有当离散变更同时涉及添加和移除时，它才属于替换。因此，判断离散变更类型的正确顺序是：首先确定它是重排还是替换，然后再确定它是添加还是移除。\n\n确定离散变更的类型后，您可以调用其他方法来获取更多信息。对于添加操作，`getFrom()`方法返回新元素在可观察列表中的起始索引；`getTo()`方法返回添加元素末尾之后一个位置的索引；`getAddedSize()`方法返回添加的元素数量；`getAddedSublist()`方法返回包含添加元素的`List<E>`。对于移除操作，`getFrom()`和`getTo()`方法都返回元素在可观察列表中被移除的索引；`getRemovedSize()`方法返回被移除的元素数量；`getRemoved()`方法返回包含被移除元素的`List<E>`。\n\
  \n对于替换操作，应同时检查与添加和移除相关的方法，因为替换可视为在同一索引处先移除后添加。\n\n对于重排操作，`getPermutation(int i)`方法返回重排后元素在可观察列表中的索引，该元素在重排前的索引为`i`。在所有情况下，`getList()`方法始终返回底层的可观察列表。\n\
  \n在清单 7-2 所示的示例中，我们在将`ListChangeListener`附加到`ObservableList`后执行了各种列表操作。`ListChangeListener`的实现（名为`MyListener`）包含一个用于`ListChangeListener.Change`对象的格式化输出器，并在事件触发时打印列表变更事件对象。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 ■ 集合与并发\n\n***清单 7-2.***\
  \ ListChangeEventExample.java\n\nimport javafx.collections.FXCollections;\n\nimport\
  \ javafx.collections.ListChangeListener;\n\nimport javafx.collections.ObservableList;\n\
  \n\n\npublic class ListChangeEventExample {\n\npublic static void main(String[]\
