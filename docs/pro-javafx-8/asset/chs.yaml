  \ 在本节中，我们涉及了 FXML 设计时和运行时工具的各个方面。然而，我们仅描述了每个工具的部分内容，刚好足以让我们的示例程序运行起来。在本章的剩余部分，我们将详细研究每个工具。\n\
  \n理解 FXML 加载工具\n\nFXML 文件加载工具由两个类、一个接口、一个异常以及 `javafx.fxml` 包中的一个注解组成。`FXMLLoader`\
  \ 是承担大部分工作的类，例如读取和解析 FXML 文件、识别 FXML 文件中的处理指令并做出必要的响应、识别 FXML 文件的每个元素和属性并将对象创建任务委托给一组构建器、在必要时创建控制器对象并将节点和其他对象注入到控制器中。`JavaFXBuilderFactory`\
  \ 负责响应 `FXMLLoader` 对特定类构建器的请求来创建构建器。`Initializable` 接口可以由控制器类实现，以便像早期版本的 JavaFX\
  \ 那样从 `FXMLLoader` 接收信息；然而，此功能已被注入方法取代，因此我们不再讨论它。如果 FXML 文件包含导致 `FXMLLoader` 无法构造\
  \ FXML 文件中指定的所有对象的错误，则会抛出 `LoadException`。`@FXML` 注解可用于控制器类，以将某些字段标记为注入目标，并将某些方法标记为事件处理程序候选。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 ■ 使用 Scene Builder 创建用户界面\n\
  \n理解 FXMLLoader 类\n\n`FXMLLoader` 类具有以下公共构造函数：\n\n• `FXMLLoader()`\n• `FXMLLoader(URL\
  \ location)`\n• `FXMLLoader(URL location, ResourceBundle resources)`\n• `FXMLLoader(URL\
  \ location, ResourceBundle resources, BuilderFactory builderFactory)`\n• `FXMLLoader(URL\
  \ location, ResourceBundle resources, BuilderFactory builderFactory, Callback<Class<?>,\
  \ Object> controllerFactory)`\n• `FXMLLoader(Charset charset)`\n• `FXMLLoader(URL\
  \ location, ResourceBundle resources, BuilderFactory builderFactory, Callback<Class<?>\
  \ controllerFactory, Object>, Charset charset)`\n• `FXMLLoader(URL location, ResourceBundle\
  \ resources, BuilderFactory builderFactory, Callback<Class<?>, Object> controllerFactory,\
  \ Charset charset, LinkedList<FXMLLoader> loaders)`\n\n参数较少的构造函数会委托给参数较多的构造函数，缺失的参数将用默认值填充。`location`\
  \ 参数是要加载的 FXML 文件的 URL。它默认为 `null`。`resources` 参数是与 FXML 文件一起使用的资源包。如果 FXML 文件中使用了国际化字符串，则此参数是必需的。它默认为\
  \ `null`。`builderFactory` 参数是 `FXMLLoader` 用来获取其创建的各种对象的构建器的构建器工厂。它默认为 `JavaFXBuilderFactory`\
  \ 的一个实例。此构建器工厂了解所有可能出现在 FXML 文件中的标准 JavaFX 类型，因此很少使用自定义的构建器工厂。`controllerFactory`\
  \ 是一个 `javafx.util.CallBack`，当提供控制器类时，它能够返回控制器的一个实例。它默认为 `null`，在这种情况下，`FXMLLoader`\
  \ 将通过反射调用控制器类的无参构造函数来实例化控制器。因此，仅当控制器无法通过这种方式构造时，才需要提供 `controllerFactory`。`charset`\
  \ 在解析 FXML 时使用。它默认为 `UTF-8`。`loaders` 参数是一个 `FXMLLoader` 列表。它默认为一个空列表。\n\n`FXMLLoader`\
  \ 类具有以下用于更改 `FXMLLoader` 状态的 getter 和 setter 方法：\n\n• `URL getLocation()`\n\n\n\n\
  • void setLocation(URL location)\n\n• ResourceBundle getResources()\n\n• void setResources(ResourceBundle\
  \ resources)\n\n• ObservableMap<String, Object> getNamespace()\n\n• <T> T getRoot()\n\
  \n• void setRoot(Object root)\n\n• <T> T getController()\n\n• void setController(Object\
  \ controller)\n\n• BuilderFactory getBuilderFactory()\n\n• void setBuilderFactory(BuilderFactory\
  \ builderFactory)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 ■\
  \ 使用 SceneBuilder 创建用户界面\n\n• Callback<Class<?>, Object> getControllerFactory()\n\
  \n• void setControllerFactory(Callback<Class<?>, Object> controllerFactory)\n\n\
  • Charset getCharset()\n\n• void setCharset(Charset charset)\n\n• ClassLoader getClassLoader()\n\
  \n• void setClassLoader(ClassLoader classLoader)\n\n从该列表中可以看出，location、resources、builderFactory、controllerFactory\
  \ 和 charset 也可以在构造 FXMLLoader 之后进行设置。此外，我们还可以获取和设置 root、controller、classLoader，以及获取\
  \ FXMLLoader 的 namespace。root 仅在 FXML 文件使用 `fx:root` 作为根元素时才相关，在这种情况下，必须在加载 FXML\
  \ 文件之前调用 `setRoot()`。我们将在下一节中更详细地介绍 `fx:root` 的用法。仅当 FXML 文件的顶层元素中不存在 `fx:controller`\
  \ 属性时，才需要在加载 FXML 文件之前设置 controller。classLoader 和 namespace 主要由 FXMLLoader 内部使用，通常不会由用户代码调用。\n\
  \nFXML 文件的实际加载发生在调用某个 `load()` 方法时。FXMLLoader 类具有以下 load 方法：\n\n• <T> T load() throws\
  \ IOException\n\n• <T> T load(InputStream input) throws IOException\n\n• static\
  \ <T> T load(URL location) throws IOException\n\n• static <T> T load(URL location,\
  \ ResourceBundle resources) throws IOException\n\n• static <T> T load(URL location,\
  \ ResourceBundle resources, BuilderFactory builderFactory) throws IOException\n\n\
  • static <T> T load(URL location, ResourceBundle resources, BuilderFactory builderFactory,\
  \ Callback<Class<?>, Object> controllerFactory) throws IOException\n\n• static <T>\
  \ T load(URL location, ResourceBundle resources, BuilderFactory builderFactory,\
  \ Callback<Class<?>, Object> controllerFactory, Charset charset) throws IOException\n\
  \n可以在所有必要字段已初始化的 FXMLLoader 实例上调用不带参数的 `load()` 方法。接受 InputStream 参数的 `load()` 方法将从指定的输入流加载\
  \ FXML。所有静态的 `load()` 方法都是便捷方法，它们会使用提供的参数实例化一个 FXMLLoader，然后调用其非静态的 `load()` 方法之一。\n\
