  \ 加载媒体\n\n如果这个音频播放器要发展成一个相当实用的应用程序，那么仅从预定的 jar 资源或互联网 URL 加载媒体文件就会受到限制。我们支持两种选择内容的方式。首先，我们允许用户使用\
  \ JavaFX FileChooser 从本地文件系统中选择文件。我们还支持将文件或 URL 拖放到音频播放器上。另一个需要注意的问题是应用程序源代码的扩展。它变得过于庞大，无法容纳在单个文件和单个类中。是时候为我们的示例应用程序引入一些架构了。\n\
  \n我们首先将与 Media、其关联元数据以及 MediaPlayer 相关的代码隔离到一个名为 SongModel 的单独类中。这个类将公开一组 JavaFX\
