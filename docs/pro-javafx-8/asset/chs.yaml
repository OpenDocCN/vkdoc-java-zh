  \ 创建**\n\n**用户界面**\n\n*给我一个足够长的杠杆和一个支点，我就能撬动地球。*\n\n——阿基米德\n\n在第 2 章中，你了解了创建 JavaFX\
  \ UI 的两种方式：编程方式和声明方式，以及如何使用 JavaFX API 以编程方式创建 UI。你已经熟悉了 JavaFX UI 的剧场隐喻，其中 Stage\
  \ 代表 Windows、Mac 或 Linux 程序中的窗口，或移动设备中的触摸屏，Scene 及其包含的 Node 代表 UI 的内容。在本章中，我们将探讨\
  \ JavaFX 中 UI 的另一面：UI 的声明式创建。\n\n这种 UI 设计方法的核心是 FXML 文件。它是一种专门为保存 UI 元素信息而设计的 XML\
  \ 文件格式。它包含 UI 元素的“是什么”，但不包含“怎么做”。这就是为什么这种创建 JavaFX UI 的方法被称为*声明式*。FXML 本质上是一种 Java\
  \ 对象序列化格式，可用于任何以特定方式编写的 Java 类，包括所有旧式 JavaBean。然而，在实践中，它仅用于指定 JavaFX UI。\n\n除了在文本编辑器或你喜欢的\
  \ Java 集成开发环境（IDE）中直接编辑外，FXML 文件还可以通过一个名为 JavaFX SceneBuilder 的图形化工具进行操作，该工具专为处理\
  \ FXML 文件而设计。\n\nJavaFX SceneBuilder 1.0 于 2012 年 8 月发布，JavaFX SceneBuilder 1.1\
  \ 于 2013 年 9 月发布。1.0 和 1.1 版本均适用于 JavaFX 2。JavaFX SceneBuilder 2.0 于 2014 年 5 月发布，适用于\
  \ JavaFX 8。JavaFX SceneBuilder 2.0 的代码库已作为开源发布。JavaFX SceneBuilder 是一个完全图形化的工具，允许你从可用的容器、控件和其他可视化节点的调色板中绘制\
  \ UI 屏幕，并通过直接在屏幕上操作以及通过属性编辑器修改其属性来进行布局。\n\nFXML 文件由 JavaFX 运行时使用 FXMLLoader 类加载到\
  \ JavaFX 应用程序中。加载 FXML 文件的结果始终是一个 Java 对象，通常是一个容器 Node，例如 Group 或 Pane。此对象可用作 Scene\
  \ 的根节点，或作为节点附加到更大的编程方式创建的场景图中。对于 JavaFX 应用程序的其他部分，从 FXML 文件加载的节点与编程方式构造的节点没有区别。\n\
  \n我们将以螺旋式递进的方式，介绍关于 FXML 文件的内容和格式、它们在运行时如何加载以及在设计时如何构建这些相互关联的材料。本章首先从一个完整的示例开始，展示第\
  \ 2 章中清单 2-1 的 StageCoach 程序如何使用 FXML 实现。然后，我们将详细介绍 FXML 加载机制。接着，我们将展示一系列手工制作的 FXML\
  \ 文件，以突出 FXML 文件格式的所有特性。一旦你理解了 FXML 文件格式，我们将向你展示如何使用 JavaFX SceneBuilder 创建这些 FXML\
  \ 文件，涵盖 JavaFX SceneBuilder 2.0 的所有功能。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 37](img/index-84_1.jpg)\n\n第 3 章 ■ 使用 SceneBuilder 创建用户界面\n\n■ **注意**\
  \ 你需要从 [`www.oracle.com/technetwork/java/javase/downloads/javafxscenebuilder-info-2157684.html`](http://www.oracle.com/technetwork/java/javase/downloads/javafxscenebuilder-info-2157684.html)\
  \ 下载并安装 Oracle 的开源 JavaFX SceneBuilder 2.0，才能完成本章中的示例。我们还强烈建议你配置你喜欢的 IDE 以使用 JavaFX\
  \ SceneBuilder 2.0 来编辑 FXML 文件。NetBeans 和 IntelliJ IDEA 已捆绑了 JavaFX 支持。Eclipse 用户可以安装\
  \ e(fx)clipse 插件。\n\n\n\n配置完成后，你可以在 IDE 中右键点击项目中的任意 fXML 文件，然后选择“使用 SceneBuilder\
  \ 编辑”上下文菜单项。当然，你也可以使用 IDE 的 XML 文件编辑功能，将 fXML 文件作为 XML 文件进行编辑。\n\n使用 FXML 设置舞台\n\
  \n将第 2 章中的 StageCoach 程序从使用程序化创建的 UI 转换为使用声明式创建的 UI 的过程非常直接。\n\n使用 JavaFX SceneBuilder\
  \ 以图形方式创建用户界面\n\n我们首先使用 JavaFX SceneBuilder 创建了一个 FXML 文件，该文件代表了场景的根节点。图 3-1 展示了此\
  \ UI 正在创建时的截图。\n\n***图 3-1.** 在 JavaFX SceneBuilder 中创建的 StageCoach.fxml*\n\n我们将在本章后半部分详细介绍如何使用\
  \ JavaFX SceneBuilder。现在，只需观察该工具的主要功能区域。中间是内容面板，显示了正在处理的 UI 的外观。左侧上方是库面板，其中包含了所有可以在内容面板中使用的节点，并整齐地划分为容器、控件、形状、图表等子集；下方是文档面板，它以树形结构显示了内容面板中正在处理的场景图，该结构称为层次结构，以及为\
  \ UI 中各种控件提供事件处理代码的控制器。右侧是检查器区域，它包含多个子区域，允许你操作当前选中控件的属性、布局和代码连接。\n\n理解 FXML 文件\n\
  \n清单 3-1 显示了 JavaFX SceneBuilder 根据我们创建的 UI 保存的 FXML 文件。\n\n***清单 3-1.*** StageCoach.fxml\n\
