  \n第 4 章 ■ 属性和绑定\n\nnameProperty.fireValueChangedEvent();\n\nSystem.out.println(\"\
  nameProperty.get() = \" + nameProperty.get());\n\nSystem.out.println(\"在 JavaFX\
  \ 属性上设置值\");\n\nnameProperty.set(\"Johan Vos\");\n\nSystem.out.println(\"person.getName()\
  \ = \" + person.getName());\n\n}\n\nprivate static void adaptBoundProperty() throws\
  \ NoSuchMethodException {\n\nSystem.out.println();\n\nPerson person = new Person();\n\
  \nJavaBeanStringProperty addressProperty = JavaBeanStringPropertyBuilder.create()\n\
  \n.bean(person)\n\n.name(\"address\")\n\n.build();\n\naddressProperty.addListener((observable,\
  \ oldValue, newValue) -> {\n\nSystem.out.println(\"JavaFX 属性 \" + observable + \"\
  \ 已更改：\");\n\nSystem.out.println(\"\\t 旧值 = \" + oldValue + \"，新值 = \" + newValue);\n\
  \n});\n\nSystem.out.println(\"在 JavaBeans 属性上设置地址\");\n\nperson.setAddress(\"12345\
  \ main Street\");\n\n}\n\nprivate static void adaptConstrainedProperty() throws\
  \ NoSuchMethodException {\n\nSystem.out.println();\n\nPerson person = new Person();\n\
  \nJavaBeanStringProperty phoneNumberProperty = JavaBeanStringPropertyBuilder.create()\n\
