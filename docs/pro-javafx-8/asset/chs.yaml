  \ 程序* 我们在 Task 的匿名扩展中重写了 scheduled() 和 running() 方法，并在 Model 类中为 succeeded、cancelled\
  \ 和 failed 事件设置了事件处理器。当你操作这些场景时，应该会看到这些事件被记录到控制台。\n\n■ **注意** Task<V> 类定义了单次任务，这些任务执行一次后不再运行。每次运行任务后，你必须重新启动\
  \ WorkerAndTaskExample 程序。\n\n理解 **Service<V>** 抽象类\n\nService<V> 抽象类是 Worker 接口的一个实现，旨在被重用。它通过允许其状态重置为\
  \ Worker.State.READY 来扩展 Worker 的状态模型。Service<V> 抽象类不扩展任何类，并实现了 Worker 和 EventTarget\
  \ 接口。除了 Worker 接口的九个只读属性外，Service<V> 还有一个额外的名为 executor 的 Executor 类型的读写属性。它还具有事件处理器属性和受保护的事件回调方法，就像\
  \ Task 类一样。以下是 Service<V> 其余方法的列表：\n\n• protected abstract Task<V> createTask()\n\
  • public void start()\n• public void reset()\n• public void restart()\n• public\
  \ boolean cancel()\n\nService<V> 的扩展必须重写受保护的抽象方法 createTask() 以生成一个新创建的 Task。start()\
  \ 方法只能在 Service<V> 对象处于 Worker.State.READY 状态时调用。\n\n\n\n状态。它调用 `createTask()` 来获取一个全新的\
  \ `Task`，并向 `executor` 属性请求一个 `Executor`。如果 `executor` 属性未设置，它会自行创建一个 `Executor`。它将\
  \ `Service<V>` 对象的九个 `Worker` 属性绑定到 `Task` 的对应属性上。然后，它将 `Task` 转换为 `Worker.State.SCHEDULED`\
  \ 状态，并在 `Executor` 上执行该 `Task`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 集合与并发\n\n`reset()` 方法只能在 `Service<V>` 的状态不是 `Worker.State.SCHEDULED` 或\
  \ `Worker.State.RUNNING` 时调用。它只是将 `Service<V>` 的九个属性与底层 `Task` 解绑，并将它们的值重置为初始启动值：`state`\
  \ 属性设为 `Worker.State.READY`，其他属性设为 `null` 或 `\"\"` 或 `false` 或 `–1`。\n\n`restart()`\
  \ 方法会取消当前正在执行的 `Task`（如果有的话），然后执行 `reset()`，接着执行 `start()`。`cancel()` 方法会取消当前正在执行的\
  \ `Task`（如果有的话）；否则，它会将 `Service<V>` 转换为 `Worker.State.CANCELLED` 状态。\n\n清单 7-10\
