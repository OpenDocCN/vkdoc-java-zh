  \ 示例的输出*\n\n更改几行代码就会产生看起来非常不同的输出。我们将更详细地介绍所做的更改。首先，我们为图表添加了一个标题。这是通过调用以下代码完成的\n\n\
  pieChart.setTitle(\"Tiobe index\");\n\n我们也可以使用 titleProperty：\n\npieChart.titleProperty().set(\"\
  Tiobe index\");\n\n两种方法都会产生相同的输出。\n\n■ **注意** 后续的修改也可以使用相同的模式完成。我们只记录了使用 setter\
  \ 方法的方式，但很容易将其替换为基于属性的方法。\n\n修改后示例中的下一行代码更改了图例的位置：\n\npieChart.setLegendSide(Side.LEFT);\n\
  \n当未指定 legendSide 时，图例会显示在默认位置，即图表下方。title 和 legendSide 都是属于抽象 Chart 类的属性。因此，它们可以在任何图表上设置。修改后示例中的下一行代码修改了\
  \ PieChart 特有的属性：pieChart.setClockwise(false);\n\n\n\n默认情况下，饼图中的扇区按顺时针方向渲染。将此属性设置为\
  \ false 后，扇区将按逆时针方向渲染。我们还禁用了饼图中标签的显示。标签仍会显示在图例中，但不再指向各个扇区。这是通过以下代码行实现的：`pieChart.setLabelsVisible(false);`\n\
