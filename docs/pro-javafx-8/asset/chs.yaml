  \n});\n\nSystem.out.println(\"在 JavaBeans 属性上设置电话号码\");\n\ntry {\n\nperson.setPhoneNumber(\"\
  800-555-1212\");\n\n} catch (PropertyVetoException e) {\n\nSystem.out.println(\"\
  JavaBeans 属性更改被否决。\");\n\n}\n\nSystem.out.println(\"将 phoneNumberProperty 绑定到另一个属性\"\
  );\n\nSimpleStringProperty stringProperty = new SimpleStringProperty(\"866-555-1212\"\
  );\n\nphoneNumberProperty.bind(stringProperty);\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 ■ 属性和绑定\n\nSystem.out.println(\"在 JavaBeans 属性上设置电话号码\");\n\ntry {\n\nperson.setPhoneNumber(\"\
  888-555-1212\");\n\n} catch (PropertyVetoException e) {\n\nSystem.out.println(\"\
  JavaBeans 属性更改被否决。\");\n\n}\n\nSystem.out.println(\"person.getPhoneNumber() = \"\
  \ + person.getPhoneNumber());\n\n}\n\n}\n\n在 `adaptJavaBeanProperty()` 方法中，我们实例化了一个\
  \ `Person` bean，并将其 `name` JavaBeans 属性适配为 JavaFX 的 `JavaBeanStringProperty`。为了帮助您理解\
  \ `ChangeEvent` 何时传递给 `nameProperty`，我们为其添加了一个 `ChangeListener`（以 lambda 表达式的形式）。由于\
  \ `name` 不是绑定属性，当我们调用 `person.setName()` 时，`nameProperty` 不会感知到这一更改。为了通知 `nameProperty`\
  \ 该更改，我们调用了它的 `fireValueChangedEvent()` 方法。当我们调用 `nameProperty.get()` 时，会获取到我们在\
  \ person bean 上设置的名称。反之，在调用 `nameProperty.set()` 之后，调用 `person.getName()` 将返回我们在\
  \ `nameProperty` 上设置的值。\n\n在 `adaptBoundProperty()` 方法中，我们实例化了一个 `Person` bean，并将其\
  \ `address` JavaBeans 属性适配为 JavaFX 的 `JavaBeanStringProperty`。为了帮助您理解 `ChangeEvent`\
  \ 何时传递给 `addressProperty`，我们为其添加了一个 `ChangeListener`（以 lambda 表达式的形式）。由于 `address`\
  \ 是一个绑定属性，`addressProperty` 被注册为 person bean 的 `PropertyChangeListener`；因此，当我们调用\
  \ `person.setAddress()` 时，`addressProperty` 会立即收到通知，无需我们调用 `fireValuechangedEvent()`\
  \ 方法。\n\n\n\n在 `adaptConstrainedProperty()` 方法中，我们实例化了一个 `Person` bean，并将其 `phoneNumber`\
  \ JavaBeans 属性适配为 `JavaBeanStringProperty`。我们再次为其添加了一个 `ChangeListener`。由于 `phoneNumber`\
  \ 是一个约束属性，`phoneNumberProperty` 能够否决对 `person.setPhoneNumber()` 的调用。当这种情况发生时，`person.setPhoneNumber()`\
  \ 调用会抛出一个 `PropertyVetoException`。如果 `phoneNumberProperty` 本身绑定到了另一个 JavaFX 属性，它就会否决此类更改。我们调用了两次\
  \ `person.setPhoneNumber()`：第一次是在将 `phoneNumberProperty` 绑定到另一个 JavaFX 属性之前，第二次是在绑定之后。第一次调用成功更改了\
  \ `phoneNumberProperty` 的值，而第二次调用则抛出了 `PropertyVetoException`。\n\n当我们运行清单 4-17 中的程序时，控制台会打印以下输出：\n\
