  \nabbreviations={MO=Missouri, FL=Florida, NY=New York, CA=California}}\n\n理解默认属性和静态属性\n\
  \n许多 JavaFX 类都有一个默认属性。*默认属性* 通过在类上使用 `@DefaultProperty` 注解来指定。`@DefaultProperty`\
  \ 注解属于 `javafx.beans` 包。例如，`javafx.scene.Group` 类的默认属性是其 `children` 属性。在 FXML 文件中，当通过子元素指定默认属性时，可以省略默认属性本身的开始和结束标签。例如，您在清单\
  \ 3-1 中看到的以下代码片段：\n\n<HBox fx:id=\"titleBox\">\n\n<children>\n\n<Label fx:id=\"\
  titleLabel\"\n\ntext=\"title\"/>\n\n<TextField fx:id=\"titleTextField\"\n\ntext=\"\
  Stage Coach\"/>\n\n</children>\n\n</HBox>\n\n可以简化为：\n\n<HBox fx:id=\"titleBox\"\
  >\n\n<Label fx:id=\"titleLabel\"\n\ntext=\"title\"/>\n\n<TextField fx:id=\"titleTextField\"\
  \n\ntext=\"Stage Coach\"/>\n\n</HBox>\n\n*静态属性* 是一种属性，它不是通过调用对象本身的 setter 方法来设置，而是通过调用另一个类的静态方法，将对象和属性值作为参数传递来设置。许多\
  \ JavaFX 的容器节点都有这样的静态方法。这些方法在将节点添加到容器之前被调用，以影响某些结果。静态属性在 FXML 文件中表示为内部对象（作为第一个参数传递给静态方法的对象）上的属性，其名称包含由点分隔的类名和静态方法名。您可以在清单\
  \ 3-4 中看到一个静态属性的示例：\n\n<WebView fx:id=\"webView\"\n\nprefHeight=\"200.0\"\n\nprefWidth=\"\
  200.0\"\n\nVBox.vgrow=\"ALWAYS\"/>\n\n\n\n这里我们正在将一个 WebView 添加到 VBox 中，而 `VBox.vgrow`\
  \ 属性指示 FXMLLoader 在将 webView 添加到 VBox **之前**，需要调用 `VBox.vgrow(webView, Priority.ALWAYS)`。静态属性除了可以作为属性出现外，还可以作为子元素出现。\n\
  \n理解属性解析与绑定\n\n正如你在本章前面部分所见，对象属性既可以表示为属性，也可以表示为子元素。有时，将属性建模为子元素或属性效果是一样的。然而，FXMLLoader\
  \ 会对属性执行额外的处理，这使得使用属性更具吸引力。在处理属性时，FXMLLoader 会执行三种属性值解析和表达式绑定。\n\n当属性值以“@”字符开头时，FXMLLoader\
  \ 会将该值视为相对于当前文件的位置。这称为*位置解析*。当属性值以“%”字符开头时，FXMLLoader 会将该值视为资源包中的键，并用特定于语言环境的值替换该键。这称为*资源解析*。当属性值以“$”字符开头时，FXMLLoader\
  \ 会将该值视为变量名，并用所引用变量的值替换该属性值。这称为*变量解析*。\n\n当属性值以“${”开头并以“}”结尾时，并且如果该属性代表一个 JavaFX\
  \ 属性，FXMLLoader 会将该值视为绑定表达式，并将 JavaFX 属性绑定到该封闭表达式。这称为*表达式绑定*。你将在第 4 章中了解 JavaFX\
  \ 属性和绑定。现在只需理解，当一个属性绑定到一个表达式时，每次表达式值发生变化，该变化都会反映到属性中。支持的表达式包括字符串字面量、布尔字面量、数字字面量、一元运算符\
  \ –（负号）和 !（非）、算术运算符（+、–、*、/、%）、逻辑运算符（&&、||）以及关系运算符（>、>=、<、<=、==、!=）。\n\n清单 3-14\
  \ 到 3-19 中所示的 ResolutionAndBindingExample 演示了位置解析、资源解析、变量解析以及表达式绑定的使用。\n\n***清单\
