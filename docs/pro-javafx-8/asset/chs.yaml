  \ IncludeExample 程序*\n\n使用 fx:root 创建自定义组件\n\nfx:include 元素允许我们将一个 FXML 文件附加到另一个\
  \ FXML 文件中。类似地，fx:root 元素允许我们将一个 FXML 文件附加到代码中提供的 Node 上。fx:root 元素必须是 FXML 文件中的顶级元素。它必须提供一个\
  \ type 属性，该属性决定了加载此 FXML 文件时需要在代码中创建的 Node 的类型。\n\n在其最简单的形式中，您可以将前面任何一个 FXML 文件的顶级元素从\n\
  \n<SomeType ...\n\n更改为\n\n<fx:root type=\"some.package.SomeType\" ...\n\n并在代码中实例化\
  \ SomeType，然后在加载 FXML 文件之前将其设置为 FXMLLoader 中的根节点，如下所示：\n\n\n\n`SomeType someType\
  \ = new SomeType();`\n\n`fxmlLoader.setRoot(someType);`\n\n`fxmlLoader.load();`\n\
  \n下一个示例更进一步。它定义了一个类，该类扩展了 FXML 文件的 `fx:root` 类型，并同时充当 FXML 文件的根节点和控制器。它在构造函数中加载\
  \ FXML 文件，并使用 `initialize()` 方法来设置在 FXML 文件中构建的节点之间所需的关联。然后，这个类可以像原生 JavaFX 节点一样被使用。以这种方式构建的类被称为*自定义组件*。\n\
