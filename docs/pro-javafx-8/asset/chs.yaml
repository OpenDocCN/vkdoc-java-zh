  \n•\n\nBooleanBinding isNotNull()\n\n借助这些方法，你可以从某个属性开始，调用适用于该属性类型的方法来获取一个绑定，再调用适用于该绑定类型的方法来获取另一个绑定，以此类推，从而创建出无限多样的绑定。这里值得指出的一点是，所有针对特定类型数值表达式的方法都在\
  \ `NumberExpression` 基础接口中定义，返回类型为 `NumberBinding`，并在特定类型的表达式类中进行了重写，参数签名相同但返回类型更具体。这种在子类中以相同参数签名但更具体返回类型重写方法的方式被称为*协变返回类型重写*，自\
  \ Java 5 以来一直是 Java 语言的一个特性。这一事实带来的一个结果是，使用流畅接口 API 构建的数值绑定，其类型比使用 `Bindings` 类中的工厂方法构建的绑定更为具体。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 4 章 ■ 属性和绑定\n\n\n\n有时需要将特定类型的表达式转换为持有相同类型值的对象表达式。这可以通过特定类型表达式类中的\
  \ `asObject()` 方法实现。反向转换则可以使用表达式类中的静态方法完成。对于 `IntegerExpression`，这些静态方法包括：\n\n`static\
  \ IntegerExpression integerExpression(ObservableIntegerValue value)`\n\n`static\
  \ <T extends java.lang.Number> IntegerExpression integerExpression(ObservableValue<T>\
  \ value)`\n\n清单 4-6 中的程序是对清单 4-5 中三角形面积示例的修改，它使用了流式接口 API，而不是调用 `Bindings` 类中的工厂方法。\n\
  \n***清单 4-6.*** TriangleAreaFluentExample.java\n\n```java\nimport javafx.beans.binding.Bindings;\n\
  \nimport javafx.beans.binding.NumberBinding;\n\nimport javafx.beans.binding.StringExpression;\n\
  \nimport javafx.beans.property.IntegerProperty;\n\nimport javafx.beans.property.SimpleIntegerProperty;\n\
  \npublic class TriangleAreaFluentExample {\n\npublic static void main(String[] args)\
  \ {\n\nIntegerProperty x1 = new SimpleIntegerProperty(0);\n\nIntegerProperty y1\
  \ = new SimpleIntegerProperty(0);\n\nIntegerProperty x2 = new SimpleIntegerProperty(0);\n\
  \nIntegerProperty y2 = new SimpleIntegerProperty(0);\n\nIntegerProperty x3 = new\
  \ SimpleIntegerProperty(0);\n\nIntegerProperty y3 = new SimpleIntegerProperty(0);\n\
  \nfinal NumberBinding area = x1.multiply(y2)\n\n.add(x2.multiply(y3))\n\n.add(x3.multiply(y1))\n\
  \n.subtract(x1.multiply(y3))\n\n.subtract(x2.multiply(y1))\n\n.subtract(x3.multiply(y2))\n\
  \n.divide(2.0D);\n\nStringExpression output = Bindings.format(\n\n\"For A(%d,%d),\
  \ B(%d,%d), C(%d,%d), the area of triangle ABC is %3.1f\",\n\nx1, y1, x2, y2, x3,\
  \ y3, area);\n\nx1.set(0); y1.set(0);\n\nx2.set(6); y2.set(0);\n\nx3.set(4); y3.set(3);\n\
  \nSystem.out.println(output.get());\n\nx1.set(1); y1.set(0);\n\nx2.set(2); y2.set(2);\n\
  \nx3.set(0); y3.set(1);\n\nSystem.out.println(output.get());\n\n}\n\n}\n```\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 4 章 ■ 属性和绑定\n\n请注意，清单 4-5\
  \ 中用于构建面积绑定的 13 行代码和 12 个中间变量，在清单 4-6 中减少为 7 行代码且无需使用中间变量。我们还使用了 `Bindings.format()`\
  \ 方法来构建一个名为 `output` 的 `StringExpression` 对象。`Bindings.format()` 方法有两个重载版本，其签名如下：\n\
  \n`StringExpression format(Locale locale, String format, Object... args)`\n\n`StringExpression\
  \ format(String format, Object... args)`\n\n它们的工作方式与对应的 `String.format()` 方法类似，即根据格式规范\
  \ `format` 以及 `Locale locale`（或默认 `Locale`）来格式化 `args` 的值。如果 `args` 中的任何一个参数是 `ObservableValue`，其变化会反映在\
  \ `StringExpression` 中。\n\n当我们运行清单 4-6 中的程序时，控制台会输出以下内容：\n\n```\nFor A(0,0), B(6,0),\
  \ C(4,3), the area of triangle ABC is 9.0\nFor A(1,0), B(2,2), C(0,1), the area\
  \ of triangle ABC is 1.5\n```\n\n接下来，我们将揭开 `When` 类的神秘面纱，以及它在构建本质上是 if/then/else\
  \ 表达式的绑定时所扮演的角色。`When` 类有一个构造函数，它接受一个 `ObservableBooleanValue` 参数：`public When(ObservableBooleanValue\
  \ b)`\n\n它有以下 11 个重载的 `then()` 方法：\n\n```java\nWhen.NumberConditionBuilder then(ObservableNumberValue\
  \ n)\nWhen.NumberConditionBuilder then(double d)\nWhen.NumberConditionBuilder then(float\
  \ f)\nWhen.NumberConditionBuilder then(long l)\nWhen.NumberConditionBuilder then(int\
  \ i)\nWhen.BooleanConditionBuilder then(ObservableBooleanValue b)\nWhen.BooleanConditionBuilder\
  \ then(boolean b)\nWhen.StringConditionBuilder then(ObservableStringValue str)\n\
  When.StringConditionBuilder then(String str)\nWhen.ObjectConditionBuilder<T> then(ObservableObjectValue<T>\
  \ obj)\nWhen.ObjectConditionBuilder<T> then(T obj)\n```\n\n从 `then()` 方法返回的对象类型取决于参数的类型。如果参数是数值类型（无论是可观察的还是不可观察的），返回类型是嵌套类\
  \ `When.NumberConditionBuilder`。\n\n\n\n类似地，对于布尔型参数，返回类型是 `When.BooleanConditionBuilder`；对于字符串型参数，返回类型是\
  \ `When.StringConditionBuilder`；而对于对象型参数，返回类型是 `When.ObjectConditionBuilder`。\n\n\
  这些条件构建器依次包含以下 `otherwise()` 方法。\n\n• 对于 `When.NumberConditionBuilder`\n\n•\n\n`NumberBinding\
  \ otherwise(ObservableNumberValue n)`\n\n•\n\n`DoubleBinding otherwise(double d)`\n\
  \n•\n\n`NumberBinding otherwise(float f)`\n\n•\n\n`NumberBinding otherwise(long\
  \ l)`\n\n•\n\n`NumberBinding otherwise(int i)`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 ■ 属性和绑定\n\n• 对于 `When.BooleanConditionBuilder`\n\n•\n\n`BooleanBinding otherwise(ObservableBooleanValue\
  \ b)`\n\n•\n\n`BooleanBinding otherwise(boolean b)`\n\n• 对于 `When.StringConditionBuilder`\n\
  \n•\n\n`StringBinding otherwise(ObservableStringValue str)`\n\n•\n\n`StringBinding\
  \ otherwise(String str)`\n\n• 对于 `When.ObjectConditionBuilder`\n\n•\n\n`ObjectBinding<T>\
  \ otherwise(ObservableObjectValue<T> obj)`\n\n•\n\n`ObjectBinding<T> otherwise(T\
  \ obj)`\n\n这些方法签名的最终效果是，你可以构建一个类似于 if/then/else 表达式的绑定，方式如下：\n\n`new When(b).then(x).otherwise(y)`\n\
  \n其中 `b` 是一个 `ObservableBooleanValue`，`x` 和 `y` 是相似类型，并且可以是可观察的或不可观察的。生成的绑定类型将与\
  \ `x` 和 `y` 的类型相似。\n\n清单 4-7 中的程序使用 `When` 类中的流畅接口 API 来计算给定边长 a、b 和 c 的三角形面积。回顾一下，要构成一个三角形，三条边必须满足以下条件：a\
  \ + b > c，b + c > a，c + a > b。\n\n当上述条件满足时，可以使用海伦公式计算三角形面积：面积 = sqrt(s * (s – a)\
  \ * (s – b) * (s – c))\n\n其中 s 是半周长：\n\ns = (a + b + c) / 2。\n\n***清单 4-7.*** HeronsFormulaExample.java\n\
  \n```java\nimport javafx.beans.binding.DoubleBinding;\nimport javafx.beans.binding.When;\n\
  import javafx.beans.property.DoubleProperty;\nimport javafx.beans.property.SimpleDoubleProperty;\n\
  \npublic class HeronsFormulaExample {\n    public static void main(String[] args)\
  \ {\n        DoubleProperty a = new SimpleDoubleProperty(0);\n        DoubleProperty\
  \ b = new SimpleDoubleProperty(0);\n        DoubleProperty c = new SimpleDoubleProperty(0);\n\
  \        DoubleBinding s = a.add(b).add(c).divide(2.0D);\n        final DoubleBinding\
  \ areaSquared = new When(\n                a.add(b).greaterThan(c)\n           \
  \     .and(b.add(c).greaterThan(a))\n                .and(c.add(a).greaterThan(b)))\n\
  \                .then(s.multiply(s.subtract(a))\n                .multiply(s.subtract(b))\n\
  \                .multiply(s.subtract(c)))\n                .otherwise(0.0D);\n\
  \        a.set(3);\n        b.set(4);\n        c.set(5);\n        System.out.printf(\"\
  Given sides a = %1.0f, b = %1.0f, and c = %1.0f,\" +\n                \" the area\
  \ of the triangle is %3.2f\\n\", a.get(), b.get(), c.get(),\n                Math.sqrt(areaSquared.get()));\n\
  \        a.set(2);\n        b.set(2);\n        c.set(2);\n        System.out.printf(\"\
  Given sides a = %1.0f, b = %1.0f, and c = %1.0f,\" +\n                \" the area\
  \ of the triangle is %3.2f\\n\", a.get(), b.get(), c.get(),\n                Math.sqrt(areaSquared.get()));\n\
  \    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 4 章 ■ 属性和绑定\n\
  \n由于 `DoubleExpression` 中没有现成的计算平方根的绑定方法，我们为 `areaSquared` 创建了一个 `DoubleBinding`。`When()`\
  \ 的构造函数参数是一个基于 a、b 和 c 三个条件构建的 `BooleanBinding`。`then()` 方法的参数是一个计算三角形面积平方的 `DoubleBinding`。并且由于\
  \ `then()` 的参数是数值类型，`otherwise()` 的参数也必须是数值类型。我们选择使用 `0.0D` 来表示遇到了无效的三角形。\n\n■ **注意**\
  \ 除了使用 `When()` 构造函数，你也可以使用 `Bindings` 工具类中的工厂方法 `when()` 来创建 `When` 对象。\n\n当我们运行清单\
