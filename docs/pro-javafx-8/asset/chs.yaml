  ; String path = \"2.2/search\";\n\nString search = \"javafx\";\n\nService<ObservableList<Question>>service\
  \ = new QuestionRetrievalService(url, path, search); 主机名、路径和搜索参数用于创建一个 JAX-RS `WebTarget`：\n\
  \nClient client = ClientBuilder.newClient();\n\nWebTarget target = client.target(loc).path(path).queryParam(\"\
  tagged\", search)\n\n.queryParam(\"site\", \"stackoverflow\");\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 11 章 ■ 访问 Web 服务\n\n在这个 `WebResource` 上，我们可以调用 `request` 方法来执行请求，接着调用 `get(Class\
  \ clazz)` 方法，并提供一个类参数。REST 调用的结果随后会被解析成所提供类的实例，这也正是我们在清单 11-11 的示例中使用 JAXB 所做的。\n\
  \nQuestionResponse response = target.request(MediaType.APPLICATION_JSON).get(QuestionResponse.class);\
  \ 响应现在包含了一个问题列表，我们可以使用与清单 11-4 完全相同的代码来渲染这些问题。\n\n**总结**\n\n在本章中，我们简要介绍了集成 JavaFX\
  \ 应用程序和企业应用程序的两种选择。\n\n我们演示了多种通过 Web 服务检索数据的技术，并展示了如何在典型的 JavaFX 控件（如 `ListView`\
  \ 和 `TableView`）中渲染这些数据。\n\n我们使用了一些第三方工具来简化检索、解析和渲染数据的过程。我们还演示了一些与远程 Web 服务相关的 JavaFX\
  \ 特定问题（即，UI 更新应在 JavaFX 应用程序线程上进行）。\n\n重要的是要认识到，JavaFX 客户端应用程序与 Web 服务之间的解耦提供了很大的自由度。处理\
  \ Web 服务有不同的工具和技术，鼓励开发者在他们的 JavaFX 应用程序中使用自己喜欢的工具。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 12 章**\n\n**JavaFX 在嵌入式与移动平台上的应用**\n\n*很简单——你阅读协议，然后编写代码。*\n\n—比尔·乔伊\n\n桌面系统和笔记本电脑在许多环境中都占有重要地位。用\
  \ JavaFX 编写的商业应用程序和最终用户应用程序都可以在这些系统上运行。尽管桌面和笔记本电脑仍然是巨大的目标市场，但客户端应用程序还有其他新兴环境。在本章中，我们将展示如何利用现有的\
  \ JavaFX 代码为移动和嵌入式系统创建应用程序。\n\n**OpenJFX：代码的起源**\n\n在 2011 年的 JavaOne 大会上，Oracle\
  \ 宣布 JavaFX 将在某个时间点完全开源。\n\n解决所有技术和法律问题花费了几年时间，但如今，你在应用程序开发中使用的整个 JavaFX 平台都基于开源代码。JavaFX\
  \ 的代码是在 OpenJFX 项目中开发的，该项目是 OpenJDK 的一个子项目（参见 [`openjdk.org`](http://openjdk.org/)）。\n\
  \nOpenJDK 是 Java 平台标准版本身作为开源项目进行开发的地方。OpenJDK 项目包含许多子项目，OpenJFX 就是其中之一。重要的是要认识到，尽管\
  \ OpenJDK 的大多数贡献者是 Oracle 员工，但这个过程对任何人都是开放的。除了 Oracle，许多大公司（例如 IBM、Twitter、Apple）以及一些个人也为\
  \ OpenJDK 贡献代码。虽然阅读代码非常容易，但在任何人获得代码库的提交权限之前，有一个严格的流程。考虑到 Java 平台的重要性和使用范围，这是一个令人安心的想法。\n\
  \nOpenJDK 中的 OpenJFX 项目包含了创建 JavaFX 平台所需的所有代码。不仅代码是公开的，邮件列表和文档部分也是开放的。因此，每个开发者都可以阅读关于\
  \ JavaFX 平台架构和实现的讨论。这种开放性的一个优点是，如果你想知道 JavaFX 平台中某个功能为何如此设计，你可以在讨论列表中搜索。关于 OpenJFX\
  \ 的一个重要信息来源是 OpenJFX 维基，其地址为\n\n[`wiki.openjdk.java.net/display/OpenJFX/Main。`](https://wiki.openjdk.java.net/display/OpenJFX/Main)该维基的登录页面截图如图\
  \ 12-1 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 168](img/index-525_1.jpg)\n\
  \n第 12 章 ■ JavaFX 在嵌入式与移动平台上的应用\n\n***图 12-1.** OpenJDK 网站上的 OpenJFX 维基*\n\nOpenJFX\
  \ 维基包含有关 JavaFX 平台结构的有用信息。它提供了指向问题跟踪器和邮件列表的链接，这使得可以跟踪功能和错误修复。\n\n它也是 Oracle 和社区创建的不同\
  \ JavaFX 运行时包的起点。\n\nOpenJFX 项目包含 JavaFX 平台的代码，但不包含二进制运行时或 SDK。基于这些代码，创建了许多实现。如图\
  \ 12-2 所示，一些实现利用了 OpenJFX 中的代码。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 169](img/index-526_1.png)\n\n第 12 章 ■ JavaFX 在嵌入式与移动平台上的应用\n\n***图 12-2.**\
  \ 利用 OpenJFX 代码库的实现*\n\n由于 OpenJFX 代码完全开源并采用 GPL 许可证授权，开发者可以创建自己的运行时，只要他们遵守许可证条款即可。\n\
  \nOracle 使用 OpenJFX 和 OpenJDK 中的代码来创建 Oracle SE 8 SDK 和 Oracle SE 8 运行时。这些二进制文件根据\
  \ Oracle 二进制代码许可证进行分发。\n\n此外，Oracle 还创建了 Oracle SE 8 嵌入式系统，该系统允许应用程序使用多种紧凑配置文件在嵌入式设备上运行。Oracle\
  \ SE 8 嵌入式系统包含许多工具，允许应用程序提供商定义最合适的配置文件。Java SE Embedded 可免费下载用于评估和开发，但用于生产环境需要商业许可证。我们不会在本章讨论\
  \ Java SE Embedded。对此产品感兴趣的开发者，建议阅读 Oracle 文档，地址为\n\n[`docs.oracle.com/javase/8/javase-embedded.htm`](http://docs.oracle.com/javase/8/javase-embedded.htm)。\n\
  \nOracle 为多个平台（包括 ARM 平台）提供 SE 8 SDK 和运行时。ARM\n\n\n\nJava SE Development Kit 8 的版本可从\
  \ [`www.oracle.com/technetwork/java/javase/`](http://www.oracle.com/technetwork/java/javase/downloads/jdk8-arm-downloads-2187472.html)\
  \ 下载\n\n[downloads/jdk8-arm-downloads-2187472.html。](http://www.oracle.com/technetwork/java/javase/downloads/jdk8-arm-downloads-2187472.html)\n\
  \n■ **注意**：Java SE 开发工具包和运行时的下载位置将来可能会发生变化，此处提供的链接可能不再有效。\n\n我们将在下一节讨论 ARM 上的 JavaFX\
  \ 8。接下来，我们将讨论 iOS 上的 JavaFX 和 Android 上的 JavaFX。这两个移植版本的运行时都基于与 Oracle SE 8 完全相同的代码，即\
  \ OpenJFX 源代码。这一点极其重要，因为它使开发者能够编写可移植的应用程序。\n\nJavaFX 的主要优势之一在于代码的可移植性。如果你能用一种语言编写应用程序，并将其部署到多个平台（台式机、笔记本电脑、嵌入式设备、移动设备）上，这将极大地提高生产力。\n\
  \nJava 8 平台（以及由此延伸的 JavaFX 8 平台）在多种不同环境中的可用性，为 Java 开发者带来了相对于那些为每个平台使用特定语言的开发者的竞争优势。\n\
  \n在你的 JavaFX 应用程序中，仍然可以利用特定平台提供的功能。当然，例如仅在 iOS 中可用的功能无法在 Android 环境中使用，反之亦然。\n\n\
  因此，对于那些需要创建在不同平台上具有完全相同行为的应用程序的开发者来说，应尽可能坚持使用 JavaFX 功能。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 ■ 嵌入式与移动设备上的 JavaFX\n\nARM 上的 JavaFX\n\n在不久之前，嵌入式设备的世界还相当封闭，对 Java 开发者来说并不十分友好。\n\
  \n每种设备都有自己（通常是专有的）一套工具，供开发者与之交互。设备上可用的资源（处理器、内存）也非常有限。\n\n在过去几年中，这种情况开始发生巨大变化。设备正变得功能更强大、更开放、更便宜。\n\
  \n*   **功能强大：** 即使是嵌入式设备，现在也通常配备多核处理器，以及专门处理图形计算的图形处理单元（GPU），从而减轻了 CPU 的负载。\n* \
  \  **开放：** 许多新型嵌入式设备在知名处理器之上使用开源操作系统。典型的例子是使用 ARM 处理器的基于 Linux 的嵌入式设备。\n*   **更便宜：**\
  \ 电子元件的价格已经下降，组装成本也更低，互联网用户被鼓励开发和组装自己的电路板。\n\n这些演变导致了嵌入式计算的重大转变。一个临界点已经达到，即可以在许多嵌入式设备上使用与桌面系统上运行的\
  \ Java 平台相同的 Java 平台。\n\n对于较小的系统，Java 平台微型版 8 仍然是最佳解决方案。想要了解更多关于 Java 微型版信息的开发者，可以从\
  \ Oracle 网站 [`docs.oracle.com/javame/8.0/`](http://docs.oracle.com/javame/8.0/index.html)\
  \ 开始。\n\n[index.html。](http://docs.oracle.com/javame/8.0/index.html)尽管 Java 平台微型版\
  \ 8 是一个强大的平台，拥有一些允许直接链接到原生接口的有趣 API，但在本书中，我们重点关注 Java 平台标准版。\n\nJava 平台微型版 8 与 Java\
  \ 平台标准版 8 的比较见图 12-3，该图摘自 Oracle 移动与嵌入式领域高级技术专家 Terence Barr 的一篇博客文章。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 170](img/index-528_1.jpg)\n\n第 12 章 ■ 嵌入式与移动设备上的 JavaFX\n\n***图 12-3.**\
  \ Java 微型版 8 与 Java 标准版 8 的比较*\n\n如前所述，Oracle 为基于 ARM 的 Linux 系统提供了 Java 标准版 8 开发工具包和运行时。据报道，JavaFX\
  \ for ARM 捆绑包在包括 Raspberry Pi 在内的许多嵌入式设备上运行良好。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 171](img/index-529_1.jpg)\n\n第 12 章 ■ 嵌入式与移动设备上的 JavaFX\n\nRaspberry Pi\n\
  \nRaspberry Pi 是一款大小与信用卡相当的板卡计算机。它由 Raspberry Pi 基金会（参见 [`www.raspberrypi.org`](http://www.raspberrypi.org/)）开发，并由多家授权公司制造。它通常用于教育目标和展示技术。\n\
  \nRaspberry Pi 板卡的图片如图 12-4 所示。\n\n***图 12-4.** Raspberry Pi 板卡*\n\n目前，Raspberry\
  \ Pi 有两个版本，售价分别为 25 美元和 35 美元。两个版本均配备 ARM11 32 位 RISC 处理器。低价型号拥有 256 MB 内存，高价型号拥有\
  \ 512 MB 内存。Raspberry Pi 没有内置硬盘，而是从 SD 卡启动。\n\nRaspberry Pi 推荐的操作系统是 Raspbian Wheezy，它基于开源\
  \ Debian Linux 操作系统。Raspbian Wheezy 使用 ARM 硬浮点架构。这很好，因为 Oracle 提供的 ARM 版 JDK 8 也是为\
  \ ARM 硬浮点架构构建的。\n\nRaspberry Pi 配备了一款不错的 GPU，这使其成为展示 JavaFX 应用程序的绝佳选择。Raspberry\
  \ Pi 板卡本身没有输出屏幕，但它包含多种接口（例如 HDMI、复合 RCA、DSI）来与标准显示器交互。由于 Raspberry Pi 有以太网连接，因此非常方便使用\
  \ SSH（安全外壳）从工作站登录到 Raspberry Pi。\n\nRaspberry Pi 上的 JavaFX\n\n如前所述，你可以用来在 Raspberry\
  \ Pi（以及一般的基于 ARM 的 Linux 系统）上开发 JavaFX 应用程序的 JavaFX 平台，基于 OpenJFX 中可用的代码。\n\nOpenJFX\
  \ 项目的 wiki 部分包含关于如何设置带有 JavaFX 的 Raspberry Pi 的详细且最新的说明。你可以在以下网站阅读这些说明：[`wiki.openjdk.java.net/display/`](https://wiki.openjdk.java.net/display/OpenJFX/OpenJFX+on+the+Raspberry+Pi.Because)\n\
  \n[OpenJFX/OpenJFX+on+the+Raspberry+Pi。](https://wiki.openjdk.java.net/display/OpenJFX/OpenJFX+on+the+Raspberry+Pi.Because)由于\
  \ Raspberry Pi 上的 JavaFX 运行时提供了与桌面版 JavaFX 运行时相同的 API，我们可以在我们的 530\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 ■ 嵌入式与移动设备上的 JavaFX\n\n应用程序中利用 JavaFX 8（以及一般的 Java 8）的所有优秀特性。特别是，Java 8\
  \ 中添加的 Lambda 表达式和流支持，在使用 Raspberry Pi 上的 JavaFX 运行时效果非常好。\n\n这方面的一个很好的例子是 Mary\
  \ Had a Little Lambda 项目。这个项目是 JavaFX 对流行歌曲“Mary Had a Little Lamb”的回应，是 JavaFX\
  \ 应用程序中 Lambda 表达式和流 API 的典型展示。该代码由 Stephen Chin 在 GitHub 上维护，地址为 [`github.com/steveonjava/`](https://github.com/steveonjava/MaryHadALittleLambda/tree/master/src/sample)\n\
  \n[MaryHadALittleLambda/tree/master/src/sample](https://github.com/steveonjava/MaryHadALittleLambda/tree/master/src/sample)。\n\
  \n该代码包含在 NetBeans 中打开它所需的文件，但也可以使用命令行 ant 工具进行编译、打包和执行。你可以通过执行 `git clone [`github.com/steveonjava/MaryHadALittleLambda.git`](https://github.com/steveonjava/MaryHadALittleLambda.git)`\
  \ 获取代码的本地副本。\n\n\n\n■ **注意** 你需要在系统上安装一个 git 客户端来获取代码。如果你没有 git 客户端，可以轻松安装它。在 Linux\
  \ 上，可以通过 `sudo apt-get install git` 命令完成安装。在 Windows 上，下载网址为 [`git-scm.com/download/win`](http://git-scm.com/download/win)。在\
  \ macOS 上，下载网址为 [`git-scm.com/download/mac`](http://git-scm.com/download/mac)。\n\
  \n获取代码后，你可以通过一条命令在桌面上构建并运行它：`ant`\n\n■ **注意** 如果你没有 ant 构建工具，可以根据你的操作系统从以下网址下载：\n\
  [`ant.apache.org/bindownload.cgi`](http://ant.apache.org/bindownload.cgi)\n\n或者，你也可以在\
  \ NetBeans 中打开该项目，并像本书前几章中的其他 NetBeans 项目一样，在 NetBeans 中运行它。\n\n在桌面系统上运行代码将产生如图\
  \ 12-5 所示的输出。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 172](img/index-531_1.jpg)\n\
  \n第 12 章 ■ 嵌入式与移动设备上的 JavaFX\n\n***图 12-5.** MaryHadALittleLambda 项目的桌面版本*\n\n在嵌入式\
  \ ARM 系统上部署 JavaFX 应用程序\n\n有多种方法可以在嵌入式系统上部署 JavaFX 应用程序。特定的嵌入式系统通常有特定的要求、限制和选项。在本节中，我们将描述两种适用于我们拥有嵌入式\
  \ ARM 系统 SSH 访问权限的通用方法。在这两种方法中，我们都假设嵌入式系统已经配备了 Java 8 标准版运行时。\n\n使用命令行工具\n\n这种方法通常与在\
  \ Linux 系统上部署 JavaFX 应用程序非常相似。使用你喜欢的构建工具，在你的本地开发系统上创建一个包含你的应用程序及其所有依赖项的 JAR 文件。然后，使用\
  \ SCP（安全复制）将该 JAR 文件传输到嵌入式系统，并在那里执行它。通常，你需要使用 SSH 登录到嵌入式系统，执行 Java 命令，并提供 JAR 文件的位置。\n\
  \n使用 NetBeans\n\nNetBeans 8 包含对在远程平台（包括嵌入式系统）上运行 Java 和 JavaFX 应用程序的内置支持。使用此功能，你不仅可以在本地开发系统上创建应用程序，还可以将其推送到嵌入式系统，在那里执行它，并在本地检查系统输出。在底层，NetBeans\
  \ 执行的操作与我们之前使用命令行工具的方法相同。不过，所有操作都很好地集成在 IDE 中，并且在本地开发系统上测试和在嵌入式系统上运行之间的切换非常容易。要使用此功能，我们首先必须告诉\
  \ NetBeans 我们的嵌入式系统在哪里运行，以及 NetBeans 如何访问它。这可以通过选择“工具” ➤ “Java 平台”菜单，然后单击“添加平台”按钮来完成。将显示如图\
  \ 12-6 所示的截图。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 173](img/index-532_1.jpg)\n\
  \n第 12 章 ■ 嵌入式与移动设备上的 JavaFX\n\n***图 12-6.** NetBeans 添加远程 Java 平台的向导*\n\n选择“远程\
  \ Java 标准版”并单击“下一步”。下一个屏幕，如图 12-7 所示，显示了许多配置参数，NetBeans 将使用这些参数将你的应用程序传输到远程系统，并执行\
  \ Java 进程。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 174](img/index-533_1.jpg)\n\
  \n第 12 章 ■ 嵌入式与移动设备上的 JavaFX\n\n***图 12-7.** 在 NetBeans 中配置远程 Java 平台*\n\n“平台名称”可以自由选择。“主机”和“端口”参数必须与嵌入式系统的\
  \ IP 地址相对应。在这种情况下，我们假设嵌入式系统在我们的本地内网中运行，地址为 192.168.1.20，使用标准的 SSH 端口 22。由于 NetBeans\
  \ 会将文件传输到嵌入式系统并在其上执行命令，因此它需要进行身份验证。这可以通过提供密码或带有密码短语的密钥来完成。在本例中，我们提供 Raspberry Pi\
  \ 系统标配的典型用户名“pi”。默认情况下，对应的密码是“raspberry”。\n\n接下来，我们必须将 NetBeans 指向 JRE 的位置，我们假设它安装在\
  \ `/opt/jdk1.8.0`。\n\n■ **注意** 你也可以将 NetBeans 与 Java 标准版嵌入式版本结合使用，在你的嵌入式系统上创建一个\
  \ JRE 安装。\n\n最后，我们必须指定 NetBeans 的工作目录。此处接受默认目录即可。单击“完成”以确认配置信息。\n\n作为这些配置步骤的结果，一个新的“远程\
  \ Java 平台”已创建。如果你现在打开一个 Java 或 JavaFX 项目，右键单击该项目，选择“项目属性”，然后选择“运行”选项卡，你将能够指定新的远程\
  \ Java 平台，如图 12-8 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image\
  \ 175](img/index-534_1.jpg)\n\n第 12 章 ■ 嵌入式与移动设备上的 JavaFX\n\n***图 12-8.** 显示运行时平台选项的项目属性*\n\
  \n“运行”设置中的“运行时平台”选项显示了你可以选择用来执行 Java 或 JavaFX 应用程序的平台。在本地开发系统和远程嵌入式系统（我们将其命名为 RemotePi）之间切换，将导致应用程序在本地系统或嵌入式系统上运行。\n\
  \n移动设备上的 JavaFX\n\n目前，移动设备（手机和平板电脑）的销量超过了桌面系统。据估计，到 2014 年，使用移动设备访问互联网的人数将超过桌面系统。仅此一点就改变了\
  \ IT 行业的格局。其后果之一是，信息和服务应能通过移动界面访问，以覆盖大多数互联网用户。然而，还有更多的变化。在桌面系统上，大部分信息是通过网页浏览器消费的，但在移动设备上情况并非如此。移动设备的用户更喜欢使用原生应用程序（即所谓的\
  \ App），而不是网页浏览器。这意味着，希望触达移动用户的公司和组织应该创建应用程序，而不是（移动）网页。这对 JavaFX 开发者来说是一个巨大的机遇，因为使用\
  \ JavaFX 创建移动应用程序是可行的。Java 开发者现在无需使用 HTML、CSS 和 JavaScript 创建移动网站，而是可以创建 JavaFX\
  \ 应用程序并将其打包为移动应用程序。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image\
  \ 176](img/index-535_1.jpg)\n\n第 12 章 ■ 嵌入式与移动设备上的 JavaFX\n\niOS 上的 JavaFX\n\n2007\
  \ 年，苹果发布了 iOS 的第一个版本，作为 iPhone 的操作系统。最初，iOS 是 iPhone 操作系统的缩写。后来，iOS 成为其他苹果设备的操作系统，包括\
  \ iPod Touch、iPad 和 iPad Mini，以及第二代 Apple TV。\n\niPhone 和 iPad 的应用程序必须为 iOS 编写和编译，并通过苹果\
  \ App Store 提供。App Store 的官方网站是 [`www.itunes.com/appstore`](http://www.itunes.com/appstore)。\n\
  \n■ **注意** App Store 不应与 Mac App Store 混淆，后者用于分发 macOS 应用程序，主要面向桌面应用。\n\n\n\n通常，iOS\
  \ 应用程序是使用 Xcode 开发环境通过 Objective-C 编写的。相比之下，Java 应用程序会生成 Java 字节码，并且通常使用 IDE 创建。因此，需要经过一个翻译步骤才能让\
  \ Java 字节码在 iOS 环境中运行。\n\n有多种方法可以在 iOS 环境中运行（翻译后的）Java 字节码。目前，RoboVM 项目提供了一种便捷的方式，可以将你的\
  \ JavaFX 应用程序转换为原生的 iOS 应用程序。\n\nRoboVM 将 Java 字节码翻译为 iOS 原生代码。OpenJFX 仓库中已经包含了基于\
  \ iOS 的 JavaFX 实现。JavaFX 平台所需的原生调用是通过使用 iOS 原生调用来实现的。这使得 JavaFX 应用程序能够达到与原生应用程序相同的性能。RoboVM\n\
  \n不仅会翻译你的 JavaFX 应用程序类，还会翻译你的应用程序所依赖的所有类。\n\n在运行时不需要进行编译、链接、解析或翻译——苹果公司对此是不允许的，它对\
  \ iOS 应用程序中允许执行的操作有着严格的政策。图 12-9 中的示意图展示了其工作原理。\n\n***图 12-9.** 在 RoboVM 上运行 JavaFX\
  \ 应用程序*\n\n从示意图中可以看出，RoboVM 项目既包含库，也包含一个编译器。RoboVM\n\n编译器会编译你的 JavaFX 应用程序文件以及所有必需的类文件，并将其与所需的库链接在一起。RoboVM\
  \ 可以为 MacOS 和 iOS 生成可执行文件。\n\n将 JavaFX 应用程序转换为原生 iOS 应用程序所需的步骤在 RoboVM\n\n文档页面中有详细描述。目前，开发者可以遵循以下几种选择：\n\
  \n• 使用带有 RoboVM 插件的 Eclipse。\n• 使用带有 RoboVM Maven 插件的 Maven。\n• 通过命令行方式直接执行 RoboVM\
  \ 编译器。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 12 章 ■ 嵌入式与移动设备上的\
  \ JavaFX\n\n作为示例，我们将编写一个非常简单的 JavaFX 应用程序，并解释创建 iOS\n\n应用程序所需的步骤。这个简单应用程序的代码如代码清单\
  \ 12-1 所示。\n\n***代码清单 12-1.*** 将移植到 iOS 和 Android 的简单 JavaFX 应用程序 package projavafx;\n\
  \nimport java.util.Random;\n\nimport javafx.application.Application;\n\nimport javafx.event.ActionEvent;\n\
  \nimport javafx.event.EventHandler;\n\nimport javafx.scene.Scene;\n\nimport javafx.scene.control.Button;\n\
  \nimport javafx.scene.control.Label;\n\nimport javafx.scene.layout.StackPane;\n\n\
  import javafx.stage.Stage;\n\npublic class SimplePort extends Application {\n\n\
  final String[] days = new String[]{\"Monday\", \"Tuesday\", \"Wednesday\", \"Thursday\"\
  , \"Friday\",\n\n\"Saturday\", \"Sunday\"};\n\n@Override\n\npublic void start(Stage\
  \ primaryStage) {\n\nRandom random = new Random();\n\nButton btn = new Button();\n\
  \nbtn.setText(\"Guess a day\");\n\nLabel answer = new Label(\"no input received\"\
  );\n\nanswer.setTranslateY(50);\n\nbtn.setOnAction(new EventHandler<ActionEvent>()\
  \ {\n\n@Override\n\npublic void handle(ActionEvent event) {\n\nint day = random.nextInt(7);\n\
  \nanswer.setText(days[day]);\n\n}\n\n});\n\nStackPane root = new StackPane();\n\n\
  root.getChildren().addAll(btn, answer);\n\nScene scene = new Scene(root, 300, 250);\n\
  \nprimaryStage.setTitle(\"JavaFX Porting\");\n\nprimaryStage.setScene(scene);\n\n\
  primaryStage.show();\n\n}\n\npublic static void main(String[] args) {\n\nlaunch(args);\n\
  \n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 177](img/index-537_1.jpg)\n\
