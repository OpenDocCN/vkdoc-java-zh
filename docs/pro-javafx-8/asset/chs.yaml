  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 11 章**\n\n**访问 Web 服务**\n\
  \n*所谓专家，就是在某个狭窄领域犯过所有可能犯的错误的人。*\n\n——尼尔斯·玻尔\n\n现代应用程序的范式很明确：没有什么是孤立存在的。客户端应用程序与从各种物理和逻辑资源中获取的数据进行交互。无论数据是从硬盘、远程数据库还是公开的网络资源中检索，我们都期望应用程序能够灵活、提供多种数据检索选项，并且通常能与其他系统良好协作。\n\
  \n到目前为止，我们已经解释了如何使用 JavaFX 平台来渲染信息和交互式地操作数据。在本章中，我们将简要概述可用于将 JavaFX 应用程序与企业系统集成的选项，然后继续介绍该过程的一些具体示例。\n\
  \n我们构建的示例旨在演示 JavaFX 应用程序如何轻松访问 REST 资源，然后将响应（来自 JSON 或 XML 格式）转换为 JavaFX 控件可理解的格式。作为我们的示例外部数据源，StackExchange\
  \ API 是理想的选择，因为它们公开可用、易于理解，并且在互联网上被广泛使用。\n\n前端和后端平台\n\nJavaFX 通常被视为一个前端平台。尽管这种说法对\
  \ JavaFX 平台中与 UI 无关的 API 有失公允，但确实大多数 JavaFX 应用程序都专注于“内容”的丰富且交互式的可视化。\n\nJava 的一大优点在于，同一种语言可以在广泛的设备、桌面和服务器中使用。构成\
  \ JavaFX 核心的 Java 语言，同样也是 Java 平台企业版（Java EE）的基本核心。\n\nJava 平台是企业应用程序的头号开发平台。JavaFX\
  \ 平台提供丰富且交互式的 UI，与运行在 Java 平台上的企业应用程序相结合，创造了巨大的可能性。为了实现这一点，JavaFX 应用程序和 Java 企业应用程序必须进行数据交换。\n\
  \n数据交换可以通过多种方式进行，并且根据需求（来自前端和后端），某种方式可能比另一种更合适。\n\n基本上，有两种不同的方法：\n\n• JavaFX 应用程序可以利用其与典型企业应用程序运行在同一基础设施上的优势，并与这些企业组件深度集成。如图\
  \ 11-1 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 11 章 ■ 访问 Web\
  \ 服务\n\n***图 11-1.** 单一系统上的 JavaFX 和企业组件*\n\n• JavaFX 应用程序运行在相对简单的 Java 平台上，并使用\
  \ Java 企业组件已支持的标准协议与企业服务器交换数据。\n\n如图 11-2 所示。\n\n***图 11-2.** JavaFX 应用程序与远程服务器上的企业组件通信*\n\
  \n第一种方法被提及并简要涉及，但本章的重点是第二种方法，即 JavaFX 客户端与远程服务器上的 Java 企业组件进行通信。\n\n这里还应该强调，只要使用标准的、定义明确的协议（例如\
  \ SOAP/REST），将 JavaFX 应用程序连接到非 Java 后端应用程序是完全可能的。客户端和服务器之间的解耦确实允许在客户端和服务器上使用不同的编程语言。\n\
  \n在同一环境中合并 JavaFX 和 Java 企业模块\n\nJavaFX 8 构建在 Java 平台标准版之上。因此，该平台提供的所有功能都可以在 JavaFX\
  \ 8 中利用。Java 平台企业版也构建在 Java 平台标准版之上。因此，JavaFX 应用程序可以与使用 Java 平台企业版的应用程序共存于同一环境中。\n\
  \n因此，JavaFX 开发人员可以使用他或她喜欢的企业工具来创建应用程序。这样做有许多优点。企业组件提供的工具允许开发人员专注于特定的领域层，同时使他们免受例如数据库资源和事务等问题的困扰。\n\
  \nJava 是企业环境中的流行平台，许多公司、组织和个人已经开发了大量的企业组件和库。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 11 章 ■ 访问 Web 服务\n\nJava 平台企业版由通过 Java 社区流程（JCP）程序标准化的规范定义。对于不同的组成部分，会提交单独的\
  \ Java 规范请求（JSR）。\n\n当前版本的 Java 平台企业版，即 Java 企业版 7，包含以下 JSR。\n\n• Java Servlet 3.1\
  \ (JSR 340)\n• JavaServer Faces 2.2 (JSR 344)\n• Java API for WebSocket 1.0 (JSR\
  \ 356)\n• Java API for JSON Processing 1.0 (JSR 353)\n• Expression Language 3.0\
  \ (JSR 341)\n• JavaServer Pages 2.3 (JSR 245)\n• Standard Tag Library for JavaServer\
  \ Pages (JSTL) 1.2 (JSR 52)\n• Debugging Support for Other Languages 1.0 (JSR 45)\n\
  • Java API for RESTful Web Services (JAX-RS) 2.0 (JSR 339)\n• Java API for XML-Based\
  \ Web Services (JAX-WS) 2.2 (JSR 224)\n• Java Architecture for XML Binding (JAXB)\
  \ 2.2 (JSR 222)\n• Implementing Enterprise Web Services 1.4 (JSR 109)\n• Web Services\
  \ Metadata for the Java Platform (JSR 181)\n• Java API for XML-Based RPC (JAX-RPC)\
  \ 1.1 (JSR 101)\n• Java API for XML Registries (JAXR) 1.0 (JSR 93)\n• Java Message\
  \ Service 2.0 (JSR 343)\n• Batch Applications for the Java Platform 1.0 (JSR 352)\n\
  • Concurrency Utilities for Java EE 1.0 (JSR 236)\n• Enterprise JavaBeans 3.2 (JSR\
  \ 345)\n• Bean Validation 1.1 (JSR 349)\n• Java Persistence 2.1 (JSR 338)\n• Contexts\
  \ and Dependency Injection (CDI) for Java 1.1 (JSR 346)\n• Dependency Injection\
  \ for Java 1.0 (JSR 330)\n• Java EE Connector Architecture 1.7 (JSR 322)\n• Java\
  \ Transaction API (JTA) 1.2 (JSR 907)\n• Common Annotations for the Java Platform\
  \ 1.2 (JSR 250)\n• JavaMail 1.5 (JSR 919)\n• Java Authentication Service Provider\
  \ Interface for Containers 1.1 (JSR 196)\n\n\n\n• Java 容器授权合约 1.5（JSR 115）\n\n•\
  \ Java XML 消息 API 1.3（JSR 67）\n\n• J2EE 管理 1.1（JSR 77）\n\n• Java EE 应用部署 1.2（JSR\
  \ 88）\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 11 章 ■ 访问 Web 服务\n\
  \n这些独立的 JSR 大多由多家公司实现，且实现通常被整合到产品中。典型的企业组件会实现一个或多个 JSR，并可能包含额外的产品特定功能。最流行的企业组件包括\
  \ Spring 框架、Tomcat/TomEE、Hibernate、JBoss/WildFly、RestEasy 和 GlassFish。部分产品实现了所有\
  \ JSR，这些产品被称为 Java 平台企业版（通常称为 Java EE 平台）的实现。\n\n从技术上讲，JavaFX 平台并未限制企业组件的使用。然而，企业开发与客户端开发在多个方面存在差异：\n\
  \n• 企业基础设施正转向云端。特定任务（如存储、邮件等）被外包给提供特定功能的“云”组件。企业服务器通常部署在云环境中，以便与云组件实现快速无缝交互。\n\n\
  • 在资源需求方面，企业系统侧重于计算资源（CPU、缓存和内存），而台式机和笔记本电脑则侧重于视觉资源（如图形硬件加速）。\n\n• 启动时间在服务器上几乎不成问题，但在许多桌面应用中却至关重要。此外，服务器需要\
  \ 7×24 小时持续运行，而大多数客户端则无需如此。\n\n• 部署和生命周期管理通常针对特定服务器产品或客户端产品。升级服务器或服务器软件往往是一个繁琐的过程。由于客户端应用可能保持与服务器的开放连接，停机时间必须最小化。客户端应用的部署方式有多种，例如通过独立应用、自包含应用或\
  \ Java 网络启动协议（JNLP）。\n\n• 企业开发使用多种模式（如控制反转、基于容器的初始化），这些模式在客户端开发中可能有用，但通常需要与传统客户端不同的架构。\n\
  \n使用 JavaFX 调用远程（Web）服务\n\n企业组件通常通过 Web 资源进行访问。某些规范明确描述了基于 Web 的框架应如何与企业组件交互以呈现信息。然而，还有其他规范允许从非\
  \ Web 资源访问企业组件（用 Java 或其他语言编写）。由于这些规范实现了企业开发与其他开发之间的解耦，它们由多个利益相关方共同定义。\n\n1998 年，微软发明了简单对象访问协议（SOAP），随后该协议被用作\
  \ Java 应用与.NET 应用之间的“标准”交换格式。SOAP 基于 XML，当前版本 1.2 于 2003 年成为 W3C 推荐标准。Java 提供了多种工具，允许开发者通过\
  \ SOAP 交换数据。\n\n尽管功能强大且相对易读，SOAP 常被认为过于冗长。随着混搭应用和提供特定功能的简单服务的兴起，一种新的架构风格应运而生：表述性状态转移（REST）。REST\
  \ 允许服务器和客户端开发者以松散耦合且更高效的方式交换数据，协议可以是 XML、JSON、Atom 或任何其他格式。\n\nSOAP\n\n许多企业应用在后端使用\
  \ SOAP，因此要求客户端也支持 SOAP。幸运的是，Java 原生支持 SOAP。本章示例将主要使用 REST 协议（因其更全面），但在 JavaFX 应用中使用`javax.xml.soap`包也完全可行，因为该包已包含在\
  \ Java 平台标准版 8 中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 11 章\
  \ ■ 访问 Web 服务\n\nREST\n\n本章剩余部分将介绍如何调用基于 REST 的 Web 服务。互联网上有大量关于 REST 及基于 REST 的\
  \ Web 服务的资源和文档。基于 REST 的 Web 服务会暴露多个 URI，这些 URI 可通过 HTTP 协议访问。通常，不同的 HTTP 请求方法（GET、POST、PUT、DELETE）用于表示对资源的不同操作。\n\
  \n基于 REST 的 Web 服务可通过标准 HTTP 技术访问，Java 平台提供了多个 API（主要在`java.io`和`java.net`包中）以简化对\
  \ REST 服务的访问。\n\nJavaFX 构建于 Java 平台标准版 8 之上，其主要优势之一便是在 JavaFX 应用中使用所有这些 API。这正是本章前几个示例的核心内容。我们将展示如何使用\
  \ Java API 消费基于 REST 的 Web 服务，并将结果集成到 JavaFX 应用中。\n\n接下来，我们将展示如何利用 JavaFX API 避免常见陷阱（例如应用无响应、无法动态更新等）。最后，我们简要介绍一些第三方库，这些库可帮助\
  \ JavaFX 开发者轻松访问基于 REST 的 Web 服务。\n\n搭建应用\n\n首先，我们为示例创建框架。我们将使用 Stack Exchange 提供的\
  \ API。Stack Exchange 网络是一个论坛集群，每个论坛专注于特定领域，问题和答案以“最佳”答案来自最受信任用户的方式呈现。Java 开发者可能对\
  \ StackOverflow 比较熟悉，它是 Stack Exchange 的第一个站点，提供了大量 IT 相关问题的解答。\n\n■ **注意** 在本书上一版《Pro\
  \ JavaFX 2》中，本章示例使用了 Twitter API。Twitter API 仍然可用，且是演示 REST 服务的绝佳示例。然而，所有对 Twitter\
  \ API 的请求现在都需要身份验证。虽然这完全可以理解，但使得从简单示例入手变得稍显困难。正如您将在本章中看到的，我们首先通过简单的 HTTP 连接访问 REST\
  \ 端点，暂不考虑身份验证。本章末尾介绍的框架支持基于 OAuth 的身份验证，而连接 Twitter API 的任务则留给感兴趣的开发者作为练习。\n\nStackExchange\
  \ 提供的 REST API 在[`api.stackexchange.com`](https://api.stackexchange.com/)上有详细描述。我们的目标并非探索\
  \ StackExchange 及其对应 API 的所有可能性，感兴趣的读者可参考网站上的文档。\n\n在本章示例中，我们希望可视化显示问题的作者、问题标题以及提问日期。\n\
  \n最初，我们使用一个包含 getter 和 setter 的 Java 对象来表示问题。如清单 11-1 所示。\n\n***清单 11-1.*** Question\
  \ 类\n\npackage projavafx;\n\npublic class Question {\n\n    private String owner;\n\
  \n    private String question;\n\n    private long timestamp;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
