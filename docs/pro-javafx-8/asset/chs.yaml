  \ `Text` 节点从其原始 Y 位置 100 像素转换到 Y 位置 -820 像素，持续时间为 75 秒。`Interpolator.LINEAR` 常量被赋值给\
  \ `interpolator` 属性，这会导致动画以线性方式进行。查看 `javafx.animation` 包中 `Interpolator` 类的 API\
  \ 文档，可以发现还有其他形式的插值可用，其中一种是 `EASE_OUT`，它会在指定持续时间结束时减慢动画速度。\n\n■ **注意** 在此上下文中，插值是在给定起始值、结束值和持续时间的情况下，计算任意时间点值的过程。\n\
