  , \"One\", \"Two\", \"Three\");\n\nSystem.out.println(\"调用 FXCollections.sort(strings):\
  \ \");\n\nFXCollections.sort(strings);\n\nSystem.out.println(\"调用 set(1, \\\"Three_1\\\
  \"): \");\n\nstrings.set(1, \"Three_1\");\n\nSystem.out.println(\"调用 setAll(\\\"\
  One_1\\\", \\\"Three_1\\\", \\\"Two_1\\\", \\\"Zero_1\\\"): \"); strings.setAll(\"\
  One_1\", \"Three_1\", \"Two_1\", \"Zero_1\"); System.out.println(\"调用 removeAll(\\\
