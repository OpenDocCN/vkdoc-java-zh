  \n}\n\n现在，我们有了一个不错的音频播放器应用程序的开端，但无法控制歌曲的播放会让人非常烦恼。是时候解决这个问题了。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 138](img/index-398_1.png)\n\n第 9 章 ■ 使用媒体类\n\n控制播放\n\nMediaPlayer 类中有三个主要方法用于控制\
  \ Media 对象的播放：play、pause 和 stop。这些方法都不接受任何参数，但它们会影响 MediaPlayer 的 status 和 currentTime\
  \ 属性。play 方法用于开始播放媒体。在媒体播放过程中，MediaPlayer 的 currentTime 属性会持续更新，以指示播放进度。由于 currentTime\
  \ 的类型是 Duration，它可以以毫秒、秒、分钟或小时为单位给出播放位置。\n\npause 方法会导致播放暂停，随后调用 play 将从暂停处重新开始播放。调用\
  \ stop 方法会停止播放，并将 currentTime 变量重置为 Media 的开头。\n\n当首次创建 MediaPlayer 对象时，其 status\
  \ 属性被初始化为 MediaPlayer.Status.UNKNOWN。\n\n一旦 Media 资源开始加载且没有其他错误，状态将变为 MediaPlayer.Status.\n\
  \nREADY。调用 play 方法会导致 status 变量变为 MediaPlayer.Status.PLAYING。调用 stop 或 pause 会分别将状态重置为\
  \ MediaPlayer.Status.STOPPED 或 MediaPlayer.Status.PAUSED。status 的其他可能值包括 MediaPlayer.Status.HALTED、MediaPlayer.Status.STALLED\
  \ 和 MediaPlayer.\n\nDISPOSED。halted 状态意味着发生了严重的不可恢复错误。一旦进入该状态，MediaPlayer 将永远不会退出\
  \ halted 状态。当媒体流在播放过程中数据耗尽，必须等待更多数据可用时，会出现 stalled 状态。你可以随时在 MediaPlayer 上调用 play\
  \ 方法，即使其状态为 UNKNOWN。在这种情况下，一旦 MediaPlayer 进入 READY 状态，播放就会立即开始。\n\n当在 MediaPlayer\
  \ 上调用 dispose() 方法时，会进入 MediaPlayer.DISPOSED 状态。一旦进入此状态，MediaPlayer 的资源将被释放，并且不应再被重用。但是，此播放器中使用的\
  \ Media 和 MediaView 对象仍然可以重用。\n\n\n\n布局播放器控件\n\n现在需要重新审视我们在代码清单 9-12 中创建的 `PlayerControlsView`。除了现有的\
  \ `openButton` 之外，我们还要添加控制播放、音量、播放位置的功能，并显示媒体的当前时间、总时长以及 `MediaPlayer` 的状态。要在单个布局中展示这么多内容，我们使用\
  \ JavaFX 最灵活的布局节点 `GridPane` 来管理这一切。最终得到的 `GridPane` 布局如图 9-5 所示。\n\n***图 9-5.**\
  \ 媒体播放器控件的 GridPane 布局*\n\n图 9-5 中的某些控件（如播放控件和打开按钮）跨越多行，其他控件则使用了特殊的对齐约束。代码清单 9-15\
  \ 展示了 `PlayerControlsView` 中创建此布局的新 `initView` 方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\n***代码清单 9-15.*** 播放器控件的 GridPane 布局\n\n```java\n@Override\nprotected\
  \ Node initView() {\n    final Button openButton = createOpenButton();\n    controlPanel\
  \ = createControlPanel();\n    volumeSlider = createSlider(\"volumeSlider\");\n\
  \    statusLabel = createLabel(\"Buffering\", \"statusDisplay\");\n    positionSlider\
  \ = createSlider(\"positionSlider\");\n    totalDurationLabel = createLabel(\"00:00\"\
  , \"mediaText\");\n    currentTimeLabel = createLabel(\"00:00\", \"mediaText\");\n\
  \    final ImageView volLow = new ImageView();\n    volLow.setId(\"volumeLow\");\n\
  \    final ImageView volHigh = new ImageView();\n    volHigh.setId(\"volumeHigh\"\
  );\n    final GridPane gp = new GridPane();\n    gp.setHgap(1);\n    gp.setVgap(1);\n\
  \    gp.setPadding(new Insets(10));\n    final ColumnConstraints buttonCol = new\
  \ ColumnConstraints(100);\n    final ColumnConstraints spacerCol = new ColumnConstraints(40,\
  \ 80, 80);\n    final ColumnConstraints middleCol = new ColumnConstraints();\n \
  \   middleCol.setHgrow(Priority.ALWAYS);\n    gp.getColumnConstraints().addAll(buttonCol,\
  \ spacerCol, middleCol,\n            spacerCol, buttonCol);\n    GridPane.setValignment(openButton,\
  \ VPos.BOTTOM);\n    GridPane.setHalignment(volHigh, HPos.RIGHT);\n    GridPane.setValignment(volumeSlider,\
  \ VPos.TOP);\n    GridPane.setHalignment(statusLabel, HPos.RIGHT);\n    GridPane.setValignment(statusLabel,\
  \ VPos.TOP);\n    GridPane.setHalignment(currentTimeLabel, HPos.RIGHT);\n    gp.add(openButton,\
  \ 0, 0, 1, 3);\n    gp.add(volLow, 1, 0);\n    gp.add(volHigh, 1, 0);\n    gp.add(volumeSlider,\
  \ 1, 1);\n    gp.add(controlPanel, 2, 0, 1, 2);\n    gp.add(statusLabel, 3, 1);\n\
  \    gp.add(currentTimeLabel, 1, 2);\n    gp.add(positionSlider, 2, 2);\n    gp.add(totalDurationLabel,\
  \ 3, 2);\n    return gp;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\n```java\nprivate Slider createSlider(String id) {\n    final\
  \ Slider slider = new Slider(0.0, 1.0, 0.1);\n    slider.setId(id);\n    slider.setValue(0);\n\
  \    return slider;\n}\n\nprivate Label createLabel(String text, String styleClass)\
  \ {\n    final Label label = new Label(text);\n    label.getStyleClass().add(styleClass);\n\
  \    return label;\n}\n```\n\n该方法首先创建将要放置在布局中的控件和 `ImageView`。我们已经在代码清单 9-12 中看到创建\
  \ `openButton` 的代码。`createControlPanel` 方法将在本节后面介绍。下一步是创建 `GridPane` 及其 `ColumnConstraints`。这里创建了三种不同的列约束。第一个是\
  \ `buttonCol`，用于打开按钮，固定宽度为 100 像素。按钮本身小于 100 像素，因此该列的宽度在打开按钮与实际播放器控件之间创建了一个良好的缓冲区域。第二个列约束是\
  \ `spacerCol`，其宽度可在最小 40 像素到最大 80 像素之间变化，首选宽度为 80 像素。该约束用于主要包含音量滑块和状态显示的列。最后是 `middleCol`\
  \ 约束。应用此约束的列允许增长以填充其他列剩余的空间。它将包含位置滑块和播放控件。\n\n这些约束按以下顺序添加：`buttonCol`、`spacerCol`、`middleCol`、`spacerCol`、`buttonCol`。我们添加了最后一个\
  \ `buttonCol` 约束，尽管最后一列中没有任何控件需要放置。这保持了布局的对称性，并使播放器控件在窗口中居中显示。\n\n多个控件还使用了通过 `setHalignment`\
  \ 和 `setValignment` 方法设置的特殊对齐方式，以控制其水平和垂直对齐。例如，`openButton` 对齐到它所跨越的三个单元格的底部。如前所述，这是为了在按钮与实际播放器控件之间创建“空白区域”。另一个例子是\
  \ `volHigh` 的 `ImageView`，它对齐到其单元格的右侧。原因是我们将 `volLow` 和 `volHigh` 图像添加到了同一个 `GridPane`\
  \ 单元格中。由于 `volLow` 是左对齐（默认），而 `volHigh` 是右对齐，因此它们不会重叠，并且即使在调整布局大小时，也能自动保持在音量滑块上方的正确位置。\n\
  \n最后一步当然是将控件实际添加到 `GridPane` 中。我们在代码清单 9-15 中使用了 `GridPane` 的 `add` 方法。该方法有两种不同的变体。第一种允许你指定要添加的\
  \ `Node` 及其列索引和行索引。第二种变体还允许你指定 `Node` 应跨越的列数和行数。后一种变体用于播放器控件（`controlPanel` 节点和\
  \ `openButton`），以允许它们跨越多行。\n\n凭借指定行和列大小约束、创建自定义对齐方式，甚至在每个单元格中显示多个节点的能力，`GridPane`\
  \ 无疑是 JavaFX 工具包中最强大、最灵活的布局。熟悉它的所有功能确实非常值得。\n\n创建播放控件\n\n现在你已经掌握了使用 `MediaPlayer`\
  \ 控制播放的基本知识，并且我们的布局也已就位，接下来让我们考虑实现一个播放/暂停按钮。这个简单的控件会在 `MediaPlayer` 当前不处于 `PLAYING`\
  \ 状态时显示播放图标。如果 `MediaPlayer` 正在播放，按钮将显示暂停图标。如果在 `MediaPlayer` 处于 `PLAYING` 状态时按下按钮，按钮的事件处理器将调用\
  \ `MediaPlayer` 的 `pause` 方法。否则，将调用 `MediaPlayer` 的 `play` 方法。加载播放和暂停图标、创建按钮以及附加实现此逻辑的事件处理器的代码如代码清单\
  \ 9-16 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 9 章 ■ 使用媒体类\n\
  \n***代码清单 9-16.*** 播放/暂停按钮背后的逻辑\n\n```java\nprivate Button createPlayPauseButton()\
  \ {\n    URL url = getClass().getResource(\"resources/pause.png\");\n    pauseImg\
  \ = new Image(url.toString());\n    url = getClass().getResource(\"resources/play.png\"\
  );\n    playImg = new Image(url.toString());\n    playPauseIcon = new ImageView(playImg);\n\
  \    final Button playPauseButton = new Button(null, playPauseIcon);\n    playPauseButton.setId(\"\
  playPauseButton\");\n    playPauseButton.setOnAction((ActionEvent arg0) -> {\n \
  \       final MediaPlayer mediaPlayer = songModel.getMediaPlayer();\n        if\
  \ (mediaPlayer.getStatus() == MediaPlayer.Status.PLAYING) {\n            mediaPlayer.pause();\n\
  \        } else {\n            mediaPlayer.play();\n        }\n    });\n    return\
  \ playPauseButton;\n}\n```\n\n创建 `playPauseButton` 的第一步是加载将用作按钮图标的两个图像。然后使用播放图像初始化\
  \ `playPauseIcon`（一个 `ImageView`）。这个 `ImageView` 作为 `playPauseButton` 的图形节点。这两个图像和\
  \ `ImageView` 是 `PlayerControlsView` 类的私有成员，因为稍后我们需要访问它们，以便根据媒体播放器的状态设置按钮的图标。\n\n\
  \n\nplayPauseButton 还被赋予了一个 ID，应用程序的样式表使用该 ID 为按钮应用额外的样式。这些样式使得按钮的背景完全透明，除非鼠标当前悬停在它上面。在这种情况下，会应用一个半透明背景，为用户提供一些视觉反馈，表明该按钮是可交互的。\n\
  \n这些样式如下面的代码片段所示。\n\n#playPauseButton {\n\n-fx-background-color: transparent;\n\n\
  }\n\n#playPauseButton:hover {\n\n-fx-background-color: rgb(255, 255, 255, 0.1);\n\
  \n}\n\n为了根据 MediaPlayer 的状态切换 playPauseButton 的图标，我们需要监听 MediaPlayer 的 status 属性。不幸的是，status\
  \ 属性不是在 JavaFX 应用程序线程上更新的，因此我们不能直接将按钮的图标绑定到该属性。这样做会违反 JavaFX 的线程规则，并可能导致“未定义行为”。\n\
  \n■ **警告** status 和 currentTime 属性由 MediaPlayer 更新，并且截至 JavaFX 2.0.2 版本，这些更新不会发生在\
  \ JavaFX 应用程序线程上。因此，你不能绑定这些属性，也不能在影响活动场景图节点的绑定表达式中使用它们。这样做会导致奇怪的错误或异常，因为这违反了 JavaFX\
  \ 的线程约定。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 9 章 ■ 使用媒体类\n\n\
  解决方案是向该属性附加一个监听器，并使用 Platform.runLater 方法在应用程序线程上触发更新。此代码如清单 9-17 所示。\n\n***清单 9-17.***\
  \ 监听状态属性变化以更新场景图\nprivate class StatusListener implements InvalidationListener {\n\
  \n@Override\n\npublic void invalidated(Observable observable) {\n\nPlatform.runLater(()\
  \ -> {\n\nupdateStatus(songModel.getMediaPlayer().getStatus());\n\n});\n\n}\n\n\
  }\n\nprivate void updateStatus(Status newStatus) {\n\nif (newStatus == Status.UNKNOWN\
  \ || newStatus == null) {\n\ncontrolPanel.setDisable(true);\n\npositionSlider.setDisable(true);\n\
  \nstatusLabel.setText(\"Buffering\");\n\n} else {\n\ncontrolPanel.setDisable(false);\n\
  \npositionSlider.setDisable(false);\n\nstatusLabel.setText(newStatus.toString());\n\
  \n**if (newStatus == Status.PLAYING) {**\n\n**playPauseIcon.setImage(pauseImg);**\n\
  \n**} else {**\n\n**playPauseIcon.setImage(playImg);**\n\n**}**\n\n}\n\n}\n\nStatusListener\
  \ 内部类是一个 InvalidationListener，一旦添加到 MediaPlayer 的 status 属性上，每当 status 属性发生变化时，它就会收到通知。它的任务是在\
  \ JavaFX 应用程序线程上调用其外部类的私有方法 updateStatus。这使得在 updateStatus 方法内部安全地更新活动场景图节点成为可能。其中一项更新是设置\
  \ playPauseIcon（一个 ImageView 节点）的图像，如 updateStatus 方法中高亮显示的代码所示。\n\n我们还会更新用作状态显示的\
  \ statusLabel 的文本（请参考图 9-5），并在状态发生变化时启用或禁用播放控件和位置滑块。如果 MediaPlayer 的状态是 UNKNOWN\
  \ 或 null，则播放器尚未准备好开始播放，我们通过显示“Buffering”字符串并禁用播放控件来指示此状态。任何其他 MediaPlayer 状态都会导致显示其名称并启用播放控件。\n\
  \n状态显示以带有边框的文本字符串形式呈现。这只需通过使用一个带有额外样式的 Label 控件即可实现，如下面的代码所示。\n\n.statusDisplay\
  \ {\n\n-fx-border-color: white;\n\n-fx-border-radius: 2;\n\n-fx-border-width: 1;\n\
  \n-fx-text-fill: white;\n\n-fx-font-size: 10pt;\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\n播放功能的最后一部分是在媒体播放结束时停止播放。MediaPlayer 在媒体播放结束时（严格来说，是到达 stopTime\
  \ 时；更多信息请参见“定位”部分）不会自动停止播放。你可以通过将 MediaPlayer 的 onEndOfMedia 回调属性设置为一个调用 MediaPlayer\
  \ 上 stop 方法的 Runnable 来显式停止播放。\n\nsongModel.getMediaPlayer().setOnEndOfMedia(()\
  \ -> {\n\nsongModel.getMediaPlayer().stop();\n\n});\n\n调用 MediaPlayer 的 stop 方法会将状态设置为\
  \ STOPPED，并通过将 currentTime 设置为 0 将播放位置重置到媒体的开头。\n\n■ **注意** 所有 MediaPlayer 的回调属性，例如\
  \ onEndOfMediaProperty、onError 和 onReadyProperty，都是 Runnable 而不是像 JavaFX API 其他部分那样使用\
  \ EventHandler，这看起来可能有点奇怪。Oracle 的 JavaFX 团队表示这只是一个疏忽。\n\n作为关于播放的最后一点说明，MediaPlayer\
  \ 还包含一个名为 autoPlay 的属性。如果将此布尔属性设置为 true，它将导致播放尽快开始。有时它有点过于激进，我们发现当对音频文件使用此功能时，播放有时会暂停甚至在一两秒后重新开始。因此，我们建议在正常情况下使用\
  \ play 方法，并且仅在播放中潜在的故障不是严重问题，并且你只想“一劳永逸”地播放时，才使用 autoPlay。\n\n定位\n\n名为 currentTime\
  \ 的只读属性始终包含 MediaPlayer 的当前播放位置。此属性的类型为 Duration，并且只能通过使用 seek 方法来设置。你可以使用 seek\
  \ 方法将播放位置移动到当前 startTime 和 stopTime 之间的任何时间点。MediaPlayer 的 startTime 和 stopTime\
  \ 属性分别初始化为 0 和 totalDuration，其中 totalDuration 属性（也是只读的）指定了媒体的总时长。如果 MediaPlayer\
  \ 当前处于 STOPPED 状态，则 seek 方法无效。\n\n音频播放器应用程序中的三个控件使用了 MediaPlayer 的定位功能。也许最明显的是位于\
  \ playPauseButton 两侧的“定位到开头”和“定位到结尾”按钮。这些按钮显示的图标由指向左侧（定位到开头）和右侧（定位到结尾）的双三角形组成。清单\
  \ 9-18 显示了来自 PlayerControlsView 类的 createControlPanel 方法，其中创建了这些按钮。\n\n***清单 9-18.***\
  \ 创建包含播放/暂停按钮和定位按钮的面板\nprivate Node createControlPanel() {\n\nfinal HBox hbox =\
  \ new HBox();\n\nhbox.setAlignment(Pos.CENTER);\n\nhbox.setFillHeight(false);\n\n\
  final Button playPauseButton = createPlayPauseButton();\n\nfinal Button seekStartButton\
  \ = new Button();\n\nseekStartButton.setId(\"seekStartButton\");\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\nseekStartButton.setOnAction(event -> {\n\nseekAndUpdatePosition(Duration.ZERO);\n\
  \n});\n\nfinal Button seekEndButton = new Button();\n\nseekEndButton.setId(\"seekEndButton\"\
  );\n\nseekEndButton.setOnAction(event -> {\n\nfinal MediaPlayer mediaPlayer = songModel.getMediaPlayer();\n\
  \nfinal Duration totalDuration = mediaPlayer.getTotalDuration();\n\nfinal Duration\
  \ oneSecond = Duration.seconds(1);\n\nseekAndUpdatePosition(totalDuration.subtract(oneSecond));\n\
  \n});\n\nhbox.getChildren().addAll(seekStartButton, playPauseButton, seekEndButton);\n\
  \nreturn hbox;\n\n}\n\nprivate void seekAndUpdatePosition(Duration duration) {\n\
  \nfinal MediaPlayer mediaPlayer = songModel.getMediaPlayer();\n\nif (mediaPlayer.getStatus()\
  \ == Status.STOPPED) {\n\nmediaPlayer.pause();\n\n}\n\nmediaPlayer.seek(duration);\n\
  \nif (mediaPlayer.getStatus() != Status.PLAYING) {\n\nupdatePositionSlider(duration);\n\
  \n}\n\n}\n\n\n\n回顾清单 9-16 展示了`createPlayPauseButton`方法的代码。清单 9-18 展示了播放控制面板其余部分的创建，即`seekStartButton`和`seekEndButton`。这两个按钮将搜索时间作为参数传递给`seekAndUpdatePosition`辅助方法。对于`seekStartButton`，搜索时间为`Duration.ZERO`，这始终会搜索到媒体的开头。`seekEndButton`实际上会搜索到媒体结束前一秒，该时间由`MediaPlayer`的`totalDuration`属性指定。你完全可以一直搜索到`totalDuration`的值。我们特意决定搜索到结束前一秒，以便让用户听到歌曲的结尾，而不是静音。\n\
  \n这些按钮图标的分配可以通过应用程序的样式表轻松处理，因为这些图标是静态的。这些按钮还共享了播放/暂停按钮的部分样式，如下所示。\n\n```css\n#seekStartButton\
  \ {\n    -fx-graphic: url(\"resources/prev.png\");\n}\n\n#seekEndButton {\n    -fx-graphic:\
  \ url(\"resources/next.png\");\n}\n\n#playPauseButton, #seekEndButton, #seekStartButton\
  \ {\n    -fx-background-color: transparent;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\n```css\n#playPauseButton:hover, #seekEndButton:hover, #seekStartButton:hover\
  \ {\n    -fx-background-color: rgb(255, 255, 255, 0.1);\n}\n```\n\n控制实际搜索操作的逻辑封装在`seekAndUpdatePosition`方法中。\n\
  \n请记住，如果播放器处于`STOPPED`状态，`seek`方法将无效。如果是这种情况，我们需要在调用`seek`方法之前调用`pause`方法，否则搜索将无法工作。另外请注意，调用`seek`后，如果`MediaPlayer`未在播放，我们需要手动更新位置滑块。这是必要的，因为`MediaPlayer`的`currentTime`属性不会通过调用`seek`自动更新。如果`MediaPlayer`正在播放，这并不明显，因为播放会立即从新的搜索位置继续，从而导致`currentTime`也快速更新。另一方面，如果`MediaPlayer`未在播放，则`currentTime`不会更新，导致位置滑块（它监听并显示`currentTime`的更新）与新的播放位置不同步。这在下次按下播放按钮时会很明显；位置滑块会突然跳转到上次搜索的位置。\n\
  \n这个讨论自然地引出了音频播放器中第三个使用`seek`功能的控件：前面提到的位置滑块。位置滑块有双重作用：它显示`currentTime`值，但也可以被拖拽到新位置，从而调用`seek`方法。你可能已经猜到，要使其正常工作，需要考虑一些细微之处。清单\
  \ 9-19 展示了实现此功能第一部分所需的代码：在位置滑块上显示`currentTime`值。\n\n***清单 9-19.*** 在位置滑块上显示 currentTime\
  \ 的值\n\n```java\nprivate class CurrentTimeListener implements InvalidationListener\
  \ {\n    @Override\n    public void invalidated(Observable observable) {\n     \
  \   Platform.runLater(() -> {\n            final MediaPlayer mediaPlayer = songModel.getMediaPlayer();\n\
  \            final Duration currentTime = mediaPlayer.getCurrentTime();\n      \
  \      currentTimeLabel.setText(formatDuration(currentTime));\n            updatePositionSlider(currentTime);\n\
  \        });\n    }\n}\n\nprivate void updatePositionSlider(Duration currentTime)\
  \ {\n    if (positionSlider.isValueChanging())\n        return;\n    final MediaPlayer\
  \ mediaPlayer = songModel.getMediaPlayer();\n    final Duration total = mediaPlayer.getTotalDuration();\n\
  \    if (total == null || currentTime == null) {\n        positionSlider.setValue(0);\n\
  \    } else {\n        positionSlider.setValue(currentTime.toMillis() / total.toMillis());\n\
  \    }\n}\n```\n\n与`status`属性一样，`MediaPlayer`的`currentTime`属性是在与主 JavaFX 应用程序线程不同的线程上更新的。因此，我们不能直接绑定到它，而必须附加一个`InvalidationListener`，该监听器利用`Platform.runLater`来对活动场景图节点（如位置滑块）执行更新。清单\
  \ 9-19 展示了为我们实现此功能的`CurrentTimeListener`内部类的实现。`Runnable`的 lambda 表达式在 JavaFX 应用程序线程上被调用。在\
  \ lambda 表达式的运行体内，我们从`MediaPlayer`获取`currentTime`，并将其作为参数传递给`updatePositionSlider`方法。同样在清单\
  \ 9-19 中展示的`updatePositionSlider`方法，首先检查`positionSlider`的值当前是否正在变化，如果是，则直接返回而不做任何操作。我们这样做是为了确保在用户拖拽滑块时不会改变滑块的位置。这样做会导致滑块的拇指条在拖拽位置和`currentTime`值指示的位置之间来回闪烁。不用说，这是我们小心避免的不良效果。如果用户当前没有更改位置滑块的值，我们就可以根据`currentTime`和`totalDuration`的值自由更新它。位置滑块创建时的最小值和最大值分别为`0.0`和`1.0`。因此，将`currentTime`值除以媒体的`totalDuration`来计算滑块的正确值。如果`totalDuration`或`currentValue`为`null`，滑块将简单地定位在`0`。\n\
  \n你可能注意到`CurrentTimeListener`还格式化了`currentTime`的值，并将其显示为`currentTimeLabel`的文本。如果你回头参考图\
  \ 9-5，可以看到位置滑块被两个`Label`控件包围。左侧是一个显示`currentTime`值的标签，右侧是一个显示`totalDuration`的标签。显示`totalDuration`的标签由一个监听器设置，该监听器附加到`MediaPlayer`的`totalDuration`属性上，类似于前面展示的`CurrentTimeListener`。每当`totalDuration`的值发生变化时，监听器会调用`formatDuration`方法来创建一个字符串作为标签的文本。用于格式化这两个值的`formatDuration`方法如清单\
  \ 9-20 所示。\n\n***清单 9-20.*** formatDuration 方法\n\n```java\nprivate String formatDuration(Duration\
  \ duration) {\n    double millis = duration.toMillis();\n    int seconds = (int)\
  \ (millis / 1000) % 60;\n    int minutes = (int) (millis / (1000 * 60));\n    return\
  \ String.format(\"%02d:%02d\", minutes, seconds);\n}\n```\n\n`formatDuration`方法接受一个`Duration`作为参数，并返回一个格式为*mm*:*ss*的字符串，其中*mm*是分钟，*ss*是秒。如果分钟和秒数只有一位数字，它们将用零填充。\n\
  \n位置滑块的第二部分工作是允许用户通过来回拖拽滑块来设置播放位置。这是通过监听`Slider`的`valueChangingProperty`的变化来实现的，如清单\
  \ 9-21 所示。\n\n***清单 9-21.*** 监听位置滑块变化并执行搜索\n\n```java\n@Override\nprotected Node\
  \ initView() {\n    // 控件的创建如清单 9-15 所示。\n    positionSlider = createSlider(\"positionSlider\"\
  );\n    positionSlider.valueChangingProperty().addListener(new PositionListener());\n\
  \    // 布局 GridPane 如清单 9-15 所示。\n}\n\nprivate class PositionListener implements\
  \ ChangeListener<Boolean> {\n    @Override\n    public void changed(ObservableValue<?\
  \ extends Boolean> observable,\n                        Boolean oldValue, Boolean\
  \ newValue) {\n        if (oldValue && !newValue) {\n            double pos = positionSlider.getValue();\n\
  \            final MediaPlayer mediaPlayer = songModel.getMediaPlayer();\n```\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 139](img/index-407_1.jpg)\n\
  \n第 9 章 ■ 使用媒体类\n\n\n\nfinal Duration seekTo = mediaPlayer.getTotalDuration().multiply(pos);\n\
  \nseekAndUpdatePosition(seekTo);\n\n}\n\n}\n\n}\n\n`PositionListener` 是一个 `ChangeListener`，它等待旧值为\
  \ `true`（值正在变化）且新值为 `false`（值不再变化）的状态。当满足这些条件时，我们知道用户已完成拖拽滑块，此时应跳转到新位置。新位置的计算方式为：将滑块的新值（范围从\
  \ 0.0 到 1.0）乘以 `MediaPlayer` 的 `totalDuration`，从而得到传递给 `seek` 方法的新 `Duration` 值。该值被传递给与清单\
  \ 9-18 中相同的 `seekAndUpdatePosition` 辅助方法，该方法负责处理调用 `seek` 方法的细节。\n\n**控制音量**\n\n\
  `MediaPlayer` 类有两个控制音频播放音量的属性。`volume` 属性的取值范围为 0.0（静音）到 1.0（最大音量）。此音量设置不会影响播放音频的计算机的主音量；它仅控制\
  \ `MediaPlayer` 使用的音量。`volume` 属性的默认值为 1.0。此外还有一个名为 `mute` 的布尔属性。当此变量设置为 `true`\
  \ 时，播放音量将被静音。尽管播放仍在继续，但不会听到任何声音。这实际上等同于将 `volume` 属性设置为 0.0，但静音播放允许您切断声音，并在之后轻松恢复到之前的音量级别，而无需读取和重置音量值。\n\
  \n音频播放器应用中的音量控制是一个 `Slider`，其值范围从 0.0 到 1.0。只需在 `Slider` 的 `value` 属性和 `MediaPlayer`\
  \ 的 `volume` 属性之间建立双向绑定，用户即可控制播放音量。\n\nvolumeSlider.valueProperty().bindBidirectional(mediaPlayer.volumeProperty());\n\
  \n至此，我们完成了对示例应用中播放器控件的介绍。我们并未展示监听 `mediaPlayer` 属性自身变化以干净地添加和移除监听器的代码。如果您有兴趣查看 `PlayerControlsView`\
  \ 的完整源代码，可以在本书第 9 章示例代码的 `AudioPlayer3` 项目中找到。图 9-6 展示了此时音频播放器的外观。\n\n***图 9-6.**\
  \ 音频播放器的播放控件。“只需在复平面上取一个点 z……”*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\n`MediaPlayer` 还公开了一个 `balance` 属性，用于控制音频的左右声道平衡。该变量的取值范围为 –1.0（仅从左扬声器播放）到\
  \ 1.0（仅从右扬声器播放）。如果播放的音频只有一条音轨（单声道），则该音轨将在两个扬声器上播放，而平衡控制将充当音量控制，允许您调整左或右扬声器的播放响度。如果音频有两条音轨（立体声），则左音轨从左扬声器播放，右音轨从右扬声器播放。在这种情况下，平衡控制允许您在左右音轨之间进行淡入淡出。`balance`\
  \ 变量的默认值为 0.0。音频播放器应用未提供任何调整平衡的控件；此处提及仅为了完整性。\n\n**重复播放**\n\n音频播放器示例应用未使用的另一个 `MediaPlayer`\
  \ 功能，但确实值得一提，那就是重复播放媒体的能力。您可以将播放设置为重复一定次数或无限重复。此行为由 `cycleCount` 属性控制。已完成的播放周期数可通过\
  \ `currentCount` 属性获取。当媒体播放结束时，`currentCount` 会递增，如果它小于 `cycleCount`，播放将自动重新开始。每当播放重复时，会调用\
  \ `onRepeat` 回调函数。通常的 `onEndOfMedia` 调用将在最后一次重复之后才进行。将 `cycleCount` 设置为 `MediaPlayer.INDEFINITE`\
  \ 值将导致播放无限循环。\n\n`MediaPlayer` 类中的 `startTime` 和 `stopTime` 属性可以影响媒体开始和停止播放的位置。顾名思义，这两个属性都是\
  \ `Duration` 类型。`startTime` 属性初始化为 0 毫秒，而 `stopTime` 初始化为 `totalDuration` 的值。如果设置了\
  \ `stopTime`，播放将在到达该时间时停止或重复。与此相关，`cycleDuration` 属性是一个只读属性，它提供当前 `startTime` 和\
  \ `stopTime` 之间的差值。\n\n设置播放重复的能力对于音频播放器来说将是一个便捷的功能。示例应用中目前尚未实现，但添加该功能对于热心的读者来说将是一个很好的练习。\n\
  \n**音频均衡**\n\nJavaFX 媒体 API 的两个非常酷的功能是创建音频均衡器和在音频播放时查看其实时频谱。均衡器允许您增强或衰减特定频率的音频。如果您正在可视化音频的频谱，这种变化将是可见的；这两个功能协同工作，为您或您的用户提供对播放体验的终极控制。\n\
  \n每个 `MediaPlayer` 都会创建一个 `AudioEqualizer` 实例，您可以使用 `getAudioEqualizer` 方法访问它。\n\
  \n`AudioEqualizer` 类有一个 `enabled` 属性，您可以使用它来启用或禁用均衡器。它还公开了一个 `EqualizerBand` 实例的\
  \ `ObservableList`。每个 `EqualizerBand` 都有 `bandwidth`、`centerFrequency` 和 `gain`\
  \ 属性。`bandwidth` 和 `centerFrequency` 属性允许您定义受该频段影响的频率范围，而 `gain` 属性则增强或衰减这些频率。这三个属性都是可变的。\n\
  \n当您获取对 `MediaPlayer` 均衡器的引用时，它已经定义了许多 `EqualizerBand`。\n\n您可以修改这些频段的设置，或者移除部分或全部频段，并用您自己的频段替换它们。\n\
  \n清单 9-22 展示了 `EqualizerView` 类的开头。这个新视图用于显示音频均衡器和实时频谱。它被添加在本书源代码的 `AudioPlayer4`\
  \ 示例项目中。\n\n***清单 9-22.*** EqualizerView 类\n\npublic class EqualizerView extends\
  \ AbstractView {\n\nprivate static final double START_FREQ = 250.0;\n\nprivate static\
  \ final int BAND_COUNT = 7;\n\npublic EqualizerView(SongModel songModel) {\n\nsuper(songModel);\n\
  \ncreateEQInterface();\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\n@Override\n\nprotected Node initView() {\n\nfinal GridPane gp\
  \ = new GridPane();\n\ngp.setPadding(new Insets(10));\n\ngp.setHgap(20);\n\nRowConstraints\
  \ middle = new RowConstraints();\n\nRowConstraints outside = new RowConstraints();\n\
  \noutside.setVgrow(Priority.ALWAYS);\n\ngp.getRowConstraints().addAll(outside, middle,\
  \ outside);\n\nreturn gp;\n\n}\n\nprivate void createEQInterface() {\n\nfinal GridPane\
  \ gp = (GridPane) getViewNode();\n\nfinal MediaPlayer mp = songModel.getMediaPlayer();\n\
  \ncreateEQBands(gp, mp);\n\n}\n\n// 待续...\n\n}\n\n\n\n这是我们新视图的第一部分。与所有自定义的 `AbstractView`\
  \ 类一样，我们需要重写 `initView` 方法，以便创建并返回视图的“根”节点。均衡器视图最终会在均衡器控件上方显示实时音频频谱。`GridPane` 再次成为显示由多行节点组成的内容的自然选择。第一行包含我们的频谱显示，中间行包含一组标识每个\
  \ `EqualizerBand` 中心频率的标签，最后一行由一行滑块组成，用于调整每个 `EqualizerBand` 的增益。因此，我们创建了两个行约束来控制这些行的尺寸行为。最后，返回新的\
  \ `GridPane` 实例，使其成为视图的根节点。\n\n由于 `initView` 是从超类构造函数中调用的，它会在 `EqualizerView` 构造函数的其余部分运行之前被调用。因此，当构造函数中调用\
  \ `createEQInterface` 时，`initView` 已经完成。这就是为什么我们可以在 `createEQInterface` 中调用 `getViewNode`\
  \ 方法来检索刚刚在 `initView` 中创建的 `GridPane`。`createEQInterface` 方法还会从 `songModel` 中检索当前的\
  \ `MediaPlayer` 实例，并将它们都传递给 `createEQBands` 方法，该方法会创建 `EqualizerBand` 实例以及用于操控每个频段增益的\
  \ `Slider` 控件。此方法如代码清单 9-23 所示。\n\n***代码清单 9-23.*** 创建均衡器频段\n\n```java\nprivate\
  \ void createEQBands(GridPane gp, MediaPlayer mp) {\n\n    final ObservableList<EqualizerBand>\
  \ bands =\n\n    mp.getAudioEqualizer().getBands();\n\n    bands.clear();\n\n  \
  \  double min = EqualizerBand.MIN_GAIN;\n\n    double max = EqualizerBand.MAX_GAIN;\n\
  \n    double mid = (max - min) / 2;\n\n    double freq = START_FREQ;\n\n    // 创建均衡器频段，增益预设为\n\
  \    // 一个漂亮的余弦波模式。\n    for (int j = 0; j < BAND_COUNT; j++) {\n\n        // 使用\
  \ j 和 BAND_COUNT 计算一个介于 0 和 2*pi 之间的值\n        double theta = (double)j / (double)(BAND_COUNT-1)\
  \ * (2*Math.PI);\n\n        // cos 函数计算一个介于 0 和 0.4 之间的缩放值\n        double scale\
  \ = 0.4 * (1 + Math.cos(theta));\n\n        // 将增益设置为介于中点和 0.9*max 之间的值。\n     \
  \   double gain = min + mid + (mid * scale);\n\n        bands.add(new EqualizerBand(freq,\
  \ freq/2, gain));\n\n        freq *= 2;\n\n    }\n\n    for (int i = 0; i < bands.size();\
  \ ++i) {\n\n        EqualizerBand eb = bands.get(i);\n\n        Slider s = createEQSlider(eb,\
  \ min, max);\n\n        final Label l = new Label(formatFrequency(eb.getCenterFrequency()));\n\
  \n        l.getStyleClass().addAll(\"mediaText\", \"eqLabel\");\n\n        GridPane.setHalignment(l,\
  \ HPos.CENTER);\n\n        GridPane.setHalignment(s, HPos.CENTER);\n\n        GridPane.setHgrow(s,\
  \ Priority.ALWAYS);\n\n        gp.add(l, i, 1);\n\n        gp.add(s, i, 2);\n\n\
  \    }\n\n}\n\nprivate Slider createEQSlider(EqualizerBand eb, double min, double\
  \ max) {\n\n    final Slider s = new Slider(min, max, eb.getGain());\n\n    s.getStyleClass().add(\"\
  eqSlider\");\n\n    s.setOrientation(Orientation.VERTICAL);\n\n    s.valueProperty().bindBidirectional(eb.gainProperty());\n\
  \n    s.setPrefWidth(44);\n\n    return s;\n\n}\n\nprivate String formatFrequency(double\
  \ centerFrequency) {\n\n    if (centerFrequency < 1000) {\n\n        return String.format(\"\
  %.0f Hz\", centerFrequency);\n\n    } else {\n\n        return String.format(\"\
  %.1f kHz\", centerFrequency / 1000);\n\n    }\n\n}\n```\n\n`createEQBands` 方法首先从与当前\
  \ `MediaPlayer` 关联的 `AudioEqualizer` 中获取 `EqualizerBand` 列表。然后清空该列表，为我们想要创建的频段腾出空间。当前平台上\
  \ `EqualizerBand` 的最小和最大增益可以通过 `EqualizerBand.MIN_GAIN` 和 `EqualizerBand.MAX_GAIN`\
  \ 常量访问。在涉及有效增益值范围的计算中，应始终使用这些常量。我们使用它们来定义 `min`、`max` 和 `mid`（增益范围的中点）变量。然后，一个 `for`\
  \ 循环创建由 `BAND_COUNT` 常量定义数量的 `EqualizerBand`，并将其增益值设置为一个漂亮的余弦波模式。这种模式强调了低音和高频范围，形成了一组不错的默认值。\n\
  \n之后，第二个 `for` 循环遍历我们刚刚创建的 `EqualizerBand` 实例列表，并为每个实例创建一个对应的 `Slider` 控件和频率 `Label`。每个\
  \ `Slider` 由 `createEQSlider` 方法创建。在该方法内部，新 `Slider` 的 `value` 属性与 `EqualizerBand`\
  \ 的 `gain` 属性进行双向绑定。这是让用户控制频段增益的关键部分。请注意，每个 `Slider` 还被赋予了一个 `eqSlider` 样式类。我们稍后将使用这个类为均衡器显示添加一些漂亮的样式。\n\
  \n`createEQBands` 方法的最后一步是设置 `Slider` 和 `Label` 的对齐方式和增长约束，并将它们添加到 `GridPane` 布局节点中。`Slider`\
  \ 被设置为水平增长，以便 `GridPane` 能够扩展以填充窗口的宽度。当然，通过设置 `Label` 增长也可以达到同样的效果，但那样我们还需要重置 `Label`\
  \ 的最大尺寸，因为默认情况下，所有 `Label` 的最大尺寸都等于其首选尺寸。`Label` 和 `Slider` 填充 `GridPane` 的第一行和第二行，将第零行留给频谱显示。\n\
  \n`MediaPlayer` 有四个属性用于处理当前音频轨道的频谱：`audioSpectrumListener`、`audioSpectrumInterval`、`audioSpectrumNumBands`\
  \ 和 `audioSpectrumThreshold`。`audioSpectrumListener` 属性是 `AudioSpectrumListener`\
  \ 接口的一个实例。您可以使用 `MediaPlayer` 的 `setAudioSpectrumListener` 方法来附加监听器，这将启用频谱数据的计算，并定期向监听器的\
  \ `spectrumDataUpdate` 方法发送更新。再次调用 `setAudioSpectrumListener` 并传入 `null` 值将关闭音频频谱计算和更新。\n\
  \n`audioSpectrumInterval` 属性允许您控制向 `AudioSpectrumListener` 发送更新的间隔。该值以秒为单位指定，其默认值为\
  \ 0.1 秒，这意味着默认情况下您的监听器每秒将收到 10 次频谱更新。将向监听器报告的频谱频段数量由 `audioSpectrumNumBands` 属性控制。`audioSpectrumThreshold`\
  \ 属性定义了将为给定频谱频段报告的最小值。该值的单位是分贝，且必须小于零。\n\n代码清单 9-24 突出了需要添加到 `createEQInterface`\
  \ 方法中的内容，以创建显示音频频谱的控件。\n\n***代码清单 9-24.*** 创建频谱显示\n\n```java\nprivate void createEQInterface()\
  \ {\n\n    final GridPane gp = (GridPane) getViewNode();\n\n    final MediaPlayer\
  \ mp = songModel.getMediaPlayer();\n\n    createEQBands(gp, mp);\n\n    **createSpectrumBars(gp,\
  \ mp);**\n\n    **spectrumListener = new SpectrumListener(START_FREQ, mp, spectrumBars);**\n\
  \n}\n\nprivate void createSpectrumBars(GridPane gp, MediaPlayer mp) {\n\n    spectrumBars\
  \ = new SpectrumBar[BAND_COUNT];\n\n    for (int i = 0; i < spectrumBars.length;\
  \ i++) {\n\n        spectrumBars[i] = new SpectrumBar(100, 20);\n\n        spectrumBars[i].setMaxWidth(44);\n\
  \n        GridPane.setHalignment(spectrumBars[i], HPos.CENTER);\n\n        gp.add(spectrumBars[i],\
  \ i, 0);\n\n    }\n\n}\n```\n\n\n\n`createSpectrumBars` 方法会创建一个新的 `SpectrumBar`\
  \ 控件数组，每个控件对应之前创建的一个均衡器频段。`SpectrumBar` 是一个自定义控件类，它扩展了 `VBox`，用于在垂直堆叠中排列一系列 `Rectangle`\
  \ 节点。构造函数的参数决定了条形的最大值（本例中为 100）以及堆叠中 `Rectangle` 节点的数量（我们将其设置为 20）。该控件有一个 `setValue`\
  \ 方法，用于确定有多少个条形被点亮。例如，如果我们设置值为 50（最大值为 100），则一半的条形（本例中为 10 个）会被点亮。每个 `SpectrumBar`\
  \ 的最大宽度设置为 44，以匹配均衡器滑块（sliders）的宽度。然后，每个条形都被添加到 `GridPane` 布局的第零行，并在其 `GridPane`\
  \ 单元格内水平居中。图 9-7\\. W 展示了该控件的几个示例。我们没有列出 `SpectrumBar` 的代码，因为创建自定义控件并非本章的重点。如果你想查看此控件的源代码，可以在\
  \ AudioPlayer4 示例项目的 `SpectrumBar.java` 文件中找到。\n\n***图 9-7.** 一行六个 SpectrumBar 控件*\n\
  \n清单 9-24 还展示了 `createEQInterface` 方法中的一行新代码，该代码实例化了 `SpectrumListener` 类的一个新实例。这个类实现了\
  \ `AudioSpectrumListener` 接口。它的任务是监听频谱数据更新，计算我们定义的每个均衡器频段内频率的幅度，并用这个计算值更新相应的 `SpectrumBar`。清单\
  \ 9-25 展示了该类及其初始化代码。\n\n***清单 9-25.*** SpectrumListener 类\n\nclass SpectrumListener\
  \ implements AudioSpectrumListener {\n\nprivate final SpectrumBar[] bars;\n\nprivate\
  \ double minValue;\n\nprivate double[] norms;\n\nprivate int[] spectrumBucketCounts;\n\
  \nSpectrumListener(double startFreq, MediaPlayer mp, SpectrumBar[] bars) {\n\nthis.bars\
  \ = bars;\n\nthis.minValue = mp.getAudioSpectrumThreshold();\n\nthis.norms = createNormArray();\n\
  \nint bandCount = mp.getAudioSpectrumNumBands();\n\nthis.spectrumBucketCounts =\
  \ createBucketCounts(startFreq, bandCount);\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\npublic void spectrumDataUpdate(double timestamp, double duration,\n\
  \nfloat[] magnitudes, float[] phases) {\n\n// 如清单 9-26 所示。\n\n}\n\nprivate double[]\
  \ createNormArray() {\n\ndouble[] normArray = new double[bars.length];\n\ndouble\
  \ currentNorm = 0.05;\n\nfor (int i = 0; i < normArray.length; i++) {\n\nnormArray[i]\
  \ = 1 + currentNorm;\n\ncurrentNorm *= 2;\n\n}\n\nreturn normArray;\n\n}\n\nprivate\
  \ int[] createBucketCounts(double startFreq, int bandCount) {\n\nint[] bucketCounts\
  \ = new int[bars.length];\n\ndouble bandwidth = 22050.0 / bandCount;\n\ndouble centerFreq\
  \ = bandwidth / 2;\n\ndouble currentSpectrumFreq = centerFreq;\n\ndouble currentEQFreq\
  \ = startFreq / 2;\n\ndouble currentCutoff = 0;\n\nint currentBucketIndex = -1;\n\
  \nfor (int i = 0; i < bandCount; i++) {\n\nif (currentSpectrumFreq > currentCutoff)\
  \ {\n\ncurrentEQFreq *= 2;\n\ncurrentCutoff = currentEQFreq + currentEQFreq / 2;\n\
  \n++currentBucketIndex;\n\nif (currentBucketIndex == bucketCounts.length) {\n\n\
  break;\n\n}\n\n}\n\n++bucketCounts[currentBucketIndex];\n\ncurrentSpectrumFreq +=\
  \ bandwidth;\n\n}\n\nreturn bucketCounts;\n\n}\n\n}\n\n`SpectrumListener` 的构造函数接受三个参数。第一个是第一个均衡器频段的中心频率。第二个是此监听器将要附加到的\
  \ `MediaPlayer` 实例。第三个是监听器将要更新的 `SpectrumBar` 控件数组。此数组保存在类的实例数据中供以后使用。`MediaPlayer`\
  \ 实例用于在初始化期间获取监听器所需的数据。这包括 `audioSpectrumNumBands` 属性的值以及 `audioSpectrumThreshold`\
  \ 的值。如果在调用 `SpectrumListener` 构造函数后这两个值中的任何一个发生更改，监听器的计算结果可能会略有偏差。我们知道 AudioPlayer4\
  \ 不会这样做，但如果你必须处理这种情况，则需要绑定或附加监听器到这些属性，以便在发生更改时得到通知。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 使用媒体类\n\n然后，构造函数初始化一个名为 `normArray` 的归一化数组。这是一个双精度值数组，用于归一化稍后为每个均衡器频段频率范围计算的幅度值。归一化因子试图补偿这样一个事实：每个后续均衡器频段的带宽都会加倍，但我们仍然希望在\
  \ `SpectrumBar` 控件中以相同的比例显示所有频段。\n\n从构造函数调用的最后一段初始化代码是 `createBucketCounts` 方法。此方法的任务是计算出每个均衡器频段内包含多少个频谱频段。它创建了“桶”（buckets），我们稍后可以将每个频谱频段的幅度累加到这些桶中，从而轻松确定它们对应于哪个均衡器频段。桶计数存储在一个与\
  \ `SpectrumBar` 数组长度相同的整型数组中；也就是说，每个 `SpectrumBar` 对应一个桶。\n\n为了开始桶的计算，我们假设频谱数据将覆盖高达\
  \ 22.05 kHz 的频率，这对于音乐来说是一个很好的假设。语音音频（仅人声）通常覆盖的频率范围要小得多，但媒体引擎提供的频谱数据将覆盖全部 22.05 kHz。我们将这个最大频率除以音频频谱频段的数量，得出每个频段的带宽。带宽的一半给出了第一个频段的中心频率。然后，我们继续设置\
  \ `for` 循环内部使用的变量的初始值。这些值的设置使得在第一次循环时，`currentSpectrumFreq` 的值（初始化为第一个频谱频段的中心频率）大于\
  \ `currentCutoff` 频率（初始化为零），从而触发循环变量的重新计算。我们这样做是为了不必将循环的第一次迭代与后续迭代区别对待。\n\n第一次迭代之后，所有循环变量都按预期设置好，第一个桶的计数增加。然后循环继续检查每个频谱频段的中心频率。如果它大于当前均衡器频段的截止频率，则桶索引增加，并且对应于下一个均衡器频率的桶开始递增。完成后，我们得到一个数组，它告诉我们每个均衡器频段中包含多少个频谱频段。\n\
  \n这个桶数组使我们能够快速累加每个频谱频段的幅度，并在监听器的 `spectrumDataUpdate` 方法期间将它们分配给正确的均衡器频段。这种优化是个好主意，因为\
  \ `spectrumDataUpdate` 每秒发生 10 次。监听器的 `spectrumDataUpdate` 方法的代码如清单 9-26 所示。\n\n\
  ***清单 9-26.*** SpectrumListener 的 spectrumDataUpdate 方法\n\n@Override\n\npublic void\
  \ spectrumDataUpdate(double timestamp, double duration,\n\nfloat[] magnitudes, float[]\
  \ phases) {\n\nint index = 0;\n\nint bucketIndex = 0;\n\nint currentBucketCount\
  \ = 0;\n\ndouble sum = 0.0;\n\n\n\nwhile (index < magnitudes.length) {\n\nsum +=\
  \ magnitudes[index] - minValue;\n\n++currentBucketCount;\n\nif (currentBucketCount\
  \ >=spectrumBucketCounts[bucketIndex]) {\n\nbars[bucketIndex].setValue(sum / norms[bucketIndex]);\n\
  \ncurrentBucketCount = 0;\n\nsum = 0.0;\n\n++bucketIndex;\n\n}\n\n++index;\n\n}\n\
  \n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 9 章 ■ 使用媒体类\n\n`spectrumDataUpdate`方法接收四个参数。`timestamp`参数以秒为单位给出更新的时间。`duration`是频谱计算所持续的秒数，该时长通常应近似等于`MediaPlayer`的`audioSpectrumInterval`属性值。`magnitudes`数组将保存与每个频谱波段幅度对应的浮点数值。数组长度始终等于`MediaPlayer`的`audioSpectrumNumBands`属性值。该值以分贝为单位，范围在`audioSpectrumThreshold`和零之间，且始终小于零。类似地，`phases`数组包含每个频谱波段的相位偏移。由于`MediaPlayer`可能在两次更新之间复用这些数组，监听器应将其视为只读。\n\
  \n就我们的目的而言，我们只是试图让用户大致了解每个均衡器频段中的频谱内容。因此，我们只需关注`magnitudes`数组。我们遍历该数组，并使用桶计数来累加与每个均衡器频段对应的波段的幅度。当达到每个桶的计数时，将当前总和除以归一化因子，然后作为值传递给对应的`SpectrumBar`。接着重置这些值，并计算下一个频段的总和。\n\
  \n现在，我们能够创建一组自定义的`EqualizerBand`，并根据当前正在播放的音频信号计算出的每个频段的频率幅度进行显示。这为应用程序的用户提供了一个相当不错的均衡器界面。我们确实需要确保每当创建新的`MediaPlayer`（加载新歌曲）时，都重新初始化均衡器界面。附加到`SongModel`的`mediaPlayer`属性上的监听器负责处理此操作，如代码清单\
  \ 9-27 所示。\n\n***代码清单 9-27.*** EqualizerView 的 MediaPlayer 监听器\n\nprivate class\
  \ MediaPlayerListener implements ChangeListener<MediaPlayer> {\n\n@Override\n\n\
