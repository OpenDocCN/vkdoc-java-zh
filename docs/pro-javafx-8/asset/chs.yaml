  \n### 使用 StackedBarChart\n\nStackedBarChart 是在 JavaFX 2.1 中新增的。StackedBarChart 与\
  \ BarChart 一样，以柱状条的形式显示数据，但不同的是，StackedBarChart 将同一类别中的柱状条上下堆叠显示，而不是并排显示。这通常使得检查总计值更加容易。\n\
  \n通常，类别对应于数据系列中的公共键值。因此，在我们的示例中，不同的年份（2011、2012、……2020）可以被视为类别。我们可以按如下方式将这些类别添加到\
  \ xAxis：\n\n```java\nIntStream.range(2011,2020).forEach(t -> xAxis.getCategories().add(String.valueOf(t)));\n\
  ```\n\n除此之外，唯一的代码更改是在代码和导入语句中将 `BarChart` 替换为 `StackedBarChart`。这产生了清单 8-9 中的代码片段。\n\
  \n***清单 8-9.*** 使用 StackedBarChart 替代 ScatterChart\n\n```java\npublic void start(Stage\
  \ primaryStage) {\n\n    CategoryAxis xAxis = new CategoryAxis();\n\n    IntStream.range(2011,2020).forEach(t\
  \ -> xAxis.getCategories().add(String.valueOf(t)));\n\n    NumberAxis yAxis = new\
  \ NumberAxis();\n\n    StackedBarChart stackedBarChart = new StackedBarChart(xAxis,\
  \ yAxis, getChartData());\n\n    stackedBarChart.setTitle(\"speculations\");\n\n\
  \    primaryStage.setTitle(\"StackedBarChart example\");\n\n    StackPane root =\
  \ new StackPane();\n\n    root.getChildren().add(stackedBarChart);\n\n    Scene\
  \ scene = new Scene(root, 400, 250);\n\n    primaryStage.setScene(scene);\n\n  \
  \  primaryStage.show();\n\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
