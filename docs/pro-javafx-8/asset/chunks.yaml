    FXML 文件加载工具由两个类、一个接口、一个异常以及 `javafx.fxml` 包中的一个注解组成。`FXMLLoader` 是承担大部分工作的类，例如读取和解析
    FXML 文件、识别 FXML 文件中的处理指令并做出必要的响应、识别 FXML 文件的每个元素和属性并将对象创建任务委托给一组构建器、在必要时创建控制器对象并将节点和其他对象注入到控制器中。`JavaFXBuilderFactory`
