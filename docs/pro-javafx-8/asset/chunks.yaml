    现在我们已经了解了预定义和用户定义的 3D 形状，接下来将介绍 JavaFX 3D 图形 API 中的其他重要类。


    向 JavaFX 3D 场景添加摄像机


    到目前为止，在本章中，我们还没有向 JavaFX 3D 场景添加自己的摄像机。我们一直依赖 JavaFX 运行时提供给场景的默认摄像机。它允许我们从负 *z*
    位置观察场景。要从任何其他角度观察场景，我们需要提供自己的摄像机。


    摄像机的类层次结构由一个抽象基类 `Camera` 及其具体子类 `ParallelCamera` 和 `PerspectiveCamera` 组成。它们属于
    `javafx.scene` 包。当我们没有设置自己的摄像机时，JavaFX 运行时提供的摄像机就是 `ParallelCamera`。无论物体距离摄像机多远，它总是以相同的大小显示物体。这被称为*正交投影*，虽然计算起来容易得多，但看起来并不真实。对于
    3D 建模来说，`PerspectiveCamera` 更有趣。使用 `PerspectiveCamera` 时，远处的物体比近处的物体小。


    理解 PerspectiveCamera


    `PerspectiveCamera` 类具有以下公共构造函数：


    • `PerspectiveCamera()`


    • `PerspectiveCamera(boolean fixedEyeAtCameraZero)`


    默认构造函数创建一个 `PerspectiveCamera`，其 `fixedEyeAtCameraZero` 设置为 `false`。单参数构造函数创建一个
    `PerspectiveCamera`，其 `fixedEyeAtCameraZero` 为指定值。摄像机是 `Node`，可以放置在 JavaFX 场景中。新创建的
    `PerspectiveCamera`，就像新创建的 `Sphere`、`Cylinder` 或 `Box` 一样，其中心或眼睛位于三维空间的原点 (0,
    0, 0)。眼睛朝向正 *z* 方向。作为 `Node`，`PerspectiveCamera` 本身可以通过 3D 变换（如旋转、平移、缩放，甚至通用的
    `Affine`）进行变换。将 `fixedEyeAtCameraZero` 设置为 `true` 可以保证在此类变换之后，`PerspectiveCamera`
    的眼睛随之移动，并保持在摄像机的零位置。将 `fixedEyeAtCameraZero` 设置为 `false` 允许眼睛偏离摄像机的零位置，以适应场景中的内容。这对于渲染
    2D 场景很有用，并且仅在摄像机本身未以任何方式变换时才有意义。因此，对于 3D 模型的使用，您应始终使用单参数构造函数，并传入 `fixedEyeAtCameraZero`
    为 `true`。


    `PerspectiveCamera` 类具有以下公共方法：


    • `void setFieldOfView(double)`


    • `double getFieldOfView()`


    • `DoubleProperty fieldOfViewProperty()`


    • `void setVerticalFieldOfView(boolean)`


    • `boolean isVerticalFieldOfView()`


    • `BooleanProperty verticalFieldOfViewProperty()`


    • `boolean isFixedEyeAtCameraZero()`


    这些方法为 `PerspectiveCamera` 类定义了两个属性：`fieldOfView` 和 `verticalFieldOfView`。`fieldOfView`
    是一个 `double` 属性，表示透视摄像机的视野，单位为度。

    '
