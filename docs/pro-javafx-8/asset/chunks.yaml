    方法内部安全地更新活动场景图节点成为可能。其中一项更新是设置 playPauseIcon（一个 ImageView 节点）的图像，如 updateStatus
    方法中高亮显示的代码所示。


    我们还会更新用作状态显示的 statusLabel 的文本（请参考图 9-5），并在状态发生变化时启用或禁用播放控件和位置滑块。如果 MediaPlayer
    的状态是 UNKNOWN 或 null，则播放器尚未准备好开始播放，我们通过显示“Buffering”字符串并禁用播放控件来指示此状态。任何其他 MediaPlayer
    状态都会导致显示其名称并启用播放控件。


    状态显示以带有边框的文本字符串形式呈现。这只需通过使用一个带有额外样式的 Label 控件即可实现，如下面的代码所示。


    .statusDisplay {


    -fx-border-color: white;


    -fx-border-radius: 2;


    -fx-border-width: 1;


    -fx-text-fill: white;


    -fx-font-size: 10pt;


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 9 章 ■ 使用媒体类


    播放功能的最后一部分是在媒体播放结束时停止播放。MediaPlayer 在媒体播放结束时（严格来说，是到达 stopTime 时；更多信息请参见“定位”部分）不会自动停止播放。你可以通过将
    MediaPlayer 的 onEndOfMedia 回调属性设置为一个调用 MediaPlayer 上 stop 方法的 Runnable 来显式停止播放。


    songModel.getMediaPlayer().setOnEndOfMedia(() -> {


    songModel.getMediaPlayer().stop();


    });


    调用 MediaPlayer 的 stop 方法会将状态设置为 STOPPED，并通过将 currentTime 设置为 0 将播放位置重置到媒体的开头。


    ■ **注意** 所有 MediaPlayer 的回调属性，例如 onEndOfMediaProperty、onError 和 onReadyProperty，都是
    Runnable 而不是像 JavaFX API 其他部分那样使用 EventHandler，这看起来可能有点奇怪。Oracle 的 JavaFX 团队表示这只是一个疏忽。


    作为关于播放的最后一点说明，MediaPlayer 还包含一个名为 autoPlay 的属性。如果将此布尔属性设置为 true，它将导致播放尽快开始。有时它有点过于激进，我们发现当对音频文件使用此功能时，播放有时会暂停甚至在一两秒后重新开始。因此，我们建议在正常情况下使用
    play 方法，并且仅在播放中潜在的故障不是严重问题，并且你只想“一劳永逸”地播放时，才使用 autoPlay。


    定位


    名为 currentTime 的只读属性始终包含 MediaPlayer 的当前播放位置。此属性的类型为 Duration，并且只能通过使用 seek 方法来设置。你可以使用
    seek 方法将播放位置移动到当前 startTime 和 stopTime 之间的任何时间点。MediaPlayer 的 startTime 和 stopTime
    属性分别初始化为 0 和 totalDuration，其中 totalDuration 属性（也是只读的）指定了媒体的总时长。如果 MediaPlayer
    当前处于 STOPPED 状态，则 seek 方法无效。


    音频播放器应用程序中的三个控件使用了 MediaPlayer 的定位功能。也许最明显的是位于 playPauseButton 两侧的“定位到开头”和“定位到结尾”按钮。这些按钮显示的图标由指向左侧（定位到开头）和右侧（定位到结尾）的双三角形组成。清单
    9-18 显示了来自 PlayerControlsView 类的 createControlPanel 方法，其中创建了这些按钮。


    ***清单 9-18.*** 创建包含播放/暂停按钮和定位按钮的面板

    private Node createControlPanel() {


    final HBox hbox = new HBox();


    hbox.setAlignment(Pos.CENTER);


    hbox.setFillHeight(false);


    final Button playPauseButton = createPlayPauseButton();


    final Button seekStartButton = new Button();


    seekStartButton.setId("seekStartButton");


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 9 章 ■ 使用媒体类


    seekStartButton.setOnAction(event -> {


    seekAndUpdatePosition(Duration.ZERO);


    });


    final Button seekEndButton = new Button();


    seekEndButton.setId("seekEndButton");


    seekEndButton.setOnAction(event -> {


    final MediaPlayer mediaPlayer = songModel.getMediaPlayer();


    final Duration totalDuration = mediaPlayer.getTotalDuration();


    final Duration oneSecond = Duration.seconds(1);


    seekAndUpdatePosition(totalDuration.subtract(oneSecond));


    });


    hbox.getChildren().addAll(seekStartButton, playPauseButton, seekEndButton);


    return hbox;


    }


    private void seekAndUpdatePosition(Duration duration) {


    final MediaPlayer mediaPlayer = songModel.getMediaPlayer();


    if (mediaPlayer.getStatus() == Status.STOPPED) {


    mediaPlayer.pause();


    }


    mediaPlayer.seek(duration);


    if (mediaPlayer.getStatus() != Status.PLAYING) {


    updatePositionSlider(duration);


    }


    }

