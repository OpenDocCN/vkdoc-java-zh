  raw: 'The Resume button is only disabled when the timeline is not paused. To resume
    the timeline from where it was paused, the action event handler calls the play()
    method of the timeline.


    Finally, the Stop button is disabled when the timeline is stopped. To stop the
    timeline, the action event handler calls the stop() method of the timeline.


    Now that you know how to animate nodes by creating a Timeline class and creating
    KeyFrame instances, it’s time to learn how to use the transition classes to animate
    nodes.


    Using the Transition Classes for Animation


    Using a TimeLine allows for very flexible animations. There are a number of common
    animations facilitating the translation from one state to another that are out-of-the
    box supported by JavaFX. The javafx.animation package contains several classes
    whose purpose is to provide convenient ways to do these commonly used animation
    tasks.


    Both TimeLine and Transition (the abstract root class for all concrete transitions)
    extend the Animation class.


    Table [2-1 con](#index_split_000.html#p66)tains a list of transition classes in
    that package.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 2 ■ Creating a User interfaCe in JavafX


    ***Table 2-1.** Transition Classes in the javafx.animation Package for Animating
    Nodes* **Transition Class Name**


    **Description**


    TranslateTransition


    Translates (moves) a node from one location to another over a given period of
    time.


    This was employed in the Hello Earthrise example program in Chapter 1.


    PathTransition


    Moves a node along a specified path.


    RotateTransition


    Rotates a node over a given period of time.


    ScaleTransition


    Scales (increases or decreases the size of) a node over a given period of time.


    FadeTransition


    Fades (increases or decreases the opacity of) a node over a given period of time.


    FillTransition


    Changes the fill of a shape over a given period of time.


    StrokeTransition


    Changes the stroke color of a shape over a given period of time.


    PauseTransition


    Executes an action at the end of its duration; designed mainly to be used in a


    SequentialTransition as a means to wait for a period of time.


    SequentialTransition


    Allows you to define a series of transitions that execute sequentially.


    ParallelTransition


    Allows you to define a series of transitions that execute in parallel.


    Let’s take a look at a variation on the metronome theme in which we create a metronome
    using TranslateTransition for the animation.


    The MetronomeTransition Example


    When using the transition classes, we take a different approach toward animation
    than when using the Timeline class directly:


    • TIn the timeline-based Metronome1 program, we bound a property of a node (specifically,
    startX) to a property in the model (startXVal), and then used the timeline to
    interpolate the value of the property in the model.


    • When using a transition class, however, we assign values to the properties of
    the Transition subclass, one of which is a node. The net result is that the node
    itself is affected, rather than just a bound attribute of the node being affected.


    The distinction between these two approaches becomes clear as we walk through
    the MetronomeTransition example. Figure [2-9 sho](#index_split_000.html#p67)ws
    a screenshot of this program when it is first invoked.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 33](index-67_1.jpg)


    Chapter 2 ■ Creating a User interfaCe in JavafX


    ***Figure 2-9.** The MetronomeTransition program*


    The first noticeable difference between this example and the previous (Metronome1)
    example is that instead of one end of a line moving back and forth, we’re going
    to make a Circle node move back and forth.


    The Behavior of the MetronomeTransition Program


    Go ahead and run the program, and perform the same steps that you did in the previous
    exercise with Metronome1.


    Everything should function the same, except for the visual difference pointed
    out previously.


