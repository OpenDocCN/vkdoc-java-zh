    ![Image 136](index-386_1.jpg)


    Chapter 9 ■ Using the Media Classes


    AudioClips are very useful for playing short, low-latency sound effects. If you
    need to play songs or background music instead, the JavaFX media classes are a
    better choice.


    Working with Media


    The JavaFX media classes make it very easy to work with audio and video files
    by simply treating them as two different types of media. Therefore, the basic
    playback of an audio or video file can be accomplished using only a few lines
    of (nearly identical) code. On the other hand, there is also some depth to the
    API that allows you to go beyond simple playback to enhance the experience for
    your users. In the remainder of this chapter, we start with simple audio playback
    and then show you how to tap into the power of this API and take your media-based
    applications to the next level.


    The JavaFX media classes are located in the javafx.scene.media package. There
    are three main classes—Media, MediaPlayer, and MediaView—as well as a number of
    supporting classes. The Media class encapsulates the audio or video resource to
    be played. The string representation of the URI identifying this resource is passed
    to the Media constructor as its only argument. The Media object exposes properties
    that describe the media’s width and height (when dealing with video), its duration,
    and two properties related to error handling. Once constructed, a Media object
    can be passed to the constructor of a MediaPlayer instance, which provides a set
    of methods for controlling the playback of the audio or video resource. And finally,
    a MediaPlayer can be passed to the constructor of a MediaView node for the video
    to be displayed in the scene graph. The relationship among these three classes
    is illustrated in Figure [9-3](#index_split_005.html#p386). [2](#index_split_005.html#p386)


    ***Figure 9-3.** The JavaFX 8 media classes*


    2Naturally the invaders are initially greeted with fear and distrust. In a surprise
    plot twist, they turn out to be a competent and helpful group of people.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 9 ■ Using the Media Classes


    It bears repeating that of these three classes, only MediaView is a Node and therefore
    capable of being inserted into the scene graph. This means we have taken a slight
    liberty in showing a set of visual controls associated with the MediaPlayer class
    in Figure [9-3\. I](#index_split_005.html#p386)n reality, you will have to create
    your own buttons and sliders, wired to MediaPlayer methods, to allow the user
    to control the playback of the media in your application. We have plenty of opportunity
    to show you how to do this in the examples that follow in this chapter. Let’s
    begin our in-depth look at these media classes by creating an application that
    plays audio files.


    Playing Audio


    Playing audio files involves only the Media and MediaPlayer classes. There is
    no video to deal with, thus no MediaView is needed. Listing 9-6 shows the minimum
    amount of code needed to play audio with JavaFX.


    ***Listing 9-6.*** A Very Simple Application That Plays an Audio File


    public class AudioPlayer1 extends Application {


    public static void main(String[] args) {


    launch(args);


    }


    @Override


    public void start(Stage primaryStage) {


    URL resource = getClass().getResource("resources/keeper.mp3");


    Media media = new Media(resource.toString());


    MediaPlayer mediaPlayer = new MediaPlayer(media);


    mediaPlayer.play();


    primaryStage.setTitle("Audio Player 1");


    primaryStage.setWidth(200);


    primaryStage.setHeight(200);


    primaryStage.show();


    }


    }


    This simplistic application starts by finding the URL of an audio file resource
    that is packaged within its jar file.


    The String form of the resource URL is passed as the source parameter to the Media
    constructor. The Media class can also load resources from the Internet or from
    the local file system just like an AudioClip. Once the Media object is constructed,
    it is used to construct a new MediaPlayer and the MediaPlayer’s play method is
    called to begin playback. This application has no actual scene to display, so
    the width and height of the Stage are set to 200 so that the resulting window
    will be visible. If your audio needs are no more complicated than loading a sound
    file and playing it, your job is now finished. However, the code in Listing 9-6
    is not exactly production quality yet.


    ■ **Note** Once a MediaPlayer is created, its Media object cannot be changed.
    if you wish to change the song or video that is currently playing, you must create
    a new MediaPlayer for the new Media object. Multiple MediaPlayers can share one
    Media object.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 9 ■ Using the Media Classes


    Error Handling


    The Media class has two properties, error and onError, that help you deal with
    any errors that occur during playback. You can manually check for errors by calling
    the getError method, which will return a MediaException object from the underlying
    errorProperty if an error has occurred. You can listen for errors by attaching
    an InvalidationListener or ChangeListener to the errorProperty of the Media class.
    As a convenience, you can simply pass a Runnable to the setOnError method to achieve
    the same result. The Runnable’s run method will be called if an error occurs.
    It is safe to update the scene graph from the run method inasmuch as it is called
    on the JavaFX


    application thread.


    Media instances are rarely used on their own. Normally they will be passed to
    a MediaPlayer as a constructor argument. The MediaPlayer class replicates the
    error and onError properties of Media, and all Media errors are forwarded to the
    error property and the onError callback of the enclosing MediaPlayer instance.
    Therefore, you only need to use the MediaPlayer error properties to catch errors
    from both the MediaPlayer and its underlying Media object all in one place.


    Exceptions, including MediaExceptions, can also occur during the construction
    of a Media or MediaPlayer instance. Obviously these exceptions will not be available
    in the object’s error property because the object does not exist yet. If you want
    to be thorough in your error handling, you should also enclose your constructors
    in try-catch blocks in addition to setting MediaPlayer’s onError handler. This
    error-handling technique is demonstrated in Listing 9-7.


    ***Listing 9-7.*** Error Handling with the Media Classes


    try {


    final URL resource = getClass().getResource("resources/keeper.mp3");


    final Media media = new Media(resource.toString());


    final MediaPlayer mediaPlayer = new MediaPlayer(media);


    mediaPlayer.setOnError(() -> {


    final String errorMessage = media.getError().getMessage();


    ...


    });


    mediaPlayer.play();


    } catch (RuntimeException re) {


    // Handle Media and MediaPlayer construction errors...


    }


