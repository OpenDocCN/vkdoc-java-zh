    就是这种情况。如果你填充此数组，则必须用与概念面数量相同的元素来填充它，该数量是实际面数组长度的六分之一，因为我们把实际面数组中的六个 `int` 元素视为构成一个概念面。面平滑组数组中的每个元素代表
    3D 形状的一个面，当每个 `int` 值被视为 32 个独立位时，当且仅当两个面的表示共享一个公共的开启位时，它们才属于同一个平滑组。一个 `TriangleMesh`
    中最多可以有 32 个面平滑组。


    `getPointElementSize()` 方法始终返回 3。`getTexCoordElementSize()` 方法始终返回 2。`getFaceElementSize()`
    方法始终返回 6。


    3D 形状中的每个面都有两侧。在 3D 图形编程中，区分这两侧为正面或背面非常重要。JavaFX 3D 使用逆时针绕序来定义正面。想象你站在三角形的一侧，并按照面定义中每个顶点出现的顺序追踪三角形的边。如果你发现是以逆时针方式追踪边，那么你就站在该面的正面。面的正面和背面这一概念正是
    `CullFace.FRONT` 和 `CullFace.BACK` 枚举声明符所指代的。默认情况下，`Shape3D` 使用 `CullFace.BACK`
    设置，这意味着面的背面不会被渲染。


    清单 10-4 中的程序演示了在 JavaFX 中使用用户定义的 3D 形状。


