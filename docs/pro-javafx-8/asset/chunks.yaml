    \n## Chapter 1: Getting a Jump Start in JavaFX\n\n### Understanding the Hello\
    \ Earthrise Program\n\nNow that you’ve run the application, let’s walk through\
    \ the program listing together. The code for the Hello Earthrise application is\
    \ shown in Listing 1-1.\n\n***Listing 1-1.*** The `HelloEarthRiseMain.java` Program\n\
    \n```\npackage projavafx.helloearthrise.ui;\n\nimport javafx.animation.Interpolator;\n\
