    **第 1 章**


    **快速入门 JavaFX**


    *不要问世界需要什么。问问是什么让你充满活力，然后去做。因为世界需要的正是那些充满活力的人。*


    ——霍华德·瑟曼


    在 2007 年 5 月的一年一度的 JavaOne 大会上，Sun Microsystems 宣布了一个名为 JavaFX 的新产品系列。


    其既定目标包括支持在消费设备（如手机、电视、车载系统和浏览器）上开发和部署内容丰富型应用程序。Sun 公司的软件工程师 Josh Marinacci 在 Java
    Posse 的一次采访中非常恰当地表示：“JavaFX 某种程度上是重塑客户端 Java 并修正过去错误的代名词。”他指的是 Java Swing 和 Java
    2D

