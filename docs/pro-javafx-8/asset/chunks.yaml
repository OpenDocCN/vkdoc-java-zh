    if (db.hasFiles()) {


    url = db.getFiles().get(0).toURI().toString();


    } else if (db.hasUrl()) {


    url = db.getUrl();


    }


    if (url != null) {


    songModel.setURL(url);


    songModel.getMediaPlayer().play();


    }


    event.setDropCompleted(url != null);


    event.consume();


    });


    }


    DRAG_OVER 事件的处理器会检查此次拖放是否包含文件或 URL。如果是，它会调用 DragEvent 的 acceptTransferModes 方法来设置支持哪些
    TransferMode 类型。在本例中，我们表示支持任何类型的传输。其他选项包括 COPY、LINK 和 MOVE。由于我们只关心文件 URL 的字符串形式或实际的
    URL 字符串，因此可以接受任何类型的传输。在 DRAG_OVER 处理器中调用 acceptTransferModes 方法非常重要，因为在许多平台上，这会影响用户将拖放光标移过窗口时所看到的视觉反馈。


    DRAG_DROPPED 处理器会获取拖放文件列表中第一个文件的 URL，或者如果拖放的是 URL 本身，则直接获取该 URL。与文件选择器代码一样，它会将此
    URL 传递给 SongModel 并开始播放歌曲。拖放操作的最后一步是调用 DragEvent 的 setDropCompleted 方法，以通知它拖放操作已成功完成。


