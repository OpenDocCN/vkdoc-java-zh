    基于目前所学内容，您可能会认为将 AudioPlayer 应用程序转换为播放视频是一项简单的任务，而您是对的。第一步只需将`SongModel`类重命名为更合适的`MediaModel`。无需更改代码。虽然电影通常不包含元数据，但保留查找元数据的代码也无妨。我们不显示元数据，而是创建一个新的视图来显示`MediaView`。这个`VideoView`类如代码清单
