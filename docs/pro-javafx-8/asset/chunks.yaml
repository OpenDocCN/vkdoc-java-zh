    创建用户自定义的 3D 形状


    `MeshView` 类是一个 `Node`，它允许将任意用户自定义的 3D 形状集成到 JavaFX 场景中。它具有以下构造函数：


    • `MeshView()`


    • `MeshView(Mesh mesh)`


    默认构造函数创建一个没有 `Mesh` 的 `MeshView`。单参数构造函数使用指定的网格创建一个 `MeshView`。该网格作为一个可读写的对象属性提供。`Mesh`
    抽象类及其具体子类 `TriangleMesh` 用于存储 3D 形状的几何信息。`TriangleMesh` 中的几何信息包括：


    • 3D 形状所有顶点（或点）的三维坐标


    • 3D 形状使用的二维纹理坐标


    • 3D 形状的面，每个面都是一个三角形，其顶点来自顶点列表，纹理坐标来自纹理坐标列表


    • 面平滑组，它使 JavaFX 运行时能够平滑地连接同一平滑组中的面，使其公共边缘平滑过渡，而不同平滑组之间的面边缘则保留为硬边


    出于效率考虑，`TriangleMesh` 类将这些信息存储在可观察数组中。以下公共方法允许你访问这些可观察数组及其大小：


    • `ObservableFloatArray getPoints()`


    • `ObservableFloatArray getTexCoords()`


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 10 章 ■ JavaFX 3D


    • `ObservableFaceArray getFaces()`


    • `ObservableIntegerArray getFaceSmoothingGroups()`


    • `int getPointElementSize()`


    • `int getTexCoordElementSize()`


    • `int getFaceElementSize()`


    `getPoints()` 方法返回一个 `ObservableFloatArray`，你可以用它来添加三维顶点坐标。这个可观察浮点数组的大小必须是 3 的倍数，数组元素被解释为
    *x0*、*y0*、*z0*、*x1*、*y1*、*z1*、……，其中 (*x0*、*y0*、*z0*) 是第一个顶点 *p0* 的坐标，(*x1*、*y1*、*z1*)
    是第二个顶点 *p1* 的坐标，依此类推。


    `getTexCoords()` 方法返回一个 `ObservableFloatArray`，你可以用它来添加二维纹理坐标。这个可观察浮点数组的大小必须是
    2 的倍数，数组元素被解释为 *u0*、*v0*、*u1*、*v1*、……，其中 (*u0*、*v0*) 是第一个纹理点，(*u1*、*v1*) 是第二个纹理点，依此类推。


    我们将在材质部分更详细地介绍纹理坐标。目前，将纹理坐标理解为二维图像中的点就足够了，该图像的左上角坐标为 (0, 0)，右下角坐标为 (1, 1)。


    `getFaces()` 方法返回一个 `ObservableFaceArray`，你可以用它来向 3D 形状添加面。`ObservableFaceArray`
    是 `ObservableIntegerArray` 接口的子接口。该数组的大小必须是 6 的倍数，数组元素被解释为 *p0*、*t0*、*p1*、*t1*、*p2*、*t2*、*p3*、*t3*、*p4*、*t4*、*p5*、*t5*、……，其中
    *p0*、*t0*、*p1*、*t1*、*p2*、*t2* 定义第一个面，*p3*、*t3*、*p4*、*t4*、*p5*、*t5* 定义第二个面，依此类推。在定义面的六个整数中，*p*
    值是概念点数组的索引，该数组的长度是实际点数组长度的三分之一，因为我们将实际点数组中的三个浮点元素视为构成一个概念点；而 *t* 值是概念纹理坐标数组的索引，该数组的长度是实际纹理坐标数组长度的二分之一，因为我们将实际纹理坐标数组中的两个浮点元素视为构成一个概念纹理坐标对。

