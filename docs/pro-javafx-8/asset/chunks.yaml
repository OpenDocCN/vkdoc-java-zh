    \ for lots of flexibility and configuration, and the `JAXB.unmarshal` method is\
    \ only a convenience method. However, in many cases, this method is sufficient.\
    \ The `JAXB.unmarshal` method takes two parameters: the input source and the class\
    \ that is the result of the conversion.\n\nWe want to convert the XML source into\
    \ instances of our `Question` class, but how does the JAXB framework know how\
    \ to map the fields? In many cases, the mapping is straightforward and does not\
