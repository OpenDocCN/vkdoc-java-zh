    理解 JavaFX Bean 约定


    JavaFX 引入了 JavaFX Bean 的概念，这是一组为 Java 对象提供属性支持的约定。


    在本节中，我们将讨论指定 JavaFX Bean 属性的命名约定、实现 JavaFX Bean 属性的几种方法，以及最后的选择绑定用法。


