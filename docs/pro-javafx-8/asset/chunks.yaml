    The BorderPane’s top and bottom areas get positioned first, followed by the left
    and right, which can extend up to the height minus the top and bottom. Finally
    the center resizes to take any remaining space in the layout.


    For our use in the Reversi application, we require only the top, center, and bottom
    content areas. The layout code to set up the BorderPane with these three content
    areas is shown in Listing 5-8.


