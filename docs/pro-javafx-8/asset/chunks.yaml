    With these methods, you can create an infinite variety of bindings by starting
    with a property and calling one of the methods that is appropriate for the type
    of the property to get a binding, and calling one of the methods that is appropriate
    for the type of the binding to get another binding, and so on. One fact that is
    worth pointing out here is that all the methods for the type-specific numeric
    expressions are defined in the `NumberExpression` base interface with a return
    type of `NumberBinding`, and are overridden in the type-specific expression classes
    with an identical parameter signature but a more specific return type. This way
    of overriding a method in a subclass with an identical parameter signature but
    a more specific return type is called *covariant return-type overriding*, and
    has been a Java language feature since Java 5. One of the consequences of this
    fact is that numeric bindings built with the fluent interface API have more specific
    types than those built with factory methods in the `Bindings` class.


