    are not meant to be used in normal JavaFX


    applications. they might change in future releases of JavaFX.


    The javafx.application.Application class provides life-cycle support for JavaFX
    applications. In addition to the two static launch() methods we mentioned earlier
    in this section, it provides the following life-cycle methods.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 7 ■ ColleCtions and ConCurrenCy


    • public void init() throws Exception


    • public abstract void start(Stage stage) throws Exception


    • public void stop() throws Exception


    The init() method is called in the “JavaFX-Launcher” thread. The constructor,
    start(), and stop() methods are called in the “JavaFX Application Thread” thread.
    The JavaFX application thread is part of the *Glass Windowing* *Toolkit* in the
    com.sun.glass package hierarchy. JavaFX events are processed on the JavaFX Application
    Thread. All live scene manipulation must be performed in the JavaFX Application
    Thread. Nodes that are not attached to a live scene can be created and manipulated
    in other threads until they are attached to a live scene.


    ■ **Note** the role the Glass Windowing toolkit plays in a JavaFX application
    is similar to that of the aWt in swing applications. it provides drawing surfaces
    and input events from the native platform. unlike in aWt, where the edt is different
    from the native platform’s ui thread and communication has to occur between them,
    the JavaFX application thread in the Glass Windowing toolkit uses the native platform’s
    ui thread directly.


    The owner of the “QuantumRenderer-0” thread is the *Quantum Toolkit* that lives
    in the com.sun.javafx.


    tk.quantum package hierarchy. This thread is responsible for rendering the JavaFX
    scene graph using the *Prism* *Graphics Engine* in the com.sun.prism package hierarchy.
    Prism will use a fully accelerated rendering path if the graphics hardware is
    supported by JavaFX and will fall back to the Java2D rendering path if the graphics
    hardware is not supported by JavaFX. The Quantum Toolkit is also responsible for
    coordinating the activities of the event thread and the rendering thread. It does
    the coordination using pulse events.


    ■ **Note** a *pulse event* is an event that is put on the queue for the JavaFX
    application thread. When it is processed, it synchronizes the state of the elements
    of the scene graph down the rendering layer. pulse events are scheduled if the
    states of the scene graph change, either through running animation or by modifying
    the scene graph directly. pulse events are throttled at 60 frames per second.


    Had the JavaFXThreadsExample program included media playing, another thread named
    “JFXMedia Player EventQueueThread” would have shown up on the list. This thread
    is responsible for synchronizing the latest frame through the scene graph by using
    the JavaFX application thread.


    Fixing Unresponsive UIs


    Event handlers execute on the JavaFX application thread, thus if an event handler
    takes too long to finish its work, the whole UI will become unresponsive because
    any subsequent user actions will simply queue up and won’t be handled until the
    long-running event handler is done.


    We illustrate this in Listing 7-8.


