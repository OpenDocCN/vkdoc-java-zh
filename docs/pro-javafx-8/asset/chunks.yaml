    \n![Image 74](index-204_1.jpg)\n![Image 75](index-204_2.jpg)\n\n## Chapter 5 ■\
    \ Building Dynamic UI Layouts in JavaFX\n\nNotice that we used a `FlowPane` as\
    \ the outer layout and a `VBox` inside to keep the `Ellipse` and `Text` vertically\
    \ aligned. This ensures that the `Ellipse` will always stay on top of the `Text`\
    \ but still allows the display to wrap into a vertical layout if horizontal screen\
    \ real estate is limited.\n\nWe use binding both to enable and disable the special\
    \ effects (`DropShadow` and `InnerShadow`) that highlight the current player’s\
    \ turn, as well as to dynamically update the text based on the model. This is\
    \ a very powerful use of binding that keeps the UI in sync with the game state\
    \ without requiring the use of event listeners or imperative callbacks.\n\nThe\
    \ result of running the program for a horizontal layout is shown in Figure [5-7](#index_split_002.html#p204),\
    \ and the resized vertical layout is shown in Figure [5-8](#index_split_002.html#p204).\n\
    \n***Figure 5-7.** Output of running the Player Score Example in a horizontally\
    \ sized window*\n\n***Figure 5-8.** Output of running the Player Score Example\
    \ in a vertically sized window*\n\nAlthough it might be surprising that the starting\
    \ score is not zero, if you remember the Reversi starting position, there are\
    \ four pieces in the center of the board, which gives each player two points.\
    \ Also, the sum of all the scores and turns remaining should always add up to\
    \ 64, which is true in this case.\n\nThe next step is to combine the logo and\
    \ score using a `BorderPane` to build the minimal shell for the Reversi application.\n\
    \n## Composing a Layout Using BorderPane\n\nWe have built up several elements\
    \ of the Reversi UI, and now we need to tie them together into a single composition.\n\
    \nIn this section we demonstrate how you can use the `BorderPane` class to quickly\
    \ put together other components in a common layout pattern. Unlike the layouts\
    \ used earlier in this chapter, you should not modify the `BorderPane`’s list\
    \ of children, but instead use the properties for each of the content areas listed\
    \ in Table [5-6](#index_split_002.html#p205).\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n***Table 5-6.** Properties Available in the `BorderPanel` Class*\n\n| **Name**\
    \ | **Type** | **Description** |\n| --- | --- | --- |\n| `top` | `Node` | Element\
    \ placed at the top edge of the `BorderPane` area; will be resized to its preferred\
    \ height and extended to fill the full width |\n| `bottom` | `Node` | Element\
    \ placed at the bottom edge of the `BorderPane` area; will be resized to its preferred\
    \ height and extended to fill the full width |\n| `left` | `Node` | Element placed\
    \ at the left edge of the `BorderPane` area; will be resized to its preferred\
    \ width and extended to fill the full height between the top and bottom nodes\
    \ |\n| `right` | `Node` | Element placed at the right edge of the `BorderPane`\
    \ area; will be resized to its preferred width and extended to fill the full height\
    \ between the top and bottom nodes |\n| `center` | `Node` | Element placed in\
    \ the center of the `BorderPane` area; will be extended to fill the full space\
    \ between the top, bottom, right, and left nodes |\n\nThe `BorderPane`’s top and\
    \ bottom areas get positioned first, followed by the left and right, which can\
    \ extend up to the height minus the top and bottom. Finally the center resizes\
    \ to take any remaining space in the layout.\n\nFor our use in the Reversi application,\
    \ we require only the top, center, and bottom content areas. The layout code to\
    \ set up the `BorderPane` with these three content areas is shown in Listing 5-8.\n\
    \n***Listing 5-8.*** Reversi Root Stage Declaration Using a `BorderPane` for Layout\n\
    \n```java\n@Override\npublic void start(Stage primaryStage) {\n    BorderPane\
    \ root = new BorderPane();\n    root.setCenter(createBackground());\n    root.setTop(createTitle());\n\
    \    root.setBottom(createScoreBoxes());\n    Scene scene = new Scene(root, 600,\
    \ 400);\n    primaryStage.setScene(scene);\n    primaryStage.show();\n}\n```\n\
    \nWe are using this to create a dock-like behavior where the title is aligned\
    \ to the top with a fixed height and the score boxes are aligned to the bottom,\
    \ also with a fixed height. All remaining space in the center is occupied by the\
    \ grid. This could also have been done using bind expressions, but using a `BorderPane`\
    \ guarantees that the layout function will be called once per layout cycle, yielding\
    \ higher performance and artifact-free layout.\n\nListing 5-9 shows a simple abstraction\
    \ of a `createScoreBoxes()` function from the section “Using FlowPane and Boxes\
    \ for Directional Alignment,” earlier in this chapter. Notice that the `tileWidth`\
    \ is dynamically bound to the parent width using the `Bindings.selectDouble()`\
    \ function, which breaks the dependency on the scene.\n\n***Listing 5-9.*** Create\
    \ Score Boxes Function\n\n```java\nprivate Node createScoreBoxes() {\n    TilePane\
    \ scoreTiles = new TilePane(createScore(Owner.BLACK), createScore(Owner.WHITE));\n\
    \    scoreTiles.setSnapToPixel(false);\n    scoreTiles.setPrefColumns(2);\n  \
    \  scoreTiles.prefTileWidthProperty().bind(Bindings.selectDouble(tiles.parentProperty(),\n\
    \    \"width\").divide(2));\n    return scoreTiles;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nImplementing `createTitle` is a similar modification of the `Scene` definition\
    \ from the earlier section “Aligning to Edges Using StackPanes and TilePanes.”\
    \ In this case we have also increased the preferred height of the title to give\
    \ it a little padding around the text. The additional changes required are highlighted\
    \ in bold in Listing 5-10.\n\n***Listing 5-10.*** Changes Required to the Title\
    \ Creation Code to Turn It into a Function\n\n```java\nprivate Node createTitle()\
    \ {\n    StackPane left = new StackPane();\n    left.setStyle(\"-fx-background-color:\
    \ black\");\n    Text text = new Text(\"JavaFX\");\n    text.setFont(Font.font(null,\
