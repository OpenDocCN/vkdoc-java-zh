    ## 理解`TouchEvent`类


    随着越来越多的设备配备触摸屏，对触摸事件的内置支持使`JavaFX`成为创建利用多点触控功能的应用程序的先进平台。这意味着该平台能够在一组事件中跟踪多个触摸点。


    `TouchEvent`类提供了`getTouchPoint()`方法，该方法返回一个特定的触摸点。`TouchPoint`上的方法与`MouseEvent`上的方法类似，例如，你可以通过调用`getX()`和`getY()`、`getSceneX()`和`getSceneY()`或`getScreenX()`和`getScreenY()`来获取相对和绝对位置。


    `TouchEvent`类还允许开发者获取属于同一组事件的其他触摸点的信息。通过调用`getEventSetId()`，你可以获得该组`TouchEvent`实例的唯一标识符，并且可以通过调用`getTouchPoints()`获取该组中所有触摸点的列表，该方法返回一个`TouchPoint`实例列表。


    ## 理解`GestureEvent`类


    除了处理多点触控事件，`JavaFX`还支持创建和分发手势事件。手势越来越多地用于智能手机、平板电脑、触摸屏和其他输入设备。它们提供了一种执行操作的直观方式，例如，让用户滑动手指。`GestureEvent`类目前有四个子类，每个子类代表一个特定的手势：`RotateEvent`、`ScrollEvent`、`SwipeEvent`和`ZoomEvent`。所有这些事件都有与`MouseEvent`类似的方法，用于获取动作的位置——`getX()`和`getY()`、`getSceneX()`和`getSceneY()`以及`getScreenX()`和`getScreenY()`方法。


    这些特定的子类都允许检索更详细的事件类型。例如，`SwipeEvent`可以是向右或向左、向上或向下的滑动。此信息通过调用`GestureEvent`上的`getEventType()`方法获得。


    ## 为场景中的节点添加动画


    `JavaFX`的优势之一在于可以轻松创建图形丰富的用户界面。这种丰富性部分体现在能够为场景（`Scene`）中的节点添加动画效果。其核心是，为节点添加动画涉及在一段时间内更改其属性的值。为节点添加动画的示例包括：


    - 当鼠标进入节点边界时，逐渐增大节点的大小；当鼠标离开节点边界时，逐渐减小节点的大小。请注意，这需要缩放节点，这被称为变换（`transform`）。

    - 逐渐增加或减少节点的不透明度，以分别实现淡入或淡出效果。

    - 逐渐更改节点中改变其位置的属性值，使其从一个位置移动到另一个位置。例如，在创建像`Pong`这样的游戏时，这非常有用。


    一个相关的功能是检测节点何时与另一个节点发生碰撞。


    为节点添加动画涉及使用位于`javafx.animation`包中的`Timeline`类。根据动画的需求和个人偏好，可以使用以下两种通用技术之一：


    - 直接创建`Timeline`类的实例，并提供关键帧（`KeyFrame`），这些关键帧指定特定时间点的值和动作。

    - 使用`javafx.animation.Transition`子类来定义特定的过渡效果并将其与节点关联。过渡效果的示例包括使节点在一段时间内沿定义路径移动，以及在一段时间内旋转节点。这些过渡类都扩展了`Timeline`类。


    我们现在将介绍这些技术，并展示每个技术的示例，从第一个技术开始。


