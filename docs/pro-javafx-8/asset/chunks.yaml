    The PickResult class provides the following public constructors:


    • PickResult(EventTarget, double, double)


    • PickResult(Node, Point3D, double)


    • PickResult(Node, Point3D, double, int, Point2D)


    The first two constructors are used to create PickResults to work with 2D scenes,
    and the third constructor creates a PickResult that contains 3D information. The
    PickResults are usually created by the JavaFX 3D runtime.


    JavaFX application code usually obtains PickResults by calling the accessor method
    on the event object.


    The PickResult class provides the following public methods:


    • Node getIntersectedNode()


    • Point3D getIntersectedPoint()


    • double getIntersectedDistance()


    • int getIntersectedFace()


    • Point2D getIntersectedTexCoord()


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 10 ■ JavaFX 3D


    When the user clicks the mouse on a 3D shape, it touches the 3D shape in a particular
    point in a particular face.


    The line segment starting from the eye of the camera in effect for the Scene or
    SubScene and ending at the point on the 3D shape is called the *pick ray*. The
    point on the 3D shape is called the *intersected point*. The PickResult provides
    information about this intersected point. The getIntersectedNode() method returns
    the 3D shape itself, either a Sphere, a Cylinder, a Box, or a MeshView. The getIntersectedPoint()
    method returns the 3D coordinates of the intersected point. The coordinates are
    relative to the 3D shape’s local coordinate system. For a Sphere of radius 100,
    the coordinates ( *x*, *y*, *z*) of the returned Point3D will satisfy *x2* *+
    y2* *+ z2* *=* 1002, regardless of the transforms applied to itself or any of
    its containing nodes. The getIntersectedDistance() method returns the distance
    from the eye of the camera to the intersected point. This is the length of the
    pick ray in the 3D model’s world coordinate system.


    The getIntersectedFace() method returns the face number of the face that contains
    the intersected point for a MeshView, which has user-defined faces. It returns
    FACE_UNDEFINED for the predefined 3D shapes Sphere, Cylinder, and Box. The getIntersectedTexCoord()
    method returns the texture coordinates of the intersected point. Unlike the getIntersectedFace()
    method, this method will return the texture coordinates for both user-defined
    and predefined 3D shapes.


    The program in Listing 10-10 sets an event handler for the mouse clicked and the
    mouse dragged event for a sphere, and changes the color of the sphere based on
    the intersected point’s coordinates when you click on or drag the mouse over the
    sphere.


