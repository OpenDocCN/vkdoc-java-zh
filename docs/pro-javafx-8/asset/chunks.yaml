    TilePane is a very versatile class with lots of options for setting the preferred
    tile width and height, preferred number of rows and columns, gaps between rows
    and columns, and the horizontal and vertical position. Most of these have reasonable
    defaults, such as preferredTileWidth and preferredTileHeight, that use the largest
    preferred width/height of all its children. Similarly, rows and columns are set
    automatically based on the number of tiles that fit the width and height of the
    TilePane.


    Just like the StackPane class, TilePane also has variables for setting the default
    alignment and also the alignment of each individual node added. We use the latter,
    because we want the text aligned to the right on one side and the left on the
    other.


    Rather than using separate horizontal and vertical positions like JavaFX 1.3,
    JavaFX 8 uses a single Pos enumeration that contains all the combinations. Table
    [5-4 lis](#index_split_002.html#p199)ts all the possible values you can pass in
    where a Pos is expected.


