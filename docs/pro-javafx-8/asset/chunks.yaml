    \n***Figure 8-16.** Using a BubbleChart with fixed radius*\n\nUntil now, we didn’t\
    \ leverage the three-argument constructor of `XYChart.Data`. Apart from the two-argument\
    \ constructor that we are already familiar with:\n\n`XYChart.Data (X xValue, Y\
    \ yValue)`\n\n`XYChart.Data` also has a three-argument constructor:\n\n`XYChart.Data\
    \ (X xValue, Y yValue, Object extraValue)`\n\nThe `extraValue` argument can be\
    \ of any type. This allows for developers to implement their own subclasses of\
    \ `XYChart` that take advantage of additional information that can be enclosed\
    \ inside a single data element. The `BubbleChart` implementation uses this `extraValue`\
    \ for deciding how large the bubbles should be rendered.\n\nWe now modify the\
    \ `getChartData()` method to use the three-argument constructor. The `xValue`\
    \ and `yValue` parameters are still the same as in the previous listing, but we\
    \ now add a third parameter that indicates an upcoming trend. The larger this\
    \ parameter is, the bigger the rise in the next year. The smaller the parameter\
    \ is, the bigger the drop in the next year. The modified `getChartData()` method\
    \ is shown in Listing 8-12.\n\n***Listing 8-12.*** Using a Three-Argument Constructor\
    \ for `XYChart.Data` Instances\n\n```\nprivate ObservableList<XYChart.Series<Integer,\
    \ Double>> getChartData() {\n    double javaValue = 17.56;\n    double cValue\
