- fmt: '***Figure 3-24.** The Hierarchy section of the Document Panel for `FXMLLoaderExample.fxml`*


    The Controller section displays information about the controller of the FXML file.
    Figure [3-25 shows](#index_split_001.html#p141) the Controller section of the
    Document Panel for the FXML file in the `FXMLInjectionExample` in Listing 3-7.
    You can set the name of the controller class in this section. You can also choose
    to use the `fx:root` construct for the FXML file in this section. You also see
    a list of nodes with `fx:ids` that are already set, and you can select the nodes
    by clicking on the row in the Assigned `fx:id` table.


    ***Figure 3-25.** The Controller section of the Document Panel for `FXMLInjectionExample.fxml`*


    There is a menu button in the top right corner of the Document Panel. It contains
    a Hierarchy Displays submenu that has three menu items, as shown in Figure [3-26](#index_split_001.html#p142).
    The Info menu item causes the Hierarchy section to display each node with its
    general information, usually what is also displayed in the Content Panel for the
    same node. The `fx:id` menu item causes the Hierarchy section to display each
    node with its `fx:id` if it has been set. The Node Id menu item causes the Hierarchy
    section to display each node with its node ID if it has been set. The node ID
    is used by CSS to find the node and to manipulate the node’s styles.


    ***Figure 3-26.** The Document Panel with its menu open*


    ## Understanding the Content Panel


    The Content Panel is where the UI is composed. You first drag a container to the
    Content Panel. You then drag other nodes to the Content Panel and position them
    onto the container node. As you drag your nodes, red guidelines will appear as
    the node you drag reaches certain alignment and spacing positions. With the help
    of these guidelines, you should be able to create visually pleasing UIs.


    Above the Content Panel, there is a bread-crumb bar that shows the path of the
    selected node in the content area. This allows you to easily navigate to the containing
    nodes of the currently selected node. JavaFX SceneBuilder will display warning
    and error messages in this bar when the situation arises.


    One handy feature of JavaFX SceneBuilder is that when you have several nodes selected,
    you can go to the context menu by right-clicking the selected nodes, choosing
    the Wrap in submenu, and then selecting one of the container types. You can also
    Unwrap a node this way, removing any containers that contain the node.


    Figure [3-27 shows](#index_split_001.html#p143) the `IncludeExampleTree.fxml`
    file from Listing 3-20 being edited in JavaFX SceneBuilder.


    ***Figure 3-27.** The `IncludeExampleTree.fxml` file being edited in JavaFX SceneBuilder*


    ## Understanding the Inspector Panel


    The Inspector Panel lives in the Right Panel and can be hidden using the View
    ➤ Hide Right Panel menu item. It contains the Properties, Layout, and Code sections.
    The Properties section lists all the generic properties of the selected node in
    the Content Panel. You can set the properties by changing the values shown here.
    You can also change a property back to its default value by invoking the small
    menu button to the right of the property. You can set the node ID in the ID property
    editor in the Properties section. Figure [3-28](#index_split_001.html#p144) shows
    the Properties section of the Inspector Panel.


    ***Figure 3-28.** The Properties section of the Inspector Panel*


    The Layout section lists all layout-related properties of the currently selected
    node. Figure [3-29 shows](#index_split_001.html#p144) the Layout section of the
    Inspector Panel.


    ***Figure 3-29.** The Layout section of the Inspector Panel*


    The Code section lists all the event handlers the selected node in the Content
    Panel could have. It also allows you to set the `fx:id` for the selected node.
    You can hook up the event handlers in the Code section in any way you want, but
    the most convenient way of providing event handlers is to set them to properly
    signatured methods in the controller. Figure [3-30 shows](#index_split_001.html#p145)
    the Code section of the Inspector Panel.


    ***Figure 3-30.** The Code section of the Inspector Panel*


    ## Summary


    In this chapter, you learned the declarative way of creating a UI in JavaFX. You
    learned the following important tools and information:


    - FXML files are the carriers of declarative UI information, and are central assets
    of JavaFX projects.

    - FXML files are loaded into JavaFX applications by `FXMLLoader`. The result of
    the loading is a node that can be incorporated into a `Scene`.

    - FXML files can have a companion controller class that performs programmatical
    functions, such as event handling, at runtime on behalf of the nodes declared
    in the FXML file.

    - FXML files can be edited easily in your favorite Java IDEs with smart suggestions
    and completions.

    - FXML files can also be edited in Oracle JavaFX SceneBuilder 2.0, an open source
    tool for editing FXML files.

    - The JavaFX SceneBuilder is a highly productive tool for specifying JavaFX UIs.
    You can add containers, controls, and other JavaFX nodes into the content of an
    FXML file.

    - You can set up a controller and define the `fx:ids` of the various nodes in
    the scene.

    - You can organize the hierarchical information in an FXML file by manipulating
    the containers, controls, and other nodes in the Hierarchy section of the Document
    Panel.

    - You can manipulate the attributes of nodes in an FXML file by using the Properties,
    Layout, and Code sections in the Inspector Panel.

    - You can visually compose your UI in the Content Panel.

    - You can analyze the CSS of the UI with the CSS Analyzer.


    ## Resources


    - The Oracle JavaFX SceneBuilder 2.0 downloading site: [http://www.oracle.com/technetwork/java/javase/downloads/javafxscenebuilder-info-2157684.html](http://www.oracle.com/technetwork/java/javase/downloads/javafxscenebuilder-info-2157684.html)

    - Jasper Pott’s blog post announcing the release of JavaFX SceneBuilder 2.0: [http://fxexperience.com/2014/05/announcing-scenebuilder-2-0/](http://fxexperience.com/2014/05/announcing-scenebuilder-2-0/)

    - A nine-minute video showing off JavaFX SceneBuilder 2.0’s capabilities that
    accompanied Jasper Pott’s announcement: [https://www.youtube.com/watch?v=ij0HwRAlCmo&feature=youtu.be](https://www.youtube.com/watch?v=ij0HwRAlCmo&feature=youtu.be)

    - The e(fx)clipse Eclipse plug-in to provide JavaFX support for Eclipse IDEs:
    [http://www.eclipse.org/efxclipse/install.html](http://www.eclipse.org/efxclipse/install.html)


    **Chapter 4**


    **Properties and Bindings**


