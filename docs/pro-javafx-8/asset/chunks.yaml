    与 `ObservableList`、`ObservableMap` 和 `ObservableSet` 接口不同，`ObservableArray` 接口并未实现任何
    Java 集合框架接口。`ObservableArray` 接口上的以下方法允许你注册和注销 `ArrayChangeListener`：


    • `addListener(ArrayChangeListener<T> listener)`


    • `removeListener(ArrayChangeListener<T> listener)`


    `ObservableArray` 上的以下额外方法让你能够控制底层的原始数组：


    • `resize(int size)`


    • `ensureCapacity(int capacity)`


    • `trimToSize()`


    • `clear()`


    • `size()`


    这些方法处理 `ObservableArray` 的容量和大小。*容量* 是底层原始数组的长度。*大小* 是实际包含应用程序数据的元素数量。容量总是大于或等于大小。如果当前底层原始数组的长度小于所需的新容量，`ensureCapacity()`
    方法会分配一个新的底层原始数组。`resize()` 方法会改变 `ObservableArray` 的大小。如果新大小大于当前容量，则容量会增加。如果新大小大于当前大小，则额外的元素会用零填充。如果新大小小于当前大小，`resize()`
    实际上不会缩小数组，但“丢失”的元素会用零填充。`trimToSize()` 方法会将底层原始数组替换为一个长度与 `ObservableArray` 大小相同的数组。`clear()`
    方法将 `ObservableArray` 的大小调整为 0。`size()` 方法返回 `ObservableArray` 的当前大小。


