    Chapter 9 ■ Using the Media Classes


    Summary


    In this chapter, you learned about a very important aspect of the JavaFX platform:
    the media classes. We showed you how to accomplish the following.


    • Use the AudioClip class to play low-latency sound effects.


    • Load the various media types supported by JavaFX into a Media object.


    • Use the MediaPlayer class to play audio files from .jar files, from disk, and
    by loading them over the Internet.


    • Build a simple media player that contains a graphical user interface that can
    be used to control playback of the audio files.


    • Take advantage of the MediaPlayer’s equalizer and audio frequency spectrum capabilities.


    • Play video files using the MediaView class.


    • Use media markers to trigger events during media playback.


    • Split your video playback into multiple viewports.


    Resources


    For more information on the JavaFX Media API, consult the following resource:


    • [http://docs.oracle.com/javase/8/javafx/media-tutorial/overview.htm](http://docs.oracle.com/javase/8/javafx/media-tutorial/overview.htm)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


