    \ However, the `FXMLLoader` will perform additional processing for attributes,\
    \ making it more attractive to use attributes. When processing attributes, the\
    \ `FXMLLoader` will perform three kinds of attribute value resolutions and expression\
    \ binding.\n\nWhen an attribute’s value starts with an `@` character, `FXMLLoader`\
    \ will treat the value as a location relative to the current file. This is called\
    \ *location resolution*. When an attribute’s value starts with a `%` character,\
    \ `FXMLLoader` will treat the value as a key in a resource bundle and substitute\
    \ the locale-specific value for the key. This is called *resource resolution*.\
    \ When an attribute’s value starts with a `$` character, `FXMLLoader` will treat\
    \ the value as a variable name, and substitute the value of the referenced variable\
    \ as the value of the attribute. This is called *variable resolution*.\n\nWhen\
    \ an attribute’s value starts with `${` and ends with `}`, and if the attribute\
    \ represents a JavaFX property, `FXMLLoader` will treat the value as a binding\
    \ expression, and binds the JavaFX property to the enclosed expression. This is\
    \ called *expression binding*. You will learn about JavaFX properties and bindings\
    \ in Chapter 4. For now simply understand that when a property is bound to an\
