    omission does not hurt the explanations there, but except for Observable and InvalidationListener,
    the rest of the interfaces are generic interfaces with a type parameter <T>. In
    this section we examine how these generic interfaces are specialized to the specific
    types of interest: Boolean, Integer, Long, Float, Double, String, and Object.
    We also examine some of the abstract and concrete classes of the framework and
    explore typical usage scenarios of each class.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 4 ■ properties and Bindings


    ■ **Note** specializations of these interfaces also exist for List, Map, and Set.
    they are designed for working with observable collections. We cover observable
    collections in Chapter 7.


    A Common Theme for Type-Specific Interfaces


    Although the generic interfaces are not all specialized in exactly the same way,
    a common theme exists:


    • The Boolean type is specialized directly.


    • The Integer, Long, Float, and Double types are specialized through the Number
    supertype.


    • The String type is specialized through the Object type.


    This theme exists in the type-specific specializations of all the key interfaces.
    As an example, we examine the subinterfaces of the ObservableValue<T> interface:


    • ObservableBooleanValue extends ObservableValue<Boolean>, and it offers one additional
    method.


    •


    boolean get();


    • ObservableNumberValue extends ObservableValue<Number>, and it offers four additional
    methods.


    •


    int intValue();


    •


    long longValue();


    •


    float floatValue();


    •


    double doubleValue();


    • ObservableObjectValue<T> extends ObservableValue<t>, and it offers one additional
    method.


    •


    T get();


    • ObservableIntegerValue, ObservableLongValue, ObservableFloatValue, and


    ObservableDoubleValue extend ObservableNumberValue and each offers an additional
    get()


    method that returns the appropriate primitive type value.


    • ObservableStringValue extends ObservableObjectValue<String> and inherits its
    get() method that returns String.


    Notice that the get() method that we have been using in the examples is defined
    in the type-specific ObservableValue subinterfaces. A similar examination reveals
    that the set() method that we have been using in the examples is defined in the
    type-specific WritableValue subinterfaces.


    A practical consequence of this derivation hierarchy is that any numerical property
    can call bind() on any other numerical property or binding. Indeed, the signature
    of the bind() method on any numerical property is void bind(ObservableValue<?
    extends Number> observable);


    and any numerical property and binding is assignable to the generic parameter
    type. The program in Listing 4-4


    shows that any numerical properties of different specific types can be bound to
    each other.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 4 ■ properties and Bindings


