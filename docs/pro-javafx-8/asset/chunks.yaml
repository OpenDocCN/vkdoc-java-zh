    ## About the Authors


    **Johan Vos** is a Java Champion who started to work with Java in 1995. As part
    of the Blackdown team, he helped port Java to Linux. With LodgON, the company
    he cofounded, he has been mainly working on Java-based solutions for social networking
    software. His main focus is on end-to-end Java, combining the strengths of back-end
    systems and embedded devices. His favorite technologies are currently Java EE/Glassfish
    at the back end and JavaFX at the front end. He contributes to a number of open
    source projects, including DataFX and the Android port of JavaFX. Johan’s blog
    can be followed at [http://blogs.lodgon.com/johan](http://blogs.lodgon.com/johan),
    he tweets at [http://twitter.com/johanvos](http://twitter.com/johanvos), and can
    be reached at [johan@lodgon.com](http://johan@lodgon.com).


    **Weiqi Gao** is a principal software engineer with Object Computing, Inc. in
    St. Louis, Missouri. He has decades of software development experience and has
    been using Java technology since 1998. He is interested in programming languages,
    object-oriented systems, distributed computing, and graphical user interfaces.
    He is a member of the steering committee of the St. Louis Java Users Group. Weiqi
    holds a PhD in mathematics.


    **Stephen Chin** is a Java Ambassador at Oracle specializing in embedded and user
    interface technology and the JavaOne Content Chair. He has been featured at Java
    conferences around the world including Devoxx, JFokus, OSCON, JFall, GeeCON, JustJava,
    and JavaOne, where he three times received a Rock Star Award. Stephen is an avid
    motorcyclist who has done several Pan-European evangelism tours, interviewing
    hackers in their natural habitat and posting the videos on [http://nighthacking.com/](http://nighthacking.com/).
    When he is not traveling, he enjoys teaching kids how to do embedded and robot
    programming together with his 11-year-old daughter.


    xv


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 202](index-601_1.jpg)


    ![Image 203](index-601_2.jpg)


    ## About the Authors


    **Dean Iverson** has been writing software professionally for more than 15 years.
    He is employed by the Virginia Tech Transportation Institute, where he is a senior
    researcher and rich client application developer. He also has a small software
    consultancy called Pleasing Software Solutions, which he cofounded with his wife.


    **James Weaver** is a developer, author, teacher, and international speaker focused
    on client-side Java and the Internet of Things. He tweets at [@JavaFXpert](http://@JavaFXpert).


    xvi


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 204](index-602_1.jpg)


    ## About the Technical Reviewer


    **Mark Heckler** is a Java Software Architect/Engineer with development experience
    in numerous environments. He has worked for and with key players in the manufacturing,
    emerging markets, retail, medical, telecom, and financial industries to develop
    and deliver critical capabilities on time and on budget. Currently, he works primarily
    with enterprise customers using Java throughout the stack. He also participates
    in open source development at every opportunity, being a JFXtras project committer,
    developer of DialogFX and MonologFX, codeveloper of Autonomous4j, and more. When
    Mark isn’t working with Java, he enjoys sharing his experiences at conferences
    and via the Java Jungle web site ([https://blogs.oracle.com/javajungle](https://blogs.oracle.com/javajungle)),
    his personal web site ([http://www.thehecklers.org](http://www.thehecklers.org)),
    and Twitter ([@MkHeck](http://@MkHeck)). Mark lives with his very understanding
    wife, three kids, and dog in St. Louis, Missouri.


    xvii


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Acknowledgments


    Writing a book is often done in spare time. I want to thank my wife Kathleen and
    our children Merlijn and Linde, for allowing me to spend evening and weekend time
    in front of my computer. I want to thank authors Jim Weaver, Weiqi Gao, Stephen
    Chin, and Dean Iverson; technical reviewer Mark Heckler; and the Apress team for
    their trust in me. A special thanks to my LodgON colleagues Joeri Sykora and Erwin
    Morrhey for helping me with the examples.


    The JavaFX team at Oracle did a great job releasing JavaFX 8. The combination
    of their efforts and those of the Java community makes JavaFX an excellent platform
    for an increasing number of clients.


    —Johan Vos


    I would like to thank my wife, Youhong Gong, for her support, understanding, and
    encouragement during the writing process. My thanks also go to the author and
    technical review team: Johan Vos, Jim Weaver, Stephen Chin, Dean Iverson, and
    Mark Heckler for making this book a fun project. I share with my coauthors the
    appreciation for the JavaFX team at Oracle and the editorial team at Apress.


    —Weiqi Gao


    To my wife Justine, and daughters Cassandra and Priscilla, who supported me in
    writing this book on top of all my other responsibilities. Also, a huge thanks
    to the entire author team, including our newest members, Johan Vos and Mark Heckler,
    who both went above and beyond in their contributions to this title. Finally,
    a great debt of gratitude to the JavaFX team and JVM language designers who have
    produced technology that will profoundly change the way we design and code user
    interfaces going forward.


    —Stephen Chin


    I would like to thank my family, Sondra, Alex, and Matt, for their support and
    understanding during yet another writing project. You guys make this possible.
    I would also like to thank the writing and review team of Jim Weaver, Stephen
    Chin, Weiqi Gao, Johan Vos, and Mark Heckler for their dedication and their patience.
    The editorial team at Apress was, as usual, first rate and utterly professional.
    And, of course, none of this would be possible without the hard work of an extremely
    talented team of engineers on the JavaFX team at Oracle.


    —Dean Iverson


    To my wife Julie, daughters Lori and Kelli, son Marty, and grandchildren Kaleb
    and Jillian. Thanks Merrill and Barbara Bishir, Ken and Marilyn Prater, and Walter
    Weaver for being such wonderful examples. My contributions to this book are dedicated
    to the memory of Merrill Bishir and Ken Prater. *“I have told you these things,
    so that in me you may have peace. In this world you will have trouble. But take
    heart! I have overcome the world.” (John 16:33)*


    —Jim Weaver


    xix


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Foreword


    I remember it distinctly, like it was yesterday: standing center stage at Moscone
    Center when we launched JavaFX at JavaOne 2007. We promised to build a world-class
    client platform for Java. With the world watching with skeptical eyes and in a
    crowded client arena, we set out to build the dream. In hindsight, it was a rather
    ambitious goal.


    Fast forward seven years, with the release of Java SE 8, we have taken a huge
    leap forward in fulfilling that promise. As the vision unfolded, our product plans
    have shifted to match the evolving RIA market and what developers and the Java
    community told us they were looking for. As someone who was there at the inception
    of JavaFX and has watched it mature over the last seven years to this current
    release, my feelings are akin to a parent watching a toddler blossom.'
