    **在 Swing 应用程序中嵌入 JavaFX 场景**


    JavaFX 支持通过 `javafx.embed.swing` 包中的类将 JavaFX 场景嵌入到 Swing 应用程序中。这是一个非常小的包，包含一个用于将
