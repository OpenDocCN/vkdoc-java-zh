    安装并启动 IntelliJ 后，你需要创建一个启用了 **Groovy** 语言支持的新 Java 项目。在欢迎页面上，你可以点击“创建新项目”；如果你在其他界面，可以通过“文件”菜单选择“新建项目...”来打开相同的向导。这将打开如图
    13-2 所示的“新建项目”向导。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 186](img/index-555_1.jpg)


    第 13 章 ■ JavaFX 语言与标记


    ***图 13-2.** IntelliJ 新建项目向导对话框*


    将你的项目命名为 `HelloGroovyFX`，确保项目类型设置为“Java 模块”，然后点击“下一步”。


    在向导的下一页，你可以直接接受默认的 `src` 文件夹位置并继续，这将带你进入如图 13-3 所示的扩展屏幕。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 187](img/index-556_1.jpg)


    第 13 章 ■ JavaFX 语言与标记


    ***图 13-3.** IntelliJ 新建项目向导，第二个对话框*


    在这里，你可以为你的项目选择并启用 Groovy 支持。在左侧列表中找到 **Groovy** 并勾选复选框。你还需要在右侧窗格中配置一个 Groovy 运行时环境，以便其正常工作。如果你尚未安装当前的
    Groovy 运行时，可以从 Groovy 网站获取最新版本，网址为：


    [`groovy.codehaus.org/`](http://groovy.codehaus.org/)。


    二进制 zip 发布版本即可正常使用。将其解压到硬盘上的某个文件夹，然后返回 IntelliJ，点击“创建...”按钮并选择你刚刚解压 Groovy 的文件夹，来设置
    Groovy 库。要完成项目创建，请点击“完成”，你的新项目将在当前窗口中打开。


    项目设置基本完成，但还缺少 JavaFX 和 GroovyFX 的依赖库。


    要添加这些库，请从“文件”菜单中打开“项目结构...”对话框，并导航到“模块”部分。


    这允许你比“新建项目”向导更详细地配置项目设置。


    点击右侧的“依赖项”选项卡，将出现如图 13-4 所示的屏幕。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 188](img/index-557_1.jpg)


    ![Image 189](img/index-557_2.jpg)


    第 13 章 ■ JavaFX 语言与标记


    ***图 13-4.** HelloGroovyFX 项目的模块配置屏幕*


    在“依赖项”选项卡上，你需要配置一个额外的 jar 引用，如图 13-4 中高亮所示。


    这就是 GroovyFX jar 文件，你可以从 GroovyFX 网站下载。GroovyFX 网站的 URL 是：


    [`groovyfx-project.github.com/`](http://groovyfx-project.github.com/)。


    现在，要创建 HelloGroovyFX 应用程序，我们需要向项目添加一个新的 Groovy 脚本。右键点击项目的 `src` 目录，从上下文菜单中选择“新建
    ➤ Groovy 脚本”。这将打开一个脚本创建对话框，你可以在其中输入脚本文件的名称，然后点击“确定”创建它，如图 13-5 所示。


    ***图 13-5.** Groovy 脚本创建对话框*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 190](img/index-558_1.jpg)


    第 13 章 ■ JavaFX 语言与标记


    现在，你终于可以开始编写一些代码了。HelloGroovyFX 应用程序非常简短，因此你可以从本书附带的源代码包中获取代码，或者自己输入清单 13-4 中所示的代码。


    ***清单 13-4.*** Hello GroovyFX 代码


    import groovyx.javafx.GroovyFX


    import groovyx.javafx.SceneGraphBuilder


    GroovyFX.start {


    new SceneGraphBuilder().stage(visible: true) {


    scene {


    stackPane {


    text("Hello GroovyFX")


    }


    }


    }


    }


    要运行该应用程序，只需右键点击该类，然后从上下文菜单中选择“运行 ''HelloGroovyFX''”。


    这将为你提供如图 13-6 所示的应用程序。


    ***图 13-6.** 在 IntelliJ 中运行 Hello GroovyFX 应用程序的输出*


    恭喜！你已经成功创建并运行了你的第一个基于 Groovy 的 JavaFX 应用程序。在接下来的几节中，我们将更详细地介绍 GroovyFX 的特性和功能，但请记住，你在
    JavaFX 中能做的任何事情在 GroovyFX 中都能实现，因为它封装了完整的 JavaFX API。


    GroovyFX 中的属性


    在 Java 中使用 JavaFX 进行 UI 开发时，最能受益的特性之一是在语言中拥有一流的、可观察的属性概念。由于目前尚不存在这种特性，JavaFX 团队在
    API 层面添加了属性，这虽然足够，但比原生语法要冗长得多。


    幸运的是，使用像 Groovy 这样的动态语言，可以很容易地添加强大的特性，包括原生属性语法。Groovy 已经内置了简化的 getter/setter 访问概念，因此你可以像处理普通变量一样检索和存储
    JavaFX 属性。例如，要在 Groovy 中设置矩形的宽度，你只需编写：


    rectangle.width = 500


    这将自动转换为 setter 调用，如下所示：


    rectangle.setWidth(500);


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 13 章 ■ JavaFX 语言与标记


    JavaFX 属性模式中更繁琐的另一部分是创建新属性。要以与 JavaFX API 定义属性相同的方式在类上定义新属性，每个属性需要一个字段和三个方法。在
    Person 对象上创建 name 属性的标准样板代码如清单 13-5 所示。


    ***清单 13-5.*** 在 Java 中创建新属性的 JavaFX 属性模式


    import javafx.beans.property.SimpleStringProperty


    import javafx.beans.property.StringProperty


    public class Person {


    private StringProperty name;


    public final void setName(String val) { nameProperty().set(val); }


    public final String getName() { return nameProperty().get(); }


    public StringProperty nameProperty() {


    if (name == null) {


    name = new SimpleStringProperty(this, "name");


    }


    return name;


    }


    }


    ■ **注意** 上述代码可以通过在 getName 方法中检查属性是否已创建来进一步优化，如果尚未创建则返回 null（从而避免初始化 name 属性）。


    虽然这段代码只比标准的 Java 属性 bean 模式稍微冗长一点，但将其乘以你需要在应用程序中定义的属性数量，你就会得到相当多的代码需要维护，并且在出现意外问题时进行调试。


    GroovyFX 对此有一个非常优雅的解决方案，即使用 AST 转换的编译器钩子。与其每次想定义新属性时都复制粘贴属性样板代码，你只需用 `@FXBindable`
    注解标注一个变量，GroovyFX 就会处理其余的事情。它会生成与你手动编写完全相同的优化代码，但在编译阶段在后台完成，这样你的源代码就不会被额外的逻辑弄得杂乱无章。


    清单 13-6 展示了 name 属性在 Groovy 中的样子。


    ***清单 13-6.*** 在 Groovy 中创建新属性的 GroovyFX 属性模式


    import groovyx.javafx.beans.FXBindable


    class Person {


    @FXBindable String name


    }


    GroovyFX 的 `@FXBindable` 注解还支持处理属性具有默认初始化值的情况：


    class Person {


    @FXBindable String name = "Guillaume Laforge"


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 13 章 ■ JavaFX 语言与标记


    它还有一个便捷的快捷语法，用于将类中的所有变量转换为属性：


    @FXBindable


    class Person {


    String name;


    int age;


    String gender;


    Date dob;


    }


