    The default constructor creates a box with a size of 2 in all three directions.
    The three-parameter constructor creates a box with the specified width, height,
    and depth. The width is parallel to the *x* axis, the height is parallel to the
    *y* axis, and the depth is parallel to the *z* axis. The center of newly constructed
    Boxes is always at the origin of the three-dimensional space (0, 0, 0).


    The width, height, and depth of the box are available as read-write double properties.


