- fmt: "`public DoubleProperty heightProperty();`\n\nThe names of the getter and setter\
    \ methods follow the JavaBeans convention. They are obtained by concatenating\
    \ `\"get\"` and `\"set\"` with the name of the property with the first character\
    \ capitalized. For boolean type properties, the getter name can also start with\
    \ `\"is\"`. The name of the property getter is obtained by concatenating the name\
    \ of the property with `\"Property\"`. To define a *read-only JavaFX Beans property*,\
    \ you can either remove the setter method or change it to a private method and\
    \ change the return type of the property getter to be a `ReadOnlyProperty`.\n\n\
    This specification speaks only about the interface of JavaFX Beans properties\
    \ and does not impose any implementation constraints. Depending on the number\
    \ of properties a JavaFX Bean may have, and the usage patterns of these properties,\
    \ there are several implementation strategies. Not surprisingly, all of them use\
    \ the JavaFX properties and bindings framework properties as the backing store\
    \ for the values of the JavaFX Beans properties. We show you these strategies\
    \ in the next two subsections.\n\n## Understanding the Eagerly Instantiated Properties\
    \ Strategy\n\nThe *eagerly instantiated properties* strategy is the simplest way\
    \ to implement JavaFX Beans properties. For every JavaFX Beans property you want\
    \ to define in an object, you introduce a private field in the class that is of\
    \ the appropriate JavaFX properties and bindings framework property type. These\
    \ private fields are instantiated at bean construction time. The getter and setter\
    \ methods simply call the private field’s `get()` and `set()` methods. The property\
    \ getter simply returns the private field itself.\n\nThe program in Listing 4-9\
    \ defines a JavaFX Bean with an `int` property `i`, a `String` property `str`,\
    \ and a `Color` property `color`.\n\n***Listing 4-9.*** `JavaFXBeanModelExample.java`\n\
    \n```\nimport javafx.beans.property.IntegerProperty;\nimport javafx.beans.property.ObjectProperty;\n\
    import javafx.beans.property.SimpleIntegerProperty;\nimport javafx.beans.property.SimpleObjectProperty;\n\
    import javafx.beans.property.SimpleStringProperty;\nimport javafx.beans.property.StringProperty;\n\
    import javafx.scene.paint.Color;\n\npublic class JavaFXBeanModelExample {\n  \
    \  private IntegerProperty i = new SimpleIntegerProperty(this, \"i\", 0);\n  \
    \  private StringProperty str = new SimpleStringProperty(this, \"str\", \"Hello\"\
    );\n    private ObjectProperty<Color> color = new SimpleObjectProperty<Color>(this,\
    \ \"color\", Color.BLACK);\n\n    public final int getI() {\n        return i.get();\n\
    \    }\n\n    public final void setI(int i) {\n        this.i.set(i);\n    }\n\
    \n    public IntegerProperty iProperty() {\n        return i;\n    }\n\n    public\
    \ final String getStr() {\n        return str.get();\n    }\n\n    public final\
    \ void setStr(String str) {\n        this.str.set(str);\n    }\n\n    public StringProperty\
    \ strProperty() {\n        return str;\n    }\n\n    public final Color getColor()\
    \ {\n        return color.get();\n    }\n\n    public final void setColor(Color\
    \ color) {\n        this.color.set(color);\n    }\n\n    public ObjectProperty<Color>\
    \ colorProperty() {\n        return color;\n    }\n}\n```\n\nThis is a straightforward\
    \ Java class. There are only two things we want to point out in this implementation.\
    \ First, the getter and setter methods are declared `final` by convention. Second,\
    \ when the private fields are initialized, we called the simple properties constructors\
    \ with the full context information, supplying them with `this` as the first parameter.\
    \ In all of our previous examples in this chapter, we used `null` as the first\
    \ parameter for the simple properties constructors because those properties are\
    \ not part of a higher level JavaFX Bean object.\n\nThe program in Listing 4-10\
    \ defines a view class that watches over an instance of the JavaFX Bean defined\
    \ in Listing 4-9. It observes changes to the `i`, `str`, and `color` properties\
    \ of the bean by hooking up change listeners that print out any changes to the\
    \ console.\n\n***Listing 4-10.*** `JavaFXBeanViewExample.java`\n\n```\nimport\
    \ javafx.beans.value.ChangeListener;\n```"
