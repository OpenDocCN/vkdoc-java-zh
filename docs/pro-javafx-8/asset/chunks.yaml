    the name of the property with “Property”. To define a *read-only JavaFX Beans
    property*, you can either remove the setter method or change it to a private method
    and change the return type of the property getter to be a ReadOnlyProperty.


    This specification speaks only about the interface of JavaFX Beans properties
    and does not impose any implementation constraints. Depending on the number of
    properties a JavaFX Bean may have, and the usage patterns of these properties,
    there are several implementation strategies. Not surprisingly, all of them use
    the JavaFX properties and bindings framework properties as the backing store for
    the values of the JavaFX Beans properties. We show you these strategies in the
    next two subsections.


    Understanding the Eagerly Instantiated Properties Strategy


    The *eagerly instantiated properties* strategy is the simplest way to implement
    JavaFX Beans properties. For every JavaFX Beans property you want to define in
    an object, you introduce a private field in the class that is of the appropriate
    JavaFX properties and bindings framework property type. These private fields are
    instantiated at bean construction time. The getter and setter methods simply call
    the private field’s get() and set() methods. The property getter simply returns
    the private field itself.


    The program in Listing 4-9 defines a JavaFX Bean with an int property i, a String
    property str, and a Color property color.


