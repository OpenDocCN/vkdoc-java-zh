- fmt: "加载 FXML 文件的结果是一个可用于`Scene`的`JavaFX Node`，因此，你并不局限于为每个`Scene`仅使用一个 FXML 文件。例如，你可以将场景拆分为两个或多个部分，并用各自的\
    \ FXML 文件表示每个部分。然后，你可以对每个部分的 FXML 文件调用`FXMLLoader`的`load()`方法之一，并通过编程方式将生成的节点组装到场景中。\n\
    \nFXML 文件格式支持另一种将单独准备的 FXML 文件组合在一起的机制。一个 FXML 文件可以通过`fx:include`元素包含另一个文件。`fx:include`元素支持三个属性：`source`属性保存被包含的\
    \ FXML 文件的位置；`resources`属性保存被包含的 FXML 文件所使用的资源包的位置；`charset`属性保存被包含的 FXML 文件的字符集。如果`source`属性以“`/`”字符开头，则它被解释为类路径中的路径；否则，它被解释为相对于包含该文件的\
    \ FXML 文件的位置。`resource`和`charset`属性是可选的。当未指定它们时，将使用加载包含该文件的 FXML 文件时所使用的值。用于加载包含该文件的\
    \ FXML 文件的构建器工厂和控制器工厂也用于加载被包含的 FXML 文件。\n\n可以为`fx:include`元素指定一个`fx:id`。当指定了`fx:id`时，可以在包含该文件的\
    \ FXML 文件的控制器中指定一个对应的字段，并且`FXMLLoader`将使用加载被包含的 FXML 文件的结果来注入此字段。此外，如果被包含的 FXML\
    \ 文件在其根元素中指定了`fx:controller`，那么该被包含的 FXML 文件的控制器也可以被注入到包含该文件的 FXML 文件的控制器中，前提是在包含文件的控制器中有一个命名和类型都合适的字段来接收被注入的被包含\
    \ FXML 文件的控制器。在本节的示例应用程序中，我们使用两个 FXML 文件来表示应用程序的 UI。\n\n包含其他文件的 FXML 文件包含如下代码行：\n\
    \n```\n<BorderPane maxHeight=\"-Infinity\"\n...\nfx:controller=\"IncludeExampleTreeController\"\
    >\n    <fx:include fx:id=\"details\"\n                source=\"IncludeExampleDetail.fxml\"\
    \ />\n```\n\n而被包含的 FXML 文件包含如下代码行：\n\n```\n<VBox maxHeight=\"-Infinity\"\n...\n\
    fx:controller=\"IncludeExampleDetailController\">\n```\n\n因此，加载被包含的 FXML 文件将生成一个类型为`VBox`的根元素和一个类型为`IncludeExampleDetailController`的控制器。包含其他文件的\
    \ FXML 文件的控制器`IncludeExampleTreeController`包含如下字段：\n\n```\n@FXML\nprivate VBox\
    \ details;\n\n@FXML\nprivate IncludeExampleDetailController detailsController;\n\
    ```\n\n当包含其他文件的 FXML 文件被加载时，这些字段将持有被包含的 FXML 文件的已加载根元素和控制器。\n\n本节示例的完整源代码如清单 3-20\
    \ 至 3-25 所示。\n\n**清单 3-20.** `IncludeExampleTree.fxml`\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n\n<?import javafx.geometry.Insets?>\n<?import javafx.scene.control.Label?>\n\
    <?import javafx.scene.control.TreeTableColumn?>\n<?import javafx.scene.control.TreeTableView?>\n\
    <?import javafx.scene.layout.BorderPane?>\n<?import javafx.scene.layout.VBox?>\n\
    <?import javafx.scene.text.Font?>\n\n<BorderPane maxHeight=\"-Infinity\"\n   \
    \         maxWidth=\"-Infinity\"\n            minHeight=\"-Infinity\"\n      \
    \      minWidth=\"-Infinity\"\n            prefHeight=\"400.0\"\n            prefWidth=\"\
    600.0\"\n            xmlns:fx=\"http://javafx.com/fxml/1\"\n            fx:controller=\"\
    IncludeExampleTreeController\">\n    <top>\n        <Label text=\"Product Details\"\
    \n               BorderPane.alignment=\"CENTER\">\n            <font>\n      \
    \          <Font name=\"System Bold Italic\" size=\"36.0\"/>\n            </font>\n\
    \        </Label>\n    </top>\n    <left>\n        <VBox spacing=\"10.0\">\n \
    \           <children>\n                <Label text=\"List of Products:\">\n \
    \                   <font>\n                        <Font name=\"System Bold\"\
    \ size=\"12.0\"/>\n                    </font>\n                </Label>\n   \
    \             <TreeTableView fx:id=\"treeTableView\"\n                       \
