- fmt: "We can also hide the playing piece when the owner is `NONE` by using a second\
    \ conditional bind to set the radius to `0`. Finally to give the Region a circular\
    \ shape, we set the background radius to a very large value (1,000 em), which\
    \ gives us a rounded rectangle with zero length sides (or an oval) as shown in\
    \ the following code at the beginning of the constructor.\n\n```\npublic ReversiPiece()\
    \ {\n    styleProperty().bind(Bindings.when(ownerProperty.isEqualTo(Owner.NONE))\n\
    \        .then(\"radius 0\")\n        .otherwise(Bindings.when(ownerProperty.isEqualTo(Owner.WHITE))\n\
    \            .then(\"-fx-background-color: radial-gradient(radius 100%, white\
    \ .4, gray .9, darkgray 1)\")\n            .otherwise(\"-fx-background-color:\
    \ radial-gradient(radius 100%, white 0, black .6)\"))\n        .concat(\"; -fx-background-radius:\
    \ 1000em; -fx-background-insets: 5\"));\n    ...\n```\n\nThe constructor code\
    \ continues on to set up a reflection effect that will make the playing surface\
    \ seem glossy, and also sets a preferred size with enough room around the edges\
    \ to match the preferred size of the square minus a five-pixel background inset.\
    \ The last step is to set the playing piece to be transparent to mouse events,\
    \ so that the square underneath can pick them up instead:\n\n```\n    Reflection\
    \ reflection = new Reflection();\n    reflection.setFraction(1);\n    reflection.topOffsetProperty().bind(heightProperty().multiply(-.75));\n\
    \    setEffect(reflection);\n    setPrefSize(180, 180);\n    setMouseTransparent(true);\n\
    }\n```\n\nFor convenience we also include a constructor version that takes an\
    \ initial value for the owner property:\n\n```\npublic ReversiPiece(Owner owner)\
    \ {\n    this();\n    ownerProperty.setValue(owner);\n}\n```\n\nTo demonstrate\
    \ the finished product, you need to make a few additions to the previous sample\
    \ application to overlay the `Reversi` piece. The easiest way to accomplish this\
    \ is to refactor the `Scene` to use a `StackPane` layout to place the `Reversi`\
    \ piece on top of the square, and put it inside an `HBox` so you can have side-by-side\
    \ playing pieces.\n\nWe also make use of a new constraint on `HBox` and `VBox`\
    \ called `grow`. Setting `hgrow` on an element added to an `HBox` or `vgrow` on\
    \ an element added to a `VBox` lets the element expand from its preferred size\
    \ to take additional space as it becomes available. For a more detailed discussion\
    \ of `grow` and `priority`, see the next section on the `GridPane` where it is\
    \ used heavily.\n\nThe completed wrapper code using stacks, boxes, and the `grow`\
    \ constraint is shown in Listing 5-13.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 78](index-212_1.jpg)\n\n## Chapter 5 ■ Building dynamic UI layouts in\
    \ JavaFX\n\n### Listing 5-13. Wrapper Application That Displays Two Reversi Squares\
    \ Side by Side with Playing Pieces on Top\n\n```\npublic class ReversiPieceTest\
    \ extends Application {\n    public static void main(String[] args) {\n      \
    \  launch(args);\n    }\n\n    @Override\n    public void start(Stage primaryStage)\
    \ {\n        Node white = new StackPane(new ReversiSquare(), new ReversiPiece(Owner.WHITE));\n\
    \        Node black = new StackPane(new ReversiSquare(), new ReversiPiece(Owner.BLACK));\n\
    \        HBox hbox = new HBox(white, black);\n        hbox.setSnapToPixel(false);\n\
    \        primaryStage.setScene(new Scene(hbox));\n        HBox.setHgrow(white,\
    \ Priority.ALWAYS);\n        HBox.setHgrow(black, Priority.ALWAYS);\n        primaryStage.show();\n\
    \    }\n}\n```\n\nFigure 5-11 shows the completed application with both white\
    \ and black pieces displayed side by side.\n\n### Figure 5-11. One Reversi square\
    \ with a white playing piece on it, and another with a black piece\n\n## Laying\
    \ Out the Tiles Using a GridPane\n\nOne of the most flexible and powerful layouts\
    \ contained in JavaFX is the `GridPane`. It lets you arrange the children in a\
    \ grid composed of rows and columns, optionally assigning constraints such as\
    \ alignment, `grow`, and margin to individual nodes or an entire row or column.\
    \ You can also do advanced layouts that will span rows or columns, giving you\
    \ a layout container that is truly a superset of all the other containers discussed\
    \ so far.\n\nTable 5-9 lists the different properties of `GridPane` that you can\
    \ set either per `Node` or on an entire column or row (with the exception of margin)."
