    Making a Scene


    Continuing on with our theater metaphor for creating JavaFX applications, we now
    discuss putting a Scene on the Stage. The Scene, as you recall, is the place in
    which the actors and props (nodes) visually interact with each other and the audience
    (the users of your program).


    Using the Scene Class: The OnTheScene Example


    As with the Stage class, we’re going to use a contrived example application to
    demonstrate and teach the details of the available capabilities in the Scene class.
    See Figure [2-6 for a s](#index_split_000.html#p48)creenshot of the OnTheScene
    program.


    ***Figure 2-6.** The OnTheScene program when first invoked*


