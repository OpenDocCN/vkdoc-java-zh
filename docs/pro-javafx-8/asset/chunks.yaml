    of the stage.


    ## Setting the Stage


    The appearance and functionality of your stage will depend on the platform on
    which it is deployed. For example, if deployed in an embedded device with a touch
    screen, your stage might be the whole touch screen. The stage for a JavaFX program
    deployed via Java Web Start will be a window.


    ### Understanding the Stage Class


    The `Stage` class is the top-level container for any JavaFX program that has a
    graphical UI. It has several properties and methods that allow it, for example,
    to be positioned, sized, given a title, made invisible, or given some degree of
    opacity. The two best ways that we know of to learn the capabilities of a class
    are to study the JavaFX API documentation and to examine (and write) programs
    that use it. In this section, we ask you to do both, beginning with looking at
    the API docs.


    The JavaFX API docs may be found in the `docs/api` directory subordinate to where
    you installed the JavaFX SDK. Also, they are available online at the URL given
    in the Resources section at the end of this chapter.


    Open the `index.html` file in your browser, navigate to the `javafx.stage` package,
    and select the `Stage` class. That page should contain tables of Properties, Constructors,
    and Methods, including select ones shown in the excerpt in Figure [2-1.](#index_split_000.html#p37)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 25](index-37_1.jpg)


    **Figure 2-1.** *A portion of the Stage class documentation in the JavaFX API*


    Go ahead and explore the documentation for each of the properties and methods
    in the `Stage` class, remembering to click the links to reveal more detailed information.
    When you’re finished, come back and we’ll show you a program that demonstrates
    many of the properties and methods available in the `Stage` class.


    ### Using the Stage Class: The StageCoach Example


    A screenshot of the unassuming, purposely ill-fitting `StageCoach` example program
    is shown in Figure [2-2](#index_split_000.html#p38).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 26](index-38_1.jpg)


    **Figure 2-2.** *A screenshot of the StageCoach example*


    The `StageCoach` program was created to coach you through the finer points of
    using the `Stage` class and related classes such as `StageStyle` and `Screen`.
    Also, we use this program to show you how to get arguments passed into the program.
    Before walking through the behavior of the program, go ahead and open the project
    and execute it by following the instructions for building and executing the `AudioConfig`
    project in Chapter 1. The project file is located in the `Chapter02` directory
    subordinate to where you extracted the book’s code download bundle.


    #### Examining the Behavior of the StageCoach Program


    When the program starts, its appearance should be similar to the screenshot in
    Figure [2-2.](#index_split_000.html#p38) To fully examine its behavior, perform
    the following steps. Note that for instructional purposes, the property and method
    names on the UI correspond to the properties and methods in the `Stage` instance.


    1. Notice that the `StageCoach` program’s window is initially displayed near the
    top of the screen, with its horizontal position in the center of the screen. Drag
    the program’s window and observe that the `x` and `y` values near the top of the
    UI are dynamically updated to reflect its position on the screen.


    2. Resize the program’s window and observe that the `width` and `height` values
    change to reflect the width and height of the `Stage`. Note that this size includes
    the decorations (title bar and borders) of the window.


    3. Click the program (or cause it to be in focus some other way) and notice that
    the `focused` value is `true`. Cause the window to lose focus, perhaps by clicking
    somewhere else on the screen, and notice that the `focused` value becomes `false`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 27](index-39_1.jpg)


    4. Clear the `resizable` check box and then notice that the `resizable` value
    becomes `false`. Then try to resize the window and note that it is not permitted.
    Select the `resizable` check box again to make the window resizable.


    5. Select the `fullscreen` check box. Notice that the program occupies the full
    screen and that the window decorations are not visible. Clear the `fullscreen`
    check box to restore the program to its former size.


    6. Edit the text in the text field beside the `title` label, noticing that the
    text in the window’s title bar is changed to reflect the new value.


    7. Drag the window to partially cover another window, and click `toBack()`. Notice
    that this places the program behind the other window, therefore causing the z-order
    to change.


    8. With a portion of the program’s window behind another window, but with the
