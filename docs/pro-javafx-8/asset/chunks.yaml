    实例变量的值。此外，ScrollBar 的 value 属性与模型中的 kph 属性进行了双向绑定，正如你在第 29 步中所体验到的，这用于保持 ProgressBar
    的更新。以下来自清单 6-1 的代码片段包含了 StarterAppModel 类中的相关实例变量：


