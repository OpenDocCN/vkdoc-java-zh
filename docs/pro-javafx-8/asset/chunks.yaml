    \ 或 IntelliJ IDEA）搭建了开发环境，编写并运行了第一个 JavaFX GUI 程序，学习了 JavaFX 的基本构建模块：Stage 和 Scene\
    \ 类，以及构成 Scene 的 Nodes。您无疑已经注意到，我们使用了用户定义的模型类来表示应用程序状态，并通过属性和绑定将该状态传递给 UI。\n\n\
    在本章中，我们将带您深入了解 JavaFX 属性和绑定框架。在简要回顾历史并给出一个激励性示例（展示 JavaFX Property 的各种使用方式）之后，我们将介绍该框架的核心概念：Observable、ObservableValue、WritableValue、ReadOnlyProperty、Property\
    \ 和 Binding。我们将展示这些框架基础接口所提供的功能，然后演示 Property 对象如何绑定在一起，Binding 对象如何由属性和其他绑定构建而成——\n\
    \n使用 `Bindings` 工具类中的工厂方法、流畅接口 API，或者通过直接扩展实现 `Binding` 接口的抽象类来进行底层操作——以及它们如何被用来轻松地将程序中某一部分的变更传播到其他部分，而无需编写过多代码。接着，我们将介绍\
    \ JavaFX Beans 命名约定，这是原始 JavaBeans 命名约定的扩展，它使您能够将数据有条理地组织到封装组件中。最后，我们将展示如何将旧式\
    \ JavaBeans 属性适配为 JavaFX 属性。\n\n由于 JavaFX 属性和绑定框架是 JavaFX 平台的非可视化部分，本章中的示例程序本质上也是非可视化的。我们将处理\
    \ Boolean、Integer、Long、Float、Double、String 和 Object 类型的属性和绑定，因为这些是 JavaFX 绑定框架所专精的类型。\n\
    \n您的 GUI 编程乐趣将在下一章及后续章节中继续。\n\n**JavaFX 绑定的先驱**\n\n在 Java 发展早期，人们就认识到需要将 Java\
    \ 组件的属性直接暴露给客户端代码，使其能够观察和操作这些属性，并在其值发生变化时采取行动。Java 1.1 中的 JavaBeans 框架通过如今广为人知的\
    \ getter 和 setter 约定提供了对属性的支持。它还通过其 `PropertyChangeEvent` 和 `PropertyChangeListener`\
    \ 机制支持属性变更的传播。尽管 JavaBeans 框架在许多 Swing 应用程序中得到了应用，但其使用相当繁琐，需要编写大量样板代码。多年来，人们创建了多个更高级的数据绑定框架，并取得了不同程度的成功。JavaBeans\
    \ 在 JavaFX 属性和绑定框架中的传承主要体现在 JavaFX Beans 的 getter、setter 和属性 getter 命名约定上，用于定义\
    \ JavaFX 组件。我们将在本章后面介绍 JavaFX 属性和绑定框架的核心概念和接口之后，再讨论 JavaFX Beans 的 getter、setter\
    \ 和属性 getter 命名约定。\n\nJavaFX 属性和绑定框架的另一传承来自 JavaFX Script 语言，该语言是 JavaFX 1.x 平台的一部分。尽管\
    \ JavaFX Script 语言在 JavaFX 平台中已被弃用，转而采用基于 Java 的 API，但这次过渡的目标之一就是保留 JavaFX Script\
    \ 的 `bind` 关键字的大部分能力，其表达能力曾令许多 JavaFX 爱好者欣喜不已。例如，JavaFX Script 支持绑定到复杂表达式：\n\n\
    ```java\nvar a = 1;\nvar b = 10;\nvar m = 4;\ndef c = bind for (x in [a..b] where\
    \ x < m) { x * x };\n```\n\n每当 `a`、`b` 或 `m` 的值发生变化时，这段代码都会自动重新计算 `c` 的值。\n\n\
    尽管 JavaFX 属性和绑定框架并不支持 JavaFX Script 的所有绑定结构，但它支持许多有用表达式的绑定。在介绍完框架的核心概念和接口之后，我们将进一步讨论如何构建复合绑定表达式。\n\
    \n**一个激励性示例**\n\n让我们从清单 4-1 中的示例开始，该示例通过使用 `SimpleIntegerProperty` 类的几个实例，展示了\
    \ `Property` 接口的功能。\n\n***清单 4-1.*** MotivatingExample.java\n\n```java\nimport\
    \ javafx.beans.InvalidationListener;\nimport javafx.beans.property.IntegerProperty;\n\
    import javafx.beans.property.SimpleIntegerProperty;\nimport javafx.beans.value.ChangeListener;\n\
    import javafx.beans.value.ObservableValue;\n\npublic class MotivatingExample {\n\
    \    private static IntegerProperty intProperty;\n\n    public static void main(String[]\
    \ args) {\n        createProperty();\n        addAndRemoveInvalidationListener();\n\
    \        addAndRemoveChangeListener();\n        bindAndUnbindOnePropertyToAnother();\n\
    \    }\n\n    private static void createProperty() {\n        System.out.println();\n\
    \        intProperty = new SimpleIntegerProperty(1024);\n        System.out.println(\"\
    intProperty = \" + intProperty);\n        System.out.println(\"intProperty.get()\
    \ = \" + intProperty.get());\n        System.out.println(\"intProperty.getValue()\
    \ = \" + intProperty.getValue().intValue());\n    }\n\n    private static void\
    \ addAndRemoveInvalidationListener() {\n        System.out.println();\n      \
    \  final InvalidationListener invalidationListener = observable ->\n         \
    \   System.out.println(\"The observable has been invalidated: \" + observable\
    \ + \".\");\n        intProperty.addListener(invalidationListener);\n        System.out.println(\"\
    Added invalidation listener.\");\n        System.out.println(\"Calling intProperty.set(2048).\"\
    );\n        intProperty.set(2048);\n        System.out.println(\"Calling intProperty.setValue(3072).\"\
    );\n        intProperty.setValue(Integer.valueOf(3072));\n        intProperty.removeListener(invalidationListener);\n\
    \        System.out.println(\"Removed invalidation listener.\");\n        System.out.println(\"\
    Calling intProperty.set(4096).\");\n        intProperty.set(4096);\n    }\n\n\
    \    private static void addAndRemoveChangeListener() {\n        System.out.println();\n\
    \        final ChangeListener changeListener = (ObservableValue observableValue,\
    \ Object oldValue,\n                Object newValue) ->\n            System.out.println(\"\
    The observableValue has changed: oldValue = \" + oldValue + \", newValue = \"\
    \ + newValue);\n        intProperty.addListener(changeListener);\n        System.out.println(\"\
    Added change listener.\");\n        System.out.println(\"Calling intProperty.set(5120).\"\
    );\n        intProperty.set(5120);\n        intProperty.removeListener(changeListener);\n\
    \        System.out.println(\"Removed change listener.\");\n        System.out.println(\"\
    Calling intProperty.set(6144).\");\n        intProperty.set(6144);\n    }\n\n\
    \    private static void bindAndUnbindOnePropertyToAnother() {\n        System.out.println();\n\
    \        IntegerProperty otherProperty = new SimpleIntegerProperty(0);\n     \
    \   System.out.println(\"otherProperty.get() = \" + otherProperty.get());\n  \
    \      System.out.println(\"Binding otherProperty to intProperty.\");\n      \
    \  otherProperty.bind(intProperty);\n        System.out.println(\"otherProperty.get()\
    \ = \" + otherProperty.get());\n        System.out.println(\"Calling intProperty.set(7168).\"\
    );\n        intProperty.set(7168);\n        System.out.println(\"otherProperty.get()\
    \ = \" + otherProperty.get());\n        System.out.println(\"Unbinding otherProperty\
    \ from intProperty.\");\n        otherProperty.unbind();\n        System.out.println(\"\
    otherProperty.get() = \" + otherProperty.get());\n        System.out.println(\"\
    Calling intProperty.set(8192).\");\n        intProperty.set(8192);\n        System.out.println(\"\
    otherProperty.get() = \" + otherProperty.get());\n    }\n}\n```\n"
- fmt: 'In this example we created a `SimpleIntegerProperty` object called `intProperty`
    with an initial value of `1024`. We then updated its value through a series of
    different integers while we added and then removed an `InvalidationListener`,
    added and then removed a `ChangeListener`, and finally created another `SimpleIntegerProperty`
    named `otherProperty`, bound it to and then unbound it from `intProperty`. We
    have taken advantage of the Java 8 Lambda syntax in defining our listeners. The
    sample program used a generous amount of `println` calls to show what is happening
    inside the program.


    When we run the program in Listing 4-1, the following output is printed to the
    console:


    ```

    intProperty = IntegerProperty [value: 1024]

    intProperty.get() = 1024

    intProperty.getValue() = 1024

    Added invalidation listener.

    Calling intProperty.set(2048).

    The observable has been invalidated: IntegerProperty [value: 2048].

    Calling intProperty.setValue(3072).

    The observable has been invalidated: IntegerProperty [value: 3072].

    Removed invalidation listener.

    Calling intProperty.set(4096).

    Added change listener.

    Calling intProperty.set(5120).

    The observableValue has changed: oldValue = 4096, newValue = 5120

    Removed change listener.

    Calling intProperty.set(6144).

    otherProperty.get() = 0

    Binding otherProperty to intProperty.

    otherProperty.get() = 6144

    Calling intProperty.set(7168).

    otherProperty.get() = 7168

    Unbinding otherProperty from intProperty.

    otherProperty.get() = 7168

    Calling intProperty.set(8192).

    otherProperty.get() = 7168

    ```


    By correlating the output lines with the program source code (or by stepping through
    the code in the debugger of your favorite IDE), we can draw the following conclusions.


    - A `SimpleIntegerProperty` object such as `intProperty` and `otherProperty` holds
    an `int` value. The value can be manipulated with the `get()`, `set()`, `getValue()`,
    and `setValue()` methods. The `get()` and `set()` methods perform their operation
    with the primitive `int` type. The `getValue()` and `setValue()` methods use the
    `Integer` wrapper type.

    - You can add and remove `InvalidationListener` objects to and from `intProperty`.

    - You can add and remove `ChangeListener` objects to and from `intProperty`.

    - Another `Property` object such as `otherProperty` can bind itself to `intProperty`.
    When that happens, `otherProperty` receives the value of `intProperty`.

    - When a new value is set on `intProperty`, whatever object that is attached to
    it is notified. The notification is not sent if the object is removed.

    - When notified, `InvalidationListener` objects are only informed of which object
    is sending out the notification and that object is only known as an `Observable`.

    - When notified, `ChangeListener` objects are informed on two more pieces of information—the
    `oldValue` and the `newValue`—in addition to the object sending the notification.
    The sending object is known as an `ObservableValue`.

    - In the case of a binding property such as `otherProperty`, we cannot tell from
    the output when or how it is notified of the change of value in `intProperty`.
    However, we can infer that it must have known of the change because when we asked
    `otherProperty` for its value we got back the latest value of `intProperty`.


    > **Note:** Even though this motivating example uses an `Integer` property, similar
    examples can be made to use properties based on the `Boolean`, `Long`, `Float`,
    `Double`, `String`, and `Object` types. In the JavaFX properties and bindings
    framework, when interfaces are extended or implemented for concrete types, they
    are always done for the `Boolean`, `Integer`, `Long`, `Float`, `Double`, `String`,
    and `Object` types.


    This example brings to our attention some of the key interfaces and concepts of
    the JavaFX properties and bindings framework: including the `Observable` and the
    associated `InvalidationListener` interfaces, the `ObservableValue` and the associated
    `ChangeListener` interfaces, the `get()`, `set()`, `getValue()`, and `setValue()`
    methods that allow us to manipulate the values of a `SimpleIntegerProperty` object
    directly, and the `bind()` method that allows us to relinquish direct manipulation
    of the value of a `SimpleIntegerProperty` object by subordinating it to another
    `SimpleIntegerProperty` object.


    In the next section we show you these and some other key interfaces and concepts
    of the JavaFX properties and bindings framework in more detail.


    ## Understanding Key Interfaces and Concepts


    Figure [4-1 is a UML diagram](#index_split_001.html#p152) showing the key interfaces
    of the JavaFX properties and bindings framework. It includes some interfaces that
    you have seen in the last section, and some that you haven’t yet seen.


    ![Image 67](index-152_1.png)


    **Figure 4-1.** Key interfaces of the JavaFX properties and bindings framework


    > **Note:** We did not show you the fully qualified names of the interfaces in
    the UML diagram. These interfaces are spread out in four packages: `javafx.beans`,
    `javafx.beans.binding`, `javafx.beans.property`, and `javafx.beans.value`. You
    can easily figure out which interface belongs to which package by examining the
    JavaFX API documentation or by the “find class” feature of your favorite IDE.


    ## Understanding the Observable Interface


    At the root of the hierarchy is the `Observable` interface. You can register `InvalidationListener`
    objects to an `Observable` object to receive *invalidation* events. You have already
    seen invalidation events fired from one kind of `Observable` object, the `SimpleIntegerProperty`
    object `intProperty` in the motivating example in the last section.


    It is fired when the `set()` or `setValue()` methods are called to change the
    underlying value from one `int` to a different `int`.


    > **Note:** An invalidation event is fired only once by any of the implementations
    of the `Property` interface in the JavaFX properties and bindings framework if
    you call the setter with the same value several times in a row.


    Another place where invalidation events are fired is from `Binding` objects. You
    haven’t seen an example of a `Binding` object yet, but there are plenty of `Binding`
    objects in the second half of this chapter. For now we just note that a `Binding`
    object may become invalid, for example, when its `invalidate()` method is called
    or, as we show later in this chapter, when one of its dependencies fires an invalidation
    event.


    > **Note:** An invalidation event is fired only once by any of the implementations
    of the `Binding` interface in the JavaFX properties and bindings framework if
    it becomes invalid several times in a row.


    ## Understanding the ObservableValue Interface


    Next up in the hierarchy is the `ObservableValue` interface. It’s simply an `Observable`
    that has a value. Its `getValue()` method returns its value. The `getValue()`
    method that we called on the `SimpleIntegerProperty` objects in the motivating
    example can be considered to have come from this interface. You can register `ChangeListener`
    objects to an `ObservableValue` object to receive *change* events.


    You saw change events being fired in the motivating example in the last section.
    When the change event fires, the `ChangeListener` receives two more pieces of
    information: the old value and the new value of the `ObservableValue` object.


    > **Note:** A change event is fired only once by any of the implementations of
    the `ObservableValue` interface in the JavaFX properties and bindings framework
    if you call the setter with the same value several times in a row.'
