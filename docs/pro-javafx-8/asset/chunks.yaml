    \ 无疑是 JavaFX 工具包中最强大、最灵活的布局。熟悉它的所有功能确实非常值得。\n\n创建播放控件\n\n现在你已经掌握了使用 `MediaPlayer`\
    \ 控制播放的基本知识，并且我们的布局也已就位，接下来让我们考虑实现一个播放/暂停按钮。这个简单的控件会在 `MediaPlayer` 当前不处于 `PLAYING`\
