    Understanding the Canvas and Image Ops APIs


    The Canvas and Image Ops APIs allow you to manipulate the 2D graphical content
    of an on-screen canvas or an off-screen image.


    Understanding the Canvas API


    The Canvas API consists of two public classes, Canvas and GraphicsContext in the
    javafx.scene.canvas package.


    Canvas is a Node that can be added to a Scene.


    The Canvas class includes two public constructors:


    • Canvas()


    • Canvas(double width, double height)


    The default constructor creates a Canvas with zero width and zero height. The
    two-parameter constructor creates a Canvas with the specified width and height.


    The Canvas class includes the following public methods:


    • GraphicsContext getGraphicsContext2D()


    • void setWidth(double width)


    • double getWidth()


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 10 ■ JavaFX 3D


    • DoubleProperty widthProperty()


    • void setHeight(double height)


    • double getHeight()


    • DoubleProperty heightProperty()


    The getGraphicsContext2D() method returns the GraphicsContext for the Canvas that
    you can use to perform 2D graphics operations. The same object is returned if
    you call getGraphicsContext2D() on the same Canvas object multiple times. The
    other methods define read-write properties width and height for the Canvas.


    The GraphicsContext class does not have any public constructors. The only way
    to obtain an instance of GraphicsContext is from a Canvas object.


    GraphicsContext supports a style of 2D operations that is similar to immediate
    mode 2D operations found in other graphics toolkits such as java.awt.Canvas, javax.swing.Component,
    and the HTML 5 Canvas API. Unlike in AWT or Java2D, where the drawing on the surface
    happens in the paint() callback method, the JavaFX Canvas’s typical usage scenario
    is to create the Canvas, get the GraphicsContext from it, draw on the Canvas with
    calls to GraphicsContext methods, and then add the Canvas to the scene graph.
    You can continue calling GraphicsContext methods after adding the Canvas to the
    scene graph. However, all GraphicsContext methods are considered UI manipulating
    methods, and should only be called in the JavaFX Application thread after the
    Canvas has been added to the scene graph.


    The GraphicsContext class has a full set of public methods that allows you to
    perform 2D operations on the Canvas that owns it. The following methods do not
    put any graphics artifacts on the Canvas; however, they control the state of the
    GraphicsContext and affect subsequent rendering calls:


