    }


    }


    Notice that we have changed the import to the normal JavaFX one and used the standard
    constructor with a String argument. Even though the Scene content is defined as
    a collection of ScalaFX Nodes, the Scala implicit kicks in and automatically converts
    the JavaFX object to a ScalaFX proxy.


    The ScalaFX implicit conversions require that you import scalafx.Includes._, which
    has been the first line in all the programs we have shown. This is a special syntax
    for Scala that is equivalent to a static import in Java, and will automatically
    include several utility methods and all the JavaFX to ScalaFX implicit conversions.
    For the purposes of ScalaFX development, you should simply treat it as a preamble
    and include it on all your ScalaFX source files.


    JavaFX Properties in Scala


    Although we have been using ScalaFX properties directly, we have not directly
    shown how they work. In particular, notice the absence of the usual getter/setter
    pattern found in JavaFX. This is possible because ScalaFX lets us override the
    behavior of operators and assignment to substitute more efficient versions of
    the same operations. To understand this, let’s take a look at the JavaFX property
    pattern again.


    When creating properties for JavaFX in Java, each property definition consists
    of one variable and three different accessor methods as shown again in Listing
