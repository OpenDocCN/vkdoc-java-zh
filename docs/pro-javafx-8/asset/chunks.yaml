    is the smooth property. This is a Boolean property that controls the quality of
    the resulting image after the scale. If smooth is true, the scaling algorithm
    will produce a higher quality image at the cost of some extra computation time.
    If false, the scaling will be done faster but the result will not look as good.
    This lets the developer make a time versus quality trade-off. When making a movie
