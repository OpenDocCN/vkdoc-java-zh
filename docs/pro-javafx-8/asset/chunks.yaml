- fmt: '`ObservableArray`接口的引入是为了应对这样一种场景：需要观察原始`int`或`float`值的列表，但出于性能原因，每次向列表添加或移除元素时对原始值进行装箱和拆箱的开销是不可接受的。`ObservableArray`及其两个子接口`ObservableIntegerArray`和`ObservableFloatArray`的实现，预期会使用原始数组作为其内容的底层存储。JavaFX
    3D API 使用了`ObservableArray`、`ObservableIntegerArray`和`ObservableFloatArray`。图
    7-4 是一个展示`ObservableArray`及其支持接口的 UML 图。


    ![Image 100](index-289_1.jpg)


    **图 7-4.** 支持 JavaFX 可观察数组的关键接口


    与`ObservableList`、`ObservableMap`和`ObservableSet`接口不同，`ObservableArray`接口并未实现任何
    Java 集合框架接口。`ObservableArray`接口上的以下方法允许你注册和注销`ArrayChangeListener`：


    - `addListener(ArrayChangeListener<T> listener)`

    - `removeListener(ArrayChangeListener<T> listener)`


    `ObservableArray`上的以下额外方法让你能够控制底层的原始数组：


    - `resize(int size)`

    - `ensureCapacity(int capacity)`

    - `trimToSize()`

    - `clear()`

    - `size()`


    这些方法处理`ObservableArray`的容量和大小。*容量*是底层原始数组的长度。*大小*是实际包含应用程序数据的元素数量。容量总是大于或等于大小。如果当前底层原始数组的长度小于所需的新容量，`ensureCapacity()`方法会分配一个新的底层原始数组。`resize()`方法会改变`ObservableArray`的大小。如果新大小大于当前容量，则容量会增加。如果新大小大于当前大小，则额外的元素会用零填充。如果新大小小于当前大小，`resize()`实际上不会收缩数组，但“丢失”的元素会用零填充。`trimToSize()`方法会将底层原始数组替换为一个长度与`ObservableArray`大小相同的数组。`clear()`方法将`ObservableArray`的大小调整为
    0。`size()`方法返回`ObservableArray`的当前大小。


    `ArrayChangeListener`接口只有一个方法：`onChanged(T observableArray, boolean sizeChanged,
    int from, int to)`。请注意，与`ListChangeListener`、`MapChangeListener`和`SetChangeListener`中将`Change`对象传递给`onChange()`方法不同，`ArrayChangeListener`直接将变更的特征作为参数传递。第一个参数是`ObservableArray`本身。如果可观察数组的大小发生了变化，`sizeChanged`参数将为`true`。`from`和`to`参数标记了变更元素的范围，`from`端包含在内，`to`端不包含在内。


    `ObservableIntegerArray`和`ObservableFloatArray`接口具有以类型特定方式操作数据的方法。我们列出了`ObservableIntegerArray`的方法（`ObservableFloatArray`的方法类似）：


    - `copyTo(int srcIndex, int[] dest, int destIndex, int length)`

    - `copyTo(int srcIndex, ObservableIntegerArray dest, int destIndex, int length)`

    - `int get(int index)`

    - `addAll(int... elements)`

    - `addAll(ObservableIntegerArray src)`

    - `addAll(int[] src, int srcIndex, int length)`

    - `addAll(ObservableIntegerArray src, int srcIndex, int length)`

    - `setAll(int... elements)`

    - `setAll(int[] src, int srcIndex, int length)`

    - `setAll(ObservableIntegerArray src)`

    - `setAll(ObservableIntegerArray src, int srcIndex, int length)`

    - `set(int destIndex, int[] src, int srcIndex, int length)`'
  raw: 'The ObservableArray interface is introduced for situations where a list of
    primitive int or float values needs to be observed but the overhead of boxing
    and unboxing of the primitive values every time they are added or removed from
    the list is unacceptable for performance reasons. Implementations of ObservableArray
    and its two subinterfaces, ObservableIntegerArray and ObservableFloatArray, are
    expected to use primitive arrays as the backing stores of their content. The JavaFX
    3D API makes use of ObservableArray, ObservableIntegerArray, and ObservableFloatArray.
    Figure [7-4 is a UML di](#index_split_003.html#p289)agram showing the ObservableArray
    and supporting interfaces.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 100](index-289_1.jpg)


    Chapter 7 ■ ColleCtions and ConCurrenCy


    ***Figure 7-4.** Key interfaces that support the JavaFX observable array*


    Unlike for the ObservableList, ObservableMap, and ObservableSet interfaces, the
    ObservableArray interface does not implement any Java collections framework interfaces.
    The following methods on the ObservableArray interface allow you to register and
    unregister ArrayChangeListeners:


    • addListener(ArrayChangeListener<T> listener)


    • removeListener(ArrayChangeListener<T> listener)


    The following additional methods on ObservableArray give you control of the underlying
    primitive arrays:


    • resize(int size)


    • ensureCapacity(int capacity)


    • trimToSize()


    • clear()


    • size()


    These methods deal with the capacity and size of an ObservableArray. The *capacity*
    is the length of the underlying primitive array. The *size* is the number of elements
    that actually contain application data. The capacity is always greater than or
    equal to the size. The ensureCapacity() method allocates a new underlying primitive
    array if the length of the current underlying primitive array is less than the
    desired new capacity. The resize() method changes the size of ObservableArray.
    If the new size is greater than the current capacity, the capacity is increased.
    If the new size is greater than the current size, the additional elements are
    filled with zero. If the new size is less than the current size, resize() does
    not actually shrink the array, but the “lost” elements are filled with zero. The
    trimToSize() method replaces the underlying primitive array with one whose length
    is the same as the size of the ObservableArray. The clear() method resizes the
    ObservableArray to size zero. The size() method returns the current size of the
    ObservableArray.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 7 ■ ColleCtions and ConCurrenCy


    The ArrayChangeListener interface has only one method: onChanged(T observableArray,
    boolean sizeChanged, int from, int to). Notice that instead of passing a Change
    object to the onChange() method, as is done in ListChangeListener, MapChangeListener,
    and SetChangeListener, ArrayChangeListener passes characteristics of the change
    directly as parameters. The first parameter is the ObservableArray itself. The
    sizeChanged parameter will be true if the size of the observable array has changed.
    The from and to parameters mark the range of the changed elements, inclusive on
    the from end, and exclusive on the to end.


    The ObservableIntegerArray and ObservableFloatArray interfaces have methods that
    manipulate the data in a type-specific way. We list the methods of ObservableIntegerArray
    (methods of ObservableFloatArray are similar):


    • copyTo(int srcIndex, int[] dest, int destIndex, int length)


    • copyTo(int srcIndex, ObservableIntegerArray dest, int destIndex, int length)


    • int get(int index)


    • addAll(int... elements)


