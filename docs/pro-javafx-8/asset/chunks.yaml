    \ maps provide different color values for different points on the surface of a\
    \ 3D shape. The `bumpMap` and the `selfIlluminationMap` are similarly mapped to\
    \ the points on the surface of a 3D shape. The `selfIlluminationMap` provides\
    \ colors that will shine through even if no light is illuminating the 3D object.\
    \ The `bumpMap` does not contain color information at all. It contains normal\
    \ vector information (which just happens to be three numbers, which can be encoded\
    \ as an RGB color) for each point of the surface, which, when taken into account\
    \ during the color rendering calculation, will result in a bumped look.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 10 ■ JavaFX 3D\n\nThe mapping of the points on the surface to a point\
    \ on the images is the job of the `TriangleMesh`. We built a `MeshView` with a\
    \ user-defined `TriangleMesh` earlier in this chapter. In fact, the predefined\
    \ 3D shapes are also based on `TriangleMeshes` internally. Therefore they are\
    \ also capable of being texturized. Recall that in `TriangleMesh`, each face is\
    \ defined by six indices: `p0`, `t0`, `p1`, `t1`, `p2`, `t2`, where `p0`, `p1`,\
    \ `p2` are indices into the points array, and `t0`, `t1`, `t2` are indices into\
    \ the `texCoords` array. Looking up the `texCoords` array with `t0`, `t1`, `t2`\
    \ we get the (`u0`, `v0`), (`u1`, `v1`), and (`u2`, `v2`) coordinates. The triangular\
    \ portion of the image determined by these three coordinates is mapped to the\
    \ face of the 3D shape.\n\nIn the program in Listing 10-8, we use a world map\
    \ image as the `diffuseMap` of a sphere to make a globe.\n\n### Listing 10-8.\
