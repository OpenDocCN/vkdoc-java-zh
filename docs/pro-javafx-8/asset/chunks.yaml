    Raspberry Pi 在内的许多嵌入式设备上运行良好。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 171](img/index-529_1.jpg)


    第 12 章 ■ 嵌入式与移动设备上的 JavaFX


    Raspberry Pi


    Raspberry Pi 是一款大小与信用卡相当的板卡计算机。它由 Raspberry Pi 基金会（参见 [`www.raspberrypi.org`](http://www.raspberrypi.org/)）开发，并由多家授权公司制造。它通常用于教育目标和展示技术。


    Raspberry Pi 板卡的图片如图 12-4 所示。


    ***图 12-4.** Raspberry Pi 板卡*


    目前，Raspberry Pi 有两个版本，售价分别为 25 美元和 35 美元。两个版本均配备 ARM11 32 位 RISC 处理器。低价型号拥有 256
    MB 内存，高价型号拥有 512 MB 内存。Raspberry Pi 没有内置硬盘，而是从 SD 卡启动。


    Raspberry Pi 推荐的操作系统是 Raspbian Wheezy，它基于开源 Debian Linux 操作系统。Raspbian Wheezy
    使用 ARM 硬浮点架构。这很好，因为 Oracle 提供的 ARM 版 JDK 8 也是为 ARM 硬浮点架构构建的。


    Raspberry Pi 配备了一款不错的 GPU，这使其成为展示 JavaFX 应用程序的绝佳选择。Raspberry Pi 板卡本身没有输出屏幕，但它包含多种接口（例如
    HDMI、复合 RCA、DSI）来与标准显示器交互。由于 Raspberry Pi 有以太网连接，因此非常方便使用 SSH（安全外壳）从工作站登录到 Raspberry
    Pi。


    Raspberry Pi 上的 JavaFX


    如前所述，你可以用来在 Raspberry Pi（以及一般的基于 ARM 的 Linux 系统）上开发 JavaFX 应用程序的 JavaFX 平台，基于
    OpenJFX 中可用的代码。


    OpenJFX 项目的 wiki 部分包含关于如何设置带有 JavaFX 的 Raspberry Pi 的详细且最新的说明。你可以在以下网站阅读这些说明：[`wiki.openjdk.java.net/display/`](https://wiki.openjdk.java.net/display/OpenJFX/OpenJFX+on+the+Raspberry+Pi.Because)


    [OpenJFX/OpenJFX+on+the+Raspberry+Pi。](https://wiki.openjdk.java.net/display/OpenJFX/OpenJFX+on+the+Raspberry+Pi.Because)由于
    Raspberry Pi 上的 JavaFX 运行时提供了与桌面版 JavaFX 运行时相同的 API，我们可以在我们的 530


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 12 章 ■ 嵌入式与移动设备上的 JavaFX


    应用程序中利用 JavaFX 8（以及一般的 Java 8）的所有优秀特性。特别是，Java 8 中添加的 Lambda 表达式和流支持，在使用 Raspberry
    Pi 上的 JavaFX 运行时效果非常好。


    这方面的一个很好的例子是 Mary Had a Little Lambda 项目。这个项目是 JavaFX 对流行歌曲“Mary Had a Little
    Lamb”的回应，是 JavaFX 应用程序中 Lambda 表达式和流 API 的典型展示。该代码由 Stephen Chin 在 GitHub 上维护，地址为
    [`github.com/steveonjava/`](https://github.com/steveonjava/MaryHadALittleLambda/tree/master/src/sample)


    [MaryHadALittleLambda/tree/master/src/sample](https://github.com/steveonjava/MaryHadALittleLambda/tree/master/src/sample)。


    该代码包含在 NetBeans 中打开它所需的文件，但也可以使用命令行 ant 工具进行编译、打包和执行。你可以通过执行 `git clone [`github.com/steveonjava/MaryHadALittleLambda.git`](https://github.com/steveonjava/MaryHadALittleLambda.git)`
    获取代码的本地副本。

