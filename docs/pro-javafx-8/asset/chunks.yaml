    Using the onKeyPressed Event Handler


    When the user presses a key, the lambda expression supplied to the onKeyPressed
    method is invoked, passing a KeyEvent instance that contains information about
    the event. The method body of this expression, shown in the preceding snippet
    from Listing 2-8, compares the getCode() method of the KeyEvent instance to the
    KeyCode constants that represent the arrow keys to ascertain which key was pressed.


