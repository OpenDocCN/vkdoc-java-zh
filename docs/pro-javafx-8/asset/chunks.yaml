    开发你的第一个 JavaFX 程序：Hello Earthrise


    1968 年的平安夜，阿波罗 8 号的宇航员们历史上首次进入月球轨道。他们是第一批目睹“地出”景象的人类，并拍摄了如图 1-4 所示的壮丽照片。程序启动时，这张图片会从本书的网站动态加载，因此你需要连接到互联网才能查看。


