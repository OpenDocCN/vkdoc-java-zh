- fmt: "# The `CodeMonkeyToDo` Class\n\nThe audio clips are all loaded in the constructor\
    \ of the `CodeMonkeyToDo` class. Loading them in the constructor guarantees that\
    \ they are loaded at the very start of the program before the `start` method is\
    \ called. Alternatively, we could have overridden the `init` method of the `Application`\
    \ class and loaded our clips there. Notice that the three `AudioClip`s and the\
    \ three `Slider` controls are declared as fields in the `Application` class. This\
    \ allows convenient access later when the `AudioClip` is played using the current\
    \ values from the `Slider` controls shown in Figure [9-2.](#index_split_005.html#p382)\n\
    \n**Listing 9-3.** The Application Class of the `CodeMonkeyToDo` Example Program\n\
    \n```java\npublic class CodeMonkeyToDo extends Application {\n\n    private final\
    \ AudioClip coffeeClip;\n    private final AudioClip jobClip;\n    private final\
    \ AudioClip meetingClip;\n    private Slider volumeSlider;\n    private Slider\
    \ rateSlider;\n    private Slider balanceSlider;\n\n    public static void main(String[]\
    \ args) {\n        CodeMonkeyToDo.launch(args);\n    }\n\n    public CodeMonkeyToDo()\
    \ {\n        coffeeClip = new AudioClip(getClipResourceString(\"resources/coffee.mp3\"\
    ));\n        jobClip = new AudioClip(getClipResourceString(\"resources/job.mp3\"\
    ));\n        meetingClip =\n            new AudioClip(getClipResourceString(\"\
    resources/meeting.mp3\"));\n    }\n\n    // Scene construction code removed for\
    \ now...\n\n    private String getClipResourceString(String clipName) {\n    \
    \    return getClass().getResource(clipName).toString();\n    }\n}\n```\n\n##\
    \ Constructing the Scene\n\nWe now take a brief look at the scene construction\
    \ code for the application shown in Figure [9-2.](#index_split_005.html#p382)\
    \ The application is organized as a vertical column of buttons that play the audio\
    \ clips with a row of controls at the bottom of the window.\n\nWe use a `GridPane`\
    \ as the top-level layout container for the application. You can see the `GridPane`\
    \ created in the application’s `start` method, which is shown in Listing 9-4.\
    \ Once the `GridPane` is created and configured, it is passed as an argument to\
    \ the `createControls` and `createClipList` methods. The `createClipList` method\
    \ is responsible for creating the vertical column of buttons and is shown and\
    \ discussed later in this section. The `createControls` method creates `Label`s\
    \ and the corresponding `Slider` controls that allow the user to set the volume,\
    \ rate, and balance of the next clip to be played. The `Slider`s and their `Label`s\
    \ are then added to the `GridPane` before the method returns. After the grid has\
    \ been populated with its controls, it is used as the root node of a new `Scene`.\
    \ The `Scene` is then styled with our `media.css` style sheet and added to the\
    \ `primaryStage`, which is then shown to the user.\n\n**Listing 9-4.** Constructing\
    \ the Scene and the Volume, Balance, and Rate Controls\n\n```java\n@Override\n\
    public void start(Stage primaryStage) {\n    final GridPane grid = new GridPane();\n\
    \    grid.setPadding(new Insets(10));\n    grid.setHgap(10);\n    grid.setVgap(5);\n\
    \n    createControls(grid);\n    createClipList(grid); // Shown later...\n\n \
    \   final Scene scene = new Scene(grid, 640, 380);\n    scene.getStylesheets()\n\
    \         .add(getClass().getResource(\"media.css\").toString());\n    primaryStage.setTitle(\"\
    AudioClip Example\");\n    primaryStage.setScene(scene);\n    primaryStage.show();\n\
    }\n\nprivate void createControls(GridPane grid) {\n    final Label volumeLabel\
    \ = new Label(\"Volume\");\n    final Label rateLabel = new Label(\"Rate\");\n\
    \    final Label balanceLabel = new Label(\"Balance\");\n\n    GridPane.setHalignment(volumeLabel,\
    \ HPos.CENTER);\n    GridPane.setHalignment(rateLabel, HPos.CENTER);\n    GridPane.setHalignment(balanceLabel,\
    \ HPos.CENTER);\n\n    volumeSlider = new Slider(0.0, 1.0, 1.0);\n    rateSlider\
    \ = new Slider(0.25, 2.5, 1.0);\n    balanceSlider = new Slider(-1.0, 1.0, 0.0);\n\
    \n    GridPane.setHgrow(volumeSlider, Priority.ALWAYS);\n    GridPane.setHgrow(rateSlider,\
    \ Priority.ALWAYS);\n    GridPane.setHgrow(balanceSlider, Priority.ALWAYS);\n\n\
    \    grid.add(volumeLabel, 0, 2);\n    grid.add(volumeSlider, 0, 3);\n    grid.add(rateLabel,\
    \ 1, 2);\n    grid.add(rateSlider, 1, 3);\n    grid.add(balanceLabel, 2, 2);\n\
    \    grid.add(balanceSlider, 2, 3);\n}\n```\n\nListing 9-5 shows the `createClipList`\
    \ method. This method creates a `VBox` to hold a `Label`, the three `Button`s\
    \ that play the `AudioClip`s, and a `Hyperlink` that triggers the display of the\
    \ Code Monkey web page at `jonathancoulton.com` in a separate window. The `VBox`\
    \ is then added to the `GridPane` such that it spans all remaining columns in\
    \ the first row. The `VBox` is always centered horizontally in the grid and grows\
    \ in both the horizontal and vertical directions, taking up whatever extra space\
    \ is available in the layout.\n\n**Listing 9-5.** Constructing the Buttons That\
    \ Play the `AudioClip`s\n\n```java\nprivate void createClipList(GridPane grid)\
    \ {\n    final VBox vbox = new VBox(30);\n    vbox.setAlignment(Pos.TOP_CENTER);\n\
    \n    final Label clipLabel = new Label(\"Code Monkey To-Do List:\");\n    clipLabel.setId(\"\
    clipLabel\");\n\n    final Button getUpButton = new Button(\"Get Up, Get Coffee\"\
    );\n    getUpButton.setPrefWidth(300);\n    getUpButton.setOnAction(createPlayHandler(coffeeClip));\n\
    \n    final Button goToJobButton = new Button(\"Go to Job\");\n    goToJobButton.setPrefWidth(300);\n\
    \    goToJobButton.setOnAction(createPlayHandler(jobClip));\n\n    final Button\
    \ meetingButton = new Button(\"Have Boring Meeting\");\n    meetingButton.setPrefWidth(300);\n\
    \    meetingButton.setOnAction(createPlayHandler(meetingClip));\n\n    final Hyperlink\
    \ link = new Hyperlink(\"About Code Monkey...\");\n    link.setOnAction((ActionEvent\
    \ event) -> {\n        WebView wv = new WebView();\n        wv.getEngine().load(\"\
    http://www.jonathancoulton.com/2006/04/14/\" +\n                            \"\
    thing-a-week-29-code-monkey/\");\n        Scene scene = new Scene(wv, 720, 480);\n\
    \        Stage stage = new Stage();\n        stage.setTitle(\"Code Monkey\");\n\
    \        stage.setScene(scene);\n        stage.show();\n    });\n\n    vbox.getChildren().addAll(clipLabel,\
    \ getUpButton, goToJobButton,\n                              meetingButton, link);\n\
    \n    GridPane.setHalignment(vbox, HPos.CENTER);\n    GridPane.setHgrow(vbox,\
    \ Priority.ALWAYS);\n    GridPane.setVgrow(vbox, Priority.ALWAYS);\n    grid.add(vbox,\
    \ 0, 0, GridPane.REMAINING, 1);\n}\n\nprivate EventHandler<ActionEvent> createPlayHandler(final\
    \ AudioClip clip) {\n    return (ActionEvent event) -> {\n        clip.play(volumeSlider.getValue(),\
    \ balanceSlider.getValue(),\n                  rateSlider.getValue(), 0, 0);\n\
    \    };\n}\n```\n\nAs each `Button` is created, a new `EventHandler` is also created\
    \ that plays the appropriate `AudioClip` for that `Button`. The `play` method\
    \ in the `EventHandler` uses the current values of the volume, rate, and balance\
    \ sliders as its arguments. The last two arguments of the `play` method are set\
    \ to zero, but these can be used to specify the pan and priority of the `AudioClip`\
    \ when it is played. We discuss these two properties in the next section.\n\n\
    ## `AudioClip` Wrap-Up\n\nThere are two properties of an `AudioClip` that we have\
    \ not shown in the preceding examples: pan and priority. The `pan` property allows\
    \ you to move the center of your clip. Setting it to `-1.0` moves the clip completely\
    \ to the left channel, and setting it to `1.0` moves it completely to the right.\
    \ The default setting of `0.0` leaves the clip as it was originally. Unlike the\
    \ `balance` property, which merely adjusts the relative volumes of the left and\
    \ right channels, the `pan` property actually remixes the two channels. This allows\
    \ you to introduce some or all of the left channel into the right channel and\
    \ vice versa. It really only makes sense to use the `pan` property on actual stereo\
    \ sound effects with right and left channels that differ. Setting the `pan` on\
    \ a mono sound has the exact same outcome as adjusting the `balance`, and `balance`\
    \ is much less computationally expensive. You can set or retrieve a clip’s current\
    \ pan setting using the `setPan` and `getPan` methods and the property is exposed\
    \ by the `panProperty` method."
