    `javafx.scene` 包包含一些您会经常使用的类：


    • Scene 类是 JavaFX 应用程序 UI 包含层次结构的第二层。它包含了应用程序中的所有 UI 元素。这些元素被称为图形节点，或简称为节点。


    • Node 类是 JavaFX 中所有图形节点的基类。诸如文本、图像、媒体、形状和控件（例如文本框和按钮）等 UI 元素都是 Node 的子类。花点时间查看
    Node 类中的变量和函数，以了解其为其所有子类提供的功能，包括边界计算以及鼠标和键盘事件处理。


    • Group 类是 Node 类的一个子类。其用途包括将节点分组到单个坐标空间中，并允许对整个组应用变换（例如旋转）。此外，组中更改的属性（例如不透明度）将应用于组内包含的所有节点。


    有几个以 `javafx.scene` 开头的包，其中包含各种类型的 Node 子类。示例如下：


    • `javafx.scene.image` 包包含 Image 和 ImageView 类，它们使图像能够在 Scene 中显示。ImageView 类是
    Node 的一个子类。


    • `javafx.scene.shape` 包包含几个用于绘制形状的类，例如 Circle、Rectangle、Line、Polygon 和 Arc。形状的基类名为
    Shape，包含一个名为 fill 的属性，该属性使您能够指定用于填充形状的颜色、图案或渐变。


    • `javafx.scene.text` 包包含用于在场景中绘制文本的 Text 类。Font 类使您能够指定文本的字体名称和大小。


    • `javafx.scene.media` 包包含使您能够播放媒体的类。MediaView 类是 Node 的一个子类，用于显示媒体。


    • `javafx.scene.chart` 包包含帮助您轻松创建面积图、条形图、气泡图、折线图、饼图和散点图的类。此包中对应的 UI 类是 AreaChart、BarChart、BubbleChart、LineChart、PieChart
    和 ScatterChart。


    以下是 JavaFX 8 API 中的其他一些包。


    • `javafx.scene.control` 包包含几个 UI 控件，每个控件都能够通过 CSS 进行皮肤设置和样式化。


    • `javafx.scene.transform` 包使您能够变换节点（缩放、旋转、平移、剪切和仿射变换）。


    • `javafx.scene.input` 包包含诸如 MouseEvent 和 KeyEvent 之类的类，它们从事件处理函数（例如 Node 类的 `onMouseClicked`
    事件）内部提供有关这些事件的信息。


    • `javafx.scene.layout` 包包含几个布局容器，包括 HBox、VBox、BorderPane、FlowPane、StackPane 和
    TilePane。


    • `javafx.scene.effect` 包包含易于使用的效果，例如 Reflection、Glow、Shadow、BoxBlur 和 Lighting。


