    # 在JavaFX中创建用户界面


    *生活是一门不用橡皮擦的艺术。*

    —约翰·W·加德纳


    第1章通过介绍开发和执行JavaFX程序的基础知识，让你快速入门了JavaFX。


    现在我们详细介绍第1章中略过的关于在JavaFX中创建UI的许多细节。议程上的第一件事是让你熟悉JavaFX用于表达UI的*剧院*隐喻，并介绍我们称之为*节点中心UI*的重要性。


    ## 程序化与声明式创建用户界面


    JavaFX平台提供了两种互补的方式来创建UI。在本章中，我们将讨论如何使用Java API来创建和填充UI。对于习惯于编写代码来利用API的Java开发者来说，这是一种便捷的方式。


    设计师通常使用图形化工具，这些工具允许他们声明式地描述UI，而不是通过编程方式。JavaFX平台定义了FXML，这是一种基于XML的标记语言，可用于声明式地描述UI。此外，Oracle提供了一个名为SceneBuilder的图形化工具，该工具能够处理FXML文件。


    SceneBuilder的使用将在第3章中演示。


    请注意，UI的一部分可以使用API创建，而其他部分可以使用SceneBuilder创建。FXML API提供了这两种方法之间的桥梁和集成粘合剂。


    ## 节点中心UI简介


    在JavaFX中创建UI就像创作一场戏剧，通常包含以下几个非常简单的步骤：


    1.  *为你的程序创建一个舞台。* 舞台的具体实现取决于其部署的平台（例如，桌面、平板电脑或嵌入式系统）。

    2.  *创建一个场景，让演员和道具（节点）在其中进行视觉上的互动，并与观众（你的程序用户）进行视觉上的互动。* 就像剧院行业中任何优秀的布景设计师一样，优秀的JavaFX开发者会努力使他们的场景在视觉上吸引人。为此，与图形设计师合作你的“戏剧”通常是一个好主意。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第2章 ■ 在JavaFX中创建用户界面


    3.  *在场景中创建节点。* 这些节点是`javafx.scene.Node`类的子类，包括UI控件、形状、文本（一种形状类型）、图像、媒体播放器、嵌入式浏览器以及你创建的自定义UI组件。节点也可以是其他节点的容器，通常提供跨平台的布局能力。一个场景包含一个场景图，其中包含一个有向的节点图。通过更改非常丰富的`Node`属性集中的值，可以以多种方式操作单个节点和节点组（例如，移动、缩放和设置不透明度）。'
