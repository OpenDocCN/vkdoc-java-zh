- fmt: "# JavaFX Properties and Bindings\n\nIn earlier chapters, we introduced you\
    \ to the JavaFX 8 platform that is part of Oracle JDK 8. You set up your development\
    \ environment with your favorite IDE: Eclipse, NetBeans, or IntelliJ IDEA. You\
    \ wrote and ran your first JavaFX GUI programs. You learned the fundamental building\
    \ blocks of JavaFX: the `Stage` and `Scene` classes, and the `Nodes` that go into\
    \ the `Scene`. You have no doubt noticed the use of user-defined model classes\
    \ to represent the application state and have that state communicated to the UI\
    \ through properties and bindings.\n\nIn this chapter, we give you a guided tour\
    \ of the JavaFX properties and bindings framework. After recalling a little bit\
    \ of history and presenting a motivating example that shows various ways that\
    \ a JavaFX `Property` can be used, we cover key concepts of the framework: `Observable`,\
    \ `ObservableValue`, `WritableValue`, `ReadOnlyProperty`, `Property`, and `Binding`.\
    \ We show you the capabilities offered by these fundamental interfaces of the\
    \ framework. We then show you how `Property` objects are bound together, how `Binding`\
    \ objects are built out of properties and other bindings—using the factory methods\
    \ in the `Bindings` utility class, the fluent interface API, or going low level\
    \ by directly extending abstract classes that implement the `Binding` interface—and\
    \ how they are used to easily propagate changes in one part of a program to other\
    \ parts of the program without too much coding. We then introduce the JavaFX Beans\
    \ naming convention, an extension of the original JavaBeans naming convention\
    \ that makes organizing your data into encapsulated components an orderly affair.\
    \ We finish this chapter by showing how to adapt old-style JavaBeans properties\
    \ into JavaFX properties.\n\nBecause the JavaFX properties and bindings framework\
    \ is a nonvisual part of the JavaFX platform, the example programs in this chapter\
    \ are also nonvisual in nature. We deal with `Boolean`, `Integer`, `Long`, `Float`,\
    \ `Double`, `String`, and `Object` type properties and bindings as these are the\
    \ types in which the JavaFX binding framework specializes.\n\nYour GUI building\
    \ fun resumes in the next and further chapters.\n\n## Forerunners of JavaFX Binding\n\
    \nThe need for exposing attributes of Java components directly to client code,\
    \ allowing them to observe and to manipulate such attributes and to take action\
    \ when their values change, was recognized early in Java’s life. The JavaBeans\
    \ framework in Java 1.1 provided support for properties through the now familiar\
    \ getter and setter convention. It also supported the propagations of property\
    \ changes through its `PropertyChangeEvent` and `PropertyChangeListener` mechanism.\
    \ Although the JavaBeans framework is used in many Swing applications, its use\
    \ is quite cumbersome and requires quite a bit of boilerplate code. Several higher\
    \ level data binding frameworks were created over the years with various levels\
    \ of success. The heritage of the JavaBeans in the JavaFX properties and bindings\
    \ framework lies mainly in the JavaFX Beans getter, setter, and property getter\
    \ naming convention when defining JavaFX components. We talk about the JavaFX\
    \ Beans getter, setter, and property getter naming convention later in this chapter,\
    \ after we have covered the key concepts and interfaces of the JavaFX properties\
    \ and bindings framework.\n\nAnother strand of heritage of the JavaFX properties\
    \ and bindings framework comes from the JavaFX Script language that was part of\
    \ the JavaFX 1.x platform. Although the JavaFX Script language was deprecated\
    \ in the JavaFX platform in favor of a Java-based API, one of the goals of the\
    \ transition was to preserve most of the powers of the JavaFX Script’s `bind`\
    \ keyword, the expressive power of which has delighted many JavaFX enthusiasts.\
    \ As an example, JavaFX Script supports the binding to complex expressions:\n\n\
    ```\nvar a = 1;\nvar b = 10;\nvar m = 4;\ndef c = bind for (x in [a..b] where\
    \ x < m) { x * x };\n```\n\nThis code will automatically recalculate the value\
    \ of `c` whenever the values of `a`, `b`, or `m` are changed.\n\nAlthough the\
    \ JavaFX properties and bindings framework does not support all of the binding\
    \ constructs of JavaFX Script, it supports the binding of many useful expressions.\
    \ We talk more about constructing compound binding expressions after we cover\
    \ the key concepts and interfaces of the framework.\n\n## A Motivating Example\n\
    \nLet’s start with an example in Listing 4-1 that shows off the capabilities of\
    \ the `Property` interface through the use of a couple of instances of the `SimpleIntegerProperty`\
    \ class.\n\n**Listing 4-1.** `MotivatingExample.java`\n\n```\nimport javafx.beans.InvalidationListener;\n\
    import javafx.beans.property.IntegerProperty;\nimport javafx.beans.property.SimpleIntegerProperty;\n\
    import javafx.beans.value.ChangeListener;\nimport javafx.beans.value.ObservableValue;\n\
    \npublic class MotivatingExample {\n\n    private static IntegerProperty intProperty;\n\
    \n    public static void main(String[] args) {\n        createProperty();\n  \
    \      addAndRemoveInvalidationListener();\n        addAndRemoveChangeListener();\n\
    \        bindAndUnbindOnePropertyToAnother();\n    }\n\n    private static void\
    \ createProperty() {\n        System.out.println();\n        intProperty = new\
    \ SimpleIntegerProperty(1024);\n        System.out.println(\"intProperty = \"\
    \ + intProperty);\n        System.out.println(\"intProperty.get() = \" + intProperty.get());\n\
    \        System.out.println(\"intProperty.getValue() = \" + intProperty.getValue().intValue());\n\
    \    }\n\n    private static void addAndRemoveInvalidationListener() {\n     \
    \   System.out.println();\n        final InvalidationListener invalidationListener\
    \ = observable ->\n            System.out.println(\"The observable has been invalidated:\
    \ \" + observable + \".\");\n        intProperty.addListener(invalidationListener);\n\
    \        System.out.println(\"Added invalidation listener.\");\n        System.out.println(\"\
    Calling intProperty.set(2048).\");\n        intProperty.set(2048);\n        System.out.println(\"\
    Calling intProperty.setValue(3072).\");\n        intProperty.setValue(Integer.valueOf(3072));\n\
    \        intProperty.removeListener(invalidationListener);\n        System.out.println(\"\
    Removed invalidation listener.\");\n        System.out.println(\"Calling intProperty.set(4096).\"\
    );\n        intProperty.set(4096);\n    }\n\n    private static void addAndRemoveChangeListener()\
    \ {\n        System.out.println();\n        final ChangeListener changeListener\
    \ = (ObservableValue observableValue, Object oldValue,\n                     \
    \                          Object newValue) ->\n            System.out.println(\"\
    The observableValue has changed: oldValue = \" + oldValue + \", newValue = \"\
    \ + newValue);\n        intProperty.addListener(changeListener);\n        System.out.println(\"\
    Added change listener.\");\n        System.out.println(\"Calling intProperty.set(5120).\"\
    );\n        intProperty.set(5120);\n        intProperty.removeListener(changeListener);\n\
    \        System.out.println(\"Removed change listener.\");\n        System.out.println(\"\
    Calling intProperty.set(6144).\");\n        intProperty.set(6144);\n    }\n\n\
    \    private static void bindAndUnbindOnePropertyToAnother() {\n        System.out.println();\n\
    \        IntegerProperty otherProperty = new SimpleIntegerProperty(0);\n     \
    \   System.out.println(\"otherProperty.get() = \" + otherProperty.get());\n  \
    \      System.out.println(\"Binding otherProperty to intProperty.\");\n      \
    \  otherProperty.bind(intProperty);\n        System.out.println(\"otherProperty.get()\
    \ = \" + otherProperty.get());\n        System.out.println(\"Calling intProperty.set(7168).\"\
    );\n        intProperty.set(7168);\n        System.out.println(\"otherProperty.get()\
    \ = \" + otherProperty.get());\n        System.out.println(\"Unbinding otherProperty\
    \ from intProperty.\");\n        otherProperty.unbind();\n        System.out.println(\"\
    otherProperty.get() = \" + otherProperty.get());\n        System.out.println(\"\
    Calling intProperty.set(8192).\");\n        intProperty.set(8192);\n        System.out.println(\"\
    otherProperty.get() = \" + otherProperty.get());\n    }\n}\n```"
