    \ 布局节点中。`Slider` 被设置为水平增长，以便 `GridPane` 能够扩展以填充窗口的宽度。当然，通过设置 `Label` 增长也可以达到同样的效果，但那样我们还需要重置\
    \ `Label` 的最大尺寸，因为默认情况下，所有 `Label` 的最大尺寸都等于其首选尺寸。`Label` 和 `Slider` 填充 `GridPane`\
    \ 的第一行和第二行，将第零行留给频谱显示。\n\n`MediaPlayer` 有四个属性用于处理当前音频轨道的频谱：`audioSpectrumListener`、`audioSpectrumInterval`、`audioSpectrumNumBands`\
    \ 和 `audioSpectrumThreshold`。`audioSpectrumListener` 属性是 `AudioSpectrumListener`\
    \ 接口的一个实例。您可以使用 `MediaPlayer` 的 `setAudioSpectrumListener` 方法来附加监听器，这将启用频谱数据的计算，并定期向监听器的\
    \ `spectrumDataUpdate` 方法发送更新。再次调用 `setAudioSpectrumListener` 并传入 `null` 值将关闭音频频谱计算和更新。\n\
