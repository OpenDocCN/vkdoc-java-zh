    Now we move on to different JVM languages and show what is possible by using Groovy
    and Scala. These both make use of an inner domain-specific language (DSL) written
    on top of the JavaFX APIs.


    Groovy is a great choice for those getting started with JVM languages, because
    its syntax most closely matches the Java language. In fact, with a few minor changes
    all Java programs are also valid Groovy programs! However, to get the full advantage
    of the language features in Groovy you need to make use of a DSL written for your
    target use case, such as GroovyFX. GroovyFX is an open source project that lets
    you write JavaFX code in the Groovy language that looks like the code in Listing
    13-2.


    **Listing 13-2.** Vanishing Circles Application Written in Groovy Using the GroovyFX
    DSL


    ```

    GroovyFX.start { primaryStage ->


    def sg = new SceneGraphBuilder()


    def rand = new Random().&nextInt


    def circles = []


    sg.stage(title: ''Vanishing Circles'', show: true) {


    scene(fill: black, width: 800, height: 600) {


    50.times {


    circles << circle(centerX: rand(800), centerY: rand(600), radius: 150, stroke:
    white, strokeWidth: bind(''hover'', converter: {val -> val ? 4 : 0})) {


    fill rgb(rand(255), rand(255), rand(255), 0.2)


    effect boxBlur(width: 10, height: 10, iterations: 3)


    onMouseClicked { e ->


    timeline {


    at(3.s) { change e.source.radiusProperty() to 0 }


    }.play()


    }


    }


    }


    }


    timeline(cycleCount: Timeline.INDEFINITE, autoReverse: true) {


    circles.each { circle ->


    at (40.s) {


    change circle.centerXProperty() to rand(800)


    change circle.centerYProperty() to rand(600)


    }


    }


    }.play()


    }


    }

    ```


    This GroovyFX code has the same functionality as the earlier JavaFX examples,
    but is significantly shorter and more expressive. Also, as your application grows
    you will get even more benefit from using a DSL such as this, allowing you to
    write more complex and feature-rich applications with less code.


    Some of the Groovy language features that this code takes advantage of include
    the following:


    - **Groovy builder pattern**: Groovy makes it particularly easy to build powerful
    and concise builder code, as demonstrated with the GroovyFX `SceneGraphBuilder`.

    - **Named parameters**: Remembering the order of arguments to methods and constructors
    with long argument lists is hard, but named parameters allow you to be explicit
    and change the order for your convenience.

    - **Class extension**: Groovy allows you to add new methods and functionality
    to existing classes, as demonstrated by the creation of duration objects with
    syntax `40.s` where `s` is a method on integers.

    - **Closures**: The event handlers are greatly simplified by creating anonymous
    single method interface extensions via closures.


    All of this contributes to a very concise and readable syntax with very little
    boilerplate code. We dig into the features of how each of the JavaFX features
    translates to Groovy syntax in the later section entitled “Making Your JavaFX
    Groovy.”


    The second JVM language we cover is Scala. It provides a lot of the same benefits
    as Groovy, but has the additional benefit of being fully type safe. This means
    that the compiler will catch bugs and type errors before you even run your application,
    which can be a huge boon to productivity, and shorten your development and testing
    cycle.


    Again, we take advantage of an inner DSL written in the Scala language called
    ScalaFX, which is another open source project that provides a full wrapper library
    for the JavaFX APIs. The code listing for the Vanishing Circles application written
    using ScalaFX is shown in Listing 13-3.


    **Listing 13-3.** Vanishing Circles Application Written in Scala Using the ScalaFX
    DSL


    ```

    object VanishingCircles extends JFXApp {


    var circles: Seq[Circle] = null


    stage = new PrimaryStage {


    title = "Vanishing Circles"


    width = 800


    height = 600


    scene = new Scene {


    fill = BLACK


    circles = for (i <- 0 until 50) yield new Circle {


    centerX = random * 800

