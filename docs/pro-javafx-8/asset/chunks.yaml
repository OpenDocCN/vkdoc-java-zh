    ***图 7-18.** JavaFXSceneInSwingExample 程序*


    **在 SWT 应用程序中嵌入 JavaFX 场景**


    JavaFX 能够通过 `javafx.embed.swt` 包中的类将 JavaFX 场景嵌入到 SWT 应用程序中。该包包含两个公共类：`FXCanvas`
    和 `SWTFXUtils`。`FXCanvas` 类继承自 `org.eclipse.swt.widgets.Canvas`，可以像其他任何 SWT 控件一样放置在
    SWT 程序中。`FXCanvas` 还可以托管 JavaFX 场景，并能将 JavaFX 场景添加到 SWT 程序中。


    由于 SWT 和 JavaFX 都使用原生平台的 UI 线程作为各自的事件分发线程，因此 SWT UI 线程（在该线程中实例化 `Display` 对象、启动主循环，并且必须创建和访问所有其他
    UI 控件）与 JavaFX 应用程序线程是同一个线程。因此，在 SWT 和 JavaFX 事件处理器中无需使用 `Platform.runLater()`
    或其 SWT 等效方法 `display.asyncExec()`。


    清单 7-13 中的 SWT 程序是清单 7-11 中 Swing 程序的 SWT 移植版本。


