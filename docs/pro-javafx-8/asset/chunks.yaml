    } catch (RuntimeException re) {


    // 处理构造错误


    System.out.println("捕获异常: " + re.getMessage());


    }


    }


    private void handleMetadata(String key, Object value) {


    switch (key) {


    case "album":


    setAlbum(value.toString());


    break;


    case "artist":


    setArtist(value.toString());


    break;


    case "title":


    setTitle(value.toString());


    break;


    case "year":


    setYear(value.toString());


    break;


    case "image":


    setAlbumCover((Image)value);


    break;


    }


    }


    }


    MediaPlayer 属性被公开为 ReadOnlyObjectProperty，因为我们不希望该类的用户能够将 MediaPlayer 实例设置为新值。现在我们已经为媒体创建了一个封装良好的类，接下来我们将注意力转向将
    UI 代码分离成更易于管理的块，即*视图*。我们创建了一个新的 AbstractView 基类，通过保存所有视图共有的代码来消除重复。这个小型类如清单 9-11
    所示。


    ***清单 9-11.*** AbstractView 基类


    public abstract class AbstractView {


    protected final SongModel songModel;


    protected final Node viewNode;


    public AbstractView(SongModel songModel) {


    this.songModel = songModel;


    this.viewNode = initView();


    }


    public Node getViewNode() {


    return viewNode;


    }


    protected abstract Node initView();


    }


