    创建 DatePicker 和 ColorPicker


    当 JavaFX 2 发布并附带许多控件时，人们关注了实际应用中还需要哪些其他控件。根据开发者社区的反馈，JavaFX 2.2 和 JavaFX 8 中新增了一些控件。其中一个特别有用的控件是
    DatePicker，它允许用户打开日历视图并选择特定日期。以下来自清单 6-12 的代码片段展示了如何在 JavaFX 应用程序中包含此控件：LocalDate
    today = LocalDate.now();


    DatePicker datePicker = new DatePicker(today);


    datePicker.setOnAction(e -> System.out.println("Selected date: " + datePicker.getValue()));
    当用户点击图 6-10 所示的日期控件时，会弹出一个日历。在日历上选择一个日期将触发 datePicker 实例上的 onAction 事件处理器，lambda
