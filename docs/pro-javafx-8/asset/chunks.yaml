    is bundled together with a JVM that is capable of running the application. In
    the past, this idea was often rejected because it made the application bundle
    too big. However, with increasing memory and storage capacities, and with decreasing
    costs of sending bytes over the Internet, this disadvantage is becoming less relevant.


    There are a number of technologies being developed currently that help you bundle
    your application with the correct JVM version and package it.


    The JavaFXPackager, which is developed inside the OpenJFX project area, contains
    an API for creating self-contained bundles. This tool is used by NetBeans, and
    it can be used to generate self-contained bundles with just a few clicks.


    Users of maven can use a maven plug-in created by Daniel Zwolenski. This plug-in,
    which is documented at


    [http://zenjava.com/javafx/maven/](http://zenjava.com/javafx/maven/) allows the
    creation of JavaFX self-contained bundles using familiar maven commands.


    Now that you have the tools installed, we show you how to create a simple JavaFX
    program, and then we walk through it in detail. The first program that we’ve chosen
    for you is called “Hello Earthrise,” which demonstrates more features than the
    typical beginning “Hello World” program.


    Developing Your First JavaFX Program: Hello Earthrise


    On Christmas Eve in 1968 the crew of Apollo 8 entered lunar orbit for the first
    time in history. They were the first humans to witness an “Earthrise,” taking
    the magnificent picture shown in Figure [1-4](#index_split_000.html#p11). This
    image is dynamically loaded from this book’s web site when the program starts,
    so you’ll need to be connected to the Internet to view it.


    ***Figure 1-4.** The Hello Earthrise program*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 1 ■ GettinG a Jump Start in JavaFX


    In addition to demonstrating how to dynamically load images over the Internet,
    this example shows you how to use animation in JavaFX. Now it’s time for you to
    compile and run the program. We show you two ways to do this: from the command
    line and using NetBeans.


    Compiling and Running from the Command Line


    We usually use an IDE to build and run JavaFX programs, but to take all of the
    mystery out of the process we use the command-line tools first.


    ■ **Note** For this exercise, as with most others in the book, you need the source
    code. if you prefer not to type the source code into a text editor, you can obtain
    the source code for all of the examples in this book from the code download site.
    See the resources section at the end of this chapter for the location of this
    site.


    Assuming that you’ve downloaded and extracted the source code for this book into
    a directory, follow the directions in this exercise, performing all of the steps
    as instructed. We dissect the source code after the exercise.


    **COMpILING aND rUNNING the heLLO earthrISe prOGraM FrOM**


    **the COMMaND LINe**


    You’ll use the javac and java command-line tools to compile and run the program
    in this exercise. From the command-line prompt on your machine:


    1\. navigate to the Chapter01/Hello directory.


    2\. execute the following command to compile the HelloEarthRiseMain.java file.


    javac -d . HelloEarthRiseMain.java


    3\. Because the –d option was used in this command, the class files generated
    are placed


    in directories matching the package statements in the source files. the roots
    of those


    directories are specified by the argument given for the –d option, in this case
    the current directory.


    4\. to run the program, execute the following command. note that we use the fully
    qualified name of the class that will be executed, which entails specifying the
    nodes of the path name and the name of the class, all separated by periods.


    java projavafx.helloearthrise.ui.HelloEarthRiseMain


    the program should appear as shown in Figure [1-4](#index_split_000.html#p11)
    earlier, with the text scrolling slowly upward, reminiscent of the *Star Wars*
    opening crawls.'
