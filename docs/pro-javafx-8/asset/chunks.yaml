    由于加载 FXML 文件的结果是一个可在场景（Scene）中使用的 JavaFX 节点（Node），因此你并不局限于为每个场景仅使用一个 FXML 文件。例如，你可以将场景拆分为两个或多个部分，并用各自的
    FXML 文件表示每个部分。然后，你可以对每个部分的 FXML 文件调用 `FXMLLoader` 的某个 `load()` 方法，并通过编程方式将生成的节点组装到场景中。


    FXML 文件格式支持另一种将单独准备的 FXML 文件组合在一起的机制。一个 FXML 文件可以通过 `fx:include` 元素包含另一个 FXML
    文件。`fx:include` 元素支持三个属性：`source` 属性用于指定被包含 FXML 文件的位置；`resources` 属性用于指定被包含 FXML
    文件所使用的资源包（resource bundle）的位置；`charset` 属性用于指定被包含 FXML 文件的字符集。如果 `source` 属性以“/”字符开头，则将其解释为类路径（classpath）中的路径；否则，将其解释为相对于包含该
    FXML 文件的位置。`resource` 和 `charset` 属性是可选的。当未指定它们时，将使用加载包含 FXML 文件时所使用的值。用于加载包含
    FXML 文件的构建器工厂（builder factory）和控制器工厂（controller factory）也用于加载被包含的 FXML 文件。


    可以为 `fx:include` 元素指定一个 `fx:id`。当指定了 `fx:id` 时，可以在包含 FXML 文件的控制器中指定一个对应的字段，并且
    `FXMLLoader` 会将加载被包含 FXML 文件的结果注入到该字段中。此外，如果被包含的 FXML 文件在其根元素中指定了 `fx:controller`，那么该被包含
    FXML 文件的控制器也可以被注入到包含 FXML 文件的控制器中，前提是包含文件的控制器中存在一个命名和类型都合适的字段来接收被注入的被包含 FXML 文件的控制器。在本节的示例应用程序中，我们使用两个
