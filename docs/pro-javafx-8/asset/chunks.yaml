    除了创建运算符和选择运算符之外，前面的运算符都能实现你所期望的功能。对象运算符仅对可观察的字符串值和可观察的对象值有意义。字符串运算符仅对可观察的字符串值有意义。除
    `IgnoreCase` 之外的所有关系运算符都适用于数值。对于数值类型的 `equal` 和 `notEqual` 运算符，存在一个带有第三个双精度参数的版本，用于在比较
    `float` 或 `double` 值时指定容差。`equal` 和 `notEqual` 运算符也适用于布尔值、字符串值和对象值。对于字符串值和对象值，`equal`
    和 `notEqual` 运算符会使用 `equals()` 方法来比较它们的值。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 4 章 ■ 属性和绑定


    创建运算符提供了一种便捷的方式来创建绑定，而无需直接扩展抽象基类。它接受一个 `Callable` 和任意数量的依赖项作为参数。清单 4-3 中的 `area`
    双精度绑定可以重写如下，使用 lambda 表达式作为 `Callable`：


    DoubleBinding area = Bindings.createDoubleBinding(() -> {


    return x.get() * y.get();


    }, x, y);


    选择运算符作用于所谓的 *JavaFX Beans*，即根据 JavaFX Beans 规范构建的 Java 类。我们将在本章后面的“理解 JavaFX Beans
    约定”一节中讨论 JavaFX Beans。


    `Bindings` 中有许多方法用于处理可观察集合。我们将在第 7 章中介绍它们。


    以上涵盖了 `Bindings` 中所有返回绑定对象的方法。`Bindings` 中有 18 个方法不返回绑定对象。各种 `bindBidirectional()`
    和 `unbindBidirectional()` 方法用于创建双向绑定。事实上，各个属性类中的 `bindBidirectional()` 和 `unbindBidirectional()`
    方法只是简单地调用了 `Bindings` 类中对应的方法。`bindContent()` 和 `unbindContent()` 方法用于将普通集合绑定到可观察集合。`convert()`、`concat()`
    以及一对重载的 `format()` 方法返回 `StringExpression` 对象。最后，`when()` 方法返回一个 `When` 对象。


    `When` 和 `StringExpression` 类是用于创建绑定的流畅接口 API 的一部分，我们将在下一小节中介绍。


    理解流畅接口 API


    如果你曾问过“为什么会有人给方法起名叫 `when()`？`When` 类又会封装什么样的信息？”，那么欢迎加入我们的行列。在你未曾留意的时候，面向对象编程社区发明了一种全新的
    API 设计方法，它完全无视了沿用数十年的面向对象实践原则。这种新方法论不再封装数据并将业务逻辑分配到相关的领域对象中，而是产生了一种 API 风格，鼓励方法链式调用，并利用一个方法的返回类型来决定下一个方法（如同火车车厢般）可用的方法。方法名称的选择并非为了传达完整含义，而是为了让整个方法链读起来像一个流畅的句子。这种
    API 风格被称为 *流畅接口 API*。


    ■ **注意** 你可以在本章末尾引用的 Martin Fowler 网站上找到关于流畅接口的更详尽阐述。


    用于创建绑定的流畅接口 API 定义在 `IntegerExpression` 系列类中。


    `IntegerExpression` 是 `IntegerProperty` 和 `IntegerBinding` 的父类，这使得 `IntegerExpression`
    的方法也可用于 `IntegerProperty` 和 `IntegerBinding` 类。四个数值表达式类共享一个共同的父接口 `NumberExpression`，所有方法都在该接口中定义。特定类型的表达式类会重写一些返回
    `NumberBinding` 的方法，以返回更合适的绑定类型。


    以下列出了七种属性和绑定可用的方法：

