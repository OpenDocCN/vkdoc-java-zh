  raw: 'Another very powerful use of binding is to keep UI components in alignment
    by binding to their location and size. This technique can be used to align components
    to the edges of a window, keep nodes in relative alignment with each other, or
    center them inside a container, which is what we show in this example.


    To accomplish this, you need to make use of several properties and methods of
    the Node class in combination with bind. The common Node members that you need
    to use when creating bound layouts are listed in Table [5-1](#index_split_002.html#p195).


    To demonstrate, Listing 5-2 is a simple code example that shows how to center
    the “JavaFX Reversi” title within a Scene.


    ***Table 5-1.** Node Variables Commonly Used in Bind Layouts*


    **Access Name**


    **Type/Return**


    **Description**


    public


    layoutXProperty


    DoubleProperty Horizontal offset of the Node for layout positioning


    public


    layoutYProperty


    DoubleProperty Vertical offset of the Node for layout positioning


    public


    prefWidth(double)


    Double


    Preferred width of the Node (when given the passed-in height for


    nodes with a vertical content bias)


    public


    prefHeight(double) Double


    Preferred height of the Node (when given the passed-in width for


    nodes with a horizontal content bias)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 71](index-196_1.jpg)


    Chapter 5 ■ Building dynamiC ui layouts in JavaFX


    ***Listing 5-2.*** Example of Centering Text in a Scene


    public class CenterUsingBind extends Application {


    public static void main(String[] args) {


    launch(args);


    }


    @Override


    public void start(Stage primaryStage) {


    Text text = new Text("JavaFX Reversi");


    text.setTextOrigin(VPos.TOP);


    text.setFont(Font.font(null, FontWeight.BOLD, 18));


    Scene scene = new Scene(new Group(text), 400, 100);


    text.layoutXProperty().bind(scene.widthProperty().subtract(text.prefWidth(-1)).divide(2));
    text.layoutYProperty().bind(scene.heightProperty().subtract(text.prefHeight(-1)).divide(2));
    primaryStage.setScene(scene);


    primaryStage.show();


    }


    }


    Here are some specific points to highlight about Listing 5-2:


    • The default value for the textOrigin property of Text is BASELINE, which aligns
    to the bottom of the letters, not including descenders. We chose to use TOP instead,
    which makes the origin line up with the top of the letters. This makes Text behave
    similarly to most other Nodes, and is much easier to center.


    • We have to add the Text node to a Group to add it to the Scene, which expects
    a container of type Parent. There are better options than using a Group, as we
    show in the next section, because this disables any automatic resizing.


    • When getting the prefWidth and prefHeight we pass in a parameter of –1 for the


    counterdimension, because this does not affect the returned dimensions for Text
    nodes. (Text nodes have no content bias.)


    Running this program produces a window where the title stays centered even if
    you resize the frame, as shown in Figure [5-4.](#index_split_002.html#p196)


    ***Figure 5-4.** A Text node centered within a Scene using bind*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 5 ■ Building dynamiC ui layouts in JavaFX


    Centering Revisited Using a StackPane


    In the previous section you saw how to center text using the bind operator. That
    is one way to center text, but we show you an alternative approach using the StackPane
    class, which has built-in capabilities for aligning nodes.


    The StackPane class is a layout container that allows you to layer nodes on top
    of each other to create composite effects. For all the nodes in a StackPane to
    be visible, the upper nodes must be shaped or transparent so that it is possible
    to see through them. Table [5-2](#index_split_002.html#p197) lists some of the
    functions that you can use to add and align nodes in a StackPane.


    ***Table 5-2.** Functions on the StackPane Layout Class*


    **Name**


    **Defined In**


    **Description**


    setAlignment(Pos)


    StackPane


    Sets the default alignment of nodes added to a StackPane


    setAlignment(Node, Pos)


    StackPane


    Static function to set the alignment for a given node


    when added to a StackPane


    getChildren():ObservableList<Node>


    Pane


    A sequence of children that will be stacked from back


    to front


    The order of the children in the content sequence controls the z-order of the
    StackPane, with the first element (index 0) appearing on the bottom and the last
    (index size –1) on the top. The setAlignment functions can be used to control
    the alignment of nodes that do not fill all the available space in the StackPane.
    When the node alignment is set, that gets precedence; otherwise the default alignment
    for the StackPane is used. Finally, if neither is set, a default value of CENTER
    is used to align nodes.


    To build on the previous example, we invert the text and background by adding
    a black Ellipse to the scene that covers most of the background and by changing
    the color of the Text node to white. Also, to simplify the alignment and allow
    layering of nodes, we use a StackPane instead of bind to lay out the nodes, as
    shown in Listing 5-3.


    ***Listing 5-3.*** Example of Using a StackPane to Overlay and Align Nodes


    public class CenterUsingStack extends Application {


    public static void main(String[] args) {


    launch(args);


    }


    @Override


    public void start(Stage primaryStage) {


    Text text = new Text("JavaFX Reversi");


    text.setFont(Font.font(null, FontWeight.BOLD, 18));


    text.setFill(Color.WHITE);


    Ellipse ellipse = new Ellipse();


    StackPane stack = new StackPane();


    stack.getChildren().addAll(ellipse, text);


    Scene scene = new Scene(stack, 400, 100);


    ellipse.radiusXProperty().bind(scene.widthProperty().divide(2));


    ellipse.radiusYProperty().bind(scene.heightProperty().divide(2));


    primaryStage.setScene(scene);


    primaryStage.show();


    }


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 72](index-198_1.jpg)


    Chapter 5 ■ Building dynamiC ui layouts in JavaFX


    Notice that there is nothing special that we needed to do to align the Text in
    the window. The default alignment for nodes in a StackPane is to center them,
    which is exactly what we wanted to happen. Later we show how you can override
    this behavior on a per-layout or per-node basis.


    Because a StackPane extends Parent, there is no need to wrap it in a Group when
    adding it to the Scene. Also, when adding a resizable container such as a StackPane
    to a Scene, it will automatically get resized when the window size changes. Some
    bindings were still required to keep the Ellipse properly sized. It is common
    to use bind together with layouts in this fashion.


    The completed example is shown running in Figure [5-5](#index_split_002.html#p198).


    ***Figure 5-5.** Inverted JavaFX Reversi logo using a StackPane*


    Aligning to Edges Using StackPanes and TilePanes


    Using edge alignment, you can improve the title program to fit in with the Reversi
    theme. To emphasize the black-and-white contrast of the Reversi pieces, let’s
    create a design where the words are alternating colors on an alternating background.


    To accomplish this visual effect, you need to do the following.


    1\. Create a Scene that has a white background (the default).


    2\. Add a TilePane to the Scene to split it into a left and right half.


    3\. On the right side, add a Text node with “Reversi” aligned to the left.


    4\. On the left side, add a StackPane with a black background.


    5\. Add a Text node to the StackPane with “JavaFX” in white text aligned to the
    right.


    One way of looking at this problem is that you are creating two equal-size tiles
    that will contain text aligned toward the center of the window. The right side
    is simply a Text node that is aligned to the left edge, and the left side can
    be accomplished using a StackPane with right-aligned Text. Rather than using a
    Rectangle object, which would require binding to set its dimensions, we make use
    of the background-color style that is a feature of the Region class that all layouts
    extend.'
