    \ this writing, creating an Android application (or an APK bundle) is achieved\
    \ using command-line tools that are provided by the JavaFX Android porting project.\n\
    \nThe following steps have to be performed:\n\n1. Download and install the latest\
    \ Android SDK, which can be found at [http://developer.android.com/sdk/index.html](http://developer.android.com/sdk/index.html).\n\
    \n2. Download the JavaFX Dalvik SDK. Make sure you have the latest version of\
    \ the JavaFX Dalvik SDK, available at [https://bitbucket.org/javafxports/android/downloads](https://bitbucket.org/javafxports/android/downloads).\n\
    \n3. Create a regular JavaFX application. This can be any JavaFX application you\
    \ also use for desktop purposes. However, at this moment the JavaFX Android project\
    \ does not support Java 8 code.\n\n4. Use the JavaFX Dalvik SDK to create a JavaFX-Dalvik\
    \ project. The JavaFX Dalvik SDK contains a directory `android-tools` with a Gradle\
    \ build script that requires some parameters and that will produce the Android\
