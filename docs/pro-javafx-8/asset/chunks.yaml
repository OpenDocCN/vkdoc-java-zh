- fmt: "After installing and launching IntelliJ, you need to create a new Java project\
    \ with Groovy language support enabled. On the landing page you can click `Create\
    \ New Project`, or if you are on a different screen you can get to the same wizard\
    \ by selecting `New Project...` from the `File` menu. This will present you with\
    \ the `New Project Wizard` shown in Figure [13-2.](#index_split_007.html#p555)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 186](index-555_1.jpg)\n\
    \n**Figure 13-2.** IntelliJ New Project Wizard dialog box\n\nName your project\
    \ `HelloGroovyFX`, make sure that the project type is set to `Java Module`, and\
    \ then click `Next`.\n\nFor the next page of the wizard, you can simply accept\
    \ the default `src` folder location and continue, which will take you to the extension\
    \ screen shown in Figure [13-3.](#index_split_007.html#p556)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 187](index-556_1.jpg)\n\n**Figure 13-3.** IntelliJ New Project Wizard,\
    \ second dialog box\n\nThis is where you can select and enable Groovy support\
    \ for your project. Find `Groovy` in the list on the left and select the check\
    \ box. You also need to configure a Groovy runtime for it to work with in the\
    \ right pane. If you don’t already have a current Groovy runtime installation,\
    \ you can grab the latest from the Groovy site at [http://groovy.codehaus.org/](http://groovy.codehaus.org/).\n\
    \nThe binary zip release should work fine. Extract this to a folder on your hard\
    \ drive, and then go back to IntelliJ and set up the Groovy library by clicking\
    \ the `Create...` button and selecting the folder to which you just finished extracting\
    \ Groovy. To complete the project creation, click `Finish` and your new project\
    \ will be opened in the current window.\n\nWe are almost done with the project\
    \ setup, but are missing the dependent libraries for JavaFX and GroovyFX. To add\
    \ these in, open the `Project Structure...` dialog box from the `File` menu, and\
    \ navigate to the `Modules` section. This lets you configure the project settings\
    \ in more detail than the `New Project Wizard` allows.\n\nClick the `Dependencies`\
    \ tab on the right side and the screen shown in Figure [13-4](#index_split_007.html#p557)\
    \ appears.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 188](index-557_1.jpg)\n\
    \n![Image 189](index-557_2.jpg)\n\n**Figure 13-4.** Module configuration screen\
    \ for the `HelloGroovyFX` project\n\nOn the `Dependencies` tab, you need to configure\
    \ one additional jar reference, as highlighted in Figure [13-4](#index_split_007.html#p557).\
    \ This is the GroovyFX jar file, which you can download from the GroovyFX site.\
    \ The URL for the GroovyFX site is [http://groovyfx-project.github.com/](http://groovyfx-project.github.com/).\n\
    \nNow to create the `HelloGroovyFX` application, we need to add a new Groovy script\
    \ to the project. Right-click the `src` directory of your project and choose `New\
    \ ➤ Groovy Script` from the context menu. This opens a script creation dialog\
    \ box where you can type the name of your script file and click `OK` to create\
    \ it, as shown in Figure [13-5.](#index_split_007.html#p557)\n\n**Figure 13-5.**\
    \ Groovy Script creation dialog box\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 190](index-558_1.jpg)\n\nNow you are finally ready to get started with\
    \ some coding. The `HelloGroovyFX` application is very short, so you can grab\
    \ the code from the source bundle that comes with the book, or just type in the\
    \ code shown in Listing 13-4 yourself.\n\n**Listing 13-4.** Hello GroovyFX Code\n\
    \n```\nimport groovyx.javafx.GroovyFX\nimport groovyx.javafx.SceneGraphBuilder\n\
    \nGroovyFX.start {\n    new SceneGraphBuilder().stage(visible: true) {\n     \
    \   scene {\n            stackPane {\n                text(\"Hello GroovyFX\"\
    )\n            }\n        }\n    }\n}\n```\n\nTo run the application, simply right-click\
    \ the class and choose `Run “HelloGroovyFX”` from the context menu. This gives\
    \ you the application shown in Figure [13-6.](#index_split_007.html#p558)\n\n\
    **Figure 13-6.** Output from running the `Hello GroovyFX` application in IntelliJ\n\
    \nCongratulations! You have created and run your very first JavaFX application\
    \ in Groovy. In the next few sections we go into more detail on the features and\
    \ capabilities of GroovyFX, but remember that anything you can do in JavaFX is\
    \ possible in GroovyFX, because it wraps the full JavaFX APIs.\n\n## Properties\
    \ in GroovyFX\n\nOne of the features that would most benefit UI development in\
    \ Java with JavaFX is having a notion of first-class, observable properties in\
    \ the language. Because this does not exist today, the JavaFX team added properties\
    \ at an API level, which is sufficient, but much more verbose than a native syntax\
    \ can provide.\n\nFortunately, with dynamic languages such as Groovy, it is quite\
    \ easy to add in powerful features including a native property syntax. Groovy\
    \ already has a built-in notion of simplified getter/setter access, so you can\
    \ retrieve and store JavaFX properties just as if they were normal variables.\
    \ For example, to set the width of a `Rectangle` in Groovy, all you need to write\
    \ is:\n\n```\nrectangle.width = 500\n```\n\nThis will be automatically translated\
    \ to a setter call, such as the following:\n\n```\nrectangle.setWidth(500);\n\
    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nThe other part of the\
    \ JavaFX property pattern that is even more tedious is the creation of new properties.\
    \ To define a new property on your class in the same way that the JavaFX APIs\
    \ define properties, you need a total of one field and three methods per property.\
    \ The standard boilerplate for creating a `name` property on a `Person` object\
    \ is shown in Listing 13-5.\n\n**Listing 13-5.** JavaFX Property Pattern to Create\
    \ New Properties in Java\n\n```\nimport javafx.beans.property.SimpleStringProperty\n\
    import javafx.beans.property.StringProperty\n\npublic class Person {\n    private\
    \ StringProperty name;\n\n    public final void setName(String val) { nameProperty().set(val);\
    \ }\n    public final String getName() { return nameProperty().get(); }\n    public\
    \ StringProperty nameProperty() {\n        if (name == null) {\n            name\
    \ = new SimpleStringProperty(this, \"name\");\n        }\n        return name;\n\
    \    }\n}\n```\n\n> **Note:** the preceding code can be further optimized by checking\
    \ whether the property has been created in the `getName` method, and returning\
    \ `null` if it has not been created (and thus not initializing the `name` property).\n\
    \nAlthough this code is only a bit more verbose than the standard Java property\
    \ bean pattern, multiply it by the number of properties you need to define in\
    \ your application, and you have quite a bit of code to maintain and debug when\
    \ there is something that is not working as expected.\n\nGroovyFX has a very elegant\
    \ solution to this using a compiler hook for AST transformations. Rather than\
    \ copying and pasting the property boilerplate each time you want to define a\
    \ new property, you can simply annotate a variable with the `@FXBindable` annotation,\
    \ and GroovyFX will take care of the rest. It generates exactly the same optimized\
    \ code you would write by hand, but does it behind the scenes during the compile\
    \ phase so that your source code is not cluttered with the additional logic.\n\
    \nListing 13-6 shows what the `name` property would look like in Groovy.\n\n**Listing\
    \ 13-6.** GroovyFX Property Pattern to Create New Properties in Groovy\n\n```\n\
    import groovyx.javafx.beans.FXBindable\n\nclass Person {\n    @FXBindable String\
    \ name\n}\n```\n\nThe GroovyFX `@FXBindable` annotation also supports handling\
    \ the case where a property has a default initialization value:\n\n```\nclass\
    \ Person {\n    @FXBindable String name = \"Guillaume Laforge\"\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nIt also has a convenient shortcut syntax for converting all the variables in\
    \ a class to properties:\n\n```\n@FXBindable\nclass Person {\n    String name;\n\
    \    int age;\n    String gender;\n    Date dob;\n}\n```\n\n## GroovyFX Binding"
  raw: 'After installing and launching IntelliJ, you need to create a new Java project
    with Groovy language support enabled. On the landing page you can click Create
    New Project, or if you are on a different screen you can get to the same wizard
    by selecting New Project . . . from the File menu. This will present you with
    the New Project Wizard shown in Figure [13-2.](#index_split_007.html#p555)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 186](index-555_1.jpg)


    Chapter 13 ■ JavaFX Languages and Markup


    ***Figure 13-2.** IntelliJ New Project Wizard dialog box*


    Name your project HelloGroovyFX, make sure that the project type is set to Java
    Module, and then click Next.


    For the next page of the wizard, you can simply accept the default src folder
    location and continue, which will take you to the extension screen shown in Figure
    [13-3.](#index_split_007.html#p556)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 187](index-556_1.jpg)


    Chapter 13 ■ JavaFX Languages and Markup


    ***Figure 13-3.** IntelliJ New Project Wizard, second dialog box*


    This is where you can select and enable Groovy support for your project. Find
    Groovy in the list on the left and select the check box. You also need to configure
    a Groovy runtime for it to work with in the right pane. If you don’t already have
    a current Groovy runtime installation, you can grab the latest from the Groovy
    site at


    [http://groovy.codehaus.org/](http://groovy.codehaus.org/).


    The binary zip release should work fine. Extract this to a folder on your hard
    drive, and then go back to IntelliJ


    and set up the Groovy library by clicking the Create... button and selecting the
    folder to which you just finished extracting Groovy. To complete the project creation,
    click Finish and your new project will be opened in the current window.


    We are almost done with the project setup, but are missing the dependent libraries
    for JavaFX and GroovyFX.


    To add these in, open the Project Structure... dialog box from the File menu,
    and navigate to the Modules section.


    This lets you configure the project settings in more detail than the New Project
    Wizard allows.


    Click the Dependencies tab on the right side and the screen shown in Figure [13-4](#index_split_007.html#p557)
    appears.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 188](index-557_1.jpg)


    ![Image 189](index-557_2.jpg)


    Chapter 13 ■ JavaFX Languages and Markup


    ***Figure 13-4.** Module configuration screen for the HelloGroovyFX project*


    On the Dependencies tab, you need to configure one additional jar reference, as
    highlighted in the Figure [13-4](#index_split_007.html#p557).


    This is the GroovyFX jar file, which you can download from the GroovyFX site.
    The URL for the GroovyFX site is


    [http://groovyfx-project.github.com/](http://groovyfx-project.github.com/).


    Now to create the HelloGroovyFX application, we need to add a new Groovy script
    to the project. Right-click the src directory of your project and choose New ➤
    Groovy Script from the context menu. This opens a script creation dialog box where
    you can type the name of your script file and click OK to create it, as shown
    in Figure [13-5.](#index_split_007.html#p557)


    ***Figure 13-5.** Groovy Script creation dialog box*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 190](index-558_1.jpg)


    Chapter 13 ■ JavaFX Languages and Markup


    Now you are finally ready to get started with some coding. The HelloGroovyFX application
    is very short, so you can grab the code from the source bundle that comes with
    the book, or just type in the code shown in Listing 13-4


    yourself.


    ***Listing 13-4.*** Hello GroovyFX Code


    import groovyx.javafx.GroovyFX


    import groovyx.javafx.SceneGraphBuilder


    GroovyFX.start {


    new SceneGraphBuilder().stage(visible: true) {


    scene {


    stackPane {


    text("Hello GroovyFX")


    }


    }


    }


    }


    To run the application, simply right-click the class and choose Run “HelloGroovyFX”
    from the context menu.


    This gives you the application shown in Figure [13-6.](#index_split_007.html#p558)


    ***Figure 13-6.** Output from running the Hello GroovyFX application in IntelliJ*


    Congratulations! You have created and run your very first JavaFX application in
    Groovy. In the next few sections we go into more detail on the features and capabilities
    of GroovyFX, but remember that anything you can do in JavaFX


    is possible in GroovyFX, because it wraps the full JavaFX APIs.


    Properties in GroovyFX


    One of the features that would most benefit UI development in Java with JavaFX
    is having a notion of first-class, observable properties in the language. Because
    this does not exist today, the JavaFX team added properties at an API level, which
    is sufficient, but much more verbose than a native syntax can provide.


    Fortunately, with dynamic languages such as Groovy, it is quite easy to add in
    powerful features including a native property syntax. Groovy already has a built-in
    notion of simplified getter/setter access, so you can retrieve and store JavaFX
    properties just as if they were normal variables. For example, to set the width
    of a Rectangle in Groovy, all you need to write is:


    rectangle.width = 500


    This will be automatically translated to a setter call, such as the following:


    rectangle.setWidth(500);


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 13 ■ JavaFX Languages and Markup


    The other part of the JavaFX property pattern that is even more tedious is the
    creation of new properties. To define a new property on your class in the same
    way that the JavaFX APIs define properties, you need a total of one field and
    three methods per property. The standard boilerplate for creating a name property
    on a Person object is shown in Listing 13-5.


    ***Listing 13-5.*** JavaFX Property Pattern to Create New Properties in Java


    import javafx.beans.property.SimpleStringProperty


    import javafx.beans.property.StringProperty


    public class Person {


    private StringProperty name;


    public final void setName(String val) { nameProperty().set(val); }


    public final String getName() { return nameProperty().get(); }


    public StringProperty nameProperty() {


    if (name == null) {


    name = new SimpleStringProperty(this, "name");


    }


    return name;


    }


    }


    ■ **Note** the preceding code can be further optimized by checking whether the
    property has been created in the getName method, and returning null if it has
    not been created (and thus not initializing the name property).


    Although this code is only a bit more verbose than the standard Java property
    bean pattern, multiply it by the number of properties you need to define in your
    application, and you have quite a bit of code to maintain and debug when there
    is something that is not working as expected.


    GroovyFX has a very elegant solution to this using a compiler hook for AST transformations.
    Rather than copying and pasting the property boilerplate each time you want to
    define a new property, you can simply annotate a variable with the @FXBindable
    annotation, and GroovyFX will take care of the rest. It generates exactly the
    same optimized code you would write by hand, but does it behind the scenes during
    the compile phase so that your source code is not cluttered with the additional
    logic.


    Listing 13-6 shows what the name property would look like in Groovy.


    ***Listing 13-6.*** GroovyFX Property Pattern to Create New Properties in Groovy
    import groovyx.javafx.beans.FXBindable


    class Person {


    @FXBindable String name


    }


    The GroovyFX @FXBindable annotation also supports handling the case where a property
    has a default initialization value:


    class Person {


    @FXBindable String name = "Guillaume Laforge"


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 13 ■ JavaFX Languages and Markup


    It also has a convenient shortcut syntax for converting all the variables in a
    class to properties:


    @FXBindable


    class Person {


    String name;


    int age;


    String gender;


    Date dob;


    }


