    # Chapter 8: Creating Charts in JavaFX


    *Any sufficiently advanced technology is indistinguishable from magic.*

    —Arthur C. Clarke


    Reporting is an important aspect in many business applications. The JavaFX Platform
    contains an API for creating charts. Because a `Chart` is basically a `Node`,
    integrating charts with other parts of a JavaFX application is straightforward.
    As a consequence, reporting is an integral part of the typical JavaFX Business
    Application.


    Designing an API is often a compromise among a number of requirements. Two of
    the most common requirements are “make it easy” and “make it easy to extend.”
    The JavaFX Chart API fulfills both of these. The Chart API contains a number of
    methods that allow developers to change the look and feel as well as the data
    of the chart, making it a flexible API that can be easily extended. The default
    values for the settings are very reasonable, though, and make it easy to integrate
    a chart with a custom application, with only a few lines of code.


    The JavaFX Chart API in JavaFX 8 has eight concrete implementations that are ready
    to be used by developers. Apart from those, developers can add their own implementations
    by extending one of the abstract classes.


    ## Structure of the JavaFX Chart API


    Different types of charts exist, and there are a number of ways to categorize
    them. The JavaFX Chart API distinguishes between two-axis charts and charts without
    an axis. The JavaFX 8 release contains one implementation of a no-axis chart,
    which is the `PieChart`. There are a number of two-axis charts, which all extend
    the abstract class `XYChart`, as shown in Figure 8-1.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Figure 8-1.** Overview of the charts in the JavaFX Chart API


    The abstract `Chart` class defines the setup for all charts. Basically, a chart
    consists of three parts: the title, legend, and content. The content is specific
    for each implementation of the chart, but the legend and the title concepts are
    similar across the implementations. Therefore, the `Chart` class has a number
    of properties with corresponding getter and setter methods that allow the manipulation
    of those concepts. The javadoc of the `Chart` class mentions the following properties:


    - `BooleanProperty animated`

    - `ObjectProperty<Node> legend`

    - `BooleanProperty legendVisible`

    - `ObjectProperty<Side> legendSide`

    - `StringProperty title`

    - `ObjectProperty<Side> titleSide`


    We use some of these properties in the upcoming examples, but we also show that
    even without setting values for these properties, the Chart API allows you to
    create nice charts.


    Because `Chart` extends `Region`, `Parent`, and `Node`, all of the properties
    and methods available on these classes can be used on a `Chart` as well. One of
    the benefits is that the same CSS styling techniques that are used to add style
    information to JavaFX `Node`s also apply to JavaFX Charts.


    The *JavaFX CSS Reference Guide*, available at [http://download.java.net/jdk8/jfxdocs/javafx/scene/doc-files/cssref.html](http://download.java.net/jdk8/jfxdocs/javafx/scene/doc-files/cssref.html),
    contains an overview of CSS properties that can be altered by designers and developers.'
