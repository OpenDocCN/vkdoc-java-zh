    预览菜单如图 3-18 所示。


    ***图 3-18.** 预览菜单*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 55](img/index-136_1.jpg)


    第 3 章 ■ 使用 SceneBuilder 创建用户界面


    “在窗口中显示预览”菜单项允许你在一个实时窗口中预览场景，以查看其在实际运行中的效果。这是最常用的菜单项，因为你将多次使用它。“JavaFX 主题”子菜单包含多种主题，你可以用它们来预览场景。“场景样式表”子菜单包含的选项允许你添加、删除或编辑在预览期间应用于场景的样式表。“国际化”子菜单包含的选项允许你添加、删除或编辑在预览期间使用的资源包。“预览大小”子菜单包含用于设置预览时首选屏幕尺寸的选项。


    “窗口”菜单允许你在多个同时编辑的 FXML 文件之间切换。


    “帮助”菜单显示 JavaFX SceneBuilder 的在线帮助和关于对话框。


    了解库面板


    库面板位于左侧面板的顶部，可以通过“视图 ➤ 隐藏库”菜单项将其隐藏。它包含了可用于构建用户界面的容器和节点。图 3-19 显示了库面板及其“容器”抽屉打开的状态，展示了一些容器。你可以点击其他抽屉来查看它们包含的内容。


    图 3-20 显示了库面板及其“控件”抽屉打开的状态，展示了一些控件。


    ***图 3-19.** 库面板及其“容器”抽屉打开状态*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 56](img/index-137_1.jpg)


    第 3 章 ■ 使用 SceneBuilder 创建用户界面


    ***图 3-20.** 库面板及其“控件”抽屉打开状态*


    库面板顶部有一个搜索框。你可以在搜索框中输入容器、控件或属于其他抽屉的某个元素的名称。当你输入时，库面板的显示会从手风琴式布局切换为一个单一的列表，其中包含所有名称与搜索框中输入内容匹配的节点。这使你能够快速按名称找到节点，而无需逐个浏览抽屉。


    图 3-21 显示了处于搜索模式的库面板。要退出搜索模式，只需点击搜索框右端的 x 标记即可。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 57](img/index-138_1.jpg)


    第 3 章 ■ 使用 SceneBuilder 创建用户界面


    ***图 3-21.** 处于搜索模式的库面板*


    一旦找到容器或节点，你可以将其拖拽到内容面板，拖拽到文档面板的层次树中，或者双击它。将容器拖入内容面板，然后用控件和其他节点填充容器，这就是在 JavaFX
    SceneBuilder 中构建用户界面的方式。


    搜索框右侧是一个菜单按钮，其中包含几个菜单项和一个用于改变库面板行为的子菜单。图 3-22 显示了此菜单按钮中的可用选项。“以列表形式查看”菜单项将库面板的显示从按多个分区展示节点，改为将所有节点集中在一个列表中展示，不分区域。“以分区形式查看”菜单项则将库面板的显示从单一列表改为按多个分区展示节点。“导入
    JAR/FXML 文件”菜单项允许你将外部 jar 文件或 FXML 文件作为自定义组件导入到 JavaFX SceneBuilder 中。“导入所选内容”菜单项允许你将当前选中的节点作为自定义组件导入到
    JavaFX SceneBuilder 中。“自定义库文件夹”子菜单包含两个菜单项。“在资源管理器中显示”菜单项会打开操作系统的文件资源管理器（或 Finder）中存放自定义组件的文件夹，允许你移除任何已导入的自定义库。“显示
    JAR 分析报告”菜单项会显示一份报告，其中包含 JavaFX SceneBuilder 对导入的 jar 文件的评估结果。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 58](img/index-139_1.jpg)


    第 3 章 ■ 使用 SceneBuilder 创建用户界面


    ***图 3-22.** 库面板及其菜单打开状态*


    为了演示如何将自定义组件导入 JavaFX SceneBuilder，我们将上一节中 CustomComponent 示例的类文件和 FXML 文件打包成一个
    CustomComponent.jar 文件。然后我们调用“导入 JAR/FXML 文件”菜单项，导航到相应目录，并选择 CustomComponent.jar
    文件进行导入。一旦我们在文件选择对话框中点击“打开”按钮，JavaFX SceneBuilder 就会打开“导入”对话框，如图 3-23 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 59](img/index-140_1.jpg)


    第 3 章 ■ 使用 SceneBuilder 创建用户界面


    ***图 3-23.** 导入 CustomComponent.jar 的“导入”对话框*


    我们可以通过点击左侧列表中的自定义组件名称来检查 jar 文件中包含的每个自定义组件。所选自定义组件的信息，包括其可视化表示，会显示在屏幕右侧。我们可以通过选中组件名称旁的复选框来选择要导入哪些自定义组件。然后点击“导入组件”按钮完成导入过程。导入后，ProdId
    自定义组件会出现在库面板的“自定义”分区中，并且可以添加到任何后续构建的用户界面中。


    了解文档面板


    文档面板位于左侧面板的底部，可以通过“视图 ➤ 隐藏文档”菜单项将其隐藏。它包含两个分区。“层次结构”分区以树状视图显示所有已添加到内容面板的节点，并按包含关系进行组织。由于内容面板中节点的布局可能使得从内容面板中选择节点比较棘手，因此在文档面板的“层次结构”分区中进行选择可能会更容易。


    图 3-24 显示了清单 3-4 中 FXMLLoaderExample 的 FXML 文件对应的文档面板的“层次结构”分区。你可以看到展开的节点树，其中
    WebView 节点处于选中状态。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 60](img/index-141_1.jpg)


    ![Image 61](img/index-141_2.jpg)


    第 3 章 ■ 使用 SceneBuilder 创建用户界面

