- fmt: "# The TextArea Control\n\nThe `TextArea` control is similar to the `TextField`\
    \ control, but allows for multiple lines of text. In Step 27 of the exercise,\
    \ when you entered text into the `TextArea` shown in Figure [6-9 and s](#index_split_003.html#p239)ubsequently\
    \ caused the `TextArea` to lose focus, the contents of the `TextArea` were printed\
    \ to the Java console. The following snippet from Listing 6-12 creates the `TextArea`\
    \ and implements these behaviors:\n\n```\nfinal TextArea textArea = new TextArea();\n\
    textArea.setPrefColumnCount(12);\ntextArea.setPrefRowCount(4);\ntextArea.focusedProperty().addListener((ov,\
    \ oldValue, newValue) -> {\n    if (!textArea.isFocused()) {\n        System.out.println(\"\
    TextArea text is: \" + textArea.getText());\n    }\n});\n```\n\nSome useful `TextArea`\
    \ properties not demonstrated in the preceding snippet are:\n\n- `wrapText`, which\
    \ controls whether the text will wrap in the `TextArea`\n- `scrollLeft`/`scrollTop`,\
    \ which are the number of pixels by which the content is horizontally or vertically\
    \ scrolled\n\nLet’s move away from the UI controls that accept text input, and\
    \ briefly talk about two very convenient utilities.\n\n## Creating a DatePicker\
