    \ webSites[randomIdx];\n}\n```\n\n`WebView`控件及其对应的`WebEngine`在API的`javafx.scene.web`包中记录了更多功能，值得深入研究。\n\
    \n## 总结\n\n恭喜！您在使用JavaFX UI控件方面积累了丰富的经验。\n\n- 您在`StarterApp`程序的上下文中尝试了大多数JavaFX\
    \ UI控件，该程序也可作为您修改和创建应用程序的起点。\n- 您探索了这些JavaFX UI控件的代码示例和说明。\n\n## 资源\n\n有关使用JavaFX\
