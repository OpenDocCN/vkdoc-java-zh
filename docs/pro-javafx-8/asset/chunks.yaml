    **第 9 章**


    **使用媒体类**


    *我们不断前进，开启新的大门，尝试新的事物，因为我们充满好奇，而好奇心不断引领我们探索新的道路。*


    —沃尔特·迪士尼


    在前几章中，你已经学会了如何使用 JavaFX 库创建应用程序。现在，我们将充分利用这些知识，创建探索 JavaFX 平台音频和视频功能的应用程序。


    基础


    自 JavaFX 2.0 起，JavaFX 中的媒体类基于一个名为 GStreamer1 的开源多媒体框架。


    这与早期版本 JavaFX 中的媒体库相比是一个重大变化，早期版本直接使用了各种支持平台的原生媒体功能。相比之下，基于 GStreamer 的库提供了更好的稳定性和跨平台一致性。后者应结合
    Java“一次编写，到处运行”的范式来看待。在 JavaFX 1 中，不同平台上的 JavaFX 媒体应用程序之间存在巨大差异。


    如今，这种一致性的缺点是某些情况下提供的功能较少，但不同平台提供了相同的功能。


    支持的媒体格式


    表 9-1 显示了 JavaFX 媒体类支持的文件格式。支持四种音频格式和三种视频格式。JavaFX 支持的四种音频格式（MP3、WAV、AIFF 和 AAC）非常常见，并且都得到了市场上大多数音频工具的很好支持。你应该能够轻松地将源音频文件获取为
    JavaFX 支持的格式之一，或将其转换为这些格式。


    1[`gstreamer.freedesktop.org/`](http://gstreamer.freedesktop.org/)


