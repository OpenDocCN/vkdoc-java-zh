    如果你想知道何时应该使用 FXML，何时应该在 Java 中编写 UI，这并没有唯一正确的答案。通常，在使用合适的工具（例如 SceneBuilder）时，在
    FXML 中声明布局往往更容易。业务逻辑和连接通常是在相应的控制器类中完成的。然而，最重要的因素是开发人员和设计师应该找到一种能让他们最高效工作的方式！


