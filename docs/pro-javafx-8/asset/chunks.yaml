    `SceneBuilder` is a stand-alone tool that allows you to design JavaFX interfaces
    rather than coding them. We discuss `SceneBuilder` in Chapter 3. Although `SceneBuilder`
    produces FXML—and we discuss FXML in Chapter 3 as well—that can be used in any
    IDE, NetBeans provides a tight integration with `SceneBuilder`. The `SceneBuilder`
    tool can be downloaded at [http://www.oracle.com/technetwork/java/javase/downloads/sb2download-2177776.html](http://www.oracle.com/technetwork/java/javase/downloads/sb2download-2177776.html).


    ## JavaFX, the Community


    JavaFX is not a closed-source project, developed in a secret bunker. To the contrary,
    JavaFX is being developed in an open spirit, with an open source code base, open
    mailing lists, and an open and active community sharing knowledge.


    The source code is developed in the OpenJFX project, which is a subproject of
    the OpenJDK project in which Java SE is being developed. If you want to examine
    the source code or the architecture, or if you want to read the technical discussions
    on the mailing list, have a look at [http://openjdk.java.net/projects/openjfx](http://openjdk.java.net/projects/openjfx).


    The developer community is very active, both in OpenJFX as well as in application-specific
    areas. The starting point for developers is the JavaFX Community at [http://javafxcommunity.com](http://javafxcommunity.com/).
    This is a community site created by Oracle, but with input from many JavaFX developers.
    The content of the JavaFX Community changes often, and in Figure 1-2 we show a
    snapshot on how this community site looked at the time of writing.


    **Figure 1-2.** A snapshot of the JavaFX community web site


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    In addition, blogs maintained by JavaFX engineers and developers are great resources
    for up-to-the-minute technical information on JavaFX. For example, Oracle JavaFX
    Engineers Richard Bair, Jasper Potts, and Jonathan Giles keep the developer community
    apprised of the latest JavaFX innovations at [http://fxexperience.com](http://fxexperience.com/).
    The Resources section at the end of this chapter contains the URLs of the blogs
    that the authors of this book use to engage the JavaFX developer community.


    Two important characteristics of the JavaFX Community are its own creativity and
    the desire to share. There are a number of open-source efforts bringing added
    value to the JavaFX Platform. Because of good cooperation between the JavaFX Platform
    engineers and the external JavaFX developers, these open-source projects fit very
    well with the official JavaFX Platform.


    Some of the most interesting efforts are listed here:


    - `RoboVM` allows you to create iOS applications using Java and JavaFX. As a consequence,
    your JavaFX application can be used to create an app for the iPhone or the iPad.

    - The JavaFX-Android project maintains a JavaFX SDK for Android development. As
    a consequence, your JavaFX application can be used to create an app for Android
    devices. The iOS and the Android port of JavaFX are discussed in more detail in
    Chapter 12.

    - `JFXtras.org` is a project working on adding high-quality controls and add-ons
    to the JavaFX Platform.

    - `ControlsFX` is another project adding high-quality controls and tools to the
    JavaFX Platform. It is worth mentioning that the JavaFX team is closely watching
    the efforts in both `JFXtras.org` and `ControlsFX`, and ideas that are started
    in one of those projects might make it into one of the next releases of JavaFX.

    - `DataFX` is an open-source project aiming to facilitate the retrieval of external
    data in JavaFX applications, and to provide JavaFX developers with enterprise
    functionality like injection and flow management.

    - `OpenDolphin` is another project helping developers in separating and synchronizing
    client and server development, by implementing the highest degree of Model-View-Controller
    separation.


    Take a few minutes to explore these sites. Next we point out some more valuable
    resources that are helpful.


    ## Use the Official Specifications


    While developing JavaFX applications, it is very useful to have access to the
    API JavaDoc documentation, which is available at [http://download.java.net/jdk8/jfxdocs/index.html](http://download.java.net/jdk8/jfxdocs/index.html)
    and shown in Figure 1-3.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 17](index-10_1.jpg)


    **Figure 1-3.** JavaFX SDK API Javadoc


    The API documentation in Figure 1-3, for example, shows how to use the `Rectangle`
    class, located in the `javafx.scene.shape` package. Scrolling down this web page
    shows the properties, constructors, methods, and other helpful information about
    the `Rectangle` class. By the way, this API documentation is available in the
    Java 8 SE SDK that you downloaded, but we wanted you to know how to find it online
    as well.


    Apart from the JavaDoc, it is very useful to have the Cascading Style Sheets (CSS)
    style reference at hand as well. This document explains all the style classes
    that can be applied to a particular JavaFX element. You can find this document
    at [http://download.java.net/jdk8/jfxdocs/javafx/scene/doc-files/cssref.html](http://download.java.net/jdk8/jfxdocs/javafx/scene/doc-files/cssref.html).


    ## ScenicView


    You already downloaded `SceneBuilder`, which is the tool that allows you to create
    UIs by designing them, rather than writing code. We expect that there will be
    more tools developed by companies and individuals that help you create JavaFX
    applications. One of the first tools that was made available for free and that
    is very helpful when debugging JavaFX applications is `ScenicView`, originally
    created by Amy Fowler at Oracle, and later maintained by Jonathan Giles. You can
    download `ScenicView` at [http://fxexperience.com/scenic-view/](http://fxexperience.com/scenic-view/).


    `ScenicView` is particularly helpful because it provides a convenient UI that
    allows developers to inspect properties of nodes (i.e., dimensions, translations,
    CSS) at runtime.


    ## Packaging and Distribution


    The techniques used for delivering software to the end user are always changing.
    In the past, the preferred way for delivering Java applications was via the Java
    Network Launch Protocol (JNLP). Doing so, both applets and stand-alone applications
    can be installed on a client. However, there are a number of issues with this
    technique. The idea only works if the end user has a JVM installed that is capable
    of executing the application. This is not always true. Even in the desktop world,
    where a system can be delivered preinstalled with a JVM, there are issues with
    versioning and security. Indeed, some applications are hard-coded against a specific
    version of the JVM. Although vulnerabilities in the JVM are in most cases fixed
    very fast, this still requires the end user to always install the latest version
    of the JVM, which can be pretty frustrating.


    On top of that, browser manufacturers are increasingly reluctant to support alternative
    embedded platforms. In summary, relying on a browser and on a local, preinstalled
    JVM does not provide the best end-user experience.


    The client software industry is shifting more and more toward the so-called AppStores.
    In this concept, applications can be downloaded and installed that are self-containing.
    They do not rely on preinstalled execution environments. The principles originated
    in the mobile space, where Apple with the AppStore and Android with the Play store
    are leading the market. Especially in these markets, single-click installs have
    a huge advantage over local downloads, unpacking, manual configuration, and more
    nightmares.'
