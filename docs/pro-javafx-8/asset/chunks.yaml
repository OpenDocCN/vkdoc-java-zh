- fmt: "# The Reversi Application\n\nThe `Reversi` application that was developed\
    \ in this chapter is completely dynamic and flexible both in layout and structure,\
    \ so it is time to take advantage of this and push the limits of your coding skills.\n\
    \nHere are some coding challenges that you can use to take the `Reversi` application\
    \ from a well-designed tutorial to a full-fledged application.\n\n- There is one\
    \ rule that we neglected to implement, which is skipping turns. If, and only if,\
    \ a player has no available options to play, the next player can go. Try implementing\
    \ a facility that automatically detects whether there are no legal moves and skips\
    \ a turn.\n- Playing against another player on the same computer is not nearly\
    \ as interesting as playing against a remote opponent. After reading some of the\
    \ later chapters on back-end integration with JavaFX, try implementing a network-capable\
    \ version of the `Reversi` application.\n- Wouldn’t it be great to have a JavaFX\
    \ AI for playing `Reversi`? Give it a try, and see if you can create an unbeatable\
    \ opponent!\n\n## Summary\n\nIn this chapter you were able to fully leverage the\
    \ JavaFX layout capabilities to do dynamic layout of a complex application. Along\
    \ the way, you learned how to:\n\n- Align `Node`s using `bind`.\n- Use `StackPane`\
    \ to layer `Node`s and create composite layouts.\n- Use `TilePane` to do fixed-size\
    \ layouts.\n- Use `FlowPane`, `HBox`, and `VBox` to do directional layouts with\
    \ and without wrapping.\n- Create a dynamic game board using binding and `GridPane`.\n\
    - Use `AnchorPane` to align and stretch overlapping nodes.\n- Create custom components\
    \ using `Region`s and CSS.\n- Build a rich UI backed by a game model.\n- Apply\
    \ JavaFX effects and transitions.\n- Use `FXML` to create the UI in a declarative\
    \ way.\n\nAfter experiencing the advantages of dynamic layout, you will be hard-pressed\
    \ to go back to static positioning of components with fixed sizes. In the next\
    \ chapter we show you how to create custom UI components and charts that you can\
    \ use to create even more impressive business-centric applications.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 5 ■ Building Dynamic UI Layouts in JavaFX\n\n### Resources\n\nFor\
    \ more information about dynamic layouts, consult the following resources.\n\n\
    - JavaFX 2.0 Layout: A Class Tour:  \n  [http://amyfowlersblog.wordpress.com/2011/06/02/javafx2-0-layout-a-class-tour/](http://amyfowlersblog.wordpress.com/2011/06/02/javafx2-0-layout-a-class-tour/)\n\
    - Working with Layouts in JavaFX:  \n  [http://docs.oracle.com/javase/8/javafx/layout-tutorial/index.html](http://docs.oracle.com/javase/8/javafx/layout-tutorial/index.html)\n\
    \nTo learn more about the game of Reversi, please refer to the following resource.\n\
    \n- Wikipedia, “Reversi.” URL: [http://en.wikipedia.org/wiki/Reversi](http://en.wikipedia.org/wiki/Reversi)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\n## Chapter 6\n\n\
    ## Using the JavaFX UI Controls\n\n*Miracles are a retelling in small letters\
    \ of the very same story which is written across the whole world in letters too\
    \ large for some of us to see.*  \n—C. S. Lewis\n\nIn Chapter 2 you learned how\
    \ to create user interfaces (UIs) in JavaFX by creating a stage, putting a scene\
    \ on the stage, and putting nodes in the scene. You also learned how to handle\
    \ mouse and keyboard events, as well as how to animate nodes in the scene.\n\n\
    In this chapter we pick up the UI discussion from Chapter 2 by showing you how\
    \ to use the UI controls available in JavaFX. The knowledge you’ve gained about\
    \ property binding in Chapter 4 and layouts in Chapter 5 will serve you well in\
    \ this chapter, as it builds on those concepts.\n\n### Trying Out the JavaFX UI\
    \ Controls\n\nJavaFX has a rich set of UI controls for creating your applications.\
    \ These range from relatively simple controls such as `TextField` to more complex\
    \ controls such as `WebView`. To get you up to speed quickly on these controls,\
    \ we’ve created an example application named `StarterApp`. This application has\
    \ an example of most of the UI controls available in JavaFX, and it also serves\
    \ as a starting point from which you can use modifications to create an application."
  raw: 'The Reversi application that was developed in this chapter is completely dynamic
    and flexible both in layout and structure, so it is time to take advantage of
    this and push the limits of your coding skills.


    Here are some coding challenges that you can use to take the Reversi application
    from a well-designed tutorial to a full-fledged application.


    • There is one rule that we neglected to implement, which is skipping turns. If,
    and only if, a player has no available options to play, the next player can go.
    Try implementing a facility that automatically detects whether there are no legal
    moves and skips a turn.


    • Playing against another player on the same computer is not nearly as interesting
    as playing against a remote opponent. After reading some of the later chapters
    on back-end integration with JavaFX, try implementing a network-capable version
    of the Reversi application.


    • Wouldn’t it be great to have a JavaFX AI for playing Reversi? Give it a try,
    and see if you can create an unbeatable opponent!


    Summary


    In this chapter you were able to fully leverage the JavaFX layout capabilities
    to do dynamic layout of a complex application. Along the way, you learned how
    to


    • Align Nodes using bind.


    • Use StackPane to layer Nodes and create composite layouts.


    • Use TilePane to do fixed-size layouts.


    • Use FlowPane, HBox, and VBox to do directional layouts with and without wrapping.


    • Create a dynamic game board using binding and GridPane.


    • Use AnchorPane to align and stretch overlapping nodes.


    • Create custom components using Regions and CSS.


    • Build a rich UI backed by a game model.


    • Apply JavaFX effects and transitions.


    • Use FXML to create the UI in a declarative way.


    After experiencing the advantages of dynamic layout, you will be hard-pressed
    to go back to static positioning of components with fixed sizes. In the next chapter
    we show you how to create custom UI components and charts that you can use to
    create even more impressive business-centric applications.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 5 ■ Building dynamiC ui layouts in JavaFX


    Resources


    For more information about dynamic layouts, consult the following resources.


    • JavaFX 2.0Layout: A Class Tour:


    [http://amyfowlersblog.wordpress.com/2011/06/02/javafx2-0-layout-a-class-tour/](http://amyfowlersblog.wordpress.com/2011/06/02/javafx2-0-layout-a-class-tour/)


    • Working with layouts in JavaFX:


    [http://docs.oracle.com/javase/8/javafx/layout-tutorial/index.html](http://docs.oracle.com/javase/8/javafx/layout-tutorial/index.html)


    To learn more about the game of Reversi, please refer to the following resource.


    • Wikipedia, “Reversi.” URL: [http://en.wikipedia.org/wiki/Reversi](http://en.wikipedia.org/wiki/Reversi)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Chapter 6**


    **Using the JavaFX UI Controls**


    *Miracles are a retelling in small letters of the very same story which is written
    across the whole* *world in letters too large for some of us to see.*


    —C. S. Lewis


    In Chapter 2 you learned how to create user interfaces (UIs) in JavaFX by creating
    a stage, putting a scene on the stage, and putting nodes in the scene. You also
    learned how to handle mouse and keyboard events, as well as how to animate nodes
    in the scene.


    In this chapter we pick up the UI discussion from Chapter 2 by showing you how
    to use the UI controls available in JavaFX. The knowledge you’ve gained about
    property binding in Chapter 4 and layouts in Chapter 5 will serve you well in
    this chapter, as it builds on those concepts.


    Trying Out the JavaFX UI Controls


    JavaFX has a rich set of UI controls for creating your applications. These range
    from relatively simple controls such as TextField to more complex controls such
    as WebView. To get you up to speed quickly on these controls, we’ve created an
    example application named StarterApp. This application has an example of most
    of the UI controls available in JavaFX, and it also serves as a starting point
    from which you can use modifications to create an application.'
  trans: "\n本章开发的 Reversi 应用程序在布局和结构上完全动态且灵活，因此是时候利用这一点，挑战你的编码技能极限了。\n\n以下是一些编码挑战，你可以借此将\
    \ Reversi 应用程序从一个设计精良的教程，发展成一个功能完备的应用程序。\n\n•   有一条规则我们忽略了实现，那就是跳过回合。当且仅当某位玩家没有可用的落子选项时，下一位玩家才能走棋。尝试实现一个自动检测是否存在合法走法，并在没有时跳过回合的功能。\n\
    •   在同一台电脑上与另一位玩家对战，远不如与远程对手对战有趣。在阅读了后续关于 JavaFX 后端集成的章节后，尝试实现一个支持网络的 Reversi\
    \ 应用程序版本。\n•   拥有一个用于玩 Reversi 的 JavaFX AI 不是很好吗？试试看，看看你是否能创造一个无法击败的对手！\n\n总结\n\
    \n在本章中，你充分利用了 JavaFX 的布局能力，实现了一个复杂应用程序的动态布局。在此过程中，你学会了如何：\n\n•   使用绑定（bind）对齐节点（Nodes）。\n\
    •   使用 StackPane 分层放置节点并创建复合布局。\n•   使用 TilePane 进行固定尺寸布局。\n•   使用 FlowPane、HBox\
    \ 和 VBox 进行带或不带换行的方向性布局。\n•   使用绑定和 GridPane 创建动态游戏棋盘。\n•   使用 AnchorPane 对齐和拉伸重叠的节点。\n\
    •   使用 Regions 和 CSS 创建自定义组件。\n•   构建由游戏模型支持的丰富用户界面。\n•   应用 JavaFX 特效和过渡动画。\n\
    •   使用 FXML 以声明方式创建用户界面。\n\n在体验了动态布局的优势之后，你将很难再回到使用固定尺寸静态定位组件的方式。在下一章中，我们将向你展示如何创建自定义\
    \ UI 组件和图表，以构建更令人印象深刻的业务导向型应用程序。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n第 5 章 ■ 在 JavaFX 中构建动态 UI 布局\n\n资源\n\n有关动态布局的更多信息，请查阅以下资源。\n\n•   JavaFX 2.0\
    \ 布局：类之旅：\n    [`amyfowlersblog.wordpress.com/2011/06/02/javafx2-0-layout-a-class-tour/`](http://amyfowlersblog.wordpress.com/2011/06/02/javafx2-0-layout-a-class-tour/)\n\
    \n•   在 JavaFX 中使用布局：\n    [`docs.oracle.com/javase/8/javafx/layout-tutorial/index.html`](http://docs.oracle.com/javase/8/javafx/layout-tutorial/index.html)\n\
    \n要了解更多关于 Reversi 游戏的信息，请参考以下资源。\n\n•   维基百科，“Reversi”。网址：[`en.wikipedia.org/wiki/Reversi`](http://en.wikipedia.org/wiki/Reversi)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 6 章**\n\n**使用 JavaFX\
    \ UI 控件**\n\n*奇迹是用小写字母重述同一个故事，而这个故事用大写字母写满了整个世界，大得我们有些人看不见。*\n\n——C. S. 刘易斯\n\n\
    在第 2 章中，你学习了如何通过创建舞台（stage）、在舞台上放置场景（scene）、以及在场景中放置节点（nodes）来在 JavaFX 中创建用户界面。你还学习了如何处理鼠标和键盘事件，以及如何为场景中的节点添加动画。\n\
    \n在本章中，我们将从第 2 章的用户界面讨论继续，向你展示如何使用 JavaFX 中可用的 UI 控件。你在第 4 章学到的属性绑定知识和第 5 章学到的布局知识，将在本章中发挥重要作用，因为本章建立在这些概念之上。\n\
    \n尝试使用 JavaFX UI 控件\n\nJavaFX 拥有丰富的 UI 控件集，可用于创建应用程序。这些控件从相对简单的控件（如 TextField）到更复杂的控件（如\
    \ WebView）不等。为了让你快速掌握这些控件，我们创建了一个名为 StarterApp 的示例应用程序。该应用程序包含了 JavaFX 中大多数 UI\
    \ 控件的示例，同时它也可以作为一个起点，你可以通过修改它来创建自己的应用程序。\n"
