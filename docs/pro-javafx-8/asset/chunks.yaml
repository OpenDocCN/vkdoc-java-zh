  raw: 'For example, here is how you bind the height of one Rectangle to the sum of
    the heights of two others: rect1.height <== rect2.height + rect3.height


    Other than the special bind operator (<==), and lack of parentheses to convert
    from properties to values, this is the same code that you would write to add up
    the heights statically. However, once the bind is in place, any updates to rect2
    or rect3 will dynamically change the height of rect1.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 13 ■ JavaFX Languages and Markup


    What this expression actually translates to is the following JavaFX code in Java:


    rect1.heightProperty().bind(rect2.heightProperty().add(rect3.heightProperty()));


    Even for a simple bind expression such as this, it is easy to get lost in all
    the parentheses and method calls that Java requires.


    You can also do aggregate operators in ScalaFX. Rather than having to use the
    static methods on the JavaFX


    Bindings class, the ScalaFX Includes import gives you all these functions as methods
    you can call directly, such as the following code to bind the width of one rectangle
    to the max width of three others.


    rect1.width <== max(rect2.width, rect3.width, rect4.width)


    The other type of bind expression that is extremely common is conditional statements.
    Creating conditionals with the JavaFX APIs is possible, again by using the static
    Bindings class, but much simpler using the ScalaFX APIs.


    The following code changes the strokeWidth based on whether the cursor is hovering
    (just as we did in the Vanishing Circles application earlier).


    strokeWidth <== when (hover) then 4 otherwise 0


    The expressions passed in for the conditional value and result clauses can be
    arbitrarily complicated. The following example combines Boolean logic, String
    concatenation, and a conditional expression.


    text <== when (rect.hover || circle.hover && !disabled) then textField.text +
    " is enabled"


    otherwise "disabled"


    In all of these examples, because you are writing code that sits directly on top
    of the JavaFX bind APIs, you get all the same benefits, such as lazy evaluation.
    Also, because Scala is a statically typed language like Java, you get these benefits
    without giving up type safety as you do with other dynamic languages. In fact,
    you get better type safety with the ScalaFX APIs, because it also supports type-safe
    dereferencing of subproperties. For example, in ScalaFX to bind the width of a
    rectangle to the width of a Scene you would simply write:


    rect1.width <== stage.scene.width


    This works even if the Scene has not been created yet, such as during initialization
    of the Stage object. You can also accomplish the same thing in Java, but it requires
    a non-type-safe property selector: rect.widthProperty().bind(Bindings.selectDouble(stage,
    "scene.width"));


    Underneath the covers, the ScalaFX calls this exact JavaFX API, but it protects
    the application developer from accessing a property that might be misspelled or
    of the wrong type.


    Finally, a discussion of binding would not be complete without an example of bidirectional
    binding. This is similarly easy in ScalaFX, and can be accomplished using a slight
    variation on the bind operator as shown in the following example.


    textField.text <==> model.name


    This creates a bidirectional binding between the name property in the model and
    a TextField, such that if the user edits the text field, the model object will
    automatically be updated, too.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 13 ■ JavaFX Languages and Markup


    Although most of the ScalaFX operators are fairly intuitive, there are a few cases
    where it was not possible to use the standard operators. These include:


    • if/else: These are Scala language keywords, so as demonstrated earlier, these
    have been replaced with when/otherwise, just as in the corresponding JavaFX APIs.


    • ==/!=: Directly using the equality and inequality operators produces some unwanted


    interactions with the same operations on the core Scala object base class. Instead
    use === and


    =!=, both of which were carefully chosen to have the same precedence rules as
    the operators they are replacing.


    As an added bonus, you can specify the precision of the === and =!= operators
    for numeric comparison by using the following syntax.


    aboutFiveHundred <== value1 === 500+-.1


    This would test that value1 is less than .1 away from 500.


    API Enhancements


    By this time, you should have a pretty good feel for how the JavaFX applications
    you have been building translate to equivalent ScalaFX code. In general the ScalaFX
    APIs mirror the JavaFX APIs, providing equivalent functionality.


    However, in some cases it was actually possible to provide an improved API or
    alternative choice that matches the declarative style of programming that ScalaFX
    encourages. In this section we cover a few different areas in which ScalaFX improves
    on the JavaFX APIs.


    Closures


    One of the features that is new to Java 8 is lambdas or closures. This simplifies
    the case where you are creating event listeners or similar callbacks where you
    need to implement an interface that contains a single method.


    Most modern JVM languages have had closures as a core language feature for quite
    a while, as does the Scala language. This means that anywhere you would normally
    have to implement an event or property listener, you can instead use a closure
    to simplify your code.


    Earlier in the Vanishing Circles application we showed an example of a closure
    to set a mouse click handler: onMouseClicked = {


    Timeline(at (3 s) {radius -> 0}).play()


    }


    The closure part is really that simple; all you have to do is surround your method
    logic with curly braces and assign it to the property for the event handler. There
    is another variant of this if you also need access to some of the variables passed
    in, such as the MouseEvent:


    onMouseClicked = { (e: MouseEvent) =>


    Timeline(at (3 s) {radius -> 0}).play()


    }


    Layout Constraints


    The layout constraint mechanism introduced in JavaFX 2 is very flexible, because
    it lets layout authors define their own constraints that get stored on Node, but
    is also not ideal from an application developer standpoint. It forces your code
    into an imperative pattern where you add children in one step and then set constraints
    following that.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 13 ■ JavaFX Languages and Markup


    Because the set of interesting layout constraints is fairly small, the ScalaFX
    APIs simply add the common ones onto the Node class directly. This lets you specify
    constraints such as alignment, margin, and grow declaratively as you are creating
    your object tree.


    For example, to add a margin to the Label in our Hello ScalaFX example, it is
    as easy as setting the margin property on the Label:


    object HelloScalaFXMargin extends JFXApp {


    stage = new PrimaryStage {


    scene = new Scene {


    content = new Label {


    text = "Hello ScalaFX Margin"


    margin = new Insets(20)


    }


    }


    }


    }


    This adds 20 pixels around the Label to space it out in the window. Without this
    ScalaFX feature, you would have been required to save a reference to the Label
    and later call the following.


    StackPane.setMargin(new Insets(20));


    An added benefit of the ScalaFX Node Layout Constraints is that they apply across
    all JavaFX layouts regardless of which type of container you are using. With the
    normal JavaFX Layout Constraints, you need to use the static method from the right
    layout type, otherwise the constraint will not work.


    ■ **Tip** For layout authors who want to make use of the scalaFX node Layout Constraints,
    scalaFX also stores the layout constraint in an unprefixed form that you can directly
    access. For example, to get the margin constraint, simply call node.getProperties().get("margin").
    For alignment you get your choice of accessing it as “alignment,”


    “halignment,” or “valignment,” all of which get updated anytime the user sets
    the alignment property.


