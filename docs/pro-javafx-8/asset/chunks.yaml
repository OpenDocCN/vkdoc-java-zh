  trans: '

    功能强大，但也非常复杂。通过使用 FXML，JavaFX 允许我们以声明式编程风格简洁而优雅地表达用户界面（UI）。它还充分利用了 Java 的全部能力，因为你可以实例化并使用当今存在的数百万个
    Java 类。再加上诸如将 UI 绑定到模型中的属性以及减少对 setter 方法需求的变更监听器等特性，你将拥有一个有助于将 Java 重新带回客户端互联网应用的组合。


    在本章中，我们将带你快速入门 JavaFX 应用的开发。在让你了解 JavaFX 的简要历史之后，我们将向你展示如何获取所需的工具。我们还将探索一些优秀的
    JavaFX 资源，并引导你完成编译和运行 JavaFX 应用的过程。在此过程中，当我们一起浏览应用代码时，你将学到很多关于 JavaFX 应用编程接口（API）的知识。


    JavaFX 简史


    JavaFX 最初是 Chris Oliver 在名为 SeeBeyond 的公司工作时的创意。他们需要更丰富的用户界面，因此 Chris 为此创建了一种他称之为
    F3（形式追随功能）的语言。在文章《令人脑洞大开的创新》（本章末尾的参考资料部分有引用）中，Chris 被引述如下：“当谈到将人员整合到业务流程中时，你需要图形用户界面供他们交互，因此在企业应用领域存在对图形的用例，并且
    SeeBeyond 对拥有更丰富的用户界面感兴趣。”


    SeeBeyond 被 Sun 收购，Sun 随后将 F3 更名为 JavaFX，并在 2007 年的 JavaOne 大会上宣布。Chris Oliver
    在收购期间加入了 Sun，并继续领导 JavaFX 的开发。


    JavaFX Script 的第一个版本是一种解释型语言，被认为是后来编译型 JavaFX Script 语言的原型。解释型 JavaFX Script 非常健壮，并且在
    2007 年下半年出版了两本基于该版本的 JavaFX 书籍。一本是用日文写的，另一本是用英文写的，由 Apress 出版（*JavaFX Script:
    Dynamic Java Scripting for Rich Internet/Client-Side Applications*，Apress，2007
    年）。


    在开发者们试验 JavaFX 并提供改进反馈的同时，Sun 的 JavaFX Script 编译器团队正忙于创建该语言的编译版本。这包括一套新的运行时 API
    库。JavaFX Script 编译器项目在 2007 年 12 月初达到了一个临界点，这在一篇题为“祝贺 JavaFX Script 编译器团队——大象已经穿过门”的博客文章中得到了纪念。这句话来自
    JavaFX Script 编译器项目负责人 Tom Ball 的一篇博客文章，其中包含以下摘录。


    *当我最近被问及 JavaFX Script 编译器团队究竟何时会交付我们的第一个里程碑版本时，我想到了一个关于大象的比喻。“我无法给你一个准确的日期，”我说。“这就像把一头大象推过一扇门；在达到临界质量使其越过门槛之前，你根本不知道什么时候能完成。然而，一旦你越过了那个门槛，剩下的部分就会很快完成，并且可以更准确地预测。”*


    图 1-1 显示了本书作者之一 Jim Weaver 为那篇文章编写的一个搞笑的已编译 JavaFX 应用的截图，证明该项目确实已经达到了 Tom Ball
    所说的临界质量。


    ***图 1-1.** “大象穿过门”程序的截图*


    2008 年，JavaFX 继续取得巨大进展：


    • 2008 年 3 月，NetBeans JavaFX 插件可用于编译版本。


    • 许多 JavaFX 运行时库（主要关注 JavaFX 的 UI 方面）由一个包括来自 Java Swing 团队的一些非常有才华的开发者的团队重写。


    • 2008 年 7 月，JavaFX 预览版软件开发工具包（SDK）发布，并且在 2008 年的 JavaOne 大会上，Sun 宣布 JavaFX 1.0
    SDK 将于 2008 年秋季发布。


    • 2008 年 12 月 4 日，JavaFX 1.0 SDK 发布。这一事件提高了开发者和 IT 经理对 JavaFX 的采用率，因为它代表了一个稳定的代码库。


    • 2009 年 4 月，Oracle 和 Sun 宣布 Oracle 将收购 Sun。JavaFX 1.2 SDK 在 2009 年的 JavaOne 大会上发布。


    • 2010 年 1 月，Oracle 完成了对 Sun 的收购。JavaFX 1.3 SDK 于 2010 年 4 月发布，JavaFX 1.3.1 是
    1.3 系列的最后一个版本。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 15](img/index-6_1.jpg)


    第一章 ■ 快速入门 JavaFX


    在 2010 年的 JavaOne 大会上，JavaFX 2.0 被宣布。Oracle 发布了 JavaFX 2.0 路线图，其中包括以下内容。


    • 弃用 JavaFX Script 语言，转而使用 Java 和 JavaFX 2.0 API。这使得 JavaFX 能够被任何在 Java 虚拟机（JVM）上运行的语言（例如
    Java、Groovy 和 JRuby）所使用，从而进入主流。因此，现有开发者无需学习新语言，而是可以利用现有技能开始开发 JavaFX 应用。


    • 将 JavaFX Script 的引人注目的特性（包括绑定到表达式）引入 JavaFX 2.0 API。


    • 在 JavaFX 1.3 中已有的组件基础上，提供日益丰富的 UI 组件集。


    • 提供一个用于将 HTML 和 JavaScript 内容嵌入 JavaFX 应用的 Web 组件。


    • 实现 JavaFX 与 Swing 的互操作性。


    • 从头重写媒体栈。


    JavaFX 2.0 在 2011 年的 JavaOne 大会上发布，并且由于前面阐述的创新特性，其采用率大幅提高。


    JavaFX 8 标志着另一个重要的里程碑。JavaFX 现在是 Java 平台标准版的一个组成部分。


    • 这清楚地表明 JavaFX 被认为足够成熟，并且是 Java 在客户端的未来。


    • 这极大地惠及了开发者，因为他们无需下载两个 SDK 和工具套件。


    • Java 8 中的新技术，特别是 Lambda 表达式、Stream API 和默认接口方法，在 JavaFX 中非常有用。


    • 增加了许多新特性，包括原生 3D 支持、打印 API，以及一些新控件，包括日期选择器。


    现在你已经完成了 JavaFX 的必修历史课，让我们通过向你展示一些示例、工具和其他资源的位置，离编写代码更近一步。


    准备你的 JavaFX 之旅


    所需工具


    由于 JavaFX 现在是 Java 的一部分，你无需下载单独的 JavaFX SDK。整个 JavaFX API 和实现是 Java 8 SE SDK 的一部分，可以从以下网址下载：


    [`www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)


    该 SDK 包含开发、运行和打包 JavaFX 应用所需的一切。你可以使用 Java 8 SE SDK 中包含的命令行工具编译 JavaFX 应用。


    然而，大多数开发者更喜欢集成开发环境（IDE）以提高生产力。


    根据定义，支持 Java 8 的 IDE 也支持 JavaFX 8。因此，你可以使用你最喜欢的 IDE 来开发 JavaFX 应用。在本书中，我们主要使用
    NetBeans IDE，因为它允许与 SceneBuilder（见下一段）更紧密地集成。NetBeans IDE 可以从以下网址下载：


    [`netbeans.org/downloads`](https://netbeans.org/downloads)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 16](img/index-8_1.jpg)


    第一章 ■ 快速入门 JavaFX

