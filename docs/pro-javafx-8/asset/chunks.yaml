    **Pro JavaFX 8**


    In *Pro JavaFX 8*, expert authors show you how to use the JavaFX platform to create
    rich-client Java applications. You’ll discover how you can use this powerful Java-based
    UI platform, which is capable of handling large-scale data-driven business applications
    for PC as well as mobile and embedded devices.


    Covering the JavaFX API, development tools, and best practices, this book provides
    code examples that explore the exciting new features provided with JavaFX 8 which
    comes as part of Oracle’s new Java (SE) 8 release. This book also contains engaging
    tutorials that cover virtually every facet of JavaFX development as well as reference
    materials on JavaFX that augment the JavaFX API documentation.


    After reading and using this book, you’ll have the authoritative knowledge that
    should give you an edge in your next JavaFX-based application projects for your
    job or your clients.


    **You’ll learn:**


    - How to get started with JavaFX, including downloading the SDK and available
    tools

    - How to express user interfaces with SceneBuilder and FXML

    - How to use property binding to keep the UI easily in sync with the model

    - How to use the rich set of JavaFX UI controls, charts, shapes, effects, transformations,
    and animations to create stunning, responsive, user interfaces

    - How to use the powerful JavaFX layout classes to define the user interface in
    a cross-platform fashion

    - How to leverage the observable collection classes to observe changes in, and
    bind to, Java collections

    - How to use the JavaFX media classes to play audio and video

    - How to interact with external application services to create an enterprise application
    with JavaFX

    - How to use the JavaFX API with alternative languages such as Scala and Groovy


    Shelve in Programming Languages/Java


