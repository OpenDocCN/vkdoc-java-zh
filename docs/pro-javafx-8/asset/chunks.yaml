    理解 ObservableMap


    尽管 ObservableMap 在 JavaFX 可观察集合框架层次结构中看起来与 ObservableList 等价，但实际上它并不像 ObservableList
    那样复杂。图 7-2 是一个 UML 图，展示了 ObservableMap 及其支持接口。


    ***图 7-2.** 支持 JavaFX 可观察映射的关键接口*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 7 章 ■ 集合与并发


    为避免混乱，我们在图 7-2 中省略了 java.util.Map 接口。java.util.Map 接口是 ObservableMap 的另一个超接口。ObservableMap
    接口上的以下方法允许你注册和注销 MapChangeListener：


    • addListener(MapChangeListener<? super K, ? super V> listener)


    • addListener(MapChangeListener<? super K, ? super V> listener)


    ObservableMap 上没有其他便捷方法。


    MapChangeListener 接口只有一个方法：onChange(MapChangeListener.Change<? extends K, ? extends
    V> change)。当 ObservableMap 的内容被操作时，此方法会被回调。请注意，此方法的参数类型是在 MapChangeListener 接口中声明的嵌套类
    Change。与 ListChangeListener.Change 类不同，MapChangeListener.Change 类旨在报告映射中单个键的变更。如果对
    ObservableMap 的方法调用影响了多个键，则会触发与受影响键数量相同数量的映射变更事件。


    MapChangeListener.Change 类提供了以下方法供你检查对某个键所做的变更。


    • boolean wasAdded() 如果为该键添加了新值，则返回 true。


    • boolean wasRemoved() 如果从该键移除了旧值，则返回 true。


    • K getKey() 返回受影响的键。


    • V getValueAdded() 返回为该键添加的值。


    • V getValueRemoved() 返回从该键移除的值。（注意：对现有键调用 put() 会导致旧值被移除。）


    • ObservableMap<K, V> getMap()


