    \ object type, zero for numeric types, `false` for boolean type, and the empty\
    \ string for string type.\n\n## Adapting JavaBeans Properties to JavaFX Properties\n\
    \nOver the many years since the JavaBeans specification was published, a lot of\
    \ JavaBeans were written for various projects, products, and libraries. To better\
    \ help Java developers leverage these JavaBeans, a set of adapters were provided\
    \ in the `javafx.beans.properties.adapter` package to make them useful in the\
    \ JavaFX world by creating a JavaFX property out of JavaBeans properties.\n\n\
    In this section, we first briefly review the JavaBeans specification definition\
    \ of properties, bound properties, and constrained properties by way of a simple\
    \ example. We then show you how to create JavaFX properties out of JavaBeans properties\
    \ using the adapters.\n\n### Understanding JavaBeans Properties\n\nJavaBeans *properties*\
    \ are defined using the familiar getter and setter naming convention. A property\
    \ is \"read only\" if only a getter is provided, and it is \"read/write\" if both\
    \ a getter and a setter are provided. A JavaBeans event is made up of the event\
    \ object, the event listener interface, and listener registration methods on the\
    \ JavaBean. Two particular kinds of events are available for use by JavaBeans\
    \ properties: A `PropertyChange` event can be fired when a JavaBeans property\
    \ is changed; a `VetoableChange` event can also be fired when a JavaBeans property\
    \ is changed; and if the listener throws a `PropertyVetoException`, the property\
    \ change should not take effect. A property whose setter fires `PropertyChange`\
    \ events is called a *bound property*. A property whose setter fires `VetoableChange`\
    \ events is called a *constrained property*. Helper classes `PropertyChangeSupport`\
    \ and `VetoableChangeSupport` allow bound properties and constrained properties\
    \ to be easily defined in JavaBean classes.\n\n`Listing 4-16` defines a JavaBean\
    \ `Person` with three properties: `name`, `address`, and `phoneNumber`. The `address`\
    \ property is a bound property, and the `phoneNumber` property is a constrained\
    \ property.\n\n**Listing 4-16.** `Person.java`\n\n```java\nimport java.beans.PropertyChangeListener;\n\
    import java.beans.PropertyChangeSupport;\nimport java.beans.PropertyVetoException;\n\
    import java.beans.VetoableChangeListener;\nimport java.beans.VetoableChangeSupport;\n\
    \npublic class Person {\n    private PropertyChangeSupport propertyChangeSupport;\n\
    \    private VetoableChangeSupport vetoableChangeSupport;\n    private String\
    \ name;\n    private String address;\n    private String phoneNumber;\n\n    public\
    \ Person() {\n        propertyChangeSupport = new PropertyChangeSupport(this);\n\
