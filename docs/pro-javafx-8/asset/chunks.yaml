    Chapter 4 ■ properties and Bindings


    The JavaFX Beans Specification


    For many years Java has used the JavaBeans API to represent a property of an object.
    A JavaBeans property is represented by a pair of getter and setter methods. Property
    changes are propagated to property change listeners through the firing of property
    change events in the setter code.


    JavaFX introduces the JavaFX Beans specification that adds properties support
    to Java objects through the help of the properties classes from the JavaFX properties
    and bindings framework.


    ■ **Caution** the word *property* is used here with two distinct meanings. When
    we say JavaFX Beans properties, it should be understood to mean a higher level
    concept similar to JavaBeans properties. When we say JavaFX properties and bindings
    framework properties, it should be understood to mean the various implementations
    of the Property or ReadOnlyProperty interfaces, such as IntegerProperty, StringProperty,
    and so on. JavaFX Beans properties are specified using JavaFX properties and bindings
    framework properties.


    Like their JavaBeans counterparts, *JavaFX Beans properties* are specified by
    a set of methods in a Java class. To define a JavaFX Beans property in a Java
    class, you provide three methods: the getter, the setter, and the property getter.
    For a property named height of type double, the three methods are:


    public final double getHeight();


    public final void setHeight(double h);'
