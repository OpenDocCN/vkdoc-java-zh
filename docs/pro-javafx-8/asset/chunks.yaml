- fmt: '# 使用 SceneBuilder 创建用户界面


    *给我一个足够长的杠杆和一个支点，我就能撬动地球。*

    *——阿基米德*


    `w3schools.com` CSS 教程：<http://www.w3schools.com/css>


    <http://www.it-ebooks.info/>


    ## 第 3 章


    在第 2 章中，你了解了创建 JavaFX UI 的两种方式：编程方式和声明方式，以及如何使用 JavaFX API 以编程方式创建 UI。你已经熟悉了 JavaFX
    UI 的剧场隐喻，其中`Stage`代表 Windows、Mac 或 Linux 程序中的窗口，或移动设备中的触摸屏，`Scene`及其包含的`Node`代表
    UI 的内容。在本章中，我们将探讨 JavaFX 中 UI 故事的另一面：UI 的声明式创建。


    这种 UI 设计方法的核心是`FXML`文件。它是一种专门为保存 UI 元素信息而设计的 XML 文件格式。它包含 UI 元素的“是什么”，但不包含“怎么做”。这就是为什么这种创建
    JavaFX UI 的方法被称为*声明式*。其核心，`FXML`是一种 Java 对象序列化格式，可用于任何以特定方式编写的 Java 类，包括所有旧式 JavaBean。然而，在实践中，它仅用于指定
    JavaFX UI。


    除了在文本编辑器或你喜欢的 Java 集成开发环境（IDE）中直接编辑外，`FXML`文件还可以通过一个名为 JavaFX SceneBuilder 的图形化工具进行操作，该工具专为处理`FXML`文件而设计。


    JavaFX SceneBuilder 1.0 于 2012 年 8 月发布，JavaFX SceneBuilder 1.1 于 2013 年 9 月发布。1.0
    和 1.1 版本均适用于 JavaFX 2。JavaFX SceneBuilder 2.0 于 2014 年 5 月发布，适用于 JavaFX 8。JavaFX
    SceneBuilder 2.0 的代码库已作为开源发布。JavaFX SceneBuilder 是一个完全图形化的工具，允许你从可用的容器、控件和其他可视化节点的调色板中绘制
    UI 屏幕，并通过直接在屏幕上操作以及通过属性编辑器修改其属性来进行布局。


    `FXML`文件由 JavaFX 运行时使用`FXMLLoader`类加载到 JavaFX 应用程序中。加载`FXML`文件的结果始终是一个 Java 对象，通常是一个容器`Node`，例如`Group`或`Pane`。此对象可以用作`Scene`的根节点，或作为节点附加到更大的以编程方式创建的场景图中。对于
    JavaFX 应用程序的其余部分，从`FXML`文件加载的节点与以编程方式构造的节点没有区别。


    我们将以螺旋式递进的方式，介绍关于`FXML`文件的内容和格式、它们在运行时如何加载以及在设计时如何制作的密切相关材料。我们从本章开始，通过一个完整的示例，展示第
    2 章中清单 2-1 的`StageCoach`程序如何使用`FXML`实现。然后，我们详细介绍`FXML`加载功能。接着，我们展示一系列手工制作的`FXML`文件，以突出`FXML`文件格式的所有特性。一旦你理解了`FXML`文件格式，我们将向你展示如何使用
    JavaFX SceneBuilder 创建这些`FXML`文件，涵盖 JavaFX SceneBuilder 2.0 的所有功能。


    <http://www.it-ebooks.info/>


    ![Image 37](index-84_1.jpg)


    > **注意**：你需要从 <http://www.oracle.com/technetwork/java/javase/downloads/javafxscenebuilder-info-2157684.html>
    下载并安装 Oracle 的开源 JavaFX SceneBuilder 2.0，才能完成本章中的示例。我们还强烈建议你配置你喜欢的 IDE 以使用 JavaFX
    SceneBuilder 2.0 来编辑`FXML`文件。NetBeans 和 IntelliJ IDEA 已捆绑 JavaFX 支持。Eclipse 用户可以安装`e(fx)clipse`插件。'
