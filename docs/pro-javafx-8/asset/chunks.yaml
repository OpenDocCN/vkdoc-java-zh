    The width and height of a Region are read-only properties that you can use to
    get the size after layout is complete.


    Be careful binding directly to the width and height, because any changes that
    affect the size of this node or its children will not be updated until the next
    layout cycle, causing artifacts.


    The padding property lets you set the amount of space to surround the content
    of the region during layout.


    Again, we use the snapToPixel property before to make sure the TilePane fits within
    the scene boundaries with no rounding errors. It is defined on the Region class
    and the default value of true will help reduce artifacts caused by pixel misalignment.


    The remaining properties let you override the min, max, and pref width and height
    of this Region. They are hints to the Parent about how it should allocate space,
    and default to the calculated value for this Region. Once set, these properties
    can be reset to their calculated values by giving them a value of Region.USE_COMPUTED_SIZE.
