- fmt: "# Tables\n\nBetween the extra syntactic sugar for builders or imperative Java,\
    \ and the need to specify Generic at multiple levels, building simple data tables\
    \ in Java code can be quite a lot of code. Groovy simplifies this with a fairly\
    \ intuitive builder format for creating tables, along with some conveniences,\
    \ such as a built-in type converter that lets you specify a closure to change\
    \ the output type for a field.\n\nAs a result, you can write fairly complex tables\
    \ with very little code. The following example builds from the `Person` class\
    \ that we created earlier to display a list of people in a tabular format. The\
    \ full code is shown in Listing 13-8.\n\n***Listing 13-8.*** Code Demonstrating\
    \ a Table in Groovy with Strings, ints, and Dates\n\n```\nimport groovyx.javafx.GroovyFX\n\
    import groovyx.javafx.SceneGraphBuilder\nimport binding.Person\nimport java.text.SimpleDateFormat\n\
    \ndef dateFormat = new SimpleDateFormat(\"MM/dd/yyyy\")\n\ndef persons = [\n \
    \   new Person(name: \"Ada Lovelace\", age: 36, gender: \"Female\",\n        \
    \       dob: dateFormat.parse(\"10/10/1815\")),\n    new Person(name: \"Henrietta\
    \ Swan Leavitt\", age: 53, gender: \"Female\",\n               dob: dateFormat.parse(\"\
    7/4/1868\")),\n    new Person(name: \"Grete Hermann\", age: 83, gender: \"Female\"\
    ,\n               dob: dateFormat.parse(\"3/2/1901\"))\n]\n\nGroovyFX.start {\n\
    \    new SceneGraphBuilder().stage(visible: true) {\n        scene {\n       \
    \     tableView(items: persons) {\n                tableColumn(property: \"name\"\
    , text: \"Name\", prefWidth: 160)\n                tableColumn(property: \"age\"\
    , text: \"Age\", prefWidth: 70)\n                tableColumn(property: \"gender\"\
    , text: \"Gender\", prefWidth: 90)\n                tableColumn(property: \"dob\"\
    , text: \"Birth\", prefWidth: 100,\n                            type: Date,\n\
    \                            converter: { d -> return dateFormat.format(d) })\n\
    \            }\n        }\n    }\n}\n```\n\nNotice that the code to display the\
    \ table is almost as short as the code to set up the data. The converter in the\
    \ last column to format the `Date` is a one-line operation in Groovy, but requires\
    \ a `CellValueFactory` with an implementation of a `Callback` interface, which\
    \ is several lines of Java code saved.\n\nFigure [13-8 dis](#index_split_007.html#p563)plays\
    \ the result of running this table application in Groovy.\n\n***Figure 13-8.**\
    \ Groovy Table demo with famous women in computers listed*\n\n# Layouts\n\nAnother\
    \ set of APIs that are relatively challenging to use in a declarative fashion\
    \ are the JavaFX layouts. They have a powerful constraint system that you can\
    \ use to give Nodes special layout behavior on a per-layout basis, but this also\
    \ means that adding a Node to a layout involves two steps: (1) adding it to the\
    \ container and (2) assigning constraints.\n\nThe GroovyFX APIs solve the layout\
    \ problem with a very clean solution that involves annotating the node object\
    \ with additional pseudo-properties for layout constraints. This allows you to\
    \ define the constraints as you construct the scene graph, and then during the\
    \ layout phase, the JavaFX layout system uses the constraints to control how the\
    \ Nodes are positioned and sized.\n\nListing 13-9 shows an example of one of the\
    \ more complicated layouts, `GridPaneLayout`, with the entire application written\
    \ in a declarative style.\n\n***Listing 13-9.*** Example Code of a GridPane Layout\
    \ in GroovyFX\n\n```\nimport groovyx.javafx.GroovyFX\nimport groovyx.javafx.SceneGraphBuilder\n\
    import javafx.scene.layout.GridPane\nimport javafx.scene.text.Font\n\nGroovyFX.start\
    \ {\n    def sg = new SceneGraphBuilder()\n    sg.stage(title: \"GridPane Demo\"\
    , width: 400, height: 500, visible: true) {\n        scene {\n            stackPane\
    \ {\n                imageView {\n                    image(\"puppy.jpg\", width:\
    \ 1100, height: 1100, preserveRatio: true)\n                    effect colorAdjust(brightness:\
    \ 0.6, input: gaussianBlur())\n                }\n                gridPane(hgap:\
    \ 10, vgap: 10, padding: 20) {\n                    columnConstraints(minWidth:\
    \ 60, halignment: \"right\")\n                    columnConstraints(prefWidth:\
    \ 300, hgrow: \"always\")\n                    label(\"Dog Adoption Form\", font:\
    \ new Font(24), margin: [0, 0, 10, 0],\n                          halignment:\
    \ \"center\", columnSpan: GridPane.REMAINING)\n                    label(\"Size:\
    \ \", row: 2)\n                    textField(promptText: \"approximate size in\
    \ pounds\", row: 2, column: 1)\n                    label(\"Breed:\", row: 3)\n\
    \                    textField(promptText: \"pet breed\", row: 3, column: 1)\n\
    \                    label(\"Sex:\", row: 4)\n                    choiceBox(items:\
    \ ['Male', 'Female', 'Either'], row: 4, column: 1)\n                    label(\"\
    Additional Info:\", wrapText: true, textAlignment: \"right\",\n              \
    \            row: 5, valignment: \"baseline\")\n                    textArea(prefRowCount:\
    \ 8, wrapText: true, row: 5, column: 1, vgrow: 'always')\n                   \
    \ button(\"Submit\", row: 6, column: 1, halignment: \"right\")\n             \
    \   }\n            }\n        }\n    }\n}\n```\n\nNotice that the code is succinct\
    \ and clean, and it closely models the UI that it is trying to build. The result\
    \ of running this application looks exactly like what you would expect from a\
    \ typical UI form, as shown in Figure [13-9.](#index_split_007.html#p565)\n\n\
    ***Figure 13-9.** Running Dog Adoption Form example with a Cavapoo (cross between\
    \ Cavalier King Charles Spaniel and Poodle) in the background*[3](#index_split_007.html#p565)\n\
    \n3 Public domain picture from Wikimedia Commons: [http://commons.wikimedia.org/wiki/File:Image-Cavapoo_puppy.JPG](http://commons.wikimedia.org/wiki/File:Image-Cavapoo_puppy.JPG)\n\
    \n# Scala and JavaFX\n\nScala is a powerful JVM language combining the best features\
    \ of functional and object-oriented programming in a single language. As do the\
    \ other JVM languages discussed in this chapter, it compiles source files directly\
    \ to Java bytecodes and all the existing Java language libraries commonly used\
    \ are compatible with it. However, Scala adds powerful, type-safe collections,\
    \ an elegant actor model for concurrency, and functional language features including\
    \ closures, pattern matching, and currying.\n\nScala was started by Martin Odersky\
    \ in 2001 at the École Polytechnique Fédérale de Lausanne (EPFL), and has grown\
    \ in maturity and popularity over the years. Odersky has actually been the genius\
    \ behind the scenes working on Java compilers for many years, including the Pizza\
    \ language that extended Java and GJ, which became the grandfather of the modern\
    \ Java compiler after its adoption by Sun in Java 1.3. By developing an entirely\
    \ new language on the JVM, Odersky was able to overcome several of the inherent\
    \ design limitations of Java.\n\nScala is used today in many large enterprises\
    \ such as Twitter, LinkedIn, Foursquare, and Morgan Stanley. There is also commercial\
    \ support available from the creators of the language via TypeSafe, a Scala language\
