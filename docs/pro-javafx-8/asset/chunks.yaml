    \ with the specified mesh. The mesh is available as a read-write object property.\
    \ The `Mesh` abstract class and its `TriangleMesh` concrete subclass are where\
    \ the geometric information of the 3D shape is stored. The geometric information\
    \ in a `TriangleMesh` includes:\n\n- The three-dimensional coordinates of all\
    \ the vertices, or points, of the 3D shape\n- The two-dimensional texture coordinates\
    \ used by the 3D shape\n- The faces of the 3D shape, each one a triangle with\
    \ vertices that are from the vertices list and texture coordinates that are from\
    \ the texture coordinates list\n- The face smoothing groups, which cause the JavaFX\
    \ runtime to connect faces in the same smoothing group smoothly across their common\
    \ edges, and to leave the edges between faces not in the same smoothing group\
    \ as hard edges\n\nFor efficiency reasons, the `TriangleMesh` class stores this\
    \ information in observable arrays. The following public methods allow you to\
    \ access these observable arrays and their sizes:\n\n- `ObservableFloatArray getPoints()`\n\
    - `ObservableFloatArray getTexCoords()`\n- `ObservableFaceArray getFaces()`\n\
