    GridPane


    Provides the most flexible layout container available.


    Should be used wherever components need pixel-perfect row and column alignment.


    Cannot be used to overlap components, except in conjunction with another layout.


    AnchorPane


    Highly specialized layout that can be used either for edge alignment or stretching.


    Best layout for overlapping components (passes through mouse events cleanly).


    Some use cases better accomplished with margins/padding or other constraints.


    Bringing Reversi to Life


    Up to this point we have been singularly focused on layouts, which is important
    but doesn’t make for a very interesting game. However, the beauty of using dynamic
    layouts is that with a few enhancements to the game algorithm, we can turn this
    static application into a dynamic, playable game.


    Highlighting Legal Moves


    The first step of a playable game algorithm is to make sure that pieces can be
    placed only on legal squares. Rather than simply implement an algorithm in the
    back end, we take this as an opportunity to add a feature to the application where
    it shows you all of the next available moves.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 5 ■ Building dynamiC ui layouts in JavaFX


    Going back to the Reversi game rules, a move is valid only in the following circumstances.


    • There is not already another piece at the same location.


    • The piece is placed adjacent to a piece of the opposite color, and on that same
    line, there is another piece of the same color on the opposite end that would
    allow a flip of one or more of the opposing player’s pieces.


    To start with, you need to add a legalMove function to the model class that checks
    whether the cell is empty and then verifies all eight directions around a given
    Cell:


    public BooleanBinding legalMove(int x, int y) {


    return board[x][y].isEqualTo(Owner.NONE).and(


    canFlip(x, y, 0, -1, turn).or(


    canFlip(x, y, -1, -1, turn).or(


    canFlip(x, y, -1, 0, turn).or(


    canFlip(x, y, -1, 1, turn).or(


    canFlip(x, y, 0, 1, turn).or(


    canFlip(x, y, 1, 1, turn).or(


    canFlip(x, y, 1, 0, turn).or(


    canFlip(x, y, 1, -1, turn))))))))


    );


    }


    ■ **Note** We have chosen to make all the public model functions return bindings.
    this makes it possible to use property binding to update the ui and will efficiently
    defer updates until the playing board changes.


    The canFlip method validates the second condition for the given direction indicated
    by the cellX, cellY


    arguments and the player whose turn is indicated. Because it would be more complicated
    and less efficient to use the fluent binding interface, we chose to create a custom
    binding instead.


    Creating a custom binding involves the following.


    • First override the binding class (in this case BooleanBinding) with an inner
    class.


    • To set up the bound variables, use a static initializer that calls the bind
    function for each variable on which the algorithm depends.


    • Override the computeValue method, and return the new calculated value of the
    binding.


    The basic algorithm for calculating whether this is a legal move is to check the
    first cell in the given direction to make sure it is a different color, and if
    it is, continue walking cells until you find one that is the same color. If you
    do find one that is the same color, it is a legal move with pieces to flip, but
    if the next cell is the same color or there is no opposite color piece at the
    other end, it is not a legal move.


    This means that the static initializer needs to add a property binding for every
    cell in the given direction, and the algorithm needs to use a loop to go through
    all of the cells, checking their owner, as shown in the following code.'
  trans: "\n在堆叠需要让鼠标事件穿透的节点时需格外小心。\n\n请使用节点上的 `mouseTransparent` 属性，或考虑改用 `AnchorPane`。\n\
    \n**TilePane**\n\n创建所有节点等尺寸排列的平铺效果。\n\n可通过绑定强制填充父容器（务必设置 `snapToPixel` 为 `false`）。\n\
    \n不能替代通用网格布局（参见 `GridPane`）。\n\n**GridPane**\n\n提供最灵活的布局容器。\n\n适用于需要像素级精确行列对齐的场景。\n\
    \n除非与其他布局结合使用，否则无法实现组件重叠。\n\n**AnchorPane**\n\n高度专业化的布局，可用于边缘对齐或拉伸。\n\n最适合组件重叠的布局（能干净地穿透鼠标事件）。\n\
    \n某些场景通过边距/内边距或其他约束实现效果更佳。\n\n**让黑白棋活起来**\n\n到目前为止，我们一直专注于布局——这固然重要，但不足以让游戏变得有趣。然而，动态布局的美妙之处在于，只需对游戏算法稍加改进，就能将静态应用转变为可玩的动态游戏。\n\
    \n**高亮合法落子**\n\n可玩游戏算法的第一步是确保棋子只能放置在合法格子上。我们不仅要在后端实现算法，更要借此机会为应用添加一个功能：显示所有下一步可用的落子位置。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 5 章 ■ 在 JavaFX 中构建动态 UI\
    \ 布局\n\n回到黑白棋规则，只有在以下情况下落子才合法：\n\n• 目标位置没有其他棋子。\n\n• 棋子放置在与对方棋子相邻的位置，且在同一方向上，另一端有己方棋子，从而可以翻转一个或多个对方棋子。\n\
    \n首先，需要在模型类中添加一个 `legalMove` 函数，检查格子是否为空，然后验证给定格子周围的八个方向：\n\n```java\npublic BooleanBinding\
    \ legalMove(int x, int y) {\n    return board[x][y].isEqualTo(Owner.NONE).and(\n\
    \        canFlip(x, y, 0, -1, turn).or(\n        canFlip(x, y, -1, -1, turn).or(\n\
    \        canFlip(x, y, -1, 0, turn).or(\n        canFlip(x, y, -1, 1, turn).or(\n\
    \        canFlip(x, y, 0, 1, turn).or(\n        canFlip(x, y, 1, 1, turn).or(\n\
    \        canFlip(x, y, 1, 0, turn).or(\n        canFlip(x, y, 1, -1, turn))))))))\n\
    \    );\n}\n```\n\n> **注意** 我们选择让所有公共模型函数返回绑定。这使得可以通过属性绑定更新 UI，并能在棋盘变化时高效地延迟更新。\n\
    \n`canFlip` 方法验证由 `cellX`、`cellY` 参数指定的方向以及当前回合玩家的第二个条件。由于使用流畅绑定接口会更复杂且效率较低，我们选择创建自定义绑定。\n\
    \n创建自定义绑定包括以下步骤：\n\n• 首先用内部类重写绑定类（此处为 `BooleanBinding`）。\n\n• 设置绑定变量：使用静态初始化器，为算法依赖的每个变量调用\
    \ `bind` 函数。\n\n• 重写 `computeValue` 方法，返回绑定的新计算值。\n\n判断是否为合法落子的基本算法是：检查给定方向的第一个格子，确保它是不同颜色；如果是，则继续沿格子行走，直到找到同色棋子。如果找到同色棋子，则为合法落子（可翻转棋子）；但如果下一个格子是同色，或另一端没有对方棋子，则不是合法落子。\n\
    \n这意味着静态初始化器需要为给定方向上的每个格子添加属性绑定，并且算法需要使用循环遍历所有格子，检查其所有者，如下代码所示。\n"
- fmt: "# 排版后的内容\n\n`public BooleanBinding canFlip(final int cellX, final int cellY,\
    \ final int directionX, final int directionY, final ObjectProperty<Owner> turn)\
    \ {`\n\n```\nreturn new BooleanBinding() {\n    {\n        bind(turn);\n     \
    \   int x = cellX + directionX;\n        int y = cellY + directionY;\n       \
    \ while (x >= 0 && x < BOARD_SIZE && y >= 0 && y < BOARD_SIZE) {\n           \
    \ bind(board[x][y]);\n            x += directionX;\n            y += directionY;\n\
    \        }\n    }\n\n    @Override\n    protected boolean computeValue() {\n \
    \       Owner turnVal = turn.get();\n        int x = cellX + directionX;\n   \
    \     int y = cellY + directionY;\n        boolean first = true;\n        while\
    \ (x >= 0 && x < BOARD_SIZE && y >= 0 && y < BOARD_SIZE && board[x][y].get() !=\
    \ Owner.NONE) {\n            if (board[x][y].get() == turnVal) {\n           \
    \     return !first;\n            }\n            first = false;\n            x\
    \ += directionX;\n            y += directionY;\n        }\n        return false;\n\
    \    }\n};\n```\n\nThe last step in highlighting legal moves is to wire the `legalMove`\
    \ model function up to the squares. This involves binding the style property of\
    \ the `ReversiSquare` class to the `legalMove` method (changes in bold).\n\n```\n\
    public ReversiSquare(final int x, final int y) {\n    styleProperty().bind(Bindings.when(model.legalMove(x,\
    \ y))\n        .then(\"-fx-background-color: derive(dodgerblue, -60%)\")\n   \
    \     .otherwise(\"-fx-background-color: burlywood\"));\n}\n```\n\n**Tip** The\
    \ `derive` function used is a JavaFX-specific CSS function that lets you create\
    \ a new color based on an existing one. The second parameter is brightness, which\
    \ can range from –100% (black) to 100% white.\n\nAlso, don’t forget to add in\
    \ the static model variable on which this code depends:\n\n```\nprivate static\
    \ ReversiModel model = ReversiModel.getInstance();\n```\n\nAnd also to update\
    \ the `ReversiSquare` construction in the `tiles()` method to pass in the `x`\
    \ and `y` board coordinates: `ReversiSquare square = new ReversiSquare(i, j);`\n\
    \nNow on running the application, it correctly highlights the same four moves\
    \ for black that were described in the “Board Layout and Basic Rules” section,\
    \ as shown in Figure 5-15.\n\n![Image 81](index-221_1.jpg)\n\n**Figure 5-15.**\
    \ Reversi application highlighting the available moves for black’s first turn\n\
    \n## Highlighting the Active Cell\n\nThe simplest example of board interaction\
    \ is to highlight the current cell that the user has moused over. Rather than\
    \ highlighting cells that are not playable, you can take advantage of the `legalMove()`\
    \ function you defined in the last section to highlight only cells that are active.\n\
    \nFor the highlight, we are going to use a nested `Region` with a blue stroke\
    \ to outline the cell the cursor is over.\n\nAlthough we could simply add a stroke\
    \ to our existing `Region`, creating a separate `Region` makes it easier to isolate\
    \ the highlight and animate it independently.\n\nThe highlight region can be quickly\
    \ created as a variable in the `ReversiSquare` class using CSS styling and the\
    \ builder pattern shown in Listing 5-16.\n\n**Listing 5-16.** Additions to the\
    \ `ReversiSquare` `create()` Method to Enable Highlighting\n\n```\nprivate Region\
    \ highlight = RegionBuilder.create()\n    .opacity(0)\n    .style(\"-fx-border-width:\
    \ 3; -fx-border-color: dodgerblue\")\n    .build();\n```\n\nThen to add it in\
    \ to the scenegraph, you can append the following line in the constructor.\n\n\
    ```\ngetChildren().add(highlight);\n```\n\nThe default layout of the `Region`\
    \ class simply sets children to their preferred size, but does not position them\
    \ or allow them to fill the content area. We want the highlight to match the size\
    \ of the square, therefore we need to override the layout algorithm and supply\
    \ our own. Table 5-12 lists several additional functions of `Region` that allow\
    \ us to override the layout algorithm and help with sizing and positioning of\
    \ child nodes.\n\n**Table 5-11.** Layout Functions of the `Region` Class\n\n|\
    \ Name | Access | Returns | Description |\n|------|--------|---------|-------------|\n\
    | `layoutChildren()` | Protected | Void | |"
