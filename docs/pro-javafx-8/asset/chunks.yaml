    ![Image 138](img/index-398_1.png)


    第 9 章 ■ 使用媒体类


    控制播放


    MediaPlayer 类中有三个主要方法用于控制 Media 对象的播放：play、pause 和 stop。这些方法都不接受任何参数，但它们会影响 MediaPlayer
    的 status 和 currentTime 属性。play 方法用于开始播放媒体。在媒体播放过程中，MediaPlayer 的 currentTime 属性会持续更新，以指示播放进度。由于
    currentTime 的类型是 Duration，它可以以毫秒、秒、分钟或小时为单位给出播放位置。


    pause 方法会导致播放暂停，随后调用 play 将从暂停处重新开始播放。调用 stop 方法会停止播放，并将 currentTime 变量重置为 Media
    的开头。


    当首次创建 MediaPlayer 对象时，其 status 属性被初始化为 MediaPlayer.Status.UNKNOWN。


    一旦 Media 资源开始加载且没有其他错误，状态将变为 MediaPlayer.Status.


    READY。调用 play 方法会导致 status 变量变为 MediaPlayer.Status.PLAYING。调用 stop 或 pause 会分别将状态重置为
    MediaPlayer.Status.STOPPED 或 MediaPlayer.Status.PAUSED。status 的其他可能值包括 MediaPlayer.Status.HALTED、MediaPlayer.Status.STALLED
    和 MediaPlayer.


    DISPOSED。halted 状态意味着发生了严重的不可恢复错误。一旦进入该状态，MediaPlayer 将永远不会退出 halted 状态。当媒体流在播放过程中数据耗尽，必须等待更多数据可用时，会出现
    stalled 状态。你可以随时在 MediaPlayer 上调用 play 方法，即使其状态为 UNKNOWN。在这种情况下，一旦 MediaPlayer
    进入 READY 状态，播放就会立即开始。


    当在 MediaPlayer 上调用 dispose() 方法时，会进入 MediaPlayer.DISPOSED 状态。一旦进入此状态，MediaPlayer
    的资源将被释放，并且不应再被重用。但是，此播放器中使用的 Media 和 MediaView 对象仍然可以重用。

