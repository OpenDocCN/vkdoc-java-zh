    the SwingNode class takes care of forwarding all JavaFX input and focus events
    to the embedded JComponent. Only lightweight Swing components are allowed to be
    embedded in JavaFX applications. Just like in the case for a JavaFX scene embedded
    in a Swing application, the presence of the two event dispatching threads in a
    JavaFX application with an embedded Swing component, the JavaFX Application Thread
    and the Swing EDT, warrants our attention. In particular, the requirement of performing
    JavaFX live scene manipulation in the JavaFX Application Thread and the requirement
    of performing Swing UI manipulations in the Swing EDT should be honored. In practical
    terms, this means that if you want to manipulate the Swing UI in a JavaFX event
    handler, you should send it to the Swing EDT with EventQueue.


    invokeLater(); and if you want to manipulate JavaFX Nodes in a Swing event listener
    method, you should send it to the JavaFX Application Thread with Platform.runLater().


    In this section, we turn the sample program that we have been using for this chapter
    into a JavaFX application with an embedded custom Swing component. The custom
    Swing component is a simple subclass of JComponent that draws a rectangle with
    a thick border in two different colors.


    private static class MyRectangle extends JComponent {


    private final Model model;


    public MyRectangle(Model model) {


    this.model = model;


    }


    @Override


    public void paint(Graphics g) {


    g.setColor(model.getStrokeColor());


    g.fillRect(0, 0, 200, 200);


    g.setColor(model.getFillColor());


    g.fillRect(10, 10, 180, 180);


    }


    @Override


    public Dimension getMaximumSize() {


    return new Dimension(200, 200);


    }


    }


