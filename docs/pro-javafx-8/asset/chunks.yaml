  trans: "\n这是我们新视图的第一部分。与所有自定义的 `AbstractView` 类一样，我们需要重写 `initView` 方法，以便创建并返回视图的“根”节点。均衡器视图最终会在均衡器控件上方显示实时音频频谱。`GridPane`\
