    URL. Immediately after the Media instance is created, we get a reference to its
    metadata map by calling the getMetadata method. We then attach a MapChangeListener
    to the metadata map that makes a check to see if a new key/value pair was added
    to the map.


    If so, the new key and value are passed to the handleMetadata helper method, which
    checks to see if it is a piece of metadata that we are interested in handling.
    This is the code that is shown in bold in Listing 9-8.


