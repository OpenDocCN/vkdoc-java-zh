    Understanding the **ScheduledService<V>** Abstract Class


    The ScheduledService<V> abstract class extends the Service<V> abstract class,
    and provides repeated executions of the tasks created by the service. The ScheduledService<V>
    class controls how its tasks are repeated through the following properties:


    • delay


    • period


    • backOffStrategy


    • restartOnFailure


    • maximumFailureCount


    • currentFailureCount


    • cumulativePeriod


