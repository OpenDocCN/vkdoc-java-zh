    Embedding Swing Components in JavaFX Applications


    The SwingNode class in the javafx.embed.swing package is a JavaFX Node that can
    host a Swing JComponent, and therefore allows you to embed a Swing component in
    your JavaFX application. This gives legacy Swing applications a piecemeal way
    of migrating to JavaFX. Aside from the default constructor, the only other public
    methods designed for use by application developers are a pair of getter and setter
    methods for the embedded JComponent:


    • public void setContent(JComponent)


    • public JComponent getContent()'
