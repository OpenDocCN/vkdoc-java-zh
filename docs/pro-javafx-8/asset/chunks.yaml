    ).concat(sceneRef.widthProperty().asString()));`\n\n`textSceneH.textProperty().bind(new\
    \ SimpleStringProperty(\"Scene height: \").concat(sceneRef.heightProperty().asString()));`\n\
    \n`labelStageX.textProperty().bind(new SimpleStringProperty(\"Stage x: \").concat(sceneRef.getWindow().xProperty().asString()));`\n\
    \n`labelStageY.textProperty().bind(new SimpleStringProperty(\"Stage y: \").concat(sceneRef.getWindow().yProperty().asString()));`\n\
    \n`labelStageW.textProperty().bind(new SimpleStringProperty(\"Stage width: \"\
    ).concat(sceneRef.getWindow().widthProperty().asString()));`\n\n`labelStageH.textProperty().bind(new\
    \ SimpleStringProperty(\"Stage height: \").concat(sceneRef.getWindow().heightProperty().asString()));`\n\
    \n`sceneRef.cursorProperty().bind(choiceBoxRef.getSelectionModel().selectedItemProperty());`\n\
    \n`fillVals.bind(sliderRef.valueProperty());`\n\n```java\n// When fillVals changes,\
    \ use that value as the RGB to fill the scene\nfillVals.addListener((ov, oldValue,\
    \ newValue) -> {\n    Double fillValue = fillVals.getValue() / 256.0;\n    sceneRef.setFill(new\
    \ Color(fillValue, fillValue, fillValue, 1.0));\n});\n```\n\n```java\n// When\
    \ the selected radio button changes, set the appropriate style sheet\ntoggleGrp.selectedToggleProperty().addListener((ov,\
    \ oldValue, newValue) -> {\n    String radioButtonText = ((RadioButton) toggleGrp.getSelectedToggle()).getText();\n\
    \    sceneRef.getStylesheets().clear();\n    sceneRef.getStylesheets().addAll(radioButtonText);\n\
    });\n```\n\n`stage.setTitle(\"On the Scene\");`\n\n`stage.show();`\n\n```java\n\
    // Define an unmanaged node that will display Text\nText addedTextRef = new Text(0,\
    \ -30, \"\");\naddedTextRef.setTextOrigin(VPos.TOP);\naddedTextRef.setFill(Color.BLUE);\n\
    addedTextRef.setFont(Font.font(\"Sans Serif\", FontWeight.BOLD, 16));\naddedTextRef.setManaged(false);\n\
    \n// Bind the text of the added Text node to the fill property of the Scene\n\
    addedTextRef.textProperty().bind(new SimpleStringProperty(\"Scene fill: \").concat(sceneRef.fillProperty()));\n\
    \n// Add to the Text node to the FlowPane\n((FlowPane) sceneRef.getRoot()).getChildren().add(addedTextRef);\n\
    ```\n\n## Setting the Cursor for the Scene\n\nThe cursor can be set for a given\
    \ node, for the entire scene, or for both. To do the latter, set the `cursor`\
    \ property of the `Scene` instance to one of the constant values in the `Cursor`\
    \ class, as shown in the following snippet from Listing 2-2.\n\n`sceneRef.cursorProperty().bind(choiceBoxRef.getSelectionModel().selectedItemProperty());`\n\
    \nThese cursor values can be seen by looking at the `javafx.scene.Cursor` class\
    \ in the JavaFX API docs; we’ve created a collection of these constants in Listing\
    \ 2-2.\n\n## Painting the Scene’s Background\n\nThe `Scene` class has a `fill`\
    \ property of type `javafx.scene.paint.Paint`. Looking at the JavaFX API will\
    \ reveal that the known subclasses of `Paint` are `Color`, `ImagePattern`, `LinearGradient`,\
    \ and `RadialGradient`. Therefore, a Scene’s background can be filled with solid\
    \ colors, patterns, and gradients. If you don’t set the `fill` property of the\
    \ Scene, the default color (white) will be used.\n\n> **Tip** One of the `Color`\
    \ constants is `Color.TRANSPARENT`, so you may make the Scene’s background completely\
