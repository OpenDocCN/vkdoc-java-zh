    Chapter 8 ■ Creating Charts in JavaFX


    ***Figure 8-3.** Rendering the TIOBE index in a PieChart*


    With only a limited amount of code, we can render data in a PieChart. Before we
    make modifications to this example, we explain the different parts.


    The code required for setting up the Application, the Stage, and the Scene is
    covered in Chapter 1\. A PieChart extends a Node, so we can easily add it to the
    scene graph. The first two lines of code in the start method create the PieChart,
    and add the required data to it:


    PieChart pieChart = new PieChart();


    pieChart.setData(getChartData());


    The data, which are of type ObservableList<PieChart.Data> are obtained from the
    getChartData() method and for our example, it contains static data. As the return
    type of the getChartData() method specifies, the returned data are an ObservableList
    of PieChart.Data.


    An instance of PieChart.Data, which is a nested class of PieChart, contains the
    information required to draw one slice of the pie. PieChart.Data has a constructor
    that takes the name of the slice and its value: PieChart.Data(String name, double
    value)


    We use this constructor to create data elements containing the name of a programming
    language and its score in the TIOBE index.


    new PieChart.Data("java", 17.56)


    We then add those elements to the ObservableList<PieChart.Data> we need to return.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 8 ■ Creating Charts in JavaFX


    Some Modifications


    Although the result of the simple example already looks good, we can tweak both
    the code and the rendering. First of all, the example uses two lines of code for
    creating the PieChart and populating it with data: PieChart pieChart = new PieChart();


    pieChart.setData(getChartData());


    Because PieChart has a single argument constructor as well, the preceding code
    snippets can be replaced as follows.


    PieChart pieChart = new PieChart(getChartData());


    Apart from the properties defined on the abstract Chart class, a PieChart has
    the following properties.


    BooleanProperty clockwise


    ObjectProperty<ObservableList<PieChart.Data>>data


    DoubleProperty labelLineLength


    BooleanProperty labelsVisible


    DoubleProperty startAngle


    We covered the data property in the previous section. Some of the other properties
    are demonstrated in the next code snippet. Listing 8-2 contains a modified version
    of the start() method.


    ***Listing 8-2.*** Modified Version of the PieChart Example


    public void start(Stage primaryStage) {


    PieChart pieChart = new PieChart();


    pieChart.setData(getChartData());


    pieChart.setTitle("Tiobe index");


    pieChart.setLegendSide(Side.LEFT);


    pieChart.setClockwise(false);


    pieChart.setLabelsVisible(false);


    primaryStage.setTitle("PieChart");


    StackPane root = new StackPane();


    root.getChildren().add(pieChart);


    primaryStage.setScene(new Scene(root, 400, 250));


    primaryStage.show();


    }


    Because we used the Side.LEFT field in the new code, we have to import the Side
    class in our application as well.


    This is done by adding the line


    import javafx.geometry.Side


    in the import block of the code.


    Running this modified version results in the modified output shown in Figure [8-4](#index_split_004.html#p357).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 120](index-357_1.jpg)


    Chapter 8 ■ Creating Charts in JavaFX


    ***Figure 8-4.** The output of the modified PieChart example*


    Changing a few lines of code results in output that looks very different. We go
    over the changes we made in a bit more detail. First, we added a title to the
    chart. That was done using the call


    pieChart.setTitle("Tiobe index");


    We could also have used the titleProperty:


    pieChart.titleProperty().set("Tiobe index");


    Both approaches result in the same output.


    ■ **Note** the upcoming modifications could also be done using the same patterns.
    We only document the approach with setter methods, but it is easy to replace this
    with a property-based approach.


    The next line of code in our modified example changes the location of the legend:


    pieChart.setLegendSide(Side.LEFT);


    When the legendSide is not specified, the legend is shown at the default location,
    which is below the chart. The title and the legendSide are both properties that
    belong to the abstract Chart class. As a consequence, they can be set on any chart.
    The next line in our modified example modifies a property that is specific to
    a PieChart: pieChart.setClockwise(false);'
