    上述属性声明 StageCoach.fxml 将与 Java 类 projavafx.stagecoach.ui.StageCoachController
    协同工作。fx:id 属性可以出现在每个表示 JavaFX 节点的元素中。fx:id 的值是控制器中代表该节点（在 FXML 文件加载后）的字段名称。StageCoach.fxml
    文件声明了以下 fx:id（仅显示包含 fx:id 属性的行）：


    <Group fx:id="rootGroup"


    <Rectangle fx:id="blue"


    <VBox fx:id="contentBox"


    <Text fx:id="textStageX"


    <Text fx:id="textStageY"


    <Text fx:id="textStageH"


    <Text fx:id="textStageW"


    <Text fx:id="textStageF"


    <CheckBox fx:id="checkBoxResizable"


    <CheckBox fx:id="checkBoxFullScreen"


    <HBox fx:id="titleBox">


    <Label fx:id="titleLabel"


    <TextField fx:id="titleTextField"


    <Button fx:id="toBackButton"


    <Button fx:id="toFrontButton"


    <Button fx:id="closeButton"


    因此，在 FXMLLoader 完成加载 FXML 文件后，FXML 文件中的顶层 Group 节点可以在 Java 代码中作为 StageCoachController
    类的 rootGroup 字段进行访问和操作。在此 FXML 文件中，我们为创建的所有节点都分配了 fx:id。这仅用于说明目的。如果没有理由以编程方式操作某个节点（例如静态标签的情况），则可以省略
    fx:id 属性以及控制器中对应的字段。


    为 FXML 文件中的节点提供编程访问是控制器扮演的角色之一。控制器扮演的另一个角色是提供处理来自 FXML 文件中节点的用户输入和交互事件的方法。这些事件处理器由名称以“on”开头的属性指定，例如
    onMouseDragged、onMousePressed 和 onAction。它们对应于 Node 类或其子类中的 setOnMouseDragged()、setOnMousePressed()和
    setOnAction()方法。要将事件处理器设置为控制器中的方法，请使用以“#”字符开头的方法名称作为 onMouseDragged、onMousePressed
    和 onAction 属性的值。StageCoach.fxml 文件声明了以下事件处理器（仅显示包含事件处理器的行）：


    <Group fx:id="rootGroup"


    onMouseDragged="#mouseDraggedHandler"


    onMousePressed="#mousePressedHandler"


    <Button fx:id="toBackButton"


    onAction="#toBackEventHandler"


    <Button fx:id="toFrontButton"


    onAction="#toFrontEventHandler"


    <Button fx:id="closeButton"


    onAction="#closeEventHandler"


    控制器类中的事件处理方法通常应符合 EventHandler<T>接口中单一方法的签名


    void handle(T event)


