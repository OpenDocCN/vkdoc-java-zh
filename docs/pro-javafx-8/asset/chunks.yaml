    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **致谢**


    写书通常是在业余时间完成的。我要感谢我的妻子 Kathleen 以及我们的孩子 Merlijn 和 Linde，允许我在晚上和周末时间坐在电脑前。我要感谢作者
    Jim Weaver、Weiqi Gao、Stephen Chin 和 Dean Iverson；技术审校 Mark Heckler；以及 Apress 团队对我的信任。特别感谢我的
    LodgON 同事 Joeri Sykora 和 Erwin Morrhey 在示例方面给予我的帮助。


    Oracle 的 JavaFX 团队出色地发布了 JavaFX 8。他们的努力与 Java 社区的努力相结合，使 JavaFX 成为面向越来越多客户端的优秀平台。


    ——Johan Vos


    我要感谢我的妻子龚友红，在写作过程中给予我的支持、理解和鼓励。我还要感谢作者和技术审校团队：Johan Vos、Jim Weaver、Stephen Chin、Dean
    Iverson 和 Mark Heckler，让这本书成为一个有趣的项目。我与合著者们共同感谢 Oracle 的 JavaFX 团队和 Apress 的编辑团队。


    ——Weiqi Gao


    献给我的妻子 Justine，以及女儿 Cassandra 和 Priscilla，她们在我承担所有其他责任的同时支持我撰写本书。同时，非常感谢整个作者团队，包括我们的新成员
    Johan Vos 和 Mark Heckler，他们为本书做出了超乎寻常的贡献。最后，衷心感谢 JavaFX 团队和 JVM 语言设计者，他们创造的技术将深刻改变我们未来设计和编写用户界面的方式。


    ——Stephen Chin


    我要感谢我的家人 Sondra、Alex 和 Matt，在又一个写作项目中给予我的支持和理解。是你们让这一切成为可能。我还要感谢 Jim Weaver、Stephen
    Chin、Weiqi Gao、Johan Vos 和 Mark Heckler 组成的写作和审校团队的奉献和耐心。Apress 的编辑团队一如既往地一流且极其专业。当然，如果没有
    Oracle 的 JavaFX 团队中一群才华横溢的工程师的辛勤工作，这一切都不可能实现。


    ——Dean Iverson


    献给我的妻子 Julie、女儿 Lori 和 Kelli、儿子 Marty，以及孙子 Kaleb 和 Jillian。感谢 Merrill 和 Barbara
    Bishir、Ken 和 Marilyn Prater 以及 Walter Weaver，你们是如此出色的榜样。我将本书的贡献献给 Merrill Bishir
    和 Ken Prater 的回忆。*“我将这些事告诉你们，是要叫你们在我里面有平安。在世上你们有苦难，但你们可以放心，我已经胜了世界。”（约翰福音 16:33）*


    ——Jim Weaver


    xix


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **前言**


    我清楚地记得，仿佛就在昨天：在 2007 年 JavaOne 大会上，我们站在 Moscone 中心的舞台中央发布了 JavaFX。我们承诺为 Java 构建一个世界级的客户端平台。在世界带着怀疑的目光注视下，在拥挤的客户端领域中，我们开始构建这个梦想。事后看来，这是一个相当雄心勃勃的目标。


    时光飞逝，七年过去了，随着 Java SE 8 的发布，我们在兑现这一承诺方面迈出了一大步。随着愿景的展开，我们的产品计划也随之调整，以适应不断变化的 RIA
    市场以及开发者和 Java 社区告诉我们他们正在寻找的东西。作为从 JavaFX 诞生之初就参与其中，并目睹它在过去七年中发展到当前版本的人，我的感觉就像一位父母看着蹒跚学步的孩子茁壮成长。

    '
