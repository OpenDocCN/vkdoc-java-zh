    Summary


    The JavaFX Chart API provides a number of ready-to-use implementations for different
    chart types. Each of these implementations serves a different purpose, and it
    is up to the developer to choose the most appropriate Chart.


    Modifying a Chart and tuning it for a specific application can be done by applying
    CSS rules or by using Chart-specific methods or properties.


    In case you need a more customized Chart, you can extend the abstract Chart class
    and take advantage of the existing properties on that class, or you can extend
    the abstract XYChart class if your chart requires two axes.


