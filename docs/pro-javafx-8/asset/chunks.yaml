    区分失效事件和变更事件，是为了让 JavaFX 属性和绑定框架能够支持*惰性求值*。我们通过查看示例中的三行代码来展示这一点：


    otherProperty.bind(intProperty);


    intProperty.set(7168);


    System.out.println("otherProperty.get() = " + otherProperty.get());


    当调用 `intProperty.set(7168)` 时，它会向 `otherProperty` 触发一个失效事件。收到此失效事件后，`otherProperty`
    仅记录其值不再有效这一事实。它不会立即通过查询 `intProperty` 的值来重新计算自己的值。重新计算会在稍后调用 `otherProperty.get()`
    时执行。想象一下，如果我们在前面的代码中不是只调用一次 `intProperty.set()`，而是多次调用；`otherProperty` 仍然只重新计算一次其值。


    ■ **注意** `ObservableValue` 接口并不是 `Observable` 的唯一直接子接口。`Observable` 还有另外四个直接子接口，它们位于
    `javafx.collections` 包中：`ObservableList`、`ObservableMap`、`ObservableSet` 和 `ObservableArray`，并分别对应
    `ListChangeListener`、`MapChangeListener`、`SetChangeListener` 和 `ArrayChangeListener`
    作为回调机制。这些 JavaFX 可观察集合将在第 7 章“集合与并发”中介绍。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 4 章 ■ 属性与绑定


    理解 WritableValue 接口


    这可能是整章中最简单的小节，因为 `WritableValue` 接口确实如其表面所见般简单。其目的是将 `getValue()` 和 `setValue()`
    方法注入到该接口的实现中。


    在 JavaFX 属性和绑定框架中，`WritableValue` 的所有实现类也都实现了 `ObservableValue`，因此你可以认为 `WritableValue`
    的价值仅在于提供 `setValue()` 方法。


    你已经在示例中看到了 `setValue()` 方法的工作方式。


    理解 ReadOnlyProperty 接口


    `ReadOnlyProperty` 接口向其实现中注入了两个方法。`getBean()` 方法应返回包含该 `ReadOnlyProperty` 的对象，如果它不包含在任何对象中，则返回
    `null`。`getName()` 方法应返回 `ReadOnlyProperty` 的名称，如果该 `ReadOnlyProperty` 没有名称，则返回空字符串。


    包含对象和名称提供了关于 `ReadOnlyProperty` 的*上下文*信息。属性的上下文信息在失效事件的传播或值的重新计算中不扮演任何直接角色。但是，如果提供了这些信息，它们会在一些外围计算中被考虑。


    在我们的示例中，`intProperty` 是在没有任何上下文信息的情况下构建的。如果我们使用完整的构造函数为其提供一个名称：


    intProperty = new SimpleIntegerProperty(null, "intProperty", 1024);


    输出将包含属性名称：


    intProperty = IntegerProperty [name: intProperty, value: 1024]


    理解 Property 接口


    现在我们来到了关键接口层次结构的底部。`Property` 接口的父接口包括我们迄今为止研究过的所有四个接口：`Observable`、`ObservableValue`、`ReadOnlyProperty`
    和 `WritableValue`。


    因此，它继承了所有这些接口的方法。它还提供了五个自己的方法：`void bind(ObservableValue<? extends T> observableValue);`


    `void unbind();`


    `boolean isBound();`


    `void bindBidirectional(Property<T> tProperty);`


    `void unbindBidirectional(Property<T> tProperty);`


    你在上一节的示例中已经看到了其中两个方法的工作方式：`bind()` 和 `unbind()`。


    调用 `bind()` 会在 `Property` 对象和 `ObservableValue` 参数之间创建一个*单向绑定*或依赖关系。一旦它们进入这种关系，在
    `Property` 对象上调用 `set()` 或 `setValue()` 方法将导致抛出 `RuntimeException`。在 `Property`
    对象上调用 `get()` 或 `getValue()` 方法将返回 `ObservableValue` 对象的值。当然，更改 `ObservableValue`
    对象的值将使 `Property` 对象失效。调用 `unbind()` 会释放 `Property` 对象可能存在的任何现有单向绑定。如果单向绑定生效，`isBound()`
    方法返回 `true`；否则返回 `false`。


    调用 `bindBidirectional()` 会在调用者 `Property` 和参数 `Property` 之间创建一个*双向绑定*。请注意，与接受
    `ObservableValue` 参数的 `bind()` 方法不同，`bindBidirectional()` 方法接受一个 `Property` 参数。只有两个
    `Property` 对象可以双向绑定在一起。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 4 章 ■ 属性与绑定


    一旦它们进入这种关系，在任一 `Property` 对象上调用 `set()` 或 `setValue()` 方法都会导致两个对象的值都被更新。调用 `unbindBidirectional()`
    会释放调用者和参数之间可能存在的任何现有双向绑定。清单 4-2 中的程序展示了一个简单的双向绑定工作示例。


    ***清单 4-2.*** BidirectionalBindingExample.java


    import javafx.beans.property.SimpleStringProperty;


    import javafx.beans.property.StringProperty;


    public class BidirectionalBindingExample {


    public static void main(String[] args) {


    System.out.println("Constructing two StringProperty objects.");


    StringProperty prop1 = new SimpleStringProperty("");


    StringProperty prop2 = new SimpleStringProperty("");


    System.out.println("Calling bindBidirectional.");


    prop2.bindBidirectional(prop1);


    System.out.println("prop1.isBound() = " + prop1.isBound());


    System.out.println("prop2.isBound() = " + prop2.isBound());


    System.out.println("Calling prop1.set(\"prop1 says: Hi!\")");


    prop1.set("prop1 says: Hi!");


    System.out.println("prop2.get() returned:");


    System.out.println(prop2.get());


    System.out.println("Calling prop2.set(prop2.get() + \"\\nprop2 says: Bye!\")");
    prop2.set(prop2.get() + "\nprop2 says: Bye!");


    System.out.println("prop1.get() returned:");


    System.out.println(prop1.get());


    }


    }


    在这个例子中，我们创建了两个名为 `prop1` 和 `prop2` 的 `SimpleStringProperty` 对象，在它们之间创建了一个双向绑定，然后对两个属性都调用了
    `set()` 和 `get()` 方法。


    当我们运行清单 4-2 中的程序时，控制台会打印以下输出：


    Constructing two StringProperty objects.


    Calling bindBidirectional.


    prop1.isBound() = false


    prop2.isBound() = false


    Calling prop1.set("prop1 says: Hi!")


    prop2.get() returned:


    prop1 says: Hi!


    Calling prop2.set(prop2.get() + "\nprop2 says: Bye!")


    prop1.get() returned:


    prop1 says: Hi!


    prop2 says: Bye!


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 4 章 ■ 属性与绑定


    ■ **警告** 每个 `Property` 对象一次最多只能有一个活动的单向绑定。它可以拥有任意数量的双向绑定。`isBound()` 方法仅适用于单向绑定。在单向绑定已经生效的情况下，使用不同的
    `ObservableValue` 参数第二次调用 `bind()` 将解除现有绑定并用新绑定替换它。


    理解 Binding 接口


    `Binding` 接口定义了四个方法，揭示了该接口的意图。一个 `Binding` 对象是一个 `ObservableValue`，其有效性可以通过 `isValid()`
    方法查询，并通过 `invalidate()` 方法设置。


    它有一个依赖项列表，可以通过 `getDependencies()` 方法获取。最后，`dispose()` 方法表示该绑定将不再被使用，并且其使用的资源可以被清理。

