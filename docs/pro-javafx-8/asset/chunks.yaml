  raw: 'The getFaceSmoothingGroups() method returns an ObservableIntegerArray, which
    you can use to define smoothing groups for the faces of the 3D shape. You can
    leave this array empty, in which case the JavaFX runtime will consider all faces
    of the 3D shape as belonging to one and the same smoothing group, resulting in
    a 3D shape with a surface that is smooth everywhere. Such is the case for the
    underlying TriangleMesh of the Sphere predefined 3D shape. If you fill this array,
    then you must fill it with the same number of elements as there are conceptual
    faces, which is one-sixth of the length of the actual faces array because we consider
    six int elements from the actual faces array as constituting one conceptual face.
    Each element in the face smoothing group array represents one face of the 3D shape,
    and two faces belong to the same smoothing group if and only if their representations
    share a common on bit when each int value is viewed as 32 individual bits. There
    could be at most 32 face smoothing groups in a TriangleMesh.


    The getPointElementSize() method always returns 3\. The getTexCoordElementSize()
    method always returns 2\. The getFaceElementSize() method always returns 6.


    Each face in a 3D shape has two sides. In 3D graphics programming, it is important
    to distinguish these two sides as either the front side or the back side. JavaFX
    3D uses the counterclockwise winding order to define the front side. Imagine yourself
    standing on one side of the triangle, and trace the edges of the triangle according
    to the order in which each vertex appears in the definition of the face. If it
    appears that you are tracing the edges in a counterclockwise fashion, then you
    are standing on the front side of the face. This concept of front side and back
    side of faces is what CullFace.FRONT and CullFace.BACK enum declarators refer
    to. By default, Shape3D uses the CullFace.BACK setting, which means the back sides
    of faces are not rendered.


    The program in Listing 10-4 illustrates the use of a user-defined 3D shape in
    JavaFX.


