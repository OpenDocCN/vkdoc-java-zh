    HTMLEditor 控件允许用户编辑富文本，其底层数据以 HTML 表示。正如你在练习的第 32 步中所体验到的，图 6-12 con 所示的 HTMLEditor
    包含多个用于编辑文本的工具以及编辑区域本身。

