    Summary


    Congratulations! You gained a lot of experience with the UI controls in JavaFX.


    • You tried out most of the JavaFX UI controls in the context of the StarterApp
    program, which also serves as starting point from which you can modify and create
    an application.


    • You explored code examples and explanations for these JavaFX UI controls.


    Resources


    For some additional information using JavaFX UI controls, consult the following
    resource.


    • *Using JavaFX UI Controls*, developed by Oracle:


    [http://docs.oracle.com/javase/8/javafx/user-interface-tutorial/ui_controls.htm](http://docs.oracle.com/javase/8/javafx/user-interface-tutorial/ui_controls.htm)


