    创建每个按钮时，也会创建一个新的 `EventHandler`，用于播放该按钮对应的 `AudioClip`。`EventHandler` 中的 `play`
    方法使用音量、速率和平衡滑块的当前值作为参数。`play` 方法的最后两个参数设置为零，但这两个参数可用于指定播放 `AudioClip` 时的声像和优先级。我们将在下一节讨论这两个属性。


    AudioClip 总结


    在前面的示例中，我们没有展示 `AudioClip` 的两个属性：声像（pan）和优先级（priority）。`pan` 属性允许你移动剪辑的中心。将其设置为
    –1.0 会将剪辑完全移至左声道，设置为 1.0 则完全移至右声道。默认设置 0.0 保持剪辑的原始状态。与仅调整左右声道相对音量的 `balance` 属性不同，`pan`
    属性实际上会重新混合两个声道。这允许你将左声道的部分或全部内容引入右声道，反之亦然。只有在左右声道不同的真实立体声效果上使用 `pan` 属性才有意义。在单声道声音上设置
    `pan` 与调整 `balance` 的效果完全相同，而 `balance` 的计算成本要低得多。你可以使用 `setPan` 和 `getPan` 方法设置或检索剪辑当前的声像设置，该属性通过
    `panProperty` 方法暴露。

