    \n---\n\n## 第7章 集合与并发\n\n*当你了解一件事时，要承认你了解它；当你不了解一件事时，要承认你不了解它——这就是知识。*\n——孔子\n\
    \n在快速探索了第5章的JavaFX布局和第6章的JavaFX UI控件之后，本章我们将重新关注JavaFX的一些底层功能。\n\n回顾第4章，您学习了`Observable`接口及其子接口`ObservableValue`。在本章中，我们将研究`Observable`的其他四个子接口——`ObservableList`、`ObservableMap`、`ObservableSet`和`ObservableArray`，从而完整介绍`Observable`接口和类家族。\n\
