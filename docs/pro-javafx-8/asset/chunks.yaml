- fmt: "# 利用绑定实现UI组件对齐\n\n绑定的另一个强大用途是通过绑定组件的位置和大小来保持UI组件的对齐。这种技术可用于将组件对齐到窗口边缘、保持节点之间的相对对齐，或者将它们居中在容器内——这正是本示例要展示的内容。\n\
    \n要实现这一点，您需要结合使用`Node`类的几个属性和方法以及绑定。在创建绑定布局时，需要使用的常见`Node`成员列于表[5-1](#index_split_002.html#p195)中。\n\
    \n为了演示，清单5-2是一个简单的代码示例，展示了如何在场景（`Scene`）中将“JavaFX Reversi”标题居中。\n\n***表5-1.**\
    \ 绑定布局中常用的Node变量*\n\n| 访问名称 | 类型/返回值 | 描述 |\n| --- | --- | --- |\n| `public` |\
    \ `layoutXProperty` | `DoubleProperty` | 用于布局定位的`Node`水平偏移量 |\n| `public` | `layoutYProperty`\
    \ | `DoubleProperty` | 用于布局定位的`Node`垂直偏移量 |\n| `public` | `prefWidth(double)`\
