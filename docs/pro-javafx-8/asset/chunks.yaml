- fmt: "When a `SwingNode` that contains a `JComponent` is attached to a live JavaFX\
    \ scene, the `SwingNode` class takes care of forwarding all JavaFX input and focus\
    \ events to the embedded `JComponent`. Only lightweight Swing components are allowed\
    \ to be embedded in JavaFX applications.\n\nJust like in the case for a JavaFX\
    \ scene embedded in a Swing application, the presence of the two event dispatching\
    \ threads in a JavaFX application with an embedded Swing component—the JavaFX\
    \ Application Thread and the Swing EDT—warrants our attention. In particular,\
    \ the requirement of performing JavaFX live scene manipulation in the JavaFX Application\
    \ Thread and the requirement of performing Swing UI manipulations in the Swing\
    \ EDT should be honored. In practical terms, this means that if you want to manipulate\
    \ the Swing UI in a JavaFX event handler, you should send it to the Swing EDT\
    \ with `EventQueue.invokeLater()`; and if you want to manipulate JavaFX Nodes\
    \ in a Swing event listener method, you should send it to the JavaFX Application\
    \ Thread with `Platform.runLater()`.\n\nIn this section, we turn the sample program\
    \ that we have been using for this chapter into a JavaFX application with an embedded\
    \ custom Swing component. The custom Swing component is a simple subclass of `JComponent`\
    \ that draws a rectangle with a thick border in two different colors.\n\n```java\n\
    private static class MyRectangle extends JComponent {\n    private final Model\
    \ model;\n\n    public MyRectangle(Model model) {\n        this.model = model;\n\
    \    }\n\n    @Override\n    public void paint(Graphics g) {\n        g.setColor(model.getStrokeColor());\n\
    \        g.fillRect(0, 0, 200, 200);\n        g.setColor(model.getFillColor());\n\
    \        g.fillRect(10, 10, 180, 180);\n    }\n\n    @Override\n    public Dimension\
    \ getMaximumSize() {\n        return new Dimension(200, 200);\n    }\n}\n```\n\
    \nThe current implementation of `SwingNode` lacks the ability to respond well\
    \ to its JavaFX container Nodes layout requests. We extend it so that the layout\
    \ of the application is improved:\n\n```java\nprivate static class MySwingNode\
    \ extends SwingNode {\n    @Override\n    public double minWidth(double height)\
    \ {\n        return 250;\n    }\n\n    @Override\n    public double minHeight(double\
    \ width) {\n        return 200;\n    }\n}\n```\n\nWhen the two JavaFX buttons\
    \ are clicked, we invoke code that alters the state of the Swing component `MyRectangle`\
    \ in a `Runnable` represented as a lambda expression through `EventQueue.invokeLater()`:\n\
    \n```java\nview.changeFillButton.setOnAction(actionEvent -> {\n    EventQueue.invokeLater(()\
    \ -> {\n        final java.awt.Color fillColor = model.getFillColor();\n     \
    \   if (fillColor.equals(java.awt.Color.LIGHT_GRAY)) {\n            model.setFillColor(java.awt.Color.GRAY);\n\
    \        } else {\n            model.setFillColor(java.awt.Color.LIGHT_GRAY);\n\
    \        }\n        view.canvas.repaint();\n    });\n});\n```\n\n> **Note:** The\
    \ `repaint()` method is actually one of the rare Swing UI methods that can be\
    \ called from any thread, not just the Swing EDT. Our use of `EventQueue.invokeLater()`\
    \ is for illustration purposes only.\n\nWhen the mouse hovers over the `MyRectangle`,\
    \ we update a JavaFX `Label` by updating a `StringProperty` named `mouseLocation`\
    \ in our `Model` class that the `textProperty` of the `Label` binds to:\n\n```java\n\
    canvas.addMouseMotionListener(new MouseMotionListener() {\n    @Override\n   \
    \ public void mouseDragged(MouseEvent e) {\n    }\n\n    @Override\n    public\
    \ void mouseMoved(MouseEvent e) {\n        Platform.runLater(() -> {\n       \
    \     model.setMouseLocation(\"(\" + e.getX() + \", \" + e.getY() + \")\");\n\
    \        });\n    }\n});\n\nswingNode.setContent(canvas);\n```\n\nThe complete\
    \ Swing component in JavaFX example application is shown in **Listing 7-15**.\n\
