  trans: '

    SceneBuilder 是一款独立工具，可让你通过设计而非编码来创建 JavaFX 界面。我们将在第 3 章讨论 SceneBuilder。尽管 SceneBuilder
    生成的是 FXML（我们也会在第 3 章讨论 FXML），且 FXML 可用于任何 IDE，但 NetBeans 提供了与 SceneBuilder 的紧密集成。SceneBuilder
    工具可从 [`www.oracle.com/technetwork/java/javase/downloads/sb2download-2177776.html`](http://www.oracle.com/technetwork/java/javase/downloads/sb2download-2177776.html)
    下载。


    JavaFX 社区


    JavaFX 并非一个在秘密基地中开发的闭源项目。恰恰相反，JavaFX 以开放精神进行开发，拥有开放的源代码库、开放的邮件列表，以及一个开放且活跃的知识共享社区。


    其源代码在 OpenJFX 项目中开发，而 OpenJFX 是开发 Java SE 的 OpenJDK 项目的一个子项目。如果你想查看源代码或架构，或者想阅读邮件列表中的技术讨论，请访问
    [`openjdk.java.net/projects/openjfx`](http://openjdk.java.net/projects/openjfx)。


    开发者社区非常活跃，无论是在 OpenJFX 领域还是在特定应用领域。开发者的起点是 JavaFX 社区网站 [`javafxcommunity.com`](http://javafxcommunity.com/)。这是一个由
    Oracle 创建，但吸纳了许多 JavaFX 开发者意见的社区网站。JavaFX 社区的内容经常更新，图 1-2 展示了该社区网站在撰写本书时的快照。


    ***图 1-2.** JavaFX 社区网站快照*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 1 章 ■ 快速入门 JavaFX


    此外，由 JavaFX 工程师和开发者维护的博客是获取 JavaFX 最新技术信息的绝佳资源。例如，Oracle JavaFX 工程师 Richard Bair、Jasper
    Potts 和 Jonathan Giles 在 [`fxexperience.com`](http://fxexperience.com/) 上向开发者社区通报
    JavaFX 的最新创新。本章末尾的“资源”部分包含了本书作者用于与 JavaFX 开发者社区互动的博客网址。


    JavaFX 社区的两个重要特点是其自身的创造力和分享意愿。有许多开源项目为 JavaFX 平台带来了附加价值。由于 JavaFX 平台工程师与外部 JavaFX
    开发者之间的良好合作，这些开源项目与官方 JavaFX 平台非常契合。


    以下列出了一些最有趣的项目：


    • RoboVM 允许你使用 Java 和 JavaFX 创建 iOS 应用程序。因此，你的 JavaFX 应用可用于为 iPhone 或 iPad 创建应用。


    • JavaFX-Android 项目维护了一个用于 Android 开发的 JavaFX SDK。因此，你的 JavaFX 应用可用于为 Android
    设备创建应用。


    JavaFX 的 iOS 和 Android 移植版将在第 12 章中详细讨论。


    • [JFXtras.org](https://JFXtras.org) 是一个致力于为 JavaFX 平台添加高质量控件和附加组件的项目。


    • ControlsFX 是另一个为 JavaFX 平台添加高质量控件和工具的项目。


    值得一提的是，JavaFX 团队密切关注着 JFXtras.org 和 ControlsFX 这两个项目的努力，其中一个项目中启动的想法可能会被纳入 JavaFX
    的下一个版本中。


    • DataFX 是一个开源项目，旨在简化 JavaFX 应用中外部数据的检索，并为 JavaFX 开发者提供注入和流程管理等企业级功能。


    • OpenDolphin 是另一个帮助开发者分离和同步客户端与服务器开发的项目，它实现了最高程度的模型-视图-控制器分离。


    花几分钟时间探索这些网站。接下来，我们将指出一些更有价值的资源，它们会很有帮助。


    使用官方规范


    在开发 JavaFX 应用时，能够访问 API JavaDoc 文档非常有用，该文档位于 [`download.java.net/jdk8/jfxdocs/index.html`](http://download.java.net/jdk8/jfxdocs/index.html)，如图
    1-3 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 17](img/index-10_1.jpg)


    第 1 章 ■ 快速入门 JavaFX


    ***图 1-3.** JavaFX SDK API Javadoc*


    例如，图 1-3 中的 API 文档展示了如何使用位于 `javafx.scene.shape` 包中的 `Rectangle` 类。向下滚动此网页，可以查看关于
    `Rectangle` 类的属性、构造函数、方法以及其他有用信息。顺便提一下，此 API 文档在你下载的 Java 8 SE SDK 中也有提供，但我们希望你也知道如何在线找到它。


    除了 JavaDoc 之外，手边备一份层叠样式表（CSS）样式参考也非常有用。


    这份文档解释了可以应用于特定 JavaFX 元素的所有样式类。你可以在 [`download.java.net/jdk8/jfxdocs/javafx/scene/doc-files/cssref.html`](http://download.java.net/jdk8/jfxdocs/javafx/scene/doc-files/cssref.html)
    找到这份文档。


    ScenicView


    你已经下载了 SceneBuilder，这是一款允许你通过设计而非编写代码来创建用户界面的工具。我们预计会有更多由公司和个人开发的工具来帮助你创建 JavaFX
    应用。最早免费提供且对调试 JavaFX 应用非常有帮助的工具之一是 ScenicView，它最初由 Oracle 的 Amy Fowler 创建，后来由
    Jonathan Giles 维护。你可以从 [`fxexperience.com/scenic-view/`](http://fxexperience.com/scenic-view/)
    下载 ScenicView。


    ScenicView 特别有用，因为它提供了一个便捷的用户界面，允许开发者在运行时检查节点（例如尺寸、变换、CSS）的属性。


    打包与分发


    用于向最终用户交付软件的技术一直在变化。过去，交付 Java 应用的首选方式是通过 Java 网络启动协议（JNLP）。通过这种方式，小程序和独立应用都可以安装在客户端上。然而，这种技术存在一些问题。该想法仅在最终用户安装了能够执行应用的
    JVM 时才有效，但这并非总是如此。即使在桌面领域，系统可以预装 JVM 交付，也存在版本控制和安全性问题。事实上，有些应用是硬编码针对特定 JVM 版本的。尽管
    JVM 中的漏洞在大多数情况下修复得非常快，但这仍然要求最终用户始终安装最新版本的 JVM，这可能会相当令人沮丧。


    除此之外，浏览器制造商越来越不愿意支持替代的嵌入式平台。总之，依赖浏览器和本地预装的 JVM 并不能提供最佳的最终用户体验。


    客户端软件行业正越来越多地向所谓的“应用商店”转变。在这种概念中，可以下载和安装自包含的应用。它们不依赖于预装的执行环境。这一原则起源于移动领域，其中苹果的
    AppStore 和安卓的 Play 商店引领市场。尤其是在这些市场中，一键安装相比本地下载、解压、手动配置等噩梦具有巨大优势。

    '
- fmt: '# Java Terminology and Self-Contained Applications


    In Java terminology, a self-contained application means that the application is
    bundled together with a JVM that is capable of running the application. In the
    past, this idea was often rejected because it made the application bundle too
    big. However, with increasing memory and storage capacities, and with decreasing
    costs of sending bytes over the Internet, this disadvantage is becoming less relevant.


    There are a number of technologies being developed currently that help you bundle
    your application with the correct JVM version and package it.


    The `JavaFXPackager`, which is developed inside the OpenJFX project area, contains
    an API for creating self-contained bundles. This tool is used by NetBeans, and
    it can be used to generate self-contained bundles with just a few clicks.


    Users of Maven can use a Maven plug-in created by Daniel Zwolenski. This plug-in,
    which is documented at [http://zenjava.com/javafx/maven/](http://zenjava.com/javafx/maven/),
    allows the creation of JavaFX self-contained bundles using familiar Maven commands.


    Now that you have the tools installed, we show you how to create a simple JavaFX
    program, and then we walk through it in detail. The first program that we’ve chosen
    for you is called “Hello Earthrise,” which demonstrates more features than the
    typical beginning “Hello World” program.


    ## Developing Your First JavaFX Program: Hello Earthrise


    On Christmas Eve in 1968 the crew of Apollo 8 entered lunar orbit for the first
    time in history. They were the first humans to witness an “Earthrise,” taking
    the magnificent picture shown in Figure [1-4](#index_split_000.html#p11). This
    image is dynamically loaded from this book’s web site when the program starts,
    so you’ll need to be connected to the Internet to view it.


    ***Figure 1-4.** The Hello Earthrise program*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    In addition to demonstrating how to dynamically load images over the Internet,
    this example shows you how to use animation in JavaFX. Now it’s time for you to
    compile and run the program. We show you two ways to do this: from the command
    line and using NetBeans.


    ### Compiling and Running from the Command Line


    We usually use an IDE to build and run JavaFX programs, but to take all of the
    mystery out of the process we use the command-line tools first.


    **Note:** For this exercise, as with most others in the book, you need the source
    code. If you prefer not to type the source code into a text editor, you can obtain
    the source code for all of the examples in this book from the code download site.
    See the resources section at the end of this chapter for the location of this
    site.


    Assuming that you’ve downloaded and extracted the source code for this book into
    a directory, follow the directions in this exercise, performing all of the steps
    as instructed. We dissect the source code after the exercise.


    #### Compiling and Running the Hello Earthrise Program from the Command Line


    You’ll use the `javac` and `java` command-line tools to compile and run the program
    in this exercise. From the command-line prompt on your machine:


    1. Navigate to the `Chapter01/Hello` directory.

    2. Execute the following command to compile the `HelloEarthRiseMain.java` file:


    ```

    javac -d . HelloEarthRiseMain.java

    ```


    3. Because the `-d` option was used in this command, the class files generated
    are placed in directories matching the package statements in the source files.
    The roots of those directories are specified by the argument given for the `-d`
    option, in this case the current directory.

    4. To run the program, execute the following command. Note that we use the fully
    qualified name of the class that will be executed, which entails specifying the
    nodes of the path name and the name of the class, all separated by periods:


    ```

    java projavafx.helloearthrise.ui.HelloEarthRiseMain

    ```


    The program should appear as shown in Figure [1-4](#index_split_000.html#p11)
    earlier, with the text scrolling slowly upward, reminiscent of the *Star Wars*
    opening crawls.'
