    linear fashion over the one-second duration. Other Interpolation constants include
    EASE_IN, EASE_OUT, and EASE_BOTH. These cause the interpolation in a KeyFrame
    to be slower in the beginning, ending, or both, respectively.


    The following are the other Timeline properties, inherited from the Animation
    class, used in this example:


