  raw: 'Tables


    Between the extra syntactic sugar for builders or imperative Java, and the need
    to specify Generic at multiple levels, building simple data tables in Java code
    can be quite a lot of code. Groovy simplifies this with a fairly intuitive builder
    format for creating tables, along with some conveniences, such as a built-in type
    converter that lets you specify a closure to change the output type for a field.


    As a result, you can write fairly complex tables with very little code. The following
    example builds from the Person class that we created earlier to display a list
    of people in a tabular format. The full code is shown in Listing 13-8.


    ***Listing 13-8.*** Code Demonstrating a Table in Groovy with Strings, ints, and
    Dates import groovyx.javafx.GroovyFX


    import groovyx.javafx.SceneGraphBuilder


    import binding.Person


    import java.text.SimpleDateFormat


    def dateFormat = new SimpleDateFormat("MM/dd/yyyy")


    def persons = [


    new Person(name: "Ada Lovelace", age: 36, gender: "Female",


    dob: dateFormat.parse("10/10/1815")),


    new Person(name: "Henrietta Swan Leavitt", age: 53, gender: "Female",


    dob: dateFormat.parse("7/4/1868")),


    new Person(name: "Grete Hermann", age: 83, gender: "Female",


    dob: dateFormat.parse("3/2/1901"))


    ]


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 192](index-563_1.jpg)


    Chapter 13 ■ JavaFX Languages and Markup


    GroovyFX.start {


    new SceneGraphBuilder().stage(visible: true) {


    scene {


    tableView(items: persons) {


    tableColumn(property: "name", text: "Name", prefWidth: 160)


    tableColumn(property: "age", text: "Age", prefWidth: 70)


    tableColumn(property: "gender", text: "Gender", prefWidth: 90)


    tableColumn(property: "dob", text: "Birth", prefWidth: 100,


    type: Date,


    converter: { d -> return dateFormat.format(d) })


    }


    }


    }


    }


    Notice that the code to display the table is almost as short as the code to set
    up the data. The converter in the last column to format the Date is a one-line
    operation in Groovy, but requires a CellValueFactory with an implementation of
    a Callback interface, which is several lines of Java code saved.


    Figure [13-8 dis](#index_split_007.html#p563)plays the result of running this
    table application in Groovy.


    ***Figure 13-8.** Groovy Table demo with famous women in computers listed*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 13 ■ JavaFX Languages and Markup


    Layouts


    Another set of APIs that are relatively challenging to use in a declarative fashion
    are the JavaFX layouts. They have a powerful constraint system that you can use
    to give Nodes special layout behavior on a per-layout basis, but this also means
    that adding a Node to a layout involves two steps: (1) adding it to the container
    and (2) assigning constraints.


    The GroovyFX APIs solve the layout problem with a very clean solution that involves
    annotating the node object with additional pseudo-properties for layout constraints.
    This allows you to define the constraints as you construct the scene graph, and
    then during the layout phase, the JavaFX layout system uses the constraints to
    control how the Nodes are positioned and sized.


    Listing 13-9 shows an example of one of the more complicated layouts, GridPaneLayout,
    with the entire application written in a declarative style.


    ***Listing 13-9.*** Example Code of a GridPane Layout in GroovyFX


    import groovyx.javafx.GroovyFX


    import groovyx.javafx.SceneGraphBuilder


    import javafx.scene.layout.GridPane


    import javafx.scene.text.Font


    GroovyFX.start {


    def sg = new SceneGraphBuilder()


    sg.stage(title: "GridPane Demo", width: 400, height: 500, visible: true) {


    scene {


    stackPane {


    imageView {


    image("puppy.jpg", width: 1100, height: 1100, preserveRatio: true)


    effect colorAdjust(brightness: 0.6, input: gaussianBlur())


    }


    gridPane(hgap: 10, vgap: 10, padding: 20) {


    columnConstraints(minWidth: 60, halignment: "right")


    columnConstraints(prefWidth: 300, hgrow: "always")


    label("Dog Adoption Form", font: new Font(24), margin: [0, 0, 10, 0],


    halignment: "center", columnSpan: GridPane.REMAINING)


    label("Size: ", row: 2)


    textField(promptText: "approximate size in pounds", row: 2, column: 1)


    label("Breed:", row: 3)


    textField(promptText: "pet breed", row: 3, column: 1)


    label("Sex:", row: 4)


    choiceBox(items: [''Male'', ''Female'', ''Either''], row: 4, column: 1)


    label("Additional Info:", wrapText: true, textAlignment: "right",


    row: 5, valignment: "baseline")


    textArea(prefRowCount: 8, wrapText: true, row: 5, column: 1, vgrow: ''always'')


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 193](index-565_1.jpg)


    Chapter 13 ■ JavaFX Languages and Markup


    button("Submit", row: 6, column: 1, halignment: "right")


    }


    }


    }


    }


    }


    Notice that the code is succinct and clean, and it closely models the UI that
    it is trying to build. The result of running this application looks exactly like
    what you would expect from a typical UI form, as shown in Figure [13-9.](#index_split_007.html#p565)


    ***Figure 13-9.** Running Dog Adoption Form example with a Cavapoo (cross between
    Cavalier King Charles Spaniel and* *Poodle) in the background*[3](#index_split_007.html#p565)


    3PublicdomainpicturefromWikimediaCommons:[http://commons.wikimedia.org/wiki/File:Image-Cavapoo_puppy.JPG](http://commons.wikimedia.org/wiki/File:Image-Cavapoo_puppy.JPG)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 13 ■ JavaFX Languages and Markup


    Scala and JavaFX


    Scala is a powerful JVM language combining the best features of functional and
    object-oriented programming in a single language. As do the other JVM languages
    discussed in this chapter, it compiles source files directly to Java bytecodes
    and all the existing Java language libraries commonly used are compatible with
    it. However, Scala adds powerful, type-safe collections, an elegant actor model
    for concurrency, and functional language features including closures, pattern
    matching, and currying.


    Scala was started by Martin Odersky in 2001 at the École Polytechnique Fédérale
    de Lausanne (EPFL), and has grown in maturity and popularity over the years. Odersky
    has actually been the genius behind the scenes working on Java compilers for many
    years, including the Pizza language that extended Java and GJ, which became the
    grandfather of the modern Java compiler after its adoption by Sun in Java 1.3\.
    By developing an entirely new language on the JVM, Odersky was able to overcome
    several of the inherent design limitations of Java.


    Scala is used today in many large enterprises such as Twitter, LinkedIn, Foursquare,
    and Morgan Stanley. There is also commercial support available from the creators
    of the language via TypeSafe, a Scala language company. Also, Scala has been hailed
    as the successor to Java by James Gosling, the father of Java; James Strachan,
    creator of Groovy; and Charles Nutter, JRuby Core Developer, among others. With
    all this support behind the Scala language, it makes a great candidate for also
    providing superior APIs for JavaFX development!


    Although you can code in Scala directly against the JavaFX APIs, the end result
    will look very similar to the Java code we have been writing up to this point
    and will be unable to take full advantage of the language. The ScalaFX


    project was started to provide a more Scala-friendly API for doing JavaFX development
    and is what we use in all the examples throughout this book.


    ScalaFX is an open source project created by Stephen Chin, one of the authors
    of this book, and has numerous additional contributors who have helped with the
    design and testing of the library. It is very similar to the GroovyFX


    library described earlier in this chapter, because it is also an open source library
    that constitutes a bridge between a JVM language and the JavaFX APIs. However,
    ScalaFX is different in that it prioritizes type safety and consistent semantics,
    which is in keeping with the spirit of the design goals of the Scala language.'
