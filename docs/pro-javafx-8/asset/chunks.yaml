    We will go into details of how to use JavaFX SceneBuilder in the latter half of
    this chapter. For now, simply observe the major functional areas of the tool.
    In the middle is the Content Panel showing the look of the UI being worked on.
    On the left side are the Library Panel at the top, which includes all the possible
    nodes that can be used in the Content Panel divided into neat subsets such as
    Containers, Controls, Shapes, Charts, and so on, and the Document Panel below,
    which shows the scene graph that is being worked on in the Content Panel as a
    tree structure 80


