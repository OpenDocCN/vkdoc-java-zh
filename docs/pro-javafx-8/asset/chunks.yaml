    \ IDE 的 XML 文件编辑功能，将 `FXML` 文件作为 XML 文件进行编辑。\n\n## 使用 FXML 设置舞台\n\n将第 2 章中的 `StageCoach`\
    \ 程序从使用程序化创建的 UI 转换为使用声明式创建的 UI 的过程非常直接。\n\n## 使用 JavaFX SceneBuilder 以图形方式创建用户界面\n\
    \n我们首先使用 JavaFX SceneBuilder 创建了一个 `FXML` 文件，该文件代表了场景的根节点。图 3-1 显示了正在创建此 UI 时的屏幕截图。\n\
    \n**图 3-1.** 在 JavaFX SceneBuilder 中创建的 `StageCoach.fxml`\n\n我们将在本章后半部分详细介绍如何使用\
