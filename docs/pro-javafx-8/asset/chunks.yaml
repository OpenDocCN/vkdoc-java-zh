    Chapter 9 ■ Using the Media Classes


    MediaView and Effects


    All of the normal effects that can be applied to a Node can also be applied to
    a MediaView. Some care must be taken to ensure that the effects are not so expensive
    as to interfere with the smooth playback of the movie. With that caveat in place,
    we go over some of the effects that are commonly in use with media player applications.
    Reflections (see javafx.scene.effect.Reflection) are a popular effect, specifically
    in demos that are meant to show off a platform’s graphical horsepower. A reflection
    can make the movie look as if it is sitting on a shiny surface. The effect is
    very compelling because the reflection is updated in real time to match the movie.
    JavaFX’s ColorAdjust effect can be used to alter the colors in the movie for a
    fun and visually interesting effect. If you’re in a more artsy kind of mood, the
    SepiaTone effect might be just the thing. And, of course, there is the old reliable
    DropShadow effect to make the movie look as if it is floating over the background.
    We encourage you to use the example programs and experiment with the different
    effects in the javafx.scene.effect package. It is a fun and interesting way to
    learn about them.


    Using Markers


    The JavaFX 2.0 media API also includes support for media markers. These markers
    can be used to trigger events during media playback. Every Media object contains
    an ObservableMap whose keys are Strings and whose values are Durations. During
    playback, these markers trigger MediaMarkerEvents at the Duration specified by
    the marker. These events can be caught by passing an EventHandler to the MediaPlayer’s
    setOnMarker method. Listing 9-33 contains the code for the VideoPlayer2 application
    that sets and then displays the text of these markers during video playback.


    Although we show them here during video playback, the marker functionality is
    available during audio playback as well.


