- fmt: "# When developing applications that will be deployed in a cross-platform environment\
    \ or are internationalized, it is good to use layout containers. One advantage\
    \ of using layout containers is that when the node sizes change, their visual\
    \ relationships with each other are predictable. Another advantage is that you\
    \ don’t have to calculate the location of each node that you place in the UI.\n\
    \nThe following snippet from Listing 2-1 shows how the `VBox` layout class, located\
    \ in the `javafx.scene.layout` package, is used to arrange the `Text`, `CheckBox`,\
    \ `HBox`, and `Button` nodes in a column. This snippet also shows that layout\
    \ containers may be nested, as demonstrated by the `HBox` with the name `titleBox`\
    \ that arranges the `Label` and `TextField` nodes horizontally. Note that several\
    \ lines of code are omitted from this snippet to show the layout nesting clearly:\n\
    \n```\nHBox titleBox = new HBox(titleLabel, titleTextField);\n\nVBox contentBox\
    \ = new VBox(\n    textStageX, textStageY, textStageW, textStageH, textStageF,\n\
    \    checkBoxResizable, checkBoxFullScreen,\n    titleBox, toBackButton, toFrontButton,\
    \ closeButton);\n```\n\nThe `VBox` layout class is similar to the `Group` class\
    \ discussed in the Hello Earthrise example in Chapter 1, in that it contains a\
    \ collection of nodes within it. Unlike the `Group` class, the `VBox` class arranges\
    \ its contained nodes vertically, spacing them apart from each other by the number\
    \ of pixels specified in the `spacing` property.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 2 ■ Creating a User Interface in JavaFX\n\n### Ascertaining Whether\
    \ the Stage Is in Focus\n\nTo know whether your JavaFX application is the one\
    \ that currently is in focus (e.g., keys pressed are delivered to the application),\
    \ simply consult the `focused` property of the `Stage` instance. The following\
    \ snippet from Listing 2-1 demonstrates this.\n\n```\ntextStageF.textProperty().bind(new\
    \ SimpleStringProperty(\"focused: \")\n    .concat(stageRef.focusedProperty().asString()));\n\
    ```\n\n### Controlling the Z-Order of the Stage\n\nIn the event that you want\
    \ your JavaFX application to appear on top of other windows or behind other windows\
    \ onscreen, you can use the `toFront()` and `toBack()` methods, respectively.\
    \ The following snippet from Listing 2-1 shows how this is accomplished.\n\n```\n\
    Button toBackButton = new Button(\"toBack()\");\ntoBackButton.setOnAction(e ->\
    \ stageRef.toBack());\n\nButton toFrontButton = new Button(\"toFront()\");\ntoFrontButton.setOnAction(e\
    \ -> stageRef.toFront());\n```\n\nOnce again, note how using lambda expressions\
    \ enhances the readability of the code. It is clear from the first line of the\
    \ snippet that a `Button` named `toBackButton` is created with a text `\"toBack()\"\
    ` being displayed on the button. The second line defines that when an action is\
    \ performed on the button (i.e., the button is clicked), the stage is sent to\
    \ the back.\n\nWithout using a lambda expression, the second line would be replaced\
    \ by a call to an anonymous inner class as follows:\n\n```\ntoBackButton.setOnAction(new\
    \ EventHandler<javafx.event.ActionEvent>() {\n    @Override public void handle(javafx.event.ActionEvent\
    \ e) {\n        stageRef.toBack();\n    }\n})\n```\n\nThis approach not only requires\
    \ more code, it doesn’t allow the Java runtime to optimize calls and it is much\
    \ less readable.\n\n### Closing the Stage and Detecting When It Is Closed\n\n\
    As shown in the following code snippet from Listing 2-1, you can programmatically\
    \ close the `Stage` with its `close()` method. This is important when the `stageStyle`\
    \ is undecorated or transparent, because the close button supplied by the windowing\
    \ system is not present.\n\n```\nButton closeButton = new Button(\"close()\");\n\
    closeButton.setOnAction(e -> stageRef.close());\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 30](index-48_1.png)\n\nBy the way, you can detect when there is an external\
    \ request to close the `Stage` by using the `onCloseRequest` event handler as\
    \ shown in the following code snippet from Listing 2-1.\n\n```\nstage.setOnCloseRequest((WindowEvent\
    \ we) -> {\n    System.out.println(\"Stage is closing\");\n});\n```"
  raw: 'When developing applications that will be deployed in a cross-platform environment
    or are internationalized, it is good to use *layout containers*. One advantage
    of using layout containers is that when the node sizes change, their visual relationships
    with each other are predictable. Another advantage is that you don’t have to calculate
    the location of each node that you place in the UI.


    The following snippet from Listing 2-1 shows how the VBox layout class, located
    in the javafx.scene.layout package, is used to arrange the Text, CheckBox, HBox,
    and Button nodes in a column. This snippet also shows that layout containers may
    be nested, as demonstrated by the HBox with the name titleBox that arranges the
    Label and TextField nodes horizontally. Note that several lines of code are omitted
    from this snippet to show the layout nesting clearly:


    HBox titleBox = new HBox(titleLabel, titleTextField);


    VBox contentBox = new VBox(


    textStageX, textStageY, textStageW, textStageH, textStageF,


    checkBoxResizable, checkBoxFullScreen,


    titleBox, toBackButton, toFrontButton, closeButton);


    The VBox layout class is similar to the Group class discussed in the Hello Earthrise
    example in Chapter 1, in that it contains a collection of nodes within it. Unlike
    the Group class, the VBox class arranges its contained nodes vertically, spacing
    them apart from each other by the number of pixels specified in the spacing property.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 2 ■ Creating a User interfaCe in JavafX


    Ascertaining Whether the Stage Is in Focus


    To know whether your JavaFX application is the one that currently is in focus
    (e.g., keys pressed are delivered to the application), simply consult the focused
    property of the Stage instance. The following snippet from Listing 2-1


    demonstrates this.


    textStageF.textProperty().bind(new SimpleStringProperty("focused: ")


    .concat(stageRef.focusedProperty().asString()));


    Controlling the Z-Order of the Stage


    In the event that you want your JavaFX application to appear on top of other windows
    or behind other windows onscreen, you can use the toFront() and toBack() methods,
    respectively. The following snippet from Listing 2-1


    shows how this is accomplished.


    Button toBackButton = new Button("toBack()");


    toBackButton.setOnAction(e -> stageRef.toBack());


    Button toFrontButton = new Button("toFront()");


    toFrontButton.setOnAction(e -> stageRef.toFront());


    Once again, note how using lambda expressions enhances the readability of the
    code. It is clear from the first line of the snippet that a Button named toBackButton
    is created with a text "toBack()" being displayed on the button.


    The second line defines that when an action is performed on the button (i.e.,
    the button is clicked), the stage is sent to the back.


    Without using a lambda expression, the second line would be replaced by a call
    to an anonymous inner class as follows:


    toBackButton.setOnAction(new EventHandler<javafx.event.ActionEvent>() {


    @Override public void handle(javafx.event.ActionEvent e) {


    stageRef.toBack();


    }


    })


    This approach not only requires more code, it doesn’t allow the Java runtime to
    optimize calls and it is much less readable.


    Closing the Stage and Detecting When It Is Closed


    As shown in the following code snippet from Listing 2-1, you can programmatically
    close the Stage with its close() method. This is important when the stageStyle
    is undecorated or transparent, because the close button supplied by the windowing
    system is not present.


    Button closeButton = new Button("close()");


    closeButton.setOnAction(e -> stageRef.close());


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 30](index-48_1.png)


    Chapter 2 ■ Creating a User interfaCe in JavafX


    By the way, you can detect when there is an external request to close the Stage
    by using the onCloseRequest event handler as shown in the following code snippet
    from Listing 2-1.


    stage.setOnCloseRequest((WindowEvent we) -> {


    System.out.println("Stage is closing");


    });'
  trans: "\n在开发需要部署于跨平台环境或进行国际化的应用程序时，使用*布局容器*是一个好习惯。使用布局容器的优势之一在于，当节点尺寸发生变化时，它们之间的视觉关系是可预测的。另一个优势是，你无需计算放置在用户界面中每个节点的位置。\n\
    \n以下来自代码清单 2-1 的片段展示了如何使用位于 `javafx.scene.layout` 包中的 `VBox` 布局类，将 `Text`、`CheckBox`、`HBox`\
    \ 和 `Button` 节点排列成一列。该片段还展示了布局容器可以嵌套，如名为 `titleBox` 的 `HBox` 所示，它水平排列了 `Label`\
    \ 和 `TextField` 节点。请注意，为了清晰展示布局嵌套，该片段中省略了若干行代码：\n\n```java\nHBox titleBox = new\
    \ HBox(titleLabel, titleTextField);\n\nVBox contentBox = new VBox(\n    textStageX,\
    \ textStageY, textStageW, textStageH, textStageF,\n    checkBoxResizable, checkBoxFullScreen,\n\
    \    titleBox, toBackButton, toFrontButton, closeButton);\n```\n\n`VBox` 布局类与第\
    \ 1 章“Hello Earthrise”示例中讨论的 `Group` 类类似，因为它内部包含一组节点。与 `Group` 类不同的是，`VBox` 类会垂直排列其包含的节点，并通过\
    \ `spacing` 属性中指定的像素数来设置节点之间的间距。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n第 2 章 ■ 在 JavaFX 中创建用户界面\n\n**判断舞台是否处于焦点状态**\n\n要了解你的 JavaFX 应用程序当前是否处于焦点状态（例如，按键输入是否传递给该应用程序），只需查询\
    \ `Stage` 实例的 `focused` 属性即可。以下来自代码清单 2-1 的片段演示了这一点。\n\n```java\ntextStageF.textProperty().bind(new\
    \ SimpleStringProperty(\"focused: \")\n    .concat(stageRef.focusedProperty().asString()));\n\
    ```\n\n**控制舞台的 Z 轴顺序**\n\n如果你希望 JavaFX 应用程序显示在其他窗口之上或之下，可以分别使用 `toFront()` 和 `toBack()`\
    \ 方法。以下来自代码清单 2-1 的片段展示了如何实现这一点。\n\n```java\nButton toBackButton = new Button(\"\
    toBack()\");\ntoBackButton.setOnAction(e -> stageRef.toBack());\n\nButton toFrontButton\
    \ = new Button(\"toFront()\");\ntoFrontButton.setOnAction(e -> stageRef.toFront());\n\
    ```\n\n再次注意，使用 lambda 表达式如何增强了代码的可读性。从片段的第一行可以清晰地看出，创建了一个名为 `toBackButton` 的按钮，其上显示文本\
    \ `\"toBack()\"`。第二行定义了当对该按钮执行操作时（即点击按钮），舞台将被发送到后台。\n\n如果不使用 lambda 表达式，第二行将被替换为对匿名内部类的调用，如下所示：\n\
    \n```java\ntoBackButton.setOnAction(new EventHandler<javafx.event.ActionEvent>()\
    \ {\n    @Override public void handle(javafx.event.ActionEvent e) {\n        stageRef.toBack();\n\
    \    }\n})\n```\n\n这种方法不仅需要更多代码，而且不允许 Java 运行时优化调用，可读性也差得多。\n\n**关闭舞台并检测其关闭事件**\n\
    \n如下方来自代码清单 2-1 的代码片段所示，你可以通过 `Stage` 的 `close()` 方法以编程方式关闭它。当 `stageStyle` 设置为无装饰或透明时，这一点尤为重要，因为窗口系统提供的关闭按钮将不存在。\n\
    \n```java\nButton closeButton = new Button(\"close()\");\ncloseButton.setOnAction(e\
    \ -> stageRef.close());\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 30](img/index-48_1.png)\n\n第 2 章 ■ 在 JavaFX 中创建用户界面\n\n顺便提一下，你可以通过使用\
    \ `onCloseRequest` 事件处理器来检测何时有外部请求关闭舞台，如下方来自代码清单 2-1 的代码片段所示。\n\n```java\nstage.setOnCloseRequest((WindowEvent\
    \ we) -> {\n    System.out.println(\"Stage is closing\");\n});\n```\n"
- fmt: '要查看实际效果，请运行不带任何参数的应用程序，使其显示为之前图[2-2](#index_split_000.html#p38)所示的外观，然后点击窗口装饰上的关闭按钮。


    ■ **提示**：`onCloseRequest`事件处理器仅在收到外部关闭窗口请求时被调用。这就是为什么在本示例中，当你点击标有“`close()`”的按钮时，“stage
    is closing”消息不会出现的原因。


    ## 创建场景


    继续我们创建JavaFX应用程序的剧场隐喻，现在讨论如何将场景（`Scene`）放置到舞台（`Stage`）上。正如你所记得的，场景是演员和道具（节点）与观众（程序用户）进行视觉交互的场所。


    ### 使用Scene类：OnTheScene示例


    与`Stage`类类似，我们将使用一个精心设计的示例应用程序来演示和讲解`Scene`类中可用功能的细节。请参见图[2-6](#index_split_000.html#p48)中`OnTheScene`程序的截图。


    ***图2-6.** 首次调用时的OnTheScene程序*


    请继续运行`OnTheScene`程序，并按照以下练习中的指示进行测试。


    随后我们将对代码进行讲解，以便您能将行为与背后的代码关联起来。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 31](index-49_1.png)


    第2章 ■ 在JavaFX中创建用户界面


    **检查OnTheScene程序的行为**


    当`OnTheScene`程序启动时，其外观应与图[2-6](#index_split_000.html#p48)中的截图类似。要全面检查其行为，请执行以下步骤。请注意，UI上的属性和方法名称对应于`Scene`、`Stage`和`Cursor`类中的属性和方法，以及层叠样式表（CSS）文件名。


    1. 拖动应用程序窗口，注意虽然`Stage`的`x`和`y`值是相对于屏幕的，但`Scene`的`x`和`y`值是相对于舞台外部（包括装饰）左上角的。同样，`Scene`的宽度和高度是舞台内部（不包括装饰）的尺寸。如前所述，最好显式设置`Scene`的宽度和高度（或通过假设包含节点的大小来隐式设置），而不是设置装饰过的`Stage`的宽度和高度。


    2. 调整程序窗口的大小，观察宽度和高度值的变化，这些值反映了`Scene`的宽度和高度。同时注意，当您改变窗口高度时，场景中许多内容的位置也会发生变化。


    3. 点击`lookup()`超链接，注意控制台会打印出字符串“scene height: XXX.X”，其中`XXX.X`是`Scene`的高度。


    4. 将鼠标悬停在选择框下拉列表上，注意它会略微变大。点击选择框，在列表中选择一种光标样式，注意光标会变为该样式。小心不要选择`NONE`，因为光标可能会消失，届时您需要使用键盘（或在移动鼠标时使用超能力）才能使其重新可见。


    5. 拖动左侧的滑块，注意`Scene`的填充颜色会发生变化，并且场景顶部的字符串会反映当前填充颜色的红绿蓝（RGB）和透明度值。


    6. 注意场景中文本的外观和内容。然后点击`changeOfscene.css`，注意场景中某些文本的颜色、字体和内容特性会发生变化，如图[2-7](#index_split_000.html#p49)中的截图所示。


    ***图2-7.** 应用了changeOfScene CSS样式表的OnTheScene程序*


    7. 点击`Onthescene.css`，注意颜色和字体特性会恢复到之前的状态。


    现在您已经探索了这个演示`Scene`功能的示例程序，让我们来讲解代码吧！'
