- fmt: "在`adaptConstrainedProperty()`方法中，我们实例化了一个`Person` bean，并将其`phoneNumber` JavaBeans属性适配为`JavaBeanStringProperty`。我们再次向它添加了一个`ChangeListener`。由于`phoneNumber`是一个约束属性，`phoneNumberProperty`能够否决`person.setPhoneNumber()`调用。当这种情况发生时，`person.setPhoneNumber()`调用会抛出`PropertyVetoException`。如果`phoneNumberProperty`本身绑定到另一个JavaFX属性，它将否决此类更改。我们调用了两次`person.setPhoneNumber()`，一次是在将`phoneNumberProperty`绑定到另一个JavaFX属性之前，另一次是在绑定之后。第一次调用成功更改了`phoneNumberProperty`的值，第二次调用则抛出了`PropertyVetoException`。\n\
    \n当我们运行清单4-17中的程序时，控制台会打印以下输出：\n\n```\nSetting name on the JavaBeans property\n\
    Calling fireValueChange\nJavaFX property StringProperty [bean: Person@776ec8df,\
    \ name: name, value: Weiqi Gao] changed: oldValue = null, newValue = Weiqi Gao\n\
    nameProperty.get() = Weiqi Gao\nSetting value on the JavaFX property\nJavaFX property\
    \ StringProperty [bean: Person@776ec8df, name: name, value: Johan Vos] changed:\
    \ oldValue = Weiqi Gao, newValue = Johan Vos\nperson.getName() = Johan Vos\nSetting\
