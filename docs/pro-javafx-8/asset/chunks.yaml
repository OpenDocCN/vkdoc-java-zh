- fmt: '`Resume`按钮仅在时间线未暂停时禁用。要从暂停位置恢复时间线，动作事件处理器会调用时间线的`play()`方法。


    最后，`Stop`按钮在时间线停止时禁用。要停止时间线，动作事件处理器会调用时间线的`stop()`方法。


    现在你已经了解了如何通过创建`Timeline`类和`KeyFrame`实例来为节点添加动画，接下来将学习如何使用过渡类来为节点添加动画。


    ## 使用过渡类实现动画


    使用`TimeLine`可以实现非常灵活的动画。JavaFX 内置支持多种常见动画，用于实现从一个状态到另一个状态的过渡。`javafx.animation`包中包含多个类，旨在为这些常用动画任务提供便捷的实现方式。


    `TimeLine`和`Transition`（所有具体过渡类的抽象根类）都继承自`Animation`类。


    表 [2-1](#index_split_000.html#p66) 列出了该包中的过渡类。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第2章 ■ 在JavaFX中创建用户界面**


    ***表2-1.** `javafx.animation`包中用于节点动画的过渡类*


    | 过渡类名 | 描述 |

    | --- | --- |

    | `TranslateTransition` | 在指定时间内将节点从一个位置平移（移动）到另一个位置。第1章的Hello Earthrise示例程序中使用了此过渡。
    |

    | `PathTransition` | 沿指定路径移动节点。 |

    | `RotateTransition` | 在指定时间内旋转节点。 |

    | `ScaleTransition` | 在指定时间内缩放（增大或减小尺寸）节点。 |

    | `FadeTransition` | 在指定时间内淡入淡出（增大或减小不透明度）节点。 |

    | `FillTransition` | 在指定时间内更改形状的填充。 |

    | `StrokeTransition` | 在指定时间内更改形状的描边颜色。 |

    | `PauseTransition` | 在其持续时间结束时执行一个动作；主要用于在`SequentialTransition`中作为等待一段时间的手段。
    |

    | `SequentialTransition` | 允许你定义一系列按顺序执行的过渡。 |

    | `ParallelTransition` | 允许你定义一系列并行执行的过渡。 |


    让我们来看一个节拍器主题的变体，其中我们使用`TranslateTransition`来创建动画。


    ### MetronomeTransition示例


    使用过渡类时，我们采用与直接使用`Timeline`类不同的动画方法：


    *   在基于时间线的`Metronome1`程序中，我们将节点的一个属性（具体是`startX`）绑定到模型中的一个属性（`startXVal`），然后使用时间线来插值模型中该属性的值。

    *   然而，使用过渡类时，我们为`Transition`子类的属性赋值，其中一个属性就是节点。最终结果是节点本身受到影响，而不仅仅是节点的绑定属性受到影响。


    当我们逐步讲解`MetronomeTransition`示例时，这两种方法之间的区别会变得清晰。图 [2-9](#index_split_000.html#p67)
    显示了该程序首次启动时的截图。


