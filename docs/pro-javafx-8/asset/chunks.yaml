    Chapter 4 ■ properties and Bindings


    ■ **Caution** each Property object may have at most one active unidirectional
    binding at a time. it may have as many bidirectional bindings as you want. the
    isBound() method pertains only to unidirectional bindings. Calling bind() a second
    time with a different ObservableValue argument while a unidirectional binding
    is already in effect will unbind the existing one and replace it with the new
    one.


    Understanding the Binding Interface


    The Binding interface defines four methods that reveal the intentions of the interface.
    A Binding object is an ObservableValue whose validity can be queried with the
    isValid() method and set with the invalidate() method.


    It has a list of dependencies that can be obtained with the getDependencies()
    method. And finally a dispose() method signals that the binding will not be used
    anymore and resources used by it can be cleaned up.'
