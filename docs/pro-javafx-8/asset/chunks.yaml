- fmt: "我们已看到`@FXML`注解的两种用法。它可以应用于FXML文件控制器中，名称和类型与`fx:id`属性和FXML元素名称匹配的字段，以便注入节点。它还可以应用于不接受参数或接受一个`javafx.event.Event`或其子类型参数的`void`方法，使它们能够作为FXML文件中元素的事件处理器。\n\
    \n`FXMLLoader`会将位置和资源注入到控制器中（如果控制器有接收它们的字段）：\n\n```java\n@FXML\nprivate URL location;\n\
    \n@FXML\nprivate ResourceBundle resources;\n```\n\n`FXMLLoader`还会调用一个带有以下签名的`@FXML`注解的初始化方法：\n\
