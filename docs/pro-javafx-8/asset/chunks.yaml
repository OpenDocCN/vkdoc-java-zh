    custom components in the operating system’s File Explorer (or Finder), allowing
    you to remove any imported custom libraries. The Show JAR Analysis Report menu
    item displays a report showing JavaFX SceneBuilder’s assessment of the imported
    jar files.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 58](index-139_1.jpg)


    Chapter 3 ■ Using sCeneBUilder to Create a User interfaCe


    ***Figure 3-22.** The Library Panel with its menu open*


    To illustrate the importing of a custom component into JavaFX SceneBuilder, we
    package the class files and the FXML file from the CustomComponent example from
    the last section into a CustomComponent.jar file. We then invoke the Import JAR/FXML
    File menu item, navigate to the directory, and select the CustomComponent.jar
    file to import. As soon as we click the Open button in the file selection dialog
    box, JavaFX SceneBuilder opens the Import dialog box, shown in Figure [3-23.](#index_split_001.html#p140)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 59](index-140_1.jpg)


    Chapter 3 ■ Using sCeneBUilder to Create a User interfaCe


    ***Figure 3-23.** The Import dialog for importing CustomComponent.jar*


    We can examine each custom component included in the jar file by clicking the
    custom component name in the list on the left. Information about the selected
    custom component, including a visual representation of the custom component, is
    displayed on the right side of the screen. We can select which custom components
    to import by selecting the check box by the name of the component. We then click
    the Import Component button to finish the importing process. After importing,
    the ProdId custom component shows up in the Library Panel’s Custom section, and
    can be added to any further UIs that are built.


    Understanding the Document Panel


    The Document Panel lives in the bottom portion of the Left Panel, and can be hidden
    using the View ➤ Hide Document menu item. It holds two sections. The Hierarchy
    section displays a tree view of all the nodes that are added to the Content Panel,
    organized by the containment relationship. Because the layout of the nodes in
    the Content Panel might make it tricky to select a node from the Content Panel,
    it might be easier to make the selection in the Hierarchy section in the Document
    Panel.


    Figure [3-24 sho](#index_split_001.html#p141)ws the Hierarchy section of the Document
    Panel for the FXML file in the FXMLLoaderExample in Listing 3-4\. You can see
    the expanded node tree with the WebView node selected.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 60](index-141_1.jpg)


    ![Image 61](index-141_2.jpg)


    Chapter 3 ■ Using sCeneBUilder to Create a User interfaCe'
