    \n**图10-15.** `CanvasExample`程序\n\n## 理解图像操作API\n\nJavaFX图像操作API允许JavaFX程序在像素级别操作图像。JavaFX图像操作API的关键是`javafx.scene.image`包中的一对接口：`PixelReader`和`PixelWriter`。你可以从`javafx.scene.image.Image`对象获取`PixelReader`。并且可以从`javafx.scene.image.WritableImage`对象获取`PixelWriter`。`WritableImage`是`Image`的子类。\n\
    \n`PixelReader`接口包含以下公共方法：\n\n- `PixelFormat getPixelFormat()`\n- `int getArgb(int\
    \ x, int y)`\n- `Color getColor(int x, int y)`\n- `<T extends Buffer> void getPixels(int\
    \ x, int y, int w, int h, WritablePixelFormat<T> pixelFormat, T buffer, int scanlineStride)`\n\
    - `void getPixels(int x, int y, int w, int h, WritablePixelFormat<ByteBuffer>\
    \ pixelFormat, byte[] buffer, int offset, int scanlineStride)`\n- `void getPixels(int\
    \ x, int y, int w, int h, WritablePixelFormat<IntBuffer> pixelFormat, int[] buffer,\
    \ int offset, int scanlineStride)`\n\n`getPixelFormat()`方法返回底层图像的像素格式。`getArgb()`方法将像素颜色作为32位整数返回，其从最高有效字节到最低有效字节的4个字节包含指定像素颜色的ARGB分量。`getColor()`方法将指定像素的颜色作为`Color`对象返回。`getPixels()`方法接受由前四个参数`(x,\
    \ y, w, h)`指定的图像区域，读取这些像素的颜色，并根据`WritablePixelFormat`、缓冲区类型、偏移量和`scanlineStride`将它们写入缓冲区。\n\
    \n`PixelWriter`接口包含以下公共方法：\n\n- `PixelFormat getPixelFormat()`\n- `void setArgb(int\
    \ x, int y, int argb)`\n- `void setColor(int x, int y, Color color)`\n- `<T extends\
    \ Buffer> void setPixels(int x, int y, int w, int h, PixelFormat<T> pixelFormat,\
    \ T buffer, int scanlineStride)`\n- `void setPixels(int x, int y, int w, int h,\
    \ PixelFormat<ByteBuffer> pixelFormat, byte[] buffer, int offset, int scanlineStride)`\n\
    - `void setPixels(int x, int y, int w, int h, PixelFormat<IntBuffer> pixelFormat,\
    \ int[] buffer, int offset, int scanlineStride)`\n- `void setPixels(int dstx,\
    \ int dsty, int w, int h, PixelReader reader, int srcx, int srcy)`\n\n`getPixelFormat()`方法返回底层`WritableImage`的像素格式。`setArgb()`方法将像素`(x,\
    \ y)`的颜色设置为`argb`。`setColor()`方法将像素`(x, y)`的颜色设置为`color`。\n\n接受`pixelFormat`参数的`setPixels()`方法将区域`(x,\
    \ y, w, h)`中像素的颜色设置为`buffer`中指定的值，具体取决于`PixelFormat`、缓冲区类型、偏移量和`scanlineStride`。接受`PixelReader`的`setPixels()`方法根据从`PixelReader`获取的内容，从像素`(srcx,\
    \ srcy)`开始，设置区域`(dstx, dsty, w, h)`中像素的颜色。\n\n`PixelFormat`和`WritablePixelFormat`描述了每个像素的颜色信息如何存储。`PixelFormat`的可能类型由枚举`PixelFormat.Type`描述，它具有以下声明符：`INT_ARGB_PRE`、`INT_ARGB`、`BYTE_BGRA_PRE`、`BYTE_BGRA`、`BYTE_RGB`、`BYTE_INDEXED`。\n\
    \n清单10-13中的程序演示了从你在第1章中看到的`EarthRise`图像中读取像素颜色。\n\n**清单10-13.** `ImageOpsExample.java`\n\
    \n```java\nimport javafx.application.Application;\nimport javafx.geometry.BoundingBox;\n\
