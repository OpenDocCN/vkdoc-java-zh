    \ Fill”按钮，矩形中不会看到颜色变化。更糟糕的是，整个UI似乎被锁定了：“Change Fill”和“Change Stroke”按钮停止工作；操作系统提供的关闭窗口按钮也不会产生预期效果。操作系统可能会将该程序标记为“未响应”，唯一停止程序的方法是使用操作系统的强制终止功能。\n\
    \n为了解决此类问题，我们需要将长时间运行的代码卸载到工作线程，并将长时间计算的结果传回JavaFX应用程序线程，以更新UI状态，使用户能够看到结果。根据你学习Java的时间不同，对于将代码卸载到工作线程这一首要问题的答案可能不同。如果你是一位资深的Java程序员，你的本能反应可能是实例化一个`Runnable`，将其包装在`Thread`中，并调用`start()`。如果你是在Java\
    \ 5之后开始学习Java，并了解了`java.util.concurrent`类层次结构，你的反应可能是建立一个`java.util.concurrent.ExecutorService`并向其提交`java.util.concurrent.FutureTasks`。JavaFX在`javafx.concurrent`包中提供了一个基于后一种方法的工作线程框架。\n\
    \n在接下来的几节中，我们将研究此框架中的接口和类，但在此之前，我们使用`Runnable`和`Thread`方法将计算卸载到工作线程。我们在此的目的是强调第二个问题的答案：如何从工作线程使代码在JavaFX应用程序线程上运行。\n\
    \n完整的修正程序可以在`ResponsiveUIExample.java`中找到。以下是“Change Fill”按钮事件处理程序的新代码：\n\n```java\n\
    view.changeFillButton.setOnAction(actionEvent -> {\n    final Paint fillPaint\
    \ = model.getFillPaint();\n    if (fillPaint.equals(Color.LIGHTGRAY)) {\n    \
    \    model.setFillPaint(Color.GRAY);\n    } else {\n        model.setFillPaint(Color.LIGHTGRAY);\n\
    \    }\n    Runnable task = () -> {\n        try {\n            Thread.sleep(3000);\n\
    \            Platform.runLater(() -> {\n                final Rectangle rect =\
    \ view.rectangle;\n                double newArcSize =\n                    rect.getArcHeight()\
    \ < 20 ? 30 : 0;\n                rect.setArcWidth(newArcSize);\n            \
    \    rect.setArcHeight(newArcSize);\n            });\n        } catch (InterruptedException\
    \ e) {\n            // TODO properly handle interruption\n        }\n    };\n\
    \    new Thread(task).start();\n});\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第7章 ■ 集合与并发\n\n我们已经将长时间的休眠替换为在工作线程中执行的代码。在休眠三秒后，工作线程调用`javafx.application.Platform`类的`runLater()`方法，并向其传递另一个`Runnable`，该`Runnable`用于切换矩形的圆角。由于长时间运行的计算在工作线程中完成，事件处理程序不会阻塞JavaFX应用程序线程。填充颜色的变化现在会立即在UI中反映出来。由于`Platform.runLater()`调用导致`Runnable`在JavaFX应用程序线程上执行，因此三秒后圆角的变化会在UI中反映出来。我们必须在JavaFX应用程序线程上执行`Runnable`的原因是它修改了活动场景的状态。\n\
    \n`Platform`类包含以下其他有用的实用方法：\n\n- `public static boolean isFxApplicationThread()`：如果在JavaFX应用程序线程上执行则返回`true`，否则返回`false`。\n\
    - `public static boolean isSupported(ConditionalFeature)`：测试执行环境是否支持`ConditionalFeature`。可测试的`ConditionalFeature`包括：`GRAPHICS`、`CONTROLS`、`MEDIA`、`WEB`、`SWT`、`SWING`、`FXML`、`SCENE3D`、`EFFECT`、`SHAPE_CLIP`、`INPUT_METHOD`、`TRANSPARENT_WINDOW`、`UNIFIED_WINDOW`、`TWO_LEVEL_FOCUS`、`VIRTUAL_KEYBOARD`、`INPUT_TOUCH`、`INPUT_MULTITOUCH`和`INPUT_POINTER`。\n\
    - `public static void exit()`：如果在应用程序的`start()`方法被调用后调用，则会导致应用程序的`stop()`方法在JavaFX应用程序线程上执行，然后JavaFX应用程序线程和其他JavaFX平台线程才会被关闭。如果应用程序的`start()`方法尚未被调用，则应用程序的`stop()`方法可能不会被调用。\n\
    - `public static boolean isImplicitExit()`和`public static void setImplicitExit(boolean)`：测试和设置隐式退出标志。当此标志为`true`时，JavaFX运行时将在最后一个应用程序窗口关闭时关闭。否则，你必须显式调用`Platform.exit()`来关闭JavaFX运行时。此标志的默认值为`true`。\n\
    \n■ **注意** 如果你熟悉Swing编程，你应该能看到JavaFX的`Platform.runLater()`与Swing的`EventQueue.invokerLater()`或`SwingUtilities.invokeLater()`之间的相似性。\n\
    \n现在我们已经使用`Runnable`、`Thread`和`Platform.runLater()`解决了问题，是时候看看如何使用JavaFX内置的工作线程框架以更灵活、更优雅的方式解决这个问题了。\n\
    \n## 理解`javafx.concurrent`框架\n\n`javafx.concurrent`包中的JavaFX工作线程框架将Java 5中引入的Java并发框架的通用性和灵活性与JavaFX属性和绑定框架的便利性相结合，产生了一个易于使用的工具集，该工具集了解JavaFX应用程序线程规则，并且非常易于使用。它由一个接口`Worker`和三个实现该接口的抽象基类`Task<V>`、`Service<V>`和`ScheduledService<V>`组成。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第7章 ■ 集合与并发\n\n### 理解`Worker`接口\n\
    \n`Worker`接口指定了一个具有九个只读属性、一个名为`cancel()`的方法以及一个状态模型和状态转换规则的JavaFX bean。`Worker`表示一个或多个后台线程中运行的工作单元，但其某些内部状态可以安全地被JavaFX应用程序线程观察到。九个只读属性如下：\n\
    \n- `title`：一个`String`属性，表示任务的标题。\n- `message`：一个`String`属性，表示任务进行过程中的更详细消息。\n\
    - `running`：一个`boolean`属性，仅当`Worker`处于`Worker.State.SCHEDULED`或`Worker.State.RUNNING`状态时为`true`。\n\
    - `state`：一个`Object`属性，表示任务的`Worker.State`。\n- `totalWork`：一个`double`属性，表示任务的总工作量。当总工作量未知时，其值为`-1.0`。\n\
    - `workDone`：一个`double`属性，表示任务到目前为止已完成的工作量。其值为`-1.0`或介于`0`和`totalWork`之间的数字。\n\
    - `progress`：一个`double`属性，表示任务到目前为止已完成工作占总工作量的百分比。其值为`-1.0`或`workDone`与`totalWork`的比率。\n\
    - `value`：一个`Object`属性，表示任务的输出。仅当任务成功完成（即达到`Worker.State.SUCCEEDED`状态）时，其值才非`null`。\n\
    - `exception`：一个`Object`属性，表示任务实现向JavaFX工作线程框架抛出的`Throwable`。仅当任务处于`Worker.State.FAILED`状态时，其值才非`null`。\n\
    \n上述属性旨在从JavaFX应用程序线程访问。将场景图属性绑定到它们是安全的，因为这些属性的失效事件和更改事件是在JavaFX应用程序线程上触发的。"
  raw: 'The Thread.sleep(Long.MAX_VALUE) simulates code that takes a long time to
    execute. In real-life applications, this might be a database call, a web service
    call, or a piece of complicated code. As a result, if you click the “Change Fill”
    button, the color change is not seen in the rectangle. What is worse, the whole
    UI appears to be locked up: The


    “Change Fill” and “Change Stroke” buttons stop working; the close window button
    that is provided by the operating system will not have the desired effect. The
    operating system might also mark the program as “Not Responding,” and the only
    way to stop the program is to use the operating system’s forced kill functionality.


    To fix problems like this, we need to offload long-running code to worker threads
    and communicate the result of the long computation back to the JavaFX application
    thread to update the states of the UI so that the user can see the result. Depending
    on when you learned your Java, your answer to the first question of offloading
    code to worker threads might be different. If you are a longtime Java programmer
    your instinctive reaction might be to instantiate a Runnable, wrap it in a Thread,
    and call start() on it. If you started with Java after Java 5 and learned the
    java.util.


    concurrent hierarchy of classes, your reaction might be to stand up a java.util.concurrent.ExecutorService
    and submit java.util.concurrent.FutureTasks to it. JavaFX includes a worker threading
    framework based on the latter approach in the javafx.concurrent package.


    We examine the interfaces and classes in this framework in the next few sections,
    but before we do that we use the Runnable and Thread approach to offload computation
    to a worker thread. Our intention here is to highlight the answer to the second
    question of how to cause code to be run on the JavaFX application thread from
    a worker thread.


    The complete corrected program can be found in ResponsiveUIExample.java. Here
    is the new code for the event handler of the “Change Fill” button:


    view.changeFillButton.setOnAction(actionEvent -> {


    final Paint fillPaint = model.getFillPaint();


    if (fillPaint.equals(Color.LIGHTGRAY)) {


    model.setFillPaint(Color.GRAY);


    } else {


    model.setFillPaint(Color.LIGHTGRAY);


    }


    Runnable task = () -> {


    try {


    Thread.sleep(3000);


    Platform.runLater(() -> {


    final Rectangle rect = view.rectangle;


    double newArcSize =


    rect.getArcHeight() < 20 ? 30 : 0;


    rect.setArcWidth(newArcSize);


    rect.setArcHeight(newArcSize);


    });


    } catch (InterruptedException e) {


    // TODO properly handle interruption


    }


    };


    new Thread(task).start();


    });


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 7 ■ ColleCtions and ConCurrenCy


    We have replaced the long sleep with code that executes in a worker thread. After
    sleeping for three seconds, the worker thread calls the runLater() method of the
    javafx.application.Platform class, passing it another Runnable that toggles the
    rounded corners of the rectangle. Because the long-running computation is done
    in a worker thread, the event handler is not blocking the JavaFX application thread.
    The change of fill is now reflected immediately in the UI. Because the Platform.runLater()
    call causes the Runnable to be executed on the JavaFX application thread, the
    change to the rounded corners is reflected in the UI after three seconds. The
    reason we have to execute the Runnable on the JavaFX application thread is that
    it modifies the state of a live scene.


    The Platform class includes the following other helpful utility methods:


    • public static boolean isFxApplicationThread() returns true if it is executed
    on the


    JavaFX application thread and false otherwise.


    • public static boolean isSupported(ConditionalFeature) tests whether the execution


    environment supports a ConditionalFeature. Testable ConditionalFeatures include


    GRAPHICS, CONTROLS, MEDIA, WEB, SWT, SWING, FXML, SCENE3D, EFFECT, SHAPE_CLIP,
    INPUT_METHOD, TRANSPARENT_WINDOW, UNIFIED_WINDOW, TWO_LEVEL_FOCUS, VIRTUAL_KEYBOARD,
    INPUT_TOUCH,


    INPUT_MULTITOUCH, and INPUT_POINTER.


    • public static void exit(), if called after the application’s start() method
    has been called, causes the application’s stop() method to be executed on the
    JavaFX application thread


    before the JavaFX application thread and other JavaFX platform threads are taken
    down. If the application’s start() method has not been called yet, the application’s
    stop() method may


    not be called.


    • public static boolean isImplicitExit() and public static void


    setImplicitExit(boolean) tests and sets the implicit exit flag. When this flag
    is true, the JavaFX runtime will shut down when the last application window is
    closed. Otherwise you


    have to explicitly call Platform.exit() to shut down the JavaFX runtime. The default
    value of this flag is true.


    ■ **Note** if you are familiar with swing programming, you should see the similarity
    between JavaFX’s Platform.runLater() and swing’s EventQueue.invokerLater(), or
    SwingUtilities.invokeLater().


    Now that we have solved our problem with Runnable and Thread and Platform.runLater(),
    it is time to see how we can use JavaFX’s built-in worker threading framework
    to solve the problem in a more flexible and elegant way.


    Understanding the javafx.concurrent Framework


    The JavaFX worker threading framework in the javafx.concurrent package combines
    the versatility and flexibility of the Java concurrency framework introduced in
    Java 5 with the convenience of the JavaFX properties and bindings framework to
    produce an easy-to-use toolset that is aware of the JavaFX application threading
    rules and also very easy to use. It consists of one interface, Worker, and three
    abstract base classes, Task<V>, Service<V>, and ScheduledService<V>, that implement
    the interface.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 7 ■ ColleCtions and ConCurrenCy


    Understanding the **Worker** Interface


    The Worker interface specifies a JavaFX bean with nine read-only properties, one
    method named cancel(), and a state model and state transition rules. A Worker
    represents a unit of work that runs in one or more background threads yet has
    some of its internal states safely observable to the JavaFX application thread.
    The nine read-only properties are as follows.


    • title is a String property that represents the title of the task.


    • message is a String property that represents a more detailed message as the
    task progresses.


    • running is a boolean property that is true only when the Worker is in the


    Worker.State.SCHEDULED or Worker.State.RUNNING state.


    • state is an Object property that represents the Worker.State of the task.


    • totalWork is a double property that represents the total amount of work of the
    task. Its value is


    –1.0 when the total amount of work is not known.


    • workDone is a double property that represents the amount of work that has been
    done so far in the task. Its value is –1.0 or a number between 0 and totalWork.


    • progress is a double property that represents the percentage of the total work
    that has been done so far in the task. Its value is –1.0 or the ratio between
    workDone and totalWork.


    • value is an Object property that represents the output of the task. Its value
    is non-null only when the task has finished successfully, that is, has reached
    the Worker.State.SUCCEEDED


    state.


    • exception is an Object property that represents a Throwable that the implementation
    of the task has thrown to the JavaFX worker threading framework. Its value is
    non-null only when the task is in the Worker.State.FAILED state.


    The preceding properties are meant to be accessed from the JavaFX application
    thread. It is safe to bind scene graph properties to them because the invalidation
    events and change events of these properties are fired on the JavaFX'
