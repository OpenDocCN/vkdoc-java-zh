- fmt: "# 构建 JavaFX 动态 UI 布局\n\n> *\"当我研究一个问题时，我从不考虑美。我只考虑如何解决问题。但当我完成时，如果解决方案不美，我就知道它是错的。\"\
    *\n> \n> —巴克敏斯特·富勒\n\n`JavaFX` 提供了创建动态布局的功能，使您能够轻松构建外观美观、可缩放至任意分辨率且由整洁代码支持的 UI。您可以利用简单而优雅的绑定功能、基于\
    \ `Pane` 和 `Region` 类构建的强大自定义布局，以及内置布局（包括 `HBox`、`VBox`、`AnchorPane`、`BorderPane`、`FlowPane`、`TilePane`、`StackPane`、`GridPane`\
    \ 和 `TextFlow`）。\n\n在本章中，我们将展示如何利用这些动态布局机制，构建零静态定位的复杂 UI。\n\n## 介绍 JavaFX Reversi\n\
    \n为了演示 `JavaFX` 中动态布局的强大功能，本章的目标是构建一个功能完整的流行游戏 Reversi。Reversi 是一种策略游戏，玩家轮流在八乘八的游戏棋盘上放置黑色和白色棋子。游戏的目标是通过包围对手的棋子并将其翻转为己方颜色，从而在棋盘上拥有最多的棋子。\n\
    \nReversi 最初由 Lewis Waterman 和 James Mollett 于 1880 年发明，在十九世纪的英格兰获得了相当大的 popularity，并且是德国游戏制造商\
    \ Ravensburger 最早发行的游戏之一。\n\n如今它更常被称为 Othello，这是由 Pressman 公司商标注册并销售的。\n\nReversi\
    \ 的规则极其简单，这让我们可以专注于 `JavaFX` 布局。为了增加一点挑战性，我们将把 Reversi 带入二十一世纪，采用现代 RIA 风格界面和完全可调整大小的布局。\n\
    \n## 棋盘布局与基本规则\n\nReversi 是一款回合制游戏，两名玩家分别选择白色和黑色方。每位玩家有 32 枚棋子；先手玩家为黑色。\n\n初始棋盘设置是在棋盘中央的交替单元格中放置四枚棋子（见图\
    \ [5-1]）。\n\n![Image 68](index-192_1.jpg)\n![Image 69](index-192_2.jpg)\n\n**图\
    \ 5-1.** 这是 Reversi 的起始棋盘位置\n\n黑方先手，可以在与白方棋子相邻且同一行（垂直、水平或对角线）上有匹配黑方棋子的位置放置一枚棋子。从起始位置开始，只有四个合法走法，如图\
    \ [5-1] 中高亮所示。所有走法在位置上均等，因此我们假设黑方选择最上方的位置。这使得黑方可以翻转上方的白方棋子，占据整列（见图 [5-2]）。\n\n\
    **图 5-2.** 黑方第一步后的棋盘位置\n\n![Image 70](index-193_1.jpg)\n\n白方第二步有三个可用选项，如图 [5-2]\
    \ 中高亮所示。假设白方选择最下方的位置，翻转一枚黑方棋子。现在轮到黑方，有五个可用位置（如图 [5-3] 所示）。\n\n**图 5-3.** 白方下一步后的棋盘位置\n\
    \n游戏以此方式继续，黑白交替，除非某位玩家无棋可走，此时该玩家跳过回合。当双方均无棋可走时游戏结束，最终棋盘上棋子最多的玩家获胜。\n\n## 为 Reversi\
    \ 构建 JavaFX 模型\n\n现在您已经了解了 Reversi 的运作方式，是时候将其转化为一组代表游戏模型的 Java 类了。\n\n您的 `ReversiModel`\
    \ 类需要包含两条主要信息：当前棋盘位置和当前轮到哪位玩家。清单 5-1 展示了一个基本的模型类，供您入门。\n\n**清单 5-1.** Reversi\
    \ 应用程序的 `ReversiModel` 类\n\n```java\npublic class ReversiModel {\n\n    public\
    \ static int BOARD_SIZE = 8;\n\n    public ObjectProperty<Owner> turn = new SimpleObjectProperty<>(Owner.BLACK);\n\
    \n    public ObjectProperty<Owner>[][] board = new ObjectProperty[BOARD_SIZE][BOARD_SIZE];\n\
    \n    private ReversiModel() {\n        for (int i = 0; i < BOARD_SIZE; i++) {\n\
    \            for (int j = 0; j < BOARD_SIZE; j++) {\n                board[i][j]\
    \ = new SimpleObjectProperty<>(Owner.NONE);\n            }\n        }\n      \
    \  initBoard();\n    }\n\n    public static ReversiModel getInstance() {\n   \
    \     return ReversiModelHolder.INSTANCE;\n    }\n\n    private static class ReversiModelHolder\
    \ {\n        private static final ReversiModel INSTANCE = new ReversiModel();\n\
    \    }\n}\n```\n\n关于此模型有几点需要说明：\n\n- 它使用 Java 单例模式来创建和提供实例访问。\n- 棋盘大小通过常量定义，便于将来调整尺寸。\n\
    - `turn` 变量声明为可观察对象属性，以便在绑定语句中使用。\n- 棋盘声明为包含可观察对象属性的二维数组，允许绑定到当前游戏状态。\n- 模型引用了\
    \ `Owner` 类，用于表示棋盘内容和当前回合。\n\n接下来我们需要定义 `ReversiModel` 中使用的 `Owner` 枚举。如下代码所示，您可以将\
    \ `Owner` 类定义为 Java 枚举，包含 `WHITE`、`BLACK` 以及空单元格的 `NONE` 状态。\n\n```java\npublic\
    \ enum Owner {\n    NONE,\n    WHITE,\n    BLACK;\n\n    public Owner opposite()\
    \ {\n        return this == WHITE ? BLACK : this == BLACK ? WHITE : NONE;\n  \
    \  }\n\n    public Color getColor() {\n        return this == Owner.WHITE ? Color.WHITE\
    \ : Color.BLACK;\n    }\n\n    public String getColorStyle() {\n        return\
    \ this == Owner.WHITE ? \"white\" : \"black\";\n    }\n}\n```\n\n此枚举类包含几个我们稍后会使用的辅助函数。第一个是\
    \ `opposite()`，可用于在黑色和白色之间转换，这对于交换回合和稍后实现游戏算法非常有用。接下来的两个方法返回颜色，可以是 `JavaFX` 的\
    \ `Color` 对象，也可以是用于 UI 样式属性的样式字符串。\n\n最后一步是将我们的模型初始化为 Reversi 游戏的起始位置。以下 `initBoard()`\
    \ 方法的实现将前四枚棋子放置在棋盘中央。\n\n```java\nprivate void initBoard() {\n    int center1\
    \ = BOARD_SIZE / 2 - 1;\n    int center2 = BOARD_SIZE / 2;\n\n    board[center1][center1].setValue(Owner.WHITE);\n\
    \    board[center1][center2].setValue(Owner.BLACK);\n    board[center2][center1].setValue(Owner.BLACK);\n\
    \    board[center2][center2].setValue(Owner.WHITE);\n}\n```\n\n我们稍后会回到模型，但现在让我们切换到使用\
    \ `JavaFX` 中一些基本动态布局机制来构建 Reversi UI。\n\n## 动态布局技术\n\n`JavaFX` 提供了多种适用于不同任务的布局。它们从多功能的绑定到自由形式的\
    \ `Pane` 和 `Region`（允许您即时创建全新布局）不等。还有大量内置布局，包括 `HBox`、`VBox`、`AnchorPane`、`BorderPane`、`StackPane`、`TilePane`、`FlowPane`\
    \ 和 `GridPane`，可以组合使用以实现复杂的布局。\n\n为了演示这一点，我们将展示如何为 Reversi 应用程序构建一个 UI 外壳，该外壳完全没有静态定位的组件，并且支持动态调整大小。\n\
    \n### 使用绑定居中文本\n\n`JavaFX` 中最强大的功能之一是能够绑定变量。之前我们展示了绑定如何用于保持 UI 和模型同步，而无需复杂的事件或监听器。"
  raw: '*When I am working on a problem, I never think about beauty. I think only
    of how to solve the* *problem. But when I have finished, if the solution is not
    beautiful, I know it is wrong.*


    —Buckminster Fuller


    JavaFX has facilities for creating dynamic layouts that allow you to easily create
    beautiful-looking UIs that scale to any resolution and are backed by clean code.
    At your disposal you have the simple, yet elegant, binding facility; powerful
    custom layouts built on top of the Pane and Region classes; and the built-in layouts
    that include HBox, VBox, AnchorPane, BorderPane, FlowPane, TilePane, StackPane,
    GridPane, and TextFlow.


    In this chapter we show how you can leverage these dynamic layout mechanisms to
    build complicated UIs with zero static positioning.


    Introducing JavaFX Reversi


    To demonstrate the power of dynamic layout in JavaFX, the goal of this chapter
    is to build a fully functional version of the popular Reversi game. Reversi is
    a game of strategy where players take turns on an eight-by-eight game board placing
    black and white pieces. The objective of the game is to have the most pieces on
    the board by surrounding your opponent’s pieces and flipping them over to your
    color.


    Originally invented in 1880 by Lewis Waterman and James Mollett, Reversi gained
    considerable popularity in nineteenth-century England, and was one of the first
    titles published by German game manufacturer Ravensburger.


    It is more commonly known today as Othello, which is trademarked and sold by Pressman.


    The rules of Reversi are extremely simple, which lets us focus on the JavaFX layout.
    To make things a little more challenging, we are going to bring Reversi into the
    twenty-first century with a modern RIA-style interface and fully resizable layout.


    Board Layout and Basic Rules


    Reversi is a turn-based game where two players choose white and black sides. Each
    player gets 32 pieces to play; the first player is black.


    The initial board setup has four pieces placed in alternating cells in the center
    of the board (see Figure [5-1).](#index_split_002.html#p192)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 68](index-192_1.jpg)


    ![Image 69](index-192_2.jpg)


    Chapter 5 ■ Building dynamiC ui layouts in JavaFX


    ***Figure 5-1.** This is the starting board position for Reversi*


    Black gets the first turn and can place a piece anywhere adjacent to one of white’s
    pieces where there is a matching black piece on the same line (vertical, horizontal,
    or diagonal). From the starting position, there are only four legal moves, which
    are highlighted in Figure [5-1](#index_split_002.html#p192). All moves are equal
    position-wise, so let’s assume that black goes in the uppermost position. This
    allows black to flip the upper white piece, taking that entire column (see Figure
    [5-2](#index_split_002.html#p192)).


    ***Figure 5-2.** The board position after black’s first move*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 70](index-193_1.jpg)


    Chapter 5 ■ Building dynamiC ui layouts in JavaFX


    White gets the second turn and has three available options highlighted in Figure
    [5-2](#index_split_002.html#p192). Let’s assume white goes in the lowermost position,
    flipping one black piece. Now it is black’s turn again with five available positions
    (shown in Figure [5-3).](#index_split_002.html#p193)


    ***Figure 5-3.** The board position after the next move by white*


    Play continues this way, alternating between black and white unless one player
    has no moves, in which case they pass on that turn. The game is over when both
    players have no moves, and the winner is the player with the most pieces on the
    final board.


    Building a JavaFX Model for Reversi


    Now that you are armed with knowledge of how Reversi works, it is time to translate
    that into a set of Java classes that represent the game model.


    Your ReversiModel class needs to contain two primary pieces of information: the
    current board position and the player whose turn it is. Listing 5-1 shows a basic
    model class to get you started.


    ***Listing 5-1.*** ReversiModel Class for the Reversi Application


    public class ReversiModel {


    public static int BOARD_SIZE = 8;


    public ObjectProperty<Owner> turn = new SimpleObjectProperty<>(Owner.BLACK);


    public ObjectProperty<Owner>[][] board = new ObjectProperty[BOARD_SIZE][BOARD_SIZE];
    private ReversiModel() {


    for (int i = 0; i < BOARD_SIZE; i++) {


    for (int j = 0; j < BOARD_SIZE; j++) {


    board[i][j] = new SimpleObjectProperty<>(Owner.NONE);


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 5 ■ Building dynamiC ui layouts in JavaFX


    }


    initBoard();


    }


    public static ReversiModel getInstance() {


    return ReversiModelHolder.INSTANCE;


    }


    private static class ReversiModelHolder {


    private static final ReversiModel INSTANCE = new ReversiModel();


    }


    }


    There are a few things to point out about this model.


    • It uses the Java singleton pattern for creating and providing access to an instance.


    • The board size is defined via a constant, which makes it easy to adjust the
    dimensions in the future.


    • The turn variable is declared as an observable object property so that we can
    make use of it in bind statements.


    • The board is declared as a two-dimensional array containing observable object
    properties, allowing binding to the current game state.


    • The model references an Owner class for both the board contents and the current
    turn.


    Next we need to define the Owner enumeration that is used in the ReversiModel.
    As shown in the following code, you can define the Owner class as a Java enum
    that contains states for WHITE, BLACK, and, in the case of empty cells, NONE.


    public enum Owner {


    NONE,


    WHITE,


    BLACK;


    public Owner opposite() {


    return this == WHITE ? BLACK : this == BLACK ? WHITE : NONE;


    }


    public Color getColor() {


    return this == Owner.WHITE ? Color.WHITE : Color.BLACK;


    }


    public String getColorStyle() {


    return this == Owner.WHITE ? "white" : "black";


    }


    }


    This enumeration class contains a few extra helper functions that we make use
    of later. The first is called opposite() and can be used to convert from black
    to white and vice versa, which is very useful for swapping turns and implementing
    the game algorithm later. The next two methods return a color as either a JavaFX
    Color object or a style String for use within style properties in the UI.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 5 ■ Building dynamiC ui layouts in JavaFX


    The final step is to initialize our model to the starting position for a Reversi
    game. The following implementation of the initBoard() method places the first
    four pieces in the center of the board.


    private void initBoard() {


    int center1 = BOARD_SIZE / 2 - 1;


    int center2 = BOARD_SIZE /2;


    board[center1][center1].setValue(Owner.WHITE);


    board[center1][center2].setValue(Owner.BLACK);


    board[center2][center1].setValue(Owner.BLACK);


    board[center2][center2].setValue(Owner.WHITE);


    }


    We come back to the model later, but let’s switch over to building out the Reversi
    UI by using some of the basic dynamic layout mechanisms in JavaFX.


    Dynamic Layout Techniques


    JavaFX provides a wide variety of layouts that are suitable for different tasks.
    They range from the versatile bind to the freeform Pane and Region, which allow
    you to create an entirely new layout on the fly. There is also a large set of
    built-in layouts, including HBox, VBox, AnchorPane, BorderPane, StackPane, TilePane,
    FlowPane, and GridPane, that can be composed to accomplish sophisticated layouts.


    To demonstrate this, we show how you can build a UI shell for the Reversi application
    that has absolutely no static positioned components and that supports dynamic
    resizing.


    Centering Text Using Bind


    One of the most powerful facilities in JavaFX is the ability to bind variables.
    Earlier we showed how binding could be used to keep the UI and model in sync with
    no complicated events or listeners.'
