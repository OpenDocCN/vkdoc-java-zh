- fmt: "## Chapter 2: Creating a User Interface in JavaFX\n\n**Tip:** A property that\
    \ is bound cannot be explicitly set. In the code preceding the snippet, the `resizable`\
    \ property is set with the `setResizable()` method *before* the property is bound\
    \ in the next line.\n\n### Making a Stage Full Screen\n\nMaking the Stage show\
    \ in full-screen mode is done by setting the `fullScreen` property of the `Stage`\
    \ instance to `true`.\n\nAs shown in the following snippet from Listing 2-1, to\
    \ keep the `fullScreen` property of the `Stage` and the state of the `fullScreen`\
    \ check box synchronized, the `fullScreen` property of the `Stage` instance is\
    \ updated whenever the `selected` property of the `checkBox` changes.\n\n```\n\
    checkBoxFullScreen.selectedProperty().addListener((ov, oldValue, newValue) ->\
    \ {\n    stageRef.setFullScreen(checkBoxFullScreen.selectedProperty().getValue());\n\
    });\n```\n\n### Working with the Bounds of the Stage\n\nThe bounds of the `Stage`\
    \ are represented by its `x`, `y`, `width`, and `height` properties, the values\
    \ of which can be changed at will. This is demonstrated in the following snippet\
    \ from Listing 2-1 where the `Stage` is placed near the top and centered horizontally\
    \ on the primary screen after the `Stage` has been initialized.\n\n```\nRectangle2D\
    \ primScreenBounds = Screen.getPrimary().getVisualBounds();\nstage.setX((primScreenBounds.getWidth()\
    \ - stage.getWidth()) / 2);\nstage.setY((primScreenBounds.getHeight() - stage.getHeight())\
    \ / 4);\n```\n\nWe’re using the `Screen` class of the `javafx.stage` package to\
    \ get the dimensions of the primary screen so that the desired position may be\
    \ calculated.\n\n**Note:** We intentionally made the `Stage` in Figure [2-2](#index_split_000.html#p38)\
    \ larger than the `Scene` contained within to make the following point. The `width`\
    \ and `height` of a `Stage` include its decorations (title bar and border), which\
    \ vary on different platforms.\n\nIt is therefore usually better to control the\
    \ `width` and `height` of the `Scene` (we show you how in a bit) and let the `Stage`\
    \ conform to that size.\n\n### Drawing Rounded Rectangles\n\nAs pointed out in\
    \ Chapter 1, you can put rounded corners on a `Rectangle` by specifying the `arcWidth`\
    \ and `arcHeight` for the corners. The following snippet from Listing 2-1 draws\
    \ the sky-blue rounded rectangle that becomes the background for the transparent\
    \ window example in Figure [2-5](#index_split_000.html#p40).\n\n```\nRectangle\
    \ blue = new Rectangle(250, 350, Color.SKYBLUE);\nblue.setArcHeight(50);\nblue.setArcWidth(50);\n\
    ```\n\nIn this snippet, we use the three-argument constructor of `Rectangle`,\
    \ in which the first two parameters specify the `width` and the `height` of the\
    \ `Rectangle`. The third parameter defines the fill color of the `Rectangle`.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nAs you can detect from this\
    \ code snippet, rounded rectangles are easily created using the `arcWidth(double\
    \ v)` and `arcHeight(double v)` methods, where the parameter `v` defines the diameter\
    \ of the arc.\n\n### Dragging the Stage on the Desktop When a Title Bar Isn’t\
    \ Available\n\nThe `Stage` may be dragged on the desktop using its title bar,\
    \ but in the case where its `StageStyle` is `UNDECORATED` or `TRANSPARENT`, the\
    \ title bar isn’t available. To allow dragging in this circumstance, we added\
    \ the code shown in the following code snippet from Listing 2-1.\n\n```\n//when\
    \ mouse button is pressed, save the initial position of screen\nrootGroup.setOnMousePressed((MouseEvent\
    \ me) -> {\n    dragAnchorX = me.getScreenX() - stageRef.getX();\n    dragAnchorY\
    \ = me.getScreenY() - stageRef.getY();\n});\n\n//when screen is dragged, translate\
    \ it accordingly\nrootGroup.setOnMouseDragged((MouseEvent me) -> {\n    stageRef.setX(me.getScreenX()\
    \ - dragAnchorX);\n    stageRef.setY(me.getScreenY() - dragAnchorY);\n});\n```\n\
    \nEvent handlers are covered a little later in the chapter, but as a preview,\
    \ the lambda expression that is supplied to the `onMouseDragged()` method is called\
    \ when the mouse is dragged. As a result, the values of the `x` and `y` properties\
    \ are altered by the number of pixels that the mouse was dragged, which moves\
    \ the `Stage` as the mouse is dragged.\n\n### Using UI Layout Containers"
