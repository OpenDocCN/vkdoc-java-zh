  raw: 'The playPauseButton is also given an ID that is used by the application’s
    style sheet to apply additional styles to the button. These styles make the button’s
    background completely transparent unless the mouse is currently hovering over
    it. In that case, a translucent background is applied to give the user some visual
    feedback that the button is live.


    These styles are shown in the following code fragment.


    #playPauseButton {


    -fx-background-color: transparent;


    }


    #playPauseButton:hover {


    -fx-background-color: rgb(255, 255, 255, 0.1);


    }


    To switch the icon of the playPauseButton based on the state of the MediaPlayer,
    we need to listen to the MediaPlayer’s status property. Unfortunately, the status
    property is not updated on the JavaFX application thread, so we cannot bind the
    button’s icon directly to the property. Doing so would violate JavaFX’s threading
    rules and could lead to “undefined behavior.”


    ■ **Caution** the status and currentTime properties are updated by the MediaPlayer
    and, as of JavaFX version 2.0.2, these updates do not occur on the JavaFX application
    thread. therefore, you cannot bind to these properties or use them in binding
    expressions that affect live scene graph nodes. doing so will result in strange
    bugs or exceptions because this violates the threading conventions of JavaFX.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 9 ■ Using the Media Classes


    The solution is to attach a listener to the property and use the Platform.runLater
    method to trigger updates on the application thread. This code is shown in Listing
    9-17.


    ***Listing 9-17.*** Listening to Status Property Changes to Update the Scene Graph
    private class StatusListener implements InvalidationListener {


    @Override


    public void invalidated(Observable observable) {


    Platform.runLater(() -> {


    updateStatus(songModel.getMediaPlayer().getStatus());


    });


    }


    }


    private void updateStatus(Status newStatus) {


    if (newStatus == Status.UNKNOWN || newStatus == null) {


    controlPanel.setDisable(true);


    positionSlider.setDisable(true);


    statusLabel.setText("Buffering");


    } else {


    controlPanel.setDisable(false);


    positionSlider.setDisable(false);


    statusLabel.setText(newStatus.toString());


    **if (newStatus == Status.PLAYING) {**


    **playPauseIcon.setImage(pauseImg);**


    **} else {**


    **playPauseIcon.setImage(playImg);**


    **}**


    }


    }


    The StatusListener inner class is an InvalidationListener that, once added to
    a MediaPlayer’s status property, will be notified whenever the status property
    changes. Its job is to call out to the private updateStatus method of its enclosing
    class on the JavaFX application thread. This makes it safe to update live scene
    graph nodes from within the updateStatus method. One of those updates is to set
    the image of the playPauseIcon (an ImageView node) as shown by the code that is
    highlighted within the updateStatus method.


    We also update the text of the statusLabel that is used as the status display
    (refer back to Figure [9-5](#index_split_005.html#p398)) as well as enable or
    disable the playback controls and the position slider any time the status changes.
    If the MediaPlayer’s status is UNKNOWN or null, the player is not ready to begin
    playback and we indicate this status by displaying the “Buffering”


    string and disabling the playback controls. Any other MediaPlayer status will
    result in its name being displayed and the playback controls being enabled.


    The status display is shown as a text string with a border around it. This is
    accomplished simply by using a Label control with some extra styling, which is
    shown in the following code.


    .statusDisplay {


    -fx-border-color: white;


    -fx-border-radius: 2;


    -fx-border-width: 1;


    -fx-text-fill: white;


    -fx-font-size: 10pt;


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 9 ■ Using the Media Classes


    The final piece of the playback puzzle is to stop the playback once the media
    end. MediaPlayer does not stop playback automatically when the end of the media
    is reached (technically, when the stopTime is reached; more on that in the “Seeking”
    section). You can stop playback explicitly by setting the MediaPlayer’s onEndOfMedia
    callback property to a Runnable that invokes the stop method on the MediaPlayer.


    songModel.getMediaPlayer().setOnEndOfMedia(() -> {


    songModel.getMediaPlayer().stop();


    });


    Calling MediaPlayer’s stop method will set the status to STOPPED and reset the
    playback position to the start of the media by setting currentTime to 0.


    ■ **Note** it might seem a little odd that all of the MediaPlayer callback properties
    such as onEndOfMediaProperty, onError, and onReadyProperty are Runnables rather
    than EventHandlers as is done in the rest of the JavaFX api.


    the JavaFX team at Oracle has indicated that this was merely an oversight.


    As a final note on playback, MediaPlayer also contains a property named autoPlay.
    This Boolean property will cause playback to start as soon as possible if it is
    set to true. Occasionally it is a little too aggressive and we have found that
    playback will sometimes pause or even restart after a second or two when using
    this feature with audio files. Therefore we recommend that the play method be
    used in normal circumstances and that autoPlay only be used in situations where
    potential glitches in playback are not a serious concern and you just want to
    “fire and forget” the playback.


    Seeking


    The read-only property named currentTime always contains the MediaPlayer’s current
    playback position. This property is of type Duration and can be set only by using
    the seek method. You can use the seek method to move the playback position to
    any time between the current startTime and stopTime. MediaPlayer’s startTime and
    stopTime properties are initialized to 0 and totalDuration, respectively, where
    the totalDuration property, also read-only, specifies the total length of the
    media. The seek method has no effect if the MediaPlayer is currently in the STOPPED
    state.


    Three controls in the audio player application make use of the seek functionality
    of the MediaPlayer. Perhaps the most obvious are the “seek to beginning” and “seek
    to end” buttons that are located on each side of the playPauseButton. These buttons
    show icons that consist of double triangles pointing to the left (seek to beginning)
    and right (seek to end). Listing 9-18 shows the createControlPanel method from
    the PlayerControlsView class in which these buttons are created.


    ***Listing 9-18.*** Creating the Panel Containing the Play/Pause Button and the
    Seek Buttons private Node createControlPanel() {


    final HBox hbox = new HBox();


    hbox.setAlignment(Pos.CENTER);


    hbox.setFillHeight(false);


    final Button playPauseButton = createPlayPauseButton();


    final Button seekStartButton = new Button();


    seekStartButton.setId("seekStartButton");


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 9 ■ Using the Media Classes


    seekStartButton.setOnAction(event -> {


    seekAndUpdatePosition(Duration.ZERO);


    });


    final Button seekEndButton = new Button();


    seekEndButton.setId("seekEndButton");


    seekEndButton.setOnAction(event -> {


    final MediaPlayer mediaPlayer = songModel.getMediaPlayer();


    final Duration totalDuration = mediaPlayer.getTotalDuration();


    final Duration oneSecond = Duration.seconds(1);


    seekAndUpdatePosition(totalDuration.subtract(oneSecond));


    });


    hbox.getChildren().addAll(seekStartButton, playPauseButton, seekEndButton);


    return hbox;


    }


    private void seekAndUpdatePosition(Duration duration) {


    final MediaPlayer mediaPlayer = songModel.getMediaPlayer();


    if (mediaPlayer.getStatus() == Status.STOPPED) {


    mediaPlayer.pause();


    }


    mediaPlayer.seek(duration);


    if (mediaPlayer.getStatus() != Status.PLAYING) {


    updatePositionSlider(duration);


    }


