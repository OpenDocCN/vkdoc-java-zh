    从命令行编译和运行


    我们通常使用 IDE 来构建和运行 JavaFX 程序，但为了揭开整个过程的神秘面纱，我们首先使用命令行工具。


    ■ **注意** 对于本练习，与本书中大多数其他练习一样，你需要源代码。如果你不想将源代码输入到文本编辑器中，可以从代码下载站点获取本书所有示例的源代码。有关该站点的位置，请参阅本章末尾的资源部分。


