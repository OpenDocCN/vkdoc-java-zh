  raw: 'To create a ScatterChart, we need to create an xAxis and a yAxis. In our first
    simple implementation, we use two instances of NumberAxis for this:


    NumberAxis xAxis = new NumberAxis();


    NumberAxis yAxis = new NumberAxis();


    Apart from calling the following ScatterChart constructor, there is nothing different
    in this method than in the case of the PieChart.


    ScatterChart scatterChart = new ScatterChart(xAxis, yAxis);


    Improving the Simple Implementation


    One of the first observations when looking at Figur[e 8-5](#index_split_004.html#p359)
    is that all data plots in a series are almost rendered on top of each other. The
    reason for this is clear: the x-Axis starts at 0 and ends at 2250\. By default,
    the NumberAxis determines its range automatically. We can overrule this behavior
    by setting the autoRanging property to false, and by providing values for the
    lowerBound and the upperBound. If we replace the constructor for the xAxis in
    the original example by the following code snippet,


    NumberAxis xAxis = new NumberAxis();


    xAxis.setAutoRanging(false);


    xAxis.setLowerBound(2011);


    xAxis.setUpperBound(2021);


    the resulting output will look similar to that shown in Figure [8-7](#index_split_004.html#p364).


    ***Figure 8-7.** Defining the behavior of the xAxis*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 124](index-365_1.jpg)


    Chapter 8 ■ Creating Charts in JavaFX


    Next, we want to add a title to the chart, and we want to have names near the
    symbols in the legend node. Adding a title to the chart is no different from adding
    a title to the PieChart and is achieved by the code: scatterChart.setTitle("Speculations");


    By adding a name to the three instances of XYChart.Series, we add labels to the
    symbols in the legend node.


    The relevant part of the getChartData method becomes


    Series<Integer, Double> java = new Series<>();


    Series<Integer, Double> c = new Series<>();


    Series<Integer, Double> cpp = new Series<>();


    java.setName("java");


    c.setName("C");


    cpp.setName("C++");


    Running the application again after applying both changes results in output similar
    to that shown in Figur[e 8-8](#index_split_004.html#p365).


    ***Figure 8-8.** ScatterChart with a title and named symbols*


    Until now, we used a NumberAxis for the xAxis. Inasmuch as years can be represented
    as Number instances, that works. However, because we don’t do any numerical operation
    on the years, and because the distance between consecutive data entries is always
    one year, we can also use a String value to represent this information.


    We now modify the code to work with a CategoryAxis for the xAxis. Changing the
    xAxis from a NumberAxis to a CategoryAxis also implies that the getChartData()
    method should return an instance of ObservableList<XYChart.Series<String, Double>>and
    that implies that the different elements in a single Series should have the type
    XYChart.Data<String, Double>.


    In Listing 8-6, the original code has been modified to use the CategoryAxis.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


