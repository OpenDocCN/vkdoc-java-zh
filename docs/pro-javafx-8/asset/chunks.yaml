    media API. All you have to do is point a Media object to an HTTP resource and
    attach it to a MediaPlayer with autoPlay set to true. If, however, you are interested
    in monitoring the progress of the download buffer, you can use the bufferProgressTime
    property in the MediaPlayer class. When data are loaded from a stream or from
    disk, the amount of time those data will take to play is calculated and this time
    is regularly updated as the value of bufferProgressTime. By binding to this property,
    you can receive these updates and effectively monitor the media’s buffer.


    The final two MediaPlayer properties we discuss are the rate and currentRate properties.
    Calling setRate allows you to control the rate of the playback. Passing a parameter
    of 1.0 will cause playback to proceed at the normal rate. A parameter of 2.0 would
    cause your media to be played at twice the normal rate. You can pass any value
    between 0.0 and 8.0\. The currentRate property always reflects the actual rate
    of playback, regardless of the value of the rate property. For example, if playback
    is currently stalled, currentRate will be 0.0 even though rate may be set to 4.0.


    Playing Video


    From an API standpoint, playing video instead of audio is as simple as wrapping
    a MediaPlayer with a MediaView and adding the MediaView to the scene graph. Listing
    9-31 shows how this is done. You simply point a Media object at a valid source
    (a Flash movie in this case) and wrap it with an auto-playing MediaPlayer, which,
    in turn, is wrapped with a MediaView. The final step is to add the MediaView to
    the scene and set the size of the scene to match the size of the movie.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 9 ■ Using the Media Classes


    ***Listing 9-31.*** A Minimalist but Functional Movie Player


    public class VideoPlayer1 extends Application {


    public static void main(String[] args) {


    launch(args);


    }


    @Override


    public void start(Stage primaryStage) {


    String workingDir = System.getProperty("user.dir");


    File f = new File(workingDir, "../media/omgrobots.flv");


    Media m = new Media(f.toURI().toString());


    MediaPlayer mp = new MediaPlayer(m);


    MediaView mv = new MediaView(mp);


    StackPane root = new StackPane();


    root.getChildren().add(mv);


    primaryStage.setScene(new Scene(root, 960, 540));


    primaryStage.setTitle("Video Player 1");


    primaryStage.show();


    mp.play();


    }


    }


    This example loads the video file from the file system. Loading video from the
    Internet using an HTTP URL will work just as well, but it is not advisable to
    package movies of any significant size inside your jar file because that will
    drastically increase the size of your application. Once we have our file URL,
    everything becomes familiar. You use the URL to create the Media object and wrap
    that Media object in a MediaPlayer. The only new step is to construct a MediaView
    node using the MediaPlayer as the constructor argument and add it to the root
    of our scene graph, a StackPane in this case. We create a Scene that is sized
    to fit the dimensions of our movie, then pass it to the stage and show it. The
    final step is to start the movie playing with the same familiar call to MediaPlayer’s
    play method. Figure [9-9](#index_split_005.html#p420)


    shows this simple movie player in action.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 142](index-420_1.jpg)


    Chapter 9 ■ Using the Media Classes


    ***Figure 9-9.** Playing a robot movie in JavaFX*


    Everything you’ve learned up to this point about playing audio with Media and
    MediaPlayer also applies to playing video with MediaView. There are only a few
    extra concepts that you need to know.


    Controlling the Size of a MediaView


    MediaView is just another node in the scene graph, so it is possible to scale
    its content using the usual transforms or the scaleX and scaleY properties of
    the Node class. There are more convenient ways to get the job done when dealing
    with MediaViews, however. The properties fitWidth and fitHeight can be used to
    make the MediaView stretch or shrink to the desired size. Using only one of them
    at a time will make the MediaView scale only in that dimension while the size
    in the other dimension remains unchanged.


    If you want to maintain the movie’s original aspect ratio as you scale it to fit
    your application, you can set the preserveRatio property to true. If you specify
    a fit size in one dimension along with setting preserveRatio to true, the other
    dimension will be automatically scaled to match the movie’s original aspect ratio
