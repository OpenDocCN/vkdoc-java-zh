    **第2章 ■ 在JavaFX中创建用户界面**


    ***图2-9.** `MetronomeTransition`程序*


    此示例与之前（`Metronome1`）示例的第一个显著区别是，我们不再让一条线的一端来回移动，而是让一个`Circle`节点来回移动。


    ### MetronomeTransition程序的行为


    运行该程序，并执行与之前`Metronome1`练习中相同的步骤。


