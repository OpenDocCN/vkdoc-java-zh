    \ that implements this logic is shown in Listing 9-16.\n\n**Listing 9-16.** The\
    \ Logic Behind the Play/Pause Button\n\n```\nprivate Button createPlayPauseButton()\
    \ {\n    URL url = getClass().getResource(\"resources/pause.png\");\n    pauseImg\
    \ = new Image(url.toString());\n    url = getClass().getResource(\"resources/play.png\"\
    );\n    playImg = new Image(url.toString());\n    playPauseIcon = new ImageView(playImg);\n\
    \    final Button playPauseButton = new Button(null, playPauseIcon);\n    playPauseButton.setId(\"\
    playPauseButton\");\n    playPauseButton.setOnAction((ActionEvent arg0) -> {\n\
    \        final MediaPlayer mediaPlayer = songModel.getMediaPlayer();\n       \
    \ if (mediaPlayer.getStatus() == MediaPlayer.Status.PLAYING) {\n            mediaPlayer.pause();\n\
    \        } else {\n            mediaPlayer.play();\n        }\n    });\n    return\
    \ playPauseButton;\n}\n```\n\nThe first step in creating the `playPauseButton`\
    \ is to load the two images that will serve as the button’s icons. The `playPauseIcon`,\
    \ an `ImageView`, is then initialized with the play `Image`. This `ImageView`\
