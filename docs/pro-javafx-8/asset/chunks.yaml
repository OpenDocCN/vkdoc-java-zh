    一旦你习惯了 ScalaFX 语法，它就会变得非常自然。通常，如果你直接引用一个属性，你将访问到完整的属性对象，该对象拥有用于绑定、监听器等所有方法。然而，如果你在属性名后加上括号，你将获取（或设置）属性的值。


