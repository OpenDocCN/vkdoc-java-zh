    理解默认属性和静态属性


    许多 JavaFX 类都有一个默认属性。*默认属性* 通过在类上使用 `@DefaultProperty` 注解来指定。`@DefaultProperty`
    注解属于 `javafx.beans` 包。例如，`javafx.scene.Group` 类的默认属性是其 `children` 属性。在 FXML 文件中，当通过子元素指定默认属性时，可以省略默认属性本身的开始和结束标签。例如，您在清单
    3-1 中看到的以下代码片段：


    <HBox fx:id="titleBox">


    <children>


    <Label fx:id="titleLabel"


    text="title"/>


    <TextField fx:id="titleTextField"


    text="Stage Coach"/>


    </children>


    </HBox>


    可以简化为：


    <HBox fx:id="titleBox">


    <Label fx:id="titleLabel"


    text="title"/>


    <TextField fx:id="titleTextField"


    text="Stage Coach"/>


    </HBox>


    *静态属性* 是一种属性，它不是通过调用对象本身的 setter 方法来设置，而是通过调用另一个类的静态方法，将对象和属性值作为参数传递来设置。许多 JavaFX
    的容器节点都有这样的静态方法。这些方法在将节点添加到容器之前被调用，以影响某些结果。静态属性在 FXML 文件中表示为内部对象（作为第一个参数传递给静态方法的对象）上的属性，其名称包含由点分隔的类名和静态方法名。您可以在清单
    3-4 中看到一个静态属性的示例：


    <WebView fx:id="webView"


    prefHeight="200.0"


    prefWidth="200.0"


    VBox.vgrow="ALWAYS"/>

