- fmt: "# JavaFX 并发与线程\n\nJavaFX 也不例外，事实上 JavaFX 中的所有 UI 事件都在 *JavaFX Application\
    \ Thread* 中处理。然而，随着近年来多核桌面计算机变得普遍（例如，我在我的四核 PC 上编写本章），JavaFX 的设计者自然希望通过利用 Java\
    \ 编程语言出色的并发支持来充分发挥硬件的全部能力。\n\n在本节中，我们将研究所有 JavaFX 应用程序中都存在的重要线程。我们解释它们在 JavaFX\
    \ 应用程序整体方案中所扮演的角色。然后，我们将注意力转向 JavaFX Application Thread，解释为什么在 JavaFX Application\
    \ Thread 中执行长时间运行的代码会使您的应用程序看起来挂起。最后，我们研究 `javafx.concurrent` 框架，并向您展示如何使用它在 JavaFX\
    \ Application Thread 之外的工作线程中执行长时间运行的代码，并将结果传回 JavaFX Application Thread 以更新 GUI\
    \ 状态。\n\n> **注意**：如果您熟悉 Swing 编程，JavaFX Application Thread 类似于 Swing 的 Event Dispatcher\
    \ Thread（EDT），通常名称为“`AWT-EventQueue-0`”。\n\n## 识别 JavaFX 应用程序中的线程\n\n清单 7-7 中的程序创建了一个简单的\
    \ JavaFX GUI，包含一个 `ListView`、一个 `TextArea` 和一个 `Button`，并用应用程序所有活动线程的名称填充 `ListView`。当您从\
    \ `ListView` 中选择一个项目时，该线程的堆栈跟踪会显示在 `TextArea` 中。线程和堆栈跟踪的初始列表在应用程序启动时填充。您可以通过单击\
    \ Update 按钮来更新线程和堆栈跟踪列表。\n\n***Listing 7-7.*** `JavaFXThreadsExample.java`\n\n\
    ```java\nimport javafx.application.Application;\n\nimport javafx.beans.value.ChangeListener;\n\
    \nimport javafx.beans.value.ObservableValue;\n\nimport javafx.collections.FXCollections;\n\
    \nimport javafx.collections.ObservableList;\n\nimport javafx.event.ActionEvent;\n\
    \nimport javafx.event.EventHandler;\n\nimport javafx.geometry.Insets;\n\nimport\
    \ javafx.scene.Scene;\n\nimport javafx.scene.control.Button;\n\nimport javafx.scene.control.ListView;\n\
