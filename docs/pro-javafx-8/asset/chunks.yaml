    light = new PointLight(Color.WHITE);


    Group group = new Group(sphere, light);


    group.setTranslateY(240);


    group.setTranslateX(320);


    scene = new Scene(group, 640, 480);


    }


    }


    }


    In this program, we let a white light shine on a sphere with a diffuse color of
    blue and a specular color of light blue with a specular power of 10\. The default
    specular power in PhongMaterial is 32.0. Therefore our sphere does not have as
