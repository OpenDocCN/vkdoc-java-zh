  raw: 'The default value is 30 degrees. The verticalFieldOfView is a boolean property
    that determines if the field of view property applies to the vertical dimension
    of the projection plane. The isFixedEyeAtCameraZero() method returns the fixedEyeAtCameraZero
    flag the PerspectiveCamera is constructed with.


    The PerspectiveCamera also inherits two double properties from the Camera abstract
    class: nearClip and farClip. Objects closer to the eye than nearClip and objects
    farther from the eye than farClip are not rendered in the scene.


    In the program in Listing 10-5, we create a Box and a PerspectiveCamera. Unlike
    in previous examples where we transform the 3D objects themselves like the Box,
    in this program we keep the Box fixed and transform the PerspectiveCamera with
    a combination of rotating around the *x* axis, rotating around the *y* axis, and
    a translation along the *z* axis. We animate the rotation degrees from 90 to –90
    and the *z* translation from –20 to –80 in a five-second Timeline.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


