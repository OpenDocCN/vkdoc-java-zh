    Chapter 5 ■ Building dynamiC ui layouts in JavaFX


    Some points to highlight about Listing 5-5 include the following:


    • Both getScore and getTurnsRemaining return bindings that will automatically
    recalculate their values when the turn and board state change.


    • The getScore method uses a SimpleIntegerProperty as a bound aggregator to sum
    the total number of cells belonging to the owner.


    • The getTurnsRemainingMethod uses a conditional binding and bound arithmetic
    to calculate the number of remaining turns for a given owner.


    Now that we have the model functions created, we can use them to build a JavaFX
    UI class that shows each player’s score. Because we need to create the same UI
    components twice, this is a good time to raise the abstraction level of the UI
    by creating functions that create portions of the UI. This lets us reuse the same
    score box for both players.'
