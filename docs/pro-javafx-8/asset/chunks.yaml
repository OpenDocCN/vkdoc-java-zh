    默认构造方法创建一个默认颜色为 `Color.WHITE` 的 `PointLight`。单参数构造方法创建一个具有指定颜色的 `PointLight`。除了从
    `LightBase` 类继承的方法外，`PointLight` 类没有额外的公共方法。


    清单 10-6 中的程序演示了在 JavaFX 3D 场景中使用光照。两个 `PointLight`（一个红色，一个蓝色）被添加到一个已包含一个 `Box`
    和一个 `PerspectiveCamera` 的场景中。窗口底部添加了一个带有滑块的控制面板，可以改变两个光源的坐标，以便您观察光源位于不同位置时的效果。


