    \nThe `xAxis` ranges from 20110 to 20201, but of course we want to show the years\
    \ at the axis. This can be achieved by calling:\n\n```\nxAxis.setTickLabelFormatter(new\
    \ StringConverter<Number>() {\n    ...\n}\n```\n\nwhere the `StringConverter`\
    \ we supply converts the numbers we use (e.g., 20150) to Strings (e.g., 2015)\
