- fmt: '# The Preview Menu


    The `Preview` menu is shown in Figure [3-18](#index_split_001.html#p135).


    ***Figure 3-18.** The Preview menu*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 55](index-136_1.jpg)


    Chapter 3 ■ Using SceneBuilder to Create a User Interface


    The `Show Preview in Window` menu item allows you to preview the scene in a live
    window to see how it works in real life. This is the most useful menu item because
    you will be using it many times. The `JavaFX Theme` submenu contains various themes
    that you can preview the scene with. The `Scene Style Sheets` submenu contains
    items that allow you to add, remove, or edit a style sheet that is applied to
    the scene during the preview. The `Internationalization` submenu contains items
    that allow you to add, remove, or edit a resource bundle that is used during the
    preview. The `Preview Size` submenu contains items for the preferred screen size
    during the preview.


    The `Window` menu allows you to switch between multiple FXML files that are being
    edited at the same time.


    The `Help` menu shows the online help and the about box for JavaFX SceneBuilder.


    # Understanding the Library Panel


    The `Library Panel` lives in the top portion of the `Left Panel`, and can be hidden
    using the `View ➤ Hide Library` menu item. It holds the containers and nodes that
    you can use to build a UI. Figure [3-19](#index_split_001.html#p136) shows the
    `Library Panel` with its `Containers` drawer open, showing some of the containers.
    You can click on the other drawers to see what they contain.


    Figure [3-20](#index_split_001.html#p137) shows the `Library Panel` with its `Controls`
    drawer open, showing some of the controls.


    ***Figure 3-19.** The Library Panel with its Containers drawer open*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 56](index-137_1.jpg)


    Chapter 3 ■ Using SceneBuilder to Create a User Interface


    ***Figure 3-20.** The Library Panel with its Controls drawer open*


    There is a search box at the top of the `Library Panel`. You can type in the name
    of a container or a control or something that belongs to one of the other drawers
    into the search box. As you type, the `Library Panel` will change its display
    from the accordion arrangement to a single list with all the nodes whose names
    match the name entered in the search box. This allows you to find a node by name
    quickly without having to go through the drawers one by one.


    Figure [3-21](#index_split_001.html#p138) shows the `Library Panel` in search
    mode. To exit search mode, simply click on the `x` mark on the right end of the
    search box.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 57](index-138_1.jpg)


    Chapter 3 ■ Using SceneBuilder to Create a User Interface


    ***Figure 3-21.** The Library Panel in search mode*


    Once a container or a node is found, you can drag it to the `Content Panel`, drag
    it to the `Hierarchy` tree in the `Document Panel`, or double-click it. Bringing
    containers to the `Content Panel` and then populating the containers with controls
    and other nodes is how you build up a UI in the JavaFX SceneBuilder.


    To the right of the search box is a menu button that contains several menu items
    and a submenu that alters the `Library Panel`''s behavior. Figure [3-22](#index_split_001.html#p139)
    shows what is available in this menu button. The `View as List` menu item changes
    the `Library Panel` from displaying its nodes in several sections into displaying
    its nodes all together without sections. The `View as Sections` changes the `Library
    Panel` from displaying its nodes in one list into displaying its nodes in several
    sections. The `Import JAR/FXML File` menu item allows you to import an external
    jar file or FXML file into JavaFX SceneBuilder as a custom component. The `Import
    Selection` menu item allows you to import the currently selected nodes into JavaFX
    SceneBuilder as custom components. The `Custom Library Folder` submenu contains
    two menu items. The `Reveal in Explorer` menu item opens the folder that holds
    the custom components in the operating system''s File Explorer (or Finder), allowing
    you to remove any imported custom libraries. The `Show JAR Analysis Report` menu
    item displays a report showing JavaFX SceneBuilder''s assessment of the imported
    jar files.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 58](index-139_1.jpg)


    Chapter 3 ■ Using SceneBuilder to Create a User Interface


    ***Figure 3-22.** The Library Panel with its menu open*


    To illustrate the importing of a custom component into JavaFX SceneBuilder, we
    package the class files and the FXML file from the `CustomComponent` example from
    the last section into a `CustomComponent.jar` file. We then invoke the `Import
    JAR/FXML File` menu item, navigate to the directory, and select the `CustomComponent.jar`
    file to import. As soon as we click the `Open` button in the file selection dialog
    box, JavaFX SceneBuilder opens the `Import` dialog box, shown in Figure [3-23](#index_split_001.html#p140).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 59](index-140_1.jpg)


    Chapter 3 ■ Using SceneBuilder to Create a User Interface


    ***Figure 3-23.** The Import dialog for importing CustomComponent.jar*


    We can examine each custom component included in the jar file by clicking the
    custom component name in the list on the left. Information about the selected
    custom component, including a visual representation of the custom component, is
    displayed on the right side of the screen. We can select which custom components
    to import by selecting the check box by the name of the component. We then click
    the `Import Component` button to finish the importing process. After importing,
    the `ProdId` custom component shows up in the `Library Panel`''s `Custom` section,
    and can be added to any further UIs that are built.


    # Understanding the Document Panel


    The `Document Panel` lives in the bottom portion of the `Left Panel`, and can
    be hidden using the `View ➤ Hide Document` menu item. It holds two sections. The
    `Hierarchy` section displays a tree view of all the nodes that are added to the
    `Content Panel`, organized by the containment relationship. Because the layout
    of the nodes in the `Content Panel` might make it tricky to select a node from
    the `Content Panel`, it might be easier to make the selection in the `Hierarchy`
    section in the `Document Panel`.


    Figure [3-24](#index_split_001.html#p141) shows the `Hierarchy` section of the
    `Document Panel` for the FXML file in the `FXMLLoaderExample` in Listing 3-4.
    You can see the expanded node tree with the `WebView` node selected.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 60](index-141_1.jpg)


    ![Image 61](index-141_2.jpg)


    Chapter 3 ■ Using SceneBuilder to Create a User Interface'
