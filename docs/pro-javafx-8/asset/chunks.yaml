    **Chapter 13**


    **JavaFX Languages and Markup**


    *Computer programming is tremendous fun. Like music, it is a skill that derives
    from an unknown* *blend of innate talent and constant practice. Like drawing,
    it can be shaped to a variety of ends—*


    *commercial, artistic, and pure entertainment. Programmers have a well-deserved
    reputation for* *working long hours, but are rarely credited with being driven
    by creative fevers. Programmers* *talk about software development on weekends,
    vacations, and over meals not because they lack* *imagination, but because their
    imagination reveals worlds that others cannot see.*


    —Larry O’Brien and Bruce Eckel


    JavaFX provides a rich set of capabilities for building applications that lets
    you create immersive UIs that go beyond what you can accomplish with traditional
    UI toolkits. However, it does not stop there, because JavaFX sits on top of the
    Java language, so you can also take full advantage of all the languages and tools
    that have been developed for the Java platform. Also, JavaFX comes with FXML,
    its own UI declaration language written in XML, which is quite powerful in its
    own right.


    In this chapter we show how you can leverage different languages and markup to
    create great-looking JavaFX


    UIs with less code. The wonderful thing about all the languages and capabilities
    discussed in this chapter is that it is your choice. You can continue to build
    JavaFX applications in pure Java using the imperative style, or you can take advantage
    of your favorite JVM language. Who knows? You might even become a convert to one
    of the languages discussed in this chapter based on its usage for JavaFX alone.


    A Quick Comparison of Alternative Languages


    To give you an idea of the power and expressiveness of using different JVM languages,
    we start out by taking a simple example and showing it in six different representations.
    The example is an extension of the Colorful Circles application designed by Jasper
    Potts from the JavaFX team. It is a great example of shapes, animation, and effects
    in a very small amount of code, and we have adapted it to show binding and interactivity
    as well. The running Vanishing Circles application is shown in Figure [13-1](#index_split_007.html#p549).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 185](index-549_1.jpg)


    Chapter 13 ■ JavaFX Languages and Markup


    ***Figure 13-1.** The Vanishing Circles application demonstrating JavaFX effects,
    animation, and interaction* Vanishing Circles in Java


    To start with, let’s show the code in standard Java imperative style. This is
    the most verbose way of writing JavaFX


    code, but it is also the most straightforward for anyone familiar with the Java
    programming language and earlier UI toolkits such as Swing. The full code listing
    for writing this example is shown in Listing 13-1.


    ***Listing 13-1.*** Vanishing Circles Application Written in Imperative Java Style
    public class VanishingCircles extends Application {


    public static void main(String[] args) {


    launch(args);


    }


    @Override


    public void start(Stage primaryStage) {


    primaryStage.setTitle("Vanishing Circles");


    Group root = new Group();


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 13 ■ JavaFX Languages and Markup


    Scene scene = new Scene(root, 800, 600, Color.BLACK);


    List<Circle> circles = new ArrayList<>();


    for (int i = 0; i < 50; i++) {


    final Circle circle = new Circle(150);


    circle.setCenterX(Math.random() * 800);


    circle.setCenterY(Math.random() * 600);


    circle.setFill(new Color(Math.random(), Math.random(), Math.random(), .2));


    circle.setEffect(new BoxBlur(10, 10, 3));


    circle.addEventHandler(MouseEvent.MOUSE_CLICKED, e -> {


    KeyValue collapse = new KeyValue(circle.radiusProperty(), 0);


    new Timeline(new KeyFrame(Duration.seconds(3), collapse)).play();


    });


    circle.setStroke(Color.WHITE);


    circle.strokeWidthProperty().bind(Bindings


    .when(circle.hoverProperty())


    .then(4)


    .otherwise(0));


    circles.add(circle);


    }


    root.getChildren().addAll(circles);


    primaryStage.setScene(scene);


    primaryStage.show();


    Timeline moveCircles = new Timeline();


    circles.stream().forEach(circle -> {


    KeyValue moveX = new KeyValue(circle.centerXProperty(), Math.random() * 800);


    KeyValue moveY = new KeyValue(circle.centerYProperty(), Math.random() * 600);


    moveCircles.getKeyFrames().add(new KeyFrame(Duration.seconds(40), moveX, moveY));


    });


    moveCircles.play();


    }


    }


    Although the code is fairly easy to understand, it is also quite verbose. The
    basic functionality can be summarized as follows.


    • Fifty circles of varying colors are overlaid with a transparent fill.


    • Those circles are animated in a semirandom pattern around the window.


    • When the mouse hovers over a circle, the circle gets surrounded by a white border.


    • Upon clicking a circle, it slowly shrinks and vanishes.


    In a very short amount of code this lets us demonstrate many different JavaFX
    features, including shapes, effects, animation, binding, streams, and event listeners
    using lambda expressions. In the next few examples we convert this exact application
    to several different languages and representations, letting you see how these
    features vary in each of the choices available to you.


