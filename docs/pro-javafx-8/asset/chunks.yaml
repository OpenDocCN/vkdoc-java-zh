  raw: 'once configured, you can right-click on any fXMl files in your projects in
    your ide and select the “edit with sceneBuilder”


    context menu item. of course, you can also use your ide’s XMl file editing capabilities
    to edit fXMl files as XMl files.


    Setting the Stage with FXML


    The process of converting the StageCoach program in Chapter 2 from using a programmatically
    created UI to using a declaratively created UI is straightforward.


    Creating a User Interface Graphically with JavaFX SceneBuilder


    We first created an FXML file that represented the root node of the scene with
    JavaFX SceneBuilder. Figure [3-1](#index_split_000.html#p84) shows a screenshot
    as this UI is being created.


