    Now that you’ve had some experience with using the `Stage` and `Scene` classes,
    several of the `Node` subclasses, and CSS styling, we show you how to handle events
    that can occur when your JavaFX program is running.


    ## Handling Input Events


    So far we’ve shown you a couple of examples of event handling. For example, we
    used the `onAction` event handler to execute code when a button is clicked. We
    also used the `onCloseRequest` event handler of the `Stage` class to execute code
    when the `Stage` has been requested externally to close. In this section, we explore
    more of the event handlers available in JavaFX.


    ### Surveying Mouse, Keyboard, Touch, and Gesture Events and Handlers


    Most of the events that occur in JavaFX programs are related to the user manipulating
    input devices such as a mouse, a keyboard, or a multitouch screen. To see the
    available event handlers and their associated event objects, we take yet another
    look at the JavaFX API documentation. First, navigate to the `javafx.scene.Node`
    class and look for the properties that begin with the letters `on`. These properties
    represent the event handlers common to all nodes in JavaFX. Here is a list of
    these event handlers in the JavaFX 8 API:


    - Key event handlers: `onKeyPressed`, `onKeyReleased`, `onKeyTyped`

    - Mouse event handlers: `onMouseClicked`, `onMouseDragEntered`, `onMouseDragExited`,
    `onMouseDragged`, `onMouseDragOver`, `onMouseDragReleased`, `onMouseEntered`,
    `onMouseExited`, `onMouseMoved`, `onMousePressed`, `onMouseReleased`

    - Drag-and-drop handlers: `onDragDetected`, `onDragDone`, `onDragDropped`, `onDragEntered`,
    `onDragExited`, `onDragOver`

    - Touch handlers: `onTouchMoved`, `onTouchPressed`, `onTouchReleased`, `onTouchStationary`

    - Gesture handlers: `onRotate`, `onRotationFinished`, `onRotationStarted`, `onScroll`,
    `onScrollStarted`, `onScrollFinished`, `onSwipeLeft`, `onSwipeRight`, `onSwipeUp`,
    `onSwipeDown`, `onZoom`, `onZoomStarted`, `onZoomFinished`


    Each of these is a property that defines a method to be called when particular
    input events occur. In the case of the key event handlers, as shown in the JavaFX
    API docs, the method’s parameter is a `javafx.scene.input.KeyEvent` instance.
    The method’s parameter for the mouse event handlers is a `javafx.scene.input.MouseEvent`.
    Touch handlers consume a `javafx.scene.input.TouchEvent` instance, and when a
    gesture event occurs, the method’s parameter for the handle event is an instance
    of `javax.scene.input.GestureInput`.


    ### Understanding the `KeyEvent` Class


    Take a look at the JavaFX API docs for the `KeyEvent` class, and you’ll see that
    it contains several methods, a commonly used one being `getCode()`. The `getCode()`
    method returns a `KeyCode` instance representing the key that caused the event
    when pressed. Looking at the `javafx.scene.input.KeyCode` class in the JavaFX
    API docs reveals that a multitude of constants exist that represent keys on an
    international set of keyboards. Another way to find out what key was pressed is
    to call the `getCharacter()` method, which returns a string that represents the
    unicode character associated with the key pressed.


    The `KeyEvent` class also enables you to see whether the `Alt`, `Ctrl`, `Meta`,
    and/or `Shift` keys were down at the time of the event by calling the `isAltDown()`,
    `isControlDown()`, `isMetaDown()`, or `isShiftDown()` methods, respectively.


