    ***Figure 8-17.** Adding variations in the size of the Bubbles*\n\n## Summary\n\
    \nThe JavaFX Chart API provides a number of ready-to-use implementations for different\
    \ chart types. Each of these implementations serves a different purpose, and it\
    \ is up to the developer to choose the most appropriate Chart.\n\nModifying a\
    \ Chart and tuning it for a specific application can be done by applying CSS rules\
    \ or by using Chart-specific methods or properties.\n\nIn case you need a more\
    \ customized Chart, you can extend the abstract `Chart` class and take advantage\
    \ of the existing properties on that class, or you can extend the abstract `XYChart`\
    \ class if your chart requires two axes.\n\n## Resources\n\nFor more information\
    \ on the JavaFX Chart API, consult the following resources:\n\n- [http://docs.oracle.com/javase/8/javafx/user-interface-tutorial/charts.htm](http://docs.oracle.com/javase/8/javafx/user-interface-tutorial/charts.htm)\n\
    - [http://docs.oracle.com/javase/8/javafx/user-interface-tutorial/css-styles.htm](http://docs.oracle.com/javase/8/javafx/user-interface-tutorial/css-styles.htm)\n\
    \n# Chapter 9\n\n# Using the Media Classes\n\n*We keep moving forward, opening\
    \ new doors, and doing new things, because we’re curious and curiosity keeps leading\
    \ us down new paths.*\n—Walt Disney\n\nIn the previous chapters you have learned\
    \ how to create applications using the JavaFX library. Now we make good use of\
    \ that knowledge while creating applications that explore the audio and video\
    \ capabilities of the JavaFX platform.\n\n## The Foundation\n\nSince JavaFX 2.0,\
    \ the media classes in JavaFX are based on an open source multimedia framework\
    \ named GStreamer[1](#index_split_004.html#p378).\n\nThis is a big change from\
    \ the media library in the early versions of JavaFX, where the native media capabilities\
    \ of the various supported platforms were used directly. In comparison, the GStreamer-based\
    \ library provides better stability and more consistency across platforms. The\
    \ latter should be seen in the light of the “Write Once, Run Anywhere” paradigm\
    \ of Java. In JavaFX 1, there were large differences between JavaFX Media applications\
    \ on different platforms.\n\nToday, the consistency has the drawback that in some\
    \ cases, fewer features are provided, but the different platforms provide the\
    \ same functionality.\n\n## Supported Media Formats\n\nTable [9-1](#index_split_004.html#p379)\
    \ shows the file formats that are supported by the JavaFX media classes. Four\
    \ audio formats and three video formats are supported. The four audio formats\
    \ supported in JavaFX (MP3, WAV, AIFF, and AAC) are very common and are all well\
    \ supported by most audio tools on the market. You should have no trouble obtaining\
    \ your source audio files in, or converting them to, one of the formats supported\
