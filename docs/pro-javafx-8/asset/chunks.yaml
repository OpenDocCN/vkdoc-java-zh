    Creating a **TabPane** and Defining Tabs


    One of the principles of UI design is called *progressive disclosure,* which states
    that a UI should reveal its functionality progressively rather than inundating
    the user with all of its functionality at once. The TabPane is a good example
    of this principle in use, as each tab discloses its functionality while hiding
    the functionality contained in the other tabs.


