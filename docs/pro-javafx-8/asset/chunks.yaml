    lessThanOrEqual


    •


    notEqual


    •


    notEqualIgnoreCase


    • Creation operators:


    •


    createBooleanBinding


    •


    createIntegerBinding


    •


    createLongBinding


    •


    createFloatBinding


    •


    createDoubleBinding


    •


    createStringBinding


    •


    createObjectBinding


    • Selection operators:select


    •


    selectBoolean


    •


    selectInteger


    •


    selectLong


    •


    selectFloat


    •


    selectDouble


    •


    selectString'
  trans: "\n清单 4-5 中的程序使用 Bindings 中的算术方法，通过以下公式计算笛卡尔平面上顶点为(x1, y1)、(x2, y2)、(x3,\
