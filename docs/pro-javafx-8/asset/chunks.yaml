- fmt: "# Chapter 13 ■ JavaFX Languages and Markup\n\n- *List access*: All JavaFX\
    \ `ObservableList`s are wrapped with a property to access the list that lets you\
    \ treat it as a Scala collection.\n- *API enhancements*: Some of the JavaFX APIs\
    \ were not designed with the Scala language and object-literal construction in\
    \ mind, so the API authors have taken some liberties in adding strategic enhancements.\n\
    \nFor most uses, you can actually ignore the fact that there is a parallel set\
    \ of classes, because the Scala implicits feature allows you to use them interchangeably.\
    \ Anywhere you have an API that expects a JavaFX class, you can pass in the ScalaFX\
    \ proxy and it will automatically get converted back to the JavaFX version. Similarly,\
    \ if you have an API that expects the ScalaFX version, there is a Scala implicit\
    \ conversion that will automatically wrap the JavaFX class in a ScalaFX proxy.\n\
    \nFor example, you can change the Hello ScalaFX code to use a JavaFX label directly\
    \ and the code will compile and run fine. The modified version is shown in Listing\
    \ 13-11.\n\n***Listing 13-11.*** Hello ScalaFX Application to Test Your Newly\
    \ Created Project\n\n```\nimport scalafx.Includes._\nimport scalafx.application.JFXApp\n\
    import scalafx.application.JFXApp.PrimaryStage\nimport scalafx.scene.Scene\nimport\
    \ javafx.scene.control.Label\n\nobject HelloScalaFXImplicits extends JFXApp {\n\
    \  stage = new PrimaryStage {\n    scene = new Scene {\n      content = new Label(\"\
    Hello ScalaFX Implicits\")\n    }\n  }\n}\n```\n\nNotice that we have changed\
    \ the import to the normal JavaFX one and used the standard constructor with a\
    \ `String` argument. Even though the `Scene` content is defined as a collection\
    \ of ScalaFX `Node`s, the Scala implicit kicks in and automatically converts the\
    \ JavaFX object to a ScalaFX proxy.\n\nThe ScalaFX implicit conversions require\
    \ that you import `scalafx.Includes._`, which has been the first line in all the\
    \ programs we have shown. This is a special syntax for Scala that is equivalent\
    \ to a static import in Java, and will automatically include several utility methods\
    \ and all the JavaFX to ScalaFX implicit conversions. For the purposes of ScalaFX\
    \ development, you should simply treat it as a preamble and include it on all\
    \ your ScalaFX source files.\n\n## JavaFX Properties in Scala\n\nAlthough we have\
    \ been using ScalaFX properties directly, we have not directly shown how they\
    \ work. In particular, notice the absence of the usual getter/setter pattern found\
    \ in JavaFX. This is possible because ScalaFX lets us override the behavior of\
    \ operators and assignment to substitute more efficient versions of the same operations.\
    \ To understand this, let’s take a look at the JavaFX property pattern again.\n\
    \nWhen creating properties for JavaFX in Java, each property definition consists\
    \ of one variable and three different accessor methods as shown again in Listing\
    \ 13-12.\n\n***Listing 13-12.*** JavaFX Property Pattern to Create New Properties\
    \ in Java\n\n```\nimport javafx.beans.property.SimpleStringProperty\nimport javafx.beans.property.StringProperty\n\
    \npublic class Person {\n  private StringProperty name;\n\n  public void setName(String\
    \ val) { nameProperty().set(val); }\n  public String getName() { return nameProperty().get();\
    \ }\n  public StringProperty nameProperty() {\n    if (name == null) {\n     \
    \ name = new SimpleStringProperty(this, \"name\");\n    }\n    return name;\n\
    \  }\n}\n```\n\nDirect access to the property is restricted to allow it to be\
    \ lazily created on the first use. The initialization occurs in the `nameProperty`\
    \ method if it is `null`, and then the `get` and `set` simply delegate the call\
    \ to the same named method on the property.\n\nIn ScalaFX, you get the same benefits\
    \ of lazy initialization in a single line, as shown in Listing 13-13.\n\n***Listing\
    \ 13-13.*** Simplified JavaFX Property Pattern Adapted Using ScalaFX APIs\n\n\
    ```\nimport scalafx.beans.property.StringProperty\n\nclass Person {\n  lazy val\
    \ name = new StringProperty(this, \"name\")\n  // this is optional, but supports\
    \ the object-literal construction pattern:\n}\n```"
