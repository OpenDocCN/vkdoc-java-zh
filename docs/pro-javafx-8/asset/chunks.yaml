    The net effect of these method signatures is that you can build up a binding that
    resembles an if/then/else expression this way:


    new When(b).then(x).otherwise(y)


    where b is an ObservableBooleanValue, and x and y are of similar types and can
    be either observable or unobservable. The resulting binding will be of a type
    similar to that of x and y.


    The program in Listing 4-7 uses the fluent interface API from the When class to
    calculate the area of a triangle with given sides a, b, and c. Recall that to
    form a triangle, the three sides must satisfy the following conditions: a + b
    > c, b + c > a, c + a > b.


    When the preceding conditions are satisfied, the area of the triangle can be calculated
    using Heron’s formula: Area = sqrt(s * (s – a) * (s – b) * (s – c))


    where s is the semiperimeter:


    s = (a + b + c) / 2.


    ***Listing 4-7.*** HeronsFormulaExample.java


    import javafx.beans.binding.DoubleBinding;


    import javafx.beans.binding.When;


