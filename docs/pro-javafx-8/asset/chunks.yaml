    \ that requires animating a ping pong ball. In the process, you learn how to detect\
    \ when the ball has hit a paddle or wall in the game.\n\n# The Zen of Node Collision\
    \ Detection\n\nWhen animating a node, you sometimes need to know when the node\
    \ has collided with another node. To demonstrate this capability, our colleague\
    \ Chris Wright developed a simple version of the Pong-style game that we call\
    \ `ZenPong`. Originally we asked him to build the game with only one paddle, which\
    \ brought the famous Zen koan (philosophical riddle), “What is the sound of one\
    \ hand clapping,” to mind. Chris had so much fun developing the game that he snuck\
    \ a second paddle in, but we’re still calling this example `ZenPong`. Figure [2-11](#index_split_000.html#p73)\
    \ shows this very simple form of the game when first invoked.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 35](index-73_1.jpg)\n\n**Figure 2-11.** The initial state of the ZenPong\
    \ game\n\nTry out the game by following the instructions in the upcoming exercise,\
    \ remembering that you control both paddles (unless you can get a colleague to\
    \ share your keyboard and play).\n\n## Examining the Behavior of the ZenPong Game\n\
    \nWhen the program starts, its appearance should be similar to the screenshot\
    \ in Figure [2-11](#index_split_000.html#p73). To fully examine its behavior,\
    \ perform the following steps.\n\n1. Before clicking start, drag each of the paddles\
