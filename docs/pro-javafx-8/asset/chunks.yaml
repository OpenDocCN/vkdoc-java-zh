    \n        pauseButton = new Button(\"pause\");\n        pauseButton.setOnAction(e\
    \ -> anim.pause());\n\n        resumeButton = new Button(\"resume\");\n      \
    \  resumeButton.setOnAction(e -> anim.play());\n\n        stopButton = new Button(\"\
    stop\");\n        stopButton.setOnAction(e -> anim.stop());\n\n        HBox commands\
    \ = new HBox(10, startButton, pauseButton, resumeButton, stopButton);\n      \
    \  commands.setLayoutX(60);\n        commands.setLayoutY(420);\n\n        Group\
    \ group = new Group(ellipse, commands);\n        Scene scene = new Scene(group,\
    \ 400, 500);\n\n        startButton.disableProperty().bind(anim.statusProperty()\n\
    \            .isNotEqualTo(Animation.Status.STOPPED));\n        pauseButton.disableProperty().bind(anim.statusProperty()\n\
    \            .isNotEqualTo(Animation.Status.RUNNING));\n        resumeButton.disableProperty().bind(anim.statusProperty()\n\
    \            .isNotEqualTo(Animation.Status.PAUSED));\n        stopButton.disableProperty().bind(anim.statusProperty()\n\
    \            .isEqualTo(Animation.Status.STOPPED));\n\n        stage.setScene(scene);\n\
    \        stage.setTitle(\"Metronome using PathTransition\");\n        stage.show();\n\
    \    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Using\
    \ the PathTransition Class\n\nAs shown in Listing 2-7, defining a `PathTransition`\
    \ includes supplying an instance of type `Path` to the `path` property that represents\
    \ the geometric path that the node is to travel. Here we’re creating a `Path`\
    \ instance that defines an arc beginning at 100 pixels on the x axis and 50 pixels\
    \ on the y axis, ending at 300 pixels on the x axis and 50 pixels on the y axis,\
    \ with 350 pixel horizontal and vertical radii. This is accomplished by creating\
