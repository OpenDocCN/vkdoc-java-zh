    \ paddle up, the `Z` key to move the left paddle down, the `L` key to move the\
    \ right paddle up, and the comma (`,`) key to move the right paddle down.\n3.\
    \ Click start to begin playing the game. Notice that the start button disappears\
    \ and the ball begins moving at a 45° angle, bouncing off paddles and the top\
    \ and bottom walls. The screen should look similar to Figure [2-12](#index_split_000.html#p74).\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 36](index-74_1.jpg)\n\
    \n**Figure 2-12.** The ZenPong game in action\n\n4. If the ball hits the left\
    \ or right wall, one of your hands has lost the game. Notice that the game resets,\
    \ looking again like the screenshot in Figure [2-11](#index_split_000.html#p73)."
