    构建可调整大小的 Reversi 棋子


    创建 Reversi 棋子的方式与上一节创建方块的方式非常相似。你的类应继承 Region，并拥有一个公共的 owner 属性，该属性可设置为 WHITE
    或 BLACK 以改变棋子的颜色：


    public class ReversiPiece extends Region {


    private ObjectProperty<Owner> ownerProperty = new SimpleObjectProperty<>(this,
    "owner" , Owner.NONE); public ObjectProperty<Owner> ownerProperty() {


    return ownerProperty;


    }


    public Owner getOwner() {


    return ownerProperty.get();


    }


    public void setOwner(Owner owner) {


    ownerProperty.set(owner);


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 5 章 ■ 在 JavaFX 中构建动态 UI 布局


    在此示例中，我们使用了简化的属性格式，通过一个泛型类型为 Owner 的 SimpleObjectProperty 在对象初始化时创建。它提供了获取属性、获取和设置值的公共方法，默认值为
    Owner.NONE，表示不显示任何棋子。


    为了创建棋子的样式，我们在构造函数中使用了条件绑定，以便在 owner 发生变化时更改样式。对于 WHITE 棋子，我们使用从白色到灰色再到黑色的径向渐变（模拟阴影）。对于
    BLACK 棋子，我们使用从白色快速过渡到黑色的径向渐变（模拟高光）。

