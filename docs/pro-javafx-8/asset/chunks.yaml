    Exploring the Capabilities of FXML Files


    In this section, we go over the features of the FXML file format. Because a major
    goal of the FXMLLoader is to deserialize an FXML file into Java objects, it should
    be no surprise that it provides facilities that help to make writing FXML files
    easier.


