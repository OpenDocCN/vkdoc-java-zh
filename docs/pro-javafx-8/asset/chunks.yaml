    perform the actual work.


    The implementation of the call() method may call the protected methods updateTitle(),
    updateMessage(), updateProgress(), and updateValue() to publish its internal state
    to the JavaFX application thread. The implementation has total control of what
    the title and message of the task should be. For the updateProgress() call that
    takes two longs, the workDone and totalWork must either both be –1, indicating
    indeterminate progress, or satisfy the relations workDone >=0 and workDone <=
    totalWork, resulting in a progress value of between 0.0 and 1.0 (0% to 100%).


    ■ **Caution** the updateProgress() api will throw an exception if workDone > totalWork,
    or if one of them is <–1.


    however, it allows you to pass in (0, 0), resulting in a progress of NaN.


    The two cancel() methods can be called from any thread, and will move the task
    to the CANCELLED state if it is not already in the SUCCEEDED or FAILED state.
    If either cancel() method is called before the task is run, it will move to the
    CANCELLED state and will never be run. The two cancel() methods differ only if
    the task is in the RUNNING state, and only in their treatment of the running thread.
    If cancel(true) is called, the thread will receive an interrupt. For this interrupt
    to have the desired effect of causing the task to finish processing quickly, the
    implementation of the call() method has to be coded in a way that will detect
    the interrupt and skip any further processing. The no-argument cancel() method
    simply forwards to cancel(true).


