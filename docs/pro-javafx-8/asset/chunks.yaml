    \      );\n        System.out.println(\"bean = \" + bean);\n    }\n}\n```\n\n\
    We made use of a small utility class that contains a few constants and a factory\
    \ method that creates a `List<Integer>`, as shown in Listing 3-13.\n\n### Listing\
    \ 3-13. `Utilities.java`\n\n```java\npackage projavafx.fxmlbasicfeatures;\n\n\
    import java.util.ArrayList;\nimport java.util.List;\n\npublic class Utilities\
    \ {\n    public static final Double TEN_PCT = 0.1d;\n    public static final Double\
    \ TWENTY_PCT = 0.2d;\n    public static final Double THIRTY_PCT = 0.3d;\n\n  \
    \  public static List<Integer> createList() {\n        return new ArrayList<>();\n\
    \    }\n}\n```\n\nThe `FXMLBasicFeaturesBean` object is being created in the FXML\
    \ file; this is indicated by the fact that the top-level element of the FXML file\
    \ is `FXMLBasicFeaturesBean`. The `name` and `address` fields illustrate that\
    \ a field can be set either as an attribute or as a subelement:\n\n```xml\n<FXMLBasicFeaturesBean\
    \ name=\"John Smith\"\n                       flag=\"true\"\n                \
    \       count=\"12345\"\n                       xmlns:fx=\"http://javafx.com/fxml/1\"\
    >\n    <address>12345 Main St.</address>\n```\n\nThe `foreground` and `background`\
    \ fields illustrate two ways of setting a `javafx.scene.paint.Color` subelement,\
    \ either through a hex string, or using a `Color` element (remember `Color` is\
    \ an immutable object without a default constructor):\n\n```xml\n<foreground>#ff8800</foreground>\n\
    <background>\n    <Color red=\"0.0\" green=\"1.0\" blue=\"0.5\"/>\n</background>\n\
    ```\n\nThe `price` field illustrates a way to construct a `Double` object. The\
    \ `fx:value` attribute invokes the `valueOf(String)` method on `Double`. This\
    \ works on any Java class that has a factory method `valueOf(String)`:\n\n```xml\n\
    <price>\n    <Double fx:value=\"3.1415926\"/>\n</price>\n```\n\nThe `discount`\
    \ field illustrates how to use a constant defined in a Java class. The `fx:constant`\
    \ attribute accesses constant (`public static final`) fields of the type of its\
    \ element. The following sets the `discount` field to `Utilities.TEN_PCT`, which\
    \ is `0.1`:\n\n```xml\n<discount>\n    <Utilities fx:constant=\"TEN_PCT\"/>\n\
    </discount>\n```\n\nThe `sizes` field illustrates the use of factory methods to\
    \ create objects. The `fx:factory` attribute invokes the specified factory method\
    \ on the type of its element. In our case, it calls `Utilities.createList()` to\
    \ create a list of `Integer`s, which is then populated with three `Integer`s.\
    \ Notice that `sizes` is a read-write property. You will see an example of how\
    \ a read-only list property is populated later.\n\n```xml\n<sizes>\n    <Utilities\
    \ fx:factory=\"createList\">\n        <Integer fx:value=\"1\"/>\n        <Integer\
    \ fx:value=\"2\"/>\n        <Integer fx:value=\"3\"/>\n    </Utilities>\n</sizes>\n\
    ```\n\nThe `profits` field illustrates how to populate a read-write map. Here\
    \ we set the `profits` field to a `HashMap` that we create with key/value pairs:\n\
    \n```xml\n<profits>\n    <HashMap q1=\"1000\" q2=\"1100\" q3=\"1200\" a4=\"1300\"\
    />\n</profits>\n```\n\nThe `inventory` field illustrates how to define an object\
    \ in one place and reference it in another place. The `fx:define` element creates\
    \ a stand-alone object that has an `fx:id` attribute. The `fx:reference` element\
    \ creates a reference to an object defined elsewhere, and its `source` attribute\
    \ points to the `fx:id` of a previously defined object:\n\n```xml\n<fx:define>\n\
    \    <Long fx:id=\"inv\" fx:value=\"9765625\"/>\n</fx:define>\n<inventory>\n \
    \   <fx:reference source=\"inv\"/>\n</inventory>\n```\n\nThe `products` field\
    \ illustrates how to populate a read-only list. The following fragment of FXML\
    \ is equivalent to invoking `bean.getProducts().addAll(\"widget\", \"gadget\"\
    , \"models\")`:\n\n```xml\n<products>\n    <String fx:value=\"widget\"/>\n   \
    \ <String fx:value=\"gadget\"/>\n    <String fx:value=\"models\"/>\n</products>\n\
    ```\n\nThe `abbreviations` field illustrates how to populate a read-only map:\n\
    \n```xml\n<abbreviations CA=\"California\" NY=\"New York\" FL=\"Florida\" MO=\"\
    Missouri\"/>\n```\n\nWhen the `FXMLBasicFeaturesMain` program is run, the following\
    \ output is printed to the console, as expected:\n\n```\nbean = FXMLBasicFeaturesBean{name='John\
    \ Smith',\naddress='12345 Main St.',\nflag=true,\ncount=12345,\nforeground=0xff8800ff,\n\
    background=0x00ff80ff,\nprice=3.1415926,\ndiscount=0.1,\nsizes=[1, 2, 3],\nprofits={q1=1000,\
    \ q2=1100, q3=1200, a4=1300},\ninventory=9765625,\nproducts=[widget, gadget, models],\n\
    abbreviations={MO=Missouri, FL=Florida, NY=New York, CA=California}}\n```\n\n\
    ## Understanding Default and Static Properties\n\nMany JavaFX classes have a default\
    \ property. *Default properties* are specified with a `@DefaultProperty` annotation\
    \ on the class. The `@DefaultProperty` annotation belongs to the `javafx.beans`\
    \ package. The default property of the `javafx.scene.Group` class, for example,\
    \ is its `children` property. In FXML files, when a default property is specified\
    \ via a subelement, the beginning and ending tag of the default property itself\
    \ can be omitted. As an example, the following snippet, which you saw in Listing\
    \ 3-1,\n\n```xml\n<HBox fx:id=\"titleBox\">\n    <children>\n        <Label fx:id=\"\
    titleLabel\"\n               text=\"title\"/>\n        <TextField fx:id=\"titleTextField\"\
    \n                   text=\"Stage Coach\"/>\n    </children>\n</HBox>\n```\n\n\
    can be simplified to\n\n```xml\n<HBox fx:id=\"titleBox\">\n    <Label fx:id=\"\
    titleLabel\"\n           text=\"title\"/>\n    <TextField fx:id=\"titleTextField\"\
    \n               text=\"Stage Coach\"/>\n</HBox>\n```\n\nA *static property* is\
    \ a property that is set on an object not by calling a setter method on the object\
    \ itself, but by calling a static method of a different class, passing both the\
    \ object and the value of the property as parameters. Many of JavaFX’s container\
    \ `Node`s have such static methods. These methods are called on a `Node` prior\
    \ to adding it to the container to affect certain results. Static properties are\
    \ represented in FXML files as attributes on the inner object (the object that\
    \ is passed in as the first parameter to the static method) with a name that includes\
    \ both the class name and the static method name separated by a dot. You can spot\
    \ an example of a static property in Listing 3-4:\n\n```xml\n<WebView fx:id=\"\
    webView\"\n         prefHeight=\"200.0\"\n         prefWidth=\"200.0\"\n     \
    \    VBox.vgrow=\"ALWAYS\"/>\n```"
