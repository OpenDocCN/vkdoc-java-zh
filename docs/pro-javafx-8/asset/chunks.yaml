    @Override


    public void paint(Graphics g) {


    g.setColor(model.getStrokeColor());


    g.fillRect(0, 0, 200, 200);


    g.setColor(model.getFillColor());


    g.fillRect(10, 10, 180, 180);


    }


    @Override


    public Dimension getMaximumSize() {


    return new Dimension(200, 200);


    }


    }


    }

