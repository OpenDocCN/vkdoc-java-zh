    大多数媒体文件格式都具备嵌入*元数据*的能力，这些数据用于描述歌曲或视频。例如，MP3 文件包含 ID3 标签，可用于标识艺术家、专辑、曲目编号，甚至歌曲的发行年份。许多
    MP3 文件还嵌入了艺术家图片、专辑封面或徽标（例如播客等）。JavaFX 的 Media 类会读取这些元数据，并以键/值对的 ObservableMap
    形式呈现给开发者。键是标识元数据的字符串，值是对象，通常是字符串或图像。


    虽然无法保证任何给定媒体文件中存在哪些元数据，但有几个字段非常常见：艺术家、标题、专辑和年份。此外，如果文件的元数据中嵌入了任何图像，Media 类将允许你使用“image”键访问它。清单
    9-8 展示了如何在创建新的 Media 对象时添加接收元数据通知的功能。


