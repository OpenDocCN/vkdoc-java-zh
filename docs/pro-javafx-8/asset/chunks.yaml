    The `MediaPlayer` property is exposed as a `ReadOnlyObjectProperty` inasmuch as
    we don’t want users of the class to be able to set the `MediaPlayer` instance
    to a new value. Now that we have a nicely encapsulated class for our media, we
    turn our attention to separating our UI code into more manageable chunks, or *views*.
    A new `AbstractView` base class is created to eliminate duplication by holding
    some code that is common to all of our views. This small class is shown in Listing
    9-11.


    ***Listing 9-11.*** The `AbstractView` Base Class


    ```java

    public abstract class AbstractView {


    protected final SongModel songModel;


    protected final Node viewNode;


    public AbstractView(SongModel songModel) {


    this.songModel = songModel;


    this.viewNode = initView();


    }


    public Node getViewNode() {


    return viewNode;


    }


    protected abstract Node initView();


    }

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Chapter 9 ■ Using the Media Classes


    This class ensures that all of the views have access to the application’s `SongModel`
    instance. It also provides a pattern for easily writing new views. Each new view
    only has to provide a concrete implementation of the `initView` method. This method
    returns a top-level `Node` that is the root node of a scene graph for that view.


    With those two pieces of infrastructure in place, we can proceed to create some
    actual views. The obvious place to start is to move the `GridPane`, `Labels`,
    and `ImageView` that display the metadata in `AudioPlayer2` into a new view class
    named `MetadataView`. The source code for this class is not presented here because
    it is virtually the same UI code that was shown in the `createGridPane` and `createControls`
    methods of Listing 9-9. If you are curious, the view can be found in the source
    code of the `AudioPlayer3` project.'
