    ## Building and Running the Program with NetBeans


    Assuming that you’ve downloaded and extracted the source code for this book into
    a directory, follow the directions in this exercise to build and run the Hello
    Earthrise program in NetBeans. If you haven’t yet downloaded the Java SDK and
    NetBeans, please do so from the site listed in the Resources section at the end
    of this chapter.


    ### Building and Running Hello Earthrise with NetBeans


    To build and run the Hello Earthrise program, perform the following steps.


    1. Start up NetBeans.

    2. Choose File ➤ New Project from the menu bar. The first window of the New Project
    Wizard will appear. Select the JavaFX category, and you will see the wizard shown
    in Figure 1-6:


    **Figure 1-6.** New Project Wizard


    3. Choose JavaFX Application in the Projects pane, and click Next. The next page
    in the New Project Wizard, shown in Figure 1-7, should appear:


    **Figure 1-7.** The next page of the New Project Wizard


    4. On this screen, type the project name (we used `HelloEarthrise`) and click
    Browse.

