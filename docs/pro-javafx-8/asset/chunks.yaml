    Java。他也抓住每一个机会参与开源开发，是 JFXtras 项目的提交者、DialogFX 和 MonologFX 的开发者、Autonomous4j 的共同开发者等等。当
    Mark 不从事 Java 工作时，他喜欢在会议上以及通过 Java Jungle 网站 [(https://blogs.oracle.com/javajungle)](https://blogs.oracle.com/javajungle)、他的个人网站
    [(http://www.thehecklers.org)](http://www.thehecklers.org) 和 Twitter ([@MkHeck](http://@MkHeck))
    分享他的经验。Mark 与非常善解人意的妻子、三个孩子和一条狗住在密苏里州圣路易斯市。


