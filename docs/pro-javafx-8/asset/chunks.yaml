- fmt: "The resulting `Document` can now be queried. From the XML response shown in\
    \ Listing 11-6, we learn that the individual questions are enclosed in XML Elements\
    \ named `\"item\"`. We use the following to obtain a list of those XML Elements.\n\
    \n```\nNodeList questionNodes = doc.getElementsByTagName(\"item\");\n```\n\nWe\
    \ then iterate over this list, and obtain the question-specific fields by inspecting\
    \ the `childNodes` in the respective XML Elements. Finally, we add the resulting\
    \ question to the `ObservableList` of `Question` objects named `answer`.\n\nThis\
    \ approach is rather simple, but we still have to do some manual XML parsing.\
    \ Although this allows for flexibility, parsing becomes harder and more error\
    \ prone with increasing complexity of the data structure.\n\nFortunately, the\
    \ Java Standard Edition APIs contain tools for converting XML directly into Java\
    \ Objects. The specification for these APIs is defined by the JAXB standard, and\
    \ is available in the `javax.xml.bind` package. The process of converting XML\
    \ data into Java Objects is called unmarshalling.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 11 ■ aCCessing Web serviCes\n\nWe now modify our example and make\
    \ it use a mix of DOM parsing and JAXB unmarshalling. Again, we only change the\
    \ `getObservableList()` method. The modified implementation is shown in Listing\
    \ 11-9.\n\n**Listing 11-9.** Combining XML Parsing and JAXB\n\n```\nObservableList<Question>\
