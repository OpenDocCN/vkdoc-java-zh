    2.0 itself, point out to you the various parts of the UI designer, and discuss
    how to turn the knobs and switch the gears to achieve a desired result.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 45](index-129_1.jpg)


    Chapter 3 ■ Using sCeneBUilder to Create a User interfaCe


    Overview of JavaFX SceneBuilder


    When you start JavaFX SceneBuilder, the screen looks like Figure [3-9](#index_split_001.html#p129).


    ***Figure 3-9.** The JavaFX SceneBuilder program*


    When first started, the JavaFX SceneBuilder UI has a menu bar at the top, two
    accordion containers named Library and Document on the left side of the screen,
    a Content Panel in the middle of the screen, and an accordion container named
    Inspector on the right of the screen.


    Understanding the Menu Bar and Items


    There are nine menus in JavaFX SceneBuilder. Let’s examine them one by one.


    The File menu is shown in Figure [3-10.](#index_split_001.html#p130)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 46](index-130_1.jpg)


    ![Image 47](index-130_2.jpg)


    Chapter 3 ■ Using sCeneBUilder to Create a User interfaCe


    ***Figure 3-10.** The File menu*


    The New, Open, Save, Save As, Revert to Saved, Reveal in Explorer (or Finder,
    or Desktop), Close Window, and Exit menu items do pretty much what you think they
    should do. The New from Template menu item creates a new FXML file from an existing
    template. The list of templates is shown in Figure [3-11](#index_split_001.html#p130).


    ***Figure 3-11.** The templates*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 48](index-131_1.jpg)


    Chapter 3 ■ Using sCeneBUilder to Create a User interfaCe


    The Import menu item allows you to copy the content of another FXML file into
    the current FXML file. It also allows you to add image and media files to the
    current FXML file. Such imported files are wrapped in an ImageView or MediaView
    node. The Include menu item allows you to add an fx:include element into the current
    FXML file. The Close Window menu item closes the FXML file being edited in the
    current window. The Preferences menu item allows you to set certain preferences
    that control how JavaFX SceneBuilder looks. The Quit menu item allows you to exit
    the JavaFX


    SceneBuilder application entirely. It will ask you to save any unsaved files before
    shutting the application down.


    The Edit menu is shown in Figure [3-12.](#index_split_001.html#p131)


    ***Figure 3-12.** The Edit menu*


    The Undo, Redo, Cut, Copy, Paste, Paste Into, Duplicate, Delete, Select All, Select
    None, Select Parent, Select Next, and Select Previous menu items all perform their
    normal duties. The Trim Document to Selection menu item deletes everything that
    is not selected.


    The View menu is shown in Figure [3-13.](#index_split_001.html#p132)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 49](index-132_1.jpg)


    Chapter 3 ■ Using sCeneBUilder to Create a User interfaCe


    ***Figure 3-13.** The View menu*


    The Content menu item puts the focus on the Content Panel in the middle of the
    screen. The Properties, Layout, and Code menu items put the focus on the Property,
    Layout, or Code sections in the Inspector Panel on the right side of the screen.
    The Hide Library command hides the Library Panel on the top of the left side of
    the screen. The menu item will change to Show Library once the Library is hidden.
    The Hide Document menu item does the same to the Document Panel on the bottom
    of the left side of the screen. The Show CSS Analyzer menu item shows the CSS
    Analyzer, which is initially not shown. The Hide Left Panel and Hide Right Panel
    menu items hide the Left Panel (the Library Panel and the Document Panel) or the
    Right Panel (the Inspector Panel). The Show Outlines menu item shows the outlines
    of the items. The Show Sample Data menu item will show sample data for TreeView,
    TableView, and TreeTableView nodes to help you visualize the node at work. The
    sample data are not saved with the FXML file.


    The Disable Alignment Guides menu item disables the alignment guidelines that
    are shown when you move a node around in a container in the Content Panel. These
    alignment guidelines help you to position the nodes in the right spot on the screen.
    The Zoom menu item allows you to change the magnification rate of the Content
    Panel. The Show Sample Controller Skeleton menu item will open a dialog box showing
    a skeleton controller class declaration based on the controller setting made in
    the Document Panel and the fx:ids declared for the nodes in the FXML file.


    Figure [3-14 sho](#index_split_001.html#p133)ws the JavaFX SceneBuilder screen
    with the CSS Analyzer shown.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 50](index-133_1.jpg)


    ![Image 51](index-133_2.jpg)


    Chapter 3 ■ Using sCeneBUilder to Create a User interfaCe


    ***Figure 3-14.** The JavaFX SceneBuilder screen with the CSS Analyzer shown*


    The Insert menu is shown in Figure [3-15](#index_split_001.html#p133).


    ***Figure 3-15.** The Insert menu*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 52](index-134_1.jpg)


    Chapter 3 ■ Using sCeneBUilder to Create a User interfaCe


    The Insert menu contains submenus and menu items that allow you to insert different
    kinds of nodes into the Content Panel. The submenus and their menu items represent
    the same hierarchy as in the Library Panel. They include the Containers, Controls,
    Menu, Miscellaneous, Shapes, Charts, and 3D categories. We cover these nodes in
    more detail in subsequent chapters.


    The Modify menu is shown in Figure [3-16](#index_split_001.html#p134).


    ***Figure 3-16.** The Modify menu*


    The Fit to Parent menu item will expand the selected node to fill an AnchorPane
    container and anchor the node to the parent on all sides. The Use Computed Sizes
    menu item will resize the selected element to USE_COMPUTED_SIZE.


    The GridPane submenu contains items that work with the GridPane container. The
    Set Effect submenu contains items for each effect that can be set on the current
    node. The Add Popup Control allows you to add a ContextMenu or a Tooltip to the
    selected node. The Scene Size submenu allows you to change the size of the scene
    to some popular sizes, including 320x240 (QVGA), 640x480 (VGA), 1280x800, and
    1920x1080.


    The Arrange menu is shown in Figure [3-17.](#index_split_001.html#p135)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 53](index-135_1.jpg)


    ![Image 54](index-135_2.jpg)


    Chapter 3 ■ Using sCeneBUilder to Create a User interfaCe


    ***Figure 3-17.** The Arrange menu*


    The Bring to Front, Send to Back, Bring Forward, and Send Backward menu items
    move the selected node to the front, back, up, or down the z-order of overlapping
    nodes. The Wrap in submenu contains items for each container type and allows you
    to wrap a group of selected nodes into the container. For example, you can choose
    to wrap two adjacent Labels into an HBox. The Unwrap menu item removes the container
    from the selected node.'
  trans: '

    由于 UI 布局是一项高度主观、有时甚至带有艺术性的工作，它在很大程度上取决于具体的应用程序以及 UI 和用户体验团队的设计理念。我们并不自诩通晓 UI 设计的最佳方法。因此，在本节中，我们将引导您了解
    JavaFX SceneBuilder 2.0 本身，向您指出 UI 设计器的各个部分，并讨论如何操作旋钮和切换档位以达到预期效果。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 45](img/index-129_1.jpg)


    第 3 章 ■ 使用 SceneBuilder 创建用户界面


    JavaFX SceneBuilder 概述


    启动 JavaFX SceneBuilder 后，屏幕显示如图 3-9 所示。


    ***图 3-9.** JavaFX SceneBuilder 程序*


    首次启动时，JavaFX SceneBuilder UI 顶部有一个菜单栏，屏幕左侧有两个名为“库”和“文档”的折叠容器，屏幕中间是内容面板，屏幕右侧是一个名为“检查器”的折叠容器。


    了解菜单栏和菜单项


    JavaFX SceneBuilder 中有九个菜单。让我们逐一查看。


    “文件”菜单如图 3-10 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 46](img/index-130_1.jpg)


    ![Image 47](img/index-130_2.jpg)


    第 3 章 ■ 使用 SceneBuilder 创建用户界面


    ***图 3-10.** “文件”菜单*


    “新建”、“打开”、“保存”、“另存为”、“恢复已保存”、“在资源管理器中显示”（或 Finder、桌面）、“关闭窗口”和“退出”菜单项的功能基本符合您的预期。“从模板新建”菜单项可根据现有模板创建新的
    FXML 文件。模板列表如图 3-11 所示。


    ***图 3-11.** 模板*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 48](img/index-131_1.jpg)


    第 3 章 ■ 使用 SceneBuilder 创建用户界面


    “导入”菜单项允许您将另一个 FXML 文件的内容复制到当前 FXML 文件中。它还允许您将图像和媒体文件添加到当前 FXML 文件中。此类导入的文件会被包装在
    ImageView 或 MediaView 节点中。“包含”菜单项允许您向当前 FXML 文件中添加一个 fx:include 元素。“关闭窗口”菜单项关闭当前窗口中正在编辑的
    FXML 文件。“首选项”菜单项允许您设置某些控制 JavaFX SceneBuilder 外观的首选项。“退出”菜单项允许您完全退出 JavaFX SceneBuilder
    应用程序。它会在关闭应用程序前提示您保存所有未保存的文件。


    “编辑”菜单如图 3-12 所示。


    ***图 3-12.** “编辑”菜单*


    “撤销”、“重做”、“剪切”、“复制”、“粘贴”、“粘贴到”、“复制”、“删除”、“全选”、“取消全选”、“选择父级”、“选择下一个”和“选择上一个”菜单项均执行其常规功能。“将文档修剪到所选内容”菜单项会删除所有未选中的内容。


    “视图”菜单如图 3-13 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 49](img/index-132_1.jpg)


    第 3 章 ■ 使用 SceneBuilder 创建用户界面


    ***图 3-13.** “视图”菜单*


    “内容”菜单项将焦点置于屏幕中间的内容面板上。“属性”、“布局”和“代码”菜单项将焦点置于屏幕右侧检查器面板中的“属性”、“布局”或“代码”部分。“隐藏库”命令隐藏屏幕左侧顶部的库面板。库隐藏后，该菜单项将变为“显示库”。“隐藏文档”菜单项对屏幕左侧底部的文档面板执行相同操作。“显示
    CSS 分析器”菜单项显示默认不显示的 CSS 分析器。“隐藏左侧面板”和“隐藏右侧面板”菜单项隐藏左侧面板（库面板和文档面板）或右侧面板（检查器面板）。“显示轮廓”菜单项显示项目的轮廓。“显示示例数据”菜单项将显示
    TreeView、TableView 和 TreeTableView 节点的示例数据，以帮助您可视化节点的工作状态。示例数据不会随 FXML 文件一起保存。


    “禁用对齐参考线”菜单项禁用在内容面板的容器中移动节点时显示的对齐参考线。这些对齐参考线有助于您将节点定位在屏幕上的正确位置。“缩放”菜单项允许您更改内容面板的放大倍率。“显示示例控制器骨架”菜单项将打开一个对话框，显示基于文档面板中的控制器设置以及
    FXML 文件中为节点声明的 fx:id 生成的控制器类骨架声明。


    图 3-14 显示了显示 CSS 分析器时的 JavaFX SceneBuilder 屏幕。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 50](img/index-133_1.jpg)


    ![Image 51](img/index-133_2.jpg)


    第 3 章 ■ 使用 SceneBuilder 创建用户界面


    ***图 3-14.** 显示 CSS 分析器时的 JavaFX SceneBuilder 屏幕*


    “插入”菜单如图 3-15 所示。


    ***图 3-15.** “插入”菜单*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 52](img/index-134_1.jpg)


    第 3 章 ■ 使用 SceneBuilder 创建用户界面


    “插入”菜单包含允许您将不同类型的节点插入内容面板的子菜单和菜单项。这些子菜单及其菜单项表示与库面板中相同的层次结构。它们包括“容器”、“控件”、“菜单”、“杂项”、“形状”、“图表”和“3D”类别。我们将在后续章节中更详细地介绍这些节点。


    “修改”菜单如图 3-16 所示。


    ***图 3-16.** “修改”菜单*


    “适应父级”菜单项将展开所选节点以填充 AnchorPane 容器，并将节点锚定到父级的所有边。“使用计算大小”菜单项将所选元素的大小调整为 USE_COMPUTED_SIZE。


    “GridPane”子菜单包含用于 GridPane 容器的项目。“设置效果”子菜单包含可应用于当前节点的每种效果的项目。“添加弹出控件”允许您向所选节点添加
    ContextMenu 或 Tooltip。“场景大小”子菜单允许您将场景大小更改为一些常用尺寸，包括 320x240 (QVGA)、640x480 (VGA)、1280x800
    和 1920x1080。


    “排列”菜单如图 3-17 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 53](img/index-135_1.jpg)


    ![Image 54](img/index-135_2.jpg)


    第 3 章 ■ 使用 SceneBuilder 创建用户界面


    ***图 3-17.** “排列”菜单*


    “置于顶层”、“置于底层”、“上移一层”和“下移一层”菜单项可将所选节点在重叠节点的 Z 轴顺序中向前、向后、向上或向下移动。“包裹在”子菜单包含每种容器类型的项目，并允许您将一组选定的节点包裹到该容器中。例如，您可以选择将两个相邻的标签包裹到一个
    HBox 中。“取消包裹”菜单项从所选节点中移除容器。

