    \ 单元格中。由于 `volLow` 是左对齐（默认），而 `volHigh` 是右对齐，因此它们不会重叠，并且即使在调整布局大小时，也能自动保持在音量滑块上方的正确位置。\n\
    \n最后一步当然是将控件实际添加到 `GridPane` 中。我们在代码清单 9-15 中使用了 `GridPane` 的 `add` 方法。该方法有两种不同的变体。第一种允许你指定要添加的\
