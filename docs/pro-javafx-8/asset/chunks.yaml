- fmt: '`observableArrayList()`的每个修改器调用——即每次调用改变可观察列表内容的单个方法——都会生成一个列表变更事件，并传递给每个已注册的观察者。事件对象是实现了`ListChangeListener.Change`接口的类的实例，可以将其视为表示一个或多个离散变更，每个变更属于以下四种类型之一：添加元素、移除元素、替换元素或排列元素。`ListChangeListener.Change`类提供了以下方法，允许您获取关于变更的详细信息：


    - `boolean next()`

    - `void reset()`

    - `boolean wasAdded()`

    - `boolean wasRemoved()`

    - `boolean wasReplaced()`

    - `boolean wasPermutated()`

    - `int getFrom()`

    - `int getTo()`

    - `int getAddedSize()`

    - `List<E> getAddedSublist()`

    - `int getRemovedSize()`

    - `List<E> getRemoved()`

    - `int getPermutation(int i)`

    - `ObservableList<E> getList()`


    `next()`和`reset()`方法控制一个游标，该游标遍历事件对象中的所有离散变更。进入`ListChangeListener`的`onChange()`方法时，游标位于第一个离散变更之前。您必须调用`next()`方法将游标移动到第一个离散变更。后续对`next()`的调用会将游标移动到剩余的离散变更。如果到达下一个离散变更，返回值将为`true`。如果游标已在最后一个离散变更上，返回值将为`false`。一旦游标定位到有效的离散变更，可以调用`wasAdded()`、`wasRemoved()`、`wasReplaced()`和`wasPermutated()`方法来确定该离散变更的类型。


    **注意：** `wasAdded()`、`wasRemoved()`、`wasReplaced()`和`wasPermutated()`方法并非正交。


    离散变更为替换类型，仅当它同时是添加和移除时。因此，测试离散变更类型的正确顺序是：首先确定它是排列还是替换，然后确定它是添加还是移除。


    确定离散变更的类型后，您可以调用其他方法获取更多信息。对于添加，`getFrom()`方法返回可观察列表中新增元素的索引；`getTo()`方法返回新增元素末尾之后一个元素的索引；`getAddedSize()`方法返回新增元素的数量；`getAddedSublist()`方法返回包含新增元素的`List<E>`。对于移除，`getFrom()`和`getTo()`方法都返回可观察列表中元素被移除的索引；`getRemovedSize()`方法返回被移除元素的数量；`getRemoved()`方法返回包含被移除元素的`List<E>`。


    对于替换，应同时检查与添加相关的方法和与移除相关的方法，因为替换可以视为在同一索引处先移除后添加。


    对于排列，`getPermutation(int i)`方法返回排列后可观察列表中元素的索引，该元素在排列前的索引为`i`。在所有情况下，`getList()`方法始终返回底层的可观察列表。


    在清单7-2所示的示例中，我们在将`ListChangeListener`附加到`ObservableList`后执行了各种列表操作。`ListChangeListener`的实现（称为`MyListener`）包含一个用于`ListChangeListener.Change`对象的格式化输出器，并在事件触发时打印列表变更事件对象。


    **清单7-2.** `ListChangeEventExample.java`


    ```java

    import javafx.collections.FXCollections;

    import javafx.collections.ListChangeListener;

    import javafx.collections.ObservableList;

    ```'
  raw: 'observableArrayList(), each mutator call—that is, each call to a single method
    that changes the content of the observable list—generates a list change event
    delivered to each registered observer. The event object, an instance of a class
    that implements the ListChangeListener.Change interface, can be thought of as
    representing one or more discrete changes, each of which is of one of four kinds:
    elements added, elements removed, elements replaced, or elements permuted. The
    ListChangeListener.Change class provides the following methods that allow you
    to get at this detailed information about the change:


    • boolean next()


    • void reset()


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 7 ■ ColleCtions and ConCurrenCy


    • boolean wasAdded()


    • boolean wasRemoved()


    • boolean wasReplaced()


    • boolean wasPermutated()


    • int getFrom()


    • int getTo()


    • int getAddedSize()


    • List<E> getAddedSublist()


    • int getRemovedSize()


    • List<E> getRemoved()


    • int getPermutation(int i)


    • ObservableList<E> getList()


    The next() and reset() methods control a cursor that iterates through all the
    discrete changes in the event object. On entry to the onChange() method of ListChangeListener,
    the cursor is positioned before the first discrete change. You must call the next()
    method to move the cursor to the first discrete change. Succeeding calls to the
    next() method will move the cursor to the remaining discrete changes. If the next
    discrete change is reached, the return value will be true. If the cursor is already
    on the last discrete change, the return value will be false. Once the cursor is
    positioned on a valid discrete change, the methods wasAdded(), wasRemoved(), wasReplaced(),
    and wasPermutated() can be called to determine the kind of change the discrete
    change represents.


    ■ **Caution** the wasAdded(), wasRemoved(), wasReplaced(), and wasPermutated()
    methods are not orthogonal.


    a discrete change is a replacement only if it is both an addition and a removal.
    the proper order for testing the kind of a discrete change, therefore, is to first
    determine whether it is a permutation or a replacement and then to determine whether
    it is an addition or a removal.


    Once you have determined the kind of discrete change, you can call the other methods
    to get more information about it. For addition, the getFrom() method returns the
    index in the observable list where new elements were added; the getTo() method
    returns the index of the element that is one past the end of the added elements;
    the getAddedSize() method returns the number of elements that were added; and
    the getAddedSublist() method returns a List<E> that contains the added elements.
    For removal, the getFrom() and getTo() methods both return the index in the observable
    list where elements were removed; the getRemovedSize() method returns the number
    of elements that were removed; and the getRemoved() method returns a List<E> that
    contains the removed elements.


    For replacement, both the methods that are relevant for addition and the methods
    that are relevant for removal should be examined, because a replacement can be
    seen as a removal followed by an addition at the same index.


    For permutation, the getPermutation(int i) method returns the index of an element
    in the observable list after the permutation whose index in the observable list
    before the permutation was i. In all situations, the getList() method always returns
    the underlying observable list.


    In the example shown in Listing 7-2, we perform various list manipulations after
    attaching a ListChangeListener to an ObservableList. The implementation of ListChangeListener,
    called MyListener, includes a pretty printer for the ListChangeListener.Change
    object, and prints out the list change event object when an event is fired.


