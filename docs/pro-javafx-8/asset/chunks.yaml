    shown in Figure [12-10](#index_split_007.html#p537).


    ***Figure 12-10.** Desktop output for our SimplePort application*


    If you click the Guess a day button, the text below the button will change into
    a random day. The output will then look similar to that shown in Figure [12-11](#index_split_007.html#p537).


    ***Figure 12-11.** Desktop output of the SimplePort application after clicking
    the button* 538


