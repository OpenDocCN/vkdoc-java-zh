- fmt: "`ObservableList`、`ObservableMap`、`ObservableSet`和`ObservableArray`接口位于`javafx.collections`包中，被称为\
    \ JavaFX 可观察集合和数组。除了扩展`Observable`接口外，`ObservableList`、`ObservableMap`和`ObservableSet`还分别扩展了`java.util.List`、`java.util.Map`和`java.util.Set`接口，使它们在\
    \ Java 集合框架中成为真正的集合。你可以在这些接口的对象上调用所有熟悉的 Java 集合框架方法，并期望得到完全相同的结果。JavaFX 可观察集合和数组在标准\
