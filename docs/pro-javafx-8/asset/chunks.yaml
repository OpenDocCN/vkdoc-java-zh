    现在，我们对 `javafx.beans`、`javafx.beans.binding`、`javafx.beans.property` 和 `javafx.beans.value`
    这四个包的内容进行概述。在本节中，“SimpleIntegerProperty 系列类”指的是在 Boolean、Integer、Long、Float、Double、String
    和 Object 类型上外推得到的类。因此，所述内容同样适用于 SimpleBooleanProperty 等。


