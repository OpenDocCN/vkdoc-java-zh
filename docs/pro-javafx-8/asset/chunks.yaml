    理解属性解析与绑定


    正如你在本章前面部分所见，对象属性既可以表示为属性，也可以表示为子元素。有时，将属性建模为子元素或属性效果是一样的。然而，FXMLLoader 会对属性执行额外的处理，这使得使用属性更具吸引力。在处理属性时，FXMLLoader
    会执行三种属性值解析和表达式绑定。


    当属性值以“@”字符开头时，FXMLLoader 会将该值视为相对于当前文件的位置。这称为*位置解析*。当属性值以“%”字符开头时，FXMLLoader 会将该值视为资源包中的键，并用特定于语言环境的值替换该键。这称为*资源解析*。当属性值以“$”字符开头时，FXMLLoader
    会将该值视为变量名，并用所引用变量的值替换该属性值。这称为*变量解析*。


    当属性值以“${”开头并以“}”结尾时，并且如果该属性代表一个 JavaFX 属性，FXMLLoader 会将该值视为绑定表达式，并将 JavaFX 属性绑定到该封闭表达式。这称为*表达式绑定*。你将在第
    4 章中了解 JavaFX 属性和绑定。现在只需理解，当一个属性绑定到一个表达式时，每次表达式值发生变化，该变化都会反映到属性中。支持的表达式包括字符串字面量、布尔字面量、数字字面量、一元运算符
    –（负号）和 !（非）、算术运算符（+、–、*、/、%）、逻辑运算符（&&、||）以及关系运算符（>、>=、<、<=、==、!=）。


    清单 3-14 到 3-19 中所示的 ResolutionAndBindingExample 演示了位置解析、资源解析、变量解析以及表达式绑定的使用。


