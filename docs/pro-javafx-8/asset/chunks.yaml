    \ 不适合用于大型或长时间的声音，因为与之相关的音频数据会被解压缩并完全存储在内存中。如果你需要播放一首歌曲或其他长时间音频文件，应改用 `Media` 对象，这将在下一节中讨论。\n\
    \n`AudioClip` 非常适合在游戏或其他富媒体应用中播放短促声音以响应用户操作。`AudioClip` 实例通过将 URI 字符串作为唯一参数传递给构造函数来构建。该\
    \ URI 可以指向互联网上的资源、本地文件系统或 jar 文件内部，分别使用 `http:`、`file:` 和 `jar:` 方案。一旦构建了 `AudioClip`，你就可以调整多个影响剪辑播放的属性，例如音量、播放速率、声像和平衡。调用其\
