    \        + \"Earth for the first time as it appears from deep space. \"\n    \
    \        + \"Astronauts Frank Borman, Jim Lovell and William Anders \"\n     \
    \       + \"had become the first humans to leave Earth orbit, \"\n           \
    \ + \"entering lunar orbit on Christmas Eve. In a historic live \"\n         \
    \   + \"broadcast that night, the crew took turns reading from \"\n          \
    \  + \"the Book of Genesis, closing with a holiday wish from \"\n            +\
    \ \"Commander Borman: \\\"We close with good night, good luck, \"\n          \
    \  + \"a Merry Christmas, and God bless all of you -- all of \"\n            +\
    \ \"you on the good Earth.\\\"\";\n\n        // Reference to the Text\n      \
    \  Text textRef = new Text(message);\n        textRef.setLayoutY(100);\n     \
    \   textRef.setTextOrigin(VPos.TOP);\n        textRef.setTextAlignment(TextAlignment.JUSTIFY);\n\
    \        textRef.setWrappingWidth(400);\n        textRef.setFill(Color.rgb(187,\
    \ 195, 107));\n        textRef.setFont(Font.font(\"SansSerif\", FontWeight.BOLD,\
    \ 24));\n\n        // Provides the animated scrolling behavior for the text\n\
    \        TranslateTransition transTransition = new TranslateTransition(new Duration(75000),\
    \ textRef);\n        transTransition.setToY(-820);\n        transTransition.setInterpolator(Interpolator.LINEAR);\n\
    \        transTransition.setCycleCount(Timeline.INDEFINITE);\n\n        // Create\
    \ an ImageView containing the Image\n        Image image = new Image(\"http://projavafx.com/images/earthrise.jpg\"\
    );\n        ImageView imageView = new ImageView(image);\n\n        // Create a\
    \ Group containing the text\n        Group textGroup = new Group(textRef);\n \
    \       textGroup.setLayoutX(50);\n        textGroup.setLayoutY(180);\n      \
    \  textGroup.setClip(new Rectangle(430, 85));\n\n        // Combine ImageView\
    \ and Group\n        Group root = new Group(imageView, textGroup);\n        Scene\
    \ scene = new Scene(root, 516, 387);\n        stage.setScene(scene);\n       \
    \ stage.setTitle(\"Hello Earthrise\");\n        stage.show();\n\n        // Start\
    \ the text animation\n        transTransition.play();\n    }\n}\n```\n\nNow that\
    \ you’ve seen the code, let’s take a look at its constructs and concepts in some\
    \ more detail.\n\n### What Happened to the Builders?\n\nIf you were using JavaFX\
    \ 2 before, you are probably familiar with the so-called builder pattern. Builders\
    \ provide a declarative style of programming. Rather than calling `set()` methods\
    \ on a class instance to specify its fields, the builder pattern uses an instance\
    \ of a `Builder` class to define how the target class should be composed.\n\n\
    Builders were very popular in JavaFX. However, it turned out that there were major\
    \ technical hurdles with keeping them in the platform. As a consequence, it has\
    \ been decided to phase builders out. In Java 8, `Builder` classes are still usable,\
    \ but they are deprecated. In Java 9, `Builder` classes might be removed entirely.\n\
    \nMore information on the reason why `Builder` classes are not preferred anymore\
    \ can be found in a mailing list entry by JavaFX Chief Architect Richard Bair\
    \ at [http://mail.openjdk.java.net/pipermail/openjfx-dev/2013-March/006725.html](http://mail.openjdk.java.net/pipermail/openjfx-dev/2013-March/006725.html).\
