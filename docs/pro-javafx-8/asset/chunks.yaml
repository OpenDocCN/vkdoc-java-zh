    The first line that defines the property is sufficient to do everything that the
    preceding Java code does. Declaring `name` as a `val` tells Scala that it is a
    constant variable. The `lazy` keyword that precedes the declaration indicates
    that it should not be initialized until the first use. As a result, you can directly
    access this variable from user code and the initialization logic is automatically
    invoked when needed.


    **Tip:** Scala supports three different types of variable definitions: `val`,
    `var`, and `def`. The `var` keyword behaves most closely to what you are familiar
    with in Java, and defines a variable that can be modified in place. The `val`
    keyword, which we used here, declares a constant variable, and is most similar
    to `final` variables in Java. The last keyword, `def`, declares an expression
    that is reevaluated each time it is called, so it behaves just like a method in
    Java.


    The second definition of a `name_=` method is special syntax for overloading the
    assignment operator in Scala. This is how the object-literal-like syntax we used
    earlier works; however, it is just a shortcut for accessing the property and assigning
    the value. It also demonstrates the basic pattern for how properties are used
    in ScalaFX.


    Table [13-1](#index_split_007.html#p573) compares all the different combinations
    of how you access and set properties in Java and ScalaFX.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 13 ■ JavaFX Languages and Markup


    **Table 13-1.** Property Operations in ScalaFX Versus Java


    | **Operation** | **Java** | **ScalaFX** | **Description** |

    | --- | --- | --- | --- |

    | Get Property | `getFooProperty()` | `foo` | Get the raw property (typically
    used for setting up binds or listeners) |

    | Get Property Value | 1: `getFoo()` | 1: `foo()` | Get the value of the property
    |

    | | 2: `getFooProperty().get()` | 2: `foo().get()` [long form] | |

    | Set Property Value | 1: `setFoo(val)` | 1: `foo() = val` | Set the value of
    the property |

    | | 2: `getFooProperty().set(val)` [long form] | 2: `foo.set(val)` [long form]
    | |

    | | 3: `obj.foo = val` [object literal shortcut] | | |


    Once you get used to the ScalaFX syntax, it is quite natural. In general, if you
    refer to a property directly, you will be accessing the full property object,
    which has all the methods for binding, listeners, and so on. However, if you follow
    the property name with parentheses, you will get (or set) the property value.


    **Tip:** This use of parentheses is supported via the Scala `apply` and `update`
    syntax, which is commonly used for Arrays and Lists, but in ScalaFX is used to
    differentiate between the raw properties and their values.


    One exception to this rule is in the object literal case (third example of Set
    Property Value), where you can use the assignment operator directly to set the
    value of a property (no parentheses needed). An unambiguous case, this is allowed
    because JavaFX properties references are read-only, and it significantly cleans
    up the syntax of the user code.


    If you ever get confused between properties and values, Scala’s type system will
    come to the rescue. In general, the ScalaFX APIs have been designed to preserve
    strong typing and produce type errors anywhere the developer’s intent is ambiguous.
    Therefore, if you use a property where a type is expected, or vice versa, the
    compiler will most likely catch the error before you even run the application.


    ## ScalaFX Bind APIs


    Binding is arguably one of the most innovative features in the JavaFX library;
    however, the APIs can be a bit cumbersome to use, especially in cases where you
    have complicated bind logic. The fluent API provided is quite powerful and expressive
    given the constraints of the Java language, but lacks a lot of the elegance that
    made bind so powerful with JavaFX Script.


    The ScalaFX Bind APIs sit on top of the JavaFX binding support, but wrap them
    in a programming language syntax that is natural to write and understand. By taking
    advantage of operator overloading and infix notation, you can write complex ScalaFX
    bind expressions without even knowing all of the bind API methods that come with
    JavaFX.'
