    Summary


    In this chapter, we explained briefly two options for integrating JavaFX applications
    and enterprise applications.


    We demonstrated a number of techniques for retrieving data available via web services,
    and also showed how to render the data in typical JavaFX controls such as ListView
    and TableView.


    We used a number of third-party tools that facilitate the process of retrieving,
    parsing, and rendering data. We demonstrated some JavaFX-specific issues related
    to remote web services (i.e., updating the UI should happen on the JavaFX application
    thread).


    It is important to realize that the decoupling between JavaFX client applications
    and web services allows for a large degree of freedom. There are different tools
    and techniques for dealing with web services, and developers are encouraged to
    use their favorite tools in their JavaFX application.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


