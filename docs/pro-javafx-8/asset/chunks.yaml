    Each node in a Scene can be assigned an ID in the id property of the node. For
    example, in the following snippet from Listing 2-2, the id property of a Text
    node is assigned the String "sceneHeightText". When the action event handler in
    the Hyperlink control is called, the lookup() method of the Scene instance is
    used to obtain a reference to the node with the id of "sceneHeightText". The event
    handler then prints the content of the Text node to the console.


