- fmt: "# Hyperlink Control\n\nThe `Hyperlink` control is a button that has the appearance\
    \ of a link seen in a browser. It can have a graphic, text, or both, and it responds\
    \ to mouse rollovers and clicks. In Step 19 of the previous exercise, you clicked\
    \ the `Hyperlink` control shown in Figure [6-9](#index_split_003.html#p239). As\
    \ a result, a message was printed to the Java console indicating that it was clicked.\
    \ The following code snippet from Listing 6-12 implements this functionality in\
    \ the `StarterApp` program:\n\n```\nHyperlink link = new Hyperlink(\"Hyperlink\"\
    );\nlink.setOnAction(e -> System.out.println(e.getEventType() + \" occurred on\
    \ Hyperlink\"));\n```\n\n# Defining a ChoiceBox\n\nWhen clicked, a `ChoiceBox`\
    \ control presents a popup containing a list of items from which to choose. In\
    \ Step 20 of the previous exercise, you clicked the `ChoiceBox` control shown\
    \ in Figure [6-9](#index_split_003.html#p239). As a result, a message was printed\
    \ to the Java console indicating which item you chose. The following code snippet\
    \ from Listing 6-12 implements this functionality in the `StarterApp` program:\n\
    \n```\nChoiceBox choiceBox;\nchoiceBox = new ChoiceBox(model.choiceBoxItems);\n\
    choiceBox.getSelectionModel().selectFirst();\nchoiceBox.getSelectionModel().selectedItemProperty()\n\
    \    .addListener((observable, oldValue, newValue) -> {\n        System.out.println(newValue\
    \ + \" chosen in ChoiceBox\");\n    });\n```\n\nTo initially select the first\
    \ item in the `ChoiceBox`, the preceding snippet invokes the `selectFirst()` method\
    \ of the choice box's `selectionModel`. To detect when the user chooses an item\
    \ in the `ChoiceBox`, we add the `ChangeListener` shown in the snippet to the\
    \ `selectedItem` property of the choice box's selection model.\n\nIn addition\
    \ to the code in the preceding snippet, the following snippet from Listing 6-1\
    \ contains an instance variable from our `StarterAppModel` class that contains\
    \ the objects that will be displayed in the `ChoiceBox`:\n\n```\npublic ObservableList\
    \ choiceBoxItems = FXCollections.observableArrayList(\n    \"Choice A\",\n   \
    \ \"Choice B\",\n    \"Choice C\",\n    \"Choice D\"\n);\n```\n\nNow we move on\
    \ to a control named `MenuButton` whose appearance is similar to the `ChoiceBox`,\
    \ but whose behavior is similar to a `Menu`.\n\n# Using a MenuButton\n\nWhen clicked,\
    \ a `MenuButton` control pops up a context menu that contains `MenuItem` instances\
    \ from which to choose.\n\nIn Step 21 of the previous exercise, you clicked the\
    \ `MenuButton` control shown in Figure [6-9](#index_split_003.html#p239). As a\
    \ result, a message was printed to the Java console indicating which `MenuItem`\
    \ you chose. The following code snippet, from Listing 6-12, implements this functionality\
    \ in the `StarterApp` program:\n\n```\nMenuItem menuA = new MenuItem(\"MenuItem\
    \ A\");\nmenuA.setOnAction(e -> System.out.println(e.getEventType() + \" occurred\
    \ on Menu Item A\"));\nMenuItem menuB = new MenuItem(\"MenuItem B\");\nMenuButton\
    \ menuButton = new MenuButton(\"MenuButton\");\nmenuButton.getItems().addAll(menuA,\
    \ menuB);\n```\n\nBecause of the similarity between the `MenuButton` and `Menu`\
    \ classes, the concepts in the previous snippet are covered in the section \"\
    Creating a Menu and Defining Menu Items\" earlier in the chapter. One of the distinguishing\
    \ features of `MenuButton` is the `popupSide` property, which enables you to choose\
    \ on which side of the `MenuButton` the `ContextMenu` should pop up.\n\nAnother\
    \ way to pop up a `ContextMenu` that doesn't require using a `MenuButton` is our\
    \ next topic of discussion.\n\n# Creating a ContextMenu\n\nIn Step 30 of the previous\
    \ exercise, you clicked the secondary mouse button in a blank area of the `ScrollPane`\
    \ shown in Figure [6-11](#index_split_003.html#p241), and a `ContextMenu` popped\
    \ up, from which you chose a `MenuItem`. The following snippet from Listing 6-12\
    \ realizes this behavior:\n\n```\nMenuItem contextA = new MenuItem(\"MenuItem\
    \ A\");\ncontextA.setOnAction(e -> System.out.println(e.getEventType()\n    +\
    \ \" occurred on Menu Item A\"));\nMenuItem contextB = new MenuItem(\"MenuItem\
    \ B\");\nfinal ContextMenu contextMenu = new ContextMenu(contextA, contextB);\n\
    ScrollPane scrollPane = new ScrollPane(variousControls);\n...\nscrollPane.setOnMousePressed((MouseEvent\
    \ me) -> {\n    if (me.getButton() == MouseButton.SECONDARY) {\n        contextMenu.show(stage,\
    \ me.getScreenX(), me.getScreenY());\n    }\n});\n```\n\nWhen the user presses\
    \ the secondary mouse button, the lambda expression defined in the `setOnMousePressed`\
    \ method is invoked. Calling the `show()` method in the manner used in the snippet\
    \ causes the `ContextMenu` to be displayed on the screen at the location in which\
    \ the mouse was pressed. A `ContextMenu` must have an owner, either a `Node` or\
    \ a `Stage`, for it to be displayed, which is why the `Stage` object was passed\
    \ into the `show()` method.\n\n# Creating a SplitMenuButton\n\nVery similar to\
    \ the `MenuButton`, the `SplitMenuButton` pops up a `ContextMenu` when the down\
    \ arrow is clicked. In addition, when the main part of the `SplitMenuButton` is\
    \ clicked, the behavior is that of a `Button`. Both of these behaviors are demonstrated\
    \ in Steps 22 and 23 of the previous exercise when interacting with the `SplitMenuButton`\
    \ shown in Figure [6-9](#index_split_003.html#p239). The following snippet from\
    \ Listing 6-12 realizes these behaviors:\n\n```\nMenuItem splitMenuA = new MenuItem(\"\
    MenuItem A\");\nsplitMenuA.setOnAction(e -> System.out.println(e.getEventType()\n\
    \    + \" occurred on Menu Item A\"));\nMenuItem splitMenuB = new MenuItem(\"\
    MenuItem B\");\nSplitMenuButton splitMenuButton = new SplitMenuButton(splitMenuA,\
    \ splitMenuB);\nsplitMenuButton.setText(\"SplitMenuButton\");\nsplitMenuButton.setOnAction(e\
    \ -> System.out.println(e.getEventType()\n    + \" occurred on SplitMenuButton\"\
    ));\n```\n\nLet's move away from the button-like UI controls and turn our attention\
    \ to some UI controls that accept text input, starting with the `TextField`.\n\
    \n# Defining a TextField\n\nIn Step 25 of the exercise, as you entered text into\
    \ the `TextField` shown in Figure [6-9](#index_split_003.html#p239), the contents\
    \ of the `TextField` were printed to the Java console each time the contents changed\
    \ (e.g., as characters were typed into the `TextField`).\n\nThe following snippet\
    \ from Listing 6-12 creates the `TextField` and implements these behaviors:\n\n\
    ```\nfinal TextField textField = new TextField();\ntextField.setPromptText(\"\
    Enter user name\");\ntextField.setPrefColumnCount(16);\ntextField.textProperty().addListener((ov,\
    \ oldValue, newValue) -> {\n    System.out.println(\"TextField text is: \" + textField.getText());\n\
    });\n```\n\nTo detect when the text property of the `TextField` has changed, the\
    \ code in this snippet adds a `ChangeListener` to the text property. The new value\
    \ of the text property is then printed to the Java console in the body of the\
    \ lambda expression.\n\n# Using a PasswordField\n\nThe `PasswordField` extends\
    \ the `TextField` class, and its purpose is to mask the characters that are typed\
    \ into it. In Step 26 of the exercise, when you entered text into the `PasswordField`\
    \ shown in Figure [6-9](#index_split_003.html#p239) and subsequently caused the\
    \ `PasswordField` to lose focus, the contents of the `PasswordField` were printed\
    \ to the Java console. The following snippet from Listing 6-12 creates the `PasswordField`\
    \ and implements these behaviors:\n\n```\nfinal PasswordField passwordField =\
    \ new PasswordField();\npasswordField.setPromptText(\"Enter password\");\npasswordField.setPrefColumnCount(16);\n\
    passwordField.focusedProperty().addListener((ov, oldValue, newValue) -> {\n  \
    \  if (!passwordField.isFocused()) {\n        System.out.println(\"PasswordField\
    \ text is: \"\n            + passwordField.getText());\n    }\n});\n```\n\nTo\
    \ detect when the `PasswordField` has lost focus, the code in the preceding snippet\
    \ adds a `ChangeListener` to the `focused` property. The value of the text property\
    \ is then printed to the Java console in the body of the lambda expression if\
    \ the `PasswordField` is indeed not focused.\n\n# Creating a TextArea"
