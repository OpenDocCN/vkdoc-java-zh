- fmt: "# JavaFX 3D 光照类层次结构\n\nJavaFX 3D 图形 API 的光照类层次结构由 `LightBase` 抽象类及其具体子类 `AmbientLight`\
    \ 和 `PointLight` 组成。它们属于 `javafx.scene` 包。`AmbientLight` 是一种似乎来自四面八方的光源。`PointLight`\
    \ 是一种在空间中具有固定点并向各个方向均匀辐射光线的光源。它们是 `Node`，因此可以添加到 JavaFX 场景中为场景提供光照。它们也可以使用 `Translate`\
    \ 变换移动到所需位置。如果它们被添加到容器中，则当容器被变换时，它们会随容器一起移动。\n\n## 理解 `LightBase` 类\n\n`LightBase`\
    \ 抽象类具有以下公共方法：\n\n- `void setColor(Color)`\n- `Color getColor()`\n- `ObjectProperty<Color>\
    \ colorProperty()`\n- `void setLightOn(boolean)`\n- `boolean isLightOn()`\n- `BooleanProperty\
    \ lightOnProperty()`\n- `ObservableList<Node> getScope()`\n\n这些方法为 `LightBase`\
    \ 类定义了两个属性：`color` 和 `lightOn`。`color` 属性的类型为 `Color`，用于定义光的颜色。`lightOn` 属性是一个布尔属性，用于控制光是否开启。`getScope()`\
    \ 方法返回一个 `ObservableList<Node>`。当此列表为空时，光会影响场景中的所有 `Node`。当此列表不为空时，光仅影响列表中包含的\
    \ `Node`。\n\n## 理解 `AmbientLight` 类\n\n`AmbientLight` 类具有以下构造函数：\n\n- `AmbientLight()`\n\
    - `AmbientLight(Color color)`\n\n默认构造函数创建一个默认颜色为 `Color.WHITE` 的 `AmbientLight`。单参数构造函数创建一个具有指定颜色的\
    \ `AmbientLight`。除了从 `LightBase` 基类继承的方法外，`AmbientLight` 类没有其他公共方法。\n\n## 理解 `PointLight`\
    \ 类\n\n`PointLight` 类具有以下构造函数：\n\n- `PointLight()`\n- `PointLight(Color color)`\n\
    \n默认构造函数创建一个默认颜色为 `Color.WHITE` 的 `PointLight`。单参数构造函数创建一个具有指定颜色的 `PointLight`。除了从\
    \ `LightBase` 基类继承的方法外，`PointLight` 类没有其他公共方法。\n\n## 光照使用示例\n\n清单 10-6 中的程序演示了在\
    \ JavaFX 3D 场景中使用光照。两个 `PointLight`（一个红色，一个蓝色）被添加到一个已经包含 `Box` 和 `PerspectiveCamera`\
    \ 的场景中。窗口底部添加了一个带有滑块的控制面板，可以改变两个光的坐标，以便您观察光位于不同位置时的效果。\n\n**清单 10-6.** `LightExample.java`\n\
    \n```java\nimport javafx.application.Application;\nimport javafx.beans.property.DoubleProperty;\n\
    import javafx.beans.property.SimpleDoubleProperty;\nimport javafx.geometry.Insets;\n\
    import javafx.geometry.Pos;\nimport javafx.scene.*;\nimport javafx.scene.control.Label;\n\
    import javafx.scene.control.Slider;\nimport javafx.scene.layout.BorderPane;\n\
    import javafx.scene.layout.HBox;\nimport javafx.scene.layout.VBox;\nimport javafx.scene.paint.Color;\n\
    import javafx.scene.shape.Box;\nimport javafx.scene.transform.Rotate;\nimport\
    \ javafx.scene.transform.Translate;\nimport javafx.stage.Stage;\n\npublic class\
    \ LightExample extends Application {\n    private Model model;\n    private View\
    \ view;\n\n    public LightExample() {\n        model = new Model();\n    }\n\n\
    \    @Override\n    public void start(Stage stage) throws Exception {\n      \
