    \ along with its column index and its row index. The second version of the `add`\
    \ method additionally allows you to specify the number of columns and rows that\
    \ the `Node` should span. This latter version is used for the player controls\
    \ (the `controlPanel` `Node` and the `openButton`) to allow them to span multiple\
    \ rows.\n\nWith its ability to specify row and column sizing constraints, create\
    \ custom alignments, and even display multiple nodes per cell, the `GridPane`\
    \ is by far the most powerful and flexible layout in your JavaFX toolkit. It really\
    \ pays to become familiar with all of its abilities.\n\n# Creating Playback Controls\n\
