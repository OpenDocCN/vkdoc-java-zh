    **Introduction**


    As a developer, author, speaker, and advocate for JavaFX since its inception in
    2007, I am very excited about JavaFX 8. It was released in March 2014 as an integral
    part of Java SE 8, and is the successor to Java Swing. As you’ll read in the pages
    of this book, JavaFX runs on desktops (Mac, Windows, Linux), as well as embedded
    devices such as the Raspberry Pi. As the Internet of things (IoT) is increasingly
    realized, JavaFX is well positioned to enable the user interface of IoT. Also,
    because of community projects led by folks such as Johan Vos and Niklas Therning,
    developers are deploying JavaFX apps on Android and iOS devices.


    The JavaFX community has many talented, passionate, and cordial developers, and
    I count it a privilege to call them my colleagues. One such colleague, Johan Vos,
    is a coauthor of our *Pro JavaFX 2* book, and is the lead author of this *Pro
    JavaFX 8* book. It has been my pleasure to continue working with Johan on this
    book under his leadership.


    Please join me in welcoming and congratulating him in this role, perhaps by tweeting
    him at @JohanVos or posting a review of this book on Amazon. It is my hope that
    you’ll find this book both enjoyable and instrumental in helping you learn JavaFX!


    —James L. Weaver


    Java Technology Ambassador


    Oracle Corporation


