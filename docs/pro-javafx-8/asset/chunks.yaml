    \ UI 中各种控件提供事件处理代码的控制器。右侧是检查器区域，它包含多个子区域，允许您操作当前选中控件的属性、布局和代码连接。\n\n## 理解 FXML\
    \ 文件\n\n清单 3-1 显示了 JavaFX SceneBuilder 根据我们创建的 UI 保存的 `FXML` 文件。\n\n**清单 3-1.**\
