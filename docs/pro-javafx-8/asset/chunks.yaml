    裁剪图形区域


    为了定义裁剪区域，我们将一个 `Node` 子类赋值给 `clip` 属性，该属性定义了裁剪形状，在本例中是一个宽 430 像素、高 85 像素的 `Rectangle`。除了防止
    `Text` 覆盖月球外，当 `Text` 因动画向上滚动时，裁剪区域还能防止 `Text` 覆盖地球。


    动画化文本使其向上滚动


    当调用 `HelloEarthriseMain` 程序时，`Text` 开始缓慢向上滚动。为了实现此动画，我们使用了位于 `javafx.animation`
    包中的 `TranslateTransition` 类，如清单 1-1 中的以下片段所示。


    ```java

    TranslateTransition transTransition = new TranslateTransition(new Duration(75000),
    textRef);

    transTransition.setToY(-820);

    transTransition.setInterpolator(Interpolator.LINEAR);

    transTransition.setCycleCount(Timeline.INDEFINITE);

    ...代码省略...

    // 启动文本动画

    transTransition.play();

    ```


    `javafx.animation` 包包含用于动画化节点的便捷类。此 `TranslateTransition` 实例将 `textRef` 变量引用的
    `Text` 节点从其原始 Y 位置 100 像素转换到 Y 位置 -820 像素，持续时间为 75 秒。`Interpolator.LINEAR` 常量被赋值给
    `interpolator` 属性，这会导致动画以线性方式进行。查看 `javafx.animation` 包中 `Interpolator` 类的 API
    文档，可以发现还有其他形式的插值可用，其中一种是 `EASE_OUT`，它会在指定持续时间结束时减慢动画速度。


    ■ **注意** 在此上下文中，插值是在给定起始值、结束值和持续时间的情况下，计算任意时间点值的过程。


    前面片段中的最后一行开始执行程序中先前创建的 `TranslateTransition` 实例的 `play` 方法。这使得 `Text` 开始向上滚动。由于赋给
    `cycleCount` 变量的值，此过渡将无限重复。


