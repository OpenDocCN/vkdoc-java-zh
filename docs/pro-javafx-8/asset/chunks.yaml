    ## Working with Graphical Nodes as a Group


    One powerful graphical feature of JavaFX is the ability to create scene graphs,
    which consist of a tree of graphical nodes. You can then assign values to properties
    of a `Group` located in the hierarchy, and the nodes contained in the `Group`
    will be affected. In our current example from Listing 1-1, we’re using a `Group`
    to contain a `Text` node and to clip a specific rectangular region within the
    `Group` so that the text doesn’t appear on the moon or the Earth as it animates
    upward. Here’s the relevant code snippet:


    ```

    Group textGroup = new Group(textRef);

    textGroup.setLayoutX(50);

    textGroup.setLayoutY(180);

    textGroup.setClip(new Rectangle(430, 85));

    ```


    Notice that the `Group` is located 50 pixels to the right and 180 pixels down
    from where it would have been located by default. This is due to the values assigned
    to the `layoutX` and `layoutY` variables of the `Group` instance. Because this
    `Group` is contained directly by the `Scene`, its upper-left corner’s location
    is 50 pixels to the right and 180 pixels down from the upper-left corner of the
    `Scene`. Take a look at Figure 1-5 to see this example illustrated as you read
    the rest of the explanation.


    **Figure 1-5.** The Scene, Group, Text, and clip illustrated


    A `Group` instance contains instances of `Node` subclasses by assigning a collection
    of them to itself via the `children()` method. In the previous code snippet, the
    `Group` contains a `Text` instance that has a value assigned to its `layoutY`
    property. Because this `Text` is contained by a `Group`, it assumes the two-dimensional
    space (also called the coordinate space) of the `Group`, with the origin of the
    `Text` node (0,0) coincident with the top-left corner of the `Group`.


    Assigning a value of 100 to the `layoutY` property causes the `Text` to be located
    100 pixels down from the top of the `Group`, which is just below the bottom of
    the clip region, thus causing it to be out of view until the animation begins.


    Because a value isn’t assigned to the `layoutX` variable, its value is 0 (the
    default).


    The `layoutX` and `layoutY` properties of the `Group` just described are examples
    of our earlier statement that nodes contained in a `Group` will be affected by
    values assigned to properties of the `Group`. Another example is setting the `opacity`
    property of a `Group` instance to 0.5, which causes all of the nodes contained
    in that `Group` to become translucent. If the JavaFX API documentation is handy,
    look at the properties available in the `javafx.scene.Group` class. Then look
    at the properties available in the `javafx.scene.Node` class properties, which
    is where you’ll find the `layoutX`, `layoutY`, and `opacity` variables that are
    inherited by the `Group` class.


    ## Clipping Graphical Areas


    To define a clipping area, we assign a `Node` subclass to the `clip` property
    that defines the clipping shape, in this case a `Rectangle` that is 430 pixels
    wide and 85 pixels high. In addition to keeping the `Text` from covering the moon,
    when the `Text` scrolls up as a result of animation, the clipping area keeps the
    `Text` from covering the earth.


    ## Animating the Text to Make It Scroll Up


    When the `HelloEarthriseMain` program is invoked, the `Text` begins scrolling
    up slowly. To achieve this animation, we’re using the `TranslateTransition` class
    located in the `javafx.animation` package, as shown in the following snippet from
    Listing 1-1.


    ```

    TranslateTransition transTransition = new TranslateTransition(new Duration(75000),
    textRef);

    transTransition.setToY(-820);

    transTransition.setInterpolator(Interpolator.LINEAR);

    transTransition.setCycleCount(Timeline.INDEFINITE);

    ...code omitted...

    // Start the text animation

    transTransition.play();

    ```


    The `javafx.animation` package contains convenience classes for animating nodes.
    This `TranslateTransition` instance translates the `Text` node referenced by the
    `textRef` variable from its original Y position of 100 pixels to a Y position
    of –820 pixels, over a duration of 75 seconds. The `Interpolator.LINEAR` constant
    is assigned to the `interpolator` property, which causes the animation to proceed
    in a linear fashion. A look at the API docs for the `Interpolator` class in the
    `javafx.animation` package reveals that there are other forms of interpolation
    available, one of which is `EASE_OUT`, which slows down the animation toward the
    end of the specified duration.


    **Note:** Interpolation in this context is the process of calculating the value
    at any point in time, given a beginning value, an ending value, and a duration.


    The last line in the previous snippet begins executing the `play` method of the
    `TranslateTransition` instance created earlier in the program. This makes the
    `Text` begin scrolling upward. Because of the value assigned to the `cycleCount`
    variable, this transition will repeat indefinitely.


