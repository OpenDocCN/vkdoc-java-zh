    表达式，并将所选颜色打印到标准控制台。


    现在，我们将转向以图形方式表示不同范围内数值的控件。


    创建 Slider


    Slider 控件通过其滑块表示一个数值，并允许用户通过拖动滑块来选择数值。在练习的第 28 步中，你与图 6-10, t 所示的 Slider 进行了交互，以控制其正上方的
    ProgressIndicator 的值。以下来自清单 6-12 的代码片段包含了实现此行为中与 Slider 相关部分的代码：


    final Slider slider = new Slider(-1, model.maxRpm, 0);


    slider.setPrefWidth(200);


    slider.valueProperty().bindBidirectional(model.rpm);


    Slider 的范围通过其 min 和 max 属性设置，在本例中分别为 -1 和 StarterAppModel 类中 maxRpm 实例变量的值。min、max
    属性和初始值通过构造函数传递。


    此外，Slider 的 value 属性与模型中的 rpm 属性进行了双向绑定，正如你在第 26 步中所体验到的，这用于保持 ProgressIndicator
    的更新。以下来自清单 6-1 的代码片段包含了 StarterAppModel 类中的相关实例变量：


    public double maxRpm = 8000.0;


    public DoubleProperty rpm = new SimpleDoubleProperty(0);


    定义 ProgressIndicator


    ProgressIndicator 控件显示操作的进度，可以表示为完成百分比或不确定状态。以下代码片段包含了创建 ProgressIndicator 并使其
    progress 属性根据模型中的相关实例变量保持更新的代码。


    final ProgressIndicator progressIndicator = new ProgressIndicator();


    progressIndicator.setPrefWidth(200);


    progressIndicator.progressProperty().bind(model.rpm.divide(model.maxRpm));


    由于此代码片段中所示的绑定，当 StarterAppModel 类中的 rpm 变量为负数时，ProgressIndicator 的 progress 属性也会变为负数。这会导致
    ProgressIndicator 呈现你在练习第 28 步中遇到的不确定外观。请注意，我们在绑定表达式中使用了第 4 章介绍的 Fluent API。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 6 章 ■ 使用 JavaFX UI 控件


