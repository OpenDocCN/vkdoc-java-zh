    **关于作者**


    **Johan Vos** 是一位 Java 冠军，自 1995 年开始使用 Java。作为 Blackdown 团队的一员，他帮助将 Java 移植到 Linux。在他共同创立的
    LodgON 公司，他主要致力于基于 Java 的社交网络软件解决方案。他的主要关注点是端到端 Java，结合后端系统和嵌入式设备的优势。他目前最喜爱的技术是后端的
    Java EE/Glassfish 和前端的 JavaFX。他为多个开源项目做出了贡献，包括 DataFX 和 JavaFX 的 Android 移植版。Johan
    的博客可通过 [`blogs.lodgon.com/johan`](http://blogs.lodgon.com/johan) 关注，他的推特账号是 [`twitter.com/johanvos`](http://twitter.com/johanvos)，也可以通过
    [johan@lodgon.com](http://johan@lodgon.com) 联系到他。


    **Weiqi Gao** 是密苏里州圣路易斯市 Object Computing, Inc. 的首席软件工程师。他拥有数十年的软件开发经验，并从 1998
    年开始使用 Java 技术。他对编程语言、面向对象系统、分布式计算和图形用户界面感兴趣。他是圣路易斯 Java 用户组指导委员会的成员。Weiqi 拥有数学博士学位。


    **Stephen Chin** 是 Oracle 的 Java 大使，专攻嵌入式与用户界面技术，并担任 JavaOne 内容主席。他曾在世界各地的 Java
    会议上亮相，包括 Devoxx、JFokus、OSCON、JFall、GeeCON、JustJava 和 JavaOne，并在 JavaOne 上三次获得
    Rock Star 奖。Stephen 是一位狂热的摩托车手，曾进行过数次泛欧布道之旅，在黑客的自然栖息地采访他们，并将视频发布在 [`nighthacking.com/`](http://nighthacking.com/)。不旅行时，他喜欢教孩子们如何与他
    11 岁的女儿一起进行嵌入式开发和机器人编程。


