- fmt: 'Just as JavaFX has the rule that requires all access to live scenes to be
    done in the JavaFX Application Thread, Swing has the rule that requires all access
    to Swing GUIs to be done in the EDT. You still need to jump the thread if you
    want to alter a Swing component from a JavaFX event handler or vice versa. The
    proper way to execute a piece of code on the JavaFX Application Thread, as we
    saw earlier, is to use `Platform.runLater()`. The proper way to execute a piece
    of code on the Swing EDT is to use `EventQueue.invokeLater()`.


    In this section, we convert a pure Swing program into a Swing and JavaFX hybrid
    program. We start off with the Swing program in Listing 7-11, which is very similar
    to the `ResponsiveUIExample` program.


    **Listing 7-11.** `NoJavaFXSceneInSwingExample.java`


    ```java

    import javax.swing.*;


    import java.awt.*;


    import java.awt.event.ActionEvent;


    import java.awt.event.ActionListener;


    public class NoJavaFXSceneInSwingExample {


    public static void main(final String[] args) {


    EventQueue.invokeLater(new Runnable() {


    @Override


    public void run() {


    swingMain(args);


    }


    });


    }


    private static void swingMain(String[] args) {


    Model model = new Model();


    View view = new View(model);


    Controller controller = new Controller(model, view);


    controller.mainLoop();


    }


    private static class Model {


    public Color fillColor = Color.LIGHT_GRAY;


    public Color strokeColor = Color.DARK_GRAY;


    }


    private static class View {


    public JFrame frame;


    public JComponent canvas;


    public JButton changeFillButton;


    public JButton changeStrokeButton;


    private View(final Model model) {


    frame = new JFrame("No JavaFX in Swing Example");


    canvas = new JComponent() {


    @Override


    public void paint(Graphics g) {


    g.setColor(model.strokeColor);


    g.fillRect(0, 0, 200, 200);


    g.setColor(model.fillColor);


    g.fillRect(10, 10, 180, 180);


    }


    @Override


    public Dimension getPreferredSize() {


    return new Dimension(200, 200);


    }


    };


    FlowLayout canvasPanelLayout = new FlowLayout(FlowLayout.CENTER, 10, 10);


    JPanel canvasPanel = new JPanel(canvasPanelLayout);


    canvasPanel.add(canvas);


    changeFillButton = new JButton("Change Fill");


    changeStrokeButton = new JButton("Change Stroke");


    FlowLayout buttonPanelLayout = new FlowLayout(FlowLayout.CENTER, 10, 10);


    JPanel buttonPanel = new JPanel(buttonPanelLayout);


    buttonPanel.add(changeFillButton);


    buttonPanel.add(changeStrokeButton);


    frame.add(canvasPanel, BorderLayout.CENTER);


    frame.add(buttonPanel, BorderLayout.SOUTH);


    frame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);


    frame.setLocationByPlatform(true);


    frame.pack();


    }


    }


    private static class Controller {


    private View view;


    private Controller(final Model model, final View view) {


    this.view = view;


    this.view.changeFillButton.addActionListener(new ActionListener() {


    @Override


    public void actionPerformed(ActionEvent e) {


    if (model.fillColor.equals(Color.LIGHT_GRAY)) {


    model.fillColor = Color.GRAY;


    } else {


    model.fillColor = Color.LIGHT_GRAY;


    }


    view.canvas.repaint();


    }


    });


    this.view.changeStrokeButton.addActionListener(new ActionListener() {


    @Override


    public void actionPerformed(ActionEvent e) {


    if (model.strokeColor.equals(Color.DARK_GRAY)) {


    model.strokeColor = Color.BLACK;


    } else {


    model.strokeColor = Color.DARK_GRAY;


    }


    view.canvas.repaint();


    }


    });


    }


    public void mainLoop() {


    view.frame.setVisible(true);


    }


    }


    }

    ```


    When the program in Listing 7-11 is run, the UI in Figure 7-17 is displayed. It
    is a `JFrame` holding three Swing components, a `JComponent` with overridden `paint()`
    and `getPreferredSize()` methods that makes it look like the rectangle we saw
    in the earlier program, and two `JButton`s that will change the fill and the stroke
    of the rectangle.


    **Figure 7-17.** The `NoJavaFXSceneInSwingExample` program'
