  trans: "\n运行清单 7-15 中的程序时，将显示图 7-21 所示的 GUI。JavaFX 应用程序中央的矩形是一个 Swing JComponent。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 117](img/index-349_1.jpg)\n\
    \n第 7 章 ■ 集合与并发\n\n***图 7-21.** SwingComponentInJavaFXExample 程序*\n\n■ **提示**\
    \ 如果您想知道是否有办法将 SWT 小部件嵌入到 JavaFX 应用程序中，答案是否定的。\n\n原因是 SWT 小部件是重量级组件，因此更难集成到像 JavaFX\
    \ 这样的轻量级 GUI 工具包中。\n\n总结\n\n在本章中，我们研究了 JavaFX 可观察集合、JavaFX 工作线程框架、在 Swing 和 SWT\
    \ 应用程序中嵌入 JavaFX 场景，以及在 JavaFX 应用程序中嵌入 Swing 组件，以帮助您理解以下原理和技术。\n\n• JavaFX 支持可观察集合和数组：`ObservableList`、`ObservableMap`、\n\
    `ObservableSet` 和 `ObservableArray`，以及子接口 `ObservableIntegerArray` 和\n`ObservableFloatArray`。\n\
    • `ObservableList` 通过 `ListChangeListener` 触发 `Change` 事件。`ListChangeListener.Change`\
    \ 可能包含一个或多个离散更改。\n• `ObservableMap` 通过 `MapChangeListener` 触发 `Change` 事件。`MapChangeListener.Change`\
    \ 仅表示一个键的更改。\n• `ObservableSet` 通过 `SetChangeListener` 触发 `Change` 事件。`SetChangeListener.Change`\
    \ 仅表示一个元素的更改。\n• `ObservableArray` 及其子接口通过 `ArrayChangeListener` 触发更改事件。\n• `FXCollections`\
    \ 类包含用于创建可观察集合和数组的工厂方法，以及用于操作它们的实用方法。\n• JavaFX 应用程序中的主事件处理线程是 JavaFX 应用程序线程。所有对活动场景的访问都必须通过\
    \ JavaFX 应用程序线程进行。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7\
    \ 章 ■ 集合与并发\n\n• 其他重要线程，如 Prism 渲染线程和媒体事件线程，与 JavaFX 应用程序线程协作，以实现图形渲染和媒体播放。\n\
    • 在 JavaFX 应用程序线程上执行长时间运行的计算会使 JavaFX GUI 无响应。这些计算应分配给后台线程或工作线程。\n• `Worker` 接口定义了九个可在\
    \ JavaFX 应用程序线程上观察的属性。它还定义了一个 `cancel()` 方法。\n• `Task<V>` 定义了一次性任务，用于将工作卸载到后台线程或工作线程，并将结果或异常传达给\
    \ JavaFX 应用程序线程。\n• `Service<V>` 定义了用于创建和运行后台任务的可重用机制。\n• `ScheduledService<V>`\
    \ 定义了用于以重复方式创建和运行后台任务的可重用机制。\n• `JFXPanel` 类是一个 `JComponent`，可以将 JavaFX 场景放入 Swing\
    \ 应用程序中。\n• 在 Swing JavaFX 混合程序中，在 Swing 事件监听器中使用 `Platform.runLater()` 来访问 JavaFX\
    \ 场景，并在 JavaFX 事件处理器中使用 `EventQueue.invokeLater()` 或 `SwingUtilities.invokeLater()`\
    \ 来访问 Swing 小部件。\n• `FXCanvas` 类是一个 SWT 小部件，可以将 JavaFX 场景放入 SWT 应用程序中。\n• 在 SWT\
    \ JavaFX 混合程序中，SWT UI 线程和 JavaFX 应用程序线程是同一个线程。\n• `SwingNode` 类是一个 JavaFX `Node`，可以将\
    \ Swing 组件放入 JavaFX 应用程序中。\n\n资源\n\n以下是一些有助于理解本章内容的实用资源：\n\n• *JavaFX 教程网站上的 JavaFX\
    \ 架构页面：* [`docs.oracle.com/javase/8/javafx/get-started-tutorial/jfx-architecture.htm#JFXST788`](http://docs.oracle.com/javase/8/javafx/get-started-tutorial/jfx-architecture.htm#JFXST788)\n\
    • *FX Experience 上关于 JavaFX 工作线程框架的原始文章：*\n[`fxexperience.com/2011/07/worker-threading-in-javafx-2-0/`](http://fxexperience.com/2011/07/worker-threading-in-javafx-2-0/)\n\
    • *FX Experience 上关于 JavaFX 和 SWT 互操作性的原始文章：*\n[`fxexperience.com/2011/12/swt-interop/`](http://fxexperience.com/2011/12/swt-interop/)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 8 章**\n\n**在 JavaFX\
    \ 中创建图表**\n\n*任何足够先进的技术都与魔法无异。*\n\n——阿瑟·C·克拉克\n\n报表是许多业务应用程序中的一个重要方面。JavaFX 平台包含一个用于创建图表的\
    \ API。由于 `Chart` 本质上是一个 `Node`，因此将图表与 JavaFX 应用程序的其他部分集成起来非常简单。因此，报表是典型 JavaFX\
    \ 业务应用程序的一个组成部分。\n\n设计 API 通常是在多个需求之间进行权衡。两个最常见的需求是“易于使用”和“易于扩展”。JavaFX Chart\
    \ API 满足了这两点。Chart API 包含许多方法，允许开发人员更改图表的外观以及数据，使其成为一个灵活且易于扩展的 API。不过，设置的默认值非常合理，只需几行代码即可轻松将图表集成到自定义应用程序中。\n\
    \nJavaFX 8 中的 JavaFX Chart API 有八个具体的实现，可供开发人员直接使用。\n\n除此之外，开发人员还可以通过扩展其中一个抽象类来添加自己的实现。\n\
    \nJavaFX Chart API 的结构\n\n存在不同类型的图表，并且有多种方法可以对它们进行分类。JavaFX Chart API 区分了双轴图表和无轴图表。JavaFX\
    \ 8 版本包含一个无轴图表的实现，即 `PieChart`。有许多双轴图表，它们都扩展了抽象类 `XYChart`，如图 8-1 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n第 8 章 ■ 在 JavaFX 中创建图表\n\nChart\n│\n├── PieChart\n│\n└── XYChart\n    ├── AreaChart\n\
    \    ├── BarChart\n    ├── BubbleChart\n    ├── LineChart\n    ├── ScatterChart\n\
    \    ├── StackedAreaChart\n    └── StackedBarChart\n\n***图 8-1.** JavaFX Chart\
    \ API 中的图表概览*\n\n抽象类 `Chart` 定义了所有图表的设置。基本上，一个图表由三部分组成：标题、图例和内容。内容对于每个图表的实现是特定的，但图例和标题的概念在各个实现中是相似的。因此，`Chart`\
    \ 类有许多属性以及相应的 getter 和 setter 方法，允许操作这些概念。`Chart` 类的 javadoc 提到了以下属性。\n\n`BooleanProperty\
    \ animated`\n`ObjectProperty<Node> legend`\n`BooleanProperty legendVisible`\n\
    `ObjectProperty<Side> legendSide`\n`StringProperty title`\n`ObjectProperty<Side>\
    \ titleSide`\n\n我们将在接下来的示例中使用其中一些属性，但也会展示即使不为这些属性设置值，Chart API 也能让您创建出漂亮的图表。\n\
    \n由于 `Chart` 扩展了 `Region`、`Parent` 和 `Node`，因此这些类上所有可用的属性和方法也可以用于 `Chart`。好处之一是，用于向\
    \ JavaFX `Node` 添加样式信息的相同 CSS 样式技术也适用于 JavaFX 图表。\n\n*JavaFX CSS 参考指南*，可在 [`download.java.net/jdk8/jfxdocs/javafx/scene/doc-files/cssref.html`](http://download.java.net/jdk8/jfxdocs/javafx/scene/doc-files/cssref.html)\
    \ 获取，其中包含设计人员和开发人员可以更改的 CSS 属性概览。\n"
- fmt: "By default, the modena style sheet that comes with the JavaFX 8.0 Runtime\
    \ is used to skin JavaFX Charts. For more information on using CSS styles in JavaFX\
    \ Chart, refer to the Oracle Chart tutorial at [http://docs.oracle.com/](http://docs.oracle.com/javase/8/javafx/user-interface-tutorial/css-styles.htm).\n\
    \n[javase/8/javafx/user-interface-tutorial/css-styles.htm](http://docs.oracle.com/javase/8/javafx/user-interface-tutorial/css-styles.htm)\n\
    \n## Using the JavaFX PieChart\n\nA `PieChart` renders information in a typical\
    \ pie structure, where the sizes of the slices are proportional to the values\
    \ of the data. Before diving into the details, we show a small application that\
    \ renders a `PieChart`.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    ![Image 118](index-353_1.jpg)\n\n### The Simple Example\n\nOur example shows the\
    \ “market share” of a number of programming languages, based on the TIOBE index\
    \ in December 2011. The TIOBE Programming Community Index is available at [www.tiobe.com/index.php/content/](http://www.tiobe.com/index.php/content/paperinfo/tpci/index.html)\
    \ [paperinfo/tpci/index.html](http://www.tiobe.com/index.php/content/paperinfo/tpci/index.html),\
    \ and it provides an indication of the popularity of programming languages based\
    \ on search engine traffic. A screenshot of the ranking in December 2011 is shown\
    \ in Figure [8-2](#index_split_004.html#p353).\n\n**Figure 8-2.** Screenshot of\
    \ the TIOBE index in December 2011, taken from [www.tiobe.com/index.php/content/](http://www.tiobe.com/index.php/content/paperinfo/tpci/index.html)\
    \ [paperinfo/tpci/index.html](http://www.tiobe.com/index.php/content/paperinfo/tpci/index.html)\n\
    \n> **Note:** the algorithm used by TIOBE is described at [www.tiobe.com/index.php/content/paperinfo/tpci/tpci_](http://www.tiobe.com/index.php/content/paperinfo/tpci/tpci_definition.htm)\
