  raw: 'Suppose that you have a JavaFX bean that has a property, whose type is a JavaFX
    bean that has a property, whose type is a JavaFX bean that has a property, and
    so on. Suppose also that you are observing the root of this properties chain through
    an ObjectProperty. You can then create a binding that observes the deeply nested
    JavaFX Beans property by calling one of the select methods whose type matches
    the type of the deeply nested JavaFX Beans property with the ObjectProperty as
    the root, and the successive JavaFX Beans property names that reach into the deeply
    nested JavaFX Beans property as the rest of the arguments.


    ■ **Note** there is another set of select methods that takes an ObservableValue
    as the first parameter. they were introduced in JavaFX 2.0\. the set of select
    methods that takes an Object as the first parameter allows us to use any Java
    object, not merely JavaFX Beans, as the root of a selection binding.


    In the following example, we use a few classes from the javafx.scene.effect package—Lighting
    and Light—to illustrate how the selection operator works. We teach you how to
    apply lighting to a JavaFX scene graph in a later chapter of the book. For now,
    our interest lies in the fact that Lighting is a JavaFX bean that has a property
    named light whose type is Light, and that Light is also a JavaFX bean that has
    a property named color whose type is Color (in javafx.scene.paint).


    The program in Listing 4-15 illustrates how to observe the color of the light
    of the lighting.


    ***Listing 4-15.*** SelectBindingExample.java


    import javafx.beans.binding.Bindings;


    import javafx.beans.binding.ObjectBinding;


    import javafx.beans.property.ObjectProperty;


    import javafx.beans.property.SimpleObjectProperty;


