    We will talk about JavaFX 8 on ARM in the following section. Next, we will talk
    about JavaFX on iOS and JavaFX on Android. The runtime for both these ports is
    based on exactly the same code that Oracle SE 8 is based on, namely the OpenJFX
    source code. This is extremely important, as it allows developers to write portable
    applications.


    One of the major advantages of JavaFX is the portability of code. It is a huge
    productivity boost if you can write your application in one language and have
    it deployed on a number of platforms (desktop, laptop, embedded, mobile).


    The availability of the Java 8 platform, and by extension the JavaFX 8 platform
    for a number of different environments, brings a competitive advantage to Java
    developers compared to developers that use a specific language for each platform.


    It is still possible to leverage features provided by a specific platform in your
    JavaFX Application. Of course, features that are only available in, for example,
    iOS cannot be used in an Android environment and vice versa.


    Therefore, developers who have to create applications that are supposed to have
    the exact same behavior across different platforms should stick with JavaFX features
    where possible.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Chapter 12 ■ JavaFX on embedded and mobile


    ### JavaFX on ARM


    In the not so distant past, the world of embedded devices was rather closed, and
    not very accessible for Java developers.


    Each device had its own, often proprietary set of tools that allowed developers
    to interact with it. The available resources on a device (processor, memory) were
    very limited as well.


    Over the past couple of years, this has started to change dramatically. Devices
    are becoming much more powerful, more open, and less expensive.


    - **Powerful:** Even embedded devices are now often equipped with multicore processors,
    and with a specific graphics processing unit (GPU) that deals with the graphical
    computations, thereby reducing the load on the CPU(s).

    - **Open:** Many new embedded devices use an open source operating system on top
    of a well-known processor. Typical examples of this are the Linux-based embedded
    devices using ARM processors.

    - **Cheaper:** Prices for electronic components have decreased, and assembly is
    cheaper as well, with Internet users being encouraged to develop and assemble
    their own boards.


    These evolutions have led to a big shift in embedded computing. The tipping point
    has been reached where it is possible to use the same Java platform on a number
    of embedded devices as the Java platform that runs on desktop systems.


    For smaller systems, the Java Platform, Micro Edition 8 is still the best solution.
    The starting point for developers who want to know more about the Java Micro Edition
    is the Oracle web site at [http://docs.oracle.com/javame/8.0/index.html](http://docs.oracle.com/javame/8.0/index.html).
    Although the Java Platform, Micro Edition 8 is a powerful platform with some interesting
    APIs allowing a direct link to native interfaces, in this book we focus on the
    Java Platform, Standard Edition.


    A comparison between the Java Platform, Micro Edition 8 and the Java Platform,
    Standard Edition 8 can be found in Figure [12-3](#index_split_006.html#p528),
    which is taken from a blog entry by Terence Barr, who is a Senior Technologist,
    Mobile & Embedded at Oracle.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 170](index-528_1.jpg)


    **Figure 12-3.** Comparison between Java Micro Edition 8 and Java Standard Edition
    8


    As mentioned in the previous section, Oracle delivers a Java Standard Edition
    8 development kit and runtime for ARM-based Linux systems. The JavaFX for ARM
    bundle has been reported to work great with a number of embedded devices, including
    the Raspberry Pi.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 171](index-529_1.jpg)


    ### The Raspberry Pi


    The Raspberry Pi is a computer that fits on a board the size of a credit card.
    It was developed by the Raspberry Pi Foundation (see [http://www.raspberrypi.org](http://www.raspberrypi.org/))
    and manufactured by a number of licensed companies. It is often used for educational
    targets and for demonstrations of technologies.


    A picture of a Raspberry Pi board is shown in Figure [12-4](#index_split_006.html#p529).


    **Figure 12-4.** The Raspberry Pi board


    Currently, there are two versions of the Raspberry Pi, priced at $25 and $35,
    respectively. Both versions come with an ARM11 32-bit RISC processor. The lower
    priced model has 256 MB of memory, and the higher priced model has 512 MB of memory.
    The Raspberry Pi has no internal hard drive, but is booted from an SD card.


    The recommended operating system for the Raspberry Pi is Raspbian Wheezy, which
    is based on the open source Debian Linux operating system. Raspbian Wheezy is
    using an ARM hard-float architecture. Good enough, as the JDK 8 for ARM, as delivered
    by Oracle, is built for an ARM hard-float architecture as well.


    The Raspberry Pi comes with a decent GPU, which makes it a perfect candidate for
    showcasing JavaFX applications. The Raspberry Pi board itself has no output screen,
    but it contains a number of interfaces (e.g., HDMI, Composite RCA, DSI) to interact
    with standard displays. Because the Raspberry Pi has an Ethernet connection, it
    is very convenient to use SSH (secure shell) to log in on the Raspberry Pi from
    a workstation.


    ### JavaFX on the Raspberry Pi


    As mentioned before, the JavaFX platform that you can use to develop JavaFX applications
    on the Raspberry Pi (and on ARM-based Linux systems in general) is based on the
    code available in OpenJFX.


    The wiki part of the OpenJFX project contains detailed and up-to-date instructions
    on how to set up a Raspberry Pi with JavaFX. You can read these instructions at
    the following web site: [https://wiki.openjdk.java.net/display/OpenJFX/OpenJFX+on+the+Raspberry+Pi](https://wiki.openjdk.java.net/display/OpenJFX/OpenJFX+on+the+Raspberry+Pi).
    Because the JavaFX runtime on the Raspberry Pi provides the same API as the JavaFX
    runtime on Desktop, we can leverage all the nice features of JavaFX 8—and Java
    8 in general—in our applications. In particular, support for Lambda expressions
    and streams that was added in Java 8 works very well using the JavaFX runtime
    on the Raspberry Pi.


    A nice example of this is the Mary Had a Little Lambda project. This project,
    which is a JavaFX answer on the popular “Mary Had a Little Lamb” song, is a typical
    showcase for Lambda expressions and the stream API in a JavaFX application. The
    code is maintained by Stephen Chin in GitHub at [https://github.com/steveonjava/MaryHadALittleLambda/tree/master/src/sample](https://github.com/steveonjava/MaryHadALittleLambda/tree/master/src/sample).


    The code contains the necessary files to open it as a NetBeans project, but it
    can also be compiled, packaged, and executed using the command-line `ant` tool.
    You can get a local copy of the code by executing `git clone https://github.com/steveonjava/MaryHadALittleLambda.git`.'
