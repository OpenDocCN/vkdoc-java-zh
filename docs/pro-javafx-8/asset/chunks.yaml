    The extraValue argument can be of any type. This allows for developers to implement
    their own subclasses of XYChart that take advantage of additional information
    that can be enclosed inside a single data element. The BubbleChart implementation
    uses this extraValue for deciding how large the bubbles should be rendered.


    We now modify the getChartData() method to use the three-argument constructor.
    The xValue and yValue parameters are still the same as in the previous listing,
    but we now add a third parameter that indicates an upcoming trend. The larger
    this parameter is, the bigger the rise in the next year. The smaller the parameter
    is, the bigger the drop in the next year. The modified getChartData() method is
    shown in Listing 8-12.


