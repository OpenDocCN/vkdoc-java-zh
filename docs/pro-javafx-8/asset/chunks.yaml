- fmt: "# 排版后的内容\n\nTo create the `HTMLEditor` instance, our `StarterApp` program\
    \ defines a method that we’ve arbitrarily named `createHtmlEditorDemoNode()`,\
    \ shown in Listing 6-13. This method leverages the `BorderPane`, `HTMLEditor`,\
    \ and `Button` classes, returning a `BorderPane` instance that contains the `HTMLEditor`\
    \ and a button labeled View HTML.\n\n## Listing 6-13. The `createHtmlEditorDemoNode()`\
    \ Method Located in `StarterAppMain.java`\n\n```\nNode createHtmlEditorDemoNode()\
    \ {\n\n    final BorderPane htmlEditorDemo;\n\n    final HTMLEditor htmlEditor\
    \ = new HTMLEditor();\n\n    htmlEditor.setHtmlText(\"<p>Replace this text</p>\"\
    );\n\n    Button viewHtmlButton = new Button(\"View HTML\");\n\n    viewHtmlButton.setOnAction(e\
    \ -> {\n\n        Popup alertPopup = createAlertPopup(htmlEditor.getHtmlText());\n\
    \n        alertPopup.show(stage,\n\n            (stage.getWidth() - alertPopup.getWidth())\
    \ / 2 + stage.getX(),\n\n            (stage.getHeight() - alertPopup.getHeight())\
    \ / 2 + stage.getY());\n\n    });\n\n    htmlEditorDemo = new BorderPane();\n\n\
    \    htmlEditorDemo.setCenter(htmlEditor);\n\n    htmlEditorDemo.setBottom(viewHtmlButton);\n\
    \n    BorderPane.setAlignment(viewHtmlButton, Pos.CENTER);\n\n    BorderPane.setMargin(viewHtmlButton,\
    \ new Insets(10, 0, 10, 0));\n\n    return htmlEditorDemo;\n\n}\n```\n\n## Creating\
    \ a Popup\n\nAs you experienced in Step 33 in the exercise, when the `Button`\
    \ is clicked, the `Popup` shown in Figure 6-13 is created and displayed. This\
    \ `Popup` displays the HTML that represents the text in the editing area. The\
    \ preceding snippet contains the code that calls the `show()` method of the `Popup`.\
    \ The `Popup`, however, is created by another method in `StarterAppMain.java`,\
    \ arbitrarily named `createAlertPopup()` and shown in Listing 6-14.\n\n## Listing\
    \ 6-14. The `createAlertPopup()` Method Located in `StarterAppMain.java`\n\n```\n\
    Popup createAlertPopup(String text) {\n\n    Popup alertPopup = new Popup();\n\
    \n    htmlLabel = new Label(text);\n\n    htmlLabel.setWrapText(true);\n\n   \
    \ htmlLabel.setMaxWidth(280);\n\n    htmlLabel.setMaxHeight(140);\n\n    Button\
    \ okButton = new Button(\"OK\");\n\n    okButton.setOnAction(e -> alertPopup.hide());\n\
    \n    BorderPane borderPane = new BorderPane();\n\n    borderPane.setCenter(htmlLabel);\n\
    \n    borderPane.setBottom(okButton);\n\n    Rectangle rectangle = new Rectangle(300,\
    \ 200, Color.LIGHTBLUE);\n\n    rectangle.setArcHeight(20);\n\n    rectangle.setArcWidth(20);\n\
    \n    rectangle.setStroke(Color.GRAY);\n\n    rectangle.setStrokeWidth(2);\n\n\
    \    StackPane contentPane = new StackPane(rectangle, borderPane);\n\n    alertPopup.getContent().add(contentPane);\n\
    \n    BorderPane.setAlignment(okButton, Pos.CENTER);\n\n    BorderPane.setMargin(okButton,\
    \ new Insets(10, 0, 10, 0));\n\n    return alertPopup;\n\n}\n```\n\nHere are some\
