    Creating User-Defined 3D Shapes


    The MeshView class is a Node that allows arbitrary user-defined 3D shapes to be
    incorporated into JavaFX scenes. It has the following constructors:


    • MeshView()


    • MeshView(Mesh mesh)


    The default constructor creates a MeshView without a Mesh. The one-parameter constructor
    creates a MeshView with the specified mesh. The mesh is available as a read-write
    object property. The Mesh abstract class and its TriangleMesh concrete subclass
    are where the geometric information of the 3D shape is stored. The geometric information
    in a TriangleMesh includes


    • The three-dimensional coordinates of all the vertices, or points, of the 3D
    shape


    • The two-dimensional texture coordinates used by the 3D shape


    • The faces of the 3D shape, each one a triangle with vertices that are from the
    vertices list and texture coordinates that are from the texture coordinates list


    • The face smoothing groups, which cause the JavaFX runtime to connect faces in
    the same


    smoothing group smoothly across their common edges, and to leave the edges between
    faces


    not in the same smoothing group as hard edges


    For efficiency reasons, the TriangleMesh class stores this information in observable
    arrays. The following public methods allow you to access these observable arrays
    and their sizes:


    • ObservableFloatArray getPoints()


    • ObservableFloatArray getTexCoords()


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 10 ■ JavaFX 3D


    • ObservableFaceArray getFaces()


    • ObservableIntegerArray getFaceSmoothingGroups()


    • int getPointElementSize()


    • int getTexCoordElementSize()


    • int getFaceElementSize()


    The getPoints() method returns an ObservableFloatArray, which you can use to add
    three-dimensional vertex coordinates. This observable float array’s size must
    be a multiple of 3, and the elements of the array are interpreted as *x0*, *y0*,
    *z0*, *x1*, *y1*, *z1*, … , where ( *x0*, *y0*, *z0*) are the coordinates of the
    first vertex *p0*, ( *x1*, *y1*, *z1*) are the coordinates of the second vertex
    *p1*, and so on.


    The getTexCoords() method returns an ObservableFloatArray, which you can use to
    add two-dimensional texture coordinates. This observable float array’s size must
    be a multiple of 2, and the elements of the array are interpreted as *u0*, *v0*,
    *u1*, *v1*, … , where ( *u0*, *v0*) is the first texture point, ( *u1*, *v1*)
    is the second texture point, and so on.


    We cover texture coordinates in more detail in the materials section. For now
    it is sufficient to understand the texture coordinates as points in a two-dimensional
    image with a top left point that has coordinates (0, 0) and a bottom right point
    that has coordinates (1, 1).


    The getFaces() method returns an ObservableFaceArray, which you can use to add
    faces to the 3D shape. The ObservableFaceArray is a subinterface of the ObservableIntegerArray
    interface. This array’s size must be a multiple of 6, and the elements of the
    array are interpreted as *p0*, *t0*, *p1*, *t1*, *p2*, *t2*, *p3*, *t3*, *p4*,
    *t4*, *p5*, *t5*, . . . , where *p0*, *t0*, *p1*, *t1*, *p2*, *t2* defines the
    first face, *p3*, *t3*, *p4*, *t4*, *p5*, *t5* defines the second face, and so
    on. Of the six ints that define a face, the *p* values are indices into the conceptual
    points array, which is one-third the length of the actual points array because
    we consider three float elements from the actual points array as constituting
    one conceptual point; and the *t* values are indices into the conceptual texture
    coordinates array, which is one-half the length of the actual texture coordinates
    array because we consider two float elements from the actual texture coordinates
    array as constituting one conceptual texture coordinates pair.'
