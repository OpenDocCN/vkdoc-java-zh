    methods.


    • Logical operators: and, or, not


    • Numeric operators: min, max, negate


    • Object operators: isNull, isNotNull


    • String operators: length, isEmpty, isNotEmpty


    • Relational operators:


    •


    equal


    •


    equalIgnoreCase


    •


    greaterThan


