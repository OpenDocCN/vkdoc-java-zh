    4. *创建代表场景中节点模型的变量和类。* 如第 1 章所述，JavaFX 最强大的特性之一就是绑定，它能使应用程序的 UI 轻松地与应用程序的状态（即模型）保持同步。


    ■ **注意** 本章中的大多数示例都是用于演示 UI 概念的小程序。因此，许多示例中的模型由主程序中的变量组成，而不是包含在单独的 Java 类中（例如，第
    1 章中的 `AudioConfigModel` 类）。


    5. *创建事件处理器，例如* `onMousePressed`*，使用户能够与程序交互。* 这些事件处理器通常会操作模型中的实例变量。许多处理器需要实现一个单一的抽象方法，因此这为使用
    lambda 表达式提供了绝佳的机会。


    6. *创建时间线和过渡动画来为场景添加动画效果。* 例如，你可能希望书籍列表的缩略图在场景中平滑移动，或者 UI 中的某个页面淡入视野。你可能只是想让一个乒乓球在场景中移动，从墙壁和球拍上反弹，这将在本章后面的“节点碰撞检测的禅意”一节中演示。


    让我们从更仔细地审视步骤 1 开始，在这一步中，我们将研究舞台（Stage）的能力。


    ## 设置舞台


    舞台的外观和功能将取决于其部署的平台。例如，如果部署在带有触摸屏的嵌入式设备上，你的舞台可能就是整个触摸屏。通过 Java Web Start 部署的 JavaFX
    程序的舞台将是一个窗口。


    ## 理解 Stage 类


    Stage 类是任何具有图形 UI 的 JavaFX 程序的顶级容器。它拥有多个属性和方法，例如，可以定位、调整大小、设置标题、使其不可见或设置一定程度的透明度。据我们所知，了解一个类能力的最佳两种方法是研究
    JavaFX API 文档以及检查（并编写）使用它的程序。在本节中，我们要求你两者都做，首先从查看 API 文档开始。


    JavaFX API 文档位于 JavaFX SDK 安装目录下的 `docs/api` 子目录中。此外，你也可以通过本章末尾“资源”部分提供的 URL 在线获取。


    在浏览器中打开 `index.html` 文件，导航到 `javafx.stage` 包，然后选择 `Stage` 类。该页面应包含属性、构造函数和方法的表格，包括图
    2-1 摘录中显示的部分内容。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 25](img/index-37_1.jpg)


    第 2 章 ■ 在 JavaFX 中创建用户界面


    ***图 2-1.** JavaFX API 中 Stage 类文档的一部分*


    请继续探索 Stage 类中每个属性和方法的文档，记得点击链接以查看更详细的信息。完成后，请返回，我们将向你展示一个演示 Stage 类中许多属性和方法的程序。


    ## 使用 Stage 类：StageCoach 示例


    图 2-2 显示了不起眼且故意设计得不太合身的 StageCoach 示例程序的屏幕截图。


