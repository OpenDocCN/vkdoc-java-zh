    \ on the `PathElement` class and its subclasses, which are used for creating a\
    \ path.\n\n**Tip:** The properties in the `ArcTo` class are fairly intuitive except\
    \ for `sweepFlag`. If `sweepFlag` is `true`, the line joining the center of the\
    \ arc to the arc itself sweeps through increasing angles. Otherwise, it sweeps\
    \ through decreasing angles.\n\nAnother property of the `PathTransition` class\
    \ is `orientation`, which controls whether the node’s orientation remains unchanged\
    \ or stays perpendicular to the path’s tangent as it moves along the path. Listing\
    \ 2-7 uses the `OrientationType.ORTHOGONAL_TO_TANGENT` constant to accomplish\
    \ the latter, as the former is the default.\n\n## Drawing an Ellipse\n\nAs shown\
    \ in Listing 2-7, drawing an `Ellipse` is similar to drawing a `Circle`, the difference\
    \ being that an additional radius is required (`radiusX` and `radiusY` instead\
    \ of just `radius`).\n\nNow that you’ve learned how to animate nodes by creating\
