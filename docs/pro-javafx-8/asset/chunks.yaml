    \ 的 `gain` 属性进行双向绑定。这是让用户控制频段增益的关键部分。请注意，每个 `Slider` 还被赋予了一个 `eqSlider` 样式类。我们稍后将使用这个类为均衡器显示添加一些漂亮的样式。\n\
