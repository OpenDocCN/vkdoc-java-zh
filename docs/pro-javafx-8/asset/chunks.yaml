    此信息以相关事件对象中 `PickResult` 类的对象形式提供。它包含在 `javafx.scene.input` 包中。以下事件对象提供了 `getPickResult()`
    方法，允许你检索此 `PickResult` 对象：


    • `ContextMenuEvent`


    • `DragEvent`


    • `GestureEvent`


    • `RotateEvent`


    • `ScrollEvent`


    • `SwipeEvent`


    • `ZoomEvent`


    • `MouseEvent`


    • `MouseDragEvent`


    • `TouchPoint`


    `PickResult` 类提供了以下公共构造方法：


    • `PickResult(EventTarget, double, double)`


    • `PickResult(Node, Point3D, double)`


    • `PickResult(Node, Point3D, double, int, Point2D)`


    前两个构造方法用于创建与 2D 场景配合使用的 `PickResult`，第三个构造方法创建包含 3D 信息的 `PickResult`。`PickResult`
    通常由 JavaFX 3D 运行时创建。


    JavaFX 应用程序代码通常通过调用事件对象上的访问器方法来获取 `PickResult`。


    `PickResult` 类提供了以下公共方法：


    • `Node getIntersectedNode()`


    • `Point3D getIntersectedPoint()`


    • `double getIntersectedDistance()`


    • `int getIntersectedFace()`


    • `Point2D getIntersectedTexCoord()`


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 10 章 ■ JavaFX 3D


    当用户在 3D 形状上点击鼠标时，它会触及该 3D 形状特定面上的特定点。


    从场景或子场景有效相机的视点出发，到 3D 形状上该点的线段被称为*拾取射线*。3D 形状上的该点被称为*相交点*。`PickResult` 提供了关于此相交点的信息。`getIntersectedNode()`
    方法返回 3D 形状本身，可以是 `Sphere`、`Cylinder`、`Box` 或 `MeshView`。`getIntersectedPoint()`
    方法返回相交点的 3D 坐标。这些坐标是相对于 3D 形状的局部坐标系而言的。对于一个半径为 100 的球体，返回的 `Point3D` 的坐标 ( *x*,
    *y*, *z* ) 将满足 *x²* *+ y²* *+ z²* *=* 100²，无论对其本身或其任何包含节点应用了何种变换。`getIntersectedDistance()`
    方法返回从相机视点到相交点的距离。这是在 3D 模型的世界坐标系中拾取射线的长度。


    `getIntersectedFace()` 方法返回包含相交点的面的面编号，适用于具有用户定义面的 `MeshView`。对于预定义的 3D 形状 `Sphere`、`Cylinder`
    和 `Box`，它返回 `FACE_UNDEFINED`。`getIntersectedTexCoord()` 方法返回相交点的纹理坐标。与 `getIntersectedFace()`
    方法不同，此方法会为用户定义和预定义的 3D 形状都返回纹理坐标。


    清单 10-10 中的程序为一个球体设置了鼠标点击和鼠标拖拽事件的事件处理器，并根据你在球体上点击或拖拽鼠标时相交点的坐标来改变球体的颜色。


