    Populating the Scene with Nodes


    As covered in Chapter 1, you can populate a Scene with nodes by instantiating
    them and adding them to container nodes (e.g., Group and VBox) that can contain
    other nodes. These capabilities enable you to construct complex *scene* *graphs*
    containing nodes. In the example here, the root property of the Scene contains
    a Flow layout container, which causes its contents to flow either vertically or
    horizontally, wrapping as necessary. The Flow container in our example contains
    an HBox (which contains a Slider and a ChoiceBox) and several other nodes (instances
    of Text, Hyperlink, and RadioButton classes).


