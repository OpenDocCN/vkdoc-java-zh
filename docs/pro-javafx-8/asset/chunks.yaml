  raw: 'Typically, iOS applications are written in Objective-C by using the Xcode
    development environment. Java applications, by contrast, produce Java bytecode
    and are typically created using IDEs. Hence, a translation step is required to
    have Java bytecode running in an iOS environment.


    There are a number of approaches for running (translated) Java bytecode in iOS
    environments. At this moment, the RoboVM project provides a convenient way to
    convert your JavaFX applications into native iOS applications.


    RoboVM translates Java bytecode into iOS native code. The OpenJFX repository already
    contains an implementation of JavaFX on top of iOS. The native calls required
    by the JavaFX platform are implemented using native iOS calls. This allows JavaFX
    applications to achieve the same performance as native applications. RoboVM


    translates not only your JavaFX Application classes, but also all classes that
    your application depends on.


    There is no compiling, linking, resolving, or translation needed at runtime—this
    would not be allowed by Apple, which keeps a strict policy as to what is allowed
    to be done in iOS applications. The schema in Figure [12-9 sho](#index_split_007.html#p535)ws
    how it works.


    ***Figure 12-9.** Running JavaFX applications on top of RoboVM*


    As you can see from the schema, the RoboVM project contains both libraries as
    well as a compiler. The RoboVM


    compiler compiles your JavaFX application file and all the required class files,
    and links it together with the required libraries. RoboVM can produce executables
    for MacOS and for iOS.


    The steps required to convert a JavaFX application into a native iOS application
    are described in the RoboVM


    documentation pages. Currently, there are a number of options a developer can
    follow:


    • Use eclipse with the RoboVM plug-in.


    • Use maven with the RoboVM maven plug-in.


    • Directly execute the RoboVM compiler using a command-line approach.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 12 ■ JavaFX on embedded and mobile


    As an example, we will write a very simple JavaFX Application and explain the
    steps required to create an iOS


    application. The code for this simple application is shown in Listing 12-1.


    ***Listing 12-1.*** Simple JavaFX Application That Will Be Ported to iOS and Android
    package projavafx;


    import java.util.Random;


    import javafx.application.Application;


    import javafx.event.ActionEvent;


    import javafx.event.EventHandler;


    import javafx.scene.Scene;


    import javafx.scene.control.Button;


    import javafx.scene.control.Label;


    import javafx.scene.layout.StackPane;


    import javafx.stage.Stage;


    public class SimplePort extends Application {


    final String[] days = new String[]{"Monday", "Tuesday", "Wednesday", "Thursday",
    "Friday",


    "Saturday", "Sunday"};


    @Override


    public void start(Stage primaryStage) {


    Random random = new Random();


    Button btn = new Button();


    btn.setText("Guess a day");


    Label answer = new Label("no input received");


    answer.setTranslateY(50);


    btn.setOnAction(new EventHandler<ActionEvent>() {


    @Override


    public void handle(ActionEvent event) {


    int day = random.nextInt(7);


    answer.setText(days[day]);


    }


    });


    StackPane root = new StackPane();


    root.getChildren().addAll(btn, answer);


    Scene scene = new Scene(root, 300, 250);


    primaryStage.setTitle("JavaFX Porting");


    primaryStage.setScene(scene);


    primaryStage.show();


    }


    public static void main(String[] args) {


    launch(args);


    }


    }


