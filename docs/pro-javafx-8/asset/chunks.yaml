    Developing Your Second JavaFX Program: “More Cowbell!”


    If you’re familiar with the *Saturday Night Live* television show, you may have
    seen the “More Cowbell” sketch, in which Christopher Walken’s character keeps
    asking for “more cowbell” during a Blue Oyster Cult recording session.


    The following JavaFX example program covers some of the simple but powerful concepts
    of JavaFX in the context of an imaginary application that lets you select a music
    genre and control the volume. Of course, “Cowbell Metal,”


    shortened to “Cowbell,” is one of the available genres. Figure [1-9](#index_split_000.html#p23)
    shows a screenshot of this application, which has a sort of retro iPhone application
