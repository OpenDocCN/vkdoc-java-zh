    Understanding ObservableSet


    The ObservableSet interface is similar to the ObservableMap interface in that
    its SetChangeListener.Change object tracks a single element. Figure [7-3](#index_split_003.html#p286)
    is a UML diagram showing the ObservableSet and supporting interfaces.


    ***Figure 7-3.** Key interfaces that support the JavaFX observable set*


    To prevent clutter, we omitted the java.util.Set interface from the diagram in
    Figure [7-3](#index_split_003.html#p286). The java.util.Set interface is the other
    super interface of ObservableSet. The following methods on the ObservableSet interface
    allow you to register and unregister SetChangeListeners:


    • addListener(SetChangeListener<? super E> listener)


    • addListener(SetChangeListener<? super E> listener)


    There are no additional convenience methods on ObservableSet.


    The SetChangeListener interface has only one method: onChange(SetChangeListener.Change<?
    extends E> change). This method is called back when the content of the ObservableSet
    is manipulated. Notice that this method’s parameter type is the nested class Change
    that is declared in the SetChangeListener interface. The SetChangeListener.Change
    class is geared toward reporting the change of a single element in a set. If a
    method call on ObservableSet affects multiple elements, as many set change events
    as the number of affected elements will be fired.


    The SetChangeListener.Change class provides the following methods for you to inspect
    the changes made to an element.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 7 ■ ColleCtions and ConCurrenCy


    • boolean wasAdded() returns true if a new element was added to the set.


    • boolean wasRemoved() returns true if an element was removed from the set.


    • E getElementAdded() returns the element that was added to the set.


    • E getElementRemoved() returns the element that was removed from the set.


    • ObservableSet<E> getSet()


    In the example in Listing 7-4, we perform various set manipulations after attaching
    a SetChangeListener to an ObservableSet. The implementation of SetChangeListener,
    called MyListener, includes a pretty printer for the SetChangeListener.Change
    object, and prints out the set change event object when an event is fired.


    ***Listing 7-4.*** SetChangeEventExample.java


    import javafx.collections.FXCollections;


    import javafx.collections.ObservableSet;


    import javafx.collections.SetChangeListener;


    import java.util.Arrays;


    public class SetChangeEventExample {


    public static void main(String[] args) {


    ObservableSet<String> set = FXCollections.observableSet();


    set.addListener(new MyListener());


    System.out.println("Calling add(\"First\"): ");


    set.add("First");


    System.out.println("Calling addAll(Arrays.asList(\"Second\", \"Third\")): ");
    set.addAll(Arrays.asList("Second", "Third"));


    System.out.println("Calling remove(\"Third\"): ");


    set.remove("Third");


    }


    private static class MyListener implements SetChangeListener<String> {


    @Override


    public void onChanged(Change<? extends String> change) {


    System.out.println("\tset = " + change.getSet());


    System.out.println(prettyPrint(change));


    }


    private String prettyPrint(Change<? extends String> change) {


    StringBuilder sb = new StringBuilder("\tChange event data:\n");


    sb.append("\t\tWas added: ").append(change.wasAdded()).append("\n");


    sb.append("\t\tWas removed: ").append(change.wasRemoved()).append("\n"); sb.append("\t\tElement
    added: ").append(change.getElementAdded()).append("\n"); sb.append("\t\tElement
    removed: ").append(change.getElementRemoved()).append("\n"); return sb.toString();


    }


    }


    }


