    **处理输入事件**


    到目前为止，我们已经向你展示了一些事件处理的示例。例如，我们使用 `onAction` 事件处理程序在点击按钮时执行代码。我们还使用了 Stage 类的 `onCloseRequest`
    事件处理程序，在外部请求关闭 Stage 时执行代码。在本节中，我们将探索 JavaFX 中更多可用的事件处理程序。


    **概览鼠标、键盘、触摸和手势事件及处理程序**


    JavaFX 程序中发生的大多数事件都与用户操作输入设备（如鼠标、键盘或多点触摸屏）有关。为了查看可用的事件处理程序及其关联的事件对象，我们再次查看 JavaFX
    API 文档。首先，导航到 `javafx.scene.Node` 类，查找以字母“on”开头的属性。这些属性代表了 JavaFX 中所有节点通用的事件处理程序。以下是
    JavaFX 8 API 中这些事件处理程序的列表：


    • 键盘事件处理程序：onKeyPressed, onKeyReleased, onKeyTyped


    • 鼠标事件处理程序：onMouseClicked, onMouseDragEntered, onMouseDragExited,


    onMouseDragged, onMouseDragOver, onMouseDragReleased, onMouseEntered, onMouseExited,


    onMouseMoved, onMousePressed, onMouseReleased


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 2 章 ■ 在 JavaFX 中创建用户界面


    • 拖放处理程序


    :onDragDetected, onDragDone, onDragDropped, onDragEntered, onDragExited, onDragOver


    • 触摸处理程序：onTouchMoved, onTouchPressed, onTouchReleased, onTouchStationary


    • 手势处理程序：onRotate, onRotationFinished, onRotationStarted, onScroll,


    onScrollStarted, onScrollFinished, onSwipeLeft, onSwipeRight, onSwipeUp, onSwipeDown,


    onZoom, onZoomStarted, onZoomFinished


    这些属性中的每一个都定义了一个方法，当特定的输入事件发生时调用该方法。对于键盘事件处理程序，如 JavaFX API 文档所示，该方法的参数是一个 `javafx.scene.input.KeyEvent`
    实例。鼠标事件处理程序的方法参数是一个 `javafx.scene.input.MouseEvent`。触摸处理程序使用一个 `javafx.scene.input.TouchEvent`
    实例，而当手势事件发生时，处理事件的方法参数是一个 `javafx.scene.input.GestureInput` 实例。


    **理解 KeyEvent 类**


    查看 JavaFX API 文档中关于 `KeyEvent` 类的部分，你会发现它包含几个方法，其中一个常用的是 `getCode()`。`getCode()`
    方法返回一个 `KeyCode` 实例，代表按下时导致该事件的键。查看 JavaFX API 文档中的 `javafx.scene.input.KeyCode`
    类，会发现存在大量常量，代表国际键盘集上的按键。另一种找出按下了哪个键的方法是调用 `getCharacter()` 方法，该方法返回一个字符串，代表与按下的键关联的
    Unicode 字符。


    `KeyEvent` 类还允许你通过分别调用 `isAltDown()`、`isControlDown()`、`isMetaDown()` 或 `isShiftDown()`
    方法来查看事件发生时 Alt、Ctrl、Meta 和/或 Shift 键是否被按下。


    **理解 MouseEvent 类**

