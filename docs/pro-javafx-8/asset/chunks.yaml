    \n## Chapter 3 ■ Using SceneBuilder to Create a User Interface\n\n### Event Handling\
    \ Using Scripting or Controller Properties\n\nIn the last section, we introduced\
    \ you to using a method of the controller as an event handler for a node in an\
    \ FXML file. JavaFX allows two more ways to set up event handlers in FXML files.\
    \ One way is to use scripting. Any JSR-223 compatible `javax.script` based scripting\
    \ engine can be used. The language to be used for scripting must be specified\
    \ at the top of the FXML file. To use the Nashorn JavaScript engine that ships\
    \ with Oracle JDK 8, the following processing instruction must be present at the\
    \ top of the FXML file:\n\n```\n<?language javascript?>\n```\n\nThe `fx:script`\
    \ element is used to introduce scripts. Both inline scripts and external file\
    \ scripts are supported.\n\nThe following is an inline script:\n\n```\n<fx:script>\n\
    function actionHandler(event) {\n    webView.getEngine().load(address.getText());\n\
    }\n</fx:script>\n```\n\nThe external script takes the following form:\n\n```\n\
    <fx:script source=\"myscript.js\"/>\n```\n\nAny node in the FXML file that has\
    \ an `fx:id` can be accessed from the scripting environment by their `fx:id` names.\
    \ If the FXML file has a controller, then the controller is available as a variable\
    \ named `controller`. Variables declared in `fx:script` sections are also available\
    \ for use as variables in attributes in the rest of the FXML file. To use the\
    \ `actionHandler(event)` function defined in the `fx:script` section as an event\
    \ handler, it can be specified as follows:\n\n```\n<TextField fx:id=\"address\"\
    \n    onAction=\"actionHandler(event)\"\n```\n\n> **Caution** You can use either\
    \ a function that takes no argument if your event handler does not need to inspect\
    \ the event object, or a function that takes one argument as the value of the\
    \ event handler attribute, such as `onAction`. If you call a function with one\
    \ argument, then you must pass the system-provided `event` variable into it.\n\
