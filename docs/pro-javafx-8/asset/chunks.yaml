- fmt: '`delay`属性控制从调用`ScheduledService`的`start()`方法后，到任务开始运行之前必须经过的时间。`period`属性控制任务一次运行结束后，到下一次运行开始前必须经过的时间。`period`衡量的是某次运行开始与下一次运行开始之间的时间差。`delay`和`period`是类型为`Duration`的对象属性。如果在任务执行过程中没有发生故障条件，`ScheduledService`将无限期地重复执行该任务。


    如果在任务执行过程中发生了故障条件，接下来会发生什么由`restartOnFailure`属性控制。如果该属性为`false`，`ScheduledService`将保持在`FAILED`状态，并且不再进行任何操作。


    如果`restartOnFailure`属性为`true`，`ScheduledService`将重新运行该任务。失败任务的重试由`backOffStrategy`、`maximumFailureCount`和`maximumCumulativePeriod`属性控制。退避策略（back
    off strategy）是一个简单的 lambda 表达式，它接受`ScheduledService`作为参数并返回一个`Duration`，该值被设置为`cumulativePeriod`属性的值。当自上次任务运行失败开始所经过的时间达到`cumulativePeriod`时，任务的重试将开始。除了`cumulativePeriod`之外，`ScheduledService`还会跟踪`currentFailureCount`属性，该属性表示当前连续失败运行序列中的失败次数。如果任务重试成功，`ScheduledService`将恢复其正常行为，即按`period`时间间隔运行任务。否则——也就是说，如果重试再次失败——`ScheduledService`将向`backOffStrategy`请求一个新的`cumulativePeriod`，并再次重试。如果`currentFailureCount`达到`maximumFailureCount`，或者`cumulativePeriod`变得大于或等于`maximumCumulativePeriod`，`ScheduledService`将进入`FAILED`状态，并且不再进行任何操作。


    提供了三种退避策略。它们是`ScheduledService`中的常量。`LINEAR_BACKOFF_STRATEGY`返回线性增长的、越来越长的`Duration`。`EXPONENTIAL_BACKOFF_STRATEGY`返回指数增长的、越来越长的`Duration`。`LOGARITHMIC_BACKOFF_STRATEGY`返回对数增长的、越来越长的`Duration`。您可以轻松定义自己的退避策略。


    您可以通过调用`reset()`和`start()`方法来重置并重新启动`ScheduledService`。


    ## 将 JavaFX 与其他 GUI 工具包混合使用


    在了解了 JavaFX 运行时的线程模型以及从 JavaFX 应用程序线程执行代码的方法之后，我们现在来看如何让 JavaFX 与其他 GUI 工具包共存。JavaFX
    提供了类和框架，使得将 JavaFX 与 Swing 或 SWT 混合使用成为可能。您可以将 JavaFX 场景嵌入到 Swing 应用程序中。您可以将 JavaFX
    场景嵌入到 SWT 应用程序中。并且您可以将 Swing 组件嵌入到 JavaFX 应用程序中。


    ### 在 Swing 应用程序中嵌入 JavaFX 场景


    JavaFX 支持通过`javafx.embed.swing`包中的类将 JavaFX 场景嵌入到 Swing 应用程序中。这是一个非常小的包，包含一个用于将
    JavaFX 场景嵌入到 Swing 中的公共类——`JFXPanel`——以及另一个用于将 Swing 组件嵌入到 JavaFX 应用程序中的类——`SwingNode`。`JFXPanel`类继承自`javax.swing.JComponent`，因此可以像任何其他
    Swing 组件一样放置在 Swing 程序中。`JFXPanel`也可以托管一个 JavaFX 场景，因此可以将 JavaFX 场景添加到 Swing 程序中。


    然而，这个嵌入了 JavaFX 场景的 Swing 程序需要同时拥有 Swing 运行时来使其 Swing 部分正常运行，以及 JavaFX 运行时来使其
    JavaFX 部分正常运行。因此，它同时拥有 Swing 事件分发线程（EDT）和 JavaFX 应用程序线程。`JFXPanel`类在 Swing 和 JavaFX
    之间对所有用户事件进行双向转换。'
  raw: 'The delay property controls how much time must elapse after the start() call
    on the scheduled service before the task starts to run. The period property controls
    how much time must elapse after one run of the task before the next run of the
    task can start. The period measures the differences between the start of one run
    and the start of the next run. The delay and period are object properties of type
    Duration. If no failure condition occurs while the task is executing, the ScheduledService
    will keep on repeating the task indefinitely.


    If a failure condition occurs while the task is executing, what happens next is
    controlled by the restartOnFailure property. If this property is false, the ScheduledService
    will remain in the FAILED state and nothing more will happen.


    If the restartOnFailure property is true, the ScheduledService will rerun the
    task again. The rerunning of failed tasks is controlled by the backOffStrategy,
    maximumFailureCount, and maximumCumulativePeriod properties. The back off strategy
    is simply a lambda expression that takes the ScheduledService as an argument and
    returns a Duration, which is set as the value of the cumulativePeriod property.
    The rerunning of the task will start when the elapsed time since the start of
    the last failed run of the task reaches cumulativePeriod. In addition to cumulativePeriod,
    the ScheduledService also keeps track of the currentFailureCount property, which
    is the number of consecutive failed runs in the current sequence of failed runs.
    If the rerunning of the task is successful, ScheduledService will go back to its
    normal behavior of running the task in period time intervals. Otherwise—that is,
    if the rerun failed again—ScheduledService will ask the backOffStrategy for a
    new cumulativePeriod, and rerun again. If the currentFailureCount reaches maximumFailureCount,
    or if the cumulativePeriod becomes greater than or equal to the maximumCumulativePeriod,
    the ScheduledService will go into the FAILED state and nothing more will happen.


    Three back off strategies are provided. They are constants in ScheduledService.
    The LINEAR_BACKOFF_STRATEGY


    returns ever longer Durations that grow linearly. The EXPONENTIAL_BACKOFF_STRATEGY
    returns ever longer Durations that grow exponentially. The LOGARITHMIC_BACKOFF_STRATEGY
    returns ever longer Durations that grow logarithmically. You can easily define
    your own back off strategies.


    You can reset and restart a ScheduledService by calling reset() and start() methods.


    Mixing JavaFX with Other GUI Toolkits


    Having examined the threading paradigm of the JavaFX runtime and ways to execute
    code from the JavaFX


    application thread, we now look at how to make JavaFX coexist with some other
    GUI toolkits. JavaFX provides classes and frameworks that make it possible to
    mix JavaFX with Swing or SWT. You can embed a JavaFX scene in a Swing application.
    You can embed a JavaFX scene in a SWT application. And you can embed Swing components
    in a JavaFX application.


    Embedding JavaFX Scenes in Swing Applications


    JavaFX supports embedding a JavaFX scene into a Swing application through the
    javafx.embed.swing package of classes. This is a pretty small package that includes
    one public class for embedding JavaFX scenes into Swing—JFXPanel—and another class—SwingNode—for
    embedding Swing components into JavaFX applications. The JFXPanel class extends
    javax.swing.JComponent, and as such can be placed in a Swing program just as any
    other Swing component. JFXPanel can also host a JavaFX scene, and as such can
    add a JavaFX scene to a Swing program.


    However, this Swing program with a JavaFX scene embedded in it needs both the
    Swing runtime to make its Swing portion function correctly, and the JavaFX runtime
    to make the JavaFX portion function correctly. Therefore it has both the Swing
    Event Dispatching Thread (EDT) and the JavaFX Application Thread. The JFXPanel
    class does a two-way translation of all the user events between Swing and JavaFX.'
