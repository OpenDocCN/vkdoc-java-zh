    \ FXML or Lambda’s or alternative languages all provide other avenues for achieving\
    \ the same goals as builders but without the additional cost in byte codes or\
    \ classes.”\n\nThis is what we will show throughout this book. Near the end of\
    \ this chapter, we show a first example of a Lambda expression in our code. In\
    \ Chapter 3, we show how SceneBuilder and FXML allow you to use a declarative\
    \ way of defining a UI.\n\nIn the current example, we programmatically define\
    \ the different components of the UI, and we glue them together. In Chapter 3,\
    \ we show the same example using a declarative FXML-based approach.\n\n### The\
    \ JavaFX Application\n\nLet’s have a look at the class declaration in our first\
    \ example:\n\n```\npublic class HelloEarthRiseMain extends Application\n```\n\n\
    This declaration states that our application extends the `javafx.application.Application`\
    \ class. This class has one abstract method that we should implement:\n\n```\n\
    public void start(Stage stage) {}\n```\n\nThis method will be called by the environment\
    \ that executes our JavaFX application.\n\nDepending on the environment, JavaFX\
    \ applications will be launched in a different way. As a developer, you don’t\
    \ have to worry about how your application is launched, and where the connection\
    \ to a physical screen is made.\n\nYou have to implement the `start` method and\
    \ use the provided `Stage` parameter to create your UI, as discussed in the next\
    \ paragraph.\n\nIn our command-line example, we launched the applications by executing\
    \ the `main` method of the application class. The implementation of the `main`\
    \ method is very simple:\n\n```\npublic static void main(String[] args) {\n  \
    \  Application.launch(args);\n}\n```\n\nThe only instruction in this `main` method\
    \ is a call to the static `launch` method of the application, which will launch\
    \ the application.\n\n> **Tip:** A JavaFX application always has to extend the\
    \ `javafx.application.Application` class.\n\n### A Stage and a Scene\n\nA `Stage`\
    \ contains the UI of a JavaFX app, whether it is deployed on the desktop, on an\
    \ embedded system, or on other devices. On the desktop, for example, a `Stage`\
    \ has its own top-level window, which typically includes a border and title bar.\n\
    \nThe initial stage is created by the JavaFX runtime, and passed to you via the\
    \ `start()` method, as described in the previous paragraph. The `Stage` class\
    \ has a set of properties and methods. Some of these properties and methods, as\
    \ shown in the following code snippet from the listing, are as follows:\n\n- A\
    \ scene that contains the graphical nodes in the UI\n- A title that appears in\
    \ the title bar of the window (when deployed on the desktop)\n- The visibility\
    \ of the `Stage`\n\n```\nstage.setScene(scene);\nstage.setTitle(\"Hello Earthrise\"\
    );\nstage.show();\n```\n\nA `Scene` is the top container in the JavaFX scene graph.\
    \ A `Scene` holds the graphical elements that are displayed on the `Stage`. Every\
    \ element in a `Scene` is a graphical node, which is any class that extends `javafx.scene.Node`.\
    \ The scene graph is a hierarchical representation of the `Scene`. Elements in\
    \ the scene graph may contain child elements, and all of them are instances of\
    \ the `Node` class."
