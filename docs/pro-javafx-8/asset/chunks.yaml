- fmt: "```java\nimport java.net.URL;\nimport java.util.ResourceBundle;\n\npublic\
    \ class ResolutionAndBindingController {\n    @FXML\n    private Label resourcesLabel;\n\
    \    @FXML\n    private Label locationLabel;\n    @FXML\n    private Label currentDateLabel;\n\
    \    @FXML\n    private URL location;\n    @FXML\n    private ResourceBundle resources;\n\
    \n    @FXML\n    public void initialize() {\n        locationLabel.setText(location.toString());\n\
    \        resourcesLabel.setText(resources.getBaseBundleName() +\n            \
    \    \" (\" + resources.getLocale().getCountry() +\n                \", \" + resources.getLocale().getLanguage()\
    \ + \")\");\n    }\n}\n```\n\n**Listing 3-16.** `ResolutionAndBindingExample.java`\n\
    \n```java\nimport javafx.application.Application;\nimport javafx.fxml.FXMLLoader;\n\
    import javafx.scene.Scene;\nimport javafx.scene.layout.VBox;\nimport javafx.stage.Stage;\n\
    import java.util.ResourceBundle;\n\npublic class ResolutionAndBindingExample extends\
    \ Application {\n    @Override\n    public void start(Stage primaryStage) throws\
    \ Exception {\n        FXMLLoader fxmlLoader = new FXMLLoader();\n        fxmlLoader.setLocation(\n\
    \                ResolutionAndBindingExample.class.getResource(\n            \
    \            \"/ResolutionAndBindingExample.fxml\"));\n        fxmlLoader.setResources(\n\
    \                ResourceBundle.getBundle(\n                        \"ResolutionAndBindingExample\"\
    ));\n        VBox vBox = fxmlLoader.load();\n        Scene scene = new Scene(vBox);\n\
    \        primaryStage.setTitle(\"Resolution and Binding Example\");\n        primaryStage.setScene(scene);\n\
    \        primaryStage.show();\n    }\n\n    public static void main(String[] args)\
    \ {\n        launch(args);\n    }\n}\n```\n\n**Listing 3-17.** `ResourceAndBindingExample.properties`\n\
    \n```\nlocation=Location:\nresources=Resources:\ncurrentDate=CurrentDate:\n```\n\
    \n**Listing 3-18.** `ResolutionAndBindingExample_fr_FR.properties`\n\n```\nlocation=Emplacement:\n\
    resources=Resources:\ncurrentDate=Date du jour:\n```\n\n**Listing 3-19.** `ResolutionAndBindingExample.css`\n\
    \n```css\n#vbox {\n    -fx-background-color: azure ;\n}\n```\n\nLocation resolution\
    \ is used in the FXML file to specify the location of the CSS file. The `stylesheet`\
    \ attribute is set to the location `@ResolutionAndBindingExample.css`:\n\n```xml\n\
    <VBox id=\"vbox\" alignment=\"CENTER_LEFT\" maxHeight=\"-Infinity\" maxWidth=\"\
    -Infinity\" minHeight=\"-Infinity\"\n      minWidth=\"-Infinity\" prefHeight=\"\
    200.0\" prefWidth=\"700.0\" spacing=\"10.0\"\n      stylesheets=\"@ResolutionAndBindingExample.css\"\
    \ xmlns=\"http://javafx.com/javafx/8\"\n      xmlns:fx=\"http://javafx.com/fxml/1\"\
    \ fx:controller=\"ResolutionAndBindingController\">\n```\n\nThe stylesheet sets\
    \ the background color of the `VBox` to azure. Resource resolution is used to\
    \ set the text for three labels in the program:\n\n```xml\n<Label text=\"%location\"\
    >\n<Label text=\"%resources\">\n<Label text=\"%currentDate\">\n```\n\nThese labels\
    \ will get their texts from the resource bundle that is supplied to the `FXMLLoader`\
    \ before the FXML file is loaded. Both the default locale and a French locale\
    \ translation of the properties file are provided. Variable resolution happens\
    \ between a defined `java.util.Date` instance and a `Label`:\n\n```xml\n<fx:define>\n\
    \    <Date fx:id=\"capturedDate\"/>\n</fx:define>\n<Label fx:id=\"currentDateLabel\"\
    \ text=\"$capturedDate\"/>\n```\n\nThe defined `Date` was given the `fx:id` of\
    \ `capturedDate` and the label used the variable for its text. Finally, the expression\
    \ binding happens between a `TextField` and a `Label`:\n\n```xml\n<TextField fx:id=\"\
    textField\"/>\n<Label text=\"${textField.text}\"/>\n```\n\nThe `TextField` was\
    \ given the `fx:id` of `textField` and the label binds to the expression `textField.text`,\
    \ with a result of the label mimicking what is typed in the text field. When the\
    \ `ResolutionAndBindingExample` is run with the French locale, the Resolution\
    \ and Binding Example window shown in Figure 3-6 is displayed.\n\n![Image 42](index-114_1.jpg)\n\
    \n**Figure 3-6.** The `ResolutionAndBindingExample` program\n\n## Using Multiple\
    \ FXML Files"
