    应用程序，因此如果你有这里未列出的偏爱语言，也值得一试！


    让你的 JavaFX 更 Groovy


    根据就业趋势，Groovy 是 JVM 上除 Java 之外最流行的语言.1。这得益于 Groovy 极易上手；除了一些细微差异,2 外，任何 Java 程序也都是有效的
    Groovy 应用程序。这使得 Java 开发者即使尚未充分领略 Groovy 为 Java 生态系统带来的所有强大功能和便利性，也能轻松开始使用它。


    Groovy 源文件直接编译为 Java 字节码，可以在任何拥有 JVM 的地方运行。因此，你可以直接访问任何 Java 库，包括 JavaFX API。由于语言内置了诸多便利性，编写良好的
    Groovy 应用程序几乎总是比等效的 Java 版本更简短。Groovy 语言的一些特性使其成为 Java 和 JavaFX 代码的有吸引力的替代品，包括：


    • *闭包*：最近在 Java 8 中引入，闭包对 GUI 编程尤其重要，因为它们使得编写事件发生时调用的代码更加简单。


    • *运算符重载*：Groovy 允许你重载现有运算符或定义新运算符，这对于编写可读的 DSL 至关重要。


    • *动态类型*：在 Groovy 代码中类型是可选的，这使得编写简洁代码更加容易。


    • *Getter/Setter 访问*：Groovy 会自动将直接字段访问转换为 getter 和 setter，从而缩短了这种访问 Java API 的常见模式。


    1Scala、Groovy、Clojure、Jython、JRuby 和 Java：按语言划分的工作机会，[`bloodredsun.com/2011/10/04/scala-groovy-`](http://bloodredsun.com/2011/10/04/scala-groovy-clojure-jython-jruby-java-jobs/)

    [clojure-jython-jruby-java-jobs/](http://bloodredsun.com/2011/10/04/scala-groovy-clojure-jython-jruby-java-jobs/)，2011
    年 10 月。

    2 与 Java 的差异，[`groovy.codehaus.org/Differences+from+Java`](http://groovy.codehaus.org/Differences+from+Java)，2011
    年。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 13 章 ■ JavaFX 语言与标记


    • *命名构造函数参数*：使用构造函数初始化对象时，还可以通过名称引用类上的字段来设置它们。这种模式在我们后面的 GroovyFX 代码中会大量使用。


    • *内置数据结构语法*：许多常用的数据结构（如列表和映射）在 Groovy 中都有内置语法，这使得使用它们和动态构建它们更加方便。


    直接从 Groovy 使用 JavaFX 是可行的；然而，如果不使用专门的 DSL 库（如 GroovyFX），你将错过 Groovy 的许多好处。在接下来的几节中，我们将向你展示使用
    Groovy 语言和 GroovyFX 库编写 JavaFX 代码的一些好处。


    GroovyFX 简介


    GroovyFX 是一个用于在 Groovy 中开发 JavaFX 应用程序的库，它允许你以更 Groovy 的方式构建应用程序。它由 Jim Clarke
    和本书合著者之一 Dean Iverson 发起，并作为开源 Groovy 模块进行开发。Groovy 领域的知名专家 Russel Winder 已将其更新为适用于
    Java 8。GroovyFX 的主页位于 GitHub 上：[`groovyfx-project.github.com/`](http://groovyfx-project.github.com/)。


    使用 GroovyFX 编写代码，而不是直接针对 JavaFX API 编码，其好处包括：


    • *构建器模式*：GroovyFX 为所有主要的 JavaFX 类提供了 Groovy 构建器，使得以声明方式构建场景图变得简单方便。


    • *属性生成*：编写自定义属性的 JavaFX 属性模式相当冗长，但在 GroovyFX 中只需一行注解即可替代。


    • *时间线 DSL*：GroovyFX 为动画提供了便捷的简写语法。


    • *便捷的绑定语法*：GroovyFX 使创建绑定比等效的 Java 代码更加简洁和易读。


    • *API 改进*：许多 JavaFX API 都经过了调整和增强，使其更易于使用。


    为了帮助你开始使用 GroovyFX，我们将引导你从头开始设置一个小型 GroovyFX 项目。这些说明假设你的系统上已安装了最新的 Java 和 JavaFX
    8 SDK。此外，我们选择针对 IntelliJ 社区版定制说明，这是一个免费的、开源的 IDE，长期以来对 Groovy 有出色的支持。Eclipse、NetBeans
    和许多其他 IDE 也支持 Groovy，因此如果你偏好其他 IDE，可以轻松调整这些说明以适用于你选择的 IDE。


    首先，下载并安装最新版本的 IntelliJ IDEA。社区版自带 Groovy 支持，因此无需购买终极版。IntelliJ 网站位于：


    [`www.jetbrains.com/idea`](http://www.jetbrains.com/idea)

