    Chapter 8 ■ Creating Charts in JavaFX


    Listing 8-1 contains the code for the example.


    ***Listing 8-1.*** Rendering the TIOBE Index in a PieChart


    package projavafx ;


    import javafx.application.Application;


    import javafx.collections.FXCollections;


    import javafx.collections.ObservableList;


    import javafx.scene.Scene;


    import javafx.scene.chart.PieChart;


    import javafx.scene.layout.StackPane;


    import javafx.stage.Stage;


    public class ChartApp1 extends Application {


    public static void main(String[] args) {


    launch(args);


    }


    @Override


    public void start(Stage primaryStage) {


    PieChart pieChart = new PieChart();


    pieChart.setData(getChartData());


    primaryStage.setTitle("PieChart");


    StackPane root = new StackPane();


    root.getChildren().add(pieChart);


    primaryStage.setScene(new Scene(root, 400, 250));


    primaryStage.show();


    }


    private ObservableList<PieChart.Data> getChartData() {


    ObservableList<PieChart.Data> answer = FXCollections.observableArrayList();


    answer.addAll(new PieChart.Data("java", 17.56),


    new PieChart.Data("C", 17.06),


    new PieChart.Data("C++", 8.25),


    new PieChart.Data("C#", 8.20),


    new PieChart.Data("ObjectiveC", 6.8),


    new PieChart.Data("PHP", 6.0),


    new PieChart.Data("(Visual)Basic", 4.76),


    new PieChart.Data("Other", 31.37));


    return answer;


    }


    }


    The result of running this example is shown in Figur[e 8-3.](#index_split_004.html#p355)


