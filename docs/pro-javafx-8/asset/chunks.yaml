    Alternatively, you can open the project in NetBeans, and run it there similarly
    to the other NetBeans projects in the previous chapters of this book.


    Running the code on a desktop system results in the output shown in Figure [12-5](#index_split_006.html#p531).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 172](index-531_1.jpg)


    ## Chapter 12 ■ JavaFX on embedded and mobile


    **Figure 12-5.** Desktop version of the MaryHadALittleLambda project


    # Deploying JavaFX Applications on the Embedded ARM Systems


    There are a number of ways to deploy JavaFX Applications on embedded systems.
    Specific embedded systems often have specific requirements, limitations, and options.
    In this section, we describe two approaches for the generic case where we have
    SSH access to an embedded ARM system. In both approaches, we assume that the embedded
    system is already equipped with a Java 8 Runtime, Standard Edition.


    ## Using Command-Line Tools


    This approach is very similar to deploying JavaFX applications on Linux systems
    in general. Using your favorite build tools, you create a JAR containing your
    application and all dependencies on your local development system. Next, you use
    SCP (secure copy) to transfer that JAR file to the embedded system where you can
    also execute it. Typically, you have to log in to the embedded system using SSH,
    execute the `java` command, and supply the location of the JAR file.


    ## Using NetBeans


    NetBeans 8 contains built-in support for running Java and JavaFX applications
    on remote platforms (including embedded systems). Using this feature allows you
    to not only create the application on your local development system, but also
    to push it to the embedded system, execute it there, and inspect the system output
    locally. Under the hood, NetBeans is doing the same as we did in the previous
    approach using command-line tools. Everything is nicely integrated in the IDE,
    though, and the switch between testing on your local development system or running
    on an embedded system is very easy. To use this feature, we first have to tell
    NetBeans where our embedded system is running, and how NetBeans can access it.
    This is done by selecting the **Tools** ➤ **Java Platforms** menu, and clicking
    the **Add Platform** button. The screenshot in Figure [12-6](#index_split_006.html#p532)
    will be shown.


    **Figure 12-6.** NetBeans wizard for adding a Remote Java Platform


    Select **Remote Java Standard Edition** and click **Next**. The next screen, shown
    in Figure [12-7](#index_split_006.html#p533), shows a number of configuration
    parameters that will be used by NetBeans to transfer your application to the remote
    system, and to execute the Java process.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 174](index-533_1.jpg)


    ## Chapter 12 ■ JavaFX on embedded and mobile


    **Figure 12-7.** Configuration of a remote Java platform in NetBeans


    The **Platform name** can be chosen freely. The **Host** and **Port** parameters
    have to correspond with the IP address of the embedded system. In this case, we
    assume that the embedded system is running on our local intranet at address `192.168.1.20`,
    using the standard SSH port `22`. Because NetBeans will transfer files to the
    embedded system and execute commands on it, it needs to be able to authenticate
    itself. This can be done by providing a password, or a key with a passphrase.
    In this case, we provide the typical username that comes standard with Raspberry
    Pi systems, which is `pi`. The corresponding password is `raspberry` by default.


    Next, we have to point NetBeans to the location of the JRE, which we assume to
    be installed at `/opt/jdk1.8.0`.


    # Note


    You can also use NetBeans in combination with Java Standard Edition Embedded to
    create a JRE installation on your embedded system.


    Finally, we have to specify the working directory for NetBeans. Accepting the
    default directory is fine here. Click **Finish** to confirm the configuration
    information.


    As a result of these configuration steps, a new **Remote Java Platform** has been
    created. If you now open a Java or JavaFX project, right-click the Project, select
    **Project Properties**, and select the **Run** tab, you will be able to specify
    the new **Remote Java Platform**, as shown in Figure [12-8](#index_split_006.html#p534).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 175](index-534_1.jpg)


    ## Chapter 12 ■ JavaFX on embedded and mobile


    **Figure 12-8.** Project properties showing the Runtime Platform option


    The **Runtime Platform** option in the **Run** settings shows the platforms that
    you can choose to execute your Java or JavaFX application. Switching between your
    local development system and the remote embedded system (which we named `RemotePi`)
    will cause the application to either run on your local system or on the embedded
    system.


    # JavaFX on Mobile


    Currently, more mobile devices (phones and tablets) are sold than desktop systems.
    It is estimated that in 2014, more people will use mobile devices to access the
    Internet than desktop systems. This fact alone is a game-changer in the IT industry.
    One of the consequences is that information and services should be accessible
    via a mobile interface to reach the majority of Internet users. There are more
    changes, though. Where the majority of the information on desktop systems is consumed
    using a web browser, this is not true on mobile devices. Users of mobile devices
    prefer to use native applications, or so-called apps, rather than a web browser.
    This means that companies and organizations that want to reach their mobile users
    should create applications instead of (mobile) web pages. This is a huge opportunity
    for JavaFX developers, as it is possible to create mobile applications using JavaFX.
    Rather than creating a mobile web site with HTML, CSS, and JavaScript, Java developers
    can now create JavaFX applications and package them as mobile applications.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 176](index-535_1.jpg)


    ## Chapter 12 ■ JavaFX on embedded and mobile


    # JavaFX on iOS


    In 2007, Apple released the first version of iOS as the operating system for the
    iPhone. Originally, iOS was an abbreviation for iPhone Operating System. Later,
    iOS became the operating system for other Apple devices including the iPod Touch,
    the iPad and iPad Mini, and the second-generation Apple TV.


    Applications for iPhone and iPad have to be written and compiled for iOS, and
    are made available via the Apple App Store. The official site for the App Store
    is [http://www.itunes.com/appstore](http://www.itunes.com/appstore).


    # Note


    The App Store should not be confused with the Mac App Store, which is used to
    distribute OS X applications, targeting desktop applications.'
