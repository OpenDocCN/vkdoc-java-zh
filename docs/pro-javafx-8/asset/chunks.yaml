    1.82.


    You can also choose to scale in both dimensions by specifying both a fitWidth
    and a fitHeight value along with enabling preserveRatio. In this case the best
    fit for the movie will be calculated and the other dimension will be scaled to
    preserve the original aspect ratio. For example, if the fit area and the movie
    are both wider than they are tall (the common case), the movie will be scaled
