    在嵌入式 ARM 系统上部署 JavaFX 应用程序


    有多种方法可以在嵌入式系统上部署 JavaFX 应用程序。特定的嵌入式系统通常有特定的要求、限制和选项。在本节中，我们将描述两种适用于我们拥有嵌入式 ARM
    系统 SSH 访问权限的通用方法。在这两种方法中，我们都假设嵌入式系统已经配备了 Java 8 标准版运行时。


    使用命令行工具


    这种方法通常与在 Linux 系统上部署 JavaFX 应用程序非常相似。使用你喜欢的构建工具，在你的本地开发系统上创建一个包含你的应用程序及其所有依赖项的
    JAR 文件。然后，使用 SCP（安全复制）将该 JAR 文件传输到嵌入式系统，并在那里执行它。通常，你需要使用 SSH 登录到嵌入式系统，执行 Java
    命令，并提供 JAR 文件的位置。


    使用 NetBeans


    NetBeans 8 包含对在远程平台（包括嵌入式系统）上运行 Java 和 JavaFX 应用程序的内置支持。使用此功能，你不仅可以在本地开发系统上创建应用程序，还可以将其推送到嵌入式系统，在那里执行它，并在本地检查系统输出。在底层，NetBeans
    执行的操作与我们之前使用命令行工具的方法相同。不过，所有操作都很好地集成在 IDE 中，并且在本地开发系统上测试和在嵌入式系统上运行之间的切换非常容易。要使用此功能，我们首先必须告诉
    NetBeans 我们的嵌入式系统在哪里运行，以及 NetBeans 如何访问它。这可以通过选择“工具” ➤ “Java 平台”菜单，然后单击“添加平台”按钮来完成。将显示如图
    12-6 所示的截图。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 173](img/index-532_1.jpg)


    第 12 章 ■ 嵌入式与移动设备上的 JavaFX


    ***图 12-6.** NetBeans 添加远程 Java 平台的向导*


    选择“远程 Java 标准版”并单击“下一步”。下一个屏幕，如图 12-7 所示，显示了许多配置参数，NetBeans 将使用这些参数将你的应用程序传输到远程系统，并执行
    Java 进程。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 174](img/index-533_1.jpg)


    第 12 章 ■ 嵌入式与移动设备上的 JavaFX


    ***图 12-7.** 在 NetBeans 中配置远程 Java 平台*


    “平台名称”可以自由选择。“主机”和“端口”参数必须与嵌入式系统的 IP 地址相对应。在这种情况下，我们假设嵌入式系统在我们的本地内网中运行，地址为 192.168.1.20，使用标准的
    SSH 端口 22。由于 NetBeans 会将文件传输到嵌入式系统并在其上执行命令，因此它需要进行身份验证。这可以通过提供密码或带有密码短语的密钥来完成。在本例中，我们提供
    Raspberry Pi 系统标配的典型用户名“pi”。默认情况下，对应的密码是“raspberry”。


    接下来，我们必须将 NetBeans 指向 JRE 的位置，我们假设它安装在 `/opt/jdk1.8.0`。


    ■ **注意** 你也可以将 NetBeans 与 Java 标准版嵌入式版本结合使用，在你的嵌入式系统上创建一个 JRE 安装。


    最后，我们必须指定 NetBeans 的工作目录。此处接受默认目录即可。单击“完成”以确认配置信息。


    作为这些配置步骤的结果，一个新的“远程 Java 平台”已创建。如果你现在打开一个 Java 或 JavaFX 项目，右键单击该项目，选择“项目属性”，然后选择“运行”选项卡，你将能够指定新的远程
    Java 平台，如图 12-8 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 175](img/index-534_1.jpg)


    第 12 章 ■ 嵌入式与移动设备上的 JavaFX


    ***图 12-8.** 显示运行时平台选项的项目属性*


    “运行”设置中的“运行时平台”选项显示了你可以选择用来执行 Java 或 JavaFX 应用程序的平台。在本地开发系统和远程嵌入式系统（我们将其命名为 RemotePi）之间切换，将导致应用程序在本地系统或嵌入式系统上运行。


    移动设备上的 JavaFX


    目前，移动设备（手机和平板电脑）的销量超过了桌面系统。据估计，到 2014 年，使用移动设备访问互联网的人数将超过桌面系统。仅此一点就改变了 IT 行业的格局。其后果之一是，信息和服务应能通过移动界面访问，以覆盖大多数互联网用户。然而，还有更多的变化。在桌面系统上，大部分信息是通过网页浏览器消费的，但在移动设备上情况并非如此。移动设备的用户更喜欢使用原生应用程序（即所谓的
    App），而不是网页浏览器。这意味着，希望触达移动用户的公司和组织应该创建应用程序，而不是（移动）网页。这对 JavaFX 开发者来说是一个巨大的机遇，因为使用
    JavaFX 创建移动应用程序是可行的。Java 开发者现在无需使用 HTML、CSS 和 JavaScript 创建移动网站，而是可以创建 JavaFX
    应用程序并将其打包为移动应用程序。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 176](img/index-535_1.jpg)


    第 12 章 ■ 嵌入式与移动设备上的 JavaFX


    iOS 上的 JavaFX


    2007 年，苹果发布了 iOS 的第一个版本，作为 iPhone 的操作系统。最初，iOS 是 iPhone 操作系统的缩写。后来，iOS 成为其他苹果设备的操作系统，包括
    iPod Touch、iPad 和 iPad Mini，以及第二代 Apple TV。


    iPhone 和 iPad 的应用程序必须为 iOS 编写和编译，并通过苹果 App Store 提供。App Store 的官方网站是 [`www.itunes.com/appstore`](http://www.itunes.com/appstore)。


    ■ **注意** App Store 不应与 Mac App Store 混淆，后者用于分发 macOS 应用程序，主要面向桌面应用。

