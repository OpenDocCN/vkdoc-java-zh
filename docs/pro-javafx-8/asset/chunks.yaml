    **引言**


    作为一名自 2007 年 JavaFX 诞生以来就一直是其开发者、作者、演讲者和倡导者，我对 JavaFX 8 感到非常兴奋。


    它于 2014 年 3 月作为 Java SE 8 的组成部分发布，是 Java Swing 的继任者。正如您将在本书中读到的，JavaFX 不仅可以在桌面端（Mac、Windows、Linux）运行，还可以在树莓派等嵌入式设备上运行。随着物联网（IoT）的日益普及，JavaFX
    已做好充分准备，能够为物联网提供用户界面。此外，得益于 Johan Vos 和 Niklas Therning 等人领导的社区项目，开发者们正在将 JavaFX
    应用部署到 Android 和 iOS 设备上。


    JavaFX 社区拥有许多才华横溢、充满热情且友善的开发者，我很荣幸能称他们为我的同事。其中一位同事 Johan Vos 是我们《Pro JavaFX 2》一书的合著者，也是这本《Pro
    JavaFX 8》的主要作者。我很高兴能继续在他的领导下与他合作完成本书。


    请与我一起欢迎并祝贺他担任此角色，或许可以在 Twitter 上@Johan Vos，或在亚马逊上为本书发表评论。我希望您能发现本书既有趣又有助于您学习 JavaFX！


    ——James L. Weaver


    Java 技术大使


    甲骨文公司


