    Android 上的 JavaFX


    Android 平台是 Google 为移动设备和平板电脑开发的操作系统。它正扩展到越来越多的设备，从可穿戴设备到电视和车载电脑。Android 是一个基于
    Linux 的系统，使用 Dalvik 虚拟机。Dalvik 虚拟机和 Java 虚拟机之间有许多相似之处，但并不完全相同。


    大多数标准 Java 包在 Dalvik 中也可用，但并非全部。


    JavaFX Android 移植项目基于 OpenJFX 项目。该项目的代码和文档可在 [`bitbucket.org/javafxports/android`](http://bitbucket.org/javafxports/android)
    获取。


    构建 JavaFX 平台以及在 Android 平台上执行 JavaFX 应用所需的大部分原生代码都可在 OpenJFX 仓库中找到。JavaFX 平台所需但
    Dalvik 中不可用的 Java 类已添加到 JavaFX Android 移植项目中。


    在撰写本文时，创建 Android 应用（或 APK 包）是通过 JavaFX Android 移植项目提供的命令行工具完成的。


    必须执行以下步骤：


    1. 下载并安装最新的 Android SDK，可在以下地址找到：


    [`developer.android.com/sdk/index.html`](http://developer.android.com/sdk/index.html)。


    2. 下载 JavaFX Dalvik SDK。确保你拥有最新版本的 JavaFX Dalvik SDK，可在 [`bitbucket.org/javafxports/android/downloads`](https://bitbucket.org/javafxports/android/downloads)
    获取。


    3. 创建一个常规的 JavaFX 应用。这可以是任何你用于桌面环境的 JavaFX 应用。但是，目前 JavaFX Android 项目不支持 Java
    8 代码。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 12 章 ■ 嵌入式与移动设备上的 JavaFX


    4. 使用 JavaFX Dalvik SDK 创建一个 JavaFX-Dalvik 项目。JavaFX Dalvik SDK 包含一个名为 android-tools
    的目录，其中有一个 Gradle 构建脚本，该脚本需要一些参数，并将生成 Android 应用项目目录。


    5. 构建 Android 应用。Android 应用项目目录包含一个 ant 结构，允许我们构建 Android 应用。


    6. 将应用安装到 Android 设备上，在模拟器中运行，或提交到 Play 商店。


    接下来，我们再次使用上一节介绍的 SimplePort 应用来演示这些步骤。


    构建 JavaFX Android 应用与构建 JavaFX iOS 应用略有不同。然而，相同的源代码树甚至相同的 pom.xml 文件都可以作为两个目标环境的起点。由于目前无法在
    Dalvik 上使用 Java 8 API（例如 Stream API），我们需要告诉 Java 编译器我们想要生成与 Java 7 兼容的字节码。对 pom.xml
    文件进行以下添加即可实现：


    <properties>


    <maven.compiler.source>1.7</maven.compiler.source>


    <maven.compiler.target>1.7</maven.compiler.target>


    </properties>


    JavaFX Android 构建序列的第一步类似于构建常规的 JavaFX 桌面应用。


    你只需使用 JavaFX 和 Java 代码创建一个应用。与用于生成 iOS 应用的 RoboVM 方法不同，在应用的源代码中不会创建启动器类。然而，由于创建
    Android 应用也需要元信息，这意味着在 Android 构建序列中需要一个在 iOS 构建序列中不需要的额外步骤。


    执行


    mvn clean install


    的结果是一个包含以下内容的 target 目录：


    simpleport-1.0-SNAPSHOT.jar


    在序列的第 4 步中，我们必须使用 javafx-dalvik SDK 提供的 Gradle 构建脚本创建一个 JavaFX Dalvik 项目。javafx-dalvik
    SDK 中的 android-tools 目录包含一个 build.gradle 文件，该文件需要多个参数。通常，会创建一个构建脚本来设置这些参数。


    以下构建脚本将基于我们在上一步创建的 JavaFX 应用，创建 SimplePort Android 项目。


    #!/bin/bash


    # 这是一个示例脚本。请根据你的本地设置更改参数


    export ANDROID_SDK=/opt/android-sdk


    export PATH=$ANDROID_SDK/tools:$PATH


    export CURRENT_DIR=`pwd`


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 183](img/index-545_1.jpg)


    第 12 章 ■ 嵌入式与移动设备上的 JavaFX


    export WORKDIR=$CURRENT_DIR/work


    export APPDIR=/home/johan/javafx/ProJavaFX/projavafx8/ch12/SimplePort/target


    gradlew --info createProject -PDEBUG -PDIR=$WORKDIR -PPACKAGE=org.javafxports


    -P


    NAME=SimplePort -PANDROID_SDK=$ANDROID_SDK -PJFX_SDK=$CURRENT_DIR/../build/dalvik-sdk


    -PJFX_APP=$APPDIR -PJFX_MAIN=projavafx.SimplePort


    执行此构建脚本的结果是在 WORKDIR 目录中创建一个名为 SimplePort（NAME 参数的值）的目录。在此目录中，会为你创建所需的 Android
    项目结构，以及一个允许 ant 任务创建包的 build.xml 文件。要创建 Android 包，你必须切换到新目录并执行


    ant clean debug


    这将在该目录的 bin 子目录中创建一个调试版本（未签名）的 Android 应用。

