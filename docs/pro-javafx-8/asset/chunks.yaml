- fmt: "# Chapter 8 ■ Creating Charts in JavaFX\n\nBy default, the slices in a `PieChart`\
    \ are rendered clockwise. By setting this property to `false`, the slices are\
    \ rendered counterclockwise. We also disabled showing the labels in the `PieChart`.\
    \ The labels are still shown in the legend, but they do not point to the individual\
    \ slices anymore. This is achieved by the following line of code: `pieChart.setLabelsVisible(false);`\n\
    \nAll layout changes so far are done programmatically. It is also possible, and\
    \ often recommended, to style applications in general and charts in particular\
    \ using a CSS style sheet.\n\nWe remove the layout changes from the Java code\
    \ and add a style sheet containing some layout instructions.\n\n**Listing 8-3**\
    \ shows the modified code of the `start()` method and **Listing 8-4** contains\
    \ the style sheet we added.\n\n**Listing 8-3.** Remove Programmatic Layout Instructions\n\
