    构建器（Builder）怎么了？


    如果您之前使用过 JavaFX 2，您可能对所谓的构建器模式很熟悉。构建器提供了一种声明式的编程风格。构建器模式不是通过调用类实例的 set() 方法来指定其字段，而是使用
    Builder 类的实例来定义目标类应该如何组合。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 1 章 ■ JavaFX 快速入门


    构建器在 JavaFX 中非常流行。然而，事实证明，将它们保留在平台中存在重大的技术障碍。因此，决定逐步淘汰构建器。在 Java 8 中，Builder 类仍然可以使用，但已被弃用。在
    Java 9 中，Builder 类可能会被完全移除。


    关于 Builder 类不再被推荐使用的更多原因，可以在 JavaFX 首席架构师 Richard Bair 的邮件列表条目中找到，地址为 [`mail.openjdk.java.net/pipermail/openjfx-dev/2013-`](http://mail.openjdk.java.net/pipermail/openjfx-dev/2013-March/006725.html)


    [March/006725.html。](http://mail.openjdk.java.net/pipermail/openjfx-dev/2013-March/006725.html)该条目的末尾包含一个非常重要的声明：“我相信
    FXML 或 Lambda 表达式或替代语言都提供了其他途径来实现与构建器相同的目标，而无需增加字节码或类的额外成本。”


    这正是我们将在本书中展示的内容。在本章末尾，我们将在代码中展示 Lambda 表达式的第一个示例。在第 3 章中，我们将展示 SceneBuilder 和
