- fmt: "在堆叠需要鼠标事件穿透的节点时请务必小心。\n\n请对节点使用`mouseTransparent`属性，或者考虑改用`AnchorPane`。\n\n\
    ### `TilePane`\n\n- 创建所有节点等尺寸的平铺效果。\n- 可通过绑定强制填充父容器（确保将`snapToPixel`设置为`false`）。\n\
    - 不能替代通用网格布局（请参见`GridPane`）。\n\n### `GridPane`\n\n- 提供最灵活的布局容器。\n- 应在需要组件实现像素级精确的行列对齐时使用。\n\
    - 除非与其他布局结合使用，否则无法实现组件重叠。\n\n### `AnchorPane`\n\n- 高度专用的布局，可用于边缘对齐或拉伸。\n- 最适合用于组件重叠的布局（能干净地穿透鼠标事件）。\n\
    - 某些使用场景通过边距/内边距或其他约束能更好地实现。\n\n## 让黑白棋活起来\n\n到目前为止，我们一直专注于布局，这虽然重要，但并不能让游戏变得有趣。然而，使用动态布局的美妙之处在于，只需对游戏算法进行少量增强，就能将这个静态应用变成一个动态的、可玩的游戏。\n\
    \n### 高亮合法落子\n\n一个可玩游戏算法的第一步是确保棋子只能放在合法的格子上。我们不仅仅是在后端实现一个算法，而是借此机会为应用添加一个功能，让它显示所有下一步可用的落子位置。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第5章 ■ 在JavaFX中构建动态UI布局\n\
    \n回到黑白棋的游戏规则，只有在以下情况下落子才是合法的：\n\n- 同一位置没有其他棋子。\n- 棋子放置在与对方棋子相邻的位置，并且在同一行上，另一端有己方棋子，从而可以翻转一个或多个对方棋子。\n\
    \n首先，你需要在模型类中添加一个`legalMove`函数，用于检查格子是否为空，然后验证给定`Cell`周围的八个方向：\n\n```\npublic\
    \ BooleanBinding legalMove(int x, int y) {\n    return board[x][y].isEqualTo(Owner.NONE).and(\n\
    \        canFlip(x, y, 0, -1, turn).or(\n        canFlip(x, y, -1, -1, turn).or(\n\
    \        canFlip(x, y, -1, 0, turn).or(\n        canFlip(x, y, -1, 1, turn).or(\n\
    \        canFlip(x, y, 0, 1, turn).or(\n        canFlip(x, y, 1, 1, turn).or(\n\
    \        canFlip(x, y, 1, 0, turn).or(\n        canFlip(x, y, 1, -1, turn))))))))\n\
    \    );\n}\n```\n\n> **注意**：我们选择让所有公共模型函数返回绑定。这使得可以使用属性绑定来更新UI，并且能高效地将更新推迟到棋盘发生变化时。\n\
    \n`canFlip`方法验证给定方向（由`cellX`、`cellY`参数指示）和当前回合玩家的第二个条件。由于使用流畅绑定接口会更复杂且效率更低，我们选择创建自定义绑定。\n\
    \n创建自定义绑定包括以下步骤：\n\n1.  首先，用一个内部类重写绑定类（此处为`BooleanBinding`）。\n2.  为了设置绑定的变量，使用一个静态初始化器，为算法依赖的每个变量调用`bind`函数。\n\
    3.  重写`computeValue`方法，并返回绑定新的计算值。\n\n计算是否为合法落子的基本算法是：检查给定方向上的第一个格子，确保它是不同颜色；如果是，则继续遍历格子，直到找到一个相同颜色的格子。如果确实找到了相同颜色的格子，则这是一个有棋子可翻转的合法落子；但如果下一个格子是相同颜色，或者另一端没有对方颜色的棋子，则不是合法落子。\n\
    \n这意味着静态初始化器需要为给定方向上的每个格子添加一个属性绑定，并且算法需要使用循环遍历所有格子，检查它们的所有者，如下列代码所示。"
