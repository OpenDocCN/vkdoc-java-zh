    异步处理


    到目前为止，这些示例的一个主要问题是它们在数据检索和解析过程中会阻塞用户界面。在许多实际场景中，这是不可接受的。由于网络或服务器问题，对外部 Web 服务的调用可能比预期花费更长时间。即使外部调用很快，暂时无响应的用户界面也会降低应用程序的整体质量。


    幸运的是，JavaFX 平台支持并发和异步任务。Task、Worker 和 Service 的概念已在第 7 章中讨论过。在本节中，我们将展示在访问 Web
    服务时如何利用`javafx.concurrent`包。我们还利用了 ListView 会监视包含其项目的 ObservableList 这一特性。


    基本思路是，在创建 ListView 时，我们立即返回一个空的 ObservableList，同时在后台线程中检索数据。一旦我们检索并解析完数据，就将其添加到
    ObservableList 中，结果将立即在 ListView 中可见。


