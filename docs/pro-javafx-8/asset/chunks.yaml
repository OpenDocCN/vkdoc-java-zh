    \ Z-Order of the Stage](#index_split_000.html#p47)\n\nJames Weaver and Stephen\
    \ Chin have been traveling through the evolution of JavaFX with me. They have\
    \ both presented on JavaFX at numerous international conferences and have been\
    \ developing with and blogging about JavaFX since 2007. James is a 30-year software\
    \ veteran and has authored several books on Java, as well as articles for Java\
    \ Magazine and Oracle Technology Network. He has also developed numerous JavaFX\
    \ applications for a wide variety of customers.\n\nStephen is passionate about\
    \ open source technologies and is the founder of WidgetFX and JFXtras. He also\
    \ has a deep passion for improving development technologies and processes, as\
    \ well as agile development methodologies.\n\nJohan Vos is co-founder of LodgON,\
    \ holds a PhD in applied physics, and has been a very prolific member of the JavaFX\
    \ community. His interest lies in the enterprise communication aspects of JavaFX,\
    \ combining the world of large servers with end-user devices. Johan’s analogy\
    \ to physics: The grand unified theory combines quantum mechanics (small) with\
    \ relativity theory (large); similarly in software, Java combines JavaFX with\
    \ Java EE.\n\nDean Iverson is a longtime client developer with a great eye for\
    \ creating elegant user interfaces. He develops GroovyFX libraries and is a contributor\
    \ to the JFXtras project. He has been developing and blogging about JavaFX since\
    \ 2007. Weiqi Gao holds a PhD in mathematics. His expertise is in the language\
    \ aspects of JavaFX, as reflected in the chapters on Properties and Bindings and\
    \ Collections and Concurrency.\n\nToday, the core JavaFX team at Oracle still\
    \ has several of the developers who were part of the early versions of JavaFX\
    \ and we also have new engineers who have joined us. As we move ahead and open\
    \ source JavaFX, we are looking forward to having more developers and experts\
    \ from the extended Java community join us in making JavaFX the number one choice\
    \ for client development.\n\nI am proud and honored to be part of this key software\
    \ technology. Given their length of experience and depth of expertise in all aspects\
    \ of JavaFX and across the Java platform, I cannot think of a better group of\
    \ authors to bring you JavaFX 8. I hope you will enjoy this book and find JavaFX\
    \ as satisfying as I have found it over the years. I hope it piques your interest\
    \ sufficiently to join the JavaFX community in making JavaFX the platform of choice\
    \ for clients.\n\n—Nandini Ramani\n\nVice President, Java Client Development\n\
    \nOracle Corporation\n\nxxi\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)"
