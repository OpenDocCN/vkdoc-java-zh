    In this section, we examine important threads that are present in all JavaFX applications.
    We explain the role they play in the overall scheme of JavaFX applications. We
    then turn our attention to the JavaFX Application Thread, explaining why executing
    long-running code in the JavaFX Application Thread makes your application appear
    to hang. Finally, we look at the javafx.concurrent framework and show you how
    to use it to execute long-running code in a worker thread off the JavaFX Application
    Thread and communicate the result back to the JavaFX Application Thread to update
    the GUI states.


    ■ **Note** if you are familiar with swing programming, the JavaFX application
    thread is similar to swing’s event dispatcher thread (edt), usually with the name
    “aWt-eventQueue-0.”


