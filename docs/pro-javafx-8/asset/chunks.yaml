- fmt: "您可以选择性地为您的`AudioClip`分配优先级。这是一个`IntegerProperty`，用于指定音效的相对优先级。数字越高，表示您为该`AudioClip`分配的重要性越高。如果系统可处理的`AudioClip`播放数量达到上限，则会根据优先级来决定停止哪些剪辑。可同时播放的剪辑数量没有精确指定，在当前的JavaFX版本中也无法查询。因此，如果您同时播放大量`AudioClip`（例如在游戏中），应考虑为您的音效分配优先级。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 136](index-386_1.jpg)\n\
    \n## 第9章 ■ 使用媒体类\n\n`AudioClip`非常适合播放短促、低延迟的音效。如果您需要播放歌曲或背景音乐，JavaFX媒体类是更好的选择。\n\
    \n### 使用媒体\n\nJavaFX媒体类通过将音频和视频文件简单地视为两种不同类型的媒体，使得处理它们变得非常容易。因此，播放音频或视频文件的基本操作只需几行（几乎相同的）代码即可完成。另一方面，该API也具有一定的深度，允许您超越简单的播放功能，从而增强用户的体验。在本章的剩余部分，我们将从简单的音频播放开始，然后向您展示如何利用此API的强大功能，将您的媒体应用程序提升到新的水平。\n\
    \nJavaFX媒体类位于`javafx.scene.media`包中。主要有三个类——`Media`、`MediaPlayer`和`MediaView`——以及许多辅助类。`Media`类封装了要播放的音频或视频资源。标识此资源的URI的字符串表示形式作为其唯一参数传递给`Media`构造函数。`Media`对象公开了一些属性，用于描述媒体的宽度和高度（处理视频时）、其持续时间，以及两个与错误处理相关的属性。构造完成后，`Media`对象可以传递给`MediaPlayer`实例的构造函数，该实例提供了一组用于控制音频或视频资源播放的方法。最后，`MediaPlayer`可以传递给`MediaView`节点的构造函数，以便在场景图中显示视频。这三个类之间的关系如图[9-3](#index_split_005.html#p386)所示。[2](#index_split_005.html#p386)\n\
    \n***图9-3.** JavaFX 8媒体类*\n\n> 2 当然，入侵者最初会遭到恐惧和不信任。在出人意料的剧情转折中，他们原来是一群能干且乐于助人的人。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第9章 ■ 使用媒体类\n\n需要重申的是，这三个类中只有`MediaView`是一个`Node`，因此能够被插入到场景图中。这意味着我们在图[9-3](#index_split_005.html#p386)中展示与`MediaPlayer`类关联的一组视觉控件时，稍微简化了一些。实际上，您需要创建自己的按钮和滑块，并将它们连接到`MediaPlayer`的方法，以允许用户控制应用程序中媒体的播放。在本章接下来的示例中，我们有很多机会向您展示如何做到这一点。让我们通过创建一个播放音频文件的应用程序，开始深入探讨这些媒体类。\n\
    \n### 播放音频\n\n播放音频文件仅涉及`Media`和`MediaPlayer`类。由于没有视频需要处理，因此不需要`MediaView`。清单9-6展示了使用JavaFX播放音频所需的最少代码。\n\
    \n***清单9-6.*** 一个播放音频文件的非常简单的应用程序\n\n```java\npublic class AudioPlayer1 extends\
    \ Application {\n\n    public static void main(String[] args) {\n        launch(args);\n\
    \    }\n\n    @Override\n    public void start(Stage primaryStage) {\n       \
    \ URL resource = getClass().getResource(\"resources/keeper.mp3\");\n        Media\
    \ media = new Media(resource.toString());\n        MediaPlayer mediaPlayer = new\
    \ MediaPlayer(media);\n        mediaPlayer.play();\n\n        primaryStage.setTitle(\"\
    Audio Player 1\");\n        primaryStage.setWidth(200);\n        primaryStage.setHeight(200);\n\
    \        primaryStage.show();\n    }\n}\n```\n\n这个简单的应用程序首先找到其jar包内音频文件资源的URL。\n\
    \n资源URL的字符串形式作为`source`参数传递给`Media`构造函数。`Media`类也可以像`AudioClip`一样从互联网或本地文件系统加载资源。一旦`Media`对象构建完成，它就被用来构造一个新的`MediaPlayer`，并调用`MediaPlayer`的`play`方法来开始播放。此应用程序没有实际要显示的场景，因此将`Stage`的宽度和高度设置为200，以便生成的窗口可见。如果您的音频需求仅仅是加载一个声音文件并播放它，那么您的工作就完成了。然而，清单9-6中的代码还远未达到生产质量。\n\
    \n■ **注意** 一旦创建了`MediaPlayer`，其`Media`对象就不能更改。如果您想更改当前正在播放的歌曲或视频，必须为新的`Media`对象创建一个新的`MediaPlayer`。多个`MediaPlayer`可以共享一个`Media`对象。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第9章 ■ 使用媒体类\n\n### 错误处理\n\
