- fmt: "Similarly, for Boolean arguments, the return type is `When.BooleanConditionBuilder`;\
    \ for string arguments, `When.StringConditionBuilder`; and for object arguments,\
    \ `When.ObjectConditionBuilder`.\n\nThese condition builders in turn have the\
    \ following `otherwise()` methods.\n\n- For `When.NumberConditionBuilder`\n  -\
    \ `NumberBinding otherwise(ObservableNumberValue n)`\n  - `DoubleBinding otherwise(double\
    \ d)`\n  - `NumberBinding otherwise(float f)`\n  - `NumberBinding otherwise(long\
    \ l)`\n  - `NumberBinding otherwise(int i)`\n\n- For `When.BooleanConditionBuilder`\n\
    \  - `BooleanBinding otherwise(ObservableBooleanValue b)`\n  - `BooleanBinding\
    \ otherwise(boolean b)`\n\n- For `When.StringConditionBuilder`\n  - `StringBinding\
    \ otherwise(ObservableStringValue str)`\n  - `StringBinding otherwise(String str)`\n\
    \n- For `When.ObjectConditionBuilder`\n  - `ObjectBinding<T> otherwise(ObservableObjectValue<T>\
    \ obj)`\n  - `ObjectBinding<T> otherwise(T obj)`\n\nThe net effect of these method\
    \ signatures is that you can build up a binding that resembles an if/then/else\
    \ expression this way:\n\n`new When(b).then(x).otherwise(y)`\n\nwhere `b` is an\
    \ `ObservableBooleanValue`, and `x` and `y` are of similar types and can be either\
    \ observable or unobservable. The resulting binding will be of a type similar\
    \ to that of `x` and `y`.\n\nThe program in Listing 4-7 uses the fluent interface\
    \ API from the `When` class to calculate the area of a triangle with given sides\
    \ `a`, `b`, and `c`. Recall that to form a triangle, the three sides must satisfy\
    \ the following conditions: `a + b > c`, `b + c > a`, `c + a > b`.\n\nWhen the\
    \ preceding conditions are satisfied, the area of the triangle can be calculated\
    \ using Heron’s formula: `Area = sqrt(s * (s – a) * (s – b) * (s – c))` where\
    \ `s` is the semiperimeter: `s = (a + b + c) / 2`.\n\n**Listing 4-7.** `HeronsFormulaExample.java`\n\
    \n```java\nimport javafx.beans.binding.DoubleBinding;\nimport javafx.beans.binding.When;\n\
    import javafx.beans.property.DoubleProperty;\nimport javafx.beans.property.SimpleDoubleProperty;\n\
    \npublic class HeronsFormulaExample {\n    public static void main(String[] args)\
    \ {\n        DoubleProperty a = new SimpleDoubleProperty(0);\n        DoubleProperty\
    \ b = new SimpleDoubleProperty(0);\n        DoubleProperty c = new SimpleDoubleProperty(0);\n\
    \n        DoubleBinding s = a.add(b).add(c).divide(2.0D);\n\n        final DoubleBinding\
    \ areaSquared = new When(\n            a.add(b).greaterThan(c)\n            .and(b.add(c).greaterThan(a))\n\
    \            .and(c.add(a).greaterThan(b)))\n            .then(s.multiply(s.subtract(a))\n\
    \                .multiply(s.subtract(b))\n                .multiply(s.subtract(c)))\n\
    \            .otherwise(0.0D);\n\n        a.set(3);\n        b.set(4);\n     \
    \   c.set(5);\n\n        System.out.printf(\"Given sides a = %1.0f, b = %1.0f,\
    \ and c = %1.0f,\" +\n            \" the area of the triangle is %3.2f\\n\", a.get(),\
    \ b.get(), c.get(),\n            Math.sqrt(areaSquared.get()));\n\n        a.set(2);\n\
    \        b.set(2);\n        c.set(2);\n\n        System.out.printf(\"Given sides\
    \ a = %1.0f, b = %1.0f, and c = %1.0f,\" +\n            \" the area of the triangle\
    \ is %3.2f\\n\", a.get(), b.get(), c.get(),\n            Math.sqrt(areaSquared.get()));\n\
    \    }\n}\n```\n\nInasmuch as there is no ready-made binding method in `DoubleExpression`\
    \ that calculates the square root, we create a `DoubleBinding` for `areaSquared`\
    \ instead. The constructor argument for `When()` is a `BooleanBinding` built out\
    \ of the three conditions on `a`, `b`, and `c`. The argument for the `then()`\
    \ method is a `DoubleBinding` that calculates the square of the area of the triangle.\
    \ And because the `then()` argument is numeric, the `otherwise()` argument also\
    \ has to be numeric. We choose to use `0.0D` to signal that an invalid triangle\
    \ is encountered.\n\n**Note:** Instead of using the `When()` constructor, you\
    \ can also use the factory method `when()` in the `Bindings` utility class to\
    \ create the `When` object.\n\nWhen we run the program in Listing 4-7, the following\
    \ output is printed to the console:\n\n```\nGiven sides a = 3, b = 4, and c =\
    \ 5, the area of the triangle is 6.00.\nGiven sides a = 2, b = 2, and c = 2, the\
    \ area of the triangle is 1.73.\n```"
