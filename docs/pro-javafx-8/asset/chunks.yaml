- fmt: "# Playing Media Files Over the Internet\n\nPlaying media files over the Internet\
    \ happens automatically with the JavaFX media API. All you have to do is point\
    \ a `Media` object to an HTTP resource and attach it to a `MediaPlayer` with `autoPlay`\
    \ set to `true`. If, however, you are interested in monitoring the progress of\
    \ the download buffer, you can use the `bufferProgressTime` property in the `MediaPlayer`\
    \ class. When data are loaded from a stream or from disk, the amount of time those\
    \ data will take to play is calculated and this time is regularly updated as the\
    \ value of `bufferProgressTime`. By binding to this property, you can receive\
    \ these updates and effectively monitor the media’s buffer.\n\nThe final two `MediaPlayer`\
    \ properties we discuss are the `rate` and `currentRate` properties. Calling `setRate`\
    \ allows you to control the rate of the playback. Passing a parameter of `1.0`\
    \ will cause playback to proceed at the normal rate. A parameter of `2.0` would\
    \ cause your media to be played at twice the normal rate. You can pass any value\
    \ between `0.0` and `8.0`. The `currentRate` property always reflects the actual\
    \ rate of playback, regardless of the value of the `rate` property. For example,\
    \ if playback is currently stalled, `currentRate` will be `0.0` even though `rate`\
    \ may be set to `4.0`.\n\n## Playing Video\n\nFrom an API standpoint, playing\
    \ video instead of audio is as simple as wrapping a `MediaPlayer` with a `MediaView`\
    \ and adding the `MediaView` to the scene graph. Listing 9-31 shows how this is\
    \ done. You simply point a `Media` object at a valid source (a Flash movie in\
    \ this case) and wrap it with an auto-playing `MediaPlayer`, which, in turn, is\
    \ wrapped with a `MediaView`. The final step is to add the `MediaView` to the\
    \ scene and set the size of the scene to match the size of the movie.\n\n**Listing\
    \ 9-31.** A Minimalist but Functional Movie Player\n\n```java\npublic class VideoPlayer1\
    \ extends Application {\n\n    public static void main(String[] args) {\n    \
    \    launch(args);\n    }\n\n    @Override\n    public void start(Stage primaryStage)\
    \ {\n        String workingDir = System.getProperty(\"user.dir\");\n        File\
    \ f = new File(workingDir, \"../media/omgrobots.flv\");\n        Media m = new\
    \ Media(f.toURI().toString());\n        MediaPlayer mp = new MediaPlayer(m);\n\
    \        MediaView mv = new MediaView(mp);\n\n        StackPane root = new StackPane();\n\
    \        root.getChildren().add(mv);\n\n        primaryStage.setScene(new Scene(root,\
    \ 960, 540));\n        primaryStage.setTitle(\"Video Player 1\");\n        primaryStage.show();\n\
    \n        mp.play();\n    }\n}\n```\n\nThis example loads the video file from\
    \ the file system. Loading video from the Internet using an HTTP URL will work\
    \ just as well, but it is not advisable to package movies of any significant size\
    \ inside your jar file because that will drastically increase the size of your\
    \ application. Once we have our file URL, everything becomes familiar. You use\
    \ the URL to create the `Media` object and wrap that `Media` object in a `MediaPlayer`.\
    \ The only new step is to construct a `MediaView` node using the `MediaPlayer`\
    \ as the constructor argument and add it to the root of our scene graph, a `StackPane`\
    \ in this case. We create a `Scene` that is sized to fit the dimensions of our\
