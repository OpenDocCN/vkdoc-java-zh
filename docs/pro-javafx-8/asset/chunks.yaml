    **Figure 10-7.** The LightExample program


    As you experiment with different ( *x*, *y*, *z*) coordinates of the red light
    and the blue light, keep in mind that the perspective camera that is rendering
    the screen is slightly rotated away from the default position, and translated
    to the negative *z* direction. Therefore the face of the box that is facing us
    is the face with negative *z* coordinates; the face of the box that is facing
    right is the face with positive *x* coordinates; and the face of the box that
    is facing upward is the face with negative *y* coordinates.


