  raw: 'The lighting class hierarchy for the JavaFX 3D graphics API consists of the
    LightBase abstract class and its concrete subclasses AmbientLight and PointLight.
    They belong to the javafx.scene package. An AmbientLight is a light source that
    seems to come from all directions. A PointLight is a light that has a fixed point
    in space and radiates light equally in all directions away from itself. They are
    Nodes, so they can be added to a JavaFX scene to provide lighting to the scene.
    They can also be moved to the desired locations using the Translate transform.
    If they are added to a container, then they move along with the container when
    the container is transformed.


    Understanding the LightBase Class


    The LightBase abstract class has the following public methods:


    • void setColor(Color)


    • Color getColor()


    • ObjectProperty<Color> colorProperty()


    • void setLightOn(boolean)


    • boolean isLightOn()


    • BooleanProperty lightOnProperty()


    • ObservableList<Node> getScope()


    These methods define two properties, color and lightOn, for the LightBase class.
    The color property is of type Color and defines the color of the light. The lightOn
    property is a boolean property and controls whether the light is on. The getScope()
    method returns an ObservableList of Nodes. When this list is empty, the light
    affects all Nodes in the scene. When this list is not empty, the light only affects
    the Nodes contained in the list.


    Understanding the AmbientLight Class


    The AmbientLight class has the following constructors:


    • AmbientLight()


    • AmbientLight(Color color)


    The default constructor creates an AmbientLight with a default color of Color.WHITE.
    The one-parameter constructor creates an AmbientLight with the specified color.
    The AmbientLight class has no additional public methods aside from the ones it
    inherited from the LightBase base class.


    Understanding the PointLight Class


    The PointLight class has the following constructors:


    • PointLight()


    • PointLight(Color color)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 10 ■ JavaFX 3D


    The default constructor creates a PointLight with a default color of Color.WHITE.
    The one-parameter constructor creates a PointLight with the specified color. The
    PointLight class has no additional public methods aside from the ones it inherited
    from the LightBase class.


    The program in Listing 10-6 illustrates the use of lights in a JavaFX 3D scene.
    Two PointLights, one red and one blue, are added to a scene that already has a
    Box and a PerspectiveCamera. A control panel with sliders that can alter the coordinates
    of the two lights is added at the bottom of the window to allow you to see the
    effect of the lights being located at various locations.


