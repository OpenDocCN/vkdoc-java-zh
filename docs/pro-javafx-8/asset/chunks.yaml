    在本例中，我们创建了一个名为 `intProperty` 的 `SimpleIntegerProperty` 对象，其初始值为 1024。随后，我们通过一系列不同的整数值更新了它的值，期间我们先后添加并移除了一个
    `InvalidationListener`，添加并移除了一个 `ChangeListener`，最后创建了另一个名为 `otherProperty` 的
    `SimpleIntegerProperty`，将其绑定到 `intProperty` 上，然后又解除了绑定。我们在定义监听器时利用了 Java 8 的 Lambda
    语法。该示例程序大量使用了 `println` 调用来展示程序内部发生的情况。


    运行清单 4-1 中的程序时，控制台会输出以下内容：


    intProperty = IntegerProperty [value: 1024]


    intProperty.get() = 1024


    intProperty.getValue() = 1024


    已添加失效监听器。


    调用 intProperty.set(2048)。


    可观察对象已失效：IntegerProperty [value: 2048]。


    调用 intProperty.setValue(3072)。


    可观察对象已失效：IntegerProperty [value: 3072]。


    已移除失效监听器。


    调用 intProperty.set(4096)。


    已添加变更监听器。


    调用 intProperty.set(5120)。


    可观察值已变更：旧值 = 4096，新值 = 5120


    已移除变更监听器。


    调用 intProperty.set(6144)。


    otherProperty.get() = 0


    将 otherProperty 绑定到 intProperty。


    otherProperty.get() = 6144


    调用 intProperty.set(7168)。


    otherProperty.get() = 7168


    解除 otherProperty 与 intProperty 的绑定。


    otherProperty.get() = 7168


    调用 intProperty.set(8192)。


    otherProperty.get() = 7168


    通过将输出行与程序源代码进行关联（或者在你喜欢的 IDE 的调试器中单步执行代码），我们可以得出以下结论。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 4 章 ■ 属性和绑定


    •   一个 `SimpleIntegerProperty` 对象（例如 `intProperty` 和 `otherProperty`）持有一个 `int`
    值。该值可以通过 `get()`、`set()`、`getValue()` 和 `setValue()` 方法进行操作。`get()` 和 `set()`
    方法使用原始 `int` 类型执行操作。`getValue()` 和 `setValue()` 方法使用 `Integer` 包装类型。


    •   你可以向 `intProperty` 添加和移除 `InvalidationListener` 对象。


    •   你可以向 `intProperty` 添加和移除 `ChangeListener` 对象。


    •   另一个 `Property` 对象（例如 `otherProperty`）可以绑定到 `intProperty`。当这种情况发生时，`otherProperty`
    会接收 `intProperty` 的值。


    •   当为 `intProperty` 设置新值时，任何附加到其上的对象都会收到通知。如果该对象已被移除，则不会发送通知。


    •   收到通知时，`InvalidationListener` 对象仅被告知哪个对象正在发送通知，并且该对象仅被识别为 `Observable`。


    •   收到通知时，`ChangeListener` 对象除了收到发送通知的对象外，还会被告知另外两条信息——`oldValue` 和 `newValue`。发送通知的对象被识别为
    `ObservableValue`。


    •   对于像 `otherProperty` 这样的绑定属性，我们无法从输出中判断它何时或如何收到 `intProperty` 值变更的通知。但是，我们可以推断它一定知道了变更，因为当我们询问
    `otherProperty` 的值时，我们得到的是 `intProperty` 的最新值。


    ■ **注意** 尽管这个激励示例使用了 `Integer` 属性，但类似的示例也可以使用基于 `Boolean`、`Long`、`Float`、`Double`、`String`
    和 `Object` 类型的属性。在 JavaFX 属性和绑定框架中，当接口为具体类型进行扩展或实现时，总是针对 `Boolean`、`Integer`、`Long`、`Float`、`Double`、`String`
    和 `Object` 类型进行的。


    这个示例让我们注意到了 JavaFX 属性和绑定框架的一些关键接口和概念：包括 `Observable` 及其关联的 `InvalidationListener`
    接口，`ObservableValue` 及其关联的 `ChangeListener` 接口，允许我们直接操作 `SimpleIntegerProperty`
    对象值的 `get()`、`set()`、`getValue()` 和 `setValue()` 方法，以及允许我们通过将 `SimpleIntegerProperty`
    对象从属于另一个 `SimpleIntegerProperty` 对象来放弃对其值的直接操作的 `bind()` 方法。


    在下一节中，我们将更详细地向你介绍这些以及 JavaFX 属性和绑定框架的其他一些关键接口和概念。


    理解关键接口和概念


    图 4-1 是一个 UML 图，展示了 JavaFX 属性和绑定框架的关键接口。它包含了一些你在上一节中已经见过的接口，以及一些你尚未见过的接口。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图片 67](img/index-152_1.png)


    第 4 章 ■ 属性和绑定


    ***图 4-1.** JavaFX 属性和绑定框架的关键接口*


    ■ **注意** 我们在 UML 图中没有显示接口的完全限定名称。这些接口分布在四个包中：`javafx.beans`、`javafx.beans.binding`、`javafx.beans.property`
    和 `javafx.beans.value`。你可以通过查阅 JavaFX API 文档或使用你喜欢的 IDE 的“查找类”功能轻松找出哪个接口属于哪个包。


    理解 Observable 接口


    层次结构的根是 `Observable` 接口。你可以向一个 `Observable` 对象注册 `InvalidationListener` 对象以接收*失效*事件。你已经在上一节的激励示例中看到过从一种
    `Observable` 对象（`SimpleIntegerProperty` 对象 `intProperty`）触发的失效事件。


    当调用 `set()` 或 `setValue()` 方法将底层值从一个 `int` 更改为另一个不同的 `int` 时，就会触发该事件。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 4 章 ■ 属性和绑定


    ■ **注意** 如果你连续多次使用相同的值调用 setter，JavaFX 属性和绑定框架中 `Property` 接口的任何实现都只会触发一次失效事件。


    失效事件触发的另一个来源是 `Binding` 对象。你还没有见过 `Binding` 对象的示例，但本章后半部分会有大量 `Binding` 对象。目前我们只需注意，`Binding`
    对象可能会变得无效，例如，当调用其 `invalidate()` 方法时，或者，正如我们将在本章后面展示的，当其某个依赖项触发失效事件时。


    ■ **注意** 如果 `Binding` 对象连续多次变得无效，JavaFX 属性和绑定框架中 `Binding` 接口的任何实现都只会触发一次失效事件。


    理解 ObservableValue 接口


    层次结构中的下一个是 `ObservableValue` 接口。它只是一个具有值的 `Observable`。其 `getValue()` 方法返回其值。我们在激励示例中对
    `SimpleIntegerProperty` 对象调用的 `getValue()` 方法可以被认为来自此接口。你可以向一个 `ObservableValue`
    对象注册 `ChangeListener` 对象以接收*变更*事件。


    你在上一节的激励示例中看到了变更事件的触发。当变更事件触发时，`ChangeListener` 会收到另外两条信息：`ObservableValue` 对象的旧值和新值。


    ■ **注意** 如果你连续多次使用相同的值调用 setter，JavaFX 属性和绑定框架中 `ObservableValue` 接口的任何实现都只会触发一次变更事件。

