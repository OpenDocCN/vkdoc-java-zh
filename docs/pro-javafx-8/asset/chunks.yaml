    然而，在实际应用中，许多参数是通过 Node 的构造函数传递的。以 Line 实例为例，第二个参数是 startY 参数。这种方法可以减少代码行数，但开发者需要留意构造函数中参数的顺序和含义。我们再次强烈建议在编写
    JavaFX 应用程序时准备好 JavaDoc。


    将关键帧插入时间线


    我们的时间线包含两个 KeyFrame 实例的集合。使用 KeyValue 构造函数，其中一个实例在时间线开始时将 startXVal 属性赋值为 100，另一个实例在时间线运行一秒后将
    startXVal 属性赋值为 300。由于 Line 的 startX 属性绑定到 startXVal 属性的值，最终结果是线条的顶端在一秒内水平移动了
    200 像素。


    在时间线的第二个 KeyFrame 中，KeyValue 构造函数传递了第三个参数，该参数指定从 100 到 300 的插值将在一秒的持续时间内以线性方式进行。其他插值常量包括
    EASE_IN、EASE_OUT 和 EASE_BOTH。这些常量分别使关键帧中的插值在开始、结束或开始和结束时速度变慢。


    以下是本示例中使用的其他 Timeline 属性（继承自 Animation 类）：


    • autoReverse，我们将其初始化为 true。这会导致时间线在到达最后一个 KeyFrame 时自动反向播放。反向播放时，插值会在一秒内从 300
    变为 100。


    • cycleCount，我们将其初始化为 Animation.INDEFINITE。这会导致时间线无限重复，直到被 Timeline 类的 stop()
    方法停止。


    说到 Timeline 类的方法，现在是向您展示如何控制时间线并监控其状态的好时机。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 2 章 ■ 在 JavaFX 中创建用户界面


    控制与监控时间线


    正如您在使用 Metronome1 程序时所观察到的，点击按钮会导致动画开始、暂停、恢复和停止。这反过来会影响动画的状态（运行中、已暂停或已停止）。这些状态以启用或禁用的形式反映在按钮上。以下来自清单
    2-5 的代码片段展示了如何启动、暂停、恢复和停止时间线，以及如何判断时间线是正在运行还是已暂停。


    startButton = new Button("start");


    startButton.setOnAction(e -> anim.playFromStart());


    pauseButton = new Button("pause");


    pauseButton.setOnAction(e -> anim.pause());


    resumeButton = new Button("resume");


    resumeButton.setOnAction(e -> anim.play());


    stopButton = new Button("stop");


    stopButton.setOnAction(e -> anim.stop());


    **...代码省略...**


    startButton.disableProperty().bind(anim.statusProperty()


    .isNotEqualTo(Animation.Status.STOPPED));


    pauseButton.disableProperty().bind(anim.statusProperty()


    .isNotEqualTo(Animation.Status.RUNNING));


    resumeButton.disableProperty().bind(anim.statusProperty()


    .isNotEqualTo(Animation.Status.PAUSED));


    stopButton.disableProperty().bind(anim.statusProperty()


    .isEqualTo(Animation.Status.STOPPED));


    如 Start 按钮的动作事件处理器所示，调用了 Timeline 实例的 playFromStart() 方法，该方法从开头开始播放时间线。此外，该 Button
    的 disable 属性绑定到一个表达式，该表达式评估时间线的 status 属性是否不等于 Animation.Status.STOPPED。这会导致当时间线未停止时（此时它必须处于运行或暂停状态），该按钮被禁用。


    当用户点击 Pause 按钮时，动作事件处理器会调用时间线的 pause() 方法，该方法会暂停动画。该 Button 的 disable 属性绑定到一个表达式，该表达式评估时间线是否未在运行。

