- fmt: 'state. It calls `createTask()` to obtain a freshly minted `Task`, and asks
    the `executor` property for an `Executor`. If the `executor` property is not set,
    it creates its own `Executor`. It binds the `Service<V>` object’s nine `Worker`
    properties to that of the `Task`’s. It then transitions the `Task` to the `Worker.State.SCHEDULED`
    state, and executes the `Task` on the `Executor`. The `reset()` method can only
    be called when the `Service<V>`’s state is not `Worker.State.SCHEDULED` or `Worker.State.RUNNING`.
    It simply unbinds the nine `Service<V>` properties from that of the underlying
    `Task` and resets their values to fresh startup values: `Worker.State.READY` for
    the `state` property, and `null` or `""` or `false` or `-1` for the other properties.
    The `restart()` method simply cancels the currently executing `Task`, if any,
    and then does a `reset()` followed by a `start()`. The `cancel()` method will
    cancel the currently executing `Task`, if any; otherwise it will transition the
    `Service<V>` to the `Worker.State.CANCELLED` state.


    `Listing 7-10` illustrates using an instance of an anonymous subclass of the `Service<V>`
    abstract class to execute `Task`s repeatedly in its own `Executor`.


