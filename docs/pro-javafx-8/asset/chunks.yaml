- fmt: "Typically, iOS applications are written in Objective-C by using the Xcode\
    \ development environment. Java applications, by contrast, produce Java bytecode\
    \ and are typically created using IDEs. Hence, a translation step is required\
    \ to have Java bytecode running in an iOS environment.\n\nThere are a number of\
    \ approaches for running (translated) Java bytecode in iOS environments. At this\
    \ moment, the `RoboVM` project provides a convenient way to convert your JavaFX\
    \ applications into native iOS applications.\n\n`RoboVM` translates Java bytecode\
    \ into iOS native code. The `OpenJFX` repository already contains an implementation\
    \ of JavaFX on top of iOS. The native calls required by the JavaFX platform are\
    \ implemented using native iOS calls. This allows JavaFX applications to achieve\
    \ the same performance as native applications. `RoboVM` translates not only your\
    \ JavaFX Application classes, but also all classes that your application depends\
    \ on.\n\nThere is no compiling, linking, resolving, or translation needed at runtime—this\
    \ would not be allowed by Apple, which keeps a strict policy as to what is allowed\
    \ to be done in iOS applications. The schema in Figure [12-9 sho](#index_split_007.html#p535)ws\
    \ how it works.\n\n**Figure 12-9.** Running JavaFX applications on top of RoboVM\n\
    \nAs you can see from the schema, the `RoboVM` project contains both libraries\
    \ as well as a compiler. The `RoboVM` compiler compiles your JavaFX application\
    \ file and all the required class files, and links it together with the required\
    \ libraries. `RoboVM` can produce executables for MacOS and for iOS.\n\nThe steps\
    \ required to convert a JavaFX application into a native iOS application are described\
    \ in the `RoboVM` documentation pages. Currently, there are a number of options\
    \ a developer can follow:\n\n- Use `eclipse` with the `RoboVM` plug-in.\n- Use\
    \ `maven` with the `RoboVM` maven plug-in.\n- Directly execute the `RoboVM` compiler\
    \ using a command-line approach.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 12 ■ JavaFX on embedded and mobile\n\nAs an example, we will write\
    \ a very simple JavaFX Application and explain the steps required to create an\
    \ iOS application. The code for this simple application is shown in Listing 12-1.\n\
    \n**Listing 12-1.** Simple JavaFX Application That Will Be Ported to iOS and Android\n\
    \n```\npackage projavafx;\n\nimport java.util.Random;\n\nimport javafx.application.Application;\n\
    \nimport javafx.event.ActionEvent;\n\nimport javafx.event.EventHandler;\n\nimport\
    \ javafx.scene.Scene;\n\nimport javafx.scene.control.Button;\n\nimport javafx.scene.control.Label;\n\
    \nimport javafx.scene.layout.StackPane;\n\nimport javafx.stage.Stage;\n\npublic\
    \ class SimplePort extends Application {\n\n    final String[] days = new String[]{\"\
    Monday\", \"Tuesday\", \"Wednesday\", \"Thursday\", \"Friday\",\n\n          \
    \  \"Saturday\", \"Sunday\"};\n\n    @Override\n\n    public void start(Stage\
    \ primaryStage) {\n\n        Random random = new Random();\n\n        Button btn\
    \ = new Button();\n\n        btn.setText(\"Guess a day\");\n\n        Label answer\
    \ = new Label(\"no input received\");\n\n        answer.setTranslateY(50);\n\n\
    \        btn.setOnAction(new EventHandler<ActionEvent>() {\n\n            @Override\n\
    \n            public void handle(ActionEvent event) {\n\n                int day\
    \ = random.nextInt(7);\n\n                answer.setText(days[day]);\n\n     \
    \       }\n\n        });\n\n        StackPane root = new StackPane();\n\n    \
    \    root.getChildren().addAll(btn, answer);\n\n        Scene scene = new Scene(root,\
    \ 300, 250);\n\n        primaryStage.setTitle(\"JavaFX Porting\");\n\n       \
    \ primaryStage.setScene(scene);\n\n        primaryStage.show();\n\n    }\n\n \
    \   public static void main(String[] args) {\n\n        launch(args);\n\n    }\n\
    \n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 177](index-537_1.jpg)\n\
