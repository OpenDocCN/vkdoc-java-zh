    *计算机编程非常有趣。就像音乐一样，它是一种源于天赋与持续练习的未知融合的技能。就像绘画一样，它可以被塑造成各种目的——商业、艺术和纯粹的娱乐。程序员因长时间工作而享有盛誉，但很少有人将其归因于创造力的驱动。程序员在周末、假期和用餐时谈论软件开发，并非因为他们缺乏想象力，而是因为他们的想象力揭示了他人无法看到的世界。*


    —拉里·奥布莱恩和布鲁斯·埃克尔


    JavaFX 提供了丰富的功能集来构建应用程序，让您可以创建超越传统 UI 工具包所能实现的沉浸式用户界面。然而，它并不仅限于此，因为 JavaFX 构建在
    Java 语言之上，因此您还可以充分利用为 Java 平台开发的所有语言和工具。此外，JavaFX 还附带 FXML，这是其用 XML 编写的 UI 声明语言，本身功能相当强大。


    在本章中，我们将展示如何利用不同的语言和标记，用更少的代码创建外观精美的 JavaFX UI。本章讨论的所有语言和功能的妙处在于，您可以选择使用。您可以继续使用命令式风格，用纯
    Java 构建 JavaFX 应用程序，也可以利用您喜爱的 JVM 语言。谁知道呢？您甚至可能仅仅因为 JavaFX 的使用而成为本章讨论的某种语言的皈依者。


