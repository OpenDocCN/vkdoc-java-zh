    The addAll() methods append to the ObservableIntegerArray. The setAll() methods
    replace the content of the ObservableIntegerArray. The sources to these two sets
    of methods can be a vararg array of ints, an ObservableIntegerArray, an int array
    with a starting index and a length, or an ObservableIntegerArray with a starting
    index and a length. The get() method returns the value at the specified index.
    The set() methods replace a portion of the ObservableIntegerArray with new values
    starting at the index specified in the first parameter. The replacement data can
    be a single int value, an int array with a starting index and a length, or an
    ObservableIntegerArray with a starting index and a length. If there is not enough
    room in the original ObservableIntegerArray to accommodate the replacement data,
    an ArrayIndexOutOfBoundsException is thrown. The copyTo() methods copy a portion
    of the ObservableIntegerArray starting at the specified srcIndex into a destination
    int array or ObservableIntegerArray starting at the specified destIndex. The length
    parameter dictates the length of the portion copied. If there are not enough elements
    in the source ObservableIntegerArray to form a portion of the specified length,
    or if there is not enough room in the destination to accommodate the copied portion,
    an ArrayIndexOutOfBoundsException is thrown.


    The toArray() methods copy the content of the ObservableIntegerArray into an int
    array. If the dest parameter is not null and has enough room, it is filled and
    returned; otherwise a new int array is allocated, filled, and returned. In the
    form where the srcIndex and length are specified, if there are not enough elements
    in the ObservableIntegerArray, an ArrayIndexOutOfBoundsException is thrown.


