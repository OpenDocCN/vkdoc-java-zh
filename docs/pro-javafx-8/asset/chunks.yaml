    \ The Predefined3DShapesExample program, in wireframe form\n\n## Creating User-Defined\
    \ 3D Shapes\n\nThe `MeshView` class is a `Node` that allows arbitrary user-defined\
    \ 3D shapes to be incorporated into JavaFX scenes. It has the following constructors:\n\
    \n- `MeshView()`\n- `MeshView(Mesh mesh)`\n\nThe default constructor creates a\
