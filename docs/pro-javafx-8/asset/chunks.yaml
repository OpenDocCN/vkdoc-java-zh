    Chapter 4 ■ properties and Bindings


    Understanding the WritableValue Interface


    This might be the simplest subsection in the entire chapter, for the WritableValue
    interface is truly as simple as it looks. Its purpose is to inject the getValue()
    and setValue() methods into implementations of this interface.


    All implementation classes of WritableValue in the JavaFX properties and bindings
    framework also implement ObservableValue, therefore you can make an argument that
    the value of WritableValue is only to provide the setValue() method.


    You have seen the setValue() method at work in the motivating example.


    Understanding the ReadOnlyProperty Interface


    The ReadOnlyProperty interface injects two methods into its implementations. The
    getBean() method should return the Object that contains the ReadOnlyRroperty or
    null if it is not contained in an Object. The getName() method should return the
    name of the ReadOnlyProperty or the empty string if the ReadOnlyProperty does
    not have a name.


    The containing object and the name provide *contextual* information about a ReadOnlyProperty.
    The contextual information of a property does not play any direct role in the
    propagation of invalidation events or the recalculation of values. However, if
    provided, it will be taken into account in some peripheral calculations.


    In our motivating example, the intProperty is constructed without any contextual
    information. Had we used the full constructor to supply it a name:


    intProperty = new SimpleIntegerProperty(null, "intProperty", 1024);


    the output would have contained the property name:


    intProperty = IntegerProperty [name: intProperty, value: 1024]


    Understanding the Property Interface


    Now we come to the bottom of our key interfaces hierarchy. The Property interface
    has as its superinterfaces all four interfaces we have examined thus far: Observable,
    ObservableValue, ReadOnlyProperty, and WritableValue.


    Therefore it inherits all the methods from these interfaces. It also provides
    five methods of its own: void bind(ObservableValue<? extends T> observableValue);


    void unbind();


    boolean isBound();


    void bindBidirectional(Property<T> tProperty);


    void unbindBidirectional(Property<T> tProperty);


    You have seen two of the methods at work in the motivating example in the last
    section: bind() and unbind().


    Calling bind() creates a *unidirectional binding* or a dependency between the
    Property object and the ObservableValue argument. Once they enter this relationship,
    calling the set() or setValue() methods on the Property object will cause a RuntimeException
    to be thrown. Calling the get() or getValue() methods on the Property object will
    return the value of the ObservableValue object. And, of course, changing the value
    of the ObservableValue object will invalidate the Property object. Calling unbind()
    releases any existing unidirectional binding the Property object may have. If
    a unidirectional binding is in effect, the isBound() method returns true; otherwise
    it returns false.


    Calling bindBidirectional() creates a *bidirectional binding* between the Property
    caller and the Property argument. Notice that unlike the bind() method, which
    takes an ObservableValue argument, the bindBidirectional() method takes a Property
    argument. Only two Property objects can be bound together 150


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 4 ■ properties and Bindings


    bidirectionally. Once they enter this relationship, calling the set() or setValue()
    methods on either Property object will cause both objects’ values to be updated.
    Calling unbindBidirectional() releases any existing bidirectional binding the
    caller and the argument may have. The program in Listing 4-2 shows a simple bidirectional
    binding at work.


    ***Listing 4-2.*** BidirectionalBindingExample.java


    import javafx.beans.property.SimpleStringProperty;


    import javafx.beans.property.StringProperty;


    public class BidirectionalBindingExample {


    public static void main(String[] args) {


    System.out.println("Constructing two StringProperty objects.");


    StringProperty prop1 = new SimpleStringProperty("");


    StringProperty prop2 = new SimpleStringProperty("");


    System.out.println("Calling bindBidirectional.");


    prop2.bindBidirectional(prop1);


    System.out.println("prop1.isBound() = " + prop1.isBound());


    System.out.println("prop2.isBound() = " + prop2.isBound());


    System.out.println("Calling prop1.set(\"prop1 says: Hi!\")");


    prop1.set("prop1 says: Hi!");


    System.out.println("prop2.get() returned:");


    System.out.println(prop2.get());


    System.out.println("Calling prop2.set(prop2.get() + \"\\nprop2 says: Bye!\")");
    prop2.set(prop2.get() + "\nprop2 says: Bye!");


    System.out.println("prop1.get() returned:");


    System.out.println(prop1.get());


    }


    }


    In this example we created two SimpleStringProperty objects called prop1 and prop2,
    created a bidirectional binding between them, and then called set() and get()
    on both properties.


    When we run the program in Listing 4-2, the following output is printed to the
    console:


    Constructing two StringProperty objects.


    Calling bindBidirectional.


    prop1.isBound() = false


    prop2.isBound() = false


    Calling prop1.set("prop1 says: Hi!")


    prop2.get() returned:


    prop1 says: Hi!


    Calling prop2.set(prop2.get() + "\nprop2 says: Bye!")


    prop1.get() returned:


    prop1 says: Hi!


    prop2 says: Bye!


