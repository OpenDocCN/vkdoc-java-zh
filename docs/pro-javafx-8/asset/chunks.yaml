- fmt: "# The TranslateTransition Class\n\nThe `TranslateTransition` class, as do\
    \ all of the classes in Table [2-1](#index_split_000.html#p66) earlier, extends\
    \ the `javafx.animation.Transition` class, which in turn extends the `Animation`\
    \ class. Because the `Timeline` class extends the `Animation` class, as you can\
    \ see by comparing Listings 2-5 and 2-6, all of the code for the buttons in this\
    \ example is identical to that in the previous example. Indeed, the functionality\
    \ required to start, pause, resume, and stop an animation is defined on the `Animation`\
    \ class itself, and inherited by both the `Translation` classes as well as the\
    \ `Timeline` class.\n\n# The MetronomePathTransition Example\n\nAs shown in Table\
    \ [2-1](#index_split_000.html#p66) earlier, `PathTransition` is a transition class\
    \ that enables you to move a node along a defined geometric path. Figure [2-10](#index_split_000.html#p70)\
    \ shows a screenshot of a version of the metronome example, named `MetronomePathTransition`,\
    \ that demonstrates how to use the `PathTransition` class.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 34](index-70_1.jpg)\n\n**Figure 2-10.** The MetronomePathTransition\
    \ program\n\n## The Behavior of the MetronomePathTransition Program\n\nGo ahead\
    \ and run the program, performing once again the same steps that you did for the\
    \ `Metronome1` exercise.\n\nEverything should function the same as it did in the\
    \ `MetronomeTransition` example, except that the node is an ellipse instead of\
    \ a circle, and the node moves along the path of an arc.\n\n## Understanding the\
    \ MetronomePathTransition Program\n\nListing 2-7 contains code snippets from the\
