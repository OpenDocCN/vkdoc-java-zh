    JavaFX on Android


    The Android platform is Google’s operating system for mobile devices and tablets.
    It is expanding to more and more devices, ranging from wearable devices to televisions
    and car computers. Android is a Linux-based system, using the Dalvik VM. There
    are many similarities between the Dalvik VM and the Java VM, but they are not
    exactly the same.


    Most of the standard Java packages are also available in Dalvik, but not all of
    them.


    The JavaFX Android porting project is based on the OpenJFX project. The code and
    documentation for this project is available a[t http://bitbucket.org/javafxports/android](http://bitbucket.org/javafxports/android).


    Most of the native code required to build the JavaFX platform and to execute JavaFX
    Applications on the Android platform is available in the OpenJFX repository. The
    Java classes that are needed by the JavaFX Platform and that are not available
    in Dalvik are added in the JavaFX Android porting project.


    At the time of this writing, creating an Android application (or an APK bundle)
    is achieved using command-line tools that are provided by the JavaFX Android porting
    project.


    The following steps have to be performed:


    1\. Download and install the latest Android SDK, which can be found at


    [http://developer.android.com/sdk/index.html](http://developer.android.com/sdk/index.html).


    2\. Download the JavaFX Dalvik SDK. Make sure you have the latest version of the
    JavaFX


    Dalvik SDK, available at [https://bitbucket.org/javafxports/android/downloads](https://bitbucket.org/javafxports/android/downloads).


    3\. Create a regular JavaFX application. This can be any JavaFX application you
    also use for desktop purposes. However, at this moment the JavaFX Android project
    does not support


    Java 8 code.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 12 ■ JavaFX on embedded and mobile


    4\. Use the JavaFX Dalvik SDK to create a JavaFX-Dalvik project. The JavaFX Dalvik
    SDK


    contains a directory android-tools with a Gradle build script that requires some


    parameters and that will produce the Android Application Project directory.


    5\. Build the Android application. The Android Application Project directory contains
    an ant structure that allows us to build the Android application.


    6\. Install the application on an Android device, run it in an emulator, or submit
    it to the Play store.


    We demonstrate these steps next, again using the SimplePort application we introduced
    in the previous section.


    Building JavaFX Android applications is a bit different from building JavaFX iOS
    applications. However, the same source tree and even the same pom.xml file can
    be used as the starting point for both target environments. Because it is at this
    time not possible to use Java 8 APIs (e.g., Stream API) on top of Dalvik, we need
    to tell the Java compiler that we want to generate bytecode compatible with Java
    7\. The following additions to the pom.xml file will do this:


    <properties>


    <maven.compiler.source>1.7</maven.compiler.source>


    <maven.compiler.target>1.7</maven.compiler.target>


    </properties>


    The first step in the JavaFX Android build sequence is similar to building regular
    JavaFX desktop applications.


    You just create an application with JavaFX and Java code. As opposed to the RoboVM
    approach for generating iOS


    applications, no launcher class is created in the source code of the application.
    However, because meta-information is also required for creating Android applications,
    this implies that we need an additional step in the Android build sequence that
    is not needed in the iOS build sequence.


    The result of


    mvn clean install


    is a target directory containing


    simpleport-1.0-SNAPSHOT.jar


    In Step 4 of the sequence, we have to create a JavaFX Dalvik project using the
    Gradle build script provided with the javafx-dalvik SDK. The android-tools directory
    in the javafx-dalvik SDK contains a build.gradle file that requires a number of
    parameters. Typically, a build script is created that sets these parameters.


    The following build script will create the SimplePort Android project, based on
    the JavaFX application we created in the previous step.


    #!/bin/bash


    # this is an example script. Change the parameters according to your local setup


    export ANDROID_SDK=/opt/android-sdk


    export PATH=$ANDROID_SDK/tools:$PATH


    export CURRENT_DIR=`pwd`


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 183](index-545_1.jpg)


    Chapter 12 ■ JavaFX on embedded and mobile


    export WORKDIR=$CURRENT_DIR/work


    export APPDIR=/home/johan/javafx/ProJavaFX/projavafx8/ch12/SimplePort/target


    gradlew --info createProject -PDEBUG -PDIR=$WORKDIR -PPACKAGE=org.javafxports


    -P


    NAME=SimplePort -PANDROID_SDK=$ANDROID_SDK -PJFX_SDK=$CURRENT_DIR/../build/dalvik-sdk


    -PJFX_APP=$APPDIR -PJFX_MAIN=projavafx.SimplePort


    The result of executing this build script is the creation of a directory in the
    WORKDIR directory with the name SimplePort (the value of the NAME parameter).
    In this directory, the required Android project structure is created for you,
    along with a build.xml file allowing an ant task to create the package. To create
    an Android package, you have to change to the new directory and execute


    ant clean debug


    This will create a debug-version (not signed) of the Android application in the
    bin subdirectory of the directory.'
