    \ `MediaView`. There are only a few extra concepts that you need to know.\n\n\
    ## Controlling the Size of a MediaView\n\n`MediaView` is just another node in\
    \ the scene graph, so it is possible to scale its content using the usual transforms\
    \ or the `scaleX` and `scaleY` properties of the `Node` class. There are more\
    \ convenient ways to get the job done when dealing with `MediaViews`, however.\
    \ The properties `fitWidth` and `fitHeight` can be used to make the `MediaView`\
    \ stretch or shrink to the desired size. Using only one of them at a time will\
    \ make the `MediaView` scale only in that dimension while the size in the other\
    \ dimension remains unchanged.\n\nIf you want to maintain the movie’s original\
    \ aspect ratio as you scale it to fit your application, you can set the `preserveRatio`\
    \ property to `true`. If you specify a fit size in one dimension along with setting\
    \ `preserveRatio` to `true`, the other dimension will be automatically scaled\
    \ to match the movie’s original aspect ratio as it’s being fit along your specified\
    \ dimension. For example, let’s say our movie’s size is originally 640 × 352 pixels,\
    \ which gives an aspect ratio of 640 ÷ 352, or approximately 1.82. If you specify\
    \ a `fitWidth` of 400 and enable `preserveRatio`, the final height of the movie\
    \ will be changed from 352 pixels to 400 ÷ 1.82 = 220 pixels. Note that the aspect\
    \ ratio is preserved because 400 ÷ 220 is also 1.82.\n\nYou can also choose to\
