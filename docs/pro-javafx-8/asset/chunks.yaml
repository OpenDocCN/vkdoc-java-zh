    总结


    恭喜！在本章中，你学到了很多关于在 JavaFX 中创建 UI 的知识，包括以下内容。


    • 在 JavaFX 中创建 UI（我们大致以创作舞台剧为比喻），通常包括创建舞台、场景、节点、模型和事件处理器，并对部分节点进行动画处理

