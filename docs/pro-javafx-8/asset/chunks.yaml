    Converting AudioPlayer into a VideoPlayer


    Based on what you have learned so far, you might think that converting the AudioPlayer
    application to play video is a straightforward task, and you would be right. The
    first step is simply to rename the SongModel class to the more appropriate MediaModel.
    No code changes are required. Although movies do not typically contain metadata,
