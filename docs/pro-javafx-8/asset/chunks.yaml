- fmt: "# XML Processing in JavaFX\n\nThe XML format is widely used in the Java platform.\
    \ As a consequence, standardization of XML-based operations in Java happened years\
    \ ago. There are a number of XML tools built into the Java Platform, Standard\
    \ Edition, and we can use these APIs and tools in JavaFX without any external\
    \ dependency. In this section, we first use a DOM processor for parsing the XML\
    \ response that we artificially built. Next, we use the JAXB standard to automatically\
    \ obtain Java Objects.\n\nChanging our application from JSON input to XML input\
    \ requires only the `getObservableList` method to be changed. The new implementation\
    \ is shown in Listing 11-8.\n\n**Listing 11-8.** Obtaining Questions from the\
    \ XML-Based Response\n\n```\nObservableList<Question> getObservableList() throws\
    \ IOException, ParserConfigurationException, SAXException {\n\n    ObservableList<Question>\
    \ answer = FXCollections.observableArrayList();\n\n    InputStream inputStream\
    \ = this.getClass().getResourceAsStream(\"/stackoverflow.xml\");\n    DocumentBuilderFactory\
    \ dbf = DocumentBuilderFactory.newInstance();\n\n    DocumentBuilder db = dbf.newDocumentBuilder();\n\
    \n    Document doc = db.parse(inputStream);\n\n    NodeList questionNodes = doc.getElementsByTagName(\"\
    item\");\n\n    int count = questionNodes.getLength();\n\n    for (int i = 0;\
    \ i < count; i++) {\n\n        Question question = new Question();\n\n       \
    \ Element questionNode = (Element) questionNodes.item(i);\n\n        NodeList\
    \ childNodes = questionNode.getChildNodes();\n\n        int cnt2 = childNodes.getLength();\n\
    \n        for (int j = 0; j < cnt2; j++) {\n\n            Node me = childNodes.item(j);\n\
    \n            String nodeName = me.getNodeName();\n\n            if (\"creation_date\"\
    .equals(nodeName)) {\n\n                question.setTimestamp(Long.parseLong(me.getTextContent()));\n\
    \n            }\n\n            if (\"owner\".equals(nodeName)) {\n\n         \
    \       question.setOwner(me.getTextContent());\n\n            }\n\n         \
    \   if (\"title\".equals(nodeName)) {\n\n                question.setQuestion(me.getTextContent());\n\
    \n            }\n\n        }\n\n        answer.add(question);\n\n    }\n\n   \
    \ return answer;\n\n}\n```\n\nAgain, the goal of this section is not to give a\
    \ comprehensive overview of the DOM APIs. There are a large number of resources\
    \ available on the Internet that provide information about XML in general, or\
    \ DOM in particular.\n\nTo be able to compile the code in Listing 11-8, the following\
    \ import statements had to be added.\n\n```\nimport javax.xml.parsers.DocumentBuilder;\n\
    import javax.xml.parsers.DocumentBuilderFactory;\nimport javax.xml.parsers.ParserConfigurationException;\n\
    import org.w3c.dom.Document;\nimport org.w3c.dom.Node;\nimport org.w3c.dom.NodeList;\n\
    import org.xml.sax.SAXException;\n```\n\nBefore we go into detail about the code,\
    \ we show the output of this example in Figure 11-6.\n\n**Figure 11-6.** The result\
    \ of the question application using XML response\n\nThe code in Listing 11-8 shows\
    \ some similarities to the code in Listing 11-7. In both cases, we process data\
    \ available in a text format (JSON or XML) and convert the data into `Question`\
    \ instances. In Listing 11-8, the DOM approach is used to inspect the received\
    \ response.\n\nAn `org.w3c.dom.Document` instance is obtained using the following\
    \ code.\n\n```\nInputStream inputStream = this.getClass().getResourceAsStream(\"\
    /stackoverflow.xml\");\nDocumentBuilderFactory dbf = DocumentBuilderFactory.newInstance();\n\
    \nDocumentBuilder db = dbf.newDocumentBuilder();\n\nDocument doc = db.parse(inputStream);\n\
    ```\n\nIn this case, we create a `Document` based on an `InputStream`. The `InputStream`\
    \ is obtained from the artificially created file. We can also create an `InputStream`\
    \ from a `URLConnection`, and pass this `InputStream` to the `db.parse()` method.\
    \ Even easier, the `DocumentBuilder.parse` method also accepts a `String` parameter\
    \ that contains the URL of a (REST) endpoint.\n\nThis shows that although we are\
    \ using a static file containing questions in this case, we can easily use the\
    \ same code when using a real REST endpoint."
