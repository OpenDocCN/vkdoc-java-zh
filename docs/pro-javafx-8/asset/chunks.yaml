    that specifies the relative priority of your sound effects. The higher the number,
    the more importance you are assigning to that AudioClip. If you exceed the limit
    of AudioClip playbacks that the system can handle, the priorities are used to
    determine which clips are stopped. The number of clips that can be played is not
    specified precisely, nor can it be queried in the current version of JavaFX. Therefore,
    if you play a lot of AudioClips at once, as might be the case for a game, you
    should consider assigning priorities to your sound effects.


