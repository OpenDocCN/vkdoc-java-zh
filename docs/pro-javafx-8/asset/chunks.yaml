    Binding was the first technique described, and it is powerful enough to construct
    virtually any dynamic UI you can imagine. However, bind has two primary drawbacks:


    • *Complexity*. The more nodes in the UI, the more edges and constraints each
    one must adhere to to show up in the right location.


    • *Performance*. Although JavaFX is very efficient about how it evaluates bind
    statements, too many bound variables will result in reduced performance, and also
    display artifacts


    on resizing.


    That is where the built-in layouts, HBox, VBox, FlowPane, StackPane, TilePane,
    GridPane, and AnchorPane, come in.


    For the common case where a series of Nodes are stacked horizontally or vertically,
    using a box layout will result in less complex code than the equivalent bind.
    Also, unlike bind, layout containers are evaluated only once per display cycle,
    so you are guaranteed consistent performance regardless of the complexity of your
    UI.


