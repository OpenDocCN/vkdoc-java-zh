    \ {\n\n        // 使用 j 和 BAND_COUNT 计算一个介于 0 和 2*pi 之间的值\n        double theta\
    \ = (double)j / (double)(BAND_COUNT-1) * (2*Math.PI);\n\n        // cos 函数计算一个介于\
