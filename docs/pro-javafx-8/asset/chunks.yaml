    }


    }


    In this example, we added a color picker and two combo boxes to the bottom of
    the GUI, allowing you to change the material, drawMode, and cullFace properties
    in the model. The sphere is shown in the middle of the GUI. The sphere’s material,
    drawMode, and cullFace properties are bound to a similar property in model. Therefore
    the user’s choice is reflected in the sphere.


    When the program in Listing 10-2 is run, the Shape3D Properties Example window
    in Figure [10-2 is dis](#index_split_005.html#p436)played.


    A wireframe of the sphere is shown.


    ***Figure 10-2.** The Shape3DPropertiesExample program*


    Creating Predefined 3D Shapes


    The three predefined 3D shapes—Sphere, Cylinder, and Box—can be constructed and
    put into a JavaFX scene very easily, as we saw for the Sphere class in the last
    section. In this section, we describe these classes in more detail.


    The Sphere class has the following constructors:


    • Sphere()


    • Sphere(double radius)


    • Sphere(double radius, int divisions)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 10 ■ JavaFX 3D


    The default constructor creates a sphere of radius 1\. The one-parameter constructor
    creates a sphere with the specified radius. The two-parameter constructor creates
    a sphere with the specified radius and the number of division points to use along
    the equator of the sphere to approximate the sphere shape with a set of triangles.
    The greater the division, the smoother the resulting sphere is. The division number
    defaults to 64\. The center of newly constructed Spheres is always at the origin
    of the three-dimensional space (0, 0, 0).


    The radius of the sphere is available as a read-write double property. The divisions
    can only be set at construction time, and can be gotten using getDivisions().


    The Cylinder class has the following constructors:


    • Cylinder()


    • Cylinder(double radius, double height)


    • Cylinder(double radius, double height, int divisions)'
