    Composing a Layout Using BorderPane


    We have built up several elements of the Reversi UI, and now we need to tie them
    together into a single composition.


    In this section we demonstrate how you can use the BorderPane class to quickly
    put together other components in a common layout pattern. Unlike the layouts used
    earlier in this chapter, you should not modify the BorderPane’s list of children,
    but instead use the properties for each of the content areas listed in Table [5-6](#index_split_002.html#p205).


