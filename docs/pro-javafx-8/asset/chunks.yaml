- fmt: '查看`JavaFX API`文档中的`MouseEvent`类，你会发现其可用方法明显多于`KeyEvent`。与`KeyEvent`类似，`MouseEvent`拥有`isAltDown()`、`isControlDown()`、`isMetaDown()`和`isShiftDown()`方法，以及`source`字段（该字段是对事件源对象的引用）。


    此外，它还有几个用于精确定位鼠标事件发生坐标空间的方法，所有坐标均以像素为单位：


    - `getX()`和`getY()`返回鼠标事件相对于事件发生节点原点的水平和垂直位置。

    - `getSceneX()`和`getSceneY()`返回鼠标事件相对于场景（`Scene`）的水平和垂直位置。

    - `getScreenX()`和`getScreenY()`返回鼠标事件相对于屏幕的水平和垂直位置。


    以下是一些其他常用的方法：


    - `isDragDetect()`：如果检测到拖拽事件，则返回`true`。

    - `getButton()`、`isPrimaryButtonDown()`、`isSecondaryButtonDown()`、`isMiddleButtonDown()`和`getClickCount()`：包含关于点击了哪个按钮以及点击次数的信息。


    在本章稍后部分，你将通过`ZenPong`示例程序获得创建键盘和鼠标事件处理程序的经验。为了继续为`ZenPong`示例做准备，我们现在向你展示如何为场景中的节点添加动画效果。


