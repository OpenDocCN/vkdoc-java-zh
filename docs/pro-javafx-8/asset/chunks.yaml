    附带的 Nashorn JavaScript 引擎，必须在 FXML 文件的顶部包含以下处理指令：


    <?language javascript?>


    `fx:script` 元素用于引入脚本。支持内联脚本和外部文件脚本。


    以下是内联脚本：


