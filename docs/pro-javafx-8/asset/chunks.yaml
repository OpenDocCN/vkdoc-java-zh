  trans: '

    ScalaFX 提供了一种受 JavaFX Script 中相同语法启发的快捷语法，用于表达时间线。它允许你使用适合单行的快捷语法来指定持续时间、关键帧、关键值和补间。我们之前在“消失的圆圈”示例中使用了这种语法，来指定点击圆圈时使其缩小的动画：`Timeline(at
    (3 s) {radius -> 0}).play()`


    这段代码等价于以下使用 JavaFX 动画 API 编写的 Java 代码：


    ```java

    KeyValue collapse = new KeyValue(circle.radiusProperty(), 0);

    new Timeline(new KeyFrame(Duration.seconds(3), collapse)).play();

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 13 章 ■ JavaFX 语言与标记


    如你所见，即使在这个简单的示例中，ScalaFX 变体也更为简洁且可读性更强。ScalaFX 中动画的基本语法是：


    `at (duration) {[property -> value]}`


    该语句会转换为一个 `KeyFrame`，可以直接添加到 `Timeline` 中。你可以向 `Timeline` 传递多个 `KeyFrame`，或者在前述语法中使用多个
    `property->value` 对，从而灵活地指定任意复杂的动画。


    进一步分解这个示例，请注意我们使用了快捷语法来创建 `Duration` 和 `KeyValue`。对于前者，ScalaFX 有一个隐式转换，它为 `Double`
    类型添加了 `ms()`、`s()`、`m()` 和 `h()` 函数，允许你通过调用相应的函数来创建一个新的 `Duration`。通过使用 Scala
    中的后缀运算符快捷语法，而不是调用 `"3.s()"` 或 `"3.s"`，你可以进一步将其缩写为 `"3 s"`（其中 3 和 s 之间需要空格）。


    对于后者，ScalaFX 属性有一个重载的 `"->"` 运算符，它接受一个值并返回一个 `KeyValue` 对象。事实上，你不仅可以指定目标值，还可以像这样添加一个补间表达式：`radius
    -> 0 tween EASE_OUT`


    这种添加会使动画在接近结束时减速，从而实现更平滑的过渡。


    **总结**


    正如我们在本章中所示，除了使用 Java 语言之外，你还有更多编写 JavaFX 代码的选择。目前已有几种用流行的 JVM 语言（如 Groovy 和 Scala）编写的
    DSL 可用。


    很棒的一点是，你可以选择最适合项目需求的语言和标记。所有这些技术都能与用 Java 编写的 JavaFX 代码干净地集成，并且根据项目需求，你可以利用它们各自的好处。


