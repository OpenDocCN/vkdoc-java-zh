    \ so on.\n\nThe `getTexCoords()` method returns an `ObservableFloatArray`, which\
    \ you can use to add two-dimensional texture coordinates. This observable float\
    \ array’s size must be a multiple of 2, and the elements of the array are interpreted\
    \ as *u0*, *v0*, *u1*, *v1*, … , where ( *u0*, *v0*) is the first texture point,\
    \ ( *u1*, *v1*) is the second texture point, and so on.\n\nWe cover texture coordinates\
    \ in more detail in the materials section. For now it is sufficient to understand\
    \ the texture coordinates as points in a two-dimensional image with a top left\
    \ point that has coordinates (0, 0) and a bottom right point that has coordinates\
    \ (1, 1).\n\nThe `getFaces()` method returns an `ObservableFaceArray`, which you\
    \ can use to add faces to the 3D shape. The `ObservableFaceArray` is a subinterface\
