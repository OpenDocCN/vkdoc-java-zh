    \n3 来自维基共享资源的公共领域图片：[`commons.wikimedia.org/wiki/File:Image-Cavapoo_puppy.JPG`](http://commons.wikimedia.org/wiki/File:Image-Cavapoo_puppy.JPG)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 ■ JavaFX 语言与标记\n\n\
    Scala 与 JavaFX\n\nScala 是一种强大的 JVM 语言，它将函数式编程和面向对象编程的最佳特性融合于一身。与本章讨论的其他 JVM 语言一样，它直接将源文件编译为\
    \ Java 字节码，并且所有常用的现有 Java 语言库都与它兼容。此外，Scala 还增加了强大的类型安全集合、优雅的并发 Actor 模型，以及包括闭包、模式匹配和柯里化在内的函数式语言特性。\n\
    \nScala 由 Martin Odersky 于 2001 年在洛桑联邦理工学院 (EPFL) 创立，多年来不断成熟并日益流行。Odersky 实际上多年来一直是\
    \ Java 编译器幕后工作的天才，包括扩展了 Java 的 Pizza 语言以及 GJ，后者在 Sun 公司于 Java 1.3 中采用后，成为了现代 Java\
    \ 编译器的鼻祖。通过在 JVM 上开发一种全新的语言，Odersky 得以克服 Java 的若干固有设计限制。\n\n如今，Scala 被许多大型企业使用，例如\
    \ Twitter、LinkedIn、Foursquare 和 Morgan Stanley。此外，该语言的创建者还通过 Scala 语言公司 TypeSafe\
    \ 提供商业支持。而且，Scala 已被 Java 之父 James Gosling、Groovy 创建者 James Strachan 以及 JRuby\
    \ 核心开发者 Charles Nutter 等人誉为 Java 的继任者。有了 Scala 语言背后的所有这些支持，它也成为为 JavaFX 开发提供卓越\
    \ API 的绝佳候选！\n\n虽然你可以直接针对 JavaFX API 使用 Scala 进行编码，但最终结果看起来会与我们到目前为止编写的 Java 代码非常相似，并且无法充分利用该语言的优势。ScalaFX\
    \ 项目就是为了提供更符合 Scala 风格的 API 来进行 JavaFX 开发而启动的，我们在本书的所有示例中都使用了它。\n\nScalaFX 是一个开源项目，由本书作者之一\
    \ Stephen Chin 创建，并且有许多额外的贡献者帮助进行了库的设计和测试。它与本章前面描述的 GroovyFX 库非常相似，因为它也是一个开源库，构成了\
    \ JVM 语言与 JavaFX API 之间的桥梁。然而，ScalaFX 的不同之处在于它优先考虑类型安全和一致的语义，这符合 Scala 语言设计目标的精神。\n"
- fmt: "# ScalaFX 库简介\n\n`ScalaFX`库中的许多构造都受到了`JavaFX Script`语言的启发，该语言曾用于`JavaFX 2`之前的版本。因此，如果你熟悉`JavaFX\
    \ Script`，你会觉得其语法非常舒适。它利用了`Scala`中许多高级特性，但不会让最终用户为了构建漂亮的`UI`应用程序而被迫理解这些特性。\n\n\
    让你成为`Scala`专家超出了本书的范围，但我们会在`ScalaFX`代码中使用`Scala`特性时对其进行描述，因此对于已经精通`Java`的开发者来说，这也可以作为`Scala`的入门介绍。\n\
    \n## 开始使用 ScalaFX\n\n要编写你的第一个`ScalaFX`应用程序，你需要下载并安装`Scala`以及`ScalaFX`库。由于`ScalaFX`代码是用`Scala`语言编写的`DSL`，你可以使用任何支持`Scala`开发的`IDE`，例如`IntelliJ`、`Eclipse`或`NetBeans`，不过你可能想从`Scala\
    \ IDE for Eclipse`开始，因为这是`TypeSafe`的`Scala`语言团队支持的`IDE`。我们将在本章演示`Eclipse`环境的基本设置，尽管这些概念也适用于其他`IDE`。\n\
    \n首先，安装最新版本的`Eclipse`并启动它。从`Help`菜单中选择`Install New Software...`，然后将`Scala IDE`更新`URL`粘贴到`Work\
    \ with`字段中。你可以从他们的网站获取最新的`Scala IDE`更新`URL`：[http://scala-ide.org/download/current.html](http://scala-ide.org/download/current.html)。\n\
    \n这将允许你选择`Scala IDE for Eclipse`插件，如图`13-10`所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 194](index-567_1.jpg)\n\n**图 13-10.** 在`Eclipse`中安装`Scala IDE`\n\n继续向导，接受许可协议和默认设置。下载并安装插件并重启`Eclipse`后，你就可以开始`Scala`开发了。\n\
    \n首先，我们创建一个新的`Scala`项目。转到`File`菜单并选择`New ➤ Project...`，打开如图`13-11`所示的新建项目向导。从选项列表中选择`Scala\
    \ Wizards/Scala Project`，然后点击`Next`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 195](index-568_1.jpg)\n\n**图 13-11.** 在`Eclipse`中创建`Scala`项目\n\n我们将项目命名为`Hello\
    \ ScalaFX`，并使用默认项目设置。当被问及是否切换到`Scala`透视图时，选择`Yes`，你将进入编辑`Scala`代码的正确视图。\n\n除了标准项目设置外，我们还需要将`ScalaFX`和`JavaFX`库添加到代码中，以便使用此`DSL`。`ScalaFX`可以从`Google\
    \ Code`网站下载：[http://code.google.com/p/scalafx/](http://code.google.com/p/scalafx/)。\n\
    \n你已经安装了`JavaFX`库，作为`JavaFX`运行时和`SDK`的一部分。要安装`ScalaFX`，只需下载最新的`jar`发行版，并将其作为依赖库添加到你的项目中。最简单的方法如下：\n\
    \n1. 将`ScalaFX.jar`文件复制到项目根目录下的`lib`文件夹中。\n2. 右键单击你的项目，从上下文菜单中选择`Properties...`。\n\
    3. 导航到`Java Build Path`条目，选择`Libraries`选项卡，然后点击`Add Jars`。\n4. 选择你在步骤`1`中添加到项目的`ScalaFX.jar`文件。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 196](index-569_1.jpg)\n\
    \n步骤`2`到`4`如图`13-12`所示。\n\n**图 13-12.** 将`ScalaFX jar`文件添加到你的项目\n\n现在你已经准备好创建你的第一个`ScalaFX`应用程序了。首先，我们创建一个非常简单的`ScalaFX`应用程序，它显示一个包含单个`Label`的`Stage`和`Scene`。这是`JavaFX`应用程序的`Hello\
    \ World`，它将确保你所有的项目设置都正确，并且你已经准备好构建更大的应用程序。\n\n要创建一个新的`ScalaFX`类，请从`File`菜单中选择`New\
    \ ➤ Scala Object`。这将打开一个向导，你可以在其中将类名设置为`HelloScalaFX`，并选择它应继承的`scalafx.application.JFXApp`类。完成向导后，`Eclipse`将为你创建一个存根类。\n\
    \n要完成这个示例，你需要向应用程序添加一个`Stage`、`Scene`和`Label`。完整的`Hello ScalaFX`应用程序代码如清单`13-10`所示。\n\
    \n**清单 13-10.** 用于测试你新创建项目的`Hello ScalaFX`应用程序\n\n```\nimport scalafx.application.JFXApp\n\
    import scalafx.application.JFXApp.PrimaryStage\nimport scalafx.scene.Scene\nimport\
    \ scalafx.scene.control.Label\n\nobject HelloScalaFX extends JFXApp {\n  stage\
    \ = new PrimaryStage {\n    scene = new Scene {\n      content = new Label {\n\
    \        text = \"Hello ScalaFX\"\n      }\n    }\n  }\n}\n```\n\n你可能注意到与`Java`代码的一些明显区别。在`Scala`中，如果换行符可以表示语句结束，则分号几乎总是可选的。这就是为什么在`import`语句或对`text`的赋值中没有分号的原因。此外，`Scala`既有类也有对象，两者或其中之一可以在给定文件中定义。在这个例子中，我们创建了一个继承自`scalafx.application.JFXApp`的对象，它既定义了我们的应用程序，又一步启动了它。\n\
    \n创建一个继承自`scalafx.application.JFXApp`的对象是使用`ScalaFX`构建`JavaFX`应用程序的基本模式。这个基类拥有实例化`JavaFX`应用程序所需的所有核心功能，使你免于通常所需的样板代码。你只需处理所需的初始化工作，并用你自己的`ScalaFX`舞台对象覆盖`stage`变量。\n\
    \n`PrimaryStage`、`Scene`和`Label`也遵循相同的模式，它们都是`ScalaFX`对象，具有对应`JavaFX`类中每个可用`JavaFX`属性的属性。如果你注意到导入语句，我们实际上并没有引用`JavaFX`类，而是使用一组并行的`ScalaFX`类中的代理类。\n\
    \n这些代理类可以使用`Scala`中称为隐式转换的特性与等效的`JavaFX`类互换，但具有支持这种嵌套对象字面量语法的额外功能。\n\n要运行此应用程序，请右键单击该文件并选择`Run\
    \ As ➤ Scala Application`。执行时，此应用程序会打开一个窗口，显示`Hello ScalaFX`字样，如图`13-13`所示。\n\n\
    **图 13-13.** 从`Eclipse`启动的`Hello ScalaFX`应用程序\n\n恭喜！你已经成功运行了你的第一个`ScalaFX`应用程序。我们现在将进一步深入探讨`ScalaFX`的设计和特性，向你展示如何在`Scala`中构建更复杂的`JavaFX`应用程序。\n\
    \n## ScalaFX 代理和隐式转换\n\n对于几乎每个`JavaFX API`类，都有一个等效的`ScalaFX`代理类。`ScalaFX`代理类位于一个并行的包结构中，其中`javafx`被替换为`scalafx`，并在`JavaFX\
    \ API`之上提供了额外的功能。每个代理类都包含以下一项或多项内容：\n\n- **委托对象**：每个代理都包含一个对它所扩展和包装的`JavaFX`类的引用。\n\
    - **属性别名**：对于所有属性，你可以直接以`foo`的形式访问它们，而不是以`fooProperty`的形式引用。\n- **属性赋值**：为了支持类似对象字面量的语法，赋值运算符被重载，允许你直接设置可写属性。"
  raw: 'Many of the constructs in the ScalaFX library were inspired by the JavaFX
    Script language that was used in JavaFX releases prior to 2, so for those of you
    familiar with JavaFX Script, the syntax will feel quite comfortable. It takes
    advantage of many of the advanced features available in Scala, but does not expose
    or burden the end user with understanding these to build great-looking UI applications.


    Making you an expert Scala developer is beyond the scope of this book, but we
    do describe the Scala features as we use them in our ScalaFX code, so this should
    also serve as a gentle introduction to Scala for anyone who is already a proficient
    Java developer.


    Getting Started with ScalaFX


    To write your first ScalaFX application you need to download and install Scala
    as well as the ScalaFX library Because ScalaFX code is a DSL written in the Scala
    language, you can use any IDE that supports Scala development, such as IntelliJ,
    Eclipse, or NetBeans, although you might want to start with the Scala IDE for
    Eclipse because that is the one supported by the Scala language team at TypeSafe.
    We demonstrate the basic setup of an Eclipse environment for ScalaFX in this chapter,
    although the concepts apply to other IDEs as well.


    To start, install the latest version of Eclipse and launch it. From the Help menu
    choose Install New Software . . .


    and paste the Scala IDE update URL into the Work with field. You can get the latest
    updated URL for Scala IDE from their web site a[t http://scala-ide.org/download/current.html.](http://scala-ide.org/download/current.html)


    This lets you select the Scala IDE for the Eclipse plug-in as shown in Figure
    [13-10.](#index_split_007.html#p567)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 194](index-567_1.jpg)


    Chapter 13 ■ JavaFX Languages and Markup


    ***Figure 13-10.** Scala IDE installation in Eclipse*


    Continue with the wizard, accepting the license agreement and default settings.
    After downloading and installing the plug-in and restarting Eclipse, you will
    be ready to begin Scala development.


    To start with, we create a new Scala project. Go to the File menu and choose New
    ➤ Project . . . to open the New Project Wizard shown in Figure [13-11\. C](#index_split_007.html#p568)hoose
    Scala Wizards/Scala Project from the list of choices and click Next.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 195](index-568_1.jpg)


    Chapter 13 ■ JavaFX Languages and Markup


    ***Figure 13-11.** Scala project creation in Eclipse*


    We name our project Hello ScalaFX and use the default project settings. When asked
    to switch to the Scala Perspective, choose Yes and you will be in the proper view
    for editing Scala code.


    In addition to the standard project setup, we also need to add in the ScalaFX
    and JavaFX libraries to code using this DSL. ScalaFX can be downloaded from the
    Google Code web site here a[t http://code.google.com/p/scalafx/](http://code.google.com/p/scalafx/).


    You already have the JavaFX libraries installed as part of the JavaFX runtime
    and SDK. To install ScalaFX, simply download the latest distribution as a jar
    and add it to your project as a dependent library. The easiest way to do this
    is as follows.


    1\. Copy the ScalaFX.jar file to a lib folder under your project root.


    2\. Right-click your project and choose Properties . . . from the context menu.


    3\. Navigate to the Java Build Path entry, select the Libraries tab, and click
    Add Jars.


    4\. Select the ScalaFX.jar file you added to your project in Step 1.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 196](index-569_1.jpg)


    Chapter 13 ■ JavaFX Languages and Markup


    Steps 2 through 4 are illustrated in Figure [13-12](#index_split_007.html#p569).


    ***Figure 13-12.** Adding the ScalaFX jar file to your project*


    Now you are ready to create your first ScalaFX application. To start, we create
    a very simple ScalaFX application that shows a Stage and Scene with a single Label
    inside it. This is the Hello World of JavaFX applications, and will ensure that
    all your project settings are correct and you are ready to build larger applications.


    To create a new ScalaFX class, choose New ➤ Scala Object from the File menu. This
    opens a wizard in which you can set the name of your class to HelloScalaFX and
    select the scalafx.application.JFXApp class from which it should extend. On completing
    the wizard, Eclipse will create a stub class for you.


    To complete the example, you need to add a Stage, Scene, and Label to your application.
    The full code for the Hello ScalaFX application is shown in Listing 13-10.


    ***Listing 13-10.*** Hello ScalaFX Application to Test Your Newly Created Project
    import scalafx.application.JFXApp


    import scalafx.application.JFXApp.PrimaryStage


    import scalafx.scene.Scene


    import scalafx.scene.control.Label


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 197](index-570_1.jpg)


    Chapter 13 ■ JavaFX Languages and Markup


    object HelloScalaFX extends JFXApp {


    stage = new PrimaryStage {


    scene = new Scene {


    content = new Label {


    text = "Hello ScalaFX"


    }


    }


    }


    }


    You probably noticed some obvious differences from Java code. In Scala, semicolons
    are almost always optional where a line break would otherwise indicate that a
    statement has ended. This is why there is no semicolon on the import statements
    or the assignment to text. Also, Scala has both classes and objects, either or
    both of which can be defined in a given file. In this case we are creating an
    object that subclasses scalafx.application.JFXApp, which serves as a way of both
    defining our application and launching it in one step.


    Creating an Object that extends scalafx.application.JFXApp is the fundamental
    pattern for building JavaFX


    applications using ScalaFX. This base class has all the core functionality to
    instantiate a JavaFX application, freeing you from the usual boilerplate required.
    All you have to do is take care of whatever initialization you need and override
    the stage variable with your own ScalaFX stage object.


    This same pattern is followed for the PrimaryStage, Scene, and Label, all of which
    are ScalaFX objects that have properties on them for each of the available JavaFX
    properties of the same class. If you notice from the imports, we are not actually
    referring to JavaFX classes, but instead working with proxy classes in a parallel
    set of ScalaFX classes.


    These proxies are interchangeable with the equivalent JavaFX classes using a feature
    in Scala called implicits, but have additional functionality that supports this
    nested object-literal-like syntax.


    To run this application, right-click the file and choose Run As ➤ Scala Application.
    On execution, this application opens a window with the words Hello ScalaFX as
    shown in Figure [13-13.](#index_split_007.html#p570)


    ***Figure 13-13.** Hello ScalaFX application launched from Eclipse*


    Congratulations! You have successfully run your first ScalaFX application. We
    now dig more into the design and features of ScalaFX, showing you how you can
    build more complex JavaFX applications in Scala.


    ScalaFX Proxies and Implicit Conversions


    For almost every JavaFX API class, there is an equivalent ScalaFX proxy class.
    The ScalaFX proxy classes are in a parallel package structure where javafx is
    replaced by scalafx and provides additional functionality on top of the JavaFX
    APIs. The proxy classes each include one or more of the following.


    • *Delegate object*: Each proxy contains a reference back to the JavaFX class
    that it extends and wraps.


    • *Property aliases*: For all properties, rather than referring to them as fooProperty,
    you can instead directly access them as foo.


    • *Property assignment*: To support an object-literal-like syntax, the assignment
    operator is overloaded to allow you to set writeable properties directly.'
