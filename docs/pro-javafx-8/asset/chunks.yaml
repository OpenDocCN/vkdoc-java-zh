- fmt: "`Binding` in JavaFX is an extremely powerful feature, but the API-based syntax\
    \ introduced in JavaFX 2 can often get in the way of understanding what the bind\
    \ code is doing. GroovyFX solves this problem by taking advantage of the operator\
    \ overloading feature of the Groovy language to provide an infix notation for\
    \ common bind expressions.\n\nFor example, to bind one rectangle’s width to the\
    \ width of a second rectangle, you can write the following code in GroovyFX:\n\
    \n`rect1.widthProperty.bind(rect2.widthProperty)`\n\nThere is also an alternate\
    \ version of the same code that you can use instead:\n\n`rect1.widthProperty.bind(rect2,\
    \ 'width')`\n\nHowever, the real power of GroovyFX binding comes into play when\
    \ you are combining multiple properties in a bind statement. As a second example,\
    \ let’s say that you want to bind one rectangle’s width to the sum of two others.\n\
    \nIn GroovyFX you can write the following code:\n\n`rect1.widthProperty.bind(rect2.widthProperty\
    \ + rect3.widthProperty)`\n\nThis would translate to the following, much longer,\
    \ JavaFX Java code:\n\n`rect1.getWidthProperty().bind(rect2.getWidthProperty().add(rect3.getWidthProperty()));`\n\
    \nThe GroovyFX distribution comes with an example of some binding code to animate\
    \ the hands of an analog clock. This example was written by Jim Clark, and the\
    \ relevant code showing properties and binding is shown in Listing 13-7.\n\n**Listing\
    \ 13-7.** Analog Clock Excerpt from the GroovyFX Demo Package\n\n```\n@FXBindable\n\
    class Time {\n    Integer hours\n    Integer minutes\n    Integer seconds\n  \
    \  Double hourAngle\n    Double minuteAngle\n    Double secondAngle\n    public\
    \ Time() {\n        // bind the angle properties to the clock time\n        hourAngleProperty.bind((hoursProperty\
    \ * 30.0) + (minutesProperty * 0.5))\n        minuteAngleProperty.bind(minutesProperty\
    \ * 6.0)\n        secondAngleProperty.bind(secondsProperty * 6.0)\n        ...\n\
    \    }\n}\n```\n\nThe combination of automatic properties expansion via AST transforms\
    \ and infix notation binding lets you express fairly complex logic without much\
    \ code. The resulting Groovy analog clock graphic UI that you get when running\
    \ the example is shown in Figure 13-7.\n\n**Figure 13-7.** Groovy analog clock\
    \ demo\n\n## GroovyFX API Enhancements\n\nIn addition to the core language benefits\
    \ of using Groovy instead of JavaFX, GroovyFX has taken many of the JavaFX APIs\
    \ and Groovy-ized them to make them easier to use from a dynamic language. We\
    \ cover three major ones in this section: the GroovyFX custom DSL for animation,\
    \ a simplified table construction pattern, and streamlined JavaFX layouts. All\
    \ of these provide significant benefits over the core JavaFX APIs, allowing you\
    \ to write less code and do more.\n\n### Animation\n\nGroovyFX supports building\
    \ animations using a special DSL that has syntax for creating `Duration`s, `KeyFrame`s,\
    \ and `KeyValue`s, all with a concise syntax. We showed an example of the Groovy\
    \ animation syntax earlier in the Vanishing Circles application, which looked\
    \ like this:\n\n```\ntimeline {\n    at(3.s) { change e.source.radiusProperty()\
    \ to 0 }\n}.play()\n```\n\nThe basic pattern is as follows, where you can have\
    \ multiple `at` expressions in a `timeline` and multiple `change` expressions\
    \ within an `at`.\n\n```\ntimeline {\n    at(duration) {\n        [change property\
    \ to value]\n    }\n}\n```\n\nSimilar to binding, there is also a second format\
    \ for referring to the property that makes up the `change` expression:\n\n```\n\
    timeline {\n    at(3.s) { change(e.source, 'radius') to 0 }\n}.play()\n```\n\n\
    The syntax also supports an optional `tween` that lets you provide a curve for\
    \ the speed at which the animation proceeds:\n\n```\ntimeline {\n    at(3.s) {\
    \ change e.source.radiusProperty() to 0 tween ease_both }\n}.play()\n```\n\nWith\
    \ the preceding change, the animation would start out slow and speed up to its\
    \ normal rate, and then slow down at the end the same way.\n\nCompared to the\
    \ full Java code, the Groovy animation syntax is a huge savings in characters\
    \ and makes it much easier to see what your animation is actually doing."
  raw: 'Binding in JavaFX is an extremely powerful feature, but the API-based syntax
    introduced in JavaFX 2 can often get in the way of understanding what the bind
    code is doing. GroovyFX solves this problem by taking advantage of the operator
    overloading feature of the Groovy language to provide an infix notation for common
    bind expressions.


    For example, to bind one rectangle’s width to the width of a second rectangle,
    you can write the following code in GroovyFX:


    rect1.widthProperty.bind(rect2.widthProperty)


    There is also an alternate version of the same code that you can use instead:


    rect1.widthProperty.bind(rect2, ''width'')


    However, the real power of GroovyFX binding comes into play when you are combining
    multiple properties in a bind statement. As a second example, let’s say that you
    want to bind one rectangle’s width to the sum of two others.


    In GroovyFX you can write the following code:


    rect1.widthProperty.bind(rect2.widthProperty + rect3.widthProperty)


    This would translate to the following, much longer, JavaFX Java code:


    rect1.getWidthProperty().bind(rect2.getWidthProperty().add(rect3.getWidthProperty()));


    The GroovyFX distribution comes with an example of some binding code to animate
    the hands of an analog clock. This example was written by Jim Clark, and the relevant
    code showing properties and binding is shown in Listing 13-7.


    ***Listing 13-7.*** Analog Clock Excerpt from the GroovyFX Demo Package


    @FXBindable


    class Time {


    Integer hours


    Integer minutes


    Integer seconds


    Double hourAngle


    Double minuteAngle


    Double secondAngle


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 191](index-561_1.jpg)


    Chapter 13 ■ JavaFX Languages and Markup


    public Time() {


    // bind the angle properties to the clock time


    hourAngleProperty.bind((hoursProperty * 30.0) + (minutesProperty * 0.5))


    minuteAngleProperty.bind(minutesProperty * 6.0)


    secondAngleProperty.bind(secondsProperty * 6.0)


    ...


    }


    The combination of automatic properties expansion via AST transforms and infix
    notation binding lets you express fairly complex logic without much code. The
    resulting Groovy analog clock graphic UI that you get when running the example
    is shown in Figure [13-7.](#index_split_007.html#p561)


    ***Figure 13-7.** Groovy analog clock demo*


    GroovyFX API Enhancements


    In addition to the core language benefits of using Groovy instead of JavaFX, GroovyFX
    has taken many of the JavaFX


    APIs and Groovy-ized them to make them easier to use from a dynamic language.
    We cover three major ones in this section: the GroovyFX custom DSL for animation,
    a simplified table construction pattern, and streamlined JavaFX


    layouts. All of these provide significant benefits over the core JavaFX APIs,
    allowing you to write less code and do more.


    Animation


    GroovyFX supports building animations using a special DSL that has syntax for
    creating Durations, KeyFrames, and KeyValues, all with a concise syntax. We showed
    an example of the Groovy animation syntax earlier in the Vanishing Circles application,
    which looked like this:


    timeline {


    at(3.s) { change e.source.radiusProperty() to 0 }


    }.play()


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 13 ■ JavaFX Languages and Markup


    The basic pattern is as follows, where you can have multiple at expressions in
    a timeline and multiple change expressions within an at.


    timeline {


    at(duration) {


    [change property to value]


    }


    }


    Similar to binding, there is also a second format for referring to the property
    that makes up the change expression: timeline {


    at(3.s) { change(e.source, ''radius'') to 0 }


    }.play()


    The syntax also supports an optional tween that lets you provide a curve for the
    speed at which the animation proceeds:


    timeline {


    at(3.s) { change e.source.radiusProperty() to 0 tween ease_both }


    }.play()


    With the preceding change, the animation would start out slow and speed up to
    its normal rate, and then slow down at the end the same way.


    Compared to the full Java code, the Groovy animation syntax is a huge savings
    in characters and makes it much easier to see what your animation is actually
    doing.'
  trans: '

    JavaFX 中的绑定是一项极其强大的功能，但 JavaFX 2 引入的基于 API 的语法常常会妨碍理解绑定代码的实际作用。GroovyFX 通过利用 Groovy
    语言的运算符重载特性，为常见的绑定表达式提供了中缀表示法，从而解决了这个问题。


    例如，要将一个矩形的宽度绑定到另一个矩形的宽度，你可以在 GroovyFX 中编写如下代码：


    rect1.widthProperty.bind(rect2.widthProperty)


    此外，还有另一种等效的代码写法可供使用：


    rect1.widthProperty.bind(rect2, ''width'')


    然而，GroovyFX 绑定的真正威力体现在将多个属性组合到一个绑定语句中时。再举一个例子，假设你想将一个矩形的宽度绑定到另外两个矩形的宽度之和。


    在 GroovyFX 中，你可以编写如下代码：


    rect1.widthProperty.bind(rect2.widthProperty + rect3.widthProperty)


    这将会转换为下面这段长得多的 JavaFX Java 代码：


    rect1.getWidthProperty().bind(rect2.getWidthProperty().add(rect3.getWidthProperty()));


    GroovyFX 发行版附带了一个绑定代码示例，用于制作模拟时钟的指针动画。该示例由 Jim Clark 编写，其中展示属性和绑定的相关代码如清单 13-7
    所示。


    ***清单 13-7.*** GroovyFX 演示包中的模拟时钟节选


    @FXBindable


    class Time {


    Integer hours


    Integer minutes


    Integer seconds


    Double hourAngle


    Double minuteAngle


    Double secondAngle


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 191](img/index-561_1.jpg)


    第 13 章 ■ JavaFX 语言与标记


    public Time() {


    // 将角度属性绑定到时钟时间


    hourAngleProperty.bind((hoursProperty * 30.0) + (minutesProperty * 0.5))


    minuteAngleProperty.bind(minutesProperty * 6.0)


    secondAngleProperty.bind(secondsProperty * 6.0)


    ...


    }


    通过 AST 转换实现的自动属性扩展与中缀表示法绑定的结合，让你无需编写大量代码就能表达相当复杂的逻辑。运行该示例后得到的 Groovy 模拟时钟图形用户界面如图
    13-7 所示。


    ***图 13-7.** Groovy 模拟时钟演示*


    GroovyFX API 增强功能


    除了使用 Groovy 替代 JavaFX 带来的核心语言优势外，GroovyFX 还对许多 JavaFX API 进行了 Groovy 化改造，使其在动态语言中更易于使用。本节我们将介绍三个主要方面：用于动画的
    GroovyFX 自定义 DSL、简化的表格构建模式以及精简的 JavaFX 布局。与核心 JavaFX API 相比，所有这些都带来了显著优势，让你能够编写更少的代码，完成更多的工作。


    动画


    GroovyFX 支持使用一种特殊的 DSL 来构建动画，该 DSL 拥有创建 Duration、KeyFrame 和 KeyValue 的语法，且所有语法都简洁明了。我们之前在“消失的圆圈”应用程序中展示过一个
    Groovy 动画语法示例，如下所示：


    timeline {


    at(3.s) { change e.source.radiusProperty() to 0 }


    }.play()


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 13 章 ■ JavaFX 语言与标记


    基本模式如下，你可以在一个时间线（timeline）中包含多个 at 表达式，并在一个 at 中包含多个 change 表达式。


    timeline {


    at(duration) {


    [change property to value]


    }


    }


    与绑定类似，还有第二种格式用于引用构成 change 表达式的属性：


    timeline {


    at(3.s) { change(e.source, ''radius'') to 0 }


    }.play()


    该语法还支持一个可选的 tween，让你可以为动画进行的速度提供一条曲线：


    timeline {


    at(3.s) { change e.source.radiusProperty() to 0 tween ease_both }


    }.play()


    通过上述更改，动画将开始缓慢，然后加速到正常速度，最后再以同样的方式减速。


    与完整的 Java 代码相比，Groovy 动画语法在字符数上节省了大量篇幅，并且让你更容易看清动画的实际效果。

