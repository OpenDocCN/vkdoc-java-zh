    Using the StackExchange API


    The Stack Exchange Network ([http://stackexchange.com) allo](http://stackexchange.com/)ws
    third-party developers to browse and access questions and answers using a REST-based
    interface. StackExchange maintains a number of REST-based APIs, but for our examples
    we limit ourselves to the Search API. Detailed information on the Search API is
    obtained from


    [http://api.stackexchange.com/docs.](http://api.stackexchange.com/docs)


    The resource URL—the endpoint for the REST service—is very simple:


    [http://api.stackexchange.com/2.2/search](http://api.stackexchange.com/2.2/search)


