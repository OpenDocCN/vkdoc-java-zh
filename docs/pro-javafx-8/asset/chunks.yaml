    lambda expression is called on the JavaFX application thread. Inside the run body
    of the lambda expression we get the currentTime from the MediaPlayer and pass
    it as a parameter to the updatePositionSlider method. The updatePositionSlider
    method, also shown in Listing 9-19, first checks to see if the positionSlider’s
    value is currently changing and, if so, returns without doing anything. We do
    this to make sure we don’t change the slider’s position while the user is currently
    dragging it. Doing so would make the slider’s thumb bar flicker back and forth
    between the drag position and the position indicated by the currentTime value.
    Needless to say, this is an unwanted effect that we are careful to avoid. If the
    user is not currently changing the position slider’s value, we are free to update
    it based on the value of currentTime and totalDuration. The position slider is
    created with minimum and maximum values of 0.0 and 1.0\. The currentTime value
    is therefore divided by the media’s totalDuration to calculate the correct value
    for the slider. If either totalDuration or currentValue is null, the slider is
    simply positioned at 0.


    You probably noticed that the CurrentTimeListener also formats the value of currentTime
    and displays it as the text of the currentTimeLabel. If you refer back to Figure
