    Chapter 10 ■ JavaFX 3D


    You can test if the system supports the JavaFX 3D graphics API using the Platform.isSupported()
    method for ConditionalFeature.SCENE3D:


    boolean supported = Platform.isSupported(ConditionalFeature.SCENE3D);


    The rest of the examples in this chapter will work only if this test results in
    true.


    As our first foray into the JavaFX 3D world, we consider a first JavaFX 3D example
    in Listing 10-1.


    ***Listing 10-1.*** First3DExample.java


    import javafx.application.Application;


    import javafx.scene.Group;


    import javafx.scene.Scene;


    import javafx.scene.shape.Sphere;


    import javafx.stage.Stage;


    public class First3DExample extends Application {


    @Override


    public void start(Stage stage) throws Exception {


    stage.setTitle("First 3D Example");


    stage.setScene(makeScene());


    stage.show();


    }


    private Scene makeScene() {


    **Sphere sphere = new Sphere(100);**


    Group root = new Group(sphere);


    root.setTranslateX(320);


    root.setTranslateY(240);


    Scene scene = new Scene(root, 640, 480);


    return scene;


    }


    public static void main(String[] args) {


    launch(args);


    }


    }


    Although the only 3D element in this very simple program is the Sphere class,
    which represents a sphere in the three-dimensional space, its presence in the
    scene triggers several responses from the JavaFX runtime system. It adds a camera
    and a light to the scene. It also gives the sphere a material quality. The camera,
    the light, the 3D object, and the material quality of the 3D object are the basic
    ingredients of a *3D model*. They work together to bring the 3D


    model to our two-dimensional screen.


    When the program in Listing 10-1 is run, the First 3D Example window in Figure
    [10-1](#index_split_005.html#p431) is displayed.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 146](index-431_1.jpg)


    Chapter 10 ■ JavaFX 3D


    ***Figure 10-1.** The First3DExample program*


    3D objects, lights, and cameras live in a three-dimensional space in which every
    point is represented by a tuple of three floating point numbers ( *x*, *y*, *z*).
    The three-dimensional space is right-handed, which means if you stretch out the
    first three fingers of your right hand so that the thumb points to the positive
    *x* direction and the index finger points to the positive *y* direction, then
    the third finger points to the positive *z* direction.


    The sphere we created in the program is centered at the origin (0, 0, 0) and has
    a radius of 100\. The camera that the JavaFX runtime system added for us is a
    parallel camera located in negative *z* axis looking into the *xy* plane in such
    a way that the positive *x* direction points to the right; consequently the positive
    *y* direction points down and the positive *z* direction points into the screen.
    The light that the JavaFX runtime system added for us is at the same location
    as the camera, and it radiates light equally in all directions.


    What is shown in the First 3D Example window is a two-dimensional representation
    of the 3D model. Not everything in the 3D model is shown in the window. For example,
    the back side of the sphere is not visible. Any part of the 3D model that lies
    outside the scene’s bounds is also not visible. The process of determining what
    is shown in the two-dimensional representation is called *rendering*.


    In this rendered scene, the top left corner has (0, 0) as its *xy* coordinates,
    and the bottom right corner has (640, 480) as its *xy* coordinates. To have the
    sphere appear in the middle of the screen, we translated the container root by
    half the screen width in the *x* direction, and by half the screen height in the
    *y* direction. Notice that the sphere seems to be illuminated from a light source
    located at (0, 0, *z*) for some negative *z*.


    To get a sense of how the coordinate system is oriented in this 3D scene with
    default camera and light, we can animate the position of the sphere in the *x*
    direction by introducing a field:


    DoubleProperty translateX = new SimpleDoubleProperty();


    Bind the translateX property of the sphere to it after we create the sphere:


    sphere.translateXProperty().bind(translateX);


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 10 ■ JavaFX 3D


    Call the following animate() method after the stage is shown:


    private void animate() {


    Timeline timeline = new Timeline(


    new KeyFrame(Duration.seconds(0), new KeyValue(translateX, -320)),


    new KeyFrame(Duration.seconds(2), new KeyValue(translateX, 320)));


    timeline.setCycleCount(Animation.INDEFINITE);


    timeline.play();


    }


    When the First3DExample program is run with the preceding animation, you see the
    sphere move from the left side of the window to the right side of the window,
    confirming that the *x* coordinate increases from left to right. In the same manner,
    you can run the program with the sphere’s translateY property animated from –240
    to 240, and see the sphere move from the top of the window to the bottom of the
    window, confirming that the *y* coordinate increases from top to bottom. In both
    animations, the highlight of the sphere changes as the sphere moves across the
    screen in a way that is consistent with the light being at the center of the window.
    In theory, you can try to run the program with the sphere’s translateZ being animated
    from –500 to 500\. However, because the default camera is a parallel camera, even
    though the sphere is indeed moving from negative *z* coordinate to positive *z*
    coordinate, the sphere remains the same size. You can only discern the movement
    of the sphere by the way its highlight changes. Another phenomenon that can be
    observed when the translateZ of the sphere is animated is that the sphere is not
    visible for the two extremes of the *z* coordinate range.


    Finally, turn your attention to the color of the sphere. In our program, we did
    not specify the material of the sphere. What you see is the result of the JavaFX
    runtime system giving the sphere a default material.


    In the next few sections, we will teach you all about the 3D objects, cameras,
    lights, and materials that are available in the JavaFX 3D graphics API.


    Understanding JavaFX 3D Objects


    The JavaFX 3D graphics API provides several Nodes that represent 3D objects. These
    classes reside in the javafx.


    scene.shape package, along with their 2D siblings. There is a common base class
    Shape3D, and four concrete subclasses: Sphere, Box, Cylinder, and MeshView. The
    Sphere, Box, and Cylinder are predefined 3D shapes, also called 3D primitives.
    The MeshView is a user-defined shape.


    Understanding the Shape3D Base Class


    The Shape3D class is a subclass of Node. It includes the following public methods:


    • void setMaterial(Material)


    • Material getMaterial()


    • ObjectProperty<Material> materialProperty()


    • void setDrawMode(DrawMode)


    • DrawMode getDrawMode()


    • ObjectProperty<DrawMode> drawModeProperty()


    • void setCullFace(CullFace)


    • CullFace getCullFace()


    • ObjectProperty<CullFace> cullFaceProperty()


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 10 ■ JavaFX 3D


    They define three read-write object properties: material, drawMode, and cullFace.
    They control the surface material, the drawing mode, and the face culling setting
    for the Shape3D. The object type of the material property is the class javafx.scene.paint.Material.
    The type of the drawMode property is the enum


    javafx.scene.shape.DrawMode. The type of the cullFace property is the enum javafx.scene.shape.CullFace.'
