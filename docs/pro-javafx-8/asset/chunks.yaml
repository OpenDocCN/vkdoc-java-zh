    最后，如果不举一个双向绑定的例子，关于绑定的讨论就不算完整。这在 ScalaFX 中同样简单，可以通过对绑定操作符稍作变体来实现，如下例所示。


    `textField.text <==> model.name`


    这在模型中的 `name` 属性和一个 `TextField` 之间创建了一个双向绑定，这样如果用户编辑了文本字段，模型对象也会自动更新。


