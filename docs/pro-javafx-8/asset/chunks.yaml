    ## Understanding the Canvas and Image Ops APIs


    The Canvas and Image Ops APIs allow you to manipulate the 2D graphical content
    of an on-screen canvas or an off-screen image.


    ### Understanding the Canvas API


    The Canvas API consists of two public classes, `Canvas` and `GraphicsContext`
    in the `javafx.scene.canvas` package.


    `Canvas` is a `Node` that can be added to a `Scene`.


    The `Canvas` class includes two public constructors:


    - `Canvas()`

    - `Canvas(double width, double height)`


    The default constructor creates a `Canvas` with zero width and zero height. The
    two-parameter constructor creates a `Canvas` with the specified width and height.


    The `Canvas` class includes the following public methods:


    - `GraphicsContext getGraphicsContext2D()`

    - `void setWidth(double width)`

    - `double getWidth()`

    - `DoubleProperty widthProperty()`

    - `void setHeight(double height)`

    - `double getHeight()`

    - `DoubleProperty heightProperty()`


    The `getGraphicsContext2D()` method returns the `GraphicsContext` for the `Canvas`
    that you can use to perform 2D graphics operations. The same object is returned
    if you call `getGraphicsContext2D()` on the same `Canvas` object multiple times.
    The other methods define read-write properties `width` and `height` for the `Canvas`.


    The `GraphicsContext` class does not have any public constructors. The only way
    to obtain an instance of `GraphicsContext` is from a `Canvas` object.


    `GraphicsContext` supports a style of 2D operations that is similar to immediate
    mode 2D operations found in other graphics toolkits such as `java.awt.Canvas`,
    `javax.swing.Component`, and the HTML 5 Canvas API. Unlike in AWT or Java2D, where
    the drawing on the surface happens in the `paint()` callback method, the JavaFX
    Canvas’s typical usage scenario is to create the `Canvas`, get the `GraphicsContext`
    from it, draw on the `Canvas` with calls to `GraphicsContext` methods, and then
    add the `Canvas` to the scene graph. You can continue calling `GraphicsContext`
    methods after adding the `Canvas` to the scene graph. However, all `GraphicsContext`
    methods are considered UI manipulating methods, and should only be called in the
    JavaFX Application thread after the `Canvas` has been added to the scene graph.


    The `GraphicsContext` class has a full set of public methods that allows you to
    perform 2D operations on the `Canvas` that owns it. The following methods do not
    put any graphics artifacts on the `Canvas`; however, they control the state of
    the `GraphicsContext` and affect subsequent rendering calls:


    - `void save()`

    - `void restore()`

    - `void translate(double x, double y)`

    - `void scale(double x, double y)`

    - `void rotate(double degrees)`

    - `void transform(double mxx, double myx, double mxy, double myy, double mxt,
    double myt)`

    - `void transform(Affine xform)`

    - `void setTransform(double mxx, double myx, double mxy, double myy, double mxt,
    double myt)`

    - `void setTransform(Affine xform)`

    - `Affine getTransform(Affine xform)`

    - `Affine getTransform()`

    - `void setGlobalAlpha(double alpha)`

    - `double getGlobalAlpha()`

    - `void setGlobalBlendMode(BlendMode op)`

    - `BlendMode getGlobalBlendMode()`

    - `void setFill(Paint p)`

    - `Paint getFill()`

    - `void setStroke(Paint p)`

    - `Paint getStroke()`

    - `void setLineWidth(double lw)`

    - `double getLineWidth()`

    - `void setLineCap(StrokeLineCap cap)`

    - `StrokeLineCap getLineCap()`

    - `void setLineJoin(StrokeLineJoin join)`

    - `StrokeLineJoin getLineJoin()`

    - `void setMiterLimit(double ml)`

    - `double getMiterLimit()`

    - `void setFont(Font f)`

    - `Font getFont()`

    - `void setTextAlign(TextAlignment align)`

    - `TextAlignment getTextAlign()`

    - `void setTextBaseline(VPos baseline)`

    - `VPos getTextBaseline()`

    - `void setFillRule(FillRule fillRule)`

    - `FillRule getFillRule()`

    - `void setEffect(Effect e)`

    - `Effect getEffect(Effect e)`

    - `void applyEffect(Effect e)`


    The various setters and getters alter the characteristics of the `GraphicsContext`.
    They affect the coordinate transformation, global alpha, global blend mode, fill
    paint, stroke paint, line width, line cap, line join, miter limit, font, text
    alignment, text baseline, fill rule, and effect that will be used when the next
    rendering method call is issued. The `save()` method will push the current settings
    of these characteristics onto a stack. The `restore()` method will pop the saved
    settings back onto the `GraphicsContext`.


    The following methods put graphics artifacts on the `Canvas`:


    - `void fillText(String text, double x, double y)`

    - `void strokeText(String text, double x, double y)`

    - `void fillText(String text, double x, double y, double maxWidth)`

    - `void strokeText(String text, double x, double y, double maxWidth)`

    - `void beginPath()`

    - `void moveTo(double x0, double y0)`

    - `void lineTo(double x1, double y1)`

    - `void quadraticCurveTo(double xc, double yc, double x1, double y1)`

    - `void bezierCurveTo(double xc1, double yc1, double xc2, double yc2, double x1,
    double y1)`

    - `void arcTo(double x1, double y1, double x2, double y2, double radius)`

    - `void arc(double centerX, double centerY, double radiusX, double radiusY, double
    startAngle, double length)`

    - `void rect(double x, double y, double w, double h)`

    - `void appendSVGPath(String svgPath)`

    - `void closePath()`

    - `void fill()`

    - `void stroke()`

    - `void clip()`

    - `void clearRect(double x, double y, double w, double h)`

    - `void fillRect(double x, double y, double w, double h)`

    - `void strokeRect(double x, double y, double w, double h)`

    - `void fillOval(double x, double y, double w, double h)`

    - `void strokeOval(double x, double y, double w, double h)`

    - `void fillArc(double x, double y, double w, double h, double startAngle, double
    arcExtent, ArcType closure)`

    - `void strokeArc(double x, double y, double w, double h, double startAngle, double
    arcExtent, ArcType closure)`

    - `void fillRoundRect(double x, double y, double w, double h, double arcWidth,
    double arcHeight)`

    - `void strokeRoundRect(double x, double y, double w, double h, double arcWidth,
    double arcHeight)`

    - `void strokeLine(double x1, double y1, double x2, double y2)`

    - `void fillPolygon(double[] xPoints, double[] yPoints, int nPoints)`

    - `void strokePolygon(double[] xPoints, double[] yPoints, int nPoints)`

    - `void strokePolyline(double[] xPoints, double[] yPoints, int nPoints)`

    - `void drawImage(Image img, double x, double y)`

    - `void drawImage(Image img, double x, double y, double w, double h)`

    - `void drawImage(Image img, double sx, double sy, double sw, double sh, double
    dx, double dy, double dw, double dh)`


    The `fillXXX` methods put a shape onto the `Canvas` with a filled interior. The
    `strokeXXX` methods put a shape onto the `Canvas` with a hollow interior. The
    three `drawImage()` methods draw a `javafx.scene.image.Image` onto the `Canvas`,
    with possible scaling and subsetting. The `beginPath()` method starts the building
    of a path that can be rendered onto the `Canvas` or used as a clip mask. The `moveTo()`,
    `lineTo()`, `quadraticCurveTo()`, `bezierCurveTo()`, `arcTo()`, `arc()`, `rect()`,
    `appendSVGPath()`, and `closePath()` methods add to the path. The `fill()` method
    renders the path onto the `Canvas` with a filled interior. The `stroke()` method
    renders the path onto the `Canvas` with a hollow interior. The `clip()` method
    clips the `Canvas` by the path, so that future rendering method calls won’t have
    any effect outside of the path. The `clearRect()` method will clear a rectangular
    region of the `Canvas` with a transparent color value. To clear the entire `Canvas`,
    you can call `clearRect(0, 0, width, height)`.


    The following methods serve to provide additional information about the `GraphicsContext`:


    - `Canvas getCanvas()`

