  raw: 'Most media file formats have the ability to embed *metadata*, data that describe
    the song or video. MP3 files, for instance, have ID3 tags that can be used to
    identify the artist, album, track number, and even the year that a song was released.
    Many MP3 files also have embedded images of the artist, the album cover, or a
    logo (in the case of podcasts and such). The JavaFX Media class reads these metadata
    and presents them to the developer in the form of an ObservableMap of key/value
    pairs. The keys are Strings that identify the metadata and the values are Objects,
    most likely a String or an Image.


    Although there is no guarantee as to which metadata are present in any given media
    file, there are a few fields that are very common: artist, title, album, and year.
    In addition, if any image is embedded in a file’s metadata, the Media class will
    give you access to it using the “image” key. Listing 9-8 shows you how to add
    the ability to receive metadata notifications when a new Media object is created.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


