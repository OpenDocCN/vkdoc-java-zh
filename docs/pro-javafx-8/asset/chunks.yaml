- fmt: "# The Distinction Between Invalidation and Change Events\n\nThe distinction\
    \ between an invalidation event and a change event is made so that the JavaFX\
    \ properties and bindings framework may support *lazy evaluations*. We show an\
    \ example of this by looking at three lines of code from the motivating example:\n\
    \n```\notherProperty.bind(intProperty);\nintProperty.set(7168);\nSystem.out.println(\"\
    otherProperty.get() = \" + otherProperty.get());\n```\n\nWhen `intProperty.set(7168)`\
    \ is called, it fires an invalidation event to `otherProperty`. On receiving this\
    \ invalidation event, `otherProperty` simply makes a note of the fact that its\
    \ value is no longer valid. It does not immediately perform a recalculation of\
    \ its value by querying `intProperty` for its value. The recalculation is performed\
    \ later when `otherProperty.get()` is called. Imagine if instead of calling `intProperty.set()`\
    \ only once as in the preceding code we call `intProperty.set()` multiple times;\
    \ `otherProperty` still recalculates its value only once.\n\n> **Note**: The `ObservableValue`\
    \ interface is not the only direct subinterface of `Observable`. There are four\
    \ other direct subinterfaces of `Observable` that live in the `javafx.collections`\
    \ package: `ObservableList`, `ObservableMap`, `ObservableSet`, and `ObservableArray`\
    \ with corresponding `ListChangeListener`, `MapChangeListener`, `SetChangeListener`,\
    \ and `ArrayChangeListener` as callback mechanisms. These JavaFX observable collections\
    \ are covered in Chapter 7, “Collections and Concurrency.”\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# Chapter 4: Properties and Bindings\n\n## Understanding the `WritableValue`\
    \ Interface\n\nThis might be the simplest subsection in the entire chapter, for\
    \ the `WritableValue` interface is truly as simple as it looks. Its purpose is\
    \ to inject the `getValue()` and `setValue()` methods into implementations of\
    \ this interface.\n\nAll implementation classes of `WritableValue` in the JavaFX\
    \ properties and bindings framework also implement `ObservableValue`, therefore\
    \ you can make an argument that the value of `WritableValue` is only to provide\
    \ the `setValue()` method.\n\nYou have seen the `setValue()` method at work in\
    \ the motivating example.\n\n## Understanding the `ReadOnlyProperty` Interface\n\
    \nThe `ReadOnlyProperty` interface injects two methods into its implementations.\
    \ The `getBean()` method should return the `Object` that contains the `ReadOnlyProperty`\
    \ or `null` if it is not contained in an `Object`. The `getName()` method should\
    \ return the name of the `ReadOnlyProperty` or the empty string if the `ReadOnlyProperty`\
    \ does not have a name.\n\nThe containing object and the name provide *contextual*\
    \ information about a `ReadOnlyProperty`. The contextual information of a property\
    \ does not play any direct role in the propagation of invalidation events or the\
    \ recalculation of values. However, if provided, it will be taken into account\
    \ in some peripheral calculations.\n\nIn our motivating example, the `intProperty`\
    \ is constructed without any contextual information. Had we used the full constructor\
    \ to supply it a name:\n\n```\nintProperty = new SimpleIntegerProperty(null, \"\
    intProperty\", 1024);\n```\n\nthe output would have contained the property name:\n\
    \n```\nintProperty = IntegerProperty [name: intProperty, value: 1024]\n```\n\n\
    ## Understanding the `Property` Interface\n\nNow we come to the bottom of our\
    \ key interfaces hierarchy. The `Property` interface has as its superinterfaces\
    \ all four interfaces we have examined thus far: `Observable`, `ObservableValue`,\
    \ `ReadOnlyProperty`, and `WritableValue`.\n\nTherefore it inherits all the methods\
    \ from these interfaces. It also provides five methods of its own:\n\n- `void\
    \ bind(ObservableValue<? extends T> observableValue);`\n- `void unbind();`\n-\
    \ `boolean isBound();`\n- `void bindBidirectional(Property<T> tProperty);`\n-\
    \ `void unbindBidirectional(Property<T> tProperty);`\n\nYou have seen two of the\
    \ methods at work in the motivating example in the last section: `bind()` and\
    \ `unbind()`.\n\nCalling `bind()` creates a *unidirectional binding* or a dependency\
    \ between the `Property` object and the `ObservableValue` argument. Once they\
    \ enter this relationship, calling the `set()` or `setValue()` methods on the\
    \ `Property` object will cause a `RuntimeException` to be thrown. Calling the\
    \ `get()` or `getValue()` methods on the `Property` object will return the value\
    \ of the `ObservableValue` object. And, of course, changing the value of the `ObservableValue`\
    \ object will invalidate the `Property` object. Calling `unbind()` releases any\
    \ existing unidirectional binding the `Property` object may have. If a unidirectional\
    \ binding is in effect, the `isBound()` method returns `true`; otherwise it returns\
    \ `false`.\n\nCalling `bindBidirectional()` creates a *bidirectional binding*\
    \ between the `Property` caller and the `Property` argument. Notice that unlike\
    \ the `bind()` method, which takes an `ObservableValue` argument, the `bindBidirectional()`\
    \ method takes a `Property` argument. Only two `Property` objects can be bound\
    \ together bidirectionally. Once they enter this relationship, calling the `set()`\
    \ or `setValue()` methods on either `Property` object will cause both objects’\
    \ values to be updated. Calling `unbindBidirectional()` releases any existing\
    \ bidirectional binding the caller and the argument may have. The program in Listing\
    \ 4-2 shows a simple bidirectional binding at work.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### Listing 4-2. `BidirectionalBindingExample.java`\n\n```java\nimport javafx.beans.property.SimpleStringProperty;\n\
    import javafx.beans.property.StringProperty;\n\npublic class BidirectionalBindingExample\
    \ {\n    public static void main(String[] args) {\n        System.out.println(\"\
    Constructing two StringProperty objects.\");\n        StringProperty prop1 = new\
    \ SimpleStringProperty(\"\");\n        StringProperty prop2 = new SimpleStringProperty(\"\
    \");\n\n        System.out.println(\"Calling bindBidirectional.\");\n        prop2.bindBidirectional(prop1);\n\
    \n        System.out.println(\"prop1.isBound() = \" + prop1.isBound());\n    \
    \    System.out.println(\"prop2.isBound() = \" + prop2.isBound());\n\n       \
    \ System.out.println(\"Calling prop1.set(\\\"prop1 says: Hi!\\\")\");\n      \
    \  prop1.set(\"prop1 says: Hi!\");\n        System.out.println(\"prop2.get() returned:\"\
    );\n        System.out.println(prop2.get());\n\n        System.out.println(\"\
    Calling prop2.set(prop2.get() + \\\"\\\\nprop2 says: Bye!\\\")\");\n        prop2.set(prop2.get()\
    \ + \"\\nprop2 says: Bye!\");\n        System.out.println(\"prop1.get() returned:\"\
    );\n        System.out.println(prop1.get());\n    }\n}\n```\n\nIn this example\
    \ we created two `SimpleStringProperty` objects called `prop1` and `prop2`, created\
    \ a bidirectional binding between them, and then called `set()` and `get()` on\
    \ both properties.\n\nWhen we run the program in Listing 4-2, the following output\
    \ is printed to the console:\n\n```\nConstructing two StringProperty objects.\n\
    Calling bindBidirectional.\nprop1.isBound() = false\nprop2.isBound() = false\n\
    Calling prop1.set(\"prop1 says: Hi!\")\nprop2.get() returned:\nprop1 says: Hi!\n\
    Calling prop2.set(prop2.get() + \"\\nprop2 says: Bye!\")\nprop1.get() returned:\n\
    prop1 says: Hi!\nprop2 says: Bye!\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n> **Caution**: Each `Property` object may have at most one active unidirectional\
    \ binding at a time. It may have as many bidirectional bindings as you want. The\
    \ `isBound()` method pertains only to unidirectional bindings. Calling `bind()`\
    \ a second time with a different `ObservableValue` argument while a unidirectional\
    \ binding is already in effect will unbind the existing one and replace it with\
    \ the new one.\n\n## Understanding the `Binding` Interface\n\nThe `Binding` interface\
    \ defines four methods that reveal the intentions of the interface. A `Binding`\
    \ object is an `ObservableValue` whose validity can be queried with the `isValid()`\
    \ method and set with the `invalidate()` method.\n\nIt has a list of dependencies\
    \ that can be obtained with the `getDependencies()` method. And finally a `dispose()`\
    \ method signals that the binding will not be used anymore and resources used\
    \ by it can be cleaned up."
