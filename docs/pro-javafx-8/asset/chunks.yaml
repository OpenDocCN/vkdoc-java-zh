    **重复播放**


    音频播放器示例应用未使用的另一个 `MediaPlayer` 功能，但确实值得一提，那就是重复播放媒体的能力。您可以将播放设置为重复一定次数或无限重复。此行为由
    `cycleCount` 属性控制。已完成的播放周期数可通过 `currentCount` 属性获取。当媒体播放结束时，`currentCount` 会递增，如果它小于
    `cycleCount`，播放将自动重新开始。每当播放重复时，会调用 `onRepeat` 回调函数。通常的 `onEndOfMedia` 调用将在最后一次重复之后才进行。将
    `cycleCount` 设置为 `MediaPlayer.INDEFINITE` 值将导致播放无限循环。


    `MediaPlayer` 类中的 `startTime` 和 `stopTime` 属性可以影响媒体开始和停止播放的位置。顾名思义，这两个属性都是 `Duration`
    类型。`startTime` 属性初始化为 0 毫秒，而 `stopTime` 初始化为 `totalDuration` 的值。如果设置了 `stopTime`，播放将在到达该时间时停止或重复。与此相关，`cycleDuration`
    属性是一个只读属性，它提供当前 `startTime` 和 `stopTime` 之间的差值。


    设置播放重复的能力对于音频播放器来说将是一个便捷的功能。示例应用中目前尚未实现，但添加该功能对于热心的读者来说将是一个很好的练习。


    **音频均衡**


    JavaFX 媒体 API 的两个非常酷的功能是创建音频均衡器和在音频播放时查看其实时频谱。均衡器允许您增强或衰减特定频率的音频。如果您正在可视化音频的频谱，这种变化将是可见的；这两个功能协同工作，为您或您的用户提供对播放体验的终极控制。


    每个 `MediaPlayer` 都会创建一个 `AudioEqualizer` 实例，您可以使用 `getAudioEqualizer` 方法访问它。


    `AudioEqualizer` 类有一个 `enabled` 属性，您可以使用它来启用或禁用均衡器。它还公开了一个 `EqualizerBand` 实例的
    `ObservableList`。每个 `EqualizerBand` 都有 `bandwidth`、`centerFrequency` 和 `gain`
