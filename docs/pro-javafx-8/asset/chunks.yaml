    Controlling Volume


    The MediaPlayer class has two properties that control the volume of the audio
    playback. The volume property has a range that goes from 0.0 (mute) to 1.0 (maximum
    volume). This volume setting does not affect the master volume of the computer
    on which the audio is playing; it controls only the volume used by the MediaPlayer.
    The default value for the volume property is 1.0\. There is also a Boolean property
    named mute. When this variable is set to true, the volume of the playback will
    be muted. Although playback continues, no sound will be heard. This is effectively
    equivalent to setting the volume property to 0.0, but muting playback allows you
    to cut out the sound and easily restore it later to its previous level without
    needing to read and reset the volume value.


    The volume control in the audio player application is a Slider with a value that
    can range from 0.0 to 1.0\. Simply establishing a bidirectional binding between
    the Slider’s value property and the MediaPlayer’s volume property will allow the
    user to control the volume of the playback.


    volumeSlider.valueProperty().bindBidirectional(mediaPlayer.volumeProperty());


