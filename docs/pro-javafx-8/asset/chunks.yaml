    \    return label;\n}\n```\n\nThe method starts by creating the controls and `ImageView`s\
    \ that will be placed in the layout. We have already seen the code that creates\
    \ the `openButton` in Listing 9-12. The `createControlPanel` method is presented\
    \ later in this section. The next step is to create the `GridPane` and its `ColumnConstraints`.\
    \ Three different column constraints are created. The first, `buttonCol`, is for\
