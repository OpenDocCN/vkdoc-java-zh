    [March/006725.html. T](http://mail.openjdk.java.net/pipermail/openjfx-dev/2013-March/006725.html)he
    bottom of this entry contains a very important statement: “I believe that FXML
    or Lambda’s or alternative languages all provide other avenues for achieving the
    same goals as builders but without the additional cost in byte codes or classes.”


    This is what we will show throughout this book. Near the end of this chapter,
    we show a first example of a Lambda expression in our code. In Chapter 3, we show
    how SceneBuilder and FXML allow you to use a declarative way of defining a UI.


