    现在我们已经介绍了 3D 形状（包括预定义和用户自定义的）、摄像机和光照，在本节中，我们将处理 JavaFX 3D 图形 API 中最后一个剩余的主题。材质
    API 由 Material 抽象类及其具体子类 PhongMaterial 组成。Material 类是一个没有公共方法的抽象基类。在所有实际情况下，使用的都是
    PhongMaterial 类。材质类描述了 3D 表面的物理属性以及它们如何与光照相互作用。


