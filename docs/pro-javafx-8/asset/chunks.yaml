    public class Person {


    private StringProperty name;


    public void setName(String val) { nameProperty().set(val); }


    public String getName() { return nameProperty().get(); }


    public StringProperty nameProperty() {


    if (name == null) {


    name = new SimpleStringProperty(this, "name");


    }


    return name;


    }


    }


