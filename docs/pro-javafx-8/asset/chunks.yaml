    JavaFX property StringProperty [bean: Person@6d311334, name: phoneNumber, value:\
    \ 800-555-1212]\nchanged:\noldValue = null, newValue = 800-555-1212\nBind phoneNumberProperty\
    \ to another property\nJavaFX property StringProperty [bean: Person@6d311334,\
    \ name: phoneNumber, value: 866-555-1212]\nchanged:\noldValue = 800-555-1212,\
    \ newValue = 866-555-1212\nSetting phoneNumber on the JavaBeans property\nA JavaBeans\
    \ property change is vetoed.\nperson.getPhoneNumber() = 866-555-1212\n```\n\n\
    ## 总结\n\n在本章中，您学习了JavaFX属性和绑定框架以及JavaFX Beans规范的基础知识。现在您应该理解以下重要原则：\n\n- JavaFX属性和绑定框架中的属性和绑定是该框架的基本工作单元。\n\
    - 它们符合框架的关键接口。\n- 它们触发两种事件：失效事件和变更事件。\n- JavaFX属性和绑定框架提供的所有属性和绑定都会惰性地重新计算其值，仅在请求值时进行。要强制它们进行急切重新评估，请向它们附加一个`ChangeListener`。\n\
    - 通过以下三种方式之一，从现有属性和绑定创建新绑定：使用`Bindings`工具类的工厂方法、使用流畅接口API，或直接扩展`IntegerBinding`系列抽象类。\n\
    - JavaFX Beans规范使用三种方法来定义属性：getter、setter和属性getter。\n- JavaFX Beans属性可以通过急切、半惰性和全惰性策略来实现。\n\
    - 旧式JavaBeans属性可以轻松适配为JavaFX属性。\n\n## 资源\n\n以下是一些有助于理解属性和绑定的有用资源：\n\n- *Martin\
    \ Fowler关于流畅接口API的文章*：\n  [http://www.martinfowler.com/bliki/FluentInterface.html](http://www.martinfowler.com/bliki/FluentInterface.html)\n\
