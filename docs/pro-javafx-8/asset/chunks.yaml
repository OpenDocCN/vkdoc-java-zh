    `javafx.embed.swing` 包中的 `SwingNode` 类是一个 JavaFX Node，它可以托管一个 Swing `JComponent`，因此允许你将
    Swing 组件嵌入到 JavaFX 应用程序中。这为遗留的 Swing 应用程序提供了一种逐步迁移到 JavaFX 的方式。除了默认构造函数之外，专为应用程序开发者设计的其他公共方法只有一对用于获取和设置嵌入
