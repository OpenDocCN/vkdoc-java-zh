  raw: 'In the earliest versions of JavaFX, there was no way to play low-latency audio.
    This much-needed feature became available in version 2.0 using the new AudioClip
    class. Audio clips are not suitable for large or lengthy sounds because the audio
    data associated with these sounds are decompressed and stored completely in memory.
    If you need to play a song or other lengthy audio file, you should use a Media
    object instead, which is discussed in the next section.


    An AudioClip is ideal for playing short sounds in response to user actions in
    a game or other rich-media application. An AudioClip instance is constructed by
    passing a URI string as the only parameter to the constructor. This URI can point
    to a resource on the Internet, the local file system, or within the jar file by
    using the http:, file:, and jar: schemes, respectively. Once an AudioClip is constructed,
    you can adjust several properties that affect the playback of the clip, such as
    the volume, playback rate, panning, and balance. Calling its play method will
    begin playback of an AudioClip. You can call the play method repeatedly to begin
    multiple overlapping playbacks of a given clip.


    There are actually three overloaded versions of the play method in the AudioClip
    class. Calling the method with no arguments will use the current properties of
    the AudioClip instance for the playback. There is also a variant of the play method
    that takes a volume argument, which allows you to override the volume of the clip
    for that playback only.


    The final variant of the play method allows you to specify the volume, balance,
    rate, pan, and priority of that playback.


    Specifying these parameters as arguments of the play methods does not cause them
    to be saved permanently; they are a one-time-only override of the AudioClip’s
    instance data. There is also a stop method that stops all playback of the AudioClip.


    Listing 9-1 illustrates the simple steps required to create and play an AudioClip.
    This source code is part of the BasicAudioClip example project in the Chapter09
    directory of the book’s source code.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 9 ■ Using the Media Classes


    ***Listing 9-1.*** Playing an Audio Clip


    public class BasicAudioClip extends Application {


    public static void main(String[] args) {


    launch(args);


    }


    @Override


    public void start(Stage primaryStage) {


    final URL resource = getClass().getResource("resources/beep.wav");


    final AudioClip clip = new AudioClip(resource.toString());


    final Button button = new Button("Bing Zzzzt!");


    button.setOnAction((ActionEvent event) -> {


    clip.play(1.0);


    });


    final StackPane stackPane = new StackPane();


    stackPane.setPadding(new Insets(10));


    stackPane.getChildren().add(button);


    final Scene scene = new Scene(stackPane, 200, 200);


    final URL stylesheet = getClass().getResource("media.css");


    scene.getStylesheets().add(stylesheet.toString());


    primaryStage.setTitle("Basic AudioClip Example");


    primaryStage.setScene(scene);


    primaryStage.show();


    }


    }


    The prerequisite to creating an AudioClip is to create the URI string for the
    resource to be loaded. In Listing 9-1, we use the getResource method to return
    the URI for an audio file embedded in the jar file. The URI is converted to a
    String and then passed to the AudioClip constructor. As previously mentioned,
    the AudioClip constructor loads the entire sound into memory, decoding it if necessary.
    If your sound effect files are small, you can store them in an uncompressed format
    such as the .wav file we use in this example to avoid the overhead of decoding
    them. Once a sound file grows larger than 100 KB or so, you should consider storing
    it as a compressed MP3 file instead because the smaller size of the file can more
    than make up for the overhead of decoding the sound. This is especially true if
    you are loading your sound files from a server on the Internet. You should also
    keep in mind that the AudioClip constructor will block the current thread until
    the sound is completely loaded. For this reason, you should consider loading your
    sound effects on a background thread if you are loading a lot of files or if the
    files are large. See the Chapter 7 for details on using JavaFX’s concurrency classes.


    Once the AudioClip is constructed, you simply need to call one of its play methods
    to start a playback. The sound in Listing 9-1 is played in response to a button
    click by calling the play method and passing it a volume parameter of 1.0, which
    causes the sound to be played at maximum volume. The Button is then added to a
    StackPane so that it will automatically remain centered in the Scene. Finally,
    the Scene is added to the Stage and shown to the user. Note that the media.css
    style sheet is applied to the scene. This style sheet is used by all of the sample
    applications in this chapter. The style sheet is shown in Listing 9-2.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 134](index-381_1.jpg)


    Chapter 9 ■ Using the Media Classes


    ***Listing 9-2.*** The First Version of the Style Sheet Used by the Applications
    in This Chapter


    .root {


    -fx-base: #606060;


    -fx-background-color: radial-gradient(center 50% 50%, radius 60%,


    #666a6b, #2b2f32);


    -fx-background-image: url("resources/cross.png");


    -fx-background-position: left top;


    }


    .button {


    -fx-text-fill: #E0E0E0;


    -fx-font-size: 20pt;


    -fx-pref-width: 300px;


    }


    .label {


    -fx-text-fill: #E0E0E0;


    }


    #clipLabel {


    -fx-font-size: 24pt;


    }


    .hyperlink {


    -fx-text-fill: #808080;


    }


    Figure [9-1 sho](#index_split_004.html#p381)ws how this simple AudioClip example
    should look when it is running. A new playback of the AudioClip is started each
    time the button is clicked. If you’re very quick, you might get two or three playing
    at a time.


    ***Figure 9-1.** The BasicAudioClip application*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 135](index-382_1.jpg)


    Chapter 9 ■ Using the Media Classes


    Controlling the Playback Parameters of an AudioClip


    We now build on the preceding example to show how AudioClip allows a sound effect
    to be played at differing volumes and rates. We also show how the balance of an
    audio clip can be adjusted to control the volume of the left and right channels.
    This can be useful when you want to achieve a bit of 2D spatialization in your
    sound effects.


    The application we end up with is shown in Figure [9-2](#index_split_005.html#p382).


    ***Figure 9-2.** The CodeMonkeyToDo application*


    We start by examining the Application class and looking at how the sounds are
    loaded. Listing 9-3 shows the application with the scene construction code removed.
    This allows you to see more easily that we are loading MP3


    files from the jar file using the getResource method again. In this case, our
    sound effects are in a different location relative to our application class. Therefore
    we use a path such as resources/coffee.mp3 to locate them. These clips are a little
    longer, so the decision was made to use MP3 files to keep the size of the jar
    file to a minimum at the expense of a little extra decoding time during startup.'
  trans: '

    在 JavaFX 的早期版本中，无法播放低延迟音频。这一急需的功能在 2.0 版本中通过新的 `AudioClip` 类得以实现。音频剪辑不适合用于大型或长时间的声音，因为与之相关的音频数据会被解压缩并完全存储在内存中。如果你需要播放一首歌曲或其他较长的音频文件，则应改用
    `Media` 对象，这将在下一节中讨论。


    `AudioClip` 非常适合在游戏或其他富媒体应用中播放短促的声音以响应用户操作。构造 `AudioClip` 实例时，只需将 URI 字符串作为唯一参数传递给构造函数。该
    URI 可以指向互联网上的资源、本地文件系统，或通过分别使用 `http:`、`file:` 和 `jar:` 协议指向 jar 文件内的资源。构造 `AudioClip`
    后，你可以调整多个影响剪辑播放的属性，例如音量、播放速率、声像和平衡。调用其 `play` 方法将开始播放 `AudioClip`。你可以重复调用 `play`
    方法来开始对给定剪辑进行多次重叠播放。


    实际上，`AudioClip` 类中有三个重载版本的 `play` 方法。不带参数调用该方法将使用 `AudioClip` 实例的当前属性进行播放。还有一个
    `play` 方法的变体，它接受一个音量参数，允许你仅针对该次播放覆盖剪辑的音量。


    `play` 方法的最后一个变体允许你指定该次播放的音量、平衡、速率、声像和优先级。


    将这些参数指定为 `play` 方法的参数并不会导致它们被永久保存；它们仅是一次性的覆盖，覆盖 `AudioClip` 的实例数据。还有一个 `stop`
    方法，用于停止 `AudioClip` 的所有播放。


    清单 9-1 演示了创建和播放 `AudioClip` 所需的简单步骤。此源代码位于本书源代码 Chapter09 目录下的 BasicAudioClip
    示例项目中。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 9 章 ■ 使用媒体类


    ***清单 9-1.*** 播放音频剪辑


    public class BasicAudioClip extends Application {


    public static void main(String[] args) {


    launch(args);


    }


    @Override


    public void start(Stage primaryStage) {


    final URL resource = getClass().getResource("resources/beep.wav");


    final AudioClip clip = new AudioClip(resource.toString());


    final Button button = new Button("Bing Zzzzt!");


    button.setOnAction((ActionEvent event) -> {


    clip.play(1.0);


    });


    final StackPane stackPane = new StackPane();


    stackPane.setPadding(new Insets(10));


    stackPane.getChildren().add(button);


    final Scene scene = new Scene(stackPane, 200, 200);


    final URL stylesheet = getClass().getResource("media.css");


    scene.getStylesheets().add(stylesheet.toString());


    primaryStage.setTitle("Basic AudioClip Example");


    primaryStage.setScene(scene);


    primaryStage.show();


    }


    }


    创建 `AudioClip` 的前提是为要加载的资源创建 URI 字符串。在清单 9-1 中，我们使用 `getResource` 方法返回嵌入在 jar
    文件中的音频文件的 URI。该 URI 被转换为字符串，然后传递给 `AudioClip` 构造函数。如前所述，`AudioClip` 构造函数会将整个声音加载到内存中，并在必要时对其进行解码。如果你的音效文件很小，你可以将它们存储为未压缩的格式，例如本例中使用的
    `.wav` 文件，以避免解码开销。一旦声音文件大小超过 100 KB 左右，你应该考虑将其存储为压缩的 MP3 文件，因为较小的文件大小可以远远弥补解码声音的开销。如果你是从互联网上的服务器加载声音文件，这一点尤其重要。你还应记住，`AudioClip`
    构造函数会阻塞当前线程，直到声音完全加载。因此，如果你要加载大量文件或文件很大，应考虑在后台线程上加载音效。有关使用 JavaFX 并发类的详细信息，请参见第
    7 章。


    一旦构造了 `AudioClip`，你只需调用其 `play` 方法之一即可开始播放。清单 9-1 中的声音通过调用 `play` 方法并传递音量参数 `1.0`
    来响应按钮点击，这会使声音以最大音量播放。然后将按钮添加到 `StackPane`，使其自动保持在场景中心。最后，将场景添加到舞台并显示给用户。请注意，`media.css`
    样式表已应用于场景。本章中的所有示例应用程序都使用此样式表。该样式表如清单 9-2 所示。


