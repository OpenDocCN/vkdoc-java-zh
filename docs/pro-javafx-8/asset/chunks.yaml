    JavaFX, including the following.


    • Creating a UI in JavaFX, which we loosely based on the metaphor of creating
    a theater play, and typically consists of creating a stage, a scene, nodes, a
    model, and event handlers, and animating some of the nodes


    • The details about using most of the properties and methods of the Stage class,
    including how to create a Stage that is transparent with no window decorations


    • How to use the HBox and VBox layout containers to organize nodes horizontally
    and vertically, respectively


    • The details about using many of the properties and methods of the Scene class


    • How to create and apply CSS styles to nodes in your program by associating one
    or more style sheets with the Scene


    • How to handle keyboard and mouse input events


    • How to animate nodes in the scene, both with the Timeline class and the transition
    classes


    • How to detect when nodes in the scene have collided


    In Chapter 3, we will discuss the alternative approach for creating UIs, this
    time with SceneBuilder.


    Then, in Chapter 4, we take a deeper dive into the areas of properties and binding.


    Resources


    For some additional information on creating JavaFX UIs, you can consult the following
    resources.


    • JavaFX 8 SDK documenta[tion online: http://download.java.net/jdk8/jfxdocs/](http://download.java.net/jdk8/jfxdocs/)


