    When you run the application, notice that adjusting the volume slider changes
    the associated decibel (dB) level displayed. Also, selecting the Muting check
    box disables the slider, and selecting various genres changes the volume slider.
    This behavior is enabled by concepts that are shown in the code that follows,
    such as the following:


    • Binding to a class that contains a model


    • Using change listeners


    • Creating observable lists


