    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 13 章 ■ JavaFX 语言与标记


    这个表达式实际上会翻译成以下 Java 中的 JavaFX 代码：


    `rect1.heightProperty().bind(rect2.heightProperty().add(rect3.heightProperty()));`


    即使对于这样一个简单的绑定表达式，也很容易迷失在 Java 所需的所有括号和方法调用中。


    你也可以在 ScalaFX 中使用聚合操作符。无需使用 JavaFX `Bindings` 类上的静态方法，ScalaFX 的 `Includes` 导入为你提供了所有这些可以直接调用的函数方法，例如以下代码将一个矩形的宽度绑定到其他三个矩形的最大宽度。


    `rect1.width <== max(rect2.width, rect3.width, rect4.width)`


    另一种极其常见的绑定表达式是条件语句。使用 JavaFX API 创建条件语句是可行的，同样需要借助静态的 `Bindings` 类，但使用 ScalaFX
    API 则简单得多。


    以下代码根据光标是否悬停来改变 `strokeWidth`（正如我们之前在“消失的圆圈”应用中所做的那样）。


    `strokeWidth <== when (hover) then 4 otherwise 0`


    传递给条件值和结果子句的表达式可以任意复杂。以下示例结合了布尔逻辑、字符串拼接和条件表达式。


    `text <== when (rect.hover || circle.hover && !disabled) then textField.text +
    " is enabled"`


    `otherwise "disabled"`


    在所有这些示例中，由于你编写的代码直接位于 JavaFX 绑定 API 之上，因此你可以获得所有相同的好处，例如惰性求值。此外，由于 Scala 像 Java
    一样是一种静态类型语言，你在获得这些好处的同时，不会像使用其他动态语言那样牺牲类型安全。事实上，使用 ScalaFX API 可以获得更好的类型安全，因为它还支持子属性的类型安全解引用。例如，在
    ScalaFX 中，要将矩形的宽度绑定到场景的宽度，你只需编写：


    `rect1.width <== stage.scene.width`


    即使场景尚未创建（例如在 `Stage` 对象初始化期间），这也能正常工作。你也可以在 Java 中完成同样的事情，但这需要一个非类型安全的属性选择器：`rect.widthProperty().bind(Bindings.selectDouble(stage,
    "scene.width"));`


