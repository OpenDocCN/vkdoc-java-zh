    In this snippet, the `stylesheets` property of the `Scene` is initialized to the
    location of the `onTheScene.css` file, which in this case is the root directory.
    Also shown in the snippet is the assignment of the CSS files to the `Scene` as
    the appropriate buttons are clicked. The text of the `RadioButton` instances is
    equal to the names of the style sheets, hence we can easily set the corresponding
    style sheet to the scene. Take a look at Listing 2-3 to see the style sheet that
    corresponds to the screenshot in Figure [2-6](#index_split_000.html#p48). Some
    of the CSS *selectors* in this style sheet represent the nodes whose `id` property
    is either `"stageX"` or `"stageY"`. There is also a selector in this style sheet
    that represents nodes whose `styleClass` property is `"emphasized-text"`. In addition,
    there is a selector in this style sheet that maps to the `ChoiceBox` UI control
    by substituting the camel-case name of the control to a lowercase hyphenated name
    (`choice-box`). The *properties* in this style sheet begin with `-fx`, and correspond
    to the type of node with which they are associated. The *values* in this style
    sheet (e.g., `black`, `italic`, and `14pt`) are expressed as standard CSS values.


