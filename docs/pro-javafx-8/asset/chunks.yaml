    ## Understanding the FXML Loading Facility


    The FXML file loading facility is made up of two classes, an interface, an exception,
    and an annotation in the `javafx.fxml` package. The `FXMLLoader` is the class
    that does the bulk of the work, such as reading and parsing the FXML file, recognizing
    processing instructions in the FXML file, and responding with the necessary actions,
    recognizing each element and attribute of the FXML file and delegating the object
    creation tasks to a set of builders, creating the controller object if necessary
    and injecting the nodes and other objects into the controller. The `JavaFXBuilderFactory`
    is responsible for creating builders in response for `FXMLLoader`’s requests for
    builders for a particular class. The `Initializable` interface can be implemented
    by controller classes to receive information from the `FXMLLoader` as in previous
    versions of JavaFX; however, this functionality has been superseded by the injection
    approach, so we do not discuss it. A `LoadException` is thrown if the FXML file
    contains errors that make it impossible for the `FXMLLoader` to construct all
    the objects specified in the FXML file. The `@FXML` annotation can be used in
    controller classes to mark certain fields as injection targets and certain methods
    as event handler candidates.


