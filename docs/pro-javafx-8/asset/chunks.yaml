    2-1 draws the sky-blue rounded rectangle that becomes the background for the transparent
    window example in Figure [2-5.](#index_split_000.html#p40)


    Rectangle blue = new Rectangle(250, 350, Color.SKYBLUE);


    blue.setArcHeight(50);


    blue.setArcWidth(50);


    In this snippet, we use the three-argument constructor of Rectangle, in which
    the first two parameters specify the width and the height of the Rectangle. The
    third parameter defines the fill color of the Rectangle.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 2 ■ Creating a User interfaCe in JavafX


    As you can detect from this code snippet, rounded rectangles are easily created
    using the arcWidth(double v) and arcHeight(double v) methods, where the parameter
    v defines the diameter of the arc.


    Dragging the Stage on the Desktop When a Title Bar Isn’t Available


    The Stage may be dragged on the desktop using its title bar, but in the case where
    its StageStyle is UNDECORATED or TRANSPARENT, the title bar isn’t available. To
    allow dragging in this circumstance, we added the code shown in the following
    code snippet from Listing 2-1.


    //when mouse button is pressed, save the initial position of screen


    rootGroup.setOnMousePressed((MouseEvent me) -> {


    dragAnchorX = me.getScreenX() - stageRef.getX();


    dragAnchorY = me.getScreenY() - stageRef.getY();


    });


    //when screen is dragged, translate it accordingly


    rootGroup.setOnMouseDragged((MouseEvent me) -> {


    stageRef.setX(me.getScreenX() - dragAnchorX);


    stageRef.setY(me.getScreenY() - dragAnchorY);


    });


    Event handlers are covered a little later in the chapter, but as a preview, the
    lambda expression that is supplied to the onMouseDragged() method is called when
    the mouse is dragged. As a result, the values of the x and y properties are altered
    by the number of pixels that the mouse was dragged, which moves the Stage as the
    mouse is dragged.


