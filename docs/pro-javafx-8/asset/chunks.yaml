    Hyperlink 控件是一个按钮，外观类似于浏览器中的链接。它可以包含图形、文本或两者兼有，并能响应鼠标悬停和点击。在上一练习的第 19 步中，你点击了图
    6-9 中显示的 Hyperlink 控件。结果，Java 控制台打印出一条消息，表明该链接已被点击。以下来自清单 6-12 的代码片段在 StarterApp
    程序中实现了此功能：`Hyperlink link = new Hyperlink("Hyperlink");`


    `link.setOnAction(e -> System.out.println(e.getEventType() + " occurred on Hyperlink"));`
    定义 ChoiceBox


    当点击时，ChoiceBox 控件会弹出一个包含可选项目列表的弹出窗口。在上一练习的第 20 步中，你点击了图 6-9 中显示的 ChoiceBox 控件。结果，Java
    控制台打印出一条消息，表明你选择了哪个项目。以下来自清单 6-12 的代码片段在 StarterApp 程序中实现了此功能：


    `ChoiceBox choiceBox;`


    `choiceBox = new ChoiceBox(model.choiceBoxItems);`


    `choiceBox.getSelectionModel().selectFirst();`


    `choiceBox.getSelectionModel().selectedItemProperty()`


    `.addListener((observable, oldValue, newValue) -> {`


    `System.out.println(newValue + " chosen in ChoiceBox");`


    `});`


    为了初始选中 ChoiceBox 中的第一个项目，上述代码片段调用了选择框的 `selectionModel` 的 `selectFirst()` 方法。为了检测用户何时在
    ChoiceBox 中选择了一个项目，我们将代码片段中显示的 `ChangeListener` 添加到了选择框选择模型的 `selectedItem` 属性上。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 6 章 ■ 使用 JavaFX UI 控件


    除了上述代码片段中的代码，以下来自清单 6-1 的代码片段包含了我们 `StarterAppModel` 类中的一个实例变量，该变量包含了将在 ChoiceBox
    中显示的对象：`public ObservableList choiceBoxItems = FXCollections.observableArrayList(`


    `"Choice A",`


    `"Choice B",`


    `"Choice C",`


    `"Choice D"`


    `);`


    现在，我们继续介绍一个名为 MenuButton 的控件，它的外观类似于 ChoiceBox，但其行为类似于 Menu。


    使用 MenuButton


    当点击时，MenuButton 控件会弹出一个上下文菜单，其中包含可供选择的 MenuItem 实例。


    在上一练习的第 21 步中，你点击了图 6-9 中显示的 MenuButton 控件。结果，Java 控制台打印出一条消息，表明你选择了哪个 MenuItem。以下来自清单
    6-12 的代码片段在 StarterApp 程序中实现了此功能：


    `MenuItem menuA = new MenuItem("MenuItem A");`


    `menuA.setOnAction(e -> System.out.println(e.getEventType() + " occurred on Menu
    Item A"));` `MenuItem menuB = new MenuItem("MenuItem B");`


    `MenuButton menuButton = new MenuButton("MenuButton");`


    `menuButton.getItems().addAll(menuA, menuB);`


    由于 MenuButton 和 Menu 类之间的相似性，前面代码片段中的概念已在本章前面的“创建 Menu 并定义 Menu Items”部分中介绍过。MenuButton
    的一个显著特性是 `popupSide` 属性，它允许你选择 ContextMenu 应该从 MenuButton 的哪一侧弹出。


    另一种弹出 ContextMenu 而不需要使用 MenuButton 的方法是我们接下来要讨论的主题。


    创建 ContextMenu


    在上一练习的第 30 步中，你在图 6-11 所示的 ScrollPane 的空白区域点击了鼠标辅助按钮，弹出了一个 ContextMenu，你从中选择了一个
    MenuItem。以下来自清单 6-12 的代码片段实现了此行为：


    `MenuItem contextA = new MenuItem("MenuItem A");`


    `contextA.setOnAction(e -> System.out.println(e.getEventType()`


    `+ " occurred on Menu Item A"));`


    `MenuItem contextB = new MenuItem("MenuItem B");`


    `final ContextMenu contextMenu = new ContextMenu(contextA, contextB);`


    `ScrollPane scrollPane = new ScrollPane(variousControls);`


    `...`


    `scrollPane.setOnMousePressed((MouseEvent me) -> {`


    `if (me.getButton() == MouseButton.SECONDARY) {`


    `contextMenu.show(stage, me.getScreenX(), me.getScreenY());`


    `}`


    `});`


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 6 章 ■ 使用 JavaFX UI 控件


    当用户按下鼠标辅助按钮时，在 `setOnMousePressed` 方法中定义的 lambda 表达式会被调用。按照代码片段中的方式调用 `show()`
    方法会使 ContextMenu 在屏幕上鼠标按下的位置显示出来。ContextMenu 必须有一个所有者（可以是 Node 或 Stage）才能显示，这就是为什么将
    Stage 对象传递给 `show()` 方法的原因。


    创建 SplitMenuButton


    与 MenuButton 非常相似，SplitMenuButton 在点击向下箭头时会弹出一个 ContextMenu。此外，当点击 SplitMenuButton
    的主要部分时，其行为类似于 Button。在与图 6-9 中显示的 SplitMenuButton 交互时，上一练习的第 22 和 23 步演示了这两种行为。以下来自清单
    6-12 的代码片段实现了这些行为：`MenuItem splitMenuA = new MenuItem("MenuItem A");`


    `splitMenuA.setOnAction(e -> System.out.println(e.getEventType()`


    `+ " occurred on Menu Item A"));`


    `MenuItem splitMenuB = new MenuItem("MenuItem B");`


    `SplitMenuButton splitMenuButton = new SplitMenuButton(splitMenuA, splitMenuB);`


    `splitMenuButton.setText("SplitMenuButton");`


    `splitMenuButton.setOnAction(e -> System.out.println(e.getEventType()`


    `+ " occurred on SplitMenuButton"));`


    让我们暂时离开类似按钮的 UI 控件，将注意力转向一些接受文本输入的 UI 控件，首先从 TextField 开始。


    定义 TextField


    在练习的第 25 步中，当你向图 6-9 中显示的 TextField 输入文本时，每次内容发生变化（例如，当字符被输入到 TextField 中时），TextField
    的内容都会被打印到 Java 控制台。


    以下来自清单 6-12 的代码片段创建了 TextField 并实现了这些行为：`final TextField textField = new TextField();`


    `textField.setPromptText("Enter user name");`


    `textField.setPrefColumnCount(16);`


    `textField.textProperty().addListener((ov, oldValue, newValue) -> {`


    `System.out.println("TextField text is: " + textField.getText());`


    `});`


    为了检测 TextField 的 text 属性何时发生变化，此代码片段向 text 属性添加了一个 ChangeListener。然后，在 lambda
    表达式的主体中，将 text 属性的新值打印到 Java 控制台。


    使用 PasswordField


    PasswordField 扩展了 TextField 类，其目的是屏蔽输入其中的字符。在练习的第 26 步中，当你向图 6-9 中显示的 PasswordField
    输入文本，随后使 PasswordField 失去焦点时，PasswordField 的内容会被打印到 Java 控制台。以下来自清单 6-12 的代码片段创建了
    PasswordField 并实现了这些行为：


    `final PasswordField passwordField = new PasswordField();`


    `passwordField.setPromptText("Enter password");`


    `passwordField.setPrefColumnCount(16);`


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 6 章 ■ 使用 JavaFX UI 控件


    `passwordField.focusedProperty().addListener((ov, oldValue, newValue) -> {`


    `if (!passwordField.isFocused()) {`


    `System.out.println("PasswordField text is: "`


    `+ passwordField.getText());`


    `}`


    `});`


    为了检测 PasswordField 何时失去焦点，上述代码片段向 focused 属性添加了一个 ChangeListener。如果 PasswordField
    确实没有焦点，则在 lambda 表达式的主体中将 text 属性的值打印到 Java 控制台。


