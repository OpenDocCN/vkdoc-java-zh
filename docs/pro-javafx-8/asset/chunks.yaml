    `price` 字段展示了一种构造 `Double` 对象的方法。`fx:value` 属性调用了 `Double` 上的 `valueOf(String)`
    方法。这适用于任何具有工厂方法 `valueOf(String)` 的 Java 类：


    <price>


    <Double fx:value="3.1415926"/>


    </price>


    `discount` 字段展示了如何使用 Java 类中定义的常量。`fx:constant` 属性访问其元素类型的常量（`public static final`）字段。以下代码将
    `discount` 字段设置为 `Utilities.TEN_PCT`，即 0.1：


    <discount>


    <Utilities fx:constant="TEN_PCT"/>


    </discount>


    `sizes` 字段展示了使用工厂方法创建对象。`fx:factory` 属性在其元素类型上调用指定的工厂方法。在我们的例子中，它调用 `Utilities.createList()`
    来创建一个整数列表，然后用三个整数填充该列表。请注意，`sizes` 是一个读写属性。稍后您将看到一个如何填充只读列表属性的示例。


    <sizes>


    <Utilities fx:factory="createList">


    <Integer fx:value="1"/>


    <Integer fx:value="2"/>


    <Integer fx:value="3"/>


    </Utilities>


    </sizes>


    `profits` 字段展示了如何填充一个读写映射。这里我们将 `profits` 字段设置为我们创建的包含键/值对的 `HashMap`：


    <profits>


    <HashMap q1="1000" q2="1100" q3="1200" a4="1300"/>


    </profits>


    `inventory` 字段展示了如何在一个地方定义对象，并在另一个地方引用它。`fx:define` 元素创建一个独立的、具有 `fx:id` 属性的对象。`fx:reference`
    元素创建对其他地方定义的对象的引用，其 `source` 属性指向先前定义对象的 `fx:id`：


    <fx:define>


    <Long fx:id="inv" fx:value="9765625"/>


    </fx:define>


    <inventory>


    <fx:reference source="inv"/>


    </inventory>


    `products` 字段展示了如何填充一个只读列表。以下 FXML 片段等同于调用 `bean.getProducts().addAll("widget",
    "gadget", "models")`：


