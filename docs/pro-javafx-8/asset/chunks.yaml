    The QuestionRetrievalService extends Service and thus has to implement a createTask
    method.


    When the Service is started, this task is executed in a separate Thread. The createTask
    method on the QuestionRetrievalService creates a new Task and returns it. The
    signature of this method,


    Task<ObservableList<Question>>createTask(),


    ensures that the Task creates an ObservableList of questions. The generic type
    parameter ObservableList<Question> is the same as the type parameter in the declaration
    of the Service. As a consequence, the getValue() method of the Service will also
    return an ObservableList of Questions.


    Indeed, the following code snippet states that the questionRetrievalService.getValue()
    should return an ObservableList<Question>.


