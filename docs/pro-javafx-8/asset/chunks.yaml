    **Chapter 11**


    **Accessing Web Services**


    *An expert is a man who has made all the mistakes which can be made, in a narrow
    field.*


    —Niels Bohr


    The modern application paradigm is clear: Nothing lives in an isolated environment.
    Client applications interact with data obtained from a wide array of resources,
    both physical and logical. Whether data are retrieved from a hard disk, a remote
    database, or an exposed network resource, we expect our applications to be flexible,
    provide a wide array of data retrieval options, and, in general, work well with
    others.


    So far, we’ve explained how the JavaFX Platform can be used both for rendering
    information and for interactively manipulating data. In this chapter, we provide
    a brief overview of the options available for integrating JavaFX


    applications with enterprise systems, and then continue with some specific examples
    of that process.


    Our examples are constructed to demonstrate how easily a JavaFX application can
    access a REST resource and then translate the response (from either JSON or XML
    format) into a format understandable by JavaFX Controls. As our example external
    data source, the StackExchange APIs are ideal, as they are publicly available,
    easy to understand, and widely used on the Internet.


    Front-End and Back-End Platforms


    JavaFX is often considered a front-end platform. Although that statement does
    not do justice to the APIs in the JavaFX platform that are not related to a UI,
    it is true that most JavaFX applications focus on the rich and interactive visualization
    of “content.”


    One of the great things about Java is the fact that a single language can be used
    within a wide range of devices, desktops, and servers. The same Java language
    that creates the core of JavaFX is also the fundamental core of the Java Platform,
    Enterprise Edition (Java EE).


    The Java Platform is the number one development platform for enterprise applications.
    The combination of the JavaFX platform providing a rich and interactive UI with
    enterprise applications running on the Java Platform creates huge possibilities.
    To achieve this, JavaFX applications and Java enterprise applications must be
    exchanging data.


    Exchanging data can happen in a number of ways, and depending on the requirements
    (from the front end as well as from the back end), one way might be more suited
    than another.


    Basically, there are two different approaches:


    • The JavaFX application can leverage the fact that it runs on the same infrastructure
    as typical enterprise applications, and can deeply integrate with these enterprise
    components. This is illustrated in Figure [11-1](#index_split_006.html#p492).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 11 ■ aCCessing Web serviCes


    ***Figure 11-1.** JavaFX and enterprise components on a single system*


    • JavaFX applications live in a relatively simple Java Platform, and exchange
    data with enterprise servers using standard protocols that are already supported
    by Java enterprise components.


    This is shown in Figure [11-2.](#index_split_006.html#p492)


    ***Figure 11-2.** JavaFX application communicates with enterprise components on
    a remote server* The first approach is mentioned and briefly touched on, but the
    focus of this chapter is on the second approach, where the JavaFX client communicates
    with Java enterprise components on a remote server.


    It should also be stressed here that as long as a standard, well-defined protocol
    (e.g., SOAP/REST) is used, it is very possible to connect a JavaFX application
    to a non-Java back-end application. The decoupling between client and server indeed
    allows for different programming languages to be used on the client and on the
    server.


    Merging JavaFX and Java Enterprise Modules in the Same


    Environment


    JavaFX 8 is built on top of the Java Platform, Standard Edition. As a consequence,
    all functionality provided by this platform can be leveraged in JavaFX 8\. The
    Java Platform, Enterprise Edition, is also built on top of the Java Platform,
    Standard Edition. As a consequence, JavaFX applications can live in the same environment
    as applications using the Java Platform, Enterprise Edition.


    The JavaFX developer can thus use his or her favorite enterprise tools to create
    applications. There are a number of advantages in doing so. Enterprise components
    offer tools that allow developers to focus on a specific domain layer, while shielding
    them from, for example, database resources and transactions.


    Java is a popular platform in the enterprise environment, and a number of enterprise
    components and libraries have been developed by companies, organizations, and
    individuals.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 11 ■ aCCessing Web serviCes


    The Java Platform, Enterprise Edition, is defined by specifications that are standardized
    via the Java Community Process (JCP) program. For the different constituting parts,
    individual Java Specification Requests (JSRs) are filed.


    The current version of the Java Platform, Enterprise Edition, Java Enterprise
    Edition 7, contains the following JSRs.


    • Java Servlet 3.1 (JSR 340)


    • JavaServer Faces 2.2 (JSR 344)


    • Java API for WebSocket 1.0 (JSR 356)


    • Java API for JSON Processing 1.0 (JSR 353)


