- fmt: "• `Java Authorization Contract for Containers 1.5` (`JSR 115`)\n• `Java APIs\
    \ for XML Messaging 1.3` (`JSR 67`)\n• `J2EE Management 1.1` (`JSR 77`)\n• `Java\
    \ EE Application Deployment 1.2` (`JSR 88`)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 11 ■ Accessing Web Services\n\nMost of these individual `JSR`s are\
    \ implemented by a number of companies, and implementations are often grouped\
    \ into a product. Typical enterprise components implement one or more `JSR`s,\
    \ and they might include additional product-specific functionality. Among the\
    \ most popular enterprise components we count the `Spring Framework`, `Tomcat/TomEE`,\
    \ `Hibernate`, `JBoss/WildFly`, `RestEasy`, and `GlassFish`. A number of products\
    \ implement all `JSR`s, and those products are then called implementations of\
    \ the `Java Platform, Enterprise Edition`, often referred to as `Java EE Platforms`.\n\
    \nTechnically, there are no restrictions in the `JavaFX` platform that prevent\
    \ Java enterprise components from being used. However, enterprise development\
    \ differs from client development in a number of ways:\n\n• Enterprise infrastructure\
    \ is shifting toward the cloud. Specific tasks (e.g., storage, mail, etc.) are\
    \ outsourced to components in a “cloud” that offer specific functionality. Enterprise\
    \ servers are often located in a cloud environment, allowing fast and seamless\
    \ interaction with cloud components.\n• In terms of resource requirements, enterprise\
    \ systems focus on computing resources (`CPU`, cache, and memory) where desktop\
    \ computers and laptops focus instead on visual resources (e.g., graphical hardware\
    \ acceleration).\n• Startup time is hardly an issue in servers, but is critical\
    \ in many desktop applications. Also, servers are supposed to be up and running\
    \ 24/7, which is not the case with most clients.\n• Deployment and life cycle\
    \ management are often specific to a server product or a client product. Upgrading\
    \ servers or server software is often a tedious process. Downtime has to be minimized\
    \ because client applications might have open connections to the server. Deploying\
    \ a client application can happen in a number of ways, such as via stand-alone,\
    \ self-contained applications or `Java Network Launch Protocol` (`JNLP`).\n• Enterprise\
    \ development uses a number of patterns (e.g., `Inversion of Control`, container-based\
    \ initialization) that can be useful in client development, but that often require\
    \ a different architecture than traditional clients.\n\n### Using JavaFX to Call\
    \ Remote (Web) Services\n\nEnterprise components are often accessed via web resources.\
    \ Some specifications clearly describe how web-based frameworks should interact\
    \ with enterprise components for rendering information. However, there are other\
    \ specifications that allow enterprise components (written in Java or in another\
    \ language) to be accessed from non-web resources as well. Because those specifications\
    \ allow for a decoupling between enterprise development and any other development,\
    \ they have been defined by a number of stakeholders.\n\nIn 1998, `Simple Object\
    \ Access Protocol` (`SOAP`) was invented by Microsoft and subsequently used as\
    \ “the” exchange format between Java applications and `.NET` applications. `SOAP`\
    \ is based on `XML`, and the current version 1.2 became a `W3C` recommendation\
    \ in 2003. Java provides a number of tools that allow developers to exchange data\
    \ with `SOAP`.\n\nAlthough powerful and relatively readable, `SOAP` is often considered\
    \ to be rather verbose. With the rise of mashups and simple services offering\
    \ specific functionality, a new architectural style emerged: the `representational\
    \ state transfer` (`REST`). `REST` allows server and client developers to exchange\
    \ data in a loosely coupled and more streamlined way, where the protocol can be\
    \ `XML`, `JSON`, `Atom`, or any other format.\n\n#### SOAP\n\nA number of Enterprise\
    \ applications use `SOAP` at the back end, and thus require `SOAP` to be supported\
    \ on the client as well. Fortunately, `SOAP` is supported in Java. The examples\
    \ in this chapter use the `REST` protocol inasmuch as this is more comprehensive,\
    \ but using the `javax.xml.soap` package is perfectly possible in `JavaFX` applications,\
    \ because this package is available in the `Java Platform, Standard Edition 8`.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n#### REST\n\nThe remainder\
    \ of this chapter is about calling `REST`-based web services. Plenty of resources\
    \ and documentation about `REST` and `REST`-based web services can be found on\
    \ the Internet. `REST`-based web services expose a number of `URI`s that can be\
    \ accessed using the `HTTP` protocol. Typically, different `HTTP` request methods\
    \ (`get`, `post`, `put`, `delete`) are used to indicate different operations on\
    \ resources.\n\n`REST`-based web services can be accessed using standard `HTTP`\
    \ technologies, and the `Java Platform` comes with a number of `API`s (mainly\
    \ in `java.io` and `java.net`) that facilitate access to `REST`-based web services.\n\
    \nOne of the major advantages of `JavaFX` being written on top of the `Java Platform,\
    \ Standard Edition 8`, is the ability to use all of these `API`s in `JavaFX` applications.\
    \ This is what we do in the first examples in this chapter. We show how we can\
    \ use Java `API`s for consuming `REST`-based web services and how we can integrate\
    \ the result in a `JavaFX` application.\n\nNext, we show how to leverage the `JavaFX`\
    \ `API`s to avoid common pitfalls (e.g., unresponsive applications, no dynamic\
    \ update, etc.). Finally, we give a brief overview of third-party libraries that\
    \ make it easy for `JavaFX` developers to access `REST`-based web services.\n\n\
    ### Setting Up the Application\n\nFirst of all, we create the framework for our\
    \ samples. We will use the `API`s provided by `Stack Exchange`. The `Stack Exchange`\
    \ network is a cluster of forums, each in a specific domain, where questions and\
    \ answers are combined in such a way that the “best” answers from the most trusted\
    \ users bubble to the top. Java developers are probably familiar with `StackOverflow`,\
    \ which was the first site in `Stack Exchange` and provides an incredible number\
    \ of questions and related answers for IT-related issues.\n\n> **Note:** In the\
    \ previous edition of this book, *Pro JavaFX 2,* we used the `Twitter API` in\
    \ the examples for this chapter. The `Twitter API` is still available, and it\
    \ is very good example of how to use `REST` services. However, all requests to\
    \ the `Twitter API` now need to be authenticated. Although this is fully understandable,\
    \ it makes it a bit harder to get started with a simple example. As you will see\
    \ in this chapter, we start by making a simple `HTTPConnection` to a `REST` endpoint,\
    \ and we don’t worry about authentication. The frameworks we introduce near the\
    \ end of the chapter, are capable of using `OAuth`-based authentication, and the\
    \ connection to the `Twitter API` is left as an exercise for the interested developer.\n\
    \nThe `REST` `API`s provided by `StackExchange` are very well described at [https://api.stackexchange.com](https://api.stackexchange.com/).\
    \ It is not our goal to explore all the possibilities offered by `StackExchange`\
    \ and the corresponding `API`s, so the interested reader is referred to the documentation\
    \ available on the web site.\n\nIn the samples in this chapter, we want to visualize\
    \ the author of a question, the title of the question, and the day the question\
    \ was asked.\n\nInitially, we represent a question by a Java Object with getters\
    \ and setters. This is shown in Listing 11-1.\n\n**Listing 11-1.** `Question`\
    \ Class\n\n```java\npackage projavafx;\n\npublic class Question {\n\n    private\
    \ String owner;\n    private String question;\n    private long timestamp;\n\n\
    \    public Question() {\n    }\n\n    public Question(String o, String q, long\
    \ t) {\n        this.owner = o;\n        this.question = q;\n        this.timestamp\
    \ = t;\n    }\n\n    public String getOwner() {\n        return owner;\n    }\n\
    \n    public void setOwner(String owner) {\n        this.owner = owner;\n    }\n\
    }\n```"
