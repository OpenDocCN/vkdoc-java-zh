- fmt: '# Using SceneBuilder to Create a User Interface


    ## Overview of JavaFX SceneBuilder


    Because laying out a UI is a highly subjective, sometimes artistic endeavor, a
    lot depends on the application at hand and the design sensibilities of the UI
    and user experience teams. We do not pretend to know the best ways of doing UI
    design. So in this section, we give you a guided tour of the `JavaFX SceneBuilder
    2.0` itself, point out to you the various parts of the UI designer, and discuss
    how to turn the knobs and switch the gears to achieve a desired result.


    When you start `JavaFX SceneBuilder`, the screen looks like Figure [3-9](#index_split_001.html#p129).


    ***Figure 3-9.** The JavaFX SceneBuilder program*


    When first started, the `JavaFX SceneBuilder` UI has a menu bar at the top, two
    accordion containers named `Library` and `Document` on the left side of the screen,
    a `Content Panel` in the middle of the screen, and an accordion container named
    `Inspector` on the right of the screen.


    ## Understanding the Menu Bar and Items


    There are nine menus in `JavaFX SceneBuilder`. Let’s examine them one by one.


    The `File` menu is shown in Figure [3-10.](#index_split_001.html#p130)


    ***Figure 3-10.** The File menu*


    The `New`, `Open`, `Save`, `Save As`, `Revert to Saved`, `Reveal in Explorer`
    (or `Finder`, or `Desktop`), `Close Window`, and `Exit` menu items do pretty much
    what you think they should do. The `New from Template` menu item creates a new
    `FXML` file from an existing template. The list of templates is shown in Figure
    [3-11](#index_split_001.html#p130).


    ***Figure 3-11.** The templates*


    The `Import` menu item allows you to copy the content of another `FXML` file into
    the current `FXML` file. It also allows you to add image and media files to the
    current `FXML` file. Such imported files are wrapped in an `ImageView` or `MediaView`
    node. The `Include` menu item allows you to add an `fx:include` element into the
    current `FXML` file. The `Close Window` menu item closes the `FXML` file being
    edited in the current window. The `Preferences` menu item allows you to set certain
    preferences that control how `JavaFX SceneBuilder` looks. The `Quit` menu item
    allows you to exit the `JavaFX SceneBuilder` application entirely. It will ask
    you to save any unsaved files before shutting the application down.


    The `Edit` menu is shown in Figure [3-12.](#index_split_001.html#p131)


    ***Figure 3-12.** The Edit menu*


    The `Undo`, `Redo`, `Cut`, `Copy`, `Paste`, `Paste Into`, `Duplicate`, `Delete`,
    `Select All`, `Select None`, `Select Parent`, `Select Next`, and `Select Previous`
    menu items all perform their normal duties. The `Trim Document to Selection` menu
    item deletes everything that is not selected.


    The `View` menu is shown in Figure [3-13.](#index_split_001.html#p132)


    ***Figure 3-13.** The View menu*


    The `Content` menu item puts the focus on the `Content Panel` in the middle of
    the screen. The `Properties`, `Layout`, and `Code` menu items put the focus on
    the `Property`, `Layout`, or `Code` sections in the `Inspector Panel` on the right
    side of the screen. The `Hide Library` command hides the `Library Panel` on the
    top of the left side of the screen. The menu item will change to `Show Library`
    once the `Library` is hidden. The `Hide Document` menu item does the same to the
    `Document Panel` on the bottom of the left side of the screen. The `Show CSS Analyzer`
    menu item shows the `CSS Analyzer`, which is initially not shown. The `Hide Left
    Panel` and `Hide Right Panel` menu items hide the `Left Panel` (the `Library Panel`
    and the `Document Panel`) or the `Right Panel` (the `Inspector Panel`). The `Show
    Outlines` menu item shows the outlines of the items. The `Show Sample Data` menu
    item will show sample data for `TreeView`, `TableView`, and `TreeTableView` nodes
    to help you visualize the node at work. The sample data are not saved with the
    `FXML` file.


    The `Disable Alignment Guides` menu item disables the alignment guidelines that
    are shown when you move a node around in a container in the `Content Panel`. These
    alignment guidelines help you to position the nodes in the right spot on the screen.
    The `Zoom` menu item allows you to change the magnification rate of the `Content
    Panel`. The `Show Sample Controller Skeleton` menu item will open a dialog box
    showing a skeleton controller class declaration based on the controller setting
    made in the `Document Panel` and the `fx:ids` declared for the nodes in the `FXML`
    file.


    Figure [3-14](#index_split_001.html#p133) shows the `JavaFX SceneBuilder` screen
    with the `CSS Analyzer` shown.


    ***Figure 3-14.** The JavaFX SceneBuilder screen with the CSS Analyzer shown*


    The `Insert` menu is shown in Figure [3-15](#index_split_001.html#p133).


    ***Figure 3-15.** The Insert menu*


    The `Insert` menu contains submenus and menu items that allow you to insert different
    kinds of nodes into the `Content Panel`. The submenus and their menu items represent
    the same hierarchy as in the `Library Panel`. They include the `Containers`, `Controls`,
    `Menu`, `Miscellaneous`, `Shapes`, `Charts`, and `3D` categories. We cover these
    nodes in more detail in subsequent chapters.


    The `Modify` menu is shown in Figure [3-16](#index_split_001.html#p134).


    ***Figure 3-16.** The Modify menu*


    The `Fit to Parent` menu item will expand the selected node to fill an `AnchorPane`
    container and anchor the node to the parent on all sides. The `Use Computed Sizes`
    menu item will resize the selected element to `USE_COMPUTED_SIZE`.


    The `GridPane` submenu contains items that work with the `GridPane` container.
    The `Set Effect` submenu contains items for each effect that can be set on the
    current node. The `Add Popup Control` allows you to add a `ContextMenu` or a `Tooltip`
    to the selected node. The `Scene Size` submenu allows you to change the size of
    the scene to some popular sizes, including `320x240` (QVGA), `640x480` (VGA),
    `1280x800`, and `1920x1080`.


    The `Arrange` menu is shown in Figure [3-17.](#index_split_001.html#p135)


    ***Figure 3-17.** The Arrange menu*


    The `Bring to Front`, `Send to Back`, `Bring Forward`, and `Send Backward` menu
    items move the selected node to the front, back, up, or down the z-order of overlapping
    nodes. The `Wrap in` submenu contains items for each container type and allows
    you to wrap a group of selected nodes into the container. For example, you can
    choose to wrap two adjacent `Labels` into an `HBox`. The `Unwrap` menu item removes
    the container from the selected node.'
