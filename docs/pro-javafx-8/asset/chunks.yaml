    .default-color0.chart-pie {


    -fx-pie-color: blue;


    }


    其他扇区也可以进行同样的操作。


    如果你在没有 CSS 其他部分的情况下运行此示例，你会注意到图表本身相当小，并且标签的大小占用了太多空间。因此，我们按如下方式修改标签的字体大小：


    .chart-pie-label {


    -fx-font-size:9px;


    }

