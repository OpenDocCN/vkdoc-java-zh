    • **BOTTOM** 原点会将文本底部（包括下行部分，例如小写字母 g 的底部）放置在 `layoutY` 位置。

    • **BASELINE** 原点会将文本基线（不包括下行部分）放置在 `layoutY` 位置。这是 `Text` 实例的 `textOrigin` 属性的默认值。


    `wrappingWidth` 属性允许您指定文本在多少像素处换行。


    `textAlignment` 属性允许您控制文本的对齐方式。在我们的示例中，`TextAlignment.JUSTIFY` 使文本在左右两侧都对齐，通过增加单词之间的间距来实现这一点。


    我们显示的文本足够长，可以换行并绘制在地球上，因此我们需要定义一个矩形区域，文本不能超出该区域显示。


    ■ **提示** 我们建议您修改一些值，重新编译示例，然后再次运行。这将帮助您理解不同属性的工作方式。或者，通过使用 ScenicView，您可以在运行时检查和修改不同的属性。


    将图形节点作为一个组来使用


    JavaFX 的一个强大图形功能是能够创建场景图，它由图形节点的树状结构组成。然后，您可以为层次结构中的 `Group` 的属性赋值，该 `Group` 中包含的节点将受到影响。在我们当前来自清单
    1-1 的示例中，我们使用一个 `Group` 来包含一个 `Text` 节点，并在该 `Group` 内裁剪一个特定的矩形区域，以便文本在向上动画时不会出现在月球或地球上。以下是相关的代码片段：


    ```java

    Group textGroup = new Group(textRef);

    textGroup.setLayoutX(50);

    textGroup.setLayoutY(180);

    textGroup.setClip(new Rectangle(430, 85));

    ```


    请注意，该 `Group` 位于其默认位置右侧 50 像素、下方 180 像素处。这是由于为 `Group` 实例的 `layoutX` 和 `layoutY`
    变量赋值所致。由于此 `Group` 直接包含在 `Scene` 中，其左上角的位置位于 `Scene` 左上角右侧 50 像素、下方 180 像素处。在阅读其余解释时，请查看图
    1-5 以查看此示例的图示。


    ***图 1-5.** Scene、Group、Text 和裁剪区域的图示*


    一个 `Group` 实例通过 `children()` 方法将 `Node` 子类的实例集合分配给它自身来包含这些实例。在前面的代码片段中，`Group`
    包含一个 `Text` 实例，该实例的 `layoutY` 属性已被赋值。由于此 `Text` 包含在 `Group` 中，它采用 `Group` 的二维空间（也称为坐标空间），`Text`
    节点的原点 (0,0) 与 `Group` 的左上角重合。


    将 `layoutY` 属性赋值为 100 会导致 `Text` 位于 `Group` 顶部下方 100 像素处，刚好在裁剪区域底部下方，从而使其在动画开始前不可见。


    由于没有为 `layoutX` 变量赋值，其值为 0（默认值）。


    刚才描述的 `Group` 的 `layoutX` 和 `layoutY` 属性是我们之前所述“`Group` 中包含的节点将受到赋给 `Group` 属性的值的影响”的示例。另一个示例是将
    `Group` 实例的 `opacity` 属性设置为 0.5，这会导致该 `Group` 中包含的所有节点变得半透明。如果手边有 JavaFX API 文档，请查看
    `javafx.scene.Group` 类中可用的属性。然后查看 `javafx.scene.Node` 类中可用的属性，您可以在其中找到 `Group`
    类继承的 `layoutX`、`layoutY` 和 `opacity` 变量。


