    \n## Chapter 9 ■ Using the Media Classes\n\n### MediaView and Effects\n\nAll of\
    \ the normal effects that can be applied to a `Node` can also be applied to a\
    \ `MediaView`. Some care must be taken to ensure that the effects are not so expensive\
    \ as to interfere with the smooth playback of the movie. With that caveat in place,\
    \ we go over some of the effects that are commonly in use with media player applications.\
    \ Reflections (see `javafx.scene.effect.Reflection`) are a popular effect, specifically\
    \ in demos that are meant to show off a platform’s graphical horsepower. A reflection\
    \ can make the movie look as if it is sitting on a shiny surface. The effect is\
    \ very compelling because the reflection is updated in real time to match the\
    \ movie. JavaFX’s `ColorAdjust` effect can be used to alter the colors in the\
    \ movie for a fun and visually interesting effect. If you’re in a more artsy kind\
