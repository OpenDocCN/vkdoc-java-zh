    理解 Image Ops API


    JavaFX Image Ops API 允许 JavaFX 程序在像素级别操作图像。JavaFX Image Ops API 的关键是 `javafx.scene.image`
    包中的一对接口：`PixelReader` 和 `PixelWriter`。你可以从 `javafx.scene.image.Image` 对象获取 `PixelReader`。并且可以从
    `javafx.scene.image.WritableImage` 对象获取 `PixelWriter`。`WritableImage` 是 `Image`
    的子类。


    `PixelReader` 接口包含以下公共方法：


    • `PixelFormat getPixelFormat()`


    • `int getArgb(int x, int y)`


    • `Color getColor(int x, int y)`


    • `<T extends Buffer> void getPixels(int x, int y, int w, int h, WritablePixelFormat<T>
    pixelFormat, T buffer, int scanlineStride)`


    • `void getPixels(int x, int y, int w, int h, WritablePixelFormat<ByteBuffer>
    pixelFormat, byte[] buffer, int offset, int scanlineStride)`


    • `void getPixels(int x, int y, int w, int h, WritablePixelFormat<IntBuffer> pixelFormat,
    int[] buffer, int offset, int scanlineStride)`


    `getPixelFormat()` 方法返回底层图像的像素格式。`getArgb()` 方法将像素的颜色作为一个 32 位整数返回，其从最高有效字节到最低有效字节的
    4 个字节包含指定像素颜色的 ARGB 分量。`getColor()` 方法将指定像素的颜色作为 `Color` 对象返回。`getPixels()` 方法接受由前四个参数
    (x, y, w, h) 指定的图像区域，读取这些像素的颜色，并根据 `WritablePixelFormat`、缓冲区类型、偏移量和 `scanlineStride`
    将它们写入缓冲区。


    `PixelWriter` 接口包含以下公共方法：


    • `PixelFormat getPixelFormat()`


    • `void setArgb(int x, int y, int argb)`


    • `void setColor(int x, int y, Color color)`


    • `<T extends Buffer> void setPixels(int x, int y, int w, int h, PixelFormat<T>
    pixelFormat, T buffer, int scanlineStride)`


    • `void setPixels(int x, int y, int w, int h, PixelFormat<ByteBuffer> pixelFormat,
    byte[] buffer, int offset, int scanlineStride)`


    • `void setPixels(int x, int y, int w, int h, PixelFormat<IntBuffer> pixelFormat,
    int[] buffer, int offset, int scanlineStride)`


    • `void setPixels(int dstx, int dsty, int w, int h, PixelReader reader, int srcx,
    int srcy)`


    `getPixelFormat()` 方法返回底层 `WritableImage` 的像素格式。`setArgb()` 方法将像素 (x, y) 的颜色设置为
    argb。`setColor()` 方法将像素 (x, y) 的颜色设置为 color。


    接受 `pixelFormat` 参数的 `setPixels()` 方法将区域 (x, y, w, h) 中像素的颜色设置为缓冲区中指定的值，具体取决于
    `PixelFormat`、缓冲区类型、偏移量和 `scanlineStride`。接受 `PixelReader` 的 `setPixels()` 方法根据从
    `PixelReader` 获取的内容，从像素 (srcx, srcy) 开始，设置区域 (dstx, dsty, w, h) 中像素的颜色。


    `PixelFormat` 和 `WritablePixelFormat` 描述了每个像素的颜色信息如何存储。`PixelFormat` 的可能类型由枚举
    `PixelFormat.Type` 描述，它具有以下声明符：`INT_ARGB_PRE`、`INT_ARGB`、`BYTE_BGRA_PRE`、`BYTE_BGRA`、`BYTE_RGB`、`BYTE_INDEXED`。


