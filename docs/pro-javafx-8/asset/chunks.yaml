    在本节中，我们将向您展示如何在 JavaFX 中创建完全可调整大小的自定义 Region，以构建构成游戏棋盘的 Reversi 棋子和方格。在下一节中，我们将向您展示如何从头开始构建动态容器，以容纳这些可调整大小的节点，并使用最终的布局
    GridPane 来构建一个动态棋盘，该棋盘可同时调整方格和棋子的大小。


    **构建自定义方形 Region**


    所有 JavaFX 布局的基础类是 Region。它拥有用于获取布局边界首选项的标准函数，以及用于设置节点宽度和高度的变量。在本节中，我们将向您展示如何通过扩展
    Region 来构建一个能够动态响应高度和宽度变化的 Reversi 棋盘方格。Region 类有十个属性可用于控制尺寸和布局，如表 5-7 所示。


