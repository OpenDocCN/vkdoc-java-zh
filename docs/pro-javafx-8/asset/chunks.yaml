    \n# Chapter 13\n\n# JavaFX Languages and Markup\n\n*Computer programming is tremendous\
    \ fun. Like music, it is a skill that derives from an unknown blend of innate\
    \ talent and constant practice. Like drawing, it can be shaped to a variety of\
    \ ends—commercial, artistic, and pure entertainment. Programmers have a well-deserved\
    \ reputation for working long hours, but are rarely credited with being driven\
    \ by creative fevers. Programmers talk about software development on weekends,\
    \ vacations, and over meals not because they lack imagination, but because their\
    \ imagination reveals worlds that others cannot see.*\n\n—Larry O’Brien and Bruce\
    \ Eckel\n\nJavaFX provides a rich set of capabilities for building applications\
    \ that lets you create immersive UIs that go beyond what you can accomplish with\
    \ traditional UI toolkits. However, it does not stop there, because JavaFX sits\
    \ on top of the Java language, so you can also take full advantage of all the\
    \ languages and tools that have been developed for the Java platform. Also, JavaFX\
