    Chapter 8 ■ Creating Charts in JavaFX


    The Simple Example


    Our example shows the “market share” of a number of programming languages, based
    on the TIOBE index in December 2011\. The TIOBE Programming Community Index is
    available a[t www.tiobe.com/index.php/content/](http://www.tiobe.com/index.php/content/paperinfo/tpci/index.html)


    [paperinfo/tpci/index.html, and it pr](http://www.tiobe.com/index.php/content/paperinfo/tpci/index.html)ovides
    an indication of the popularity of programming languages based on search engine
    traffic. A screenshot of the ranking in December 2011 is shown in Figure [8-2](#index_split_004.html#p353).


    ***Figure 8-2.** Screenshot of the TIOBE index in December 2011, taken fr[om www.tiobe.com/index.php/content/](http://www.tiobe.com/index.php/content/paperinfo/tpci/index.html)*


    [*paperinfo/tpci/index.html*](http://www.tiobe.com/index.php/content/paperinfo/tpci/index.html)


    ■ **Note** the algorithm used by tiOBe is described at [www.tiobe.com/index.php/content/paperinfo/tpci/tpci_](http://www.tiobe.com/index.php/content/paperinfo/tpci/tpci_definition.htm)


    [definition.htm.](http://www.tiobe.com/index.php/content/paperinfo/tpci/tpci_definition.htm)


    the scientific value of the numbers is out of scope for our examples.


