    The SpectrumListener constructor takes three parameters. The first is the center
    frequency of the first equalizer band. The second is the MediaPlayer instance
    to which this listener will be attached. The third is the array of SpectrumBar
    controls that the listener will update. This array is saved in the class’s instance
    data for later use. The MediaPlayer instance is used to gain access to the data
    needed by the listener during initialization. This includes the value of the audioSpectrumNumBands
