    为 3D 形状添加纹理


    `diffuseMap`（漫反射贴图）和`specularMap`（高光贴图）的作用与`diffuseColor`（漫反射颜色）和`specularColor`（高光颜色）相同，区别在于贴图为
    3D 形状表面上的不同点提供了不同的颜色值。`bumpMap`（凹凸贴图）和`selfIlluminationMap`（自发光贴图）也类似地映射到 3D 形状表面的点上。`selfIlluminationMap`提供的颜色即使在没有光照照射
    3D 物体时也能显现出来。`bumpMap`完全不包含颜色信息。它包含的是表面上每个点的法向量信息（恰好是三个数字，可以编码为 RGB 颜色），在进行颜色渲染计算时考虑这些信息，会产生凹凸不平的外观。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 10 章 ■ JavaFX 3D


    将表面上的点映射到图像上的点，这是`TriangleMesh`（三角形网格）的工作。我们在本章前面部分使用用户定义的`TriangleMesh`构建了一个`MeshView`。实际上，预定义的
    3D 形状内部也是基于`TriangleMesh`的。因此，它们也能够被纹理化。回想一下，在`TriangleMesh`中，每个面由六个索引定义：*p0*、*t0*、*p1*、*t1*、*p2*、*t2*，其中*p0*、*p1*、*p2*是`points`数组的索引，而*t0*、*t1*、*t2*是`texCoords`数组的索引。通过*t0*、*t1*、*t2*查找`texCoords`数组，我们得到坐标(
    *u0*、*v0*)、( *u1*、*v1*)和( *u2*、*v2*)。由这三个坐标确定的图像三角形部分被映射到 3D 形状的面上。


    在清单 10-8 的程序中，我们使用一张世界地图图像作为球体的`diffuseMap`来制作一个地球仪。


    ***清单 10-8.*** EarthSphere.java


