    Chapter 9 ■ Using the Media Classes


    The createEQBands method begins by getting the list of EqualizerBands from the
    AudioEqualizer associated with the current MediaPlayer. The list is then cleared
    to make way for the bands that we want to create. The minimum and maximum gains
    for an EqualizerBand on the current platform are accessible through the EqualizerBand.MIN_


    GAIN and EqualizerBand.MAX_GAIN constants. These constants should always be used
    in calculations involving the range of valid gain values. We use them to define
    the min, max, and mid (the midpoint of the gain range) variables. A for loop then
    creates the number of EqualizerBands defined by the BAND_COUNT constant, setting
    their gain values in a nice cosine wave pattern. This pattern emphasizes the bass
    and high-range frequencies, which makes a nice set of default values.


    Afterward, a second for loop iterates through the list of EqualizerBand instances
    we just created and creates a corresponding Slider control and frequency Label
    for each one. Each Slider is created by the createEQSlider method. The new Slider’s
    value property is bidirectionally bound to the EqualizerBand’s gain property inside
    this method. This is the crucial part that gives the user control of the band’s
    gain. Note that each Slider is also given a style class of eqSlider. We use this
    class later to add some nice styling to our equalizer display.


    The final step in the createEQBands method is to set the alignment and grow constraints
    of the Slider and Label and add them to the GridPane layout node. The Sliders
    are set to grow horizontally so that the GridPane will expand to fill the width
    of the window. Of course, the same result could have been achieved by setting
    the Labels to grow, but then we would also have had to reset the Label’s maximum
    size because all Labels, by default, have their maximum size set equal to their
    preferred size. The Labels and Sliders populate rows one and two in the GridPane,
    leaving row zero for the spectrum display.


    MediaPlayer has four properties that deal with the frequency spectrum of the current
    audio track: audioSpectrumListener, audioSpectrumInterval, audioSpectrumNumBands,
    and audioSpectrumThreshold. The audioSpectrumListener property is an instance
    of the AudioSpectrumListener interface. You use MediaPlayer’s setAudioSpectrumListener
    method to attach the listener, which then enables the computation of spectrum
    data and sends periodic updates to the listener’s spectrumDataUpdate method. Calling
    setAudioSpectrumListener again with a null value turns off audio spectrum calculations
    and updates.


    The audioSpectrumInterval property lets you control the interval at which updates
    are sent to the AudioSpectrumListener. The value is specified in seconds, and
    its default value is 0.1 seconds, which means that by default your listener will
    receive 10 spectrum updates per second. The number of spectrum bands that will
    be reported to the listener is controlled by the audioSpectrumNumBands property.
    The audioSpectrumThreshold property defines the minimum value that will be reported
    for a given spectral band. This value has a unit of decibels and must be less
    than zero.


