    the top with a fixed height and the score boxes are aligned to the bottom, also
    with a fixed height. All remaining space in the center is occupied by the grid.
    This could also have been done using bind expressions, but using a BorderPane
    guarantees that the layout function will be called once per layout cycle, yielding
    higher performance and artifact-free layout.


