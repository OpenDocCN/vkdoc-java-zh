    The Task instance that we created in the QuestionRetrievalService has to implement
    the call method. This method is actually doing what the getObservableList method
    in the previous examples was doing: retrieving the data and parsing them.


    Although the real work in a Service (the Task created by createTask) is done in
    a background Thread, all methods on the Service, including the getValue() call,
    should be accessed from the JavaFX Thread. The internal implementation makes sure
    that all changes to the available properties in the Service are executed on the
    JavaFX


