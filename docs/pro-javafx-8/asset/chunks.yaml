  trans: '

    JavaFX 3D 图形 API 的光照类层次结构由抽象类 `LightBase` 及其具体子类 `AmbientLight` 和 `PointLight`
    组成。它们属于 `javafx.scene` 包。`AmbientLight` 是一种似乎来自四面八方的光源。`PointLight` 是一种在空间中具有固定点，并向远离自身的各个方向均匀辐射光线的光源。它们都是节点（Node），因此可以添加到
    JavaFX 场景中为场景提供光照。它们也可以使用平移变换（Translate transform）移动到所需位置。如果将它们添加到容器中，那么当容器被变换时，它们会随容器一起移动。


    **理解 LightBase 类**


    `LightBase` 抽象类具有以下公共方法：


    • `void setColor(Color)`


    • `Color getColor()`


    • `ObjectProperty<Color> colorProperty()`


    • `void setLightOn(boolean)`


    • `boolean isLightOn()`


    • `BooleanProperty lightOnProperty()`


    • `ObservableList<Node> getScope()`


    这些方法为 `LightBase` 类定义了 `color` 和 `lightOn` 两个属性。`color` 属性的类型为 `Color`，用于定义光的颜色。`lightOn`
    属性是一个布尔属性，用于控制光是否开启。`getScope()` 方法返回一个 `ObservableList<Node>`。当此列表为空时，光照会影响场景中的所有节点。当此列表不为空时，光照仅影响列表中包含的节点。


    **理解 AmbientLight 类**


    `AmbientLight` 类具有以下构造方法：


    • `AmbientLight()`


    • `AmbientLight(Color color)`


    默认构造方法创建一个默认颜色为 `Color.WHITE` 的 `AmbientLight`。单参数构造方法创建一个具有指定颜色的 `AmbientLight`。除了从基类
    `LightBase` 继承的方法外，`AmbientLight` 类没有额外的公共方法。


    **理解 PointLight 类**


    `PointLight` 类具有以下构造方法：


    • `PointLight()`


    • `PointLight(Color color)`


    [www.it-ebooks.info](http://www.it-ebooks.info/)


