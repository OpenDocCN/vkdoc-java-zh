    `getReadOnlyProperty()` 方法，该方法返回一个与主 Property 同步的 ReadOnlyProperty。当你需要为组件的实现提供一个功能完备的
    Property，但又只想向组件的客户端提供一个 ReadOnlyProperty 时，它们非常方便使用。


    • 可以扩展 IntegerPropertyBase 系列抽象类来提供完整 Property 类的实现，尽管在实践中，SimpleIntegerProperty
    系列类更易于使用。IntegerPropertyBase 系列类中唯一的抽象方法是 `getBean()` 和 `getName()`。


    • 可以扩展 ReadOnlyIntegerPropertyBase 系列抽象类来提供 ReadOnlyProperty 类的实现。这很少有必要。ReadOnlyIntegerPropertyBase
    系列类中唯一的抽象方法是 `get()`、`getBean()` 和 `getName()`。


    • 可以在调用 `addListener()` 之前，使用 WeakInvalidationListener 和 WeakChangeListener 类来包装
    InvalidationListener 和 ChangeListener 实例。它们持有被包装监听器实例的弱引用。只要你在自己这边持有对被包装监听器的引用，弱引用就会保持活跃，你就能接收到事件。当你处理完被包装的监听器并从自己这边取消对其的引用后，弱引用就有资格被垃圾回收，并随后被回收。所有
    JavaFX 属性和绑定框架的 Observable 对象都知道如何在弱引用被垃圾回收后清理弱监听器。这可以防止在监听器使用后未被移除时发生内存泄漏。WeakInvalidationListener
    和 WeakListener 类实现了 WeakListener 接口，如果被包装的监听器实例已被垃圾回收，其 `wasGarbageCollected()`
    方法将返回 true。


