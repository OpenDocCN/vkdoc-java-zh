    理解 **Service<V>** 抽象类


    Service<V> 抽象类是 Worker 接口的一个实现，旨在被重用。它通过允许其状态重置为 Worker.State.READY 来扩展 Worker
    的状态模型。Service<V> 抽象类不扩展任何类，并实现了 Worker 和 EventTarget 接口。除了 Worker 接口的九个只读属性外，Service<V>
    还有一个额外的名为 executor 的 Executor 类型的读写属性。它还具有事件处理器属性和受保护的事件回调方法，就像 Task 类一样。以下是 Service<V>
    其余方法的列表：


    • protected abstract Task<V> createTask()

    • public void start()

    • public void reset()

    • public void restart()

    • public boolean cancel()


    Service<V> 的扩展必须重写受保护的抽象方法 createTask() 以生成一个新创建的 Task。start() 方法只能在 Service<V>
    对象处于 Worker.State.READY 状态时调用。

