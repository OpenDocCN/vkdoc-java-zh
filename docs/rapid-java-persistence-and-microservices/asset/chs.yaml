  \ `Post`（Sample Title），这是根据第 5.2.2 节中的脚本创建的。\n\n## Spring Data for NoSQLs\n\n我认为，Spring\
  \ Data 是 Java 相较于其他语言框架仍然闪耀的最大原因。Spring Data 提供了相同的基于仓库的便捷 API 模型，该模型通过 ORM 适用于许多关系型数据库，同时也适用于\
  \ NoSQL 数据库。让我们看一个使用 MongoDB（作为最简单的通用 NoSQL 数据库）的示例。我们将继续使用之前的博客应用示例，并对 `Post` 和\
  \ `Comment` 对象执行数据操作。\n\n让我们使用以下代码结构构建示例应用程序：\n\n`blog-spring-data-mongodb-ch5`\n\
  \n\n\n```\n.\n├── build.gradle\n└── src\n├── main\n│   ├── java\n│   │   └── com\n\
  │   │       └── example\n│   │           └── blog_app\n│   │               ├── BlogApp.java\n\
  │   │               ├── model\n│   │               │   └── mongo\n│   │        \
  \       │       ├── Comment.java\n│   │               │       ├── Post.java\n│ \
  \  │               │       └── PostStatus.java\n│   │               └── repository\n\
  │   │                   └── PostMongoRepository.java\n│   └── resources\n└── test\n\
  ├── java\n│   └── com\n│       └── example\n│           └── blog_app\n│        \
  \       └── BlogTests.java\n└── resources\n```\n\n### 应用设置\n\n正如我们在前几章中所见，我们首先从\
  \ [`http://www.spring.io`](http://www.spring.io) 创建一个新应用，并在 `build.gradle` 文件中添加以下依赖项（参见清单\
  \ 5-10）。\n\n```\ndependencies\ncompile('org.springframework.boot:spring-boot-starter-web')\n\
  compile(\"org.springframework.boot:spring-boot-starter-data-mongodb\")\ncompile('org.projectlombok:lombok:1.18.6')\n\
  testCompile('junit:junit:4.12')\ntestCompile('org.springframework.boot:spring-boot-starter-test')\n\
  annotationProcessor(\"org.projectlombok:lombok:1.18.6\")\ntestAnnotationProcessor(\"\
  org.projectlombok:lombok:1.18.6\")\n}\n清单 5-10\nbuild.gradle 文件\n```\n\n### 数据模型\n\
  \n在清单 5-11 中，我们定义了两个数据模型 `Post` 和 `Comment`，它们之间是一对多的关联关系。`Post` 对象作为父对象，包含一个由不同用户创建的评论列表。\n\
  \n```\npackage com.example.blog_app.model.mongo;\nimport lombok.*;import org.springframework.data.annotation.Id;\n\
  import java.io.Serializable;\nimport java.util.Set;\n@Data\n@Builder\n@EqualsAndHashCode(exclude\
  \ = {\"comments\"})\npublic class Post implements Serializable {\n@Id\nprivate String\
  \ id;\nprivate String title;\nprivate String content;\nprivate PostStatus postStatus;\n\
  private String blogName;\nprivate String userName;\nprivate Set comments;\n}\npackage\
  \ com.example.blog_app.model.mongo;\nimport lombok.Data;\nimport org.springframework.data.annotation.Id;\n\
  @Data\npublic class Comment {\n@Id\nprivate String id;\nprivate String content;\n\
  public Comment(String content)   {\nthis.content = content;\n}\n}\npackage com.example.blog_app.model.mongo;\n\
  import java.io.Serializable;\npublic enum PostStatus implements Serializable {\n\
  ACTIVE(1), NOT_ACTIVE(2);\nint status;\nPostStatus(int status)  {\nthis.status =\
  \ status;\n}\n}\n清单 5-11\n数据模型类\n```\n\n### 注意\n\n我们在主键上使用了 Spring Data 的 `@Id (org.springframework.data.annotation.Id)`\
  \ 注解，而不是 JPA 的 `@Id (javax.persistence.Id)`。这是 NoSQL 中 JPA 注解的等效实现。\n\n### 数据仓库\n\
  \n由于我们尝试在 NoSQL 中建模基于嵌套集合的架构，因此我们使用单个集合以 JSON 格式将 `Post` 相关数据存储为 MongoDB 文档。清单 5-12\
  \ 中的代码展示了该仓库。\n\n```\npackage com.example.blog_app.repository;\nimport com.example.blog_app.model.mongo.Post;\n\
  import org.springframework.data.mongodb.repository.MongoRepository;\nimport java.util.List;\n\
  public interface PostMongoRepository extends MongoRepository {\nPost findByTitle(String\
  \ title);\nList findByBlogName(String blogName);\n}\n清单 5-12\n仓库接口\n```\n\n### 引导程序\n\
  \n让我们在 `Application` 类中定义引导代码（参见清单 5-13）。\n\n```\npackage com.example.blog_app;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\n@SpringBootApplication\n\
  @Slf4j\npublic class BlogApp {\npublic static void main(String[] args) {\nSpringApplication.run(BlogApp.class,\
  \ args);\n}\n}\n清单 5-13\n应用类\n```\n\n### 测试用例\n\n在清单 5-14 中，我们通过创建一些 `Post` 和 `Comment`\
  \ 对象，将它们输出到控制台，然后使用 `Assertions` 检查其中一个对象是否存在来测试此设置。\n\n```\npackage com.example.blog_app;\n\
  import com.example.blog_app.model.mongo.Comment;\nimport com.example.blog_app.model.mongo.Post;\n\
  import com.example.blog_app.model.mongo.PostStatus;\nimport com.example.blog_app.repository.PostMongoRepository;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.junit.After;\nimport org.junit.Assert;\n\
  import org.junit.Before;\nimport org.junit.Test;\nimport org.junit.runner.RunWith;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.boot.test.context.SpringBootTest;\n\
  import org.springframework.test.context.ActiveProfiles;\nimport org.springframework.test.context.junit4.SpringRunner;\n\
  import java.util.ArrayList;\nimport java.util.HashSet;\nimport java.util.List;\n\
  import java.util.Set;\nimport java.util.stream.IntStream;\n@RunWith(SpringRunner.class)\n\
  @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.NONE)\n@Slf4j\npublic\
  \ class BlogTests {\n@Autowired\nPostMongoRepository postMongoRepository;\nList\
  \ postList = null;\n@Before\npublic void setup()    {\npostList = new ArrayList();\n\
  IntStream.range(1,2).forEach(i->{\nPost nextSamplePost = createNextSamplePost(i);\n\
  postList.add(nextSamplePost);\n});\n}\nprivate Post createNextSamplePost(int i)\
  \ {\nPost post = Post.builder()\n.blogName(\"Blog\" + i)\n.title(\"Blog Title\"\
  \ + i)\n.content(\"Blog\" + i + \" content\")\n.postStatus(PostStatus.ACTIVE)\n\
  .userName(\"User\" + i)\n.build();\nSet comments = new HashSet();\ncomments.add(new\
  \ Comment(\"Comment\" + (i+1)) );\ncomments.add(new Comment(\"Comment\" + (i+2))\
  \ );\npost.setComments(comments);\nreturn post;\n}\n@Test\npublic void testAddNewPosts()\
  \   {\npostMongoRepository.saveAll(postList);\nPost blogByTitle = postMongoRepository.findByTitle(\"\
  Blog Title1\");\nAssert.assertEquals(\"博客名称不匹配\", blogByTitle.getBlogName(), \"\
  Blog1\");\nlog.info(\"成功将帖子保存到 Mongo 并从中检索回来\");\n}\n@After\npublic void tearDown()\
  \  {\npostMongoRepository.deleteAll();\n}\n}\n清单 5-14\n应用类\n```\n\n### 运行 Blog-Spring-Data-Mongodb-ch5\
  \ 应用测试用例\n\n按如下方式运行应用：\n\n```\n> gradle clean build\n> gradle test\n>\n:: Spring\
  \ Boot ::        (v2.1.3.RELEASE)\n[main] INFO  No active profile set, falling back\
  \ to default profiles: default\n[main] INFO  Bootstrapping Spring Data repositories\
  \ in DEFAULT mode.\n[main] INFO  Finished Spring Data repository scanning in 73ms.\
  \ Found 1 repository interfaces.\n[main] INFO  Cluster created with settings {hosts=[localhost:27017],\
  \ mode=SINGLE, requiredClusterType=UNKNOWN, serverSelectionTimeout='30000 ms', maxWaitQueueSize=500}\n\
  [cluster-ClusterId{value='5c8716f7736b80a492b4549a', description=\"null\"}-localhost:27017]\
  \ INFO  Opened connection [connectionId{localValue:1, serverValue:3}] to localhost:27017\n\
  [cluster-ClusterId{value='5c8716f7736b80a492b4549a', description=\"null\"}-localhost:27017]\
