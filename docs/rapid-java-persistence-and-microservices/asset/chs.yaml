  Failed to register application\"`），我们将在第 6.6 节中对其进行修正。应用程序启动后，通过浏览器使用以下 URL 访问端点。图\
  \ 6-1 和图 6-2 展示了示例输出。\n\n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig2_HTML.jpg](img/454149_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2\n\n库存服务配置\n\n*   `http://localhost:8888/config/eshop/prod/`\n\n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig1_HTML.jpg](img/454149_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1\n\nEshop 服务配置\n\n*   `http://localhost:8888/config/inventory-service/prod`\n\
  \n到目前为止，我们已经运行了 `config-service` 并通过浏览器访问了它。在第 6.3 节中，我们将通过微服务 `Eshop` 和 `Inventory-service`\
  \ 作为客户端来访问它。\n\n## 微服务架构中的服务发现\n\n当我们希望服务之间能够相互通信，而无需跟踪所有其他节点的确切网络位置或 IP 地址及端口号时，服务发现就显得尤为重要。传统上，我们基于负载均衡器的\
  \ URL 或地址来固定这种查找，并将所有应用程序节点静态附加到此负载均衡器上。Spring 框架通过几个链接库为这一需求提供了支持：\n\nSpring ➤\
  \ Spring Cloud ➤ Spring Cloud Netflix ➤ Netflix OSS ➤ Netflix Eureka\n\n服务发现（Netflix\
  \ OSS ➤ Eureka）是提供此功能的库，Spring Cloud 在此基础上运行，使其能够在 Spring 环境中工作。服务发现充当应用级别的注册表，供客户端相互通信。每个配置好的客户端通过其应用程序名称向发现服务器注册自身。客户端只能通过该名称找到它。客户端将发现已注册的服务\
  \ IP 地址，并可以直接连接到这些节点。我们需要创建三个组件来演示此功能：\n\n*   发现服务（Eureka 服务器）\n\n*   库存服务（Eureka\
  \ 客户端）\n\n*   Eshop 服务（Eureka 客户端）\n\n图 6-3 展示了 Eshop 与库存服务之间使用发现服务的通信模式。\n\n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig3_HTML.png](img/454149_1_En_6_Fig3_HTML.png)\n\
  \n图 6-3\n\n通过发现服务进行通信\n\n### 发现服务应用程序\n\n此微服务充当注册表，供客户端通过名称查找各种其他服务的地址，并通过内置的基于\
  \ Web 的仪表板对其进行监控。在构建此服务时，我们需要以下代码结构：\n\n```\n.\n├── build.gradle\n├── gradle\n│\
  \   └── wrapper\n│       ├── gradle-wrapper.jar\n│       └── gradle-wrapper.properties\n\
  ├── gradlew\n├── gradlew.bat\n├── settings.gradle\n└── src\n└── main\n├── java\n\
  │   └── com\n│       └── example\n│            └── eshop\n│                 └──\
  \ discovery\n│                      └── DiscoveryApp.java\n└── resources\n└── application.yml\n\
  ```\n\n#### 应用程序设置\n\n从 [`http://www.spring.io`](http://www.spring.io) 创建一个名为 `discovery-service`\
  \ 的新项目，并对 `build.gradle` 文件进行清单 6-4 中所示的更改。\n\n```\nbootJar {\nbaseName = 'discovery-service'\n\
  version =  '1.0'\n}\ndependencies {\nimplementation 'org.springframework.cloud:spring-cloud-starter-netflix-\
  \ eureka-server'\nimplementation 'de.codecentric:spring-boot-admin-starter-client:2.1.3'\n\
  implementation 'org.springframework.boot:spring-boot-starter-actuator'\n}\n清单 6-4\n\
  build.gradle 文件\n```\n\n#### 配置\n\n清单 6-5 中定义的大多数属性都是通用的，我们之前已经见过。我将在清单之后解释新的属性。\n\
  \n```\napplication.yml\nserver:\nport: 8761\neureka:\ninstance:\nhostname: localhost\n\
  client:\nregisterWithEureka: false\nfetchRegistry: false\nserviceUrl:\ndefaultZone:\
  \ http://${eureka.instance.hostname}:${server.port}/ eureka/\nspring:\napplication:\n\
  name: discovery-service\nboot:\nadmin:\nclient:\nurl: http://localhost:7777/admin\n\
  management:\nendpoints:\nweb:\nexposure:\ninclude: \"*\"\n清单 6-5\n配置文件\n```\n\n\
  注意：\n\n*   `eureka.instance.hostname` 属性表示要绑定 Eureka 注册服务器的主机名。这也可以是域名或暴露的 IP 地址。\n\
  \n*   服务器模式下的 `eureka.client.*` 属性在集群模式下部署时使用。如果有多个节点，发现服务可以动态连接，并且也可以复制注册表。我们将跳过这方面的更多细节，因为它们超出了本章的范围。\n\
  \n*   作为默认约定，服务通过 `server.port` 配置为在端口 8761 上运行。\n\n*   最后，`spring.boot.admin` 和\
  \ `management.*` 现在可以忽略，它们将在第 6.6 节中解释。\n\n#### 引导\n\n最后一步是引导应用程序。我们需要一个额外的注解，如清单\
  \ 6-6 所示，称为 `@EnableEurekaServer`，以启用 Eureka 服务器支持。\n\n```\npackage com.example.eshop.discovery_service;\n\
  import org.springframework.boot.WebApplicationType;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.boot.builder.SpringApplicationBuilder;\nimport org.springframework.cloud.netflix.eureka.server.EnableEurekaServer;\n\
  @SpringBootApplication\n@EnableEurekaServer\npublic class DiscoveryApp {\npublic\
  \ static void main(String[] args) {\nnew SpringApplicationBuilder(DiscoveryApp.class).web(WebApplicationType.SER\
  \ VLET).run(args);\n}\n}\n清单 6-6\n应用程序类\n```\n\n启动此应用程序后，Eureka 仪表板将可通过 `http://localhost:8761/`\
  \ 访问。我们将在第 6.3.3.5 节中再次讨论此仪表板。\n\n#### 运行发现服务应用程序\n\n运行应用程序：\n\n```\n>gradle bootRun\n\
