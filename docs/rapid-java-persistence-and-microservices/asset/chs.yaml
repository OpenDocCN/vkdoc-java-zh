  Hibernate: drop table if exists Product\nHibernate: create table Customer (customerId\
  \ bigint not null auto_increment, customerAddress varchar(255), dateAdded datetime,\
  \ email varchar(255), name varchar(255), password varchar(255), primary key (customerId))\
  \ engine=InnoDB\nHibernate: create table CustomerOrder (orderId bigint not null\
  \ auto_increment, customerId bigint, price integer not null, productId bigint, quantity\
  \ integer not null, primary key (orderId)) engine=InnoDB\nHibernate: create table\
  \ Product (productId bigint not null auto_increment, name varchar(255), price integer,\
  \ quantity integer, primary key (productId)) engine=InnoDB\nINFO 40196 --- [   \
  \        main] c.e.eshop.config.DbConfigSecondary: Secondary EM initialized\nINFO\
  \ 40196 --- [           main] com.example.eshop.Application : Customers List with\
  \ Constructors mapped query results: [CustomerDto(id=1, name=Raj Malhotra)]\nINFO\
  \ 40196 --- [           main] com.example.eshop.Application: Customers List with\
  \ Projections\nINFO 40196 --- [           main] com.example.eshop.Application: Projections\
  \ Example, Customer Name With Email: Raj malhotra_raj.malhotra@example.com\nINFO\
  \ 40196 --- [           main] com.example.eshop.Application: Projections Example,\
  \ Find Single Customer : Raj Malhotra_raj.malhotra@example.com\n```\n\n通过此输出，我们可以看到\
  \ Spring 已将返回的 `Customer` 对象的 `name` 和 `email` 组合起来，然后以字符串形式返回输出——`Raj` Malhotra_raj.malhotra@example.com。\n\
  \n## Spring 转换器服务\n\nSpring 框架提供了一个有趣的服务，可以帮助你将自定义类视为实体字段。该服务将管理其从数据库特定数据类型到基于 Java\
  \ 的类型的来回转换。请参考清单 4-12 中的示例，了解如何在 `User` 类中使用它。\n\n```\npackage com.example.eshop.model.type;\n\
  import lombok.Data;\nimport java.io.Serializable;\n@Data\npublic class CustomerAddress\
  \ implements Serializable {\nprivate String streetAddress;\nprivate String city;\n\
  private String country;\n}\nListing 4-12\nCustomerAddress 类型\n```\n\n清单 4-12 定义了一个新类，它应被视为我们实体模型的一个复合对象数据类型。JDBC\
  \ 驱动程序可以处理原生数据类型，但自定义类不能作为数据类型映射到对象字段。通过使用 Spring 转换器服务，我们可以定义 Spring 框架如何将对象字段转换/序列化为单个数据元素。此外，我们还可以定义它们应如何分解并映射到字段对象。例如，我们将\
  \ `CustomerAddress` 对象字段转换为逗号分隔的字符串，然后再转换回来（参见清单 4-13）。\n\n```\npackage com.example.eshop.converter;\n\
  import com.example.eshop.model.type.CustomerAddress;\nimport javax.persistence.AttributeConverter;\n\
  public class CustomerAddressConverter implements\nAttributeConverter {\n@Override\n\
  public String convertToDatabaseColumn(CustomerAddress customerAddress) {\nif(customerAddress\
  \ == null)\nreturn \"\";\nreturn  customerAddress.getStreetAddress() + \", \" +\n\
  customerAddress.getCity() + \", \" +\ncustomerAddress.getCountry();\n}\n@Override\n\
  public CustomerAddress convertToEntityAttribute(String value) {\nCustomerAddress\
  \ customerAddress = null;\nif(value != null && value.contains(\",\")) {\nString[]\
  \ tokens = value.split(\",\");\ncustomerAddress = new CustomerAddress();\ncustomerAddress.setStreetAddress(tokens[0]);\n\
  customerAddress.setCity(tokens[1]);\ncustomerAddress.setCountry(tokens[2]);\n}\n\
  return customerAddress;\n}\n}\nListing 4-13\n类型转换器\n```\n\n`convertToDatabaseColumn`\
  \ 方法将对象转换为字符串，而 `convertToEntityAttribute` 方法则执行相反的操作。让我们看看如何在清单 4-14 中使用这个类。\n\n\
  ```\npackage com.example.eshop.model.orders;\nimport java.io.Serializable;\nimport\
  \ java.time.LocalDateTime;\nimport java.util.List;\nimport java.util.Set;\nimport\
  \ javax.persistence.*;\nimport com.example.eshop.converter.CustomerAddressConverter;\n\
  import com.example.eshop.model.type.CustomerAddress;\nimport com.fasterxml.jackson.annotation.JsonIgnore;\n\
  import lombok.*;\n@Data\n@Entity\n@ToString(exclude = {\"orders\"})\n@EqualsAndHashCode(exclude\
  \ = {\"orders\"})\npublic class Customer implements Serializable {\n@Id\n@GeneratedValue(strategy=GenerationType.IDENTITY)\n\
  private Long customerId;\nprivate String name, email, password;\nprivate LocalDateTime\
  \ dateAdded;\n@Column\n@Convert(converter = CustomerAddressConverter.class)\nCustomerAddress\
  \ customerAddress;\n@JsonIgnore\n@OneToMany(fetch = FetchType.LAZY)\n@JoinColumn(name\
  \ = \"customerId\")\nSet orders;\n}\nListing 4-14\n客户实体变更\n```\n\n请注意，在这段代码中，我们添加了一个新字段，并用\
  \ `@Convert` 注解标记了它。\n\n```\n@Column\n@Convert(converter = CustomerAddressConverter.class)\n\
  CustomerAddress customerAddress;\n```\n\n在保存和获取客户实体时，Spring Data JPA 将隐式地执行这种来回转换。\n\
  \n## 重要的 JPA 概念\n\n在结束对 Spring Data JPA 常见用例和解决方案的回顾之前，让我们快速总结一些有助于加深对 JPA 内部机制理解的概念。\n\
  \n### JPA 托管实体及其生命周期\n\n托管实体对象是实体类（可持久化的用户定义类）的内存实例，可以表示数据库中的物理对象。我们不会深入探讨 JPA 标准规范的细节，但让我们回顾一下托管对象的生命周期，如图\
  \ 4-1 所示，然后继续我们的示例。\n\n![../images/454149_1_En_4_Chapter/454149_1_En_4_Fig1_HTML.png](img/454149_1_En_4_Fig1_HTML.png)\n\
  \n图 4-1\n\nJPA 实体对象生命周期\n\n当实体对象最初创建时，其状态为 `New`。当实体对象被持久化到数据库时，它变为 `Managed` 状态。当\
  \ `Managed` 对象被修改时，其更改会被所属的 `EntityManager`（由 Spring 管理）检测到。更改会在 `commit` 事务时传播到数据库。当对象被检索并标记为删除时，它会被标记为\
  \ `REMOVED` 状态。任何预先加载到内存中的关联对象也会被标记为删除。最后一个状态称为 `DETACHED`，当 `EntityManager` 关闭时进入该状态。\n\
  \nJPA 规范中还提供了回调方法，允许用户在对象进入相应状态之前执行操作。这些方法使用以下注解进行标注：\n\n*   `@PrePersist/@PostPersist`\n\
  \n*   `@PreRemove/@PostRemove`\n\n*   `@PreUpdate/@PostUpdate`\n\n*   `@PostLoad`\n\
  \n用例：\n\n*   这些方法的一个典型用例是记录或标记时间戳以进行审计。\n\n*   另一个用例可能是在更新任何对象时触发任何其他功能。\n\n###\
  \ 隔离级别、锁定和性能\n\n隔离级别对于决定事务策略、锁定行为以及在高并发或高读写率的事务型应用程序中给定的数据库性能至关重要。\n\n让我们快速回顾一下事务中与数据读取相关的行为。\n\
  \n\n\n#### 数据读取现象\n\n*   **脏读：** 允许读取未提交或脏数据。当一个事务 T1 正在修改记录，而另一个事务 T2 在第一个事务提交或回滚之前读取了该记录时，就会发生脏读。存在一种可能性：事务\
  \ T1 读取了一些数据，但这些数据可能因为事务 T2 已回滚而不再存在。数据完整性受损，外键约束被违反，唯一约束被忽略。\n\n*   **不可重复读：**\
  \ 简单来说，这意味着在一个事务过程中读取的数据，如果再次读取，并不总是可重复的。如果你在时间 T1 读取了一行，并试图在时间 T2 重新读取同一行，该行可能在同一事务中被其他事务更改了。相同的行可能已经消失或被更新。\n\
  \n*   **幻读：** 这意味着如果你在时间 T1 执行一个查询，并在时间 T2 重新执行它，数据库中可能已添加了额外的行，这可能会影响你的结果。这与不可重复读不同，在幻读中，你已经读取的数据并未被更改。相反，可能有更多的数据满足你的查询条件。\n\
  \n#### 隔离级别\n\n数据隔离级别有助于在更新数据库中的数据时，确保数据库性能与维护 ACID 属性之间取得适当的平衡。隔离级别越高，性能越低。基于这些行为，SQL\
  \ 标准定义了四种隔离级别：\n\n`READ_UNCOMITTED`\n\n*   读取变体：脏读、不可重复读、幻读\n*   性能：即使在高度并发环境下也最高\n\
  *   锁定：无\n*   支持者：MYSQL (InnoDB), MSSQL\n\n`READ_COMMITTED`\n\n*   读取变体：不可重复读、幻读\n\
  *   性能：即使在高度并发环境下也良好\n*   锁定：仅为 SELECT 或相关行获取共享锁\n*   支持者：MYSQL (Innodb), MSSQL\
  \ (默认), ORACLE (默认), POSTGRESQL (默认)\n\n`REPEATABLE READ`\n\n*   读取变体：幻读\n*   性能：在高度并发环境下较慢\n\
  *   锁定：对选定的行获取共享锁；如果事务重试，新的更改（任何插入的新行）将可见\n*   支持者：MYSQL (Innodb - 默认), MSSQL, POSTGRESQL\n\
  \n`SERIALIZABLE`\n\n*   读取变体：幻读\n*   性能：在高度并发环境下最慢\n*   锁定：为整个表获取共享锁；即使事务重试，新的更改（任何插入的新行）也不可见\n\
  *   支持者：MYSQL (Innodb), MSSQL, ORACLE, POSTGRESQL\n\n还有两个非 ANSI/SQL ISO 标准的隔离级别：\n\
  \n*   `READ-ONLY`：由 Oracle 只读事务支持；我们只能看到事务开始时已提交的更改。不允许使用 `INSERT`、`UPDATE` 和 `DELETE`\
  \ 语句。\n*   `SNAPSHOT`：类似于 Serializable，但内部通过每个事务的数据行版本控制（乐观并发模型）实现，并且不发生锁定。如果发现新版本，事务将回滚。\n\
  \n使用 JPA，我们可以通过 `@Transactional` 注解（`@Transactional( isolation=Isolation.DEFAULT)`）指定隔离级别，这有助于根据需要调整并发控制。\n\
  \n表 4-1 显示了在 Spring 的 `@Transactional` 注解中可以指定的可能值，以供快速参考。\n\n表 4-1\n\n数据读取行为表格对比\n\
  \n| 隔离级别 | 脏读 | 不可重复读 | 幻读 |\n| --- | --- | --- | --- |\n| `Read_Uncommitted` |\
  \ 可能 | 可能 | 可能 |\n| `Read_Committed` | 不可能 | 可能 | 可能 |\n| `Repeatable_Read` | 不可能\
  \ | 不可能 | 可能 |\n| `Serializable` | 不可能 | 不可能 | 不可能 |\n\n### 有趣的 JPA 属性\n\n通过以下属性，我们可以自定义\
  \ Hibernate 和 Spring 的日志记录行为。\n\n*   这不是 JPA 的一部分；我们只是展示它来简化日志记录。\n*   `logging.pattern.console=[%thread]\
  \ %-5level %msg%n`\n*   使用此属性，Hibernate 将开始为所有执行的 SQL 查询生成统计信息。\n*   `spring.jpa.properties.hibernate.generate_statistics=true`\n\
  *   使用此属性，Hibernate 将在所有生成的 SQL 语句中添加注释，以提示生成的 SQL 试图做什么。\n*   `spring.jpa.properties.hibernate.use_sql_comments=true`\n\
  *   用于以格式化形式打印 SQL。\n*   `spring.jpa.properties.hibernate.format_sql=true`\n*  \
  \ Hibernate 使用此属性将生成的 SQL 查询记录到日志中。\n*   `spring.jpa.hibernate.show-sql=true`\n\n\
