  \ ) 是另一个项目，有助于将 GraphQL 日期时间数据类型映射到 Java LocalDateTime 和其他 `java.time` 类型。\n\n##\
  \ 总结\n\n本章概述了一个使用 GraphQL Java 库的示例，以帮助您入门。我建议您探索更多这些示例，因为这是一个不断扩展的概念领域。下一章将探讨 Java\
  \ 中的另一个主要范式，它使 HTTP 通信更快并提高了可伸缩性——响应式框架。\n\n\n\n# 8. Java 响应式开发\n\n近年来，使用事件驱动异步运行时环境和框架进行网络编程受到了广泛关注，例如\
  \ JavaScript 中的 Node.js 和 Java 中的 RxJava（ReactiveX）。NIO（新 I/O）包是 Java 中响应式编程的基础。响应式编程在应用开发中并非新鲜事物。当面对海量数据或高并发访问时，我们通常需要异步处理来使系统快速响应。除了异步性，我们的系统还必须以非阻塞模式在流（连续的事件序列）上工作。\n\
  \n数据量和操作规模与日俱增，这意味着使用传统方法不断增加硬件资源几乎变得不可能。当需求下降时，我们也希望使用更简单、成本更低的硬件来处理负载。当 Node.js\
  \ 展示了应用在等待 I/O 通道上浪费了多少时间时，我开始对响应式编程产生兴趣。我不会深入探讨 Node.js 的细节，因为那是一种不同的模型，而 Java\
  \ 可以通过利用多核 CPU 做得更好。\n\n## 响应式宣言\n\n响应式宣言包含了基本目标和指导方针，可在 [`https://www.reactivemanifesto.org/`](https://www.reactivemanifesto.org/)\
  \ 获取。它是多个组织为标准化响应式开发而贡献的成果。响应式宣言描述了如何基于四个原则设计响应式系统：\n\n*   **即时响应性**：系统尽可能及时地做出响应，并对所有用户命令保持响应。系统应能快速发现问题并有效处理，即使在问题期间也能提供一致的响应。基于通过后台线程响应事件的小型无状态函数的函数式编程，是我们设计此类系统的方法之一。\n\
  \n*   **韧性**：系统在面临故障时仍能保持响应。系统中有时确实会发生故障。其目的是避免系统各组件的连锁反应，并优雅地处理对用户的消息传递。包括在发生故障时的恢复或重试逻辑。\n\
  \n*   **弹性**：系统在不同工作负载下保持响应。响应式系统可以通过增加或减少分配给这些输入的资源来响应输入速率的变化。像 Docker 和 Kubernetes\
  \ 这样基于容器的部署解决方案就是弹性的例子。\n\n*   **消息驱动**：响应式系统依赖于组件之间的异步消息传递，这确保了松耦合、隔离和位置透明性，并提供了将错误作为消息进行委托的手段。消息应该是不可变的，因此设计上就是线程安全的。Akka\
  \ 和 Vert.x 是基于消息传递的流行 Java 响应式平台。\n\n基于这些原则，已经开发了各种 API、框架和库。核心 Java 中的 NIO（新输入输出）包是一个精确处理\
  \ I/O 操作的响应式库。Netty 和 Apache Mina 已经存在多年，提供了基于 NIO 的网络选项。对于通用开发，我们仍然需要能与 Java Streams\
  \ 协同工作的更高级别 API。\n\n## 响应式流项目\n\n响应式流是一个规范，为带有非阻塞背压的异步流处理提供了标准。所谓规范，意味着有多个实现，就像\
  \ JDBC 驱动一样。响应式流社区提供了多种语言的示例实现，可在 [`https://github.com/reactive-streams`](https://github.com/reactive-streams)\
  \ 获取。对于 Java，API 可在 [`https://github.com/reactive-streams/reactive-streams-jvm`](https://github.com/reactive-streams/reactive-streams-jvm)\
  \ 找到。多年来我们一直在实现两个基本概念——观察者模式和发布/订阅模式。响应式流基于这些概念，但 API 中包含以下组件：\n\n*   **发布者**：发布者负责生成无限数量的有序元素（流），并根据从其订阅者收到的需求进行发布。\n\
  \n    定义：\n\n    ```\n    public interface Publisher {\n    public void subscribe(Subscriber\
  \ s);\n    }\n    ```\n\n*   **订阅者**：就像观察者模式中的观察者一样，订阅者负责观察源流，并在生产者推送项目时做出反应。\n\n\
  \    定义：\n\n    ```\n    public interface Subscriber {\n    public void onSubscribe(Subscription\
  \ s);\n    public void onNext(T t);\n    public void onError(Throwable t);\n   \
  \ public void onComplete();\n    }\n    ```\n\n*   **订阅**：每个订阅者都必须实现此接口。此模型会在每次事件发生时传递给订阅者。\n\
  \n    定义：\n\n    ```\n    public interface Subscription {\n    public void request(long\
  \ n);\n    public void cancel();\n    }\n    ```\n\n*   **处理器**：此接口负责处理发布者接收到的项目的处理逻辑，并作为处理程序委托给订阅者。\n\
  \n    定义：\n\n    ```\n    public interface Processor extends Subscriber,\n    Publisher\
  \ {}\n    ```\n\n响应式流还涉及另外两个概念：\n\n*   **背压**：在非响应式系统中，即使消费者无法以该速度消费，生产者也可能继续生产项目，从而对客户端造成*背压*。响应式系统允许客户端向生产者告知其容量问题以及接受更多项目的准备情况。\n\
  \n*   **非阻塞**：从核心 Java 领域来看，我们一直通过原子变量处理非阻塞并发应用。简而言之，响应式系统允许用户线程继续处理操作，将所有 I/O 操作放入队列。然后它们可以拾取进程并通过回调响应用户线程。这就是\
  \ Node.js 世界的工作方式，通过使用事件循环来处理所有后台操作。\n\n由于在 Java 中构建响应式系统有多种 API，我在此介绍其中几种，然后详细解释一个作为示例。\n\
  \n## RxJava（响应式扩展）项目\n\nRxJava 是另一个用于响应式开发的框架；它基于 ReactiveX 实现（ [`http://reactivex.io/`](http://reactivex.io/)\
  \ ）。ReactiveX 是观察者模式、迭代器模式和函数式编程最佳思想的结合。在 ReactiveX 中，观察者订阅一个可观察对象。然后观察者对可观察对象发出的项目流做出反应（就像响应式流中的发布者）。通过使用\
  \ Java 并发 API 并将处理卸载到后台线程，用户操作可以等待 Future 对象，而底层并发和非阻塞 I/O 问题则由框架负责。到目前为止，该 API\
  \ 有两个版本，目前使用的是 RxJava 2。ReactiveX 是伞形项目，RxJava 是其下的 Java 库。其中一些概念也出现在 JDK 中，因此我们将在下一节中查看\
  \ Java 9 的 API。\n\n\n\n## Java 核心库中的响应式 API\n\nJava 8 开始提供函数式编程和流处理的基础结构。Java 9\
  \ 根据响应式流规范引入了 Flow API 和响应式编程的通用接口，这些接口从 Java 8 的改进中获益良多。以下 API 位于 Java 9 的 `java.util.concurrent.Flow`\
  \ 类中：\n\n*   `Flow.Publisher<T>` 接口定义了生成数据项和控制信号的方法。\n*   `Flow.Subscriber<T>` 接口定义了接收这些消息和信号的方法。\n\
  *   `Flow.Subscription` 接口定义了连接发布者和订阅者的方法。\n*   `Flow.Processor<T,R>` 接口定义了执行高级操作的方法，例如将发布者的数据项进行链式转换后传递给订阅者。\n\
  *   该 API 中唯一的类 `SubmissionPublisher<T>`，使用其构造函数中提供的 [`Executor`](https://docs.oracle.com/javase/9/docs/api/java/util/concurrent/Executor.html)\
  \ 来向订阅者传递数据，以处理背压。\n\n从 Java 1.3 开始，我们就使用 `wait()` 和 `notify()` 构建基于生产者和消费者的多线程应用程序。到了\
  \ Java 5，我们可以使用阻塞队列、执行器和其他并发 API 轻松实现这一点。简而言之，在分布式系统中，这些任务是通过使用消息传递机制以发布者/订阅者的模式实现的。借助\
  \ Java 9，我们可以基于这些响应式 API，以发布者/订阅者的形式实现相同的生产者/消费者模式。这些 API 很有趣，但仅凭它们可能无法构建完整的实际应用程序，因此我们将在下一节中介绍\
  \ Spring 响应式 API。\n\n## Reactor 与 Spring 响应式\n\n在本节中，我们将深入探讨一个具体示例，因为我希望专注于创建一个涉及\
  \ HTTP 请求和数据库连接的完整 Web 应用程序（微服务）。Spring 社区启动了一个名为“Project Reactor”（[`https://projectreactor.io/`](https://projectreactor.io/)）的项目，旨在创建一个完全非阻塞的基础架构。该\
  \ API 可以轻松地与 Java 函数式 API、CompletableFuture 和 Stream API 集成。\n\nSpring 框架在 Reactor\
  \ API 之上构建了另一个 Web API（Web Flux）。这是基于 Servlet API 构建的 Spring Web MVC API 的替代方案。根据\
  \ Spring 文档，创建此 API 的原因是需要一个非阻塞 API，以便用更少的线程处理并发，并在更少的硬件资源下进行扩展。Java 中的响应式 API 是从早期版本的功能演变而来的，例如注解、并发\
  \ API、原子类和 NIO 包。Java 8 中的函数式编程、Streams API 和 CompletableFuture API 也为响应式 Java 的成功做出了贡献。\n\
  \n在 Spring WebFlux 中，我们有 Mono 和 Flux API。它们提供了丰富的函数式操作符，用于处理（0 或 1 个）或（0 到 N 个）数据项的流。WebFlux\
  \ API 接受一个发布者作为输入，允许操作符对其进行处理，并最终返回 `Mono<T>` 或 `Flux<T>` 作为输出。Spring WebFlux 支持两种类型的响应式编程\
  \ API：\n\n*   **注解式控制器**：Spring MVC 风格的 REST 控制器，支持 Mono 和 Flux 返回类型。\n*   **函数式端点**：基于\
  \ Lambda 的轻量级函数式编程模型。\n\n通常，对于某些开发者来说，函数式编程可能比命令式编程更难。命令式编程自然地映射到我们思考执行任务的一系列步骤的方式。此外，在企业级应用程序中，我们可能需要使用许多尚未迁移到函数式编程的框架和库。例如，JPA\
  \ 和 JDBC 就是如此。最近，社区开始致力于响应式数据库驱动程序和 Spring Data 风格的包装器 API。\n\n该 API 名为 R2DBC（响应式关系数据库连接；参见\
  \ [`https://r2dbc.io/`](https://r2dbc.io/)）。R2DBC 是一个 API 规范，它声明了一个响应式 API，供驱动程序供应商实现，以便访问其关系数据库。在撰写本文时，有三个数据库驱动程序支持\
  \ R2DBC 规范：\n\n*   PostgreSQL (`io.r2dbc:r2dbc-postgresql`)\n*   H2 (`io.r2dbc:r2dbc-h2`)\n\
  *   Microsoft SQL Server (`io.r2dbc:r2dbc-mssql`)\n\n现在，让我们构建一个可运行的示例来实际体验 WebFlux\
  \ 和 R2DBC。\n\n## 响应式博客微服务（基于 Spring 响应式构建）\n\n我们将使用响应式 API 重建前面章节中的博客应用程序。其结构将与之前构建的示例非常相似，如下所示。\n\
  \n```\n.\n├── build.gradle\n├── gradlew\n├── gradlew.bat\n├── settings.gradle\n\
  └── src\n    └── main\n        ├── java\n        │   └── com\n        │       └──\
  \ example\n        │           └── eblog\n        │               ├── App.java\n\
  \        │               ├── config\n        │               │   └── Config.java\n\
  \        │               ├── dto\n        │               │   └── PostInputRequest.java\n\
  \        │               ├── model\n        │               │   └── Post.java\n\
  \        │               ├── repository\n        │               │   └── PostRepository.java\n\
  \        │               └── web\n        │                   └── PostController.java\n\
  \        └── resources\n```\n\n### 应用程序设置\n\n让我们从 [`http://start.spring.io/`](http://start.spring.io/)\
  \ 开始构建一个名为 `eblog-reactive-ch8` 的新应用程序，并在 `build.gradle` 中包含以下依赖项（参见清单 8-1）。\n\n\
  ```\nbuildscript {\n    repositories {\n        mavenCentral()\n    }\n    dependencies\
  \ {\n        classpath(\"org.springframework.boot:spring-boot-gradle-plugin:2.1.3.RELEASE\"\
  )\n    }\n}\napply plugin: 'java'\napply plugin: 'eclipse'\napply plugin: 'idea'\n\
  apply plugin: 'org.springframework.boot'\napply plugin: 'io.spring.dependency-management'\n\
  bootJar {\n    baseName = 'eblog-service'\n    version =  '1.0'\n}\nrepositories\
  \ {\n    mavenCentral()\n    maven { url \"https://repo.spring.io/snapshot\" }\n\
  \    maven { url \"http://repo.spring.io/libs-milestone\" }\n}\ndependencies {\n\
  \    compile('org.springframework.boot:spring-boot-starter-webflux')\n    compile(\"\
  org.springframework.data:spring-data-r2dbc:1.0.0.M1\")\n    compile(\"io.r2dbc:r2dbc-spi:1.0.0.M7\"\
  )\n    compile(\"io.r2dbc:r2dbc-postgresql:1.0.0.M7\")\n    compile('org.projectlombok:lombok:1.18.6')\n\
  \    testCompile('junit:junit:4.12')\n}\n清单 8-1\nBuild.gradle\n```\n\n### 配置\n\n\
  我们只需要扩展一个现有的抽象配置类，即 `AbstractR2dbcConfiguration`。我们可以覆盖其与数据库连接相关的配置，如清单 8-2 所示。\n\
  \n```\npackage com.example.eblog.config;\nimport io.r2dbc.postgresql.PostgresqlConnectionConfiguration;\n\
  import io.r2dbc.postgresql.PostgresqlConnectionFactory;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.data.r2dbc.config.AbstractR2dbcConfiguration;\n@Configuration\n\
  public class Config extends AbstractR2dbcConfiguration {\n    @Override\n    public\
  \ PostgresqlConnectionFactory connectionFactory() {\n        PostgresqlConnectionConfiguration\
  \ connectionConfiguration =\n            PostgresqlConnectionConfiguration.builder()\n\
  \                .applicationName(\"eblog\")\n                .database(\"eblog\"\
  )\n                .host(\"localhost\")\n                .username(\"postgres\"\
  )\n                .password(\"postgres\").build();\n        return new PostgresqlConnectionFactory(connectionConfiguration);\n\
  \    }\n}\n清单 8-2\n配置类\n```\n\n根据这段代码，我们覆盖了 `AbstractR2dbcConfiguration` 类的 `connectionFactory()`\
  \ 方法，该方法用于连接到 PostgreSQL 中的 `eblog` 数据库。我们还需要使用以下脚本手动创建一个 `Post` 表：\n\n```\nCREATE\
  \ TABLE public.post (\n    id serial NOT NULL,\n    title varchar(500) NULL,\n \
  \   \"content\" text NULL,\n    author int4 NULL,\n    CONSTRAINT post_pkey PRIMARY\
  \ KEY (id)\n);\n```\n\n\n\n### 模型类与仓库定义\n\n我们将创建一个带有 Spring Data 注解的简单 *POJO*（普通\
  \ Java 对象）（参见清单 8-3）。我们还将查看清单 8-4 中的 Spring Data 响应式仓库定义。\n\n```\npackage com.example.eblog.model;\n\
  import lombok.AllArgsConstructor;\nimport lombok.Builder;\nimport lombok.Data;\n\
  import org.springframework.data.annotation.Id;\nimport org.springframework.data.relational.core.mapping.Column;\n\
  import java.io.Serializable;\n@Data\n@Builder\n@AllArgsConstructor\npublic class\
  \ Post implements Serializable {\n@Id\nprivate Long id;\nprivate String title;\n\
  @Column(\"content\")\nprivate String content;\npublic Post()   {}\npublic Post(String\
  \ title, String content)   {\nthis.title = title;\nthis.content = content;\n}\n\
  }\n清单 8-3\n模型类\n```\n\n我们有一个名为 `Post` 的 Java 对象，它带有来自 Spring Data 的 `@Id` 和 `@Column`\
  \ 注解，但我们这里没有使用 Spring Data JPA 注解。\n\n```\npackage com.example.eblog.repository;\n\
  import com.example.eblog.model.Post;\nimport org.springframework.data.repository.reactive.ReactiveCrudRepository;\n\
  import org.springframework.stereotype.Repository;\npublic interface PostRepository\
  \ extends ReactiveCrudRepository { }\n清单 8-4\n仓库定义\n```\n\n要使用 Spring Data R2DBC\
  \ 仓库，我们需要使用 Spring Data Commons 项目中的注解来标注模型类的字段。在清单 8-3 的代码中，我们有一个 `Post` Java 对象，它带有来自\
  \ Spring Data Commons 的 `@Id` 和 `@Column` 注解。Spring Data R2DBC 提供了实现，通过这些注解来管理数据模型的持久化。\n\
  \n### DTO 与 Web 控制器\n\n我们将首先定义一个名为 `PostInputRequest` 的简单 POJO，其中包含创建 `User` 领域对象所需的输入字段（参见清单\
  \ 8-5）。接着，我们将定义一个 `PostController` 类（参见清单 8-6），其方法返回 `reactor.core.publisher.*`\
  \ API 类（Flux 或 Mono）。\n\n```\npackage com.example.eblog.web;\nimport com.example.eblog.dto.PostInputRequest;\n\
  import com.example.eblog.model.Post;\nimport com.example.eblog.repository.PostRepository;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.data.domain.PageRequest;\nimport org.springframework.data.domain.Sort;\n\
  import org.springframework.data.repository.query.Param;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
  import org.springframework.web.bind.annotation.PostMapping;\nimport org.springframework.web.bind.annotation.RequestBody;\n\
  import org.springframework.web.bind.annotation.RestController;\nimport reactor.core.publisher.Flux;\n\
  import reactor.core.publisher.Mono;\n@RestController\n@Slf4j\npublic class PostController\
  \ {\n@Autowired\nPostRepository postRepository;\n@PostMapping(\"/posts\")\npublic\
  \ Mono newPost(@RequestBody PostInputRequest postInputRequest){\nPost lclPost =\
  \ Post.builder()\n.title(postInputRequest.getTitle())\n.content(postInputRequest.getContent())\n\
  .build();\nMono post = postRepository.save(lclPost);\nreturn post;\n}\n@GetMapping(\"\
  /posts\")\nFlux allPosts() {\nreturn this.postRepository.findAll();\n}\n@GetMapping(\"\
  /recentPosts\")\npublic Flux recentPosts(\n@Param(\"limit\") Integer limit, @Param(\"\
  offset\") Integer offset,\n@Param(\"orderBy\") String orderBy){\nlog.info(\"recentPosts,\
  \ params: {}, {}\", limit, offset);\nPageRequest pageRequest = PageRequest.of(limit,\
  \ offset, Sort.Direction.DESC, orderBy);\nreturn postRepository.findAll();\n}\n\
  }\n清单 8-6\n控制器类\n```\n\n```\npackage com.example.eblog.dto;\nimport lombok.Data;\n\
  @Data\npublic class PostInputRequest {\nString title;\nString content;\nLong authorId;\n\
  }\n清单 8-5\nDTO 类\n```\n\n### 引导配置\n\n我们需要在 Spring Boot 中启用 R2DBC 特性，从而在 `Application`\
  \ 类上使用其注解（`@EnableR2dbcRepositories`）（参见清单 8-7）。\n\n```\npackage com.example.eblog;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.data.r2dbc.repository.config.EnableR2dbcRepositories;\n\
  @SpringBootApplication\n@EnableR2dbcRepositories\npublic class App {\npublic static\
  \ void main(String[] args) {\nSpringApplication.run(App.class, args);\n}\n}\n清单\
  \ 8-7\n应用类\n```\n\n我们还需要运行一个初始 SQL 脚本来初始化 PostgreSQL 数据库中的表（参见清单 8-8）。\n\n```\n\
  create table POST (\nid serial primary key not null,\ntitle varchar(500),\ncontent\
  \ text\n);\n清单 8-8\n初始模式脚本\n```\n\n### 输出\n\n现在让我们看一下 Gradle 运行的控制台输出：\n\n```\n\
