  \n请注意输出中以粗体显示的行；它们验证了与配置和发现服务的连接。我们还可以从浏览器访问库存服务 URL 以查看响应（`http://localhost:8082/inventory/api/inventory/1`），或在控制台上使用\
  \ `CURL` 命令：\n\n```\n> curl http://localhost:8082/inventory/api/inventory/1\n{\"\
  inventoryId\": 1,\"productId\": 1,\"price\": 200,\"quantity\": 2}\n```\n\n### Eshop\
  \ 应用程序\n\n该微服务拥有允许客户查看产品列表和下单的端点。理想情况下，在企业级设置中，您应该为客户管理、产品目录和订单管理设置不同的服务。我们将定义一个\
  \ `TestController`，借助一些业务服务来展示示例订单流程。\n\n这些服务中最重要的是 `OrderService`，它将与另一个微服务（库存服务）通信，然后根据响应决定哪些产品可用。如果产品不可用，`OrderService`\
  \ 会执行事务并返回订单对象及其在标头中的位置。`CustomerService` 和 `ProductService` 包含创建示例客户和产品的方法。\n\n\
  为了与库存服务通信，`Eshop` 可以采用多种方法：\n\n*   Netflix OSS – 使用 REST 模板的 Eureka 客户端\n\nEureka\
  \ 客户端库通过名为 `eureka.client.serviceUrl.defaultZone` 的配置属性提供查找功能。这提供了所有实例的列表，可用于连接到其中一个实例。\n\
  \n*   Netflix OSS – 使用 REST 模板的 Ribbon\n\nRibbon 还提供对 Eureka 服务器的配置、查找和连接管理。Ribbon\
  \ 在某种程度上与 Eureka 客户端不同，它基于几种算法提供自动负载均衡，而不是从列表中手动选择一个。\n\n*   Netflix OSS – Feign\n\
  \n这是一个基于接口的客户端，其目标 URI 作为声明注解在其上。Feign 内部仅使用 Ribbon API。\n\n*   Spring Cloud API\
  \ 抽象通过 `@LoadBalanced` 注解以及 `DiscoveryClient` 类，为基于 EurekaClient 和 Ribbon 的方法提供了简单的解决方案。EurekaClient\
  \ 内部使用 Jersey API，而 Spring Cloud 的 `org.springframework.cloud.client.discovery.DiscoveryClient`\
  \ 可用于 Spring 首选的 HTTP 通信 API。\n\n我们在服务部分讨论来自 Spring Cloud `@LoadBalanced` 注解和 Feign\
  \ 的简单选项。我们需要以下代码结构来构建此应用程序：\n\n```\n.\n├── build.gradle\n├── gradle\n│   └── wrapper\n\
  │       ├── gradle-wrapper.jar\n│       └── gradle-wrapper.properties\n├── gradlew\n\
  ├── gradlew.bat\n└── src\n└── main\n├── java\n│   └── com\n│       └── example\n\
  │            └── eshop\n│                 ├── EshopApp.java\n│                 ├──\
  \ config\n│                 │    ├── SwaggerConfig.java\n│                 │   \
  \ └── WebConfig.java\n│                 ├── dto\n│                 │    └── LoginRequest.java\n\
  │                 ├── http\n│                 │    └── InventoryClient.java\n│ \
  \                ├──  model\n│                 │    ├── Customer.java\n│       \
  \          │    ├── Order.java\n│                 │    └── Product.java\n│     \
  \            ├──  repository\n│                 │    ├── CustomerRepository.java\n\
  │                 │    ├── OrderRepository.java\n│                 │    └── ProductRepository.java\n\
  │                 ├──  service\n│                 │    └── impl\n│             \
  \    │         ├── CustomerService.java\n│                 │         ├── OrderService.java\n\
  │                 │         ├── OrderServiceWithFiegn.java\n│                 │\
  \         └── ProductService.java\n│                 └── web\n│                \
  \      ├── LoginController.java\n│                      └── TestController.java\n\
  └── resources\n├── application.properties\n└── application.yml\n```\n\n#### 应用程序设置\n\
  \n从 [`http://www.spring.io`](http://www.spring.io) 创建一个名为 `eshop` 的新应用程序，并对 `build.gradle`\
  \ 文件进行清单 6-13 中所示的更改。\n\n\n\n```\nbootJar {\nbaseName = 'eshop'\nversion = '1.0'\n\
  }\ndependencies {\ncompile ([\n\"javax.xml.bind:jaxb-api:2.3.1\",\n\"org.glassfish.jaxb:jaxb-runtime:2.3.2\"\
  ,\n\"javax.activation:javax.activation-api:1.2.0\"\n])\ncompile ([\n\"org.projectlombok:lombok:1.18.6\"\
  ,\n\"mysql:mysql-connector-java:8.0.15\",\n\"org.springframework.boot:spring-boot-starter-web\"\
  ,\n\"org.springframework.boot:spring-boot-starter-data-jpa\",\n\"org.springframework.boot:spring-boot-starter-test\"\
  ,\n\"org.springframework.cloud:spring-cloud-starter-sleuth\",\n\"org.springframework.boot:spring-boot-starter-actuator\"\
  \n])\ncompile ([\n\"org.springframework.cloud:spring-cloud-starter-openfeign\",\n\
  \"org.springframework.cloud:spring-cloud-starter-netflix-eureka-client\",\n\"org.springframework.cloud:spring-cloud-starter-netflix-hystrix\"\
  ,\n\"org.springframework.cloud:spring-cloud-starter-netflix-hystrix-dashboard\"\n\
  ])\ncompile ([\n\"de.codecentric:spring-boot-admin-starter-client:2.1.3\",\n\"io.springfox:springfox-swagger2:2.9.2\"\
  ,\n\"io.springfox:springfox-swagger-ui:2.9.2\"\n])\ntestCompile(\"junit:junit\"\
  )\n}\n清单 6-13\nbuild.gradle 文件\n```\n\n#### 配置\n\n此配置文件中的大部分属性与我们之前在 `inventory-service`\
  \ 中定义的类似。清单 6-14 展示了该文件。\n\n```\napplication.yml\nserver:\nservlet:\ncontext-path:\
  \ /eshop\n#port: 0\nport: 8081\nspring:\napplication:\nname: eshop\ndatasource:\n\
  url: jdbc:mysql://localhost:3306/db1\nusername: root\npassword: mysql\ndriver-class-name:\
  \ com.mysql.jdbc.Driver\njpa:\nhibernate.ddl-auto: update\nshow-sql: true\ngenerate-ddl:\
  \ true\nboot:\nadmin:\nclient:\nurl: http://localhost:7777/admin\nspring.jpa.hibernate.ddl-auto:\
  \ update\neureka:\nclient:\nserviceUrl:\ndefaultZone: ${EUREKA_URI:http://localhost:8761/eureka}\n\
  instance:\npreferIpAddress: false\nmanagement:\nendpoints:\nweb:\nexposure:\ninclude:\
  \ \"*\"\n清单 6-14\n配置文件\n```\n\n#### 数据模型、仓库和控制器类\n\n在此步骤中，我们定义三个组件：\n\n*   模型（清单\
