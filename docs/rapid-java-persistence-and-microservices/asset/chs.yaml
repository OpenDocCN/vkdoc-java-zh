  \ JPA 实体模型自动生成。我们仅在文件中添加了 `ddl-auto: update` 属性。图 3-1 展示了实体关系（ER）图。\n\n![../images/454149_1_En_3_Chapter/454149_1_En_3_Fig1_HTML.jpg](img/454149_1_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1\n\n博客应用的 ER 图\n\n#### PostgreSQL 中的枚举数据类型及 JPA 映射\n\n通常需要将字面常量以字符串形式存储在数据库中，并将其映射到\
  \ Java 的枚举类型。在接下来的示例中，我们将使用 Java `enum` 类型，因此本节先花点时间了解其正确用法。\n\n如果我们通过 `POST` 实体定义等方式，将\
  \ Java 枚举以序数形式映射并存储到 PostgreSQL 数据库中，处理起来会很简单。如果我们希望通过 JPA 按原样存储枚举值（字符串字面量），则需要额外步骤，本节将对此进行说明。例如，如果\
  \ Java 代码中有以下枚举：\n\n```\npublic enum PostStatus implements Serializable {\nACTIVE(1),\
  \ NOT_ACTIVE(2);\n}\n```\n\n我们可以在数据库中存储数字（1, 2）并保持映射关系，或者存储字符串（`ACTIVE`, `NOT_ACTIVE`）。PostgreSQL\
  \ 数据库提供了 `ENUM` 数据类型，因此理想情况下，我们应该在数据库中创建一个枚举类型，以映射到 Java 对象字段。我们需要将枚举添加到 `schema.sql`\
  \ 中（参见清单 3-5）。\n\n```\ndrop type if exists post_status_enum;\nCreate type post_status_enum\
  \ as ENUM ('ACTIVE', 'NOT_ACTIVE');\ncreate table if not exists post  (\nid serial\
  \ primary key not null,\nblog_id int,\ntitle varchar(150),\ncontent text,\n\"user\"\
  \ int,\npostStatus post_status_enum default 'ACTIVE'\n);\n清单 3-5\n向模式脚本中添加枚举\n```\n\
  \n为了将它们映射到 Java 枚举，我们需要定义一个新的用户类型。用户类型是 Hibernate 中用于定义自定义数据类型的功能。清单 3-6 展示了此示例的实现方式。定义完成后，可以在枚举字段上使用\
  \ `@Type` 注解（参见清单 3-8），将其映射到代码和数据库字段。\n\n\n\n```\npackage com.example.blog_app.constants;\n\
  import org.hibernate.HibernateException;\nimport org.hibernate.engine.spi.SharedSessionContractImplementor;\n\
  import org.hibernate.usertype.EnhancedUserType;\nimport org.hibernate.usertype.ParameterizedType;\n\
  import org.postgresql.util.PGobject;\nimport java.io.Serializable;\nimport java.sql.PreparedStatement;\n\
  import java.sql.ResultSet;\nimport java.sql.SQLException;\nimport java.sql.Types;\n\
  import java.util.Properties;\npublic class PgEnumType implements EnhancedUserType,\
  \ ParameterizedType {\nprivate Class enumClass;\npublic void setParameterValues(Properties\
  \ parameters) {\nString enumClassName = parameters.getProperty(\"enumClassName\"\
  );\ntry {\nenumClass = (Class) Class.forName(enumClassName);\n} catch (ClassNotFoundException\
  \ cnfe) {\nthrow new HibernateException(\"Enum class not found\", cnfe);\n}\n}\n\
  public Object assemble(Serializable cached, Object owner)\nthrows HibernateException\
  \ {\nreturn cached;\n}\npublic Object deepCopy(Object value) throws HibernateException\
  \ {\nreturn value;\n}\npublic Serializable disassemble(Object value) throws HibernateException\
  \ {\nreturn (Enum) value;\n}\npublic boolean equals(Object x, Object y) throws HibernateException\
  \ {\nreturn x == y;\n}\npublic int hashCode(Object x) throws HibernateException\
  \ {\nreturn x.hashCode();\n}\n@Override\npublic Object nullSafeGet(ResultSet rs,\
  \ String[] names,\nSharedSessionContractImplementor session, Object owner) throws\
  \ HibernateException,\nSQLException {\nObject object = rs.getObject(names[0]);\n\
  if (rs.wasNull()) {\nreturn null;\n}\nif (object instanceof PGobject) {\nPGobject\
  \ pg = (PGobject) object;\nreturn Enum.valueOf(enumClass, pg.getValue());\n}\nif\
  \ (object instanceof String) {\nreturn Enum.valueOf(enumClass, String.valueOf(object));\n\
  }\nreturn null;\n}\n@Override\npublic void nullSafeSet(PreparedStatement st, Object\
  \ value, int index,\nSharedSessionContractImplementor session) throws HibernateException,\
  \ SQLException {\nif (value == null) {\nst.setNull(index, Types.VARCHAR);\n} else\
  \ {\nst.setObject(index, ((Enum) value), Types.OTHER);\n}\n}\npublic boolean isMutable()\
  \ {\nreturn false;\n}\npublic Object replace(Object original, Object target, Object\
  \ owner)\nthrows HibernateException {\nreturn original;\n}\npublic Class returnedClass()\
  \ {\nreturn enumClass;\n}\npublic int[] sqlTypes() {\nreturn new int[]{Types.VARCHAR};\n\
  }\npublic Object fromXMLString(String xmlValue) {\nreturn Enum.valueOf(enumClass,\
  \ xmlValue);\n}\npublic String objectToSQLString(Object value) {\nreturn '\\\" +\
  \ ((Enum) value).name() + '\\\";\n}\npublic String toXMLString(Object value) {\n\
  return ((Enum) value).name();\n}\n}\n清单 3-6\n将自定义类型定义为 Hibernate 用户类型以映射枚举\n```\n\
  \n请注意以下三个方法：\n\n*   `setParameterValues`：我们读取一个名为 `enumClassName` 的属性，并通过反射加载其目标类。\n\
  \n*   `nullSafeGet`：在 PostgreSQL API 中，自定义数据类型可以作为 `PGobject` 检索，并且可以通过此对象映射枚举值。\n\
  \n*   `nullSafeSet`：此方法重置 `PreparedStatement` 中的枚举值。\n\n我们将在下一节中使用此代码并展示结果。\n\n\
  #### 数据模型与仓库\n\n我们需要定义 Java 实体或领域对象，以根据图 3-1 所示的 ER 图来映射数据库中的表。在本节中，我们将了解通过 JPA\
  \ 创建领域层所涉及的内容。我们将从使用 `@OneToMany` 注解定义 `BLOG` 对象（见清单 3-7）以及使用 `@ManyToOne` 注解定义\
  \ `POST` 对象（见清单 3-8）开始示例。\n\n```\npackage com.example.blog_app.model.jpa;\nimport\
  \ com.fasterxml.jackson.annotation.JsonIgnore;\nimport lombok.*;\nimport javax.persistence.*;\n\
  import java.time.LocalDateTime;\nimport java.util.Set;\nimport java.util.UUID;\n\
  @Data               // 生成 getter、setter、equals、toString 和 hashCode 方法\n@Builder\
  \            // 为类中的字段生成构建器\n@NoArgsConstructor  // 生成无参构造函数\n@AllArgsConstructor\
  \  // 生成全参构造函数\n@ToString(exclude = {\"posts\"}) // 生成 toString 方法，跳过名为 posts 的字段\n\
  // 生成 equals 和 hashCode 方法，跳过名为 posts 的字段\n@EqualsAndHashCode(exclude = {\"posts\"\
  }) @Entity\npublic class Blog  implements Serializable {\n@Id\n@GeneratedValue(strategy\
  \ = GenerationType.IDENTITY)\nprivate Long id;\n/*\n出于安全原因，'guid' 对于隐藏所有外部通信中的自增\
  \ 'id' 非常有用。\n在进行分页、过滤等操作时，'id' 的索引和查询速度会更快。\n*/\n@org.hibernate.annotations.Type(type\
  \ = \"pg-uuid\")\nUUID guid;\nprivate String name;\nprivate String about;\nprivate\
  \ LocalDateTime publishedAt;\n@JsonIgnore\n@OneToMany(fetch = FetchType.LAZY, cascade\
  \ = CascadeType.ALL,\norphanRemoval = true, mappedBy = \"blog\")\nprivate Set posts;\n\
  }\n清单 3-7\nBLOG 对象定义\n```\n\n关于上述博客代码的关键观察点：\n\n*   为了在 PostgreSQL 数据库中使用 UUID，我们需要通过\
  \ SQL 语句在模式中启用它，如 `schema.sql` 文件所述（即 `CREATE EXTENSION IF NOT EXISTS uuid-ossp`）。\n\
  \n*   由于我们是单独运行 SQL 脚本，因此 `schema.sql` 无需在 Spring 启动时运行。因此，我们将 `ddl-auto` 设置为 `update`。这只会运行\
  \ `alter` 命令，而不会创建表，除非将 `ddl-auto` 设置为 `create` 或 `create-drop`。\n\n*   通过在 `class`\
  \ 上使用 Lombok 注解，我们减少了 getter、setter、equals、`hashCode` 和 `toString` 方法的样板代码，使其非常易读。\n\
  \n*   注解 `@org.hibernate.annotations.Type(type = \"pg-uuid\")` 是必需的，用于支持将 PostgreSQL\
  \ 中的 UUID 映射到 Java UUID 类。\n\n*   我们现在可以轻松支持 `LocalDateTime`，将其映射到数据库中数据类型的 timestamp。\n\
  \n*   注解 `@JsonIgnore`、`@ToString(exclude = {\"posts\"})` 和 `@EqualsAndHashCode(exclude\
  \ = {\"posts\"})` 有助于在序列化、生成的 `toString`、equals 和 `hashCode` 对象比较方法中忽略延迟加载的关联对象。\n\
  \n*   作为良好实践，最好不要将任何对象的自增 ID 和主键发送回客户端。因此，可以使用 GUID（全局唯一标识符）。但是，性能可能会变慢，因为索引大的随机字符会变慢。为了克服这一点，我们同时使用两种\
  \ ID。\n\n类似地，我们还将定义 `POST`（见清单 3-8）和 `USER` 对象（见清单 3-9）。\n\n\n\n```\npackage com.example.blog_app.model.jpa;\n\
  import lombok.*;\nimport javax.persistence.*;\nimport java.util.Set;\n@Data\n@Builder\n\
  @NoArgsConstructor\n@AllArgsConstructor\n@ToString(exclude = {\"posts\"})\n@EqualsAndHashCode(exclude\
  \ = {\"posts\"})\n@Entity(name = \"`user`\")\npublic class User  implements Serializable\
  \ {\npublic User(String username, String password, String email)   {\nthis.username\
  \ = username;\nthis.password = password;\nthis.email = email;\n}\n@Id\n@GeneratedValue(strategy\
  \ = GenerationType.IDENTITY)\nprivate Long id;\nprivate String username;\nprivate\
  \ String password;\nprivate String email;\nprivate Boolean isActive;\n@OneToMany(fetch\
  \ = FetchType.LAZY, cascade = CascadeType\n.ALL, mappedBy = \"user\", orphanRemoval\
  \ = true)\nprivate Set posts;\n}\n代码清单 3-9\n用户对象定义\n```\n\n```\npackage com.example.blog_app.model.jpa;\n\
  import com.fasterxml.jackson.annotation.JsonIgnore;\nimport lombok.*;\nimport javax.persistence.*;\n\
  import java.util.Set;\n@Data\n@Builder\n@NoArgsConstructor\n@AllArgsConstructor\n\
  @ToString(exclude = {\"blog\", \"user\"})\n@EqualsAndHashCode(exclude = {\"blog\"\
  , \"user\"})\n@Entity\npublic class Post  implements Serializable {\n@Id\n@GeneratedValue(strategy\
  \ = GenerationType.IDENTITY)\nprivate Long id;\nprivate String title;\nprivate String\
  \ content;\n@Column(name = \"post_status\")\n@Type(type = \"com.example.blog_app.constants.PgEnumType\"\
  ,\nparameters = {@org.hibernate.annotations.Parameter(name = \"enumClassName\",\
  \ value = \"com.example.blog_app.model.jpa.PostStatus\")})\n// @Enumerated(EnumType.ORDINAL)\
  \ // 否则使用此方式将其存储为整数\nPostStatus postStatus;\n@ManyToOne(fetch = FetchType.LAZY,\
  \ cascade = CascadeType. REFRESH)\n@JoinColumn(name = \"blog_id\")\nprivate Blog\
  \ blog;\n@JsonIgnore\n@ManyToOne(fetch = FetchType.LAZY, cascade = CascadeType.REFRESH)\n\
  @JoinColumn(name = \"author_id\")\nprivate User user;\n}\npackage com.example.blog_app.model.jpa;\n\
  import java.io.Serializable;\npublic enum PostStatus implements Serializable {\n\
  ACTIVE(1), NOT_ACTIVE(2);\nint status;\nPostStatus(int status)  {\nthis.status =\
  \ status;\n}\n}\n代码清单 3-8\n文章对象和 PostEnum 定义\n```\n\n借助 Spring Data，只需定义接口即可定义 DAO\
  \ 层（参见代码清单 3-10）。\n\n```\npackage com.example.blog_app.repository;\nimport com.example.blog_app.model.jpa.Blog;\n\
  import com.example.blog_app.model.jpa.Post;\nimport org.springframework.data.jpa.repository.JpaRepository;\n\
  public interface PostRepository extends JpaRepository {}\npackage com.example.blog_app.repository;\n\
  import com.example.blog_app.model.jpa.User;\nimport com.example.blog_app.repository.base.CustomRepository;\n\
  public interface UserRepository extends CustomRepository {\nvoid deleteByUsername(String\
  \ username);\n}\npackage com.example.blog_app.repository;\nimport com.example.blog_app.model.jpa.Blog;\n\
  import org.springframework.data.jpa.repository.JpaRepository;\npublic interface\
  \ BlogRepository extends JpaRepository {\n}\n代码清单 3-10\n仓库接口定义\n```\n\n注意事项：\n\n\
  *   字段的数据类型应定义为对象而非基本类型，因为基本类型在处理空值时可能引发问题。\n\n*   `user` 实体在其定义中被引号包围，例如 ``@Table(name\
  \ = \"`user`\")``。这是必要的，因为 `user` 是 PostgreSQL 中的关键字。在 `schema.sql` 文件中也使用了相同的字符。\n\
  \n*   我们在 `Blog` 和 `User` 对象中定义了 `@OneToMany` 注解。定义此关系时需要遵循一些约定。这里以 `User -> Post`\
  \ 对象为例：\n\n*   根据 Hibernate 文档的最佳实践，始终优先将关联定义为 `Lazy`。\n\n*   根据 Hibernate 文档的最佳实践，定义双向关联，因为这样在两侧进行导航都更容易。然而，它们定义起来稍显复杂且难以保持同步。例如，在添加新的\
  \ `POST` 时，两个实体（`POST` 和 `Blog`）都需要刷新以保持内存中对象的同步。\n\n*   父对象（`User`）有一个属性设置为 `mappedBy=user`，该属性映射了子对象（此处为\
  \ `POST`）中的 `user` 字段。仅当关系是双向时才需要此设置。\n\n*   `CascadeType.ALL` 会在父实体被删除或更新时，触发所有级联事件到内存中的子对象。例如，当用户被删除时，所有相关的\
  \ `POST` 行将成为孤儿。`orphanRemoval=true` 会进一步从数据库中删除这些相关行。\n\n*   在另一端，子对象或 `POST` 实体必须使用\
  \ `Cascade.REFRESH` 进行注解，以便在任何子对象被删除或更新时，仅刷新父对象。\n\n*   我们通过 Lombok 的 `@ToString`\
  \ 和 `@EqualsAndHashCode` 忽略了延迟加载的字段。这将忽略 `toString()`、`equals()` 和 `hashCode()`\
  \ 方法生成代码中的关系字段。\n\n*   `@JsonIgnore` 用于相关字段之上，以在序列化和反序列化过程中忽略它们。\n\n```\nUSER\n\
  @OneToMany(fetch = FetchType.LAZY, cascade = CascadeType.ALL,\nmappedBy = \"user\"\
  , orphanRemoval = true)\nprivate Set posts;\nPOST\n@JsonIgnore\n@ManyToOne(fetch\
  \ = FetchType.LAZY, cascade = CascadeType.REFRESH)\n@JoinColumn(name = \"author_id\"\
  )\nprivate User user;\n```\n\n\n\n### 使用 CascadeType.ALL 及应避免的情况\n\n`CascadeType.ALL`\
  \ 的含义是，持久化上下文会将所有 `EntityManager` 操作（`PERSIST`、`REMOVE`、`REFRESH`、`MERGE` 和 `DETACH`）传播（级联）到相关实体。\n\
  \n详细的 `Cascade` 类型描述如下：\n\n*   `PERSIST`：如果父实体被持久化到持久化上下文中，相关实体也会被持久化。\n*   `MERGE`：如果父实体被合并到持久化上下文中，相关实体也会被合并。\n\
  *   `REFRESH`：如果父实体在当前持久化上下文中被刷新，相关实体也会被刷新。\n*   `DETACH`：如果父实体从持久化上下文中被分离，相关实体也会被分离。\n\
  *   `REMOVE`：如果父实体从当前持久化上下文中被移除，相关实体也会被移除。\n*   `ALL`：所有上述描述都应用于相关实体。\n\n级联是最敏感的设置，因为在更新和删除的情况下，也可能发生意外行为。以\
  \ `CascadeType.REMOVE` 为例，有时你可能希望即使父实体被删除，子表的行仍然存在，特别是当子表与其他表存在其他关系时。\n\n让我们看一个反面示例，通过修改上一节中的实体关联代码（见清单\
  \ 3-11），来解释使用 `CascadeType.All` 的影响。\n\n```\npublic class Blog  implements Serializable\
  \ {\n@OneToMany(fetch = FetchType.LAZY, cascade = CascadeType.ALL,\norphanRemoval\
