  \n```\n.\n├── build.gradle\n├── gradle\n│   └── wrapper\n│       ├── gradle-wrapper.jar\n\
  │       └── gradle-wrapper.properties\n├── gradlew\n├── gradlew.bat\n├── settings.gradle\n\
  └── src\n    └── main\n        ├── java\n        │   └── com\n        │       └──\
  \ example\n        │            └── eshop\n        │                 └── inventory\n\
  \        │                      ├── InventoryApp.java\n        │               \
  \       ├── model\n        │                      │    └── Inventory.java\n    \
  \    │                      ├── repository\n        │                      │   \
  \ └── InventoryRepository.java\n        │                      ├── service\n   \
  \     │                      │    └── InventoryService.java\n        │         \
  \             └── web\n        │                           └── InventoryController.java\n\
  \        └── resources\n            ├── application.yml\n            └── bootstrap.yml\n\
  ```\n\n#### 应用设置\n\n从 [`http://www.spring.io`](http://www.spring.io) 创建一个名为 `inventory-service`\
  \ 的新应用，并对 `build.gradle` 文件进行修改，如清单 6-7 所示。\n\n```\nbootJar  {\n    baseName = 'inventory-service'\n\
  \    version =  '1.0'\n}\ndependencies {\n    compile ([\n        \"org.springframework.boot:spring-boot-starter-web\"\
  ,\n        \"org.springframework.boot:spring-boot-starter-data-jpa\",\n        \"\
  org.springframework.boot:spring-boot-starter-test\",\n        \"org.projectlombok:lombok:1.18.6\"\
  ,\n        \"org.springframework.cloud:spring-cloud-starter-netflix-eureka-client\"\
  ,\n        \"org.springframework.cloud:spring-cloud-starter-config\"\n    ])\n \
  \   compile(\"org.springframework.cloud:spring-cloud-starter-sleuth\")\n    compile(\"\
  de.codecentric:spring-boot-admin-starter-client:2.1.3\")\n    compile(\"org.springframework.boot:spring-boot-starter-actuator\"\
  )\n    runtime(\"com.h2database:h2\")\n    testCompile(\"junit:junit\")\n}\n清单 6-7\n\
  build.gradle 文件\n```\n\n#### 配置\n\n我们在 `bootstrap.yml` 文件中定义了与 `config-service`\
  \ 相关的配置属性，其余属性定义在 `application.yml` 中（参见清单 6-8）。\n\n```\nbootstrap.yml\nspring:\n\
  \  application:\n    name: inventory-service\n  profiles:\n    active: dev\n  cloud:\n\
  \    config:\n      uri: http://localhost:8888/config\n\napplication.yml\nserver:\n\
  \  servlet:\n    contextPath: /inventory\n  port: 8082\nspring:\n  jpa:\n    hibernate.ddl-auto:\
  \ create\n    show-sql: true\n    generate-ddl: true\n  datasource:\n    name: inventorydb\n\
  \  boot:\n    admin:\n      client:\n        url: http://localhost:7777/admin\n\
  management:\n  endpoints:\n    web:\n      exposure:\n        include: \"*\"\neureka:\n\
  \  client:\n    serviceUrl:\n      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}\n\
  \  instance:\n    preferIpAddress: false\nspring.main.allow-bean-definition-overriding:\
  \ true\n清单 6-8\n配置文件\n```\n\n说明：\n\n*   在 `bootstrap.yml` 文件中，我们定义了 Spring Cloud\
  \ Config 相关属性，用于连接到位于 `http://localhost:8888/config` 的 `config-service`。\n*   在\
  \ `application.yml` 文件中，我们定义了 `contentPath`、端口以及 JPA 相关属性，用于连接到内存数据库 H2。\n*   我们还定义了\
  \ Spring Boot Admin 相关属性，由 `spring.boot.*` 和 `management.*` 表示，这些属性暂时可以忽略，稍后会进行说明。\n\
  *   此外，我们还有 Eureka 客户端相关属性（`eureka.client.*`），这些属性会将此服务注册到发现服务。库存服务应能够连接到位于 `http://localhost:8761/eureka`\
  \ 的 `discovery-service`。该位置被定义为一个键值对，例如 `defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}`。\n\
  *   我们有一个名为 `spring.main.allow-bean-definition-overriding` 的新属性。这是 Spring Boot 2.1.0\
  \ 版本之后为了覆盖任何 Bean 属性而需要的。我们使用此属性是因为我们正在覆盖 JPA 和 Eureka 客户端相关的属性。\n\n#### 完整应用代码\n\
  \n我们需要一个 `Inventory` 类作为数据模型，以及一个 `InventoryService` 类来管理其 CRUD 操作（清单 6-9 和 6-10）。除了这两个类之外，我们还需要一个\
  \ REST 控制器，以便其他服务通过它访问 CRUD 操作（参见清单 6-12）。\n\n```\npackage com.example.eshop.inventory.service;\n\
  \nimport com.example.eshop.inventory.model.Inventory;\nimport com.example.eshop.inventory.repository.InventoryRepository;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Service;\n\nimport java.util.Optional;\n\n\
  @Service\n@Slf4j\npublic class InventoryService {\n\n    @Autowired\n    InventoryRepository\
  \ inventoryRepository;\n\n    public Inventory getInventory(Long productId) {\n\
  \        log.info(\"Inventory lookup request for productId: {}\",\n            \
  \    productId);\n        Optional<Inventory> inventory = inventoryRepository.findById(productId);\n\
  \        return inventory.orElse(Inventory.builder()\n                .inventoryId(1l)\n\
  \                .productId(productId)\n                .price(200)\n          \
  \      .quantity(2)\n                .build());\n    }\n}\n清单 6-10\n包含业务逻辑的服务类\n\
  ```\n\n```\npackage com.example.eshop.inventory.model;\n\nimport lombok.Builder;\n\
  import lombok.Data;\n\nimport javax.persistence.Entity;\nimport javax.persistence.GeneratedValue;\n\
  import javax.persistence.Id;\nimport javax.persistence.Table;\n\n@Entity\n@Data\n\
  @Builder\n@Table(name = \"Inventory\")\npublic class Inventory {\n    @Id\n    @GeneratedValue\n\
  \    private Long inventoryId;\n    Long productId;\n    Integer price;\n    Integer\
  \ quantity;\n}\n清单 6-9\n模型类\n```\n\n在这段代码中，我们查询数据库，要么获取一个产品，要么使用 `Optional` 构建一个产品。这样，在示例运行时，我们可能需要在数据库中手动插入条目。我们只返回了一个产品，其数量设置为\
  \ 2，价格为 200 美元。或者，我们可以定义 `InventoryRepository` 来连接到 H2 数据库，如清单 6-11 所示。如果数据被插入到\
  \ H2 表中，清单 6-10 中的 `InventoryService` 将返回数据库中的数据。\n\n```\npackage com.example.eshop.inventory.repository;\n\
  \nimport com.example.eshop.inventory.model.Inventory;\nimport org.springframework.data.jpa.repository.JpaRepository;\n\
  \npublic interface InventoryRepository extends JpaRepository<Inventory, Long> {\
  \ }\n清单 6-11\n数据仓库\n```\n\n清单 6-12 包含了通过 HTTP 访问 CRUD 操作所需的 `REST` 控制器类。我们有一个 `GET`\
  \ API，它接收 `productId` 并返回该 `productId` 的库存详细信息。\n\n```\npackage com.example.eshop.inventory.web;\n\
  \nimport com.example.eshop.inventory.model.Inventory;\nimport com.example.eshop.inventory.service.InventoryService;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.web.bind.annotation.GetMapping;\nimport org.springframework.web.bind.annotation.PathVariable;\n\
  import org.springframework.web.bind.annotation.RestController;\n\n@RestController\n\
  @Slf4j\npublic class InventoryController {\n\n    @Autowired\n    InventoryService\
  \ inventoryService;\n\n    @GetMapping(\"/api/inventory/{productId}\")\n    public\
  \ Inventory getInventoryForProduct(@PathVariable(\"productId\")\n              \
  \                                      Long productId) {\n        log.info(\"Inventory\
  \ request for product: {}\", productId);\n        Inventory inventory = inventoryService.getInventory(productId);\n\
  \        log.info(\"inventory : {}\", inventory);\n        return inventory;\n \
  \   }\n}\n\npackage com.example.eshop.inventory;\n\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\n\n@SpringBootApplication\n\
  public class InventoryApp {\n    public static void main(String[] args) {\n    \
  \    SpringApplication.run(InventoryApp.class, args);\n    }\n}\n清单 6-12\nREST 控制器类\n\
  ```\n\n说明：\n\n\n\n*   `InventoryController` 暴露了一个 URI 设置为 `/api/inventory/{productId}`\
  \ 的端点。库存数据模型包含价格和数量，这些数据可以通过 JPA 存储在内存数据库 H2 中。\n\n*   `InventoryController` 类充当\
  \ RESTful Web 资源，并包含一个 `GET` 动词方法，用于获取产品当前的可用库存。\n\n*   关于是否通过注解在 Spring 中使用自动装配，存在不同观点。我认为，除非应用程序是单体应用或足够庞大，否则这不成问题。当应用程序非常大且字段注入没有谨慎进行时，这曾经会引发问题，从而导致上帝对象（类实例过大）。\n\
