  \ 会生成一个指标数据流，可通过 `http://localhost:8081/eshop/actuator/hystrix.stream` 访问。我们需要在\
  \ Hystrix 仪表盘界面的输入框中输入此 Hystrix 流 URL，如图 6-5 所示。此外，我们还需要像在 6.3.3.6 节中那样，再次访问 `eshop`\
  \ 服务的 `/api/orders` API 端点。仪表盘将如图 6-6 所示。\n\n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig6_HTML.jpg](img/454149_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6\n\ninventory-service 正常运行时的 Hystrix 仪表盘\n\n我们可以在图 6-6 中看到“断路器已闭合”。在 `orderProduct`\
  \ 下方，有一个绿色的数字“3”。\n\n为了验证相反的情况，我们需要停止 inventory-service 一段时间，并多次访问 `eshop` 服务的 `/api/orders`\
  \ API 端点。让我们在停止 `inventory-service` 后，再次查看 `eshop` 服务的控制台日志：\n\n```\n2019-04-02\
  \ 22:13:18.002 ERROR [eshop,7155a8b13c0b7e1b,\n2a018f069c73c5b7,false] 70051 ---\
  \ [-OrderService-2]\nc.e.eshop.service.impl.OrderService      : Inventory Service\
  \ is responding very slow\n2019-04-02 22:13:18.003 ERROR [eshop,7155a8b13c0b7e1b,\n\
  7155a8b13c0b7e1b,false] 70051 --- [nio-8081-exec-6]\ncom.example.eshop.web.TestController\
  \     : Transactions are failing, please check after some time\n```\n\n这些日志语句被添加到了\
  \ `eshop` 服务的 `OrderService.handleInventoryFailure()` 方法中。这验证了当 inventory-service\
  \ 超时时，降级方法被调用了。换句话说，断路器已打开，降级机制运行正常。我们现在可以在 Hystrix 仪表盘中观察到同样的效果，如图 6-7 所示。\n\n\
  ![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig7_HTML.jpg](img/454149_1_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7\n\ninventory-service 未运行时的 Hystrix 仪表盘\n\n从图 6-7 中我们可以看到，有六个请求发生了短路。这意味着有六个请求被\
  \ Hystrix 捕获，因为目标服务（`inventory-service`）未运行。\n\n## 微服务架构中的请求追踪\n\n分布式系统编程中的另一个常见挑战是，在生产部署后，很难跨服务追踪请求流。这个问题带来了两个需要解决的难题——集中式日志和请求追踪。\n\
  \n对于集中式日志记录，我们需要将多台服务器上生成的所有日志合并到一个中心点，以便进行搜索、故障排除和分析。这不是一个新问题。行业标准解决方案可以收集并允许搜索集群中多个节点的日志。例如\
  \ ELK、Fluentd、Graylog、Splunk 等。它们都支持两种日志收集模式：\n\n*   基于代理对日志文件进行 tail 操作，并将最新收集的日志增量发送到服务器。\n\
  \n*   使用应用程序的 API SDK 直接将日志发送到服务器。\n\n请求追踪是一个不同的问题，并且随着微服务数量的增加而变得更加棘手。当我们想要追踪跨越多个服务的请求或事务时，就需要用到它。\n\
  \nSpring Cloud 通过 Spring Cloud Sleuth 为这一需求提供了解决方案。假设我们想要追踪单个失败的请求（带有某些错误码），甚至基于跨服务的任何请求的某些公共属性进行日志分析。这个库有助于在日志中为每个新请求嵌入一个\
  \ TraceId。TraceId 是 Spring Sleuth 为每个新请求生成的唯一 UUID。如果请求经过多个服务，Spring Sleuth 将追踪此\
  \ ID，并在第二个服务的日志中保持其相同。\n\n生成的属性共有四个，包含两个这样的 ID。生成数据的完整语法如下所示：\n\n*   `APPLICATION_NAME`：服务的名称\n\
  \n*   `TRACE_ID`：请求的唯一 ID\n\n*   `SPAN_ID`：每个工作跨度的唯一 ID。在我们的示例中，对于同一个请求，`SPAN_ID`\
  \ 在 `Eshop` 和 `Inventory` 服务中是不同的。\n\n*   `EXPORT_LOGS_OR_NOT`：是否应将日志导出到其他工具。\n\n\
  ```\n[APPLICATION_NAME, TRACE_ID, SPAN_ID, EXPORT_LOGS_OR_NOT]\n```\n\n目前也有一些工具可以帮助您利用生成的属性可视化日志并追踪服务。两个这样的例子是\
  \ Google 的 Dapper 和 Zipkin。我们不会详细讨论它们，因为它们不在本书的讨论范围内。为了在应用程序中实现分布式追踪日志，需要四个步骤：\n\
  \n1.  在 `build.gradle` 文件中为 `eshop` 和 `inventory-service` 微服务添加新的依赖项，然后重启它们：\n\n\
  ```\n    compile(\"org.springframework.cloud:spring-cloud-starter-sleuth\")\n  \
  \  compile(\"org.springframework.cloud:spring-cloud-starter-zipkin\")\n    ```\n\
  \n2.  从 `zipkin.io` 下载 Zipkin Jar 文件并作为服务启动：\n\n```\n    java -jar ./zipkin-server-2.12.7-exec.jar\n\
  \    ```\n\n1.  在 `eshop` 和 `inventory-service` 的 `application.yml` 文件中添加一个属性，然后重启它们两个：\n\
  \n```\n    spring.zipkin.base-url: http://localhost:9411/\n    ```\n\n1.  再次访问 `eshop`\
  \ 服务的 `/api/orders` API 几次。\n\n```\n    > curl -H \"Content-Type: application/json\"\
  \ -X POST -i http://localhost:8081/eshop/ api/orders\n    ```\n\n完成这些更改后，Spring\
  \ Cloud Sleuth 将开始向每个日志语句添加以下属性。\n\n```\n/eshop/src/main/resources/application.yml\n\
  INFO [eshop,6e0abc792dc25b96,e49bf80a97204e7e,false] 67023 --- [-OrderService-1]\n\
  c.e.eshop.service.impl.OrderService      : Result from inventory service:\n{quantity=2,\
  \ productId=1, price=200, inventoryId=1}\n/inventory-service/src/main/resources/application.yml\n\
  INFO [inventory-service,3d3af1edbfa15240,50f818143fd68f39,false] 19246 ---\n[nio-8082-exec-1]\
  \ c.e.e.inventory.web.InventoryResource    : Inventory request for product: 1\n\
  ```\n\n\n\n这些日志有助于追踪跨 `Eshop` 和 `inventory-services` 的同一请求。图 6-8 通过 Zipkin 的用户界面展示了这种关联关系。\n\
  \n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig8_HTML.jpg](img/454149_1_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8\n\nZipkin 用户界面\n\n当我们点击图 6-8 中绿色显示的服务名称时，图 6-9 展示了另一个二级视图。\n\n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig9_HTML.jpg](img/454149_1_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9\n\nZipkin 用户界面，二级视图\n\n## 微服务架构中的监控\n\n生产应用的管理和监控是一个庞大的话题，我们仅讨论框架中可用于支持我们目前示例的简单选项。我们有一个名为\
  \ Spring Boot Admin (SBA) 的开源 Web 应用程序，用于对 Spring Boot 应用进行基本监控。它通过用户界面提供的信息相当全面。\n\
  \n实际上，这种魔力首先是通过另一个名为 Spring Boot *Actuator* 的项目实现的。Actuator 包含的服务负责持续收集来自 JVM 和其他系统组件的指标数据。Actuator\
  \ 还暴露了 RESTful 端点，通过这些端点可以直接查看所收集的相同信息。SBA 应用程序是构建在这些 Actuator 端点之上的一个用户界面。表 6-1\
  \ 列出了 Actuator 中的端点。\n\n表 6-1\n\nActuator 端点\n\n| 端点 ID | 描述 |\n| --- | --- |\n\
  | `auditevents` | 暴露应用程序的审计事件（例如 `auth_success`、`order_failed`）。 |\n| `info` | 显示应用程序的信息。\
  \ |\n| `health` | 显示应用程序的健康状态。 |\n| `metrics` | 显示应用程序的各种指标信息。 |\n| `loggers` |\
  \ 显示和修改已配置的日志记录器。 |\n| `logfile` | 返回日志文件的内容（如果设置了 `logging.file` 或 `logging.pathproperties`）。\
  \ |\n| `httptrace` | 显示最近 100 个 HTTP 请求/响应的 HTTP 跟踪信息。 |\n| `env` | 显示当前环境属性。 |\n\
  | `flyway` | 显示 Flyway 数据库迁移的详细信息。 |\n| `liquidbase` | 显示 Liquibase 数据库迁移的详细信息。\
  \ |\n| `shutdown` | 允许优雅地关闭应用程序。 |\n| `mappings` | 显示所有 `@RequestMapping` 路径的列表。\
  \ |\n| `scheduledtasks` | 显示应用程序中的计划任务。 |\n| `threaddump` | 执行线程转储。 |\n| `heapdump`\
  \ | 返回 GZip 压缩的 JVM 堆转储。 |\n\n默认情况下，Actuator 端点通过路径 `{/contextPath}/actuator/*`\
  \ 暴露。**SBA** 有两个 API 可以在应用程序中启用此功能——服务器端和客户端。SBA 客户端 API 持续收集从 Actuator 端点获取的监控指标数据，并将其发送到已配置的\
  \ SBA 服务器。因此，我们需要在所有希望通过 SBA 监控的应用程序中启用 Actuator。在我们的示例中，需要执行以下两个步骤：\n\n1.  创建一个名为\
  \ `admin-service` 的新服务。\n\n2.  将现有的 `eshop` 和 `inventory-service` 应用程序配置为 `admin-service`\
  \ 的客户端。\n\n我们将在本节中创建的 `admin-service` 客户端，可能是本章迄今为止构建的所有服务中最小的一个。该应用程序的代码结构如下：\n\
  \n```\n.\n├── build.gradle\n├── gradle\n│   └── wrapper\n│       ├── gradle-wrapper.jar\n\
  │       └── gradle-wrapper.properties\n├── gradlew\n├── gradlew.bat\n└── src\n└──\
  \ main\n├── java\n│   └── com\n│       └── example\n│            └── admin\n│  \
  \               └── AdminApp.java\n└── resources\n└── application.yml\n```\n\n###\
  \ 应用程序设置\n\n从 [`http://www.spring.io`](http://www.spring.io) 创建一个名为 `admin-service`\
  \ 的新应用，并对 `build.gradle` 文件进行清单 6-24 所示的更改。\n\n```\nbootJar {\nbaseName = 'admin-service'\n\
  version =  '1.0'\n}\ndependencies {\ncompile(\"org.springframework.boot:spring-boot-starter-web\"\
  )\ncompile(\"de.codecentric:spring-boot-admin-server:2.1.3\")\ncompile(\"de.codecentric:spring-boot-admin-server-ui:2.1.3\"\
  )\ncompile(\"org.projectlombok:lombok:1.18.6\")\n}\n清单 6-24\nbuild.gradle 文件\n```\n\
  \n正如我们看到的依赖项，这不是一个 Spring 项目，而是另一个基于 Apache 2 许可证的开源项目（ [`https://github.com/codecentric/spring-boot-admin`](https://github.com/codecentric/spring-boot-admin)\
  \ ）。\n\n### 配置\n\n除了通用设置外，我们需要通过 Spring 启用基本安全性来保护对其用户界面的访问，如清单 6-25 所示。\n\n```\n\
  server:\nport: 7777\nspring:\napplication:\nname: admin-service\nboot:\nadmin:\n\
  context-path: /admin\nclient:\nusername: user\npassword: secret\n清单 6-25\nApplication.yml\n\
  ```\n\n### 应用程序类\n\n我们需要通过在 `Application` 类的顶部添加 `@EnableAdminServer` 注解来启用管理服务器功能，我们在清单\
  \ 6-26 中执行此操作。\n\n```\npackage com.example.admin;\nimport de.codecentric.boot.admin.server.config.EnableAdminServer;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.EnableAutoConfiguration;\n\
  import org.springframework.context.annotation.Configuration;\n@Configuration\n@EnableAutoConfiguration\n\
  @EnableAdminServer\npublic class AdminApp {\npublic static void main(String[] args)\
  \ {\nSpringApplication.run(AdminApp.class, args);\n}\n}\n清单 6-26\n应用程序类\n```\n\n\
  ### 管理服务客户端\n\n我们需要在所有需要通过此服务监控的其他微服务的 `application.yml` 文件中添加 Spring Boot Admin\
  \ 客户端配置设置。在我们的示例中，让我们在 `eshop`**、**`inventory-service`**、**`config-service` 和 `discovery-service`\
  \ 中添加属性，**如**清单 6-27 所示。\n\n```\nspring:\nboot:\nadmin:\nclient:\nurl: http://localhost:7777/admin\n\
  management:\nendpoints:\nweb:\nexposure:\ninclude: \"*\"\n清单 6-27\nApplication.yml\n\
  ```\n\n注意：\n\n*   `management.endpoints.web.exposure.*` 属性来自 Spring Boot Actuator\
  \ 库。我们可以指定第 6.6 节表 6-1 中端点名称的逗号分隔列表。指定 `*` 意味着我们通过 HTTP 暴露所有端点数据。\n\n*   `spring.boot.admin.client.*`\
  \ 属性与 SBA 客户端相关，该客户端会定期将从这些暴露的 Actuator 端点收集的数据发送到已配置的管理服务器 URL（注意 `client.url`\
  \ 属性）。\n\n\n\n### 测试管理服务\n\n要查看实际效果，请依次启动 `admin-service`，然后重启 `config-service`、`discovery-service`、`eshop`\
  \ 和 `inventory-service`。\n\n```\n> gradle bootRun\n:: Spring Boot ::         (v2.1.3.RELEASE)\n\
  2019-04-04 23:39:32.030   INFO 93382 --- [           main]\ncom.example.admin.AdminApp\
  \                : No active profile set, falling back to default profiles: default\n\
  2019-04-04 23:39:33.515   WARN 93382 --- [           main]\nion$DefaultTemplateResolverConfiguration\
  \  : Cannot find template location:\nclasspath:/templates/ (please add some templates\
  \ or check your Thymeleaf configuration)\n2019-04-04 23:39:34.004   INFO 93382 ---\
  \ [           main]\no.s.b.a.e.web.EndpointLinksResolver       : Exposing 2 endpoint(s)\
  \ beneath base path '/actuator'\n2019-04-04 23:39:34.706   INFO 93382 --- [    \
  \       main]\no.s.b.web.embedded.netty.NettyWebServer   : Netty started on port(s):\
  \ 7777\n2019-04-04 23:39:34.715   INFO 93382 --- [           main]\ncom.example.admin.AdminApp\
  \                : Started AdminApp in 3.19 seconds (JVM running for 3.682)\n```\n\
  \n一旦所有这些服务启动，我们就可以在浏览器中通过 `http://localhost:7777/admin#/applications` 查看 `admin-service`\
  \ 的 UI。图 6-10 显示所有服务都在 `admin-service` 中受到监控。如果我们点击任意服务名称的超链接，将显示所有指标，如图 6-10 和图\
  \ 6-11 所示。\n\n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig11_HTML.jpg](img/454149_1_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11\n\neshop 服务详情\n\n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig10_HTML.jpg](img/454149_1_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10\n\nSpring Boot Admin 网页控制台\n\n## 快速文档\n\n有多种选项可以用 Java 描述 REST API。我们将介绍\
  \ OpenAPI 规范（OAS），这是 OpenAPI 倡议中的一个项目。OpenAPI 是一个 Linux 基金会合作项目，拥有超过 20 个成员，包括 Adobe、IBM、Google、Microsoft\
  \ 和 Salesforce。OpenAPI 规范（OAS）旨在为 REST API 定义一个标准的、与编程语言无关的接口描述。\n\n该规范终结了不同框架（如\
  \ Json Schema、WADL、RAML 和 Swagger）功能集之间的比较。现在，我们将拥有不同的实现，就像该规范的 JDBC 驱动程序一样。到目前为止，该规范已由多个不同语言的客户端完全实现。本章我们将介绍\
  \ Swagger，它是用 Java 编写的（[`https://github.com/swagger-api`](https://github.com/swagger-api)）。Swagger\
  \ 提供了一系列用于编写（Swagger Editor）、查看（Swagger UI）和生成代码（Swagger Codegen）的工具：\n\n*   **Swagger\
  \ Editor**：基于浏览器的编辑器，您可以在其中编写 OpenAPI 规范。\n\n*   **Swagger UI**：将 OpenAPI 规范渲染为交互式\
  \ API 文档。\n\n*   **Swagger Codegen**：根据 OpenAPI 规范生成服务器存根和客户端库。\n\n我们可以创建一个 YAML\
  \ 文件并从中生成项目，或者通过 Spring Boot 应用程序中的注解嵌入 Swagger 规范的相关属性。在本节中，我们将介绍 Spring Boot 集成示例，通过我们的微服务示例启用\
  \ Swagger API。我们需要在 `eshop` 服务中包含两个依赖项，以查看一个可运行的示例：\n\n```\ncompile(\"io.springfox:springfox-swagger2:2.9.2\"\
  )\ncompile(\"io.springfox:springfox-swagger-ui:2.9.2\")\n```\n\n### Java 配置\n\n\
  我们需要先定义 Swagger 相关的配置，然后在控制器类中为 RESTful 资源定义注解。清单 6-28 展示了 Swagger 的基本 Java 配置。\n\
  \n```\npackage com.example.eshop.config;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport springfox.documentation.builders.RequestHandlerSelectors;\n\
  import springfox.documentation.spi.DocumentationType;\nimport springfox.documentation.spring.web.plugins.Docket;\n\
  import springfox.documentation.swagger2.annotations.EnableSwagger2;\nimport static\
  \ springfox.documentation.builders.PathSelectors.regex;\n@Configuration\n@EnableSwagger2\n\
  public class SwaggerConfig {\n@Bean\npublic Docket productApi() {\nreturn new Docket(DocumentationType.SWAGGER_2)\n\
  .select()\n.apis(RequestHandlerSelectors.basePackage(\"com.example.eshop\"))\n.paths(regex(\"\
  /api.*\"))\n.build();\n}\nprivate ApiInfo apiInfo() {\nreturn new ApiInfoBuilder().title(\"\
  Eshop Service API\")\n.description(\"Eshop API reference for developers\")\n.termsOfServiceUrl(\"\
  http://localhost:8201/eshop\")\n.contact(new Contact(\"Raj Malhotra\", \"http://\n\
  www.example.com\", \"mraj6046@gmail.com\")).license(\"Example License\nTitle\")\n\
  .licenseUrl(\"http://localhost:8201/eshop/\nlicense\").version(\"1.0\").build();\n\
  }\n}\n清单 6-28\nSwagger 的 Java 配置\n```\n\n注意：\n\n*   第一个方法名为 `productApi()`，提供了一个\
  \ `Docket` bean，这是一个构建器，旨在成为 Springfox 框架的主要接口。\n\n*   `Docket` 允许您定义可以找到带有 Swagger\
  \ 注解的控制器类的包，以及所有 API 的路径。\n\n*   第二个 bean 名为 `ApiInfo`，允许您定义通用信息，例如用户/作者的联系方式和许可证信息。\n\
  \n\n\n### 自定义 Swagger\n\n接下来，我们需要使用 Swagger 注解来描述 `Controller` 类的方法，以定义它们的描述、输入和输出变量以及错误码。清单\
  \ 6-29 展示了 Spring Web `RestControllers` 顶部的最终注解。\n\n```\npackage com.example.eshop.web;\n\
  import com.example.eshop.model.Order;\nimport com.example.eshop.service.impl.CustomerService;\n\
  import com.example.eshop.service.impl.OrderService;\nimport com.example.eshop.service.impl.ProductService;\n\
  import com.netflix.discovery.EurekaClient;\nimport com.netflix.discovery.shared.Applications;\n\
  import io.swagger.annotations.ApiOperation;\nimport io.swagger.annotations.ApiResponse;\n\
  import io.swagger.annotations.ApiResponses;\nimport lombok.extern.slf4j.Slf4j;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.cloud.client.ServiceInstance;\n\
  import org.springframework.cloud.client.discovery.DiscoveryClient;\nimport org.springframework.http.HttpStatus;\n\
  import org.springframework.http.ResponseEntity;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
  import org.springframework.web.bind.annotation.PostMapping;\nimport org.springframework.web.bind.annotation.RestController;\n\
  import org.springframework.web.servlet.support.ServletUriComponentsBuilder;\nimport\
  \ java.net.URI;\nimport java.util.List;\nimport java.util.Objects;\n@RestController\n\
  @Slf4j\npublic class TestController {\nprivate OrderService orderService;\nprivate\
  \ ProductService productService;\nprivate CustomerService customerService;\npublic\
  \ TestController(CustomerService customerService,\nProductService productService,\
  \ OrderService orderService) {\nthis.customerService = customerService;\nthis.productService\
  \ = productService;\nthis.orderService = orderService;\n}\n@ApiOperation(value =\
  \ \"Order a product\", response = Boolean.class)\n@ApiResponses(value = {\n@ApiResponse(code\
  \ = 201, message = \"Order created successfully\"),\n@ApiResponse(code = 404, message\
  \ = \"The resource you were trying to reach is not found\")\n})\n@PostMapping(value\
  \ = \"/api/orders\", produces = \"application/json\")\npublic ResponseEntity purchaseSampleProduct()\
  \   throws Exception\n{\ncustomerService.registerNewCustomers();\nproductService.registerNewProducts();\n\
  Order order = orderService.orderProduct();\nif(Objects.isNull(order)) {\nlog.error(\"\
  Transactions are failing, please check after some time\");\nreturn new\nResponseEntity(HttpStatus.INTERNAL_SERVER_ERROR);\n\
  }\nlog.info(\"Order status: {}\", Objects.isNull(order));\nURI uri =\nServletUriComponentsBuilder.fromCurrentRequest().path(\"\
  /{id}\")\n.buildAndExpand(order.getOrderId()).toUri();\nreturn ResponseEntity.created(uri).build();\n\
  }\n}\n清单 6-29\nController 类\n```\n\n当我们重启 `eshop` 服务时，我们在该服务中创建的唯一个 RESTful 端点（`/api/order`）的文档可在\
  \ `http://localhost:8081/eshop/swagger-ui.html` 查看（见图 6-12）。\n\n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig12_HTML.jpg](img/454149_1_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12\n\nSwagger UI\n\n## API 网关\n\nAPI 网关是微服务架构中的一个流行概念。如果任何系统中存在多个微服务，为所有传入请求设置一个中央入口点可以在几个关键的横切方面带来好处：\n\
  \n*   路由\n\n*   集中认证\n\n*   通过基本认证、OAuth、JWT、API 密钥等方式进行授权\n\n*   SSL 终止\n\n*  \
  \ 速率限制\n\n*   缓存和监控\n\n有两个流行的开源 API 网关，它们用 Java 编写，并且可以轻松与 Spring 框架集成：\n\n*   Netflix\
  \ OS Zuul\n\n*   Spring Cloud Gateway\n\n此外，还有更多流行的选择，例如 Mashery、Apigee、Kong、WSO2、3scale\
  \ 以及来自云服务提供商的网关。让我们来探索 Zuul 网关，因为它是一个常见的选择，并且是 Netflix OSS 伞形项目的一部分。我们将使用以下代码结构创建一个新的微服务（`gateway-service`）：\n\
  \n```\n.\n├── build.gradle\n├── gradle\n│   └── wrapper\n│       ├── gradle-wrapper.jar\n\
  │       └── gradle-wrapper.properties\n├── gradlew\n├── gradlew.bat\n└── src\n└──\
  \ main\n├── java\n│   └── com\n│       └── example\n└── resources\n├── application.properties\n\
  └── application.yml\n```\n\n我们将在以下小节中逐步介绍网关的创建过程。\n\n### 应用程序设置\n\n从 [`http://www.spring.io`](http://www.spring.io)\
  \ 创建一个名为 `gateway-service` 的新应用程序，其 `build.gradle` 文件中的依赖项如清单 6-30 所示。\n\n```\n\
  bootJar {\nbaseName = 'admin-service'\nversion =  '1.0'\n}\ndependencies {\ncompile(\"\
  org.springframework.boot:spring-boot-starter-web\")\ncompile('org.springframework.cloud:spring-cloud-starter-netflix-zuul:\n\
  2.1.1.RELEASE')\ncompile(\"org.projectlombok:lombok:1.18.6\")\n}\ndependencyManagement\
  \ {\nimports {\nmavenBom \"org.springframework.cloud:spring-cloud- dependencies:Greenwich.SR1\"\
  \n}\n}\n清单 6-30\nbuild.gradle 文件\n```\n\n### 配置\n\n理想情况下，`gateway-service` 应该运行在负载均衡器上，以便解决扩展和故障转移问题。清单\
  \ 6-31 定义了此服务的配置，并在注释中进行了说明。\n\n```\napplication.yml\nspring:\napplication:\nname:\
  \ zuul\nboot:\nadmin:\nclient:\nurl: http://localhost:7777/admin\nserver:\nport:\
  \ 9999\nmanagement:\nendpoints:\nweb:\nexposure:\ninclude: \"*\"\nzuul:\nignoredServices:\
  \ '*'\nroutes:\nconfig:\npath: /config/**\nurl: http://localhost:8888/config/\n\
  eshop:\npath: /eshop/**\nurl: http://localhost:8081/eshop/\ninventory:\npath: /inventory/**\n\
  url: http://localhost:8082/inventory/\nadmin:\npath: /admin/**\nurl: http://localhost:7777/admin/\n\
  清单 6-31\nApplication.yml\n```\n\n注释：\n\n*   我们已经看到了此服务最常见的用途是将请求路由到不同的域名 URL。\n\n\
  *   `zuul.routes.config.*` 属性根据上下文路径指向相应的 URL。\n\n### 引导\n\n我们需要在 `Application`\
  \ 类顶部添加另一个名为 `@EnableZuulProxy` 的注解，以启用 Zuul 功能（参见清单 6-32）。\n\n```\npackage com.example.eshop.gateway;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.cloud.netflix.zuul.EnableZuulProxy;\n@SpringBootApplication\n\
  @EnableZuulProxy\npublic class ZuulApp {\npublic static void main(String[] args)\
  \ {\nSpringApplication.run(ZuulApp.class, args);\n}\n}\n清单 6-32\nApplication 类\n\
  ```\n\n\n\n### 过滤器\n\n过滤器是我们自定义 Zuul 行为的机制。这些自定义类可以实现任何功能并改变路由。其典型用例是在请求到达功能性微服务之前，在中心点执行授权和日志记录。清单\
  \ 6-33 提供了一个示例。\n\n```\npackage com.example.eshop.gateway.filters;\nimport com.netflix.zuul.ZuulFilter;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.stereotype.Component;\n\
  @Component\n@Slf4j\npublic class AuthPreFilter extends ZuulFilter {\n@Override\n\
  public String filterType() {\nreturn \"pre\";\n}\n@Override\npublic int filterOrder()\
  \ {\nreturn 0;\n}\n@Override\npublic boolean shouldFilter() {\nreturn true;\n}\n\
  @Override\npublic Object run() {\n//检查 JWT 头部并验证授权令牌的有效性\n// 记录请求日志\nreturn null;\n\
  }\n}\n清单 6-33\nZuul 过滤器实现\n```\n\n注意：\n\n*   `filterType()` 方法用于按类型对过滤器进行分类。Zuul\
  \ 中的标准类型包括：`pre` 用于路由前过滤，`route` 用于路由到目标，`post` 用于路由后过滤，以及 `error` 用于错误处理。\n\n*\
  \   `filterOrder()` 方法用于定义过滤器的执行顺序。此顺序不必是连续的。\n\n*   `shouldFilter()` 方法包含决定何时执行此过滤器的逻辑。\n\
  \n*   最后，可以重写 `run()` 方法来添加自定义功能。\n\n### 运行应用程序\n\n运行应用程序：\n\n```\n> gradle bootRun\n\
  >\n:: Spring Boot ::        (v2.1.3.RELEASE)\n2019-04-06 12:46:01.386   INFO 69797\
  \ --- [           main]\ncom.example.eshop.gateway.ZuulApp         : No active profile\
  \ set, falling back to default profiles: default\n2019-04-06 12:46:03.170   INFO\
  \ 69797 --- [           main]\no.s.web.context.ContextLoader             : Root\
  \ WebApplicationContext: initialization completed in 1759 ms\n2019-04-06 12:46:04.975\
  \   INFO 69797 --- [           main]\no.s.b.a.e.web.EndpointLinksResolver      \
  \ : Exposing 21 endpoint(s) beneath base path '/actuator'\n2019-04-06 12:46:05.142\
  \   INFO 69797 --- [           main]\no.s.b.w.embedded.tomcat.TomcatWebServer  \
  \ : Tomcat started on port(s): 9999 (http) with context path \"\n2019-04-06 12:46:05.146\
  \   INFO 69797 --- [           main]\ncom.example.eshop.gateway.ZuulApp        \
  \ : Started ZuulApp in 5.164 seconds (JVM running for 4.412)\n```\n\n一旦 `gateway-service`\
  \ 启动并运行，我们就可以通过 `gateway-service` 的基础 URL 访问 `eshop`、`config-service`、`inventory-service`\
  \ 和 `admin-service` 的端点，而无需在客户端应用程序中为每个服务保留单独的 URL。例如：\n\n*   要访问配置服务，URL 现在为 `http://localhost:8888/config/`\n\
  \n*   要访问管理服务，URL 现在为 `http://localhost:7777/admin/`\n\n*   要访问 Eshop 服务，URL 现在为\
  \ `http://localhost:8081/eshop/`\n\n*   要访问库存服务，URL 现在为 `http://localhost:8082/inventory/`\n\
  \n## 跨服务代码复用\n\n这是一个经常被讨论的实际问题：我们是否应该复用跨微服务创建的代码？通常，这需要在不同功能服务之间共享公共 DTO，但这会使服务相互依赖。我们使用微服务是为了在松散耦合的独立应用之间实现关注点分离，但现在我们却在做相反的事情。\n\
  \n这也引发了一个问题：当不同的服务使用不同的语言实现时，相同的代码就无法使用了。我还见过这样的情况：决策者说他们三年前用 Java 构建服务，现在仍然使用 Java，未来三年也会继续使用\
  \ Java，所以他们不必担心这个问题。我将把决定权留给读者，并讨论在 Java 中实现代码复用的几种方式：\n\n*   使用基于 Maven 或 Gradle\
  \ 的多模块项目。\n    *   我们经常看到开源项目使用这种技术。Spring 框架本身就是一个例子。如果你查看 GitHub 仓库中的 Spring 上下文模块\
  \ Gradle 文件（`spring-content.gradle`）（[`https://github.com/spring-projects/spring-framework/blob/master/spring-context/spring-context.gradle`](https://github.com/spring-projects/spring-framework/blob/master/spring-context/spring-context.gradle)），它依赖于其他模块，如\
  \ `spring-core` 和 `spring-beans`。我们在此不讨论多模块构建设置，因为它们超出了本书的范围。\n\n*   使用构建制品仓库管理器解决方案，如\
  \ Archiva（开源）、JFrog 或 Sonatype Nexus。在其他语言中，这些解决方案被称为包管理器。\n    *   这可以通过 Gradle\
  \ 中的 `uploadArchives` 配置属性实现。每次新构建时，都可以将新版本的 Jar 文件上传到组织的内部仓库。例如，如果我们有一个 `common-models`\
  \ 模块，该模块的所有版本都可以上传到内部仓库，然后作为依赖项在其他服务中使用。\n\n*   在所有服务中再次复制公共代码。\n    *   这是最糟糕的方法，因为所有公共数据模型可以在不同服务中反复复制。例如，如果\
  \ `product-catalog` 和 `inventory` 服务都需要一个 `Product` 对象，它们可以复制该对象。\n\n*   精心创建共享领域类的不同消费者版本。\n\
  \    *   这通常是许多专家推荐的首选方法。沿用之前的例子，假设 `product-catalog` 服务拥有 `Product` 数据模型。如果 `inventory-service`\
  \ 也需要这个对象，我们是否应该创建一个 `ProductView` 类，以便在该服务中创建实际对象的聚焦子视图？这个子视图可以包含较少的属性，也可以包含不同的属性。即使\
  \ `product-service` 中的实际 `Product` 类发生变化，`ProductView` 也可以保持不变。这种方法也非常支持多语言微服务，因为不存在代码共享。\n\
  \n## 微服务安全\n\n与在单个应用程序中处理用户注册、登录和授权的单体架构相比，保护基于微服务的分布式系统带来了许多新的挑战。不过，两种架构仍有许多共同的关注点，例如不同的身份验证模式、代码内方法级别的授权、OWASP\
  \ 等。我们可能需要在单体架构中使用基于 OAuth 的身份验证，因为你的企业中可能存在多个单体应用程序。\n\n在企业中，你可能需要设计一个与企业 LDAP\
  \ 系统集成的 SSO（单点登录）。然而，在微服务架构中，OAuth、SAML、SSO 和 JWT 仍然是相同的，因此我们可能希望将身份验证和令牌验证保留在 API\
  \ 网关层面。让我们尝试通过在 `gateway-service` 中启用基于 JWT（JSON Web 令牌）的令牌身份验证，并在 `eshop` 服务中创建令牌来探索这个想法。\n\
  \n### Eshop 服务变更\n\n我们需要在面向前端的微服务（对我们来说是 `eshop`）中实现登录功能。我们需要创建一个 `LoginController`\
  \ 类来处理身份验证，并根据预定义用户（邮箱为 raj@example.com）创建 JWT 令牌。此外，我们还需要在 `build.gradle` 文件中添加一个依赖项：\n\
  \n```\ncompile group: 'io.jsonwebtoken', name: 'jjwt', version: '0.9.1'\n```\n\n\
  现在让我们来看一下控制器类。\n\n\n\n#### 登录控制器\n\n我们将创建一个 `LoginRequest` DTO 来保存用户的用户名/密码以及控制器类。参见清单\
  \ 6-34。\n\n```\nDTO\npackage com.example.eshop.dto;\nimport lombok.Data;\n@Data\n\
  public class LoginRequest {\nprivate String email;\nprivate String password;\n}\n\
  Controller\npackage com.example.eshop.web;\nimport com.example.eshop.dto.LoginRequest;\n\
  import io.jsonwebtoken.Jwts;\nimport io.jsonwebtoken.SignatureAlgorithm;\nimport\
  \ org.springframework.security.crypto.bcrypt.BCryptPasswordEncoder;\nimport org.springframework.web.bind.annotation.RequestBody;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RequestMethod;\n\
  import org.springframework.web.bind.annotation.RestController;\nimport javax.servlet.ServletException;\n\
  import java.util.Date;\nimport lombok.*;\n@RestController\npublic class LoginController\
  \ {\nString DEFAULT_EMAIL = \"raj@example.com\";\nString DEFAULT_PASSWORD = \"password\"\
  ;\n@RequestMapping(value = \"/login\", method = RequestMethod.POST)\npublic String\
  \ login(@RequestBody LoginRequest loginRequest) throws\nServletException {\nvar\
  \ jwtToken = \"\";\nval email = loginRequest.getEmail();\nval password = loginRequest.getPassword();\n\
  if(!(DEFAULT_PASSWORD.equals(password))\n|| (DEFAULT_EMAIL.equals(email)))   {\n\
  // 抛出错误\n}\njwtToken = Jwts.builder().setSubject(email)\n.claim(\"roles\", \"admin\"\
  )\n.signWith(SignatureAlgorithm.HS256, \"secretkey\")\n.setIssuedAt(new Date())\n\
  .compact();\nreturn jwtToken;\n}\n}\n清单 6-34\n控制器和 DTO 类\n```\n\n注意：\n\n*   我们在\
  \ `/login` 处有一个 REST API，它接受 `LoginRequest` bean 中的明文用户名和密码。理想情况下，密码应通过 SSL 保护的连接发送，并采用摘要形式。为了简单起见，我们在此使用通过\
  \ API 传递明文凭证的基本示例。\n\n*   `Jwts` 类是一个轻量级 API，用于创建和验证 JSON Web 令牌。\n\n*   我们还使用了一个简单的对称密钥作为\
  \ `secretkey`，但我建议您为此目的使用非对称密钥。\n\n*   我们将角色设置为一个属性作为声明。我们可以使用声明来添加任何自定义属性，并使用用户配置文件信息创建令牌。该令牌可以被验证，然后传递给其他下游服务，这些服务可以解码并根据用户配置文件信息执行授权。\n\
  \n#### 测试令牌生成\n\n重启 `eshop` 服务后，在控制台上使用 `CURL` 运行以下命令：\n\n```\n> curl -H \"Content-Type:\
  \ application/json\" -d '{\"email\":\"raj@example.com\",\"password\":\"password\"\
  }' -X POST\nhttp://localhost:8081/eshop/login\neyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJyYWpAZXhhbXBsZS5jb20iLCJyb2xlcyI6ImFkbWluIiwiaWF0Ijox\
  \ NTU0NjA3NTIzfQ.p4FzUPRKUi2NT00OrWQxWv760i4eB2LK0_fcWexlDos\n```\n\n此响应显示了认证令牌，已用粗体标出。我们将在下一步中使用此令牌来验证并允许服务访问。\n\
  \n### 网关服务变更\n\n在此服务中，我们验证远程客户端在每个请求中传递的令牌。如果 `Authorization` 标头无效或损坏，我们将发送带有错误描述的\
  \ HTTP 401 响应。我们只需要更改 `gateway-service` 中的 `AuthPreFilter` 类（参见清单 6-35）。\n\n```\n\
  package com.example.eshop.gateway.filters;\nimport com.netflix.zuul.ZuulFilter;\n\
  import com.netflix.zuul.context.RequestContext;\nimport io.jsonwebtoken.Claims;\n\
  import io.jsonwebtoken.Jwts;\nimport io.jsonwebtoken.SignatureException;\nimport\
  \ lombok.extern.slf4j.Slf4j;\nimport org.springframework.stereotype.Component;\n\
  import javax.servlet.http.HttpServletRequest;\n@Component\n@Slf4j\npublic class\
  \ AuthPreFilter extends ZuulFilter {\n//检查 JWT 标头，并在需要时检查所有 OAUTH 服务\n@Override\n\
  public Object run() {\nRequestContext context = RequestContext.getCurrentContext();\n\
  HttpServletRequest request = context.getRequest();\nfinal String token = request.getHeader(\"\
  Authorization\");\nif (token == null) {\ncontext.setSendZuulResponse(false);\ncontext.setResponseStatusCode(401);\n\
  context.setResponseBody(\"缺少 Authorization 标头\");\nreturn null;\n}\ntry {\nfinal\
  \ Claims claims = Jwts.parser().setSigningKey(\"secretkey\").parseClaimsJws(token).getBody();\n\
  log.info(\"声明: {}\", claims);\ncontext.addZuulRequestHeader(\"Authorization\", \"\
  Basic \" + token);\n} catch (final SignatureException e) {\ncontext.setSendZuulResponse(false);\n\
  context.setResponseStatusCode(401);\ncontext.setResponseBody(\"API 密钥无效\");\n}\n\
  return null;\n}\n@Override\npublic String filterType() {\nreturn \"pre\";\n}\n@Override\n\
  public int filterOrder() {\nreturn 0;\n}\n@Override\npublic boolean shouldFilter()\
  \ {\nreturn true;\n}\n}\n清单 6-35\nZuul 预过滤器类\n```\n\n注意：\n\n*   我们已经在第 6.8.4 节中了解了\
  \ ZuulFilter。此外，我们还添加了代码，用于使用相同的签名对称密钥解码和提取令牌。\n\n*   如果密钥被篡改，我们将无法再次解码，因此身份验证将在网关级别中断。\n\
  \n*   一旦我们验证了令牌，我们将其作为请求中的标头发送回去。\n\n#### 测试网关认证\n\n重启 `gateway-service` 后，通过 `CURL`\
  \ 运行以下命令来验证并访问 `eshop` 服务的 `/api/orders` API。\n\n```\ncurl -H \"Authorization:\n\
  eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJyYWpAZXhhbXBsZS5jb20iLCJyb2xlcyI6ImFkbWluNTIzfQ.p4FzUPRKUi2NT00OrWQxWv760i4eB2LK0_fcWexlDos\"\
  \ -i -X POST\nhttp://localhost:9999/eshop/ api/orders\nHTTP/1.1 201\nLocation: http://localhost:8081/eshop/api/orders/2\n\
  Date: Sun, 07 Apr 2019 03:47:24 GMT\nTransfer-Encoding: chunked\n```\n\n这些结果是在示例运行后收集的，表明我们在第\
  \ 6.10.1.2 节中收到的令牌已成功验证。这也表明 `eshop` 服务 API 已响应。让我们也看看如果在请求中发送无效令牌，`gateway-service`\
  \ 的行为。\n\n```\ncurl -H \"Authorization: WRONG_TOKEN\" -i -X POST http://localhost:9999/eshop/api/\
  \ orders\nHTTP/1.1 401\nTransfer-Encoding: chunked\nDate: Sun, 07 Apr 2019 03:56:28\
  \ GMT\nAPI 密钥无效\n```\n\n如果请求中发送的令牌无效，我们将收到此消息。\n\n## 总结\n\n我们涵盖了基本概念（包括问题和解决方案），以帮助您开始使用\
  \ Java 和 Spring Cloud 作为微服务栈。还有更多框架可以处理我们在本章中讨论的问题。我建议您也更详细地探索 Netflix OSS。在本书的下一部分中，我们将研究与扩展\
  \ Java 相关的技术和概念。\n\n# 第三部分让 HTTP 更快\n\n# 7. Java GraphQL 开发\n\nGraphQL 是一种 API 查询语言，也是一个使用现有数据来执行这些查询的运行时。GraphQL\
  \ 由 Facebook 于 2012 年开发，并于 2015 年公开发布。最近围绕 GraphQL 有了很多发展，特别是自 AWS Cloud AppSync\
  \ 等工具和 Prisma 等框架出现以来。GraphQL 的主要目的是处理 RESTful API 设计中的问题，并使 HTTP 通信更快。\n\nGraphQL\
  \ 不采用多个基于 URL 的约定，而是基于单个端点通过 `POST` 接受所有请求，其数据结构类似于 JSON 的图状结构。GraphQL 有自己的模式定义语言（SDL），它使用标准类型、验证以及检索和更新这些模型的操作来定义数据模型。GraphQL\
  \ 遵循 CQRS（命令查询职责分离）设计模式，该模式指出，最好将与读取数据相关的代码与更新数据的代码分开。这保持了职责的清晰。用于读取和写入的领域对象也可以与用于更新数据存储的对象不同。\n\
  \n\n\n## 重要概念\n\n对于来自 REST API 设计的开发者来说，GraphQL 中有几个有趣的新概念可以简化开发流程：\n\n*   单一**端点**：GraphQL\
  \ 应用程序在单个 /GraphQL 端点上运行，各种请求会被路由到已注册的解析器类。\n\n*   基于 POST 的请求：所有请求都是基于 `POST` 的，并且必须以符合\
  \ SDL 格式的方式发送，这种格式可能相当描述性强、冗长且嵌套。\n\n*   **基于模式：** GraphQL 允许你通过 SDL 为 API 客户端定义一个类似\
  \ JSON 的模式。这种模式优先或契约优先的模式有助于确保 UI 和后台团队之间更好的协调。\n\n*   查询：所有不打算创建或更新任何资源的 `GET`\
  \ 请求被称为查询。\n\n*   **变更：** 在 GraphQL 中，所有 `POST`、`PUT` 和 `DELETE` 请求都是变更。\n\n*  \
  \ **解析器：** GraphQL 引擎或框架可以调用的所有自定义注册函数都称为解析器。\n\n*   **模式拼接：** 这是一种从多个模式创建单一统一模式的技术。当不同的微服务拥有自己的模式，并且一个前端服务可以为所有这些微服务提供组合视图时，这非常有用。这样，前端微服务可以充当网关。此功能在\
  \ Java API 中不存在，但预计很快会添加。\n\n*   **订阅：** 此功能允许通过 WebSocket 编程，以推拉模型向客户端提供近乎实时的响应。\n\
  \n## 工作原理\n\n我们来看一下创建 GraphQL 服务的简化分步过程：\n\n1.  首先创建一个 JSON 模式（模式优先方法）。或者，稍后可以从对象生成模式（代码优先方法）。\n\
  \n2.  根据实现查询和变更时定义的模式，创建一系列*解析器*（实现类）。\n\n3.  使用其内置的基于 Web 的客户端或资源管理器（Java 中的 GraphiQL）运行并测试应用程序。\n\
  \n4.  作为客户端连接到 GraphQL REST 端点。\n\n5.  如果需要，通过模式拼接过程将多个基于 GraphQL 端点的微服务合并为一个，然后像往常一样连接到它。\n\
  \n## 相较于 REST 的优势\n\nGraphQL 主要关注客户端访问数百个不同 RESTful API URL 的问题，从而浪费大量带宽。GraphQL\
  \ 解决了许多问题：\n\n*   精确获取你需要的内容。\n*   声明式，无过度获取。\n*   在单个请求中获取多个资源。\n*   基于模式的 API，充当客户端和服务之间的契约。\n\
  *   单一 API 端点，因此无需在客户端代码中维护太多 URL。\n*   不再有 API 版本管理的麻烦。已弃用的字段可以在模式中标记为 `@deprecated`\
  \ 并附带描述。工具可以开始显示其已弃用，客户端也可以开始忽略它。\n*   随时可用的精美现成文档。内置的编辑器工具可以即时提供出色的文档。\n*   用于快速测试的现成工具。内置工具也为测试提供了良好的支持。\n\
  *   通过模式拼接为多个微服务提供简单的解决方案。\n*   整体通信效率高于 REST。\n*   内置分页语义。\n*   通过订阅（更准确地说，是 WebSocket）内置对近乎实时消息传递的支持。\n\
  \n图数据结构实际上非常强大，它可以很好地表示连接和嵌套的资源。我们已经通过图数据库看到并享受了它的强大功能。通过 GraphQL，REST API 客户端开始以嵌套形式请求对象图，并且可以获取相关的、嵌套的和连接的资源。让我们详细看看上述优势：\n\
  \n*   精确获取你需要的内容：\n\n在 GraphQL 中，你请求响应中需要的精确属性。然而，在 REST 中，你只能访问一个 URL，并且总是会收到一个固定的响应。\n\
  \n示例：\n\n```\n    query: allPosts {\n    id\n    author\n    title\n    content\n\
  \    }\n    }\n    ```\n\n*   声明式，无过度获取：\n\n想想 REST API 设计，客户端可能最终获取所有属性，而不仅仅是所需的属性。GraphQL\
  \ 引擎默认仅在 HTTP 层执行此操作。这意味着即使你的解析器正在查询完整的表，引擎也只会返回客户端在请求中要求的属性。当某个字段已被弃用，客户端可以简单地在请求中开始忽略该字段时，这种行为非常有用。这确实提供了根据请求结构动态查询和响应的能力。\n\
  \n*   在单个请求中获取多个资源：\n\nGraphQL 允许你在单个请求中查询多个资源。虽然 REST API 首先关注 URL，但 GraphQL 也同样关注数据。这最终使你在较慢的网络连接上获得更快的通信优势。\n\
  \n示例：\n\n```\n    query: {\n    allPosts {\n    id\n    title\n    }\n    allUsers\
  \ {\n    id\n    name\n    }\n    }\n    ```\n\n*   基于模式的 API：\n\n还记得关于 SOAP 与 REST\
  \ 在契约优先与实现优先上的漫长讨论吗？最终，GraphQL 允许你在 RESTful 世界中首先定义其基于 SDL 的模式。\n\n示例：\n\n```\n\
  \    type Query {\n    user(id: ID!): User!\n    }\n    type User {\n    id: ID!\n\
  \    email: String!\n    name: String!\n    }\n    ```\n\n*   单一 API 端点：\n\n基于 REST\
  \ 的客户端应用程序必须管理和连接到多个 URL，并不断更改 HTTP 动词。使用 GraphQL，客户端只需连接到一个端点，并且仅通过 `POST` HTTP\
  \ 动词。GraphQL 引擎必须将类（解析器）连接到模式中的查询和变更类型，同时支持错误处理。如前所述，按照惯例，所有基于获取（`GET`）的请求应由查询类型中定义的函数处理，而\
  \ `PUT`、`POST`、`DELETE` 操作则由变更类型中定义的函数处理。\n\n*   不再有 API 版本管理的麻烦：\n\n由于 GraphQL\
  \ 应用程序在单个端点和模式上运行，剩下的唯一事情就是将模式中的字段标记为单个 URL 的已弃用。这些已弃用的字段可以被客户端工具跟踪和隐藏。\n\n*   随时可用的现成文档：\n\
  \n几乎所有 GraphQL 规范实现都提供了一个可视化工具来访问其模式并运行示例查询。在 Java 领域，这个工具被称为 GraphiQL。此工具提供对整个模式的可视化访问，以及注释，这些注释在作为字段描述显示的实际文件中定义。\n\
  \n*   用于快速测试的现成工具：\n\nGraphiQL 可用于对各种模式类型和解析器进行随机测试。只需在内置文件中包含一个依赖项并定义上下文路径即可启用此功能。\n\
  \n*   通过模式拼接为微服务提供简单的解决方案：\n\nGraphQL 有一个内置系统，通过模式拼接的概念来绑定不同的应用程序或服务。\n\n*   整体通信效率高于\
  \ REST：\n\n由于可以组合多个请求，并且客户端可以指定它想要返回哪些属性，通信变得更加容易和快速。\n\n*   内置分页语义：\n\nGraphQL\
  \ 模式定义为在请求中定义分页属性提供了语义。\n\n示例：\n\n```\n    query: allPosts(first: 2, skip: 2) {\n\
  \    id\n    author\n    title\n    content\n    }\n    }\n    ```\n\n*   订阅：\n\n\
  GraphQL 通过 WebSocket 为实时客户端-服务器通信提供内置支持。用 GraphQL 术语来说，这是通过订阅来处理的。\n\n\n\n## 风险与劣势\n\
  \n在为特定应用选择 GraphQL 时，有几个风险需要谨慎对待：\n\n*   缓存\n*   安全问题\n*   N+1 问题\n*   通过 HTTP 状态码进行错误处理\n\
  *   大型应用中的整体复杂性\n\n让我们详细探讨这些问题：\n\n*   **缓存：**\n\n    REST 响应可以基于不同的 URL 轻松缓存。由于\
  \ GraphQL 基于动态、冗长的 JSON 图，在网络层对其进行缓存变得困难。像 Apollo 这样的框架提供了客户端缓存支持，但这可能并不总是足够的。\n\
  \n*   **安全问题：**\n\n    由于 GraphQL 允许嵌套查询，嵌套资源的深度可能会给服务器带来严重负载，并且这也可能形成循环。\n\n* \
  \  **N+1 问题：**\n\n    N+1 问题意味着服务器为了获取嵌套数据，会执行多次不必要的数据库往返。假设客户端应用请求获取所有作者的列表以及他们各自撰写的\
  \ top 10 文章。如果 GraphQL 解析器没有优化，这最终可能导致一次查询获取所有作者，然后针对这些作者中的每一个，再执行 N 次查询来获取其 top\
  \ 文章列表。\n\n*   **响应中的 HTTP 状态码：**\n\n    与 RESTful 服务一样，我们这里有一个单一的基于 `POST` 的端点。我们没有像\
  \ REST 中的 `Controller` 类那样，拥有一个清晰的、各自具有独立 HTTP 错误处理的不同端点列表。我们可以进行通用的错误处理，但当我们需要为不同的请求返回不同的\
  \ HTTP 状态码时，问题就出现了。这有时可能会使代码更具可读性。\n\n*   **复杂性：**\n\n    虽然这减轻了客户端的很多负担，但它确实使服务端变得稍微复杂一些。由于它基于图结构，高度嵌套的请求处理起来会变得相当复杂，因为它们还需要解决\
  \ N+1 问题。\n\n## GraphQL Java 示例\n\n我们将专注于使用 schema-first 方法，结合 SpringBoot 进行 GraphQL\
  \ 开发。让我们按照以下步骤构建一个示例：\n\n1.  从 `spring.io` 构建一个新的 Gradle 项目。\n2.  创建 schema。\n3.\
  \  创建 JPA 实体模型和仓库。\n4.  创建输入 DTO。\n5.  创建 `Query` 和 `Mutation` 解析器类。\n6.  定义应用配置并进行示例运行。\n\
  \n让我们构建一个名为 `“”` 的应用，其代码结构如下：\n\n```\n.\n├── build.gradle\n├── eshop.iml\n├── settings.gradle\n\
  └── src\n    └── main\n        ├── java\n        │   └── com\n        │       └──\
  \ example\n        │           └── eblog\n        │               ├── App.java\n\
  \        │               ├── dto\n        │               │   ├── AuthorInputRequest.java\n\
  \        │               │   └── PostInputRequest.java\n        │              \
  \ ├── handler\n        │               │   └── GraphQLConfig.java\n        │   \
  \            ├── model\n        │               │   ├── Author.java\n        │ \
  \              │   ├── Post.java\n        │               │   └── Status.java\n\
  \        │               ├── repository\n        │               │   ├── AuthorRepository.java\n\
  \        │               │   └── PostRepository.java\n        │               └──\
  \ resolvers\n        │                   ├── MutationResolver.java\n        │  \
  \                 └── QueryResolver.java\n        └── resources\n            ├──\
  \ application.yml\n            └── schema.graphqls\n```\n\n### 应用设置\n\n首先从 [`http://start.spring.io/`](http://start.spring.io/)\
  \ 构建一个名为 `eblog-graphql-ch7` 的新应用，并在 `build.gradle` 文件中添加以下依赖项（参见清单 7-1）。\n\n```\n\
  plugins {\n    id 'org.springframework.boot' version '2.1.3.RELEASE'\n    id 'java'\n\
  }\napply plugin: 'io.spring.dependency-management'\napply plugin: 'project-report'\n\
  java {\n    group = 'com.example'\n    version = '1.0'\n    sourceCompatibility\
  \ = JavaVersion.VERSION_1_8\n    targetCompatibility = JavaVersion.VERSION_1_8\n\
  }\nbootJar {\n    archieveBaseName = 'eblog-service'\n    version =  '1.0'\n}\n\
  repositories {\n    mavenCentral()\n}\ndependencies {\n    compile('org.springframework.boot:spring-boot-starter-web')\n\
  \    compile('com.graphql-java:graphql-java-tools:5.2.4')\n    compile('com.graphql-java:graphql-spring-boot-starter:5.0.2')\n\
  \    compile('com.graphql-java:graphiql-spring-boot-starter:5.0.2')\n    compile('org.springframework.boot:spring-boot-starter-data-jpa')\n\
  \    compile('mysql:mysql-connector-java:8.0.15')\n    compile('org.projectlombok:lombok:1.18.6')\n\
  \    testCompile('junit:junit:4.12')\n}\n清单 7-1\n构建文件\n```\n\n### Schema 文件：Resources/Schema.Graphqls\n\
  \nGraphQL 有自己的 schema 定义语言（SDL），用于描述服务中使用的类型，并定义如何查询这些类型。清单 7-2 展示了此示例的 schema。\n\
  \n```\ntype Post {\n    id: ID!\n    title: String!\n    content: String!\n    status:\
  \ Status!\n    author: Author!\n}\ntype Author {\n    id: ID!\n    name: String!\n\
  \    age: Int\n    posts: [Post]!\n    status: Status!\n}\nenum Status {\n    ACTIVE\n\
  \    NON_ACTIVE\n}\ninput PostInputRequest {\n    title: String!\n    content: String!\n\
  \    authorId: Int!\n}\ninput AuthorInputRequest {\n    name: String!\n    age:\
  \ Int\n}\ntype Mutation {\n    newPost(input: PostInputRequest): Post!\n    newAuthor(input:\
  \ AuthorInputRequest): Author!\n}\ntype Query {\n    recentPosts(limit: Int, offset:\
  \ Int, orderBy: String): [Post]\n    authorsWithTopPosts: [Author]\n}\n清单 7-2\n\
  resources/schema.graphqls\n```\n\n注意：\n\n*   我们有两个数据模型——`Post` 和 `Author`，它们各自拥有类型定义中提到的字段。我们支持所有标准数据类型——`Int`、`String`、`Boolean`、`Date`\
  \ 和 `Objects`。\n*   字段定义由冒号分隔符左侧的 `字段名` 和右侧的 `类型` 组成，例如 `{fieldname} : {fieldType}`。`!`\
  \ 符号表示该字段是否为必填项。如果将字段放在方括号中，它就变成了一个列表，例如 `[Post]` 是 `POST` 对象的列表。\n*   也可以声明枚举，并将其作为任何字段的数据类型。\n\
  *   输入类型有助于定义输入请求对象（或者用技术术语来说，就是 DTO）。\n*   在 GraphQL schema 中需要定义两种特殊类型——`Query`\
  \ 和 `Mutation`。`Query` 定义用于连接代码中执行这些类型获取操作的任何函数。`Mutation` 类似，但按惯例仅用于更新系统中这些类型的操作。这两者都可以被称为*解析器*，因为它们有助于在运行时将字段解析为不同的用户定义函数。\n\
  \n\n\n### 数据模型与仓库\n\n在清单 7-3 的代码中，我们声明了领域对象（JPA 实体）以及相关的 Spring Data 仓库。\n\n```\n\
  package com.example.eblog.model;\nimport com.fasterxml.jackson.annotation.JsonIgnore;\n\
  import lombok.*;\nimport javax.persistence.*;\nimport java.io.Serializable;\nimport\
  \ java.util.Set;\n@Data\n@Entity\n@NoArgsConstructor\n@ToString(exclude = {\"posts\"\
  })\n@EqualsAndHashCode(exclude = {\"posts\"})\npublic class Author implements Serializable\
  \ {\n@Id\n@GeneratedValue(strategy = GenerationType.IDENTITY)\nprivate Long id;\n\
  private String name;\nprivate int age;\nprivate Status status = Status.NON_ACTIVE;\n\
  @OneToMany(fetch = FetchType.LAZY, mappedBy = \"author\")\n@JsonIgnore\nprivate\
  \ Set posts;\npublic Author(String name, Integer age)  {\nthis.name = name;\nthis.age\
  \ = age;\n}\n}\npackage com.example.eblog.model;\nimport com.fasterxml.jackson.annotation.JsonIgnore;\n\
  import lombok.*;\nimport javax.persistence.*;\nimport java.io.Serializable;\n@Data\n\
  @Entity\n@Builder\n@NoArgsConstructor\n@ToString(exclude = {\"author\"})\n@EqualsAndHashCode(exclude\
  \ = {\"author\"})\npublic class Post implements Serializable {\n@Id\n@GeneratedValue(strategy\
  \ = GenerationType.IDENTITY)\nprivate Long id;\nprivate String title;\nprivate String\
  \ content;\nprivate Status status;\n@ManyToOne(fetch = FetchType.LAZY)\n@JsonIgnore\n\
  private Author author;\n}\npackage com.example.eblog.model;\npublic enum Status\
  \ {\nACTIVE, NON_ACTIVE;\npublic Status fromValue(String value) {\nreturn valueOf(value.toUpperCase());\n\
  }\npublic String toValue(Status status) {\nreturn status.name().toLowerCase();\n\
  }\n}\npackage com.example.eblog.repository;\nimport com.example.eblog.model.Author;\n\
  import org.springframework.data.jpa.repository.JpaRepository;\nimport org.springframework.data.jpa.repository.Query;\n\
  import java.util.List;\npublic interface AuthorRepository extends JpaRepository\
  \ {\n@Query(\"Select distinct a from Author a left join fetch a.posts\")\nList454149_1_En\
  \ findAuthorsWithPosts();\n}\npackage com.example.eblog.repository;\nimport com.example.eblog.model.Post;\n\
  import org.springframework.data.jpa.repository.JpaRepository;\nimport org.springframework.stereotype.Repository;\n\
  @Repository\npublic interface PostRepository extends JpaRepository {}\n清单 7-3\n\
  领域对象\n```\n\n### 输入 DTO\n\n在清单 7-4 中，我们声明了用于从 `Mutation` 解析器接收创建 `Author` 和 `POST`\
  \ 对象输入的 POJO。\n\n```\npackage com.example.eblog.dto;\nimport lombok.Data;\n@Data\n\
  public class AuthorInputRequest {\nString name;\nInteger age;\n}\npackage com.example.eblog.dto;\n\
  import lombok.Data;\n@Data\npublic class PostInputRequest {\nString title;\nString\
  \ content;\nLong authorId;\n}\n清单 7-4\n输入 DTO\n```\n\n### 查询与变更类\n\n清单 7-5 中的类提供了实现，用于根据精确匹配的方法签名，解析模式中定义的不同类型和字段。例如，我们在模式中看到了\
  \ `newPost(input: PostInputRequest): Post!` 声明。Spring 会匹配并在所有带有 Spring 注解的类中调用签名定义为\
  \ `public Post newPost(PostInputRequest postInputRequest)` 的函数。\n\n```\npackage\
  \ com.example.eblog.resolvers;\nimport com.coxautodev.graphql.tools.GraphQLQueryResolver;\n\
  import com.example.eblog.model.Author;\nimport com.example.eblog.model.Post;\nimport\
  \ com.example.eblog.repository.AuthorRepository;\nimport com.example.eblog.repository.PostRepository;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.data.domain.PageRequest;\nimport org.springframework.data.domain.Sort;\n\
  import org.springframework.stereotype.Service;\nimport java.util.List;\n@Service\n\
  @Slf4j\npublic class QueryResolver implements GraphQLQueryResolver {\n@Autowired\n\
  AuthorRepository authorRepository;\n@Autowired\nPostRepository postRepository;\n\
  public List recentPosts(Integer limit, Integer offset, String orderBy){\nlog.info(\"\
  recentPosts, params: {}, {}\", limit, offset);\nPageRequest pageRequest = PageRequest.of(limit,\
  \ offset, Sort.Direction.DESC, orderBy);\nreturn postRepository.findAll(pageRequest).getContent();\n\
  }\npublic List454149_1_En authorsWithTopPosts()   {\nlog.info(\"authorsWithTopPosts\"\
  );\nreturn authorRepository.findAuthorsWithPosts();\n}\n}\npackage com.example.eblog.resolvers;\n\
  import com.coxautodev.graphql.tools.GraphQLMutationResolver;\nimport com.example.eblog.dto.AuthorInputRequest;\n\
  import com.example.eblog.dto.PostInputRequest;\nimport com.example.eblog.model.Author;\n\
  import com.example.eblog.model.Post;\nimport com.example.eblog.model.Status;\nimport\
  \ com.example.eblog.repository.AuthorRepository;\nimport com.example.eblog.repository.PostRepository;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Service;\n@Service\n@Slf4j\npublic class MutationResolver\
  \ implements GraphQLMutationResolver {\n@Autowired\nAuthorRepository authorRepository;\n\
  @Autowired\nPostRepository postRepository;\npublic Post newPost(PostInputRequest\
  \ postInputRequest){\nAuthor author = authorRepository.findById(postInputRequest.getAuthorId())\n\
  .orElse(new Author(\"Raj\", 35));\nif(author.getId() == null)\nauthorRepository.save(author);\n\
  Post post = Post.builder()\n.title(postInputRequest.getTitle())\n.content(postInputRequest.getContent())\n\
  .author(author)\n.status(Status.ACTIVE)\n.build();\npost = postRepository.save(post);\n\
  return post;\n}\npublic Author newAuthor(AuthorInputRequest authorInputRequest)\
  \   {\nAuthor author = new Author(authorInputRequest.getName(), authorInputRequest.getAge());\n\
  author = authorRepository.save(author);\nreturn author;\n}\n}\n清单 7-5\n查询类\n```\n\
  \n说明：\n\n*   我们实现了 `GraphQLQueryResolver` 和 `GraphQLMutationResolver` 作为标记接口。\n\n\
  *   代码非常直观。在 `QueryResolver` 类中，`recentPosts()` 方法返回分页的 `POST` 对象作为响应。在 `authorWithTopPosts`\
  \ 方法中，我们返回了作者及其近期热门文章的对象图。这些对象被创建为嵌套对象。\n\n*   在 `MutationResolver` 类中，我们有两个方法，用于根据用户提供的对应输入对象创建\
  \ `POST` 和 `Author` 对象。\n\n*   GraphQL 引擎在将控制权委托给实现方法之前，会验证输入对象的字段。\n\n*   可以通过声明一个类型为\
  \ `GraphQLErrorHandler` 的 Spring Bean 并对其进行自定义，来实现错误处理的自定义。如清单 7-6 所示。\n\n```\n\
  package com.example.eblog.handler;\nimport graphql.ExceptionWhileDataFetching;\n\
  import graphql.GraphQLError;\nimport graphql.servlet.GraphQLErrorHandler;\nimport\
  \ org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import java.util.List;\nimport java.util.stream.Collectors;\n@Configuration\npublic\
  \ class GraphQLConfig  {\n@Bean\npublic GraphQLErrorHandler errorHandler() {\nreturn\
  \ new GraphQLErrorHandler() {\n@Override\npublic List processErrors(List\nerrors)\
  \ {\nList clientErrors = errors.stream()\n.filter(this::isClientError)\n.collect(Collectors.toList());\n\
  // 对客户端错误进行处理\nList serverErrors = errors.stream()\n.filter(e -> !isClientError(e))\n\
  .collect(Collectors.toList());\n// 对服务端错误进行处理\nreturn errors;\n}\nprotected boolean\
  \ isClientError(GraphQLError error) {\nreturn !(error instanceof ExceptionWhileDataFetching\
  \ ||\nerror instanceof Throwable);\n}\n};\n}\n}\n清单 7-6\n错误处理配置\n```\n\n通过 GraphQL\
  \ 引擎，我们可以获取任何请求中的错误句柄。我们可以记录这些错误，或者向错误列表中添加更多信息。\n\n\n\n### 配置\n\n我们可以访问声明 Hibernate\
  \ 连接属性和自定义上下文路径所需的通用属性。GraphQL Java 引擎要求我们定义 `graphql.servlet.mapping` 属性，以便声明其\
  \ `POST` RESTful 端点的映射路径。GraphiQL 是来自 `graphql-tools` 项目的内置应用程序，需要声明类似的、不言自明的属性。参见清单\
  \ 7-7。\n\n```\nserver:\nport: 8201\nservlet:\ncontextPath: /eblog\ngraphql:\nservlet:\n\
  mapping: /graphql\nenabled: true\ncorsEnabled: true\ngraphiql:\nmapping: /graphiql\n\
  endpoint: /eblog/graphql\nenabled: true\npageTitle: GraphiQL\nspring:\ndatasource:\n\
  url: jdbc:mysql://localhost:3306/eblog?autoReconnect=true\nusername: root\npassword:\
  \ mysql\ndriver-class-name: com.mysql.jdbc.Driver\njpa:\nhibernate.ddl-auto: create\n\
  show-sql: true\ngenerate-ddl: true\n清单 7-7\napplication.yml 文件\n```\n\n## 运行 eblog-graphql-ch7\
