  \ Select * from purchasehistory;\nid |       createddate       | customerid | productid\n\
  ----+-------------------------+------------+-----------\n1 | 2019-03-31 20:58:53.433\
  \ |          1 |         1\n```\n\n在以下章节中，我们仅介绍输出中的应用日志。\n\n## 解决 N+1 问题\n\n关于 ORM，我们经常听到的一个常见问题是\
  \ N+1 问题。这是一个误解，认为 N+1 问题只发生在 ORM 中。实际上，这是一个通用的数据访问问题，在从 RDBMS 获取数据时可能发生。考虑上一节的示例，如果我们想获取用户列表及其撰写的帖子，默认情况下\
  \ Hibernate 会触发一个查询来获取所有用户，然后触发 N 个查询来获取每个返回用户对象的 `POST`。这种情况称为 N+1 问题。如果你通过 JDBC\
  \ 以包含子对象列表的父对象列表形式获取数据，同样的问题也会存在。有三种方法可以通过 JPA 查询具有关联的实体来克服此问题：\n\n*   在 JPQL 中使用\
  \ `left fetch join` 子句进行查询\n*   先获取用户对象，然后单独获取这些用户的 `POST` 对象\n*   使用原生查询将结果作为单个组合结果映射到\
  \ DTO\n\n### 在 JPQL 中使用左连接抓取子句进行查询\n\n此方法将在生成的查询中添加左外连接，从而产生连接表的笛卡尔积。ORM 将进一步将结果映射回父实体和子实体列表。要查看实际效果，我们需要更改上一节中的\
  \ `CustomerRepository` 代码。在清单 4-8 中，我们添加了一个带有 JPQL 查询的新自定义方法，并从 `Application` 类中执行它作为示例。\n\
  \n```\npublic interface CustomerRepository extends JpaRepository{\n/* N+1 示例 */\n\
  @Query(\"Select c from Customer c left join fetch c.orders\")\nList findCustomersWithOrderDetails();\n\
  }\n@SpringBootApplication\n@Slf4j\npublic class Application implements CommandLineRunner\
  \ {\n@Autowired\nProductService productService;\n@Autowired\nCustomerService customerService;\n\
  @Autowired\nOrderRepository orderRepository;\n@Autowired\nCustomerRepository customerRepository;\n\
  @Autowired\nPurchaseHistoryRepository purchaseHistoryRepository;\n@Override\npublic\
  \ void run(String... strings) throws Exception {\ncustomerService.registerNewCustomers();\n\
  productService.registerNewProducts();\nproductService.purchase(1l, 1l, 2, 400);\n\
  productService.saveHistory(1l, 1l);\nlog.info(\"Customers {}\", customerService.findAll());\n\
  log.info(\"Products {}\", productService.findAll());\nlog.info(\"Orders {}\", orderRepository.findAll());\n\
  log.info(\"PurchaseHistory {}\",\npurchaseHistoryRepository.findAll());\nnPlusOneExample();\n\
  }\npublic void nPlusOneExample()   {\nList customerList =\ncustomerRepository.findCustomersWithOrderDetails();\n\
  log.info(\"Customers List with Order Details: {}\", customerList);\n}\n}\n清单 4-8\n\
  CustomerRepository 和 Application 的更改\n```\n\n#### 再次运行 Eshop 应用\n\n当我们运行前面的代码时，它将生成一个单一的\
  \ Hibernate 查询，而不是多个查询，并在控制台中打印该查询：\n\n```\n> gradle bootRun\n>\ncom.example.eshop.Application\
  \ : Starting Application on Rajs-MacBook-Pro.local with PID 38997 (started by raj\
  \ in /Users/raj/work_all/book_ code/rapid-java-persistence-and-microservices/ch4/eshop-ch4)\n\
  Hibernate: select distinct customer0_.customerId as customer1_0_0_, orders1_.orderId\
  \ as orderId1_1_1_, customer0_.dateAdded as dateAdde2_0_0_, customer0_.email as\
  \ email3_0_0_, customer0_.name as name4_0_0_, customer0_.password as password5_0_0_,\
  \ orders1_.customerId as customer2_1_1_, orders1_.price as price3_1_1_, orders1_.productId\
  \ as productI4_1_1_, orders1_.quantity as quantity5_1_1_, orders1_.customerId as\
  \ customer2_1_0__, orders1_.orderId as orderId1_1_0__ from Customer customer0_ left\
  \ outer join CustomerOrder orders1_ on customer0_.customerId=orders1_.customerId\n\
  com.example.eshop.Application : Customer Order Details:  [Customer(customerId=1,\
  \ name=Raj Malhotra, email=raj.malhotra@example.com, password=password, dateAdded=2019-03-31T15:16:40,\
  \ customerAddress=null, orders=[Order(orderId=1, productId=1, customerId=1, quantity=2,\
  \ price=400)])]\n```\n\n前面的查询将生成一个扁平的结果集，其中包含来自连接表的所有字段的组合。Hibernate 将过滤掉重复的行/列，并将左侧映射到相应的对象。\n\
  \n\n\n### 先获取用户对象，再分别为这些用户获取帖子对象\n\n作为一种简单的替代方案，我们可以先获取用户对象列表，然后在第二次查询中获取相关的 `POST`\
  \ 对象列表。这种方法存在两个问题：\n\n*   第二次查询必须使用 `IN` 子句来执行，这被认为不是一种好的实践。数据库中的 `IN` 子句通常会被重写为\
  \ `OR` 子句，这可能导致数据库在每次参数变化时重新解析和重建执行计划。如果目标列已建立索引且参数数量较少，你仍然可以获得不错的性能。\n\n*   客户端代码将不得不遍历两个独立的列表。\n\
  \n### 使用原生查询将结果作为单个组合结果映射到 DTO\n\n使用这种技术，可以执行带有外连接的自定义查询，并将结果映射到单个对象列表。这意味着不存在嵌套的父子对象结构，并且列表中的某些字段可能具有相同的值。\n\
  \n## 使用构造器映射进行 JPA 查询\n\n在 JPA 2.2 中，有多种解决方案可以将 JPA 查询的结果映射回任何实体对象或实体对象列表。其中最简单的方法是使用任何自定义\
  \ POJO 提供的构造器。让我们看看清单 4-9 中的示例。\n\n```\npackage com.example.eshop.model.dto;\nimport\
  \ lombok.Data;\n@Data\n@AllArgsConstructor\npublic class CustomerDto {\nprivate\
  \ Integer id;\nprivate String name;\n}\npublic interface CustomerRepository extends\
  \ JpaRepository{\n// 使用构造器映射的查询示例\n@Query(value = \"Select new com.example.eshop.model.dto.CustomerDto(c.id,\
  \ c.name) from Customer c\")\nList findCustomers();\n}\n@SpringBootApplication\n\
  @Slf4j\npublic class Application implements CommandLineRunner {\n@Override\npublic\
  \ void run(String... strings) throws Exception {\nconstructorMappingExample();\n\
  }\npublic void constructorMappingExample() {\nList customersList = customerRepository.findCustomers();\n\
  log.info(\"使用构造器映射查询结果的客户列表: {}\", customersList);\n}\n}\n清单 4-9\nDTO 和 CustomerRepository\n\
  ```\n\n注意：\n\n*   我们在代码库中添加了一个新类 `CustomerDto`。该类没有实体注解，并且仅通过特定属性精确映射到前端应用的需求。该类还应具有一个构造器，该构造器包含需要通过查询结果映射填充的所有字段。\n\
  \n*   我们还在 `CustomerRepository` 中添加了一个新方法，并通过 `@Query` 注解在其上添加了自定义查询。\n\n*   在 JPQL\
  \ 查询中，我们通过其 `com.example.eshop.model.dto.CustomerDto(c.id, c.name)` 构造器直接创建了一个新的\
  \ Java 对象。\n\n### 为构造器映射用例再次运行 Eshop 应用\n\n运行应用：\n\n```\n> gradle clean build\n\
  > gradle bootRun\n>\ncom.example.eshop.Application : 使用构造器映射查询结果的客户列表: [CustomerDto(id=1,\
  \ name=Raj Malhotra)]\n```\n\n## 使用映射到投影进行 JPA 查询\n\nSpring Data 也可以返回任何实体的投影或映射接口作为\
  \ JPQL 的结果。在 Spring Data 中，投影很容易实现。最简单的方法是声明一个接口，该接口公开要读取的属性的访问器方法。这些接口也可以嵌套。让我们通过清单\
  \ 4-10 中的示例来了解这一点。\n\n```\npackage com.example.eshop.model.projection;\nimport org.springframework.beans.factory.annotation.Value;\n\
  public interface CustomerProjection {\nString getName();\nString getEmail();\n@Value(\"\
  #{target.name + '_' + target.email}\")\nString getCustomerNameWithEmail();\n}\n\
  package com.example.eshop.repository.orders;\nimport com.example.eshop.model.dto.CustomerDto;\n\
  import com.example.eshop.model.orders.Customer;\nimport com.example.eshop.model.projection.CustomerProjection;\n\
  import org.springframework.data.jpa.repository.JpaRepository;\nimport org.springframework.data.jpa.repository.Query;\n\
  import java.util.Collection;\nimport java.util.List;\npublic interface CustomerRepository\
  \ extends JpaRepository{\n/* N+1 示例 */\n@Query(\"Select c from Customer c left join\
  \ fetch c.orders\")\nList findCustomersWithOrderDetails();\n// 使用构造器映射的查询示例\n@Query(value\
  \ = \"Select new com.example.eshop.model.dto.CustomerDto(c.id, c.name) from  Customer\
  \ c\")\nList findCustomers();\n// 投影示例\n@Query(\"Select c from Customer c\")\nList\
  \ findAllCustomers();\nCustomerProjection findOneByName(String name);\n}\n清单 4-10\n\
  投影示例\n```\n\n注意：\n\n*   我们在此代码中定义了 `Projection` 接口，其属性名称与返回的原始实体对象（客户）列表中的属性名称匹配。\n\
  \n*   通过此接口定义，Spring 会动态创建投影接口的代理，执行映射，并将这些代理作为输出返回。\n\n*   Spring 允许在这些访问器方法之上提供\
  \ SpEL（Spring 表达式语言）表达式来操作结果。例如，我们在 `getCustomerNameWithEmail()` 方法之上使用 SpEL 连接了姓名和电子邮件。此表达式中的\
  \ `target` 字段由 Spring 映射到返回的对象。\n\n*   投影仅基于返回的对象工作。因此，任何基于 Spring Data DSL 的方法也将起作用。这通过清单\
  \ 4-10 中的 `findOneByName(String name)` 示例方法进行了展示。\n\n我们还需要更改 `Application` 类，如清单\
  \ 4-11 所示，以测试清单 4-10 中的代码。\n\n```\n@SpringBootApplication\n@Slf4j\npublic class\
  \ Application implements CommandLineRunner {\n@Autowired\nCustomerRepository customerRepository;\n\
  public static void main(String[] args) throws Exception {\nSpringApplication.run(Application.class,\
  \ args);\n}\n@Override\npublic void run(String... strings) throws Exception {\n\
  projectionsExample();\nList customers = customerRepository.findWithOrders();\nlog.info(\"\
  带订单的客户\");\ncustomers.forEach(customer -> {\nlog.info(\"客户姓名: {}\", customer.getCustomerNameWithEmail());\n\
  //log.info(\"订单: {}\", customer.getOrderProjection().getPrice());\n});\nlog.info(\"\
  再次查询客户: {}\",\ncustomerRepository.findOneProjectedByName(\"Raj Malhotra\").getCustomerNameWithEmail());\n\
  }\npublic void projectionsExample() {\nList customers =\ncustomerRepository.findAllCustomers();\n\
  log.info(\"使用投影的客户列表\");\ncustomers.forEach(customer -> {\nlog.info(\"客户姓名: {}\"\
  ,\ncustomer.getCustomerNameWithEmail());\n});\nlog.info(\"查找单个客户: {}\",\ncustomerRepository.findOneByName(\"\
  Raj Malhotra\").getCustomerNameWithEmail());\n}\n}\n清单 4-11\nApplication 类\n```\n\
  \n\n\n### 为投影用例再次运行 Eshop 应用程序\n\n运行应用程序：\n\n```\n> gradle clean build\n> gradle\
  \ bootRun\n>\nINFO 40196 --- [           main] com.example.eshop.Application   \
  \         : No active profile set, falling back to default profiles: default\nHibernate:\
