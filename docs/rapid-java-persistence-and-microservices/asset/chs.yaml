  *   此脚本必须在名为 `eshop` 的 MySQL 数据库中运行。\n\n*   我们需要使用 ``` `` ``` 字符转义 `Order`，因为 `Order`\
  \ 是 MySQL 中的关键字。在此脚本中，我们手动为名为 Raj Malhotra 的客户创建了一个包含单个产品的订单作为示例。\n\n### DTO 与应用类\n\
  \n这里我们有一个名为 `CustomerOrder` 的简单 POJO，它混合了 `Customer`、`Product`**和** `Order` 类的属性。此对象的目的是组合属性，以识别哪个客户购买了哪个产品以及订单详情是什么（参见清单\
  \ 5-3）。\n\n```\npackage com.example.eshop;\nimport lombok.extern.slf4j.Slf4j;\n\
