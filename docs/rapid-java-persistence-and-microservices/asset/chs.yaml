  \ Content\"},{\"id\":2,\"title\":\"xyz\",\"content\":\"xyz\"}]\n```\n\n## 总结\n\n\
  本章全面介绍了 Java 生态系统中的响应式开发，并特别介绍了 Spring 响应式 API 以及 Spring R2DBC 仓库的入门知识。这仍然是一个新兴领域，预计未来会有更多创新。我建议读者也探索其他\
  \ API。在下一章中，我们将探讨另一个有趣的概念，它有助于我们在极少的硬件资源下实现超大规模的工作。\n\n\n\n# 9. Java WebSocket 开发\n\
  \n本章介绍如何在 Java 中使用 *WebSocket* 创建支持数百万并发用户的实时应用程序。WebSocket 提供了与 HTTP Web 服务器的双向持久连接，从而可以减少创建\
  \ HTTP 连接所需的时间。HTTP 1.1 也通过 *keep-alive 标头* 允许长连接，但每个请求中的有效负载明显大于 WebSocket。\n\n\
  人们经常将 WebSocket 与支持服务器推送事件（SSE）的 HTTP/2 进行比较。HTTP/2 允许在连接级别进行请求多路复用，SSE 允许服务器端数据推送，但即使将两者结合，也无法完全替代\
  \ WebSocket。当我们只有服务器端数据推送用例（例如向客户端发送通知）时，SSE 可以工作。然而，对于像聊天这样的双向对话场景，WebSocket 更胜一筹。\n\
  \n请思考一下为什么连接管理如此重要。简单来说，如果我们有一个拥有 100 万活跃用户的游戏平台，每个连接需要近 10 毫秒来创建，这意味着我们仅在连接上就花费了\
  \ 10,000 秒的时间。现在想想，如果每个用户都在随机时间间隔内通过调用 REST API 发送数百个请求，那么将会创建和关闭多少个连接？我曾有过使用 WebSocket\
  \ 为 300 到 400 万连接用户提供近乎实时响应的经验。\n\n在 Java 中有许多创建 WebSocket 的选项。我们可以使用 Spring 框架、JAX-RS、GraphQL、Spark\
  \ 框架等。在本章中，我们将以 Spark 框架（[`http://sparkjava.com`](http://sparkjava.com)）为例，因为它简单易用。该框架已在第\
  \ 2 章中介绍过。\n\n我们将构建一个 Tweet 微服务，该服务可以同时向所有连接的用户发送推文。这通常用于聊天程序和实时游戏应用程序。我们将使用以下代码结构作为此应用程序的一部分：\n\
  \n```\n.\n├── build.gradle\n├── gradle\n│   └── wrapper\n│       ├── gradle-wrapper.jar\n\
  │       └── gradle-wrapper.properties\n├── gradlew\n├── gradlew.bat\n├── settings.gradle\n\
  └── src\n    └── main\n        ├── java\n        │   └── com\n        │       └──\
  \ example\n        │           ├── Application.java\n        │           └── web\n\
  \        │               ├── MessageService.java\n        │               ├── TweetController.java\n\
  \        │               └── WSHandler.java\n        └── resources\n```\n\n## 应用程序设置\n\
  \n创建一个名为 `websocket-example-ch9` 的新 Gradle 应用程序，其 `build.gradle` 文件如代码清单 9-1 所示。\n\
  \n```\nplugins {\n    id 'java'\n    id \"name.remal.fat-jar\" version \"1.0.124\"\
  \n}\ngroup = 'com.example'\nversion = '1.0'\nsourceCompatibility = JavaVersion.VERSION_11\n\
  targetCompatibility = JavaVersion.VERSION_11\nrepositories {\n    mavenCentral()\n\
  }\ndependencies {\n    compile(\"com.sparkjava:spark-core:2.9.0\")\n    compile\
  \ group: 'org.json', name: 'json', version: '20180813'\n    compile('org.projectlombok:lombok:1.18.6')\n\
  }\n代码清单 9-1\n构建脚本\n```\n\n注意：\n\n*   我们添加了一个名为 `name.remal.fat-jar` 的新插件，它将帮助我们创建一个包含所有依赖类文件的单一\
  \ JAR 文件。\n\n## 引导启动\n\n我们只需三行代码即可初始化应用程序（参见代码清单 9-2）。\n\n```\npackage com.example;\n\
  \nimport com.example.web.TweetController;\nimport com.example.web.WSHandler;\nimport\
  \ static spark.Spark.init;\nimport static spark.Spark.webSocket;\n\npublic class\
  \ Application {\n    public static void main(String[] args) {\n        webSocket(\"\
  /tweet\", WSHandler.class);\n        TweetController tweetController = new TweetController();\n\
  \    }\n}\n代码清单 9-2\n应用程序类\n```\n\n注意：\n\n*   我们将 WebSocket 路径初始化为 `/tweet`，并附加了一个\
  \ WebSocket 连接处理程序类（名为 `WSHandler`）。\n*   我们还初始化了一个控制器类来定义 RESTful 端点。\n\n## Tweet\
  \ 处理程序\n\n此处理程序类将重写事件回调方法，并在用户连接、断开连接或发送消息时执行相应操作。Spark 默认使用 Jetty WebSocket API。此类主要将操作委托给一个第三方消息服务——参见代码清单\
  \ 9-3。\n\n```\npackage com.example.web;\n\nimport org.eclipse.jetty.websocket.api.Session;\n\
  import org.eclipse.jetty.websocket.api.annotations.OnWebSocketClose;\nimport org.eclipse.jetty.websocket.api.annotations.OnWebSocketConnect;\n\
  import org.eclipse.jetty.websocket.api.annotations.OnWebSocketMessage;\nimport org.eclipse.jetty.websocket.api.annotations.WebSocket;\n\
  \n@WebSocket\npublic class WSHandler {\n    MessageService messageService = MessageService.getInstance();\n\
  \n    @OnWebSocketConnect\n    public void onConnect(Session session) throws Exception\
  \ {\n        String username = messageService.newUserJoined(session);\n        messageService.broadcastMessage(\"\
  Server\", username + \" joined the chat\");\n    }\n\n    @OnWebSocketClose\n  \
  \  public void onClose(Session session, int statusCode, String reason) {\n     \
  \   String username = messageService.removeUser(session);\n        messageService.broadcastMessage(\"\
  Server\", username + \" left the chat\");\n    }\n\n    @OnWebSocketMessage\n  \
  \  public void onMessage(Session session, String message) {\n        String username\
  \ = messageService.getUser(session);\n        messageService.broadcastMessage(username,\
  \ message);\n    }\n}\n代码清单 9-3\nWebSocket 处理程序类\n```\n\n注意：\n\n*   `onConnect`：我们调用了\
  \ `MessageService` 的 `newUserJoined` 方法，将这些会话存储到某个存储中。\n*   `onClose`：我们调用了同一个 `MessageService`\
  \ 的 `removeUser` 方法来处理来自终端客户端的关闭。\n*   `onMessage`：接收来自终端客户端的消息，并将操作再次委托给消息服务以执行任何自定义逻辑。\n\
  \n## 消息服务\n\n此类负责处理对接收到的消息应用的所有业务逻辑。我们定义了一个 `broadcastMessage()` 方法，用于向所有连接的用户发送消息。我们将所有会话保存在一个\
  \ `ConcurrentHashMap` 中，以便我们可以根据会话查找任何用户，并将消息发送回终端客户端。参见代码清单 9-4。\n\n```\npackage\
  \ com.example.web;\n\nimport lombok.extern.slf4j.Slf4j;\nimport org.eclipse.jetty.websocket.api.Session;\n\
  \nimport java.util.Map;\nimport java.util.concurrent.ConcurrentHashMap;\nimport\
  \ java.util.concurrent.atomic.AtomicInteger;\n\n@Slf4j\npublic class MessageService\
  \ {\n    private static MessageService instance = new MessageService();\n\n    public\
  \ static MessageService getInstance() {\n        return instance;\n    }\n\n   \
  \ private MessageService() {}\n\n    AtomicInteger counter = new AtomicInteger(0);\n\
  \    Map<Session, String> sessionMap = new ConcurrentHashMap<>();\n\n    public\
  \ String newUserJoined(Session session) {\n        String username = \"User\" +\
  \ counter.addAndGet(1);\n        sessionMap.put(session, username);\n        return\
  \ username;\n    }\n\n    public void broadcastMessage(String sender, String message)\
  \ {\n        log.info(\"Sending another message\");\n        sessionMap.keySet().stream().filter(Session::isOpen).forEach(session\
  \ -> {\n            try {\n                session.getRemote().sendString(sender\
  \ + \" : \" + message);\n            } catch (Exception e) {\n                e.printStackTrace();\n\
  \            }\n        });\n    }\n\n    public String removeUser(Session session)\
  \ {\n        String username = sessionMap.get(session);\n        sessionMap.remove(session);\n\
  \        return username;\n    }\n\n    public String getUser(Session session) {\n\
  \        return sessionMap.get(session);\n    }\n}\n代码清单 9-4\n业务服务\n```\n\n注意：\n\
  \n*   我们将 `MessageService` 定义为 `Singleton`（单例），因为我们需要它的单个副本来存储和返回与会话对应的用户名。我们使用\
  \ `ConcurrentHashMap` 来保证线程安全。\n*   当新用户加入时，我们将会话对象作为键，对应一个唯一的用户名。\n*   当用户断开连接时，我们只需从会话存储中移除该对象。\n\
  *   使用 `broadcast` 方法，我们遍历所有会话，并将消息发送给所有连接的用户，包括当前用户。\n\n\n\n## Tweet 控制器\n\n在查看此应用的输出之前，我们先为系统添加一个更有趣的组件。我们需要添加一个\
  \ `TweetController` 类（见代码清单 9-5），它将暴露 `POST` RESTful 端点，用于接收消息并将其分发给所有其他已连接的用户。\n\
  \n```\npackage com.example.web;\nimport static spark.Spark.*;\npublic class TweetController\
  \ {\nMessageService messageService = MessageService.getInstance();\npublic TweetController()\
  \    {\npost(\"/tweet\", (request, response) -> {\nString message = request.queryParamOrDefault(\"\
  message\", \"SERVER\");\nmessageService.broadcastMessage(\"Server\", message);\n\
  return \"Sent\";\n});\n}\n}\n代码清单 9-5\n控制器类\n```\n\n## 运行 Websocket-Example-Ch9\
  \ 应用\n\nSpark 框架最棒的一点是，服务启动时间不到 100 毫秒。我们需要创建一个 fat JAR，然后运行该 JAR 文件。默认情况下，Spark\
  \ 框架会在端口 `4567` 上启动应用。\n\n```\n> gradle clean build && gradle fatJar\n> java -jar\
  \ ./build/libs/websocket-example-all-1.0.jar\nSLF4J: Failed to load class \"org.slf4j.impl.StaticLoggerBinder\"\
  .\nSLF4J: Defaulting to no-operation (NOP) logger implementation\nSLF4J: See http://www.slf4j.org/codes.html#StaticLoggerBinder\
  \ for further details.\n```\n\n为了测试 Websocket 连接，我们首先使用 [`http://www.websocket.org/echo.html`](http://www.websocket.org/echo.html)\
  \ 上的示例 Web 客户端进行测试。然后，我们在浏览器的两个标签页中创建两个连接，并使用 `Curl` 命令创建一个控制台用户。图 9-1 和 9-2 展示了示例输出。\n\
  \n![../images/454149_1_En_9_Chapter/454149_1_En_9_Fig2_HTML.jpg](img/454149_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2\n第二个标签页中的第二个 Websocket 连接\n\n![../images/454149_1_En_9_Chapter/454149_1_En_9_Fig1_HTML.jpg](img/454149_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\n示例 Websocket 连接\n\n此外，我们还将通过控制台的 `CURL` 命令，从 RESTful 端点发送一条推文：\n\n```\n\
  > curl -P -v \"http://localhost:4567/tweet\" --data-urlencode \"message=Hello from\
  \ Raj\"\n```\n\n结果，从 `CURL` 命令发送到 REST 端点的消息应立即在浏览器窗口中可见。图 9-3 显示了由控制台用户发送并由浏览器第二个标签页中的\
  \ Websocket 接收的消息。\n\n![../images/454149_1_En_9_Chapter/454149_1_En_9_Fig3_HTML.jpg](img/454149_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n广播消息示例\n\n## 总结\n\n本章通过一个基本示例演示了如何使用 Java 进行 Websocket 编程。围绕这一概念，还有许多其他概念值得探索。Spring\
  \ 框架也提供了基于 STOMP 协议的 Websocket API。下一章将探讨另一种编程风格，它通过不同的方法（即无服务器开发）来帮助管理应用的规模。\n\n\
  # 10. Java 无服务器开发\n\n无服务器编程正逐渐被主流开发所采用。从根本上说，无服务器编程意味着服务器或基础设施由基础设施/云提供商管理，但代码仍然存在并在某台机器上运行。作为开发者，你应该专注于解决问题和部署。根据规模需求，基础设施提供商或框架负责随时管理运行所提供代码的活动节点数量。换句话说，机器的分配是动态的，由基础设施提供商管理。无服务器化既有不少优势，也存在一些顾虑。让我们来看看其中的一些。\n\
  \n优势：\n\n*   无服务器架构提供了更高的可扩展性和灵活性。\n*   无服务器架构允许开发者快速发布版本。\n*   定价更优，因为无需 DevOps，也没有服务器成本。\n\
  *   代码库非常小，因此更易于管理。\n*   无服务器架构具有无状态的函数式编程特性。\n*   对于事件驱动型场景，这是一个良好的编程环境。\n\n顾虑：\n\
  \n*   无服务器计算引入了新的安全问题。\n*   无服务器架构不适合长时间运行的进程。\n*   以无服务器模式设计整个电子商务系统或交易系统是一项重大挑战。\n\
  *   如果使用 Docker 容器，我们可以在普通硬件上处理数百万次点击并运行完整的应用，那么为什么还需要无服务器编程来实现扩展？这是最常见的问题之一。\n\
  *   数据库查询更困难。想想我们在 Java 应用中对连接池的关注。在无服务器环境中，我们将无法利用这一点。\n*   调试通常很困难，并且主要依赖于日志。\n\
  *   我们需要保持节点“热”状态。只要对无服务器函数的请求不断，它就会保持活动状态。否则，基础设施提供商可能会丢弃运行它的容器。这可能导致响应时间变慢，因此需要通过定期发送一些请求来保持其活动状态。\n\
  \n几乎所有云平台的 Java 都提供了用于无服务器开发的 API。然而，有一个名为 *Apache OpenWhisk* 的通用 API 模型，它允许你创建通用的、与云无关的函数，这些函数以无服务器模式运行。总的来说，我们有以下选择：\n\
  \n*   AWS Lambda 函数 ( [`https://aws.amazon.com/lambda/`](https://aws.amazon.com/lambda/)\
  \ )\n*   Azure 无服务器函数 ( [`https://azure.microsoft.com/en-in/services/functions/`](https://azure.microsoft.com/en-in/services/functions/)\
  \ )\n*   Google Cloud 函数 ( [`https://cloud.google.com/functions/`](https://cloud.google.com/functions/)\
  \ )\n*   OpenWhisk ( [`https://openwhisk.apache.org/`](https://openwhisk.apache.org/)\
  \ )\n\n使用所有这些及其自定义 API 可能非常耗时。Spring 框架在这方面提供了一个优势，它在 Spring Cloud 下有一个子项目，称为 Spring\
  \ Cloud Functions（SCF：[`https://spring.io/projects/spring-cloud-function`](https://spring.io/projects/spring-cloud-function)）。\n\
  \nSCF 提供了统一的 API 来与所有这四个无服务器提供商协作。除此之外，它还允许开发者创建通用的基于 Spring 的函数，并独立运行。Java 8 中引入的函数式编程结构在这里甚至更有用，因为我们打算在这里使用函数式编程。让我们用以下代码结构构建一个\
  \ Spring Cloud Function 的示例：\n\n```\n.\n├── build.gradle\n├── gradle\n│   └── wrapper\n\
  │       ├── gradle-wrapper.jar\n│       └── gradle-wrapper.properties\n├── gradlew\n\
  ├── gradlew.bat\n├── settings.gradle\n└── src\n└── main\n├── java\n│   └── com\n\
  │       └── example\n│           └── App.java\n└── resources\n```\n\n## 应用设置\n\n\
  从 [`http://start.spring.io/`](http://start.spring.io/) 创建一个名为 `serverless-example-ch10`\
  \ 的新项目，并在 `build` 文件中包含代码清单 10-1 所示的依赖项。\n\n```\nplugins {\nid 'org.springframework.boot'\
  \ version '2.1.3.RELEASE'\nid 'java'\n}\napply plugin: 'io.spring.dependency-management'\n\
  java {\ngroup = 'com.example'\nversion = '1.0'\nsourceCompatibility = JavaVersion.VERSION_1_8\n\
  targetCompatibility = JavaVersion.VERSION_1_8\n}\nbootJar  {\narchiveBaseName =\
  \ 'serverless-example'\nversion =  '1.0'\n}\nrepositories {\nmavenCentral()\n}\n\
  dependencies {\ncompile(\"org.springframework.cloud:spring-cloud-starter-function-web\"\
  )\ncompile(\"org.springframework.cloud:spring-cloud-function-adapter-aws\")\ncompile(\"\
  org.projectlombok:lombok:1.18.6\")\n}\ndependencyManagement {\nimports {\nmavenBom\
  \ \"org.springframework.cloud:spring-cloud-dependencies:Greenwich.SR1\"\n}\n}\n\
  代码清单 10-1\n构建脚本\n```\n\n\n\n## 功能代码\n\n我们有一个非常小的功能代码片段，默认情况下会部署到 Tomcat 实例中。如前所述，它可以在所有四个平台上使用。根据\
  \ Spring Cloud Function 文档，我们可能需要进行一些微调。请参见清单 10-2。\n\n```\npackage com.example;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.context.annotation.Bean;\nimport reactor.core.publisher.Flux;\n\
  import java.util.function.Supplier;\n@SpringBootApplication\npublic class App {\n\
  public static void main(String[] args) {\nSpringApplication.run(App.class, args);\n\
  }\n@Bean\npublic Supplier> randomWords() {\nreturn () -> Flux.fromArray(new String[]\
  \ { \"Raj\", \"Malhotra\"});\n}\n}\n清单 10-2\n应用程序类\n```\n\n注意：\n\n*   默认情况下，Spring\
  \ Boot 在此处使用 Tomcat，并创建一个 Web 应用程序，该应用程序会暴露所有已定义的功能方法，这些方法可通过 URL 访问。\n\n*   相同的代码库可以用于不同的平台（AWS、Azure\
  \ 或 OpenWhisk）。\n\n*   可以进行一些优化以缩短启动时间：\n    *   尽量避免使用 `Component`，因为它会减慢启动过程。\n\
  \n    *   出于同样的原因，尽量避免使用 `Autowiring`，而应使用构造函数注入。\n\n## 运行 Serverless-Example-Ch10\
  \ 应用程序\n\n```\n> gradle bootRun\n>\n:: Spring Boot ::        (v2.1.3.RELEASE)\n\
  2019-03-25 08:20:04.204  INFO 16506 --- [           main] o.s.b.w.embedded.tomcat.TomcatWebServer\
  \  : Tomcat started on port(s): 8080 (http) with context path \"\n2019-03-25 08:20:04.208\
  \  INFO 16506 --- [           main] com.example.App                          : Started\
  \ App in 2.401 seconds (JVM running for 2.803)\n```\n\n为了测试此函数，请运行以下 Curl 命令：\n\n\
  ```\n> curl http://localhost:8080/randomWords\n[\"Raj\",\"Malhotra\"]\n```\n\n我们调用了\
  \ `randomWords` 函数，并收到了响应 `[\"Raj\",\"Malhotra\"]`。\n\n## 总结\n\n在本章中，我们学习了如何开始使用\
  \ Spring Cloud Function。我建议你尝试使用 Apache OpenWhisk Adapter API。接下来，我们将在下一章中探讨 Java\
  \ 消息传递选项。\n\n# 11. Java 消息传递\n\n从我职业生涯开始，消息传递就一直是一个让我感兴趣的话题。多年来，Java 生态系统采用了多种不同风格的事件驱动编程。自\
  \ 1998 年以来，我们一直拥有 JMS（Java 消息服务）API，并且它至今仍在发挥着同样的作用。如今，架构师们更倾向于使用 Spring 集成、Camel\
  \ 和其他平台 API，而不是纯 JMS 解决方案。进入当前的消息代理时代，我们有 AMQP 代理（ActiveMQ、RabbitMQ、QPid、IronMQ\
  \ 等）这样的整体解决方案、流式解决方案（Kafka 和云提供商提供的选项），以及商业解决方案，如 Tibco 和 IBM MQ。我们将研究其中两个代理，并使用\
  \ Java API 涵盖各种底层概念——RabbitMQ 和 Kafka。此应用程序的代码结构如下：\n\n```\n.\n├── build.gradle\n\
  ├── gradle\n│   └── wrapper\n│       ├── gradle-wrapper.jar\n│       └── gradle-wrapper.properties\n\
  ├── gradlew\n├── gradlew.bat\n└── src\n└── main\n├── java\n│   └── com\n│      \
  \ └── example\n│           ├── Application.java\n│           ├── kafka\n│      \
  \     │   ├── KafkaConsumer.java\n│           │   └── KafkaProducer.java\n│    \
  \       └── rabbitmq\n│               ├── Consumer.java\n│               ├── Producer.java\n\
  │               └── RabbitMQConfig.java\n└── resources\n├── application.properties\n\
  └── application.yml\n```\n\n## RabbitMQ\n\nRabbitMQ 是一个非常流行的消息代理，支持 AMQP 1.0 协议。在消息传递领域，RabbitMQ\
  \ 是用 Erlang 编写的，并且仍然是该领域的领导者。Java 中有多个 API，但我们将继续仅使用 Spring 框架。通常，在 RabbitMQ 代理中，我们有一个交换器，它保存所有消息，并根据交换器的路由键进一步分发这些消息。图\
  \ 11-1 展示了此通信过程。\n\n![../images/454149_1_En_11_Chapter/454149_1_En_11_Fig1_HTML.png](img/454149_1_En_11_Fig1_HTML.png)\n\
  \n图 11-1\n\nRabbitMQ 交换器\n\n过程如下：\n\n1.  发布者将消息发布到 RabbitMQ 交换器。\n\n2.  根据路由键，交换器将消息分发到其队列。\n\
  \n3.  连接到不同队列的消费者根据其兴趣接收消息。\n\n4.  根据交换器类型，消息被发送到一个或多个队列。交换器类型可以是 Direct、Fanout、Topic\
  \ 和 Headers。\n\n现在，让我们在 OSX 上使用 Spring Boot 和 RabbitMQ 创建一个示例。\n\n### 应用程序设置\n\n\
  我们首先使用 `brew` 命令在 OSX（MacBook）上安装 RabbitMQ：\n\n```\n> brew install rabbitmq\n> brew\
  \ services start rabbitmq\n```\n\n然后，我们创建一个名为 `messaging-examples-ch11` 的新 Gradle\
  \ 项目，其 `build.gradle` 文件中的依赖项如清单 11-1 所示。\n\n```\nplugins {\nid 'org.springframework.boot'\
  \ version '2.1.3.RELEASE'\nid 'java'\n}\napply plugin: 'io.spring.dependency-management'\n\
  apply plugin: 'project-report'\njava {\ngroup = 'com.example'\nversion = '1.0'\n\
  sourceCompatibility = JavaVersion.VERSION_1_8\ntargetCompatibility = JavaVersion.VERSION_1_8\n\
  }\nbootJar {\narchiveBaseName = 'messaging-example'\nversion =  '1.0'\n}\nrepositories\
  \ {\nmavenCentral()\n}\ndependencies {\ncompile('org.projectlombok:lombok:1.18.6')\n\
  compile(\"org.springframework.boot:spring-boot-starter-amqp\")\n}\n清单 11-1\n构建文件\n\
  ```\n\n### 引导\n\n我们有一个简单的 `Application` 类，它在 Spring 框架中启用了调度功能（参见清单 11-2）。我们将使用调度器持续向代理的队列发送消息。\n\
  \n```\npackage com.example;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.scheduling.annotation.EnableScheduling;\n\
  @SpringBootApplication\n@EnableScheduling\npublic class Application {\npublic static\
  \ void main(String[] args) {\nSpringApplication.run(Application.class, args);\n\
  }\n}\n清单 11-2\n应用程序类\n```\n\n### RabbitMQ 配置\n\n在我们开始使用生产者和消费者之前，我们需要通过 Spring 配置来声明交换器、队列以及这两者之间的绑定（参见清单\
  \ 11-3）。\n\n```\npackage com.example.rabbitmq;\nimport org.springframework.amqp.core.*;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  @Configuration\npublic class RabbitMQConfig {\n@Bean\npublic Exchange ordersExchange()\
  \ {\nreturn new DirectExchange(\"orders_exchange\");\n}\n@Bean\npublic Queue ordersQueue()\
  \ {\nreturn new Queue(\"orders\");\n}\n@Bean\npublic Queue messagesQueue() {\nreturn\
  \ new Queue(\"notifications\");\n}\n@Bean\npublic Binding binding() {\nreturn BindingBuilder\n\
  .bind(ordersQueue())\n.to(ordersExchange())\n.with(\"orders.*\").noargs();\n}\n\
  @Bean\npublic Binding binding2() {\nreturn BindingBuilder\n.bind(messagesQueue())\n\
  .to(ordersExchange())\n.with(\"notifications.*\").noargs();\n}\n}\n清单 11-3\n配置\n\
  ```\n\n注意：\n\n*   我们创建了一个名为 `orders_exchange` 的直接交换器，以及两个名为 `orders` 和 `notifications`\
  \ 的队列。\n\n*   我们还创建了两个绑定，分别使用路由键 `orders.*` 和 `notifications.*`，将队列与交换器绑定。\n\n*\
  \   在此示例中，我们不会使用 notifications 队列。我们只是将其作为一个示例来展示如何从同一个交换器路由不同类型的消息。\n\n\n\n###\
  \ 消息生产者\n\n我们将通过 `@Scheduled` 调度一个方法，该方法持续生成新消息并将其发送到代理。在本示例中，我使用了 Spring Boot 中\
  \ RabbitMQ 服务器的默认设置（参见清单 11-4）。默认属性如下：\n\n*   `spring.rabbitmq.port`：用于指定端口；默认为\
  \ `5672`。\n\n*   `spring.rabbitmq.host`：用于指定主机；默认为 `localhost`。\n\n*   `spring.rabbitmq.username`：用于指定（可选的）用户名。\n\
  \n*   `spring.rabbitmq.password`：用于指定（可选的）密码。\n\n```\npackage com.example.rabbitmq;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.amqp.core.Queue;\n\
  import org.springframework.amqp.rabbit.core.RabbitTemplate;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.scheduling.annotation.Scheduled;\nimport org.springframework.stereotype.\
  \ Service;\nimport java.util.Calendar;\n@Service\n@Slf4j\npublic class Producer\
  \ {\n@Autowired\nprivate RabbitTemplate rabbitTemplate;\n@Scheduled(fixedRate =\
  \ 1000)\npublic void send() {\nString message = \"Next order received at \" + Calendar.getInstance().getTime();\n\
  this.rabbitTemplate.convertAndSend(\"orders_exchange\", \"orders\", message);\n\
  log.info(\"RabbitMQ Message sent : {}\", message);\n}\n}\n清单 11-4\n生产者类\n```\n\n\
  说明：\n\n*   我们通过自动装配注入了 `RabbitTemplate` 对象。\n\n*   `@Scheduled(fixedRate = 1000)`\
  \ 注解将确保每 1000 毫秒调用一次 `send()` 方法。\n\n*   我们正在生成一条新消息并将其通过网络发送出去。\n\n*   我们将消息发送到名为\
  \ `orders_exchange` 的交换机，路由键设置为 `orders`。`RabbitTemplate` 中实际方法的签名是 `public void\
  \ convertAndSend(String exchange, String routingKey, Object object)`。\n\n### 消息消费者\n\
  \n这里我们只有一小段代码，用于持续将接收到的消息打印到日志文件中（参见清单 11-5）。\n\n```\npackage com.example.rabbitmq;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.amqp.rabbit.annotation.RabbitListener;\n\
  import org.springframework.stereotype.Service;\n@Service\n@Slf4j\npublic class Consumer\
  \ {\n@RabbitListener(queues = \"orders\")\npublic void receiveMessage(String message)\
  \ {\nlog.info(\"RabbitMQ Received :: {}\", message);\n}\n}\n清单 11-5\n消费者类\n```\n\
  \n`@RabbitListener(queues = \"orders\")` 注解表明该方法将充当名为 `orders` 的队列中所有接收到的消息的监听器。\n\
  \n### 运行应用程序\n\n运行应用程序：\n\n```\n> gradle bootRun\n2019-03-24 - Starting Application\
  \ on Rajs-MacBook-Pro.local with PID 1409 (started by raj in /Users/raj/work_all/book_\
  \ code/rapid-java-persistence-and-microservices/ch11/messaging-examples-ch11)\n\
  2019-03-24 - No active profile set, falling back to default profiles: default\n\
  2019-03-24 - Initializing ExecutorService 'taskScheduler'\n2019-03-24 - Attempting\
  \ to connect to: [localhost:5672]\n2019-03-24 - Created new connection: rabbitConnectionFactory#4fa06f52:0/SimpleConnection@4f668f29\
  \ [delegate=amqp://guest@127.0.0.1:5672/, localPort= 61085]\n2019-03-24 - RabbitMQ\
  \ Received :: Next order received at Fri Mar 22 22:57:53 IST 2019\n2019-03-24 -\
  \ RabbitMQ Message sent : Next order received at Sun Mar 24 23:51:41 IST\n2019-03-24\
  \ - Started Application in 2.406 seconds (JVM running for 2.915)\n2019-03-24 - RabbitMQ\
  \ Received :: Next order received at Sun Mar 24 23:51:41 IST 2019\n2019-03-24 -\
  \ RabbitMQ Message sent : Next order received at Sun Mar 24 23:51:42 IST\n2019-03-24\
  \ - RabbitMQ Received :: Next order received at Sun Mar 24 23:51:42 IST 2019\n2019-03-24\
  \ - RabbitMQ Message sent : Next order received at Sun Mar 24 23:51:43 IST\n```\n\
  \n我们还可以通过 RabbitMQ 管理界面查看创建的交换机（见图 11-2）和队列（见图 11-3）。在浏览器中访问 `http://localhost:15672/#/`\
  \ 网址，如果提示输入用户名和密码，请输入默认值 `guest/guest`。\n\n![../images/454149_1_En_11_Chapter/454149_1_En_11_Fig3_HTML.jpg](img/454149_1_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3\n\n显示队列的 RabbitMQ 管理控制台\n\n![../images/454149_1_En_11_Chapter/454149_1_En_11_Fig2_HTML.jpg](img/454149_1_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2\n\n显示 orders_exchange 的 RabbitMQ 管理控制台\n\n## Apache Kafka\n\nApache Kafka\
  \ 是一个流行的流处理平台。它最初由 LinkedIn 开发，并捐赠给 Apache 软件基金会。Kafka 使用 Scala JVM 语言编写，旨在提供一个大规模可扩展的平台，用于处理数百万条持续生成的消息。在本节中，我们将探讨\
  \ Spring Boot Kafka 生产者和消费者应用程序的快速入门示例。\n\nKafka 有多种实际应用场景。我曾见过初创公司将 Kafka 用作消息代理，而非流处理器，每天处理\
  \ 5000 个订单项的消息量。这样做的原因是为了在所有需求中使用单一且一致的消息传递技术。尽管仅出于解决问题的目的，我们可以以不同方式利用 Kafka。然而，在这种负载下，我们无法充分发挥其潜力；在这种情况下，RabbitMQ\
  \ 可能更合适。作为一般使用建议，RabbitMQ 应用于微服务间通信，而 Kafka 更擅长后端消息处理。请考虑以下 Kafka 使用场景：\n\n*   电子商务行业中用于订单履约的订单后处理\n\
  *   向最终用户发送通知\n*   日志和分析\n*   大规模系统中的任何错误处理或发送警报\n*   基于主题的 `发布/订阅` 的常规消息传递需求\n\n\
  ### Kafka 工具和构建脚本\n\n我们需要在机器上安装并启动 Kafka。请按照以下步骤操作：\n\n1.  运行以下命令：\n\n    ```\n\
  \    > brew install kafka\n    > brew services start kafka\n    ```\n\n    这将使用默认设置在后台启动\
  \ Zookeeper 和 Kafka。或者，我们可以使用以下命令手动启动代理：\n\n    ```\n    > cd /usr/local/Cellar/kafka/2.1.1/\n\
  \    > ./zookeeper-server-start ../libexec/config/zookeeper.properties\n    > ./kafka-server-start\
  \ ../libexec/config/server.properties\n    ```\n\n2.  我们还可以通过基于控制台的实用程序，使用以下命令测试示例生产者和消费者：\n\
  \n    ```\n    > ./kafka-console-producer --broker-list localhost:9092 --topic test\n\
  \    >./kafka-console-consumer --bootstrap-server localhost:9092 --topic test —\
  \ from-beginning\n    ```\n\n    这些实用程序可用于从控制台向代理发送任何消息。相同的消息将打印在消费者实用程序的控制台上。\n\
  \n3.  在同一个应用程序的 `build.gradle` 文件中添加以下依赖项：\n\n    ```\n    compile('org.apache.kafka:kafka-streams')\n\
  \    compile('org.springframework.kafka:spring-kafka')\n    ```\n\n\n\n### 消息生产者\n\
  \n我们将创建一个定时调用另一个方法的方法，该方法会持续生成新消息，但这次会将消息发送到 Kafka 代理（参见清单 11-6）。此示例使用了 Kafka 和\
  \ Zookeeper 的端口设置，这些设置在 Spring Boot 中为默认值。这些属性的默认值如下：\n\n*   `spring.cloud.stream.kafka.binder.brokers`：`localhost`\n\
  \n*   `spring.cloud.stream.kafka.binder.defaultBrokerPort`：`9092`\n\n*   `spring.cloud.stream.kafka.binder.zkNodes`：`localhost`\n\
  \n*   `spring.cloud.stream.kafka.binder.defaultZkPort`：`2181`\n\n```\npackage com.example.kafka;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.kafka.core.KafkaTemplate;\nimport org.springframework.scheduling.annotation.Scheduled;\n\
  import org.springframework.stereotype.Service;\nimport java.util.Calendar;\n@Service\n\
  @Slf4j\npublic class KafkaProducer {\nprivate static final String TOPIC = \"orders\"\
  ;\n@Autowired\nprivate KafkaTemplate kafkaTemplate;\n@Scheduled(fixedRate = 1000)\n\
  public void sendMessage() {\nString message = \"Next order received at \" +\nCalendar.getInstance().getTime();\n\
  log.info(\"Kafka Message sent : {}\", message);\nkafkaTemplate.send(TOPIC, message);\n\
  }\n}\n清单 11-6\nKafkaProducer 类\n```\n\n说明：\n\n*   `KafkaTemplate<Key, Value>` 是\
  \ Spring Boot 提供的便捷类，用于执行所有与 Kafka 相关的操作，就像 `RabbitTemplate` 一样。\n\n*   我们向 `orders`\
  \ 主题发送消息时并未创建该主题，因为 `KafkaTemplate` 会自动创建该主题。\n\n### 消息消费者\n\n与上一节中的 RabbitMQ 消费者类似，我们在清单\
  \ 11-7 中有一段简短的代码，用于持续将接收到的消息打印到日志文件中。\n\n```\npackage com.example.kafka;\nimport\
  \ lombok.extern.slf4j.Slf4j;\nimport org.springframework.kafka.annotation.KafkaListener;\n\
  import org.springframework.stereotype.Service;\nimport java.io.IOException;\n@Service\n\
  @Slf4j\npublic class KafkaConsumer {\n@KafkaListener(topics = \"orders\", groupId\
  \ = \"order_grp\")\npublic void consume(String message) throws IOException {\nlog.info(\"\
  Kafka Received :: {}\", message);\n}\n}\n清单 11-7\nKafka 消费者\n```\n\n说明：\n\n*   `@KafkaListener`\
  \ 注解将激活 `consume()` 方法，用于监听 `orders` 主题上接收到的所有消息。\n\n*   `groupId` 属性表示消费者组的名称。通过这种方式，可以配置多个接收器，使其在不同的组中接收相同的消息，以满足不同的处理需求。\n\
