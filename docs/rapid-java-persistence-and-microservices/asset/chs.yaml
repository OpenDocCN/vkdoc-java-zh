  ```\n\n日志输出显示了由 Lombok 的 `toString()` 方法返回的对象值。其目的是展示实现数据库访问所需代码的简洁性。API 中还有更多选项可以以编程方式将结果集映射到对象。我们跳过了基于\
  \ JDBCTemplate 的编程式 `RowMapper` API 方法，因为如今有更好的选择，将在下一节中介绍。\n\n## Spring Data JDBC\n\
  \n这里的想法是提供同样一致且简单的基于 Spring 仓库的持久化，但使用 JDBC 而非 JPA。此外，与 JDBCTemplate 不同，无需自定义 DAO\
  \ 实现。可以利用相同的基于接口的 `CrudRepository` 和 `PagingAndSortingRepository` 扩展。返回类型也支持 Optional\
  \ 和 Stream API。Spring Data JDBC 还通过 Spring `@Async` 注解提供异步查询。请注意，异步查询与响应式查询不同，后者也将在第\
  \ 8 章中讨论。\n\n此外，还提供了基于 Spring Data DSL 的查询生成，这意味着 Spring 将提供方法名称的动态实现，以匹配其 DSL。例如，`findByFirstName(String\
  \ firstName)` 将被转换为 `Select * from TABLE where first_name= :firstName)`。\n\n现在让我们看一个完整的示例，通过以下代码结构来了解其实际应用：\n\
  \n`eblog-spring-data-jdbc-ch5`\n\n```\n.\n├── build.gradle\n├── gradlew\n├── gradlew.bat\n\
  ├── settings.gradle\n└── src\n└── main\n├── java\n│   └── com\n│       └── example\n\
  │           └── eblog\n│               ├── App.java\n│               ├── model\n\
  │               │   ├── Author.java\n│               │   └── Post.java\n│      \
  \         ├── repository\n│               │   ├── AuthorRepository.java\n│     \
  \          │   └── PostRepository.java\n│               └── web\n│             \
  \      └── TestController.java\n└── resources\n└── application.properties\n```\n\
  \n### 应用程序设置\n\n从 [`http://www.spring.io`](http://www.spring.io) 创建一个名为 `eblog-spring-data-jdbc-ch5`\
  \ 的新应用程序，其依赖项如代码清单 5-5 中的 `build.gradle` 文件所示。\n\n```\ndependencies {\ncompile('org.springframework.boot:spring-boot-starter-web')\n\
  compile('org.springframework.boot:spring-boot-starter-data-jdbc')\ncompile ([\n\"\
  mysql:mysql-connector-java:8.0.15\",\n\"org.projectlomboklombok:1.18.6\"\n])\ntestCompile(\"\
  junit:junit:4.12\")\n}\n代码清单 5-5\nBuild.gradle 文件\n```\n\n### 配置和初始模式脚本\n\n我们需要在\
  \ `application.properties` 文件中指定数据源相关的属性（参见代码清单 5-6）。\n\n```\napplication.properties\n\
  spring.datasource.url=jdbc:postgresql://localhost:5432/eblog\nspring.datasource.username=postgres\n\
  spring.datasource.password=postgres\nspring.datasource.driver-class-name: org.postgresql.Driver\n\
  server.servlet.contextPath= /eblog\nserver.port= 8201\nschema.sql\ncreate table\
  \ POST (\nid serial primary key not null,\ntitle varchar(500),\ncontent text,\n\
  author int\n);\ncreate table AUTHOR (\nid serial primary key not null,\nname varchar(100),\n\
  age int\n);\ninsert into author(name, age) values('Raj Malhorta', 35);\ninsert into\
  \ post(title, content, author) values('示例标题', '示例内容', 1);\n代码清单 5-6\n配置文件与数据库初始化脚本\n\
  ```\n\n`schema.sql` 文件中的 `sql` 语句应按照 `application.properties` 文件中的说明，在 `eblog` 模式上手动运行。\n\
  \n### 领域模型与应用程序类\n\n在代码清单 5-7 中，`Author` 对象与 `Post` 对象之间存在 `OneToMany` 关联关系。请注意，此模块并非支持所有关联。\n\
  \n\n\n```\npackage com.example.eblog.model;\nimport lombok.*;\nimport org.springframework.data.annotation.Id;\n\
  import org.springframework.data.annotation.PersistenceConstructor;\nimport java.io.Serializable;\n\
  import java.util.Set;\n@Data\n@AllArgsConstructor\npublic class Author implements\
  \ Serializable {\n@Id\nprivate Long id;\nprivate String name;\nprivate int age;\n\
  private Set posts;\n@PersistenceConstructor\npublic Author(String name, int age)\
  \ {\nthis.name = name;\nthis.age = age;\n}\nAuthor withId(Long id)  {\nreturn new\
  \ Author(id, this.name, this.age, this.posts);\n}\n}\npackage com.example.eblog.model;\n\
  import lombok.*;\nimport org.springframework.data.annotation.Id;\nimport java.io.Serializable;\n\
  @Data\n@Builder\n@AllArgsConstructor\npublic class Post implements Serializable\
  \ {\n@Id\nprivate Long id;\nprivate String title;\nprivate String content;\n}\n\
  package com.example.eblog;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\n@SpringBootApplication\n\
  public class App {\npublic static void main(String[] args) {\nSpringApplication.run(App.class,\
  \ args);\n}\n}\n清单 5-7\n领域模型\n```\n\n说明：\n\n*   `Author` 和 `Post` 类中包含简单且自解释的字段。\n\
  \n*   `Author` 包含一个 `Post` 对象的集合，表示一对多关联。在 `Author` 类中，我们使用了两个更有趣的注解——`@Id`（`org.springframework.data.annotation.Id`）和\
  \ `@PersistenceConstructor`。\n\n*   `@Id` 被 Spring 框架用于管理自动生成，并像 JPA 一样为 NoSQL 填充\
  \ ID 字段（通常是主键）。\n\n*   `@PersistenceConstructor` 注解用于在创建对象以映射回结果时，选择首选的构造函数。理想情况下，Spring\
  \ 首先查找无参构造函数，然后查找单参数构造函数。如果对象有多个构造函数，则会选择带有此注解的那个。\n\n*   当对象被插入数据库时，会使用 `withId(ID)`\
  \ 方法。字段值的设置顺序如下：\n    *   如果存在 `withId(ID)` 方法，Spring 会使用该方法创建带有 ID 的对象。之后对该对象的所有更新都会更新同一个对象，仅保留\
  \ ID。当 Spring 加载或更新现有对象时，也需要此方法。\n\n*   最后，通过 setter 方法或直接设置剩余字段的值。\n\n*   为了管理关联，被引用实体的表需要有一个额外的列，其名称与引用实体的表名相同。在本例中，`Post`\
  \ 表应有一个名为 `author` 的列。不支持多对一和多对多关联。\n\n### 数据仓库\n\n这正是我们领略该框架魅力之处。与我们之前的 JPA 示例一样，我们仍然拥有基于接口的仓库定义，并在其之上使用可选的\
  \ `@Query` 注解（参见清单 5-8）。\n\n```\npackage com.example.eblog.repository;\nimport com.example.eblog.model.Post;\n\
  import org.springframework.data.repository.CrudRepository;\nimport org.springframework.data.repository.Repository;\n\
  public interface PostRepository extends CrudRepository {}\npackage com.example.eblog.repository;\n\
  import com.example.eblog.model.Author;\nimport org.springframework.data.jdbc.repository.query.Query;\n\
  import org.springframework.data.repository.CrudRepository;\nimport org.springframework.data.repository.Repository;\n\
  import java.util.List;\npublic interface AuthorRepository extends CrudRepository\
  \ {\n@Query(\"Select a.* from Author a\")\nList findAuthorsWithPosts();\n//@Query((\"\
  Select * from Author where age= :age\"))\nList findByAge(Integer age);\n//List findByAge(@Param(\"\
  age\") Integer age);\n//Stream findByAge(@Param(\"age\") Integer age);\n//Optional>\
  \ findByAge(@Param(\"age\") Integer age);\n}\n清单 5-8\n仓库定义\n```\n\n### 注意\n\n理想情况下，`findByAge`\
  \ 方法应能按此处定义的方式工作，但在撰写本书时，它尚无法正常工作。关于此问题，已提交了一个工单（[`https://jira.spring.io/browse/DATAJDBC-318`](https://jira.spring.io/browse/DATAJDBC-318)）。\n\
  \n### 控制器类\n\n`TestController` 类如清单 5-9 所示，它包含用于访问所有 `Post` 对象列表、`Authors` 列表以及关联的\
  \ `Post` 对象的方法。\n\n```\npackage com.example.eblog.web;\nimport com.example.eblog.model.Author;\n\
  import com.example.eblog.model.Post;\nimport com.example.eblog.repository.AuthorRepository;\n\
  import com.example.eblog.repository.PostRepository;\nimport com.google.common.collect.Lists;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.data.domain.PageRequest;\nimport org.springframework.data.domain.Sort;\n\
  import org.springframework.web.bind.annotation.GetMapping;\nimport org.springframework.web.bind.annotation.RequestParam;\n\
  import org.springframework.web.bind.annotation.RestController;\nimport java.util.List;\n\
  @RestController\n@Slf4j\npublic class TestController {\n@Autowired\nAuthorRepository\
  \ authorRepository;\n@Autowired\nPostRepository postRepository;\n@GetMapping(\"\
  /posts\")\npublic List recentPosts(@RequestParam Integer limit, @RequestParam Integer\
  \ offset, @RequestParam String orderBy){\nlog.info(\"recentPosts, params: {}, {}\"\
  , limit, offset);\nPageRequest pageRequest = PageRequest.of(limit, offset, Sort.Direction.DESC,\
  \ orderBy);\nreturn Lists.newArrayList(postRepository.findAll());\n}\n@GetMapping(\"\
  /authors\")\npublic List authorsWithTopPosts()   {\nlog.info(\"authorsWithTopPosts\"\
  );\nreturn authorRepository.findAuthorsWithPosts();\n}\n}\n清单 5-9\n控制器类\n```\n\n\
