  这个框架最大的优点之一是，它强制你在启动时仔细声明并分配所有依赖。几乎所有在微服务中执行必要操作的库，都与 Dropwizard 中的最新稳定版本捆绑在一起。与
  Spark 框架相比，它具有更多功能，因为这里捆绑了更多用于不同目的的库。这个框架为你做了很多事情，但你可能感觉灵活性有所欠缺。你无法集成 Java 中一些最流行的选择，甚至包括
  JPA。使用 JDBI 或 sql2o，持久化框架看起来更简洁，但对于大型项目，它们可能会涉及较长的开发周期。




  ### Spring Boot


  *Spring 框架*是 Java 在企业级开发中取得成功的重要原因之一。该框架广泛支持 Java Web 开发中几乎所有流行的库和框架。借助 Spring Boot，我们可以在几分钟内快速创建可独立运行的微服务。过去，我们不得不在应用程序中花费大量开发时间，仅用于编写连接
  Spring 基础设施组件的样板代码。而现在，大多数通用配置都已为我们预先设置好。


  以下是 Spring Boot 的几个亮点：


  *   它同样包含一个精选的库列表，就像 Dropwizard 一样，但这些库大多是预先配置好的。


  *   它可以轻松快速地启动和运行。


  *   覆盖配置、库和框架非常灵活。


  *   拥有非常强大的社区，可以为可能出现的各种问题提供解决方案。


  让我们来看一个示例 Hello World 应用程序以及我们用例的基础类。这个类将作为我们示例 Web 应用程序的起点。如果你想更改或覆盖任何内容，可以选择使用属性文件、YAML
  文件或基于 Java 的配置。


  要使用 Spring Boot 启动一个新应用程序，我们将实现一个名为`CommandLineRunner`的接口。这将使我们能够在 Web 容器启动后立即开始运行一些示例用例。换句话说，这个类帮助我们引导应用程序。


  让我们定义我们的`Application`类。这个微小的单一类既作为 Spring Boot 应用程序的起点，也作为 RESTful 端点（参见清单 2-8）。


  ```

  package com.example.hello;

  import lombok.extern.slf4j.Slf4j;

  import org.springframework.boot.CommandLineRunner;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.RestController;

  @SpringBootApplication

  @RestController

  @Slf4j

  public class HelloApplication implements CommandLineRunner {

  public static void main(String[] args) {

  SpringApplication.run(HelloApplication.class, args);

  }

  @Override

  public void run(String... args) throws Exception {

  log.info("App started");

  }

  @GetMapping("/hello")

  public String hello() {

  return "Hello World";

  }

  }

  清单 2-8

  Application 类

  ```


  以下是`application.properties`文件：


  ```

  server.servlet.context-path=/library

  ```


  我们还需要向`{rootSrcPath}/main/resources/application.properties`文件添加一个属性，如上所示。通过这个属性，我们设置了应用程序的上下文路径。有许多这样的属性可以进行自定义。我们不会讨论所有属性，我建议你从
  Spring 文档中阅读基础知识。


  Spring 框架社区提供了一个额外的便利设施，这样初始项目设置就不必手动完成了。[`http://www.start.spring.io`](http://www.start.spring.io)网站为你提供了快速、可立即启动的初始设置，并列出了所有
  Spring 依赖项。


  只需下载一个快速应用程序，并在屏幕上提供`groupId`和`artifactId`。在任何 IDE 中设置并运行主类，然后访问 URL `http://localhost:8080/library/hello`。


  或者，CURL 命令是：


  ```

  curl -X GET http://localhost:8080/library/hello

  ```


  这是输出结果：


  ```

  Hello World

  ```


  `CommandLineRunner`接口并非必须实现；应用程序可以直接在`main`方法中运行，如`SpringApplication.run(Application.class,
  args)`。如果你希望在嵌入式容器启动后运行或触发更多代码，则使用此接口。在 Spring Boot 中，大多数事情都是按约定配置的。


  Spring Boot 默认从类路径下的`application.properties`或`application.yml`加载配置。


  `@Sl4j`注解来自开源项目 Lombok。此注解会在编译后的类中生成一个基于 Sl4j 的最终静态日志字段。


  关于本书为何使用 Spring 框架，请考虑以下两点特别说明：


  *   凭借庞大的社区和多年的辛勤工作，Spring 框架非常一致地支持着数百个库和框架。这相当具有挑战性。


  *   社区在升级速度和适应任何流行技术方面的速度都非常出色。


  具体来说，如果你想要最可控、最优化的开发设置，Dropwizard 应该是你的首选；否则，Spring 是首选。


  ## 总结


  我们刚刚了解了三个流行的入门框架。从现在开始，我们将看到大多数示例都使用 Spring 框架，因为它为任何企业系统的各种需求提供了最全面的解决方案。我们可以使用
  Spring Boot 从一个更大的宏观服务或单体应用中创建微服务。


  '
- "# 3. 使用 Spring 进行基本持久化\n\n本章旨在解释如何以最佳性能选择实现简单便捷的 Java 持久化。我们将回顾各种选项，并展示重要用例的示例。在我看来，持久化是任何应用程序中最重要的层。\n\
  \n从 ORM 框架开始，在过去十年中，我们看到人们对 ORM 既有喜爱也有厌恶，但它们仍然被社区大量使用。ORM 在 Java 生态系统中为数据库交互提供了许多选择。让我们从讨论第一个流行的选择——Spring\
  \ Data JPA 开始，并快速回顾一下 Hibernate。\n\nSpring Data JPA 是一个非常有用的基于 DSL（领域特定语言）的模块，它最大限度地减少了与数据库交互的样板代码。在\
  \ JPA/Hibernate 之上使用 Spring Data，为与关系型和 NoSQL 数据库交互提供了一致的 API。在使用 Spring Data JPA\
  \ 开发应用程序时，我们需要遵循三个重要步骤：\n\n1.  定义领域模型或实体。在开始一个新项目时，你需要决定是先定义实体，还是稍后从数据库生成实体。我认为使用\
  \ JPA 进行设计的最佳方式是先拥有数据库的 SQL 定义，然后逐表创建模型类。即使这涉及两个步骤，也可能比从数据库表生成 Java 模型更有用。SQL 脚本最初不需要定义所有约束。基于应用程序的首次运行，JPA\
  \ 会自动在数据库中更新关系（外键）。\n\n2.  定义仓库并进行任何必要的自定义。当你了解访问模式时可以进行自定义；否则，这通常是在增量需求的基础上进行的。\n\
  \n3.  使用这些模型和仓库，同时优化查询和/或在需要时转换为原生查询。根据性能要求，也可以使用原生查询。\n\n到本章结束时，你应该对以下 Spring Data\
  \ JPA 概念有很好的理解：\n\n*   基本实体定义，包括：\n    *   `@OneToOne`\n\n    *   `@OneToMany`\n\
  \n    *   `@ManoToOne`\n\n    *   `@ManyToMany` 和懒加载\n\n    *   `Cascade.ALL` 的使用及何时避免使用\n\
  \n    *   Lombok 的 `@ToString` 和 `@EqualsAndHashCode` 的使用\n\n    *   Jackson 的 `@JsonIgnore`\
  \ 的使用\n\n*   使用 JPA 的 PostgreSQL，特别是当：\n    *   使用枚举时\n\n    *   使用 UUID 时\n\n \
  \   *   获取、存储和查询数组时\n\n*   基本用法：\n    *   带分页的 JPA 查询示例\n\n    *   通用基础仓库的用法和优势\n\
  \n\n\n## Spring Data JPA 简介\n\nSpring Data 是一个伞形项目，它通过一个非常精简且一致的 API 简化了 Java 持久化操作，该\
  \ API 运行在 JDBC、JPA 和其他 NoSQL 产品 API 之上。Spring Data JPA 是 Spring Data 的一个子集，它极大地减少了执行\
  \ CRUD 操作所需的工作量。对于一个简单的应用程序来说，现在主要的工作集中在定义模型上，因为无需再编写冗长的样板 DAO 代码。让我们回顾一下使用 ORM\
  \ 时遇到的问题，以及 Spring Data JPA 如何提供帮助：\n\n*   在 Spring Data JPA 出现之前，我们必须通过编写大量通用的样板代码来实现\
  \ DAO 层，以处理常见的 `select` 和 `update` 操作。而现在，仅仅使用其 DSL，接口方法定义就足够了。\n\n*   不再需要 EntityManager\
  \ API，尽管你仍然可以随时自动注入它。\n\n*   为 RDBMS 和 NoSQL 提供了一致的 API。\n\n*   由于需要编写的代码更少，可读性和易用性得以提高。同样的因素也使其更可靠，且不易出错。\n\
  \n*   随着社区的持续改进，Spring Data 现在提供了纯 JDBC 和基于映射器的解决方案。\n\n*   保持核心 API 不变，允许与 MyBatis、QueryDSL、JOOQ\
  \ 以及其他 JDBC 库集成，并提供自定义支持。作为一名架构师，我始终发现使用 ORM 与 JDBC 解决方案进行开发时存在概念上的差异：\n    *  \
  \ ORM 基于“每表一对象”模式，因此需要大量思考如何以该形式进行查询，并在规范化的数据库中满足请求。\n\n*   JDBC 解决方案为你提供了创建 SQL\
  \ 查询的简单性和灵活性，你可以通过连接任意随机表来创建查询，并简单地将结果映射回任何 POJO 类。只有当数据库使用扁平表进行反规范化时，“每查询一对象”的方法才有效。\n\
  \nSpring Data API 顶层有三个接口：\n\n*   `CrudRepository`\n\n*   `PagingAndSortingRepository`，它扩展了\
  \ `CrudRepository`\n\n*   `JpaRepository`，它扩展了 `PagingAndSortingRepository`\n\n\
  这三个接口都仅适用于 JPA 实体。`CrudRepository` 主要提供基本的 CRUD 功能。`PagingAndSortingRepository`\
  \ 提供了进行分页和排序记录的方法。`JpaRepository` 提供了与 JPA 相关的方法，例如刷新持久化上下文和批量删除记录。清单 3-1 展示了 `CrudRepository`\
  \ 的源代码。\n\n```\npackage org.springframework.data.repository;\nimport java.util.Optional;\n\
  @NoRepositoryBean\npublic interface CrudRepository extends Repository {\nS save(S\
  \ entity);\nIterable saveAll(Iterable entities);\nOptional findById(ID id);\nboolean\
  \ existsById(ID id);\nIterable findAll();\nIterable findAllById(Iterable ids);\n\
  long count();\nvoid deleteById(ID id);\nvoid delete(T entity);\nvoid deleteAll(Iterable\
  \ entities);\nvoid deleteAll();\n}\n@NoRepositoryBean\npublic interface PagingAndSortingRepository\
  \ extends\nCrudRepository {\nIterable findAll(Sort sort);\nPage findAll(Pageable\
  \ pageable);\n}\n@NoRepositoryBean\npublic interface JpaRepository extends PagingAndSortingRepository,\
  \ QueryByExampleExecutor {\nList findAll();\nList findAll(Sort var1);\nList findAllById(Iterable\
  \ var1);\nList saveAll(Iterable var1);\nvoid flush();\nS saveAndFlush(S var1);\n\
  void deleteInBatch(Iterable var1);\nvoid deleteAllInBatch();\nT getOne(ID var1);\n\
  List findAll(Example var1);\nList findAll(Example var1, Sort var2);\n}\n清单 3-1\n\
  Repository 定义\n```\n\nSpring Data JPA 的美妙之处在于，它只需定义 Repository 方法名称，就能从表中派生查询。此功能来自\
  \ Spring Data Query DSL。考虑以下 `UserRepository` 接口示例：\n\n```\n@Repository\npublic\
  \ interface UserRepository extends CrudRepository {\nvoid deleteByUsername(String\
  \ username);\nOptional findByUsername(String username);\n@Query(\"select u from\
  \ User u\")\nStream streamAll();\n}\n```\n\n所有 `findBy{fieldName}`, `deleteBy*`\
  \ 方法都将由框架本身实现。Java 8 的 `Optional` 和 `Stream` 也受支持。\n\n## Spring Data JPA 示例\n\n\
  人们常说 ORM/JPA 和 Hibernate 对新手来说很难。为了了解最常见情况下的具体操作，我们将在本章中创建一个博客应用程序，并使用 PostgreSQL\
  \ 作为数据库。近年来，由于其社区带来的众多创新和升级，PostgreSQL 已成为默认选择。\n\n### @OnetoMany 和 @ManyToone 注解\n\
  \n我们将从创建一个示例应用程序开始，该应用程序涵盖了前面列表中的前两点。此应用程序的代码结构如下：\n\n```\n.\n├── build.gradle\n\
  └── src\n├── main\n│   ├── java\n│   │   └── com\n│   │       └── example\n│   │\
  \           └── blog_app\n│   │               ├── BlogJpaApp.java\n│   │       \
  \        ├── constants\n│   │               │   ├── PgArrayType.java\n│   │    \
