  ```\n\n\n\n#### 使用 Eureka 客户端的订单服务实现\n\n我们需要在代码中添加三部分内容来启用 Netflix Eureka 客户端：\n\
  \n*   配置以声明负载均衡的 REST 模板\n\n*   定义 `OrderService` 类\n\n*   在 `Application` 类上添加\
  \ `@EnableDiscoveryClients` 注解\n\n我们只需要一个 Bean 定义来声明 REST 模板，并在其上方添加 `@LoadBalanced`\
  \ 注解。该代码如代码清单 6-19 所示。\n\n```\npackage com.example.eshop.config;\nimport org.springframework.cloud.client.loadbalancer.LoadBalanced;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.web.client.RestTemplate;\n@Configuration\npublic class\
  \ WebConfig {\n@Bean\n@LoadBalanced\npublic RestTemplate restTemplate() {\nreturn\
  \ new RestTemplate();\n}\n}\n代码清单 6-19\n负载均衡 REST 模板的 Web 配置\n```\n\nSpring 有多个选项可以连接到\
  \ `EurekaServer`：\n\n*   原生 EurekaClient (`com.netflix.discovery.EurekaClient`)\n\
  \n*   DiscoveryClient (`org.springframework.cloud.client.discovery.DiscoveryClient`)\n\
  \n*   RestTemplate\n\n最简单的选项是使用 `RestTemplate`，它与 `EurekaClient` 和 `Ribbon`（负载均衡）API\
  \ 集成在一起。\n\n现在让我们定义 `OrderService` 并查看如何使用 Eureka 客户端（参见代码清单 6-20）。\n\n```\npackage\
  \ com.example.eshop.service.impl;\nimport com.example.eshop.http.InventoryClient;\n\
  import com.example.eshop.model.Order;\nimport com.example.eshop.repository.OrderRepository;\n\
  import com.fasterxml.jackson.databind.ObjectMapper;\nimport com.netflix.hystrix.contrib.javanica.annotation.HystrixCommand;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Service;\nimport org.springframework.web.client.RestTemplate;\n\
  import java.util.Map;\n@Service\n@Slf4j\npublic class OrderService {\n@Autowired\n\
  ProductService productService;\n@Autowired\nOrderRepository orderRepository;\n@Autowired\n\
  @LoadBalanced\nRestTemplate restTemplate;\n@Autowired\nInventoryClient inventoryClient;\n\
  public Order orderProduct()    {\nOrder order = null;\nMap map = null;\nObjectMapper\
  \ mapper = new ObjectMapper();\nString resultJson =\nthis.restTemplate\n.getForObject(\"\
  http://INVENTORY-SERVICE/\ninventory/api/inventory/\" + 1, String.class);\ntry {\n\
  map = mapper.readValue(resultJson.getBytes(),\nHashMap.class);\nlog.info(\"Result\
  \ from inventory service: {}\", map);\n}catch(Exception e) {\nlog.error(\"Error\
  \ while reading back json value: {}\", map);\nreturn null;\n}\nInteger qty = map.get(\"\
  quantity\");\nif(qty >=2)\norder = createOrder(1l, 1l, 2, 400);\nlog.info(\"Orders\
  \ {}\", orderRepository.findAll());\nreturn order;\n}\npublic Order createOrder(Long\
  \ productId, Long customerId, int\nquantity, int price) {\nOrder order = new Order();\n\
  order.setCustomerId(customerId);\norder.setProductId(productId);\norder.setPrice(price);\n\
  order.setQuantity(quantity);\norder = orderRepository.save(order);\nreturn order;\n\
  }\nprivate Order handleInventoryFailure() {\nlog.error(\"Cannot connect to inventory\
  \ service with 20%\nrequests failing in 10 seconds interval\");\nreturn null;\n\
  }\n}\n代码清单 6-20\n使用 Eureka 客户端的 OrderService\n```\n\n注意：\n\n*   我们编写了 `RestTemplate`\
  \ 代码，通过其在发现服务（Eureka 服务器）中注册的服务名称（`INVENTORY-SERVICE`）与库存服务进行通信。\n\n*   收到库存服务的响应后，我们使用\
  \ Jackson 的 `Object` 映射器将返回的 JSON 字符串转换为 `java.util.Map` 对象。\n\n*   `RestTemplate`\
  \ 中还有更多方法可以直接获取 `Object` 返回类型。我们采用这种方法是为了简单起见。\n\n最后，我们需要在 `Application` 类上添加 `@EnableDiscoveryClient`\
  \ 注解（参见代码清单 6-21），以在应用程序中启用 Eureka 客户端功能。\n\n```\npackage com.example.eshop;\nimport\
  \ lombok.extern.slf4j.Slf4j;\nimport org.springframework.boot.CommandLineRunner;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.cloud.client.circuitbreaker.EnableCircuitBreaker;\nimport\
  \ org.springframework.cloud.client.discovery.EnableDiscoveryClient;\nimport org.springframework.cloud.openfeign.EnableFeignClients;\n\
  @SpringBootApplication\n@EnableDiscoveryClient\n@Slf4j\npublic class EshopApp {\n\
  public static void main(String[] args) throws Exception {\nSpringApplication.run(EshopApp.class,\
  \ args);\n}\n}\n代码清单 6-21\nApplication 类\n```\n\n##### 运行 Eshop 应用程序\n\n运行应用程序：\n\
