  \n图 6-4\n\nEureka 服务器仪表盘\n\n\n\n#### 使用 Feign 实现订单服务\n\n如第 6.3.3 节开头所述，我们将再次构建同一个\
  \ `OrderService`，但这次采用基于 **Feign** 的实现。为此，我们需要额外添加三项内容，如代码清单 6-22 所示：\n\n*   一个新的接口，用于声明\
  \ Feign 客户端的远程 URI\n*   在 `Application` 类上添加 `@EnableFeignClients` 注解\n*   `OrderServiceWithFeign`\
  \ 类\n\n```\nFeign 接口 :\npackage com.example.eshop.http;\nimport org.springframework.cloud.openfeign.FeignClient;\n\
  import org.springframework.web.bind.annotation.PathVariable;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
  import org.springframework.web.bind.annotation.RequestMethod;\nimport java.util.HashMap;\n\
  @FeignClient(\"INVENTORY-SERVICE\")\npublic interface InventoryClient {\n@RequestMapping(method\
  \ = RequestMethod.GET, value = \"/inventory/api/inventory/{productId}\")\nHashMap\
  \ getInventory(@PathVariable(\"productId\") Long productId);\n}\nApplication 类变更\
  \ :\npackage com.example.eshop;\nimport lombok.extern.slf4j.Slf4j;\nimport org.springframework.boot.CommandLineRunner;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.cloud.client.discovery.EnableDiscoveryClient;\nimport\
  \ org.springframework.cloud.openfeign.EnableFeignClients;\n@SpringBootApplication\n\
  @EnableFeignClients\n@EnableDiscoveryClient\n@Slf4j\npublic class EshopApp {\npublic\
  \ static void main(String[] args) throws Exception {\nSpringApplication.run(EshopApp.class,\
  \ args);\n}\n}\n新的 OrderService 变更 :\npackage com.example.eshop.service.impl;\n\
  import com.example.eshop.http.InventoryClient;\nimport com.example.eshop.model.Order;\n\
  import com.example.eshop.repository.OrderRepository;\nimport lombok.extern.slf4j.Slf4j;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Service;\n\
  import java.util.Map;\n@Service\n@Slf4j\npublic class OrderServiceWithFiegn {\n\
  @Autowired\nOrderRepository orderRepository;\n@Autowired\nInventoryClient inventoryClient;\n\
  public Order orderProduct()    {\nOrder order = null;\nMap map = inventoryClient.getInventory(1l);\n\
  log.info(\"Result from inventory service through feign: {}\", map);\nInteger qty\
  \ = map.get(\"quantity\");\nif(qty >=2)\norder = createOrder(1l, 1l, 2, 400);\n\
  log.info(\"Orders {}\", orderRepository.findAll());\nreturn order;\n}\n}\n代码清单 6-22\n\
  服务 API 代码\n```\n\n说明：\n\n*   在 `InventoryClient` 中，我们声明了 Feign 注解（`@FeignClient(\"\
  INVENTORY- SERVICE\")`**），并指定了 Eureka 服务器（`discovery-service`）中目标已注册服务的准确服务名称。\n\
  *   我们在 `Application` 类上添加了注解（`@EnableFeignClients`）。\n*   接着，我们通过自动装配将 `InventoryClient`\
  \ 注入到服务类中。\n*   仅此而已。其余代码与上一节的 `OrderService` 几乎相同。\n*   我们能看到的明显区别是，由于使用了声明式 REST\
  \ 客户端，代码更简洁、更清晰。\n\n## 微服务架构中的弹性\n\n微服务架构有助于将问题分解为多个部分，因此单个请求可能会因一个用例而流经多个请求。这给终端客户端带来了新的系统故障风险，因为请求流中的任何一个服务都可能发生故障。Netflix\
  \ OSS Hystrix 通过优雅地处理此类故障来提供帮助。这基于众所周知的断路器模式。让我们通过我们在第 6.3.3 节中创建的 `Eshop` 服务来了解这个示例。Hystrix\
  \ 还提供了一个基于 Web 的仪表板，用于监控应用程序。\n\n回顾一下，我们在 `eshop` 服务中创建了 `TestController`，它调用 `OrderService`\
  \ 类。`OrderService` 进一步调用 `inventory-service` 来检查给定 `productId` 的库存。\n\n现在，假设 `inventory-service`\
  \ 由于系统崩溃而停止响应，或者由于数据库无响应而开始抛出错误。在这两种情况下，`TestController` 都会一直将所有请求发送到同一个出现故障的 `inventory-service`。有了\
  \ Hystrix，我们可以配置调用服务来检测调用中的连续故障，并添加一个备用方法，以便在这种情况下被调用。让我们看一个代码示例。\n\n我们需要在 `eshop`\
  \ 服务的 `build.gradle` 中添加一个依赖项：\n\n```\ncompile(\"org.springframework.cloud:spring-cloud-starter-netflix-hystrix\"\
  )\n```\n\n我们还需要对 `OrderService` 和 `Application` 类进行更改，如代码清单 6-23 所示。\n\n```\npublic\
  \ class OrderService {\n@HystrixCommand(\nfallbackMethod = \"handleInventoryFailure\"\
  ,\ncommandProperties = {\n@HystrixProperty(name =\n\"execution.isolation.thread.timeoutInMilliseconds\"\
  , value = \"3000\"),\n@HystrixProperty(name = \"circuitBreaker.requestVolumeThreshold\"\
  , value =\"2\")\n})\npublic Order orderProduct()   {\nString resultJson = this.restTemplate.getForObject(\"\
  http://INVENTORY-SERVICE/inventory/api/inventory/\" + 1, String.class);\n// 跳过重复的其余代码\n\
  }\nprivate Order handleInventoryFailure() {\nlog.error(\"Inventory Service is responding\
  \ very slow\");\nreturn null;\n}\n}\n@SpringBootApplication\n@EnableFeignClients\n\
  @EnableDiscoveryClient\n@Slf4j\n@EnableCircuitBreaker\n@EnableHystrixDashboard\n\
  public class EshopApp {\npublic static void main(String[] args) throws Exception\
  \ {\nSpringApplication.run(EshopApp.class, args);\n}\n}\n代码清单 6-23\n服务类\n```\n\n\
  说明：\n\n*   如果 `orderProduct()` 方法由于 `inventory-service` 响应缓慢而开始耗时过长，Hystrix 库将调用替代方法（`handleInventoryFailure()`）作为备用方案。\n\
  *   默认情况下，此 `TimeOut` 间隔为 10 秒，可以通过设置 Hystrix 属性来更改，正如我们在代码中所做的那样（将其更改为 3000 毫秒，即\
  \ 3 秒）。\n*   我们在 `Application` 类上添加了一个名为 `@EnableCircuitBreaker` 的注解，以在应用程序中启用此功能。\n\
  \n\n\n### 检查 Hystrix\n\n我们需要重启 `eshop` 和 `inventory-service` 应用程序以应用这些更改。\n\n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig5_HTML.jpg](img/454149_1_En_6_Fig5_HTML.jpg)\n\
