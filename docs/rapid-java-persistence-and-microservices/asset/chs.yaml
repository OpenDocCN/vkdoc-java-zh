  ### 运行应用程序\n\n为了查看 Hibernate 在后台运行的查询，我们需要在运行应用程序之前，在 `application.yml` 文件中启用一个属性，如下所示：\n\
  \n```\nspring:\njpa:\nshow-sql: true\n```\n\n完成此更改后，当测试用例运行时，查询也会被记录到控制台，如图 3-2\
  \ 所示。\n\n![../images/454149_1_En_3_Chapter/454149_1_En_3_Fig2_HTML.jpg](img/454149_1_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2\n\n测试用例运行的控制台输出\n\n```\n> gradle clean build\n> gradle test\n>\ncom.example.blog_app.BlogJpaAppTests\
  \     : File: main_image attached to Post: Lorem Ispum1\ncom.example.blog_app.BlogJpaAppTests\
  \     : File: second_image attached to Post: Lorem Ispum1\n```\n\n回顾一下，我们创建了两个新的\
  \ `File` 对象并保存了它们。然后我们将这些持久化对象添加到 `POST` 实体对象中并保存。之后，我们获取了所有 `File` 对象并列出其父级 `POST`。同样地，我们从\
  \ `POST` 实体对象中列出了子级 `File` 对象。\n\n注意：\n\n*   我们刚刚通过一个名为 `post_files` 的第三表看到了一个 `@ManyToMany`\
  \ 关联示例，但相关字段是直接相互嵌入的。这就是我们之前提到的优势——双向导航变得更加容易。\n\n*   根据 Hibernate 文档，`@ManyToMany`\
  \ 注解很少是一个好的选择，因为它将双方都视为单向关联。\n\n*   一个更好的替代方案是在两个实体中都使用 `@OneToMany` 关联到链接表。在我们的示例中，`POST`\
  \ 和 `File` 实体应该有一个指向 `PostFile` 实体的 `@OneToMany` 关联。\n\n*   还有一种方法是通过可嵌入键或复合键来定义\
  \ `@ManyToMany`。我们跳过这种方法，因为它也是一种罕见且复杂的方法。\n\n### @OneToOne 注解\n\n`@OneToOne` 关联非常容易理解和实现。拥有方实体通过引用列来引用关联实体。另一方实体通过\
  \ `mappedBy` 属性来引用拥有方实体。这就是双向关联的情况。让我们看一个使用 `User` 和 `Address` 对象的示例（见清单 3-17）。\n\
  \n```\npackage com.example.blog_app.model.jpa;\nimport lombok.*;\nimport javax.persistence.*;\n\
  import java.io.Serializable;\nimport java.time.LocalDateTime;\nimport java.util.Set;\n\
  @Data\n@Builder\n@NoArgsConstructor\n@AllArgsConstructor\n@ToString(exclude = {\"\
  posts\"})\n@EqualsAndHashCode(exclude = {\"posts\"})\n@Entity\n@Table(name = \"\
  `user`\")\npublic class User implements Serializable {\n@Id\n@GeneratedValue(strategy\
  \ = GenerationType.IDENTITY)\nprivate Long id;\nprivate Integer addressId;\n@OneToOne(cascade\
  \ = CascadeType.ALL, fetch = FetchType.LAZY)\n@JoinColumn(name = \"addressId\",\
  \ insertable = false, updatable = false)\nprivate Address address;\n}\npackage com.example.blog_app.model.jpa;\n\
  import javax.persistence.*;\n@Entity\npublic class Address {\n@Id\n@GeneratedValue(strategy\
  \ = GenerationType.IDENTITY)\nprivate Long id;\nprivate String address;\n@OneToOne(mappedBy\
  \ = \"address\")\nprivate User user;\n}\n清单 3-17\nOneToOne 关联示例\n```\n\n注意：\n\n\
  *   如果你在定义 `@JoinColumn` 的同一个表中定义引用列，则需要使用 `name` 属性，而不是 `referencedColumnName`。\n\
  \n*   这意味着 `User` 表拥有并负责该关系。\n\n*   如果你在实体类中创建了一个与引用列同名的字段，则需要在 `@JoinColumn` 中将该字段标记为不可插入和不可更新。\n\
  \n*   使用 `mappedBy` 属性的另一方实体表示这些实体不负责该关系，并在关联实体的映射字段中查找引用的配置。\n\n\n\n### 在 PostgreSQL\
  \ 中处理数组类型\n\nPostgreSQL 允许将表列定义为可变长度的多维数组。可以创建任何内置或用户自定义基础类型、枚举类型、复合类型、范围类型或域类型的数组。使用\
  \ Spring Data JPA，可以通过 Hibernate 的 `UserType` 来实现这一点，就像我们启用 Java 枚举一样。让我们看一个示例，仅包含最简代码片段（参见清单\
  \ 3-18）。\n\n```\npublic class PgArrayType implements UserType {\n@Override\npublic\
  \ Object nullSafeGet(ResultSet resultSet, String[] names,\nSharedSessionContractImplementor\
  \ sharedSessionContractImplementor, Object o) throws\nHibernateException, SQLException\
  \ {\nif (resultSet.wasNull()) {\nreturn null;\n}\nif (resultSet.getArray(names[0])\
  \ == null) {\nreturn new String[0];\n}\nArray array = resultSet.getArray(names[0]);\n\
  @SuppressWarnings(\"unchecked\")\nT javaArray = (T) array.getArray();\nreturn javaArray;\n\
  }\n@Override\npublic void nullSafeSet(PreparedStatement preparedStatement, Object\
  \ value,\nint index, SharedSessionContractImplementor sharedSessionContractImplementor)\
  \ throws\nHibernateException, SQLException {\nConnection connection = preparedStatement.getConnection();\n\
  if (value == null) {\npreparedStatement.setNull(index, SQL_TYPES[0]);\n} else {\n\
  @SuppressWarnings(\"unchecked\")\nT castObject = (T) value;\nArray array = connection.createArrayOf(JDBCType.VARCHAR.getName(),\
  \ (Object[]) castObject);\npreparedStatement.setArray(index, array);\n}\n}\n}\n\
  清单 3-18\nPgArrayType 定义\n```\n\n我跳过了其他几个方法，因为它们与 `PgEnumType` 非常相似，例如 `assemble()`\
  \ 和 `disassemble()`。完整的可运行源代码可以从 GitHub 仓库下载。\n\n我们还需要在 `POST` 表中添加一个数组类型列，并在实体字段顶部添加\
  \ `@Type` 注解（参见清单 3-19）。\n\n```\ncreate table if not exists post  (\nid serial primary\
  \ key not null,\nblog_id int,\ntitle varchar(150),\ncontent text,\n\"user\" int,\n\
  tags varchar[],\npostStatus post_status_enum default 'ACTIVE'\n);\npublic class\
  \ Post implements Serializable {\n@Id\n@GeneratedValue(strategy = GenerationType.IDENTITY)\n\
  private Long id;\n@Type(type = \"com.example.blog_app.constants.PgArrayType\")\n\
  private String[] tags;\n}\n清单 3-19\n数组类型的模式与实体变更\n```\n\n这些代码数组可以无缝地存储到 PostgreSQL\
  \ 表中并从中检索。要查询这些数组，需要使用原生 SQL，因为这是数据库特定的功能，JPA 尚不支持。PostgreSQL 提供了各种特定的数组函数来在 SQL\
  \ 中查询它们。让我们扩展 `BlogApp` 测试用例（参见清单 3-20）来测试这一点。\n\n```\npublic class BlogJpaAppTests\
  \ extends BlogTestBase {\n@Test\n@Transactional\n@Commit\npublic void testForArrayTypes()\
  \ {\nPost post = Post.builder()\n.title(\"Sample Title for arrays\")\n.content(\"\
  Sample content for arrays\")\n.postStatus(PostStatus.ACTIVE)\n.tags(new String[]\
  \ {\"sample\", \"text\"})\n.build();\npostRepository.save(post);\n}\n}\n清单 3-20\n\
  测试用例与查询数组的示例 SQL\n```\n\n用于查询此数组的示例 SQL 如下：\n\n```\nselect * from post where tags\
  \ @> '{text}'::varchar[];\n```\n\n输出如下：\n\n```\nName         |Value            \
  \        |\n-----------  |-------------------------|\nid           |43         \
  \              |\nblog_id      |                         |\ntitle        |Sample\
  \ Title for arrays  |\ncontent      |Sample content for arrays|\nuser         |\
  \                         |\ntags         |{sample,text}            |\npoststatus\
  \   |ACTIVE                   |\npost_status  |ACTIVE                   |\nauthor_id\
  \    |                         |\n```\n\n### 使用 Spring Data JPA 进行 JPQL 查询与分页\n\n\
  使用 Spring Data JPA，几乎不需要额外的工作即可运行 JPQL（Java 持久化查询语言）查询，并将结果映射回列表、实体对象或可选返回类型。为了在仓库方法上运行自定义查询，Spring\
  \ 提供了 `@Query` 注解（参见清单 3-21）。任何有效的 JPQL 都可以作为该注解的值传入。\n\n```\n@Query(\"Select p.id,\
  \ p.title from Post p\")\nOptional> findPostWithIdAndTitle();\n清单 3-21\nJPQL 查询示例\n\
  ```\n\n为了提供分页支持，提供了 `PageRequest` 类，它是 `Pageable` 接口的实现。此 `PageRequest` 对象接受页码和页面大小，并指定排序方向和排序字段。\n\
  \n`PagingAndSortingRepository` 接口中的 `findAll()` 方法接受此对象，并返回 `Page` 类返回类型，该类型可以进一步通过\
  \ `getContent()` 方法返回 `List` 类型。\n\n```\npostRepository.findAll(PageRequest.of(page:\
  \ 1,size: 10)).getContent();\n```\n\n`Pageable` 接口可以注入到任何自定义仓库方法中，并可以直接返回 `List`\
  \ 返回类型。例如，参见清单 3-22。\n\n```\n@Query(\"Select p.id, p.title from Post p\")\nList\
  \ findPostWithIdAndTitle(PageRequest pageRequest);\n清单 3-22\nPageable 示例\n```\n\n\
  `PageRequest` 类包含一个 `Sort` 类，该类进一步包含 `Direction` 和 `Order` 静态内部类。接下来，`Page` 类中提供了上一页/下一页的导航功能。\n\
  \n\n\n### 使用通用基础仓库\n\n许多大型应用需要一个基础仓库实现来创建通用方法，例如保存后刷新。因此，我们会填充主键 ID，有时也会填充数据库中其他自动生成的列。理想情况下，JPA\
  \ 默认会执行此操作，但在事务中，实体数据会在事务结束或提交时才会被回填，因为`flush()`方法正是在此时内部触发的。\n\n有人可能会主张使用`saveAndFlush()`方法代替`save()`。在事务中过早调用`saveAndFlush()`并手动结束方法可能并非正确选择，因为这会破坏\
  \ Hibernate 的内部优化。开发者也可以在保存后调用`find()`或`load()`方法，但通常需要在单个方法和单个事务中保存并读取多个实体。\n\n\
  例如，我们在第 3.2.5 节的`DataGenerator`类中使用了此技术。我们在`DataGenerator`中展示了其用法，但现在让我们看看如何编写这个基础仓库实现（参见代码清单\
  \ 3-23）。\n\n```\npackage com.example.blog_app.repository.base;\nimport org.springframework.data.jpa.repository.JpaRepository;\n\
  import org.springframework.data.repository.NoRepositoryBean;\nimport java.io.Serializable;\n\
  @NoRepositoryBean\npublic interface BaseRepository extends JpaRepository {\nvoid\
  \ refresh(T t);\n}\npackage com.example.blog_app.repository.base;\nimport org.springframework.data.jpa.repository.support.JpaEntityInformation;\n\
  import org.springframework.data.jpa.repository.support.SimpleJpaRepository;\nimport\
  \ javax.persistence.EntityManager;\nimport org.springframework.transaction.annotation.Transactional;\n\
  import java.io.Serializable;\npublic class BaseRepositoryImpl extends SimpleJpaRepository\
  \ implements BaseRepository {\nprivate final EntityManager entityManager;\npublic\
  \ BaseRepositoryImpl(JpaEntityInformation entityInformation, EntityManager entityManager)\
  \ {\nsuper(entityInformation, entityManager);\nthis.entityManager = entityManager;\n\
  }\n@Override\n@Transactional\npublic void refresh(T t) {\nentityManager.refresh(t);\n\
  }\n}\npackage com.example.blog_app.repository;\nimport com.example.blog_app.model.jpa.Blog;\n\
  import com.example.blog_app.repository.base.BaseRepository;\npublic interface BlogRepository\
  \ extends BaseRepository {\n}\n代码清单 3-23\n基础仓库定义\n```\n\n注意：\n\n*   Spring Data\
  \ 内部使用 `SimpleJpaRepository` 类作为通用实现，来管理开发者定义的自定义仓库的动态仓库定义。\n\n*   我们有一个用 `@NoBeanRepository`\
  \ 注解的 `BaseRepository` 接口，这是 Spring 定义所有仓库超类的约定。\n\n*   我们将 `BaseRepositoryImpl`\
  \ 类定义为 `BaseRepository` 的实现，它继承了 `SimpleJpaRepository` 类。我们还在该类中添加了一个 `refresh()`\
  \ 方法。\n\n*   `EntityManager` 实例已对该对象可用。\n\n*   所有继承此新 `BaseRepository` 接口的仓库都将能访问所有非私有的通用方法。\n\
  \n*   如果我们从仓库中移除它，`DataGenerator` 类将无法工作。这是因为我们在一个事务中插入了多个实体，并在 `DataGenerator.generateSampleData`\
  \ 方法末尾事务提交之前，在方法内部使用了这些实体。\n\n## 总结\n\n我们学习了在 JPA 中处理不同类型关联的各种选项。同时，本章中的示例展示了 Jackson\
  \ 和 Lombok 注解的正确用法。我们还探讨了枚举、UUID 的使用，以及通过 JPA 在 PostgreSQL 中使用数组数据类型。最后，我们简要介绍了分页\
  \ API。在下一章中，我们将了解 Spring Data JPA 在性能、懒加载问题等重要用例中的高级用法。\n\n"
- '# 第二部分 解决高级持久化问题与微服务通信挑战


