  \n## 总结\n\n在本章中，我们了解了 Spring Data JPA 能够提供极大帮助的一些常见问题的解决方案。我跳过了使用 Spring Data JPA\
  \ 运行原生 SQL 查询的技巧，因为我想展示当今可用的更新解决方案。在下一章中，我们将探索除 JPA 之外用于通用数据访问的一些解决方案。\n\n"
- "# 5. 不使用 ORM 的 Java 持久化\n\n到目前为止，我们快速浏览了 Spring Data JPA，主要关注其正面用例。使用 ORM 框架也有一些缺点。随着当今对应用程序扩展能力的需求日益增长，讨论\
  \ ORM 的这些相关问题变得非常重要。本章将探讨当应用程序规模超出常规限制时，ORM 所面临的与性能相关的问题：\n\n*   对于每个操作，ORM 框架都必须管理实体的生命周期，从而导致额外的开销。例如，无论实体是瞬态的、持久的还是分离的，Hibernate\
  \ 都会进行额外的检查，并确保所有状态更改事件的一致性。\n\n*   从 JPQL 创建 SQL 查询，或对实体执行操作时产生的成本是额外的开销。\n\n*\
  \   特定于数据库的 SQL 优化难以管理。每个供应商都有某些变体，任何 ORM 都难以支持所有这些变体。这可能会限制查询的微调。\n\n*   除了领域对象或实体之外，我们还需要\
  \ DTO（数据传输对象）类，并且需要进行映射，这会影响整体性能。额外的代码库使得维护成本更高。以下是需要单独 DTO 层的一些常见原因：\n    *   DTO\
  \ 与 UI/客户端层或用例紧密绑定，因此它们可能比领域模型拥有更多和/或更少的属性。\n\n    *   UI 数据需求与后端数据管理之间没有严格的契约，这使事情变得稍微容易一些。\n\
  \n    *   有时，出于安全原因，必须限制某些属性返回给客户端，尽管在实体上使用 `@JsonIgnore` 也是一种选择。\n\n    *   领域模型的更改可以在不更改\
  \ DTO 类的情况下进行。\n\n作为 Java 中 ORM 的替代方案，我们寻找能够灵活地向 SQL 数据库发起原生查询，并帮助将结果映射回对象的解决方案。在\
  \ Spring 框架中，我们有多种选择来实现这一点：\n\n*   Spring Data JPA 原生查询支持\n\n*   JDBCTemplate\n\n\
  *   Spring Data JDBC\n\n也可以与其他框架集成，例如 MyBatis 和 JOOQ，但我们重点关注由 Spring 社区创建的方案。其优势在于\
  \ API 的一致性和更简单的集成。我们在前一章中讨论了 Spring Data JPA 的原生查询支持。接下来，让我们在下一节中了解 JDBCTemplate\
  \ 和 Spring Data JDBC。\n\n\n\n## Spring JDBC 模板\n\nSpring JDBCTemplate 是 Spring 框架创建的\
  \ API，用于在关系型数据库上执行原生 SQL 查询，并将结果映射回自定义的 Java 对象。让我们通过一个非常简单的示例来重新创建我们的 Eshop 应用，并将其连接到\
  \ MySQL 数据库。我们将在单个查询中查询客户、购买的产品和订单信息。该结果应按照以下步骤映射到一个名为 `CustomerOrder` 的 DTO 类：\n\
  \n1.  创建一个基于 Gradle 的应用\n\n2.  初始化并运行示例 SQL 查询，以填充 `Customer`、`Product` 和 `Order`\
  \ 表。\n\n3.  定义一个名为 `CustomerOrder` 的新 DTO。\n\n4.  运行一个 SQL 查询，并将结果映射回对象模型；即一个名为\
  \ `CustomerOrder` 的列表。\n\n让我们使用以下代码结构构建一个应用：\n\n`eshop-jdbc-template-ch5`\n\n```\n\
  .\n├── build.gradle\n└── src\n├── main\n│   ├── java\n│   │   └── com\n│   │   \
  \    └── example\n│   │           └── eshop\n│   │               ├── Application.java\n\
  │   │               └── model\n│   │                   └── dto\n│   │          \
  \             └── CustomerOrder.java\n│   └── resources\n│       └── application.properties\n\
  └── test\n├── java\n│   └── com\n│       └── example\n│           └── eshop\n│ \
  \              └── EshopAppTests.java\n└── resources\n└── schema.sql\n```\n\n###\
  \ 应用设置\n\n从 [`http://www.spring.io`](http://www.spring.io) 创建一个名为 `eshop-jdbc-template-ch5`\
  \ 的新应用，并在 `build.gradle` 文件中包含以下依赖项（参见清单 5-1）。\n\n```\ndependencies {\ncompile ([\n\
