  \ 中成功创建了订单。最后一条语句显示了在 PostgreSQL 数据库中维护的订单历史记录。\n\n让我们查看数据库表：\n\n```\nMYSQL:\n>\
  \ mysql -u root -pmysql -h localhost\nmysql> create database db1;\nmysql> use db1;\n\
