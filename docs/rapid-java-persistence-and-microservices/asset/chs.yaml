  \ `Comment` 对象。\n\n### 附加功能\n\nSpring 框架还提供了一个基于辅助类的 API（`MongoTemplate`），它允许可编程接口比\
  \ Spring Data MongoDB 拥有更好的控制力。\n\n在我们的示例中，我们使用了 MongoDB 连接的默认设置，但这可以通过 `@Configuration`\
  \ 类进行覆盖。Spring Data API 支持的一些重要功能包括：\n\n*   基于 Java 的查询、条件和更新 DSL\n\n*   集成 QueryDSL\
  \ 以支持类型安全的查询\n\n*   地理空间集成\n\n*   Map-Reduce 集成\n\n*   JMX 管理和监控\n\n此外，还通过 `ReactiveMongoTemplate`\
  \ 和响应式 MongoDB 仓库支持响应式 MongoDB 访问。我们将在第 8 章详细讨论响应式技术。\n\n## 总结\n\n我们探索了使用 Spring\
  \ Boot 和 Spring Data MongoDB 入门所需的基本 API。Spring 拥有众多项目，可以与几乎所有流行的 NoSQL 数据库进行交互，包括搜索技术（Solr\
  \ 和 ElasticSearch）。下一章将深入探讨微服务开发。\n\n# 6. 深入探讨使用 Java 进行微服务开发\n\n第 2 章介绍了迁移到微服务架构的好处。在本章中，我们将深入探讨如何以\
  \ Spring Boot 为主要框架创建微服务，并重点介绍这种架构面临的挑战。我们还将通过构建多个不同的应用程序，看到结合了各种概念和库（所有这些都与 Spring\
  \ Boot 集成）的解决方案。\n\nSpring 框架有一个有趣的项目（称为 *Spring Cloud*），旨在解决分布式应用程序开发中的问题，尤其是在云部署环境中。微服务是分布式应用程序设计的一个例子，它在服务客户请求时涉及大量的协调工作。Spring\
  \ Cloud 包含通用 API，可以帮助进行与云无关的微服务开发。其目的是使基于云的应用程序的开发、部署和运维管理像管理本地应用程序一样简单。让我们深入探讨微服务架构的挑战，看看\
  \ Java 框架如何处理它们：\n\n*   服务间通信\n\n*   配置管理\n\n*   服务发现\n\n*   弹性\n\n*   请求追踪\n\n\
  *   微服务监控\n\n*   文档\n\n*   通过 API 网关实现单一入口\n\n*   代码共享\n\n*   安全性\n\n我们将通过一个基于 `eshop`\
  \ 示例应用程序的用例来探索这些挑战的解决方案，该应用程序自第 3 章以来一直在构建。我们将在本章中创建几个微服务：\n\n*   `eshop`：这是面向客户的微服务，包含购买产品的端点。\n\
  \n*   `inventory-service`：管理不同产品的库存。\n\n*   `config-service`：可以为 `eshop` 和 inventory\
  \ 服务存储任何安全配置。\n\n*   `admin-service`：作为已配置服务的监控服务。\n\n*   `discovery-service`：服务的公共注册中心，服务可以在此注册，客户端可以通过服务名称发现托管这些服务的节点。\n\
  \n*   `zuul-service`：充当网关服务，作为所有请求到其他应用程序的单一访问点。\n\n简单概述一下，我们将扩展在第 4 章第 4.​1 节（“与\
  \ Spring 的多数据源交互”）中构建的示例，以演示用于应对这些挑战的框架和库。在功能上，我们将以编程方式创建一个新客户，注册一些新产品，并由该客户在 `eshop`\
  \ 服务中执行一个示例订单生成。\n\n在创建订单之前，`eshop` 将通过调用另一个服务（`inventory-service`）来检查产品可用性。为了实现这一点，`eshop`\
  \ 服务将使用 `discovery-service`（Eureka）注册表与 `inventory-service` 通信。我们还将看到用于与 `discovery-service`\
  \ 通信的库选项，即通过 `Feign` 和 `Ribbon`。\n\n然后，我们将通过另一个服务（称为 `admin-service`）探索对 `eshop`\
  \ 和 `Inventory` 服务的监控，该服务构建在 Spring Boot Admin 之上。最后，我们将看到 `gateway-service` 的用法，它构建在\
  \ Netflix OSS Zuul 之上。\n\n服务的目录结构如下所示：\n\n```\n.\n└── spring-cloud-ch6\n├─ admin-service\n\
  ├─ config-service\n├─ discovery-service\n├─ eshop\n├─ gateway-service\n├─ inventory-service\n\
  ```\n\n## 服务间通信\n\n在单体应用中，应用程序的所有组件通过语言结构或函数直接相互调用。在分布式系统中（微服务架构就是这种情况），需要解决的问题之一是进程间通信。这是过去十年推动\
  \ ESB（企业服务总线）使用的问题之一。然而，微服务架构仍然存在一个很大的不同点。使用微服务时，我们有多个服务参与处理单个请求，这在单个应用程序中通常不会发生。\n\
  \n当少量的大型单体应用转变为更多更小的微服务时，问题变得更加复杂。考虑一个例子，一个旅行社系统，包括一个面向客户的网站、一个分析应用程序和一个用于库存管理的内部应用程序，变成了\
  \ 20 个或更多服务于相同目的的更小微服务。由于有许多小服务协作来完成单个用户请求，快速可靠地通信存在许多障碍。我们将探讨一些仍然适用于微服务间通信的进程间通信技术：\n\
  \n*   同步\n    *   涉及调用基于 HTTP 的 API。调用者等待响应。\n\n*   这也被称为基于请求/返回的通信。\n\n*   异步\n\
  \    *   通常涉及像 AMQP 这样的消息传递协议。调用者不等待响应。\n\n*   这也可以通过工作流中具有拆分阶段的共享数据库状态来实现。\n\n\
  *   通常涉及服务之间的消息传递，可以是单个接收者（一对一；基于队列）或多个接收者（一对多；基于主题）进行消息处理。\n\n*   这也可以仅通过 HTTP\
  \ 以即发即忘的方式发生。\n\n微服务是精确聚焦于功能的代码片段，开发者更倾向于在服务之间进行直接的端到端同步通信。以电子商务系统为例。为产品创建订单应该同步进行，而订单后处理可以异步进行，并在每个订单处理事件更新时向客户发送通知。通常，这会导致许多其他问题，我们在本章开头已经提到过。在本章中，我们仅通过同步机制来探讨解决方案。\n\
  \n## 配置管理\n\n\n\nSpring Cloud Config（[`https://spring.io/projects/spring-cloud-config`](https://www.spring.io/projects/spring-cloud-config)）是\
  \ Spring Cloud（[`https://projects.spring.io/spring-cloud`](https://www.projects.spring.io/spring-cloud)）总括项目下的一个子项目。Spring\
  \ Cloud Config 使我们能够将远程服务器设置为配置文件的版本化仓库，并通过 URL 或 Spring API 进行访问。换句话说，它允许我们在一个集中管理、安全且可访问的应用中覆盖或扩展任何应用的属性。配置存储理想情况下是一个\
  \ Git 仓库，并且可以在应用运行时进行修改。Spring Cloud Config 项目解决的目标如下：\n\n*   整个系统的集中化配置管理。\n\n\
  *   所有应用均可通过 HTTP 访问配置。\n\n*   配置可以存放在 Git 或 Svn 仓库中。\n\n*   配置可以存放在数据库中。\n\n* \
  \  配置可以动态重新加载。\n\n*   配置可以在应用层面轻松实现安全保护，同时也可以通过加密的 REST 方式进行保护。这意味着客户端在从配置服务器访问属性时需要传递凭证，并且配置文件在\
  \ REST 传输过程中会被加密。\n\n*   特定配置可以被覆盖。这允许我们将默认或本地配置打包在 JAR 中，并将环境或配置文件特定的配置保存在安全的 Git\
  \ 仓库中。当客户端应用使用指定的配置文件运行时，本地 `application.properties` 文件中的属性将从 JAR 文件中加载，其余属性将从连接的配置服务器管理的仓库中加载。\n\
  \n让我们开始从 `config-service` 构建示例应用，其代码结构如下：\n\n```\n.\n├── build.gradle\n├── gradle\n\
  │   └── wrapper\n│       ├── gradle-wrapper.jar\n│       └── gradle-wrapper.properties\n\
  ├── gradlew\n├── gradlew.bat\n└── src\n└── main\n├── java\n│   └── com\n│      \
  \ └── example\n│            └── config\n│                 └── ConfigApp.java\n└──\
  \ resources\n├── application.yml\n└── bootstrap.yml\n```\n\n### 应用设置\n\n从 [`http://www.spring.io`](http://www.spring.io)\
  \ 创建一个名为 `config-service` 的新应用，其依赖项如 `build.gradle` 文件中的列表 6-1 所示。\n\n```\nplugins\
  \ {\nid 'org.springframework.boot' version '2.1.3.RELEASE'\nid 'java'\n}\napply\
  \ plugin: 'io.spring.dependency-management'\napply plugin: 'project-report'\ngroup\
  \ = 'com.example'\nversion = '1.0'\nsourceCompatibility = '1.8'\nbootJar {\nbaseName\
  \ = 'config-service'\nversion =  '1.0'\n}\nrepositories {\nmavenCentral()\nmaven\
  \ { url 'https://repo.spring.io/milestone' }\n}\ndependencies {\nimplementation\
  \ 'org.springframework.cloud:spring-cloud-config-server'\nimplementation 'de.codecentric:spring-boot-admin-starter-client:2.1.3'\n\
  implementation 'org.springframework.boot:spring-boot-starter-actuator'\n}\ndependencyManagement\
  \ {\nimports {\nmavenBom \"org.springframework.cloud:spring-cloud- dependencies:Greenwich.SR1\"\
  \n}\n}\n列表 6-1\nbuild.gradle 文件\n```\n\n目前，无需担心与 Spring Boot Admin 相关的 `spring-boot-admin-starter-client`\
  \ 和 `spring-boot-starter-actuator` 依赖项。我将在第 6.6 节中解释这些内容。\n\n### 配置\n\n我们需要为此服务提供两种类型的配置：\n\
  \n*   在默认的 properties/yml 文件中添加所需的属性。\n\n*   设置一个新的 Git 仓库。\n\n#### 配置文件\n\nSpring\
  \ Cloud 项目提供了添加一个名为 `bootstrap.yml` 的新文件的功能，以便在加载 `application.yml` 或 `application.properties`\
  \ 文件中的属性之前执行任何初始配置。我们将使用 `bootstrap.yml` 来设置 Git 服务器仓库的 URI 以及加密信息（如果有的话）。`bootstrap.yml`\
  \ 文件在 `application.yml` 之前加载。我们在代码库中定义了这两个文件，如列表 6-2 所示。\n\n```\nbootstrap.yml\n\
  spring:\napplication:\nname: config-service\ncloud:\nconfig:\nserver:\ngit:\nuri:\
  \ ${HOME}/work_all/git_repo\napplication.yml\nserver:\nport: 8888\nservlet.context-path:\
  \ /config\nspring:\nboot:\nadmin:\nclient:\nurl: http://localhost:7777/admin\nmanagement:\n\
  endpoints:\nweb:\nexposure:\ninclude: \"*\"\n列表 6-2\n配置文件\n```\n\n**注意：**\n\n* \
  \  **spring.application.name** 非常重要，因为它将用作此服务在**服务注册中心**（下一章描述）中的标识符。我将在第 6.3 节中解释其重要性。\n\
  \n#### Git 仓库设置\n\n我们需要设置一个 Git 仓库，用于存储不同服务的配置文件。我在本地系统的 `/Users/raj/work_all/git_repo`\
  \ 路径下进行设置。请选择您自己偏好的位置。\n\n为了初始化一个新的 Git 仓库，我们需要进入该目录位置，并在命令行中运行 `git init` 命令。终端应显示以下输出：\n\
  \n```\n已初始化空的 Git 仓库于 /Users/raj/work_all/git_repo/.git/\n```\n\n现在，让我们在 Git 仓库中覆盖与微服务\
  \ `prod` 配置文件相关的属性：\n\n1.  `${HOME}/work_all/git_repo/inventory-service-prod.properties`\n\
  \n内容：\n\n1.  `${HOME}/work_all/git_repo/eshop-prod.properties`\n\n*   `spring.main.banner-mode=\
  \ \"off\"`\n\n*   `logging.file: logs/config-service.log`\n\n内容：\n\n*   `spring.main.banner-mode=\
  \ \"off\"`\n\n*   `logging.file: logs/inventory-service.log`\n\n注意：\n\n*   我们将 `eshop`\
  \ 和 inventory-service 微服务的 `Prod` 配置文件相关属性存储在 Git 仓库的文件中。\n\n*   这些文件共存于同一位置，即 `resources`\
  \ 目录下。\n\n*   `cloud.config.server.git.uri` 属性指定了仓库的位置。\n\n*   可以暂时忽略 `spring.boot.admin\
  \ and management.*` 相关的属性。我将在第 6.8 节中解释它们。\n\n让我们运行应用，并通过 `config-service` 的 URL\
  \ 访问这些配置。\n\n### 引导启动\n\n我们需要一个简单的 `Application` 类，并在其顶部添加一个名为 `@EnableConfigServer`\
  \ 的新注解（参见列表 6-3）。\n\n```\npackage com.example.config;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.cloud.config.server.EnableConfigServer;\n\
  @SpringBootApplication\n@EnableConfigServer\npublic class ConfigApp {\npublic static\
  \ void main(String[] args) {\nSpringApplication.run(ConfigApp.class, args);\n}\n\
  }\n列表 6-3\n应用类\n```\n\n注意：\n\n*   `config` 服务受基本安全保护，因为它旨在供微服务内部使用，不对外暴露。这是通过 `bootstrap.yml`\
  \ 中定义的 [`spring.security.user.name`](http://spring.security.user.name) 属性设置的（参见列表\
  \ 6-2）。\n\n### 运行 Config-Service 应用\n\n运行应用：\n\n```\n> gradle bootRun\n>\n2019-04-02\
  \ 07:28:31.317 INFO 25945 --- [          main]\ncom.example.config.ConfigApp   \
  \          : 未设置活动配置文件，回退到默认配置文件：default\n2019-04-02 07:28:32.728 INFO 25945 ---\
  \ [          main]\no.s.web.context.ContextLoader            : Root WebApplicationContext:\
