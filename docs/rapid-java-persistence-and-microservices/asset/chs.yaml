  \ p.name as productName,\" +\n\"p.quantity as quantity, p.price as price \" +\n\"\
  from \" +\n\"Customer c inner join `Order` o on c.customerId = o.customerId inner\
  \ join \" +\n\"Product p on o.productId = p.productId\";\nList customerWithOrdersList\
  \ = jdbcTemplate.query(sql, new BeanPropertyRowMapper(CustomerOrder.class));\nlog.info(\"\
  订单详情: \" + customerWithOrdersList);\n}\n}\n代码清单 5-4\n测试用例\n```\n\n注意：\n\n*   `BeanPropertyRowMapper`\
  \ 类是 `RowMapper` 的实现，它通过反射将结果集映射到 Bean 的列。\n\n*   Bean（即 `CustomerOrder`）必须有一个无参构造函数，并且字段名应与数据库中的列名匹配。下划线将转换为驼峰式字段名。\n\
  \n*   Spring 指出，该类旨在提供便利性而非高性能。为了获得最佳性能，请考虑使用自定义的 `RowMapper` 实现。\n\n*   `BeanPropertyRowMapper`\
  \ 不会映射嵌套对象。如果 `CustomerOrder` 包含与任何其他数据模型关联的列表，则不会自动映射。这在 JPA 中很容易发生。\n\n*   除了简单性之外，另一个优点是无需进行从领域类到\
  \ DTO 的二次转换或映射供 UI 使用。\n\n### 运行 Eshop-JDBC-Template-ch5 应用程序测试用例\n\n运行应用程序：\n\n\
