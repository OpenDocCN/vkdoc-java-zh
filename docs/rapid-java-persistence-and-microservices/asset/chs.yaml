- "# 4. JPA 常见用例\n\n到目前为止，我们已经了解了 JPA 与 Spring Data 的基本设置。在本章中，我们将介绍 Spring Data JPA\
  \ 的典型行业用例和解决方案：\n\n*   多数据源交互\n\n*   解决 N+1 问题\n\n*   使用构造函数将原生查询结果映射到 DTO\n\n*\
  \   将原生查询结果映射到投影\n\n*   Spring Converter 服务在原生查询中的作用\n\n*   实体生命周期、ACID 属性、CAP 定理和隔离级别等概念\n\
  \n在本章中，我们将创建一个名为 `eshop` 的新应用。本章的所有小节将逐步更新代码。应用的代码结构如下所示：\n\n```\n.\n├── build.gradle\n\
  ├── gradle\n│   └── wrapper\n│       ├── gradle-wrapper.jar\n│       └── gradle-wrapper.properties\n\
  ├── gradlew\n├── gradlew.bat\n└── src\n└── main\n├── java\n│   └── com\n│      \
  \ └── example\n│           └── eshop\n│               ├── Application.java\n│  \
  \             ├── config\n│               │   ├── DbConfigPrimary.java\n│      \
  \         │   └── DbConfigSecondary.java\n│               ├── converter\n│     \
  \          │   └── CustomerAddressConverter.java\n│               ├── model\n│ \
  \              │   ├── dto\n│               │   │   └── CustomerDto.java\n│    \
  \           │   ├── history\n│               │   │   └── PurchaseHistory.java\n\
  │               │   ├── orders\n│               │   │   ├── Customer.java\n│   \
  \            │   │   ├── Order.java\n│               │   │   └── Product.java\n\
  │               │   ├── projection\n│               │   │   └── CustomerProjection.java\n\
  │               │   └── type\n│               │       └── CustomerAddress.java\n\
  │               ├── repository\n│               │   ├── history\n│             \
  \  │   │   └── PurchaseHistoryRepository.java\n│               │   └── orders\n\
  │               │       ├── CustomerRepository.java\n│               │       ├──\
  \ OrderRepository.java\n│               │       └── ProductRepository.java\n│  \
  \             └── service\n│                   └── impl\n│                     \
  \  ├── CustomerService.java\n│                       └── ProductService.java\n└──\
  \ resources\n├── application.properties\n└── application.yml\n22 directories, 24\
  \ files\n```\n\n## 多数据源交互\n\nSpring Data JPA 中的这一关键特性将 Java 和 Spring 与其他语言框架区分开来，因为这并非基本需求，而是企业应用中罕见但极具潜力的功能。有时，应用程序必须同时与不同的数据库进行通信。让我们以创建一个电商在线书店为例。我们将为同一个微服务在\
  \ MySQL 中创建和存储客户、产品及订单数据，并在 PostgreSQL 中存储购买历史记录。\n\n在功能上，我们将模拟一个流程：首先保存新的客户和产品对象。然后，我们将购买该产品，并使用\
  \ MySQL 作为数据存储。对于同一笔购买，我们将把购买历史记录存储在 PostgreSQL 数据库中，用于分析。从技术上讲，这将涉及：\n\n*   为连接创建独立的数据源属性。\n\
  \n*   创建两个数据源和 `entityManager` 工厂 Bean。\n\n*   为了清晰起见，在不同的包中创建数据或领域模型以及仓库。实体类和仓库不要求放在不同的包中，但保持一致性更好。\n\
  \n现在，让我们为我们的用例构建示例应用。\n\n\n\n### 应用设置\n\n从 [`http://www.spring.io`](http://www.spring.io)\
  \ 创建一个名为 `eshop-ch4` 的新应用，并在 `build.gradle` 文件中包含以下依赖项：\n\n```\ndependencies {\n\
  compile ([\n\"org.springframework.boot:spring-boot-starter-web\",\n\"org.springframework.boot:spring-boot-starter-jdbc\"\
  ,\n\"org.springframework.boot:spring-boot-starter-data-jpa\"\n])\ncompile ([\n\"\
  mysql:mysql-connector-java:8.0.15\",\n\"org.postgresql:postgresql:42.2.5\",\n\"\
  org.projectlombok:lombok:1.18.6\"\n])\ntestCompile(\"junit:junit\")\nannotationProcessor\
  \ 'org.projectlombok:lombok:1.18.6'\n}\n```\n\n### 数据源配置\n\n所有与数据源相关的属性都定义在 `application.yml`\
  \ 或 `application.properties` 中，但针对我们的用例，我们还需要在 Java 配置中定义数据源 Java Bean。对于单个数据源，Java\
  \ Bean 配置步骤并非必需，配置文件中的属性就已足够。以下代码定义了两个不同的数据库配置，分别由数据源 Bean（`LocalEntityManagerFactory`）和事务管理器组成。清单\
  \ 4-1 定义了主数据源的配置，清单 4-2 则涉及辅助数据源。\n\n```\npackage com.example.eshop.config;\nimport\
  \ lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Qualifier;\n\
  import org.springframework.boot.autoconfigure.EnableAutoConfiguration;\nimport org.springframework.boot.context.properties.ConfigurationProperties;\n\
  import org.springframework.boot.jdbc.DataSourceBuilder;\nimport org.springframework.boot.orm.jpa.EntityManagerFactoryBuilder;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.context.annotation.Primary;\nimport org.springframework.data.jpa.repository.config.EnableJpaRepositories;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.orm.jpa.JpaTransactionManager;\n\
  import org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean;\nimport\
  \ org.springframework.transaction.PlatformTransactionManager;\nimport javax.persistence.EntityManagerFactory;\n\
  import javax.sql.DataSource;\nimport java.util.HashMap;\nimport java.util.Map;\n\
  @Configuration\n@EnableAutoConfiguration\n@EnableJpaRepositories(\nentityManagerFactoryRef\
  \ = \"entityManagerFactory\",\ntransactionManagerRef = \"transactionManager\",\n\
  basePackages = { \"com.example.eshop.repository.orders\" })\n@Slf4j\npublic class\
  \ DbConfigPrimary {\n@Bean(name = \"dataSource\")\n@Primary\n@ConfigurationProperties(prefix\
  \ = \"spring.datasource.orders\")\npublic DataSource dataSourcePrimary() {\nreturn\
  \ DataSourceBuilder.create().build();\n}\n@Primary\n@Bean(name = \"entityManagerFactory\"\
  )\npublic LocalContainerEntityManagerFactoryBean entityManagerFactory(\nEntityManagerFactoryBuilder\
  \ builder, @Qualifier(\"dataSource\") DataSource dataSource)\n{\nreturn builder\n\
  .dataSource(dataSource)\n.packages(\"com.example.eshop.model.orders\")\n.persistenceUnit(\"\
  orders\")\n.properties(jpaProperties())\n.build();\n}\n@Primary\n@Bean(name = \"\
  transactionManager\")\npublic PlatformTransactionManager transactionManager(\n@Qualifier(\"\
  entityManagerFactory\") EntityManagerFactory\nentityManagerFactory\n) {\nreturn\
  \ new JpaTransactionManager(entityManagerFactory);\n}\nprivate Map jpaProperties()\
  \ {\nMap props = new HashMap();\nprops.put(\"hibernte.ejb.naming_strategy\", \"\
  org.hibernate.cfg.ImprovedNamingStrategy\");\nprops.put(\"hibernate.dialect\", \"\
  org.hibernate.dialect.MySQL5InnoDBDialect\");\nprops.put(\"hibernate.hbm2ddl.auto\"\
  , \"create-drop\");\nreturn props;\n}\n}\n清单 4-1\n主数据库配置\n```\n\n清单 4-2 中的辅助配置与上一个类似，只是常量和属性查找发生了变化。\n\
  \n```\npackage com.example.eshop.config;\nimport lombok.extern.slf4j.Slf4j;\nimport\
  \ org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.boot.context.properties.ConfigurationProperties;\n\
  import org.springframework.boot.jdbc.DataSourceBuilder;\nimport org.springframework.boot.orm.jpa.EntityManagerFactoryBuilder;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.data.jpa.repository.config.EnableJpaRepositories;\nimport\
  \ org.springframework.orm.jpa.JpaTransactionManager;\nimport org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean;\n\
  import org.springframework.transaction.PlatformTransactionManager;\nimport javax.persistence.EntityManagerFactory;\n\
  import javax.sql.DataSource;\nimport java.util.HashMap;\nimport java.util.Map;\n\
  @Configuration\n@EnableJpaRepositories(\nentityManagerFactoryRef = \"entityManagerFactoryHistory\"\
  ,\ntransactionManagerRef = \"transactionManagerHistory\",\nbasePackages = { \"com.example.eshop.repository.history\"\
  \ })\n@Slf4j\npublic class DbConfigSecondary {\n@Bean(name = \"dataSourceHistory\"\
  )\n@ConfigurationProperties(prefix = \"spring.datasource.history\")\npublic DataSource\
  \ dataSourceSecondary() {\nreturn DataSourceBuilder.create().build();\n}\n@Bean(name\
  \ = \"entityManagerFactoryHistory\")\npublic LocalContainerEntityManagerFactoryBean\
  \ entityManagerFactory(\nEntityManagerFactoryBuilder builder, @Qualifier(\"dataSourceHistory\"\
  ) DataSource dataSource)\n{\nlog.info(\"Secondary EM initialized\");\nreturn builder\n\
  .dataSource(dataSource)\n.packages(\"com.example.eshop.model.history\")\n.persistenceUnit(\"\
  history\")\n.properties(jpaProperties())\n.build();\n}\n@Bean(name = \"transactionManagerHistory\"\
  )\npublic PlatformTransactionManager transactionManager(\n@Qualifier(\"entityManagerFactoryHistory\"\
  ) EntityManagerFactory entityManagerFactory\n) {\nreturn new JpaTransactionManager(entityManagerFactory);\n\
  }\nprivate Map jpaProperties() {\nMap props = new HashMap();\nprops.put(\"hibernte.ejb.naming_strategy\"\
  , \"org.hibernate.cfg.ImprovedNamingStrategy\");\nprops.put(\"hibernate.dialect\"\
  , \"org.hibernate.dialect.PostgreSQLDialect\");\nprops.put(\"hibernate.hbm2ddl.auto\"\
  , \"create-drop\");\nreturn props;\n}\n}\n清单 4-2\n辅助数据库配置\n```\n\n注意：\n\n*   我们在此代码中为持久化单元定义了两个不同的名称。例如，清单\
  \ 4-1 中的 `builder.persistenceUnit(\"orders\")` 行和清单 4-2 中的 `builder.persistenceUnit(\"\
  history\")` 行。\n\n*   定义 `transactionManager` 除了 `@Qualifier` 的使用外，其含义不言自明，`@Qualifier`\
  \ 在 Spring 中用于区分两个同名或同类型的 Bean。\n\n*   我们还使用了 `@Primary` 注解，将 Bean 声明为同一 Spring\
  \ 上下文中的默认数据源。\n\n*   我们通过代码中的包，在三个层级上区分这些类：\n    1.  在最上层，我们通过 `@EnableJpaRepositories`\
  \ 注解中的 `basePackages` 属性来区分仓库位置，如下所示：\n        *   （来自清单 4-1。）\n\n```\n        \
  \    @EnableJpaRepositories(\n            entityManagerFactoryRef = \"entityManagerFactory\"\
  ,\n            transactionManagerRef = \"transactionManager\",\n            basePackages\
  \ = { \"com.example.eshop.repository.orders\" })\n            ```\n\n*   （来自清单 4-2。）\n\
  \n```\n            @EnableJpaRepositories(\n            entityManagerFactoryRef\
  \ = \"entityManagerFactoryHistory\",\n            transactionManagerRef = \"transactionManagerHistory\"\
  ,\n            basePackages = { \"com.example.eshop.repository.history\" })\n  \
  \          ```\n\n2.  `DatasourceBuilder` 将在主配置和辅助配置中查找前缀为 `spring.datasource.orders`\
  \ 和 `spring.datasource.history` 的属性。\n\n3.  `EntityManagerFactoryBuilder` 将使用不同的包来构建\
  \ Bean，如 `builder.packages(\"com.example.eshop.model.orders\")` 行所示。\n\n\n\n###\
  \ 数据模型与仓库\n\n如前所述，我们将为模型和仓库定义两个独立的包，以保持代码整洁。清单 4-3 展示了主数据源和辅助数据源的模型类。\n\n```\npackage\
  \ com.example.eshop.model.orders;\nimport java.io.Serializable;\nimport java.time.LocalDateTime;\n\
  import java.util.List;\nimport java.util.Set;\nimport javax.persistence.*;\nimport\
  \ com.fasterxml.jackson.annotation.JsonIgnore;\nimport lombok.*;\n@Data\n@Entity\n\
  @ToString(exclude = {\"orders\"})\n@EqualsAndHashCode(exclude = {\"orders\"})\n\
  public class Customer implements Serializable {\n@Id\n@GeneratedValue(strategy=GenerationType.IDENTITY)\n\
  private Long customerId;\nprivate String name, email, password;\nprivate LocalDateTime\
  \ dateAdded;\n@JsonIgnore\n@OneToMany(fetch = FetchType.LAZY)\n@JoinColumn(name\
  \ = \"customerId\")\nSet orders;\n}\n@Data\n@Entity\npublic class Product implements\
  \ Serializable {\n@Id\n@GeneratedValue(strategy=GenerationType.IDENTITY)\nprivate\
  \ Long productId;\nprivate String name;\nprivate Integer price, quantity;\n}\n@Data\n\
  @Entity\n@Table(name=\"CustomerOrder\")\npublic class Order implements Serializable\
  \ {\n@Id\n@GeneratedValue(strategy=GenerationType.IDENTITY)\nprivate Long orderId;\n\
  private Long productId, customerId;\nprivate int quantity, price;\n}\npackage com.example.eshop.model.history;\n\
  @Data\n@Entity\n@Table(name=\"PurchaseHistory\")\npublic class PurchaseHistory implements\
  \ Serializable {\n@Id\n@GeneratedValue(strategy=GenerationType.IDENTITY)\nprivate\
  \ Long id;\nprivate Long customerId, productId;\nprivate Date createdDate;\n}\n\
  清单 4-3\n领域模型定义\n```\n\n清单 4-4 展示了主数据源和辅助数据源的仓库。\n\n```\npackage com.example.eshop.repository.orders;\n\
  import com.example.eshop.model.orders.Customer;\nimport org.springframework.data.jpa.repository.JpaRepository;\n\
  import org.springframework.data.jpa.repository.Query;\nimport java.util.List;\n\
  import java.util.Optional;\npublic interface CustomerRepository extends JpaRepository{\
  \ }\npublic interface OrderRepository extends JpaRepository{ }\npublic interface\
  \ ProductRepository extends JpaRepository { }\npackage com.example.eshop.repository.history;\n\
  public interface PurchaseHistoryRepository extends JpaRepository{ }\n清单 4-4\n仓库定义\n\
  ```\n\n数据模型定义相当直观。在我们的用例中不需要任何自定义方法，因此在清单 4-3 和 4-4 中，我们给出了空的仓库定义。\n\n### 服务定义\n\
  \n为了支持我们的用例，我们需要定义两个服务类来处理业务逻辑，如清单 4-5 所示。\n\n```\npackage com.example.eshop.service.impl;\n\
  import com.example.eshop.model.history.PurchaseHistory;\nimport com.example.eshop.model.orders.Product;\n\
  import com.example.eshop.repository.history.PurchaseHistoryRepository;\nimport com.example.eshop.repository.orders.ProductRepository;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Service;\nimport org.springframework.transaction.annotation.Transactional;\n\
  import com.example.eshop.model.orders.Order;\nimport com.example.eshop.repository.orders.OrderRepository;\n\
  import java.util.Date;\nimport java.util.List;\n@Service\n@Slf4j\npublic class ProductService\
  \ {\n@Autowired\nOrderRepository orderRepository;\n@Autowired\nProductRepository\
  \ productRepository;\n@Autowired\nPurchaseHistoryRepository purchaseHistoryRepository;\n\
  @Transactional\npublic Boolean purchase(Long productId, Long customerId, int quantity,\
  \ int price) {\nBoolean success = Boolean.TRUE;\nOrder order = new Order();\norder.setCustomerId(customerId);\n\
  order.setProductId(productId);\norder.setPrice(price);\norder.setQuantity(quantity);\n\
  orderRepository.save(order);\nreturn success;\n}\n@Transactional\npublic void saveHistory(Long\
  \ customerId, Long productId)   {\nPurchaseHistory ph = new PurchaseHistory();\n\
  ph.setCustomerId(customerId);\nph.setProductId(productId);\nph.setCreatedDate(new\
  \ Date());\npurchaseHistoryRepository.save(ph);\n}\npublic void registerNewProducts()\
  \ {\nProduct product = new Product();\nproduct.setName(\"Superb Java\");\nproduct.setPrice(400);\n\
  product.setQuantity(3);\nproductRepository.save(product);\n}\npublic List findAll()\
  \ {\nreturn productRepository.findAll();\n}\n}\npackage com.example.eshop.service.impl;\n\
  import com.example.eshop.model.orders.Customer;\nimport com.example.eshop.repository.orders.CustomerRepository;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Service;\nimport org.springframework.transaction.annotation.Isolation;\n\
  import org.springframework.transaction.annotation.Propagation;\nimport org.springframework.transaction.annotation.Transactional;\n\
  import java.time.LocalDateTime;\nimport java.util.List;\n@Service\n@Slf4j\npublic\
  \ class CustomerService {\n@Autowired\nCustomerRepository customerRepository;\n\
  @Transactional(propagation=Propagation.REQUIRED, isolation=Isolation.DEFAULT)\n\
  public void registerNewCustomers() {\nCustomer customer = new Customer();\ncustomer.setName(\"\
  Raj Malhotra\");\ncustomer.setEmail(\"raj.malhotra@example.com\");\ncustomer.setPassword(\"\
  password\");\ncustomer.setDateAdded(LocalDateTime.now());\ncustomerRepository.saveAndFlush(customer);\n\
  log.info(\"所有已注册的客户: \" + customerRepository.findAll());\n}\npublic List findAll()\
  \    {\nreturn customerRepository.findAll();\n}\n}\n清单 4-5\n服务定义\n```\n\n只需调用这些服务类的方法，即可在同一个微服务内将事务详情保存到\
  \ MySQL，并将其历史记录保存到 PostgreSQL。最后，我们需要定义配置属性。我们将在 `application.properties` 文件中定义\
  \ JPA 相关的属性，其余属性定义在 `application.yml` 中，以保持更高的可读性。\n\n注意：\n\n*   `CustomerService`\
  \ 包含注册新示例客户和获取所有客户的方法。\n\n*   `ProductService` 包含注册新产品、为客户执行购买操作以及保存此事务历史记录的方法。\n\
  \n### 应用配置\n\n在清单 4-6 中，我们启用了应用启动时数据库的自动创建功能。应用停止后，所有表都应被删除。\n\n```\napplication.properties\n\
  spring.datasource.orders.jdbcUrl=jdbc:mysql://localhost:3306/db1\nspring.datasource.orders.username=root\n\
  spring.datasource.orders.password=mysql\nspring.datasource.orders.driver-class-name:\
  \ com.mysql.jdbc.Driver\nspring.datasource.orders.dialect=org.hibernate.dialect.MySQL5InnoDBDialect\n\
  spring.datasource.history.jdbcUrl=jdbc:postgresql://localhost:5432/db2\nspring.datasource.history.username=postgres\n\
  spring.datasource.history.password=postgres\nspring.datasource.history.dialect=org.hibernate.dialect.PostgreSQLDialect\n\
  spring.jpa.hibernate.ddl-auto=create-drop\nspring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation:\
  \ true\napplication.yml\nserver:\ncontext-path: /eshop\nport: 8080\nspring:\njpa:\n\
  hibernate.ddl-auto: create-drop\nshow-sql: true\ngenerate-ddl: true\n清单 4-6\n配置文件\n\
  ```\n\n除了 `spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation` 之外，我们在上一章中已经见过这些属性中的大部分。该属性用于抑制由\
  \ PostgreSQL JDBC 驱动程序启动的警告消息。隐式地，`java.sql.Connection` 在 JDBC 驱动程序类中被加载，并且不涵盖 JDBC4\
  \ LOB 创建方法。\n\n\n\n### 应用类\n\n为了验证这段代码，我们创建了 `Application` 类，并按顺序执行代码中的服务方法（参见清单\
