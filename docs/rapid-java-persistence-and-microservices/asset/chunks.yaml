    ObjectMapper mapper = new ObjectMapper();

    String resultJson =

    this.restTemplate

    .getForObject("http://INVENTORY-SERVICE/

    inventory/api/inventory/" + 1, String.class);

    try {

    map = mapper.readValue(resultJson.getBytes(),

    HashMap.class);

    log.info("Result from inventory service: {}", map);

