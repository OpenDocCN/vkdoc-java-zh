  trans: "\n### 过滤器\n\n过滤器是我们自定义 Zuul 行为的机制。这些自定义类可以实现任何功能并改变路由。其典型用例是在请求到达功能性微服务之前，在中心点执行授权和日志记录。清单\
    \ 6-33 提供了一个示例。\n\n```\npackage com.example.eshop.gateway.filters;\nimport com.netflix.zuul.ZuulFilter;\n\
    import lombok.extern.slf4j.Slf4j;\nimport org.springframework.stereotype.Component;\n\
    @Component\n@Slf4j\npublic class AuthPreFilter extends ZuulFilter {\n@Override\n\
    public String filterType() {\nreturn \"pre\";\n}\n@Override\npublic int filterOrder()\
    \ {\nreturn 0;\n}\n@Override\npublic boolean shouldFilter() {\nreturn true;\n\
    }\n@Override\npublic Object run() {\n//检查 JWT 头部并验证授权令牌的有效性\n// 记录请求日志\nreturn\
    \ null;\n}\n}\n清单 6-33\nZuul 过滤器实现\n```\n\n注意：\n\n*   `filterType()` 方法用于按类型对过滤器进行分类。Zuul\
    \ 中的标准类型包括：`pre` 用于路由前过滤，`route` 用于路由到目标，`post` 用于路由后过滤，以及 `error` 用于错误处理。\n\n\
    *   `filterOrder()` 方法用于定义过滤器的执行顺序。此顺序不必是连续的。\n\n*   `shouldFilter()` 方法包含决定何时执行此过滤器的逻辑。\n\
    \n*   最后，可以重写 `run()` 方法来添加自定义功能。\n\n### 运行应用程序\n\n运行应用程序：\n\n```\n> gradle bootRun\n\
    >\n:: Spring Boot ::        (v2.1.3.RELEASE)\n2019-04-06 12:46:01.386   INFO 69797\
    \ --- [           main]\ncom.example.eshop.gateway.ZuulApp         : No active\
    \ profile set, falling back to default profiles: default\n2019-04-06 12:46:03.170\
    \   INFO 69797 --- [           main]\no.s.web.context.ContextLoader          \
    \   : Root WebApplicationContext: initialization completed in 1759 ms\n2019-04-06\
    \ 12:46:04.975   INFO 69797 --- [           main]\no.s.b.a.e.web.EndpointLinksResolver\
    \       : Exposing 21 endpoint(s) beneath base path '/actuator'\n2019-04-06 12:46:05.142\
    \   INFO 69797 --- [           main]\no.s.b.w.embedded.tomcat.TomcatWebServer\
    \   : Tomcat started on port(s): 9999 (http) with context path \"\n2019-04-06\
    \ 12:46:05.146   INFO 69797 --- [           main]\ncom.example.eshop.gateway.ZuulApp\
    \         : Started ZuulApp in 5.164 seconds (JVM running for 4.412)\n```\n\n\
    一旦 `gateway-service` 启动并运行，我们就可以通过 `gateway-service` 的基础 URL 访问 `eshop`、`config-service`、`inventory-service`\
    \ 和 `admin-service` 的端点，而无需在客户端应用程序中为每个服务保留单独的 URL。例如：\n\n*   要访问配置服务，URL 现在为\
    \ `http://localhost:8888/config/`\n\n*   要访问管理服务，URL 现在为 `http://localhost:7777/admin/`\n\
    \n*   要访问 Eshop 服务，URL 现在为 `http://localhost:8081/eshop/`\n\n*   要访问库存服务，URL 现在为\
    \ `http://localhost:8082/inventory/`\n\n## 跨服务代码复用\n\n这是一个经常被讨论的实际问题：我们是否应该复用跨微服务创建的代码？通常，这需要在不同功能服务之间共享公共\
    \ DTO，但这会使服务相互依赖。我们使用微服务是为了在松散耦合的独立应用之间实现关注点分离，但现在我们却在做相反的事情。\n\n这也引发了一个问题：当不同的服务使用不同的语言实现时，相同的代码就无法使用了。我还见过这样的情况：决策者说他们三年前用\
    \ Java 构建服务，现在仍然使用 Java，未来三年也会继续使用 Java，所以他们不必担心这个问题。我将把决定权留给读者，并讨论在 Java 中实现代码复用的几种方式：\n\
    \n*   使用基于 Maven 或 Gradle 的多模块项目。\n    *   我们经常看到开源项目使用这种技术。Spring 框架本身就是一个例子。如果你查看\
    \ GitHub 仓库中的 Spring 上下文模块 Gradle 文件（`spring-content.gradle`）（[`https://github.com/spring-projects/spring-framework/blob/master/spring-context/spring-context.gradle`](https://github.com/spring-projects/spring-framework/blob/master/spring-context/spring-context.gradle)），它依赖于其他模块，如\
    \ `spring-core` 和 `spring-beans`。我们在此不讨论多模块构建设置，因为它们超出了本书的范围。\n\n*   使用构建制品仓库管理器解决方案，如\
    \ Archiva（开源）、JFrog 或 Sonatype Nexus。在其他语言中，这些解决方案被称为包管理器。\n    *   这可以通过 Gradle\
    \ 中的 `uploadArchives` 配置属性实现。每次新构建时，都可以将新版本的 Jar 文件上传到组织的内部仓库。例如，如果我们有一个 `common-models`\
    \ 模块，该模块的所有版本都可以上传到内部仓库，然后作为依赖项在其他服务中使用。\n\n*   在所有服务中再次复制公共代码。\n    *   这是最糟糕的方法，因为所有公共数据模型可以在不同服务中反复复制。例如，如果\
    \ `product-catalog` 和 `inventory` 服务都需要一个 `Product` 对象，它们可以复制该对象。\n\n*   精心创建共享领域类的不同消费者版本。\n\
    \    *   这通常是许多专家推荐的首选方法。沿用之前的例子，假设 `product-catalog` 服务拥有 `Product` 数据模型。如果 `inventory-service`\
    \ 也需要这个对象，我们是否应该创建一个 `ProductView` 类，以便在该服务中创建实际对象的聚焦子视图？这个子视图可以包含较少的属性，也可以包含不同的属性。即使\
    \ `product-service` 中的实际 `Product` 类发生变化，`ProductView` 也可以保持不变。这种方法也非常支持多语言微服务，因为不存在代码共享。\n\
    \n## 微服务安全\n\n与在单个应用程序中处理用户注册、登录和授权的单体架构相比，保护基于微服务的分布式系统带来了许多新的挑战。不过，两种架构仍有许多共同的关注点，例如不同的身份验证模式、代码内方法级别的授权、OWASP\
    \ 等。我们可能需要在单体架构中使用基于 OAuth 的身份验证，因为你的企业中可能存在多个单体应用程序。\n\n在企业中，你可能需要设计一个与企业 LDAP\
    \ 系统集成的 SSO（单点登录）。然而，在微服务架构中，OAuth、SAML、SSO 和 JWT 仍然是相同的，因此我们可能希望将身份验证和令牌验证保留在\
    \ API 网关层面。让我们尝试通过在 `gateway-service` 中启用基于 JWT（JSON Web 令牌）的令牌身份验证，并在 `eshop`\
    \ 服务中创建令牌来探索这个想法。\n\n### Eshop 服务变更\n\n我们需要在面向前端的微服务（对我们来说是 `eshop`）中实现登录功能。我们需要创建一个\
    \ `LoginController` 类来处理身份验证，并根据预定义用户（邮箱为 raj@example.com）创建 JWT 令牌。此外，我们还需要在\
    \ `build.gradle` 文件中添加一个依赖项：\n\n```\ncompile group: 'io.jsonwebtoken', name: 'jjwt',\
    \ version: '0.9.1'\n```\n\n现在让我们来看一下控制器类。\n"
