    *   `eureka.instance.hostname` 属性表示要绑定 Eureka 注册服务器的主机名。这也可以是域名或暴露的 IP 地址。


    *   服务器模式下的 `eureka.client.*` 属性在集群模式下部署时使用。如果有多个节点，发现服务可以动态连接，并且也可以复制注册表。我们将跳过这方面的更多细节，因为它们超出了本章的范围。


