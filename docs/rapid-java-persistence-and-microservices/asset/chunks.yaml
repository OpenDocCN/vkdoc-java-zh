    ## Resiliency in the Microservices Architecture


    The microservices architecture helps break down problems into pieces and therefore
    a single request may flow through a couple of requests for a single use case.
    This poses a new risk of system failure to end clients due to any single service
    failing in the request flow. Netflix OSS Hystrix helps by handling such failures
    gracefully. This is based on a well known circuit-breaker pattern. Let’s see this
    example through the `Eshop` service, which we created in Section [6.3.3](#454149_1_En_6_Chapter.xhtml#Sec20).
    Hystrix also provides a web-based dashboard for monitoring applications.


    As a recap, we created `TestController` in the `eshop` service and it calls the
    `OrderService` class. `OrderService` further calls the `inventory-service` to
    check inventory for the given `productId`.


    Now let’s say that `inventory-service` stops responding due to a system crash
    or it starts throwing errors due to the database not responding. In both these
    cases, `TestController` will keep sending all requests to the same failing `inventory-service`
    forever. With Hystrix in place, we can configure the calling service to detect
    continuous failures in calls and add a fallback method to be called in such situations.
    Let’s see a code example.


