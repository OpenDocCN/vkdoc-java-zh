    ### 网关服务变更


    在此服务中，我们验证远程客户端在每个请求中传递的令牌。如果 `Authorization` 标头无效或损坏，我们将发送带有错误描述的 HTTP 401 响应。我们只需要更改
    `gateway-service` 中的 `AuthPreFilter` 类（参见清单 6-35）。


    ```

    package com.example.eshop.gateway.filters;

    import com.netflix.zuul.ZuulFilter;

    import com.netflix.zuul.context.RequestContext;

    import io.jsonwebtoken.Claims;

    import io.jsonwebtoken.Jwts;

    import io.jsonwebtoken.SignatureException;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.stereotype.Component;

    import javax.servlet.http.HttpServletRequest;

    @Component

    @Slf4j

    public class AuthPreFilter extends ZuulFilter {

    //检查 JWT 标头，并在需要时检查所有 OAUTH 服务

    @Override

    public Object run() {

    RequestContext context = RequestContext.getCurrentContext();

    HttpServletRequest request = context.getRequest();

    final String token = request.getHeader("Authorization");

    if (token == null) {

    context.setSendZuulResponse(false);

    context.setResponseStatusCode(401);

    context.setResponseBody("缺少 Authorization 标头");

    return null;

    }

    try {

    final Claims claims = Jwts.parser().setSigningKey("secretkey").parseClaimsJws(token).getBody();

    log.info("声明: {}", claims);

    context.addZuulRequestHeader("Authorization", "Basic " + token);

    } catch (final SignatureException e) {

    context.setSendZuulResponse(false);

    context.setResponseStatusCode(401);

    context.setResponseBody("API 密钥无效");

    }

    return null;

    }

    @Override

    public String filterType() {

    return "pre";

    }

    @Override

    public int filterOrder() {

    return 0;

    }

    @Override

    public boolean shouldFilter() {

    return true;

    }

    }

