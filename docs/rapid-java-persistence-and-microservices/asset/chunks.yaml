    ## Data Models


    In Listing [5-11](#454149_1_En_5_Chapter.xhtml#PC17), we define two data models,
    `Post` and `Comment`, with a one-to-many association between these two. The `Post`
    object acts as the parent and contains a list of comments created by different
    users.


    ```

    package com.example.blog_app.model.mongo;

    import lombok.*;import org.springframework.data.annotation.Id;

    import java.io.Serializable;

    import java.util.Set;

    @Data

    @Builder

    @EqualsAndHashCode(exclude = {"comments"})

    public class Post implements Serializable {

    @Id

    private String id;

    private String title;

    private String content;

    private PostStatus postStatus;

    private String blogName;

    private String userName;

    private Set comments;

    }

    package com.example.blog_app.model.mongo;

    import lombok.Data;

    import org.springframework.data.annotation.Id;

    @Data

    public class Comment {

    @Id

    private String id;

    private String content;

    public Comment(String content)   {

    this.content = content;

    }

    }

    package com.example.blog_app.model.mongo;

    import java.io.Serializable;

    public enum PostStatus implements Serializable {

    ACTIVE(1), NOT_ACTIVE(2);

