  trans: "\n## 功能代码\n\n我们有一个非常小的功能代码片段，默认情况下会部署到 Tomcat 实例中。如前所述，它可以在所有四个平台上使用。根据\
    \ Spring Cloud Function 文档，我们可能需要进行一些微调。请参见清单 10-2。\n\n```\npackage com.example;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.context.annotation.Bean;\nimport reactor.core.publisher.Flux;\n\
    import java.util.function.Supplier;\n@SpringBootApplication\npublic class App\
    \ {\npublic static void main(String[] args) {\nSpringApplication.run(App.class,\
    \ args);\n}\n@Bean\npublic Supplier> randomWords() {\nreturn () -> Flux.fromArray(new\
    \ String[] { \"Raj\", \"Malhotra\"});\n}\n}\n清单 10-2\n应用程序类\n```\n\n注意：\n\n* \
    \  默认情况下，Spring Boot 在此处使用 Tomcat，并创建一个 Web 应用程序，该应用程序会暴露所有已定义的功能方法，这些方法可通过 URL\
    \ 访问。\n\n*   相同的代码库可以用于不同的平台（AWS、Azure 或 OpenWhisk）。\n\n*   可以进行一些优化以缩短启动时间：\n\
    \    *   尽量避免使用 `Component`，因为它会减慢启动过程。\n\n    *   出于同样的原因，尽量避免使用 `Autowiring`，而应使用构造函数注入。\n\
    \n## 运行 Serverless-Example-Ch10 应用程序\n\n```\n> gradle bootRun\n>\n:: Spring Boot\
    \ ::        (v2.1.3.RELEASE)\n2019-03-25 08:20:04.204  INFO 16506 --- [      \
    \     main] o.s.b.w.embedded.tomcat.TomcatWebServer  : Tomcat started on port(s):\
    \ 8080 (http) with context path \"\n2019-03-25 08:20:04.208  INFO 16506 --- [\
    \           main] com.example.App                          : Started App in 2.401\
    \ seconds (JVM running for 2.803)\n```\n\n为了测试此函数，请运行以下 Curl 命令：\n\n```\n> curl\
    \ http://localhost:8080/randomWords\n[\"Raj\",\"Malhotra\"]\n```\n\n我们调用了 `randomWords`\
    \ 函数，并收到了响应 `[\"Raj\",\"Malhotra\"]`。\n\n## 总结\n\n在本章中，我们学习了如何开始使用 Spring Cloud\
    \ Function。我建议你尝试使用 Apache OpenWhisk Adapter API。接下来，我们将在下一章中探讨 Java 消息传递选项。\n\
    \n# 11. Java 消息传递\n\n从我职业生涯开始，消息传递就一直是一个让我感兴趣的话题。多年来，Java 生态系统采用了多种不同风格的事件驱动编程。自\
    \ 1998 年以来，我们一直拥有 JMS（Java 消息服务）API，并且它至今仍在发挥着同样的作用。如今，架构师们更倾向于使用 Spring 集成、Camel\
    \ 和其他平台 API，而不是纯 JMS 解决方案。进入当前的消息代理时代，我们有 AMQP 代理（ActiveMQ、RabbitMQ、QPid、IronMQ\
    \ 等）这样的整体解决方案、流式解决方案（Kafka 和云提供商提供的选项），以及商业解决方案，如 Tibco 和 IBM MQ。我们将研究其中两个代理，并使用\
    \ Java API 涵盖各种底层概念——RabbitMQ 和 Kafka。此应用程序的代码结构如下：\n\n```\n.\n├── build.gradle\n\
    ├── gradle\n│   └── wrapper\n│       ├── gradle-wrapper.jar\n│       └── gradle-wrapper.properties\n\
    ├── gradlew\n├── gradlew.bat\n└── src\n└── main\n├── java\n│   └── com\n│    \
    \   └── example\n│           ├── Application.java\n│           ├── kafka\n│  \
    \         │   ├── KafkaConsumer.java\n│           │   └── KafkaProducer.java\n\
    │           └── rabbitmq\n│               ├── Consumer.java\n│               ├──\
    \ Producer.java\n│               └── RabbitMQConfig.java\n└── resources\n├── application.properties\n\
    └── application.yml\n```\n\n## RabbitMQ\n\nRabbitMQ 是一个非常流行的消息代理，支持 AMQP 1.0 协议。在消息传递领域，RabbitMQ\
    \ 是用 Erlang 编写的，并且仍然是该领域的领导者。Java 中有多个 API，但我们将继续仅使用 Spring 框架。通常，在 RabbitMQ 代理中，我们有一个交换器，它保存所有消息，并根据交换器的路由键进一步分发这些消息。图\
    \ 11-1 展示了此通信过程。\n\n![../images/454149_1_En_11_Chapter/454149_1_En_11_Fig1_HTML.png](img/454149_1_En_11_Fig1_HTML.png)\n\
    \n图 11-1\n\nRabbitMQ 交换器\n\n过程如下：\n\n1.  发布者将消息发布到 RabbitMQ 交换器。\n\n2.  根据路由键，交换器将消息分发到其队列。\n\
    \n3.  连接到不同队列的消费者根据其兴趣接收消息。\n\n4.  根据交换器类型，消息被发送到一个或多个队列。交换器类型可以是 Direct、Fanout、Topic\
    \ 和 Headers。\n\n现在，让我们在 OSX 上使用 Spring Boot 和 RabbitMQ 创建一个示例。\n\n### 应用程序设置\n\
    \n我们首先使用 `brew` 命令在 OSX（MacBook）上安装 RabbitMQ：\n\n```\n> brew install rabbitmq\n\
    > brew services start rabbitmq\n```\n\n然后，我们创建一个名为 `messaging-examples-ch11` 的新\
    \ Gradle 项目，其 `build.gradle` 文件中的依赖项如清单 11-1 所示。\n\n```\nplugins {\nid 'org.springframework.boot'\
    \ version '2.1.3.RELEASE'\nid 'java'\n}\napply plugin: 'io.spring.dependency-management'\n\
    apply plugin: 'project-report'\njava {\ngroup = 'com.example'\nversion = '1.0'\n\
    sourceCompatibility = JavaVersion.VERSION_1_8\ntargetCompatibility = JavaVersion.VERSION_1_8\n\
    }\nbootJar {\narchiveBaseName = 'messaging-example'\nversion =  '1.0'\n}\nrepositories\
    \ {\nmavenCentral()\n}\ndependencies {\ncompile('org.projectlombok:lombok:1.18.6')\n\
    compile(\"org.springframework.boot:spring-boot-starter-amqp\")\n}\n清单 11-1\n构建文件\n\
    ```\n\n### 引导\n\n我们有一个简单的 `Application` 类，它在 Spring 框架中启用了调度功能（参见清单 11-2）。我们将使用调度器持续向代理的队列发送消息。\n\
    \n```\npackage com.example;\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.scheduling.annotation.EnableScheduling;\n\
    @SpringBootApplication\n@EnableScheduling\npublic class Application {\npublic\
    \ static void main(String[] args) {\nSpringApplication.run(Application.class,\
    \ args);\n}\n}\n清单 11-2\n应用程序类\n```\n\n### RabbitMQ 配置\n\n在我们开始使用生产者和消费者之前，我们需要通过\
    \ Spring 配置来声明交换器、队列以及这两者之间的绑定（参见清单 11-3）。\n\n```\npackage com.example.rabbitmq;\n\
    import org.springframework.amqp.core.*;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\n@Configuration\n\
    public class RabbitMQConfig {\n@Bean\npublic Exchange ordersExchange() {\nreturn\
    \ new DirectExchange(\"orders_exchange\");\n}\n@Bean\npublic Queue ordersQueue()\
    \ {\nreturn new Queue(\"orders\");\n}\n@Bean\npublic Queue messagesQueue() {\n\
    return new Queue(\"notifications\");\n}\n@Bean\npublic Binding binding() {\nreturn\
    \ BindingBuilder\n.bind(ordersQueue())\n.to(ordersExchange())\n.with(\"orders.*\"\
    ).noargs();\n}\n@Bean\npublic Binding binding2() {\nreturn BindingBuilder\n.bind(messagesQueue())\n\
    .to(ordersExchange())\n.with(\"notifications.*\").noargs();\n}\n}\n清单 11-3\n配置\n\
    ```\n\n注意：\n\n*   我们创建了一个名为 `orders_exchange` 的直接交换器，以及两个名为 `orders` 和 `notifications`\
    \ 的队列。\n\n*   我们还创建了两个绑定，分别使用路由键 `orders.*` 和 `notifications.*`，将队列与交换器绑定。\n\n\
    *   在此示例中，我们不会使用 notifications 队列。我们只是将其作为一个示例来展示如何从同一个交换器路由不同类型的消息。\n"
- fmt: "### Message Producer\n\nWe will schedule a call via `@Scheduled` to a method\
    \ that keeps generating a new message and sending it to the broker. For this example,\
    \ I am using the default settings of the RabbitMQ server from Spring Boot (see\
    \ Listing [11-4](#454149_1_En_11_Chapter.xhtml#PC7)). The default properties are\
    \ as follows:\n\n*   `spring.rabbitmq.port`: Used to specify the port; defaults\
    \ to `5672`.\n*   `spring.rabbitmq.host`: Used to specify the host; defaults to\
    \ `localhost`.\n*   `spring.rabbitmq.username`: Used to specify the (optional)\
    \ username.\n*   `spring.rabbitmq.password`: Used to specify the (optional) password.\n\
    \n```\npackage com.example.rabbitmq;\nimport lombok.extern.slf4j.Slf4j;\nimport\
    \ org.springframework.amqp.core.Queue;\nimport org.springframework.amqp.rabbit.core.RabbitTemplate;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.scheduling.annotation.Scheduled;\n\
    import org.springframework.stereotype. Service;\nimport java.util.Calendar;\n\
    @Service\n@Slf4j\npublic class Producer {\n@Autowired\nprivate RabbitTemplate\
    \ rabbitTemplate;\n@Scheduled(fixedRate = 1000)\npublic void send() {\nString\
    \ message = \"Next order received at \" + Calendar.getInstance().getTime();\n\
    this.rabbitTemplate.convertAndSend(\"orders_exchange\", \"orders\", message);\n\
    log.info(\"RabbitMQ Message sent : {}\", message);\n}\n}\nListing 11-4\nProducer\
    \ Class\n```\n\nNotes:\n\n*   We injected a `RabbitTemplate` object through autowiring.\n\
    *   The `@Scheduled(fixedRate = 1000)` annotation will ensure that a `send()`\
    \ method is called every 1,000 milliseconds.\n*   We are generating a new message\
    \ and sending it over the wire.\n*   We are sending the message to an exchange\
    \ named `orders_exchange` with the routing key set to `orders`. The signature\
    \ for the actual method in `RabbitTemplate` is `public void convertAndSend(String\
    \ exchange, String routingKey, Object object)`.\n\n### Message Consumer\n\nWe\
    \ have a very small bit of code here to keep printing the messages received in\
    \ a log file (see Listing [11-5](#454149_1_En_11_Chapter.xhtml#PC8)).\n\n```\n\
    package com.example.rabbitmq;\nimport lombok.extern.slf4j.Slf4j;\nimport org.springframework.amqp.rabbit.annotation.RabbitListener;\n\
    import org.springframework.stereotype.Service;\n@Service\n@Slf4j\npublic class\
    \ Consumer {\n@RabbitListener(queues = \"orders\")\npublic void receiveMessage(String\
    \ message) {\nlog.info(\"RabbitMQ Received :: {}\", message);\n}\n}\nListing 11-5\n\
    Consumer Class\n```\n\nThe `@RabbitListener(queues = \"orders\")` annotation indicates\
    \ that this method is going to act as the listener for all messages received in\
