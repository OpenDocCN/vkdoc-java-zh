    ## Rapid-Fire Documentation


    There are quite a few options to describe REST API with Java. We will look at
    the OpenAPI Specification (OAS), a project within the OpenAPI Initiative. OpenAPI
    is a Linux Foundation Collaborative Project with over 20 members, including Adobe,
    IBM, Google, Microsoft, and Salesforce. The OpenAPI Specification (OAS) is aimed
    to define a standard, programming language-agnostic interface description for
    REST APIs.


    This specification ends the search comparisons between feature sets of different
    frameworks, such as Json Schema, WADL, RAML, and Swagger. We will now have different
    implementations, just like JDBC drivers for this specification. The specification
    is so far fully implemented by a couple of clients for different languages. We
    will look at Swagger in this chapter, which is written in Java (`https://github.com/swagger-api`).
    Swagger provides a list of tools for authoring (Swagger Editor), viewing (Swagger
    UI), and generating code (Swagger Codegen):


    *   **Swagger Editor**: The browser-based editor where you can write OpenAPI specs.

    *   **Swagger UI**: renders OpenAPI specs as interactive API documentation.

    *   **Swagger Codegen**: generates server stubs and client libraries from an OpenAPI
    spec.


    We can either create a YAML file and generate projects from that or we can embed
    Swagger specs related properties through its annotations within a Spring Boot
    application. We will cover the Spring Boot integration example in this section
    to enabling Swagger API through our microservices example. We need to include
    two dependencies in the `eshop` service to see a working example:


    ```

    compile("io.springfox:springfox-swagger2:2.9.2")

    compile("io.springfox:springfox-swagger-ui:2.9.2")

    ```


    ### Java Configuration


    We need to define Swagger-related configuration first and then define the annotations
    for RESTful resources in the controller classes. Listing [6-28](#454149_1_En_6_Chapter.xhtml#PC53)
    shows the basic Java configuration for Swagger.


    ```

    package com.example.eshop.config;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import springfox.documentation.builders.RequestHandlerSelectors;

    import springfox.documentation.spi.DocumentationType;

    import springfox.documentation.spring.web.plugins.Docket;

    import springfox.documentation.swagger2.annotations.EnableSwagger2;

    import static springfox.documentation.builders.PathSelectors.regex;

    @Configuration

    @EnableSwagger2

    public class SwaggerConfig {

    @Bean

    public Docket productApi() {

    return new Docket(DocumentationType.SWAGGER_2)

    .select()

    .apis(RequestHandlerSelectors.basePackage("com.example.eshop"))

    .paths(regex("/api.*"))

    .build();

    }

    private ApiInfo apiInfo() {

    return new ApiInfoBuilder().title("Eshop Service API")

    .description("Eshop API reference for developers")

    .termsOfServiceUrl("http://localhost:8201/eshop")

    .contact(new Contact("Raj Malhotra", "http://

    www.example.com", "mraj6046@gmail.com")).license("Example License

    Title")

    .licenseUrl("http://localhost:8201/eshop/

    license").version("1.0").build();

    }

    }

    Listing 6-28

    Java Configuration for Swagger

    ```


    Notes:


    *   The first method, called `productApi()`, provides a `Docket` bean, which is
    a builder intended to be the primary interface into the Springfox framework.

    *   `Docket` allows you to define the package where controller classes annotated
    with Swagger annotations can be found and the paths for all APIs.

    *   The second bean, called `ApiInfo`, allows you to define the general information,
    such as user/author contact details and license information.'
