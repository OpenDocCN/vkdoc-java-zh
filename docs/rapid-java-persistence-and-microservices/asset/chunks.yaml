    Listing 8-4

    Repository Definition

    ```


    To use Spring Data R2DBC repositories, we need to annotate fields of model class
    with annotations from the Spring Data Commons project. In the code in Listing
    [8-3](#454149_1_En_8_Chapter.xhtml#PC9), we have a `Post` Java object with `@Id`
    and `@Column` annotations from Spring Data Commons. Spring Data R2DBC provides
    the implementation to manage data model persistence with these annotations.


    ### DTO and Web Controller


    We will first define a simple POJO named `PostInputRequest` with input fields
    needed to create a `User` domain object (see Listing [8-5](#454149_1_En_8_Chapter.xhtml#PC11)).
    Further, we will define a `PostController` class (see Listing [8-6](#454149_1_En_8_Chapter.xhtml#PC12))
    with methods returning `reactor.core.publisher.*` API classes (Flux or Mono).


    ```

    package com.example.eblog.web;

    import com.example.eblog.dto.PostInputRequest;

    import com.example.eblog.model.Post;

    import com.example.eblog.repository.PostRepository;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.data.domain.PageRequest;

    import org.springframework.data.domain.Sort;

    import org.springframework.data.repository.query.Param;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.PostMapping;

    import org.springframework.web.bind.annotation.RequestBody;

    import org.springframework.web.bind.annotation.RestController;

    import reactor.core.publisher.Flux;

    import reactor.core.publisher.Mono;

    @RestController

    @Slf4j

    public class PostController {

    @Autowired

    PostRepository postRepository;

    @PostMapping("/posts")

    public Mono newPost(@RequestBody PostInputRequest postInputRequest){

    Post lclPost = Post.builder()

    .title(postInputRequest.getTitle())

    .content(postInputRequest.getContent())

    .build();

    Mono post = postRepository.save(lclPost);

    return post;

    }

    @GetMapping("/posts")

    Flux allPosts() {

    return this.postRepository.findAll();

    }

    @GetMapping("/recentPosts")

    public Flux recentPosts(

    @Param("limit") Integer limit, @Param("offset") Integer offset,

    @Param("orderBy") String orderBy){

    log.info("recentPosts, params: {}, {}", limit, offset);

    PageRequest pageRequest = PageRequest.of(limit, offset, Sort.Direction.DESC, orderBy);

    return postRepository.findAll();

    }

    }

