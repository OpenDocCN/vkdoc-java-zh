    ## 总结


    消息传递是一个广泛的主题。本章简要介绍了如何开始使用 Spring Boot 以及 RabbitMQ 或 Kafka。本章涵盖了基于队列的 RabbitMQ
    通信和基于主题的 Kafka 通信。Apache Kafka 拥有更多 API，例如 KSQL 和 Kafka Streams。我建议读者深入了解它们，因为它们提供了不同的数据处理能力。在下一章中，我们将回顾
    Java 的最新改进，并将其与其他语言进行比较。顺便提一下，RabbitMQ 最适合微服务间开发，而 Kafka 最适合流式处理或数据处理。

