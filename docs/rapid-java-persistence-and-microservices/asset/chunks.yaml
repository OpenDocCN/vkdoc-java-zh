    ## Summary


    Messaging is a wide topic. This chapter simply explained how to get started with
    Spring Boot and either RabbitMQ or Kafka. The chapter covered queue-based communication
    with RabbitMQ and topic-based communication with Kafka. Apache Kafka has more
    APIs, like KSQL and Kafka Streams. I suggest readers go through them, as they
    offer different data-processing capabilities. In the next chapter, we recap the
    recent improvements to Java and compare it to other languages. As a side note,
    RabbitMQ is best for inter-microservice development and Kafka is best for streaming
    or data processing.'
