- fmt: "### Checking Hystrix\n\nWe need to restart the `eshop` and `inventory-service`\
    \ applications to apply these changes.\n\n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig5_HTML.jpg](images/454149_1_En_6_Chapter/454149_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5\n\nHystrix dashboard\n\n```\n> gradle bootRun\n>\n:: Spring Boot\
    \ ::        (v2.1.3.RELEASE)\n70051 --- [           main] com.example.eshop.EshopApp\
    \               :No active\nprofile set, falling back to default profiles: default\n\
    70051 --- [           main] o.s.boot.actuate.endpoint.EndpointId     : Endpoint\
    \ ID\n'service-registry' contains invalid characters, please migrate to a valid\
    \ format.\n70051 --- [           main] o.s.b.w.embedded.tomcat.TomcatWebServer\
    \  : Tomcat initialized with port(s): 8081 (http)\n70051 --- [           main]\
    \ o.s.b.a.e.web.ServletEndpointRegistrar   : Registered '/actuator/hystrix.stream'\
    \ to hystrix.stream-actuator-endpoint\n70051 --- [           main] o.s.c.n.e.s.EurekaServiceRegistry\
    \        : Registering application ESHOP with eureka with status UP\n70051 ---\
    \ [           main] o.s.b.w.embedded.tomcat.TomcatWebServer  : Tomcat started\
    \ on port(s): 8081 (http) with context path '/eshop'\n```\n\nHystrix also implicitly\
    \ creates a default endpoint at `\"http://localhost:8081/eshop/hystrix\"`.\n\n\
    Under the hood, Hystrix generates a stream of metrics data, available at `http://localhost:8081/eshop/actuator/hystrix.stream`.\
    \ We need to enter this Hystrix stream URL in the input box of the Hystrix dashboard\
    \ screen, as shown in Figure [6-5](#454149_1_En_6_Chapter.xhtml#Fig5). Additionally\
    \ we need to visit the `/api/orders` API endpoint of `eshop` service again, as\
    \ we did in Section [6.3.3.6](#454149_1_En_6_Chapter.xhtml#Sec28). The dashboard\
    \ will look like Figure [6-6](#454149_1_En_6_Chapter.xhtml#Fig6).\n\n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig6_HTML.jpg](images/454149_1_En_6_Chapter/454149_1_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6\n\nHystrix dashboard with inventory-service working\n\nWe can see\
    \ the Circuit Closed in Figure [6-6](#454149_1_En_6_Chapter.xhtml#Fig6). We have\
    \ a number appearing in green as \"3\" under `orderProduct`.\n\nTo validate the\
    \ reverse case, we need to stop the inventory service for a while and visit the\
    \ `/api/orders` API endpoint of `eshop` service a few times. Let's look at the\
    \ console logs of `eshop` service again after stopping the `inventory-service`:\n\
    \n```\n2019-04-02 22:13:18.002 ERROR [eshop,7155a8b13c0b7e1b,\n2a018f069c73c5b7,false]\
    \ 70051 --- [-OrderService-2]\nc.e.eshop.service.impl.OrderService      : Inventory\
    \ Service is responding very slow\n2019-04-02 22:13:18.003 ERROR [eshop,7155a8b13c0b7e1b,\n\
    7155a8b13c0b7e1b,false] 70051 --- [nio-8081-exec-6]\ncom.example.eshop.web.TestController\
    \     : Transactions are failing, please check after some time\n```\n\nThese log\
    \ statements were added to the `OrderService.handleInventoryFailure()` method\
    \ in the `eshop` service. This validates that the fallback method is getting called,\
    \ in case of timeout from an inventory service. In other words, the circuit has\
    \ opened and the fallback mechanism is working fine. We can now observe the same\
    \ effect in the Hystrix dashboard, as shown in Figure [6-7](#454149_1_En_6_Chapter.xhtml#Fig7).\n\
    \n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig7_HTML.jpg](images/454149_1_En_6_Chapter/454149_1_En_6_Fig7_HTML.jpg)\n\
    \nFigure 6-7\n\nHystrix dashboard when inventory-service is not working\n\nWe\
    \ can see from Figure [6-7](#454149_1_En_6_Chapter.xhtml#Fig7) that there are\
    \ six requests that short-circuited. This means there are six requests that have\
    \ been caught by Hystrix because target service (`inventory-service`) was not\
    \ working.\n\n## Request Tracing in the Microservices Architecture\n\nAnother\
    \ common challenge in distributed systems programming is that post production\
    \ deployment, it becomes difficult to trace the request flow across services.\
    \ This concern creates two problems to solve—centralized logs and request tracing.\n\
    \nFor central logging, we need to merge all logs generated on multiple servers\
    \ to a central point where we can do searching, troubleshooting, and analytics.\
    \ This is not a new problem. The industry standard solutions collect and allow\
    \ searching on logs from multiple nodes in a cluster. Examples include ELK, Fluentd,\
    \ Graylog, Splunk, and more. They all support two modes of log collection:\n\n\
    * On the basis of an agent doing tail on the log files and sending the most recently\
    \ collected ones incrementally to the server.\n* Sending logs directly using their\
    \ API SDKs from the application to the server.\n\nRequest tracing is a different\
    \ problem to solve and becomes bigger with the increasing number of microservices.\
    \ This is required when we want to trace a request or a transaction spanning multiple\
    \ services.\n\nSpring Cloud offers a solution for this need through Spring Cloud\
    \ Sleuth. Let's say we want to trace a single failing (with some error code) request\
    \ or even do log analysis based on some common attribute for any request across\
    \ services. This library can be helpful in embedding a `TraceId` for each new\
    \ request in logs. `TraceId` is a unique UUID for every single new request, generated\
    \ by Spring Sleuth. If the request goes through multiple services, Spring Sleuth\
    \ will track this ID and keep it the same in the second service logs as well.\n\
    \nThere are four such attributes generated with two such IDs. The full syntax\
    \ of this generated data looks like this:\n\n* `APPLICATION_NAME`: The name of\
    \ the service\n* `TRACE_ID`: The unique ID for the request\n* `SPAN_ID`: The unique\
    \ ID for each span of work. In our example, `SPAN_ID` will be different for the\
    \ `Eshop` and `Inventory` services for the same request.\n* `EXPORT_LOGS_OR_NOT`:\
    \ Whether or not logs should be exported to some other tool.\n\n```\n[APPLICATION_NAME,\
    \ TRACE_ID, SPAN_ID, EXPORT_LOGS_OR_NOT]\n```\n\nThere are tools also available\
    \ today that can help you visualize the logs utilizing the generated attributes\
    \ and trace the services. Two such examples are Google's Dapper and Zipkin. We\
    \ will not discuss them in detail, as they are not in the scope of this book.\
    \ In order to implement distributed tracing logs in an application, there are\
    \ four steps:\n\n1. Add the new dependencies to the `eshop` and `inventory-service`\
    \ microservices in the `build.gradle` file and restart them:\n\n```\n    compile(\"\
    org.springframework.cloud:spring-cloud-starter-sleuth\")\n    compile(\"org.springframework.cloud:spring-cloud-starter-zipkin\"\
    )\n```\n\n2. Download and start the Zipkin Jar file as a service from `zipkin.io`:\n\
    \n```\n    java -jar ./zipkin-server-2.12.7-exec.jar\n```\n\n3. Add a property\
    \ to the `application.yml` file of `eshop` and `inventory-service` and restart\
    \ them both:\n\n```\n    spring.zipkin.base-url: http://localhost:9411/\n```\n\
    \n4. Visit the `/api/orders` API of the `eshop` service a couple of times again.\n\
    \n```\n    > curl -H \"Content-Type: application/json\" -X POST -i http://localhost:8081/eshop/api/orders\n\
    ```\n\nOnce you have made these changes, Spring Cloud Sleuth will start adding\
    \ the following attributes to each log statement.\n\n```\n/eshop/src/main/resources/application.yml\n\
    INFO [eshop,6e0abc792dc25b96,e49bf80a97204e7e,false] 67023 --- [-OrderService-1]\n\
    c.e.eshop.service.impl.OrderService      : Result from inventory service:\n{quantity=2,\
    \ productId=1, price=200, inventoryId=1}\n/inventory-service/src/main/resources/application.yml\n\
    INFO [inventory-service,3d3af1edbfa15240,50f818143fd68f39,false] 19246 ---\n[nio-8082-exec-1]\
    \ c.e.e.inventory.web.InventoryResource    : Inventory request for product: 1\n\
    ```"
