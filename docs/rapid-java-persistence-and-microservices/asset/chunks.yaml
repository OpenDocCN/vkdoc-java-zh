- fmt: "# Spring Boot\n\nThe `Spring Framework` is one big reason for the success\
    \ of Java in enterprise development. This framework has wide support for almost\
    \ all the popular libraries and frameworks in Java web development. With Spring\
    \ Boot, we can quickly create self-runnable microservices within minutes. In the\
    \ past, we had to spend a lot of development time in an application writing boilerplate\
    \ code for wiring Spring infra components only. Now, most of the common stuff\
    \ is preconfigured for us.\n\nHere are a few highlights of Spring Boot:\n\n- It\
    \ also has a curated list of libraries bundled, just like Dropwizard, but these\
    \ are mostly preconfigured.\n- It’s easy to get things up and running quickly.\n\
    - It’s very flexible to override configuration, libraries, and frameworks.\n-\
    \ There is a very strong community to provide solutions to various problems that\
    \ may arise.\n\nLet’s look at a sample Hello World application along with the\
    \ foundation class for our use cases. This class will act as the starting point\
    \ for our sample web application. If you want to change or override anything,\
    \ you have the option of a properties file, a YAML file, and Java-based configuration.\n\
    \nTo start a new application with Spring Boot, we will be implementing an interface\
    \ called `CommandLineRunner`. This will enable us to start running a few sample\
    \ cases just after the web container has started. In other words, this class helps\
    \ us bootstrap the application.\n\nLet’s define our `Application` class. This\
    \ tiny single class serves as the starting point and as a RESTful endpoint for\
    \ the Spring Boot application (see Listing [2-8](#454149_1_En_2_Chapter.xhtml#PC16)).\n\
    \n```\npackage com.example.hello;\nimport lombok.extern.slf4j.Slf4j;\nimport org.springframework.boot.CommandLineRunner;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.web.bind.annotation.GetMapping;\nimport org.springframework.web.bind.annotation.RestController;\n\
    @SpringBootApplication\n@RestController\n@Slf4j\npublic class HelloApplication\
    \ implements CommandLineRunner {\npublic static void main(String[] args) {\nSpringApplication.run(HelloApplication.class,\
    \ args);\n}\n@Override\npublic void run(String... args) throws Exception {\nlog.info(\"\
    App started\");\n}\n@GetMapping(\"/hello\")\npublic String hello() {\nreturn \"\
    Hello World\";\n}\n}\nListing 2-8\nApplication Class\n```\n\nHere is the `application.properties`\
    \ file:\n\n```\nserver.servlet.context-path=/library\n```\n\nWe also need to add\
    \ a property to the `{rootSrcPath}/main/resources/application.properties` file,\
    \ as shown. With this property, we are setting the context path for the application.\
    \ There are many such properties to customize. We will not be discussing all of\
    \ them and I suggest you read the basics from the Spring documentation.\n\nThe\
    \ Spring Framework community provides an extra facility so that the initial project\
    \ setup doesn't have to be done manually. The [`http://www.start.spring.io`](http://www.start.spring.io)\
    \ site gives you the quick, ready-to-start initial setup, with all the Spring\
    \ dependencies listed.\n\nJust download a quick app and provide the `groupId`\
    \ and `artifactId` onscreen. Set up and run the main class from any IDE and access\
    \ the URL as `http://localhost:8080/library/hello`.\n\nAlternatively, the CURL\
    \ command is:\n\n```\ncurl -X GET http://localhost:8080/library/hello\n```\n\n\
    This is the output:\n\n```\nHello World\n```\n\nThe `CommandLineRunner` interface\
    \ doesn’t have to be implemented; the application can run directly within the\
    \ `main` method, as `SpringApplication.run(Application.class, args)`. This interface\
    \ is used in case you want to run or trigger more code after the embedded container\
    \ starts. In Spring Boot, most things are configured by convention.\n\nSpring\
    \ Boot loads the configuration by default from `application.properties` or `application.yml`\
    \ in the classpath.\n\nThe `@Sl4j` annotation is from the open source project\
    \ Lombok. This annotation generates a final static log, an Sl4j-based field in\
    \ the compiled class.\n\nConsider these two special comments about why the Spring\
    \ Framework is used in this book:\n\n- With a huge community and years of hard\
    \ work, the Spring Framework very consistently supports hundreds of libraries\
    \ and frameworks. This is quite challenging.\n- The speed of upgrades and speed\
    \ of adapting to any trending technologies is very good with the community.\n\n\
    To be specific, if you want the most controlled, optimal dev setup, Dropwizard\
    \ should be your first choice; otherwise, Spring is the preferred choice.\n\n\
    ## Summary\n\nWe have just seen three popular frameworks to start with. From now\
    \ on, we will see most of examples using the Spring Framework, as it offers the\
    \ most comprehensive solutions for various needs of any enterprise system. We\
    \ can create a microservice from a bigger macroservice or from a monolithic application\
    \ using Spring Boot.\n\n# Basic Persistence with Spring\n\nThe intent of this\
    \ chapter is to explain easy and convenient Java persistence with optimal choices\
    \ for performance. We will recap the various options and show examples of important\
    \ use cases. Persistence, in my opinion, is the most important layer in any application.\n\
    \nStarting with ORM frameworks, we have seen a lot of love and hate for ORMs in\
    \ the past decade, yet they are still heavily used by the community. ORMs provide\
    \ a lot of choices in the Java ecosystem for database interaction. Let’s start\
    \ by discussing the first popular choice—Spring Data JPA—and take a quick recap\
    \ of Hibernate.\n\nSpring Data JPA is a very useful DSL (Domain Specific Language)\
    \ based module that provides maximum reduction to boilerplate code for interacting\
    \ with databases. Using Spring Data on top of JPA/Hibernate provides a consistent\
    \ API for interacting with relational and NoSQL databases. There are three important\
    \ steps we need to follow while developing applications with Spring Data JPA:\n\
    \n1. Define the domain models or entities. When starting a new project, you need\
    \ to decide whether entities should be defined first or should be generated later\
    \ from the database. The best way I see to design with JPA is to have a SQL definition\
    \ of your database initially and then create the table-by-table model classes\
    \ after that. Even if this involves two steps, this might be more useful than\
    \ generating Java models from DB tables. SQL scripts need not have all their constraints\
    \ defined initially. Based on the first application run, relationships (foreign\
    \ keys) will be updated in the database automatically by JPA.\n\n2. Define the\
    \ repositories with any necessary customization. Customization can be done when\
    \ you know your access patterns; otherwise, this is mostly done on an incremental\
    \ need basis.\n\n3. Use these models and repositories along with optimizing the\
    \ queries and/or convert to native whenever required. Based on the performance\
    \ requirements, native queries can also be utilized.\n\nBy the end of this chapter,\
    \ you should have good understanding of the following Spring Data JPA concepts:\n\
    \n- Basic entity definitions with:\n  - `@OneToOne`\n  - `@OneToMany`\n  - `@ManoToOne`\n\
    \  - `@ManyToMany` and lazy loading\n  - Usage of `Cascade.ALL` and when to avoid\
    \ it\n  - Usage of Lombok’s `@ToString` and `@EqualsAndHashCode`\n  - Usage of\
    \ Jackson’s `@JsonIgnore`\n\n- PostgreSQL with JPA, especially when:\n  - Using\
    \ enums\n  - Using UUID\n  - Fetching, storing, and querying arrays\n\n- Basic\
    \ usage:\n  - JPA query example with pagination\n  - The usage and advantages\
    \ of a common base repository"
