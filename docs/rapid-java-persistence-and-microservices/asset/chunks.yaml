  trans: "\n## 重要概念\n\n对于来自 REST API 设计的开发者来说，GraphQL 中有几个有趣的新概念可以简化开发流程：\n\n*   单一**端点**：GraphQL\
    \ 应用程序在单个 /GraphQL 端点上运行，各种请求会被路由到已注册的解析器类。\n\n*   基于 POST 的请求：所有请求都是基于 `POST`\
    \ 的，并且必须以符合 SDL 格式的方式发送，这种格式可能相当描述性强、冗长且嵌套。\n\n*   **基于模式：** GraphQL 允许你通过 SDL\
    \ 为 API 客户端定义一个类似 JSON 的模式。这种模式优先或契约优先的模式有助于确保 UI 和后台团队之间更好的协调。\n\n*   查询：所有不打算创建或更新任何资源的\
    \ `GET` 请求被称为查询。\n\n*   **变更：** 在 GraphQL 中，所有 `POST`、`PUT` 和 `DELETE` 请求都是变更。\n\
    \n*   **解析器：** GraphQL 引擎或框架可以调用的所有自定义注册函数都称为解析器。\n\n*   **模式拼接：** 这是一种从多个模式创建单一统一模式的技术。当不同的微服务拥有自己的模式，并且一个前端服务可以为所有这些微服务提供组合视图时，这非常有用。这样，前端微服务可以充当网关。此功能在\
    \ Java API 中不存在，但预计很快会添加。\n\n*   **订阅：** 此功能允许通过 WebSocket 编程，以推拉模型向客户端提供近乎实时的响应。\n\
    \n## 工作原理\n\n我们来看一下创建 GraphQL 服务的简化分步过程：\n\n1.  首先创建一个 JSON 模式（模式优先方法）。或者，稍后可以从对象生成模式（代码优先方法）。\n\
    \n2.  根据实现查询和变更时定义的模式，创建一系列*解析器*（实现类）。\n\n3.  使用其内置的基于 Web 的客户端或资源管理器（Java 中的\
    \ GraphiQL）运行并测试应用程序。\n\n4.  作为客户端连接到 GraphQL REST 端点。\n\n5.  如果需要，通过模式拼接过程将多个基于\
    \ GraphQL 端点的微服务合并为一个，然后像往常一样连接到它。\n\n## 相较于 REST 的优势\n\nGraphQL 主要关注客户端访问数百个不同\
    \ RESTful API URL 的问题，从而浪费大量带宽。GraphQL 解决了许多问题：\n\n*   精确获取你需要的内容。\n*   声明式，无过度获取。\n\
    *   在单个请求中获取多个资源。\n*   基于模式的 API，充当客户端和服务之间的契约。\n*   单一 API 端点，因此无需在客户端代码中维护太多\
    \ URL。\n*   不再有 API 版本管理的麻烦。已弃用的字段可以在模式中标记为 `@deprecated` 并附带描述。工具可以开始显示其已弃用，客户端也可以开始忽略它。\n\
    *   随时可用的精美现成文档。内置的编辑器工具可以即时提供出色的文档。\n*   用于快速测试的现成工具。内置工具也为测试提供了良好的支持。\n*   通过模式拼接为多个微服务提供简单的解决方案。\n\
    *   整体通信效率高于 REST。\n*   内置分页语义。\n*   通过订阅（更准确地说，是 WebSocket）内置对近乎实时消息传递的支持。\n\n\
    图数据结构实际上非常强大，它可以很好地表示连接和嵌套的资源。我们已经通过图数据库看到并享受了它的强大功能。通过 GraphQL，REST API 客户端开始以嵌套形式请求对象图，并且可以获取相关的、嵌套的和连接的资源。让我们详细看看上述优势：\n\
    \n*   精确获取你需要的内容：\n\n在 GraphQL 中，你请求响应中需要的精确属性。然而，在 REST 中，你只能访问一个 URL，并且总是会收到一个固定的响应。\n\
    \n示例：\n\n```\n    query: allPosts {\n    id\n    author\n    title\n    content\n\
    \    }\n    }\n    ```\n\n*   声明式，无过度获取：\n\n想想 REST API 设计，客户端可能最终获取所有属性，而不仅仅是所需的属性。GraphQL\
    \ 引擎默认仅在 HTTP 层执行此操作。这意味着即使你的解析器正在查询完整的表，引擎也只会返回客户端在请求中要求的属性。当某个字段已被弃用，客户端可以简单地在请求中开始忽略该字段时，这种行为非常有用。这确实提供了根据请求结构动态查询和响应的能力。\n\
    \n*   在单个请求中获取多个资源：\n\nGraphQL 允许你在单个请求中查询多个资源。虽然 REST API 首先关注 URL，但 GraphQL\
    \ 也同样关注数据。这最终使你在较慢的网络连接上获得更快的通信优势。\n\n示例：\n\n```\n    query: {\n    allPosts {\n\
    \    id\n    title\n    }\n    allUsers {\n    id\n    name\n    }\n    }\n  \
    \  ```\n\n*   基于模式的 API：\n\n还记得关于 SOAP 与 REST 在契约优先与实现优先上的漫长讨论吗？最终，GraphQL 允许你在\
    \ RESTful 世界中首先定义其基于 SDL 的模式。\n\n示例：\n\n```\n    type Query {\n    user(id: ID!):\
    \ User!\n    }\n    type User {\n    id: ID!\n    email: String!\n    name: String!\n\
    \    }\n    ```\n\n*   单一 API 端点：\n\n基于 REST 的客户端应用程序必须管理和连接到多个 URL，并不断更改 HTTP\
    \ 动词。使用 GraphQL，客户端只需连接到一个端点，并且仅通过 `POST` HTTP 动词。GraphQL 引擎必须将类（解析器）连接到模式中的查询和变更类型，同时支持错误处理。如前所述，按照惯例，所有基于获取（`GET`）的请求应由查询类型中定义的函数处理，而\
    \ `PUT`、`POST`、`DELETE` 操作则由变更类型中定义的函数处理。\n\n*   不再有 API 版本管理的麻烦：\n\n由于 GraphQL\
    \ 应用程序在单个端点和模式上运行，剩下的唯一事情就是将模式中的字段标记为单个 URL 的已弃用。这些已弃用的字段可以被客户端工具跟踪和隐藏。\n\n* \
    \  随时可用的现成文档：\n\n几乎所有 GraphQL 规范实现都提供了一个可视化工具来访问其模式并运行示例查询。在 Java 领域，这个工具被称为 GraphiQL。此工具提供对整个模式的可视化访问，以及注释，这些注释在作为字段描述显示的实际文件中定义。\n\
    \n*   用于快速测试的现成工具：\n\nGraphiQL 可用于对各种模式类型和解析器进行随机测试。只需在内置文件中包含一个依赖项并定义上下文路径即可启用此功能。\n\
    \n*   通过模式拼接为微服务提供简单的解决方案：\n\nGraphQL 有一个内置系统，通过模式拼接的概念来绑定不同的应用程序或服务。\n\n*   整体通信效率高于\
    \ REST：\n\n由于可以组合多个请求，并且客户端可以指定它想要返回哪些属性，通信变得更加容易和快速。\n\n*   内置分页语义：\n\nGraphQL\
    \ 模式定义为在请求中定义分页属性提供了语义。\n\n示例：\n\n```\n    query: allPosts(first: 2, skip: 2)\
    \ {\n    id\n    author\n    title\n    content\n    }\n    }\n    ```\n\n*  \
    \ 订阅：\n\nGraphQL 通过 WebSocket 为实时客户端-服务器通信提供内置支持。用 GraphQL 术语来说，这是通过订阅来处理的。\n"
- fmt: "## Risks and Disadvantages\n\nGraphQL has a few risks to be cautious about\
    \ while choosing it for certain applications:\n\n- Caching\n- Security concerns\n\
    - N+1 problem\n- Error handling by responding with HTTP status codes\n- Overall\
    \ complexity in a big application\n\nLet’s explore these issues in detail:\n\n\
    - **Caching**: REST responses can easily be cached based on different URLs. Since\
    \ GraphQL is based on dynamic, lengthy JSON graphs, it becomes difficult to cache\
    \ them at the network layer. Frameworks like Apollo provide client-side caching\
    \ support, but that may not always be enough.\n\n- **Security concerns**: Since\
    \ GraphQL allows nested queries, the depth of nested resources can cause severe\
    \ load on the server and this can become cyclic as well.\n\n- **N+1 problem**:\
    \ The N+1 problem means that the server executes multiple unnecessary round trips\
    \ to datastores for nested data. Say that a client app has requested to fetch\
    \ list of all authors along with the top 10 posts written by them. If the GraphQL\
    \ resolvers are not optimized, this can end up being one query that fetches all\
    \ the authors and then N number of queries for the list of top posts from all\
    \ those authors.\n\n- **HTTP status codes in responses**: As with RESTful services,\
    \ we have a single `POST`-based endpoint here. We do not have a clear list of\
    \ different endpoints, each having their own HTTP error handling, like `Controller`\
    \ classes in REST. We can do generic error handling but the problem comes when\
    \ we want to return different HTTP status codes for different requests. This can\
    \ make the code more readable at times.\n\n- **Complexity**: Although this removes\
    \ a lot of burden from the client, it does make the server side a bit more complex.\
    \ Since this is based on the graph structure, highly nested requests can become\
    \ quite complex to handle, as they require resolution to the N+1 problem as well.\n\
    \n## GraphQL Java Example\n\nWe will focus on GraphQL development with SpringBoot\
    \ using a schema-first approach. Let’s build an example with the following steps:\n\
    \n1. Build a new Gradle project from `spring.io`.\n2. Create a schema.\n3. Create\
    \ JPA entity models and repositories.\n4. Create input DTOs.\n5. Create the `Query`\
    \ and `Mutation` resolver classes.\n6. Define the application config and do a\
    \ sample run.\n\nLet’s build an application called `eblog-graphql-ch7` with the\
    \ following code structure:\n\n```\n.\n├── build.gradle\n├── eshop.iml\n├── settings.gradle\n\
    └── src\n    └── main\n        ├── java\n        │   └── com\n        │      \
    \ └── example\n        │           └── eblog\n        │               ├── App.java\n\
    \        │               ├── dto\n        │               │   ├── AuthorInputRequest.java\n\
    \        │               │   └── PostInputRequest.java\n        │            \
    \   ├── handler\n        │               │   └── GraphQLConfig.java\n        │\
    \               ├── model\n        │               │   ├── Author.java\n     \
    \   │               │   ├── Post.java\n        │               │   └── Status.java\n\
    \        │               ├── repository\n        │               │   ├── AuthorRepository.java\n\
    \        │               │   └── PostRepository.java\n        │              \
    \ └── resolvers\n        │                   ├── MutationResolver.java\n     \
    \   │                   └── QueryResolver.java\n        └── resources\n      \
    \      ├── application.yml\n            └── schema.graphqls\n```\n\n### Application\
    \ Setup\n\nStart by building a new application called `eblog-graphql-ch7` from\
    \ [`http://start.spring.io/`](http://start.spring.io/) with the following dependencies\
    \ in the `build.gradle` file (see Listing 7-1).\n\n```\nplugins {\n    id 'org.springframework.boot'\
    \ version '2.1.3.RELEASE'\n    id 'java'\n}\napply plugin: 'io.spring.dependency-management'\n\
    apply plugin: 'project-report'\njava {\n    group = 'com.example'\n    version\
    \ = '1.0'\n    sourceCompatibility = JavaVersion.VERSION_1_8\n    targetCompatibility\
    \ = JavaVersion.VERSION_1_8\n}\nbootJar {\n    archieveBaseName = 'eblog-service'\n\
    \    version =  '1.0'\n}\nrepositories {\n    mavenCentral()\n}\ndependencies\
    \ {\n    compile('org.springframework.boot:spring-boot-starter-web')\n    compile('com.graphql-java:graphql-java-tools:5.2.4')\n\
    \    compile('com.graphql-java:graphql-spring-boot-starter:5.0.2')\n    compile('com.graphql-java:graphiql-spring-boot-starter:5.0.2')\n\
    \    compile('org.springframework.boot:spring-boot-starter-data-jpa')\n    compile('mysql:mysql-connector-java:8.0.15')\n\
    \    compile('org.projectlombok:lombok:1.18.6')\n    testCompile('junit:junit:4.12')\n\
    }\n```\n\n**Listing 7-1** The Build File\n\n### Schema File: `resources/schema.graphqls`\n\
    \nGraphQL has its own schema definition language (SDL) that describes the types\
    \ used in a service and defines how those types can be queried. Listing 7-2 shows\
    \ the schema for this example.\n\n```\ntype Post {\n    id: ID!\n    title: String!\n\
    \    content: String!\n    status: Status!\n    author: Author!\n}\ntype Author\
    \ {\n    id: ID!\n    name: String!\n    age: Int\n    posts: [Post]!\n    status:\
    \ Status!\n}\nenum Status {\n    ACTIVE\n    NON_ACTIVE\n}\ninput PostInputRequest\
    \ {\n    title: String!\n    content: String!\n    authorId: Int!\n}\ninput AuthorInputRequest\
    \ {\n    name: String!\n    age: Int\n}\ntype Mutation {\n    newPost(input: PostInputRequest):\
    \ Post!\n    newAuthor(input: AuthorInputRequest): Author!\n}\ntype Query {\n\
    \    recentPosts(limit: Int, offset: Int, orderBy: String): [Post]\n    authorsWithTopPosts:\
    \ [Author]\n}\n```\n\n**Listing 7-2** `resources/schema.graphqls`\n\nNotes:\n\n\
    - We have two data models—`Post` and `Author`—with the respective fields, as mentioned\
    \ in their type definition. We have all standard datatypes supported—`Int`, `String`,\
    \ `Boolean`, `Date`, and `Objects`.\n- The field definition is composed of `field\
    \ name` on the left side and its `type` on the right side of the colon separator,\
    \ such as `{fieldname} : {fieldType}`. The `!` symbol signifies whether the field\
    \ is mandatory. If we put the field in square brackets, it becomes a list like\
    \ `[Post]` is a list of `POST` objects.\n- Enums can also be declared and mentioned\
    \ as the datatype of any field.\n- Input types help define the input request objects\
    \ (or DTOs in technical speak).\n- There are two special types to be defined in\
    \ the GraphQL schema—`Query` and `Mutation`. The `Query` definition is used for\
    \ wiring any functions in code that perform fetch operations on these types. `Mutation`\
    \ is similar, but conventionally it is used only for operations that update these\
    \ types in the system. These both can be referred to as *resolvers*, as they help\
    \ resolve the fields to different user-defined functions at runtime."
  raw: "## Risks and Disadvantages\n\nGraphQL has a few risks to be cautious about\
    \ while choosing it for certain applications:\n\n*   Caching\n\n*   Security concerns\n\
    \n*   N+1 problem\n\n*   Error handling by responding with HTTP status codes\n\
    \n*   Overall complexity in a big application\n\nLet’s explore these issues in\
    \ detail:\n\n*   Caching:\n\n    REST responses can easily be cached based on\
    \ different URLs. Since GraphQL is based on dynamic, lengthy JSON graphs, it becomes\
    \ difficult to cache them at the network layer. Frameworks like Apollo provide\
    \ client-side caching support, but that may not always be enough.\n\n*   Security\
    \ concerns:\n\n    Since GraphQL allows nested queries, the depth of nested resources\
    \ can cause severe load on the server and this can become cyclic as well.\n\n\
    *   N+1 problem:\n\n    The N+1 problem means that the server executes multiple\
    \ unnecessary round trips to datastores for nested data. Say that a client app\
    \ has requested to fetch list of all authors along with the top 10 posts written\
    \ by them. If the GraphQL resolvers are not optimized, this can end up being one\
    \ query that fetches all the authors and then N number of queries for the list\
    \ of top posts from all those authors.\n\n*   HTTP status codes in responses:\n\
    \n    As with RESTful services, we have a single `POST`-based endpoint here. We\
    \ do not have a clear list of different endpoints, each having their own HTTP\
    \ error handling, like `Controller` classes in REST. We can do generic error handling\
    \ but the problem comes when we want to return different HTTP status codes for\
    \ different requests. This can make the code more readable at times.\n\n*   Complexity:\n\
    \n    Although this removes a lot of burden from the client, it does make the\
    \ server side a bit more complex. Since this is based on the graph structure,\
    \ highly nested requests can become quite complex to handle, as they require resolution\
    \ to the N+1 problem as well.\n\n## GraphQL Java Example\n\nWe will focus on GraphQL\
    \ development with SpringBoot using a schema-first approach . Let’s build an example\
    \ with the following steps:\n\n1.  Build a new Gradle project from `spring.io`.\n\
    \n2.  Create a schema.\n\n3.  Create JPA entity models and repositories.\n\n4.\
    \  Create input DTOs.\n\n5.  Create the `Query` and `Mutation` resolver classes.\n\
    \n6.  Define the application config and do a sample run.\n\nLet’s build an application\
    \ called `“”` with the following code structure:\n\n```\n.\n├── build.gradle\n\
    ├── eshop.iml\n├── settings.gradle\n└── src\n└── main\n├── java\n│   └── com\n\
    │       └── example\n│           └── eblog\n│               ├── App.java\n│  \
    \             ├── dto\n│               │   ├── AuthorInputRequest.java\n│    \
    \           │   └── PostInputRequest.java\n│               ├── handler\n│    \
    \           │   └── GraphQLConfig.java\n│               ├── model\n│         \
    \      │   ├── Author.java\n│               │   ├── Post.java\n│             \
    \  │   └── Status.java\n│               ├── repository\n│               │   ├──\
    \ AuthorRepository.java\n│               │   └── PostRepository.java\n│      \
    \         └── resolvers\n│                   ├── MutationResolver.java\n│    \
    \               └── QueryResolver.java\n└── resources\n├── application.yml\n└──\
    \ schema.graphqls\n```\n\n### Application Setup\n\nStart by building a new application\
    \ called `eblog-graphql-ch7` from [`http://start.spring.io/`](http://start.spring.io/)\
    \ with the following dependencies in the `build.gradle` file (see Listing [7-1](#454149_1_En_7_Chapter.xhtml#PC6)).\n\
    \n```\nplugins {\nid 'org.springframework.boot' version '2.1.3.RELEASE'\nid 'java'\n\
    }\napply plugin: 'io.spring.dependency-management'\napply plugin: 'project-report'\n\
    java {\ngroup = 'com.example'\nversion = '1.0'\nsourceCompatibility = JavaVersion.VERSION_1_8\n\
    targetCompatibility = JavaVersion.VERSION_1_8\n}\nbootJar {\narchieveBaseName\
    \ = 'eblog-service'\nversion =  '1.0'\n}\nrepositories {\nmavenCentral()\n}\n\
    dependencies {\ncompile('org.springframework.boot:spring-boot-starter-web')\n\
    compile('com.graphql-java:graphql-java-tools:5.2.4')\ncompile('com.graphql-java:graphql-spring-boot-starter:5.0.2')\n\
    compile('com.graphql-java:graphiql-spring-boot-starter:5.0.2')\ncompile('org.springframework.boot:spring-boot-starter-data-jpa')\n\
    compile('mysql:mysql-connector-java:8.0.15')\ncompile('org.projectlombok:lombok:1.18.6')\n\
    testCompile('junit:junit:4.12')\n}\nListing 7-1\nTh’e Build File\n```\n\n### Schema\
    \ File: Resources/Schema.Graphqls\n\nGraphQL has its own schema definition language\
    \ (SDL) that describes the types used in a service and defines how those types\
    \ can be queried. Listing [7-2](#454149_1_En_7_Chapter.xhtml#PC7) shows the schema\
    \ for this example.\n\n```\ntype Post {\nid: ID!\ntitle: String!\ncontent: String!\n\
    status: Status!\nauthor: Author!\n}\ntype Author {\nid: ID!\nname: String!\nage:\
    \ Int\nposts: [Post]!\nstatus: Status!\n}\nenum Status {\nACTIVE\nNON_ACTIVE\n\
    }\ninput PostInputRequest {\ntitle: String!\ncontent: String!\nauthorId: Int!\n\
    }\ninput AuthorInputRequest {\nname: String!\nage: Int\n}\ntype Mutation {\nnewPost(input:\
    \ PostInputRequest): Post!\nnewAuthor(input: AuthorInputRequest): Author!\n}\n\
    type Query {\nrecentPosts(limit: Int, offset: Int, orderBy: String): [Post]\n\
    authorsWithTopPosts: [Author]\n}\nListing 7-2\nresources/schema.graphqls\n```\n\
    \nNotes:\n\n*   We have two data models—`Post` and `Author`—with the respective\
    \ fields, as mentioned in their type definition. We have all standard datatypes\
    \ supported—`Int`, `String`, `Boolean`, `Date,` and `Objects`.\n\n*   The field\
    \ definition is composed of `field name` on the left side and its `type` on the\
    \ right side of the colon separator, such as `{fieldname} : {fieldType}`. The\
    \ `!` symbol signifies whether the field is mandatory. If we put the field in\
    \ square brackets, it becomes a list like `[Post]` is a list of `POST` objects.\n\
    \n*   Enums can also be declared and mentioned as the datatype of any field.\n\
    \n*   Input types help define the input request objects (or DTOs in technical\
    \ speak).\n\n*   There are two special types to be defined in the GraphQL schema—`Query`\
    \ and `Mutation`. The `Query` definition is used for wiring any functions in code\
    \ that perform fetch operations on these types. `Mutation` is similar, but conventionally\
    \ it is used only for operations that update these types in the system. These\
    \ both can be referred to as *resolvers*, as they help resolve the fields to different\
    \ user-defined functions at runtime."
  trans: "\n## 风险与劣势\n\n在为特定应用选择 GraphQL 时，有几个风险需要谨慎对待：\n\n*   缓存\n*   安全问题\n*   N+1\
    \ 问题\n*   通过 HTTP 状态码进行错误处理\n*   大型应用中的整体复杂性\n\n让我们详细探讨这些问题：\n\n*   **缓存：**\n\n\
    \    REST 响应可以基于不同的 URL 轻松缓存。由于 GraphQL 基于动态、冗长的 JSON 图，在网络层对其进行缓存变得困难。像 Apollo\
    \ 这样的框架提供了客户端缓存支持，但这可能并不总是足够的。\n\n*   **安全问题：**\n\n    由于 GraphQL 允许嵌套查询，嵌套资源的深度可能会给服务器带来严重负载，并且这也可能形成循环。\n\
    \n*   **N+1 问题：**\n\n    N+1 问题意味着服务器为了获取嵌套数据，会执行多次不必要的数据库往返。假设客户端应用请求获取所有作者的列表以及他们各自撰写的\
    \ top 10 文章。如果 GraphQL 解析器没有优化，这最终可能导致一次查询获取所有作者，然后针对这些作者中的每一个，再执行 N 次查询来获取其 top\
    \ 文章列表。\n\n*   **响应中的 HTTP 状态码：**\n\n    与 RESTful 服务一样，我们这里有一个单一的基于 `POST` 的端点。我们没有像\
    \ REST 中的 `Controller` 类那样，拥有一个清晰的、各自具有独立 HTTP 错误处理的不同端点列表。我们可以进行通用的错误处理，但当我们需要为不同的请求返回不同的\
    \ HTTP 状态码时，问题就出现了。这有时可能会使代码更具可读性。\n\n*   **复杂性：**\n\n    虽然这减轻了客户端的很多负担，但它确实使服务端变得稍微复杂一些。由于它基于图结构，高度嵌套的请求处理起来会变得相当复杂，因为它们还需要解决\
    \ N+1 问题。\n\n## GraphQL Java 示例\n\n我们将专注于使用 schema-first 方法，结合 SpringBoot 进行 GraphQL\
    \ 开发。让我们按照以下步骤构建一个示例：\n\n1.  从 `spring.io` 构建一个新的 Gradle 项目。\n2.  创建 schema。\n\
    3.  创建 JPA 实体模型和仓库。\n4.  创建输入 DTO。\n5.  创建 `Query` 和 `Mutation` 解析器类。\n6.  定义应用配置并进行示例运行。\n\
    \n让我们构建一个名为 `“”` 的应用，其代码结构如下：\n\n```\n.\n├── build.gradle\n├── eshop.iml\n├──\
    \ settings.gradle\n└── src\n    └── main\n        ├── java\n        │   └── com\n\
    \        │       └── example\n        │           └── eblog\n        │       \
    \        ├── App.java\n        │               ├── dto\n        │            \
    \   │   ├── AuthorInputRequest.java\n        │               │   └── PostInputRequest.java\n\
    \        │               ├── handler\n        │               │   └── GraphQLConfig.java\n\
    \        │               ├── model\n        │               │   ├── Author.java\n\
    \        │               │   ├── Post.java\n        │               │   └── Status.java\n\
    \        │               ├── repository\n        │               │   ├── AuthorRepository.java\n\
    \        │               │   └── PostRepository.java\n        │              \
    \ └── resolvers\n        │                   ├── MutationResolver.java\n     \
    \   │                   └── QueryResolver.java\n        └── resources\n      \
    \      ├── application.yml\n            └── schema.graphqls\n```\n\n### 应用设置\n\
    \n首先从 [`http://start.spring.io/`](http://start.spring.io/) 构建一个名为 `eblog-graphql-ch7`\
    \ 的新应用，并在 `build.gradle` 文件中添加以下依赖项（参见清单 7-1）。\n\n```\nplugins {\n    id 'org.springframework.boot'\
    \ version '2.1.3.RELEASE'\n    id 'java'\n}\napply plugin: 'io.spring.dependency-management'\n\
    apply plugin: 'project-report'\njava {\n    group = 'com.example'\n    version\
    \ = '1.0'\n    sourceCompatibility = JavaVersion.VERSION_1_8\n    targetCompatibility\
    \ = JavaVersion.VERSION_1_8\n}\nbootJar {\n    archieveBaseName = 'eblog-service'\n\
    \    version =  '1.0'\n}\nrepositories {\n    mavenCentral()\n}\ndependencies\
    \ {\n    compile('org.springframework.boot:spring-boot-starter-web')\n    compile('com.graphql-java:graphql-java-tools:5.2.4')\n\
    \    compile('com.graphql-java:graphql-spring-boot-starter:5.0.2')\n    compile('com.graphql-java:graphiql-spring-boot-starter:5.0.2')\n\
    \    compile('org.springframework.boot:spring-boot-starter-data-jpa')\n    compile('mysql:mysql-connector-java:8.0.15')\n\
    \    compile('org.projectlombok:lombok:1.18.6')\n    testCompile('junit:junit:4.12')\n\
    }\n清单 7-1\n构建文件\n```\n\n### Schema 文件：Resources/Schema.Graphqls\n\nGraphQL 有自己的\
    \ schema 定义语言（SDL），用于描述服务中使用的类型，并定义如何查询这些类型。清单 7-2 展示了此示例的 schema。\n\n```\ntype\
    \ Post {\n    id: ID!\n    title: String!\n    content: String!\n    status: Status!\n\
    \    author: Author!\n}\ntype Author {\n    id: ID!\n    name: String!\n    age:\
    \ Int\n    posts: [Post]!\n    status: Status!\n}\nenum Status {\n    ACTIVE\n\
    \    NON_ACTIVE\n}\ninput PostInputRequest {\n    title: String!\n    content:\
    \ String!\n    authorId: Int!\n}\ninput AuthorInputRequest {\n    name: String!\n\
    \    age: Int\n}\ntype Mutation {\n    newPost(input: PostInputRequest): Post!\n\
    \    newAuthor(input: AuthorInputRequest): Author!\n}\ntype Query {\n    recentPosts(limit:\
    \ Int, offset: Int, orderBy: String): [Post]\n    authorsWithTopPosts: [Author]\n\
    }\n清单 7-2\nresources/schema.graphqls\n```\n\n注意：\n\n*   我们有两个数据模型——`Post` 和 `Author`，它们各自拥有类型定义中提到的字段。我们支持所有标准数据类型——`Int`、`String`、`Boolean`、`Date`\
    \ 和 `Objects`。\n*   字段定义由冒号分隔符左侧的 `字段名` 和右侧的 `类型` 组成，例如 `{fieldname} : {fieldType}`。`!`\
    \ 符号表示该字段是否为必填项。如果将字段放在方括号中，它就变成了一个列表，例如 `[Post]` 是 `POST` 对象的列表。\n*   也可以声明枚举，并将其作为任何字段的数据类型。\n\
    *   输入类型有助于定义输入请求对象（或者用技术术语来说，就是 DTO）。\n*   在 GraphQL schema 中需要定义两种特殊类型——`Query`\
    \ 和 `Mutation`。`Query` 定义用于连接代码中执行这些类型获取操作的任何函数。`Mutation` 类似，但按惯例仅用于更新系统中这些类型的操作。这两者都可以被称为*解析器*，因为它们有助于在运行时将字段解析为不同的用户定义函数。\n"
