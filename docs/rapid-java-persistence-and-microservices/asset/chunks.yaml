    `alter` 命令，而不会创建表，除非将 `ddl-auto` 设置为 `create` 或 `create-drop`。


    *   通过在 `class` 上使用 Lombok 注解，我们减少了 getter、setter、equals、`hashCode` 和 `toString`
    方法的样板代码，使其非常易读。


