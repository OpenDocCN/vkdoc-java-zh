    ## API 网关


    API 网关是微服务架构中的一个流行概念。如果任何系统中存在多个微服务，为所有传入请求设置一个中央入口点可以在几个关键的横切方面带来好处：


    *   路由


    *   集中认证


    *   通过基本认证、OAuth、JWT、API 密钥等方式进行授权


    *   SSL 终止


    *   速率限制


    *   缓存和监控


    有两个流行的开源 API 网关，它们用 Java 编写，并且可以轻松与 Spring 框架集成：


    *   Netflix OS Zuul


    *   Spring Cloud Gateway


    此外，还有更多流行的选择，例如 Mashery、Apigee、Kong、WSO2、3scale 以及来自云服务提供商的网关。让我们来探索 Zuul 网关，因为它是一个常见的选择，并且是
    Netflix OSS 伞形项目的一部分。我们将使用以下代码结构创建一个新的微服务（`gateway-service`）：


    ```

    .

    ├── build.gradle

    ├── gradle

    │   └── wrapper

    │       ├── gradle-wrapper.jar

    │       └── gradle-wrapper.properties

    ├── gradlew

    ├── gradlew.bat

    └── src

    └── main

    ├── java

    │   └── com

    │       └── example

    └── resources

    ├── application.properties

    └── application.yml

    ```


    我们将在以下小节中逐步介绍网关的创建过程。


    ### 应用程序设置


    从 [`http://www.spring.io`](http://www.spring.io) 创建一个名为 `gateway-service` 的新应用程序，其
    `build.gradle` 文件中的依赖项如清单 6-30 所示。


    ```

    bootJar {

    baseName = ''admin-service''

    version =  ''1.0''

    }

    dependencies {

    compile("org.springframework.boot:spring-boot-starter-web")

    compile(''org.springframework.cloud:spring-cloud-starter-netflix-zuul:

    2.1.1.RELEASE'')

    compile("org.projectlombok:lombok:1.18.6")

    }

    dependencyManagement {

    imports {

    mavenBom "org.springframework.cloud:spring-cloud- dependencies:Greenwich.SR1"

    }

    }

    清单 6-30

    build.gradle 文件

    ```


    ### 配置


    理想情况下，`gateway-service` 应该运行在负载均衡器上，以便解决扩展和故障转移问题。清单 6-31 定义了此服务的配置，并在注释中进行了说明。


    ```

    application.yml

    spring:

    application:

    name: zuul

    boot:

    admin:

    client:

    url: http://localhost:7777/admin

    server:

    port: 9999

    management:

    endpoints:

    web:

    exposure:

    include: "*"

    zuul:

    ignoredServices: ''*''

    routes:

    config:

    path: /config/**

    url: http://localhost:8888/config/

    eshop:

    path: /eshop/**

    url: http://localhost:8081/eshop/

    inventory:

    path: /inventory/**

    url: http://localhost:8082/inventory/

    admin:

    path: /admin/**

    url: http://localhost:7777/admin/

    清单 6-31

    Application.yml

    ```


    注释：


    *   我们已经看到了此服务最常见的用途是将请求路由到不同的域名 URL。


    *   `zuul.routes.config.*` 属性根据上下文路径指向相应的 URL。


    ### 引导


    我们需要在 `Application` 类顶部添加另一个名为 `@EnableZuulProxy` 的注解，以启用 Zuul 功能（参见清单 6-32）。


    ```

    package com.example.eshop.gateway;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.cloud.netflix.zuul.EnableZuulProxy;

    @SpringBootApplication

    @EnableZuulProxy

    public class ZuulApp {

    public static void main(String[] args) {

    SpringApplication.run(ZuulApp.class, args);

    }

    }

    清单 6-32

    Application 类

    ```

