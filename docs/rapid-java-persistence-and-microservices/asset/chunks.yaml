    ### Eshop 应用程序


    该微服务拥有允许客户查看产品列表和下单的端点。理想情况下，在企业级设置中，您应该为客户管理、产品目录和订单管理设置不同的服务。我们将定义一个 `TestController`，借助一些业务服务来展示示例订单流程。


    这些服务中最重要的是 `OrderService`，它将与另一个微服务（Inventory Service）通信，然后根据响应决定哪些产品可用。如果某个产品不可用，`OrderService`
    会执行事务并返回订单对象及其在 header 中的位置。`CustomerService` 和 `ProductService` 包含创建示例客户和产品的方法。


    为了与库存服务通信，`Eshop` 可以采用多种方法：


    *   Netflix OSS – 使用 REST Template 的 Eureka Client


    Eureka 客户端库通过名为 `eureka.client.serviceUrl.defaultZone` 的配置属性提供查找功能。这提供了所有实例的列表，可用于连接到其中一个实例。


    *   Netflix OSS – 使用 REST Template 的 Ribbon


    Ribbon 也提供对 Eureka 服务器的配置、查找和连接管理。Ribbon 与 Eureka Client 的不同之处在于，它基于几种算法提供自动负载均衡，而不是手动从列表中选择一个。


    *   Netflix OSS – Feign


    这是一个基于接口的客户端，其目标 URI 以声明方式注解在接口上。Feign 内部仅使用 Ribbon API。


    *   Spring Cloud API 抽象通过 `@LoadBalanced` 注解以及 `DiscoveryClient` 类，为基于 EurekaClient
    和 Ribbon 的方法提供了简单的解决方案。`EurekaClient` 内部使用 Jersey API，而 Spring Cloud 的 `org.springframework.cloud.client.discovery.DiscoveryClient`
    可用于 Spring 首选的 HTTP 通信 API。


    我们将在服务部分讨论来自 Spring Cloud `@LoadBalanced` 注解和 Feign 的简单选项。我们需要以下代码结构来构建此应用程序：


