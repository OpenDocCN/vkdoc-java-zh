    Notes:


    - We implemented `GraphQLQueryResolver` and `GraphQLMutationResolver` as the marker
    interfaces.

    - The code is pretty straightforward. In the `QueryResolver` class, the `recentPosts()`
    method provides paginated `POST` objects as the responses. In the `authorWithTopPosts`
    method, we are returning the object graph of the authors along with their recent
    top post. These are created as nested objects.

    - In the `MutationResolver` class, we have two methods to create `POST` and `Author`
    objects from their corresponding input objects from the users.

    - The GraphQL Engine validates the input object fields before delegating control
    to the implementation methods.

    - The error handling can be customized by declaring a Spring Bean of type `GraphQLErrorHandler`
    and customizing it. This is shown in Listing [7-6](#454149_1_En_7_Chapter.xhtml#PC11).


    ```

    package com.example.eblog.handler;

    import graphql.ExceptionWhileDataFetching;

    import graphql.GraphQLError;

    import graphql.servlet.GraphQLErrorHandler;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import java.util.List;

    import java.util.stream.Collectors;

    @Configuration

    public class GraphQLConfig  {

    @Bean

    public GraphQLErrorHandler errorHandler() {

    return new GraphQLErrorHandler() {

    @Override

    public List processErrors(List

    errors) {

    List clientErrors = errors.stream()

    .filter(this::isClientError)

    .collect(Collectors.toList());

    // do something with the client side errors

    List serverErrors = errors.stream()

    .filter(e -> !isClientError(e))

    .collect(Collectors.toList());

    // do something with the server side errors

    return errors;

    }

    protected boolean isClientError(GraphQLError error) {

    return !(error instanceof ExceptionWhileDataFetching ||

    error instanceof Throwable);

    }

    };

    }

    }

