- fmt: '### Handling Array Types in PostgreSQL


    PostgreSQL allows table columns to be defined as variable-length multidimensional
    arrays. Arrays of any built-in or user-defined base type, enum type, composite
    type, range type, or domain can be created. With Spring Data JPA, this can be
    implemented with Hibernate’s `UserType`, just like we did to enable enums in Java.
    Let’s see an example, with only the minimal code snippet (see Listing [3-18](#454149_1_En_3_Chapter.xhtml#PC25)).


    ```

    public class PgArrayType implements UserType {

    @Override

    public Object nullSafeGet(ResultSet resultSet, String[] names,

    SharedSessionContractImplementor sharedSessionContractImplementor, Object o) throws

    HibernateException, SQLException {

    if (resultSet.wasNull()) {

    return null;

    }

    if (resultSet.getArray(names[0]) == null) {

    return new String[0];

    }

    Array array = resultSet.getArray(names[0]);

    @SuppressWarnings("unchecked")

    T javaArray = (T) array.getArray();

    return javaArray;

    }

    @Override

    public void nullSafeSet(PreparedStatement preparedStatement, Object value,

    int index, SharedSessionContractImplementor sharedSessionContractImplementor)
    throws

    HibernateException, SQLException {

    Connection connection = preparedStatement.getConnection();

    if (value == null) {

    preparedStatement.setNull(index, SQL_TYPES[0]);

    } else {

    @SuppressWarnings("unchecked")

    T castObject = (T) value;

    Array array = connection.createArrayOf(JDBCType.VARCHAR.getName(), (Object[])
    castObject);

    preparedStatement.setArray(index, array);

    }

    }

    }

    Listing 3-18

    PgArrayType Definition

    ```


    There are a few other methods I skipped since they look very similar to `PgEnumType`,
    such as `assemble()` and `disassemble()`. The full working source code can be
    downloaded from the GitHub repo.


    We also need to add an array type column in the `POST` table and add a `@Type`
    annotation to the top of the entity field (see Listing [3-19](#454149_1_En_3_Chapter.xhtml#PC26)).


    ```

    create table if not exists post  (

    id serial primary key not null,

    blog_id int,

    title varchar(150),

    content text,

    "user" int,

    tags varchar[],

    postStatus post_status_enum default ''ACTIVE''

    );

    public class Post implements Serializable {

    @Id

    @GeneratedValue(strategy = GenerationType.IDENTITY)

    private Long id;

    @Type(type = "com.example.blog_app.constants.PgArrayType")

    private String[] tags;

    }

    Listing 3-19

    Schema and Entity Changes for Array Types

    ```


    These code arrays can seamlessly be stored and retrieved from PostgreSQL tables.
    To query these, native SQL will be required because this is a database-specific
    feature and JPA does not support it yet. There are various specific array functions
    provided by PostgreSQL to query them in SQL. Let’s extend our `BlogApp` test case
    (see Listing [3-20](#454149_1_En_3_Chapter.xhtml#PC27)) to test this.


    ```

    public class BlogJpaAppTests extends BlogTestBase {

    @Test

    @Transactional

    @Commit

    public void testForArrayTypes() {

    Post post = Post.builder()

    .title("Sample Title for arrays")

    .content("Sample content for arrays")

    .postStatus(PostStatus.ACTIVE)

    .tags(new String[] {"sample", "text"})

    .build();

    postRepository.save(post);

    }

    }

    Listing 3-20

    TestCase and Sample SQL to Query Arrays

    ```


    The sample SQL to query this array would be as follows:


    ```

    select * from post where tags @> ''{text}''::varchar[];

    ```


    Here is the output:


    ```

    Name         |Value                    |

    -----------  |-------------------------|

    id           |43                       |

    blog_id      |                         |

    title        |Sample Title for arrays  |

    content      |Sample content for arrays|

    user         |                         |

    tags         |{sample,text}            |

    poststatus   |ACTIVE                   |

    post_status  |ACTIVE                   |

    author_id    |                         |

    ```


    ### JPQL Queries and Pagination with Spring Data JPA


    With Spring Data JPA, hardly any extra effort is required to run JPQL (Java Persistence
    Query Language) queries and map the results back to lists, entity objects, or
    optional return types. In order to run a custom query over a repository method,
    a `@Query` annotation is provided by Spring (see Listing [3-21](#454149_1_En_3_Chapter.xhtml#PC30)).
    Any valid JPQL can be passed as a value for the annotation.


    ```

    @Query("Select p.id, p.title from Post p")

    Optional> findPostWithIdAndTitle();

    Listing 3-21

    JPQL Query Example

    ```


    In order to provide pagination support, a `PageRequest` class, which is the implementation
    of the `Pageable` interface, is provided. This `PageRequest` object takes the
    page number and page size and sorts the direction and sort field.


    The `findAll()` method in the `PagingAndSortingRepository` interface accepts this
    and returns a `Page` class return type, which can further return a `List` type
    through the `getContent()` method.


    ```

    postRepository.findAll(PageRequest.of(page: 1,size: 10)).getContent();

    ```


    The `Pageable` interface is injectable into any custom repository method and can
    directly return a `List` return type. As an example, see Listing [3-22](#454149_1_En_3_Chapter.xhtml#PC32).


    ```

    @Query("Select p.id, p.title from Post p")

    List findPostWithIdAndTitle(PageRequest pageRequest);

    Listing 3-22

    Pageable Example

    ```


    The `PageRequest` class contains a `Sort` class, which further contains the `Direction`
    and `Order` static inner classes. Next, the previous navigation is available in
    the `Page` class.'
