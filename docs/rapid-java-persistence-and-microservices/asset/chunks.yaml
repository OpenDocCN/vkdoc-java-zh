- fmt: "# Important Concepts\n\nFor developers coming from REST API design, there\
    \ are a couple of interesting new concepts in GraphQL that simplify the development\
    \ process:\n\n- **Single endpoint**: GraphQL application works on a single `/GraphQL`\
    \ endpoint and various requests are routed to registered resolver classes.\n-\
    \ **POST-based requests**: All requests are `POST`-based and have to be sent in\
    \ an SDL complaint format, which can be quite descriptive, lengthy, and nested.\n\
    - **Schema based**: GraphQL allows you to define a JSON-like schema for API clients\
    \ through SDL. The schema or contract-first mode helps ensure better coordination\
    \ between the UI and the backend teams.\n- **Query**: All `GET` requests that\
    \ do not intend to create or update any resources are called query.\n- **Mutations**:\
    \ All `POST`, `PUT`, and `DELETE` requests are mutations in GraphQL.\n- **Resolvers**:\
    \ All custom registered functions that the GraphQL Engine or framework can call\
    \ are called resolvers.\n- **Schema stitching**: This is the technique of creating\
    \ a single unified schema from multiple schemas. This is useful when different\
    \ microservices have their own schemas and a front service can provide a combined\
    \ view for all of them. This way, the front microservice can act as a gateway.\
    \ This feature does not exist in Java APIs, but is expected to be added soon.\n\
    - **Subscriptions**: This feature allows Websockets programming to provide near\
    \ real-time responses to the clients in push and pull models.\n\n## How It Works\n\
    \nWe are looking at the simplified step-by-step process of creating a GraphQL\
    \ service:\n\n1. Start by creating a JSON schema (the schema-first approach).\
    \ Otherwise, the schema can be generated from the objects (code-first approach)\
    \ later.\n2. Create a series of resolvers (implementation classes) based on the\
    \ schema that’s defined when implementing queries and mutations.\n3. Run and test\
    \ the application by using its built-in web-based client or explorer (`GraphiQL`\
    \ with Java).\n4. Connect to the GraphQL REST endpoint as a client.\n5. Combine,\
    \ if required, multiple GraphQL endpoint-based microservices into one through\
    \ the schema stitching process and then connect to it as usual.\n\n## Advantages\
    \ Over REST\n\nGraphQL focuses primarily on the client side problems of accessing\
    \ hundreds of different RESTful API URLs, thus wasting lots of bandwidth. GraphQL\
    \ solves a number of problems:\n\n- Fetch exactly what you need.\n- Declarative\
    \ and no over fetching.\n- Get multiple resources in a single request.\n- Schema-based\
    \ API that acts as a contract between the client and the service.\n- Single API\
    \ endpoint, thus there is no hassle of keeping too many URLs in the client code.\n\
    - No more API versions hassle. The deprecated fields can be marked as `@deprecated`\
    \ in the schema with a description. The tools can start showing it deprecated\
    \ and clients can also start ignoring it.\n- Nice ready-made documentation on-the-go.\
    \ The built-in editor tools provide excellent documentation on-the-fly.\n- Ready-made\
    \ tool for rapid-fire testing. The built-in tools provide good support for testing\
    \ as well.\n- An easy solution for multiple microservices through schema stitching.\n\
    - Overall communication is more efficient than REST.\n- Built-in semantics for\
    \ pagination.\n- Built-in support for near real-time messaging through subscriptions\
    \ (more precisely, Websockets).\n\nThe Graph data structure is actually quite\
    \ powerful and it can easily represent the connected and nested resources very\
    \ well. We have already seen and enjoyed its power through graph databases. With\
    \ GraphQL, REST API clients start requesting the object graph in the nested form\
    \ and can fetch the related, nested, and connected resources. Let’s look at the\
    \ preceding advantages in detail:\n\n### Fetch exactly what you need\n\nIn GraphQL,\
    \ you request the exact attributes you need in the response. In REST, however,\
    \ you can only visit an URL and will always receive a fixed response.\n\nExample:\n\
    \n```\nquery: allPosts {\n    id\n    author\n    title\n    content\n}\n```\n\
    \n### Declarative and no over fetching\n\nThink of the REST API design, where\
    \ clients may end up fetching all attributes instead of just the required ones.\
    \ The GraphQL Engine by default does this at the HTTP layer only. That means even\
    \ if your resolvers are querying full tables, the engine will return the attributes\
    \ that are asked by the client in the request. This behavior can be useful when\
    \ a field has been deprecated and the clients can simply start ignoring that field\
    \ in the request. This does provide the capability to query and respond back dynamically\
    \ based on the request structure.\n\n### Get many resources in a single request\n\
    \nGraphQL allows you to query multiple resources in a single request. While REST\
    \ APIs focus on URLs first, GraphQL focuses on the data as well. This ultimately\
    \ gives you the advantage of faster communication over slower network connections.\n\
    \nExample:\n\n```\nquery: {\n    allPosts {\n        id\n        title\n    }\n\
    \    allUsers {\n        id\n        name\n    }\n}\n```\n\n### Schema-based API\n\
    \nRemember the long discussions around SOAP versus REST over contract first versus\
    \ implementation first? Finally, GraphQL allows you to define its SDL-based schema\
    \ first in a RESTful world.\n\nExample:\n\n```\ntype Query {\n    user(id: ID!):\
    \ User!\n}\ntype User {\n    id: ID!\n    email: String!\n    name: String!\n\
    }\n```\n\n### Single API endpoint\n\nREST-based client apps have to manage and\
    \ connect to multiple URLs and keep changing the HTTP verbs. With GraphQL, clients\
    \ have to connect to a single endpoint and through just the `POST` HTTP verb.\
    \ The GraphQL Engine has to wire the classes (resolvers) against the query and\
    \ mutation types in the schema along with supporting error-handling. As mentioned,\
    \ by convention, all fetch (`GET`)-based requests should be handled by functions\
    \ defined in the query type and `PUT`, `POST`, `DELETE` operations are handled\
    \ by functions defined in the mutations type.\n\n### No more API versions hassle\n\
    \nSince the GraphQL application works on a single endpoint and a schema, the only\
    \ thing left is to mark fields in the schema as deprecated for a single URL. These\
    \ deprecated fields can be tracked and hidden by client tools.\n\n### Ready-made\
    \ documentation on the go\n\nNearly all GraphQL specification implementations\
    \ provide a visual tool to access its schema and run sample queries. Within the\
    \ Java space, this tool is called `GraphiQL`. This tool provides visual access\
    \ to whole schemas along with comments, defined in the actual file being shown\
    \ as the field description.\n\n### Ready-made tool for rapid-fire testing\n\n\
    `GraphiQL` can be used to do random testing for various schema types and resolvers.\
    \ This can simply be enabled by including a dependency in the built-in file and\
    \ defining the context path.\n\n### Provides an easy solution for microservices\
    \ through schema stitching\n\nGraphQL has a built-in system of binding different\
    \ applications or services through the concept of schema stitching.\n\n### Overall\
    \ communication is more efficient than REST\n\nSince multiple requests can be\
    \ combined and the client can specify which attributes it wants back, communication\
    \ becomes easier and faster.\n\n### Built-in semantics for pagination\n\nThe GraphQL\
    \ schema definition provides semantics for defining pagination attributes in a\
    \ request.\n\nExample:\n\n```\nquery: allPosts(first: 2, skip: 2) {\n    id\n\
    \    author\n    title\n    content\n}\n```\n\n### Subscriptions\n\nGraphQL provides\
    \ built-in support for real-time client server communication via Websockets. In\
    \ GraphQL terms, this is handled through subscriptions."
