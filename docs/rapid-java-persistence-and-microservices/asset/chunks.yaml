    \ Science + Business Media Finance Inc (SSBM Finance Inc)。SSBM Finance Inc 是特拉华州的一家公司。\n\
    \n*献给我敬爱的古鲁吉*\n\n致谢\n\n我要感谢 Packt 的整个团队，感谢他们为实现我的梦想所提供的所有支持。特别感谢审稿人 Manuel 和 Chris，他们帮助了我，并将我的写作塑造成专业水准。感谢\
    \ Steve 给我这个机会，以及 Mark 在整个过程中耐心地支持我。\n\n我要感谢我的妻子 Divya，她给予我灵感、信念和不断的鼓励，让我能够追求写作的热情。我还要感谢我的父亲\
    \ Lt. Shri R. S. Malhotra 和母亲 Kailash Malhotra，他们给予我无条件的支持，使我能够将所有业余时间投入到写作中。最后，衷心感谢我的古鲁吉，他启发我将从这个世界学到的一切，再次分享给世界。\n\
    \n### 关于作者\n\n### 关于技术审稿人\n\n# 第一部分 Java 生态系统回顾与持久化快速入门\n\n# 1. 引言\n\n欢迎阅读《快速掌握\
    \ Java 持久化与微服务》。在过去的几年里，我们看到新技术层出不穷。尤其是对于新手来说，成为一名全能型开发者，甚至决定先学习哪种编程语言，都变得愈发困难。程序员通常希望学习像\
    \ Java 这样的语言，以便能在任何领域工作并做任何事情，包括 Web 开发、大数据、移动开发、机器学习等。这并不容易，而一些使这一目标更加复杂的问题包括：\n\
    \n*   每种编程语言都有许多框架和技术。\n\n*   竞争激烈，上市时间非常短暂。\n\n*   对可扩展性和数据存储的需求日益增长且永无止境。\n\n\
    *   复杂的部署、发布管理和自动化影响着我们的决策。\n\n本书通过多种框架介绍基于 Java 的后端开发，这应能使开发变得更加简单、快速和高效。本书面向那些不耐烦的开发者与架构师，他们不想阅读过多的理论、数百个概念和重复的文字。相反，本书是一个快速工具，通过直击要点的解释和具体的实际案例，帮助你快速重温概念。\n\
    \n在进入本书主体部分之前，本章将探讨 Java 的一些优势，解释本书提供的内容，涵盖 Java 当前面临的问题，并讨论本书涉及的各种实际问题及解决方案。\n\
    \n## 为什么选择 Java 和本书\n\n那么，是什么让 Java 成为一个优秀的开发解决方案，为什么开发者应该选择这本书？\n\n对于第一个问题，在我看来，答案包括\
    \ Java 的以下优势：\n\n*   企业级业务应用开发。\n\n*   长期可靠且保持稳定的解决方案。\n\n*   卓越的可读性和可维护性。\n\n\
    *   非常强大的社区，为你提供强大的支持及问题解决方案。\n\n*   语言中的语法快捷方式可能仅在短期内有所帮助。\n\n鉴于 Java 的这些优势，以下是阅读本书的几个充分理由：\n\
    \n*   我们通过 Java 以简化形式涵盖了所有数据访问变体。这些变体包括通过 ORM、JDBC 和 NoSQL 访问关系型数据库。\n\n*   作为架构师，你将希望快速重温所有关键和高级概念，以便做出更好的设计决策并解决开发问题。\n\
    \n*   一些开发者正在转向 Java 以外的语言进行开发，以及 Spring 以外的框架。他们认为 Java 变得过于庞大，而像 Spring Data\
    \ JPA、Hibernate 等框架开发速度缓慢。由于学习难度大，上市时间增加。我们将通过快速概览 JPA 及各种必要解决方案的简短形式来简化这一过程。\n\
    \n*   互联网上充斥着许多误导性的示例，它们使用过时的方法将 Java 与其他语言进行比较。本书采用快速笔记式的格式，也将有助于指导你。\n\n*  \
    \ 几年前，开发者仅凭 Java 知识在面试中脱颖而出就面临困难。现在让我们思考一下现状，并考虑所有开发者需要掌握的知识：\n    *   Java 及其所有概念和\
    \ API。\n\n    *   最新框架及其优缺点。\n\n    *   SQL 和关系型数据库概念。\n\n    *   NoSQL 概念及其生产环境问题。\n\
    \n    *   企业级和全文搜索相关解决方案，如 ElasticSearch 和 Solr。\n\n    *   大数据和机器学习概念。\n\n  \
    \  *   响应式开发。\n\n    *   从 API 到中间层及数据层的安全机制。\n\n    *   无头计算或架构。\n\n为什么不能通过一种语言为所有这些领域和层次提供解决方案？我们都需要快速的解决方案和带示例的代码。网络上有很多信息，但并非没有问题：\n\
    \n*   许多在线文章已经过时。它们可能会带你进行不必要的尝试和实验。\n\n*   它们通常包含不必要的解释。我们需要直击要点的快速解决方案。\n\n\
    考虑到 Java 8 及其他语言框架（如 Django）的成功，编写最少的代码行数是每个人的需求。即使这些快捷方式看起来粗糙或带有主观色彩，但在当今世界，这有时正是我们所需要的。即使概念很好，我们也不想为了完成一件小事而浏览成千上万个概念。\n"
- fmt: "# Current Issues with the Java Ecosystem\n\nAlong with the benefits of the\
    \ wide and mature Java ecosystem, there are a few challenges to be aware of. The\
    \ following list outlines the most important challenges:\n\n- Java has become\
    \ huge. From Java 8 to Java 11, there are many new concepts and API facilities\
    \ and they all take time to master.\n- There are many frameworks to choose from,\
    \ for every layer and system.\n- Along with Java, there are many JVM language\
    \ options, including Scala, Closure, Groovy, Kotlin, and Jython.\n- These are\
    \ some important aspects of the current state of Java persistence to consider:\n\
    \  - There is a large set of options to choose from for fresh development.\n \
    \ - For an early stage developer, options start with `JDBC`. There are also various\
    \ lightweight libraries, such as `Apache DBUtils`, `Sql2o`, `Yank`, `JDBI`, and\
    \ the `Spring JDBC` template.\n  - Next we have the ORM frameworks, such as `Hibernate`\
    \ and `EclipseLink`, and data-mapping persistence frameworks like `MyBatis`.\n\
    \  - Next comes Spring-supported J2EE specification APIs, such as `EJB` and `JPA`.\n\
    \  - We also have a few smarter options today, such as `JOOQ`, `Querydsl`, and\
    \ the `Spring Data` abstraction layer.\n\n## Real-World Problems and Solutions\n\
    \nWe will see in this book all the real-world practical problems from an architect’s\
    \ experience. I will try to guide you, with my experience, on how to get started.\
    \ The book goes through all the necessary concepts and shows solutions to complex\
    \ problems.\n\nHere is a brief history of the major changes in tech stacks for\
    \ enterprise development that I’ve encountered in my 14 years of experience:\n\
    \n- It all started with C, C++, VB, messaging systems (like the MQ series), and\
    \ databases (RDBMS). Messaging is probably the oldest technology I have seen.\
    \ It is still the most popular way for scaling your architecture.\n- Java, messaging,\
    \ applets, etc. Java came to the rescue for enterprise web development through\
    \ J2EE and JMS.\n- Java Web Services (SOAP) and MVC frameworks. Struts, SOAP,\
    \ Spring, etc., made things easier.\n- REST services. Many more MVC and web frameworks,\
    \ and SOA expansion. The SOA world had two sides—through web services and through\
    \ MOM (message oriented middleware, such as IBM Message Broker, Tibco Rendezvous,\
    \ etc.).\n- Portal technologies (especially Weblogic Portal) and Content Management\
    \ Systems (Documentum and Filenet).\n- Upgraded open source messaging systems\
    \ (AMQP, ActiveMQ, RabbitMQ, ZeroMQ, etc.) and frameworks (Protobuf, etc.), plus\
    \ more web frameworks (Play, JSF, etc.).\n- HTML5 (Bootstrap, AngularJS, Ember.js,\
    \ etc.). This includes Thymeleaf and other templating technologies, CSS3, Bootstrap\
    \ and JavaScript world evolution, NoSQL databases, functional programming (Scala,\
    \ etc.), and cloud technologies (such as AWS).\n- NodeJS, Python, etc. This includes\
    \ Polyglot programming, deployment evolution through Docker, Chef, etc., and the\
    \ analytics revolution through Big Data.\n- Reactive programming, HTTP2, WebSockets,\
    \ etc.\n- Microservices with polyglot systems and cloud-automated deployments.\
    \ There are too many technologies and possibilities right now, but these include\
    \ RESTful microservices, headless architectures/function as a service, event driven/reactive\
    \ services, and WebSocket-based connected services.\n- GraphQL has now started\
    \ disrupting the RESTful world. However, there are many caveats and the community\
    \ is looking for other possibilities as well.\n\n## Summary\n\nHaving described\
    \ the state of the Java ecosystem and the overall problems due to the vast variety\
    \ of technologies that exist, we will start our journey in this book by introducing\
    \ different frameworks for developing microservices as well as bigger applications\
    \ in the next chapter. After that, we will take a deep dive into the most important\
    \ layer of any application—persistence. After that, we will see all the challenges\
    \ in the microservices architecture in Part II of the book.\n\n# 2. Developing\
    \ Microservices with Java\n\nMost development happening today is through a microservices\
    \ architecture. In the microservices architectural approach, an application is\
    \ developed through a bunch of small modular services. Each of these services\
    \ run as a separate process and communicates with others via different patterns.\
    \ This is not a new invention and we have seen it already with different nomenclature,\
    \ for example, with SOA and MOM. When many of the web giants—including Amazon,\
    \ Netflix, Twitter, and PayPal—successfully adopted the microservice architecture,\
    \ it started gaining popularity.\n\nThere are a number of reasons for the rapid\
    \ evolution of this architectural style:\n\n- Legacy systems are very hard to\
    \ rebuild. They have to be broken down into domains or functional areas and new\
    \ pluggable systems have to replace the legacy slowly.\n- Code versioning and\
    \ deployment issues when multiple features have to be developed.\n- It’s easier\
    \ to evolve a system with smaller independent services rather than a single giant\
    \ application.\n- Experimentation and diversity of tech stacks is easier with\
    \ microservices. Code for different services can be written in different languages.\n\
    - Emerging technologies have made us rethink the way we build software systems.\n\
    - The microservice architecture enables easier continuous delivery and it’s easy\
    \ to understand as it follows the single responsibility principle.\n- The services\
    \ are aligned to business domains or features.\n- It’s hard to test a single big\
    \ application. When there are multiple system components, you can focus more on\
    \ testing critical ones first.\n- For a faster time-to-market, we need rapid-fire\
    \ development of features in parallel. This helps the progress be more visible.\n\
    \n## Different Ways of Creating Microservices\n\nWhen we talk about microservices,\
    \ we often talk about RESTful endpoints focused on a particular feature. However,\
    \ developers have many different ways of creating microservices. There are a couple\
    \ of ways to create microservices in the Java world, as follows:\n\n- Independent\
    \ RESTful endpoint-based applications as services related to a particular feature\
    \ in the system.\n- Headless service development such as AWS Lambda, also referred\
    \ to as Function as a Service (FaaS).\n- Messaging or event-based services such\
    \ as clustered Vert.x vertices (Reactive framework in Java) that are deployed\
    \ on different machines and communicate via event busses.\n- Should OSGi modules\
    \ also be treated as microservices? OSGi bundles are also sometimes referred as\
    \ services running within a single JVM and a single constraint within their classloader\
    \ boundaries."
  raw: "## Current Issues with the Java Ecosystem\n\nAlong with the benefits of the\
    \ wide and mature Java ecosystem, there are a few challenges to be aware of. The\
    \ following list outlines the most important challenges:\n\n*   Java has become\
    \ huge. From Java 8 to Java 11, there are many new concepts and API facilities\
    \ and they all take time to master.\n\n*   There are many frameworks to choose\
    \ from, for every layer and system.\n\n*   Along with Java, there are many JVM\
    \ language options, including Scala, Closure, Groovy, Kotlin, and Jython.\n\n\
    *   These are some important aspects of the current state of Java persistence\
    \ to consider:\n    *   There is a large set of options to choose from for fresh\
    \ development.\n\n    *   For an early stage developer, options start with JDBC.\
    \ There are also various lightweight libraries, such as Apache DBUtils, Sql2o,\
    \ Yank, JDBI, and the Spring JDBC template.\n\n    *   Next we have the ORM frameworks,\
    \ such as Hibernate and EclipseLink, and data-mapping persistence frameworks like\
    \ MyBatis.\n\n    *   Next comes Spring-supported J2EE specification APIs, such\
    \ as EJB and JPA.\n\n    *   We also have a few smarter options today, such as\
    \ JOOQ, Querydsl, and the Spring Data abstraction layer.\n\n## Real-World Problems\
    \ and Solutions\n\nWe will see in this book all the real-world practical problems\
    \ from an architect’s experience. I will try to guide you, with my experience,\
    \ on how to get started. The book goes through all the necessary concepts and\
    \ shows solutions to complex problems.\n\nHere is a brief history of the major\
    \ changes in tech stacks for enterprise development that I’ve encountered in my\
    \ 14 years of experience:\n\n*   It all started with C, C++, VB, messaging systems\
    \ (like the MQ series), and databases (RDBMS). Messaging is probably the oldest\
    \ technology I have seen. It is still the most popular way for scaling your architecture.\n\
    \n*   Java, messaging, applets, etc. Java came to the rescue for enterprise web\
    \ development through J2EE and JMS.\n\n*   Java Web Services (SOAP) and MVC frameworks.\
    \ Struts, SOAP, Spring, etc., made things easier.\n\n*   REST services. Many more\
    \ MVC and web frameworks, and SOA expansion. The SOA world had two sides—through\
    \ web services and through MOM (message oriented middleware, such as IBM Message\
    \ Broker, Tibco Rendezvous, etc.).\n\n*   Portal technologies (especially Weblogic\
    \ Portal) and Content Management Systems (Documentum and Filenet).\n\n*   Upgraded\
    \ open source messaging systems (AMQP, ActiveMQ, RabbitMQ, ZeroMQ, etc.) and frameworks\
    \ (Protobuf, etc.), plus more web frameworks (Play, JSF, etc.).\n\n*   HTML5 (Bootstrap,\
    \ AngularJS, Ember.js, etc.). This includes Thymeleaf and other templating technologies,\
    \ CSS3, Bootstrap and JavaScript world evolution, NoSQL databases, functional\
    \ programming (Scala, etc.), and cloud technologies (such as AWS).\n\n*   NodeJS,\
    \ Python, etc. This includes Polyglot programming, deployment evolution through\
    \ Docker, Chef, etc., and the analytics revolution through Big Data.\n\n*   Reactive\
    \ programming, HTTP2, WebSockets, etc.\n\n*   Microservices with polyglot systems\
    \ and cloud-automated deployments. There are too many technologies and possibilities\
    \ right now, but these include RESTful microservices, headless architectures/function\
    \ as a service, event driven/reactive services, and WebSocket-based connected\
    \ services.\n\n*   GraphQL has now started disrupting the RESTful world. However,\
    \ there are many caveats and the community is looking for other possibilities\
    \ as well.\n\n## Summary\n\nHaving described the state of the Java ecosystem and\
    \ the overall problems due to the vast variety of technologies that exist, we\
    \ will start our journey in this book by introducing different frameworks for\
    \ developing microservices as well as bigger applications in the next chapter.\
    \ After that, we will take a deep dive into the most important layer of any application—*persistence*.\
    \ After that, we will see all the challenges in the microservices architecture\
    \ in Part II of the book.\n\n# 2. Developing Microservices with Java\n\nMost development\
    \ happening today is through a *microservices architecture*. In the microservices\
    \ architectural approach, an application is developed through a bunch of small\
    \ modular services. Each of these services run as a separate process and communicates\
    \ with others via different patterns. This is not a new invention and we have\
    \ seen it already with different nomenclature, for example, with SOA and MOM.\
    \ When many of the web giants—including Amazon, Netflix, Twitter, and PayPal—successfully\
    \ adopted the microservice architecture, it started gaining popularity.\n\nThere\
    \ are a number of reasons for the rapid evolution of this architectural style:\n\
    \n*   Legacy systems are very hard to rebuild. They have to be broken down into\
    \ domains or functional areas and new pluggable systems have to replace the legacy\
    \ slowly.\n\n*   Code versioning and deployment issues when multiple features\
    \ have to be developed.\n\n*   It’s easier to evolve a system with smaller independent\
    \ services rather than a single giant application.\n\n*   Experimentation and\
    \ diversity of tech stacks is easier with microservices. Code for different services\
    \ can be written in different languages.\n\n*   Emerging technologies have made\
    \ us rethink the way we build software systems.\n\n*   The microservice architecture\
    \ enables easier continuous delivery and it’s easy to understand as it follows\
    \ the single responsibility principle.\n\n*   The services are aligned to business\
    \ domains or features.\n\n*   It’s hard to test a single big application. When\
    \ there are multiple system components, you can focus more on testing critical\
    \ ones first.\n\n*   For a faster time-to-market, we need rapid-fire development\
    \ of features in parallel. This helps the progress be more visible.\n\n## Different\
    \ Ways of Creating Microservices\n\nWhen we talk about microservices, we often\
    \ talk about RESTful endpoints focused on a particular feature. However, developers\
    \ have many different ways of creating microservices. There are a couple of ways\
    \ to create microservices in the Java world, as follows:\n\n*   Independent RESTful\
    \ endpoint-based applications as services related to a particular feature in the\
    \ system.\n\n*   Headless service development such as AWS Lambda, also referred\
    \ to as Function as a Service (FaaS).\n\n*   Messaging or event-based services\
    \ such as clustered Vert.x vertices (Reactive framework in Java) that are deployed\
    \ on different machines and communicate via event busses.\n\n*   Should OSGi modules\
    \ also be treated as microservices? OSGi bundles are also sometimes referred as\
    \ services running within a single JVM and a single constraint within their classloader\
    \ boundaries."
  trans: "\n## Java 生态系统当前面临的问题\n\n在享受广泛且成熟的 Java 生态系统带来的好处的同时，也存在一些需要注意的挑战。以下列表概述了其中最重要的挑战：\n\
    \n*   Java 已变得十分庞大。从 Java 8 到 Java 11，引入了许多新概念和 API 工具，掌握它们都需要时间。\n\n*   对于每一层和每个系统，都有众多框架可供选择。\n\
    \n*   除了 Java 之外，还有许多 JVM 语言选项，包括 Scala、Clojure、Groovy、Kotlin 和 Jython。\n\n* \
    \  以下是当前 Java 持久化状态需要考虑的一些重要方面：\n    *   对于新开发项目，有大量的选项可供选择。\n\n    *   对于初级开发者，选项从\
    \ JDBC 开始。此外还有各种轻量级库，例如 Apache DBUtils、Sql2o、Yank、JDBI 和 Spring JDBC 模板。\n\n \
    \   *   接下来是 ORM 框架，例如 Hibernate 和 EclipseLink，以及数据映射持久化框架，例如 MyBatis。\n\n   \
    \ *   然后是 Spring 支持的 J2EE 规范 API，例如 EJB 和 JPA。\n\n    *   如今我们还有一些更智能的选项，例如 JOOQ、Querydsl\
    \ 和 Spring Data 抽象层。\n\n## 现实世界的问题与解决方案\n\n在本书中，我们将从架构师的经验出发，探讨所有现实世界中的实际问题。我将尝试根据我的经验，指导您如何入门。本书将涵盖所有必要的概念，并展示复杂问题的解决方案。\n\
    \n以下是我在 14 年经验中遇到的企业开发技术栈主要变革的简要历史：\n\n*   一切始于 C、C++、VB、消息系统（如 MQ 系列）和数据库（RDBMS）。消息传递可能是我见过的最古老的技术。它至今仍是扩展架构最流行的方法。\n\
    \n*   Java、消息传递、小程序等。Java 通过 J2EE 和 JMS 拯救了企业 Web 开发。\n\n*   Java Web 服务（SOAP）和\
    \ MVC 框架。Struts、SOAP、Spring 等让事情变得更简单。\n\n*   REST 服务。更多的 MVC 和 Web 框架，以及 SOA\
    \ 的扩展。SOA 世界有两个方面——通过 Web 服务和通过 MOM（面向消息的中间件，例如 IBM Message Broker、Tibco Rendezvous\
    \ 等）。\n\n*   门户技术（特别是 Weblogic Portal）和内容管理系统（Documentum 和 Filenet）。\n\n*   升级的开源消息系统（AMQP、ActiveMQ、RabbitMQ、ZeroMQ\
    \ 等）和框架（Protobuf 等），以及更多的 Web 框架（Play、JSF 等）。\n\n*   HTML5（Bootstrap、AngularJS、Ember.js\
    \ 等）。这包括 Thymeleaf 和其他模板技术、CSS3、Bootstrap 和 JavaScript 世界的演进、NoSQL 数据库、函数式编程（Scala\
    \ 等）以及云技术（如 AWS）。\n\n*   NodeJS、Python 等。这包括多语言编程、通过 Docker、Chef 等实现的部署演进，以及通过大数据实现的分析革命。\n\
    \n*   响应式编程、HTTP2、WebSockets 等。\n\n*   采用多语言系统的微服务和云自动化部署。目前技术和可能性太多，但包括 RESTful\
    \ 微服务、无头架构/函数即服务、事件驱动/响应式服务，以及基于 WebSocket 的连接服务。\n\n*   GraphQL 现在已经开始颠覆 RESTful\
    \ 世界。然而，存在许多注意事项，社区也在寻找其他可能性。\n\n## 总结\n\n在描述了 Java 生态系统的现状以及由于技术种类繁多带来的整体问题之后，我们将在本书中开启旅程，在下一章介绍用于开发微服务以及更大规模应用的不同框架。之后，我们将深入探讨任何应用中最重要的层——*持久化*。接着，我们将在本书的第二部分看到微服务架构中的所有挑战。\n\
    \n# 2. 使用 Java 开发微服务\n\n当今大多数开发都是通过*微服务架构*进行的。在微服务架构方法中，应用程序通过一组小型模块化服务进行开发。这些服务中的每一个都作为独立进程运行，并通过不同的模式与其他服务通信。这并非新发明，我们之前已经以不同的名称见过它，例如\
    \ SOA 和 MOM。当许多网络巨头——包括 Amazon、Netflix、Twitter 和 PayPal——成功采用微服务架构后，它开始流行起来。\n\
    \n这种架构风格快速演进的原因有很多：\n\n*   遗留系统很难重建。它们必须被分解为领域或功能区域，并且新的可插拔系统必须慢慢取代遗留系统。\n\n*\
    \   当需要开发多个功能时，会出现代码版本控制和部署问题。\n\n*   使用较小的独立服务来演进系统比使用单个巨型应用程序更容易。\n\n*   使用微服务进行实验和采用多样化的技术栈更容易。不同服务的代码可以用不同的语言编写。\n\
    \n*   新兴技术让我们重新思考构建软件系统的方式。\n\n*   微服务架构支持更轻松的持续交付，并且由于遵循单一职责原则，易于理解。\n\n*   服务与业务领域或功能对齐。\n\
    \n*   测试单个大型应用程序很困难。当有多个系统组件时，您可以更专注于首先测试关键组件。\n\n*   为了更快地推向市场，我们需要并行地快速开发功能。这有助于让进展更加可见。\n\
    \n## 创建微服务的不同方式\n\n当我们谈论微服务时，我们通常谈论的是专注于特定功能的 RESTful 端点。然而，开发人员有许多不同的方式来创建微服务。在\
    \ Java 世界中，有几种创建微服务的方法，如下所示：\n\n*   作为与系统中特定功能相关的服务，基于独立的 RESTful 端点的应用程序。\n\n\
    *   无头服务开发，例如 AWS Lambda，也称为函数即服务（FaaS）。\n\n*   消息或事件驱动的服务，例如部署在不同机器上并通过事件总线通信的集群化\
    \ Vert.x 顶点（Java 中的响应式框架）。\n\n*   OSGi 模块是否也应被视为微服务？OSGi 包有时也被称为在单个 JVM 内运行的服务，并受其类加载器边界内的单一约束。\n"
- fmt: "# Various Microservices Libraries in Java\n\nWhen migrating from a monolithic\
    \ to a microservices architecture, there are a number of concepts, problems, and\
    \ technology options available that can make it difficult to think about the technology\
    \ roadmap. As a result, people sometimes overthink the situation and overdevelop\
    \ the solution when designing a new application in a microservice architecture.\n\
    \nFor example, leaders sometimes want their teams to apply all the principles\
    \ of the microservices architecture just by referring to the articles or innovations\
    \ of bigger successful companies. A very common example within the Java world\
    \ is implementing Netflix OSS tools in a small set of services. Architects often\
    \ wonder if all these tools are required for a system with just a handful of services.\
    \ Within Netflix, these frameworks handle huge loads with complicated system requirements\
    \ and hundreds of microservices. If you have a system of 8-10 services, you should\
    \ be a little cautious when choosing libraries during the initial development.\n\
    \nThe Spring framework in the Java ecosystem has the most extensive support for\
    \ microservices libraries. Table [2-1](#454149_1_En_2_Chapter.xhtml#Tab1) identifies\
    \ a number of libraries with use cases and conceptual needs that require specific\
    \ handling when dealing with microservices.\n\n**Table 2-1** Useful Libraries\
    \ and Example Use Cases\n\n| Library | Use Cases | Examples of Tools |\n| ---\
    \ | --- | --- |\n| Configuration Management | Distributed and secure configuration\
    \ management | Spring Cloud Config, Consul, Vault |\n| Service Registry and Discovery\
    \ | Location service nodes based on registered service names | Spring Cloud -\
    \ Netflix Eureka, Consul |\n| Dynamic Routing and Load Balancer | Load balancing\
    \ client requests with a live dashboard of nodes | Netflix Eureka and Netflix\
    \ Ribbon |\n| Distributed Tracing | Tracing the request end-to-end, if request\
    \ flows through a couple of services | Spring Sleuth - Zipkin, ELK, Dapper |\n\
    | System, JVM, and API Monitoring | Performance degradation, risk and crash analysis\
    \ | Spring Boot Admin, Datadog, New Relic |\n| Security | Password and digest\
    \ auth, OAUTH and JWT, SAML, Single Sign On (SSO), Magic Links, Captcha, CORS,\
    \ OWASP (Injection, XSS, CSRF, etc.), Social login integrations, SSL based authentication\
    \ | Apache Shiro (a general library), Spring Security for Spring, pac4j for the\
    \ Spark framework, Dropwizard has its own classes for authentication and authorization\
    \ |\n| Logs | Centralized logs management for distributed services | Spring Sleuth,\
    \ ELK (ElasticSearch, Logstash, Kibana), Splunk |\n| Circuit Breaker | Avoiding\
    \ continuous failure of service-to-service calls through a backup endpoint | Netflix\
    \ Hystrix, Resilience4j, Sentinel |\n| API Gateway | Acting as an entry point\
    \ and handling security, URL naming concerns, etc. | Zuul, Nginx, cloud-provided\
    \ API gateways |\n| Documentation | Service versions, field-wise descriptions,\
    \ and dependencies | Swagger, RAML, GraphQL |\n\nHere are a few more questions\
    \ to ask when building your microservice approach:\n\n- If you have a small number\
    \ of services with simple use cases (basically a simple business logic and mostly\
    \ CRUD), consider whether you need tools from Netflix OSS, like `Eureka`, `Ribbon`,\
    \ `Feign`, `Zuul`, and `Hystrix`.\n- How do you define the service boundaries?\
    \ If they are too tiny and there are too many, can comfortably combine some of\
    \ them based on functionality?\n- What stage of development are you in? Do you\
    \ need to focus more on product engineering, infrastructure management, or on\
    \ scaling your application? These are all different and require special focus.\n\
    - Are you ready for new technology offerings as they come? WebSockets, RSocket,\
    \ and GraphQL are the latest examples.\n\n## Microservices with Various Java Frameworks\n\
    \nA new generation of Java frameworks enables you to easily package a complete\
    \ web app, with the embedded container of your choice in a self-runnable JAR file.\
    \ This was a revolutionary movement from heavyweight J2EE containers to a lightweight\
    \ smaller version. We will look at a couple of frameworks, starting with simple\
    \ ones, up to a Spring Boot example. The Spring Framework has been around for\
    \ over a decade and has become nearly the de facto standard framework for developing\
    \ Java applications.\n\nThere are three major frameworks I see in use today:\n\
    \n- Spark ( [`http://sparkjava.com/`](http://sparkjava.com/) )\n- Dropwizard (\
    \ [`https://www.dropwizard.io/1.3.8/docs/`](https://www.dropwizard.io/1.3.8/docs/)\
    \ )\n- Spring Boot ( [`http://spring.io/`](http://spring.io/) )\n\nWe consider\
    \ each of these frameworks in the following sections. You will need Java 8 or\
    \ higher with Gradle 5 to run all the examples. I have specifically kept the examples\
    \ based on Java 8—with minimal use of functional programming and few newer language\
    \ constructs such as Lambdas and Streams API—to keep the readability verbose and\
    \ easy. I also show all the `import` statements in the text for full clarity.\n\
    \n### Spark Framework\n\nFor newcomers, I recommend starting with the Spark Framework.\
    \ This is the quickest way to build and play with RESTful services. As per the\
    \ introduction on the website:\n\n> “Spark Framework is a simple and expressive\
    \ Java/Kotlin web framework DSL built for rapid development. Spark’s intention\
    \ is to provide an alternative for Kotlin/Java developers that want to develop\
    \ their web applications as expressive as possible and with minimal boilerplate.\
    \ With a clear philosophy Spark is designed not only to make you more productive,\
    \ but also to make your code better under the influence of Spark’s sleek, declarative\
    \ and expressive syntax.”\n\nYou just need to create a Maven- or Gradle-based\
    \ project with a single Gradle dependency as `com.sparkjava:spark-core:2.8.0`\
    \ in `build.gradle` (see Listing [2-1](#454149_1_En_2_Chapter.xhtml#PC2)). Beyond\
    \ that, with a simple five lines of code, you can run and access the URL at `http://localhost:4567/hello`.\n\
    \nA Gradle application can be created from the command line using a simple command,\
    \ as follows:\n\n```\nplugins {\n    id 'java'\n}\njava {\n    group = 'com.example'\n\
    \    version = '1.0'\n    sourceCompatibility = JavaVersion.VERSION_11\n    targetCompatibility\
    \ = JavaVersion.VERSION_11\n}\nrepositories {\n    mavenCentral()\n}\ndependencies\
    \ {\n    compile \"com.sparkjava:spark-core:2.8.0\"\n}\n```\n\n**Listing 2-1**\
    \ `Build.gradle`\n\n```\ngradle init --type java-application\n```\n\nAs the next\
    \ step, run the class shown in Listing [2-2](#454149_1_En_2_Chapter.xhtml#PC3),\
    \ and your first microservice is up and running.\n\n```\nimport static spark.Spark.*;\n\
    public class HelloWorld {\n    public static void main(String[] args) {\n    \
    \    get(\"/hello\", (req, res) -> \"Hello World\");\n    }\n}\n```\n\n**Listing\
    \ 2-2** Bootstrapping Code\n\nYou can quickly implement all other HTTP methods\
    \ very easily, as follows:\n\n```\nget(\"/\", (request, response) -> {\n    return\
    \ \"Hello World\";\n});\npost(\"/\", (request, response) -> {\n    // businessService.createResource(request.getInput(\"\
    input\"));\n});\nput(\"/\", (request, response) -> {\n    // businessService.updateResource(request.getInput(\"\
    input\"));\n});\ndelete(\"/\", (request, response) -> {\n    // businessService.deleteResource(request.getInput(\"\
    input\"));\n});\n```\n\nAlthough this looks clean, beyond this point, you may\
    \ need extra libraries to support other complex application needs. Spark is a\
    \ wonderful and clean Java framework, but it requires much more work beyond just\
    \ creating a good RESTful layer. This has integration with the Spring Framework\
    \ also, but that is an extra burden on top of another framework.\n\nFor data access,\
    \ this framework promotes using the `sql2o` library. `Yank` and `JDBI` could also\
    \ be used. You can start creating simple applications—either REST-based or MVC\
    \ with support—for nearly all templating engines like Thymeleaf and Handlebars."
  raw: '## Various Microservices Libraries in Java


    When migrating from a monolithic to a microservices architecture, there are a
    number of concepts, problems, and technology options available that can make it
    difficult to think about the technology roadmap. As a result, people sometimes
    overthink the situation and overdevelop the solution when designing a new application
    in a microservice architecture.


    For example, leaders sometimes want their teams to apply all the principles of
    the microservices architecture just by referring to the articles or innovations
    of bigger successful companies. A very common example within the Java world is
    implementing Netflix OSS tools in a small set of services. Architects often wonder
    if all these tools are required for a system with just a handful of services.
    Within Netflix, these frameworks handle huge loads with complicated system requirements
    and hundreds of microservices. If you have a system of 8-10 services, you should
    be a little cautious when choosing libraries during the initial development.


    The Spring framework in the Java ecosystem has the most extensive support for
    microservices libraries. Table [2-1](#454149_1_En_2_Chapter.xhtml#Tab1) identifies
    a number of libraries with use cases and conceptual needs that require specific
    handling when dealing with microservices.


    Table 2-1


    Useful Libraries and Example Use Cases


    | Library | Use Cases | Examples of Tools |

    | --- | --- | --- |

    | Configuration Management | Distributed and secure configuration management |
    Spring Cloud Config, Consul, Vault |

    | Service Registry and Discovery | Location service nodes based on registered
    service names | Spring Cloud - Netflix Eureka, Consul |

    | Dynamic Routing and Load Balancer | Load balancing client requests with a live
    dashboard of nodes | Netflix Eureka and Netflix Ribbon |

    | Distributed Tracing | Tracing the request end-to-end, if request flows through
    a couple of services | Spring Sleuth - Zipkin, ELK, Dapper |

    | System, JVM, and API Monitoring | Performance degradation, risk and crash analysis
    | Spring Boot Admin, Datadog, New Relic |

    | Security | Password and digest authOAUTH and JWTSAMLSingle Sign On (SSO)Magic
    LinksCaptchaCORSOWASP (Injection, XSS, CSRF, etc.)Social login integrationsSSL
    based authentication | Apache Shiro ( a general library), Spring Security for
    Spring, pac4j for the Spark frameworkDropwizard has its own classes for authentication
    and authorization |

    | Logs | Centralized logs management for distributed services | Spring Sleuth,
    ELK (ElasticSearch, Logstash, Kibana), Splunk |

    | Circuit Breaker | Avoiding continuous failure of service-to-service calls through
    a backup endpoint | Netflix Hystrix, Resilience4j, Sentinel |

    | API Gateway | Acting as an entry point and handling security, URL naming concerns,
    etc. | Zuul, Nginx, cloud-provided API gateways |

    | Documentation | Service versions, field-wise descriptions, and dependencies
    | Swagger, RAML, GraphQL |


    Here are a few more questions to ask when building your microservice approach:


    *   If you have a small number of services with simple use cases (basically a
    simple business logic and mostly CRUD), consider whether you need tools from Netflix
    OSS, like Eureka, Ribbon, Feign, Zuul, and Hystrix.


    *   How do you define the service boundaries? If they are too tiny and there are
    too many, can comfortably combine some of them based on functionality?


    *   What stage of development are you in? Do you need to focus more on product
    engineering, infrastructure management, or on scaling your application? These
    are all different and require special focus.


    *   Are you ready for new technology offerings as they come? WebSockets, RSocket,
    and GraphQL are the latest examples.


    ## Microservices with Various Java Frameworks


    A new generation of Java frameworks enables you to easily package a complete web
    app, with the embedded container of your choice in a self-runnable JAR file. This
    was a revolutionary movement from heavyweight J2EE containers to a lightweight
    smaller version. We will look at a couple of frameworks, starting with simple
    ones, up to a Spring Boot example. The Spring Framework has been around for over
    a decade and has become nearly the de facto standard framework for developing
    Java applications.


    There are three major frameworks I see in use today:


    *   Spark ( [`http://sparkjava.com/`](http://sparkjava.com/) )


    *   Dropwizard ( [`https://www.dropwizard.io/1.3.8/docs/`](https://www.dropwizard.io/1.3.8/docs/)
    )


    *   Spring Boot ( [`http://spring.io/`](http://spring.io/) )


    We consider each of these frameworks in the following sections. You will need
    Java 8 or higher with Gradle 5 to run all the examples. I have specifically kept
    the examples based on Java 8—with minimal use of functional programming and few
    newer language constructs such as Lambdas and Streams API—to keep the readability
    verbose and easy. I also show all the `import` statements in the text for full
    clarity.


    ### Spark Framework


    For newcomers, I recommend starting with the Spark Framework. This is the quickest
    way to build and play with RESTful services. As per the introduction on the website:


    > *“Spark Framework is a simple and expressive Java/Kotlin web framework DSL built
    for rapid development. Spark’s intention is to provide an alternative for Kotlin/Java
    developers that want to develop their web applications as expressive as possible
    and with minimal boilerplate. With a clear philosophy Spark is designed not only
    to make you more productive, but also to make your code better under the influence
    of Spark’s sleek, declarative and expressive syntax.”*


    You just need to create a Maven- or Gradle-based project with a single Gradle
    dependency as `com.sparkjava:spark-core:2.8.0` in `build.gradle` (see Listing
    [2-1](#454149_1_En_2_Chapter.xhtml#PC2)). Beyond that, with a simple five lines
    of code, you can run and access the URL at `http://localhost:4567/hello`.


    A Gradle application can be created from the command line using a simple command,
    as follows:


    ```

    plugins {

    id ''java''

    }

    java {

    group = ''com.example''

    version = ''1.0''

    sourceCompatibility = JavaVersion.VERSION_11

    targetCompatibility = JavaVersion.VERSION_11

    }

    repositories {

    mavenCentral()

    }

    dependencies {

    compile "com.sparkjava:spark-core:2.8.0"

    }

    Listing 2-1

    Build.gradle

    ```


    ```

    gradle init --type java-application

    ```


    As the next step, run the class shown in Listing [2-2](#454149_1_En_2_Chapter.xhtml#PC3),
    and your first microservice is up and running.


    ```

    import static spark.Spark.*;

    public class HelloWorld {

    public static void main(String[] args) {

    get("/hello", (req, res) -> "Hello World");

    }

    }

    Listing 2-2

    Bootstrapping Code

    ```


    You can quickly implement all other HTTP methods very easily, as follows:


    ```

    get("/", (request, response) -> {

    return “Hello World”;

    });

    post("/", (request, response) -> {

    // businessService.createResource(request.getInput(“input”));

    });

    put("/", (request, response) -> {

    // businessService.updateResource(request.getInput(“input”));

    });

    delete("/", (request, response) -> {

    // businessService.deleteResource(request.getInput(“input”));

    });

    ```


    Although this looks clean, beyond this point, you may need extra libraries to
    support other complex application needs. Spark is a wonderful and clean Java framework,
    but it requires much more work beyond just creating a good RESTful layer. This
    has integration with the Spring Framework also, but that is an extra burden on
    top of another framework.


    For data access, this framework promotes using the `sql2o` library. Yank and JDBI
    could also be used. You can start creating simple applications—either REST-based
    or MVC with support—for nearly all templating engines like Thymeleaf and Handlebars.'
  trans: '

    ## Java 中的各类微服务库


    从单体架构迁移到微服务架构时，会涉及众多概念、问题和技术选项，这可能会让技术路线图的规划变得困难。因此，在设计微服务架构的新应用时，人们有时会过度思考，并过度开发解决方案。


    例如，领导者有时希望团队仅通过参考大型成功公司的文章或创新，就能应用微服务架构的所有原则。在 Java 世界中，一个非常常见的例子是在少量服务中实现 Netflix
    OSS 工具。架构师们常常疑惑，对于一个只有几个服务的系统，是否真的需要所有这些工具。在 Netflix 内部，这些框架处理着海量负载、复杂的系统需求以及数百个微服务。如果你的系统只有
    8-10 个服务，那么在初始开发阶段选择库时应该稍微谨慎一些。


    Java 生态系统中的 Spring 框架对微服务库提供了最广泛的支持。表 2-1 列出了一些库及其用例和概念需求，这些在处理微服务时需要特别关注。


    **表 2-1**


    **有用的库及示例用例**


    | 库 | 用例 | 工具示例 |

    | --- | --- | --- |

    | 配置管理 | 分布式且安全的配置管理 | Spring Cloud Config, Consul, Vault |

    | 服务注册与发现 | 基于注册的服务名称定位服务节点 | Spring Cloud - Netflix Eureka, Consul |

    | 动态路由与负载均衡器 | 通过实时节点仪表板对客户端请求进行负载均衡 | Netflix Eureka 和 Netflix Ribbon |

    | 分布式追踪 | 如果请求流经多个服务，则进行端到端请求追踪 | Spring Sleuth - Zipkin, ELK, Dapper |

    | 系统、JVM 和 API 监控 | 性能下降、风险及崩溃分析 | Spring Boot Admin, Datadog, New Relic |

    | 安全 | 密码和摘要认证、OAUTH 和 JWT、SAML、单点登录 (SSO)、魔法链接、验证码、CORS、OWASP（注入、XSS、CSRF 等）、社交登录集成、基于
    SSL 的认证 | Apache Shiro（通用库）、Spring Security（用于 Spring）、pac4j（用于 Spark 框架）、Dropwizard
    拥有自己的认证和授权类 |

    | 日志 | 分布式服务的集中式日志管理 | Spring Sleuth, ELK (ElasticSearch, Logstash, Kibana), Splunk
    |

    | 断路器 | 通过备用端点避免服务间调用持续失败 | Netflix Hystrix, Resilience4j, Sentinel |

    | API 网关 | 作为入口点，处理安全、URL 命名等问题 | Zuul, Nginx, 云服务商提供的 API 网关 |

    | 文档 | 服务版本、字段级描述和依赖关系 | Swagger, RAML, GraphQL |


    在构建微服务方案时，还有几个问题需要思考：


    *   如果你的服务数量少且用例简单（基本上是简单的业务逻辑和大部分 CRUD 操作），请考虑是否需要 Netflix OSS 中的工具，例如 Eureka、Ribbon、Feign、Zuul
    和 Hystrix。


    *   你如何定义服务边界？如果服务边界划分得太细、数量太多，能否根据功能将其中一些服务合理地合并？


    *   你处于开发的哪个阶段？是需要更专注于产品工程、基础设施管理，还是应用扩展？这些阶段各不相同，需要特别关注。


    *   你是否准备好迎接新技术？WebSockets、RSocket 和 GraphQL 是最新的例子。


    ## 使用不同 Java 框架的微服务


    新一代的 Java 框架使您能够轻松地将完整的 Web 应用打包成一个可自运行的 JAR 文件，其中包含您选择的嵌入式容器。这是从重量级 J2EE 容器向轻量级小型版本的一次革命性转变。我们将从简单的框架开始，逐步深入到
    Spring Boot 示例，来探讨几个框架。Spring 框架已经存在了十多年，几乎已成为开发 Java 应用的事实标准框架。


    目前我看到有三种主要框架在使用：


    *   Spark ( [`http://sparkjava.com/`](http://sparkjava.com/) )

    *   Dropwizard ( [`https://www.dropwizard.io/1.3.8/docs/`](https://www.dropwizard.io/1.3.8/docs/)
    )

    *   Spring Boot ( [`http://spring.io/`](http://spring.io/) )


    我们将在以下各节中逐一讨论这些框架。你需要 Java 8 或更高版本以及 Gradle 5 来运行所有示例。我特意将示例基于 Java 8——尽量减少函数式编程的使用以及
    Lambdas 和 Streams API 等较新的语言结构——以保持代码的可读性清晰易懂。为了清晰起见，我还在文本中展示了所有 `import` 语句。


    ### Spark 框架


    对于新手，我建议从 Spark 框架开始。这是构建和使用 RESTful 服务最快的方式。根据网站上的介绍：


    > *“Spark 框架是一个简单且富有表现力的 Java/Kotlin Web 框架 DSL，专为快速开发而构建。Spark 的意图是为那些希望以尽可能富有表现力且最少样板代码的方式开发
    Web 应用的 Kotlin/Java 开发者提供一种替代方案。凭借清晰的理念，Spark 的设计不仅是为了提高你的生产力，更是为了让你在 Spark 简洁、声明式和富有表现力的语法影响下，编写出更好的代码。”*


    你只需要创建一个基于 Maven 或 Gradle 的项目，并在 `build.gradle` 中添加一个 Gradle 依赖项 `com.sparkjava:spark-core:2.8.0`（参见代码清单
    2-1）。除此之外，只需简单的五行代码，你就可以运行并通过 `http://localhost:4567/hello` 访问该 URL。


    可以使用如下简单命令从命令行创建一个 Gradle 应用：


    ```

    plugins {

    id ''java''

    }

    java {

    group = ''com.example''

    version = ''1.0''

    sourceCompatibility = JavaVersion.VERSION_11

    targetCompatibility = JavaVersion.VERSION_11

    }

    repositories {

    mavenCentral()

    }

    dependencies {

    compile "com.sparkjava:spark-core:2.8.0"

    }

    代码清单 2-1

    Build.gradle

    ```


    ```

    gradle init --type java-application

    ```


    下一步，运行代码清单 2-2 中所示的类，你的第一个微服务就启动并运行了。


    ```

    import static spark.Spark.*;

    public class HelloWorld {

    public static void main(String[] args) {

    get("/hello", (req, res) -> "Hello World");

    }

    }

    代码清单 2-2

    启动代码

    ```


    你可以非常轻松地快速实现所有其他 HTTP 方法，如下所示：


    ```

    get("/", (request, response) -> {

    return “Hello World”;

    });

    post("/", (request, response) -> {

    // businessService.createResource(request.getInput(“input”));

    });

    put("/", (request, response) -> {

    // businessService.updateResource(request.getInput(“input”));

    });

    delete("/", (request, response) -> {

    // businessService.deleteResource(request.getInput(“input”));

    });

    ```


    虽然这看起来很简洁，但除此之外，你可能需要额外的库来支持其他复杂的应用需求。Spark 是一个出色且简洁的 Java 框架，但除了创建一个良好的 RESTful
    层之外，还需要做更多的工作。它也可以与 Spring 框架集成，但这在另一个框架之上又增加了额外的负担。


    对于数据访问，该框架推荐使用 `sql2o` 库。也可以使用 Yank 和 JDBI。你可以开始创建简单的应用——无论是基于 REST 的还是支持 MVC
    的——几乎支持所有模板引擎，如 Thymeleaf 和 Handlebars。

