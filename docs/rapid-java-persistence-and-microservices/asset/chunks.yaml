    results: [CustomerDto(id=1, name=Raj Malhotra)]

    ```


    ## JPA Querying with Mapping to Projections


    Spring Data can also return a projection or a mapped interface of any entity as
    the result of a JPQL. Projections are simple to implement in Spring Data. The
    easiest way is by declaring an interface that exposes accessor methods for the
    properties to be read. These interfaces can be nested as well. Let’s see this
    through the example in Listing [4-10](#454149_1_En_4_Chapter.xhtml#PC18).


    ```

    package com.example.eshop.model.projection;

    import org.springframework.beans.factory.annotation.Value;

    public interface CustomerProjection {

    String getName();

    String getEmail();

    @Value("#{target.name + ''_'' + target.email}")

    String getCustomerNameWithEmail();

    }

    package com.example.eshop.repository.orders;

    import com.example.eshop.model.dto.CustomerDto;

    import com.example.eshop.model.orders.Customer;

    import com.example.eshop.model.projection.CustomerProjection;

    import org.springframework.data.jpa.repository.JpaRepository;

    import org.springframework.data.jpa.repository.Query;

    import java.util.Collection;

    import java.util.List;

    public interface CustomerRepository extends JpaRepository{

    /* N+1 example */

    @Query("Select c from Customer c left join fetch c.orders")

    List findCustomersWithOrderDetails();

    // Query example with Constructor mapping

    @Query(value = "Select new com.example.eshop.model.dto.CustomerDto(c.id, c.name)
    from  Customer c")

    List findCustomers();

    // Projection examples

    @Query("Select c from Customer c")

    List findAllCustomers();

    CustomerProjection findOneByName(String name);

    }

    Listing 4-10

    Projections Example

    ```


    Notes:


    - We defined the `Projection` interface in this code with attributes matching
    names from the original entity object (customer) list, returned.

    - With this interface definition, Spring creates a proxy of projection interfaces
    on the fly, does the mapping, and returns these proxies as output.

    - Spring allows providing SpEL (Spring expression language) expressions on top
    of these accessor methods to manipulate the results. As an example, we have SpEL
    concatenate the name and email on top of the `getCustomerNameWithEmail()` method.
    The `target` field in this expression is mapped to the returned object by Spring.

    - Projections work just on the basis of returned objects. Thus any Spring Data
    DSL-based method will also work. This is shown through the `findOneByName(String
    name)` example method in Listing [4-10](#454149_1_En_4_Chapter.xhtml#PC18).


    We also need to change the `Application` class, shown in Listing [4-11](#454149_1_En_4_Chapter.xhtml#PC19),
    to test the code in Listing [4-10](#454149_1_En_4_Chapter.xhtml#PC18).


    ```

    @SpringBootApplication

    @Slf4j

    public class Application implements CommandLineRunner {

    @Autowired

    CustomerRepository customerRepository;

    public static void main(String[] args) throws Exception {

    SpringApplication.run(Application.class, args);

    }

    @Override

    public void run(String... strings) throws Exception {

    projectionsExample();

    List customers = customerRepository.findWithOrders();

    log.info("Customers with Orders");

    customers.forEach(customer -> {

    log.info("Customer Name: {}", customer.getCustomerNameWithEmail());

    //log.info("Order: {}", customer.getOrderProjection().getPrice());

    });

    log.info("Customer again: {}",

    customerRepository.findOneProjectedByName("Raj Malhotra").getCustomerNameWithEmail());

    }

    public void projectionsExample() {

    List customers =

    customerRepository.findAllCustomers();

    log.info("Customers List with Projections");

    customers.forEach(customer -> {

    log.info("Customer Name: {}",

    customer.getCustomerNameWithEmail());

    });

    log.info("Find Single Customer : {}",

    customerRepository.findOneByName("Raj Malhotra").getCustomerNameWithEmail());

    }

    }

