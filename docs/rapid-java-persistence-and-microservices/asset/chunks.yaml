    ## Service Discovery in the Microservices Architecture


    Service discovery is important when we want the services to communicate with each
    other without keeping track of the exact network locations or IP addresses along
    with port numbers of all other nodes. Traditionally, we have been fixing this
    lookup based on the load balancer’s URL or address and attaching all application
    nodes statically to this load balancer. The Spring Framework enables support for
    this need through a couple of linked libraries:


    Spring ➤ Spring Cloud ➤ Spring Cloud Netflix ➤ Netflix OSS ➤ Netflix Eureka


    Service Discovery (Netflix OSS ➤ Eureka) is the library that offers this functionality
    and Spring Cloud works on top of that to make it work in the Spring environment.
    Service Discovery acts as the application-level registry for clients to talk to
    each other. Each configured client registers itself to the discovery server by
    its application name. Clients can find it through that name only. Clients will
    discover registered service IP addresses and can connect to those nodes directly.
    We need to create three components to demonstrate this feature:


    *   Discovery service (Eureka Server)


    *   Inventory service (Eureka Client)


    *   Eshop service (Eureka Client)


    Figure [6-3](#454149_1_En_6_Chapter.xhtml#Fig3) shows the communication pattern
    between Eshop and the Inventory Service using the discovery service.


    ![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig3_HTML.png](images/454149_1_En_6_Chapter/454149_1_En_6_Fig3_HTML.png)


    Figure 6-3


    Communications through the discovery service


    ### Discovery Service Application


    This microservice serves as a registry for clients to look up various other services
    addresses through their names and monitor them through a built-in web-based dashboard.
    We will need the following code structure while building this service:


    ```

