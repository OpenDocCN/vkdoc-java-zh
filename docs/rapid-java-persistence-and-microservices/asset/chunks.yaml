    ## 多数据源交互


    Spring Data JPA 中的这一关键特性将 Java 和 Spring 与其他语言框架区分开来，因为这并非基本需求，而是企业应用中罕见但极具潜力的功能。有时，应用程序必须同时与不同的数据库进行通信。让我们以创建一个电商在线书店为例。我们将为同一个微服务在
    MySQL 中创建和存储客户、产品及订单数据，并在 PostgreSQL 中存储购买历史记录。


    在功能上，我们将模拟一个流程：首先保存新的客户和产品对象。然后，我们将购买该产品，并使用 MySQL 作为数据存储。对于同一笔购买，我们将把购买历史记录存储在
    PostgreSQL 数据库中，用于分析。从技术上讲，这将涉及：


    *   为连接创建独立的数据源属性。


    *   创建两个数据源和 `entityManager` 工厂 Bean。


    *   为了清晰起见，在不同的包中创建数据或领域模型以及仓库。实体类和仓库不要求放在不同的包中，但保持一致性更好。


    现在，让我们为我们的用例构建示例应用。

