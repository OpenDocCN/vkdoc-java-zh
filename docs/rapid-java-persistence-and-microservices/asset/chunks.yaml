    ## Spring JDBC 模板


    Spring JDBCTemplate 是 Spring 框架创建的 API，用于在关系型数据库上执行原生 SQL 查询，并将结果映射回自定义的 Java
    对象。让我们通过一个非常简单的示例来重新创建我们的 Eshop 应用，并将其连接到 MySQL 数据库。我们将在单个查询中查询客户、购买的产品和订单信息。该结果应按照以下步骤映射到一个名为
    `CustomerOrder` 的 DTO 类：


    1.  创建一个基于 Gradle 的应用


    2.  初始化并运行示例 SQL 查询，以填充 `Customer`、`Product` 和 `Order` 表。


    3.  定义一个名为 `CustomerOrder` 的新 DTO。


    4.  运行一个 SQL 查询，并将结果映射回对象模型；即一个名为 `CustomerOrder` 的列表。


    让我们使用以下代码结构构建一个应用：


    `eshop-jdbc-template-ch5`


    ```

    .

    ├── build.gradle

    └── src

    ├── main

    │   ├── java

    │   │   └── com

    │   │       └── example

    │   │           └── eshop

    │   │               ├── Application.java

    │   │               └── model

    │   │                   └── dto

    │   │                       └── CustomerOrder.java

    │   └── resources

    │       └── application.properties

    └── test

    ├── java

    │   └── com

    │       └── example

    │           └── eshop

    │               └── EshopAppTests.java

    └── resources

    └── schema.sql

    ```


    ### 应用设置


    从 [`http://www.spring.io`](http://www.spring.io) 创建一个名为 `eshop-jdbc-template-ch5`
    的新应用，并在 `build.gradle` 文件中包含以下依赖项（参见清单 5-1）。


    ```

    dependencies {

    compile ([

    "org.springframework.boot:spring-boot-starter-jdbc",

    "org.springframework.boot:spring-boot-starter-test"

    ])

    compile ([

    "mysql:mysql-connector-java:8.0.15",

    "org.projectlombok:lombok:1.18.6"

    ])

    testCompile("junit:junit")

    testCompile("org.projectlombok:lombok:1.18.6")

    annotationProcessor("org.projectlombok:lombok:1.18.6")

    testAnnotationProcessor("org.projectlombok:lombok:1.18.6")

    }

    清单 5-1

    Build.gradle 文件

    ```


    ### 配置与初始模式脚本


    我们需要在 `application.properties` 文件中指定数据源相关的属性（参见清单 5-2）。


    ```

    application.properties

    spring.datasource.url=jdbc:mysql://localhost:3306/eshop

    spring.datasource.username=root

    spring.datasource.password=mysql

    spring.datasource.driver-class-name: com.mysql.jdbc.Driver

    schema.sql

    CREATE TABLE IF NOT EXISTS Customer (

    customerId int(11) unsigned NOT NULL AUTO_INCREMENT PRIMARY KEY,

    dateAdded datetime DEFAULT NULL,

    email varchar(255) DEFAULT NULL,

    name varchar(255) DEFAULT NULL,

    password varchar(255) DEFAULT NULL

    );

    CREATE TABLE IF NOT EXISTS `Order` ( -- 使用 `` 字符转义 Order)

    orderId bigint(20) NOT NULL PRIMARY KEY AUTO_INCREMENT,

    customerId int(11) DEFAULT NULL,

    price int(11) NOT NULL,

    productId bigint(20) DEFAULT NULL,

    quantity int(11) NOT NULL

    );

    CREATE TABLE IF NOT EXISTS Product (

    productId int(11) unsigned NOT NULL PRIMARY KEY AUTO_INCREMENT,

    name varchar(255) DEFAULT NULL,

    quantity varchar(255) DEFAULT NULL,

    price smallint DEFAULT NULL

    );

    Insert into Customer(name, email, password) VALUES(''Raj'', ''raj@example.com'',
    ''password'');

    Insert into Product(name, quantity, price) VALUES(''Laptop'', 10, 1200);

    Insert into `Order`(customerId, productId, price, quantity) VALUES(1, 1, 1200,
    1);

    清单 5-2

    配置文件与数据库初始化脚本

    ```


    注意：


    *   此脚本必须在名为 `eshop` 的 MySQL 数据库中运行。


    *   我们需要使用 ``` `` ``` 字符转义 `Order`，因为 `Order` 是 MySQL 中的关键字。在此脚本中，我们手动为名为 Raj
    Malhotra 的客户创建了一个包含单个产品的订单作为示例。


    ### DTO 与应用类


    这里我们有一个名为 `CustomerOrder` 的简单 POJO，它混合了 `Customer`、`Product`**和** `Order` 类的属性。此对象的目的是组合属性，以识别哪个客户购买了哪个产品以及订单详情是什么（参见清单
    5-3）。


    ```

    package com.example.eshop;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication

    @Slf4j

    public class Application  {

    public static void main(String[] args) throws Exception {

    SpringApplication.run(Application.class, args);

    }

    }

    package com.example.eshop.model.dto;

    import lombok.Data;

    @Data

    public class CustomerOrder {

    private Long customerId;

    private Long orderId;

    private Long productId;

    private String customerName;

    private String customerEmail;

    private String productName;

    private int quantity;

    private int price;

    }

    清单 5-3

    DTO 与应用类

    ```


    这就像一个扁平的表结构，将所有信息包含在一个对象中。下一节将解释如何在不定义实体和仓库的情况下进行查询。


    ### 测试用例


    我们将验证将数据库数据查询并检索出来，映射到 DTO 类列表所需的最少代码（参见清单 5-4）。

    '
