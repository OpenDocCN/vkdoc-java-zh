    ### 配置


    我们可以访问声明 Hibernate 连接属性和自定义上下文路径所需的通用属性。GraphQL Java 引擎要求我们定义 `graphql.servlet.mapping`
    属性，以便声明其 `POST` RESTful 端点的映射路径。GraphiQL 是来自 `graphql-tools` 项目的内置应用程序，需要声明类似的、不言自明的属性。参见清单
    7-7。


    ```

    server:

    port: 8201

    servlet:

    contextPath: /eblog

    graphql:

    servlet:

    mapping: /graphql

    enabled: true

    corsEnabled: true

    graphiql:

    mapping: /graphiql

    endpoint: /eblog/graphql

    enabled: true

    pageTitle: GraphiQL

    spring:

    datasource:

    url: jdbc:mysql://localhost:3306/eblog?autoReconnect=true

    username: root

    password: mysql

    driver-class-name: com.mysql.jdbc.Driver

    jpa:

    hibernate.ddl-auto: create

    show-sql: true

    generate-ddl: true

    清单 7-7

    application.yml 文件

    ```


