  raw: '## Reactive APIs Within Core Java


    Java 8 started with providing basic constructs for functional programming and
    streams. Java 9 introduced the Flow API and common interfaces for Reactive programming
    as per Reactive Streams, which get lots of benefit from the Java 8 improvements.
    The following APIs are in the Java 9 `java.util.concurrent.Flow` class:


    *   The `Flow.Publisher<T>` interface defines methods to produce items and control
    signals.


    *   The `Flow.Subscriber<T>` interface defines methods to receive those messages
    and signals.


    *   The `Flow.Subscription` interface defines the methods to link the publisher
    and subscriber.


    *   The `Flow.Processor<T,R>` interface defines methods to do some advanced operations,
    like chaining transformations of items from publishers to subscribers.


    *   The only class in this API, `SubmissionPublisher<T>`, uses the [`Executor`](https://docs.oracle.com/javase/9/docs/api/java/util/concurrent/Executor.html)
    supplied in its constructor for delivery to subscribers to handle back pressure.


    We have been building producer- and consumer-based applications with multithreading
    from Java 1.3 onward, using `wait()` and `notify()`. With Java 5, we can do that
    easily using blocking queues, executors, and other concurrency APIs. In simplified
    form, with a distributed system, these tasks are implemented using messaging as
    publishers/subscribers. With Java 9, we can implement the same producer/consumer
    in the form of the publisher/subscriber based on those Reactive APIs. The APIs
    are interesting but we may not be able to build a complete real-world application
    with only those, so let’s look at the Spring Reactive APIs in the next section.


    ## Reactor and Spring Reactive


    In this section, we dive deep into a concrete example, because I want to focus
    on creating a full-fledged web application (microservice) that involves HTTP requests
    as well as database connectivity. The Spring community started with a project
    named “Project Reactor” ( [`https://projectreactor.io/`](https://projectreactor.io/)
    ) to create a fully non-blocking foundation. This API easily integrates with the
    Java functional API, CompletableFuture, and Stream API.


    The Spring Framework has another web API (Web Flux) built on top of the Reactor
    APIs. This is an alternative to the Spring Web MVC API built on the Servlet APIs.
    As per the Spring docs, the reason for this API was a need for a non-blocking
    API to handle concurrency with a smaller number of threads and scale with fewer
    hardware resources. The Reactive API in Java evolved from previous version features,
    such as annotations, concurrency APIs, atomic classes, and the NIO package. Functional
    programming, the Streams API, and the CompletableFuture API in Java 8 also contributed
    to the success of Reactive Java.


    In Spring WebFlux , we have the Mono and Flux APIs. They provide a rich set of
    functional operators to work on streams of (0 or 1) or (0 to N) data items. WebFlux
    API accepts a publisher as input, allows the operator to work on it, and finally
    returns `Mono<T>` or `Flux<T>` as the output. The Spring WebFlux supports two
    types of APIs for Reactive programming:


    *   Annotated Controllers: Spring MVC styled REST controllers supporting Mono
    and Flux return types.


    *   Functional Endpoints: Lambda-based, lightweight, and functional programming
    model.


    In general, functional programming can be harder than imperative programming for
    some developers. Imperative programming maps naturally to how we think of a sequence
    of steps to perform a task. Further, in an enterprise application, we may need
    to work on many frameworks and libraries that have not yet moved to functional
    programming. For example, JPA and JDBC are first. Recently, the community started
    working on Reactive database drivers and Spring Data styled wrapper APIs.


    The API is named R2DBC (Reactive Relational Database Connectivity; see [`https://r2dbc.io/`](https://r2dbc.io/)
    ). R2DBC is an API specification that declares a Reactive API to be implemented
    by driver vendors in order to access their relational databases. As of this writing,
    there are three database drivers that support the R2DBC specification:


    *   PostgreSQL (`io.r2dbc:r2dbc-postgresql`)


    *   H2 (`io.r2dbc:r2dbc-h2`)


    *   Microsoft SQL Server (`io.r2dbc:r2dbc-mssql`)


    Let’s now build a working example to see WebFlux and R2DBC in action.


    ## The Reactive Blog Microservice (Built On Spring Reactive)


    We are going to rebuild our blog application from previous chapters using Reactive
    APIs. The structure will closely resemble the previous examples we built, as shown
    here.


    ```

    .

    ├── build.gradle

    ├── gradlew

    ├── gradlew.bat

    ├── settings.gradle

    └── src

    └── main

    ├── java

    │   └── com

    │       └── example

    │           └── eblog

    │               ├── App.java

    │               ├── config

    │               │   └── Config.java

    │               ├── dto

    │               │   └── PostInputRequest.java

    │               ├── model

    │               │   └── Post.java

    │               ├── repository

    │               │   └── PostRepository.java

    │               └── web

    │                   └── PostController.java

    └── resources

    ```


    ### Application Setup


    Let’s start by building a new application named `eblog-reactive-ch8` from [`http://start.spring.io/`](http://start.spring.io/)
    with the following dependencies in `build.gradle` (see Listing [8-1](#454149_1_En_8_Chapter.xhtml#PC6)).


    ```

    buildscript {

    repositories {

    mavenCentral()

    }

    dependencies {

    classpath("org.springframework.boot:spring-boot-gradle-plugin:2.1.3.RELEASE")

    }

    }

    apply plugin: ''java''

    apply plugin: ''eclipse''

    apply plugin: ''idea''

    apply plugin: ''org.springframework.boot''

    apply plugin: ''io.spring.dependency-management''

    bootJar {

    baseName = ''eblog-service''

    version =  ''1.0''

    }

    repositories {

    mavenCentral()

    maven { url "https://repo.spring.io/snapshot" }

    maven { url "http://repo.spring.io/libs-milestone" }

    }

    dependencies {

    compile(''org.springframework.boot:spring-boot-starter-webflux'')

    compile("org.springframework.data:spring-data-r2dbc:1.0.0.M1")

    compile("io.r2dbc:r2dbc-spi:1.0.0.M7")

    compile("io.r2dbc:r2dbc-postgresql:1.0.0.M7")

    compile(''org.projectlombok:lombok:1.18.6'')

    testCompile(''junit:junit:4.12'')

    }

    Listing 8-1

    Build.gradle

    ```


    ### Configuration


    We just need to extend an existing abstract configuration, i.e. `AbstractR2dbcConfiguration`.
    We can override its database connection-related config, as shown in Listing [8-2](#454149_1_En_8_Chapter.xhtml#PC7).


    ```

    package com.example.eblog.config;

    import io.r2dbc.postgresql.PostgresqlConnectionConfiguration;

    import io.r2dbc.postgresql.PostgresqlConnectionFactory;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.data.r2dbc.config.AbstractR2dbcConfiguration;

    @Configuration

    public class Config extends AbstractR2dbcConfiguration {

    @Override

    public PostgresqlConnectionFactory connectionFactory() {

    PostgresqlConnectionConfiguration connectionConfiguration =

    PostgresqlConnectionConfiguration.builder()

    .applicationName("eblog")

    .database("eblog")

    .host("localhost")

    .username("postgres")

    .password("postgres").build();

    return new PostgresqlConnectionFactory(connectionConfiguration);

    }

    }

    Listing 8-2

    Configuration Class

    ```


    As per this code, we are overriding the `connectionFactory()` method of the `AbstractR2dbcConfiguration`
    class , which connects to the `eblog` database in PostgreSQL. We also need to
    manually create a `Post` table with the following script:


    ```

    CREATE TABLE public.post (

    id serial NOT NULL,

    title varchar(500) NULL,

    "content" text NULL,

    author int4 NULL,

    CONSTRAINT post_pkey PRIMARY KEY (id)

    );

    ```'
  trans: "\n## Java 核心库中的响应式 API\n\nJava 8 开始提供函数式编程和流处理的基础结构。Java 9 根据响应式流规范引入了 Flow\
    \ API 和响应式编程的通用接口，这些接口从 Java 8 的改进中获益良多。以下 API 位于 Java 9 的 `java.util.concurrent.Flow`\
    \ 类中：\n\n*   `Flow.Publisher<T>` 接口定义了生成数据项和控制信号的方法。\n*   `Flow.Subscriber<T>`\
    \ 接口定义了接收这些消息和信号的方法。\n*   `Flow.Subscription` 接口定义了连接发布者和订阅者的方法。\n*   `Flow.Processor<T,R>`\
    \ 接口定义了执行高级操作的方法，例如将发布者的数据项进行链式转换后传递给订阅者。\n*   该 API 中唯一的类 `SubmissionPublisher<T>`，使用其构造函数中提供的\
    \ [`Executor`](https://docs.oracle.com/javase/9/docs/api/java/util/concurrent/Executor.html)\
    \ 来向订阅者传递数据，以处理背压。\n\n从 Java 1.3 开始，我们就使用 `wait()` 和 `notify()` 构建基于生产者和消费者的多线程应用程序。到了\
    \ Java 5，我们可以使用阻塞队列、执行器和其他并发 API 轻松实现这一点。简而言之，在分布式系统中，这些任务是通过使用消息传递机制以发布者/订阅者的模式实现的。借助\
    \ Java 9，我们可以基于这些响应式 API，以发布者/订阅者的形式实现相同的生产者/消费者模式。这些 API 很有趣，但仅凭它们可能无法构建完整的实际应用程序，因此我们将在下一节中介绍\
    \ Spring 响应式 API。\n\n## Reactor 与 Spring 响应式\n\n在本节中，我们将深入探讨一个具体示例，因为我希望专注于创建一个涉及\
    \ HTTP 请求和数据库连接的完整 Web 应用程序（微服务）。Spring 社区启动了一个名为“Project Reactor”（[`https://projectreactor.io/`](https://projectreactor.io/)）的项目，旨在创建一个完全非阻塞的基础架构。该\
    \ API 可以轻松地与 Java 函数式 API、CompletableFuture 和 Stream API 集成。\n\nSpring 框架在 Reactor\
    \ API 之上构建了另一个 Web API（Web Flux）。这是基于 Servlet API 构建的 Spring Web MVC API 的替代方案。根据\
    \ Spring 文档，创建此 API 的原因是需要一个非阻塞 API，以便用更少的线程处理并发，并在更少的硬件资源下进行扩展。Java 中的响应式 API\
    \ 是从早期版本的功能演变而来的，例如注解、并发 API、原子类和 NIO 包。Java 8 中的函数式编程、Streams API 和 CompletableFuture\
    \ API 也为响应式 Java 的成功做出了贡献。\n\n在 Spring WebFlux 中，我们有 Mono 和 Flux API。它们提供了丰富的函数式操作符，用于处理（0\
    \ 或 1 个）或（0 到 N 个）数据项的流。WebFlux API 接受一个发布者作为输入，允许操作符对其进行处理，并最终返回 `Mono<T>` 或\
    \ `Flux<T>` 作为输出。Spring WebFlux 支持两种类型的响应式编程 API：\n\n*   **注解式控制器**：Spring MVC\
    \ 风格的 REST 控制器，支持 Mono 和 Flux 返回类型。\n*   **函数式端点**：基于 Lambda 的轻量级函数式编程模型。\n\n\
    通常，对于某些开发者来说，函数式编程可能比命令式编程更难。命令式编程自然地映射到我们思考执行任务的一系列步骤的方式。此外，在企业级应用程序中，我们可能需要使用许多尚未迁移到函数式编程的框架和库。例如，JPA\
    \ 和 JDBC 就是如此。最近，社区开始致力于响应式数据库驱动程序和 Spring Data 风格的包装器 API。\n\n该 API 名为 R2DBC（响应式关系数据库连接；参见\
    \ [`https://r2dbc.io/`](https://r2dbc.io/)）。R2DBC 是一个 API 规范，它声明了一个响应式 API，供驱动程序供应商实现，以便访问其关系数据库。在撰写本文时，有三个数据库驱动程序支持\
    \ R2DBC 规范：\n\n*   PostgreSQL (`io.r2dbc:r2dbc-postgresql`)\n*   H2 (`io.r2dbc:r2dbc-h2`)\n\
    *   Microsoft SQL Server (`io.r2dbc:r2dbc-mssql`)\n\n现在，让我们构建一个可运行的示例来实际体验 WebFlux\
    \ 和 R2DBC。\n\n## 响应式博客微服务（基于 Spring 响应式构建）\n\n我们将使用响应式 API 重建前面章节中的博客应用程序。其结构将与之前构建的示例非常相似，如下所示。\n\
    \n```\n.\n├── build.gradle\n├── gradlew\n├── gradlew.bat\n├── settings.gradle\n\
    └── src\n    └── main\n        ├── java\n        │   └── com\n        │      \
    \ └── example\n        │           └── eblog\n        │               ├── App.java\n\
    \        │               ├── config\n        │               │   └── Config.java\n\
    \        │               ├── dto\n        │               │   └── PostInputRequest.java\n\
    \        │               ├── model\n        │               │   └── Post.java\n\
    \        │               ├── repository\n        │               │   └── PostRepository.java\n\
    \        │               └── web\n        │                   └── PostController.java\n\
    \        └── resources\n```\n\n### 应用程序设置\n\n让我们从 [`http://start.spring.io/`](http://start.spring.io/)\
    \ 开始构建一个名为 `eblog-reactive-ch8` 的新应用程序，并在 `build.gradle` 中包含以下依赖项（参见清单 8-1）。\n\
    \n```\nbuildscript {\n    repositories {\n        mavenCentral()\n    }\n    dependencies\
    \ {\n        classpath(\"org.springframework.boot:spring-boot-gradle-plugin:2.1.3.RELEASE\"\
    )\n    }\n}\napply plugin: 'java'\napply plugin: 'eclipse'\napply plugin: 'idea'\n\
    apply plugin: 'org.springframework.boot'\napply plugin: 'io.spring.dependency-management'\n\
    bootJar {\n    baseName = 'eblog-service'\n    version =  '1.0'\n}\nrepositories\
    \ {\n    mavenCentral()\n    maven { url \"https://repo.spring.io/snapshot\" }\n\
    \    maven { url \"http://repo.spring.io/libs-milestone\" }\n}\ndependencies {\n\
    \    compile('org.springframework.boot:spring-boot-starter-webflux')\n    compile(\"\
    org.springframework.data:spring-data-r2dbc:1.0.0.M1\")\n    compile(\"io.r2dbc:r2dbc-spi:1.0.0.M7\"\
    )\n    compile(\"io.r2dbc:r2dbc-postgresql:1.0.0.M7\")\n    compile('org.projectlombok:lombok:1.18.6')\n\
    \    testCompile('junit:junit:4.12')\n}\n清单 8-1\nBuild.gradle\n```\n\n### 配置\n\
    \n我们只需要扩展一个现有的抽象配置类，即 `AbstractR2dbcConfiguration`。我们可以覆盖其与数据库连接相关的配置，如清单 8-2\
    \ 所示。\n\n```\npackage com.example.eblog.config;\nimport io.r2dbc.postgresql.PostgresqlConnectionConfiguration;\n\
    import io.r2dbc.postgresql.PostgresqlConnectionFactory;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.data.r2dbc.config.AbstractR2dbcConfiguration;\n@Configuration\n\
    public class Config extends AbstractR2dbcConfiguration {\n    @Override\n    public\
    \ PostgresqlConnectionFactory connectionFactory() {\n        PostgresqlConnectionConfiguration\
    \ connectionConfiguration =\n            PostgresqlConnectionConfiguration.builder()\n\
    \                .applicationName(\"eblog\")\n                .database(\"eblog\"\
    )\n                .host(\"localhost\")\n                .username(\"postgres\"\
    )\n                .password(\"postgres\").build();\n        return new PostgresqlConnectionFactory(connectionConfiguration);\n\
    \    }\n}\n清单 8-2\n配置类\n```\n\n根据这段代码，我们覆盖了 `AbstractR2dbcConfiguration` 类的 `connectionFactory()`\
    \ 方法，该方法用于连接到 PostgreSQL 中的 `eblog` 数据库。我们还需要使用以下脚本手动创建一个 `Post` 表：\n\n```\nCREATE\
    \ TABLE public.post (\n    id serial NOT NULL,\n    title varchar(500) NULL,\n\
    \    \"content\" text NULL,\n    author int4 NULL,\n    CONSTRAINT post_pkey PRIMARY\
    \ KEY (id)\n);\n```\n"
- fmt: '### Model Class and Repository Definition


    We will create a simple *POJO* (plain old Java object) with Spring Data annotations
    (see Listing [8-3](#454149_1_En_8_Chapter.xhtml#PC9)). We will also look at a
    Spring Data Reactive repository definition in Listing [8-4](#454149_1_En_8_Chapter.xhtml#PC10).


    ```

    package com.example.eblog.model;

    import lombok.AllArgsConstructor;

    import lombok.Builder;

    import lombok.Data;

    import org.springframework.data.annotation.Id;

    import org.springframework.data.relational.core.mapping.Column;

    import java.io.Serializable;

    @Data

    @Builder

    @AllArgsConstructor

    public class Post implements Serializable {

    @Id

    private Long id;

    private String title;

    @Column("content")

    private String content;

    public Post()   {}

    public Post(String title, String content)   {

    this.title = title;

    this.content = content;

    }

    }

    Listing 8-3

    Model Class

    ```


    We have a Java object as `Post` with `@Id` and `@Column` annotations from Spring
    Data, but we are not using Spring Data JPA annotations here.


    ```

    package com.example.eblog.repository;

    import com.example.eblog.model.Post;

    import org.springframework.data.repository.reactive.ReactiveCrudRepository;

    import org.springframework.stereotype.Repository;

    public interface PostRepository extends ReactiveCrudRepository { }

    Listing 8-4

    Repository Definition

    ```


    To use Spring Data R2DBC repositories, we need to annotate fields of model class
    with annotations from the Spring Data Commons project. In the code in Listing
    [8-3](#454149_1_En_8_Chapter.xhtml#PC9), we have a `Post` Java object with `@Id`
    and `@Column` annotations from Spring Data Commons. Spring Data R2DBC provides
    the implementation to manage data model persistence with these annotations.


    ### DTO and Web Controller


    We will first define a simple POJO named `PostInputRequest` with input fields
    needed to create a `User` domain object (see Listing [8-5](#454149_1_En_8_Chapter.xhtml#PC11)).
    Further, we will define a `PostController` class (see Listing [8-6](#454149_1_En_8_Chapter.xhtml#PC12))
    with methods returning `reactor.core.publisher.*` API classes (`Flux` or `Mono`).


    ```

    package com.example.eblog.web;

    import com.example.eblog.dto.PostInputRequest;

    import com.example.eblog.model.Post;

    import com.example.eblog.repository.PostRepository;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.data.domain.PageRequest;

    import org.springframework.data.domain.Sort;

    import org.springframework.data.repository.query.Param;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.PostMapping;

    import org.springframework.web.bind.annotation.RequestBody;

    import org.springframework.web.bind.annotation.RestController;

    import reactor.core.publisher.Flux;

    import reactor.core.publisher.Mono;

    @RestController

    @Slf4j

    public class PostController {

    @Autowired

    PostRepository postRepository;

    @PostMapping("/posts")

    public Mono newPost(@RequestBody PostInputRequest postInputRequest){

    Post lclPost = Post.builder()

    .title(postInputRequest.getTitle())

    .content(postInputRequest.getContent())

    .build();

    Mono post = postRepository.save(lclPost);

    return post;

    }

    @GetMapping("/posts")

    Flux allPosts() {

    return this.postRepository.findAll();

    }

    @GetMapping("/recentPosts")

    public Flux recentPosts(

    @Param("limit") Integer limit, @Param("offset") Integer offset,

    @Param("orderBy") String orderBy){

    log.info("recentPosts, params: {}, {}", limit, offset);

    PageRequest pageRequest = PageRequest.of(limit, offset, Sort.Direction.DESC, orderBy);

    return postRepository.findAll();

    }

    }

    Listing 8-6

    Controller Class

    ```


    ```

    package com.example.eblog.dto;

    import lombok.Data;

    @Data

    public class PostInputRequest {

    String title;

    String content;

    Long authorId;

    }

    Listing 8-5

    DTO Class

    ```


    ### Bootstrapping


    We need to enable R2DBC features in Spring Boot, thereby using its annotation
    (`@EnableR2dbcRepositories`) on top of the `Application` class (see Listing [8-7](#454149_1_En_8_Chapter.xhtml#PC13)).


    ```

    package com.example.eblog;

