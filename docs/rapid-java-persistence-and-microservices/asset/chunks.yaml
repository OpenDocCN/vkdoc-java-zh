  raw: "### Application Setup\n\nCreate a new application called `eshop-ch4` from\
    \ [`http://www.spring.io`](http://www.spring.io) with the following dependencies\
    \ in the `build.gradle` file:\n\n```\ndependencies {\ncompile ([\n\"org.springframework.boot:spring-boot-starter-web\"\
    ,\n\"org.springframework.boot:spring-boot-starter-jdbc\",\n\"org.springframework.boot:spring-boot-starter-data-jpa\"\
    \n])\ncompile ([\n\"mysql:mysql-connector-java:8.0.15\",\n\"org.postgresql:postgresql:42.2.5\"\
    ,\n\"org.projectlombok:lombok:1.18.6\"\n])\ntestCompile(\"junit:junit\")\nannotationProcessor\
    \ 'org.projectlombok:lombok:1.18.6'\n}\n```\n\n### Datasource Configuration\n\n\
    All of the datasource-related properties are defined in `application.yml` or `application.properties`,\
    \ but we also need to define datasource Java beans in the Java config for our\
    \ use case. For a single datasource, the Java beans configuration step is not\
    \ required and the properties in the config are sufficient. The following code\
    \ defines two distinct database configurations comprised of datasource beans (`LocalEntityManagerFactory`)\
    \ and transaction managers, respectively. Listing [4-1](#454149_1_En_4_Chapter.xhtml#PC3)\
    \ defines the configuration for the primary datasource and Listing [4-2](#454149_1_En_4_Chapter.xhtml#PC4)\
    \ relates to the secondary datasource.\n\n```\npackage com.example.eshop.config;\n\
    import lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Qualifier;\n\
    import org.springframework.boot.autoconfigure.EnableAutoConfiguration;\nimport\
    \ org.springframework.boot.context.properties.ConfigurationProperties;\nimport\
    \ org.springframework.boot.jdbc.DataSourceBuilder;\nimport org.springframework.boot.orm.jpa.EntityManagerFactoryBuilder;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.context.annotation.Primary;\nimport org.springframework.data.jpa.repository.config.EnableJpaRepositories;\n\
    import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.orm.jpa.JpaTransactionManager;\n\
    import org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean;\nimport\
    \ org.springframework.transaction.PlatformTransactionManager;\nimport javax.persistence.EntityManagerFactory;\n\
    import javax.sql.DataSource;\nimport java.util.HashMap;\nimport java.util.Map;\n\
    @Configuration\n@EnableAutoConfiguration\n@EnableJpaRepositories(\nentityManagerFactoryRef\
    \ = \"entityManagerFactory\",\ntransactionManagerRef = \"transactionManager\"\
    ,\nbasePackages = { \"com.example.eshop.repository.orders\" })\n@Slf4j\npublic\
    \ class DbConfigPrimary {\n@Bean(name = \"dataSource\")\n@Primary\n@ConfigurationProperties(prefix\
    \ = \"spring.datasource.orders\")\npublic DataSource dataSourcePrimary() {\nreturn\
    \ DataSourceBuilder.create().build();\n}\n@Primary\n@Bean(name = \"entityManagerFactory\"\
    )\npublic LocalContainerEntityManagerFactoryBean entityManagerFactory(\nEntityManagerFactoryBuilder\
    \ builder, @Qualifier(\"dataSource\") DataSource dataSource)\n{\nreturn builder\n\
    .dataSource(dataSource)\n.packages(\"com.example.eshop.model.orders\")\n.persistenceUnit(\"\
    orders\")\n.properties(jpaProperties())\n.build();\n}\n@Primary\n@Bean(name =\
    \ \"transactionManager\")\npublic PlatformTransactionManager transactionManager(\n\
    @Qualifier(\"entityManagerFactory\") EntityManagerFactory\nentityManagerFactory\n\
    ) {\nreturn new JpaTransactionManager(entityManagerFactory);\n}\nprivate Map jpaProperties()\
    \ {\nMap props = new HashMap();\nprops.put(\"hibernte.ejb.naming_strategy\", \"\
    org.hibernate.cfg.ImprovedNamingStrategy\");\nprops.put(\"hibernate.dialect\"\
    , \"org.hibernate.dialect.MySQL5InnoDBDialect\");\nprops.put(\"hibernate.hbm2ddl.auto\"\
    , \"create-drop\");\nreturn props;\n}\n}\nListing 4-1\nPrimary Database Configuration\n\
    ```\n\nThe secondary configuration in Listing [4-2](#454149_1_En_4_Chapter.xhtml#PC4)\
    \ looks like the previous one, only with constants and properties lookup changes.\n\
    \n```\npackage com.example.eshop.config;\nimport lombok.extern.slf4j.Slf4j;\n\
    import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.boot.context.properties.ConfigurationProperties;\n\
    import org.springframework.boot.jdbc.DataSourceBuilder;\nimport org.springframework.boot.orm.jpa.EntityManagerFactoryBuilder;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.data.jpa.repository.config.EnableJpaRepositories;\n\
    import org.springframework.orm.jpa.JpaTransactionManager;\nimport org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean;\n\
    import org.springframework.transaction.PlatformTransactionManager;\nimport javax.persistence.EntityManagerFactory;\n\
    import javax.sql.DataSource;\nimport java.util.HashMap;\nimport java.util.Map;\n\
    @Configuration\n@EnableJpaRepositories(\nentityManagerFactoryRef = \"entityManagerFactoryHistory\"\
    ,\ntransactionManagerRef = \"transactionManagerHistory\",\nbasePackages = { \"\
    com.example.eshop.repository.history\" })\n@Slf4j\npublic class DbConfigSecondary\
    \ {\n@Bean(name = \"dataSourceHistory\")\n@ConfigurationProperties(prefix = \"\
    spring.datasource.history\")\npublic DataSource dataSourceSecondary() {\nreturn\
    \ DataSourceBuilder.create().build();\n}\n@Bean(name = \"entityManagerFactoryHistory\"\
    )\npublic LocalContainerEntityManagerFactoryBean entityManagerFactory(\nEntityManagerFactoryBuilder\
    \ builder, @Qualifier(\"dataSourceHistory\") DataSource dataSource)\n{\nlog.info(\"\
    Secondary EM initialized\");\nreturn builder\n.dataSource(dataSource)\n.packages(\"\
    com.example.eshop.model.history\")\n.persistenceUnit(\"history\")\n.properties(jpaProperties())\n\
    .build();\n}\n@Bean(name = \"transactionManagerHistory\")\npublic PlatformTransactionManager\
    \ transactionManager(\n@Qualifier(\"entityManagerFactoryHistory\") EntityManagerFactory\
    \ entityManagerFactory\n) {\nreturn new JpaTransactionManager(entityManagerFactory);\n\
    }\nprivate Map jpaProperties() {\nMap props = new HashMap();\nprops.put(\"hibernte.ejb.naming_strategy\"\
    , \"org.hibernate.cfg.ImprovedNamingStrategy\");\nprops.put(\"hibernate.dialect\"\
    , \"org.hibernate.dialect.PostgreSQLDialect\");\nprops.put(\"hibernate.hbm2ddl.auto\"\
    , \"create-drop\");\nreturn props;\n}\n}\nListing 4-2\nSecondary Database Configuration\n\
    ```\n\nNotes:\n\n*   We also defined two distinct names for persistence units\
    \ in this code. For example, the `builder.persistenceUnit(\"orders\")` line in\
    \ Listing [4-1](#454149_1_En_4_Chapter.xhtml#PC3) and the `builder.persistenceUnit(\"\
    history\")` line in Listing [4-2](#454149_1_En_4_Chapter.xhtml#PC4).\n\n*   Defining\
    \ `transactionManager` is quite self-explanatory except for the usage of `@Qualifier`,\
    \ which is used in Spring to distinguish two beans with the same name or same\
    \ types.\n\n*   We are also using the `@Primary` annotations to declare beans\
    \ as default datasources within the same Spring context.\n\n*   We are distinguishing\
    \ the classes at three levels through packages in the code:\n    1.  On the top\
    \ we are distinguishing the repository locations through the `basePackages` attribute\
    \ in `@EnableJpaRepositories` annotation, as follows:\n        *   (From Listing\
    \ [4-1](#454149_1_En_4_Chapter.xhtml#PC3).)\n\n```\n            @EnableJpaRepositories(\n\
    \            entityManagerFactoryRef = \"entityManagerFactory\",\n           \
    \ transactionManagerRef = \"transactionManager\",\n            basePackages =\
    \ { \"com.example.eshop.repository.orders\" })\n            ```\n\n*   (From Listing\
    \ [4-2](#454149_1_En_4_Chapter.xhtml#PC4).)\n\n```\n            @EnableJpaRepositories(\n\
    \            entityManagerFactoryRef = \"entityManagerFactoryHistory\",\n    \
    \        transactionManagerRef = \"transactionManagerHistory\",\n            basePackages\
    \ = { \"com.example.eshop.repository.history\" })\n            ```\n\n2.  `DatasourceBuilder`\
    \ will look for properties with the `spring.datasource.orders` and `spring.datasource.history`\
    \ prefixes in the primary and secondary configurations.\n\n3.  `EntityManagerFactoryBuilder`\
    \ will build the bean using different packages, as marked in the line `builder.packages(\"\
    com.example.eshop.model.orders\")`."
  trans: "\n### 应用设置\n\n从 [`http://www.spring.io`](http://www.spring.io) 创建一个名为 `eshop-ch4`\
    \ 的新应用，并在 `build.gradle` 文件中包含以下依赖项：\n\n```\ndependencies {\ncompile ([\n\"org.springframework.boot:spring-boot-starter-web\"\
    ,\n\"org.springframework.boot:spring-boot-starter-jdbc\",\n\"org.springframework.boot:spring-boot-starter-data-jpa\"\
    \n])\ncompile ([\n\"mysql:mysql-connector-java:8.0.15\",\n\"org.postgresql:postgresql:42.2.5\"\
    ,\n\"org.projectlombok:lombok:1.18.6\"\n])\ntestCompile(\"junit:junit\")\nannotationProcessor\
    \ 'org.projectlombok:lombok:1.18.6'\n}\n```\n\n### 数据源配置\n\n所有与数据源相关的属性都定义在 `application.yml`\
    \ 或 `application.properties` 中，但针对我们的用例，我们还需要在 Java 配置中定义数据源 Java Bean。对于单个数据源，Java\
    \ Bean 配置步骤并非必需，配置文件中的属性就已足够。以下代码定义了两个不同的数据库配置，分别由数据源 Bean（`LocalEntityManagerFactory`）和事务管理器组成。清单\
    \ 4-1 定义了主数据源的配置，清单 4-2 则涉及辅助数据源。\n\n```\npackage com.example.eshop.config;\n\
    import lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Qualifier;\n\
    import org.springframework.boot.autoconfigure.EnableAutoConfiguration;\nimport\
    \ org.springframework.boot.context.properties.ConfigurationProperties;\nimport\
    \ org.springframework.boot.jdbc.DataSourceBuilder;\nimport org.springframework.boot.orm.jpa.EntityManagerFactoryBuilder;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.context.annotation.Primary;\nimport org.springframework.data.jpa.repository.config.EnableJpaRepositories;\n\
    import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.orm.jpa.JpaTransactionManager;\n\
    import org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean;\nimport\
    \ org.springframework.transaction.PlatformTransactionManager;\nimport javax.persistence.EntityManagerFactory;\n\
    import javax.sql.DataSource;\nimport java.util.HashMap;\nimport java.util.Map;\n\
    @Configuration\n@EnableAutoConfiguration\n@EnableJpaRepositories(\nentityManagerFactoryRef\
    \ = \"entityManagerFactory\",\ntransactionManagerRef = \"transactionManager\"\
    ,\nbasePackages = { \"com.example.eshop.repository.orders\" })\n@Slf4j\npublic\
    \ class DbConfigPrimary {\n@Bean(name = \"dataSource\")\n@Primary\n@ConfigurationProperties(prefix\
    \ = \"spring.datasource.orders\")\npublic DataSource dataSourcePrimary() {\nreturn\
    \ DataSourceBuilder.create().build();\n}\n@Primary\n@Bean(name = \"entityManagerFactory\"\
    )\npublic LocalContainerEntityManagerFactoryBean entityManagerFactory(\nEntityManagerFactoryBuilder\
    \ builder, @Qualifier(\"dataSource\") DataSource dataSource)\n{\nreturn builder\n\
    .dataSource(dataSource)\n.packages(\"com.example.eshop.model.orders\")\n.persistenceUnit(\"\
    orders\")\n.properties(jpaProperties())\n.build();\n}\n@Primary\n@Bean(name =\
    \ \"transactionManager\")\npublic PlatformTransactionManager transactionManager(\n\
    @Qualifier(\"entityManagerFactory\") EntityManagerFactory\nentityManagerFactory\n\
    ) {\nreturn new JpaTransactionManager(entityManagerFactory);\n}\nprivate Map jpaProperties()\
    \ {\nMap props = new HashMap();\nprops.put(\"hibernte.ejb.naming_strategy\", \"\
    org.hibernate.cfg.ImprovedNamingStrategy\");\nprops.put(\"hibernate.dialect\"\
    , \"org.hibernate.dialect.MySQL5InnoDBDialect\");\nprops.put(\"hibernate.hbm2ddl.auto\"\
    , \"create-drop\");\nreturn props;\n}\n}\n清单 4-1\n主数据库配置\n```\n\n清单 4-2 中的辅助配置与上一个类似，只是常量和属性查找发生了变化。\n\
    \n```\npackage com.example.eshop.config;\nimport lombok.extern.slf4j.Slf4j;\n\
    import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.boot.context.properties.ConfigurationProperties;\n\
    import org.springframework.boot.jdbc.DataSourceBuilder;\nimport org.springframework.boot.orm.jpa.EntityManagerFactoryBuilder;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.data.jpa.repository.config.EnableJpaRepositories;\n\
    import org.springframework.orm.jpa.JpaTransactionManager;\nimport org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean;\n\
    import org.springframework.transaction.PlatformTransactionManager;\nimport javax.persistence.EntityManagerFactory;\n\
    import javax.sql.DataSource;\nimport java.util.HashMap;\nimport java.util.Map;\n\
    @Configuration\n@EnableJpaRepositories(\nentityManagerFactoryRef = \"entityManagerFactoryHistory\"\
    ,\ntransactionManagerRef = \"transactionManagerHistory\",\nbasePackages = { \"\
    com.example.eshop.repository.history\" })\n@Slf4j\npublic class DbConfigSecondary\
    \ {\n@Bean(name = \"dataSourceHistory\")\n@ConfigurationProperties(prefix = \"\
    spring.datasource.history\")\npublic DataSource dataSourceSecondary() {\nreturn\
    \ DataSourceBuilder.create().build();\n}\n@Bean(name = \"entityManagerFactoryHistory\"\
    )\npublic LocalContainerEntityManagerFactoryBean entityManagerFactory(\nEntityManagerFactoryBuilder\
    \ builder, @Qualifier(\"dataSourceHistory\") DataSource dataSource)\n{\nlog.info(\"\
    Secondary EM initialized\");\nreturn builder\n.dataSource(dataSource)\n.packages(\"\
    com.example.eshop.model.history\")\n.persistenceUnit(\"history\")\n.properties(jpaProperties())\n\
    .build();\n}\n@Bean(name = \"transactionManagerHistory\")\npublic PlatformTransactionManager\
    \ transactionManager(\n@Qualifier(\"entityManagerFactoryHistory\") EntityManagerFactory\
    \ entityManagerFactory\n) {\nreturn new JpaTransactionManager(entityManagerFactory);\n\
    }\nprivate Map jpaProperties() {\nMap props = new HashMap();\nprops.put(\"hibernte.ejb.naming_strategy\"\
    , \"org.hibernate.cfg.ImprovedNamingStrategy\");\nprops.put(\"hibernate.dialect\"\
    , \"org.hibernate.dialect.PostgreSQLDialect\");\nprops.put(\"hibernate.hbm2ddl.auto\"\
    , \"create-drop\");\nreturn props;\n}\n}\n清单 4-2\n辅助数据库配置\n```\n\n注意：\n\n*   我们在此代码中为持久化单元定义了两个不同的名称。例如，清单\
    \ 4-1 中的 `builder.persistenceUnit(\"orders\")` 行和清单 4-2 中的 `builder.persistenceUnit(\"\
    history\")` 行。\n\n*   定义 `transactionManager` 除了 `@Qualifier` 的使用外，其含义不言自明，`@Qualifier`\
    \ 在 Spring 中用于区分两个同名或同类型的 Bean。\n\n*   我们还使用了 `@Primary` 注解，将 Bean 声明为同一 Spring\
    \ 上下文中的默认数据源。\n\n*   我们通过代码中的包，在三个层级上区分这些类：\n    1.  在最上层，我们通过 `@EnableJpaRepositories`\
    \ 注解中的 `basePackages` 属性来区分仓库位置，如下所示：\n        *   （来自清单 4-1。）\n\n```\n      \
    \      @EnableJpaRepositories(\n            entityManagerFactoryRef = \"entityManagerFactory\"\
    ,\n            transactionManagerRef = \"transactionManager\",\n            basePackages\
    \ = { \"com.example.eshop.repository.orders\" })\n            ```\n\n*   （来自清单\
    \ 4-2。）\n\n```\n            @EnableJpaRepositories(\n            entityManagerFactoryRef\
    \ = \"entityManagerFactoryHistory\",\n            transactionManagerRef = \"transactionManagerHistory\"\
    ,\n            basePackages = { \"com.example.eshop.repository.history\" })\n\
    \            ```\n\n2.  `DatasourceBuilder` 将在主配置和辅助配置中查找前缀为 `spring.datasource.orders`\
    \ 和 `spring.datasource.history` 的属性。\n\n3.  `EntityManagerFactoryBuilder` 将使用不同的包来构建\
    \ Bean，如 `builder.packages(\"com.example.eshop.model.orders\")` 行所示。\n"
- fmt: '### Data Models and Repositories


    As mentioned, we will define two separate packages for the models and repositories
    to keep it clean. Listing [4-3](#454149_1_En_4_Chapter.xhtml#PC7) refers to the
    model classes for the primary and secondary datasources.


    ```

    package com.example.eshop.model.orders;

    import java.io.Serializable;

    import java.time.LocalDateTime;

    import java.util.List;

    import java.util.Set;

    import javax.persistence.*;

    import com.fasterxml.jackson.annotation.JsonIgnore;

    import lombok.*;

    @Data

    @Entity

    @ToString(exclude = {"orders"})

    @EqualsAndHashCode(exclude = {"orders"})

    public class Customer implements Serializable {

    @Id

    @GeneratedValue(strategy=GenerationType.IDENTITY)

    private Long customerId;

    private String name, email, password;

    private LocalDateTime dateAdded;

    @JsonIgnore

    @OneToMany(fetch = FetchType.LAZY)

    @JoinColumn(name = "customerId")

    Set orders;

    }

    @Data

    @Entity

    public class Product implements Serializable {

    @Id

    @GeneratedValue(strategy=GenerationType.IDENTITY)

    private Long productId;

    private String name;

    private Integer price, quantity;

    }

    @Data

    @Entity

    @Table(name="CustomerOrder")

    public class Order implements Serializable {

    @Id

    @GeneratedValue(strategy=GenerationType.IDENTITY)

    private Long orderId;

    private Long productId, customerId;

    private int quantity, price;

    }

    package com.example.eshop.model.history;

    @Data

    @Entity

    @Table(name="PurchaseHistory")

    public class PurchaseHistory implements Serializable {

    @Id

    @GeneratedValue(strategy=GenerationType.IDENTITY)

    private Long id;

    private Long customerId, productId;

    private Date createdDate;

    }

    Listing 4-3

    Domain Model Definitions

    ```


    Listing [4-4](#454149_1_En_4_Chapter.xhtml#PC8) refers to the repositories for
    the primary and secondary datasources.


    ```

    package com.example.eshop.repository.orders;

    import com.example.eshop.model.orders.Customer;

    import org.springframework.data.jpa.repository.JpaRepository;

    import org.springframework.data.jpa.repository.Query;

    import java.util.List;

    import java.util.Optional;

    public interface CustomerRepository extends JpaRepository{ }

    public interface OrderRepository extends JpaRepository{ }

    public interface ProductRepository extends JpaRepository { }

    package com.example.eshop.repository.history;

    public interface PurchaseHistoryRepository extends JpaRepository{ }

    Listing 4-4

    Repository Definitions

    ```


    Data model definitions are quite self-explanatory. We do not need any custom methods
    for our use case and thus we have the blank repository definitions in Listings
    [4-3](#454149_1_En_4_Chapter.xhtml#PC7) and [4-4](#454149_1_En_4_Chapter.xhtml#PC8).


    ### Service Definitions


    To support our use case, we need to define two service classes to handle the business
    logic, as shown in Listing [4-5](#454149_1_En_4_Chapter.xhtml#PC9).


    ```

    package com.example.eshop.service.impl;

    import com.example.eshop.model.history.PurchaseHistory;

    import com.example.eshop.model.orders.Product;

    import com.example.eshop.repository.history.PurchaseHistoryRepository;

    import com.example.eshop.repository.orders.ProductRepository;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Service;

    import org.springframework.transaction.annotation.Transactional;

    import com.example.eshop.model.orders.Order;

    import com.example.eshop.repository.orders.OrderRepository;

    import java.util.Date;

    import java.util.List;

    @Service

    @Slf4j

    public class ProductService {

    @Autowired

    OrderRepository orderRepository;

    @Autowired

    ProductRepository productRepository;

    @Autowired

    PurchaseHistoryRepository purchaseHistoryRepository;

    @Transactional

    public Boolean purchase(Long productId, Long customerId, int quantity, int price)
    {

    Boolean success = Boolean.TRUE;

    Order order = new Order();

    order.setCustomerId(customerId);

    order.setProductId(productId);

    order.setPrice(price);

    order.setQuantity(quantity);

    orderRepository.save(order);

    return success;

    }

    @Transactional

    public void saveHistory(Long customerId, Long productId)   {

    PurchaseHistory ph = new PurchaseHistory();

    ph.setCustomerId(customerId);

    ph.setProductId(productId);

    ph.setCreatedDate(new Date());

    purchaseHistoryRepository.save(ph);

    }

    public void registerNewProducts() {

    Product product = new Product();

    product.setName("Superb Java");

    product.setPrice(400);

    product.setQuantity(3);

    productRepository.save(product);

    }

    public List findAll() {

    return productRepository.findAll();

    }

    }

    package com.example.eshop.service.impl;

    import com.example.eshop.model.orders.Customer;

    import com.example.eshop.repository.orders.CustomerRepository;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Service;

    import org.springframework.transaction.annotation.Isolation;

    import org.springframework.transaction.annotation.Propagation;

    import org.springframework.transaction.annotation.Transactional;

    import java.time.LocalDateTime;

    import java.util.List;

    @Service

    @Slf4j

    public class CustomerService {

    @Autowired

    CustomerRepository customerRepository;

    @Transactional(propagation=Propagation.REQUIRED, isolation=Isolation.DEFAULT)

    public void registerNewCustomers() {

    Customer customer = new Customer();

    customer.setName("Raj Malhotra");

    customer.setEmail("raj.malhotra@example.com");

    customer.setPassword("password");

    customer.setDateAdded(LocalDateTime.now());

    customerRepository.saveAndFlush(customer);

    log.info("All registered customers: " + customerRepository.findAll());

    }

    public List findAll()    {

    return customerRepository.findAll();

    }

