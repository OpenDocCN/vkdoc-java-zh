    ## 微服务架构中的服务发现


    当我们希望服务之间能够相互通信，而无需跟踪所有其他节点的确切网络位置或 IP 地址及端口号时，服务发现就显得尤为重要。传统上，我们基于负载均衡器的 URL
    或地址来固定这种查找，并将所有应用程序节点静态附加到此负载均衡器上。Spring 框架通过几个链接库为这一需求提供了支持：


    Spring ➤ Spring Cloud ➤ Spring Cloud Netflix ➤ Netflix OSS ➤ Netflix Eureka


    服务发现（Netflix OSS ➤ Eureka）是提供此功能的库，Spring Cloud 在此基础上运行，使其能够在 Spring 环境中工作。服务发现充当应用级别的注册表，供客户端相互通信。每个配置好的客户端通过其应用程序名称向发现服务器注册自身。客户端只能通过该名称找到它。客户端将发现已注册的服务
    IP 地址，并可以直接连接到这些节点。我们需要创建三个组件来演示此功能：


    *   发现服务（Eureka 服务器）


    *   库存服务（Eureka 客户端）


    *   Eshop 服务（Eureka 客户端）


    图 6-3 展示了 Eshop 与库存服务之间使用发现服务的通信模式。


    ![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig3_HTML.png](img/454149_1_En_6_Fig3_HTML.png)


    图 6-3


    通过发现服务进行通信


