    ## 使用映射到投影进行 JPA 查询


    Spring Data 也可以返回任何实体的投影或映射接口作为 JPQL 的结果。在 Spring Data 中，投影很容易实现。最简单的方法是声明一个接口，该接口公开要读取的属性的访问器方法。这些接口也可以嵌套。让我们通过清单
    4-10 中的示例来了解这一点。


    ```

    package com.example.eshop.model.projection;

    import org.springframework.beans.factory.annotation.Value;

    public interface CustomerProjection {

    String getName();

    String getEmail();

    @Value("#{target.name + ''_'' + target.email}")

    String getCustomerNameWithEmail();

    }

