    Service API Code

    ```


    Notes:


    - In `InventoryClient`, we declared the Feign annotation (`@FeignClient("INVENTORY-SERVICE")`)
    and mentioned the exact service name of the target registered service in the Eureka
    Server (`discovery-service`).

    - We have added the annotation (`@EnableFeignClients`) on top of the `Application`
    class.

