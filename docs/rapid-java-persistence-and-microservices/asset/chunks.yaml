    We learned about various options that work with different types of associations
    in JPA. Along with that, the examples in this chapter showed the correct usage
    of Jackson and Lombok annotations. We also explored using enums, UUIDs, and using
    array datatypes with PostgreSQL through JPA. At last, we saw a brief explanation
    of the Pagination API. In the next chapter, we will see advanced usage of the
    Spring Data JPA for important use cases related to performance, lazy loading issues,
    and so on.


