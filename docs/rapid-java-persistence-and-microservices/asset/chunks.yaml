  raw: 'We will create an in-memory database (H2) based app that is going to manage
    quantity and pricing for the products registered. We’ll also expose an endpoint
    to check current quantity for a product which can be used by the clients. We will
    need the following code structure to build this service:


    ```

    .

    ├── build.gradle

    ├── gradle

    │   └── wrapper

    │       ├── gradle-wrapper.jar

    │       └── gradle-wrapper.properties

    ├── gradlew

    ├── gradlew.bat

    ├── settings.gradle

    └── src

    └── main

    ├── java

    │   └── com

    │       └── example

    │            └── eshop

    │                 └── inventory

    │                      ├── InventoryApp.java

    │                      ├── model

    │                      │    └── Inventory.java

    │                      ├── repository

    │                      │    └── InventoryRepository.java

    │                      ├── service

    │                      │    └── InventoryService.java

    │                      └── web

    │                           └── InventoryController.java

    └── resources

    ├── application.yml

    └── bootstrap.yml

    ```


    #### Application Setup


    Create a new application called `inventory-service` from [`http://www.spring.io`](http://www.spring.io)
    with the changes in the `build.gradle` file, as shown in Listing [6-7](#454149_1_En_6_Chapter.xhtml#PC14).


    ```

    bootJar  {

    baseName = ''inventory-service''

    version =  ''1.0''

    }

    dependencies {

    compile ([

    "org.springframework.boot:spring-boot-starter-web",

    "org.springframework.boot:spring-boot-starter-data-jpa",

    "org.springframework.boot:spring-boot-starter-test",

    "org.projectlombok:lombok:1.18.6",

    "org.springframework.cloud:spring-cloud-starter-netflix-eureka-client",

    "org.springframework.cloud:spring-cloud-starter-config"

    ])

    compile("org.springframework.cloud:spring-cloud-starter-sleuth")

    compile("de.codecentric:spring-boot-admin-starter-client:2.1.3")

    compile("org.springframework.boot:spring-boot-starter-actuator")

    runtime("com.h2database:h2")

    testCompile("junit:junit")

    }

    Listing 6-7

    The build.gradle File

    ```


    #### Configuration


    We have the `config-service`-related configuration properties in the `bootstrap.yml`
    file and the rest in `application.yml` (see Listing [6-8](#454149_1_En_6_Chapter.xhtml#PC15)).


    ```

    bootstrap.yml

    spring:

    application:

    name: inventory-service

    profiles:

    active: dev

    cloud:

    config:

    uri: http://localhost:8888/config

    application.yml

    server:

    servlet:

    contextPath: /inventory

    port: 8082

    spring:

    jpa:

    hibernate.ddl-auto: create

    show-sql: true

    generate-ddl: true

    datasource:

    name: inventorydb

    boot:

    admin:

    client:

    url: http://localhost:7777/admin

    management:

    endpoints:

    web:

    exposure:

    include: "*"

    eureka:

    client:

    serviceUrl:

    defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}

    instance:

    preferIpAddress: false

    spring.main.allow-bean-definition-overriding: true

    Listing 6-8

    Configuration Files

    ```


    Notes:


    *   In the `bootstrap.yml` file, we define Spring Cloud Config-related properties
    to connect to `config-service` at `http://localhost:8888/config`.


    *   In the `application.yml` file, we defined the `contentPath`, port, and JPA
    related properties to connect to H2 in the memory database.


    *   We also have Spring Boot admin-related properties, denoted by `spring.boot.*`
    and `management.*`, which can be ignored for the time being and are explained
    later.


    *   Further, we have the Eureka client-related properties (`eureka.client.*`),
    which will register this service to a discovery service. The inventory service
    should be able to connect to the `discovery-service` at `http://localhost:8761/eureka`.
    The location is defined as a key:value pair, such as `defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}`.


    *   We have a new property called `spring.main.allow-bean-definition-overriding`.
    This is need post-Spring Boot 2.1.0 release to override any bean property. We
    are using this, as we are overriding the JPA and Eureka client-related properties.


    #### Full Application Code


    We will need the `Inventory` class as a data model and an `InventoryService` class
    to manage the CRUD operations for it (Listings [6-9](#454149_1_En_6_Chapter.xhtml#PC16)
    and [6-10](#454149_1_En_6_Chapter.xhtml#PC17)). Along with these two, we also
    need a REST controller to access CRUD operations by other services (see Listing
    [6-12](#454149_1_En_6_Chapter.xhtml#PC19)).


    ```

    package com.example.eshop.inventory.service;

    import com.example.eshop.inventory.model.Inventory;

    import com.example.eshop.inventory.repository.InventoryRepository;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Service;

    import java.util.Optional;

    @Service

    @Slf4j

    public class InventoryService {

    @Autowired

    InventoryRepository inventoryRepository;

    public Inventory getInventory(Long productId) {

    log.info("Inventory lookup request for productId: {}",

    productId);

    Optional inventory = inventoryRepository.findById(productId);

    return inventory.orElse(Inventory.builder()

    .inventoryId(1l)

    .productId(productId)

    .price(200)

    .quantity(2)

    .build());

    }

    }

    Listing 6-10

    Service Class with Business Logic

    ```


    ```

    package com.example.eshop.inventory.model;

    import lombok.Builder;

    import lombok.Data;

    import javax.persistence.Entity;

    import javax.persistence.GeneratedValue;

    import javax.persistence.Id;

    import javax.persistence.Table;

    @Entity

    @Data

    @Builder

    @Table(name = "Inventory")

    public class Inventory {

    @Id

    @GeneratedValue

    private Long inventoryId;

    Long productId;

    Integer price;

    Integer quantity;

    }

    Listing 6-9

    Model Class

    ```


    In this code, we query the database and either receive a product or build one
    using `Optional`. This way, we may optionally need to insert the entry in the
    database manually for the sample run. We have just returned a single product with
    quantity set to 2 and price at $200\. Optionally, we can define `InventoryRepository`
    to connect to the H2 database, as shown in Listing [6-11](#454149_1_En_6_Chapter.xhtml#PC18).
    If data is inserted into the H2 tables, `InventoryService` in Listing [6-10](#454149_1_En_6_Chapter.xhtml#PC17)
    will return the data from the database.


    ```

    package com.example.eshop.inventory.repository;

    import com.example.eshop.inventory.model.Inventory;

    import org.springframework.data.jpa.repository.JpaRepository;

    public interface InventoryRepository extends JpaRepository { }

    Listing 6-11

    Data Repository

    ```


    Listing [6-12](#454149_1_En_6_Chapter.xhtml#PC19) contains the `REST` controller
    class needed to access CRUD operations via HTTP. We have a `GET` API that receives
    `productId` and returns the inventory details for this `productId`.


    ```

    package com.example.eshop.inventory.web;

    import com.example.eshop.inventory.model.Inventory;

    import com.example.eshop.inventory.service.InventoryService;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.PathVariable;

    import org.springframework.web.bind.annotation.RestController;

    @RestController

    @Slf4j

    public class InventoryController {

    @Autowired

    InventoryService inventoryService;

    @GetMapping("/api/inventory/{productId}")

    public Inventory getInventoryForProduct(@PathVariable("productId")

    Long productId) {

    log.info("Inventory request for product: {}", productId);

    Inventory inventory = inventoryService.getInventory(productId);

    log.info("inventory : {}", inventory);

    return inventory;

    }

    }

    package com.example.eshop.inventory;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication

    public class InventoryApp {

    public static void main(String[] args) {

    SpringApplication.run(InventoryApp.class, args);

    }

    }

    Listing 6-12

    The REST Controller Class

    ```


