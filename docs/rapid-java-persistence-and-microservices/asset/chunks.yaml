    \ format.\n70051 --- [           main] o.s.b.w.embedded.tomcat.TomcatWebServer\
    \  : Tomcat initialized with port(s): 8081 (http)\n70051 --- [           main]\
    \ o.s.b.a.e.web.ServletEndpointRegistrar   : Registered '/actuator/hystrix.stream'\
    \ to hystrix.stream-actuator-endpoint\n70051 --- [           main] o.s.c.n.e.s.EurekaServiceRegistry\
    \        : Registering application ESHOP with eureka with status UP\n70051 ---\
    \ [           main] o.s.b.w.embedded.tomcat.TomcatWebServer  : Tomcat started\
    \ on port(s): 8081 (http) with context path '/eshop'\n```\n\nHystrix also implicitly\
    \ creates a default endpoint at `\"http://localhost:8081/ eshop/hystrix`.\n\n\
    Under the hood, Hystrix generates a stream of metrics data, available at `http://localhost``:\
    \ 8081/eshop/actuator/hystrix.stream`. We need to enter this Hystrix stream URL\
    \ in the input box of the Hystrix dashboard screen, as shown in Figure [6-5](#454149_1_En_6_Chapter.xhtml#Fig5).\
    \ Additionally we need to visit the `/api/orders` API endpoint of `eshop` service\
    \ again, as we did in Section [6.3.3.6](#454149_1_En_6_Chapter.xhtml#Sec28). The\
    \ dashboard will look like Figure [6-6](#454149_1_En_6_Chapter.xhtml#Fig6).\n\n\
    ![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig6_HTML.jpg](images/454149_1_En_6_Chapter/454149_1_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6\n\nHystrix dashboard with inventory-service working\n\nWe can see\
    \ the Circuit Closed in Figure [6-6](#454149_1_En_6_Chapter.xhtml#Fig6). We have\
    \ a number appearing in green as “3” under `orderProduct`.\n\nTo validate the\
    \ reverse case, we need to stop the inventory service for a while and visit the\
    \ `/ api/orders` API endpoint of `eshop` service a few times. Let’s look at the\
    \ console logs of `eshop` service again after stopping the `inventory-service`:\n\
    \n```\n2019-04-02 22:13:18.002 ERROR [eshop,7155a8b13c0b7e1b,\n2a018f069c73c5b7,false]\
    \ 70051 --- [-OrderService-2]\nc.e.eshop.service.impl.OrderService      : Inventory\
    \ Service is responding very slow\n2019-04-02 22:13:18.003 ERROR [eshop,7155a8b13c0b7e1b,\n\
    7155a8b13c0b7e1b,false] 70051 --- [nio-8081-exec-6]\ncom.example.eshop.web.TestController\
    \     : Transactions are failing, please check after some time\n```\n\nThese log\
    \ statements were added to the `OrderService.handleInventoryFailure()` method\
    \ in the `eshop` service. This validates that the fallback method is getting called,\
    \ in case of timeout from an inventory service. In other words, the circuit has\
    \ opened and the fallback mechanism is working fine. We can now observe the same\
    \ effect in the Hystrix dashboard, as shown in Figure [6-7](#454149_1_En_6_Chapter.xhtml#Fig7).\n\
    \n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig7_HTML.jpg](images/454149_1_En_6_Chapter/454149_1_En_6_Fig7_HTML.jpg)\n\
    \nFigure 6-7\n\nHystrix dashboard when inventory-service is not working\n\nWe\
    \ can see from Figure [6-7](#454149_1_En_6_Chapter.xhtml#Fig7) that there are\
    \ six requests that short-circuited. This means there are six requests that have\
    \ been caught by Hystrix because target service (`inventory-service`) was not\
    \ working.\n\n## Request Tracing in the Microservices Architecture\n\nAnother\
    \ common challenge in distributed systems programming is that post production\
    \ deployment, it becomes difficult to trace the request flow across services.\
    \ This concern creates two problems to solve—centralized logs and request tracing.\n\
    \nFor central logging, we need to merge all logs generated on multiple servers\
    \ to a central point where we can do searching, troubleshooting, and analytics.\
    \ This is not a new problem. The industry standard solutions collect and allow\
    \ searching on logs from multiple nodes in a cluster. Examples include ELK, Fluentd,\
    \ Graylog, Splunk, and more. They all support two modes of log collection:\n\n\
    *   On the basis of an agent doing tail on the log files and sending the most\
    \ recently collected ones incrementally to the server.\n\n*   Sending logs directly\
    \ using their API SDKs from the application to the server.\n\nRequest tracing\
    \ is a different problem to solve and becomes bigger with the increasing number\
    \ of microservices. This is required when we want to trace a request or a transaction\
    \ spanning multiple services.\n\nSpring Cloud offers a solution for this need\
    \ through Spring Cloud Sleuth. Let’s say we want to trace a single failing (with\
    \ some error code) request or even do log analysis based on some common attribute\
    \ for any request across services. This library can be helpful in embedding a\
    \ TraceId for each new request in logs. TraceId is a unique UUID for every single\
    \ new request, generated by Spring Sleuth. If the request goes through multiple\
    \ services, Spring Sleuth will track this ID and keep it the same in the second\
    \ service logs as well.\n\nThere are four such attributes generated with two such\
    \ IDs. The full syntax of this generated data looks like this:\n\n*   `APPLICATION_NAME`:\
    \ The name of the service\n\n*   `TRACE_ID`: The unique ID for the request\n\n\
    *   `SPAN_ID`: The unique ID for each span of work. In our example, `SPAN_ID`\
    \ will be different for the `Eshop` and `Inventory` services for the same request.\n\
    \n*   `EXPORT_LOGS_OR_NOT`: Whether or not logs should be exported to some other\
    \ tool.\n\n```\n[APPLICATION_NAME, TRACE_ID, SPAN_ID, EXPORT_LOGS_OR_NOT]\n```\n\
    \nThere are tools also available today that can help you visualize the logs utilizing\
    \ the generated attributes and trace the services. Two such examples are Google’s\
    \ Dapper and Zipkin. We will not discuss them in detail, as they are not in the\
    \ scope of this book. In order to implement distributed tracing logs in an application,\
    \ there are four steps:\n\n1.  Add the new dependencies to the `eshop` and `inventory-service`\
    \ microservices in the `build.gradle` file and restart them:\n\n```\n    compile(\"\
    org.springframework.cloud:spring-cloud-starter-sleuth\")\n    compile(\"org.springframework.cloud:spring-cloud-starter-zipkin\"\
    )\n    ```\n\n2.  Download and start the Zipkin Jar file as a service from `zipkin.io`:\n\
    \n```\n    java -jar ./zipkin-server-2.12.7-exec.jar\n    ```\n\n1.  Add a property\
    \ to the `application.yml` file of `eshop` and `inventory-service` and restart\
    \ them both:\n\n```\n    spring.zipkin.base-url: http://localhost:9411/\n    ```\n\
    \n1.  Visit the `/api/orders` API of the `eshop` service a couple of times again.\n\
    \n```\n    > curl -H \"Content-Type: application/json\" -X POST -i http://localhost:8081/eshop/\
    \ api/orders\n    ```\n\nOnce you have made these changes, Spring Cloud Sleuth\
    \ will start adding the following attributes to each log statement.\n\n```\n/eshop/src/main/resources/application.yml\n\
    INFO [eshop,6e0abc792dc25b96,e49bf80a97204e7e,false] 67023 --- [-OrderService-1]\n\
    c.e.eshop.service.impl.OrderService      : Result from inventory service:\n{quantity=2,\
    \ productId=1, price=200, inventoryId=1}\n/inventory-service/src/main/resources/application.yml\n\
    INFO [inventory-service,3d3af1edbfa15240,50f818143fd68f39,false] 19246 ---\n[nio-8082-exec-1]\
    \ c.e.e.inventory.web.InventoryResource    : Inventory request for product: 1\n\
    ```"
  trans: "\n### 检查 Hystrix\n\n我们需要重启 `eshop` 和 `inventory-service` 应用程序以应用这些更改。\n\n\
    ![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig5_HTML.jpg](img/454149_1_En_6_Fig5_HTML.jpg)\n\
    \n图 6-5\n\nHystrix 仪表盘\n\n```\n> gradle bootRun\n>\n:: Spring Boot ::        (v2.1.3.RELEASE)\n\
    70051 --- [           main] com.example.eshop.EshopApp               :No active\n\
    profile set, falling back to default profiles: default\n70051 --- [          \
    \ main] o.s.boot.actuate.endpoint.EndpointId     : Endpoint ID\n'service-registry'\
    \ contains invalid characters, please migrate to a valid format.\n70051 --- [\
    \           main] o.s.b.w.embedded.tomcat.TomcatWebServer  : Tomcat initialized\
    \ with port(s): 8081 (http)\n70051 --- [           main] o.s.b.a.e.web.ServletEndpointRegistrar\
    \   : Registered '/actuator/hystrix.stream' to hystrix.stream-actuator-endpoint\n\
    70051 --- [           main] o.s.c.n.e.s.EurekaServiceRegistry        : Registering\
    \ application ESHOP with eureka with status UP\n70051 --- [           main] o.s.b.w.embedded.tomcat.TomcatWebServer\
    \  : Tomcat started on port(s): 8081 (http) with context path '/eshop'\n```\n\n\
    Hystrix 还会隐式地在 `\"http://localhost:8081/eshop/hystrix\"` 创建一个默认端点。\n\n在底层，Hystrix\
    \ 会生成一个指标数据流，可通过 `http://localhost:8081/eshop/actuator/hystrix.stream` 访问。我们需要在\
    \ Hystrix 仪表盘界面的输入框中输入此 Hystrix 流 URL，如图 6-5 所示。此外，我们还需要像在 6.3.3.6 节中那样，再次访问 `eshop`\
    \ 服务的 `/api/orders` API 端点。仪表盘将如图 6-6 所示。\n\n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig6_HTML.jpg](img/454149_1_En_6_Fig6_HTML.jpg)\n\
    \n图 6-6\n\ninventory-service 正常运行时的 Hystrix 仪表盘\n\n我们可以在图 6-6 中看到“断路器已闭合”。在 `orderProduct`\
    \ 下方，有一个绿色的数字“3”。\n\n为了验证相反的情况，我们需要停止 inventory-service 一段时间，并多次访问 `eshop` 服务的\
    \ `/api/orders` API 端点。让我们在停止 `inventory-service` 后，再次查看 `eshop` 服务的控制台日志：\n\n\
    ```\n2019-04-02 22:13:18.002 ERROR [eshop,7155a8b13c0b7e1b,\n2a018f069c73c5b7,false]\
    \ 70051 --- [-OrderService-2]\nc.e.eshop.service.impl.OrderService      : Inventory\
    \ Service is responding very slow\n2019-04-02 22:13:18.003 ERROR [eshop,7155a8b13c0b7e1b,\n\
    7155a8b13c0b7e1b,false] 70051 --- [nio-8081-exec-6]\ncom.example.eshop.web.TestController\
    \     : Transactions are failing, please check after some time\n```\n\n这些日志语句被添加到了\
    \ `eshop` 服务的 `OrderService.handleInventoryFailure()` 方法中。这验证了当 inventory-service\
    \ 超时时，降级方法被调用了。换句话说，断路器已打开，降级机制运行正常。我们现在可以在 Hystrix 仪表盘中观察到同样的效果，如图 6-7 所示。\n\n\
    ![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig7_HTML.jpg](img/454149_1_En_6_Fig7_HTML.jpg)\n\
    \n图 6-7\n\ninventory-service 未运行时的 Hystrix 仪表盘\n\n从图 6-7 中我们可以看到，有六个请求发生了短路。这意味着有六个请求被\
    \ Hystrix 捕获，因为目标服务（`inventory-service`）未运行。\n\n## 微服务架构中的请求追踪\n\n分布式系统编程中的另一个常见挑战是，在生产部署后，很难跨服务追踪请求流。这个问题带来了两个需要解决的难题——集中式日志和请求追踪。\n\
    \n对于集中式日志记录，我们需要将多台服务器上生成的所有日志合并到一个中心点，以便进行搜索、故障排除和分析。这不是一个新问题。行业标准解决方案可以收集并允许搜索集群中多个节点的日志。例如\
    \ ELK、Fluentd、Graylog、Splunk 等。它们都支持两种日志收集模式：\n\n*   基于代理对日志文件进行 tail 操作，并将最新收集的日志增量发送到服务器。\n\
    \n*   使用应用程序的 API SDK 直接将日志发送到服务器。\n\n请求追踪是一个不同的问题，并且随着微服务数量的增加而变得更加棘手。当我们想要追踪跨越多个服务的请求或事务时，就需要用到它。\n\
    \nSpring Cloud 通过 Spring Cloud Sleuth 为这一需求提供了解决方案。假设我们想要追踪单个失败的请求（带有某些错误码），甚至基于跨服务的任何请求的某些公共属性进行日志分析。这个库有助于在日志中为每个新请求嵌入一个\
    \ TraceId。TraceId 是 Spring Sleuth 为每个新请求生成的唯一 UUID。如果请求经过多个服务，Spring Sleuth 将追踪此\
    \ ID，并在第二个服务的日志中保持其相同。\n\n生成的属性共有四个，包含两个这样的 ID。生成数据的完整语法如下所示：\n\n*   `APPLICATION_NAME`：服务的名称\n\
    \n*   `TRACE_ID`：请求的唯一 ID\n\n*   `SPAN_ID`：每个工作跨度的唯一 ID。在我们的示例中，对于同一个请求，`SPAN_ID`\
    \ 在 `Eshop` 和 `Inventory` 服务中是不同的。\n\n*   `EXPORT_LOGS_OR_NOT`：是否应将日志导出到其他工具。\n\
    \n```\n[APPLICATION_NAME, TRACE_ID, SPAN_ID, EXPORT_LOGS_OR_NOT]\n```\n\n目前也有一些工具可以帮助您利用生成的属性可视化日志并追踪服务。两个这样的例子是\
    \ Google 的 Dapper 和 Zipkin。我们不会详细讨论它们，因为它们不在本书的讨论范围内。为了在应用程序中实现分布式追踪日志，需要四个步骤：\n\
    \n1.  在 `build.gradle` 文件中为 `eshop` 和 `inventory-service` 微服务添加新的依赖项，然后重启它们：\n\
    \n```\n    compile(\"org.springframework.cloud:spring-cloud-starter-sleuth\")\n\
    \    compile(\"org.springframework.cloud:spring-cloud-starter-zipkin\")\n    ```\n\
    \n2.  从 `zipkin.io` 下载 Zipkin Jar 文件并作为服务启动：\n\n```\n    java -jar ./zipkin-server-2.12.7-exec.jar\n\
    \    ```\n\n1.  在 `eshop` 和 `inventory-service` 的 `application.yml` 文件中添加一个属性，然后重启它们两个：\n\
    \n```\n    spring.zipkin.base-url: http://localhost:9411/\n    ```\n\n1.  再次访问\
    \ `eshop` 服务的 `/api/orders` API 几次。\n\n```\n    > curl -H \"Content-Type: application/json\"\
    \ -X POST -i http://localhost:8081/eshop/ api/orders\n    ```\n\n完成这些更改后，Spring\
    \ Cloud Sleuth 将开始向每个日志语句添加以下属性。\n\n```\n/eshop/src/main/resources/application.yml\n\
    INFO [eshop,6e0abc792dc25b96,e49bf80a97204e7e,false] 67023 --- [-OrderService-1]\n\
    c.e.eshop.service.impl.OrderService      : Result from inventory service:\n{quantity=2,\
    \ productId=1, price=200, inventoryId=1}\n/inventory-service/src/main/resources/application.yml\n\
    INFO [inventory-service,3d3af1edbfa15240,50f818143fd68f39,false] 19246 ---\n[nio-8082-exec-1]\
    \ c.e.e.inventory.web.InventoryResource    : Inventory request for product: 1\n\
    ```\n"
