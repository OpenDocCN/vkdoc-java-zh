    ### 使用通用基础仓库


    许多大型应用需要一个基础仓库实现来创建通用方法，例如保存后刷新。因此，我们会填充主键 ID，有时也会填充数据库中其他自动生成的列。理想情况下，JPA 默认会执行此操作，但在事务中，实体数据会在事务结束或提交时才会被回填，因为`flush()`方法正是在此时内部触发的。


    有人可能会主张使用`saveAndFlush()`方法代替`save()`。在事务中过早调用`saveAndFlush()`并手动结束方法可能并非正确选择，因为这会破坏
    Hibernate 的内部优化。开发者也可以在保存后调用`find()`或`load()`方法，但通常需要在单个方法和单个事务中保存并读取多个实体。


    例如，我们在第 3.2.5 节的`DataGenerator`类中使用了此技术。我们在`DataGenerator`中展示了其用法，但现在让我们看看如何编写这个基础仓库实现（参见代码清单
    3-23）。


    ```

    package com.example.blog_app.repository.base;

    import org.springframework.data.jpa.repository.JpaRepository;

    import org.springframework.data.repository.NoRepositoryBean;

    import java.io.Serializable;

    @NoRepositoryBean

    public interface BaseRepository extends JpaRepository {

    void refresh(T t);

    }

    package com.example.blog_app.repository.base;

    import org.springframework.data.jpa.repository.support.JpaEntityInformation;

    import org.springframework.data.jpa.repository.support.SimpleJpaRepository;

    import javax.persistence.EntityManager;

    import org.springframework.transaction.annotation.Transactional;

    import java.io.Serializable;

    public class BaseRepositoryImpl extends SimpleJpaRepository implements BaseRepository
    {

    private final EntityManager entityManager;

    public BaseRepositoryImpl(JpaEntityInformation entityInformation, EntityManager
    entityManager) {

    super(entityInformation, entityManager);

    this.entityManager = entityManager;

    }

    @Override

    @Transactional

    public void refresh(T t) {

    entityManager.refresh(t);

    }

    }

    package com.example.blog_app.repository;

    import com.example.blog_app.model.jpa.Blog;

    import com.example.blog_app.repository.base.BaseRepository;

    public interface BlogRepository extends BaseRepository {

    }

    代码清单 3-23

    基础仓库定义

    ```


    注意：


    *   Spring Data 内部使用 `SimpleJpaRepository` 类作为通用实现，来管理开发者定义的自定义仓库的动态仓库定义。


    *   我们有一个用 `@NoBeanRepository` 注解的 `BaseRepository` 接口，这是 Spring 定义所有仓库超类的约定。


    *   我们将 `BaseRepositoryImpl` 类定义为 `BaseRepository` 的实现，它继承了 `SimpleJpaRepository`
    类。我们还在该类中添加了一个 `refresh()` 方法。


    *   `EntityManager` 实例已对该对象可用。


    *   所有继承此新 `BaseRepository` 接口的仓库都将能访问所有非私有的通用方法。


    *   如果我们从仓库中移除它，`DataGenerator` 类将无法工作。这是因为我们在一个事务中插入了多个实体，并在 `DataGenerator.generateSampleData`
    方法末尾事务提交之前，在方法内部使用了这些实体。


    ## 总结


    我们学习了在 JPA 中处理不同类型关联的各种选项。同时，本章中的示例展示了 Jackson 和 Lombok 注解的正确用法。我们还探讨了枚举、UUID
    的使用，以及通过 JPA 在 PostgreSQL 中使用数组数据类型。最后，我们简要介绍了分页 API。在下一章中，我们将了解 Spring Data JPA
    在性能、懒加载问题等重要用例中的高级用法。


    # 第二部分 解决高级持久化问题与微服务通信挑战


    # 4. JPA 常见用例


    到目前为止，我们已经了解了 JPA 与 Spring Data 的基本设置。在本章中，我们将介绍 Spring Data JPA 的典型行业用例和解决方案：


