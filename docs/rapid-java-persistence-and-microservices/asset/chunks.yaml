- fmt: "### Filters\n\nFilters are the mechanism by which we can customize Zuul behavior.\
    \ These are custom classes where we can implement any functionality and alter\
    \ the routing. Typical use cases for these is to perform authorization and logging\
    \ at a central point, before the request hits a functional microservice. Listing\
    \ [6-33](#454149_1_En_6_Chapter.xhtml#PC59) provides an example of this.\n\n```\n\
    package com.example.eshop.gateway.filters;\nimport com.netflix.zuul.ZuulFilter;\n\
    import lombok.extern.slf4j.Slf4j;\nimport org.springframework.stereotype.Component;\n\
    @Component\n@Slf4j\npublic class AuthPreFilter extends ZuulFilter {\n@Override\n\
    public String filterType() {\nreturn \"pre\";\n}\n@Override\npublic int filterOrder()\
    \ {\nreturn 0;\n}\n@Override\npublic boolean shouldFilter() {\nreturn true;\n\
    }\n@Override\npublic Object run() {\n//Check JWT headers and check Authorization\
    \ tokens validity\n// log requests\nreturn null;\n}\n}\nListing 6-33\nZuul Filter\
    \ Implementation\n```\n\nNotes:\n\n*   The `filterType()` method is used to classify\
    \ a filter by type. Standard types in Zuul are `pre` for pre-routing filtering,\
    \ `route` for routing to an origin, `post` for post-routing filters, and `error`\
    \ for error handling.\n*   The `filterOrder()` method is used to define the ordering\
    \ of filters. This ordering does not have to be sequential.\n*   The `shouldFilter()`\
    \ method contains the logic that determines when to execute this filter.\n*  \
    \ Finally, the `run()` method can be overridden to add custom functionality.\n\
    \n### Running the Application\n\nRun the application:\n\n```\n> gradle bootRun\n\
    >\n:: Spring Boot ::        (v2.1.3.RELEASE)\n2019-04-06 12:46:01.386   INFO 69797\
    \ --- [           main]\ncom.example.eshop.gateway.ZuulApp         : No active\
    \ profile set, falling back to default profiles: default\n2019-04-06 12:46:03.170\
    \   INFO 69797 --- [           main]\no.s.web.context.ContextLoader          \
    \   : Root WebApplicationContext: initialization completed in 1759 ms\n2019-04-06\
    \ 12:46:04.975   INFO 69797 --- [           main]\no.s.b.a.e.web.EndpointLinksResolver\
    \       : Exposing 21 endpoint(s) beneath base path '/actuator'\n2019-04-06 12:46:05.142\
    \   INFO 69797 --- [           main]\no.s.b.w.embedded.tomcat.TomcatWebServer\
    \   : Tomcat started on port(s): 9999 (http) with context path \"\n2019-04-06\
    \ 12:46:05.146   INFO 69797 --- [           main]\ncom.example.eshop.gateway.ZuulApp\
    \         : Started ZuulApp in 5.164 seconds (JVM running for 4.412)\n```\n\n\
    Once the `gateway-service` is up and running, we can access the `eshop`, `config-service`,\
    \ `inventory-service`, and `admin-service` endpoints through just the `gateway-service`\
    \ base URL instead of keeping separate URLs for each of them in client applications.\
    \ As an example:\n\n*   To access the Config service, the URL now will be `http://localhost:8888/config/`\n\
    *   To access the Admin service, the URL now will be `http://localhost:7777/admin/`\n\
    *   To access the Eshop service, the URL now will be `http://localhost:8081/eshop/`\n\
    *   To access the Inventory service, the URL now will be `http://localhost:8082/inventory/`\n\
    \n## Code Reuse Across Services\n\nThis is very often discussed as a practical\
    \ case as to whether we should reuse code created across microservices or not.\
    \ This is generally required to share the common DTO between different functional\
    \ services, which makes the services interdependent. We use microservices to create\
    \ separate of concerns between loosely coupled independent applications, but we\
    \ are doing the opposite now.\n\nThis also brings up a concern as to when different\
    \ services are implemented in different languages, which means the same code cannot\
    \ be used. I have also seen situations in which decision makers said that they\
    \ were building services in Java three years back, are still using Java, and will\
    \ be using Java in next three years as well, so they should not be worried about\
    \ this issue. I shall leave the decision to the reader and discuss how code reuse\
    \ can happen in various ways in Java:\n\n*   Using a multi-module project based\
    \ on Maven or Gradle.\n    *   Very often again we see open source projects using\
    \ this technique. The Spring Framework itself is an example. If you look at the\
    \ Spring content module Grade file (`spring-content.gradle`) in the GitHub repository\
    \ ( [`https://github.com/spring-projects/spring-framework/blob/master/spring-context/spring-context.gradle`](https://github.com/spring-projects/spring-framework/blob/master/spring-context/spring-context.gradle)\
    \ ), it depends on other modules such as `spring-core` and `spring-eans`. We will\
    \ not discuss multi-module build setups here, as they are out of scope for this\
    \ book.\n*   Using a build artifact repository manager solution like Archiva (open\
    \ source), JFrog, or Sonatype Nexus. In other languages, these solutions are referred\
    \ to as package managers.\n    *   This can be achieved using the `uploadArchives`\
    \ configuration property in Gradle. With every new build, a new version of the\
    \ Jar file can be uploaded to the internal repository of the organization. For\
    \ example, if we have `common-models` as the module, all versions of this can\
    \ be uploaded to the internal repository and then used as a dependency in other\
    \ services.\n*   Copying the common code in all services again.\n    *   This\
    \ is the worst method because all common data models can be copied again and again\
    \ in different services. As an example, if the `product-catalog` and `inventory`\
    \ services need a `Product` object, they can be copied.\n*   Carefully creating\
    \ different consumer versions of shared domain classes.\n    *   This is often\
    \ the preferred approach, as described by many experts. Taking the same example\
    \ as before, let’s say that the `product-catalog` service owns the `Product` data\
    \ model. If `inventory-service` also needs this object, should we create a `ProductView`\
    \ class so that a focused subview of the actual object can be created in this\
    \ service? This could contain a few lesser attributes as well as different ones.\
    \ Even if the actual `Product` class changes in `product-service`, `ProductView`\
    \ can remain the same. This approach also supports polyglot microservices very\
    \ well, as there is no code sharing.\n\n## Microservices Security\n\nSecuring\
    \ a distributed system with microservices brings multiple new challenges over\
    \ a monolith having user registration, logins, and authorization in a single application.\
    \ There are still a lot of common concerns in both cases, such as different modes\
    \ of authentication, authorization at the methods level within code, OWASP, and\
    \ more. We may need to have OAuth-based authentication with a monolith because\
    \ there might be multiple monolith applications in your enterprise.\n\nIn an enterprise,\
    \ you may need to design a SSO (Single Sign On) with a corporate LDAP system.\
    \ OAuth, SAML, SSO, and JWTs are still the same however with microservices, so\
    \ we may want to keep the authentication and token validation at the API Gateway\
    \ level. Let’s try to explore this idea by enabling JWT (Json Web Tokens)-based\
    \ token authentication in `gateway-service` and token creation in the `eshop`\
    \ service.\n\n### Eshop Service Changes\n\nWe need to have login in the front-end\
    \ facing microservice, which is `eshop` for us. We will need to create a `LoginController`\
    \ class to handle authentication and create a JWT token based on a predefined\
    \ user with the email `raj@example.com`. Additionally we need a dependency addition\
    \ in the `build.gradle` file:\n\n```\ncompile group: 'io.jsonwebtoken', name:\
    \ 'jjwt', version: '0.9.1'\n```\n\nLet’s now look at the controller class."
