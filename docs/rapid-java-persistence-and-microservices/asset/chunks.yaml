    \n## 总结\n\n在本章中，我们了解了 Spring Data JPA 能够提供极大帮助的一些常见问题的解决方案。我跳过了使用 Spring Data\
    \ JPA 运行原生 SQL 查询的技巧，因为我想展示当今可用的更新解决方案。在下一章中，我们将探索除 JPA 之外用于通用数据访问的一些解决方案。\n\n\
    # 5. 不使用 ORM 的 Java 持久化\n\n到目前为止，我们快速浏览了 Spring Data JPA，主要关注其正面用例。使用 ORM 框架也有一些缺点。随着当今对应用程序扩展能力的需求日益增长，讨论\
    \ ORM 的这些相关问题变得非常重要。本章将探讨当应用程序规模超出常规限制时，ORM 所面临的与性能相关的问题：\n\n*   对于每个操作，ORM 框架都必须管理实体的生命周期，从而导致额外的开销。例如，无论实体是瞬态的、持久的还是分离的，Hibernate\
    \ 都会进行额外的检查，并确保所有状态更改事件的一致性。\n\n*   从 JPQL 创建 SQL 查询，或对实体执行操作时产生的成本是额外的开销。\n\n\
    *   特定于数据库的 SQL 优化难以管理。每个供应商都有某些变体，任何 ORM 都难以支持所有这些变体。这可能会限制查询的微调。\n\n*   除了领域对象或实体之外，我们还需要\
    \ DTO（数据传输对象）类，并且需要进行映射，这会影响整体性能。额外的代码库使得维护成本更高。以下是需要单独 DTO 层的一些常见原因：\n    * \
    \  DTO 与 UI/客户端层或用例紧密绑定，因此它们可能比领域模型拥有更多和/或更少的属性。\n\n    *   UI 数据需求与后端数据管理之间没有严格的契约，这使事情变得稍微容易一些。\n\
    \n    *   有时，出于安全原因，必须限制某些属性返回给客户端，尽管在实体上使用 `@JsonIgnore` 也是一种选择。\n\n    *   领域模型的更改可以在不更改\
    \ DTO 类的情况下进行。\n\n作为 Java 中 ORM 的替代方案，我们寻找能够灵活地向 SQL 数据库发起原生查询，并帮助将结果映射回对象的解决方案。在\
    \ Spring 框架中，我们有多种选择来实现这一点：\n\n*   Spring Data JPA 原生查询支持\n\n*   JDBCTemplate\n\
    \n*   Spring Data JDBC\n\n也可以与其他框架集成，例如 MyBatis 和 JOOQ，但我们重点关注由 Spring 社区创建的方案。其优势在于\
    \ API 的一致性和更简单的集成。我们在前一章中讨论了 Spring Data JPA 的原生查询支持。接下来，让我们在下一节中了解 JDBCTemplate\
    \ 和 Spring Data JDBC。\n"
- fmt: "# Spring JDBC Template\n\nThe Spring `JDBCTemplate` is the API created by\
    \ the Spring Framework that performs native SQL queries on relational databases\
    \ and maps the results back to custom Java objects. Let’s look at a very small\
    \ example to recreate our `Eshop` app, connecting it to a MySQL DB. We will query\
    \ customers, products purchased, and order information in a single query. This\
    \ result should be mapped to a single DTO class called `CustomerOrder` using the\
    \ following steps:\n\n1. Create a Gradle-based application\n2. Initialize and\
    \ run sample SQL queries to fill the `Customer`, `Product`, and `Order` tables.\n\
    3. Define a new DTO called `CustomerOrder`.\n4. Run a SQL query and map the results\
    \ back to the object model; i.e., a list called `CustomerOrder`.\n\nLet’s build\
    \ an application with the following code structure:\n\n`eshop-jdbc-template-ch5`\n\
    \n```\n.\n├── build.gradle\n└── src\n    ├── main\n    │   ├── java\n    │   │\
    \   └── com\n    │   │       └── example\n    │   │           └── eshop\n    │\
    \   │               ├── Application.java\n    │   │               └── model\n\
    \    │   │                   └── dto\n    │   │                       └── CustomerOrder.java\n\
    \    │   └── resources\n    │       └── application.properties\n    └── test\n\
    \        ├── java\n        │   └── com\n        │       └── example\n        │\
    \           └── eshop\n        │               └── EshopAppTests.java\n      \
    \  └── resources\n            └── schema.sql\n```\n\n## Application Setup\n\n\
    Create a new application called `eshop-jdbc-template-ch5` from [`http://www.spring.io`](http://www.spring.io)\
    \ with the following dependencies in the `build.gradle` file (see Listing 5-1).\n\
    \n```\ndependencies {\n    compile ([\n        \"org.springframework.boot:spring-boot-starter-jdbc\"\
    ,\n        \"org.springframework.boot:spring-boot-starter-test\"\n    ])\n   \
    \ compile ([\n        \"mysql:mysql-connector-java:8.0.15\",\n        \"org.projectlombok:lombok:1.18.6\"\
    \n    ])\n    testCompile(\"junit:junit\")\n    testCompile(\"org.projectlombok:lombok:1.18.6\"\
    )\n    annotationProcessor(\"org.projectlombok:lombok:1.18.6\")\n    testAnnotationProcessor(\"\
    org.projectlombok:lombok:1.18.6\")\n}\n```\n\n*Listing 5-1: The Build.gradle File*\n\
    \n## Configuration and Initial Schema Script\n\nWe need the datasource-specific\
    \ properties in the `application.properties` file (see Listing 5-2).\n\n```\n\
    application.properties\nspring.datasource.url=jdbc:mysql://localhost:3306/eshop\n\
    spring.datasource.username=root\nspring.datasource.password=mysql\nspring.datasource.driver-class-name:\
    \ com.mysql.jdbc.Driver\n\nschema.sql\nCREATE TABLE IF NOT EXISTS Customer (\n\
    \    customerId int(11) unsigned NOT NULL AUTO_INCREMENT PRIMARY KEY,\n    dateAdded\
    \ datetime DEFAULT NULL,\n    email varchar(255) DEFAULT NULL,\n    name varchar(255)\
