- fmt: "### Using a Common Base Repository\n\nMany big applications need a base repository\
    \ implementation in order to create common methods, like refreshing after saving.\
    \ As a result, we populate the primary key ID and sometimes other auto-generated\
    \ columns in the database. Ideally, JPA does this by default, but in case of transactions,\
    \ the entity is populated back until the transaction ends or a commit happens\
    \ because that is where `flush()` happens internally.\n\nPeople may argue that\
    \ the `saveAndFlush()` method can be used instead of `save()`. Calling `saveAndFlush()`\
    \ earlier and having the method end manually may not be the right choice in a\
    \ transaction, because that will hit Hibernate’s internal optimizations. Developers\
    \ can also call a `find()` or `load()` method after it has been saved, but there\
    \ is often a need to save and read with multiple entities in a single method and\
    \ a single transaction.\n\nAs an example, we used this technique in Section 3.2.5\
    \ in the `DataGenerator` class. We have its usage in `DataGenerator`, but let’s\
    \ now see how to write this base repository implementation (see Listing [3-23](#454149_1_En_3_Chapter.xhtml#PC33)).\n\
    \n```\npackage com.example.blog_app.repository.base;\nimport org.springframework.data.jpa.repository.JpaRepository;\n\
    import org.springframework.data.repository.NoRepositoryBean;\nimport java.io.Serializable;\n\
    @NoRepositoryBean\npublic interface BaseRepository extends JpaRepository {\nvoid\
    \ refresh(T t);\n}\npackage com.example.blog_app.repository.base;\nimport org.springframework.data.jpa.repository.support.JpaEntityInformation;\n\
    import org.springframework.data.jpa.repository.support.SimpleJpaRepository;\n\
    import javax.persistence.EntityManager;\nimport org.springframework.transaction.annotation.Transactional;\n\
    import java.io.Serializable;\npublic class BaseRepositoryImpl extends SimpleJpaRepository\
    \ implements BaseRepository {\nprivate final EntityManager entityManager;\npublic\
    \ BaseRepositoryImpl(JpaEntityInformation entityInformation, EntityManager entityManager)\
    \ {\nsuper(entityInformation, entityManager);\nthis.entityManager = entityManager;\n\
    }\n@Override\n@Transactional\npublic void refresh(T t) {\nentityManager.refresh(t);\n\
    }\n}\npackage com.example.blog_app.repository;\nimport com.example.blog_app.model.jpa.Blog;\n\
    import com.example.blog_app.repository.base.BaseRepository;\npublic interface\
    \ BlogRepository extends BaseRepository {\n}\nListing 3-23\nBase Repository Definition\n\
    ```\n\nNotes:\n\n- Spring Data internally uses the `SimpleJpaRepository` class\
    \ as the generic implementation to manage dynamic repository definitions of the\
    \ custom repositories defined by the developer.\n- We have a `BaseRepository`\
    \ interface annotated with `@NoRepositoryBean`, which is a Spring convention to\
    \ define a superclass for all repositories.\n- We defined the `BaseRepositoryImpl`\
    \ class as the definition of `BaseRepository`, which extends the `SimpleJpaRepository`\
    \ class. We also added a `refresh()` method in this class.\n- The `EntityManager`\
    \ instance is already available to this object.\n- All repositories extending\
    \ this new `BaseRepository` interface will have access to all non-private common\
    \ methods.\n- If we remove this from the repositories, the `DataGenerator` class\
    \ will not work. This is because we are inserting multiple entities in a transaction\
    \ and using them within the method itself before the transaction commits at the\
