    注意事项：


    *   字段的数据类型应定义为对象而非基本类型，因为基本类型在处理空值时可能引发问题。


    *   `user` 实体在其定义中被引号包围，例如 ``@Table(name = "`user`")``。这是必要的，因为 `user` 是 PostgreSQL
    中的关键字。在 `schema.sql` 文件中也使用了相同的字符。


    *   我们在 `Blog` 和 `User` 对象中定义了 `@OneToMany` 注解。定义此关系时需要遵循一些约定。这里以 `User -> Post`
    对象为例：


    *   根据 Hibernate 文档的最佳实践，始终优先将关联定义为 `Lazy`。


    *   根据 Hibernate 文档的最佳实践，定义双向关联，因为这样在两侧进行导航都更容易。然而，它们定义起来稍显复杂且难以保持同步。例如，在添加新的
    `POST` 时，两个实体（`POST` 和 `Blog`）都需要刷新以保持内存中对象的同步。


    *   父对象（`User`）有一个属性设置为 `mappedBy=user`，该属性映射了子对象（此处为 `POST`）中的 `user` 字段。仅当关系是双向时才需要此设置。


    *   `CascadeType.ALL` 会在父实体被删除或更新时，触发所有级联事件到内存中的子对象。例如，当用户被删除时，所有相关的 `POST` 行将成为孤儿。`orphanRemoval=true`
    会进一步从数据库中删除这些相关行。


    *   在另一端，子对象或 `POST` 实体必须使用 `Cascade.REFRESH` 进行注解，以便在任何子对象被删除或更新时，仅刷新父对象。


    *   我们通过 Lombok 的 `@ToString` 和 `@EqualsAndHashCode` 忽略了延迟加载的字段。这将忽略 `toString()`、`equals()`
    和 `hashCode()` 方法生成代码中的关系字段。


    *   `@JsonIgnore` 用于相关字段之上，以在序列化和反序列化过程中忽略它们。


