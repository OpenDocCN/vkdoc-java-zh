    \ the sole member (owner) is Springer Science + Business Media Finance Inc (SSBM\
    \ Finance Inc). SSBM Finance Inc is a Delaware corporation.\n\n*To my beloved\
    \ Guru Ji*\n\n## Acknowledgments\n\nI want to thank the whole team at Packt for\
    \ all their support in making my dream come true. Special thanks to Manuel and\
    \ Chris, as reviewers, they helped me and shaped my writing as a professional.\
    \ Thanks to Steve for giving me this opportunity and Mark for supporting me with\
    \ patience in the entire duration.\n\nI want to thank my wife, Divya, for giving\
    \ me the inspiration, belief, and constant encouragement to pursue my passion\
    \ of writing. I also want to thank my father Lt. Shri R. S. Malhotra and my mother\
    \ Kailash Malhotra who gave me their unconditional support so that I could devote\
    \ all my spare time to writing. Finally, big thanks to my Guru Ji, who gave me\
    \ the idea to share whatever I have learned from this big world, to the world\
    \ again.\n\n### About the Author\n\n### About the Technical Reviewer\n\n# Part\
    \ I: Java Ecosystem Review and Persistence Quick Start\n\n# 1. Introduction\n\n\
    Welcome to *Rapid Java Persistence and Microservices*. In the past few years,\
    \ we have seen a constant rise in new technologies coming out. Especially for\
    \ newcomers, it has become harder to become an all-around developer or even decide\
    \ which programming language to learn first. Programmers often want to learn a\
    \ language like Java so that they can work in any domain and do anything, including\
    \ web development, Big Data, mobile development, machine learning, etc. This is\
    \ not easy and a few issues that further complicate this goal include:\n\n*  \
    \ There are many frameworks and technologies in every programming language.\n\
    *   Competition is fierce and time-to-market is very brief.\n*   There is a bigger\
    \ and ever-growing need for scalability and data storage.\n*   Complicated deployments,\
    \ release management, and automation affect our decisions.\n\nThis book covers\
    \ Java-based backend development through various frameworks, which should make\
    \ development a lot easier, faster, and more efficient. This book is for impatient\
    \ developers and architects who do not want to read too much theory, hundreds\
    \ of concepts, and repeated text. Instead, this book is a quick tool to help you\
    \ refresh concepts using to-the-point explanations and concrete real-world examples.\n\
    \nBefore moving to the main part of the book, this chapter looks at some of the\
    \ benefits of Java, explains what this book provides, covers the current issues\
    \ in Java, and discusses the kinds of practical problems and solutions covered\
    \ in this book.\n\n## Why Java and Why This Book\n\nSo, what makes Java a good\
    \ development solution, and why is this book the one developers should use?\n\n\
    The answer to the first question, in my opinion, includes these benefits of Java:\n\
    \n*   Enterprise-level business application development.\n*   Long-term reliable\
    \ solutions that remain stable.\n*   Superior readability and maintainability.\n\
    *   A very strong community that gives you a lot of power and solutions to problems.\n\
    *   Syntactical shortcuts in languages may only help in the short term.\n\nGiven\
    \ the benefits of Java, here are a few good reasons to read this book:\n\n*  \
    \ We cover all data access variations in simplified form through Java. These variations\
    \ include RDBMS access via ORMs, JDBC, and NoSQLs.\n*   As an architect, you’ll\
    \ want to refresh your understanding of all key and advanced concepts quickly\
    \ in order to design better decisions and address development issues.\n*   Some\
    \ developers are moving to languages other than Java for development and to frameworks\
    \ other than Spring. They feel that Java has become too large and that frameworks\
    \ like Spring Data JPA, Hibernate, and so forth are slow in development. Due to\
    \ their difficulty to learn, time-to-market increases. We will simplify this process\
    \ through a rapid-fire overview of JPA and the various needed solutions in short\
    \ form.\n*   There are many misleading examples being thrown on to the Internet\
    \ that use obsolete ways of comparing Java to other languages. This book is in\
    \ a quick notes-like format, which will also help guide you.\n*   A few years\
    \ back, developers faced difficulty in clearing interviews only in Java. Let’s\
    \ think about the situation now and consider what all developers have to be knowledgeable\
    \ of:\n    *   Java, with all its concepts and APIs.\n    *   The latest frameworks,\
    \ with their pros and cons.\n    *   SQL and RDBMS concepts.\n    *   NoSQL concepts\
    \ and their production issues.\n    *   Enterprise and full text search-related\
    \ solutions like ElasticSearch and Solr.\n    *   Big Data and machine learning\
    \ concepts.\n    *   Reactive development.\n    *   Security mechanisms for an\
    \ API to the middle layer and data-level security.\n    *   Headless computing\
    \ or architectures.\n\nWhy not have solutions for all these fields and layers\
    \ through one single language? We all need quick solutions and code with examples.\
    \ A lot of information is available on the web, but it’s not without its problems:\n\
    \n*   Many online articles are obsolete. They may take you through unnecessary\
    \ trials and experiments.\n*   They often include unnecessary explanations. To-the-point\
    \ quick solutions are required.\n\nConsidering the success of Java 8 and other\
    \ language frameworks like Django, writing only the minimum lines of code is what\
    \ everyone needs. Even if the shortcuts look dirty or opinionated, this is what\
    \ we need at times in today’s world. Even if the concepts are good, we don’t want\
    \ to go through thousands of concepts just to achieve a small thing."
