    图 7-1.


    GraphiQL 编辑器


    请注意关于编辑器的以下几点：


    *   左侧面板接受输入。

    *   右侧面板将显示输出或错误。

    *   内置支持美化、历史记录、文档和查询变量。

    *   如前所述，您可以删除所有内容，然后按 Crtl+Space 获取所有建议。


    让我们看看两个预定义的变更和查询输入及其结果（参见图 7-2 和 7-3）。


