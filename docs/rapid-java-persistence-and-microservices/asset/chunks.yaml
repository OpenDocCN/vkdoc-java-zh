  raw: '### Model Class and Repository Definition


    We will create a simple *POJO* (plain old Java object) with Spring Data annotations
    (see Listing [8-3](#454149_1_En_8_Chapter.xhtml#PC9)). We will also look at a
    Spring Data Reactive repository definition in Listing [8-4](#454149_1_En_8_Chapter.xhtml#PC10).


    ```

    package com.example.eblog.model;

    import lombok.AllArgsConstructor;

    import lombok.Builder;

    import lombok.Data;

    import org.springframework.data.annotation.Id;

    import org.springframework.data.relational.core.mapping.Column;

    import java.io.Serializable;

    @Data

    @Builder

    @AllArgsConstructor

    public class Post implements Serializable {

    @Id

    private Long id;

    private String title;

    @Column("content")

    private String content;

    public Post()   {}

