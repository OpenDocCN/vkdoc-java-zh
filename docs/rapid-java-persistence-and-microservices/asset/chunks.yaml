  raw: '## Spring JDBC Template


    The Spring JDBCTemplate is the API created by the Spring Framework that performs
    native SQL queries on relational databases and maps the results back to custom
    Java objects. Let’s look at a very small example to recreate our Eshop app, connecting
    it to a MySQL DB. We will query customers, products purchased, and order information
    in a single query. This result should be mapped to a single DTO class called `CustomerOrder`
    using the following steps:


    1.  Create a Gradle-based application


    2.  Initialize and run sample SQL queries to fill the `Customer`, `Product`, and
    `Order` tables.


    3.  Define a new DTO called `CustomerOrder`.


    4.  Run a SQL query and map the results back to the object model; i.e., a list
    called `CustomerOrder`.


    Let’s build an application with the following code structure:


    `eshop-jdbc-template-ch5`


    ```

    .

    ├── build.gradle

    └── src

    ├── main

    │   ├── java

    │   │   └── com

    │   │       └── example

    │   │           └── eshop

    │   │               ├── Application.java

    │   │               └── model

    │   │                   └── dto

    │   │                       └── CustomerOrder.java

    │   └── resources

    │       └── application.properties

    └── test

    ├── java

    │   └── com

    │       └── example

    │           └── eshop

    │               └── EshopAppTests.java

    └── resources

    └── schema.sql

    ```


    ### Application Setup


    Create a new application called `eshop-jdbc-template-ch5` from [`http://www.spring.io`](http://www.spring.io)
    with the following dependencies in the `build.gradle` file (see Listing [5-1](#454149_1_En_5_Chapter.xhtml#PC2)).


    ```

    dependencies {

    compile ([

    "org.springframework.boot:spring-boot-starter-jdbc",

    "org.springframework.boot:spring-boot-starter-test"

    ])

    compile ([

    "mysql:mysql-connector-java:8.0.15",

    "org.projectlombok:lombok:1.18.6"

    ])

    testCompile("junit:junit")

    testCompile("org.projectlombok:lombok:1.18.6")

    annotationProcessor("org.projectlombok:lombok:1.18.6")

    testAnnotationProcessor("org.projectlombok:lombok:1.18.6")

    }

    Listing 5-1

    The Build.gradle File

    ```


