    ## 微服务架构中的监控


    生产应用的管理和监控是一个庞大的话题，我们仅讨论框架中可用于支持我们目前示例的简单选项。我们有一个名为 Spring Boot Admin (SBA) 的开源
    Web 应用程序，用于对 Spring Boot 应用进行基本监控。它通过用户界面提供的信息相当全面。


    实际上，这种魔力首先是通过另一个名为 Spring Boot *Actuator* 的项目实现的。Actuator 包含的服务负责持续收集来自 JVM 和其他系统组件的指标数据。Actuator
    还暴露了 RESTful 端点，通过这些端点可以直接查看所收集的相同信息。SBA 应用程序是构建在这些 Actuator 端点之上的一个用户界面。表 6-1
    列出了 Actuator 中的端点。


    表 6-1


    Actuator 端点


    | 端点 ID | 描述 |

    | --- | --- |

    | `auditevents` | 暴露应用程序的审计事件（例如 `auth_success`、`order_failed`）。 |

    | `info` | 显示应用程序的信息。 |

    | `health` | 显示应用程序的健康状态。 |

    | `metrics` | 显示应用程序的各种指标信息。 |

    | `loggers` | 显示和修改已配置的日志记录器。 |

    | `logfile` | 返回日志文件的内容（如果设置了 `logging.file` 或 `logging.pathproperties`）。 |

    | `httptrace` | 显示最近 100 个 HTTP 请求/响应的 HTTP 跟踪信息。 |

    | `env` | 显示当前环境属性。 |

    | `flyway` | 显示 Flyway 数据库迁移的详细信息。 |

    | `liquidbase` | 显示 Liquibase 数据库迁移的详细信息。 |

    | `shutdown` | 允许优雅地关闭应用程序。 |

    | `mappings` | 显示所有 `@RequestMapping` 路径的列表。 |

    | `scheduledtasks` | 显示应用程序中的计划任务。 |

    | `threaddump` | 执行线程转储。 |

    | `heapdump` | 返回 GZip 压缩的 JVM 堆转储。 |


    默认情况下，Actuator 端点通过路径 `{/contextPath}/actuator/*` 暴露。**SBA** 有两个 API 可以在应用程序中启用此功能——服务器端和客户端。SBA
    客户端 API 持续收集从 Actuator 端点获取的监控指标数据，并将其发送到已配置的 SBA 服务器。因此，我们需要在所有希望通过 SBA 监控的应用程序中启用
    Actuator。在我们的示例中，需要执行以下两个步骤：


    1.  创建一个名为 `admin-service` 的新服务。


    2.  将现有的 `eshop` 和 `inventory-service` 应用程序配置为 `admin-service` 的客户端。


    我们将在本节中创建的 `admin-service` 客户端，可能是本章迄今为止构建的所有服务中最小的一个。该应用程序的代码结构如下：


    ```

    .

    ├── build.gradle

    ├── gradle

    │   └── wrapper

    │       ├── gradle-wrapper.jar

    │       └── gradle-wrapper.properties

    ├── gradlew

    ├── gradlew.bat

    └── src

    └── main

    ├── java

    │   └── com

    │       └── example

    │            └── admin

    │                 └── AdminApp.java

    └── resources

    └── application.yml

    ```


    ### 应用程序设置


    从 [`http://www.spring.io`](http://www.spring.io) 创建一个名为 `admin-service` 的新应用，并对
    `build.gradle` 文件进行清单 6-24 所示的更改。


    ```

    bootJar {

    baseName = ''admin-service''

    version =  ''1.0''

    }

    dependencies {

    compile("org.springframework.boot:spring-boot-starter-web")

    compile("de.codecentric:spring-boot-admin-server:2.1.3")

    compile("de.codecentric:spring-boot-admin-server-ui:2.1.3")

    compile("org.projectlombok:lombok:1.18.6")

    }

    清单 6-24

    build.gradle 文件

    ```


    正如我们看到的依赖项，这不是一个 Spring 项目，而是另一个基于 Apache 2 许可证的开源项目（ [`https://github.com/codecentric/spring-boot-admin`](https://github.com/codecentric/spring-boot-admin)
    ）。


    ### 配置


    除了通用设置外，我们需要通过 Spring 启用基本安全性来保护对其用户界面的访问，如清单 6-25 所示。


    ```

    server:

    port: 7777

    spring:

    application:

    name: admin-service

    boot:

    admin:

    context-path: /admin

    client:

    username: user

    password: secret

    清单 6-25

    Application.yml

    ```


    ### 应用程序类


    我们需要通过在 `Application` 类的顶部添加 `@EnableAdminServer` 注解来启用管理服务器功能，我们在清单 6-26 中执行此操作。


    ```

    package com.example.admin;

    import de.codecentric.boot.admin.server.config.EnableAdminServer;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.EnableAutoConfiguration;

    import org.springframework.context.annotation.Configuration;

    @Configuration

    @EnableAutoConfiguration

    @EnableAdminServer

    public class AdminApp {

    public static void main(String[] args) {

    SpringApplication.run(AdminApp.class, args);

    }

    }

    清单 6-26

    应用程序类

    ```


    ### 管理服务客户端


    我们需要在所有需要通过此服务监控的其他微服务的 `application.yml` 文件中添加 Spring Boot Admin 客户端配置设置。在我们的示例中，让我们在
    `eshop`**、**`inventory-service`**、**`config-service` 和 `discovery-service` 中添加属性，**如**清单
    6-27 所示。


    ```

    spring:

    boot:

    admin:

    client:

    url: http://localhost:7777/admin

    management:

    endpoints:

    web:

    exposure:

    include: "*"

    清单 6-27

    Application.yml

    ```


    注意：


    *   `management.endpoints.web.exposure.*` 属性来自 Spring Boot Actuator 库。我们可以指定第
    6.6 节表 6-1 中端点名称的逗号分隔列表。指定 `*` 意味着我们通过 HTTP 暴露所有端点数据。


    *   `spring.boot.admin.client.*` 属性与 SBA 客户端相关，该客户端会定期将从这些暴露的 Actuator 端点收集的数据发送到已配置的管理服务器
    URL（注意 `client.url` 属性）。

