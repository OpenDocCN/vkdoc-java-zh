    #### 配置


    清单 6-5 中定义的大多数属性都是通用的，我们之前已经见过。我将在清单之后解释新的属性。


    ```

    application.yml

    server:

    port: 8761

    eureka:

    instance:

    hostname: localhost

    client:

    registerWithEureka: false

    fetchRegistry: false

