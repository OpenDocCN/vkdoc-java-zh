    ## 总结


    本章全面介绍了 Java 生态系统中的响应式开发，并特别介绍了 Spring 响应式 API 以及 Spring R2DBC 仓库的入门知识。这仍然是一个新兴领域，预计未来会有更多创新。我建议读者也探索其他
    API。在下一章中，我们将探讨另一个有趣的概念，它有助于我们在极少的硬件资源下实现超大规模的工作。

    '
- fmt: "# 9. Java Websockets Development\n\nThis chapter covers how to use *Websockets*\
    \ in Java to create real-time applications supporting millions of concurrent users.\
    \ Websockets provide a bidirectional persistent connection to a HTTP web server\
    \ so that the time taken to create HTTP connections can be reduced. HTTP 1.1 also\
    \ allows long-lived connections through the *keep-alive header*, but the payload\
    \ in each request is significantly bigger than Websockets.\n\nThere are often\
    \ comparisons done to Websockets versus HTTP/2 with Server Side Events (SSE).\
    \ HTTP/2 allows request multiplexing at the connection level and SSE allows server-side\
    \ data push, but even when combined, they are not a full replacement of Websockets.\
    \ When we have only server-side data push use cases, such as notifications to\
    \ the client, SSE can work. However, for bidirectional conversation cases like\
    \ Chat, Websockets are better.\n\nConsider for a minute why connection management\
    \ is so important. Simply put, if we have one million active users on a gaming\
    \ platform and each connection takes nearly 10 milliseconds to create the connection,\
    \ that means we spend 10k seconds worth of time in just the connections. Now think\
    \ if each user is sending hundreds of requests by hitting REST APIs during random\
    \ time intervals, how many connections will be created and closed? I have experienced\
    \ providing a near real-time response to 3-4 million connected users using Websockets.\n\
    \nThere are many options in Java for creating Websockets. We can work with the\
    \ Spring Framework, JAX-RS, GraphQL, the Spark Framework, and more. We will see\
    \ an example in this chapter with the Spark Framework (`http://sparkjava.com`)\
    \ due to its simplicity. It was introduced in Chapter 2.\n\nWe will build a Tweet\
    \ microservice that sends out tweets to all connected users at once. This is generally\
    \ used in chat programs and real-time gaming applications. We will use the following\
    \ code structure as part of this application:\n\n```\n.\n├── build.gradle\n├──\
    \ gradle\n│   └── wrapper\n│       ├── gradle-wrapper.jar\n│       └── gradle-wrapper.properties\n\
    ├── gradlew\n├── gradlew.bat\n├── settings.gradle\n└── src\n    └── main\n   \
    \     ├── java\n        │   └── com\n        │       └── example\n        │  \
    \         ├── Application.java\n        │           └── web\n        │       \
    \        ├── MessageService.java\n        │               ├── TweetController.java\n\
    \        │               └── WSHandler.java\n        └── resources\n```\n\n##\
    \ Application Setup\n\nCreate a new Gradle application called `websocket-example-ch9`\
    \ with the `build.gradle` file shown in Listing 9-1.\n\n```\nplugins {\n    id\
    \ 'java'\n    id \"name.remal.fat-jar\" version \"1.0.124\"\n}\ngroup = 'com.example'\n\
    version = '1.0'\nsourceCompatibility = JavaVersion.VERSION_11\ntargetCompatibility\
    \ = JavaVersion.VERSION_11\nrepositories {\n    mavenCentral()\n}\ndependencies\
    \ {\n    compile(\"com.sparkjava:spark-core:2.9.0\")\n    compile group: 'org.json',\
    \ name: 'json', version: '20180813'\n    compile('org.projectlombok:lombok:1.18.6')\n\
    }\n```\n\n**Listing 9-1** Build Script\n\nNotes:\n\n* We added a new plugin called\
    \ `name.remal.fat-jar`, which will help us create a single JAR file with all dependency\
    \ classes added to it.\n\n## Bootstrapping\n\nWe can initialize the application\
    \ with just three lines of code (see Listing 9-2).\n\n```\npackage com.example;\n\
    \nimport com.example.web.TweetController;\nimport com.example.web.WSHandler;\n\
    \nimport static spark.Spark.init;\nimport static spark.Spark.webSocket;\n\npublic\
    \ class Application {\n    public static void main(String[] args) {\n        webSocket(\"\
    /tweet\", TweetWSHandler.class);\n        TweetController tweetController = new\
    \ TweetController();\n    }\n}\n```\n\n**Listing 9-2** Application Class\n\nNotes:\n\
    \n* We initialized the Websocket path as `/tweet` and attached a WebSocket connection\
    \ handler class (called `WSHandler`).\n* We also initialized a controller class\
    \ to define RESTful endpoints.\n\n## Tweet Handler\n\nThis handler class is going\
    \ to override the event callback methods and implement any actions when a user\
    \ connects, disconnects, or sends a message. Spark uses the Jetty Websocket APIs\
    \ by default. This class mostly delegates the actions to a third message service—see\
    \ Listing 9-3.\n\n```\npackage com.example.web;\n\nimport org.eclipse.jetty.websocket.api.Session;\n\
    import org.eclipse.jetty.websocket.api.annotations.OnWebSocketClose;\nimport org.eclipse.jetty.websocket.api.annotations.OnWebSocketConnect;\n\
    import org.eclipse.jetty.websocket.api.annotations.OnWebSocketMessage;\nimport\
    \ org.eclipse.jetty.websocket.api.annotations.WebSocket;\n\n@WebSocket\npublic\
    \ class WSHandler {\n    MessageService messageService = MessageService.getInstance();\n\
    \n    @OnWebSocketConnect\n    public void onConnect(Session session) throws Exception\
    \ {\n        String username = messageService.newUserJoined(session);\n      \
    \  messageService.broadcastMessage(\"Server\", username + \" joined the chat\"\
    );\n    }\n\n    @OnWebSocketClose\n    public void onClose(Session session, int\
    \ statusCode, String reason) {\n        String username = messageService.removeUser(session);\n\
    \        messageService.broadcastMessage(\"Server\", username + \" left the chat\"\
    );\n    }\n\n    @OnWebSocketMessage\n    public void onMessage(Session session,\
    \ String message) {\n        String username = messageService.getUser(session);\n\
    \        messageService.broadcastMessage(username, message);\n    }\n}\n```\n\n\
    **Listing 9-3** Websocket Handler Class\n\nNotes:\n\n* `onConnect`: We called\
    \ a `newUserJoined` method of `MessageService` to store these sessions in some\
    \ store.\n* `onClose`: We called the `removeUser` method of the same `MessageService`\
    \ to handle closure from the end client.\n* `onMessage`: Receives a message from\
    \ the end client and delegates the action to the message service again for any\
    \ custom logic.\n\n## Message Service\n\nThis class is responsible for handling\
    \ all the business logic to be applied on messages received. We defined a `broadcastMessage()`\
    \ method to send a message to all connected users. We are keeping all sessions\
    \ in a `ConcurrentHashMap` so that we can do a lookup for any user based on session\
    \ and send messages back to the end client. See Listing 9-4.\n\n```\npackage com.example.web;\n\
    \nimport lombok.extern.slf4j.Slf4j;\nimport org.eclipse.jetty.websocket.api.Session;\n\
    \nimport java.util.Map;\nimport java.util.concurrent.ConcurrentHashMap;\nimport\
    \ java.util.concurrent.atomic.AtomicInteger;\n\n@Slf4j\npublic class MessageService\
    \ {\n    private static MessageService instance = new MessageService();\n\n  \
    \  public static MessageService getInstance() {\n        return instance;\n  \
    \  }\n\n    private MessageService()    {}\n\n    AtomicInteger counter = new\
    \ AtomicInteger(0);\n    Map sessionMap = new ConcurrentHashMap();\n\n    public\
    \ String newUserJoined(Session session) {\n        String username = \"User\"\
    \ + counter.addAndGet(1);\n        sessionMap.put(session, username);\n      \
    \  return username;\n    }\n\n    public void broadcastMessage(String sender,\
    \ String message) {\n        log.info(\"Sending another message\");\n        sessionMap.keySet().stream().filter(Session::isOpen).forEach(session\
    \ -> {\n            try {\n                session.getRemote().sendString(sender\
    \ + \" : \" + message);\n            } catch (Exception e) {\n               \
    \ e.printStackTrace();\n            }\n        });\n    }\n\n    public String\
    \ removeUser(Session session) {\n        String username = sessionMap.get(session);\n\
    \        sessionMap.remove(session);\n        return username;\n    }\n\n    public\
    \ String getUser(Session session) {\n        return sessionMap.get(session);\n\
    \    }\n}\n```\n\n**Listing 9-4** Business Service\n\nNotes:\n\n* We defined the\
    \ `MessageService` as a `Singleton`, as we need a single copy of this to store\
    \ and return usernames against sessions. We are using `ConcurrentHashMap` for\
    \ thread safety.\n* When a new user joins, we keep the session object as a key\
    \ against a unique username.\n* Upon user disconnect, we just remove the object\
    \ from the session store.\n* With the `broadcast` method, we iterate over all\
    \ sessions and send the message to all connected users, including the current\
    \ user."
  raw: '# 9. Java Websockets Development


    This chapter covers how to use *Websockets* in Java to create real-time applications
    supporting millions of concurrent users. Websockets provide a bidirectional persistent
    connection to a HTTP web server so that the time taken to create HTTP connections
    can be reduced. HTTP 1.1 also allows long-lived connections through the *keep-alive
    header,* but the payload in each request is significantly bigger than Websockets.


    There are often comparisons done to Websockets versus HTTP/2 with Server Side
    Events (SSE). HTTP/2 allows request multiplexing at the connection level and SSE
    allows server-side data push, but even when combined, they are not a full replacement
    of Websockets. When we have only server-side data push use cases, such as notifications
    to the client, SSE can work. However, for bidirectional conversation cases like
    Chat, Websockets are better.


    Consider for a minute why connection management is so important. Simply put, if
    we have one million active users on a gaming platform and each connection takes
    nearly 10 milliseconds to create the connection, that means we spend 10k seconds
    worth of time in just the connections. Now think if each user is sending hundreds
    of requests by hitting REST APIs during random time intervals, how many connections
    will be created and closed? I have experienced providing a near real-time response
    to 3-4 million connected users using Websockets.


    There are many options in Java for creating Websockets. We can work with the Spring
    Framework, JAX-RS, GraphQL, the Spark Framework, and more. We will see an example
    in this chapter with the Spark Framework ( [`http://sparkjava.com`](http://sparkjava.com)
    ) due to its simplicity. It was introduced in Chapter [2](#454149_1_En_2_Chapter.xhtml).


    We will build a Tweet microservice that sends out tweets to all connected users
    at once. This is generally used in chat programs and real-time gaming applications.
    We will use the following code structure as part of this application:


    ```

    .

    ├── build.gradle

    ├── gradle

    │   └── wrapper

    │       ├── gradle-wrapper.jar

    │       └── gradle-wrapper.properties

    ├── gradlew

    ├── gradlew.bat

    ├── settings.gradle

    └── src

    └── main

    ├── java

    │   └── com

    │       └── example

    │           ├── Application.java

    │           └── web

    │               ├── MessageService.java

    │               ├── TweetController.java

    │               └── WSHandler.java

    └── resources

    ```


    ## Application Setup


    Create a new Gradle application called `websocket-example-ch9` with the `build.gradle`
    file shown in Listing [9-1](#454149_1_En_9_Chapter.xhtml#PC2).


    ```

    plugins {

    id ''java''

    id "name.remal.fat-jar" version "1.0.124"

    }

    group = ''com.example''

    version = ''1.0''

    sourceCompatibility = JavaVersion.VERSION_11

    targetCompatibility = JavaVersion.VERSION_11

    repositories {

    mavenCentral()

    }

    dependencies {

    compile("com.sparkjava:spark-core:2.9.0")

    compile group: ''org.json'', name: ''json'', version: ''20180813''

    compile(''org.projectlomboklombok:1.18.6'')

    }

    Listing 9-1

    Build Script

    ```


    Notes:


    *   We added a new plugin called `name.remal.fat-jar`, which will help us create
    a single JAR file with all dependency classes added to it.


    ## Bootstrapping


    We can initialize the application with just three lines of code (see Listing [9-2](#454149_1_En_9_Chapter.xhtml#PC3)).


    ```

    package com.example;

    import com.example.web.TweetController;

    import com.example.web.WSHandler;

    import static spark.Spark.init;

    import static spark.Spark.webSocket;

    public class Application {

    public static void main(String[] args) {

    webSocket("/tweet", TweetWSHandler.class);

    TweetController tweetController = new TweetController();

    }

    }

    Listing 9-2

    Application Class

    ```


    Notes:


    *   We initialized the Websocket path as `/tweet` and attached a WebSocket connection
    handler class (called `WSHandler`).


    *   We also initialized a controller class to define RESTful endpoints.


    ## Tweet Handler


    This handler class is going to override the event callback methods and implement
    any actions when a user connects, disconnects, or sends a message. Spark uses
    the Jetty Websocket APIs by default. This class mostly delegates the actions to
    a third message service—see Listing [9-3](#454149_1_En_9_Chapter.xhtml#PC4).


    ```

    package com.example.web;

    import org.eclipse.jetty.websocket.api.Session;

    import org.eclipse.jetty.websocket.api.annotations.OnWebSocketClose;

    import org.eclipse.jetty.websocket.api.annotations.OnWebSocketConnect;

    import org.eclipse.jetty.websocket.api.annotations.OnWebSocketMessage;

    import org.eclipse.jetty.websocket.api.annotations.WebSocket;

    @WebSocket

    public class WSHandler {

    MessageService messageService = MessageService.getInstance();

    @OnWebSocketConnect

    public void onConnect(Session session) throws Exception {

    String username = messageService.newUserJoined(session);

    messageService.broadcastMessage("Server", username + " joined the chat");

    }

    @OnWebSocketClose

    public void onClose(Session session, int statusCode, String reason) {

    String username = messageService.removeUser(session);

    messageService.broadcastMessage("Server", username + " left the chat");

    }

    @OnWebSocketMessage

    public void onMessage(Session session, String message) {

    String username = messageService.getUser(session);

    messageService.broadcastMessage(username, message);

    }

    }

    Listing 9-3

    Websocket Handler Class

    ```


    Notes:


    *   `onConnect`: We called a `newUserJoined` method of `MessageService` to store
    these sessions in some store.


    *   `onClose`: We called the `removeUser` method of the same `MessageService`
    to handle closure from the end client.


    *   `onMessage`: Receives a message from the end client and delegates the action
    to the message service again for any custom logic.


    ## Message Service


    This class is responsible for handling all the business logic to be applied on
    messages received. We defined a `broadcastMessage()` method to send a message
    to all connected users. We are keeping all sessions in a `ConcurrentHashMap` so
    that we can do a lookup for any user based on session and send messages back to
    the end client. See Listing [9-4](#454149_1_En_9_Chapter.xhtml#PC5).


    ```

    package com.example.web;

    import lombok.extern.slf4j.Slf4j;

    import org.eclipse.jetty.websocket.api.Session;

    import java.util.Map;

    import java.util.concurrent.ConcurrentHashMap;

    import java.util.concurrent.atomic.AtomicInteger;

    @Slf4j

    public class MessageService {

    private static MessageService instance = new MessageService();

    public static MessageService getInstance() {

    return instance;

    }

    private MessageService()    {}

    AtomicInteger counter = new AtomicInteger(0);

    Map sessionMap = new ConcurrentHashMap();

    public String newUserJoined(Session session) {

    String username = "User" + counter.addAndGet(1);

    sessionMap.put(session, username);

    return username;

    }

    public void broadcastMessage(String sender, String message) {

    log.info("Sending another message");

    sessionMap.keySet().stream().filter(Session::isOpen).forEach(session -> {

    try {

    session.getRemote().sendString(sender + " : " + message);

    } catch (Exception e) {

    e.printStackTrace();

    }

    });

    }

    public String removeUser(Session session) {

    String username = sessionMap.get(session);

    sessionMap.remove(session);

    return username;

    }

    public String getUser(Session session) {

    return sessionMap.get(session);

    }

    }

    Listing 9-4

    Business Service

    ```


    Notes:


    *   We defined the `MessageService` as a `Singleton`, as we need a single copy
    of this to store and return usernames against sessions. We are using `ConcurrentHashMap`
    for thread safety.


    *   When a new user joins, we keep the session object as a key against a unique
    username.


    *   Upon user disconnect, we just remove the object from the session store.


    *   With the `broadcast` method, we iterate over all sessions and send the message
    to all connected users, including the current user.'
  trans: "\n# 9. Java WebSocket 开发\n\n本章介绍如何在 Java 中使用 *WebSocket* 创建支持数百万并发用户的实时应用程序。WebSocket\
    \ 提供了与 HTTP Web 服务器的双向持久连接，从而可以减少创建 HTTP 连接所需的时间。HTTP 1.1 也通过 *keep-alive 标头*\
    \ 允许长连接，但每个请求中的有效负载明显大于 WebSocket。\n\n人们经常将 WebSocket 与支持服务器推送事件（SSE）的 HTTP/2\
    \ 进行比较。HTTP/2 允许在连接级别进行请求多路复用，SSE 允许服务器端数据推送，但即使将两者结合，也无法完全替代 WebSocket。当我们只有服务器端数据推送用例（例如向客户端发送通知）时，SSE\
    \ 可以工作。然而，对于像聊天这样的双向对话场景，WebSocket 更胜一筹。\n\n请思考一下为什么连接管理如此重要。简单来说，如果我们有一个拥有 100\
    \ 万活跃用户的游戏平台，每个连接需要近 10 毫秒来创建，这意味着我们仅在连接上就花费了 10,000 秒的时间。现在想想，如果每个用户都在随机时间间隔内通过调用\
    \ REST API 发送数百个请求，那么将会创建和关闭多少个连接？我曾有过使用 WebSocket 为 300 到 400 万连接用户提供近乎实时响应的经验。\n\
    \n在 Java 中有许多创建 WebSocket 的选项。我们可以使用 Spring 框架、JAX-RS、GraphQL、Spark 框架等。在本章中，我们将以\
    \ Spark 框架（[`http://sparkjava.com`](http://sparkjava.com)）为例，因为它简单易用。该框架已在第 2\
    \ 章中介绍过。\n\n我们将构建一个 Tweet 微服务，该服务可以同时向所有连接的用户发送推文。这通常用于聊天程序和实时游戏应用程序。我们将使用以下代码结构作为此应用程序的一部分：\n\
    \n```\n.\n├── build.gradle\n├── gradle\n│   └── wrapper\n│       ├── gradle-wrapper.jar\n\
    │       └── gradle-wrapper.properties\n├── gradlew\n├── gradlew.bat\n├── settings.gradle\n\
    └── src\n    └── main\n        ├── java\n        │   └── com\n        │      \
    \ └── example\n        │           ├── Application.java\n        │           └──\
    \ web\n        │               ├── MessageService.java\n        │            \
    \   ├── TweetController.java\n        │               └── WSHandler.java\n   \
    \     └── resources\n```\n\n## 应用程序设置\n\n创建一个名为 `websocket-example-ch9` 的新 Gradle\
    \ 应用程序，其 `build.gradle` 文件如代码清单 9-1 所示。\n\n```\nplugins {\n    id 'java'\n   \
    \ id \"name.remal.fat-jar\" version \"1.0.124\"\n}\ngroup = 'com.example'\nversion\
    \ = '1.0'\nsourceCompatibility = JavaVersion.VERSION_11\ntargetCompatibility =\
    \ JavaVersion.VERSION_11\nrepositories {\n    mavenCentral()\n}\ndependencies\
    \ {\n    compile(\"com.sparkjava:spark-core:2.9.0\")\n    compile group: 'org.json',\
    \ name: 'json', version: '20180813'\n    compile('org.projectlombok:lombok:1.18.6')\n\
    }\n代码清单 9-1\n构建脚本\n```\n\n注意：\n\n*   我们添加了一个名为 `name.remal.fat-jar` 的新插件，它将帮助我们创建一个包含所有依赖类文件的单一\
    \ JAR 文件。\n\n## 引导启动\n\n我们只需三行代码即可初始化应用程序（参见代码清单 9-2）。\n\n```\npackage com.example;\n\
    \nimport com.example.web.TweetController;\nimport com.example.web.WSHandler;\n\
    import static spark.Spark.init;\nimport static spark.Spark.webSocket;\n\npublic\
    \ class Application {\n    public static void main(String[] args) {\n        webSocket(\"\
    /tweet\", WSHandler.class);\n        TweetController tweetController = new TweetController();\n\
    \    }\n}\n代码清单 9-2\n应用程序类\n```\n\n注意：\n\n*   我们将 WebSocket 路径初始化为 `/tweet`，并附加了一个\
    \ WebSocket 连接处理程序类（名为 `WSHandler`）。\n*   我们还初始化了一个控制器类来定义 RESTful 端点。\n\n## Tweet\
    \ 处理程序\n\n此处理程序类将重写事件回调方法，并在用户连接、断开连接或发送消息时执行相应操作。Spark 默认使用 Jetty WebSocket API。此类主要将操作委托给一个第三方消息服务——参见代码清单\
    \ 9-3。\n\n```\npackage com.example.web;\n\nimport org.eclipse.jetty.websocket.api.Session;\n\
    import org.eclipse.jetty.websocket.api.annotations.OnWebSocketClose;\nimport org.eclipse.jetty.websocket.api.annotations.OnWebSocketConnect;\n\
    import org.eclipse.jetty.websocket.api.annotations.OnWebSocketMessage;\nimport\
    \ org.eclipse.jetty.websocket.api.annotations.WebSocket;\n\n@WebSocket\npublic\
    \ class WSHandler {\n    MessageService messageService = MessageService.getInstance();\n\
    \n    @OnWebSocketConnect\n    public void onConnect(Session session) throws Exception\
    \ {\n        String username = messageService.newUserJoined(session);\n      \
    \  messageService.broadcastMessage(\"Server\", username + \" joined the chat\"\
    );\n    }\n\n    @OnWebSocketClose\n    public void onClose(Session session, int\
    \ statusCode, String reason) {\n        String username = messageService.removeUser(session);\n\
    \        messageService.broadcastMessage(\"Server\", username + \" left the chat\"\
    );\n    }\n\n    @OnWebSocketMessage\n    public void onMessage(Session session,\
    \ String message) {\n        String username = messageService.getUser(session);\n\
    \        messageService.broadcastMessage(username, message);\n    }\n}\n代码清单 9-3\n\
    WebSocket 处理程序类\n```\n\n注意：\n\n*   `onConnect`：我们调用了 `MessageService` 的 `newUserJoined`\
    \ 方法，将这些会话存储到某个存储中。\n*   `onClose`：我们调用了同一个 `MessageService` 的 `removeUser` 方法来处理来自终端客户端的关闭。\n\
    *   `onMessage`：接收来自终端客户端的消息，并将操作再次委托给消息服务以执行任何自定义逻辑。\n\n## 消息服务\n\n此类负责处理对接收到的消息应用的所有业务逻辑。我们定义了一个\
    \ `broadcastMessage()` 方法，用于向所有连接的用户发送消息。我们将所有会话保存在一个 `ConcurrentHashMap` 中，以便我们可以根据会话查找任何用户，并将消息发送回终端客户端。参见代码清单\
    \ 9-4。\n\n```\npackage com.example.web;\n\nimport lombok.extern.slf4j.Slf4j;\n\
    import org.eclipse.jetty.websocket.api.Session;\n\nimport java.util.Map;\nimport\
    \ java.util.concurrent.ConcurrentHashMap;\nimport java.util.concurrent.atomic.AtomicInteger;\n\
    \n@Slf4j\npublic class MessageService {\n    private static MessageService instance\
    \ = new MessageService();\n\n    public static MessageService getInstance() {\n\
    \        return instance;\n    }\n\n    private MessageService() {}\n\n    AtomicInteger\
    \ counter = new AtomicInteger(0);\n    Map<Session, String> sessionMap = new ConcurrentHashMap<>();\n\
    \n    public String newUserJoined(Session session) {\n        String username\
    \ = \"User\" + counter.addAndGet(1);\n        sessionMap.put(session, username);\n\
    \        return username;\n    }\n\n    public void broadcastMessage(String sender,\
    \ String message) {\n        log.info(\"Sending another message\");\n        sessionMap.keySet().stream().filter(Session::isOpen).forEach(session\
    \ -> {\n            try {\n                session.getRemote().sendString(sender\
    \ + \" : \" + message);\n            } catch (Exception e) {\n               \
    \ e.printStackTrace();\n            }\n        });\n    }\n\n    public String\
    \ removeUser(Session session) {\n        String username = sessionMap.get(session);\n\
    \        sessionMap.remove(session);\n        return username;\n    }\n\n    public\
    \ String getUser(Session session) {\n        return sessionMap.get(session);\n\
    \    }\n}\n代码清单 9-4\n业务服务\n```\n\n注意：\n\n*   我们将 `MessageService` 定义为 `Singleton`（单例），因为我们需要它的单个副本来存储和返回与会话对应的用户名。我们使用\
    \ `ConcurrentHashMap` 来保证线程安全。\n*   当新用户加入时，我们将会话对象作为键，对应一个唯一的用户名。\n*   当用户断开连接时，我们只需从会话存储中移除该对象。\n\
    *   使用 `broadcast` 方法，我们遍历所有会话，并将消息发送给所有连接的用户，包括当前用户。\n"
- fmt: "# Tweet Controller\n\nBefore we look at the output of this app, let’s add\
    \ one more interesting component to the system. We need to add a `TweetController`\
    \ class (see Listing [9-5](#454149_1_En_9_Chapter.xhtml#PC6)), which will expose\
    \ the `POST` RESTful endpoint to accept a message and distribute it to all the\
    \ other connected users.\n\n```\npackage com.example.web;\nimport static spark.Spark.*;\n\
    public class TweetController {\nMessageService messageService = MessageService.getInstance();\n\
    public TweetController()    {\npost(\"/tweet\", (request, response) -> {\nString\
    \ message = request.queryParamOrDefault(\"message\", \"SERVER\");\nmessageService.broadcastMessage(\"\
    Server\", message);\nreturn \"Sent\";\n});\n}\n}\nListing 9-5\nController Class\n\
    ```\n\n## Running the Websocket-Example-Ch9 Application\n\nThe best part of the\
    \ Spark Framework is that the service starts in under 100 milliseconds. We need\
    \ to create a fat JAR and then run the JAR file. By default, the Spark Framework\
    \ starts the application on port `4567`.\n\n```\n> gradle clean build && gradle\
    \ fatJar\n> java -jar ./build/libs/websocket-example-all-1.0.jar\nSLF4J: Failed\
    \ to load class \"org.slf4j.impl.StaticLoggerBinder\".\nSLF4J: Defaulting to no-operation\
    \ (NOP) logger implementation\nSLF4J: See http://www.slf4j.org/codes.html#StaticLoggerBinder\
    \ for further details.\n```\n\nIn order to test the Websocket connection, we will\
    \ first test it with a sample web client available at [`http://www.websocket.org/echo.html`](http://www.websocket.org/echo.html).\
    \ We then create two connections from two tabs in the browser and a console user\
    \ using the `Curl` command. Figures [9-1](#454149_1_En_9_Chapter.xhtml#Fig1) and\
    \ [9-2](#454149_1_En_9_Chapter.xhtml#Fig2) show the sample output.\n\n![../images/454149_1_En_9_Chapter/454149_1_En_9_Fig2_HTML.jpg](images/454149_1_En_9_Chapter/454149_1_En_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2\n\nSecond Websocket connection in a second tab\n\n![../images/454149_1_En_9_Chapter/454149_1_En_9_Fig1_HTML.jpg](images/454149_1_En_9_Chapter/454149_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1\n\nSample Websocket connection\n\nAdditionally, we’ll send a tweet\
    \ from our RESTful endpoint through the `CURL` command from the console:\n\n```\n\
    > curl -P -v \"http://localhost:4567/tweet\" --data-urlencode \"message=Hello\
    \ from Raj\"\n```\n\nAs a result, the message sent from the `CURL` command to\
    \ the REST endpoint should be immediately visible in the browser window. Figure\
    \ [9-3](#454149_1_En_9_Chapter.xhtml#Fig3) shows the message sent by the console\
    \ user and received by the Websocket in the second tab of the browser.\n\n![../images/454149_1_En_9_Chapter/454149_1_En_9_Fig3_HTML.jpg](images/454149_1_En_9_Chapter/454149_1_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3\n\nBroadcasted messages example\n\n## Summary\n\nThis chapter illustrated\
    \ a basic example of Websocket programming with Java. There are still many more\
    \ concepts to explore around this concept. The Spring Framework also provides\
    \ a STOMP protocol-based API over Websockets. The next chapter explores another\
    \ flavor of programming that is helping to manage the scale of applications through\
    \ a different approach, i.e. serverless development.\n\n# Java Serverless Development\n\
    \nServerless programming is slowly being adopted by mainstream development. Fundamentally,\
    \ serverless programming means that the server or infrastructure is being managed\
    \ by the infra/cloud provider, but the code still exists and runs on some machine.\
    \ As a developer, you should be concerned about solving the problem and deploying\
    \ it. Based on the scale demand, the infrastructure provider or framework is responsible\
    \ for managing the number of active nodes running the supplied code at any time.\
    \ In other words, allocation of machines is dynamic and managed by the infra provider.\
    \ There are quite a few advantages as well as concerns related to being serverless.\
    \ Let’s look at some of them.\n\n**Advantages:**\n\n- A serverless architecture\
    \ offers greater scalability and flexibility.\n- A serverless architecture allows\
    \ developers to do releases quickly.\n- Pricing is better because no devops is\
    \ necessary and there is no server cost.\n- Codebases are really small and thus\
    \ easier to manage.\n- A serverless architecture has stateless functional programming.\n\
    - It’s a good programming environment for event-driven cases.\n\n**Concerns:**\n\
    \n- Serverless computing introduces new security concerns.\n- Serverless architectures\
    \ are not built for long-running processes.\n- Designing an entire ecommerce system\
    \ or trading system in serverless mode is a major challenge.\n- If by using dockerized\
    \ containers we can handle millions of hits with average hardware and a complete\
    \ application, why do we need serverless programming for scaling purposes? This\
    \ is one of the most common questions.\n- Database querying is harder. Think of\
    \ the attention we give to connection pooling in Java applications. We won’t be\
    \ able to utilize this in a serverless environment.\n- Debugging is often hard\
    \ and is mostly dependent on logs.\n- We need to keep the nodes warm. As long\
    \ as hits are coming to the serverless function, it will remain active. Otherwise,\
    \ the infra provider can drop the container that’s running it. This can cause\
