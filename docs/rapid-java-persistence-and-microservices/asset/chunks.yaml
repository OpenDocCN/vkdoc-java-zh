- fmt: '### Configuration


    We have access to the common properties needed to declare Hibernate connection
    properties and customize the context path. The GraphQL Java engine requires us
    to define the `graphql.servlet.mapping` property in order to declare the path
    for mapping its `POST` RESTful endpoint. GraphiQL is the built-in application
    from the `graphql-tools` project and requires similar self-explanatory properties
    to be declared. See Listing [7-7](#454149_1_En_7_Chapter.xhtml#PC12).


    ```

    server:

    port: 8201

    servlet:

    contextPath: /eblog

    graphql:

    servlet:

    mapping: /graphql

    enabled: true

    corsEnabled: true

    graphiql:

    mapping: /graphiql

    endpoint: /eblog/graphql

    enabled: true

    pageTitle: GraphiQL

    spring:

    datasource:

    url: jdbc:mysql://localhost:3306/eblog?autoReconnect=true

    username: root

    password: mysql

    driver-class-name: com.mysql.jdbc.Driver

    jpa:

    hibernate.ddl-auto: create

    show-sql: true

    generate-ddl: true

