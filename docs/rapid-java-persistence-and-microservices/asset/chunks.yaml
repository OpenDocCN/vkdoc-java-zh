    ## Summary


    This chapter illustrated a basic example of Websocket programming with Java. There
    are still many more concepts to explore around this concept. The Spring Framework
    also provides a STOMP protocol-based API over Websockets. The next chapter explores
    another flavor of programming that is helping to manage the scale of applications
    through a different approach, i.e. serverless development.


    # 10. Java Serverless Development


    Serverless programming is slowly being adopted by mainstream development. Fundamentally,
    serverless programming means that the server or infrastructure is being managed
    by the infra/cloud provider, but the code still exists and runs on some machine.
    As a developer, you should be concerned about solving the problem and deploying
    it. Based on the scale demand, the infrastructure provider or framework is responsible
    for managing the number of active nodes running the supplied code at any time.
    In other words, allocation of machines is dynamic and managed by the infra provider.
    There are quite a few advantages as well as concerns related to being serverless.
    Let’s look at some of them.


    Advantages:


    *   A serverless architecture offers greater scalability and flexibility.


    *   A serverless architecture allows developers to do releases quickly.


    *   Pricing is better because no devops is necessary and there is no server cost.


    *   Codebases are really small and thus easier to manage.


    *   A serverless architecture has stateless functional programming.


    *   It’s a good programming environment for event-driven cases.


    Concerns:


    *   Serverless computing introduces new security concerns.


    *   Serverless architectures are not built for long-running processes.


    *   Designing an entire ecommerce system or trading system in serverless mode
    is a major challenge.


    *   If by using dockerized containers we can handle millions of hits with average
    hardware and a complete application, why do we need serverless programming for
    scaling purposes? This is one of the most common questions.


    *   Database querying is harder. Think of the attention we give to connection
    pooling in Java applications. We won’t be able to utilize this in a serverless
    environment.


    *   Debugging is often hard and is mostly dependent on logs.


    *   We need to keep the nodes warm. As long as hits are coming to the serverless
    function, it will remain active. Otherwise, the infra provider can drop the container
    that’s running it. This can cause slow response times and create a need to keep
    things active by sending a few periodic hits.


    There are APIs available in almost all cloud platforms in Java for serverless
    development. However, a generic API model called *Apache OpenWhisk* is available
    that allows you to create generic, cloud-agnostic functions that work in serverless
    mode. Overall the options we have are:


    *   AWS Lambda functions ( [`https://aws.amazon.com/lambda/`](https://aws.amazon.com/lambda/)
    )


    *   Azure serverless functions ( [`https://azure.microsoft.com/en-in/services/functions/`](https://azure.microsoft.com/en-in/services/functions/)
    )


    *   Google Cloud functions ( [`https://cloud.google.com/functions/`](https://cloud.google.com/functions/)
    )


    *   OpenWhisk ( [`https://openwhisk.apache.org/`](https://openwhisk.apache.org/)
    )


    Working with all of these and their custom APIs can be time consuming. The Spring
    Framework provides an advantage here with a subproject under Spring Cloud, called
    the Spring Cloud Functions (SCF: [`https://spring.io/projects/spring-cloud-function`](https://spring.io/projects/spring-cloud-function)
    ).


    SCF provides uniform APIs to work with all four of the serverless providers. Apart
    from that, it allows developers to create generic Spring-based functions as well
    to run standalone. The functional programming constructs introduced in Java 8
    are even more useful here because we intended to use functional programming here.
    Let’s build an example of the Spring Cloud Function with the following code structure:


    ```

    .

    ├── build.gradle

    ├── gradle

    │   └── wrapper

    │       ├── gradle-wrapper.jar

    │       └── gradle-wrapper.properties

    ├── gradlew

    ├── gradlew.bat

    ├── settings.gradle

    └── src

    └── main

    ├── java

    │   └── com

    │       └── example

    │           └── App.java

    └── resources

    ```


