    ## Multi-Datasource Interaction


    This key feature in Spring Data JPA differentiates Java and Spring from other
    language frameworks, as this is not a basic need but a rare and potential feature
    in enterprise applications. Sometimes an application must talk to different databases
    at the same time. Let’s create an ecommerce online bookshop as an example. We
    will be creating and storing customer, product, and orders data in MySQL and purchase
    history in PostgreSQL for the same microservice.


    Functionally, we will simulate a flow to save new customer and product objects
    in the first step. Then we will purchase that product and use MySQL as the datastore.
    For the same purchase, we will store purchase history in a PostgreSQL database
    for analytics. Technically, this is going to involve:


    *   Creating separate datasource properties for connections.


    *   Creating two datasource and `entityManager` factory beans.


    *   Creating data or domain models and repositories, in different packages, for
    clarity. Entity classes and repositories are not required to be in different packages,
    but it’s better to keep it consistent.


    Let’s the build the example application for our use case now.'
