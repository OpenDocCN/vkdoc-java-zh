- fmt: "# 8. Java Reactive Development\n\nThere has been significant focus in recent\
    \ years on network programming using event-driven asynchronous runtime environments\
    \ and frameworks, such as Node.js in JavaScript and RxJava (ReactiveX in Java).\
    \ The `NIO` (New IO) package is the foundation for Reactive programming in Java.\
    \ Reactive programming is not new in application development. When it comes to\
    \ huge volumes of data or concurrent hits, we often need asynchronous processing\
    \ to make our systems fast and responsive. Along with being asynchronous, our\
    \ systems must work on streams (continuous sequence of events) in non-blocking\
    \ mode.\n\nData volumes and scale of operations are increasing every day, which\
    \ means it’s getting almost impossible to keep increasing hardware resources using\
    \ traditional methods. We also want simpler hardware with reduced cost to handle\
    \ loads when demand is down. I started getting interested in Reactive programming\
    \ when Node.js showed how much time was wasted in an application simply waiting\
    \ on I/O channels. I don’t deeper into Node.js details because that is a different\
    \ model and Java can do better, by using multiple CPU cores.\n\n## The Reactive\
    \ Manifesto\n\nThe Reactive Manifesto includes basic goals and guidelines and\
    \ is available at [`https://www.reactivemanifesto.org/`](https://www.reactivemanifesto.org/).\
    \ It’s the result of contributions from various organizations to standardize Reactive\
    \ development. The Reactive Manifesto describes how to design Reactive systems\
    \ based on four principles:\n\n- **Responsive**: The system responds in a timely\
    \ manner if at all possible and stays responsive to all user commands. The system\
    \ should detect problems quickly and deal with them effectively, by providing\
    \ a consistent response even during problem times. Functional programming, based\
    \ on smaller stateless functions responding to events through a background thread,\
    \ is one of the ways we can design such systems.\n- **Resilient**: The system\
    \ stays responsive in the face of failure. Failures do occur at times in systems.\
    \ The intent is to avoid a chain reaction of various components of the system\
    \ and handle the messaging to the users gracefully. Includes recovery or retry\
    \ logic in case of a failure.\n- **Elastic**: The system stays responsive under\
    \ varying workloads. Reactive systems can react to changes to the input rate by\
    \ increasing or decreasing the resources allocated to those inputs. Container-based\
    \ deployment solutions like Docker and Kubernetes are examples of elasticity.\n\
    - **Message-Driven**: Reactive systems rely on asynchronous message-passing between\
    \ components that ensures loose coupling, isolation, and location transparency,\
    \ and provides the means to delegate errors as messages. Messages are supposed\
    \ to be immutable and thus thread safe by design. Akka and Vert.x are the popular\
    \ reactive Java platforms based on message passing.\n\nBased on these principles,\
    \ there are various APIs, frameworks, and libraries that have been developed.\
    \ The `NIO` (New Input Output) package in core Java is a precise library that\
    \ handles I/O operations reactively. Netty and Apache Mina have been around for\
    \ years providing NIO-based networking options. For general development, we still\
    \ need higher-level APIs that work with Java Streams.\n\n## The Reactive Streams\
    \ Project\n\nReactive Streams is a specification that provides a standard for\
    \ asynchronous stream processing with non-blocking back pressure. By specification,\
    \ we mean that there are multiple implementations, just like with JDBC drivers.\
    \ There are example implementations provided by the Reactive Streams community\
    \ in multiple languages, which is available at [`https://github.com/reactive-streams`](https://github.com/reactive-streams).\
    \ For Java, the API can be found at [`https://github.com/reactive-streams/reactive-streams-jvm`](https://github.com/reactive-streams/reactive-streams-jvm).\
    \ We have been implementing two basic concepts for years—the Observer and Publish/Subscribe\
    \ patterns. Reactive Streams are based on these concepts, but with following components\
    \ in the API:\n\n- **Publisher**: A publisher is responsible for producing an\
    \ unbounded number of sequenced elements (stream) and publishing them according\
    \ to the demand received from its subscriber(s).\n\n    Definition:\n\n    ```\n\
    \    public interface Publisher {\n        public void subscribe(Subscriber s);\n\
    \    }\n    ```\n\n- **Subscriber**: Just like the observer in the Observer pattern,\
    \ the subscriber is responsible for observing the source stream and reacting when\
    \ items are pushed by the producer.\n\n    Definition:\n\n    ```\n    public\
    \ interface Subscriber {\n        public void onSubscribe(Subscription s);\n \
    \       public void onNext(T t);\n        public void onError(Throwable t);\n\
    \        public void onComplete();\n    }\n    ```\n\n- **Subscription**: Every\
    \ subscriber has to implement this interface. This model is passed to the subscriber\
    \ on each event occurrence.\n\n    Definition:\n\n    ```\n    public interface\
    \ Subscription {\n        public void request(long n);\n        public void cancel();\n\
    \    }\n    ```\n\n- **Processor**: This interface is responsible for the processing\
    \ logic of received items by the publisher and delegated to the subscriber as\
    \ a handler.\n\n    Definition:\n\n    ```\n    public interface Processor extends\
    \ Subscriber, Publisher {}\n    ```\n\nThere are two more concepts involved in\
    \ Reactive Streams:\n\n- **Back Pressure**: In a non-Reactive system, a producer\
    \ might keep on producing the items even if the consumers can’t consume with that\
    \ speed, resulting in *back pressure* on the clients. Reactive Systems allow the\
    \ clients to acknowledge to the producer their capacity issues and readiness to\
    \ accept more items.\n- **Non-Blocking**: From the core Java world, we have been\
    \ working on non-blocking concurrent applications through atomic variables. Essentially\
    \ in simple terms, Reactive systems allow the user thread to keep processing actions,\
    \ putting all I/O operations in a queue. They can then pick processes and respond\
    \ to the user thread through a callback. This is how the Node.js world works,\
    \ by using event food for processing all background operations.\n\nSince there\
    \ are various APIs on building Reactive systems in Java, I introduce a few of\
    \ them here and then explain one in particular as an example.\n\n## The RxJava\
    \ (Reactive Extensions) Project\n\nRxJava is another framework for Reactive development;\
    \ it’s based on ReactiveX implementation ([`http://reactivex.io/`](http://reactivex.io/)).\
    \ ReactiveX is a combination of the best ideas from the Observer pattern, the\
    \ Iterator pattern, and functional programming. In ReactiveX, an observer subscribes\
    \ to an observable. The Observer then reacts to the stream of items emitted by\
    \ the observable (just like the publisher in Reactive Streams). By using Java\
    \ concurrent APIs and offloading the processing to the background threads, user\
    \ actions can wait on future objects and lower-level concurrency and non-blocking\
    \ I/O concerns are the responsibility of the framework. There have been two versions\
    \ of this API so far and at present RxJava 2 is the one in use. ReactiveX is the\
    \ umbrella project under which RxJava is the Java library. Some of these concepts\
    \ come up in the JDK as well, thus we will be looking at the API from Java 9 in\
    \ the next section."
  raw: "# 8. Java Reactive Development\n\nThere has been significant focus in recent\
    \ years on network programming using event-driven asynchronous runtime environments\
    \ and frameworks, such as Node.js in JavaScript and RxJava (ReactiveX in Java).\
    \ The NIO (New IO) package is the foundation for Reactive programming in Java.\
    \ Reactive programming is not new in application development. When it comes to\
    \ huge volumes of data or concurrent hits, we often need asynchronous processing\
    \ to make our systems fast and responsive. Along with being asynchronous, our\
    \ systems must work on streams (continuous sequence of events) in non-blocking\
    \ mode.\n\nData volumes and scale of operations are increasing every day, which\
    \ means it’s getting almost impossible to keep increasing hardware resources using\
    \ traditional methods. We also want simpler hardware with reduced cost to handle\
    \ loads when demand is down. I started getting interested in Reactive programming\
    \ when Node.js showed how much time was wasted in an application simply waiting\
    \ on I/O channels. I don’t deeper into Node.js details because that is a different\
    \ model and Java can do better, by using multiple CPU cores.\n\n## The Reactive\
    \ Manifesto\n\nThe Reactive Manifesto includes basic goals and guidelines and\
    \ is available at [`https://www.reactivemanifesto.org/`](https://www.reactivemanifesto.org/)\
    \ . It’s the result of contributions from various organizations to standardize\
    \ Reactive development. The Reactive Manifesto describes how to design Reactive\
    \ systems based on four principles:\n\n*   Responsive: The system responds in\
    \ a timely manner if at all possible and stays responsive to all user commands.\
    \ The system should detect problems quickly and deal with them effectively, by\
    \ providing a consistent response even during problem times. Functional programming,\
    \ based on smaller stateless functions responding to events through a background\
    \ thread, is one of the ways we can design such systems.\n\n*   Resilient: The\
    \ system stays responsive in the face of failure. Failures do occur at times in\
    \ systems. The intent is to avoid a chain reaction of various components of the\
    \ system and handle the messaging to the users gracefully. Includes recovery or\
    \ retry logic in case of a failure.\n\n*   Elastic: The system stays responsive\
    \ under varying workloads. Reactive systems can react to changes to the input\
    \ rate by increasing or decreasing the resources allocated to those inputs. Container-based\
    \ deployment solutions like Docker and Kubernetes are examples of elasticity.\n\
    \n*   Message-Driven: Reactive systems rely on asynchronous message-passing between\
    \ components that ensures loose coupling, isolation, and location transparency,\
    \ and provides the means to delegate errors as messages. Messages are supposed\
    \ to be immutable and thus thread safe by design. Akka and Vert.x are the popular\
    \ reactive Java platforms based on message passing.\n\nBased on these principles,\
    \ there are various APIs, frameworks, and libraries that have been developed.\
    \ The NIO (New Input Output) package in core Java is a precise library that handles\
    \ I/O operations reactively. Netty and Apache Mina have been around for years\
    \ providing NIO-based networking options. For general development, we still need\
    \ higher-level APIs that work with Java Streams.\n\n## The Reactive Streams Project\n\
    \nReactive Streams is a specification that provides a standard for asynchronous\
    \ stream processing with non-blocking back pressure. By specification, we mean\
    \ that there are multiple implementations, just like with JDBC drivers. There\
    \ are example implementations provided by the Reactive Streams community in multiple\
    \ languages, which is available at [`https://github.com/reactive-streams`](https://github.com/reactive-streams)\
    \ . For Java, the API can be found at [`https://github.com/reactive-streams/reactive-streams-jvm`](https://github.com/reactive-streams/reactive-streams-jvm)\
    \ . We have been implementing two basic concepts for years—the Observer and Publish/Subscribe\
    \ patterns. Reactive Streams are based on these concepts, but with following components\
    \ in the API:\n\n*   Publisher: A publisher is responsible for producing an unbounded\
    \ number of sequenced elements (stream) and publishing them according to the demand\
    \ received from its subscriber(s).\n\n    Definition:\n\n    ```\n    public interface\
    \ Publisher {\n    public void subscribe(Subscriber s);\n    }\n    ```\n\n* \
    \  Subscriber: Just like the observer in the Observer pattern, the subscriber\
    \ is responsible for observing the source stream and reacting when items are pushed\
    \ by the producer.\n\n    Definition:\n\n    ```\n    public interface Subscriber\
    \ {\n    public void onSubscribe(Subscription s);\n    public void onNext(T t);\n\
    \    public void onError(Throwable t);\n    public void onComplete();\n    }\n\
    \    ```\n\n*   Subscription: Every subscriber has to implement this interface.\
    \ This model is passed to the subscriber on each event occurrence.\n\n    Definition:\n\
    \n    ```\n    public interface Subscription {\n    public void request(long n);\n\
    \    public void cancel();\n    }\n    ```\n\n*   Processor: This interface is\
    \ responsible for the processing logic of received items by the publisher and\
    \ delegated to the subscriber as a handler.\n\n    Definition:\n\n    ```\n  \
    \  public interface Processor extends Subscriber,\n    Publisher {}\n    ```\n\
    \nThere are two more concepts involved in Reactive Streams:\n\n*   Back Pressure:\
    \ In a non-Reactive system, a producer might keep on producing the items even\
    \ if the consumers can’t consume with that speed, resulting in *back pressure*\
    \ on the clients. Reactive Systems allow the clients to acknowledge to the producer\
    \ their capacity issues and readiness to accept more items.\n\n*   Non-Blocking:\
    \ From the core Java world, we have been working on non-blocking concurrent applications\
    \ through atomic variables. Essentially in simple terms, Reactive systems allow\
    \ the user thread to keep processing actions, putting all I/O operations in a\
    \ queue. They can then pick processes and respond to the user thread through a\
    \ callback. This is how the Node.js world works, by using event food for processing\
    \ all background operations.\n\nSince there are various APIs on building Reactive\
    \ systems in Java, I introduce a few of them here and then explain one in particular\
    \ as an example.\n\n## The RxJava (Reactive Extensions) Project\n\nRxJava is another\
    \ framework for Reactive development; it’s based on ReactiveX implementation (\
    \ [`http://reactivex.io/`](http://reactivex.io/) ). ReactiveX is a combination\
    \ of the best ideas from the Observer pattern, the Iterator pattern, and functional\
    \ programming. In ReactiveX, an observer subscribes to an observable. the Observer\
    \ then reacts to the stream of items emitted by the observable (just like the\
    \ publisher in Reactive Streams). By using Java concurrent APIs and offloading\
    \ the processing to the background threads, user actions can wait on future objects\
    \ and lower-level concurrency and non-blocking I/O concerns are the responsibility\
    \ of the framework. There have been two versions of this API so far and at present\
    \ RxJava 2 is the one in use. ReactiveX is the umbrella project under which RxJava\
    \ is the Java library. Some of these concepts come up in the JDK as well, thus\
    \ we will be looking at the API from Java 9 in the next section."
  trans: "\n# 8. Java 响应式开发\n\n近年来，使用事件驱动异步运行时环境和框架进行网络编程受到了广泛关注，例如 JavaScript 中的\
    \ Node.js 和 Java 中的 RxJava（ReactiveX）。NIO（新 I/O）包是 Java 中响应式编程的基础。响应式编程在应用开发中并非新鲜事物。当面对海量数据或高并发访问时，我们通常需要异步处理来使系统快速响应。除了异步性，我们的系统还必须以非阻塞模式在流（连续的事件序列）上工作。\n\
    \n数据量和操作规模与日俱增，这意味着使用传统方法不断增加硬件资源几乎变得不可能。当需求下降时，我们也希望使用更简单、成本更低的硬件来处理负载。当 Node.js\
    \ 展示了应用在等待 I/O 通道上浪费了多少时间时，我开始对响应式编程产生兴趣。我不会深入探讨 Node.js 的细节，因为那是一种不同的模型，而 Java\
    \ 可以通过利用多核 CPU 做得更好。\n\n## 响应式宣言\n\n响应式宣言包含了基本目标和指导方针，可在 [`https://www.reactivemanifesto.org/`](https://www.reactivemanifesto.org/)\
    \ 获取。它是多个组织为标准化响应式开发而贡献的成果。响应式宣言描述了如何基于四个原则设计响应式系统：\n\n*   **即时响应性**：系统尽可能及时地做出响应，并对所有用户命令保持响应。系统应能快速发现问题并有效处理，即使在问题期间也能提供一致的响应。基于通过后台线程响应事件的小型无状态函数的函数式编程，是我们设计此类系统的方法之一。\n\
    \n*   **韧性**：系统在面临故障时仍能保持响应。系统中有时确实会发生故障。其目的是避免系统各组件的连锁反应，并优雅地处理对用户的消息传递。包括在发生故障时的恢复或重试逻辑。\n\
    \n*   **弹性**：系统在不同工作负载下保持响应。响应式系统可以通过增加或减少分配给这些输入的资源来响应输入速率的变化。像 Docker 和 Kubernetes\
    \ 这样基于容器的部署解决方案就是弹性的例子。\n\n*   **消息驱动**：响应式系统依赖于组件之间的异步消息传递，这确保了松耦合、隔离和位置透明性，并提供了将错误作为消息进行委托的手段。消息应该是不可变的，因此设计上就是线程安全的。Akka\
    \ 和 Vert.x 是基于消息传递的流行 Java 响应式平台。\n\n基于这些原则，已经开发了各种 API、框架和库。核心 Java 中的 NIO（新输入输出）包是一个精确处理\
    \ I/O 操作的响应式库。Netty 和 Apache Mina 已经存在多年，提供了基于 NIO 的网络选项。对于通用开发，我们仍然需要能与 Java\
    \ Streams 协同工作的更高级别 API。\n\n## 响应式流项目\n\n响应式流是一个规范，为带有非阻塞背压的异步流处理提供了标准。所谓规范，意味着有多个实现，就像\
    \ JDBC 驱动一样。响应式流社区提供了多种语言的示例实现，可在 [`https://github.com/reactive-streams`](https://github.com/reactive-streams)\
    \ 获取。对于 Java，API 可在 [`https://github.com/reactive-streams/reactive-streams-jvm`](https://github.com/reactive-streams/reactive-streams-jvm)\
    \ 找到。多年来我们一直在实现两个基本概念——观察者模式和发布/订阅模式。响应式流基于这些概念，但 API 中包含以下组件：\n\n*   **发布者**：发布者负责生成无限数量的有序元素（流），并根据从其订阅者收到的需求进行发布。\n\
    \n    定义：\n\n    ```\n    public interface Publisher {\n    public void subscribe(Subscriber\
    \ s);\n    }\n    ```\n\n*   **订阅者**：就像观察者模式中的观察者一样，订阅者负责观察源流，并在生产者推送项目时做出反应。\n\
    \n    定义：\n\n    ```\n    public interface Subscriber {\n    public void onSubscribe(Subscription\
    \ s);\n    public void onNext(T t);\n    public void onError(Throwable t);\n \
    \   public void onComplete();\n    }\n    ```\n\n*   **订阅**：每个订阅者都必须实现此接口。此模型会在每次事件发生时传递给订阅者。\n\
    \n    定义：\n\n    ```\n    public interface Subscription {\n    public void request(long\
    \ n);\n    public void cancel();\n    }\n    ```\n\n*   **处理器**：此接口负责处理发布者接收到的项目的处理逻辑，并作为处理程序委托给订阅者。\n\
    \n    定义：\n\n    ```\n    public interface Processor extends Subscriber,\n   \
    \ Publisher {}\n    ```\n\n响应式流还涉及另外两个概念：\n\n*   **背压**：在非响应式系统中，即使消费者无法以该速度消费，生产者也可能继续生产项目，从而对客户端造成*背压*。响应式系统允许客户端向生产者告知其容量问题以及接受更多项目的准备情况。\n\
    \n*   **非阻塞**：从核心 Java 领域来看，我们一直通过原子变量处理非阻塞并发应用。简而言之，响应式系统允许用户线程继续处理操作，将所有 I/O\
    \ 操作放入队列。然后它们可以拾取进程并通过回调响应用户线程。这就是 Node.js 世界的工作方式，通过使用事件循环来处理所有后台操作。\n\n由于在 Java\
    \ 中构建响应式系统有多种 API，我在此介绍其中几种，然后详细解释一个作为示例。\n\n## RxJava（响应式扩展）项目\n\nRxJava 是另一个用于响应式开发的框架；它基于\
    \ ReactiveX 实现（ [`http://reactivex.io/`](http://reactivex.io/) ）。ReactiveX 是观察者模式、迭代器模式和函数式编程最佳思想的结合。在\
    \ ReactiveX 中，观察者订阅一个可观察对象。然后观察者对可观察对象发出的项目流做出反应（就像响应式流中的发布者）。通过使用 Java 并发 API\
    \ 并将处理卸载到后台线程，用户操作可以等待 Future 对象，而底层并发和非阻塞 I/O 问题则由框架负责。到目前为止，该 API 有两个版本，目前使用的是\
    \ RxJava 2。ReactiveX 是伞形项目，RxJava 是其下的 Java 库。其中一些概念也出现在 JDK 中，因此我们将在下一节中查看 Java\
    \ 9 的 API。\n"
- fmt: "# Reactive APIs Within Core Java\n\nJava 8 started with providing basic constructs\
    \ for functional programming and streams. Java 9 introduced the `Flow` API and\
    \ common interfaces for Reactive programming as per Reactive Streams, which get\
    \ lots of benefit from the Java 8 improvements. The following APIs are in the\
    \ Java 9 `java.util.concurrent.Flow` class:\n\n*   The `Flow.Publisher<T>` interface\
    \ defines methods to produce items and control signals.\n*   The `Flow.Subscriber<T>`\
    \ interface defines methods to receive those messages and signals.\n*   The `Flow.Subscription`\
    \ interface defines the methods to link the publisher and subscriber.\n*   The\
    \ `Flow.Processor<T,R>` interface defines methods to do some advanced operations,\
    \ like chaining transformations of items from publishers to subscribers.\n*  \
    \ The only class in this API, `SubmissionPublisher<T>`, uses the [`Executor`](https://docs.oracle.com/javase/9/docs/api/java/util/concurrent/Executor.html)\
    \ supplied in its constructor for delivery to subscribers to handle back pressure.\n\
    \nWe have been building producer- and consumer-based applications with multithreading\
    \ from Java 1.3 onward, using `wait()` and `notify()`. With Java 5, we can do\
    \ that easily using blocking queues, executors, and other concurrency APIs. In\
    \ simplified form, with a distributed system, these tasks are implemented using\
    \ messaging as publishers/subscribers. With Java 9, we can implement the same\
    \ producer/consumer in the form of the publisher/subscriber based on those Reactive\
    \ APIs. The APIs are interesting but we may not be able to build a complete real-world\
    \ application with only those, so let’s look at the Spring Reactive APIs in the\
    \ next section.\n\n# Reactor and Spring Reactive\n\nIn this section, we dive deep\
    \ into a concrete example, because I want to focus on creating a full-fledged\
    \ web application (microservice) that involves HTTP requests as well as database\
    \ connectivity. The Spring community started with a project named “Project Reactor”\
    \ ( [`https://projectreactor.io/`](https://projectreactor.io/) ) to create a fully\
    \ non-blocking foundation. This API easily integrates with the Java functional\
    \ API, `CompletableFuture`, and `Stream` API.\n\nThe Spring Framework has another\
    \ web API (Web Flux) built on top of the Reactor APIs. This is an alternative\
    \ to the Spring Web MVC API built on the Servlet APIs. As per the Spring docs,\
    \ the reason for this API was a need for a non-blocking API to handle concurrency\
    \ with a smaller number of threads and scale with fewer hardware resources. The\
    \ Reactive API in Java evolved from previous version features, such as annotations,\
    \ concurrency APIs, atomic classes, and the NIO package. Functional programming,\
    \ the Streams API, and the `CompletableFuture` API in Java 8 also contributed\
    \ to the success of Reactive Java.\n\nIn Spring WebFlux, we have the `Mono` and\
    \ `Flux` APIs. They provide a rich set of functional operators to work on streams\
    \ of (0 or 1) or (0 to N) data items. WebFlux API accepts a publisher as input,\
    \ allows the operator to work on it, and finally returns `Mono<T>` or `Flux<T>`\
    \ as the output. The Spring WebFlux supports two types of APIs for Reactive programming:\n\
    \n*   Annotated Controllers: Spring MVC styled REST controllers supporting `Mono`\
    \ and `Flux` return types.\n*   Functional Endpoints: Lambda-based, lightweight,\
    \ and functional programming model.\n\nIn general, functional programming can\
    \ be harder than imperative programming for some developers. Imperative programming\
    \ maps naturally to how we think of a sequence of steps to perform a task. Further,\
    \ in an enterprise application, we may need to work on many frameworks and libraries\
    \ that have not yet moved to functional programming. For example, JPA and JDBC\
    \ are first. Recently, the community started working on Reactive database drivers\
    \ and Spring Data styled wrapper APIs.\n\nThe API is named R2DBC (Reactive Relational\
    \ Database Connectivity; see [`https://r2dbc.io/`](https://r2dbc.io/) ). R2DBC\
    \ is an API specification that declares a Reactive API to be implemented by driver\
    \ vendors in order to access their relational databases. As of this writing, there\
    \ are three database drivers that support the R2DBC specification:\n\n*   PostgreSQL\
    \ (`io.r2dbc:r2dbc-postgresql`)\n*   H2 (`io.r2dbc:r2dbc-h2`)\n*   Microsoft SQL\
    \ Server (`io.r2dbc:r2dbc-mssql`)\n\nLet’s now build a working example to see\
    \ WebFlux and R2DBC in action.\n\n# The Reactive Blog Microservice (Built On Spring\
    \ Reactive)\n\nWe are going to rebuild our blog application from previous chapters\
    \ using Reactive APIs. The structure will closely resemble the previous examples\
    \ we built, as shown here.\n\n```\n.\n├── build.gradle\n├── gradlew\n├── gradlew.bat\n\
    ├── settings.gradle\n└── src\n    └── main\n        ├── java\n        │   └──\
    \ com\n        │       └── example\n        │           └── eblog\n        │ \
    \              ├── App.java\n        │               ├── config\n        │   \
