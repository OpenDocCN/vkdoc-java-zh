    数据模型包含价格和数量，可以通过 JPA 存储在 H2 内存数据库中。


    `InventoryController` 类充当 RESTful Web 资源，并包含一个 `GET` 方法，用于获取产品的当前可用库存。


    关于在 Spring 中通过注解使用或避免自动装配（autowiring），存在不同的观点。我认为，除非应用程序是单体应用或足够大，否则这不是问题。当应用程序非常大且字段注入没有谨慎进行时，这曾经会引发问题，从而导致上帝对象（God
    object，即一个过大的类实例）。


