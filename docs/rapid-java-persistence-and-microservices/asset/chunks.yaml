  trans: '

    #### 应用程序设置


    在开始编写代码之前，请按照以下步骤设置项目：


    1.  在 `build.gra`**dle** 中配置依赖项。


    2.  创建并执行用于建表的 SQL 语句。


    3.  在 PostgreSQL 中创建数据库，并将其访问详情映射到 `application.yml` 中。


    这些步骤详见清单 3-2 至 3-4。


    ```

    server:

    port: 8080

    servlet:

    contextPath: /blog

    spring:

    application:

    name: blog-service

    jpa:

    show-sql: false

    hibernate:

    ddl-auto: update

    jdbc.lob.non_contextual_creation: true

    generate-ddl: true

    datasource:

    username: postgres

    password: postgres

    url: jdbc:postgresql://localhost:5432/blogs

