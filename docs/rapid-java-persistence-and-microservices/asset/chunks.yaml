    ## API Gateway


    API Gateway is a popular concept in the microservices architecture. If there are
    multiple microservices in any system, a central entry point for all incoming requests
    can be beneficial in a few essential cross-cutting ways:


    *   Routing


    *   Central authentication


    *   Authorization via Basic Auth, OAuth, JWT, API Key, etc.


    *   SSL termination


    *   Rate limiting


    *   Caching and monitoring


    There are two popular API Gateways that are open source, written in Java, and
    easily integrated with Spring Frameworks:


    *   Netflix OS Zuul


    *   Spring Cloud Gateway


    Additionally, there are more popular choices, such as Mashery, Apigee, Kong, WSO2,
    3scale, and the ones from Cloud providers. Let’s explore the Zuul Gateway, since
    it’s a common choice and part of the Netflix OSS umbrella project. We will create
    a new microservice (`gateway-service`) with the following code structure:


    ```

    .

    ├── build.gradle

    ├── gradle

    │   └── wrapper

    │       ├── gradle-wrapper.jar

    │       └── gradle-wrapper.properties

    ├── gradlew

    ├── gradlew.bat

    └── src

    └── main

    ├── java

    │   └── com

    │       └── example

    └── resources

    ├── application.properties

    └── application.yml

    ```


    We’ll walk through the creation of the gateway in the following sections.


    ### Application Setup


    Create a new application called `gateway-service` from [`http://www.spring.io`](http://www.spring.io)
    with the dependencies shown in Listing [6-30](#454149_1_En_6_Chapter.xhtml#PC56)
    in the `build.gradle` file.


    ```

    bootJar {

    baseName = ''admin-service''

    version =  ''1.0''

    }

    dependencies {

    compile("org.springframework.boot:spring-boot-starter-web")

    compile(''org.springframework.cloud:spring-cloud-starter-netflix-zuul:

    2.1.1.RELEASE'')

    compile("org.projectlombok:lombok:1.18.6")

    }

    dependencyManagement {

    imports {

    mavenBom "org.springframework.cloud:spring-cloud- dependencies:Greenwich.SR1"

    }

    }

    Listing 6-30

    The build.gradle File

    ```


    ### Configuration


    Ideally, `gateway-service` should run on a load balancer so that scale and failover
    concerns can be addressed. Listing [6-31](#454149_1_En_6_Chapter.xhtml#PC57) defines
    the configurations for this service along with the explanation in notes.


    ```

    application.yml

    spring:

    application:

    name: zuul

    boot:

    admin:

    client:

    url: http://localhost:7777/admin

    server:

    port: 9999

    management:

    endpoints:

    web:

    exposure:

    include: "*"

    zuul:

    ignoredServices: ''*''

    routes:

    config:

    path: /config/**

    url: http://localhost:8888/config/

    eshop:

    path: /eshop/**

    url: http://localhost:8081/eshop/

    inventory:

    path: /inventory/**

    url: http://localhost:8082/inventory/

    admin:

    path: /admin/**

    url: http://localhost:7777/admin/

    Listing 6-31

    Application.yml

    ```


    Notes:


    *   We have seen the most common use for this service to route requests to different
    domain URLs.


    *   The `zuul.routes.config.*` properties point to the URLs based on the context
    path.


    ### Bootstrapping


    We need to add another annotation called `@EnableZuulProxy` on top of the `Application`
    class to enable Zuul functionality (see Listing [6-32](#454149_1_En_6_Chapter.xhtml#PC58)).


    ```

    package com.example.eshop.gateway;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.cloud.netflix.zuul.EnableZuulProxy;

    @SpringBootApplication

    @EnableZuulProxy

    public class ZuulApp {

    public static void main(String[] args) {

    SpringApplication.run(ZuulApp.class, args);

    }

    }

    Listing 6-32

    Application Class

