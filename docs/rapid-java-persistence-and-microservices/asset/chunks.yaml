  raw: '### Using a Common Base Repository


    Many big applications need a base repository implementation in order to create
    common methods, like refreshing after saving. As a result, we populate the primary
    key ID and sometimes other auto-generated columns in the database. Ideally, JPA
    does this by default, but in case of transactions, the entity is populated back
    until the transaction ends or a commit happens because that is where `flush()`
    happens internally.


    People may argue that the `saveAndFlush()` method can be used instead of `save()`.
    Calling `saveAndFlush()` earlier and having the method end manually may not be
    the right choice in a transaction, because that will hit Hibernate’s internal
    optimizations. Developers can also call a `find()` or `load()` method after it
    has been saved, but there is often a need to save and read with multiple entities
    in a single method and a single transaction.


    As an example, we used this technique in Section 3.2.5 in the `DataGenerator`
    class. We have its usage in `DataGenerator`, but let’s now see how to write this
    base repository implementation (see Listing [3-23](#454149_1_En_3_Chapter.xhtml#PC33)).


    ```

    package com.example.blog_app.repository.base;

    import org.springframework.data.jpa.repository.JpaRepository;

    import org.springframework.data.repository.NoRepositoryBean;

    import java.io.Serializable;

    @NoRepositoryBean

    public interface BaseRepository extends JpaRepository {

    void refresh(T t);

    }

    package com.example.blog_app.repository.base;

    import org.springframework.data.jpa.repository.support.JpaEntityInformation;

    import org.springframework.data.jpa.repository.support.SimpleJpaRepository;

    import javax.persistence.EntityManager;

    import org.springframework.transaction.annotation.Transactional;

    import java.io.Serializable;

    public class BaseRepositoryImpl extends SimpleJpaRepository implements BaseRepository
    {

    private final EntityManager entityManager;

    public BaseRepositoryImpl(JpaEntityInformation entityInformation, EntityManager
    entityManager) {

    super(entityInformation, entityManager);

    this.entityManager = entityManager;

    }

    @Override

    @Transactional

    public void refresh(T t) {

    entityManager.refresh(t);

    }

    }

    package com.example.blog_app.repository;

    import com.example.blog_app.model.jpa.Blog;

    import com.example.blog_app.repository.base.BaseRepository;

    public interface BlogRepository extends BaseRepository {

    }

    Listing 3-23

    Base Repository Definition

    ```


    Notes:


    *   Spring Data internally uses the `SimpleJpaRepository` class as the generic
    implementation to manage dynamic repository definitions of the custom repositories
    defined by the developer.


    *   We have a `BaseRepository` interface annotated with `@NoRepositoryBean` ,
    which is a Spring convention to define a superclass for all repositories.


    *   We defined the `BaseRepositoryImpl` class as the definition of `BaseRepository`,
    which extends the `SimpleJpaRepository` class. We also added a `refresh()` method
    in this class.


    *   The `EntityManager` instance is already available to this object.


    *   All repositories extending this new `BaseRepository` interface will have access
    to all non-private common methods.


    *   If we remove this from the repositories, the `DataGenerator` class will not
    work. This is because we are inserting multiple entities in a transaction and
    using them within the method itself before the transaction commits at the end
    of the `DataGenerator.generateSampleData` method.


