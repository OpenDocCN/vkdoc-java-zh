    Create a new project named `serverless-example-ch10` from [`http://start.spring.io/`](http://start.spring.io/)
    with the dependencies shown in Listing [10-1](#454149_1_En_10_Chapter.xhtml#PC2)
    in the `build` file.


    ```

    plugins {

