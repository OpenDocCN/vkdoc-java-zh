    managed object’s lifecycle, as shown in Figure [4-1](#454149_1_En_4_Chapter.xhtml#Fig1),
    and then continue with our examples.


    ![../images/454149_1_En_4_Chapter/454149_1_En_4_Fig1_HTML.png](images/454149_1_En_4_Chapter/454149_1_En_4_Fig1_HTML.png)


    Figure 4-1


    JPA entity object lifecycle


    When an entity object is initially created, its state is `New`. An entity object
    becomes `Managed` when it is persisted to the database. When the `Managed` object
    is modified, its change is detected by the owning `EntityManager`, which is managed
    by Spring. Changes are propagated to the database upon the `commit` transaction.
    When the object is retrieved and marked for deletion, it is marked in the `REMOVED`
    state. Any associated objects that are preloaded in memory are also marked for
    deletion. The last state, called `DETACHED`, comes when the `EntityManager` is
    closed.


    Callback methods also provided within the JPA specification that allow users to
    perform operations before an object enters the respective state. These methods
    are annotated with the following annotations:


    *   `@PrePersist/@PostPersist`


    *   `@PreRemove/@PostRemove`


    *   `@PreUpdate/@PostUpdate`


    *   `@PostLoad`


    Use cases:


    *   One typical use case for these methods is to log or mark timestamps for auditing.


    *   Another could be to trigger any other functionality upon updating any object.


    ### Isolation Levels, Locking, and Performance


    Isolation levels are important for deciding transaction strategies, locking behavior,
    and given database performance in highly concurrent or high read-write rate based
    applications involving transactions.


    Let’s quickly review the data reading-related behaviors in transactions.'
