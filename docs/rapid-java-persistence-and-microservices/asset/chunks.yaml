- fmt: "# Functional Code\n\nWe have a very small functional code snippet that gets\
    \ deployed to a Tomcat instance by default. It can be used in all four platforms,\
    \ as mentioned. We may need to do a bit of tweaking, as per the Spring Cloud Function\
    \ documentation. See Listing [10-2](#454149_1_En_10_Chapter.xhtml#PC3).\n\n```\n\
    package com.example;\nimport org.springframework.boot.SpringApplication;\nimport\
    \ org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.annotation.Bean;\n\
    import reactor.core.publisher.Flux;\nimport java.util.function.Supplier;\n@SpringBootApplication\n\
    public class App {\npublic static void main(String[] args) {\nSpringApplication.run(App.class,\
    \ args);\n}\n@Bean\npublic Supplier> randomWords() {\nreturn () -> Flux.fromArray(new\
    \ String[] { \"Raj\", \"Malhotra\"});\n}\n}\nListing 10-2\nApplication Class\n\
    ```\n\nNotes:\n\n*   By default, Spring Boot uses Tomcat here and creates a web\
    \ application that exposes all defined functional methods accessible via an URL.\n\
    \n*   The same codebase will work with different platforms (AWS, Azure, or OpenWhisk).\n\
    \n*   There are a few optimizations to make so that startup time can be improved:\n\
    \    *   Try to avoid `Component` as this will slow down the startup process.\n\
    \    *   Try to avoid `Autowiring` for the same reason and use constructor injection\
    \ instead.\n\n## Running the Serverless-Example-Ch10 Application\n\n```\n> gradle\
    \ bootRun\n>\n:: Spring Boot ::        (v2.1.3.RELEASE)\n2019-03-25 08:20:04.204\
    \  INFO 16506 --- [           main] o.s.b.w.embedded.tomcat.TomcatWebServer  :\
    \ Tomcat started on port(s): 8080 (http) with context path \"\n2019-03-25 08:20:04.208\
    \  INFO 16506 --- [           main] com.example.App                          :\
    \ Started App in 2.401 seconds (JVM running for 2.803)\n```\n\nIn order to test\
    \ this function, run the following Curl command:\n\n```\n> curl http://localhost:8080/randomWords\n\
    [\"Raj\",\"Malhotra\"]\n```\n\nWe hit the `randomWords` function and received\
    \ the response `[\"Raj\",\"Malhotra\"]`.\n\n## Summary\n\nWe learned how to start\
    \ with the Spring Cloud Function in this chapter. I suggest you experiment with\
    \ the Apache OpenWhisk Adapter API. We will now look at Java messaging options\
    \ in the next chapter.\n\n# 11. Java Messaging\n\nMessaging has always been an\
    \ interesting topic to me since the start of my career. The Java ecosystem has\
    \ adopted many different flavors of event-driven programming over the years. We\
    \ have the JMS (Java Message Service) API since 1998 and it is still serving the\
    \ same purpose. Architects prefer Spring integration, Camel, and other platform\
    \ APIs today over pure JMS solutions. Coming to the current age of message brokers,\
    \ we have overall solutions like AMQP brokers (ActiveMQ, RabbitMQ, QPid, IronMQ,\
    \ and many more), streaming solutions (Kafka and cloud-provided options), and\
    \ commercial solutions as well, like Tibco and IBM MQ. We will look at two such\
    \ brokers and cover various underlying concepts with Java APIs—RabbitMQ and Kafka.\
    \ The code structure for this application will be as follows:\n\n```\n.\n├── build.gradle\n\
    ├── gradle\n│   └── wrapper\n│       ├── gradle-wrapper.jar\n│       └── gradle-wrapper.properties\n\
    ├── gradlew\n├── gradlew.bat\n└── src\n└── main\n├── java\n│   └── com\n│    \
    \   └── example\n│           ├── Application.java\n│           ├── kafka\n│  \
    \         │   ├── KafkaConsumer.java\n│           │   └── KafkaProducer.java\n\
    │           └── rabbitmq\n│               ├── Consumer.java\n│               ├──\
    \ Producer.java\n│               └── RabbitMQConfig.java\n└── resources\n├── application.properties\n\
    └── application.yml\n```\n\n## RabbitMQ\n\nRabbitMQ is a very popular message\
    \ broker supporting the AMQP 1.0 protocol. In messaging, RabbitMQ is written in\
    \ Erlang and is still the leader in this space. There are multiple APIs in Java,\
    \ but we will continue with the Spring framework only. Typically in a RabbitMQ\
    \ broker we have an exchange holding all messages and distributing these further,\
    \ based on routing keys of exchanges. Figure [11-1](#454149_1_En_11_Chapter.xhtml#Fig1)\
    \ shows this communication process.\n\n![../images/454149_1_En_11_Chapter/454149_1_En_11_Fig1_HTML.png](images/454149_1_En_11_Chapter/454149_1_En_11_Fig1_HTML.png)\n\
    \nFigure 11-1\n\nRabbitMQ Exchange\n\nHere’s how the process unfolds:\n\n1.  The\
    \ publisher publishes a message to the RabbitMQ exchange.\n\n2.  Based on the\
    \ routing key, the exchange distributes the message to its queues.\n\n3.  The\
    \ consumers connected to different queues receive messages based on their interests.\n\
    \n4.  Based on the exchange type, messages are sent to one or multiple queues.\
    \ The exchange type can be Direct, Fanout, Topic, and Headers.\n\nLet’s now create\
    \ an example with Spring Boot and RabbitMQ on OSX.\n\n### Application Setup\n\n\
    We first install RabbitMQ on OSX (MacBook) using the `brew` command:\n\n```\n\
    > brew install rabbitmq\n> brew services start rabbitmq\n```\n\nThen we create\
    \ a new Gradle project named `messaging-examples-ch11` with the dependencies shown\
    \ in Listing [11-1](#454149_1_En_11_Chapter.xhtml#PC4) in the `build.gradle` file.\n\
    \n```\nplugins {\nid 'org.springframework.boot' version '2.1.3.RELEASE'\nid 'java'\n\
    }\napply plugin: 'io.spring.dependency-management'\napply plugin: 'project-report'\n\
    java {\ngroup = 'com.example'\nversion = '1.0'\nsourceCompatibility = JavaVersion.VERSION_1_8\n\
    targetCompatibility = JavaVersion.VERSION_1_8\n}\nbootJar {\narchiveBaseName =\
    \ 'messaging-example'\nversion =  '1.0'\n}\nrepositories {\nmavenCentral()\n}\n\
    dependencies {\ncompile('org.projectlombok:lombok:1.18.6')\ncompile(\"org.springframework.boot:spring-boot-starter-amqp\"\
    )\n}\nListing 11-1\nBuild File\n```\n\n### Bootstrapping\n\nWe have a simple `Application`\
    \ class with scheduling functionality enabled in the Spring Framework (see Listing\
    \ [11-2](#454149_1_En_11_Chapter.xhtml#PC5)). We will be using schedulers to keep\
    \ sending messages to broker’s queues.\n\n```\npackage com.example;\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.scheduling.annotation.EnableScheduling;\n\
    @SpringBootApplication\n@EnableScheduling\npublic class Application {\npublic\
    \ static void main(String[] args) {\nSpringApplication.run(Application.class,\
    \ args);\n}\n}\nListing 11-2\nApplication Class\n```\n\n### RabbitMQ Configuration\n\
    \nBefore we start with the producer and consumer, we need to declare the exchange,\
    \ queues, and bindings of those two through the Spring configuration (see Listing\
    \ [11-3](#454149_1_En_11_Chapter.xhtml#PC6)).\n\n```\npackage com.example.rabbitmq;\n\
    import org.springframework.amqp.core.*;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\n@Configuration\n\
    public class RabbitMQConfig {\n@Bean\npublic Exchange ordersExchange() {\nreturn\
    \ new DirectExchange(\"orders_exchange\");\n}\n@Bean\npublic Queue ordersQueue()\
    \ {\nreturn new Queue(\"orders\");\n}\n@Bean\npublic Queue messagesQueue() {\n\
    return new Queue(\"notifications\");\n}\n@Bean\npublic Binding binding() {\nreturn\
    \ BindingBuilder\n.bind(ordersQueue())\n.to(ordersExchange())\n.with(\"orders.*\"\
    ).noargs();\n}\n@Bean\npublic Binding binding2() {\nreturn BindingBuilder\n.bind(messagesQueue())\n\
    .to(ordersExchange())\n.with(\"notifications.*\").noargs();\n}\n}\nListing 11-3\n\
    Configuration\n```\n\nNotes:\n\n*   We created a direct exchange called `orders_exchange`\
    \ with two queues called `orders` and `notifications`.\n\n*   We created two bindings\
    \ as well with routing keys, called `orders.*` and `notifications.*`, to bind\
    \ the queues with the exchange.\n\n*   We will not be using the notifications\
    \ queue in this example. We just showed this as an example to illustrate how different\
    \ types of messages can be routed from the same exchange."
