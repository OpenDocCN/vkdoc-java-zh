    For now, don’t worry about the Spring Boot admin-related `spring-boot-admin-starter-client`
    and `spring-boot-starter-actuator` dependencies. I explain these in Section [6.6](#454149_1_En_6_Chapter.xhtml#Sec32).


    ### Configuration


    We need two types of configuration for this service:


    *   Add the required properties in the default properties/yml files.


    *   Set up a new Git repository.


    #### Configuration Files


    The Spring Cloud project offers adding a new file named `bootstrap.yml` to do
    any initial configurations prior to loading the properties in the `application.yml`
    or `application.properties` file. We will use `bootstrap.yml` to set up the Git
    server repository URI and encryption information, if any. The `bootstrap.yml`
    file is loaded before `application.yml`. We have both of these files defined in
    the codebase, as shown in Listing [6-2](#454149_1_En_6_Chapter.xhtml#PC4).


    ```

    bootstrap.yml

    spring:

    application:

    name: config-service

    cloud:

    config:

    server:

    git:

    uri: ${HOME}/work_all/git_repo

    application.yml

    server:

    port: 8888

    servlet.context-path: /config

    spring:

    boot:

    admin:

    client:

    url: http://localhost:7777/admin

    management:

    endpoints:

    web:

    exposure:

    include: "*"

    Listing 6-2

    Configuration Files

    ```


    **Notes:**


    *   **spring.application.name** is very important as this will be used as the
    identifier for this service in **service registry** (described in next chapter).
    I will explain its importance in Section [6.3](#454149_1_En_6_Chapter.xhtml#Sec9).


    #### Git Repository Setup


    We need to set up a Git repo where the configuration files for different services
    will be stored. I am setting this up at `/Users/raj/work_all/git_repo` on my local
    system. Choose the location of your choice.


    In order to initialize a new Git repository, we need to go to this directory location
    and run the `git init` command on the command line. The terminal should show the
    following output:


    ```

    Initialized empty Git repository in /Users/raj/work_all/git_repo/.git/

    ```


    Let’s now override the properties for the `prod` profile related to microservices
    in the Git repo:


    1.  `${HOME}/work_all/git_repo/inventory-service-prod.properties`


    contents:


    1.  `${HOME}/work_all/git_repo/eshop-prod.properties`


    *   `spring.main.banner-mode= "off"`


    *   `logging.file: logs/config-service.log`


    contents:


    *   `spring.main.banner-mode= "off"`


    *   `logging.file: logs/inventory-service.log`


    Notes:


    *   We stored the `Prod` profile-related properties in the Git repository for
    `eshop` and the inventory-service microservices in the files.


    *   These files coexist at the same location, i.e., in the `resources` directory.


    *   The `cloud.config.server.git.uri` property specifies the location of the repo.


    *   The `spring.boot.admin and management.*` related properties can be ignored
    for now. I explain them in Section [6.8](#454149_1_En_6_Chapter.xhtml#Sec41).


    Let’s run the application and access these configurations from the `config-service`
    URL.


    ### Bootstrapping


    We need a simple `Application` class with a single new annotation on the top called
    `@EnableConfigServer` (see Listing [6-3](#454149_1_En_6_Chapter.xhtml#PC6)).


    ```

    package com.example.config;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.cloud.config.server.EnableConfigServer;

    @SpringBootApplication

    @EnableConfigServer

    public class ConfigApp {

    public static void main(String[] args) {

    SpringApplication.    (ConfigApp.class, args);

    }

    }

