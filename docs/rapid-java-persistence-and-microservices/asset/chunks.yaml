    Notice that Hibernate is generating the following statements:


    ```

    Hibernate: drop table if exists author

    Hibernate: drop table if exists post

    Hibernate: create table author (id bigint not null auto_increment, age integer
    not null, name varchar(255), status integer, primary key (id)) engine=MySQL5InnoDBDialect

    Hibernate: create table post (id bigint not null auto_increment, content varchar(255),
    status integer, title varchar(255), author_id bigint, primary key (id)) engine=MyISAM

    Hibernate: alter table post add constraint FK5l759v7apba3lqguc7bp8h456 foreign
    key (author_id) references author (id)

    ```


    Open a browser now and visit the `http://localhost:8201/eblog/graphiql` URL to
    launch the GraphiQL Editor (see Figure [7-1](#454149_1_En_7_Chapter.xhtml#Fig1)).


    ![../images/454149_1_En_7_Chapter/454149_1_En_7_Fig1_HTML.jpg](images/454149_1_En_7_Chapter/454149_1_En_7_Fig1_HTML.jpg)


    Figure 7-1.


    GraphiQL Editor


    Note the following about the editor:


    *   The left pane accepts input.

    *   The right pane will show the output or errors.

    *   There is built-in support for Prettify, History, Docs (Documentation), and
    Query Variables.

    *   As mentioned, you can delete all contents and press `Crtl+Space` for all suggestions.


    Let’s look at the two predefined mutation and query inputs, along with the results
    (see Figures [7-2](#454149_1_En_7_Chapter.xhtml#Fig2) and [7-3](#454149_1_En_7_Chapter.xhtml#Fig3)).


    ![../images/454149_1_En_7_Chapter/454149_1_En_7_Fig3_HTML.jpg](images/454149_1_En_7_Chapter/454149_1_En_7_Fig3_HTML.jpg)


    Figure 7-3.


    GraphiQL queries example


    ![../images/454149_1_En_7_Chapter/454149_1_En_7_Fig2_HTML.png](images/454149_1_En_7_Chapter/454149_1_En_7_Fig2_HTML.png)


    Figure 7-2.


    GraphiQL mutations example


    Points to note:


    *   We combined two data updates into a single mutation request as `newPost` and
    `newAuthor`.

    *   The request starts with `mutation {` and then actual multiple defined inputs
    start from there.

    *   In mutations, you can expect the returned object graph attributes. This is
    allowed only if the return type has been specified in the schema against that
    mutation.

    *   Just like mutations, queries are also combined into a single network request—`recentPosts`
    and `authorsWithTopPosts`.

    *   Notice that the `recentPosts` query also receives the pagination attributes
    called `limit` and `offset`. GraphQL also supports RelayJS like cursor-based pagination,
    which may come in handy.

    *   Notice that `authorsWithTopPosts` has a related `posts` collection. Clients
    can specify all attributes, of which all the resources are required in the output.


    ![../images/454149_1_En_7_Chapter/454149_1_En_7_Fig4_HTML.jpg](images/454149_1_En_7_Chapter/454149_1_En_7_Fig4_HTML.jpg)


    Figure 7-4.


    GraphiQL Contextual help example


    There is also a provision to view the complete schema through this UI only, by
    clicking on the right-side Docs link. This will display the navigation sidebar,
    showing schema details along with any comments describing the purpose of any field
    (see Figure [7-5](#454149_1_En_7_Chapter.xhtml#Fig5)).


    ![../images/454149_1_En_7_Chapter/454149_1_En_7_Fig5_HTML.jpg](images/454149_1_En_7_Chapter/454149_1_En_7_Fig5_HTML.jpg)


    Figure 7-5.


    GraphiQL documentation example


    If we have a deprecated field, let’s say `age` in the `Author` object, we need
    to update the schema as follows:


    ```

    type Author {

    id: ID!

    name: String!

    age: Int @deprecated(reason: "Field is deprecated!")

    posts: [Post]!

    status: Status!

    }

    ```


    This is going to reflect on the GraphiQL screen, as shown in Figure [7-6](#454149_1_En_7_Chapter.xhtml#Fig6).


    ![../images/454149_1_En_7_Chapter/454149_1_En_7_Fig6_HTML.jpg](images/454149_1_En_7_Chapter/454149_1_En_7_Fig6_HTML.jpg)


    Figure 7-6.


    GraphiQL


    This ends our example to explore the basic concepts and starting point with Spring
    Boot. Let’s also look at a few projects that might be useful to explore GraphQL
    Java APIs:


    *   GraphQL SPQR ( [`https://github.com/leangen/GraphQL-SPQR`](https://github.com/leangen/GraphQL-SPQR)
    ) can be helpful in writing GraphQL using the code-first approach.

    *   GraphQL JPA ( [`https://github.com/jcrygier/graphql-jpa`](https://github.com/jcrygier/graphql-jpa)
    ) can be useful to auto-generate a complete CRUD application from just the JPA
    entities using a code-first approach.

    *   GraphQL Java DateTime ( [`https://github.com/donbeave/graphql-java-datetime`](https://github.com/donbeave/graphql-java-datetime)
    ) is another project that is helpful in mapping GraphQL Date Time datatypes to
    Java `LocalDateTime` and other `java.time` types.


    ## Summary


    This chapter outlined an example with the GraphQL Java libraries to help you get
    started. I suggest that you explore more of these examples, as this is a new expanding
    space of concepts. The next chapter explores another major paradigm in Java that
    is making HTTP communication faster and is improving scalability—Reactive frameworks.'
