    fileRepository.save(file1);

    fileRepository.refresh(file);

    fileRepository.refresh(file1);

    Set files = post.getFiles();

    if(files == null)

    files = new HashSet();

    files.add(file);

    files.add(file1);

    post.setFiles(files);

    postRepository.save(post);

    List allFiles = fileRepository.findAll();

    allFiles.forEach(f->{

    Set posts = f.getPosts();

    posts.forEach(p->{

    log.info("Post : {} attached with file : {}", p.getTitle(), f.getName());

    });

    });

    post.getFiles().forEach(f->{

    log.info("File: {} attached to Post: {}", f.getName(), post.getTitle());

    });

    }

    清单 3-16

    测试用例更新

    ```


    ### 运行应用程序


    为了查看 Hibernate 在后台运行的查询，我们需要在运行应用程序之前，在 `application.yml` 文件中启用一个属性，如下所示：


    ```

    spring:

    jpa:

    show-sql: true

    ```


    完成此更改后，当测试用例运行时，查询也会被记录到控制台，如图 3-2 所示。


    ![../images/454149_1_En_3_Chapter/454149_1_En_3_Fig2_HTML.jpg](img/454149_1_En_3_Fig2_HTML.jpg)


    图 3-2


    测试用例运行的控制台输出


    ```

    > gradle clean build

    > gradle test

    >

    com.example.blog_app.BlogJpaAppTests     : File: main_image attached to Post:
    Lorem Ispum1

    com.example.blog_app.BlogJpaAppTests     : File: second_image attached to Post:
    Lorem Ispum1

    ```


    回顾一下，我们创建了两个新的 `File` 对象并保存了它们。然后我们将这些持久化对象添加到 `POST` 实体对象中并保存。之后，我们获取了所有 `File`
    对象并列出其父级 `POST`。同样地，我们从 `POST` 实体对象中列出了子级 `File` 对象。


    注意：


    *   我们刚刚通过一个名为 `post_files` 的第三表看到了一个 `@ManyToMany` 关联示例，但相关字段是直接相互嵌入的。这就是我们之前提到的优势——双向导航变得更加容易。


    *   根据 Hibernate 文档，`@ManyToMany` 注解很少是一个好的选择，因为它将双方都视为单向关联。


    *   一个更好的替代方案是在两个实体中都使用 `@OneToMany` 关联到链接表。在我们的示例中，`POST` 和 `File` 实体应该有一个指向
    `PostFile` 实体的 `@OneToMany` 关联。


    *   还有一种方法是通过可嵌入键或复合键来定义 `@ManyToMany`。我们跳过这种方法，因为它也是一种罕见且复杂的方法。


    ### @OneToOne 注解


    `@OneToOne` 关联非常容易理解和实现。拥有方实体通过引用列来引用关联实体。另一方实体通过 `mappedBy` 属性来引用拥有方实体。这就是双向关联的情况。让我们看一个使用
    `User` 和 `Address` 对象的示例（见清单 3-17）。


    ```

    package com.example.blog_app.model.jpa;

    import lombok.*;

    import javax.persistence.*;

    import java.io.Serializable;

    import java.time.LocalDateTime;

    import java.util.Set;

    @Data

    @Builder

    @NoArgsConstructor

    @AllArgsConstructor

    @ToString(exclude = {"posts"})

    @EqualsAndHashCode(exclude = {"posts"})

    @Entity

    @Table(name = "`user`")

    public class User implements Serializable {

    @Id

    @GeneratedValue(strategy = GenerationType.IDENTITY)

    private Long id;

    private Integer addressId;

    @OneToOne(cascade = CascadeType.ALL, fetch = FetchType.LAZY)

    @JoinColumn(name = "addressId", insertable = false, updatable = false)

    private Address address;

    }

    package com.example.blog_app.model.jpa;

    import javax.persistence.*;

    @Entity

    public class Address {

    @Id

    @GeneratedValue(strategy = GenerationType.IDENTITY)

    private Long id;

    private String address;

    @OneToOne(mappedBy = "address")

    private User user;

    }

    清单 3-17

    OneToOne 关联示例

    ```


    注意：


    *   如果你在定义 `@JoinColumn` 的同一个表中定义引用列，则需要使用 `name` 属性，而不是 `referencedColumnName`。


    *   这意味着 `User` 表拥有并负责该关系。


    *   如果你在实体类中创建了一个与引用列同名的字段，则需要在 `@JoinColumn` 中将该字段标记为不可插入和不可更新。


    *   使用 `mappedBy` 属性的另一方实体表示这些实体不负责该关系，并在关联实体的映射字段中查找引用的配置。

