    generated `toString`, equals, and `hashCode` object comparison methods.

    - As good practice, it is better not to send back an incremental ID and primary
    key to the client for any object. Thus, GUIDs (Global Unique Identifiers) can
    be used. However, performance can be slow, as indexing big random characters is
    going to be slow. To overcome this, we use both IDs.


