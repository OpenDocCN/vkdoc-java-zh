    # Part III Making HTTP Faster


    # 7. Java GraphQL Development


    GraphQL is a query language for APIs and a runtime for fulfilling those queries
    with your existing data. GraphQL was developed by Facebook in 2012 and then publicly
    released in 2015. There has been lot of development recently around GraphQL, especially
    since tools like AWS Cloud AppSync and frameworks like Prisma came about. GraphQL’s
    primary purpose is to handle issues with RESTful API design and make HTTP communication
    faster.


    Instead of having multiple URL-based conventions, GraphQL works on the basis of
    a single endpoint accepting all requests through `POST` in a graph-like data structure
    that looks similar to JSON. GraphQL has its own Schema Definition Language (SDL)
    that defines data models with standard types, validations, and actions to retrieve
    and update those models. GraphQL follows the CQRS (Command Query Responsibility
    Segregation) design pattern, which states that it is better to separate code related
    to reading data from code that updates that data. This keeps the responsibilities
    clear. The domain objects for reading and writing can also be different from the
    ones for updating datastores.'
