    Controller and DTO Classes

    ```


    Notes:


    *   We have a rest API at `/login` that accepts the plain username and password
    in the `LoginRequest` bean. Ideally, the password should be sent over an SSL-protected
    connection and be in digest form. We are using the basic example with plain text
    for credentials through API, just for simplicity.

    *   The `Jwts` class is a lightweight API that creates and validates JSON web
    tokens.

    *   We are also using a plain symmetric key as `secretkey`, but I suggest you
    use asymmetric keys for this purpose.

    *   We set the role as an attribute as a claim. We can use claims to add any custom
    attributes and create a token with user profile information. The token can be
    validated and then passed to other downstream services, which can decode and perform
    authorization based on the user profile information.


    ### Testing Token Generation


    After restarting the `eshop` service, run the following command on the console
    using `CURL`:


    ```

    > curl -H "Content-Type: application/json" -d ''{"email":"raj@example.com","password":"password"}''
    -X POST

    http://localhost:8081/eshop/login

    eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJyYWpAZXhhbXBsZS5jb20iLCJyb2xlcyI6ImFkbWluIiwiaWF0Ijox
    NTU0NjA3NTIzfQ.p4FzUPRKUi2NT00OrWQxWv760i4eB2LK0_fcWexlDos

    ```


    This response shows the auth token, marked in bold. We will utilize this token
    in the next step to validate and allow services access.


    ### Gateway-Service Changes


    In this service, we validate the token passed by a remote client in every request.
    If the `Authorization` header is invalid or corrupt, we will send an HTTP 401
    with an error description. We just need to change the `AuthPreFilter` class in
    `gateway-service` (see Listing [6-35](#454149_1_En_6_Chapter.xhtml#PC64)).


    ```

    package com.example.eshop.gateway.filters;

    import com.netflix.zuul.ZuulFilter;

    import com.netflix.zuul.context.RequestContext;

    import io.jsonwebtoken.Claims;

    import io.jsonwebtoken.Jwts;

    import io.jsonwebtoken.SignatureException;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.stereotype.Component;

    import javax.servlet.http.HttpServletRequest;

    @Component

    @Slf4j

    public class AuthPreFilter extends ZuulFilter {

    //Check JWT headers and all OAUTH service if required

    @Override

    public Object run() {

    RequestContext context = RequestContext.getCurrentContext();

    HttpServletRequest request = context.getRequest();

    final String token = request.getHeader("Authorization");

    if (token == null) {

    context.setSendZuulResponse(false);

    context.setResponseStatusCode(401);

    context.setResponseBody("Authorization header is missing");

    return null;

    }

    try {

    final Claims claims = Jwts.parser().setSigningKey("secretkey").parseClaimsJws(token).getBody();

    log.info("Claims: {}", claims);

    context.addZuulRequestHeader("Authorization", "Basic " + token);

    } catch (final SignatureException e) {

    context.setSendZuulResponse(false);

    context.setResponseStatusCode(401);

    context.setResponseBody("API key is not valid");

    }

    return null;

    }

    @Override

    public String filterType() {

    return "pre";

    }

    @Override

    public int filterOrder() {

    return 0;

    }

    @Override

    public boolean shouldFilter() {

    return true;

    }

    }

    Listing 6-35

    Zuul PreFilter Class

    ```


    Notes:


    *   We have already seen the `ZuulFilter` in Section [6.8.4](#454149_1_En_6_Chapter.xhtml#Sec45).
    Additionally we added the code to decode and extract the token with the same signed
    symmetric key.

    *   If the key is tempered, we cannot decode it again and hence the authentication
    will get broken at the gateway level.

    *   Once we have validated the token, we send it back as a header in request.


    #### Testing Gateway Authentication


    After restarting the `gateway-service`, run the following commands through `CURL`
    for validating as well as accessing the `/api/orders` API of the `eshop` service.


    ```

    curl -H "Authorization:

    eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJyYWpAZXhhbXBsZS5jb20iLCJyb2xlcyI6ImFkbWluNTIzfQ.p4FzUPRKUi2NT00OrWQxWv760i4eB2LK0_fcWexlDos"
    -i -X POST

    http://localhost:9999/eshop/ api/orders

    HTTP/1.1 201

    Location: http://localhost:8081/eshop/api/orders/2

    Date: Sun, 07 Apr 2019 03:47:24 GMT

    Transfer-Encoding: chunked

    ```


    These results have been collected after the sample run and show that the token
    we received in Section [6.10.1.2](#454149_1_En_6_Chapter.xhtml#Sec51) has been
    successfully validated. This also shows that the `eshop` service API has responded.
    Let’s also look at how the `gateway-service` behaves if an invalid token is sent
    in request.


    ```

    curl -H "Authorization: WRONG_TOKEN" -i -X POST http://localhost:9999/eshop/api/
    orders

    HTTP/1.1 401

    Transfer-Encoding: chunked

    Date: Sun, 07 Apr 2019 03:56:28 GMT

    API key is not valid

    ```


    We will receive this message if the token sent in request is invalid.


