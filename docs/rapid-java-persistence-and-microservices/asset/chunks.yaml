    \nFigure 11-2\n\nRabbitMQ admin console showing orders_exchange\n\n## Apache Kafka\n\
    \nApache Kafka is a popular stream-processing platform. It was initially developed\
    \ by LinkedIn and donated to the Apache Software Foundation. Kafka is written\
    \ in the Scala JVM language and targeted to provide a massively scalable platform\
    \ for processing millions of continuously produced messages. In this section,\
    \ we explore the quick start example for a Spring Boot Kafka producer and a consumer\
    \ application.\n\nThere are multiple use cases where Kafka can practically be\
    \ utilized. I have seen startups using Kafka as a message broker as well, instead\
    \ of a stream processor, with a message rate of 5,000 orders items per day. The\
    \ reason for this is to use a single consistent messaging technology for all needs.\
    \ Although with the purpose of just problem solving, we can utilize Kafka in different\
    \ ways. However, we will not be using it to its full potential on such a load;\
    \ RabbitMQ may serve better in this circumstance. As a general usage suggestion,\
    \ RabbitMQ should be used for inter-microservice communication and Kafka is better\
    \ at backend message processing. Consider these Kafka use cases:\n\n*   Post-order\
    \ processing for order fulfillment in the ecommerce industry\n*   For sending\
    \ notifications to end users\n*   For logs and analytics\n*   Any error processing\
    \ or sending alerts in a large-scale system\n*   Regular messaging needs based\
    \ on `Publish.Subscribe` through topics\n\n### Kafka Tools and Build Script\n\n\
    We need to install and start Kafka on a machine. Follow these steps to do so:\n\
    \n1.  Run the following:\n\n    ```\n    > brew install kafka\n    > brew services\
    \ start kafka\n    ```\n\n    This starts Zookeeper and Kafka in the background\
    \ with its default settings. Alternatively, we can start the broker manually with\
    \ the following commands:\n\n    ```\n    > cd /usr/local/Cellar/kafka/2.1.1/\n\
    \    > ./zookeeper-server-start ../libexec/config/zookeeper.properties\n    >\
    \ ./kafka-server-start ../libexec/config/server.properties\n    ```\n\n2.  We\
    \ can also test a sample producer and consumer through console-based utilities\
    \ by using the following commands:\n\n    ```\n    > ./kafka-console-producer\
    \ --broker-list localhost:9092 --topic test\n    >./kafka-console-consumer --bootstrap-server\
    \ localhost:9092 --topic test — from-beginning\n    ```\n\n    These utilities\
    \ can be used to send any message from the console to the broker. The same message\
    \ will get printed on the console of the consumer utility.\n\n3.  Add the following\
    \ dependencies in the `build.gradle` file in the same application:\n\n    ```\n\
    \    compile('org.apache.kafka:kafka-streams')\n    compile('org.springframework.kafka:spring-kafka')\n\
    \    ```"
