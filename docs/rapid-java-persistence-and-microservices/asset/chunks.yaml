  trans: "\n### 消息生产者\n\n我们将通过 `@Scheduled` 调度一个方法，该方法持续生成新消息并将其发送到代理。在本示例中，我使用了 Spring\
    \ Boot 中 RabbitMQ 服务器的默认设置（参见清单 11-4）。默认属性如下：\n\n*   `spring.rabbitmq.port`：用于指定端口；默认为\
    \ `5672`。\n\n*   `spring.rabbitmq.host`：用于指定主机；默认为 `localhost`。\n\n*   `spring.rabbitmq.username`：用于指定（可选的）用户名。\n\
    \n*   `spring.rabbitmq.password`：用于指定（可选的）密码。\n\n```\npackage com.example.rabbitmq;\n\
    import lombok.extern.slf4j.Slf4j;\nimport org.springframework.amqp.core.Queue;\n\
    import org.springframework.amqp.rabbit.core.RabbitTemplate;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.scheduling.annotation.Scheduled;\nimport org.springframework.stereotype.\
    \ Service;\nimport java.util.Calendar;\n@Service\n@Slf4j\npublic class Producer\
    \ {\n@Autowired\nprivate RabbitTemplate rabbitTemplate;\n@Scheduled(fixedRate\
    \ = 1000)\npublic void send() {\nString message = \"Next order received at \"\
    \ + Calendar.getInstance().getTime();\nthis.rabbitTemplate.convertAndSend(\"orders_exchange\"\
    , \"orders\", message);\nlog.info(\"RabbitMQ Message sent : {}\", message);\n\
    }\n}\n清单 11-4\n生产者类\n```\n\n说明：\n\n*   我们通过自动装配注入了 `RabbitTemplate` 对象。\n\n* \
    \  `@Scheduled(fixedRate = 1000)` 注解将确保每 1000 毫秒调用一次 `send()` 方法。\n\n*   我们正在生成一条新消息并将其通过网络发送出去。\n\
    \n*   我们将消息发送到名为 `orders_exchange` 的交换机，路由键设置为 `orders`。`RabbitTemplate` 中实际方法的签名是\
    \ `public void convertAndSend(String exchange, String routingKey, Object object)`。\n\
    \n### 消息消费者\n\n这里我们只有一小段代码，用于持续将接收到的消息打印到日志文件中（参见清单 11-5）。\n\n```\npackage com.example.rabbitmq;\n\
    import lombok.extern.slf4j.Slf4j;\nimport org.springframework.amqp.rabbit.annotation.RabbitListener;\n\
    import org.springframework.stereotype.Service;\n@Service\n@Slf4j\npublic class\
    \ Consumer {\n@RabbitListener(queues = \"orders\")\npublic void receiveMessage(String\
    \ message) {\nlog.info(\"RabbitMQ Received :: {}\", message);\n}\n}\n清单 11-5\n\
    消费者类\n```\n\n`@RabbitListener(queues = \"orders\")` 注解表明该方法将充当名为 `orders` 的队列中所有接收到的消息的监听器。\n\
    \n### 运行应用程序\n\n运行应用程序：\n\n```\n> gradle bootRun\n2019-03-24 - Starting Application\
    \ on Rajs-MacBook-Pro.local with PID 1409 (started by raj in /Users/raj/work_all/book_\
    \ code/rapid-java-persistence-and-microservices/ch11/messaging-examples-ch11)\n\
    2019-03-24 - No active profile set, falling back to default profiles: default\n\
    2019-03-24 - Initializing ExecutorService 'taskScheduler'\n2019-03-24 - Attempting\
    \ to connect to: [localhost:5672]\n2019-03-24 - Created new connection: rabbitConnectionFactory#4fa06f52:0/SimpleConnection@4f668f29\
    \ [delegate=amqp://guest@127.0.0.1:5672/, localPort= 61085]\n2019-03-24 - RabbitMQ\
    \ Received :: Next order received at Fri Mar 22 22:57:53 IST 2019\n2019-03-24\
    \ - RabbitMQ Message sent : Next order received at Sun Mar 24 23:51:41 IST\n2019-03-24\
    \ - Started Application in 2.406 seconds (JVM running for 2.915)\n2019-03-24 -\
    \ RabbitMQ Received :: Next order received at Sun Mar 24 23:51:41 IST 2019\n2019-03-24\
    \ - RabbitMQ Message sent : Next order received at Sun Mar 24 23:51:42 IST\n2019-03-24\
    \ - RabbitMQ Received :: Next order received at Sun Mar 24 23:51:42 IST 2019\n\
    2019-03-24 - RabbitMQ Message sent : Next order received at Sun Mar 24 23:51:43\
    \ IST\n```\n\n我们还可以通过 RabbitMQ 管理界面查看创建的交换机（见图 11-2）和队列（见图 11-3）。在浏览器中访问 `http://localhost:15672/#/`\
    \ 网址，如果提示输入用户名和密码，请输入默认值 `guest/guest`。\n\n![../images/454149_1_En_11_Chapter/454149_1_En_11_Fig3_HTML.jpg](img/454149_1_En_11_Fig3_HTML.jpg)\n\
    \n图 11-3\n\n显示队列的 RabbitMQ 管理控制台\n\n![../images/454149_1_En_11_Chapter/454149_1_En_11_Fig2_HTML.jpg](img/454149_1_En_11_Fig2_HTML.jpg)\n\
    \n图 11-2\n\n显示 orders_exchange 的 RabbitMQ 管理控制台\n\n## Apache Kafka\n\nApache Kafka\
    \ 是一个流行的流处理平台。它最初由 LinkedIn 开发，并捐赠给 Apache 软件基金会。Kafka 使用 Scala JVM 语言编写，旨在提供一个大规模可扩展的平台，用于处理数百万条持续生成的消息。在本节中，我们将探讨\
    \ Spring Boot Kafka 生产者和消费者应用程序的快速入门示例。\n\nKafka 有多种实际应用场景。我曾见过初创公司将 Kafka 用作消息代理，而非流处理器，每天处理\
    \ 5000 个订单项的消息量。这样做的原因是为了在所有需求中使用单一且一致的消息传递技术。尽管仅出于解决问题的目的，我们可以以不同方式利用 Kafka。然而，在这种负载下，我们无法充分发挥其潜力；在这种情况下，RabbitMQ\
    \ 可能更合适。作为一般使用建议，RabbitMQ 应用于微服务间通信，而 Kafka 更擅长后端消息处理。请考虑以下 Kafka 使用场景：\n\n* \
    \  电子商务行业中用于订单履约的订单后处理\n*   向最终用户发送通知\n*   日志和分析\n*   大规模系统中的任何错误处理或发送警报\n*  \
    \ 基于主题的 `发布/订阅` 的常规消息传递需求\n\n### Kafka 工具和构建脚本\n\n我们需要在机器上安装并启动 Kafka。请按照以下步骤操作：\n\
    \n1.  运行以下命令：\n\n    ```\n    > brew install kafka\n    > brew services start\
    \ kafka\n    ```\n\n    这将使用默认设置在后台启动 Zookeeper 和 Kafka。或者，我们可以使用以下命令手动启动代理：\n\
    \n    ```\n    > cd /usr/local/Cellar/kafka/2.1.1/\n    > ./zookeeper-server-start\
    \ ../libexec/config/zookeeper.properties\n    > ./kafka-server-start ../libexec/config/server.properties\n\
    \    ```\n\n2.  我们还可以通过基于控制台的实用程序，使用以下命令测试示例生产者和消费者：\n\n    ```\n    > ./kafka-console-producer\
    \ --broker-list localhost:9092 --topic test\n    >./kafka-console-consumer --bootstrap-server\
    \ localhost:9092 --topic test — from-beginning\n    ```\n\n    这些实用程序可用于从控制台向代理发送任何消息。相同的消息将打印在消费者实用程序的控制台上。\n\
    \n3.  在同一个应用程序的 `build.gradle` 文件中添加以下依赖项：\n\n    ```\n    compile('org.apache.kafka:kafka-streams')\n\
    \    compile('org.springframework.kafka:spring-kafka')\n    ```\n"
- fmt: '### Message Producer


    We will create a scheduled call to another method that keeps generating a new
    message but sends it to the Kafka broker this time (see Listing [11-6](#454149_1_En_11_Chapter.xhtml#PC14)).
    This example uses the port settings of Kafka and Zookeeper, which are set by default
    in Spring Boot. The default values for these properties are:


    *   `spring.cloud.stream.kafka.binder.brokers`: `localhost`

    *   `spring.cloud.stream.kafka.binder.defaultBrokerPort`: `9092`

    *   `spring.cloud.stream.kafka.binder.zkNodes`: `localhost`

    *   `spring.cloud.stream.kafka.binder.defaultZkPort`: `2181`


    ```

    package com.example.kafka;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.kafka.core.KafkaTemplate;

    import org.springframework.scheduling.annotation.Scheduled;

    import org.springframework.stereotype.Service;

    import java.util.Calendar;

    @Service

    @Slf4j

    public class KafkaProducer {

    private static final String TOPIC = "orders";

    @Autowired

    private KafkaTemplate kafkaTemplate;

    @Scheduled(fixedRate = 1000)

    public void sendMessage() {

    String message = "Next order received at " +

    Calendar.getInstance().getTime();

    log.info("Kafka Message sent : {}", message);

    kafkaTemplate.send(TOPIC, message);

    }

    }

    Listing 11-6

    KafkaProducer Class

    ```


    Notes:


    *   `KafkaTemplate<Key, Value>` is the convenience class from Spring Boot that
    performs all operations to Kafka, just like `RabbitTemplate`.

    *   We sent messages to the `orders` topic without creating that topic, as `KafkaTemplate`
    is going to create this topic on its own.


    ### Message Consumer


    Just like with the RabbitMQ consumer in the previous section, we have a small
    bit of code in Listing [11-7](#454149_1_En_11_Chapter.xhtml#PC15) that keeps printing
    the messages received in a log file.


    ```

    package com.example.kafka;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.kafka.annotation.KafkaListener;

    import org.springframework.stereotype.Service;

    import java.io.IOException;

    @Service

    @Slf4j

    public class KafkaConsumer {

    @KafkaListener(topics = "orders", groupId = "order_grp")

    public void consume(String message) throws IOException {

    log.info("Kafka Received :: {}", message);

    }

    }

    Listing 11-7

    Kafka Consumer

    ```


    Notes:


    *   The `@KafkaListener` annotation will activate the `consume()` method to listen
    to all messages received on the `orders` topic.

    *   The `groupId` attribute denotes the name for the consumer group. This way,
    multiple receives can be configured to receive the same message in different groups
    for different processing needs.


    ### Running the Application Again


    Run the application:'
