    ## Spring 转换器服务


    Spring 框架提供了一个有趣的服务，可以帮助你将自定义类视为实体字段。该服务将管理其从数据库特定数据类型到基于 Java 的类型的来回转换。请参考清单
    4-12 中的示例，了解如何在 `User` 类中使用它。


    ```

    package com.example.eshop.model.type;

    import lombok.Data;

    import java.io.Serializable;

    @Data

    public class CustomerAddress implements Serializable {

    private String streetAddress;

    private String city;

    private String country;

    }

    Listing 4-12

    CustomerAddress 类型

    ```


    清单 4-12 定义了一个新类，它应被视为我们实体模型的一个复合对象数据类型。JDBC 驱动程序可以处理原生数据类型，但自定义类不能作为数据类型映射到对象字段。通过使用
    Spring 转换器服务，我们可以定义 Spring 框架如何将对象字段转换/序列化为单个数据元素。此外，我们还可以定义它们应如何分解并映射到字段对象。例如，我们将
    `CustomerAddress` 对象字段转换为逗号分隔的字符串，然后再转换回来（参见清单 4-13）。


    ```

    package com.example.eshop.converter;

    import com.example.eshop.model.type.CustomerAddress;

    import javax.persistence.AttributeConverter;

    public class CustomerAddressConverter implements

    AttributeConverter {

    @Override

    public String convertToDatabaseColumn(CustomerAddress customerAddress) {

    if(customerAddress == null)

    return "";

    return  customerAddress.getStreetAddress() + ", " +

    customerAddress.getCity() + ", " +

    customerAddress.getCountry();

    }

    @Override

    public CustomerAddress convertToEntityAttribute(String value) {

    CustomerAddress customerAddress = null;

    if(value != null && value.contains(",")) {

    String[] tokens = value.split(",");

    customerAddress = new CustomerAddress();

    customerAddress.setStreetAddress(tokens[0]);

    customerAddress.setCity(tokens[1]);

    customerAddress.setCountry(tokens[2]);

    }

    return customerAddress;

    }

    }

    Listing 4-13

    类型转换器

    ```


    `convertToDatabaseColumn` 方法将对象转换为字符串，而 `convertToEntityAttribute` 方法则执行相反的操作。让我们看看如何在清单
    4-14 中使用这个类。


    ```

    package com.example.eshop.model.orders;

    import java.io.Serializable;

    import java.time.LocalDateTime;

    import java.util.List;

    import java.util.Set;

    import javax.persistence.*;

    import com.example.eshop.converter.CustomerAddressConverter;

    import com.example.eshop.model.type.CustomerAddress;

    import com.fasterxml.jackson.annotation.JsonIgnore;

    import lombok.*;

    @Data

    @Entity

    @ToString(exclude = {"orders"})

    @EqualsAndHashCode(exclude = {"orders"})

    public class Customer implements Serializable {

    @Id

    @GeneratedValue(strategy=GenerationType.IDENTITY)

    private Long customerId;

    private String name, email, password;

    private LocalDateTime dateAdded;

    @Column

    @Convert(converter = CustomerAddressConverter.class)

    CustomerAddress customerAddress;

    @JsonIgnore

    @OneToMany(fetch = FetchType.LAZY)

    @JoinColumn(name = "customerId")

    Set orders;

    }

    Listing 4-14

    客户实体变更

    ```


    请注意，在这段代码中，我们添加了一个新字段，并用 `@Convert` 注解标记了它。


    ```

    @Column

    @Convert(converter = CustomerAddressConverter.class)

    CustomerAddress customerAddress;

    ```


    在保存和获取客户实体时，Spring Data JPA 将隐式地执行这种来回转换。


    ## 重要的 JPA 概念


    在结束对 Spring Data JPA 常见用例和解决方案的回顾之前，让我们快速总结一些有助于加深对 JPA 内部机制理解的概念。


    ### JPA 托管实体及其生命周期


    托管实体对象是实体类（可持久化的用户定义类）的内存实例，可以表示数据库中的物理对象。我们不会深入探讨 JPA 标准规范的细节，但让我们回顾一下托管对象的生命周期，如图
    4-1 所示，然后继续我们的示例。


    ![../images/454149_1_En_4_Chapter/454149_1_En_4_Fig1_HTML.png](img/454149_1_En_4_Fig1_HTML.png)


    图 4-1


    JPA 实体对象生命周期


    当实体对象最初创建时，其状态为 `New`。当实体对象被持久化到数据库时，它变为 `Managed` 状态。当 `Managed` 对象被修改时，其更改会被所属的
    `EntityManager`（由 Spring 管理）检测到。更改会在 `commit` 事务时传播到数据库。当对象被检索并标记为删除时，它会被标记为 `REMOVED`
    状态。任何预先加载到内存中的关联对象也会被标记为删除。最后一个状态称为 `DETACHED`，当 `EntityManager` 关闭时进入该状态。


    JPA 规范中还提供了回调方法，允许用户在对象进入相应状态之前执行操作。这些方法使用以下注解进行标注：


    *   `@PrePersist/@PostPersist`


    *   `@PreRemove/@PostRemove`


    *   `@PreUpdate/@PostUpdate`


    *   `@PostLoad`


    用例：


    *   这些方法的一个典型用例是记录或标记时间戳以进行审计。


    *   另一个用例可能是在更新任何对象时触发任何其他功能。


    ### 隔离级别、锁定和性能


    隔离级别对于决定事务策略、锁定行为以及在高并发或高读写率的事务型应用程序中给定的数据库性能至关重要。


    让我们快速回顾一下事务中与数据读取相关的行为。

    '
- fmt: '### Data Read Phenomena


    - **Dirty read:** You’re permitted to read uncommitted or dirty data. Dirty reads
    occur when one transaction `T1` is changing the record, and the other transaction
    `T2` can read this record before the first transaction has been committed or rolled
    back. There is a possibility that transaction `T1` has read some data that which
    may not exist anymore because transaction `T2` has rolled back. Data integrity
    is compromised, foreign keys are violated, and unique constraints are ignored.


    - **Nonrepeatable read:** This simply means data read in course of a transaction
    is not always repeatable within the same transaction, if read again. If you read
    a row at time `T1` and try to reread that same row at time `T2`, the row may have
    changed within the same transaction by some other transaction. The same rows may
    have disappeared or updated.


    - **Phantom read:** This means that if you execute a query at time `T1` and re-execute
    it at time `T2`, additional rows may have been added to the database, which may
    affect your results. This differs from a nonrepeatable read, where in a phantom
    read, data you have already read has not been changed. Instead, more data might
    possibly satisfy your query criteria than before.


    ### Isolation Levels


    Data isolation levels help ensure the right balance between database performance
    and maintaining ACID properties while updating data in the database. The higher
    the isolation level, the lower the performance. Based on these behaviors, the
    SQL standard defines four isolation levels:


    `READ_UNCOMITTED`


    - Read variations: Dirty reads, non-repeatable reads, phantom reads

    - Performance: Highest even in highly concurrent environment

    - Locking: None

    - Supported by: MYSQL (InnoDB), MSSQL


    `READ_COMMITTED`


    - Read variations: Non-repeatable reads, phantom reads

    - Performance: Good even in a highly concurrent environment

    - Locking: Shared locks are acquired only for selects or concerned rows

    - Supported by: MYSQL (Innodb), MSSQL (default), ORACLE (default), POSTGRESQL
    (default)


    `REPEATABLE READ`


    - Read variations: Phantom reads

    - Performance: Slower, in highly concurrent environment

    - Locking: Shared locks are acquired on selected rows; if transaction retries,
    new changes (any new rows inserted) will be visible

    - Supported by: MYSQL (Innodb - default), MSSQL, POSTGRESQL


    `SERIALIZABLE`


    - Read variations: Phantom reads

    - Performance: Slowest, in highly concurrent environment

    - Locking: Shared locks are acquired for whole table; even if transaction retries,
    new changes (any new rows inserted) will not be visible

    - Supported by: MYSQL (Innodb), MSSQL, ORACLE, POSTGRESQL


    There are two additional non-ANSI/SQL ISO standard isolation levels:


    - `READ-ONLY`: Supported by Oracle read-only transactions; we see only those changes
    that were committed at the time the transaction began. Does not allow `INSERT`,
    `UPDATE`, and `DELETE` statements.


    - `SNAPSHOT`: Similar to Serializable but internally this happens through versioning
    of data rows per transaction (optimistic concurrency model) and no locking happens.
    If new versions are found, the transaction is rolled back.


    With JPA, we can specify the isolation level through an `@Transactional` annotation
    (`@Transactional( isolation=Isolation.DEFAULT)`), which can help tune the concurrency
    control based on need.


    Table [4-1](#454149_1_En_4_Chapter.xhtml#Tab1) shows the possible values we can
    specify within the `@Transactional` annotation in Spring for quick reference.


    **Table 4-1** Tabular Comparison of Data Read Behavior


    | Isolation Level | Dirty Read | Nonrepeatable Read | Phantom Read |

    | --- | --- | --- | --- |

    | `Read_Uncommitted` | Possible | Possible | Possible |

    | `Read_Committed` | Not possible | Possible | Possible |

    | `Repeatable_Read` | Not possible | Not possible | Possible |

    | `Serializable` | Not possible | Not possible | Not possible |


    ### Interesting JPA Properties


    With the following properties, we can customize the logging behavior of Hibernate
    and Spring.


    - This is not from JPA; we are just showing this to simplify logging.

    - `logging.pattern.console=[%thread] %-5level %msg%n`

    - With this property, Hibernate will start generating statistics for all the SQL
    queries executed.

    - `spring.jpa.properties.hibernate.generate_statistics=true`

    - With this property, Hibernate will put comments in all generated SQL statements
    to hint at what the generated SQL is trying to do.

    - `spring.jpa.properties.hibernate.use_sql_comments=true`

    - This is used to print SQL in a formatted form.

    - `spring.jpa.properties.hibernate.format_sql=true`

    - This is used by Hibernate to log generated SQL queries in logs.

    - `spring.jpa.hibernate.show-sql=true`


    ### Running the Eshop Application for the JPA Properties


    After making these changes to the `application.yml` or `application.properties`
    file in the code for this chapter, we will see the following changes on the console:'
