- fmt: "This console output shows the inserted and then retrieved `Post` object, along\
    \ with the nested `Comment` objects.\n\n### Additional Features\n\nThe Spring\
    \ Framework also provides a helper class-based API (`MongoTemplate`) that allows\
    \ programmable interfaces to have better control than with Spring Data MongoDB.\n\
    \nIn our example case, we used the defaults for the MongoDB connection, but this\
    \ can be overridden using the `@Configuration` class. A few important features\
    \ supported by Spring Data API include:\n\n- Java-based query, criteria, and update\
    \ DSLs\n- QueryDSL integration to support type-safe queries\n- Geospatial integration\n\
    - Map-Reduce integration\n- JMX administration and monitoring\n\nThere is also\
    \ support for Reactive MongoDB access via the `ReactiveMongoTemplate` and the\
    \ Reactive MongoDB repositories. We discuss Reactive technologies in detail in\
    \ Chapter [8](#454149_1_En_8_Chapter.xhtml).\n\n## Summary\n\nWe explored the\
    \ basic API to get started with Spring Boot and Spring Data—MongoDB. Spring has\
    \ many projects and can interact with nearly all popular NoSQL databases, including\
    \ search technologies (Solr and ElasticSearch). The next chapter takes a deep\
    \ dive into microservices development.\n\n# 6. Deep Dive Into Microservices Development\
    \ with Java\n\nChapter [2](#454149_1_En_2_Chapter.xhtml) covered the benefits\
    \ of moving to a microservices architecture. In this chapter, we dive into creating\
    \ microservices with Spring Boot as the primary framework and highlight the challenges\
    \ of this architecture. We will also see the solutions with a mixed set of concepts\
    \ and libraries, all integrated with Spring Boot, but by building a number of\
    \ different applications.\n\nThe Spring Framework has an interesting project (called\
    \ *Spring Cloud*) that is targeted to solve issues with distributed applications\
    \ development, especially in cloud deployment environments. Microservices are\
    \ an example of a distributing application design with lots of coordination involved\
    \ in serving customer requests. Spring Cloud includes generalized APIs that can\
    \ help it do cloud-agnostic microservices development. The intent is to make development,\
    \ deployment, and operational management of cloud-based applications as easy as\
    \ managing local applications. Let’s take a deep dive into exploring challenges\
    \ of the microservices architecture and see how well the Java frameworks handle\
    \ them:\n\n- Interservice communication\n- Configuration management\n- Service\
    \ discovery\n- Resiliency\n- Request tracing\n- Microservices monitoring\n- Documentation\n\
    - Single point of entry via an API Gateway\n- Code sharing\n- Security\n\nWe will\
    \ explore the solutions to these challenges through an example use case based\
    \ on our `eshop` example application, which we have been building since Chapter\
    \ [3](#454149_1_En_3_Chapter.xhtml). We will be creating a couple of microservices\
    \ in this chapter:\n\n- `eshop`: This is the customer facing microservice and\
    \ includes the endpoints to purchase products.\n- `inventory-service`: Manages\
    \ inventory for different products.\n- `config-service`: Any secure configuration\
    \ can be stored for both `eshop` and inventory services.\n- `admin-service`: This\
    \ serves as the monitoring service for configured services.\n- `discovery-service`:\
    \ Common registry for services to register themselves and clients can discover\
    \ nodes hosting those services via their names.\n- `zuul-service`: Acts as the\
    \ gateway service by acting as the single access point to all requests to the\
    \ other applications.\n\nJust to give a quick overview, we will be extending the\
    \ example we built in Chapter [4](#454149_1_En_4_Chapter.xhtml), Section [4.1](#454149_1_En_4_Chapter.xhtml#Sec1)\
    \ (“Multi-Datasource Interaction with Spring”) to demonstrate the use of frameworks\
    \ and libraries for these challenges. Functionally, we will programmatically create\
    \ a new customer, register a few new products, and perform a sample order generation\
    \ by this customer in the `eshop` service.\n\nBefore creating an order, `eshop`\
    \ will check product availability by calling another service (`inventory-service`).\
    \ In order to achieve this, the `eshop` service will use the `discovery-service`\
    \ (Eureka) registry to communicate with `inventory-service`. We will also see\
    \ the library options used to communicate with `discovery-service`, i.e., through\
    \ `Feign` and `Ribbon`.\n\nWe will then explore monitoring of `eshop` and `Inventory`\
    \ services through another service (called `admin-service`), which is built on\
    \ top of the Spring Boot Admin. At last, we will see the usage of `gateway-service`,\
    \ which is built on top of Netflix OSS Zuul.\n\nThe directory structure for the\
    \ services will look like this:\n\n```\n.\n└── spring-cloud-ch6\n├─ admin-service\n\
    ├─ config-service\n├─ discovery-service\n├─ eshop\n├─ gateway-service\n├─ inventory-service\n\
    ```\n\n## Interservice Communication\n\nIn a monolith application, all the components\
    \ of an application invoke each other directly through language constructs or\
    \ functions. In a distributed system, which is the case with the microservices\
    \ architecture, one of the problems to solve is about inter-process communication.\
    \ This is one of the issues that boosted the use of ESBs (Enterprise Service Busses)\
    \ in the last decade. However, there is still one big difference with the microservices\
    \ architecture. We have multiple services involved in serving a single request\
    \ with microservices, which does not happen normally with a single application.\n\
    \nThe problem becomes more complicated when a small number of large monolithic\
    \ applications turns into many more smaller microservices. Consider an example\
    \ in which a travel agency system involving a customer-facing website, analytics\
    \ application, and an internal application for inventory management turns into\
    \ 20 or more smaller microservices serving the same purpose. With lots of small\
    \ services collaborating in order to fulfill a single user request, there are\
    \ many barriers to communicating quickly and reliably. We will explore a few techniques\
    \ of interprocess communication that are still valid for inter-microservice communication:\n\
    \n- Synchronous\n  - Involves calling an HTTP-based API. The caller waits for\
    \ a response.\n  - This is also referred to as a request/return-based communication.\n\
    - Asynchronous\n  - Typically involves messaging protocols like AMQP. The caller\
    \ does not wait for the response.\n  - This can also happen via a shared database\
    \ state with split stages in a workflow.\n  - Typically involves messaging between\
    \ services with a single receiver (one-to-one; queue based) or multiple ones (one-to-many;\
    \ topic based) for message processing.\n  - This can also happen in a fire/forget\
    \ style over HTTP only.\n\nMicroservices are small code pieces that are precisely\
    \ feature focused and developers prefer to have a direct point-to-point synchronous\
    \ communication within services. Consider an ecommerce system for example. Creating\
    \ an order for a product should happen synchronously and post-order processing\
    \ can happen asynchronously with notifications going out to the customer upon\
    \ each order processing event update. Typically, this causes a number of other\
    \ problems, which we mentioned at the start of this chapter. In this chapter,\
    \ we look at solutions through synchronous mechanisms only.\n\n## Configuration\
    \ Management"
