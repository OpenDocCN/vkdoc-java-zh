    create issues in handling nulls.


    *   The `user` entity is surrounded by quotes in its definition, such as ``@Table(name
    = "`user`")``. This is needed, as `user` is a keyword in PostgreSQL. The same
    character is used in the `schema.sql` file.


    *   We defined the `@OneToMany` annotation in the `Blog` and `User` objects. There
    are a couple of conventions to follow when defining this relationship. Consider
    the `User -> Post` object as an example here:


    *   As per best practice from the Hibernate docs, always define associations as
    `Lazy` first.


    *   As per best practice from the Hibernate docs, define bidirectional associations,
    as the navigation is easier on both sides. However, they are bit harder to define
    and keep in sync. As an example, while adding a new `POST`, both entities (`POST`
    and `Blog`) will require a refresh to keep the objects in memory in sync.


    *   The parent object (`User`) has an attribute set to `mappedBy=user` that maps
    the `user` field in the child object, which is `POST` here. This is required only
    when the relationship is bidirectional.


    *   `CascadeType.ALL` will trigger all cascade events when the parent entity is
    deleted or updated to the child objects in memory. For example, when a user is
    deleted, all related `POST` rows become orphans. `orphanRemoval=true` further
    removes those related rows from the database.


    *   On the opposite side, child or `POST` entities have to be annotated with `Cascade.REFRESH`
    so that just the parent object is refreshed when any child object is deleted or
    updated.


    *   We have ignored lazily loaded fields through `@ToString` and `@EqualsAndHashCode`
    for Lombok. This will ignore relationship fields in the generated code for the
    `toString()`, `equals()`, and `hashCode()` methods.


    *   `@JsonIgnore` is used on top of the related fields to ignore them during serialization
    and deserialization.


