    \ and `artifactId` onscreen. Set up and run the main class from any IDE and access\
    \ the URL as `http://localhost:8080/library/hello`.\n\nAlternatively, the CURL\
    \ command is:\n\n```\ncurl -X GET http://localhost:8080/library/hello\n```\n\n\
    This is the output:\n\n```\nHello World\n```\n\nThe `CommandLineRunner` interface\
    \ doesn’t have to be implemented; the application can run directly within the\
    \ `main` method , as `SpringApplication.run(Application.class, args)`. This interface\
    \ is used in case you want to run or trigger more code after the embedded container\
    \ starts. In Spring Boot, most things are configured by convention.\n\nSpring\
    \ Boot loads the configuration by default from `application.properties` or `application.yml`\
    \ in the classpath.\n\nThe `@Sl4j` annotation is from the open source project\
    \ Lombok. This annotation generates a final static log, an Sl4j-based field in\
    \ the compiled class.\n\nConsider these two special comments about why the Spring\
    \ Framework is used in this book:\n\n*   With a huge community and years of hard\
    \ work, the Spring Framework very consistently supports hundreds of libraries\
    \ and frameworks. This is quite challenging.\n\n*   The speed of upgrades and\
    \ speed of adapting to any trending technologies is very good with the community.\n\
    \nTo be specific, if you want the most controlled, optimal dev setup, Dropwizard\
    \ should be your first choice; otherwise, Spring is the preferred choice.\n\n\
    ## Summary\n\nWe have just seen three popular frameworks to start with. From now\
    \ on, we will see most of examples using the Spring Framework, as it offers the\
    \ most comprehensive solutions for various needs of any enterprise system. We\
    \ can create a microservice from a bigger macroservice or from a monolithic application\
    \ using Spring Boot.\n\n# 3. Basic Persistence with Spring\n\nThe intent of this\
    \ chapter is to explain easy and convenient Java persistence with optimal choices\
    \ for performance. We will recap the various options and show examples of important\
    \ use cases. Persistence, in my opinion, is the most important layer in any application.\n\
    \nStarting with ORM frameworks, we have seen a lot of love and hate for ORMs in\
    \ the past decade, yet they are still heavily used by the community. ORMs provide\
    \ a lot of choices in the Java ecosystem for database interaction. Let’s start\
    \ by discussing the first popular choice—Spring Data JPA—and take a quick recap\
    \ of Hibernate.\n\nSpring Data JPA is a very useful DSL (Domain Specific Language)\
    \ based module that provides maximum reduction to boilerplate code for interacting\
    \ with databases. Using Spring Data on top of JPA/Hibernate provides a consistent\
    \ API for interacting with relational and NoSQL databases. There are three important\
    \ steps we need to follow while developing applications with Spring Data JPA:\n\
    \n1.  Define the domain models or entities. When starting a new project, you need\
    \ to decide whether entities should be defined first or should be generated later\
    \ from the database. The best way I see to design with JPA is to have a SQL definition\
    \ of your database initially and then create the table-by-table model classes\
    \ after that. Even if this involves two steps, this might be more useful than\
    \ generating Java models from DB tables. SQL scripts need not have all their constraints\
    \ defined initially. Based on the first application run, relationships (foreign\
    \ keys) will be updated in the database automatically by JPA.\n\n2.  Define the\
    \ repositories with any necessary customization. Customization can be done when\
    \ you know your access patterns; otherwise, this is mostly done on an incremental\
    \ need basis.\n\n3.  Use these models and repositories along with optimizing the\
    \ queries and/or convert to native whenever required. Based on the performance\
    \ requirements, native queries can also be utilized.\n\nBy the end of this chapter,\
    \ you should have good understanding of the following Spring Data JPA concepts:\n\
    \n*   Basic entity definitions with:\n    *   `@OneToOne`\n\n    *   `@OneToMany`\n\
    \n    *   `@ManoToOne`\n\n    *   `@ManyToMany` and lazy loading\n\n    *   Usage\
    \ of `Cascade.ALL` and when to avoid it\n\n    *   Usage of Lombok’s `@ToString`\
    \ and `@EqualsAndHashCode`\n\n    *   Usage of Jackson’s `@JsonIgnore`\n\n*  \
    \ PostgreSQL with JPA, especially when:\n    *   Using enums\n\n    *   Using\
    \ UUID\n\n    *   Fetching, storing, and querying arrays\n\n*   Basic usage:\n\
    \    *   JPA query example with pagination\n\n    *   The usage and advantages\
    \ of a common base repository"
  trans: "\n### Spring Boot\n\n*Spring 框架*是 Java 在企业级开发中取得成功的重要原因之一。该框架广泛支持 Java Web\
    \ 开发中几乎所有流行的库和框架。借助 Spring Boot，我们可以在几分钟内快速创建可独立运行的微服务。过去，我们不得不在应用程序中花费大量开发时间，仅用于编写连接\
    \ Spring 基础设施组件的样板代码。而现在，大多数通用配置都已为我们预先设置好。\n\n以下是 Spring Boot 的几个亮点：\n\n*   它同样包含一个精选的库列表，就像\
    \ Dropwizard 一样，但这些库大多是预先配置好的。\n\n*   它可以轻松快速地启动和运行。\n\n*   覆盖配置、库和框架非常灵活。\n\n\
    *   拥有非常强大的社区，可以为可能出现的各种问题提供解决方案。\n\n让我们来看一个示例 Hello World 应用程序以及我们用例的基础类。这个类将作为我们示例\
    \ Web 应用程序的起点。如果你想更改或覆盖任何内容，可以选择使用属性文件、YAML 文件或基于 Java 的配置。\n\n要使用 Spring Boot\
    \ 启动一个新应用程序，我们将实现一个名为`CommandLineRunner`的接口。这将使我们能够在 Web 容器启动后立即开始运行一些示例用例。换句话说，这个类帮助我们引导应用程序。\n\
    \n让我们定义我们的`Application`类。这个微小的单一类既作为 Spring Boot 应用程序的起点，也作为 RESTful 端点（参见清单 2-8）。\n\
    \n```\npackage com.example.hello;\nimport lombok.extern.slf4j.Slf4j;\nimport org.springframework.boot.CommandLineRunner;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.web.bind.annotation.GetMapping;\nimport org.springframework.web.bind.annotation.RestController;\n\
    @SpringBootApplication\n@RestController\n@Slf4j\npublic class HelloApplication\
    \ implements CommandLineRunner {\npublic static void main(String[] args) {\nSpringApplication.run(HelloApplication.class,\
    \ args);\n}\n@Override\npublic void run(String... args) throws Exception {\nlog.info(\"\
    App started\");\n}\n@GetMapping(\"/hello\")\npublic String hello() {\nreturn \"\
    Hello World\";\n}\n}\n清单 2-8\nApplication 类\n```\n\n以下是`application.properties`文件：\n\
    \n```\nserver.servlet.context-path=/library\n```\n\n我们还需要向`{rootSrcPath}/main/resources/application.properties`文件添加一个属性，如上所示。通过这个属性，我们设置了应用程序的上下文路径。有许多这样的属性可以进行自定义。我们不会讨论所有属性，我建议你从\
    \ Spring 文档中阅读基础知识。\n\nSpring 框架社区提供了一个额外的便利设施，这样初始项目设置就不必手动完成了。[`http://www.start.spring.io`](http://www.start.spring.io)网站为你提供了快速、可立即启动的初始设置，并列出了所有\
    \ Spring 依赖项。\n\n只需下载一个快速应用程序，并在屏幕上提供`groupId`和`artifactId`。在任何 IDE 中设置并运行主类，然后访问\
    \ URL `http://localhost:8080/library/hello`。\n\n或者，CURL 命令是：\n\n```\ncurl -X GET\
    \ http://localhost:8080/library/hello\n```\n\n这是输出结果：\n\n```\nHello World\n```\n\
    \n`CommandLineRunner`接口并非必须实现；应用程序可以直接在`main`方法中运行，如`SpringApplication.run(Application.class,\
    \ args)`。如果你希望在嵌入式容器启动后运行或触发更多代码，则使用此接口。在 Spring Boot 中，大多数事情都是按约定配置的。\n\nSpring\
    \ Boot 默认从类路径下的`application.properties`或`application.yml`加载配置。\n\n`@Sl4j`注解来自开源项目\
    \ Lombok。此注解会在编译后的类中生成一个基于 Sl4j 的最终静态日志字段。\n\n关于本书为何使用 Spring 框架，请考虑以下两点特别说明：\n\
    \n*   凭借庞大的社区和多年的辛勤工作，Spring 框架非常一致地支持着数百个库和框架。这相当具有挑战性。\n\n*   社区在升级速度和适应任何流行技术方面的速度都非常出色。\n\
    \n具体来说，如果你想要最可控、最优化的开发设置，Dropwizard 应该是你的首选；否则，Spring 是首选。\n\n## 总结\n\n我们刚刚了解了三个流行的入门框架。从现在开始，我们将看到大多数示例都使用\
    \ Spring 框架，因为它为任何企业系统的各种需求提供了最全面的解决方案。我们可以使用 Spring Boot 从一个更大的宏观服务或单体应用中创建微服务。\n\
    \n# 3. 使用 Spring 进行基本持久化\n\n本章旨在解释如何以最佳性能选择实现简单便捷的 Java 持久化。我们将回顾各种选项，并展示重要用例的示例。在我看来，持久化是任何应用程序中最重要的层。\n\
    \n从 ORM 框架开始，在过去十年中，我们看到人们对 ORM 既有喜爱也有厌恶，但它们仍然被社区大量使用。ORM 在 Java 生态系统中为数据库交互提供了许多选择。让我们从讨论第一个流行的选择——Spring\
    \ Data JPA 开始，并快速回顾一下 Hibernate。\n\nSpring Data JPA 是一个非常有用的基于 DSL（领域特定语言）的模块，它最大限度地减少了与数据库交互的样板代码。在\
    \ JPA/Hibernate 之上使用 Spring Data，为与关系型和 NoSQL 数据库交互提供了一致的 API。在使用 Spring Data\
    \ JPA 开发应用程序时，我们需要遵循三个重要步骤：\n\n1.  定义领域模型或实体。在开始一个新项目时，你需要决定是先定义实体，还是稍后从数据库生成实体。我认为使用\
    \ JPA 进行设计的最佳方式是先拥有数据库的 SQL 定义，然后逐表创建模型类。即使这涉及两个步骤，也可能比从数据库表生成 Java 模型更有用。SQL\
    \ 脚本最初不需要定义所有约束。基于应用程序的首次运行，JPA 会自动在数据库中更新关系（外键）。\n\n2.  定义仓库并进行任何必要的自定义。当你了解访问模式时可以进行自定义；否则，这通常是在增量需求的基础上进行的。\n\
    \n3.  使用这些模型和仓库，同时优化查询和/或在需要时转换为原生查询。根据性能要求，也可以使用原生查询。\n\n到本章结束时，你应该对以下 Spring\
    \ Data JPA 概念有很好的理解：\n\n*   基本实体定义，包括：\n    *   `@OneToOne`\n\n    *   `@OneToMany`\n\
    \n    *   `@ManoToOne`\n\n    *   `@ManyToMany` 和懒加载\n\n    *   `Cascade.ALL`\
    \ 的使用及何时避免使用\n\n    *   Lombok 的 `@ToString` 和 `@EqualsAndHashCode` 的使用\n\n  \
    \  *   Jackson 的 `@JsonIgnore` 的使用\n\n*   使用 JPA 的 PostgreSQL，特别是当：\n    *   使用枚举时\n\
    \n    *   使用 UUID 时\n\n    *   获取、存储和查询数组时\n\n*   基本用法：\n    *   带分页的 JPA 查询示例\n\
    \n    *   通用基础仓库的用法和优势\n"
- fmt: "# Spring Data JPA Introduction\n\nSpring Data is an umbrella project that\
    \ simplifies Java persistence through a very lean and consistent API that works\
    \ on top of JDBC, JPA, and other NoSQL product APIs. Spring Data JPA is a subset\
    \ of Spring Data and drastically reduces the effort needed to do CRUD operations.\
    \ For a simple application, the major effort now goes into defining the models\
    \ because no lengthy boilerplate DAOs have to be written. Let’s recap the problems\
    \ we had in using ORMs and how Spring Data JPA helps:\n\n- Prior to Spring Data\
    \ JPA, we had to implement the DAO layer by writing lot of generic boilerplate\
    \ code to handle common `select` and `update` operations. Now, merely using its\
    \ DSL, the interface method definitions are enough.\n- No need for the `EntityManager`\
    \ API anymore, although you can still autowire it anytime.\n- Same consistent\
    \ API for RDBMS and NoSQLs.\n- Readability and ease of use increases as less code\
    \ has to be written. The same factor makes it more reliable as well as less error-prone.\n\
    - With continuous improvements by the community, Spring Data now offers pure JDBC\
    \ and a mapper-based solution.\n- Keeping the core API the same allows integration\
    \ with MyBatis, QueryDSL, JOOQ, and other JDBC libraries along with customization\
    \ support. As an architect, I have always found a conceptual difference while\
    \ developing with ORMs versus JDBC solutions:\n    - ORMs are based on the object\
    \ per table pattern and thus there is a lot of thinking required to query in that\
    \ form and fulfill requests in a normalized database.\n    - JDBC solutions give\
    \ you the simplicity and flexibility to create SQL queries by combining any random\
    \ tables through joins and simply map the results back to any POJO class. The\
    \ only time the object per query method works here is when the database is denormalized\
    \ using flat tables.\n\nThere are three interfaces in Spring Data API on the top:\n\
    \n- `CrudRepository`\n- `PagingAndSortingRepository`, which extends `CrudRepository`\n\
    - `JpaRepository`, which extends `PagingAndSortingRepository`\n\nAll these three\
    \ interfaces work with JPA entities only. `CrudRepository` mainly provides basic\
    \ CRUD functions. `PagingAndSortingRepository` provides methods to do pagination\
    \ and sort records. `JpaRepository` provides JPA-related methods, such as flushing\
    \ the persistence context and deleting records in a batch. Listing [3-1](#454149_1_En_3_Chapter.xhtml#PC1)\
    \ shows the source code for `CrudRepository`.\n\n```\npackage org.springframework.data.repository;\n\
    import java.util.Optional;\n@NoRepositoryBean\npublic interface CrudRepository\
    \ extends Repository {\nS save(S entity);\nIterable saveAll(Iterable entities);\n\
    Optional findById(ID id);\nboolean existsById(ID id);\nIterable findAll();\nIterable\
    \ findAllById(Iterable ids);\nlong count();\nvoid deleteById(ID id);\nvoid delete(T\
    \ entity);\nvoid deleteAll(Iterable entities);\nvoid deleteAll();\n}\n@NoRepositoryBean\n\
    public interface PagingAndSortingRepository extends\nCrudRepository {\nIterable\
    \ findAll(Sort sort);\nPage findAll(Pageable pageable);\n}\n@NoRepositoryBean\n\
    public interface JpaRepository extends PagingAndSortingRepository, QueryByExampleExecutor\
    \ {\nList findAll();\nList findAll(Sort var1);\nList findAllById(Iterable var1);\n\
    List saveAll(Iterable var1);\nvoid flush();\nS saveAndFlush(S var1);\nvoid deleteInBatch(Iterable\
    \ var1);\nvoid deleteAllInBatch();\nT getOne(ID var1);\nList findAll(Example var1);\n\
    List findAll(Example var1, Sort var2);\n}\nListing 3-1\nRepository Definition\n\
    ```\n\nThe beauty of the Spring Data JPA lies in the way it derives queries from\
    \ the tables by just defining the repository method names. This capability comes\
    \ from the Spring Data Query DSL. Consider this example of a sample `UserRepository`\
    \ interface:\n\n```\n@Repository\npublic interface UserRepository extends CrudRepository\
    \ {\nvoid deleteByUsername(String username);\nOptional findByUsername(String username);\n\
    @Query(\"select u from User u\")\nStream streamAll();\n}\n```\n\nAll `findBy{fieldName}`,\
    \ `deleteBy*` methods will get their implementation by the framework itself. Java\
    \ 8 `Optional` and `Stream` are also supported.\n\n## Spring Data JPA Example\n\
    \nIt’s often said that ORM/JPA and Hibernate are hard for newcomers. To see what\
    \ all is involved with the most common cases, we will create a blog application\
    \ in this chapter, taking PostgreSQL as the database. In recent years, PostgreSQL\
    \ has become the default choice because of its many recent innovations and upgrades\
    \ by the community.\n\n### The `@OneToMany` and `@ManyToOne` Annotations\n\nWe\
    \ will start by creating an example application that covers the first two points\
    \ from the previous list. The code structure for this applications will be as\
    \ follows:\n\n```\n.\n├── build.gradle\n└── src\n├── main\n│   ├── java\n│   │\
    \   └── com\n│   │       └── example\n│   │           └── blog_app\n│   │    \
    \           ├── BlogJpaApp.java\n│   │               ├── constants\n│   │    \
    \           │   ├── PgArrayType.java\n│   │               │   └── PgEnumType.java\n\
    │   │               ├── helper\n│   │               │   └── DataGenerator.java\n\
    │   │               ├── model\n│   │               │   └── jpa\n│   │        \
    \       │       ├── Address.java\n│   │               │       ├── Blog.java\n\
    │   │               │       ├── Comment.java\n│   │               │       ├──\
    \ CommentLike.java\n│   │               │       ├── File.java\n│   │         \
    \      │       ├── Post.java\n│   │               │       ├── PostFileJoinTable.java\n\
    │   │               │       ├── PostStatus.java\n│   │               │       └──\
    \ User.java\n│   │               ├── repository\n│   │               │   ├── BlogRepository.java\n\
    │   │               │   ├── CommentRepository.java\n│   │               │   ├──\
    \ FileRepository.java\n│   │               │   ├── PostRepository.java\n│   │\
    \               │   ├── UserRepository.java\n│   │               │   └── base\n\
    │   │               │       ├── BaseRepository.java\n│   │               │   \
    \    └── BaseRepositoryImpl.java\n│   │               ├── service\n│   │     \
    \          │   └── UserCRUDService.java\n│   │               └── web\n│   │  \
    \                 └── IndexController.java\n│   ├── resources\n│   │   ├── application.yml\n\
    │   │   └── schema.sql\n│   └── scripts\n└── test\n├── java\n│   └── com\n│  \
    \     └── example\n│           └── blog_app\n│               ├── BlogJpaAppTests.java\n\
    │               └── BlogTestBase.java\n└── resources\n└── application-test.yml\n\
    ```\n\n#### Creating the Blog App\n\nFirst, go to [`start.spring.io`](https://start.spring.io)\
    \ or create a new Gradle app called `blog-app-jpa-ch3` with the `groupId` set\
    \ to `com.example` and the `artifactId` set to `blog-app`.\n\nIf you switch to\
    \ the full version at `start.spring.io`, nearly all the Spring libraries and frameworks\
    \ are shown. Select Web, Lombok, JPA, JDBC, and PostgreSQL, and then generate\
    \ a project."
