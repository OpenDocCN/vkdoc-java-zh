    ## Spring Data JDBC


    The idea here is to provide the same consistent and simple Spring repository-based
    persistence, but with JDBC and not JPA. Further, no custom DAO implementations
    are needed, as with JDBCTemplate. The same interface-based extensions of `CrudRepository`
    and `PagingAndSortingRepository` can be utilized. The Optional and Stream APIs
    are supported in return types as well. Spring Data JDBC also provides asynchronous
    querying through the Spring `@Async` annotation . Note that the async queries
    are different from the Reactive ones, which is also discussed in Chapter [8](#454149_1_En_8_Chapter.xhtml).


    Additionally, the Spring data DSL-based query generation is available, which means
    Spring will provide dynamic implementations of method names, matching its DSL.
    As an example, `findByFirstName(String firstName)` will be converted to `Select
    * from TABLE where first_name= :firstName)`.


