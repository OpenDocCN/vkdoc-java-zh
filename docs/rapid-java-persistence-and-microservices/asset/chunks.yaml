    GraphiQL 上下文帮助示例


    还可以通过此 UI 查看完整的模式，只需点击右侧的“文档”链接即可。这将显示导航侧边栏，展示模式详细信息以及描述任何字段用途的任何注释（参见图 7-5）。


    ![../images/454149_1_En_7_Chapter/454149_1_En_7_Fig5_HTML.jpg](img/454149_1_En_7_Fig5_HTML.jpg)


    图 7-5.


    GraphiQL 文档示例


    如果我们有一个已弃用的字段，比如 `Author` 对象中的 `age`，我们需要按如下方式更新模式：


    ```

    type Author {

    id: ID!

    name: String!

    age: Int @deprecated(reason: "Field is deprecated!")

    posts: [Post]!

    status: Status!

    }

    ```


    这将反映在 GraphiQL 屏幕上，如图 7-6 所示。


    ![../images/454149_1_En_7_Chapter/454149_1_En_7_Fig6_HTML.jpg](img/454149_1_En_7_Fig6_HTML.jpg)


    图 7-6.


    GraphiQL


    至此，我们探索基本概念和 Spring Boot 入门点的示例就结束了。让我们也看看一些可能有助于探索 GraphQL Java API 的项目：


    *   GraphQL SPQR ( [`https://github.com/leangen/GraphQL-SPQR`](https://github.com/leangen/GraphQL-SPQR)
    ) 有助于使用代码优先的方法编写 GraphQL。

    *   GraphQL JPA ( [`https://github.com/jcrygier/graphql-jpa`](https://github.com/jcrygier/graphql-jpa)
    ) 可用于仅从 JPA 实体使用代码优先的方法自动生成完整的 CRUD 应用程序。

    *   GraphQL Java DateTime ( [`https://github.com/donbeave/graphql-java-datetime`](https://github.com/donbeave/graphql-java-datetime)
    ) 是另一个项目，有助于将 GraphQL 日期时间数据类型映射到 Java LocalDateTime 和其他 `java.time` 类型。


    ## 总结


    本章概述了一个使用 GraphQL Java 库的示例，以帮助您入门。我建议您探索更多这些示例，因为这是一个不断扩展的概念领域。下一章将探讨 Java 中的另一个主要范式，它使
    HTTP 通信更快并提高了可伸缩性——响应式框架。

