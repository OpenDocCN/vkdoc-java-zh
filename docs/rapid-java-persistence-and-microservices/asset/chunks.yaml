    \ start by creating an example application that covers the first two points from\
    \ the previous list. The code structure for this applications will be as follows:\n\
    \n```\n.\n├── build.gradle\n└── src\n├── main\n│   ├── java\n│   │   └── com\n\
    │   │       └── example\n│   │           └── blog_app\n│   │               ├──\
    \ BlogJpaApp.java\n│   │               ├── constants\n│   │               │  \
    \ ├── PgArrayType.java\n│   │               │   └── PgEnumType.java\n│   │   \
    \            ├── helper\n│   │               │   └── DataGenerator.java\n│   │\
    \               ├── model\n│   │               │   └── jpa\n│   │            \
    \   │       ├── Address.java\n│   │               │       ├── Blog.java\n│   │\
    \               │       ├── Comment.java\n│   │               │       ├── CommentLike.java\n\
    │   │               │       ├── File.java\n│   │               │       ├── Post.java\n\
    │   │               │       ├── PostFileJoinTable.java\n│   │               │\
    \       ├── PostStatus.java\n│   │               │       └── User.java\n│   │\
    \               ├── repository\n│   │               │   ├── BlogRepository.java\n\
    │   │               │   ├── CommentRepository.java\n│   │               │   ├──\
    \ FileRepository.java\n│   │               │   ├── PostRepository.java\n│   │\
    \               │   ├── UserRepository.java\n│   │               │   └── base\n\
    │   │               │       ├── BaseRepository.java\n│   │               │   \
    \    └── BaseRepositoryImpl.java\n│   │               ├── service\n│   │     \
    \          │   └── UserCRUDService.java\n│   │               └── web\n│   │  \
    \                 └── IndexController.java\n│   ├── resources\n│   │   ├── application.yml\n\
    │   │   └── schema.sql\n│   └── scripts\n└── test\n├── java\n│   └── com\n│  \
    \     └── example\n│           └── blog_app\n│               ├── BlogJpaAppTests.java\n\
    │               └── BlogTestBase.java\n└── resources\n└── application-test.yml\n\
    ```\n\n#### Creating the Blog App\n\nFirst, go to [`start.spring.io`](https://start.spring.io)\
    \ or create a new Gradle app called `blog-app-jpa-ch3` with the `groupId` set\
    \ to `com.example` and the `artifactId` set to `blog-app`.\n\nIf you switch to\
    \ the full version at `start.spring.io`, nearly all the Spring libraries and frameworks\
    \ are shown. Select Web, Lombok, JPA, JDBC, and PostgreSQL, and then generate\
    \ a project."
  trans: "\n## Spring Data JPA 简介\n\nSpring Data 是一个伞形项目，它通过一个非常精简且一致的 API 简化了 Java\
    \ 持久化操作，该 API 运行在 JDBC、JPA 和其他 NoSQL 产品 API 之上。Spring Data JPA 是 Spring Data 的一个子集，它极大地减少了执行\
    \ CRUD 操作所需的工作量。对于一个简单的应用程序来说，现在主要的工作集中在定义模型上，因为无需再编写冗长的样板 DAO 代码。让我们回顾一下使用 ORM\
    \ 时遇到的问题，以及 Spring Data JPA 如何提供帮助：\n\n*   在 Spring Data JPA 出现之前，我们必须通过编写大量通用的样板代码来实现\
    \ DAO 层，以处理常见的 `select` 和 `update` 操作。而现在，仅仅使用其 DSL，接口方法定义就足够了。\n\n*   不再需要 EntityManager\
    \ API，尽管你仍然可以随时自动注入它。\n\n*   为 RDBMS 和 NoSQL 提供了一致的 API。\n\n*   由于需要编写的代码更少，可读性和易用性得以提高。同样的因素也使其更可靠，且不易出错。\n\
    \n*   随着社区的持续改进，Spring Data 现在提供了纯 JDBC 和基于映射器的解决方案。\n\n*   保持核心 API 不变，允许与 MyBatis、QueryDSL、JOOQ\
    \ 以及其他 JDBC 库集成，并提供自定义支持。作为一名架构师，我始终发现使用 ORM 与 JDBC 解决方案进行开发时存在概念上的差异：\n    *\
    \   ORM 基于“每表一对象”模式，因此需要大量思考如何以该形式进行查询，并在规范化的数据库中满足请求。\n\n*   JDBC 解决方案为你提供了创建\
    \ SQL 查询的简单性和灵活性，你可以通过连接任意随机表来创建查询，并简单地将结果映射回任何 POJO 类。只有当数据库使用扁平表进行反规范化时，“每查询一对象”的方法才有效。\n\
    \nSpring Data API 顶层有三个接口：\n\n*   `CrudRepository`\n\n*   `PagingAndSortingRepository`，它扩展了\
    \ `CrudRepository`\n\n*   `JpaRepository`，它扩展了 `PagingAndSortingRepository`\n\n\
    这三个接口都仅适用于 JPA 实体。`CrudRepository` 主要提供基本的 CRUD 功能。`PagingAndSortingRepository`\
    \ 提供了进行分页和排序记录的方法。`JpaRepository` 提供了与 JPA 相关的方法，例如刷新持久化上下文和批量删除记录。清单 3-1 展示了\
    \ `CrudRepository` 的源代码。\n\n```\npackage org.springframework.data.repository;\n\
    import java.util.Optional;\n@NoRepositoryBean\npublic interface CrudRepository\
    \ extends Repository {\nS save(S entity);\nIterable saveAll(Iterable entities);\n\
    Optional findById(ID id);\nboolean existsById(ID id);\nIterable findAll();\nIterable\
    \ findAllById(Iterable ids);\nlong count();\nvoid deleteById(ID id);\nvoid delete(T\
    \ entity);\nvoid deleteAll(Iterable entities);\nvoid deleteAll();\n}\n@NoRepositoryBean\n\
    public interface PagingAndSortingRepository extends\nCrudRepository {\nIterable\
    \ findAll(Sort sort);\nPage findAll(Pageable pageable);\n}\n@NoRepositoryBean\n\
    public interface JpaRepository extends PagingAndSortingRepository, QueryByExampleExecutor\
    \ {\nList findAll();\nList findAll(Sort var1);\nList findAllById(Iterable var1);\n\
    List saveAll(Iterable var1);\nvoid flush();\nS saveAndFlush(S var1);\nvoid deleteInBatch(Iterable\
    \ var1);\nvoid deleteAllInBatch();\nT getOne(ID var1);\nList findAll(Example var1);\n\
    List findAll(Example var1, Sort var2);\n}\n清单 3-1\nRepository 定义\n```\n\nSpring\
    \ Data JPA 的美妙之处在于，它只需定义 Repository 方法名称，就能从表中派生查询。此功能来自 Spring Data Query DSL。考虑以下\
    \ `UserRepository` 接口示例：\n\n```\n@Repository\npublic interface UserRepository\
    \ extends CrudRepository {\nvoid deleteByUsername(String username);\nOptional\
    \ findByUsername(String username);\n@Query(\"select u from User u\")\nStream streamAll();\n\
    }\n```\n\n所有 `findBy{fieldName}`, `deleteBy*` 方法都将由框架本身实现。Java 8 的 `Optional`\
    \ 和 `Stream` 也受支持。\n\n## Spring Data JPA 示例\n\n人们常说 ORM/JPA 和 Hibernate 对新手来说很难。为了了解最常见情况下的具体操作，我们将在本章中创建一个博客应用程序，并使用\
    \ PostgreSQL 作为数据库。近年来，由于其社区带来的众多创新和升级，PostgreSQL 已成为默认选择。\n\n### @OnetoMany 和\
    \ @ManyToone 注解\n\n我们将从创建一个示例应用程序开始，该应用程序涵盖了前面列表中的前两点。此应用程序的代码结构如下：\n\n```\n.\n\
    ├── build.gradle\n└── src\n├── main\n│   ├── java\n│   │   └── com\n│   │    \
    \   └── example\n│   │           └── blog_app\n│   │               ├── BlogJpaApp.java\n\
    │   │               ├── constants\n│   │               │   ├── PgArrayType.java\n\
    │   │               │   └── PgEnumType.java\n│   │               ├── helper\n\
    │   │               │   └── DataGenerator.java\n│   │               ├── model\n\
    │   │               │   └── jpa\n│   │               │       ├── Address.java\n\
    │   │               │       ├── Blog.java\n│   │               │       ├── Comment.java\n\
    │   │               │       ├── CommentLike.java\n│   │               │      \
    \ ├── File.java\n│   │               │       ├── Post.java\n│   │            \
    \   │       ├── PostFileJoinTable.java\n│   │               │       ├── PostStatus.java\n\
    │   │               │       └── User.java\n│   │               ├── repository\n\
    │   │               │   ├── BlogRepository.java\n│   │               │   ├── CommentRepository.java\n\
    │   │               │   ├── FileRepository.java\n│   │               │   ├── PostRepository.java\n\
    │   │               │   ├── UserRepository.java\n│   │               │   └── base\n\
    │   │               │       ├── BaseRepository.java\n│   │               │   \
    \    └── BaseRepositoryImpl.java\n│   │               ├── service\n│   │     \
    \          │   └── UserCRUDService.java\n│   │               └── web\n│   │  \
    \                 └── IndexController.java\n│   ├── resources\n│   │   ├── application.yml\n\
    │   │   └── schema.sql\n│   └── scripts\n└── test\n├── java\n│   └── com\n│  \
    \     └── example\n│           └── blog_app\n│               ├── BlogJpaAppTests.java\n\
    │               └── BlogTestBase.java\n└── resources\n└── application-test.yml\n\
    ```\n\n#### 创建博客应用\n\n首先，访问 [`start.spring.io`](https://start.spring.io) 或创建一个名为\
    \ `blog-app-jpa-ch3` 的新 Gradle 应用，并将 `groupId` 设置为 `com.example`，`artifactId`\
    \ 设置为 `blog-app`。\n\n如果你切换到 `start.spring.io` 的完整版本，几乎所有的 Spring 库和框架都会显示出来。选择\
    \ Web、Lombok、JPA、JDBC 和 PostgreSQL，然后生成项目。\n"
- fmt: '#### Application Setup


    Before we start writing the code, let’s set up the project using these steps:


    1. Set up dependencies in `build.gradle`.

    2. Create and execute SQL statements for table creation.

    3. Create a database in PostgreSQL and map its access details to `application.yml`.


    These steps are detailed in Listings [3-2](#454149_1_En_3_Chapter.xhtml#PC4) through
    [3-4](#454149_1_En_3_Chapter.xhtml#PC6).


    ```

    server:

    port: 8080

    servlet:

    contextPath: /blog

    spring:

    application:

    name: blog-service

    jpa:

    show-sql: false

    hibernate:

    ddl-auto: update

    jdbc.lob.non_contextual_creation: true

    generate-ddl: true

    datasource:

    username: postgres

    password: postgres

    url: jdbc:postgresql://localhost:5432/blogs

    driverClassName: org.postgresql.Driver

    logging:

    file: logs/blogging-service.log

    level:

    org.hibernate.SQL: ERROR

    org.springframework.data: DEBUG

    Listing 3-4

    {project-root}/resources/application.yml

    ```


    ```

    CREATE EXTENSION IF NOT EXISTS "uuid-ossp"; -- This is required to enable UUID
    extension

    drop table if exists blog cascade;

    drop table if exists post cascade;

    drop table if exists comment cascade;

    drop table if exists comment_like cascade;

    drop table if exists file cascade;

    drop table if exists post_files cascade;

    drop table if exists "user" cascade; -- since user is a keyword in postgresql,
    double quotes are used here

    -- DROP statements end here

    Create table if not exists blog (

    id serial primary key not null,

    guid uuid default uuid_generate_v4(),

    name varchar(150),

    about text,

    published_at timestamp

    );

    create table if not exists post  (

    id serial primary key not null,

    blog_id int,

    title varchar(150),

    content text,

    "user" int

    );

    create table if not exists comment  (

    id serial primary key not null,

    parent_id int,

    content text,

    post_id int

    );

    create table if not exists "user"  (

    id serial primary key not null,

    username varchar(150),

    password varchar(150),

    email varchar(150),

    is_active boolean,

    activated_at timestamp DEFAULT (current_timestamp AT TIME ZONE ''UTC'')

    );

    create table comment_like (id  bigserial not null, comment_id int8, post_id int8,
    user_id int8, primary key (id));

    create table file (id bigserial not null, name varchar(255), primary key (id));

    create table post_files (post_id int8 not null, file_id int8 not null, primary
    key (file_id, post_id));

    Listing 3-3

    Schema at {project-root}/resources/schema.sql

    ```


    ```

    plugins {

    id ''org.springframework.boot'' version ''2.1.3.RELEASE''

    id ''java''

    }

    apply plugin: ''io.spring.dependency-management''

    bootJar {

    baseName = ''blog-app''

    version =  ''1.0''

    }

    repositories {

    mavenCentral()

    }

    dependencies {

    compile(''org.springframework.boot:spring-boot-starter-web'')

    compile(''org.springframework.boot:spring-boot-starter-jdbc'')

    compile(''org.springframework.boot:spring-boot-starter-data-jpa'')

    compile("org.springframework.boot:spring-boot-starter-data-mongodb")

    compile(''org.postgresql:postgresql:42.2.5'')

    testCompile(''junit:junit:4.12'')

    testCompile(''org.springframework.boot:spring-boot-starter-test'')

    compile("org.projectlombok:lombok:1.18.6")

    annotationProcessor("org.projectlombok:lombok:1.18.6")

    }

    Listing 3-2

    Build.gradle

    ```


    In the preceding code, I included most of the common attributes to get things
    up and running quickly with PostgreSQL. Note that we have not yet defined the
    relationships in the SQL file, as they will be auto-generated from the JPA entity
    models in the next step. We just added the `ddl-auto: update` property in the
    file. Figure [3-1](#454149_1_En_3_Chapter.xhtml#Fig1) shows the entity relationship
    (ER) diagram.


    ![../images/454149_1_En_3_Chapter/454149_1_En_3_Fig1_HTML.jpg](images/454149_1_En_3_Chapter/454149_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    ER diagram for the blog app


    #### Enums as Datatypes in Postgresql and Mapping in JPA


    Often there is a need to store literal constants in the database as strings and
    map them to enumerations in Java. We will be using Java `enum` types in the upcoming
    examples, so let’s take a minute to look at their correct usage in this section.


    If we map and store Java enums as ordinal in a PostgreSQl database, as an example
    through `POST` entity definition, they should be easy to deal with. If we want
    to store enum values (string literals) as is through JPA, we need an extra step,
    as described in this section. For example, if we have the following enum in the
    Java code:


    ```

    public enum PostStatus implements Serializable {

    ACTIVE(1), NOT_ACTIVE(2);

    }

    ```


    We can store numbers (1, 2) in DB and keep mapping them back or we can store strings
    (`ACTIVE`, `NOT_ACTIVE`). The PostgreSQL database provides `ENUM` as a datatype,
    so ideally we should create an enum in a database to map it to the Java object
    fields. We will need to add enums to the `schema.sql` (see Listing [3-5](#454149_1_En_3_Chapter.xhtml#PC8)).


    ```

    drop type if exists post_status_enum;

    Create type post_status_enum as ENUM (''ACTIVE'', ''NOT_ACTIVE'');

    create table if not exists post  (

    id serial primary key not null,

    blog_id int,

    title varchar(150),

    content text,

    "user" int,

    postStatus post_status_enum default ''ACTIVE''

    );

    Listing 3-5

    Adding Enums to the Schema Script

    ```


    In order to map them to Java enums, we need to define a new user type. A user
    type is a feature in Hibernate that defines custom datatypes. Listing [3-6](#454149_1_En_3_Chapter.xhtml#PC9)
    shows how this is done for this example. Once that is defined, a `@Type` (see
    Listing [3-8](#454149_1_En_3_Chapter.xhtml#PC11)) annotation can be used on top
    of the enum fields to map them to the code and database fields.'
