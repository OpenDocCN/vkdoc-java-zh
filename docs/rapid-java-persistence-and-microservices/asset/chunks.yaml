- fmt: '### Dropwizard


    `Dropwizard` is a packaged set of micro frameworks and libraries. All the most
    popular and standard supported frameworks for all needs in a web application are
    bundled together. Just including one dependency of `Dropwizard` can bring in support
    for `Jetty`, `Jersey`, `Jackson`, `Guava`, `Liquibase`, `YAML`, etc.


    Let’s see a Hello World app with this framework in action. We first need to create
    a `Gradle`-based project that can be run via any IDE and from any command line.


    ### Note


    You may need to set up Java 8 (minimum) and `Gradle` 5 to run all the examples
    in this book. All code in working condition can be downloaded from the GitHub
    repository.


    After creating the `Gradle` file, we have to create four base classes to initiate
    an app:


    *   Configuration class

    *   Model class

    *   Resource class

    *   Application class


    Additionally, we need a `Maven` or `Gradle` script and a `YML` file for actual
    configuration values.


    #### Gradle Project


    First create a new `Gradle` project from the command line (IDEs can also optionally
    be used) using the following command:


    ```

    gradle init --type java-application

    ```


    This will create all the necessary source folders, along with the default `build.gradle`
    file, which can then be overridden by the code shown in Listing [2-3](#454149_1_En_2_Chapter.xhtml#PC6).


    ```

    plugins {

    id ''java''

    id "com.github.johnrengelman.shadow" version "5.0.0"

    }

    group ''com.example''

    version ''1.0''

    java {

    sourceCompatibility = JavaVersion.VERSION_1_8

    targetCompatibility = JavaVersion.VERSION_1_8

    }

    // optionally sourceCompatibility = JavaVersion.VERSION_11 can also be used

    repositories {

    mavenCentral()

    }

    jar {

    manifest {

    attributes ''Main-Class'': ''com.example.blogs.BlogApplication''

    }

    }

    dependencies {

    compile group: ''io.dropwizard'', name: ''dropwizard-core'', version: ''1.3.7''

    compile(''org.projectlombok:lombok:1.18.6'')

    testCompile group: ''junit'', name: ''junit'', version: ''4.12''

    annotationProcessor ''org.projectlombok:lombok:1.18.6''

    }

    Listing 2-3

    Build.gradle

    ```


    #### Configuration Class


    Add a configuration handler class as the carefully initialized object with values
    binded from the supplied `YAML` file while running the application (see Listing
    [2-4](#454149_1_En_2_Chapter.xhtml#PC7)).


    ```

    package com.example.blogs.config;

    import com.fasterxml.jackson.annotation.JsonProperty;

    import io.dropwizard.Configuration;

    import org.hibernate.validator.constraints.NotEmpty;

    public class BlogAppConfig extends Configuration {

    @NotEmpty

    @JsonProperty

    private String blogName;

    public String getBlogName() {

    return blogName;

    }

    public void setBlogName(String blogName) {

    this.blogName = blogName;

    }

    }

    Listing 2-4

    Configuration Class

    ```


    #### Model Class


    Model classes hold the properties for providing requests and responses to the
    web layer (see Listing [2-5](#454149_1_En_2_Chapter.xhtml#PC8)).


    ```

    package com.example.blogs.model;

    import lombok.Data;

    import org.hibernate.validator.constraints.Length;

    @Data

    public class Post implements Serializable {

    private Long id;

    @Length(min = 5, max = 300)

    private String content;

    public Post(Long id, String content)   {

    this.id = id;

    this.content = content;

    }

    }

    Listing 2-5

    Configuration Class

    ```


    #### Resource Class


    The resource class (see Listing [2-6](#454149_1_En_2_Chapter.xhtml#PC9)) serves
    as the RESTful endpoint implementation.


    ```

    package com.example.blogs.api;

    import com.codahale.metrics.annotation.Timed;

    import com.example.blogs.model.Post;

    import javax.ws.rs.GET;

    import javax.ws.rs.Path;

    import javax.ws.rs.Produces;

    import javax.ws.rs.QueryParam;

    import javax.ws.rs.core.MediaType;

    import java.util.Optional;

    @Path("/post")

    @Produces(MediaType.APPLICATION_JSON)

    public class PostResource {

    private String blogName;

    public PostResource(String blogName)   {

    this.blogName = blogName;

    }

    @GET

    @Timed

    public Post getRandomPost(@QueryParam("name") Optional name) {

    return new Post(1l, name.orElse("This is a random post name") + " from " +

    blogName );

    }

    }

    Listing 2-6

    Resource Class

    ```


    #### Application Class


    This class acts as the entry point for the application and initializes all the
    user-defined components (see Listing [2-7](#454149_1_En_2_Chapter.xhtml#PC10)).


    ```

    package com.example.blogs;

    import com.example.blogs.api.PostResource;

    import com.example.blogs.config.BlogAppConfig;

    import io.dropwizard.Application;

    import io.dropwizard.setup.Bootstrap;

    import io.dropwizard.setup.Environment;

    import lombok.extern.slf4j.Slf4j;

    @Slf4j

    public class BlogApplication extends Application {

    @Override

    public String getName() {

    return "BlogApplication";

    }

    @Override

    public void initialize(Bootstrap bootstrap) {

    log.info("Application initialized");

    }

    @Override

    public void run(BlogAppConfig configuration, Environment environment) throws

    Exception {

    log.info("Application started");

    final PostResource resource = new PostResource(configuration.getBlogName());

    environment.jersey().register(resource);

    }

    public static void main(String[] args) throws Exception {

    new BlogApplication().run(args);

    }

    }

    Listing 2-7

    Application Class

    ```


    #### YAML File: Application.yml


    This file holds all the user-defined properties along with values that can change
    outside of the code.


    ```

    blogName: Sample Blog

    ```


    At this point, we are done with the codebase for the Hello World application.
    Let’s see an example and run it.


    #### Running the Application


    From the IDE, pass in the application arguments, as `server application.yml`,
    and put `application.yml` in the root directory of the project. Figure [2-1](#454149_1_En_2_Chapter.xhtml#Fig1)
    shows an example from Idea IntelliJ.


    ![../images/454149_1_En_2_Chapter/454149_1_En_2_Fig1_HTML.jpg](images/454149_1_En_2_Chapter/454149_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Configuration settings in Idea IntelliJ


    Now just run the `BlogApplication` class from the IDE. In order to run it from
    the command line, you need to add a plugin to `Gradle` to create a fat JAR. We
    use the Shadow ( [`https://github.com/johnrengelman/shadow`](https://github.com/johnrengelman/shadow)
    ) plugin, as shown earlier in the `build.gradle` file.


    The command to create a shadow JAR is:


    ```

    gradle shadowJar

    ```


    Run the app from the command line:


    ```

    java -jar ./build/libs/dropwizard-example-1.0-all.jar server application.yml

    ```


    After application startup, you can visit this URL in the browser: `http://localhost:8080/post?name=Raj`.


    Or you can use the `CURL` tool from the terminal as follows:


    ```

    curl -X GET http://localhost:8080/post?name=Raj

    ```


    Here’s the output from `CURL`:


    ```

    {"id":1,"content":"Raj from Hello World!"}

    ```


    One of the best things about this framework is that it forces you to declare and
    assign all dependencies carefully at startup. All libraries that perform nearly
    all necessary operations in a microservice are grouped together with the latest
    stable versions in `Dropwizard`. Compared with the Spark Framework, this has more
    capabilities, as more libraries for different purposes are bundled here. This
    framework does a lot of stuff for you, but you may feel the missing flexibility
    in exchange. You can’t integrate some of the most popular choices in Java, even
    `JPA`. With `JDBI` or `sql2o`, the persistence framework looks cleaner, but with
    a big project, they may involve lengthy dev cycles.'
  raw: '### Dropwizard


    Dropwizard is a packaged set of micro frameworks and libraries. All the most popular
    and standard supported frameworks for all needs in a web application are bundled
    together. Just including one dependency of Dropwizard can bring in support for
    Jetty, Jersey, Jackson, Guava, Liquibase, YAML, etc.


    Let’s see a Hello World app with this framework in action. We first need to create
    a Gradle-based project that can be run via any IDE and from any command line.


    ### Note


    You may need to set up Java 8 (minimum) and Gradle 5 to run all the examples in
    this book. All code in working condition can be downloaded from the GitHub repository.


    After creating the Gradle file, we have to create four base classes to initiate
    an app:


    *   Configuration class


    *   Model class


    *   Resource class


    *   Application class


    Additionally, we need a Maven or Gradle script and a YML file for actual configuration
    values.


    #### Gradle Project


    First create a new Gradle project from the command line (IDEs can also optionally
    be used) using the following command:


    ```

    gradle init --type java-application

    ```


    This will create all the necessary source folders, along with the default `build.gradle`
    file, which can then be overridden by the code shown in Listing [2-3](#454149_1_En_2_Chapter.xhtml#PC6).


    ```

    plugins {

    id ''java''

    id "com.github.johnrengelman.shadow" version "5.0.0"

    }

    group ''com.example''

    version ''1.0''

    java {

    sourceCompatibility = JavaVersion.VERSION_1_8

    targetCompatibility = JavaVersion.VERSION_1_8

    }

    // optionally sourceCompatibility = JavaVersion.VERSION_11 can also be used

    repositories {

    mavenCentral()

    }

    jar {

    manifest {

    attributes ''Main-Class'': ''com.example.blogs.BlogApplication''

    }

    }

    dependencies {

    compile group: ''io.dropwizard'', name: ''dropwizard-core'', version: ''1.3.7''

    compile(''org.projectlombok:lombok:1.18.6'')

    testCompile group: ''junit'', name: ''junit'', version: ''4.12''

    annotationProcessor ''org.projectlombok:lombok:1.18.6''

    }

    Listing 2-3

    Build.gradle

    ```


    #### Configuration Class


    Add a configuration handler class as the carefully initialized object with values
    binded from the supplied YAML file while running the application (see Listing
    [2-4](#454149_1_En_2_Chapter.xhtml#PC7)).


    ```

    package com.example.blogs.config;

    import com.fasterxml.jackson.annotation.JsonProperty;

    import io.dropwizard.Configuration;

    import org.hibernate.validator.constraints.NotEmpty;

    public class BlogAppConfig extends Configuration {

    @NotEmpty

    @JsonProperty

    private String blogName;

    public String getBlogName() {

    return blogName;

    }

    public void setBlogName(String blogName) {

    this.blogName = blogName;

    }

    }

    Listing 2-4

    Configuration Class

    ```


    #### Model Class


    Model classes hold the properties for providing requests and responses to the
    web layer (see Listing [2-5](#454149_1_En_2_Chapter.xhtml#PC8)).


    ```

    package com.example.blogs.model;

    import lombok.Data;

    import org.hibernate.validator.constraints.Length;

    @Data

    public class Post implements Serializable {

    private Long id;

    @Length(min = 5, max = 300)

    private String content;

    public Post(Long id, String content)   {

    this.id = id;

    this.content = content;

    }

    }

    Listing 2-5

    Configuration Class

    ```


    #### Resource Class


    The resource class (see Listing [2-6](#454149_1_En_2_Chapter.xhtml#PC9)) serves
    as the RESTful endpoint implementation.


    ```

    package com.example.blogs.api;

    import com.codahale.metrics.annotation.Timed;

    import com.example.blogs.model.Post;

    import javax.ws.rs.GET;

    import javax.ws.rs.Path;

    import javax.ws.rs.Produces;

    import javax.ws.rs.QueryParam;

    import javax.ws.rs.core.MediaType;

    import java.util.Optional;

    @Path("/post")

    @Produces(MediaType.APPLICATION_JSON)

    public class PostResource {

    private String blogName;

    public PostResource(String blogName)   {

    this.blogName = blogName;

    }

    @GET

    @Timed

    public Post getRandomPost(@QueryParam("name") Optional name) {

    return new Post(1l, name.orElse("This is a random post name") + " from " +

    blogName );

    }

    }

    Listing 2-6

    Resource Class

    ```


    #### Application Class


    This class acts as the entry point for the application and initializes all the
    user-defined components (see Listing [2-7](#454149_1_En_2_Chapter.xhtml#PC10)).


    ```

    package com.example.blogs;

    import com.example.blogs.api.PostResource;

    import com.example.blogs.config.BlogAppConfig;

    import io.dropwizard.Application;

    import io.dropwizard.setup.Bootstrap;

    import io.dropwizard.setup.Environment;

    import lombok.extern.slf4j.Slf4j;

    @Slf4j

    public class BlogApplication extends Application {

    @Override

    public String getName() {

    return "BlogApplication";

    }

    @Override

    public void initialize(Bootstrap bootstrap) {

    log.info("Application initialized");

    }

    @Override

    public void run(BlogAppConfig configuration, Environment environment) throws

    Exception {

    log.info("Application started");

    final PostResource resource = new PostResource(configuration.getBlogName());

    environment.jersey().register(resource);

    }

    public static void main(String[] args) throws Exception {

    new BlogApplication().run(args);

    }

    }

    Listing 2-7

    Application Class

    ```


    #### YAML File: Application.yml


    This file holds all the user-defined properties along with values that can change
    outside of the code.


    ```

    blogName: Sample Blog

    ```


    At this point, we are done with the codebase for the Hello World application.
    Let’s see an example and run it.


    #### Running the Application


    From the IDE, pass in the application arguments, as `server application.yml`,
    and put `application.yml` in the root directory of the project. Figure [2-1](#454149_1_En_2_Chapter.xhtml#Fig1)
    shows an example from Idea IntelliJ.


    ![../images/454149_1_En_2_Chapter/454149_1_En_2_Fig1_HTML.jpg](images/454149_1_En_2_Chapter/454149_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Configuration settings in Idea IntelliJ


    Now just run the `BlogApplication` class from the IDE. In order to run it from
    the command line, you need to add a plugin to Gradle to create a fat JAR. We use
    the Shadow ( [`https://github.com/johnrengelman/shadow`](https://github.com/johnrengelman/shadow)
    ) plugin, as shown earlier in the `build.gradle` file.


    The command to create a shadow JAR is:


    ```

    gradle shadowJar

    ```


    Run the app from the command line:


    ```

    java -jar ./build/libs/dropwizard-example-1.0-all.jar server application.yml

    ```


    After application startup, you can visit this URL in the browser: `http://localhost:8080/post?name=Raj`.


    Or you can use the CURL tool from the terminal as follows:


    ```

    curl -X GET http://localhost:8080/post?name=Raj

    ```


    Here’s the output from CURL:


    ```

    {"id":1,"content":"Raj from Hello World!"}

    ```


    One of the best things about this framework is that it forces you to declare and
    assign all dependencies carefully at startup. All libraries that perform nearly
    all necessary operations in a microservice are grouped together with the latest
    stable versions in Dropwizard. Compared with the Spark Framework, this has more
    capabilities, as more libraries for different purposes are bundled here. This
    framework does a lot of stuff for you, but you may feel the missing flexibility
    in exchange. You can’t integrate some of the most popular choices in Java, even
    JPA. With JDBI or sql2o, the persistence framework looks cleaner, but with a big
    project, they may involve lengthy dev cycles.'
