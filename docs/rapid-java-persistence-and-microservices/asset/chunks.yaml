    ### Eshop Application


    This microservice has endpoints that allow customers to see the products list
    and place orders. Ideally in a enterprise setup, you should have different services
    for customer management, product catalogues, and order management. We will define
    a `TestController` to show the sample order flow here with the help of a few business
    services.


    Most important of these services is `OrderService` , which is going to communicate
    to another microservice (Inventory Service) and then decide based on the response
    which products are available. If a product is not available, `OrderService` performs
    the transaction and returns the order object along with its location in the header.
    `CustomerService` and `ProductService` contain the methods to create the sample
    customer and product.


    For the purpose of communicating to the inventory service, `Eshop` can take a
    number of approaches:


    *   Netflix OSS – Eureka Client with a REST Template


    The Eureka client library offers a lookup via configured property called `eureka.client.serviceUrl.defaultZone`.
    This provides a list to all instances, which can used to connect to one of them.


    *   Netflix OSS – Ribbon with a REST Template


    Ribbon also offers configuration, lookup, and connection management to Eureka
    server(s). Ribbon differs from Eureka Client in a way and offers auto load balancing
    based on a couple of algorithms rather than manually selecting one from a list.


    *   Netflix OSS – Feign


    This is an interface-based client that has a target URI annotated over it as a
    declaration. Feign internally uses Ribbon APIs only.


    *   Spring Cloud API abstraction offers a simple solution to both the EurekaClient
    and Ribbon-based approaches through the `@LoadBalanced` annotation as well as
    through a `DiscoveryClient` class. EurekaClient internally uses Jerysey APIs and
    Spring Cloud `org.springframework.cloud.client.discovery.DiscoveryClient` can
    be utilized for Spring-preferred HTTP communication APIs.


    We discuss the simple options from the Spring Cloud `@LoadBalanced` annotation
    and Feign in the services section. We need the following code structure to build
    this application:


