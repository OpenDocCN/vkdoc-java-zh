- fmt: '### Fetching the User Objects First and Then Fetching the Post Objects for
    These Users Separately


    As an easy alternative, we can fetch the user object list in the first step and
    then the related `POST` objects list in the second query. There are two problems
    with this approach:


    - The second query will have to be run using an `IN` clause, which is not considered
    good practice. The `IN` clause in databases is generally rewritten using `OR`
    clauses, which may cause the database to reparse and rebuild the execution plan
    each time arguments change. If the target column is indexed and there are only
    a few arguments, you still should get decent performance.

    - Client code will have to iterate over two separate lists.


    ### Fetching as a Single Combined Result Mapped to DTOS with a Native Query


    With this technique, a custom query can be executed with outer joins and the results
    can be mapped to a single object list. This means there is no nested parent-child
    object structure and a few fields may have the same values throughout the list.


    ## JPA Querying with Constructor Mapping


    There are multiple solutions for mapping back results from a JPA query to any
    entity object or entity objects list in JPA 2.2. The simplest of them is using
    a constructor provided by any custom POJO. Let’s see an example in Listing [4-9](#454149_1_En_4_Chapter.xhtml#PC16).


    ```

    package com.example.eshop.model.dto;

    import lombok.Data;

    @Data

    @AllArgsConstructor

    public class CustomerDto {

    private Integer id;

    private String name;

    }

    public interface CustomerRepository extends JpaRepository{

    // Query example with Constructor mapping

    @Query(value = "Select new com.example.eshop.model.dto.CustomerDto(c.id, c.name)
    from Customer c")

    List findCustomers();

    }

    @SpringBootApplication

    @Slf4j

    public class Application implements CommandLineRunner {

    @Override

    public void run(String... strings) throws Exception {

    constructorMappingExample();

    }

    public void constructorMappingExample() {

    List customersList = customerRepository.findCustomers();

    log.info("Customers List with Constructors mapped query results

    : {}", customersList);

    }

    }

    Listing 4-9

    DTO and CustomerRepository

    ```


    Notes:


    - We added a new class `CustomerDto` to the codebase. This class does not have
    entity annotations and exactly maps to the needs of the frontend app with specific
    attributes only. This class is also expected to have a constructor with all fields
    that are required to be populated by query results mapping.

    - We also added a new method in `CustomerRepository` with a custom query on top
    of it through the `@Query` annotation.

    - In the JPQL query, we directly created a new Java object through its `com.example.eshop.model.dto.CustomerDto(c.id,
    c.name)` constructor.


