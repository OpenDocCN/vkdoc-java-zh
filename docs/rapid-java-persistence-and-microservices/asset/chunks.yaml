    import org.junit.Test;

    import org.junit.runner.RunWith;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.context.SpringBootTest;

    import org.springframework.jdbc.core.BeanPropertyRowMapper;

    import org.springframework.jdbc.core.JdbcTemplate;

    import org.springframework.test.context.junit4.SpringRunner;

    import java.util.List;

    @RunWith(SpringRunner.class)

    @SpringBootTest

    @Slf4j

    public class EshopAppTests {

    @Autowired

    JdbcTemplate jdbcTemplate;

    @Test

    public void testThroughJdbcTemplate()   {

    String sql = "Select " +

    "c.customerId, o.orderId, p.productId," +

    "c.name as customerName, c.email as customerEmail, p.name as productName," +

    "p.quantity as quantity, p.price as price " +

    "from " +

    "Customer c inner join `Order` o on c.customerId = o.customerId inner join " +

    "Product p on o.productId = p.productId";

    List customerWithOrdersList = jdbcTemplate.query(sql, new BeanPropertyRowMapper(CustomerOrder.class));

    log.info("Order Details: " + customerWithOrdersList);

    }

    }

    Listing 5-4

    Test Case

    ```


    Notes:


    *   The `BeanPropertyRowMapper` class is the implementation of `RowMapper` that
    shows a resultset to the bean columns mapping by reflection.


    *   The bean, which is `CustomerOrder`, must have a no-argument constructor and
    the field names should match the column names in the database. Underscores will
    be converted to camel case field names.


    *   Spring says that this class is designed to provide convenience rather than
    high performance. For best performance, consider using a custom `RowMapper` implementation.


    *   Nested objects will not be mapped by `BeanPropertyRowMapper`. If the `CustomerOrder`
    contains a list associated with any another data model, it will not be mapped
    automatically. This can easily happen with JPA.


