    ## Spring Converter Service


    The Spring Framework provides an interesting service that may help you treat a
    custom class as an entity field. This service will manage its conversion back
    and forth from database specific datatype to Java-based types. Consider the example
    in Listing [4-12](#454149_1_En_4_Chapter.xhtml#PC21) to see this in the `User`
    class.


    ```

    package com.example.eshop.model.type;

    import lombok.Data;

    import java.io.Serializable;

    @Data

    public class CustomerAddress implements Serializable {

    private String streetAddress;

    private String city;

    private String country;

    }

    Listing 4-12

    CustomerAddress Type

    ```


    Listing [4-12](#454149_1_En_4_Chapter.xhtml#PC21) defines a new class that should
    be treated as a datatype for our entity model as a composite object. The JDBC
    driver can handle the native datatypes, but custom classes cannot be mapped to
    object fields as datatypes. By using the Spring converter service, we can define
    how the Spring Framework converts/serializes the object fields into a single data
    element. Further, we can define how they should be decomposed and mapped to the
    fields object. As an example, we convert the `CustomerAddress` object fields into
    a comma-separated string and then convert them back (see Listing [4-13](#454149_1_En_4_Chapter.xhtml#PC22)).


    ```

    package com.example.eshop.converter;

    import com.example.eshop.model.type.CustomerAddress;

    import javax.persistence.AttributeConverter;

    public class CustomerAddressConverter implements

    AttributeConverter {

    @Override

    public String convertToDatabaseColumn(CustomerAddress customerAddress) {

    if(customerAddress == null)

    return "";

    return  customerAddress.getStreetAddress() + ", " +

    customerAddress.getCity() + ", " +

    customerAddress.getCountry();

    }

    @Override

    public CustomerAddress convertToEntityAttribute(String value) {

    CustomerAddress customerAddress = null;

    if(value != null && value.contains(",")) {

    String[] tokens = value.split(",");

    customerAddress = new CustomerAddress();

    customerAddress.setStreetAddress(tokens[0]);

    customerAddress.setCity(tokens[1]);

    customerAddress.setCountry(tokens[2]);

    }

    return customerAddress;

    }

    }

    Listing 4-13

    Type Converter

    ```


    The `convertToDatabaseColumn` method converts the object to a string and the `convertToEntityAttribute`
    method does the opposite. Let’s see how to use this class in Listing [4-14](#454149_1_En_4_Chapter.xhtml#PC23).


    ```

    package com.example.eshop.model.orders;

    import java.io.Serializable;

    import java.time.LocalDateTime;

    import java.util.List;

    import java.util.Set;

    import javax.persistence.*;

    import com.example.eshop.converter.CustomerAddressConverter;

    import com.example.eshop.model.type.CustomerAddress;

    import com.fasterxml.jackson.annotation.JsonIgnore;

    import lombok.*;

    @Data

    @Entity

    @ToString(exclude = {"orders"})

    @EqualsAndHashCode(exclude = {"orders"})

    public class Customer implements Serializable {

    @Id

    @GeneratedValue(strategy=GenerationType.IDENTITY)

    private Long customerId;

    private String name, email, password;

    private LocalDateTime dateAdded;

    @Column

    @Convert(converter = CustomerAddressConverter.class)

    CustomerAddress customerAddress;

    @JsonIgnore

    @OneToMany(fetch = FetchType.LAZY)

    @JoinColumn(name = "customerId")

    Set orders;

    }

    Listing 4-14

    Customer Entity Changes

    ```


    Notice in this code that we added a new field and marked it with an `@Convert`
    annotation.


    ```

    @Column

    @Convert(converter = CustomerAddressConverter.class)

    CustomerAddress customerAddress;

    ```


    While saving and fetching the customer entity, the Spring Data JPA will do this
    conversion back and forth implicitly.


    ## Important JPA Concepts


    Before ending our review of the common use cases and solutions with Spring Data
    JPA, let’s quickly recap some of the concepts that can improve our understanding
    of the JPA internals.


    ### JPA Managed Entity and Its Lifecycle


    Managed entity objects are in-memory instances of entity classes (persistable
    user-defined classes), which can represent physical objects in the database. We
    will not go into the details of JPA standard specification, but let’s review the
    managed object’s lifecycle, as shown in Figure [4-1](#454149_1_En_4_Chapter.xhtml#Fig1),
    and then continue with our examples.


    ![../images/454149_1_En_4_Chapter/454149_1_En_4_Fig1_HTML.png](images/454149_1_En_4_Chapter/454149_1_En_4_Fig1_HTML.png)


    Figure 4-1


    JPA entity object lifecycle


    When an entity object is initially created, its state is `New`. An entity object
    becomes `Managed` when it is persisted to the database. When the `Managed` object
    is modified, its change is detected by the owning `EntityManager`, which is managed
    by Spring. Changes are propagated to the database upon the `commit` transaction.
    When the object is retrieved and marked for deletion, it is marked in the `REMOVED`
    state. Any associated objects that are preloaded in memory are also marked for
    deletion. The last state, called `DETACHED`, comes when the `EntityManager` is
    closed.


    Callback methods also provided within the JPA specification that allow users to
    perform operations before an object enters the respective state. These methods
    are annotated with the following annotations:


    *   `@PrePersist`/`@PostPersist`

    *   `@PreRemove`/`@PostRemove`

    *   `@PreUpdate`/`@PostUpdate`

    *   `@PostLoad`


    Use cases:


    *   One typical use case for these methods is to log or mark timestamps for auditing.

    *   Another could be to trigger any other functionality upon updating any object.


    ### Isolation Levels, Locking, and Performance


    Isolation levels are important for deciding transaction strategies, locking behavior,
    and given database performance in highly concurrent or high read-write rate based
    applications involving transactions.


    Let’s quickly review the data reading-related behaviors in transactions.'
