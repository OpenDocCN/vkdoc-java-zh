- fmt: "\n暂时忽略最后一条语句（`\"Failed to register application\"`），我们将在第[6.6节](#454149_1_En_6_Chapter.xhtml#Sec32)中修正它。应用程序启动后，使用以下URL从浏览器访问端点。图[6-1](#454149_1_En_6_Chapter.xhtml#Fig1)和图[6-2](#454149_1_En_6_Chapter.xhtml#Fig2)显示了示例输出。\n\
    \n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig2_HTML.jpg](images/454149_1_En_6_Chapter/454149_1_En_6_Fig2_HTML.jpg)\n\
    \n**图 6-2**  \n库存服务配置\n\n*   `http://localhost:8888/config/eshop/prod/`\n\n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig1_HTML.jpg](images/454149_1_En_6_Chapter/454149_1_En_6_Fig1_HTML.jpg)\n\
    \n**图 6-1**  \nEshop服务配置\n\n*   `http://localhost:8888/config/inventory-service/prod`\n\
    \n到目前为止，我们已经运行了`config-service`并通过浏览器访问了它。在第[6.3节](#454149_1_En_6_Chapter.xhtml#Sec9)中，我们将通过微服务`Eshop`和`Inventory-service`作为客户端来访问它。\n\
    \n## 微服务架构中的服务发现\n\n当我们希望服务之间相互通信，而无需跟踪所有其他节点的确切网络位置或IP地址及端口号时，服务发现非常重要。传统上，我们基于负载均衡器的URL或地址来固定此查找，并将所有应用程序节点静态附加到此负载均衡器。Spring框架通过一系列链接库为这一需求提供了支持：\n\
    \nSpring ➤ Spring Cloud ➤ Spring Cloud Netflix ➤ Netflix OSS ➤ Netflix Eureka\n\
    \n服务发现（Netflix OSS ➤ Eureka）是提供此功能的库，Spring Cloud在此基础上工作，使其在Spring环境中运行。服务发现充当应用程序级别的注册表，供客户端相互通信。每个配置的客户端通过其应用程序名称向发现服务器注册自身。客户端只能通过该名称找到它。客户端将发现已注册的服务IP地址，并可以直接连接到这些节点。我们需要创建三个组件来演示此功能：\n\
    \n*   发现服务（Eureka服务器）\n*   库存服务（Eureka客户端）\n*   Eshop服务（Eureka客户端）\n\n图[6-3](#454149_1_En_6_Chapter.xhtml#Fig3)显示了使用发现服务的Eshop与库存服务之间的通信模式。\n\
    \n![../images/454149_1_En_6_Chapter/454149_1_En_6_Fig3_HTML.png](images/454149_1_En_6_Chapter/454149_1_En_6_Fig3_HTML.png)\n\
    \n**图 6-3**  \n通过发现服务进行通信\n\n### 发现服务应用程序\n\n此微服务充当注册表，供客户端通过名称查找各种其他服务的地址，并通过内置的基于Web的仪表板监控它们。在构建此服务时，我们需要以下代码结构：\n\
    \n```\n.\n├── build.gradle\n├── gradle\n│   └── wrapper\n│       ├── gradle-wrapper.jar\n\
    │       └── gradle-wrapper.properties\n├── gradlew\n├── gradlew.bat\n├── settings.gradle\n\
    └── src\n    └── main\n        ├── java\n        │   └── com\n        │      \
    \ └── example\n        │            └── eshop\n        │                 └── discovery\n\
    \        │                      └── DiscoveryApp.java\n        └── resources\n\
    \            └── application.yml\n```\n\n#### 应用程序设置\n\n从[`http://www.spring.io`](http://www.spring.io)创建一个名为`discovery-service`的新项目，并对`build.gradle`文件进行清单[6-4](#454149_1_En_6_Chapter.xhtml#PC9)中所示的更改。\n\
    \n```\nbootJar {\n    baseName = 'discovery-service'\n    version =  '1.0'\n}\n\
    dependencies {\n    implementation 'org.springframework.cloud:spring-cloud-starter-netflix-eureka-server'\n\
    \    implementation 'de.codecentric:spring-boot-admin-starter-client:2.1.3'\n\
    \    implementation 'org.springframework.boot:spring-boot-starter-actuator'\n\
    }\n```\n\n**清单 6-4**  \n`build.gradle`文件\n\n#### 配置\n\n清单[6-5](#454149_1_En_6_Chapter.xhtml#PC10)中定义的大多数属性都是常见的，我们之前已经见过。我将在清单之后解释新属性。\n\
    \n```\napplication.yml\nserver:\n  port: 8761\neureka:\n  instance:\n    hostname:\
    \ localhost\n  client:\n    registerWithEureka: false\n    fetchRegistry: false\n\
    \    serviceUrl:\n      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/\n\
    spring:\n  application:\n    name: discovery-service\n  boot:\n    admin:\n  \
    \    client:\n        url: http://localhost:7777/admin\nmanagement:\n  endpoints:\n\
    \    web:\n      exposure:\n        include: \"*\"\n```\n\n**清单 6-5**  \n配置文件\n\
    \n注意：\n\n*   `eureka.instance.hostname`属性表示要绑定Eureka注册表服务器的主机名。这也可以是域名或暴露的IP地址。\n\
    *   服务器模式下的`eureka.client.*`属性在集群模式下部署时使用。如果有多个节点，发现服务可以动态连接并复制注册表。我们将跳过对此的进一步细节，因为它们超出了本章的范围。\n\
    *   作为默认约定，服务通过`server.port`配置为在端口8761上运行。\n*   最后，`spring.boot.admin`和`management.*`现在可以忽略，将在第[6.6节](#454149_1_En_6_Chapter.xhtml#Sec32)中解释。\n\
    \n#### 引导\n\n最后一步是引导应用程序。我们需要一个额外的注解，如清单[6-6](#454149_1_En_6_Chapter.xhtml#PC11)所示，称为`@EnableEurekaServer`，以启用Eureka服务器支持。\n\
    \n```\npackage com.example.eshop.discovery_service;\n\nimport org.springframework.boot.WebApplicationType;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.boot.builder.SpringApplicationBuilder;\n\
    import org.springframework.cloud.netflix.eureka.server.EnableEurekaServer;\n\n\
    @SpringBootApplication\n@EnableEurekaServer\npublic class DiscoveryApp {\n   \
    \ public static void main(String[] args) {\n        new SpringApplicationBuilder(DiscoveryApp.class).web(WebApplicationType.SERVLET).run(args);\n\
    \    }\n}\n```\n\n**清单 6-6**  \n应用程序类\n\n启动此应用程序后，Eureka仪表板将在`http://localhost:8761/`可访问。我们将在第[6.3.3.5节](#454149_1_En_6_Chapter.xhtml#Sec25)中重新讨论此仪表板。\n\
    \n#### 运行发现服务应用程序\n\n运行应用程序：\n\n```\n>gradle bootRun\n>\n:: Spring Boot ::   \
    \     (v2.1.3.RELEASE)\n2019-04-02 07:52:22.176   INFO 30422 --- [           main]\n\
    c.example.eshop.discovery.DiscoveryApp    : No active profile set, falling back\
    \ to default profiles: default\ncom.netflix.config.ConcurrentCompositeConfiguration@fb5aeed\n\
    2019-04-02 07:52:25.816   INFO 30422 --- [           main]\no.s.b.a.e.web.EndpointLinksResolver\
    \       : Exposing 20 endpoint(s) beneath base path '/actuator'\n2019-04-02 07:52:25.909\
    \   INFO 30422 --- [           main]\no.s.c.n.e.s.EurekaServiceRegistry      \
    \   : Registering application DISCOVERY-SERVICE with eureka with status UP\n2019-04-02\
    \ 07:52:25.912   INFO 30422 --- [      Thread-12]\no.s.c.n.e.server.EurekaServerBootstrap\
    \    : Setting the eureka configuration..\n2019-04-02 07:52:25.913   INFO 30422\
    \ --- [      Thread-12]\no.s.c.n.e.server.EurekaServerBootstrap    : Eureka data\
    \ center value eureka.datacenter is not set, defaulting to default\n2019-04-02\
    \ 07:52:25.913   INFO 30422 --- [      Thread-12]\no.s.c.n.e.server.EurekaServerBootstrap\
    \    : Eureka environment value eureka.environment is not set, defaulting to test\n\
    2019-04-02 07:52:26.015   INFO 30422 --- [           main]\no.s.b.w.embedded.tomcat.TomcatWebServer\
    \   : Tomcat started on port(s): 8761 (http) with context path\"\n2019-04-02 07:52:26.016\
    \   INFO 30422 ---\n[           main] .s.c.n.e.s.EurekaAutoServiceRegistration\
