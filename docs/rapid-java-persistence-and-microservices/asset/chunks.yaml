    ## 快速文档


    有多种选项可以用 Java 描述 REST API。我们将介绍 OpenAPI 规范（OAS），这是 OpenAPI 倡议中的一个项目。OpenAPI 是一个
    Linux 基金会合作项目，拥有超过 20 个成员，包括 Adobe、IBM、Google、Microsoft 和 Salesforce。OpenAPI 规范（OAS）旨在为
    REST API 定义一个标准的、与编程语言无关的接口描述。


    该规范终结了不同框架（如 Json Schema、WADL、RAML 和 Swagger）功能集之间的比较。现在，我们将拥有不同的实现，就像该规范的 JDBC
    驱动程序一样。到目前为止，该规范已由多个不同语言的客户端完全实现。本章我们将介绍 Swagger，它是用 Java 编写的（[`https://github.com/swagger-api`](https://github.com/swagger-api)）。Swagger
    提供了一系列用于编写（Swagger Editor）、查看（Swagger UI）和生成代码（Swagger Codegen）的工具：


    *   **Swagger Editor**：基于浏览器的编辑器，您可以在其中编写 OpenAPI 规范。


    *   **Swagger UI**：将 OpenAPI 规范渲染为交互式 API 文档。


    *   **Swagger Codegen**：根据 OpenAPI 规范生成服务器存根和客户端库。


    我们可以创建一个 YAML 文件并从中生成项目，或者通过 Spring Boot 应用程序中的注解嵌入 Swagger 规范的相关属性。在本节中，我们将介绍
    Spring Boot 集成示例，通过我们的微服务示例启用 Swagger API。我们需要在 `eshop` 服务中包含两个依赖项，以查看一个可运行的示例：


    ```

    compile("io.springfox:springfox-swagger2:2.9.2")

    compile("io.springfox:springfox-swagger-ui:2.9.2")

    ```


    ### Java 配置


    我们需要先定义 Swagger 相关的配置，然后在控制器类中为 RESTful 资源定义注解。清单 6-28 展示了 Swagger 的基本 Java 配置。


    ```

    package com.example.eshop.config;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import springfox.documentation.builders.RequestHandlerSelectors;

    import springfox.documentation.spi.DocumentationType;

    import springfox.documentation.spring.web.plugins.Docket;

    import springfox.documentation.swagger2.annotations.EnableSwagger2;

    import static springfox.documentation.builders.PathSelectors.regex;

    @Configuration

    @EnableSwagger2

    public class SwaggerConfig {

    @Bean

    public Docket productApi() {

    return new Docket(DocumentationType.SWAGGER_2)

    .select()

    .apis(RequestHandlerSelectors.basePackage("com.example.eshop"))

    .paths(regex("/api.*"))

    .build();

    }

    private ApiInfo apiInfo() {

    return new ApiInfoBuilder().title("Eshop Service API")

    .description("Eshop API reference for developers")

    .termsOfServiceUrl("http://localhost:8201/eshop")

    .contact(new Contact("Raj Malhotra", "http://

    www.example.com", "mraj6046@gmail.com")).license("Example License

    Title")

    .licenseUrl("http://localhost:8201/eshop/

    license").version("1.0").build();

    }

    }

    清单 6-28

    Swagger 的 Java 配置

    ```


    注意：


    *   第一个方法名为 `productApi()`，提供了一个 `Docket` bean，这是一个构建器，旨在成为 Springfox 框架的主要接口。


    *   `Docket` 允许您定义可以找到带有 Swagger 注解的控制器类的包，以及所有 API 的路径。


    *   第二个 bean 名为 `ApiInfo`，允许您定义通用信息，例如用户/作者的联系方式和许可证信息。

