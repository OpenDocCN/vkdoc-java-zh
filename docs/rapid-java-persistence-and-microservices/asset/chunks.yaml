    日志输出显示了由 Lombok 的`toString()`方法返回的对象值。其目的是展示实现数据库访问所需的代码的简洁性。API 中还有更多选项可以以编程方式将结果集映射到对象。我们跳过了基于`RowMapper`的编程式
    API 方法与`JDBCTemplate`的结合使用，因为如今有更好的选择，将在下一节中描述。


    ## Spring Data JDBC


    这里的想法是提供相同的一致且简单的基于 Spring 仓库的持久化，但使用 JDBC 而非 JPA。此外，无需像使用`JDBCTemplate`那样自定义
    DAO 实现。可以同样使用基于接口的`CrudRepository`和`PagingAndSortingRepository`扩展。返回类型也支持`Optional`和`Stream`
    API。Spring Data JDBC 还通过 Spring 的`@Async`注解提供异步查询。请注意，异步查询与响应式查询不同，后者也将在第 [8](#454149_1_En_8_Chapter.xhtml)
    章中讨论。


    此外，Spring Data 基于 DSL 的查询生成是可用的，这意味着 Spring 将提供方法名称的动态实现，以匹配其 DSL。例如，`findByFirstName(String
    firstName)`将被转换为`Select * from TABLE where first_name= :firstName`。


