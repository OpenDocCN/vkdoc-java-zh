    关于上述博客代码的关键观察点：


    *   为了在 PostgreSQL 数据库中使用 UUID，我们需要通过 SQL 语句在模式中启用它，如 `schema.sql` 文件所述（即 `CREATE
    EXTENSION IF NOT EXISTS uuid-ossp`）。


