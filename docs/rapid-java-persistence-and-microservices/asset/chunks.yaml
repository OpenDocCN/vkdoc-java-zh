    ## Solving the N+1 Problem


    A common problem we generally hear about with respect to ORMs is the N+1 problem.
    This is a misconception that N+1 problem happens only with ORMs. Rather, this
    is a generic data access issue that can happen while fetching data from RDBMS.
    Considering the example from the previous section, if we want to fetch a list
    of users along with their written posts, by default Hibernate is going to fire
    one query to fetch all the users and then N queries to fetch `POST`s of each returned
    user object. This scenario is called the N+1 problem. If you are fetching data
    via JDBC in the form of a parent object list containing a child object list, the
    same problem persists there. There are three ways to query with JPA on entities
    with associations to overcome this problem:


    *   Fetch using the `left fetch join` clause in JPQL

    *   Fetch user objects first and then fetch `POST` objects for these users separately

    *   Fetch as a single combined result mapped to DTOs with a native query


    ### Fetching by Using the Left Fetch Join Clause in JPQL


    This method is going to add a left outer join in the generated query, resulting
    in a Cartesian product of the joined tables. ORM will further map the results
    back to parent and child entity lists. To see this in action, we need to change
    the `CustomerRepository` code from the previous section. In Listing [4-8](#454149_1_En_4_Chapter.xhtml#PC14),
    we add a new custom method with a JPQL query and execute it from the `Application`
    class as an example.


    ```java

    public interface CustomerRepository extends JpaRepository{

    /* N+1 example */

    @Query("Select c from Customer c left join fetch c.orders")

    List findCustomersWithOrderDetails();

    }

    @SpringBootApplication

    @Slf4j

    public class Application implements CommandLineRunner {

    @Autowired

    ProductService productService;

    @Autowired

    CustomerService customerService;

    @Autowired

    OrderRepository orderRepository;

    @Autowired

    CustomerRepository customerRepository;

    @Autowired

    PurchaseHistoryRepository purchaseHistoryRepository;

    @Override

    public void run(String... strings) throws Exception {

    customerService.registerNewCustomers();

    productService.registerNewProducts();

    productService.purchase(1l, 1l, 2, 400);

    productService.saveHistory(1l, 1l);

    log.info("Customers {}", customerService.findAll());

    log.info("Products {}", productService.findAll());

    log.info("Orders {}", orderRepository.findAll());

    log.info("PurchaseHistory {}",

    purchaseHistoryRepository.findAll());

    nPlusOneExample();

    }

    public void nPlusOneExample()   {

    List customerList =

    customerRepository.findCustomersWithOrderDetails();

    log.info("Customers List with Order Details: {}", customerList);

    }

    }

