    var jwtToken = "";

    val email = loginRequest.getEmail();

    val password = loginRequest.getPassword();

    if(!(DEFAULT_PASSWORD.equals(password))

    || (DEFAULT_EMAIL.equals(email)))   {

    // throw error

    }

    jwtToken = Jwts.builder().setSubject(email)

