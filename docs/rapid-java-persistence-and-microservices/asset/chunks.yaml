  trans: '

    Spring Cloud Config（[`https://spring.io/projects/spring-cloud-config`](https://www.spring.io/projects/spring-cloud-config)）是
    Spring Cloud（[`https://projects.spring.io/spring-cloud`](https://www.projects.spring.io/spring-cloud)）总括项目下的一个子项目。Spring
    Cloud Config 使我们能够将远程服务器设置为配置文件的版本化仓库，并通过 URL 或 Spring API 进行访问。换句话说，它允许我们在一个集中管理、安全且可访问的应用中覆盖或扩展任何应用的属性。配置存储理想情况下是一个
    Git 仓库，并且可以在应用运行时进行修改。Spring Cloud Config 项目解决的目标如下：


    *   整个系统的集中化配置管理。


    *   所有应用均可通过 HTTP 访问配置。


    *   配置可以存放在 Git 或 Svn 仓库中。


    *   配置可以存放在数据库中。


    *   配置可以动态重新加载。


    *   配置可以在应用层面轻松实现安全保护，同时也可以通过加密的 REST 方式进行保护。这意味着客户端在从配置服务器访问属性时需要传递凭证，并且配置文件在
    REST 传输过程中会被加密。


    *   特定配置可以被覆盖。这允许我们将默认或本地配置打包在 JAR 中，并将环境或配置文件特定的配置保存在安全的 Git 仓库中。当客户端应用使用指定的配置文件运行时，本地
    `application.properties` 文件中的属性将从 JAR 文件中加载，其余属性将从连接的配置服务器管理的仓库中加载。


    让我们开始从 `config-service` 构建示例应用，其代码结构如下：


    ```

    .

    ├── build.gradle

    ├── gradle

    │   └── wrapper

    │       ├── gradle-wrapper.jar

    │       └── gradle-wrapper.properties

    ├── gradlew

    ├── gradlew.bat

    └── src

    └── main

    ├── java

    │   └── com

    │       └── example

    │            └── config

    │                 └── ConfigApp.java

    └── resources

    ├── application.yml

    └── bootstrap.yml

    ```


    ### 应用设置


    从 [`http://www.spring.io`](http://www.spring.io) 创建一个名为 `config-service` 的新应用，其依赖项如
    `build.gradle` 文件中的列表 6-1 所示。


    ```

    plugins {

    id ''org.springframework.boot'' version ''2.1.3.RELEASE''

    id ''java''

    }

    apply plugin: ''io.spring.dependency-management''

    apply plugin: ''project-report''

    group = ''com.example''

    version = ''1.0''

    sourceCompatibility = ''1.8''

    bootJar {

    baseName = ''config-service''

    version =  ''1.0''

    }

    repositories {

    mavenCentral()

    maven { url ''https://repo.spring.io/milestone'' }

    }

    dependencies {

    implementation ''org.springframework.cloud:spring-cloud-config-server''

    implementation ''de.codecentric:spring-boot-admin-starter-client:2.1.3''

    implementation ''org.springframework.boot:spring-boot-starter-actuator''

    }

    dependencyManagement {

    imports {

    mavenBom "org.springframework.cloud:spring-cloud- dependencies:Greenwich.SR1"

    }

    }

    列表 6-1

    build.gradle 文件

    ```


    目前，无需担心与 Spring Boot Admin 相关的 `spring-boot-admin-starter-client` 和 `spring-boot-starter-actuator`
    依赖项。我将在第 6.6 节中解释这些内容。


    ### 配置


    我们需要为此服务提供两种类型的配置：


    *   在默认的 properties/yml 文件中添加所需的属性。


    *   设置一个新的 Git 仓库。


    #### 配置文件


    Spring Cloud 项目提供了添加一个名为 `bootstrap.yml` 的新文件的功能，以便在加载 `application.yml` 或 `application.properties`
    文件中的属性之前执行任何初始配置。我们将使用 `bootstrap.yml` 来设置 Git 服务器仓库的 URI 以及加密信息（如果有的话）。`bootstrap.yml`
    文件在 `application.yml` 之前加载。我们在代码库中定义了这两个文件，如列表 6-2 所示。


    ```

    bootstrap.yml

    spring:

    application:

    name: config-service

    cloud:

    config:

    server:

    git:

    uri: ${HOME}/work_all/git_repo

    application.yml

    server:

    port: 8888

    servlet.context-path: /config

    spring:

    boot:

    admin:

    client:

    url: http://localhost:7777/admin

    management:

    endpoints:

    web:

    exposure:

    include: "*"

    列表 6-2

    配置文件

    ```


    **注意：**


    *   **spring.application.name** 非常重要，因为它将用作此服务在**服务注册中心**（下一章描述）中的标识符。我将在第 6.3
    节中解释其重要性。


    #### Git 仓库设置


    我们需要设置一个 Git 仓库，用于存储不同服务的配置文件。我在本地系统的 `/Users/raj/work_all/git_repo` 路径下进行设置。请选择您自己偏好的位置。


    为了初始化一个新的 Git 仓库，我们需要进入该目录位置，并在命令行中运行 `git init` 命令。终端应显示以下输出：


    ```

    已初始化空的 Git 仓库于 /Users/raj/work_all/git_repo/.git/

    ```


    现在，让我们在 Git 仓库中覆盖与微服务 `prod` 配置文件相关的属性：


    1.  `${HOME}/work_all/git_repo/inventory-service-prod.properties`


    内容：


    1.  `${HOME}/work_all/git_repo/eshop-prod.properties`


    *   `spring.main.banner-mode= "off"`


    *   `logging.file: logs/config-service.log`


    内容：


    *   `spring.main.banner-mode= "off"`


    *   `logging.file: logs/inventory-service.log`


    注意：


    *   我们将 `eshop` 和 inventory-service 微服务的 `Prod` 配置文件相关属性存储在 Git 仓库的文件中。


    *   这些文件共存于同一位置，即 `resources` 目录下。


    *   `cloud.config.server.git.uri` 属性指定了仓库的位置。


    *   可以暂时忽略 `spring.boot.admin and management.*` 相关的属性。我将在第 6.8 节中解释它们。


    让我们运行应用，并通过 `config-service` 的 URL 访问这些配置。


    ### 引导启动


    我们需要一个简单的 `Application` 类，并在其顶部添加一个名为 `@EnableConfigServer` 的新注解（参见列表 6-3）。


    ```

    package com.example.config;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.cloud.config.server.EnableConfigServer;

    @SpringBootApplication

    @EnableConfigServer

    public class ConfigApp {

    public static void main(String[] args) {

    SpringApplication.run(ConfigApp.class, args);

    }

    }

    列表 6-3

    应用类

    ```


    注意：


    *   `config` 服务受基本安全保护，因为它旨在供微服务内部使用，不对外暴露。这是通过 `bootstrap.yml` 中定义的 [`spring.security.user.name`](http://spring.security.user.name)
    属性设置的（参见列表 6-2）。


    ### 运行 Config-Service 应用


    运行应用：


    ```

    > gradle bootRun

    >

    2019-04-02 07:28:31.317 INFO 25945 --- [          main]

    com.example.config.ConfigApp             : 未设置活动配置文件，回退到默认配置文件：default

    2019-04-02 07:28:32.728 INFO 25945 --- [          main]

    o.s.web.context.ContextLoader            : Root WebApplicationContext: 初始化完成，耗时
    1395 毫秒

    2019-04-02 07:28:33.986 INFO 25945 --- [          main]

    o.s.b.a.e.web.EndpointLinksResolver      : 在基础路径 ''/actuator'' 下暴露了 18 个端点

    2019-04-02 07:28:34.110 INFO 25945 --- [          main]

    o.s.b.w.embedded.tomcat.TomcatWebServer  : Tomcat 已在端口 8888 (http) 上启动，上下文路径为
    ''/config''

    2019-04-02 07:28:34.113 INFO 25945 --- [          main]

    com.example.config.ConfigApp             : ConfigApp 在 3.945 秒内启动完成（JVM 运行了 4.48
    秒）

