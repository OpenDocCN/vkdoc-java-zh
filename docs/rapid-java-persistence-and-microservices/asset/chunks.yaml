    package com.example.kafka;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.kafka.core.KafkaTemplate;

    import org.springframework.scheduling.annotation.Scheduled;

    import org.springframework.stereotype.Service;

    import java.util.Calendar;

    @Service

    @Slf4j

    public class KafkaProducer {

    private static final String TOPIC = "orders";

    @Autowired

    private KafkaTemplate kafkaTemplate;

    @Scheduled(fixedRate = 1000)

    public void sendMessage() {

    String message = "Next order received at " +

    Calendar.getInstance().getTime();

    log.info("Kafka Message sent : {}", message);

    kafkaTemplate.send(TOPIC, message);

    }

    }

    Listing 11-6

    KafkaProducer Class

    ```


    Notes:


    *   `KafkaTemplate<Key, Value>` is the convenience class from Spring Boot that
    performs all operations to Kafka, just like `RabbitTemplate`.


    *   We sent messages to the `orders` topic without creating that topic, as `KafkaTemplate`
    is going to create this topic on its own.


    ### Message Consumer


    Just like with the RabbitMQ consumer in the previous section, we have a small
    bit of code in Listing [11-7](#454149_1_En_11_Chapter.xhtml#PC15) that keeps printing
    the messages received in a log file.


    ```

    package com.example.kafka;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.kafka.annotation.KafkaListener;

    import org.springframework.stereotype.Service;

    import java.io.IOException;

    @Service

    @Slf4j

    public class KafkaConsumer {

    @KafkaListener(topics = "orders", groupId = "order_grp")

    public void consume(String message) throws IOException {

    log.info("Kafka Received :: {}", message);

    }

    }

    Listing 11-7

    Kafka Consumer

    ```


    Notes:


    *   The `@KafkaListener` annotation will activate the `consume()` method to listen
    to all messages received on the `orders` topic.


    *   The `groupId` attribute denotes the name for the consumer group. This way,
    multiple receives can be configured to receive the same message in different groups
    for different processing needs.


