- fmt: "# 12. Java Language and Ecosystem Recap\n\nWe have seen a lot of improvements\
    \ in Java over the years. A lot of these APIs and concepts have been adopted from\
    \ JVM languages. This chapter provides a quick recap of the recent improvements\
    \ to Java that continue to make it the preferred choice for enterprise applications.\n\
    \n## Improvements to Concurrent APIs\n\nIn the modern world of mobile and tiny\
    \ connected digital devices, the need to scale systems is demanding and growing.\
    \ As of today, the basic concurrency constructs are not enough to handle these\
    \ scaling needs. Thus, I briefly explain the concepts that show how Java, at its\
    \ core, is handling this challenge, through concurrency API improvements and by\
    \ adopting concepts from the other popular technologies.\n\n### Basics\n\nThe\
    \ following basic features enable developers to create responsive applications\
    \ and backends that can easily handle a few hundred users with only medium complexity\
    \ code:\n\n*   Java runnables and threads\n*   The `Synchronized` and `volatile`\
    \ keywords\n*   Thread lifecycles\n*   The `Wait`/`Notify` methods\n*   The `Object`\
    \ class\n*   Synchronized collections\n*   The `ThreadLocal` and `Context` patterns\n\
    *   The immutability patterns, such as `Singleton`, `Copy Constructors`, and the\
    \ `Final` keyword\n\n### Features After Java 5\n\nThe following additions to the\
    \ JDK led to better performing apps and higher level concurrency APIs. This made\
    \ the code less complex and more powerful. It could easily handle thousands of\
    \ users. The updated memory model ensures that an initialized `final` field will\
    \ not be accessible to any other thread before initialization.\n\n*   Updated\
    \ memory model, making `Final` and `Volatile` more useful\n*   Locks API\n*  \
    \ `Callable` and `Future`\n*   Executors\n*   New fast concurrent collections,\
    \ including `Queues`, `ConcurrentHashMap`, `CopyOnWriteList`, and `CopyOnWriteSet`\n\
    *   Atomic variables\n*   Synchronizers, including `Semaphore`, `Mutex`, `CyclicBarrier`,\
    \ `CountDownLatch`, `Exchanger`, `Phaser`\n*   `ThreadFactory`\n*   ENUMS, which\
    \ help create immutable singleton constants, although the Bill Pugh Singleton\
    \ approach is preferable\n\n### After Java 5\n\nThese technologies help developers\
    \ to scale services for millions of users easily. Although Reactive programming\
    \ is slowly being adopted in Java due to its large learning curve, it can bring\
    \ real wonders to an application in terms of scaling on minimal hardware.\n\n\
    *   Sync to async via servlet, Netty APIs, and `@Async` annotations in Spring\n\
    *   Parallel operations via ForkJoin\n*   `ExecutorService` to `CompletionService`\n\
    *   `CompletableFuture` for true async operations\n*   `java.util.concurrent.Flow`\
    \ for a Reactive base\n*   Reactive programming frameworks, with popular choices\
    \ such as:\n    *   Spring Reactive\n    *   RxJava\n    *   Vert.x\n    *   Akka\n\
    \n### The Future\n\nSome technologies that show future promise:\n\n*   Kotlin\
    \ Coroutines: Language-level support for coroutines in asynchronous programming\
    \ (see the following section regarding Kotlin).\n*   Fibers, Continuations, Generators,\
    \ and project Loom: Back to the simplicity of the synchronous world, but with\
    \ 1,000 times more power.\n\nProject Loom (`https://openjdk.java.net/projects/loom/`)\
    \ looks quite promising and is inspired from the Go language Coroutines and Fibers\
    \ (`http://docs.paralleluniverse.co/quasar/`). The expectation is that we should\
    \ be able to spawn millions of threads on a single JVM with negligible synchronization.\
    \ These are supposed to be lightweight threads written and managed by JVM only.\
    \ There is no need to depend to operating system-native threads, which become\
    \ quite heavy.\n\n## Other Improvements\n\nThere are quite a few of very distinct\
    \ features that make programming competitive to other languages.\n\n*   There\
    \ is a vast set of Collections APIs in the Java ecosystem. We already had most\
    \ of the commonly needed collections in the JDK itself. Additionally, Apache Commons\
    \ and Google Guava provide many extra and easy features.\n*   Local-variable type\
    \ inference. We had Lombok already giving us the annotation shortcuts to reduce\
    \ boilerplate code, but now we have this feature in JDK as well. We have not used\
    \ this feature in the examples in this book because I wanted to keep them easy\
    \ and verbose.\n*   HTTP Client API has been built-in since JDK 9.\n*   Functional\
    \ programming.\n*   Date Time API.\n*   Lambda functions and Streams API.\n* \
    \  Optionals to void nulls.\n*   Additionally, we have the following JVM languages:\n\
    \    *   Scala\n        *   Less boilerplate and more productive code.\n     \
    \   *   Syntactically magical APIs.\n        *   Safer and powerful concurrency\
    \ model based on actors talking to each other through messages and immutable data\
    \ objects.\n        *   More performant than Java.\n        *   Does well in scripting\
    \ as well as with enterprise development.\n        *   Scala might become a bit\
    \ complicated and may have certain complications integrating with Java code.\n\
    \    *   Kotlin\n        *   Full compatibility with Java APIs.\n        *   Data\
    \ classes provide a precise syntax. For example, `data class Customer(val name:\
    \ String, val email: String)`\n        *   Immutability a first class citizen.\n\
    \        *   Type inference and functional programming.\n        *   Faster compilation.\n\
    \nThere are probably many more features in these languages and their frameworks.\
    \ The idea here is to flesh out the overall richness of the Java ecosystem.\n\n\
    ## Tools and Tips for Productivity\n\nThese tips are mostly based on my personal\
    \ experience and should not be taken as the final say:\n\n*   Choose functional\
    \ versus imperative programming wisely. Functional programming may look attractive\
    \ but will be more complex and require more work and forethought.\n*   If you\
    \ are working on a big enterprise application, working with a single language\
    \ (preferably Java) rather than several is best.\n*   In terms of performance,\
    \ we have seen success with Java through Kafka and Spark-like platforms, and many\
    \ success stories from the industry. Thus, we don’t have to prove Java’s worth\
    \ again with self-generated benchmarks.\n*   Java 10 onwards has type inference\
    \ support, but I still suggest including Lombok, as it has many other annotations\
    \ that improve productivity.\n*   Use JVM languages effectively whenever appropriate\
    \ in your project.\n*   Use IntelliJ or Eclipse Java as the IDE. Working on just\
    \ RESTful microservices does not require most plugins related to J2EE in Eclipse.\n\
    \n## Summary\n\nIn this chapter we reviewed the Java APIs and feature set that\
    \ has been improving productivity every year. We also examined the benefits of\
    \ JVM languages, along with a few productivity tips.\n\nI created this book to\
    \ cover most of the topics that are required to build applications with today’s\
    \ practices. Additionally, it included brief coverage of all the essential topics\
    \ in enterprise development.\n\n### Index\n\n#### A\n\nActuator, Apache Kafka\
    \ build script, consumer definition, `@KafkaListener` annotation, message producer,\
    \ run application, Apache OpenWhisk, API gateway configuration, `@EnableZuulProxy`,\
    \ gateway-service, microservice, run, Zuul filter, `ApiInfo`, APIs, concurrency\
    \ features, JVM languages, Kotlin, tools for productivity, updated memory model\n\
    \n#### B\n\n`BeanPropertyRowMapper` class, `broadcastMessage()` method\n\n####\
    \ C\n\n`CascadeType.ALL`, Cascade type, `DataGenerator`, defined entity, changes,\
    \ entity corrections, `TestCase` class, `CascadeType.REMOVE`, Code reuse, Grade\
    \ file, Java microservices, multi-module project, package managers, product-catalog,\
    \ `uploadArchives`, `CommandLineRunner` interface, Command Query Responsibility\
    \ Segregation (CQRS), Common base repository implementation, `@NoRepositoryBean`,\
    \ `saveAndFlush()` method, `convertToDatabaseColumn` method, `CrudRepository`\n\
    \n#### D\n\nDiscovery service, application bootstrap, code structure, configuration,\
    \ run, setup, `Docket`, Dropwizard framework, `Application` class, `BlogApplication`\
    \ class, `Configuration` class, Gradle project, Model classes, resource class,\
    \ YAML file"
