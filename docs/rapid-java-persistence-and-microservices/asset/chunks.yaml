    \ that can help it do cloud-agnostic microservices development. The intent is\
    \ to make development, deployment, and operational management of cloud-based applications\
    \ as easy as managing local applications. Let’s take a deep dive into exploring\
    \ challenges of the microservices architecture and see how well the Java frameworks\
    \ handle them:\n\n*   Interservice communication\n\n*   Configuration management\n\
    \n*   Service discovery\n\n*   Resiliency\n\n*   Request tracing\n\n*   Microservices\
    \ monitoring\n\n*   Documentation\n\n*   Single point of entry via an API Gateway\n\
    \n*   Code sharing\n\n*   Security\n\nWe will explore the solutions to these challenges\
    \ through an example use case based on our `eshop` example application, which\
    \ we have been building since Chapter [3](#454149_1_En_3_Chapter.xhtml). We will\
    \ be creating a couple of microservices in this chapter:\n\n*   `eshop:` This\
    \ is the customer facing microservice and includes the endpoints to purchase products.\n\
    \n*   `inventory-service`: Manages inventory for different products.\n\n*   `config-service`:\
    \ Any secure configuration can be stored for both `eshop` and inventory services.\n\
    \n*   `admin-service`: This serves as the monitoring service for configured services.\n\
    \n*   `discovery-service`: Common registry for services to register themselves\
    \ and clients can discover nodes hosting those services via their names.\n\n*\
    \   `zuul-service`: Acts as the gateway service by acting as the single access\
    \ point to all requests to the other applications.\n\nJust to give a quick overview,\
    \ we will be extending the example we built in Chapter [4](#454149_1_En_4_Chapter.xhtml),\
    \ Section [4.​1](#454149_1_En_4_Chapter.xhtml#Sec1) (“Multi-Datasource Interaction\
    \ with Spring”) to demonstrate the use of frameworks and libraries for these challenges.\
    \ Functionally, we will programmatically create a new customer, register a few\
    \ new products, and perform a sample order generation by this customer in the\
    \ `eshop` service.\n\nBefore creating an order, `eshop` will check product availability\
    \ by calling another service (`inventory-service`). In order to achieve this,\
    \ the `eshop` service will use the `discovery-service` (Eureka) registry to communicate\
    \ with `inventory-service`. We will also see the library options used to communicate\
    \ with `discovery-service`, i.e., through `Feign` and `Ribbon`.\n\nWe will then\
    \ explore monitoring of `eshop` and `Inventory` services through another service\
    \ (called `admin-service`), which is built on top of the Spring Boot Admin. At\
    \ last, we will see the usage of `gateway-service` , which is built on top of\
    \ Netflix OSS Zuul.\n\nThe directory structure for the services will look like\
    \ this:\n\n```\n.\n└── spring-cloud-ch6\n├─ admin-service\n├─ config-service\n\
    ├─ discovery-service\n├─ eshop\n├─ gateway-service\n├─ inventory-service\n```\n\
    \n## Interservice Communication\n\nIn a monolith application, all the components\
    \ of an application invoke each other directly through language constructs or\
    \ functions. In a distributed system, which is the case with the microservices\
    \ architecture, one of the problems to solve is about inter-process communication.\
    \ This is one of the issues that boosted the use of ESBs (Enterprise Service Busses)\
    \ in the last decade. However, there is still one big difference with the microservices\
    \ architecture. We have multiple services involved in serving a single request\
    \ with microservices, which does not happen normally with a single application.\n\
    \nThe problem becomes more complicated when a small number of large monolithic\
    \ applications turns into many more smaller microservices. Consider an example\
    \ in which a travel agency system involving a customer-facing website, analytics\
    \ application, and an internal application for inventory management turns into\
    \ 20 or more smaller microservices serving the same purpose. With lots of small\
    \ services collaborating in order to fulfill a single user request, there are\
    \ many barriers to communicating quickly and reliably. We will explore a few techniques\
    \ of interprocess communication that are still valid for inter-microservice communication:\n\
    \n*   Synchronous\n    *   Involves calling an HTTP-based API. The caller waits\
    \ for a response.\n\n*   This is also referred to as a request/return-based communication.\n\
    \n*   Asynchronous\n    *   Typically involves messaging protocols like AMQP.\
    \ The caller does not wait for the response.\n\n*   This can also happen via a\
    \ shared database state with split stages in a workflow.\n\n*   Typically involves\
    \ messaging between services with a single receiver (one-to-one; queue based)\
    \ or multiple ones (one-to-many; topic based) for message processing.\n\n*   This\
    \ can also happen in a fire/forget style over HTTP only.\n\nMicroservices are\
    \ small code pieces that are precisely feature focused and developers prefer to\
    \ have a direct point-to-point synchronous communication within services. Consider\
    \ an ecommerce system for example. Creating an order for a product should happen\
    \ synchronously and post-order processing can happen asynchronously with notifications\
    \ going out to the customer upon each order processing event update. Typically,\
    \ this causes a number of other problems, which we mentioned at the start of this\
    \ chapter. In this chapter, we look at solutions through synchronous mechanisms\
    \ only.\n\n## Configuration Management"
  trans: "\n此控制台输出显示了插入并检索到的 `Post` 对象，以及嵌套的 `Comment` 对象。\n\n### 附加功能\n\nSpring 框架还提供了一个基于辅助类的\
    \ API（`MongoTemplate`），它允许可编程接口比 Spring Data MongoDB 拥有更好的控制力。\n\n在我们的示例中，我们使用了\
    \ MongoDB 连接的默认设置，但这可以通过 `@Configuration` 类进行覆盖。Spring Data API 支持的一些重要功能包括：\n\
    \n*   基于 Java 的查询、条件和更新 DSL\n\n*   集成 QueryDSL 以支持类型安全的查询\n\n*   地理空间集成\n\n* \
    \  Map-Reduce 集成\n\n*   JMX 管理和监控\n\n此外，还通过 `ReactiveMongoTemplate` 和响应式 MongoDB\
    \ 仓库支持响应式 MongoDB 访问。我们将在第 8 章详细讨论响应式技术。\n\n## 总结\n\n我们探索了使用 Spring Boot 和 Spring\
    \ Data MongoDB 入门所需的基本 API。Spring 拥有众多项目，可以与几乎所有流行的 NoSQL 数据库进行交互，包括搜索技术（Solr\
    \ 和 ElasticSearch）。下一章将深入探讨微服务开发。\n\n# 6. 深入探讨使用 Java 进行微服务开发\n\n第 2 章介绍了迁移到微服务架构的好处。在本章中，我们将深入探讨如何以\
    \ Spring Boot 为主要框架创建微服务，并重点介绍这种架构面临的挑战。我们还将通过构建多个不同的应用程序，看到结合了各种概念和库（所有这些都与 Spring\
    \ Boot 集成）的解决方案。\n\nSpring 框架有一个有趣的项目（称为 *Spring Cloud*），旨在解决分布式应用程序开发中的问题，尤其是在云部署环境中。微服务是分布式应用程序设计的一个例子，它在服务客户请求时涉及大量的协调工作。Spring\
    \ Cloud 包含通用 API，可以帮助进行与云无关的微服务开发。其目的是使基于云的应用程序的开发、部署和运维管理像管理本地应用程序一样简单。让我们深入探讨微服务架构的挑战，看看\
    \ Java 框架如何处理它们：\n\n*   服务间通信\n\n*   配置管理\n\n*   服务发现\n\n*   弹性\n\n*   请求追踪\n\n\
    *   微服务监控\n\n*   文档\n\n*   通过 API 网关实现单一入口\n\n*   代码共享\n\n*   安全性\n\n我们将通过一个基于\
    \ `eshop` 示例应用程序的用例来探索这些挑战的解决方案，该应用程序自第 3 章以来一直在构建。我们将在本章中创建几个微服务：\n\n*   `eshop`：这是面向客户的微服务，包含购买产品的端点。\n\
    \n*   `inventory-service`：管理不同产品的库存。\n\n*   `config-service`：可以为 `eshop` 和 inventory\
    \ 服务存储任何安全配置。\n\n*   `admin-service`：作为已配置服务的监控服务。\n\n*   `discovery-service`：服务的公共注册中心，服务可以在此注册，客户端可以通过服务名称发现托管这些服务的节点。\n\
    \n*   `zuul-service`：充当网关服务，作为所有请求到其他应用程序的单一访问点。\n\n简单概述一下，我们将扩展在第 4 章第 4.​1 节（“与\
    \ Spring 的多数据源交互”）中构建的示例，以演示用于应对这些挑战的框架和库。在功能上，我们将以编程方式创建一个新客户，注册一些新产品，并由该客户在\
    \ `eshop` 服务中执行一个示例订单生成。\n\n在创建订单之前，`eshop` 将通过调用另一个服务（`inventory-service`）来检查产品可用性。为了实现这一点，`eshop`\
    \ 服务将使用 `discovery-service`（Eureka）注册表与 `inventory-service` 通信。我们还将看到用于与 `discovery-service`\
    \ 通信的库选项，即通过 `Feign` 和 `Ribbon`。\n\n然后，我们将通过另一个服务（称为 `admin-service`）探索对 `eshop`\
    \ 和 `Inventory` 服务的监控，该服务构建在 Spring Boot Admin 之上。最后，我们将看到 `gateway-service` 的用法，它构建在\
    \ Netflix OSS Zuul 之上。\n\n服务的目录结构如下所示：\n\n```\n.\n└── spring-cloud-ch6\n├─ admin-service\n\
    ├─ config-service\n├─ discovery-service\n├─ eshop\n├─ gateway-service\n├─ inventory-service\n\
    ```\n\n## 服务间通信\n\n在单体应用中，应用程序的所有组件通过语言结构或函数直接相互调用。在分布式系统中（微服务架构就是这种情况），需要解决的问题之一是进程间通信。这是过去十年推动\
    \ ESB（企业服务总线）使用的问题之一。然而，微服务架构仍然存在一个很大的不同点。使用微服务时，我们有多个服务参与处理单个请求，这在单个应用程序中通常不会发生。\n\
    \n当少量的大型单体应用转变为更多更小的微服务时，问题变得更加复杂。考虑一个例子，一个旅行社系统，包括一个面向客户的网站、一个分析应用程序和一个用于库存管理的内部应用程序，变成了\
    \ 20 个或更多服务于相同目的的更小微服务。由于有许多小服务协作来完成单个用户请求，快速可靠地通信存在许多障碍。我们将探讨一些仍然适用于微服务间通信的进程间通信技术：\n\
    \n*   同步\n    *   涉及调用基于 HTTP 的 API。调用者等待响应。\n\n*   这也被称为基于请求/返回的通信。\n\n*   异步\n\
    \    *   通常涉及像 AMQP 这样的消息传递协议。调用者不等待响应。\n\n*   这也可以通过工作流中具有拆分阶段的共享数据库状态来实现。\n\n\
    *   通常涉及服务之间的消息传递，可以是单个接收者（一对一；基于队列）或多个接收者（一对多；基于主题）进行消息处理。\n\n*   这也可以仅通过 HTTP\
    \ 以即发即忘的方式发生。\n\n微服务是精确聚焦于功能的代码片段，开发者更倾向于在服务之间进行直接的端到端同步通信。以电子商务系统为例。为产品创建订单应该同步进行，而订单后处理可以异步进行，并在每个订单处理事件更新时向客户发送通知。通常，这会导致许多其他问题，我们在本章开头已经提到过。在本章中，我们仅通过同步机制来探讨解决方案。\n\
    \n## 配置管理\n"
- fmt: "# Spring Cloud Config 配置中心\n\nSpring Cloud Config（[`https://spring.io/projects/spring-cloud-config`](https://www.spring.io/projects/spring-cloud-config)）是\
    \ Spring Cloud（[`https://projects.spring.io/spring-cloud`](https://www.projects.spring.io/spring-cloud)）项目下的一个子项目。Spring\
    \ Cloud Config 使我们能够将远程服务器设置为配置文件的版本化仓库，并通过 URL 或 Spring API 进行访问。换句话说，它允许我们以集中管理、安全且可访问的方式覆盖或扩展任何应用程序的属性。配置存储理想情况下是一个\
    \ Git 仓库，并且可以在应用程序运行时进行修改。Spring Cloud Config 项目解决的目标如下：\n\n- 整个系统的集中配置管理。\n-\
    \ 所有应用程序均可通过 HTTP 访问配置。\n- 配置可以存放在 Git 或 SVN 仓库中。\n- 配置可以存放在数据库中。\n- 配置可以动态重新加载。\n\
    - 配置可以在应用程序层面以及通过加密的 REST 方式轻松实现安全保护。这意味着客户端在从配置服务器访问属性时需要传递凭据，并且配置文件在 REST 传输过程中会被加密。\n\
    - 特定配置可以被覆盖。这允许我们将默认或本地配置打包在 JAR 中，并将环境或配置文件特定的配置保存在安全的 Git 仓库中。当客户端应用程序使用命名配置文件运行时，本地`application.properties`文件中的属性将从\
    \ JAR 文件中加载，其余属性将从连接的配置服务器管理的仓库中加载。\n\n让我们开始从`config-service`构建示例应用程序，其代码结构如下：\n\
    \n```\n.\n├── build.gradle\n├── gradle\n│   └── wrapper\n│       ├── gradle-wrapper.jar\n\
    │       └── gradle-wrapper.properties\n├── gradlew\n├── gradlew.bat\n└── src\n\
    \    └── main\n        ├── java\n        │   └── com\n        │       └── example\n\
    \        │           └── config\n        │               └── ConfigApp.java\n\
    \        └── resources\n            ├── application.yml\n            └── bootstrap.yml\n\
    ```\n\n## 应用程序设置\n\n从[`http://www.spring.io`](http://www.spring.io)创建一个名为`config-service`的新应用程序，其依赖项如`build.gradle`文件中的清单\
    \ 6-1 所示。\n\n```\nplugins {\n    id 'org.springframework.boot' version '2.1.3.RELEASE'\n\
    \    id 'java'\n}\napply plugin: 'io.spring.dependency-management'\napply plugin:\
    \ 'project-report'\ngroup = 'com.example'\nversion = '1.0'\nsourceCompatibility\
    \ = '1.8'\nbootJar {\n    baseName = 'config-service'\n    version =  '1.0'\n\
    }\nrepositories {\n    mavenCentral()\n    maven { url 'https://repo.spring.io/milestone'\
    \ }\n}\ndependencies {\n    implementation 'org.springframework.cloud:spring-cloud-config-server'\n\
    \    implementation 'de.codecentric:spring-boot-admin-starter-client:2.1.3'\n\
    \    implementation 'org.springframework.boot:spring-boot-starter-actuator'\n\
    }\ndependencyManagement {\n    imports {\n        mavenBom \"org.springframework.cloud:spring-cloud-dependencies:Greenwich.SR1\"\
    \n    }\n}\n```\n\n*清单 6-1 build.gradle 文件*\n\n目前，不必担心与 Spring Boot Admin 相关的`spring-boot-admin-starter-client`和`spring-boot-starter-actuator`依赖项。我将在第\
    \ 6.6 节中解释这些内容。\n\n## 配置\n\n此服务需要两种类型的配置：\n\n- 在默认的 properties/yml 文件中添加所需的属性。\n\
    - 设置一个新的 Git 仓库。\n\n### 配置文件\n\nSpring Cloud 项目允许添加一个名为`bootstrap.yml`的新文件，以便在加载`application.yml`或`application.properties`文件中的属性之前执行任何初始配置。我们将使用`bootstrap.yml`来设置\
    \ Git 服务器仓库 URI 和加密信息（如果有的话）。`bootstrap.yml`文件在`application.yml`之前加载。我们在代码库中定义了这两个文件，如清单\
    \ 6-2 所示。\n\n```\nbootstrap.yml\nspring:\n  application:\n    name: config-service\n\
    \  cloud:\n    config:\n      server:\n        git:\n          uri: ${HOME}/work_all/git_repo\n\
    \napplication.yml\nserver:\n  port: 8888\n  servlet.context-path: /config\nspring:\n\
    \  boot:\n    admin:\n      client:\n        url: http://localhost:7777/admin\n\
    management:\n  endpoints:\n    web:\n      exposure:\n        include: \"*\"\n\
    ```\n\n*清单 6-2 配置文件*\n\n**注意：**\n\n- `spring.application.name`非常重要，因为它将用作此服务在服务注册中心（下一章描述）中的标识符。我将在第\
    \ 6.3 节中解释其重要性。\n\n### Git 仓库设置\n\n我们需要设置一个 Git 仓库，用于存储不同服务的配置文件。我在本地系统的`/Users/raj/work_all/git_repo`下进行设置。请选择您喜欢的位置。\n\
    \n为了初始化一个新的 Git 仓库，我们需要进入此目录位置并在命令行运行`git init`命令。终端应显示以下输出：\n\n```\nInitialized\
    \ empty Git repository in /Users/raj/work_all/git_repo/.git/\n```\n\n现在，让我们在 Git\
    \ 仓库中覆盖与微服务相关的`prod`配置文件的属性：\n\n1.  `${HOME}/work_all/git_repo/inventory-service-prod.properties`\n\
    \n内容：\n\n- `spring.main.banner-mode= \"off\"`\n- `logging.file: logs/config-service.log`\n\
    \n2.  `${HOME}/work_all/git_repo/eshop-prod.properties`\n\n内容：\n\n- `spring.main.banner-mode=\
    \ \"off\"`\n- `logging.file: logs/inventory-service.log`\n\n**注意：**\n\n- 我们将`Prod`配置文件相关的属性存储在\
    \ Git 仓库中，分别对应`eshop`和`inventory-service`微服务的文件中。\n- 这些文件共存于同一位置，即`resources`目录中。\n\
    - `cloud.config.server.git.uri`属性指定了仓库的位置。\n- `spring.boot.admin`和`management.*`相关的属性目前可以忽略。我将在第\
    \ 6.8 节中解释它们。\n\n让我们运行应用程序并从`config-service`的 URL 访问这些配置。\n\n## 引导启动\n\n我们需要一个简单的`Application`类，并在其顶部添加一个名为`@EnableConfigServer`的新注解（参见清单\
    \ 6-3）。\n\n```\npackage com.example.config;\n\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.cloud.config.server.EnableConfigServer;\n\
    \n@SpringBootApplication\n@EnableConfigServer\npublic class ConfigApp {\n    public\
    \ static void main(String[] args) {\n        SpringApplication.run(ConfigApp.class,\
    \ args);\n    }\n}\n```\n\n*清单 6-3 应用程序类*\n\n**注意：**\n\n- `config`服务受基本安全保护，因为它旨在供微服务内部使用，不对外部世界公开。这是通过`bootstrap.yml`中定义的`spring.security.user.name`属性设置的（参见清单\
    \ 6-2）。\n\n## 运行 Config-Service 应用程序\n\n运行应用程序：\n\n```\n> gradle bootRun\n>\n\
    2019-04-02 07:28:31.317 INFO 25945 --- [          main]\ncom.example.config.ConfigApp\
    \             : No active profile set, falling back to default profiles: default\n\
    2019-04-02 07:28:32.728 INFO 25945 --- [          main]\no.s.web.context.ContextLoader\
    \            : Root WebApplicationContext: initialization completed in 1395 ms\n\
    2019-04-02 07:28:33.986 INFO 25945 --- [          main]\no.s.b.a.e.web.EndpointLinksResolver\
    \      : Exposing 18 endpoint(s) beneath base path '/actuator'\n2019-04-02 07:28:34.110\
    \ INFO 25945 --- [          main]\no.s.b.w.embedded.tomcat.TomcatWebServer  :\
    \ Tomcat started on port(s): 8888 (http) with context path '/config'\n2019-04-02\
    \ 07:28:34.113 INFO 25945 --- [          main]\ncom.example.config.ConfigApp \
    \            : Started ConfigApp in 3.945 seconds (JVM running for 4.48)\n2019-04-02\
    \ 07:28:34.197 WARN 25945 --- [gistrationTask1]\n```"
  raw: 'Spring Cloud Config ( [`https://spring.io/projects/spring-cloud-config`](https://www.spring.io/projects/spring-cloud-config)
    ) is a project under the umbrella project Spring Cloud ( [`https://projects.spring.io/spring-cloud`](https://www.projects.spring.io/spring-cloud)
    ). Spring Cloud Config enables us to set up a remote server as a versioned repository
    of configuration files and access it via an URL or Spring APIs. In other words,
    this allows us to override or extend the properties of any application in a centrally
    managed, secured, and accessible application. The configuration store is ideally
    a Git repository and can be modified at application runtime. The objectives that
    the Spring Cloud Config project solves are as follows:


    *   Centralized configuration management for the whole system.


    *   Configuration accessible by all applications via HTTP.


    *   Configuration can reside in a Git or Svn repository.


    *   Configuration can reside in a database.


    *   Configuration can be dynamically reloaded.


    *   Configuration can be secured easily at the application level as well as using
    REST via encryption. That means the clients will need to pass credentials while
    accessing the properties from the config server and the config files will be encrypted
    at REST.


    *   Specific configurations can be overridden. This allows us to keep default
    or local configurations packaged in a JAR and keep environment- or profile-specific
    ones in a secured Git repo. When the client application runs with a named profile,
    properties from the local `application.properties` file will be loaded from the
    Jar file and any remaining properties will be loaded from the connected config
    server managed repository.


    Let’s start building our example app from `config-service` with the following
    code structure:


    ```

    .

    ├── build.gradle

    ├── gradle

    │   └── wrapper

    │       ├── gradle-wrapper.jar

    │       └── gradle-wrapper.properties

    ├── gradlew

    ├── gradlew.bat

    └── src

    └── main

    ├── java

    │   └── com

    │       └── example

    │            └── config

    │                 └── ConfigApp.java

    └── resources

    ├── application.yml

    └── bootstrap.yml

    ```


    ### Application Setup


    Create a new application called `config-service` from [`http://www.spring.io`](http://www.spring.io)
    with the dependencies shown in Listing [6-1](#454149_1_En_6_Chapter.xhtml#PC3)
    in the `build.gradle` file.


    ```

    plugins {

    id ''org.springframework.boot'' version ''2.1.3.RELEASE''

    id ''java''

    }

    apply plugin: ''io.spring.dependency-management''

    apply plugin: ''project-report''

    group = ''com.example''

    version = ''1.0''

    sourceCompatibility = ''1.8''

    bootJar {

