    ```


    注意：


    *   我们已经在第 6.8.4 节中了解了 ZuulFilter。此外，我们还添加了代码，用于使用相同的签名对称密钥解码和提取令牌。


    *   如果密钥被篡改，我们将无法再次解码，因此身份验证将在网关级别中断。


    *   一旦我们验证了令牌，我们将其作为请求中的标头发送回去。


    #### 测试网关认证


    重启 `gateway-service` 后，通过 `CURL` 运行以下命令来验证并访问 `eshop` 服务的 `/api/orders` API。


    ```

    curl -H "Authorization:

    eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJyYWpAZXhhbXBsZS5jb20iLCJyb2xlcyI6ImFkbWluNTIzfQ.p4FzUPRKUi2NT00OrWQxWv760i4eB2LK0_fcWexlDos"
    -i -X POST

    http://localhost:9999/eshop/ api/orders

    HTTP/1.1 201

    Location: http://localhost:8081/eshop/api/orders/2

    Date: Sun, 07 Apr 2019 03:47:24 GMT

    Transfer-Encoding: chunked

    ```


    这些结果是在示例运行后收集的，表明我们在第 6.10.1.2 节中收到的令牌已成功验证。这也表明 `eshop` 服务 API 已响应。让我们也看看如果在请求中发送无效令牌，`gateway-service`
    的行为。


    ```

    curl -H "Authorization: WRONG_TOKEN" -i -X POST http://localhost:9999/eshop/api/
    orders

    HTTP/1.1 401

    Transfer-Encoding: chunked

    Date: Sun, 07 Apr 2019 03:56:28 GMT

    API 密钥无效

    ```


    如果请求中发送的令牌无效，我们将收到此消息。


    ## 总结


    我们涵盖了基本概念（包括问题和解决方案），以帮助您开始使用 Java 和 Spring Cloud 作为微服务栈。还有更多框架可以处理我们在本章中讨论的问题。我建议您也更详细地探索
    Netflix OSS。在本书的下一部分中，我们将研究与扩展 Java 相关的技术和概念。


    # 第三部分让 HTTP 更快


    # 7. Java GraphQL 开发


    GraphQL 是一种 API 查询语言，也是一个使用现有数据来执行这些查询的运行时。GraphQL 由 Facebook 于 2012 年开发，并于 2015
    年公开发布。最近围绕 GraphQL 有了很多发展，特别是自 AWS Cloud AppSync 等工具和 Prisma 等框架出现以来。GraphQL 的主要目的是处理
    RESTful API 设计中的问题，并使 HTTP 通信更快。


    GraphQL 不采用多个基于 URL 的约定，而是基于单个端点通过 `POST` 接受所有请求，其数据结构类似于 JSON 的图状结构。GraphQL 有自己的模式定义语言（SDL），它使用标准类型、验证以及检索和更新这些模型的操作来定义数据模型。GraphQL
    遵循 CQRS（命令查询职责分离）设计模式，该模式指出，最好将与读取数据相关的代码与更新数据的代码分开。这保持了职责的清晰。用于读取和写入的领域对象也可以与用于更新数据存储的对象不同。

