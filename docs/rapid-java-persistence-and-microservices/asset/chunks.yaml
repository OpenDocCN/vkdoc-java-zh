    ### An `@ManyToMany` Example


    We need to modify the `POST` entity and introduce a new entity called `File` (see
    Listing [3-15](#454149_1_En_3_Chapter.xhtml#PC20)). That way, one `POST` can have
    multiple files (attachments) and one file can be linked to multiple `POST`s. As
    an example, once a file is uploaded to the system, users should be able to attach
    it to any `POST`.


    ```

    package com.example.blog_app.model.jpa;

    import com.fasterxml.jackson.annotation.JsonIgnore;

    import lombok.*;

    import javax.persistence.*;

    import java.util.Set;

    @Data

    @Builder

    @NoArgsConstructor

    @AllArgsConstructor

    @ToString(exclude = {"posts"})

    @EqualsAndHashCode(exclude = {"posts"})

    @Entity

    public class File {

    @Id

    @GeneratedValue(strategy = GenerationType.IDENTITY)

    private Long id;

    private String name;

    @JsonIgnore

    @ManyToMany(cascade = {CascadeType.MERGE,CascadeType.REFRESH}, fetch = FetchType.LAZY)

    @JoinTable(

    name = "post_files",joinColumns = {

    @JoinColumn(name = "file_id", referencedColumnName = "id")},

    inverseJoinColumns={

    @JoinColumn(name = "post_id", referencedColumnName = "id")})

    private Set posts;

    }

