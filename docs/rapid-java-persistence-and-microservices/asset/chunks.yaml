    ## Monitoring in the Microservices Architecture


    Management and monitoring of the production applications is a vast topic and we
    will only discuss the easy options available in frameworks to support our continued
    example so far. We have an open source web-based application called Spring Boot
    Admin (SBA) for basic monitoring of Spring Boot applications. The information
    it provides through its UI is quite extensive.


    The magic actually happens at first through another project, called the Spring
    Boot *Actuator*. The Actuator contains the services that keep collection metrics
    data from JVM and other system components. The Actuator also exposes the RESTful
    endpoints through which the same collected information can be directly viewed.
    The SBA application has been built as a UI on top of these Actuator endpoints.
    Table [6-1](#454149_1_En_6_Chapter.xhtml#Tab1) shows a list of endpoints in the
    Actuator.


    Table 6-1


    The Actuator Endpoints


    | Endpoint ID | Description |

    | --- | --- |

    | `auditevents` | Exposes audit events (e.g. `auth_success`, `order_failed`) for
    your application. |

    | `info` | Displays information about your application. |

    | `health` | Displays your application’s health status. |

    | `metrics` | Shows various metrics information of your application. |

    | `loggers` | Displays and modifies the configured loggers. |

    | `logfile` | Returns the contents of the log file (if `logging.file` or `logging.pathproperties`
    are set). |

    | `httptrace` | Displays HTTP trace info for the last 100 HTTP requests/responses.
    |

    | `env` | Displays current environment properties. |

    | `flyway` | Shows details of Flyway database migrations. |

    | `liquidbase` | Shows details of Liquibase database migrations. |

    | `shutdown` | Lets you shut down the application gracefully. |

    | `mappings` | Displays a list of all `@RequestMapping` paths. |

    | `scheduledtasks` | Displays the scheduled tasks in your application. |

    | `threaddump` | Performs a thread dump. |

    | `heapdump` | Returns a GZip-compressed JVM heap dump. |


    By default, the Actuator endpoints are exposed over the path `{/contextPath}/actuator/*`.
    **SBA** has two APIs to enable this feature in applications—Server and Client.
    The SBA client API keeps gathering and sending the monitoring metrics data collected
    from the Actuator endpoints to configured SBA Server continuously. Because of
    this, we need to enable the Actuator in all the applications that we want to monitor
    with SBA. In our example case, we need the following two steps:


    1.  Create a new service called `admin-service`.


    2.  Configure the existing `eshop` and `inventory-service` applications as `admin-service`
    clients.


    The `admin-service` client we will create in this section is probably the smallest
    of all services we have built so far in this chapter. The code structure for this
    application is as follows:


    ```

    .

    ├── build.gradle

    ├── gradle

    │   └── wrapper

    │       ├── gradle-wrapper.jar

    │       └── gradle-wrapper.properties

    ├── gradlew

    ├── gradlew.bat

    └── src

    └── main

    ├── java

    │   └── com

    │       └── example

    │            └── admin

    │                 └── AdminApp.java

    └── resources

    └── application.yml

    ```


    ### Application Setup


    Create a new app called `admin-service` from [`http://www.spring.io`](http://www.spring.io)
    with the changes shown in Listing [6-24](#454149_1_En_6_Chapter.xhtml#PC47) in
    the `build.gradle` file.


    ```

    bootJar {

    baseName = ''admin-service''

    version =  ''1.0''

    }

    dependencies {

    compile("org.springframework.boot:spring-boot-starter-web")

    compile("de.codecentric:spring-boot-admin-server:2.1.3")

    compile("de.codecentric:spring-boot-admin-server-ui:2.1.3")

    compile("org.projectlombok:lombok:1.18.6")

    }

    Listing 6-24

    The build.gradle File

    ```


    As we see the dependencies, this is not a Spring project but another open source
    project under the Apache 2 license ( [`https://github.com/codecentric/spring-boot-admin`](https://github.com/codecentric/spring-boot-admin)
    ).


    ### Configuration


    Apart from common settings, we need to enable the basic security through Spring
    to secure access to its UI, as per Listing [6-25](#454149_1_En_6_Chapter.xhtml#PC48).


    ```

    server:

    port: 7777

    spring:

    application:

    name: admin-service

    boot:

    admin:

    context-path: /admin

    client:

    username: user

    password: secret

    Listing 6-25

    Application.yml

    ```


    ### Application Class


    We need to enable the admin server functionality by adding the `@EnableAdminServer`
    annotation to the top of the `Application` class , which we do in Listing [6-26](#454149_1_En_6_Chapter.xhtml#PC49).


    ```

    package com.example.admin;

    import de.codecentric.boot.admin.server.config.EnableAdminServer;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.EnableAutoConfiguration;

    import org.springframework.context.annotation.Configuration;

    @Configuration

    @EnableAutoConfiguration

    @EnableAdminServer

    public class AdminApp {

    public static void main(String[] args) {

    SpringApplication.run(AdminApp.class, args);

    }

    }

    Listing 6-26

    Application Class

    ```


    ### Admin Service Client


    We need to add the Spring Boot Admin client configuration settings in the `application.yml`
    file of all the other microservices that we need to monitor via this service.
    In our example case, let’s add the properties in `eshop`**,** `inventory-service`**,**
    `config-service`, and `discovery-service`, **as** shown in Listing [6-27](#454149_1_En_6_Chapter.xhtml#PC50).


    ```

    spring:

    boot:

    admin:

    client:

    url: http://localhost:7777/admin

    management:

    endpoints:

    web:

    exposure:

    include: "*"

    Listing 6-27

    Application.yml

    ```


    Notes:


    *   The `management.endpoints.web.exposure.*` properties are from the library
    Spring Boot Actuator. We can specify a comma-separated list of the endpoint names
    from Table [6-1](#454149_1_En_6_Chapter.xhtml#Tab1) in Section [6.6](#454149_1_En_6_Chapter.xhtml#Sec32).
    Specifying `*` means we are exposing all the endpoint data over HTTP.


    *   The `spring.boot.admin.client.*` properties are related to the SBA client,
    which keeps sending data collected from these exposed Actuator endpoints on a
    regular interval to the configured admin server URL (note the `client.url` property).'
