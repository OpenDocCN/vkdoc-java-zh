    package com.example.blog_app.constants;

    import org.hibernate.HibernateException;

    import org.hibernate.engine.spi.SharedSessionContractImplementor;

    import org.hibernate.usertype.EnhancedUserType;

    import org.hibernate.usertype.ParameterizedType;

    import org.postgresql.util.PGobject;

    import java.io.Serializable;

    import java.sql.PreparedStatement;

    import java.sql.ResultSet;

    import java.sql.SQLException;

    import java.sql.Types;

    import java.util.Properties;

    public class PgEnumType implements EnhancedUserType, ParameterizedType {

    private Class enumClass;

    public void setParameterValues(Properties parameters) {

    String enumClassName = parameters.getProperty("enumClassName");

    try {

    enumClass = (Class) Class.forName(enumClassName);

    } catch (ClassNotFoundException cnfe) {

    throw new HibernateException("Enum class not found", cnfe);

    }

    }

    public Object assemble(Serializable cached, Object owner)

    throws HibernateException {

    return cached;

    }

    public Object deepCopy(Object value) throws HibernateException {

    return value;

    }

    public Serializable disassemble(Object value) throws HibernateException {

    return (Enum) value;

    }

    public boolean equals(Object x, Object y) throws HibernateException {

    return x == y;

    }

    public int hashCode(Object x) throws HibernateException {

    return x.hashCode();

    }

    @Override

    public Object nullSafeGet(ResultSet rs, String[] names,

    SharedSessionContractImplementor session, Object owner) throws HibernateException,

    SQLException {

    Object object = rs.getObject(names[0]);

    if (rs.wasNull()) {

    return null;

    }

    if (object instanceof PGobject) {

    PGobject pg = (PGobject) object;

    return Enum.valueOf(enumClass, pg.getValue());

    }

    if (object instanceof String) {

    return Enum.valueOf(enumClass, String.valueOf(object));

    }

    return null;

    }

    @Override

    public void nullSafeSet(PreparedStatement st, Object value, int index,

    SharedSessionContractImplementor session) throws HibernateException, SQLException
    {

    if (value == null) {

    st.setNull(index, Types.VARCHAR);

    } else {

    st.setObject(index, ((Enum) value), Types.OTHER);

    }

    }

    public boolean isMutable() {

    return false;

    }

    public Object replace(Object original, Object target, Object owner)

    throws HibernateException {

    return original;

    }

    public Class returnedClass() {

    return enumClass;

    }

    public int[] sqlTypes() {

    return new int[]{Types.VARCHAR};

    }

    public Object fromXMLString(String xmlValue) {

    return Enum.valueOf(enumClass, xmlValue);

    }

    public String objectToSQLString(Object value) {

    return ''\" + ((Enum) value).name() + ''\";

    }

    public String toXMLString(Object value) {

    return ((Enum) value).name();

    }

    }

    ```

    Listing 3-6: Defining a Custom Type as a Hibernate User Type to Map Enums


    Note the three methods:


    - `setParameterValues`: We are reading a property named `enumClassName` and loading
    its target class by reflection.

    - `nullSafeGet`: In the PostgreSQL API, custom datatypes can be retrieved as a
    `PGobject` and the enum value can be mapped through this object.

    - `nullSafeSet`: This method resets the enum value in `PreparedStatement`.


    We will use this code in the next section and show the outcome.


