- fmt: '### Using `CascadeType.ALL` and What to Avoid


    The meaning of `CascadeType.ALL` is that the persistence context will propagate
    (cascade) all `EntityManager` operations (`PERSIST`, `REMOVE`, `REFRESH`, `MERGE`,
    and `DETACH`) to the related entities.


    Detailed `Cascade` type descriptions are as follows:


    - `PERSIST`: If the parent entity is persisted into the persistence context, the
    related entity will also be persisted.

    - `MERGE`: If the parent entity is merged into the persistence context, the related
    entity will also be merged.

    - `REFRESH`: If the parent entity is refreshed in the current persistence context,
    the related entity will also be refreshed.

    - `DETACH`: If the parent entity is detached from the persistence context, the
    related entity will also be detached.

    - `REMOVE`: If the parent entity is removed from the current persistence context,
    the related entity will also be removed.

    - `ALL`: All descriptions are applied to related entities.


    Cascading is the most sensitive setting, as in the case of update and removal,
    unexpected behavior can also happen. As an example with `CascadeType.REMOVE`,
    sometimes you may want child table rows to exist even when the parent is being
    deleted, especially for some other relationships with other tables.


    Let’s look at a negative example to explain the impact of using `CascadeType.All`
    with the changes in the entity associations code from the previous section (see
    Listing [3-11](#454149_1_En_3_Chapter.xhtml#PC15)).


    ```

    public class Blog  implements Serializable {

    @OneToMany(fetch = FetchType.LAZY, cascade = CascadeType.ALL,

    orphanRemoval = true, mappedBy = "blog")

    private Set posts;

    }

    public class Post  implements Serializable {

    @ManyToOne(fetch = FetchType.LAZY, cascade = CascadeType.ALL)

    @JoinColumn(name = "blog_id")

    private Blog blog;

    @ManyToOne(fetch = FetchType.LAZY, cascade = CascadeType.ALL)

    @JoinColumn(name = "author_id")

    private User user;

    }

    public class User  implements Serializable {

    @OneToMany(fetch = FetchType.LAZY, cascade = {CascadeType.ALL},

    mappedBy = "user", orphanRemoval = true)

    private Set posts;

    }

    Listing 3-11

    Entity Changes to Reflect Illegal Deletions in Database

    ```


    Notes:


    - We marked `cascade=CascadeType.ALL` for all the associations in the code.

    - Any deletion to the `POST` entity object will trigger a deletion to the related
    `Blog` object, which will further trigger a deletion of all related `POST` and
    `USER` objects. Ultimately, it’s a mess to delete everything.

    - Deleting the `POST` entity will also trigger deletion of all related users,
    even if the users from those are connected to other posts.


    In order to test the code both positively and negatively, we have to define two
    supporting classes—`DataGenerator` (see Listing [3-12](#454149_1_En_3_Chapter.xhtml#PC16))
    and `TestCase` (see Listing [3-13](#454149_1_En_3_Chapter.xhtml#PC17)). This class
    generates sample blogs, along with users and their posts.


    ```

