    #### PostgreSQL 中的枚举数据类型及 JPA 映射


    通常需要将字面常量以字符串形式存储在数据库中，并将其映射到 Java 的枚举类型。在接下来的示例中，我们将使用 Java `enum` 类型，因此本节先花点时间了解其正确用法。


    如果我们通过 `POST` 实体定义等方式，将 Java 枚举以序数形式映射并存储到 PostgreSQL 数据库中，处理起来会很简单。如果我们希望通过 JPA
    按原样存储枚举值（字符串字面量），则需要额外步骤，本节将对此进行说明。例如，如果 Java 代码中有以下枚举：


    ```

    public enum PostStatus implements Serializable {

    ACTIVE(1), NOT_ACTIVE(2);

    }

    ```


    我们可以在数据库中存储数字（1, 2）并保持映射关系，或者存储字符串（`ACTIVE`, `NOT_ACTIVE`）。PostgreSQL 数据库提供了 `ENUM`
    数据类型，因此理想情况下，我们应该在数据库中创建一个枚举类型，以映射到 Java 对象字段。我们需要将枚举添加到 `schema.sql` 中（参见清单 3-5）。


    ```

    drop type if exists post_status_enum;

    Create type post_status_enum as ENUM (''ACTIVE'', ''NOT_ACTIVE'');

    create table if not exists post  (

    id serial primary key not null,

    blog_id int,

    title varchar(150),

    content text,

    "user" int,

    postStatus post_status_enum default ''ACTIVE''

    );

    清单 3-5

    向模式脚本中添加枚举

    ```


    为了将它们映射到 Java 枚举，我们需要定义一个新的用户类型。用户类型是 Hibernate 中用于定义自定义数据类型的功能。清单 3-6 展示了此示例的实现方式。定义完成后，可以在枚举字段上使用
    `@Type` 注解（参见清单 3-8），将其映射到代码和数据库字段。

