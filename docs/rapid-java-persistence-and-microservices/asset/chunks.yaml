    Notes:


    *   The `config` service is protected by basic security, as this is meant to be
    used internally by microservices and not exposed to the outside world. This is
    set through the [`spring.security.user.name`](http://spring.security.user.name)
    property as defined in `bootstrap.yml` (see Listing [6-2](#454149_1_En_6_Chapter.xhtml#PC4)).


    ### Running the Config-Service Application


