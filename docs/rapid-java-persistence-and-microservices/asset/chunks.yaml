    8 章中讨论。


    此外，还提供了基于 Spring Data DSL 的查询生成，这意味着 Spring 将提供方法名称的动态实现，以匹配其 DSL。例如，`findByFirstName(String
    firstName)` 将被转换为 `Select * from TABLE where first_name= :firstName)`。


