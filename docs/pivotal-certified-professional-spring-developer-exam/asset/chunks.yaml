    *   由于统一的接口，几乎不需要对资源和基本操作 API 进行文档记录。\n*   使用 REST 并不意味着客户端需要特定的库才能与服务器通信。使用 REST，只需要一个网络连接。\n\
    \nREST 服务可以受到保护，但由于客户端和服务器之间的交互是无状态的，因此凭证必须嵌入到每个请求头中。基本身份验证是在无需额外库的情况下最容易实现的（HTTP\
