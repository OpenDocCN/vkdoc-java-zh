    6. Spring Web


    在前面的章节中，描述了多层风格的项目。在服务层之上始终是表示层，即 Web 层。该层是应用程序的顶层，其主要功能是将用户操作转换为较低层可以理解的命令，并将它们的结果转换为用户可理解的数据。Web
    应用程序可以使用客户端（如浏览器）或能够正确解释应用程序提供的接口的特定应用程序（如移动应用程序）进行访问。到目前为止，本书只介绍了特定于较低层的 Spring
    组件。本章将浅析特定于表示层的组件，这些组件用于构建用户界面和实现安全性。


    Spring 也通过 Spring Web MVC 和 Spring WebFlow 等框架为 Web 层的开发提供支持。一个典型的 Java Web 应用程序架构如图
    6-1 所示。


    ![A978-1-4842-0811-3_6_Fig1_HTML.jpg](img/A978-1-4842-0811-3_6_Fig1_HTML.jpg)


    图 6-1.


    典型的 Java Web 应用程序架构


    可以有更多层，但通常 Web 应用程序至少包含以下三层：


    *   DAO 层，其中定义了数据映射组件（领域对象或实体类）。

