    John.Cusack@pet.com\", user.getEmail());\n        }\n    }\n    ```\n\n*   **POST**:\
    \ method used to create a new resource. When the resource being created requires\
    \ a parent that does not exist, a 404 (Not found) status code is returned.[^(22)](#A978-1-4842-0811-3_7_Chapter.html#Fn22)\
    \ When an identical resource already exists, a 409 (Conflict) status code is returned.\
    \ When the resource was created correctly, a 201 (Created) status code is returned.\
    \ In Figure [7-24](#A978-1-4842-0811-3_7_Chapter.html#Fig24), the POST request\
    \ and response contents are depicted.\n\n    ![A978-1-4842-0811-3_7_Fig24_HTML.jpg](A978-1-4842-0811-3_7_Fig24_HTML.jpg)\n\
