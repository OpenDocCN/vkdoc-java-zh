    \ JSP 页面的实现，以隐藏包含指向详情视图 URL 的成员 ID 列。\n\nSpring Boot\n\nSpring Boot 是一组预配置的框架/技术，旨在减少样板配置（基础设施），并提供一种快速启动和运行\
    \ Spring Web 应用程序的方法。它的目标是通过提供开箱即用的基础设施 bean，让开发人员专注于实现实际所需的功能，而不是如何配置应用程序。在 Spring\
    \ Boot 官方页面¹⁶上，给出了一个 REST 应用程序作为示例，只需不到 20 行代码就能得到一个可运行的应用程序。令人印象深刻，对吧？而这仅仅是使用\
    \ Spring Boot 的优势之一。\n\nSpring Boot 使开发人员更容易构建可立即运行的、独立的、生产级别的应用程序。Spring Boot\
    \ 可用于创建打包为 `jar` 并可使用 `java -jar` 运行的应用程序，或者创建可部署在应用服务器上的典型 war 打包项目。新特性是 Web\
    \ 归档文件也可以使用 `java -jar` 执行。Spring Boot 的主要关注点在于：\n\n*   在极短的时间内为 Spring 项目搭建基础设施。\n\
    \n*   提供默认的通用基础设施配置，但随着应用程序的增长，允许轻松地偏离默认配置。因此，任何默认配置都可以很容易地被覆盖。\n\n*   提供一系列适用于广泛项目的非功能性特性（嵌入式服务器、安全性、指标、健康检查、外部化配置）。\n\
    \n*   消除对 XML 和代码配置的需求。\n\n在本书编写时，Spring Boot 的当前稳定版本是 1.4.0.RELEASE，它适用于 JDK\
    \ 7+。在本书中，将使用源代码版本 1.4.1.BUILD-SNAPSHOT。\n\n配置\n\nSpring Boot 可以像任何 Java 库一样使用。它可以作为依赖项添加到项目中，因为它不需要任何特殊的集成工具，并且可以在任何\
    \ IDE 中使用。Spring Boot 提供了“starter” POM 来简化项目的 Maven 配置。当使用 Maven 时，项目必须将 `spring-boot-starter-parent`\
    \ 作为父项目，以便提供有用的 Maven 默认值。由于本书附带的源代码使用 Gradle，因此支持 Gradle 也非常合适。对于 Gradle，无需指定父项目，但\
