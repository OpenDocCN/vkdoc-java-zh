    *   **服务层**（也称为业务层），其中包含所有用于将用户数据转换并传递给 DAO 层的类。业务实体是辅助此转换的 POJO。该层的所有组件都实现了数据的创建、显示、存储和更改方式。


    *   **表示层**，其中包含实现和显示用户界面以及管理用户交互的组件。


    Spring Web MVC 是一个流行的、基于请求驱动的框架，它遵循**模型-视图-控制器**软件架构模式，旨在解耦那些协同工作以构成完整用户界面的组件。典型的模型-视图-控制器行为如图
    6-2 所示。


    ![A978-1-4842-0811-3_6_Fig2_HTML.jpg](img/A978-1-4842-0811-3_6_Fig2_HTML.jpg)


    图 6-2.

    典型的 MVC 行为


    MVC 的主要思想是存在三个解耦的组件。每个组件都可以轻松替换为不同的实现，并且它们共同提供所需的功能。**视图**代表用户与之交互的界面。它显示数据并将请求传递给**控制器**。**控制器**调用业务组件并将数据发送给**模型**，模型通知视图需要进行更新。模型的内容由视图显示。


    Spring Web MVC 的核心是 `DispatcherServlet` 类，它是每个 Spring Web 应用程序的入口点。它将请求分派给处理器，并支持可配置的处理器映射、视图解析、区域设置、时区以及文件上传。`DispatcherServlet`
    将 HTTP 请求转换为控制器组件的命令，并同时管理渲染后的数据。它基本上充当了整个应用程序的**前端控制器**。前端控制器软件设计模式的基本思想是存在一个处理请求的集中点，如图
    6-3 所示。


    ![A978-1-4842-0811-3_6_Fig3_HTML.jpg](img/A978-1-4842-0811-3_6_Fig3_HTML.jpg)


    图 6-3.

    前端控制器软件设计模式思想


    Spring Web MVC 为这种行为的实现提供了已配置好的 Bean，这些 Bean 包含在两个主要模块中：


    *   `spring-web.jar`

    *   `spring-webmvc.jar`


    使用标准的 Servlet 监听器来启动和关闭 Spring 应用程序上下文。在任何请求发出之前，应用程序上下文将被创建并注入到 `DispatcherServlet`
    中；当应用程序停止时，Spring 上下文也会被优雅地关闭。Spring Servlet 监听器类是 `org.springframework.web.context.ContextLoaderListener`。


    Spring Web MVC 是 Spring 的 Web 框架，因此使用 Spring 典型的配置风格，并且控制器组件是 Bean。从 Spring 2.5
    开始，引入了注解配置，因此可以使用专门的构造型注解 `@Controller` 来声明控制器组件。Spring 应用程序可以部署在应用服务器上，可以在像 Jetty
    这样的嵌入式服务器上运行，也可以使用 Spring Boot 运行。本章将涵盖这三种方式。


    Spring 可以与其他框架集成：


    *   **Struts 2**：一个基于 Apache 的开源框架，用于基于模型-视图-控制器（MVC）设计范式构建 Servlet/JSP Web 应用程序。该框架的先前版本
    Struts 1 已于 2016 年停止维护，但 Struts 2 仍然活跃，并且根据其官方网站公告，2016 年 7 月 7 日发布了 2.5.2 GA
    版本。更多信息请访问官方网站 [`https://struts`](https://struts.apache.org/) `.` [`apache.org/`](https://struts.apache.org/)
    `.`

    *   **Wicket**：另一个来自 Apache 的开源 Java Web 框架，诞生于 2004 年，至今仍然活跃；2016 年 8 月 5 日发布了
    1.5.16 版本。该框架的设计以简洁和关注点分离为主要目标。更多信息请访问官方网站 [`http://wicket`](http://wicket.apache.org/)
    `.` [`apache.org/`](http://wicket.apache.org/) `.`

    *   **Tapestry 5**：一个面向组件的框架，用于在 Java 中创建高度可扩展的 Web 应用程序，同样由 Apache 支持。更多信息请访问官方网站
    [`http://tapestry.apache.org/`](http://tapestry.apache.org/) `.`

    *   **Spring WebFlow**：一个 Spring 框架，专为实现有状态流程而设计，适用于需要通过顺序步骤导航来执行业务任务的应用程序。更多信息请访问官方网站
    [`http://projects.spring.io/spring-webflow/`](http://projects.spring.io/spring-webflow/)
    。


    使用 Spring Web MVC 编写和运行 Web 应用程序就像编写前几章中简单的独立应用程序一样容易。Spring 为启动 Web 应用程序所需的一切提供了基础设施
    Bean，甚至提供了一个名为 Spring Boot 的框架，它通过提供已设置好默认通用配置的基础设施 Bean，使得创建独立的、生产级的基于 Spring
    的应用程序变得简单。所有这些都将在本章中介绍，但请记住，本章只是触及了该主题的表面，因为 Spring Web MVC 是 Pivotal 认证 Spring
    Web 应用程序开发人员考试的主题之一，为此，Apress 出版了另一本书。¹


    Spring Web 应用程序配置


    当用户访问一个 URL 时，会向托管在应用服务器上的 Web 应用程序生成一个 HTTP 请求。基于该请求，必须在应用程序上下文内执行一个操作。执行操作的结果被返回，并且需要使用视图来表示。在
    Spring Web 应用程序中，所有 HTTP 请求首先到达 `DispatcherServlet`。根据配置，会调用一个处理器，它是名为控制器的类的一个方法。结果用于填充模型，该模型被返回给
    `DispatcherServlet`，后者根据另一组配置决定使用哪个视图来显示结果。


    此过程如图 6-4 所示。


    ![A978-1-4842-0811-3_6_Fig4_HTML.jpg](img/A978-1-4842-0811-3_6_Fig4_HTML.jpg)


    图 6-4.

    Spring Web 应用程序中的请求处理步骤


    `DispatcherServlet` 是应用程序的入口点，是 Spring Web MVC 的核心，它协调所有请求处理操作。它相当于 Struts 中的
    `ActionServlet` 和 JEE 中的 `FacesServlet`²。它将职责委托给 Web 基础设施 Bean，并调用用户 Web 组件。它是可定制和可扩展的。当使用旧式
    XML 配置应用程序时，必须在 `web.xml` 中定义 `DispatcherServlet`。当使用无 `web.xml` 的配置时，必须声明一个扩展了
    `AbstractDispatcherServletInitializer` 或 `AbstractAnnotationConfigDispatcherServletInitializer`
    的配置类。这两个是来自 `org.springframework.web.servlet.support` 包的 Spring 专用类，它们实现了 `org.springframework.web.WebApplicationInitializer`。实现此接口的类型的对象会被
    `SpringServletContainerInitializer` 自动检测到，而 `SpringServletContainerInitializer`
    会被每个 Servlet 3.0+ 环境自动引导。本章将介绍更多关于用于引导 Spring 和配置 `DispatcherServlet` 的专用类，并提供关于每种使用场景的上下文信息。

    '
- fmt: '`DispatcherServlet`使用 Spring 进行配置，因此必须通过接口进行编程，以便轻松替换不同的实现。


    `DispatcherServlet`会创建一个独立的“servlet”应用程序上下文，其中包含所有特定的 Web Bean（控制器、视图、视图解析器）。此上下文也称为
    Web 上下文或 `DispatcherServletContext`。


    应用程序上下文也称为 `RootApplicationContext`。它包含所有非 Web Bean，并通过类型为 `org.springframework.web.context.ContextLoaderListener`
    的 Bean 进行实例化。这两个上下文之间的关系是父子关系，其中应用程序上下文是父级。因此，Web 上下文中的 Bean 可以访问父上下文中的 Bean，但反之则不行。[³](#A978-1-4842-0811-3_6_Chapter.html#Fn3)
    当一个应用程序定义了多个 Servlet 时（例如，一个处理 Web 请求，另一个处理 Web 服务调用），这种分离非常有用，因为它们都可以从根应用程序上下文继承
    Bean。


    当然，根上下文中的 Bean 可以包含在 Web 上下文中，但大多数非平凡的 Spring 应用程序需要为 Web 部分和非 Web 部分设置独立的上下文，因为通常应用程序的
    Web 部分只是整个应用程序的一小部分，而生产应用程序有许多位于 Web 上下文之外的关注点。


    `DispatcherServlet`使用一些称为处理映射的基础设施 Bean 来识别要调用的控制器方法，并使用处理程序适配器来调用它。描述调用序列的抽象图如图
    [6-5](#A978-1-4842-0811-3_6_Chapter.html#Fig5) 所示。


    ![A978-1-4842-0811-3_6_Fig5_HTML.jpg](A978-1-4842-0811-3_6_Fig5_HTML.jpg)


    **图 6-5.** 处理 HTTP 请求的抽象 UML 图


    在 Spring MVC 2.5 之前的版本中，所有配置都是使用 XML 完成的，并且控制器类必须继承 `org.springframework.web.servlet.mvc.AbstractController`
    Spring 类。在 Spring 2.5 中，引入了新的 @MVC 模型和对注解的支持。配置仍然依赖于 XML 来定义 MVC 基础设施特定的 Bean，但控制器类不再需要继承
    Spring 专用类，因为只需使用原型注解 `@Controller` 对其进行注解，Spring 就能知道它们的用途。从 Spring 3.0 开始，引入了
    Java 配置，这导致完全移除了 XML 配置。几乎完全移除。因为 Java Web 应用程序的典型配置文件 `web.xml` 仍然需要。从 Servlet
    3.0 开始，`web.xml` 也不再需要了。


    本书更侧重于 Web 应用程序的 @MVC 和 Java 配置，因为 XML 将来可能会被弃用。本书将浅尝辄止地介绍 XML 配置主题，仅让您对其有所了解。


    ## 快速入门


    以下是开发 Spring Web MVC 应用程序通常采取的步骤：


    *   开发后端应用程序 Bean（服务和 DAO）及配置

    *   开发 MVC 功能 Bean，也称为控制器或处理程序，其中包含用于处理 HTTP 请求的方法（也称为处理程序方法）

    *   开发用于显示处理程序返回结果的视图（通常是 `*.jsp` 文件）

    *   声明并配置 MVC 基础设施 Bean

    *   配置 Web 应用程序


    ## 控制器


    控制器是定义用于处理 HTTP 请求的方法的类。它们使用 Spring 原型注解 `@Controller` 进行注解。每个处理程序方法都使用 `@RequestMapping`
    进行注解，该注解提供了关于何时应调用此方法的信息。在以下代码片段中，定义了一个控制器类，其中包含一个处理程序方法，当用户发送具有以下 URL 的请求时，将调用该方法：


    `http://localhost:8080/mvc-basic/users/list`


    该 URL 包含以下元素：


    *   `http` 是 HTML 协议定义

    *   `localhost` 是安装应用服务器的机器名称/域名/IP

    *   `8080` 是访问应用服务器的端口

    *   `mvc-basic` 是 Web 应用程序上下文

    *   `/users/list` 是请求映射值


    ```

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Controller;

    import org.springframework.ui.Model;

    import org.springframework.web.bind.annotation.RequestMapping;

    import org.springframework.web.bind.annotation.RequestMethod;

    ...

    @Controller

    public class UserController {

    @Autowired

    private UserService userService;

    /**

    * Handles requests to list all users.

    */

    @RequestMapping(value = "/users/list", method = RequestMethod.GET)

    public String list(Model model) {

    logger.info("Populating model with list...");

    model.addAttribute("users", userService.findAll());

    //string used to identify the view

    return "users/list";

    }

    }

    ```


    Spring 提供了一种通过 `@RequestMapping` 注解的 `method` 属性来指定应调用处理程序方法的 HTTP 请求类型的方法。[⁴](#A978-1-4842-0811-3_6_Chapter.html#Fn4)
    映射规则通常基于 URL，并且还可以包含通配符和正则表达式。`@RequestMapping` 也可以在类级别使用，以便在映射具有公共元素时简化方法级别的映射。例如，如果您有许多具有公共模式
    `/users` 的 `@RequestMapping` 方法，则 `UserController` 类可以使用 `@RequestMapping("/users")`
    进行注解，如下面的代码片段所示。


    ```

    ...

    @Controller

    @RequestMapping("/users")

    public class UserController {

    //matches http://localhost:8080/mvc-basic/users/list

    @RequestMapping(value = "/list", method = RequestMethod.GET)

    public String list(Model model) { ...}

    //matches http://localhost:8080/mvc-basic/users/105

    @RequestMapping(value = "/{id:\\d*}", method = RequestMethod.GET)

    public String show(Long id, Model model) {

    ...

    }

    }

    ```


    处理程序方法具有灵活的方法签名，其参数提供有关请求上下文的信息。当调用处理程序方法时，Spring 将透明地提供参数。根据 URL 类型，可以使用不同的注解来告诉
    Spring 要使用哪些值。


    *   URL（统一资源定位符）


    `http://localhost:8080/mvc-basic/showUser?userId=105`


    由具有使用 `@RequestParam` 注解的参数的方法处理，因为请求是参数化的。如果 URL 参数名称与方法参数名称不同，则使用该注解来告知 Spring。


    > **注意**

    >

    > 在这种情况下，约定是如果 `@RequestParam` 注解中未指定参数名称，则请求参数名称与方法参数名称相同。


    *   URI（统一资源标识符）是一种更简洁的 URL 请求参数。从 Spring 3.0 开始支持处理 URI。


    ```

    import org.springframework.web.bind.annotation.RequestParam;

    ...

    @Controller

    @RequestMapping("/users")

    public class UserController {

    @RequestMapping(value = "/showUser", method = RequestMethod.GET)

    public String show(@RequestParam("userId") Long id, Model model) {

    ...

    }

    }

    ```


    `http://localhost:8080/mvc-basic/users/105`


    上述 URI 由具有使用 `@PathVariable` 注解的参数的方法处理，因为请求 URI 包含一个可变部分。该部分称为路径变量，由 `@RequestMapping`
    注解定义。如果路径参数名称与方法参数名称不同，则使用该注解来告知 Spring。


    > **注意**

    >

    > 在这种情况下，约定是如果 `PathVariable` 注解中未指定路径变量名称，则路径变量名称与方法参数名称相同。'
  raw: "The `DispatcherServlet`\nuses Spring for its configuration, so programming\
    \ using interfaces is a\nmust to allow swapping different implementations easily.\n\
    \nThe `DispatcherServlet`\ncreates a separate “servlet” application context containing\
    \ all specific\nweb beans (controller, views, view resolvers). This context is\
    \ also\ncalled the web context or the\nDispatcherServletContext.\n\nThe application\
    \ context is also called RootApplicationContext . It contains\nall non-web beans\
    \ and is instantiated using a bean of type `org.springframework.web.context.ContextLoaderListener`.\n\
    The relationship between the two contexts is a parent–child\nrelationship, with\
    \ the application context being the parent. Thus, beans\nin the web context can\
    \ access the beans in the parent context, but not\nconversely.[³](#A978-1-4842-0811-3_6_Chapter.html#Fn3)\
    \ This\nseparation is useful when there is more than one servlet defined for an\n\
    application, for example, one that handles web requests and one that\nhandles\
    \ web services calls, because they can both inherit beans from the\nroot application\
    \ context.\n\nOf course, the beans in the root context can be included in the\
    \ web\ncontext, but most nontrivial Spring applications require separate\ncontexts\
    \ for the web and the non-web part of the application, since\nusually the web\
    \ part of an application is only a small part of the\noverall application, production\
    \ applications having many concerns that\nlie outside the web context.\n\nThe\
    \ `DispatcherServlet`\nuses some infrastructure beans called handling mappings\
    \ to identify a\ncontroller method to call and handler adapters to call it. An\
    \ abstract\ndiagram describing the call sequence is depicted in Figure [6-5](#A978-1-4842-0811-3_6_Chapter.html#Fig5).\n\
    \n![A978-1-4842-0811-3_6_Fig5_HTML.jpg](A978-1-4842-0811-3_6_Fig5_HTML.jpg)\n\n\
    Figure 6-5.\n\nAbstract UML diagram for handling a HTTP request\n\nIn the Spring\
    \ MVC versions previous to 2.5, all configuration was done\nusing XML, and the\
    \ controller classes had to extend the `org.springframework.web.servlet.mvc.AbstractController`\n\
    Spring class. In Spring 2.5, the new @MVC model and support for\nannotations were\
    \ introduced. Configuration still relied on XML for MVC\ninfrastructure-specific\
    \ beans, but controller classes no longer need to\nextend the Spring specialized\
    \ class, since only annotating them with the\nstereotype annotation `@Controller`\
    \ was\nenough for Spring to know what they are used for. Starting with Spring\n\
    3.0, Java Configuration was introduced, which led to totally removing\nXML configuration.\
    \ Almost. Because the `web.xml` typical\nconfiguration file for a Java web application\
    \ was still needed. Starting\nwith Servlet 3.0, `web.xml` is no longer\nneeded\
    \ as well.\n\nThis book focuses more on @MVC and Java Configuration for web\n\
    applications, since XML is probably going to be dropped in the future.\nThe surface\
    \ will be scratched a little on the XML configuration topic,\njust to give you\
    \ an idea.\n\nQuickstart\n\nThese are the usual steps taken to develop a Spring\
    \ Web MVC application:\n\n*   develop backend application beans (service and DAO)\
    \ and configuration\n\n*   develop MVC functional beans, also known as controllers\
    \ or handlers, that contain methods also\n    known as handler methods, which\n\
    \    will be used to handle HTTP requests\n\n*   develop views used to display\
    \ the results returned by handlers (common\n    *.jsp files)\n\n*   declare and\
    \ configure MVC infrastructure beans\n\n*   configure the web application\n\n\
    Controllers\n\nControllers are classes that define methods used to handle HTTP\n\
    requests. They are annotated with the stereotype Spring annotation `@Controller`.\
    \ Each\nhandler method is annotated with `@RequestMapping`,\nwhich provides information\
    \ regarding when this method should be called.\nIn the following code snippet\
    \ a controller class is defined, containing\none handler method, which will be\
    \ called when the user sends a request\nwith the following URL:\n\n`http://localhost:8080/mvc-basic/users/list`\n\
    \nThe URL contains the following elements:\n\n*   `http` is HTML\n    protocol\
    \ definition\n\n*   `localhost` is\n    the name/domain/IP of the machine where\
    \ the application server is\n    installed\n\n*   `8080` is the\n    port where\
    \ the application server can be accessed\n\n*   `mvc-basic` is\n    the web application\
    \ context\n\n*   `/users/list` is\n    the request mapping value\n\n```\nimport\
    \ org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Controller;\n\
    import org.springframework.ui.Model;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
    import org.springframework.web.bind.annotation.RequestMethod;\n...\n@Controller\n\
    public class UserController {\n@Autowired\nprivate UserService userService;\n\
    /**\n* Handles requests to list all users.\n*/\n@RequestMapping(value = \"/users/list\"\
    , method = RequestMethod.GET)\npublic String list(Model model) {\nlogger.info(\"\
    Populating model with list...\");\nmodel.addAttribute(\"users\", userService.findAll());\n\
    //string used to identify the view\nreturn \"users/list\";\n}\n}\n```\n\nSpring\
    \ provides a way to specify the type of HTTP request on which the\nhandler method\
    \ should be called, via the method attribute of the `@RequestMapping`\nannotation.[⁴](#A978-1-4842-0811-3_6_Chapter.html#Fn4)\
    \ The\nmapping rules are usually URL based and they can also contain wildcards\n\
    and regular expressions. The `@RequestMapping` can\nalso be used at class level,\
    \ to simplify mappings at method level when\nthe mappings have common elements.\
    \ For example, in case you have many\n`@RequestMapping`\nmethods with the common\
    \ pattern /users, the `UserController` class\ncan be annotated with `@RequestMapping(\"\
    /users\")]`,\nsituation depicted in the code snippet below.\n\n```\n...\n@Controller\n\
    @RequestMapping(\"/users\")\npublic class UserController {\n//matches http://localhost:8080/mvc-basic/users/list\n\
    @RequestMapping(value = \"/list\", method = RequestMethod.GET)\npublic String\
    \ list(Model model) { ...}\n//matches http://localhost:8080/mvc-basic/users/105\n\
    @RequestMapping(value = \"/{id:\\\\d*}\", method = RequestMethod.GET)\npublic\
    \ String show(Long id, Model model) {\n...\n}\n}\n```\n\nThe handler methods have\
    \ flexible signatures with parameters that\nprovide information about the request\
    \ context. Spring will transparently\nprovide arguments when the handler methods\
    \ are called. Depending on the\nURL type, different annotations can be used to\
    \ tell Spring what values\nto use.\n\n*   URL (Uniform Resource Locator)\n\n`http://localhost:8080/mvc-basic`\n\
    \    `/showUser?userId=105`\n\nIs handled by a method that has a parameter annotated\
    \ with `@RequestParam` because\nthe request is parametrized. If the url parameter\
    \ has a name different\nfrom the method parameter, the annotation is used to inform\
    \ Spring of\nthat.\n\nCC\n\nThe convention in this case is that if the name of\
    \ the parameter is not\nspecified in the `@RequestParam`\nannotation, then the\
    \ request parameter is named the same as the method\nparameter.\n\n*   URI (Uniform\
    \ Resource Identifier) is a cleaner URL request parameters.\n    Handling URIs\
    \ is supported starting with Spring 3.0.\n\n```\nimport org.springframework.web.bind.annotation.RequestParam;\n\
    ...\n@Controller\n@RequestMapping(\"/users\")\npublic class UserController {\n\
    @RequestMapping(value = \"/showUser\", method = RequestMethod.GET)\npublic String\
    \ show(@RequestParam(\"userId\") Long id, Model model) {\n...\n}\n}\n```\n\n`http://localhost:8080/mvc-basic`\n\
    `/users/105`\n\nThe previous URI is handled by a method that has a parameter annotated\n\
    with `@PathVariable` because\nthe request URI contains a piece that is variable.\
    \ That piece is called\na path variable and is defined\nby the `@RequestMapping`\n\
    annotation. If the path parameter has a name different from the method\nparameter,\
    \ the annotation is used to inform Spring of that.\n\nCC\n\nThe convention in\
    \ this case is that if the name of the path variable\nname is not specified in\
    \ the `PathVariable`\nannotation, then the path variable is named the same as\
    \ the method\nparameter."
