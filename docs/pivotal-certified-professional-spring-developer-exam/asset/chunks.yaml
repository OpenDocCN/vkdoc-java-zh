    7. Spring 高级主题


    在前面的章节中，Spring 处理的对象是在 JVM 上创建的。用户使用 HTTP 协议间接访问和操作这些对象。在这种情况下，最终用户访问 JVM 中对象所需的只是应用程序的
    Web 界面。


    远程处理（Remoting）和 Web 服务是应用程序之间通信的方式。应用程序可以在同一台计算机、不同的计算机、不同的网络上运行，甚至可以用不同的语言编写（例如，Python
    应用程序可以使用 Java 应用程序提供的 Web 服务）。在远程处理中，通信的应用程序彼此了解。存在一个服务器应用程序和一个客户端应用程序。因此，它支持状态管理选项，可以关联来自同一客户端的多个调用，并支持回调。在客户端应用程序上，会创建服务器目标对象的代理，并使用它来访问服务器上的对象。远程处理可以跨任何协议使用，但在防火墙方面表现不佳。远程处理依赖于包含数据类型信息的公共语言运行时程序集的存在。这限制了必须传递的关于对象的信息，并允许按值或按引用传递对象。通信使用二进制、XML
    或 JSON 格式完成。所有这些限制使得远程处理在编写本书时已相当过时。Web 服务已完全取代了它们。

