    模型包含用于填充视图的数据。Spring 提供了视图解析器来实现这一点，以避免与特定的视图技术绑定。Spring 开箱即用地支持 JSP、Velocity
    模板和 XSLT 视图。实现此功能所需使用的接口是 `ViewResolver` 和 `View`。前者提供了视图名称与实际视图之间的映射。后者负责准备请求并将其转发给视图技术。`DispatcherServlet`
    委托给 `ViewResolver` 来将逻辑视图名称映射到视图实现。Spring 开箱即用地提供了几个视图解析器实现。所有处理器方法必须解析为一个对应某个文件的逻辑视图名称，要么通过显式返回一个
    `String`、`View` 或 `ModelAndView` 实例，要么基于内部约定隐式确定。Spring 提供的核心视图解析器是 `InternalResourceViewResolver`；它是默认的视图解析器。在
    `spring-webmvc.jar` 内部有一个名为 `DispatcherServlet.properties` 的文件，其中声明了所有默认的基础设施
    Bean。如果你查找默认的视图解析器，你会找到前面提到的实现：


    ```

    org.springframework.web.servlet.ViewResolver=

    org.springframework.web.servlet.view.InternalResourceViewResolver

    ```


    可以通过向 `DispatcherServlet` 注册一个 `ViewResolver` Bean 来覆盖默认实现。默认的视图解析器实现也是可定制的，并且可以配置为在不同的位置查找视图模板文件。前面的代码片段返回字符串值作为视图名称。在图
    6-6 中，描述了视图解析的配置和机制。


    ![A978-1-4842-0811-3_6_Fig6_HTML.jpg](img/A978-1-4842-0811-3_6_Fig6_HTML.jpg)


    图 6-6.


    自定义内部资源视图解析器示例


    上图描述了 `DispatcherServlet`、`UserController` 以及由开发者配置的 `InternalResourceViewResolver`
    Bean 如何协同工作以生成视图。每个动作都有一个编号，步骤如下所述：


    1.  `DispatcherServlet` 识别出处理 `users/list` GET 请求的处理器方法，并请求 `UserController` 的方法来处理该请求。


    2.  执行处理器方法，并将逻辑视图名称 `users/list` 以及一个包含名为 `users` 的集合的模型对象返回给 `DispatcherServlet`。请注意，`model={users}`
    是一种表示法，意味着 `users` 对象包含在模型对象中。


    3.  `DispatcherServlet` 询问 `InternalResourceViewResolver`，`users/list` 这个逻辑视图名称对应哪个视图模板。


    4.  `InternalResourceViewResolver`（配置如下所示）获取逻辑视图名称，应用前缀 `(/WEB-INF/)` 和后缀 `(.jsp)`，并将结果
    `(/WEB-INF/users/list.jsp)`（即视图模板的物理路径）发送给 `DispatcherServlet`。


    5.  `DispatcherServlet` 将进一步使用 `InternalResourceViewResolver` 提供的视图模板以及从 `UserController`
    接收到的模型对象来创建一个视图。


    总结到目前为止的所有内容，为了能够完全深入 Spring MVC 配置，要配置一个 Spring Web 应用程序，你必须执行以下操作：


    *   在 `web.xml` 文件中将 `DispatcherServlet` 定义为应用程序的主 Servlet，它将处理所有请求，并将其链接到 Spring
    配置；或者通过使用实现 `WebApplicationInitializer` 的类以编程方式配置此 Servlet（仅在 Servlet 3.0+ 环境中可行）。


    *   定义应用程序配置（通常在一个名为 `mvc-config.xml` 的 Spring 配置文件中，或者一个 Java 配置类中），该配置应包含以下内容：


    *   定义所使用的 MVC 上下文（处理器适配器、处理器映射和其他基础设施 Bean）


    *   定义一个（或多个）视图解析器


