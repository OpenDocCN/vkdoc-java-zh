    \ 是 JUnit `org.junit.rules.MethodRule` 的一个实现，它支持 Spring 测试上下文框架的实例级别和方法级别特性。`@Rule`\
    \ 注解用于引用规则或返回规则的字段。字段必须是 public、非 static 且是 `TestRule` 或 `org.junit.rules.MethodRule`\
    \ 的实现；方法必须是 public、非 static 且返回 `TestRule` 或 `MethodRule` 的实现。\n\n最终的测试类如下代码片段所示：\n\
