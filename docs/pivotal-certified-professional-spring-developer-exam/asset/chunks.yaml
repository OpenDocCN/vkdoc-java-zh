    \ IDEA插件部分。只需在搜索框中输入`SoapUI`，当插件出现在列表中时，单击`Install`按钮。\n\n![A978-1-4842-0811-3_7_Fig18_HTML.jpg](A978-1-4842-0811-3_7_Fig18_HTML.jpg)\n\
    \nFigure 7-18. The plugins sections of Intellij IDEA\n\n插件的安装将需要重新启动IntelliJ IDEA。重启后，将出现两个SoapUI选项卡。从Tools\
    \ ➤ SoapUI ➤ Start SoapUI菜单启动SoapUI，然后打开SoapUI Navigator选项卡并创建一个SOAP项目。需要SOAP接口的WSDL位置以及项目的名称。创建新项目的对话框如图[7-19](#A978-1-4842-0811-3_7_Chapter.html#Fig19)所示。\n\
    \n![A978-1-4842-0811-3_7_Fig19_HTML.jpg](A978-1-4842-0811-3_7_Fig19_HTML.jpg)\n\
    \nFigure 7-19. The SoapUI plugin interface for creating projects\n\n该项目将使用WSDL信息生成一个请求用户信息的骨架消息。由于应用程序在请求用户时使用电子邮件地址作为条件，SoapUI不知道在骨架消息中放入什么数据，因此它只是用问号替换缺失的电子邮件。开发人员必须在发送请求之前用电子邮件（例如，`John.Cusack@pet.com`）替换该问号。接收包含用户电子邮件的消息的应用程序会提取用户信息并将用户类型发送回去。因此，将问号替换为有效的电子邮件，然后单击图[7-20](#A978-1-4842-0811-3_7_Chapter.html#Fig20)中用红色包围的绿色箭头按钮，返回的消息将显示在右侧的文本区域中。\n\
    \n![A978-1-4842-0811-3_7_Fig20_HTML.jpg](A978-1-4842-0811-3_7_Fig20_HTML.jpg)\n\
    \nFigure 7-20. The SoapUI Navigator interface for sending a SOAP message\n\nSOAP是所有Web服务接口的前身，尽管REST正在迅速普及，但它不会很快消失，因为最近引入的SOAP\
    \ 1.2已经修复了该技术的许多公认缺点，并将其推向了新的采用和易用性水平。此外，从1.2版本开始，W3C组织不再将SOAP缩写为简单对象访问协议（Simple\
    \ Object Access Protocol）；它现在只是规范的名称。REST使用HTTP/HTTPS协议，但SOAP的主要优点是比它更灵活，因为它几乎可以使用任何传输协议来发送消息，甚至JMS。SOAP的主要缺点是使用XML，XML冗长且需要大量时间来解析。因此，即使它不是官方考试的一部分，本节内容也可能对您未来的项目有所帮助。本节没有实际应用，但欢迎您修改`userMessage.xsd`模式，生成更复杂的`UserMessage`对象，并在`UserMessageEndpoint`类中添加更多请求。\n\
    \n## Spring REST\n\nREST是REpresentational State Transfer（表述性状态转移）的缩写。它由Roy Fielding在2000年的博士论文中引入并定义。REST是RPC（远程过程调用）和Web服务（SOAP、WSDL等）等机制的轻量级替代方案。REST是一种用于设计网络化（分布式）应用程序的架构风格。其理念是，不是使用CORBA、RPC或SOAP等复杂机制在机器之间连接，而是使用简单的HTTP在机器之间进行调用。RESTful应用程序使用HTTP请求来发布数据（创建和/或更新）、读取数据（例如，进行查询）和删除数据。因此，REST对所有四种CRUD（创建/读取/更新/删除）操作都使用HTTP。\n\
    \nWeb应用程序不仅被浏览器客户端使用。程序化客户端可以使用HTTP进行连接（例如，移动应用程序以及基本上任何开发为能够使用HTTP作为通信协议请求和接收数据的应用程序）。REST架构风格描述了通过HTTP公开Web服务的最佳实践；它不仅用作传输协议，还用作应用程序协议。使用了以下HTTP规范："
  raw: 'To test the application, a test class can be written, and Spring

    web-services-specific components such as the `WebTemplate` can be

    used to make development practical. The application is written using

    Spring Boot, so it is only logical to use Spring Boot to test it. The

    `SpringBootTest`

    annotation is used on the test class that runs Spring-Boot-based tests

    and searches for Spring Boot configuration classes that will be used to

    create a Spring boot test context. The `@LocalServerPort` is a

    Spring Boot annotation that can be used at the field or

    method/constructor parameter level to inject the HTTP port that was

    allocated at runtime. This value is needed in the test method to create

    the URL where the web service to be tested is exposed.


    ```

    import org.springframework.boot.context.embedded.LocalServerPort;

    import org.springframework.boot.test.context.SpringBootTest;

    import org.springframework.oxm.jaxb.Jaxb2Marshaller;

    import org.springframework.test.context.junit4.SpringRunner;

    import org.springframework.util.ClassUtils;

    import org.springframework.ws.client.core.WebServiceTemplate;

    import static org.assertj.core.api.Assertions.assertThat;

    @RunWith(SpringRunner.class)

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    public class ApplicationTest {

    private static final Logger logger = LoggerFactory.getLogger(Application.class);

    //used to deserialize Web Service messages

    private static final Jaxb2Marshaller marshaller = new Jaxb2Marshaller();

    private static final WebServiceTemplate ws = new WebServiceTemplate(marshaller);

    @LocalServerPort

    private int port;

    @BeforeClass

    public void init() throws Exception {

    marshaller.setPackagesToScan(

    ClassUtils.getPackageName(GetUserRequest.class));

    marshaller.afterPropertiesSet();

    }

    @Test

    public void testSendAndReceive() {

    GetUserRequest request = new GetUserRequest();

    request.setEmail("John.Cusack@pet.com");

    Object responseObject = ws.marshalSendAndReceive(

    "http://localhost:" + port + "/ws", request);

    assertThat(responseObject).isNotNull();

    assertThat(responseObject instanceof GetUserResponse).isTrue();

    GetUserResponse response = (GetUserResponse) responseObject;

    assertThat(response.getUserType()).isEqualTo(UserType.BOTH);

    }

    }

    ```


    The `WebServiceTemplate`

    class is the equivalent of `RestTemplate` and

    `JdbcTemplate`

    for Web Services. It is the central class for client-side Web services

    and provides a message-driven approach to sending and receiving `WebServiceMessage`

    messages. It simplifies access to web services, since it extracts the

    object from the SOAP message body using marshallers/unmarshallers. The

    `WebServiceTemplate`

    object needs to serialize/deserialize messages and needs a `JAXB2Marshaller` to

    transform the messages from XML to Java Objects and vice versa. To test

    a SOAP interface and actually see the messages in XML form, the SoapUI[^(12)](#A978-1-4842-0811-3_7_Chapter.html#Fn12)

    application can be used as a client or the `curl` command in

    Unix-based systems. The SoapUI team also developed a plugin for IntelliJ

    IDEA, which can be installed from the IntelliJ IDEA Preferences menu.

    The interface of the standalone SoapUI is very similar to the plugin

    interface, so the images in this section will also be helpful in case

    you do not use IntelliJ IDEA for development. In Figure [7-18](#A978-1-4842-0811-3_7_Chapter.html#Fig18),
    the

    IntelliJ IDEA Plugin section from the Preferences menu is depicted. Just

    insert `SoapUI`

    in the search box, and when the plugin appears in the list, click the

    `Install` button.


    ![A978-1-4842-0811-3_7_Fig18_HTML.jpg](A978-1-4842-0811-3_7_Fig18_HTML.jpg)


    Figure 7-18.


    The plugins sections of Intellij IDEA


    The installation of the plugin will require a restart of Intellij IDEA.

    After the restart, two SoapUI tabs will appear. Start SoapUI from the

    Tools ➤ SoapUI ➤ Start SoapUI

    menu, and then open the SoapUI Navigator tab and create a SOAP

    project. The WSDL location of the SOAP interface is required as is a

    name for the project. The dialog to create a new project is depicted in

    Figure [7-19](#A978-1-4842-0811-3_7_Chapter.html#Fig19).


    ![A978-1-4842-0811-3_7_Fig19_HTML.jpg](A978-1-4842-0811-3_7_Fig19_HTML.jpg)


    Figure 7-19.


    The SoapUI plugin interface for creating projects


    The project will use the WSDL information to generate a skeleton message

    requesting information about a user. Since the application uses an email

    address as a criterion when requesting a user, SoapUI does not know what

    data to put in the skeleton message, so it just replaces the missing

    email with a question mark. The developer must replace that question

    mark with an email (e.g., John.Cusack@pet.com) before sending the

    request. The application receiving a message containing the user email

    extracts information about the user and sends the user type back. So

    replace the question mark with a valid email and click the green arrow

    button surrounded with red in Figure [7-20](#A978-1-4842-0811-3_7_Chapter.html#Fig20),
    and the

    returned message will be displayed in the text area on the right.


    ![A978-1-4842-0811-3_7_Fig20_HTML.jpg](A978-1-4842-0811-3_7_Fig20_HTML.jpg)


    Figure 7-20.


    The SoapUI Navigator interface for sending a SOAP message


    SOAP is the precursor of all Web services interfaces, and although REST

    is rapidly gaining ground, it is not going away anytime soon, since SOAP

    1.2, which was recently introduced, has fixed many of the perceived

    shortcomings of the technology and is pushing it to new levels of both

    adoption and ease of use. Also, starting with version 1.2, the acronym

    SOAP no longer stands for Simple Object Access Protocol from the W3C

    organization; it is now just the name of the specification. REST uses

    HTTP/HTTPs protocols, but SOAP has the main advantage of being more

    flexible than that, since it can use almost every transport protocol to

    send a message, even JMS. The main disadvantage of SOAP is only the use

    of XML, which is verbose and takes a lot of time to be parsed.

    Therefore, even if it is not part of the official exam, this section

    might be useful to you in your future projects. There is no practical

    application for this section, but you are welcome to modify the `userMessage.xsd`

    schema and generate a more complex `UserMessage` object

    and add some more requests in the `UserMessageEndpoint`

    class.


    Spring REST


    REST is an acronym for REpresentational State Transfer. It was introduced and
    defined

    in 2000 by Roy Fielding in his doctoral dissertation. REST is a

    lightweight alternative to mechanisms like RPC (Remote Procedure Calls)

    and Web Services (SOAP, WSDL, etc). REST is an architecture style for designing

    networked (distributed) applications. The idea is that rather than using

    complex mechanisms such as CORBA, RPC, or SOAP to connect between

    machines, simple HTTP is used to make calls between machines. RESTful

    applications use HTTP requests to post data (create and/or update), read

    data (e.g., make queries), and delete data. Thus, REST uses HTTP for all

    four CRUD (Create/Read/Update/Delete) operations.


    Web applications are not used only by browser clients. Programmatic

    clients can connect using HTTP (e.g., mobile applications and basically

    any application that was developed to be able to request and receive

    data using HTTP as communication protocol). The REST architectural style

    describes best practices to expose web services over HTTP; it is used

    not only as a transport but as an application protocol. The following

    HTTP specifications are used:'
