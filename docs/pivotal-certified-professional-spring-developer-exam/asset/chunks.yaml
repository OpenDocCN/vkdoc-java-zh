    \ org.junit.Assert.assertNotNull;\nimport static org.mockito.Mockito.any;\nimport\
    \ static org.mockito.Mockito.anyString;\nimport static org.mockito.Mockito.anyLong;\n\
    @RunWith(MockitoJUnitRunner.class)\n@ContextConfiguration(classes = {JdbcRepoConfig.class,\n\
    ServiceConfig.class, MockTemplateConfig.class})\npublic class TestAppConfig3 {\n\
    public static final Long PET_ID = 1L;\n// 模拟数据库\n@Autowired\nJdbcTemplate jdbcTemplate;\n\
    // 被测试对象\n@Autowired\nSimplePetService simplePetService;\n@ClassRule\npublic static\
    \ final SpringClassRule SPRING_CLASS_RULE = new SpringClassRule();\n@Rule\npublic\
