    \nThe @ConfigurationProperties annotation can be used with *.properties\nfiles\
    \ too, but it makes no sense to mention it twice.\n\nSpring Environment logging\
    \ variables: [ `http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/`\n\
    ](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/) `#boot-features-custom-log-configuration`\n\
    \nTesting improvements in Spring Boot 1.4 [`https://spring.io/blog/2016/04/15/testing-improvements-in-spring-boot-1-4`](https://spring.io/blog/2016/04/15/testing-improvements-in-spring-boot-1-4)\
    \ `.`\n\n7. Spring Advanced Topics\n\nIn the previous chapters, the objects handled\
    \ by Spring were created on\na JVM. These objects were accessed and manipulated\
    \ indirectly by the\nuser using the HTTP protocol. In this case, all that the\
    \ end user needs\nto access the objects in the JVM is the web interface of the\n\
    application.\n\nRemoting and Web Services are ways of communicating\nbetween applications.\
    \ The applications can run on the same computer, on\ndifferent computers, on different\
    \ networks, and can even be written in\ndifferent languages (a Python application\
    \ can consume a web service\nprovided by a Java application, for example). In\
    \ remoting, the\napplications communicating know about each other. There is a\
    \ server\napplication and a client application. Because of this, it supports state\n\
    management options and can correlate multiple calls from the same client\nand\
    \ support callbacks. On the client application, a proxy of the server\ntarget\
    \ object is created and used to access the object on the server.\nRemoting can\
    \ be used across any protocol, but it does not do well with\nfirewalls. Remoting\
    \ relies on the existence of common language runtime\nassemblies that contain\
    \ information about data types. This limits the\ninformation that must be passed\
    \ about an object and allows objects to be\npassed by value or by reference. The\
    \ communication is done using a\nbinary, XML, or JSON format. All these limitations\
    \ make remoting quite\ndeprecated at the moment this book is being written. Web\
    \ services have\ncompletely replaced them."
