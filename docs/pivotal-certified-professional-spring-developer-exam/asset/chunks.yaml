- fmt: '*   **Service** (also known as Business), where all classes needed to transform
    user data to be passed to the DAO layer are located. The business entities are
    POJOs that help with this conversion. All components specific to this layer implement
    how data can be created, displayed, stored, and changed.

    *   **Presentation**, where components that implement and display the user interface
    and manage user interaction reside.


    `Spring Web MVC` is a popular request-driven framework based on the Model–View–Controller
    software architectural pattern, which was designed to decouple components that
    by working together make a fully functional user interface. The typical Model–View–Controller
    behavior is displayed in Figure [6-2](#A978-1-4842-0811-3_6_Chapter.html#Fig2).


    ![A978-1-4842-0811-3_6_Fig2_HTML.jpg](A978-1-4842-0811-3_6_Fig2_HTML.jpg)


    Figure 6-2. Typical MVC behavior


    The main idea of MVC is that there are three decoupled components. Each of them
    can be easily swapped with a different implementation, and together they provide
    the desired functionality. The view represents the interface with which the user
    interacts. It displays data and passes requests to the controller. The controller
    calls the business components and sends the data to the model, which notifies
    the view that an actualization is needed. The model content is displayed by the
    view.


    The central piece of `Spring Web MVC` is the `DispatcherServlet` class, which
    is the entry point for every Spring Web application. It dispatches requests to
    handlers, with configurable handler mappings, view resolution, locale, timezone,
    and support for uploading files. The `DispatcherServlet` converts HTTP requests
    into commands for controller components and manages rendered data as well. It
    basically acts as a Front Controller for the whole application. The basic idea
    of the Front Controller software design pattern, which implies that there is a
    centralized point for handling requests, is depicted in Figure [6-3](#A978-1-4842-0811-3_6_Chapter.html#Fig3).


    ![A978-1-4842-0811-3_6_Fig3_HTML.jpg](A978-1-4842-0811-3_6_Fig3_HTML.jpg)


    Figure 6-3. Front Controller software design pattern idea


    The `Spring Web MVC` provides already configured beans for the implementation
    of this behavior, and these beans are contained in two main modules:


    *   `spring-web.jar`

    *   `spring-webmvc.jar`


    A standard servlet listener is used to bootstrap and shut down the Spring application
    context. The application context will be created and injected into the `DispatcherServlet`
    before any request is made, and when the application is stopped, the Spring context
    will be closed gracefully as well. The Spring servlet listener class is `org.springframework.web.context.ContextLoaderListener`.


    `Spring Web MVC` is Spring’s web framework, and thus Spring’s typical configuration
    style is used, and controller components are beans. Starting with Spring 2.5,
    annotation configurations were introduced, so the controller components can be
    declared with a specialized stereotype annotation: `@Controller`. A Spring application
    can be deployed on an application server, can run on an embedded server like Jetty,
    or can be run with Spring Boot. All three flavors will be covered in this chapter.


    Spring can be integrated with other frameworks:


    *   **Struts 2**: an open source framework for building Servlet/JSP from Apache-based
    web applications based on the Model–View–Controller (MVC) design paradigm. A previous
    version of this framework, Struts 1, was discontinued in 2016, but Struts 2 is
    alive and kicking, and on July 7, 2016, version 2.5.2 GA was released, as announced
    on their official site. More information can be found on the official site [`https://struts.apache.org/`](https://struts.apache.org/).

    *   **Wicket**: another open source Java web framework from Apache that was born
    in 2004 and is still alive and kicking; version 1.5.16 was released on August
    5, 2016. This framework was designed with simplicity and separation of concerns
    as main purposes. More information can be found on the official site [`http://wicket.apache.org/`](http://wicket.apache.org/).

    *   **Tapestry 5**: a component-oriented framework for creating highly scalable
    web applications in Java, also supported by Apache. More information can be found
    on the official site [`http://tapestry.apache.org/`](http://tapestry.apache.org/).

    *   **Spring WebFlow**: a Spring framework designed for implementation of stateful
    flows and destined for applications that require navigation through sequential
    steps in order to execute a business task. More information can be found on the
    official site [`http://projects.spring.io/spring-webflow/`](http://projects.spring.io/spring-webflow/).


    Using `Spring Web MVC` writing and running web applications is as easy as writing
    a simple standalone application as done in the previous chapters. Spring provides
    infrastructure beans for everything that is needed to boot up a web application
    and even a framework called Spring Boot that makes it easy to create standalone
    production-grade Spring-based applications by providing infrastructure beans already
    set up with a default general configuration. All this will be covered in this
    chapter, but keep in mind that the surface is only scratched on this topic, since
    `Spring Web MVC` is part of the set of topics for the Pivotal Certified Spring
    Web Application Developer exam and for this, Apress has published a different
    book.[¹](#A978-1-4842-0811-3_6_Chapter.html#Fn1)


    ## Spring Web App Configuration


    When a user accesses a URL, an HTTP request is generated to a web application
    hosted on an application server. Based on that request, inside the application
    context an action must be performed. The result of the action performed is returned,
    and it needs to be represented using a view. In a Spring Web application, all
    HTTP requests first reach the `DispatcherServlet`. Based on the configuration,
    a handler is called, which is a method of a class called controller. The result
    is used to populate a model that is returned to the `DispatcherServlet`, which
    based on another set of configurations decides which view is to be used to display
    the result.


    This process is depicted in Figure [6-4](#A978-1-4842-0811-3_6_Chapter.html#Fig4).


    ![A978-1-4842-0811-3_6_Fig4_HTML.jpg](A978-1-4842-0811-3_6_Fig4_HTML.jpg)


    Figure 6-4. Request processing steps in a Spring Web application


    The `DispatcherServlet` is the entry point of the application, the heart of `Spring
    Web MVC` that coordinates all request handling operations. It is equivalent to
    `ActionServlet` from Struts and `FacesServlet`[²](#A978-1-4842-0811-3_6_Chapter.html#Fn2)
    from JEE. It delegates responsibilities to Web infrastructure beans and invokes
    user web components. It is customizable and extensible. The `DispatcherServlet`
    must be defined in `web.xml` when the application is configured using the old-style
    XML configuration. When using a configuration without `web.xml`, a configuration
    class that extends `AbstractDispatcherServletInitializer` or `AbstractAnnotationConfigDispatcherServletInitializer`
    must be declared. These two are Spring specialized classes from the `org.springframework.web.servlet.support`
    package that implement `org.springframework.web.WebApplicationInitializer`. Objects
    of types implementing this interface are detected automatically by `SpringServletContainerInitializer`,
    which is bootstrapped automatically by every Servlet 3.0+ environment. More about
    specialized classes to be used to bootstrap Spring and configuring the `DispatcherServlet`
    will be covered in this chapter, along with information regarding the context
    in which each is used will be provided.'
