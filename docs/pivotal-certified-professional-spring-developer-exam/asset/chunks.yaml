    \  来自同一表的条目可以使用列值作为鉴别器，映射到同一层次结构中的不同类型的领域对象。\n\n使用 ORM 框架具有以下优点：\n\n*   它提供了数据库记录到应用程序对象的映射。\n\
    \n*   因此无需为此编写额外的代码。\n\n*   它通常提供一种丰富的对象查询语言，比原生 SQL 更直观、更易于使用。\n\n*   它提供了通过对象关系进行简单导航的能力。\n\
    \n*   它提供了通过可达性的持久化。请看以下代码片段：\n\n```\n    public class User extends AbstractEntity\
    \ {\n    ...\n    @OneToMany(mappedBy = \"owner\",\n    cascade = {CascadeType.PERSIST,\
    \ CascadeType.REMOVE})\n    private Set pets = new HashSet();\n    }\n    ```\n\
    \n`cascade` 属性定义了当类型为 `User` 的父领域对象被修改时，`P_PET` 表中映射到 `Pet` 对象的子记录会发生什么。如果 `User`\
    \ 对象与 `Pet` 对象同时创建，则只需将 `User` 对象持久化到数据库，因为持久化操作会由于 `CascadeType.PERSIST` 值而传播到子领域对象。如果\
    \ `User` 对象被删除，子领域对象也会因为 `CascadeType.REMOVE` 而被删除。\n\n*   它提供了并发支持：多个进程可以并行更新相同的数据。\n\
    \n*   它提供了按级别的缓存管理：\n\n*   按事务（一级缓存）：当首次从数据库加载对象时，该对象存储在此缓存中，后续对该对象的请求将使用缓存，而不是访问数据库。\n\
    \n*   按数据源（`SessionFactory` 级别的二级缓存）：减少对数据库的读取密集型数据访问，并由 `SessionFactory` bean\
    \ 创建的所有会话共享。当在一级缓存中未找到领域对象时，下一个查找位置就是此缓存。如果找到，模型对象在返回之前也会存储到一级缓存中。\n\n*   事务管理和隔离。\n\
    \n*   键管理，因为标识符会自动传播和管理。例如：当在系统中创建一个 `User` 对象及其 `Pet` 实例时，用户 ID（主键）会被生成并自动用于填充宠物领域对象中的外键字段。\n\
    \n*   ORM 特定的代码可以重用。（在本书的示例项目中，领域对象、仓库和服务都使用了继承）。\n\n*   ORM 代码已经过测试，并由框架的创建者维护；因此使用\
    \ ORM 减少了测试的工作量。\n\n除了 Hibernate，Spring 还支持与所有主要的 ORM/持久化提供者集成，例如 EclipseLink、MyBatis\
    \ 和 Open JPA。尽管 ORM 非常实用，但对于大量数据会引入一点延迟，因此在这种情况下，当数据处理速度是一个性能标准时，应该使用 JDBC 和原生\
    \ SQL。\n\nJava 持久化 API\n\n前面的示例直接使用 `SessionFactory` 描绘了一个 Spring 仓库类，这会将 Spring\
    \ 与 Hibernate 紧密耦合。Java 持久化 API，也称为 JPA，为对象关系映射和持久化引入了一个通用接口，允许轻松切换所使用的 ORM 框架。JPA\
    \ 旨在操作定义为 POJO 的领域对象。它取代了之前的持久化机制：EJB 和 JDO（Java 数据对象）。它于 2006 年首次引入，并克服了最初的局限性，成功提供了一套所有\
    \ Java ORM 框架和持久化框架都支持的特定 JPA 注解。上一节中用于配置领域对象的注解属于 `javax.persistence` 包，该包包含所有\
    \ JPA 组件。\n\n核心 JPA 组件如下：\n"
- fmt: "*   `Persistence Context`：一个上下文，包含一组领域对象/实体，其中每个持久化实体都有一个唯一的实体实例。\n*   `Entity\
    \ Manager`：顾名思义，此类对象将管理实体，负责创建、更新、查询和删除。`Entity Manager`类必须继承`javax.persistence.EntityManager`，并通过使用`@PersistenceContext`注解将其实例与持久化上下文关联。通常，这些实例的生命周期绑定到方法执行所在的事务，因此它们由容器（在我们的例子中是Spring容器）管理。\n\
    *   `Entity Manager Factory`：同样，其命名非常清晰地反映了此类对象的用途。`Entity Manager Factory` Bean负责创建应用程序管理的`Entity\
    \ Manager`实例。这些工厂类必须实现`javax.persistence.EntityManagerFactory`。它们是线程安全、可共享的，并代表单一数据源和持久化上下文。\n\
    *   `Persistence Unit`：由开发者定义的一组实体类，用于将数据库记录映射到由`Entity Manager`管理的对象。基本上，它是应用程序中所有使用`@Entity`、`@MappedSuperclass`和`@Embedded`注解的类。所有实体类必须定义主键，必须拥有无参构造函数，且不允许是`final`的。键可以是单个字段或字段的组合。这组实体类代表单个数据源中包含的数据。可以在同一个应用程序中定义多个持久化单元。持久化单元的配置可以使用XML完成。官方文档指定必须在`META-INF`目录下定义`persistence.xml`文件，但如果使用了Spring和Java配置，则不需要该文件。以下代码片段展示了一个`persistence.xml`示例文件。\n\
    \n```\nThis unit manages pets, users,\n    requestsm responses and reviews.\n\
    ```\n\n*   `JPA Provider`：为JPA提供后端的框架，是实际执行繁重工作的框架。实现JPA接口的最常用框架如下：\n    *   `Hibernate`：为`EntityManager`提供了实现，即`org.hibernate.jpa.HibernateEntityManager`，但从Hibernate\
    \ 5.2开始，使用`org.hibernate.engine.spi.SessionImplementor`，因为它现在直接继承`EntityManager`。当然，这些是内部细节，因为在配置中只需要`org.springframework.orm.jpa.vendor.HibernateJpaVendorAdapter`类。Hibernate用于JBoss应用服务器内部。\n\
    \    *   `EclipseLink`：用于Glassfish应用服务器内部。\n    *   `Apache OpenJPA`：用于Weblogic、WebSphere和TomEE。\n\
    \    *   `Data Nucleus`：由Google App Engine使用。\n    它们中的任何一个也可以在应用服务器外部使用。\n\n\
    ## 配置Spring和JPA与Hibernate支持\n\n对于本节相关的代码，您可以在项目`09-ps-data-jpa-practice`下找到。Hibernate将用作JPA提供者。最新版本的Hibernate已可用于生产环境，符合JPA\
    \ 2.1规范的JSR-338，并且仍然与JPA 2.0兼容。修改项目`07-ps-hibernate-practice`中的应用程序以支持JPA，需要以下更改：\n\
    \n1.  `SessionFactory` Bean声明不再需要，它将被一个声明`Entity Manager Factory` Bean的Bean所取代。为此将使用Spring特定的`LocalContainerEntityManagerFactoryBean`类。\n\
    \n```\n    import javax.persistence.EntityManagerFactory;\n    import org.springframework.orm.jpa.JpaTransactionManager;\n\
    \    import org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean;\n\
    \    import org.springframework.orm.jpa.vendor.HibernateJpaVendorAdapter;\n  \
    \  ...\n    @Configuration\n    @EnableTransactionManagement\n    public class\
    \ TestDataConfig {\n    @Bean\n    public EntityManagerFactory entityManagerFactory(){\n\
    \    LocalContainerEntityManagerFactoryBean factoryBean =\n    new LocalContainerEntityManagerFactoryBean();\n\
    \    factoryBean.setPackagesToScan(\"com.ps.ents\");\n    factoryBean.setDataSource(dataSource());\n\
    \    factoryBean.setJpaVendorAdapter(new HibernateJpaVendorAdapter());\n    factoryBean.setJpaProperties(hibernateProperties());\n\
    \    factoryBean.afterPropertiesSet();\n    return factoryBean.getNativeEntityManagerFactory();\n\
    \    }\n    ...\n    }\n```\n\n在上述方法中，`LocalContainerEntityManagerFactoryBean`是通过显式实例化创建的，而不是由Spring创建的。因此，必须显式调用初始化工厂对象的`afterPropertiesSet()`方法。`LocalContainerEntityManagerFactoryBean`对象用于创建一个原始的`EntityManagerFactory`\
    \ Bean，该Bean由`PersistenceProvider`实现（本例中为`org.hibernate.jpa.HibernatePersistenceProvider`）返回。通过调用`factoryBean.getNativeEntityManagerFactory()`来获取由工厂Bean创建的`EntityManagerFactory`实例。\n\
    \n`HibernateJpaVendorAdapter`暴露了Hibernate的持久化提供者和`EntityManager`扩展接口。可以通过`setPackagesToScan(...)`方法设置持久化元数据的位置，并且还需要数据源Bean才能正确创建`EntityManagerFactory`。\n\
    \n2.  `HibernateTransactionManager`将被一个类型为`JpaTransactionManager`的Bean替换，该Bean将使用`EntityManagerFactory`实现将`Entity\
    \ Manager`操作与事务关联起来。\n\n```\n    import org.springframework.orm.jpa.JpaTransactionManager;\n\
    \    ...\n    @Configuration\n    @EnableTransactionManagement\n    public class\
    \ TestDataConfig {\n    @Bean\n    @Bean\n    public PlatformTransactionManager\
    \ transactionManager() {\n    return new JpaTransactionManager(entityManagerFactory());\n\
    \    }\n    ...\n    }\n```\n\n3.  仓库类将被修改，以使用映射到应用程序持久化上下文的`EntityManager`类型实例。`@PersistenceContext`注解表达了对容器管理的`EntityManager`及其关联持久化上下文的依赖。此字段不需要自动装配，因为`@PersistenceContext`注解会被一个基础设施Spring\
    \ Bean后处理器（类型为`org.springframework.orm.jpa.support.PersistenceAnnotationBeanPostProcessor`）捕获，该处理器确保创建并注入一个`EntityManager`实例。为了创建此实例，使用了后端ORM，在本例中是Hibernate\
    \ 5.x，因此`entityManager` Bean将是`org.hibernate.engine.spi.SessionImplementor`类型。\n\
    \n```\n    import javax.persistence.EntityManager;\n    import javax.persistence.PersistenceContext;\n\
    \    ...\n    @Repository\n    public class JpaUserRepo implements UserRepo {\n\
    \    private EntityManager entityManager;\n    @PersistenceContext\n    void setEntityManager(EntityManager\
    \ entityManager) {\n    this.entityManager = entityManager;\n    }\n    ...\n\
    \    }\n```\n\n在图5-19中，一个测试的执行在调试模式下暂停，以显示注入到仓库类中的实体管理器的类型。\n\n![A978-1-4842-0811-3_5_Fig19_HTML.jpg](A978-1-4842-0811-3_5_Fig19_HTML.jpg)\n\
    \n图5-19. TestJpaUserRepo.testFindById() 执行在调试模式下暂停，以显示注入到JpaUserRepo类中的entityManager\
    \ Bean的类型。"
  raw: "*   Persistence Context : a context\n    containing a set of domain objects/entities\
    \ in which for every\n    persistent entity there is a unique entity instance.\n\
    \n*   Entity Manager : as the name clearly states,\n    such an object will manage\
    \ entities, will take care of creation, update,\n    querying, deletion. Entity\
    \ Manager classes must extend `javax.persistence.EntityManager`,\n    and instances\
    \ are associated with a persistence context by annotating\n    them with `@PersistenceContext`.\n\
    \    Usually, these instances’ life cycles are bound to the transaction in\n \
    \   which the method is being executed, so they are managed by the container\n\
    \    (in our case, the Spring container).\n\n*   Entity Manager Factory: again,\
    \ the\n    naming is very relevant for the purpose of such an object. Entity\n\
    \    Manager Factory beans have the responsibility of creating\n    application-managed\
    \ Entity Manager instances. These factory classes must\n    implement `javax.persistence.EntityManagerFactory`.\n\
    \    They are thread-safe, shareable, and they represent a single datasource\n\
    \    and persistence context.\n\n*   Persistence Unit : a group of\n    entity\
    \ classes defined by the developer to map database records to\n    objects that\
    \ are managed by an Entity Manager, basically all classes\n    annotated with\
    \ `@Entity`, `@MappedSuperclass`,\n    and `@Embedded`\n    in an application.\
    \ All entity classes must define a primary key, must\n    have a non-arg constructor\
    \ or not allowed to be final. Keys can be a\n    single field or a combination\
    \ of fields. This set of entity classes\n    represents data contained in a single\
    \ datasource. Multiple persistence\n    units can be defined within the same application.\
    \ Configuration of\n    persistence units can be done using XML. In the official\
    \ documentation\n    it is specified that a `persistence.xml` file\n    must be\
    \ defined under the `META-INF` directory,\n    but if Spring and Java Configuration\
    \ are used, there is no need for that\n    file. The following code snippet depicts\
    \ a `persistence.xml`\n    sample file.\n\n```\n\nThis unit manages pets, users,\n\
    \    requestsm responses and reviews.\n\n```\n\n*   JPA Provider: the framework\n\
    \    providing the backend for the JPA, the one that it is actually doing the\n\
    \    heavy lifting. The most frequently used frameworks that implement the\n \
    \   JPA interface are these:\n\n*   Hibernate provides an\n        implementation\
    \ for `EntityManager`, the\n        `org.hibernate.jpa.HibernateEntityManager`,\n\
    \        but starting with Hibernate 5.2, `org.hibernate.engine.spi.SessionImplementor`\n\
    \        is used, because it now extends `EntityManager`\n        directly. Of\
    \ course, these are internal details, since in the\n        configuration, only\
    \ the `org.springframework.orm.jpa.vendor.HibernateJpaVendorAdapter`\n       \
    \ class is needed. Hibernate is used inside the JBoss application server.\n\n\
    *   EclipseLink : is used inside the\n        Glassfish application server\n\n\
    *   Apache OpenJPA : is used inside\n        Weblogic, WebSphere, and TomEE.\n\
    \n*   Data Nucleus : used by Google App\n        Engine.\n\nAny of them can be\
    \ used outside the application servers as well.\n\nConfigure Spring and JPA with\
    \ Hibernate support\n\nFor the code associated with this section, which you can\
    \ find under\nproject `09-ps-data-jpa-practice`,\nHibernate will be used as a\
    \ JPA provider. The most recent version of\nHibernate is production ready, compliant\
    \ with JSR-338 for JPA 2.1\nSpecification, and is still compatible with JPA 2.0\\\
    . Modifying the\napplication in project `07-ps-hibernate-practice`\nto support\
    \ JPA implies the following changes:\n\n1.  The `SessionFactory` bean\n    declaration\
    \ is no longer needed, and it will be replaced by a bean\n    declaring an Entity\
    \ Manager Factory bean. The Spring-specific `LocalContainerEntityManagerFactoryBean`\n\
    \    class will be used for this.\n\n```\n    import javax.persistence.EntityManagerFactory;\n\
    \    import org.springframework.orm.jpa.JpaTransactionManager;\n    import org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean;\n\
    \    import org.springframework.orm.jpa.vendor.HibernateJpaVendorAdapter;\n  \
    \  ...\n    @Configuration\n    @EnableTransactionManagement\n    public class\
    \ TestDataConfig {\n    @Bean\n    public EntityManagerFactory entityManagerFactory(){\n\
    \    LocalContainerEntityManagerFactoryBean factoryBean =\n    new LocalContainerEntityManagerFactoryBean();\n\
    \    factoryBean.setPackagesToScan(\"com.ps.ents\");\n    factoryBean.setDataSource(dataSource());\n\
    \    factoryBean.setJpaVendorAdapter(new HibernateJpaVendorAdapter());\n    factoryBean.setJpaProperties(hibernateProperties());\n\
    \    factoryBean.afterPropertiesSet();\n    return factoryBean.getNativeEntityManagerFactory();\n\
    \    }\n    ...\n    }\n    ```\n\nIn the method above, the `LocalContainerEntityManagerFactoryBean`\n\
    \    is created by explicit instantiation, and is not created by Spring. So\n\
    \    the `afterPropertiesSet()`\n    that initializes the factory object must\
    \ be called explicitly. The `LocalContainerEntityManagerFactoryBean`\n    object\
    \ is used to create a raw `EntityManagerFactory`\n    bean as returned by the\
    \ `PersistenceProvider`\n    implementation, in this case `org.hibernate.jpa.HibernatePersistenceProvider`.\n\
    \    The `EntityManagerFactory`\n    instance created by the factory bean is retrieved\
    \ by calling `factoryBean.getNativeEntityManagerFactory()`.\n\nThe `HibernateJpaVendorAdapter`\n\
    \    exposes Hibernate’s persistence provider and `EntityManager`\n    extension\
    \ interface. The locations where the persistence metadata can be\n    found are\
    \ set by the `setPackagesToScan(...)`\n    method, and the datasource bean is\
    \ required as well to properly create\n    an `EntityManagerFactory`.\n\n2.  The\
    \ `HibernateTransactionManager`\n    will be replaced by a bean of type `JpaTransactionManager`\n\
    \    that will use the `EntityManagerFactory`\n    implementation to associate\
    \ Entity Manager operations with transactions.\n\n```\n    import org.springframework.orm.jpa.JpaTransactionManager;\n\
    \    ...\n    @Configuration\n    @EnableTransactionManagement\n    public class\
    \ TestDataConfig {\n    @Bean\n    @Bean\n    public PlatformTransactionManager\
    \ transactionManager() {\n    return new JpaTransactionManager(entityManagerFactory());\n\
    \    }\n    ...\n    }\n    ```\n\n3.  The repository classes will be modified\
    \ to use an instance of type `EntityManager` mapped\n    to the application persistence\
    \ context. The annotation `@PersistenceContext`\n    expresses a dependency on\
    \ a container-managed `EntityManager` and its\n    associated persistence context.[^(17)](#A978-1-4842-0811-3_5_Chapter.html#Fn17)\n\
    \    This field does not need to be autowired, since the `@PersistenceContext`\n\
    \    annotation is picked up by an infrastructure Spring bean postprocessor\n\
    \    bean of type `org.springframework.orm.jpa.support.PersistenceAnnotationBeanPostProcessor`\n\
    \    (class) that makes sure to create and inject an `EntityManager`\n    instance.\
    \ To create this instance, the backend ORM is used, in this case\n    Hibernate\
    \ 5.x, so the `entityManager` bean\n    will be of type `org.hibernate.engine.spi.SessionImplementor`.\n\
    \n```\n    import javax.persistence.EntityManager;\n    import javax.persistence.PersistenceContext;\n\
    \    ...\n    @Repository\n    public class JpaUserRepo implements UserRepo {\n\
    \    private EntityManager entityManager;\n    @PersistenceContext\n    void setEntityManager(EntityManager\
    \ entityManager) {\n    this.entityManager = entityManager;\n    }\n    ...\n\
    \    }\n    ```\n\nIn Figure [5-19](#A978-1-4842-0811-3_5_Chapter.html#Fig19),\
    \ the\nexecution of a test was paused in debug mode to depict the type of\nentity\
    \ manager being injected into the repository class.\n\n![A978-1-4842-0811-3_5_Fig19_HTML.jpg](A978-1-4842-0811-3_5_Fig19_HTML.jpg)\n\
    \nFigure 5-19.\n\nTestJpaUserRepo.testFindById() execution paused in debug mode\
    \ to show\nthe type of the entityManager bean that was injected into the\nJpaUserRepo\
    \ class."
  trans: "\n*   **持久化上下文**：一个包含一组领域对象/实体的上下文，其中每个持久化实体都有一个唯一的实体实例。\n\n*   **实体管理器**：顾名思义，此类对象将管理实体，负责创建、更新、查询和删除。实体管理器类必须继承\
    \ `javax.persistence.EntityManager`，其实例通过 `@PersistenceContext` 注解与持久化上下文关联。通常，这些实例的生命周期与执行方法的事务绑定，因此由容器（在我们的案例中是\
    \ Spring 容器）管理。\n\n*   **实体管理器工厂**：同样，其命名非常符合此类对象的用途。实体管理器工厂 Bean 负责创建由应用程序管理的实体管理器实例。这些工厂类必须实现\
    \ `javax.persistence.EntityManagerFactory`。它们是线程安全、可共享的，并代表单一数据源和持久化上下文。\n\n*\
    \   **持久化单元**：由开发者定义的一组实体类，用于将数据库记录映射到由实体管理器管理的对象。基本上，它是应用程序中所有使用 `@Entity`、`@MappedSuperclass`\
    \ 和 `@Embedded` 注解的类。所有实体类必须定义主键，必须拥有无参构造函数，且不能是 final 类。主键可以是单个字段或多个字段的组合。这组实体类代表单个数据源中包含的数据。可以在同一个应用程序中定义多个持久化单元。持久化单元的配置可以使用\
    \ XML 完成。官方文档指定必须在 `META-INF` 目录下定义 `persistence.xml` 文件，但如果使用了 Spring 和 Java\
    \ 配置，则无需该文件。以下代码片段展示了一个 `persistence.xml` 示例文件。\n\n```\n该单元管理宠物、用户、请求、响应和评论。\n\
    ```\n\n*   **JPA 提供者**：为 JPA 提供后端的框架，是实际承担繁重工作的组件。实现 JPA 接口的最常用框架如下：\n\n*   **Hibernate**\
    \ 为 `EntityManager` 提供了实现，即 `org.hibernate.jpa.HibernateEntityManager`，但从 Hibernate\
    \ 5.2 开始，使用 `org.hibernate.engine.spi.SessionImplementor`，因为它现在直接继承自 `EntityManager`。当然，这些都是内部细节，因为在配置中只需要\
    \ `org.springframework.orm.jpa.vendor.HibernateJpaVendorAdapter` 类。Hibernate 用于\
    \ JBoss 应用服务器内部。\n\n*   **EclipseLink**：用于 Glassfish 应用服务器内部。\n\n*   **Apache\
    \ OpenJPA**：用于 Weblogic、WebSphere 和 TomEE 内部。\n\n*   **Data Nucleus**：由 Google\
    \ App Engine 使用。\n\n其中任何一个也可以应用服务器外部使用。\n\n使用 Hibernate 支持配置 Spring 和 JPA\n\n\
    对于本节相关的代码，您可以在项目 `09-ps-data-jpa-practice` 中找到，我们将使用 Hibernate 作为 JPA 提供者。最新版本的\
    \ Hibernate 已可用于生产环境，符合 JPA 2.1 规范的 JSR-338，并且仍然兼容 JPA 2.0。修改项目 `07-ps-hibernate-practice`\
    \ 中的应用程序以支持 JPA 需要以下更改：\n\n1.  不再需要 `SessionFactory` Bean 声明，它将被一个声明实体管理器工厂 Bean\
    \ 的 Bean 所替代。为此将使用 Spring 特定的 `LocalContainerEntityManagerFactoryBean` 类。\n\n\
    ```\n    import javax.persistence.EntityManagerFactory;\n    import org.springframework.orm.jpa.JpaTransactionManager;\n\
    \    import org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean;\n\
    \    import org.springframework.orm.jpa.vendor.HibernateJpaVendorAdapter;\n  \
    \  ...\n    @Configuration\n    @EnableTransactionManagement\n    public class\
    \ TestDataConfig {\n    @Bean\n    public EntityManagerFactory entityManagerFactory(){\n\
    \    LocalContainerEntityManagerFactoryBean factoryBean =\n    new LocalContainerEntityManagerFactoryBean();\n\
    \    factoryBean.setPackagesToScan(\"com.ps.ents\");\n    factoryBean.setDataSource(dataSource());\n\
    \    factoryBean.setJpaVendorAdapter(new HibernateJpaVendorAdapter());\n    factoryBean.setJpaProperties(hibernateProperties());\n\
    \    factoryBean.afterPropertiesSet();\n    return factoryBean.getNativeEntityManagerFactory();\n\
    \    }\n    ...\n    }\n    ```\n\n在上述方法中，`LocalContainerEntityManagerFactoryBean`\
    \ 是通过显式实例化创建的，而非由 Spring 创建。因此，必须显式调用初始化工厂对象的 `afterPropertiesSet()` 方法。`LocalContainerEntityManagerFactoryBean`\
    \ 对象用于创建一个原始的 `EntityManagerFactory` Bean，该 Bean 由 `PersistenceProvider` 实现（本例中为\
    \ `org.hibernate.jpa.HibernatePersistenceProvider`）返回。通过调用 `factoryBean.getNativeEntityManagerFactory()`\
    \ 来检索由工厂 Bean 创建的 `EntityManagerFactory` 实例。\n\n`HibernateJpaVendorAdapter` 暴露了\
    \ Hibernate 的持久化提供者和 `EntityManager` 扩展接口。可以通过 `setPackagesToScan(...)` 方法设置持久化元数据的位置，并且还需要数据源\
    \ Bean 才能正确创建 `EntityManagerFactory`。\n\n2.  `HibernateTransactionManager` 将被一个类型为\
    \ `JpaTransactionManager` 的 Bean 替代，该 Bean 将使用 `EntityManagerFactory` 实现来将实体管理器操作与事务关联。\n\
    \n```\n    import org.springframework.orm.jpa.JpaTransactionManager;\n    ...\n\
    \    @Configuration\n    @EnableTransactionManagement\n    public class TestDataConfig\
    \ {\n    @Bean\n    @Bean\n    public PlatformTransactionManager transactionManager()\
    \ {\n    return new JpaTransactionManager(entityManagerFactory());\n    }\n  \
    \  ...\n    }\n    ```\n\n3.  仓库类将被修改，以使用映射到应用程序持久化上下文的 `EntityManager` 类型实例。`@PersistenceContext`\
    \ 注解表达了对容器管理的 `EntityManager` 及其关联持久化上下文的依赖。¹⁷ 此字段不需要自动装配，因为 `@PersistenceContext`\
    \ 注解会被一个类型为 `org.springframework.orm.jpa.support.PersistenceAnnotationBeanPostProcessor`\
    \ 的基础设施 Spring Bean 后处理器捕获，该处理器确保创建并注入一个 `EntityManager` 实例。为了创建此实例，会使用后端 ORM（本例中为\
    \ Hibernate 5.x），因此 `entityManager` Bean 的类型将是 `org.hibernate.engine.spi.SessionImplementor`。\n\
    \n```\n    import javax.persistence.EntityManager;\n    import javax.persistence.PersistenceContext;\n\
    \    ...\n    @Repository\n    public class JpaUserRepo implements UserRepo {\n\
    \    private EntityManager entityManager;\n    @PersistenceContext\n    void setEntityManager(EntityManager\
    \ entityManager) {\n    this.entityManager = entityManager;\n    }\n    ...\n\
    \    }\n    ```\n\n在图 5-19 中，一个测试的执行在调试模式下暂停，以展示注入到仓库类中的实体管理器的类型。\n\n![A978-1-4842-0811-3_5_Fig19_HTML.jpg](img/A978-1-4842-0811-3_5_Fig19_HTML.jpg)\n\
    \n图 5-19.\n\nTestJpaUserRepo.testFindById() 执行在调试模式下暂停，以显示注入到 JpaUserRepo 类中的\
    \ entityManager Bean 的类型。\n"
- fmt: 'The methods of the repository need to be modified to make use of the `entityManager`
    bean. The most interesting part of the `EntityManager` API is depicted in Table
    [5-1](#A978-1-4842-0811-3_5_Chapter.html#Tab1).


    **Table 5-1.** `EntityManager` JPA methods


    | Method | Action | Comment |

    | --- | --- | --- |

    | `<T> T find(Class<T> cl, Object pk);` | Find an entity by its primary key |
    Equivalent to: `select from table t where t.pk= PK_VAL` |

    | `Query createQuery(String ql);` | Create a JPQL query | Returns a collection
    if `getResultList()` is called on the JPQL `Query` object. Returns a single object
    if `getSingleResult()` is called on the JPQL `Query` object. |

    | `Query createNamedQuery(String name)` | Create a JPQL query from a named query
    in the metadata | Returns a collection if `getResultList()` is called on the JPQL
    `Query` object. Returns a single object if `getSingleResult()` is called on the
    JPQL `Query` object. |

    | `void persist(Object obj)` | Adds the entity to the persistence context. | Equivalent
    to: `insert into table...` |

    | `<T> T merge(T entity);` | Merge the state of the given entity into the current
    persistence context. | Equivalent to: `update table t... where t.pk=PK_VAL` |

    | `void flush()` | Persist persistence context contents to the database immediately.
    | Use carefully. |

    | `void refresh(Object entity)` | Reload a state for an entity from the database.
    | Changes in the persistence context are discarded, so use carefully. |

    | `void remove(Object entity)` | Removes the entity from the persistence context.
    | Equivalent to: `delete from table t where t.pk=PK_ VAL` |


    `JPQL` is an acronym for Java Persistence Query Language.


    Comparing with the pure Hibernate implementation with Spring, only the declaration
    of the transaction manager is changed, the `sessionFactory` bean, being replaced
    with `entityManagerFactory`. The datasource declaration does not change, and the
    hibernate properties are still needed, since Hibernate is still the backing ORM
    framework. Also, transactions are still needed, so `@EnableTransactionManagement`
    remains as well.


    The conceptual UML sequence diagram when JPA is used to search a user by its ID
    looks like the one in Figure [5-20](#A978-1-4842-0811-3_5_Chapter.html#Fig20).


    ![A978-1-4842-0811-3_5_Fig20_HTML.jpg](A978-1-4842-0811-3_5_Fig20_HTML.jpg)


    **Figure 5-20.** Conceptual UML sequence diagram when Spring is used with JPA


    ## JPA Querying


    The simplest operation with JPA is querying an object by its ID. There is no need
    to write a query, since `EntityManager` provides a method for this. It returns
    null when a user cannot be found. It returns an object of the entity type provided
    as argument. There is no need for casting, since under the hood, generics are
    used, just as with pure Hibernate.


    ```

    public User findById(Long id) {

    return entityManager.find(User.class, id);

    }

    ```


    `JPQL` stands for JPA Query language. It is used to write domain object queries
    in a similar manner to HQL.


    ```

    public List findAllByUserName(String username, boolean exactMatch) {

    if (exactMatch) {

    return entityManager.createQuery("from User u where username= ?")

    .setParameter(0, username).getResultList();

    } else {

    return entityManager.createQuery("from User u where username like ?")

    .setParameter(0, "%" + username + "%").getResultList();

    }

    }

    ```


    And named parameters are supported too:


    ```

    public List findAllByUserName(String username, boolean exactMatch) {

    if (exactMatch) {

    return entityManager.createQuery("from User u where username= :un")

    .setParameter("un", username).getResultList();

    } else {

    return entityManager.createQuery("from User u where username like :un")

    .setParameter("un", "%" + username + "%").getResultList();

    }

    }

    ```


    Named queries are part of the metadata, and are defined with the annotation `@NamedQuery`,
    which must be placed on the entity class that the query manages. The example above
    could be simplified by declaring two named queries. The annotation `@NamedQueries`
    can be used to group multiple queries together.


    ```

    //User.java

    import javax.persistence.NamedQuery;

    import javax.persistence.NamedQueries;

    ...

    @Entity

    @Table(name="P_USER")

    @SequenceGenerator(name = "seqGen", allocationSize = 1)

    @NamedQueries({

    @NamedQuery(name=User.FIND_BY_USERNAME_EXACT,

    query = "from User u where username= ?"),

    @NamedQuery(name=User.FIND_BY_USERNAME_LIKE,

    query = "from User u where username like ?")

    })

    public class User extends AbstractEntity {

    public static final String FIND_BY_USERNAME_EXACT = "findByUsernameExact";

    public static final String FIND_BY_USERNAME_LIKE = "findByUsernameLike";

    ...// entity fields and methods

    }

    //JpaUserRepo.java

    import static com.ps.ents.User.FIND_BY_USERNAME_EXACT;

    import static com.ps.ents.User.FIND_BY_USERNAME_LIKE;

    ...

    @Repository("userJpaRepo")

    public class JpaUserRepo implements UserRepo {

    public List findAllByUserName(String username, boolean exactMatch) {

    if (exactMatch) {

    return entityManager.createNamedQuery(FIND_BY_USERNAME_EXACT)

    .setParameter(0, username).getResultList();

    } else {

    return entityManager.createNamedQuery(FIND_BY_USERNAME_LIKE)

    .setParameter(0, "%" + username + "%").getResultList();

    }

    }

    ...

    }

    ```


    Named queries support named parameters as well, and this is the recommended way
    of writing all queries, because it makes them more readable and prevents errors
    caused by mistaken parameter indexes.


    ```

    //User.java

    @Entity

    @Table(name="P_USER")

    @SequenceGenerator(name = "seqGen", allocationSize = 1)

    @NamedQueries({

    @NamedQuery(name=User.FIND_BY_USERNAME_EXACT,

    query = "from User u where username= :un"),

    @NamedQuery(name=User.FIND_BY_USERNAME_LIKE,

    query = "from User u where username like :un")

    })

    public class User extends AbstractEntity {

    public static final String FIND_BY_USERNAME_EXACT = "findByUsernameExact";

    public static final String FIND_BY_USERNAME_LIKE = "findByUsernameLike";

    ...// entity fields and methods

    }

    //JpaUserRepo.java

    import static com.ps.ents.User.FIND_BY_USERNAME_EXACT;

    import static com.ps.ents.User.FIND_BY_USERNAME_LIKE;

    ...

    @Repository("userJpaRepo")

    public class JpaUserRepo implements UserRepo {

    bpublic List findAllByUserName(String username, boolean exactMatch) {

    if (exactMatch) {

    return entityManager.createNamedQuery(FIND_BY_USERNAME_EXACT)

    .setParameter("un", username).getResultList();

    } else {

    return entityManager.createNamedQuery(FIND_BY_USERNAME_LIKE)

    .setParameter("un", "%" + username + "%").getResultList();

    }

    }

    ...

    }

    ```


    When the query is expected to return multiple results, the method `.getResultList()`
    should be used. When a single result is expected, the method `getSingleResult()`
    should be used, and a casting must be done.


    JPA provides another method for querying entities using Criteria Queries. They
    are a part of the JPA API that can be used for creating ad hoc queries. It was
    introduced in JPA 2. Although it might look complicated, it is quite useful for
    complicated queries. For a simple query like the one implemented in the following
    code snippet, which only searches for users having a common last name, it looks
    quite impractical.


    ```

    import javax.persistence.criteria.*;

    ...

    @Override

    public List findAllByLastName(String username) {

    //create the query

    CriteriaBuilder builder= entityManager.getCriteriaBuilder();

    CriteriaQuery query = builder.createQuery(User.class);

    Root userRoot = query.from(User.class);

    ParameterExpression value = builder.parameter(String.class);

    query.select(userRoot).where(builder.equal(userRoot.get("lastName"), value));

    // execute the query

    TypedQuery tquery = entityManager.createQuery(query);

    tquery.setParameter(value,username);

    return tquery.getResultList();

    }

    ```


    Aside from these methods, JPA also supports execution of native queries, using
    the method `Query createNativeQuery(String sqlString);`, although when not using
    managed objects, for more control and efficiency, `JdbcTemplate` is more appropriate.'
