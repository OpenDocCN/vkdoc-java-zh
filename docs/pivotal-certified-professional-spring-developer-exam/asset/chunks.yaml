    RESTful Spring Application with Spring Boot


    The `15-ps-ws-rest-practice`

    application is configured using plain Spring MVC and has even a view

    resolver configured, so that if the application is started successfully,

    a web page becomes accessible at location `http://localhost:8080/`.

    The simplest way to configure a RESTful Spring application is using

    Spring Boot, because the simplest RESTful application will need fewer

    than 20 lines of code. The module `15-ps-rest-boot-sample`

    contains a Spring Boot RESTful application that provides the same HTTP

    methods as the Spring MVC application. The only difference is, to keep

    things simple, a simple version of the `User` class is used,

    and no JPA is present. In Figure [7-29](#A978-1-4842-0811-3_7_Chapter.html#Fig29),
    the

    `15-ps-rest-boot-sample`

    application structure is depicted.


    ![A978-1-4842-0811-3_7_Fig29_HTML.jpg](A978-1-4842-0811-3_7_Fig29_HTML.jpg)


    Figure 7-29.


    The 15-ps-rest-boot-sample Spring RESTful Boot application structure


    The `Application`

    class is the entry point of the application. Run this class as an

    application in Intellij IDEA, and the REST services will become

    available.


    ```

    package com.ps.rest;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.ConfigurableApplicationContext;

    import java.io.IOException;

    @SpringBootApplication

    public class Application {

    private static Logger  logger = LoggerFactory.getLogger(Application.class);

    public static void main(String args) throws IOException {

    ConfigurableApplicationContext ctx =

    SpringApplication.run(Application.class, args);

    assert (ctx != null);

    logger.info("Started ...");

    System.in.read();

    ctx.close();

    }

    }

    ```


    The `RestUserControllerTest`

    contains methods to test all the REST requests exposed by the `RestUserController`

    class. The RestUserController class is identical to the one introduced

    earlier; the URIs are the same. The only difference is that it gets the

    user instances from a map structure.


    ```

    ...

    @RestController

    public class RestUserController {

    // replacement for JPA UserService

    private Map userService = new HashMap();

    // create some users so we can test the controller

    @PostConstruct

    public void init() {

    User user = new User("johncusack", "John.Cusack@pet.com", 5d, true);

    userService.put(user.getUsername(), user);

    user = new User("jessicajones","Jessica.Jones@pet.com", 4d, true);

    userService.put(user.getUsername(),   user);

    }

    @RequestMapping(value = "/users", method = RequestMethod.GET)

    public List  all() {

    return new ArrayList(userService.values());

    }

    @ResponseStatus(HttpStatus.CREATED)

    @RequestMapping(value = "/users", method = RequestMethod.POST)

    public void create(@RequestBody @Valid User newUser,

    @Value("#{request.requestURL}")

    StringBuffer originalUrl, HttpServletResponse response)

    throws UserException {

    if (userService.containsKey(newUser.getUsername())) {

    throw new UserException("User found with email "

    + newUser.getEmail() + ". Cannot create!");

    }

    userService.put(newUser.getUsername(), newUser);

    response.setHeader("Location", getLocationForUser(originalUrl,

    newUser.getUsername()));

    }

    ...

    }

    ```


    Spring Boot is very practical for writing RESTful applications, because

    it automatically configures the infrastructure beans necessary in the

    background, and all that is left for the developer to do is to create

    REST controller classes. This is all that can be said about REST support

    in Spring, and it is time for the last advanced topic in this chapter,

    which it is not part of the official certification exam, but you might

    consider it useful.


    Spring JMX


    JMX is an acronym for Java Management Extensions, and this technology

    provides the tools for building distributed, Web-based, modular, and

    dynamic solutions for managing and monitoring devices, applications, and

    service-driven networks.[^(24)](#A978-1-4842-0811-3_7_Chapter.html#Fn24) JMX

    technology can be used to monitor and manage the Java Virtual Machine

    (Java VM) as well. The JMX specification defines the architecture,

    design patterns, APIs, and services in the Java programming language for

    management and monitoring of applications and networks. JMX allows

    configuration properties to be changed at runtime, can report cache

    hit/miss ratios at runtime, and can even invoke or simulate a client

    call.'
