    manually too in case of need. A unit test exercises a single scenario

    with a provided input and compares the expected results for that input

    with the actual results. If they match, the test passes; if they don’t,

    the test fails. This method of testing is fast and is one that is most

    used in many projects. The tests are written by developers, and the

    recommended practice is to cover every method in a class with positive

    and negative tests. Positive

    tests are the ones that test valid inputs for the unit, while

    negative tests test invalid

    inputs for the unit. These are tests that cover a failure of the unit,

    and they are considered to have failed if the unit does not actually

    fail when tested. The core framework helping developers to easily write

    and execute unit tests in Java since 2000 is `JUnit`. The current

    version is 4.13, but version 5 is currently being developed, and an

    Alpha version was released in January 2016.


    There are not many `JUnit` extensions,

    because there is little that this framework is missing, but there is a

    framework called `Hamcrest` that is

    quite interesting because it provides a set of matchers that can be

    combined to create flexible expressions of intent. It originated as a

    framework based on `JUnit`, and it was

    used for writing tests in Java, but managed to break the language

    barrier, and currently it is provided for most currently used languages

    such as Python and Swift. More about it can be found on the official

    site: [`http://hamcrest.org/`](http://hamcrest.org/) .


    Running a suite of unit tests together in a context with all their real

    dependencies provided is called integration testing . As the name of

    this technique implies, the infrastructure needed to connect objects

    being tested is also a part of the context in which tests are executed.

    In Figure [3-2](#A978-1-4842-0811-3_3_Chapter.html#Fig2), a simple

    diagram for comparing unit and integration testing concepts is depicted.


    ![A978-1-4842-0811-3_3_Fig2_HTML.jpg](A978-1-4842-0811-3_3_Fig2_HTML.jpg)


    Figure 3-2.


    Unit and integration testing concepts


    In order for functional units to be tested in isolation, dependencies

    must be replaced with pseudo-dependencies, fake objects with simple

    implementation that mimics the behavior of the real dependency as far as

    the dependent is concerned. The pseudo-dependencies can be stubs or mocks. Both
    perform the same function,

    to replace a real dependency, but they way they are created is what sets

    them apart .


    Testing with Stubs


    Stubs are created by the

    developer; they do not require extra dependencies. A stub is a concrete

    class implementing the same interface as the original dependency of the

    unit being tested. They should be designed to exhibit a small part or

    the whole behavior of the actual dependency.


    For example, let’s try to test one of the service classes that were

    introduced in the previous chapter, the `SimplePetService`.


    ```

    package com.ps.services.impl;

    ...

    public class SimplePetService extends SimpleAbstractService

    implements PetService {

    // dependency that has to be stubbed

    private PetRepo repo;

    @Override

    public Pet createPet(User user, String name, int age,

    PetType petType, String rfid) {

    Pet pet = new Pet();

    pet.setOwner(user);

    pet.setName(name);

    pet.setAge(age);

    pet.setRfid(rfid);

    user.addPet(pet);

    repo.save(pet);

    return pet;

    }

    @Override

    public Set findAllByOwner(User user) {

    return repo.findAllByOwner(user);

    }

    /**

    * @param user owner of the pet

    * @param name name of the pet

    * @return

    */

    @Override

    public Pet findByOwner(User user, String name) {

    return repo.findByOwner(user, name);

    }

    public void setRepo(PetRepo petRepo) {

    this.repo = petRepo;

    }

    public PetRepo getRepo() {

    return repo;

    }

    }

    // the interface defining the specific Pet behavior

    public interface PetService {

    Pet createPet(User user, String name, int age, PetType petType,

    String rfid);

    Set findAllByOwner(User user);

    Pet findByOwner(User user, String name);

    }

    ```


    This class inherits some behavior from the abstract class `SimpleAbstractService<Pet>`.


    ```

    package com.ps.services.impl;

    ...

    public abstract class SimpleAbstractService

    implements AbstractService{

    public void save(T entity) {

    getRepo().save(entity);

    }

    public T findById(Long entityId){

    return getRepo().findById(entityId);

    }

    @Override

    public void delete(T entity) {

    getRepo().delete(entity);

    }

    @Override

    public void deleteById(Long entityId) {

    getRepo().deleteById(entityId);

    }

    abstract AbstractRepo getRepo();

    }

    ```


    Although the number of tests varies depending on developer experience

    and what the code actually does, also related in a funny short story by

    Alberto Savoia, posted on the Google official blog,[²](#A978-1-4842-0811-3_3_Chapter.html#Fn2)
    my

    recommendation is to start unit testing by trying to write at least two

    tests for each method: one positive and one negative, for methods that

    can be tested in this way. There are seven methods in `SimplePetService`,

    besides the getter and setter, so the test class should have

    approximately fourteen tests. When testing the service class, the

    concern is that the class should interact correctly with the repository

    class. The behavior of the repository class is assumed known and fixed.

    The stub class will implement the typical repository behavior but

    without a database connection needed, because interaction with a

    database introduces an undesired lag in test execution. The

    implementation presented here will use a `java.util.Map` to

    simulate a database. As in the application, there are more repository

    classes extending `SimpleAbstractService<Pet>`;

    the stubs will follow the same inheritance design, so the abstract class

    will be stubbed as well.'
