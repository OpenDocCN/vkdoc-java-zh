    Microservices Communication


    It has already been said that microservices processes communicate using

    agnostic protocols such as REST. The `users-service` and

    `pets-service`

    both expose RESTful interfaces over HTTP (although different protocols

    can be set up as well: JMS or AMQP, for example), and in the presented

    example, another service called `web-` `service` was

    introduced that uses them to access their data. To consume RESTful

    services, Spring provides the `RestTemplate` class,

    which can be used to send HTTP requests to a RESTful server and fetch

    data in a number of formats such as XML and JSON. For the simplicity of

    the application, we’ll use the default format for the data, which is

    XML. The `web-service`

    microservice client uses a `RestTemplate` to

    connect and request data from the other two registered microservices

    while remaining agnostic as to their location and the exact URL, since

    Spring will automatically configure the locations for it.


