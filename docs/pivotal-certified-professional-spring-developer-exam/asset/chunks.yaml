    \ 类）后，第二个队列上的活动也应显示在 `Message Dequeued` 列中。这种情况如图 7-14 所示。\n\n![A978-1-4842-0811-3_7_Fig14_HTML.jpg](img/A978-1-4842-0811-3_7_Fig14_HTML.jpg)\n\
    \n图 7-14.\n\nActiveMQ Web 应用程序，“队列”选项卡展示了应用程序使用的两个队列，以及已生成和已消费的消息\n\n创建 Spring\
    \ JMS 应用程序的下一步是将 Spring Boot 添加到组合中。在 `13-ps-jms-practice` 项目模块中，你可以找到前面描述的两个\
    \ JMS 应用程序，它们使用了预 Boot 的 Java 配置。在 `13-ps-jms-solution` 中，你可以找到一个使用 Spring Boot\
    \ 配置的等效 Spring JMS 应用程序。\n\n使用 Spring Boot 的 JMS\n\n使用 Spring Boot 编写 Spring JMS\
    \ 应用程序更加容易。项目模块 `13-ps-jms-solution` 中的应用程序包含一个 Spring Boot JMS 应用程序，它将 `User`\
    \ 实例封装在 JMS 消息中发送到 `userQueue`。配置了一个消息监听器来处理该消息，并在 `confirmationQueue` 上发送一条确认消息。还定义了另一个监听器，它等待确认并打印其内容。为了进一步简化应用程序，不需要生产者类和消费者类。只有一个进程从两个队列发布和消费消息。Spring\
    \ Boot JMS 应用程序的抽象架构如图 7-15 所示。\n\n![A978-1-4842-0811-3_7_Fig15_HTML.jpg](img/A978-1-4842-0811-3_7_Fig15_HTML.jpg)\n\
    \n图 7-15.\n\nSpring Boot JMS 应用程序抽象架构\n\n该应用程序仅由四个类组成，其用途如下：\n\n*   `UserReceiver`\
    \ 和 `ConfirmationReceiver` 负责接收用户消息和确认消息。这些类具有更实用的实现，使用了 `@JmsListener` 注解。在将处理消息的方法上使用此注解，允许开发者避开实现\
    \ `MessageListener` 的 JMS 限制。此注解标记了在其上使用的方法，作为指定目标上的 JMS 监听器的目标，并且 `connectionFactory`\
    \ 属性指定了用于构建 JMS 监听器容器的 Bean。此注解由特殊的 Spring Bean 后处理器处理：`org.springframework.jms.annotation.JmsListenerAnnotationBeanPostProcessor`。\n\
    \n```\n    // UserReceiver.java\n    @Component\n    public class UserReceiver{\n\
    \    private Logger logger = LoggerFactory.getLogger(UserReceiver.class);\n  \
    \  private static AtomicInteger id = new AtomicInteger();\n    @Autowired\n  \
    \  ConfirmationSender confirmationSender;\n    @JmsListener(destination = \"userQueue\"\
    ,\n    containerFactory = \"connectionFactory\")\n    public void receiveMessage(User\
    \ receivedUser) {\n    logger.info(\" >> 收到用户: \" + receivedUser);\n    confirmationSender.sendMessage(\n\
    \    new Confirmation(id.incrementAndGet(), \"用户 \"\n    + receivedUser.getEmail()\
    \ + \" 已收到。\"));\n    }\n    }\n    //ConfirmationReceiver.java\n    @Component\n\
    \    public class ConfirmationReceiver {\n    private Logger logger = LoggerFactory.getLogger(ConfirmationReceiver.class);\n\
    \    @JmsListener(destination = \"confirmationQueue\",\n    containerFactory =\
    \ \"connectionFactory\")\n    public void receiveConfirmation(Confirmation confirmation)\
    \ {\n    logger.info(\" >> 收到确认: \" + confirmation);\n    }\n    }\n    ```\n\n\
    *   `ConfirmationSender` 类只是一个注入了 `JmsTemplate` Bean 的 Bean，用于向 `confirmationQueue`\
    \ 发送确认对象。\n\n```\n    @Component\n    public class ConfirmationSender {\n    @Autowired\n\
    \    JmsTemplate jmsTemplate;\n    public void sendMessage(final Confirmation\
    \ confirmation) {\n    jmsTemplate.convertAndSend(\"confirmationQueue\", confirmation);\n\
    \    }\n    }\n    ```\n\n*   `Application` 类是应用程序的配置和启动类。它使用了功能强大的 `@SpringBootApplication`\
    \ 注解，该注解将确保扫描当前包中的 Bean，并根据类路径设置注入所有基础设施 Bean。该类上的另一个注解是 `@EnableJms`，正如你可能推测的那样，此注解启用了\
    \ Bean 后处理器，该处理器将处理 `@JmsListener` 注解，并在“幕后”创建消息监听器容器。在此类中，还声明了 `connectionFactory`\
    \ Bean。在此示例中，Bean 的类型是 `org.springframework.jms.config.JmsListenerContainerFactory`，使用的实现是\
    \ Spring Boot 的 `org.springframework.boot.autoconfigure.jms.DefaultJmsListenerContainerFactoryConfigurer`，它将启动\
    \ JMS 应用程序所需的所有 Spring Boot 基础设施 Bean。\n\n还定义了一个类型为 `MappingJackson2MessageConverter`\
    \ 的转换器 Bean，它实现了 JMS 的 `MessageConverter` 接口，将发送的对象转换为文本 JSON 格式。使用文本转换器非常有用，尤其是在要发送的消息不是可序列化类型时。在此示例中，`User`\
    \ 和 `Confirmation` 类特意没有声明实现 `Serializable`。\n\n`main` 方法除了启动应用程序外，还实例化了一个 `JmsTemplate`\
    \ 对象，用于发送用户对象。\n"
- fmt: "```java\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.boot.autoconfigure.jms.DefaultJmsListenerContainerFactoryConfigurer;\n\
    import org.springframework.jms.annotation.EnableJms;\nimport org.springframework.jms.config.DefaultJmsListenerContainerFactory;\n\
    import org.springframework.jms.config.JmsListenerContainerFactory;\nimport org.springframework.jms.support.converter.MappingJackson2MessageConverter;\n\
    import org.springframework.jms.support.converter.MessageConverter;\nimport org.springframework.jms.support.converter.MessageType;\n\
    ...\n@SpringBootApplication\n@EnableJms\npublic class Application {\n    private\
    \ static Logger logger = LoggerFactory.getLogger(Application.class);\n    public\
    \ static void main(String args) throws Exception {\n        ConfigurableApplicationContext\
    \ context = SpringApplication.run(Application.class, args);\n        JmsTemplate\
    \ jmsTemplate = context.getBean(JmsTemplate.class);\n        //Send an user\n\
    \        System.out.println(\"Sending an user message.\");\n        jmsTemplate.convertAndSend(\"\
    userQueue\", new User(\"John.Cusack@pet.com\", 5d, true));\n        logger.info(\"\
    Waiting for user and confirmation ...\");\n        System.in.read();\n       \
    \ context.close();\n    }\n    @Bean // Serialize message content to json using\
    \ TextMessage\n    public MessageConverter jacksonJmsMessageConverter() {\n  \
    \      MappingJackson2MessageConverter converter = new MappingJackson2MessageConverter();\n\
    \        converter.setTargetType(MessageType.TEXT);\n        converter.setTypeIdPropertyName(\"\
    _type\");\n        return converter;\n    }\n    @Bean\n    public JmsListenerContainerFactory\
    \ connectionFactory(\n            ConnectionFactory connectionFactory,\n     \
    \       DefaultJmsListenerContainerFactoryConfigurer configurer) {\n        DefaultJmsListenerContainerFactory\
    \ factory = new DefaultJmsListenerContainerFactory();\n        configurer.configure(factory,\
    \ connectionFactory);\n        return factory;\n    }\n}\n```\n\n`MappingJackson2MessageConverter`\
    \ converter bean has two properties set in the previous code sample. The `targetType`\
    \ is set with the JMS message type to which the information will be serialized.\
    \ Default is `BytesMessage`. For JSON type, `TextMessage` is suitable, because\
    \ in this way, the JMS messages become readable, and thus debugging in case of\
    \ problems becomes easier. The `typeIdPropertyName` is used to name the JMS message\
    \ property that carries the type ID for the contained object: either a mapped\
    \ ID value or a raw Java class name. The default value is NONE, but this property\
    \ must be set to allow converting from an incoming message to a Java object. In\
    \ the previous example, the property is set to `_type`. Assuming that a `User`\
    \ instance is sent, the JMS message in this instance is converted to look similar\
    \ to what is depicted in the following code snippet:\n\n```\nActiveMQTextMessage\
    \ {\ncommandId = 5,\nresponseRequired = true,\nmessageId = ID:ROSBZM4044324X-64390-1478342192637-4:3:1:1:1,\n\
    destination = queue://userQueue,\nsize = 1140,\nproperties = {_type=com.ps.jms.User},\n\
    text = {\"email\":\"John.Cusack@pet.com\",\"rating\":5.0,\"active\":true}}\n...\n\
    }\n```\n\n`@JmsListener` was added in Spring version 4.1 and represents a really\
    \ practical way to configure a message listener. Methods annotated with it have\
    \ flexible signatures that can have arguments that the Spring container injects\
    \ automatically, such as the JMS session, the exact message object, JMS headers,\
    \ and others that you can find listed in the official documentation. The JSON\
    \ snippet depicted earlier was retrieved by modifying the `UserReceiver` implementation\
    \ and adding a parameter of type `Message`, which Spring will replace with the\
    \ original JMS message at runtime.\n\n```java\n@Component\npublic class UserReceiver{\n\
    \    private Logger logger = LoggerFactory.getLogger(UserReceiver.class);\n  \
    \  private static AtomicInteger id = new AtomicInteger();\n    @Autowired\n  \
    \  ConfirmationSender confirmationSender;\n    @JmsListener(destination = \"userQueue\"\
    , containerFactory = \"connectionFactory\")\n    public void receiveMessage(User\
    \ receivedUser, Message message) {\n        logger.info(\" >> Original received\
    \ message: \" + message);\n        logger.info(\" >> Received user: \" + receivedUser);\n\
    \        confirmationSender.sendMessage(new Confirmation(id.incrementAndGet(),\
    \ \"User \"\n                + receivedUser.getEmail() + \" received.\"));\n \
    \   }\n}\n```\n\n`JmsTemplate` makes it very easy to send messages to destinations,\
    \ and in this example is automatically created by Spring Boot. The `connectionFactory`\
    \ is also created by Spring Boot and is backed up by ActiveMQ running in embedded\
    \ mode.\n\nJMS can be used as a mechanism to allow asynchronous request processing\
    \ between backend components. It is quite useful when data replication is needed\
    \ or in the execution of long-running processes of which the end user of an application\
    \ has no knowledge and that should not impede the use of the application. Also,\
    \ publish/subscribe is a good technique to decouple senders from receivers, thereby\
    \ increasing the flexibility of an architecture. JMS is still used mostly in flexible\
    \ processes where communication is asynchronous and messages can be lost and it\
    \ is not a problem to resend them.\n\n## Spring Web Services\n\nThe term \"web\
    \ service\" describes a standardized way of communication between web applications\
    \ integration using XML, SOAP, WSDL, and UDDI open standards over an internet\
    \ protocol backbone. This type of communication allows for a relaxed coupling\
    \ of the applications doing the communication and is really useful when the applications\
    \ are subject to frequent changes, since changes should not affect the compatibility\
    \ between them. XML used to be the international language in the web services\
    \ world, until JSON came into the picture. XML is a standardized way of organizing\
    \ data that can be understood by all major platforms:\n\n*   Java, uses APIs as\
    \ SAX, StAX, DOM, JAXB to manipulate XML\n*   .NET uses System.XML or .NET XML\
    \ Parser\n*   Ruby uses Nokogiri, REXML or XMLSimple\n*   Perl uses LibXML, Perl-XML\
    \ or XML::Simple\n*   etc.\n\nSOAP is an acronym for Simple Object Access Protocol.\
    \ It is a protocol specification for exchanging structured information in the\
    \ implementation of web services in computer networks. SOAP is not necessarily\
    \ linked to web services or RPC, and it encapsulates the key terms that should\
    \ be respected in designing loosely coupled applications that need to exchange\
    \ information: extensibility (security and WS-routing are among the extensions\
    \ under development), neutrality (can operate over any protocol such as HTTP,\
    \ SMTP, TCP, UDP, or JMS) and independence (allows for any programming model).\
    \ Basically, SOAP is what allows communication between applications regardless\
    \ of the implementation or the underlying operating system.\n\nWeb services implementation\
    \ details are usually enclosed in the Web Services layer, which communicates directly\
    \ with the service layer. The Web Service layer provides the logic to convert\
    \ software objects into XML-based representations that can be sent to destination\
    \ applications. Spring provides support for web services implementation through\
    \ its Spring Web Services (Spring-WS), which is a product of the Spring community\
    \ focused on creating document-driven Web services. Like all Spring products,\
    \ its aim is to provide the infrastructure and support components that make writing\
    \ web-services-based applications practical and pleasant. Below are listed a few\
    \ key features of the Spring-WS.\n\n*   It makes the best practice of using XSD/WSDL\
    \ first-contracts easy, which is quite important, since using WSDL is often seen\
    \ as a hassle by developers, even if the main advantage is that it solves many\
    \ interoperability issues."
