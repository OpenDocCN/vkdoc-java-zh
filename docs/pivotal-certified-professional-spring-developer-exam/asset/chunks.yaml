    对于删除方法，负向测试看起来略有不同，因为 `delete` 方法不会返回可供断言的任何结果。相反，当它们无法删除记录时，会抛出一个 `com.ps.repos.NotFoundException`
    类型的异常。当然，这有点极端，但为了向你展示如何测试这些方法，这是必要的。由于我们知道抛出异常的情况，为了使测试通过，我们使用 `@Test` 注解的 `expected`
    属性来告知 JUnit 何时预期此行为。


