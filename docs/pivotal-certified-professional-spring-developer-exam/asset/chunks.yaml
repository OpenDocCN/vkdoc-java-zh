    Bean 生命周期与作用域


    通过组件扫描可以发现带有注解的 Bean 和方法。无论应用程序如何配置、Bean 如何定义，Bean 的生命周期都是相同的。尽管从外部看行为一致，但底层实现却有所不同。这很正常，因为
    Java 配置和 XML 配置是两种不同的方式，但它们也存在共同点。让我们逐步了解这些内容。


    Bean 定义加载


    *   回顾 XML Bean 生命周期部分，第一步是加载 Bean 定义。使用 XML 时，会通过 `org.springframework.beans.factory.xml.XmlBeanDefinitionReader`
    类型的 Bean 从 XML 文件中加载 Bean 定义。


    *   对于使用 Java 配置注解的配置，会通过 `org.springframework.context.annotation.ClassPathBeanDefinitionScanner`
    类型的 Bean 扫描类路径，并由 `org.springframework.context.annotation.ConfigurationClassBeanDefinitionReader`
    类型的 Bean 注册 Bean 定义。²⁴


    *   对于同时使用 XML 和构造型注解的混合配置，则会同时使用上述两种类。


    Bean 创建


    在所有情况下，XML 和注解 Bean 都由 `org.springframework.beans.factory.support.DefaultListableBeanFactory`
    类型的工厂创建。


    依赖注入


    *   XML：使用工厂 Bean 来注入依赖。


    *   Java 配置及其他所有注解：使用 `org.springframework.beans.factory.annotation.AutowiredAnnotationBeanPostProcessor`
    类型的 Bean 来自动装配依赖。这是一个后处理器 Bean 实现，用于自动装配带有注解的字段、setter 方法以及任意配置方法。它由 `@Configuration`
    注解注册，但也可以通过组件扫描在混合配置中注册。该 Bean 负责处理通过 `@Autowired`、`@Value` 和 `@Inject` 配置的自动装配。


    *   对于混合配置，上述两种方法会同时使用。


    Bean 销毁


    在所有情况下，无论是 XML 还是注解，销毁 Bean 的繁琐工作都由 `org.springframework.beans.factory.support.DisposableBeanAdapter`
    类型的 Bean 负责。


    以上就是关于注解处理内部机制的全部内容。所有注解都会被 Bean 后处理器捕获并相应处理。如果你真的好奇还有哪些 Bean 对运行应用程序有贡献，只需将 Spring
    框架的日志级别设置为 DEBUG，然后欣赏输出即可。


    在类似的 XML 部分中，我们提到过 `<bean/>` 元素中的 `init-method` 和 `destroy-method` 有对应的注解方式，这将在注解部分介绍，²⁵
    因为它们由 `@Bean` 注解的两个属性表示。请分析以下示例：


    ```

    // JdbcRequestRepo.java

    @Repository("requestRepo")=

    public class JdbcRequestRepo extends JdbcAbstractRepo

    implements RequestRepo {

    private Logger logger = LoggerFactory.getLogger(JdbcRequestRepo.class);

    private void init(){

    logger.info(" ... 正在初始化 requestRepo ...");

    }

    private void destroy(){

    logger.info(" ... 正在销毁 requestRepo ...");

    }

    ...

    }

    //RequestRepoConfig.java 配置类

    @Configuration

    @Import(DataSourceConfig.class)

    @ComponentScan(basePackages = "com.ps")

    public class RequestRepoConfig {

    @Bean (initMethod = "init", destroyMethod = "destroy")

    public RequestRepo anotherRepo(){

    return new JdbcRequestRepo();

    }

    }

    ```


    Java 配置注解 `@Bean` 的 `initMethod` 属性指定了用于初始化 `anotherRepo` 的方法名称，而 `destroyMethod`
    属性则指定了在上下文关闭时要调用的方法。来自 `RequestRepoConfig` 类的 Bean 定义基本上等同于以下内容：


    通过 `@Bean`、`@Component` 或其任何特化注解标记的定义所创建的 Bean，默认是单例的。但可以通过使用 `@Scope` 注解类或方法，并将
    `value` 属性设置为其他作用域来更改作用域。


    ```

    @Component

    @Scope(value = ConfigurableBeanFactory.SCOPE_PROTOTYPE)

    public class SimpleBean {

    ...

    }

    ```


    !


    `@Scope(value = ConfigurableBeanFactory.SCOPE_PROTOTYPE)` 等同于 `@Scope(ConfigurableBeanFactory.SCOPE_PROTOTYPE)`，也等同于
    `@Scope("prototype")`，因为常量 `SCOPE_PROTOTYPE` 是值为 "prototype" 的字符串类型。使用 Spring
    常量可以消除拼写错误作用域值的风险。


    另一个有趣的注解是 `@Lazy`，从 Spring 4.x 开始，它也可以用于注入点（即任何使用 `@Autowired` 的地方）。通过将此注解添加到
    Bean 定义中，可以延迟 Bean 的创建，直到首次访问它。当依赖项是一个巨大的对象，并且你不想在真正需要之前让内存被该对象占用时，这非常有用。


    ```

    @Component

    @Lazy

    public class SimpleBean { ... }

    // 或者在 @Bean 上使用

    @Configuration

    public class RequestRepoConfig {

    @Lazy

    @Bean

    public RequestRepo anotherRepo(){

    return new JdbcRequestRepo();

    }

    }

    // 在注入点上使用

    @Repository

    public class JdbcPetRepo extends JdbcAbstractRepo

    implements PetRepo {

    ...

    @Lazy

    @Autowired(required=false)

    public void setDataSource(DataSource dataSource) {

    this.dataSource = dataSource;

    }

    }

    ```


    除了目前讨论的所有注解之外，开发者还可以开发自己的注解。Spring 提供的许多注解都可以作为元注解在你的代码中使用。你可以将元注解视为一个超类。元注解可用于注解另一个注解。例如，所有构造型特化注解都使用
    `@Component` 进行注解。元注解可以组合以生成其他注解。例如，让我们创建一个 `@CustomTx` 注解，用于标记将使用不同事务的服务 Bean：


    ```

    import java.lang.annotation.ElementType;

    import java.lang.annotation.Retention;

    import java.lang.annotation.RetentionPolicy;

    import java.lang.annotation.Target;

    import org.springframework.transaction.annotation.Transactional;

    @Target({ElementType.METHOD, ElementType.TYPE})

    @Retention(RetentionPolicy.RUNTIME)

    @Transactional("customTransactionManager", timeout="90")

    public @interface CustomTx {

    boolean readOnly() default false;

    }

    ```


    !


    在讨论了这么多关于注解及其强大之处的内容之后，你可能想要使用它们。`02-ps-container-02-practice` 包含了 Java 配置和注解部分的所有示例。所有配置类都在
    `com.ps.config` 包中。所有 Bean 类都在 `com.ps.repo` 下。在 `resources` 目录中，你可以找到一些用于混合示例的
    XML 配置类。该项目只有一个 TODO 任务。TODO 编号 13 要求你尽可能地将 Spring 注解替换为 JSR 注解。

    '
- fmt: 'Spring configuration using annotations is really powerful and flexible. In
    this book, Java Configuration and Annotations are covered together, because this
    is the way they are commonly used in practice. There definitely are old-style
    developers who still prefer XML and more grounded developers who like to mix and
    match. Configuration using annotations is practical, because it can help you reduce
    the number of resource files in the project, but the downside is that it is scattered
    all over the code. But being linked to the code, refactoring is a process that
    becomes possible without the torture of searching bean definitions in XML files,
    although smart editors help a lot with that these days. The annotations configuration
    is more appropriate for beans that are frequently changing: custom business beans
    such as services, repositories, and controllers. Imagine adding a new parameter
    for a constructor and then going hunting beans in the XML files so the definition
    can be updated. Java Configuration annotations should be used to configure infrastructure
    beans (data sources, persistence units, etc).


    There are advantages to using XML too. The main advantage is that the configuration
    is centralized in a few parts of the application, but Java Configuration does
    the same. Then, XML is widely supported and known. Ultimately, it is only the
    context that decides the most appropriate solution. If you are a Spring expert
    starting to work on your own startup application, you will probably go with Java
    Configuration and annotations. And probably Spring Boot, which will make your
    work much easier by providing super-meta-annotations to configure much of the
    infrastructure needed for the project. If you are working on a big project with
    legacy code, you will probably be doomed with some XML configuration here and
    there. Whatever the case, respect good practices and read the manual, and you
    should be fine.


    ## Summary


    After reading this chapter you should possess enough knowledge to configure a
    Spring application, using XML, Java Configurations, and annotations or all of
    them, and to harness the power of beans to develop small Spring Applications.


    * Spring is built for dependency injection and provides a container for Inversion
    of Control, which takes care of injecting the dependencies according to the configuration.

    * The two flavors of configuration can also be mixed: XML-based when beans declarations
    are decoupled from code and Java Configuration when bean declarations are in the
    code.

    * Spring promotes the use of interfaces, so beans of types implementing the same
    interface can be easily interchanged.

    * The Spring way of configuration promotes testability. Since beans can be interchanged,
    it is easy to use stubs and mocks to isolate components.

    * The bean lifecycle can be controlled; behavior can be added at specific points
    during the bean life.

    * Spring offers many ways to simplify configuration: bean inheritance, nesting
    and namespaces in XML, and a lot of convention over configuration default behavior
    in Java Configuration.

    * Bean definition sources can be coupled by importing them one into another, or
    by composing them in order to create an application context.


    ## 2.1 Quick quiz


    **Question 1: What is a bean?** (choose all that apply)


    1. a Plain Old Java Object

    2. an instance of a class

    3. an object that is instantiated, assembled, and managed by a Spring IoC Container


    **Question 2: What is the default scope of a bean?**


    1. default

    2. singleton

    3. protected

    4. prototype


    **Question 3: What are the types of dependency injection supported by Spring IoC
    Container?** (choose all that apply)


    1. setter injection

    2. constructorinjection

    3. interface-based injection

    4. field-based injection


    **Question 4: What class is used to bootstrap an XML configured application context?**


    1. `ClassPathXmlApplicationContext`

    2. `AnnotationConfigApplicationContext`

    3. `ApplicationContext`'
