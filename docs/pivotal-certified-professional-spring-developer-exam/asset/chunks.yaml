    Cloud Foundry 是一个开源云平台即服务（PaaS），开发者可以在公有云和私有云模型上构建、部署、运行和扩展应用程序。它由 VMware 创建，并在被收购后由
    Pivotal 维护。有一个 Spring Cloud 项目，可以轻松地在 Cloud Foundry 中运行 Spring Cloud 应用 [`https://cloud.spring.io/spring-cloud-cloudfoundry/`](https://cloud.spring.io/spring-cloud-cloudfoundry/)


    Ribbon 是另一个 Netflix OSS 组件。它提供客户端软件负载均衡算法。更多信息请参见：[`https://github.com/Netflix/ribbon/wiki`](https://github.com/Netflix/ribbon/wiki)
