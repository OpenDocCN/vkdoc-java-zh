    ## 7. Spring Advanced Topics


    In the previous chapters, the objects handled by Spring were created on a JVM.
    These objects were accessed and manipulated indirectly by the user using the HTTP
    protocol. In this case, all that the end user needs to access the objects in the
    JVM is the web interface of the application.


    Remoting and Web Services are ways of communicating between applications. The
    applications can run on the same computer, on different computers, on different
    networks, and can even be written in different languages (a Python application
    can consume a web service provided by a Java application, for example). In remoting,
    the applications communicating know about each other. There is a server application
    and a client application. Because of this, it supports state management options
    and can correlate multiple calls from the same client and support callbacks. On
    the client application, a proxy of the server target object is created and used
    to access the object on the server. Remoting can be used across any protocol,
    but it does not do well with firewalls. Remoting relies on the existence of common
    language runtime assemblies that contain information about data types. This limits
    the information that must be passed about an object and allows objects to be passed
    by value or by reference. The communication is done using a binary, XML, or JSON
    format. All these limitations make remoting quite deprecated at the moment this
    book is being written. Web services have completely replaced them.'
