- fmt: "# Microservice Registration and Communication\n\nAt registration time, each\
    \ microservice gets a unique registration identifier from the server. If another\
    \ process registers with the same ID, the server treats it as a restart, so the\
    \ first process is discarded. To run multiple instances of the same process—for\
    \ reasons of load balancing and resilience and because, after all, it is a distributed\
    \ application and it should be possible to do this—we have to make sure that the\
    \ server generates a different registration ID. The simplest way in which this\
    \ can be done is by providing the option of specifying a different port for the\
    \ microservice. The registration ID with the configuration used so far, the one\
    \ in the `<instanceId>` element, is the default naming template; it appears as\
    \ follows:\n\n```\n${ipAddress}:${spring.application.name:${server.port}}\n```\n\
    \nThe registration ID can be set using Eureka property configurations:\n\n```\n\
    eureka:\n  instance:\n    metadataMap:\n      instanceId:\n        ${spring.application.name}:${spring.application.instance_id:${server.port}}\n\
    ```\n\nIf the `spring.application.instance_id` is not defined, it will revert\
    \ to the default format mentioned earlier. The `spring.application.instance_id`\
    \ is set only when Cloud Foundry is used, and it conveniently provides a unique\
    \ ID number for each instance of the same application.\n\nFor running a microservices\
    \ application locally, the method with a parametrizable port is more practical.\
    \ This can be done easily by setting the `server.port` property before starting\
    \ the application.\n\n```\n// in the Application.main(...) method\n...\ncase \"\
    pet\":\n  if (args.length == 2) {\n    System.setProperty(\"server.port\", args[1]);\n\
    \  }\n  PetServer.main(args);\n  break;\n...\n```\n\nSo, now we can start as many\
    \ `pets-service` instances as we need, by executing the following code:\n\n```\n\
    java -jar build/libs/ps-micro-1.1.0.RELEASE.jar pet PORT\n```\n\nIn Figure 8-8,\
    \ you can see that two `pets-service` instances were started and registered, the\
    \ default one on port 4000, and a second one on port 4003.\n\n![A978-1-4842-0811-3_8_Fig8_HTML.jpg](A978-1-4842-0811-3_8_Fig8_HTML.jpg)\n\
    \n**Figure 8-8.** Two different PETS-SERVICE microservices registered with the\
    \ Eureka Server\n\n## Microservices Communication\n\nIt has already been said\
    \ that microservices processes communicate using agnostic protocols such as REST.\
    \ The `users-service` and `pets-service` both expose RESTful interfaces over HTTP\
    \ (although different protocols can be set up as well: JMS or AMQP, for example),\
    \ and in the presented example, another service called `web-service` was introduced\
    \ that uses them to access their data. To consume RESTful services, Spring provides\
    \ the `RestTemplate` class, which can be used to send HTTP requests to a RESTful\
    \ server and fetch data in a number of formats such as XML and JSON. For the simplicity\
    \ of the application, we'll use the default format for the data, which is XML.\
    \ The `web-service` microservice client uses a `RestTemplate` to connect and request\
    \ data from the other two registered microservices while remaining agnostic as\
    \ to their location and the exact URL, since Spring will automatically configure\
    \ the locations for it.\n\nThe implementation of the `web-service` is a little\
    \ different, since a web interface is configured for it. The Eureka server uses\
    \ `FreeMarker` templates by default, so if a different implementation is desired,\
    \ these have to be first ignored via configuration, by setting the `spring.application.freemarker.enabled`\
    \ to `false`. The configuration file for the `web-service` is depicted in the\
    \ following code snippet.\n\n```\nspring:\n  application:\n    name: web-service\n\
    \  freemarker:\n    enabled: false     #Do not use FreeMarker templates\n  thymeleaf:\
    \           #Thymeleaf templates will be used\n    cache: false\n    prefix: classpath:/web-server/templates/\n\
    \  error:\n    path: /error\neureka:\n  instance:\n    leaseRenewalIntervalInSeconds:\
    \ 5\n  client:\n    serviceUrl:\n      defaultZone: http://localhost:3000/eureka/\n\
    # HTTP Server\nserver:\n  port: 4002 # HTTP (Tomcat) port\n```\n\nThe central\
    \ class of this microservice is the `AllWebController`, which is the one that\
    \ uses the `AllWebService` that requests information from the `pets-service` and\
    \ the `users-service` microservices, and wraps it up in objects that can be rendered\
    \ in a Thymeleaf view. The code for the `AllWebController` is nothing special,\
    \ just a typical Spring controller class using a service instance to access data.\n\
    \n```\n@Controller\npublic class AllWebController {\n    private static Logger\
    \ logger = LoggerFactory.getLogger(AllWebController.class);\n    @Autowired\n\
    \    private AllWebService allWebService;\n    public AllWebController(AllWebService\
    \ allWebService) {\n        this.allWebService = allWebService;\n    }\n    @RequestMapping(\"\
    /all/{ownerId}\")\n    public String byOwner(Model model,\n                  \
    \        @PathVariable(\"ownerId\") Long ownerId) {\n        UserSkeleton owner\
    \ = allWebService.findUserById(ownerId);\n        if (owner != null) {\n     \
    \       owner.setPets(allWebService.findByOwnerId(ownerId));\n        }\n    \
    \    model.addAttribute(\"owner\", owner);\n        return \"all\";\n    }\n \
    \   @RequestMapping(\"/pets/{type}\")\n    public String byOwner(Model model,\n\
    \                          @PathVariable(\"type\") String type) {\n        List\
    \ pets = allWebService.findByType(type);\n        model.addAttribute(\"pets\"\
    , pets);\n        model.addAttribute(\"type\", type);\n        return \"pets\"\
    ;\n    }\n}\n```\n\nThe implementation for this service is depicted in the following\
    \ code snippet.\n\n```\npackage com.ps.web;\nimport com.ps.ex.UserNotFoundException;\n\
    import org.springframework.cloud.client.loadbalancer.LoadBalanced;\nimport org.springframework.stereotype.Service;\n\
    import org.springframework.web.client.HttpClientErrorException;\nimport org.springframework.web.client.RestTemplate;\n\
    ...\n@Service\npublic class AllWebService {\n    private static Logger logger\
    \ = LoggerFactory.getLogger(AllWebService.class);\n    @Autowired\n    @LoadBalanced\n\
    \    private RestTemplate restTemplate;\n    private String petsServiceUrl;\n\
    \    private String usersServiceUrl;\n    public AllWebService(String usersServiceUrl,\
    \ String petsServiceUrl) {\n        this.usersServiceUrl = usersServiceUrl;\n\
    \        this.petsServiceUrl = petsServiceUrl;\n    }\n    public UserSkeleton\
    \ findUserById(Long id) {\n        logger.info(\"findUserById(\" + id + \" ) called\"\
    );\n        User user = null;\n        try {\n            user = restTemplate.getForObject(usersServiceUrl\n\
    \                    + \"/users/id/{id}\", User.class, id);\n        } catch (HttpClientErrorException\
    \ e) {\n            // no user\n            throw new UserNotFoundException(id);\n\
    \        }\n        return new UserSkeleton(user.getId(), user.getUsername());\n\
    \    }\n    public List findByOwnerId(Long ownerId) {\n        logger.info(\"\
    findByOwnerId(\" + ownerId + \" ) called\");\n        Pet pets = null;\n     \
    \   try {\n            pets = restTemplate.getForObject(petsServiceUrl\n     \
    \               + \"/pets/owner/{id}\",\n                    com.ps.pet.Pet.class,\
    \ ownerId);\n        } catch (HttpClientErrorException e) {\n            // no\
    \ pets\n        }\n        if(pets == null || pets.length == 0) {\n          \
    \  return null;\n        }\n        List petsList = new ArrayList();\n       \
    \ for (Pet pet : pets) {\n            petsList.add(new PetSkeleton(pet.getName(),\n\
    \                    pet.getAge(), pet.getPetType().toString()));\n        }\n\
    \        return petsList;\n    }\n}\n```\n\nThe previous implementation is a normal\
    \ Spring service class, annotated with the `@Service` stereotype annotation. It\
    \ is a wrapper for a `RestTemplate` instance that accesses two beans that are\
    \ references to the microservices `pets-service` and `users-service`. The classes\
    \ `UserSkeleton` and `PetSkeleton` are stripped versions of the entity classes\
    \ and were introduced to simplify the implementation a little, since the focus\
    \ of the section is on the microservices' implementation and logic. The code for\
    \ the two classes is nothing but the most basic implementation of a POJO and is\
    \ part of the `com.ps.web` package from the `17-ps-micro-sample`.\n\nThe only\
    \ novelty is the `@LoadBalanced` annotation, which marks the injected `RestTemplate`\
    \ bean to be configured to use a `LoadBalancerClient` implementation.\n\nAs you\
    \ probably recall from the previous chapter, the `RestTemplate` is thread-safe,\
    \ so it can be used to access any number of services in different parts of an\
    \ application. In this example, two microservices are accessed by the same `RestTemplate`\
    \ bean."
