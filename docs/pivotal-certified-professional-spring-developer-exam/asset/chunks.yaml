  trans: "\n3.  **本地 JPA Spring 环境**：一种本地配置，声明了一个要使用的基本数据源（即使是嵌入式数据源也可以），以及一个类型为 `org.springframework.orm.jpa.JpaTransactionManager`\
    \ 的 Bean。这是一个 Spring 特定的实现，它使用由类型为 `org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean`\
    \ 的基础设施 Bean 创建的实体管理器对象，在事务上下文中管理实体。此配置的抽象模式如图 5-8 所示。要创建 `LocalContainerEntityManagerFactoryBean`\
    \ Bean，需要一个持久化管理器和一个 JPA 适配器 Bean。这些可以由 Hibernate、Apache OpenJPA 或任何其他 Spring\
    \ 支持的持久化框架提供。\n\n![A978-1-4842-0811-3_5_Fig8_HTML.jpg](img/A978-1-4842-0811-3_5_Fig8_HTML.jpg)\n\
    \n图 5-8.\n\nSpring 本地 JPA 配置抽象模式\n\n4.  **企业级 JTA Spring 环境**：此设置需要一个应用服务器，该服务器将使用\
    \ JNDI 配置并提供一个数据源 Bean。Spring 将加载一个类型扩展自 `org.springframework.transaction.jta.JtaTransactionManager`\
    \ 的 Bean，该 Bean 特定于所使用的应用服务器。此事务管理器适用于处理分布式事务（即跨多个资源的事务），以及控制应用服务器资源上的事务。此配置的抽象模式如图\
    \ 5-9 所示。\n\n![A978-1-4842-0811-3_5_Fig9_HTML.jpg](img/A978-1-4842-0811-3_5_Fig9_HTML.jpg)\n\
    \n图 5-9.\n\n企业级 JTA Spring 环境\n\n**Spring 中事务管理的工作原理**\n\n在上一节中，一个仓库类使用 `JdbcTemplate`\
    \ 在连接内执行方法。为了引入事务，我们需要一个服务类，它将在事务上下文中调用仓库方法。图 5-10 描述了本节所涵盖示例的抽象 UML 时序图。图中的图表仅提到了\
    \ `findById(...)` 方法，但涉及管理数据库存储信息的每个服务方法的调用序列都是相同的。\n\n![A978-1-4842-0811-3_5_Fig10_HTML.jpg](img/A978-1-4842-0811-3_5_Fig10_HTML.jpg)\n\
    \n图 5-10.\n\n服务类的 UML 调用图\n\nSpring 在底层利用前一章介绍的框架 AOP 来实现事务管理，这是因为事务是一个横切关注点。基本上，对于每个必须在事务中执行的方法，都需要在执行前获取或打开一个事务，并在执行后提交它。对于具有必须在事务上下文中执行的方法的\
    \ Bean，会创建 AOP 代理，这些代理将方法包装在一个 `Around` 通知中，该通知负责在调用方法前获取事务，并在之后提交事务。AOP 代理为此使用两个基础设施\
    \ Bean：一个 `org.springframework.transaction.interceptor.TransactionInterceptor`\
    \ 与一个 `org.springframework.transaction.PlatformTransactionManager` 的实现配合使用。Spring\
    \ 为事务管理支持提供了一个灵活且强大的抽象层。其核心是 `PlatformTransactionManager` 接口。可以使用任何受支持的事务管理器提供程序框架。JTA\
    \ 提供程序也可以使用，并且这不会影响应用程序的其余类。最常见的事务管理提供程序有：\n\n*   `DataSourceTransactionManager`，Spring\
    \ 基本事务管理提供程序类；\n*   `HibernateTransactionManager`，当使用 Hibernate 进行持久化支持时；\n* \
    \  `JpaTransactionManager`，当使用实体管理器进行持久化支持时；\n*   `JtaTransactionManager`，用于将事务管理委托给\
    \ Java EE 服务器。也可以与 Atomikos 一起使用，从而无需应用服务器。¹¹\n*   `WebLogicJtaTransactionManager`，由\
    \ WebLogic 应用服务器提供的事务支持。\n*   等等。\n\n从概念上讲，调用事务方法时发生的情况如图 5-11 所示。\n\n![A978-1-4842-0811-3_5_Fig11_HTML.jpg](img/A978-1-4842-0811-3_5_Fig11_HTML.jpg)\n\
    \n图 5-11.\n\n事务操作的概念性 UML 时序图\n\n需要在事务上下文中执行的方法使用 Spring 的 `@Transactional` 注解进行标注。这些方法的主体是一个不可再分的功能单元。Spring\
    \ 官方教程将这些方法称为 `atomic units of work`。你可能还记得 AOP 章节的内容，此注解只能用于公共方法；否则，事务代理将无法应用事务行为。当创建应用程序上下文并通过配置启用对此注解的支持时（这将在下一节中介绍），底层会发生以下情况：一个类型为\
    \ `org.springframework.aop.framework.autoproxy.InfrastructureAdvisorAutoProxyCreator`\
    \ 的内部基础设施 Spring 特定 Bean 被注册，并充当一个 Bean 后处理器，修改服务和仓库 Bean 以添加事务特定逻辑。基本上，这个 Bean\
    \ 就是创建事务 AOP 代理的 Bean。\n\n**配置事务支持**\n\n为上一节中介绍的应用程序添加事务管理的最简单方法是执行以下操作：\n\n*\
    \   **配置事务管理支持**：添加一个类型为 `org.springframework.jdbc.datasource.DataSourceTransactionManager`\
    \ 的 Bean 声明。使用 XML 并通过 `<tx:annotation-driven ../>`（使用事务 XML 配置时要小心，因为忘记此元素是一个常见错误）配置元素（由\
    \ `tx` 命名空间提供）来激活它很容易。\n\n上述配置声明了一个名为 `transactionManager` 的 Bean，并使用 `<tx:annotation-driven\
    \ ../>` 将其设置为应用程序的通用事务管理器。或者使用一个配置类：\n\n```\n    public class TestDataConfig {\n\
    \    ...\n    @Bean\n    public PlatformTransactionManager txManager(){\n    return\
    \ new DataSourceTransactionManager(dataSource());\n    }\n    }\n    ```\n\n然后我们使用\
    \ `@EnableTransactionManagement` 来激活它：\n\n```\n    import org.springframework.transaction.annotation.EnableTransactionManagement;\n\
    \    @Configuration\n    @EnableTransactionManagement\n    @ComponentScan(basePackages\
    \ = {\"com.ps.repos.impl\", \"com.ps.services.impl\"})\n    public class AppConfig\
    \ {\n    }\n    ```\n\n*   **声明事务方法**：编写一个服务类，其中包含将在事务中调用 `UserRepo` Bean 方法的方法。要在事务中执行的方法必须使用\
    \ Spring 的 `@Transaction` 注解进行标注。由于事务行为必须传播到仓库，因此仓库类或方法也使用 `@Transactional` 进行标注。\n\
    \n```\n    import org.springframework.stereotype.Service;\n    import org.springframework.transaction.annotation.Transactional;\n\
    \    @Service\n    public class UserServiceImpl implements UserService {\n   \
    \ private UserRepo userRepo;\n    @Autowired\n    public UserServiceImpl(UserRepo\
    \ userRepo) {\n    this.userRepo = userRepo;\n    }\n    @Transactional\n    @Override\n\
    \    public User findById(Long id) {\n    return userRepo.findById(id);\n    }\n\
    \    }\n    ```\n\nCC\n"
- fmt: "`@EnableTransactionManagement`和`<tx:annotation-driven ../>`都启用了支持事务执行所需的所有基础设施\
    \ Bean。但它们之间有一个细微的区别。XML 配置元素可以这样使用：`<tx:annotation-driven />`，不带`transaction-manager`属性。在这种情况下，Spring\
    \ 默认会查找名为`transactionManager`的 Bean，如果找不到，应用程序将无法启动。`@EnableTransactionManagement`更加灵活；它会查找任何实现了`org.springframework.transaction.PlatformTransactionManager`接口的\
    \ Bean，因此名称并不重要。如果需要明确指定默认事务管理器 Bean，可以通过让带有`@EnableTransactionManagement`注解的配置类实现`org.springframework.transaction.annotation.TransactionManagementConfigurer`接口，并为`annotationDrivenTransactionManager`方法提供实现来声明默认事务管理器。\n\
    \n```\nimport org.springframework.transaction.annotation.TransactionManagementConfigurer;\n\
    ...\n@EnableTransactionManagement\n@Configuration\npublic class AppConfig implements\
    \ TransactionManagementConfigurer {\n...\n@Bean\npublic PlatformTransactionManager\
    \ txManager(){\nreturn new DataSourceTransactionManager(dataSource());\n}\n@Overrride\n\
    public PlatformTransactionManager annotationDrivenTransactionManager() {\nreturn\
    \ txManager();\n}\n}\n```\n\n这很有用，因为在需要多个数据源的较大型应用程序中，需要声明多个事务管理器 Bean。如果未指定默认使用哪个，Spring\
    \ 无法自行选择，应用程序将因一个丑陋且明确的异常而启动失败：\n\n```\norg.springframework.beans.factory.NoUniqueBeanDefinitionException:\n\
    No qualifying bean of type [org.springframework.transaction.PlatformTransactionManager]\n\
    is defined: expected single matching bean but found 2: txManager,simpleManager\n\
    ```\n\n在事务上下文中执行方法时使用的事务管理器，也可以通过`@Transactional`注解的`transactionManager`属性来指定。因此，考虑到我们有两个事务管理器\
    \ Bean：`txManager`（配置为默认）和`simpleManager`，类似于下一个代码片段中的代码将完美运行。\n\n```\n@Service\n\
    public class UserServiceImpl implements UserService {\nprivate UserRepo userRepo;\n\
