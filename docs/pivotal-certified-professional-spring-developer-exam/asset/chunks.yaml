    字段注入、构造器注入与 Setter 注入


    在 XML 配置部分的开头曾提到，XML 不支持字段注入。这是因为 `<bean />` 元素定义不支持此功能。²² 在使用注解配置 Bean 时，字段注入是可行的，因为用于定义依赖的核心注解
    `@Autowire` 可以应用于字段、构造器、Setter 方法，甚至普通方法。


    术语 `autowire` 是自动依赖注入的简称。这仅在 Spring 应用中使用组件扫描和构造型注解创建 Bean 时才有可能实现。`@Autowire`
    注解表明 Spring 应负责注入该依赖。这引出了一个有趣的问题：Spring 如何知道要注入什么？


    CC


    默认情况下，Spring 会尝试按类型进行自动装配，因为在应用中很少需要同一类型的多个 Bean。Spring 会检查所需依赖的类型，并注入具有该确切类型的
    Bean。让我们考虑一个名为 `RequestRepoConfig` 的配置类，它定义了一个类型为 `JdbcRequestRepo` 的 Bean。让我们为这个类型为
    `JdbcRequestRepo` 的 Repository Bean 指定一个显式名称，然后在一个典型的 Spring 测试类中定义一个自动装配的依赖。通过在字段上使用
    `@Autowire`，我们就是在利用**字段注入**。


    ```

    //JdbcRequestRepo.java Bean 定义

    @Repository("requestRepo")

    public class JdbcRequestRepo extends JdbcAbstractRepo

    implements RequestRepo {

    ...

    }

    //配置类 RequestRepoConfig.java

    ...

    import org.springframework.context.annotation.ComponentScan;

    @Configuration

    @Import(DataSourceConfig.class)

    @ComponentScan(basePackages = "com.ps")

    public class RequestRepoConfig {

    }

    //AutowireTest.java Spring 典型测试类

    import org.springframework.beans.factory.annotation.Autowired;

    ...

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {RequestRepoConfig.class})

    public class AutowiringTest {

    @Autowired

    RequestRepo reqRepo;

    @Test

    public void testAutowiredField() {

    assertNotNull(reqRepo);

    }

    }

    ```


    只要上下文中恰好定义了一个类型为 `RequestRepo` 的 Bean，上述测试就会通过。Spring 不关心 Bean 的名称，除非上下文中存在多个相同类型的
    Bean。


    CC


    默认情况下，如果 Spring 无法根据类型决定自动装配哪个 Bean（因为应用中存在多个相同类型的 Bean），它会回退到按名称自动装配。作为搜索正确依赖标准的名称，是被自动装配的字段的名称。


    在前面的案例中，如果 Spring 无法根据类型决定自动装配哪个 Bean，它将查找名为 `reqRepo` 的 Bean。让我们在 `RequestRepoConfig`
    中定义另一个类型为 `RequestRepo` 的 Bean，并将其命名为 `anotherRepo`，然后看看会发生什么。


    ```

    @Configuration

    @Import(DataSourceConfig.class)

    @ComponentScan(basePackages = "com.ps")

    public class RequestRepoConfig {

    @Bean

    public RequestRepo anotherRepo(){

    return new JdbcRequestRepo();

    }

    }

    ```


    类 `AutowireTest` 是 `02-ps-container-02-practice` 的一部分，并且 Spring 框架的日志已设置为调试级别。当运行
    `testAutowiredField` 测试方法时，可以在日志中看到以下内容：²³


    ```

    ...

    DEBUG o.s.b.f.s.DefaultListableBeanFactory - Creating instance of bean ''requestRepo''

    DEBUG o.s.b.f.s.DefaultListableBeanFactory - Creating instance of bean ''anotherRepo''

    ERROR o.s.t.c.TestContextManager - Caught exception while allowing TestExecutionListener

    to prepare test instance com.ps.AutowiringTest@6ec8211c UnsatisfiedDependencyException

    Error creating bean with name ''com.ps.AutowiringTest'':

    Unsatisfied dependency expressed through field ''reqRepo''

    No qualifying bean of type com.ps.repos.RequestRepo is defined:

    expected single matching bean but found 2: requestRepo,anotherRepo

    ```


    在这种情况下，我们有两个类型为 `RequestRepo` 的 Bean，并且它们都不叫 `reqRepo`，所以 Spring 无法决定。第一个解决方案是重命名
    `anotherRepo` 方法。第二个解决方案是通过 `@Autowired + @Qualifier`（Spring 提供的那个）告诉 Spring，应该使用名为
    `anotherRepo` 的 Bean 进行自动装配，因为 `Qualifier` 注解的用途正是从开发者的角度告诉 Spring 哪个 Bean 符合自动装配的条件。


