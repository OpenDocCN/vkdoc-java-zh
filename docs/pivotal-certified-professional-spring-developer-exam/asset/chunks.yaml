    255 字节，因为较旧的客户端或代理实现可能无法正确支持它们。


    例如，一个用于创建宠物的 POST 请求包含宠物的主人用户名。如果数据库中不存在具有指定用户名的所有者，则应使用 404 状态码通知客户端操作失败。


