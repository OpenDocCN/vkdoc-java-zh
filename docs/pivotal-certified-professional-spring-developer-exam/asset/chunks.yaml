    Of course in a small application, when you know you only have those two

    classes, this pointcut expression will do too: `"execution( * update*(..))"`,
    but in a big application, this relaxed expression

    might cause the advice to be applied on methods you did not intend to be

    advised. The expression used in the first code snippet is composed of

    two expressions.


    ```

    execution( * com.ps.repos.*.*UserRepo+.update*(..))

    || execution (* com.ps.services.*Service+.update*(..)))

    ```


    The two expressions can be split into two pointcut declarations that can

    be associated to methods. The name of these methods will then be used in

    a composite expression to identify a pointcut. And that is why these

    pointcuts are called `Named Pointcuts` .


    ```

    @Aspect

    @Component

    public class UserRepoMonitor {

    private static final Logger logger = Logger.getLogger(UserRepoMonitor.class);

    @Before("repoUpdate() || serviceUpdate()")

    public void beforeUpdate(JoinPoint joinPoint) throws Throwable {

    String className = joinPoint.getSignature().getDeclaringTypeName();

    String methodName = joinPoint.getSignature().getName();

    logger.info(" ---> Method " + className + "." + methodName

    + " is about to be called");

    }

    @Pointcut("execution( * com.ps.repos.*.*UserRepo+.update*(..))")

    public void repoUpdate() {}

    @Pointcut("execution (* com.ps.services.*Service+.update*(..)))")

    public void serviceUpdate() {}

    }

    ```


    It was mentioned before that a dedicated class can be created to group

    together pointcuts. In this case, the composite expression must be

    modified to contain the package and classname where the methods are

    located.


    ```

    package com.ps.aspects;

    import org.aspectj.lang.annotation.Pointcut;

    public class PointcutContainer {

    @Pointcut("execution( * com.ps.repos.*.*UserRepo+.update*(..))")

    public void repoUpdate() {

    }

    @Pointcut("execution (* com.ps.services.*Service+.update*(..)))")

    public void serviceUpdate() {

    }

    }

    ```


    Methods `repoUpdate` and `serviceUpdate` are

    moved to the class `com.ps.aspects.PointcutContainer`,

    so the expression for the `beforeUpdate` advice

    changes to:


    ```

    @Before("com.ps.aspects.PointcutContainer.repoUpdate() ||

    com.ps.aspects.PointcutContainer.serviceUpdate()")

    public void beforeUpdate(JoinPoint joinPoint) throws Throwable {

    ...

    }

    ```


    So, now that the pointcuts are externalized, what more can be done? The

    methods annotated with @Pointcut and associated with pointcut

    expressions can be used to process data. So far, we have been using the

    `JoinPoint`

    argument to extract context data. But context data can be injected by

    Spring, if told so by using special designators.


    The update methods in our example have a string argument that must be

    processed, and an exception must be thrown if the value contains special

    characters like $, #, &, %. This should be done only in the service

    methods, because there is no point in calling a repo method with a bad

    argument. This means that we have to separate the advice in two parts:

    one for repositories, one for services.


    ```

    @Aspect

    @Component

    public class UserRepoMonitor {

    private static final Logger logger = Logger.getLogger(UserRepoMonitor.class);

    @Before("com.ps.aspects.PointcutContainer.serviceUpdate()")

    public void beforeServiceUpdate(JoinPoint joinPoint) throws Throwable {

    Object[] args = joinPoint.getArgs();

    String text = (String)args[1];

    if (StringUtils.indexOfAny(text, new String[]{"$", "#", "&", "%"}) != -1) {

    throw new IllegalArgumentException("Text contains weird characters!");

    }

    }

    @Before("com.ps.aspects.PointcutContainer.repoUpdate()")

    public void beforeRepoUpdate(JoinPoint joinPoint) throws Throwable {

    String className = joinPoint.getSignature().getDeclaringTypeName();

    String methodName = joinPoint.getSignature().getName();

    logger.info(" ---> Method " + className + "." + methodName

    + " is about to be called");

    }

    }

    ```


    Notice how all information about the context of the advices is extracted

    from the `joinPoint` object. The

    `JoinPoint`

    interface provides a couple of methods to access information about the

    target method, all accessible via the proxy object. A reference to the

    target object can be obtained by calling `joinPoint.getTarget()`.

    In Figure [4-8](#A978-1-4842-0811-3_4_Chapter.html#Fig8), a test

    run was stopped at a breakpoint after calling the `joinPoint.getTarget()`

    method, and the target object is the focus on the Debugger view in

    Intellij IDEA. You can clearly notice its type.


    ![A978-1-4842-0811-3_4_Fig8_HTML.jpg](A978-1-4842-0811-3_4_Fig8_HTML.jpg)


    Figure 4-8.


    The advice target object


    Instead of calling `JointPoint` methods,

    we’ll modify the implementation and use Spring to automatically populate

    the information we need. The pointcut expression becomes:


    ```

    public class PointcutContainer {

    ...

    @Pointcut("execution (* com.ps.services.*Service+.update*(..))

    && args(id,pass) && target (service)")

    public void serviceUpdate(UserService service, Long id, String pass) {

    }

    }

    ```


    !


    The `args()`

    designator is used to identify methods with a parameter configuration

    defined by it. It can be used as `args(com.ps.ents.User)`

    when it identifies methods with one parameter of type `User`. But this

    designator can be used to make method arguments available in the advice

    body.


    In the code snippet above, it is used in its binding form to ensure that

    the value of the corresponding argument will be passed as the parameter

    value when the advice is invoked. In this case, the values of the `(id,pass)`
    method

    arguments will be injected into `(id,pass)` advice

    arguments. And yes, as you probably suspected, the name of the parameter

    in the designator must match the advice parameter name.


    The advice can now be modified to declare exactly the fields we need

    Spring to populate for us and use them directly. No need to use a `JoinPoint`
    object to

    extract them and take care of the conversions in the advice body,

    because Spring has already done that for us.


    ```

    @Aspect

    @Component

    public class UserRepoMonitor {

    private static final Logger logger = Logger.getLogger(UserRepoMonitor.class);

    @Before("com.ps.aspects.PointcutContainer.serviceUpdate(service, id, pass)")

    public void beforeServiceUpdate

    (UserService service, Long id, String pass) throws Throwable {

    logger.info(" ---> Proxied object " + service.getClass());

    if (StringUtils.indexOfAny(pass, new String{"$", "#", "$", "%"}) != -1) {

    throw new IllegalArgumentException("Text for " + id

    + " contains weird characters!");

    }

    }

    }

    ```


