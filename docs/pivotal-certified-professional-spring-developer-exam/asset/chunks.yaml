    \ test suite, and you should see something similar to what is depicted in Figure\
    \ [4-15](#A978-1-4842-0811-3_4_Chapter.html#Fig15).\n\n![A978-1-4842-0811-3_4_Fig15_HTML.jpg](A978-1-4842-0811-3_4_Fig15_HTML.jpg)\n\
    \nFigure 4-15. Test suite for the Aspects section with all tests passing\n\nIf\
    \ you have difficulties solving the TODOs, you can take a peek at `04-ps-aop-solution`.\n\
    \nIn case you are still hungry for more information, there are two blog entries\
    \ on the Spring official blog. One is about proxies:\n\n[`https://spring.io/blog/2012/05/23/transactions-caching-and-aop-understanding-proxy-usage-in-spring`](https://spring.io/blog/2012/05/23/transactions-caching-and-aop-understanding-proxy-usage-in-spring)\n\
    \nand one is about named pointcuts:\n\n[`https://spring.io/blog/2007/03/29/aop-context-binding-with-named-pointcuts`](https://spring.io/blog/2007/03/29/aop-context-binding-with-named-pointcuts)\n\
    \n**Footnotes**\n\nComplete reference here: [`https://eclipse.org/aspectj/doc/next/progguide/language.html`](https://eclipse.org/aspectj/doc/next/progguide/language.html).\n\
    \nYou can disable aspects support by commenting the `@EnableAspectJAutoProxy`\
    \ annotation, and Spring will just ignore the `@Aspect` annotation.\n\n## 5. Data\
    \ Access\n\nSoftware applications usually handle sets of data that must be stored\
    \ in an organized manner so they can be easily accessed, managed, and updated.\
    \ The fact that data can be made to persist means that it can be available even\
    \ when the application is down. So storage is decoupled from the rest of the application.\
    \ The most common way of organizing data for storage is a database. Any storage\
    \ setup that allows for data to be organized in such a way that can be queried\
    \ and updated represents a database. The most widely known and used databases\
    \ nowadays are relational databases (such as MySQL, PostgreSQL, and Oracle) and\
    \ key-value databases, also known as NoSQL. Of course, XML files can be used as\
    \ a database as well, but only for small applications, because using XML files\
    \ for data storage implies that all data must be loaded into memory in order to\
    \ be managed.\n\nFrom an architectural point of view, software applications are\
    \ multilayered or multitiered, and the database is the base layer, where data\
    \ gets stored. The interface between the base layer (also called the infrastructure\
    \ layer) and the rest of the application is the data access layer, also known\
    \ as the repository layer. On top of this, there is the logic (or service) layer.\
    \ This layer transforms user data and prepares it for storage or transforms database\
    \ content into data proper for display in the user interface. On top of the service\
    \ layer there is the presentation (or interface) layer, which is responsible for\
    \ receiving commands and data and forwarding them for processing to the service\
    \ layer or displaying results. And across all layers, as mentioned in the previous\
    \ chapter, are the cross-cutting concerns, as depicted in Figure [5-1](#A978-1-4842-0811-3_5_Chapter.html#Fig1).\n\
    \n![A978-1-4842-0811-3_5_Fig1_HTML.jpg](A978-1-4842-0811-3_5_Fig1_HTML.jpg)\n\n\
    Figure 5-1. Typical software application architecture\n\nThe database is a central\
    \ resource in a software application, and thus it can be a source of bottlenecks.\
    \ That is why accessing a database to perform typical operations like searching\
    \ for data, creating data, and deleting data need to be managed properly. Spring\
    \ supports many database implementations and can be integrated with most frameworks\
    \ that provide efficient data access management (Hibernate, EclipseLink, or MyBatis[¹](#A978-1-4842-0811-3_5_Chapter.html#Fn1)).\
    \ This chapter is focused on how Spring can be used to manage database access,\
    \ and the code samples cover service, data layer, and transaction-cutting concerns.\n\
    \n### Basic Data Access Using JDBC\n\nTo perform data operations, a connection\
    \ to the database is needed. The most basic way to get a connection in Java is\
    \ to use JDBC. But the basic way is also cumbersome, since the developer has to\
    \ write the code to close the connection and any other stream-based objects used\
    \ during the processing. Because a connection is not enough, transporting data\
    \ between the application and the database requires additional objects to contain\
    \ the data in a format that can be read. Any objects that build on top of a connection,\
    \ such as prepared statement and result set objects, must be safely discarded\
    \ as well. This leads to ugly cluttered code that is difficult to maintain, difficult\
    \ to test, and difficult to write. To access a database using JDBC, the following\
    \ things are needed:\n\n*   a database driver used to communicate with the database;\n\
    *   a connection url that is the entry point for the communication;\n*   database\
    \ credentials (usually user and password).\n\nUsing the previous information,\
    \ a `javax.sql.DataSource` object is created. This is a Java interface that must\
    \ be implemented by every `DataSource` class used to access a database, and each\
    \ database driver library contains its own implementation.\n\nExample: the class\
    \ used to provide access to an Oracle database is `oracle.jdbc.pool.OracleDataSource`.\
    \ To interact with the database using JDBC, the following steps must be implemented:\n\
    \n*   The `DataSource` is used to open a connection to the database. The connection\
    \ object is of a type specific to the database that implements `java.sql.Connection`.\n\
    *   To extract or save data to the database, a statement instance of type implementing\
    \ `java.sql.PreparedStatement` is created based on the connection.\n*   After\
    \ the statement has been executed, the results are stored in an object of type\
    \ implementing `java.sql.ResultSet`.\n\nJust look at the following example, which\
    \ uses JDBC to extract all users from a database:\n\n```java\nimport javax.sql.DataSource;\n\
    import java.sql.Connection;\nimport java.sql.PreparedStatement;\nimport java.sql.ResultSet;\n\
    import java.sql.SQLException;\n...\npublic Set findAll() {\n    Set userSet =\
    \ new HashSet();\n    String sql = \"select u.ID as ID, u.USERNAME as USERNAME,\"\
    \ +\n                 \"u.EMAIL as EMAIL,\" +\n                 \"u.PASSWORD as\
    \ PASSWORD from P_USER u \";\n    Connection conn = null;\n    PreparedStatement\
    \ ps = null;\n    ResultSet rs = null;\n    try {\n        conn = dataSource.getConnection();\n\
    \        ps = conn.prepareStatement(sql);\n        rs = ps.executeQuery();\n \
    \       userSet = mapUsers(rs); // (*)\n    } catch (SQLException e) {\n     \
    \   throw new RuntimeException(\"Unexpected problem when\"+\n                \
    \                   \" extracting users from database!\", e);\n    } finally {\n\
    \        if (rs != null) {\n            try {\n                rs.close();\n \
    \           } catch (SQLException ex) {\n                ...\n            }\n\
    \        }\n        if (ps != null) {\n            try {\n                ps.close();\n\
    \            } catch (SQLException ex) {\n                ...\n            }\n\
    \        }\n        if (conn != null) {\n            try {\n                conn.close();\n\
    \            } catch (SQLException ex) {\n                ...\n            }\n\
    \        }\n    }\n    return userSet;\n}\n```\n\nThe code above opens a connection,\
    \ extracts the data, processes the results, then closes the connection. Each individual\
    \ SQL statement is treated as a transaction and is automatically committed right\
    \ after it is executed. And another complication here is that domain objects (entities)\
    \ that are Java objects corresponding to database record conversion must also\
    \ be implemented, because JDBC does not know how to do this on its own. In the\
    \ example above, notice the line marked with `(*)`. This is done by the `mapUsers`\
    \ method, which is depicted in the code snippet below:\n\n```java\nprivate Set\
    \ mapUsers(ResultSet rs) throws SQLException {\n    Set userSet = new HashSet();\n\
    \    User user = null;\n    while (rs.next()) {\n        user = new User();\n\
    \        // set internal entity identifier (primary key)\n        user.setId(rs.getLong(\"\
    ID\"));\n        user.setUsername(rs.getString(\"USERNAME\"));\n        user.setEmail(rs.getString(\"\
    EMAIL\"));\n        user.setPassword(rs.getString(\"PASSWORD\"));\n        userSet.add(user);\n\
    \    }\n    return userSet;\n}\n```"
