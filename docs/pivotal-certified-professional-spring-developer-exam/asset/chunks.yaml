    Spring 的开发者常常忽略它，导致在切换语言环境和主题时感到困惑——即使他们声明并配置了所有必要的 Bean，功能也无法正常运作。此外，`*.jsp`文件中会使用`requestContext`来决定语言环境和主题。以下
    JSP 代码片段展示了如何利用该属性实现部分 URL，这些 URL 在被点击时会设置应用程序的语言环境。这里使用了额外的标签库：用于条件判断的 JSTL 标签库，以及用于国际化的
    Spring 标签库。完整代码示例可参见本书附带的代码文件。


