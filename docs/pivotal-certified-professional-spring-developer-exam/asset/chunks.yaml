    \ confirmationSender;\n@JmsListener(destination = \"userQueue\", containerFactory\
    \ = \"connectionFactory\")\npublic void receiveMessage(User receivedUser, Message\
    \ message) {\nlogger.info(\" >> Original received message: \" + message);\nlogger.info(\"\
    \ >> Received user: \" + receivedUser);\nconfirmationSender.sendMessage(new Confirmation(id.incrementAndGet(),\
    \ \"User \"\n+ receivedUser.getEmail() + \" received.\"));\n}\n}\n```\n\n`JmsTemplate`\
    \ 使得向目标发送消息变得非常容易，在本示例中，它由 Spring Boot 自动创建。`connectionFactory` 也由 Spring Boot\
    \ 创建，并由以嵌入式模式运行的 ActiveMQ 提供支持。\n\nJMS 可以用作一种机制，允许后端组件之间进行异步请求处理。当需要数据复制，或者执行用户不知情且不应妨碍应用程序使用的长时间运行进程时，它非常有用。此外，发布/订阅是一种将发送者与接收者解耦的好技术，从而提高了架构的灵活性。JMS\
    \ 仍然主要用于灵活的流程中，这些流程的通信是异步的，消息可能会丢失，并且重新发送消息也不是问题。\n\nSpring Web Services\n\n术语“Web\
    \ 服务”描述了一种标准化的通信方式，它使用 XML、SOAP、WSDL 和 UDDI 开放标准，通过互联网协议主干网进行 Web 应用程序集成。这种通信方式允许进行通信的应用程序之间实现松散耦合，并且当应用程序经常发生变更时非常有用，因为变更不应影响它们之间的兼容性。XML\
    \ 曾经是 Web 服务领域的国际语言，直到 JSON 的出现。XML 是一种标准化的数据组织方式，可以被所有主流平台理解：\n\n*   Java，使用\
    \ SAX、StAX、DOM、JAXB 等 API 来操作 XML\n*   .NET，使用 System.XML 或 .NET XML Parser\n\
    *   Ruby，使用 Nokogiri、REXML 或 XMLSimple\n*   Perl，使用 LibXML、Perl-XML 或 XML::Simple\n\
    *   等等。\n\nSOAP 是简单对象访问协议（Simple Object Access Protocol）的缩写。它是一种协议规范，用于在计算机网络中实现\
    \ Web 服务时交换结构化信息。SOAP 不一定与 Web 服务或 RPC 相关联，它封装了在设计需要交换信息的松散耦合应用程序时应尊重的关键术语：可扩展性（安全性和\
    \ WS-routing 是正在开发中的扩展）、中立性（可以运行在任何协议上，如 HTTP、SMTP、TCP、UDP 或 JMS）和独立性（允许任何编程模型）。基本上，SOAP\
    \ 允许应用程序之间进行通信，无论其实现方式或底层操作系统如何。\n\nWeb 服务的实现细节通常封装在 Web 服务层中，该层直接与服务层通信。Web 服务层提供将软件对象转换为基于\
    \ XML 的表示形式的逻辑，这些表示形式可以发送到目标应用程序。Spring 通过其 Spring Web Services（Spring-WS）为 Web\
    \ 服务实现提供支持，这是 Spring 社区专注于创建文档驱动的 Web 服务的产物。像所有 Spring 产品一样，其目标是提供基础设施和支持组件，使编写基于\
    \ Web 服务的应用程序变得实用且愉快。下面列出了 Spring-WS 的一些关键特性。\n\n*   它使得使用 XSD/WSDL 优先契约的最佳实践变得容易，这一点非常重要，因为即使使用\
    \ WSDL 的主要优势在于它能解决许多互操作性问题，但开发者通常仍将其视为麻烦。\n"
- fmt: "# Spring-WS 功能概述\n\n- 它提供 XML API 支持：可以使用 JAXP API（如 DOM、SAX 和 StAX）处理 XML\
    \ 消息，也可以使用 JDOM、dom4j、XOM 甚至编组技术。\n- 它提供灵活的 XML 编组：Object/XML Mapping 模块支持几乎所有已知的\
    \ XML 编组库：OXM、Castor、JAXB 1 和 2、XStream 等。\n- WS-Security 提供对 SOAP 消息进行签名、加密和解密的工具，并与\
    \ Spring Security 集成。\n- 以及更多功能。\n\nSpring-WS 不是考试主题，也是一个广泛的领域，因此本节仅作简要介绍。然而，将涵盖主要要点，以帮助您理解使用\
    \ Spring 设计和开发基于 Web 服务的应用程序的总体思路。以下是设计 Contract-first 的步骤：\n\n- 创建示例消息。一个简单的服务用户消息可能如下所示：\n\
    \n```\nJohn.Cusack@pet.com\n5.0\n```\n\n- 定义服务消息必须遵守的 XSD 模式：\n\n- 通过丰富 XSD 模式来限制类型和值。在下一个代码片段中，指定了一个正则表达式模式来验证电子邮件地址的值。\n\
    \n# SOAP 消息\n\nSOAP 消息的结构类似于 JMS 消息：它们有一个头部和一个主体，这些被封装在一个特殊的 SOAP 信封中，该信封将 XML\
    \ 文档标识为 SOAP 消息。此外，SOAP 消息可以包含关于 Web 服务通信期间可能发生的错误的故障信息。因此，包含用户信息的 SOAP 消息如下面的\
    \ XML 片段所示。\n\n```\n<soap:Envelope xmlns:soap=\"http://schemas.xmlsoap.org/soap/envelope/\"\
    >\n  <soap:Header/>\n  <soap:Body>\n    <userMessage xmlns=\"http://ws-boot.com/schemas/um\"\
    >\n      <email>John.Cusack@pet.com</email>\n    </userMessage>\n  </soap:Body>\n\
    </soap:Envelope>\n```\n\n编写 Web 服务应用程序时有四个可能的起点：\n\n- **从 XML 消息开始**：在这种方法中，开发从\
    \ Web 服务消息的 XML 表示开始。然后使用智能编辑器（如 IntelliJ IDEA 或 Eclipse）生成简单的 XSD 模式，该模式可以进一步定制。从这一点开始，开发步骤与列表中下一个选项相同。（这是用于开发本节所涵盖的\
    \ Web 服务的方法。）\n- **从 XML Schema 开始**：在这种方法中，开发从定义 XML 数据结构的 XML 模式（XSD 文件）开始，这些数据结构将用作\
    \ Web 服务操作中的参数和返回类型。智能编辑器应为您提供生成 Java 类的选项，这些类用于表示 Web 服务应用程序要处理的对象。或者，可以使用 Java\
    \ `xjc` 实用程序，该程序将在稍后介绍。在 IntelliJ IDEA 中，右键单击 `*.xsd` 文件时出现的 WebServices 菜单下有两个代码生成选项：使用\
    \ JAXB 生成和使用 XMLBeans 生成。\n- **从 Java 类开始**：在这种方法中，可以使用智能编辑器或 Java `xjc` 实用程序从现有代码生成\
    \ XSD 模式和 WSDL，该实用程序将在稍后介绍。\n- **从 WSDL 开始**：这也称为“contract-first”或“top-down”方法，在这种方法中，您首先定义\
    \ Web 服务契约或使用预先存在的契约。如果您有 `*.wsdl` 文件，可以使用智能编辑器从 WSDL 生成 Java 代码，或使用 Java `xjc`\
    \ 实用程序，该实用程序将在稍后介绍。（IntelliJ IDEA 在 WebServices 菜单项下提供此选项。）\n\nXSD 模式定义了 Web 服务域以及可以使用\
    \ Web 服务执行的操作。Spring-WS 会自动将此模式导出为 WSDL（Web 服务定义语言）。对于 `14-ps-ws-sample` 应用程序中的\
    \ XSD 模式，它将包含一个使用用户电子邮件提取用户类型的操作。该 XSD 模式位于 `src/main/resources/sample` 目录下，名为\
    \ `userMessage`。该项目是使用 Spring Boot 创建的，以便将重点放在契约的实现上，而不是应用程序基础设施上。\n\n在图 7-16\
    \ 中，描绘了一个客户端和服务器 WS 应用程序及其通信方式。\n\n![A978-1-4842-0811-3_7_Fig16_HTML.jpg](A978-1-4842-0811-3_7_Fig16_HTML.jpg)\n\
    \n**图 7-16.** Spring WS 客户端/服务器应用程序\n\n现在消息结构已定义，下一步是生成它的支持类。\n\n## 使用 XJC 生成\
    \ Java 代码\n\nJDK 附带了一个名为 `xjc` 的可执行实用程序。此可执行文件可用于使用 XSD 模式生成 Web 服务应用程序中使用的类。这可以通过手动运行可执行文件或创建\
    \ Gradle 任务来自动完成。在 `14-ps-ws-sample` 项目中，有一个 `README.adoc` 文件，其中包含用于生成所需 Java\
    \ 类并将其保存在名为 `jaxb` 的附加源目录中的 `xjc` 命令。默认情况下，这些类是使用 JAXB 生成的，因此带有 JAXB 注解。\n\n```\n\
    xjc -d src/main/jaxb -p com.ps.ws src/main/resources/sample/userMessage.xsd\n\
    ```\n\n像 IntelliJ IDEA 这样的智能编辑器具有从内置 XSD 模式生成 Java 代码的能力。只需选择 `userMessages.xsd`\
    \ 文件并右键单击。在出现的菜单中，有一个 `WebServices` 选项。单击它，它将展开。在子菜单中，有一个 `Generate Java Code\
    \ from XML Schema using JAXB` 选项。选择此选项后，将出现一个弹出窗口，要求提供包名和保存类的位置。如果您打开 `UserMessage`\
    \ 类，您会注意到到处都是特定的 JAXB 注解，这些注解说明了该类型的对象将如何序列化和反序列化：\n\n```java\nimport javax.annotation.Generated;\n\
    import javax.xml.bind.annotation.XmlAccessType;\nimport javax.xml.bind.annotation.XmlAccessorType;\n\
    import javax.xml.bind.annotation.XmlAttribute;\nimport javax.xml.bind.annotation.XmlElement;\n\
    import javax.xml.bind.annotation.XmlSchemaType;\nimport javax.xml.bind.annotation.XmlType;\n\
    \n@XmlAccessorType(XmlAccessType.FIELD)\n@XmlType(name = \"userMessage\",\n  \
    \       namespace = \"http://ws-boot.com/schemas/um\",\n         propOrder = {\n\
    \             \"email\",\n             \"rating\",\n             \"userType\"\n\
    \         })\n@Generated(value = \"com.sun.tools.internal.xjc.Driver\",\n    \
    \       date = \"2016-10-16T08:23:57+03:00\",\n           comments = \"JAXB RI\
    \ v2.2.8-b130911.1802\")\npublic class UserMessage {\n    @XmlElement(namespace\
    \ = \"http://ws-boot.com/schemas/um\",\n                required = true)\n   \
    \ @Generated(value = \"com.sun.tools.internal.xjc.Driver\",\n               date\
    \ = \"2016-10-16T08:23:57+03:00\",\n               comments = \"JAXB RI v2.2.8-b130911.1802\"\
    )\n    protected String email;\n\n    @XmlElement(namespace = \"http://ws-boot.com/schemas/um\"\
    )\n    @Generated(value = \"com.sun.tools.internal.xjc.Driver\",\n           \
    \    date = \"2016-10-16T08:23:57+03:00\",\n               comments = \"JAXB RI\
    \ v2.2.8-b130911.1802\")\n    protected double rating;\n    // ...\n}\n```\n\n\
    有关 JAXB 的更多信息，请访问官方 JAXB 网站 [`https://jaxb.java.net/`](https://jaxb.java.net/)。\n\
    \n# Spring Boot WS 应用程序\n\n在图 7-17 中，您可以看到 `14-ps-ws-sample` 应用程序的结构。\n\n![A978-1-4842-0811-3_7_Fig17_HTML.jpg](A978-1-4842-0811-3_7_Fig17_HTML.jpg)\n\
    \n**图 7-17.** Spring WS 应用程序的结构\n\n`com.ps.start` 包将 Spring Boot 组件组合在一起。\n\n\
    `src/main/java` 目录下的 `com.ps.ws` 包将开发人员编写的与 WS 通信相关的类组合在一起。"
  raw: "*   It provides XML API support: XML messages can be handled using JAXP APIs\n\
    \    such as DOM, SAX, and StAX, but also JDOM, dom4j, XOM, or even\n    marshalling\
    \ technologies.\n\n*   It offers flexible XML Marshalling: the Object/XML Mapping\
    \ module\n    supports almost all known libraries for XML marshalling: OXM, Castor,\n\
    \    JAXB 1 and 2, XStream, etc.\n\n*   WS-Security provides the tools to sign,\
    \ encrypt, and decrypt SOAP\n    messages and integrates with Spring Security.\n\
    \n*   and many more.\n\nSpring-WS is not a topic for the exam and is also a wide\
    \ subject, so the\nsurface will only be scratched in this section. The main points\
    \ will,\nhowever, be covered to help you understand the general idea of designing\n\
    and development of web-service-based applications with Spring. Here are\nthe steps\
    \ of designing a Contract-first:\n\n*   create sample messages. A simple service\
    \ user message could look like\n    this:\n\n```\n    John.Cusack@pet.com\n  \
    \  5.0\n\n```\n\n*   define the XSD schema the service message must comply to:\n\
    \n*   restrict types and values, by enriching the XSD schema. In the next code\n\
    \    snippet, a regular expression pattern is specify to validate the value\n\
    \    of the email address.\n\nSOAP Messages\n\nSOAP messages have a structure\
    \ similar to JMS Messages: they have a\nheader and a body that are enclosed in\
    \ a special SOAP envelope that\nidentifies the XML document as a SOAP message.\
    \ Additionally, a SOAP\nmessage can contain fault information regarding the errors\
    \ that can\noccur during web service communication. So a SOAP message containing\n\
    user information looks like the following XML snippet.\n\n```\n\nJohn.Cusack@pet.com\n\
    \n```\n\nWhen writing web-services applications there are four possible starting\n\
    points:\n\n*   starting from an XML message: in this approach, development starts\
    \ with\n    an XML representation of the web-service message. Then a smart editor\n\
    \    (like IntelliJ IDEA or Eclipse) is used to generate a simple XSD schema,\n\
    \    which can be further customized. And from this point on, the development\n\
    \    steps are the same as for the next option in the list. (This is the\n   \
    \ approach used to develop the web service covered by this section.)\n\n*   starting\
    \ from an XML Schema: in this approach, development begins with\n    an XML schema\
    \ (XSD file) that defines XML data structures to be used as\n    parameters and\
    \ return types in the web service operations. A smart\n    editor should provide\
    \ you with an option to generate Java classes that\n    are needed to represent\
    \ objects to be handled by the web service\n    application. Or the Java `xjc`\
    \ utility can be\n    used, which will be introduced soon. In IntelliJ IDEA there\
    \ are two\n    options for code generation under the WebServices menu that appears\
    \ on\n    right-clicking the `*.xsd` file:\n    generation with JAXB[^(10)](#A978-1-4842-0811-3_7_Chapter.html#Fn10)\
    \ and\n    generation with XMLBeans.[^(11)](#A978-1-4842-0811-3_7_Chapter.html#Fn11)\n\
    \n*   starting from a Java Class: in this approach, XSD schemas and WSDL can\n\
    \    be generated from existing code using a smart editor or the Java `xjc` utility,\
    \ which\n    will be introduced soon.\n\n*   starting from a WSDL: this is also\
    \ called the “contract-first” or\n    “top-down” method, and in this approach,\
    \ you begin by defining the web\n    service contract or use a preexisting one.\
    \ If you have a `*.wsdl` file, you can\n    use a smart editor to generate Java\
    \ code from Wsdl or the Java `xjc` utility, which\n    will be introduced soon.\
    \ (IntelliJ IDEA has this option under the\n    WebServices menu item.)\n\nThe\
    \ XSD schema defines the web service domain and the operations that\ncan be performed\
    \ using web services. Spring-WS will export this schema\nas a WSDL (Web Service\
    \ Definition Language) automatically. For the\napplication in `14-ps-ws-sample`\
    \ the\nXSD schema will contain an operation that uses a user’s email to extract\n\
    the user type. The XSD schema is located under `src/main/resources/sample`\nand\
    \ is named `userMessage`. This\nproject is created with Spring Boot to set the\
    \ focus on the\nimplementation of the contract and not on the application\ninfrastructure.\n\
    \nIn Figure [7-16](#A978-1-4842-0811-3_7_Chapter.html#Fig16), a\nclient and server\
    \ WS application and the way they communicate are\ndepicted.\n\n![A978-1-4842-0811-3_7_Fig16_HTML.jpg](A978-1-4842-0811-3_7_Fig16_HTML.jpg)\n\
    \nFigure 7-16.\n\nSpring WS Client/Server applications\n\nNow that the message\
    \ structure has been defined, the next step is to\ngenerate the backing classes\
    \ for it.\n\nGenerating Java Code with XJC\n\nThe JDK comes with a utility executable\
    \ called `xjc`. This executable\ncan be used to generate classes to use in a web\
    \ service application\nusing the XSD schema. This can be done by running the executable\n\
    manually or by creating a Gradle task to do that for you. In the `14-ps-ws-sample`\n\
    project, there is a `README.adoc` file that\ncontains the xjc command to generate\
    \ the required Java classes and save\nthem in an additional source directory named\
    \ `jaxb`. The classes are\nby default generated with JAXB and thus are annotated\
    \ with JAXB\nannotations.\n\n```\nxjc -d src/main/jaxb -p com.ps.ws src/main/resources/sample/userMessage.xsd\n\
    ```\n\nSmart editors like Intellij IDEA have the capability of generating JAVA\n\
    code from a built-in XSD schema. Just select the `userMessages.xsd` file\nand\
    \ right click. In the menu that appears, there is a `WebServices` option.\nClick\
    \ on it, and it will expand. In the submenu there is a `Generate Java Code from\
    \ XML Schema using JAXB`. By selecting this, a pop-up will appear that\nwill require\
    \ the package name and location where the classes should be\nsaved. If you open\
    \ the UserMessage class, you will notice the specific\nJAXB annotation everywhere,\
    \ which tell how objects of that type will be\nserialized and deserialized:\n\n\
    ```\nimport javax.annotation.Generated;\nimport javax.xml.bind.annotation.XmlAccessType;\n\
    import javax.xml.bind.annotation.XmlAccessorType;\nimport javax.xml.bind.annotation.XmlAttribute;\n\
    import javax.xml.bind.annotation.XmlElement;\nimport javax.xml.bind.annotation.XmlSchemaType;\n\
    import javax.xml.bind.annotation.XmlType;\n@XmlAccessorType(XmlAccessType.FIELD)\n\
    @XmlType(name = \"userMessage\",\nnamespace = \"http://ws-boot.com/schemas/um\"\
    ,\npropOrder = {\n\"email\",\n\"rating\",\n\"userType\"\n})\n@Generated(value\
    \ = \"com.sun.tools.internal.xjc.Driver\",\ndate = \"2016-10-16T08:23:57+03:00\"\
    ,\ncomments = \"JAXB RI v2.2.8-b130911.1802\")\npublic class UserMessage {\n@XmlElement(namespace\
    \ = \"http://ws-boot.com/schemas/um\",\nrequired = true)\n@Generated(value = \"\
    com.sun.tools.internal.xjc.Driver\",\ndate = \"2016-10-16T08:23:57+03:00\",\n\
    comments = \"JAXB RI v2.2.8-b130911.1802\")\nprotected String email;\n@XmlElement(namespace\
    \ = \"http://ws-boot.com/schemas/um\")\n@Generated(value = \"com.sun.tools.internal.xjc.Driver\"\
    ,\ndate = \"2016-10-16T08:23:57+03:00\",\ncomments = \"JAXB RI v2.2.8-b130911.1802\"\
    )\nprotected double rating;\n...\n}\n```\n\nMore information about JAXB can be\
    \ found on the official JAXB site [`https://jaxb.java.net/`](https://jaxb.java.net/)\
    \ .\n\nSpring Boot WS Application\n\nIn Figure [7-17](#A978-1-4842-0811-3_7_Chapter.html#Fig17)\
    \ you can\nsee the structure of the `14-ps-ws-sample`\napplication.\n\n![A978-1-4842-0811-3_7_Fig17_HTML.jpg](A978-1-4842-0811-3_7_Fig17_HTML.jpg)\n\
    \nFigure 7-17.\n\nThe structure of the Spring WS application\n\nThe `com.ps.start`\
    \ groups\ntogether Spring Boot components.\n\nThe `com.ps.ws`\nunder the `src/main/java`\n\
    directory groups together classes related to WS communication that are\nwritten\
    \ by the developer:"
