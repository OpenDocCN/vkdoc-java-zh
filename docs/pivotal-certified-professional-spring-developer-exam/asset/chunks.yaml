    import org.springframework.web.bind.annotation.RequestMethod;

    import org.springframework.http.HttpStatus;

    @RestController

    public class RestUserController {

    ...

    @ResponseStatus(HttpStatus.CREATED)

    @RequestMapping(value = "/users", method = RequestMethod.POST)

    public void create(@RequestBody User newUser,

    @Value("#{request.requestURL}")

    StringBuffer originalUrl, HttpServletResponse response)

    throws Exception {

    if (newUser.getId() != null) {

    throw new UserException("User found with email "

    + newUser.getEmail() + ". Cannot create!");

    }

    User user = userService.create(newUser);

    response.setHeader("Location",

    getLocationForUser(originalUrl, user.getUsername()));

    }

    protected static String getLocationForUser(StringBuffer url, Object childIdentifier)
    {

    UriTemplate template = new UriTemplate(url.toString() + "/{$username}");

    return template.expand(childIdentifier).toASCIIString();

    }

    }

    ```


    `getLocationForUser`方法是一个工具方法，用于创建已创建资源的URI，该URI随后被放入`HTTP Response Location`头中。这非常有用，因为它生成一个相对于应用程序上下文的URI，由Spring自动注入，因此无需硬编码。在前面的示例中，原始请求URI可能是`localhost:8080/users`，而`Location`头值将是`localhost:8080/users/johncusack`，这是通过将原始URL与用户名值拼接而成的。URL参数`$username`通过调用`template.expand(...)`方法被替换。客户端可以进一步使用此URI来请求新创建的资源表示。


    你可能已经注意到，在前面的示例中，用户资源的标识键是其`username`。由于用户名在数据库中是唯一的，并且出于安全原因不应暴露数据库ID，因此在这种情况下，用户名是更合适的标识符选择。同时请记住，URL中区分大小写的值可能会引起麻烦，尤其是当服务器应用程序安装在像Windows这样不区分大小写的操作系统上时。


    Web应用程序使用一组状态码来让客户端了解请求发生了什么，是否成功处理以及资源的状态。你最熟悉的可能是`404 Not Found`状态码，当请求的资源无法找到时返回该状态码。HTTP状态码的完整列表可以在维基百科上找到，如果你对HTTP状态码感到好奇或不熟悉，可以查阅一下。


    使用Spring MVC，可以通过在控制器方法上使用`@ResponseStatus`注解轻松设置响应的状态码。该注解可以接收Spring类`HttpStatus`中定义的任何常量作为值。表7-3包含了RESTful应用程序中最常用的响应状态。


    **表7-3. HTTP状态码表**


    | HTTP状态 | HttpStatus常量 | 说明 |

    | --- | --- | --- |

    | OK | `OK` | 成功的GET请求，返回内容 |

    | CREATED | `CREATED` | 成功的PUT或POST请求；Location头应包含新资源的URI |

    | NO_CONTENT | `NO_CONTENT` | 成功的PUT或DELETE请求后的空响应 |

    | NOT_FOUND | `NOT_FOUND` | 未找到资源 |

    | FORBIDDEN | `FORBIDDEN` | 服务器拒绝响应请求，因为响应未授权 |

    | METHOD_NOT_ALLOWED | `METHOD_NOT_ALLOWED` | 请求URI标识的资源不支持该HTTP方法 |

    | CONFLICT | `CONFLICT` | 进行更改时出现问题，当PUT或POST尝试保存已存在且标记为唯一的数据时 |

    | UNSUPPORTED_MEDIA_TYPE | `UNSUPPORTED_MEDIA_TYPE` | 服务器拒绝服务请求，因为请求实体的格式不受请求资源支持
    |


    使用`@ResponseStatus`注解的控制器方法将阻止`DispatcherServlet`尝试查找要渲染的视图。因此，返回`void`的控制器方法将仅返回一个空体的响应。返回空体的方法通常是DELETE方法：


    ```java

    @RestController

    public class RestUserController {

    ...

    @ResponseStatus(HttpStatus.NO_CONTENT)

    @RequestMapping(value = "/users/{$username}", method = RequestMethod.DELETE)

    public void delete(@PathVariable("$username") String username)

    throws UserException {

    User user = userService.findByUsername(username);

    if (user == null ) {

    throw new UserException("No user found for username " + username);

    }

    userService.deleteById(user.getId());

    }

    }

    ```


    从Spring 4.3开始，引入了组合注解，可以替换带有特定HTTP方法的`@RequestMapping`注解。它们位于`org.springframework.web.bind.annotation`包中。在表7-4中，列出了Spring注解及其他等价物。


    **表7-4. HTTP状态码表**


    | HTTP方法 | @RequestMapping | Spring 4.3注解 |

    | --- | --- | --- |

    | GET | `@RequestMapping(method=RequestMethod.GET)` | `@GetMapping` |

    | POST | `@RequestMapping(method=RequestMethod.POST)` | `@PostMapping` |

    | DELETE | `@RequestMapping(method=RequestMethod.DELETE)` | `@DeleteMapping` |

    | PUT | `@RequestMapping(method=RequestMethod.PUT)` | `@PutMapping` |


    `@GetMapping`和`@RequestMapping`之间的区别在于，前者不支持`@RequestMapping`的`consumes`属性。（此属性将在本节稍后介绍。）


    如果由于某种原因无法使用`@RestController`，在Spring MVC中，可以使用`org.springframework.http.ResponseEntity`类型作为`@Controller`方法的返回值，以告诉调度程序响应将被序列化并转发给客户端，而不是解析为视图：


    ```java

    @Controller

    public class UserController {

    @Autowired

    UserService userService;

    @Autowired

    PetService petService;

    @RequestMapping(value = "/pets/{$username}", method = RequestMethod.POST)

    public ResponseEntity createPet(@PathVariable("$username") String username,

    @RequestBody Pet pet,

    @Value("#{request.requestURL}") StringBuffer url)

    throws UserException {

    User owner = userService.findByUsername(username);

    if (owner == null) {

    throw new UserException("User not found with username " + username);

    }

    petService.save(pet);

    HttpHeaders headers = new HttpHeaders();

    headers.add("Location", getLocationForPet(url, pet.getRfid()));

    return new ResponseEntity(headers, HttpStatus.CREATED);

    }

    /**

    * Determines URL of pet resource based on the full URL of the given request,

    * appending the path info with the given childIdentifier using a UriTemplate.

    */

    protected static String getLocationForPet(StringBuffer url, Object petRfid) {

    UriTemplate template = new UriTemplate(url.append("/{$petid}").toString());

    return template.expand(petRfid).toASCIIString();

    }

    }

    ```


    在上面的代码片段中，为`$username`路径变量标识的用户创建了一个`Pet`记录。创建对象后，会发送一个响应，其中包含可以通过REST请求访问Pet记录的位置。因此，如果原始URI是`http://localhost:8080/pets/johncusack`，则返回的结果是一个`ResponseEntity`，其中包含以下URI：`http://localhost:8080/pets/johncusack/11223344`，其中11223344是`Pet`的RFID值。


    ## 异常处理


    有时REST请求无法成功处理。可能是客户端请求的资源不再可用，或者客户端请求的某些操作在服务器上生成了错误。在这种情况下，可以在控制器异常处理方法上使用`@ResponseStatus`，以向客户端提供请求未正确处理的基本原因。'
