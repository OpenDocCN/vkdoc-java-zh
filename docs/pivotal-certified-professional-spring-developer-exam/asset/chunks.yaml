- fmt: "# 排版后的内容\n\n将此文件拆分为一个或多个配置文件，并修改测试类`com.ps.beans.others.MtBeanTest`以使用这些文件加载上下文。测试必须成功完成以验证您的配置。在`02-ps-container-01-solution`项目中为您提供了解决方案。您可以将您的结果与此进行比较并得出结论。作为额外挑战，尝试使用通配符。\n\
    \n另外，请记住，在修改类之后，您可能需要在命令行中使用`gradle build -x test`构建项目，或从Intellij IDEA界面运行`compileJava`任务，以确保您使用最新的源代码运行测试。在图[2-14](#A978-1-4842-0811-3_2_Chapter.html#Fig14)中，为您标明了`compileJava`任务的位置。\n\
    \n![A978-1-4842-0811-3_2_Fig14_HTML.jpg](A978-1-4842-0811-3_2_Fig14_HTML.jpg)\n\
    \n图2-14. Intellij IDEA中的Gradle视图\n\n## 丰富XML配置\n\nXML是一种非常灵活的文本格式，它定义了一套用于编码文本元素的规则，这些规则既适合人类阅读也适合机器解析。XML配置的目的是使配置Spring应用程序变得简单。即使使用XML配置企业级行为（如AOP、集合和事务），与第三方框架的集成仍然很繁琐，因此引入了特殊的命名空间，这些命名空间提供了轻松定义复杂元素的可能性。这也有助于区分基础设施Bean和应用程序Bean。\n\
    \n使用XML也很实用，因为配置文件可以外部化，从而允许在不重新编译应用程序的情况下控制其行为。因此，在接下来的章节中，将介绍高级XML配置。\n\n###\
    \ Spring命名空间\n\n之前引入了`util`命名空间，以演示如何轻松地将集合注入到Bean中，以及如何将集合视为Bean。下面，您可以使用`util`命名空间执行一些操作：\n\
    \n*   在配置中访问和使用常量\n\n    ```\n    // SimpleBean.java，其中定义了静态字段\n    package com.ps.sample;\n\
    \    public class SimpleBean {\n        public static final SimpleBean DEFAULT_SIMPLE_BEAN\
    \ = new SimpleBean(\"DEFAULT\");\n    }\n    ```\n\n    `FieldRetrievingFactoryBean`是一个`FactoryBean`，它检索静态或非静态字段的值。Bean的名称是被检索静态对象的完整路径。这种方法也适用于枚举。\n\
    \n*   使用类型化集合。当您声明`<util:list />`、`<util:set />`或`<util:map/>`时，Spring会决定使用哪种实现类型，但您可以更改它：\n\
    \n    ```\n    ...\n    <util:list id=\"myList\" list-class=\"java.util.LinkedList\"\
    >\n        <value>item1</value>\n        <value>item2</value>\n    </util:list>\n\
    \    ...\n    ```\n\n*   直接从文件读取属性到`java.util.Properties`中，该对象可以像Bean一样被处理，分配一个ID，并从上下文中检索。\n\
    \n    ```\n    ...\n    <util:properties id=\"dbProp\" location=\"classpath:db.properties\"\
    />\n    ...\n    Properties dbProp = ctx.getBean(\"dbProp\", Properties.class);\n\
    \    ```\n\n另一个有用的命名空间是`jdbc`命名空间。它提供了用于创建内存数据源（用于测试目的）和初始化数据库的配置元素。\n\n```\n\
    <jdbc:embedded-database id=\"dataSource\" type=\"H2\">\n    <jdbc:script location=\"\
    classpath:testdb/schema.sql\"/>\n    <jdbc:script location=\"classpath:testdb/test-data.sql\"\
    />\n</jdbc:embedded-database>\n```\n\n其他一些重要的命名空间，如`context`、`aop`、`tx`和`jms`，将在本书后面介绍。\n\
    \n### 如何在Spring演进中读取属性文件\n\n作为命名空间如何简化配置的示例，让我们看一个简单的操作：从文件读取属性。以下是使用`bean`命名空间从文件读取属性的方式：\n\
    \n```\n<bean id=\"propertyConfigurer\" class=\"org.springframework.beans.factory.config.PropertyPlaceholderConfigurer\"\
    >\n    <property name=\"location\" value=\"classpath:db.properties\"/>\n</bean>\n\
    ```\n\n以下是使用`context`命名空间从文件读取属性的方式：\n\n```\n<context:property-placeholder location=\"\
    classpath:db.properties\"/>\n```\n\n以下是使用`util`命名空间从文件读取属性的方式：\n\n```\n<util:properties\
    \ id=\"dbProp\" location=\"classpath:db.properties\"/>\n```\n\n使用`util`命名空间的优点是属性被加载到一个名为`dbProp`的`java.util.Properties`对象中，该对象可以在其他Bean的配置中使用。为了访问这些值并将它们注入到其他Bean中，需要使用SpEL，这就是为什么使用`#{}`注入值的原因，这是典型的SpEL语法，用于访问对象的属性；基本上，`#{dbProp.url}`等同于`dbProp.getProperty(\"\
    url\")`。\n\n### Spring表达式语言\n\nSpEL是Spring表达式语言。它非常强大，因为它支持在运行时查询和操作对象图。SpEL的灵感来自WebFlow\
    \ EL[⁸](#A978-1-4842-0811-3_2_Chapter.html#Fn8)，它是Unified EL[⁹](#A978-1-4842-0811-3_2_Chapter.html#Fn9)的超集，并提供了相当多的功能，例如：\n\
    \n*   方法调用\n*   访问属性、索引集合\n*   集合过滤\n*   布尔和关系运算符\n*   以及更多[^(10)](#A978-1-4842-0811-3_2_Chapter.html#Fn10)\n\
    \nSpEL有几种扩展（OGNL、MVEL和JBoss EL），但最好的部分是它不直接与Spring绑定，可以独立使用。\n\n### Bean定义继承\n\
    \n由于类是创建对象的模板并且可以扩展，因此对于Bean定义也可以做同样的事情。它们可以被继承，并且现有的定义可以用额外的细节来丰富。假设Pet Sitter应用程序必须在由三台服务器组成的集群上运行。每台服务器都有自己的数据库，配置必须提及所有服务器。连接数据库的配置文件如下所示：\n\
    \n```\n<bean id=\"dataSource1\" class=\"org.apache.commons.dbcp.BasicDataSource\"\
    \ destroy-method=\"close\">\n    <property name=\"driverClassName\" value=\"com.mysql.jdbc.Driver\"\
    />\n    <property name=\"url\" value=\"jdbc:mysql://server1:3306/petsitter\"/>\n\
    \    <property name=\"username\" value=\"root\"/>\n    <property name=\"password\"\
    \ value=\"password\"/>\n    <property name=\"loginTimeout\" value=\"10\"/>\n</bean>\n\
    \n<bean id=\"dataSource2\" class=\"org.apache.commons.dbcp.BasicDataSource\" destroy-method=\"\
    close\">\n    <property name=\"driverClassName\" value=\"com.mysql.jdbc.Driver\"\
    />\n    <property name=\"url\" value=\"jdbc:mysql://server2:3306/petsitter\"/>\n\
    \    <property name=\"username\" value=\"root\"/>\n    <property name=\"password\"\
    \ value=\"password\"/>\n    <property name=\"loginTimeout\" value=\"10\"/>\n</bean>\n\
    \n<bean id=\"dataSource3\" class=\"org.apache.commons.dbcp.BasicDataSource\" destroy-method=\"\
    close\">\n    <property name=\"driverClassName\" value=\"com.mysql.jdbc.Driver\"\
    />\n    <property name=\"url\" value=\"jdbc:mysql://server3:3306/petsitter\"/>\n\
    \    <property name=\"username\" value=\"root\"/>\n    <property name=\"password\"\
    \ value=\"password\"/>\n    <property name=\"loginTimeout\" value=\"10\"/>\n</bean>\n\
    ```\n\n这里面有很多重复，不是吗？Bean继承可以帮助减小文件大小，并可以将公共配置元素分离到一个模板Bean定义中，该定义将被定义为抽象。这种类型的Bean不能由Spring\
    \ IoC创建。Bean定义将声明模板作为父级，并将继承其中定义的所有细节。例如，在下面的代码片段中，Bean类型、`user`和`loginTimeout`属性值被继承。与类继承一样，Bean定义可以覆盖继承的细节。`dataSource3`\
    \ Bean定义覆盖了`loginTimeout`，并且也覆盖了Bean类型。\n\n```\n<bean id=\"abstractDataSource\"\
    \ class=\"org.apache.commons.dbcp.BasicDataSource\" destroy-method=\"close\" abstract=\"\
    true\">\n    <property name=\"driverClassName\" value=\"com.mysql.jdbc.Driver\"\
    />\n    <property name=\"username\" value=\"root\"/>\n    <property name=\"password\"\
    \ value=\"password\"/>\n    <property name=\"loginTimeout\" value=\"10\"/>\n</bean>\n\
    \n<bean id=\"dataSource1\" parent=\"abstractDataSource\">\n    <property name=\"\
    url\" value=\"jdbc:mysql://server1:3306/petsitter\"/>\n</bean>\n\n<bean id=\"\
    dataSource2\" parent=\"abstractDataSource\">\n    <property name=\"url\" value=\"\
    jdbc:mysql://server2:3306/petsitter\"/>\n</bean>\n\n<bean id=\"dataSource3\" parent=\"\
    abstractDataSource\">\n    <property name=\"url\" value=\"jdbc:mysql://server3:3306/petsitter\"\
    />\n    <property name=\"loginTimeout\" value=\"5\"/>\n    <property name=\"class\"\
    \ value=\"com.mchange.v2.c3p0.ComboPooledDataSource\"/>\n</bean>\n```\n\n关于Bean继承的有趣之处在于，生成的Bean不必与父级具有相同的类型。只要继承的属性存在于扩展父模板的Bean定义中，继承就会起作用。\n\
    \n### 内部Bean\n\n内部Bean是在另一个Bean的作用域内定义的Bean。它们相当于私有字段，不能通过getter方法访问，并且没有外部引用指向它们。在介绍集合时简要提到了这种类型的Bean，但它值得拥有自己的章节，以确保清楚何时使用它们以及为什么使用。内部Bean由`<property/>`或`<constructor-arg/>`元素内的`<bean/>`元素定义。\n\
    \n```\n<bean id=\"musician\" class=\"com.ps.beans.Musician\">\n    <property name=\"\
    person\">\n        <bean class=\"com.ps.beans.Person\">\n            <property\
    \ name=\"name\" value=\"John\"/>\n            <property name=\"address\">\n  \
    \              <bean class=\"com.ps.beans.Address\">\n                    <property\
    \ name=\"city\" value=\"New York\"/>\n                    <property name=\"street\"\
    \ value=\"Broadway\"/>\n                </bean>\n            </property>\n   \
    \     </bean>\n    </property>\n</bean>\n```\n\n内部Bean可以填充`id`或`name`属性（这两个属性将在下一节中详细解释），但这将是无用的，因为这些Bean无法通过它们检索，因为它们是封闭它们的Bean的内部Bean。当然，如果您好奇的话，Bean可以嵌套任意多次，但除非您真的真的必须这样做，否则请避免这样做，因为这会使您的配置看起来臃肿，并且难以测试。嵌套Bean通常是基础设施Bean的选择。\n\
    \n示例：一个`Musician` Bean，它包含一个`Person` Bean，而`Person` Bean又包含一个`Address` Bean。"
  raw: "Split this file into one or more configuration files, and modify the test\
    \ class `com.ps.beans.others.MtBeanTest` to use those files to load the context.\
    \ The test must complete successfully in order to validate your configuration.\
    \ A solution is provided for you in the `02-ps-container-01-solution` project.\
    \ You can compare your result with this and draw conclusions. As a bonus, try\
    \ using wildcards.\n\nAlso, do not forget, after you have modified a class, you\
    \ might want to build your project using `gradle build -x test` in the command\
    \ line or run the `compileJava` task from the Intellij IDEA interface, in order\
    \ to make sure you are running your test with the most recent sources. In Figure\
    \ [2-14](#A978-1-4842-0811-3_2_Chapter.html#Fig14), the location of the `compileJava`\
    \ task is evidentiated for you.\n\n![A978-1-4842-0811-3_2_Fig14_HTML.jpg](A978-1-4842-0811-3_2_Fig14_HTML.jpg)\n\
    \nFigure 2-14.\n\nThe Gradle view in Intellij IDEA\n\n### Spicing Up XML Configuration\n\
    \nXML is a very flexible text format that defines a set of rules for encoding\
    \ text elements that is both human- and machine-readable. The purpose of XML configuration\
    \ is to make configuring Spring applications easy. Even with XML configuring enterprise\
    \ behavior like AOP, collections, and transactions, integration with third-party\
    \ frameworks was cumbersome, so special namespaces that offer the possibility\
    \ to define complex elements easily were introduced. This also helped with differentiating\
    \ infrastructure beans from application beans.\n\nUsing XML is also practical\
    \ because the configuration files can be externalized, which allows them to control\
    \ the behavior of the application without recompiling it. So in the following\
    \ sections, advanced XML configuration will be covered.\n\n#### Spring Namespaces\n\
    \nThe `util` namespace was introduced earlier in order to demonstrate how collections\
    \ can be injected into beans easily and also how collections can be treated as\
    \ beans. Below, you have a few things that you can do using the `util` namespace:\n\
    \n*   access and use constants in configuration\n\n    ```\n\n    // SimpleBean.java,\
    \ where the static field is defined\n    package com.ps.sample;\n    public class\
    \ SimpleBean {\n    public static final SimpleBean DEFAULT_SIMPLE_BEAN= new SimpleBean(\"\
    DEFAULT\");\n    }\n    ```\n\n    `FieldRetrievingFactoryBean` is a `FactoryBean`\
    \ that retrieves values of static or nonstatic fields. The name of the bean is\
    \ the full path of the static object being retrieved. This approach works for\
    \ enums too.\n*   Use typed collections. When you declare `<util:list />`, `<util:set\
    \ />`, or `<util:map/>`, Spring decides what type of implementation to use, but\
    \ you can change that:\n\n    ```\n    ...\n\n    ...\n\n    ...\n\n    ```\n\n\
    *   Read properties from a file directly into a `java.util.Properties` that can\
    \ be treated like a bean, assigned an id, and retrieved from the context.\n\n\
    \    ```\n    ...\n    Properties dbProp = ctx.getBean(\"dbProp\", Properties.class);\n\
    \    ```\n\nAnother useful namespace is the `jdbc` namespace. It provides configuration\
    \ elements used to create in memory datasources for testing purposes and initializing\
    \ databases.\n\n```\n\nclasspath:testdb/schema.sql\nclasspath:testdb/test-data.sql\n\
    \n```\n\nSome other important namespaces such `context`, `aop`, `tx`, and `jms`\
    \ will be covered later in the book.\n\n#### How to Read Property Files in Spring\
    \ Evolution\n\nAs a example of how the namespaces help simplify configuration,\
    \ let’s take a simple operation: reading properties from a file. Here is how properties\
    \ can be read from a file using the `bean` namespace:\n\nHere is how properties\
    \ can be read from a file using the `context` namespace:\n\nHere is how properties\
    \ can be read from a file using the `util` namespace:\n\nThe advantage of using\
    \ the `util` namespace is that the properties are loaded in a `java.util.Properties`\
    \ object named `dbProp` that can be used in other beans’ configurations. In order\
    \ to access those values and inject them into other beans, SpEl is needed, which\
    \ is why the values are injected using `#{}`, which is typical SpEL syntax to\
    \ access a property of an object; basically, `#{dbProp.url}` is equivalent to\
    \ `dbProp.getProperty(\"url\")`.\n\n#### Spring Expression Language\n\nSpEL is\
    \ the Spring Expression language. It is quite powerful, since it supports querying\
    \ and manipulating an object graph at runtime. The SpEL is inspired from WebFlow\
    \ EL,[⁸](#A978-1-4842-0811-3_2_Chapter.html#Fn8) a superset of Unified EL,[⁹](#A978-1-4842-0811-3_2_Chapter.html#Fn9)\
    \ and it provides considerable functionality, such as:\n\n*   method invocation\n\
    *   access to properties, indexed collections\n*   collection filtering\n*   boolean\
    \ and relational operators\n*   and many more[^(10)](#A978-1-4842-0811-3_2_Chapter.html#Fn10)\n\
    \nThere are several extensions of SpEL (OGNL, MVEL, and JBoss EL), but the best\
    \ part is that it is not directly tied to Spring and can be used independently.\n\
    \n#### Bean Definition Inheritance\n\nSince classes are templates for creating\
    \ objects and they can be extended, in order to extend an existing bean template,\
    \ the same can be done for bean definitions. They can be inherited, and an existing\
    \ definition can be enriched with extra details. Let us assume that the Pet Sitter\
    \ application must run in production on a cluster of three servers. Each server\
    \ has its own database, and the configuration must mention them all. The configuration\
    \ file for connecting to the database would look like this:\n\nA lot of repetition\
    \ in there, isn’t there? Bean inheritance can help reduce the file in size and\
    \ can separate common configuration elements in a template bean definition that\
    \ will be defined as abstract. This type of bean cannot be created by the Spring\
    \ IoC. The bean definition will declare the template as parent and will inherit\
    \ all the details defined in it. For example, in the code snippet below, bean\
    \ type, `user`, and `loginTimeout` property values are inherited. As in class\
    \ inheritance, bean definitions can override inherited details. The `dataSource3`\
    \ bean definition overrides the `loginTimeout`, and it overrides the bean type,\
    \ too.\n\nThe interesting part about bean inheritance is that the resulting beans\
    \ do not have to have the same types as the parent. As long as the properties\
    \ inherited are present in the bean definition that extends the parent template,\
    \ the inheritance will work.\n\n#### Inner beans\n\nInner beans are beans that\
    \ are defined within the scope of another bean. They are the equivalent of private\
    \ fields that cannot be accessed using getter methods and have no outside reference\
    \ to them. This type of bean was mentioned briefly when collections were introduced,\
    \ but it deserves its own section in order to make sure that it is clear when\
    \ to use them and why. An inner bean is defined by a `<bean/>` element inside\
    \ the `<property/>` or `<constructor-arg/>` elements.\n\nInner beans could have\
    \ the `id` or `name` attribute populated (both attributes will be explained in\
    \ detail in the following section), but this would be useless, since these beans\
    \ cannot be retrieved using them, because they are internal to the beans that\
    \ enclose them. And of course, in case you were curious, beans can be nested as\
    \ many times as you want, but avoid doing so unless you really really have to,\
    \ since this will make your configuration look bloated, and it becomes hard to\
    \ test. Nested beans are usually a choice for infrastructure beans.\n\nExample:\
    \ a `Musician` bean, that encloses a `Person` bean, that encloses an `Address`\
    \ bean."
  trans: "\n将此文件拆分为一个或多个配置文件，并修改测试类 `com.ps.beans.others.MtBeanTest`，使其使用这些文件加载上下文。测试必须成功完成，以验证你的配置。在\
    \ `02-ps-container-01-solution` 项目中提供了解决方案。你可以将自己的结果与之对比并得出结论。作为额外挑战，尝试使用通配符。\n\
    \n另外，请记住，在修改类之后，你可能需要在命令行中使用 `gradle build -x test` 构建项目，或从 Intellij IDEA 界面运行\
    \ `compileJava` 任务，以确保你使用最新的源代码运行测试。在图 2-14 中，`compileJava` 任务的位置已为你标出。\n\n![A978-1-4842-0811-3_2_Fig14_HTML.jpg](img/A978-1-4842-0811-3_2_Fig14_HTML.jpg)\n\
    \n图 2-14.\n\nIntellij IDEA 中的 Gradle 视图\n\n### 丰富 XML 配置\n\nXML 是一种非常灵活的文本格式，它定义了一套编码文本元素的规则，既适合人类阅读，也适合机器解析。XML\
    \ 配置的目的是简化 Spring 应用程序的配置。即使使用 XML 配置 AOP、集合和事务等企业级行为，与第三方框架的集成仍然很繁琐，因此引入了特殊的命名空间，使得可以轻松定义复杂元素。这也有助于区分基础设施\
    \ Bean 和应用 Bean。\n\n使用 XML 也很实用，因为配置文件可以外部化，从而允许在不重新编译应用程序的情况下控制其行为。因此，在接下来的章节中，将介绍高级\
    \ XML 配置。\n\n#### Spring 命名空间\n\n之前引入了 `util` 命名空间，以演示如何轻松地将集合注入到 Bean 中，以及如何将集合视为\
    \ Bean。下面，你可以使用 `util` 命名空间做几件事：\n\n*   在配置中访问和使用常量\n\n    ```\n\n    // SimpleBean.java，其中定义了静态字段\n\
    \    package com.ps.sample;\n    public class SimpleBean {\n    public static\
    \ final SimpleBean DEFAULT_SIMPLE_BEAN= new SimpleBean(\"DEFAULT\");\n    }\n\
    \    ```\n\n    `FieldRetrievingFactoryBean` 是一个 `FactoryBean`，用于检索静态或非静态字段的值。Bean\
    \ 的名称是被检索静态对象的完整路径。这种方法也适用于枚举。\n*   使用类型化集合。当你声明 `<util:list />`、`<util:set />`\
    \ 或 `<util:map/>` 时，Spring 会决定使用哪种实现类型，但你可以更改：\n\n    ```\n    ...\n\n    ...\n\
    \n    ...\n\n    ```\n\n*   将文件中的属性直接读取到 `java.util.Properties` 中，该对象可以像 Bean\
    \ 一样被处理，分配一个 ID，并从上下文中检索。\n\n    ```\n    ...\n    Properties dbProp = ctx.getBean(\"\
    dbProp\", Properties.class);\n    ```\n\n另一个有用的命名空间是 `jdbc` 命名空间。它提供了用于创建内存数据源（用于测试目的）和初始化数据库的配置元素。\n\
    \n```\n\nclasspath:testdb/schema.sql\nclasspath:testdb/test-data.sql\n\n```\n\n\
    其他一些重要的命名空间，如 `context`、`aop`、`tx` 和 `jms`，将在本书后面介绍。\n\n#### 如何在 Spring 演进中读取属性文件\n\
    \n作为命名空间如何简化配置的一个例子，我们来看一个简单的操作：从文件中读取属性。以下是使用 `bean` 命名空间从文件读取属性的方法：\n\n以下是使用\
    \ `context` 命名空间从文件读取属性的方法：\n\n以下是使用 `util` 命名空间从文件读取属性的方法：\n\n使用 `util` 命名空间的优点是，属性被加载到一个名为\
    \ `dbProp` 的 `java.util.Properties` 对象中，该对象可以在其他 Bean 的配置中使用。为了访问这些值并将它们注入到其他\
    \ Bean 中，需要使用 SpEL，这就是为什么使用 `#{}` 注入值的原因，这是典型的 SpEL 语法，用于访问对象的属性；基本上，`#{dbProp.url}`\
    \ 等同于 `dbProp.getProperty(\"url\")`。\n\n#### Spring 表达式语言\n\nSpEL 是 Spring 表达式语言。它非常强大，因为它支持在运行时查询和操作对象图。SpEL\
    \ 的灵感来源于 WebFlow EL，⁸ 它是 Unified EL 的超集，⁹ 并提供了相当多的功能，例如：\n\n*   方法调用\n*   访问属性、索引集合\n\
    *   集合过滤\n*   布尔和关系运算符\n*   以及更多功能¹⁰\n\nSpEL 有几种扩展（OGNL、MVEL 和 JBoss EL），但最棒的是它并不直接与\
    \ Spring 绑定，可以独立使用。\n\n#### Bean 定义继承\n\n由于类是创建对象的模板，并且可以被扩展，因此对于 Bean 定义也可以做同样的事情。它们可以被继承，并且现有的定义可以用额外的细节来丰富。假设\
    \ Pet Sitter 应用程序必须在由三台服务器组成的集群上投入生产运行。每台服务器都有自己的数据库，配置必须全部提及它们。连接数据库的配置文件如下所示：\n\
    \n这里面有很多重复，不是吗？Bean 继承有助于减小文件大小，并可以将公共配置元素分离到一个将被定义为抽象的模板 Bean 定义中。这种类型的 Bean\
    \ 不能被 Spring IoC 创建。Bean 定义将声明模板作为父级，并将继承其中定义的所有细节。例如，在下面的代码片段中，Bean 类型、`user`\
    \ 和 `loginTimeout` 属性值被继承。与类继承一样，Bean 定义可以覆盖继承的细节。`dataSource3` Bean 定义覆盖了 `loginTimeout`，并且也覆盖了\
    \ Bean 类型。\n\n关于 Bean 继承的有趣之处在于，生成的 Bean 不必与父级具有相同的类型。只要继承的属性存在于扩展父模板的 Bean 定义中，继承就会生效。\n\
    \n#### 内部 Bean\n\n内部 Bean 是在另一个 Bean 的作用域内定义的 Bean。它们相当于私有字段，无法通过 getter 方法访问，并且没有外部引用。在介绍集合时曾简要提及过这种类型的\
    \ Bean，但它值得拥有自己的章节，以确保清楚何时使用它们以及为什么使用。内部 Bean 由 `<property/>` 或 `<constructor-arg/>`\
    \ 元素内部的 `<bean/>` 元素定义。\n\n内部 Bean 可以填充 `id` 或 `name` 属性（这两个属性将在下一节中详细解释），但这将是无用的，因为这些\
    \ Bean 无法通过它们检索，因为它们是包含它们的 Bean 的内部 Bean。当然，如果你好奇的话，Bean 可以嵌套任意多次，但除非你真的真的必须这样做，否则请避免这样做，因为这会使你的配置看起来臃肿，并且变得难以测试。嵌套\
    \ Bean 通常是基础设施 Bean 的选择。\n\n示例：一个 `Musician` Bean，包含一个 `Person` Bean，而 `Person`\
    \ Bean 又包含一个 `Address` Bean。\n"
- fmt: "# Bean Naming\n\nEvery bean hosted by the container has an unique identifier.\
    \ It is the developer’s responsibility to name beans accordingly using the `id`\
    \ or `name` attributes where this is necessary, because as we’ve seen previously\
    \ when we customized the `CustomDateEditor`, the configurer bean was defined without\
    \ an `id`. A bean usually has at least one unique identifier, and in case of need,\
    \ more of them can be defined by setting multiple values for the `name` attribute,\
    \ by separating them with a comma (`,`), semicolon (`;`), or white space. Or by\
    \ using the `<alias />` element.\n\nPrior to Spring 3.1, the `id` attribute was\
    \ of type `xsd:ID`, and as a consequence, characters such as comma, semicolon,\
    \ white space, and others were not allowed. Starting with Spring 3.1, the type\
    \ was changed to `xsd:string`, the same type used for the `name` attribute, which\
    \ made these attributes interchangeable. So you can use one or the other, with\
    \ the same syntax. You can use them both if you want, anything, just to make sure\
    \ your bean is identified correctly.\n\nLet’s start at the beginning, and assume\
    \ that you have a configuration file containing a single bean definition with\
    \ no `id` or `name` defined:\n\nAn application context can be created from this\
    \ file, and it will contain a single bean of type `SimpleBeanImpl` with a name\
    \ that was set by the container. If we want to see the name that the container\
    \ assigns to this bean, all we have to do is to print all the bean names in the\
    \ context, and this can be done by calling `getBeanDefinitionNames()` provided\
    \ by the application context and iterating the returned results:\n\n```\nApplicationContext\
    \ ctx =\nnew ClassPathXmlApplicationContext(\"classpath:spring/application-config.xml\"\
    );\nfor (String beanName : ctx.getBeanDefinitionNames()) {\nlogger.info(\"Bean\
    \ \" + beanName + \" of type \"\n+ ctx.getBean(beanName).getClass().getSimpleName());\n\
    }\n// Result printed in the console:\nBean com.ps.beans.SimpleBeanImpl#0 of type\
    \ SimpleBeanImpl\n```\n\nThe fun part is that nothing stops you from duplicating\
    \ the bean definition. The container will just assign a different name to the\
    \ second bean of the same type, and the code above will print the following:\n\
    \n```\nBean com.ps.beans.SimpleBeanImpl#0 of type SimpleBeanImpl\nBean com.ps.beans.SimpleBeanImpl#1\
    \ of type SimpleBeanImpl\n```\n\nYou could even retrieve those beans and their\
    \ names by calling the `getBeansOfType(...)` method on the application context:\n\
    \n```\nMap simpleBeans = ctx.getBeansOfType(SimpleBean.class);\n```\n\nSo technically,\
    \ in case you ever need to do something like this, you can. But keep in mind that\
    \ all the beans with that type will be added to that map, whether they have a\
    \ developer given `id`/`name` or not. When you have exactly one bean of a certain\
    \ type, it can be retrieved form the context using the `getBean(...)` method,\
    \ which has quite a few versions that you can use to retrieve beans, all of which\
    \ will be covered in this book.\n\n```\nSimpleBean simpleBean = ctx.getBean(SimpleBean.class);\n\
    ```\n\nThe `getBean` method, which requires only a `Class<T>` argument, returns\
    \ the bean instance that uniquely matches the given object type, if any. The Spring\
    \ IoC searches for any bean of that type, whether the bean type is an interface\
    \ or superclass. In case more than one bean of that type is defined, the context\
    \ will throw an exception, since it cannot know what bean you really want. The\
    \ exception name is quite obvious, as you can see in the log snippet below.\n\n\
    ```\norg.springframework.beans.factory.NoUniqueBeanDefinitionException:\nNo qualifying\
    \ bean of type com.ps.beans.SimpleBean is defined:\nexpected single matching bean\
    \ but found 2: sb01,com.ps.beans.SimpleBeanImpl#0\n```\n\nAlthough having beans\
    \ with no explicit ids defined is possible, unless they are inner beans or some\
    \ type of infrastructure beans (example: `org.springframework.beans.factory.config.CustomEditorConfigurer`),\
    \ it rarely makes sense to define a bean with no `id`.\n\nBeginning with Spring\
    \ 3.1, the `id` and `name` attributes have the same type, so they accept special\
    \ characters in their values. In versions of Spring previous to 3.1, the `name`\
    \ attribute was mandatory for web controllers, because the syntax required their\
    \ `id` to start with \"/\" (e.g., `name=\"/persons\"`), and the `id` attribute\
    \ did not allow special characters. Almost everything that will be covered from\
    \ now on for the attribute `id` is valid for the `name` attribute too, except\
    \ for a little detail that will be mentioned at the appropriate time.\n\nThe Spring\
    \ convention is to use the standard Java convention for instance field names when\
    \ naming beans. This means that bean names start with a lowercase letter and are\
    \ camel-cased from then on. The purpose of good bean naming is to make the configuration\
    \ quick to read and understand. Also, when using more advance features like AOP,\
    \ it is useful to be able to apply advice to a set of beans related by name.\n\
    \nLet’s cover the many ways in which a bean can be named using an `id`.\n\nIf\
    \ the `sb01` bean is named as in one of the examples before, there are two ways\
    \ in which this bean can be retrieved from the application context:\n\n```\nSimpleBean\
    \ sb01 = (SimpleBean)ctx.getBean(\"sb01\");\nSimpleBean sb01 = ctx.getBean(\"\
    sb01\", SimpleBean.class);\n```\n\nSince `id` and `name` have the same purpose,\
    \ it is not allowed to have in the same application context bean definitions with\
    \ the same value for `id`/`name`. Smart Java editors, like the one you were recommended\
    \ to use, Intellij IDEA, even warns you against doing something like that by underlining\
    \ the attribute value with a red line, as depicted in Figure 2-15.\n\n![A978-1-4842-0811-3_2_Fig15_HTML.jpg](A978-1-4842-0811-3_2_Fig15_HTML.jpg)\n\
    \nFigure 2-15. Bad bean naming is obvious in Intellij IDEA\n\nIn the configuration\
    \ below, a few bean-naming examples are depicted. Can you imagine what the code\
    \ that logs all beans in the context will print for the following configuration\
    \ file?\n\nWell, the log will print this:\n\n```\nBean sb01 of type SimpleBeanImpl\n\
    Bean sb02/sb03 of type SimpleBeanImpl\nBean sb04; sb05 of type SimpleBeanImpl\n\
    Bean sb04 of type SimpleBeanImpl\nBean $ of type SimpleBeanImp\n```\n\nSo a detailed\
    \ explanation for each case is appropriate.\n\n*   The attributes `id` and `name`\
    \ can have the same value.\n*   “sb02/sb03” is an `id` containing a special character;\
    \ `$` is an `id` consisting of one special character. Both are valid, and the\
    \ beans can be successfully retrieved using:\n\n```\n    SimpleBean sb1 = ctx.getBean(\"\
    sb02/sb03\", SimpleBean.class);\n    SimpleBean sb2 = ctx.getBean(\"$\", SimpleBean.class);\n\
    ```\n\nBut wait, what happened to the \"mumu\" value set with the `name` attribute?\
    \ Can you guess? The application context can offer a reply to this too:\n\n```\n\
    \    for (String name : ctx.getAliases(\"sb02/sb03\") ){\n    logger.info (\"\
    Alias for sb04 -> \" + name);\n    }\n    //The result\n    Alias for sb02/sb03\
    \ -> mumu\n```\n\n*   “sb04; sb05” is also a valid `id` containing a special character,\
    \ which happens to be a separator, but the bean can be retrieved only using the\
    \ full `id` value, because Spring treats the ids and names a little differently.\
