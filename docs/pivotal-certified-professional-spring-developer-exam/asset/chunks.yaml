    \ 后，此 Web 应用程序可以处理正常的\n    Web 请求和 Web 服务请求。`DefaultWsdl11Definition`\n    使用通过\
    \ `userMessage.xsd`\n    模式实例化的 `SimpleXsdSchema`\n    实例来公开 WSDL 1.1。\n\n*  \
    \ `UserMessageEndpoint`\n    类使用了 Spring 专用注解 `@Endpoint` 进行标注，该注解\n    将此类标记为将处理\
    \ SOAP\n    消息的 Web 服务端点。使用 `@Endpoint` 注解的类以类似方式处理 WS\n    请求，而使用 `@Controller`\
    \ 注解的类则处理\n    Web 请求。\n\n```\n    import com.ps.ws.GetUserRequest;\n    import\
    \ com.ps.ws.GetUserResponse;\n    import org.springframework.beans.factory.annotation.Autowired;\n\
    \    import org.springframework.ws.server.endpoint.annotation.Endpoint;\n    import\
    \ org.springframework.ws.server.endpoint.annotation.PayloadRoot;\n    import org.springframework.ws.server.endpoint.annotation.RequestPayload;\n\
    \    import org.springframework.ws.server.endpoint.annotation.ResponsePayload;\n\
    \    @Endpoint\n    public class UserMessageEndpoint {\n    public static final\
    \ String NAMESPACE_URI = \"http://ws-boot.com/schemas/um\";\n    @Autowired\n\
    \    private UserMessageRepository userMessageRepository;\n    @Autowired\n  \
    \  public UserMessageEndpoint(UserMessageRepository userMessageRepository) {\n\
    \    this.userMessageRepository = userMessageRepository;\n    }\n    @PayloadRoot(namespace\
    \ = NAMESPACE_URI, localPart = \"getUserRequest\")\n    @ResponsePayload\n   \
    \ public GetUserResponse getUser(@RequestPayload GetUserRequest request) {\n \
    \   GetUserResponse response = new GetUserResponse();\n    response.setUserType(userMessageRepository.findUserType(request.getEmail()));\n\
    \    return response;\n    }\n    }\n    ```\n\n`@Payload`\n    注解将一个端点方法标记为传入请求的处理程序，\n\
    \    并由 Spring WS 根据消息的 `namespace` 和\n    `localPart` 进行识别。\n\n`@ResponsePayload`\n\
    \    注解指定 Spring WS 应将返回值映射到\n    响应负载。\n\n`@RequestPayload`\n    注解指定传入消息将映射到方法的\n\
    \    `request`\n    参数。\n\n位于 `src/main/jaxb` 下的 `com.ps.ws`\n包（在图 7-17 中用红色圈出）\n\
    包含使用 `xjc` 生成的类。每次修改\n`userMessage.xsd`\n模式时，都必须重新生成这些类。\n\n发布 WSDL\n\nWSDL 定义了一个网络接口，该接口由接收消息然后有时回复消息的端点组成。WSDL\
    \ 描述了\n端点以及请求和回复消息。当使用\n`DefaultWsdl11Definition`\nBean 时，Spring-WS 会自动从 XSD 生成\
    \ WSDL，该 WSDL 可通过 URL `http://<host>:<port>/ws/userMessage.wsdl`\n访问，并在运行时动态生成。Default-Wsdl11Definition\n\
    从 XSD 模式构建 WSDL。此定义会遍历模式中找到的所有\n`element`\n元素，并为所有元素创建 `message`。接下来，它会为所有以定义的请求或响应后缀结尾的消息创建\
    \ WSDL 操作。建议在\n生产应用程序中使用静态 WSDL 文件，并通过类型为\n`org.springframework.ws.wsdl.wsdl11.SimpleWsdl11Definition`\n\
    的 Bean 公开它，因为生成 WSDL 文件可能需要很长时间。在开发期间，\n在运行时生成它很有用，因为如果契约\n发生更改，WSDL 必须随之调整。\n\
    \n!\n\n可以访问 WSDL 信息的位置取决于\n`DefaultWsdl11Definition`\nBean。基本上，可以在如下定义的位置找到 WSDL\
    \ 信息：`http://<host>:<port>/[locationUri]/[DefaultWsdl11Definition_bean_id].wsdl`\n\
    \n对于到目前为止描述的应用程序，可以在\n`http://localhost:8080/ws/`\n`userMessage.wsdl`\n找到 WSDL\
    \ 信息，并且在浏览器中打开时，会显示 XSD 模式中的所有信息以及一些与服务器相关的其他信息，例如 SOAP 端点\n地址。该地址是相对于用于访问 WSDL\
    \ 信息的 URL 生成的，\n因为 `DefaultWsdl11Definition`\nBean 的 `transformWsdlLocations`\n\
    属性设置为 `true`。下一个 XML\n片段是 Spring WS 为 `14-ps-ws-sample`\n应用程序生成的 WSDL 的一部分。\n\n\
    ```\n\n...\n\n```\n\n测试 Web 服务应用程序\n"
- fmt: "为了测试该应用程序，可以编写一个测试类，并使用诸如`WebTemplate`之类的Spring Web服务特定组件来使开发更实用。该应用程序是使用Spring\
    \ Boot编写的，因此使用Spring Boot进行测试是合乎逻辑的。`@SpringBootTest`注解用于运行基于Spring Boot的测试的测试类，并搜索将用于创建Spring\
    \ Boot测试上下文的Spring Boot配置类。`@LocalServerPort`是一个Spring Boot注解，可以在字段或方法/构造函数参数级别使用，以注入在运行时分配的HTTP端口。测试方法中需要此值来创建要测试的Web服务公开的URL。\n\
    \n```java\nimport org.springframework.boot.context.embedded.LocalServerPort;\n\
