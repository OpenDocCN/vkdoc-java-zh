    图 2-21. Spring 支持的 JSR 250 和 JSR 330 注解


    现在，后续章节的主角已经介绍完毕，让我们开始吧！


    ## 使用多种配置源


    使用`@Configuration`注解的类包含 Bean 定义。一个 Spring 应用程序中可以有一个或多个这样的类，并且它们可以与 XML 配置文件结合使用。这些类可以通过多种方式引导[^(19)](#A978-1-4842-0811-3_2_Chapter.html#Fn19)，具体取决于所选配置的设置。前面示例中使用的`DataSourceConfig`类是一个典型的
    Java 配置类，它包含两个 Bean 定义以及一些通过`PropertySource`注解从属性文件注入的属性。


    ```java

    import org.springframework.jdbc.datasource.DriverManagerDataSource;

    import org.springframework.beans.factory.annotation.Value;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.context.annotation.PropertySource;

    import org.springframework.context.support.PropertySourcesPlaceholderConfigurer;

    @Configuration

    @PropertySource("classpath:db/datasource.properties")

    public class DataSourceConfig {

    @Value("${driverClassName}")

    private String driverClassName;

    ...

    @Bean

    public static PropertySourcesPlaceholderConfigurer

    propertySourcesPlaceholderConfigurer() {

    return new PropertySourcesPlaceholderConfigurer();

    }

    @Bean

    public DataSource dataSource() throws SQLException {

    DriverManagerDataSource ds = new DriverManagerDataSource();

    ds.setDriverClassName(driverClassName);

    ds.setUrl(url);

    ds.setUsername(username);

    ds.setPassword(password);

    return ds;

    }

    }

    ```


    `@Bean`注解用于告诉 Spring，被注解方法的返回值将是一个由它管理的 Bean。`@Bean`注解与方法一起被视为 Bean 定义，方法名成为 Bean
    的 ID。


    `PropertySource`注解向 Spring 环境添加一个`PropertySource`类型的 Bean，该 Bean 将用于从作为参数设置的属性文件中读取属性值。该配置还需要一个`PropertySourcesPlaceholderConfigurer`类型的
    Bean，用于替换作为`@Value`注解属性参数设置的占位符。此类可以使用`AnnotationConfigApplicationContext`实例进行引导，如前所示。但与
    XML 结合使用时，也可以使用`ClassPathXmlApplicationContext`进行引导。在这种情况下，我们需要一个启用了组件扫描的 XML
    配置文件，以便能够拾取配置类。


    以下代码片段中有两个使用 XML 进行配置的示例。`<context:annotation-config/>`激活了 Bean 类中要检测的各种注解：Spring
    的`@Required`和`@Autowired`、JSR 250 的`@PostConstruct`、`@PreDestroy`和`@Resource`等。这个配置元素如今很少使用，因为`<context:component-scan
    />`扩展了它，并且由于支持许多用于过滤和缩小扫描范围的属性，因此使用起来更实用。


    在 Spring 测试环境中，`spring-test`库提供了`@ContextConfiguration`，用于使用一个或多个配置资源引导测试环境。下面的代码描述了这种情况，现在不会解释它，因为它将在第
    [3](#A978-1-4842-0811-3_3_Chapter.html) 章中介绍。


    ```java

    ...

    import org.junit.Test;

    import org.junit.runner.RunWith;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.test.context.ContextConfiguration;

    import org.springframework.test.context.junit4.SpringJUnit4ClassRunner;

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {DataSourceConfig.class})

    public class CfgToXmlTest {

    @Autowired

    DataSource dataSource;

    @Test

    public void testBoot() {

    assertNotNull(dataSource);

    }

    }

    ```


    当配置类和 XML 配置文件一起用于配置应用程序时，它们可以像上面的 XML 片段和引导示例那样进行配置和使用，但反过来也是可能的：从 XML 文件导入配置，并使用`AnnotationConfigApplicationContext`实例引导所有内容，方法是在配置类上使用`@ImportResource`注解。以下代码片段描述了这种情况。


    ```java

    //UserRepoConfig.java

    import org.springframework.context.annotation.ImportResource;

    ...

    @Configuration

    @PropertySource("classpath:db/datasource.properties")

    @ImportResource("classpath:spring/user-repo-config.xml")

    public class UserRepoDSConfig {

    @Value("${driverClassName}")

    private String driverClassName;

    @Value("${url}")

    private String url;

    @Value("${username}")

    private String username;

    @Value("${password}")

    private String password;

    @Bean

    public static PropertySourcesPlaceholderConfigurer

    propertySourcesPlaceholderConfigurer() {

    return new PropertySourcesPlaceholderConfigurer();

    }

    @Bean

    public DataSource dataSource() throws SQLException {

    DriverManagerDataSource ds = new DriverManagerDataSource();

    ds.setDriverClassName(driverClassName);

    ds.setUrl(url);

    ds.setUsername(username);

    ds.setPassword(password);

    return ds;

    }

    }

    //Test class

    ...

    import org.junit.Test;

    public class XmlToCfgTest {

    private ApplicationContext ctx;

    @Before

    public void setup() {

    ctx = new AnnotationConfigApplicationContext(UserRepoDSConfig.class);

    assertNotNull(ctx);

    }

    @Test

    public void testStart3() {

    DataSource dataSource = ctx.getBean("dataSource", DataSource.class);

    assertNotNull(dataSource);

    UserRepo userRepo = ctx.getBean("userRepo", UserRepo.class);

    assertNotNull(userRepo);

    }

    }

