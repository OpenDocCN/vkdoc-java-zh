    return initializer;\n}\nprivate DatabasePopulator databasePopulator() {\nfinal\
    \ ResourceDatabasePopulator populator = new ResourceDatabasePopulator();\npopulator.addScript(schemaScript);\n\
    populator.addScript(dataScript);\nreturn populator;\n}\n@Bean\npublic JdbcTemplate\
    \ userJdbcTemplate() {\nreturn new JdbcTemplate(dataSource());\n}\n}\n```"
  trans: "\n基本上，`ResultSet` 对象会根据语句执行返回的结果数量，被转换成一个或多个 `User` 对象。另外，不妨思考一下，使用上述方法处理\
    \ `Timestamp` 和 `Date` 值会变得多么棘手。\n\n如果查询未能正确执行会发生什么？会抛出一个 `java.sql.SQLException`，由于这是一个受检异常，开发者当然必须编写适当的代码来处理它。传统的\
    \ JDBC 用法冗余、容易出错、异常处理能力差，而且整体使用起来非常繁琐。\n\nSpring 数据访问\n\n使用 Spring，就无需再编写基本的传统\
    \ JDBC 代码了。Spring 框架提供的组件旨在消除“手动”处理数据库连接的必要性。在编写企业级应用（无论是否使用 Spring）时，会使用称为 Repository\
    \ 的类来与数据库通信。在图 5-2 中，你可以看到可以使用的不同类型的 Repository 类，以及用作数据库桥梁的持久化框架。\n\n![A978-1-4842-0811-3_5_Fig2_HTML.jpg](img/A978-1-4842-0811-3_5_Fig2_HTML.jpg)\n\
    \n图 5-2.\n\nRepository 类如何与数据库交互\n\n如前所述，数据存储是一种资源。必须妥善管理对资源的访问，以避免出现瓶颈。在软件领域，瓶颈一词指的是多个进程需要访问同一资源的情况，如果对资源的访问管理不当，某些进程最终将永远无法访问该资源。在使用纯\
    \ JDBC 访问资源时，数据库由开发者显式管理。Spring 与持久化框架一起，减轻了开发者的这一责任。那么，让我们从使用 Spring 访问数据的最基本方式开始：使用\
    \ JDBC Repository 类。\n\nJdbcTemplate 简介\n\nSpring 框架的 JDBC 抽象框架包含四个主要包：`core`、`datasource`、`object`\
    \ 和 `support`。² 此外还有一个小的 `config` 包，其中包含两个用于配置 Spring JDBC 环境的基础设施 Bean。Spring\
    \ 通过引入 `org.springframework.jdbc.core.JdbcTemplate` 类（属于 `core` 包）简化了使用 JDBC 与数据库交互时需要编写的代码。这个类隐藏了大量\
    \ JDBC 样板代码，并减轻了开发者在连接管理方面的负担，因为数据库连接会自动获取和释放。`datasource` 包包含用于 `DataSource`\
    \ 管理的工具类，以及一些可用于测试的简单 `DataSource` 实现。`object` 包包含将 RDBMS 查询、更新和存储过程表示为线程安全、可重用对象的类。`support`\
    \ 包提供了 SQLException 转换功能和一些工具类。异常处理也得到了完善，提供了清晰的异常信息，始终报告根本原因，并且确保即使在失败的情况下也能正确释放资源。`JdbcTemplate`\
    \ 类是根据模板方法模式设计的，这是一种行为设计模式，它定义了算法的骨架，而具体的实现则在之后定义或委托给子类。³\n\n本节将介绍一个最简单的示例，用以演示如何使用\
    \ `JdbcTemplate`。为此，我们需要以下内容：\n\n*   一个包含数据库详细信息的配置文件，我们称之为 db.properties：\n\n\
    ```\n    #db.properties 内容\n    # 用于在内存数据库 H2 中运行应用程序\n    driverClassName=org.h2.Driver\n\
    \    url=jdbc:h2:∼/sample\n    username=sample\n    password=sample\n    ```\n\
    \n*   包含用于初始化数据库结构的 SQL 查询的配置文件：schema.sql（包含用于创建表的 SQL 代码）和 test-data.sql（包含用于向表中填充初始数据的插入语句）。这些文件的内容与本章节无关，但它们是\
    \ `05-ps-jdbc-practice` 项目的一部分。\n\n*   一个用于测试数据库的配置类，我们称之为 `TestDataConfig`。这个配置类将包含创建\
    \ `dataSource` Bean 所需的所有 Bean。我们将使用一个名为 H2 的内存数据库。以下配置看起来有些复杂，但它提供了定义连接 URL 和访问数据库凭据的可能性。此时，只需将\
    \ db.properties 配置文件替换为描述不同类型数据库的文件，应用程序的其余部分仍然可以正常工作。`dataSource` Bean 的类型是 `SimpleDriverDataSource`，这是\
    \ `javax.sql.DataSource` 的一个简单的 Spring 特定实现。两个专门的 Spring Bean 用于初始化 `dataSource`\
    \ Bean（`DataSourceInitializer`）和填充 `dataSource` Bean（`DatabasePopulator`）。\n\n\
    ```\npackage com.ps.config;\nimport org.springframework.beans.factory.annotation.Value;\n\
    import org.springframework.context.annotation.*;\nimport org.springframework.context.support.PropertySourcesPlaceholderConfigurer;\n\
    import org.springframework.core.io.Resource;\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
    import org.springframework.jdbc.datasource.SimpleDriverDataSource;\nimport org.springframework.jdbc.datasource.init.DataSourceInitializer;\n\
    import org.springframework.jdbc.datasource.init.DatabasePopulator;\nimport org.springframework.jdbc.datasource.init.DatabasePopulatorUtils;\n\
    import org.springframework.jdbc.datasource.init.ResourceDatabasePopulator;\n@Configuration\n\
    @Profile(\"dev\")\n@PropertySource(\"classpath:db/db.properties\")\npublic class\
    \ TestDataConfig {\n@Value(\"${driverClassName}\")\nprivate String driverClassName;\n\
    @Value(\"${url}\")\nprivate String url;\n@Value(\"${username}\")\nprivate String\
    \ username;\n@Value(\"${password}\")\nprivate String password;\n@Bean\npublic\
    \ static PropertySourcesPlaceholderConfigurer\npropertySourcesPlaceholderConfigurer()\
    \ {\nreturn new PropertySourcesPlaceholderConfigurer();\n}\n@Lazy\n@Bean\npublic\
    \ DataSource dataSource() {\ntry {\nSimpleDriverDataSource dataSource = new SimpleDriverDataSource();\n\
    Class driver =\n(Class) Class.forName(driverClassName);\ndataSource.setDriverClass(driver);\n\
    dataSource.setUrl(url);\ndataSource.setUsername(username);\ndataSource.setPassword(password);\n\
    DatabasePopulatorUtils.execute(databasePopulator(), dataSource);\nreturn dataSource;\n\
    } catch (Exception e) {\nreturn null;\n}\n}\n@Value(\"classpath:db/schema.sql\"\
    )\nprivate Resource schemaScript;\n@Value(\"classpath:db/test-data.sql\")\nprivate\
    \ Resource dataScript;\n@Bean\npublic DataSourceInitializer dataSourceInitializer\n\
    (final DataSource dataSource) {\nfinal DataSourceInitializer initializer = new\
    \ DataSourceInitializer();\ninitializer.setDataSource(dataSource);\ninitializer.setDatabasePopulator(databasePopulator());\n\
    return initializer;\n}\nprivate DatabasePopulator databasePopulator() {\nfinal\
    \ ResourceDatabasePopulator populator = new ResourceDatabasePopulator();\npopulator.addScript(schemaScript);\n\
    populator.addScript(dataScript);\nreturn populator;\n}\n@Bean\npublic JdbcTemplate\
    \ userJdbcTemplate() {\nreturn new JdbcTemplate(dataSource());\n}\n}\n```\n"
- fmt: '# Configuration Class Overview


    The configuration class probably looks familiar to you, since it was already introduced
    in [Chapter 2](http://link.springer.com/search?facet-content-type=ReferenceWorkEntry&query=2):
    Bean Lifecycle and Configuration. There is an extra bean declaration here, though:
    `dataSourceInitializer`. This bean uses an instance of `DatabasePopulator` to
    read scripts necessary to create and populate the `P_USER` and the `P_PET` tables.
    The `db/schema.sql` file contains SQL DDL statements that define the structure
    of the tables. The `db/test-data.sql` contains SQL DML insert statements that
    are executed by the `databasePopulator` component to insert data into the previously
    created table.


    The simple version, using an embedded database, looks like the following code
    snippet and uses Spring JDBC support components like `EmbeddedDatabaseBuilder`
    to create a lightweight in-memory database.


    ```

    package com.ps.config;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.context.annotation.Profile;

    import org.springframework.jdbc.core.JdbcTemplate;

    import org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseBuilder;

    import org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseType;

    @Configuration

    @Profile("dev")

    public class TestDataConfig {

    @Bean

    public DataSource dataSource() {

    return new EmbeddedDatabaseBuilder()

    .setType(EmbeddedDatabaseType.H2)

    .addScript("classpath:db/schema.sql")

    .addScript("classpath:db/test-data.sql")

    .build();

    }

    @Bean

    public JdbcTemplate jdbcTemplate() {

    return new JdbcTemplate(dataSource());

    }

    }

    ```


    An equivalent configuration can be set up using XML and the JDBC namespace. For
    an embedded in-memory database with no concern for credentials or connection url,
    the `<jdbc:embedded-database .../>` configuration can be used:


    A more complex configuration that allows for credentials to be read from an external
    configuration file can be set up as well using the `<jdbc:initialize-database
    .../>` element and a `SimpleDriverDataSource` bean:


    - An application configuration class declaring the repository bean to be tested,
    let’s call it `AppConfig` and define it like this:


    ```

    @Configuration

    @ComponentScan(basePackages = {"com.ps.repos.impl"})

    public class AppConfig {

    }

    ```


    - A repository bean that uses a bean of type `JdbcTemplate` to access the database:
    `JdbcTemplateUserRepo`


    ```

    package com.ps.repos.impl;

    import com.ps.ents.User;

    // interface to define User specific methods

    // to be implemented by the repository

    import com.ps.repos.UserRepo;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jdbc.core.JdbcTemplate;

    import org.springframework.jdbc.core.RowMapper;

    import org.springframework.stereotype.Repository;

    import java.sql.ResultSet;

    import java.sql.SQLException;

    import java.util.HashSet;

    import java.util.Set;

    @Repository("userTemplateRepo")

    public class JdbcTemplateUserRepo implements UserRepo {

    private RowMapper rowMapper = new UserRowMapper();

    protected JdbcTemplate jdbcTemplate;

    @Autowired

    public JdbcTemplateUserRepo(JdbcTemplate jdbcTemplate) {

    this.jdbcTemplate = jdbcTemplate;

    }

    @Override

    public User findById(Long id) {

    String sql = "select id, email, username, password from p_user where id= ?";

    return jdbcTemplate.queryForObject(sql, rowMapper, id);

    }

    ... // other repository methods

    /**

    * Maps a row returned from a query executed

    * on the P_USER table to a com.ps.ents.User object.

    */

    private class UserRowMapper implements RowMapper {

    public User mapRow(ResultSet rs, int rowNum) throws SQLException {

    Long id = rs.getLong("ID");

    String email = rs.getString("EMAIL");

    String username = rs.getString("USERNAME");

    String password = rs.getString("PASSWORD");

    User user = new User();

    user.setId(id);

    user.setUsername(username);

    user.setEmail(email);

    user.setPassword(password);

    return user;

    }

    }

    }

    ```


    In a software application, data is managed as objects that are called entities
    or domain objects. The entity classes are written by the developer, and their
    fields match the columns in a database table. The `UserRowMapper` internal class
    depicted in the previous code snippet is used to do just that, and it will be
    covered in more detail a little bit later in this section.


    - A test class: `TestJdbcTemplateUserRepo`


    ```

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {TestDataConfig.class, AppConfig.class})

    @ActiveProfiles("dev")

    public class TestJdbcTemplateUserRepo {

    @Autowired

    @Qualifier("userTemplateRepo")

    UserRepo userRepo;

    @Before

    public void setUp() {

    assertNotNull(userRepo);

    }

    @Test

    public void testFindById() {

    User user = userRepo.findById(1L);

    assertEquals("John", user.getUsername());

    }

    @Test

    public void testNoFindById() {

    User user = userRepo.findById(99L);

    assertEquals("John", user.getUsername());

    }

    }

    ```


    This test class is a simple one that searches for a user object by its ID. The
    `testFindById` method passes, the `testNoFindById` test does not, and this method
    will be covered in detail in the section about Spring data access exceptions.
    Here, the method is incomplete, missing the `expected` attribute, because it is
    out of scope at the moment.


    To create a `JdbcTemplate` bean, a `dataSource` is needed to access database records.
    Every repository bean will have this bean as a dependence, and it will use it
    to manipulate data when `JdbcTemplate` bean methods are called, as in the following
    code snippet:


    ```

    String sql = "select id, email, username,password from p_user where id= ?";

    jdbcTemplate.queryForObject(sql, rowMapper, id);

    ```


    The next sequence of steps is taken by Spring in the background:


    1. A database connection is acquired.

    2. A transaction is acquired or created so the statement can be executed in its
    context if in a transactional environment. In the previous case, there is no transaction
    support, defined declarative using `@Transactional` or programmatic. Both will
    be introduced later in the chapter.

    3. The statement is executed.'
