    Bean Naming


    Bean naming is simpler when using JavaConfigurations for a number of

    reasons.


    CC


    When the name is not defined for a bean declared with `Bean`, the Spring IoC

    names the bean with the annotated method name.


    The name can be set by populating the `name` attribute. The

    same attribute can receive as argument an array of names. The first one

    becomes the name; the rest become aliases.


    ```

    // bean name = dataSource

    @Bean

    public DataSource dataSource() throws SQLException {

    ...

    }

    //bean name = one

    @Bean(name="one")

    public DataSource dataSource() throws SQLException {

    ...

    }

    //bean name =  one, alias = two

    @Bean(name={"one", "two"})

    public DataSource dataSource() throws SQLException {

    ...

    }

    ```


    CC


    When the name is not defined for a bean declared with `Component`, the Spring

    IoC creates the name of the bean from the name of the bean type, by

    lowercasing the first letter.


    That is why in the previous example, the bean name was `jdbcRequestRepo`,

    because the class name was `JdbcRequestRepo`. If

    you want to rename it, all you have to do is give the name to the `@Repository`

    annotation (or any of the stereotype annotations) as argument:


    ```

    // bean name = jdbcRequestRepo

    @Repository

    public class JdbcRequestRepo extends

    JdbcAbstractRepo implements RequestRepo{

    ...

    }

    // bean name = requestRepo

    @Repository("requestRepo")

    public class JdbcRequestRepo extends

    JdbcAbstractRepo implements RequestRepo{

    ...

    }

    // or

    @Repository(value="requestRepo")

    public class JdbcRequestRepo extends

    JdbcAbstractRepo implements RequestRepo{

    ...

    }

    //  or

    // bean name = requestRepo

    @Component("requestRepo")

    public class JdbcRequestRepo extends

    JdbcAbstractRepo implements RequestRepo{

    ...

    }

    ```


    Aliases cannot be defined using stereotype annotations, but a request

    has already been made to provide such a feature.[^(20)](#A978-1-4842-0811-3_2_Chapter.html#Fn20)


    Related to naming is the `@Description`

    annotation, which was added in Spring 4.x. This annotation is used to

    add a description to a bean, which is quite useful when beans are

    exposed for monitoring purposes, as you will see in the JMX section.

    This can be used together with `@Bean` and `@` `Component` (and its

    specializations).


    ```

    @Repository

    @Description("This is not the bean you are looking for")

    public class JdbcRequestRepo extends JdbcAbstractRepo

    implements RequestRepo {

    ...

    }

    ```


