  trans: '

    # 1. 书籍概述


    Spring 是目前最具影响力且发展最快的 Java 框架之一。每当有新的创业想法诞生，如果开发语言是 Java，Spring 就会被纳入考量。到 2016
    年 10 月 1 日，Spring 将迎来十四岁生日，这些年来，它已成长为一项成熟的软件技术。¹


    本书涵盖了多个项目的核心功能。官方认证考试所需的主题会深入讲解，而所有扩展内容则简明扼要地呈现，旨在让你一窥门径，激发你进一步学习的兴趣。


    ## 什么是 Spring，为什么你应该对它感兴趣？


    当使用 Java 构建项目时，大量功能需要从头开始构建。然而，由于我们身处开源世界，许多有用的功能早已被构建出来，并且可以免费获取。很久以前，当 Java
    世界还相当小众时，如果你在项目中使用他人开发并以 `*.jar` 形式发布的开源代码，你会说你在使用一个库。但随着时间的推移，软件开发世界不断演进，库也日益壮大。它们演变成了框架。因为它们不再是一个可以导入的单一
    `*.jar` 文件，而是变成了一个由或多或少解耦的、职责各异的库组成的集合，你可以只导入自己需要的部分。随着框架的发展，用于构建项目并将框架作为依赖项添加的工具也随之演进。目前最广泛使用的项目构建工具之一是
    Maven，但新的构建工具正在抢占风头。本书将使用其中一种新型构建工具来构建项目。稍后会介绍它。


    Spring 框架于 2002 年 10 月发布，是一个使用 Java 开发的开源框架和控制反转容器。随着 Java 的发展，Spring 也在不断演进。本书涵盖的
    Spring 4.3 版本与 Java 8 完全兼容，而 Spring 5 计划于 2016 年第四季度发布。² 其意图是使其与计划于 2016 年 9 月发布的
    Java 9 兼容。³ 但由于 Java 8 的发布延迟了六个多月，目前一切都还不确定。


    Spring 自带了许多已实现好的默认行为。名为“基础设施 Bean”的组件拥有默认配置，这些配置可以直接使用，也可以轻松定制以满足项目需求。由于 Spring
    遵循“约定优于配置”原则进行构建，它减少了开发人员在编写代码时需要做出的决策数量，因为基础设施 Bean 可用于创建功能性的基础应用程序，且只需极少的定制（甚至无需定制）。


    Spring 是开源的，这意味着许多才华横溢的开发人员为其做出了贡献，但分析所开发组件质量的最终决定权属于 Pivotal Spring 开发团队，在 Pivotal
    与 VMware 合并之前，该团队曾被称为 SpringSource 团队。Spring 框架的完整代码在 Github 上对公众开放，⁴ 任何使用 Spring
    的开发人员都可以复刻仓库并提出修改建议。


    一个 Java 应用程序本质上是由相互通信的对象组成的。Spring 在 Java 应用程序开发中获得如此多赞誉的原因在于，它通过提供全面的基础设施支持来组装对象，从而简化了对象的连接和断开。使用
    Spring 开发 Java 应用程序就像搭建一个松散连接的乐高城堡；每个对象都是一块乐高积木，你可以轻松地将其移除并替换为另一块。Spring 目前是 Java
    框架中的 VIP，如果你读到这里还没有对它产生丝毫兴趣，那说明我这本书写得太糟糕了，你应该写封邮件告诉我。


    在进一步介绍本书将为你提供什么之前，让我们先概览一下 Spring 项目。图 1-1 描绘了所有的 Spring 项目。对于 2016 年，有 19 个主要项目、2
    个社区项目，以及 3 个可以说是“被搁置”的项目，因为未来将不再对它们进行贡献，它们将被逐步淘汰。


    ![A978-1-4842-0811-3_1_Fig1_HTML.jpg](img/A978-1-4842-0811-3_1_Fig1_HTML.jpg)


    图 1-1.


    Spring Web 技术栈。（用虚线轮廓绘制的项目在本书中仅会部分涉及。）


    ## 本书的重点是什么？


    本书涵盖的主题主要是 Spring 框架对后端层的支持组件。我们仅对 Spring Boot、Spring Data JPA、REST、MVC 和微服务进行浅尝辄止的介绍。本书旨在为开发一个完整的
    Spring 应用程序提供一条自然的路径。随着每一章的推进，应用程序将变得越来越复杂，直到达到其最终形态，该形态还将包含安全设置、一个简单的 Web 应用程序，并支持
    REST 请求。


    本书专注于帮助开发人员理解 Spring 的基础设施是如何设计的，以及如何通过几个简单的步骤，最大限度地发挥 Spring 的潜力来编写 Spring 应用程序。其目标如下：


    *   使用 Spring 开发应用程序

    *   使用 Spring Security 保护资源

    *   使用 Spring Test 和其他测试框架（JUnit、JsMock）测试应用程序

    *   使用 Gradle⁵ 创建 Spring 应用程序


    ## 谁应该阅读本书？


    本书旨在为使用 Spring 核心组件创建应用程序提供清晰的见解。对于那些希望成为认证 Spring 专业人士⁶ 的开发人员来说，这也是一本非常有帮助的书。这就是为什么官方
    Pivotal Spring Core 学习指南中的每一个主题都得到了应有的重视。


    你只需要具备最基础的 Java 知识就能很好地利用本书，但每当书中未能完全涵盖某个主题时，应查阅 Java⁷ 和 Spring⁸ 的在线文档。


    简而言之，本书是为以下读者编写的：


    *   想要初步了解 Spring 的 Java 开发人员

    *   有兴趣学习熟练使用 Spring，但对官方认证不感兴趣的 Spring 开发人员

    *   希望获得认证并希望得到尽可能多帮助的 Spring 和 Java 开发人员

    '
- fmt: "## About the Certification Exam\n\nIf you are interested in becoming a Certified\
    \ Spring Professional, the first step you have to take is to go to the Pivotal\
    \ official learning site [`http://pivotal.io/training`](http://pivotal.io/training)\
    \ and search for the Spring Certification section. There you will find all the\
    \ details you need regarding the official trainings, including where are they\
    \ taking place and when. The training is four days long. There are online trainings\
    \ available as well. After creating an account on the Pivotal site, you can select\
    \ the desired training. After you make the payment, if you choose an online training,\
    \ about a month later, you will receive through the mail an official training\
    \ kit consisting of the following:\n\n* A pair of conference headphones (usually\
    \ Logitech) for use during the training to hear your trainer talk and so you can\
    \ ask questions.\n* A professional webcam (usually Logitech) for use during the\
    \ training, so that your trainer and colleagues can see you, thus simulating the\
    \ classroom experience.\n* A Spring study guide containing the printed version\
    \ of the slides your tutor will be using during the training. (This might also\
    \ be in electronic form, from consideration of the environment.)\n* A Spring Study\
    \ Lab book containing explanations and instructions for the practical exercises\
    \ you will do during the training. (This might also be in electronic form, from\
    \ consideration of the environment.)\n* A Pivotal official flash drive containing\
    \ the following:\n  * `Jdk` installer\n  * Sources necessary during the training.\
    \ Each study lab has a small Spring application attached to it with missing configuration\
    \ and code, and the student’s task is to complete it in order to have a working\
    \ application. The same model is used in the code associated with this book.\n\
    \  * An installer of the most recent stable version of the Spring Tool Suite.\
    \ The version on the flash drive is mandatory for the course, because the installer\
    \ sets up a local Maven repository with all the needed dependencies and a full\
    \ eclipse project configuration with the lab sources. The `STS` also has an internal\
    \ `tcServer` to run the web lab applications.\n  * An `html` or `PDF` version\
    \ of the Spring Study Lab.\n\nIf you decide against an online training course,\
    \ you will not receive the headphones and the webcam. The training kit and the\
    \ rest of the materials will be given to you when you arrive at the location where\
    \ the training is taking place. After the training, you will receive a free voucher\
    \ that is required to schedule the certification exam at an approved exam center\
    \ near you. Basically, the voucher or voucher code being given to you is the proof\
    \ that you have attended the official Spring Web Training.\n\nThe exam duration\
    \ is ninety minutes and consists of fifty questions. There are both single and\
    \ multiple-answer questions. The latter are quite explicit, telling you how many\
    \ correct answers you are expected to select. The questions in the book are actually\
    \ more difficult, because you will not be told the number of correct options you\
    \ must select. But you will be given a complete explanation of the answers in\
    \ the appendix.\n\nThe questions will cover (approximately) the following topics:\n\
    \n* Spring overview container, IoC and dependency injection\n* `SpEL` and Spring\
    \ AOP\n* Spring JDBC, Transactions, ORM\n* Spring MVC and the web layer\n* Spring\
    \ Security\n* Spring Messaging and REST\n* Spring Testing\n\nThe passing score\
    \ for the exam is 76%. This means that 38 correct answers are needed in order\
    \ to pass. Most of the questions will present you a piece of Java code or configuration\
    \ and ask you what it does, so make sure you understand the code attached to this\
    \ book and write your own beans and configurations in order to understand the\
    \ framework better. The good news is that all the code in the exam can be found\
    \ in the sources you are given when you attend the official training. Other questions\
    \ will present you with assertions about Spring Web and will require you to select\
    \ the correct or the invalid statement.\n\nIf you read this book, understand all\
    \ the examples, solve the practice exercises, and then attend the official training,\
    \ my recommendation is that you take the certification exam as soon as possible.\
    \ Do not allow for too much time to pass between finishing the training and taking\
    \ the exam, because we are all human after all and information can be forgotten.\
    \ Also, the certification voucher is valid for only a year. You can retake the\
    \ exam again if you fail the first time, but it will cost you about $150.\n\n\
    ## How to Use This Book as a Study Guide\n\nThis book was written in such a way\
    \ as to guide you step by step through the wonderful technology that is Spring.\
    \ It follows the same learning curve as the official training and focuses on the\
    \ same topics that are required for the certification exam, since those are also\
    \ the most needed in real production applications. The topics that are not needed\
    \ for the certification exam are marked, so you know that you can skip them, although\
    \ if you are truly interested in Spring, you will definitely not do so.\n\nThe\
    \ main differences are in the tools used for the practical examples, which will\
    \ be covered shortly.\n\n## How Is This Book Structured?\n\nThis book has eight\
    \ chapters and an appendix. The official Spring guide has sixteen chapters, but\
    \ for the purposes of the book, related topics are wrapped up together. For example,\
    \ the official study guide has four separate chapters that cover dependency injection,\
    \ Spring Core fundamentals, and configuration. This book has only a single big\
    \ chapter about these topics: Chapter 2 —Bean LifeCycle and Configuration.\n\n\
    The list of chapters and a short description of each are presented in Table 1-1.\n\
    \n**Table 1-1.** List of topics by chapter\n\n| Chapter | Topic | Details |\n\
    | --- | --- | --- |\n| 1 | Book overview | Introduction to Spring history, technologies\
    \ and tools used for practice |\n| 2 | Bean LifeCycle and Configuration | Basic\
    \ Spring core concepts, components, and configuration |\n| 3 | Testing Spring\
    \ Applications | How Spring applications can be tested, most used testing libraries\
    \ and test principles |\n| 4 | Aspect Oriented Programming | AOP concept, problems\
    \ that is solves and how it is supported in Spring |\n| 5 | Data Access | Advanced\
    \ Spring Data access using JDBC, Hibernate and Spring Data JPA |\n| 6 | Spring\
    \ Web | Basic introduction of Spring MVC |\n| 7 | Spring Advanced Topics | Remoting,\
    \ Messaging, Web Services with REST |\n| 8 | Spring Microservices with Spring\
    \ Cloud | Introduction to Spring Microservices and what they can be used for |\n\
    | A | Appendix | Two mock exams, answers to review questions, and other comments\
    \ |"
