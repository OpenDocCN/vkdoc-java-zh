    5. 数据访问


    软件应用程序通常处理需要以有序方式存储的数据集，以便于访问、管理和更新。数据可以持久化意味着即使应用程序关闭，数据仍然可用。因此，存储与应用程序的其他部分解耦。组织数据存储最常用的方式是数据库。任何允许数据以可查询和更新的方式组织的存储设置都代表一个数据库。目前最广为人知和使用的数据库是关系型数据库（如
    MySQL、PostgreSQL 和 Oracle）以及键值数据库（也称为 NoSQL）。当然，XML 文件也可以用作数据库，但仅适用于小型应用程序，因为使用
    XML 文件存储数据意味着必须将所有数据加载到内存中才能进行管理。


    从架构角度来看，软件应用程序是多层或多层的，而数据库是基础层，数据存储在其中。基础层（也称为基础设施层）与应用程序其余部分之间的接口是数据访问层，也称为存储库层。在此之上是逻辑（或服务）层。该层转换用户数据并准备存储，或将数据库内容转换为适合在用户界面中显示的数据。在服务层之上是表示（或接口）层，负责接收命令和数据，并将其转发到服务层进行处理或显示结果。而贯穿所有层的，如前一章所述，是横切关注点，如图
    5-1 所示。


    ![A978-1-4842-0811-3_5_Fig1_HTML.jpg](img/A978-1-4842-0811-3_5_Fig1_HTML.jpg)


    图 5-1.


    典型的软件应用程序架构


    数据库是软件应用程序中的核心资源，因此它可能成为瓶颈的来源。这就是为什么访问数据库执行典型操作（如搜索数据、创建数据和删除数据）需要妥善管理。Spring
    支持多种数据库实现，并且可以与大多数提供高效数据访问管理的框架（Hibernate、EclipseLink 或 MyBatis。¹）集成。本章重点介绍如何使用
    Spring 管理数据库访问，代码示例涵盖服务层、数据层和事务切面关注点。


    使用 JDBC 进行基本数据访问


    要执行数据操作，需要与数据库建立连接。在 Java 中获取连接最基本的方法是使用 JDBC。但基本方法也很繁琐，因为开发人员必须编写代码来关闭连接以及处理过程中使用的任何其他基于流的对象。因为仅有连接是不够的，在应用程序和数据库之间传输数据需要额外的对象来以可读的格式包含数据。任何基于连接构建的对象，例如预处理语句和结果集对象，也必须安全地丢弃。这会导致代码杂乱无章，难以维护、测试和编写。要使用
    JDBC 访问数据库，需要以下内容：


    *   用于与数据库通信的数据库驱动程序；

    *   作为通信入口点的连接 URL；

    *   数据库凭据（通常是用户名和密码）。


    使用上述信息，可以创建一个 `javax.sql.DataSource` 对象。这是一个 Java 接口，必须由每个用于访问数据库的 dataSource
    类实现，并且每个数据库驱动程序库都包含自己的实现。


    例如：用于提供对 Oracle 数据库访问的类是 `oracle.jdbc.pool.OracleDataSource`。要使用 JDBC 与数据库交互，必须实现以下步骤：


    *   使用 dataSource 打开与数据库的连接。连接对象的类型特定于数据库，并实现 `java.sql.Connection`。

    *   要从数据库提取或保存数据，需要基于连接创建一个类型实现 `java.sql.PreparedStatement` 的语句实例。

    *   执行语句后，结果存储在类型实现 `java.sql.ResultSet` 的对象中。


    请看下面的示例，该示例使用 JDBC 从数据库中提取所有用户：


    ```

    import javax.sql.DataSource;

    import java.sql.Connection;

    import java.sql.PreparedStatement;

    import java.sql.ResultSet;

    import java.sql.SQLException;

    ...

    public Set findAll() {

    Set userSet = new HashSet();

    String sql = "select u.ID as ID, u.USERNAME as USERNAME," +

    "u.EMAIL as EMAIL," +

    "u.PASSWORD as PASSWORD from P_USER u ";

    Connection conn = null;

    PreparedStatement ps = null;

    ResultSet rs = null;

    try {

    conn = dataSource.getConnection();

    ps = conn.prepareStatement(sql);

    rs = ps.executeQuery();

    userSet = mapUsers(rs); // (*)

    } catch (SQLException e) {

    throw new RuntimeException("从数据库中提取用户时出现意外问题！", e);

    } finally {

    if (rs != null) {

    try {

    rs.close();

    } catch (SQLException ex) {

    ...

    }

    }

    if (ps != null) {

    try {

    ps.close();

    } catch (SQLException ex) {

    ...

    }

    }

    if (conn != null) {

    try {

    conn.close();

    } catch (SQLException ex) {

    ...

    }

    }

    }

    return userSet;

    }

    ```


    上面的代码打开一个连接，提取数据，处理结果，然后关闭连接。每个单独的 SQL 语句都被视为一个事务，并在执行后立即自动提交。这里的另一个复杂之处在于，必须实现与数据库记录转换相对应的
    Java 对象（实体）的领域对象，因为 JDBC 本身不知道如何执行此操作。在上面的示例中，请注意标有 (*) 的行。这是由 `mapUsers` 完成的，如下面的代码片段所示：


    ```

    private Set mapUsers(ResultSet rs) throws SQLException {

    Set userSet = new HashSet();

    User user = null;

    while (rs.next()) {

    user = new User();

    // 设置内部实体标识符（主键）

    user.setId(rs.getLong("ID"));

    user.setUsername(rs.getString("USERNAME"));

    user.setEmail(rs.getString("EMAIL"));

    user.setPassword(rs.getString("PASSWORD"));

    userSet.add(user);

    }

    return userSet;

    }

    ```

