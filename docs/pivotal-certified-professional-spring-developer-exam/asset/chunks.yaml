- fmt: "# This testing technique is really good for finding problems early in the\
    \ development process. And considering that the effort to solve a problem grows\
    \ exponentially in proportion to the time it takes to find it, no project should\
    \ ever be developed without it. Also, the tests should be run automatically using\
    \ a continuous integration tool like `Jenkins`, `Hudson`, or `Bamboo`. Test-driven\
    \ development can produce applications of high quality in less time than is possible\
    \ with older methods, but it has its limitations. Sometimes tests might be incorrectly\
    \ conceived or applied. This may result in units that do not perform as expected\
    \ in the real world. Even if all the units work perfectly in isolation and in\
    \ all anticipated scenarios, end users may encounter situations not imagined by\
    \ the developers and testers. And since testing units was mentioned, this section\
    \ will end here in order to cover the next one.\n\n## Unit and Integration Testing\n\
    \nUnit testing implies testing the smallest testable parts of an application individually\
    \ and independently, isolated from any other units that might affect their behavior\
    \ in an unpredictable way. The dependencies are kept to a minimum, and most of\
    \ them will be replaced with pseudo-units reproducing the expected behavior. This\
    \ means basically that the unit of functionality is taken out of context. The\
    \ unit tests are written by developers and are run using automated tools, although\
    \ they can be run manually too in case of need. A unit test exercises a single\
    \ scenario with a provided input and compares the expected results for that input\
    \ with the actual results. If they match, the test passes; if they don’t, the\
    \ test fails. This method of testing is fast and is one that is most used in many\
    \ projects. The tests are written by developers, and the recommended practice\
    \ is to cover every method in a class with positive and negative tests. Positive\
    \ tests are the ones that test valid inputs for the unit, while negative tests\
    \ test invalid inputs for the unit. These are tests that cover a failure of the\
    \ unit, and they are considered to have failed if the unit does not actually fail\
    \ when tested. The core framework helping developers to easily write and execute\
    \ unit tests in Java since 2000 is `JUnit`. The current version is 4.13, but version\
    \ 5 is currently being developed, and an Alpha version was released in January\
    \ 2016.\n\nThere are not many `JUnit` extensions, because there is little that\
    \ this framework is missing, but there is a framework called `Hamcrest` that is\
    \ quite interesting because it provides a set of matchers that can be combined\
    \ to create flexible expressions of intent. It originated as a framework based\
    \ on `JUnit`, and it was used for writing tests in Java, but managed to break\
    \ the language barrier, and currently it is provided for most currently used languages\
    \ such as Python and Swift. More about it can be found on the official site: [`http://hamcrest.org/`](http://hamcrest.org/).\n\
    \nRunning a suite of unit tests together in a context with all their real dependencies\
    \ provided is called integration testing. As the name of this technique implies,\
    \ the infrastructure needed to connect objects being tested is also a part of\
    \ the context in which tests are executed. In Figure [3-2](#A978-1-4842-0811-3_3_Chapter.html#Fig2),\
    \ a simple diagram for comparing unit and integration testing concepts is depicted.\n\
    \n![A978-1-4842-0811-3_3_Fig2_HTML.jpg](A978-1-4842-0811-3_3_Fig2_HTML.jpg)\n\n\
    Figure 3-2. Unit and integration testing concepts\n\nIn order for functional units\
    \ to be tested in isolation, dependencies must be replaced with pseudo-dependencies,\
    \ fake objects with simple implementation that mimics the behavior of the real\
    \ dependency as far as the dependent is concerned. The pseudo-dependencies can\
    \ be stubs or mocks. Both perform the same function, to replace a real dependency,\
    \ but they way they are created is what sets them apart.\n\n### Testing with Stubs\n\
    \nStubs are created by the developer; they do not require extra dependencies.\
    \ A stub is a concrete class implementing the same interface as the original dependency\
    \ of the unit being tested. They should be designed to exhibit a small part or\
    \ the whole behavior of the actual dependency.\n\nFor example, let’s try to test\
    \ one of the service classes that were introduced in the previous chapter, the\
    \ `SimplePetService`.\n\n```java\npackage com.ps.services.impl;\n...\npublic class\
    \ SimplePetService extends SimpleAbstractService implements PetService {\n   \
    \ // dependency that has to be stubbed\n    private PetRepo repo;\n\n    @Override\n\
    \    public Pet createPet(User user, String name, int age, PetType petType, String\
    \ rfid) {\n        Pet pet = new Pet();\n        pet.setOwner(user);\n       \
    \ pet.setName(name);\n        pet.setAge(age);\n        pet.setRfid(rfid);\n \
    \       user.addPet(pet);\n        repo.save(pet);\n        return pet;\n    }\n\
    \n    @Override\n    public Set findAllByOwner(User user) {\n        return repo.findAllByOwner(user);\n\
    \    }\n\n    /**\n     * @param user owner of the pet\n     * @param name name\
    \ of the pet\n     * @return\n     */\n    @Override\n    public Pet findByOwner(User\
    \ user, String name) {\n        return repo.findByOwner(user, name);\n    }\n\n\
    \    public void setRepo(PetRepo petRepo) {\n        this.repo = petRepo;\n  \
    \  }\n\n    public PetRepo getRepo() {\n        return repo;\n    }\n}\n\n// the\
    \ interface defining the specific Pet behavior\npublic interface PetService {\n\
    \    Pet createPet(User user, String name, int age, PetType petType, String rfid);\n\
    \    Set findAllByOwner(User user);\n    Pet findByOwner(User user, String name);\n\
    }\n```\n\nThis class inherits some behavior from the abstract class `SimpleAbstractService<Pet>`.\n\
    \n```java\npackage com.ps.services.impl;\n...\npublic abstract class SimpleAbstractService\
    \ implements AbstractService {\n    public void save(T entity) {\n        getRepo().save(entity);\n\
    \    }\n\n    public T findById(Long entityId) {\n        return getRepo().findById(entityId);\n\
    \    }\n\n    @Override\n    public void delete(T entity) {\n        getRepo().delete(entity);\n\
    \    }\n\n    @Override\n    public void deleteById(Long entityId) {\n       \
    \ getRepo().deleteById(entityId);\n    }\n\n    abstract AbstractRepo getRepo();\n\
    }\n```\n\nAlthough the number of tests varies depending on developer experience\
    \ and what the code actually does, also related in a funny short story by Alberto\
    \ Savoia, posted on the Google official blog,² my recommendation is to start unit\
    \ testing by trying to write at least two tests for each method: one positive\
    \ and one negative, for methods that can be tested in this way. There are seven\
    \ methods in `SimplePetService`, besides the getter and setter, so the test class\
    \ should have approximately fourteen tests. When testing the service class, the\
    \ concern is that the class should interact correctly with the repository class.\
    \ The behavior of the repository class is assumed known and fixed. The stub class\
    \ will implement the typical repository behavior but without a database connection\
    \ needed, because interaction with a database introduces an undesired lag in test\
    \ execution. The implementation presented here will use a `java.util.Map` to simulate\
    \ a database. As in the application, there are more repository classes extending\
    \ `SimpleAbstractService<Pet>`; the stubs will follow the same inheritance design,\
    \ so the abstract class will be stubbed as well."
