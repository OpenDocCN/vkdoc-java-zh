    \n图7-11. Apache ActiveMQ Web应用程序\n\n本节涵盖的应用程序将使用托管在`tcp://localhost:61616`的ActiveMQ代理。连接工厂将使用此代理创建连接。除此之外，`ObjectMessage`对象依赖于Java序列化来编组/解组对象负载。此过程通常被认为是不安全的，因为恶意负载可能会利用主机系统。因此，从5.12.2和5.13.0版本开始，ActiveMQ要求用户明确白名单允许通过`ObjectMessage`交换的包。[⁸](#A978-1-4842-0811-3_7_Chapter.html#Fn8)\
    \ 因此，`connectionFactory` bean的声明将需要包含那些可以被序列化并用于JMS通信的类所在的包。\n\n```java\n//Java\
    \ Configuration\n@Configuration\npublic class JmsCommonConfig {\n    List packagesList=\
    \ ...;\n    @Bean\n    public ConnectionFactory nativeConnectionFactory(){\n \
