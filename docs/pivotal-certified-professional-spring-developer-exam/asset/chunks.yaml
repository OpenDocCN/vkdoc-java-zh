    尽管测试的数量取决于开发人员的经验以及代码的实际功能（Alberto Savoia 在 Google 官方博客上发布的一个有趣短篇故事也与此相关²），我的建议是开始单元测试时，尝试为每个方法至少编写两个测试：一个正向测试和一个负向测试，适用于可以这样测试的方法。`SimplePetService`
    中有七个方法（不包括 getter 和 setter），因此测试类应该大约有十四个测试。在测试服务类时，关注点在于该类应与仓库类正确交互。仓库类的行为被认为是已知且固定的。桩类将实现典型的仓库行为，但不需要数据库连接，因为与数据库的交互会在测试执行中引入不希望的延迟。这里给出的实现将使用
    `java.util.Map` 来模拟数据库。由于在应用程序中，有更多的仓库类扩展了 `SimpleAbstractService<Pet>`，桩将遵循相同的继承设计，因此抽象类也将被打桩。

