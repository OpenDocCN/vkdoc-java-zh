    Spring MVC Configuration for RESTful

    Applications


    A Spring Web RESTful application is basically a Spring MVC application,

    so the configuration is the same as presented in Chapter [6](#A978-1-4842-0811-3_6_Chapter.html)
    : Spring Web, no matter whether XML or

    Java Configuration is used. To support a custom HTTP message converter

    implementation, the dependency must be added to the classpath of the

    application, and a special bean must be declared in the configuration.

    In the following code snippet, the configuration for a Spring Web

    RESTful application is depicted, and it contains a bean of type `MappingJackson2HttpMessageConverter`

    that will be automatically used by Spring to convert objects to JSON

    representations and vice versa.


    ```

    Configuration

    @EnableWebMvc

    @ComponentScan(basePackages = {"com.ps.web", "com.ps.exs"})

    public class WebConfig extends WebMvcConfigurerAdapter {

    //Declare our static resources.

    @Override

    public void addResourceHandlers(ResourceHandlerRegistry registry) {

    registry.addResourceHandler("/images/**")

    .addResourceLocations("/images/")

    // cache them to speed up page loading

    .setCachePeriod(31556926);

    }

    @Override

    public void configureDefaultServletHandling(

    DefaultServletHandlerConfigurer configurer) {

    configurer.enable();

    }

    //One simple view, to confirm the application is up

    @Override

    public void addViewControllers(ViewControllerRegistry registry) {

    registry.addViewController("/").setViewName("welcome");

    }

    @Bean

    InternalResourceViewResolver getViewResolver(){

    InternalResourceViewResolver resolver = new InternalResourceViewResolver();

    resolver.setPrefix("/WEB-INF/");

    resolver.setSuffix(".jsp" );

    return resolver;

    }

    @Bean

    public MappingJackson2HttpMessageConverter

    mappingJackson2HttpMessageConverter() {

    MappingJackson2HttpMessageConverter

    mappingJackson2HttpMessageConverter =

    new MappingJackson2HttpMessageConverter();

    // when client is a browser JSON response is displayed indented

    mappingJackson2HttpMessageConverter.setPrettyPrint(true);

    //set encoding of the response

    mappingJackson2HttpMessageConverter.setDefaultCharset

    (StandardCharsets.UTF_8);

    mappingJackson2HttpMessageConverter.setObjectMapper(objectMapper());

    return mappingJackson2HttpMessageConverter;

    }

    @Bean

    public ObjectMapper objectMapper() {

    ObjectMapper objMapper = new ObjectMapper();

    objMapper.enable(SerializationFeature.INDENT_OUTPUT);

    objMapper.setSerializationInclusion

    (JsonInclude.Include.NON_NULL);

    return objMapper;

    }

    @Override

    public void configureMessageConverters(

    List> converters) {

    super.configureMessageConverters(converters);

    converters.add(mappingJackson2HttpMessageConverter());

    }

    }

    ```


    Using RestTemplate to Test RESTful Applications


    A RESTful application can be accessed by any type of client that

    supports creating the type of request supported by the application:[^(18)](#A978-1-4842-0811-3_7_Chapter.html#Fn18)

    browsers, mobile applications, desktop applications, etc. The `RestTemplate`[^(19)](#A978-1-4842-0811-3_7_Chapter.html#Fn19)
    is

    Spring’s central class for synchronous client-side HTTP access. This

    class provides a wide set of methods for each HTTP method that can be

    used to access RESTful services. A correspondence between HTTP methods

    and RestTemplate methods that can be used to access REST Services is

    depicted in Figure [7-22](#A978-1-4842-0811-3_7_Chapter.html#Fig22).


    ![A978-1-4842-0811-3_7_Fig22_HTML.jpg](A978-1-4842-0811-3_7_Fig22_HTML.jpg)


    Figure 7-22.


    RestTemplate API to HTTP methods correspondence


    As you can see, the `execute` and `exchange` methods can

    be used for any type of REST calls as long as the HTTP method is given

    as a parameter for the methods. All methods are polymorphic,[^(20)](#A978-1-4842-0811-3_7_Chapter.html#Fn20)
    and

    using one or another depends on the requirements and the developer’s

    preferences. URI instances are returned to identify resources, and

    RestTemplate methods support URI templates. So the following two calls

    are identical:


    ```

    //using URI Template

    String url = "http://localhost:8080/users/{$username}";

    User user = restTemplate.getForObject(url, User.class, "johncusack");

    // using URI

    String url = "http://localhost:8080/users/johncusack";

    User user = restTemplate.getForObject(url, User.class);

    ```


    !


    Just as a reminder, the path variable `$username` is valid,

    and it works as expected: the `$` character is

    allowed to be part of a path variable name. This peculiar name for path

    variables was chosen to make it really obvious to you, the developer,

    that this part of the URL is a variable that must be replaced with an

    actual value when making a REST request.


    The `username`

    was chosen as a key to identify users, because it is unique in the

    database, and even if the database is truncated and reloaded, the

    username will not change. The database ID should not be exposed for

    security reasons, and it is also subject to change in case the database

    is truncated and reloaded while the application is running.


    The `execute`

    method can also be given an `org.springframework.web.client.RequestCallback`

    implementation as a parameter that will tell the `RestTemplate` what to

    do with the request before sending it to the server. Considering this, a

    GET Request for a User instance with `username=johncusack`

    could be written with the exchange method like this:


    ```

    String url ="http://localhost:8080/users/{$username}";

    Person person = restTemplate.execute(url, HttpMethod.GET,

    new RequestCallback() {

    @Override

    public void doWithRequest(ClientHttpRequest request)

    throws IOException {

    HttpHeaders headers = request.getHeaders();

    headers.add("Accept", MediaType.APPLICATION_JSON_UTF8_VALUE);

    System.out.println("Request headers = " + headers);

    }

    }, new HttpMessageConverterExtractor(User.class,

    restTemplate.getMessageConverters())

    , new HashMap() {{

    put("username", "johncusack");

    }});

    ```


    Objects passed to and returned from the methods `getForObject(), postForLocation()`,
    and `put()` are converted

    to HTTP requests and from HTTP responses by HttpMessageConverters.


    The `exchange`

    method uses an `HttpEntity` object to

    encapsulate request headers and use it as a parameter. The method

    returns a `ResponseEntity` object

    containing the result of a REST request, and its body is automatically

    converted using the registered `HttpMessageConverter`

    implementation.


    ```

    import org.springframework.http.ResponseEntity;

    ...

    public class RestUserControllerTest {

    public void editUser() {

    String url = "http://localhost:8080/users/{$username}";

    User user = new User();

    user.setEmail("MissJones@pet.com");

    user.setUsername("jessicajones");

    //set other properties

    ..

    final HttpHeaders headers = new HttpHeaders();

    headers.setContentType(MediaType.APPLICATION_JSON_UTF8);

    final HttpEntity userRequest = new HttpEntity(user, headers);

    ResponseEntity responseEntity = restTemplate.

    exchange(url, HttpMethod.PUT, userRequest, User.class,

    "jessicajones");

    User editedUser = responseEntity.getBody();

    assertNotNull(editedUser);

    assertEquals("MissJones@pet.com", editedUser.getEmail());

    }

    }

