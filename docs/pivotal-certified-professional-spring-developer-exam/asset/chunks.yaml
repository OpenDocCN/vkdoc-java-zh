    \ javax.jms.ConnectionFactory;\n@Configuration\npublic class JmsCommonConfig {\n\
    \    @Bean\n    public ConnectionFactory connectionFactory(){\n        ActiveMQConnectionFactory\
    \ cf =\n            new ActiveMQConnectionFactory();\n        cf.setBrokerURL(\"\
    tcp://localhost:61616\");\n        cf.setTrustAllPackages(true);\n        return\
