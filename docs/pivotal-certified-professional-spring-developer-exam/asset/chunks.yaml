- fmt: '# Spring MVC 与 Spring Security 要点


    - MVC 配置类必须实现`WebMvcConfigurer`或扩展一个实现此接口的类，以自定义导入的配置。

    - `@MVC`模型和支持 Servlet 3.0+ 的应用服务器允许应用无需任何 XML 配置。

    - Spring Security 允许认证与授权完全解耦。

    - URL 可以使用安全规则保护，JSP 元素可以使用安全标签库保护，方法访问可以通过`@Secured`或`@RolesAllowed`限制。

    - 方法安全通过 AOP 实现，使用 Spring Security 特定注解和 JSR 250 注解：`@Secured`、`@RolesAllowed`、`@PreAuthorize`等。

    - 支持密码加密和加盐。

    - `@EnableWebSecurity`是用于配置类以启用 Spring Security 的注解。

    - 此类还必须实现`WebSecurityConfigurer`或扩展一个实现它的类，以自定义导入的配置。

    - Spring Boot 是一组预配置的框架/技术，旨在减少样板配置，并提供快速启动和运行 Spring 应用的方式。

    - Spring Boot 默认配置可以轻松自定义。

    - Spring Boot 为众多 Spring 应用提供启动器依赖。

    - Spring Boot 附带广泛的嵌入式服务器集，因此开发人员无需在开发环境中下载、安装和配置它们。

    - Spring Boot 不生成代码；它只是在应用启动时动态地连接 Bean 和设置，并将它们应用到应用上下文中。

    - 使用 Spring Boot 构建的工件（无论是 JAR 还是 WAR）都是可执行的，并且可以使用`java -jar`执行。


    # 测验


    ## 问题 1：关于`DispatcherServlet`的以下哪个陈述是正确的？


    1.  它用于为 Spring 应用启用 Web 支持。

    2.  拦截所有 HTTP 请求并将其委托给适当的处理器。

    3.  它必须在应用的根上下文中声明为 Bean。

    4.  `DispatcherServlet`无法在没有`web.xml`文件的情况下配置。

    5.  `DispatcherServlet`是 Spring Web 应用的主要 Servlet 类。


    ## 问题 2：MVC 代表什么？


    1.  Model View Controller

    2.  Mapping View Controller

    3.  Module View Control


    ## 问题 3：哪个注解用于将 HTTP 请求映射到处理器方法？


    1.  `@HandlerMapping`

    2.  `@RequestMapping`

    3.  `@Mapping`


    ## 问题 4：考虑以下处理器方法定义：


    ```

    @RequestMapping(value = "/showUser", method = RequestMethod.GET)

    public String show(@RequestParam("userId") Long id, Model model) {

    ...

    }

    ```


    以下哪些请求会映射到它？


    1.  `http://localhost:8080/mvc-basic/showUser?userid=105`

    2.  `http://localhost:8080/mvc-basic/showUser?userId=105`

    3.  `http://localhost:8080/mvc-basic/showUser?id=105`

    4.  `http://localhost:8080/mvc-basic/showUser?userId=2c`


    ## 问题 5：以下列表中哪个类是 Spring 中的默认视图解析器？


    1.  `JspResourceViewResolver`

    2.  `ResourceViewResolver`

    3.  `InternalResourceViewResolver`


    ## 问题 6：什么是认证？


    1.  保护资源的过程

    2.  决定是否允许用户访问资源的过程

    3.  验证主体凭证有效性的过程


    ## 问题 7：什么是授权？


    1.  验证主体凭证有效性的过程

    2.  决定是否允许已认证用户在应用内执行特定操作的过程

    3.  为用户生成凭证的过程


    ## 问题 8：什么是主体？


    1.  存储用户凭证的对象

    2.  表示用户、设备或系统可以在应用内执行操作的术语

    3.  表示受保护资源的术语


    ## 问题 9：关于应用安全可以说明什么？'
