    little different, since a web interface is configured for it. The Eureka

    server uses `FreeMarker` templates

    by default, so if a different implementation is desired, these have to

    be first ignored via configuration, by setting the `spring.application.freemarker.enabled
    to false`. The configuration file for the `web-service` is

    depicted in the following code snippet.


    ```

    spring:

    application:

    name: web-service

    freemarker:

    enabled: false     #Do not use FreeMarker templates

    thymeleaf: #Thymeleaf templates will be used

    cache: false

    prefix: classpath:/web-server/templates/

    error:

    path=/error

    eureka:

    instance:

    leaseRenewalIntervalInSeconds: 5

    client:

    serviceUrl:

    defaultZone: http://localhost:3000/eureka/

    # HTTP Server

    server:

    port: 4002 # HTTP (Tomcat) port

    ```


    The central class of this microservice is the `AllWebController` ,

    which is the one that uses the `AllWebService` that

    requests information from the `pets-service` and the

    `users-service`

    microservices, and wraps it up in objects that can be rendered in a

    Thymeleaf view. The code for the `AllWebController` is

    nothing special, just a typical Spring controller class using a service

    instance to access data.


    ```

    @Controller

    public class AllWebController {

    private static Logger logger = LoggerFactory.getLogger(AllWebController.class);

    @Autowired

    private AllWebService allWebService;

    public AllWebController(AllWebService allWebService) {

    this.allWebService = allWebService;

    }

    @RequestMapping("/all/{ownerId}")

    public String byOwner(Model model,

    @PathVariable("ownerId") Long ownerId) {

    UserSkeleton owner = allWebService.findUserById(ownerId);

    if (owner != null) {

    owner.setPets(allWebService.findByOwnerId(ownerId));

    }

    model.addAttribute("owner", owner);

    return "all";

    }

    @RequestMapping("/pets/{type}")

    public String byOwner(Model model,

    @PathVariable("type") String type) {

    List pets = allWebService.findByType(type);

    model.addAttribute("pets", pets);

    model.addAttribute("type", type);

    return "pets";

    }

    }

    ```


    The implementation for this service is depicted in the following code

    snippet.


    ```

    package com.ps.web;

    import com.ps.ex.UserNotFoundException;

    import org.springframework.cloud.client.loadbalancer.LoadBalanced;

    import org.springframework.stereotype.Service;

    import org.springframework.web.client.HttpClientErrorException;

    import org.springframework.web.client.RestTemplate;

    ...

    @Service

    public class AllWebService {

    private static Logger logger = LoggerFactory.getLogger(AllWebService.class);

    @Autowired

    @LoadBalanced

    private RestTemplate restTemplate;

    private String petsServiceUrl;

    private String usersServiceUrl;

    public AllWebService(String usersServiceUrl, String petsServiceUrl) {

    this.usersServiceUrl = usersServiceUrl;

    this.petsServiceUrl = petsServiceUrl;

    }

    public UserSkeleton findUserById(Long id) {

    logger.info("findUserById(" + id + " ) called");

    User user = null;

    try {

    user = restTemplate.getForObject(usersServiceUrl

    + "/users/id/{id}", User.class, id);

    }catch (HttpClientErrorException e) {

    // no user

    throw new UserNotFoundException(id);

    }

    return new UserSkeleton(user.getId(), user.getUsername());

    }

    public List findByOwnerId(Long ownerId) {

    logger.info("findByOwnerId(" + ownerId + " ) called");

    Pet pets = null;

    try {

    pets = restTemplate.getForObject(petsServiceUrl

    + "/pets/owner/{id}",

    com.ps.pet.Pet.class,  ownerId);

    } catch (HttpClientErrorException e) {

    // no pets

    }

    if(pets == null || pets.length ==0) {

    return null;

    }

    List petsList = new ArrayList();

    for (Pet pet : pets) {

    petsList.add(new PetSkeleton(pet.getName(),

    pet.getAge(), pet.getPetType().toString()));

    }

    return petsList;

    }

    }

    ```


    The previous implementation is a normal Spring service class, annotated

    with the `@Service` stereotype

    annotation. It is a wrapper for a `RestTemplate` instance

    that accesses two beans that are references to the microservices `pets-service`
    and

    `users-service`.

    The classes `UserSkeleton` and

    `PetSkeleton` are

    stripped versions of the entity classes and were introduced to simplify

    the implementation a little, since the focus of the section is on the

    microservices’ implementation and logic. The code for the two classes is

    nothing but the most basic implementation of a POJO and is path of the

    `com.ps.web`

    package from the `17-ps-micro-sample`.


    The only novelty is the `@LoadBalanced`

    annotation, which marks the injected `RestTemplate` bean to

    be configured to use a LoadBalancerClient implementation.


    As you probably recall from the previous chapter, the `RestTemplate` is

    thread-safe, so it can be used to access any number of services in

    different parts of an application. In this example, two microservices

    are accessed by the same `RestTemplate` bean.'
