    split into a few sections, but in a nutshell, a chapter is organized as follows:


    *   Basics

    *   Configuration

    *   Components

    *   Summary

    *   Quick quiz

    *   Practical exercise


    The longer chapters deviate from this structure, introducing small practice exercises
    after key sections, since solving these exercises will help you to check your
    understanding and solidify your knowledge of the presented components.


    Code that is irrelevant to Spring understanding will not always be quoted in this
    book, but it is available to you in the book’s practice project.


    #### Conventions


    !


    This symbol appears in front of paragraphs to which you should pay particular
    attention.


    ** This symbol appears in front of a paragraph that is an observation or an execution
    step that you can skip.


    ? This symbol appears in front of a question for the user.


    . . . This symbol represents missing code that is not relevant for the example.


    CC This symbol appears in front of a paragraph that describes a Convention over
    Configuration practice in Spring, a default behavior that helps the developer
    reduce his or her work.


    [random text here] When you have text surrounded by square brackets, this means
    that the text between the brackets should be replaced by a context-related notion.


    #### Downloading the Code


    This book has code examples and practical exercises associated with it. There
    will be missing pieces of code that you will have to fill in to make applications
    work and test your understanding of Spring Web. I recommend that you go over the
    code samples and do the exercises, since similar pieces of code and configurations
    will appear in the certification exam.


    The following downloads are available:


    *   Source code for the programming examples in the practice section using XML
    configuration

    *   Source code for the programming examples in the practice section using Java
    configuration


    You can download these items from the Source Code area of the Apress website [`http://www.apress.com`](http://www.apress.com/)
    .


    #### Contacting the Author


    More information about Iuliana Cosmina can be found at [`http://ro.linkedin.com/in/iulianacosmina`](http://ro.linkedin.com/in/iulianacosmina)
    . She can be reached at `mailto:iuliana.cosmina@gmail.com`.


    Follow her personal coding activity on [`https://github.com/iuliana`](https://github.com/iuliana)
    .


    ## Recommended Development Environment


    If you decide to attend the official course, you will notice that the development
    environment recommended in this book differs considerably from the one used at
    the course. A different editor was recommended, a different application server,
    and even a different build tool. The reason for this was to improve and expand
    your experience as a developer and to offer a practical development infrastructure.
    Motivation for each choice will be mentioned on the corresponding sections.


    ### Recommended JVM


    ![A978-1-4842-0811-3_1_Figa_HTML.jpg](A978-1-4842-0811-3_1_Figa_HTML.jpg) Java
    8, the official JVM form Oracle. Download the JDK matching your operating system
    from [`http`](http://www.oracle.com/) `:` [`//www.oracle.com`](http://www.oracle.com/)
    and install it.


    !


    It is recommended that you set the `JAVA_HOME` environment variable to point to
    the directory where Java 8 was installed (the directory in which the JDK was unpacked)
    and add `%JAVA_HOME%\bin` for Windows, `$JAVA_HOME/bin` for Unix-based operating
    systems, to the general path of the system. The reason behind this is to ensure
    that other development applications written in Java will use this version of Java
    and prevent strange incompatibility errors during development.


    ! Verify that the version of Java the operating system sees is the one you just
    installed by opening a terminal (`Command Prompt` in `Windows`, and any type of
    terminal you have installed on `MacOs` and `Linux`) and typing:


    ```

    java -version

    ```


    You should see something similar to this:


    ```

    java version "1.8.0_74"

    Java(TM) SE Runtime Environment (build 1.8.0_74-b02)

    Java HotSpot(TM) 64-Bit Server VM (build 25.74-b02, mixed mode)

    ```'
  trans: '

    ### 各章节结构


    你正在阅读的引言章节涵盖了使用本书的每位开发者都应了解的 Spring 基础知识：什么是 Spring、它是如何演进的、有多少官方 Spring 项目、用于构建和运行实践练习的技术、如何注册成为认证
    Spring 专业人士的考试等。本章是个例外，其结构与其他章节不同，旨在为你后续内容做好准备。


    其余章节旨在介绍 Spring 模块及相关技术，帮助你构建特定类型的 Spring 应用程序。每章分为若干小节，但总体结构如下：


    *   基础知识

    *   配置

    *   组件

    *   总结

    *   快速测验

    *   实践练习


    较长的章节会偏离此结构，在关键小节后引入小型实践练习，因为解决这些练习有助于你检查理解程度并巩固对所学组件的知识。


    与 Spring 理解无关的代码不会在本书中全部引用，但你可以在本书的实践项目中获取。


    #### 约定


    !


    此符号出现在需要特别关注的段落前。


    ** 此符号出现在可跳过的观察或执行步骤段落前。


    ? 此符号出现在面向用户的问题前。


    . . . 此符号表示与示例无关的缺失代码。


    CC 此符号出现在描述 Spring 中“约定优于配置”实践的段落前，这是一种帮助开发者减少工作量的默认行为。


    [随机文本] 当文本被方括号包围时，表示括号内的内容应替换为与上下文相关的概念。


    #### 下载代码


    本书附有代码示例和实践练习。其中会有需要你填充的缺失代码片段，以使应用程序正常运行并测试你对 Spring Web 的理解。我建议你仔细阅读代码示例并完成练习，因为类似的代码和配置会出现在认证考试中。


    以下下载内容可供使用：


    *   使用 XML 配置的实践部分编程示例源代码

    *   使用 Java 配置的实践部分编程示例源代码


    你可以从 Apress 网站的源代码区域 [`http://www.apress.com`](http://www.apress.com/) 下载这些内容。


    #### 联系作者


    关于 Iuliana Cosmina 的更多信息，请访问 [`http://ro.linkedin.com/in/iulianacosmina`](http://ro.linkedin.com/in/iulianacosmina)
    。可通过 `mailto:iuliana.cosmina@gmail.com` 联系她。


    关注她的个人编程活动：[`https://github.com/iuliana`](https://github.com/iuliana) 。


    ## 推荐开发环境


    如果你决定参加官方课程，你会注意到本书推荐的开发环境与课程中使用的环境有显著差异。推荐了不同的编辑器、不同的应用服务器，甚至不同的构建工具。这样做的目的是为了提升和扩展你的开发经验，并提供实用的开发基础设施。每个选择背后的动机将在相应章节中提及。


    ### 推荐 JVM


    ![A978-1-4842-0811-3_1_Figa_HTML.jpg](img/A978-1-4842-0811-3_1_Figa_HTML.jpg)
    Java 8，Oracle 官方 JVM。从 [`http`](http://www.oracle.com/) `:` [`//www.oracle.com`](http://www.oracle.com/)
    下载与你操作系统匹配的 JDK 并安装。


    !


    建议你将 `JAVA_HOME` 环境变量设置为指向 Java 8 的安装目录（JDK 解压到的目录），并将 `%JAVA_HOME%\bin`（Windows）或
    `$JAVA_HOME/bin`（基于 Unix 的操作系统）添加到系统全局路径中。这样做是为了确保其他用 Java 编写的开发应用程序使用此 Java 版本，并防止开发过程中出现奇怪的兼容性错误。


    ! 打开终端（Windows 中的 `命令提示符`，MacOs 和 Linux 中已安装的任何类型终端），输入以下命令，验证操作系统识别的 Java 版本是否为你刚刚安装的版本：


    ```

    java -version

    ```


    你应该会看到类似以下内容：


    ```

    java version "1.8.0_74"

    Java(TM) SE Runtime Environment (build 1.8.0_74-b02)

    Java HotSpot(TM) 64-Bit Server VM (build 25.74-b02, mixed mode)

    ```

