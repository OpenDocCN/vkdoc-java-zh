    \n图7-10. `apache-activemq-5.14.1`目录的内容\n\n在`bin`目录中，有一个名为`activemq`（Windows下为`activemq.bat`）的可执行文件，它将在您的计算机上启动ActiveMQ。只需打开终端（或命令提示符）并使用参数`start`运行该可执行文件。\n\
    \n```bash\n$ ./activemq start\n或\n$ activemq.bat start (Windows)\n```\n\nActiveMQ附带一个Web界面，可通过`http://127.0.0.1:8161/admin/`访问。它会要求输入用户名和密码。官方网站建议使用`admin/admin`。在图[7-11](#A978-1-4842-0811-3_7_Chapter.html#Fig11)中，您可以看到Apache\
