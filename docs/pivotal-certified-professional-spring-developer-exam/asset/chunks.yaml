    \n```\n{\n    ID=1,\n    FIRST_NAME=null,\n    USERNAME=John,\n    LAST_NAME=null,\n\
    \    PASSWORD=test,\n    ADDRESS=null,\n    EMAIL=john@pet.com\n}\n```\n\n`queryForList`与前面的方法功能相同，但适用于包含多行的`ResultSet`实例。此方法返回一个`List<Map<String,\
