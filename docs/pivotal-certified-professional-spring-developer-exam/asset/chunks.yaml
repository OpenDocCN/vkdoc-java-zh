    \ be configured using Java Configuration. And if you feel confident\nenough, you\
    \ are invited as a bonus exercise to do the implementation\nyourself. The source\
    \ code used in this section can be found in the Pet\nSitter project in modules\
    \ `12-ps-remoting-sample`\nand `12-ps-remoting-practice`.\nThe `12-ps-remoting-practice`\n\
