    Spring JMX


    JMX 是 Java 管理扩展（Java Management Extensions）的缩写，这项技术提供了用于构建分布式、基于 Web、模块化和动态解决方案的工具，用于管理和监控设备、应用程序以及服务驱动的网络。²⁴
    JMX 技术也可用于监控和管理 Java 虚拟机（Java VM）。JMX 规范定义了 Java 编程语言中用于管理和监控应用程序及网络的架构、设计模式、API
    和服务。JMX 允许在运行时更改配置属性，可以在运行时报告缓存命中/未命中比率，甚至可以调用或模拟客户端调用。

