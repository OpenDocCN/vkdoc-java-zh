    \ 类中的静态 `run 方法`，该方法将引导应用程序并启动 Spring IoC 容器，该容器将启动配置好的嵌入式 Web 服务器。因此，如果你在 Intellij\
    \ IDEA 中运行此类，或者编译并构建应用程序并执行 jar，结果将是相同的：一个 Spring 应用程序将启动，并带有许多已使用默认、最常见的配置配置好的基础设施\
    \ Bean。现在我们有了一个 Spring 应用程序上下文，让我们用它做点什么，比如检查所有 Bean。最简单的方法是添加一个控制器类来显示所有这些 Bean。但是声明控制器意味着视图也必须被解析，所以最简单的方法是使用\
