    \ elements. Just add it to the bean configuration file and your configuration\
    \ can be simplified like this:\n\nWhat you should remember when using the c-namespace\
    \ is that when the dependency is another bean, the `\"-ref\"` postfix is added\
    \ to the `c:` prefixed attributes.\n\n> **Note:** If you are using the name of\
    \ the constructor parameter to inject the dependency, then the attribute definition\
    \ with `c:` should match the pattern `c:nameConstructorParameter[-ref]`, while\
