    \n使用 RestTemplate 测试 RESTful 应用\n\n任何支持创建应用所支持请求类型的客户端（浏览器、移动应用、桌面应用等）都可以访问 RESTful\
    \ 应用。¹⁸ `RestTemplate`¹⁹ 是 Spring 用于同步客户端 HTTP 访问的核心类。该类为每种 HTTP 方法提供了广泛的方法集，可用于访问\
    \ RESTful 服务。HTTP 方法与可用于访问 REST 服务的 RestTemplate 方法之间的对应关系如图 7-22 所示。\n\n![A978-1-4842-0811-3_7_Fig22_HTML.jpg](img/A978-1-4842-0811-3_7_Fig22_HTML.jpg)\n\
    \n图 7-22. RestTemplate API 与 HTTP 方法的对应关系\n\n如您所见，只要将 HTTP 方法作为参数传入，`execute`\
    \ 和 `exchange` 方法即可用于任何类型的 REST 调用。所有方法都是多态的，²⁰ 使用哪种方法取决于具体需求和开发者的偏好。URI 实例被返回以标识资源，并且\
    \ RestTemplate 方法支持 URI 模板。因此，以下两个调用是相同的：\n\n```\n// 使用 URI 模板\nString url = \"\
    http://localhost:8080/users/{$username}\";\nUser user = restTemplate.getForObject(url,\
    \ User.class, \"johncusack\");\n// 使用 URI\nString url = \"http://localhost:8080/users/johncusack\"\
    ;\nUser user = restTemplate.getForObject(url, User.class);\n```\n\n!\n\n提醒一下，路径变量\
    \ `$username` 是有效的，并且能按预期工作：`$` 字符允许作为路径变量名的一部分。选择这种特殊的路径变量命名方式，是为了让开发者（您）清楚地意识到\
    \ URL 的这一部分是一个变量，在发起 REST 请求时必须替换为实际值。\n\n选择 `username` 作为标识用户的键，是因为它在数据库中是唯一的，即使数据库被清空并重新加载，用户名也不会改变。出于安全原因，不应暴露数据库\
    \ ID，并且在应用运行期间，如果数据库被清空并重新加载，ID 也可能会发生变化。\n\n`execute` 方法还可以接收一个 `org.springframework.web.client.RequestCallback`\
    \ 实现作为参数，该实现将告诉 `RestTemplate` 在将请求发送到服务器之前如何处理该请求。考虑到这一点，对于 `username=johncusack`\
    \ 的 User 实例的 GET 请求，可以使用 exchange 方法编写如下：\n\n```\nString url =\"http://localhost:8080/users/{$username}\"\
    ;\nPerson person = restTemplate.execute(url, HttpMethod.GET,\n        new RequestCallback()\
    \ {\n            @Override\n            public void doWithRequest(ClientHttpRequest\
    \ request)\n                    throws IOException {\n                HttpHeaders\
    \ headers = request.getHeaders();\n                headers.add(\"Accept\", MediaType.APPLICATION_JSON_UTF8_VALUE);\n\
    \                System.out.println(\"Request headers = \" + headers);\n     \
    \       }\n        }, new HttpMessageConverterExtractor<User>(User.class,\n  \
    \              restTemplate.getMessageConverters())\n        , new HashMap<String,\
    \ String>() {{\n            put(\"username\", \"johncusack\");\n        }});\n\
    ```\n\n传递给 `getForObject()`、`postForLocation()` 和 `put()` 方法以及从这些方法返回的对象，由 HttpMessageConverter\
    \ 转换为 HTTP 请求和 HTTP 响应。\n\n`exchange` 方法使用 `HttpEntity` 对象来封装请求头并将其作为参数。该方法返回一个包含\
    \ REST 请求结果的 `ResponseEntity` 对象，其主体会自动使用已注册的 `HttpMessageConverter` 实现进行转换。\n\
    \n```\nimport org.springframework.http.ResponseEntity;\n...\npublic class RestUserControllerTest\
    \ {\n    public void editUser() {\n        String url = \"http://localhost:8080/users/{$username}\"\
    ;\n        User user = new User();\n        user.setEmail(\"MissJones@pet.com\"\
    );\n        user.setUsername(\"jessicajones\");\n        // 设置其他属性\n        ..\n\
    \        final HttpHeaders headers = new HttpHeaders();\n        headers.setContentType(MediaType.APPLICATION_JSON_UTF8);\n\
    \        final HttpEntity<User> userRequest = new HttpEntity<User>(user, headers);\n\
    \        ResponseEntity<User> responseEntity = restTemplate.\n               \
    \ exchange(url, HttpMethod.PUT, userRequest, User.class,\n                   \
    \     \"jessicajones\");\n        User editedUser = responseEntity.getBody();\n\
    \        assertNotNull(editedUser);\n        assertEquals(\"MissJones@pet.com\"\
    , editedUser.getEmail());\n    }\n}\n```\n"
- fmt: "Message converters are automatically detected and used by Spring in applications\
    \ configured with `<mvc:annotation-driven/>` or `@EnableWebMvc`. In the code sample\
    \ for this chapter, the representations are in JSON format, so `MappingJackson2HttpMessageConverter`\
    \ is used. And because the message is supported by default, the `HttpMessageConverterExtractor<T>`\
    \ is not necessary in the previous example. Also, if no `Accept` header is specified,\
    \ all those supported by Spring will be considered, so in this case, `RequestCallback`\
    \ becomes unnecessary too, and we can stick to the simpler `restTemplate.getForObject`\
    \ method mentioned in the previous code snippet, because even in production applications,\
    \ you will rarely need anything else.\n\nThe application contained in the `15-ps-ws-rest-practice`\
    \ is a Spring Web RESTful application that can be used to test your understanding\
    \ of Spring support components for REST applications. The `RestUserController`\
    \ class provides controller methods that resolve REST requests. The client is\
    \ represented by the `RestUserControllerTest` class. This test class has a `RestTemplate`\
    \ injected in it that can be used to test all REST operations with users exposed\
    \ by the `RestUserController` controller. The web application has no context,\
    \ and the REST Services exposed by the controller are available using URIs like\
    \ `http://localhost:8080/users/*`. The `RestUserControllerTest` class contains\
    \ methods to test REST requests using the four main HTTP methods:\n\n*   **GET**:\
    \ method used to retrieve a representation of a resource; might have length restrictions\
    \ depending on server settings and client used.[^(21)](#A978-1-4842-0811-3_7_Chapter.html#Fn21)\
    \ When resource is not found, a 404 (Not found) status code is returned, 200 (OK)\
    \ otherwise. In Figure [7-23](#A978-1-4842-0811-3_7_Chapter.html#Fig23), the GET\
    \ request and response contents are depicted.\n\n    ![A978-1-4842-0811-3_7_Fig23_HTML.jpg](A978-1-4842-0811-3_7_Fig23_HTML.jpg)\n\
    \n    Figure 7-23. GET request and response example\n\n    A REST GET request\
    \ can be sent with a `RestTemplate` instance: all that is needed is the REST URI\
    \ and a username to identify the resource. The path variable was named `$username`,\
    \ prefixed with `$` to make the parametrized piece of the URI really obvious.\
    \ The following code snippet depicts the test method performing a GET request\
