    我们已到本节末尾，现在需要介绍 Bean 在被使用后、不再需要且应用关闭时（或仅管理它们的上下文关闭时）会发生什么。当上下文关闭时，它会销毁所有 Bean，这是显而易见的。但有些
    Bean 使用的资源，如果在销毁前未收到通知，可能会拒绝释放它们。在 Spring 中，可以通过三种方式实现：


    *   使用 `<bean />` 元素的 `destroy-method` 属性设置一个在销毁前调用的方法。

    *   修改 Bean 以实现 `org.springframework.beans.factory.DisposableBean` 接口，并为 `destroy()`
    方法提供实现（不推荐，因为这会将应用代码与 Spring 基础设施耦合）。

    *   使用 `@PreDestroy` 注解方法，这也是 JSR 250 的一部分，并且是 Spring 最早支持的注解之一。

    *   Java 配置中 `@Bean(destroyMethod="...")` 相当于 `destroy-method`。


