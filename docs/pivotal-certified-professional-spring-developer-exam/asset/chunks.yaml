    Spring 2.5 引入了对一小部分注解的注解支持。从那时起，Spring 不断发展，目前使用 Spring 4.0，应用程序可以仅使用注解（原型注解和完整的
    Java 配置集）进行配置。`@PostConstruct` 注解是 JSR 250¹³ 的一部分，用于需要在依赖注入完成后执行以进行初始化的方法上。被注解的方法必须在
    Bean 被使用之前调用，并且，就像任何其他选择的初始化方法一样，在 Bean 的生命周期中只能被调用一次。如果没有要注入的依赖项，则被注解的方法将在 Bean
    实例化后被调用。只有一个方法应该使用 `@PostConstruct` 进行注解。


    使用 `@PostConstruct` 注解的方法由实现 `org.springframework.beans.factory.config.BeanPostProcessor`
    接口类型的预初始化 Bean 捕获并调用。实现此接口的类实际上是工厂钩子，允许对 Bean 实例进行修改。应用程序上下文会自动检测这些类型的 Bean，并在容器中的任何其他
    Bean 之前实例化它们，因为在它们实例化之后，它们被用于操作由 IoC 容器管理的其他 Bean。


    `BeanPostProcessor` 声明了两个需要实现的方法：`postProcessBeforeInitialization` 和 `postProcessAfterInitialization`，它们的名称清晰地表明了它们的用途。在图
    2-17 中，有两个粉红色矩形描绘了 Bean 后处理器何时在 Bean 上调用方法。通常，通过标记接口（它们拾取使用 `@PostConstruct` 注解的方法）填充
    Bean 的后处理器将实现 `postProcessBeforeInitialization`，而使用代理包装 Bean 的后处理器通常会实现 `postProcessAfterInitialization`。


    对于 `@PostConstruct`，被注解的方法会被拾取并执行。配置中必须存在一个此类型的 Bean。注册 `@PostConstruct`（以及 JSR
    250 中的其他注解，稍后您将看到）的 Bean 是 `org.springframework.context.annotation.CommonAnnotationBeanPostProcessor`。由于这是一个
    Spring 基础设施 Bean，它可以像这样添加到配置文件中：


    这可能会起作用，但像这样配置 Bean 会覆盖 Spring 默认值，这可能会导致意外行为，从而产生一些问题。幸运的是，此 Bean 配置是包含在以下行中的配置之一，这是一个基于
    `context` 命名空间的 Spring 快捷方式：


    `<context:annotation-config />` 启用了对项目中所有类的注解扫描，因此在大型应用程序中使用它可能会使其变慢。解决方案是使用 `<context:component-scan
    />`，因为 `base-package` 属性将减少需要扫描的类数量。此外，好处是您还可以通过逗号分隔来设置多个基础包。最棒的是，包中的类还可以按名称、按它们所注解的内容或其他条件进行过滤。


    当 XML 文件中存在 `<context:component-scan />` 语句时，所有支持的注解都会在类路径中被检测到，或者在第二种情况下，仅在为
    `base-package` 属性指定值的包中被检测到。


    `<context:annotation-config/>` 激活了对 `@PostConstruct`、`@PreDestroy`、`@Resource`、`@Autowired`
    和 `@Required` 以及其他 JPA 和 EJB 3 注解的检测。


    `<context:component-scan/>` 激活了对前面提到的所有注解以及 Spring 原型注解的检测：@Component 及其扩展（例如，`@Service`、`@Repository`）。


