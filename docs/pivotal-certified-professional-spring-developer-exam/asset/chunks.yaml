    在注册时，每个微服务都会从服务器获取一个唯一的注册标识符。如果另一个进程使用相同的 ID 进行注册，服务器会将其视为重启，因此第一个进程会被丢弃。为了运行同一进程的多个实例——出于负载均衡和弹性的考虑，并且毕竟这是一个分布式应用，理应能够做到这一点——我们必须确保服务器生成不同的注册
    ID。实现这一目标最简单的方法是提供为微服务指定不同端口的选项。到目前为止使用的配置中的注册 ID，即`<instanceId>`元素中的那个，是默认的命名模板，其形式如下：


    ```

    ${ipAddress}:${spring.application.name:${server.port}}

    ```


    注册 ID 可以通过 Eureka 属性配置进行设置：


    ```

    eureka:

    instance:

    metadataMap:

    instanceId:

    ${spring.application.name}:${spring.application.instance_id:${server.port}}

    ```


    如果未定义`spring.application.instance_id`，它将回退到前面提到的默认格式。`spring.application.instance_id`仅在使用
    Cloud Foundry 时才会被设置³，并且它为同一应用的每个实例方便地提供了一个唯一的 ID 编号。


    对于在本地运行微服务应用，使用可参数化端口的方法更为实用。这可以通过在启动应用前设置`server.port`属性轻松实现。


    ```

    // 在 Application.main(...) 方法中

    ...

    case "pet":

    if (args.length == 2) {

    System.setProperty("server.port", args1);

    }

    PetServer.main(args);

    break;

    ...

    ```


    因此，现在我们可以通过执行以下代码来启动任意数量的`pets-service`实例：


    ```

    java -jar build/libs/ps-micro-1.1.0.RELEASE.jar pet PORT

    ```


    在图 8-8 中，你可以看到启动并注册了两个`pets-service`实例，默认实例在端口 4000 上，第二个实例在端口 4003 上。


    ![A978-1-4842-0811-3_8_Fig8_HTML.jpg](img/A978-1-4842-0811-3_8_Fig8_HTML.jpg)


    图 8-8.


    两个不同的 PETS-SERVICE 微服务在 Eureka 服务器上注册


    微服务通信


    前面已经提到，微服务进程使用诸如 REST 之类的无关协议进行通信。`users-service`和`pets-service`都通过 HTTP 暴露 RESTful
    接口（尽管也可以设置不同的协议：例如 JMS 或 AMQP），并且在给出的示例中，引入了另一个名为`web-service`的服务，它使用这些接口来访问它们的数据。为了使用
    RESTful 服务，Spring 提供了`RestTemplate`类，该类可用于向 RESTful 服务器发送 HTTP 请求，并以多种格式（如 XML
    和 JSON）获取数据。为了简化应用，我们将使用数据的默认格式，即 XML。`web-service`微服务客户端使用`RestTemplate`来连接其他两个已注册的微服务并请求数据，同时保持对其位置和确切
    URL 的无关性，因为 Spring 会自动为其配置位置。


    `web-services`的实现略有不同，因为它配置了一个 Web 界面。Eureka 服务器默认使用`FreeMarker`模板，因此如果需要不同的实现，必须首先通过配置忽略这些模板，即将`spring.application.freemarker.enabled`设置为`false`。`web-service`的配置文件如下代码片段所示。


    ```

    spring:

    application:

    name: web-service

    freemarker:

    enabled: false     #不使用 FreeMarker 模板

    thymeleaf: #将使用 Thymeleaf 模板

    cache: false

    prefix: classpath:/web-server/templates/

    error:

    path=/error

    eureka:

    instance:

    leaseRenewalIntervalInSeconds: 5

    client:

    serviceUrl:

    defaultZone: http://localhost:3000/eureka/

    # HTTP 服务器

    server:

    port: 4002 # HTTP (Tomcat) 端口

    ```


    该微服务的核心类是`AllWebController`，它使用`AllWebService`从`pets-service`和`users-service`微服务请求信息，并将其封装到可在
    Thymeleaf 视图中渲染的对象中。`AllWebController`的代码并无特别之处，只是一个典型的 Spring 控制器类，使用服务实例来访问数据。


    ```

    @Controller

    public class AllWebController {

    private static Logger logger = LoggerFactory.getLogger(AllWebController.class);

    @Autowired

    private AllWebService allWebService;

    public AllWebController(AllWebService allWebService) {

    this.allWebService = allWebService;

    }

    @RequestMapping("/all/{ownerId}")

    public String byOwner(Model model,

    @PathVariable("ownerId") Long ownerId) {

    UserSkeleton owner = allWebService.findUserById(ownerId);

    if (owner != null) {

    owner.setPets(allWebService.findByOwnerId(ownerId));

    }

    model.addAttribute("owner", owner);

    return "all";

    }

    @RequestMapping("/pets/{type}")

    public String byOwner(Model model,

    @PathVariable("type") String type) {

    List pets = allWebService.findByType(type);

    model.addAttribute("pets", pets);

    model.addAttribute("type", type);

    return "pets";

    }

    }

    ```


    该服务的实现如下代码片段所示。


    ```

    package com.ps.web;

    import com.ps.ex.UserNotFoundException;

    import org.springframework.cloud.client.loadbalancer.LoadBalanced;

    import org.springframework.stereotype.Service;

    import org.springframework.web.client.HttpClientErrorException;

    import org.springframework.web.client.RestTemplate;

    ...

    @Service

    public class AllWebService {

    private static Logger logger = LoggerFactory.getLogger(AllWebService.class);

    @Autowired

    @LoadBalanced

    private RestTemplate restTemplate;

    private String petsServiceUrl;

    private String usersServiceUrl;

    public AllWebService(String usersServiceUrl, String petsServiceUrl) {

    this.usersServiceUrl = usersServiceUrl;

    this.petsServiceUrl = petsServiceUrl;

    }

    public UserSkeleton findUserById(Long id) {

    logger.info("findUserById(" + id + " ) called");

    User user = null;

    try {

    user = restTemplate.getForObject(usersServiceUrl

    + "/users/id/{id}", User.class, id);

    }catch (HttpClientErrorException e) {

    // 没有用户

    throw new UserNotFoundException(id);

    }

    return new UserSkeleton(user.getId(), user.getUsername());

    }

    public List findByOwnerId(Long ownerId) {

    logger.info("findByOwnerId(" + ownerId + " ) called");

    Pet pets = null;

    try {

    pets = restTemplate.getForObject(petsServiceUrl

    + "/pets/owner/{id}",

    com.ps.pet.Pet.class,  ownerId);

    } catch (HttpClientErrorException e) {

    // 没有宠物

    }

    if(pets == null || pets.length ==0) {

    return null;

    }

    List petsList = new ArrayList();

    for (Pet pet : pets) {

    petsList.add(new PetSkeleton(pet.getName(),

    pet.getAge(), pet.getPetType().toString()));

    }

    return petsList;

    }

    }

    ```


    前面的实现是一个普通的 Spring 服务类，使用了`@Service`构造型注解进行标注。它是一个`RestTemplate`实例的包装器，该实例访问两个
    bean，这两个 bean 是对微服务`pets-service`和`users-service`的引用。`UserSkeleton`和`PetSkeleton`类是实体类的精简版本，引入它们是为了稍微简化实现，因为本节的重点是微服务的实现和逻辑。这两个类的代码只是最基本的
    POJO 实现，位于`17-ps-micro-sample`的`com.ps.web`包中。


    唯一的新颖之处是`@LoadBalanced`注解，它标记注入的`RestTemplate` bean，使其配置为使用`LoadBalancerClient`实现。


    你可能还记得上一章的内容，`RestTemplate`是线程安全的，因此它可以用于访问应用中不同部分的任意数量的服务。在此示例中，同一个`RestTemplate`
    bean 访问了两个微服务。

    '
- fmt: '`petsServiceUrl`和`usersServiceUrl`应在注入到`AllWebService`Bean之前被解析。为此，必须禁用主Spring
    Boot类上的自动扫描，并显式声明Bean。


    ```java

    @SpringBootApplication

    @EnableDiscoveryClient

    @ComponentScan(useDefaultFilters = false) // Disable component scanner,

    // needed because of the microservices we need access to

    public class WebServer {

    private static Logger logger = LoggerFactory.getLogger(WebServer.class);

    public static final String USERS_SERVICE_URL = "http://USERS-SERVICE";

    public static final String PETS_SERVICE_URL = "http://PETS-SERVICE";

    public static void main(String args) throws IOException {

    // Tell server to look for web-server.properties or web-server.yml

    System.setProperty("spring.config.name", "web-server");

    ConfigurableApplicationContext ctx =

    SpringApplication.run(WebServer.class, args);

    assert (ctx != null);

    logger.info("Started ...");

    System.in.read();

    ctx.close();

    }

    @Bean

    RestTemplate restTemplate() {

    return new RestTemplate();

    }

    @Bean

    public AllWebService allWebService() {

    return new AllWebService(USERS_SERVICE_URL, PETS_SERVICE_URL);

    }

    @Bean AllWebController allController() {

    return new AllWebController(allWebService());

    }

    @Bean

    public HomeController homeController() {

    return new HomeController();

    }

    }

    ```


    启动此应用程序时，服务URL由主程序提供给`AllWebService`。


    如果你对为什么到处使用URL这个术语感到困惑（尽管我们正在使用REST），以下是解释。两个微服务URL`http://USERS-SERVICE`和`http://PETS-SERVICE`被解析为`http://localhost:4001`和`http://localhost:4000`，因此它们实际上是URL（位置）。当与`/users/id/{id}`和`/pets/owner/{id}`拼接时，它们成为URI（资源）。


    这两个微服务由其应用程序名称标识，这些名称是在其配置文件中设置的，并用于向发现服务器注册。大小写并不重要，但它可以清楚地表明`PETS-NAME`是一个将通过发现获得的逻辑主机，而不是实际的主机名。此外，之前描述微服务详细信息时，您可以看到`<app>`元素中的应用程序名称也以大写形式显示。因此，这可以很清楚地表明哪个服务应被发现并进一步使用。在此示例中，逻辑主机名是硬编码的，但在生产应用程序中，它们通常是在外部配置的。


    由于我们使用的是Netflix软件，`RestTemplate`Bean将被Spring Cloud拦截并自动配置，以使用自定义的`HttpRequestClient`，该客户端利用Netflix
    Ribbon[⁴](#A978-1-4842-0811-3_8_Chapter.html#Fn4)执行微服务查找。


    `RibbonLoadBalancerClient`实现负责获取逻辑服务名称（如向发现服务器注册的）并将其转换为所选微服务的实际主机名。执行此操作的方法称为`reconstructURI`，代码如下所示。


    ```java

    package org.springframework.cloud.netflix.ribbon;

    import org.springframework.cloud.client.ServiceInstance;

    import org.springframework.cloud.client.loadbalancer.LoadBalancerClient;

    import org.springframework.cloud.client.loadbalancer.LoadBalancerRequest;

    ...

    public class RibbonLoadBalancerClient implements LoadBalancerClient {

    public URI reconstructURI(ServiceInstance instance, URI original) {

    Assert.notNull(instance, "instance can not be null");

    String serviceId = instance.getServiceId();

    RibbonLoadBalancerContext context = this.clientFactory

    .getLoadBalancerContext(serviceId);

    Server server = new Server(instance.getHost(), instance.getPort());

    IClientConfig clientConfig = clientFactory.getClientConfig(serviceId);

    ServerIntrospector serverIntrospector = serverIntrospector(serviceId);

    URI uri = RibbonUtils.updateToHttpsIfNeeded(original, clientConfig,

    serverIntrospector, server);

    return context.reconstructURIWithServer(server, uri);

    }

    @Override

    public ServiceInstance choose(String serviceId) {

    Server server = getServer(serviceId);

    if (server == null) {

    return null;

    }

    return new RibbonServer(serviceId, server, isSecure(server, serviceId),

    serverIntrospector(serviceId).getMetadata(server));

    }

    ...

    }

    ```


    Ribbon可用于从同一服务的多个实例中选择合适的实例，即响应最快的实例，这通常通过首先调用上述代码片段中的`choose(...)`方法在`ClientHttpRequestFactory`中完成。


    ## 更多新特性


    编写基于微服务的分布式应用程序需要深入了解Spring Boot和Spring Cloud。`17-ps-micro-sample`项目因其特殊设置和使用的所有新软件而与`pet-sitter`项目分离。Gradle设置不同，并且引入了许多新注解，在您被要求解决此项目的TODO任务之前，应对这些注解进行解释。具体如下：


    *   两个微服务的数据库是独立的，即使使用了JPA，也无法在`P_USER`和`P_PET`之间以经典方式使用`@OneToMany`和`@ManyToOne`注解建立一对多关系。因此，宠物属于某个用户这一事实是通过包含所有者ID的`long`字段实现的。`AllWebService`实现从用户ID开始，并通过向`users-service`微服务请求该信息来检查其在用户数据库中的存在性。如果找到该用户，则将该用户ID用作`pets-service`微服务的搜索条件。


    *   `@EntityScan`配置了自动配置在扫描实体类时使用的基础包。这是一个Spring Boot注解，它在“幕后”配置了一个`LocalContainerEntityManagerFactoryBean`，并将`packagesToScan`属性设置为注解默认属性的值。


    *   用于构建应用程序的库的版本被外部化到`gradle.properties`文件中。这是Gradle配置可以完成的另一种方式。


    *   Thymeleaf被用于Web界面，因为它受Eureka支持，并且只需很少的配置即可使其工作。


    在所有应用程序实例就位后，您可以开始使用它们。尝试访问：


    *   `http://localhost:4000/pets/`：以XML格式显示所有宠物信息

    *   `http://localhost:4000/pets/1122664455`：以XML格式显示RFID=1122664455的宠物信息

    *   `http://localhost:4000/pets/owner/1`：以XML格式显示所有者id=1的所有宠物

    *   `http://localhost:4001/users/`：以XML格式显示所有用户信息'
