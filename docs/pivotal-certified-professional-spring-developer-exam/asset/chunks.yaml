    本书通过 Springer Science+Business Media New York 向全球图书贸易发行，地址：233 Spring Street,
    6th Floor, New York, NY 10013。电话：1-800-SPRINGER，传真：(201) 348-4505，电子邮件：orders-ny@springer-sbm.com，或访问
    www.springeronline.com。Apress Media, LLC 是加利福尼亚州的有限责任公司，其唯一成员（所有者）是 Springer Science
    + Business Media Finance Inc (SSBM Finance Inc)。SSBM Finance Inc 是一家特拉华州公司。献给所有充满热情的
    Java 开发者，永不停歇学习，永不停止提升技能。献给我所有的朋友，感谢你们支持我完成这本书；你们不知道你们对我有多重要。引言


    自从我编写第一个 Spring 项目以来，已经过去了四年多。从那时起，Spring 框架已经发展成为一项成熟的技术，提供了构建复杂且可靠的 Java 企业应用程序所需的一切。


    到目前为止，Spring 已经发布了四个主要版本，第五个版本也即将到来。除了通过认证考试所需的官方学习指南之外，在本书构思之前，还没有像这样的额外资源。


    本学习指南全面概述了从零开始创建 Spring 核心应用程序所涉及的所有技术。它循序渐进地引导你进入 Spring 世界，涵盖了 Spring 3 和 Spring
    4。本书也涵盖了诸如 RMI 和 JMS 等更高级的主题，因为仍有公司倾向于使用它们，开发者在实际工作中也可能会遇到。


    本书附带一个名为 Pet Sitter 的多模块项目，涵盖了书中介绍的每一个示例。在本书编写过程中，Spring 发布了新版本，Intellij IDEA
    发布了新版本，Gradle 也发布了新版本。我升级到了新版本，以便提供最新的信息，并使本书与官方文档保持同步。一个审阅团队已经审阅了本书，但如果您发现任何不一致之处，请发送电子邮件至
    `editorial` `@apress.com`，我们将进行更正。


    本书的示例源代码可以通过图书产品页面上的“下载源代码”按钮在 GitHub 上找到，该页面位于 [`www.apress.com/9781484208120`](http://www.apress.com/9781484208120)。该代码将得到维护，与新技术版本保持同步，并根据使用它学习
    Spring 的开发者的建议进行丰富。


    Pet Sitter 项目的代码也将同样在公共 GitHub 仓库中提供。


    附录中提供了每章末尾问题的答案，以及与可用于开发和运行本书代码示例的开发工具相关的额外细节，这些也将作为托管在 GitHub 上的源代码包的一部分提供。一份模拟实践考试也将发布在
    Pet Sitter 仓库中。


    我真心希望您能像我享受编写本书一样，享受使用本书学习 Spring 的过程。


    作者在本书中引用的任何源代码或其他补充材料，读者均可通过图书产品页面获取，该页面位于 [`www.apress.com/9781484208120`](http://www.apress.com/9781484208120)。如需更详细信息，请访问
    [`http://www.apress.com/source-code`](http://www.apress.com/source-code)。致谢


    编写这本指南需要大量的团队合作。这是我第二次撰写技术书籍，如果没有马克·鲍尔斯和曼努埃尔·乔丹·埃莱拉给予我的所有帮助和建议，我是不可能完成的。马克一直非常支持我，与我分享他撰写书籍的经验，并在我因认为自己的工作不够好而准备放弃时鼓励我。当我因写作瓶颈或个人问题而错过截止日期时，他也非常理解和宽容。


    曼努埃尔是一位出色的合作者；我喜欢我们之间关于技术思想的交流，对此我深表感激，因为与他们合作帮助我在专业上得到了成长。非常感谢帮助我将我的技术术语转化为通俗易懂文字的团队。


    最重要的是，我要感谢史蒂夫·安格林信任我完成这本书。


    Apress 出版了许多我在学习期间及之后阅读并用于提升专业水平的书籍。能够为 Apress 撰写并出版一本书，对我来说是莫大的荣幸，能够为下一代开发者的教育做出贡献，也让我感到无比满足。'
- fmt: 'I am grateful to all my friends who had the patience to listen to me complain
    about sleep loss, having too much work to do, and writer’s block. Thank you all
    for being supportive and making sure I still had some fun while writing this book.


    And I would also like to add a very special thank you to Marian Lopatnic, Cristina
    Lutai, and Andreea Jugarean. These three special persons ensured that my determination
    to finish this book never flagged, by continually reminding me that I am a badass
    in my profession, and as long as I do my best, the outcome will be great.'
  raw: 'I am grateful to all my friends who had the patience to listen to me complain
    about sleep loss, having too much work to do, and writer’s block. Thank you all
    for being supportive and making sure I still had some fun while writing this book.


    And I would also like to add a very special thank you to Marian Lopatnic, Cristina
    Lutai, and Andreea Jugarean. These three special persons ensured that my determination
    to finish this book never flagged, by continually reminding me that I am a badass
    in my profession, and as long as I do my best, the outcome will be great.'
  trans: '

    我感谢所有耐心倾听我抱怨失眠、工作繁重和写作瓶颈的朋友们。感谢你们一直以来的支持，并确保我在撰写本书期间仍能享受一些乐趣。


    此外，我还要特别感谢玛丽安·洛帕特尼克、克里斯蒂娜·卢泰和安德烈娅·朱格雷安。这三位特别的人不断提醒我，我在自己的专业领域是个厉害角色，只要我全力以赴，结果一定会很棒，从而确保我完成本书的决心从未动摇。

    '
