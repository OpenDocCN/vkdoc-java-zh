    到目前为止，只介绍了返回某种结果的`JdbcTemplate`方法。现在正适合介绍一个不返回结果的执行示例。`JdbcTemplate`类中执行查询但不返回结果的最重要方法名为`query`。该方法是多态的，⁴其方法签名根据查询结果的目的而有所不同。


    Spring 提供了`org.springframework.jdbc.core.``RowCallbackHandler`接口，可以实现该接口将查询返回的行流式输出到文件、将其转换为
    XML，或在将其添加到集合之前进行过滤。该类型的实例与查询参数（如有必要）一起提供给`query`方法，`JdbcTemplate`将相应地使用它。在下面的代码片段中，展示了该接口的代码。


    ```

    public interface RowCallbackHandler {

    void processRow(ResultSet rs) throws SQLException;

    }

    ```


    `JdbcTemplate`使用该方法的实现来处理`ResultSet`行，具体实现由开发者完成。异常由`JdbcTemplate`实例捕获和处理。在下面的代码片段中，`JdbcTemplate`实例使用`HTMLUserRowCallbackHandler`从`p_user`表中提取所有名为“John”的用户，将结果行写入
    HTML，并打印到控制台。


