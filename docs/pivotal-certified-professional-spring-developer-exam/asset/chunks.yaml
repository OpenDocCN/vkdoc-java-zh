    \  }\n    ```\n\nDML stands for Data Manipulation Language, and the database operations\
    \ presented so far are part of it, the commands `SELECT`, `INSERT`, `UPDATE`,\
    \ and `DELETE` are database statements used to create, update, or delete data\
    \ from existing tables.\n\nDDL stands for Data Definition Language, and database\
    \ operations that are part of it are used to manipulate database objects: tables,\
    \ views, cursors, etc. DDL database statements can be executed with `JdbcTemplate`\
    \ using the `execute()` method. The following code snippet depicts how to create\
    \ a table using a `JdbcTemplate` instance. After creation, a query to count the\
