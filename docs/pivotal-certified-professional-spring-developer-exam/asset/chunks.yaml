    \n![A978-1-4842-0811-3_2_Fig22_HTML.jpg](A978-1-4842-0811-3_2_Fig22_HTML.jpg)\n\
    \n图2-22. 以调试模式运行测试以测试构造器注入\n\n当使用构造器注入时，如果Spring发现多个候选Bean用于自动装配，解决方案仍然是使用`@Qualifier`，但此时该注解需要用在参数上，因为构造器可以有多个参数，Spring必须明确知道每个Bean注入的位置。构造器的定义将修改如下：\n\
    \n```java\n@Autowired\npublic JdbcRequestRepo(@Qualifier(\"oracleDataSource\"\
    ) DataSource dataSource) {\n    super(dataSource);\n}\n// 定义两个数据源Bean的配置类\n@Configuration\n\
    public class DataSourceConfig {\n    @Bean(name = \"h2DataSource\")\n    public\
    \ DataSource dataSource() throws SQLException {\n        DriverManagerDataSource\
    \ ds = new DriverManagerDataSource();\n        // 填充属性\n        return ds;\n \
    \   }\n\n    @Bean(name = \"oracleDataSource\")\n    public DataSource dataSource()\
    \ throws SQLException {\n        OracleDataSource ds = new OracleDataSource();\n\
    \        // 填充属性\n        return ds;\n    }\n}\n```\n\n在构造器上使用`@Autowired`时，对多个构造器同时标注该注解是没有意义的，Spring会因此报错，因为它无法确定使用哪个构造器来实例化Bean。\n\
    \n之前介绍的关于`@Autowired`和`@Qualifier`的功能及其控制Bean自动装配的方法，同样适用于Setter注入。因此，除了代码片段之外，关于通过自动装配进行Setter注入没有更多需要说明的内容。\n\
    \n```java\npublic class JdbcUserRepo extends JdbcAbstractRepo implements UserRepo\
    \ {\n    protected DataSource dataSource;\n\n    @Autowired\n    public void setDataSource(DataSource\
    \ dataSource) {\n        this.dataSource = dataSource;\n    }\n\n    // 或按名称注入\n\
    \    @Autowired\n    public void setDataSource(@Qualifier(\"oracleDataSource\"\
    ) DataSource dataSource) {\n        this.dataSource = dataSource;\n    }\n}\n\
    ```\n\n`@Autowired`注解默认要求依赖是必须的，但可以通过将`required`属性设置为`true`来改变此行为：\n\n```java\n\
    @Autowired(required = false)\npublic void setDataSource(DataSource dataSource)\
    \ {\n    this.dataSource = dataSource;\n}\n```\n\n`@Autowired`注解也适用于方法。如果Spring能够识别出合适的Bean，它就会自动注入。这对于开发特殊的Spring配置类非常有用，这些类的方法由Spring直接调用，并且其参数需要被配置。最常见的例子是使用`@EnableGlobalMethodSecurity`注解的类来设置全局安全方法：\n\
    \n```java\n@Configuration\n@EnableGlobalMethodSecurity\npublic class MethodSecurityConfig\
    \ {\n    // 由Spring调用的方法\n    @Autowired\n    public void registerGlobal(AuthenticationManagerBuilder\
    \ auth) throws Exception {\n        auth\n            .inMemoryAuthentication()\n\
    \            .withUser(\"john\").password(\"test\").roles(\"USER\").and()\n  \
    \          .withUser(\"admin\").password(\"admin\").roles(\"USER\", \"ADMIN\"\
    );\n    }\n\n    @Bean\n    public MethodSecurityService methodSecurityService()\
    \ {\n        return new MethodSecurityServiceImpl();\n    }\n}\n```\n\n此代码片段的更详细版本将在Spring\
    \ Web章节的Spring Security部分中详细讲解。\n\n`@Autowired`在Spring 4.x中新增的一个强大特性是支持使用泛型类型作为限定符。当你的类按层次结构组织，并且都继承自某个泛型类（例如本书项目中的仓库类，它们都继承自`JdbcAbstractRepo<T>`）时，这一特性非常有用。让我们看看如何使用此特性。\n\
    \n```java\n// 继承自JdbcAbstractRepo的仓库类\npublic class JdbcReviewRepo extends JdbcAbstractRepo\
    \ implements ReviewRepo { ... }\npublic class JdbcResponseRepo extends JdbcAbstractRepo\
    \ implements ResponseRepo { ... }\n\n// 定义上述类型Bean的配置类\n@Configuration\n@Import({DataSourceConfig.class,\
    \ UserRepoDSConfig.class})\npublic class AllRepoConfig {\n    @Bean\n    public\
    \ ReviewRepo reviewRepo() {\n        return new JdbcReviewRepo();\n    }\n\n \
    \   @Bean\n    public ResponseRepo responseRepo() {\n        return new JdbcResponseRepo();\n\
    \    }\n}\n\n// 测试类\n@RunWith(SpringJUnit4ClassRunner.class)\n@ContextConfiguration(classes\
    \ = {AllRepoConfig.class})\npublic class GenericQualifierTest {\n    @Autowired\n\
    \    JdbcAbstractRepo reviewRepo;\n\n    @Autowired\n    JdbcAbstractRepo responseRepo;\n\
    \    ....\n}\n```\n\n这非常有帮助，因为在相关类中，不再需要`Qualifier`注解来为相关类型的不同Bean命名，以确保Spring不会混淆。\n\
    \n之前提到过，JSR 250和JSR 330注解也受支持，并且可以与Spring注解一起使用，但它们有许多共同的功能。在表[2-3](#A978-1-4842-0811-3_2_Chapter.html#Tab3)中，你可以看到它们之间的对应关系和差异。\n\
    \n表2-3. 前缀及对应路径\n\n| Spring | JSR | 说明 |\n| --- | --- | --- |\n| `@Component`\
    \ | `@Named` | `@Named`可以替代除`@Configuration`之外的所有原型注解 |\n| `@Qualifier` | `@Qualifier`\
    \ | JSR的`Qualifier`是一个标记注解，用于标识限定符注解，例如`@Named` |\n| `@Autowired` | `@Inject`\
    \ | `@Inject`可以应用于静态成员和实例成员 |\n| `@Autowired` + `@Qualifier` | `@Resource(name=\"\
    beanName\")` | `@Resource`很有用，因为它可以替代两个注解 |\n\n**注入非Bean的依赖**\n\n由于其语法和定义，`@Autowired`不能用于自动装配原始值或字符串，这很合理，因为有一个名为`@Value`的注解专门用于此目的。该注解可用于插入标量值，或与占位符和SpEL一起使用，以提供配置Bean的灵活性。`DataSourceConfig`用于定义`dataSource`Bean，而初始化`dataSource`所需的属性值则通过`@Value`注入。\n\
    \n```java\nimport org.springframework.beans.factory.annotation.Value;\n...\n@Configuration\n\
    @PropertySource(\"classpath:db/datasource.properties\")\npublic class DataSourceConfig\
    \ {\n    @Value(\"${driverClassName}\")\n    private String driverClassName;\n\
    \    @Value(\"${url}\")\n    private String url;\n    ...\n    @Bean\n    public\
    \ DataSource dataSource() throws SQLException {\n        DriverManagerDataSource\
    \ ds = new DriverManagerDataSource();\n        ds.setDriverClassName(driverClassName);\n\
    \        ds.setUrl(url);\n        ...\n        return ds;\n    }\n}\n```\n\n此外，`@Value`注解也可以与SpEL一起使用，以从其他Bean或被视为Bean的对象中注入值，以下示例是从`Properties`对象中注入值：\n\
    \n```java\n@Configuration\npublic class DataSourceConfig1 {\n    @Bean\n    public\
    \ Properties dbProps() {\n        Properties p = new Properties();\n        p.setProperty(\"\
    driverClassName\", \"org.h2.Driver\");\n        p.setProperty(\"url\", \"jdbc:h2:∼/sample\"\
    );\n        p.setProperty(\"username\", \"sample\");\n        p.setProperty(\"\
    password\", \"sample\");\n        return p;\n    }\n\n    @Bean\n    public DataSource\
    \ dataSource(\n            @Value(\"#{dbProps.driverClassName}\") String driverClassName,\n\
    \            @Value(\"#{dbProps.url}\") String url,\n            @Value(\"#{dbProps.username}\"\
    ) String username,\n            @Value(\"#{dbProps.password}\") String password)\
    \ throws SQLException {\n        DriverManagerDataSource ds = new DriverManagerDataSource();\n\
    \        ds.setDriverClassName(driverClassName);\n        ds.setUrl(url);\n  \
    \      ds.setUsername(username);\n        ds.setPassword(password);\n        return\
    \ ds;\n    }\n}\n```\n\n`dbProps`是一个被实例化并初始化的对象，由于`@Bean`注解的存在，它在应用程序中被视为一个Bean。在任何JSR中都没有与`@Value`等效的注解。"
  raw: "To test that autowiring of the `dataSource` succeeded,\na breakpoint can be\
    \ placed in the `testAutowiredReq`\nmethod. Run the test in debug mode, and inspect\
    \ the contents of the\n`reqRepo` field.\nIn Figure [2-22](#A978-1-4842-0811-3_2_Chapter.html#Fig22),\
    \ such an\noperation is depicted, and the target bean’s contents are evidentiated.\n\
    \n![A978-1-4842-0811-3_2_Fig22_HTML.jpg](A978-1-4842-0811-3_2_Fig22_HTML.jpg)\n\
    \nFigure 2-22.\n\nRunning a test in debug mode to test constructor injection\n\
    \nIn case Spring finds more than candidate for autowiring when constructor\ninjection\
    \ is used, the solution is still to use `@Qualifier`, only in\nthis case, this\
    \ annotation is used on the parameter, because a\nconstructor can have more parameters,\
    \ and Spring must be instructed\nexactly where each bean will be injected. The\
    \ definition of the\nconstructor will change like this:\n\n```\n@Autowired\npublic\
    \ JdbcRequestRepo(@Qualifier(\"oracleDataSource\") DataSource dataSource) {\n\
    super(dataSource);\n}\n// Configuration class that defines two datasource beans\n\
    @Configuration\npublic class DataSourceConfig {\n@Bean(name = \"h2DataSource\"\
    \ )\npublic DataSource dataSource() throws SQLException {\nDriverManagerDataSource\
    \ ds = new DriverManagerDataSource();\n//populate\nreturn ds;\n}\n@Bean(name =\
    \ \"oracleDataSource\" )\npublic DataSource dataSource() throws SQLException {\n\
    OracleDataSource ds = new OracleDataSource();\n//populate\nreturn ds;\n}\n}\n\
    ```\n\nIn using `@Autowired` on\nconstructors, it makes not sense to have more\
    \ than one constructor\nannotated with it, and Spring will complain about it because\
    \ it will not\nknow what constructor to use to instantiate the bean.\n\nEverything\
    \ that was presented about the capabilities of `@Autowired` and `@Qualifier` and\
    \ how to\nuse them to control bean autowiring applies for setter injection too.\
    \ So\nexcept for a code snippet, there nothing more that can be said about\nsetter\
    \ injection via autowiring.\n\n```\npublic class JdbcUserRepo extends JdbcAbstractRepo\n\
    implements UserRepo {\nprotected DataSource dataSource;\n@Autowired\npublic void\
    \ setDataSource(DataSource dataSource) {\nthis.dataSource = dataSource;\n}\n//or\
    \ by name\n@Autowired\npublic void setDataSource(@Qualifier(\"oracleDataSource\"\
    ) DataSource dataSource) {\nthis.dataSource = dataSource;\n}\n}\n```\n\nThe `@Autowired`\n\
    annotation by default requires the dependency to be mandatory, but this\nbehavior\
    \ can be changed, by setting the `required` attribute to\n`true`:\n\n```\n@Autowired(required=false)\n\
    public void setDataSource(DataSource dataSource) {\nthis.dataSource = dataSource;\n\
    }\n```\n\nThe `@Autowired`\nannotation works on methods, too. If Spring can identify\
    \ the proper\nbean, it will autowire it. This is useful for development of special\n\
    Spring configuration classes that have methods that are called by Spring\ndirectly\
    \ and have parameters that have to be configured. The most common\nexample is\
    \ the setting method global security using classes annotated\nwith `@EnableGlobalMethodSecurity`:\n\
    \n```\n@Configuration\n@EnableGlobalMethodSecurity\npublic class MethodSecurityConfig\
    \ {\n// method called by Spring\n@Autowired\npublic void registerGlobal(AuthenticationManagerBuilder\
    \ auth)\nthrows Exception {\nauth\n.inMemoryAuthentication()\n.withUser(\"john\"\
    ).password(\"test\").roles(\"USER\").and()\n.withUser(\"admin\").password(\"admin\"\
    ).roles(\"USER\", \"ADMIN\");\n}\n@Bean\npublic MethodSecurityService methodSecurityService()\
    \ {\nreturn new MethodSecurityServiceImpl()\n}\n}\n```\n\nA more detailed version\
    \ of this code snippet will be covered and\nexplained in detail in the Spring\n\
    Security section, in the chapter Spring Web.\n\nA strong feature for `@Autowired`\
    \ added in\nSpring 4.x is the possibility to use generic types as qualifiers.\
    \ This\nis useful when you have classes that are organized in a hierarchy and\n\
    they all inherit a certain class that is generic, like the repositories\nin the\
    \ project attached to the book, all of which extend `JdbcAbstractRepo<T>`.\nLet’s\
    \ see how this feature can be used.\n\n```\n// repository classes extending JdbcAbstractRepo\n\
    public class JdbcReviewRepo extends JdbcAbstractRepo\nimplements ReviewRepo {\
    \ ...}\npublic class JdbcResponseRepo extends JdbcAbstractRepo\nimplements ResponseRepo{\
    \ ...}\n//configuration class defining beans of the previous types\n@Configuration\n\
    @Import({DataSourceConfig.class, UserRepoDSConfig.class})\npublic class AllRepoConfig\
    \ {\n@Bean\npublic ReviewRepo reviewRepo(){\nreturn new JdbcReviewRepo();\n}\n\
    @Bean\npublic ResponseRepo responseRepo(){\nreturn new JdbcResponseRepo();\n}\n\
    }\n// Test class\n@RunWith(SpringJUnit4ClassRunner.class)\n@ContextConfiguration(classes\
    \ = {AllRepoConfig.class})\npublic class GenericQualifierTest {\n@Autowired\n\
    JdbcAbstractRepo reviewRepo;\n@Autowired\nJdbcAbstractRepo responseRepo;\n....\n\
    }\n```\n\nThis helps a lot, because in related classes, the `Qualifier` annotation\n\
    is no longer needed to name different beans of related types in order to\nmake\
    \ sure that Spring does not get confused.\n\nIt was mentioned before that the\
    \ JSR 250 and JSR 330 annotations are\nsupported and can be used alongside Spring\
    \ annotations, but they have\nquite a few common functionalities. In Table [2-3](#A978-1-4842-0811-3_2_Chapter.html#Tab3),\
    \ you can\nsee the correspondences and the differences between them.\n\nTable\
    \ 2-3.\n\nPrefixes and corresponding paths\n\nSpring\n |\n  JSR\n |\n  Comment\n\
    \ |\n\n| --- | --- | --- | --- | --- | --- | --- |\n\n`@Component`\n |\n  `@Named`\n\
    \ |\n  `@Named` can be\nused instead of all stereotype annotations except `@Configuration`\n\
    \ |\n\n`@Qualifier`\n |\n  `@Qualifier`\n |\n  JSR `Qualifier`\nis a marker annotation\
    \ used to identify qualifier annotations, like\n`@Named`, for\nexample\n |\n\n\
    `@Autowired`\n |\n  `@Inject`\n |\n  `@Inject` may\napply to static as well as\
    \ instance members\n |\n\n`@Autowired` +\n`@Qualifier`\n |\n  `@Resource(name=\"\
    beanName\")`\n |\n  `@Resource` is\nuseful because replaces two annotations.\n\
    \ |\n\nInjecting Dependencies That Are Not Beans\n\nBecause of its syntax and\
    \ its definition, `@Autowired` cannot be\nused to autowire primitive values, or\
    \ Strings, which is quite logical,\nconsidering that there is an annotation named\
    \ `@Value` that\nspecializes in this exactly. This annotation can be used to insert\n\
    scalar values or can be used together with placeholders and SpEL in\norder to\
    \ provide flexibility in configuring a bean. The `DataSourceConfig` is\nused to\
    \ define a `dataSource` bean, and\nthe property values needed to initialize the\
    \ `dataSource` are\ninjected using `@Value`.\n\n```\nimport org.springframework.beans.factory.annotation.Value;\n\
    ...\n@Configuration\n@PropertySource(\"classpath:db/datasource.properties\")\n\
    public class DataSourceConfig {\n@Value(\"${driverClassName}\")\nprivate String\
    \ driverClassName;\n@Value(\"${url}\")\nprivate String url;\n...\n@Bean\npublic\
    \ DataSource dataSource() throws SQLException {\nDriverManagerDataSource ds =\
    \ new DriverManagerDataSource();\nds.setDriverClassName(driverClassName);\nds.setUrl(url);\n\
    ...\nreturn ds;\n}\n}\n```\n\nAlso, the `@Value` annotation can\nalso be used\
    \ with SpEL in order to inject values from other beans, or\nobjects treated as\
    \ beans, in the following case from a `Properties` object:\n\n```\n@Configuration\n\
    public class DataSourceConfig1 {\n@Bean\npublic Properties dbProps(){\nProperties\
    \ p = new Properties();\np.setProperty(\"driverClassName\", \"org.h2.Driver\"\
    );\np.setProperty(\"url\", \"jdbc:h2:∼/sample\");\np.setProperty(\"username\"\
    , \"sample\");\np.setProperty(\"password\", \"sample\");\nreturn p;\n}\n@Bean\n\
    public DataSource dataSource(\n@Value(\"#{dbProps.driverClassName}\")String driverClassName,\n\
    @Value(\"#{dbProps.url}\")String url,\n@Value(\"#{dbProps.username}\")String username,\n\
    @Value(\"#{dbProps.password}\")String password) throws SQLException {\nDriverManagerDataSource\
    \ ds = new DriverManagerDataSource();\nds.setDriverClassName(driverClassName);\n\
    ds.setUrl(url);\nds.setUsername(username);\nds.setPassword(password);\nreturn\
    \ ds;\n}\n}\n```\n\nThe `dbProps` is\nan object that was instantiated and initialized,\
    \ and it is treated as a\nbean in the application because of the `@Bean` annotation.\n\
    There is no equivalent for `@Value` in any JSR."
