    #### Bean 作用域


    既然已经讨论了销毁 bean 的话题，接下来将讨论 bean 能存活多久，也就是 bean 的作用域。你可能已经注意到，当上下文关闭时，日志中总会看到这样一行：


    ```

    DEBUG o.s.b.f.s.DefaultListableBeanFactory - Destroying singletons in org.springframework.beans.factory.support.DefaultListableBeanFactory@10e92f8f:
    defining beans simpleBean1,simpleBean2,complexBean, o.s.c.a.internalConfigurationAnnotationProcessor...

    ```


    因此，Spring 将 bean 称为单例（singleton），因为这是 bean 的默认作用域。¹⁵ 当 Spring IoC 实例化 bean 时，它会为每个
    bean 创建一个单一实例，除非在 bean 定义中设置了其他属性。这个属性叫做 `scope`，bean 的默认作用域是 `singleton`。作用域定义在表
    2-2 中。


    **表 2-2. Bean 作用域**


    | 作用域 | 描述 |

    | --- | --- |

    | `Singleton` | Spring IoC 为此 bean 创建单一实例，任何对此 bean 定义匹配的 id 或 ids 的请求都会返回该实例。
    |

    | `Prototype` | 每次请求此特定 bean 时，Spring IoC 都会创建一个新实例。 |

    | `Request` | Spring IoC 为每个 HTTP 请求创建一个 bean 实例。仅在支持 Web 的 Spring ApplicationContext
    上下文中有效。 |

    | `Session` | Spring IoC 为每个 HTTP 会话创建一个 bean 实例。仅在支持 Web 的 Spring ApplicationContext
    上下文中有效。 |

    | `global-session` | Spring IoC 为每个全局 HTTP 会话创建一个 bean 实例。仅在支持 Web 的 Spring ApplicationContext
    上下文中有效。 |

    | 自定义 | 开发者可以定义自己的作用域及其规则。 |


