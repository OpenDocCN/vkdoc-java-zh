    这种测试技术非常适合在开发过程早期发现问题。考虑到解决问题的难度会随着发现问题的时长呈指数级增长，任何项目在开发过程中都不应缺少它。此外，测试应使用像 Jenkins、Hudson
    或 Bamboo 这样的持续集成工具自动运行。测试驱动开发能够比旧方法在更短的时间内产出高质量的应用程序，但它也有其局限性。有时测试可能被错误地构思或应用，这可能导致单元在实际环境中表现不如预期。即使所有单元在隔离状态下和所有预期场景中都能完美运行，最终用户也可能会遇到开发人员和测试人员未曾设想的情况。既然提到了单元测试，本节将在此结束，以便进入下一部分。


    单元测试与集成测试


    单元测试是指对应用程序中最小可测试部分进行单独且独立的测试，使其与任何可能以不可预测方式影响其行为的其他单元隔离开来。依赖关系被保持在最低限度，并且大多数依赖关系将被替换为能复现预期行为的伪单元。这基本上意味着功能单元被脱离了上下文。单元测试由开发人员编写，并使用自动化工具运行，但在需要时也可以手动运行。一个单元测试针对一个给定的输入执行单个场景，并将该输入的预期结果与实际结果进行比较。如果匹配，则测试通过；如果不匹配，则测试失败。这种测试方法速度快，是许多项目中最常用的方法。测试由开发人员编写，推荐的做法是使用正向测试和负向测试覆盖类中的每个方法。正向测试是测试单元的有效输入，而负向测试则测试单元的无效输入。这些测试覆盖了单元的失败情况，如果单元在被测试时实际上没有失败，则认为这些测试失败。自
    2000 年以来，帮助开发人员在 Java 中轻松编写和执行单元测试的核心框架是 `JUnit`。当前版本是 4.13，但版本 5 正在开发中，Alpha
    版本已于 2016 年 1 月发布。


    `JUnit` 的扩展并不多，因为这个框架几乎无所不包，但有一个名为 `Hamcrest` 的框架相当有趣，它提供了一组匹配器，可以组合起来创建灵活的意图表达。它最初是一个基于
    `JUnit` 的框架，用于在 Java 中编写测试，但成功打破了语言障碍，目前它已可用于大多数当前使用的语言，如 Python 和 Swift。更多信息可以在其官方网站上找到：[`http://hamcrest.org/`](http://hamcrest.org/)。


    在包含所有真实依赖关系的上下文中一起运行一组单元测试称为集成测试。顾名思义，这种技术所需的连接被测对象的基础设施也是测试执行上下文的一部分。在图 3-2 中，展示了一个用于比较单元测试和集成测试概念的简单示意图。


    ![A978-1-4842-0811-3_3_Fig2_HTML.jpg](img/A978-1-4842-0811-3_3_Fig2_HTML.jpg)


    图 3-2.


    单元测试与集成测试概念


    为了在隔离状态下测试功能单元，必须用伪依赖关系替换真实依赖关系，这些伪依赖关系是模拟真实依赖关系行为的简单实现对象，从被依赖者的角度来看。伪依赖关系可以是桩（stubs）或模拟对象（mocks）。两者都执行相同的功能，即替换真实依赖关系，但它们的创建方式有所不同。


    使用桩进行测试


    桩由开发人员创建；它们不需要额外的依赖关系。桩是一个具体的类，实现了与被测单元原始依赖关系相同的接口。它们应该被设计成展示实际依赖关系的一小部分或全部行为。


    例如，让我们尝试测试上一章中引入的一个服务类，即 `SimplePetService`。


    ```

    package com.ps.services.impl;

    ...

    public class SimplePetService extends SimpleAbstractService

    implements PetService {

    // 需要被打桩的依赖关系

    private PetRepo repo;

    @Override

    public Pet createPet(User user, String name, int age,

    PetType petType, String rfid) {

    Pet pet = new Pet();

    pet.setOwner(user);

    pet.setName(name);

    pet.setAge(age);

    pet.setRfid(rfid);

    user.addPet(pet);

    repo.save(pet);

    return pet;

    }

    @Override

    public Set findAllByOwner(User user) {

    return repo.findAllByOwner(user);

    }

    /**

    * @param user 宠物主人

    * @param name 宠物名字

    * @return

    */

    @Override

    public Pet findByOwner(User user, String name) {

    return repo.findByOwner(user, name);

    }

    public void setRepo(PetRepo petRepo) {

    this.repo = petRepo;

    }

    public PetRepo getRepo() {

    return repo;

    }

    }

    // 定义特定宠物行为的接口

    public interface PetService {

    Pet createPet(User user, String name, int age, PetType petType,

    String rfid);

    Set findAllByOwner(User user);

    Pet findByOwner(User user, String name);

    }

    ```


    这个类从抽象类 `SimpleAbstractService<Pet>` 继承了一些行为。


