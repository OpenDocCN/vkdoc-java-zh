    微服务是面向服务架构（SOA）的一种专门化实现方法，用于构建灵活且可独立部署的服务。微服务是一种范式，要求将服务分解为高度专业化的功能实例，并通过无关的通信协议（例如
    REST）相互连接，共同实现一个共同的业务目标。每个微服务都是一个非常小的无状态功能单元，它不关心输入来自何处，也不知道输出去向何方，对整体架构毫无概念。由于其专业化和解耦的特性，每个问题都能被识别、定位并修复，且重新部署实现时不会影响其他微服务。这意味着微服务系统具有高内聚和低耦合的特点，这些特性允许单个服务的架构通过持续重构不断演进，减少了对前期大型设计的依赖，并使得软件能够更早、更持续地发布。


    近年来，微服务越来越受欢迎，由于其细粒度和轻量级通信协议，已成为构建企业应用的首选方式。微服务的模块化架构风格似乎特别适合基于云的环境。这种架构方法具有很高的可扩展性，在需要支持多种平台和设备时被认为是理想选择。看看目前网络上的巨头：Twitter、Netflix、Amazon、PayPal、Soundcloud
    等。它们的大型网站和应用都已从单体架构演变为微服务，以便能够从各种设备访问。


    经典应用开发的特点是：将多种类型的服务作为单一的单体自治单元进行开发，并部署在服务器上供客户端访问。通常，这些应用是多层的，每一层对应应用的不同功能区域。单体应用会处理
    HTTP 请求、执行业务逻辑，并处理数据库操作。在单体架构中，构成系统的服务在逻辑上被组织在同一个代码库和部署单元内。单体应用的缺点是：变更最终会与其他变更相互绑定，并且当涉及多个层级时，问题有时更难识别。对应用的一小部分进行修改，可能需要构建和部署一个全新的版本。显然，回归测试是强制性的，以验证之前开发和测试的代码在修改后仍能正确运行。因此，只有将微服务与传统的单体架构进行比较，才能凸显其优缺点。


    微服务的优势总结如下：


    *   更高的粒度

    *   更高的可扩展性

    *   易于自动化部署和测试

    *   易于测试

    *   更高的解耦度

    *   增强的内聚性

    *   适合持续重构、集成和交付

    *   更高的模块独立性

    *   围绕能力进行组织

    *   提高了敏捷性和速度，因为当系统被正确分解为微服务时，每个服务都可以独立地、并行地开发和部署

    *   每个服务都具有弹性¹、韧性、可组合性、最小化和完整性

    *   改进了故障隔离

    *   消除了对单一技术栈的长期依赖，因为微服务可以用不同的编程语言编写

    *   更容易让新开发者融入团队


    微服务的劣势总结如下：

