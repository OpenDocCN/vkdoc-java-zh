    any(RowMapper.class), anyLong())).thenReturn(new Pet());\nPet pet = simplePetService.findById(PET_ID);\n\
    assertNotNull(pet);\n}\n}\n```\n\n如果你还没弄清楚发生了什么，这里解释一下：创建了一个测试上下文，其中包含了配置类中的所有\
