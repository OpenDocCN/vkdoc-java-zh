    \ The `HttpHeaders` object is used to set headers of the request, such as the\
    \ media type of the message, so Spring will know what message converter to use\
    \ to convert the JSON representation into the user instance that needs to be saved.\n\
    \n*   **PUT**: updates an existing resource or creates it with a known destination\
    \ URI. The URI of a resource contains an identifier for that resource. When a\
    \ PUT request refers to an existing resource, the resource is updated; otherwise,\
    \ a new resource with the identifier from the URI and the contents in the request\
    \ body is created. When the resource being updated requires a parent that does\
    \ not exist,[^(23)](#A978-1-4842-0811-3_7_Chapter.html#Fn23) or if the resource\
    \ requested to be updated does not exist, a 404 (Not found) status code is returned.\n\
    \n    When the resource is updated correctly and nothing is returned as a response\
    \ body, a 204 (No content) response status is returned.\n\n    When the resource\
    \ does not exist, PUT acts like a POST and creates it, and the location of the\
    \ resource is returned. The response status in this case is 201 (CREATED).\n\n\
    \    In Figure [7-25](#A978-1-4842-0811-3_7_Chapter.html#Fig25), the PUT request\
    \ and response contents are depicted.\n\n    ![A978-1-4842-0811-3_7_Fig25_HTML.jpg](A978-1-4842-0811-3_7_Fig25_HTML.jpg)\n\
    \n    Figure 7-25. PUT request and response example\n\n    A REST PUT request\
    \ can be sent with a `RestTemplate` instance: all that is needed is the REST URI\
    \ and user object. The URI is identical to the one used to retrieve a user resource,\
    \ but the HTTP method is different.\n\n    ```\n    import org.springframework.http.*;\n\
    \    ...\n    public class RestUserControllerTest {\n        private static final\
    \ String GET_PUT_DEL_URL = \"http://localhost:8080/users/{$username}\";\n    \
    \    private static final String GET_POST_URL = \"http://localhost:8080/users\"\
    ;\n        private RestTemplate restTemplate = null;\n        @Before\n      \
    \  public void setUp() {\n            restTemplate = new RestTemplate();\n   \
    \     }\n        // Test PUT\n        @Test\n        public void editUser() {\n\
    \            User user = new User();\n            user.setEmail(\"MissJones@pet.com\"\
    );\n            user.setUsername(\"JessicaJones\");\n            ...\n       \
    \     final HttpHeaders headers = new HttpHeaders();\n            headers.setContentType(MediaType.APPLICATION_JSON_UTF8);\n\
    \            final HttpEntity userRequest = new HttpEntity(user, headers);\n \
    \           ResponseEntity responseEntity = restTemplate.exchange(GET_PUT_DEL_URL,\
    \ HttpMethod.PUT, userRequest, User.class, \"JessicaJones\");\n            User\
    \ editedUser = responseEntity.getBody();\n            assertNotNull(editedUser);\n\
    \            assertEquals(\"MissJones@pet.com\", editedUser.getEmail());\n   \
    \     }\n    }\n    ```"
  raw: "Message converters are automatically detected and used by Spring in\napplications\
    \ configured with `<mvc:annotation-driven/>`\nor `@EnableWebMvc`. In the\ncode\
    \ sample for this chapter, the representations are in JSON format, so\n`MappingJackson2HttpMessageConverter`\n\
    is used. And because the message is supported by default, the `HttpMessageConverterExtractor<T>`\n\
    is not necessary in the previous example. Also, if no `Accept` header is\nspecified,\
    \ all those supported by Spring will be considered, so in this\ncase, `RequestCallback`\n\
    becomes unnecessary too, and we can stick to the simpler `restTemplate.getForObject`\n\
    method mentioned in the previous code snippet, because even in\nproduction applications,\
    \ you will rarely need anything else.\n\nThe application contained in the `15-ps-ws-rest-practice`\n\
    is a Spring Web RESTful application that can be used to test your\nunderstanding\
    \ of Spring support components for REST applications. The\n`RestUserController`\n\
    class provides controller methods that resolve REST requests. The client\nis represented\
    \ by the `RestUserControllerTest`\nclass. This test class has a `RestTemplate`\
    \ injected\nin it that can be used to test all REST operations with users exposed\
    \ by\nthe `RestUserController`\ncontroller. The web application has no context,\
    \ and the REST Services\nexposed by the controller are available using URIs like\
    \ `http://localhost:8080/users/``*.` The `RestUserControllerTest`\nclass contains\
    \ methods to test REST requests using the four main HTTP\nmethods:\n\n*   GET:\
    \ method used to retrieve a\n    representation of a resource; might have length\
    \ restrictions depending\n    on server settings and client used.[^(21)](#A978-1-4842-0811-3_7_Chapter.html#Fn21)\n\
    \    When resource is not found, a 404 (Not\n    found) status code is returned,\
    \ 200(OK) otherwise. In Figure [7-23](#A978-1-4842-0811-3_7_Chapter.html#Fig23),\
    \ the GET\n    request and response contents are depicted.\n\n![A978-1-4842-0811-3_7_Fig23_HTML.jpg](A978-1-4842-0811-3_7_Fig23_HTML.jpg)\n\
    \nFigure 7-23.\n\nGET request and response example\n\nA REST GET request can be\
    \ sent with a `RestTemplate`\n    instance: all that is needed is the REST URI\
    \ and a username to identify\n    the resource. The path variable was named `$username`,\
    \ prefixed\n    with $ to make the parametrized piece of the URI really obvious.\
    \ The\n    following code snippet depicts the test method performing a GET request\n\
    \    for a user resource that has username equal to “johncusack”.\n\n```\n   \
    \ public class RestUserControllerTest {\n    private static final String GET_PUT_DEL_URL\
    \ =\n    \"http://localhost:8080/users/{$username}\";\n    private RestTemplate\
    \ restTemplate = null;\n    @Before\n    public void setUp() {\n    restTemplate\
    \ = new RestTemplate();\n    }\n    //Test GET by username\n    @Test\n    public\
    \ void findByUsername() {\n    User user = restTemplate.getForObject(GET_PUT_DEL_URL,\n\
    \    User.class, \"johncusack\");\n    assertNotNull(user);\n    assertEquals(\"\
    John.Cusack@pet.com\", user.getEmail());\n    }\n    }\n    ```\n\n*   POST: method\
    \ used to create a new\n    resource. When the resource being created requires\
    \ a parent that does\n    not exist, a 404 (Not found)\n    status code is returned.[^(22)](#A978-1-4842-0811-3_7_Chapter.html#Fn22)\n\
    \    When an identical resource already exists, a 409 (Conflict) status code is\
    \ returned.\n    When the resource was created correctly, a 201 (Created) status\
    \ code is returned.\n    In Figure [7-24](#A978-1-4842-0811-3_7_Chapter.html#Fig24),\
    \ the\n    POST request and response contents are depicted.\n\n![A978-1-4842-0811-3_7_Fig24_HTML.jpg](A978-1-4842-0811-3_7_Fig24_HTML.jpg)\n\
    \nFigure 7-24.\n\nPOST request and response example\n\nA REST POST request can\
    \ be sent with a `RestTemplate`\n    instance: all that is needed is the REST\
    \ URI and user object. The URI is\n    identical to the one used to retrieve a\
    \ user resource, but the HTTP\n    method is different.\n\n```\n    import org.springframework.http.*;\n\
    \    ...\n    public class RestUserControllerTest {\n    private static final\
    \ String GET_PUT_DEL_URL =\n    \"http://localhost:8080/users/{$username}\";\n\
    \    private static final String GET_POST_URL = \"http://localhost:8080/users\"\
    ;\n    private RestTemplate restTemplate = null;\n    @Before\n    public void\
    \ setUp() {\n    restTemplate = new RestTemplate();\n    }\n    //Test POST\n\
    \    @Test\n    public void createUser() {\n    User user = new User();\n    user.setEmail(\"\
    Doctor.Who@tardis.com\");\n    user.setUsername(\"DoctorWho\");\n    ...\n   \
    \ final HttpHeaders headers = new HttpHeaders();\n    headers.setContentType(MediaType.APPLICATION_JSON);\n\
    \    final HttpEntity crRequest = new HttpEntity(user, headers);\n    URI uri\
    \ = restTemplate.postForLocation(GET_POST_URL,\n    crRequest, User.class);\n\
    \    assertNotNull(uri);\n    assertTrue(uri.toString().contains(\"doctorwho\"\
    ));\n    // test insertion\n    User newUser = restTemplate.getForObject(uri,\
    \ User.class);\n    assertNotNull(newUser);\n    assertNotNull(newUser.getId());\n\
    \    }\n    }\n    ```\n\nIn this case, the method `postForLocation` is\n    used,\
    \ because the successful creation of the resource must be tested\n    afterward.\
