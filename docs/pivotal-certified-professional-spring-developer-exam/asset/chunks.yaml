  trans: "\n*   被视为**非瞬态**的异常，这意味着除非根本原因被修复，否则重试操作将会失败。该层次结构的父类是 `org.springframework.dao.NonTransientDataAccessException`。最明显的例子是搜索一个不存在的对象。在搜索的用户存在之前，重试此查询都会失败。下面的代码片段搜索了一个不存在的用户。其下方是控制台日志中描述异常类型和消息的片段。\n\
    \n```\n    // TestJdbcTemplateUserRepo.java 中的测试方法\n    @Test\n    public void\
    \ testNoFindById() {\n    User user = userRepo.findById(99L);\n    assertEquals(\"\
    Darius\", user.getUsername());\n    }\n    #来自控制台的日志\n    org.springframework.dao.EmptyResultDataAccessException:\n\
    \    Incorrect result size: expected 1, actual 0\n    ```\n\n显然，此测试将会失败，直到在 `p_user`\
    \ 表中找到 ID 为 99 且用户名为 Darius 的用户。\n\n*   `org.springframework.dao.RecoverableDataAccessException`\n\
    \    在执行某些恢复步骤（通常是关闭当前连接并使用新连接）后，先前失败的操作可能会成功时抛出。当数据库与应用位于不同计算机上，且由于临时网络故障导致数据库连接失败时，这种异常类型非常有用。可以捕获该异常，并在网络恢复后重试查询，此时执行将在新连接上成功。\n\
    \n*   被视为**瞬态**的异常，它们继承自抽象类 `org.springframework.dao.TransientDataAccessException`，这意味着无需任何干预，重试操作就可能成功。这些是并发或延迟异常。例如，当查询执行过程中因网络连接不良导致数据库不可用时，会抛出类型为\
    \ `QueryTimeoutException` 的异常。开发者可以通过重试查询来处理此异常。\n\n第四个分支仅包含一种异常类型，当使用类型为 `DataSourceInitializer`\
    \ 的 Bean 初始化测试数据库因脚本错误而失败时使用；因此该异常类型被命名为 `ScriptException`。这就是关于 Spring 数据访问异常的全部内容。听起来很简单，对吧？\n\
    \n!\n\n如果你想测试自己对目前所介绍的 Spring `JdbcTemplate` 及相关组件的理解，可以打开 `05-ps-jdbc-practice\
    \ project` 并尝试完成其中的 TODO 任务。有三个任务是必须完成的，还有一个是奖励任务，供你非常喜欢本节内容并乐于实践时完成。缺失的部分用 TODO\
    \ 任务标记，在 Intellij IDEA 的 TODO 视图中可见。\n\n任务 TODO 27 位于 `TestJdbcTemplateUserRepo`\
    \ 类中，要求你完成一个搜索不存在用户的负面测试方法的主体。该测试应能通过。要查看数据库中存在的用户 ID，请检查 `05-ps-jdbc-practice/src/test/resources/db/test-data.sql`\
    \ 文件。\n\n任务 TODO 28 位于 `TestJdbcTemplateUserRepo` 类中，要求你完成一个统计数据库中用户数量的测试方法的主体。\n\
    \n任务 TODO 29 位于 `JdbcNamedTemplateUserRepo` 中，要求你完成仓库方法的主体。你可以使用 `jdbcNamedTemplate`\
    \ Bean，或者通过 `jdbcNamedTemplate.getJdbcOperations()` 访问底层的 `JdbcTemplate`。\n\n\
    奖励任务 TODO 30 位于测试类 `TestNamedJdbcTemplateUserRepo` 中，如果你决定完成它，它将帮助你测试通过完成 TODO\
    \ 29 所实现的方法。\n\n如果遇到困难，你可以查看 `05-ps-jdbc-solution` 项目中提供的解决方案。\n\n事务环境中的数据访问配置\n\
    \n到目前为止，我们讨论的是在非事务环境中使用 Spring 进行数据访问，这意味着执行查询时，会获取一个连接，执行查询，然后释放连接。然而，在企业级应用中，需要将某些\
    \ SQL 操作分组，以便当其中一个操作失败时，同一组中先前查询的所有结果都应回滚，以避免数据库处于不一致状态。一组 SQL 操作的执行上下文称为**事务**，它具有以下属性：\n\
    \n*   **原子性**是事务的主要属性，也是前面提到的特性：如果事务中的一个操作失败，整个事务失败，数据库保持不变。当事务中的所有操作都成功时，所有更改在事务提交时保存到数据库中。基本上就是“要么全做，要么全不做”。\n\
    \n*   **一致性**意味着每个事务都应将数据库从一个有效状态转变为另一个有效状态。\n\n*   **隔离性**意味着当多个事务并行执行时，它们不会相互妨碍或以任何方式相互影响。一组事务并行执行后的数据库状态，应与该组事务顺序执行后的状态相同。\n\
    \n*   **持久性**是事务的一个属性，即使在底层系统发生断电、崩溃和其他错误的情况下，事务也应持续存在。¹⁰\n\n在事务环境中，必须管理事务。在 Spring\
    \ 中，这是由一个名为**事务管理器**的基础设施 Bean 来完成的。事务管理器 Bean 的配置是环境变化时唯一需要更改的内容。有四种基本类型：\n\n\
    1.  **本地 JDBC Spring 环境**：一种本地 JDBC 配置，声明一个要使用的基本数据源（即使是嵌入式数据源也可以），以及一个类型为 `org.springframework.jdbc.datasource.DataSourceTransactionManager`\
    \ 的 Bean，这是一个 Spring 特定的实现。使用的连接可以来自连接池，事务管理器 Bean 将根据配置的行为将连接关联到事务。配置事务行为是通过在方法上添加\
    \ `@Transactional` 注解以声明方式完成的。为了确保事务行为，也必须在仓库类上使用此注解。如果没有 ORM，则必须使用类型为 `JdbcTemplate`\
    \ 的组件在仓库层执行查询。所有这些将在本章后面详细说明。此配置的抽象模式如图 5-6 所示。\n\n![A978-1-4842-0811-3_5_Fig6_HTML.jpg](img/A978-1-4842-0811-3_5_Fig6_HTML.jpg)\n\
    \n图 5-6. Spring 本地 JDBC 配置抽象模式\n\n2.  **本地 Hibernate Spring 环境**：一种本地 Hibernate\
    \ 配置，声明一个要使用的基本数据源（即使是嵌入式数据源也可以），以及一个类型为 `org.springframework.orm.hibernate5.HibernateTransactionManager`\
    \ 的 Bean，这是一个 Spring 特定的实现，它使用由类型扩展自 `org.springframework.orm.hibernate5.LocalSessionFactoryBean`\
    \ 的基础设施 Bean 创建的 Hibernate 会话对象，在事务上下文中管理实体。此配置的抽象模式如图 5-7 所示。\n\n![A978-1-4842-0811-3_5_Fig7_HTML.jpg](img/A978-1-4842-0811-3_5_Fig7_HTML.jpg)\n\
    \n图 5-7. Spring 本地 Hibernate 配置抽象模式\n"
- fmt: "### 3. Local JPA Spring environment\n\nA local configuration declaring a basic\
    \ datasource to be used (even an embedded one will do) and a bean of type `org.springframework.orm.jpa.JpaTransactionManager`,\
    \ a Spring-specific implementation that uses an entity manager object created\
    \ by an infrastructure bean of type `org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean`\
    \ to manage entities in a transactional context. The abstract schema of this configuration\
    \ is depicted in Figure [5-8](#A978-1-4842-0811-3_5_Chapter.html#Fig8). To create\
    \ the `LocalContainerEntityManagerFactoryBean` bean, a persistence manager and\
    \ a JPA adapter bean are needed. These can be provided by Hibernate, Apache OpenJPA,\
    \ or any other Spring-supported persistence framework.\n\n![A978-1-4842-0811-3_5_Fig8_HTML.jpg](A978-1-4842-0811-3_5_Fig8_HTML.jpg)\n\
    \n**Figure 5-8.** Spring Local JPA Configuration abstract schema\n\n### 4. Enterprise\
    \ JTA Spring environment\n\nThis setup requires an application server that will\
    \ configure and provide a datasource bean using JNDI. Spring will load a bean\
    \ of type extending `org.springframework.transaction.jta.JtaTransactionManager`\
    \ specific to the application server used. This transaction manager is appropriate\
    \ for handling distributed transactions, which are transactions that span multiple\
    \ resources, and for controlling transactions on application server resources.\
    \ The abstract schema of this configuration is depicted in Figure [5-9](#A978-1-4842-0811-3_5_Chapter.html#Fig9).\n\
    \n![A978-1-4842-0811-3_5_Fig9_HTML.jpg](A978-1-4842-0811-3_5_Fig9_HTML.jpg)\n\n\
    **Figure 5-9.** Enterprise JTA Spring environment\n\n## How Transaction Management\
    \ Works in Spring\n\nIn the previous section, a repository class used a `JdbcTemplate`\
    \ to execute methods within a connection. To introduce transactions, we need a\
    \ service class that will call the repository methods in the context of a transaction.\
    \ Figure [5-10](#A978-1-4842-0811-3_5_Chapter.html#Fig10) depicts the abstract\
    \ UML sequence diagram that describes the examples covered in this section. The\
    \ diagram in the figure mentions only the `findById(...)` method, but the call\
    \ sequence for every service method that involves managing database-stored information\
    \ is the same.\n\n![A978-1-4842-0811-3_5_Fig10_HTML.jpg](A978-1-4842-0811-3_5_Fig10_HTML.jpg)\n\
    \n**Figure 5-10.** UML call diagram for a service class\n\nTransaction management\
    \ is implemented in Spring by making use under the hood of a framework presented\
    \ in a previous chapter, AOP, and that is because transactions are a cross-cutting\
    \ concern. Basically, for every method that must be executed in a transaction,\
    \ retrieving or opening a transaction before execution and committing it afterward\
    \ is necessary. For beans that have methods that must be executed in a transactional\
    \ context, AOP proxies are created that wrap the methods in an `Around` advice\
    \ that takes care of getting a transaction before calling the method and committing\
    \ the transaction afterward. The AOP proxies use two infrastructure beans for\
    \ this: an `org.springframework.transaction.interceptor.TransactionInterceptor`\
    \ in conjunction with an implementation of `org.springframework.transaction.PlatformTransactionManager`.\
    \ Spring provides a flexible and powerful abstraction layer for transaction management\
    \ support. At the core of it is the `PlatformTransactionManager` interface. Any\
    \ transaction manager provider framework that is supported can be used. JTA providers\
    \ can as well, and this will have no impact on the rest of the classes of the\
    \ application. The most common transaction management providers are:\n\n*   `DataSourceTransactionManager`,\
    \ Spring basic transaction management provider class;\n*   `HibernateTransactionManager`,\
    \ when Hibernate is used for persistence support;\n*   `JpaTransactionManager`,\
    \ when an entity manager is used for persistence support;\n*   `JtaTransactionManager`,\
    \ used to delegate transaction management to a Java EE server. Can be used with\
    \ Atomikos too, removing the need for an application server.[^(11)](#A978-1-4842-0811-3_5_Chapter.html#Fn11)\n\
    *   `WebLogicJtaTransactionManager`, transaction support provided by the WebLogic\
    \ Application Server.\n*   etc.\n\nConceptually, what happens when a transactional\
    \ method is called is depicted in Figure [5-11](#A978-1-4842-0811-3_5_Chapter.html#Fig11).\n\
    \n![A978-1-4842-0811-3_5_Fig11_HTML.jpg](A978-1-4842-0811-3_5_Fig11_HTML.jpg)\n\
    \n**Figure 5-11.** Conceptual UML sequence diagram for a transactional operation\n\
    \nMethods that need to be executed in a transactional context are annotated with\
    \ `@Transactional` Spring annotation. The body of these methods is a functional\
    \ unit that cannot be subdivided. The official Spring course calls these methods\
    \ `atomic units of work`. As you probably remember from the AOP chapter, this\
    \ annotation must be used only on public methods; otherwise, the transactional\
    \ proxy won’t be able to apply the transactional behavior. When the application\
    \ context is created and support for this annotation is enabled via configuration\
    \ (this will be covered in the following section), here is what happens under\
    \ the hood: an internal infrastructure Spring-specific bean of type `org.springframework.aop.framework.autoproxy.InfrastructureAdvisorAutoProxyCreator`\
    \ is registered and acts as a bean postprocessor that modifies the service and\
    \ repository bean to add transaction-specific logic. Basically, this is the bean\
    \ that creates the transactional AOP proxy.\n\n## Configure Transactions Support\n\
    \nThe simplest way to add transaction management to the application covered in\
    \ the previous section is to do the following:\n\n*   **Configure transaction\
    \ management support**: add a declaration of a bean of type `org.springframework.jdbc.datasource.DataSourceTransactionManager`.\
    \ Using XML and activating it with the `<tx:annotation-driven ../>` (be careful\
    \ when you are using transactions XML configuration because it is a common mistake\
    \ to forget this element) configuration element provided by the `tx` namespace\
    \ is easy.\n\nThe configuration above declares a bean named `transactionManager`\
    \ and sets it as the general transaction manager for the application using `<tx:annotation-driven\
    \ ../>`. Or a Configuration class:\n\n```java\npublic class TestDataConfig {\n\
    \    ...\n    @Bean\n    public PlatformTransactionManager txManager(){\n    \
    \    return new DataSourceTransactionManager(dataSource());\n    }\n}\n```\n\n\
    And we activate it with the `@EnableTransactionManagement`:\n\n```java\nimport\
    \ org.springframework.transaction.annotation.EnableTransactionManagement;\n\n\
    @Configuration\n@EnableTransactionManagement\n@ComponentScan(basePackages = {\"\
    com.ps.repos.impl\", \"com.ps.services.impl\"})\npublic class AppConfig {\n}\n\
    ```\n\n*   **Declare transactional methods**: write a service class containing\
    \ methods that will call the `UserRepo` bean methods in a transaction. A method\
    \ that is to be executed in a transaction must be annotated with the Spring `@Transaction`\
    \ annotation. Since the transactional behavior must be propagated to the repository,\
    \ the repository class or methods are annotated with `@Transactional` too.\n\n\
    ```java\nimport org.springframework.stereotype.Service;\nimport org.springframework.transaction.annotation.Transactional;\n\
    \n@Service\npublic class UserServiceImpl implements UserService {\n    private\
    \ UserRepo userRepo;\n\n    @Autowired\n    public UserServiceImpl(UserRepo userRepo)\
    \ {\n        this.userRepo = userRepo;\n    }\n\n    @Transactional\n    @Override\n\
    \    public User findById(Long id) {\n        return userRepo.findById(id);\n\
    \    }\n}\n```"
