- fmt: '# Creating an Application Context


    In the examples provided up to now, the test classes contained a statement like
    this:


    ```

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.support.ClassPathXmlApplicationContext;

    ...

    ApplicationContext ctx = newClassPathXmlApplicationContext("classpath:spring/others/sample-config-02.xml");

    ```


    The `org.springframework.context.ApplicationContext` is the interface implemented
    by classes that provide the configuration for an application. This interface is
    an extension of the interface `org.springframework.beans.factory.BeanFactory`,
    which is the root interface for accessing a Spring Bean container. Implementations
    of `ApplicationContext` manage a number of beans definition uniquely identified
    by their name. Multiple Spring application context implementations exist, each
    one specific to a type of application. An `ApplicationContext` implementation
    provides the following:


    - access to beans using bean factory methods

    - ability to load file resources in a generic way

    - ability to publish events to registered listeners

    - ability to resolve messages and support internationalization (most used in international
    web applications)


    An application context is created by the Spring container and initialized with
    a configuration provided by a resource that can be an XML file (or more) or a
    configuration class (or more) or both. When the resource is provided as a `String`
    instance, the Spring container tries to load the resource based on the prefix
    of that `String` value. Also, based on the prefix, when instantiating an application
    context, different classes should be used. In Table [2-1](#A978-1-4842-0811-3_2_Chapter.html#Tab1)
    you can see the different prefixes that can be used when loading resources in
    Spring.


    **Table 2-1.** Prefixes and corresponding paths


    | Prefix | Location | Comment |

    | --- | --- | --- |

    | no prefix | In root directory where the class creating the context is executed
    | In the `main` or `test` directory. The Resource being loaded will have a type
    depending on the `ApplicationContext` instance being used. (A detailed example
    is presented after the table.) |

    | `classpath:` | The resource should be obtained from the classpath | In the `resources`
    directory and the resource will be of type `ClassPathResource`. If the resource
    is used to create an application context, the `ClassPathXmlApplicationContext`
    class is suitable. |

    | `file:` | In the absolute location following the prefix | Resource is loaded
    as an URL, from the filesystem and the resource will be of type `UrlResource`.
    If the resource is used to create an application context, the `FileSystemXmlApplicationContext`
    class is suitable. |

    | `http:` | In the web location following the prefix | Resource is loaded as an
    URL and the resource will be of type `UrlResource`. If the resource is used to
    create an application context, the `WebApplicationContext` class is suitable.
    |


    In order to provide the functionality for loading resources, an application context
    must implement the `org.springframework.core.io.ResourceLoader` interface. Here
    is an example of resource loading without using a prefix:


    ```

    Resource template = ctx.getResource("application-config.xml");

    ```


    Depending on the context class used, the resource loaded can have one of the following
    types:


    - If `ctx` is a `ClassPathXmlApplicationContext` instance resource type will be
    `ClassPathResource`

    - If `ctx` is a `FileSystemXmlApplicationContext` instance resource type will
    be `FileSystemResource`

    - If `ctx` is a `WebApplicationContext` instance resource type will be `ServletContextResource`


    And here is where prefixes come in. If we want to force the resource type, no
    matter what context type is used, the resource must be specified using the desired
    prefix.


    In the examples mentioned so far, all the bean definitions were in the same file,
    but for big multilayered applications, it is more appropriate to separate bean
    definitions depending on their purpose. Let’s assume that for the Pet Sitter application
    there will only be one XML configuration file. That file would look like this,
    and the second... replaces other repository beans and services bean definitions,
    one for each type of object used in the application.


    ```

    ...

    ... // other repo beans

    ```


    Testing certain components in isolation would not be possible. Mixed configurations
    are not recommended for enterprise applications. They are more suitable for applications
    used to learn Spring.


    An application context can be loaded from multiple XML files. This provides the
    opportunity to group bean definitions by their purpose, for example to separate
    infrastructure beans from application beans, because infrastructure changes between
    environments.[⁷](#A978-1-4842-0811-3_2_Chapter.html#Fn7)


    ```

    ApplicationContext ctx = new ClassPathXmlApplicationContext(

    "classpath:spring/application-config.xml",

    "classpath:spring/db-config.xml");

    ```


    In the example above, the configuration for the storage layer is decoupled from
    the rest of the application configuration in `db-config.xml`. This makes the database
    configuration easily replaceable depending on the environment. The contents of
    `db-config.xml` for production could contain a `dataSource` bean definition that
    uses a professional database such as Oracle.


    The `test-db-config.xml` file for a test environment could contain a `dataSource`
    bean definition that uses an in-memory database.


    ```

    classpath:testdb/schema.sql

    classpath:testdb/test-data.sql

    ```


    Using the `application-configuration.xml` file together with `test-db-config.xml`,
    a test environment application context can be created that can be used to run
    unit tests:


    ```

    ApplicationContext ctx = new ClassPathXmlApplicationContext(

    "classpath:spring/application-config.xml",

    "classpath:spring/test-db-config.xml");

    ```


    But as we have seen in the initial configuration snippet, we can go even further,
    and split the repository from the service components, so the `application-configuration.xml`
    file will be split in two:


    ```

    ApplicationContext ctx = new ClassPathXmlApplicationContext(

    "classpath:spring/repo-config.xml",

    "classpath:spring/service-config.xml");

    ```


    And because the file names are so similar, wildcards are supported and can be
    used to keep the code even simpler than this:


    ```

    ApplicationContext ctx = new ClassPathXmlApplicationContext(

    "classpath:spring/*-config.xml");

    ```


    In working with multiple files, in order to group them, there is also the possibility
    of enclosing them one in another using the `<import />` element. The import element
    supports prefixes in order to properly locate files and should be used when beans
    defined in separate configuration files are part of the same logical group. The
    following code and configuration snippet depicts how configuration files can be
    imported. In Figure [2-13](#A978-1-4842-0811-3_2_Chapter.html#Fig13), the content
    of a resources directory is depicted.


    ![A978-1-4842-0811-3_2_Fig13_HTML.jpg](A978-1-4842-0811-3_2_Fig13_HTML.jpg)


    **Figure 2-13.** Spring configuration files in a resources directory


    The file `application-config.xml` directory should enclose all the files named
    `sample-config-*` under directories `ctr`, `set`, and others so the application
    context can be created like this:


    ```

    ApplicationContext ctx = new ClassPathXmlApplicationContext(

    "classpath:spring/application-config.xml");

    ```


    Using different prefixes, for learning purposes of course, here is how the files
    can be imported:


    Since this is the end of an important section, there is a task for you. In project
    `02-ps-container-01-practice` there is a configuration file that has gotten a
    little too big:


    ```

    02-ps-container-01-practice/src/main/resources/spring/others/sample-config-01.xml.

    ```'
  raw: '#### Creating an Application Context


    In the examples provided up to now, the test classes contained a statement like
    this:


    ```

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.support.ClassPathXmlApplicationContext;

    ...

    ApplicationContext ctx = newClassPathXmlApplicationContext("classpath:spring/others/sample-config-02.xml");

    ```


    The `org.springframework.context.ApplicationContext` is the interface implemented
    by classes that provide the configuration for an application. This interface is
    an extension of the interface `org.springframework.beans.factory.BeanFactory`,
    which is the root interface for accessing a Spring Bean container. Implementations
    of `ApplicationContext` manage a number of beans definition uniquely identified
    by their name. Multiple Spring application context implementations exist, each
    one specific to a type of application. An `ApplicationContext` implementation
    provides the following:


    *   access to beans using bean factory methods

    *   ability to load file resources in a generic way

    *   ability to publish events to registered listeners

    *   ability to resolve messages and support internationalization (most used in
    international web applications)


    An application context is created by the Spring container and initialized with
    a configuration provided by a resource that can be an XML file (or more) or a
    configuration class (or more) or both. When the resource is provided as a String
    instance, the Spring container tries to load the resource based on the prefix
    of that String value. Also, based on the prefix, when instantiating an application
    context, different classes should be used. In Table [2-1](#A978-1-4842-0811-3_2_Chapter.html#Tab1)
    you can see the different prefixes that can be used when loading resources in
    Spring.


    Table 2-1.


    Prefixes and corresponding paths


    | Prefix | Location | Comment |

    | --- | --- | --- |

    | no prefix | In root directory where the class creating the context is executed
    | In the `main` or `test` directory. The Resource being loaded will have a type
    depending on the ApplicationContext instance being used. (A detailed example is
    presented after the table.) |

    | `classpath:` | The resource should be obtained from the classpath | In the `resources`
    directory and the resource will be of type ClassPathResource. If the resource
    is used to create an application context, the `ClassPathXmlApplicationContext`
    class is suitable. |

    | `file:` | In the absolute location following the prefix | Resource is loaded
    as an URL, from the filesystem and the resource will be of type UrlResource. If
    the resource is used to create an application context, the `FileSystemXmlApplicationContext`
    class is suitable. |

    | `http:` | In the web location following the prefix | Resource is loaded as an
    URL and the resource will be of type UrlResource. If the resource is used to create
    an application context, the `WebApplicationContext` class is suitable. |


    In order to provide the functionality for loading resources, an application context
    must implement the `org.springframework.core.io.ResourceLoader` interface. Here
    is an example of resource loading without using a prefix:


    ```

    Resource template = ctx.getResource("application-config.xml");

    ```


    Depending on the context class used, the resource loaded can have one of the following
    types :


    *   If `ctx` is a `ClassPathXmlApplicationContext` instance resource type will
    be `ClassPathResource`

    *   If `ctx` is a `FileSystemXmlApplicationContext` instance resource type will
    be `FileSystemResource`

    *   If `ctx` is a `WebApplicationContext` instance resource type will be `ServletContextResource`


    And here is where prefixes come in. If we want to force the resource type, no
    matter what context type is used, the resource must be specified using the desired
    prefix.


    In the examples mentioned so far, all the bean definitions were in the same file,
    but for big multilayered applications, it is more appropriate to separate bean
    definitions depending on their purpose. Let’s assume that for the Pet Sitter application
    there will only be one XML configuration file. That file would look like this,
    and the second... replaces other repository beans and services bean definitions,
    one for each type of object used in the application.


    ```


    ...


    ... // other repo beans


    ```


    Testing certain components in isolation would not be possible. Mixed configurations
    are not recommended for enterprise applications. They are more suitable for applications
    used to learn Spring.


    An application context can be loaded from multiple XML files. This provides the
    opportunity to group bean definitions by their purpose, for example to separate
    infrastructure beans from application beans, because infrastructure changes between
    environments.[⁷](#A978-1-4842-0811-3_2_Chapter.html#Fn7)


    ```

    ApplicationContext ctx = new ClassPathXmlApplicationContext(

    "classpath:spring/application-config.xml",

    "classpath:spring/db-config.xml");

    ```


    In the example above, the configuration for the storage layer is decoupled from
    the rest of the application configuration in `db-config.xml`. This makes the database
    configuration easily replaceable depending on the environment. The contents of
    `db-config.xml` for production could contain a `dataSource` bean definition that
    uses a professional database such as Oracle.


    The `test-db-config.xml` file for a test environment could contain a `dataSource`
    bean definition that uses an in-memory database.


    ```


    classpath:testdb/schema.sql

    classpath:testdb/test-data.sql


    ```


    Using the `application-configuration.xml` file together with `test-db-config.xml`,
    a test environment application context can be created that can be used to run
    unit tests :


    ```

    ApplicationContext ctx = new ClassPathXmlApplicationContext(

    "classpath:spring/application-config.xml",

    "classpath:spring/test-db-config.xml");

    ```


    But as we have seen in the initial configuration snippet, we can go even further,
    and split the repository from the service components, so the `application-configuration.xml`
    file will be split in two:


    ```

    ApplicationContext ctx = new ClassPathXmlApplicationContext(

    "classpath:spring/repo-config.xml",

    "classpath:spring/service-config.xml");

    ```


    And because the file names are so similar, wildcards are supported and can be
    used to keep the code even simpler than this:


    ```

    ApplicationContext ctx = new ClassPathXmlApplicationContext(

    "classpath:spring/*-config.xml");

    ```


    In working with multiple files, in order to group them, there is also the possibility
    of enclosing them one in another using the `<import />` element. The import element
    supports prefixes in order to properly locate files and should be used when beans
    defined in separate configuration files are part of the same logical group. The
    following code and configuration snippet depicts how configuration files can be
    imported. In Figure [2-13](#A978-1-4842-0811-3_2_Chapter.html#Fig13), the content
    of a resources directory is depicted.


    ![A978-1-4842-0811-3_2_Fig13_HTML.jpg](A978-1-4842-0811-3_2_Fig13_HTML.jpg)


    Figure 2-13.


    Spring configuration files in a resources directory


    The file `application-config.xml` directory should enclose all the files named
    `sample-config-*` under directories ctr, set, and others so the application context
    can be created like this:


    ```

    ApplicationContext ctx = new ClassPathXmlApplicationContext(

    "classpath:spring/application-config.xml");

    ```


    Using different prefixes, for learning purposes of course, here is how the files
    can be imported:


    !


    Since this is the end of an important section, there is a task for you. In project
    `02-ps-container-01-practice` there is a configuration file that has gotten a
    little too big:


    ```

    02-ps-container-01-practice/src/main/resources/spring/others/sample-config-01.xml.

    ```'
