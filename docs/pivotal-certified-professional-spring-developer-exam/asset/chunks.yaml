    Hessian 客户端代理工厂 Bean 和服务器服务导出器

    可以使用 Java 配置进行配置。如果你有足够的信心，还可以作为额外练习自行实现。本节使用的源代码可以在 Pet Sitter 项目的 `12-ps-remoting-sample`
    和 `12-ps-remoting-practice` 模块中找到。`12-ps-remoting-practice` 项目包含使用 XML 配置的 Http
    Invoker 和 Hessian 远程处理的服务器端和客户端实现。`12-ps-remoting-solution` 是使用 Java 配置的 HttpInvoker
    和 Hessian 的推荐解决方案。你可以将此解决方案与你将在 `12-ps-remoting-practice` 中实现的方案进行比较。


    Spring JMS


    JMS 是 Java 平台企业版的一部分，由 JSR 914 定义。⁴ 它是一种消息传递标准，允许基于 JEE 的应用程序组件创建、发送、接收和读取消息。JMS
    应用程序的基本构建块包括：


    *   消息

    *   消息生产者（发布者）

    *   消息消费者（订阅者）

    *   连接

    *   会话

    *   连接工厂

    *   目的地


    在图 7-8 中，你可以看到前面列出的所有组件以及它们如何融入 JMS 应用程序。


    ![A978-1-4842-0811-3_7_Fig8_HTML.jpg](img/A978-1-4842-0811-3_7_Fig8_HTML.jpg)


    图 7-8.


    JMS API 编程模型


    在本章的引言中提到，JMS 是访问面向消息中间件的一种抽象，有助于避免供应商锁定并提高可移植性。在本节中，将简要描述上述组件，以及使用 Spring 通过
    JMS 代理发布和订阅消息的过程，因为你可能已经猜到，Spring 也让 JMS 的使用变得非常简单。Spring 提供了一个 JMS 集成框架，使得使用
    JMS API 变得容易。该框架采用了类似于 Spring JDBC 的方法进行开发。


    JMS 连接和会话


    连接工厂和目的地是 JMS 应用程序中通过管理方式而非编程方式维护的部分，因为提供实现的技术必须与所使用的 JMS API 实现解耦。JMS 客户端通过 JMS
    API 标准接口访问这些对象。在企业应用程序中，连接工厂可以绑定到 JNDI，并由企业应用服务器进行外部管理。JMS 连接从连接工厂获取，该工厂被注入到客户端中。


    ```

    //XML 独立示例


    //从 JNDI 检索的 XML 连接工厂


    // 使用 Java 配置声明连接工厂

    //JNDI 名称为 jms/ConnectionFactory

    @Resource(lookup = "jms/ConnectionFactory")

    private static ConnectionFactory connectionFactory;

    // 独立示例

    @Bean ConnectionFactory connectionFactory(){

    ActiveMQConnectionFactory connectionFactory =

    new ActiveMQConnectionFactory();

    connectionFactory.setBrokerURL("tcp://localhost:60006");

    return connectionFactory;

    }

    // 经典配置

    import javax.naming.Context;

    import javax.naming.InitialContext;

    import javax.jms.*;

    ...

    Properties properties = new Properties();

    properties.put( /* JNDI 属性 */ );

    Context context = new InitialContext(properties);

    ConnectionFactory factory = (ConnectionFactory) context.lookup("jms/ConnectionFactory");

    ```


    一旦获取了连接工厂，剩下的就是获取一个 `javax.jms.Connection`，然后启动一个 `javax.jms.Session` 来开始处理消息：


    ```

    Connection connection = factory.createConnection();

    connection.start();

    Session session = connection.createSession(false, Session.AUTO_ACKNOWLEDGE);

    // 处理消息

    ...

    ```


    `createSession` 方法有两个参数：第一个是布尔类型，用于确定会话是否应支持事务（当使用 `false` 作为参数时，生成的会话不支持事务）；第二个参数用于确定会话是否在消息成功接收后自动确认消息。在前面的示例中，由于提供了
    `Session.AUTO_ACKNOWLEDGE` 作为参数，生成的会话将自动执行此操作。


    JMS 会话代表一个工作单元。当消息处理完成后，必须根据处理结果提交或回滚会话。


    ```

    session.commit(); // 一切正常

    // 或

    session.rollback(); // 出现错误

    ```


    `Session` 对象负责创建将发送给客户端的消息。


    JMS 消息


    JMS API 定义了 JMS 消息的标准形式，该形式应在所有 JMS 提供者之间可移植。尽管 JMS API 旨在适应许多现有的 JMS 提供者，但消息具有标准结构，由头部和主体组成。头部包含所有消息共有的系统级信息，例如目的地和发送时间，以及存储为关键字/值属性的应用程序特定信息。主体包含有效的应用程序数据，JMS
    定义了五种不同的消息主体类型，表示为扩展 `javax.jms.Message` 的 Java 接口。因此，JMS 消息主体是实现 `javax.jms.Message`
    层次结构中任何接口的类的实例。表 7-1 列出了 JMS API 定义的五种主体类型。


    表 7-1.


    JMS 消息格式


    消息类型 | 消息内容

    --- | ---

    `javax.jms.TextMessage` | 一个 Java String 对象

    `javax.jms.MapMessage` | 一组键值对，键为 String 类型，值为原始类型，无固定顺序。

    `javax.jms.BytesMessage` | 一个未解释的字节流。

    `javax.jms.StreamMessage` | Java 编程语言中的原始值流，按顺序填充和读取。

    `javax.jms.ObjectMessage` | Java 编程语言中的一个 Serializable 对象


    消息由 `Session` 对象创建，以下代码片段展示了如何创建上表中列出的每种类型的消息：


    ```

    TextMessage message = session.createTextMessage();

    message.setText("这是一条文本消息");

    MapMessage mm = session.createMapMessage();

    mm.set("key", "value");

    session.createBytesMessage("字节数组".getBytes());

    ```


    ```

    streamMessage = session.createStreamMessage();

    // 向其写入原始值

    streamMessage.writeBoolean(false);

    streamMessage.writeInt(223344);

    streamMessage.writeChar(''q'');

    // 清空流

    streamMessage.reset();

    // 用户必须是可序列化的

    session.createObjectMessage(user);

    ```


    JMS 目的地


    `javax.jms.Destination` 接口在客户端实现，用于指定客户端生成消息的目标以及客户端消费消息的来源，因为客户端应用程序也可以生成消息，这些消息可以作为回复发送给与其通信的
    JMS 应用程序。想象一下这个场景：JMS 服务器应用程序向 JMS 客户端应用程序发送一条数据消息，客户端回复一条确认消息，表示数据已收到。根据消息传递域的不同，实现也有所不同：


    *   点对点域中的队列，每条消息有一个生产者和一个消费者。

    *   发布者/订阅者域中的主题，每条发布的消息由多个订阅者消费。


