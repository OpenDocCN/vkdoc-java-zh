- fmt: "DAO（Repository）层之后是Service层。该层由对实体对象进行修改的类组成，然后将修改后的对象传递给Repository以持久化到存储支持（数据库）中。Service层是Web层和DAO层之间的桥梁，也是本书的重点。它由专门的类组成，这些类协同工作以实现不特定于Web或数据访问的行为。它也被称为业务层，因为大多数应用程序业务逻辑都在这里实现。每个Service类实现一个接口，该接口定义了它必须实现的方法以提供所需的行为。每个Service类使用一个或多个Repository字段来管理实体对象。通常，对于每个实体类型，也存在一个Service类，但也可以定义更复杂的服务，这些服务可以使用多个实体类型来执行复杂任务。在本书的代码中，这样的一个类是`SimpleOperationsService`服务，它包含用于执行常见Pet\
    \ Sitter操作（例如创建Pet Sitter请求、接受响应、关闭请求和评价Pet Owner）的方法。\n\n最复杂的Service类名为`SimpleOperationsService`，该Service类可用于创建响应、接受响应或关闭请求。在图[2-3](#A978-1-4842-0811-3_2_Chapter.html#Fig3)中，描绘了所有Service类和接口。\n\
    \n![A978-1-4842-0811-3_2_Fig3_HTML.jpg](A978-1-4842-0811-3_2_Fig3_HTML.jpg)\n\n\
    图2-3. Service接口和实现\n\n这里介绍的所有类都是用于组装以创建管理用户数据的应用程序的部件。在生产环境中，需要实例化一个Service类，并为其设置一个Repository实例，以便能够正确管理数据。运行在生产环境中的应用程序支持复杂操作，例如事务、安全性、消息传递、远程访问和缓存。它们连接到其他应用程序和软件组件。为了测试它们，必须隔离其中的部分组件，并且一些不是测试对象的组件将被简化的实现所替代。在测试环境中，可以使用桩（stub）或模拟（mock）实现来替代不打算被测试过程覆盖的实现。在图[2-4](#A978-1-4842-0811-3_2_Chapter.html#Fig4)中，您可以看到一个Service类及其在生产环境和测试环境中所需的依赖关系。\n\
    \n![A978-1-4842-0811-3_2_Fig4_HTML.jpg](A978-1-4842-0811-3_2_Fig4_HTML.jpg)\n\n\
    图2-4. 不同运行环境中的Service类及其依赖关系\n\n与上图相关的代码片段如下所示，它是`SimpleOperationsService`类定义的一部分。\n\
    \n```java\npublic class SimpleOperationsService\nimplements OperationsService\
    \ {\nprivate UserRepo userRepo;\n...\npublic void setUserRepo(UserRepo userRepo)\
    \ {\nthis.userRepo = userRepo;\n}\n}\n```\n\n如您所见，依赖关系是使用抽象类型（在本例中为`UserRepo`接口）定义的，因此可以提供任何实现。因此，在生产环境中，将提供一个`JdbcUserRepo`类型的实例，并且该类型将被定义为实现`UserRepo`接口。\n\
    \n```java\npublic class JdbcUserRepo extends JdbcAbstractRepo\nimplements UserRepo\
    \ {\n//implementation not relevant at this point\n...\n}\n```\n\n创建`SimpleOperationsService`类型的实例需要以下步骤：\n\
    \n1.  实例化并初始化Repository实例\n\n```java\n    JdbcUserRepo userRepo = new JdbcUserRepo(...);\n\
    ```\n\n2.  实例化Service类\n\n```java\n    OperationsService service = new SimpleOperationsService();\n\
    ```\n\n3.  注入依赖关系\n\n```java\n    service.setUserRepo(repo);\n```\n\n在测试环境中，只要实现了相同的接口，使用模拟（mock）或桩（stub）即可：\n\
    \n```java\npublic class StubUserRepo extends StubAbstractRepo\nimplements UserRepo\
    \ {\n//implementation not relevant at this point\n...\n}\n```\n\n对于测试环境，组装步骤是相同的：\n\
    \n```java\n1. StubUserRepo userRepo = new StubUserRepo(...);\n2. OperationsService\
    \ service = new SimpleOperationsService();\n3. service.setUserRepo(repo);\n```\n\
    \nSpring将使组装组件变得非常愉快。使用Spring，根据环境切换组件也是切实可行的。由于连接组件非常容易，编写测试也变得轻而易举，因为每个部分都可以与其他部分隔离并进行测试，而不会受到任何未知影响。Spring通过`spring-test.jar`库为编写测试提供支持。\n\
    \n现在您已经了解了Spring可以帮助您做什么，我们邀请您体验一下没有Spring时事情是如何完成的。查看`01-ps-start-practice`项目。在`SimpleOperationsService`类中，有一个名为`createResponse`的方法需要实现。创建`Response`实例的步骤如下：\n\
    \n1.  使用`userRepo`检索Sitter `User`实例\n2.  使用`requestRepo`检索`Request`实例\n3.  实例化一个`Response`实例\n\
    4.  填充`Response`实例：\n    *   将响应状态设置为`ResponseStatus.PROPOSED`\n    *   将用户设置为Sitter实例\n\
    \    *   使用示例文本设置详细信息\n    *   将响应添加到请求对象\n    *   使用`responseRepo`保存响应对象\n\n\
    图[2-5](#A978-1-4842-0811-3_2_Chapter.html#Fig5)描绘了操作序列。\n\n![A978-1-4842-0811-3_2_Fig5_HTML.jpg](A978-1-4842-0811-3_2_Fig5_HTML.jpg)\n\
    \n图2-5. Service类及其依赖关系\n\n要运行实现，请在测试目录下搜索类`com.ps.repo.services.SimpleOperationsServiceTest`。在此类内部，有一个使用`@Test`注解的方法。这是一个JUnit注解。有关测试工具的更多详细信息，请参阅第[3](#A978-1-4842-0811-3_3_Chapter.html)章“测试Spring应用程序”。要在Intellij\
    \ IDEA中运行单元测试，只需右键单击方法名称，将显示一个类似图[2-6](#A978-1-4842-0811-3_2_Chapter.html#Fig6)的菜单。选择`Run`选项运行测试。如果要调试模式运行测试并检查字段值，请选择`Debug`。\n\
    \n![A978-1-4842-0811-3_2_Fig6_HTML.jpg](A978-1-4842-0811-3_2_Fig6_HTML.jpg)\n\n\
    图2-6. Intellij IDEA中的JUnit测试上下文菜单\n\n如果实现不正确，测试将失败，并且在Intellij IDEA控制台中您应该会看到类似于图[2-7](#A978-1-4842-0811-3_2_Chapter.html#Fig7)所示的内容。是的，红色进度条是测试失败的明显标志。\n\
    \n![A978-1-4842-0811-3_2_Fig7_HTML.jpg](A978-1-4842-0811-3_2_Fig7_HTML.jpg)\n\n\
    图2-7. Intellij IDEA中的JUnit测试失败\n\n如果实现正确，测试将通过，并且Intellij IDEA控制台中出现大量绿色（如图[2-8](#A978-1-4842-0811-3_2_Chapter.html#Fig8)所示）表明一切正常。\n\
    \n![A978-1-4842-0811-3_2_Fig8_HTML.jpg](A978-1-4842-0811-3_2_Fig8_HTML.jpg)\n\n\
    图2-8. Intellij IDEA中的JUnit测试通过\n\n您可以通过将实现与`01-ps-start-solution`中提供的代码进行比较来检查解决方案。"
  raw: "The next layer after the dao (repository) layer is the service layer. This\
    \ layer is composed of classes doing modifications to the entity objects before\
    \ being passed on to the repositories for persisting the changes to the storage\
    \ support (database). The service layer is the bridge between the web layer and\
    \ the dao layer and will be the main focus of the book. It is composed of specialized\
    \ classes that work together in order to implement behavior that is not specific\
    \ to web or data access. It is also called the business layer, because most of\
    \ the application business logic is implemented here. Each service class implements\
    \ an interface that defines the methods that it must implement to provide the\
    \ desired behavior. Each service class uses one or more repository fields to manage\
    \ entity objects. Typically, for each entity type, a service class also exists,\
    \ but also more complex services can be defined that can use multiple entity types\
    \ in order to perform complex tasks. In the code for this book, such a class is\
    \ the `SimpleOperationsService` service, which contains methods useful for executing\
    \ common Pet Sitter operations such as create a pet sitter request, accept a response,\
    \ close a request, and rate the pet owner.\n\nThe most complex service class is\
    \ called `SimpleOperationsService`, and this service class can be used to create\
    \ a response, accept a response, or close a request. In Figure [2-3](#A978-1-4842-0811-3_2_Chapter.html#Fig3)\
    \ all the service classes and interfaces are depicted.\n\n![A978-1-4842-0811-3_2_Fig3_HTML.jpg](A978-1-4842-0811-3_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3.\n\nService interfaces and implementations\n\nAll the classes presented\
    \ here are parts that will be assembled to create an application that will manage\
    \ user data. In a production environment, a service class needs to be instantiated,\
    \ and a repository instance must be set for it so data can be managed properly.\
    \ Applications running in production support complex operations such as transactions,\
    \ security, messaging, remote access, and caching. They are connected to other\
    \ applications and software components. In order to test them, pieces of them\
    \ have to be isolated, and some of them that are not the object of testing are\
    \ replaced with simplified implementations. In a test environment, stub or mock\
    \ implementations can be used to replace implementations that are not meant to\
    \ be covered by the testing process. In Figure [2-4](#A978-1-4842-0811-3_2_Chapter.html#Fig4),\
    \ you can see a service class and a dependency needed for it in a production and\
    \ test environment side by side.\n\n![A978-1-4842-0811-3_2_Fig4_HTML.jpg](A978-1-4842-0811-3_2_Fig4_HTML.jpg)\n\
    \nFigure 2-4.\n\nService class and its dependency in different running environments\n\
    \nThe code snippet relevant to the previous image is depicted below and is a piece\
    \ of the SimpleOperationsService class definition.\n\n```\npublic class SimpleOperationsService\n\
    implements OperationsService {\nprivate UserRepo userRepo;\n...\npublic void setUserRepo(UserRepo\
    \ userRepo) {\nthis.userRepo = userRepo;\n}\n}\n```\n\nAs you can see, the dependency\
    \ is defined using an abstract type, in this case, the `UserRepo` interface, so\
    \ any implementation can be provided. So in a production environment, an instance\
    \ of type `JdbcUserRepo` will be provided, and that type will be defined to implement\
    \ the `UserRepo` interface.\n\n```\npublic class JdbcUserRepo extends JdbcAbstractRepo\n\
    implements UserRepo {\n//implementation not relevant at this point\n...\n}\n```\n\
    \nThe creation of an instance of type `SimpleOperationsService` will require the\
    \ following steps:\n\n1.  instantiate and initialize the repository instance\n\
    \n```\n    JdbcUserRepo userRepo = new JdbcUserRepo(...);\n    ```\n\n2.  instantiate\
    \ the service class\n\n```\n    OperationsService service = new SimpleOperationsService();\n\
    \    ```\n\n3.  inject the dependency\n\n```\n    service.setUserRepo(repo);\n\
    \    ```\n\nIn a test environment, a mock or a stub will do, as long as it implements\
    \ the same interface:\n\n```\npublic class StubUserRepo extends StubAbstractRepo\n\
    implements UserRepo {\n//implementation not relevant at this point\n...\n}\n```\n\
    \nFor the test environment, the assembling steps are the same:\n\n```\n1\\. StubUserRepo\
    \ userRepo = new StubUserRepo(...);\n2\\. OperationsService service = new SimpleOperationsService();\n\
    3\\. service.setUserRepo(repo);\n```\n\nSpring will help assembling the components\
    \ a very pleasant job. Swapping them depending on the environment is also possible\
    \ in a practical manner with Spring. Because connecting components is so easy,\
    \ writing tests becomes a breeze also, since each part can be isolated from the\
    \ others and tested without any unknown influence. Spring provides support for\
    \ writing tests via the spring-test.jar library.\n\n!\n\nAnd now that you know\
    \ what Spring can help you with, you are invited to have a taste of how things\
    \ are done without it. Take a look at the `01-ps-start-practice` project. In the\
    \ `SimpleOperationsService` class there is a method named `createResponse` that\
    \ needs an implementation. The steps to create a `Response` instance are:\n\n\
    1.  retrieve the sitter `User` instance using `userRepo`  \n2.  retrieve the `Request`\
    \ instance using `requestRepo`  \n3.  instantiate a `Response` instance  \n4.\
    \  populate the `Response` instance:\n    *   set the response status to `ResponseStatus.PROPOSED`\n\
    \    *   set the user to the sitter instance\n    *   set details with a sample\
    \ text\n    *   add the response to the request object\n    *   save the response\
    \ object using the verb|responseRepo|\n\nFigure [2-5](#A978-1-4842-0811-3_2_Chapter.html#Fig5)\
    \ depicts the sequence of operations.\n\n![A978-1-4842-0811-3_2_Fig5_HTML.jpg](A978-1-4842-0811-3_2_Fig5_HTML.jpg)\n\
    \nFigure 2-5.\n\nService class and its dependency\n\nTo run the implementation,\
    \ search for the class `com.ps.repo.services.SimpleOperationsServiceTest` under\
    \ the test directory. Inside this class there is a method annotated with `@Test`.\
    \ This is a JUnit annotation. More details about testing tools are covered in\
    \ Chapter [3](#A978-1-4842-0811-3_3_Chapter.html) . Testing Spring Applications.\
    \ In order to run a unit test in Intellij IDEA, just click right on the method\
    \ name, and a menu like the one in Figure [2-6](#A978-1-4842-0811-3_2_Chapter.html#Fig6)\
    \ will be displayed. Select the `Run` option to run the test. Select `Debug` if\
    \ you want to run the test in debug mode and check field values.\n\n![A978-1-4842-0811-3_2_Fig6_HTML.jpg](A978-1-4842-0811-3_2_Fig6_HTML.jpg)\n\
    \nFigure 2-6.\n\nJUnit test contextual menu in Intellij IDEA\n\nIf the implementation\
    \ is not correct, the test will fail, and in the Intellij IDEA console you should\
    \ see something similar to what is depicted in Figure [2-7](#A978-1-4842-0811-3_2_Chapter.html#Fig7).\
    \ And yes, a red progress bar is a clear sign that the test failed.\n\n![A978-1-4842-0811-3_2_Fig7_HTML.jpg](A978-1-4842-0811-3_2_Fig7_HTML.jpg)\n\
    \nFigure 2-7.\n\nJUnit test failure in Intellij IDEA\n\nIf the implementation\
    \ is correct, the test will pass, and a lot of green in the Intellij IDEA console,\
    \ as in Figure [2-8](#A978-1-4842-0811-3_2_Chapter.html#Fig8), is a sign that\
    \ everything went ok.\n\n![A978-1-4842-0811-3_2_Fig8_HTML.jpg](A978-1-4842-0811-3_2_Fig8_HTML.jpg)\n\
    \nFigure 2-8.\n\nJUnit test passed in Intellij IDEA\n\nYou can check the solution\
    \ by comparing it with the proposed code from the `01-ps-start-solution`."
  trans: "\n在 DAO（数据访问对象）层之后的下一个层次是服务层。该层由一些类组成，这些类负责在将实体对象传递给仓库以持久化更改到存储支持（数据库）之前，对其进行修改。服务层是\
    \ Web 层和 DAO 层之间的桥梁，也是本书的重点。它由专门的类组成，这些类协同工作以实现不特定于 Web 或数据访问的行为。它也被称为业务层，因为大多数应用程序业务逻辑都在这里实现。每个服务类都实现一个接口，该接口定义了它必须实现的方法以提供所需的行为。每个服务类使用一个或多个仓库字段来管理实体对象。通常，对于每种实体类型，也存在一个对应的服务类，但也可以定义更复杂的服务，这些服务可以使用多种实体类型来执行复杂任务。在本书的代码中，这样的一个类是\
    \ `SimpleOperationsService` 服务，它包含用于执行常见宠物保姆操作的方法，例如创建宠物保姆请求、接受响应、关闭请求以及对宠物主人进行评分。\n\
    \n最复杂的服务类叫做 `SimpleOperationsService`，这个服务类可用于创建响应、接受响应或关闭请求。在图 2-3 中，描绘了所有的服务类和接口。\n\
    \n![A978-1-4842-0811-3_2_Fig3_HTML.jpg](img/A978-1-4842-0811-3_2_Fig3_HTML.jpg)\n\
    \n图 2-3.\n\n服务接口与实现\n\n这里介绍的所有类都是用于组装成一个管理用户数据的应用程序的部件。在生产环境中，需要实例化一个服务类，并且必须为其设置一个仓库实例，以便能够正确地管理数据。运行在生产环境中的应用程序支持诸如事务、安全、消息传递、远程访问和缓存等复杂操作。它们与其他应用程序和软件组件相连。为了测试它们，必须隔离其中的部分组件，并且一些非测试对象的组件会被简化的实现所替代。在测试环境中，可以使用桩（stub）或模拟（mock）实现来替代那些不打算被测试过程覆盖的实现。在图\
    \ 2-4 中，你可以看到一个服务类及其在生产环境和测试环境中所需的依赖关系并列展示。\n\n![A978-1-4842-0811-3_2_Fig4_HTML.jpg](img/A978-1-4842-0811-3_2_Fig4_HTML.jpg)\n\
    \n图 2-4.\n\n不同运行环境下的服务类及其依赖关系\n\n与上图相关的代码片段如下所示，它是 `SimpleOperationsService` 类定义的一部分。\n\
    \n```\npublic class SimpleOperationsService\nimplements OperationsService {\n\
    private UserRepo userRepo;\n...\npublic void setUserRepo(UserRepo userRepo) {\n\
    this.userRepo = userRepo;\n}\n}\n```\n\n如你所见，依赖关系是使用抽象类型定义的，在本例中是 `UserRepo` 接口，因此可以提供任何实现。所以在生产环境中，将提供一个\
    \ `JdbcUserRepo` 类型的实例，并且该类型将被定义为实现 `UserRepo` 接口。\n\n```\npublic class JdbcUserRepo\
    \ extends JdbcAbstractRepo\nimplements UserRepo {\n// 此处的实现不相关\n...\n}\n```\n\n\
    创建一个 `SimpleOperationsService` 类型的实例需要以下步骤：\n\n1.  实例化并初始化仓库实例\n\n```\n    JdbcUserRepo\
    \ userRepo = new JdbcUserRepo(...);\n    ```\n\n2.  实例化服务类\n\n```\n    OperationsService\
    \ service = new SimpleOperationsService();\n    ```\n\n3.  注入依赖\n\n```\n    service.setUserRepo(repo);\n\
    \    ```\n\n在测试环境中，只要实现了相同的接口，使用模拟对象或桩对象即可：\n\n```\npublic class StubUserRepo\
    \ extends StubAbstractRepo\nimplements UserRepo {\n// 此处的实现不相关\n...\n}\n```\n\n\
    对于测试环境，组装步骤是相同的：\n\n```\n1\\. StubUserRepo userRepo = new StubUserRepo(...);\n\
    2\\. OperationsService service = new SimpleOperationsService();\n3\\. service.setUserRepo(repo);\n\
    ```\n\nSpring 将使组装组件成为一件非常愉快的工作。使用 Spring，根据环境切换组件也是切实可行的。由于连接组件非常容易，编写测试也变得轻而易举，因为每个部分都可以与其他部分隔离并进行测试，而不会受到任何未知影响。Spring\
    \ 通过 `spring-test.jar` 库为编写测试提供支持。\n\n!\n\n现在你已经了解了 Spring 能帮助你做什么，我们邀请你体验一下没有它时事情是如何完成的。请查看\
    \ `01-ps-start-practice` 项目。在 `SimpleOperationsService` 类中有一个名为 `createResponse`\
    \ 的方法需要实现。创建一个 `Response` 实例的步骤如下：\n\n1.  使用 `userRepo` 检索保姆 `User` 实例  \n2. \
    \ 使用 `requestRepo` 检索 `Request` 实例  \n3.  实例化一个 `Response` 实例  \n4.  填充 `Response`\
    \ 实例：\n    *   将响应状态设置为 `ResponseStatus.PROPOSED`\n    *   将用户设置为保姆实例\n    * \
    \  使用示例文本设置详细信息\n    *   将响应添加到请求对象中\n    *   使用 `responseRepo` 保存响应对象\n\n图 2-5\
    \ 描绘了操作顺序。\n\n![A978-1-4842-0811-3_2_Fig5_HTML.jpg](img/A978-1-4842-0811-3_2_Fig5_HTML.jpg)\n\
    \n图 2-5.\n\n服务类及其依赖关系\n\n要运行该实现，请在测试目录下查找 `com.ps.repo.services.SimpleOperationsServiceTest`\
    \ 类。在这个类中，有一个用 `@Test` 注解的方法。这是一个 JUnit 注解。关于测试工具的更多细节将在第 3 章“测试 Spring 应用程序”中介绍。为了在\
    \ Intellij IDEA 中运行单元测试，只需右键单击方法名称，就会显示一个类似图 2-6 的菜单。选择 `Run` 选项来运行测试。如果你想在调试模式下运行测试并检查字段值，请选择\
    \ `Debug`。\n\n![A978-1-4842-0811-3_2_Fig6_HTML.jpg](img/A978-1-4842-0811-3_2_Fig6_HTML.jpg)\n\
    \n图 2-6.\n\nIntellij IDEA 中的 JUnit 测试上下文菜单\n\n如果实现不正确，测试将失败，并且在 Intellij IDEA\
    \ 控制台中你应该会看到类似于图 2-7 所示的内容。是的，红色的进度条清楚地表明测试失败了。\n\n![A978-1-4842-0811-3_2_Fig7_HTML.jpg](img/A978-1-4842-0811-3_2_Fig7_HTML.jpg)\n\
    \n图 2-7.\n\nIntellij IDEA 中的 JUnit 测试失败\n\n如果实现正确，测试将通过，并且 Intellij IDEA 控制台中会出现大量绿色，如图\
    \ 2-8 所示，这表明一切正常。\n\n![A978-1-4842-0811-3_2_Fig8_HTML.jpg](img/A978-1-4842-0811-3_2_Fig8_HTML.jpg)\n\
    \n图 2-8.\n\nIntellij IDEA 中的 JUnit 测试通过\n\n你可以通过将你的实现与 `01-ps-start-solution`\
    \ 项目中提供的代码进行比较来检查解决方案。\n"
- fmt: '# Spring IoC and Dependency Injection


    At the beginning of this chapter, it was mentioned that creating objects and assembling
    them is what Spring does. The Spring Framework Inversion of Control (IoC) component
    is the nucleus of the framework. It uses dependency injection to assemble Spring-provided
    (also called infrastructure components) and development-provided components in
    order to rapidly wrap up an application. Figure [2-9](#A978-1-4842-0811-3_2_Chapter.html#Fig9)
    depicts where the Spring IoC fits in the application development process.


    ![A978-1-4842-0811-3_2_Fig9_HTML.jpg](A978-1-4842-0811-3_2_Fig9_HTML.jpg)


    Figure 2-9. Spring IoC purpose


    The application being developed over the course of this book includes service
    classes that are built using repository instances. For example, this is how a
    `UserService` implementation can be defined:


    ```

    public class SimpleUserService extends SimpleAbstractService

    implements UserService {

    private UserRepo repo;

    public SimpleUserService(UserRepo userRepo) {

    this.repo = userRepo;

    }

    ...

    }

    ```


    As you can see, the dependency is injected using a constructor, so creating the
    service instance requires a repository instance to be provided as a parameter.
    The repository instance is needed in order to retrieve and persist `User` objects
    in the database. The repository can be defined like this:


    ```

    import javax.sql.DataSource;

    public class JdbcUserRepo extends JdbcAbstractRepo {

    public JdbcUserRepo(DataSource dataSource) {

    super(dataSource);

    }

    ...

    }

    //JdbcAbstractRepo.java contains common

    //implementation for all repository classes

    import javax.sql.DataSource;

    public class JdbcAbstractRepo

    implements AbstractRepo {

    protected DataSource dataSource;

    public JdbcAbstractRepo(DataSource dataSource) {

    this.dataSource = dataSource;

    }

    @Override

    public void save(T entity) {...}

    @Override

    public void delete(T entity) {... }

    @Override

    public void deleteById(Long entityId) {...}

    @Override

    public T findById(Long entityId) {...}

    }

    ```


    In order to create a repository instance, a `DataSource` instance is needed, in
    order to connect to the database.


    In order to tell the Spring Container to create these objects and how to link
    them together, a configuration must be provided. This configuration can be provided
    using XML files or XML + annotations or Java Configuration classes.


    The following configuration snippet depicts the contents and template of an XML
    Spring Configuration file, used to define the components that will make up the
    application.[²](#A978-1-4842-0811-3_2_Chapter.html#Fn2)


    The XML file is usually placed in the project directory under `src/main/resources/spring`.
    The `spring` directory tells you that files under it are Spring configuration
    files, because an application can have more XML configuration files for other
    purposes (configuring other infrastructure components like Hibernate, configuring
    caching with Ehcache, logging, etc.). An application configured in this way will
    run in an application context created by the Spring container.


    The application context will manage all objects instantiated and initialized by
    the Spring IoC, which from now on we will refer to as `beans` in order to get
    you accustomed with the Spring terminology. The relationship among these objects
    and the application context is depicted in Figure [2-10](#A978-1-4842-0811-3_2_Chapter.html#Fig10)
    along with their unique identifier.


    ![A978-1-4842-0811-3_2_Fig10_HTML.jpg](A978-1-4842-0811-3_2_Fig10_HTML.jpg)


    Figure 2-10. Application Context and the beans managed by it


    The application context is nothing else than a class implementing the Spring interface
    `org.springframework.context.ApplicationContext` that needs to be instantiated
    and the configuration file given as an argument. There are more implementations
    for the application context provided by Spring, and the one to use depends on
    the location and the resources containing the configuration. For XML, the class
    `org.springframework.context.support.ClassPathXmlApplicationContext` is used.


    ```

    //creating the context

    (1)ApplicationContext context = new ClassPathXmlApplicationContext

    ("classpath:spring/application-config.xml");

    // Get the bean to use to invoke the service

    (2)UserService userService = (UserService)context.get("simpleUserService");

    // create user entity

    (3)User user = new User();

    // populate user

    // invoking the save method of the bean

    (4)userService.save(user);

    ```


    In the previous example, a lot of information is new and will be introduced gradually
    in the next sections. The `classpath` is a common prefix used in Spring applications
    configured using XML files, to tell the Spring IoC where the configuration is
    located. The bean unique identifier in the application context, the bean `id`
    was evidentiated by underlining its value, in order to give you a hint as to how
    the identification of a certain instance is done. More on this topic will be covered
    in the following sections.


    Configuration using Java Configurations can be done as in the following code snippet,
    but what everything means will be covered in more detail in the following sections.
    The method names used to create the beans were evidentiated by underlining them,
    in order to give you a hint as to how the bean `id` is determined.


    ```

    @Configuration

    @PropertySource("claspath:db/datasource.properties")

    public class ApplicationConfig {

    @Value("${url}")

    private String url;

    @Value("${username}")

    private String username;

    @Value("${password}")

    private String password;

    @Bean

    public UserService simpleUserService() throws SQLException {

    return new SimpleUserService(userRepo());

    }

    @Bean

    public UserRepo userRepo() throws SQLException {

    return new JdbcUserRepo(dataSource());

    }

    @Bean

    public DataSource dataSource() throws SQLException {

    OracleDataSource ds = new OracleDataSource();

    ds.setURL(url);

    ds.setUser(username);

    ds.setPassword(password);

    return ds;

    }

    }

    ```


    The `datasource.properties` file contains the database access credentials, which
    are set for the fields annotated with `@Value`, but how this works will be explained
    in greater detail in the Java Configuration section. For Java Configuration classes,
    the class `org.springframework.context.annotation.AnnotationConfigApplicationContext`
    is used to create an application context.


    ```

    ApplicationContext ctx = new AnnotationConfigApplicationContext

    (ApplicationConfig.class);

    // everything wires up across configuration classes...

    SimpleUserService simpleUserService =

    (SimpleUserService) ctx.getBean("simpleUserService");

    ```


    And now that the surface has been scratched, you are ready to dive into advanced
    Spring configuration.'
