    \ `org.hibernate.query.Query<R>`\n类型的对象，这些对象被执行后返回结果。但更多细节将在介绍实体类之后展开，这里先简单提及以保持清晰。\n\
    \nHibernate 支持 `javax.persistence.*`\n包中的所有 JPA 2.x 注解，并扩展了该包以提供 JPA 不支持的行为以及执行特定的增强功能。Hibernate\
    \ 的元数据由放置在类、字段和方法上的注解组成，这些注解定义了应如何处理这些对象、它们有哪些限制等。最重要的注解是 `@Entity` 注解，\n它是 `javax.persistence.*`\n\
    的一部分，并将类标记为领域对象的模板，这些对象也称为实体。\n\nCC\n\n使用 `@Entity` 注解的类会映射到与类名匹配的数据库表，除非使用 `@Table`\
    \ 注解另行指定。\n\n```\nimport javax.persistence.Table;\nimport javax.persistence.Entity;\n\
    ...\n@Entity\n@Table(name=\"P_USER\")\npublic class User extends AbstractEntity\
    \ {\n...\n}\n```\n\n实体类成员通过注解来指定其用途、列名（如果与字段名不同）、验证规则、与其他实体的关系，以及本章后续将介绍的更多内容。\n\
    \n默认情况下，所有类成员都被视为持久化的，除非使用 `@Transient` 注解。`@Column` 注解并非必需，除非数据库列名需要与字段名不同，或者需要对字段应用限制。\n\
    \n示例：`unique`、`nullable`、`insertable`、`updatable`、`length`、`precision`、`scale`。\n\
    \n`@Id`\n注解将该字段标记为此实体类型的唯一标识符，并与数据库表的主键匹配。`@Entity` 和 `@Id` 对于领域类是必需的。\n\n使用持久化特定注解的实体类成员的访问类型为\
    \ `FIELD`。它们的值由 Hibernate 通过反射填充。可以通过使用 `@Access` 注解强制使用 setter 和 getter 方法，但不推荐这样做，因为它可能会干扰其他组件。（例如：监听器和\
    \ AOP 通知）\n\n表之间的关系由使用 `@OneToMany`、`@ManyToOne`、`@ManyToMany`、`@OneToOne` 注解的字段定义，它们与数据库中的关系定义相对应。在以下代码片段中，展示了一个\
    \ `User` 实体及其大部分字段和注解。Hibernate 将在数据库中创建的表将命名为 `P_USER`。\n\n`@OneToMany`\n注解用于在\
    \ `P_PET` 表中定义一个外键，将宠物记录链接到 `P_USER` 中的记录，并且可以定义指定子实体行为的属性。例如，在下面的代码片段中，使用 `@OneToMany(mappedBy\
    \ = \"owner\", cascade = {CascadeType.REMOVE})` 告诉 Hibernate，在删除用户实体时，所有类型为 `Pet`\
    \ 的子实体也必须被删除。\n\n```\nimport org.hibernate.validator.constraints.NotEmpty;\nimport\
    \ javax.validation.constraints.NotNull;\nimport javax.persistence.Column;\nimport\
    \ javax.persistence.OneToMany;\n...\n@Entity\n@Table(name=\"P_USER\")\n@SequenceGenerator(name\
    \ = \"seqGen\", allocationSize = 1)\npublic class User extends AbstractEntity\
    \ {\n@NotEmpty\n@Column(nullable = false, unique = true)\nprivate String username;\n\
    @Column(name=\"first_name\")\npublic String firstName;\n@NotNull\n@Enumerated(EnumType.STRING)\n\
    @Column(name = \"user_type\")\nprivate UserType userType;\n@NotEmpty\n@Column(unique\
    \ = true)\nprivate String email;\n@JsonIgnore\n@OneToMany(mappedBy = \"owner\"\
    ,\ncascade = {CascadeType.REMOVE})\nprivate Set pets = new HashSet();\n...\n}\n\
    ```\n\n在 `Pet`\n实体类中，声明了关系的 `@ManyToOne` 部分，并使用 `@JoinColumn` 定义了外键列的确切名称。外键字段将填充对作为此领域对象父级的\
    \ `User` 实体的引用。在 JPA 中，声明 `@OneToMany` 关系的实体通常称为父实体，而声明 `@ManyToOne` 的实体称为子实体。\n\
    \n```\nimport org.hibernate.validator.constraints.NotEmpty;\nimport javax.persistence.JoinColumn;\n\
    import javax.persistence.ManyToOne;\n...\n@Entity\n@Table(name=\"P_PET\")\npublic\
    \ class Pet extends AbstractEntity {\n...\n@ManyToOne\n@JoinColumn(name = \"OWNER_ID\"\
    , nullable = false)\nprivate User owner;\n}\n```\n\n此外，由于我们利用继承来避免编写重复代码，因此引入了一个名为\
    \ `AbstractEntity` 的抽象类，它定义了所有实体类的公共字段。为了告诉 Hibernate 此类不是实体类，而是其他实体类的模板，使用了 `@MappedSuperclass`。架构上决定将所有基础设施相关的字段分组到此类中：使用\
    \ `@Id` 和 `@GeneratedValue` 标记的主键字段（用于允许自动生成值）、对象编辑时修改的日期字段，以及使用 `@Version` 注解的字段（用于在执行合并操作时确保完整性以及实现乐观并发控制）。一个实体类只能有一个使用\
    \ `@Version` 注解的字段。\n\n```\nimport com.fasterxml.jackson.annotation.JsonIgnore;\n\
    import org.springframework.format.annotation.DateTimeFormat;\nimport javax.validation.constraints.NotNull;\n\
    ...\n@MappedSuperclass\npublic abstract class AbstractEntity implements Serializable\
    \ {\n@JsonIgnore\n@Id\n@GeneratedValue(strategy = GenerationType.AUTO)\n@Column(updatable\
    \ = false)\nprotected Long id;\n@JsonIgnore\n@Column(name = \"CREATED_AT\", nullable\
    \ = false)\n@NotNull\n@DateTimeFormat(pattern = \"yyyy-MM-dd\")\nprotected Date\
    \ createdAt;\n...\n@JsonIgnore\n@Version\npublic int version;\n}\n```\n\nSession\
    \ 与 Hibernate 查询\n"
- fmt: 'Entities are manipulated by `Session` instances that provide methods for search,
    persist, update, delete. This instance is also in charge of managing transactions
    and is a good replacement for JPA’s `EntityManager`. The current session is obtained
    from the `SessionFactory` bean by calling:


    ```

    sessionFactory.getCurrentSession();

    ```


    The queries for these operations are written in Hibernate Query Language, which
    allows for a more practical way of writing the SQL queries. HQL queries operate
    on domain objects and are transformed under the hood into matching SQL queries.


    Example: retrieving an object when we know its ID becomes really easy to do with
    Hibernate.


    ```

    @Override

    public User findById(Long id) {

    return session.get(User.class, id);

    }

    ```


    And if we want to see the SQL native query generated by Hibernate, all we have
    to do is look in the log with the two hibernate SQL-specific parameters `show_sql`
    and `format_sql` set to `true` for the `SessionFactory` bean.


    ```

    select

    user0_.id as id1_5_,

    user0_.CREATED_AT as CREATED_2_5_,

    user0_.MODIFIED_AT as MODIFIED3_5_,

    user0_.version as version4_5_,

    user0_.active as active5_5_,

    user0_.address as address6_5_,

    user0_.email as email7_5_,

    user0_.first_name as first_na8_5_,

    user0_.last_name as last_nam9_5_,

    user0_.password as passwor10_5_,

    user0_.rating as rating11_5_,

    user0_.user_type as user_ty12_5_,

    user0_.username as usernam13_5_

    from

    P_USER user0_

    where

    user0_.id=?

    ```


    HQL supports placeholders and named parameters in queries written by the developer
    and can return single results or collections and does not need a mapping object.
    Remember the `RowMapper<T>`? No need for it with Hibernate. This is what ORM is
    good at. Based on the metadata represented by the annotations in the entity classes,
    Hibernate can easily transform database records into Java objects and vice versa
    under the hood. In the code snippet below, you can see a few different HQL queries.


    ```

    //an empty list is returned when no record matches the criterion

    List list = session.createQuery("from User u where username= ?")

    //null is returned when no record matches the criterion

    User user = (User) session.createQuery("from User u where u.id= :id").

    setParameter("id", userId).uniqueResult();

    // update the user

    User user = (User) session().createQuery("from User u where u.id= :id").

    setParameter("id", userId).uniqueResult();

    user.setUsername(username);

    session.update(user);

    //save a new user in the database

    public void save(User user) {

    session.persist(user);

    }

    // delete a user

    public void deleteById(User user) {

    session.delete(user);

    }

    ```


    To synchronize domain objects with the database, the `Session` instance provides
    quite a few methods. The following are the most used:


    - `update(entity)` is used to persist changes done to an existing database object.

    - `persist(entity)` is used to save a new domain object into the database. If
    this object has other domain objects associated with it and the association is
    mapped with `cascade="persist"`, the persist operation will include them as well.
    This method does not return a value.

    - `save(entity)` is used to save a new domain object into the database. Before
    saving the object, an identifier is generated. This operation applies to associated
    instances if the association is mapped with `cascade="save-update"`. This method
    returns the generated identifier.

    - `saveOrUpdate(entity)` is used to save a domain object to the database. If the
    object exists, `update` is performed; otherwise, `save` is performed and the operation
    applies to associated instances if the association is mapped with `cascade="save-update"`.


    When Hibernate is used in the application, a repository class will use the `sessionFactory`
    bean to manipulate data objects. The Hibernate-specific implementation of the
    `UserRepo` is depicted in the following code snippet. Notice the `sessionFactory`
    bean being injected and obtaining the current session.


    ```

    import org.hibernate.Session;

    import org.hibernate.SessionFactory;

    import org.springframework.transaction.annotation.Transactional;

    ...

    @Repository

    @Transactional

    public class HibernateUserRepo implements UserRepo {

    private SessionFactory sessionFactory;

    @Autowired

    public HibernateUserRepo(SessionFactory sessionFactory) {

    this.sessionFactory = sessionFactory;

    }

    /**

    * @return the transactional session

    */

    protected Session session() {

    return sessionFactory.getCurrentSession();

    }

    @Override

    public List findAll() {

    return session().createQuery("from User u").list();

    }

    ...

    ```


    The UML sequence diagram when Hibernate is used with Spring is depicted in Figure
    [5-18](#A978-1-4842-0811-3_5_Chapter.html#Fig18).


    ![A978-1-4842-0811-3_5_Fig18_HTML.jpg](A978-1-4842-0811-3_5_Fig18_HTML.jpg)


    Figure 5-18. Conceptual UML sequence diagram for operations involving a Hibernate
    repository class


    Aside from all these methods, Hibernate supports execution of native queries with
    `Session` instances as well.


    ```

    import org.hibernate.query.NativeQuery;

    ...

    public List findAll() {

    NativeQuery nq = session()

    .createNativeQuery("select first_name from P_USER");

    return nq.getResultList();

    }

    ```


    ## Exception Mapping


    When things go wrong, Hibernate throws its own exceptions, which are equivalent
    in meaning to the Spring data access exceptions that were already covered in a
    previous section. Hibernate throws runtime data access exceptions that extend
    `HibernateException`, but these exceptions can be translated to Spring exceptions
    by declaring an exception translator bean. To enable this behavior, a postprocessor
    bean has to be declared that will look for all exception translator beans implementing
    `org.springframework.dao.support.PersistenceExceptionTranslator` and will advise
    all repository beans (classes annotated with `@Repository`) so that the translators
    can intercept the hibernate exceptions and apply the appropriate translation.
    In the code snippet below, you can see the postprocessor bean and the Hibernate-specific
    translator bean being declared in the configuration class.


    ```

    import org.springframework.dao.annotation.

    PersistenceExceptionTranslationPostProcessor;

    import org.springframework.orm.hibernate5.

    HibernateExceptionTranslator;

    ...

    @Bean

    public PersistenceExceptionTranslationPostProcessor petpp() {

    return new PersistenceExceptionTranslationPostProcessor();

    }

    @Bean

    public HibernateExceptionTranslator hibernateExceptionTranslator() {

    return new HibernateExceptionTranslator();

    }

    ```


    When exception translation using the `PersistenceExceptionTranslationPostProcessor`
    processor is not possible, perhaps because the repository classes are part of
    a third-party library, XML can be used to define an AOP advice that does the translation
    using the class `PersistenceExceptionTranslationInterceptor`.


    ```

    ...


    ```


    !


    Hibernate is not a subject for the official certificate exam, but if you want
    to test your understanding of it, there is a project called `07-ps-hibernate-practice`
    that has four TODO tasks defined, numbered from 36 to 39.


    Tasks 36–38 ask you to write some missing HQL queries in the `HibernateUserRepo`
    that can be tested with classes `TestHibernateUserRepo` and `TestUserService`.


    Task 39 asks you to complete the `SessionFactory` bean declaration that is missing
    in the `TestDataConfig` class.


    The proposed solutions can be found in project `07-ps-hibernate-solution`.


    When executing any of the tests, search in the console log for the words `session`
    and `transaction` and notice how Hibernate and Spring work together.'
