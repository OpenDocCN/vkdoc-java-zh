- fmt: '# Microservices


    Microservices are a specialization and implementation approach for service-oriented
    architectures (SOA), and they are used to build flexible, independently deployable
    services. `Microservices` is a paradigm that requires for services to be broken
    down into highly specialized instances as functionality and be interconnected
    through agnostic communication protocols (like `REST`, for example) that work
    together to accomplish a common business goal. Each microservice is a really small
    unit of stateless functionality, a process that does not care where the input
    is coming from and does not know where its output is going. It has no idea what
    the big picture is. Because it is specialized and decoupled, each problem can
    be identified, the cause localized and fixed, and implementation redeployed without
    affecting other microservices. This means that microservices systems have high
    cohesion of responsibilities and really low coupling, and these qualities allow
    the architecture of an individual service to evolve through continuous refactoring,
    reduce the necessity of a big up-front design, and allow for software to be released
    earlier and continuously.


    Microservices have grown in popularity in recent years, and because of the small
    granularity and lightweight communication protocols, they have became the preferred
    way to build enterprise applications. Microservices’ modular architectural style
    seems particularly well suited to cloud-based environments. This architectural
    method is quite scalable and is considered ideal when multiple platforms and devices
    must be supported. Consider the biggest players on the Web right now: Twitter,
    Netflix, Amazon, PayPal, Soundcloud, and others. They have large-scale websites
    and applications that have evolved from monolithic architecture to microservices
    so that they can be accessible from every kind of device.


    Classic application development is characterized by multiple types of services
    being developed as a single monolithic, autonomous unit and deployed on a server
    for clients to access. Usually, these applications are multilayered, and each
    layer corresponds to different functional areas of the application. The monolithic
    application would handle `HTTP` requests, execute business logic, and also handle
    database operations. In a monolithic infrastructure, the services that make the
    system are organized logically within the same code base and unit of deployment.
    The disadvantage of monolithic applications is that changes end up being tied
    to other changes, and sometimes problems are harder to identify when there are
    multiple layers involved. A modification made to a small section of an application
    might require building and deploying an entirely new version. And obviously, regression
    tests to verify that code previously developed and tested still performs correctly
    even after it was changed are mandatory. Thus, underlining advantages and disadvantages
    of microservices can be done only by comparing them to old style monolithic architecture.


    ## Advantages of Microservices


    A summary of microservices’ advantages is listed below:


    *   increased granularity

    *   increased scalability

    *   easy to automate deployment and testing

    *   easy to test

    *   increased decoupling

    *   enhanced cohesion

    *   suitable for continuous refactoring, integration, and delivery

    *   increased module independence

    *   organized around capabilities

    *   improved agility and velocity, because when a system is correctly decomposed
    into microservices, each service can be developed and deployed independently and
    in parallel with the others

    *   each service is elastic, resilient, composable, minimal, and complete

    *   improvement of fault isolation

    *   elimination of long-term commitment to a single technology stack, because
    microservices can be written in different programming languages

    *   makes it easier to integrate new developers in a team


    ## Disadvantages of Microservices


    A summary of microservices’ disadvantages is listed below:'
