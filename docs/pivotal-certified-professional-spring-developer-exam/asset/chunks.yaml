    在开发Spring应用程序时，你还会遇到另一种情况：拥有多个配置类。这与推荐使用多个XML配置文件的原因相同，即为了将具有相同职责的bean分组，并使应用程序可测试。通过多个配置类配置的应用程序可以通过使用`AnnotationConfigApplicationContext`实例来引导，该实例将使用这两个类作为参数进行初始化。


    ```

    ApplicationContext ctx =

    new AnnotationConfigApplicationContext(DataSourceConfig.class,

    PetRepoConfig.class);

    ```


    如果应用程序中存在具有相同目的的bean定义的配置类，更实用的方法是使用`@Import`注解将一个类中的bean定义导入到另一个类中。


    ```

    import org.springframework.context.annotation.Import;

    @Configuration

    @Import({DataSourceConfig.class,  UserRepoDSConfig.class})

    public class AllRepoConfig {

    ...

