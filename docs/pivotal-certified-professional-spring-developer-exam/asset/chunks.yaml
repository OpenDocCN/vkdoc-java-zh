- fmt: "### The Project Sample\n\nThe project attached to this book is called Pet\
    \ Sitter. As you have probably figured out, it is a proof of concept for an application\
    \ designed to help pet owners find people to take care of their pets while they\
    \ are on vacation or are forced to leave the pet alone for some reason. Here is\
    \ what this project should provide:\n\n- A user should have a secured account\
    \ to access the application. The type of the account can be:\n  - `OWNER` = user\
    \ that is only looking for a pet sitter for its pet(s)\n  - `SITTER` = user that\
    \ is only looking to provide pet sitter services\n  - `BOTH` = both of the above\n\
    \  - `ADMIN` = account with special privileges that can manage other users’ activities\
    \ on the site.\n- A user account of type `OWNER` can have one or more pet instances\
    \ associated with it.\n- Each pet must have an RFID microchip implanted, and the\
    \ barcode should be provided to the application.\n- A user account of type `OWNER`\
    \ is able to create a request for a pet sitter for more than one interval.\n-\
    \ A user account of type `SITTER` can reply to requests by creating response objects\
    \ that will be approved or rejected by the owner of that request.\n- A user account\
    \ of type `BOTH` can act as an `OWNER` and as a `SITTER`.\n- Admin accounts can\
    \ deactivate other types of accounts for inactivity.\n- Pet sitters and owners\
    \ can rate each other by writing a review of their experience. The results are\
    \ stored in a rating field attached to the user account.\n\nThe project is a multimodule\
    \ Gradle project. Every module is a project that covers a specific Spring Topic.\
    \ The projects suffixed with `practice` are missing pieces of code and configuration\
    \ and are the ones that need to be solved by you to test your understanding of\
    \ Spring Web. The projects suffixed with `solution` are a proposal resolution\
    \ for the tasks. Some projects are suffixed with `sample` to tell you that they\
    \ contain a sample of code or configuration that you are to analyze and pay special\
    \ attention to.\n\nIn Figure 1-3, the structure of the Pet Sitter project as it\
    \ is viewed in IntelliJ IDEA is depicted. Each module name is prefixed with a\
    \ number, so no matter what IDE you use, you will always have the modules in the\
    \ exact order in which they were intended to be used.\n\n![A978-1-4842-0811-3_1_Fig3_HTML.jpg](A978-1-4842-0811-3_1_Fig3_HTML.jpg)\n\
    \nFigure 1-3. Pet Sitter modules\n\nThe `00-ps-core` contains the entity classes\
    \ that map on database tables, enumerations, and other utility classes that are\
    \ referenced from other modules. As the name of the project implies, this is the\
    \ core project, the base tier. The other projects are implementation of service\
    \ tiers that are built upon it. The Pet Sitter was designed with the multitier\
    \ architecture in mind, and the abstract internal layer structure is depicted\
    \ in Figure 1-4.\n\n![A978-1-4842-0811-3_1_Fig4_HTML.jpg](A978-1-4842-0811-3_1_Fig4_HTML.jpg)\n\
    \nFigure 1-4. Pet Sitter application layers\n\nThe entities have common fields\
    \ used by hibernate to identify uniquely each entity instance (`id`) and fields\
    \ used to audit each entity instance (`createdAt` and `modifiedAt`) and keep track\
    \ of how many times an entity was modified (`version`). These fields have been\
    \ grouped in the `AbstractEntity` class to avoid having duplicated code. Other\
    \ classes are enumerations used to define different types of objects and other\
    \ utility classes (for conversion and serialization). The contents of the `00-ps-core`\
    \ project are depicted in Figure 1-5.\n\n![A978-1-4842-0811-3_1_Fig5_HTML.jpg](A978-1-4842-0811-3_1_Fig5_HTML.jpg)\n\
    \nFigure 1-5. Pet Sitter `00-ps-core` project contents\n\nThe class hierarchy,\
    \ class members, and relationships between classes can be analyzed in Figure 1-6.\n\
    \n![A978-1-4842-0811-3_1_Fig6_HTML.jpg](A978-1-4842-0811-3_1_Fig6_HTML.jpg)\n\n\
    Figure 1-6. Pet Sitter entity class hierarchy\n\nThe UML diagram in Figure 1-7\
    \ describes the general functionality of the application. The `RequestDispatcher`\
    \ and `Controller` are part of the web tier and are included here because the\
    \ `09-ps-mvc-*` and `10-ps-security-*` projects also have a simple web tier in\
    \ place, and basic notions of Spring Web are part of the certification exam.\n\
    \n![A978-1-4842-0811-3_1_Fig7_HTML.jpg](A978-1-4842-0811-3_1_Fig7_HTML.jpg)\n\n\
    Figure 1-7. UML diagram describing the general behavior of the Pet Sitter application\n\
    \nThis chapter does not have any practice and sample code attached to it, so more\
    \ information regarding the setup of the project and how it is built and executed\
    \ will be provided in the following chapters.\n\nFootnotes\n\n1. Just as a coincidence\
    \ and a fun fact, in Romania you obtain your first identity card when you are\
    \ fourteen years old, and it is considered the age of intellectual maturity that\
    \ allows you to differentiate good from evil.\n2. Information can be found on\
    \ the official Spring blog at [`https://spring.io/blog/2015/08/03/coming-up-in-2016-spring-framework-4-3-5-0`](https://spring.io/blog/2015/08/03/coming-up-in-2016-spring-framework-4-3-5-0).\n\
    3. Information at [`https://jaxenter.com/java-9-release-date-announced-116945.html`](https://jaxenter.com/java-9-release-date-announced-116945.html).\n\
    4. Github Spring Framework sources: [`https://github.com/spring-projects/spring-framework`](https://github.com/spring-projects/spring-framework).\n\
    5. Gradle is an automated build tool that is easy to configure and use for any\
    \ type of application. Its build files are written using Groovy. Gradle combines\
    \ the power and flexibility of Ant with the dependency management and conventions\
    \ of Maven into a more effective way to build. Read more about it at [`https://www.gradle.org/`](https://www.gradle.org/).\n\
    6. Keep in mind that attending a Spring Web training from Pivotal or a VMware\
    \ Authorized Training Center is a prerequisite to becoming a Certified Spring\
    \ Professional, as stated on the official site: [`http://pivotal.io/academy#certification`](http://pivotal.io/academy#certification).\n\
    7. JSE8 official reference: [`http://docs.oracle.com/javase/8/docs/`](http://docs.oracle.com/javase/8/docs/);\
    \ JEE7 official documentation: [`http://docs.oracle.com/javaee/7/`](http://docs.oracle.com/javaee/7/).\n\
    8. Spring official Javadoc: [`http://docs.spring.io/spring/docs/current/javadoc-api/`](http://docs.spring.io/spring/docs/current/javadoc-api/);\
    \ Spring Reference: [`http://docs.spring.io/spring/docs/current/spring-framework-reference/`](http://docs.spring.io/spring/docs/current/spring-framework-reference/).\n\
    9. Depending on the area and the training center, this item is optional.\n10.\
    \ Depending on the area and the training center, this item, too, is optional.\n\
    11. Radio-frequency identification (RFID) uses electromagnetic fields to automatically\
    \ identify and track tags attached to an object, or pet in this case."
