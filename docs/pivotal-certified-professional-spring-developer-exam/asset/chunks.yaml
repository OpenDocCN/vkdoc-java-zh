    \ requests cannot be resolved successfully. Perhaps the\nclient requested a resource\
    \ no longer available, or some action\nrequested by the client generated an error\
    \ on the server. In this case,\nthe `@ResponseStatus` can\nbe used on controller\
    \ exceptions handler methods to give the client a\nbasic idea of why the request\
