    \ 404（未找到）状态码。当资源被正确删除时，会返回 200（成功）状态码。图 7-26 展示了 DELETE 请求和响应的内容。\n\n![A978-1-4842-0811-3_7_Fig26_HTML.jpg](img/A978-1-4842-0811-3_7_Fig26_HTML.jpg)\n\
    \n图 7-26.\n\nDELETE 请求与响应示例\n\n可以通过`RestTemplate`实例发送 REST DELETE 请求：所需的一切就是 REST\
    \ URI 和用户名。该 URI 与用于检索用户资源的 URI 相同，但 HTTP 方法不同。\n\n```\n    import org.springframework.http.*;\n\
    \    ...\n    public class RestUserControllerTest {\n    private static final\
    \ String GET_PUT_DEL_URL =\n    \"http://localhost:8080/users/{$username}\";\n\
    \    private static final String GET_POST_URL = \"http://localhost:8080/users\"\
    ;\n    private RestTemplate restTemplate = null;\n    @Before\n    public void\
