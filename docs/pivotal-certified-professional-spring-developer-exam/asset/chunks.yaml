    异常映射


    当出现问题时，Hibernate 会抛出自己的异常，这些异常的含义与之前章节中介绍的 Spring 数据访问异常相同。Hibernate 抛出扩展了 `HibernateException`
    的运行时数据访问异常，但可以通过声明异常转换器 bean 将这些异常转换为 Spring 异常。要启用此行为，必须声明一个后处理器 bean，它将查找所有实现了
    `org.springframework.dao.support.PersistenceExceptionTranslator` 的异常转换器 bean，并通知所有仓库
    bean（使用 `@Repository` 注解的类），以便转换器可以拦截 Hibernate 异常并应用适当的转换。在下面的代码片段中，你可以看到在配置类中声明的后处理器
    bean 和 Hibernate 特定的转换器 bean。


    ```

    import org.springframework.dao.annotation.

    PersistenceExceptionTranslationPostProcessor;

    import org.springframework.orm.hibernate5.

    HibernateExceptionTranslator;

    ...

    @Bean

    public PersistenceExceptionTranslationPostProcessor petpp() {

    return new PersistenceExceptionTranslationPostProcessor();

    }

    @Bean

    public HibernateExceptionTranslator hibernateExceptionTranslator() {

    return new HibernateExceptionTranslator();

    }

    ```


    当无法使用 `PersistenceExceptionTranslationPostProcessor` 处理器进行异常转换时（可能是因为仓库类是第三方库的一部分），可以使用
    XML 定义一个 AOP 通知，该通知使用 `PersistenceExceptionTranslationInterceptor` 类进行转换。


    ```

    ...


    ```


