- fmt: '# 1. Book Overview


    Spring is currently one of the most influential and rapidly growing Java frameworks.
    Every time a new startup idea is born, if the development language is Java, Spring
    will be taken into consideration. Spring will be fourteen years old on the first
    of October 2016, and it has grown into a full-fledged software technology over
    the years.[¹](#A978-1-4842-0811-3_1_Chapter.html#Fn1)


    This book covers much of the core functionality from multiple projects. The topics
    that are required for the official certification exam are covered deeply, and
    all extras are covered succinctly enough to give you a taste and make you curious
    to learn more.


    ## What Is Spring and Why Should You Be Interested in It?


    When a project is being built using Java, a great deal of functionality needs
    to be constructed from scratch. Yet many useful functionalities have already been
    built and are freely available because of the open source world we are living
    in. A long time ago, when the Java world was still quite small, when you were
    using open source code in your project developed by somebody else and shipped
    as a `*.jar`, you would say that you were using a library. But as time passed,
    the software-development world evolved, and the libraries grew too. They became
    frameworks. Because they were no longer a single `*.jar` file that you could import,
    they became a collection of more-or-less decoupled libraries, with different responsibilities,
    and you had the possibility of importing only what you needed. As frameworks grew,
    tools to build projects and add frameworks as dependencies evolved. One of the
    currently most widely used tools to build projects is Maven, but new build tools
    are now stealing the scene. One of these new-age build tools will be used to build
    the projects for this book. It will be introduced later.


    The Spring Framework was released in October 2002 as an open source framework
    and inversion of a control container developed using Java. As Java evolved, Spring
    did too. Spring version 4.3, the one covered in this book, is fully compatible
    with Java 8, and Spring 5 is planned to be released in the fourth quarter of 2016.[²](#A978-1-4842-0811-3_1_Chapter.html#Fn2)
    The intention is to make it compatible with Java 9, which is planned for release
    in September 2016.[³](#A978-1-4842-0811-3_1_Chapter.html#Fn3) But since the release
    of Java 8 was delayed over six months, nothing is certain at the moment.


    Spring comes with a great deal of default behavior already implemented. Components
    called “infrastructure beans” have a default configuration that can be used or
    easily customized to fit the project’s requirements. Having been built to respect
    the “Convention over Configuration” principle, it reduces the number of decisions
    a developer has to make when writing code, since the infrastructure beans can
    be used to create functional basic applications with minimum customization (or
    none at all) required.


    Spring is open source, which means that many talented developers have contributed
    to it, but the last word on analyzing the quality of the components being developed
    belongs to the Pivotal Spring Development Team, previously known as the SpringSource
    team, before Pivotal and VMware merged. The full code of the Spring Framework
    is available to the public on Github,[⁴](#A978-1-4842-0811-3_1_Chapter.html#Fn4)
    and any developer that uses Spring can fork the repositories and propose changes.


    A Java application is essentially composed of objects talking to each other. The
    reason why Spring has gained so much praise in Java application development is
    that it makes connecting and disconnecting objects easy by providing a comprehensive
    infrastructure support for assembling objects. Using Spring to develop a Java
    application is like building a lightly connected Lego castle; each object is a
    Lego piece that you can easily remove and replace with a different one. Spring
    is currently the VIP of Java Frameworks, and if all you have read so far has not
    managed to make you at least a bit interested in it, then I am doing a really
    bad job at writing this book, and you should write an email and tell me so.


    Before going further about what this book will provide you, let’s have an overview
    of the Spring projects. Figure [1-1](#A978-1-4842-0811-3_1_Chapter.html#Fig1)
    depicts all the Spring projects. For 2016, there are nineteen main projects, two
    community projects, and three projects that are “in the attic,” so to speak, because
    there will be no further contributions to them, since they are going to be dropped
    in the future.


    ![A978-1-4842-0811-3_1_Fig1_HTML.jpg](A978-1-4842-0811-3_1_Fig1_HTML.jpg)


    Figure 1-1.


    Spring Web Stack. (The projects drawn with dotted contours will be covered only
    partially in this book.)


    ## What Is the Focus of This Book?


    The topics covered in this book are mostly Spring Framework’s support components
    for the backend tier. We only scratch the surface for Spring Boot, Spring Data
    JPA, REST, MVC, and Microservices. This book aims to provide a natural path in
    the development of a complete Spring application. With each chapter, the application
    will become more complex, until its final form is reached, which will also have
    a security setup, a simple web application, and will support REST requests.


    This book is focused on helping developers understand how Spring’s infrastructure
    was designed and how to write Spring applications in a few easy steps using the
    maximum of Spring’s potential. Its objectives are as follows:


    *   Use Spring to develop applications

    *   Use Spring Security to secure resources

    *   Use Spring Test and other test frameworks (JUnit, JsMock) to test applications

    *   Create Spring applications using Gradle[⁵](#A978-1-4842-0811-3_1_Chapter.html#Fn5)


    ## Who Should Read This Book?


    This book was written to provide clear insight into creating applications using
    Spring core components. It can also be a big help to a developer who wants to
    become a Certified Spring Professional.[⁶](#A978-1-4842-0811-3_1_Chapter.html#Fn6)
    That is why every topic that is found in the official Pivotal Spring Core study
    guide is given the attention it deserves.


    You just need a minimal knowledge of Java in order to make good use of this book,
    but online documentation for Java[⁷](#A978-1-4842-0811-3_1_Chapter.html#Fn7) and
    Spring[⁸](#A978-1-4842-0811-3_1_Chapter.html#Fn8) should be consulted every time
    something is not fully covered in the book.


    In a nutshell, this book was written to be used by the following audiences:


    *   Java developers who want a taste of Spring

    *   Spring developers who are interested in learning to use Spring proficiently,
    but not interested in official certification

    *   Spring and Java developers who want to become certified and want all the help
    they can get.'
