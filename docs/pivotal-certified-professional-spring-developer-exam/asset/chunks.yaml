    assertEquals(0, result);\n}\n```\n\n但事情并不总是一帆风顺，有时会抛出异常。下一节将介绍在这种意外情况下可以采取的措施以及用于妥善处理该情况的相关组件。\n\
    \nSpring 数据访问异常\n\n在使用数据源时，有几种特殊情况会导致问题：有时，操作可能针对不再存在的记录进行调用；有时，由于某些数据库限制，无法创建记录；有时，数据库响应时间过长；等等。在纯\
    \ JDBC 中，总是抛出相同类型的受检异常 `java.sql.SQLException`，并且在其消息中包含一个 SQL 代码，开发人员必须识别并相应处理该代码。\n\
    \nSpring 提供了一个庞大的数据访问异常家族。所有这些异常都是 Java `RuntimeException` 的子类，并为开发人员提供了一种实用的方法来处理数据库访问异常，而无需了解数据访问\
    \ API 的细节。`JdbcTemplate` 实例在幕后使用一个实现 `org.springframework.jdbc.support.SQLExceptionTranslator`\
    \ 类型的基础设施 bean，负责将晦涩难懂的 `java.sql.SQLExceptions` 转换为清晰简洁的 `org.springframework.dao.DataAccessException`\
    \ 实现⁹。Spring 数据访问异常是非受检的，并包含可读性强的消息，能精确定位问题的原因。有一些转换器组件可用于将任何类型的数据访问异常转换为 Spring\
    \ 特定的异常，这在从一种数据库类型迁移到另一种数据库类型时非常有用。Spring 数据访问异常层次结构的简化版本如图 5-5 所示。\n\n![A978-1-4842-0811-3_5_Fig5_HTML.jpg](img/A978-1-4842-0811-3_5_Fig5_HTML.jpg)\n\
    \n图 5-5.\n\nSpring 数据访问异常层次结构\n\n`java.sql.SQLException` 是一种受检异常，它强制开发人员捕获并处理它，或者声明它在调用方法调用层次结构中被抛出。这种类型的异常是通用的，每次数据库错误都会抛出。这引入了一种紧耦合形式。\n\
    \n在 Spring 中，数据访问异常是非受检的（它们扩展了 `java.lang.RuntimeException`，这就是为什么在前面的图中该类以红色边框显示），并且可以在方法调用层次结构中向上抛出，直到到达最适合处理它们的位置。Spring\
    \ 数据访问异常隐藏了用于与数据库通信的技术。当使用 `JdbcTemplate`、JPA、Hibernate 等时，会抛出这些异常。这很可能就是它们属于\
    \ `spring-tx` 模块的原因。\n\n正如你从图 5-5 中注意到的，Spring 数据访问异常家族有三个主要分支：\n"
- fmt: "# Spring Data Access Exceptions and Transaction Management\n\n## Non-Transient\
    \ Exceptions\n\nExceptions that are considered non-transient, which means that\
    \ retrying the operation will fail unless the originating cause is fixed. The\
    \ parent class of this hierarchy is `org.springframework.dao.NonTransientDataAccessException`.\
    \ The most obvious example here is searching for an object that does not exist.\
    \ Retrying this query will fail until a user that is the one being searched for\
    \ exists. The code snippet below searches for a user that does not exist. Right\
    \ below is a snippet from the console log depicting the exception type and message.\n\
    \n```\n// test method in TestJdbcTemplateUserRepo.java\n@Test\npublic void testNoFindById()\
    \ {\n    User user = userRepo.findById(99L);\n    assertEquals(\"Darius\", user.getUsername());\n\
    }\n#log from the console\norg.springframework.dao.EmptyResultDataAccessException:\n\
    Incorrect result size: expected 1, actual 0\n```\n\nObviously, this test will\
    \ fail until a user with ID equal to 99 and username `Darius` is found in the\
    \ `p_user` table.\n\n## Recoverable Data Access Exception\n\n`org.springframework.dao.RecoverableDataAccessException`\
    \ is thrown when a previously failed operation might succeed if some recovery\
    \ steps are performed, usually closing the current connection and using a new\
    \ one. This type of exception is very useful when the database is on a different\
    \ computer from that of the application and connection to the database fails because\
    \ of a temporary network hiccup. The exception can be caught and the query retried\
    \ when the network is up, and the execution will succeed in a new connection.\n\
    \n## Transient Exceptions\n\nExceptions that are considered transient, which extend\
    \ the abstract class `org.springframework.dao.TransientDataAccessException`, which\
    \ means that retrying the operation might succeed without any intervention. These\
    \ are concurrency or latency exceptions. For example, when the database becomes\
    \ unavailable because of a bad network connection in the middle of the execution\
    \ of a query, an exception of type `QueryTimeoutException` is thrown. The developer\
    \ can treat this exception by retrying the query.\n\n## Script Exception\n\nThe\
    \ fourth branch contains only an exception type used when initialization of a\
    \ test database with a bean of type `DataSourceInitializer` fails because of a\
    \ script error; thus the exception type is named `ScriptException`. And that is\
    \ all that can be said about Spring data access exceptions. Sounds pretty simple,\
    \ right?\n\n## Practice Tasks\n\nIf you want to test your understanding of Spring\
    \ `JdbcTemplate` and related components presented so far, you can open the `05-ps-jdbc-practice\
    \ project` and try to complete the TODOs. There are three that you should definitely\
    \ solve and one that is a bonus in case you really like this section and you enjoy\
    \ the practice. The parts missing are marked with a TODO task and are visible\
    \ in Intellij IDEA in the TODO view.\n\n- **Task TODO 27**, located in the `TestJdbcTemplateUserRepo`\
    \ class, requires you to complete the body of a negative test method that searches\
    \ for a user that does not exist. The test should pass. To see the user IDs present\
    \ in the database, inspect the `05-ps-jdbc-practice/src/test/resources/db/test-data.sql`.\n\
    \n- **Task TODO 28**, located in the `TestJdbcTemplateUserRepo` class, requires\
    \ you to complete the body of a test method that counts the users in the database.\n\
    \n- **Task TODO 29**, located in `JdbcNamedTemplateUserRepo`, requires you to\
    \ complete the body of repository methods. You can use either the `jdbcNamedTemplate`\
    \ bean or the underlying `JdbcTemplate` accessed with `jdbcNamedTemplate.getJdbcOperations()`.\n\
    \n- **The bonus task TODO 30**, located in test class `TestNamedJdbcTemplateUserRepo`,\
    \ if you decide to complete it, will help you test the methods implemented by\
    \ completing TODO 29.\n\nIf you have trouble, you can take a peek at the proposed\
    \ solution in the `05-ps-jdbc-solution` project.\n\n# Data Access Configuration\
    \ In a Transactional Environment\n\nUntil now, data access has been covered with\
    \ Spring in a nontransactional environment, which means that when a query was\
    \ executed, a connection was obtained, the query was executed, then the connection\
    \ was released. In enterprise applications, though, there is a need to group certain\
    \ SQL operations together so that in case one of them fails, all the results of\
    \ previous queries in the same group should be rolled back to avoid leaving the\
    \ database in an inconsistent state. The context of execution for a group of SQL\
    \ operations is called a **transaction** and has the following properties:\n\n\
    - **Atomicity** is the main attribute of a transaction and is the characteristic\
    \ mentioned earlier, that if an operation in a transaction fails, the entire transaction\
    \ fails, and the database is left unchanged. When all operations in a transaction\
    \ succeed, all changes are saved into the database when the transaction is committed.\
    \ Basically it is \"all or nothing.\"\n\n- **Consistency** implies that every\
    \ transaction should bring the database from one valid state to another.\n\n-\
    \ **Isolation** implies that when multiple transactions are executed in parallel,\
    \ they won't hinder one another or affect each other in any way. The state of\
    \ the database after a group of transactions is executed in parallel should be\
    \ the same as if the transactions in the group had been executed sequentially.\n\
    \n- **Durability** is the property of a transaction that should persist even in\
    \ cases of power off, crashes, and other errors on the underlying system.\n\n\
    ## Transaction Management\n\nIn a transactional environment, transactions have\
    \ to be managed. In Spring, this is done by an infrastructure bean called the\
    \ **transaction manager**. The transaction manager bean's configuration is the\
    \ only thing that has to be changed when the environment changes. There are four\
    \ basic flavors:\n\n### 1. Local JDBC Spring Environment\n\nA local JDBC configuration\
    \ declaring a basic datasource to be used (even an embedded one will do) and a\
    \ bean of type `org.springframework.jdbc.datasource.DataSourceTransactionManager`,\
    \ a Spring-specific implementation. The connections to use can come from a connection\
    \ pool, and the transaction manager bean will associate connections to transactions\
    \ according to the configured behavior. Configuring transactional behavior is\
    \ done declaratively by annotating methods with `@Transactional`. It is mandatory\
    \ to use this annotation on repository classes, too, in order to ensure transactional\
    \ behavior. Without an ORM, a component of type `JdbcTemplate` must be used to\
    \ execute queries at the repository level. All this will be detailed later in\
    \ this chapter. The abstract schema of this configuration is depicted in Figure\
    \ 5-6.\n\n![A978-1-4842-0811-3_5_Fig6_HTML.jpg](A978-1-4842-0811-3_5_Fig6_HTML.jpg)\n\
    \n**Figure 5-6.** Spring Local JDBC Configuration abstract schema\n\n### 2. Local\
    \ Hibernate Spring Environment\n\nA local hibernate configuration declaring a\
    \ basic datasource to be used (even an embedded one will do) and a bean of type\
    \ `org.springframework.orm.hibernate5.HibernateTransactionManager`, a Spring-specific\
    \ implementation that uses a hibernate session object created by an infrastructure\
    \ bean of type that extends `org.springframework.orm.hibernate5.LocalSessionFactoryBean`\
    \ to manage entities in a transactional context. The abstract schema of this configuration\
    \ is depicted in Figure 5-7.\n\n![A978-1-4842-0811-3_5_Fig7_HTML.jpg](A978-1-4842-0811-3_5_Fig7_HTML.jpg)\n\
    \n**Figure 5-7.** Spring Local Hibernate Configuration abstract schema"
