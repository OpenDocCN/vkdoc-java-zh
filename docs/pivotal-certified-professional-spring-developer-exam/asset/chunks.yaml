    ## Apache ActiveMQ\n\n市面上有相当多的JMS实现。其中大部分由面向中间件的中间件提供商提供，例如：WebSphere MQ、Oracle\
    \ EMS、JBoss AP、SwiftMQ、TIBCO EMS、SonicMQ、ActiveMQ、WebLogic JMS。有些是开源的，有些则不是。其中一些还提供了原生C\
    \ API（如TIBCO EMS和Sonic MQ）。有些是用Java本身实现的。\n\n本节选择Apache ActiveMQ作为JMS提供者，它具有以下特性：\n\
    \n*   最流行且最强大的开源消息传递和集成模式服务器\n*   接受非Java客户端\n*   可在生产环境中独立使用\n*   支持可插拔的传输协议，如in-VM、TCP、SSL、NIO、UDP、多播、JGroups和JXTA传输\n\
    *   可使用嵌入式代理作为内存JMS提供者，避免在单元测试JMS时运行独立进程的开销[⁵](#A978-1-4842-0811-3_7_Chapter.html#Fn5)\n\
    *   `activemq`可执行文件以默认配置启动\n*   也可嵌入到应用程序中使用\n*   可使用ActiveMQ或Spring配置（XML或Java配置）进行配置\n\
    *   提供高级消息传递功能，如消息组、虚拟和复合目标以及通配符\n*   与Spring Integration或Apache Camel一起使用时，提供企业集成模式支持\n\
    *   以及更多其他特性。\n\n截至本章编写时，当前稳定版本为5.14.1。[⁶](#A978-1-4842-0811-3_7_Chapter.html#Fn6)\
