    you can find an equivalent Spring JMS application configured with Spring\nBoot.\n\
    \nJMS with Spring Boot\n\nWriting Spring JMS applications is even easier with\
    \ Spring Boot. The\napplication in the project module `13-ps-jms-solution`\ncontains\
    \ a Spring Boot JMS application that sends `User` instances\nwrapped up in JMS\
    \ Messages to the `userQueue`.A message\nlistener is configured to process the\
    \ message and send a confirmation\nmessage on the `confirmationQueue`.\nAnother\
    \ listener is defined that waits for the confirmation and prints\nits contents.\
    \ To simplify the application even more, there is no need\nfor a producer class\
    \ and a consumer class. There is only one process\nthat publishes and consumes\
    \ messages from the two queues. The abstract\nschema of the Spring Boot JMS application\
    \ is depicted in Figure [7-15](#A978-1-4842-0811-3_7_Chapter.html#Fig15).\n\n\
    ![A978-1-4842-0811-3_7_Fig15_HTML.jpg](A978-1-4842-0811-3_7_Fig15_HTML.jpg)\n\n\
    Figure 7-15.\n\nSpring Boot JMS application abstract schema\n\nThe application\
    \ is made of only four classes, which have the following\npurpose:\n\n*   `UserReceiver\
    \ and` `ConfirmationReceiver`\n    have the responsibility of receiving the user\
    \ and confirmation messages.\n    The classes have a more practical implementation,\
    \ making use of the\n    `@JmsListener`\n    annotation. Using this annotation\
    \ on the methods that will process the\n    messages allows the developer to escape\
    \ the JMS restriction of\n    implementing the `MessageListener`. This\n    annotation\
    \ marks the method on which it is used as a target of a JMS\n    listener on the\
    \ specified destination, and the connection factory\n    attribute specifies the\
    \ bean to use to build the JMS Listener Container.\n    This annotation is processed\
    \ by a special Spring bean post processor:\n    `org.springframework.jms.annotation.JmsListenerAnnotationBeanPostProcessor`.\n\
    \n```\n    // UserReceiver.java\n    @Component\n    public class UserReceiver{\n\
    \    private Logger logger = LoggerFactory.getLogger(UserReceiver.class);\n  \
    \  private static AtomicInteger id = new AtomicInteger();\n    @Autowired\n  \
    \  ConfirmationSender confirmationSender;\n    @JmsListener(destination = \"userQueue\"\
    ,\n    containerFactory = \"connectionFactory\")\n    public void receiveMessage(User\
    \ receivedUser) {\n    logger.info(\" >> Received user: \" + receivedUser);\n\
    \    confirmationSender.sendMessage(\n    new Confirmation(id.incrementAndGet(),\
    \ \"User \"\n    + receivedUser.getEmail() + \" received.\"));\n    }\n    }\n\
    \    //ConfirmationReceiver.java\n    @Component\n    public class ConfirmationReceiver\
    \ {\n    private Logger logger = LoggerFactory.getLogger(ConfirmationReceiver.class);\n\
    \    @JmsListener(destination = \"confirmationQueue\",\n    containerFactory =\
    \ \"connectionFactory\")\n    public void receiveConfirmation(Confirmation confirmation)\
    \ {\n    logger.info(\" >>  Received confirmation: \" + confirmation);\n    }\n\
    \    }\n    ```\n\n*   The `ConfirmationSender`\n    class is just a bean with\
    \ a `JmsTemplate` bean\n    injected in it that is being used to send a confirmation\
    \ object to the\n    `confirmationQueue`.\n\n```\n    @Component\n    public class\
    \ ConfirmationSender {\n    @Autowired\n    JmsTemplate jmsTemplate;\n    public\
    \ void sendMessage(final Confirmation confirmation) {\n    jmsTemplate.convertAndSend(\"\
    confirmationQueue\", confirmation);\n    }\n    }\n    ```\n\n*   The `Application`\n\
    \    class is the configuration and starter of the application. It is\n    annotated\
    \ with the all-powerful `@SpringBootApplication`,\n    which will make sure to\
    \ scan for beans in the current package and will\n    inject all infrastructure\
    \ beans based on the classpath settings. The\n    other annotation on this class\
    \ is `@EnableJms`, and as\n    you can probably speculate, this annotation enables\
    \ the bean\n    postprocessor that will process the `@JmsListener`\n    annotations\
    \ and will create the message listener container \"under the\n    hood\". In this\
    \ class, the `connectionFactory`\n    bean was declared as well. In this example,\
    \ the type of the bean is\n    `org.springframework.jms.config.JmsListenerContainerFactory`,\n\
    \    and the implementation used is the Spring Boot `org.springframework.boot.autoconfigure.jms.\
    \ DefaultJmsListenerContainerFactoryConfigurer`, which will boot up\n    all Spring\
    \ Boot infrastructure beans necessary for a JMS application.\n\nThere is also\
    \ a converter bean defined of type `MappingJackson2MessageConverter`\n    implementing\
    \ the JMS `MessageConverter`\n    interface that transforms the sent objects into\
    \ text JSON format. Using\n    a text converter is useful, especially when the\
    \ messages to send are not\n    of serializable types. And in this example, the\
    \ `User` and the `Confirmation` classes\n    were not declared to implement `Serializable`\n\
    \    intentionally.\n\nThe main method, aside from starting up the application,\
    \ instantiates a\n    `JmsTemplate`\n    object that is used to send a user object."
