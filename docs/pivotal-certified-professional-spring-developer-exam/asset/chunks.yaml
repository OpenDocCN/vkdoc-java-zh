  trans: "\n#### 注入非 Bean 的依赖项\n\n使用 Spring 进行依赖注入是一个庞大的主题，本书旨在涵盖企业开发中可能遇到的所有情况。之前提到过，可以注入`标量`值。这自然引出了关于类型转换的讨论。在前面的示例中，我们注入了一个布尔值，Spring\
    \ 容器知道如何从配置文件中获取文本值，并将其转换为 Bean 类型定义中指定的属性类型。Spring 容器知道如何为所有基本类型及其对应的包装类型执行此操作。默认情况下，支持字符串值、布尔值和数值类型。但请记住，对于布尔值和十进制类型，必须遵循这些类型的典型语法；否则，默认的\
    \ Spring 转换将无法工作。\n\n如果`Date`值的语法匹配任何使用“/”分隔符的日期模式（例如，dd/MM/yyyy、yyyy/MM/dd、dd/yyyy/MM），Spring\
    \ 也知道在注入前自动转换它们。但要注意，即使是无效的数字组合（例如 25/2433/23）也会被接受并转换。\n\n为了支持任何其他类型，必须告知 Spring\
    \ 容器如何将属性的值转换为构造函数或 setter 方法所要求的参数类型。最常用的方法是使用属性编辑器。这是一个 Spring 概念，描述了一个用于处理任何`Object`和`String`之间转换的组件。为了实现这种转换，您需要为`java.beans.PropertyEditor`定义一个自定义实现，并将其注册到\
    \ Spring 上下文中。开箱即用，Spring 为常用类型提供了许多`PropertyEditor`实现。⁴ 开发人员需要做的就是自定义并注册它们。\n\
    \n假设我们想定义一个如下的 Person Bean：\n\n有多种方法可以告诉 Spring IoC 如何将值 1977-10-16 转换为 Date。既然提到了`java.beans.PropertyEditor`，第一个示例将使用\
    \ Spring 的`org.springframework.beans.propertyeditors.CustomDateEditor`。为此，我们需要执行以下操作：\n\
    \n*   定义一个实现`org.springframework.beans.PropertyEditorRegistrar`的类，该类注册`org.springframework.beans.propertyeditors.CustomDateEditor`（Spring\
    \ 内置的用于`java.util.Date`和`String`之间转换的实现）的自定义版本：\n\n*   为`org.springframework.beans.factory.config.CustomEditorConfigurer`添加一个\
    \ Bean 定义，并将其`propertyEditorRegistrars`属性的参数设置为一个包含`DataConverter`类型 Bean 的列表：\n\
    \n```\npackage com.ps.beans.others;\nimport org.springframework.beans.PropertyEditorRegistrar;\n\
    import org.springframework.beans.PropertyEditorRegistry;\nimport org.springframework.beans.propertyeditors.CustomDateEditor;\n\
    import java.text.SimpleDateFormat;\nimport java.util.Date;\npublic class DateConverter\
    \ implements PropertyEditorRegistrar {\n@Override\npublic void registerCustomEditors(PropertyEditorRegistry\
    \ registry) {\nregistry.registerCustomEditor(Date.class,\nnew CustomDateEditor(new\
    \ SimpleDateFormat(\"yyyy-MM-dd\"), false));\n}\n}\n```\n\n第二个示例展示了如何仅通过配置来完成此操作，并使用`<bean\
    \ />`元素的两个属性（`factory-bean`和`factory-method`），这些属性将在后续章节中介绍。`formatter` Bean 被用作一个工厂\
    \ Bean，它根据传递给`parse`方法的字符串参数创建日期值。这种方法的缺点是 Bean 的定义被转换定义所污染。\n\n在 Web 应用上下文中，必须提供并注册一个`org.springframework.format.Formatter`的实现。\n\
    \n!\n\n在`02-ps-container-01-practice`中提供了一个包含各种类型字段的示例 Bean。该类名为`com.ps.beans.others.MultipleTypesBean`，可以通过运行名为`com.ps.beans.others.MtBeanTest`的测试类来测试它。Bean\
    \ 定义可以在`02-ps-container-01-practice/src/main/resources/spring/others/sample-config-01.xml`文件中找到，如下代码片段所示：\n\
    \n如图 2-11 所示，以调试模式运行测试，并在`assertNotNull(mtBean);`行设置断点。在调试控制台（图底部可见）中，您可以看到`mtBean`所有字段的值。\n\
    \n![A978-1-4842-0811-3_2_Fig11_HTML.jpg](img/A978-1-4842-0811-3_2_Fig11_HTML.jpg)\n\
    \n图 2-11.\n\n以调试模式运行测试以检查 MultipleTypesBean 类型 Bean 的字段\n\n后缀为`One`的字段是基本类型；其他的是对象。注意它们是如何被正确初始化的，并且\
    \ Bean 定义中的值被转换为了适当的类型。\n\n另一种常用的对象类型是集合。为了简化集合与 Bean 的配合使用，Spring 开发团队创建了`util`命名空间。在前面的代码片段中，您可能注意到了`<list\
    \ />`元素。这就是在不使用`util`命名空间的情况下使用集合的方式，并且将提供另一个代码片段来使它们的用法更清晰。考虑一个名为`CollectionHolder`的类，定义如下代码片段所示：\n\
    \n```\npublic class CollectionHolder {\nprivate List simpleBeanList;\nprivate\
    \ Set simpleBeanSet;\nprivate Map simpleBeanMap;\npublic void setSimpleBeanList(List\
    \ simpleBeanList) {\nthis.simpleBeanList = simpleBeanList;\n}\npublic void setSimpleBeanSet(Set\
    \ simpleBeanSet) {\nthis.simpleBeanSet = simpleBeanSet;\n}\npublic void setSimpleBeanMap(Map\
    \ simpleBeanMap) {\nthis.simpleBeanMap = simpleBeanMap;\n}\n/**\n* 此方法仅用于验证注入到此类型\
    \ Bean 中的集合\n*/\n@Override\npublic String toString() {\nreturn \"CollectionHolder{\"\
    \ +\n\"simpleBeanList=\" + simpleBeanList +\n\", simpleBeanSet=\" + simpleBeanSet\
    \ +\n\", simpleBeanMap=\" + simpleBeanMap +\n’}’;\n}\n}\n```\n\n`collectionHolder`\
    \ Bean 的状态将使用以下测试类进行测试：\n\n```\n// CollectionTest.java\npublic class MtBeanTest\
    \ {\nprivate Logger logger = LoggerFactory.getLogger(SIBeansTest.class);\n@Test\n\
    public void testConfig() {\nApplicationContext ctx = new ClassPathXmlApplicationContext\n\
    (\"classpath:spring/others/sample-config-01.xml\");\nCollectionHolder ctBean =\
    \ (CollectionHolder) ctx.getBean(\"collectionHolder\");\nassertNotNull(ctBean);\n\
    (*) logger.info(ctBean.toString());\n}\n}\n```\n\n可以创建 Bean，并像以下示例一样为其集合属性注入值：\n\
    \n*   注入空集合测试类中标记为 (`*`) 行的`logger.info`语句将打印：`CollectionHolder{simpleBeanList=[],\
    \ simpleBeanSet=[], simpleBeanMap={}}`\n*   注入包含`SimpleBean`元素的 List 类型属性测试类中标记为\
    \ `(*)` 行的`logger.info`语句将打印：\n\n```\n    CollectionHolder{\n    simpleBeanList=[\n\
    \    SimpleBeanImpl{ code: 454325163},\n    SimpleBeanImpl{ code: 796667727},\n\
    \    null\n    ],\n    simpleBeanSet=null, simpleBeanMap=null\n    }\n    ```\n"
- fmt: 'Here is a detailed explanation of the three injected elements:

    - `<ref bean="simpleBean"/>` is referencing an existing bean. At runtime, the
    bean named `simpleBean` will be added to the list. Equivalent to `list.add(simpleBean)`.

    - `<bean class="com.ps.beans.SimpleBeanImpl"/>` is used to define a bean that
    is created on the spot. Equivalent to `list.add(new SimpleBeanImpl)`. This bean
    definition declares a bean called inner bean, a concept that will be covered later.

    - `<null/>` is used to add a `null` element to the list. Equivalent to `list.add(null)`.


    What was done with the `list` element can be done with the `set` element as well.
    Inject a property of type `Map<String, SimpleBean>`:


    The `logger.info` statement in the line marked with `(*)` in the test class will
    print the following:


    ```

    CollectionHolder{

    simpleBeanList=null, simpleBeanSet=null,

    simpleBeanMap={

    one=SimpleBeanImpl{ code: 454325163}

    }

    }

    ```


    In using the `<map />` element with values or keys of non-primitive types, the
    `"-ref"` postfix is used to reference an existing bean. Also, beans cannot be
    created on the spot, as in `<list />` and `<set />` elements. Nor can `<null />`
    elements be used.


    Without using the `util` namespace, collection elements cannot be defined outside
    the definition of a bean in a configuration file. The `util` namespace was introduced
    to deal with common utility configuration issues such as defining and injecting
    collections, `java.util.Properties` objects, referencing constants. To use its
    elements, it has to be added to the list of namespaces in the `<beans />` element.
    Using this namespace, collections can be `defined` under the `<beans \>` element.
    They are assigned their own ids, which can be used to reference them for injection
    into multiple beans. They are basically used in the same ways that beans are.


    In the previous code snippet, you can notice how the `simpleList` component is
    injected into two beans: `collectionHolder` and `collectionHolder2`.


    Another type of bean used quite often in Spring applications is the `java.util.Properties`
    type. It can be defined and used in a similar way as the other collections were
    used in the previous examples. This type was not covered in the previous examples,
    because it was saved for something special.


    ### Using Bean Factories


    The `<bean />` element has more attributes and can also be used to declare beans
    that are created by a factory method[⁵](#A978-1-4842-0811-3_2_Chapter.html#Fn5)
    or singleton[⁶](#A978-1-4842-0811-3_2_Chapter.html#Fn6) objects. To use a singleton
    class to create a bean, the `factory-method` attribute is used, and its value
    will be the static method name that returns the bean instance. Here is a simple
    example showing how a bean can be created using a singleton class and the bean
    configuration:


    ```

    // SimpleSingleton.java

    public class SimpleSingleton {

    private static SimpleSingleton instance = new SimpleSingleton();

    private SimpleSingleton() { }

    public static SimpleSingleton getInstance(){

    return instance;

    }

    }

    ```


    To use a factory object to create a bean, the `factory-bean` and `factory-method`
    attributes are used. As their so obvious names say, the first one points to the
    object used to create the bean, and the other specifies the method name that returns
    the actual result (not static in this case). Here is a snippet of code depicting
    a bean being created by a factory bean:


    ```

    // SimpleSingleton.java

    public class SimpleFactoryBean {

    public SimpleBean getSimpleBean() {

    return new SimpleBeanImpl();

    }

    }

    ```


    Although it seems somewhat redundant, creating beans in this way might be useful
    when one is using third-party libraries that only allow creating objects using
    a factory class. And this method can be used to connect existing components to
    provide a certain behavior, such as helping Spring to convert `String` values
    to `Date` objects using a format pattern different from the default one, as was
    presented in the section Injecting Dependencies That Are Not Beans.


    Spring comes to the rescue in this case as well, by providing an interface named
    `org.springframework.beans.factory.FactoryBean<T>`. This is used by many Spring
    classes in order to simplify configuration. By implementing this interface, the
    factory beans will be automatically picked up by the Spring container, and the
    desired bean will be created by automatically calling the `getObject` method.
    Even if implementing your factories in this way ties your code to Spring components,
    which usually is recommended to be avoided, this method is practical and could
    be used in case of need.


    ```

    //SpringFactoryBean.java

    import org.springframework.beans.factory.FactoryBean;

    ...

    public class SpringFactoryBean implements FactoryBean {

    private Logger logger = LoggerFactory.getLogger(SpringFactoryBean.class);

    private SimpleBean simpleBean = new SimpleBeanImpl();

    public SpringFactoryBean() {

    logger.info(">> Look ma, no definition!");

    }

    @Override

    public SimpleBean getObject() throws Exception {

    return this.simpleBean;

    }

    @Override

    public Class getObjectType() {

    return SimpleBean.class;

    }

    @Override

    public boolean isSingleton() {

    return true;

    }

    }

    ```


    If you are curious about the Spring classes that implement `org.springframework.beans.factory.FactoryBean`,
    Intellij IDEA can help you there. The class depicted in the previous code snippet
    is a part of `02-ps-container-01-practice`. Just open that class, click on the
    interface name, and press CTRL (Command in MacOS)+ALT+B, and a list of classes
    implementing it will be displayed, as depicted in Figure [2-12](#A978-1-4842-0811-3_2_Chapter.html#Fig12).


    ![A978-1-4842-0811-3_2_Fig12_HTML.jpg](A978-1-4842-0811-3_2_Fig12_HTML.jpg)


    Figure 2-12. Classes implementing the FactoryBean interface


    Spring factory bean classes provide assistance for configuring data access using
    Hibernate and JPA, for handling transactions, for configuring caching with EhCache,
    and so on. A few of them will be used in the code samples for this book, so you
    will have occasion to see them in action.'
