- fmt: "但通常一个应用程序会使用多个横切关注点，最常见的组合是：安全 + 日志（或审计）+ 事务。因此，提供并管理数据访问权限的服务类最终会变得如图 [4-4](#A978-1-4842-0811-3_4_Chapter.html#Fig4)\
    \ 所示。\n\n![A978-1-4842-0811-3_4_Fig4_HTML.jpg](A978-1-4842-0811-3_4_Fig4_HTML.jpg)\n\
    \n图 4-4. 未使用 AOP 的服务类中的代码纠缠与散射\n\n当基础代码需要在特定条件下执行时，代码纠缠和代码散射这两个问题通常会同时出现。代码纠缠意味着同一个组件被注入到许多其他组件中，从而导致组件之间产生显著的依赖耦合。代码散射意味着重复，因为你只能以一种方式完成同一件事。由此产生的解决方案难以扩展和维护，难以理解，并且调试起来也很痛苦。使用\
    \ AOP，程序员可以专注于核心实现，然后定义切面组件来处理横切关注点。AOP 提供了比 OOP 更强的模块化能力。\n\n## Spring AOP\n\n\
    最初提供用于创建切面组件的库名为 `AspectJ`。它由 Xerox PARC 公司开发，并于 1995 年发布。由于其简单易用，它定义了 AOP 的标准。用于定义切面的语言语法类似于\
    \ Java，允许开发者定义称为切面的特殊构造。在 `AspectJ` 中开发的切面在编译时处理，因此它们直接影响生成的字节码。\n\nSpring AOP\
    \ 框架是对当前版本 `AspectJ` 的补充，并包含许多可用于使用 Java 代码开发和配置切面的注解，但 Spring 开发团队了解并承认其局限性。例如，它无法通知细粒度的对象，如领域对象。Spring\
    \ AOP 功能基于 `AspectJ`，这就是为什么在使用 Spring AOP 库时，必须将 `aspectjweaver` 和 `aspectjrt`\
    \ 添加到应用程序类路径中。\n\n此外，Spring AOP 无法通知不受 Spring 容器管理的对象。`AspectJ` 可以做到这一点。Spring\
    \ AOP 使用动态代理进行切面织入，因此目标对象的字节码不会受到任何影响。同时，遵循 Spring 的惯例，Spring AOP 是非侵入式的，其开发方式使得\
    \ AOP 组件与应用程序组件保持解耦。\n\n在早期版本中，XML 被用于定义切面。本章的目的是帮助你模块化代码，以便使用 Spring 提供的所有功能来消除（或至少减少到最低限度）代码纠缠和散射。\n\
    \nSpring 框架由几个库组成：\n\n- `spring-aop` 提供符合 AOP Alliance API 的组件，可用于定义方法拦截器和切入点，从而使具有不同职责的代码能够被清晰地解耦。\n\
    - `spring-aspects` 提供与 `AspectJ` 的集成。\n- `spring-instrument` 提供类插装支持和可用于应用服务器的类加载器实现。\n\
    - `spring-instrument-tomcat` 包含 Spring 用于 Tomcat 的插装代理。\n\nSpring IoC 可用于编写软件应用程序，而对于需要使用横切关注点的业务应用程序，使用\
    \ Spring AOP 是必须的。在深入探讨之前，让我们先介绍 AOP 概念以及它们在 Spring 中是如何声明的。\n\n## AOP 术语\n\n\
    本章引言中提到了几个特定的 AOP 术语，但需要更详细的解释。\n\n- **切面**：包含特定于横切关注点代码的类。如果一个类使用 `@Aspect` 注解进行标注，则它在\
    \ Spring 中被识别为一个切面。\n- **织入**：这个词的同义词是交织，但在软件中，同义词是链接，它指的是将切面与其他类型的对象组合以创建一个被通知的对象。\n\
    - **连接点**：程序执行过程中的一个点。在 Spring AOP 中，连接点始终是一个方法执行。基本上，连接点标记了切面行为和基础行为结合的执行点。\n\
    - **目标对象**：切面所应用的对象。\n- **目标方法**：被通知的方法。\n- **通知**：切面在连接点处执行的动作。在 Spring AOP 中有多种通知类型：\n\
    \    - **前置通知**：使用 `@Before` 注解的方法，将在连接点之前执行。除非抛出异常，否则这些方法不会阻止目标方法的执行。\n    -\
    \ **返回后通知**：使用 `@AfterReturning` 注解的方法，将在连接点正常完成后执行，这意味着目标方法正常返回且没有抛出异常。\n   \
    \ - **异常后通知**：使用 `@AfterThrowing` 注解的方法，将在连接点执行因抛出异常而结束后执行。\n    - **最终通知**：使用\
    \ `@After` 注解的方法，将在连接点执行后执行，无论执行如何结束。\n    - **环绕通知**：使用 `@Around` 注解的方法会拦截目标方法并包围连接点。这是最强大的通知类型，因为它可以在调用前后执行自定义行为。它有责任选择执行调用或返回自己的值。\n\
    - **切入点**：用于识别连接点的谓词。通知定义与切入点表达式相关联，并且通知将在任何匹配该切入点表达式的连接点上执行。切入点表达式使用 AspectJ\
    \ 切入点表达式语言定义。[¹](#A978-1-4842-0811-3_4_Chapter.html#Fn1) 切入点表达式可以作为通知注解的参数或 `@Pointcut`\
    \ 注解的参数来定义。\n- **引入**：代表另一种类型声明额外的方法、字段、实现的接口或注解。Spring AOP 允许使用 `AspectJ` 中属于\
    \ `aspectjrt` 库的一组 `@Declare*` 注解来实现这一点。\n- **AOP 代理**：由 AOP 创建以实现切面契约的对象。在 Spring\
    \ 中，代理对象可以是 JDK 动态代理或 `CGLIB` 代理。默认情况下，代理对象将是 JDK 动态代理，并且被代理的对象必须实现一个接口，该接口也将由代理对象实现。但是，像\
    \ `CGLIB` 这样的库也可以通过子类化来创建代理，因此不需要接口。\n\n## 快速入门\n\n为了快速介绍上一节中的大多数 Spring AOP 术语，让我们考虑一个非常简单的例子。假设有一个\
    \ `JdbcTemplateUserRepo` bean，它包含几个用于查询或修改 `User` 实例的简单方法。"
  raw: "But usually an application uses more than one cross-cutting concern, the\n\
    most common grouping is: security + logging (or auditing) +\ntransactions. So\
    \ service classes that provide and regulate access to\ndata end up looking like\
    \ Figure [4-4](#A978-1-4842-0811-3_4_Chapter.html#Fig4).\n\n![A978-1-4842-0811-3_4_Fig4_HTML.jpg](A978-1-4842-0811-3_4_Fig4_HTML.jpg)\n\
    \nFigure 4-4.\n\nCode tangling and scattering in service classes without AOP\n\
    \nCode tangling and code scattering are two issues that come together when\nbase\
    \ code needs to be executed under certain conditions. Code tangling\nmeans that\
    \ the same component is injected into many others, thus leading\nto significant\
    \ dependencies coupling components together. Code\nscattering means duplication,\
    \ because you can do the same thing in only\none way. The resulting solution is\
    \ difficult to extend and to maintain,\nharder to understand, and a pain to debug.\
    \ Using AOP, a programmer can\nfocus on the core implementation, then define aspect\
    \ components to cover\nthe cross-cutting concerns. AOP provides even more modularization\
    \ than\nOOP does.\n\nSpring AOP\n\nThe original library that provided components\
    \ for creating aspects is\nnamed AspectJ. It was developed by\nthe Xerox PARC\
    \ company and released in 1995\\. It defined a standard for\nAOP because of its\
    \ simplicity and usability. The language syntax used to\ndefine aspects was similar\
    \ to Java and allowed developers to define\nspecial constructs called aspects.\
    \ The aspects developed in AspectJ are\nprocessed at compile time, so they directly\
    \ affect the generated\nbytecode.\n\nThe Spring AOP framework is a complement\
    \ to the current version of\nAspectJ and contains many annotations that can be\
    \ used to develop and\nconfigure aspects using Java code, but the Spring development\
    \ team knows\nand recognizes its limitations. For example, it cannot advise\n\
    fine-grained objects such as domain objects. Spring AOP functionality is\nbased\
    \ on AspectJ, which is why when Spring AOP libraries are used, `aspectjweaver`\
    \ and\n`aspectjrt` must\nbe added to the application classpath.\n\nAlso, Spring\
    \ AOP cannot advise objects that are not managed by the\nSpring container. AspectJ\
    \ can do that. Spring AOP uses dynamic proxies\nfor aspect weaving, so the bytecode\
    \ of the target objects is not\naffected in any way. Also, following the Spring\
    \ convention, Spring AOP\nis non-invasive having been developed in such a way\
    \ to keep AOP\ncomponents decoupled from application components.\n\nIn earlier\
    \ versions, XML was used to define aspects. The purpose of this\nchapter is to\
    \ help you modularize your code so that tangling and\nscattering are eliminated\
    \ (or at least reduced to a minimum) using\neverything Spring has to offer.\n\n\
    The Spring Framework is composed of a few libraries:\n\n*   spring-aop provides\
    \ AOP alliance\n    API compliant components that can be used to define method\
    \ interceptors\n    and pointcuts so that code with different responsibilities\
    \ can be\n    cleanly decoupled.\n\n*   spring-aspects provides\n    integration\
    \ with AspectJ.\n\n*   spring-instrument provides class\n    instrumentation support\
    \ and classloader implementations that can be used\n    on application servers.\n\
    \n*   spring-instrument-tomcat contains\n    Spring’s instrumentation agent for\
    \ Tomcat.\n\nSpring IoC can be used to write software applications, and for business\n\
    applications that require the use of cross-cutting concerns, using\nSpring AOP\
    \ is a must. Before digging into it, let’s introduce the AOP\nconcepts and how\
    \ they are declared in Spring.\n\nAOP Terminology\n\nA few specific AOP terms\
    \ were mentioned in the introduction of this\nchapter, but a more detailed explanation\
    \ is required.\n\n*   Aspect: a class containing code\n    specific to a cross-cutting\
    \ concern. A class declaration is recognized\n    in Spring as an aspect if it\
    \ is annotated with the `@Aspect` annotation.\n\n*   Weaving: a synonym for this\
    \ word\n    is interlacing, but in software,\n    the synonym is linking, and\
    \ it\n    refers to aspects being combined with other types of objects to create\n\
    \    an advised object.\n\n*   Join point: a point during the\n    execution of\
    \ a program. In Spring AOP, a joint point is always a method\n    execution. Basically,\
    \ the join point marks the execution point where\n    aspect behavior and base\
    \ behavior join.\n\n*   Target object: object to which the\n    aspect applies.\n\
    \n*   Target method: the advised method.\n\n*   Advice: action taken by an aspect\n\
    \    at a join point. In Spring AOP there are multiple advice types:\n\n*   Before\
    \ advice: methods annotated\n        with `@Before`\n        that will execute\
    \ before the join point. These methods do not prevent\n        the execution of\
    \ the target method unless they throw an exception.\n\n*   After returning advice:\
    \ methods\n        annotated with `@AfterReturning` that\n        will execute\
    \ after a join point completes normally, meaning that the\n        target method\
    \ returns normally without throwing an exception.\n\n*   After throwing advice:\
    \ methods\n        annotated with `@AfterThrowing` that\n        will execute\
    \ after a join point execution ends by throwing an exception.\n\n*   After (finally)\
    \ advice: methods\n        annotated with `@After` that will\n        execute\
    \ after a join point execution, no matter how the execution ended.\n\n*   Around\
    \ advice: methods annotated\n        with `@Around`\n        intercept the target\
    \ method and surround the join point. This is the\n        most powerful type\
    \ of advice, since it can perform custom behavior\n        before and after the\
    \ invocation. It has the responsibility of choosing\n        to perform the invocation\
    \ or return its own value.\n\n*   Pointcut: a predicate used to\n    identify\
    \ join points. Advice definitions are associated with a pointcut\n    expression\
    \ and the advice will execute on any join point matching the\n    pointcut expression.\
    \ Pointcut expressions are defined using AspectJ\n    Pointcut Expression Language.[¹](#A978-1-4842-0811-3_4_Chapter.html#Fn1)\n\
    \    Pointcut expressions can be defined as arguments for Advice annotations\n\
    \    or as arguments for the `@Pointcut` annotation.\n\n*   Introduction: declaring\
    \ additional\n    methods, fields, interfaces being implemented, annotations on\
    \ behalf of\n    another type. Spring AOP allows this using a suite of AspectJ\
    \ `@Declare*` annotations\n    that are part of the aspectjrt library.\n\n*  \
    \ AOP proxy: the object created by\n    AOP to implement the aspect contracts.\
    \ In Spring, proxy objects can be\n    JDK dynamic proxies or `CGLIB` proxies.\
    \ By\n    default, the proxy objects will be JDK dynamic proxies, and the object\n\
    \    being proxied must implement an interface, that will also be implemented\n\
    \    by the proxy object. But a library like CGLIB can be used to create\n   \
    \ proxies by subclassing too, so an interface is not needed.\n\nQuick Start\n\n\
    To quickly introduce most Spring AOP terms in the previous section,\nlet’s consider\
    \ a very simple example. Let’s consider a `JdbcTemplateUserRepo`\nbean with a\
    \ few simple methods used to query for or modify `User` instances.+"
