    \ injection and provides a container for\n    Inversion of Control, which takes\
    \ care of injecting the dependencies\n    according to the configuration.\n\n\
    *   The two flavors of configuration can also be mixed: XML-based when beans\n\
    \    declarations are decoupled from code and Java Configuration when bean\n \
    \   declarations are in the code.\n\n*   Spring promotes the use of interfaces,\
    \ so beans of types implementing\n    the same interface can be easily interchanged.\n\
    \n*   The Spring way of configuration promotes testability. Since beans can be\n\
    \    interchanged, it is easy to use stubs and mocks to isolate components.\n\n\
    *   The bean lifecycle can be controlled; behavior can be added at specific\n\
    \    points during the bean life.\n\n*   Spring offers many ways to simplify configuration:\
    \ bean inheritance,\n    nesting and namespaces in XML, and a lot of convention\
    \ over\n    configuration default behavior in Java Configuration.\n\n*   Bean\
    \ definition sources can be coupled by importing them one into\n    another, or\
    \ by composing them in order to create an application context.\n\n2.1 Quick quiz\n\
    \nQuestion 1: What is a bean?\n(choose all that apply)\n\n1.  a Plain Old Java\
    \ Object\n\n2.  an instance of a class\n\n3.  an object that is instantiated,\
    \ assembled, and managed by a Spring IoC\n    Container\n\nQuestion 2: What is\
    \ the default\nscope of a bean?\n\n1.  default\n\n2.  singleton\n\n3.  protected\n\
    \n4.  prototype\n\nQuestion 3: What are the types of\ndependency injection supported\
    \ by Spring IoC Container? (choose all that\napply)\n\n1.  setter injection\n\n\
    2.  constructorinjection\n\n3.  interface-based injection\n\n4.  field-based injection\n\
    \nQuestion 4: What class is used to\nbootstrap an XML configured application context?\n\
    \n1.  `ClassPathXmlApplicationContext`\n\n2.  `AnnotationConfigApplicationContext`\n\
    \n3.  `ApplicationContext`"
  trans: "\n使用注解进行 Spring 配置非常强大且灵活。\n本书将同时介绍 Java 配置和注解，\n因为这是实践中常用的方式。当然，\n仍有偏好\
    \ XML 的老派开发者，以及喜欢混合搭配的\n务实开发者。使用注解进行配置很实用，因为它\n能帮助减少项目中的资源文件数量，但\n缺点是其分散在代码各处。不过，由于与代码绑定，\n\
    重构过程变得可行，无需在 XML 文件中痛苦地搜索 bean 定义，\n尽管如今智能编辑器在这方面能提供很大帮助。注解配置\n更适合频繁变更的 bean：自定义业务\
    \ bean，例如服务、仓库和控制器。想象一下，\n为构造函数添加一个新参数，然后需要在 XML 文件中搜寻 bean\n以便更新定义。Java 配置\n\
    注解应用于配置基础设施 bean（数据源、持久化单元等）。\n\n使用 XML 也有其优势。主要优势在于\n配置集中在应用程序的少数几个部分，但 Java\
    \ 配置\n也能做到这一点。此外，XML 得到广泛支持和熟知。\n最终，只有上下文才能决定最合适的\n解决方案。如果你是一位 Spring 专家，开始开发自己的\n\
    初创应用，你可能会选择 Java 配置和\n注解。可能还会选择 Spring Boot，它通过提供超级元注解来配置项目所需的大部分\n基础设施，从而让你的工作更加轻松。如果你在一个包含遗留代码的大型项目上工作，\n\
    你可能不得不忍受这里那里的一些 XML 配置。\n无论哪种情况，遵循良好实践并阅读手册，你就应该没问题。\n\n总结\n\n阅读本章后，你应该掌握足够的知识来\n\
    配置一个 Spring 应用程序，使用 XML、Java 配置和\n注解，或全部三者，并利用 bean 的强大功能来开发\n小型 Spring 应用程序。\n\
    \n*   Spring 专为依赖注入而构建，并提供了一个用于\n    控制反转的容器，该容器负责根据配置注入依赖项。\n\n*   两种配置风格也可以混合使用：当\
    \ bean 声明与代码解耦时使用基于 XML 的配置，当 bean 声明在代码中时使用 Java 配置。\n\n*   Spring 提倡使用接口，因此实现同一接口的\
    \ bean 类型可以轻松互换。\n\n*   Spring 的配置方式提升了可测试性。由于 bean 可以互换，因此很容易使用桩和模拟来隔离组件。\n\n\
    *   bean 的生命周期可以控制；可以在 bean 生命周期的特定点添加行为。\n\n*   Spring 提供了许多简化配置的方法：XML 中的 bean\
    \ 继承、嵌套和命名空间，以及 Java 配置中大量约定优于配置的默认行为。\n\n*   Bean 定义源可以通过相互导入来耦合，或者通过组合它们来创建应用程序上下文。\n\
    \n2.1 快速测验\n\n问题 1：什么是 bean？\n（选择所有适用的选项）\n\n1.  一个普通的 Java 对象\n\n2.  一个类的实例\n\
    \n3.  一个由 Spring IoC 容器实例化、组装和管理的对象\n\n问题 2：bean 的默认作用域是什么？\n\n1.  default\n\n\
    2.  singleton\n\n3.  protected\n\n4.  prototype\n\n问题 3：Spring IoC 容器支持哪些类型的依赖注入？（选择所有适用的选项）\n\
    \n1.  setter 注入\n\n2.  构造函数注入\n\n3.  基于接口的注入\n\n4.  基于字段的注入\n\n问题 4：用于引导 XML 配置的应用程序上下文的类是什么？\n\
    \n1.  `ClassPathXmlApplicationContext`\n\n2.  `AnnotationConfigApplicationContext`\n\
    \n3.  `ApplicationContext`\n"
- fmt: '### Question 5: Which of the following are stereotype annotations? (choose
    all that apply)


    1. `@Component`

    2. `@Bean`

    3. `@PostConstruct`

    4. `@Scope`

    5. `@Configuration`


    ### Question 6: What is the difference between declaring a bean with `@Bean` and
    with `@Component`?


    1. `@Bean` annotates a method that creates a bean in a configuration class; `@Component`
    annotates classes to mark them as bean definitions for the Spring Container.

    2. `@Bean` is a specialization of `@Component` and annotates classes to mark them
    as bean definitions for the Spring Container.

    3. `@Bean` is the JSR 250 equivalent of `@Component`.


    ### Question 7: Given the following bean definition, what will be printed in the
    log when the application runs?


    1. The application won’t run, it will crash in the initialization phase because
    the `initMethod` is private.

    2. The application will run, but won’t create the `quizBean` because its initialization
    method is private.

    3. `--> I’m calling it bean soon`


    ```

    public class QuizBean {

    // assume correct logger instantiation here

    Logger log =...;

    private void initMethod() {

    logger.info("--> I’m calling it bean soon");

    }

    }

    // bean configuration

    ```


    ### Question 8: Given the `quizBean` bean definition, choose from the list the
    bean definitions that are equivalent.


    ```

    A. @Component

    public class QuizBean {

    public void setPetitBean(PetitBean petitBean) {

    this.petitBean = petitBean;

    }

    @PostConstruct

    private void initMethod() {

    logger.info("--> I’m calling it bean soon");

    }

    }

    B. @Configuration

    public class QuizConfiguration {

    //assume petitBean() is defined here

    @Bean(initMethod="initMethod")

    private QuizBean getQuizBean() {

    return new QuizBean(petitBean());

    }

    }

    C.

    ```


    ### Question 9: Which of the following beans is a bean factory post processor?


    1. `ClassPathXmlApplicationContext`

    2. `PropertySourcesPlaceholderConfigurer`

    3. `CommonAnnotationBeanPostProcessor`


    ### Question 10: What is the correct way to import bean definitions from an XML
    file into a configuration class?


    1. `@Import("classpath:spring/app-config.xml")`

    2. `@Resource("classpath:spring/app-config.xml")`

    3. `@ImportResource("classpath:spring/app-config.xml")`


    ### Question 11: Given the following configuration class and bean, the bean being
    autowired into another bean as dependency, what happens when the application runs?


    1. An exception will be thrown because there is no scope defined for the bean
    of type `QuizBean`.

    2. An exception will be thrown because `@ComponentScan` is missing from the configuration
    class so the bean definitions are not discovered.

    3. A bean of type `QuizBean` is created and autowired into a bean of type `AnotherQuizBean`.


    ```

    package com.cfg;

    //configuration

    @Configuration

    public class AppConfig {}

    package com.quiz;

    // bean

    @Component

    public class QuizBean {}

    package com.another.quiz;

    // autowiring the bean

    @Component

    public class AnotherQuizBean {

    @Autowired

    QuizBean quizBean;

    }

    ```


    ### Question 12: The Spring IoC container by default tries to identify beans to
    autowire by type; if multiple beans are found, it chooses for autowiring the one
    that has the same name with the dependency being autowired.


    1. True

    2. False


    ### Footnotes


    If you are interested in more books about Java Design Patterns, you can check
    out this book from Apress: [`http://www.apress.com/9781484218013?gtmf=s`](http://www.apress.com/9781484218013?gtmf=s).


    Oracle was used for data storage in this example because most production applications
    use Oracle for storage, and this book aims to provide real configurations such
    as you will probably encounter and need while working in software development.


    The term “scalar” comes from linear algebra, where it is used to differentiate
    a number from a vector or matrix. In computing, the term has a similar meaning.
    It distinguishes a single value such as an integer or float from a data structure
    like an array. In Spring, scalar refers to any value that is not a bean and cannot
    be treated as such.'
