    ...


    ...


    ```


    如果服务已正确启动，则可以在 [ `http://192.168.56.1:3000/eureka/apps/PETS-SERVICE`

    ](http://192.168.56.1:3000/eureka/apps/PETS-SERVICE) 获取相同的信息。否则，将显示 404 错误。

