- fmt: "```java\n@RestController\n@SpringBootApplication(scanBasePackages = {\"com.ps.start\"\
    })\n@EnableConfigurationProperties(AppSettings.class)\npublic class Application\
    \ extends SpringBootServletInitializer {\n    ...\n    @Autowired\n    private\
    \ AppSettings appSettings;\n    @Bean\n    public EmbeddedServletContainerFactory\
    \ servletContainer() {\n        TomcatEmbeddedServletContainerFactory factory\
    \ = new TomcatEmbeddedServletContainerFactory();\n        factory.setPort(appSettings.getPort());\n\
    \        factory.setSessionTimeout(appSettings.getSessionTimeout(), TimeUnit.MINUTES);\n\
    \        factory.setContextPath(appSettings.getContext());\n        return factory;\n\
    \    }\n    ....\n}\n```\n\n请记住，YAML 文件不能通过`@PropertySource`注解加载。此注解特定于属性文件。\n\
    \n## 日志记录\n\nSpring Boot 默认在内部使用`Commons Logging`，但底层实现是开放的。支持 Log4j2、Java Util\
    \ 和 Logback。本书附带的应用程序使用 Logback。启动器默认使用 Logback，并预配置为使用控制台作为输出，但可以通过位于`/src/main/resources`下的`logback.xml`文件进行配置。默认情况下，会记录\
    \ ERROR、WARN 和 INFO 级别的消息。要修改此行为并为核心日志记录器（嵌入式容器、Hibernate 和 Spring Boot）启用 DEBUG\
    \ 消息，必须编辑`application.properties`文件，并添加以下属性：`debug=true`。\n\n日志记录在应用程序上下文初始化之前进行，因此无法通过`@Configuration`类中的`@PropertySources`来控制日志记录。应使用系统属性和常规的\
    \ Spring Boot 外部配置文件。根据所使用的日志系统，Spring Boot 将按以下顺序查找特定的配置文件：\n\n- `logback-spring.xml`、`logback-spring.groovy`、`logback.xml`、`logback.groovy`\
    \ 用于 Logback\n- `log4j2-spring.xml`、`log4j2.xml` 用于 Log4j2\n- `logging.properties`\
    \ 用于 Java Util Logging\n\nSpring Boot 默认使用的日志文件名可以通过`logging.file` Spring 环境变量进行配置。还有更多\
    \ Spring 环境变量可用于配置 Spring Boot 日志记录，完整列表及其用途可在 Spring Boot 官方参考文档中找到。[^(21)](#A978-1-4842-0811-3_6_Chapter.html#Fn21)\
    \ 建议使用带有`-spring`后缀的文件名，因为当使用标准配置位置时，Spring 无法完全控制日志初始化。\n\n## 使用 Spring Boot\
    \ 进行测试\n\n测试 Spring 组件或 Bean 最实用的方法是完全不涉及 Spring。如果类有构造函数，直接使用 JUnit 断言即可。使用 Spring\
    \ 4.3 进行测试非常容易，因为不再需要使用`@Autowired`。在测试环境中，只要有一个构造函数，Spring 就会隐式地将其视为自动装配目标。在需要集成测试的更复杂应用程序中，测试可能会变得复杂。这就是为什么\
    \ Spring Boot 提供了一个辅助注解来配置测试环境。\n\n测试 Spring Web 应用程序意味着测试控制器是否按预期工作，是否返回正确的结果，以及是否使用了正确的视图。这可以在应用程序服务器外部完成，但在集成测试的情况下，嵌入式服务器对于在\
    \ Web 环境中进行测试非常有用。Spring Boot 通过提供专门的注解`@SpringBootTest`来实现这一点。此注解应用于运行基于 Spring\
    \ Boot 的测试的测试类。它提供以下功能：\n\n- 如果没有通过`@ContextConfiguration`指定`ContextLoader`，则默认使用`org.springframework.boot.test.context.SpringBootContextLoader`。\n\
    - 当使用嵌套的`@Configuration`类时，自动搜索 Spring Boot 配置。\n- 通过`properties`属性加载环境特定的属性。此属性允许将属性（键=值对）指定为属性的值。\n\
    \n```java\n@RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT,\n\
    \                properties = {\"app.port=9090\"})\npublic class CtxControllerTest\
    \ {\n    ...\n}\n```\n\n- 使用`webEnvironment`属性定义不同的 Web 环境模式，并在随机端口上启动一个完全运行的容器。\n\
    - 注册一个`org.springframework.boot.test.web.client.TestRestTemplate` Bean，用于使用完全运行容器的\
    \ Web 测试。\n\n因此，定义了以下控制器：\n\n```java\n@Controller\npublic class CtxController\
    \ {\n    public static final String INTRO = \"Hello there dear developer, here\
    \ are the beans you were looking for: \";\n    @Autowired\n    ApplicationContext\
    \ ctx;\n\n    @RequestMapping(\"/\")\n    @ResponseBody\n    public String index()\
    \ {\n        StringBuilder sb = new StringBuilder(\"\");\n        sb.append(INTRO);\n\
    \        String beanNames = ctx.getBeanDefinitionNames();\n        Arrays.sort(beanNames);\n\
    \        for (String beanName : beanNames) {\n            sb.append(\"\").append(beanName);\n\
    \        }\n        sb.append(\"\");\n        return sb.toString();\n    }\n\n\
    \    @RequestMapping(\"/home\")\n    public String home(ModelMap model) {\n  \
    \      model.put(\"bogus\", \"data\");\n        return \"home\";\n    }\n}\n```\n\
    \n可以使用 Spring Boot 轻松测试：\n\n```java\nimport org.junit.runner.RunWith;\nimport\
    \ org.springframework.boot.test.context.SpringBootTest;\nimport org.springframework.test.context.junit4.SpringRunner;\n\
    import org.springframework.ui.ModelMap;\n...\n@RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment\
    \ = SpringBootTest.WebEnvironment.RANDOM_PORT)\npublic class CtxControllerTest\
    \ {\n    @Autowired\n    CtxController ctxController;\n    private ModelMap model\
    \ = new ModelMap();\n\n    @Test\n    public void textIndex() {\n        String\
    \ result = ctxController.index();\n        assertNotNull(result);\n        assertTrue(result.contains(CtxController.INTRO));\n\
    \    }\n\n    @Test\n    public void textHome() {\n        String result = ctxController.home(model);\n\
    \        assertEquals(\"home\", result);\n        String modelData = (String)\
    \ model.get(\"bogus\");\n        assertEquals(\"data\", modelData);\n    }\n}\n\
    ```\n\n`SpringRunner`是 Spring 4.3 中引入的`SpringJUnit4ClassRunner`的别名。有关如何使用 Spring\
    \ Boot 1.4 和 Spring 4.3 改进测试的更多信息，请参阅 Spring 官方博客。[^(22)](#A978-1-4842-0811-3_6_Chapter.html#Fn22)\n\
    \nSpring Boot 是一个相当大的主题，在官方认证考试中有两章内容。但官方课程并未完全涵盖。要充分利用其功能，应阅读的完整文档是官方参考文档，可在此处公开获取：[`http://docs.spring.io/spring-boot/docs/current/reference/`](http://docs.spring.io/spring-boot/docs/current/reference/)。Spring\
    \ Boot 是加速开发的绝佳工具，如今，越来越多的开发 Spring 应用程序的公司正在使用它。\n\n## 总结\n\n以下是为您整理的与 Spring\
    \ Web MVC、Spring Security 和 Spring Boot 相关的核心概念和重要细节列表：\n\n- Spring Web MVC 旨在遵循\
    \ MVC 设计模式。\n- Spring Web 应用程序的入口点是`DispatcherServlet`，它是应用程序的前端控制器。\n- `DispatcherServlet`使用一组特定于\
    \ Web 的基础设施 Bean，将 HTTP 请求分配给称为控制器的类的方法调用。\n- 要创建 Spring Web MVC 应用程序，必须将`DispatcherServlet`配置为应用程序的入口点，并且应用程序配置必须包含基础设施\
    \ MVC Bean 以及自定义控制器和视图 Bean。\n- `@EnableWebMvc`注解用于 Spring Web MVC 应用程序的配置类。"
  raw: "```\n    @RestController\n    @SpringBootApplication(scanBasePackages  = \
    \ {\"com.ps.start\"})\n    @EnableConfigurationProperties(AppSettings.class)\n\
    \    public class Application extends SpringBootServletInitializer {\n    ...\n\
    \    @Autowired\n    private AppSettings appSettings;\n    @Bean\n    public EmbeddedServletContainerFactory\
    \ servletContainer() {\n    TomcatEmbeddedServletContainerFactory\n    factory\
    \ = new TomcatEmbeddedServletContainerFactory();\n    factory.setPort(appSettings.getPort());\n\
    \    factory.setSessionTimeout(\n    appSettings.getSessionTimeout(), TimeUnit.MINUTES);\n\
    \    factory.setContextPath(appSettings.getContext());\n    return factory;\n\
    \    }\n    ....\n    }\n    ```\n\n!\n\nJust keep in mind that YAML files can\
    \ not be loaded via the `@PropertySource`\nannotation. This annotation is specific\
    \ to properties files.\n\nLogging\n\nSpring Boot uses `Commons` `Logging` internally\
    \ by\ndefault, but it leaves the underlying implementation open. Log4j2, Java\n\
    Util, and Logback are supported. The application attached to this book\nuses Logback.\
    \ The starters use Logback by default, and it is\npreconfigured to use the console\
    \ as output, but it can be configured via\nthe `logback.xml`\nfile, which is located\
    \ under `/src/main/resources`.\nBy default, ERROR, WARN, and INFO level messages\
    \ are logged. To modify\nthis behavior and enable writing DEBUG messages for a\
    \ category of core\nloggers (embedded container, Hibernate, and Spring Boot),\
    \ the `application.properties`\nfile must be edited, and this property must be\
    \ added: `debug=true`.\n\nLogging is initialized before the application context,\
    \ so it is\nimpossible to control logging from using `@PropertySources` in\n`@Configuration`\n\
    classes. System properties and conventional Spring Boot external\nconfiguration\
    \ files should be used. Depending on the logging system that\nis used, Spring\
    \ Boot will look for the specific configuration files, in\nthe order stated below:\n\
    \n*   `logback-spring.xml, logback-spring.groovy, logback.xml, logback.groovy`\
    \ for Log-back\n\n*   `log4j2-spring.xml, log4j2.xml` for Log4j2\n\n*   `logging.properties`\n\
    \    for Java Util Logging\n\nThe logfile name to use by default by Spring Boot\
    \ can be configured\nusing the `logging.file` Spring\nEnvironment variable. There\
    \ are more Spring Environment variables that\ncan be used to configure Spring\
    \ Boot logging, and the full list and\npurposes are available in the Spring Boot\
    \ official reference\ndocumentation.[^(21)](#A978-1-4842-0811-3_6_Chapter.html#Fn21)\n\
    Using filenames postfixes with `-spring` is\nrecommended, sine when standard configuration\
    \ locations are used, Spring\ncannot completely control log initialization.\n\n\
    Testing with Spring Boot\n\nThe most practical way to test a Spring component\
    \ or bean is not to\ninvolve Spring at all. If the class has a constructor, throw\
    \ in some\nJUnit asserts and you are done. With Spring 4.3 it is really easy to\n\
    test, since the need to use `@Autowired` has been\nremoved. In a test environment,\
    \ as long as there is one constructor,\nSpring will implicitly consider it an\
    \ autowire target. In a more complex\napplication in which integration tests are\
    \ needed, testing can get\ncomplicated. That is why Spring Boot provides a helper\
    \ annotation to\nconfigure a test environment.\n\nTesting Spring web applications\
    \ means testing that controllers work as\nexpected, that they return the proper\
    \ results, and that they use the\nproper views. This can be done outside the application\
    \ server, but in\ncase of integration tests, an embedded server would be useful\
    \ to test\nthem in a web environment. Spring Boot provides the possibility to\
    \ do\njust that by providing a specialized annotation `@SpringBootTest`. This\n\
    annotation should be used on a test class that runs Spring Boot-based\ntests.\
    \ It provides the following:\n\n*   If no `ContextLoader` is\n    specified with\
    \ `@ContextConfiguration`,\n    it uses `org.springframework.boot.test.context.SpringBootContextLoader`\n\
    \    by default.\n\n*   Automated search for a Spring Boot configuration when\
    \ nested `@Configuration`\n    classes are used.\n\n*   Loading environment-specific\
    \ properties via the `properties` attribute.\n    This attribute allows for specification\
    \ of properties (key=value pairs)\n    as values for the attribute.\n\n```\n \
    \   @RunWith(SpringRunner.class)\n    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT,\n\
    \    properties = {\"app.port=9090\"})\n    public class CtxControllerTest {\n\
    \    ...\n    }\n    ```\n\n*   Defining different web environment modes and starting\
    \ a fully running\n    container on a random port, using the `webEnvironment`\n\
    \    attribute.\n\n*   Registering a `org.springframework.boot.test.web.client.TestRestTemplate`\n\
    \    bean for use in web tests that use a fully running container.\n\nThus with\
    \ the following controller defined,\n\n```\n@Controller\npublic class CtxController\
    \ {\npublic static final String INTRO  = \"Hello there dear developer,\nhere are\
    \ the beans you were looking for: \";\n@Autowired\nApplicationContext ctx;\n@RequestMapping(\"\
    /\")\n@ResponseBody\npublic String index() {\nStringBuilder sb = new StringBuilder(\"\
    \");\nsb.append(INTRO);\nString beanNames = ctx.getBeanDefinitionNames();\nArrays.sort(beanNames);\n\
    for (String beanName : beanNames) {\nsb.append(\"\").append(beanName);\n}\nsb.append(\"\
    \");\nreturn sb.toString();\n}\n@RequestMapping(\"/home\")\npublic String home(ModelMap\
    \ model) {\nmodel.put(\"bogus\", \"data\");\nreturn \"home\";\n}\n}\n```\n\nit\
    \ can be easily tested with Spring Boot:\n\n```\nimport org.junit.runner.RunWith;\n\
    import org.springframework.boot.test.context.SpringBootTest;\nimport org.springframework.test.context.junit4.SpringRunner;\n\
    import org.springframework.ui.ModelMap;\n...\n@RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment\
    \ =\nSpringBootTest.WebEnvironment.RANDOM_PORT)\npublic class CtxControllerTest\
    \ {\n@Autowired\nCtxController ctxController;\nprivate ModelMap model = new ModelMap();\n\
    @Test\npublic void textIndex() {\nString result = ctxController.index();\nassertNotNull(result);\n\
    assertTrue(result.contains(CtxController.INTRO));\n}\n@Test\npublic void textHome()\
    \ {\nString result = ctxController.home(model);\nassertEquals(\"home\",  result);\n\
    String modelData = (String)model.get(\"bogus\");\nassertEquals(\"data\", modelData);\n\
    }\n}\n```\n\nThe `SpringRunner` is an\nalias for `SpringJUnit4ClassRunner`\nintroduced\
    \ in Spring 4.3\\. More information on how testing was improved\nwith Spring Boot\
    \ 1.4 and Spring 4.3 is covered on the Spring official\nblog.[^(22)](#A978-1-4842-0811-3_6_Chapter.html#Fn22)\n\
    \nSpring Boot is quite a big topic, and it has two chapters in the\nofficial certification\
    \ exam. But it is not covered fully in the official\ncourse. The complete documentation\
    \ that you should read to be able to\nharness its power fully is the official\
    \ reference documentation\navailable publicly here: [ `http://docs.spring.io/spring-boot/docs/`\n\
    ](http://docs.spring.io/spring-boot/docs/current/reference/) [`current/reference/`](http://docs.spring.io/spring-boot/docs/current/reference/)\
    \ . Spring Boot is a great tool for speeding up\ndevelopment, and today, more\
    \ and more companies that develop Spring\napplications are using it.\n\nSummary\n\
    \nBelow, a list of core concepts and important details related to Spring\nWeb\
    \ MVC, Spring Security, and Spring Boot has been compiled for you:\n\n*   Spring\
    \ Web MVC was built to respect the MVC design pattern.\n\n*   The entry point\
    \ in a Spring Web application is the `DispatcherServlet`,\n    which is a front\
    \ controller for the application.\n\n*   The `DispatcherServlet`\n    assigns\
    \ HTTP requests to method calls from classes called controllers\n    using a collection\
    \ of web-specific infrastructure beans.\n\n*   To create a Spring Web MVC application,\
    \ the `DispatcherServlet`\n    must be configured as the entry point of the application,\
    \ and the\n    application configuration must contain infrastructure MVC beans\
    \ and\n    custom controllers and view beans.\n\n*   The `@EnableWebMvc`\n   \
    \ annotation is used on a configuration class for a Spring Web MVC\n    application."
