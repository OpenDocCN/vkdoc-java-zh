  trans: '

    #### Setter 注入


    要使用 Setter 注入，Bean 的类类型必须包含用于设置依赖项的 Setter 方法。构造函数并非必需。如果未声明构造函数，Spring 将使用默认的“无参”构造函数（每个类都会从
    Java Object 类自动继承该构造函数）来实例化对象，并使用 Setter 方法来注入依赖项。如果显式定义了无参构造函数，Spring 将使用它来实例化
    Bean。如果定义了带参数的构造函数，则通过这种方式声明的依赖项将使用构造函数注入，而通过 Setter 定义的依赖项则通过 Setter 注入。


    总之，使用 Setter 注入创建 Bean 时，首先通过调用构造函数实例化 Bean，然后通过 Setter 注入依赖项来完成初始化。（当然，你将在本章后面了解到，初始化也可以分为两步：设置依赖项和调用处理这些依赖项的特殊
    init 方法。）因此，如果你的 Bean 定义如下所示：


    那么类 `com.ps.beans.set.ComplexBeanImpl` 看起来是这样的：


    ```

    public class ComplexBeanImpl implements ComplexBean {

    private SimpleBean simpleBean;

    // 无参空构造函数，非必需

    public ComplexBeanImpl() {}

    public void setSimpleBean(SimpleBean simpleBean) {

    this.simpleBean = simpleBean;

    }

    public SimpleBean getSimpleBean() {

    return simpleBean;

    }

    }

    ```


    上述代码和配置片段提供了所有必要信息，以便 Spring 容器能够创建一个类型为 `SimpleBeanImpl` 的 Bean 和一个名为 `simpleBean0`
    的 Bean，然后将其注入到类型为 `ComplexBeanImpl`、名为 `complexBean` 的 Bean 中。依赖项在 Bean 实例化后，通过调用
    `setSimpleBean` 方法并将 simpleBean 作为参数传入来注入。其幕后执行的操作是：


    ```

    SimpleBean simpleBean = new SimpleBeanImpl();

    ComplexBean complexBean = new ComplexBeanImpl();

    complexBean.setSimpleBean(simpleBean);

    ```


    关于 Setter 注入，你需要记住的是，使用它的 Bean 定义模板如下所示：


    `<property />` 元素定义了要设置的属性及其值，并通过一对属性来实现：`[name, ref]` 或 `[name,value]`。


    `name` 属性是必需的，因为其值是要设置的 Bean 属性的名称。


    `ref` 属性用于告知容器，该属性的值是对另一个 Bean 的引用。


    `value` 属性，正如你可能猜到的，用于告知容器该值不是一个 Bean，而是一个标量值。


    ```


    // ComplexBeanImpl.java

    public class ComplexBeanImpl implements ComplexBean {

    private SimpleBean simpleBean;

    private boolean complex;

    public ComplexBeanImpl() {}

    public void setSimpleBean(SimpleBean simpleBean) {

    this.simpleBean = simpleBean;

    }

    public void setComplex(boolean complex) {

    this.complex = complex;

    }

    }

    ```


    与构造注入一样，Spring 也提供了一个命名空间，用于在使用 Setter 注入时简化 XML 定义。它被称为 p 命名空间：[`http://www.springframework.org/schema/p`](http://www.springframework.org/schema/p)
    `.` 该命名空间允许使用内联属性来配置属性参数，并且没有 XSD 模式，因为它没有引入任何新的配置元素。只需将其添加到 Bean 配置文件中，你的配置就可以得到简化。`"p:"`
    属性的 `-ref` 后缀的作用是告知容器，该属性的值是对另一个 Bean 的引用。


    关于 Setter 注入，目前要说的就是这些。在 Setter 注入和构造注入之间进行选择，仅取决于应用程序的需求、已编写且无法更改的代码（遗留代码）以及第三方库。Setter
    注入的优势在于依赖项是可选的，可以使用默认值，并且支持继承。在决定使用哪种方式时，请尽可能遵循最佳实践：


    *   当属性是必需时，使用构造注入。

    *   当属性不是必需时，使用 Setter 注入。

    *   使用与 Bean 类型实现相匹配的策略。

    *   保持一致性。


    构造注入和 Setter 注入可以同时用于创建同一个 Bean。以下是一个示例：


    ```


    //ComplexBean2Impl.java

    public class ComplexBean2Impl implements ComplexBean {

    private SimpleBean simpleBean;

    private boolean complex;

    public ComplexBean2Impl(SimpleBean simpleBean)

    {

    this.simpleBean = simpleBean;

    }

    public void setComplex(boolean complex) {

    this.complex = complex;

    }

    }

    ```


    !


    所有这些示例都可以在 `02-ps-container-01-practice` 项目中找到。包含所有用于尝试 Setter 注入的 Bean 和配置的包名为
    `com.ps.beans.set`。配置文件存储在 `02-ps-container-01-practice/src/main/resources/spring/set`
    目录下，共有两个配置文件：`sample-config-01.xml`（包含使用 `property` 元素的 Bean 定义）和 `sample-config-02.xml`（包含使用
    p 命名空间的 Bean 定义）。


    为了验证这些文件的有效性，请运行 `com.ps.beans.set.SIBeansTest` 类中的测试。其中还有一个 TODO 任务，要求你检索类型为
    `ComplexBean` 的 Bean，并确保它们的依赖项已正确设置。如何实现这一点由你决定，因为有很多方法可以做到。解决方案已在 `02-ps-container-01-solution`
    中提供。如果你愿意，可以暂时放下书本，尝试立即执行此任务。

    '
- fmt: '#### Injecting Dependencies That Are Not Beans


    Dependency injection with Spring is a vast subject, and this book was written
    with the intention of covering all the cases you might need in enterprise development.
    It was mentioned that `scalar` values can be injected. This of course opens the
    discussion about type conversion. In the previous example, we injected a boolean
    value, and the Spring container knew to take the text value from the configuration
    file and convert it to the property type defined in the bean type definition.
    The Spring container knows how to do this for all primitive types and their reference
    wrapper types. `String` values, booleans, and numeric types are supported by default.
    Just keep in mind that for booleans and decimal types, however, the syntax typical
    for these types must be respected; otherwise, the default Spring conversion will
    not work.


    Spring also knows to automatically convert `Date` values before injection if the
    syntax matches any date pattern with "/" separators (e.g., `dd/MM/yyyy`, `yyyy/MM/dd`,
    `dd/yyyy/MM`). Just take care, because even invalid numerical combinations are
    accepted and converted, e.g., `25/2433/23`.


    In order to support any other types, the Spring container must be told how to
    convert the value of the attribute to the type that the constructor or setter
    requires as an argument. The most common method is to use a property editor. This
    is a Spring concept that describes a component used to handle the transformation
    between any `Object` and `String`. In order to make such a conversion possible,
    you have to define a custom implementation for the `java.beans.PropertyEditor`
    and register it in the Spring context. Out of the box, Spring provides a number
    of `PropertyEditor` implementations for commonly used types.[⁴](#A978-1-4842-0811-3_2_Chapter.html#Fn4)
    All the developer has to do is to customize them and register them.


    Let’s assume we want to define a `Person` bean like this:


    There is more than one way to tell the Spring IoC how the value `1977-10-16` can
    be converted to a `Date`. And since `java.beans.PropertyEditor` was mentioned,
    the first example will use the Spring `org.springframework.beans.propertyeditors.CustomDateEditor`.
    In order for this to work, we need to do the following:


    - Define a class that implements `org.springframework.beans.PropertyEditorRegistrar`
    that registers the customized version of `org.springframework.beans.propertyeditors.CustomDateEditor`
    (the Spring built-in implementation for conversion between `java.util.Date` and
    `String`):


    - Add a bean definition for the `org.springframework.beans.factory.config.CustomEditorConfigurer`
    and provide as parameter for its `propertyEditorRegistrars` property a list containing
    a bean of type `DataConverter`:


    ```

    package com.ps.beans.others;

    import org.springframework.beans.PropertyEditorRegistrar;

    import org.springframework.beans.PropertyEditorRegistry;

    import org.springframework.beans.propertyeditors.CustomDateEditor;

    import java.text.SimpleDateFormat;

    import java.util.Date;

    public class DateConverter implements PropertyEditorRegistrar {

    @Override

    public void registerCustomEditors(PropertyEditorRegistry registry) {

    registry.registerCustomEditor(Date.class,

    new CustomDateEditor(new SimpleDateFormat("yyyy-MM-dd"), false));

    }

    }

    ```


    The second example shows you how to do this only from configuration and uses two
    attributes of the `<bean />` element that will be covered in a following section:
    `factory-bean` and `factory-method`. The `formatter` bean is used as a factory
    bean that creates date values from the `String` values passed as arguments to
    the `parse` method. The downside of this method is that the definition of the
    bean is polluted with the conversion definition.


    In a web application context, an implementation of the `org.springframework.format.Formatter`
    must be provided and registered.


    An example bean with fields of various types was provided in `02-ps-container-01-practice`.
    The class is called `com.ps.beans.others.MultipleTypesBean`, and it can be tested
    by running the test class called `com.ps.beans.others.MtBeanTest`. The bean definition
    can be found in the `02-ps-container-01-practice/src/main/resources/spring/others/sample-config-01.xml`
    file and is depicted in the following code snippet:


    Run the test in debug mode as depicted in Figure [2-11](#A978-1-4842-0811-3_2_Chapter.html#Fig11),
    and set a breakpoint on the `assertNotNull(mtBean);` line. In the Debug console,
    visible at the bottom of the figure, you can see the values for all the fields
    of the `mtBean`.


    ![A978-1-4842-0811-3_2_Fig11_HTML.jpg](A978-1-4842-0811-3_2_Fig11_HTML.jpg)


    Figure 2-11. Running a test in debug mode to inspect the fields of a bean of type
    `MultipleTypesBean`


    The fields postfixed with `One` are primitives; the others are objects. Notice
    how they were all initialized correctly, and the values in the bean definition
    were converted to the appropriate types.


    Another type of object commonly used is collections, and to make using them together
    with beans easier, the Spring development team has created the `util` namespace.
    In the previous code snippet you probably noticed the `<list />` element. That
    is how collections can be used without the `util` namespace, and another code
    snippet will be provided to make their usage obvious. Consider a class named `CollectionHolder`
    defined as in the following code snippet:


    ```

    public class CollectionHolder {

    private List simpleBeanList;

    private Set simpleBeanSet;

    private Map simpleBeanMap;

    public void setSimpleBeanList(List simpleBeanList) {

    this.simpleBeanList = simpleBeanList;

    }

    public void setSimpleBeanSet(Set simpleBeanSet) {

    this.simpleBeanSet = simpleBeanSet;

    }

    public void setSimpleBeanMap(Map simpleBeanMap) {

    this.simpleBeanMap = simpleBeanMap;

    }

    /**

    * This method was implemented just to verify the collections injected

    * into beans of this type

    */

    @Override

    public String toString() {

    return "CollectionHolder{" +

    "simpleBeanList=" + simpleBeanList +

    ", simpleBeanSet=" + simpleBeanSet +

    ", simpleBeanMap=" + simpleBeanMap +

    ''}'';

    }

    }

    ```


    The state of the `collectionHolder` bean will be tested using the following test
    class:


    ```

    // CollectionTest.java

    public class MtBeanTest {

    private Logger logger = LoggerFactory.getLogger(SIBeansTest.class);

    @Test

    public void testConfig() {

    ApplicationContext ctx = new ClassPathXmlApplicationContext

    ("classpath:spring/others/sample-config-01.xml");

    CollectionHolder ctBean = (CollectionHolder) ctx.getBean("collectionHolder");

    assertNotNull(ctBean);

    (*) logger.info(ctBean.toString());

    }

    }

    ```


    Beans can be created, and values for their collection properties can be injected
    as in the following examples:


    - Inject empty collections: The `logger.info` statement in the line marked with
    (`*`) in the test class will print the following: `CollectionHolder{simpleBeanList=[],
    simpleBeanSet=[], simpleBeanMap={}}`


    - Inject a property of type `List` with `SimpleBean` elements: The `logger.info`
    statement in the line marked with (`*`) in the test class will print the following:


    ```

    CollectionHolder{

    simpleBeanList=[

    SimpleBeanImpl{ code: 454325163},

    SimpleBeanImpl{ code: 796667727},

    null

    ],

    simpleBeanSet=null, simpleBeanMap=null

    }

    ```'
