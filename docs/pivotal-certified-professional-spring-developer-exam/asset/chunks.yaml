    上有一个 `md5` 命令，在 Linux 系统上有一个 `md5sum` 命令。以下代码片段展示了在 MacOs 和 Linux 上为密码 "john"
    和盐值 "SpringSalt" 生成 MD5 哈希的调用。


    ```

    #MacOS

    $ echo "johnSpringSalt" | md5

    471540bd22898656564b9c85a18b3e80

    #Linux system

    $ echo "johnSpringSalt" | md5sum

    471540bd22898656564b9c85a18b3e80

    ```


    通过将凭据隔离在属性文件中，使其与配置解耦。该文件可以在应用程序外部编辑，并且可以使用属性读取器可刷新 bean 重新加载属性。¹¹


    凭据属性文件具有特定的语法：


    ```

    [username] = [password(encrypted)],[role1,role2...]

    ```


    在前面的示例中，密码被添加到 `SpringSalt` 值中，然后使用 `md5`¹² 算法进行加密。但它们都以完全相同的方式和相同的盐值进行哈希处理。如果有人能找出服务器使用的盐值，它们就可能被破解。这就是为什么盐值应该是一个随机值，对每个用户都不同，例如该用户的唯一属性，如
    ID。`salt-source` 也可以配置为使用常量用户属性（如 ID）作为盐值。


    在上述示例中，只使用了 MD5 算法，但 Spring Security 支持更多算法，开发人员可以使用其中一种受支持的算法（MD4、Bcrypt、SHA、SHA-256
    等）或实现自己的算法。


    内存中或直接在配置文件中的方法对于测试和开发很有用，但在生产场景中，通常使用更安全的凭据存储方法。在生产环境中，凭据存储在数据库或 LDAP 系统中。在这种情况下，提供凭据的服务必须更改为基于
    JDBC 的服务：


    身份验证表必须可以使用 `authDataSource` bean 访问，并且它们的结构必须遵循以下规则：一个表名为 `users`，一个必须名为 `authorities`，并且必须正确执行以下查询：


    ```

    SELECT username, password, enabled FROM users WHERE username = ?

    SELECT username, authority FROM authorities WHERE username = ?

    ```


    Spring Security 参考文档包含一些用于创建安全表的 SQL 脚本。语法是针对 HSQLDB 的，但脚本可以轻松调整为适用于任何 SQL 标准化数据库。¹³


    本节中的一些细节是通用的，也适用于 Java 配置环境，但在此提及是为了全面展示 Spring Security 框架。现在是时候看看 Java 配置如何使所有这些配置细节更实用、更快速地设置了。


    无 web.xml 的 Spring XML 配置


    如果 `web.xml` 消失了，`springSecurityFilterChain` 过滤器会怎样？安全过滤器会转换为一个扩展 Spring 专用类的类：`org.springframework.security.web.context.AbstractSecurityWebApplicationInitializer`。并且与
    `DispatcherServlet` 声明匹配的类必须扩展 `org.springframework.web.servlet.support.AbstractDispatcherServletInitializer`，以便根上下文可以设置为安全上下文。以下代码片段描述了使用
    XML 配置 Spring Security 以及使用典型的 Web 初始化器类配置 Web 应用程序的情况。


    ```

    import org.springframework.security.web.context.

    AbstractSecurityWebApplicationInitializer;

    // 需要空类来注册 springSecurityFilterChain bean

    public class SecurityInitializer extends AbstractSecurityWebApplicationInitializer
    {

    }

    public class WebInitializer extends AbstractDispatcherServletInitializer {

    @Override

    protected WebApplicationContext createRootApplicationContext() {

    XmlWebApplicationContext ctx = new XmlWebApplicationContext();

    ctx.setConfigLocation("/WEB-INF/spring/security-config.xml");

    return ctx;

    }

    @Override

    protected WebApplicationContext createServletApplicationContext() {

    XmlWebApplicationContext ctx = new XmlWebApplicationContext();

    ctx.setConfigLocations(

    // MVC 配置

    "/WEB-INF/spring/mvc-config.xml",

    // 服务配置

    "/WEB-INF/spring/app-config.xml");

    return ctx;

    }

    ...

    }

    ```


