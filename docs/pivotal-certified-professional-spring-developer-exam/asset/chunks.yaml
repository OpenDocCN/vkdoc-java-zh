    \    Bean 用于启用后处理器 Bean，这些后处理器将处理用于配置 WS 端点的\n    `@Endpoint, @RequestPayload,\
    \ @PayloadRoot,` 和 `@ResponsePayload`\n    注解。`messageDispatcherServlet`\n   \
    \ Bean 用于拦截 SOAP 请求。必须将应用程序上下文注入到此 Bean 中，\n    以便能够自动检测 Spring Bean。\n    此 Bean\
