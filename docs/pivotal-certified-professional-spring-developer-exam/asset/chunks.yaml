    \n总结\n\n下面为你整理了与 Spring 数据访问相关的核心概念和重要细节列表：\n\n*   Spring 通过分层架构支持数据访问；较高层对数据管理一无所知。\n\
    *   Spring 提供数据访问相关的智能非检查异常，如果未处理，这些异常会传播到较高层。\n*   Spring 提供一致的事务管理：声明式事务管理和编程式事务管理。\n\
    *   Spring 支持大多数流行的持久化和 ORM 提供者，这些提供者为缓存、对象管理、自动变更检测提供了强大支持。\n*   Spring 可以直接与\
    \ Hibernate 一起使用，无需 JPA API。\n*   Spring 可以与 JPA API 一起使用，但必须由持久化和 ORM 提供者支持。\n\
    *   Spring Data JPA 帮助开发者在创建仓库组件时避免样板代码。\n*   Spring Data 系列项目也提供对 NoSQL 数据库的支持。\n\
    *   事务管理可以由 Spring 专用的基础设施 Bean 完成，也可以由应用服务器提供的事务管理器完成。\n*   数据库可以在 Spring 配置中定义，也可以由应用服务器提供。\n\
    \n测验\n\n问题 1：Spring 框架支持哪些数据访问技术？（选择所有适用项）\n\n1.  JDBC\n2.  Hibernate\n3.  JPA\n\
    4.  NoSQL\n\n问题 2：使用 `JdbcTemplate` 时，Spring 是否支持事务性执行？\n\n1.  是的，如果封装 `JdbcTemplate`\
    \ 的方法使用了 `@Transactional` 注解\n2.  不支持\n\n问题 3：分析以下代码片段：\n\n```\npublic Set findAll()\
    \ {\nString sql = \"select id, username, email, password from p_user\";\nreturn\
    \ new HashSet(jdbcTemplate.query(sql, rowMapper));\n}\n```\n\n关于 `rowMapper` 对象，以下哪些说法是正确的？（选择所有适用项）\n\
    \n1.  必须实现 `RowMapper<T>` 接口\n2.  是有状态的\n3.  提供一种方法，将 `ResultSet` 内容转换为 `User`\
    \ 对象\n\n问题 4：`JdbcTemplate` 是否支持执行 SQL 原生查询？\n\n1.  是\n2.  否\n3.  如果配置了则支持\n\n\
    问题 5：`JdbcTemplate` 不提供以下哪项功能？\n\n1.  将 JDBC 异常包装为 `DataAccessException`\n2. \
    \ 数据源访问\n3.  使用命名参数执行 JDBC 查询\n4.  打开/关闭连接的方法\n\n问题 6：在 Spring 应用中实现事务行为需要做什么？（选择所有适用项）\n\
    \n1.  通过在配置类上添加 `@EnableTransactionManagement` 注解来启用声明式事务支持\n2.  声明一个事务管理器 Bean\n\
    3.  在服务方法上添加 `@Transactional` 注解\n4.  激活事务配置文件\n5.  使用 XML 时，声明 `<tx:annotation-driven/>`\n\
    \n问题 7：以下哪些是有效的事务传播行为值？（选择所有适用项）\n\n1.  MANDATORY\n2.  REQUIRED\n3.  PREFERED\n\
    4.  NOT_ALLOWED\n\n问题 8：何时应将事务声明为 `readOnly`？\n\n1.  当它不包含任何写入语句执行时\n2.  当读取大量数据时\n\
    3.  当不允许对数据库进行任何更改时\n\n问题 9：分析以下代码片段：\n\n```\n@Service\n@Transactional(readOnly\
    \ = true, propagation = Propagation.REQUIRED)\npublic class UserServiceImpl implements\
    \ UserService {\n@Transactional(propagation = Propagation.REQUIRES_NEW)\n@Override\n\
    public User findById(Long id) {\nreturn userRepo.findById(id);\n}\n}\n```\n\n\
    关于 `findById()` 方法，以下哪些说法是正确的？\n\n1.  该方法在一个新事务中执行\n2.  当方法执行时，会抛出异常，因为事务未声明为\
    \ `readOnly`\n3.  该方法在现有事务中执行\n\n问题 10：Spring 提供编程式事务管理。用于实现使用编程式事务管理的仓库类的 Spring\
    \ 类型 Bean 有哪些？（选择所有适用项）\n\n1.  `TransactionTemplate`\n2.  `TransactionDefinition`\n\
    3.  `TransactionService`\n4.  `TransactionCallback`\n5.  `PlatformTransactionManager`\n\
    6.  `TransactionStatus`\n\n问题 11：事务管理中的默认回滚策略是什么？\n\n1.  任何异常都回滚\n2.  RuntimeException\
    \ 回滚\n3.  受检异常回滚\n4.  始终提交\n"
- fmt: '# Question 12: What is used “under the hood” to implement the transactional
    behavior in Spring?


    1. `JDBC`

    2. `JPA`

    3. `AOP`


    # Question 13: What happens if a method annotated with `@Transactional` calls
    another method annotated with `@Transactional`?


    1. a transaction is created for each method

    2. a single transaction is created and the methods are executed as a single unit
    of work

    3. depends on the configuration for each `@Transactional`


    # Question 14: Which of the following are Hibernate-specific Spring infrastructure
    beans? (choose all that apply)


    1. `SessionFactory`

    2. `Session`

    3. `HibernateTransactionManager`

    4. `HikariDataSource`

    5. `LocalSessionFactoryBuilder`


    # Question 15: What can be said about the `@Entity` annotation? (choose all that
    apply)


    1. is part of the JPA official API

    2. can be used without the JPA API

    3. marks the class as an entity; instances of this class will be mapped to table
    records

    4. it can be placed only at class level


    # Question 16: What is needed to work with JPA in Spring? (choose all that apply)


    1. declare an `EntityManagerFactory` bean

    2. declare a `PersistenceProvider` bean

    3. declare a `JpaTransactionManager` bean

    4. all of the above


    # Question 17: What can be done to declare an instant repository with Spring Data
    JPA? (choose all that apply)


    1. extend interface `Repository`

    2. no need to extend an interface; just annotate the interface with `@RepositoryDefinition`

    3. for multiple methods out of the box extend `JpaRepository`

    4. implement interface `Repository`


    # Question 18: What configuration annotation enables creation of repository instances
    with Spring Data JPA?


    1. `@EnableJpaRepositories`

    2. `@EnableInstantRepositories`

    3. `@EnableRepositoryGeneration`

    4. `@EnableTransactionManagement`


    # Question 19: Analyze the following code snippet:


    ```

    public interface UserRepo extends JpaRepository {

    @Query("select u from User u where u.username like %?1%")

    List findAllByUserName(String username);

    }

    ```


    What can be said about the `findAllByUserName()` method?


    1. it is not a valid Spring Data JPA repository method

    2. the argument for `@Query` is a JPQL query

    3. the class is not a repository, because it is not annotated with `@Repository`

    4. this code will not compile


    # Footnotes


    My Batis was previously known as iBatis, before Apache dropped it. More information
    on the new official site: [http://blog.mybatis.org/](http://blog.mybatis.org/)


    More information on the official Spring Reference page: [`http://docs.spring.io/spring/docs/4.3.2.RELEASE/spring-framework-reference/htmlsingle/#jdbc-packages`](http://docs.spring.io/spring/docs/4.3.2.RELEASE/spring-framework-reference/htmlsingle/#jdbc-packages)


    Other Spring classes to access a different type of resource follow the same pattern:
    `JmsTemplate`, `RestTemplate`, etc.


    Polymorphism is one of the object oriented programming principles. The term is
    of Greek etymology and means one name, many forms. Polymorphism manifests itself
    in software by having multiple methods all with the same name but slightly different
    functionalities.


    This approach of providing parameters is used by JPA and Hibernate as well.


    Code accessible on GitHub: [`https://github.com/spring-projects/spring-framework/blob/master/spring-jdbc/src/main/java/org/springframework/jdbc/core/namedparam/NamedParameterJdbcTemplate.java`](https://github.com/spring-projects/spring-framework/blob/master/spring-jdbc/src/main/java/org/springframework/jdbc/core/namedparam/NamedParameterJdbcTemplate.java),
    or in IntelliJ IDEA, click on the class name and press the Control (Command on
    macOS) key, and the sources will be opened for you.


    Its many signatures and recommended uses can be inspected in the official JavaDoc
    available online [`http://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/jdbc/core/JdbcTemplate.html`](http://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/jdbc/core/JdbcTemplate.html).


    This kind of approach leaves an application sensitive to SQL Injection attacks,
    which is why in enterprise applications, the tables are never created by executing
    DDL scripts in the code with parameter values provided by the user.


    Class `org.springframework.dao.DataAccessException` is an abstract class, parent
    of all the family of Spring Data Access exceptions.


    An exception to this rule would be if the server catches fire or gets really wet.


    You can find more about Atomikos from their official site [`https://www.atomikos.com/`](https://www.atomikos.com/).


    The most popular programmers’ social network [`http://stackoverflow.com`](http://stackoverflow.com/)


    The most popular article about Spring distributed transactions has since 2009
    been David Sayer’s [`http://www.javaworld.com/article/2077963/open-source-tools/distributed-transactions-in-spring--with-and-without-xa.html`](http://www.javaworld.com/article/2077963/open-source-tools/distributed-transactions-in-spring--with-and-without-xa.html).


    A complete list of steps showing how to configure and use the Atomikos JTA provider
    is available on the Spring official blog: [`https://spring.io/blog/2011/08/15/configuring-spring-and-jta-without-full-java-ee/`](https://spring.io/blog/2011/08/15/configuring-spring-and-jta-without-full-java-ee/).


    Hibernate OGM provides Java Persistence (JPA) support for NoSQL solutions. It
    reuses Hibernate ORM’s engine but persists entities into a NoSQL datastore instead
    of a relational database. Read more about it on the official site: [`http://hibernate.org/ogm/`](http://hibernate.org/ogm/).


    You can read more about the project on their GitHub page [`https://github.com/brettwooldridge/HikariCP`](https://github.com/brettwooldridge/HikariCP).


    The `EntityManager` instance annotated with `@PersistenceContext` cannot be accessed
    from a constructor, since it cannot be created and associated with the persistence
    context in the constructor. The reason for this is the definition of the `@PersistenceContext`.
    This annotation has the following meta-annotation defined: `@Target(value=TYPE,METHOD,FIELD)`.
    Full JavaDoc API here: [`http://docs.oracle.com/javaee/7/api/javax/persistence/PersistenceContext.html`](http://docs.oracle.com/javaee/7/api/javax/persistence/PersistenceContext.html).


    Project official page: [`http://projects.spring.io/spring-data/`](http://projects.spring.io/spring-data/)


    You can read about them here: [`http://nosql-database.org/`](http://nosql-database.org/).


    Official site here: [`https://www.mongodb.com/community`](https://www.mongodb.com/community).


    # 6. Spring Web


    In previous chapters, multilayered style projects were depicted. On top of the
    service layer was always the presentation layer, or the Web layer. This layer
    is the top layer of an application, and its main function is to translate user
    actions into commands that lower-level layers can understand and transform results
    from them into user-understandable data. Web applications can be accessed using
    clients such as browsers or specific applications that can interpret correctly
    the interface provided by the application such as mobile applications. So far
    in this book, only Spring components specific to lower-level layers have been
    introduced. This chapter will scratch the surface on components specific to the
    presentation layer that make the user interface and implement security.


    Spring provides support for development of the web layer as well through frameworks
    such as Spring Web MVC and Spring WebFlow. A typical Java Web application architecture
    is depicted in Figure 6-1.


    ![A978-1-4842-0811-3_6_Fig1_HTML.jpg](A978-1-4842-0811-3_6_Fig1_HTML.jpg)


    **Figure 6-1.** Typical Java Web application architecture


    There can be more layers, but usually web applications have at least these three:


    * DAO, where data mapping components (domain objects or entity classes) are defined.'
