    `@EnableTransactionManagement` 和 `<tx:annotation-driven ../>` 都启用了支持事务执行所需的所有基础设施
    Bean。但它们之间存在细微差别。XML 配置元素可以这样使用：`<tx:annotation-driven />`，无需 `transaction-manager`
    属性。在这种情况下，Spring 默认会查找名为 `transactionManager` 的 Bean，如果找不到，应用程序将无法启动。`@EnableTransactionManagement`
    则更加灵活；它会查找任何实现了 `org.springframework.transaction.PlatformTransactionManager` 接口的
    Bean，因此名称并不重要。如果必须明确指定默认事务管理器 Bean，可以通过让标注了 `@EnableTransactionManagement` 的配置类实现
    `org.springframework.transaction.annotation.TransactionManagementConfigurer` 接口，并为
    `annotationDrivenTransactionManager` 方法提供实现来声明默认事务管理器。


    ```

    import org.springframework.transaction.annotation.TransactionManagementConfigurer;

    ...

    @EnableTransactionManagement

    @Configuration

    public class AppConfig implements TransactionManagementConfigurer {

    ...

    @Bean

    public PlatformTransactionManager txManager(){

    return new DataSourceTransactionManager(dataSource());

    }

    @Overrride

    public PlatformTransactionManager annotationDrivenTransactionManager() {

    return txManager();

    }

    }

    ```


    这非常有用，因为在需要多个数据源的较大型应用程序中，需要声明多个事务管理器 Bean。如果未指定默认使用哪个，Spring 无法自行选择，应用程序将因一个明确且丑陋的异常而启动失败：


    ```

    org.springframework.beans.factory.NoUniqueBeanDefinitionException:

    No qualifying bean of type [org.springframework.transaction.PlatformTransactionManager]

    is defined: expected single matching bean but found 2: txManager,simpleManager

    ```


    在事务上下文中执行方法时使用的事务管理器，也可以通过 `@Transactional` 注解的 `transactionManager` 属性来指定。因此，考虑到我们有两个事务管理器
    Bean：配置为默认的 `txManager` 和 `simpleManager`，类似下一个代码片段中的代码将完美运行。


    ```

    @Service

    public class UserServiceImpl implements UserService {

    private UserRepo userRepo;

    @Autowired

    public UserServiceImpl(UserRepo userRepo) {

    this.userRepo = userRepo;

    }

    //使用默认的 txManager

    @Transactional

    @Override

    public User findById(Long id) {

    return userRepo.findById(id);

    }

    @Transactional(transactionManager = "simpleManager",readOnly = true)

    @Override

    public void htmlAllByNameAll(String name){

    userRepo.htmlAllByName(name);

    }

    }

    ```


    在 Spring 应用程序中，方法在其上下文中执行的事务，当使用 `@Transactional` 定义时，被称为声明式事务。这种声明事务的方式与 JTA（Java
    事务 API）无关，这非常实用，因为这意味着事务可以在任何环境中使用：本地环境（配合 JDBC、JPA、Hibernate 或 JDO（Java 数据对象）），或与应用服务器一起使用。只要方法是公共的，就可以为任何
    Bean 的任何方法添加事务行为，因为声明式事务行为在 Spring 中是通过 AOP 实现的。Spring 还提供了声明式回滚规则，以及通过 `@Transactional`
    注解的属性来自定义事务行为的可能性。在此，列出这些属性是合适的：


    1.  `transactionManager` 属性值定义了用于管理被注解方法执行所在事务上下文的事务管理器。


    2.  `readOnly` 属性应用于涉及不修改数据库操作（例如：搜索、计数记录）的事务。默认值为 `false`，该属性的值仅是对事务管理器的一个提示，具体实现可能会忽略它。不过，如果你告诉
    Spring 该事务仅用于读取数据，Spring 会为只读数据访问进行一些性能优化。虽然使用事务来读取数据看似无用，但建议这样做以考虑为事务配置的隔离级别。隔离属性稍后将介绍。


    3.  `propagation` 属性可用于定义目标方法的行为：它们应该在现有事务、新事务中执行，还是完全不使用事务。该属性的值由 Spring 的 `org.springframework.transaction.annotation.Propagation`
    枚举定义，并且与 JEE 为 EJB 事务定义的值相匹配。共有七种传播类型：


    1.  `REQUIRED`：将使用现有事务，或者创建一个新事务来执行标注了 `@Transactional(propagation = Propagation.REQUIRED)`
    的方法。


    2.  `REQUIRES_NEW`：创建一个新事务来执行标注了 `@Transactional(propagation = Propagation.REQUIRES_NEW)`
    的方法。如果当前存在事务，它将被挂起。


    3.  `NESTED`：将使用现有的嵌套事务来执行标注了 `@Transactional(propagation = Propagation.NESTED)`
    的方法。如果不存在此类事务，则会创建一个。


    4.  `MANDATORY`：必须使用现有事务来执行标注了 `@Transactional(propagation = MANDATORY)` 的方法。如果没有可用的事务，将抛出异常。


    5.  `NEVER`：标注了 `@Transactional(propagation = Propagation.NEVER)` 的方法不得在事务内执行。如果存在事务，将抛出异常。


    6.  `NOT_SUPPORTED`：不使用事务来执行标注了 `@Transactional(propagation = Propagation.NOT_SUPPORTED)`
    的方法。如果存在事务，它将被挂起。


    7.  `SUPPORTS`：将使用现有事务来执行标注了 `@Transactional(propagation = Propagation.SUPPORTS)`
    的方法。如果不存在事务，该方法仍将在没有事务上下文的情况下执行。


    在以下代码片段中，`findById` 方法在一个事务中执行，而 `getPetsAsHtml` 方法在一个嵌套事务中执行。嵌套事务的实际创建仅适用于特定的事务管理器。正如你从代码片段末尾的日志中看到的，当使用内存数据库时，`DataSourceTransactionManager`
    并不支持嵌套事务。该事务管理器通过 JDBC 3.0 的“保存点”机制支持嵌套事务，但它需要一个支持保存点的数据库管理系统，例如 Oracle。


    嵌套事务允许复杂的行为；一个事务可以在其外层事务完成之前启动。嵌套事务中的提交没有效果，所有更改将在外层事务提交时应用到数据库。但是，如果嵌套事务回滚，外层事务也会回滚，以防止数据库处于不一致状态：部分更改将不会被保留。嵌套事务可用于强制多个方法的原子性执行。


    如果使用 `REQUIRED` 而不是 `NESTED`，则无法保证原子性执行。

