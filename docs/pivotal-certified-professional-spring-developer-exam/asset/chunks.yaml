  raw: "The `springSecurityFilterChain`\nis a mandatory name that refers to a bean\
    \ with the same name in the\nSpring root application context. The `DelegatingFilterProxy`\n\
    bean delegates the calls to a list of chained security filter beans and\nacts\
    \ as an interceptor for secured requests. In the case above, as the\n`<url-pattern\
    \ .../>` element defines all requests will be intercepted\n(wildcard used: /*\
    \ ).\n\nUnder the hood, in a secured web environment the secured requests are\n\
    handled by a chain of Spring-managed beans, which is why the proxy bean\nis named\
    \ `springSecurityFilterChain`,\nbecause those filters are chained. This chain\
    \ of filters has the\nfollowing key responsibilities:\n\n*   driving authentication\n\
    \n*   enforcing authorization\n\n*   managing logout\n\n*   maintaining SecurityContext\
    \ in HttpSession\n\nThe Spring Security framework is built on the foundation of\
    \ ACEGI\nSecurity 1.x. At the beginning, the security filter beans were manually\n\
    configured and could be used individually, but this led to complex XML\nconfigurations\
    \ that were verbose and prone to errors. Starting with\nSpring Security 2.0, the\
    \ filter beans are created and initialized with\ndefault values, and manual configuration\
    \ is not recommended unless it is\nnecessary to change default Spring Security\
    \ behavior. All filter beans\nimplement the `javax.servlet.Filter`\ninterface.\
    \ Every bean of type implementing this interface has the\npurpose of performing\
    \ tasks filtering on the request of a resource (a\nservlet or static content),\
    \ on the response from a resource, or both.\nAlthough these filters work in the\
    \ background, a little coverage is\nappropriate. In Table [6-1](#A978-1-4842-0811-3_6_Chapter.html#Tab1),\
    \ the\nsecurity filters are listed and the purpose of each is presented.\n\nTable\
    \ 6-1.\n\nSpring Security chained filters\n\nFilter Class\n |\n  Details\n |\n\
    \n| --- | --- | --- | --- | --- |\n\n`ChannelProcessingFilter`\n |\n  Used if\
    \ redirection to another protocol is necessary\n |\n\n`SecurityContextPersistenceFilter`\n\
    \ |\n  Used to set up a security context and copy changes from it to `HttpSession`\n\
    \ |\n\n`ConcurrentSessionFilter`\n |\n  Used for concurrent session handling package\n\
    \ |\n\n`LogoutFilter`\n |\n  Used to log a principal out. After logout a redirect\
    \ will take place to\nthe configured view\n |\n\n`BasicAuthenticationFilter`\n\
    \ |\n  Used to store a valid `Authentication` token\nin the security context\n\
    \ |\n\n`JaasApiIntegrationFilter`\n |\n  This bean attempts to obtain a JAAS Subject\
    \ and continue the `FilterChain` running\nas that `Subject`\n |\n\n`RememberMeAuthenticationFilter`\n\
    \ |\n  Is used to store a valid `Authentication` and\nuse it if the security context\
    \ did not change\n |\n\n`AnonymousAuthenticationFilter`\n |\n  Is used to store\
    \ an anonymous `Authentication` and\nuse it if the security context did not change\n\
    \ |\n\n`ExceptionTranslationFilter`\n |\n  Is used to translate Spring Security\
    \ exceptions in HTTP corresponding\nerror responses\n |\n\n`FilterSecurityInterceptor`\n\
    \ |\n  Is used to protect URIs and raise access denied exceptions\n |\n\nBasically\
    \ every time an HTTP request is received by the server, each of\nthe filters performs\
    \ its action if the situation applies. The fun part\nis that these filters can\
    \ be replaced by custom implementations. Their\nposition in the security chain\
    \ is defined in Spring by a list of\nenumeration values, and using these values\
    \ as parameters for the\nposition attribute of the `<custom-filter …/>`, a different\
    \ filter bean can be specified to use instead\nof the default one. In the following\
    \ code snippet, the `ConcurrentSessionFilter`\nis replaced by a custom implementation.\n\
    \nThe list of enumerated values can be found in the `spring-security.xsd`,[⁷](#A978-1-4842-0811-3_6_Chapter.html#Fn7)\
    \ and a\nmatch between the filters and the values is depicted in Table [6-2](#A978-1-4842-0811-3_6_Chapter.html#Tab2).\n\
    \nTable 6-2.\n\nSpring Security chained filters\n\nFilter Class\n |\n  Position\
    \ Enumerated Value\n |\n\n| --- | --- | --- | --- | --- |\n\n`ChannelProcessingFilter`\n\
    \ |\n  CHANNEL_FILTER\n |\n\n`SecurityContextPersistenceFilter`\n |\n  SECURITY_CONTEXT_FILTER\n\
    \ |\n\n`ConcurrentSessionFilter`\n |\n  CONCURRENT_SESSION_FILTER\n |\n\n`LogoutFilter`\n\
    \ |\n  LOGOUT_FILTER\n |\n\n`BasicAuthenticationFilter`\n |\n  BASIC_AUTH_FILTER\n\
    \ |\n\n`JaasApiIntegrationFilter`\n |\n  JAAS_API_SUPPORT_FILTER\n |\n\n`RememberMeAuthenticationFilter`\n\
    \ |\n  REMEMBER_ME_FILTER\n |\n\n`AnonymousAuthenticationFilter`\n |\n  ANONYMOUS_FILTER\n\
    \ |\n\n`ExceptionTranslationFilter`\n |\n  EXCEPTION_TRANSLATION_FILTER\n |\n\n\
    `FilterSecurityInterceptor`\n |\n  FILTER_SECURITY_INTERCEPTOR\n |\n\nThe equivalent\
    \ using Java Configuration does not use the position enum\nvalues, but a set of\
    \ methods of the `HttpSecurity` object:\n\n```\naddFilterAfter(Filter  filter,Class\
    \  afterFilter)\n```\n\nand\n\n`addFilterBefore(Filter  filter, Class<?  extends  Filter>  beforeFilter).`\
    \ They receive as a\nparameter the class of the filter, relative to which the\
    \ custom\nimplementation should be placed. In the previous example, the `customConcurrencyFilter`\n\
    bean is placed in the chain after the `securityContextPersistenceFilter`\nbean.\
    \ So the equivalent Java Configuration will look like the following\ncode snippet.\
    \ Do not focus on annotations, since they will be covered a\nlittle bit later\
    \ in the section. Just pay attention to the custom filter\ndefinition and the\
    \ `http.addFilterAfter(..)`\ncall:\n\n```\nimport com.ps.web.session.CustomConcurrentSessionFilter;\n\
    import org.springframework.security.web.context.SecurityContextPersistenceFilter;\n\
    ...\n@Configuration\n@EnableWebSecurity\n@EnableGlobalMethodSecurity(jsr250Enabled\
    \ = true)\npublic class SecurityConfig extends WebSecurityConfigurerAdapter {\n\
    @Override\nprotected void configure(HttpSecurity http) throws Exception {\nhttp.addFilterAfter(\n\
    SecurityContextPersistenceFilter.class, customConcurrencyFilter());\nhttp\n.authorizeRequests()\n\
    ...\n.logout()\n.logoutUrl(\"/logout\")\n.logoutSuccessUrl(\"/\");\n}\n...\n@Bean\n\
    CustomConcurrentSessionFilter customConcurrencyFilter(){\nreturn new CustomConcurrentSessionFilter();\n\
    }\n}\n```\n\nThe URLs to intercept are defined in a Spring-specific XML file,\
    \ and\nroles allowed to access them are defined in the Spring Context and\nloaded\
    \ there at authentication time. In using XML, a separate file for\nsecurity configuration\
    \ is used called `security-config.xml`\nin this example. To make configuration\
    \ easy to set up, Spring provides a\nspecial namespace named `spring-security`\
    \ that\ncontains strictly security configuration elements. The security\nconfiguration\
    \ file can be written relative to this namespace, which\nremoves the necessity\
    \ to use a prefix for security elements. In the code\nsnippet below, a simple\
    \ version of a configuration file is depicted that\nrestricts access to users’\
    \ pages to only fully authenticated users. The\nlogin form location and logout\
    \ paths are depicted as well.\n\nThe `IS_AUTHENTICATED_ANONYMOUSLY`\nvalue is\
    \ processed under the hood by a bean known as a voter, of type\n`org.springframework.security.access.vote.AuthenticatedVoter`.\n\
    In this class, three values for the `access` configuration\nattribute are defined.\
    \ The voter will process this security\nconfiguration attribute and decide whether\
    \ a resource should be\navailable to an anonymous user. The anonymous user is\
    \ used for public\naccess (browsing) to a web application and is the type of user\
    \ that\naccesses a site without logging in. The `IS_AUTHENTICATED_FULLY`\nconfiguration\
    \ attribute is also named in a self-explanatory way: the\nresource that matches\
    \ the associated URL can be accessed only by a user\nthat was logged in, credentials\
    \ verified, and identity confirmed. Thus\nthe user has been fully authenticated.\
    \ Aside from the two configuration\nattributes, there is one more: `IS_AUTHENTICATED_REMEMBERED`.\n\
    If a resource is protected by such a rule, it can be accessed only if\nthe user\
    \ is authenticated fully or authenticated using the remember-me\nmethod.[⁸](#A978-1-4842-0811-3_6_Chapter.html#Fn8)"
