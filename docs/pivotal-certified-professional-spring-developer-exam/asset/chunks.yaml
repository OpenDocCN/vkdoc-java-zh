  raw: 'Out of the box, to make things easier, Spring provides a simple

    implementation for the `MessageConverter`

    class `org.springframework.jms.support.converter.SimpleMessageConverter`

    for default conversion of serializable objects into object messages, and

    a bean of this type is automatically created by Spring in JMS

    applications.


    The `JmsTemplate`

    bean needs a connection factory and a destination to be initialized.

    Connection factories and destinations can be injected into a `JmsTemplate` bean

    using their IDs.


    ```


    //Java Configuration

    import org.apache.activemq.ActiveMQConnectionFactory;

    import org.apache.activemq.command.ActiveMQQueue;

    ...

    @Bean

    public ConnectionFactory connectionFactory(){

    ActiveMQConnectionFactory cf = new ActiveMQConnectionFactory();

    cf.setBrokerURL("tcp://localhost:61616");

    cf.setTrustAllPackages(true);

    return cf;

    }

    @Bean

    public ActiveMQQueue confirmationQueue(){

    return new ActiveMQQueue("com.queue.confirmation");

    }

    @Bean

    public JmsTemplate jmsTemplate(){

    JmsTemplate jmsTemplate = new JmsTemplate();

    jmsTemplate.setConnectionFactory(connectionFactory());

    jmsTemplate.setDefaultDestination(confirmationQueue());

    jmsTemplate.setPubSubNoLocal(false);

    return  jmsTemplate;

    }

    ```


    The `pubSubNoLocal`

    property is used to set whether to inhibit the delivery of messages

    published by its own connection Default value is `false`, but in the

    previous code samples, it is set explicitly for teaching purposes. When

    a message is received by the client (consumer), since the communication

    is asynchronous, a listener has to be set up to pick it up and do

    something with it. The interface to implement to provide a custom

    message listener is `javax.jms.MessageListener`,

    and the implementation for a single method: `onMessage(Message message)` must
    be provided. The message listener is managed by an

    implementation of the `org.springframework.jms.listener.MessageListenerContainer`

    in a Spring application, usually `DefaultMessageListenerContainer`.

    A bean of this type manages the JMS sessions with which the listener

    will be invoked. The `DefaultMessageListenerContainer`

    can be configured to set the consumer’s concur-rency limit for the `JmsTemplate`
    instances

    managed, by setting up the `concurrency` property

    (min-max interval as 5-10, or max value like 10). But each `JmsTemplate` bean
    can

    override this setting by setting up a different value for its own `concurrency`
    property.

    The implementation and configuration to set these two beans is depicted

    in the following code snippet. The `UserReceiver` class

    sends a confirmation that the user message was successfully received.


    ```

    import javax.jms.JMSException;

    import javax.jms.Message;

    import javax.jms.MessageListener;

    public class UserReceiver implements MessageListener {

    private Logger logger = LoggerFactory.getLogger(UserReceiver.class);

    //used to generate unique IDs for Confirmation objects

    private static AtomicInteger id = new AtomicInteger();

    @Autowired

    MessageConverter messageConverter;

    @Autowired

    ConfirmationSender confirmationSender;

    @Override

    public void onMessage(Message message) {

    try {

    User receivedUser = (User) messageConverter.fromMessage(message);

    logger.info(" >> Received user: " + receivedUser);

    confirmationSender.sendMessage

    (new Confirmation(id.incrementAndGet(), "User "

    + receivedUser.getEmail() + " received."));

    } catch (JMSException e) {

    logger.error("Something went wrong ...", e);

    }

    }


    //Java Configuration

    @Bean

    public UserReceiver userReceiver(){

    return new UserReceiver();

    }

    @Bean

    public DefaultMessageListenerContainer containerListener() {

    DefaultMessageListenerContainer listener =

    new DefaultMessageListenerContainer();

    listener.setConnectionFactory(connectionFactory());

    listener.setDestination(userQueue());

    listener.setMessageListener(userReceiver());

    return listener;

    }

    }

    ```


    On the server (producer) side, the message is sent, and different

    methods of the `JmsTemplate` bean can

    be used for this. The implementation that sends the message is a simple

    bean with an instance of `JmsTemplate` injected

    as dependency.


    ```

    @Component

    public class UserSender {

    @Autowired

    JmsTemplate jmsTemplate;

    public void sendMessage(final User user) {

    jmsTemplate.send ( (Session session) -> session.createObjectMessage(user));

    }

    }

    ```


    And the `JmsTemplate` used on

    the server(producer) side is defined as presented earlier. The queue

    used to send the messages is the `userQueue` .


    ```

    @Bean

    public ActiveMQQueue userQueue(){

    return new ActiveMQQueue("com.queue.user");

    }

    @Bean

    public JmsTemplate jmsTemplate(){

    JmsTemplate jmsTemplate = new JmsTemplate();

    jmsTemplate.setConnectionFactory(connectionFactory());

    jmsTemplate.setDefaultDestination(userQueue());

    jmsTemplate.setPubSubNoLocal(false);

    return  jmsTemplate;

    }

    ```


    The `JmsTemplate`

    provides methods that receive the destination as a parameter; such

    methods are useful when the application needs to send messages to

    multiple destinations. A custom message converter can be set on the

    `JmsTemplate`,

    and the `convertAndSend`

    methods can be used in this case.


    ```

    convertAndSend(final Object message)

    convertAndSend(Destination destination, final Object message)

    convertAndSend(String destinationName, final Object message)

    ```


    The project assigned to this section is `13-ps-jms-practice`.

    It contains two applications that communicate using ActiveMQ using two

    queues of objects. The producer application extracts users from the

    database and sends them as messages to the `userQueue` and then

    waits to receive a confirmation message on `confirmationQueue`.

    The consumer application receives users as messages on the `userQueue` and uses

    the `confirmationQueue` to

    send a confirmation for each user received. The configuration will be

    provided using Java Configuration classes. In Figure [7-12](#A978-1-4842-0811-3_7_Chapter.html#Fig12)
    you can

    see the design of the JMS application that will be used to test your

    understanding of JMS with Spring.


    ![A978-1-4842-0811-3_7_Fig12_HTML.jpg](A978-1-4842-0811-3_7_Fig12_HTML.jpg)


    Figure 7-12.


    The Producer/Consumer JMS abstract design


    The two applications have a common configuration class `JmsCommonConfig.java`

    `.` This class

    contains the configuration of the JMS infrastructure: the connection

    factory, the queues, and the message converter.


    ```

    import org.apache.activemq.ActiveMQConnectionFactory;

    import org.apache.activemq.command.ActiveMQQueue;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.jms.support.converter.MessageConverter;

    import org.springframework.jms.support.converter.SimpleMessageConverter;

    import javax.jms.ConnectionFactory;

    @Configuration

    public class JmsCommonConfig {

    @Bean

    public ConnectionFactory connectionFactory(){

    ActiveMQConnectionFactory cf =

    new ActiveMQConnectionFactory();

    cf.setBrokerURL("tcp://localhost:61616");

    cf.setTrustAllPackages(true);

    return cf;

    }

    @Bean

    public ActiveMQQueue userQueue(){

    return new ActiveMQQueue("com.queue.user");

    }

    @Bean

    public ActiveMQQueue confirmationQueue(){

    return new ActiveMQQueue("com.queue.confirmation");

    }

    @Bean

    public MessageConverter converter() {

    return new SimpleMessageConverter();

    }

    }

    ```


    The `JmsTemplate`

    aggressively opens and closes resources such as connections and

    sessions, since it assumes that they are cached by the

    connectionFactory. For this reason, instead of using the `ActiveMQConnectionFactory`

    class as a type for the `connectionFactory`

    bean, the Spring-specific `CachingConnectionFactory`

    class should be used to wrap up the native implementation.'
