- fmt: "经过对代码的快速分析，有一点应该很明显：使用桩（stub）进行测试非常耗时，编写桩代码本身似乎与开发工作一样耗时。实际上，使用桩进行测试仅适用于非常简单的应用程序和场景。然而，使用桩进行测试最糟糕的一点是，如果接口发生变化，桩的实现也必须随之改变。因此，你不仅需要调整测试，还需要调整桩。第二糟糕的是，使用桩时必须实现所有方法，即使某些方法在测试场景中并未被使用。例如：\n\
    \n```\n@Override\npublic Set findAllByType(PetType type) {\n    throw new NotImplementedException(\"\
    Not needed for this stub.\");\n}\n```\n\n该方法未参与任何测试场景，为了避免提供实现，决定抛出`NotImplementedException`。关于桩的第三糟糕之处是，如果我们有一个桩的层次结构，重构层次结构底部的桩意味着需要重构所有基于它的桩，否则测试将会失败。在我们的示例中也是如此，因为所有桩都基于`StubAbstractRepo`。\n\
    \n## 结论\n\n桩让测试看起来像是一项繁琐的工作，那么让我们看看模拟（mock）如何改善这种情况。\n\n## 使用模拟进行测试\n\n模拟对象也是一种伪对象，它替换了我们不感兴趣测试的依赖项，并有助于隔离我们感兴趣的对象。模拟代码无需手动编写，因为有多个库和框架可用于生成模拟对象。模拟对象会动态实现依赖的接口。在生成模拟对象之前，开发者可以配置其行为：将调用哪些方法以及它们将返回什么。之后可以使用模拟对象，然后检查预期结果以决定测试结果。\n\
    \n在Java应用程序中，有多个用于生成模拟的库和框架，选择哪一个取决于你。\n\n-   `EasyMock`提供了一种简单的方法来替换被测单元的合作者。更多信息请访问其官方网站：[`http://easymock.org/`](http://easymock.org/)。这个库非常流行，在Spring开发中被广泛使用，直到3.1版本转向了`Mockito`。\n\
    -   `jMock`是一个小型库，其创建团队宣称它能够快速且轻松地定义模拟对象。其API非常友好，适用于复杂的有状态逻辑。更多信息请访问其官方网站：[`http://www.jmock.org/`](http://www.jmock.org/)。\n\
    -   `Mockito`是一个模拟框架，它提供了一个非常干净且简单的API用于编写测试。它的有趣之处在于提供了部分模拟的可能性；真实方法会被调用，但仍然可以被验证和桩化。更多信息请访问其官方网站：[`http://mockito.org/`](http://mockito.org/)。\n\
    -   `PowerMock`是一个框架，它扩展了其他模拟库（如`EasyMock`），提供了更强大的功能。它旨在为那些被认为不可测试的代码提供测试方法。它使用自定义类加载器和字节码操作来支持对静态方法、构造函数、final类和方法、私有方法、移除静态初始化器等进行模拟。你可以在这里了解更多信息：[`https://github.com/jayway/powermock`](https://github.com/jayway/powermock)。\n\
    \n本章将涵盖这些模拟工具中的每一个。当在Spring上下文中进行集成测试时，它们也都提供了注解支持。但在介绍Spring测试之前，我们将坚持使用简单的单元测试。\n\
    \n## EasyMock\n\n使用`EasyMock`生成的模拟进行测试的类是`SimpleUserService`。该类继承了`SimpleAbstractService<T>`的所有方法，并提供了自己针对用户特定行为的方法。\n\
    \n```\nimport static com.ps.util.TestObjectsBuilder.buildUser;\n...\npublic class\
    \ SimpleUserService extends SimpleAbstractService\n        implements UserService\
    \ {\n    private UserRepo repo;\n    @Override\n    public User createUser(String\
    \ email, String password, UserType userType) {\n        User user = buildUser(email);\n\
    \        user.setPassword(password);\n        user.setUserType(userType);\n  \
    \      repo.save(user);\n        return user;\n    }\n    @Override\n    public\
    \ Set findByName(String name, boolean exact) {\n        return repo.findAllByUserName(name,\
    \ exact);\n    }\n    // setters & getters\n    public void setRepo(UserRepo repo)\
    \ {\n        this.repo = repo;\n    }\n    @Override\n    public UserRepo getRepo()\
    \ {\n        return repo;\n    }\n}\n// interface for User specific behavior\n\
    public interface UserService {\n    User createUser(String email, String password,\
    \ UserType userType);\n    /**\n     * Method used to search an User by his name\n\
    \     * @param name name of the user searching for\n     * @param exact if the\
    \ search should be exact (name= :name),\n     *         or not ( name like ’%name%’)\n\
    \     * @return\n     */\n    Set findByName(String name, boolean exact);\n}\n\
    ```\n\n`TestObjectsBuilder`是一个Java类，包含用于创建用户和宠物对象的实用方法。其代码在此上下文中不相关，但你可以在本章附带的项目中检查其代码。\n\
    \n要使用`EasyMock`生成的模拟执行测试，需要完成以下步骤：\n\n1.  声明模拟\n2.  创建模拟\n3.  注入模拟\n4.  记录模拟应该执行的操作\n\
    5.  告知模拟正在进行的实际测试\n6.  测试\n7.  确保在模拟上调用了方法\n8.  验证执行\n\n测试类将被命名为`SimpleUserServiceTest`，在下面的测试代码片段中，测试了`findByName`方法，并且上述步骤已在下文中标出。\n\
    \n```\npackage com.ps.repo.services;\nimport org.junit.Before;\nimport org.junit.Test;\n\
    ...\nimport static org.easymock.EasyMock.*;\nimport static org.junit.Assert.*;\n\
    public class SimpleUserServiceTest {\n    (1)private UserRepo userMockRepo;\n\
    \    private SimpleUserService simpleUserService;\n    @Before\n    public void\
    \ setUp() {\n        (2)userMockRepo = createMock(UserRepo.class);\n        //create\
    \ object to be tested\n        simpleUserService = new SimpleUserService();\n\
    \        (3)simpleUserService.setRepo(userMockRepo);\n    }\n    @Test\n    public\
    \ void findByNamePositive() {\n        //record what we want the mock to do\n\
    \        User simpleUser = buildUser(\"gigi@gmail.com\", \"the_password\", UserType.OWNER);\n\
    \        Set userSet = new HashSet();\n        userSet.add(simpleUser);\n    \
    \    (4)expect(userMockRepo.findAllByUserName(\"gigi\", false)).andReturn(userSet);\n\
    \        (5)replay(userMockRepo);\n        (6)Set result = simpleUserService.findByName(\"\
    gigi\", false);\n        (7)verify(userMockRepo);\n        (8) assertEquals(result.size(),\
    \ 1);\n    }\n}\n```\n\n`EasyMock`库提供了处理模拟的静态方法，当需要多个模拟时，`replay`和`verify`方法会被替换为`replyAll`和`verifyAll`，模拟会被自动拾取并处理，无需直接引用它们中的任何一个。使用模拟的主要优势在于无需维护任何额外的类，因为使用模拟时，依赖项所需的行为是在测试方法体内当场定义的，而生成库负责模拟该行为。年轻且缺乏经验的开发者可能难以理解模拟的工作原理，但如果你是他们的导师，只需让他们先创建桩，然后再切换到模拟。他们会更容易理解，并且会着迷于无需编写太多额外代码就能测试一个对象的可能性。\n\
    \n## jMock\n\n使用`jMock`生成的模拟进行测试的类是`SimpleRequestService`。该类继承了`SimpleAbstractService<T>`的所有方法，并提供了自己用于请求特定行为的方法。"
  raw: "After a quick analysis of the code, one thing should be obvious: testing\n\
    code with stubs is time-consuming, and writing stubs seems to take as\nmuch time\
    \ as development itself. Indeed, testing using stubs is\napplicable only for really\
    \ simple applications and scenarios. The worst\nthing about testing with stubs,\
    \ though, is that if the interface\nchanges, the stub implementation has to change\
    \ too. So, not only do you\nhave to adapt the tests, but the stubs too. The second-worst\
    \ thing is\nthat all methods have to be implemented when stubs are used, even\
    \ those\nthat are not used by a test scenario. Example:\n\n```\n@Override\npublic\
    \ Set findAllByType(PetType type) {\nthrow new NotImplementedException(\"Not needed\
    \ for this stub.\");\n}\n```\n\nThis method was not involved in any test scenario,\
    \ and to avoid\nproviding an implementation, the decision was made to throw a\
    \ `NotImplementedException`.\nThe third-worst thing about stubs is that if we\
    \ have a hierarchy of\nstubs, refactoring the one at the base of the hierarchy\
    \ means\nrefactoring all the stubs based on them, or else tests will fail. And\n\
    this is the case in our example as well, since all stubs are based on\n`StubAbstractRepo`.\n\
    \nConclusion\n\nStubs make testing seem like a tedious job, so let’s see what\
    \ mocks can do to improve the situation.\n\nTesting with Mocks\n\nA mock object\
    \ is also a pseudo object, replacing the dependency we are\nnot interested in\
    \ testing and helping to isolate the object in which we\nare interested. Mock\
    \ code does not have to be written, because there are\na few libraries and frameworks\
    \ that can be used to generate mock\nobjects. The mock object will implement the\
    \ dependent interface on the\nfly. Before a mock object is generated, the developer\
    \ can configure its\nbehavior: what methods will be called and what will they\
    \ return. The\nmock object can be used after that, and then expectations can be\
    \ checked\nin order to decide the test result.\n\nThere are more libraries and\
    \ frameworks for mock generation written in\nJava applications, and which one\
    \ to use is up to you.\n\n*   EasyMock provides an easy way to\n    replace collaborators\
    \ of the unit under test. More about it on their\n    official site: [`http://easymock.org/`](http://easymock.org/)\
    \ . This library is very popular and was used\n    extensively in Spring development\
    \ until version 3.1 made the switch to\n    Mockito .\n\n*   jMock is a small\
    \ library, and the\n    team that created it brags about making it quick and easy\
    \ to define mock\n    objects. The API is very nice and is suitable for complex\
    \ stateful\n    logic. More about it on their official site: [`http://www.jmock.org/`](http://www.jmock.org/)\
    \ .\n\n*   Mockito is a mocking framework\n    that provides a really clean and\
    \ simple API for writing tests. The\n    interesting thing about it is that it\
    \ provides the possibility of\n    partial mocking; real methods are invoked but\
    \ still can be verified and\n    stubbed. More about it on their official site:\
    \ [`http://mockito.org/`](http://mockito.org/) .\n\n*   PowerMock is a framework\
    \ that\n    extends other mock libraries such as EasyMock with more powerful\n\
    \    capabilities. It was created in order to provide a way of testing code\n\
    \    considered untestable. It uses a custom classloader and bytecode\n    manipulation\
    \ to enable mocking of static methods, constructors, final\n    classes and methods,\
    \ private methods, removal of static initializers,\n    and more. You can read\
    \ more about it here: [`https://github.com/jayway/powermock`](https://github.com/jayway/powermock)\
    \ .\n\nEach of these mocking tools will be covered in this chapter. All of them\n\
    also provide annotations when used in a Spring context, when doing\nintegration\
    \ testing. But until Spring testing is covered, we will stick\nto simple unit\
    \ testing.\n\nEasyMock\n\nThe class to test with mocks generated by `EasyMock`\
    \ is `SimpleUserService`.\nThis class inherits all methods from `SimpleAbstractService<T>`\n\
