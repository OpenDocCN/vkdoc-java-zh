  raw: "```\npackage com.ps.config;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.web.servlet.config.annotation.EnableWebMvc;\nimport\
    \ org.springframework.web.servlet.config.annotation.WebMvcConfigurerAdapter;\n\
    import org.springframework.web.servlet.view.InternalResourceViewResolver;\n...\n\
    @Configuration\n// \n@EnableWebMvc\n//  \n@ComponentScan(basePackages = {\"com.ps.web\"\
    })\npublic class WebConfig extends WebMvcConfigurerAdapter {\n//  \n@Override\n\
    public void configureDefaultServletHandling(\nDefaultServletHandlerConfigurer\
    \ configurer) {\nconfigurer.enable();\n}\n@Bean\nInternalResourceViewResolver\
    \ getViewResolver(){\nInternalResourceViewResolver resolver = new InternalResourceViewResolver();\n\
    resolver.setPrefix(\"/WEB-INF/\");\nresolver.setSuffix(\".jsp\" );\nresolver.setRequestContextAttribute(\"\
    requestContext\");\nreturn resolver;\n}\n... // other beans and method implementations\
    \ that are not in scope\n}\n```\n\nThe `WebMvcConfigurerAdapter`\nclass that was\
    \ extended by the configuration class here contains more\nmethods for which the\
    \ developer must provide implementation, and they\nare out of scope, but the `10-ps-mvc-practice`\n\
    project that is the corresponding one for this section contains a full\nworking\
    \ and documented configuration that you can take a look at.\n\nGetting Rid of\
    \ web.xml\n\nStarting with Servlet 3.0+, the `web.xml` file is no\nlonger necessary\
    \ to configure a web application. It can be replaced with\na class implementing\
    \ the `WebApplicationInitializer`\ninterface (or a class extending any of the\
    \ Spring classes that extend\nthis interface). This class will be detected automatically\
    \ by `SpringServletContainerInitializer`\n(an internal Spring-supported class\
    \ that is not meant to be used\ndirectly or extended), which itself is bootstrapped\
    \ automatically by\nevery Servlet 3.0+ container.\n\nThe `SpringServletContainerInitializer`[⁵](#A978-1-4842-0811-3_6_Chapter.html#Fn5)\n\
    extends `javax.servlet.ServletContainerInitializer`\nand provides a Spring-specific\
    \ implementation for the `onStartup` method.\nThis class is loaded and instantiated,\
    \ and the `onStartup` is invoked\nby every Servlet 3.0+ compliant container during\
    \ container startup\nassuming that the spring-web module JAR is present on the\
    \ classpath.\nThus, the `web.xml` can be\ndeleted, and, considering we are still\
    \ using XML configuration, can be\nreplaced with this class:\n\n```\npackage com.ps.config;\n\
    import org.springframework.web.WebApplicationInitializer;\nimport org.springframework.web.servlet.DispatcherServlet;\n\
    import javax.servlet.ServletContext;\nimport javax.servlet.ServletException;\n\
    import  javax.servlet.ServletRegistration;\npublic class WebInitializer implements\
    \ WebApplicationInitializer {\n@Override\npublic void onStartup(ServletContext\
    \ servletContext) throws ServletException {\nServletRegistration.Dynamic registration\
    \ =\nservletContext.addServlet(\"pet-dispatcher\", new DispatcherServlet());\n\
    registration.setLoadOnStartup(1);\nregistration.addMapping(\"/\");\nregistration.setInitParameter(\"\
    contextConfigLocation\",\n\"/WEB-INF/spring/mvc-config.xml\");\n}\n}\n```\n\n\
    There are more ways than one to write the implementation above. For\nexample,\
    \ the application context can be constructed first and then\ninjected into the\
    \ DispatcherServlet, but that is again out of the scope\nof this book.\n\n```\n\
    package com.ps.config;\nimport org.springframework.web.WebApplicationInitializer;\n\
    import org.springframework.web.servlet.DispatcherServlet;\nimport javax.servlet.ServletContext;\n\
    import javax.servlet.ServletException;\nimport javax.servlet.ServletRegistration;\n\
    public class WebInitializer implements WebApplicationInitializer {\n@Override\n\
    public void onStartup(ServletContext servletContext) throws ServletException {\n\
    XmlWebApplicationContext appContext = new XmlWebApplicationContext();\nappContext.setConfigLocation(\"\
    /WEB-INF/spring/mvc-config.xml\");\nServletRegistration.Dynamic registration =\n\
    servletContext.addServlet(\"dispatcher\", new DispatcherServlet(appContext));\n\
    registration.setLoadOnStartup(1);\nregistration.addMapping(\"/\");\n}\n}\n```\n\
    \nIf a configuration class annotated with `@EnableWebMvc` is\nused, then the implementation\
    \ of the `onStartup`(…) method\nchanges to this:\n\n```\npackage com.ps.config;\n\
    import org.springframework.web.WebApplicationInitializer;\nimport org.springframework.web.servlet.DispatcherServlet;\n\
    import javax.servlet.ServletContext;\nimport javax.servlet.ServletException;\n\
    import javax.servlet.ServletRegistration;\npublic class WebInitializer implements\
    \ WebApplicationInitializer {\n@Override\npublic void onStartup(ServletContext\
    \ servletContext) throws ServletException {\nServletRegistration.Dynamic registration\
    \ =\nservletContext.addServlet(\"dispatcher\", new DispatcherServlet());\nregistration.setLoadOnStartup(1);\n\
    registration.addMapping(\"/\");\nregistration.setInitParameter(\"contextConfigLocation\"\
    ,\n\"com.ps.config.WebConfig\");\nregistration.setInitParameter(\"contextClass\"\
    ,\n\"o.s.w.c.s.AnnotationConfigWebApplicationContext\");\n}\n}\n```\n\nThere are\
    \ many ways to write a configuration using Java Configuration\nclasses as well,\
    \ but only the most common way will be depicted here,\nnamely extending the `AbstractAnnotationConfigDispatcherServletInitializer`\n\
    class:\n\n```\npackage com.ps.config;\nimport org.springframework.web.servlet.support.\n\
    AbstractAnnotationConfigDispatcherServletInitializer;\n...\npublic class WebInitializer\
    \ extends\nAbstractAnnotationConfigDispatcherServletInitializer {\n@Override\n\
    protected Class getRootConfigClasses() {\nreturn new Class{\nServiceConfig.class\n\
    };\n}\n@Override\nprotected Class getServletConfigClasses() {\nreturn new Class{\n\
    WebConfig.class\n};\n}\n@Override\nprotected String getServletMappings() {\nreturn\
    \ new String{\"/\"};\n}\n@Override\nprotected Filter getServletFilters() {\nCharacterEncodingFilter\
    \ cef = new CharacterEncodingFilter();\ncef.setEncoding(\"UTF-8\");\ncef.setForceEncoding(true);\n\
    return new Filter{new HiddenHttpMethodFilter(), cef};\n}\n}\n```\n\nThis class\
    \ defines a set of methods that can be overridden by the\ndeveloper to provide\
    \ a complete configuration for a web application\nwithout needing any XML. It\
    \ is most suitable and easy to use for\nmultimodule applications in which the\
    \ root context should be separated\nfrom web context. In the code depicted previously,\
    \ the `getRootConfigClasses()`\nis called internally, and the configuration classes\
    \ are used to create\nthe root application context. The `getServletMappings()`\n\
    method is used to set the context of the `DispatcherServlet`,\nand the `getServletFilters()`\n\
    is used to set an additional filter for the application.\n\nUsing Spring to create\
    \ web applications is easy and practical, but it is\nalso a wide subject that\
    \ cannot be covered in this book, since only the\nbasic idea is a topic for the\
    \ certification exam.\n\nRunning a Spring Web Application"
  trans: "\n```\npackage com.ps.config;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.web.servlet.config.annotation.EnableWebMvc;\nimport\
    \ org.springframework.web.servlet.config.annotation.WebMvcConfigurerAdapter;\n\
    import org.springframework.web.servlet.view.InternalResourceViewResolver;\n...\n\
    @Configuration\n// \n@EnableWebMvc\n//  \n@ComponentScan(basePackages = {\"com.ps.web\"\
    })\npublic class WebConfig extends WebMvcConfigurerAdapter {\n//  \n@Override\n\
    public void configureDefaultServletHandling(\nDefaultServletHandlerConfigurer\
    \ configurer) {\nconfigurer.enable();\n}\n@Bean\nInternalResourceViewResolver\
    \ getViewResolver(){\nInternalResourceViewResolver resolver = new InternalResourceViewResolver();\n\
    resolver.setPrefix(\"/WEB-INF/\");\nresolver.setSuffix(\".jsp\" );\nresolver.setRequestContextAttribute(\"\
    requestContext\");\nreturn resolver;\n}\n... // 其他不在讨论范围内的 Bean 和方法实现\n}\n```\n\
    \n此处配置类所继承的 `WebMvcConfigurerAdapter` 类包含更多需要开发者提供实现的方法，这些方法不在讨论范围内，但本节对应的 `10-ps-mvc-practice`\
    \ 项目包含一个完整、可运行且有文档说明的配置，供你参考。\n\n**移除 web.xml**\n\n从 Servlet 3.0+ 开始，`web.xml`\
    \ 文件不再是配置 Web 应用程序的必需项。它可以被一个实现了 `WebApplicationInitializer` 接口的类（或一个继承自 Spring\
    \ 中扩展了该接口的类的类）所替代。该类会被 `SpringServletContainerInitializer`（一个 Spring 内部支持的类，不打算被直接使用或继承）自动检测到，而\
    \ `SpringServletContainerInitializer` 本身又会被每个 Servlet 3.0+ 容器自动引导启动。\n\n`SpringServletContainerInitializer`⁵\
    \ 扩展了 `javax.servlet.ServletContainerInitializer`，并为 `onStartup` 方法提供了 Spring\
    \ 特定的实现。在容器启动期间，只要 `spring-web` 模块的 JAR 包存在于类路径中，每个符合 Servlet 3.0+ 规范的容器都会加载并实例化此类，并调用其\
    \ `onStartup` 方法。因此，`web.xml` 可以被删除，并且，考虑到我们仍在使用 XML 配置，可以用以下类来替代它：\n\n```\npackage\
    \ com.ps.config;\nimport org.springframework.web.WebApplicationInitializer;\n\
    import org.springframework.web.servlet.DispatcherServlet;\nimport javax.servlet.ServletContext;\n\
    import javax.servlet.ServletException;\nimport  javax.servlet.ServletRegistration;\n\
    public class WebInitializer implements WebApplicationInitializer {\n@Override\n\
    public void onStartup(ServletContext servletContext) throws ServletException {\n\
    ServletRegistration.Dynamic registration =\nservletContext.addServlet(\"pet-dispatcher\"\
    , new DispatcherServlet());\nregistration.setLoadOnStartup(1);\nregistration.addMapping(\"\
    /\");\nregistration.setInitParameter(\"contextConfigLocation\",\n\"/WEB-INF/spring/mvc-config.xml\"\
    );\n}\n}\n```\n\n上述实现有多种写法。例如，可以先构建应用上下文，然后将其注入到 `DispatcherServlet` 中，但这同样超出了本书的讨论范围。\n\
    \n```\npackage com.ps.config;\nimport org.springframework.web.WebApplicationInitializer;\n\
    import org.springframework.web.servlet.DispatcherServlet;\nimport javax.servlet.ServletContext;\n\
    import javax.servlet.ServletException;\nimport javax.servlet.ServletRegistration;\n\
    public class WebInitializer implements WebApplicationInitializer {\n@Override\n\
    public void onStartup(ServletContext servletContext) throws ServletException {\n\
    XmlWebApplicationContext appContext = new XmlWebApplicationContext();\nappContext.setConfigLocation(\"\
    /WEB-INF/spring/mvc-config.xml\");\nServletRegistration.Dynamic registration =\n\
    servletContext.addServlet(\"dispatcher\", new DispatcherServlet(appContext));\n\
    registration.setLoadOnStartup(1);\nregistration.addMapping(\"/\");\n}\n}\n```\n\
    \n如果使用了带有 `@EnableWebMvc` 注解的配置类，那么 `onStartup(…)` 方法的实现将变为：\n\n```\npackage com.ps.config;\n\
    import org.springframework.web.WebApplicationInitializer;\nimport org.springframework.web.servlet.DispatcherServlet;\n\
    import javax.servlet.ServletContext;\nimport javax.servlet.ServletException;\n\
    import javax.servlet.ServletRegistration;\npublic class WebInitializer implements\
    \ WebApplicationInitializer {\n@Override\npublic void onStartup(ServletContext\
    \ servletContext) throws ServletException {\nServletRegistration.Dynamic registration\
    \ =\nservletContext.addServlet(\"dispatcher\", new DispatcherServlet());\nregistration.setLoadOnStartup(1);\n\
    registration.addMapping(\"/\");\nregistration.setInitParameter(\"contextConfigLocation\"\
    ,\n\"com.ps.config.WebConfig\");\nregistration.setInitParameter(\"contextClass\"\
    ,\n\"o.s.w.c.s.AnnotationConfigWebApplicationContext\");\n}\n}\n```\n\n使用 Java\
    \ 配置类编写配置也有很多方法，但这里只介绍最常见的一种，即扩展 `AbstractAnnotationConfigDispatcherServletInitializer`\
    \ 类：\n\n```\npackage com.ps.config;\nimport org.springframework.web.servlet.support.\n\
    AbstractAnnotationConfigDispatcherServletInitializer;\n...\npublic class WebInitializer\
    \ extends\nAbstractAnnotationConfigDispatcherServletInitializer {\n@Override\n\
    protected Class getRootConfigClasses() {\nreturn new Class{\nServiceConfig.class\n\
    };\n}\n@Override\nprotected Class getServletConfigClasses() {\nreturn new Class{\n\
    WebConfig.class\n};\n}\n@Override\nprotected String getServletMappings() {\nreturn\
    \ new String{\"/\"};\n}\n@Override\nprotected Filter getServletFilters() {\nCharacterEncodingFilter\
    \ cef = new CharacterEncodingFilter();\ncef.setEncoding(\"UTF-8\");\ncef.setForceEncoding(true);\n\
    return new Filter{new HiddenHttpMethodFilter(), cef};\n}\n}\n```\n\n该类定义了一组方法，开发者可以重写这些方法，为\
    \ Web 应用程序提供完整的配置，而无需任何 XML。它非常适合且易于用于多模块应用程序，在这些应用程序中，根上下文应与 Web 上下文分离。在上述代码中，`getRootConfigClasses()`\
    \ 被内部调用，并使用这些配置类来创建根应用上下文。`getServletMappings()` 方法用于设置 `DispatcherServlet` 的上下文，而\
    \ `getServletFilters()` 用于为应用程序设置额外的过滤器。\n\n使用 Spring 创建 Web 应用程序既简单又实用，但这也是一个广泛的课题，无法在本书中详尽涵盖，因为只有基本概念才是认证考试的主题。\n\
    \n**运行 Spring Web 应用程序**\n"
- fmt: "`10-ps-mvc-practice`是一个可用于测试你对Spring Web MVC知识和基本理解的项目。该项目还包含国际化（i18n）和主题配置的Bean，这些Bean都有完善的文档说明，因此Spring\
    \ Web应用程序的`WebConfig`配置类仍然相当直接明了。该应用程序很简单，它只列出系统中的用户列表，并允许你通过点击链接查看每个用户的详细信息。在图[6-7](#A978-1-4842-0811-3_6_Chapter.html#Fig7)中，展示了`users/list.jsp`页面。\n\
    \n![A978-1-4842-0811-3_6_Fig7_HTML.jpg](A978-1-4842-0811-3_6_Fig7_HTML.jpg)\n\n\
    **图 6-7.** 练习 Spring Web 应用程序\n\n本节有三个TODO任务，编号从45到47。如果你想测试自己对Spring Web MVC配置的理解，可以尝试解决它们。\n\
    \n- 任务TODO 45位于`WebConfig`类中，要求你完成该类的配置，使其可用于创建Web应用程序上下文。\n- 任务TODO 46位于`WebConfig`类中，要求你为`InternalResourceViewResolver`\
    \ Bean提供配置。\n- 任务TODO 47位于`UserControllerTest`中，要求你完成一个测试方法的主体，该方法检查`UserController.show()`方法是否正常工作：返回的视图逻辑名称是否正确，以及模型是否填充了正确的数据。检查`UserController`类的实现，以找到应在断言语句中使用的预期值。在同一个类中，有一个完全实现的方法，用于测试`UserController`类的`list()`方法。分析它并以此为灵感。\n\
    \n如果你遇到困难，可以查看`10-ps-mvc-solution`项目中提供的解决方案。\n\n### 使用 Jetty 运行\n\n该项目可以在Jetty嵌入式服务器上运行，使用Gretty插件，该插件已添加到此模块的Gradle配置文件中。该文件被命名为模块`10-ps-mvc-practice.gradle`。这是一个开发选择，旨在帮助你轻松识别哪个配置文件对应哪个模块。Gradle配置文件的默认名称是`build.gradle`。在像`pet-sitter`这样的大型项目中，如果所有文件都命名为`build.gradle`，那么在Intellij\
    \ IDEA中使用`CTRL+SHIFT+N`将很难识别出模块的正确构建文件。以下代码片段描述了`10-ps-mvc-practice`模块的配置文件内容。\n\
    \n```\napply plugin: ’war’\napply from:\n’https://raw.github.com/akhikhl/gretty/master/pluginScripts/gretty.plugin’\n\
    dependencies {\ncompile project(’:09-ps-data-jpa’)\ncompile misc.joda, spring.jdbc,\
    \ spring.contextSupport, misc.h2, misc.commons,\nspring.webmvc,  misc.hikari,...\n\
    //etc\ntestCompile tests.junit, tests.easymock, tests.jmock, tests.mockito,\n\
    spring.test, tests.hamcrestCore, tests.hamcrestLib\n}\ngretty {\nport = 8080\n\
    // application context\ncontextPath = ’/mvc-basic’\n}\n```\n\n设置好此插件后，Spring应用程序可以通过两种方式运行：\n\
    \n- 从终端运行：\n```\n    gradle appRun\n```\n- 查看控制台，Gretty日志会告诉你可以在哪里访问Web应用程序。\n\
    ```\n    ...\n    INFO Jetty 9.2.15.v20160210 started and listening on port 8080\n\
    \    INFO mvc-basic runs at:\n    INFO   http://localhost:8080/mvc-basic\n   \
    \ Run ’gradle appStop’ to stop the server.\n```\n- 从Intellij IDEA中，转到`Gradle projects`视图，展开`pet-sitter`项目，找到`10-ps-mvc-practice`，展开该节点，然后进入`Tasks\
    \ -> gretty`。在其下，你将看到`appStart`任务。双击它，将出现一个控制台，告诉你应用程序何时启动以及运行了多长时间。当然，最初在解决TODO任务之前，应用程序在浏览器中是不可见的。在图[6-8](#A978-1-4842-0811-3_6_Chapter.html#Fig8)中，你可以看到要运行的Gradle任务以及Intellij\
    \ IDEA中可用的控制台。\n\n![A978-1-4842-0811-3_6_Fig8_HTML.jpg](A978-1-4842-0811-3_6_Fig8_HTML.jpg)\n\
    \n**图 6-8.** 在 Intellij IDEA 中使用 Gradle appStart 任务运行的 Spring Web 应用程序\n\n###\
    \ 使用 Tomcat 运行\n\nSpring Web应用程序也可以在应用服务器上运行。最常用的应用服务器是Apache Tomcat。它是Java Servlet、JavaServer\
    \ Pages、Java表达式语言和Java WebSocket技术的开源实现。它目前是版本9，自1999年以来一直存在。在任何操作系统上安装Tomcat都很容易；只需按照官方网站上的说明操作即可：[http://tomcat.apache.org/](http://tomcat.apache.org/)\n\
    \n构建Web应用程序时，结果是一个与项目同名的`*.war`归档文件。在前面的`10-ps-mvc-practice.gradle`文件中，必须添加一个额外的配置，以确保war名称是`mvc-basic`，这样当它部署在Tomcat上时，应用程序的上下文将是相同的。\n\
    \n```\nwar {\narchiveName = ’mvc-basic.war’\n}\n```\n\n在`10-ps-mvc-practice`模块上运行`gradle\
    \ build`后，`mvc-basic.war`应该存在于`10-ps-mvc-solution/build/libs`目录下。将此Web应用程序部署到Tomcat很容易：只需将`mvc-basic.war`复制到`tomcat/webapps/`目录下并启动服务器。应用程序将被部署，并可在`http://localhost:8080/mvc-basic/`访问。\n\
    \n前面的部署方法是手动方式。当你使用像Intellij IDEA这样智能的Java IDE时，事情可以变得更简单。开发人员所要做的就是在Intellij\
    \ IDEA中创建一个Tomcat配置，并添加生成需要部署的war文件的项目。以下是步骤：\n\n- 打开运行/调试配置菜单，选择`Edit Configurations`（图[6-9](#A978-1-4842-0811-3_6_Chapter.html#Fig9)）。\n\
    \n![A978-1-4842-0811-3_6_Fig9_HTML.jpg](A978-1-4842-0811-3_6_Fig9_HTML.jpg)\n\n\
    **图 6-9.** Intellij IDEA 运行/调试配置菜单\n\n- 点击`+`按钮，从列表中选择`Tomcat Server -> Local`，然后点击`Ok`（图[6-10](#A978-1-4842-0811-3_6_Chapter.html#Fig10)）。\n\
    \n![A978-1-4842-0811-3_6_Fig10_HTML.jpg](A978-1-4842-0811-3_6_Fig10_HTML.jpg)\n\
    \n**图 6-10.** 选择配置类型前的 Intellij IDEA 运行/调试配置对话框窗口\n\n- 在弹出的窗口中，点击`Configure`按钮（图[6-11](#A978-1-4842-0811-3_6_Chapter.html#Fig11)）。\n\
    \n![A978-1-4842-0811-3_6_Fig11_HTML.jpg](A978-1-4842-0811-3_6_Fig11_HTML.jpg)\n\
