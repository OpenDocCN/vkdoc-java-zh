    Web 服务构成了一种跨平台的进程间通信方法，它使用通用标准，并且能够穿透防火墙。它们基于消息而非对象进行工作。因此，客户端基本上发送一条消息，然后收到一个回复。Web
    服务在无状态环境中运行，每条消息都会创建一个新的对象来处理该请求。Web 服务支持跨平台互操作性，非常适合异构环境。它们通过诸如 WSDL（Web 服务描述语言）和
    SOAP（简单对象访问协议）等方式暴露自己任意定义的操作集。


    REST，即表述性状态转移，也称为 RESTful Web 服务，是目前应用程序之间相互通信最流行的方式。REST 服务允许使用一组统一且预定义的无状态操作来访问和操作
    Web 资源的文本表示。REST 服务最常用的协议是 HTTP，因此 HTTP 方法映射到 REST 操作，例如 GET、POST、PUT、DELETE。最初，Web
    资源是使用 URL（统一资源定位符，也称为网址）访问的文档或文件，但最近，Web 资源已经能够成为任何可以通过 Web 访问并由 URI（统一资源标识符）标识的事物（对象、实体）。


    两个异构系统进行通信的最简单方式是使用一个称为**中间件**的层。通过这一层，像应用程序、企业 Java Bean、Servlet 以及其他独立开发并在不同网络平台上运行的软件组件可以相互交互。中间件有三种类型：


    *   **远程过程调用（RPC）**，允许一个应用程序像调用本地过程一样远程调用另一个应用程序的过程。

    *   **对象请求代理（ORB）**，基于 ORB 的方式，使应用程序的对象能够在异构网络间分布和共享。（远程处理属于这一类。）

    *   **面向消息的中间件（MOM）**，基于 MOM 的中间件，允许分布式应用程序通过发送和接收消息来通信和交换数据。


    Spring 提供了对 JMS（Java 消息服务）API 的支持，这是一个用 Java 编写的用于访问 MOM 中间件的抽象层。消息传递是处理生产者-消费者问题的一种实现。一个应用程序生成消息，客户端应用程序异步地消费这些消息。发送消息的应用程序对其客户端（或多个客户端）一无所知。消息传递是一种松耦合的分布式通信形式。使用消息传递进行通信的主要优点是生产者和消费者之间的松耦合，以及集成异构平台、减少系统瓶颈、提高可扩展性以及更快地响应变化的能力。


    JMX（Java 管理扩展）是一种 Java 技术，它提供了用于管理和监控应用程序、系统对象、设备（如打印机）以及面向服务的网络的工具。这些资源由称为 MBean（托管
    Bean）的对象表示。Spring 中的 JMX 支持提供了将 Spring 应用程序轻松透明地集成到 JMX 基础设施中的特性。


    本章将浅显地涵盖所有这些主题，但 REST 除外，它在核心认证考试的官方文档中有专门的章节。


    ## Spring 远程处理


    在本章之前，所介绍的主题都是通过运行在单个 JVM 上的应用程序进行技术示例演示的。服务 Bean 调用仓库 Bean 的方法，并执行测试类来检查它们之间的正确通信。图
    7-1 描述了到目前为止所涵盖的情况。


    ![A978-1-4842-0811-3_7_Fig1_HTML.jpg](img/A978-1-4842-0811-3_7_Fig1_HTML.jpg)


    **图 7-1.** 客户端和服务器应用程序运行在同一个 JVM 上下文中


    对于传统的远程处理客户端，应该引入一个 `ClientService` 类来访问存在于不同 JVM 上运行的应用程序中的远程对象。图 7-2 抽象地描绘了本章所涵盖的情况。远程对象在此图中由
    `RemoteUserService` 类表示。


    ![A978-1-4842-0811-3_7_Fig2_HTML.jpg](img/A978-1-4842-0811-3_7_Fig2_HTML.jpg)


    **图 7-2.** 客户端和服务器应用程序运行在不同的 JVM 上下文中


    Java 远程调用允许在一个 JVM 中运行的对象调用在另一个 JVM 中运行的对象的方法。RMI（远程方法调用）是 Java 版本的 RPC（远程过程调用）。RMI
    应用程序通常由两个进程组成：一个服务器和一个客户端。服务器创建将被远程访问的对象，并暴露一个**骨架**（远程对象的接口）。客户端在**存根**（代理对象）上调用方法。RMI
    模型的抽象功能模式如图 7-3 所示。


    ![A978-1-4842-0811-3_7_Fig3_HTML.jpg](img/A978-1-4842-0811-3_7_Fig3_HTML.jpg)


    **图 7-3.** RMI 模型抽象功能模式


    RMI 模型有一些缺点：


    *   客户端和服务器实现与 RMI 框架耦合。

    *   服务器接口必须扩展 `java.rmi.Remote`。

    *   客户端必须捕获 `java.rmi.RemoteException`，因为它是一个受检异常。¹

    *   RMI 存根和骨架必须使用 rmic 编译器生成，该编译器位于 `JAVA_HOME\bin` 目录中。²

    *   并且必须编写额外的代码来处理从远程服务器绑定和检索对象。


    为了在服务器和客户端之间传递对象，使用了 Java 编组。因此，使用 RMI 传输的对象必须是可序列化的，并且必须实现 `java.io.Serializable`。RMI
    使用 Java 远程方法协议（JRMP）进行远程 Java 对象通信。在下面的远程示例中，使用了在 `00-ps-core` 中定义的实体对象，并且它们被定义为可序列化的，以便能够被
    Spring JPA 处理。


    ```

    // User.java

    import javax.persistence.*;

    ...

    @Entity

    @Table(name="P_USER")

    public class User extends AbstractEntity {

    ...

    }

    // AbstractEntity.java

    import java.io.Serializable;

    @MappedSuperclass

    public abstract class AbstractEntity

    implements Serializable {

    ...

    }

    ```


    Spring 提供了用于编写远程应用程序的类，这些类旨在隐藏“管道”细节。使用类 `org.springframework.remoting.rmi.RmiServiceExporter`，由类
    `UserServiceImpl` 实现的接口 `UserService`（在 `09-ps-data-jpa` 中定义的服务 Bean）可以被暴露为 RMI
    对象。此类可用于绑定到注册表或暴露端点。使用类 `org.springframework.remoting.rmi.RmiProxyFactoryBean`，可以通过创建的代理访问
    `UserService` 接口，这些代理用于与服务器端端点通信，并将远程处理特定的异常转换为运行时层次结构，所有这些都扩展了核心的 `RemoteAccessException`。这两个类基本上是实用工具类，旨在帮助开发人员快速轻松地编写远程应用程序，因为通过使用配置，开发人员需要编写的代码大大减少了。³
    使用 Spring 进行客户端和服务器应用程序远程处理的抽象模式如图 7-4 所示。


    ![A978-1-4842-0811-3_7_Fig4_HTML.jpg](img/A978-1-4842-0811-3_7_Fig4_HTML.jpg)


    **图 7-4.** Spring 远程处理模式，描述了 RmiServiceExporter 和 RmiProxyFactoryBean 的角色


    ## Spring 远程配置

