    因此它们实际上是 URL（位置）。当与 `/users/id/{id}` 和\n`/pets/owner/{id}` 拼接后，它们就变成了 URI（资源）。\n\
    \n这两个微服务由其应用程序名称标识，这些名称是在其配置文件中设置的，并用于向发现服务器注册自己。大小写并不重要，但它能清楚地表明 `PETS-NAME`\
    \ 是一个将通过发现获取的逻辑主机，而不是实际的主机名。此外，之前描述微服务详细信息时，你可以看到 `<app>` 元素中的应用程序名称也是用大写表示的。因此，这能很清楚地表明哪个服务应该被发现并进一步使用。在这个例子中，逻辑主机名是硬编码的，但在生产应用程序中，它们通常是在外部配置的。\n\
    \n由于我们使用的是 Netflix 软件，`RestTemplate` bean 将被 Spring Cloud 拦截并自动配置，以使用一个自定义的 `HttpRequestClient`，该客户端利用\
    \ Netflix Ribbon⁴ 进行微服务查找。\n\n`RibbonLoadBalancerClient`\n实现负责获取逻辑服务名称（如同在发现服务器中注册的那样），并将其转换为所选微服务的实际主机名。执行此操作的方法称为\
    \ `reconstructURI`，\n代码如下面的代码片段所示。\n\n```\npackage org.springframework.cloud.netflix.ribbon;\n\
    import org.springframework.cloud.client.ServiceInstance;\nimport org.springframework.cloud.client.loadbalancer.LoadBalancerClient;\n\
    import org.springframework.cloud.client.loadbalancer.LoadBalancerRequest;\n...\n\
    public class RibbonLoadBalancerClient implements LoadBalancerClient {\npublic\
    \ URI reconstructURI(ServiceInstance instance, URI original) {\nAssert.notNull(instance,\
    \ \"instance can not be null\");\nString serviceId = instance.getServiceId();\n\
    RibbonLoadBalancerContext context = this.clientFactory\n.getLoadBalancerContext(serviceId);\n\
    Server server = new Server(instance.getHost(), instance.getPort());\nIClientConfig\
    \ clientConfig = clientFactory.getClientConfig(serviceId);\nServerIntrospector\
    \ serverIntrospector = serverIntrospector(serviceId);\nURI uri = RibbonUtils.updateToHttpsIfNeeded(original,\
    \ clientConfig,\nserverIntrospector, server);\nreturn context.reconstructURIWithServer(server,\
    \ uri);\n}\n@Override\npublic ServiceInstance choose(String serviceId) {\nServer\
    \ server = getServer(serviceId);\nif (server == null) {\nreturn null;\n}\nreturn\
    \ new RibbonServer(serviceId, server, isSecure(server, serviceId),\nserverIntrospector(serviceId).getMetadata(server));\n\
    }\n...\n}\n```\n\nRibbon 可用于从同一服务的多个实例中选择合适的实例，即响应最快的实例，这通常是在 `ClientHttpRequestFactory`\
    \ 中通过首先调用 `choose(...)` 方法完成的，该方法也出现在上面的代码片段中。\n\n更多新特性\n\n编写基于微服务的分布式应用程序需要深入了解\
    \ Spring Boot 和 Spring Cloud。`17-ps-micro-sample` 与 `pet-sitter` 项目分离，因为它有特殊的设置和使用了所有新颖的软件。Gradle\
    \ 设置不同，并且引入了许多新的注解，在要求你解决此项目的 TODO 任务之前，应该对这些注解进行解释。因此，内容如下：\n\n*   两个微服务的数据库是独立的，即使使用了\
    \ JPA，也无法在 `P_USER` 和 `P_PET` 之间以经典方式使用 `@OneToMany` 和 `@ManyToOne` 注解建立一对多关系，因此，宠物属于某个用户这一事实是通过一个包含所有者\
    \ ID 的长整型字段来实现的。`AllWebService` 实现从用户 ID 开始，通过向 `users-service` 微服务请求该信息来检查其在用户数据库中的存在性。如果找到该用户，则将该用户\
    \ ID 作为 `pets-service` 微服务的搜索条件。\n\n*   `@EntityScan`\n    配置了在扫描实体类时自动配置使用的基础包。这是一个\
    \ Spring Boot 注解，它在“幕后”配置了一个 `LocalContainerEntityManagerFactoryBean`，并将 `packagestoScan`\
    \ 属性设置为注解默认属性的值。\n\n*   用于构建应用程序的库的版本被外部化到 `gradle.properties`\n    文件中。这是 Gradle\
    \ 配置可以完成的另一种方式。\n\n*   Thymeleaf 被用于 Web 界面，因为它受 Eureka 支持，并且只需很少的配置即可使其工作。\n\n\
    在所有应用程序实例就绪后，你可以开始使用它们。尝试访问：\n\n*   `http://localhost:4000/pets/`：以 XML 格式显示所有宠物信息\n\
    \n*   `http://localhost:4000/pets/1122664455`：以 XML 格式显示 RFID=1122664455 的宠物信息\n\
    \n*   `http://localhost:4000/pets/owner/1`：以 XML 格式显示所有者 id=1 的所有宠物\n\n*   `http://localhost:4001/users/`：以\
    \ XML 格式显示所有用户信息\n"
