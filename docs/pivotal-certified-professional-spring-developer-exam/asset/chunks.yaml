    ## Spring Security


    Spring Security is yet another Spring Framework created to make a developer’s
    life easy and the work pleasant, since it is used to secure web applications.
    It is very easy to use and is highly customizable for providing access control
    over units of an application. For writing secure Spring web applications, this
    is the default tool developers go for, because configuration follows the same
    standard with all the Spring projects, and infrastructure beans are provided out
    of the box for multiple types of authentication, all of which is obviously compatible
    with other Spring projects. Spring Security provides a wide set of capabilities
    that can be grouped into four areas of interest: authentication, authorizing web
    requests, authorizing methods calls, and authorizing access to individual domain
    objects.


    In talking about securing an application, the following concepts are important:


    *   `Principal` is the term that signifies a user, device, or system that could
    perform an action within the application.

    *   `Credentials` are identification keys that a principal uses to confirm its
    identity.

    *   `Authentication` is the process of verifying the validity of the principal’s
    credentials.

    *   `Authorization` is the process of making a decision whether an authenticated
    user is allowed to perform a certain action within the application.

    *   `Secured item` is the term used to describe any resource that is being secured.


    There are many ways of authentication, and Spring Security supports all of them:
    Basic, Form, OAuth, X.509, Cookies, Single-Sign-On. When it comes to where and
    how those credentials are stored, Spring Security is quite versatile, since it
    supports everything: LDAP, RDBMS, properties file, custom DAOs; even beans are
    supported, and many others.[⁶](#A978-1-4842-0811-3_6_Chapter.html#Fn6)


    Authorization depends on authentication. A user has first to be authenticated
    in order for authorization to take place. The result of the authentication process
    is establishing whether the user has the right to access the application and what
    actions the user can perform based on roles. Most common user roles within an
    application are:


    *   ADMIN is a role used for full power. This kind of role is specific to users
    that have the right to access and manipulate all data, including that of other
    users.

    *   MEMBER is used for limited power. This kind of role is specific to users that
    can view data and manipulate only their own details.

    *   GUEST is used for restricted use of the application. This kind of role is
    used for users that can view only limited data.


    Spring Security is preferred for developing web applications because it is flexible
    and because of its portability. Spring Security does not need a special container
    to run in; it can be deployed simply as a secured archive (WAR or EAR) and also
    can run in standalone environments. A web application secured with Spring Security
    and archived as a WAR can be deployed on a JBoss or an Apache Tomcat application
    server, and as long as the underlying method of storing credentials is configured,
    the application will run exactly the same in any of those application servers.
    Spring Security is very flexible because configuration of authentication and authorization
    are fully decoupled. Thus, the storage system of credentials can change without
    any action being needed to adapt the authorization configuration. This makes applications
    very consistent, because after all, the scopes of authentication and authorization
    are different, so it is only logical for them to be covered by different detachable
    components.


    Spring Security is also quite extensible, since almost everything related to security
    can be extended and customized: how a principal is identified, where the credentials
    are stored, how authorization decisions are made, where security constraints are
    stored, etc.


    Security is a cross-cutting concern, so implementing authorization might lead
    to code cluttering and tangling. Spring Security is implemented using Spring AOP
    with separation of concerns in mind. Under the hood, Spring Security uses a few
    infrastructure beans to implement the two processes. In Figure [6-14](#A978-1-4842-0811-3_6_Chapter.html#Fig14),
    the process of authentication and authorization of a user is depicted in an abstract
    but accurate manner.


    ![A978-1-4842-0811-3_6_Fig14_HTML.jpg](A978-1-4842-0811-3_6_Fig14_HTML.jpg)


    Figure 6-14. Spring Security under the hood


    The flow depicted in the previous image can be explained as follows.


    1.  A user tries to access the application by making a request. The application
    requires the user to provide the credentials so it can be logged in.

    2.  The credentials are verified by the `Authenticaltion Manager` and the user
    is granted access to the application. The authorization rights for this user are
    loaded into the Spring Security context.

    3.  The user makes a resource request (view, edit, insert, or delete information)
    and the `Security Interceptor` intercepts the request before the user accesses
    a protected/secured resource.

    4.  The Security Interceptor extracts the user authorization data from the security
    context and…

    5.  …delegates the decision to the `Access Decision Manager`.

    6.  The Access Decision Manager polls a list of voters to return a decision regarding
    the rights of the authenticated user to system resources.

    7.  Access is granted or denied to the resource based on the user rights and the
    resource attributes.


    ## Spring Security Configuration


    To configure Spring security, the developer must take care of three things:


    *   declare the security filter for the application

    *   define the Spring Security context

    *   configure authentication and authorization


    ### XML Configuration


    To configure Spring Security, the `web.xml` must be modified to include the security
    filter and make the security context the root context of the application. The
    elements that need to be added/modified in the XML configuration of the web application
    are depicted in the following code snippet.


    ```

    contextConfigLocation

    /WEB-INF/spring/security-config.xml


    org.springframework.web.context.ContextLoaderListener


    springSecurityFilterChain

    org.springframework.web.filter.DelegatingFilterProxy


    springSecurityFilterChain

    /*


    ...


    pet-dispatcher

    org.springframework.web.servlet.DispatcherServlet


    contextConfigLocation

    /WEB-INF/spring/mvc-config.xml

    /WEB-INF/spring/app-config.xml

    ```'
