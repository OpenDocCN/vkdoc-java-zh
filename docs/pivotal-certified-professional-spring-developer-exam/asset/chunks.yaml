- fmt: '# Spring 配置与注解


    - `@Configuration`：包含 Bean 定义（使用`@Bean`注解的方法）的配置类。

    - 自动装配和初始化注解用于定义依赖注入的方式以及 Bean 的外观。例如：

    - `@Autowired`：该组核心注解；用于依赖项上，指示 Spring IoC 负责注入它们。可用于字段、构造方法和 Setter 方法。可与 Spring
    的`@Qualifier`一起使用，以指定要注入的 Bean 名称。

    - `@Inject`：与`javax.inject`包中的`@Autowired`等效的注解。可与`javax.inject`的`@Qualifier`一起使用，以指定要注入的
    Bean 名称。

    - `@Resource`：与`javax.annotation`包中的`@Autowired`等效的注解。提供`name`属性以指定要注入的 Bean 名称。

    - `@Required`：Spring 注解，将依赖项标记为必需，用于 Setter 方法。

    - `@Lazy`：依赖项将在首次使用时才被注入。

    - 仅出现在（且仅用于）使用`@Configuration`注解的类中的注解；它们定义配置资源、组件及其作用域。

    - 行为注解是定义 Bean 行为的注解。它们也可以被称为代理注解，因为它们涉及创建代理来拦截对使用它们配置的 Bean 的请求。


