    \    @Test\n    public void deleteUser() {\n    restTemplate.delete(GET_PUT_DEL_URL,\
    \  \"doctorwho\");\n    }\n    }\n    ```\n\n如果操作成功，删除响应的主体为空。测试删除是否成功的唯一方法是使用\
    \ URI 等于`http://localhost:8080/users/doctorwho`来请求该资源，并预期返回失败或带有 404（未找到）状态的响应，因为该资源已被删除。\n\
    \n可以通过声明一个模拟 REST 服务器并使用模拟依赖项，在不将 Spring RESTful 应用程序部署到服务器的情况下对其进行测试，从而隔离地测试\
    \ REST 请求。提供此功能的类是 Spring Test 库的一部分，名为`org.springframework.test.web.client.MockRestServiceServer`。一个`RestTemplate`将绑定到这个模拟服务器，所有请求都将发送到这里。由于不是真正的服务器，因此不需要请求的完整\
    \ URL，只需要控制器方法上定义的请求映射。在每个测试方法中，都会执行以下步骤：\n\n1.  模拟服务器首先定义它期望接收什么请求、接收多少次以及如何响应。\n\
