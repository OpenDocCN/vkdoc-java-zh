- fmt: '# Case 1: Only service classes are annotated with `@Transactional`


    In this case, the target object is the service bean, which contains a reference
    to the repository bean. When a service method is called, the following happens:


    1. The transactional proxy calls the transactional advisor to get a transaction.

    2. The transactional proxy forwards the initial call to the target service bean.

    3. The target service object calls the repository method and returns the result
    to the proxy.

    4. The proxy calls the transactional advisor to commit the transaction.

    5. The proxy returns the result to the caller.


    The Spring service class has a reference to a repository class, which means that
    at runtime, the service bean will be created by aggregating the two objects. Actually,
    when the Spring application context is created, this is what happens:


    1. A repository bean declaration is found in the configuration, so a repository
    bean is created.

    2. A service bean declaration is found in the configuration, so a service bean
    is created. The service bean depends on the previously created repository bean,
    so the dependency is provided using autowiring. So now the repository is a member
    of the service bean.

    3. Then the `InfrastructureAdvisorAutoProxyCreator` bean creates the proxy object
    that wraps around the service bean to provide transactional behavior. So the service
    bean becomes now a target object.


    So, to summarize: the service method calls the repository method, and this call
    is done internally by the target object. The full execution is atomic in the context
    of the transaction obtained by the proxy from the Spring transactional advisor.
    This is important, especially when a service method calls more than one repository
    method, because this approach ensures that all repository methods will be executed
    within the same transaction. This situation is depicted by the diagram in Figure
    [5-13](#A978-1-4842-0811-3_5_Chapter.html#Fig13).


    ![A978-1-4842-0811-3_5_Fig13_HTML.jpg](A978-1-4842-0811-3_5_Fig13_HTML.jpg)


    Figure 5-13. `@Transactional` annotated service class


    To get a look under the hood, you can execute the `UserServiceTest.testFindById()`
    method in debug mode, from project `6-ps-tx-solution` in Intellij IDEA and take
    a look at the `userService` bean. In the `Variables` console, you should see what
    is depicted in Figure [5-14](#A978-1-4842-0811-3_5_Chapter.html#Fig14).


    ![A978-1-4842-0811-3_5_Fig14_HTML.jpg](A978-1-4842-0811-3_5_Fig14_HTML.jpg)


    Figure 5-14. Intellij IDEA execution of test paused to analyze service transactional
    bean


    # Case 2: Service and repository classes are both annotated with `@Transactional`


    In this case, there are two transactional proxies involved, one for service and
    one for the repository bean. The service bean contains a reference to the repository
    proxy in this case. When a service method is called, the following happens:


    1. The transactional service proxy calls the transactional advisor to get a transaction.

    2. The transactional proxy forwards the initial call to the target service bean.

    3. The service bean calls the repository method.

    4. The transactional repository proxy calls the transactional advisor to get a
    transaction. The transaction returned depends on the propagation configuration
    of the `@Transactional` annotation declared on the repository class.

    5. The target repository object method is executed, and the result is returned
    to the transactional repository proxy.

    6. The transactional repository proxy calls the transactional advisor to commit
    the transaction.

    7. The transactional repository proxy returns the result to the caller, in this
    case the target service object.

    8. The target service object returns the result to the transactional service proxy.

    9. The transactional service proxy calls the transactional advisor to commit the
    transaction.

    10. The transactional service proxy returns the result to the caller.


    So, to summarize: the service target object calls the repository method on the
    repository proxy, which takes care of establishing a transactional context for
    the execution of the repository method. This situation is depicted by the diagram
    in Figure [5-15](#A978-1-4842-0811-3_5_Chapter.html#Fig15).


    ![A978-1-4842-0811-3_5_Fig15_HTML.jpg](A978-1-4842-0811-3_5_Fig15_HTML.jpg)


    Figure 5-15. `@Transactional` annotated service and repository class


    To get a look under the hood, first uncomment the `@Transactional` annotation
    from the class `JdbcTemplateUserRepo` and then execute the `UserServiceTest.testFindById()`
    method from project `6-ps-tx-solution` in debug mode in Intellij IDEA and take
    a look at the `userService` bean. In the `Variables` console you should see what
    is depicted in Figure [5-16](#A978-1-4842-0811-3_5_Chapter.html#Fig16).


    ![A978-1-4842-0811-3_5_Fig16_HTML.jpg](A978-1-4842-0811-3_5_Fig16_HTML.jpg)


    Figure 5-16. Intellij IDEA execution of test paused to analyze service and repository
    transactional bean


    So there you have it, the end of the debate. Use `@Transactional` in the service
    layer or the DAO/repository layer, but not both. The service layer is the usual
    choice, because service methods call multiple repository methods that need to
    be executed in the same transaction. The only reason to make your repositories
    transactional is if you do not need a service layer at all, which is usually the
    case for small educational applications.


    # Spring Programmatic Transaction Model


    With the transaction declarative model, there is the benefit of flexible configuration
    and clean code, but transaction management is left fully to the transaction management
    provider. The programmatic model, although a little more tedious to use, is practical
    when some control over transaction management is needed. To be able to have some
    control over what happens to the transactions, Spring provides the `TransactionTemplate`
    class. In the code snippet below, a programmatic transactional service is depicted
    that makes use of an instance of `TransactionTemplate` to manage transactions.


    ```java

    import org.springframework.transaction.PlatformTransactionManager;

    import org.springframework.transaction.TransactionStatus;

    import org.springframework.transaction.support.TransactionCallback;

    import org.springframework.transaction.support.TransactionTemplate;

    ...

    @Service("programaticUserService")

    public class ProgramaticUserService implements UserService {

    private UserRepo userRepo;

    private TransactionTemplate txTemplate;

    @Autowired

    public ProgramaticUserService(UserRepo userRepo,

    PlatformTransactionManager txManager) {

    this.userRepo = userRepo;

    this.txTemplate = new TransactionTemplate(txManager);

    }

    @Override

    public int updatePassword(Long userId, String newPass)

    throws MailSendingException {

    return txTemplate.execute(new TransactionCallback() {

    @Override

    public Integer doInTransaction(TransactionStatus status) {

    try {

    User user = userRepo.findById(userId);

    String email = user.getEmail();

    sendEmail(email);

    return userRepo.updatePassword(userId, newPass);

    } catch (MailSendingException e) {

    status.setRollbackOnly();

    }

    return 0;

    }

    });

    }

    private void sendEmail(String email) throws MailSendingException {

    ... //not relevant for this section

    }

    }

    ```


    The `status.setRollbackOnly()` method is called to instruct the transaction manager
    that the only possible outcome of the transaction may be a rollback, and not the
    throwing of an exception, which would in turn trigger a rollback.


    # Distributed Transactions


    A distributed transaction is a transaction that involves two or more transactional
    resources. The most obvious example here is an application that involves JMS and
    JDBC. Conceptually, what happens when a distributed transaction involving JMS
    and JDBC resources is executed is depicted in Figure [5-17](#A978-1-4842-0811-3_5_Chapter.html#Fig17).


    ![A978-1-4842-0811-3_5_Fig17_HTML.jpg](A978-1-4842-0811-3_5_Fig17_HTML.jpg)


    Figure 5-17.'
