  raw: 'Bean aliasing can be used to override already configured beans, thus providing
    a way to substitute them with a different bean definition. This is useful in testing,
    and the configuration is not decoupled enough, and it comes from an external source
    that cannot be modified. Using aliasing, real beans can be replaced with test
    beans with known behavior, making it possible to test a specific module in isolation.
    But more about testing can be read in Chapter [3](#A978-1-4842-0811-3_3_Chapter.html)
    . Testing Spring Applications.


    All these examples can be found in `02-ps-container-01-practice`. The configuration
    file path is `/02-ps-container-01-practice/src/main/resources/spring/others/sample-config-03.xml,`
    and the test class to run is `02-ps-container-01-practice/src/test/java/com/ps/beans/others/BeanNamingTest.java`.
    You are invited to add your own bean names and your own tests.


    !


    The conclusions of this section are really important, so you might consider putting
    a bookmark right here, or make a note somewhere.


    *   If the bean has only the `name` attribute defined, then its value becomes
    the bean name used to uniquely identify this bean in the context.

    *   If the bean has `id` and `name` attributes defined, the `name` value is used
    as an alias, and the `id` value becomes the bean name used to uniquely identify
    this bean in the context.

    *   The `id` and `name` attribute values have the same type, but if the `id` value
    contains separator characters: comma (`,`), semicolon (`;`), or white space, they
    are not treated as such.

    *   If the bean has only the `name` attribute defined and the value contains multiple
    names, then the first value becomes the bean name used to uniquely identify this
    bean in the context; the others become aliases.


    ### Application Context and Bean Lifecycle


    Before explaining how everything presented so far can be done using Java Configurations
    and annotations, the application context and bean lifecycle must be covered, because
    some of the details are intertwined, so it is better to have an overall idea about
    this before going more deeply into this subject.


    A Spring application has a lifecycle composed of three phases:


    1.  Initialization: In this phase, bean definitions are read, beans are created,
    dependencies are injected, and resources are allocated, also known as the bootstrap
    phase. After this phase is complete, the application can be used.  

    2.  Use: In this phase, the application is up and running. It is used by clients,
    and beans are retrieved and used to provide responses for their requests. This
    is the main phase of the lifecycle and covers 99% of it.  

    3.  Destruction: The context is being shut down, resources are released, and beans
    are handed over to the garbage collector.


    These three phases are common to every type of application, whether it is a JUnit
    System test, a Spring or JEE web, or enterprise application. Look at the following
    code snippet (the sources can be found in the `/02-ps-container-02-solution` project);
    it was modified in order to make obvious where each phase ends.


    ```

    import org.springframework.context.ConfigurableApplicationContext;

    public class ApplicationContextTest {

    private Logger logger = LoggerFactory.getLogger(ApplicationContextTest.class);

    @Test

    public void testDataSource1() {

    ConfigurableApplicationContext ctx =

    new ClassPathXmlApplicationContext("classpath:spring/test-db01-config.xml");

    logger.info(" >> init done.");

    DataSource dataSource1 = ctx.getBean("dataSource1", DataSource.class);

    assertNotNull(dataSource1);

    logger.info(" >> usage done.");

    ctx.close();

    }


    ```


    The initialization phase of a Spring application ends when the application context
    initialization process ends. If the logger for the Spring framework is set to
    debug, before the `init done` message is printed, a lot of log entries show what
    the Spring container is doing. A simplified sample is depicted below:


    ```

    DEBUG o.s.c.e.StandardEnvironment - Initialized StandardEnvironment

    with PropertySources [systemProperties,systemEnvironment]

    INFO o.s.c.s.ClassPathXmlApplicationContext - Refreshing

    > o.s.context.support. ClassPathXmlApplicationContext@335eadca:

    startup date; root of context hierarchy

    ...

    INFO o.s.b.f.x.XmlBeanDefinitionReader -

    > Loading XML bean definitions from class path resource

    [spring/test-db01-config.xml]

    ...

    DEBUG o.s.b.f.x.BeanDefinitionParserDelegate - Neither XML ’id’ nor ’name’ specified
    -

    using generated bean name

    > [org.springframework.beans.factory.config.PropertyPlaceholderConfigurer#0]

    DEBUG o.s.b.f.x.XmlBeanDefinitionReader - Loaded 2 bean definitions from location

    pattern [classpath:spring/test-db01-config.xml]

    ...

    INFO o.s.b.f.c.PropertyPlaceholderConfigurer -

    Loading properties file from class path resource [db/datasource.properties]

    DEBUG o.s.b.f.s.DefaultListableBeanFactory - Pre-instantiating singletons in

    o.s.beans.factory.support.DefaultListableBeanFactory@6591f517:

    defining beans [o.s.b.f.config.PropertyPlaceholderConfigurer#0,dataSource1];

    root of factory hierarchy

    ...

    > DEBUG o.s.b.f.s.DefaultListableBeanFactory -

    Creating instance of bean ’dataSource1’

    DEBUG o.s.b.f.s.DefaultListableBeanFactory - Eagerly caching bean ’dataSource1’

    to allow for resolving

    potential circular references

    DEBUG o.s.b.f.s.DefaultListableBeanFactory - Finished creating instance

    of bean ’dataSource1’

    INFO c.p.ApplicationContextTest - >> init done.

    > DEBUG o.s.b.f.s.DefaultListableBeanFactory - Returning cached instance

    of singleton bean ’dataSource1’

    INFO c.p.ApplicationContextTest - >> usage done.

    INFO c.p.ApplicationContextTest - >> bye bye.

    INFO o.s.c.s.ClassPathXmlApplicationContext -

    > Closing o.s.context.support.ClassPathXmlApplicationContext

    @335eadca: startup date [Sun Mar 27 21:18:39 EEST 2016]; root of context hierarchy

    DEBUG o.s.b.f.s.DefaultListableBeanFactory - Returning cached instance

    of singleton bean ’lifecycleProcessor’

    DEBUG o.s.b.f.s.DefaultListableBeanFactory -

    >Destroying singletons in o.s.beans.factory.support.DefaultListableBeanFactory

    @6591f517: defining beans

    [o.s.beans.factory.config.PropertyPlaceholderConfigurer#0,dataSource1];

    root of factory hierarchy...

    ```


    Although the log is incomplete, all the important details were underlined, and
    by following them we can notice some of the following steps. To make it easier,
    the corresponding steps were marked in the log with the corresponding step number.


    1.  The application context is initialized.  

    2.  The bean definitions are loaded (from the `spring/test-db01-config.xml` in
    this case).  

    3.  The bean definitions are processed (in our case a bean of type `PropertyPlaceholderConfigurer`
    is created and used to read the properties from `datasource.properties`, which
    are then added to the `dataSource` bean definition).  

    4.  Beans are instantiated.  

    5.  Dependencies are injected (not visible from the log, since the `dataSource`
    bean does not require any dependencies).  

    6.  Beans are processed (also not visible from the log, since the `dataSource`
    does not have any processing defined).  

    7.  Beans are used.  

    8.  The context starts the destruction process.  

    9.  Beans are destroyed.


    Figure [2-16](#A978-1-4842-0811-3_2_Chapter.html#Fig16) depicts the whole application
    context lifecycle and the bean lifecycle.


    ![A978-1-4842-0811-3_2_Fig16_HTML.jpg](A978-1-4842-0811-3_2_Fig16_HTML.jpg)


    Figure 2-16.


