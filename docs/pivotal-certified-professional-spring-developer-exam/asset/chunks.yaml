- fmt: '如果要将 CGLIB 库添加到应用程序类路径中，必须通过修改启用切面的注解为`@EnableAspectJAutoProxy(proxyTargetClass
    = true)`来告知 Spring 我们需要基于子类的代理。当目标类未实现任何接口时，此方法适用，因此 Spring 会动态创建一个新类，该类是目标类的子类。CGLIB
    适用于此，因为它是一个字节码生成库。使用 CGLIB 生成的代理称为基于子类的代理，其优点之一是它们可以有选择地重写方法。它们使用专门的拦截器来调用方法，这实际上可以提高性能。


    在图 [4-7](#A978-1-4842-0811-3_4_Chapter.html#Fig7) 中，你可以看到当使用 CGLIB 创建代理时，`userRepo`
    Bean 的结构。


    ![A978-1-4842-0811-3_4_Fig7_HTML.jpg](A978-1-4842-0811-3_4_Fig7_HTML.jpg)


    图 4-7. 在 IntelliJ IDEA 调试器视图中，使用 CGLIB 创建代理时注入的 Bean `userRepo` 结构


    因此，基本上，要在 Spring 应用程序中使用切面，你需要以下内容：


    *   将 `spring-aop` 作为依赖项

    *   声明一个 `@Aspect` 类，并将其也声明为一个 Bean（使用 `@Component` 或 `@Bean` 或 XML 典型的 Bean 声明元素）

    *   声明一个使用典型通知注解（`@Before`、`@After` 等）注解的通知方法，并将其与切入点表达式关联

    *   通过使用 `@EnableAspectJAutoProxy` 注解配置类来启用切面支持

    *   （可选）将 CGLIB 添加为依赖项，并通过使用 `@EnableAspectJAutoProxy(proxyTargetClass = true)`
    注解配置类来启用使用子类代理的切面支持


    ### 使用 XML 配置切面支持


    尽管自 Spring 3.1 以来，切面支持配置一直基于注解，但在该版本之前，配置是使用 XML 完成的。由于你作为开发者的经验，你最终可能会在使用了 Spring
    < 3.1 的项目上工作，我们认为介绍如何配置切面支持是很有用的。


    显然，有一个对应的命名空间，它提供了与 `@EnableAspectJAutoProxy` 等效的元素定义。特定的元素是 `<aop:aspectj-autoproxy../>`，它为应用程序中定义的每个切面包含一个子元素
    `<aop:include ../>`。


    如果你想完全避免使用注解配置切面，原因是你使用的 Java 版本 < 5 且不支持注解，那么还有一个 `<aop:config />` 元素，可用于将 Bean
    的方法声明为通知并关联切入点。


    要配置使用基于子类的代理，`<aop:aspectj-autoproxy../>` 必须将其 `proxy-target-class` 属性设置为 `true`。


    ### 定义切入点


    在快速入门部分，我们介绍了前置通知及其关联的切入点表达式，该表达式提供了识别在何处应用通知的方法。切入点表达式如下所示：


    ```

    execution(public * com.ps.repos.*.JdbcTemplateUserRepo+.findById(..))

    ```


    切入点表达式遵循的模板可以定义如下：


    ```

    execution( [Modifiers] [ReturnType] [FullClassName].[MethodName]

    ([Arguments]) throws [ExceptionType])

    ```


    该表达式可以包含通配符，如 `+` 和 `*`，并且可以由多个通过布尔运算符（如 `&&`、`||` 等）连接的表达式组成。`*` 通配符替换任意字符组；`+`
    通配符用于指定要通知的方法也可以在由 `[FullClassName]` 条件标识的子类中找到。


    还有一系列指示符可用于定义切入点的范围；例如，`within(...)` 指示符可用于将切入点限制在某个包内：


    ```

    public * com.ps.repos.*.JdbcTemplateUserRepo+.findById(..)) && +underlinewithin(com.ps.*)

    ```


    此外，切入点表达式可以仅识别在具有特定注解的类中定义的方法：


    ```

    execution(@org.springframework.transaction.annotation.Transactional

    public * com.ps.repos.*.*Repo+.findById(..)))

    ```


    切入点表达式甚至可以识别返回具有特定注解的值的方法：


    ```

    execution(public (@org.springframework.stereotype.Service *) *(..))

    ```


    通过使用 `@annotation()` 指示符，可以仅考虑那些使用特定注解进行注解的方法：


    ```

    execution(public (public * com.ps.service.*.*Service+.*(..)

    && @annotation(org.springframework.security.access.annotation.Secured))

    ```


    这在涉及安全性时非常有用，因为 `@annotation` 可以绑定到一个方法参数，以便注解对象在通知主体中可用。


    ```

    @Around("execution(* *(..)) && @annotation(securedObj)")

    public void calculateExecutionTime(ProceedingJoinPoint pjp,

    Secured securedObj) throws Throwable {

    // 使用 securedObj.allowedRoles() 进行额外的安全检查

    ...

    }

    ```


    观察：


    *   `[ReturnType]` 是必需的。如果返回类型不是筛选条件，只需使用 `*`。如果缺少它，应用程序将在启动时崩溃，抛出 `java.lang.IllegalArgumentException`，并附带一条消息说明切入点格式不正确。

    *   `[Modifiers]` 不是必需的，如果未指定，默认为 `public`。

    *   `[MethodName]` 不是必需的，这意味着启动时不会抛出异常。但如果不指定，则无法识别执行通知的连接点。可以肯定地说，如果你想定义一个技术上可用的切入点表达式，你需要指定它。

    *   `[Arguments]` 是必需的。如果缺少它，应用程序将在启动时崩溃，抛出 `java.lang.IllegalArgumentException`，并附带一条消息说明切入点格式不正确。如果参数不是筛选条件，只需使用
    `(..)`，它将匹配具有 0 个或多个参数的方法。如果你希望匹配没有参数的方法，请使用 `()`。如果你希望匹配具有单个参数的方法，请使用 `(*)`。


    当确定要通知的方法的条件变得复杂时，使用切入点表达式可能会变得繁琐。但是，通过将表达式分解为多个子表达式，这些子表达式可以组合并在其他组合表达式中重用，可以使声明切入点变得愉快。Spring
    还提供了将表达式外部化到专用类中的可能性——是的，甚至切入点声明也可以解耦。在以下代码片段中，我们将解释如何做到这一点。


    让我们声明一个可用于管理 `User` 实例的服务类。该服务类将使用 `userRepo` 与数据库交互。


    ```

    ...

    @Service

    public class UserServiceImpl implements UserService {

    private UserRepo userRepo;

    @Autowired

    public void setUserRepo(UserRepo userRepo) {

    this.userRepo = userRepo;

    }

    @Override

    public Set findAll() {

    return userRepo.findAll();

    }

    @Override

    public void updateUsername(Long id, String username) {

    userRepo.updateUsername(id, username);

    }

    @Override

    public void updatePassword(Long id, String password) {

    userRepo.updatePassword(id, password);

    }

    @Override

    public User findById(Long id) {

    return userRepo.findById(id);

    }

    }

    ```


    我们想编写一个切面，每当从管理 `User` 实例的仓库或服务类中调用 `update*` 方法时，该切面都会写入一条消息。因此，切入点必须查找名称以 `update`
    开头、具有参数且位于任何实现 `UserRepo` 或 `UserService` 的类中的方法。


    编写切入点表达式的方法有很多种，本节将介绍其中几种。切面类和通知如下所示：'
  raw: "If the CGLIB library is to be added to the application classpath, Spring\n\
    must be told that we want subclass-based proxies by modifying the aspect\nenabling\
    \ annotation to `@EnableAspectJAutoProxy(proxyTargetClass = true)`. This approach\
    \ is suitable when the target class does not\nimplement any interface, so Spring\
    \ will create a new class on the fly\nthat is a subclass of the target class.\
    \ CGLIB is suitable for that\nbecause it is a bytecode generation library. The\
    \ proxies generated with\nCGLIB are called subclass-based, and one of their advantages\
    \ is that\nthey can override methods optionally. They use specialized interceptors\n\
    to call methods, and this can actually improve performance.\n\nIn Figure [4-7](#A978-1-4842-0811-3_4_Chapter.html#Fig7)\
    \ you can\nsee the structure of the `userRepo` bean when\n`CGLIB` is used\nto\
    \ created proxies.\n\n![A978-1-4842-0811-3_4_Fig7_HTML.jpg](A978-1-4842-0811-3_4_Fig7_HTML.jpg)\n\
    \nFigure 4-7.\n\nInjected bean userRepo structure when proxies are created using\
    \ CGLIB in\nthe Intellij IDEA Debugger view\n\nSo basically, in order to use aspects\
    \ in a Spring application you need\nthe following:\n\n*   spring-aop as a dependency\n\
    \n*   declare an `@Aspect` class and\n    declare it as a bean as well (using\
    \ `@Component` or `@Bean` or XML typical\n    bean declaration element)\n\n* \
    \  declare an advice method annotated with a typical advice annotation\n    (`@Before`,\
    \ `@After`, etc.) and\n    associate it to a pointcut expression\n\n*   enable\
    \ aspects support by annotating a configuration class with `@EnableAspectJAutoProxy`\n\
    \n*   (optional) add CGLIB as a dependency and enable aspects support using\n\
    \    subclassed proxies by annotating a configuration class with `@EnableAspectJAutoProxy(proxyTargetClass\
    \ = true)`\n\nAspect Support Configuration using XML\n\nAlthough aspect support\
    \ configuration has been based on annotations\nsince Spring 3.1, before that version,\
    \ the configuration was done using\nXML. Since your experience as a developer\
    \ you might end up working on\nprojects using Spring < 3.1, we find it useful\
    \ to cover how to\nconfigure aspect support using XML.\n\nObviously, there’s a\
    \ namespace for that, which provides an element\ndefinition equivalent to `@EnableAspectJAutoProxy`.\n\
    The specific element is `<aop:aspectj-autoproxy../>`,\nwhich has a child element\
    \ `<aop:include ../>` for each aspect defined in the application.\n\nIf you want\
    \ to avoid configuring aspects using annotations altogether,\nthe reason for that\
    \ being that you are using a Java version < 5 and\nannotations are not supported,\
    \ there is also an `<aop:config />`\nelement that can be used to declare methods\
    \ of a bean as advice and\nassociate pointcuts.\n\nTo configure the use of subclass-based\
    \ proxies, the `<aop:aspectj-autoproxy../>`\nmust have the `proxy-target-class`\n\
    attribute set to `true`.\n\nDefining Pointcuts\n\nIn the Quick Start section,\
    \ the before advice was covered and the\npointcut expression associated with it,\
    \ which provided means to identify\nwhere to apply the advice. The pointcut expression\
    \ looked like the\nfollowing snippet:\n\n```\nexecution(public * com.ps.repos.*.JdbcTemplateUserRepo+.findById(..))\n\
    ```\n\nThe template that a pointcut expression follows can be defined as\nfollows:\n\
    \n```\nexecution( [Modifiers] [ReturnType] [FullClassName].[MethodName]\n([Arguments])\
    \ throws [ExceptionType])\n```\n\nThe expression can contain wildcards like `+`\
    \ and `*` and can be made of\nmultiple expressions concatenated by boolean operators\
    \ such as `&&`, `||`, etc. The `*` wildcard replaces\nany group of characters;\
    \ the `+` wildcard is used to\nspecify that the method to advise can also be found\
    \ in subclasses\nidentified by `[FullClassName]`\ncriteria.\n\nThere is also a\
    \ list of designators that can be used to define the reach\nof the pointcut; for\
    \ example, the `within(...)`\ndesignator can be used to limit the pointcut to\
    \ a package\n\n```\npublic * com.ps.repos.*.JdbcTemplateUserRepo+.findById(..))\
    \ && +underlinewithin(com.ps.*)\n```\n\nAlso, a pointcut expression can identify\
    \ only methods defined in a class\nannotated with a specific annotation:\n\n```\n\
    execution(@org.springframework.transaction.annotation.Transactional\npublic *\
    \ com.ps.repos.*.*Repo+.findById(..)))\n```\n\nA pointcut expression can even\
    \ identify methods that return values with\na specific annotation:\n\n```\nexecution(public\
    \ (@org.springframework.stereotype.Service *) *(..))\n```\n\nAnd by using the\
    \ `@annotation()`\ndesignator, only methods annotated with a specific annotation\
    \ can be\ntaken into consideration:\n\n```\nexecution(public (public * com.ps.service.*.*Service+.*(..)\n\
    && @annotation(org.springframework.security.access.annotation.Secured))\n```\n\
    \nThis is useful when security is involved, because the `@annotation` can be\n\
    bound to a method parameter so that the annotation object is available\nin the\
    \ advice body.\n\n```\n@Around(\"execution(* *(..)) && @annotation(securedObj)\"\
    )\npublic void calculateExecutionTime(ProceedingJoinPoint pjp,\nSecured securedObj)\
    \ throws Throwable {\n// extra security checks using securedObj.allowedRoles()\n\
    ...\n}\n```\n\n!\n\nObservations:\n\n*   The `[ReturnType]` is\n    mandatory.\
    \ If the return type is not a criterion, just use *. If it is\n    missing the\
    \ application crashes at boot time, throwing a `java.lang.IllegalArgumentException`\n\
    \    with a message explaining that the pointcut is not well-formed.\n\n*   The\
    \ `[Modifers]`\n    is not mandatory and if not specified defaults to `public`.\n\
    \n*   The `[MethodName]` is not\n    mandatory, meaning no exception will be thrown\
    \ at boot time. But if\n    unspecified, the join point where to execute the advice\
    \ won’t be\n    identified. It’s safe to say that if you want to define a technically\n\
    \    useful pointcut expression, you need to specify it.\n\n*   The `[Arguments]`\n\
    \    is mandatory. If it is missing the application crashes at boot time,\n  \
    \  throwing a `java.lang.IllegalArgumentException`\n    with a message explaining\
    \ that the pointcut is not well formed. If the\n    arguments are not a criterion\
    \ just use `(..)`, which will\n    match a method with 0 or many arguments. If\
    \ you want the match to be\n    done on a method with no arguments, use `()`.\
    \ If you want the\n    match to be done on a method with a single argument, use\
    \ `(*)`.\n\nUsing pointcut expressions can become tedious when the criterion for\n\
    determining the method to be advised is complicated. But declaring\npointcuts\
    \ can be made pleasant by breaking down the expressions into\nseveral subexpressions\
    \ that can be combined and reused in other composed\nexpressions. Spring also\
    \ offers the possibility to externalize\nexpressions in dedicated classes—yes,\
    \ even pointcuts declarations can be\ndecoupled. In the following code snippets\
    \ we’ll explain how this can be\ndone.\n\nLet’s declare a service class that can\
    \ be used to manage `User` instances. This\nservice class will use the `userRepo`\
    \ to interact\nwith the database.\n\n```\n...\n@Service\npublic class UserServiceImpl\
    \ implements UserService {\nprivate UserRepo userRepo;\n@Autowired\npublic void\
    \ setUserRepo(UserRepo userRepo) {\nthis.userRepo = userRepo;\n}\n@Override\n\
    public Set findAll() {\nreturn userRepo.findAll();\n}\n@Override\npublic void\
    \ updateUsername(Long id, String username) {\nuserRepo.updateUsername(id, username);\n\
    }\n@Override\npublic void updatePassword(Long id, String password) {\nuserRepo.updatePassword(id,\
    \ password);\n}\n@Override\npublic User findById(Long id) {\nreturn userRepo.findById(id);\n\
    }\n}\n```\n\nWe want to write an aspect that will write a message every time an\
    \ `update*` method is\ncalled only from a repository or a service class managing\
    \ `User` instances. So\nthe pointcut has to look for a method whose name begins\
    \ with `update` that has\narguments and is found in any of the classes implementing\
    \ `UserRepo` or `UserService`.\n\nThere are many ways the pointcut expression\
    \ can be written, and in this\nsection a few of them will be presented. The aspect\
    \ class and advice\nlook like this:"
