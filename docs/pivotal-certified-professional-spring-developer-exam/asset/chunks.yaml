    To all passionate Java developers, never stop learning and never stop improving
    your skills. To all my friends for supporting me to make this book happen; you
    have no idea how dear you are to me.


    ## Introduction


    More than four years have passed since I wrote my first Spring project, and since
    then, the Spring Framework has turned into a full-blown technology that provides
    everything needed to build complex and reliable Java Enterprise Applications.


    Four major versions of Spring have been released so far, and the fifth is right
    around the corner. And except for the official study guide required for passing
    the certification exam, before the conception of this book there was no additional
    resource like this.


    This study guide provides a complete overview of all the technologies involved
    in creating a Spring core application from scratch. It guides you step by step
    into the Spring world, covering Spring 3 and Spring 4. More advanced topics such
    as RMI and JMS have been covered as well, because there are still companies that
    prefer to use them. and developers might encounter them while in the field.


    There is a multimodule project associated with this book named Pet Sitter, covering
    every example presented in the book. As the book was written, new versions of
    Spring were released, a new version of Intellij IDEA was released, and new versions
    of Gradle were released as well. I upgraded to the new versions in order to provide
    the most recent information and keep this book synchronized with the official
    documentation. A group of reviewers has gone over the book, but if you notice
    any inconsistencies, please send an email to `editorial@apress.com`, and a correction
    will be made.


    The example source code for this book can be found on GitHub via the Download
    Source Code button on the book’s product page, located at [`www.apress.com/9781484208120`](http://www.apress.com/9781484208120).
    It will be maintained, synchronized with new versions of the technologies, and
    enriched based on the recommendations of the developers using it to learn Spring.


    The code for the Pet Sitter project will likewise be made available on a public
    GitHub repository.


    An appendix with answers to the questions at the end of every chapter and additional
    details related to development tools that can be used to develop and run the code
    samples of the book will also be available as part of the source code package
    hosted at Github. A sample practice exam will also be published on the Pet Sitter
    repository.


    I truly hope you will enjoy using this book to learn Spring as much as I enjoyed
    writing it.


    Any source code or other supplementary material referenced by the author in this
    book is available to readers via the book’s product page, located at [`www.apress.com/9781484208120`](http://www.apress.com/9781484208120).
    For more detailed information, please visit [`http://www.apress.com/source-code`](http://www.apress.com/source-code).


    ## Acknowledgments


    Creating this guide involved a lot of teamwork. It is the second time I’ve written
    a technical book, and I wouldn’t have made it without all the help and advice
    I received from Mark Powers and Manuel Jordan. Mark has been very supportive,
    sharing with me his experience in book writing and encouraging me when I was ready
    to give up because I thought my work was not good enough. He was also very understanding
    and forgiving when deadlines were missed because of writer’s block or personal
    problems.


    Manuel has been a great collaborator; I loved our exchanges of technical ideas,
    for which I am very thankful, because working with them has helped me grow professionally.
    Many thanks to the team that helped turn my technical verbiage into human-readable
    literature.


    Most of all, I want to thank Steve Anglin for trusting me to get this book done.


    Apress has published many of the books I have read and used to improve myself
    professionally during my studies and beyond. It is a great honor for me to write
    a book and publish it with Apress, and it gives me enormous satisfaction to be
    able to contribute to the education of the next generation of developers.'
