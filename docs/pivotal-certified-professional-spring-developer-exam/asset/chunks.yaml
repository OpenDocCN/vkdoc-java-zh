- fmt: '# Microservices with Spring


    Microservices introduce additional complexity and the necessity of careful handling
    of requests between modules.


    Handling multiple databases and transactions can be painful.


    Testing microservices can be cumbersome, since each dependency of a microservice
    must be confirmed valid before the service can be actually tested.


    Deployment becomes complex as well, requiring coordination among modules.


    The conclusion so far is that the new-age titan applications that need to support
    multiple clients and platforms are very good candidates for microservices. Microservices
    help break up monolithic applications into individual units of deployment, which
    are able to evolve their own scaling requirements irrespective of the other subsystems.
    Let’s see whether Spring can make development of microservices-based applications
    as practical as it has made monolithic applications development.


    ## Microservices with Spring


    Microservices architectural idea is similar to how beans are managed by the Spring
    container and how they communicate in a Spring application context. Imagine it
    like this: if a Spring Application Context is a forest, than each bean is a tree.
    Microservices are the full-blown ecosystem. This example was given to you because
    programming is nothing other than modeling the real world using software components,
    and it might make the idea of microservices more approachable. The demo application
    built throughout this book is basically a site where people register themselves
    and their pets so they can provide pet-sitting services. If it were built with
    microservices, separate microservices would have to be developed for user, pet,
    request, reply, and reviews management. This also means that a few moving components
    would be needed to set up such a system, because communication between microservices
    must be covered too. Figure [8-1](#A978-1-4842-0811-3_8_Chapter.html#Fig1) depicts
    the classic monolith architecture and the microservices architecture side by side.


    ![A978-1-4842-0811-3_8_Fig1_HTML.jpg](A978-1-4842-0811-3_8_Fig1_HTML.jpg)


    **Figure 8-1.** Monolith and Microservices architecture


    The figure is quite generic, and it might lead to the idea that each microservice
    has its own database, which is correct, but there is not actually a need to provision
    a database server for each service. The database used in development can be relational
    (SQL Based) or nonrelational (NoSQL). If a relational database is used, there
    are three options of database implementation strategies:


    - **private-tables-per-service**: each service owns a set of tables that must
    be accessed only by that service

    - **schema-per-service**: each service has a database schema that is private to
    that service

    - **database-server-per-service**: each service has its own database server


    The chosen microservice database strategy implementation influences the type of
    database that is most suitable for the application. Private-tables-per-service
    and schema-per-service have the lowest overhead. Using a schema per service is
    appealing, since it makes ownership clearer. Also, if there is one database server
    that is shared among microservices, a relational database is suitable, since all
    the data is in one place and has been organized properly by following normalization
    standards. Having a different database for each service might make sharing data
    among services difficult and introduce data redundancy. NoSQL databases are more
    suitable for this type of implementation, since they are better at handling redundant
    data. Also, keep in mind that a downside of not sharing databases is that maintaining
    data consistency and implementing queries is more challenging.


    Spring is the best framework for developing advanced applications such as those
    based on the microservices architecture, because of the following characteristics:


    - dependency injection and integration

    - super-practical configuration and service creation

    - straightforward service discovery registry


    To develop a microservices application with Spring components, good knowledge
    of the following Spring technologies is needed:


    - a service registration and discovery technology like Netflix’s OSS Eureka

    - Spring Cloud projects like Eureka or Consul

    - REST concepts


    Spring Boot makes it easy to create standalone, production-grade Spring-based
    applications that you can “just run.” This has been already covered in the book,
    in Chapter [6](#A978-1-4842-0811-3_6_Chapter.html), and it is the only way to
    develop Spring microservices applications, since Spring Boot is designed for developer-heightened
    productivity by making common concepts, such as RESTful HTTP and embedded web
    application runtimes, easy to wire up and use. It is flexible, allowing the developer
    to select only the modules they want to use, removing overwhelming or bulky configurations
    and runtime dependencies.


    Spring Cloud is a big umbrella project that provides development tools designed
    to ease the development of distributed applications. It contains components designed
    to be used to build common patterns in distributed systems:


    - configuration management (Spring Cloud Config provides centralized external
    configuration backed by a Git repository)

    - service discovery (Eureka is an AWS Service registry for resilient midtier load
    balancing and failover and is supported by Spring Cloud)

    - circuit breakers (Spring Cloud supports Netflix’s Hystrix, which is a library
    that provides components that stop calling services when a response is not received
    by a predefined threshold)

    - intelligent routing (Zuul, used to forward and distribute calls to services)

    - micro-proxy (client-side proxies to midtier services)

    - control bus (a messaging system can be used for monitoring and managing the
    components within the framework, as is used for “application-level” messaging)

    - one-time tokens (used for data access only once with Spring Vault)

    - global locks (used to coordinate, prioritize, or restrict access to resources)

    - leadership election (the process of designating a single process as the organizer
    of some task distributed among several nodes)

    - distributed sessions (sessions distributed across multiple servlet servers)

    - cluster state (cluster state request is routed to the master node, to ensure
    that the latest cluster state is returned)

    - client-side load balancing


    In case you are interested in building microservices applications with Spring
    Cloud, the documentation provided by the Spring team is available here: [`http://projects.spring.io/spring-cloud/spring-cloud.html`](http://projects.spring.io/spring-cloud/spring-cloud.html).
    It covers every topic in the previous list and more.


    Coordinating distributed systems is not easy and can lead to boilerplate code.
    Spring Cloud just makes it easier for developers to write this type of management
    code, and the result works in any distributed environment including a development
    station, data centers, and managed platforms such as Cloud Foundry. Spring Cloud
    builds on Spring Boot, and it comes with the typical Spring Boot advantages: out-of-the-box
    preconfigured infrastructure beans, which can be further configured or extended
    to create a custom solution. It follows the same Spring declarative approach,
    relying on annotations and property files.


    Spring Cloud Netflix provides integration with Netflix OSS (Open Source Software).
    The official GitHub page `https://netflix.github.io/` is basically a collection
    of open-source libraries that their developers wrote to solve some distributed-systems
    problems at scale. Written in Java, it is now among the most frequently used software
    solutions for writing microservices applications in Java.


    ## Registration and Discovery Server'
