  trans: '

    ## Spring 配置


    构成 Spring 应用程序的 Bean 定义可以通过 XML 文件、注解、基于 Java 的配置注解，或以上所有方式的组合来提供。XML 是 Spring
    最初用于存储 Bean 定义的方法，这可能是因为在 Spring 诞生时注解尚未被发明。Spring 2.5 引入了一种基于注解的配置形式，当时引入了诸如
    `@Component`、`@Service`、`@Repository` 等注解（也称为构造型注解）来定义常见的业务 Bean。然而，如今为 Spring
    应用程序提供配置最常见的方式是基于 Java 的配置，从 Spring 3.0 开始，它引入了 `@Configuration`、`@Bean` 等用于基础设施
    Bean 的注解。构造型注解和 Java 配置注解相辅相成，为定义 Spring 应用程序的配置提供了一种实用的、非 XML 的方式。由于遗留代码和支持多样性的原因，XML
    配置仍然被支持。事实上，有些程序员仍然倾向于将所有配置与代码完全解耦，并且不允许为了配置而编写额外的代码，而基于 Java 的配置和/或注解则不完全允许这样做。


    在本节中，将涵盖配置和依赖注入类型的所有方面，所以请给自己准备一大杯咖啡（或茶），然后开始阅读。


    ### 通过 XML 提供配置


    为了给 Spring 应用程序提供一个 XML 配置，该配置将定义一个或多个 Bean 定义，文件必须使用特定的命名空间并遵守它们所定义的结构。一个 Bean
    定义指定了 Bean 的 id、名称、别名、类型、用于初始化的参数、依赖关系以及许多其他项目。主要的命名空间是 `beans` 命名空间，它规定了 Bean
    定义应该是什么样子。该命名空间有一个匹配的 XSD，需要将其添加到 `<beans/>` 元素中，以便配置文件可以根据其定义的规则进行验证。一个 Spring
    XML 配置文件必须至少定义这个命名空间。下面的代码片段展示了标准的基于 XML 的配置元数据：


    !


    在上面的代码示例中，Spring 版本没有在模式位置声明中使用。如果使用，模式位置元素将如下所示：


    ```

    ...

    xsi:schemaLocation="http://www.springframework.org/schema/beans

    http://www.springframework.org/schema/beans/spring-beans-4.3.xsd">

    ...

    ```


    推荐（最佳）做法是不这样做，因为版本将从项目中的 Spring 依赖版本中正确识别。此外，另一个优点是，你可以升级正在使用的 Spring 版本，新的定义规范将自动在你的配置文件中得到支持，而无需你修改它们。


    为了读取 Bean 定义以及创建和管理 Bean，也必须创建许多 Spring 提供的 Bean。这就是为什么必须将几个核心的 Spring 模块作为依赖项添加到你的项目中：


    *   `spring-core:` Spring 框架的基础部分

    *   `spring-beans:` 与 `spring-core` 一起提供框架的核心组件，包括 Spring IoC 和依赖注入特性。

    *   `spring-context:` 扩展了前两个模块的功能，顾名思义，它包含帮助构建和使用应用程序上下文的组件。`ApplicationContext`
    接口是这个模块的一部分，是每个应用程序上下文类都实现的接口。

    *   `spring-context-support:` 提供与第三方库集成的支持，例如 Guava、Quartz、FreeMarker 等。

    *   `spring-expressions:` 提供强大的表达式语言 (SpEL)，用于在运行时查询和操作对象；例如，可以从运行时决定的外部源读取属性并用于初始化
    Bean。但这种语言非常强大，因为它还支持逻辑和数学运算、访问数组以及操作集合。


    现在你已经了解了所有基础设施组件的来源，我们可以回到配置细节，向你展示 Bean 定义是什么样子的。最简单的 Bean 定义如下所示：


    在 `上面的` 配置中，我们刚刚定义了一个 id 为 `simpleBean`、类型为 `com.ps.SimpleBeanImpl` 且没有依赖关系的 Bean。为了定义具有依赖关系的
    Bean，我们必须决定如何注入这些依赖关系。在 Spring 中，有两种特定于 XML 的依赖注入类型：通过构造函数和通过 setter 方法，还有一种只能
    `使用注解` 和 `Java 配置` 使用的类型：字段注入，这将在下一节中介绍。

    '
- fmt: "### Constructor Injection\n\nConstructor injection can be used to define beans\
    \ when the bean type is a class that has a constructor with arguments defined.\
    \ If the bean definition looks like this:\n\nThen the class `ComplexBeanImpl`\
    \ looks like this:\n\n```\npublic class ComplexBeanImpl implements ComplexBean\
    \ {\n    private SimpleBean simpleBean;\n    public ComplexBeanImpl(SimpleBean\
    \ simpleBean) {\n        this.simpleBean = simpleBean;\n    }\n    ...\n}\n```\n\
    \nThe code and configuration snippets above provide all the necessary information\
    \ so that the Spring container can create a bean of type `SimpleBeanImpl` named\
    \ `simpleBean` and then inject it into a bean of type `ComplexBeanImpl` named\
    \ `complexBean`. What is done behind the scenes is:\n\n```\nSimpleBean simpleBean\
    \ = new SimpleBeanImpl();\nComplexBean complexBean = new ComplexBeanImpl(simpleBean);\n\
    ```\n\nSpring creates the beans in the order they are needed. The dependencies\
    \ are first created and then injected into the beans that need them.\n\nWhat you\
    \ have to remember when it comes to constructor injection is that the template\
    \ for a bean definition using it looks like this:\n\nThe `<constructor-arg />`\
    \ element defines the constructor argument and does so using a number of attributes,\
    \ but `ref` is the most common, and it is used to tell the container that the\
    \ value of this attribute is a reference to another bean. The complete list of\
    \ attributes and documentation for each one can be found in `spring-beans-4.3.xsd`,\
    \ which can be accessed easily from Intellij IDEA by pressing CTRL (Command in\
    \ MacOS systems) while clicking on `constructor-arg` in your configuration file.\n\
    \nAnother attribute that is commonly used is `value`. This attribute is used when\
    \ the value to inject is a scalar.[³](#A978-1-4842-0811-3_2_Chapter.html#Fn3)\
    \ So text values, numbers, booleans, all can be used as arguments for the constructor\
    \ using the `value` attribute.\n\n```\n...\n// ComplexBeanImpl.java constructor\n\
    public ComplexBeanImpl(SimpleBean simpleBean, boolean complex) {\n    this.simpleBean\
    \ = simpleBean;\n    this.complex = isComplex;\n}\n```\n\nSo what happens here\
    \ is equivalent to:\n\n```\nComplexBean complexBean = new ComplexBeanImpl(simpleBean,\
    \ true);\n```\n\nAnd also quite useful is the `index` attribute, which should\
    \ be used when the constructor has more parameters of the same type.\n\n```\n\
    // ComplexBean2Impl.java constructor\npublic ComplexBean2Impl(SimpleBean simpleBean1,\
    \ SimpleBean simpleBean2) {\n    this.simpleBean1 = simpleBean1;\n    this.simpleBean2\
    \ = simpleBean2;\n}\n```\n\nSo what happens here is equivalent to:\n\n```\nComplexBean\
    \ complexBean2 = new ComplexBean2Impl(simpleBean0, simpleBean1);\n```\n\nAnother\
    \ way to handle constructors with more parameters of the same type is to use the\
    \ `name` attribute, which receives as its value the name of the parameter of the\
    \ constructor. And obviously, using it makes the configuration a lot clearer and\
    \ easier to read. So for the `complexBean2` defined previously, there is another\
    \ configuration that does the same job.\n\nDevelopers choose to use constructor\
    \ injection when it is mandatory for the dependencies to be provided, since the\
    \ bean depending on them cannot be used properly without them. Dependency injection\
    \ also is suitable when a bean needs to be immutable, by assigning the dependencies\
    \ to final fields. The most common reason to use constructor injection is that\
    \ sometimes, third-party dependencies are used in a project, and their classes\
    \ were designed to support only this type of dependency injection.\n\nIn creating\
    \ a bean, there are two steps that need to be executed one after the other. The\
    \ bean first needs to be instantiated, and then the bean must be initialized.\
    \ The constructor injection combines two steps into one, because injecting a dependency\
