    }\n// test method in TestJdbcTemplateUserRepo.java\n@Test\npublic void testCreateTable(){\n\
    int result = userRepo.createTable(\"new_p_user\");\n// table exists but is empty\n\
    assertEquals(0, result);\n}\n```\n\nBut things do not always go as intended, and\
    \ sometimes exceptions are thrown. In the next section, what can be done in such\
    \ unexpected cases and the components involved in treating the situation accordingly\
    \ are presented.\n\n## Spring Data Access Exceptions\n\nWhen working with data\
    \ sources, there are a few particular cases when things do not go well: sometimes,\
    \ operations might be called on records that no longer exist; sometimes records\
    \ cannot be created because of some database restrictions; sometimes the database\
    \ takes too long to respond; and so on. In pure JDBC, the same type of checked\
    \ exception is always thrown, `java.sql.SQLException`, and in its message there\
    \ is an SQL code that the developer must identify and treat accordingly.\n\nSpring\
    \ provides a big family of data access exceptions. All of them are subclasses\
    \ of Java `RuntimeException` and provide a practical way for the developer to\
    \ handle database access exceptions without knowing the details of the data access\
    \ API. The `JdbcTemplate` instance takes care of transforming cryptic `java.sql.SQLExceptions`\
    \ into clear and concise `org.springframework.dao.DataAccessException` implementations[⁹](#A978-1-4842-0811-3_5_Chapter.html#Fn9)\
    \ behind the scenes using an infrastructure bean of a type that implements `org.springframework.jdbc.support.SQLExceptionTranslator`.\
    \ Spring data access exceptions are unchecked and contain human-readable messages\
    \ that point exactly to the cause of the problem. There are translator components\
    \ that can be used to transform any type of data access exceptions into Spring-specific\
    \ exceptions, which is quite useful when one is migrating from one database type\
    \ to another. A simplified version of the Spring data access exception hierarchy\
    \ can be seen in Figure [5-5](#A978-1-4842-0811-3_5_Chapter.html#Fig5).\n\n![A978-1-4842-0811-3_5_Fig5_HTML.jpg](A978-1-4842-0811-3_5_Fig5_HTML.jpg)\n\
    \nFigure 5-5. Spring data access exception hierarchy\n\nThe `java.sql.SQLException`\
    \ is a checked exception that forces developers to catch it and handle it or declare\
    \ it as being thrown over the call method call hierarchy. This type of exception\
    \ is general and is thrown for every database error. This introduces a form of\
    \ tight coupling.\n\nIn Spring, the data access exceptions are unchecked (they\
    \ extend `java.lang.RuntimeException`, which is why this class is exhibited in\
    \ the previous image with a red border) and can be thrown up the method call hierarchy\
    \ to the point where they are most appropriate to handle. The Spring data access\
    \ exceptions hide the technology used to communicate with the database. They are\
    \ thrown when `JdbcTemplate`, JPA, Hibernate, etc. are used. That is probably\
    \ why they are part of the `spring-tx` module.\n\nAs you can notice from Figure\
    \ [5-5](#A978-1-4842-0811-3_5_Chapter.html#Fig5), the Spring data access exception\
    \ family has three main branches:"
