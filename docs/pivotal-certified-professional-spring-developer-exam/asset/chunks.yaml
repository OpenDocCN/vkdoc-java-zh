    \n*   静态方法\n*   具有静态初始化器的类\n*   最终类和最终方法；有时需要确保代码不会被误用，或者确保对象被正确构造\n*   私有方法和字段\n\
    \n`PowerMock` 在 Spring 应用程序中并不是那么有用，因为在那里你很少会找到静态元素，但总会存在遗留代码和第三方库可能需要模拟，因此了解可以这样做以及使用什么工具是合适的。如果你想了解更多，请查看他们的官方网站：[`https`](https://github.com/jayway/powermock)\
