    JSP 页面通常使用标签库进行开发，这些标签库扩展了页面中可用的 JSP 元素集合，并提供了更简洁的语法。JSP 代码片段中声明的 Spring 标签库用于根据应用程序的语言环境提取表格标题的文本。例如，在创建要展示给最终用户的视图时，如果语言环境是英语，`<spring:message
    code="label.User.firstname"/>` 将被转换为 Firstname；如果语言环境是德语，则转换为 Vorname。


    @MVC


    在 Spring 3.0 中，@MVC 引入了一种新的配置模型。MVC XML 配置的主要组件是`<mvc:annotation-driven/>`元素，它注册了
    Web 应用程序运行所需的所有默认基础设施 Bean：处理器映射、验证、转换 Bean 以及其他许多组件。


    另一个重要的组件是`<mvc:default-servlet-handler/>`。通常在 Spring Web 应用程序中，默认的 Servlet 映射"/"被映射到
    DispatcherServlet。这意味着静态资源也必须由它来提供，这可能会在响应时引入一定的延迟，因为 DispatcherServlet 需要找到请求
    URL 所映射的资源。可以这样理解：一个请求到达 DispatcherServlet。DispatcherServlet 的默认行为是开始寻找一个控制器来处理这个请求。当它找不到时，就假定这是一个对静态资源的请求，然后询问静态资源处理器是否能处理该请求。通过声明`<mvc:default-servlet-handler/>`，一个用于处理静态资源的处理器被定义，并具有最低优先级，这个处理器将首先被询问是否能处理该请求。


    从技术上讲，`<mvc:default-servlet-handler/>`配置了一个`DefaultServletHttpRequestHandler`，其
    URL 映射为"/*"，并且相对于所有其他 URL 映射具有最低优先级，其唯一职责是提供静态资源。


    要使用@MVC 元素，必须指定 mvc 命名空间：


    @MVC 模型提供了许多开箱即用的功能，但这些超出了本书的范围。如果您想了解更多，有一本很好的 Apress 书籍涵盖了 Spring Web 相关内容：《The
    Pivotal Certified Spring Web Application Developer Exam Study Guide》。


    Spring MVC 的 Java 配置


    在 Spring 3.1 中，引入了`@EnableWebMvc`注解。当在配置类上使用此注解时，它等同于`<mvc:annotation-driven/>`。当然，还有一些额外的细节需要处理，以确保配置按预期工作，这些内容都将在本节中介绍。


    第一步是将`mvc-config.xml`转换为配置类。每个 Bean 定义、每个扫描元素都必须在 Web 配置类中有对应的项。配置类必须使用`@Configuration`和`@EnableWebMvc`注解进行标注，并且要么实现`WebMvcConfigurer`接口，要么扩展该接口的一个实现（例如`WebMvcConfigurerAdapter`），这使开发者能够仅覆盖自己感兴趣的方法。使用`@EnableWebMvc`注解配置类会导入在`WebMvcConfigurationSupport`类中实现的
    Spring MVC 配置，并且等同于`<mvc:annotation-driven/>`。该类注册了 Web 应用程序所需的许多基础设施 Spring 组件，本节仅涵盖其中一部分，因为
    Spring Core 认证考试并不完全要求掌握此主题。


    为了告知`DispatcherServlet`配置将由配置类而非文件提供，需要在`web.xml`中进行以下更改：


    *   定义一个名为`contextClass`的初始化参数，其值为用于创建基于注解的上下文的 Spring 类的完整类名。

    *   名为`contextConfigLocation`的初始化参数的值将是开发者编写的配置类的完整类名。


    ```


    pet-dispatcher


    org.springframework.web.servlet.DispatcherServlet


    contextClass


    org.springframework.web.context.

    support.AnnotationConfigWebApplicationContext


    contextConfigLocation


    com.ps.config.WebConfig


    ```


    上一节中使用 XML 配置的内容，其对应的配置类如下所示：

    '
- fmt: "```java\npackage com.ps.config;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.web.servlet.config.annotation.EnableWebMvc;\nimport\
    \ org.springframework.web.servlet.config.annotation.WebMvcConfigurerAdapter;\n\
    import org.springframework.web.servlet.view.InternalResourceViewResolver;\n...\n\
    @Configuration\n// \n@EnableWebMvc\n//  \n@ComponentScan(basePackages = {\"com.ps.web\"\
    })\npublic class WebConfig extends WebMvcConfigurerAdapter {\n//  \n@Override\n\
    public void configureDefaultServletHandling(\nDefaultServletHandlerConfigurer\
    \ configurer) {\nconfigurer.enable();\n}\n@Bean\nInternalResourceViewResolver\
    \ getViewResolver(){\nInternalResourceViewResolver resolver = new InternalResourceViewResolver();\n\
    resolver.setPrefix(\"/WEB-INF/\");\nresolver.setSuffix(\".jsp\" );\nresolver.setRequestContextAttribute(\"\
    requestContext\");\nreturn resolver;\n}\n... // other beans and method implementations\
    \ that are not in scope\n}\n```\n\n`WebMvcConfigurerAdapter`类被配置类继承，其中包含更多需要开发者提供实现的方法，这些方法不在讨论范围内。但本节的对应项目`10-ps-mvc-practice`包含一个完整可运行且有文档的配置，可供参考。\n\
    \n## 摆脱 web.xml\n\n从 Servlet 3.0+ 开始，`web.xml`文件不再是配置 Web 应用的必要文件。它可以被一个实现`WebApplicationInitializer`接口的类（或扩展了该接口的\
    \ Spring 类的子类）替代。该类会被`SpringServletContainerInitializer`（一个内部 Spring 支持类，不推荐直接使用或扩展）自动检测到，而`SpringServletContainerInitializer`本身会被每个\
    \ Servlet 3.0+ 容器自动引导。\n\n`SpringServletContainerInitializer`[⁵](#A978-1-4842-0811-3_6_Chapter.html#Fn5)扩展了`javax.servlet.ServletContainerInitializer`，并为`onStartup`方法提供了\
    \ Spring 特定的实现。只要`spring-web`模块的 JAR 存在于类路径中，每个符合 Servlet 3.0+ 规范的容器在启动时都会加载并实例化该类，并调用`onStartup`方法。因此，`web.xml`可以被删除，并且考虑到我们仍在使用\
    \ XML 配置，可以用以下类替代：\n\n```java\npackage com.ps.config;\nimport org.springframework.web.WebApplicationInitializer;\n\
    import org.springframework.web.servlet.DispatcherServlet;\nimport javax.servlet.ServletContext;\n\
    import javax.servlet.ServletException;\nimport  javax.servlet.ServletRegistration;\n\
    public class WebInitializer implements WebApplicationInitializer {\n@Override\n\
    public void onStartup(ServletContext servletContext) throws ServletException {\n\
    ServletRegistration.Dynamic registration =\nservletContext.addServlet(\"pet-dispatcher\"\
    , new DispatcherServlet());\nregistration.setLoadOnStartup(1);\nregistration.addMapping(\"\
    /\");\nregistration.setInitParameter(\"contextConfigLocation\",\n\"/WEB-INF/spring/mvc-config.xml\"\
    );\n}\n}\n```\n\n上述实现有多种写法。例如，可以先构建应用上下文，然后将其注入`DispatcherServlet`，但这超出了本书的范围。\n\
    \n```java\npackage com.ps.config;\nimport org.springframework.web.WebApplicationInitializer;\n\
    import org.springframework.web.servlet.DispatcherServlet;\nimport javax.servlet.ServletContext;\n\
    import javax.servlet.ServletException;\nimport javax.servlet.ServletRegistration;\n\
    public class WebInitializer implements WebApplicationInitializer {\n@Override\n\
    public void onStartup(ServletContext servletContext) throws ServletException {\n\
    XmlWebApplicationContext appContext = new XmlWebApplicationContext();\nappContext.setConfigLocation(\"\
    /WEB-INF/spring/mvc-config.xml\");\nServletRegistration.Dynamic registration =\n\
    servletContext.addServlet(\"dispatcher\", new DispatcherServlet(appContext));\n\
    registration.setLoadOnStartup(1);\nregistration.addMapping(\"/\");\n}\n}\n```\n\
    \n如果使用标注了`@EnableWebMvc`的配置类，那么`onStartup(…)`方法的实现会变成这样：\n\n```java\npackage com.ps.config;\n\
    import org.springframework.web.WebApplicationInitializer;\nimport org.springframework.web.servlet.DispatcherServlet;\n\
    import javax.servlet.ServletContext;\nimport javax.servlet.ServletException;\n\
    import javax.servlet.ServletRegistration;\npublic class WebInitializer implements\
    \ WebApplicationInitializer {\n@Override\npublic void onStartup(ServletContext\
    \ servletContext) throws ServletException {\nServletRegistration.Dynamic registration\
    \ =\nservletContext.addServlet(\"dispatcher\", new DispatcherServlet());\nregistration.setLoadOnStartup(1);\n\
    registration.addMapping(\"/\");\nregistration.setInitParameter(\"contextConfigLocation\"\
    ,\n\"com.ps.config.WebConfig\");\nregistration.setInitParameter(\"contextClass\"\
    ,\n\"o.s.w.c.s.AnnotationConfigWebApplicationContext\");\n}\n}\n```\n\n使用 Java\
    \ 配置类编写配置的方式也有很多，但这里只展示最常见的一种，即扩展`AbstractAnnotationConfigDispatcherServletInitializer`类：\n\
    \n```java\npackage com.ps.config;\nimport org.springframework.web.servlet.support.\n\
    AbstractAnnotationConfigDispatcherServletInitializer;\n...\npublic class WebInitializer\
    \ extends\nAbstractAnnotationConfigDispatcherServletInitializer {\n@Override\n\
    protected Class getRootConfigClasses() {\nreturn new Class{\nServiceConfig.class\n\
    };\n}\n@Override\nprotected Class getServletConfigClasses() {\nreturn new Class{\n\
    WebConfig.class\n};\n}\n@Override\nprotected String getServletMappings() {\nreturn\
    \ new String{\"/\"};\n}\n@Override\nprotected Filter getServletFilters() {\nCharacterEncodingFilter\
    \ cef = new CharacterEncodingFilter();\ncef.setEncoding(\"UTF-8\");\ncef.setForceEncoding(true);\n\
    return new Filter{new HiddenHttpMethodFilter(), cef};\n}\n}\n```\n\n该类定义了一组方法，开发者可以重写这些方法，为\
    \ Web 应用提供完整的配置，而无需任何 XML。它特别适合多模块应用，其中根上下文需要与 Web 上下文分离。在上述代码中，`getRootConfigClasses()`被内部调用，配置类用于创建根应用上下文。`getServletMappings()`方法用于设置`DispatcherServlet`的上下文，而`getServletFilters()`用于为应用设置额外的过滤器。\n\
    \n使用 Spring 创建 Web 应用既简单又实用，但这是一个广泛的主题，本书无法涵盖，因为只有基本概念才是认证考试的主题。\n\n## 运行 Spring\
