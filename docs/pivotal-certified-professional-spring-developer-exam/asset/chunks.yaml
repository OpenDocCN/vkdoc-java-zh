- fmt: 'HTTP verbs are used as actions to execute on the resources (`GET`, `PUT`,
    `PATCH`, `POST`, `DELETE`, `HEAD`, `OPTIONS`). The main REST HTTP methods with
    their actions are presented in Table 7-2.


    **Table 7-2.** Message Converters Table


    | HTTP method | Purpose | Observation |

    | --- | --- | --- |

    | `GET` | Read | Reads a resource, does not change it. Therefore can be considered
    safe. Reading the same resource always returns the same result. Therefore can
    be considered idempotent. |

    | `POST` | Create | Used to create a new resource. Neither safe nor idempotent.
    Two identical `POST` requests will result in two identical resources being created
    or errors at application level. |

    | `PUT` | Update | Most often used for update capabilities. It is not safe, since
    it modifies the state on the server, but is idempotent (unless subsequent calls
    of the same `PUT` request increments a counter within the resource, for example).
    |

    | `DELETE` | Delete | Used to delete resources. Not safe, but can be considered
    idempotent. Because requests to delete a resource that no longer exists will always
    return a 404 (not found). |


    URIs (Uniform Resource Identifiers) are used to identify resources. The resources
    are conceptually separate from representations. Representations of the resources
    are returned from the server to the client after a client request (typically JSON
    or XML). Representations contain metadata information that can be used by the
    client in order to modify or delete the resource on the server, provided it has
    permission to do so.


    HTTP response: response codes, body, and headers are used to deliver the state
    to clients. Clients deliver the state using body contents, request headers, and
    the URI.


    A RESTful architecture is a stateless client–server architecture, so the system
    is disconnected (loosely coupled). The server might not be available all the time,
    so operations are asynchronous, since client cannot assume direct connection to
    the server. Sometimes, requested resources can be cached and some other unknown
    software and hardware layers can be interposed between client and server. Intermediary
    servers may improve system scalability and/or security by enabling load-balancing,
    providing shared caches, and enforcing security policies. In REST communication
    the objects handled are representations of resources. Representations can link
    to other resources, thus providing the opportunity of extension and discovery.
    HTTP headers and status codes are used to communicate results to clients. When
    it is working with a specific container, a session is used to preserve the state
    across multiple HTTP requests. Using REST, there is no need for this, because
    REST communication is stateless, which increases the scalability, since the server
    does not have to maintain, update, or communicate the session state. Since HTTP
    is supported by every platform/language, this means that REST communication can
    be done between quite a wide range of different systems, and thus it is very scalable
    and definitely interoperable.


    To analyze contents of the REST requests and responses, the SoapUI plugin (or
    application) that was introduced in the web services section can be used. Start
    SoapUI from the **Tools** ➤ **SoapUI** ➤ **Start SoapUI** menu, and then open
    the SoapUI Navigator tab and create a REST project. A pop-up will require a URL
    matching a REST request. After the Request object is created, the green arrow
    button can be clicked to send the request, and the server will respond with the
    representation matching the request. But more about this after Spring Support
    for REST is covered. In Figure 7-21 you can see how the SoapUI Intellij IDEA plugin
    can be used to create a Rest project.


    ![A978-1-4842-0811-3_7_Fig21_HTML.jpg](A978-1-4842-0811-3_7_Fig21_HTML.jpg)


    **Figure 7-21.** The SoapUI Navigator interface for sending a REST request


    ## Spring Support for REST


    JAX-RS 2.0 is the latest major release of JAX-RS, which is a Java EE standard
    for building RESTful applications. JAX-RS focuses on programmatic clients, and
    there are various implementations (Jersey(RI), RESTEasy, Restlet, CXF). Spring
    MVC does not implement JAX-RS, but it does provide REST Support starting with
    version 3.0, offering programmatic client support, but also browser support. The
    core class for building programmatic clients in Java is the `RestTemplate`. On
    the server side, the core component for REST support is Spring MVC. Using the
    `@RequestMapping` annotation introduced in the previous chapter, HTTP REST requests
    can be mapped to controllers. The REST controllers are special. Although annotated
    with the stereotype annotation `@Controller`, their methods do not return results
    that can be mapped to a view, but to a representation. The `DispatcherServlet`
    is notified that the result of the execution of a controller does not have to
    be mapped to a view by annotating the method with `@ResponseBody`.


    ```java

    import org.springframework.stereotype.Controller;

    import org.springframework.web.bind.annotation.ResponseBody;

    @Controller

    public class RestUserController {

    @Autowired

    UserService userService;

    @RequestMapping(value = "/users", method = RequestMethod.GET)

    public @ResponseBody List all() {

    return userService.findAll();

    }

    ...

    }

    ```


    In Spring 4.0, the `@RestController` annotation was introduced. This annotation
    is basically a combination of `@Controller` and `@ResponseBody`, and when used
    on a class, it assumes that all values returned by the methods in this controller
    should be bound to the web response body. The `@RestController` annotation is
    a specialized version of the `@Controller` that does more than just mark a component
    as being used for REST requests; thus it is not considered a stereotype annotation,
    and was declared in a different package: `org.springframework.web.bind.annotation`.


    ```java

    import org.springframework.web.bind.annotation.RestController;

    @RestController

    public class RestUserController {

    @Autowired

    UserService userService;

    @RequestMapping(value = "/users", method = RequestMethod.GET)

    public List all() {

    return userService.findAll();

    }

    ...

    }

    ```


    A URL can be mapped to multiple methods if the method attribute is set with a
    different HTTP method. The example above declared the HTTP method type to be `GET`.
    The same URL can be used with a `POST` method and used to create a user, for example.'
