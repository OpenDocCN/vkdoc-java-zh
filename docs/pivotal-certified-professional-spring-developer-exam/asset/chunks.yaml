    ### 推荐的项目构建工具


    ![A978-1-4842-0811-3_1_Figb_HTML.jpg](img/A978-1-4842-0811-3_1_Figb_HTML.jpg)
    Grade 2.x ** 本书附带的源代码可以使用 Gradle 包装器进行编译和执行，该包装器在 Windows 上是一个批处理脚本，在其他操作系统上则是一个
    Shell 脚本。当你通过包装器启动 Gradle 构建时，Gradle 会被自动下载并用于运行构建；因此，你无需像之前所述那样手动安装 Gradle。关于如何操作的具体说明，可以查阅
    [`http://www.gradle.org/docs/current/userguide/gradle_wrapper.html`](http://www.gradle.org/docs/current/userguide/gradle_wrapper.html)
    上的公开文档。


    一个好的实践是将代码和构建工具分开存放，但对于本学习指南，我们选择使用包装器，以便通过跳过 Gradle 安装步骤来轻松搭建练习环境，同时因为推荐的源代码编辑器内部也使用了该包装器。


    如果你决定在编辑器之外使用 Gradle，可以从其官方网站 [`https`](https://www.gradle.org/) `:` [`//www.gradle.org/`](https://www.gradle.org/)
    仅下载二进制文件（或者如果你好奇，也可以下载包含二进制文件、源代码和文档的完整包），解压后将其内容复制到硬盘上的某个位置。创建一个 `GRADLE_HOME`
    环境变量，并将其指向你解压 Gradle 的位置。同时，将 `%GRADLE_HOME%\bin`（Windows 系统）或 `$GRADLE_HOME/bin`（基于
    Unix 的操作系统）添加到系统的全局路径中。


    选择 Gradle 作为本书源代码的构建工具，是因为它设置简单、配置文件小巧、定义执行任务灵活，而且 Pivotal Spring 团队目前也使用它来构建所有
    Spring 项目。


    !


    打开一个终端（在 `Windows` 中是 `命令提示符`，在 `MacOs` 和 `Linux` 上是你安装的任何类型的终端），输入以下命令，验证操作系统识别的
    Gradle 版本是否是你刚刚安装的：


    ```

    gradle -version

    ```


    你应该会看到类似如下的输出：


    ```


    Gradle 2.11


    构建时间：    2016-02-08 07:59:16 UTC

    构建编号：  无

    修订版本：  584db1c7c90bdd1de1d1c4c51271c665bfcba978

    Groovy：     2.4.4

    Ant：        Apache Ant(TM) 版本 1.9.3，编译于 2013 年 12 月 23 日

    JVM：        1.8.0_74 (Oracle Corporation 25.74-b02)

    操作系统：   -- 你使用的任何操作系统 --

    ```


    上述文本的显示，确认了 Gradle 命令可以在你的终端中执行；因此，Gradle 已成功安装。


    使用 Gradle 来构建本书项目的原因在于其简洁性。Gradle 最近被介绍为现代开源的多语言构建自动化系统，Gradle 团队现在还会帮助你分析构建过程以证明这一点。Gradle
    现在提供了在其网站上注册收据的功能，该收据将用于连接网站并生成构建统计信息。本书的项目将使用 Gradle 团队提供的这项新服务，让你随时了解项目随每个章节的进展。


    如果你访问 [`https://gradle.com/demo/`](https://gradle.com/demo/) 并按照演示中的说明操作，就可以构建你的项目，并获得一组关于项目和团队健康状况的统计数据。在构思的初始阶段，项目非常简单，因此初始的自动构建提供的信息并不多。在图
    1-2 中，你可以看到项目初始阶段的统计数据。如图所示，构建耗时一秒，没有运行任何测试，JVM 运行此构建最多需要 910 MB 的内存。


    ![A978-1-4842-0811-3_1_Fig2_HTML.jpg](img/A978-1-4842-0811-3_1_Fig2_HTML.jpg)


    图 1-2.


    Gradle.com 构建统计数据


    ### 推荐的 IDE


    ![A978-1-4842-0811-3_1_Figc_HTML.jpg](img/A978-1-4842-0811-3_1_Figc_HTML.jpg)
    本学习指南推荐的 IDE 是 IntelliJ IDEA。原因在于它是最智能的 Java IDE。IntelliJ IDEA 为 Java EE 和 Spring
    提供了出色的框架特定编码辅助和生产力提升功能，并且还包含对 Maven 和 Gradle 的支持。它是帮助你专注于学习 Spring（而不是学习如何使用 IDE）的完美选择。可以从
    JetBrains 官方网站 [`https://www.jetbrains.com/idea/`](https://www.jetbrains.com/idea/)
    下载。它对你的操作系统也很轻量，并且非常易于使用。


    由于本书附带项目中的 Web 应用程序将使用 Spring Boot 运行，你可以使用社区版来构建并解决项目中的待办事项。但如果你希望获得使用 Java 和
    Spring 进行开发的专业体验，可以尝试使用旗舰版，该版本有三十天的试用期。本书中涉及代码运行、启动器创建以及其他 IDE 相关细节的截图均使用 IntelliJ
    IDEA 旗舰版制作。


    我相信 IDE 应该足够易用和直观，让你能够专注于真正重要的事情：你正在实现的解决方案。但如果你已经熟悉其他 Java 编辑器，只要它支持 Gradle，你也可以继续使用它。

