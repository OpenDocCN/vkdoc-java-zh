    Spring REST


    REST 是表述性状态转移（REpresentational State Transfer）的缩写。它由 Roy Fielding 于 2000 年在他的博士论文中引入并定义。REST
    是 RPC（远程过程调用）和 Web 服务（SOAP、WSDL 等）等机制的轻量级替代方案。REST 是一种用于设计网络化（分布式）应用程序的架构风格。其理念是，不使用
    CORBA、RPC 或 SOAP 等复杂机制在机器之间进行连接，而是使用简单的 HTTP 在机器之间进行调用。RESTful 应用程序使用 HTTP 请求来发布数据（创建和/或更新）、读取数据（例如，进行查询）和删除数据。因此，REST
    使用 HTTP 来处理所有四种 CRUD（创建/读取/更新/删除）操作。


    Web 应用程序不仅被浏览器客户端使用。程序化客户端可以使用 HTTP 进行连接（例如，移动应用程序以及基本上任何开发为能够使用 HTTP 作为通信协议来请求和接收数据的应用程序）。REST
    架构风格描述了通过 HTTP 公开 Web 服务的最佳实践；它不仅被用作传输协议，还被用作应用程序协议。使用了以下 HTTP 规范：

