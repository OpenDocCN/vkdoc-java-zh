- fmt: "But does it make sense to display on the page a link to a forbidden resource\
    \ at all? Of course not. Also, production applications are usually quite big and\
    \ contain many different URLs, so full configuration using an XML file or a security\
    \ configuration class can become quite complex. To simplify this, starting with\
    \ Spring Security version 2.0 a security tag library is provided that can be used\
    \ to secure items at JSP level. In the above example, we can choose to display\
    \ a column containing the link to the resource based on the security configuration\
    \ for the user.\n\n```\n//\n\n...\n\n```\n\n```\n...\n\n${user.id}\n\n${user.username}\n\
    \n...\n\n```\n\nThe `<spring:url ../>` element is a tag from the Spring tag library\
    \ that is used to compose a link dynamically based on a parameter. The definition\
    \ in the previous code snippet will resolve to links like this:\n\n`http://localhost:8080/mvc-security/users/show/12`,\
    \ where 12 is the id of the user.\n\nThe `<sec:authorize ../>` above has the effect\
    \ that after a user has been authenticated, its roles are loaded into the security\
    \ context, and when he accesses the `list.jsp` page, the response view is computed\
    \ taking its roles into account. The security elements in the previous example\
    \ state that only for users with ADMIN role should the `<td/>` elements containing\
    \ the `/users/show/*` URL should be part of the view. So the user `john`, for\
    \ example, having only a USER role, will see a different view from that of a user\
    \ with role `ADMIN`, as depicted in Figure [6-16](#A978-1-4842-0811-3_6_Chapter.html#Fig16).\n\
    \n![A978-1-4842-0811-3_6_Fig16_HTML.jpg](A978-1-4842-0811-3_6_Fig16_HTML.jpg)\n\
    \nFigure 6-16.\n\n`/users/show` view for roles ADMIN and USER\n\nAccording to\
    \ what is said before, the link is not displayed, but what happens if the user\
    \ enters the link manually in the browser? If there is no restriction for that\
    \ link in the configuration, the view will be shown to the user regardless of\
    \ its role. So the restriction from the configuration is needed as well. If the\
    \ restriction is defined as depicted in the code snippet at the beginning of the\
    \ section, the security rule can be used in the JSP code to avoid complicated\
    \ expressions like `'hasRole(\"ROLE_ ADMIN \")`' by replacing the `access` attribute\
    \ with `url` for the `authorize` element and replacing the `hasRole` expression\
    \ with the URL defined in the security rule. This will tell Spring to check whether\
    \ the user has access to that URL before displaying the view. And if it does not,\
    \ the message in Figure [6-15](#A978-1-4842-0811-3_6_Chapter.html#Fig15) is displayed.\
    \ This makes it possible to link a security rule to a url pattern that can be\
    \ used as a security attribute value to secure resources with any URL path. So\
    \ the JSP code above becomes:\n\n```\n//\n\n...\n\n...\n\n${user.id}\n\n${user.username}\n\
    \n...\n\n```\n\nBut there is another security concern: the method that populates\
    \ the view is defined in the service layer. If the application supports web services\
    \ too, how can we prevent a user from calling that method directly and getting\
    \ the data? Or by using a remote REST call? Because the security is currently\
    \ defined only in the web layer. The next section is about how Spring Security\
    \ can be used to secure items on lower levels too.\n\n## Method Security\n\nTo\
    \ apply security to lower layers of an application, Spring Security uses AOP.\
    \ The respective bean is wrapped in a proxy that before calling the target method,\
    \ first checks the credentials of the user and calls the method only if the user\
    \ is authorized to call it. In XML, the definition of such a proxy is done using\
    \ the `global-method-security` configuration element provided by the security\
    \ namespace to enable method-level security and by defining a secured pointcut\
    \ and the rule that applies to it.\n\nBut the same can be done more easily using\
    \ the Spring Security namespace or Java Configuration and annotations. There are\
    \ two alternatives for doing this:\n\n1.  Method-level security must be enabled\
    \ by annotating a configuration class (good practice is to annotate the Security\
    \ Configuration class to keep all configurations related to security in one place)\
    \ with `@EnableGlobalMethodSecurity(securedEnabled = true)`. Methods must be secured\
    \ by annotating them with Spring Security annotation `@Secured`.\n\n    ```\n\
    \    import org.springframework.security.config.annotation\n    .method.configuration.EnableGlobalMethodSecurity;\n\
    \    ...\n    @Configuration\n    @EnableWebSecurity\n    @EnableGlobalMethodSecurity(securedEnabled\
    \ = true)\n    public class SecurityConfig extends WebSecurityConfigurerAdapter\
    \ {\n    ...\n    }\n    //UserServiceImpl.java service class\n    import org.springframework.security.access.annotation.Secured;\n\
    \    ...\n    @Service\n    @Transactional(readOnly = true, propagation = Propagation.REQUIRED)\n\
    \    public class UserServiceImpl implements UserService {\n    @Secured(\"ROLE_ADMIN\
    \ \")\n    public User findById(Long id) {\n    return userRepo.findOne(id);\n\
    \    }\n    ...\n    }\n    ```\n\n    The equivalent configuration using XML\
    \ makes use of the `<global-method-security ../>` element defined in the Spring\
    \ Security namespace, which is the XML equivalent of annotation `@EnableGlobalMethodSecurity`.\
    \ To enable method security, the `secured-annotations` attribute of this element\
    \ must be configured to have the `enabled` value.\n\n2.  Method-level security\
    \ must be enabled by annotating a configuration class (good practice is to annotate\
    \ the Security Configuration class to keep all configurations related to security\
    \ in one place) with `@EnableGlobalMethodSecurity(jsr250Enabled = true)`. Methods\
    \ must be secured by annotating them with JSR-250[^(15)](#A978-1-4842-0811-3_6_Chapter.html#Fn15)\
    \ annotations.\n\n    ```\n    import org.springframework.security.config.annotation\n\
    \    .method.configuration.EnableGlobalMethodSecurity;\n    ...\n    @Configuration\n\
    \    @EnableWebSecurity\n    @EnableGlobalMethodSecurity(jsr250Enabled = true)\n\
    \    public class SecurityConfig extends WebSecurityConfigurerAdapter {\n    ...\n\
    \    }\n    //UserServiceImpl.java service class\n    import javax.annotation.security.RolesAllowed;\n\
    \    ...\n    @Service\n    @Transactional(readOnly = true, propagation = Propagation.REQUIRED)\n\
    \    public class UserServiceImpl implements UserService {\n    @RolesAllowed(\"\
    ROLE_ADMIN \")\n    public User findById(Long id) {\n    return userRepo.findOne(id);\n\
    \    }\n    ...\n    }\n    ```\n\n    The equivalent configuration using XML\
    \ makes use of the `<global-method-security ../>` element defined in the Spring\
    \ Security namespace, which is the XML equivalent of annotation `@EnableGlobalMethodSecurity`.\
    \ To enable method security, the `jsr250-annotations` attribute of this element\
    \ must be configured to have the `enabled` value.\n\n    The JSR 250 annotations\
    \ are standards-based and allow simple role-based constraints to be applied but\
    \ do not have the power of Spring Security’s native annotations.\n\nBoth approaches\
    \ will lead to Spring Security wrapping the service class in a secure proxy. The\
    \ abstract schema of how a secured method executes and the components involved\
    \ is depicted in Figure [6-17](#A978-1-4842-0811-3_6_Chapter.html#Fig17).\n\n\
    ![A978-1-4842-0811-3_6_Fig17_HTML.jpg](A978-1-4842-0811-3_6_Fig17_HTML.jpg)\n\n\
    Figure 6-17.\n\nAbstract schema of a secured method execution\n\nThere are four\
    \ annotations that support expression attributes that were introduced in Spring\
    \ 3.0 to allow pre- and postinvocation authorization checks and also to support\
    \ filtering of submitted collection arguments or return values: `@PreAuthorize`,\
    \ `@PreFilter`, `@PostAuthorize`, and `@PostFilter`. They are enabled in XML by\
    \ the `pre-post-annotations` attribute of the `<global-method-security ../>` element,\
    \ which must be configured to have the `enabled` value."
