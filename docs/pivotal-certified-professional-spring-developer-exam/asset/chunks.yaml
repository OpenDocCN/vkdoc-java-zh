    \ 请求实际收到了步骤 1 中定义的响应。\n\n项目`15-ps-ws-rest-solution`中的`StandaloneRestUserControllerTest`类可用于在测试模拟上下文中测试\
    \ RESTful 应用程序。定义了一个名为`TestConfig`的静态内部类，用于向测试上下文提供模拟依赖项。使用 JMock 和 Mockito 组件提供模拟对象，以便可以隔离地测试\
    \ REST 通信（请求和响应）。\n\n```\nimport org.mockito.Mockito;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.http.HttpMethod;\n\
    import org.springframework.http.MediaType;\nimport org.springframework.test.context.ContextConfiguration;\n\
    import org.springframework.test.context.junit4.SpringJUnit4ClassRunner;\nimport\
    \ org.springframework.test.context.web.WebAppConfiguration;\nimport org.springframework.test.web.client.MockRestServiceServer;\n\
    import org.springframework.web.client.RestTemplate;\nimport static org.junit.Assert.*;\n\
    import static org.springframework.test.web.client.match.\nMockRestRequestMatchers.method;\n\
    import static org.springframework.test.web.client.match.\nMockRestRequestMatchers.requestTo;\n\
    import static org.springframework.test.web.client.ExpectedCount.once;\nimport\
    \ static org.springframework.test.web.client.response.\nMockRestResponseCreators.withSuccess;\n\
    ...\n@RunWith(SpringJUnit4ClassRunner.class)\n@ContextConfiguration(classes  =\
    \  {WebConfig.class,\nStandaloneRestUserControllerTest.TestConfig.class})\n@WebAppConfiguration\n\
    public class StandaloneRestUserControllerTest {\n@Configuration\nstatic class\
    \ TestConfig {\n@Bean\nUserService userService() {\nreturn Mockito.mock(UserService.class);\n\
    }\n}\nprivate RestTemplate restTemplate = null;\nprivate MockRestServiceServer\
    \ server = null;\n@Before\npublic void setup() {\nrestTemplate = new RestTemplate();\n\
    server = MockRestServiceServer.bindTo(restTemplate).build();\n}\n@Test\npublic\
    \ void findByUsername() {\n//步骤 1\nserver.expect(once(), requestTo(\"/users/johncusack\"\
    ))\n.andExpect(method(HttpMethod.GET))\n.andRespond(withSuccess(\"{\\n\" +\n\"\
    \  \\\"id\\\" : 1575,\\n\" +\n\"  \\\"username\\\" : \\\"johncusack\\\",\\n\"\
    \ +\n\"  \\\"firstName\\\" : \\\"John\\\",\\n\" +\n\"  \\\"lastName\\\" : \\\"\
    Cusack\\\",\\n\" +\n\"  \\\"password\\\" : \\\"test\\\",\\n\" +\n\"  \\\"userType\\\
    \" : \\\"OWNER\\\",\\n\" +\n\"  \\\"email\\\" : \\\"John.Cusack@pet.com\\\",\\\
    n\" +\n\"  \\\"rating\\\" : 0.0,\\n\" +\n\"  \\\"active\\\" : true\\n\" +\n\"\
    }\",  MediaType.APPLICATION_JSON_UTF8));\n//步骤 2\nUser user = restTemplate.getForObject(\"\
    /users/{$username}\",\nUser.class, \"johncusack\");\n//步骤 3 assertNotNull(user);\n\
    assertEquals(\"John.Cusack@pet.com\", user.getEmail());\nassertEquals(UserType.OWNER,\
    \ user.getUserType());\n}\n...\n}\n```\n\nREST 的优势\n\n*   REST 简单易用。\n*   REST\
    \ 得到广泛支持。\n*   资源可以用多种数据格式（JSON、XML 等）表示。\n*   可以充分利用 HTTP 缓存和代理服务器来帮助处理高负载并提高性能。\n\
    *   它降低了客户端/服务器的耦合度。\n*   浏览器可以解释表示形式。\n*   Javascript 可以使用表示形式。\n*   REST 服务可以被用不同语言编写的应用程序消费。\n\
