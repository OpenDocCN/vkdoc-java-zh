  trans: '

    实体由 `Session` 实例管理，该实例提供了用于搜索、持久化、更新和删除的方法。此实例还负责管理事务，是 JPA 的 `EntityManager`
    的良好替代品。当前会话通过调用 `SessionFactory` bean 获得：


    ```

    sessionFactory.getCurrentSession();

    ```


    这些操作的查询使用 Hibernate 查询语言编写，它提供了一种更实用的编写 SQL 查询的方式。HQL 查询作用于领域对象，并在底层转换为匹配的 SQL
    查询。


    示例：当我们知道对象的 ID 时，使用 Hibernate 检索该对象变得非常简单。


    ```

    @Override

    public User findById(Long id) {

    return session.get(User.class, id);

    }

    ```


    如果我们想查看 Hibernate 生成的原始 SQL 查询，只需在日志中查看，并将 `SessionFactory` bean 的两个 Hibernate
    SQL 特定参数 `show_sql` 和 `format_sql` 设置为 `true` 即可。


    ```

    select

    user0_.id as id1_5_,

    user0_.CREATED_AT as CREATED_2_5_,

    user0_.MODIFIED_AT as MODIFIED3_5_,

    user0_.version as version4_5_,

    user0_.active as active5_5_,

    user0_.address as address6_5_,

    user0_.email as email7_5_,

    user0_.first_name as first_na8_5_,

    user0_.last_name as last_nam9_5_,

    user0_.password as passwor10_5_,

    user0_.rating as rating11_5_,

    user0_.user_type as user_ty12_5_,

    user0_.username as usernam13_5_

    from

    P_USER user0_

    where

    user0_.id=?

    ```


    HQL 支持开发者在查询中使用占位符和命名参数，可以返回单个结果或集合，并且不需要映射对象。还记得 `RowMapper<T>` 吗？使用 Hibernate
    就不需要它了。这就是 ORM 的强项。基于实体类中注解所表示的元数据，Hibernate 可以在底层轻松地将数据库记录转换为 Java 对象，反之亦然。在下面的代码片段中，你可以看到几个不同的
    HQL 查询。


    ```

    //当没有记录匹配条件时，返回空列表

    List list = session.createQuery("from User u where username= ?")

    //当没有记录匹配条件时，返回 null

    User user = (User) session.createQuery("from User u where u.id= :id").

    setParameter("id", userId).uniqueResult();

    // 更新用户

    User user = (User) session().createQuery("from User u where u.id= :id").

    setParameter("id", userId).uniqueResult();

    user.setUsername(username);

    session.update(user);

    //在数据库中保存一个新用户

    public void save(User user) {

    session.persist(user);

    }

    // 删除一个用户

    public void deleteById(User user) {

    session.delete(user);

    }

    ```


    为了将领域对象与数据库同步，`Session` 实例提供了不少方法。以下是最常用的几个：


    *   `update(entity)` 用于持久化对现有数据库对象所做的更改。

    *   `persist(entity)` 用于将新的领域对象保存到数据库中。如果此对象关联了其他领域对象，并且该关联使用 `cascade="persist"`
    映射，则持久化操作也会包含这些关联对象。此方法不返回值。

    *   `save(entity)` 用于将新的领域对象保存到数据库中。在保存对象之前，会生成一个标识符。如果关联使用 `cascade="save-update"`
    映射，则此操作适用于关联的实例。此方法返回生成的标识符。

    *   `saveOrUpdate(entity)` 用于将领域对象保存到数据库。如果对象已存在，则执行 `update`；否则，执行 `save`，并且如果关联使用
    `cascade="save-update"` 映射，则此操作适用于关联的实例。


    当在应用程序中使用 Hibernate 时，仓库类将使用 `sessionFactory` bean 来操作数据对象。`UserRepo` 的 Hibernate
    特定实现如下代码片段所示。注意注入的 `sessionFactory` bean 以及如何获取当前会话。


    ```

    import org.hibernate.Session;

    import org.hibernate.SessionFactory;

    import org.springframework.transaction.annotation.Transactional;

    ...

    @Repository

    @Transactional

    public class HibernateUserRepo implements UserRepo {

    private SessionFactory sessionFactory;

    @Autowired

    public HibernateUserRepo(SessionFactory sessionFactory) {

    this.sessionFactory = sessionFactory;

    }

    /**

    * @return 事务性会话

    */

    protected Session session() {

    return sessionFactory.getCurrentSession();

    }

    @Override

    public List findAll() {

    return session().createQuery("from User u").list();

    }

    ...

    ```


