    In this case, we have two beans of type `RequestRepo`, and neither of them is
    named `reqRepo`, so Spring cannot decide. The first solution would be to rename
    the `anotherRepo` method. The second would be to tell Spring via `@Autowired +
    @Qualifier` (the one provided by Spring) that the bean named `anotherRepo` should
    be used for autowiring, because that is what the `Qualifier` annotation is used
