  trans: "\n```\n@RestController\npublic class RestUserController {\n...\n/**\n* 将\
    \ IllegalArgumentException 映射为 404 Not Found HTTP 状态码。\n* 请求的资源未找到\n*/\n@ResponseStatus(HttpStatus.NOT_FOUND)\n\
    @ExceptionHandler({IllegalArgumentException.class})\npublic void handleNotFound()\
    \ {\n// 仅返回空的 404\n}\n/**\n* 将 DataIntegrityViolationException 映射为 409 Conflict\
    \ HTTP 状态码。\n* 无法创建资源\n*/\n@ResponseStatus(HttpStatus.CONFLICT)\n@ExceptionHandler({DataIntegrityViolationException.class})\n\
    public void handleAlreadyExists() {\n// 仅返回空的 409\n}\n...\n}\n```\n\n处理 REST 请求相关异常的另一种方法是，为\
    \ REST 控制器定义一个专门的异常类，并定义一个专门的组件来拦截这些类型的异常并以特定方式处理它们。例如，考虑一个名为 `UserException`\
    \ 的类，每当 `RestUserController` 中的方法未正确执行时，就会抛出该异常。以下代码片段中定义的类将拦截此类异常，并将其转换为客户端易于解释的\
    \ JSON 错误对象。此行为通过 `@ControllerAdvice` 注解进行配置，该注解是 `@Component` 的一种特化，允许通过类路径扫描自动检测实现类。使用此注解标注的类通常会声明一个或多个使用\
    \ `@ExceptionHandler` 注解的方法，这些方法将负责处理异常。\n\n```\nimport org.springframework.http.HttpStatus;\n\
    import org.springframework.web.bind.annotation.ControllerAdvice;\nimport org.springframework.web.bind.annotation.ExceptionHandler;\n\
    import org.springframework.web.bind.annotation.ResponseBody;\nimport org.springframework.web.bind.annotation.ResponseStatus;\n\
    @ControllerAdvice\npublic class RestExceptionProcessor {\n@ExceptionHandler\n\
    @ResponseStatus(value = HttpStatus.NOT_FOUND)\n@ResponseBody\npublic JsonError\
    \ exception(UserException ex) {\nreturn new JsonError(ex.getMessage());\n}\n}\n\
    ```\n\n在上一个代码示例中，异常类型被用作处理程序方法中的参数，因此只有该类型的异常才会被拦截和处理。此外，捕获自定义异常非常有用，因为它们通常包含与出错原因相关的特定信息。也可以通过配置\
    \ `@ControllerAdvice` 注解来实现类似的限制。通过设置 `basePackages` 属性，可以将控制器通知的范围限制为特定包集合中声明的控制器方法抛出的异常。\n\
    \n```\n...\n@ControllerAdvice(basePackages = {\"com.ps.web\", \"com.ps.rest\"\
    })\npublic class RestExceptionProcessor {\n@ExceptionHandler\n@ResponseStatus(value\
    \ = HttpStatus.NOT_FOUND)\n@ResponseBody\npublic JsonError exception(Exception\
    \ ex) {\nreturn new JsonError(ex.getMessage());\n}\n}\n```\n\n控制器通知的范围也可以通过设置\
    \ `basePackageClasses` 属性，限制为某个类或类的层次结构。\n\n```\n...\n@ControllerAdvice(basePackageClasses\
    \ = RestExceptionProcessor.class)\npublic class RestExceptionProcessor {\n@ExceptionHandler\n\
    @ResponseStatus(value = HttpStatus.NOT_FOUND)\n@ResponseBody\npublic JsonError\
    \ exception(UserException ex) {\nreturn new JsonError(ex.getMessage());\n}\n}\n\
    ```\n\nHTTP 消息转换器\n\n前面介绍的 `@ResponseBody` 也用于帮助理解客户端和服务器之间的 REST 消息格式。如本节开头所述，资源表示可以有多种格式：XML、JSON、HTML\
    \ 等。客户端必须知道要使用的格式，或者向服务器请求一个它能理解的表示形式的资源。表示形式通过 `org.springframework.http.converter.HttpMessageConverter<T>`\
    \ 接口的实现转换为 HTTP 请求和从 HTTP 响应转换而来。在配置了 `<mvc:annotation-driven/>` 或 `@EnableWebMvc`\
    \ 的应用程序中，Spring 会自动检测并使用消息转换器。在本章的代码示例中，表示形式为 JSON 格式，因此使用了 `MappingJackson2HttpMessageConverter`。Spring\
    \ 自带了一个广泛的默认支持的消息转换器列表，但在需要时，开发人员可以提供自己的 `HttpMessageConverter<T>` 实现。以下是最常用的消息转换器及其处理的数据类型列表：\n\
    \n表 7-5.\n\n消息转换器表\n\n消息转换器\n |\n  数据类型\n |\n  说明\n |\n\n| --- | --- | --- | ---\
    \ | --- | --- | --- |\n\nStringHttpMessageConverter\n |\n  text/plain\n |\n  \
    \ |\n\nMappingJackson2HttpMessageConverter\n |\n  application/*+json\n |\n  仅当\
    \ Jackson 2 存在于类路径中时\n |\n\nAtomFeedHttpMessageConverter\n |\n  application/atom+xml\n\
    \ |\n  仅当 Rome 存在于类路径中时\n |\n\nRssChannelHttpMessageConverter\n |\n  application/rss+xml\n\
    \ |\n  仅当 Rome 存在于类路径中时\n |\n\nMappingJackson2XmlHttpMessageConverter\n |\n  application/*+xml\n\
    \ |\n  仅当 Jackson 2 存在于类路径中时\n |\n\n正如注解名称所明确暗示的那样，`@ResponseBody` 应用于响应，其在控制器方法上的存在告诉\
    \ Spring，在将响应发送到客户端之前，应使用 HTTP 消息转换器对其进行处理。如果该方法需要一个需要由相同 HTTP 转换器处理的参数，则该参数必须使用\
    \ `RequestBody` 进行注解。以一个处理 PUT 请求的控制器方法为例。此方法从客户端接收一个用户表示，该表示必须转换为 `User` 实例，然后才能将其状态更新到数据库中。¹⁷\
    \ 此方法还返回更新后实例的表示，因此它需要同时存在这两个注解。\n\n```\nimport org.springframework.http.MediaType;\n\
    ...\n@RestController\npublic class RestUserController {\n@ResponseStatus(HttpStatus.OK)\n\
    @RequestMapping(value = \"/users/{$username}\",\nmethod = RequestMethod.PUT,\n\
    consumes = MediaType.APPLICATION_JSON_UTF8_VALUE\nproduces = MediaType.APPLICATION_JSON_UTF8_VALUE)\n\
    public User updateByEmail(\n@PathVariable(\"$username\") String username,\n@RequestBody\
    \ User newUser) throws UserException {\nUser user = userService.findByUsername(username);\n\
    if (user == null) {\nthrow new UserException(\"User not found with username \"\
    \ + username);\n}\ncopyProperties(newUser, user);\nuserService.update(user);\n\
    return user;\n}\n...\n}\n```\n\n在前面的示例中，使用了 `@RequestMapping` 的 `consumes` 和 `produces`\
    \ 注解属性。这两个属性用于缩小请求的主要映射范围。\n\n`consumes` 属性定义了映射请求（在服务器端定义）的可消费媒体类型，并且 `Content-Type`\
    \ 标头（在客户端定义）的值必须至少与此属性的一个值匹配，方法才能处理特定的 REST 请求。\n\n`produces` 属性定义了映射请求的可生产媒体类型，从而缩小主要映射范围，并且\
    \ `Accept` 标头（在客户端）的值必须至少与此属性的一个值匹配，方法才能处理特定的 REST 请求。\n\n!"
- fmt: "# Spring MVC Configuration for RESTful Applications\n\nThe approach presented\
    \ above to update a user is far from what you would use in practice. It was designed\
    \ especially to prove how the two attributes work and how they can be used together.\
    \ The example works, though, and you can test it by running the `15-ps-ws-rest-practice`\
    \ project, which is to be used when testing knowledge acquired after traversing\
    \ this section.\n\nA Spring Web RESTful application is basically a Spring MVC\
    \ application, so the configuration is the same as presented in Chapter [6](#A978-1-4842-0811-3_6_Chapter.html):\
    \ Spring Web, no matter whether XML or Java Configuration is used. To support\
    \ a custom HTTP message converter implementation, the dependency must be added\
    \ to the classpath of the application, and a special bean must be declared in\
    \ the configuration. In the following code snippet, the configuration for a Spring\
    \ Web RESTful application is depicted, and it contains a bean of type `MappingJackson2HttpMessageConverter`\
    \ that will be automatically used by Spring to convert objects to JSON representations\
    \ and vice versa.\n\n```\n@Configuration\n@EnableWebMvc\n@ComponentScan(basePackages\
    \ = {\"com.ps.web\", \"com.ps.exs\"})\npublic class WebConfig extends WebMvcConfigurerAdapter\
    \ {\n    //Declare our static resources.\n    @Override\n    public void addResourceHandlers(ResourceHandlerRegistry\
    \ registry) {\n        registry.addResourceHandler(\"/images/**\")\n         \
    \       .addResourceLocations(\"/images/\")\n                // cache them to\
    \ speed up page loading\n                .setCachePeriod(31556926);\n    }\n\n\
    \    @Override\n    public void configureDefaultServletHandling(\n           \
    \ DefaultServletHandlerConfigurer configurer) {\n        configurer.enable();\n\
    \    }\n\n    //One simple view, to confirm the application is up\n    @Override\n\
    \    public void addViewControllers(ViewControllerRegistry registry) {\n     \
    \   registry.addViewController(\"/\").setViewName(\"welcome\");\n    }\n\n   \
    \ @Bean\n    InternalResourceViewResolver getViewResolver(){\n        InternalResourceViewResolver\
    \ resolver = new InternalResourceViewResolver();\n        resolver.setPrefix(\"\
    /WEB-INF/\");\n        resolver.setSuffix(\".jsp\" );\n        return resolver;\n\
    \    }\n\n    @Bean\n    public MappingJackson2HttpMessageConverter\n    mappingJackson2HttpMessageConverter()\
    \ {\n        MappingJackson2HttpMessageConverter\n                mappingJackson2HttpMessageConverter\
    \ =\n                new MappingJackson2HttpMessageConverter();\n        // when\
    \ client is a browser JSON response is displayed indented\n        mappingJackson2HttpMessageConverter.setPrettyPrint(true);\n\
    \        //set encoding of the response\n        mappingJackson2HttpMessageConverter.setDefaultCharset\n\
    \                (StandardCharsets.UTF_8);\n        mappingJackson2HttpMessageConverter.setObjectMapper(objectMapper());\n\
    \        return mappingJackson2HttpMessageConverter;\n    }\n\n    @Bean\n   \
    \ public ObjectMapper objectMapper() {\n        ObjectMapper objMapper = new ObjectMapper();\n\
    \        objMapper.enable(SerializationFeature.INDENT_OUTPUT);\n        objMapper.setSerializationInclusion\n\
    \                (JsonInclude.Include.NON_NULL);\n        return objMapper;\n\
    \    }\n\n    @Override\n    public void configureMessageConverters(\n       \
    \     List> converters) {\n        super.configureMessageConverters(converters);\n\
    \        converters.add(mappingJackson2HttpMessageConverter());\n    }\n}\n```\n\
    \n# Using RestTemplate to Test RESTful Applications\n\nA RESTful application can\
    \ be accessed by any type of client that supports creating the type of request\
    \ supported by the application:[^(18)](#A978-1-4842-0811-3_7_Chapter.html#Fn18)\
    \ browsers, mobile applications, desktop applications, etc. The `RestTemplate`[^(19)](#A978-1-4842-0811-3_7_Chapter.html#Fn19)\
