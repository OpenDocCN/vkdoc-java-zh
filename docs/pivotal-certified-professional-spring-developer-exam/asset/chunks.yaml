    ## 4. Aspect Oriented Programming with Spring


    AOP is an acronym for Aspect Oriented Programming, a term that refers to a type
    of programming that aims to increase modularity by allowing the separation of
    cross-cutting concerns. A cross-cutting concern is a functionality that is tangled
    with business code, which usually cannot be separated from the business logic.
    Auditing, security, and transaction management are good examples of cross cutting
    concerns. They are mingled with the business code, heavily coupled with the functionality
    that might be affected if they fail. These are good candidates for separation
    using aspects, because there is no design pattern that would allow writing the
    code in such a way that they would be separated from the business logic. This
    means that additional behavior is added to existing behavior when the application
    is compiled. So transaction management, security logic, and auditing can be developed
    separately and mingled with the functionality at compile time. This is done by
    defining an advice containing code that will be executed in a location named join
    point specified by a pointcut. This approach allows for code implementing behavior
    that is not related to business logic to be separated from functional code, the
    result being a more modular, less coupled, and less cluttered application.


    The business or base code is not actually changed; you can imagine aspects as
    plugins. They modify the behavior, not the actual implementation.


    AOP is a type of programming that aims to help with separation of cross-cutting
    concerns to increase modularity; it implies declaring an aspect class that will
    alter the behavior of base code, by applying advices to specific join points,
    specified by pointcuts.


    AOP is a complement of OOP (Object Oriented Programming) and they can be used
    together to write powerful applications, because both provide different ways of
    structuring your code. OOP is focused on making everything an object, while AOP
    introduces the aspect, which is a special type of object that injects and wraps
    its behavior to complement the behavior of other objects. Other examples of cross-cutting
    concerns:


    * Caching

    * Internationalization

    * Error detection and correction

    * Memory management

    * Performance monitoring

    * Synchronization


    ### Problems Solved by AOP


    When databases are used to store data, a connection to the database is used to
    interact with the application. The connection to database needs to be opened before
    the communication and closed afterwards, to successfully complete the communication
    with the database. Every database implementation will allow a limited number of
    connections simultaneously; thus connections that are no longer used need to be
    closed, so that others can be opened. Using Spring, a JDBC a repository method
    that looks for a user based on its ID looks similar to the implementation in Figure
    [4-1](#A978-1-4842-0811-3_4_Chapter.html#Fig1):


    ![A978-1-4842-0811-3_4_Fig1_HTML.jpg](A978-1-4842-0811-3_4_Fig1_HTML.jpg)


    #### Figure 4-1.


    Method using JDBC to search for a user based on its ID in a database, with cross-cutting
    concern-specific code highlighted


    The code implementing the opening and closing of the connection is enclosed in
    red rectangles. This code was specifically chosen to underline a cross-cutting
    concern that tangles in the base code, leading to code cluttering. It is not a
    clean solution and not a stable one either, since a big project, database communicating
    methods will be written by different programmers, and it is enough for one to
    make a mistake that leads to connections to the database not being closed correctly,
    and the application might end up not being able to communicate with the database
    because a new connection cannot be opened.


    The example above is quite archaic, and the call diagram for the method above
    is depicted in Figure [4-2](#A978-1-4842-0811-3_4_Chapter.html#Fig2).


    ![A978-1-4842-0811-3_4_Fig2_HTML.jpg](A978-1-4842-0811-3_4_Fig2_HTML.jpg)


    #### Figure 4-2.


    UML call diagram for the JDBC method extracting a user by its ID


    Complicated, right? AOP can help decouple the connection management code from
    the business code. Using AOP, the previous diagram should be reduced to something
    like what is depicted in Figure [4-3](#A978-1-4842-0811-3_4_Chapter.html#Fig3).


    ![A978-1-4842-0811-3_4_Fig3_HTML.jpg](A978-1-4842-0811-3_4_Fig3_HTML.jpg)


    #### Figure 4-3.


    Conceptual schema for the `findById()` method with AOP


    The schema in the previous image is a conceptual one, and it depicts the basic
    idea. AOP components intercept calls to certain objects and inject their own functionality,
    without being strongly connected to the initial target, and they do so in a transparent
    way.


    There are not many applications left that use JDBC components directly. Currently
    there are frameworks that provide classes to manage the connections for you, so
    you do not have to write all that code. For example, in Spring, the class `org.springframework.jdbc.core.JdbcTemplate`
    does that for you, and it will be covered in Chapter [5](http://link.springer.com/search?facet-content-type=ReferenceWorkEntry&query=5):
    Data Access. Repository components can be created based on `JdbcTemplate` instances,
    and database connections are managed by connection pool components. Connection
    pooling is a technique of reusing connections: when a connection is closed, it
    can reside in memory to be reused the next time a connection is required, eliminating
    the cost of creating a new connection. But using connections directly is cumbersome,
    because application crashes can lead to inconsistent data. Aside from connections,
    applications use transactions to group database operations in units of work. When
    all operations have completed successfully, the transaction is committed, and
    the changes are persisted into the database. If one operation fails, the transaction
    is rolled back, leaving the database untouched.


    In this case, transactions become a cross-cutting concern because a method that
    is supposed to be called into a transaction has to obtain a transaction, open
    it, perform its actions, and then commit the transaction.'
