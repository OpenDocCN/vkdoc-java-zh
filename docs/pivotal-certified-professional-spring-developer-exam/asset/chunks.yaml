    #### Bean Scopes


    And since the subject of destroying beans was covered, how much a bean can live
    will be covered, also known as the bean scope. As you probably noticed, when a
    context closes, in the log you always see this:


    ```

    DEBUG o.s.b.f.s.DefaultListableBeanFactory - Destroying singletons in org.springframework.beans.factory.support.DefaultListableBeanFactory@10e92f8f:
    defining beans simpleBean1,simpleBean2,complexBean, o.s.c.a.internalConfigurationAnnotationProcessor...

    ```


    So, Spring refers to the beans as singletons, because that is the default scope
    of a bean.[^(15)](#A978-1-4842-0811-3_2_Chapter.html#Fn15) When the Spring IoC
    instantiates beans, it creates a single instance for each bean, unless a property
    is set on the bean definition specifying otherwise. The property in question is
    called `scope`, and the default scope for a bean is `singleton`. The scopes are
    defined in Table [2-2](#A978-1-4842-0811-3_2_Chapter.html#Tab2).


    Table 2-2.


    Bean scopes


    | Scope | Description |

    | --- | --- |

    | `Singleton` | The Spring IoC creates a single instance of this bean, and any
    request for beans with an id or ids matching this bean definition results in this
    instance being returned. |

    | `Prototype` | Every time a request is made for this specific bean, the Spring
    IoC creates a new instance. |

    | `Request` | The Spring IoC creates a bean instance for each HTTP request. Only
    valid in the context of a web-aware Spring ApplicationContext. |

    | `Session` | The Spring IoC creates a bean instance for each HTTP session. Only
    valid in the context of a web-aware Spring ApplicationContext. |

    | `global-session` | The Spring IoC creates a bean instance for each global HTTP
    session. Only valid in the context of a web-aware Spring ApplicationContext. |

    | Custom | Developers are provided the possibility to define their own scopes
    with their own rules. |


    So when a bean is created without a scope attribute:


    ```


    The default scope is `singleton` .

    Otherwise, the scope of the bean is the one specified by the value of

    the scope attribute.


    ```


    Now that we know that more beans scopes are available, how do we solve

    dependencies between different scopes? When we have a `prototype` bean

    depending on a `singleton`, there is

    no problem. Every time the prototype bean is requested from the context,

    a new instance is created, and the singleton bean is injected into it.

    But in other cases, things get a little complicated.


    The domain that is most sensitive when it comes to dependencies among

    beans with different scopes is the Web Applications domain. As you

    probably noticed in the bean scope table, there are three bean scopes

    designed to be used in web applications: `request`, `session`, and `global-session`.
    Let’s

    assume that we have a service bean called ThemeManager that manages

    updates on an object of type `UserSettings`

    containing the settings that a User has for an interface in a web

    application. This means that the `ThemeManager` bean has

    to work with a different `UserSettings` bean for

    each HTTP session. Obviously, this means that the `UserSettings` bean

    should have the scope session:


    But how can the problem with single instantiation mentioned earlier can

    be solved? On different HTTP sessions, methods like `themeManager.saveSettings(userSettings)`

    should be called with the `userSettings` bean

    specific to that session. But the configuration above does not allow for

    this to happen.


    Spring has a solution to this problem. The Spring IoC container not only

    handles bean instantiation, but also injecting dependencies. If only it

    could be instructed to reinject the proper dependency when needed! A

    behavior similar to this can be configured as follows:'
