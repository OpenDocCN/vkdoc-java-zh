    \n此外，Mockito 还提供了匹配器，可用于替换模拟环境准备所需的任何变量。这些匹配器是 `org.mockito.Mockito` 类中的静态方法，可以调用它们将任何参数替换为所需类型的伪值。对于常见类型，方法名称以\
    \ `any` 为前缀（例如 `anyString()`, `anyLong()` 等），而对于其他所有对象类型，则可以使用 `any(Class<T>)`。因此，下面这行代码\n\
