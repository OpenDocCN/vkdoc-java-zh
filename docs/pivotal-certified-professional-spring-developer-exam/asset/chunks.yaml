  trans: "\n远程服务器和客户端的配置可以通过 XML 或 Java 配置来完成。将要远程暴露的服务是定义在 `09-ps-data-jpa` 项目中的一个服务\
    \ bean，它使用 Spring Repository 来创建和查询用户。为了使用 Spring 设置通过 JRMP 协议通信的客户端和服务器端远程应用程序，需要执行以下步骤：\n\
    \n1.  配置一个继承自 `org.springframework.remoting.rmi.RmiServiceExporter` 的 bean。\n\
    \    使用 XML 配置：\n\n使用 Java 配置：\n\n```\n    //RmiServerConfig.java\n    import\
    \ org.springframework.remoting.rmi.RmiServiceExporter;\n    ...\n    @Configuration\n\
    \    public class RmiServerConfig {\n    @Autowired\n    @Qualifier(\"userServiceImpl\"\
    )\n    UserService userService;\n    @Bean\n    public RmiServiceExporter userService()\
    \ {\n    RmiServiceExporter exporter = new RmiServiceExporter();\n    exporter.setRegistryPort(1099);\n\
    \    exporter.setAlwaysCreateRegistry(true);\n    exporter.setServiceName(\"userService\"\
    );\n    exporter.setServiceInterface(UserService.class);\n    exporter.setService(userService);\n\
    \    return exporter;\n    }\n    }\n    ```\n\n前面定义的两个 bean 都设置了以下属性：\n\n*  \
    \ `registryPort` –\n        导出 RMI 服务的注册表端口，默认值为 1099，因此此属性不是必须设置的，示例中使用它仅出于教学目的。\n\
    \n*   `alwaysCreateRegistry`\n        – 此属性的默认值为 `false`。当客户端请求 RMI 服务时，会查找现有的注册表，如果未找到，则会创建它。如果此属性设置为\
    \ true，则会在客户端请求时创建注册表，以避免在没有客户端需要时查找现有注册表的开销。由于此属性的默认值为 `false`，因此应用程序开发者无需显式配置它。\n\
    \n*   `serviceName` –\n        导出的 RMI 服务默认可以通过以下模板标识的位置访问：`rmi://host:port/serviceName`。服务名称由此属性设置，并且必须由应用程序开发者显式设置。\n\
    \n*   `serviceInterface` –\n        此属性用于设置将作为 RMI 服务暴露的 bean 类型的接口；它必须由应用程序开发者显式设置。\n\
    \n*   `service` – 此属性用于设置将作为 RMI 服务暴露的 bean；它必须由应用程序开发者显式设置。\n\n2.  创建一个服务器端应用程序，该应用程序将包含远程导出的\
    \ bean 以及需要远程访问的应用程序 bean。\n\n使用 XML 配置，配置如下代码片段所示。\n\n```\n    import org.springframework.context.support.ClassPathXmlApplicationContext;\n\
    \    public class RmiExporterBootstrap {\n    public static void main(String args)\
    \ throws Exception {\n    ClassPathXmlApplicationContext ctx =\n    new ClassPathXmlApplicationContext(\n\
    \    \"spring/rmi-server-config.xml\",\n    \"spring/app-config.xml\");\n    System.out.println(\"\
    RMI server started.\");\n    System.in.read();\n    ctx.close();\n    }\n    }\n\
    \    ```\n\n`app-config.xml`\n    包含需要在远程服务器上执行的所有服务和仓库 bean。\n\n使用 Java 配置，在\
    \ RmiExporterBootstrap 类中声明的上下文需要按以下示例定义：\n\n```\n    import com.ps.config.ServiceConfig;\n\
    \    import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
    \    public class RmiExporterBootstrap {\n    public static void main(String args)\
    \ throws Exception {\n    AnnotationConfigApplicationContext ctx =\n    new AnnotationConfigApplicationContext(\n\
    \    RmiServerConfig.class, ServiceConfig.class);\n    System.out.println(\"RMI\
    \ reward network server started.\");\n    System.in.read();\n    ctx.close();\n\
    \    }\n    }\n    ```\n\n通过执行 `RmiExporterBootstrap`\n    类，将启动一个 Java 进程，该进程将在端口\
    \ 1099 上提供一个名为\n    `userService` 的 RMI 服务。\n    `System.in.read();` 用于保持进程运行，直到用户按下某个键。\n\
    \n3.  配置一个类型为 `org.springframework.remoting.rmi.RmiProxyFactoryBean` 的 bean，它将负责创建客户端访问\
    \ RMI 服务所需的代理对象。使用 XML 配置，配置如下代码片段所示。\n\n使用 Java 配置的相同配置可以这样编写：\n\n```\n    //RmiClientConfig.java\n\
    \    import org.springframework.remoting.rmi.RmiProxyFactoryBean;\n    @Configuration\n\
    \    public class RmiClientConfig {\n    @Bean\n    public UserService userService()\
    \ {\n    RmiProxyFactoryBean factoryBean = new RmiProxyFactoryBean();\n    factoryBean.setServiceInterface(UserService.class);\n\
    \    factoryBean.setServiceUrl(\"rmi://localhost:1099/userService\");\n    factoryBean.afterPropertiesSet();\n\
    \    return (UserService) factoryBean.getObject();\n    }\n    }\n    ```\n\n\
    在创建代理 bean 之前，必须初始化工厂 bean，这就是为什么在 Java 配置中必须显式调用 `afterPropertiesSet()` 方法的原因。`serviceUrl`\
    \ 属性将设置为服务器提供 RMI 服务的 URL，而 `serviceInterface` 属性应设置为 RMI 服务器 bean 所实现的接口。这个接口就是工厂\
    \ bean 创建的代理将实现的接口，以允许客户端在服务器 `userService` bean 上调用远程方法。这就是为什么在该方法的最后一行，`factoryBean.getObject()`\
    \ 返回的对象被转换为 `UserService`。\n\n4.  创建一个将使用客户端工厂 bean 的客户端应用程序。最简单的方法是创建一个测试类，并注入\
    \ `RmiProxyFactoryBean` 将创建的客户端代理 bean：\n\n```\n    //RmiTests.java\n    @ContextConfiguration(locations\
    \ = {\"classpath:spring/rmi-client-config.xml\"})\n    @RunWith(SpringJUnit4ClassRunner.class)\n\
    \    public class RmiTests {\n    @Autowired\n    private UserService userService;\n\
    \    public void setUp() {\n    assertNotNull(userService);\n    }\n    @Test\n\
    \    public void testRmiAll() {\n    List users = userService.findAll();\n   \
    \ assertEquals(5, users.size());\n    }\n    @Test\n    public void testRmiJohn()\
    \ {\n    User user = userService.findByEmail(\"john.cusack@pet.com\");\n    assertNotNull(user);\n\
    \    }\n    }\n    ```\n\n为了确认客户端确实使用了代理 bean，你只需在调试模式下运行其中一个测试方法，在断点处停止执行，然后查看\
    \ `userService` bean。在图 7-5 中，展示了一张 Intellij IDEA 测试执行的截图。你可以清楚地看到 `userService`\
    \ 实际上是由 `RmiProxyFactoryBean` 创建的 RMI 代理。\n\n![A978-1-4842-0811-3_7_Fig5_HTML.jpg](img/A978-1-4842-0811-3_7_Fig5_HTML.jpg)\n\
    \n图 7-5.\n\n在调试模式下执行的 RMI 测试截图\n\n如果使用 Java 配置，`@ContextConfiguration` 声明必须更改为以下内容：\n\
    \n```\n@ContextConfiguration(classes = RmiClientConfig.class)\n```\n"
- fmt: "# Spring RMI and HTTP Remoting\n\nAs you can notice when implementing and\
    \ accessing RMI services, Spring can be used in the same declarative way as presented\
    \ so far. This means that existing beans can be exposed as RMI services without\
    \ modifying their code. Thus, the server interface is not required to implement\
    \ the `Remote` interface. On the client side, using polymorphism, methods can\
    \ be called directly on the injected bean, and the Spring remoting exceptions\
    \ are unchecked (there is a hierarchy of remoting exceptions all extending `org.springframework.remoting.RemoteAccessException`),\
    \ so the code to catch and handle them does not have to be written.\n\nSpring\
    \ `RmiServiceExporter` and `RmiProxyFactoryBean` can be used with multiple protocols.\
    \ Spring provides classes that allow exposing RMI services over HTTP, using a\
    \ lightweight binary HTTP-based protocol. The classes to use are `HttpInvokerProxyFactoryBean`\
    \ and `HttpInvokerServiceExporter`. RMI methods will be converted to HTTP methods:\
    \ GET and POST. The result of these methods is returned as an HTTP result. Method\
    \ parameters and results are serialized using Java serialization, so transferred\
    \ objects need to be serializable. Spring's `HttpInvoker` is another Java-to-Java\
    \ binary remoting protocol; it requires that Spring be used on both the server\
    \ and the client.\n\nAside from these two classes used with RMI over HTTP, there\
    \ are two other protocols that Spring supports: the `Hessian` lightweight binary\
    \ HTTP-based protocol provided by Caucho and `Burlap`, which is the XML-based\
    \ alternative to Hessian. `Hessian` protocol is a slim binary cross-platform remoting\
    \ protocol. Most cross-platform protocols are XML-based, and thus sacrifice a\
    \ significant amount of performance to achieve interoperability. `Hessian` managed\
    \ to achieves cross-platform interoperability with minimal performance degradation.\n\
    \nClasses for each of the protocols are provided by Spring: `HessianProxyFactoryBean`\
    \ and `HessianServiceExporter` for Hessian and `BurlapProxyFactoryBean` and `BurlapServiceExporter`\
    \ for Burlap. Basically, to write a Spring RMI application over the HTTP protocol,\
    \ the RMI specific classes for creating a proxy on the client side and for exposing\
    \ a service on the server side must be replaced with HTTP Spring-specific classes,\
    \ and the server must be run in a container, such as Apache Tomcat or Jetty. Figure\
    \ [7-6](#A978-1-4842-0811-3_7_Chapter.html#Fig6) should look familiar; it describes\
    \ the abstract schema for using the Spring Http Invoker classes.\n\n![A978-1-4842-0811-3_7_Fig6_HTML.jpg](A978-1-4842-0811-3_7_Fig6_HTML.jpg)\n\
    \n**Figure 7-6.** Spring remoting abstract schema\n\nWhether the configuration\
    \ is done in XML or using Java Configuration, on the server side, a bean of type\
    \ `HttpInvokerServiceExporter` must be configured.\n\n```java\n// HttpInvokerConfig.java\n\
    @Configuration\npublic class HttpInvokerConfig {\n    @Autowired\n    @Qualifier(\"\
    userServiceImpl\")\n    UserService userService;\n\n    @Bean(name = \"/httpInvoker/userService\"\
    )\n    HttpInvokerServiceExporter httpInvokerServiceExporter(){\n        HttpInvokerServiceExporter\
    \ invokerService = new HttpInvokerServiceExporter();\n        invokerService.setService(userService);\n\
    \        invokerService.setServiceInterface(UserService.class);\n        return\
    \ invokerService;\n    }\n}\n```\n\nThe `/httpInvoker/userService` is the URL\
    \ where the HTTP Service is exposed. On the client side, a bean of type `HttpInvokerProxyFactoryBean`\
    \ must be configured.\n\n```java\n//HttpInvokerClientConfig.java\n@Configuration\n\
    public class HttpInvokerClientConfig {\n    @Bean\n    public UserService userService()\
    \ {\n        HttpInvokerProxyFactoryBean factoryBean = new HttpInvokerProxyFactoryBean();\n\
    \        factoryBean.setServiceInterface(UserService.class);\n        factoryBean.setServiceUrl(\"\
    http://localhost:8080/invoker/httpInvoker/userService\");\n        factoryBean.afterPropertiesSet();\n\
    \        return (UserService) factoryBean.getObject();\n    }\n}\n```\n\nThe properties\
    \ for the Spring Http Invoker classes have the same meaning as for the RMI Spring\
    \ classes; the only difference is that they apply to the HTTP protocol. As you\
    \ probably noticed, the service URL is not an RMI URL, but an HTTP URL made from\
    \ the web application URL `http://hostname:port/context` concatenated with the\
    \ name of the invoker service bean. In the current example, the application context,\
    \ the URL where the servlet handling HTTP requests is mapped is `/invoker`, and\
    \ the invoker bean name is `/httpInvoker/userService`.\n\nThe web application\
    \ that exposes the invoker service does not need a complex web interface, which\
    \ is why the `DispatcherServlet` with a full-blown MVC configuration is not needed.\
    \ All that is needed is a servlet to intercept requests, and `org.springframework.web.context.support.HttpRequestHandlerServlet`\
    \ is suitable for the job. The configuration for a web application was already\
    \ covered in Chapter [6](#A978-1-4842-0811-3_6_Chapter.html).\n\n```xml\n<servlet>\n\
    \    <servlet-name>invoker</servlet-name>\n    <servlet-class>org.springframework.web.context.support.HttpRequestHandlerServlet</servlet-class>\n\
    \    <init-param>\n        <param-name>contextClass</param-name>\n        <param-value>org.springframework.web.context.support.AnnotationConfigWebApplicationContext</param-value>\n\
    \    </init-param>\n    <init-param>\n        <param-name>contextConfigLocation</param-name>\n\
    \        <param-value>com.ps.remoting.config.HttpInvokerConfig</param-value>\n\
    \    </init-param>\n</servlet>\n\n<servlet-mapping>\n    <servlet-name>invoker</servlet-name>\n\
    \    <url-pattern>/*</url-pattern>\n</servlet-mapping>\n```\n\nTo test the service\
    \ exposed over HTTP, the previous test class can be used. Only the configuration\
    \ file or class must be changed. In the code snippet below you can see all configurations\
    \ that can be used on the client test class. Since all the client needs is the\
    \ interface type of the proxy, where the proxy points is decided by the configuration.\n\
    \n```java\n//@ContextConfiguration(locations = {\"classpath:spring/rmi-client-config.xml\"\
    })\n//@ContextConfiguration(classes = RmiClientConfig.class)\n//@ContextConfiguration(locations\
    \ = {\"classpath:spring/httpinvoker-client-config.xml\"})\n@ContextConfiguration(classes\
    \ = HttpInvokerClientConfig.class)\n@RunWith(SpringJUnit4ClassRunner.class)\n\
    public class RmiTests {\n    ...\n}\n```\n\nTo make sure the client actually uses\
    \ an http invoker proxy bean, you just have to run one of the test methods in\
    \ debug, stop the execution at a breakpoint, and take a peek at the `userService`\
    \ bean. In Figure [7-7](#A978-1-4842-0811-3_7_Chapter.html#Fig7), a screenshot\
    \ from an Intellij IDEA test execution is depicted. You can clearly see that the\
    \ `userService` is actually an Http Invoker proxy created by the `HttpInvokerProxyFactoryBean`.\n\
    \n![A978-1-4842-0811-3_7_Fig7_HTML.jpg](A978-1-4842-0811-3_7_Fig7_HTML.jpg)\n\n\
    **Figure 7-7.** Screenshot of an HTTP Invoker test executed in debug mode\n\n\
    Hessian has been maintained and is still used with Spring 4. Currently in a draft\
    \ state, Hessian 2 is the second incarnation of the Hessian protocol, but it is\
    \ clearly not production ready. Burlap has not been maintained in a while, and\
    \ in Spring 4, the Burlap Spring-specific classes `BurlapProxyFactoryBean` and\
    \ `BurlapServiceExporter` are marked as deprecated and might be removed in Spring\
    \ 5.\n\nThe Hessian-specific configuration is depicted in the following code snippet\
    \ (XML and Java Configuration).\n\nTo test the Hessian remote service, just edit\
    \ the `RmiTests` class and use the following configuration:\n\n```java\n@ContextConfiguration(locations\
    \ = {\"classpath:spring/hessian-client-config.xml\"})\n@RunWith(SpringJUnit4ClassRunner.class)\n\
    public class RmiTests {\n    ...\n}\n```"
  raw: 'As you can notice when implementing and accessing RMI services, Spring

    can be used in the same declarative way as presented so far. This means

    that existing beans can be exposed as RMI services without modifying

    their code. Thus, the server interface is not required to implement the

    `Remote`

    interface. On the client side, using polymorphism, methods can be called

    directly on the injected bean, and the Spring remoting exceptions are

    unchecked (there is a hierarchy of remoting exceptions all extending

    `org.springframework.remoting.RemoteAccessException`),

    so the code to catch and handle them does not have to be written.


    Spring `RmiServiceExporter`

    and `RmiProxyFactoryBean`

    can be used with multiple protocols. Spring provides classes that allow

    exposing RMI services over HTTP, using a lightweight binary HTTP-based

    protocol. The classes to use are `HttpInvokerProxyFactoryBean`

    and `HttpInvokerServiceExporter`.

    RMI methods will be converted to HTTP methods: GET and POST. The result

    of these methods is returned as an HTTP result. Method parameters and

    results are serialized using Java serialization, so transferred objects

    need to be serializable. Spring’s HttpInvoker is another Java-to-Java

    binary remoting protocol; it requires that Spring be used on both the

    server and the client.


    Aside from these two classes used with RMI over HTTP, there are two

    other protocols that Spring supports: the `Hessian` lightweight

    binary HTTP-based protocol provided by Caucho and `Burlap`, which is the

    XML-based alternative to Hessian. Hessian protocol is a slim binary

    cross-platform remoting protocol. Most cross-platform protocols are

    XML-based, and thus sacrifice a significant amount of performance to

    achieve interoperability. Hessian managed to achieves cross-platform

    interoperability with minimal performance degradation.


    Classes for each of the protocols are provided by Spring: `HessianProxyFactoryBean`

    and the `HessianServiceExporter`

    for Hessian and `BurlapProxyFactoryBean`

    and `BurlapServiceExporter`

    for Burlap. Basically, to write a Spring RMI application over the HTTP

    protocol, the RMI specific classes for creating a proxy on the client

    side and for exposing a service on the server side must be replaced with

    HTTP Spring-specific classes, and the server must be run in a container,

    such as Apache Tomcat or Jetty. Figure [7-6](#A978-1-4842-0811-3_7_Chapter.html#Fig6)
    should

    look familiar; it describes the abstract schema for using the Spring

    Http Invoker classes.


    ![A978-1-4842-0811-3_7_Fig6_HTML.jpg](A978-1-4842-0811-3_7_Fig6_HTML.jpg)


    Figure 7-6.


    Spring remoting abstract schema


    Whether the configuration is done in XML or using Java Configuration, on

    the server side, a bean of type `HttpInvokerServiceExporter`

    must be configured.


    ```


    // HttpInvokerConfig.java

    @Configuration

    public class HttpInvokerConfig {

    @Autowired

    @Qualifier("userServiceImpl")

    UserService userService;

    @Bean(name = "/httpInvoker/userService")

    HttpInvokerServiceExporter httpInvokerServiceExporter(){

    HttpInvokerServiceExporter invokerService = new HttpInvokerServiceExporter();

    invokerService.setService(userService);

    invokerService.setServiceInterface(UserService.class);

    return invokerService;

    }

    }

    ```


    The `/httpInvoker/userService`

    is the URL where the HTTP Service is exposed. On the client side, a bean

    of type `HttpInvokerProxyFactoryBean`

    must be configured.


    ```


    //HttpInvokerClientConfig.java

    @Configuration

    public class HttpInvokerClientConfig {

    @Bean

    public UserService userService() {

    HttpInvokerProxyFactoryBean factoryBean = new HttpInvokerProxyFactoryBean();

    factoryBean.setServiceInterface(UserService.class);

    factoryBean.setServiceUrl

    ("http://localhost:8080/invoker/httpInvoker/userService");

    factoryBean.afterPropertiesSet();

    return (UserService) factoryBean.getObject();

    }

    }

    ```


    The properties for the Spring Http Invoker classes have the same meaning

    as for the RMI Spring classes; the only difference is that they apply to

    the HTTP protocol. As you probably noticed, the service URL is not an

    RMI URL, but an HTTP URL made from the web application URL [`http://hostname:port/context`]

    concatenated with the name of the invoker service bean. In the current

    example, the application context, the URL where the servlet handling

    HTTP requests is mapped is `/invoker`, and the

    invoker bean name is `/httpInvoker/userService`.


    The web application that exposes the invoker service does not need a

    complex web interface, which is why the `DispatcherServlet`

    with a full-blown MVC configuration is not needed. All that is needed is

    a servlet to intercept requests, and `org.springframework.web.context.support.HttpRequestHandlerServlet`

    is suitable for the job. The configuration for a web application was

    already covered in Chapter [6](#A978-1-4842-0811-3_6_Chapter.html) .


    ```

    invoker


    org.springframework.web.context.support.HttpRequestHandlerServlet


    contextClass


    org.springframework.web.context.support.AnnotationConfigWebApplicationContext


    contextConfigLocation


    com.ps.remoting.config.HttpInvokerConfig


    invoker

    /*


    ```


    To test the service exposed over HTTP, the previous test class can be

    used. Only the configuration file or class must be changed. In the code

    snippet below you can see all configurations that can be used on the

    client test class. Since all the client needs is the interface type of

    the proxy, where the proxy points is decided by the configuration.


    ```

    //@ContextConfiguration(locations = {"classpath:spring/rmi-client-config.xml"})

    //@ContextConfiguration(classes = RmiClientConfig.class)

    //@ContextConfiguration(locations = {"classpath:spring/httpinvoker-client-config.xml"})

    @ContextConfiguration(classes = HttpInvokerClientConfig.class)

    @RunWith(SpringJUnit4ClassRunner.class)

    public class RmiTests {

    ...

    }

    ```


    To make sure the client actually uses an http invoker proxy bean, you

    just have to run one of the test methods in debug, stop the execution at

    a breakpoint, and take a peek at the `userService` bean. In

    Figure [7-7](#A978-1-4842-0811-3_7_Chapter.html#Fig7), a

    screenshot from an Intellij IDEA test execution is depicted. You can

    clearly see that the `userService` is

    actually an Http Invoker proxy created by the `HttpInvokerProxyFactoryBean`.


    ![A978-1-4842-0811-3_7_Fig7_HTML.jpg](A978-1-4842-0811-3_7_Fig7_HTML.jpg)


    Figure 7-7.


    Screenshot of an HTTP Invoker test executed in debug mode


    Hessian has been maintained and is still used with Spring 4\. Currently

    in a draft state, Hessian 2 is the second incarnation of the Hessian

    protocol, but it is clearly not production ready. Burlap has not been

    maintained in a while, and in Spring 4, the Burlap Spring-specific

    classes `BurlapProxyFactoryBean`

    and `BurlapServiceExporter`

    are marked as deprecated and might be removed in Spring 5.


    The Hessian-specific configuration is depicted in the following code

    snippet. (XML and Java Configuration).


    To test the Hessian remote service, just edit the `RmiTests` class and

    use the following configuration:


    ```

    @ContextConfiguration(locations = {"classpath:spring/ hessian-client-config.xml"})

    @RunWith(SpringJUnit4ClassRunner.class)

    public class RmiTests {

    ...

    }

    ```'
  trans: '

    在实现和访问 RMI 服务时，你可以注意到，Spring 可以像之前介绍的那样以声明式方式使用。这意味着，无需修改现有 Bean 的代码，即可将其暴露为 RMI
    服务。因此，服务端接口无需实现 `Remote` 接口。在客户端，利用多态性，可以直接在注入的 Bean 上调用方法，并且 Spring 远程调用异常是未检查异常（存在一个远程调用异常层次结构，所有异常都继承自
    `org.springframework.remoting.RemoteAccessException`），因此无需编写捕获和处理它们的代码。


    Spring 的 `RmiServiceExporter` 和 `RmiProxyFactoryBean` 可用于多种协议。Spring 提供了相关类，允许通过
    HTTP 暴露 RMI 服务，使用一种基于 HTTP 的轻量级二进制协议。要使用的类是 `HttpInvokerProxyFactoryBean` 和 `HttpInvokerServiceExporter`。RMI
    方法将被转换为 HTTP 方法：GET 和 POST。这些方法的结果将作为 HTTP 结果返回。方法参数和结果使用 Java 序列化进行序列化，因此传输的对象需要是可序列化的。Spring
    的 HttpInvoker 是另一种 Java 到 Java 的二进制远程调用协议；它要求在服务器端和客户端都使用 Spring。


    除了这两个用于通过 HTTP 使用 RMI 的类之外，Spring 还支持另外两种协议：Caucho 提供的 `Hessian` 轻量级基于 HTTP 的二进制协议，以及
    `Burlap`，它是 Hessian 的基于 XML 的替代方案。Hessian 协议是一种精简的二进制跨平台远程调用协议。大多数跨平台协议都是基于 XML
    的，因此为了达到互操作性而牺牲了相当多的性能。Hessian 以最小的性能损失实现了跨平台互操作性。


    Spring 为每种协议提供了相应的类：用于 Hessian 的 `HessianProxyFactoryBean` 和 `HessianServiceExporter`，以及用于
    Burlap 的 `BurlapProxyFactoryBean` 和 `BurlapServiceExporter`。基本上，要编写一个基于 HTTP 协议的
    Spring RMI 应用程序，必须将用于在客户端创建代理和在服务器端暴露服务的 RMI 特定类替换为 Spring HTTP 特定类，并且服务器必须在容器（如
    Apache Tomcat 或 Jetty）中运行。图 7-6 应该看起来很熟悉；它描述了使用 Spring Http Invoker 类的抽象模式。


    ![A978-1-4842-0811-3_7_Fig6_HTML.jpg](img/A978-1-4842-0811-3_7_Fig6_HTML.jpg)


    图 7-6.


    Spring 远程调用抽象模式


    无论配置是通过 XML 还是使用 Java 配置完成的，在服务器端，都必须配置一个类型为 `HttpInvokerServiceExporter` 的 Bean。


    ```

    // HttpInvokerConfig.java

    @Configuration

    public class HttpInvokerConfig {

    @Autowired

    @Qualifier("userServiceImpl")

    UserService userService;

    @Bean(name = "/httpInvoker/userService")

    HttpInvokerServiceExporter httpInvokerServiceExporter(){

    HttpInvokerServiceExporter invokerService = new HttpInvokerServiceExporter();

    invokerService.setService(userService);

    invokerService.setServiceInterface(UserService.class);

    return invokerService;

    }

    }

    ```


    `/httpInvoker/userService` 是 HTTP 服务暴露的 URL。在客户端，必须配置一个类型为 `HttpInvokerProxyFactoryBean`
    的 Bean。


    ```

    //HttpInvokerClientConfig.java

    @Configuration

    public class HttpInvokerClientConfig {

    @Bean

    public UserService userService() {

    HttpInvokerProxyFactoryBean factoryBean = new HttpInvokerProxyFactoryBean();

    factoryBean.setServiceInterface(UserService.class);

    factoryBean.setServiceUrl

    ("http://localhost:8080/invoker/httpInvoker/userService");

    factoryBean.afterPropertiesSet();

    return (UserService) factoryBean.getObject();

    }

    }

    ```


    Spring Http Invoker 类的属性与 RMI Spring 类的属性含义相同；唯一的区别是它们应用于 HTTP 协议。你可能已经注意到，服务
    URL 不是 RMI URL，而是由 Web 应用程序 URL [`http://hostname:port/context`] 与调用器服务 Bean 的名称拼接而成的
    HTTP URL。在当前示例中，应用程序上下文（即处理 HTTP 请求的 Servlet 映射到的 URL）是 `/invoker`，而调用器 Bean 的名称是
    `/httpInvoker/userService`。


    暴露调用器服务的 Web 应用程序不需要复杂的 Web 界面，这就是为什么不需要带有完整 MVC 配置的 `DispatcherServlet`。所需要的只是一个拦截请求的
    Servlet，而 `org.springframework.web.context.support.HttpRequestHandlerServlet`
    非常适合这项工作。Web 应用程序的配置已在第 6 章中介绍过。


    ```

    invoker


    org.springframework.web.context.support.HttpRequestHandlerServlet


    contextClass


    org.springframework.web.context.support.AnnotationConfigWebApplicationContext


    contextConfigLocation


    com.ps.remoting.config.HttpInvokerConfig


    invoker

    /*


    ```


    要测试通过 HTTP 暴露的服务，可以使用之前的测试类。只需更改配置文件或类即可。在下面的代码片段中，你可以看到可以在客户端测试类上使用的所有配置。由于客户端只需要代理的接口类型，而代理指向的位置由配置决定。


    ```

    //@ContextConfiguration(locations = {"classpath:spring/rmi-client-config.xml"})

    //@ContextConfiguration(classes = RmiClientConfig.class)

    //@ContextConfiguration(locations = {"classpath:spring/httpinvoker-client-config.xml"})

    @ContextConfiguration(classes = HttpInvokerClientConfig.class)

    @RunWith(SpringJUnit4ClassRunner.class)

    public class RmiTests {

    ...

    }

    ```


    为了确保客户端实际使用了 http invoker 代理 Bean，你只需以调试模式运行其中一个测试方法，在断点处停止执行，然后查看 `userService`
    Bean。在图 7-7 中，展示了来自 Intellij IDEA 测试执行的屏幕截图。你可以清楚地看到 `userService` 实际上是由 `HttpInvokerProxyFactoryBean`
    创建的 Http Invoker 代理。


    ![A978-1-4842-0811-3_7_Fig7_HTML.jpg](img/A978-1-4842-0811-3_7_Fig7_HTML.jpg)


    图 7-7.


    在调试模式下执行的 HTTP Invoker 测试屏幕截图


    Hessian 一直得到维护，并且仍在 Spring 4 中使用。目前处于草案状态的 Hessian 2 是 Hessian 协议的第二个版本，但显然尚未准备好用于生产环境。Burlap
    已经有一段时间没有维护了，在 Spring 4 中，Burlap 的 Spring 特定类 `BurlapProxyFactoryBean` 和 `BurlapServiceExporter`
    已被标记为已弃用，并可能在 Spring 5 中被移除。


    Hessian 特定的配置如下面的代码片段所示（XML 和 Java 配置）。


    要测试 Hessian 远程服务，只需编辑 `RmiTests` 类并使用以下配置：


    ```

    @ContextConfiguration(locations = {"classpath:spring/ hessian-client-config.xml"})

    @RunWith(SpringJUnit4ClassRunner.class)

    public class RmiTests {

    ...

    }

    ```

