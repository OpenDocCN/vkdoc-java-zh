    \ of that session. So\neven if the session is intercepted and data from it is\
    \ used by an\nattacker to access the site, by disabling the CSRF token at logout,\n\
    sensitive requests that require the CSRF token are prohibited.\n\nJSR 250: Common\
    \ annotations for the JavaTM Platform [`https://www.jcp.org/en/jsr/detail?id=250`](https://www.jcp.org/en/jsr/detail?id=250)\
    \ `.`\n\nSpring Boot official page: [`http://projects.spring.io/spring-boot/`](http://projects.spring.io/spring-boot/)\n\
