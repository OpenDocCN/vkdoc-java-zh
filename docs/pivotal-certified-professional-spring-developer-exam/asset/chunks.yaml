    \ Boot配置的等效Spring JMS应用程序。\n\n## JMS with Spring Boot\n\n使用Spring Boot编写Spring\
    \ JMS应用程序更加容易。项目模块`13-ps-jms-solution`中的应用程序包含一个Spring Boot JMS应用程序，它将`User`实例包装在JMS消息中发送到`userQueue`。配置了一个消息监听器来处理该消息，并在`confirmationQueue`上发送确认消息。定义了另一个监听器，等待确认并打印其内容。为了进一步简化应用程序，不需要生产者类和消费者类。只有一个进程从两个队列发布和消费消息。Spring\
    \ Boot JMS应用程序的抽象架构如图[7-15](#A978-1-4842-0811-3_7_Chapter.html#Fig15)所示。\n\n![A978-1-4842-0811-3_7_Fig15_HTML.jpg](A978-1-4842-0811-3_7_Fig15_HTML.jpg)\n\
    \nFigure 7-15. Spring Boot JMS应用程序抽象架构\n\n该应用程序仅由四个类组成，其用途如下：\n\n*   `UserReceiver`和`ConfirmationReceiver`负责接收用户和确认消息。这些类具有更实用的实现，使用了`@JmsListener`注解。在将处理消息的方法上使用此注解，允许开发者避开实现`MessageListener`的JMS限制。此注解标记了在其上使用的方法，作为指定目标上的JMS监听器的目标，并且`containerFactory`属性指定了用于构建JMS监听器容器的Bean。此注解由特殊的Spring\
    \ Bean后处理器处理：`org.springframework.jms.annotation.JmsListenerAnnotationBeanPostProcessor`。\n\
    \n```java\n// UserReceiver.java\n@Component\npublic class UserReceiver{\n    private\
    \ Logger logger = LoggerFactory.getLogger(UserReceiver.class);\n    private static\
    \ AtomicInteger id = new AtomicInteger();\n    @Autowired\n    ConfirmationSender\
    \ confirmationSender;\n    @JmsListener(destination = \"userQueue\",\n       \
    \          containerFactory = \"connectionFactory\")\n    public void receiveMessage(User\
    \ receivedUser) {\n        logger.info(\" >> Received user: \" + receivedUser);\n\
    \        confirmationSender.sendMessage(\n            new Confirmation(id.incrementAndGet(),\
    \ \"User \"\n                + receivedUser.getEmail() + \" received.\"));\n \
    \   }\n}\n//ConfirmationReceiver.java\n@Component\npublic class ConfirmationReceiver\
    \ {\n    private Logger logger = LoggerFactory.getLogger(ConfirmationReceiver.class);\n\
    \    @JmsListener(destination = \"confirmationQueue\",\n                 containerFactory\
    \ = \"connectionFactory\")\n    public void receiveConfirmation(Confirmation confirmation)\
    \ {\n        logger.info(\" >>  Received confirmation: \" + confirmation);\n \
    \   }\n}\n```\n\n*   `ConfirmationSender`类只是一个注入了`JmsTemplate` Bean的Bean，用于向`confirmationQueue`发送确认对象。\n\
    \n```java\n@Component\npublic class ConfirmationSender {\n    @Autowired\n   \
    \ JmsTemplate jmsTemplate;\n    public void sendMessage(final Confirmation confirmation)\
    \ {\n        jmsTemplate.convertAndSend(\"confirmationQueue\", confirmation);\n\
    \    }\n}\n```\n\n*   `Application`类是应用程序的配置和启动器。它使用了功能强大的`@SpringBootApplication`注解，该注解将确保扫描当前包中的Bean，并根据类路径设置注入所有基础设施Bean。该类上的另一个注解是`@EnableJms`，正如你可能推测的那样，此注解启用了Bean后处理器，该处理器将处理`@JmsListener`注解，并在“幕后”创建消息监听器容器。在此类中，还声明了`connectionFactory`\
    \ Bean。在此示例中，Bean的类型是`org.springframework.jms.config.JmsListenerContainerFactory`，使用的实现是Spring\
    \ Boot的`org.springframework.boot.autoconfigure.jms.DefaultJmsListenerContainerFactoryConfigurer`，它将启动JMS应用程序所需的所有Spring\
    \ Boot基础设施Bean。\n\n还定义了一个类型为`MappingJackson2MessageConverter`的转换器Bean，它实现了JMS的`MessageConverter`接口，将发送的对象转换为文本JSON格式。使用文本转换器非常有用，尤其是在要发送的消息不是可序列化类型时。在此示例中，`User`和`Confirmation`类故意没有声明实现`Serializable`。\n\
    \n`main`方法除了启动应用程序外，还实例化了一个`JmsTemplate`对象，用于发送用户对象。"
