    *   微服务引入了额外的复杂性，并且需要谨慎处理模块之间的请求。


    *   管理多个数据库和事务可能很麻烦。


    *   测试微服务可能很繁琐，因为在实际测试某个服务之前，必须确认该微服务的每个依赖项都有效。


    *   部署也变得复杂，需要模块之间的协调。


    到目前为止的结论是，需要支持多个客户端和平台的新一代大型应用程序非常适合采用微服务。微服务有助于将单体应用程序分解为独立的部署单元，这些单元能够独立于其他子系统来演进自身的扩展需求。让我们看看
    Spring 是否能让基于微服务的应用程序的开发变得像它让单体应用程序开发一样实用。


    ## 使用 Spring 的微服务


    微服务的架构思想类似于 Spring 容器如何管理 Bean，以及它们如何在 Spring 应用程序上下文中进行通信。可以这样想象：如果一个 Spring
    应用程序上下文是一片森林，那么每个 Bean 就是一棵树。微服务则是一个完整的生态系统。之所以举这个例子，是因为编程无非就是使用软件组件对现实世界进行建模，这可能会让微服务的概念更容易理解。本书中构建的演示应用程序基本上是一个网站，人们可以在上面注册自己和他们的宠物，以便提供宠物看护服务。如果使用微服务构建，则需要为用户、宠物、请求、回复和评论管理开发独立的微服务。这也意味着需要一些移动组件来搭建这样的系统，因为微服务之间的通信也必须被覆盖。图
    8-1 并排展示了经典的单体架构和微服务架构。


    ![A978-1-4842-0811-3_8_Fig1_HTML.jpg](img/A978-1-4842-0811-3_8_Fig1_HTML.jpg)


    **图 8-1.** 单体架构与微服务架构


    该图相当通用，它可能会让人认为每个微服务都有自己的数据库，这没错，但实际上并不需要为每个服务配置一个数据库服务器。开发中使用的数据库可以是关系型（基于 SQL）或非关系型（NoSQL）。如果使用关系型数据库，则有三种数据库实现策略可供选择：


    *   **每个服务私有表**：每个服务拥有一组只能由该服务访问的表。

    *   **每个服务一个模式**：每个服务拥有一个对该服务私有的数据库模式。

    *   **每个服务一个数据库服务器**：每个服务拥有自己的数据库服务器。


    所选的微服务数据库策略实现会影响最适合该应用程序的数据库类型。每个服务私有表和每个服务一个模式的开销最低。使用每个服务一个模式很有吸引力，因为它使所有权更加清晰。此外，如果有一个数据库服务器在微服务之间共享，那么关系型数据库是合适的，因为所有数据都在一个地方，并且通过遵循规范化标准进行了适当组织。为每个服务使用不同的数据库可能会使服务之间的数据共享变得困难，并引入数据冗余。NoSQL
    数据库更适合这种类型的实现，因为它们更擅长处理冗余数据。另外，请记住，不共享数据库的一个缺点是维护数据一致性和实现查询更具挑战性。


    Spring 是开发高级应用程序（例如基于微服务架构的应用程序）的最佳框架，原因如下：


    *   依赖注入和集成

    *   超实用的配置和服务创建

    *   直接的服务发现注册


    要使用 Spring 组件开发微服务应用程序，需要深入了解以下 Spring 技术：


    *   服务注册和发现技术，例如 Netflix 的 OSS Eureka

    *   Spring Cloud 项目，例如 Eureka 或 Consul

    *   REST 概念


    Spring Boot 使得创建独立的、生产级的、可以“直接运行”的基于 Spring 的应用程序变得容易。本书第 6 章已经对此进行了介绍，并且这是开发
    Spring 微服务应用程序的唯一方式，因为 Spring Boot 旨在通过使常见概念（例如 RESTful HTTP 和嵌入式 Web 应用程序运行时）易于连接和使用，从而提高开发人员的生产力。它很灵活，允许开发人员只选择他们想要使用的模块，从而消除繁琐或庞大的配置以及运行时依赖。


    Spring Cloud 是一个大型的伞式项目，提供了旨在简化分布式应用程序开发的开发工具。它包含用于构建分布式系统中常见模式的组件：


    *   **配置管理**（Spring Cloud Config 提供了由 Git 仓库支持的集中式外部配置）

    *   **服务发现**（Eureka 是一个 AWS 服务注册中心，用于弹性的中间层负载均衡和故障转移，并由 Spring Cloud 支持）

    *   **断路器**（Spring Cloud 支持 Netflix 的 Hystrix，这是一个库，提供了在预定义阈值内未收到响应时停止调用服务的组件）

    *   **智能路由**（Zuul，用于转发和分发对服务的调用）

    *   **微代理**（面向中间层服务的客户端代理）

    *   **控制总线**（消息系统可用于监控和管理框架内的组件，就像用于“应用程序级”消息传递一样）

    *   **一次性令牌**（使用 Spring Vault 仅用于一次数据访问）

    *   **全局锁**（用于协调、优先化或限制对资源的访问）

    *   **领导者选举**（将单个进程指定为分布在多个节点间的某个任务的组织者的过程）

    *   **分布式会话**（跨多个 Servlet 服务器分布的会话）

    *   **集群状态**（集群状态请求被路由到主节点，以确保返回最新的集群状态）

    *   **客户端负载均衡**


    如果您有兴趣使用 Spring Cloud 构建微服务应用程序，Spring 团队提供的文档可在此处获取：[`http://projects.spring.io/spring-cloud/spring-cloud.html`](http://projects.spring.io/spring-cloud/spring-cloud.html)。它涵盖了前面列表中的每个主题以及更多内容。


    协调分布式系统并不容易，并且可能导致样板代码。Spring Cloud 只是让开发人员更容易编写此类管理代码，并且其结果可以在任何分布式环境中工作，包括开发工作站、数据中心和托管平台（如
    Cloud Foundry）。² Spring Cloud 构建在 Spring Boot 之上，并具有典型的 Spring Boot 优势：开箱即用的预配置基础设施
    Bean，可以进一步配置或扩展以创建自定义解决方案。它遵循相同的 Spring 声明式方法，依赖于注解和属性文件。


    Spring Cloud Netflix 提供了与 Netflix OSS（开源软件）的集成。其官方 GitHub 页面 `https: //netflix.github.io/`
    基本上是一个开源库的集合，这些库由他们的开发人员编写，用于大规模解决一些分布式系统问题。它用 Java 编写，现在是用于在 Java 中编写微服务应用程序的最常用的软件解决方案之一。


    ## 注册与发现服务器

