  trans: "\n### 项目示例\n\n本书附带的项目名为 **Pet Sitter**。你可能已经猜到，这是一个概念验证应用，旨在帮助宠物主人在度假或因故不得不让宠物独处时，找到可以照顾宠物的人。该项目应提供以下功能：\n\
    \n*   用户应拥有一个安全账户才能访问应用程序。账户类型可以是：\n    *   OWNER（主人）= 仅为其宠物寻找看护人的用户\n    *  \
    \ SITTER（看护人）= 仅寻求提供宠物看护服务的用户\n    *   BOTH（两者）= 兼具以上两种身份的用户\n    *   ADMIN（管理员）=\
    \ 拥有特殊权限，可管理网站上其他用户活动的账户\n*   类型为 OWNER 的用户账户可以关联一个或多个宠物实例。\n*   每只宠物必须植入 RFID¹¹\
    \ 微芯片，并且其条形码应提供给应用程序。\n*   类型为 OWNER 的用户账户能够为多个时间段创建宠物看护请求。\n*   类型为 SITTER 的用户账户可以通过创建响应对象来回复请求，这些响应对象将由该请求的主人批准或拒绝。\n\
    *   类型为 BOTH 的用户账户既可以充当 OWNER，也可以充当 SITTER。\n*   管理员账户可以因不活跃而停用其他类型的账户。\n*   宠物看护人和主人可以通过撰写体验评价来互相评分。评分结果存储在用户账户关联的评分字段中。\n\
    \n该项目是一个多模块的 Gradle 项目。每个模块都涵盖一个特定的 Spring 主题。后缀为 `practice` 的项目缺少部分代码和配置，需要你自行解决，以测试你对\
    \ Spring Web 的理解。后缀为 `solution` 的项目是这些任务的建议解决方案。部分项目后缀为 `sample`，表示它们包含需要你分析并特别关注的代码或配置示例。\n\
    \n图 1-3 展示了在 IntelliJ IDEA 中查看的 Pet Sitter 项目结构。每个模块名称都以数字为前缀，因此无论你使用什么 IDE，模块的排列顺序始终与预期使用顺序完全一致。\n\
    \n![A978-1-4842-0811-3_1_Fig3_HTML.jpg](img/A978-1-4842-0811-3_1_Fig3_HTML.jpg)\n\
    \n图 1-3.\n\nPet Sitter 模块\n\n00-ps-core 模块包含映射到数据库表的实体类、枚举以及其他模块引用的工具类。正如项目名称所示，这是核心项目，即基础层。其他项目是构建于其上的服务层实现。Pet\
    \ Sitter 在设计时考虑了多层架构，其抽象的内部层次结构如图 1-4 所示。\n\n![A978-1-4842-0811-3_1_Fig4_HTML.jpg](img/A978-1-4842-0811-3_1_Fig4_HTML.jpg)\n\
    \n图 1-4.\n\nPet Sitter 应用层\n\n实体类拥有 Hibernate 用于唯一标识每个实体实例的公共字段（`id`），用于审计每个实体实例的字段（`createdAt`\
    \ 和 `modifiedAt`），以及用于跟踪实体修改次数的字段（`version`）。这些字段已被分组到 `AbstractEntity` 类中，以避免代码重复。其他类包括用于定义不同类型对象的枚举，以及其他工具类（用于转换和序列化）。00-ps-core\
    \ 项目的内容如图 1-5 所示。\n\n![A978-1-4842-0811-3_1_Fig5_HTML.jpg](img/A978-1-4842-0811-3_1_Fig5_HTML.jpg)\n\
    \n图 1-5.\n\nPet Sitter 00-ps-core 项目内容\n\n类层次结构、类成员以及类之间的关系可以在图 1-6 中进行分析。\n\n\
    ![A978-1-4842-0811-3_1_Fig6_HTML.jpg](img/A978-1-4842-0811-3_1_Fig6_HTML.jpg)\n\
    \n图 1-6.\n\nPet Sitter 实体类层次结构\n\n图 1-7 中的 UML 图描述了应用程序的通用功能。RequestDispatcher\
    \ 和 Controller 属于 Web 层，此处包含它们是因为 09-ps-mvc-* 和 10-ps-security-* 项目也包含一个简单的 Web\
    \ 层，并且 Spring Web 的基本概念是认证考试的一部分。\n\n![A978-1-4842-0811-3_1_Fig7_HTML.jpg](img/A978-1-4842-0811-3_1_Fig7_HTML.jpg)\n\
    \n图 1-7.\n\n描述 Pet Sitter 应用程序通用行为的 UML 图\n\n本章没有附带任何练习和示例代码，因此有关项目设置、构建和执行的更多信息将在后续章节中提供。\n\
    \n脚注 1\n\n巧合且有趣的是，在罗马尼亚，你年满十四岁时才能获得第一张身份证，这被认为是智力成熟的年龄，能够让你区分善恶。\n\n2\n\n相关信息可在\
    \ Spring 官方博客上找到：[`https://spring.io/blog/2015/08/03/`](https://spring.io/blog/2015/08/03/coming-up-in-2016-spring-framework-4-3-5-0)\
    \ [`coming-up-in-2016-spring-framework-4-3-5-0`](https://spring.io/blog/2015/08/03/coming-up-in-2016-spring-framework-4-3-5-0)\
    \ 。\n\n3\n\n相关信息请访问：[`https://jaxenter.com/java-9-release-date-announced-116945.html`](https://jaxenter.com/java-9-release-date-announced-116945.html)\
    \ 。\n\n4\n\nGithub Spring Framework 源码：[`https://github.com/spring-projects/spring-framework`](https://github.com/spring-projects/spring-framework)\
    \ 。\n\n5\n\nGradle 是一个自动化构建工具，易于配置和使用，适用于任何类型的应用程序。其构建文件使用 Groovy 编写。Gradle 将\
    \ Ant 的强大功能和灵活性，与 Maven 的依赖管理和约定相结合，形成了一种更有效的构建方式。更多信息请访问：[`https://www.gradle.org/`](https://www.gradle.org/)\
    \ 。\n\n6\n\n请记住，根据官方网站所述，参加 Pivotal 或 VMware 授权培训中心的 Spring Web 培训是成为认证 Spring\
    \ 专业人士的先决条件：[`http://pivotal.io/academy#certification`](http://pivotal.io/academy#certification)\
    \ 。\n\n7\n\nJSE8 官方参考：[`http://docs.oracle.com/javase/8/docs/`](http://docs.oracle.com/javase/8/docs/)\
    \ ；JEE7 官方文档：[`http://docs.oracle`](http://docs.oracle.com/javaee/7/) 。 [`com/javaee/7/`](http://docs.oracle.com/javaee/7/)\
    \ 。\n\n8\n\nSpring 官方 Javadoc：[`http://docs.spring.io/spring/docs/current/javadoc-api/`](http://docs.spring.io/spring/docs/current/javadoc-api/)\
    \ ；Spring 参考文档：[`http://`](http://docs.spring.io/spring/docs/current/spring-framework-reference/)\
    \ [`docs.spring.io/spring/docs/current/spring-framework-reference/`](http://docs.spring.io/spring/docs/current/spring-framework-reference/)\
    \ 。\n\n9\n\n根据地区和培训中心的不同，此项为可选。\n\n10\n\n根据地区和培训中心的不同，此项同样为可选。\n\n11\n\n射频识别（RFID）利用电磁场自动识别和跟踪附着在物体（此处为宠物）上的标签。\n"
- fmt: '# Spring Bean LifeCycle and Configuration


    The Spring Framework provides an easy way to create, initialize, and connect objects
    into competent, decoupled, easy to test enterprise-ready applications. Every software
    application consists of software components that interact, that collaborate and
    depend on other components to successfully execute a set of tasks. Each software
    component provides a service to other components, and linking the customer and
    the provider component is the process known as Dependency Injection. Spring provides
    a very simplistic way to define the connections between them in order to create
    an application.


    Before Spring entered the picture, defining connections between classes and composing
    them required for development to be done following different design patterns,
    such as Factory, Abstract Factory, Singleton, Builder, Decorator, Proxy, Service
    Locator, and even reflection.[¹](#A978-1-4842-0811-3_2_Chapter.html#Fn1) Spring
    was built in order to make Dependency Injection easy. This software design pattern
    implies that clients delegate the dependency resolution to an external service.
    The client is not allowed to call the injector service, which is why this software
    pattern is characterized by Inversion of Control behavior, also known as the Don’t
    call us, we’ll call you! principle.


    The software components that Spring uses to build applications are called beans
    and are nothing more than Plain Old Java Objects (POJOs) that are being created,
    initialized, assembled, and managed by the Spring Inversion of Control container.
    The order of these operations and the relationships between objects are provided
    to the Spring IoC container using XML configuration files prior to Spring version
    2.5. Starting with 2.5, a small set of annotations was added for configuring beans,
    and with Spring 3, Java configuration using annotations was introduced.


    This chapter covers everything a developer needs to know in order to configure
    a basic Spring application using XML and Java Configuration. The Java annotations
    that represent the intermediate step between configurations using XML and full
    Java Configuration will also be covered.


    ## Old Style Application Development


    In the most competent development style, a Java application should be composed
    of POJOs, simple Java objects each with a single responsibility. In the previous
    chapter, the entity classes that will be used throughout the book were introduced
    along with the relationships between them. In order to manage this type of object
    at the lowest level, the dao (repository) layer of the application, classes named
    repositories will be used. The purpose of these classes is to retrieve, update,
    create, and delete entities from the storage support, which usually is some type
    of database.


    These classes are called repositories, and in the code for this book, their name
    is created by concatenating a short denomination for the type of entity management,
    the name of entity object being managed, and the `Repo` postfix. Each class implements
    a simple interface that defines the methods to be implemented to provide the desired
    behavior for that entity type. All interfaces extend a common interface declaring
    the common methods that should be implemented for any type of entity. For example:
    saving, searching by id, and deleting should be supported for every type of entity.
    This method of development is used because Java is a very object-oriented programming
    language, and in this case, the inheritance principle is very well respected.
    Also, generic types make possible such a level of inheritance.


    In Figure [2-1](#A978-1-4842-0811-3_2_Chapter.html#Fig1), the `AbstractRepo` interface
    and the child interfaces for each entity type are depicted. You can notice how
    the `AbstractRepo` interface defines typical method skeletons for every entity
    type, and the child interface defines method skeletons designed to work with only
    a specific type of entity.


    ![A978-1-4842-0811-3_2_Fig1_HTML.jpg](A978-1-4842-0811-3_2_Fig1_HTML.jpg)


    Figure 2-1. Repository interfaces hierarchy


    At the end of this section you can take a break from reading in order to get comfortable
    with this implementation. The project specifically designed for this is named
    `01-ps-start-practice`. It contains stub implementations for the repository classes,
    which can be found in the test sources under the package `com.ps.repo.stub`. In
    Figure [2-2](#A978-1-4842-0811-3_2_Chapter.html#Fig2), the stub classes are depicted.
    Again, inheritance was used in order to reduce the amount of code to be written
    and avoid writing duplicate code.


    ![A978-1-4842-0811-3_2_Fig2_HTML.jpg](A978-1-4842-0811-3_2_Fig2_HTML.jpg)


    Figure 2-2. Repository stub implementations


    The stub repositories store all the data created by the user in a map data structure
    named `records`. The unique id for each record is generated based on the size
    of this map. The implementation is in the `StubAbstractRepo` class and is depicted
    below, together with all basic repository operations:


    ```

    package com.ps.repo.stub;

    import com.ps.base.AbstractEntity;

    import com.ps.repos.AbstractRepo;

    import java.util.HashMap;

    import java.util.Map;

    public abstract class StubAbstractRepo

    implements +underlineAbstractRepo {

    protected Map records = new HashMap();

    @Override

    public void save(T entity) {

    if (entity.getId() == null) {

    Long id = (long) records.size() + 1;

    entity.setId(id);

    }

    records.put(entity.getId(), entity);

    }

    @Override

    public void delete(T entity) {

    records.remove(entity.getId());

    }

    @Override

    public void deleteById(Long entityId) {

    records.remove(entityId);

    }

    @Override

    public T findById(Long entityId) {

    return records.get(entityId);

    }

    }

    ```'
