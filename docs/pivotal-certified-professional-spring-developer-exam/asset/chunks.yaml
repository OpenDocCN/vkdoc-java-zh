    \ so on. This layer uses an\n    implementation of the distributed services specification\
    \ (JSR-077),\n    which is part of the Java 2 Platform, Enterprise Edition (J2EE)\n\
    \    specification.[^(27)](#A978-1-4842-0811-3_7_Chapter.html#Fn27)\n\nThe JMX\
    \ technology defines standard connectors (known as JMX connectors)\nthat enable\
    \ you to access JMX agents from remote management\napplications. The MBean server\
    \ acts as a broker for communication\nbetween local MBeans and agents and between\
    \ MBeans and remote clients.\nThe MBean server keeps a keyed reference as evidence\
    \ of all registered\nMBeans. Common and accessible clients for the MBean Server\
    \ are provided\nwithin the JDK: jconsole, jvisualvm, and jmc. And there is also\
    \ an open\nsource tool named VisualVM.[^(28)](#A978-1-4842-0811-3_7_Chapter.html#Fn28)\n\
    \nAn MBean is a managed Java object that follows the design patterns set\nin the\
    \ JMX specification. An MBean can represent a device, an\napplication, or any\
    \ resource that needs to be managed. MBeans expose a\nmanagement interface that\
    \ consists of the following:\n\n*   attributes (properties), which can\n    be\
    \ readable, writable, or both\n\n*   operations (methods)\n\n*   self description\n\
    \nThere are five type of MBeans defined by the JMx specification:\n\n*   Standard\
    \ MBeans, also known as Simple MBeans\n\n*   Dynamic MBeans\n\n*   Open MBeans\n\
    \n*   Model MBeans\n\n*   MXBeans\n\nThe management metadata can be defined statically\
    \ by implementing a Java\ninterface or by annotating the implementation, and it\
    \ will automatically\nbe generated at runtime.\n\nPlain JMX\n\nThe plainest example\
    \ of a JMX MBean interface can look like this.\n\n```\npackage com.ps.jmx;\npublic\
    \ interface JmxCounterMBean {\nint getCount(); // attribute \"count\"\nvoid add();\
    \ // operation \"add\n}\npublic class JmxCounter implements JmxCounterMBean{\n\
    public int getCount() {\n...\n}\npublic void void add() {\n...\n}\n}\n```\n\n\
    CC\n\nBy convention, an MBean interface takes the name of the Java class that\n\
    implements it, with the suffix MBean added.\n\nOnce a resource has been instrumented\
    \ by MBeans, the management of that\nresource is performed by a JMX agent.\n\n\
    ```\nMBeanServer mbs = ManagementFactory.getPlatformMBeanServer();\nObjectName\
    \ name = new ObjectName(\"com.ps.jmx:type=UserCounter\");\nUserCounter mbean =\
    \ new UserCounter();\nmbs.registerMBean(mbean, name);\n```\n\nSpring JMX\n\nAs\
    \ usual, using native APIs is cumbersome, so Spring JMX was introduced\nto make\
    \ developers’ lives easy by providing a practical way to integrate\na Spring application\
    \ into a JMX infrastructure. Spring’s JMX support\nprovides four core features:\n\
    \n*   The automatic registration of any Spring bean as a JMX MBean.\n\n*   A flexible\
    \ mechanism for controlling the management interface of your\n    beans.\n\n*\
    \   The declarative exposure of MBeans over remote JSR-160 connectors.\n\n*  \
    \ The simple proxying of both local and remote MBean resources.\n\nThese features\
    \ are provided without the need for writing complex code\nand without coupling\
    \ the application to Spring or JMX classes or\ninterfaces. The JMX infrastructure\
    \ can be configured using the context\nnamespace or using Java Configuration.\
    \ Spring beans can be exposed as\nMBeans using annotations or XML. JMX beans can\
    \ be consumed using a\nproxying mechanism transparently. Until now there is nothing\
    \ new; this\nis what Spring provides for most commonly used APIs.\n\nThe core\
    \ class in Spring’s JMX framework is the `MBeanExporter`,\nresponsible for taking\
    \ your Spring beans and registering them with a JMX\nMBeanServer. Declaring the\
    \ server and the exporter beans is done in a\ntypical Spring manner.\n\nThe `<context:mbean-server/>`\n\
    declares a bean of type `org.springframework.jmx.support.MBeanServerFactoryBean`.\n\
    This bean has the responsibility of obtaining a `javax.management.MBeanServer`\n\
    reference from the the standard JMX 1.2 `javax.management.MBeanServerFactory`\n\
    API.\n\nThe `<context:mbean-export/>`\ndeclares a bean of type `org.springframework.jmx.export.MBeanExporter`,\n\
    and this is the bean that allows exposing any Spring-managed bean to a\nMBeanServer\
    \ without the need to define any Spring-managed bean to a\nMBeanServer without\
    \ the need to define any JMX-specific information in\nthe bean classes.\n\nAn\
    \ equivalent Java Configuration is depicted in the following code\nsnippet. Basically,\
    \ the two context elements from XML become two beans\nin a configuration class:\n\
    \n```\nimport org.springframework.jmx.export.MBeanExporter;\nimport org.springframework.jmx.support.MBeanServerFactoryBean;\n\
    ...\n@Configuration\npublic clas JmxConfig(){\n// equivalent of \n@Bean\nMBeanServerFactoryBean\
    \ mbeanServer(){\nreturn new MBeanServerFactoryBean();\n}\n// equivalent of \n\
    @Bean\nMBeanExporter exporter(){\nMBeanExporter exporter = new MBeanExporter();\n\
    exporter.setAutodetect(true);\nexporter.setBeans(map);\nreturn exporter;\n}\n\
    }\n```\n\nThe project `16-ps-jmx-sample` is\nassigned to this section. It contains\
    \ the implementation with Spring\nBoot, because in this way, the setup becomes\
    \ even easier, since all that\nis needed is one annotation: `@EnableMBeanExport`.\n\
    \n```\nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.context.ConfigurableApplicationContext;\nimport org.springframework.context.annotation.EnableMBeanExport;\n\
    @SpringBootApplication\n@EnableMBeanExport\npublic class Application {\nprivate\
    \ static Logger logger = LoggerFactory.getLogger(Application.class);\npublic static\
    \ void main(String args) throws IOException {\nConfigurableApplicationContext\
    \ ctx =\nSpringApplication.run(Application.class, args);\nassert (ctx != null);\n\
    logger.info(\"Started ...\");\nSystem.in.read();\nctx.close();\n}\n}\n```\n\n\
    The `@EnableMBeanExport` is\nvery important, because it enables default exporting\
    \ of all standard\nMBeans from the Spring context, as well as all `@ManagedResource`\n\
    annotated beans. Behind the scenes, it basically declares and registers\na bean\
    \ of type `JmxMBeanServer` and a\nbean of type `AnnotationMBeanExporter`\nfor\
    \ you that will take care of registering and will expose your Spring\nmanaged\
    \ beans as MBean, so that you don’t have to."
  trans: "\n在 JDK 5.0 和 6 版本中，JMX 技术作为 Java 规范请求 JSR 3²⁵（Java 管理扩展）和 JSR 160²⁶（JMX\
    \ 远程 API）而开发。JDK 7 版本中 JMX API 和 JMX 远程 API 的演进由 JSR 255（JMX API 2.0）涵盖。JMX 是动态的，因此可以在运行时收集有关应用程序内部状态的信息。所以基本上，JDK\
    \ 开箱即用地包含了 JMX。而且它并不难用。你必须创建一个以 `MXBean` 结尾的接口，或者使用注解。当然，也必须有一个实现。然后使用该实现来管理应用程序的各个方面。\n\
    \n使用 JMX，一个给定的资源可以通过一个或多个称为管理 Bean（Management Beans，或简称为 MBean）的组件进行检测。这些是包含管理元数据的对象。MBean\
    \ 注册在一个核心托管对象服务器中，称为 MBean 服务器。MBean 服务器充当管理代理，并且可以在大多数已启用 Java 编程语言的设备上运行。\n\n\
    JMX 架构\n\nJMX 架构如图 7-30 所示。JMX 架构分为三层：\n\n*   **检测层**：在此层中，资源被封装在 MBean 中。\n\n\
    *   **代理层**：管理基础设施，由 MBean 服务器和提供以下 JMX 服务的代理组成：\n\n![A978-1-4842-0811-3_7_Fig30_HTML.jpg](img/A978-1-4842-0811-3_7_Fig30_HTML.jpg)\n\
    \n图 7-30.\n\nJMX 架构\n\n*   **监控**\n\n*   **事件通知**\n\n*   **定时器**\n\n*   **管理层**：定义外部管理应用程序如何通过协议、API\
    \ 等与底层交互。该层使用了分布式服务规范（JSR-077）的实现，该规范是 Java 2 平台企业版（J2EE）规范的一部分。²⁷\n\nJMX 技术定义了标准连接器（称为\
    \ JMX 连接器），使您能够从远程管理应用程序访问 JMX 代理。MBean 服务器充当本地 MBean 与代理之间、以及 MBean 与远程客户端之间通信的代理。MBean\
    \ 服务器保存一个键控引用，作为所有已注册 MBean 的证据。JDK 中提供了 MBean 服务器的通用且可访问的客户端：`jconsole`、`jvisualvm`\
    \ 和 `jmc`。还有一个名为 VisualVM²⁸ 的开源工具。\n\nMBean 是一个遵循 JMX 规范中设定的设计模式的受管 Java 对象。MBean\
    \ 可以表示设备、应用程序或任何需要管理的资源。MBean 公开一个管理接口，该接口由以下内容组成：\n\n*   **属性**，可以是可读的、可写的，或两者兼有\n\
    \n*   **操作（方法）**\n\n*   **自描述**\n\nJMX 规范定义了五种类型的 MBean：\n\n*   **标准 MBean**，也称为简单\
    \ MBean\n\n*   **动态 MBean**\n\n*   **开放 MBean**\n\n*   **模型 MBean**\n\n*   **MXBean**\n\
    \n管理元数据可以通过实现 Java 接口或对实现进行注解来静态定义，并将在运行时自动生成。\n\n纯 JMX\n\n一个最纯粹的 JMX MBean 接口示例如下所示。\n\
    \n```\npackage com.ps.jmx;\npublic interface JmxCounterMBean {\nint getCount();\
    \ // 属性 \"count\"\nvoid add(); // 操作 \"add\"\n}\npublic class JmxCounter implements\
    \ JmxCounterMBean{\npublic int getCount() {\n...\n}\npublic void void add() {\n\
    ...\n}\n}\n```\n\nCC\n\n按照惯例，MBean 接口的名称采用实现它的 Java 类的名称，并添加后缀 `MBean`。\n\n一旦资源被\
    \ MBean 检测，该资源的管理将由 JMX 代理执行。\n\n```\nMBeanServer mbs = ManagementFactory.getPlatformMBeanServer();\n\
    ObjectName name = new ObjectName(\"com.ps.jmx:type=UserCounter\");\nUserCounter\
    \ mbean = new UserCounter();\nmbs.registerMBean(mbean, name);\n```\n\nSpring JMX\n\
    \n像往常一样，使用原生 API 很繁琐，因此引入了 Spring JMX，通过提供一种将 Spring 应用程序集成到 JMX 基础设施中的实用方法，让开发人员的生活更轻松。Spring\
    \ 的 JMX 支持提供了四个核心功能：\n\n*   自动将任何 Spring Bean 注册为 JMX MBean。\n\n*   用于控制 Bean\
    \ 管理接口的灵活机制。\n\n*   通过远程 JSR-160 连接器声明式地暴露 MBean。\n\n*   对本地和远程 MBean 资源的简单代理。\n\
    \n这些功能无需编写复杂代码，也无需将应用程序耦合到 Spring 或 JMX 类或接口即可提供。JMX 基础设施可以使用上下文命名空间或 Java 配置进行配置。Spring\
    \ Bean 可以使用注解或 XML 暴露为 MBean。JMX Bean 可以通过代理机制透明地使用。到目前为止，没有什么新内容；这就是 Spring 为最常用的\
    \ API 提供的功能。\n\nSpring JMX 框架中的核心类是 `MBeanExporter`，负责获取您的 Spring Bean 并将它们注册到\
    \ JMX MBeanServer。声明服务器和导出器 Bean 是以典型的 Spring 方式完成的。\n\n`<context:mbean-server/>`\
    \ 声明了一个类型为 `org.springframework.jmx.support.MBeanServerFactoryBean` 的 Bean。该 Bean\
    \ 负责从标准的 JMX 1.2 `javax.management.MBeanServerFactory` API 获取 `javax.management.MBeanServer`\
    \ 引用。\n\n`<context:mbean-export/>` 声明了一个类型为 `org.springframework.jmx.export.MBeanExporter`\
    \ 的 Bean，该 Bean 允许将任何 Spring 管理的 Bean 暴露给 MBeanServer，而无需在 Bean 类中定义任何 JMX 特定的信息。\n\
    \n等效的 Java 配置如下面的代码片段所示。基本上，XML 中的两个上下文元素变成了配置类中的两个 Bean：\n\n```\nimport org.springframework.jmx.export.MBeanExporter;\n\
    import org.springframework.jmx.support.MBeanServerFactoryBean;\n...\n@Configuration\n\
    public clas JmxConfig(){\n// 等效于 \n@Bean\nMBeanServerFactoryBean mbeanServer(){\n\
    return new MBeanServerFactoryBean();\n}\n// 等效于 \n@Bean\nMBeanExporter exporter(){\n\
    MBeanExporter exporter = new MBeanExporter();\nexporter.setAutodetect(true);\n\
    exporter.setBeans(map);\nreturn exporter;\n}\n}\n```\n\n项目 `16-ps-jmx-sample`\
    \ 分配给了本节。它包含了使用 Spring Boot 的实现，因为通过这种方式，设置变得更加容易，因为所需要的只是一个注解：`@EnableMBeanExport`。\n\
    \n```\nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.context.ConfigurableApplicationContext;\nimport org.springframework.context.annotation.EnableMBeanExport;\n\
    @SpringBootApplication\n@EnableMBeanExport\npublic class Application {\nprivate\
    \ static Logger logger = LoggerFactory.getLogger(Application.class);\npublic static\
    \ void main(String args) throws IOException {\nConfigurableApplicationContext\
    \ ctx =\nSpringApplication.run(Application.class, args);\nassert (ctx != null);\n\
    logger.info(\"已启动 ...\");\nSystem.in.read();\nctx.close();\n}\n}\n```\n\n`@EnableMBeanExport`\
    \ 非常重要，因为它启用了从 Spring 上下文中默认导出所有标准 MBean，以及所有带有 `@ManagedResource` 注解的 Bean。在幕后，它基本上为您声明并注册了一个类型为\
    \ `JmxMBeanServer` 的 Bean 和一个类型为 `AnnotationMBeanExporter` 的 Bean，它们将负责注册并将您的\
    \ Spring 管理的 Bean 暴露为 MBean，这样您就不必自己做了。\n"
- fmt: '启动应用程序后，您可以通过分析控制台日志来检查是否已为您创建了两个 Bean。您应该会找到类似以下的日志条目：


    ```

    ...

    INFO o.s.j.e.a.AnnotationMBeanExporter - Registering beans for JMX exposure on
    startup

    DEBUG o.s.j.e.a.AnnotationMBeanExporter - Autodetecting user-defined JMX MBeans

    ...

    DEBUG o.s.j.s.JmxUtils - Found MBeanServer:

    com.sun.jmx.mbeanserver.JmxMBeanServer@7c05a4af

    DEBUG o.s.b.f.s.DefaultListableBeanFactory -

    Creating instance of bean ''mbeanExporter''

    DEBUG o.s.b.f.s.DefaultListableBeanFactory -

    Creating shared instance of singleton bean ''mbeanServer''

    ...

    ```


    Spring `MBeanExporter` 将现有的 POJO Bean 暴露给 `MBeanServer`，无需编写注册代码。Spring Bean 必须使用适当的注解进行标注。


    ```

    import org.springframework.jmx.export.annotation.ManagedAttribute;

    import org.springframework.jmx.export.annotation.ManagedOperation;

    import org.springframework.jmx.export.annotation.ManagedResource;

    import javax.annotation.ManagedBean;

    @ManagedResource(description = "sample JMX managed resource"

    , objectName="bean:name=jmxCounter")

    public class JmxCounterImpl implements JmxCounter {

    private int counter =0;

    @ManagedOperation(description = "Increment the counter")

    @Override

    public int add() {

    return ++counter;

    }

    @ManagedAttribute(description = "The counter")

    @Override

    public int getCount() {

    return counter;

    }

    }

    ```


    受管 Bean 的 `ObjectName` 要么从完全限定类名派生，要么作为属性传递给 `@ManagedResource`。`@ManagedResource`
    将 `JmxCounterImpl` 的所有实例标记为 JMX 受管资源。`@ManagedOperation` 将该方法标记为 JMX 操作。`@ManagedAttribute`
    将 getter 或 setter 标记为 JMX 属性的一半。


    `MBeanExporter` 以映射的形式接收受管资源作为参数：


    ```

    @Configuration

    public class JmxConfig {

    @Bean

    MBeanExporter exporter(){

    MBeanExporter exporter = new MBeanExporter();

    Map map = new HashMap();

    map.put("bean:name=jmxCounter1", jmxCounter());

    exporter.setBeans(map);

    return exporter;

    }

    ...

    }

    // 在这种情况下，JMX Bean 必须使用 @Component 注解

    @Component

    @ManagedResource(description = "Sample JMX managed resource",

    objectName="bean:name=jmxCounter")

    public class JmxCounterImpl implements JmxCounter {

    ...

    }

    ```


    但是，如果进行相应配置，`MBeanExporter` Bean 可以检测所有 JMX Bean：将 `autodetect` 属性设置为 `true`。


    ```

    @Configuration

    public class JmxConfig {

    @Bean

    MBeanExporter exporter(){

    MBeanExporter exporter = new MBeanExporter();

    exporter.setAutodetect(true);

    return exporter;

    }

    ...

    }

    // 在这种情况下，JMX Bean 必须使用 @Component 注解

    @Component

    @ManagedResource(description = "Sample JMX managed resource",

    objectName="bean:name=jmxCounter")

    public class JmxCounterImpl implements JmxCounter {

    ...

    }

    ```


    但是，当使用 `@EnableMBeanExport` 注解时，则无需显式配置导出器 Bean。


    `objectName` 属性包含生成的 MBean 的名称，因此任何客户端（本地或远程）都必须查找 `jmxCounter`。现在我们已经完成了 JMX
    配置并将 Spring Bean 暴露为 MBean，可以启动应用程序并开始搜索 Spring 管理的 Bean。


    作为客户端，本示例将使用 Oracle 的 Java Mission Control。[^(29)](#A978-1-4842-0811-3_7_Chapter.html#Fn29)
    如果您的系统中设置了 `JAVA_HOME` 变量，并且 `JAVA_HOME\bin` 在类路径中，请打开终端（或在 Windows 上打开命令提示符）并输入
    `jmc`。在图 [7-31](#A978-1-4842-0811-3_7_Chapter.html#Fig31) 中，您可以看到 JMC 窗口。


    ![A978-1-4842-0811-3_7_Fig31_HTML.jpg](A978-1-4842-0811-3_7_Fig31_HTML.jpg)


    图 7-31.


    Java Mission Control 连接到 16-ps-jmx-sample 应用程序并显示 jmxCounter MBean


    在 JMC 中，您会看到一个名为 `JVM Browser` 的选项卡，其中显示系统上运行的所有 Java 进程。您可以通过主类名称 `com.ps.start.Application`
    识别出对应于 `16-ps-jmx-sample` 的 Java 进程。双击并展开节点；然后双击 `MBeanServer` 节点。将打开一个名为 MBean
    Browser 的选项卡，在其中展开 `bean` 节点后，您将看到 `jmxCounter`，可以通过单击右侧的选项卡进行检查。如果您单击操作选项卡，您将看到两个操作以及一个名为
    `Execute` 的按钮，您可以使用该按钮执行 `jmxCounter` MBean 方法。


    之前提到过，客户端应用程序可以通过代理访问 MBean。Spring JMX 架构支持这一点，因为它是 Spring 应用程序之间的标准远程通信方式。在图
    [7-32](#A978-1-4842-0811-3_7_Chapter.html#Fig32) 中，您可以看到 Spring JMX 架构。


    ![A978-1-4842-0811-3_7_Fig32_HTML.jpg](A978-1-4842-0811-3_7_Fig32_HTML.jpg)


    图 7-32.


    Spring JMX 架构


    所以基本上，服务器将 Spring Bean 暴露为由 `MBeanServer` 管理的 MBean，而客户端则使用代理访问它们。典型的 Spring 风格，对吧？


    为了能够为 MBean 创建 Spring 客户端，必须在服务器端为其定义一个客户端将用于访问 MBean 的连接器。为此，我们需要配置一个类型为 `ConnectorServerFactoryBean`
    的 Bean。


    ```

    @SpringBootApplication

    @EnableMBeanExport

    public class Application {

    private static Logger  logger = LoggerFactory.getLogger(Application.class);

    @Bean

    ConnectorServerFactoryBean connector(){

    return new ConnectorServerFactoryBean();

    }

    ...

    }

    ```


    默认情况下，`ConnectorServerFactoryBean` 创建一个绑定到 `"service:jmx:jmxmp://localhost:9875"`
    的 `JMXConnectorServer`，这是客户端将用于访问 MBean 的 URL。此示例中的客户端是一个测试类，其中注入了一个类型为 `MBeanServerConnectionFactoryBean`
    的 Bean，该 Bean 将用于通过代理对象远程访问 MBean。JMXMP 协议被 JSR 160 规范标记为可选：目前，主要的开源 JMX 实现 MX4J
    以及 JDK 自带的实现都不支持 JMXMP。因此，更简单的方法是通过 RMI 暴露 MBean。为此，必须更改服务器配置以包含 RMI 注册表和连接器 Bean。


    ```

    import org.springframework.jmx.support.ConnectorServerFactoryBean;

    import org.springframework.jmx.support.MBeanServerFactoryBean;

    import org.springframework.remoting.rmi.RmiRegistryFactoryBean;

    ....

    @SpringBootApplication

    @EnableMBeanExport

    public class Application {

    private static Logger logger = LoggerFactory.getLogger(Application.class);

    @Bean

    @DependsOn("rmiRegistry")

    ConnectorServerFactoryBean connector() {

    ConnectorServerFactoryBean cf = new ConnectorServerFactoryBean();

    try {

    cf.setObjectName("connector:name=rmi");

    } catch (MalformedObjectNameException e) {

    return  null;

    }

    cf.setServiceUrl(

    "service:jmx:rmi://localhost/jndi/rmi://localhost:1099/jmxrmi");

    return cf;

    }

    @Bean

    RmiRegistryFactoryBean rmiRegistry() {

    RmiRegistryFactoryBean rmiRegistryFactoryBean = new RmiRegistryFactoryBean();

    rmiRegistryFactoryBean.setAlwaysCreate(true);

    rmiRegistryFactoryBean.setPort(1099);

    return rmiRegistryFactoryBean;

    }

    ...

    }

    ```


    在客户端，我们需要一个 `MBeanServerConnection` Bean 来连接到 RMI 服务器，该 Bean 将由 `MBeanServerConnectionFactoryBean`
    工厂 Bean 创建，以及一个 `MBeanProxyFactoryBean`，它将负责创建 `JmxCounter` 代理。'
  raw: 'After starting the application, you can check that the two beans have

    been created for you by analyzing the console log. You should find some

    log entries like these:


    ```

    ...

    INFO o.s.j.e.a.AnnotationMBeanExporter - Registering beans for JMX exposure on
    startup

    DEBUG o.s.j.e.a.AnnotationMBeanExporter - Autodetecting user-defined JMX MBeans

    ...

    DEBUG o.s.j.s.JmxUtils - Found MBeanServer:

    com.sun.jmx.mbeanserver.JmxMBeanServer@7c05a4af

    DEBUG o.s.b.f.s.DefaultListableBeanFactory -

    Creating instance of bean ''mbeanExporter''

    DEBUG o.s.b.f.s.DefaultListableBeanFactory -

    Creating shared instance of singleton bean ''mbeanServer''

    ...

    ```


    Spring `MBeanExporter` exposes

    existing POJO beans to the `MBeanServer` without

    the need to write the registration code. Spring beans must be annotated

    with the proper annotations.


    ```

    import org.springframework.jmx.export.annotation.ManagedAttribute;

    import org.springframework.jmx.export.annotation.ManagedOperation;

    import org.springframework.jmx.export.annotation.ManagedResource;

    import javax.annotation.ManagedBean;

    @ManagedResource(description = "sample JMX managed resource"

    , objectName="bean:name=jmxCounter")

    public class JmxCounterImpl implements JmxCounter {

    private int counter =0;

    @ManagedOperation(description = "Increment the counter")

    @Override

    public int add() {

    return ++counter;

    }

    @ManagedAttribute(description = "The counter")

    @Override

    public int getCount() {

    return counter;

    }

    }

    ```


    The ObjectName of the managed bean is either derived from the fully

    qualified class name or passed as attribute to the `@ManagedResource`. The

    `@ManagedResource`

    marks all instances of a `JmxCounterImpl` as JMX

    managed resources. `@ManagedOperation`

    marks the method as a JMX operation. `@ManagedAttribute`

    marks a getter or setter as one half of a JMX attribute.


    The `MBeanExporter`

    receives the managed resources as arguments in a map:


    ```

    @Configuration

    public class JmxConfig {

    @Bean

    MBeanExporter exporter(){

    MBeanExporter exporter = new MBeanExporter();

    Map map = new HashMap();

    map.put("bean:name=jmxCounter1", jmxCounter());

    exporter.setBeans(map);

    return exporter;

    }

    ...

    }

    // in this case the JMX bean must be annotated with @Component

    @Component

    @ManagedResource(description = "Sample JMX managed resource",

    objectName="bean:name=jmxCounter")

    public class JmxCounterImpl implements JmxCounter {

    ...

    }

    ```


    But the `MBeanExporter` bean

    can detect all JMX beans if configured so: set the `autodetect` property

    to `true`.


    ```

    @Configuration

    public class JmxConfig {

    @Bean

    MBeanExporter exporter(){

    MBeanExporter exporter = new MBeanExporter();

    exporter.setAutodetect(true);

    return exporter;

    }

    ...

    }

    // in this case the JMX bean must be annotated with @Component

    @Component

    @ManagedResource(description = "Sample JMX managed resource",

    objectName="bean:name=jmxCounter")

    public class JmxCounterImpl implements JmxCounter {

    ...

    }

    ```


    But when the `@EnableMBeanExport`

    annotation is used, there is no need to configure the exporter bean

    explicitly.


    The `objectName`

    attribute contains the name of the resulting MBean, so any client, local

    or remote, will have to look for `jmxCounter`. Now that

    we have the JMX configuration and a Spring bean exposed as an MBean, the

    application can be started and the search for the Spring managed bean

    can begin.


    As a client, Java Mission Control from Oracle will be used for the

    current example.[^(29)](#A978-1-4842-0811-3_7_Chapter.html#Fn29) If

    you have the `JAVA_HOME` variable

    set in your system and the `JAVA_HOME\bin` on the

    classpath, open a terminal (or a Command Prompt on Windows) and type

    `jmc`. In Figure

    [7-31](#A978-1-4842-0811-3_7_Chapter.html#Fig31), you can

    see the JMC window.


    ![A978-1-4842-0811-3_7_Fig31_HTML.jpg](A978-1-4842-0811-3_7_Fig31_HTML.jpg)


    Figure 7-31.


    Java Mission Control connected to the 16-ps-jmx-sample application and

    depicting the jmxCounter MBean


    In the JMC, you will see a tab called `JVM Browser` that

    displays all the JAVA processes running on the system. You can recognize

    the Java process corresponding to the `16-ps-jmx-sample` by

    the name of the main class `com.ps.start.Application`.

    Double click and expand the node; then double click on the `MBeanServer` node.
    A

    tab named MBean Browser will be opened, and in it under the `bean` node, on

    expanding it, you will see the `jmxCounter`, which can

    be inspected by clicking on the tabs on the right. If you click on the

    operations tab, you will see the two operations and a button named `Execute` that
    you can

    use to execute the `jmxCounter` MBean

    methods.


    It was mentioned before that client applications can access the MBeans

    through proxies. The Spring JMX architecture allows this, since it is

    the standard remoting communication between Spring applications. In

    Figure [7-32](#A978-1-4842-0811-3_7_Chapter.html#Fig32) you can

    see the Spring JMX architecture.


    ![A978-1-4842-0811-3_7_Fig32_HTML.jpg](A978-1-4842-0811-3_7_Fig32_HTML.jpg)


    Figure 7-32.


    Spring JMX Architecture


    So basically, the server exposes Spring beans as MBeans managed by the

    MBeanServer, and the client accesses them using proxies. Typical Spring,

    right?


    To be able to create a Spring client for the MBean, a connector that the

    client will use to access the MBean must be defined for it on the server

    side. For this, we need a bean of type `ConnectorServerFactoryBean`

    to be configured.


    ```

    @SpringBootApplication

    @EnableMBeanExport

    public class Application {

    private static Logger  logger = LoggerFactory.getLogger(Application.class);

    @Bean

    ConnectorServerFactoryBean connector(){

    return new ConnectorServerFactoryBean();

    }

    ...

    }

    ```


    By default, `ConnectorServerFactoryBean`

    creates a `JMXConnectorServer`

    bound to `"service:jmx:jmxmp://localhost:9875"`,

    and this is the URL that the client will use to access the MBean. The

    client in this case will be a test class with a bean of type `MBeanServerConnectionFactoryBean`

    injected into it that will be used to access the MBean remotely, through

    a proxy object of course. The JMXMP protocol is marked as optional by

    the JSR 160 specification: currently, the main open-source JMX

    implementation, MX4J, and the one provided with the JDK do not support

    JMXMP. So the easier way is to expose the MBean through RMI. For this,

    the server configuration must be changed to include an RMI registry and

    connector beans.


    ```

    import org.springframework.jmx.support.ConnectorServerFactoryBean;

    import org.springframework.jmx.support.MBeanServerFactoryBean;

    import org.springframework.remoting.rmi.RmiRegistryFactoryBean;

    ....

    @SpringBootApplication

    @EnableMBeanExport

    public class Application {

    private static Logger logger = LoggerFactory.getLogger(Application.class);

    @Bean

    @DependsOn("rmiRegistry")

    ConnectorServerFactoryBean connector() {

    ConnectorServerFactoryBean cf = new ConnectorServerFactoryBean();

    try {

    cf.setObjectName("connector:name=rmi");

    } catch (MalformedObjectNameException e) {

    return  null;

    }

    cf.setServiceUrl(

    "service:jmx:rmi://localhost/jndi/rmi://localhost:1099/jmxrmi");

    return cf;

    }

    @Bean

    RmiRegistryFactoryBean rmiRegistry() {

    RmiRegistryFactoryBean rmiRegistryFactoryBean = new RmiRegistryFactoryBean();

    rmiRegistryFactoryBean.setAlwaysCreate(true);

    rmiRegistryFactoryBean.setPort(1099);

    return rmiRegistryFactoryBean;

    }

    ...

    }

    ```


    On the client side we need a `MBeanServerConnection`

    bean to be able to connect to the RMI server, which will be created by

    the `MBeanServerConnectionFactoryBean`

    factory bean, and a MBeanProxyFactoryBean that will take care of

    creating the `JmxCounter` proxy.'
