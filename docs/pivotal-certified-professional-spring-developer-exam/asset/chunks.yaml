    \nActiveMQ destinations must be declared as beans of type `org.apache.activemq.command.ActiveMQQueue`\n\
    for queues and `org.apache.activemq.command.ActiveMQTopic`\nfor topics.\n\nSpring\
    \ JmsTemplate\n\nSpring enables decoupling of the application from the backend\n\
    infrastructure, but the application must be coded against the API. The\n`org.springframework.jms.core.JmsTemplate`\n\
    is the central class of the Spring JMS core package. It is a helper\nclass that\
    \ is designed to simplify synchronous JMS message sending and\nreceiving, by handling\
    \ creation and release of resources. This template\nclass provides the following\
    \ development advantages:\n\n*   reduces boilerplate code, but the developer can\
    \ implement callback\n    interfaces, giving them a clearly defined high-level\
    \ contract if the\n    task requires it\n\n*   transparent management of JMS resources\n\
    \n*   exposes a basic request–reply operation that makes it possible to send a\n\
    \    message and wait for a reply on a temporary queue that is created as\n  \
    \  part of the operation\n\n*   provides practical exception handling, by converting\
    \ JMS exceptions into\n    Spring-specific JMS unchecked exceptions (extensions\
    \ of `org.springframework.jms.JmsException`)\n\n*   supports custom message converters\
    \ and destination resolvers\n\n*   provides convenience methods and callbacks\n\
    \nStarting with Spring Framework 4.1, the `org.springframework.jms.core.JmsMessagingTemplate`\n\
    class was introduced, which is built on the `JmsTemplate` to\nprovide an integration\
    \ with the Spring messaging abstraction `org.springframework.messaging.Message<T>`,\n\
    which allows generic message creation.\n\nThe `JmsTemplate`\nuses implementation\
    \ of the `org.springframework.jms.support.converter.MessageConverter`\nimplementation\
    \ to convert between objected and `Messages`. The `SimpleMessageConverter`\nhandles\
    \ basic types: text, serializable object types, maps, and byte[].\nFor more complex\
    \ objects, developers can provide their own\nimplementations or delegate to an\
