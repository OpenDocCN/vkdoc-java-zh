    \ so no hard-coding is needed. In the previous\nexample, the original request\
    \ URI could be `localhost:8080/users`,\nand the `Location` header value\nwould\
    \ be `localhost:8080/users/johncusack`,\nwhich is created by concatenating the\
    \ original URL with the username\nvalue. The URL parameter `$username`[^(15)](#A978-1-4842-0811-3_7_Chapter.html#Fn15)\
    \ is\nreplaced by calling the `template.expand(...)`\nmethod. This URI can be\
    \ used further by the client to request the newly\ncreated resource representation.\n\
    \n!\n\nYou may have noticed in the previous example that the identification key\n\
    for a user resource is its `username`. Since the\nusername is unique in our database\
    \ and the database ID should not be\nexposed for security reasons, the username\
    \ is a more suitable choice for\nan identifier in this case. Also keep in mind\
    \ that case-sensitive values\nin the URL might cause trouble, especially when\
    \ the server application\nis installed on a case-insensitive operating system\
    \ like Windows.\n\nWeb applications use a collection of status codes to let the\
    \ client know\nwhat happened to a request, whether it was successfully processed\
    \ and\nthe state of the resource. The most familiar to you is probably the\n`404\
    \ Not Found`\nstatus code that is returned when a requested resource cannot be\
    \ found.\nA full list of HTTP status codes can be found on Wikipedia, and you\
    \ can\nlook at it if you are curious and unfamiliar with HTTP status codes.[^(16)](#A978-1-4842-0811-3_7_Chapter.html#Fn16)\n\
    \nWith Spring MVC, the status code of a response can be set easily using\nthe\
    \ `@ResponseStatus`\nannotation on controller methods. This annotation can receive\
    \ as value\nany of the constants defined in the Spring class `HttpStatus`. Table\n\
    [7-3](#A978-1-4842-0811-3_7_Chapter.html#Tab3) contains\nthe most common response\
    \ statuses used in RESTful applications.\n\nTable 7-3.\n\nHTTP status codes table\n\
    \nHTTP Status\n |\n  HttpStatus constant\n |\n  Observation\n |\n\n| --- | ---\
    \ | --- | --- | --- | --- | --- |\n\n|\n  OK\n |\n  Successful GET with returned\
    \ content\n |\n\n|\n  CREATED\n |\n  Successful PUT or POST; location header should\
    \ con-tain URI or new\nresource.\n |\n\n|\n  NO_CONTENT\n |\n  Empty response,\
    \ after successful PUT or DELETE\n |\n\n|\n  NOT_FOUND\n |\n  Resource was not\
    \ found.\n |\n\n|\n  FORBIDDEN\n |\n  Server is refusing to respond to the request,\
    \ because the response is\nnot authorized.\n |\n\n|\n  METHOD_NOT_ALLOWED\n |\n\
    \  Http method is not supported for the resource identified by the Request\nURI.\n\
    \ |\n\n|\n  CONFLICT\n |\n  Problems when making changes, when PUT or POST try\
    \ to save data that\nalready exists and is marked as unique.\n |\n\n|\n  UNSUPPORTED_MEDIA_TYPE\n\
    \ |\n  The server is refusing to service the request because the entity of the\n\
    request is in a format not supported by the requested resource for the\nrequested\
    \ method.\n |\n\nHaving a controller method annotated with `@ResponseStatus` will\n\
    stop the `DispatcherServlet`\nfrom trying to find a view to render. Thus controller\
    \ methods that\nreturn void will just return a response with an empty body. The\
    \ methods\nthat return an empty body are usually the DELETE methods:\n\n```\n\
    @RestController\npublic class RestUserController {\n...\n@ResponseStatus(HttpStatus.NO_CONTENT)\n\
    @RequestMapping(value = \"/users/{$username}\", method = RequestMethod.DELETE)\n\
    public void delete(@PathVariable(\"$username\") String username)\nthrows UserException\
    \ {\nUser user = userService.findByUsername(username);\nif (user == null ) {\n\
    throw new UserException(\"No user found for username \" + username);\n}\nuserService.deleteById(user.getId());\n\
    }\n}\n```\n\nStarting with Spring 4.3, composed annotations have been introduced\
    \ that\ncan replace the `@RequestMapping`\nannotation with a certain HTTP method.\
    \ They are grouped in the `org.springframework.web.bind.annotation`\npackage.\
    \ In Table [7-4](#A978-1-4842-0811-3_7_Chapter.html#Tab4), Spring\nannotations\
    \ and other equivalents are listed.\n\nTable 7-4.\n\nHTTP status codes Table\n\
    \nHTTP Method\n |\n  @RequestMapping\n |\n  Spring 4.3 Annotation\n |\n\n| ---\
    \ | --- | --- | --- | --- | --- | --- |\n\nGET\n |\n  @RequestMapping(method=RequestMethod.DELETE)\n\
    \ |\n  @GetMapping\n |\n\nPOST\n |\n  @RequestMapping(method=RequestMethod.POST)\n\
    \ |\n  @PostMapping\n |\n\nDELETE\n |\n  @RequestMapping(method=RequestMethod.DELETE)\n\
    \ |\n  @DeleteMapping\n |\n\nPUT\n |\n  @RequestMapping(method=RequestMethod.PUT)\n\
    \ |\n  @PutMapping\n |\n\n!\n\nThe difference between `@GetMapping` and `@RequestMapping`\
    \ is\nthat the former does not support the `consumes` attribute of\n@RequestMapping.\
    \ (This attribute will be introduced a little bit later\nin this section.)\n\n\
    If for some reason `@RestController`\ncannot be used, in Spring MVC, type `org.springframework.http.ResponseEntity`\n\
    can be used as the return value from a `@Controller` method to\ntell the dispatcher\
    \ that the response is to be serialized and forwarded\nto the client instead of\
    \ being resolved to a view:\n\n```\n@Controller\npublic class UserController {\n\
    @Autowired\nUserService userService;\n@Autowired\nPetService petService;\n@RequestMapping(value\
    \ = \"/pets/{$username}\", method = RequestMethod.POST)\npublic ResponseEntity\
    \ createPet(@PathVariable(\"$username\") String username,\n@RequestBody Pet pet,\n\
    @Value(\"#{request.requestURL}\") StringBuffer url)\nthrows UserException {\n\
    User owner = userService.findByUsername(username);\nif (owner == null) {\nthrow\
    \ new UserException(\"User not found with username \" + username);\n}\npetService.save(pet);\n\
    HttpHeaders headers = new HttpHeaders();\nheaders.add(\"Location\", getLocationForPet(url,\
    \ pet.getRfid()));\nreturn new ResponseEntity(headers, HttpStatus.CREATED);\n\
    }\n/**\n* Determines URL of pet resource based on the full URL of the given request,\n\
    * appending the path info with the given childIdentifier using a UriTemplate.\n\
    */\nprotected static String getLocationForPet(StringBuffer url, Object petRfid)\
    \ {\nUriTemplate template = new UriTemplate(url.append(\"/{$petid}\").toString());\n\
    return template.expand(petRfid).toASCIIString();\n}\n}\n```\n\nIn the previous\
    \ code snippet, a `Pet` record is created\nfor user identified by `$username`\
    \ path\nvariable. After the object is created, a response is sent with the\nlocation\
