    method bodies missing. To test your understanding of implementing Spring RESTful
    applications and testing them, you can try completing it. There are seven TODO
    tasks numbered from 55 to 61, and if you need inspiration or a confirmation that
    your solution is correct, you can compare it with the proposed solution that you
    can find in project `15-ps-ws-rest-solution`.


