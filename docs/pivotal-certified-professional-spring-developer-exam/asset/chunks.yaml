- fmt: "3. `READ_COMMITTED`:\n   Dirty reads are not possible when a transaction is\
    \ used with this isolation level. This is the default strategy for most databases.\
    \ But a different phenomenon could happen here: repeatable read: when the same\
    \ query is executed multiple times, different results might be obtained. (Example:\
    \ a user is extracted repeatedly within the same transaction. In parallel, a different\
    \ transaction edits the user and commits. If the first transaction has this isolation\
    \ level, it will return the user with the new properties after the second transaction\
    \ is committed.)\n\n4. `REPEATABLE_READ`: This level of isolation does not allow\
    \ dirty reads, and repeatedly querying a table row in the same transaction will\
    \ always return the same result, even if a different transaction has changed the\
    \ data while the reading is being done. The process of reading the same row multiple\
    \ times in the context of a transaction and always getting the same result is\
    \ called repeatable read.\n\n5. `SERIALIZABLE`: This is the most restrictive isolation\
    \ level, since transactions are executed in a serialized way. So no dirty reads,\
    \ no repeatable reads, and no phantom reads are possible. A phantom read happens\
    \ when in the course of a transaction, execution of identical queries can lead\
    \ to different result sets being returned.\n\n6. `timeout`: By default, the value\
    \ of this attribute is defined by the transaction manager provider, but it can\
    \ be changed by setting a different value in the annotation: `@Transactional(timeout=3600)`.\
    \ The value represents the number of milliseconds after which a transaction is\
    \ considered failed, and the default value is –1 which means timeouts are not\
    \ supported.\n\n7. `rollbackFor`: Attribute values should be one or more exception\
    \ classes, subclasses of `Throwable`. When this type of exception is thrown during\
    \ the execution of a transactional method, the transaction is rolled back. By\
    \ default, a transaction is rolled back only when a `RuntimeException` is thrown.\
    \ In using this attribute, the rollback can be triggered for checked exceptions\
    \ as well.\n\nIn the code snippet below, `MailSendingException` is a checked exception\
    \ that is thrown when a notification of successful user modification cannot be\
    \ sent via email. The basic idea is this: the main operation was performed successfully,\
    \ and the user data has been updated. It does not make sense to roll back the\
    \ changes because a notification could not be sent.\n\n```\n@Transactional(rollbackFor\
    \ = MailSendingException.class)\npublic int updatePassword(Long userId, String\
    \ newPass)\nthrows MailSendingException {\n    User u = userRepo.findById(userId);\n\
    \    String email = u.getEmail();\n    sendEmail(email);\n    return userRepo.updatePassword(userId,\
    \ newPass);\n}\nprivate void sendEmail(String email)\nthrows MailSendingException\
    \ {\n    ... // code not relevant here\n}\n```\n\n8. `noRollbackFor`: Attribute\
    \ values should be one or more exception classes, subclasses of `Throwable`. When\
    \ this type of exception is thrown during the execution of a transactional method,\
    \ the transaction is not rolled back. By default, a transaction is rolled back\
    \ only when a `RuntimeException` is thrown. Using this attribute, rollback of\
    \ a transaction can be avoided for a `RuntimeException` as well.\n\nThe `@Transactional`\
    \ annotation can be used at the class level too. In this case, all the methods\
    \ in the class become transactional, and all properties defined for the transaction\
    \ are inherited from the `@Transactional` class level definition, but they can\
    \ be overridden by a `@Transactional` defined at the method level.\n\n```\n@Service\n\
    @Transactional(readOnly = true,\npropagation = Propagation.REQUIRED)\npublic class\
    \ UserServiceImpl implements UserService {\n    ...\n    @Transactional(propagation\
    \ = Propagation.REQUIRES_NEW)\n    @Override\n    public User findById(Long id)\
    \ {\n        return userRepo.findById(id);\n    }\n    @Transactional(propagation\
    \ = Propagation.SUPPORTS)\n    @Override\n    public void htmlAllByNameAll(String\
    \ name){\n        userRepo.htmlAllByName(name);\n    }\n}\n```\n\n`@Transactional`\
    \ can also be used on abstract classes and interfaces. This leads to all implementation\
    \ methods inheriting the transactional behavior defined by the annotation on the\
    \ parent class/interface, but it is not the recommended practice.\n\n## Testing\
    \ transactional methods\n\nFor test cases involving datasource operations, a few\
    \ practical annotations were added in Spring 4.1 to the `org.springframework.test.context.jdbc`\
    \ package:\n\n* The `@Sql` annotation can be used to specify SQL scripts to be\
    \ executed against a given database during integration tests. It can be used on\
    \ classes and on methods. It can be used multiple times when the SQL files to\
    \ be executed have different syntax, error handling rules, or different execution\
    \ phases. The tests specific to this section are integration tests, because they\
    \ test the communication between a service and a repository. So they are a perfect\
    \ fit to introduce this annotation.\n\n* The `@SqlGroup` annotation can be used\
    \ on classes and methods to group together `@Sql` annotations. It can be used\
    \ as a meta-annotation to create custom composed annotations. For example, when\
    \ more than one datasource is involved, it can be used together with `@SqlConfig`\
    \ to group scripts to be executed to prepare the test environment for a single\
    \ test case involving both datasources:\n\n```\n@SqlGroup({\n    @Sql(scripts\
    \ = \"script1.sql\", config = @SqlConfig(dataSource = \"dataSource1\")),\n   \
    \ @Sql(scripts = \"script2.sql\", config = @SqlConfig(dataSource = \"dataSource2\"\
    ))\n})\n```\n\n* The `@SqlConfig` is used to specify the configuration of the\
    \ SQL script.\n\nIn the code snippet below, you can see how these annotations\
    \ can be used to test your service classes. The first example uses multiple `@Sql`\
    \ annotations; the second groups them with `@SqlGroup`. The example can be tested\
    \ by running the `UserServiceTest.testCount()` method from the `06-ps-tx-practice`\
    \ project.\n\n```\nimport org.springframework.test.context.jdbc.Sql;\nimport org.springframework.test.context.jdbc.SqlConfig;\n\
    import org.springframework.test.context.jdbc.SqlGroup;\n...\n@RunWith(SpringJUnit4ClassRunner.class)\n\
    @ContextConfiguration(classes = {TestDataConfig.class, AppConfig.class})\n@ActiveProfiles(\"\
    dev\")\npublic class UserServiceTest {\n    @Test\n    @Sql(value =\"classpath:db/extra-data.sql\"\
    ,\n         config = @SqlConfig(encoding = \"utf-8\", separator = \";\", commentPrefix\
    \ = \"--\"))\n    @Sql(\n        scripts = \"classpath:db/delete-test-data.sql\"\
    ,\n        config = @SqlConfig(transactionMode = SqlConfig.TransactionMode.ISOLATED),\n\
    \        executionPhase = Sql.ExecutionPhase.AFTER_TEST_METHOD\n    )\n    public\
    \ void testCount(){\n        int count = userService.countUsers();\n        assertEquals(8,\
    \ count);\n    }\n}\n```\n\nAlthough the syntax is quite obvious, just in case\
    \ extra clarifications are necessary, here they are:\n\n* The first `@Sql` annotation\
    \ specifies a script to be executed to save some data into the test database before\
    \ executing the test method. The `@SqlConfig` is used to declare specific SQL\
    \ syntax details, so Spring can execute the `extra-data.sql` script correctly.\n\
    \n* The second `Sql` annotation is used to execute the script that will clean\
    \ the test database after the test execution. The attribute that specifies when\
    \ the script is executed is `executionPhase`, and in this case, the value used\
    \ to tell Spring to execute the script after the test method is `Sql.ExecutionPhase.AFTER_TEST_METHOD`."
