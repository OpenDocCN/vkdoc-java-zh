  raw: "Both `@EnableTransactionManagement`\nand `<tx:annotation-driven ../>` enable\
    \ all infrastructure beans necessary for supporting\ntransactional execution.\
    \ But there is a minor difference between them.\nThe XML configuration element\
    \ can be used like this: `<tx:annotation-driven />` without the `transaction-manager`\n\
    attribute. In this case, Spring will look for a bean named `transactionManager`\
    \ by\ndefault, and if it is not found, the application won’t start. The `@EnableTransactionManagement`\n\
    is more flexible; it looks for a bean of any type that implements the\n`org.springframework.transaction.PlatformTransactionManager`,\n\
    so the name is not important. In case the default transaction manager\nbean must\
    \ be established without a doubt, this can be done by making the\nconfiguration\
    \ class annotated with `@EnableTransactionManagement`\nimplement the `org.springframework.transaction.annotation.TransactionManagementConfigurer`\n\
    interface and declare the default transaction manager by providing an\nimplementation\
    \ for the method `annotationDrivenTransactionManager`.\n\n```\nimport org.springframework.transaction.annotation.TransactionManagementConfigurer;\n\
    ...\n@EnableTransactionManagement\n@Configuration\npublic class AppConfig implements\
    \ TransactionManagementConfigurer {\n...\n@Bean\npublic PlatformTransactionManager\
    \ txManager(){\nreturn new DataSourceTransactionManager(dataSource());\n}\n@Overrride\n\
    public PlatformTransactionManager annotationDrivenTransactionManager() {\nreturn\
    \ txManager();\n}\n}\n```\n\nThis is useful, because in bigger applications requiring\
    \ more than one\ndatasource, multiple transaction manager beans need to be declared.\
    \ If\nthe default to use is not specified, Spring cannot choose for itself,\n\
    and the application will fail to start with an ugly and explicit\nexception:\n\
    \n```\norg.springframework.beans.factory.NoUniqueBeanDefinitionException:\nNo\
    \ qualifying bean of type [org.springframework.transaction.PlatformTransactionManager]\n\
    is defined: expected single matching bean but found 2: txManager,simpleManager\n\
    ```\n\nThe transaction manager to use when executing a method in a\ntransactional\
    \ context can also be specified by the `transactionManager`\nattribute of the\
    \ `@Transactional`\nannotation. So considering that we have two transaction manager\
    \ beans,\n`txManager`,\nwhich is configured as default, and `simpleManager`, code\n\
    similar to that in the next snippet will work like a charm.\n\n```\n@Service\n\
    public class UserServiceImpl implements UserService {\nprivate UserRepo userRepo;\n\
    @Autowired\npublic UserServiceImpl(UserRepo userRepo) {\nthis.userRepo = userRepo;\n\
    }\n//default txManager is used\n@Transactional\n@Override\npublic User findById(Long\
    \ id) {\nreturn userRepo.findById(id);\n}\n@Transactional(transactionManager =\
    \ \"simpleManager\",readOnly = true)\n@Override\npublic void htmlAllByNameAll(String\
    \ name){\nuserRepo.htmlAllByName(name);\n}\n}\n```\n\nThe transactions in the\
    \ context of which methods are executed in Spring\napplications are called declarative\n\
    transactions when defined with `@Transactional`, and\nthis type of declaring transactions\
    \ is not connected to a JTA (Java\nTransaction API), which is very practical,\
    \ because this means that\ntransactions can be used in any environment: local\
    \ with JDBC, JPA,\nHibernate, or JDO (Java Data Objects), or together with an\
    \ application\nserver. Transactional behavior can be added to any method of any\
    \ bean as\nlong as the method is public, because declarative transaction behavior\n\
    is implemented in Spring using AOP. Spring also provides declarative\nrollback\
    \ rules and the possibility to customize transactional behavior\nthrough attributes\
    \ of the `@Transactional`\nannotation. And at this point, a list of these attributes\
    \ is\nappropriate:\n\n1.  The `transactionManager`\n    attribute value defines\
    \ the transaction manager used to manage the\n    transaction in the context of\
    \ which the annotated method is executed.\n\n2.  The `readOnly`\n    attribute\
    \ should be used for transactions that involve operations that\n    do not modify\
    \ the database (example: searching, counting records). The\n    default value\
    \ is `false`, and the value\n    of this attribute is just a hint for the transaction\
    \ manager, which can\n    be ignored depending of the implementation. Although\
    \ if you tell Spring\n    that the transaction is supposed only to read data,\
    \ some performance\n    optimizations will be done for read-only data access.\
    \ Although it seems\n    useless to use a transaction for reading data, it is\
    \ recommended to do\n    so to take into account the isolation level configured\
    \ for the\n    transactions. The isolation attribute will be covered shortly.\n\
    \n3.  The `propagation`\n    attribute can be used to define behavior of the target\
    \ methods: if they\n    should be executed in an existing or new transaction,\
    \ or no transaction\n    at all. The values for this attribute are defined by\
    \ the Spring `org.springframework.transaction.annotation.Propagation`\n    enum,\
    \ and they match the ones defined in JEE for EJB transactions. There\n    are\
    \ seven propagation types:\n\n1.  `REQUIRED` : an\n        existing transaction\
    \ will be used or a new one will be created to\n        execute the method annotated\
    \ with `@Transactional(propagation = Propagation.REQUIRED)`.\n\n2.  `REQUIRES_NEW`\
    \ :\n        a new transaction is created to execute the method annotated with\
    \ `@Transactional(propagation = Propagation.REQUIRES_NEW)`. If a current transaction\
    \ exists, it\n        will be suspended.\n\n3.  `NESTED` : an\n        existing\
    \ nested transaction will be used to execute the method annotated\n        with\
    \ `@Transactional(propagation = Propagation.NESTED)`. If no such transaction exists,\
    \ it will be\n        created.\n\n4.  `MANDATORY` : an\n        existing transaction\
    \ must be used to execute the method annotated with\n        `@Transactional(propagation\
    \ = MANDATORY)`. If there is no transaction to be used, an exception\n       \
    \ will be thrown.\n\n5.  `NEVER` : methods\n        annotated with `@Transactional(propagation\
    \ = Propagation.NEVER` must not be executed within a transaction. If a\n     \
    \   transaction exists, an exception will be thrown.\n\n6.  `NOT_SUPPORTED` :\n\
    \        no transaction is used to execute the method annotated with `@Transactional(propagation\
    \ = Propagation.NOT_SUPPORTED)`. If a transaction exists, it will be\n       \
    \ suspended.\n\n7.  `SUPPORTS` : an\n        existing transaction will be used\
    \ to execute the method annotated with\n        `@Transactional(propagation =\
    \ Propagation.SUPPORTS)`. If no transaction exists, the method will\n        be\
    \ executed anyway, without a transactional context.\n\nIn the following code snippet,\
    \ the `findById` method is\n    executed in a transaction and the `getPetsAsHtml`\
    \ is\n    executed within a nested transaction. Actual creation of nested\n  \
    \  transactions will work only on specific transaction managers. And as you\n\
    \    can see from the log at the end of the code snippet, `DataSourceTransactionManager`\n\
    \    is not one of them when one is working with an in-memory database. This\n\
    \    transaction manager supports nested transactions via the JDBC 3.0\n    “savepoint”\
    \ mechanism, but it needs a database management system that\n    supports savepoints,\
    \ such as Oracle, for example.\n\nNested transactions allow for complex behavior;\
    \ a transaction can start\n    before the enclosing transaction is completed.\
    \ A commit in a nested\n    transaction has no effect, and all changes will be\
    \ applied to the\n    database when the enclosing transaction is committed. If\
    \ a nested\n    transaction is rolled back, though, the enclosing transaction\
    \ is rolled\n    back to prevent leaving the database in an inconsistent state:\
    \ partial\n    changes will not be kept. Nested transactions can be used to force\n\
    \    atomic execution of multiple methods.\n\nIf instead of `NESTED`, `REQUIRED`\
    \ is used,\n    there will be no guarantee of atomic execution."
