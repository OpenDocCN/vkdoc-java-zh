    Spring Data JPA


    Spring Data 是一个 Spring 项目，旨在以更实用的方式帮助定义仓库类。仓库类有许多通用功能，因此 Spring 团队试图提供开箱即用这些功能的可能性。解决方案是引入抽象仓库，开发人员也可以对其进行自定义，以减少数据访问所需的样板代码。要在
    JPA 项目中使用 Spring Data 组件，必须引入对 `spring-data-jpa` 包的依赖。


    Spring Data 的核心接口是 `Repository<T,ID extends Serializable>`。完整的层次结构如图 5-21 所示。


    ![A978-1-4842-0811-3_5_Fig21_HTML.jpg](img/A978-1-4842-0811-3_5_Fig21_HTML.jpg)


    图 5-21.


    Spring Data JPA 仓库层次结构


    `NoRepositoryBean` 注解用于排除仓库接口被自动发现，并且不会为它们创建仓库实例。


    通常，开发人员定义的仓库接口会扩展 `Repository<T,ID extends Serializable>` 层次结构中的某个接口。这将暴露一套完整的方法来操作实体。


    如果只需要扩展 `Repository<T,ID extends Serializable>` 接口，但你不喜欢扩展 Spring 组件的想法，可以通过为仓库类添加
    `@RepositoryDefinition` 注解来避免。这将产生与扩展 `Repository` 接口相同的效果，因为该接口是空的，所以它被用作一个标记接口，可以用注解替代。


    由于本节项目需要 JPA，仓库将扩展 `JpaRepository<T, ID extends Serializable>` 接口，该接口包含一套开箱即用的默认方法骨架，为开发人员省去了相当多的工作。当自定义仓库接口扩展
    `JpaRepository` 时，它将自动获得保存实体、按 ID 搜索实体、从数据库中检索所有实体、删除实体、刷新等功能。（只需查看图 5-21，其中列出了所有方法。）


    通常，仓库类必须执行 Spring Data 仓库提供的默认方法未涵盖的自定义和更复杂的查询。在这种情况下，开发人员必须定义自己的方法，以便在创建仓库实例时让
    Spring 实现这些方法。为了告诉 Spring 这些方法应该做什么，可以使用 `@Query` 注解来标注它们。该注解内部应包含一个查询定义，该定义将在运行时执行并返回结果。在下面的代码片段中，你可以看到使用
    Spring Data JPA 时 `UserRepo` 组件的样子。


    ```

    package com.ps.repos;

    import com.ps.ents.User;

    import org.springframework.data.jpa.repository.JpaRepository;

    import org.springframework.data.jpa.repository.Query;

    import org.springframework.data.repository.query.Param;

    import java.util.List;

    public interface UserRepo extends

    JpaRepository {

    @Query("select u from User u where u.username like %?1%")

    List findAllByUserName(String username);

    // 使用命名参数

    @Query("select u from User u where u.username= :un")

    User findOneByUsername(@Param("un") String username);

    @Query("select u.username from User u where u.id= :id")

    String findUsernameById(Long id);

    @Query("select count(u) from User u")

    long countUsers();

    }

    ```


    每个 `Repository` 接口都必须与其处理的领域对象类型以及主键类型相关联，这就是为什么在上面的例子中，`UserRepo` 接口扩展了 `JpaRepository<User,
    Long>`。因此，`UserRepo` 将管理具有 `Long` 类型主键值的 `User` 领域对象。


    像这样的接口被称为即时仓库，因为它们可以通过扩展 Spring 专用接口之一来即时创建。因此，在底层，正如你可能已经猜到的，Spring 会创建一个代理对象，它是一个功能完整的仓库
    Bean。任何默认未提供的额外功能都可以通过定义方法骨架并使用注解提供所需功能来轻松实现。


    为了告诉 Spring 必须创建仓库实例，需要引入一个新的配置组件。`@EnableJpaRepositories` 告诉 Spring 必须创建仓库实例。作为参数，必须提供声明了自定义仓库接口的基础包。除此之外，配置还需要一个持久化单元管理器。在下面的代码片段中，你可以看到
    Spring JPA 配置中涉及的所有 Bean。


    ```

    import org.springframework.data.jpa.repository.config.EnableJpaRepositories;

    import org.springframework.orm.jpa.persistenceunit.DefaultPersistenceUnitManager;

    import org.springframework.orm.jpa.persistenceunit.PersistenceUnitManager;

    ...

    @Configuration

    @EnableJpaRepositories(basePackages = {"com.ps.repos"})

    @Import(DataSourceConfig.class)

    public class PersistenceConfig {

    @Autowired

    DataSource dataSource;

    @Autowired

    Properties hibernateProperties;

    @Bean

    public EntityManagerFactory entityManagerFactory(){

    LocalContainerEntityManagerFactoryBean

    factoryBean = new LocalContainerEntityManagerFactoryBean();

    factoryBean.setPersistenceUnitManager(persistenceUnitManager());

    factoryBean.setJpaVendorAdapter(new HibernateJpaVendorAdapter());

    factoryBean.setJpaProperties(hibernateProperties);

    factoryBean.afterPropertiesSet();

    return factoryBean.getNativeEntityManagerFactory();

    }

    @Bean

    public PlatformTransactionManager transactionManager() {

    return new JpaTransactionManager(entityManagerFactory());

    }

    @Bean

    public PersistenceExceptionTranslationPostProcessor exceptionTranslation(){

    return new PersistenceExceptionTranslationPostProcessor();

    }

    @Bean

    public PersistenceUnitManager persistenceUnitManager(){

    DefaultPersistenceUnitManager

    persistenceUnitManager = new DefaultPersistenceUnitManager();

    persistenceUnitManager.setPackagesToScan("com.ps.ents");

    persistenceUnitManager.setDefaultDataSource(dataSource);

    return persistenceUnitManager;

    }

    }

