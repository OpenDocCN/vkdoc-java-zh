    \ `org.springframework.test.context.junit4.SpringJUnit4ClassRunner`，它用于在测试方法之间缓存\
    \ `ApplicationContext`。所有测试都在相同的上下文中运行，使用相同的依赖项；因此这是集成测试。\n\n为了定义一个在 Spring 上下文中运行的测试类，需要执行以下步骤：\n\
