    配置和 CSRF 令牌支持的配置。要启用 CSRF 使用，上述配置还必须定义一个 CSRF 提供者 bean 并在配置中使用它：


    ```

    ...

    import org.springframework.security.web.csrf.CsrfTokenRepository;

    import org.springframework.security.web.csrf.HttpSessionCsrfTokenRepository;

    @Configuration

    @EnableWebSecurity

    public class SecurityConfig extends WebSecurityConfigurerAdapter {

    @Bean

    public CsrfTokenRepository repo() {

    HttpSessionCsrfTokenRepository repo = new HttpSessionCsrfTokenRepository();

    repo.setParameterName("_csrf");

    repo.setHeaderName("X-CSRF-TOKEN");

    return repo;

    }

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http.

    ...

    .and()

    .csrf().csrfTokenRepository(repo());

    }

    }

    ```


    开箱即用，Spring 提供了三种 `CsrfTokenRepository` 实现，在表 6-3 中列出并说明。


    表 6-3.


    Spring Security 链式过滤器


    | 过滤器类 | 位置枚举值 |

    | --- | --- |

    | `CookieCsrfTokenRepository` | 将 CSRF 令牌持久化在名为“XSRFTOKEN”的 cookie 中，并从名为“X-XSRF-TOKEN”的标头中读取，遵循
    AngularJS 的约定 |

    | `HttpSessionCsrfTokenRepository` | 将 CSRF 令牌持久化在 HttpSession 中，参数名称通过调用 `setParameterName()`
    方法设置，并从通过调用 `setHeaderName()` 方法设置的标头名称中读取 |

    | `LazyCsrfTokenRepository` | 延迟保存新的 CSRF 令牌，直到其生成的属性被访问。 |


    当使用 CSRF 支持时，需要相应地实现注销，并确保 CSRF 令牌被彻底清除和禁用，使其无法被恶意请求使用。¹⁴ 因此，Spring 3 中简单的注销链接：


    ```

    ...

    ">


    ```


    在 Spring 4 中变成了一个完整的表单，将 CSRF 令牌发送到应用程序以进行清除：


    ```

    ...


    ```


    上面使用的 `<spring:message …/>` 元素是一个用于国际化的特殊 Spring 标签。标签库指令必须存在于 JSP 文件中，特定元素的值取自位于
    `WEB-INF` 下的属性国际化文件。由于国际化不是 Spring Core 认证考试的主题，我们在此不会深入探讨。


    既然配置部分已经涵盖了所有必要内容，现在是时候介绍如何在代码中使用安全上下文和规则了。


    安全标签库


    在编写 JSP 页面时，可以使用多个标签库来简化工作、减少冗余并提供功能。通过在 JSP 页面头部添加标签库引用，就可以使用该库中定义的 JSP 元素。Spring
    提供了一个可用于保护 JSP 元素的标签库。


    在迄今为止介绍的配置示例中，对某些资源的访问是通过 `<intercept-url .../>` 元素或 `antMatcher(...)` 方法管理的。


    ```

    //mvc-security.xml


    ...


    //或 SecurityConfig.java

    public class SecurityConfig extends WebSecurityConfigurerAdapter {

    ...

    Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    .authorizeRequests()

    .antMatchers("/users/show/*").hasRole("ADMIN")

    ...

    }

    }

    ```


