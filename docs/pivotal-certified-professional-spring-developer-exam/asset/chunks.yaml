- fmt: "# Bean Lifecycle and Scopes\n\nAnnotated beans and methods are discovered\
    \ by component scanning. The bean lifecycle is the same no matter how the application\
    \ is configured, and how the beans are defined, and although the behavior looks\
    \ the same from outside, under the hood something different happens. And this\
    \ is normal, since Java Configuration and XML configurations are two different\
    \ things, but there are also common elements. Let’s cover them step by step.\n\
    \n## Bean Definitions Loading\n\n* Recall from the XML bean lifecycle section\
    \ that in the first step, the bean definitions are loaded. When XML is used, a\
    \ bean of type `org.springframework.beans.factory.xml.XmlBeanDefinitionReader`\
    \ is used to load the bean definitions from the XML file(s).\n\n* For a configuration\
    \ using Java Configuration annotations, the classpath is scanned by a bean of\
    \ type `org.springframework.context.annotation.ClassPathBeanDefinitionScanner`,\
    \ and the bean definitions are registered by a bean of type `org.springframework.context.annotation.ConfigurationClassBeanDefinitionReader`.\n\
    \n* For mixed configurations using XML and stereotype annotations, both classes\
    \ mentioned in the previous cases are used.\n\n## Bean Creation\n\nIn all cases,\
    \ XML and annotation beans are created by a factory of type `org.springframework.beans.factory.support.DefaultListableBeanFactory`.\n\
    \n## Injecting Dependencies\n\n* XML: the factory bean is used to inject dependencies.\n\
    \n* Java Configuration and all other annotations: a `org.springframework.beans.factory.annotation.AutowiredAnnotationBeanPostProcessor`\
    \ bean is used to autowire dependencies. This is a post processor bean implementation\
    \ that autowires annotated fields, setter methods, and arbitrary config methods.\
    \ It is registered by the `@Configuration` annotation, but it can also be registered\
    \ in mixed configurations by component scanning. This bean takes care of the autowiring\
    \ configured with `@Autowired`, `@Value`, and `@Inject`.\n\n* For mixed configurations,\
    \ the two approaches above are used together.\n\n## Bean Destruction\n\nIn all\
    \ cases, XML and annotations, the dirty job of disposing of a bean is the responsibility\
    \ of `org.springframework.beans.factory.support.DisposableBeanAdapter` bean.\n\
    \nAnd this is all that can be said about the internals of processing annotations.\
    \ All of them are picked up and treated accordingly by the bean post processor.\
    \ If you are really curious regarding what other beans contribute to running an\
    \ application, just set the log for the Spring Framework to DEBUG and enjoy the\
    \ display.\n\nIn the analogous XML section it was mentioned that there were equivalents\
    \ for `init-method` and `destroy-method` from the `<bean/>` element that will\
    \ be covered in the annotation section, because they were represented by two attributes\
    \ of the `@Bean` annotation. Please analyze the following example:\n\n```java\n\
    // JdbcRequestRepo.java\n@Repository(\"requestRepo\")\npublic class JdbcRequestRepo\
    \ extends JdbcAbstractRepo\nimplements RequestRepo {\n    private Logger logger\
    \ = LoggerFactory.getLogger(JdbcRequestRepo.class);\n    private void init(){\n\
    \        logger.info(\" ... initializing requestRepo ...\");\n    }\n    private\
    \ void destroy(){\n        logger.info(\" ... destroying requestRepo ...\");\n\
    \    }\n    ...\n}\n//RequestRepoConfig.java configuration class\n@Configuration\n\
    @Import(DataSourceConfig.class)\n@ComponentScan(basePackages = \"com.ps\")\npublic\
    \ class RequestRepoConfig {\n    @Bean (initMethod = \"init\", destroyMethod =\
    \ \"destroy\")\n    public RequestRepo anotherRepo(){\n        return new JdbcRequestRepo();\n\
    \    }\n}\n```\n\nThe `initMethod` attribute of the Java Configuration annotation\
    \ `@Bean` specifies the method name to be called in order to initialize `anotherRepo`,\
    \ and the `destroyMethod` attribute specifies the method to call when the context\
    \ is closed. The bean definition from the `RequestRepoConfig` class is basically\
    \ equivalent to this:\n\nA bean that is created from a definition marked with\
    \ `@Bean` or `@Component` or any of its specializations is by default a singleton.\
    \ But the scope can be changed by annotating the class or method with `@Scope`\
    \ and setting the `value` attribute to a different scope.\n\n```java\n@Component\n\
    @Scope(value = ConfigurableBeanFactory.SCOPE_PROTOTYPE)\npublic class SimpleBean\
    \ {\n    ...\n}\n```\n\n`@Scope(value = ConfigurableBeanFactory.SCOPE_PROTOTYPE)`\
    \ is equivalent to `@Scope(ConfigurableBeanFactory.SCOPE_PROTOTYPE)`, and `@Scope(\"\
    prototype\")` as constant `SCOPE_PROTOTYPE` is of type string with the “prototype”\
    \ value. Using Spring constants eliminates the risk of misspelling the scope value.\n\
    \nAnother interesting annotation is `@Lazy`, which starting with Spring 4.x can\
    \ be used on injection points (wherever `@Autowired` is used) too. This annotation\
    \ can be used to postpone the creation of a bean until it is first accessed, by\
    \ adding this annotation to the bean definition. This is useful when the dependency\
    \ is a huge object and you do not want to keep the memory occupied with this object\
    \ until it is really needed.\n\n```java\n@Component\n@Lazy\npublic class SimpleBean\
    \ { ... }\n// or on a @Bean\n@Configuration\npublic class RequestRepoConfig {\n\
    \    @Lazy\n    @Bean\n    public RequestRepo anotherRepo(){\n        return new\
    \ JdbcRequestRepo();\n    }\n}\n// on injection point\n@Repository\npublic class\
    \ JdbcPetRepo extends JdbcAbstractRepo\nimplements PetRepo {\n    ...\n    @Lazy\n\
    \    @Autowired(required=false)\n    public void setDataSource(DataSource dataSource)\
    \ {\n        this.dataSource = dataSource;\n    }\n}\n```\n\nAside from all the\
    \ annotations discussed so far, developers can develop their own annotations.\
    \ Many of the annotations provided by Spring can be used as meta-annotations in\
    \ your own code. You can view a meta-annotation as a super class. A meta-annotation\
    \ can be used to annotate another annotation. All stereotype specializations are\
    \ annotated with `@Component`, for example. Meta-annotations can be composed to\
    \ obtain other annotations. For example, let’s create a `@CustomTx` annotation\
    \ that will be used to mark service beans that will use a different transaction:\n\
    \n```java\nimport java.lang.annotation.ElementType;\nimport java.lang.annotation.Retention;\n\
    import java.lang.annotation.RetentionPolicy;\nimport java.lang.annotation.Target;\n\
    import org.springframework.transaction.annotation.Transactional;\n@Target({ElementType.METHOD,\
    \ ElementType.TYPE})\n@Retention(RetentionPolicy.RUNTIME)\n@Transactional(\"customTransactionManager\"\
    , timeout=\"90\")\npublic @interface CustomTx {\n    boolean readOnly() default\
    \ false;\n}\n```\n\nAfter all this talk about annotations and how great they are,\
    \ you probably want to use them. The `02-ps-container-02-practice` contains all\
    \ examples from the Java Config and Annotations sections. All the configuration\
    \ classes are in the `com.ps.config` package. All the bean classes are under `com.ps.repo`.\
    \ In the `resources` directory you can find some XML configuration classes used\
    \ in the mixed examples. There is only one TODO task for this project. The TODO\
    \ number 13 requires you to replace wherever you can the Spring annotations with\
    \ JSR annotations."
