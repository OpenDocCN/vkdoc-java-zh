    SOAP 是所有 Web 服务接口的前身，尽管 REST 正在迅速普及，但它不会很快消失，因为最近引入的 SOAP 1.2 已经修复了该技术的许多公认缺点，并将其推向了采用率和易用性的新高度。此外，从
    1.2 版本开始，SOAP 这个缩写词不再代表 W3C 组织的简单对象访问协议；它现在只是该规范的名称。REST 使用 HTTP/HTTPS 协议，但 SOAP
    的主要优势在于比它更灵活，因为它几乎可以使用任何传输协议来发送消息，甚至包括 JMS。SOAP 的主要缺点是仅使用 XML，这很冗长并且需要大量时间来解析。因此，即使它不是官方考试的一部分，本节内容也可能对您未来的项目有所帮助。本节没有实际应用，但欢迎您修改
