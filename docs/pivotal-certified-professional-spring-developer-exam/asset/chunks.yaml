  trans: "\n## 关于认证考试\n\n如果您有兴趣成为认证的 Spring 专业人士，第一步需要访问 Pivotal 官方学习网站 [`http://pivotal.io/training`](http://pivotal.io/training)\
    \ 并搜索 Spring 认证部分。在那里您将找到有关官方培训的所有详细信息，包括培训地点和时间。培训为期四天，也提供在线培训。在 Pivotal 网站创建账户后，您可以选择所需的培训。完成付款后，如果您选择在线培训，大约一个月后，您将通过邮件收到一个官方培训套件，包含以下内容：\n\
    \n*   一副会议耳机（通常为罗技品牌），用于培训期间聆听讲师讲解并提问。⁹\n*   一个专业网络摄像头（通常为罗技品牌），用于培训期间让讲师和同学看到您，从而模拟课堂体验。¹⁰\n\
    *   一本 Spring 学习指南，包含讲师在培训期间使用的幻灯片打印版。（出于环保考虑，也可能提供电子版。）\n*   一本 Spring 实验手册，包含培训期间实践练习的说明和指导。（出于环保考虑，也可能提供电子版。）\n\
    *   一个 Pivotal 官方 U 盘，包含以下内容：\n    *   JDK 安装程序\n    *   培训期间所需的源代码。每个实验都附带一个缺少配置和代码的小型\
    \ Spring 应用程序，学员的任务是补全它，使其成为一个可运行的应用程序。本书附带的代码也采用了相同的模式。\n    *   最新稳定版 Spring\
    \ Tool Suite 的安装程序。课程强制要求使用 U 盘中的版本，因为该安装程序会设置一个包含所有必要依赖项的本地 Maven 仓库，以及一个包含实验源码的完整\
    \ Eclipse 项目配置。STS 还内置了一个 tcServer，用于运行 Web 实验应用程序。\n    *   Spring 实验手册的 HTML\
    \ 或 PDF 版本。\n\n如果您决定不参加在线培训课程，则不会收到耳机和网络摄像头。培训套件和其他材料将在您抵达培训地点时发放。培训结束后，您将收到一张免费凭证，用于在附近的授权考试中心预约认证考试。基本上，发给您的凭证或凭证代码是您已参加官方\
    \ Spring Web 培训的证明。\n\n!\n\n考试时长为九十分钟，包含五十道题目。题目包括单选题和多选题。多选题会明确告知您需要选择多少个正确答案。本书中的题目实际上更难，因为不会告知您需要选择的正确选项数量。但附录中会提供答案的完整解释。\n\
    \n考试题目将（大致）涵盖以下主题：\n\n*   Spring 概述容器、IoC 和依赖注入\n*   SpEL 和 Spring AOP\n*   Spring\
    \ JDBC、事务、ORM\n*   Spring MVC 和 Web 层\n*   Spring Security\n*   Spring 消息传递和 REST\n\
    *   Spring 测试\n\n考试及格分数为 76%。这意味着需要答对 38 题才能通过。大多数题目会向您展示一段 Java 代码或配置，并询问其作用，因此请确保您理解本书附带的代码，并编写自己的\
    \ Bean 和配置，以便更好地理解框架。好消息是，考试中的所有代码都可以在您参加官方培训时获得的源码中找到。其他题目会给出关于 Spring Web 的断言，并要求您选择正确或错误的陈述。\n\
    \n如果您阅读本书、理解所有示例、完成实践练习，然后参加官方培训，我建议您尽快参加认证考试。不要在完成培训后间隔太长时间才参加考试，因为我们毕竟都是凡人，信息可能会被遗忘。此外，认证凭证的有效期仅为一年。如果第一次考试失败，您可以重考，但需要花费约\
    \ 150 美元。\n\n## 如何将本书用作学习指南\n\n本书的编写方式旨在引导您逐步了解 Spring 这一精彩技术。它遵循与官方培训相同的学习曲线，并侧重于认证考试所需的相同主题，因为这些主题在实际生产应用中也最为需要。不需要用于认证考试的主题会进行标记，以便您知道可以跳过，但如果您对\
    \ Spring 真正感兴趣，肯定不会这样做。\n\n主要区别在于实践示例中使用的工具，这些工具将在后面简要介绍。\n\n## 本书的结构是怎样的？\n\n\
    本书包含八个章节和一个附录。官方 Spring 指南有十六个章节，但为了本书的目的，相关主题被整合在一起。例如，官方学习指南有四个独立的章节来介绍依赖注入、Spring\
    \ Core 基础和配置。本书只有一个关于这些主题的大章节：第 2 章——Bean 生命周期与配置。\n\n章节列表及其简要说明见表 1-1。\n\n表 1-1.\n\
    \n按章节划分的主题列表\n\n| 章节 | 主题 | 详情 |\n| --- | --- | --- |\n| 1 | 书籍概述 | Spring 历史、实践所用技术与工具介绍\
    \ |\n| 2 | Bean 生命周期与配置 | Spring 核心基本概念、组件和配置 |\n| 3 | 测试 Spring 应用程序 | 如何测试 Spring\
    \ 应用程序、最常用的测试库和测试原则 |\n| 4 | 面向切面编程 | AOP 概念、解决的问题及其在 Spring 中的支持方式 |\n| 5 | 数据访问\
    \ | 使用 JDBC、Hibernate 和 Spring Data JPA 的高级 Spring 数据访问 |\n| 6 | Spring Web |\
    \ Spring MVC 基础介绍 |\n| 7 | Spring 高级主题 | 远程处理、消息传递、基于 REST 的 Web 服务 |\n| 8 | 使用\
    \ Spring Cloud 的 Spring 微服务 | Spring 微服务介绍及其用途 |\n| A | 附录 | 两套模拟考试、复习题答案及其他说明\
    \ |\n"
- fmt: '### How Each Chapter Is Structured


    The introductory chapter, the one you are reading now, covers the basics of Spring
    that every developer using this book should know: what Spring is, how it has evolved,
    how many official Spring projects there are, the technologies used to build and
    run the practical exercises, how you can register for the exam to become a Certified
    Spring Professional, and so on. This chapter is the exception. It is structured
    differently from the others, because it was designed to prepare you for what it
    will be coming next.


    The remaining chapters are designed to cover a Spring Module and associated technologies
    that will help you build a specific type of Spring application. Each chapter is
    split into a few sections, but in a nutshell, a chapter is organized as follows:


    - Basics

    - Configuration

    - Components

    - Summary

    - Quick quiz

    - Practical exercise


    The longer chapters deviate from this structure, introducing small practice exercises
    after key sections, since solving these exercises will help you to check your
    understanding and solidify your knowledge of the presented components.


    Code that is irrelevant to Spring understanding will not always be quoted in this
    book, but it is available to you in the book’s practice project.


    #### Conventions


    ! This symbol appears in front of paragraphs to which you should pay particular
    attention.


    ** This symbol appears in front of a paragraph that is an observation or an execution
    step that you can skip.


    ? This symbol appears in front of a question for the user.


    . . . This symbol represents missing code that is not relevant for the example.


    CC This symbol appears in front of a paragraph that describes a Convention over
    Configuration practice in Spring, a default behavior that helps the developer
    reduce his or her work.


    `[random text here]` When you have text surrounded by square brackets, this means
    that the text between the brackets should be replaced by a context-related notion.


    #### Downloading the Code


    This book has code examples and practical exercises associated with it. There
    will be missing pieces of code that you will have to fill in to make applications
    work and test your understanding of Spring Web. I recommend that you go over the
    code samples and do the exercises, since similar pieces of code and configurations
    will appear in the certification exam.


    The following downloads are available:


    - Source code for the programming examples in the practice section using XML configuration

    - Source code for the programming examples in the practice section using Java
    configuration


    You can download these items from the Source Code area of the Apress website [`http://www.apress.com`](http://www.apress.com/).


    #### Contacting the Author


    More information about Iuliana Cosmina can be found at [`http://ro.linkedin.com/in/iulianacosmina`](http://ro.linkedin.com/in/iulianacosmina).
    She can be reached at `mailto:iuliana.cosmina@gmail.com`.


    Follow her personal coding activity on [`https://github.com/iuliana`](https://github.com/iuliana).


    ## Recommended Development Environment


    If you decide to attend the official course, you will notice that the development
    environment recommended in this book differs considerably from the one used at
    the course. A different editor was recommended, a different application server,
    and even a different build tool. The reason for this was to improve and expand
    your experience as a developer and to offer a practical development infrastructure.
    Motivation for each choice will be mentioned on the corresponding sections.


    ### Recommended JVM


    ![A978-1-4842-0811-3_1_Figa_HTML.jpg](A978-1-4842-0811-3_1_Figa_HTML.jpg) Java
    8, the official JVM form Oracle. Download the JDK matching your operating system
    from [`http`](http://www.oracle.com/)`:` [`//www.oracle.com`](http://www.oracle.com/)
    and install it.


    ! It is recommended that you set the `JAVA_HOME` environment variable to point
    to the directory where Java 8 was installed (the directory in which the JDK was
    unpacked) and add `%JAVA_HOME%\bin` for Windows, `$JAVA_HOME/bin` for Unix-based
    operating systems, to the general path of the system. The reason behind this is
    to ensure that other development applications written in Java will use this version
    of Java and prevent strange incompatibility errors during development.


    ! Verify that the version of Java the operating system sees is the one you just
    installed by opening a terminal (`Command Prompt` in `Windows`, and any type of
    terminal you have installed on `MacOs` and `Linux`) and typing:


    ```

    java -version

    ```


    You should see something similar to this:


    ```

    java version "1.8.0_74"

    Java(TM) SE Runtime Environment (build 1.8.0_74-b02)

    Java HotSpot(TM) 64-Bit Server VM (build 25.74-b02, mixed mode)

    ```'
