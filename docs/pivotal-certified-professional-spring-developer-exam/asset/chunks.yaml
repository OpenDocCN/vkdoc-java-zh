    ## Summary


    After reading this chapter you should have a proper understanding of how Spring
    can be used to develop distributed applications based on the microservices architecture.
    Below, you can find a simple list of topics that you should keep handy when reviewing
    what you have learned.


    *   Describe the microservices architecture.

    *   Spring Cloud is built on Spring Boot.

    *   What are typical Spring cloud annotations used in developing microservices
    applications?

    *   Netflix has developed and outsourced numerous projects designed to support
    development and running of distributed applications.

    *   How is Service Discovery set up?

    *   How is a microservice RESTful interface accessed?

    *   What is Eureka?

    *   What is Ribbon?


    ## Quick Quiz


    **Question 1:** Which of the following affirmations describe the microservices
    architecture?


    1.  In a microservices architecture, services should have small granularity, and
    the communications protocols should be lightweight.

    2.  In a microservices architecture, the interprocess communication can be done
    only using RESTful interfaces.

    3.  In a microservices architecture, the design is unified, and components are
    interconnected and interdependent.


    **Question 2:** Which of the following are advantages of the microservices architecture?


    1.  Microservices-based applications are highly scalable.

    2.  There is improvement in fault isolation.

    3.  Transaction management is not needed.

    4.  Deploying microservices-based application is painless.


    **Question 3:** Which of the following is the core component of a microservices-based
    distributed application?


    1.  a service implementation

    2.  a database

    3.  a registry and discovery server


    **Question 4:** What can be said about Spring Cloud?


    1.  It is built on Spring Boot.

    2.  It is an umbrella project that provides tools for developers to quickly build
    some of the common patterns in distributed systems.

    3.  It is a proprietary Pivotal service for building distributed applications
    available only by paid subscription.


    **Question 5:** Which of the following annotations is used to declare an instance
    of a Eureka server?


    1.  `@EnableNetflixEureka`

    2.  `@EurekaAutoConfiguration`

    3.  `@EnableEurekaServer`


    **Question 6:** Which of the following annotations is used for service registration
    and discovery with a discovery server?


    1.  `@EnableDiscoveryClient`

    2.  `@EnableEurekaClient`

    3.  `@EnableSeviceRegistration`


    ## Footnotes


    A microservice must be able to scale, up or down, independently of other services
    in the same application.


    Spring Cloud projects are publicly available on Github: [`https://github.com/spring-cloud`](https://github.com/spring-cloud).'
