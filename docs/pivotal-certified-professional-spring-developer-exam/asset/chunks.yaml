    In the sample above we have two configuration classes, each declaring a bean named
    `dataSource`, each bean specific to a different environment. The profiles are
    named simply `prod`, for the production environment, and `dev`, for the development
    environment. In the test class we can activate the development profile by annotating
    the test class with `@ActiveProfiles` annotation and giving the profile name as
    argument. Thus, in the test context only the beans defined in classes annotated
    with `@Profile("dev")` will be created and injected. The test class is depicted
    in the following code snippet.


    ```java

    import org.springframework.test.context.ActiveProfiles;

    ...

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {PetConfigClass.class})

    @ActiveProfiles("dev")

    public class PetServiceTest {

    public static final Long PET_ID = 1L;

    @Autowired

    PetService simplePetService;

    //positive test, we know that a Pet with ID=1 exists

    @Test

    public void findByIdPositive() {

    Pet pet = simplePetService.findById(PET_ID);

    assertNotNull(pet);

    }

    }

    ```


    By annotating the test class `@ActiveProfiles("dev")`, the development profile
    is activated, so when the context is created, bean definitions are picked up from
    the configuration class (or files) specified by the `@ContextConfiguration` annotation
    and all the configuration classes annotated with `@Profile("dev")`. Thus, when
    running the test, the in-memory database will be used, making the execution fast
    and practical.


    ## Conclusion


    Using the Spring-provided test classes to test a Spring application is definitely
    easier than not doing it, since no external container is needed to define the
    context in which the tests run. If the configuration is decoupled enough, pieces
    of it can be shared between the test and production environment. For basic unit
    testing, Spring is not needed, but in order to implement proper integration testing,
    the ability to set up a test context in record time is surely useful.


    ## Summary


    After reading this chapter you should possess enough knowledge to test a Spring
    application using unit and integration testing.


    * Testing is an important part of the development process.

    * What is unit testing, and what library is useful for writing unit tests in Java?

    * What is a stub?

    * What is a mock?

    * What is integration testing?

    * How does one set up a Spring Test Context?


