    }

    ```


    测试类中唯一改变的是 `@ContextConfiguration` 注解的配置；被测试组件的自动装配和测试本身保持不变。


    ```

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {TestAppConfig.class, PetConfigClass.class})

    public class SpringPetServiceTest2 {

    ...

    }

    ```


    在 Spring 3.1 中，引入了 `org.springframework.test.context.support.AnnotationConfigContextLoader`
    类。该类从注解类加载 bean 定义。因此，可以直接在测试类中创建一个配置类，以创建需要隔离测试的 bean。这很有用，因为配置类通常包含多个 bean 定义，而加载所有
    bean 仅仅为了测试其中一个，效率不高。该类必须是测试类的内部类且为静态类，并且必须将 `AnnotationConfigContextLoader` 类用作
    `@ContextConfiguration` 注解的 `loader` 属性的值。


    请查看以下代码片段：


    ```

    package com.ps.integration;

    import

    org.springframework.test.context.support.AnnotationConfigContextLoader;

    ...

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(loader=AnnotationConfigContextLoader.class)

    public class SpringPetServiceTest3 {

    public static final Long PET_ID = 1L;

    public static final User owner = buildUser("test@gmail.com", "test",

    UserType.OWNER);

    @Configuration

    static class TestCtxConfig {

    @Bean

    StubPetRepo petRepo(){

    return new StubPetRepo();

    }

    @Bean

    PetService simplePetService(){

    SimplePetService petService = new SimplePetService();

    petService.setRepo(petRepo());

    return petService;

    }

    }

    @Autowired

    PetService simplePetService;

    @Test

    public void findByOwnerPositive() {

    Set result = simplePetService.findAllByOwner(owner);

    assertEquals(result.size(), 2);

    }

    }

    ```


    此外，Spring Test 可以与模拟（mocking）结合使用，编写跳过重量级组件（例如提供数据库访问的组件）的集成测试。为了涵盖这种特定场景，必须使用仓库类的具体实现。由于它们的实现与本章无关，将在后面的第
    5 章（数据访问）中介绍，因此此处不提供完整代码。为了管理 `Pet` 对象，需要一个 Repository 类。在 Spring 应用程序中提供数据库访问的最基本方式是使用
    `org.springframework.jdbc.core.JdbcTemplate` 类型的 bean，因此将创建具有该类型依赖项的仓库类。从该 bean
    查询数据库的方法需要一个能够将数据库记录映射到实体的对象，这就是为什么每个仓库类都应定义一个实现 Spring 特定映射接口 `org.springframework.jdbc.core.RowMapper<T>`
    的内部类。

