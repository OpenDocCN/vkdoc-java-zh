    \n现在我们已经介绍了 Hibernate，在深入探讨 JPA 之前，再补充一些关于 ORM 的信息是合适的。\n\n对象关系映射\n\n对象关系映射，简称\
    \ ORM，是一种将数据库对象映射到应用程序对象，反之亦然的方法。这使得数据处理变得简单。除此之外，它还提供了使用面向对象方法查询数据库的可能性。Hibernate\
    \ 的全称是 Hibernate ORM，因为它实现了这种技术来允许查询和持久化数据对象。数据对象也称为领域对象或实体。无论其名称如何，该对象都对应一个数据库对象，通常是表中的一行。还可以定义更复杂的对象，它们可以封装来自多个表的数据，但由于此主题与本书无关，因此将尽量少提细节。领域对象在应用程序中易于使用，因为它们封装了存储在可访问字段中的、与表行相关的所有数据。当表中的一行成为一个领域对象时，会建立以下对应关系：\n\
