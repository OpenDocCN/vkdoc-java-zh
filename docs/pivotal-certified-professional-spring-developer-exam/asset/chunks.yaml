    \ You can compare this solution with the one you will\nimplement in the `12-ps-remoting-practice`.\n\
    \nSpring JMS\n\nJMS is part of the Java Platform Enterprise Edition and is defined\
    \ by\nJSR 914.[⁴](#A978-1-4842-0811-3_7_Chapter.html#Fn4) It is\na messaging standard\
    \ that allows applications with components based on\nJEE to create, send, receive,\
    \ and read messages. The basic building\nblocks of a JMS applications are:\n\n\
    *   messages\n\n*   message producers (publisher)\n\n*   messages consumers (subscriber)\n\
    \n*   connections\n\n*   sessions\n\n*   connection factories\n\n*   destinations\n\
    \nIn Figure [7-8](#A978-1-4842-0811-3_7_Chapter.html#Fig8), you can\nsee all the\
    \ previously listed components and how they fit into a JMS\napplication.\n\n![A978-1-4842-0811-3_7_Fig8_HTML.jpg](A978-1-4842-0811-3_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8.\n\nThe JMS API Programming Model\n\nIn the introduction of this\
    \ chapter it was mentioned that JMS is an\nabstraction for accessing Message Oriented\
    \ Middleware, which is useful\nfor avoiding vendor lock-in and for an increase\
    \ in portability. In this\nsection, the above components will be described briefly\
    \ along with the\nprocess of publishing and subscribing to messages using a JMS\
    \ broker\nusing Spring, because as you probably suspect, Spring makes using JMS\n\
    pretty easy too. Spring provides a JMS integration framework that makes\nusing\
    \ JMS API easy. The framework was developed using a similar approach\nto Spring\
    \ JDBC.\n\nJMS Connections and Sessions\n\nThe connection factories and destinations\
    \ are the parts of a JMS\napplication that are maintained administratively, rather\
    \ than\nprogrammatically, since the technology providing the implementation must\n\
    be decoupled from the implementation of JMS API used. JMS clients access\nthese\
    \ objects through JMS API standard interfaces. In an enterprise\napplication,\
    \ the connection factory can be bound to JNDI and managed\nexternally by an enterprise\
    \ application server. A JMS connection is\nobtained from a connection factory,\
    \ which is injected into the client.\n\n```\n//XML standalone example\n\n//XML\
    \ connection factory retrieved from JNDI\n\n// using Java Configurations to declare\
    \ a connection factory\n//with JNDI name of jms/ConnectionFactory\n@Resource(lookup\
    \ = \"jms/ConnectionFactory\")\nprivate static ConnectionFactory connectionFactory;\n\
    // standalone example\n@Bean ConnectionFactory connectionFactory(){\nActiveMQConnectionFactory\
    \ connectionFactory =\nnew ActiveMQConnectionFactory();\nconnectionFactory.setBrokerURL(\"\
    tcp://localhost:60006\");\nreturn connectionFactory;\n}\n// Classic configuration\n\
    import javax.naming.Context;\nimport javax.naming.InitialContext;\nimport javax.jms.*;\n\
    ...\nProperties properties = new Properties();\nproperties.put( /* JNDI properties\
    \ */ );\nContext context = new InitialContext(properties);\nConnectionFactory\
    \ factory = (ConnectionFactory) context.lookup(\"jms/ConnectionFactory\");\n```\n\
    \nOnce a connection factory is obtained all is left to do is get a `javax.jms.Connection`\n\
    and then start a `javax.jms.Session` to\nstart processing messages:\n\n```\nConnection\
    \ connection = factory.createConnection();\nconnection.start();\nSession session\
    \ = connection.createSession(false, Session.AUTO_ACKNOWLEDGE);\n// process messages\n\
    ...\n```\n\nThe `createSession` method\nhas two parameters: the first, of type\
    \ boolean, is used to determine\nwhether the session should be transacted (when\
    \ `false` is used as\nargument, the resulting session is not transacted), and\
    \ the second is\nused to determine whether the session automatically acknowledges\n\
    messages when they have been received successfully. In the previous\nexample,\
    \ because the `Session.AUTO_ACKNOWLEDGE`\nis provided as an argument, the resulting\
    \ session will do this.\n\nThe JMS session represents a unit of work. When processing\
    \ messages is\ndone, the session must be committed or rolled back, depending on\
    \ the\nresult of the processing.\n\n```\nsession.commit(); // all ok\n// or\n\
    session.rollback(); // something went wrong\n```\n\nThe `Session`\nobject is responsible\
    \ for creating messages that will be sent to a\nclient.\n\nJMS Messages\n\nThe\
    \ JMS API defines the standard form of a JMS message, which should be\nportable\
    \ across all JMS providers. Although the JMS API was designed to\naccommodate\
    \ many existing JMS providers, the message has a standard\nstructure, being composed\
    \ of a header and a body. The header contains system-level\ninformation common\
    \ to all messages, such as the destination and the time\nit was sent and application-specific\
    \ information, stored as\nkeyword/value properties. The body contains the effective\
    \ application\ndata, and JMS defines five distinct message body types represented\
    \ as\nJava interfaces extending `javax.jms.Message`.\nThus a JMS message body\
    \ is an instance of a class implementing any\ninterface in the `javax.jms.Message`\n\
    hierarchy. The five JMS API defined body types are listed in Table [7-1](#A978-1-4842-0811-3_7_Chapter.html#Tab1).\n\
    \nTable 7-1.\n\nJMS message formats\n\nMessage Type\n |\n  Message Content\n |\n\
    \n| --- | --- | --- | --- | --- |\n\n`javax.jms.TextMessage`\n |\n  A Java String\
    \ object\n |\n\n`javax.jms.MapMessage`\n |\n  A set of key-value pairs with String\
    \ keys and primitive values, without\na fixed order.\n |\n\n`javax.jms.BytesMessage`\n\
    \ |\n  A stream of uninterpreted bytes.\n |\n\n`javax.jms.StreamMessage`\n |\n\
    \  A stream of primitive values in the Java programming language, filled\nand\
    \ read sequentially.\n |\n\n`javax.jms.ObjectMessage`\n |\n  A Serializable object\
    \ in the Java programming language\n |\n\nMessages are created by the `Session`\
    \ object, and\nthe following code snippet depicts how each type of message listed\
    \ in\nthe previous table is created:\n\n```\nTextMessage message = session.createTextMessage();\n\
    message.setText(\"this is a text message\");\nMapMessage mm = session.createMapMessage();\n\
    mm.set(\"key\", \"value\");\nsession.createBytesMessage(\"bytes   array\".getBytes());\n\
    ```\n\n```\nstreamMessage = session.createStreamMessage();\n//writing primitives\
    \ on it\nstreamMessage.writeBoolean(false);\nstreamMessage.writeInt(223344);\n\
    streamMessage.writeChar('q');\n//emptying the stream\nstreamMessage.reset();\n\
    //user must be serializable\nsession.createObjectMessage(user);\n```\n\nJMS Destinations\n\
    \nThe `javax.jms.Destination`\ninterface is implemented on the client side and\
    \ is used to specify the\ntarget of the messages produced by the client and the\
    \ source of messages\nthe client consumes, because a client application can produce\
    \ messages\ntoo, which can be sent as a reply to the JMS application with which\
    \ it\ncommunicates. Imagine this scenario: the JMS server application sends a\n\
    data message to the JMS client application and the client responds with\na confirmation\
    \ message that the data was received. Depending on the\nmessaging domain, the\
    \ implementation differs:\n\n*   a queue in point-to-point domains, where each\
    \ message has one producer\n    and one consumer.\n\n*   a topic in publisher/subscriber\
    \ domains, where each message that is\n    published is consumed by multiple subscribers.\n\
    \nThe difference between Queues and Topics is depicted in Figure [7-9](#A978-1-4842-0811-3_7_Chapter.html#Fig9).\n\
    \n![A978-1-4842-0811-3_7_Fig9_HTML.jpg](A978-1-4842-0811-3_7_Fig9_HTML.jpg)\n\n\
    Figure 7-9.\n\nDifference between Queues and Topics\n\nDestinations can be standalone\
    \ or retrieved from JNDI:"
