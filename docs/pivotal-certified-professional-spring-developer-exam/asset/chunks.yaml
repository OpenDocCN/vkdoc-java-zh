    `springSecurityFilterChain` 是一个强制性的名称，它引用 Spring 根应用上下文中同名的 Bean。`DelegatingFilterProxy`
    Bean 将调用委托给一系列链式安全过滤器 Bean，并充当安全请求的拦截器。在上述情况中，由于 `<url-pattern .../>` 元素定义了所有请求都将被拦截（使用了通配符
    /*）。


    实际上，在安全 Web 环境中，安全请求由一系列 Spring 管理的 Bean 处理，这就是代理 Bean 被命名为 `springSecurityFilterChain`
    的原因，因为这些过滤器是链式连接的。这个过滤器链具有以下关键职责：


    *   驱动身份验证

    *   强制执行授权

    *   管理登出

    *   在 `HttpSession` 中维护 `SecurityContext`


    Spring Security 框架建立在 ACEGI Security 1.x 的基础上。最初，安全过滤器 Bean 是手动配置的，可以单独使用，但这导致了冗长且容易出错的复杂
    XML 配置。从 Spring Security 2.0 开始，过滤器 Bean 会使用默认值创建和初始化，除非需要更改默认的 Spring Security
    行为，否则不建议手动配置。所有过滤器 Bean 都实现了 `javax.servlet.Filter` 接口。每个实现此接口的 Bean 类型都旨在对资源（Servlet
    或静态内容）的请求、来自资源的响应或两者执行过滤任务。尽管这些过滤器在后台工作，但对其进行简要介绍是合适的。在表 6-1 中，列出了安全过滤器及其各自的目的。


    表 6-1.


    Spring Security 链式过滤器


    过滤器类 | 详情

    | --- | --- |

    `ChannelProcessingFilter` | 用于在需要重定向到其他协议时使用

    `SecurityContextPersistenceFilter` | 用于设置安全上下文并将更改复制到 `HttpSession`

    `ConcurrentSessionFilter` | 用于并发会话处理包

    `LogoutFilter` | 用于使主体登出。登出后，将重定向到配置的视图

    `BasicAuthenticationFilter` | 用于在安全上下文中存储有效的 `Authentication` 令牌

    `JaasApiIntegrationFilter` | 此 Bean 尝试获取 JAAS Subject 并作为该 `Subject` 继续运行 `FilterChain`

    `RememberMeAuthenticationFilter` | 用于存储有效的 `Authentication`，并在安全上下文未更改时使用它

    `AnonymousAuthenticationFilter` | 用于存储匿名的 `Authentication`，并在安全上下文未更改时使用它

    `ExceptionTranslationFilter` | 用于将 Spring Security 异常转换为 HTTP 对应的错误响应

    `FilterSecurityInterceptor` | 用于保护 URI 并引发访问拒绝异常


    基本上，每当服务器收到 HTTP 请求时，每个过滤器都会在适用的情况下执行其操作。有趣的是，这些过滤器可以被自定义实现替换。它们在安全链中的位置由 Spring
    通过枚举值列表定义，使用这些值作为 `<custom-filter …/>` 的 `position` 属性的参数，可以指定使用不同的过滤器 Bean 来替代默认的过滤器。在以下代码片段中，`ConcurrentSessionFilter`
    被自定义实现替换。


    枚举值列表可以在 `spring-security.xsd`⁷ 中找到，过滤器与值之间的对应关系如表 6-2 所示。


    表 6-2.


    Spring Security 链式过滤器


    过滤器类 | 位置枚举值

    | --- | --- |

    `ChannelProcessingFilter` | CHANNEL_FILTER

    `SecurityContextPersistenceFilter` | SECURITY_CONTEXT_FILTER

    `ConcurrentSessionFilter` | CONCURRENT_SESSION_FILTER

    `LogoutFilter` | LOGOUT_FILTER

    `BasicAuthenticationFilter` | BASIC_AUTH_FILTER

    `JaasApiIntegrationFilter` | JAAS_API_SUPPORT_FILTER

    `RememberMeAuthenticationFilter` | REMEMBER_ME_FILTER

    `AnonymousAuthenticationFilter` | ANONYMOUS_FILTER

    `ExceptionTranslationFilter` | EXCEPTION_TRANSLATION_FILTER

    `FilterSecurityInterceptor` | FILTER_SECURITY_INTERCEPTOR


    使用 Java 配置的等效方法不使用位置枚举值，而是使用 `HttpSecurity` 对象的一组方法：


    ```

    addFilterAfter(Filter  filter,Class  afterFilter)

    ```


    和


    `addFilterBefore(Filter  filter, Class<?  extends  Filter>  beforeFilter)`。它们接收过滤器类作为参数，自定义实现应相对于该类放置。在前面的示例中，`customConcurrencyFilter`
    Bean 被放置在链中 `securityContextPersistenceFilter` Bean 之后。因此，等效的 Java 配置将如下面的代码片段所示。不要关注注解，因为它们将在稍后的章节中介绍。只需注意自定义过滤器定义和
    `http.addFilterAfter(..)` 调用：


    ```

    import com.ps.web.session.CustomConcurrentSessionFilter;

    import org.springframework.security.web.context.SecurityContextPersistenceFilter;

    ...

    @Configuration

    @EnableWebSecurity

    @EnableGlobalMethodSecurity(jsr250Enabled = true)

    public class SecurityConfig extends WebSecurityConfigurerAdapter {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http.addFilterAfter(

    SecurityContextPersistenceFilter.class, customConcurrencyFilter());

    http

    .authorizeRequests()

    ...

    .logout()

    .logoutUrl("/logout")

    .logoutSuccessUrl("/");

    }

    ...

    @Bean

    CustomConcurrentSessionFilter customConcurrencyFilter(){

    return new CustomConcurrentSessionFilter();

    }

    }

    ```


    要拦截的 URL 在 Spring 特定的 XML 文件中定义，允许访问这些 URL 的角色在 Spring 上下文中定义，并在身份验证时加载。在使用 XML
    时，会使用一个单独的安全配置文件，在本例中称为 `security-config.xml`。为了简化配置设置，Spring 提供了一个名为 `spring-security`
    的特殊命名空间，其中包含严格的安全配置元素。安全配置文件可以相对于此命名空间编写，从而无需为安全元素使用前缀。在下面的代码片段中，展示了一个简单版本的配置文件，该文件将用户页面的访问权限限制为仅限完全通过身份验证的用户。登录表单位置和登出路径也一并展示。


    `IS_AUTHENTICATED_ANONYMOUSLY` 值在底层由称为投票者的 Bean 处理，其类型为 `org.springframework.security.access.vote.AuthenticatedVoter`。在此类中，定义了
    `access` 配置属性的三个值。投票者将处理此安全配置属性，并决定资源是否应对匿名用户可用。匿名用户用于对 Web 应用程序的公共访问（浏览），是无需登录即可访问网站的用户类型。`IS_AUTHENTICATED_FULLY`
    配置属性也是顾名思义：匹配关联 URL 的资源只能由已登录、凭据已验证且身份已确认的用户访问。因此，该用户已完全通过身份验证。除了这两个配置属性之外，还有一个：`IS_AUTHENTICATED_REMEMBERED`。如果资源受此类规则保护，则只有用户完全通过身份验证或使用“记住我”方法通过身份验证后才能访问。⁸

    '
- fmt: '`<form-login ../>`配置元素用于定义登录表单的请求URL，用户可通过该表单提供其凭证。使用此配置后，当匿名用户尝试访问受保护资源时，应用程序将直接引导用户至登录表单页面，而非仅显示无权限访问的提示页面。


    `<logout ../>`配置元素用于定义登出表单的请求URL。当用户点击此链接时，HTTP会话将被失效，随后重定向至`/login?success`。此行为可配置，并可定义不同的登出成功URL，但大多数应用程序会将用户重定向至登录页面，并在登录表单旁显示"您已成功登出"等消息，以便用户需要时重新登录。


    定义为`pattern`属性值的路径是使用ANT风格路径定义的URL片段。匹配这些URL的路径将根据`<intercept-url …/>`元素定义的规则进行安全验证。通配符可用于指定一系列相关URL，并对所有URL应用相同的安全规则。`access`属性值是用于指定用户所需访问权限类型的典型安全令牌值。访问权限与用户角色关联，因此可配置仅允许具有特定权限的用户访问某些URL。


    定义URL模式的顺序非常重要，最严格的规则必须置于顶部；否则，较宽松的规则将生效，导致某些本应受限的URL对无权限用户开放。


    您可能已经注意到，如果使用安全权限的令牌值编写特定URL的配置规则会相当繁琐，因为您需要查阅文档以确认`access`属性允许使用的值。但作为灵活且优秀的技术，Spring从Spring
    Security 3.0开始支持使用Spring EL表达式声明访问规则。因此上述文件可以利用安全专用方法作为`access`属性的值，只需通过配置`<http
    .../>`元素并将`use-expressions`属性值设为`true`，即可告知Spring Security启用这些方法。


    这些表达式具有与其用途高度匹配的直观名称，并可组合声明复杂规则。以下列表仅展示了部分可能性：


    *   `hasRole(''AnyRole'')`：检查主体是否具有参数指定的角色。

    *   `hasAnyRole(''[RoleList]'')`：检查主体是否具有`RoleList`中的任一角色。

    *   `isAnonymous()`：允许未认证的主体访问。

    *   `isAuthenticated()`：允许已认证和已记住的主体访问。

    *   `isAuthenticated()`和`hasIpAddress(''192.168.1.0/24'')`：允许位于`192.168.1.0/24`IP网段内且已认证或已记住的主体访问。

    *   `hasRole(''ROLE_ADMIN'')`和`hasRole(''ROLE_MANAGER'')`：允许同时具有`ROLE_ADMIN`和`ROLE_MANAGER`角色的主体访问。


    一旦通过`use-expressions="true"`配置启用SpEL表达式支持，之前用于`access`值的语法将无法使用，因此角色和配置属性不能直接作为`access`属性的值。两种方式无法混合使用。


    Spring Security 4引入了一项简化功能，允许在访问表达式中省略`ROLE_`前缀，因此上述配置变为：


    此外，Spring Security 4还引入了在Spring表单中使用CSRF令牌以防止跨站请求伪造的功能。[⁹](#A978-1-4842-0811-3_6_Chapter.html#Fn9)
    未包含`<csrf />`元素配置的配置无效，每次登录请求都将导向403错误页面，显示：'
  raw: "The `<form-login ../>` configuration element is used to define the request\
    \ URL\nfor the login form where the user can provide its credentials. Using\n\
    this configuration, when an anonymous user tries to access a secured\nresource,\
    \ the application will direct him to the login form page,\ninstead of just showing\
    \ a page that will tell him he does not have\naccess to that resource.\n\nThe\
    \ `<logout ../>` configuration element is used to define the request URL\nfor\
    \ the logout form. When the user clicks on this link, the HTTP session\nwill be\
    \ invalidated, and then a redirect to \"/login?success\" will be\ndone. This behavior\
    \ can be configured and a different logout success URL\ncan be defined, but most\
    \ applications, redirect the user to the login\npage, and a message such as \"\
    You have successfully logged out\" is\ndisplayed next to the login form, so the\
    \ user can log in again if\nneeded.\n\nThe paths defined as values for the pattern\
    \ attribute are pieces of URLs\ndefined using ANT style paths. The URLs that match\
    \ them are secured and\nverified according to rules defined by the `<intercept-url\
    \ …/>` elements. Wildcards can be used to specify a family of\nrelated URLs and\
    \ apply the same security rule to all of them. The `access` attribute\nvalues\
    \ are typical security token values used to specify what kind of\naccess the user\
    \ needs to have. Access is linked to user roles, so URLs\ncan be configured to\
    \ be accessed only by users with certain rights.\n\n!\n\nThe order of defining\
    \ the URL patterns is important, and the most restrictive must be on top;\notherwise,\
    \ a more relaxed rule will apply, and some URL will be\naccessible to users that\
    \ should not have access to them.\n\nYou might have noticed that writing configuration\
    \ rules for specific\nURLs is quite annoying if you are using token values for\
    \ security\nrights, since you have to check the documentation to see what you\
    \ are\nallowed to use as a value for the `access` attribute. But\nSpring, being\
    \ the flexible and beautiful technology that it is, starting\nwith Spring Security\
    \ 3.0 offers the possibility to use Spring EL expressions to declare access rules.\n\
    So the file above can make use of security-specific methods as values\nfor the\
    \ access attributes, and all that is required is just to tell\nSpring Security\
    \ that you want to use them, by configuring the `<http .../>`\nelement accordingly,\
    \ and setting the `use-expressions`\nattribute value to true.\n\nThe expressions\
    \ have really obvious names regarding their purpose and\ncan be combined to declare\
    \ complex rules. The following listing depicts\nonly a few of the possibilities:\n\
    \n*   `hasRole(’AnyRole’)`\n    checks whether the principal has the role given\
    \ as argument.\n\n*   `hasAnyRole(’[RoleList]’)`\n    checks whether the principal\
    \ has any of the roles in the `RoleList`.\n\n*   `isAnonymous()`\n    allows access\
    \ for unauthenticated principals.\n\n*   `isAuthenticated()`\n    allows access\
