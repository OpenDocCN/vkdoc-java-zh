    \ name){\nuserRepo.htmlAllByName(name);\n}\n}\n```\n\n在 Spring 应用程序中，方法在其上下文中执行的事务，当使用`@Transactional`定义时，被称为声明式事务。这种声明事务的方式与\
    \ JTA（Java 事务 API）无关，这非常实用，因为这意味着事务可以在任何环境中使用：本地环境（使用 JDBC、JPA、Hibernate 或 JDO），或与应用服务器一起使用。只要方法是公共的，就可以为任何\
    \ Bean 的任何方法添加事务行为，因为声明式事务行为在 Spring 中是通过 AOP 实现的。Spring 还提供了声明式回滚规则，以及通过`@Transactional`注解的属性来自定义事务行为的可能性。接下来，列出这些属性：\n\
