  trans: "\n消息转换器会被 Spring 自动检测并使用，前提是应用配置了 `<mvc:annotation-driven/>` 或 `@EnableWebMvc`。在本章的代码示例中，表示形式为\
    \ JSON 格式，因此使用了 `MappingJackson2HttpMessageConverter`。并且由于该消息默认被支持，在前面的示例中并不需要\
    \ `HttpMessageConverterExtractor<T>`。同样，如果没有指定 `Accept` 头，Spring 支持的所有消息转换器都会被考虑，因此在这种情况下，`RequestCallback`\
    \ 也变得不必要，我们可以坚持使用前面代码片段中提到的更简单的 `restTemplate.getForObject` 方法，因为即使在生产应用中，你也几乎不需要其他东西。\n\
    \n包含在 `15-ps-ws-rest-practice` 中的应用是一个 Spring Web RESTful 应用，可用于测试你对 Spring 为\
    \ REST 应用提供的支持组件的理解。`RestUserController` 类提供了处理 REST 请求的控制器方法。客户端由 `RestUserControllerTest`\
    \ 类表示。该测试类中注入了一个 `RestTemplate`，可用于测试由 `RestUserController` 控制器暴露的所有与用户相关的 REST\
    \ 操作。该 Web 应用没有上下文，控制器暴露的 REST 服务可通过类似 `http://localhost:8080/users/``*` 的 URI\
    \ 访问。`RestUserControllerTest` 类包含使用四种主要 HTTP 方法测试 REST 请求的方法：\n\n*   **GET**：用于获取资源表示形式的方法；可能根据服务器设置和使用的客户端而有长度限制。²¹\
    \ 当未找到资源时，返回 404（未找到）状态码，否则返回 200（成功）。在图 7-23 中，描述了 GET 请求和响应的内容。\n\n![A978-1-4842-0811-3_7_Fig23_HTML.jpg](img/A978-1-4842-0811-3_7_Fig23_HTML.jpg)\n\
    \n图 7-23.\n\nGET 请求和响应示例\n\n可以使用 `RestTemplate` 实例发送 REST GET 请求：只需要 REST URI\
    \ 和一个用于标识资源的用户名即可。路径变量被命名为 `$username`，并加上 $ 前缀以使 URI 的参数化部分非常明显。以下代码片段描述了执行 GET\
    \ 请求以获取用户名为“johncusack”的用户资源的测试方法。\n\n```\n    public class RestUserControllerTest\
    \ {\n    private static final String GET_PUT_DEL_URL =\n    \"http://localhost:8080/users/{$username}\"\
    ;\n    private RestTemplate restTemplate = null;\n    @Before\n    public void\
    \ setUp() {\n    restTemplate = new RestTemplate();\n    }\n    //通过用户名测试 GET\n\
    \    @Test\n    public void findByUsername() {\n    User user = restTemplate.getForObject(GET_PUT_DEL_URL,\n\
    \    User.class, \"johncusack\");\n    assertNotNull(user);\n    assertEquals(\"\
    John.Cusack@pet.com\", user.getEmail());\n    }\n    }\n    ```\n\n*   **POST**：用于创建新资源的方法。当正在创建的资源需要一个不存在的父资源时，返回\
    \ 404（未找到）状态码。²² 当已存在相同的资源时，返回 409（冲突）状态码。当资源创建成功时，返回 201（已创建）状态码。在图 7-24 中，描述了\
    \ POST 请求和响应的内容。\n\n![A978-1-4842-0811-3_7_Fig24_HTML.jpg](img/A978-1-4842-0811-3_7_Fig24_HTML.jpg)\n\
    \n图 7-24.\n\nPOST 请求和响应示例\n\n可以使用 `RestTemplate` 实例发送 REST POST 请求：只需要 REST URI\
    \ 和用户对象即可。URI 与用于获取用户资源的 URI 相同，但 HTTP 方法不同。\n\n```\n    import org.springframework.http.*;\n\
    \    ...\n    public class RestUserControllerTest {\n    private static final\
    \ String GET_PUT_DEL_URL =\n    \"http://localhost:8080/users/{$username}\";\n\
    \    private static final String GET_POST_URL = \"http://localhost:8080/users\"\
    ;\n    private RestTemplate restTemplate = null;\n    @Before\n    public void\
    \ setUp() {\n    restTemplate = new RestTemplate();\n    }\n    //测试 POST\n  \
    \  @Test\n    public void createUser() {\n    User user = new User();\n    user.setEmail(\"\
    Doctor.Who@tardis.com\");\n    user.setUsername(\"DoctorWho\");\n    ...\n   \
    \ final HttpHeaders headers = new HttpHeaders();\n    headers.setContentType(MediaType.APPLICATION_JSON);\n\
    \    final HttpEntity crRequest = new HttpEntity(user, headers);\n    URI uri\
    \ = restTemplate.postForLocation(GET_POST_URL,\n    crRequest, User.class);\n\
    \    assertNotNull(uri);\n    assertTrue(uri.toString().contains(\"doctorwho\"\
    ));\n    // 测试插入\n    User newUser = restTemplate.getForObject(uri, User.class);\n\
    \    assertNotNull(newUser);\n    assertNotNull(newUser.getId());\n    }\n   \
    \ }\n    ```\n\n在这种情况下，使用了 `postForLocation` 方法，因为之后必须测试资源是否成功创建。`HttpHeaders`\
    \ 对象用于设置请求的头信息，例如消息的媒体类型，这样 Spring 就会知道使用哪个消息转换器将 JSON 表示形式转换为需要保存的用户实例。\n\n*\
    \   **PUT**：更新现有资源或使用已知的目标 URI 创建资源。资源的 URI 包含该资源的标识符。当 PUT 请求引用一个现有资源时，该资源会被更新；否则，会使用\
    \ URI 中的标识符和请求体中的内容创建一个新资源。当正在更新的资源需要一个不存在的父资源时，²³ 或者请求更新的资源不存在时，返回 404（未找到）状态码。\n\
    \n当资源更新成功且响应体中没有返回任何内容时，返回 204（无内容）响应状态。\n\n当资源不存在时，PUT 的行为类似于 POST 并创建它，并返回资源的位置。在这种情况下，响应状态为\
    \ 201（已创建）。\n\n在图 7-25 中，描述了 PUT 请求和响应的内容。\n\n![A978-1-4842-0811-3_7_Fig25_HTML.jpg](img/A978-1-4842-0811-3_7_Fig25_HTML.jpg)\n\
    \n图 7-25.\n\nPUT 请求和响应示例\n\n可以使用 `RestTemplate` 实例发送 REST PUT 请求：只需要 REST URI\
    \ 和用户对象即可。URI 与用于获取用户资源的 URI 相同，但 HTTP 方法不同。\n\n```\n    import org.springframework.http.*;\n\
    \    ...\n    public class RestUserControllerTest {\n    private static final\
    \ String GET_PUT_DEL_URL =\n    \"http://localhost:8080/users/{$username}\";\n\
    \    private static final String GET_POST_URL = \"http://localhost:8080/users\"\
    ;\n    private RestTemplate restTemplate = null;\n    @Before\n    public void\
    \ setUp() {\n    restTemplate = new RestTemplate();\n    }\n    // 测试 PUT\n  \
    \  @Test\n    public void editUser() {\n    User user = new User();\n    user.setEmail(\"\
    MissJones@pet.com\");\n    user.setUsername(\"JessicaJones\");\n    ...\n    final\
    \ HttpHeaders headers = new HttpHeaders();\n    headers.setContentType(MediaType.APPLICATION_JSON_UTF8);\n\
    \    final HttpEntity userRequest = new HttpEntity(user, headers);\n    ResponseEntity\
    \ responseEntity = restTemplate.exchange\n    (GET_PUT_DEL_URL, HttpMethod.PUT,\
    \ userRequest, User.class,\n    \"JessicaJones\");\n    User editedUser = responseEntity.getBody();\n\
    \    assertNotNull(editedUser);\n    assertEquals(\"MissJones@pet.com\", editedUser.getEmail());\n\
    \    }\n    }\n    ```\n"
- fmt: "`exchange`方法在此处仅用于教学目的，但`RestTemplate`提供了多种签名更易于使用的`put`方法。\n\n- **DELETE**：删除资源。当被删除的资源不存在时，返回404（未找到）状态码。当资源被正确删除时，返回200（OK）状态码。图[7-26](#A978-1-4842-0811-3_7_Chapter.html#Fig26)展示了DELETE请求和响应的内容。\n\
    \n![A978-1-4842-0811-3_7_Fig26_HTML.jpg](A978-1-4842-0811-3_7_Fig26_HTML.jpg)\n\
    \n图7-26. DELETE请求和响应示例\n\nREST DELETE请求可以通过`RestTemplate`实例发送：所需的是REST URI和用户名。该URI与用于检索用户资源的URI相同，但HTTP方法不同。\n\
    \n```java\nimport org.springframework.http.*;\n...\npublic class RestUserControllerTest\
    \ {\n    private static final String GET_PUT_DEL_URL =\n        \"http://localhost:8080/users/{$username}\"\
    ;\n    private static final String GET_POST_URL = \"http://localhost:8080/users\"\
    ;\n    private RestTemplate restTemplate = null;\n    @Before\n    public void\
    \ setUp() {\n        restTemplate = new RestTemplate();\n    }\n    // Test DELETE\n\
    \    @Test\n    public void deleteUser() {\n        restTemplate.delete(GET_PUT_DEL_URL,\
    \ \"doctorwho\");\n    }\n}\n```\n\n如果操作成功，DELETE响应的主体为空。测试删除是否成功的唯一方法是使用URI`http://localhost:8080/users/doctorwho`请求该资源，并期望返回失败或404（未找到）状态码，因为该资源已被删除。\n\
    \nSpring RESTful应用程序可以通过声明一个模拟REST服务器并使用模拟依赖项进行测试，而无需将其部署到服务器上，从而隔离地测试REST请求。提供此功能的类是Spring\
    \ Test库的一部分，名为`org.springframework.test.web.client.MockRestServiceServer`。一个`RestTemplate`将绑定到此模拟服务器，所有请求都将发送到该服务器。由于不是实际服务器，因此不需要完整的请求URL，只需要控制器方法上定义的请求映射。在每个测试方法中，遵循以下步骤：\n\
    \n1.  模拟服务器首先定义它期望接收的请求、次数以及如何响应。\n2.  将使用请求映射URL片段（例如`\"/users\"`）调用`RestTemplate`方法。\n\
    3.  执行断言方法，以确保`restTemplate`请求实际收到了步骤1中定义的响应。\n\n项目`15-ps-ws-rest-solution`中的`StandaloneRestUserControllerTest`类可用于在测试模拟上下文中测试RESTful应用程序。定义了一个名为`TestConfig`的静态内部类，用于向测试上下文提供模拟依赖项。使用JMock和Mockito组件提供模拟对象，以便可以隔离地测试REST通信（请求和响应）。\n\
    \n```java\nimport org.mockito.Mockito;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.http.HttpMethod;\n\
    import org.springframework.http.MediaType;\nimport org.springframework.test.context.ContextConfiguration;\n\
    import org.springframework.test.context.junit4.SpringJUnit4ClassRunner;\nimport\
    \ org.springframework.test.context.web.WebAppConfiguration;\nimport org.springframework.test.web.client.MockRestServiceServer;\n\
    import org.springframework.web.client.RestTemplate;\nimport static org.junit.Assert.*;\n\
    import static org.springframework.test.web.client.match.MockRestRequestMatchers.method;\n\
    import static org.springframework.test.web.client.match.MockRestRequestMatchers.requestTo;\n\
    import static org.springframework.test.web.client.ExpectedCount.once;\nimport\
    \ static org.springframework.test.web.client.response.MockRestResponseCreators.withSuccess;\n\
    ...\n@RunWith(SpringJUnit4ClassRunner.class)\n@ContextConfiguration(classes =\
    \ {WebConfig.class, StandaloneRestUserControllerTest.TestConfig.class})\n@WebAppConfiguration\n\
    public class StandaloneRestUserControllerTest {\n    @Configuration\n    static\
    \ class TestConfig {\n        @Bean\n        UserService userService() {\n   \
    \         return Mockito.mock(UserService.class);\n        }\n    }\n    private\
    \ RestTemplate restTemplate = null;\n    private MockRestServiceServer server\
    \ = null;\n    @Before\n    public void setup() {\n        restTemplate = new\
    \ RestTemplate();\n        server = MockRestServiceServer.bindTo(restTemplate).build();\n\
    \    }\n    @Test\n    public void findByUsername() {\n        // step 1\n   \
    \     server.expect(once(), requestTo(\"/users/johncusack\"))\n            .andExpect(method(HttpMethod.GET))\n\
    \            .andRespond(withSuccess(\"{\\n\" +\n                \"  \\\"id\\\"\
    \ : 1575,\\n\" +\n                \"  \\\"username\\\" : \\\"johncusack\\\",\\\
    n\" +\n                \"  \\\"firstName\\\" : \\\"John\\\",\\n\" +\n        \
    \        \"  \\\"lastName\\\" : \\\"Cusack\\\",\\n\" +\n                \"  \\\
    \"password\\\" : \\\"test\\\",\\n\" +\n                \"  \\\"userType\\\" :\
    \ \\\"OWNER\\\",\\n\" +\n                \"  \\\"email\\\" : \\\"John.Cusack@pet.com\\\
    \",\\n\" +\n                \"  \\\"rating\\\" : 0.0,\\n\" +\n               \
    \ \"  \\\"active\\\" : true\\n\" +\n                \"}\", MediaType.APPLICATION_JSON_UTF8));\n\
    \        // step 2\n        User user = restTemplate.getForObject(\"/users/{$username}\"\
    , User.class, \"johncusack\");\n        // step 3\n        assertNotNull(user);\n\
    \        assertEquals(\"John.Cusack@pet.com\", user.getEmail());\n        assertEquals(UserType.OWNER,\
    \ user.getUserType());\n    }\n    ...\n}\n```\n\n## REST的优势\n\n- REST简单。\n- REST得到广泛支持。\n\
    - 资源可以用多种数据格式（JSON、XML等）表示。\n- 可以充分利用HTTP缓存和代理服务器来帮助处理高负载并提高性能。\n- 它减少了客户端/服务器耦合。\n\
    - 浏览器可以解释表示。\n- JavaScript可以使用表示。\n- REST服务可以被用不同语言编写的应用程序消费。\n- 它使新客户端易于使用RESTful应用程序，即使该应用程序并非专门为其设计。\n\
    - 由于REST系统的无状态性，多个服务器可以位于负载均衡器后面并透明地提供服务，这意味着可扩展性增强。\n- 由于统一接口，几乎不需要资源及基本操作API的文档。\n\
    - 使用REST并不意味着客户端需要特定的库才能与服务器通信。使用REST，只需要网络连接即可。\n\nREST服务可以保护，但由于客户端和服务器之间的交互是无状态的，因此凭据必须嵌入到每个请求头中。基本身份验证是最容易实现的，无需额外库（HTTP\
    \ Basic、HTTP Digest或XML-DSIG或XML-Encryption），但它保证的安全级别最低。基本身份验证绝不应在没有TLS（以前称为SSL）加密的情况下使用，因为否则凭据很容易被解码。在图[7-27](#A978-1-4842-0811-3_7_Chapter.html#Fig27)中，您可以看到当客户端与需要基本身份验证的RESTful应用程序通信时，基本身份验证是如何使用的。"
  raw: "The `exchange`\n    method was used here just for teaching purposes, but `RestTemplate`\
    \ provides\n    put methods with various signatures that are much easier to use.\n\
    \n*   DELETE: deletes a resource. When\n    the resource being deleted does not\
    \ exist, a 404 (Not found) status code is returned.\n    When the resource was\
    \ deleted correctly, a 200 (OK) status code is returned. In\n    Figure [7-26](#A978-1-4842-0811-3_7_Chapter.html#Fig26),\
    \ the\n    DELETE request and response contents are depicted.\n\n![A978-1-4842-0811-3_7_Fig26_HTML.jpg](A978-1-4842-0811-3_7_Fig26_HTML.jpg)\n\
    \nFigure 7-26.\n\nDELETE request and response example\n\nA REST DELETE request\
    \ can be sent with a `RestTemplate`\n    instance: all that is needed is the REST\
    \ URI and username. The URI is\n    identical to the one used to retrieve a user\
    \ resource, but the HTTP\n    method is different.\n\n```\n    import org.springframework.http.*;\n\
    \    ...\n    public class RestUserControllerTest {\n    private static final\
    \ String GET_PUT_DEL_URL =\n    \"http://localhost:8080/users/{$username}\";\n\
    \    private static final String GET_POST_URL = \"http://localhost:8080/users\"\
    ;\n    private RestTemplate restTemplate = null;\n    @Before\n    public void\
    \ setUp() {\n    restTemplate = new RestTemplate();\n    }\n    // Test DELETE\n\
    \    @Test\n    public void deleteUser() {\n    restTemplate.delete(GET_PUT_DEL_URL,\
    \  \"doctorwho\");\n    }\n    }\n    ```\n\nThe delete response has an empty\
    \ body if the operation succeeds. The\n    only way to test the success of a deletion\
    \ is to request the resource\n    with URI equal to `http://localhost:8080/users/doctorwho`\n\
    \    and expect a failure or a response with 404 (Not Found) status to be\n  \
    \  returned, because the resource has already been deleted.\n\nA Spring RESTful\
    \ application can be tested without deploying it on a\nserver by declaring a mock\
    \ restful server and using mock dependencies,\nso the REST requests can be tested\
    \ in isolation. The class that provides\nthis is part of the Spring Test library\
    \ and is called `org.springframework.test.web.client.MockRestServiceServer`.\n\
    A `RestTemplate`\nwill be bound to this mock server, and this is where all requests\
    \ will\nbe sent. Not being an actual server, the full URL for a request is\nunnecessary,\
    \ only the request mapping defined on the controller method.\nIn every test method,\
    \ the following steps are traversed:\n\n1.  The mock server first defines what\
    \ request it expects to receive, how\n    many times, and how it will answer.\n\
    \n2.  The `RestTemplate` method\n    will be called with the request mapping URL\
    \ chunk (e.g., \"/users\")\n\n3.  The asserts method is performed to make sure\
    \ the restTemplate request\n    actually received the response defined at step\
    \ 1.\n\nThe `StandaloneRestUserControllerTest`\nclass in project `15-ps-ws-rest-solution`\n\
    can be used to test a RESTful application in a test mock context. A\nstatic internal\
    \ class named `TestConfig` is defined\nto provide mock dependencies to the test\
    \ context. JMock and Mockito\ncomponents are used to provide mock objects so that\
    \ the REST\ncommunication (request and response) can be tested in isolation.\n\
    \n```\nimport org.mockito.Mockito;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.http.HttpMethod;\n\
    import org.springframework.http.MediaType;\nimport org.springframework.test.context.ContextConfiguration;\n\
    import org.springframework.test.context.junit4.SpringJUnit4ClassRunner;\nimport\
    \ org.springframework.test.context.web.WebAppConfiguration;\nimport org.springframework.test.web.client.MockRestServiceServer;\n\
    import org.springframework.web.client.RestTemplate;\nimport static org.junit.Assert.*;\n\
    import static org.springframework.test.web.client.match.\nMockRestRequestMatchers.method;\n\
    import static org.springframework.test.web.client.match.\nMockRestRequestMatchers.requestTo;\n\
    import static org.springframework.test.web.client.ExpectedCount.once;\nimport\
    \ static org.springframework.test.web.client.response.\nMockRestResponseCreators.withSuccess;\n\
    ...\n@RunWith(SpringJUnit4ClassRunner.class)\n@ContextConfiguration(classes  =\
    \  {WebConfig.class,\nStandaloneRestUserControllerTest.TestConfig.class})\n@WebAppConfiguration\n\
    public class StandaloneRestUserControllerTest {\n@Configuration\nstatic class\
    \ TestConfig {\n@Bean\nUserService userService() {\nreturn Mockito.mock(UserService.class);\n\
    }\n}\nprivate RestTemplate restTemplate = null;\nprivate MockRestServiceServer\
    \ server = null;\n@Before\npublic void setup() {\nrestTemplate = new RestTemplate();\n\
    server = MockRestServiceServer.bindTo(restTemplate).build();\n}\n@Test\npublic\
    \ void findByUsername() {\n//step 1\nserver.expect(once(), requestTo(\"/users/johncusack\"\
    ))\n.andExpect(method(HttpMethod.GET))\n.andRespond(withSuccess(\"{\\n\" +\n\"\
    \  \\\"id\\\" : 1575,\\n\" +\n\"  \\\"username\\\" : \\\"johncusack\\\",\\n\"\
    \ +\n\"  \\\"firstName\\\" : \\\"John\\\",\\n\" +\n\"  \\\"lastName\\\" : \\\"\
    Cusack\\\",\\n\" +\n\"  \\\"password\\\" : \\\"test\\\",\\n\" +\n\"  \\\"userType\\\
    \" : \\\"OWNER\\\",\\n\" +\n\"  \\\"email\\\" : \\\"John.Cusack@pet.com\\\",\\\
    n\" +\n\"  \\\"rating\\\" : 0.0,\\n\" +\n\"  \\\"active\\\" : true\\n\" +\n\"\
    }\",  MediaType.APPLICATION_JSON_UTF8));\n//step 2\nUser user = restTemplate.getForObject(\"\
    /users/{$username}\",\nUser.class, \"johncusack\");\n//step 3 assertNotNull(user);\n\
    assertEquals(\"John.Cusack@pet.com\", user.getEmail());\nassertEquals(UserType.OWNER,\
    \ user.getUserType());\n}\n...\n}\n```\n\nAdvantages of REST\n\n*   REST is simple.\n\
    \n*   REST is widely supported.\n\n*   Resources can be represented in a wide\
    \ variety of data formats (JSON,\n    XML, etc.).\n\n*   You can make good use\
    \ of HTTP cache and proxy server to help you handle\n    high load and improve\
    \ performance.\n\n*   It reduces client/server coupling.\n\n*   Browsers can interpret\
    \ representations.\n\n*   Javascript can use representations.\n\n*   A rest service\
    \ can be consumed by applications written in different\n    languages.\n\n*  \
    \ It makes it easy for new clients to use a RESTful application, even if\n   \
    \ the application was not designed specifically for them.\n\n*   Because of statelessness\
    \ of REST systems, multiple servers can be behind\n    a load-balancer and provide\
    \ services transparently, which means\n    increased scalability.\n\n*   Because\
    \ of the uniform interface, little or no documentation of the\n    resources and\
    \ basic operations API is necessary.\n\n*   Using REST does not imply specific\
    \ libraries at client level in order to\n    communicate with the server. With\
    \ REST, all that is needed is a network\n    connection.\n\nREST services can\
    \ be secured, but since the interaction between client\nand server is stateless,\
    \ credentials have to be embedded in every\nrequest header. Basic authentication\
    \ is the easiest to implement without\nadditional libraries (HTTP Basic, HTTP\
    \ Digest, or XML-DSIG or\nXML-Encryption), but it guarantees the lowest level\
    \ of security. Basic\nauthentication should never be used without TLS (formerly\
    \ known as SSL)\nencryption, because the credentials can be easily decoded otherwise.\
    \ In\nFigure [7-27](#A978-1-4842-0811-3_7_Chapter.html#Fig27), you can\nsee how\
    \ basic authentication is used when a client communicates with a\nRESTful application\
    \ that requires basic authentication."
