    ## Mockito


    `Mockito`的优势在于，通过编写可读性高且非常直观的代码来模拟行为。它所提供的方法集合设计得非常好，即使是没有丰富编程知识的人，只要懂英语，也能理解代码中发生的事情。将使用`Mockito`进行测试的类是`SimpleReviewService`。这个类继承了`SimpleAbstractService<T>`的所有方法，并提供了自己针对请求特定行为的方法。


