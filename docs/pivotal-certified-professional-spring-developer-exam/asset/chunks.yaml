    4.  使用 Spring 进行面向切面编程


    AOP 是面向切面编程（Aspect Oriented Programming）的缩写，这个术语指的是一种旨在通过允许分离横切关注点来提高模块化程度的编程类型。横切关注点是一种与业务代码纠缠在一起的功能，通常无法与业务逻辑分离。审计、安全和事务管理是横切关注点的典型例子。它们与业务代码混杂在一起，与可能因它们失败而受影响的功能高度耦合。这些是使用切面进行分离的理想候选，因为没有哪种设计模式能够以将它们与业务逻辑分离的方式来编写代码。这意味着在应用程序编译时，会将额外的行为添加到现有行为中。因此，事务管理、安全逻辑和审计可以独立开发，并在编译时与功能代码混合。这是通过定义一个**通知**（advice）来实现的，该通知包含将在由**切入点**（pointcut）指定的**连接点**（join
    point）位置执行的代码。这种方法允许将与业务逻辑无关的行为实现代码从功能代码中分离出来，从而使应用程序更加模块化、耦合度更低、更简洁。


    业务代码或基础代码实际上并未被修改；你可以将切面想象成插件。它们修改的是行为，而非实际的实现。


    AOP 是一种旨在帮助分离横切关注点以提高模块化程度的编程类型；它意味着声明一个切面类，该类通过将通知应用于由切入点指定的特定连接点来改变基础代码的行为。


    AOP 是 OOP（面向对象编程）的补充，它们可以一起使用来构建强大的应用程序，因为两者提供了不同的代码组织方式。OOP 专注于将所有事物都视为对象，而 AOP
    则引入了切面，这是一种特殊类型的对象，它注入并包装其行为以补充其他对象的行为。横切关注点的其他例子包括：


    *   缓存

    *   国际化

    *   错误检测与纠正

    *   内存管理

    *   性能监控

    *   同步


    AOP 解决的问题


    当使用数据库存储数据时，会使用数据库连接与应用程序进行交互。为了成功完成与数据库的通信，需要在通信前打开数据库连接，并在通信后关闭它。每个数据库实现都允许同时存在有限数量的连接；因此，需要关闭不再使用的连接，以便可以打开新的连接。使用
    Spring，一个基于用户 ID 查找用户的 JDBC 仓库方法，其实现类似于图 4-1 所示：


    ![A978-1-4842-0811-3_4_Fig1_HTML.jpg](img/A978-1-4842-0811-3_4_Fig1_HTML.jpg)


    图 4-1.


    使用 JDBC 根据用户 ID 在数据库中搜索用户的方法，其中横切关注点相关的代码已高亮显示


    实现打开和关闭连接的代码被包含在红色矩形中。特意选择这段代码是为了强调一个与基础代码纠缠在一起的横切关注点，这会导致代码混乱。这既不是一个干净的解决方案，也不是一个稳定的解决方案，因为在一个大型项目中，数据库通信方法将由不同的程序员编写，只要其中一人犯错，导致数据库连接未能正确关闭，应用程序就可能最终无法与数据库通信，因为无法打开新的连接。


    上面的例子相当古老，上述方法的调用图如图 4-2 所示。


    ![A978-1-4842-0811-3_4_Fig2_HTML.jpg](img/A978-1-4842-0811-3_4_Fig2_HTML.jpg)


    图 4-2.


    用于按 ID 提取用户的 JDBC 方法的 UML 调用图


    很复杂，对吧？AOP 可以帮助将连接管理代码与业务代码解耦。使用 AOP，之前的图应该简化为类似于图 4-3 所示的内容。


    ![A978-1-4842-0811-3_4_Fig3_HTML.jpg](img/A978-1-4842-0811-3_4_Fig3_HTML.jpg)


    图 4-3.


    使用 AOP 的 `findById()` 方法的概念示意图


    上图中的示意图是一个概念图，它描绘了基本思想。AOP 组件拦截对某些对象的调用，并注入它们自己的功能，而无需与原始目标强关联，并且它们以透明的方式做到这一点。


    现在直接使用 JDBC 组件的应用程序已经不多了。目前有一些框架提供了类来为你管理连接，因此你无需编写所有这些代码。例如，在 Spring 中，`org.springframework.jdbc.core.JdbcTemplate`
    类为你完成了这项工作，这将在第 [5](http://link.springer.com/search?facet-content-type=ReferenceWorkEntry&query=5)
    章“数据访问”中介绍。仓库组件可以基于 `JdbcTemplate` 实例创建，数据库连接由连接池组件管理。连接池是一种重用连接的技术：当一个连接被关闭时，它可以驻留在内存中，以便下次需要连接时重用，从而消除了创建新连接的开销。但是直接使用连接很麻烦，因为应用程序崩溃可能导致数据不一致。除了连接之外，应用程序还使用事务将数据库操作分组为工作单元。当所有操作都成功完成时，事务被提交，更改被持久化到数据库中。如果某个操作失败，事务则回滚，使数据库保持不变。


    在这种情况下，事务成为一个横切关注点，因为一个应该在事务中被调用的方法必须获取一个事务，打开它，执行其操作，然后提交事务。

