    \    cf.setBrokerURL(\"tcp://localhost:61616\");\n        cf.setTrustedPackages(packagesList);\n\
    \        // 或者通用但不安全的方式\n        cf.setTrustAllPackages(true);\n        return\
    \ cf;\n    }\n    ...\n}\n```\n\n当对象复杂且包含不同类型的字段时，需要信任进行序列化的包列表可能会很长，[⁹](#A978-1-4842-0811-3_7_Chapter.html#Fn9)\
    \ 因此出于教学目的，可以使用`trustAllPackages`属性。\n\nActiveMQ目标必须声明为bean：队列使用`org.apache.activemq.command.ActiveMQQueue`类型，主题使用`org.apache.activemq.command.ActiveMQTopic`类型。\n\
    \n## Spring JmsTemplate\n\nSpring使应用程序与后端基础设施解耦，但应用程序必须针对API进行编码。`org.springframework.jms.core.JmsTemplate`是Spring\
    \ JMS核心包的中心类。它是一个辅助类，旨在通过处理资源的创建和释放来简化同步JMS消息的发送和接收。此模板类提供以下开发优势：\n\n*   减少样板代码，但开发者可以实现回调接口，在任务需要时提供清晰定义的高级契约\n\
    *   透明管理JMS资源\n*   公开基本的请求-回复操作，使其能够发送消息并在作为操作一部分创建的临时队列上等待回复\n*   提供实用的异常处理，将JMS异常转换为Spring特定的JMS非检查异常（`org.springframework.jms.JmsException`的扩展）\n\
    *   支持自定义消息转换器和目标解析器\n*   提供便捷方法和回调\n\n从Spring Framework 4.1开始，引入了`org.springframework.jms.core.JmsMessagingTemplate`类，它构建在`JmsTemplate`之上，以提供与Spring消息抽象`org.springframework.messaging.Message<T>`的集成，从而允许创建通用消息。\n\
    \n`JmsTemplate`使用`org.springframework.jms.support.converter.MessageConverter`的实现来在对象和`Message`之间进行转换。`SimpleMessageConverter`处理基本类型：文本、可序列化对象类型、映射和`byte[]`。对于更复杂的对象，开发者可以提供自己的实现，或委托给从Spring\
    \ 3开始可用的OXM marshaller。\n\n以下代码片段描述了开发者必须实现的`MessageConverter`接口，以提供自定义消息转换器。\n\
    \n```java\npackage org.springframework.jms.support.converter;\n...\npublic interface\
    \ MessageConverter {\n    Message toMessage(Object object, Session session)\n\
    \        throws JMSException, MessageConversionException;\n    Object fromMessage(Message\
    \ message)\n        throws JMSException, MessageConversionException;\n}\n```"
