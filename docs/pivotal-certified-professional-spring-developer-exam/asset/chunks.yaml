    \nFigure 6-18. `11-ps-boot-sample`: `spring-boot-starter-web` transitive dependencies\
    \ in Intelij IDEA Gradle view\n\nThe version for Spring Boot and project version\
    \ are inherited from the `pet-sitter` project. To have this project built and\
