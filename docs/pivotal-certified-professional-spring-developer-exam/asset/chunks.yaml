    ! **Spring 声明式模型澄清**


    关于当存在服务层且服务类/方法已经使用 `@Transactional` 注解时，是否应该在仓库类/方法上使用 `@Transactional`，互联网上（主要发生在
    StackOverflow¹²）目前存在激烈的争论。为了解决这个争论，我们必须考虑 Spring 中声明式事务是如何实现的。在第 9 节“Spring 中的事务管理如何工作”的开头已经提到，AOP
    用于用事务行为装饰 bean。这意味着当我们用 `@Transactional` 注解类或方法时，将创建一个代理 bean 来提供事务行为，并将其包裹在原始
    bean 周围。


    在不使用服务层的应用程序中，为了确保与数据库交互时的事务行为，仓库类/方法必须使用 `@Transactional` 注解。这将告诉 Spring 为仓库类创建事务代理。此场景的抽象
    UML 图如图 5-11 所示，目标对象是仓库 bean。当添加服务层和服务类时，有两种可能性：我们用 `@Transactional` 注解新的服务类并从仓库中移除该注解，或者我们注解服务类并同时在仓库类上保留
    `@Transactional`。让我们详细分析每种情况。

