    `@SqlConfig` 注解功能强大，它提供了用于声明隔离级别 `(transactionMode = SqlConfig.TransactionMode.ISOLATED)`
    和要使用的事务管理器（transactionManager）的属性。


    ```

    (transactionManager="txMng")

    ```


    以下示例与上述示例行为相同，但出于教学目的，两个 `Sql` 注解已使用 `@SqlGroup` 组合在一起。


    ```

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {TestDataConfig.class, AppConfig.class})

    @ActiveProfiles("dev")

    public class UserServiceTest {

    // @SqlGroup 版本

    @Test

    @SqlGroup({

    @Sql(value = "classpath:db/extra-data.sql",

    config = @SqlConfig(encoding = "utf-8", separator = ";", commentPrefix = "--")),

    @Sql(

    scripts = "classpath:db/delete-test-data.sql",

    config = @SqlConfig(transactionMode = SqlConfig.TransactionMode.ISOLATED),

    executionPhase = Sql.ExecutionPhase.AFTER_TEST_METHOD

    )

    })

    public void testCount() {

    int count = userService.countUsers();

    assertEquals(8, count);

    }

    }

    ```


    `@Sql` 注解还有更多属性，但有一个属性你肯定会觉得非常有用：`statements` 属性。此属性允许你提供一个在测试方法之前执行的语句。


    ```

    @Test

    @Sql(statements = {"drop table NEW_P_USER if exists;"})

    public void testCreateTable(){

    int result = userRepo.createTable("new_p_user");

    // 表存在但为空

    assertEquals(0, result);

    }

    ```


    仓库方法可以在事务上下文中进行测试，与服务方法解耦。当测试数据库必须不受测试执行影响时，这非常有用。`@Transactional` 注解可用于测试方法并进行适当配置，而
    `@Rollback` 注解可用于实现这一特定目的：保持测试数据库不变。


    ```

    import org.springframework.test.annotation.Rollback;

    ...

    RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {TestDataConfig.class, AppConfig.class})

    @ActiveProfiles("dev")

    public class TransactionalJdbcRepoTest {

    @Transactional

    @Test

    public void testFindById() {

    User user = userRepo.findById(1L);

    assertEquals("John", user.getUsername());

    }

    @Test

    @Transactional @Rollback(false)

    public void testCreate(){

    int result = userRepo.createUser

    (5L, "Diana", "mypass", "diana@opympus.com", UserType.BOTH);

    assertEquals(1, result);

    Set dianas = userRepo.findAllByUserName("Diana", true);

    assertTrue(dianas.size() == 1);

    }

    }

    ```


    `@Rollback` 注解可用于指定在测试方法执行后不应执行回滚，通过使用其默认属性：`@Rollback(false)`。这等同于 Spring 4.2
    中引入的另一个注解：`@Commit`。你可能想象得到，你可以使用其中一个来实现此目的，但除非你真的想让 Spring 容器感到困惑，否则不应同时使用它们。结果将是不可预测的。这两个注解也可以在类级别使用，并且类级别的注解配置可以被方法级别的注解配置覆盖。


    在 Spring 4.0 之前，`@TransactionConfiguration` 可用于测试类，用于定义测试的事务上下文。它在 Spring 4.0
    中随着 profile 和 `@EnableTransactionManagement` 的引入而被弃用。但如果你对示例感兴趣，请看这里：


    ```

    import org.springframework.test.context.transaction.TransactionConfiguration;

    ...

    @TransactionConfiguration(defaultRollback = false,

    transactionManager = "txManager")

    @Transactional

    public class TransactionalJdbcRepoTest {

    @Test

    public void testFindById() {

    User user = userRepo.findById(1L);

    assertEquals("John", user.getUsername());

    }

    ...

    }

    ```


    `defaultRollback` 属性的默认值是 `true`，在上一个示例中将其设置为 `false` 只是为了介绍这个属性。


    另一个有用的测试注解是 `@BeforeTransaction`，它可用于在执行事务性测试方法之前设置或检查测试环境。带有 `@Before` 注解的方法在事务上下文中执行。以下代码片段中的方法检查测试数据库是否在事务上下文之外正确初始化。


    ```

    import org.springframework.test.context.transaction.BeforeTransaction;

    ...

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {TestDataConfig.class, AppConfig.class})

    @ActiveProfiles("dev")

    public class UserServiceTest {

    ...

    @BeforeTransaction

    public void checkDbInit(){

    int count = userService.countUsers();

    assertEquals(4, count);

    }

    }

    ```


    **使第三方组件具有事务性**


    对于无法使用注解配置事务执行的情况（例如使用 Java 1.5 之前的版本，或者服务是无法更改的第三方实现），可以通过使用 XML 声明 AOP 和 `tx`
    配置元素的组合来实现 Spring 事务管理配置。


