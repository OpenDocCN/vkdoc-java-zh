    ## Spring Data JPA


    Spring Data is a Spring project designed to help defining repository classes in
    a more practical way. Repository classes have a lot of common functionality, so
    the Spring team tried to provide the possibility to offer this functionality out
    of the box. The solution was to introduce abstract repositories that can also
    be customized by the developer to reduce the boilerplate code required for data
    access. To use Spring Data components in a JPA project, a dependency on the package
    `spring-data-jpa` must be introduced.


    The central interface of Spring Data is `Repository<T,ID extends Serializable>`.
    The full hierarchy can be seen in Figure [5-21](#A978-1-4842-0811-3_5_Chapter.html#Fig21).


    ![A978-1-4842-0811-3_5_Fig21_HTML.jpg](A978-1-4842-0811-3_5_Fig21_HTML.jpg)


    **Figure 5-21.** Spring Data JPA Repository hierarchy


    The `NoRepositoryBean` annotation is used to exclude repository interfaces from
    being picked up, and repository instances will not be created for them.


    Typically, a repository interface defined by a developer will extend one of the
    interfaces in the `Repository<T,ID extends Serializable>` hierarchy. This will
    expose a complete set of methods to manipulate entities.


    If all that is needed is to extend the `Repository<T,ID extends Serializable>`
    interface, but you do not like the idea of extending a Spring component, you can
    avoid that by annotating your repository class with `@RepositoryDefinition`. This
    will have the same effect as extending the `Repository` interface, since this
    interface is empty, so it is used as a marker interface that can be replaced by
    an annotation.


    Since the project for this section needs JPA, the repositories will extend the
    interface `JpaRepository<T, ID extends Serializable>`, which contains a set of
    default method skeletons out of the box, sparing the developer quite a lot of
    work. When a custom repository interface extends `JpaRepository`, it will automatically
    be enriched with functionality to save entities, search them by ID, retrieve all
    of them from the database, delete entities, flush, etc. (Just look at Figure [5-21](#A978-1-4842-0811-3_5_Chapter.html#Fig21),
    where all methods are listed.)


    Usually, repository classes must perform custom and more complex queries that
    are not covered by the default methods provided by a Spring Data repository. In
    this case, the developer must define its own methods for Spring to implement when
    the repository instance is created. To tell Spring what those methods should do,
    the `@Query` annotation is used to annotate them. Inside that annotation should
    be a query definition that will be executed at runtime and the results returned.
    In the code snippet below, you can see what the `UserRepo` component looks like
    when Spring Data JPA is used.


    ```java

    package com.ps.repos;

    import com.ps.ents.User;

    import org.springframework.data.jpa.repository.JpaRepository;

    import org.springframework.data.jpa.repository.Query;

    import org.springframework.data.repository.query.Param;

    import java.util.List;

    public interface UserRepo extends

    JpaRepository {

    @Query("select u from User u where u.username like %?1%")

    List findAllByUserName(String username);

    // using named parameters

    @Query("select u from User u where u.username= :un")

    User findOneByUsername(@Param("un") String username);

    @Query("select u.username from User u where u.id= :id")

    String findUsernameById(Long id);

    @Query("select count(u) from User u")

    long countUsers();

    }

    ```


    Every `Repository` interface must be linked to the type of domain object it handles
    and the type of the primary key, which is why in the example above, the `UserRepo`
    interface extends `JpaRepository<User, Long>`. So `UserRepo` will manage `User`
    domain objects with a `Long` primary key value.


    Interfaces like this are called instant repositories, because they can be created
    instantly by extending one of the Spring-specialized interfaces. So under the
    hood, as you are probably suspecting by now, Spring creates a proxy object that
    is a fully functioning repository bean. Any additional functionality that is not
    provided by default can be easily implemented by defining a method skeleton and
    providing the desired functionality using annotations.


    To tell Spring that it must create repository instances, a new configuration component
    must be introduced. The `@EnableJpaRepositories` tells Spring that it must create
    repository instances. As a parameter, the base package where the custom repository
    interfaces have been declared must be provided. Aside from that, the configuration
    also requires a persistence unit manager. In the code snippet below, you can see
    all the beans involved in the Spring JPA configuration.


    ```java

    import org.springframework.data.jpa.repository.config.EnableJpaRepositories;

    import org.springframework.orm.jpa.persistenceunit.DefaultPersistenceUnitManager;

    import org.springframework.orm.jpa.persistenceunit.PersistenceUnitManager;

    ...

    @Configuration

    @EnableJpaRepositories(basePackages = {"com.ps.repos"})

    @Import(DataSourceConfig.class)

    public class PersistenceConfig {

    @Autowired

    DataSource dataSource;

    @Autowired

    Properties hibernateProperties;

    @Bean

    public EntityManagerFactory entityManagerFactory(){

    LocalContainerEntityManagerFactoryBean

    factoryBean = new LocalContainerEntityManagerFactoryBean();

    factoryBean.setPersistenceUnitManager(persistenceUnitManager());

    factoryBean.setJpaVendorAdapter(new HibernateJpaVendorAdapter());

    factoryBean.setJpaProperties(hibernateProperties);

    factoryBean.afterPropertiesSet();

    return factoryBean.getNativeEntityManagerFactory();

    }

    @Bean

    public PlatformTransactionManager transactionManager() {

    return new JpaTransactionManager(entityManagerFactory());

    }

    @Bean

    public PersistenceExceptionTranslationPostProcessor exceptionTranslation(){

    return new PersistenceExceptionTranslationPostProcessor();

    }

    @Bean

    public PersistenceUnitManager persistenceUnitManager(){

    DefaultPersistenceUnitManager

    persistenceUnitManager = new DefaultPersistenceUnitManager();

    persistenceUnitManager.setPackagesToScan("com.ps.ents");

    persistenceUnitManager.setDefaultDataSource(dataSource);

    return persistenceUnitManager;

    }

    }

