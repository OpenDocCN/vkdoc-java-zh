  trans: "\n2.  点击 **+** 按钮。\n\n3.  从 Intellij IDEA 识别出的 Web 工件列表中，选择\n        `10-ps-mvc-practice-1.0.war`。\n\
    \        如果你有兴趣在调试模式下运行 Tomcat 并使用断点，请选择（`exploded`）选项。\n\n4.  在 `Application\
    \ context` 部分，输入 Web 应用程序上下文的名称，此处为\n        `mvc-basic`。\n\n![A978-1-4842-0811-3_6_Fig13_HTML.jpg](img/A978-1-4842-0811-3_6_Fig13_HTML.jpg)\n\
    \n图 6-13.\n\nIntellij IDEA 运行/调试配置对话框窗口中的“部署”选项卡\n\n然后点击所有对话框窗口中的 `Ok`，并通过在“运行/调试配置”菜单中选择\
    \ `mvc-basic` 配置，并点击图 6-9 中高亮显示的 `Run` 按钮来启动服务器。Intellij IDEA 应自动打开浏览器并显示 Pet\
    \ Sitter 应用程序的主页。\n\n这就是使用 Apache Tomcat 9 运行 Pet Sitter 应用程序的方法。即使使用不同的应用服务器，步骤也是类似的。\n\
    \nSpring Security\n\nSpring Security 是另一个 Spring 框架，旨在让开发者的生活更轻松、工作更愉快，因为它用于保护\
    \ Web 应用程序的安全。它非常易于使用，并且具有高度可定制性，可为应用程序的各个单元提供访问控制。对于编写安全的 Spring Web 应用程序，这是开发者的默认工具，因为其配置遵循所有\
    \ Spring 项目的相同标准，并且开箱即用地为多种身份验证类型提供了基础设施 Bean，所有这些显然都与其他 Spring 项目兼容。Spring Security\
    \ 提供了一系列广泛的功能，可归纳为四个关注领域：身份验证、授权 Web 请求、授权方法调用以及授权对单个领域对象的访问。\n\n在讨论保护应用程序安全时，以下概念非常重要：\n\
    \n*   `Principal` 是指能够在应用程序内执行操作的用户、设备或系统的术语。\n\n*   `Credentials` 是主体用于确认其身份的识别密钥。\n\
    \n*   `Authentication` 是验证主体凭据有效性的过程。\n\n*   `Authorization` 是决定是否允许经过身份验证的用户在应用程序内执行特定操作的过程。\n\
    \n*   `Secured item` 是用于描述任何被保护资源的术语。\n\n身份验证有多种方式，Spring Security 支持所有方式：基本认证、表单认证、OAuth、X.509、Cookie、单点登录。在凭据的存储位置和方式方面，Spring\
    \ Security 非常灵活，因为它支持所有方式：LDAP、RDBMS、属性文件、自定义 DAO；甚至支持 Bean 以及许多其他方式。⁶\n\n授权依赖于身份验证。用户必须首先通过身份验证，才能进行授权。身份验证过程的结果是确定用户是否有权访问应用程序，以及用户可以根据角色执行哪些操作。应用程序中最常见的用户角色包括：\n\
    \n*   ADMIN 角色用于拥有完全权限。此类角色特定于有权访问和操作所有数据（包括其他用户的数据）的用户。\n\n*   MEMBER 角色用于有限权限。此类角色特定于可以查看数据但只能操作自己详细信息的用户。\n\
    \n*   GUEST 角色用于对应用程序进行受限使用。此类角色用于只能查看有限数据的用户。\n\nSpring Security 是开发 Web 应用程序的首选，因为它灵活且具有可移植性。Spring\
    \ Security 不需要特殊的容器来运行；它可以简单地作为安全归档文件（WAR 或 EAR）进行部署，也可以在独立环境中运行。使用 Spring Security\
    \ 保护并归档为 WAR 的 Web 应用程序可以部署在 JBoss 或 Apache Tomcat 应用服务器上，只要配置了底层的凭据存储方法，该应用程序在任何这些应用服务器上的运行方式都完全相同。Spring\
    \ Security 非常灵活，因为身份验证和授权的配置是完全解耦的。因此，凭据的存储系统可以更改，而无需采取任何操作来调整授权配置。这使得应用程序非常一致，因为毕竟身份验证和授权的范围不同，因此由不同的可分离组件来覆盖它们是完全合乎逻辑的。\n\
    \nSpring Security 还具有很强的可扩展性，因为几乎所有与安全相关的内容都可以扩展和定制：如何识别主体、凭据存储在哪里、如何做出授权决策、安全约束存储在哪里等等。\n\
    \n安全是一个横切关注点，因此实现授权可能会导致代码混乱和纠缠。Spring Security 是使用 Spring AOP 实现的，并考虑了关注点分离。在底层，Spring\
    \ Security 使用一些基础设施 Bean 来实现这两个过程。在图 6-14 中，以抽象但准确的方式描绘了用户的身份验证和授权过程。\n\n![A978-1-4842-0811-3_6_Fig14_HTML.jpg](img/A978-1-4842-0811-3_6_Fig14_HTML.jpg)\n\
    \n图 6-14.\n\nSpring Security 底层原理\n\n上图所示的流程可以解释如下。\n\n1.  用户尝试通过发出请求来访问应用程序。应用程序要求用户提供凭据以便登录。\n\
    \n2.  凭据由 `Authenticaltion Manager` 验证，用户被授予访问应用程序的权限。该用户的授权权限被加载到 Spring Security\
    \ 上下文中。\n\n3.  用户发出资源请求（查看、编辑、插入或删除信息），在用户访问受保护/安全的资源之前，`Security Interceptor`\
    \ 会拦截该请求。\n\n4.  Security Interceptor 从安全上下文中提取用户授权数据，然后……\n\n5.  ……将决策委托给 `Access\
    \ Decision Manager`。\n\n6.  Access Decision Manager 轮询一个投票者列表，以返回关于经过身份验证的用户对系统资源权限的决策。\n\
    \n7.  根据用户权限和资源属性，授予或拒绝对资源的访问。\n\nSpring Security 配置\n\n要配置 Spring Security，开发者需要处理三件事：\n\
    \n*   为应用程序声明安全过滤器\n\n*   定义 Spring Security 上下文\n\n*   配置身份验证和授权\n\nXML 配置\n\n\
    要配置 Spring Security，必须修改 `web.xml` 以包含安全过滤器，并使安全上下文成为应用程序的根上下文。需要在 Web 应用程序的 XML\
    \ 配置中添加/修改的元素如下面的代码片段所示。\n\n```\n\ncontextConfigLocation\n\n/WEB-INF/spring/security-config.xml\n\
    \norg.springframework.web.context.ContextLoaderListener\n\nspringSecurityFilterChain\n\
    \norg.springframework.web.filter.DelegatingFilterProxy\n\nspringSecurityFilterChain\n\
    /*\n\n...\n\npet-dispatcher\n\norg.springframework.web.servlet.DispatcherServlet\n\
    \ncontextConfigLocation\n\n/WEB-INF/spring/mvc-config.xml\n/WEB-INF/spring/app-config.xml\n\
    \n```\n\n!\n"
- fmt: '`springSecurityFilterChain`是一个强制性的名称，它引用Spring根应用上下文中同名的Bean。`DelegatingFilterProxy`Bean将调用委托给一系列链式安全过滤器Bean，并充当安全请求的拦截器。在上述情况中，由于`<url-pattern
    .../>`元素定义了所有请求都将被拦截（使用的通配符为`/*`）。


    在底层，安全Web环境中的安全请求由一系列Spring管理的Bean处理，这就是代理Bean被命名为`springSecurityFilterChain`的原因，因为这些过滤器是链式的。该过滤器链具有以下关键职责：


    - 驱动身份验证

    - 强制执行授权

    - 管理登出

    - 在`HttpSession`中维护`SecurityContext`


    Spring Security框架建立在ACEGI Security 1.x的基础上。最初，安全过滤器Bean是手动配置的，可以单独使用，但这导致了复杂且冗长、易出错的XML配置。从Spring
    Security 2.0开始，过滤器Bean会使用默认值创建和初始化，除非需要更改默认的Spring Security行为，否则不建议手动配置。所有过滤器Bean都实现了`javax.servlet.Filter`接口。每个实现此接口的Bean类型都旨在对资源（Servlet或静态内容）的请求、来自资源的响应或两者执行过滤任务。尽管这些过滤器在后台工作，但对其进行简要介绍是合适的。在表[6-1](#A978-1-4842-0811-3_6_Chapter.html#Tab1)中，列出了安全过滤器及其用途。


    **表 6-1. Spring Security 链式过滤器**


    | 过滤器类 | 详情 |

    | --- | --- |

    | `ChannelProcessingFilter` | 用于在需要重定向到其他协议时使用 |

    | `SecurityContextPersistenceFilter` | 用于设置安全上下文并将更改复制到`HttpSession` |

    | `ConcurrentSessionFilter` | 用于并发会话处理包 |

    | `LogoutFilter` | 用于将主体登出。登出后将重定向到配置的视图 |

    | `BasicAuthenticationFilter` | 用于在安全上下文中存储有效的`Authentication`令牌 |

    | `JaasApiIntegrationFilter` | 此Bean尝试获取JAAS Subject并作为该`Subject`继续执行`FilterChain`
    |

    | `RememberMeAuthenticationFilter` | 用于存储有效的`Authentication`，并在安全上下文未更改时使用它 |

    | `AnonymousAuthenticationFilter` | 用于存储匿名的`Authentication`，并在安全上下文未更改时使用它 |

    | `ExceptionTranslationFilter` | 用于将Spring Security异常转换为HTTP相应的错误响应 |

    | `FilterSecurityInterceptor` | 用于保护URI并在访问被拒绝时抛出异常 |


    基本上，每当服务器收到HTTP请求时，每个过滤器都会在适用的情况下执行其操作。有趣的是，这些过滤器可以被自定义实现替换。它们在安全链中的位置由Spring通过枚举值列表定义，使用这些值作为`<custom-filter
    …/>`的`position`属性参数，可以指定使用不同的过滤器Bean来替代默认的过滤器。在以下代码片段中，`ConcurrentSessionFilter`被自定义实现替换。


    枚举值列表可以在`spring-security.xsd`[⁷](#A978-1-4842-0811-3_6_Chapter.html#Fn7)中找到，过滤器与值之间的对应关系如表[6-2](#A978-1-4842-0811-3_6_Chapter.html#Tab2)所示。


    **表 6-2. Spring Security 链式过滤器**


    | 过滤器类 | 位置枚举值 |

    | --- | --- |

    | `ChannelProcessingFilter` | `CHANNEL_FILTER` |

    | `SecurityContextPersistenceFilter` | `SECURITY_CONTEXT_FILTER` |

    | `ConcurrentSessionFilter` | `CONCURRENT_SESSION_FILTER` |

    | `LogoutFilter` | `LOGOUT_FILTER` |

    | `BasicAuthenticationFilter` | `BASIC_AUTH_FILTER` |

    | `JaasApiIntegrationFilter` | `JAAS_API_SUPPORT_FILTER` |

    | `RememberMeAuthenticationFilter` | `REMEMBER_ME_FILTER` |

    | `AnonymousAuthenticationFilter` | `ANONYMOUS_FILTER` |

    | `ExceptionTranslationFilter` | `EXCEPTION_TRANSLATION_FILTER` |

    | `FilterSecurityInterceptor` | `FILTER_SECURITY_INTERCEPTOR` |


    使用Java配置的等效方法不使用位置枚举值，而是使用`HttpSecurity`对象的一组方法：


    ```

    addFilterAfter(Filter filter, Class afterFilter)

    ```


    和`addFilterBefore(Filter filter, Class<? extends Filter> beforeFilter)`。它们接收过滤器类作为参数，自定义实现应相对于该类放置。在前面的示例中，`customConcurrencyFilter`Bean被放置在链中`securityContextPersistenceFilter`Bean之后。因此，等效的Java配置将如下面的代码片段所示。暂时不要关注注解，因为它们将在稍后的章节中介绍。只需注意自定义过滤器定义和`http.addFilterAfter(..)`调用：


    ```

    import com.ps.web.session.CustomConcurrentSessionFilter;

    import org.springframework.security.web.context.SecurityContextPersistenceFilter;

    ...

    @Configuration

    @EnableWebSecurity

    @EnableGlobalMethodSecurity(jsr250Enabled = true)

    public class SecurityConfig extends WebSecurityConfigurerAdapter {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http.addFilterAfter(

    SecurityContextPersistenceFilter.class, customConcurrencyFilter());

    http

    .authorizeRequests()

    ...

    .logout()

    .logoutUrl("/logout")

    .logoutSuccessUrl("/");

    }

    ...

    @Bean

    CustomConcurrentSessionFilter customConcurrencyFilter(){

    return new CustomConcurrentSessionFilter();

    }

    }

    ```


    要拦截的URL在Spring特定的XML文件中定义，允许访问这些URL的角色在Spring上下文中定义，并在身份验证时加载。在使用XML时，会使用一个单独的安全配置文件，在此示例中称为`security-config.xml`。为了简化配置，Spring提供了一个名为`spring-security`的特殊命名空间，其中包含严格的安全配置元素。安全配置文件可以相对于此命名空间编写，从而无需为安全元素使用前缀。在下面的代码片段中，展示了一个简单的配置文件版本，该版本将用户页面的访问限制为仅限完全通过身份验证的用户。同时还展示了登录表单位置和登出路径。


