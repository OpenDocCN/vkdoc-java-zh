    # 2. Spring Bean 生命周期与配置


    Spring 框架提供了一种简便的方法来创建、初始化并连接对象，从而构建出功能完备、低耦合、易于测试的企业级应用程序。每个软件应用都由相互交互、协作并依赖其他组件来成功执行一系列任务的软件组件构成。每个软件组件都为其他组件提供服务，而连接客户组件与提供者组件的过程被称为依赖注入。Spring
    提供了一种极其简单的方式来定义它们之间的连接，从而创建应用程序。


    在 Spring 出现之前，定义类之间的连接并进行组合，需要遵循不同的设计模式进行开发，例如工厂模式、抽象工厂模式、单例模式、建造者模式、装饰器模式、代理模式、服务定位器模式，甚至反射机制。¹
    Spring 的构建正是为了使依赖注入变得简单。这种软件设计模式意味着客户端将依赖解析委托给外部服务。客户端不允许调用注入器服务，因此这种软件模式的特点表现为控制反转行为，也称为“别找我们，我们会找你！”原则。


    Spring 用于构建应用程序的软件组件被称为 Bean，它们不过是普通的 Java 对象（POJO），由 Spring 控制反转容器创建、初始化、组装和管理。在
    Spring 2.5 版本之前，这些操作的顺序以及对象之间的关系是通过 XML 配置文件提供给 Spring IoC 容器的。从 2.5 版本开始，添加了一小部分用于配置
    Bean 的注解，而随着 Spring 3 的推出，引入了使用注解的 Java 配置方式。


    本章涵盖了开发人员使用 XML 和 Java 配置来配置基本 Spring 应用程序所需了解的所有内容。同时，还将介绍代表从 XML 配置到完整 Java
    配置中间步骤的 Java 注解。


    ## 旧式应用程序开发


    在最完善的开发风格中，Java 应用程序应由 POJO 组成，即每个都承担单一职责的简单 Java 对象。在上一章中，介绍了全书将使用的实体类以及它们之间的关系。为了在最低层级管理这类对象，即应用程序的
    DAO（数据访问对象）层，将使用名为 Repository 的类。这些类的目的是从存储支持（通常是某种类型的数据库）中检索、更新、创建和删除实体。


    这些类被称为 Repository，在本书的代码中，它们的名称是通过连接实体管理类型的简短标识、所管理实体对象的名称以及 Repo 后缀来创建的。每个类都实现一个简单的接口，该接口定义了为实现该实体类型所需行为而要实现的方法。所有接口都扩展一个公共接口，该接口声明了任何实体类型都应实现的通用方法。例如：保存、按
    ID 查找和删除应对每种实体类型都支持。采用这种开发方法是因为 Java 是一种非常面向对象的编程语言，在这种情况下，继承原则得到了很好的遵循。此外，泛型使得这种级别的继承成为可能。


    在图 2-1 中，展示了 AbstractRepo 接口以及每种实体类型的子接口。你可以注意到 AbstractRepo 接口如何为每种实体类型定义了典型的方法骨架，而子接口则定义了仅针对特定实体类型设计的方法骨架。


    ![A978-1-4842-0811-3_2_Fig1_HTML.jpg](img/A978-1-4842-0811-3_2_Fig1_HTML.jpg)


    图 2-1.


    Repository 接口层次结构


    在本节末尾，你可以暂停阅读，以便熟悉此实现。为此专门设计的项目名为 `01-ps-start-practice`。它包含了 Repository 类的桩实现，这些实现可以在测试源目录下的
    `com.ps.repo.stub` 包中找到。在图 2-2 中，展示了这些桩类。同样，使用了继承来减少需要编写的代码量，并避免编写重复代码。


    ![A978-1-4842-0811-3_2_Fig2_HTML.jpg](img/A978-1-4842-0811-3_2_Fig2_HTML.jpg)


    图 2-2.


    Repository 桩实现


    这些桩 Repository 将所有用户创建的数据存储在一个名为 `records` 的 Map 数据结构中。每个记录的唯一 ID 基于此 Map 的大小生成。该实现在
    `StubAbstractRepo` 类中，如下所示，同时包含了所有基本的 Repository 操作：


    ```

    package com.ps.repo.stub;

    import com.ps.base.AbstractEntity;

    import com.ps.repos.AbstractRepo;

    import java.util.HashMap;

    import java.util.Map;

    public abstract class StubAbstractRepo

    implements +underlineAbstractRepo {

    protected Map records = new HashMap();

    @Override

    public void save(T entity) {

    if (entity.getId() == null) {

    Long id = (long) records.size() + 1;

    entity.setId(id);

    }

    records.put(entity.getId(), entity);

    }

    @Override

    public void delete(T entity) {

    records.remove(entity.getId());

    }

    @Override

    public void deleteById(Long entityId) {

    records.remove(entityId);

    }

    @Override

    public T findById(Long entityId) {

    return records.get(entityId);

    }

    }

    ```

