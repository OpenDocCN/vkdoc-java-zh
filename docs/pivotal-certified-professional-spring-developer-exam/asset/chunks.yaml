    ...

    ```


    Spring 的 `MBeanExporter` 可以将现有的 POJO Bean 暴露给 `MBeanServer`，而无需编写注册代码。Spring Bean
    必须使用相应的注解进行标注。


    ```

    import org.springframework.jmx.export.annotation.ManagedAttribute;

    import org.springframework.jmx.export.annotation.ManagedOperation;

    import org.springframework.jmx.export.annotation.ManagedResource;

    import javax.annotation.ManagedBean;

    @ManagedResource(description = "sample JMX managed resource"

    , objectName="bean:name=jmxCounter")

    public class JmxCounterImpl implements JmxCounter {

    private int counter =0;

    @ManagedOperation(description = "Increment the counter")

    @Override

    public int add() {

    return ++counter;

    }

    @ManagedAttribute(description = "The counter")

    @Override

    public int getCount() {

    return counter;

    }

    }

    ```


    受管 Bean 的 ObjectName 要么从完全限定类名派生，要么作为属性传递给 `@ManagedResource`。`@ManagedResource`
    将 `JmxCounterImpl` 的所有实例标记为 JMX 受管资源。`@ManagedOperation` 将该方法标记为 JMX 操作。`@ManagedAttribute`
    将 getter 或 setter 标记为 JMX 属性的一半。


    `MBeanExporter` 以 Map 形式接收受管资源作为参数：


    ```

    @Configuration

    public class JmxConfig {

    @Bean

    MBeanExporter exporter(){

    MBeanExporter exporter = new MBeanExporter();

    Map map = new HashMap();

    map.put("bean:name=jmxCounter1", jmxCounter());

    exporter.setBeans(map);

    return exporter;

    }

    ...

    }

    // 在这种情况下，JMX Bean 必须使用 @Component 注解

    @Component

    @ManagedResource(description = "Sample JMX managed resource",

    objectName="bean:name=jmxCounter")

    public class JmxCounterImpl implements JmxCounter {

    ...

    }

    ```


    但如果进行相应配置，`MBeanExporter` Bean 可以检测所有 JMX Bean：将 `autodetect` 属性设置为 `true`。


    ```

    @Configuration

    public class JmxConfig {

    @Bean

    MBeanExporter exporter(){

    MBeanExporter exporter = new MBeanExporter();

    exporter.setAutodetect(true);

    return exporter;

    }

    ...

    }

    // 在这种情况下，JMX Bean 必须使用 @Component 注解

    @Component

    @ManagedResource(description = "Sample JMX managed resource",

    objectName="bean:name=jmxCounter")

    public class JmxCounterImpl implements JmxCounter {

    ...

    }

    ```


    但是，当使用 `@EnableMBeanExport` 注解时，则无需显式配置导出器 Bean。


    `objectName` 属性包含最终 MBean 的名称，因此任何客户端（本地或远程）都必须查找 `jmxCounter`。现在，我们已经完成了 JMX
    配置并将一个 Spring Bean 暴露为 MBean，可以启动应用程序并开始搜索这个 Spring 管理的 Bean。


    在当前的示例中，我们将使用 Oracle 的 Java Mission Control 作为客户端。²⁹ 如果你的系统中设置了 `JAVA_HOME` 变量，并且
    `JAVA_HOME\bin` 在类路径中，请打开终端（或在 Windows 上打开命令提示符）并输入 `jmc`。在图 7-31 中，你可以看到 JMC
    窗口。


    ![A978-1-4842-0811-3_7_Fig31_HTML.jpg](img/A978-1-4842-0811-3_7_Fig31_HTML.jpg)


    图 7-31.


    Java Mission Control 连接到 16-ps-jmx-sample 应用程序并显示 jmxCounter MBean


    在 JMC 中，你会看到一个名为 `JVM Browser` 的选项卡，它显示了系统上运行的所有 JAVA 进程。你可以通过主类名称 `com.ps.start.Application`
    识别出对应于 `16-ps-jmx-sample` 的 Java 进程。双击并展开节点；然后双击 `MBeanServer` 节点。将打开一个名为 MBean
    Browser 的选项卡，在其中展开 `bean` 节点，你将看到 `jmxCounter`，可以通过单击右侧的选项卡来检查它。如果你单击操作选项卡，你将看到两个操作和一个名为
    `Execute` 的按钮，你可以使用它来执行 `jmxCounter` MBean 的方法。


    之前提到过，客户端应用程序可以通过代理访问 MBean。Spring JMX 架构支持这一点，因为这是 Spring 应用程序之间的标准远程通信方式。在图
    7-32 中，你可以看到 Spring JMX 架构。


    ![A978-1-4842-0811-3_7_Fig32_HTML.jpg](img/A978-1-4842-0811-3_7_Fig32_HTML.jpg)


    图 7-32.


    Spring JMX 架构


    所以基本上，服务器端将 Spring Bean 暴露为由 MBeanServer 管理的 MBean，而客户端则使用代理访问它们。典型的 Spring 风格，对吧？


    为了能够为 MBean 创建 Spring 客户端，必须在服务器端为其定义一个客户端将用于访问 MBean 的连接器。为此，我们需要配置一个类型为 `ConnectorServerFactoryBean`
    的 Bean。


    ```

    @SpringBootApplication

    @EnableMBeanExport

    public class Application {

    private static Logger  logger = LoggerFactory.getLogger(Application.class);

    @Bean

    ConnectorServerFactoryBean connector(){

    return new ConnectorServerFactoryBean();

    }

    ...

    }

    ```


    默认情况下，`ConnectorServerFactoryBean` 会创建一个绑定到 `"service:jmx:jmxmp://localhost:9875"`
    的 `JMXConnectorServer`，这就是客户端将用于访问 MBean 的 URL。此示例中的客户端是一个测试类，其中注入了一个类型为 `MBeanServerConnectionFactoryBean`
    的 Bean，该 Bean 将用于通过代理对象远程访问 MBean。JSR 160 规范将 JMXMP 协议标记为可选：目前，主要的开源 JMX 实现 MX4J
    以及 JDK 自带的实现都不支持 JMXMP。因此，更简单的方法是通过 RMI 暴露 MBean。为此，必须更改服务器配置以包含 RMI 注册表和连接器 Bean。


    ```

    import org.springframework.jmx.support.ConnectorServerFactoryBean;

    import org.springframework.jmx.support.MBeanServerFactoryBean;

    import org.springframework.remoting.rmi.RmiRegistryFactoryBean;

    ....

    @SpringBootApplication

    @EnableMBeanExport

    public class Application {

    private static Logger logger = LoggerFactory.getLogger(Application.class);

    @Bean

    @DependsOn("rmiRegistry")

    ConnectorServerFactoryBean connector() {

    ConnectorServerFactoryBean cf = new ConnectorServerFactoryBean();

    try {

    cf.setObjectName("connector:name=rmi");

    } catch (MalformedObjectNameException e) {

    return  null;

    }

    cf.setServiceUrl(

    "service:jmx:rmi://localhost/jndi/rmi://localhost:1099/jmxrmi");

    return cf;

    }

    @Bean

    RmiRegistryFactoryBean rmiRegistry() {

    RmiRegistryFactoryBean rmiRegistryFactoryBean = new RmiRegistryFactoryBean();

    rmiRegistryFactoryBean.setAlwaysCreate(true);

    rmiRegistryFactoryBean.setPort(1099);

    return rmiRegistryFactoryBean;

    }

    ...

    }

    ```


    在客户端，我们需要一个 `MBeanServerConnection` Bean 来连接到 RMI 服务器，该 Bean 将由 `MBeanServerConnectionFactoryBean`
    工厂 Bean 创建，以及一个 `MBeanProxyFactoryBean`，它将负责创建 `JmxCounter` 代理。

