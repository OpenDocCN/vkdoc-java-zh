- fmt: '# Web Services, REST, and Middleware


    Web Services constitute a cross-platform interprocess communication method using
    common standards and able to work through firewalls. They work with messages,
    not objects. So the client basically sends a message, and a reply is returned.
    Web services work in a stateless environment whereby each message results in a
    new object created to service the request. Web services support interoperability
    across platforms and are good for heterogeneous environments. They expose their
    own arbitrary sets of operations such as via WSDL (Web Services Description Language)
    and SOAP (Simple Object Access Protocol).


    REST, or representational state transfer, also called RESTful web services, is
    currently the most popular way applications communicate with each other. REST
    services allow access and manipulation of textual representations of web resources
    using a uniform and predefined set of stateless operations. The most common protocol
    used with REST services is HTTP, so the HTTP methods map on REST operations such
    as `GET`, `POST`, `PUT`, `DELETE`. Initially, web resources were documents or
    files accessed using a URL (Uniform Resource Locator, also known as a web address),
    but recently, a web resource became able to be anything (object, entity) that
    can be accessed via the web and is identified by a URI (Uniform Resource Identifier).


    The easiest way in which two heterogeneous systems can communicate is using a
    layer called middleware. Using this layer, software components like applications,
    enterprise Java beans, servlets, and other components that have been developed
    independently and that run on different networked platforms can interact with
    one another. There are three types of middleware:


    *   Remote Procedure Call, or RPC, which allows one application to call procedures
    from another application remotely as if they were local calls.

    *   Object Request Broker, or ORB-based, which enables an application’s objects
    to be distributed and shared across heterogeneous networks. (Remoting falls in
    this category.)

    *   Message Oriented Middleware or MOM-based middleware, which allows distributed
    applications to communicate and exchange data by sending and receiving messages.


    Spring provides support for the JMS (Java Messaging Service) API, which is an
    abstraction written in Java for accessing MOM middleware. Messaging is an implementation
    to handle the producer–consumer problem. An application produces messages, and
    a client application consumes them asynchronously. The application sending the
    messages has no knowledge of its client (or clients). Messaging is a form of loosely
    coupled distributed communication. The main advantages of using messaging for
    communication are the relaxed coupling between the producer and the consumer and
    the ability to integrate heterogeneous platforms, reduce system bottlenecks, increase
    scalability, and respond more quickly to change.


    JMX (Java Management Extensions) is a Java technology that supplies tools for
    managing and monitoring applications, system objects, devices (such as printers)
    and service-oriented networks. Those resources are represented by objects called
    MBeans (Managed Bean). The JMX support in Spring provides features to integrate
    a Spring application into a JMX infrastructure easily and transparently.


    All of these topics will be superficially covered in this chapter, except for
    REST, which has its own chapter in the official documentation for the core certification
    exam.


    # Spring Remoting


    Before this chapter, the topics presented were exemplified technically through
    applications executed on a single JVM. Service beans were calling repository beans
    methods, and tests classes were executed to check the correct communication between
    them. Figure [7-1](#A978-1-4842-0811-3_7_Chapter.html#Fig1) depicts the situation
    covered so far.


    ![A978-1-4842-0811-3_7_Fig1_HTML.jpg](A978-1-4842-0811-3_7_Fig1_HTML.jpg)


    Figure 7-1. Client and Server applications run in the same JVM context


    With a traditional remoting client, a `ClientService` class should be introduced
    to access remote objects that will exist in an application being run on a different
    JVM. Figure [7-2](#A978-1-4842-0811-3_7_Chapter.html#Fig2) abstractly depicts
    the situation covered in this chapter. The remote object is represented in this
    figure by the `RemoteUserService` class.


    ![A978-1-4842-0811-3_7_Fig2_HTML.jpg](A978-1-4842-0811-3_7_Fig2_HTML.jpg)


    Figure 7-2. Client and Server applications run in the different JVM context


    Java Remote Invocation allows for an object running in one JVM to invoke methods
    on an object running in another JVM. RMI (Remote Method Invocation) is Java’s
    version of RPC (Remote Procedure Call). RMI applications often consist of two
    processes: a server and a client. The server creates the objects that will be
    accessed remotely, and it will expose a skeleton (the interface of the remote
    object). The client invokes methods on a stub (proxy object). The RMI model abstract
    functional schema is depicted in Figure [7-3](#A978-1-4842-0811-3_7_Chapter.html#Fig3).


    ![A978-1-4842-0811-3_7_Fig3_HTML.jpg](A978-1-4842-0811-3_7_Fig3_HTML.jpg)


    Figure 7-3. The RMI model abstract functional schema


    The RMI model has a few disadvantages:


    *   The client and server implementations are coupled to the RMI framework.

    *   The server interface must extend `java.rmi.Remote`.

    *   The client must catch `java.rmi.RemoteException`, because it is a checked
    exception.[¹](#A978-1-4842-0811-3_7_Chapter.html#Fn1)

    *   RMI stub and skeleton have to be generated with the `rmic` compiler, which
    can be found in the `JAVA_HOME\bin` directory.[²](#A978-1-4842-0811-3_7_Chapter.html#Fn2)

    *   And extra code must be written to handle binding and retrieving objects from
    the remote server.


    To pass objects between server and client, Java marshaling is used. Objects transferred
    using RMI must therefore be serializable, and they must implement `java.io.Serializable`.
    RMI uses the Java Remote Method Protocol (JRMP) for remote Java object communication.
    In the following remote example, the entity objects defined in `00-ps-core` are
    used, and they were defined as serializable so they could be handled by Spring
    JPA.


    ```

    // User.java

    import javax.persistence.*;

    ...

    @Entity

    @Table(name="P_USER")

    public class User extends AbstractEntity {

    ...

    }

    // AbstractEntity.java

    import java.io.Serializable;

    @MappedSuperclass

    public abstract class AbstractEntity

    implements Serializable {

    ...

    }

    ```


    Spring provides classes for writing remote applications that are designed to hide
    the “plumbing” details. Using class `org.springframework.remoting.rmi.RmiServiceExporter`,
    the interface `UserService` implemented by class `UserServiceImpl`, the service
    bean defined in `09-ps-data-jpa` can be exposed as an RMI object. This class can
    be used to bind to a registry or expose an endpoint. Using the class `org.springframework.remoting.rmi.RmiProxyFactoryBean`,
    the `UserService` interface can be accessed via proxies that are created to communicate
    with the server-side endpoint and to convert the remoting-specific exceptions
    to a runtime hierarchy, all extending the core `RemoteAccessException`. These
    two classes are basically utility classes to help developers write remote applications
    quickly and easily, because the code written by the developer is greatly reduced,
    by using configuration instead.[³](#A978-1-4842-0811-3_7_Chapter.html#Fn3) The
    abstract schema of client and server applications remoting using Spring is depicted
    in Figure [7-4](#A978-1-4842-0811-3_7_Chapter.html#Fig4).


    ![A978-1-4842-0811-3_7_Fig4_HTML.jpg](A978-1-4842-0811-3_7_Fig4_HTML.jpg)


    Figure 7-4. Spring remoting schema depicting the roles of `RmiServiceExporter`
    and `RmiProxyFactoryBean`


    # Spring Remote Configuration'
