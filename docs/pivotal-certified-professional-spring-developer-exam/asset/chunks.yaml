    \ bean与数据库通信期间发生意外事件时会发生什么。\n\n## 使用JdbcTemplate进行查询\n\n`JdbcTemplate`为开发者提供了多种方法来查询实体（也称为领域对象）、通用映射、列表以及简单类型（`long`、`int`、`String`）。`JdbcTemplate`方法使用包含`'?'`占位符的查询来绑定参数和变量。它利用了可变参数和自动装箱的优势来简化`JdbcTemplate`的使用。但也可以使用没有任何绑定变量的简单查询。以下示例使用查询来统计`p_user`表中的所有用户，并返回一个整数。\n\
