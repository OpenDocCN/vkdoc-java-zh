    Spring JmsTemplate


    Spring 使应用程序与后端基础设施解耦，但应用程序必须针对 API 进行编码。`org.springframework.jms.core.JmsTemplate`
    是 Spring JMS 核心包的中心类。它是一个辅助类，旨在通过处理资源的创建和释放来简化同步 JMS 消息的发送和接收。此模板类提供了以下开发优势：


    *   减少样板代码，但如果任务需要，开发人员可以实现回调接口，从而获得明确定义的高级契约

    *   透明管理 JMS 资源

    *   公开基本的请求-回复操作，使得可以发送消息并在作为操作一部分创建的临时队列上等待回复

    *   提供实用的异常处理，将 JMS 异常转换为 Spring 特定的 JMS 非检查异常（`org.springframework.jms.JmsException`
    的扩展）

    *   支持自定义消息转换器和目标解析器

    *   提供便捷方法和回调


    从 Spring Framework 4.1 开始，引入了 `org.springframework.jms.core.JmsMessagingTemplate`
    类，它构建在 `JmsTemplate` 之上，以提供与 Spring 消息抽象 `org.springframework.messaging.Message<T>`
    的集成，从而允许创建通用消息。


    `JmsTemplate` 使用 `org.springframework.jms.support.converter.MessageConverter`
    的实现来在对象和 `Messages` 之间进行转换。`SimpleMessageConverter` 处理基本类型：文本、可序列化对象类型、映射和 byte[]。对于更复杂的对象，开发人员可以提供自己的实现，或委托给
    OXM 编组器（从 Spring 3 开始可用）。


    以下代码片段描述了开发人员为实现自定义消息转换器而必须实现的 `MessageConverter` 接口。


    ```

    package org.springframework.jms.support.converter;

    ...

    public interface MessageConverter {

    Message toMessage(Object object, Session session)

    throws JMSException, MessageConversionException;

    Object fromMessage(Message message)

    throws JMSException, MessageConversionException;

    }

    ```

