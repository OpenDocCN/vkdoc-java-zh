    to load those values and inject them in the embedded server configuration. The
    structure of the `11-ps-boot-sample` project is depicted in Figure [6-20](#A978-1-4842-0811-3_6_Chapter.html#Fig20).


    ![A978-1-4842-0811-3_6_Fig20_HTML.jpg](A978-1-4842-0811-3_6_Fig20_HTML.jpg)


    Figure 6-20. `11-ps-boot-sample`: Simple Spring Boot project structure


    The contents of the `application.properties` are as follows:


    ```

    app.port=8080

    app.context=/ps-boot

    ```


    The names of the properties used here are not reserved or fixed by Spring Boot.
    They can have any names, and their values will be injected in the bean that uses
    them in the `@Value` annotation.[^(18)](#A978-1-4842-0811-3_6_Chapter.html#Fn18)


    They are loaded by the following bean:


    ```java

    package com.ps.start;

    import org.springframework.boot.context.embedded.ConfigurableEmbeddedServletContainer;

    import org.springframework.boot.context.embedded.EmbeddedServletContainerCustomizer;

    ...

    @Component

    public class PropertiesConfBean implements EmbeddedServletContainerCustomizer
    {

    @Value("${app.port}")

    private Integer value;

    @Value("${app.context}")

    private String contextPath;

    @Override

    public void customize(ConfigurableEmbeddedServletContainer container) {

    container.setPort(value);

    container.setContextPath(contextPath);

    }

    }

    ```


    The `application.properties` can be placed in the following locations:


    1.  `/config` subdirectory of the current directory.

    2.  the current directory.

    3.  classpath `config` package.

    4.  the classpath root.


    This list is ordered by precedence, and properties defined in upper positions
    override those in lower positions. The `application.properties` file can be provided
    when the application is executed from the command line using the `spring.config.location`
    argument:


    ```

    java -jar ps-boot.jar --spring.config.location=/Users/iuliana.cosmina/temp/application.properties

    ```


    The file name can be changed too, by using the `spring.config.name` in the command
    line:


    ```

    java -jar ps-boot.jar --spring.config.name=my-boot.properties

    ```


    With this configuration, the application can be accessed at `http://localhost:8080/ps-boot/`.
    The configuration above will work when embedded Jetty, Tomcat, or Undertow is
    used. If something specialized is needed— let’s assume we are using Tomcat—a `TomcatEmbeddedServletContainerFactory`
    bean can be used. And because the `SpringBootApplication` also includes scanning
    capabilities, the whole application can be written in the `Application` class
    by annotating it with the `@RestController` annotation.


    ```java

    import org.springframework.boot.context.embedded.EmbeddedServletContainerFactory;

    import org.springframework.boot.context.embedded.tomcat.TomcatEmbeddedServletContainerFactory;

    ...

    @RestController

    @SpringBootApplication(scanBasePackages = {"com.ps.start"})

    public class Application {

    public static void main(String... args) {

    SpringApplication.run(Application.class, args);

    System.out.println("Started ...");

    }

    @Value("${app.port}")

    private Integer value;

    @Value("${app.context}")

    private String contextPath;

    @Bean

    public EmbeddedServletContainerFactory servletContainer() {

    TomcatEmbeddedServletContainerFactory factory =

    new TomcatEmbeddedServletContainerFactory();

    factory.setPort(value);

    factory.setSessionTimeout(10, TimeUnit.MINUTES);

    factory.setContextPath(contextPath);

    return factory;

    }

    @Autowired

    ApplicationContext ctx;

    @RequestMapping("/")

    public String index() {

    StringBuilder sb = new StringBuilder("");

    sb.append("Hello there dear developer,

    here are the beans you were looking for: ");

    String beanNames = ctx.getBeanDefinitionNames();

    Arrays.sort(beanNames);

    for (String beanName : beanNames) {

    sb.append("").append(beanName);

    }

    sb.append("");

    return sb.toString();

    }

    }

    ```


