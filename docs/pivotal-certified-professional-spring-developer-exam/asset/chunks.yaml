    对于删除方法，负面测试看起来略有不同，因为`delete`方法不返回可供断言的任何结果。相反，当它们无法删除记录时，会抛出`com.ps.repos.NotFoundException`类型的异常。当然，这有点极端，但为了向您展示如何测试这些方法是必要的。由于我们知道抛出异常的情况，为了使测试通过，我们使用`@Test`注解的`expected`属性告诉JUnit何时期望此行为。


    ```java

    //positive test, we know that a Pet with ID=1 exists

    @Test

    public void deleteByIdPositive() {

    simplePetService.deleteById(PET_ID);

    // we do a find to test the deletion succeeded

    Pet pet = simplePetService.findById(PET_ID);

    assertNull(pet);

    }

    //negative test, we know that a Pet with ID=99 does not exist

    @Test(expected = NotFoundException.class)

    public void deleteByIdNegative() {

    simplePetService.deleteById(99L);

    }

    ```


    在上面的代码片段中，使用了以下JUnit组件：


    *   `@Before`注解用于应在执行测试方法之前执行的方法。这些方法用于准备该测试执行的上下文。测试方法中使用的所有对象都应在此方法中创建和初始化。使用`@Before`注解的方法会在每个使用`@Test`注解的方法之前执行。


    *   `@Test`注解是告诉JUnit此方法中的代码应作为测试用例运行的注解。使用`@Test`注解的方法应始终为`public`且返回`void`。它也可用于处理预期的异常。


    *   `assert*`方法定义在`org.junit.Assert`类中，可用于简化测试方法的代码。如果没有它们，用户将不得不编写指定测试何时应通过或失败的代码。'
