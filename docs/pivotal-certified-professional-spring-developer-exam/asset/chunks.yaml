- fmt: '### Recommended Project Build Tool


    ![A978-1-4842-0811-3_1_Figb_HTML.jpg](A978-1-4842-0811-3_1_Figb_HTML.jpg) Grade
    2.x ** The sources attached to this book can be compiled and executed using the
    Gradle wrapper, which is a batch script on Windows and a shell script for other
    operating systems. When you start a Gradle build via the wrapper, Gradle will
    be automatically downloaded and used to run the build; thus you do not need to
    install Gradle as stated previously. Instructions on how to do this can be found
    by reading the public documentation at [`http://www.gradle.org/docs/current/userguide/gradle_wrapper.html`](http://www.gradle.org/docs/current/userguide/gradle_wrapper.html).


    A good practice is to keep code and build tools separate, but for this study guide,
    it was chosen to use the wrapper to make setting up the practice environment easy
    by skipping the Gradle installation step and also because the recommended source
    code editor uses the wrapper internally.


    If you decide to use Gradle outside the editor, you can download the binaries
    only (or if you are curious, you can download the full package, which contains
    binaries, sources, and documentation) from their official site [`https`](https://www.gradle.org/)`:`
    [`//www.gradle.org/`](https://www.gradle.org/), unpack them, and copy the contents
    somewhere on the hard drive. Create a `GRADLE_HOME` environment variable and point
    it to the location where you have unpacked Gradle. Also add `%GRADLE_HOME%\bin`
    for Windows, `$GRADLE_HOME/bin` for Unix-based operating systems, to the general
    path of the system.


    Gradle was chosen as a build tool for the sources of this book because of the
    easy setup, small configuration files, flexibility in defining execution tasks,
    and the fact that the Pivotal Spring team currently uses it to build all Spring
    projects.


    Verify that the version of Gradle the operating system sees is the one you just
    installed by opening a terminal (`Command Prompt` in `Windows`, and any type of
    terminal you have installed on `MacOs` and `Linux`) and typing:


    ```

    gradle -version

    ```


    You should see something similar to this:


    ```

    Gradle 2.11


    Build time:    2016-02-08 07:59:16 UTC

    Build number:  none

    Revision:      584db1c7c90bdd1de1d1c4c51271c665bfcba978

    Groovy:        2.4.4

    Ant:           Apache Ant(TM) version 1.9.3 compiled on December 23 2013

    JVM:           1.8.0_74 (Oracle Corporation 25.74-b02)

    OS:            -- whatever operating system you have --

    ```


    The text above being displayed is confirmation that Gradle commands can be executed
    in your terminal; thus Gradle was installed successfully.


    The reason Gradle was used to build the projects for this book is its simplicity.
    Gradle was presented recently as the modern open source polyglot build automation
    system, and the Gradle team now also helps you analyze your builds in order to
    prove it. Gradle now offers the possibility of registering a receipt on their
    site that will be used to connect to the site and generate the build statistics.
    The project of this book will use this new service provided by the Gradle team
    to keep you informed on how the project grows with each chapter.


    If you enter [`https://gradle.com/demo/`](https://gradle.com/demo/) and follow
    the instructions in the demo, you can build your project and get a set of statistics
    about how healthy your project and team are. In the first step of conception,
    the project is quite simple, so the initial automatic build does not provide much
    information. In Figure [1-2](#A978-1-4842-0811-3_1_Chapter.html#Fig2), you can
    see the statistics for the project in the initial phase. As you can see, the build
    takes one second, no tests are run, and the JVM needed a maximum of 910 MB of
    memory to run this build.


    ![A978-1-4842-0811-3_1_Fig2_HTML.jpg](A978-1-4842-0811-3_1_Fig2_HTML.jpg)


    Figure 1-2. Gradle.com build statistics


    ### Recommended IDE


    ![A978-1-4842-0811-3_1_Figc_HTML.jpg](A978-1-4842-0811-3_1_Figc_HTML.jpg) The
    recommended IDE to use in this study guide is IntelliJ IDEA. The reason for this
    is that it is the most intelligent Java IDE. IntelliJ IDEA offers outstanding
    framework-specific coding assistance and productivity-boosting features for Java
    EE, and Spring also includes support for Maven and Gradle. It is the perfect choice
    to help you focus on learning Spring, and not how to learn to use an IDE. It can
    be downloaded from the JetBrains official site [`https://www.jetbrains.com/idea/`](https://www.jetbrains.com/idea/).
    It is also light on your operating system and quite easy to use.


    Since Spring Boot will be used to run the web applications in the project attached
    to the book, you can use the community edition in order to build and solve the
    TODOs in the project. But if you are looking for a professional experience in
    development with Java and Spring, you can try working with the Ultimate Edition,
    which has a trial period of thirty days. The figures with code being run, launchers
    being created, and other IDE-related details in this book are made using an IntelliJ
    IDEA Ultimate version.


    I believe that an IDE should be so easy to use and so intuitive that you can focus
    on what really matters: the solution you are implementing. But in case you are
    already familiar with a different Java editor, you can go ahead and use it as
    long as it supports Gradle.'
