- fmt: '为了开发一个可用的 Spring Security Web 应用程序配置，需要将 XML 配置转换为安全配置类。这个类应继承`WebSecurityConfigurerAdapter`，从而最大限度地减少编写有效安全配置所需的代码量。因此，到目前为止作为示例给出的
    XML 配置变为：


    ```java

    package com.pr.config;

    ...

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.security.config.annotation

    .authentication.builders.AuthenticationManagerBuilder;

    import org.springframework.security.config.annotation

    .web.builders.HttpSecurity;

    import org.springframework.security.config.annotation

    .web.configuration.EnableWebSecurity;

    import org.springframework.security.config.annotation

    .web.configuration.WebSecurityConfigurerAdapter;

    @Configuration

    @EnableWebSecurity

    public class SecurityConfig extends WebSecurityConfigurerAdapter {

    @Autowired

    public void configureGlobal(AuthenticationManagerBuilder auth) {

    try {

    auth.inMemoryAuthentication()

    .withUser("john").password("doe").roles("USER").and()

    .withUser("jane").password("doe").roles("USER","ADMIN").and()

    .withUser("admin").password("admin").roles("ADMIN");

    } catch (Exception e) {

    e.printStackTrace();

    }

    }

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    .authorizeRequests()

    .antMatchers("/user/edit").hasRole("ADMIN")

    .antMatchers("/**").hasAnyRole("ADMIN","USER")

    .anyRequest()

    .authenticated()

    .and()

    .formLogin()

    .usernameParameter("username")  //  customizable

    .passwordParameter("password") // customizable

    .loginProcessingUrl("/login") // customizable

    .loginPage("/auth")

    .failureUrl("/auth?auth_error=1")

    .defaultSuccessUrl("/home")

    .permitAll()

    .and()

    .logout()

    .logoutUrl("/logout")

    .logoutSuccessUrl("/")

    .and()

    .csrf().disable();

    }

    }

    ```


    `@EnableWebSecurity`注解必须用于安全配置类，这些类还必须继承`org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter`并提供`configure(HttpSecurity
    http)`方法的实现。为了简化配置，还可以重写`configure(WebSecurity web)`方法来指定 Spring Security 应忽略的资源，例如样式文件和图片，从而简化`configure(HttpSecurity
    http)`方法的实现，并将不安全的元素与安全的元素解耦。


    ```java

    package com.pr.config;

    ...

    import org.springframework.security.config.annotation.web.

    builders.WebSecurity;

    @Configuration

    @EnableWebSecurity

    public class SecurityConfig extends WebSecurityConfigurerAdapter {

    @Override

    public void configure(WebSecurity web) throws Exception {

    web.ignoring().antMatchers("/resources/**","/images/**","/styles/**");

    }

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    .authorizeRequests()

    .antMatchers("/user/edit").hasRole("ADMIN")

    .antMatchers("/**").hasAnyRole("ADMIN","USER")

    .anyRequest()

    .authenticated()

    .and()

    .formLogin()

    .usernameParameter("username")  //  customizable

    .passwordParameter("password") // customizable

    .loginProcessingUrl("/login") // customizable

    .loginPage("/auth")

    .failureUrl("/auth?auth_error=1")

    .defaultSuccessUrl("/home")

    .permitAll()

    .and()

    .logout()

    .logoutUrl("/logout")

    .logoutSuccessUrl("/")

    .and()

    .csrf().disable();

    }

    }

    ```


    `antMatcher(…)`方法等同于 XML 中的`<intercept-url.../>`元素，并且有等效的方法可以替换登录表单、注销 URL 配置和
    CSRF 令牌支持的配置。要启用 CSRF 使用，上述配置还必须定义一个 CSRF 提供者 bean 并在配置中使用它：


    ```java

    ...

    import org.springframework.security.web.csrf.CsrfTokenRepository;

    import org.springframework.security.web.csrf.HttpSessionCsrfTokenRepository;

    @Configuration

    @EnableWebSecurity

    public class SecurityConfig extends WebSecurityConfigurerAdapter {

    @Bean

    public CsrfTokenRepository repo() {

    HttpSessionCsrfTokenRepository repo = new HttpSessionCsrfTokenRepository();

    repo.setParameterName("_csrf");

    repo.setHeaderName("X-CSRF-TOKEN");

    return repo;

    }

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http.

    ...

    .and()

    .csrf().csrfTokenRepository(repo());

    }

    }

    ```


    开箱即用，Spring 提供了三种`CsrfTokenRepository`实现，它们在表 [6-3](#A978-1-4842-0811-3_6_Chapter.html#Tab3)
    中列出并说明。


    **表 6-3.** Spring Security 链式过滤器


    | 过滤器类 | 位置枚举值 |

    | --- | --- |

    | `CookieCsrfTokenRepository` | 将 CSRF 令牌持久化在名为“XSRFTOKEN”的 cookie 中，并从“X-XSRF-TOKEN”标头中读取，遵循
    AngularJS 的约定 |

    | `HttpSessionCsrfTokenRepository` | 将 CSRF 令牌持久化在`HttpSession`中，参数名称通过调用`setParameterName()`方法设置，并从通过调用`setHeaderName()`方法设置的标头名称中读取
    |

    | `LazyCsrfTokenRepository` | 延迟保存新的 CSRF 令牌，直到其生成的属性被访问。 |


    当使用 CSRF 支持时，需要相应地实现注销，并确保 CSRF 令牌被彻底清除和禁用，使其无法被恶意请求使用。[^(14)](#A978-1-4842-0811-3_6_Chapter.html#Fn14)
