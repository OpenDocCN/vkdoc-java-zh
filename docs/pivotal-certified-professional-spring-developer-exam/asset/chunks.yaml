    \ So they are a perfect fit to introduce this annotation.\n\n*   The `@SqlGroup`\n\
    \    annotation can be used on classes and methods to group together `@Sql` annotations.\
    \ It\n    can be used as a meta-annotation to create custom composed annotations.\n\
    \    For example, when more than one datasource is involved, it can be used\n\
    \    together with `@SqlConfig` to group\n    scripts to be executed to prepare\
    \ the test environment for a single test\n    case involving both datasources:\n\
    \n```\n    @SqlGroup({\n    @Sql(scripts = \"script1.sql\", config = @SqlConfig(dataSource\
    \ = \"dataSource1\")),\n    @Sql(scripts = \"script2.sql\", config = @SqlConfig(dataSource\
    \ = \"dataSource2\"))\n    })\n    ```\n\n*   The `@SqlConfig`\n    is used to\
    \ specify the configuration of the SQL script.\n\nIn the code snippet below, you\
    \ can see how these annotations can be used\nto test your service classes. The\
    \ first example uses multiple `@Sql` annotations; the\nsecond groups them with\
    \ `@SqlGroup`. The\nexample can be tested by running the `UserServiceTest.testCount()`\n\
    method from the `06-ps-tx-practice`\nproject/\n\n```\nimport org.springframework.test.context.jdbc.Sql;\n\
    import org.springframework.test.context.jdbc.SqlConfig;\nimport org.springframework.test.context.jdbc.SqlGroup;\n\
    ...\n@RunWith(SpringJUnit4ClassRunner.class)\n@ContextConfiguration(classes =\
    \ {TestDataConfig.class, AppConfig.class})\n@ActiveProfiles(\"dev\")\npublic class\
    \ UserServiceTest {\n@Test\n@Sql(value =\"classpath:db/extra-data.sql\",\nconfig\
    \ = @SqlConfig(encoding = \"utf-8\", separator = \";\", commentPrefix = \"--\"\
    ))\n@Sql(\nscripts = \"classpath:db/delete-test-data.sql\",\nconfig = @SqlConfig(transactionMode\
    \ = SqlConfig.TransactionMode.ISOLATED),\nexecutionPhase = Sql.ExecutionPhase.AFTER_TEST_METHOD\n\
    )\npublic void testCount(){\nint count = userService.countUsers();\nassertEquals(8,\
    \ count);\n}\n```\n\nAlthough the syntax is quite obvious, just in case extra\
    \ clarifications\nare necessary, here they are:\n\n*   the first `@Sql`\n    annotation\
    \ specifies a script to be executed to save some data into the\n    test database\
    \ before executing the test method. The `@SqlConfig` is used to\n    declare specific\
    \ SQL syntax details, so Spring can execute the `extra-data.sql` script\n    correctly.\n\
    \n*   The second `Sql`\n    annotation is used to execute the script that will\
    \ clean the test\n    database after the test execution. The attribute that specifies\
    \ when the\n    script is executed is `executionPhase`, and\n    in this case,\
    \ the value used to tell Spring to execute the script after\n    the test method\
    \ is `Sql.ExecutionPhase.AFTER_TEST_METHOD`."
  trans: "\n3.  `READ_COMMITTED`:\n        当事务使用此隔离级别时，无法进行脏读。这是大多数数据库的默认策略。但这里可能发生另一种现象：不可重复读：当多次执行同一查询时，可能会得到不同的结果。\n\
    \        （示例：在同一事务中重复提取一个用户。与此同时，另一个不同的事务修改了该用户并提交。如果第一个事务使用此隔离级别，则在第二个事务提交后，它将返回具有新属性的用户。）\n\
    \n4.  `REPEATABLE_READ`: 此\n        隔离级别不允许脏读，并且在同一个事务中重复查询某一行数据时，始终会返回相同的结果，即使在读取过程中另一个不同的事务更改了数据。在事务上下文中多次读取同一行并始终获得相同结果的过程称为可重复读。\n\
    \n5.  `SERIALIZABLE`:\n        这是限制最严格的隔离级别，因为事务是以序列化方式执行的。因此，不可能出现脏读、不可重复读和幻读。幻读发生在事务过程中，执行相同的查询可能导致返回不同的结果集。\n\
    \n5.  `timeout`。默认情况下，此属性的值由事务管理器提供者定义，但可以通过在注解中设置不同的值来更改：`@Transactional(timeout=3600)`。\n\
    \        该值表示事务被视为失败之前的毫秒数，默认值为 –1，表示不支持超时。\n\n6.  `rollbackFor`\n        属性的值应为一个或多个异常类，即\
    \ `Throwable` 的子类。\n        当在事务性方法执行期间抛出此类异常时，事务将回滚。默认情况下，仅当抛出 `RuntimeException`\
    \ 时才会回滚事务。使用此属性，也可以为受检异常触发回滚。\n\n在下面的代码片段中，`MailSendingException`\n    是一个受检异常，当无法通过电子邮件发送用户修改成功的通知时抛出。基本思路是：主要操作已成功执行，用户数据已更新。因为无法发送通知而回滚更改是没有意义的。\n\
    \n```\n    @Transactional(rollbackFor = MailSendingException.class)\n    public\
    \ int updatePassword(Long userId, String newPass)\n    throws MailSendingException\
    \ {\n    User u = userRepo.findById(userId);\n    String email = u.getEmail();\n\
    \    sendEmail(email);\n    return userRepo.updatePassword(userId, newPass);\n\
    \    }\n    private void sendEmail(String email)\n    throws MailSendingException\
    \ {\n    ... // 此处代码不相关\n    }\n    ```\n\n7.  `noRollbackFor`\n        属性的值应为一个或多个异常类，即\
    \ `Throwable` 的子类。\n        当在事务性方法执行期间抛出此类异常时，事务不会回滚。默认情况下，仅当抛出 `RuntimeException`\
    \ 时才会回滚事务。使用此属性，也可以避免因 `RuntimeException` 而回滚事务。\n\n`@Transactional`\n注解也可以在类级别使用。在这种情况下，类中的所有方法都成为事务性方法，并且为事务定义的所有属性都继承自\
    \ `@Transactional` 类级别定义，但可以通过方法级别定义的 `@Transactional` 进行覆盖。\n\n```\n@Service\n\
    @Transactional(readOnly = true,\npropagation = Propagation.REQUIRED)\npublic class\
    \ UserServiceImpl implements UserService {\n...\n@Transactional(propagation =\
    \ Propagation.REQUIRES_NEW)\n@Override\npublic User findById(Long id) {\nreturn\
    \ userRepo.findById(id);\n}\n@Transactional(propagation = Propagation.SUPPORTS)\n\
    @Override\npublic void htmlAllByNameAll(String name){\nuserRepo.htmlAllByName(name);\n\
    }\n}\n```\n\n`@Transactional`\n也可以用于抽象类和接口。这会导致所有实现方法继承父类/接口上注解定义的事务行为，但这并非推荐做法。\n\
    \n测试事务性方法\n\n对于涉及数据源操作的测试用例，Spring 4.1 在 `org.springframework.test.context.jdbc`\n\
    包中添加了一些实用的注解：\n\n*   `@Sql`\n    注解可用于指定在集成测试期间针对给定数据库执行的 SQL 脚本。它可用于类和方法。当要执行的\
    \ SQL 文件具有不同的语法、错误处理规则或不同的执行阶段时，可以多次使用它。本节特定的测试是集成测试，因为它们测试服务与存储库之间的通信。因此，它们非常适合引入此注解。\n\
    \n*   `@SqlGroup`\n    注解可用于类和方法，以将 `@Sql` 注解分组。它可以用作元注解来创建自定义的组合注解。例如，当涉及多个数据源时，它可以与\
    \ `@SqlConfig` 一起使用，对要执行的脚本进行分组，以便为涉及两个数据源的单个测试用例准备测试环境：\n\n```\n    @SqlGroup({\n\
    \    @Sql(scripts = \"script1.sql\", config = @SqlConfig(dataSource = \"dataSource1\"\
    )),\n    @Sql(scripts = \"script2.sql\", config = @SqlConfig(dataSource = \"dataSource2\"\
    ))\n    })\n    ```\n\n*   `@SqlConfig`\n    用于指定 SQL 脚本的配置。\n\n在下面的代码片段中，您可以看到如何使用这些注解来测试您的服务类。第一个示例使用了多个\
    \ `@Sql` 注解；第二个示例使用 `@SqlGroup` 对它们进行分组。可以通过运行 `06-ps-tx-practice` 项目中的 `UserServiceTest.testCount()`\
    \ 方法来测试该示例。\n\n```\nimport org.springframework.test.context.jdbc.Sql;\nimport\
    \ org.springframework.test.context.jdbc.SqlConfig;\nimport org.springframework.test.context.jdbc.SqlGroup;\n\
    ...\n@RunWith(SpringJUnit4ClassRunner.class)\n@ContextConfiguration(classes =\
    \ {TestDataConfig.class, AppConfig.class})\n@ActiveProfiles(\"dev\")\npublic class\
    \ UserServiceTest {\n@Test\n@Sql(value =\"classpath:db/extra-data.sql\",\nconfig\
    \ = @SqlConfig(encoding = \"utf-8\", separator = \";\", commentPrefix = \"--\"\
    ))\n@Sql(\nscripts = \"classpath:db/delete-test-data.sql\",\nconfig = @SqlConfig(transactionMode\
    \ = SqlConfig.TransactionMode.ISOLATED),\nexecutionPhase = Sql.ExecutionPhase.AFTER_TEST_METHOD\n\
    )\npublic void testCount(){\nint count = userService.countUsers();\nassertEquals(8,\
    \ count);\n}\n```\n\n尽管语法相当明显，但以防万一需要额外说明，现解释如下：\n\n*   第一个 `@Sql`\n    注解指定了一个脚本，该脚本将在执行测试方法之前执行，以将一些数据保存到测试数据库中。`@SqlConfig`\
    \ 用于声明特定的 SQL 语法细节，以便 Spring 能够正确执行 `extra-data.sql` 脚本。\n\n*   第二个 `Sql`\n  \
    \  注解用于执行将在测试执行后清理测试数据库的脚本。指定脚本执行时间的属性是 `executionPhase`，在此例中，用于告诉 Spring 在测试方法之后执行脚本的值是\
    \ `Sql.ExecutionPhase.AFTER_TEST_METHOD`。\n"
- fmt: '`@SqlConfig`注解非常强大，它提供了用于声明隔离级别（`transactionMode = SqlConfig.TransactionMode.ISOLATED`）和要使用的事务管理器（`transactionManager`）的属性。


    ```

    (transactionManager="txMng")

    ```


    以下示例与上述示例行为相同，但出于教学目的，两个`@Sql`注解已使用`@SqlGroup`组合在一起。


    ```

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {TestDataConfig.class, AppConfig.class})

    @ActiveProfiles("dev")

    public class UserServiceTest {

    // @SqlGroup version

    @Test

    @SqlGroup({

    @Sql(value = "classpath:db/extra-data.sql",

    config = @SqlConfig(encoding = "utf-8", separator = ";", commentPrefix = "--")),

    @Sql(

    scripts = "classpath:db/delete-test-data.sql",

    config = @SqlConfig(transactionMode = SqlConfig.TransactionMode.ISOLATED),

    executionPhase = Sql.ExecutionPhase.AFTER_TEST_METHOD

    )

    })

    public void testCount() {

    int count = userService.countUsers();

    assertEquals(8, count);

    }

    }

    ```


    `@Sql`注解还有更多属性，但有一个你一定会觉得特别有用：`statements`属性。该属性允许你提供一条在测试方法执行前执行的语句。


    ```

    @Test

    @Sql(statements = {"drop table NEW_P_USER if exists;"})

    public void testCreateTable(){

    int result = userRepo.createTable("new_p_user");

    // table exists but is empty

    assertEquals(0, result);

    }

    ```


    仓库方法可以在事务上下文中进行测试，与服务方法解耦。这在测试数据库必须不受测试执行影响时非常有用。`@Transactional`注解可用于测试方法并进行适当配置，而`@Rollback`注解可用于实现这一特定目的：保持测试数据库不变。


    ```

    import org.springframework.test.annotation.Rollback;

    ...

    RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {TestDataConfig.class, AppConfig.class})

    @ActiveProfiles("dev")

    public class TransactionalJdbcRepoTest {

    @Transactional

    @Test

    public void testFindById() {

    User user = userRepo.findById(1L);

    assertEquals("John", user.getUsername());

    }

    @Test

    @Transactional @Rollback(false)

    public void testCreate(){

    int result = userRepo.createUser

    (5L, "Diana", "mypass", "diana@opympus.com", UserType.BOTH);

    assertEquals(1, result);

    Set dianas = userRepo.findAllByUserName("Diana", true);

    assertTrue(dianas.size() == 1);

    }

    }

    ```


    `@Rollback`注解可用于指定在测试方法执行后不应执行回滚，通过使用其默认属性：`@Rollback(false)`。这等同于Spring 4.2中引入的另一个注解：`@Commit`。你可能想象得到，你可以使用其中一个来实现此目的，但不应同时使用它们，除非你真的想混淆Spring容器。结果将是不可预测的。这两个注解也可以在类级别使用，并且类级别的注解配置可以被方法级别的注解配置覆盖。


    在Spring 4.0之前，`@TransactionConfiguration`可用于测试类，用于定义测试的事务上下文。它在Spring 4.0中已被弃用，取而代之的是引入了配置文件和`@EnableTransactionManagement`。但如果你对示例感兴趣，请看这里：


    ```

    import org.springframework.test.context.transaction.TransactionConfiguration;

    ...

    @TransactionConfiguration(defaultRollback = false,

    transactionManager = "txManager")

    @Transactional

    public class TransactionalJdbcRepoTest {

    @Test

    public void testFindById() {

    User user = userRepo.findById(1L);

    assertEquals("John", user.getUsername());

    }

    ...

    }

    ```


    `defaultRollback`属性的默认值是`true`，在上一个示例中将其设置为`false`只是为了介绍这个属性。


    另一个有用的测试注解是`@BeforeTransaction`，它可以在执行事务性测试方法之前用于设置或检查测试环境。`@Before`注解的方法在事务上下文中执行。以下代码片段中的方法检查测试数据库是否在事务上下文之外正确初始化。


    ```

    import org.springframework.test.context.transaction.BeforeTransaction;

    ...

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {TestDataConfig.class, AppConfig.class})

    @ActiveProfiles("dev")

    public class UserServiceTest {

    ...

    @BeforeTransaction

    public void checkDbInit(){

    int count = userService.countUsers();

    assertEquals(4, count);

    }

    }

    ```


    ## 使第三方组件具有事务性


    对于无法使用注解配置事务执行的情况（例如使用Java 1.5之前的版本，或者服务是无法更改的第三方实现），可以通过使用XML声明AOP和`tx`配置元素的组合来实现Spring事务管理配置。


    !


    如果你想测试自己对Spring事务管理的理解，现在可以打开`06-ps-tx-practice`项目并尝试完成TODO。有五个任务需要你解决，编号从31到35。缺失的部分用TODO任务标记，并在Intellij
    IDEA的TODO视图中可见。


    任务TODO 31位于`TestDataConfig`类中，要求你定义一个用于管理事务的事务管理器Bean。


    任务TODO 32位于`AppConfig`类中，要求你启用声明式事务。


    任务TODO 33位于`UserServiceImpl`中，要求你使所有方法都具有事务性。


    任务TODO 34位于`UserServiceImpl`类中，要求你完成`updatePassword(...)`方法的事务定义，使事务可写，并为该方法抛出的受检异常执行回滚。


    任务TODO 35位于测试类`UserServiceTest`中，要求你完成测试`userService.updatePassword(...)`方法的方法体。


    如果你遇到困难，可以查看`06-ps-tx-solution`项目中提供的解决方案。


    ## Spring声明式模型说明


    关于当存在服务层且服务类/方法已经使用`@Transactional`注解时，是否应该在仓库类/方法上使用`@Transactional`，互联网上（大部分发生在StackOverflow[^(12)](#A978-1-4842-0811-3_5_Chapter.html#Fn12)）目前存在激烈的争论。为了解决这个争论，我们必须考虑Spring中声明式事务是如何实现的。在“第9节：Spring中的事务管理如何工作”的开头已经提到，AOP用于为Bean装饰事务行为。这意味着当我们使用`@Transactional`注解类或方法时，将创建一个代理Bean来提供事务行为，并将其包裹在原始Bean周围。


    在不使用服务层的应用程序中，为了确保与数据库交互时的事务行为，仓库类/方法必须使用`@Transactional`注解。这将告诉Spring为仓库类创建事务代理。此场景的抽象UML图如图[5-11](#A978-1-4842-0811-3_5_Chapter.html#Fig11)所示，目标对象是仓库Bean。当添加服务层和服务类时，有两种可能性：我们为新的服务类添加`@Transactional`注解并从仓库中移除该注解，或者我们为服务类添加注解并同时在仓库类上保留`@Transactional`。让我们详细分析每种情况。'
  raw: 'The `@SqlConfig`

    annotation is quite powerful and provides attributes to declare

    isolation level `(transactionMode = SqlConfig.TransactionMode.ISOLATED)` and a
    transactionManager to

    be used.


    ```

    (transactionManager="txMng")

    ```


    The following example has the same behavior as the one above, but for

    teaching purposes, the two `Sql` annotations have

    been composed using `@SqlGroup`.


    ```

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {TestDataConfig.class, AppConfig.class})

    @ActiveProfiles("dev")

    public class UserServiceTest {

    // @SqlGroup version

    @Test

    @SqlGroup({

    @Sql(value = "classpath:db/extra-data.sql",

    config = @SqlConfig(encoding = "utf-8", separator = ";", commentPrefix = "--")),

    @Sql(

    scripts = "classpath:db/delete-test-data.sql",

    config = @SqlConfig(transactionMode = SqlConfig.TransactionMode.ISOLATED),

    executionPhase = Sql.ExecutionPhase.AFTER_TEST_METHOD

    )

    })

    public void testCount() {

    int count = userService.countUsers();

    assertEquals(8, count);

    }

    }

    ```


    The `@Sql`

    annotation has more attributes, but there is one in particular that you

    will definitely find useful: the `statements` attribute.

    This attribute allows you to provide a statement to be executed before

    the test method.


    ```

    @Test

    @Sql(statements = {"drop table NEW_P_USER if exists;"})

    public void testCreateTable(){

    int result = userRepo.createTable("new_p_user");

    // table exists but is empty

    assertEquals(0, result);

    }

    ```


    Repository methods can be tested in a transactional context, decoupled

    from the service methods. This is useful when the test database must be

    left unaffected by a test execution. The `@Transactiona`

    annotation can be used on the test method and configured appropriately,

    and the `@Rollback` annotation

    can be used to fulfill this specific purpose: leave a test database

    unchanged.


    ```

    import org.springframework.test.annotation.Rollback;

    ...

    RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {TestDataConfig.class, AppConfig.class})

    @ActiveProfiles("dev")

    public class TransactionalJdbcRepoTest {

    @Transactional

    @Test

    public void testFindById() {

    User user = userRepo.findById(1L);

    assertEquals("John", user.getUsername());

    }

    @Test

    @Transactional @Rollback(false)

    public void testCreate(){

    int result = userRepo.createUser

    (5L, "Diana", "mypass", "diana@opympus.com", UserType.BOTH);

    assertEquals(1, result);

    Set dianas = userRepo.findAllByUserName("Diana", true);

    assertTrue(dianas.size() == 1);

    }

    }

    ```


    The `@Rollback`

    annotation can be used to specify that no rollback should be performed

    after a test method execution, by making use of its default attribute:

    `@Rollback(false)`.

    This is equivalent to another annotation introduced in Spring 4.2: `@Commit`.
    As you can

    probably imagine, you can use one or the other for this purpose, but you

    should not use them together unless you really want to confuse the

    Spring Container. The results will thus be unpredictable. Both

    annotations can be used at the class level too, and class level

    annotation configuration can be overridden by method level annotation

    configurations.


    Before Spring 4.0, the `@TransactionConfiguration`

    could be used on a test class used to define the transactional context

    for tests. It became deprecated in Spring 4.0, with the introduction of

    profiles and `@EnableTransactionManagement`.

    But in case you are interested in an example, here it is:


    ```

    import org.springframework.test.context.transaction.TransactionConfiguration;

    ...

    @TransactionConfiguration(defaultRollback = false,

    transactionManager = "txManager")

    @Transactional

    public class TransactionalJdbcRepoTest {

    @Test

    public void testFindById() {

    User user = userRepo.findById(1L);

    assertEquals("John", user.getUsername());

    }

    ...

    }

    ```


    The default value for the `defaultRollback`

    attribute is `true`, and it was set

    to `false` in the

    previous example just to introduce this attribute.


    Another useful test annotation is `@BeforeTransaction` ,

    which can be used to set up or check a test environment before executing

    the transactional test method. The `@Before` annotated

    method is executed in the context of the transaction. The method in the

    following code snippet checks that the test database was initialized

    properly outside of a transaction context.


    ```

    import org.springframework.test.context.transaction.BeforeTransaction;

    ...

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {TestDataConfig.class, AppConfig.class})

    @ActiveProfiles("dev")

    public class UserServiceTest {

    ...

    @BeforeTransaction

    public void checkDbInit(){

    int count = userService.countUsers();

    assertEquals(4, count);

    }

    }

    ```


    Making Third-Party Components Transactional


    For situations in which annotations cannot be used to configure

    transactional execution, this being the case when a version earlier than

    Java 1.5 is used or the service is a third-party implementation that

    cannot be changed, the Spring transaction management configuration can

    be achieved using XML to declare a combination of AOP and `tx` configuration

    elements.


    !


    If you want to test your understanding of Spring transaction management,

    you can open now the `06-ps-tx-practice`

    project and try to complete the TODOs. There are five tasks for you to

    solve, numbered from 31 to 35\. The parts missing are marked with a TODO

    task and are visible in Intellij IDEA in the TODO view.


    Task TODO 31, located in the `TestDataConfig` class,

    requires you to define a transaction manager bean to be used to mange

    transactions.


    Task TODO 32, located in the `AppConfig` class,

    requires you to enable use of declarative transactions.


    Task TODO 33, located in `UserServiceImpl`,

    requires you to make all the methods transactional.


    Task TODO 34, located in class `UserServiceImpl`,

    requires you to complete the transaction definition of the `updatePassword(...)`

    method, to make the transaction writable, and to roll back for the

    checked exception thrown by the method.


    Task TODO 35, located in test class `UserServiceTest`,

    requires you to complete the body of the method testing the `userService.updatePassword(...)`

    method.


    If you have trouble, you can take a peek at the proposed solution in the

    `06-ps-tx-solution`

    project.


    ! Spring Declarative Model Clarification


    There is heated argument on the Internet (most of it happening on

    StackOverflow[^(12)](#A978-1-4842-0811-3_5_Chapter.html#Fn12))

    right now regarding wether `@Transactional` should

    be used on repository classes/methods when there is a service layer

    involved and service classes/methods are already annotated with `@Tranactional`.
    In

    order to settle this debate, we have to consider how declarative

    transactions are implemented in Spring. It was already mentioned at the

    beginning of Section 9, How Transaction

    Management Works in Spring, that AOP is used to decorate beans

    with transactional behavior. This means that when we annotate classes or

    methods with `@Transactional`, a

    proxy bean will be created to provide the transactional behavior, and it

    is wrapped around the original bean.


    In an application that does not use a service layer, to ensure

    transactional behavior when interacting with the database, the

    repository classes/ methods must be annotated with `@Transactional`. This

    will tell Spring to create transactional proxies for the repository

    classes. The abstract UML diagram for this scenario is depicted in

    Figure [5-11](#A978-1-4842-0811-3_5_Chapter.html#Fig11), and the

    target object is the repository bean. When a service layer and service

    classes are added, there are two possibilities: we annotate the new

    service classes with `@Transactional` and

    remove the annotation from the repository, or we annotate the service

    classes and keep `@Transactional` on the

    repository classes as well. Let’s analyze each of these cases in detail.'
