    ${user.userType}\n${user.rating}\n```\n\nThe JSP pages are usually developed using\
    \ taglibs that extend the collection of JSP elements that can be used in a page\
    \ and provide a simpler syntax. The Spring taglib declared in the JSP code snippet\
    \ is used to extract the text for the table headers according to the locale of\
    \ the application. For example, when creating the view to be displayed to the\
    \ end user, the `<spring:message code=\"label.User.firstname\"/>` will be transformed\
    \ in Firstname if the locale is English and into Vorname if the locale is German.\n\
    \n# @MVC\n\nIn Spring 3.0, the @MVC introduced a new configuration model. The\
    \ main component of an MVC XML configuration is the `<mvc:annotation-driven/>`\
    \ element, which registers all necessary default infrastructure beans for a web\
    \ application to work: handler mapping, validation, conversion beans, and many\
    \ others.\n\nAnother component that is important is the `<mvc:default-servlet-handler/>`.\
    \ Usually in Spring Web applications, the default servlet mapping \"/\" is mapped\
    \ to the `DispatcherServlet`. This means that static resources will have to be\
    \ served by it too, which might introduce a certain lag in providing a response,\
    \ since the `DispatcherServlet` has to find the resources to which the request\
    \ url is mapped. Think about it like this: a request comes to the `DispatcherServlet`.\
    \ The default behavior of `DispatcherServlet` is to start looking for a controller\
    \ to handle this request. And when it does not find one, it assumes that this\
    \ is a request for a static resource and then asks the static resources handler\
    \ whether it can handle the request. By declaring `<mvc:default-servlet-handler/>`,\
    \ a handler for static resources is defined with the lowest precedence, and this\
    \ handler will be asked first whether it can handle the request.\n\nTechnically,\
    \ the `<mvc:default-servlet-handler/>` configures a `DefaultServletHttpRequestHandler`\
    \ with a URL mapping of \"/*\" and the lowest priority relative to all others\
    \ URL mappings, and its sole responsibility is to serve static resources.\n\n\
    To use the @MVC elements, the mvc namespace must be specified:\n\nThere are many\
    \ out of the box features that can be used with the @MVC model, but they are out\
    \ of the scope of this book. If you are interested in knowing more, there is a\
    \ good Apress book covering Spring Web: The Pivotal Certified Spring Web Application\
    \ Developer Exam Study Guide.\n\n# Java Configuration for Spring MVC\n\nIn Spring\
    \ 3.1, the `@EnableWebMvc` annotation was introduced. This annotation, when used\
    \ on a configuration class, is the equivalent of `<mvc:annotation-driven/>`. Of\
    \ course, there are a few extra details to take care of to make sure that the\
    \ configuration works as expected, and they will all be covered in this section.\n\
    \nThe fist step is transforming the `mvc-config.xml` into a configuration class.\
    \ Each bean definition, each scanning element must have a correspondence in the\
    \ web configuration class. The configuration class has to be annotated with the\
    \ `@Configuration` and `@EnableWebMvc` annotation and has either to implement\
    \ `WebMvcConfigurer` or extend an implementation of this interface, for example\
    \ `WebMvcConfigurerAdapter`, which gives the developer the option to override\
    \ only the methods he or she is interested in. Annotating a configuration class\
    \ with `@EnableWebMvc` has the result of importing the Spring MVC configuration\
    \ implemented in the `WebMvcConfigurationSupport` class and is equivalent to `<mvc:annotation-driven/>`.\
    \ This class registers many infrastructure Spring components necessary for a web\
    \ application, and only a part of them will be covered in this section, since\
    \ the this topic is not fully needed for the Spring Core certification exam.\n\
    \nTo tell the `DispatcherServlet` that the configuration will be provided by a\
    \ configuration class instead of a file, the following changes have to be made\
    \ in `web.xml`:\n\n*   An initialization parameter named `contextClass` having\
    \ as value the full class name of the Spring class used to create an annotation-based\
    \ context is defined.\n*   The initialization parameter named `contextConfigLocation`\
    \ will have as value the full class name of the configuration class written by\
    \ the developer.\n\n```\npet-dispatcher\norg.springframework.web.servlet.DispatcherServlet\n\
    contextClass\norg.springframework.web.context.support.AnnotationConfigWebApplicationContext\n\
    contextConfigLocation\ncom.ps.config.WebConfig\n```\n\nThe configuration class\
    \ for what was configured with XML in the previous section looks like this:"
