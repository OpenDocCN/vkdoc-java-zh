    Although the log is incomplete, all the important details were underlined, and
    by following them we can notice some of the following steps. To make it easier,
    the corresponding steps were marked in the log with the corresponding step number.


    1. The application context is initialized.

    2. The bean definitions are loaded (from the `spring/test-db01-config.xml` in
    this case).

    3. The bean definitions are processed (in our case a bean of type `PropertyPlaceholderConfigurer`
    is created and used to read the properties from `datasource.properties`, which
    are then added to the `dataSource` bean definition).

    4. Beans are instantiated.

    5. Dependencies are injected (not visible from the log, since the `dataSource`
    bean does not require any dependencies).

    6. Beans are processed (also not visible from the log, since the `dataSource`
    does not have any processing defined).

    7. Beans are used.

    8. The context starts the destruction process.

    9. Beans are destroyed.


