    \n5.  如果在 Gradle 中配置了`war`插件，并且我们希望生成一个可部署在任何应用服务器上的 Web 归档文件，则需要将嵌入式容器依赖项标记为`provided`。由于项目不包含`web.xml`文件，因此必须定义一个继承`SpringBootServletInitializer`的类，并重写其`configure`方法。`SpringBootServletInitializer`类是一个特定于\
    \ Boot 的类，它实现了`WebApplicationInitializer`，这是从传统 WAR 部署运行 Spring 应用程序所必需的。开发者必须重写`configure()`方法，并提供配置\
    \ Spring 应用程序所需的类，即使用`@SpringBootApplication`注解的类。这将利用 Spring Framework 的 Servlet\
    \ 3.0 支持，并且当应用程序由 Servlet 容器运行时，它将被配置。最佳实践是让使用`@SpringBootApplication`注解的类继承此类。\n\
    \n```\n//Application.java\nimport org.springframework.boot.web.support.SpringBootServletInitializer;\n\
    import org.springframework.boot.builder.SpringApplicationBuilder;\n...\n@RestController\n\
    @SpringBootApplication(scanBasePackages = {\"com.ps.start\"})\npublic class Application\
    \ extends SpringBootServletInitializer {\n    @Override\n    protected SpringApplicationBuilder\
    \ configure(SpringApplicationBuilder application) {\n        return application.sources(Application.class);\n\
    \    }\n    public static void main(String... args) {\n        SpringApplication.run(Application.class,\
    \ args);\n        System.out.println(\"Started ...\");\n    }\n    ...//etc\n\
    }\n```\n\n在这种情况下，当运行`gradle clean war`时生成的 Web 归档文件必须部署在应用服务器上，当服务器启动时，应用程序将在`http://localhost:8080/ps-boot/`可访问。\n\
    \n当您使用 Gradle 任务`bootRun`“原地”运行应用程序时，能够在不重启应用程序的情况下重新加载静态资源（位于`/src/main/resources`下）会很有用。这可以通过自定义`bootRun`任务来实现，使其使用`resources`目录的有效内容，而不是编译处理后的内容。\n\
    \n```\n//11-ps-boot-sample/11-ps-boot-sample.gradle\nbootRun{\n    addResources\
    \ = true\n}\n```\n\n为了使 Spring Boot 能够支持这一点，必须将另一个特定于 Boot 的库添加到类路径中：`spring-boot-devtools`。在我们的项目设置中，我们需要将此库添加到`pet-sitter/build.gradle`下的父配置文件中：\n\
    \n```\n//pet-sitter/build.gradle\nallprojects {\n    boot = [\n        ... //\
    \ other starter libs declarations\n        starterWeb      : \"org.springframework.boot:spring-boot-starter-web:$springBootVersion\"\
    ,\n        devtools        : \"org.springframework.boot:spring-boot-devtools:$springBootVersion\"\
    \n    ]\n    ... // other configuration elements\n}\n```\n\n然后，必须更新模块配置文件`11-ps-boot-sample/11-ps-boot-sample.gradle`，将其添加为编译依赖项：\n\
    \n```\n//11-ps-boot-sample/11-ps-boot-sample.gradle\napply plugin: 'spring-boot'\n\
    dependencies {\n    compile boot.starterWeb, boot.devtools, misc.jstl, misc.servlet\n\
    \    testCompile boot.starterTest\n}\nwar {\n    baseName = 'ps-boot'\n}\n...\
    \ // other configuration elements\n```\n\n## 使用 YAML 进行配置\n\nYAML 是 JSON 的超集，具有非常方便的语法，可以以分层格式存储外部属性。`application.properties`只包含两个属性，但对于大型生产应用程序，该文件可能会变得相当复杂，因此能够按用途对属性进行分组并创建层次结构非常有用。此类文件的一个示例如下：\n\
    \n```\nspring:\n  app:\n    name: ps-boot\n  datasource:\n    driverClassName:\
    \ org.h2.Driver\n    url: jdbc:h2:sample;DB_CLOSE_ON_EXIT=TRUE\n    username:\
    \ sample\n    password: sample\nserver:\n  port: 9000\n  context: /ps-boot\n```\n\
    \n要使用 YAML，必须将`application.properties`替换为`application.yml`文件（此文件可能的位置与`application.properties`相同），并将`snakeyaml`依赖项添加到项目中。YAML\
    \ 文件会被转换为`Java Map<String,Object>`，Spring Boot 会将该映射展平为单层深度，并使用句点分隔的键。因此，与前面描述的`application.yml`相对应的`application.properties`如下所示：\n\
    \n```\nspring.app.name: ps-boot\nspring.datasource.driverClassName: org.h2.Driver\n\
    spring.datasource.url: jdbc:h2:sample;DB_CLOSE_ON_EXIT=TRUE\nspring.datasource.username:\
    \ sample\nspring.datasource.password: sample\nserver.port: 9000\nserver.context:\
    \ /ps-boot\n```\n\n要使用 YAML 配置前面的应用程序，我们不必添加`snakeyaml`依赖项，因为它是 Spring Boot Web\
    \ Starter 的传递依赖项。因此，唯一需要做的是：\n\n1.  将`application.properties`转换为`application.yml`\n\
    \n```\n    app:\n      port: 8084\n      context: /ps-boot\n      sessionTimeout:\
    \ 10\n```\n\n2.  创建一个类来加载和持有 YAML 值，并且为了增加趣味性，该类应该能够处理外部配置文件。这可以使用 Spring Boot\
    \ 专门的注解`@ConfigurationProperties`来完成。此注解还提供了验证外部属性并为属性定义前缀的可能性。因此，如果有多个前缀，则可以定义多个类。Spring\
    \ Boot 使用名称前缀来标识哪些属性可以绑定到配置对象，并将其定义为`@ConfigurationProperties`注解的`prefix`属性的值。\n\
    \n```\n    import org.springframework.boot.context.properties.ConfigurationProperties;\n\
    \    import javax.annotation.PostConstruct;\n    import javax.validation.constraints.NotNull;\n\
    \n    @ConfigurationProperties(prefix=\"app\")\n    public class AppSettings {\n\
    \        private static Logger logger = LoggerFactory.getLogger(AppSettings.class);\n\
    \n        @NotNull\n        private Integer port;\n        @NotNull\n        private\
    \ String context;\n        @NotNull\n        private Integer sessionTimeout;\n\
    \n        public AppSettings() {\n        }\n\n        @PostConstruct\n      \
    \  public void check() {\n            logger.info(\"Initialized {} {}\", port,\
    \ context);\n        }\n        ...//getters & setters\n    }\n```\n\n! 尽管前面的代码片段中没有包含\
    \ setter 和 getter，但它们是必需的，因为 Spring Boot 使用 setter 来填充`AppSettings` bean 的属性，而\
    \ getter 用于访问这些值以便使用。\n\n3.  通过使用`@EnableConfigurationProperties`注解配置类并为其指定配置\
    \ bean 类作为参数，来启用对使用`@ConfigurationProperties`注解的 bean 的支持。\n\n```\n    import\
    \ org.springframework.boot.context.properties.EnableConfigurationProperties;\n\
    \    ...\n    @RestController\n    @SpringBootApplication(scanBasePackages = {\"\
    com.ps.start\"})\n    @EnableConfigurationProperties(AppSettings.class)\n    public\
    \ class Application extends SpringBootServletInitializer {\n        ...\n    }\n\
    ```\n\n如果未使用此注解，则`AppSettings`类可以使用`@Configuration`注解，Spring Boot 将正确创建 bean 并从文件加载值。当使用多个配置类时，这种方法很实用。\n\
    \n4.  通过将属性值注入到需要的地方来使用它们。在这种情况下，需要将这些值注入到实现`EmbeddedServletContainerFactory`的类中。"
  raw: "When this configuration snippet is present in the Gradle configuration\n \
    \   file for a module, executing `gradle clean war` will\n    create an executable\
    \ artifact named `ps-boot.war` and save\n    it under `11-ps-boot-sample/build/libs`.\n\
    \n5.  If the `war`\n    plugin is configured in Gradle and we want to produce\
    \ a deployable web\n    archive that can be deployed on any application server,\
    \ the embedded\n    container dependencies need to be marked as provided. Since\
    \ the project\n    does not contain a `web.xml` file, it is\n    mandatory to\
    \ define a class extending `SpringBootServletInitializer`\n    and override its\
    \ `configure` method. The\n    `SpringBootServletInitializer`\n    class is a\
    \ Boot-specific class implementing `WebApplicationInitializer`,\n    which is\
    \ needed to run a Spring application from a traditional WAR\n    deployment. The\
    \ developer must override the `configure()` method\n    and provide the class\
    \ needed to configure the Spring application, whence\n    the class annotated\
    \ with `@SpringBootApplication`.\n    This will use Spring Framework’s Servlet\
    \ 3.0 support, and the\n    application will be configured when it is run by the\
    \ servlet container.\n    The preferred practice is to make the class annotated\
    \ with `@SpringBootApplication`\n    extend this class.\n\n```\n    //Application.java\n\
    \    import org.springframework.boot.web.support.SpringBootServletInitializer;\n\
    \    import org.springframework.boot.builder.SpringApplicationBuilder;\n    ...\n\
    \    @RestController\n    @SpringBootApplication(scanBasePackages = {\"com.ps.start\"\
    })\n    public class Application extends SpringBootServletInitializer {\n    @Override\n\
    \    protected SpringApplicationBuilder configure\n    (SpringApplicationBuilder\
    \ application) {\n    return application.sources(Application.class);\n    }\n\
    \    public static void main(String... args) {\n    SpringApplication.run(Application.class,\
    \ args);\n    System.out.println(\"Started ...\");\n    }\n    ...//etc\n    }\n\
    \    ```\n\nThe web archive resulting in this case when `gradle clean war` is\n\
    \    run must be deployed on an application server, and when the server\n    starts,\
    \ the application will be accessible at `http://localhost:8080/ps-boot/``.`\n\n\
    When you run the application \"in place\" using the Gradle task bootRun,\nit would\
    \ be useful to have the static resources (those under `/src/main/resources`)\n\
    reloaded while the application is running, so development can take place\nwithout\
    \ restarting the application. This can be done by customizing the\n`bootRun` task\
    \ to\nuse the effective contents of the `resources` directory\ninstead of the\
    \ compiled, processed ones.\n\n```\n//11-ps-boot-sample/11-ps-boot-sample.gradle\n\
    bootRun{\naddResources = true\n}\n```\n\nFor Spring Boot to be able to support\
    \ this, another Boot-specific\nlibrary must be added to the classpath: `spring-boot-devtools`.\n\
    In our project setup, we need to add the library to the parent\nconfiguration\
    \ file under `pet-sitter/build.gradle`:\n\n```\n//pet-sitter/build.gradle\nallprojects\
    \ {\nboot = [\n... // other starter libs declarations\nstarterWeb      :\norg.springframework.boot:spring-boot-starter-web:$springBootVersion\"\
    ,\ndevtools        :\n\"org.springframework.boot:spring-boot-devtools:$springBootVersion\"\
    \n]\n... // other configuration elements\n}\n```\n\nThen the module configuration\
    \ file `11-ps-boot-sample/11-ps-boot-sample.gradle`\nmust be updated to add it\
    \ as a compile dependency:\n\n```\n//11-ps-boot-sample/11-ps-boot-sample.gradle\n\
    apply plugin: ’spring-boot’\ndependencies {\ncompile boot.starterWeb, boot.devtools,\
    \ misc.jstl, misc.servlet\ntestCompile boot.starterTest\n}\nwar {\nbaseName =\
    \ ’ps-boot’\n}\n... // other configuration elements\n```\n\nConfiguration Using\
    \ YAML\n\nYAML is a superset of JSON and has a very convenient syntax for storing\n\
    external properties in a hierarchical format. The `application.properties`\ncontains\
    \ only two properties, but for big production applications, that\nfile can become\
    \ quite complex, so it is useful to be able to group\nproperties by their purposes\
    \ and create hierarchies. An example of such\na file:\n\n```\nspring:\napp:\n\
    name: ps-boot\ndatasource:\ndriverClassName:  org.h2.Driver\nurl: jdbc:h2:sample;DB_CLOSE_ON_EXIT=TRUE\n\
    username: sample\npassword: sample\nServer:\nport: 9000\ncontext:  /ps-boot\n\
    ```\n\nTo use YAML, the `application.properties`\nmust be replaced with `application.yml`\
    \ file\n(the possible locations for this file are the same as for `application.properties)`\n\
    and the `snakeyaml` dependency\nadded to the project. A YAML file is transformed\
    \ into a `Java Map<String,Object>,` and Spring Boot flattens the map so\nthat\
    \ it is one level deep and has period-separated keys. So the `application.properties`\n\
    that corresponds to the `application.yml`\ndepicted previously looks like this\
    \ :\n\n```\nspring.app.name: ps-boot\nspring.datasource.driverClassName: org.h2.Driver\n\
    spring.datasource.url: jdbc:h2:sample;DB_CLOSE_ON_EXIT=TRUE\nspring.datasource.username:\
    \ sample\nspring.datasource.password: sample\nserver.port: 9000\nserver.context:\
    \  /ps-boot\n```\n\nTo configure the previous application using YAML, we do not\
    \ have to add\na dependency of `snakeyaml`, because it\nis a transitive dependency\
    \ of the Spring Boot Web Starter. So the only\nthing to do is the following:\n\
    \n1.  Convert `application.properties`\n    to `application.yml`\n\n```\n    app:\n\
    \    port: 8084\n    context: /ps-boot\n    sessionTimeout:10\n    ```\n\n2. \
    \ Create a class to load and hold the YAML values, and to make things\n    interesting,\
    \ the class should be able to work with external\n    configuration files. This\
    \ can be done using the Spring Boot specialized\n    annotation `@ConfigurationProperties`.[^(20)](#A978-1-4842-0811-3_6_Chapter.html#Fn20)\n\
    \    This annotation also provides the possibility to validate the external\n\
    \    properties and define a prefix for the properties. So if there are\n    multiple\
    \ prefixes, multiple classes can be defined. The name prefix is\n    used by Spring\
    \ Boot to identify the properties that are valid to bind to\n    a configuration\
    \ object and is defined as a value for the `prefix` attribute of\n    the `@`\
    \ `ConfigurationProperties`\n    annotation.\n\n```\n    import org.springframework.boot.context.properties.ConfigurationProperties;\n\
    \    import javax.annotation.PostConstruct;\n    import javax.validation.constraints.NotNull;\n\
    \    @ConfigurationProperties(prefix=\"app\")\n    public class AppSettings {\n\
    \    private static Logger logger = LoggerFactory.getLogger(AppSettings.class);\n\
    \    @NotNull\n    private Integer port;\n    @NotNull\n    private String context;\n\
    \    @NotNull\n    private Integer sessionTimeout;\n    public AppSettings() {\n\
    \    }\n    @PostConstruct\n    public void check() {\n    logger.info(\"Initialized\
    \ {} {}\", port, context);\n    }\n    ...//getters &  setters\n    }\n    ```\n\
    \n! Although setters and getters are\n    not part of the previous code snippet,\
    \ they are mandatory, because\n    Spring Boot uses setters to populate the `AppSettings`\
    \ bean\n    properties, and getters are used to access the values so they can\
    \ be\n    used.\n\n3.  Enable support for beans annotated with `@ConfigurationProperties`\n\
    \    by annotating the Configuration class with `@EnableConfigurationProperties`\n\
    \    and specify the configuration bean class s argument for it.\n\n```\n    import\
    \ org.springframework.boot.context.properties.EnableConfigurationProperties;\n\
    \    ...\n    @RestController\n    @SpringBootApplication(scanBasePackages = {\"\
    com.ps.start\"})\n    @EnableConfigurationProperties(AppSettings.class)\n    public\
    \ class Application extends SpringBootServletInitializer {\n    ...\n    }\n \
    \   ```\n\nIf this annotation is not used, then the `AppSettings` class can\n\
    \    be annotated with `@Configuration`, and\n    Spring Boot will properly create\
    \ the bean and load the values from the\n    file. This approach is practical\
    \ when more than one configuration class\n    is used.\n\n4.  Use the property\
    \ values by injecting them where needed. In this case,\n    the values need to\
    \ be injected into a class implementing `EmbeddedServletContainerFactory`."
