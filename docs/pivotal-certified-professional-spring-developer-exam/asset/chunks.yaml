    Annotations support was introduced in Spring 2.5 for a small set of annotations.
    Since then, Spring has evolved, and currently with Spring 4.0, an application
    can be configured using only annotations (stereotypes and the complete set of
    Java Configuration). The `@` `PostConstruct` annotation is part of the JSR 250[^(13)](#A978-1-4842-0811-3_2_Chapter.html#Fn13)
    and is used on a method that needs to be executed after dependency injection is
    done to perform initialization. The annotated method must be invoked before the
    bean is used, and, like any other initialization method chosen, may be called
    only once during a bean lifecycle. If there are no dependencies to be injected,
    the annotated method will be called after the bean is instantiated. Only one method
    should be annotated with `@PostConstruct`.


    The method annotated with `@PostConstruct` is picked up and called by a pre-init
    bean of a type that implements the `org.springframework.beans.factory.config.BeanPostProcessor`
    interface. Classes implementing this interface are actually factory hooks that
    allow for modifications of bean instances. The application context auto-detects
    these types of beans and instantiates them before any other beans in the container,
    since after their instantiation they are used to manipulate other beans managed
    by the IoC container.


    The `BeanPostProcessor` declares two methods to be implemented, `postProcessBeforeInitialization`
    and `postProcessAfterInitialization`, and their names depict clearly their purpose.
    In Figure [2-17](#A978-1-4842-0811-3_2_Chapter.html#Fig17), there are two pink
    rectangles depicting when the bean post processor is invoking methods on the bean.
    Typically, post processors that populate beans via marker interfaces (they pick
    up methods annotated with `@PostConstruct`) will implement `postProcessBeforeInitialization`,
    while post processors that wrap beans with proxies will normally implement `postProcessAfterInitialization`.


    For `@PostConstruct`, annotated methods to be picked up and executed. A bean of
    this type must be present in the configuration. The bean that registers `@PostConstruct`
    (and other annotations from JSR 250, as you will see later) is `org.springframework.context.annotation.CommonAnnotationBeanPostProcessor`.
    Since this is a Spring infrastructure bean, it could be added to the configuration
    file like this:


    And this could work, but there will be some issues as configuring the bean like
    that, overrides the Spring defaults which might lead to unexpected behavior. Fortunately
    this bean configuration is one of those included in the following line, a Spring
    shortcut based on the `context` namespace:


    The `<context:annotation-config />` enables scanning of all the classes in the
    project for annotations, so using it on large applications might make them slow.
    The solution is to use `<context:component-scan />`,because the base-package|
    attribute will reduce the number of classes to be scanned. Also, the good part
    is that you can set multiple base packages too, by separating them with a comma.
    The best part is that the classes in the packages can also be filtered by name,
    by what they are annotated with, or by other criteria.


    When the `<context:component-scan />` statement is present in an XML file, all
    supported annotations are detected in the class path, or only in the packages
    specified as values for the `base-package` attribute in the second case.


    The `<context:annotation-config/>` activates detection for `@PostConstruct`, `@PreDestroy`,
    `@Resource`, `@Autowired`, and `@Required` and other JPA and EJB 3 annotations.


    The `<context:component-scan/>` activates detection for all annotations mentioned
    previously, plus Spring stereotype annotations: @Component and extensions (e.g.,
    `@Service`, `@Repository`).


