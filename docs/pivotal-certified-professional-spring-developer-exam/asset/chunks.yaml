  trans: "\n涉及 JMS 和 JDBC 资源的分布式事务概念性 UML 时序图\n\n`JmsService` 和 `UserService` 都是事务性的。其顺序或执行步骤如下：\n\
    \n1.  启动消息传递事务。\n2.  接收请求更新用户记录的消息。\n3.  启动数据库事务以编辑用户记录。\n4.  如果数据库更新成功，则提交数据库事务。否则，回滚事务。\n\
    5.  如果数据库事务提交成功，则提交消息传递事务。如果数据库事务已回滚，则回滚消息传递事务。\n\n使用分布式事务需要 JTA 和特定的 XA 驱动程序。¹³\n\
    有许多开源和商业的 JTA 提供者：JBossTS、Java 开放事务管理器 (JOTM) 和 Atomikos。¹⁴\n由于分布式事务既不是官方认证考试的主题，也不是\
    \ Spring 核心组件的一部分，本节将在此结束，因为接下来有更有趣的内容。\n\n介绍 Hibernate 和 ORM\n\n前面已经介绍了 JPA 这个术语，但现在是时候详细讨论它了。JPA（Java\
    \ 持久化 API）是一个供持久化提供者实现的接口。有许多可用于 Java 应用程序的 JPA 提供者：Hibernate、EclipseLink、Apache\
    \ OpenJPA 等。\n\n其中最流行的是 Hibernate，它是 Red Hat 的开源项目之一。Hibernate ORM 是一个对象关系映射框架，支持将面向对象的领域模型映射到关系数据库。该框架是开源的，并且\
    \ Hibernate 多年来已发展成为一个成熟的技术，被拆分为众多工具，用于领域模型验证、索引和搜索 NoSQL 数据库的 JPA（Hibernate OGM）¹⁵\
    \ 等等。如果您对 Red Hat Hibernate 项目家族感到好奇，可以在其官方网站 [`http://hibernate.org/`](http://hibernate.org/)\
    \ 上找到更多信息。本节将介绍使用 Hibernate 配置 JPA 的基本细节。\n\n会话与 Hibernate 配置\n\n要在 Spring 应用程序中使用\
    \ Hibernate 配置 JPA，必须引入以下组件：\n\n*   `org.hibernate.SessionFactory` 接口是 Hibernate\
    \ 的核心组件。此类型的对象是线程安全、可共享且不可变的。通常，应用程序只有一个 `SessionFactory` 实例，为客户端请求提供服务的线程从此工厂获取\
    \ `Session` 实例。一旦创建了 `SessionFactory` 实例，其内部状态就被设置好了。此内部状态包括关于对象/关系映射的所有元数据。\n\
    \n*   `org.hibernate.Session` 接口是 Hibernate 组件，代表单个功能单元，并且是 Java 应用程序与 Hibernate\
    \ 之间的主要运行时接口。会话是一个有状态对象，用于管理功能单元内的持久化对象。它充当事务范围的缓存，在会话中执行的操作基本上被缓存，当事务提交时，更改会持久化到数据源（二级缓存）。可以通过调用\
    \ `sessionFactory.getCurrentSession()` 来获取 `Session` 对象。\n\n*   `org.springframework.orm.hibernate*.HibernateTransactionManager`：此类是针对单个\
    \ `SessionFactory` 的 `PlatformTransactionManager` 实现。Spring 4 当前包含三个 Hibernate\
    \ 包，每个支持的版本（3、4 和 5）各一个。每个包中都有一个 `HibernateTransactionManager`。用于 Hibernate 3\
    \ 的版本目前已弃用，可能会在 Spring 5 中被移除。\n\n```\n    import org.springframework.transaction.PlatformTransactionManager;\n\
    \    ...\n    @Bean\n    public PlatformTransactionManager transactionManager()\
    \ {\n    return new HibernateTransactionManager(sessionFactory());\n    }\n  \
    \  ```\n\n*   `org.springframework.orm.hibernate5.LocalSessionFactoryBuilder`：这是一个工具类，可用于创建\
    \ `SessionFactory` bean。会话工厂 bean 需要应用程序使用的数据源、可以找到实体类的包以及 Hibernate 属性作为参数。\n\
    \n```\n    import org.hibernate.SessionFactory;\n    import org.springframework.orm.hibernate5.LocalSessionFactoryBuilder;\n\
    \    ...\n    @Bean\n    public SessionFactory sessionFactory() {\n    return\
    \ new LocalSessionFactoryBuilder(dataSource())\n    .scanPackages(\"com.ps.ents\"\
    )\n    .addProperties(hibernateProperties())\n    .buildSessionFactory();\n  \
    \  }\n    @Bean\n    public Properties hibernateProperties() {\n    Properties\
    \ hibernateProp = new Properties();\n    hibernateProp.put(\"hibernate.dialect\"\
    ,\n    \"org.hibernate.dialect.H2Dialect\");\n    hibernateProp.put(\"hibernate.hbm2ddl.auto\"\
    , \"create-drop\");\n    hibernateProp.put(\"hibernate.format_sql\", true);\n\
    \    hibernateProp.put(\"hibernate.use_sql_comments\", true);\n    hibernateProp.put(\"\
    hibernate.show_sql\", true);\n    return hibernateProp;\n    }\n    ```\n\n此类在\
    \ Spring 3.1 中引入，用于替换与 Hibernate 3 一起使用的类 `org.springframework.orm.hibernate3.annotation.AnnotationSessionFactoryBean`，并且它被设计为与\
    \ Hibernate 4 一起工作。正如您现在可能推断的那样，存在一个用于 Hibernate 5 的版本，该版本在 Spring 4.2 中引入。如果您好奇，以下代码片段展示了使用已弃用类的\
    \ Hibernate 3 的 XML 示例配置。\n\n```\n\ncom.ps.ents.User\n    com.ps.ents.Pet\n  \
    \  com.ps.ents.Request\n    com.ps.ents.Response\n    com.ps.ents.Review\n\nhibernate.format_sql=true\n\
    \    hibernate.show_sql=true\n\n```\n\n`\"com.ps.ents\"` 是实体类所在的包。它们代表了 Hibernate\
    \ 需要将其映射到数据库对象的元数据。在以前的版本中使用了实体类和 Hibernate 的 XML 配置，但现在用得不多。在上一个代码示例中，类 `annotation.AnnotationSessionFactoryBean`\
    \ 没有 `scanPackages` 属性，因此实体必须在 XML 配置文件中作为列表中的值列出，该列表用作设置 `annotatedClasses` 属性的参数。新方法更实用，因为它消除了在项目中添加新实体类时修改\
    \ XML Spring 配置文件的必要性。\n\n`hibernateProperties` 是一个 `java.util.Properties`，包含特定的\
    \ Hibernate 属性。最常用的如下所列：\n\n*   `hibernate.dialect`：值是与应用程序中使用的数据库匹配的方言类（例如：`org.hibernate.dialect.H2Dialect`）。\n\
    *   `hibernate.hbm2ddl.auto`：该值表示 Hibernate 在应用程序启动时应执行的操作：更新数据库以应用元数据中的更改、完全重新创建数据库或什么都不做。可能的值：`none（默认值）,\
    \ create-only, drop, create, create-drop, validate, update`。这对于嵌入式测试数据库非常实用，因为开发人员可以专注于代码，而不是设置测试数据库。如果使用\
    \ create-drop，Hibernate 将扫描所有实体，并根据其字段上的特定注解生成表以及它们之间的关系。\n*   `hibernate.format_sql`：如果为\
    \ true，并且下一个属性也为 true，则生成的 SQL 语句将以漂亮且可读的方式打印到控制台。\n"
- fmt: "*   `hibernate.show_sql`：如果为`true`，所有生成的 SQL 语句都会打印到控制台。\n*   `hibernate.use_sql_comments`：如果为`true`，Hibernate\
    \ 会在 SQL 语句中添加注释，以告知开发者该语句试图执行的操作。\n\n由于 Hibernate 是一个不断演进的工具，现在是时候引入连接池了。在本节中，选择`HikariCP`来创建`dataSource`\
    \ bean。`HikariCP`是开源的、小巧且实用的，因为只需向项目添加一个库，并且据称它是 Java 领域最快的连接池。[^(16)](#A978-1-4842-0811-3_5_Chapter.html#Fn16)\n\
    \n```\nimport com.zaxxer.hikari.HikariConfig;\nimport com.zaxxer.hikari.HikariDataSource;\n\
    ...\n@Bean(destroyMethod = \"close\")\npublic DataSource dataSource() {\n    try\
    \ {\n        HikariConfig hikariConfig = new HikariConfig();\n        //datasource\
    \ connection data\n        hikariConfig.setDriverClassName(driverClassName);\n\
    \        hikariConfig.setJdbcUrl(url);\n        hikariConfig.setUsername(username);\n\
    \        hikariConfig.setPassword(password);\n        //connection pool specific\
    \ configuration\n        hikariConfig.setMaximumPoolSize(5);\n        hikariConfig.setConnectionTestQuery(\"\
    SELECT 1\");\n        hikariConfig.setPoolName(\"springHikariCP\");\n        hikariConfig.addDataSourceProperty(\"\
    dataSource.cachePrepStmts\", \"true\");\n        hikariConfig.addDataSourceProperty(\"\
    dataSource.prepStmtCacheSize\", \"250\");\n        hikariConfig.addDataSourceProperty(\"\
    dataSource.prepStmtCacheSqlLimit\", \"2048\");\n        hikariConfig.addDataSourceProperty(\"\
    dataSource.useServerPrepStmts\", \"true\");\n        HikariDataSource dataSource\
    \ = new HikariDataSource(hikariConfig);\n        return dataSource;\n    } catch\
    \ (Exception e) {\n        return null;\n    }\n}\n```\n\n`SessionFactory` bean\
    \ 随后被注入到仓库中，并用于创建实现`org.hibernate.query.Query<R>`类型的对象，这些对象被执行后返回结果。但关于这部分内容，在介绍实体类之后会再详细说明，这里先简单提一下以保持思路清晰。\n\
    \nHibernate 支持`javax.persistence.*`包中的所有 JPA 2.x 注解，并扩展此包以提供 JPA 不支持的行为以及执行特定的增强功能。Hibernate\
    \ 的元数据由放置在类、字段和方法上的注解组成，这些注解定义了应如何处理这些对象、它们有哪些限制等。最重要的注解是`@Entity`注解，它属于`javax.persistence.*`包，并将类标记为领域对象（也称为实体）的模板。\n\
    \n使用`@Entity`注解的类会映射到与类名匹配的数据库表，除非使用`@Table`注解另行指定。\n\n```\nimport javax.persistence.Table;\n\
    import javax.persistence.Entity;\n...\n@Entity\n@Table(name=\"P_USER\")\npublic\
    \ class User extends AbstractEntity {\n...\n}\n```\n\n实体类成员通过注解来指定其用途、列名（如果与字段名不同）、验证规则、与其他实体的关系，以及本章后续将介绍的更多内容。默认情况下，所有类成员都被视为持久化的，除非使用`@Transient`注解。`@Column`注解并非必需，除非数据库列名需要与字段名不同，或者需要对字段应用限制。\n\
    \n例如：`unique`、`nullable`、`insertable`、`updatable`、`length`、`precision`、`scale`。\n\
    \n`@Id`注解将该字段标记为此实体类型的唯一标识符，并与数据库表的主键匹配。`@Entity`和`@Id`对于领域类是必需的。\n\n带有持久化特定注解的实体类成员的访问类型为`FIELD`。它们的值由\
    \ Hibernate 通过反射填充。可以通过使用`@Access`注解强制使用 setter 和 getter 方法，但不推荐这样做，因为它可能会干扰其他组件（例如：监听器和\
    \ AOP 通知）。\n\n表之间的关系由带有`@OneToMany`、`@ManyToOne`、`@ManyToMany`、`@OneToOne`注解的字段定义，它们与数据库中的关系定义相匹配。在下面的代码片段中，展示了一个`User`实体及其大部分字段和注解。Hibernate\
    \ 将在数据库中创建的表将被命名为`P_USER`。\n\n`@OneToMany`注解用于在`P_PET`表中定义一个外键，将宠物记录链接到`P_USER`表中的记录，并且可以定义属性来指定子实体的行为。例如，在下面的代码片段中，使用`@OneToMany(mappedBy\
    \ = \"owner\", cascade = {CascadeType.REMOVE})`告诉 Hibernate，在删除一个用户实体时，所有类型为`Pet`的子实体也必须被删除。\n\
    \n```\nimport org.hibernate.validator.constraints.NotEmpty;\nimport javax.validation.constraints.NotNull;\n\
    import javax.persistence.Column;\nimport javax.persistence.OneToMany;\n...\n@Entity\n\
    @Table(name=\"P_USER\")\n@SequenceGenerator(name = \"seqGen\", allocationSize\
    \ = 1)\npublic class User extends AbstractEntity {\n    @NotEmpty\n    @Column(nullable\
    \ = false, unique = true)\n    private String username;\n    @Column(name=\"first_name\"\
    )\n    public String firstName;\n    @NotNull\n    @Enumerated(EnumType.STRING)\n\
    \    @Column(name = \"user_type\")\n    private UserType userType;\n    @NotEmpty\n\
    \    @Column(unique = true)\n    private String email;\n    @JsonIgnore\n    @OneToMany(mappedBy\
    \ = \"owner\",\n               cascade = {CascadeType.REMOVE})\n    private Set\
    \ pets = new HashSet<>();\n...\n}\n```\n\n在`Pet`实体类中，声明了关系的`@ManyToOne`部分，并使用`@JoinColumn`定义了外键列的确切名称。外键字段将填充对作为此领域对象父级的`User`实体的引用。在\
    \ JPA 中，声明`@OneToMany`关系的实体通常称为父实体，而声明`@ManyToOne`的实体称为子实体。\n\n```\nimport org.hibernate.validator.constraints.NotEmpty;\n\
    import javax.persistence.JoinColumn;\nimport javax.persistence.ManyToOne;\n...\n\
    @Entity\n@Table(name=\"P_PET\")\npublic class Pet extends AbstractEntity {\n...\n\
    \    @ManyToOne\n    @JoinColumn(name = \"OWNER_ID\", nullable = false)\n    private\
    \ User owner;\n}\n```\n\n此外，由于我们利用继承来避免编写重复代码，因此引入了一个名为`AbstractEntity`的抽象类，它定义了所有实体类的公共字段。为了告诉\
    \ Hibernate 这个类不是实体类，而是其他实体类的模板，我们使用了`@MappedSuperclass`注解。我们做了一个架构决策，将所有基础设施相关的字段分组到这个类中：使用`@Id`和`@GeneratedValue`标记的主键字段（用于允许自动生成值）、对象编辑时修改的日期字段，以及使用`@Version`注解的字段（用于在执行合并操作时确保完整性以及实现乐观并发控制）。一个实体类只能有一个使用`@Version`注解的字段。\n\
    \n```\nimport com.fasterxml.jackson.annotation.JsonIgnore;\nimport org.springframework.format.annotation.DateTimeFormat;\n\
    import javax.validation.constraints.NotNull;\n...\n@MappedSuperclass\npublic abstract\
    \ class AbstractEntity implements Serializable {\n    @JsonIgnore\n    @Id\n \
    \   @GeneratedValue(strategy = GenerationType.AUTO)\n    @Column(updatable = false)\n\
    \    protected Long id;\n    @JsonIgnore\n    @Column(name = \"CREATED_AT\", nullable\
    \ = false)\n    @NotNull\n    @DateTimeFormat(pattern = \"yyyy-MM-dd\")\n    protected\
    \ Date createdAt;\n...\n    @JsonIgnore\n    @Version\n    public int version;\n\
    }\n```\n\n## Session 与 Hibernate 查询"
  raw: "*   `hibernate.show_sql`:\n        if true, all the generated SQL statements\
    \ are printed to the console.\n\n*   `hibernate.use_sql_comments`:\n        if\
    \ true, Hibernate will put a comment inside the SQL statement to tell\n      \
    \  the developer what that statement is trying to do.\n\n*   Because Hibernate\
    \ is an evolved tool, it is about time to introduce\n    connection pooling. For\
    \ this section, `HikariCP` was chosen\n    to create the `dataSource` bean.\n\
    \    `HikariCP` is\n    open-source, small, and practical, since only one library\
    \ needs to be\n    added to the project, and it is said to be the fastest connection\
    \ pool\n    in the Java universe.[^(16)](#A978-1-4842-0811-3_5_Chapter.html#Fn16)\n\
    \n```\n    import com.zaxxer.hikari.HikariConfig;\n    import com.zaxxer.hikari.HikariDataSource;\n\
    \    ...\n    @Bean(destroyMethod = \"close\")\n    public DataSource dataSource()\
    \ {\n    try {\n    HikariConfig hikariConfig = new HikariConfig();\n    //datasource\
    \ connection data\n    hikariConfig.setDriverClassName(driverClassName);\n   \
    \ hikariConfig.setJdbcUrl(url);\n    hikariConfig.setUsername(username);\n   \
    \ hikariConfig.setPassword(password);\n    //connection pool specific configuration\n\
    \    hikariConfig.setMaximumPoolSize(5);\n    hikariConfig.setConnectionTestQuery(\"\
    SELECT 1\");\n    hikariConfig.setPoolName(\"springHikariCP\");\n    hikariConfig.addDataSourceProperty(\"\
    dataSource.cachePrepStmts\", \"true\");\n    hikariConfig.addDataSourceProperty(\"\
    dataSource.prepStmtCacheSize\", \"250\");\n    hikariConfig.addDataSourceProperty(\"\
    dataSource.prepStmtCacheSqlLimit\", \"2048\");\n    hikariConfig.addDataSourceProperty(\"\
    dataSource.useServerPrepStmts\", \"true\");\n    HikariDataSource dataSource =\
    \ new HikariDataSource(hikariConfig);\n    return dataSource;\n    } catch (Exception\
    \ e) {\n    return null;\n    }\n    }\n    ```\n\nThe `SessionFactory` bean\n\
    is then injected into repositories and is used to create objects of\ntypes implementing\
    \ `org.hibernate.query.Query<R>`\nthat are executed and the result is returned,\
    \ but more about that after\nentity classes are covered, just a little to keep\
    \ things clear.\n\nHibernate supports all JPA 2.x annotations in the `javax.persistence.*`\n\
    package and extends this package to provide behavior not supported by\nJPA and\
    \ to perform specific enhancements. The metadata for Hibernate is\nmade of annotations\
    \ placed on classes, fields, and methods that define\nhow those objects should\
    \ be treated, what restrictions they have, and so\non. The most important annotation\
    \ is the `@Entity` annotation,\nwhich is part of the `javax.persistence.*`\nand\
    \ marks classes as templates for domain objects, also called entities.\n\nCC\n\
    \nClasses annotated with `@Entity` are mapped to\ndatabase tables matching the\
    \ class name, unless specified otherwise\nusing the `@Table` annotation.\n\n```\n\
    import javax.persistence.Table;\nimport javax.persistence.Entity;\n...\n@Entity\n\
    @Table(name=\"P_USER\")\npublic class User extends AbstractEntity {\n...\n}\n\
    ```\n\nEntity class members are annotated to specify purpose, column name (if\n\
    different from the field name), validation rules, relationships with\nother entities,\
    \ and many more that you will discover later in the\nchapter.\n\nBy default, all\
    \ class members are treated as persistent unless annotated\nwith `@Transient`.\
    \ The `@Column` annotation is\nnot necessary unless the database column name is\
    \ required to be\ndifferent from the field name or restrictions need to be applied\
    \ for a\nfield.\n\nExample: `unique`, `nullable`, `insertable`, `updatable`, `length`,\
    \ `precision`, `scale`.\n\nThe `@Id`\nannotation marks the field as the unique\
    \ identifier for this entity type\nand matches the primary-key of the database\
    \ table. `@Entity` and `@Id` are mandatory for\na domain class.\n\nThe access\
    \ type for entity class members annotated with\npersistence-specific annotations\
    \ is `FIELD`. Their values\nare populated by Hibernate using reflection. Using\
    \ setters and getters\ncan be forced by using the `@Access` annotation,\nbut this\
    \ is not recommended, since it might interfere with other\ncomponents. (Example:\
    \ listeners and AOP advice)\n\nRelationships between tables are defined by fields\
    \ annotated with `@OneToMany`, `@ManyToOne`, `@ManyToMany`, `@OneToOne`, and they\n\
    match the database-equivalent relationship definitions. In the following\ncode\
    \ snippet, a `User` entity is\ndepicted with most of its fields and annotations.\
    \ The table that\nHibernate will create in the database will be named `P_USER`.\n\
    \nThe `@OneToMany`\nannotation is used to define a foreign key in the `P_PET`\
    \ table linking\npet records to records in `P_USER` and can have\nattributes defined\
    \ that specify the behavior of the child entities. For\nexample, in the code snippet\
    \ below, using `@OneToMany(mappedBy = \"owner\", cascade = {CascadeType.REMOVE})`\
    \ tells Hibernate that on\ndeleting a user entity, all children entities of type\
    \ `Pet` must be deleted\nas well.\n\n```\nimport org.hibernate.validator.constraints.NotEmpty;\n\
    import javax.validation.constraints.NotNull;\nimport javax.persistence.Column;\n\
    import javax.persistence.OneToMany;\n...\n@Entity\n@Table(name=\"P_USER\")\n@SequenceGenerator(name\
    \ = \"seqGen\", allocationSize = 1)\npublic class User extends AbstractEntity\
    \ {\n@NotEmpty\n@Column(nullable = false, unique = true)\nprivate String username;\n\
    @Column(name=\"first_name\")\npublic String firstName;\n@NotNull\n@Enumerated(EnumType.STRING)\n\
    @Column(name = \"user_type\")\nprivate UserType userType;\n@NotEmpty\n@Column(unique\
    \ = true)\nprivate String email;\n@JsonIgnore\n@OneToMany(mappedBy = \"owner\"\
    ,\ncascade = {CascadeType.REMOVE})\nprivate Set pets = new HashSet();\n...\n}\n\
    ```\n\nIn the `Pet`\nentity class, the `@ManyToOne` part of\nthe relationship\
    \ is declared, and it defines an exact name of the\nforeign key column using `@JoinColumn`.\
    \ The\nforeign key field will be populated with a reference to the `User` entity\
    \ that is a\nparent of this domain object. In JPA, the entity declaring the `@OneToMany`\n\
    relationship is usually called a\nparent entity, and the one declaring the `@ManyToOne`\
    \ is called\na child entity.\n\n```\nimport org.hibernate.validator.constraints.NotEmpty;\n\
    import javax.persistence.JoinColumn;\nimport javax.persistence.ManyToOne;\n...\n\
    @Entity\n@Table(name=\"P_PET\")\npublic class Pet extends AbstractEntity {\n...\n\
    @ManyToOne\n@JoinColumn(name = \"OWNER_ID\", nullable = false)\nprivate User owner;\n\
    }\n```\n\nAlso, since we are making use of inheritance to avoid writing duplicated\n\
    code, an abstract class that defines common fields for all entity\nclasses was\
    \ introduced called `AbstractEntity` , to\ntell Hibernate that this class is not\
    \ an entity class, but a template\nfor other entity classes, the `@MappedSuperclass`.\
    \ An\narchitectural decision was made to group all infrastructure-related\nfields\
    \ in this class: the primary key field marked with `@Id` and `@GeneratedValue`,\n\
    which is used to allow auto-generation of the value, the Date fields\nthat are\
    \ modified when the object is edited, and the `@Version` annotated\nfield that\
    \ is used to ensure integrity when one is performing the merge\noperation and\
    \ for optimistic concurrency control. An entity class can\nhave only one field\
    \ annotated with `@Version`.\n\n```\nimport com.fasterxml.jackson.annotation.JsonIgnore;\n\
    import org.springframework.format.annotation.DateTimeFormat;\nimport javax.validation.constraints.NotNull;\n\
    ...\n@MappedSuperclass\npublic abstract class AbstractEntity implements Serializable\
    \ {\n@JsonIgnore\n@Id\n@GeneratedValue(strategy = GenerationType.AUTO)\n@Column(updatable\
    \ = false)\nprotected Long id;\n@JsonIgnore\n@Column(name = \"CREATED_AT\", nullable\
    \ = false)\n@NotNull\n@DateTimeFormat(pattern = \"yyyy-MM-dd\")\nprotected Date\
    \ createdAt;\n...\n@JsonIgnore\n@Version\npublic int version;\n}\n```\n\nSession\
    \ and Hibernate Querying"
