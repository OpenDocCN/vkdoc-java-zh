    ## Field, Constructor, and Setter Injection


    At the beginning of the XML configuration section it was mentioned that field
    injection is not supported in XML. This is because the `<bean />` element definition
    does not support this. In using annotations to configure beans, field injection
    is possible, since the central annotation used to define dependencies `@Autowire`
    can be used on fields, constructors, setters, and even methods.


    The term `autowire` is the short version for automatic dependency injection. This
    is possible only in Spring applications using component scanning and stereotype
    annotations to create beans. The `@Autowire` annotation indicates that Spring
    should take care of injecting that dependency. This raises an interesting question:
    how does Spring know what to inject?


    Out of the box, Spring will try to autowire by type, because rarely in an application
    is there need for more than one bean of a type. Spring will inspect the type of
    dependency necessary and will inject the bean with that exact type. Let’s consider
    a configuration class called `RequestRepoConfig` that defines one bean of type
    `JdbcRequestRepo`. Let’s specify an explicit name for the repository bean of type
    `JdbcRequestRepo` and then define an autowired dependency in a typical Spring
    test class. In using `@Autowire` on a field, we are making use of `field injection`.


    ```java

    //JdbcRequestRepo.java bean definition

    @Repository("requestRepo")

    public class JdbcRequestRepo extends JdbcAbstractRepo

    implements RequestRepo{

    ...

    }

    //configuration class RequestRepoConfig.java

    ...

    import org.springframework.context.annotation.ComponentScan;

    @Configuration

    @Import(DataSourceConfig.class)

    @ComponentScan(basePackages = "com.ps")

    public class RequestRepoConfig {

    }

    //AutowireTest.java Spring typical test class

    import org.springframework.beans.factory.annotation.Autowired;

    ...

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {RequestRepoConfig.class})

    public class AutowiringTest {

    @Autowired

    RequestRepo reqRepo;

    @Test

    public void testAutowiredField() {

    assertNotNull(reqRepo);

    }

    }

    ```


    The test above will pass as long as there is exactly one bean of type `RequestRepo`
    defined in the context. Spring does not care how the bean is named, unless there
    are more beans of the same type in the context.


    By default, if Spring cannot decide which bean to autowire based on type (because
    there are more beans of the same type in the application), it defaults to autowiring
    by name. The name considered as the criterion for searching the proper dependency
    is the name of the field being autowired.


    In the previous case, if Spring cannot decided what to autowire based on type,
    it will look for a bean named `reqRepo`. Let’s define in the `RequestRepoConfig`
    another bean of type `RequestRepo` and let’s name it `anotherRepo` and then see
    what happens.


    ```java

    @Configuration

    @Import(DataSourceConfig.class)

    @ComponentScan(basePackages = "com.ps")

    public class RequestRepoConfig {

    @Bean

    public RequestRepo anotherRepo(){

    return new JdbcRequestRepo();

    }

    }

    ```


    The class `AutowireTest` is part of `02-ps-container-02-practice`, and the log
    for the Spring framework has been set to debug. When running the `testAutowiredField`
    test method, here is what can be seen in the log:


