    ## Bean命名


    由于多种原因，使用Java配置时bean命名更简单。


    ### 使用`@Bean`时


    当使用`@Bean`声明的bean未定义名称时，Spring IoC会使用注解的方法名作为bean的名称。


    可以通过填充`name`属性来设置名称。同一个属性可以接收一个名称数组作为参数。第一个名称成为bean的名称；其余成为别名。


    ```

    // bean name = dataSource

    @Bean

    public DataSource dataSource() throws SQLException {

    ...

    }

    //bean name = one

    @Bean(name="one")

    public DataSource dataSource() throws SQLException {

    ...

    }

    //bean name =  one, alias = two

    @Bean(name={"one", "two"})

    public DataSource dataSource() throws SQLException {

    ...

    }

    ```


    ### 使用`@Component`时


    当使用`@Component`声明的bean未定义名称时，Spring IoC会通过将bean类型名称的首字母小写来创建bean的名称。


    这就是为什么在前面的例子中，bean名称是`jdbcRequestRepo`，因为类名是`JdbcRequestRepo`。如果你想重命名它，只需将名称作为参数传递给`@Repository`注解（或任何构造型注解）：


    ```

    // bean name = jdbcRequestRepo

    @Repository

    public class JdbcRequestRepo extends

    JdbcAbstractRepo implements RequestRepo{

    ...

    }

    // bean name = requestRepo

    @Repository("requestRepo")

    public class JdbcRequestRepo extends

    JdbcAbstractRepo implements RequestRepo{

    ...

    }

    // or

    @Repository(value="requestRepo")

    public class JdbcRequestRepo extends

    JdbcAbstractRepo implements RequestRepo{

    ...

    }

    //  or

    // bean name = requestRepo

    @Component("requestRepo")

    public class JdbcRequestRepo extends

    JdbcAbstractRepo implements RequestRepo{

    ...

    }

    ```


