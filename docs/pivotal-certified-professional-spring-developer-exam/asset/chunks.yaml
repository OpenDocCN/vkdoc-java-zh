    \     */\n    @ResponseStatus(HttpStatus.CONFLICT)\n    @ExceptionHandler({DataIntegrityViolationException.class})\n\
    \    public void handleAlreadyExists() {\n        // just return empty 409\n \
    \   }\n    // ...\n}\n```\n\nAnother method to process REST request-related exceptions\
    \ is to define a specialized exception class for a REST controller and a specialized\
    \ component to intercept those types of exceptions and treat them in a certain\
    \ way. For example, considering a class called `UserException` that is thrown\
    \ every time a method in the `RestUserController` is not executed correctly, the\
    \ class defined in the following code snippet will intercept such exceptions and\
    \ transform them into JSON error objects that the client can interpret easily.\
    \ This behavior is configured using the `@ControllerAdvice` annotation, which\
    \ is a specialization of `@Component`, allowing for implementation classes to\
    \ be autodetected through classpath scanning. Classes annotated with this annotation\
    \ typically declare one or more methods annotated with `@ExceptionHandler` that\
    \ will take care of the exception handling.\n\n```java\nimport org.springframework.http.HttpStatus;\n\
    import org.springframework.web.bind.annotation.ControllerAdvice;\nimport org.springframework.web.bind.annotation.ExceptionHandler;\n\
    import org.springframework.web.bind.annotation.ResponseBody;\nimport org.springframework.web.bind.annotation.ResponseStatus;\n\
    \n@ControllerAdvice\npublic class RestExceptionProcessor {\n    @ExceptionHandler\n\
    \    @ResponseStatus(value = HttpStatus.NOT_FOUND)\n    @ResponseBody\n    public\
    \ JsonError exception(UserException ex) {\n        return new JsonError(ex.getMessage());\n\
    \    }\n}\n```\n\nIn the previous code sample, the exception type is used as a\
    \ parameter in the handler method, so that only exceptions of that type will be\
    \ intercepted and treated. Also, catching custom exceptions is useful, because\
    \ they usually contain specific information related to what went wrong. Similar\
    \ restrictions can be implemented also by configuring the `@ControllerAdvice`\
    \ annotation. The scope for a controller advice can be limited to exceptions thrown\
    \ by methods of controllers declared in a specific set of packages by setting\
    \ the `basePackages` attribute.\n\n```java\n// ...\n@ControllerAdvice(basePackages\
    \ = {\"com.ps.web\", \"com.ps.rest\"})\npublic class RestExceptionProcessor {\n\
    \    @ExceptionHandler\n    @ResponseStatus(value = HttpStatus.NOT_FOUND)\n  \
    \  @ResponseBody\n    public JsonError exception(Exception ex) {\n        return\
    \ new JsonError(ex.getMessage());\n    }\n}\n```\n\nThe scope of a controller\
    \ advice can also be limited to a class or hierarchy of classes, by setting the\
    \ `basePackageClasses` attribute.\n\n```java\n// ...\n@ControllerAdvice(basePackageClasses\
    \ = RestExceptionProcessor.class)\npublic class RestExceptionProcessor {\n   \
    \ @ExceptionHandler\n    @ResponseStatus(value = HttpStatus.NOT_FOUND)\n    @ResponseBody\n\
    \    public JsonError exception(UserException ex) {\n        return new JsonError(ex.getMessage());\n\
    \    }\n}\n```\n\n## HTTP Message Converters\n\nThe `@ResponseBody` introduced\
    \ earlier is also used to facilitate understanding of the REST message format\
    \ between client and server. As mentioned at the beginning of the section, the\
    \ resource representation can have different formats: XML, JSON, HTML, etc. The\
    \ client must know the format to use, or request a resource with a representation\
    \ it understands from the server. Representations are converted to HTTP requests\
    \ and from HTTP responses by implementations of the `org.springframework.http.converter.HttpMessageConverter<T>`\
    \ interface. Message converters are automatically detected and used by Spring\
    \ in applications configured with `<mvc:annotation-driven/>` or `@EnableWebMvc`.\
    \ In the code sample for this chapter, the representations are in JSON format,\
    \ so `MappingJackson2HttpMessageConverter` is used. Spring comes with a default\
    \ wide list of supported message converters, but in case of need, a developer\
    \ can provide his own implementation of the `HttpMessageConverter<T>`. Here is\
    \ a list of the most commonly used message converters and the datatype handled:\n\
    \n**Table 7-5.** Message Converters Table\n\n| Message Converter | Data Type |\
    \ Observation |\n| --- | --- | --- |\n| `StringHttpMessageConverter` | `text/plain`\
    \ |  |\n| `MappingJackson2HttpMessageConverter` | `application/*+json` | Only\
    \ if Jackson 2 is present on the classpath |\n| `AtomFeedHttpMessageConverter`\
    \ | `application/atom+xml` | Only if Rome is present on the classpath |\n| `RssChannelHttpMessageConverter`\
    \ | `application/rss+xml` | Only if Rome is present on the classpath |\n| `MappingJackson2XmlHttpMessageConverter`\
    \ | `application/*+xml` | Only if Jackson 2 is present on the classpath |\n\n\
    As the name of the annotation so obviously implies, `@ResponseBody` is applied\
    \ to the response, and its presence on a controller method tells Spring that the\
    \ response should be processed with an HTTP message converter before being sent\
    \ to the client. If the method requires an argument that needs to be processed\
    \ by the same HTTP converters, then the parameter must be annotated with `@RequestBody`.\
    \ Take a controller method resolving a PUT request. This method receives a user\
    \ representation from the client that must be converted to a `User` instance before\
    \ its state is updated into the database. This method also returns the representation\
    \ of the updated instance, so it needs both of the annotations present.\n\n```java\n\
    import org.springframework.http.MediaType;\n// ...\n@RestController\npublic class\
    \ RestUserController {\n    @ResponseStatus(HttpStatus.OK)\n    @RequestMapping(value\
    \ = \"/users/{$username}\",\n            method = RequestMethod.PUT,\n       \
    \     consumes = MediaType.APPLICATION_JSON_UTF8_VALUE,\n            produces\
    \ = MediaType.APPLICATION_JSON_UTF8_VALUE)\n    public User updateByEmail(\n \
    \           @PathVariable(\"$username\") String username,\n            @RequestBody\
    \ User newUser) throws UserException {\n        User user = userService.findByUsername(username);\n\
    \        if (user == null) {\n            throw new UserException(\"User not found\
    \ with username \" + username);\n        }\n        copyProperties(newUser, user);\n\
    \        userService.update(user);\n        return user;\n    }\n    // ...\n\
    }\n```\n\nIn the previous example, the `consumes` and `produces` annotation attributes\
    \ of the `@RequestMapping` were used. These two attributes are used to narrow\
    \ the primary mapping for a request.\n\nThe `consumes` attribute defines the consumable\
    \ media types of the mapped request (defined on the server), and the value of\
    \ the `Content-Type` header (defined on the client side) must match at least one\
    \ of the values of this property in order for a method to handle a specific REST\
    \ request.\n\nThe `produces` attribute defines the producible media types of the\
    \ mapped request, narrowing the primary mapping, and the value of the `Accept`\
    \ header (on the client side) must match at least one of the values of this property\
    \ in order for a method to handle a specific REST request."
