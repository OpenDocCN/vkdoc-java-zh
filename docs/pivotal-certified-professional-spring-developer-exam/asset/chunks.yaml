- fmt: "# Spring Data JPA 与 MongoDB 配置\n\n## Spring Data JPA 配置\n\n该配置与由 Hibernate\
    \ 支持的 JPA 并无不同，在这种情况下，Hibernate 同样被用作持久化工具。唯一的区别在于引入了 `PersistenceUnitManager`\
    \ bean。Spring 使用该 bean 为内部生成的仓库提供对数据源和事务行为的访问。由于 Spring 为此目的自行创建仓库，因此不再需要 `@Repository`\
    \ 注解。\n\n由于这种创建仓库的方式快速且实用，它目前是在 Spring 应用程序中实现 JPA 的首选方式。在编写本书时，该库的当前版本为 `1.10.2.RELEASE`。该库是\
    \ Spring Data 家族[^(18)](#A978-1-4842-0811-3_5_Chapter.html#Fn18)的一部分，该项目旨在尽可能实用地创建仓库组件，无论使用何种数据源。在下一节中，您将了解\
    \ Spring Data MongoDB，该库提供了将 Spring 与名为 MongoDB 的 NoSQL 数据库集成的实用工具。\n\n在开始下一节之前，您可以在\
    \ `09-ps-data-jpa-practice` 项目中尝试使用 Spring Data JPA。在 `UserRepo` Java 文件中有一个编号为\
    \ 44 的额外 TODO 任务，该任务要求您将该接口转换为 Spring Data JPA 仓库，以便 `TestUserRepo` 类中的测试能够通过。\n\
    \n## Spring 与 MongoDB\n\n这是一个附加章节，其中涵盖的信息不会出现在官方考试中。但由于 NoSQL 数据库的使用越来越广泛，因此认为至少浅尝辄止是合适的。NoSQL\
    \ 数据库是越来越多内容通过互联网生成和共享的产物。关系型数据库是健壮的，旨在以非常结构化的方式存储对象及其之间的连接。但内容并不总是结构化的，将其规范化以存储在关系型数据库中的努力可能会变得繁琐且资源消耗巨大。\n\
    \n更合适的解决方案是拥有一个不需要完美结构化数据、支持云且可扩展的数据库。因此，NoSQL 数据库应运而生，以支持存储和快速访问大量组织混乱、复杂且不可预测的内容，这些内容也被称为大数据。目前有超过\
    \ 225 种 NoSQL 数据库[^(19)](#A978-1-4842-0811-3_5_Chapter.html#Fn19)，根据其内部组织方式，它们可以分为以下几类：\n\
    \n- **键值存储**：使用哈希表，包含唯一键和指向特定数据项的指针（例如，Amazon SimpleDB、Redis）。这是最简单的实现方式，但当仅需查询或更新部分值时效率较低。\n\
    - **列族存储**：数据按列组织，仍然使用键，但键指向列族。它们旨在存储和处理分布在多台机器上的大量数据（例如，HBase、Cassandra）。\n-\
    \ **文档数据库**：类似于键值存储，但模型是键值对集合的版本化文档。半结构化文档以 JSON 等格式存储。这种类型的数据库支持高效查询（例如，MongoDB、CouchDB）。\n\
    - **图数据库**：使用灵活的图模型存储数据，该模型可以跨多台机器扩展（Infinite Graph、Neo4j）。\n\n对于本节中的代码，使用了 MongoDB\
    \ Community 版[^(20)](#A978-1-4842-0811-3_5_Chapter.html#Fn20)，因为它轻量级且易于在任何操作系统上安装。设置\
    \ `09-ps-mongo-sample` 项目时采取了以下步骤：\n\n- 第一步是在您的系统上安装它。在任何操作系统上安装的说明都可以在其官方网站上找到：[https://docs.mongodb.com/manual/administration/install-community/](https://docs.mongodb.com/manual/administration/install-community/)。\n\
    - 下一步是启动 MongoDB。在每个操作系统上都有一个可执行文件可以执行此操作。数据库服务将在 `27017` 端口上启动。\n\n```\niuliana.cosmina@home\
    \  -  $ mongod --dbpath temp/mongo-db/\nCONTROL initandlisten MongoDB starting\
    \ : pid=89126 port=27017\ndbpath=/Users/iuliana.cosmina/temp/mongo-db/ 64-bit\
    \ host=home\nCONTROL  initandlisten db version v3.2.8\n```\n\n- 打开 mongo shell\
    \ 并通过执行 `db` 命令测试正在使用哪个数据库。返回的结果应为 `test`。\n\n```\niuliana.cosmina@home - $ mongo\n\
    MongoDB shell version: 3.2.8\nconnecting to: test\nServer has startup warnings:\n\
    2016-07-25T22:00:24.783+0300 I CONTROL  initandlisten\n2016-07-25T22:00:24.783+0300\
    \ I CONTROL  initandlisten\n** WARNING: soft rlimits too low.\nNumber of files\
    \ is 256, should be at least 1000\n> db\ntest\n>\n```\n\n出于本节代码示例的目的，无需创建新数据库，因此使用\
    \ `test` 即可。\n\n- 创建一个将映射到 MongoDB 对象的领域对象类。该类必须有一个标识字段，该字段将使用 Spring Data 的特殊注解\
    \ `@Id`（来自 `org.springframework.data.annotation` 包）进行注解。此类型的实例将成为名为该类名（但小写）的集合中的条目：`user`。\n\
    \n```\npackage com.ps.ents;\nimport org.springframework.data.annotation.Id;\n\
    import java.math.BigInteger;\npublic class User {\n    @Id\n    private BigInteger\
    \ id;\n    private String email;\n    private String username;\n    ... // other\
    \ fields\n    public BigInteger getId() {\n        return id;\n    }\n    public\
    \ void setId(BigInteger id) {\n        this.id = id;\n    }\n    public String\
    \ getEmail() {\n        return email;\n    }\n    public void setEmail(String\
    \ email) {\n        this.email = email;\n    }\n    public String getUsername()\
    \ {\n        return username;\n    }\n    public void setUsername(String username)\
    \ {\n        this.username = username;\n    }\n    ... // other setters and getter\n\
    \    @Override\n    public String toString() {\n        return \"User{\" +\n \
    \               \"id=\" + id +\n                \", email=’\" + email + ’\\” +\n\
    \                \", username=’\" + username + ’\\” +\n                \", password=’\"\
    \ + password + ’\\” +\n                \", rating=\" + rating +\n            \
    \    \", active=\" + active +\n                \", firstName=’\" + firstName +\
    \ ’\\” +\n                \", lastName=’\" + lastName + ’\\” +\n             \
    \   ’}’;\n    }\n}\n```\n\n- 创建一个新的 `UserRepo` 接口，该接口将扩展 Spring Data MongoDB 专用接口\
    \ `MongoRepository<T,ID extends Serializable>`。\n\n```\npackage com.ps.repos;\n\
    import com.ps.ents.User;\nimport org.springframework.data.mongodb.repository.MongoRepository;\n\
    import org.springframework.data.mongodb.repository.Query;\nimport java.util.List;\n\
    public interface UserRepo extends MongoRepository {\n    @Query(\"{’username’:\
    \ { ’$regex’ : ?0 } }\")\n    List findAllByUserName(String username);\n}\n```\n\
    \n每个 `MongoRepository` 接口都必须链接到它处理的对象类型以及唯一标识符的类型，这就是为什么在上面的示例中，`UserRepo` 接口扩展了\
    \ `MongoRepository<User, Long>`。因此，`UserRepo` 将管理具有 `Long` 类型唯一标识符的 `User` 对象。\n\
    \n- 创建一个配置类，并使用 `@EnableMongoRepositories` 注解它，以启用 MongoDB 仓库实例的创建。此注解在功能上类似于\
    \ `@EnableJpaRepositories`，但需要将声明了 Mongo 仓库类的包作为其 `basePackages` 属性的值提供。"
  raw: "The configuration is not different from the JPA backed up by Hibernate,\n\
    and Hibernate is used as a persistence tool in this case, too. The only\ndifference\
    \ is the introduction of the `PersistenceUnitManager`\nbean. This is used by Spring\
    \ to provide the internally generated\nrepository with access to datasource and\
    \ transactional behavior. Because\nSpring creates the repositories itself for\
    \ this exact purpose, the `@Repository`\nannotation is no longer needed.\n\nBecause\
    \ this way of creating repositories is fast and practical, it is\ncurrently the\
    \ preferred way to implement JPA in the Spring application.\nThe current version\
    \ of this library as this book is being written is\n`1.10.2.RELEASE`.\nThis library\
    \ is part of the Spring Data family [^(18)](#A978-1-4842-0811-3_5_Chapter.html#Fn18),\
    \ a\nproject designed to make the creation of repository components as\npractical\
    \ as possible, regardless of the datasource used. In the\nfollowing section, you\
    \ will be introduced to Spring Data MongoDB, the\nlibrary that provides utilities\
    \ to integrate Spring with the NoSQL\ndatabase called MongoDB.\n\n!\n\nBefore\
    \ starting the next section, you can play with Spring Data JPA in\nthe `09-ps-data-jpa-practice`\n\
    project. There is a bonus TODO task numbered with 44, located in the\n`UserRepo`\
    \ Java\nfile, that challenges you to turn that interface into a Spring Data JPA\n\
    repository so the tests in `TestUserRepo` class\nwill pass.\n\n**Spring and MongoDB\n\
    \nThis is a bonus section, and information covered here does not appear in\nthe\
    \ official exam. But since NoSQL databases are getting used more and\nmore, it\
    \ was considered appropriate at least to scratch the surface. The\nNoSQL databases\
    \ are a product of more and more content being generated\nand shared via the Internet.\
    \ Relational databases are robust, designed\nto store objects and connections\
    \ between them in a very structured\nmanner. But content is not always structured,\
    \ and the effort to\nnormalize it to be stored in a relational database can become\
    \ cumbersome\nand very costly in resources.\n\nA more appropriate solution would\
    \ be to have a database that does not\nrequire perfectly structured data, that\
    \ is cloud friendly and scalable.\nAnd thus NoSQL databases were born to support\
    \ storage and fast access of\nsuch amounts of poorly organized, complex, and unpredictable\
    \ content,\nalso referred to as BigData. There are currently over 225 NoSQL\n\
    databases,[^(19)](#A978-1-4842-0811-3_5_Chapter.html#Fn19) and\ndepending on their\
    \ internal organization, they can be categorized as\nfollows:\n\n*   Key-Values\
    \ Stores : a hash table\n    is used with a unique key and a pointer to a particular\
    \ item of data\n    (e.g., Amazon SimpleDB, Redis). It is the simplest to implement,\
    \ but it\n    is inefficient when only part of a value must be queried or updated.\n\
    \n*   Column Family Stores : data is\n    organized in columns, keys are still\
    \ used, but they point to a column\n    family. They were created to store and\
    \ process very large amounts of\n    data distributed over many machines (e.g.,\
    \ HBase, Cassandra).\n\n*   Document Databases : similar to\n    Key-Values Stores,\
    \ but the model is versioned documents of collections\n    of key-value pairs.\
    \ The semistructured documents are stored in formats\n    like JSON. This type\
    \ of database supports efficient querying (e.g.,\n    MongoDB, CouchDB).\n\n*\
    \   Graph Databases : to store the\n    data, a flexible graph model is used that\
    \ can scale across multiple\n    machines (Infinite Graph, Neo4jJ).\n\nFor the\
    \ code in this section, MongoDB Community edition[^(20)](#A978-1-4842-0811-3_5_Chapter.html#Fn20)\
    \ was\nused, because it is lightweight and easy to install on any operating\n\
    system. The following steps were taken to set up the project `09-ps-mongo-sample`:\n\
    \n*   The first step is to install it on your system. Instructions to install\n\
    \    on any operating system can be found on their official site here: [`https://docs.mongodb.com/manual/administration/install-community/`](https://docs.mongodb.com/manual/administration/install-community/)\
    \ .\n\n*   The next step is to start MongoDB. On every operating system there\
    \ is an\n    executable that can do this. The database service will be stared\
    \ on the\n    `27017` port.\n\n```\n    iuliana.cosmina@home  -  $ mongod --dbpath\
    \ temp/mongo-db/\n    CONTROL initandlisten MongoDB starting : pid=89126 port=27017\n\
    \    dbpath=/Users/iuliana.cosmina/temp/mongo-db/ 64-bit host=home\n    CONTROL\
    \  initandlisten db version v3.2.8\n    ```\n\n*   Open the mongo shell and test\
    \ what database is used by executing the\n    `db` command. The\n    retuned result\
    \ should be `test` .\n\n```\n    iuliana.cosmina@home - $ mongo\n    MongoDB shell\
    \ version: 3.2.8\n    connecting to: test\n    Server has startup warnings:\n\
    \    2016-07-25T22:00:24.783+0300 I CONTROL  initandlisten\n    2016-07-25T22:00:24.783+0300\
    \ I CONTROL  initandlisten\n    ** WARNING: soft rlimits too low.\n    Number\
    \ of files is 256, should be at least 1000\n    > db\n    test\n    >\n    ```\n\
    \nFor the purpose of the code sample in this section, there is no need to\n  \
    \  create a new database, so `test` will do.\n\n*   Create a domain object class\
    \ that will be mapped to a MongoDB object.\n    The class must have an identified\
    \ field that will be annotated with the\n    Spring Data special annotation `@Id`\
    \ from the package\n    `org.springframework.data.annotation`.\n    Instances\
    \ of this type will become entries in a collection named the\n    same as the\
    \ class but lowercased: `user`.\n\n```\n    package com.ps.ents;\n    import org.springframework.data.annotation.Id;\n\
    \    import java.math.BigInteger;\n    public class User {\n    @Id\n    private\
    \ BigInteger id;\n    private String email;\n    private String username;\n  \
    \  ... // other fields\n    public BigInteger getId() {\n    return id;\n    }\n\
    \    public void setId(BigInteger id) {\n    this.id = id;\n    }\n    public\
    \ String getEmail() {\n    return email;\n    }\n    public void setEmail(String\
    \ email) {\n    this.email = email;\n    }\n    public String getUsername() {\n\
    \    return username;\n    }\n    public void setUsername(String username) {\n\
    \    this.username = username;\n    }\n    ... // other setters and getter\n \
    \   @Override\n    public String toString() {\n    return \"User{\" +\n    \"\
    id=\" + id +\n    \", email=’\" + email + ’\\” +\n    \", username=’\" + username\
    \ + ’\\” +\n    \", password=’\" + password + ’\\” +\n    \", rating=\" + rating\
    \ +\n    \", active=\" + active +\n    \", firstName=’\" + firstName + ’\\” +\n\
    \    \", lastName=’\" + lastName + ’\\” +\n    ’}’;\n    }\n    }\n    ```\n\n\
    *   Create a new `UserRepo` interface\n    that will extend the Spring Data MongoDB-specialized\
    \ interface `MongoRepository<T,ID extends Serializable>`.\n\n```\n    package\
    \ com.ps.repos;\n    import com.ps.ents.User;\n    import org.springframework.data.mongodb.repository.MongoRepository;\n\
    \    import org.springframework.data.mongodb.repository.Query;\n    import java.util.List;\n\
    \    public interface UserRepo extends MongoRepository {\n    @Query(\"{’username’:\
    \ { ’$regex’ : ?0 } }\")\n    List findAllByUserName(String username);\n    }\n\
    \    ```\n\nEvery `RepoMongoRepositorysitory`\n    interface must be linked to\
    \ the type of object it handles and the type\n    of unique identifier, which\
    \ is why in the example above, the `UserRepo` interface\n    extends `MongoRepository<User,\
    \ Long>`. So `UserRepo` will manage\n    `User` objects\n    with a `Long`\n \
    \   unique identifier.\n\n*   Create a configuration class and annotate it with\
    \ `@EnableMongoRepositories`\n    to enable creation of MongoDB repository instances.\
    \ This annotation is\n    similar in functionality to `@EnableJpaRepositories`,\n\
    \    but needs for the package(s) where the Mongo repository classes are\n   \
    \ declared to be provided as a a value for its `basePackages`\n    attribute."
