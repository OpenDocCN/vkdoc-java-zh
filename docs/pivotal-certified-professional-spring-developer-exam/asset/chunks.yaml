- fmt: "# JMX Technology Overview\n\nIn JDK versions 5.0 and 6, the JMX technology\
    \ was developed as Java Specification Request JSR 3, Java Management Extensions,\
    \ and JSR 160, JMX Remote API. Evolutions of the JMX API and JMX Remote API in\
    \ JDK version 7 are covered by JSR 255, JMX API 2.0. JMX is dynamic, so information\
    \ about an application’s internal status can be gathered during runtime. So basically,\
    \ the JDK comes with JMX out of the box. And it is not hard to use. You must create\
    \ an interface that ends with `MXBean` or use the annotation. Of course, there\
    \ must be an implementation as well. The implementation is than used to manage\
    \ facets of the application.\n\nUsing JMX, a given resource can be instrumented\
    \ by one or more components called Management Beans, or simply MBeans. These are\
    \ objects containing management metadata. The MBeans are registered in a core-managed\
    \ object server, known as the MBean server. The MBean server acts as a management\
    \ agent and can run on most devices that have been enabled for the Java programming\
    \ language.\n\n## JMX Architecture\n\nThe JMX architecture is depicted in Figure\
    \ 7-30. The JMX architecture is structured into three layers:\n\n- **Instrumentation\
    \ layer**: where resources are wrapped in MBeans.\n- **Agent layer**: the management\
    \ infrastructure consisting of the MBean Server and agents that provide the following\
    \ JMX services:\n  - Monitoring\n  - Event notification\n  - Timers\n\n![A978-1-4842-0811-3_7_Fig30_HTML.jpg](A978-1-4842-0811-3_7_Fig30_HTML.jpg)\n\
    \n*Figure 7-30. JMX architecture*\n\n- **Management layer**: Defines how external\
    \ management applications can interact with the underlying layers in terms of\
    \ protocols, APIs, and so on. This layer uses an implementation of the distributed\
    \ services specification (JSR-077), which is part of the Java 2 Platform, Enterprise\
    \ Edition (J2EE) specification.\n\nThe JMX technology defines standard connectors\
    \ (known as JMX connectors) that enable you to access JMX agents from remote management\
    \ applications. The MBean server acts as a broker for communication between local\
    \ MBeans and agents and between MBeans and remote clients. The MBean server keeps\
    \ a keyed reference as evidence of all registered MBeans. Common and accessible\
    \ clients for the MBean Server are provided within the JDK: `jconsole`, `jvisualvm`,\
    \ and `jmc`. And there is also an open source tool named VisualVM.\n\nAn MBean\
    \ is a managed Java object that follows the design patterns set in the JMX specification.\
    \ An MBean can represent a device, an application, or any resource that needs\
    \ to be managed. MBeans expose a management interface that consists of the following:\n\
    \n- attributes (properties), which can be readable, writable, or both\n- operations\
    \ (methods)\n- self description\n\nThere are five type of MBeans defined by the\
    \ JMX specification:\n\n- Standard MBeans, also known as Simple MBeans\n- Dynamic\
    \ MBeans\n- Open MBeans\n- Model MBeans\n- MXBeans\n\nThe management metadata\
    \ can be defined statically by implementing a Java interface or by annotating\
    \ the implementation, and it will automatically be generated at runtime.\n\n##\
    \ Plain JMX\n\nThe plainest example of a JMX MBean interface can look like this.\n\
    \n```\npackage com.ps.jmx;\npublic interface JmxCounterMBean {\n    int getCount();\
    \ // attribute \"count\"\n    void add(); // operation \"add\"\n}\npublic class\
    \ JmxCounter implements JmxCounterMBean {\n    public int getCount() {\n     \
    \   ...\n    }\n    public void add() {\n        ...\n    }\n}\n```\n\nBy convention,\
    \ an MBean interface takes the name of the Java class that implements it, with\
    \ the suffix `MBean` added.\n\nOnce a resource has been instrumented by MBeans,\
    \ the management of that resource is performed by a JMX agent.\n\n```\nMBeanServer\
    \ mbs = ManagementFactory.getPlatformMBeanServer();\nObjectName name = new ObjectName(\"\
    com.ps.jmx:type=UserCounter\");\nUserCounter mbean = new UserCounter();\nmbs.registerMBean(mbean,\
    \ name);\n```\n\n## Spring JMX\n\nAs usual, using native APIs is cumbersome, so\
    \ Spring JMX was introduced to make developers’ lives easy by providing a practical\
    \ way to integrate a Spring application into a JMX infrastructure. Spring’s JMX\
    \ support provides four core features:\n\n- The automatic registration of any\
    \ Spring bean as a JMX MBean.\n- A flexible mechanism for controlling the management\
    \ interface of your beans.\n- The declarative exposure of MBeans over remote JSR-160\
    \ connectors.\n- The simple proxying of both local and remote MBean resources.\n\
    \nThese features are provided without the need for writing complex code and without\
    \ coupling the application to Spring or JMX classes or interfaces. The JMX infrastructure\
    \ can be configured using the context namespace or using Java Configuration. Spring\
    \ beans can be exposed as MBeans using annotations or XML. JMX beans can be consumed\
    \ using a proxying mechanism transparently. Until now there is nothing new; this\
    \ is what Spring provides for most commonly used APIs.\n\nThe core class in Spring’s\
    \ JMX framework is the `MBeanExporter`, responsible for taking your Spring beans\
    \ and registering them with a JMX `MBeanServer`. Declaring the server and the\
    \ exporter beans is done in a typical Spring manner.\n\nThe `<context:mbean-server/>`\
    \ declares a bean of type `org.springframework.jmx.support.MBeanServerFactoryBean`.\
    \ This bean has the responsibility of obtaining a `javax.management.MBeanServer`\
    \ reference from the standard JMX 1.2 `javax.management.MBeanServerFactory` API.\n\
    \nThe `<context:mbean-export/>` declares a bean of type `org.springframework.jmx.export.MBeanExporter`,\
    \ and this is the bean that allows exposing any Spring-managed bean to a `MBeanServer`\
    \ without the need to define any JMX-specific information in the bean classes.\n\
    \nAn equivalent Java Configuration is depicted in the following code snippet.\
    \ Basically, the two context elements from XML become two beans in a configuration\
    \ class:\n\n```\nimport org.springframework.jmx.export.MBeanExporter;\nimport\
    \ org.springframework.jmx.support.MBeanServerFactoryBean;\n...\n@Configuration\n\
    public class JmxConfig() {\n    // equivalent of <context:mbean-server/>\n   \
    \ @Bean\n    MBeanServerFactoryBean mbeanServer() {\n        return new MBeanServerFactoryBean();\n\
    \    }\n    // equivalent of <context:mbean-export/>\n    @Bean\n    MBeanExporter\
    \ exporter() {\n        MBeanExporter exporter = new MBeanExporter();\n      \
    \  exporter.setAutodetect(true);\n        exporter.setBeans(map);\n        return\
    \ exporter;\n    }\n}\n```\n\nThe project `16-ps-jmx-sample` is assigned to this\
    \ section. It contains the implementation with Spring Boot, because in this way,\
    \ the setup becomes even easier, since all that is needed is one annotation: `@EnableMBeanExport`.\n\
    \n```\nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.context.ConfigurableApplicationContext;\nimport org.springframework.context.annotation.EnableMBeanExport;\n\
    \n@SpringBootApplication\n@EnableMBeanExport\npublic class Application {\n   \
    \ private static Logger logger = LoggerFactory.getLogger(Application.class);\n\
    \    public static void main(String[] args) throws IOException {\n        ConfigurableApplicationContext\
    \ ctx =\n            SpringApplication.run(Application.class, args);\n       \
    \ assert (ctx != null);\n        logger.info(\"Started ...\");\n        System.in.read();\n\
    \        ctx.close();\n    }\n}\n```\n\nThe `@EnableMBeanExport` is very important,\
    \ because it enables default exporting of all standard MBeans from the Spring\
    \ context, as well as all `@ManagedResource` annotated beans. Behind the scenes,\
    \ it basically declares and registers a bean of type `JmxMBeanServer` and a bean\
    \ of type `AnnotationMBeanExporter` for you that will take care of registering\
    \ and will expose your Spring managed beans as MBean, so that you don’t have to."
