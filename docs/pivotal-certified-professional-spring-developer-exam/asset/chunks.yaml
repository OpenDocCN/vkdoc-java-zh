    We are at the end of the section, so now we have to cover what happens to beans
    after they have been used and are no longer needed and the application shuts down,
    or only the context managing them. When a context is closed, it destroys all the
    beans; that is obvious. But some beans work with resources that might refuse to
    release them if they are not notified before destruction. In Spring, this can
    be done in three ways:


    *   Set a method to be called before destruction using the `destroy-method` attribute
    of the `<bean />` element.

    *   Modify the bean to implement the `org.springframework.beans.factory.DisposableBean`
    interface and provide an implementation for the `destroy()` method (not recommended,
    since it couples the application code with Spring infrastructure).

    *   Annotate a method with `@PreDestroy`, also part of JSR 250 and one of the
    first supported annotations in Spring.

    *   The equivalent of `destroy-method` for Java Configuration `@Bean(destroyMethod="...")`.


