    The application context is nothing else than a class implementing the Spring interface
    `org.springframework.context.ApplicationContext` that needs to be instantiated
    and the configuration file given as an argument. There are more implementations
    for the application context provided by Spring, and the one to use depends on
    the location and the resources containing the configuration. For XML, the class
    `org.springframework.context.support.ClassPathXmlApplicationContext` is used.


    ```

    //creating the context

    (1)ApplicationContext context = new ClassPathXmlApplicationContext

    ("classpath:spring/application-config.xml");

    // Get the bean to use to invoke the service

    (2)UserService userService = (UserService)context.get("simpleUserService");

    // create user entity

    (3)User user = new User();

    // populate user

    // invoking the save method of the bean

    (4)userService.save(user);

    ```


    In the previous example, a lot of information is new and will be introduced gradually
    in the next sections. The `classpath` is a common prefix used in Spring applications
    configured using XML files, to tell the Spring IoC where the configuration is
    located. The bean unique identifier in the application context, the bean `id`
    was evidentiated by underlining its value, in order to give you a hint as to how
    the identification of a certain instance is done. More on this topic will be covered
    in the following sections.


    Configuration using Java Configurations can be done as in the following code snippet,
    but what everything means will be covered in more detail in the following sections.
    The method names used to create the beans were evidentiated by underlining them,
    in order to give you a hint as to how the bean `id` is determined.


    ```

    @Configuration

    @PropertySource("claspath:db/datasource.properties")

    public class ApplicationConfig {

    @Value("${url}")

    private String url;

    @Value("${username}")

    private String username;

    @Value("${password}")

    private String password;

    @Bean

    public UserService simpleUserService() throws SQLException {

    return new SimpleUserService(userRepo());

    }

    @Bean

    public UserRepo userRepo() throws SQLException {

    return new JdbcUserRepo(dataSource());

    }

    @Bean

    public DataSource dataSource() throws SQLException {

    OracleDataSource ds = new OracleDataSource();

    ds.setURL(url);

    ds.setUser(username);

    ds.setPassword(password);

    return ds;

    }

    }

    ```


    The `datasource.properties` file contains the database access credentials, which
    are set for the fields annotated with `@Value`, but how this works will be explained
    in greater detail in the Java Configuration section. For Java Configuration classes,
    the class `org.springframework.context.annotation.AnnotationConfigApplicationContext`
    is used to create an application context.


    ```

    ApplicationContext ctx = new AnnotationConfigApplicationContext

    (ApplicationConfig.class);

    // everything wires up across configuration classes...

    SimpleUserService simpleUserService =

    (SimpleUserService) ctx.getBean("simpleUserService");

    ```


    And now that the surface has been scratched, you are ready to dive into advanced
    Spring configuration.'
  trans: '

    ## Spring IoC 与依赖注入


    本章开头提到，创建对象并组装它们是 Spring 的职责。Spring 框架的控制反转（IoC）组件是其核心。它使用依赖注入来组装 Spring 提供的（也称为基础设施组件）和开发人员提供的组件，以便快速构建一个应用程序。图
    2-9 展示了 Spring IoC 在应用程序开发过程中的位置。


    ![A978-1-4842-0811-3_2_Fig9_HTML.jpg](img/A978-1-4842-0811-3_2_Fig9_HTML.jpg)


    图 2-9.


    Spring IoC 的用途


    本书开发过程中构建的应用程序包含使用仓库实例构建的服务类。例如，可以这样定义一个 `UserService` 实现：


    ```

    public class SimpleUserService extends SimpleAbstractService

    implements UserService {

    private UserRepo repo;

    public SimpleUserService(UserRepo userRepo) {

    this.repo = userRepo;

    }

    ...

    }

    ```


    如你所见，依赖是通过构造函数注入的，因此创建服务实例需要提供一个仓库实例作为参数。需要仓库实例来从数据库中检索和持久化 `User` 对象。仓库可以这样定义：


    ```

    import javax.sql.DataSource;

    public class JdbcUserRepo extends JdbcAbstractRepo {

    public JdbcUserRepo(DataSource dataSource) {

    super(dataSource);

    }

    ...

    }

    //JdbcAbstractRepo.java 包含所有仓库类的通用实现

    import javax.sql.DataSource;

    public class JdbcAbstractRepo

    implements AbstractRepo {

    protected DataSource dataSource;

    public JdbcAbstractRepo(DataSource dataSource) {

    this.dataSource = dataSource;

    }

    @Override

    public void save(T entity) {...}

    @Override

    public void delete(T entity) {... }

    @Override

    public void deleteById(Long entityId) {...}

    @Override

    public T findById(Long entityId) {...}

    }

    ```


    为了创建仓库实例，需要一个 `DataSource` 实例来连接数据库。


    为了告诉 Spring 容器创建这些对象以及如何将它们连接在一起，必须提供配置。这种配置可以通过 XML 文件、XML + 注解或 Java 配置类来提供。


    以下配置片段展示了一个 XML Spring 配置文件的内容和模板，用于定义构成应用程序的组件。²


    该 XML 文件通常放置在项目目录下的 `src/main/resources/spring` 中。`spring` 目录告诉你其下的文件是 Spring
    配置文件，因为一个应用程序可能还有其他用途的 XML 配置文件（例如配置 Hibernate 等其他基础设施组件、使用 Ehcache 配置缓存、日志记录等）。以这种方式配置的应用程序将在
    Spring 容器创建的应用程序上下文中运行。


    应用程序上下文将管理由 Spring IoC 实例化和初始化的所有对象，从现在起，我们将这些对象称为 `beans`，以便你熟悉 Spring 的术语。这些对象与应用程序上下文之间的关系以及它们的唯一标识符如图
    2-10 所示。


    ![A978-1-4842-0811-3_2_Fig10_HTML.jpg](img/A978-1-4842-0811-3_2_Fig10_HTML.jpg)


    图 2-10.


    应用程序上下文及其管理的 Bean


    应用程序上下文实际上就是一个实现了 Spring 接口 `org.springframework.context.ApplicationContext` 的类，需要实例化该类并将配置文件作为参数传入。Spring
    提供了多种应用程序上下文的实现，具体使用哪一种取决于配置的位置和包含配置的资源。对于 XML，使用 `org.springframework.context.support.ClassPathXmlApplicationContext`
    类。


    ```

    //创建上下文

    (1)ApplicationContext context = new ClassPathXmlApplicationContext

    ("classpath:spring/application-config.xml");

    // 获取 Bean 以调用服务

    (2)UserService userService = (UserService)context.get("simpleUserService");

    // 创建用户实体

    (3)User user = new User();

    // 填充用户信息

    // 调用 Bean 的 save 方法

    (4)userService.save(user);

    ```


    在前面的例子中，有很多新信息，将在后续章节中逐步介绍。`classpath` 是在使用 XML 文件配置的 Spring 应用程序中常用的前缀，用于告诉 Spring
    IoC 配置的位置。应用程序上下文中 Bean 的唯一标识符，即 Bean 的 `id`，通过为其值添加下划线来突出显示，以便提示你如何识别特定实例。更多关于此主题的内容将在后续章节中介绍。


    使用 Java 配置进行配置可以像下面的代码片段那样完成，但其中各项含义将在后续章节中更详细地介绍。用于创建 Bean 的方法名称通过添加下划线来突出显示，以便提示你如何确定
    Bean 的 `id`。


    ```

    @Configuration

    @PropertySource("claspath:db/datasource.properties")

    public class ApplicationConfig {

    @Value("${url}")

    private String url;

    @Value("${username}")

    private String username;

    @Value("${password}")

    private String password;

    @Bean

    public UserService simpleUserService() throws SQLException {

    return new SimpleUserService(userRepo());

    }

    @Bean

    public UserRepo userRepo() throws SQLException {

    return new JdbcUserRepo(dataSource());

    }

    @Bean

    public DataSource dataSource() throws SQLException {

    OracleDataSource ds = new OracleDataSource();

    ds.setURL(url);

    ds.setUser(username);

    ds.setPassword(password);

    return ds;

    }

    }

    ```


    `datasource.properties` 文件包含数据库访问凭证，这些凭证被设置到带有 `@Value` 注解的字段中，但其工作原理将在 Java 配置部分更详细地解释。对于
    Java 配置类，使用 `org.springframework.context.annotation.AnnotationConfigApplicationContext`
    类来创建应用程序上下文。


    ```

    ApplicationContext ctx = new AnnotationConfigApplicationContext

    (ApplicationConfig.class);

    // 所有内容跨配置类自动装配...

    SimpleUserService simpleUserService =

    (SimpleUserService) ctx.getBean("simpleUserService");

    ```


    现在，我们已经初步了解了 Spring 配置，可以准备深入学习高级配置了。

    '
- fmt: '## Spring Configuration


    The beans definitions that make up a Spring application are provided using XML
    files, annotations, Java-based Configuration annotations, or all of them together.
    XML was the first method for storing bean definitions that Spring used, probably
    because annotations had not yet been invented when Spring was. A form of annotation-based
    configuration was introduced in Spring 2.5, when annotations such as `@Component`,
    `@Service`, `@Repository`, also called stereotype annotations, were introduced
    to define common business beans. But the most common way to provide the configuration
    for a Spring application nowadays is Java-based Configuration, which introduces
    annotations such as `@Configuration`, `@Bean` for infrastructure beans beginning
    with Spring 3.0. The stereotype annotations and the Java Configuration annotations
    complement each other to provide a practical, non-XML way to define the configuration
    for a Spring application. XML configuration is still supported because of legacy
    code and to support diversity. Indeed, there are programmers who still prefer
    to completely decouple all configuration from code, and not writing extra code
    just for configuration and Java-based Configuration and/or annotations is not
    quite allowed.


    In this section, all aspects of configuration and dependency injection types will
    be covered, so get yourself a big cup of coffee (or tea) and start reading.


    ### Providing Configuration via XML


    In order to provide an XML configuration for a Spring application that will define
    one or more bean definitions, the file must use certain namespaces and respect
    the structure defined by them. A bean definition specifies the bean id, name,
    alias, type, arguments used for its initialization, dependencies, and many more
    items. The main namespace is the `beans` namespace, which specifies what a bean
    definition should look like. The namespace has a matching XSD, which needs to
    be added to the `<beans/>` element so that the configuration file can be validated
    according to the rules defined by it. A Spring XML configuration file must have
    at least this namespace defined. The code snippet below depicts the standard XML-based
    configuration metadata:


    ```

    ...

    xsi:schemaLocation="http://www.springframework.org/schema/beans

    http://www.springframework.org/schema/beans/spring-beans-4.3.xsd">

    ...

    ```


    A recommended (best) practice is not to do this, since the version will be correctly
    identified from the Spring dependency version in the project. Also, the other
    advantage is that you can upgrade the Spring version you are using, and the new
    definition specifications will be automatically supported in your configuration
    files without your having to modify them.


    For bean definitions to be read and for beans to be created and managed, many
    Spring-provided beans must be created too. That is why a few core Spring modules
    must be added as dependencies to your project:


    *   `spring-core`: fundamental parts of the Spring Framework

    *   `spring-beans`: together with `spring-core` provide the core components of
    the framework, including the Spring IoC and dependency Injection features.

    *   `spring-context`: expands the functionality of the previous two, and as the
    name says, it contains components that help build and use an application context.
    The `ApplicationContext` interface is part of this module, being the interface
    that every application context class implements.

    *   `spring-context-support`: provides support for integration with third-party
    libraries, for example Guava, Quartz, FreeMarker, and many more.

    *   `spring-expressions`: provides a powerful Expression Language (SpEL) used
    for querying and manipulating objects at runtime; for example, properties can
    be read from external sources decided at runtime and used to initialize beans.
    But this language is quite powerful, since it also supports logical and mathematical
    operations, accessing arrays, and manipulating collections.


    And now that you know where all the infrastructure components come from, we can
    return to the configuration details and show you what a bean definition looks
    like. The simplest bean definition looks like this:


    In the configuration `above` we just defined a bean with the id `simpleBean` of
    type `com.ps.SimpleBeanImpl` that has no dependencies. In order to define a bean
    with dependencies, we have to decide how those dependencies are injected. In Spring,
    there are two types of dependency injection specific to XML: via constructor and
    via setters, and one that can be used only using annotations and `Java Configuration`:
    field injection, which will be covered in the next section.'
