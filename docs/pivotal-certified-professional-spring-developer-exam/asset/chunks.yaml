    `InjectMock` 的行为类似于 Spring IoC，因为它的作用是实例化测试对象实例，并尝试将带有 `@Mock` 或 `@Spy` 注解的字段注入到测试对象的私有字段中。


    当测试类使用 `@RunWith(MockitoJUnitRunner.class)` 注解，并且使用 Mockito JUnit Runner 类来执行测试时，`MockitoAnnotations.initMocks(this);`
    这个初始化 mock 的调用就不再需要了，因为 Runner 会负责处理 mock 对象。


    此外，Mockito 提供了匹配器（matchers），可用于替换模拟环境准备所需的任何变量。这些匹配器是 `org.mockito.Mockito` 类中的静态方法，可以调用它们将任何参数替换为所需类型的伪值。对于常见类型，方法名称以
    `any` 为前缀（例如 `anyString()`, `anyLong()` 等），而对于其他所有对象类型，可以使用 `any(Class<T>)`。因此，下面这行代码：


    ```java

    Mockito.when(petRepo.findAllByOwner(owner)).thenReturn(sample);

    ```


    可以使用匹配器重写，无需 `owner` 变量：


    ```java

    Mockito.when(petRepo.findAllByOwner(any(User.class))).thenReturn(sample);

    ```


    ## PowerMock


    `PowerMock` 的出现是因为有时代码不可测试，可能是由于设计不佳或某些必要性。以下是一些不可测试元素的列表：


    *   静态方法

    *   具有静态初始化器的类

    *   最终类（final classes）和最终方法（final methods）；有时需要确保代码不会被误用，或确保对象被正确构造

    *   私有方法和字段


    `PowerMock` 在 Spring 应用程序中并不那么有用，因为在那里你很少会找到静态元素，但总会存在遗留代码和第三方库可能需要模拟，因此了解可以这样做以及使用的工具是合适的。如果你想了解更多，请访问他们的官方网站：[`https://github.com/jayway/powermock`](https://github.com/jayway/powermock)


    在测试应用程序时，所使用的技术和工具取决于应用程序的复杂性、开发人员的经验，以及最终的法律限制，因为有些公司被限制使用特定许可证下的软件。在开发职业生涯中，你可能会用到本书中提到的所有技术和库。对于非平凡的依赖和非平凡的接口，优先使用
    mock。当接口简单且行为重复时，优先使用 stub，同时 stub 可以记录和记录其使用情况。


    话虽如此，你可以切换到下一节，它将向你展示如何使用所有这些技术来测试 Spring 应用程序。


    ## 3.1 使用 Spring 进行测试


    Spring 提供了一个名为 `spring-test` 的模块，其中包含 Spring JUnit 测试支持类，可用于使测试 Spring 应用程序成为一项可管理的操作。该模块的核心类是
    `org.springframework.test.context.junit4.SpringJUnit4ClassRunner`，它用于在测试方法之间缓存
    `ApplicationContext`。所有测试都在相同的上下文中运行，使用相同的依赖项；因此这是集成测试。


    为了定义在 Spring 上下文中运行的测试类，需要执行以下操作：


    1.  使用 `@RunWith(SpringJUnit4ClassRunner.class)` 注解测试类。

    2.  使用 `@ContextConfiguration` 注解该类，以告知 Runner 类 bean 定义的来源。


    ```java

    // bean definitions are provided by class AllRepoConfig

    @ContextConfiguration(classes = {AllRepoConfig.class})

    public class GenericQualifierTest {...}

    // bean definitions are loaded from file all-config.xml

    @ContextConfiguration(locations = {"classpath:spring/all-config.xml"})

    public class GenericQualifierTest {...}

    ```


    > 注意：如果 `@ContextConfiguration` 未定义任何属性，Spring 的默认行为是在测试类所在的相同位置搜索名为 `{testClassName}-context.xml`
    的文件，并从该文件加载 bean 定义。


    3.  使用 `@Autowired` 注入要测试的 bean。


    这种测试方法在前一章中已经介绍过，用于测试基于 Java 配置的应用程序，但在本章中，你将了解如何操作配置，以便测试可以在测试上下文中运行。


