- fmt: '# 排版后的内容


    Even if we are using a stub, the following test is an integration test. All the
    test methods will run in the same Spring test context. The object to be tested
    and its dependencies are created only once, when the application context is created,
    and they are used by all methods. The object to be tested is a bean, and it is
    injected in the class testing it using `@Autowired`.


    ```java

    package com.ps.integration;

    import org.junit.Test;

    import org.junit.runner.RunWith;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.test.context.ContextConfiguration;

    import org.springframework.test.context.junit4.SpringJUnit4ClassRunner;

    import static com.ps.util.TestObjectsBuilder.buildUser;

    import static org.junit.Assert.assertEquals;

    import static org.junit.Assert.assertNotNull;

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(locations= {

    "classpath:spring/test-cfg.xml",

    "classpath:spring/pet-cfg.xml"} )

    public class SpringPetServiceTest{

    public static final Long PET_ID = 1L;

    public static final User owner =

    buildUser("test@gmail.com", "the_password", UserType.OWNER);

    @Autowired

    PetService simplePetService;

    //positive test, we know that a Pet with ID=1 exists

    @Test

    public void findByIdPositive() {

    Pet pet = simplePetService.findById(PET_ID);

    assertNotNull(pet);

    }

    //positive test, we know that pets for this owner exist and how many

    @Test

    public void findByOwnerPositive() {

    Set result = simplePetService.findAllByOwner(owner);

    assertEquals(result.size(), 2);

    }

    }

    ```


    The Spring test context is created using the two configuration files, which will
    make sure the stub dependency is the only one available to be injected into the
    `simplePetService` bean. As you can see, the `@Before` annotated method is no
    longer necessary. Also, there is no longer any need to manipulate the `petRepo`
    object, since it is created, initialized, and injected by Spring. So all that
    is left for the developer to do is to inject the bean being tested and jump right
    to writing tests.


    Something similar can be done when configuration is provided using Java Configuration,
    because the `@Bean` annotation can be used to declare attributes. In the following
    code snippet the XML files were replaced by configuration classes.


    ```java

    // replaces test-cfg.xml

    @Configuration

    public class TestAppConfig2 {

    @Bean(initMethod = "init")

    public PetRepo petRepo(){

    return new StubPetRepo();

    }

    }

    // replaces pet-cfg.xml

    public class PetConfigClass2 {

    @Bean

    public PetService simplePetService(){

    return new SimplePetService();

    }

    }

    ```


    The test class stays the same, only the attribute `locations` is replaced with
    `classes` in the `@ContextConfiguration` annotation, because the configuration
    is now provided using Java Configuration classes.


    ```java

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {TestAppConfig2.class,

    PetConfigClass2.class})

    // previous declaration replaces @ContextConfiguration(locations= {

    //   "classpath:spring/test-cfg.xml",

    //   "classpath:spring/pet-cfg.xml"} )

    public class SpringPetServiceTest2

    ...

    }

    ```


    Stereotype annotations can be added too. The `StubPetRepo` class must be defined
    as a bean, and the `init` method must be annotated with `@PostConstruct`. The
    `SimplePetService` class must also be defined as a bean, and the `repo` dependency
    must be autowired.


    ```java

    //StubPetRepo.java

    @Component

    public class StubPetRepo extends StubAbstractRepo implements PetRepo {

    @PostConstruct

    public void init(){

    // create a few entries to play with

    final User owner = buildUser("test@gmail.com", "the_password", UserType.OWNER);

    this.save(buildPet(owner, PetType.CAT, "John", 3, "0122345645"));

    this.save(buildPet(owner, PetType.DOG, "Max", 5, "0222335645"));

    }

    ...

    }

    //SimplePetService.java

    @Component

    public class SimplePetService extends SimpleAbstractService

    implements PetService {

    ...

    @Autowired

    public void setRepo(PetRepo petRepo) {

    this.repo = petRepo;

    }

    }

    ```


    The configuration classes must have scanning for components enabled and set to
    use exactly the packages we are interested in:


    ```java

    //PetConfigClass.java

    @Configuration

    @ComponentScan(basePackages = "com.ps.services.impl")

    public class PetConfigClass {

    }

    //TestAppConfig.java

    @Configuration

    @ComponentScan(basePackages = "com.ps.repo.stub")

    public class TestAppConfig {

    }

    ```


    The only thing that changes in the test class is the configuration for the `@ContextConfiguration`
    annotation; the autowiring of the tested components and the tests remain exactly
    the same.


    ```java

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {TestAppConfig.class, PetConfigClass.class})

    public class SpringPetServiceTest2 {

    ...

    }

    ```


    In Spring 3.1, the `org.springframework.test.context.support.AnnotationConfigContextLoader`
    class was introduced. This class loads bean definitions from annotated classes.
    So a configuration class can be created directly in the test class to create the
    beans needed to be tested in isolation. This is useful because configuration classes
    usually contain more than one bean definition, and loading them all just to test
    one is, well, inefficient. The class must be internal to the test class and static,
    and the `AnnotationConfigContextLoader` class must be used as a value for the
    `loader` attribute of the `@ContextConfiguration` annotation.


    Please look at the following code snippet:


    ```java

    package com.ps.integration;

    import

    org.springframework.test.context.support.AnnotationConfigContextLoader;

    ...

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(loader=AnnotationConfigContextLoader.class)

    public class SpringPetServiceTest3 {

    public static final Long PET_ID = 1L;

    public static final User owner = buildUser("test@gmail.com", "test",

    UserType.OWNER);

    @Configuration

    static class TestCtxConfig {

    @Bean

    StubPetRepo petRepo(){

    return new StubPetRepo();

    }

    @Bean

    PetService simplePetService(){

    SimplePetService petService = new SimplePetService();

    petService.setRepo(petRepo());

    return petService;

    }

    }

    @Autowired

    PetService simplePetService;

    @Test

    public void findByOwnerPositive() {

    Set result = simplePetService.findAllByOwner(owner);

    assertEquals(result.size(), 2);

    }

    }

    ```


    Also, Spring Test can be combined with mocking to write integration tests that
    skip heavy components, like the ones providing access to databases. To be able
    to cover this specific scenario, concrete implementations for the repository classes
    must be used. Since their implementation is irrelevant to this chapter and will
    be covered later in [Chapter 5](#A978-1-4842-0811-3_5_Chapter.html), Data Access,
    the full code will not be presented here. In order to manage `Pet` objects, a
    Repository class is needed. The most basic way to provide access to a database
    in Spring applications is to use a bean of type `org.springframework.jdbc.core.JdbcTemplate`,
    so repository classes will be created with a dependency of that type. The methods
    querying the database from this bean require an object that can map database records
    to entities, which is why each repository class should define an internal class
    implementing the Spring-specific mapping interface `org.springframework.jdbc.core.RowMapper<T>`.'
