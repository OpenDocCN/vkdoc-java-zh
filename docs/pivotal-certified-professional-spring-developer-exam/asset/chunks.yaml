- fmt: "配置远程服务器和客户端可以通过 XML 或 Java 配置完成。将要远程暴露的服务是定义在`09-ps-data-jpa`项目中的一个服务 bean，它使用\
    \ Spring Repository 来创建和查询用户。为了使用 Spring 设置通过 JRMP 协议通信的客户端和服务器端远程应用程序，需要执行以下步骤：\n\
    \n1.  配置一个继承`org.springframework.remoting.rmi.RmiServiceExporter`的 bean。\n   \
    \ 使用 XML：\n\n    使用 Java 配置：\n\n    ```java\n    //RmiServerConfig.java\n    import\
    \ org.springframework.remoting.rmi.RmiServiceExporter;\n    ...\n    @Configuration\n\
    \    public class RmiServerConfig {\n        @Autowired\n        @Qualifier(\"\
    userServiceImpl\")\n        UserService userService;\n        @Bean\n        public\
    \ RmiServiceExporter userService() {\n            RmiServiceExporter exporter\
    \ = new RmiServiceExporter();\n            exporter.setRegistryPort(1099);\n \
    \           exporter.setAlwaysCreateRegistry(true);\n            exporter.setServiceName(\"\
    userService\");\n            exporter.setServiceInterface(UserService.class);\n\
    \            exporter.setService(userService);\n            return exporter;\n\
    \        }\n    }\n    ```\n\n    前面定义的两个 bean 都设置了以下属性：\n\n    *   `registryPort`\
    \ – 导出 RMI 服务的注册表端口，默认值为 1099，因此此属性不是必须设置的，在示例中仅用于教学目的。\n    *   `alwaysCreateRegistry`\
    \ – 此属性的默认值为`false`。当客户端请求 RMI 服务时，会定位一个现有的注册表，如果未找到，则会创建它。如果将此属性设置为`true`，则会在客户端请求时创建注册表，以避免在没有客户端需要时定位现有注册表的开销。由于此属性的默认值为`false`，因此应用程序开发人员无需显式配置它。\n\
    \    *   `serviceName` – 导出的 RMI 服务默认可通过以下模板标识的位置访问：`rmi://host:port/serviceName`。服务名称由此属性设置，并且必须由应用程序开发人员显式设置。\n\
    \    *   `serviceInterface` – 此属性用于设置将作为 RMI 服务暴露的 bean 类型的接口；它必须由应用程序开发人员显式设置。\n\
    \    *   `service` – 此属性用于设置将作为 RMI 服务暴露的 bean；它必须由应用程序开发人员显式设置。\n\n2.  创建一个服务器应用程序，该应用程序将包含远程导出的\
    \ bean 和需要远程访问的应用程序 bean。\n\n    使用 XML，配置如下代码片段所示：\n\n    ```java\n    import\
    \ org.springframework.context.support.ClassPathXmlApplicationContext;\n    public\
    \ class RmiExporterBootstrap {\n        public static void main(String args) throws\
    \ Exception {\n            ClassPathXmlApplicationContext ctx =\n            \
    \    new ClassPathXmlApplicationContext(\n                    \"spring/rmi-server-config.xml\"\
    ,\n                    \"spring/app-config.xml\");\n            System.out.println(\"\
    RMI server started.\");\n            System.in.read();\n            ctx.close();\n\
    \        }\n    }\n    ```\n\n    `app-config.xml`包含需要在远程服务器上执行的所有服务和存储库 bean。\n\
    \n    使用 Java 配置，`RmiExporterBootstrap`类中声明的上下文需要按以下示例定义：\n\n    ```java\n   \
    \ import com.ps.config.ServiceConfig;\n    import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
    \    public class RmiExporterBootstrap {\n        public static void main(String\
    \ args) throws Exception {\n            AnnotationConfigApplicationContext ctx\
    \ =\n                new AnnotationConfigApplicationContext(\n               \
    \     RmiServerConfig.class, ServiceConfig.class);\n            System.out.println(\"\
    RMI reward network server started.\");\n            System.in.read();\n      \
    \      ctx.close();\n        }\n    }\n    ```\n\n    通过执行`RmiExporterBootstrap`类，将启动一个\
    \ Java 进程，该进程将在端口 1099 上提供一个名为`userService`的 RMI 服务。`System.in.read();`用于保持进程运行，直到用户按下某个键。\n\
    \n3.  配置一个类型为`org.springframework.remoting.rmi.RmiProxyFactoryBean`的 bean，它将负责创建客户端访问\
    \ RMI 服务所需的代理对象。使用 XML，配置如下代码片段所示。\n\n    使用 Java 配置的相同配置可以这样编写：\n\n    ```java\n\
    \    //RmiClientConfig.java\n    import org.springframework.remoting.rmi.RmiProxyFactoryBean;\n\
    \    @Configuration\n    public class RmiClientConfig {\n        @Bean\n     \
    \   public UserService userService() {\n            RmiProxyFactoryBean factoryBean\
    \ = new RmiProxyFactoryBean();\n            factoryBean.setServiceInterface(UserService.class);\n\
    \            factoryBean.setServiceUrl(\"rmi://localhost:1099/userService\");\n\
    \            factoryBean.afterPropertiesSet();\n            return (UserService)\
    \ factoryBean.getObject();\n        }\n    }\n    ```\n\n    在创建代理 bean 之前，必须初始化工厂\
    \ bean，这就是为什么在 Java 配置中必须显式调用`afterPropertiesSet()`方法。`serviceUrl`属性将设置为服务器提供\
    \ RMI 服务的 URL，`serviceInterface`属性应设置为 RMI 服务器 bean 正在实现的接口。此接口是工厂 bean 创建的代理将实现的接口，以允许客户端调用服务器`userService`\
    \ bean 上的远程方法。这就是为什么在该方法的最后一行，`factoryBean.getObject()`返回的对象被转换为`UserService`。\n\
    \n4.  创建一个将使用客户端工厂 bean 的客户端应用程序。最简单的方法是创建一个测试类，并注入`RmiProxyFactoryBean`将创建的客户端代理\
    \ bean：\n\n    ```java\n    //RmiTests.java\n    @ContextConfiguration(locations\
    \ = {\"classpath:spring/rmi-client-config.xml\"})\n    @RunWith(SpringJUnit4ClassRunner.class)\n\
    \    public class RmiTests {\n        @Autowired\n        private UserService\
    \ userService;\n        public void setUp() {\n            assertNotNull(userService);\n\
    \        }\n        @Test\n        public void testRmiAll() {\n            List\
    \ users = userService.findAll();\n            assertEquals(5, users.size());\n\
    \        }\n        @Test\n        public void testRmiJohn() {\n            User\
    \ user = userService.findByEmail(\"john.cusack@pet.com\");\n            assertNotNull(user);\n\
    \        }\n    }\n    ```\n\n    为了确保客户端实际使用了代理 bean，您只需在调试模式下运行其中一个测试方法，在断点处停止执行，然后查看`userService`\
    \ bean。在图 [7-5](#A978-1-4842-0811-3_7_Chapter.html#Fig5) 中，展示了来自 Intellij IDEA\
    \ 测试执行的屏幕截图。您可以清楚地看到`userService`实际上是由`RmiProxyFactoryBean`创建的 RMI 代理。\n\n   \
    \ ![A978-1-4842-0811-3_7_Fig5_HTML.jpg](A978-1-4842-0811-3_7_Fig5_HTML.jpg)\n\n\
    \    图 7-5. 在调试模式下执行的 RMI 测试屏幕截图\n\n    如果使用 Java 配置，`@ContextConfiguration`声明必须更改为以下内容：\n\
    \n    ```java\n    @ContextConfiguration(classes = RmiClientConfig.class)\n  \
    \  ```"
  raw: "Configuring the remote server and client can be done using XML or Java\nConfiguration.\
    \ The service that will be exposed remotely is a service\nbean defined in the\
    \ `09-ps-data-jpa`\nproject that uses a Spring Repository to create and query\
    \ users. In\norder to set up client and server remote applications using Spring\
    \ that\ncommunicate over the JRMP protocol, the following steps have to be\nexecuted:\n\
    \n1.  Configure a bean extending `org.springframework.remoting.rmi.RmiServiceExporter`.\n\
    \    Using XML:\n\nUsing Java Configuration:\n\n```\n    //RmiServerConfig.java\n\
    \    import org.springframework.remoting.rmi.RmiServiceExporter;\n    ...\n  \
    \  @Configuration\n    public class RmiServerConfig {\n    @Autowired\n    @Qualifier(\"\
    userServiceImpl\")\n    UserService userService;\n    @Bean\n    public RmiServiceExporter\
    \ userService() {\n    RmiServiceExporter exporter = new RmiServiceExporter();\n\
    \    exporter.setRegistryPort(1099);\n    exporter.setAlwaysCreateRegistry(true);\n\
    \    exporter.setServiceName(\"userService\");\n    exporter.setServiceInterface(UserService.class);\n\
    \    exporter.setService(userService);\n    return exporter;\n    }\n    }\n \
    \   ```\n\nBoth of the beans defined previously have the following properties\
    \ set:\n\n*   `registryPort` –\n        the port of the registry for the exported\
    \ RMI service, has the default\n        value of 1099, so this property is not\
    \ required to be set, and it is\n        used in the example just for pedagogical\
    \ purposes.\n\n*   `alwaysCreateRegistry`\n        – the default value for this\
    \ property is `false`. When a client\n        requests an RMI service, an existing\
    \ registry is located, and if not\n        found, it will be created. If this\
    \ property is set to true, the registry\n        will be created on client request,\
    \ to avoid the overhead of locating an\n        existing registry without any\
    \ client needing it. Since this property has\n        a default value of `false`,\
    \ it is not\n        required to be configured explicitly by the developer of\
    \ the\n        application.\n\n*   `serviceName` –\n        the exported RMI service\
    \ is accessible by default to a location\n        identified by the following\
    \ template: `rmi://host:port/serviceName`.\n        The service name is set by\
    \ this property and must be set explicitly by\n        the developer of the application.\n\
    \n*   `serviceInterface` –\n        this property is used to set the interface\
    \ of the bean type that will be\n        exposed as an RMI service; it must be\
    \ set explicitly by the developer of\n        the application.\n\n*   `service`\
    \ – this\n        property is used to set the bean that will be exposed as an\
    \ RMI service;\n        it must be set explicitly by the developer of the application.\n\
    \n2.  Create a server application that will contain the remote exported bean\n\
    \    and the application beans that need to be accessed remotely.\n\nUsing XML,\
    \ the configuration looks like the following snippet.\n\n```\n    import org.springframework.context.support.ClassPathXmlApplicationContext;\n\
    \    public class RmiExporterBootstrap {\n    public static void main(String args)\
    \ throws Exception {\n    ClassPathXmlApplicationContext ctx =\n    new ClassPathXmlApplicationContext(\n\
    \    \"spring/rmi-server-config.xml\",\n    \"spring/app-config.xml\");\n    System.out.println(\"\
    RMI server started.\");\n    System.in.read();\n    ctx.close();\n    }\n    }\n\
    \    ```\n\nThe `app-config.xml`\n    contains all the service and repository\
    \ beans needed to be executed on\n    the remote server.\n\nUsing Java Configuration,\
    \ the context declared in the class\n    RmiExporterBootstrap will have to be\
    \ defined as in the following sample:\n\n```\n    import com.ps.config.ServiceConfig;\n\
    \    import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
    \    public class RmiExporterBootstrap {\n    public static void main(String args)\
    \ throws Exception {\n    AnnotationConfigApplicationContext ctx =\n    new AnnotationConfigApplicationContext(\n\
    \    RmiServerConfig.class, ServiceConfig.class);\n    System.out.println(\"RMI\
    \ reward network server started.\");\n    System.in.read();\n    ctx.close();\n\
    \    }\n    }\n    ```\n\nBy executing the `RmiExporterBootstrap`\n    class,\
    \ a Java process will start that will provide an RMI service named\n    `userService`\
    \ on\n    port 1099\\. The `System.in.read();` is\n    used to keep the process\
    \ running until the user presses a key.\n\n3.  Configure a bean of type `org.springframework.remoting.rmi.RmiProxyFactoryBean`\n\
    \    that will take care of creating the proxy objects needed on the client\n\
    \    side to access the RMI service. Using XML, the configuration looks like\n\
    \    the following snippet.\n\nThe same configuration using Java Configuration\
    \ can be written like\n    this:\n\n```\n    //RmiClientConfig.java\n    import\
    \ org.springframework.remoting.rmi.RmiProxyFactoryBean;\n    @Configuration\n\
    \    public class RmiClientConfig {\n    @Bean\n    public UserService userService()\
    \ {\n    RmiProxyFactoryBean factoryBean = new RmiProxyFactoryBean();\n    factoryBean.setServiceInterface(UserService.class);\n\
    \    factoryBean.setServiceUrl(\"rmi://localhost:1099/userService\");\n    factoryBean.afterPropertiesSet();\n\
    \    return (UserService) factoryBean.getObject();\n    }\n    }\n    ```\n\n\
    Before creating the proxy bean, the factory bean must be initialized,\n    which\
    \ is why in the Java Configuration, the method `afterPropertiesSet()`\n    must\
    \ be called explicitly. The `serviceUrl` property\n    will be set with the URL,\
    \ where the server will provide the RMI service\n    and the `serviceInterface`\n\
    \    property should be set with the Interface that the RMI server bean is\n \
    \   implementing. This interface is the one that the proxy created by the\n  \
    \  factory bean will implement to allow the client to call remote methods\n  \
    \  on the server `userService` bean.\n    That is why in the last line of the\
    \ method, the object returned by `factoryBean.getObject()`\n    is cast to `UserService`.\n\
    \n4.  Create a client application that will use the client factory bean. The\n\
    \    easiest way to do this is to create a test class and inject the client\n\
    \    proxy bean that the `RmiProxyFactoryBean`\n    will create:\n\n```\n    //RmiTests.java\n\
    \    @ContextConfiguration(locations = {\"classpath:spring/rmi-client-config.xml\"\
