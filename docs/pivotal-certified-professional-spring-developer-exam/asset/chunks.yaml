    JDK 中包含的 JSR 250 注解（包`javax.annotations`）受支持。此外，在 Spring 3 中，添加了对 JSR 330[^(18)](#A978-1-4842-0811-3_2_Chapter.html#Fn18)的支持，并且
    Spring 注解是 JSR 330 注解的实现。每个包中注解的完整列表如图 [2-21](#A978-1-4842-0811-3_2_Chapter.html#Fig21)
    所示。其中大部分是 Java 注解，提供了 Spring 注解的最小行为。


