    \ correctly? A `java.sql.SQLException`\nis thrown, and the developer has to write\
    \ the appropriate code to treat\nit, of course, because it is a checked exception.\
    \ The traditional JDBC\nusage is redundant, prone to error, poor in exception\
    \ handling, and\noverall cumbersome to use.\n\nSpring Data Access\n\nWith Spring,\
    \ there is no need to write basic traditional JDBC code. The\nSpring framework\
    \ provides components that were created to remove the\nnecessity of “manually”\
    \ handling database connections. In writing\nenterprise applications (using Spring\
    \ or not), classes called\nrepositories are used to communicate with the database.\
    \ In Figure [5-2](#A978-1-4842-0811-3_5_Chapter.html#Fig2), you can\nsee the different\
    \ types of repository classes that can be used and the\npersistence framework\
    \ used as a bridge to the database.\n\n![A978-1-4842-0811-3_5_Fig2_HTML.jpg](A978-1-4842-0811-3_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2.\n\nHow repository classes interact with the database\n\nAs mentioned\
    \ earlier, data storage is a resource. Access to resources\nhas to be managed\
    \ properly to avoid bottlenecks. In software, the term\nbottleneck refers to a\
    \ situation\nin which multiple processes require access to a resource, and if\
    \ the\naccess to the resource is not managed properly, some processes end up\n\
    never having access to the resource. Using pure JDBC access to the\nresource,\
    \ the database is handled by the developer explicitly. Spring\ncomes in, together\
    \ with persistence frameworks, to unburden the\ndeveloper of this responsibility.\
    \ So, let’s begin with the most basic\nway of accessing data using Spring: using\
    \ a JDBC repository class.\n\nIntroducing JdbcTemplate\n\nThe Spring Framework’s\
    \ JDBC abstraction framework consists of four main\npackages: `core`,\n`datasource`,\n\
    `object`, and\n`support`.[²](#A978-1-4842-0811-3_5_Chapter.html#Fn2) There\nis\
    \ also a small `config` package\ncontaining two infrastructure beans used in the\
    \ configuration of a\nSpring JDBC environment. Spring simplifies the code that\
    \ needs to be\nwritten in using JDBC to interact with a database by introducing\
    \ the\n`org.springframework.jdbc.core.JdbcTemplate`\nclass, which is part of the\
    \ `core` package. This\nclass hides large amounts of JDBC boilerplate code and\
    \ unburdens the\ndeveloper of connection management, since database connections\
    \ are\nacquired and released automatically. The `datasource` package\ncontains\
    \ utility classes for `DataSource` management\nand a few simple `DataSource`\n\
    implementations that can be used for testing. The `object` package\ncontains classes\
    \ that represent RDBMS queries, updates, and stored\nprocedures as thread-safe,\
    \ reusable objects. The `support` package\nprovides SQLException translation functionality\
    \ and some utility\nclasses. Exception handling is covered, providing clear exceptions\
    \ with\nroot causes always being reported and also making sure that resources\n\
    are always released properly, even in case of failures. The `JdbcTemplate` class\
    \ is\ndesigned according to the template\nmethod pattern, which is a behavioral\
    \ design pattern that defines\nthe skeleton of an algorithm, the effective implementation\
    \ being defined\nlater or delegated to subclasses.[³](#A978-1-4842-0811-3_5_Chapter.html#Fn3)\n\
    \nThe simplest example that can be used to demonstrate how the `JdbcTemplate`\
    \ can be\nused will be covered in this section. For this, we need the following:\n\
    \n*   a configuration file containing the database details, let’s call it\n  \
    \  db.properties:\n\n```\n    #db.properties contents\n    # For running application\
    \ with H2 in memory database\n    driverClassName=org.h2.Driver\n    url=jdbc:h2:∼/sample\n\
    \    username=sample\n    password=sample\n    ```\n\n*   configuration files\
    \ containing SQL queries for initializing the database\n    structure: schema.sql\
    \ containing\n    SQL code for creating tables and test-data.sql containing insert\n\
    \    statements that populate the tables with some initial data. The content\n\
    \    of the files is not relevant for this chapter, but they are part of the\n\
    \    `05-ps-jdbc-practice`\n    project.\n\n*   a configuration class for the\
    \ test database, let’s call it `TestDataConfig`. This\n    configuration class\
    \ will contain all the beans necessary to create a\n    `dataSource`\n    bean.\
    \ We will be using an in-memory database called H2\\. The following\n    configuration\
    \ seems complicated, but this offers the possibility to\n    define the connection\
    \ URL and the credentials to access the database. At\n    this point, the db.properties\n\
    \    configuration file can just be replaced with a file describing a\n    different\
    \ type of database, and the rest of the application will still\n    work. The\
    \ `dataSource` bean is of\n    type `SimpleDriverDataSource`,\n    which is a\
    \ simple Spring-specific implementation of `javax.sql.DataSource`.\n    Two specialized\
    \ Spring beans are used to initialize the `dataSource` bean,\n    `DataSourceInitializer`,\n\
    \    and to populate the `dataSource` bean,\n    `DatabasePopulator` .\n\n```\n\
    package com.ps.config;\nimport org.springframework.beans.factory.annotation.Value;\n\
    import org.springframework.context.annotation.*;\nimport org.springframework.context.support.PropertySourcesPlaceholderConfigurer;\n\
    import org.springframework.core.io.Resource;\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
