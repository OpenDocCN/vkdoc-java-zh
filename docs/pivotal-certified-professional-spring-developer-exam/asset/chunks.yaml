    ## Testing Spring Applications


    Before an application is delivered to the client, it has to be tested and validated
    for use by a team of professionals called testers. As you can imagine, testing
    an application after development is complete is a little too late, because perhaps
    specifications were not understood correctly, or were not complete. Also, the
    behavior of an application on an isolated development system differs considerably
    from the behavior on a production system. That is why there are multiple testing
    steps that have to be taken, some of them even before development. And there is
    also the human factor. Since no one is perfect, mistakes are made, and testing
    helps find those mistakes and fix them before the application reaches the end
    user, thus ensuring the quality of the software. The purpose of software testing
    is to verify that an application satisfies the functional (application provides
    the expected functions) and nonfunctional (application provides the expected functions
    as fast as expected and does not require more memory than is available on the
    system) requirements and to detect errors, and all activities of planning, preparation,
    evaluation, and validation are part of it.


    There are specific courses and certifications for testers that are designed to
    train them in functional and software testing processes that they can use to test
    an application, and the `ISTQB` is the organization that provides the infrastructure
    for training and examination.


    ### A Few Types of Testing


    There are multiple types of testing classified by the development step in which
    they are executed, or by their implementation, but it is not the object of this
    book to cover them all. Only those that imply writing actual code using testing
    libraries and frameworks will be covered.


    ### Test-Driven Development


    Quality starts at the beginning of a project. Requirements and specifications
    are decided and validated, and based on them a process called Test-Driven Development
    can be executed. This process implies creation of tests before development of
    code. The tests will initially fail, but will start to pass one by one as the
    code is developed. The tests decide how the application will behave, and thus
    this type of testing is called test-driven development. This is a type of testing
    that ensures that the specifications were understood and implemented correctly.
    The tests for this process are designed by business analysts and implemented by
    developers. This approach puts the design under question: if tests are difficult
    to write, the design should be reconsidered. It is more suitable to JavaScript
    applications (because there is no compilation of the code), but it can be used
    in Java applications too when the development is done using interfaces.


    In Figure 3-1, the test-driven development process is described for exactly one
    test case.


    ![A978-1-4842-0811-3_3_Fig1_HTML.jpg](A978-1-4842-0811-3_3_Fig1_HTML.jpg)


    **Figure 3-1.** Test-driven development logical schema'
