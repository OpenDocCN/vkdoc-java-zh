    \ 表示开始。然后使用智能编辑器（如 IntelliJ IDEA 或 Eclipse）生成一个简单的 XSD 模式，该模式可以进一步定制。从这一点开始，开发步骤与列表中下一个选项相同。（这是开发本节所涵盖的\
    \ Web 服务所使用的方法。）\n\n*   从 XML 模式开始：在这种方法中，开发从定义 XML 数据结构的 XML 模式（XSD 文件）开始，这些数据结构将用作\
    \ Web 服务操作中的参数和返回类型。智能编辑器应为您提供一个选项，以生成表示 Web 服务应用程序要处理的对象所需的 Java 类。或者，可以使用 Java\
    \ `xjc` 实用程序，稍后将介绍该实用程序。在 IntelliJ IDEA 中，右键单击 `*.xsd` 文件时出现的 WebServices 菜单下有两个代码生成选项：使用\
    \ JAXB¹⁰ 生成和使用 XMLBeans¹¹ 生成。\n\n*   从 Java 类开始：在这种方法中，可以使用智能编辑器或稍后将介绍的 Java `xjc`\
    \ 实用程序从现有代码生成 XSD 模式和 WSDL。\n\n*   从 WSDL 开始：这也称为“契约优先”或“自顶向下”方法，在这种方法中，您首先定义\
    \ Web 服务契约或使用预先存在的契约。如果您有一个 `*.wsdl` 文件，您可以使用智能编辑器从 Wsdl 生成 Java 代码，或者使用稍后将介绍的\
    \ Java `xjc` 实用程序。（IntelliJ IDEA 在 WebServices 菜单项下提供了此选项。）\n\nXSD 模式定义了 Web 服务域以及可以使用\
    \ Web 服务执行的操作。Spring-WS 会自动将此模式导出为 WSDL（Web 服务描述语言）。对于 `14-ps-ws-sample` 中的应用程序，XSD\
    \ 模式将包含一个操作，该操作使用用户的电子邮件来提取用户类型。XSD 模式位于 `src/main/resources/sample` 下，名为 `userMessage`。该项目是使用\
    \ Spring Boot 创建的，以便将重点放在契约的实现上，而不是应用程序基础设施上。\n\n在图 7-16 中，描绘了一个客户端和服务器 WS 应用程序以及它们的通信方式。\n\
    \n![A978-1-4842-0811-3_7_Fig16_HTML.jpg](img/A978-1-4842-0811-3_7_Fig16_HTML.jpg)\n\
    \n图 7-16.\n\nSpring WS 客户端/服务器应用程序\n\n现在消息结构已经定义，下一步是为其生成支持类。\n\n使用 XJC 生成 Java\
    \ 代码\n\nJDK 附带了一个名为 `xjc` 的可执行实用程序。此可执行文件可用于使用 XSD 模式生成在 Web 服务应用程序中使用的类。这可以通过手动运行可执行文件或创建一个\
    \ Gradle 任务来为您完成。在 `14-ps-ws-sample` 项目中，有一个 `README.adoc` 文件，其中包含用于生成所需 Java\
    \ 类并将其保存在名为 `jaxb` 的附加源目录中的 xjc 命令。默认情况下，这些类是使用 JAXB 生成的，因此带有 JAXB 注解。\n\n```\n\
    xjc -d src/main/jaxb -p com.ps.ws src/main/resources/sample/userMessage.xsd\n\
    ```\n\n像 Intellij IDEA 这样的智能编辑器具有从内置 XSD 模式生成 Java 代码的能力。只需选择 `userMessages.xsd`\
    \ 文件并右键单击。在出现的菜单中，有一个 `WebServices` 选项。单击它，它将展开。在子菜单中，有一个 `使用 JAXB 从 XML 模式生成\
    \ Java 代码`。选择此项后，将出现一个弹出窗口，要求提供包名和保存类的位置。如果您打开 UserMessage 类，您会注意到到处都是特定的 JAXB\
    \ 注解，这些注解说明了该类型的对象将如何被序列化和反序列化：\n\n```\nimport javax.annotation.Generated;\nimport\
    \ javax.xml.bind.annotation.XmlAccessType;\nimport javax.xml.bind.annotation.XmlAccessorType;\n\
    import javax.xml.bind.annotation.XmlAttribute;\nimport javax.xml.bind.annotation.XmlElement;\n\
    import javax.xml.bind.annotation.XmlSchemaType;\nimport javax.xml.bind.annotation.XmlType;\n\
    @XmlAccessorType(XmlAccessType.FIELD)\n@XmlType(name = \"userMessage\",\nnamespace\
    \ = \"http://ws-boot.com/schemas/um\",\npropOrder = {\n\"email\",\n\"rating\"\
    ,\n\"userType\"\n})\n@Generated(value = \"com.sun.tools.internal.xjc.Driver\"\
    ,\ndate = \"2016-10-16T08:23:57+03:00\",\ncomments = \"JAXB RI v2.2.8-b130911.1802\"\
    )\npublic class UserMessage {\n@XmlElement(namespace = \"http://ws-boot.com/schemas/um\"\
    ,\nrequired = true)\n@Generated(value = \"com.sun.tools.internal.xjc.Driver\"\
    ,\ndate = \"2016-10-16T08:23:57+03:00\",\ncomments = \"JAXB RI v2.2.8-b130911.1802\"\
    )\nprotected String email;\n@XmlElement(namespace = \"http://ws-boot.com/schemas/um\"\
    )\n@Generated(value = \"com.sun.tools.internal.xjc.Driver\",\ndate = \"2016-10-16T08:23:57+03:00\"\
    ,\ncomments = \"JAXB RI v2.2.8-b130911.1802\")\nprotected double rating;\n...\n\
    }\n```\n\n有关 JAXB 的更多信息，请访问 JAXB 官方网站 [`https://jaxb.java.net/`](https://jaxb.java.net/)\
    \ 。\n\nSpring Boot WS 应用程序\n\n在图 7-17 中，您可以看到 `14-ps-ws-sample` 应用程序的结构。\n\n![A978-1-4842-0811-3_7_Fig17_HTML.jpg](img/A978-1-4842-0811-3_7_Fig17_HTML.jpg)\n\
    \n图 7-17.\n\nSpring WS 应用程序的结构\n\n`com.ps.start` 将 Spring Boot 组件组合在一起。\n\n`src/main/java`\
    \ 目录下的 `com.ps.ws` 将开发人员编写的与 WS 通信相关的类组合在一起：\n"
- fmt: "# Spring Web Services 配置与端点\n\n## WebServiceConfig 配置类\n\n`WebServiceConfig`是\
    \ WS 应用程序的配置类。该类继承自 Spring WS 的`org.springframework.ws.config.annotation.WsConfigurerAdapter`，它是\
    \ Web 服务核心配置接口`org.springframework.ws.config.annotation.WsConfigurer`的 Spring\
    \ 裸实现（空方法）。该接口定义了回调方法，用于自定义通过`@EnableWs`启用的 Spring Web Services 的基于 Java 的配置。\n\
    \n```java\nimport org.springframework.boot.web.servlet.ServletRegistrationBean;\n\
    import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.core.io.ClassPathResource;\n\
    import org.springframework.ws.config.annotation.EnableWs;\nimport org.springframework.ws.config.annotation.WsConfigurerAdapter;\n\
    import org.springframework.ws.transport.http.MessageDispatcherServlet;\nimport\
    \ org.springframework.ws.wsdl.wsdl11.DefaultWsdl11Definition;\nimport org.springframework.xml.xsd.SimpleXsdSchema;\n\
    import org.springframework.xml.xsd.XsdSchema;\n\n@Configuration\n@EnableWs\npublic\
    \ class WebServiceConfig extends WsConfigurerAdapter {\n    @Bean\n    public\
    \ ServletRegistrationBean messageDispatcherServlet(ApplicationContext applicationContext)\
    \ {\n        MessageDispatcherServlet servlet = new MessageDispatcherServlet();\n\
    \        servlet.setApplicationContext(applicationContext);\n        servlet.setTransformWsdlLocations(true);\n\
    \        return new ServletRegistrationBean(servlet, \"/ws/*\");\n    }\n\n  \
    \  @Bean(name = \"userMessage\")\n    public DefaultWsdl11Definition defaultWsdl11Definition(XsdSchema\
    \ userMessageSchema) {\n        DefaultWsdl11Definition wsdl11Definition = new\
    \ DefaultWsdl11Definition();\n        wsdl11Definition.setPortTypeName(\"UsersPort\"\
    );\n        wsdl11Definition.setLocationUri(\"/ws\");\n        wsdl11Definition.setTargetNamespace(UserMessageEndpoint.NAMESPACE_URI);\n\
    \        wsdl11Definition.setSchema(userMessageSchema);\n        return wsdl11Definition;\n\
    \    }\n\n    @Bean\n    public XsdSchema userMessageSchema() {\n        return\
    \ new SimpleXsdSchema(new ClassPathResource(\"sample/userMessage.xsd\"));\n  \
    \  }\n}\n```\n\n`org.springframework.ws.server.endpoint.adapter.DefaultMethodEndpointAdapter`\
    \ bean 用于启用后处理器 bean，这些 bean 将处理用于配置 WS 端点的`@Endpoint`、`@RequestPayload`、`@PayloadRoot`和`@ResponsePayload`注解。`messageDispatcherServlet`\
    \ bean 用于拦截 SOAP 请求。必须将应用程序上下文注入此 bean，以便能够自动检测 Spring bean。此 bean 不会覆盖默认的`dispatcherServlet`\
    \ bean，因此也可以为此应用程序设置 Web 界面；配置了两个 servlet 后，此 Web 应用程序可以处理正常的 Web 请求和 Web 服务请求。`DefaultWsdl11Definition`使用通过`userMessage.xsd`模式实例化的`SimpleXsdSchema`实例公开\
    \ WSDL 1.1。\n\n## UserMessageEndpoint 端点类\n\n`UserMessageEndpoint`类使用 Spring 专用注解`@Endpoint`进行注解，该注解将此类标记为将处理\
    \ SOAP 消息的 Web 服务端点。使用`@Endpoint`注解的类以类似方式处理 WS 请求，而使用`@Controller`注解的类处理 Web\
    \ 请求。\n\n```java\nimport com.ps.ws.GetUserRequest;\nimport com.ps.ws.GetUserResponse;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.ws.server.endpoint.annotation.Endpoint;\n\
    import org.springframework.ws.server.endpoint.annotation.PayloadRoot;\nimport\
    \ org.springframework.ws.server.endpoint.annotation.RequestPayload;\nimport org.springframework.ws.server.endpoint.annotation.ResponsePayload;\n\
    \n@Endpoint\npublic class UserMessageEndpoint {\n    public static final String\
    \ NAMESPACE_URI = \"http://ws-boot.com/schemas/um\";\n\n    @Autowired\n    private\
    \ UserMessageRepository userMessageRepository;\n\n    @Autowired\n    public UserMessageEndpoint(UserMessageRepository\
    \ userMessageRepository) {\n        this.userMessageRepository = userMessageRepository;\n\
    \    }\n\n    @PayloadRoot(namespace = NAMESPACE_URI, localPart = \"getUserRequest\"\
    )\n    @ResponsePayload\n    public GetUserResponse getUser(@RequestPayload GetUserRequest\
    \ request) {\n        GetUserResponse response = new GetUserResponse();\n    \
    \    response.setUserType(userMessageRepository.findUserType(request.getEmail()));\n\
    \        return response;\n    }\n}\n```\n\n`@Payload`注解将端点方法标记为传入请求的处理程序，Spring\
    \ WS 根据消息的`namespace`和`localPart`来识别它。\n\n`@ResponsePayload`注解指定 Spring WS 应将返回值映射到响应负载。\n\
    \n`@RequestPayload`注解指定传入消息将映射到方法的`request`参数。\n\n位于`src/main/jaxb`下的`com.ps.ws`包（在图\
    \ 7-17 中用红色圈出）包含使用`xjc`生成的类。每次修改`userMessage.xsd`模式时，都必须重新生成这些类。\n\n## 发布 WSDL\n\
    \nWSDL 定义了一个由端点组成的网络接口，这些端点接收消息，然后有时回复消息。WSDL 描述了端点以及请求和回复消息。Spring-WS 在使用`DefaultWsdl11Definition`\
    \ bean 时自动从 XSD 生成 WSDL，可以通过 URL `http://<host>:<port>/ws/userMessage.wsdl`访问，并在运行时动态生成。`DefaultWsdl11Definition`从\
    \ XSD 模式构建 WSDL。此定义遍历模式中找到的所有`element`元素，并为所有元素创建`message`。接下来，它为所有以定义的请求或响应后缀结尾的消息创建\
    \ WSDL 操作。建议在生产应用程序中使用静态 WSDL 文件，并通过`org.springframework.ws.wsdl.wsdl11.SimpleWsdl11Definition`类型的\
    \ bean 公开它，因为生成 WSDL 文件可能需要很长时间。在开发期间，在运行时生成它很有用，因为如果契约发生变化，WSDL 必须适应。\n\nWSDL\
    \ 信息的可访问位置取决于`DefaultWsdl11Definition` bean。基本上，WSDL 信息可以在如下定义的位置找到：`http://<host>:<port>/[locationUri]/[DefaultWsdl11Definition_bean_id].wsdl`\n\
    \n对于到目前为止描述的应用程序，WSDL 信息可以在`http://localhost:8080/ws/userMessage.wsdl`找到，当在浏览器中打开时，会显示\
    \ XSD 模式中的所有信息以及一些与服务器相关的其他信息，例如 SOAP 端点地址。该地址是相对于用于访问 WSDL 信息的 URL 生成的，因为`DefaultWsdl11Definition`\
    \ bean 的`transformWsdlLocations`属性设置为`true`。以下 XML 片段是 Spring WS 为`14-ps-ws-sample`应用程序生成的\
    \ WSDL 的一部分。\n\n```xml\n...\n```\n\n## 测试 Web 服务应用程序"
  raw: "*   the configuration of WS application, the `WebServiceConfig`.\n    This\
    \ class extends the Spring WS `org.springframework.ws.config.annotation.WsConfigurerAdapter`,\n\
    \    which is a Spring naked (empty methods) implementation of the web\n    services\
    \ core configuration interface `org.springframework.ws.config.annotation.WsConfigurer`.\n\
    \    This interface defines callback methods to customize the Java-based\n   \
    \ configuration for Spring Web Services enabled using the `@EnableWs`.\n\n```\n\
    \    import org.springframework.boot.web.servlet.ServletRegistrationBean;\n  \
    \  import org.springframework.context.ApplicationContext;\n    import org.springframework.context.annotation.Bean;\n\
    \    import org.springframework.context.annotation.Configuration;\n    import\
    \ org.springframework.core.io.ClassPathResource;\n    import org.springframework.ws.config.annotation.EnableWs;\n\
    \    import org.springframework.ws.config.annotation.WsConfigurerAdapter;\n  \
    \  import org.springframework.ws.transport.http.MessageDispatcherServlet;\n  \
    \  import org.springframework.ws.wsdl.wsdl11.DefaultWsdl11Definition;\n    import\
    \ org.springframework.xml.xsd.SimpleXsdSchema;\n    import org.springframework.xml.xsd.XsdSchema;\n\
    \    @Configuration\n    @EnableWs\n    public class WebServiceConfig extends\
    \ WsConfigurerAdapter {\n    @Bean\n    public ServletRegistrationBean messageDispatcherServlet\n\
    \    (ApplicationContext applicationContext) {\n    MessageDispatcherServlet servlet\
    \ = new MessageDispatcherServlet();\n    servlet.setApplicationContext(applicationContext);\n\
    \    servlet.setTransformWsdlLocations(true);\n    return new ServletRegistrationBean(servlet,\
    \ \"/ws/*\");\n    }\n    @Bean(name = \"userMessage\")\n    Public DefaultWsdl11Definition\
    \ defaultWsdl11Definition\n    (XsdSchema userMessageSchema) {\n    DefaultWsdl11Definition\
    \ wsdl11Definition = new DefaultWsdl11Definition();\n    wsdl11Definition.setPortTypeName(\"\
    UsersPort\");\n    wsdl11Definition.setLocationUri(\"/ws\");\n    wsdl11Definition.setTargetNamespace(UserMessageEndpoint.NAMESPACE_URI);\n\
    \    wsdl11Definition.setSchema(userMessageSchema);\n    return wsdl11Definition;\n\
    \    }\n    @Bean\n    public XsdSchema userMessageSchema() {\n    return new\
    \ SimpleXsdSchema(new ClassPathResource(\"sample/userMessage.xsd\"));\n    }\n\
    \    }\n    ```\n\nThe `org.springframework.ws.server.endpoint.adapter.DefaultMethodEndpointAdapter`\n\
    \    bean is used to enable the postprocessor beans that will process the\n  \
    \  `@Endpoint, @RequestPayload, @PayloadRoot,` and `@ResponsePayload`\n    annotations\
    \ that are used to configure a WS endpoint. The `messageDispatcherServlet`\n \
    \   bean is used to intercept SOAP requests. The application context must be\n\
    \    injected into this bean in order to be able to detect Spring beans\n    automatically.\
    \ This bean does not override the default `dispatcherServlet`\n    bean, so a\
    \ web interface can be set up for this application as well;\n    with both servlets\
    \ configured, this web application could handle normal\n    web requests and web\
    \ services requests. The `DefaultWsdl11Definition`\n    exposes a WSDL 1.1 using\
    \ an instance of `SimpleXsdSchema`\n    instantiated with the `userMessage.xsd`\n\
    \    schema.\n\n*   The `UserMessageEndpoint`\n    class is annotated with the\
    \ Spring specialized annotation `@Endpoint`, which\n    marks this class as a\
    \ web service endpoint that will process SOAP\n    messages. Classes annotated\
    \ with `@Endpoint` handle WS\n    requests in a similar manner, while classes\
    \ annotated with `@Controller` handle\n    web requests.\n\n```\n    import com.ps.ws.GetUserRequest;\n\
    \    import com.ps.ws.GetUserResponse;\n    import org.springframework.beans.factory.annotation.Autowired;\n\
    \    import org.springframework.ws.server.endpoint.annotation.Endpoint;\n    import\
    \ org.springframework.ws.server.endpoint.annotation.PayloadRoot;\n    import org.springframework.ws.server.endpoint.annotation.RequestPayload;\n\
    \    import org.springframework.ws.server.endpoint.annotation.ResponsePayload;\n\
    \    @Endpoint\n    public class UserMessageEndpoint {\n    public static final\
    \ String NAMESPACE_URI = \"http://ws-boot.com/schemas/um\";\n    @Autowired\n\
    \    private UserMessageRepository userMessageRepository;\n    @Autowired\n  \
    \  public UserMessageEndpoint(UserMessageRepository userMessageRepository) {\n\
    \    this.userMessageRepository = userMessageRepository;\n    }\n    @PayloadRoot(namespace\
    \ = NAMESPACE_URI, localPart = \"getUserRequest\")\n    @ResponsePayload\n   \
    \ public GetUserResponse getUser(@RequestPayload GetUserRequest request) {\n \
    \   GetUserResponse response = new GetUserResponse();\n    response.setUserType(userMessageRepository.findUserType(request.getEmail()));\n\
    \    return response;\n    }\n    }\n    ```\n\nThe `@Payload`\n    annotation\
    \ marks an endpoint method as the handler for an incoming\n    request and is\
    \ identified by Spring WS based on the message’s `namespace` and the\n    `localPart`.\n\
    \nThe `@ResponsePayload`\n    annotation specifies that Spring WS should map the\
    \ returned value to the\n    response payload.\n\nThe `@RequestPayload`\n    annotation\
    \ specifies that the incoming message will be mapped to the\n    `request`\n \
    \   parameter of the method.\n\nThe `com.ps.ws`\npackage under `src/main/jaxb`,\
    \ which\nis circled with red in Figure [7-17](#A978-1-4842-0811-3_7_Chapter.html#Fig17),\n\
    contains the classes generated with `xjc`. They have to be\nregenerated every\
    \ time the `userMessage.xsd`\nschema is modified.\n\nPublishing WSDL\n\nWSDL defines\
    \ a network interface that consists of endpoints that get\nmessages and then sometimes\
    \ reply with messages. WSDL describes the\nendpoints, and the request and reply\
    \ messages. Spring-WS automatically\ngenerates WSDL from XSD when using a `DefaultWsdl11Definition`\n\
    bean, which can be accessed at the URL `http://<host>:<port>/ws/userMessage.wsdl`\n\
    and is generated dynamically at runtime. The Default- Wsdl11Definition\nbuilds\
    \ a WSDL from an XSD schema. This definition iterates over all\n`element`\nelements\
    \ found in the schema, and creates a `message` for all\nelements. Next, it creates\
    \ a WSDL operation for all messages that end\nwith the defined request or response\
    \ suffix. The recommendation is to\nuse a static WSDL file on production applications\
    \ and expose it using a\nbean of type `org.springframework.ws.wsdl.wsdl11.SimpleWsdl11Definition`,\n\
    since generating a WSDL file might take a long time. During development,\nhaving\
    \ it generated at runtime is useful, because if the contract\nchanges, the WSDL\
    \ must adapt.\n\n!\n\nThe location where the WSDL information can be accessed\
    \ depends on the\n`DefaultWsdl11Definition`\nbean. Basically, the WSDL information\
    \ can be found at the location\ndefined like this: `http://<host>:<port>/[locationUri]/[DefaultWsdl11Definition_bean_id].wsdl`\n\
    \nFor the application described so far, the WSDL information can be found\nat\
    \ `http://localhost:8080/ws/`\n`userMessage.wsdl`, and\nwhen opened in a browser,\
    \ all the information in the XSD schema and some\nother information related to\
    \ the server, such as the SOAP endpoint\naddress, are shown. The address is generated\
    \ relative to the URL used to\naccess the WSDL information, because the `transformWsdlLocations`\n\
    property of the `DefaultWsdl11Definition`\nbean is set to `true`. The next XML\n\
    snippet is a piece of the WSDL generated by Spring WS for the `14-ps-ws-sample`\n\
    application.\n\n```\n\n...\n\n```\n\nTesting Web Services applications"
