- fmt: '# Microservices Architecture and Eureka Server


    The microservices architecture ensures that a set of processes will work together
    toward a common goal, providing the end user a competent and reliable service.
    For this to work, the processes must communicate efficiently. To communicate with
    each other, they first have to know "of" each other. This is where the Netflix
    Eureka registration server comes in. And because it is open-source, it was incorporated
    in Spring Cloud, and the simplicity principles of Spring now apply. A registration
    or discovery server that will be used by the processes of a microservices application
    to register and discover each other can be declared as in the following snippet,
    which is part of the `17-ps-micro-sample`.


    ```java

    package com.ps.server;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.ConfigurableApplicationContext;

    import org.springframework.cloud.netflix.eureka.server.EnableEurekaServer;

    import java.io.IOException;

    @SpringBootApplication

    @EnableEurekaServer

    public class DiscoveryServer {

    private static Logger logger =

    LoggerFactory.getLogger(DiscoveryServer.class);

    public static void main(String args) throws IOException {

    // Tell server to look for discovery.properties or discovery.yml

    System.setProperty("spring.config.name",  "discovery");

    ConfigurableApplicationContext ctx =

    SpringApplication.run(DiscoveryServer.class,  args);

    assert (ctx != null);

    logger.info("Started ...");

    System.in.read();

    ctx.close();

    }

    }

    ```


    The `System.in.read();` call is used so that you can stop the application gracefully
    by pressing the `<ENTER>` key.


    To use the `Eureka Server` in a project, the `spring-cloud-starter-eureka-server`
    starter project must be included as a dependency of the project. Notice the `@EnableEurekaServer`
    annotation, which is responsible for injecting a Eureka server instance into your
    project. The server has a home page with a UI and HTTP API endpoints according
    to the normal Eureka functionality under `/eureka/*`.


    The `discovery.yml` file contains settings for this server. By default, Spring
    Boot looks for a file named `application` from which to read the configuration.
    To specify that the configuration should be read from a different file, the name
    of the file must be added as a value for the system property `spring.config.name`,
    by calling `System.setProperty("spring.config.name", "discovery");` before creating
    the Spring context.


    ```yaml

    eureka:

    instance:

    hostname: localhost

    client:

    registerWithEureka: false # do not auto-register as client

    fetchRegistry: false

    server:

    port: 3000 # where this discovery server is accessible

    waitTimeInMsWhenSyncEmpty: 0

    ```


    If the `port` value is not specified, the default value for the port is implicitly
    set to `8761`. (In the above example, the port is set to 3000 just as an example.)


    The server will be available on the 3000 port, and when the above class is run,
    the server interface depicting a few stats and registered microservices becomes
    accessible from the browser at location `http://localhost:3000/`. Figure 8-2 depicts
    the interface of a naked Eureka Server, with no microservices registered yet.


    ![A978-1-4842-0811-3_8_Fig2_HTML.jpg](A978-1-4842-0811-3_8_Fig2_HTML.jpg)


    **Figure 8-2.** Spring Eureka web interface


    Netflix''s original version of the Eureka Server avoids answering clients for
    a configurable period of time if it starts with an empty registry. The `waitTimeInMsWhenSyncEmpty`
    property controls this behavior, and it was designed so that clients would not
    get partial/empty registry information until the server has had enough time to
    build the registry. In the previous example, it is set to zero, to start answering
    clients as soon as possible.


    If not set, the default value for the `server.waitTimeInMsWhenSyncEmpty` is 5
    minutes.


    The `eureka.client.registerWithEureka` property has "true" as a default value
    and is used to register Eureka clients. Since the application above registers
    a server, it must be explicitly set to "false" to stop the server from trying
    to register itself.


    Now that we have the server, the microservices must be developed.


    ## Microservices Development


    To create a microservice, a service implementation and a class that will interact
    with the registration and discovery server to register itself as client are needed.
    The implementation of the service is a typical Spring service, and in our example
    we''ll have three microservices: one that will handle users, one that will handle
    pets, and one that will connect the functionality of the two. In Figure 8-3, a
    schema of how these microservices interact is depicted.


    ![A978-1-4842-0811-3_8_Fig3_HTML.jpg](A978-1-4842-0811-3_8_Fig3_HTML.jpg)


    **Figure 8-3.** 17-ps-micro-sample project structure


    A microservice is a standalone process that handles a well-defined requirement.
    When creating a distributed application that is based on microservices, each microservice
    component should be wrapped up in packages based on their purpose, and the overall
    implementation should be very loosely coupled, but very cohesive. The three microservices
    will have separate packages in the project structure, and they will communicate
    with each other using RESTful requests. In Figure 8-4, the `17-ps-micro-sample`
    is depicted.


    ![A978-1-4842-0811-3_8_Fig4_HTML.jpg](A978-1-4842-0811-3_8_Fig4_HTML.jpg)


    **Figure 8-4.** 17-ps-micro-sample project structure


    In Figure 8-5, all the beans making up the microservices and their interactions
    are depicted:


    ![A978-1-4842-0811-3_8_Fig5_HTML.jpg](A978-1-4842-0811-3_8_Fig5_HTML.jpg)


    **Figure 8-5.** 17-ps-micro-sample project architecture


    The `pet-service` and `user-service` microservices implementations are similar.
    Each of them uses a Spring Data JPA repository bean (`JpaRepository` implementation)
    and a Spring REST controller to provide a RESTful interface to expose their data.


    ```java

    @RestController

    @RequestMapping("/pets")

    public class PetController {

    @RequestMapping("/")

    public List all() {

    ... // gell all pets

    }

    @RequestMapping("/owner/{id}")

    public List byOwner(@PathVariable("id") Long ownerId) {

    // get all pets for owner with id = ownerId

    }

    ...

    }

    ```


    What is special about this implementation is the `PetServer` class, which is a
    SpringBoot special class that is used to register itself with the Eureka discovery
    and registration server configured in the previous section.


    ```java

    package com.ps.pet;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.EnableAutoConfiguration;

    import org.springframework.cloud.client.discovery.EnableDiscoveryClient;

    import org.springframework.context.ConfigurableApplicationContext;

    @EnableAutoConfiguration

    @EnableDiscoveryClient

    @Import(PetServiceConfig.class)

    public class PetServer {

    private static Logger logger = LoggerFactory.getLogger(PetServer.class);

    public static void main(String args) throws IOException {

    // Tell server to look for pet-server.properties or pet-server.yml

    System.setProperty("spring.config.name",   "pet-server");

    ConfigurableApplicationContext ctx =

    SpringApplication.run(PetServer.class, args);

    assert (ctx != null);

    logger.info("Started ...");

    System.in.read();

    ctx.close();

    }

    }

    ```


    The `@EnableAutoConfiguration` annotation is used instead of `@SpringBootApplication`,
    because some custom configuration comes from the `PetServiceConfig` class, and
    we want control of that. But the application is still a Spring Boot application.'
