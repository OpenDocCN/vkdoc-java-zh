- fmt: '基本上，`ResultSet`对象会根据语句执行返回的结果数量，被转换为一个或多个`User`对象。另外，不妨思考一下，使用上述方法处理`Timestamp`和`Date`值会变得多么棘手。


    如果查询未正确执行会发生什么？会抛出`java.sql.SQLException`，由于它是一个受检异常，开发者必须编写适当的代码来处理它。传统的JDBC用法冗余、容易出错、异常处理能力差，而且整体使用起来很繁琐。


    ## Spring Data Access


    使用Spring，无需编写基本的传统JDBC代码。Spring框架提供了旨在消除“手动”处理数据库连接需求的组件。在编写企业级应用程序（无论是否使用Spring）时，用于与数据库通信的类被称为仓库（Repository）。在图[5-2](#A978-1-4842-0811-3_5_Chapter.html#Fig2)中，你可以看到可以使用的不同类型的仓库类，以及用作数据库桥梁的持久化框架。


    ![A978-1-4842-0811-3_5_Fig2_HTML.jpg](A978-1-4842-0811-3_5_Fig2_HTML.jpg)


    图5-2. 仓库类如何与数据库交互


    如前所述，数据存储是一种资源。必须妥善管理对资源的访问，以避免出现瓶颈。在软件中，术语“瓶颈”指的是多个进程需要访问同一资源的情况，如果对资源的访问管理不当，某些进程最终将永远无法访问该资源。在使用纯JDBC访问资源时，数据库由开发者显式管理。Spring与持久化框架一起，减轻了开发者的这一责任。那么，让我们从使用Spring访问数据的最基本方式开始：使用JDBC仓库类。


    ## 引入JdbcTemplate


    Spring框架的JDBC抽象框架由四个主要包组成：`core`、`datasource`、`object`和`support`。[²](#A978-1-4842-0811-3_5_Chapter.html#Fn2)
    此外，还有一个小的`config`包，其中包含两个用于配置Spring JDBC环境的基础设施Bean。Spring通过引入`org.springframework.jdbc.core.JdbcTemplate`类（属于`core`包）简化了使用JDBC与数据库交互时需要编写的代码。该类隐藏了大量JDBC样板代码，并减轻了开发者在连接管理方面的负担，因为数据库连接会自动获取和释放。`datasource`包包含用于`DataSource`管理的工具类，以及一些可用于测试的简单`DataSource`实现。`object`包包含将RDBMS查询、更新和存储过程表示为线程安全、可重用对象的类。`support`包提供`SQLException`转换功能和一些工具类。异常处理得到了完善，提供了清晰的异常信息，始终报告根本原因，并且确保即使在失败情况下也能正确释放资源。`JdbcTemplate`类是根据模板方法模式设计的，这是一种行为设计模式，它定义了算法的骨架，而具体的实现则在之后定义或委托给子类。[³](#A978-1-4842-0811-3_5_Chapter.html#Fn3)


    本节将介绍一个最简单的示例，用于演示如何使用`JdbcTemplate`。为此，我们需要以下内容：


    *   一个包含数据库详细信息的配置文件，我们称之为`db.properties`：


    ```

    #db.properties contents

    # For running application with H2 in memory database

    driverClassName=org.h2.Driver

    url=jdbc:h2:∼/sample

    username=sample

    password=sample

    ```


    *   包含用于初始化数据库结构的SQL查询的配置文件：`schema.sql`（包含用于创建表的SQL代码）和`test-data.sql`（包含用一些初始数据填充表的插入语句）。这些文件的内容与本章节无关，但它们是`05-ps-jdbc-practice`项目的一部分。


    *   一个用于测试数据库的配置类，我们称之为`TestDataConfig`。此配置类将包含创建`dataSource`Bean所需的所有Bean。我们将使用一个名为H2的内存数据库。以下配置看起来复杂，但它提供了定义连接URL和访问数据库凭据的可能性。此时，只需将`db.properties`配置文件替换为描述不同类型数据库的文件，应用程序的其余部分仍能正常工作。`dataSource`Bean的类型是`SimpleDriverDataSource`，它是`javax.sql.DataSource`的一个简单的Spring特定实现。两个专门的Spring
    Bean用于初始化`dataSource`Bean（`DataSourceInitializer`）和填充`dataSource`Bean（`DatabasePopulator`）。


    ```

    package com.ps.config;

    import org.springframework.beans.factory.annotation.Value;

    import org.springframework.context.annotation.*;

    import org.springframework.context.support.PropertySourcesPlaceholderConfigurer;

    import org.springframework.core.io.Resource;

    import org.springframework.jdbc.core.JdbcTemplate;

    import org.springframework.jdbc.datasource.SimpleDriverDataSource;

    import org.springframework.jdbc.datasource.init.DataSourceInitializer;

    import org.springframework.jdbc.datasource.init.DatabasePopulator;

    import org.springframework.jdbc.datasource.init.DatabasePopulatorUtils;

    import org.springframework.jdbc.datasource.init.ResourceDatabasePopulator;

    @Configuration

    @Profile("dev")

    @PropertySource("classpath:db/db.properties")

    public class TestDataConfig {

    @Value("${driverClassName}")

    private String driverClassName;

    @Value("${url}")

    private String url;

    @Value("${username}")

    private String username;

    @Value("${password}")

    private String password;

    @Bean

    public static PropertySourcesPlaceholderConfigurer

    propertySourcesPlaceholderConfigurer() {

    return new PropertySourcesPlaceholderConfigurer();

    }

    @Lazy

    @Bean

    public DataSource dataSource() {

    try {

    SimpleDriverDataSource dataSource = new SimpleDriverDataSource();

    Class driver =

    (Class) Class.forName(driverClassName);

    dataSource.setDriverClass(driver);

    dataSource.setUrl(url);

    dataSource.setUsername(username);

    dataSource.setPassword(password);

    DatabasePopulatorUtils.execute(databasePopulator(), dataSource);

    return dataSource;

    } catch (Exception e) {

    return null;

    }

    }

    @Value("classpath:db/schema.sql")

    private Resource schemaScript;

    @Value("classpath:db/test-data.sql")

    private Resource dataScript;

    @Bean

    public DataSourceInitializer dataSourceInitializer

    (final DataSource dataSource) {

    final DataSourceInitializer initializer = new DataSourceInitializer();

    initializer.setDataSource(dataSource);

    initializer.setDatabasePopulator(databasePopulator());

    return initializer;

    }

    private DatabasePopulator databasePopulator() {

    final ResourceDatabasePopulator populator = new ResourceDatabasePopulator();

    populator.addScript(schemaScript);

    populator.addScript(dataScript);

    return populator;

    }

    @Bean

    public JdbcTemplate userJdbcTemplate() {

    return new JdbcTemplate(dataSource());

    }

    }

