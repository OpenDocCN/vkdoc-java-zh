- fmt: '# Bean Lifecycle Under the Hood


    In the previous section it was mentioned that for a bean to come to life and become
    available to be used for a purpose, it has to go through a set of steps. Since
    in the previous section, the focus was on the application context, the references
    to bean creation steps were quite shallow. So we need to fix that. Let’s start
    with a schema depicting the creation steps of a bean: Figure [2-17](#A978-1-4842-0811-3_2_Chapter.html#Fig17).


    ![A978-1-4842-0811-3_2_Fig17_HTML.jpg](A978-1-4842-0811-3_2_Fig17_HTML.jpg)


    Figure 2-17. Complete list of bean creation steps


    In the Load Bean Definition step, the XML files/Configuration classes are parsed,
    and bean definitions are loaded into the application context, indexed by ids.
    The bean definitions are then processed by beans called bean definition post processors
    that are automatically picked up by the application context, created, and applied
    before any other beans are created. These bean types implement the `org.springframework.beans.factory.config.BeanFactoryPostProcessor`
    interface, and that is how the application context recognizes them. In the previous
    example, the `PropertyPlaceholderConfigurer` type was mentioned. This class is
    a bean definition post processor that resolves placeholders like `${propName}`
    with property values read from the Spring environment and its set of property
    sources.


    The `BeanFactoryPostProcessor` contains a single method definition that must be
    implemented, `postprocess(BeanFactory)`. The parameter with which this method
    will be called is the factory bean used by the application context to create the
    beans. Developers can create their own bean definition postprocessors and define
    a bean of this type in their configuration, and the application context will make
    sure to invoke them.


    In Figure [2-18](#A978-1-4842-0811-3_2_Chapter.html#Fig18), the effect of a `PropertyPlaceholderConfigurer`
    bean being invoked on the `dataSource1` bean definition is depicted.


    ![A978-1-4842-0811-3_2_Fig18_HTML.jpg](A978-1-4842-0811-3_2_Fig18_HTML.jpg)


    Figure 2-18. Effect of a `PropertyPlaceholderConfigurer` on a bean definition
    using placeholders


    These types of beans are useful, because they can process bean definitions at
    runtime and change them based on resources that are outside the application, so
    the application does not need to be recompiled in order to change a bean definition.
    In the above example, if instead of reading the properties of the `dataSource1`
    from an external file, the information were to be written directly in the configuration
    file, then if the `dataSource1` location and type changed, the XML configuration
    file would need to be changed, and the application would have to be recompiled
    and restarted. Not that practical, right?


    The Bean creation step can be split into a small number of stages.


    1. In the first stage, the beans are instantiated. This basically means that the
    bean factory is calling the constructor of each bean. If the bean is created using
    constructor dependency injection, the dependency bean is created first and then
    injected where needed. For beans that are defined in this way, the instantiation
    stage coincides with the dependency injection stage.

    2. In the second stage, dependencies are injected. For beans that are defined
    having dependencies injected via setter, this stage is separate from the instantiation
    stage.

    3. The next stage is the one in which bean post process beans are invoked before
    initialization.[^(11)](#A978-1-4842-0811-3_2_Chapter.html#Fn11)

    4. In this stage, beans are initialized.

    5. The next stage is the one in which bean post process beans are invoked after
    initialization.


    As you can see, there are two stages involving bean post process beans being called.
    What is the difference between them? The stage between them, the initialization
    stage, is used to split them into bean post processors that are invoked before
    it and after it. Since the bean post processor subject is quite large, the initialization
    stage will be covered first. Long story short, a bean can be defined so that a
    certain method is called right after the bean is created and dependencies are
    injected in order to execute some code. This method is called an initialization
    method, and in using XML configuration, this method is set using the `init-method`
    attribute on a bean definition. The `init-method` attribute should have as value
    the name of a method defined in the bean type. The method must return void, have
    no arguments defined, and can have any access right, since Spring uses reflection
    to find and call it, and some developers actually recommend to make it private
    so it cannot be called from outside the bean, and also make sure that Spring has
    total control over it and that it calls it only one time during the bean lifecycle.
    In the code snippet below you can see the configuration of such a method for a
    bean of type `ComplexBean`. The bean is a very simple one with no methods to be
    picked up and executed by a bean post processor:


    ```

    public class ComplexBean {

    private Logger logger = LoggerFactory.getLogger(ComplexBean.class);

    private SimpleBean simpleBean1;

    private SimpleBean simpleBean2;

    public ComplexBean(SimpleBean simpleBean1) {

    logger.info("Stage 1: Calling the constructor.");

    this.simpleBean1 = simpleBean1;

    }

    public void setSimpleBean2(SimpleBean simpleBean2) {

    logger.info("Stage 2: Calling the setter.");

    this.simpleBean2 = simpleBean2;

    }

    /**

    * The initialization method.

    * Just for fun: it instantiates the simpleBean2 only

    * if the current time is even.

    */

    private void initMethod() {

    logger.info("Stage 4: Calling the initMethod.");

    long ct = System.currentTimeMillis();

    if (ct % 2 == 0) {

    simpleBean2 = new SimpleBean();

    }

    }

    }

    ```


    The `ComplexBean` definition, contains a setter definition that is used to inject
    the `simpleBean2` dependency, but in the following configuration, the setter is
    not used, because the focus is on the initialization stage.


    In initializing an application context based on the configuration above, here
    is what could be seen in the log:


    ```

    ...

    DEBUG o.s.b.f.s.DefaultListableBeanFactory - Creating instance of bean ''complexBean''

    INFO c.p.s.ComplexBean - Stage 1: Calling the constructor.

    DEBUG o.s.b.f.s.DefaultListableBeanFactory - Eagerly caching bean ''complexBean''
    to allow for resolving potential circular references

    DEBUG o.s.b.f.s.DefaultListableBeanFactory - Invoking init method ''initMethod''
    on bean with name ''complexBean''

    INFO c.p.s.ComplexBean - Stage 4: Calling the initMethod.

    DEBUG o.s.b.f.s.DefaultListableBeanFactory - Finished creating instance of bean
    ''complexBean''

    ...

    ```


    As you can see, the bean is created, and then the `initMethod` is called by the
    factory creating the bean. Keep this in mind, because it is important, as you
    will soon see. If an `init` method is not specified, there are other ways of initializing
    a bean available in Spring. Here is the complete list:


    * Using the attribute `init-method` on a `<bean>` XML definition to define a method
    to be called for initialization, covered previously.

    * Implementing the `org.springframework.beans.factory.InitializingBean` interface
    and providing an implementation for the method `afterPropertiesSet` (not recommended,
    since it couples the application code with Spring infrastructure).

    * Annotating with `@PostConstruct` the method that is called right after the bean
    is instantiated and dependencies injected.[^(12)](#A978-1-4842-0811-3_2_Chapter.html#Fn12)

    * The equivalent of the `init-method` attribute when using Java Configuration
    `@Bean(initMethod="...")`.'
