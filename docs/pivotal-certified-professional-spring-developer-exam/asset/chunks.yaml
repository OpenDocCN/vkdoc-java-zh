- fmt: '# Proxy Nature in Spring AOP


    If a method in the proxy calls another method in the proxy, and both match the
    pointcut expression of an advice, the advice will be executed only for the first
    method. This is the proxy’s nature: it executes the extra behavior only when the
    caller calls the target method.


    Let’s consider the following example. We’ll edit the `JdbcTemplateUserRepo` to
    add a method named `updateDependencies` that is supposed to update some records
    that depend on the object being updated. The actual body is not important for
    this scenario.


    ```java

    @Repository("userTemplateRepo")

    public class JdbcTemplateUserRepo implements UserRepo {

    ...

    @Override

    public int updateUsername(Long userId, String username) {

    String sql = "update p_user set username=? where ID = ?";

    updateDependencies(userId);

    return jdbcTemplate.update(sql, username, userId);

    }

    @Override

    public int updateDependencies(Long userId) {

    //mock method to test the proxy nature

    return 0;

    }

    }

    ```


    Let’s consider the following pointcut expression and advice declaration:


    ```java

    // PointcutContainer.java

    public class PointcutContainer {

    ...

    @Pointcut("execution( * com.ps.repos.*.*UserRepo+.update*(..))")

    public void proxyBubu() {

    }

    // UserRepoMonitor.java

    @Aspect

    @Component

    public class UserRepoMonitor {

    ...

    @Before("com.ps.aspects.PointcutContainer.proxyBubu()")

    public void bubuHappens(JoinPoint joinPoint) throws Throwable {

    String methodName = joinPoint.getSignature().getName();

    String className = joinPoint.getSignature().getDeclaringTypeName();

    logger.info(" ---> BUBU when calling: " + className + "." + methodName);

    }

    }

    ```


    To test the previous example, let’s use a simple method:


    ```java

    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = {TestDataConfig.class, AppConfig.class})

    @ActiveProfiles("dev")

    public class TestUserService {

    @Autowired

    UserService userService;

    ...

    @Test

    public void testProxyBubu() {

    int result = userService.updateUsername(3L, "Iuliana");

    assertEquals(1, result);

    }

    }

    ```


    If the previous test method is executed, in the console only one line can be seen:


    ```

    INFO c.p.a.UserRepoMonitor - ---> BUBU when calling:

    com.ps.repos.impl.JdbcTemplateUserRepo.updateUsername

    ```


    But how do we know that the `updateDependencies` matches the joinpoint expression?
    We create a method in the service bean that calls this method, and we write a
    test for it as well.


    ```java

    // UserServiceImpl.java

    @Service

    public class UserServiceImpl implements UserService {

    ...

    @Override

    public int updateDependencies(Long id) {

    return userRepo.updateDependencies(id);

    }

    }

    // TestUserService.java

    ...@Test

    public void testProxyBubuDeps() {

    int result = userService.updateDependencies(3L);

    assertEquals(0, result);

    }

    ```


    If the test `testProxyBubuDeps` method is executed, in the console only one line
    can be seen:


    ```

    INFO c.p.a.UserRepoMonitor - ---> BUBU when calling:

    com.ps.repos.impl.JdbcTemplateUserRepo.updateDependencies

    ```


    Now we can be sure that both methods are matching the pointcut expression.


    What really happens here is that the advice method does its thing and then the
    target method is called. The target method executes, and it calls the `updateDependencies`
    method on the target object. The proxy is not involved in this call in any way,
    so that is why it cannot apply any advice. The UML sequence diagram in Figure
    4-14 should make things even clearer.


    ![A978-1-4842-0811-3_4_Fig14_HTML.jpg](A978-1-4842-0811-3_4_Fig14_HTML.jpg)


    **Figure 4-14.** The proxy nature explained via UML sequence diagram


    The code snippets used to explain this specific scenario are part of the `04-ps-aop-solution`.


    ## Summary


    After reading this chapter, you should possess enough knowledge to write and configure
    aspects with Spring AOP. Keep in mind the following:


    - Cross-cutting concerns cause code scattering and tangling.

    - AOP is a programming type that can help reduce code scattering and tangling
    by modularizing cross-cutting concerns.

    - The most common cross-cutting concerns.

    - AOP Concepts: aspect, advice, join point, pointcut, AOP proxy, etc.

    - How aspect support is configured in a Spring application.

    - How many advice types there are.


    ## Quick Quiz


    **Question 1:** Which options in the list below represent a cross-cutting concern?
    (choose all that apply)


    1. connecting to the database

    2. caching

    3. security

    4. transactions


    **Question 2:** Which options in the list are used to declare advice in Spring
    AOP? (choose all that apply)


    1. `@Aspect`

    2. `@Before`

    3. `@Pointcut`

    4. `@AfterReturning`

    5. `@After`


    **Question 3:** What is true about the after advice? (choose all that apply)


    1. it is not executed if the target method execution ends by throwing an exception

    2. it can catch the target method exception and prevent propagation

    3. it can catch the target method exception and throw a different exception


    **Question 4:** Which methods will match the following pointcut expression? (choose
    all that apply) `execution(protected * com.ps.repos.*.*Repo.find*(..))`


    1. none: Spring AOP supports only advising public methods

    2. `com.ps.repos.impl.JdbcTemplateUserRepo.findById(Long id)`

    3. `com.ps.repos.impl.JdbcUserRepository.findAll()`


    **Question 5:** Which of the following pointcut expressions match the following
    method definition? Method definition: a method named update that has the first
    parameter of type Long and more parameters may follow


    1. `execution(update(*))`

    2. `execution(* update(Long, *))`

    3. `execution(* update(..))`

    4. `execution(* update(Logn,..))`


    **Question 6:** What is the XML equivalent of `@EnableAspectJAutoProxy`?


    ```

    A.

    B.

    C.

    ```


    **Question 7:** Which of the following is true about Spring AOP proxies?


    1. A proxy object must implement the interface that the target implements or be
    a subclass of the target’s type.

    2. A proxy object has scope prototype.

    3. Spring AOP uses subclass-based proxies by default.


    **Question 8:** What is a pointcut?


    1. a parameter that every advice method must specify in its signature that provides
    access to the execution context

    2. an expression to identify methods to which the advice applies to

    3. a predicate used to identify join points.


    ## Practical Exercise


    In the source code for this book there is a project called `04-ps-aop-practice`.
    This project can be used to test your understanding of Spring AOP. This project
    contains part of the implementation depicted in the code snippets. The parts missing
    are marked with a TODO task and are visible in Intellij IDEA in the TODO view.
    There are six tasks for you to solve in order to test your acquired knowledge
    of Spring AOP.


    Task TODO 20 requires you to enable aspect support by modifying the `AppConfig`
    class. If you want to use JDK proxies or CGLIB, it is up to you. The CGLIB dependency
    is on the classpath and can be used.


    Task TODO 21 requires you to declare the `UserRepoMonitor` as an aspect.


    Tasks 22–26 require that you configure methods declared inside the `UserRepoMonitor`
    class as different types of advice. The pointcuts expressions are your responsibility
    as well.


    The tests that can be used to verify that your advices work, are declared in the
    class `TestUserService`. Each test method is commented with the type of advice
    it tests. Since some of the pointcut expressions might match more than one method,
    all advices that apply will be executed. To stop that from happening, when working
    on configuring an advice, comment the annotations on the others.


    To run a test case, just click anywhere on the class content, or on the class
    name in the project view and select the `Run ''{TestClassName}''` option. If you
    want to run a single test, just right click and from the menu select `Run ''{TestMethodName}''`.
    These instructions were already explained to you in the practice section of Chapter
    3: Testing. You might need to review it.'
