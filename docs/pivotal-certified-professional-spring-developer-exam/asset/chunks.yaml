    Alias for sb04 -> \" + name);\n    }\n    //The result\n    Alias for sb02/sb03\
    \ -> mumu\n    ```\n\n*   “sb04; sb05” is also a valid id containing a special\
    \ character, which happens to be a separator, but the bean can be retrieved only\
    \ using the full id value, because Spring treats the ids and names a little differently.\
    \ A bean can have many names, but only one id.\n*   “sb04; sb05, sb004 sb005”\
    \ is used as a value for the `name` attribute, so the separators are taken into\
    \ consideration, and that’s why in the log, only the s04 value is printed. But\
    \ wait, what happened to the others? I think you already have a suspicion. If\
    \ you run the code above, the one that prints the aliases, here is the output:\n\
    \n```\n    Alias for sb04 -> sb05\n    Alias for sb04 -> sb004\n    Alias for\
    \ sb04 -> sb005\n    ```\n\nThe conclusion is that the first name became the id,\
    \ and the others became aliases.\n\nAnd since we mentioned aliases, let’s give\
    \ an example for this too:\n\nSo now the $ bean can be retrieved using its alias:\n\
    \n```\nSimpleBean s = ctx.getBean(\"properName\", SimpleBean.class);\n```"
  trans: "\n#### Bean 命名\n\n容器管理的每个 Bean 都有一个唯一标识符。开发者有责任在必要时使用 `id` 或 `name` 属性来恰当地命名\
    \ Bean，因为正如我们之前在自定义 `CustomDateEditor` 时所看到的，配置器 Bean 的定义是没有 id 的。一个 Bean 通常至少有一个唯一标识符，如果需要，可以通过为\
    \ name 属性设置多个值（用逗号（,）、分号（;）或空格分隔）来定义更多标识符。或者使用 `<alias />` 元素。\n\n在 Spring 3.1\
    \ 之前，`id` 属性的类型是 `xsd:ID`，因此不允许使用逗号、分号、空格等字符。从 Spring 3.1 开始，其类型改为 `xsd:string`，与\
    \ `name` 属性使用的类型相同，这使得这两个属性可以互换使用。因此，你可以使用其中任何一个，语法相同。如果需要，也可以同时使用两者，只要确保你的 Bean\
    \ 能被正确识别即可。\n\n让我们从头开始，假设你有一个配置文件，其中包含一个没有定义 id 或 name 的 Bean 定义：\n\n可以从这个文件创建一个应用上下文，它将包含一个类型为\
    \ `SimpleBeanImpl` 的 Bean，其名称由容器设置。如果我们想查看容器分配给这个 Bean 的名称，只需打印上下文中所有 Bean 的名称即可，这可以通过调用应用上下文提供的\
    \ `getBeanDefinitionNames()` 方法并遍历返回结果来实现：\n\n```\nApplicationContext ctx =\n\
    new ClassPathXmlApplicationContext(\"classpath:spring/application-config.xml\"\
    );\nfor (String beanName : ctx.getBeanDefinitionNames()) {\nlogger.info(\"Bean\
    \ \" + beanName + \" of type \"\n+ ctx.getBean(beanName).getClass().getSimpleName());\n\
    }\n// 控制台输出结果：\nBean com.ps.beans.SimpleBeanImpl#0 of type SimpleBeanImpl\n```\n\
    \n有趣的是，你完全可以复制 Bean 定义。容器只会为同一类型的第二个 Bean 分配一个不同的名称，上述代码将输出以下内容：\n\n```\nBean\
    \ com.ps.beans.SimpleBeanImpl#0 of type SimpleBeanImpl\nBean com.ps.beans.SimpleBeanImpl#1\
    \ of type SimpleBeanImpl\n```\n\n你甚至可以通过调用应用上下文上的 `getBeansOfType(...)` 方法来检索这些\
    \ Bean 及其名称：\n\n```\nMap simpleBeans = ctx.getBeansOfType(SimpleBean.class);\n\
    ```\n\n所以从技术上讲，如果你需要这样做，是可以的。但请记住，所有该类型的 Bean 都会被添加到该映射中，无论它们是否有开发者指定的 id/name。当你恰好有某个类型的唯一一个\
    \ Bean 时，可以使用 `getBean(...)` 方法从上下文中检索它，该方法有多个版本可供使用，本书将涵盖所有这些版本。\n\n```\nSimpleBean\
    \ simpleBean = ctx.getBean(SimpleBean.class);\n```\n\n`getBean` 方法只需要一个 `Class<T>`\
    \ 参数，它会返回唯一匹配给定对象类型的 Bean 实例（如果有的话）。Spring IoC 会搜索该类型的任何 Bean，无论 Bean 类型是接口还是超类。如果定义了多个该类型的\
    \ Bean，上下文将抛出异常，因为它无法确定你真正想要哪个 Bean。异常名称非常明显，如下面的日志片段所示。\n\n```\norg.springframework.beans.factory.NoUniqueBeanDefinitionException:\n\
    No qualifying bean of type com.ps.beans.SimpleBean is defined:\nexpected single\
    \ matching bean but found 2: sb01,com.ps.beans.SimpleBeanImpl#0\n```\n\n尽管可以定义没有显式\
    \ id 的 Bean，但除非它们是内部 Bean 或某种基础设施 Bean（例如：`org.springframework.beans.factory.config.CustomEditorConfigurer`），否则定义没有\
    \ id 的 Bean 通常没有意义。\n\n从 Spring 3.1 开始，`id` 和 `name` 属性具有相同的类型，因此它们的值可以包含特殊字符。在\
    \ Spring 3.1 之前的版本中，`name` 属性对于 Web 控制器是必需的，因为其语法要求 id 以 \"/\" 开头（例如，name=\"/persons\"\
    ），而 id 属性不允许使用特殊字符。从现在开始，几乎所有关于 `id` 属性的内容也适用于 `name` 属性，除了一个将在适当时候提及的小细节。\n\n\
    !\n\nSpring 的惯例是在命名 Bean 时使用标准的 Java 实例字段命名约定。这意味着 Bean 名称以小写字母开头，之后采用驼峰命名法。良好的\
    \ Bean 命名旨在使配置易于阅读和理解。此外，在使用像 AOP 这样更高级的功能时，能够将通知应用于一组按名称关联的 Bean 是非常有用的。\n\n\
    让我们介绍使用 id 命名 Bean 的多种方式。\n\n如果 `sb01` Bean 像前面某个示例那样命名，那么有两种方法可以从应用上下文中检索这个 Bean：\n\
    \n```\nSimpleBean sb01 = (SimpleBean)ctx.getBean(\"sb01\");\nSimpleBean sb01 =\
    \ ctx.getBean(\"sb01\", SimpleBean.class);\n```\n\n由于 `id` 和 `name` 具有相同的目的，因此不允许在同一个应用上下文中存在具有相同\
    \ id/name 值的 Bean 定义。智能的 Java 编辑器，比如推荐你使用的 Intellij IDEA，甚至会用红色下划线标出属性值来警告你不要这样做，如图\
    \ 2-15 所示。\n\n![A978-1-4842-0811-3_2_Fig15_HTML.jpg](img/A978-1-4842-0811-3_2_Fig15_HTML.jpg)\n\
    \n图 2-15.\n\n在 Intellij IDEA 中，糟糕的 Bean 命名显而易见 ?\n\n在下面的配置中，展示了一些 Bean 命名的示例。你能想象记录上下文中所有\
    \ Bean 的代码对于以下配置文件会打印出什么吗？\n\n嗯，日志将打印出：\n\n```\nBean sb01 of type SimpleBeanImpl\n\
    Bean sb02/sb03 of type SimpleBeanImpl\nBean sb04; sb05 of type SimpleBeanImpl\n\
    Bean sb04 of type SimpleBeanImpl\nBean $ of type SimpleBeanImp\n```\n\n因此，对每种情况进行详细解释是合适的。\n\
    \n*   `id` 和 `name` 属性可以具有相同的值。\n*   “sb02/sb03” 是一个包含特殊字符的 id；$ 是一个由单个特殊字符组成的\
    \ id。两者都是有效的，并且可以使用以下方式成功检索 Bean：\n\n```\n    SimpleBean sb1 = ctx.getBean(\"\
    sb02/sb03\", SimpleBean.class);\n    SimpleBean sb2 = ctx.getBean(\"$\", SimpleBean.class);\n\
    \    ```\n\n但是等等，使用 name 属性设置的 \"mumu\" 值发生了什么？你能猜到吗？应用上下文也可以对此给出答案：\n\n```\n\
    \    for (String name : ctx.getAliases(\"sb02/sb03\") ){\n    logger.info (\"\
    Alias for sb04 -> \" + name);\n    }\n    // 结果\n    Alias for sb02/sb03 -> mumu\n\
    \    ```\n\n*   “sb04; sb05” 也是一个包含特殊字符的有效 id，这个字符恰好是一个分隔符，但只能使用完整的 id 值来检索 Bean，因为\
    \ Spring 对 id 和 name 的处理略有不同。一个 Bean 可以有多个名称，但只能有一个 id。\n*   “sb04; sb05, sb004\
    \ sb005” 被用作 `name` 属性的值，因此分隔符被考虑在内，这就是为什么在日志中只打印了 s04 值。但是等等，其他的值发生了什么？我想你已经有所怀疑了。如果你运行上面打印别名的代码，输出如下：\n\
    \n```\n    Alias for sb04 -> sb05\n    Alias for sb04 -> sb004\n    Alias for\
    \ sb04 -> sb005\n    ```\n\n结论是，第一个名称成为了 id，而其他名称成为了别名。\n\n既然我们提到了别名，那么也来举一个例子：\n\
    \n所以现在 $ Bean 可以使用其别名来检索：\n\n```\nSimpleBean s = ctx.getBean(\"properName\", SimpleBean.class);\n\
    ```\n"
- fmt: 'Bean aliasing can be used to override already configured beans, thus providing
    a way to substitute them with a different bean definition. This is useful in testing,
    and the configuration is not decoupled enough, and it comes from an external source
    that cannot be modified. Using aliasing, real beans can be replaced with test
    beans with known behavior, making it possible to test a specific module in isolation.
    But more about testing can be read in Chapter [3](#A978-1-4842-0811-3_3_Chapter.html).
    Testing Spring Applications.


    All these examples can be found in `02-ps-container-01-practice`. The configuration
    file path is `/02-ps-container-01-practice/src/main/resources/spring/others/sample-config-03.xml`,
    and the test class to run is `02-ps-container-01-practice/src/test/java/com/ps/beans/others/BeanNamingTest.java`.
    You are invited to add your own bean names and your own tests.


    The conclusions of this section are really important, so you might consider putting
    a bookmark right here, or make a note somewhere.


    - If the bean has only the `name` attribute defined, then its value becomes the
    bean name used to uniquely identify this bean in the context.

    - If the bean has `id` and `name` attributes defined, the `name` value is used
    as an alias, and the `id` value becomes the bean name used to uniquely identify
    this bean in the context.

    - The `id` and `name` attribute values have the same type, but if the `id` value
    contains separator characters: comma (`,`), semicolon (`;`), or white space, they
    are not treated as such.

    - If the bean has only the `name` attribute defined and the value contains multiple
    names, then the first value becomes the bean name used to uniquely identify this
    bean in the context; the others become aliases.


    ## Application Context and Bean Lifecycle


    Before explaining how everything presented so far can be done using Java Configurations
    and annotations, the application context and bean lifecycle must be covered, because
    some of the details are intertwined, so it is better to have an overall idea about
    this before going more deeply into this subject.


    A Spring application has a lifecycle composed of three phases:


    1. Initialization: In this phase, bean definitions are read, beans are created,
    dependencies are injected, and resources are allocated, also known as the bootstrap
    phase. After this phase is complete, the application can be used.

    2. Use: In this phase, the application is up and running. It is used by clients,
    and beans are retrieved and used to provide responses for their requests. This
    is the main phase of the lifecycle and covers 99% of it.

    3. Destruction: The context is being shut down, resources are released, and beans
    are handed over to the garbage collector.


    These three phases are common to every type of application, whether it is a JUnit
    System test, a Spring or JEE web, or enterprise application. Look at the following
    code snippet (the sources can be found in the `/02-ps-container-02-solution` project);
    it was modified in order to make obvious where each phase ends.


    ```

    import org.springframework.context.ConfigurableApplicationContext;

    public class ApplicationContextTest {

    private Logger logger = LoggerFactory.getLogger(ApplicationContextTest.class);

    @Test

    public void testDataSource1() {

    ConfigurableApplicationContext ctx =

    new ClassPathXmlApplicationContext("classpath:spring/test-db01-config.xml");

    logger.info(" >> init done.");

    DataSource dataSource1 = ctx.getBean("dataSource1", DataSource.class);

    assertNotNull(dataSource1);

    logger.info(" >> usage done.");

    ctx.close();

    }

    ```


    The initialization phase of a Spring application ends when the application context
    initialization process ends. If the logger for the Spring framework is set to
    debug, before the `init done` message is printed, a lot of log entries show what
    the Spring container is doing. A simplified sample is depicted below:


    ```

    DEBUG o.s.c.e.StandardEnvironment - Initialized StandardEnvironment

    with PropertySources [systemProperties,systemEnvironment]

