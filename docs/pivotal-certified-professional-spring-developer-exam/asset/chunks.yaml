  trans: '

    微服务架构确保一组进程能够协同工作，共同实现一个目标，为最终用户提供可靠且高效的服务。为此，这些进程必须高效地进行通信。为了相互通信，它们首先需要知道彼此的存在。这就是
    Netflix Eureka 注册服务器发挥作用的地方。由于它是开源的，因此被整合到了 Spring Cloud 中，并且现在也遵循了 Spring 的简洁性原则。微服务应用中的进程可以使用一个注册或发现服务器来注册和发现彼此，如下面的代码片段所示，该片段来自
    `17-ps-micro-sample` 项目。


    ```

    package com.ps.server;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.ConfigurableApplicationContext;

    import org.springframework.cloud.netflix.eureka.server.EnableEurekaServer;

    import java.io.IOException;

    @SpringBootApplication

    @EnableEurekaServer

    public class DiscoveryServer {

    private static Logger logger =

    LoggerFactory.getLogger(DiscoveryServer.class);

    public static void main(String args) throws IOException {

    // 告诉服务器查找 discovery.properties 或 discovery.yml

    System.setProperty("spring.config.name",  "discovery");

    ConfigurableApplicationContext ctx =

    SpringApplication.run(DiscoveryServer.class,  args);

    assert (ctx != null);

    logger.info("已启动 ...");

    System.in.read();

    ctx.close();

    }

    }

    ```


    **


    `System.in.read();`

    调用的作用是，你可以通过按下 `<ENTER>` 键来优雅地停止应用程序。


    要在项目中使用 `Eureka Server`，必须将 `spring-cloud-starter-eureka-server` 启动器项目作为项目的依赖项包含进来。请注意
    `@EnableEurekaServer` 注解，它负责将一个 Eureka 服务器实例注入到你的项目中。该服务器有一个包含用户界面的主页，并根据 /eureka/*
    下的标准 Eureka 功能提供 HTTP API 端点。


    `discovery.yml` 文件包含了此服务器的设置。默认情况下，Spring Boot 会查找名为 `application` 的文件来读取配置。要指定从其他文件读取配置，必须将该文件名作为系统属性
    `spring.config.name` 的值添加，方法是在创建 Spring 上下文之前调用 `System.setProperty("spring.config.name",
    "discovery");`。


    ```

    eureka:

    instance:

    hostname: localhost

    client:

    registerWithEureka: false # 不要自动注册为客户端

    fetchRegistry: false

    server:

    port: 3000 # 此发现服务器的访问端口

    waitTimeInMsWhenSyncEmpty: 0

    ```


    !


    如果未指定 `port` 值，则端口默认值会被隐式设置为 `8761`。（在上面的示例中，端口被设置为 3000 仅作为示例。）


    服务器将在 3000 端口上可用，当运行上述类时，显示一些统计信息和已注册微服务的服务器界面就可以在浏览器中通过 `http://localhost:3000/`
    访问。图 8-2 展示了一个尚未注册任何微服务的裸 Eureka 服务器的界面。


    ![A978-1-4842-0811-3_8_Fig2_HTML.jpg](img/A978-1-4842-0811-3_8_Fig2_HTML.jpg)


    图 8-2.


    Spring Eureka 网页界面


    Netflix 原始版本的 Eureka 服务器，如果以空注册表启动，会在一个可配置的时间段内避免响应客户端。`waitTimeInMsWhenSyncEmpty`
    属性控制此行为，其设计目的是让客户端在服务器有足够时间构建注册表之前，不会获取到部分或空的注册表信息。在前面的示例中，它被设置为零，以便尽快开始响应客户端。


    !


    如果未设置，`server.waitTimeInMsWhenSyncEmpty` 的默认值是 5 分钟。


    `eureka.client.registerWithEureka` 属性的默认值为“true”，用于注册 Eureka 客户端。由于上述应用程序注册的是一个服务器，因此必须将其显式设置为“false”，以阻止服务器尝试注册自身。


    现在我们有了服务器，接下来需要开发微服务。


    微服务开发


    要创建一个微服务，需要一个服务实现和一个类，该类将与注册和发现服务器交互，以将自身注册为客户端。服务的实现是一个典型的 Spring 服务，在我们的示例中，我们将有三个微服务：一个处理用户，一个处理宠物，还有一个连接这两者的功能。在图
    8-3 中，描绘了这些微服务如何交互的示意图。


    ![A978-1-4842-0811-3_8_Fig3_HTML.jpg](img/A978-1-4842-0811-3_8_Fig3_HTML.jpg)


    图 8-3.


    17-ps-micro-sample 项目结构


    微服务是一个独立的进程，用于处理一个明确定义的需求。在创建基于微服务的分布式应用程序时，每个微服务组件应根据其用途打包，并且整体实现应该是非常松散耦合但高度内聚的。这三个微服务在项目结构中会有独立的包，它们将使用
    RESTful 请求相互通信。在图 8-4 中，描绘了 `17-ps-micro-sample` 项目。


    ![A978-1-4842-0811-3_8_Fig4_HTML.jpg](img/A978-1-4842-0811-3_8_Fig4_HTML.jpg)


    图 8-4.


    17-ps-micro-sample 项目结构


    在图 8-5 中，描绘了构成微服务及其交互的所有 Bean：


    ![A978-1-4842-0811-3_8_Fig5_HTML.jpg](img/A978-1-4842-0811-3_8_Fig5_HTML.jpg)


    图 8-5.


    17-ps-micro-sample 项目架构


    `pet-service` 和 `user-service` 微服务的实现是相似的。它们各自使用一个 Spring Data JPA 仓库 Bean（`JpaRepository`
    实现）和一个 Spring REST 控制器来提供 RESTful 接口以暴露其数据。


    ```

    @RestController

    @RequestMapping("/pets")

    public class PetController {

    @RequestMapping("/")

    public List all() {

    ... // 获取所有宠物

    }

    @RequestMapping("/owner/{id}")

    public List byOwner(@PathVariable("id") Long ownerId) {

    // 获取主人 id = ownerId 的所有宠物

    }

    ...

    }

    ```


    此实现的特殊之处在于 `PetServer` 类，它是一个 SpringBoot 特殊类，用于向上一节中配置的 Eureka 发现和注册服务器注册自身。


    ```

    package com.ps.pet;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.EnableAutoConfiguration;

    import org.springframework.cloud.client.discovery.EnableDiscoveryClient;

    import org.springframework.context.ConfigurableApplicationContext;

    @EnableAutoConfiguration

    @EnableDiscoveryClient

    @Import(PetServiceConfig.class)

    public class PetServer {

    private static Logger logger = LoggerFactory.getLogger(PetServer.class);

    public static void main(String args) throws IOException {

    // 告诉服务器查找 pet-server.properties 或 pet-server.yml

    System.setProperty("spring.config.name",   "pet-server");

    ConfigurableApplicationContext ctx =

    SpringApplication.run(PetServer.class, args);

    assert (ctx != null);

    logger.info("已启动 ...");

    System.in.read();

    ctx.close();

    }

    }

    ```


    使用 `@EnableAutoConfiguration` 注解代替 `@SpringBootApplication`，是因为一些自定义配置来自 `PetServiceConfig`
    类，我们希望对其进行控制。但该应用程序仍然是一个 Spring Boot 应用程序。

    '
- fmt: '注意`@EnableDiscoveryClient`注解，它是将此应用程序转换为微服务的关键组件，因为它启用了服务注册与发现。该进程使用应用程序名称`pets-service`进行注册，并指定它将在`pet-server.yml`配置文件的端口4000上可用。其内容如下面的配置片段所示。


    ```yaml

    # Spring properties

    spring:

    application:

    name: pets-service    # Service registers under this name

    # HTTP Server

    server:

    port: 4000 # HTTP (Tomcat) port

    # Discovery Server Access

    eureka:

    client:

    registerWithEureka: false

    fetchRegistry: true

    serviceUrl:

    defaultZone: http://localhost:3000/eureka/

    instance:

    leaseRenewalIntervalInSeconds: 5

    preferIpAddress: false

    ```


    上述配置片段包含三个部分：


    *   Spring部分将应用程序名称定义为`pets-service`。微服务将使用此名称向Eureka服务器注册。

    *   Server部分定义了要监听的自定义端口。应用程序中的所有微服务进程默认使用Tomcat，因为它是`spring-boot-starter-web`的隐式依赖项，并且默认会尝试使用8080端口，而同一时间只有一个进程可以监听一个端口。因此，每个微服务将通过配置分配一个不同的端口。`pets-service`分配了4000端口，`user-service`分配了4001端口，`web-service`分配了4002端口。

    *   Eureka部分使用`eureka.client.serviceUrl.defaultZone`定义了要注册的服务器的URL。可以设置其他属性来自定义与Eureka服务器的交互。


    `eureka.client.registerWithEureka`属性的默认值为"true"，用于注册Eureka客户端。此处显式使用它用于教学目的，以便更清楚地表明`pets-service`微服务是一个客户端。


    *   Eureka客户端从服务器获取注册信息并在本地缓存。之后，客户端使用该信息来查找其他服务。由于`pets-service`不需要与其他微服务通信，因此它不需要使用注册信息。所以将`eureka.client.fetchRegistry`设置为`false`，以避免在无用的操作上浪费时间和资源。

    *   Eureka客户端需要通过发送一个称为`heartbeat`的信号来告知服务器它们仍然处于活动状态。默认情况下，间隔为30秒。但可以通过自定义`eureka.instance.leaseRenewalIntervalInSeconds`属性的值来设置为更短的间隔。在开发期间，可以将其设置为较小的值，这将加快注册速度，但在生产环境中，这将产生与服务器的额外通信，可能导致服务延迟。对于生产环境，不应修改默认值。

    *   `eureka.instance.preferIpAddress`用于告知Eureka服务器是应使用域名还是IP。在我们的案例中，由于所有内容都在同一台机器上运行，我们更倾向于使用域名（localhost），这就是将该属性设置为`false`的原因。


    所有这些细节以及更多信息都可以在Netflix GitHub页面[`https://github.com/Netflix/eureka/wiki/Understanding-eureka-client-server-communication`](https://github.com/Netflix/eureka/wiki/Understanding-eureka-client-server-communication)上找到。此处仅引用并解释了对于作为示例给出的实现重要的部分。


    `PetServer`类引入了一个新的Spring Boot主类，因此Gradle构建现在会失败，因为它不知道要执行哪个主类。因此，必须修改Gradle配置以指定应用程序的主类。但由于`17-ps-micro-sample`是一个分布式应用程序，其目的是能够多次启动它：


    *   一次作为发现和注册服务器，监听3000端口

    *   一次作为`pets-service`微服务，监听4000端口

    *   一次作为`users-service`微服务，监听4001端口

    *   一次作为`web-service`微服务，监听4002端口


    这意味着主类应根据提供给它的参数启动不同的Spring应用程序。对于作为示例给出的应用程序，主类如下所示：


    ```java

    package com.ps;

    import com.ps.pet.PetServer;

    import com.ps.server.DiscoveryServer;

    import com.ps.user.UserServer;

    import com.ps.web.WebServer;

    import java.io.IOException;

    public class Application {

    public static void main(String args) throws IOException {

    if (args.length == 0) {

    System.out.println("Specify application to start!

    (Options: reg, user, pet, web)");

    } else {

    switch (args0) {

    case "reg":

    DiscoveryServer.main(args);

    break;

    case "user":

    UserServer.main(args);

    break;

    case "pet":

    PetServer.main(args);

    break;

    case "web":

    WebServer.main(args);

    break;

    default:

    System.out.println("Specify application to start!

    (Options: reg, user, pet, web)");

    }

    }

    }

    }

    ```


    为了告知Spring Boot插件这是应用程序的主类，我们将以下配置片段添加到Gradle配置文件中：


    ```groovy

    springBoot {

    mainClass = "com.ps.Application"

    }

    ```


    现在可以使用`gradle clean build`再次构建Gradle应用程序。此构建的结果将是`ps-micro-1.1.0.RELEASE.jar`，位于`17-ps-micro-sample/build/libs`下。运行应用程序多个实例的最简单方法是打开多个终端（Windows中的命令提示符实例），并使用应用程序中可用的所有不同参数执行`java
    -jar ps-micro-1.1.0.RELEASE.jar`。这对于优雅地关闭它们，或者当只需要停止其中一个服务时也很实用。在图[8-6](#A978-1-4842-0811-3_8_Chapter.html#Fig6)中，描绘了用于启动应用程序不同实例的四个终端。


    ![A978-1-4842-0811-3_8_Fig6_HTML.jpg](A978-1-4842-0811-3_8_Fig6_HTML.jpg)


    图8-6. 启动17-ps-micro-sample应用程序的不同实例


    服务的注册最多需要30秒（如果未通过`eureka.instance.leaseRenewalIntervalInSeconds`属性的较小值另行设置），因此请耐心等待并观察注册服务器的控制台日志。所有主类都以显示`Started
    ...`文本结束。如果显示了此文本并且在任何控制台中都没有看到异常，则意味着所有实例都已正确启动。注册后，当访问Eureka服务器的`http://localhost:3000/`界面时，您应该在实例选项卡中看到所有已注册的客户端服务，如图[8-7](#A978-1-4842-0811-3_8_Chapter.html#Fig7)所示。


    ![A978-1-4842-0811-3_8_Fig7_HTML.jpg](A978-1-4842-0811-3_8_Fig7_HTML.jpg)


    图8-7. 向Eureka服务器注册的客户端微服务


    您可以在`http://localhost:3000/eureka/apps/`中查看有关已注册微服务的更多详细信息。


    ```xml

    UP_3_


    PETS-SERVICE


    192.168.56.1:pets-service:4000

    192.168.56.1

    PETS-SERVICE

    192.168.56.1

    UP

    UNKNOWN


    http://192.168.56.1:4000/health

    ...


    ...

    ```


    如果服务已正确启动，则可以在[`http://192.168.56.1:3000/eureka/apps/PETS-SERVICE`](http://192.168.56.1:3000/eureka/apps/PETS-SERVICE)获取相同的信息。否则，将显示404错误。'
