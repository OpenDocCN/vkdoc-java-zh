  raw: '#### Constructor Injection


    Constructor injection can be used to define beans when the bean type is a class
    that has a constructor with arguments defined. If the bean definition looks like
    this:


    Then the class `ComplexBeanImpl` looks like this:


    ```

    public class ComplexBeanImpl implements ComplexBean {

    private SimpleBean simpleBean;

    public ComplexBeanImpl(SimpleBean simpleBean) {

    this.simpleBean = simpleBean;

    }

    ...

    }

    ```


    The code and configuration snippets above provide all the necessary information
    so that the Spring container can create a bean of type `SimpleBeanImpl` named
    `simpleBean` and then inject it into a bean of type `ComplexBeanImpl` named `complexBean`.
    What is done behind the scenes is:


    ```

    SimpleBean simpleBean = new SimpleBeanImpl();

    ComplexBean complexBean = new ComplexBeanImpl(simpleBean);

    ```


    Spring creates the beans in the order they are needed. The dependencies are first
    created and then injected into the beans that need them.


    What you have to remember when it comes to constructor injection is that the template
    for a bean definition using it looks like this:


    The `<constructor-arg />` element defines the constructor argument and does so
    using a number of attributes, but `ref` is the most common, and it is used to
    tell the container that the value of this attribute is a reference to another
    bean. The complete list of attributes and documentation for each one can be found
    in `spring-beans-4.3.xsd`, which can be accessed easily from Intellij IDEA by
    pressing CTRL (Command in MacOS systems) while clicking on `constructor-arg` in
    your configuration file.


    Another attribute that is commonly used is `value`. This attribute is used when
    the value to inject is a scalar.[³](#A978-1-4842-0811-3_2_Chapter.html#Fn3) So
    text values, numbers, booleans, all can be used as arguments for the constructor
    using the `value` attribute.


    ```


    ...


    // ComplexBeanImpl.java constructor

    public ComplexBeanImpl(SimpleBean simpleBean, boolean complex) {

    this.simpleBean = simpleBean;

    this.complex = isComplex;

    }

    ```


    So what happens here is equivalent to:


    ```

    ComplexBean complexBean = new ComplexBeanImpl(simpleBean, true);

    ```


    And also quite useful is the `index` attribute, which should be used when the
    constructor has more parameters of the same type.


    ```


    // ComplexBean2Impl.java constructor

    public ComplexBean2Impl(SimpleBean simpleBean1, SimpleBean simpleBean2) {

    this.simpleBean1 = simpleBean1;

    this.simpleBean2 = simpleBean2;

    }

    ```


    So what happens here is equivalent to:


    ```

    ComplexBean complexBean2 = new ComplexBean2Impl(simpleBean0, simpleBean1);

    ```


    Another way to handle constructors with more parameters of the same type is to
    use the `name` attribute, which receives as its value the name of the parameter
    of the constructor. And obviously, using it makes the configuration a lot clearer
    and easier to read. So for the `complexBean2` defined previously, there is another
    configuration that does the same job.


    Developers choose to use constructor injection when it is mandatory for the dependencies
    to be provided, since the bean depending on them cannot be used properly without
    them. Dependency injection also is suitable when a bean needs to be immutable,
    by assigning the dependencies to final fields. The most common reason to use constructor
    injection is that sometimes, third-party dependencies are used in a project, and
    their classes were designed to support only this type of dependency injection.


    In creating a bean, there are two steps that need to be executed one after the
    other. The bean first needs to be instantiated, and then the bean must be initialized.
    The constructor injection combines two steps into one, because injecting a dependency
    using a constructor means basically instantiating and initializing the object
    at the same time.


    If `constructor-arg` seems to be a long name for a configuration element, do not
    worry. Spring has introduced a fix for that in version 3.1 the c-namespace : `xmlns:c="`
    [`http://www.springframework.org/schema/c`](http://www.springframework.org/schema/c)
    `"`. This namespace allows usage of inline attributes for configuring the constructor
    arguments and does not have an XSD schema, since it does not introduce any new
    configuration elements. Just add it to the bean configuration file and your configuration
    can be simplified like this:


    What you should remember when using the c-namespace is that when the dependency
    is another bean, the `"-ref"` postfix is added to the `c:` prefixed attributes.


    !


    If you are using the name of the constructor parameter to inject the dependency,
    then the attribute definition with `c:` should match the pattern `c:nameConstructorParameter[-ref]`,
    while if you are using indexes, the attribute definition should match `c:_{index}[-ref]`.


    !


    All these examples can be found in the `02-ps-container-01-practice` project.
    The package containing all beans and configurations for trying out constructor
    injections is named `com.ps.beans.ctr`. The configuration files are stored under
    `02-ps-container-01-practice/src/main/resources/spring/ctr`, and there are two
    configuration files: `sample-config-01.xml`, containing the bean definitions using
    the `constructor-arg` element, and `sample-config-02.xml`, containing the bean
    definitions using the c-namespace.


    In order to test the validity of these files, run the test in the `com.ps.beans.ctr.CIBeansTest`
    class. There is also a TODO task in there, asking you to retrieve beans of types
    `ComplexBean` and make sure that their dependencies were correctly set. How you
    do this is up to you, since there are many ways to do it. A solution is provided
    for you in the `02-ps-container-01-solution`. If you want, you can take a break
    from the book and try to solve the task now.'
  trans: '

    #### 构造器注入


    当 Bean 的类型是一个定义了带参数构造器的类时，可以使用构造器注入来定义 Bean。如果 Bean 的定义如下所示：


    那么 `ComplexBeanImpl` 类看起来是这样的：


    ```

    public class ComplexBeanImpl implements ComplexBean {

    private SimpleBean simpleBean;

    public ComplexBeanImpl(SimpleBean simpleBean) {

    this.simpleBean = simpleBean;

    }

    ...

    }

    ```


    上述代码和配置片段提供了所有必要的信息，以便 Spring 容器能够创建一个名为 `simpleBean` 的 `SimpleBeanImpl` 类型 Bean，然后将其注入到一个名为
    `complexBean` 的 `ComplexBeanImpl` 类型 Bean 中。其幕后执行的操作是：


    ```

    SimpleBean simpleBean = new SimpleBeanImpl();

    ComplexBean complexBean = new ComplexBeanImpl(simpleBean);

    ```


    Spring 会按照依赖所需的顺序创建 Bean。依赖项会首先被创建，然后注入到需要它们的 Bean 中。


    关于构造器注入，你需要记住的是，使用它的 Bean 定义模板如下所示：


    `<constructor-arg />` 元素用于定义构造器参数，它通过多个属性来实现，但 `ref` 是最常用的属性，它用于告诉容器该属性的值是对另一个
    Bean 的引用。所有属性的完整列表及其文档可以在 `spring-beans-4.3.xsd` 中找到，在 Intellij IDEA 中，你可以通过按住
    CTRL（MacOS 系统中为 Command）键并点击配置文件中的 `constructor-arg` 来轻松访问该文件。


    另一个常用的属性是 `value`。当要注入的值是标量时，会使用此属性。³ 因此，文本值、数字、布尔值都可以通过 `value` 属性作为构造器的参数使用。


    ```


    ...


    // ComplexBeanImpl.java 构造器

    public ComplexBeanImpl(SimpleBean simpleBean, boolean complex) {

    this.simpleBean = simpleBean;

    this.complex = isComplex;

    }

    ```


    所以这里发生的事情等同于：


    ```

    ComplexBean complexBean = new ComplexBeanImpl(simpleBean, true);

    ```


    同样非常有用的是 `index` 属性，当构造器有多个相同类型的参数时，应该使用该属性。


    ```


    // ComplexBean2Impl.java 构造器

    public ComplexBean2Impl(SimpleBean simpleBean1, SimpleBean simpleBean2) {

    this.simpleBean1 = simpleBean1;

    this.simpleBean2 = simpleBean2;

    }

    ```


    所以这里发生的事情等同于：


    ```

    ComplexBean complexBean2 = new ComplexBean2Impl(simpleBean0, simpleBean1);

    ```


    处理具有多个相同类型参数的构造器的另一种方法是使用 `name` 属性，该属性接收构造器参数的名称作为其值。显然，使用它会使配置更加清晰易读。因此，对于之前定义的
    `complexBean2`，还有另一种配置可以实现相同的功能。


    当依赖项是必须提供的时候，开发者会选择使用构造器注入，因为依赖于它们的 Bean 如果没有这些依赖项就无法正常使用。当一个 Bean 需要是不可变的（通过将依赖项赋值给
    final 字段）时，依赖注入也同样适用。使用构造器注入最常见的原因是，有时项目中会使用第三方依赖，而这些依赖的类被设计为仅支持这种类型的依赖注入。


    在创建 Bean 时，有两个步骤需要依次执行。首先需要实例化 Bean，然后必须初始化 Bean。构造器注入将这两个步骤合二为一，因为使用构造器注入依赖项基本上意味着同时实例化和初始化对象。


    如果 `constructor-arg` 作为配置元素的名称看起来有点长，请不要担心。Spring 在 3.1 版本中为此引入了一个解决方案：c-命名空间：`xmlns:c="`
    [`http://www.springframework.org/schema/c`](http://www.springframework.org/schema/c)
    `"`。这个命名空间允许使用内联属性来配置构造器参数，并且它没有 XSD 模式，因为它没有引入任何新的配置元素。只需将其添加到 Bean 配置文件中，你的配置就可以简化如下：


    使用 c-命名空间时，你应该记住，当依赖项是另一个 Bean 时，需要在 `c:` 前缀的属性后添加 `"-ref"` 后缀。


    !


    如果你使用构造器参数的名称来注入依赖项，那么使用 `c:` 的属性定义应匹配模式 `c:nameConstructorParameter[-ref]`；而如果你使用索引，则属性定义应匹配
    `c:_{index}[-ref]`。


    !


    所有这些示例都可以在 `02-ps-container-01-practice` 项目中找到。包含所有用于尝试构造器注入的 Bean 和配置的包名为 `com.ps.beans.ctr`。配置文件存储在
    `02-ps-container-01-practice/src/main/resources/spring/ctr` 目录下，有两个配置文件：`sample-config-01.xml`（包含使用
    `constructor-arg` 元素的 Bean 定义）和 `sample-config-02.xml`（包含使用 c-命名空间的 Bean 定义）。


    为了测试这些文件的有效性，请运行 `com.ps.beans.ctr.CIBeansTest` 类中的测试。其中还有一个 TODO 任务，要求你检索 `ComplexBean`
    类型的 Bean，并确保它们的依赖项已正确设置。如何实现这一点取决于你，因为有很多方法可以做到。在 `02-ps-container-01-solution`
    中为你提供了一个解决方案。如果你愿意，可以暂时放下书本，尝试立即解决这个任务。

    '
- fmt: '### Setter Injection


    In order to use setter injection, the class type of the bean must have setter
    methods used to set the dependencies. A constructor is not mandatory. If no constructor
    is declared, Spring will use the default “no argument” constructor, which every
    class automatically inherits for the Java Object class to instantiate the object
    and the setter methods to inject dependencies. If a no argument constructor is
    explicitly defined, Spring will use it to instantiate the bean. If a constructor
    with parameters is defined, the dependencies declared in this way will be injected
    using constructor-injection, and the ones defined using setters will be injected
    via setter injection.


    In conclusion, when creating a bean using setter injection, the bean is first
    instantiated by calling the constructor and then initialized by injecting the
    dependencies using setters. (Of course, you will learn later in this chapter that
    initialization can split into two steps too: setting dependencies and calling
    a special init method that processes those dependencies.) So if your bean definition
    looks like this:


    Then the class `com.ps.beans.set.ComplexBeanImpl` looks like this:


    ```

    public class ComplexBeanImpl implements ComplexBean {

    private SimpleBean simpleBean;

    // no-argument empty constructor, not mandatory

    public ComplexBeanImpl() {}

    public void setSimpleBean(SimpleBean simpleBean) {

    this.simpleBean = simpleBean;

    }

    public SimpleBean getSimpleBean() {

    return simpleBean;

    }

    }

    ```


    The code and configuration snippets above provide all the necessary information
    so that the Spring container can create a bean of type `SimpleBeanImpl` and a
    bean named `simpleBean0` and then inject it into a bean of type `ComplexBeanImpl`
    named `complexBean`. The dependency is injected after the bean is instantiated
    by calling the `setSimpleBean` method and providing the simpleBean as argument.
    What is done behind the scenes is:


    ```

    SimpleBean simpleBean = new SimpleBeanImpl();

    ComplexBean complexBean = new ComplexBeanImpl();

    complexBean.setSimpleBean(simpleBean);

    ```


    What you have to remember when it comes to setter injection is that the template
    for a bean definition using it looks like this:


    The `<property />` element defines the property to be set and the value to be
    set with and does so using a pair of attributes: `[name, ref]` or `[name,value]`.


    The `name` attribute is mandatory, because its value is the name of the bean property
    to be set.


    The `ref` attribute is used to tell the container that the value of this attribute
    is a reference to another bean.


    The `value`, as you probably suspect, is used to tell the container that the value
    is not a bean, but a scalar value.


    ```

    // ComplexBeanImpl.java

    public class ComplexBeanImpl implements ComplexBean {

    private SimpleBean simpleBean;

    private boolean complex;

    public ComplexBeanImpl() {}

    public void setSimpleBean(SimpleBean simpleBean) {

    this.simpleBean = simpleBean;

    }

    public void setComplex(boolean complex) {

    this.complex = complex;

    }

    }

    ```


    As with construction injection, Spring also has a namespace for simplifying XML
    definition when one is using setter injection. It is called the p-namespace: [`http://www.springframework.org/schema/p`](http://www.springframework.org/schema/p)
    `.` This namespace allows the use of inlined attributes for configuring property
    arguments and does not have an XSD schema, since it does not introduce any new
    configuration elements. Just add it to the bean configuration file and your configuration
    can be simplified. The `-ref` postfix for the `"p:"` attributes has the role of
    telling the container that the value of the attribute is a reference to another
    bean.


    And this is all that can be said about the setter injection for now. Choosing
    between setter and constructor injection depends only on the needs of the application,
    the code that is already written and cannot be changed (legacy code) and third
    party libraries. The advantage of setter injection is that the dependencies are
    optional and defaults can be used, and also inheritance. When deciding on what
    to use, follow the best practices as much as possible:


    *   Use constructor injection when properties are required.

    *   Use setter injection when properties are not required.

    *   Use the strategy matching the implementation of bean type.

    *   Be consistent.


    Constructor and setter injection can be used together in creating the same bean.
    Here is an example:


    ```

    //ComplexBean2Impl.java

    public class ComplexBean2Impl implements ComplexBean {

    private SimpleBean simpleBean;

    private boolean complex;

    public ComplexBean2Impl(SimpleBean simpleBean)

    {

    this.simpleBean = simpleBean;

    }

    public void setComplex(boolean complex) {

    this.complex = complex;

    }

    }

    ```


    All these examples can be found in the `02-ps-container-01-practice` project.
    The package containing all beans and configurations for trying out setter injection
    is named `com.ps.beans.set`. The configuration files are stored under `02-ps-container-01-practice/src/main/resources/spring/set`,
    and there are two configuration files: `sample-config-01.xml`, containing the
    bean definitions using the `property` element, and `sample-config-02.xml`, containing
    the bean definitions using the p-namespace.


    In order to test the validity of these files, run the test in the `com.ps.beans.set.SIBeansTest`
    class. There is also a TODO task in there, asking you to retrieve beans of types
    `ComplexBean` and make sure that their dependencies were correctly set. How you
    do this is up to you, since there are many ways to do it. A solution is provided
    for you in the `02-ps-container-01-solution`. If you want, you can take a break
    from the book and try to execute this task now.'
