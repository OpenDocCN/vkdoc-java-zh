    \ with other implementations without any changes required in the code. If you\
    \ use the `LocalSessionFactoryBuilder` Spring class to create the `SessionFactory`\
    \ bean, it will be wrapped up in a proxy that will make sure that every session\
    \ opened by this bean will participate in the current transaction. When Hibernate\
    \ is used, declaring transactions as `readOnly` when they do not perform write\
    \ operations could lead to considerable performance optimizations, because Hibernate\
    \ will skip the flushing of the session (there is, after all, nothing to flush).\n\
    \nAnd now that Hibernate has been introduced, some more information about ORM\
    \ is appropriate before we dive deep into JPA.\n\n## Object Relational Mapping\n\
    \nObject Relational Mapping, or ORM, is a method of mapping database objects to\
    \ application objects and vice versa. This makes for easy handling of data objects.\
    \ Aside from that, it also provides the possibility of querying the database using\
    \ an object oriented approach. Hibernate’s full name is Hibernate ORM, because\
    \ it implements this technique to allow querying and persisting of data objects.\
    \ A data object is also called a domain object or entity. Whatever its name, this\
    \ object corresponds to a database object, usually a row from a table. There are\
    \ more complex objects that can be defined and can encapsulate data from multiple\
    \ tables, but since this topic is irrelevant for this book, the details will be\
    \ kept to a minimum. Domain objects are easy to use in the application, because\
    \ they encapsulate all data related to a table row stored in accessible fields.\
    \ When a row in a table becomes a domain object, the following correspondences\
    \ are made:\n\n*   The primary key value is stored in an ID field. This field\
    \ is used to identify the object in the application. In the database, the identity\
    \ is a simple topic. In Java, because objects are involved, things are a little\
    \ different. Two domain objects can be logically equivalent, but only one of them\
    \ has the ID field set with a primary key value, so the `equals` and `hashcode`\
    \ methods must be adjusted to take this aspect into consideration.\n\n*   One-to-many\
    \ relationships from the database are mapped to the `HAS-A` relationship. The\
    \ domain object has a collection of domain objects as a field. Usually this relationship\
    \ is bidirectional, and each object in the collection has a field referencing\
    \ the parent object. This field is mapped in the database to the foreign key column.\n\
    \n*   Entries from the same table can be mapped to different types of domain objects\
    \ in the same hierarchy using a column value as discriminator.\n\nUsing an ORM\
    \ framework introduces the following benefits:\n\n*   It provides mapping of database\
    \ records to application objects.\n\n*   So no extra code needs to be written\
    \ for this.\n\n*   It usually provides a rich object query language that is more\
    \ intuitive and easier to use than native SQL.\n\n*   It provides easy navigation\
    \ through objects using their relationships.\n\n*   It provides persistence through\
    \ reachability. Look at the following code snippet:\n\n```\n    public class User\
    \ extends AbstractEntity {\n    ...\n    @OneToMany(mappedBy = \"owner\",\n  \
    \  cascade = {CascadeType.PERSIST, CascadeType.REMOVE})\n    private Set pets\
    \ = new HashSet();\n    }\n```\n\nThe `cascade` attribute defines what happens\
    \ with child records from the `P_PET` table, which are mapped to `Pet` objects,\
    \ when the parent domain object of type `User` is modified. If the `User` object\
    \ is created together with the `Pet` objects at the same time, only the `User`\
    \ object must be persisted to the database, since the persist operation will propagate\
    \ to the child domain objects because of the `CascadeType.PERSIST` value. If the\
    \ `User` object is deleted, child domain objects are deleted as well because of\
    \ the `CascadeType.REMOVE`.\n\n*   It provides concurrency support: multiple processes\
    \ can update the same data in parallel.\n\n*   It provides cache management per\
    \ level:\n\n*   per transaction (first-level cache): when an object is first loaded\
    \ from the database, the object is stored in this cache, and subsequent requests\
    \ for it will use the cache instead of going to the database.\n\n*   per datasource\
    \ (second-level cache at `SessionFactory` level): reduces trips to the database\
    \ for read-heavy data and is shared by all sessions created by the `SessionFactory`\
    \ bean. When a domain object is not found in the first-level cache, the next place\
    \ to look is this cache. If found, the model object is also stored in the first-level\
    \ cache before it is returned.\n\n*   transaction management and isolation.\n\n\
    *   key management, since identifiers are automatically propagated and managed.\
    \ Example: when a `User` object and its `Pet` instances are created in the system,\
    \ the user ID (primary key) is generated and used automatically to populate the\
    \ foreign key fields in the pet domain objects as well.\n\n*   ORM-specific code\
    \ can be reused. (In the sample projects for this book, inheritance is used for\
    \ domain objects, repositories, and services).\n\n*   ORM code has already been\
    \ tested and is maintained by the creators of the framework; thus using an ORM\
    \ reduces the effort of testing.\n\nAside from Hibernate, Spring supports integration\
    \ with all major ORM/persistence providers such as EclipseLink, MyBatis, and Open\
    \ JPA. Although really practical, ORM introduces a little lag for large amounts\
    \ of data, so in this case, JDBC and native SQL should be used when speed of data\
    \ processing is a performance criterion.\n\n## Java Persistence API\n\nThe previous\
    \ example, depicting a Spring repository class using `SessionFactory` directly,\
    \ ties Spring with Hibernate. Java Persistence API, also called JPA, introduces\
    \ a common interface for object relational mapping and persistence that allows\
    \ the ORM framework used to be switched easily. JPA is designed for operating\
    \ on domain objects defined as POJOs. It replaces previous persistence mechanisms:\
    \ EJB and JDO(Java Data Objects). It was first introduced in 2006 and has overcome\
    \ initial limitations to successfully provide a set of specific JPA annotations\
    \ that are supported by all ORM frameworks and persistence frameworks for Java.\
    \ The annotations introduced in the previous section to configure domain objects\
    \ are part of the `javax.persistence` package, which contains all JPA components.\n\
    \nThe core JPA components are as follows:"
