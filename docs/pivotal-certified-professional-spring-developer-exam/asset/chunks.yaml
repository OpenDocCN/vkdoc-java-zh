- fmt: "# Conceptual UML Sequence Diagram for a Distributed Transaction Involving\
    \ JMS and JDBC Resources\n\nBoth `JmsService` and `UserService` are transactional.\
    \ The sequence or execution steps are as follows:\n\n1. Start messaging transaction.\n\
    2. Receive message requesting update of a user record.\n3. Start database transaction\
    \ to edit the user record.\n4. Commit the database transaction if database was\
    \ updated with success. Otherwise, roll back the transaction.\n5. Commit the messaging\
    \ transaction if the database transaction was committed with success. If the database\
    \ transaction was rolled back, roll back the messaging transaction.\n\nUsing distributed\
    \ transactions requires a JTA and specific XA drivers.[^(13)](#A978-1-4842-0811-3_5_Chapter.html#Fn13)\
    \ There are many open-source and commercial JTA providers: JBossTS, Java Open\
    \ Transaction Manager (JOTM), and Atomikos.[^(14)](#A978-1-4842-0811-3_5_Chapter.html#Fn14)\
    \ Since distributed transactions are not a topic for the official certification\
    \ exam, nor part of the Spring Core components, this section will end here, because\
    \ something way more interesting follows.\n\n## Introducing Hibernate and ORM\n\
    \nThe term JPA was introduced earlier, but the time has come for it to be covered\
    \ in detail. JPA (Java Persistence API) is an interface for persistence providers\
    \ to implement. There are many JPA providers available for Java applications:\
    \ Hibernate, EclipseLink, Apache OpenJPA, etc.\n\nThe most popular of them is\
    \ Hibernate, one of the open source Red Hat projects. Hibernate ORM is an object\
    \ relational mapping framework that provides support for mapping an object oriented\
    \ domain model to a relational database. This framework is open-source, and Hibernate\
    \ has grown over the years into a full-fledged technology that has been split\
    \ into numerous tools for domain model validation, indexing and searching a JPA\
    \ for NoSQL databases (Hibernate OGM),[^(15)](#A978-1-4842-0811-3_5_Chapter.html#Fn15)\
    \ and so on. If you are curious about the Red Hat Hibernate project family, you\
    \ can find out more on their official site [`http://hibernate.org/`](http://hibernate.org/).\
    \ In this section, the basic details for configuring JPA with Hibernate will be\
    \ covered.\n\n## Session and Hibernate Configuration\n\nTo configure JPA with\
    \ Hibernate in a Spring application, the following components must be introduced:\n\
    \n* The `org.hibernate.SessionFactory` interface is the core component of Hibernate.\
    \ An object of this type is thread-safe, shareable, and immutable. Usually, an\
    \ application has a single `SessionFactory` instance, and threads servicing client\
    \ requests obtain `Session` instances from this factory. Once a `SessionFactory`\
    \ instance is created, its internal state is set. This internal state includes\
    \ all of the metadata about Object/Relational Mapping.\n\n* The `org.hibernate.Session`\
    \ interface is the hibernate component representing a single functional unit,\
    \ and it is the main runtime interface between a Java application and Hibernate.\
    \ The session is a stateful object that manages persistent objects within the\
    \ functional unit. It acts as a transactional-scoped cache, operations executed\
    \ in a session are basically cached, and the changes are persisted to the datasource\
    \ (the second-level cache) when the transaction is committed. A `Session` object\
    \ can be obtained by calling `sessionFactory.getCurrentSession()`.\n\n* `org.springframework.orm.hibernate*.HibernateTransactionManager`:\
    \ this class is an implementation of `PlatformTransactionManager` for a single\
    \ `SessionFactory`. Spring 4 currently contains three hibernate packages, one\
    \ for each version supported (3, 4, and 5). There is a `HibernateTransactionManager`\
    \ in each of them. The version for Hibernate 3 is currently deprecated and will\
    \ probably be removed in Spring 5.\n\n```\nimport org.springframework.transaction.PlatformTransactionManager;\n\
    ...\n@Bean\npublic PlatformTransactionManager transactionManager() {\n    return\
    \ new HibernateTransactionManager(sessionFactory());\n}\n```\n\n* `org.springframework.orm.hibernate5.LocalSessionFactoryBuilder`:\
    \ this is a utility class that can be used to create a `SessionFactory` bean.\
    \ The session factory bean requires as parameters the datasource used by the application,\
    \ the package where the entity classes can be found, and the hibernate properties.\n\
    \n```\nimport org.hibernate.SessionFactory;\nimport org.springframework.orm.hibernate5.LocalSessionFactoryBuilder;\n\
    ...\n@Bean\npublic SessionFactory sessionFactory() {\n    return new LocalSessionFactoryBuilder(dataSource())\n\
    \        .scanPackages(\"com.ps.ents\")\n        .addProperties(hibernateProperties())\n\
    \        .buildSessionFactory();\n}\n\n@Bean\npublic Properties hibernateProperties()\
    \ {\n    Properties hibernateProp = new Properties();\n    hibernateProp.put(\"\
    hibernate.dialect\", \"org.hibernate.dialect.H2Dialect\");\n    hibernateProp.put(\"\
    hibernate.hbm2ddl.auto\", \"create-drop\");\n    hibernateProp.put(\"hibernate.format_sql\"\
    , true);\n    hibernateProp.put(\"hibernate.use_sql_comments\", true);\n    hibernateProp.put(\"\
    hibernate.show_sql\", true);\n    return hibernateProp;\n}\n```\n\nThis class\
    \ was introduced in Spring 3.1 to replace the class `org.springframework.orm.hibernate3.annotation.AnnotationSessionFactoryBean`\
    \ that was used with Hibernate 3, and it was designed to work with Hibernate 4.\
    \ As you can probably infer at this point, a version for Hibernate 5 exists, which\
    \ was introduced in Spring 4.2. In case you are curious, an XML sample configuration\
    \ for Hibernate 3 using the deprecated class is depicted in the following code\
    \ snippet.\n\n```\ncom.ps.ents.User\ncom.ps.ents.Pet\ncom.ps.ents.Request\ncom.ps.ents.Response\n\
    com.ps.ents.Review\n\nhibernate.format_sql=true\nhibernate.show_sql=true\n```\n\
    \nThe `\"com.ps.ents\"` is the package in which the entity classes reside. They\
    \ represent the metadata that Hibernate needs so it can map them to database objects.\
    \ XML configuration of entity classes and Hibernate were used in previous versions,\
    \ though not that much now. In the previous code sample, the class `annotation.AnnotationSessionFactoryBean`\
    \ does not have a `scanPackages` property, so the entities have to be listed in\
    \ the XML configuration file as values in a list that is used as argument to set\
    \ the `annotatedClasses` property. The new approach is more practical, since it\
    \ removes the necessity of modifying the XML Spring configuration file when a\
    \ new entity class is added to the project.\n\nThe `hibernateProperties` is a\
    \ `java.util.Properties` that contains specific Hibernate properties. The most\
    \ useful are listed below:\n\n* `hibernate.dialect`: the value is a dialect class\
    \ matching the database used in the application (ex: `org.hibernate.dialect.H2Dialect`).\n\
    \n* `hibernate.hbm2ddl.auto`: the value represents what Hibernate should do when\
    \ the application starts: update the database to apply changes done in the metadata,\
    \ re-create the database altogether or do nothing. Possible values: `none (default\
    \ value), create-only, drop, create, create-drop, validate, update`. This is very\
    \ practical with embedded test databases, because the developer can focus on the\
    \ code instead of setting up the test database. If `create-drop` is used, Hibernate\
    \ will scan all the entities and generate tables and relationships among them\
    \ according to the specific annotations placed on their fields.\n\n* `hibernate.format_sql`:\
    \ if true, and the next property is true also, the generated SQL statements are\
    \ printed to the console in a pretty and readable way."
