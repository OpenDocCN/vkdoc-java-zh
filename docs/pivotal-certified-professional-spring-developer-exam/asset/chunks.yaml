    \ like this:  \n\n```  \n...  \n\" method=\"post\">  \n’/>  \n```  \n\nStarting\
    \ with Spring 4, the default login URL value is `/login`, and the default names\
    \ for the authentication keys are `username` and `password`, and thus the login\
    \ form must be modified to:  \n\n```  \n...  \n\" method=\"post\">  \n’/>  \n\
    ```  \n\nAll previous examples used default values for login URL and authentication\
    \ key names: `j_spring_security_check`, `j_username`, `j_password` (in Spring\
    \ Security 3), `login`, `username`, `password` (in Spring Security 4), but all\
    \ these values can be redefined using Spring configuration. Just set the following\
    \ attributes for the `<form-login ../>` element: `login-processing-url`, `username-parameter`,\
    \ `password-parameter` with the desired values.  \n\n```  \n/>  \n```  \n\nConfiguring\
    \ authentication is done in the Spring Security configuration file as well, and\
    \ the default authentication provider is the DAO Authentication provider. A specific\
    \ `UserDetailsService` implementation is used to provide credentials and authorities.\
    \ In the examples in the book, the credentials are specified directly in the Spring\
    \ Security Configuration file.  \n\nBut there are other options. To increase application\
    \ security a little more, the credentials could be read from a properties file,\
    \ where the password is stored in encrypted form and a salt can be applied using\
    \ configuration. Password-salting is an encryption method used to increase the\
    \ security of passwords by adding a well-known string to them.  \n\n```  \n#/WEB-INF/users.properties\
    \  \njohn=471540bd22898656564b9c85a18b3e80,ROLE_USER  \n#password: john  \njane=1f533ad8d26c7bec84a291f62668a048,ROLE_USER,ROLE_ADMIN\
    \  \n#password: jane  \nadmin=55c98bea671295de1e020621cc670ac4,ROLE_ADMIN  \n\
    #password: admin  \n```  \n\nThe passwords presented in the following code snippet\
    \ were generated by postfixing the password value with the \"SpringSalt\" text\
    \ and then applying an MD5 function on the resulting text value. Example:  \n\n\
    ```  \nMD5(\"john\"  +\"SpringSalt\")  =  \"471540bd22898656564b9c85a18b3e80\"\
    \  \n```  \n\nOn Windows, the MD5 hash can be generated only for files using the\
    \ `FCIV` command or the `Get-FileHash` command in the PowerShell. On MacOs there\
    \ is an `md5` command, and on Linux systems there is an `md5sum` command. In the\
    \ following code snippet, the call to generate the MD5 hash for a password equal\
    \ to \"john\" with the salt \"SpringSalt\" for MacOs and Linux are depicted. \
    \ \n\n```  \n#MacOS  \n$ echo \"johnSpringSalt\" | md5  \n471540bd22898656564b9c85a18b3e80\
    \  \n#Linux system  \n$ echo \"johnSpringSalt\" | md5sum  \n471540bd22898656564b9c85a18b3e80\
    \  \n```  \n\nThe credentials were decoupled from the configuration by isolating\
    \ them in a property file. The file can be edited outside the application, and\
    \ the properties can be reloaded using a property reader refreshable bean.  \n\
    \nThe credentials property file has a specific syntax:  \n\n```  \n[username]\
    \ = [password(encrypted)],[role1,role2...]  \n```  \n\nIn the previous example,\
    \ the passwords were added to the `SpringSalt` value and then were encrypted using\
    \ the `md5` algorithm. But they were all hashed in the exact same way and with\
    \ the same salt. If someone could find out the salt that the server uses, they\
    \ would become crackable. That is why the salt should be a random value, different\
    \ for each user, for example a property unique to that user such as its id. The\
    \ `salt-source` can be configured to use a constant user property such as the\
    \ ID as salt value as well.  \n\nIn the above examples, only the MD5 algorithm\
    \ was used, but there are more of them supported in Spring Security, and a developer\
    \ can use one of the supported ones (MD4, Bcrypt, SHA, SHA-256, etc.) or implement\
    \ his own.  \n\nThe in-memory, or directly in the configuration file, approach\
    \ is useful for testing and development, but in a production scenario, a securer\
    \ method of credential storage is usually used. In production environments, credentials\
    \ are stored in a database or LDAP system. In this case, the service providing\
    \ the credentials must be changed to a JDBC-based one:  \n\nThe authentication\
    \ tables must be accessible using the `authDataSource` bean, and their structure\
    \ must respect the following rules: one table is named `users`, one must be named\
    \ `authorities`, and the following queries must be executed correctly:  \n\n```\
    \  \nSELECT username, password, enabled FROM users WHERE username = ?  \nSELECT\
    \ username, authority FROM authorities WHERE username = ?  \n```  \n\nThe Spring\
    \ Security reference documentation includes some SQL scripts to create the security\
    \ tables. The syntax is for HSQLDB, but the scripts can easily be adjusted for\
    \ any SQL normalized database.  \n\nA few details from this section are general\
    \ and apply in a Java Configuration environment as well, but they were mentioned\
    \ here to paint a full view of the Spring Security framework. And now it is time\
    \ to see how Java Configuration can make all these configuration details more\
    \ practical and quicker to set up.  \n\n## Spring XML Configuration without web.xml\
    \  \n\nIf `web.xml` disappears, what happens with the `springSecurityFilterChain`\
    \ filter? The security filter gets transformed into a class extending a Spring\
    \ specialized class: `org.springframework.security.web.context.AbstractSecurityWebApplicationInitializer`.\
    \ And the class that matches the `DispatcherServlet` declaration must be made\
