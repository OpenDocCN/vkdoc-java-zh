  trans: "\n在页面上显示一个指向被禁止资源的链接，这到底有意义吗？当然没有。此外，生产环境的应用通常相当庞大，包含许多不同的 URL，因此使用 XML\
    \ 文件或安全配置类进行完整配置会变得相当复杂。为了简化这一点，从 Spring Security 2.0 版本开始，提供了一个安全标签库，可用于在 JSP\
    \ 层面保护项目。在上面的例子中，我们可以根据用户的安全配置，选择是否显示包含资源链接的列。\n\n```\n//\n\n...\n\n...\n\n${user.id}\n\
    \n${user.username}\n\n...\n\n```\n\n`<spring:url ../>` 元素是来自 Spring 标签库的一个标签，用于根据参数动态构建链接。上述代码片段中的定义将解析为如下链接：\n\
    \n`http://localhost:8080/mvc-security/users/show/12`，其中 12 是用户的 ID。\n\n上面的 `<sec:authorize\
    \ ../>` 的作用是，在用户通过身份验证后，其角色会被加载到安全上下文中，当他访问 `list.jsp` 页面时，系统会考虑其角色来计算响应视图。前面例子中的安全元素表明，只有拥有\
    \ ADMIN 角色的用户，其视图中才应包含含有 `/users/show/*` URL 的 `<td/>` 元素。因此，例如，只有 USER 角色的用户\
    \ `john`，其看到的视图将与拥有 `ADMIN` 角色的用户不同，如图 6-16 所示。\n\n![A978-1-4842-0811-3_6_Fig16_HTML.jpg](img/A978-1-4842-0811-3_6_Fig16_HTML.jpg)\n\
    \n图 6-16.\n\nADMIN 和 USER 角色下的 /users/show 视图\n\n根据前面所述，链接不会显示，但如果用户在浏览器中手动输入该链接会发生什么？如果配置中没有对该链接的限制，那么无论用户角色如何，视图都会显示给用户。因此，配置中的限制也是必需的。如果限制如本节开头的代码片段所示定义，那么可以在\
    \ JSP 代码中使用该安全规则，通过将 `authorize` 元素的 `access` 属性替换为 `url`，并将 `hasRole` 表达式替换为安全规则中定义的\
    \ URL，来避免像 `hasRole(\"ROLE_` `ADMIN` `\")` 这样复杂的表达式。这将告诉 Spring 在显示视图之前检查用户是否有权访问该\
    \ URL。如果没有，则会显示图 6-15 中的消息。这使得可以将安全规则链接到一个 URL 模式，该模式可以作为安全属性值来保护任何 URL 路径下的资源。因此，上面的\
    \ JSP 代码变为：\n\n```\n//\n\n...\n\n...\n\n${user.id}\n\n${user.username}\n\n...\n\
    \n```\n\n但还有另一个安全问题：填充视图的方法是在服务层定义的。如果应用程序也支持 Web 服务，我们如何防止用户直接调用该方法获取数据？或者通过远程\
    \ REST 调用？因为目前安全仅定义在 Web 层。下一节将介绍如何使用 Spring Security 在更低层级保护项目。\n\n方法安全\n\n为了将安全应用于应用程序的较低层，Spring\
    \ Security 使用了 AOP。相应的 Bean 被包装在一个代理中，该代理在调用目标方法之前，首先检查用户的凭证，并且仅在用户被授权调用时才调用该方法。在\
    \ XML 中，这种代理的定义是通过使用安全命名空间提供的 `global-method-security` 配置元素来启用方法级安全，并定义一个安全切入点及其适用的规则。\n\
    \n但是，使用 Spring Security 命名空间或 Java 配置和注解可以更轻松地完成相同的工作。有两种替代方法：\n\n1.  必须通过使用 `@EnableGlobalMethodSecurity(securedEnabled\
    \ = true)` 注解一个配置类（最佳实践是注解安全配置类，以便将所有与安全相关的配置集中在一个地方）来启用方法级安全。方法必须通过使用 Spring\
    \ Security 注解 `@Secured` 来保护。\n\n```\n    import org.springframework.security.config.annotation\n\
    \    .method.configuration.EnableGlobalMethodSecurity;\n    ...\n    @Configuration\n\
    \    @EnableWebSecurity\n    @EnableGlobalMethodSecurity(securedEnabled = true)\n\
    \    public class SecurityConfig extends WebSecurityConfigurerAdapter {\n    ...\n\
    \    }\n    //UserServiceImpl.java service class\n    import org.springframework.security.access.annotation.Secured;\n\
    \    ...\n    @Service\n    @Transactional(readOnly = true, propagation = Propagation.REQUIRED)\n\
    \    public class UserServiceImpl implements UserService {\n    @Secured(\"ROLE_ADMIN\
    \ \")\n    public User findById(Long id) {\n    return userRepo.findOne(id);\n\
    \    }\n    ...\n    }\n    ```\n\n使用 XML 的等效配置利用了 Spring Security 命名空间中定义的 `<global-method-security\
    \ ../>` 元素，该元素是注解 `@EnableGlobalMethodSecurity` 的 XML 等效项。要启用方法安全，必须将此元素的 `secured-annotations`\
    \ 属性配置为 `enabled` 值。\n\n2.  必须通过使用 `@EnableGlobalMethodSecurity(jsr250Enabled\
    \ = true)` 注解一个配置类（最佳实践是注解安全配置类，以便将所有与安全相关的配置集中在一个地方）来启用方法级安全。方法必须通过使用 JSR-250¹⁵\
    \ 注解来保护。\n\n```\n    import org.springframework.security.config.annotation\n \
    \   .method.configuration.EnableGlobalMethodSecurity;\n    ...\n    @Configuration\n\
    \    @EnableWebSecurity\n    @EnableGlobalMethodSecurity(jsr250Enabled = true)\n\
    \    public class SecurityConfig extends WebSecurityConfigurerAdapter {\n    ...\n\
    \    }\n    //UserServiceImpl.java service class\n    import javax.annotation.security.RolesAllowed;\n\
    \    ...\n    @Service\n    @Transactional(readOnly = true, propagation = Propagation.REQUIRED)\n\
    \    public class UserServiceImpl implements UserService {\n    @RolesAllowed(\"\
    ROLE_ADMIN \")\n    public User findById(Long id) {\n    return userRepo.findOne(id);\n\
    \    }\n    ...\n    }\n    ```\n\n使用 XML 的等效配置利用了 Spring Security 命名空间中定义的 `<global-method-security\
    \ ../>` 元素，该元素是注解 `@EnableGlobalMethodSecurity` 的 XML 等效项。要启用方法安全，必须将此元素的 `jsr250-annotations`\
    \ 属性配置为 `enabled` 值。\n\nJSR 250 注解是基于标准的，允许应用简单的基于角色的约束，但不如 Spring Security 的原生注解强大。\n\
    \n两种方法都会导致 Spring Security 将服务类包装在一个安全代理中。受保护方法执行的抽象模式以及所涉及的组件如图 6-17 所示。\n\n\
    ![A978-1-4842-0811-3_6_Fig17_HTML.jpg](img/A978-1-4842-0811-3_6_Fig17_HTML.jpg)\n\
    \n图 6-17.\n\n受保护方法执行的抽象模式\n\n有四个支持表达式属性的注解，它们是在 Spring 3.0 中引入的，用于允许调用前和调用后的授权检查，并支持过滤提交的集合参数或返回值：`@PreAuthorize`、`@PreFilter`、`@PostAuthorize`\
    \ 和 `@PostFilter`。它们在 XML 中通过 `<global-method-security ../>` 元素的 `pre-post-annotations`\
    \ 属性启用，该属性必须配置为 `enabled` 值。\n"
- fmt: 'They are enabled using Java Configuration by the `prePostEnabled` attribute
    of the `@EnableGlobalMethodSecurity` element that must be configured to have the
    `true` value.


    ```java

    import org.springframework.security.config.annotation.method.configuration.EnableGlobalMethodSecurity;

    ...

    @Configuration

    @EnableWebSecurity

    @EnableGlobalMethodSecurity(prePostEnabled = true)

    public class SecurityConfig extends WebSecurityConfigurerAdapter {

    ...

    }

    ```


    The annotation can be used as follows:


    ```java

    import org.springframework.security.access.prepost.PreAuthorize;

    ...

    @Service

    @Transactional(readOnly = true, propagation = Propagation.REQUIRED)

    public class UserServiceImpl implements UserService {

    @PreAuthorize("hasRole(’USER’)")

    public void create(User user){

    ...

    }

    }

    ```


    But the interesting thing about these annotations is that they can access method
    arguments. In the following snippet, the current logged-in user is verified if
    it has "admin" permission to delete the user given as argument. It does this using
    Spring ACL (Access Control List) classes.


    ```java

    import org.springframework.security.access.prepost.PreAuthorize;

    import org.springframework.security.acls.model.Permission;

    import org.springframework.security.acls.model.Sid;

    ...

    @Service

    @Transactional(readOnly = true, propagation = Propagation.REQUIRED)

    public class UserServiceImpl implements UserService {

    @PreAuthorize("hasPermission(#user, ’admin’)")

    public void delete(User user, Sid recipient, Permission permission){

    ...

    }

    }

    ```


    These annotations provide more granularity, since SpEL expressions can be used
    to restrict the domain that a user is allowed to affect with its actions. For
    example, in the following example, a user is allowed only to affect a user whose
    username matches that of the `user` argument.


    ```java

    import org.springframework.security.access.prepost.PreAuthorize;

    import org.springframework.security.acls.model.Permission;

    import org.springframework.security.acls.model.Sid;

    ...

    @Service

    @Transactional(readOnly = true, propagation = Propagation.REQUIRED)

    public class UserServiceImpl implements UserService {

    @PreAuthorize("#user.username == authentication.name")

    public void modifyProfile(User user){

    ...

    }

    }

    ```


    Spring Security ACL is very powerful and easy to implement when you can stick
    to their Spring database implementation. So if a project requires granulated control
    over resources, it is definitely the way to go.


    This is all that can be said about Spring Security, and before jumping to the
    next section you can test your knowledge and understanding by solving the TODO
    task from project `11-ps-security-practice`. There are seven TODO tasks numbered
    from 48 to 54, and if you need inspiration or confirmation that your solution
    is correct, you can compare it with the proposed solution that you can find in
    project `11-ps-security-solution`.


    Task TODO 48, located in the `SecurityWebApplicationInitializer` class, requires
    you to complete the configuration of this class to register the `DelegatingFilterProxy`
    bean.


    Task TODO 49, located in the `SecurityConfig` class, requires you to complete
    the configuration of this class to enable support for Spring Security.


    Task TODO 50, located in the `SecurityConfig` class, requires you to complete
    the configuration of this class to enable securing methods using annotations that
    express attributes.


    Task TODO 51, located in the `SecurityConfig` class, requires you to complete
    the configuration of the `http` object and define the users in Table [6-4](#A978-1-4842-0811-3_6_Chapter.html#Tab4),
    which you can also find in the `auth.jsp` page.


    Table 6-4. Application users


    | Username | Password | Role |

    | --- | --- | --- |

    | john | doe | USER |

    | jane | does | USER, ADMIN |

    | admin | admin | ADMIN |


    Task TODO 52, located in the `SecurityConfig` class, requires you to complete
    the configuration of the `http` object and ensure that all URLs matching `/users/show/*`
    and `/users/delete/*` are available only to users with role ADMIN.


    Task TODO 53, located in the `WebInitializer` class, requires you to complete
    the configuration of this class so that the spring context is registered as a
    root context.


    Task TODO 54, located in the `list.jsp` file, requires you to complete the implementation
    of this JSP page to hide the column with members’ IDs that contain the URL to
    the details view.


    ## Spring Boot


    Spring Boot is a set of preconfigured frameworks/technologies designed to reduce
    boilerplate configuration (infrastructure) and provide a quick way to have a Spring
    web application up and running. It’s goal is to allow developers to focus on implementation
    of the actual required functionality instead of how to configure an application,
    by providing out of the box ready-to-use infrastructure beans. On the official
    Spring Boot page[^(16)](#A978-1-4842-0811-3_6_Chapter.html#Fn16) a REST application
    is given as an example and almost 20 lines of code are needed to have a runnable
    application. Impressive right? And this is only one of the advantages of using
    Spring Boot.


    Spring Boot makes it easier for developers to build standalone production-level
    applications that are ready to run. Spring Boot can be used to create applications
    that are packed as a `jar` and can be run with `java -jar` or typical war packed
    projects that can be deployed on an application server. The new thing is that
    web archives can be executed with `java -jar` as well. The main focus of Spring
    Boot is on:


    * Setting up the infrastructure for a Spring project in a really short time.

    * Providing a default common infrastructure configuration but allowing easy divergence
    from the default as the application grows. So any default configuration can easily
    be overridden.

    * Provide a range of nonfunctional features common to a wide range of projects
    (embedded servers, security, metrics, health checks, externalized configuration).

    * Remove the need for XML and code configuration.


    The current stable version of Spring Boot as this book is being written is 1.4.0.RELEASE,
    which works with JDK 7+. In the book, source version 1.4.1.BUILD-SNAPSHOT will
    be used.


    ### Configuration


    Spring Boot can be used like any Java library. It can be added as a dependency
    to the project, since it does not require any special integration tools and can
    be used in any IDE. Spring Boot provides ‘starter’ POMs to simplify the Maven
    configuration of a project. When Maven is used, the project must have as a parent
    the `spring-boot-starter-parent`, so that useful Maven defaults are provided.
    Since the sources attached to this book use Gradle, it is very suitable that Gradle
    is supported too. For Gradle, there is no need to specify a parent, but Spring
    provides starter dependencies specific to different types of applications. Thus
    in the `pet-sitter` parent configuration, all starter dependencies and versions
    will be declared, and subprojects will use only what is needed. There are different
    starter dependencies depending on the type of application; in the sample below,
    only a few are declared.[^(17)](#A978-1-4842-0811-3_6_Chapter.html#Fn17) To reuse
    configuration declarations from the parent project, all Spring Boot components
    and versions will be declared in the `pet-sitter/build.gradle` file.'
