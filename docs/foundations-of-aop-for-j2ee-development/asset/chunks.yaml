    # The Business Tier


    The application is composed of two distinct parts: a bank administration interface
    (accounts and users) and an interface that allows the users to perform transactions
    on their accounts.


    These two interfaces use a model that is implemented with EJBs and that directly
    accesses the data tier.


    ## Session Facades


    *Session facades* are session EJB components that implement the application logic
    or, more specifically, the business functions. A facade defines a high-level interface
    that enables the subsystems accessed through it to be used more easily. Among
    other roles, it implements an isolation layer that permits the subsystems to evolve
    with minimal impact for the facades’ users.


    Facades are generally stateless and delegate to the entity EJBs. Usually, the
    client tier accesses the entity EJBs through these facades. For this simple application,
    we define only two facades: the `Bank` facade and the `TXController` facade.


    The `Bank` facade manages accounts and users, and is therefore used mainly for
    administrative purposes; users cannot, for example, create or delete accounts.
    Since the code is self-explanatory we do not describe all the services in detail.


    The code in Listing 10-2 shows the interface that corresponds to the public services
    of the `Bank` facade—that is to say, the services that are accessible through
    an administration client.


    **Listing 10-2.** *The Bank Interface*


    ```

    package aop.j2ee.business.session.bank;


    // imports


    [...]


    public interface Bank extends EJBObject {


    public String createAccount(String customerId, String type, String description,
    BigDecimal balance, BigDecimal creditLine, BigDecimal beginBalance, Date beginBalanceTimeStamp)

    throws RemoteException, IllegalAccountTypeException,

    CustomerNotFoundException, InvalidParameterException;


    public void removeAccount(String accountId)

    throws RemoteException, AccountNotFoundException,

    InvalidParameterException;


    public void addCustomerToAccount(String customerId,

    String accountId)

    throws RemoteException,

    AccountNotFoundException, CustomerNotFoundException,

    CustomerInAccountException, InvalidParameterException;


    public void removeCustomerFromAccount(String customerId, String accountId)

    throws RemoteException,

    AccountNotFoundException, CustomerRequiredException,

    ```'
