    \    try {\n      ut = null;\n    } catch (Exception ex) {\n      try {\n    \
    \    ut.rollback();\n      } catch (Exception e) {\n        throw new EJBException(\"\
    transferFunds: \" + e.getMessage());\n      }\n      throw new EJBException(\"\
    transferFunds: \" + ex.getMessage());\n    }\n  }\n\n  after() throwing(Exception\
    \ ex)\n    throws\n    EJBException : call(* Account+.*(..))\n    && withincode(*\
    \ TxControllerPOJO.transferFunds(..)) {\n    try {\n      if (ut != null)\n  \
    \      ut.rollback();\n    } catch (Exception e) {\n      throw new EJBException(\"\
    transferFunds: \" + e.getMessage());\n    }\n    throw new EJBException(\"transferFunds:\
    \ \" + ex.getMessage());\n  }\n}\n```\n\nThe anchoring protocol technique, however,\
    \ does not allow a precise management of exceptions. This can be solved by testing\
    \ the variable that indicates we are within the delimited zone (here `ut`).\n\n\
    When the environment allows, it is also important to take multithreading into\
    \ account (it is not used in our example). The use of the `threadlocals` for the\
    \ variables that have to be shared by advice codes is then necessary. The aspect\
    \ instantiation directive `perthread` can also be an elegant solution.\n\n## Summary\n\
    \nIn this chapter, we have presented the use of AOP to improve the design of the\
    \ business tier.\n\nFrom a separation of concerns perspective, we can conclude\
    \ that the AOP is successfully applied to our case study since many crosscutting\
    \ concerns have been more clearly separated, including the following:\n\n- Dependencies\
    \ towards the EJB/J2EE technology\n- Management and resolving of business object\
    \ references\n- Persistence\n- Preconditions (including technical and business\
    \ preconditions)\n- Transactions\n\nIt is still possible to modularize other concerns,\
    \ such as logging, that we have not shown here.\n\nFigure 11-3 shows the components\
    \ that form the business tier when all the aspects are applied. Each gray bar\
    \ corresponds to a regular EJB. Indeed, the gray color indicates that no aspects\
    \ have been applied. The first bar corresponds to the Entity EJB `AccountBean`,\
    \ the second corresponds to the `AccountPOJO`, and so on for each component.\n\
    \n![Image 15](index-283_1.png)\n\n**Figure 11-3.** *Business tier components and\
    \ their aspects*\n\nWe can note that the sizes of the business components implementations\
    \ are clearly smaller for the POJO versions. This comes from the persistence externalization.\n\
    \nAdvice codes are used more in facade components (like the last two) than in\
    \ the business components. This comes from an implementation choice, which makes\
    \ a great use of intertype declarations on business components.\n\n---\n\n# Chapter\
    \ 12\n\n## Using AOP in the Sample Application’s Presentation and Client Tiers\n\
    \nIn Chapter 11, we used AOP to improve the business tier design of the Duke’s\
    \ Bank case study application presented in Chapter 10. In this chapter, we’ll\
    \ investigate the use of AOP in other tiers—in particular, the Java (Swing) client\
    \ tier and the presentation tier. We will not use the data tier since it cannot\
    \ benefit from Java-based AOP techniques (as we explained previously in Chapter\
    \ 11).\n\nThe original design of the case study does not adapt completely to AOP\
    \ because it uses ad hoc design solutions. The web presentation tier, for example,\
    \ uses the Struts framework, which encapsulates some difficult design issues.\
    \ This does not mean that AOP cannot be useful, especially for improving Struts\
    \ implementation or integration. However, because of the inherent complexity,\
    \ in this chapter we introduce simplified pieces of design to more clearly illustrate\
    \ the advantages of AOP.\n\nWe first show the use of AOP in the Java Swing client,\
    \ and then we elaborate on its impacts for the web (Servlets/JSP) presentation\
    \ tier.\n\n### Using AOP for Distributed Communications\n\nCommunication issues\
    \ can arise when clients access the business servers in a three-tier J2EE environment.\
    \ The client tier contains several design patterns that are designed to deal with\
    \ the concerns that come with distributed communications.\n\nThe J2EE design patterns\
    \ for communication and data transfer most often impact the client side and occasionally\
    \ impact the server side. Thus, these patterns represent an important source of\
    \ crosscutting, especially when building multiclient applications.\n\nAs previously\
    \ explained, the use of J2EE design patterns is not mandatory. However, by using\
    \ them, we can contrast aspect-oriented implementations with well-documented,\
    \ well-known, and proven reference designs.\n\n### Design Patterns for Business\
    \ Layer Access\n\nThe three main J2EE design patterns for client/server communication\
    \ are the business delegate, the service locator, and the data transfer object.\
    \ In this chapter, we illustrate these patterns used with and without the help\
    \ of AOP.\n\nFor simplicity, we use a basic Java client that accesses the sample\
