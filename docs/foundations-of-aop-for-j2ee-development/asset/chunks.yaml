- fmt: '# The Data Tier


    The data tier is implemented by a set of tables within a relational database.
    Since this tier is based on the RDBMS technology, it does not benefit from AOP
    improvements. Only its access by another tier can be improved using AOP.


    For our simple application, the direct object-relational mapping can be applied
    (one table equals one business class). The table-creation script is shown in Listing
    10-1. The table `customer_account_xref` (line 34) implements the association between
    the clients and the accounts (multiple cardinality).


    **Listing 10-1.** *Table Creation Script for the Sample Application*


    ```

    1 // table creation

    2 CREATE TABLE account

    3 (account_id VARCHAR(8)

    4 CONSTRAINT pk_account PRIMARY KEY,

    5 type VARCHAR(24),

    6 description VARCHAR(30),

    7 balance DECIMAL(10,2),

    8 credit_line DECIMAL(10,2),

    9 begin_balance DECIMAL(10,2),

    10 begin_balance_time_stamp TIMESTAMP);

    12 CREATE TABLE customer

    13 (customer_id VARCHAR(8)

    14 CONSTRAINT pk_customer PRIMARY KEY,

    15 last_name VARCHAR(30),

    16 first_name VARCHAR(30),

    17 middle_initial VARCHAR(1),

    18 street VARCHAR(40),

    19 city VARCHAR(40),

    20 state VARCHAR(2),

    21 zip VARCHAR(5),

    22 phone VARCHAR(16),

    23 email VARCHAR(30));

    25 CREATE TABLE tx

    26 (tx_id VARCHAR(8)

    27 CONSTRAINT pk_tx PRIMARY KEY,

    28 account_id VARCHAR(8),

    29 time_stamp TIMESTAMP,

    30 amount DECIMAL(10,2),

    31 balance DECIMAL(10,2),

    32 description VARCHAR(30));

    34 CREATE TABLE customer_account_xref

    35 (customer_id VARCHAR(8),

    36 account_id VARCHAR(8));

