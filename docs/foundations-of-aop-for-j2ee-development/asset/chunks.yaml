    Control Flow Pointcut


    In Spring, *cflows* are implemented by org.springframework.aop.support.ControlFlowPointcut,
    which defines the two properties clazz and methodName. If methodName is null,
    the cflow starts at all the methods of the class. Compared to other AOP frameworks,
    the Spring cflows are quite limited since they cannot be applied to other pointcuts.
    Also, Spring does not support the cflowbelow concept. It is likely that, in the
    future, cflow capabilities will be enhanced if there is a strong need in the community
    to use them in the Spring context.


    **Associating an Interceptor with a Pointcut**


    In the previous section, we defined pointcuts in Spring. In order to associate
    an interceptor with a pointcut, the programmer must define a pointcut advisor.
    A pointcut advisor implements the org.springframework.aop.PointcutAdvisor interface,
    which is shown in Listing 6-17.


    **Listing 6-17.** *The PointcutAdvisor Interface*


    public interface PointcutAdvisor extends Advisor {


    Pointcut getPointcut();


    }


    And for an example of where org.springframework.aop.Advisor is the interface defining
    the advising, see Listing 6-18.


    **Listing 6-18.** *The Advisor Interface*


    public interface Advisor {


    boolean isPerInstance();


    Advice getAdvice();


    }


    You can see that the advisor defines the advice and the instantiation policy.
    If the isPerInstance method returns true, then a different advice instance will
    be used for each advised bean. If it returns false, one instance will be shared
    by all the advised beans in the application context. However, in Spring version
    1.2 (the version used at the time of this writing), our studies showed that the
    isPerInstance feature was not supported. So, only shared instances are available
    at the moment.


    In order to easily create new pointcut advisors, the programmer can use the org.


    springframework.aop.support.DefaultPointcutAdvisor as it comes or subclass it).
    With a bean configuration, we can bind an existing pointcut with an existing advice
    (see Listing 6-19).


    **Listing 6-19.** *Configuring an Advisor*


    <bean id="myAdvisor"


    class="org.springframework.aop.support.DefaultMethodPointcutAdvisor">


    <property name="advice"><ref local="myInterceptor"/></property>


    <property name="pointcut"><ref local="myPointcut"/></property>


    </bean>


    **126**


    C H A P T E R 6 ■ S P R I N G A O P


    The pointcut property can be omitted from the definition. In this case, the advisor
    will advise all the methods of all the beans, similar to a .* pointcut.


    As shown in our simple trace example, it is also possible to merge the definition
    of a regexp pointcut in an advisor (à la AspectJ). The advisor then automatically
    creates a new regexp pointcut, which is used to initialize the pointcut property.


    **Advice**


    The previous section presented the way for defining pointcuts in Spring. We now
    focus on writing and using advice code. Spring provides several types of advice.
    The most general form is the interceptor, which is similar to “around” advice.


    **Interceptors (“Around” Advice)**


    With Spring AOP, an interceptor class must implement the interface org.aopalliance.


    MethodInterceptor and provide the implementation for the invoke method, which
    defines the code to be run before and after the joinpoints.


    Since Spring is compliant with the AOP Alliance API, programming “around” advice
    is similar to programming “around” advice in JAC, and therefore the principles
    are the same (refer to the section entitled “Wrappers” in Chapter 4). Also, Figure
    4-1 gives the joinpoint model of AOP Alliance, which is available for introspection
    in Spring.


    Spring does not, however, support constructor interception. Since the beans are
    transparently built within the factory, which implements all the mechanics for
    dealing with beans within a particular context, the constructor interception is
    not suitable for the Spring Framework anyway. Thus, only the org.aopalliance.MethodInvocation
    is available for introspection in Spring.


    **Other Types of Advice**


    Spring AOP also supports other kinds of advice that are not defined in the AOP
    Alliance and do not rely on its introspection model.


    Even though using the “interceptor” advice is the most general form, using another
    type of advice can be beneficial because it is simpler to use, and it also can
    reflect better what the aspect does without having to read the advice code. In
    addition, it is generally slightly more efficient since it does not require the
    construction of the org.aopalliance.MethodInvocation instance for introspection.
    Thus, the following advice types are preferred and should be used if possible,
    unless the programmer needs the advice code to run on another AOP Alliance–


    compliant platform.


    “Before” Advice


    The main advantage of a “before” advice is that there is no need to invoke the
    proceed method, and therefore no possibility of inadvertently failing to proceed
    down the interceptor chain.


    A “before” advice implements the MethodBeforeAdvice interface, which is shown
    in Listing 6-20\. Even though this interface explicitly holds on method, Spring
    does not support field or constructor advising. However, the API design does leave
    room for such an extension.


    C H A P T E R 6 ■ S P R I N G A O P


    **127**


    **Listing 6-20.** *The BeforeAdvice Interface*


    public interface MethodBeforeAdvice extends BeforeAdvice {


    void before(Method m, Object[] args, Object target) throws Throwable;


    }


    Note that the return type is void. The “before” advice can insert a custom behavior
    before the joinpoint executes, but cannot change the return value. If a “before”
    advice throws an exception, this will abort further execution of the interceptor
    chain. The exception will propagate back up the interceptor chain. If it is unchecked,
    or on the signature of the invoked method, it will be passed directly to the client;
    otherwise it will be wrapped in an unchecked exception by the AOP proxy.


    Listing 6-21 provides an example of a “before” advice in Spring that counts all
    method invocations:


    **Listing 6-21.** *A Counting “Before” Advice Example* public class CountingBeforeAdvice
    implements MethodBeforeAdvice {


    private int count;


    public void before(Method m, Object[] args, Object target) throws Throwable {


    ++count;


    }


    public int getCount() {


    return count;


    }


    }


    “Throws” Advice


    “Throws” advice is invoked after the return of the joinpoint if the joinpoint
    threw an exception.


    Spring offers typed “throws” advice. This means that the org.springframework.aop.ThrowsAdvice
    interface does not contain any methods: it is a tag interface that indicates the
    given object implements one or more typed “throws” advice methods. These should
    be of the form afterThrowing ([Method], [args], [target], subclassOfThrowable).


    Only the last argument is required; therefore, there can be anything from one
    to four arguments, depending on whether the advice method is interested in the
    method and arguments.


    The following are examples of “throws” advice methods.


    This advice will be invoked if a RemoteException is thrown (including subclasses—see
    Listing 6-22).


    **Listing 6-22.** *A “Throws” Advice Example*


    public class RemoteThrowsAdvice implements ThrowsAdvice {


    public void afterThrowing(RemoteException ex) throws Throwable {


    // Do something with remote exception


    }


    }


    **128**


    C H A P T E R 6 ■ S P R I N G A O P


    The advice in Listing 6-23 is invoked if a ServletException is thrown. Unlike
    the preceding advice, it declares four arguments, so that it has access to the
    invoked method, method arguments, and target object:


    **Listing 6-23.** *A “Throws” Advice Example, with Arguments* public static class
    ServletThrowsAdviceWithArguments implements ThrowsAdvice {


    public void afterThrowing(Method m, Object[] args, Object target, ServletException
    ex) {


    // Do something with all arguments


    }


    }


    The final example, shown in Listing 6-24, illustrates how these two methods could
    be used in a single class, which handles both RemoteException and ServletException.
    Any number of


    “throws” advice methods can be combined in a single class.


    **Listing 6-24.** *A Combined “Throws” Advice Example* public static class CombinedThrowsAdvice
    implements ThrowsAdvice {


    public void afterThrowing(RemoteException ex) throws Throwable {


    // Do something with remote exception


    }


    public void afterThrowing(Method m, Object[] args, Object target, ServletException
    ex) {


    // Do something will all arguments


    }


    }


    “After Returning” Advice


    “After returning” advice in Spring implements the org.springframework.aop.


    AfterReturningAdvice interface, shown in Listing 6-25.


    **Listing 6-25.** *The AfterReturningAdvice Interface* public interface AfterReturningAdvice
    extends Advice {


    void afterReturning(Object returnValue, Method m, Object[] args, Object target)
    throws Throwable;


    }


    “After returning” advice can access the return value but cannot modify it. Like
    “before”


    advice, it can access the invoked method, the methods arguments, and the target.


    As an example, the “after returning” advice in Listing 6-26 counts all successful
    method invocations that have not thrown exceptions:


    C H A P T E R 6 ■ S P R I N G A O P


    **129**


    **Listing 6-26.** *A Counting “After” Advice Example* public class CountingAfterReturningAdvice
    implements AfterReturningAdvice {


    private int count;


    public void afterReturning(Object returnValue, Method m, Object[] args, Object
    target)


    throws Throwable {


    ++count;


    }


    public int getCount() {


    return count;


    }


    }


    This advice does not change the main execution path. If it throws an exception,
    this will be thrown up the interceptor chain instead of a return value.


    **“Introduction” Advice and Mix-Ins**


    In Spring, introductions are implemented as a special kind of advice: the “introduction”


    advice. Hence, introductions implement an org.springframework.aop.


    IntroductionInterceptor interface, which is a subclass of the org.aopalliance.intercept.


    MethodInterceptor (see Listing 6-27).


    **Listing 6-27.** *The IntroductionInterceptor Interface* public interface IntroductionInterceptor
    extends MethodInterceptor {


    boolean implementsInterface(Class intf);


    }


    When defining an introduction, the invoke method inherited from the AOP Alliance
    MethodInterceptor interface must implement the introduction: if the invoked method
    is part of an introduced interface, the introduction interceptor is responsible
    for handling the method call. Note that contrary to regular interceptors, introductions
    cannot invoke proceed.


    Since introduction advice applies only at class level, rather than at method level,
    the


    “introduction” advice necessitates the use of a special kind of advisor, which
    is provided by an org.springframework.aop.InterceptionIntroductionAdvisor (see
    Listing 6-28).


    **Listing 6-28.** *The InterceptionIntroductionAdvisor Interface* public interface
    InterceptionIntroductionAdvisor extends InterceptionAdvisor {


    ClassFilter getClassFilter();


    IntroductionInterceptor getIntroductionInterceptor();


    Class[] getInterfaces();


    }


    **130**


    C H A P T E R 6 ■ S P R I N G A O P


    Contrary to a regular advisor, the introduction advisor does not define any MethodMatcher
    or Pointcut, so that only class filtering is logical. The getInterfaces method
    returns the interfaces introduced by the advisor.


    To illustrate the use of introductions, we use a simple mix-in example taken from
    the Spring test suite. Suppose that we want to introduce the interface in Listing
    6-29 into one or more objects.


    **Listing 6-29.** *The Lock Introduction Example: The Lockable Interface* package
    aop.spring;


    public interface Lockable {


    void lock();


    void unlock();


    boolean locked();


    }


    At the end, we want to be able to cast any advised objects to Lockable and call
    lock and unlock methods. When the lock method is called, the target object becomes
    locked, and all setter methods will throw a LockedException. When the unlock method
    is called, the target object behaves normally again.


    To implement this example, we need an IntroductionInterceptor. Spring provides
    a default implementation that is convenient for most cases and that can be subclassed
    for our case: org.springframework.aop.support.DelegatingIntroductionInterceptor.


    The DelegatingIntroductionInterceptor is designed to delegate an introduction
    to an actual implementation of the introduced interface(s), concealing the use
    of interception to do so. The delegate can be set to any object using a constructor
    argument; this is the default delegate (when the no-arg constructor is used).
    In our example, the delegate is the LockMixin subclass of DelegatingIntroductionInterceptor.
    Given a delegate (by default itself), a DelegatingIntroductionInterceptor instance
    looks for all interfaces implemented by the delegate (other than IntroductionInterceptor),
    and will support introductions against any of them. The final exposed interfaces
    are defined by the IntroductionAdvisor.


    So, LockMixin subclasses DelegatingIntroductionInterceptor and implements Lockable.


    DelegatingIntroductionInterceptor automatically deduces that Lockable can be supported
    for introduction (see Listing 6-30).


    **Listing 6-30.** *The Lock Mix-in Implementation* package aop.spring;


    import org.springframework.aop.support.DelegatingIntroductionInterceptor; public
    class LockMixin extends DelegatingIntroductionInterceptor implements Lockable
    {


    private boolean locked;


    public void lock() {


    this.locked = true;


    C H A P T E R 6 ■ S P R I N G A O P


    **131**


    }


    public void unlock() {


    this.locked = false;


    }


    public boolean locked() {


    return this.locked;


    }


    public Object invoke(MethodInvocation invocation) throws Throwable {


    if (locked() && invocation.getMethod().getName().indexOf("set") == 0) throw new
    LockedException();


    return super.invoke(invocation);


    }


    }


    In this code, the locked instance variable adds some state to the target object.
    Notice that we can overload the invoke method of the interceptor in order to implement
    the locked check.


    This check could have been done in a separate “before” advice, but it is more
    concise in this way because the invoke method can directly access the locked field.
    Mix-ins generally do not require the redefinition of the invoke method. The DelegatingIntroductionInterceptor
    default implementation is usually enough: it calls the delegated method if the
    method is introduced, or otherwise proceeds towards the joinpoint.


    The required “introduction” advisor can, for instance, subclass DefaultIntroductionAdvisor,
    as shown in Listing 6-31, which directly implements ClassFilter, so that the matches
    method can simply be overridden to select advised classes (by default all the
    classes are advised).


    **Listing 6-31.** *The Lock Mix-in Advisor Implementation* package aop.spring;


    import org.springframework.aop.support.DefaultIntroductionAdvisor; public class
    LockMixinAdvisor extends DefaultIntroductionAdvisor {


    public LockMixinAdvisor() {


    super(new LockMixin(), Lockable.class);


    }


    // we only apply the lock mix-in to the Order class


    public boolean matches(Class clazz) {


    return clazz.getName().equals("aop.spring.Order");


    }


    }


    The mix-in can then be activated with the simple XML definition:


    <bean id="lockAdvisor" class="aop.spring.LockMixinAdvisor"/>


    **132**


    C H A P T E R 6 ■ S P R I N G A O P


    It is important to understand that it is impossible to use an IntroductionInterceptor
    without an IntroductionAdvisor. With introductions, the advisor is per-instance
    because it is stateful, and therefore you need a different instance of LockMixinAdvisor
    and LockMixin for each advised object, so that the locked variable is local to
    an advised bean.


    **Advanced Features**


    This section presents some advanced features of Spring AOP.


    **Ordering Aspects**


    By default, advice applies in the same order as constructed. At times, the programmer
    may want to guarantee a given order. In Spring, to make the factory automatically
    ensure an order, the advisor that installs the advice must implement the org.springframework.core.Ordered
    interface (see Listing 6-32).


    **Listing 6-32.** *The Ordered Interface*


    public interface Ordered {


    int getOrder();


    }


    In advisors, getOrder returns Integer.MAX_VALUE by default, which means that it
    has the lowest priority (0 being the highest). To force an order, you can configure
    the order property of an advisor as any other bean; for example, to ensure that
    the lock mix-in showed in the previous section is applied with the highest priority,
    you use the code in Listing 6-33.


    **Listing 6-33.** *Ordering the Lock Advisor*


    <bean id="lockAdvisor" class="aop.spring.LockMixinAdvisor">


    <property name="order"><value>0</value></property>


    </bean>


    **Programmatically Configured Aspects**


    Since Spring AOP is dynamic AOP, advice can be dynamically attached or detached
    from a given advised object.


    The Advised Interface


    When using a factory that supports AOP (the ApplicationContext factory being the
    most common), the bean instances returned by the factory during a call to the
    getBean methods are actually AOP proxies. These AOP proxies implement the org.springframework.aop.framework.


    Advised interface. Consequently, any program can cast the manipulated objects
    into the Advised interface and access the AOP framework API to implement program-based
    dynamic aspect configuration/reconfiguration.


    The (partial) Advised interface is shown in Listing 6-34.


    C H A P T E R 6 ■ S P R I N G A O P


    **133**


    **Listing 6-34.** *The Advised Interface*


    public interface Advised {


    [...]


    Advisor[] getAdvisors();


    int indexOf(Advisor advisor);


    void addAdvisor(Advisor advisor) throws AopConfigException; void addAdvisor(int
    pos, Advisor advisor) throws AopConfigException; boolean removeAdvisor(Advisor
    advisor) throws AopConfigException; boolean replaceAdvisor(Advisor a, Advisor
    b) throws AopConfigException; void removeAdvisor(int index) throws AopConfigException;
    void addAdvice(Advice advice) throws AopConfigException; void addAdvice(int pos,
    Advice advice) throws AopConfigException; boolean removeAdvice(Advice advice)
    throws AopConfigException; boolean isFrozen();


    }


    The Advised interface provides all the primitives to programmatically manipulate
    the advisors that apply on a given AOP Proxy. It also allows for direct advising,
    when an Advice instance is available.


    Notice the isFrozen method, which returns true if no configuration is possible
    on the advised instance. When isFrozen returns true, an attempt to call any configuration
    method will throw an AopConfigException.


    Using the Proxy Factory


    When a bean is accessed through a factory that does not originally support AOP,
    it is still possible to programmatically add some AOP features. This is done through
    ProxyFactory, which allows for the dynamic creation of a new proxy delegating
    to a new proxied bean. Listing 6-35 shows an example.


    **Listing 6-35.** *Example of Use for the Proxy Factory*


    // creates a new proxy factory


    ProxyFactory factory = new ProxyFactory(MyBusinessInterfaceImpl);


    // adds an interceptor to be added to all methods


    factory.addInterceptor(myMethodInterceptor);


    // adds an advisor


    factory.addAdvisor(myAdvisor);


    // retrieves an AOP proxy for my business interface


    MyBusinessInterface tb = (MyBusinessInterface) factory.getProxy(); **Auto-Proxying**


    In Spring, a factory can be configured to automatically create specific proxies
    for the accessed beans. This is the *auto-proxy* feature.


    **134**


    C H A P T E R 6 ■ S P R I N G A O P


    With this feature, the programmer sets up certain special bean definitions in
    the XML


    bean definition file for configuring the auto-proxy infrastructure. The configuration
    declares the targets eligible for auto-proxying.


    Two configuration means are available:


    • Using an auto-proxy creator that refers to specific beans in the current context


    • Auto-proxy creation driven by source-level metadata attributes Using an Auto-Proxy
    Creator


    For the first means of configuration, several auto-proxy creators are available
    in the org.


    springframework.aop.framework.autoproxy package. For instance, the BeanNameAutoProxyCreator
    automatically creates AOP proxies for beans with names matching literal values
