    尤内西博士现任伦斯勒理工学院（RPI）哈特福德研究生校区计算机科学教授及工程与科学系主任。在进入学术界之前，尤内西博士在工业界担任过多个负有责任和领导力的职位。他曾主导技术及市场营销工作，并负责项目、预算、员工及营收。在工业界的最后一份职务中，他创立了一家
    IT 咨询公司，并负责人员招聘与公司发展（在不到五年内），使其从最初仅有两名员工（他本人和一名雇员）成长为拥有 16 名咨询人员、营收达数百万美元的可观规模。他还曾为全球一些最大的企业和政府机构提供咨询服务（例如纽约州和密歇根州政府、必和必拓、荷兰皇家壳牌石油公司、马士基、日立等）。


    尤内西博士经常受邀出席众多知名场合，并参与国内及国际委员会与理事会。他曾担任美国代表团团长，参加在西班牙马拉加举行的 ISO SC7 会议，并曾是澳大利亚研究理事会（相当于澳大利亚的国家科学基金会）IT
    拨款提案评审委员会成员。他还曾参与澳大利亚团队，负责推广和验证 ISO 15504 标准。尤内西博士同时担任《ACM 计算评论》的分类编辑，并服务于多家国际期刊的编辑或评审委员会。


    **xix**


    引言


    ***面向方面编程***（*AOP*）是一种编程范式，于 20 世纪 90 年代中期在施乐帕洛阿尔托研究中心（PARC）被定义。该范式的根源可追溯至多项旨在改进代码模块化、促进复用与维护的研究工作。


    AOP 在代码模块化方面的优势吸引了众多应用开发者的关注，尤其是 Web 应用领域的开发者。事实上，AOP 是面向互联网的应用服务器（如 Sun Microsystems
    的 J2EE 或微软的.NET）的绝佳补充。借助 AOP，开发者可以简化此类应用的开发并提升生产力。然而，AOP 并不仅限于以 Web 为中心的应用领域。与其他编程范式（如面向对象）类似，AOP
    是一种可应用于任何类型应用的通用技术。


    本书定义并解释了 AOP 的概念。通过介绍四种主要的现有 AOP 产品（AspectJ、JAC、JBoss AOP 和 Spring AOP），对这些概念的实现进行了说明。此外，本书还展示了如何利用
    AOP 来编程 J2EE 应用。


    **目标读者**


    本书旨在以清晰且具有教学性的方式呈现 AOP 的概念。无需具备该领域的先验知识。本书并未聚焦于特定 AOP 语言的高级编程概念，而是对现有可用于面向方面编程的产品进行了广泛概述。


    以下读者将会对本书感兴趣：


    • 渴望深入了解计算机科学新领域的程序员

    • 希望了解 AOP 预期收益的 IT 项目经理

    • 寻求关于 AOP 产品准确信息的应用开发者

    • 需要 AOP 入门介绍及现有实现最新对比的博士生和硕士生


    **如何阅读本书**


    本书各章节力求尽可能独立；因此，无需从头到尾按顺序阅读即可获取关于 AOP 的有价值信息。每位读者可以选择自己的阅读计划。


    话虽如此，我们将为上一节列出的每类目标读者推荐一些阅读内容：


    **xxi**


    **xxii**


    ## ■引言


    • *程序员*：建议阅读第 1 章和第 2 章，以了解 AOP 的概况并学习其基本概念。也建议阅读关于 AspectJ 的第 3 章，因为该章展示了第 2
    章的概念如何在领域内的领先工具中实现。最后三章（第 10、11 和 12 章）阐述了使用 AspectJ 开发 J2EE 应用的方法。

    • *IT 项目经理*：建议阅读第 1 章以快速了解 AOP。第 2 章的前几页也有助于了解引入这种新编程范式的主要动机。我们还建议阅读第 9 章，以理解
    AOP 如何帮助改进服务质量，这对应用的使用有直接影响。第 10 章给出了一个典型的 J2EE 应用示例，该应用可从面向方面开发中受益。

    • *应用开发者*：建议阅读涵盖 AOP 概念的第 2 章。建议阅读第 3 章至第 6 章，因为它们概述了 AOP 概念如何在现有工具中实现。第 8 章和第
    9 章展示了如何使用 AOP 来编程设计模式、契约和应用管理。最后，第 11 章和第 12 章呈现了一个使用 AOP 编程 J2EE 应用的案例研究。

    • *博士生和硕士生*：建议阅读第 1 章和第 2 章，以了解 AOP 的概况并学习其基本概念。建议阅读第 3 章至第 6 章，因为它们概述了 AOP 概念如何在现有工具中实现。我们建议阅读第
    7 章中的对比，该章探讨了这些工具之间的差异与相似之处。最后，第 8 章阐述了 AOP 在实现横切结构（如软件工程中众所周知的设计模式）方面的强大能力。

