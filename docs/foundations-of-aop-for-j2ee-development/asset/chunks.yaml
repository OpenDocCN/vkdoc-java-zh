    To clarify the second point, we can compare the aspect-oriented development of
    the constraint verification to a use case–based development methodology. In a
    use case–based methodology, we find primary use cases, which correspond to the
    normal behavior of the application (here, the entering of the data by the user),
    and secondary use cases, which correspond to the abnormal behavior of the application
    (here, errors and input error handling).


    Among secondary cases, a use case–guided analysis generally assigns priorities
    to the use cases. Some of them are not critical and do not need to be implemented
    during the first itera-tions (for instance, checking that the entered name starts
    with an uppercase letter).


    Similarly, when developing UI and data verification, we start with primary cases
    (verifications) and critical secondary cases. Only after the development of these
    cases is completed can we implement the noncritical cases (verifications). If
    the verification concern is not correctly modularized, testing a new case will
    be difficult because its code will be tangled up with the code of the preexisting
    cases.


    Thus, the use of AOP helps to handle the growing complexity of the verification
    concern.


    In particular, the use of well-chosen pre-/postcondition aspects (such as the
    ones explained in Chapters 9 and 11) allow the modularized implementation of the
    verification concern.


    **Using AOP in the Design Patterns of the Web**


    **Presentation Tier**


    In a J2EE context, the web presentation logic relies on Servlets technology. Servlets
    are Java components that reply to HTTP requests coming from the web server and
    are transmitted to the J2EE web container. Some well-known containers are Apache
    Tomcat (reference implementation) and Caucho Resin (http://www.caucho.com/resin-2.1/index.xtp).
    To help with the programming of GUI dedicated servlets, Sun Microsystems defined
    the JavaServer Pages (JSP) standard.


