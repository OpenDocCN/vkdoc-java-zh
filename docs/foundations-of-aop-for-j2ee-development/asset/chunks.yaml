    Implementing Invariants


    There are two types of invariants—class and internal—that we have spoken about.
    A class invariant usually needs to be checked after the execution of a method
    that can potentially modify the state of the object. Not all methods should be
    checked. Indeed, an intermediate method, which is part of a higher-level method
    defined for the same class, may leave the object in an inconsistent state. It
    is only when the higher-level method ends that the object should be left in a
    consistent state. Selecting the methods that the invariant is checked for can
    be achieved either by advising only certain methods or by using cflow. The latter
    solution disables the checking of the invariant when the advised method is in
    the control flow of a higher-level method (usually belonging to the same class).
    This solution is more generic but slightly less efficient than the former one
    because the aspect system adds some run-time tests to determine whether the current
    method execution belongs to a given control flow. These run-time tests are called
    *residues*.


