    **AOP for Application Administration**


    **and Supervision**


    Even though administration and supervision are of primary importance for n-tier
    applications, these tasks are barely taken into account by developers, who naturally
    tend to focus on the applications’ main functions. Since they are not tackled
    up front, administration and supervision can benefit from the greater degree of
    separation among concerns that is provided by AOP. Indeed, it is interesting to
    independently develop some administration and supervision features so as to be
    able to plug and unplug these features when needed.


    Certain standards—Simple Mail Transfer Protocol (SMTP) and Java Management Extensions
    (JMX)—are available for administration and supervision, and it is preferable to
    use them rather than code from scratch. In fact interoperability is often a requirement
    for administration and supervision because these tasks can crosscut several subsystems
    of an enterprise application.


    JMX


    With JMX, Java provides a standard specification and a library for administration
    and supervision. JMX relies on two main functionalities:


    • The opening of Java components through a specific API so that the components
    become fully accessible to the administration and supervision tools


    • A notification mechanism for implementing automatic checks when needed


