- fmt: "# 排版后的文本\n\n- **The solution to the problem**: The class must have a static\
    \ attribute, usually called `instance`, to store a reference to the unique instance,\
    \ as well as a method, generally called `getInstance`, that returns the value\
    \ of `instance`. If the `instance` is null, `getInstance` creates a new instance\
    \ of the class and stores its reference in the `instance` attribute, and then\
    \ returns it to the caller.\n\n`Listing 8-1` shows one way in which the singleton\
    \ can be implemented using Java.\n\n**Listing 8-1.** *Implementation of the Singleton\
    \ Design Pattern Using Java*\n\n```\npublic class MySingleton {\n    private static\
    \ MySingleton instance = null;\n    public static MySingleton getInstance() {\n\
    \        if (instance == null) {\n            instance = new MySingleton();\n\
    \        }\n        return instance;\n    }\n}\n```\n\nBecause of the method `getInstance`,\
    \ any class using `MySingleton` is ensured to be using the same instance of this\
    \ class. The inconvenience of this is that the `new` operator cannot be used directly\
    \ by the other classes to instantiate `MySingleton`. Using the Singleton design\
    \ pattern is therefore not transparent for the classes that use `MySingleton`\
    \ because these classes have to call `getInstance` instead of the usual constructor.\n\
    \nThe issue of “transparency” in a design pattern, with respect to the other classes\
    \ of an application, is not limited to the Singleton design pattern. In general,\
    \ the use of a design pattern in an application has important implications for\
    \ the classes with which it interacts.\n\nDesign patterns can therefore have a\
    \ huge impact on the structure of an application and may compromise the original\
    \ object model.\n\nWhile it is easy to recognize a singleton simply by reading\
    \ the code, other design patterns such as the Command design pattern are more\
    \ difficult to identify. Although design patterns are reusable in the sense that\
    \ they structure the code, their implementation usually contains elements that\
    \ are specific to a particular context, and the code itself is therefore less\
    \ reusable.\n\n## A First Implementation of the Singleton Aspect with JBoss AOP\n\
    \nThis section presents two implementations of the Singleton design pattern, one\
    \ with JBoss AOP, and one with AspectJ.\n\nAs we saw in the previous example,\
    \ the main issue preventing better modularization was the fact that classes had\
    \ to call the method `getInstance` rather than the usual constructor.\n\nJBoss\
    \ AOP and AspectJ allow you to solve the problem simply and effectively by defining\
    \ an aspect to modify the behavior of the constructor, which is invoked by the\
    \ `new` operator to create a new instance of the class. When the constructor is\
    \ invoked, the aspect intercepts and substitutes the `new` method with the code\
    \ needed to manage the singleton.\n\nWith JBoss AOP, we can define the interceptor\
    \ presented in `Listing 8-2`.\n\n**Listing 8-2.** *Implementation of the Singleton\
    \ Design Pattern Using JBoss AOP*\n\n```\npackage aop.patterns.singleton;\n\n\
    import org.jboss.aop.advice.Interceptor;\nimport org.jboss.aop.joinpoint.Invocation;\n\
    \npublic class SingletonInterceptor implements Interceptor {\n    private Object\
    \ singleton;\n\n    public String getName() {\n        return \"SingletonInterceptor\"\
    ;\n    }\n\n    public Object invoke(Invocation invocation) throws Throwable {\n\
    \        if (singleton == null) {\n            singleton = invocation.invokeNext();\n\
    \        }\n        return singleton;\n    }\n}\n```\n\nThe code of this interceptor\
    \ is similar to the object-oriented implementation of the singleton: it includes\
    \ an attribute, which is used to store the unique instance of the singleton, and\
    \ the method `invoke`, which uses the same kind of test to check the existence\
    \ of the instance when a constructor is called. If the instance does not exist,\
    \ `invoke` calls the constructor and stores the instance generated in the `singleton`\
    \ attribute.\n\nNote that the interceptor contains the code to handle the singleton\
    \ and that it can be applied to a class in a way that is completely transparent\
    \ for the rest of the application.\n\nFor the purpose of our example, we use a\
    \ class called `Stats`, which contains various statistics for an e-commerce site\
    \ (see `Listing 8-3`)."
  raw: '• *The solution to the problem*: The class must have a static attribute, usually
    called instance, to store a reference to the unique instance, as well as a method,
    generally called getInstance, that returns the value of instance. If the instance
    is null, getInstance creates a new instance of the class and stores its reference
    in the instance attribute, and then returns it to the caller.


    Listing 8-1 shows one way in which the singleton can be implemented using Java.


    **Listing 8-1.** *Implementation of the Singleton Design Pattern Using Java* public
    class MySingleton {


    private static MySingleton instance = null;


    public static MySingleton getInstance() {


    if (instance==null) {


    instance = new MySingleton();


    }


    return instance;


    }


    }


    Because of the method getInstance, any class using MySingleton is ensured to be
    using the same instance of this class. The inconvenience of this is that the new
    operator cannot be used directly by the other classes to instantiate MySingleton.
    Using the Singleton design pattern is therefore not transparent for the classes
    that use MySingleton because these classes have to call getInstance instead of
    the usual constructor.


    The issue of “transparency” in a design pattern, with respect to the other classes
    of an application, is not limited to the Singleton design pattern. In general,
    the use of a design pattern in an application has important implications for the
    classes with which it interacts.


    Design patterns can therefore have a huge impact on the structure of an application
    and may compromise the original object model.


    While it is easy to recognize a singleton simply by reading the code, other design
    patterns such as the Command design pattern are more difficult to identify. Although
    design patterns are reusable in the sense that they structure the code, their
    implementation usually contains elements that are specific to a particular context,
    and the code itself is therefore less reusable.


    **A First Implementation of the Singleton Aspect with JBoss AOP**


    This section presents two implementations of the Singleton design pattern, one
    with JBoss AOP, and one with AspectJ.


    As we saw in the previous example, the main issue preventing better modularization
    was the fact that classes had to call the method getInstance rather than the usual
    constructor.


    JBoss AOP and AspectJ allow you to solve the problem simply and effectively by
    defining an aspect to modify the behavior of the constructor, which is invoked
    by the new operator to


    **152**


    C H A P T E R 8 ■ D E S I G N P A T T E R N S A N D A O P


    create a new instance of the class. When the constructor is invoked, the aspect
    intercepts and substitutes the new method with the code needed to manage the singleton.


    With JBoss AOP, we can define the interceptor presented in Listing 8-2.


    **Listing 8-2.** *Implementation of the Singleton Design Pattern Using JBoss AOP*


    package aop.patterns.singleton;


    import org.jboss.aop.advice.Interceptor;


    import org.jboss.aop.joinpoint.Invocation;


    public class SingletonInterceptor implements Interceptor {


    private Object singleton;


    public String getName() {


    return "SingletonInterceptor";


    }


    public Object invoke(Invocation invocation) throws Throwable {


    if (singleton==null) {


    singleton = invocation.invokeNext();


    }


    return singleton;


    }


    }


    The code of this interceptor is similar to the object-oriented implementation
    of the singleton: it includes an attribute, which is used to store the unique
    instance of the singleton, and the method invoke, which uses the same kind of
    test to check the existence of the instance when a constructor is called. If the
    instance does not exist, invoke calls the constructor and stores the instance
    generated in the singleton attribute.


    Note that the interceptor contains the code to handle the singleton and that it
    can be applied to a class in a way that is completely transparent for the rest
    of the application.


    For the purpose of our example, we use a class called Stats, which contains various
    statistics for an e-commerce site (see Listing 8-3).'
  trans: '

    • *问题的解决方案*：该类必须拥有一个静态属性（通常命名为`instance`），用于存储对唯一实例的引用；同时还需提供一个方法（通常命名为`getInstance`），该方法返回`instance`的值。若`instance`为空，`getInstance`会创建该类的一个新实例，将其引用存入`instance`属性，然后返回给调用者。


    清单 8-1 展示了使用 Java 实现单例模式的一种方式。


    **清单 8-1.** *使用 Java 实现单例设计模式* public class MySingleton {


    private static MySingleton instance = null;


    public static MySingleton getInstance() {


    if (instance==null) {


    instance = new MySingleton();


    }


    return instance;


    }


    }


    由于`getInstance`方法的存在，任何使用`MySingleton`的类都能确保使用的是该类的同一个实例。其不便之处在于，其他类无法直接使用`new`操作符来实例化`MySingleton`。因此，对于使用`MySingleton`的类而言，单例设计模式的使用并不透明，因为这些类必须调用`getInstance`而非通常的构造函数。


    设计模式在应用程序中相对于其他类的“透明性”问题，并不仅限于单例设计模式。通常，在应用程序中使用某种设计模式，会对其交互的类产生重要影响。


    因此，设计模式可能对应用程序的结构产生巨大影响，甚至可能损害原有的对象模型。


    虽然仅通过阅读代码就能轻易识别单例模式，但其他设计模式（如命令设计模式）则更难识别。尽管设计模式在结构化代码方面具有可复用性，但其实现通常包含特定于具体上下文的元素，因此代码本身的可复用性较低。


    **使用 JBoss AOP 首次实现单例切面**


    本节将展示单例设计模式的两种实现方式：一种使用 JBoss AOP，另一种使用 AspectJ。


    正如前例所见，阻碍更好模块化的主要问题在于，类必须调用`getInstance`方法而非通常的构造函数。


    JBoss AOP 和 AspectJ 允许你通过定义一个切面来简单有效地解决该问题，该切面用于修改构造函数的行为——构造函数由`new`操作符调用，用于创建类的新实例。当构造函数被调用时，切面会拦截它，并用管理单例所需的代码替换`new`方法。


    使用 JBoss AOP，我们可以定义清单 8-2 中所示的拦截器。


    **清单 8-2.** *使用 JBoss AOP 实现单例设计模式*


    package aop.patterns.singleton;


    import org.jboss.aop.advice.Interceptor;


    import org.jboss.aop.joinpoint.Invocation;


    public class SingletonInterceptor implements Interceptor {


    private Object singleton;


    public String getName() {


    return "SingletonInterceptor";


    }


    public Object invoke(Invocation invocation) throws Throwable {


    if (singleton==null) {


    singleton = invocation.invokeNext();


    }


    return singleton;


    }


    }


    该拦截器的代码与面向对象的单例实现类似：它包含一个用于存储单例唯一实例的属性，以及一个`invoke`方法——当构造函数被调用时，该方法使用相同的条件判断来检查实例是否存在。若实例不存在，`invoke`会调用构造函数，并将生成的实例存储在`singleton`属性中。


    请注意，拦截器包含了处理单例的代码，并且可以以对应用程序其余部分完全透明的方式应用于某个类。


    为了示例的需要，我们使用一个名为`Stats`的类，该类包含电子商务网站的各种统计数据（见清单 8-3）。

