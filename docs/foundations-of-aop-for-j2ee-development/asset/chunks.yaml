    The anchoring protocol technique, however, does not allow a precise management
    of exceptions. This can be solved by testing the variable that indicates we are
    within the delimited zone (here ut).


    When the environment allows, it is also important to take multithreading into
    account (it is not used in our example). The use of the threadlocals for the variables
    that have to be shared by advice codes is then necessary. The aspect instantiation
    directive per thread can also be an elegant solution.


    **Summary**


    In this chapter, we have presented the use of AOP to improve the design of the
    business tier.


    From a separation of concerns perspective, we can conclude that the AOP is successfully
    applied to our case study since many crosscutting concerns have been more clearly
    separated, including the following:


    • Dependencies towards the EJB/J2EE technology


    • Management and resolving of business object references


    • Persistence


    • Preconditions (including technical and business preconditions)


    • Transactions


    It is still possible to modularize other concerns, such as logging, that we have
    not shown here.


    Figure 11-3 shows the components that form the business tier when all the aspects
    are applied. Each gray bar corresponds to a regular EJB. Indeed, the gray color
    indicates that no aspects have been applied. The first bar corresponds to the
    Entity EJB AccountBean, the second corresponds to the AccountPOJO, and so on for
    each component.


