    **Summary**


    In this chapter, we presented the JAC framework for dynamic aspect-oriented programming.


    JAC does not introduce any new keywords nor a compiler, but it provides a framework
    and an API for programming aspects. In JAC, aspects are run-time entities that
    can be woven and unwoven while an application is running.


    Aspects are defined by extending the AspectComponent class which, in JAC, is the
    root class for all aspects. Among other things, this class defines the pointcut
    method for defining pointcuts.


    Pointcuts include two types of joinpoints: method executions and constructor executions.


    These joinpoints are selected by regular expressions that filter the set of all
    classes, methods, objects and, when the application is run in distributed mode,
    hosts. The granularity of a pointcut is the object. Hence, some instances of a
    class can be included in a pointcut but others cannot.


    The code executed before and after a joinpoint is defined in a wrapper. Wrappers
    are classes that implement the AOP Alliance API. They provide methods for the
    interception and introspection of joinpoints.


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    **89**


    In a JAC application, you can introduce two kinds of code elements: role methods
    and exception handlers. Both are defined as methods in a wrapper class.


    JAC is distributed with a library of 16 ready-to-use aspects. These aspects cover
    a wide range of commonly encountered needs—from maintaining persistent data to
    implementing a GUI. The aspect that carries out the latter functionality may be
    the most original, and it provides a way of displaying an application through
    Swing or a web browser.


    The key mechanism for reusing a JAC aspect is aspect configuration. Configuring
    an aspect consists of defining which parameters tailor the aspect to a specific
    application context.


    Any parameter can be configured; it is up to you to define which part of the aspect
    to make configurable. The configuration can be changed without recompiling the
    aspect or the application. It can even be reloaded while the application is running,
    in which case it dynamically reconfigures the aspects.


    JAC is distributed with an IDE named UMLAF. You can design, program, compile,
    and execute a JAC application with this RAD tool. This tool provides a class-diagram
    view of the application that allows you to graphically design classes and aspects
    and their relationships.


