- fmt: '# AOP Tools Comparison


    However, these advantages are not crucial when programming complicated aspects
    that need, for instance, to proceed or catch exceptions depending on particular
    execution contexts. In these cases, the "around" advice code general form is preferred,
    and this explains why some approaches stick with "around" advice code only.


    Note that in all AOP tools, a special construction is provided for delimiting
    the "after" and the "before" parts of "around" advice code. This construction
    takes the form of a keyword (`proceed`) with AspectJ or a method call (`proceed`
    with JAC and Spring AOP, and `invokeNext` with JBoss AOP). This is, however, a
    minor difference, and the underlying semantics remain the same.


    Finally, the major difference between AspectJ (language approach) and the other
    tools (framework approach) is that AspectJ provides typed advice. Indeed, in AspectJ,
    advice code can take well-typed parameters that are bound to some joinpoint contextual
    elements (e.g., parameters, targets, and callers). Well-typed advice code improves
    the program quality, readability, and performance (static binding). However, the
    advantages of typed advice code need to be balanced against the fact that it is
    not always possible to implement advice code in a typed way, especially when it
    has to perform generic functions on the base program (e.g., a persistence aspect
    should be applied generically on all the objects of the program and thus cannot
    be typed).


    ## Joinpoint Introspection


    When advice code is executed before, after, or around a joinpoint, programmers
    sometimes need to retrieve information about the current joinpoint. For example,
    a programmer may need to know what the method associated with the joinpoint is
    or what the arguments of the call are. The gathering of such information is called
    *joinpoint introspection*. All four AOP tools presented in this book support this
    feature.


    AspectJ provides the keyword `thisJoinPoint` for introspecting joinpoints in advice
    code. This keyword returns a reference to an object created by AspectJ for each
    encountered joinpoint. This object implements the `org.aspectj.lang.JoinPoint`
    interface and, depending on the joinpoint type, several distinct methods exist
    for retrieving information about the current joinpoint.


    With JAC, Spring AOP, and JBoss AOP, advice code consists of regular Java methods.
    These methods are called each time a joinpoint matches a defined pointcut. These
    methods take as a parameter an object that, similar to the AspectJ keyword `thisJoinPoint`,
    provides information about the current joinpoint. With JAC and Spring AOP, the
    interface implemented by this object is `org.aopalliance.intercept.Joinpoint`,
    which belongs to the AOP Alliance standard API.


    JBoss AOP uses a similar but JBoss-specific interface: `org.jboss.aop.joinpoint.Invocation`.


    ## Introduction Mechanism


    The *introduction mechanism* allows for extending an application with code elements
    (fields, methods, etc.) defined in aspects.


    With AspectJ, this mechanism is known as *intertype declaration*. The idea is
    that a type (an aspect) performs declarations for a target type. AspectJ can introduce
    fields, methods, and constructors. The target of the introduction is a class or
    an interface. If an interface is used, all the classes that implement the interface
    are the target of the introduction. Interfaces can also be introduced by AspectJ.


    With JAC, two types of code elements can be introduced: methods and exception
    handlers. The introduced methods (called *role methods*) and the exception handlers
    are defined in wrapper classes. The role methods can be invoked with an API that
    relies on the Java runtime reflection capabilities. The advantage of using reflection
    here is that the introduction mechanism is very flexible: it is easy to add or
    remove an introduction at run time. The disadvantages are that no type check of
    any kind is performed by JAC before the actual invocation, and the invocation
    process is relatively slow due to reflection overhead.


    JBoss AOP and Spring AOP provide a mechanism known as *mix-in* for introducing
    code elements into an application. With this mechanism, the fields and methods
    defined in the mixin class are appended to the classes that are the target of
    the mix-in. Well-formed mix-ins should implement an interface that declares the
    introduced methods. Under the hood, the AOP framework will use bytecode manipulation
    to make the target class implement the mix-in interfaces. Then, when invoking
    a mix-in method, programmers must cast the target object to the interface declaring
    the method. This mechanism is not type-safe either, since Java does not implement
    any strong type checks on the interfaces (dynamic binding). However, it has the
    advantage of being far more efficient than reflection. Besides, once the cast
    is done on the target object, the IDE will be able to provide some support, such
    as contextual help and code completion.


    To summarize the introduction mechanism, only the AspectJ language approach is
    type-safe regarding this feature, since some type-checking mechanism is implemented
    by the compiler. Tools that follow the framework approach cannot be type-safe,
    since they remain pure Java, which does not support such a feature. However, the
    mix-in approach implemented by JBoss and Spring seems to be a good trade-off.
    Indeed, most programmers would argue that it is more natural to cast an object
    to a given interface to be allowed to call an introduced method. With AspectJ,
    the code can sometimes be difficult to read and understand since it can refer
    to methods that do not exist in any classes or interfaces supported by the target
    objects.


    ## Advanced Features


    This section compares the various advanced features implemented by AspectJ, JAC,
    JBoss AOP, and Spring AOP. Specifically, we cover aspect instantiation, ordering,
    and reuse.


    ### Aspect Instantiation


    Similar to classes, aspects are code elements that can be instantiated, and the
    term *aspect* refers to either a type or an instance. However, unlike with classes,
    aspects are not directly instantiated by programmers; in other words, programmers
    never call `new` for instantiating an aspect. Aspect instances are automatically
    created by the AOP language or framework.'
  raw: 'However, these advantages are not crucial when programming complicated aspects
    that need, for instance, to proceed or catch exceptions depending on particular
    execution contexts. In these cases, the “around” advice code general form is preferred,
    and this explains why some approaches stick with “around” advice code only.


    Note that in all AOP tools, a special construction is provided for delimiting
    the “after” and the “before” parts of “around” advice code. This construction
    takes the form of a keyword (proceed) with AspectJ or a method call (proceed with
    JAC and Spring AOP, and invokeNext with JBoss AOP). This is, however, a minor
    difference, and the underlying semantics remain the same.


    C H A P T E R 7 ■ A O P T O O L S C O M P A R I S O N


    **143**


    Finally, the major difference between AspectJ (language approach) and the other
    tools (framework approach) is that AspectJ provides typed advice. Indeed, in AspectJ,
    advice code can take well-typed parameters that are bound to some joinpoint contextual
    elements (e.g., parameters, targets, and callers). Well-typed advice code improves
    the program quality, readability, and performance (static binding). However, the
    advantages of typed advice code need to be balanced against the fact that it is
    not always possible to implement advice code in a typed way, especially when it
    has to perform generic functions on the base program (e.g., a persistence aspect
    should be applied generically on all the objects of the program and thus cannot
    be typed).


    **Joinpoint Introspection**


    When advice code is executed before, after, or around a joinpoint, programmers
    sometimes need to retrieve information about the current joinpoint. For example,
    a programmer may need to know what the method associated with the joinpoint is
    or what the arguments of the call are. The gathering of such information is called
    *joinpoint introspection*. All four AOP tools presented in this book support this
    feature.


    AspectJ provides the keyword thisJoinPoint for introspecting joinpoints in advice
    code.


    This keyword returns a reference to an object created by AspectJ for each encountered
    joinpoint. This object implements the org.aspectj.lang.JoinPoint interface and,
    depending on the joinpoint type, several distinct methods exist for retrieving
    information about the current joinpoint.


    With JAC, Spring AOP, and JBoss AOP, advice code consists of regular Java methods.
    These methods are called each time a joinpoint matches a defined pointcut. These
    methods take as a parameter an object that, similar to the AspectJ keyword thisJoinPoint,
    provides information about the current joinpoint. With JAC and Spring AOP, the
    interface implemented by this object is org.aopalliance.intercept.Joinpoint, which
    belongs to the AOP Alliance standard API.


    JBoss AOP uses a similar but JBoss-specific interface: org.jboss.aop.joinpoint.Invocation.


    ## Introduction Mechanism


    The *introduction mechanism* allows for extending an application with code elements
    (fields, methods, etc.) defined in aspects.


    With AspectJ, this mechanism is known as *intertype declaration*. The idea is
    that a type (an aspect) performs declarations for a target type. AspectJ can introduce
    fields, methods, and constructors. The target of the introduction is a class or
    an interface. If an interface is used, all the classes that implement the interface
    are the target of the introduction. Interfaces can also be introduced by AspectJ.


    With JAC, two types of code elements can be introduced: methods and exception
    handlers.


    The introduced methods (called *role methods*) and the exception handlers are
    defined in wrapper classes. The role methods can be invoked with an API that relies
    on the Java runtime reflection capabilities. The advantage of using reflection
    here is that the introduction mechanism is very flexible: it is easy to add or
    remove an introduction at run time. The disadvantages are that no type check of
    any kind is performed by JAC before the actual invocation, and the invocation
    process is relatively slow due to reflection overhead.


    **144**


    C H A P T E R 7 ■ A O P T O O L S C O M P A R I S O N


    JBoss AOP and Spring AOP provide a mechanism known as *mix-in* for introducing
    code elements into an application. With this mechanism, the fields and methods
    defined in the mixin class are appended to the classes that are the target of
    the mix-in. Well-formed mix-ins should implement an interface that declares the
    introduced methods. Under the hood, the AOP framework will use bytecode manipulation
    to make the target class implement the mix-in interfaces. Then, when invoking
    a mix-in method, programmers must cast the target object to the interface declaring
    the method. This mechanism is not type-safe either, since Java does not implement
    any strong type checks on the interfaces (dynamic binding). However, it has the
    advantage of being far more efficient than reflection. Besides, once the cast
    is done on the target object, the IDE will be able to provide some support, such
    as contextual help and code completion.


    To summarize the introduction mechanism, only the AspectJ language approach is
    type-safe regarding this feature, since some type-checking mechanism is implemented
    by the compiler. Tools that follow the framework approach cannot be type-safe,
    since they remain pure Java, which does not support such a feature. However, the
    mix-in approach implemented by JBoss and Spring seems to be a good trade-off.
    Indeed, most programmers would argue that it is more natural to cast an object
    to a given interface to be allowed to call an introduced method. With AspectJ,
    the code can sometimes be difficult to read and understand since it can refer
    to methods that do not exist in any classes or interfaces supported by the target
    objects.


    **Advanced Features**


    This section compares the various advanced features implemented by AspectJ, JAC,
    JBoss AOP, and Spring AOP. Specifically, we cover aspect instantiation, ordering,
    and reuse.


    **Aspect Instantiation**


    Similar to classes, aspects are code elements that can be instantiated, and the
    term *aspect* refers to either a type or an instance. However, unlike with classes,
    aspects are not directly instantiated by programmers; in other words, programmers
    never call new for instantiating an aspect. Aspect instances are automatically
    created by the AOP language or framework.'
  trans: '

    然而，在处理需要根据特定执行上下文进行流程推进或异常捕获等复杂编程场景时，这些优势并非至关重要。在这种情况下，更推荐使用“环绕”通知代码的通用形式，这也解释了为何某些方法仅坚持使用“环绕”通知代码。


    请注意，在所有 AOP 工具中，都提供了一种特殊结构来界定“环绕”通知代码的“后置”和“前置”部分。该结构在 AspectJ 中表现为一个关键字（`proceed`），在
    JAC 和 Spring AOP 中表现为一个方法调用（`proceed`），在 JBoss AOP 中则表现为 `invokeNext`。然而，这只是一个细微的差别，其底层语义保持不变。


    第 7 章 ■ A O P 工 具 对 比


    **143**


    最后，AspectJ（语言方法）与其他工具（框架方法）之间的主要区别在于，AspectJ 提供了类型化的通知。确实，在 AspectJ 中，通知代码可以接受类型明确的参数，这些参数绑定到某些连接点的上下文元素（例如，参数、目标和调用者）。类型明确的通知代码提高了程序质量、可读性和性能（静态绑定）。然而，类型化通知代码的优势需要与一个事实相权衡：即并非总能以类型化的方式实现通知代码，尤其是当它需要对基础程序执行通用功能时（例如，持久化切面应通用地应用于程序中的所有对象，因此无法进行类型化）。


    **连接点自省**


    当通知代码在连接点之前、之后或环绕执行时，程序员有时需要检索当前连接点的信息。例如，程序员可能需要知道与连接点关联的方法是什么，或者调用的参数是什么。收集此类信息的过程称为*连接点自省*。本书介绍的所有四种
    AOP 工具都支持此功能。


    AspectJ 提供了关键字 `thisJoinPoint`，用于在通知代码中自省连接点。


    该关键字返回一个对象的引用，该对象由 AspectJ 为每个遇到的连接点创建。此对象实现了 `org.aspectj.lang.JoinPoint` 接口，并且根据连接点类型，存在几种不同的方法来检索当前连接点的信息。


    对于 JAC、Spring AOP 和 JBoss AOP，通知代码由常规的 Java 方法组成。每当连接点匹配定义的切点时，就会调用这些方法。这些方法接受一个对象作为参数，该对象类似于
    AspectJ 的关键字 `thisJoinPoint`，提供当前连接点的信息。对于 JAC 和 Spring AOP，此对象实现的接口是 `org.aopalliance.intercept.Joinpoint`，该接口属于
    AOP Alliance 标准 API。


    JBoss AOP 使用一个类似但特定于 JBoss 的接口：`org.jboss.aop.joinpoint.Invocation`。


    ## 引入机制


    *引入机制*允许使用在切面中定义的代码元素（字段、方法等）来扩展应用程序。


    在 AspectJ 中，此机制被称为*类型间声明*。其思想是一个类型（切面）为目标类型执行声明。AspectJ 可以引入字段、方法和构造函数。引入的目标是一个类或接口。如果使用接口，则所有实现该接口的类都是引入的目标。AspectJ
    也可以引入接口。


    对于 JAC，可以引入两种类型的代码元素：方法和异常处理器。


    引入的方法（称为*角色方法*）和异常处理器在包装器类中定义。角色方法可以通过依赖 Java 运行时反射能力的 API 来调用。在此使用反射的优势在于引入机制非常灵活：在运行时可以轻松地添加或移除引入。缺点是
    JAC 在实际调用之前不会执行任何类型检查，并且由于反射开销，调用过程相对较慢。


    **144**


    第 7 章 ■ A O P 工 具 对 比


    JBoss AOP 和 Spring AOP 提供了一种称为*混入*的机制，用于将代码元素引入应用程序。通过此机制，在混入类中定义的字段和方法会被附加到作为混入目标的类上。格式良好的混入应实现一个声明了引入方法的接口。在底层，AOP
    框架将使用字节码操作使目标类实现混入接口。然后，当调用混入方法时，程序员必须将目标对象强制转换为声明该方法的接口。此机制也不是类型安全的，因为 Java 对接口没有实现任何强类型检查（动态绑定）。然而，它的优势在于效率远高于反射。此外，一旦对目标对象进行了强制类型转换，IDE
    将能够提供一些支持，例如上下文帮助和代码补全。


    总结引入机制，只有 AspectJ 语言方法在此特性上是类型安全的，因为编译器实现了一些类型检查机制。遵循框架方法的工具无法做到类型安全，因为它们仍然是纯
    Java，不支持此类特性。然而，JBoss 和 Spring 实现的混入方法似乎是一个很好的折衷方案。确实，大多数程序员会认为，将对象强制转换为给定接口以允许调用引入的方法更为自然。使用
    AspectJ，代码有时可能难以阅读和理解，因为它可以引用目标对象所支持的任何类或接口中都不存在的方法。


    **高级特性**


    本节比较 AspectJ、JAC、JBoss AOP 和 Spring AOP 实现的各种高级特性。具体来说，我们将涵盖切面实例化、排序和重用。


    **切面实例化**


    与类类似，切面是可以被实例化的代码元素，术语*切面*既可以指类型也可以指实例。然而，与类不同的是，切面不是由程序员直接实例化的；换句话说，程序员从不调用 `new`
    来实例化切面。切面实例由 AOP 语言或框架自动创建。

