    A T I O N ’ S B U S I N E S S T I E R


    **Improving Business Tier Design Patterns**


    In this section, we present some design patterns that can be used in the business
    tier and discuss their weaknesses. We show that the use of AOP greatly increases
    the independence of the server tier objects when it comes to technological and
    design choices.


    In particular, we stress the fact that all the server-side EJBs can be implemented
    as Plain Old Java Objects (POJOs) with the help of specific aspects. The use of
    EJBs then becomes transparent.


    **The Session Facade**


    In a J2EE application that uses EJBs, the session facade is a session EJB that
    manages a set of business objects and defines a middle-grained application interface.
    The advantages of using a facade have been outlined in the literature on standard
