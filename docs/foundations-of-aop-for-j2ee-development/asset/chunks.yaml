    的 POJO 转换为实体 EJB


    通过应用这些切面，应用程序的会话对象和实体对象可以作为 POJO 实现，独立于 J2EE/EJB 技术。应用程序的全局设计更加模块化，并且某些关注点（例如前置/后置条件检查和引用解析）变得更简单且局部化。


