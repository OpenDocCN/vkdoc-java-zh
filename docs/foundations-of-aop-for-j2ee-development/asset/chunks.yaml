  trans: '

    使用 AspectJ 时，默认策略是为每个现有切面仅创建一个实例，例如单例切面。因此，切面中定义的数据会被该切面应用到的所有连接点共享。程序员可以通过指定以下方式重新定义此默认策略：为作为切入点执行对象的每个对象（`perthis`
    子句）或作为切入点目标对象的每个对象（`pertarget` 子句）创建一个切面实例。类似地，每次程序进入一个控制流时，也可以创建一个切面实例（`percflow`
    和 `percflowbelow` 子句）。AspectJ 5 提供了一种新的实例化策略（`pertypewithin` 子句）。


    使用 JAC 时，实例化策略涉及切面和包装器，两者默认都是单例。可以通过指定为切入点中包含的每个连接点创建一个包装器实例，来为包装器选择不同的实例化策略。当使用
    JAC 编写分布式应用程序时，切面和包装器实例会在每个主机上复制。


    JBoss AOP 实现的默认策略是，为每个被切面化的应用类关联一个包装器类实例——换句话说，即为切面中定义的某个切入点所匹配的每个类创建一个实例。可以通过指定一个工厂来重新定义此默认策略，该工厂将根据程序员的需求负责创建切面实例。


    **第 7 章 ■ AOP 工具比较**


    **145**


    最后，Spring AOP 的默认策略也是将切面实例化为单例。


    尽管框架方法提供了默认策略，但始终可以通过使用较低级别的 Java API 动态实例化切面。在每个框架（JAC、JBoss 和 Spring）中，都可以动态地向目标对象添加新的通知和引入。这些特性使得框架方法比语言方法灵活得多。


    **切面排序**


    当多个切面应用于同一个连接点时，必须指定这些切面的执行顺序。大多数情况下，这种排序取决于切面的语义，无法定义自动规则。例如，当考虑一个跟踪切面和一个安全切面时，如果程序员想要跟踪每个请求，则跟踪切面可能在安全切面之前执行。或者，如果程序员只需要跟踪来自未授权用户的请求，则安全切面可能先执行。在这种情况下，程序员必须显式指定顺序。


    使用 AspectJ 时，切面排序通过指令 `declare precedence` 定义。该顺序是全局的，适用于整个应用程序。某些排序可能未被指定，在这种情况下，执行顺序无法得到保证。


    使用 JAC 时，切面排序通过系统属性 `jac.comp.wrappingOrder` 定义。


    JBoss AOP 在 XML 文件 `jboss-aop.xml` 中使用 `<precedence>` 标签。Spring AOP 提供了一个必须实现的接口（`org.springframework.core.Ordered`）来指定顺序。


    在所有情况下，顺序都是全局的，并且无法保证某些排序不会被遗漏。


    乍一看，AspectJ 和 JBoss 采用的优先级特性似乎是最强大的，因为它允许对切面声明进行排序。优先级关系是可传递的，切面系统将通过查看所有切面的所有声明顺序来确定最终顺序。然而，我们认为，在重构程序时（即添加、删除、重命名或更改切面时），优先级构造可能会导致可维护性问题。实际上，可能需要在程序中更改所有优先级声明。因此，对于更复杂的程序，像
    JAC 那样的集中式排序声明似乎是合理的。因此，我们建议程序员通过创建一个专门的切面来管理所有其他切面的排序，从而以集中方式使用 AspectJ 和 JBoss
    的优先级特性。不幸的是，Spring 的排序特性不允许任何集中式的排序声明。


    **切面复用**


    就像程序员可以在不同应用程序中复用类库一样，他们也可以编写切面库。请记住，在编写切面时，通知代码定义了切面的行为，而切入点则定义了切面必须在应用程序中集成的位置。因此，切入点高度依赖于应用程序，很少能被复用，所以复用切面的问题本质上就是复用切面代码的问题。


    使用 AspectJ 时，继承和抽象切入点允许复用切面。与抽象方法类似，抽象切入点是一个使用名称和签名声明但没有表达式的切入点。抽象切入点可以像任何其他切入点一样用于定义通知代码。


    **146**


    第 7 章 ■ AOP 工具比较


    与类一样，继承机制允许扩展切面，复用超切面的现有定义，在子切面中定义新的通知代码，并使抽象切入点具体化。使用 AspectJ 时，一个切面可以扩展一个抽象切面，但不能扩展一个具体切面。因此，复用切面就是编写带有通知代码和抽象切入点的抽象切面，然后通过使切入点具体化来扩展它们，从而使切面适应给定的应用程序。


    使用 JAC 时，切面的编写被分离到两个常规的 Java 类中：一个用于包装器，一个用于切面组件。此外，配置机制允许在所谓的配置文件中定义依赖于应用程序的参数，例如切入点表达式和系统属性。大多数情况下，使用
    JAC 复用切面只需编写一个新的配置文件，以使切面组件和包装器类适应新的应用程序。


    JBoss AOP 将拦截器和切入点的编写分离开来。前者是常规的 Java 类，而后者是 XML 文件。因此，拦截器很容易复用，而切入点必须适应每个新的应用程序。


    最后，Spring AOP 依赖其 bean 配置机制来为不同上下文配置切面。


    当我们审视这些工具的切面复用时，可以看到语言方法使用了语言级别的概念（如继承），而框架方法则使用了配置。两者各有优缺点。例如，继承方法不如配置灵活，但它能确保切面与继承的切面之间具有更好的兼容性。在我们看来，这两种方法的结合代表了切面复用的一个完整解决方案。


    **总结**


    在本章中，我们比较了本书中介绍的四种 AOP 工具：AspectJ、JAC、JBoss AOP 和 Spring AOP。我们概述了这些工具之间的一些次要差异，并解释了主要差异源于语言方法（AspectJ）和框架方法（JAC、JBoss
    AOP 和 Spring AOP）在实现上的不同。'
- fmt: '# Chapter 7: AOP Tools Comparison


    As we have seen in this chapter, the language approach allows for static typing
    and more compile-time checks, which improve the quality of the programs (see,
    for example, the “The Joinpoint Types” section). The language approach is also
    more efficient, since compilers can optimize the woven code for static binding
    and avoid run-time reflection or dynamic proxying when they are not needed.


    On the other hand, the framework approach uses run-time reflection and joinpoint
    introspection. These techniques make the frameworks less efficient, but also more
    flexible than the languages. Using the framework approach, it is possible to dynamically
    adapt an application while it is running. In addition, the framework approach
    uses existing languages or tools such as `Java`, `XML`, or `Ant`, which make it
    easier to integrate these tools within standard development environments. This
    last point is key, since it explains the success of the framework approach, while
    only one representative of the language approach is actually widely used: `AspectJ`.


    The success of `AspectJ` is the result of the major work by `AspectJ`’s creators
    to integrate the tool into IDEs such as `Eclipse`. Once `AspectJ` is well integrated,
    the use of AOP becomes simpler than a dedicated language, since the IDE can provide
    support such as contextual help, code completion, and design error detection,
    which can sometimes be tedious to support with the framework approach since these
    tools perform less type checking.


    Although the language and framework approaches sometimes compete, our feeling
    is that they should be seen as complementary, since they have very different properties.
    The work done with `AspectJ 5`, which aims to integrate the `AspectJ` language
    and the `AspectWerkz` framework, is a step in the right direction. However, a
    lot of work is still needed to create an ideal tool that cleanly integrates the
    flexibility of frameworks and the type-checking capabilities of languages.


    # Chapter 8: Design Patterns and AOP


    Design patterns offer generic solutions for recurring design problems. Most developers
    who use object-oriented programming are familiar with their use. Patterns are
    not specific to a particular language; in fact, most of the problems they tackle
    are not even specific to a particular programming paradigm. Consequently, many
    design problems usually resolved through object-oriented programming can be solved
    using AOP.


    The core design patterns became popular in 1995 with Addison-Wesley’s publishing
    of *Elements of Reusable Object-Oriented Software* by Erich Gamma, Richard Helm,
    Ralph Johnson, and John Vlissides (commonly known as the Gang of Four, or GoF).
    Although several other design patterns have been defined since then, most are
    based on this work.


    This chapter aims to redefine selected design patterns with the aspect-oriented
    approach. We compare these redefined patterns with their object-oriented definitions
    so that the advantages of AOP will be highlighted.


    The first section of this chapter gives a quick introduction to these reusable
    models. We then present and discuss the design patterns that show the most significant
    modularity improvements with an AOP implementation.


    ## Design Patterns, or Elements of Reusable Software


    Design patterns are one approach for reusability, which is one of the key concepts
    of object-oriented programming.


    The idea of a pattern is not unique to programming; in fact, the idea stems from
    a similar concept that is used in architecture and town planning, an idea formalized
    by architect Christopher Alexander. The ideas were adapted to object-oriented
    programming by Ward Cunningham and Ken Beck in their article “Using Pattern Languages
    for Object-Oriented Programs,” which was presented in 1987 at a conference in
    Orlando, Florida.


    As stated previously, design patterns offer generic solutions to recurrent problems
    in specific contexts. The context in which a design pattern is used is important
    because a problem may be solved differently depending on the context. A good quality
    design pattern must be the abstraction of a concrete and well-tested solution.


    A design pattern must be well documented if it is to be used efficiently. Several
    catalogues of design patterns are available, the GoF book being the most well
    known. Each catalogue is split into sections that contain descriptions of the
    design patterns.


    With this documentation, almost anyone can use these design patterns and allow
    best practices to be applied easily in application development; however, it is
    still necessary to understand the possible applications of a design pattern in
    order to use it correctly.


    ## Implementation of Design Patterns with AOP


    Currently, a great deal of research is being carried out on the implementation
    of design patterns using AOP. This is because many design patterns crosscut, and
    therefore it is difficult to ensure sufficient modularity of these patterns within
    the object-oriented paradigm.


    In 2002, an OOPSLA conference article by Jan Hannemann and Gregor Kiczales discussed
    precursory research in this area. This work highlighted that implementing certain
    design patterns in AOP can lead to the following advantages:


    - **Locality**: The code of the functionality is contained within the aspect rather
    than within the classes and, as a result, modularization is improved.

    - **Reusability**: Refactoring code into aspects allows a greater degree of abstraction
    and better reusability.

    - **Composition transparency**: An object can have several patterns applied to
    it without the global implementation becoming confusing.

    - **(Un)pluggability**: The overall structure of the application depends less
    on the design patterns implemented. With AOP, a simple parameter change allows
    you to activate or deactivate a design pattern, for example, when making a class
    a singleton.


    However, these four advantages were not apparent for all design patterns. Some
    show all four benefits, others none. Of the 23 GoF design patterns, 17 show improvements
    with an implementation using AOP; 12 benefit in all four ways.


    The next sections apply AOP techniques to a sample of the GoF design patterns.


    ## The Singleton Design Pattern


    The first design pattern that we study with regards to aspect-oriented programming
    techniques is the Singleton. We begin by providing a quick description of this
    pattern, and proceed by giving two implementations of the pattern, one with `JBoss
    AOP` and one with `AspectJ`. We then conclude this section with an evaluation
    of the implementations.


    ### Description


    The Singleton design pattern can be described as follows:


    - **The problem and its context**: Certain classes should only have a single instance
    during the execution of a program. This can be necessary for two reasons: either
    the class models a unique object, such as a set of global variables for the application,
    and having two instances may lead to run-time errors; or alternatively, because
    one instance is sufficient to offer all the services required, and by ensuring
    that not more than one instance is created, you economize memory and resources.'
