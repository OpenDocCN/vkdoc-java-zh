    For further clarification on the Eclipse project’s packaging, please refer to
    the screen shots later in this chapter, which show the internal organization of
    the tiers.


    Packages contain regular and aspectized application classes. This organization
    allows programmers to compare aspectized and regular code more efficiently, especially
    when using the AJDT plug-in and its aspect visualizer.


    ## Deploying the Application


    The application is packaged and deployed on the Sun ONE J2EE application server.
    Our web site publishes the packaging and compilation scripts, which allow the
    project to remain independent from the chosen IDE. Although they are developed
    under Eclipse, the projects do not use any specific plug-in or Eclipse technology,
    therefore it is easy to use a different IDE.


    The relevant files are as follows:


    -   The `deploySunONE.bat` file, located at the root of the `EJBComponent` project,
    deploys the application on the Sun ONE server and uses the Ant script `SunONE.xml`
    in the same location. To execute this script, Ant must be installed and the Sun
    ONE server must be launched.

    -   The `SunONE.properties` file is used to configure and connect the server during
    the deployment phase.

    -   The property file of the client application, `j2eeclient.properties`, configures
    remote access to the Sun ONE server. This file, which must be installed on the
    client side, declares that the facade EJBs are accessible from the client. This
    file is independently published.


    The next sections cover the AOP-specific details of the different tiers.


    ## The Data Tier'
