    subclasses offer at least the same level of service as the superclasses, these
    modifications must follow certain rules:


    • For preconditions, subclasses keep the same conditions or make them less restrictive.


    • For postconditions, subclasses keep the same conditions or make them more restrictive.


    • For class invariants, the invariants of a superclass are automatically part
    of the invariants of the subclasses.


    • For internal invariants, the invariants of a superclass are kept identical only
    if the subclass does not redefine the method that the invariant is defined about.


    **Contracts in Java**


    As requested by *Java Specification Request (JSR) 41: A Simple Assertion Facility*,
    Java 1.4 introduced some limited contract support, which is similar to that offered
    by the C language through the assert macro. The assert keyword that was added
    to Java can be in two forms:


    • assert <condition>


    • assert <condition> : <value>


    In the first form, assert behaves as follows:


    • If the Boolean condition returns true, the program execution continues.


    • If the Boolean condition returns false, a java.lang.AssertionError is thrown.


    In the second form, assert behaves as follows:


    • If the Boolean condition returns true, the program execution continues.


    • If the Boolean condition returns false, a java.lang.AssertionError is built
    by passing value to the error’s constructor. The passed value must be either a
    constant string or a function returning an object (which is then converted into
    a string by the toString method).


    **Implementing Contracts with AOP**


    As shown in the previous section, Java provides very limited support for Design
    by Contract. In particular, Java 1.4 does not implement any of the notions of
    preconditions, postconditions, or class invariants. As we will show here, AOP
    provides useful techniques for implementing these notions in Java.'
  trans: '

    ■**定义后置条件**——一个必须在方法执行结束时验证的断言。后置条件允许你验证方法是否已正确执行。（从用户的角度来看，后置条件允许对用户变量的值做出某些假设，从而可以避免冗余测试。）例如，一个平方根方法（`sqrt`）会具有后置条件
    `result>=0`。


    ■**定义类不变量**——一个必须由类状态（即所有类实例的所有状态）验证的断言。类不变量保证对象保持一致的状态。例如，一个三角形类会具有类不变量 `vertexes=3`，其中
    `vertexes` 要么是类的属性，要么是对类的多个属性进行计算的结果。


    ■**定义内部不变量**——一个必须在方法体内部验证的断言。内部不变量有助于保证方法被正确实现。例如，在模拟贷款计算的方法中，会具有内部不变量 `total
    interest ratio >=0`。


    冲突处理


    当一个或多个断言未通过验证时，就会发生契约冲突。这种冲突可能由任何原因引起，例如硬件故障、被调用例程的失败，或导致无法满足契约的软件缺陷。


    在这种情况下，可以采用三种策略：


    • *重试*：存在一种替代策略。契约方应恢复不变量，并使用不同的策略再次尝试。


    • *有序恐慌*：没有替代方案可用。契约方必须恢复不变量，终止执行，并通过触发异常向用户报告失败。


    • *误报*：在采取某些纠正措施后，有可能继续执行。


    契约继承


    面向对象编程的关键机制之一是继承。当使用继承时，义务也会被继承，子类可以修改继承的契约。为了确保子类提供至少与超类相同级别的服务，这些修改必须遵循特定规则：


    • 对于前置条件，子类保持相同条件或使其限制更宽松。


    • 对于后置条件，子类保持相同条件或使其限制更严格。


    • 对于类不变量，超类的不变量自动成为子类不变量的一部分。


    • 对于内部不变量，仅当子类未重新定义不变量所涉及的方法时，超类的不变量才保持不变。


    **Java 中的契约**


    根据 *Java 规范请求 (JSR) 41：简单断言工具* 的要求，Java 1.4 引入了有限的契约支持，这与 C 语言通过 `assert` 宏提供的支持类似。添加到
    Java 中的 `assert` 关键字有两种形式：


    • `assert <条件>`


    • `assert <条件> : <值>`


    在第一种形式中，`assert` 的行为如下：


    • 如果布尔条件返回 `true`，程序继续执行。


    • 如果布尔条件返回 `false`，则抛出 `java.lang.AssertionError`。


    在第二种形式中，`assert` 的行为如下：


    • 如果布尔条件返回 `true`，程序继续执行。


    • 如果布尔条件返回 `false`，则通过将值传递给错误的构造函数来构建 `java.lang.AssertionError`。传递的值必须是常量字符串或返回对象的函数（然后通过
    `toString` 方法将该对象转换为字符串）。


    **使用 AOP 实现契约**


    如上一节所示，Java 对契约式设计的支持非常有限。特别是，Java 1.4 没有实现任何关于前置条件、后置条件或类不变量的概念。正如我们将在此展示的，AOP
    为在 Java 中实现这些概念提供了有用的技术。

