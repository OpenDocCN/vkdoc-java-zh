    **图 10-6.** *ApplicationClient 项目（Java Swing 客户端层）的组织结构* 根包为 aop.j2ee.client.java。在此包内，你可以找到该应用程序的两个版本：未使用切面开发的常规版本（regular
    包）和切面化版本（aspectized 包）。aspect 包包含后一版本的所有 AspectJ 切面；这是一个 AspectJ 项目。


    如图 10-6 所示，原始版本的 Java 管理客户端结构简单。它由四个 Java 类组成：BankAdmin、DataModel、EventHandle
    和 Simple。BankAdmin 类构建实际的图形用户界面（GUI）。它抛出与用户可能操作相对应的事件。这些事件由定义并安装在 EventHandle
    中的事件管理器处理。


    DataModel 类通过调用业务层（具体来说是 aop.j2ee.business.session.bank 外观）来实现操作的效果。请注意，Simple
    类并非原始应用程序的一部分，但它将在下一章中用于测试简单的客户端逻辑，而无需处理整个客户端。


    客户端层绝非一个值得遵循的设计；我们仅将其用作描述在编写 Java 客户端时可能出现的关注点的一种手段。


    第 10 章 ■ 示例应用程序的表示层


    **219**


    Web 表示层


    使用 Struts 编程的 Web 表示层并未进行切面化，因为在此上下文中，其收益有限。在第 13 章中，我们将讨论在不使用 Struts 的应用程序上下文中，表示层设计模式可能的切面化。


    **示例应用程序设计**


    示例应用程序的设计总体上受 J2EE 应用程序的启发，更具体地说，是受 J2EE 最佳实践和设计模式的启发。


    在本节开始时，我们将介绍一系列特定于 J2EE 且此前在此上下文中使用过的设计模式和解决方案。然后，我们将解释使用 AOP 如何改进示例应用程序的设计。


    原始的 Duke''s Bank 应用程序包含在 Sun ONE 应用服务器的免费发行版中，该发行版可在 Sun Microsystems 网站上获取。如果您希望与本文介绍的设计进行比较，请参考原始应用程序。


    **使用 J2EE 设计解决方案**


    原始 Duke''s Bank 应用程序的设计很简单。并非所有可用的 J2EE 设计解决方案都被使用，这导致了代码模块性的不足。在本案例研究中，我们对应用程序进行了轻微修改，特别是通过遵循
    J2EE 设计模式来提高应用程序的模块性，并修改了代码的组织结构。


    使用 J2EE 设计模式有两个主要优点：


    • 这些设计模式是经过充分测试、可重用的设计元素，使我们能够遵循 J2EE 最佳实践。

    • J2EE 设计模式有完善的文档记录，并且开发人员熟悉其用法（参见 http://java.sun.com/blueprints/corej2eepatterns/Patterns/index.html）。使用
    J2EE 设计模式有助于开发人员更好地理解应用程序的设计，并更容易识别我们希望通过切面解决的问题。


    除了 J2EE 设计模式之外，使用 EJB 使我们能够自动集成服务。例如，可以通过组件容器或容器管理持久性（CMP）将其应用于实体 EJB 来管理持久性。事务或容器管理事务（CMT）也是如此，可以通过
    EJB 部署描述符以声明方式集成。


    接下来的几节将简要描述我们将在本章后面进一步展开的不同 J2EE 设计解决方案。有关更多详细信息，请参考 J2EE 文档（http://java.sun.com/j2ee/docs.html）和
    J2EE 设计模式目录（参见本书末尾的参考资料部分）。


    J2EE 业务层设计模式


    在使用 J2EE 构建的应用程序中，业务层是中间层，它构成了客户端与企业资源（数据源）之间的接口。因此，以能够确保良好性能以及易于维护、演进、可扩展性等方式实现该层至关重要。


    **220**


    第 10 章 ■ 示例应用程序的表示层


    使用业务层并非强制要求，但强烈推荐。在具有业务层的应用程序中，客户端可以以逻辑一致的方式访问公司的不同数据源，而如果应用程序允许直接访问数据库，则情况并非如此。


    使数据访问一致有助于更轻松地优化应用程序架构。例如，可以通过在应用服务器上使用负载均衡或缓存来提高整体性能。这些改进与业务层的使用相关，并且只有在遵守某些基本规则时才可能实现。J2EE
    设计模式明确阐述了这些规则。


    业务层最重要的两个设计模式是会话外观模式和业务对象模式，以下各节将对它们进行描述。


    **会话外观模式**


    *会话外观模式*本质上是一个会话 EJB。其主要功能如下：


    • 确保客户端独立于业务模型（后者会随时间推移而修改）。

    • 允许通过无共享状态的对象访问数据，这些对象可以由应用服务器自动管理和优化。由于避免了状态同步问题，服务器本身会根据客户端打开的不同会话构建会话对象池。

    • 创建一个功能接口，以便使用部署描述符以声明方式添加额外的非功能性属性，我们将在后面解释。

    • 通过 J2EE 查找和通信层（*Java 命名和目录接口*，或*JNDI*，以及*远程方法调用*，或*RMI*）提供对已识别服务的远程访问。此访问也在部署描述符中进行配置。


    **业务对象模式**


    *业务对象模式*允许会话外观对象通过实体 EJB 访问数据，而无需直接使用不同资源的连接器。与会话外观一样，使用业务对象并非强制要求，但推荐使用。


    业务对象模式的主要功能如下：


    • 在面向对象模型中封装数据访问，从而简化数据访问并避免例如需要 SQL 查询。EJB 模型提倡使用 Home 接口来解析业务对象。

    • 使用部署描述符以声明方式和自动方式引入非功能性属性，例如持久性。


    第 10 章 ■ 示例应用程序的表示层


    **221**


    **传输对象模式**


    使用其他设计模式也可以改进 J2EE 应用程序的设计，尤其是在性能方面。*传输对象模式*允许我们将外观使用的服务分组。当服务具有细粒度参数时，这非常有用，因为这些参数可能导致客户端和服务器之间多次调用序列，而这些调用往往会产生大量网络流量，尤其是代价高昂的连接。

