    J2EE设计模式建议使用实体EJB来定义持久化业务对象。理论上，使用实体EJB可以简单地添加事务和持久化属性。然而，存在一些模式或框架可以更简单、更高效地处理相同的问题。


    例如，使用Hibernate开源框架进行持久化是实体EJB的有效替代方案。大多数可用的框架不需要特定的扩展，业务对象被定义为`POJO`或传统的`JavaBeans`。为了进一步演进，让业务对象尽可能独立于EJB对应用程序是有益的。


