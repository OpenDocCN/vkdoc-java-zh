- fmt: "# A Pure Object-Oriented, Aspect-Free Implementation\n\nA pure object-oriented,\
    \ aspect-free implementation of the Chain of Responsibility design pattern generally\
    \ relies on a `Handler` interface. Each command of a chain must implement this\
    \ interface, which generally provides two methods: `setSuccessor` for setting\
    \ the successor of the current command in the chain, and `handle` for performing\
    \ the command. Depending on the conditions chosen by the programmer, the `handle`\
    \ method can perform the command and delegate the call to the next element in\
    \ the chain; it can also just perform the command or just delegate the call.\n\
    \n## Aspect-Oriented Implementation\n\nThe implementation that we propose for\
    \ the Chain of Responsibility design pattern uses the notion of aspect precedence.\
    \ In the previously presented design patterns, an abstract aspect was defined\
    \ to implement the code that was shared by all the commands in a chain. This abstract\
    \ aspect was then extended for each concrete command. Aspect precedence is the\
    \ notion used for ordering the execution of these commands in the chain.\n\n###\
    \ Generic Part of the Implementation\n\nThe generic part of our implementation\
    \ of the Chain of Responsibility design pattern is defined in the `AbstractChainAspect`\
    \ abstract aspect shown in Listing 8-17.\n\n**Listing 8-17.** *Implementation\
    \ of the Chain of Responsibility Design Pattern Using AspectJ*\n\n```\n1 package\
    \ aop.patterns.chainOfResponsibility;\n3 public abstract aspect AbstractChainAspect\
    \ pertarget(receiver()){\n4     protected abstract pointcut receiver();\n5   \
    \  protected abstract pointcut execute();\n6     protected abstract void handle();\n\
    7     after() : execute() {\n8         handle();\n9     }\n10 }\n```\n\nWith our\
    \ implementation of the Observer and Command design pattern, the abstract `receiver`\
    \ pointcut will designate the objects where the Chain of Responsibility pattern\
    \ needs to be integrated.\n\nThe abstract `execute` pointcut defines the \"condition,\"\
    \ which triggers the execution of the chain.\n\nThe \"after\" advice (line 7)\
    \ calls the abstract method `handle`. This method will be concretized into subaspects\
    \ to define the behavior implemented by each command in the chain.\n\n### Implementation\
    \ of a Chain of Commands\n\nWe now define two simple commands, `Step1ChainAspect`\
    \ and `Step2ChainAspect`, which will be put in a chain (see Listing 8-18).\n\n\
    **Listing 8-18.** *Concrete Aspect to Bind the Chain of Responsibility Design\
    \ Pattern to the Stats Class*\n\n```\n1 package aop.patterns.chainOfResponsibility;\n\
    3 public aspect Step1ChainAspect extends AbstractChainAspect {\n4     protected\
    \ pointcut receiver() : initialization(Stats.new(..));\n5     protected pointcut\
    \ execute() : call(void Stats.incOrders());\n6\n7     protected void handle()\
    \ {\n8         System.out.println(\"OrderHandler 1\");\n9     }\n10 }\n12 public\
    \ aspect Step2ChainAspect extends AbstractChainAspect {\n14     declare precedence\
    \ : Step1ChainAspect;\n16     protected pointcut receiver() : initialization(Stats.new(..));\n\
    17     protected pointcut execute() : call(void Stats.incOrders());\n18\n19  \
    \   protected void handle() {\n20         System.out.println(\"OrderHandler 2\"\
    );\n21     }\n22 }\n```\n\nBoth aspects apply on the instances of the `Stats`\
    \ class (see the pointcut `receiver` on lines 4 and 16). Both are also triggered\
    \ when the `Stat.incOrders` method is called (see the pointcut `execute` on lines\
    \ 5 and 17).\n\nThe important point in this example is the use of the `declare\
    \ precedence` clause at line 14, which allows the definition of the aspect order\
    \ in the chain. Here, the aspect `Step2ChainAspect` will be executed after `Step1ChainAspect`.\n\
    \nThe `ChainExample` class in Listing 8-19 illustrates the usage of our implementation\
    \ of the Chain of Responsibility design pattern.\n\n**Listing 8-19.** *Main Class\
    \ for Testing the Chain of Responsibility Design Pattern*\n\n```\npackage aop.patterns.chainOfResponsibility;\n\
    public class ChainExample {\n    public static void main(String[] args) {\n  \
    \      Stats stats = new Stats();\n        stats.incOrders();\n        stats.addAmount(10);\n\
    \        stats.incOrders();\n        stats.addAmount(10);\n        stats.incOrders();\n\
    \        stats.addAmount(10);\n    }\n}\n```\n\nWhen run, this program displays\
    \ the following output:\n\n```\nOrderHandler n°1\nOrderHandler n°2\nOrderHandler\
    \ n°1\nOrderHandler n°2\nOrderHandler n°1\nOrderHandler n°2\n```\n\n### Evaluation\
    \ of the Implementation\n\nWith the four criteria defined by Hannemann and Kiczales,\
    \ we can evaluate our implementation as follows:\n\n- **Locality**: The class\
    \ where the chain of responsibility applies is free from any code related to the\
    \ management of this pattern. The aspect composition mechanism handles the ordering\
    \ of commands within a chain.\n- **Reusability**: The management of the chain\
    \ is reused systematically. The implementation of any new chain only requires\
    \ the definition of the new chain elements by extending the abstract aspect.\n\
    - **Composition transparency**: The aspect is not invasive. The behavior of the\
    \ classes that receives commands is extended, but not modified.\n- **(Un)pluggability**:\
    \ The link between the chain of commands and the receivers is weak. The pointcuts\
    \ for receivers and executions define precisely where the design pattern must\
    \ be integrated.\n\n## The Proxy Design Pattern\n\nThe last design pattern that\
    \ we study with regards to aspect-oriented programming techniques is the Proxy.\
    \ We begin by providing a quick description of this pattern, and proceed by giving\
    \ an implementation of the pattern using AspectJ.\n\n### Description\n\nIn many\
    \ situations, the objects involved in a program cannot communicate directly through\
    \ local method calls. For example, objects in a distributed program are separated\
    \ by a network. In such situations, a proxy is used to transfer the communications\
    \ from client to server over the network. Distribution is not the only situation\
    \ where proxies are useful. For example, if the access to an object needs to be\
    \ restricted to authorized users, a proxy can be inserted to perform access checks.\n\
    \nA proxy is an object that acts as a representative for another object. A proxy\
    \ can be generic; in this case, it acts as a representative for any kind of object.\
    \ Conversely, a proxy can be specific and implement the same interface as the\
    \ object it is representing.\n\nThe treatments performed by the proxy are out\
    \ of the scope of design patterns. The simplest existing proxy delegates the call\
    \ to the main object without performing any additional treatments.\n\nIn the remainder\
    \ of this section, we take the example of a proxy that performs access control\
    \ checks.\n\n### Aspect-Oriented Implementation\n\nOur implementation of the Proxy\
    \ design pattern for access control checks relies on an abstract aspect. Concrete\
    \ aspects will be defined later when we set the authorization rights and denote\
    \ the actual methods where the checks are to be applied.\n\n#### Generic Part\
    \ of the Implementation\n\nThe code of the abstract aspect is shown in Listing\
    \ 8-20.\n\n**Listing 8-20.** *Implementation of the Proxy Design Pattern Using\
    \ AspectJ*\n\n```\n1 package aop.patterns.accessproxy;\n3 public abstract aspect\
    \ AbstractAccessProxyAspect {\n4     protected String user;\n5     protected String\
    \ password;\n7     public void setAuthentication(String user, String password)\
    \ {\n8         this.user = user;\n9         this.password = password;\n10    \
    \ }\n12     protected abstract boolean isAuthorized();\n13     protected abstract\
    \ pointcut accessControl();\n15     before() : accessControl() {\n16         if\
    \ (!isAuthorized()) {\n17             throw new RuntimeException(\"Unauthorized\
    \ access to: \" +\n18                 thisJoinPoint.getSignature().getName());\n\
    19         }\n20     }\n21 }\n```\n\nThe `setAuthentication` method sets the current\
    \ user's login and password. The `isAuthorized` method is concretized into subaspects\
    \ to define the access policy.\n\nThe `accessControl` abstract pointcut is associated\
    \ to methods that should be protected against unauthorized accesses. The \"before\"\
    \ advice (line 15) performs the check and throws an exception if the access is\
    \ denied.\n\n#### Implementation of Proxies"
