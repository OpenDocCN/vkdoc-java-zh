- fmt: '# In This Book


    In this book, we provide a set of aspect-oriented techniques that allow programmers
    to deal with some of the aforementioned problems. These solutions include the
    implicit protocol, the anchoring protocol techniques, and the internationalization
    aspect, depicted later in Chapter 12 in the section “Using AOP for UI Concerns.”
    However, even though these techniques are reusable and open the door to good AOP
    practice, they do not replace designer expertise. It is the designer who is the
    key for identifying the crosscutting concerns that may appear at any level of
    the application.


    # Chapter 11: Using AOP Within the Sample Application’s Business Tier


    ## Business Tier Improvement: Beyond Design Patterns


    Certain concerns can be crosscutting to the business tier and difficult to handle
    with J2EE design patterns. With these concerns, the GoF design patterns may be
    useful.


    As stated in Chapter 8, concerns not compatible with design patterns can often
    be implemented by using AOP. Indeed, AOP often offers simpler solutions than those
    proposed by design patterns.


    In this section, we study a solution for modularizing reference resolving and
    preconditions in the context of our case study, the banking application.


    ### Resolving Object References


    Resolving object references is usually implemented through a well-defined protocol
    that allows the search based on certain criterions. Within the EJB context, the
    `Home` interface defines this protocol, which is implemented by the EJB.


    Listing 11-6 illustrates the protocol for the account business object.


    **Listing 11-6.** *The Home Interface of Account*


    ```

    package aop.j2ee.business.entity.account;


    01 import java.util.*;

    02 import java.math.*;

    03 import javax.ejb.*;

    04 import java.rmi.RemoteException;

    05 import aop.j2ee.commons.exception.MissingPrimaryKeyException; 06

    07 public interface AccountHome extends EJBHome {

    09 public Account create (String accountId, String type, String description, 10
    BigDecimal balance, BigDecimal creditLine, BigDecimal beginBalance, 11 Date beginBalanceTimeStamp,
    ArrayList customerIds) 12 throws RemoteException, CreateException, MissingPrimaryKeyException;
    13

    14 public Account findByPrimaryKey(String accountId) 15 throws FinderException,
    RemoteException;

    17 public Collection findByCustomerId(String customerId) 18 throws FinderException,
    RemoteException;

    20 } // AccountHome

    ```


    The `create` method allows for the creation of a new account by a client object.
    For instance, the `Bank` session EJB uses this method in the implementation of
    `createAccount`. It is a typical method for a `Home` interface. The `findByPrimaryKey(String)`
    method is also a classical method. It allows the client objects to access a given
    account instance through its primary key.


    Finally, `findByCustomerId(String customerId)` reveals the relation between the
    customers (`Customer`) and the accounts (`Account`). This method is used to access
    the customer’s accounts.


    For each relation between the EJB, a similar method can be defined in the `Home`
    interface.


    The use of the `Home` interface implies a dependency to the EJB model. Even though
    it is a light dependency, it has a crosscutting effect because each client object
    (typically a session EJB such as `Bank` and `TxController`) must implement the
    `Home` interface accessing code, which uses some EJB and JNDI primitives. The
    technological dependency can be reduced by using the locator pattern. However,
    then the use of the locator itself becomes a crosscutting concern and requires
    additional design efforts.


    In order to illustrate the complications related to reference resolving, we use
    our original design of the Duke’s Bank example, which does not use the service
    locator pattern.


    Let us refer again to the `TxController` session EJB implementation. Remember
    that the account resolving is implemented in the `checkAccountArgsAndResolve`
    method, as shown in Listing 11-7.


    **Listing 11-7.** *The `checkAccountArgsAndResolve` Method*


    ```

    01 private Account checkAccountArgsAndResolve(

    02 BigDecimal amount,String description,String accountId) 03 throws InvalidParameterException,
    AccountNotFoundException {

    05 Account account = null;

    06 if (description == null)

    07 throw new InvalidParameterException("null description"); 08 if (accountId ==
    null)

    09 throw new InvalidParameterException("null accountId"); 10 if (amount.compareTo(bigZero)
    != 1)

    11 throw new InvalidParameterException("amount <= 0"); 12 try {

    13 account = accountHome.findByPrimaryKey(accountId); 14 } catch (Exception ex)
    {

    15 throw new AccountNotFoundException(accountId);

    16 }

    17 return account;

    18 } // checkAccountArgsAndResolve

    ```


    The `accountHome` field (line 13) has been initialized with other similar fields
    when the EJB was created, as shown at line 4 of Listing 11-8.


    **Listing 11-8.** *The `ejbCreate` Method*


    ```

    01 public void ejbCreate() {

    02 try {

    03 txHome = EJBGetter.getTxHome();

    04 accountHome = EJBGetter.getAccountHome();

    05 } catch (Exception ex) {

    06 throw new EJBException("ejbCreate: " + ex.getMessage()); 07 }

    08 } // ejbCreate

    ```


    The `EJBGetter` class factorizes the EJB Home resolving code, as shown in Listing
    11-9.


    **Listing 11-9.** *The `EJBGetter` Class*


    ```

    package aop.j2ee.business.util;


    import javax.rmi.PortableRemoteObject;

    import javax.naming.InitialContext;

    import javax.naming.NamingException;

    import aop.j2ee.commons.util.CodedNames;

    import aop.j2ee.business.entity.account.*;

    [...] // other imports


    public final class EJBGetter {

    public static AccountHome getAccountHome()

    throws NamingException {

    InitialContext initial = new InitialContext();

    Object objref = initial.lookup(CodedNames.ACCOUNT_EJBHOME); return (AccountHome)

    PortableRemoteObject.narrow(objref, AccountHome.class);

    }

    [...] // other resolving methods

    }

    ```


    In the original Duke’s Bank design, the account resolving and the transaction
    parameters testing are factorized within a single method. These two independent
    concerns are mixed because of the need to hide the use of the `Home` interface.
    This choice makes the transactional method code less explicit.


    Listing 11-10 is an example of a business service implementation that corresponds
    to an account withdrawal.


    **Listing 11-10.** *A Withdrawal Business Service Implementation*


    ```

    01 public void withdraw(BigDecimal amount,String description, 02 String accountId)

    03 throws InvalidParameterException, AccountNotFoundException, 04 IllegalAccountTypeException,
    InsufficientFundsException {

    06 Account account =

    07 checkAccountArgsAndResolve(amount, description, accountId); 08 try {

    09 String type = account.getType();

    10 if (DomainUtil.isCreditAccount(type))

    11 throw new IllegalAccountTypeException(type);

    12 BigDecimal newBalance = account.getBalance().subtract(amount); 13 if (newBalance.compareTo(bigZero)
    == -1)

    14 throw new InsufficientFundsException();

    15 executeTx(

    16 amount.negate(),

    17 description,

    18 accountId,

    19 newBalance,

    20 account);

    21 } catch (RemoteException ex) {

    22 throw new EJBException("withdraw: " + ex.getMessage()); 23 }

    24 } // withdraw

    26 private void executeTx(BigDecimal amount, String description, 27 String accountId,
    BigDecimal newBalance, Account account) {

    29 try {

    30 makeConnection();

    31 String txId = DBHelper.getNextTxId(con);

    32 account.setBalance(newBalance);

    33 Tx tx = txHome.create(txId,accountId,new java.util.Date(), 34 amount,newBalance,description);
    35 } catch (Exception ex) {

    36 throw new EJBException("executeTx: " + ex.getMessage()); 37 } finally {

    38 releaseConnection();

    39 }

    40 } // executeTx

    ```'
