    \n使用诸如定位器（locator）之类的设计模式可以使代码减少对基础设施的依赖，并通过复用最小化设计工作量。然而，此时模式本身的使用就变成了一个横切关注点。此外，使用定位器模式仍然需要间接使用EJB模型。\n\
    \n## 使用AOP\n\nAOP，更确切地说是之前讨论的隐式协议技术，显著简化了设计，并有效地模块化了引用解析这一横切关注点。\n\n首先，我们在EJB本身中定义了引用访问协议，如清单11-11所示。\n\
