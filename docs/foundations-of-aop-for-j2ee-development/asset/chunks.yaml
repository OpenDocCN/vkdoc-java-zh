    The withdrawal and other business method implementations have the following characteristics:


    • They are clearer than the method that used the Home protocol. This protocol
    requires the resolving of the references through JNDI, the managing of these references,
    and the identification of the newly created EJBs. None of these are required with
    the implicit protocol technique, and the programmer simply uses the protocol methods
    without knowing their implementation.


    • They are more modular. The implementation of the EJB-resolving logic is located
    within a unique aspect instead of being dispatched in all the EJBs. Then it becomes
    easier to factorize common reference-resolving mechanisms.


