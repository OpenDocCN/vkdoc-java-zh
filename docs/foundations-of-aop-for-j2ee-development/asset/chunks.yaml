    with object values that are not easily represented as simple strings (for instance,
    arrays and user-defined class instances). For the sake of the example, we have
    defined the getValue method, which uses the java.lang.Object.hashCode method to
    get a unique representation of an object and that also deals with arrays. Note
    that the call to invocation.invokeNext() is performed within a try/catch block
    in order to record potential exceptions.


