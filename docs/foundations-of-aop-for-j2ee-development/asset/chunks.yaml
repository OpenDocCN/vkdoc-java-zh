    ## Organizing the Business Tier Code


    Figure 10-3 shows the organization of the `EJBComponents` Eclipse project, which
    corresponds to the business tier and contains the EJBs.


    **Figure 10-3.** *Organization of the EJBComponents project (business tier)*


    ![Image 9](index-229_1.png)


    The root package is `aop.j2ee.business`. The entity and session EJBs are placed
    in two subpackages: `aop.j2ee.business.entity` and `aop.j2ee.business.session`.
    Within these packages, the EJB is defined within a specific package, which contains
    at least three implementation files:


    - The file that defines the Remote interface (by convention, the business name)

    - The file that defines the Home interface (by convention, the business name followed
    by `Home`)

    - The file that defines the Bean implementation (by convention, the business name
    followed by `Bean`)


    For example, for the EJB that implements the banking facade, the files are `Bank.java`,
    `BankHome.java`, and `BankBean.java`, respectively.


    A fourth file, which ends with `POJO`, corresponds to the POJO implementation
    of the bean defined in the package; for instance, `BankPOJO` corresponds to `BankBean`
    in the bank package.


    This non-EJB implementation is made possible through the use of aspects, as we’ll
    explain further in Chapter 12. Since this file contains the aspectized implementation
    of the EJB, it is easy for the developer to compare these two implementations
    and to visualize the impact of the aspects.


    Choosing one of these functionally equivalent implementations is done within the
    deployment descriptor file, `ejb-jar.xml`, which is located in the `META-INF`
    directory of the Eclipse project. Listing 10-7 shows an example.


    **Listing 10-7.** *Sample of a Deployment Descriptor File for the Sample Application
    (Bank)*


    ```

    1 <ejb-jar>

    2 <enterprise-beans>

    3 [...]

    4 <session>

    5 <display-name>Bank</display-name>

    6 <ejb-name>Bank</ejb-name>

    7 <home>aop.j2ee.business.session.bank.BankHome</home>

    8 <remote>aop.j2ee.business.session.bank.Bank</remote>

    9 <ejb-class>aop.j2ee.business.session.bank.BankBean</ejb-class>

    10 <session-type>Stateless</session-type>

    11 <transaction-type>Bean</transaction-type>

    12 </session>

    13 [...]

    14 </enterprise-beans>

    15 </ejb-jar>

    ```


    To use the aspectized implementation rather than the regular one, you must replace
    the line that declares the EJB class (line 9) with the following line:


    ```

    <ejb-class>aop.j2ee.business.session.bank.BankPOJO</ejb-class>

    ```


    All the aspects applied to the POJOs are defined in the `aop.j2ee.business.entity.aspect`
    package, which we discuss later in this chapter. Note that since this is an AspectJ
    project, it contains `aspectj.jar` in its `CLASSPATH` and uses `ajc` for compiling.


    ## The Client Tier


    The application defines two distinct clients: a Java client that uses Swing and
    allows for bank administration and a web client that accesses the presentation
    tier through HTTP, programmed using the Servlets/JSP technologies.


    ### The Swing Client


    The Swing client is an administration application developed using Java Swing API.
    It allows for the creation, modification, and deletion of users and accounts.


    Figure 10-4 shows the Swing administration GUI, which consists of a simple two-part
    interface. The left side is used to print out messages, such as requested information
    or errors, and the right side is an input panel that allows for the creation or
    modification of user- and account-related information. The possible operations
    are accessible through the menu bar.


    The administration client’s implementation depends solely on the `Bank` business
    facade.


    **Figure 10-4.** *The Swing GUI for the bank administration*


    ![Image 10](index-230_1.png)


    ### The Web Client


    The web client is the interface that allows bank users to access and manage their
    accounts through a browser. Its logic is defined in the presentation tier, which
    is developed with the Servlets/JSP technologies. Figure 10-5 shows the web GUI.


    **Figure 10-5.** *The bank’s web GUI*


    ![Image 11](index-231_1.png)


