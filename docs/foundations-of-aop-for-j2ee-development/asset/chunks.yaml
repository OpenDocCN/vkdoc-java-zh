    数据传输对象


    在本章开头给出的客户端代码中，我们看到使用了名为 `getAccountDetails` 的服务，该服务返回一个 `AccountDetails` 类型的对象实例。此对象聚合了一个账户的属性值，并提供了一个与
    `Account` 相近的接口。该对象是 J2EE 设计模式中一个参与者的实例化：*数据传输对象*。


    数据传输对象可用于两种主要情况：


    *   当客户端计算单元需要访问业务层返回的多条数据时（多次下载）

    *   当客户端计算单元需要发送多条数据以完成处理时（多次上传）


    通过使用数据传输对象设计模式，可以减少远程调用的次数，如清单 12-4 所示。该模式建议使用一个传输对象，该对象旨在将一组数据从客户端传输到服务器，反之亦然。在这种情况下，我们使用了一个
