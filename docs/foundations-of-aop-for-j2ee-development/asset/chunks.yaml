    The client tier must use the remote resolving and communication APIs to access
    the services of the business tier. However, this can make the client-side code
    complicated. When this complication occurs, J2EE design pattern guidelines recommend
    the use of two design patterns: the service locator and business delegate. We
    describe these patterns in the sections that follow.


    **The Service Locator Pattern**


    The *service locator pattern* allows generic access to a service by hiding from
    the client the access mechanisms involved. Examples of this are the use of Home
    interfaces and using cache management to improve service resolution performance.


    The service locator is generally implemented in the form of a singleton with a
    resolve method that the client uses directly. Service resolution is not limited
    to the session facades; we can, for example, access data sources in the same way.


    The service locator pattern can also be used in the business layer when EJBs such
    as facades need to access services. Because different layers use the service locator,
    its code is contained within the application’s Commons project.


    Figure 10-7 shows the organization of the Commons project, which contains the
    classes and interfaces used by the client and business layers. As you would expect,
    it contains a package for managing exceptions (aop.j2ee.commons.exception), but
    also the transfer objects (aop.j2ee.commons.to) and the service locators (aop.j2ee.commons.util.locator)
    explained in this section.


    ![Image 12](index-235_1.png)


    **222**


    C H A P T E R 1 0 ■ P R E S E N T A T I O N O F T H E S A M P L E A P P L I C
    A T I O N


    **Figure 10-7.** *Organization of the Commons project* **The Business Delegate
    Pattern**


    The *business delegate pattern* creates a client-side object, allowing the client
    to access the facades of the business layer. In general, a delegate has the same
    interface as the facade to which it is delegating, but this is not a requirement.


    The main functions of the business delegate are as follows:


    • To make the client independent of the facades, guaranteeing better application
    structure and independence of the projects. For example, with an application programmed
    in this way, recompiling the business layer has no effect on the clients.


    • To simplify the client-side code by regrouping common or generic functions within
    the delegates. For example, a delegate can be used to group together replay policies
    or the processing of certain exceptions.


    • To make the client more independent of the way services are resolved. The business
    delegate usually uses the service locator.


    ![Image 13](index-236_1.png)


    C H A P T E R 1 0 ■ P R E S E N T A T I O N O F T H E S A M P L E A P P L I C
    A T I O N


    **223**


    In our application, the client-side administration application uses a delegate
    to access the Bank facade. For organizational reasons, delegates can be put in
    a separate project, as shown in Figure 10-8.


    **Figure 10-8.** *Organization of the BusinessDelegates project* J2EE Presentation
    Tier Design Patterns


    A number of design patterns are recommended for use when developing the business
    tier of an application:


    • The *front controller pattern* is used to centralize the management of requests.


    • The *application controller pattern* is used to transparently manage application-level
    requests.


    • The *context object pattern* is used to allow object encapsulation of the request
    parameters simplifying the code of the presentation layer.'
  trans: '

    传输对象实现了 `java.io.Serializable` 接口。传输对象的状态对应一组服务的参数和返回值。一个传输对象可以递归地嵌套在另一个传输对象内部；这被称为*复合传输对象*。


    传输对象由客户端层和业务层共享。它们必须对这两层都可访问，因此定义在应用程序的 Commons 项目中。


    J2EE 客户端层设计模式


    客户端层必须使用远程解析和通信 API 来访问业务层的服务。然而，这可能会使客户端代码变得复杂。当出现这种复杂情况时，J2EE 设计模式指南建议使用两种设计模式：服务定位器和业务委托。我们将在后续章节中描述这些模式。


    **服务定位器模式**


    *服务定位器模式*通过向客户端隐藏所涉及的访问机制，允许对服务进行通用访问。例如，使用 Home 接口以及利用缓存管理来提高服务解析性能。


    服务定位器通常以单例形式实现，并带有一个客户端直接使用的解析方法。服务解析并不局限于会话外观；例如，我们可以用同样的方式访问数据源。


    当外观等 EJB 需要访问服务时，服务定位器模式也可用于业务层。由于不同层都使用服务定位器，其代码包含在应用程序的 Commons 项目中。


    图 10-7 展示了 Commons 项目的组织结构，其中包含了客户端层和业务层使用的类和接口。正如你所料，它包含一个用于管理异常的包（`aop.j2ee.commons.exception`），以及本节中解释的传输对象（`aop.j2ee.commons.to`）和服务定位器（`aop.j2ee.commons.util.locator`）。


    ![图 12](img/index-235_1.png)


    **222**


    第 10 章 ■ 示例应用程序介绍


    **图 10-7.** *Commons 项目的组织结构* **业务委托模式**


    *业务委托模式*创建一个客户端对象，允许客户端访问业务层的外观。通常，委托具有与其所委托的外观相同的接口，但这并非必需条件。


    业务委托的主要功能如下：


    • 使客户端独立于外观，保证更好的应用程序结构和项目的独立性。例如，对于以这种方式编程的应用程序，重新编译业务层不会对客户端产生影响。


    • 通过将通用或公共函数归集到委托中，简化客户端代码。例如，委托可用于归集重放策略或某些异常的处理。


    • 使客户端更加独立于服务解析的方式。业务委托通常使用服务定位器。


    ![图 13](img/index-236_1.png)


    第 10 章 ■ 示例应用程序介绍


    **223**


    在我们的应用程序中，客户端管理应用程序使用一个委托来访问 Bank 外观。出于组织原因，委托可以放在一个单独的项目中，如图 10-8 所示。


    **图 10-8.** *BusinessDelegates 项目的组织结构* J2EE 表示层设计模式


    在开发应用程序的业务层时，推荐使用多种设计模式：


    • *前端控制器模式*用于集中管理请求。


    • *应用控制器模式*用于透明地管理应用程序级别的请求。


    • *上下文对象模式*用于允许对请求参数进行对象封装，从而简化表示层的代码。

