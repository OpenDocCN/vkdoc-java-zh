    **58**


    C H A P T E R 3 ■ A S P E C T J


    **Aspect Instantiation in AspectJ 5**


    AspectJ 5 supports the five aspect-instantiation modes—the default singleton mode,
    perthis, pertarget, percflow, and percflowbelow—that are available in the previous
    version. (See the


    “Aspect Instantiation” section earlier in this chapter for further details.) AspectJ
    5 introduces a sixth mode: PERTYPEWITHIN. With this mode, a new aspect instance
    is created for each new type that is designated in the pointcut expression associated
    with PERTYPEWITHIN.


    The following aspect illustrates the PERTYPEWITHIN mode:


    @Aspect(


    instantiationModel=AspectInstantiationModel.PERTYPEWITHIN, perClausePattern="aop.aspectj.*")


    public class FooBarAspect { ... }


    This aspect will be instantiated for each different class that is defined in the
    aop.aspectj package.


    **Other Java 5 Features**


    Autoboxing does not impose any changes on the AspectJ language. The fact that
    primitive types (int, float, double, and so on) are equivalent to their class-based
    ones (Integer, Float, Double, and so on) simply means that when the AspectJ compiler
    computes the joinpoints that match a given pointcut, the compiler does not distinguish
    between a primitive type and its class-based counterpart.


    Variable-length argument lists can be used when you write a pointcut descriptor.
    For instance, the following pointcut descriptor


    call( * *.*( double, Object... ) )


    designates all the calls to all the methods that take at least a double argument
    and a variable-length list of Object arguments as parameters.


    **Summary**


    This chapter presented the syntax of the AspectJ language. AspectJ extends the
    Java language with keywords for writing aspects, pointcuts, advice code, and intertype
    declarations. An aspect-oriented application in AspectJ contains Java classes
    that implement the core logic of the application and AspectJ aspects that implement
    the crosscutting functionalities.


    The classes and the aspects are woven together to produce the final application.
    Most of the time, the weaving occurs at compile time. AspectJ provides a compiler
    (named ajc) for that.


    With newer versions of AspectJ, the weaving can also be done at load time—when
    the application is loaded into the Java virtual machine.


    The pointcut language provided by AspectJ allows you to define where an aspect
    applies in an application. A pointcut descriptor denotes a set of joinpoints.
    Several types of joinpoints are supported by AspectJ. The two that are most frequently
    used are the call and execution joinpoints. These are the points in the execution
    flow of a program where a method is called or executed, respectively. Several
    other types of joinpoints exist in AspectJ: get and set for read and write operations,
    handler for exceptions, initialization and preinitialization for


    C H A P T E R 3 ■ A S P E C T J


    **59**


    constructors, staticinitialization for static code blocks, and adviceexecution
    for executions of advice code.


    Advice code defines the modifications that are brought to an application by an
    aspect.


    Each advice code block is associated with a pointcut that defines where these
    modifications apply. Three main types of advice code are provided by AspectJ:
    “before,” “after,” and


    “around.” Advice code applies either before the executions of its associated joinpoints,
    after the executions, or both. In the latter case, the advice code is called “around”
    advice code. Two other types of advice code are provided by AspectJ: “after returning,”
    and “after throwing.” The former applies for to that return normally, whereas
    the latter applies to joinpoints that end their executions by raising an exception.
    The behavior of an aspect is provided by the advice code blocks that are attached
    to the aspect. Any Java instructions are valid in those blocks.


    AspectJ provides two additional instructions: thisJoinPoint and proceed. The former
    provides information (method name, class name, parameters, and so on) about the
    current joinpoint.


    The latter, which can be used exclusively with “around” advice code, allows you
    to execute the joinpoint.


    The mechanism known by the term *intertype declaration* provides a way for AspectJ
    to extend an application with additional features, such as fields, methods, constructors,
    interfaces, and superclasses.


    Finally, AspectJ 5 takes advantage of the many new features of the Java 5 language,
    and it introduces a whole new development style that is based on annotations.
    Instead of using keywords such as aspect and pointcut, you can write aspects as
    annotated Java classes.


    C H A P T E R 4


    ■ ■ ■


    Java Aspect Components


    **C**hapter 3 presented the syntax and usage of one AOP environment: the AspectJ
    language.


    This chapter presents a second AOP environment: Java Aspect Components (JAC).


    Like AspectJ, JAC allows you to develop aspect-oriented programs. However, these
    environments differ in two significant ways. First, AspectJ is a language that
    defines new keywords, whereas JAC is a framework and, as such, is a regular Java
    program. JAC provides an API that allows you to define aspects, pointcuts, and
    pieces of advice code.


    Second, the two environments differ in their aspect-weaving mechanisms. AspectJ
    weaves aspects at compile time or at load time. JAC weaves aspects at run time,
    which leads to more adaptable programs because aspects can be dynamically added
    and removed.


    A research team led by Renaud Pawlak, with Laurent Martelli and Lionel Seinturier,
    designed JAC in 1999\. The first versions were released in 2000, but the ideas
    behind JAC were rooted in research that began in 1998 by the aforementioned team
    and several computer-science research laboratories: the CEDRIC laboratory at CNAM
    (Conservatoire National des Arts et Métiers), Paris; the LIP6 laboratory at University
    Paris 6; and the LIFL laboratory at the University of Lille, France. Other contributors
    included Laurence Duchien and Gérard Florin.


    JAC is open-source software that is freely released under the terms of the GNU
    Lesser General Public License (LGPL). This license allows JAC to be incorporated
    into business products. In 2003, JAC joined the ObjectWeb community for open-source
    middleware. For up-to-date information about JAC, see http://jac.objectweb.org.
    For general information about the ObjectWeb community, see http://www.objectweb.org.


    **Creating a First JAC Application**


    This section presents a simple example of an aspect-oriented application that
    uses JAC. The example introduces the syntax for aspects, pointcuts, and advice
    code.


    The example reuses the order-management application, which manages client orders,
    that Chapter 3 presented. However, the code in this chapter uses JAC to implement
    the same trace aspect as the one that was programmed in Chapter 3\. This aspect
    traces the execution of the application, thus determining the methods that are
    called and the order that they are called in.


    **Creating a First Aspect**


    The first JAC aspect monitors each ordered item by displaying a message before
    and after the addItem method, which the Order class defines.


    **61**


    **62**


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    This aspect is defined by two classes: TraceAspect and TraceWrapper. The TraceAspect
    class defines the pointcut. The TraceWrapper class defines the advice code, which
    JAC calls a *wrapper*. Listing 4-1 presents the TraceAspect code, and Listing
    4-2 (later in this chapter) presents the TraceWrapper code.


    **Listing 4-1.** *A Trace Aspect Component*


    1 package aop.jac;


    3 import org.objectweb.jac.core.AspectComponent;


    5 public class TraceAspect extends AspectComponent {


    7 public TraceAspect() {


    8 pointcut(


    9 ".*",


    10 "aop.jac.Order",


    11 "addItem(java.lang.String,int):void", 12 "aop.jac.TraceWrapper",


    13 null, false );


    14 }


    15 }


    Notice that the TraceAspect class defines an aspect by extending the AspectComponent
    class, which is defined by the JAC API as the root class of all aspects. Consequently,
    JAC aspects are often called *aspect components*.


    Creating a First Pointcut


    As you can see in Listing 4-1, the call to the pointcut method, which is inherited
    from AspectComponent, declares a pointcut in the TraceAspect class. The method
    takes six parameters. The first three designate the joinpoints that match the
    pointcut. The fourth, which is shown on line 12, defines the wrapper that is associated
    with the pointcut. The last two parameters define an exception handler and the
    way that the aspect is instantiated. (See the


    “Introducing Exception Handlers” and “Aspect Instantiation” sections later in
    this chapter.) The methods that match a pointcut are defined by three parameters:
    the method names (on line 11), the class names (on line 10), and the object names
    (on line 9). As you will see in the


    “Pointcuts” section later in this chapter, these parameters are strings that can
    contain wildcards.


    The pointcut that TraceAspect defines includes the addItem method, which takes
    a String and an int as parameters for all the objects that are instances of the
    aop.jac.Order class.


    JAC allows you to include only selected instances of a class in a pointcut. This
    feature can be useful when programming distributed applications, for example.
    In such a case, some server objects that are instances of the same class commonly
    need to be aspectized differently.


    Object names in pointcut definitions allow this, as you will see in the “Object
    Naming” section later in this chapter.


