    • The web tier uses Java and the Servlet model to handle the requests, as well
    as screen linking. It is a low-level, interaction-based implementation, and there
    is no explicit or stable business model where the aspects can be applied in a
    systematic way. It is also interesting to note that, for the controller design
    pattern aspect-oriented implementation, business specificities are implemented
    within the aspects.


    • The presentation tier already uses non-Java technologies for separating concerns.
    For instance, the layout is defined in HTML within JSP pages. Except for the view
    helpers, presentation cannot be improved by Java-based AOP technologies. Other
    technologies, such as eXtensible Stylesheet Language Transformations (XSLT), should
    be preferred or combined for maximum efficiency.


    ## Summary


    In this chapter, we studied the use of AOP in the client and presentation tiers.
    When possible, we used the sample application in our examples. We showed that
    AOP offers many improvements for modularizing remote communication–related issues.
    The three main J2EE design patterns for distribution present many drawbacks that
    can be avoided through the use of AOP.


    **310**


    C H A P T E R 1 2 ■ U S I N G A O P I N T H E S A M P L E A P P L I C A T I O
    N ’ S P R E S E N T A T I O N A N D C L I E N T T I E R S


    For the presentation tier, AOP is useful for modularizing typical concerns, such
    as internationalization and pre- and postcondition checks. Existing presentation
    frameworks such as Struts and Swing already provide abstraction for and deal with
    presentation-related concerns.


    In these contexts, AOP is less efficient; however, the study of the J2EE design
    patterns for the presentation tier shows that AOP can be used efficiently to build
    or enhance such frameworks.


