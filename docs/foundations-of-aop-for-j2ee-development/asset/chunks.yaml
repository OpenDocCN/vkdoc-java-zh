    示例应用程序介绍


    **本**章讨论一个示例应用程序的架构和设计细节，我们将把它作为案例研究，以展示 AOP 在 J2EE 环境中的优势。这个众所周知的简单示例应用程序有助于以易于理解的方式呈现材料。该示例基于
    Sun ONE J2EE 应用服务器的 Duke''s Bank 应用程序开发。此应用程序并不特定依赖于 Sun ONE，通过调整部署脚本，它可以在任何 J2EE
    应用服务器上高效使用。


    由于本书侧重于 AOP，本章不会深入探讨 J2EE 编程的细节，而是提供关于 AOP 及其适用场景的充分信息。不过，本章的一部分内容会回顾示例应用程序所使用的
    J2EE 设计模式。请注意，这些模式与第 8 章中介绍的 GOF 模式不同。此外，我们在此不会展示应用程序的完整代码；而只是描述其设计。


    如果您想了解有关该应用程序的更详细信息，请访问 Apress 网站（http://www.apress.com）的下载区域，获取案例研究代码。如果您不熟悉
    J2EE，我们强烈建议您在详细研究代码之前，先阅读一些关于该主题的进一步资料。


    **示例应用程序架构**


    Duke''s Bank 是一个经典的 J2EE 应用程序，由开发企业应用程序时常见的多个层组成。它的打包方式使得对应于每一层的模块都清晰分离。


    为了简化代码，我们对 Duke''s Bank 应用程序进行了轻微修改，特别是其打包方式。为了便于比较，请参考 Sun Microsystems 网站上提供的原始应用程序。


    **应用程序概览**


    在详细介绍各层之前，我们将在以下小节中提供整个应用程序及其组织的概述。


    参与的层


    正如 J2EE 所建议的，该应用程序由多个层组成，如图 10-1 所示。


    **205**


    **206**


    第 10 章 ■ 示例应用程序介绍


    **图 10-1.** *Duke''s Bank 应用程序的架构* 各层及其角色如下：


    *   **数据层**：允许存储持久化数据，并在 PointBase 关系数据库中实现。

    *   **业务层**：包含实现应用程序逻辑的 EJB。这些 EJB 包括会话 EJB（提供客户端对应用程序业务逻辑的视图）和实体 EJB（表示应用程序操作的持久化对象）。业务层直接访问数据层，特别是通过实体
    EJB。

    *   **表示层**：允许通过浏览器访问应用程序。它包含一个 Web Servlet/JSP 容器，并访问业务层。相对于业务层，表示层可以被视为一个特定的
    Java 客户端层。'
- fmt: '•  The *client tier* can be either a web (thin client) or a Java application.
    In this case, it is a web application, as it accesses the presentation tier through
    `HTTP`; in the case of Java, it directly accesses the business tier for locating
    the EJBs and goes through `RMI` for remote communication. In the latter case,
    the Java client self-manages its presentation on the client site (thick client).


    ## Organizing and Packaging the Code


    Although you can use any IDE, we recommend using the Eclipse open source IDE (we
    used Eclipse to develop the application presented in this chapter). Eclipse can
    be downloaded from `http://www.eclipse.org`. You can import the Eclipse project
    from the file system. The AJDT plug-in for AspectJ is required to compile it,
    and the installation of this plug-in is depicted in the appendixes.


    In contrast with the original application, we structured this application by separating
    the code into several independent projects. This structure allows developers to
    work more efficiently, especially in the case of a large project, where different
    teams could more easily be assigned to the development of a given tier.


    The Eclipse projects are as follows:


    -   The `Commons` project contains all the classes common to several tiers. For
    example, it contains the transfer objects and the service locators, described
    later in more detail, which are used by the client, business, and presentation
    tiers.

    -   The `BusinessUtils` project contains all the classes used by the business
    tier.

    -   The `BusinessComponents` project contains all the business Plain Old Java
    Objects (POJOs).

    -   The `EJBComponents` project contains all the business EJBs.

    -   The `ClientUtils` project contains all the classes used by the client tier.

    -   The `BusinessDelegates` project contains all the delegates, described later
    in further detail, that allow the clients to access the business objects transparently
    with regard to the communication layer.

    -   The `ApplicationClient` project contains the client application and its logic.


