    ## 书籍路线图


    前两章介绍 AOP 并阐述该范式的主要新概念。定义了 AOP 的三大核心概念——切面、切入点与连接点。建议对 AOP 毫无了解的读者阅读这两章。


    第 3 章至第 7 章介绍了 AOP 的主要现有产品。本部分的每一章都专注于一个特定产品：AspectJ（该领域的主流语言）、JAC、JBoss AOP 和
    Spring AOP。这些章节可以独立阅读。每章仅假设读者熟悉第一部分中介绍的概念。第 7 章对这四个产品的特性进行了比较。


    第 8 章和第 9 章介绍了 AOP 在编程设计模式、提升软件质量以及监督和管理应用程序方面的用途。这些章节相互独立，可以分开阅读。AspectJ 是用于说明这些章节所介绍概念的语言。提前阅读第
    3 章关于 AspectJ 的内容可能有助于理解文中示例。


    第 10 章至第 12 章介绍了一个面向切面的 J2EE 应用程序案例研究。


    第 10 章是对该应用程序的总体介绍，与实现方案（无论是否采用 AOP）无关。接下来的两章展示了 AOP 如何改进应用程序业务层和表示层的实现。第 11 章和第
    12 章是独立的，可以分开阅读。


    ■引言


    **xxiii**


    **关于代码示例**


    本书提供的代码示例假定读者具备 Java 编程语言的基本知识。第 10 章至第 12 章中的案例研究假定读者了解使用 J2EE 进行应用程序编程的原则。


    本书中的所有代码示例均可从 Apress 网站（http://www.apress.com）的源代码区域下载。在某些情况下（尤其是 J2EE 案例研究），文中呈现的程序已被截断，仅选取了相关的部分摘录。本书的可下载源代码包含所有程序的完整版本。


    **常见问题解答**


    以下系列问答将帮助您初步了解 AOP，并理解其对其他编程范式的影响及其在企业应用程序开发中的作用。


    **什么是 AOP？**


    开发应用程序时需要处理多种关注点。这些关注点可分为两类：功能关注点，涉及应用程序的业务逻辑；技术关注点，与执行环境（操作系统、网络等）相关。


    被称为*关注点分离*的原则旨在尽可能解耦并分离每个关注点，以促进模块化。面向对象编程（OOP）为分离许多业务关注点提供了良好的解决方案，因此应用程序更具可重用性，因为分离的关注点可以轻松地在多个不同的应用程序中重用。然而，那些被称为横切关注点的技术或功能关注点，使用
    OOP 则不易处理。


    AOP 是一种用于分离关注点并将横切关注点模块化到称为*切面*的明确软件实体中的范式。


    **AOP 会取代 OOP 吗？**


    AOP 不会取代 OOP。AOP 通过模块化横切关注点来补充 OOP。


    因此，编写 AOP 应用程序仍然需要编写带有字段和方法的类。AOP 增加了一个新的模块化维度，即这些类通过切面进行补充，这些切面实现了无法通过类有效模块化的关注点。


    **AOP 用于企业应用程序吗？**


    AOP 是一种相对较新的技术，出现于 20 世纪 90 年代中期。据我们所知，目前还没有大型软件厂商销售使用 AOP 开发的应用程序。然而，许多供应商，例如
    IBM，正在研究使用 AOP 来提高 J2SE 和 J2EE 应用程序的开发效率。


    **xxiv**

