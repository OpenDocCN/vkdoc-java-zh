    **Pointcut Descriptors**


    In the previous section, we introduced the basic elements of the AspectJ syntax.
    We showed how to write, compile, and run a first aspect-oriented application.


    Although it is simplistic, the order-management application illustrates a major
    AOP characteristic: the separation of business from technical code. The Customer,
    Order, and Catalog classes play the role of the business code, whereas the TraceAspect
    aspect implements the technical part of the application. This separation is made
    possible by the use of pointcuts.


    Pointcuts allow you to describe where the aspects must be applied in the code.
    Therefore, pointcuts give you a way of “talking about” the application by designating
    some of the strategic locations of that application.


    In the following sections, we present the syntax of the AspectJ language. We begin
    with the syntax of pointcuts and follow with the syntax of advice code. You will
    see how more-generic aspects can be written, how different types of joinpoints
    can be included, and how more-complex pointcuts can be defined.


    **Wildcards**


    The toBeTraced pointcut, which was defined in the TraceAspect aspect in Listing
    3-5, is not generic. It captures calls exclusively to the addItem method. In more
    complex cases, it is important for you to accurately define pointcuts that contain
    calls to several methods.


    C H A P T E R 3 ■ A S P E C T J


    **31**


    AspectJ provides a pattern language, which allows the definition of expressions
    that implicitly denote several methods or classes. These symbols (*, .., and +)
    are called wildcards.


    In the following sections, we explain the principle and definition of these wildcards
    and give usage examples of them.


    Principle


    When wildcards are used jointly with the different types of joinpoints that we
    describe later in this chapter (in the “Joinpoint Types” section), the wildcards
    act as a powerful syntax capable of describing many pointcuts. In return, this
    flexibility can lead to pointcut descriptors that are complex and subtle.


    Other AOP environments, such as JAC and JBoss AOP (see Chapters 4 and 5), have
    made different choices. Their pointcut languages define fewer operators and, as
    a consequence, their expression powers are not as flexible as that of AspectJ.
    On the other hand, their pointcut descriptors are simpler to write, understand,
    and debug.


    The discussion about the trade-offs between power and simplicity remains open.
    Yet, in computer science and other domains, the simple solutions are often the
    most widely used.


    Similarly, the simplest pointcuts are the ones more frequently reused. Therefore,
    we use the simple pointcuts to illustrate and promote AOP.


    The following sections define the *, .., and + wildcards. They are presented according
    to the element types (method, class, signature, package, and subtype) that they
    denote.


    Method and Class Names


    The asterisk (*) can be used to denote method and class names. You will see in
    the “Method Signatures” and “Package Names” sections, later in this chapter, that
    the asterisk can also be used for signatures and package names.


    For methods, the asterisk designates “some or all of the methods defined in a
    class.”


    The following expression designates all the public methods in the Order class
    that have two parameters of type String and int and that return void: public void
    aop.aspectj.Order.*(String,int)


    The asterisk can be used in combination with letters to designate all the method
    names that contain the substring “Item”, for instance. In such a case, the expression
    is *Item*.


    As stated, the asterisk can also be used for class names. The following expression
    designates all the public methods of all the classes in the aop.aspectj package
    that have two parameters of type String and int and that return void:


    public void aop.aspectj.*.*(String,int)


    Method Signatures


    Names, parameters, return types, and access modifiers (public, protected, and
    private), can be used in AspectJ pointcut descriptors.


    Method parameters can be omitted and replaced by two dots (..) to indicate “any
    parameter.” The following expression illustrates the public methods in the Order
    class that have any parameters and that return void:


    public void aop.aspectj.Order.*(..)


    **32**


    C H A P T E R 3 ■ A S P E C T J


    Hence, the symbol of two dots handles the polymorphism of Java methods.


    The return type and the access modifier can be omitted and replaced by the asterisk
    (*).


    The following expression denotes all the methods defined in the Order class, regardless
    of their parameters, return types, and access modifiers:


    * * aop.aspectj.Order.*(..)


    In addition, the asterisk that is used to replace the access modifier can be omitted
    without changing the meaning of the pointcut. Therefore, the following expression
    is equivalent to the one just presented:


    * aop.aspectj.Order.*(..)


    Package Names


    The two-dots symbol can also be used with package names. For example, the following
    expression designates all the methods of any class named Order that is in any
    package of the aop hierarchy, regardless of the subpackage level:


    * aop..Order.*(..)


    The use of the two-dots symbol between aop and Order is of great importance. Expressions
    such as aop.Order.*(..) and aop.*.Order.*(..) look similar but lead to completely
    different results. Although both expressions involve the methods defined in an
    Order class, they differ in the following ways:


    • The aop..Order.*(..) expression denotes the entire hierarchy that starts with
    the aop package.


    • The aop.Order.*(..) expression denotes only the class that is defined in the
    aop package.


    • The aop.*.Order.*(..) expression denotes only the classes that are defined in
    the direct subpackages of the aop package.


    Subtypes


    The last wildcard, the plus sign (+), deals with type hierarchies and designates
    all the subclasses of a given class. The following expression denotes all the
    methods of the Order class and its subclasses:


    * aop.Order+.*(..)


    The plus sign can also be used after an interface name. In such a case, the pointcut
    designates all the methods of all the classes that implement the interface.


    Because the plus sign can be used with either a class or an interface, it is referred
    to as a *subtyping operator*.


    Wildcard-Usage Example


    We will illustrate the usage of wildcards by showing a second version of the trace
    aspect, which is named TraceAspect2\. The previous version, TraceAspect, intercepted
    only the calls to the


    C H A P T E R 3 ■ A S P E C T J


    **33**


    addItem method. The new version is more generic and intercepts the calls to all
    the methods defined in the Order class.


    The code of the TraceAspect2 aspect is shown in Listing 3-7.


    **Listing 3-7.** *Using Wildcards in Pointcut Descriptors* 1 package aop.aspectj;


    3 public aspect TraceAspect2 {


    5 pointcut toBeTraced(): call(* aop.aspectj.Order.*(..)); 6


    7 Object around(): toBeTraced() {


    8 System.out.println("-> Before the call"); 9 Object ret = proceed();


    10 System.out.println("<- After the call"); 11 return ret;


    12 }


    13 }


    The first difference between the TraceAspect and TraceAspect2 aspects is in the
    definition of the pointcut. (See line 5 in Listing 3-7). The pointcut descriptor
    is now call(* aop.aspectj.


    Order.*(..)). All the calls to the methods defined in the Order class are intercepted
    by the pointcut—whatever the methods’ parameters and return types are.


    A second difference can be found in the return type of the advice code block.
    Previously, the type was void. Now, the pointcut intercepts either a method that
    returns void (for example, addItem) or a method that returns double (for example,
    computeAmount). Strictly speaking, no common supertype exists for both void and
    double. As a convention, AspectJ considers that Object (see line 7 in Listing
    3-7) is the common supertype for all Java primitive and object types. The result
    of proceed is stored in the ret variable (see line 9), which is returned at the
    end of the advice code block (see line 11).


    **Joinpoint Introspection**


    In the previous section, you learned that wildcards can be used to write generic
    pointcut descriptors. With wildcards, a pointcut can be associated with several
    methods. You will see in this section how to obtain some information about a joinpoint
    at run time. This is known as the *joinpoint-introspection mechanism*.


    The term *introspection* refers to examining the inner cause of a given phenomenon
    and gaining information about it. In the context of AOP, the phenomenon is the
    joinpoint, and you want to retrieve information about the part of the actual program
    that allows the joinpoint to occur. A comparison can be made with the Java java.lang.reflect
    API that provides, for any given Java program, a description of the program’s
    classes, fields, and methods. The program is then said to have *introspected*
    to obtain information about itself.


    In the context of AOP, the same principle applies. The joinpoint examines itself
    to gain information about itself. This mechanism is useful for determining, for
    instance, the method call that caused the joinpoint to occur.


    **34**


    C H A P T E R 3 ■ A S P E C T J


