- fmt: '# The Main Problem of Data Transfer Objects


    The main problem of the data transfer object pattern comes from the introduction
    of new server-side services. These services target the remote data exchange’s
    optimization and depend greatly on how the clients use the servers. They pollute
    the business interfaces and make the global application less maintainable. For
    instance, when the business’s needs evolve, important changes may have to be made
    to these patterns.


    In conclusion, even though transfer objects can be employed in some cases (for
    instance, to aggregate the state of a given object), they are more difficult (and
    dangerous) to use in general (for example, when trying to optimize communication
    costs like `CustomerAndAccountInfos`). These objects are difficult to anticipate
    and can change depending on the application’s architecture. Thus, a better modularization
    of this concern’s implementation would be a great help for maintainability reasons.
    In the following section, we explain how AOP implements this separation.


    ## Aspect-oriented Implementation of the Access Design Patterns


    In the previous sections, we presented the three main design patterns for the
    business layer access: the business delegate, the service locator, and the data
    transfer object. These patterns work together to manage the business layer access
    within a distributed J2EE environment. We have discussed their limits and defects.


    In this section, we propose an aspect-oriented implementation of these design
    patterns, which can be used as an alternative, elegant solution.


    ### Eliminating Business Delegates


    With an aspect-oriented design, the business delegate design pattern is not frequently
    needed. Indeed, the purpose of this pattern is to encapsulate the communication
    with the business facade (resolution, error handling, retry, and timeout). However,
    all this can be easily encapsulated within an “around” advice code.


    This advice is to be applied to the direct invocations of a facade, which is called
    by a remote client through its `Remote` interface. The resolution of this interface
    can be done similarly to the business tier, by using the implicit protocol technique.


    A first aspect of J2EE service locator can be implemented as shown in Listing
    12-5.


