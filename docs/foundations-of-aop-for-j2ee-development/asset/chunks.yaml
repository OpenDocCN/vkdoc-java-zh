- fmt: '■ **Definition Postcondition**—An assertion that must be verified at the end
    of a method execution. The postcondition allows you to verify that the method
    has been correctly executed. (From the user’s perspective, the postcondition allows
    some assumptions about the values of that user’s variables, so redundant tests
    can be avoided.) For instance, a square-root method (`sqrt`) would have the postcondition
    `result>=0`.


    ■ **Definition Class invariant**—An assertion that must be verified by the state
    of the class (in other words, by all the states of all the class instances). The
    class invariant guarantees that the objects remain in consistent states. For instance,
    a `Triangle` class would have the class invariant `vertexes=3`, where `vertexes`
    is either an attribute of the class or the result of a calculation on several
    attributes of the class.


    ■ **Definition Internal invariant**—An assertion that must be verified within
    the body of a method. The internal invariant helps to guarantee that the method
    is correctly implemented. For instance, in a method that simulates a loan calculation
    would have the internal invariant `total interest ratio >=0`.


    ## Conflict Handling


    A contract conflict occurs when one or several assertions are not verified. This
    conflict can arise for any reason, such as a hardware failure, the failure of
    a called routine, or a software bug that makes it impossible to satisfy the contract.


    In such cases, three strategies can be applied:


    - **Retrying**: An alternative strategy is available. The contractors should restore
    the invariants and make another attempt using a different strategy.

    - **Organized panic**: No alternative is available. The contractors must restore
    the invariants, terminate, and report failure to the user by triggering an exception.

    - **False alarm**: It is possible to continue, maybe after some corrective measures
    are taken.


    ## Contract Inheritance


    One of the key mechanisms of OOP is inheritance. When inheritance is used, obligations
    are also inherited, and the subclasses can modify the inherited contracts. To
    ensure that the subclasses offer at least the same level of service as the superclasses,
    these modifications must follow certain rules:


    - For preconditions, subclasses keep the same conditions or make them less restrictive.

    - For postconditions, subclasses keep the same conditions or make them more restrictive.

    - For class invariants, the invariants of a superclass are automatically part
    of the invariants of the subclasses.

    - For internal invariants, the invariants of a superclass are kept identical only
    if the subclass does not redefine the method that the invariant is defined about.


    ## Contracts in Java


    As requested by *Java Specification Request (JSR) 41: A Simple Assertion Facility*,
    Java 1.4 introduced some limited contract support, which is similar to that offered
    by the C language through the `assert` macro. The `assert` keyword that was added
    to Java can be in two forms:


    - `assert <condition>`

    - `assert <condition> : <value>`


    In the first form, `assert` behaves as follows:


    - If the Boolean condition returns `true`, the program execution continues.

    - If the Boolean condition returns `false`, a `java.lang.AssertionError` is thrown.


    In the second form, `assert` behaves as follows:


    - If the Boolean condition returns `true`, the program execution continues.

    - If the Boolean condition returns `false`, a `java.lang.AssertionError` is built
    by passing `value` to the error’s constructor. The passed value must be either
    a constant string or a function returning an object (which is then converted into
    a string by the `toString` method).


    ## Implementing Contracts with AOP


    As shown in the previous section, Java provides very limited support for Design
    by Contract. In particular, Java 1.4 does not implement any of the notions of
    preconditions, postconditions, or class invariants. As we will show here, AOP
    provides useful techniques for implementing these notions in Java.'
