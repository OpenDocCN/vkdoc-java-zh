- fmt: '# Aspect Instantiation Policies


    With `AspectJ`, the default policy is to create only one instance of each existing
    aspect, such as aspects for singletons. As a consequence, the data defined in
    an aspect are shared by all the joinpoints where the aspect applies. Programmers
    can redefine this default policy by specifying that one instance of the aspect
    must be created for every object that is the executing object of a pointcut (clause
    `perthis`) or for every object that is the target object of a pointcut (clause
    `pertarget`). Similarly, an aspect instance can be created each time the program
    enters a control flow (clauses `percflow` and `percflowbelow`). `AspectJ 5` provides
    a new instantiation policy (clause `pertypewithin`).


    With `JAC`, the instantiation policy deals with aspects and wrappers, both of
    which are by default singletons. A distinct instantiation policy can be chosen
    for wrappers by specifying that an instance of a wrapper must be created for every
    joinpoint included in a pointcut. When programming distributed applications with
    `JAC`, aspect and wrapper instances are replicated on each host.


    The default policy implemented by `JBoss AOP` is to associate one instance of
    a wrapper class per aspectized application class—in other words, one instance
    per class where one of the pointcuts defined in the aspect matches. This default
    policy can be redefined by specifying a factory that will be responsible for creating
    aspect instances according to the programmers’ needs.


    Finally, `Spring AOP` default policy is also to instantiate aspects as singleton.


    Although the framework approach provides default policies, it is always possible
    to instantiate an aspect dynamically by using a lower-level Java API. In each
    framework (`JAC`, `JBoss`, and `Spring`), it is thus possible to dynamically add
    new pieces of advice and introductions to a target object. These features make
    the framework approach much more flexible than the language approach.


    ## Aspect Ordering


    When several aspects apply around the same joinpoint, the execution order of these
    aspects must be specified. Most of the time, this ordering depends on the semantics
    of aspects, and no automatic rules can be defined. When considering a trace and
    a security aspect, for example, the trace may be executed before the security
    if programmers want to trace every request. Alternatively, the security may be
    executed first if programmers need only tracing requests from unauthorized users.
    In such a case, the programmers must explicitly specify the ordering.


    With `AspectJ`, aspect ordering is defined with the instruction `declare precedence`.
    The order is global and applies to the whole application. Some ordering may be
    left unspecified, and in this case, there is no guarantee of the execution order.


    With `JAC`, aspect ordering is defined with the system property `jac.comp.wrappingOrder`.


    `JBoss AOP` uses the tag `<precedence>` in the XML file `jboss-aop.xml`. `Spring
    AOP` provides an interface (`org.springframework.core.Ordered`) that must be implemented
    to specify the order.


    In all cases, the order is global, and there is no guarantee that some orderings
    will not be left unspecified.


    At first glance, it may appear that the precedence feature adopted by `AspectJ`
    and `JBoss` is the most powerful, since it allows the ordering of aspects declaration.
    The precedence relationship is transitive, and the aspect system will determine
    the final order by looking at all the declared orders of all the aspects. However,
    we think that the precedence construct can lead to maintainability issues when
    refactoring the program (i.e., when adding, removing, renaming, or changing aspects).
    It indeed may happen that all the precedence declarations would need to be changed
    across the program. Consequently, a centralized ordering declaration like `JAC`’s
    seems to be reasonable for more complex programs. Hence, we advise programmers
    to use the precedence feature of `AspectJ` and `JBoss` in a centralized way by
    creating a specific aspect for managing all other aspect ordering. Unfortunately,
    the `Spring` ordering feature would not allow any centralized ordering declaration.


    ## Aspect Reuse


    Just as programmers can reuse a library of classes with different applications,
    they can also write libraries of aspects. Remember that, when writing an aspect,
    advice code defines the behavior of the aspect, whereas pointcuts define where
    the aspect must be integrated in the application. Pointcuts are therefore highly
    application-dependant and can seldom be reused, so the issue of reusing aspects
    is essentially a matter of reusing aspect codes.


    With `AspectJ`, inheritance and abstract pointcuts allow for the reuse of aspects.
    As with abstract methods, an abstract pointcut is a pointcut declared with a name
    and a signature, but without an expression. Abstract pointcuts can be used like
    any other pointcut to define advice code. As with classes, the inheritance mechanism
    allows for extending an aspect, reusing the existing definitions of the superaspect,
    defining new advice code in the subaspects, and making abstract pointcuts concrete.
    With `AspectJ`, an aspect can extend an abstract aspect, but not a concrete aspect.
    Reusing aspects is then a matter of writing abstract aspects with advice code
    and abstract pointcuts and extending them to adapt the aspects to a given application
    by making the pointcuts concrete.


    With `JAC`, the writing of aspects is separated in two regular Java classes: one
    for the wrapper and one for the aspect component. In addition, a configuration
    mechanism allows for the definition of application-dependant parameters such as
    pointcut expressions and system properties in so-called configuration files. Most
    of the time, reusing aspects with `JAC` is simply a matter of writing a new configuration
    file for adapting the aspect component and the wrapper classes to the new application.


    `JBoss AOP` separates the writing of interceptors and of pointcuts. The former
    are regular Java classes, whereas the latter are XML files. Interceptors are then
    easily reused, whereas pointcuts must be adapted to each new application.


    Finally, `Spring AOP` relies on its bean configuration mechanism to configure
    the aspects for different contexts.


    When we look at aspect reuse for these tools, we can see that the language approach
    uses a language-level concept such as inheritance, while the framework approach
    uses configuration. Both have their advantages and disadvantages. For instance,
    the inheritance approach is less flexible than configuration, but it ensures better
    compatibility between the aspects and the inherited aspects. In our opinion, a
    combination of the two approaches represents a complete solution for aspect reuse.


    ## Summary


    In this chapter, we compared the four AOP tools presented in this book: `AspectJ`,
    `JAC`, `JBoss AOP`, and `Spring AOP`. We outlined some of the minor differences
    among the tools, and we explained that the major differences are the result of
    implementation dissimilarities between the language approach (`AspectJ`) and the
    framework approach (`JAC`, `JBoss AOP`, and `Spring AOP`).'
