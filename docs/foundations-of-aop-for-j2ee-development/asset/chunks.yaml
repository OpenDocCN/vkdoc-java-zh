    **业务层切面总结**


    业务层的面向切面版本包含三个通用切面：


    • aop.ejb.business.aspect.EJBResolver（抽象类），用于引用解析和 EJB 创建


    • aop.ejb.business.aspect.POJOSession（继承 EJBResolver），用于将实现 aop.ejb.business.aspect.maker.SessionBeanProtocol
    的 POJO 转换为会话 EJB


