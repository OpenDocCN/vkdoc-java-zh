    **Creating Pointcuts**


    The previous section introduced the basic elements of JAC. We showed how to write,
    compile, and run a first aspect-oriented application. This section studies the
    definition of a pointcut.


    The pointcut method, which is defined in the AspectComponent class, allows you
    to define pointcuts. Three categories of parameters can be passed when you define
    a pointcut:


    • *Pointcut expression*: This expression defines the joinpoints that are included
    in the pointcut.


    • *Wrapper class*: This class defines the code that will be executed before and
    after the joinpoints.


    • *Exception handler*: The exception handler that is associated with the pointcut
    provides a method to catch and treat the exceptions that the joinpoints and the
    wrapper can throw.


    The exception handler is a method with a given signature that is implemented in
    the wrapper class. Exception handlers are optional.


    The following sections explain these three categories in detail.


    **Pointcut Expressions**


    Pointcut expressions in JAC are composed of three subexpressions. A fourth is
    added when programming distributed applications.


    The joinpoints that are included in a pointcut are either method executions or
    constructor executions. JAC also performs an automatic bytecode analysis to classify
    the methods that are defined in an application. The purpose of this analysis is
    to detect whether the methods access or modify the object state. This information
    is made available in the pointcut definition language, and you can define pointcuts
    that include all the methods that perform read or write operations on designated
    fields, for example.


    The three subexpressions that are contained in a pointcut definition deal with
    the names of classes, objects, and methods, respectively. The subexpressions are
    referred to as class expressions, object expressions, and method expressions.
    These expressions can be thought of as filters. Their purpose is to filter a set
    of classes, objects, or methods and retain only those that match the expressions.


    The roles of the three expressions can be defined as follows: *Class expression*:
    A class expression defines a filter for class names. The filtering is performed
    on fully qualified class names—for example, names that include the package and
    class identifiers.


    *Object expression*: An object expression defines a filter for object names. All
    business objects that are instantiated by JAC are automatically associated with
    a name. This name plays a role largely similar to that of a regular Java reference.
    The purpose is to uniquely identify each created object so that you can aspectize
    certain objects of a class (to customize their behaviors) while leaving others
    unchanged. The object names are automatically created by appending instance numbers
    to the class name. For example, the name order#0 identifies the first instance
    of the Order class.


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    **69**


    *Method expression*: A method expression defines a filter for method signatures.
    A signature contains a name, a comma-separated list of parameter types, and a
    return type. For example, the expression addItem(java.lang.String,int):void designates
    the addItem method that takes a String and an int as parameters and returns void.


    The previous expressions are regular expressions that follow the syntax defined
    by the GNU regexp library.


    Regular Expressions


    JAC uses the GNU regexp library (see http://www.cacas.org/java/gnu/regexp) to
    deal with regular expressions. This library defines a syntax for regular expressions
    and provides an API to check whether a string matches a given regular expression.


    **Operators**


    The GNU regexp library defines several operators for writing pattern expressions.
    However, this section focuses only on the main operators. For additional information,
    see the documentation on the GNU regexp Library web site.


    The dot (.) operator provides a shortcut for designating any character. The *
    and +


    operators allow you to designate repetitions of a given expression. The * operator
    matches zero or *n* repetitions of an expression, whereas + matches at least one
    repetition of an expression.


    The .* expression is widely used; it matches any sequence of characters.


    The [] operator is used to designate a set of characters. For example, the expression
    [abc]


    matches any of the characters *a*, *b*, or *c*. The ^ operator is equivalent to
    a Boolean NOT


    operator. The expression [^abc] matches any character except *a*, *b*, or *c*.
    Intervals can be defined in sets by using the minus operator (-). For example,
    the expression [d-m] matches any lowercase letter between *d* and *m*, inclusive.


    **JAC Operators**


    In addition to the operators provided by the GNU regexp library, JAC defines four
    operators that can be used in pointcut expressions: ALL, &&, ||, and !. The ALL
    operator is a shortcut for .*, and the three remaining operators correspond to
    the Boolean AND, OR, and NOT operators, respectively.


    **Examples of Regular Expressions**


    This section illustrates how to use GNU regular expressions with JAC.


    The method expression set.*:void selects all the methods that have a signature
    starting with set and ending with :void (the method returns void), regardless
    of the parameters.


    The method expression set.*(java.lang.String):void selects all the methods that
    have a name starting with set, that take a String as a parameter, and that have
    a return type of void.


    The method expression get.*():.* selects all the methods that have a name starting
    with get and that take no parameters, regardless of the return type.


    The class expression ALL selects all the existing classes.


    **70**


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    Method-Type Operators


    The purpose of method-type operators is to classify and select methods according
    to their impact on the object state. For example, the you might want to select
    all the methods that modify the object state by setting the value of a given field.
    (Such methods are called *setters*.) In approaches such as that of JavaBeans,
    the definition of a setter relies on naming conventions. In other words, the names
    of all setters must start with *set*. Whatever the body of such a method is, the
    method is considered a setter. Conversely, a method with a name that does not
    start with *set* is not considered a setter—even if the method sets a field. This
    can lead to counterintuitive naming schemes. For example, a method that computes
    and sets the amount of an order must be named setAmount if you want JavaBeans
    to consider the method a setter—even if computeAmount would be more intuitive
    and logical.


    To detect setters and getters, JAC relies on a bytecode analysis performed with
    the Byte Code Engineering Library (BCEL). (See http://jakarta.apache.org/bcel.)
    When a class is loaded, its bytecode is immediately analyzed. For example, when
    the opcode for reading a field is present in a method body, metadata is attached
    to the method to classify it as a getter. This metadata is made available when
    you write a pointcut.


    The following method-type operators are defined by JAC:


    • ACCESSORS: This operator selects each method that reads one or more fields defined
    in its class.


    • MODIFIERS: This operator selects each method that writes one or more fields
    defined in its class.


    • GETTERS(list): This operator selects each method that returns the value of any
    of the fields mentioned in the given list. The list is a comma-separated list
    of fields, as in GETTERS(name,address).


    • SETTERS(list): This operator selects each method that sets the value of any
    of the fields mentioned in the given list. The value must have been passed to
    the method as a parameter.


    All the previously listed operators can be combined with those defined by the
    GNU regexp library.


    The following expression selects the methods that perform a write operation on
    a field, the methods that return the value of the age field, and the methods that
    have a name starting with *compute*:


    MODIFIERS || GETTERS(age) || compute.*


    To further illustrate these operators, consider the Person class that is shown
    in Listing 4-6.


    **Listing 4-6.** *An Illustration of Method-Type Operators with the Person Class*
    public class Person {


    private String name;


    private int age;


    public void birthday() { age++; }


    public String whatIsYourNamePlease() { return name; }


    public void foo(String first,String last) { name=first+last; }


    public void bar(String name) { this.name=name; }


    }


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    **71**


    The four previously listed operators define the following selections: ACCESSORS
    selects the whatIsYourNamePlease and birthday methods. The birthday method reads
    the age field before incrementing it, and the whatIsYourNamePlease method reads
    the name field before returning it.


    MODIFIERS selects the birthday, foo, and bar methods. These methods modify one
    of the fields that is defined in the Person class.


    GETTERS(name) selects the whatIsYourNamePlease method, which returns the value
    of the name field.


    SETTERS(name) selects the bar method, which sets the name field with a value that
    is passed as a parameter. This last condition is important for qualifying the
    method as a setter.


    Indeed, the foo method also sets the field name, but it does so with a value that
    is “passed”


    indirectly as a parameter. (In other words, the value is obtained through string
    concatenation.) Therefore, the foo method is considered not a setter but a modifier.


    Two additional operators exist that classify methods depending on their behavior
    with collections (for example, with fields that implement the java.util.Collection
    interface): ADDERS(list): This operator selects the methods that add an element
    to a collection. The added element must have been passed to the method as a parameter.
    The given list is a comma-separated list of collection fields.


    REMOVERS(list): This operator selects the methods that remove an element from
    a collection. The removed element must have been passed to the method as a parameter.


    **Associating a Wrapper with a Pointcut**


    In the examples of the TraceAspect and TraceAspect2 aspects, you learned that
    the pointcut method defines pointcuts. The first parameters passed to this method
    are expressions that deal with the definitions of the classes, objects, and methods
    included in the pointcut. In this section, we present the three cases in which
    a wrapper can be associated with a pointcut.


    In the first and most frequent case, defining the wrapper requires two parameters:
    wrapperClassName, which is a string that defines the wrapper class name; and one2one,
    which is a Boolean value. The wrapper class must be a subclass of org.objectweb.jac.core.Wrapper.
    In all cases, JAC dynamically instantiates the specified wrapperClassName class.
    When this instantiation occurs, it depends on the value of one2one:


    • A value of false causes all the joinpoints included in the pointcut to share
    the same wrapper. In this case, the wrapper is a singleton.


    • A value of true causes each joinpoint included in the pointcut to be associated
    with a dedicated instance of the wrapper class.


    The value false generates fewer objects and thus saves memory. However, if the
    wrapper is stateful and the state depends on the joinpoint, the sharing can lead
    to inconsistencies. In such a case, it is easier to have one dedicated instance
    of a wrapper for each joinpoint and use the value true for one2one.


    **72**


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    The second case is rather similar to the first. Three parameters instead of two
    must be passed to define the wrapper. They are the wrapper class name; the Boolean
    one2one; and initParameters, which is an array of objects. This last parameter
    contains the initial values that must be passed when instantiating the wrapper.


    With the last case, you pass a unique parameter named wrappee. This parameter
    must implement the org.objectweb.jac.core.Wrapper type. The instance will be used
    to wrap all the joinpoints included in the pointcut. This case is useful when
    the wrapper cannot be easily created by the framework, or when you want to use
    a customized instance of a wrapper.


    **Creating Wrappers**


    In the previous section, you learned how to define a pointcut with JAC. In this
    section, you will learn how to write wrappers.


    Programming an aspect with JAC consists of writing at least two classes: one (such
    as TraceAspect2) for the definition of pointcuts, and one for each wrapper associated
    with a pointcut. This allows you to easily reuse pointcut definitions independently
    from wrappers and vice versa.


    Wrapper classes with JAC must extend the org.objectweb.jac.core.Wrapper class,
    which is the root class of all existing wrappers. All wrappers are “around” wrappers.


    Wrapper instances are created either by JAC or by you when you define the pointcuts.
    In all cases, a link is maintained between the aspect and the wrapper instances.
    This link comes into existence when a wrapper is instantiated; the wrapper provides
    a constructor that takes the instance of the associated aspect as a parameter.
    This parameter implements the org.objectweb.jac.core.AspectComponent type, which
    is the root class of all JAC aspects.


    A typical definition of a wrapper class starts with the following lines of code:
    import org.objectweb.jac.core.AspectComponent;


    import org.objectweb.jac.core.Wrapper;


    public class MyWrapper extends Wrapper {


    public MyWrapper(AspectComponent ac) { super(ac); }


    With JAC, two types of joinpoints exist: method executions and constructor executions.


    The “before” and “after” code that is executed around these joinpoints is defined
    in the invoke and construct methods, which are presented in the following sections.


    **Methods**


    The code that is executed before and after a method-execution joinpoint is defined
    in the invoke method. This method takes a unique parameter that implements the
    MethodInvocation type, returns an Object, and throws the Throwable type. The definition
    of MethodInvocation is detailed in the “Joinpoint Introspection” section later
    in this chapter. The declaration of the invoke method is shown here:


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    **73**


    public Object invoke( MethodInvocation mi ) throws Throwable; The proceed method
    can be called by the invoke method to execute the intercepted method. Several
    aspects can be woven around the same joinpoint. In such a case, a chain of wrappers
    is created around the joinpoint. The proceed method executes the next wrapper
    in the chain or, if the end of the chain is reached, the intercepted method.


    The proceed method can be called several times in the same invoke method. In such
    a case, several executions of the same method are performed. This can be useful
    when you need to rerun a method that previously failed.


    On the other hand, the proceed method might never be called. In such a case, the
    intercepted method is not executed, and the call is returned to the caller.


    The general format of the invoke method is shown in Listing 4-7.


    **Listing 4-7.** *The General Format of the invoke Method* public Object invoke(
    MethodInvocation mi ) throws Throwable {


    // before code


    Object ret = proceed(mi);


    // after code


    return ret;


    }


    The invoke method is mandatory—even if no code is defined.


    **Constructors**


    Like method executions, constructor executions can be aspectized with the construct
    method.


    The signature of this method is as follows:


    public Object construct( ConstructorInvocation ci ) throws Throwable; The proceed
    method plays the same role for construct as for invoke. No particular characteristics
    distinguish invoke from construct, except the difference in their names.


    **Joinpoint Introspection**


    The term *introspection* refers to examining the inner cause of a given phenomenon
    and gaining information about it. In the context of AOP, the phenomenon is the
    joinpoint, and you want to retrieve information about the part of the actual program
    that allows the joinpoint to occur.


    With JAC, the introspection mechanism is made available by the MethodInvocation
    and ConstructorInvocation parameters that are passed when the invoke and construct
    methods are called. These types are defined in the AOP Alliance API, which is
    included in JAC.


    Figure 4-1 illustrates the interface hierarchy that defines MethodInvocation and
    ConstructorInvocation.


    **74**


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    **Figure 4-1.** *The org.aopalliance.intercept interface hierarchy* The JoinPoint
    interface is the root type for all interceptions. For each joinpoint, three methods
    are defined: proceed, which executes the joinpoint; getThis, which returns the
    object where the joinpoint occurred; and getStaticPart, which returns the code
    element defining the joinpoint. This code element can be either a method or a
    constructor. It is represented by the java.lang.reflect.AccessibleObject class
    which, in the J2SE reflection API, is the superclass of all the code elements
    where reflection applies.


    The Invocation interface extends JoinPoint with the getArguments method to manipulate
    the arguments of the intercepted execution. These arguments are returned as an
    array of objects that can be read or written.


    The last two interfaces, ConstructorInvocation and MethodInvocation, correspond
    to constructor executions and method executions. Each provides a method that returns
    the intercepted constructor (as a parameter of type java.lang.reflect.Constructor)
    or the intercepted method (as a parameter of type java.lang.reflect.Method).


    **Wrapper Chains**


    Several wrappers can be attached to the same joinpoint. These wrappers are referred
    to as *chained*. In a wrapper, the call to proceed executes the next wrapper in
    the chain. When the end of the chain has been reached, the joinpoint will be executed.


    Figure 4-2 illustrates this mechanism with a chain of three wrappers. Each arrow
    represents either a method call or a method return. The arrows are numbered to
    indicate the execution-flow order.


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    **75**


    **Figure 4-2.** *Execution order in a wrapper chain* The initial call is passed
    to the first wrapper in the chain which, in turn, executes the


    “before” code. The first and second calls to proceed (arrows 2 and 3) execute
    the next wrapper in the chain. When the execution flow reaches the third wrapper,
    the call to proceed executes the joinpoint (arrow 4). After the execution of the
    joinpoint, the execution flow returns to the third wrapper (arrow 5) which, in
    turn, executes the “after” code. Next, the “after” code for the second and first
    wrappers is executed and, last, the call is returned.


    **Configuring Aspects and JAC Applications**


    Configuration is another key mechanism of JAC. This feature allows aspects to
    be reused efficiently. This section presents the syntax of both aspect-configuration
    files and application-descriptor files.


    **Configuring Aspects**


    Each aspect that is defined with JAC is associated with a text-based aspect-configuration
    file.


    The extension for this type of file is .acc.


    An aspect-configuration file provides the parameters that are required to adapt
    the aspect to a new application. For example, the purpose of this file for a transaction
    aspect is to define which methods in the application are to be executed in a transactional
    context.


    The notion of an aspect-configuration file exists in other approaches, such as
    that of J2EE.


    In J2EE, aspect-configuration files provide certain parameter values that tailor
    the system services to the specific needs of the application. By configuring the
    services that are provided by the application server, it is possible to reuse
    them with different applications. Although the syntax of aspect-configuration
    files differs between J2EE and JAC (in the case of J2EE, the files are XML files),
    the purpose is the same: allowing you to customize the aspects for the application
    and later modify the customization without having to recompile the application.


    **76**


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    The purpose of an aspect-configuration file is to define a list of method calls.
    These calls are passed from JAC to the aspect just after the aspect’s instantiation.
    You choose the steps that are required to configure the aspect, and the calls
    perform any configuration treatment that you define.


    Many possibilities are available when configuring aspects. For example, it is
    possible to configure complex aspects, such as the GUI aspect, that would not
    be possible with an approach based only on parameters and values. The power of
    the GUI aspect lies in its configuration methods which, when called from the configuration
    file, construct the graphical appearance of an application. (For more information
    on the GUI aspect, see the “Using the JAC


    Aspects Library” section later in this chapter.)


    The Syntax of Aspect-Configuration Files


    An aspect-configuration file defines the aspect methods that must be called when
    the aspect is instantiated.


    Each line in the file begins with the name of the method to call, continues with
    the values of the given parameters, and ends with a semicolon. The parameters
    are specified in a space-separated list. String parameters must be written between
    double quotes, and arrays must be written between brackets.


    Comments in aspect-configuration files follow the same syntactic rules that Java
    does.


    You can include other files in an aspect-configuration file by using the include
    keyword.


    An Example of an Aspect-Configuration File


    Consider the PresentationAC aspect that is shown in Listing 4-8.


    **Listing 4-8.** *The PresentationAC Aspect Component* package aop.jac;


    import org.objectweb.jac.core.AspectComponent;


    public class PresentationAC extends AspectComponent {


    public void display() { /* ... */ }


    public void setAttributesOrder(


    String className,


    String[] attributeNames ) { /* ... */ }


    public void setCategory(


    String className,


    String[] attributeNames,


    String value ) { /* ... */ }


    }


    PresentationAC defines the setAttributesOrder method to specify the display order
    for the attributes of the given classname class. This order is defined by the
    attributeNames array, which contains the attribute names.


    The aspect-configuration file, named presentation.acc, contains the following
    lines: setAttributesOrder Customer { lastName, firstName, phone, email }; setCategory
    Customer { lastName, firstName } main;


    display ;


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    **77**


    This aspect-configuration file calls the setAttributesOrder method and then calls
    the display method. The first call takes the value Customer for the classname
    parameter, and it takes the values lastName, firstName, phone, and email for the
    attributeNames array. No parameters are defined for the call to the display method.


    Grouping Parameters in Aspect-Configuration Files


    Grouping parameters introduces some so-called “syntactic sugar” into aspect-configuration
    files.


    The syntax for grouping parameters is as follows:


    group <value> {


    <method> [ <parameter> ... ] ;


    ...


    }


    When a group is used, the given value is added as the first parameter for every
    call that is specified between the curly brackets. Grouping parameters can be
    used to avoid redundancies—especially in cases that use the same value for several
    successive calls.


    The following configuration file, named presentation2.acc, is equivalent to presentation.acc:


    group Customer {


    setAttributesOrder { lastName, firstName, phone, email }; setCategory { lastName,
    firstName } main;


    }


    display ;


    Strictly speaking, group is not a keyword; it is an identifier that you can freely
    choose. Any identifier that is not a method name and that is defined in the aspect
    can be chosen for defining a group.


    Definitions that use the grouping mechanism can be nested. For example, the aspect-configuration
    file


    group Customer {


    attribute lastName {


    setCategory General ;


    }


    }


    is equivalent to


    setCategory Customer lastName General ;


    Definitions that use the grouping mechanism can be factored. For example, the
    aspect-configuration file


    group Customer,Employee {


    setAttributesOrder { lastName, firstName, phone, email };


    }


    is equivalent to


    **78**


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    setAttributesOrder Customer { lastName, firstName, phone, email }; setAttributesOrder
    Employee { lastName, firstName, phone, email **Configuring JAC Applications**


    A JAC application-descriptor file is a text file that provides information about
    launching the application. It defines a set of property names and values that
    is loaded by JAC when the end user starts the application. The extension .jac
    is commonly used for application-descriptor files.


    Each line in an application-descriptor file starts with the name of a property
    followed by a colon and ends with the property value. The backslash character
    (\) can be used to continue the definition of the value to next line.


    For example, the application-descriptor file


    applicationName: Order management


    launchingClass: \


    aop.jac.Customer


    defines the values "Order management" and "aop.jac.Customer" for the applicationName
    and launchingClass properties, respectively.


    Lines starting with the pound-sign character (#) are interpreted as comments.


    Table 4-1 presents the list of properties that can be used in an application-descriptor
    file.


    **Table 4-1.** *JAC Application-Descriptor Properties* **Property**


    **Definition**


    applicationName


    The application name


    launchingClass


    The main class name


    aspects


    A series of three values for defining the aspect identifiers, the aspect-configuration
    files, and the Boolean values that specify whether the aspects are initially woven


    jac.acs


    A series of two values for defining the aspect identifiers and the classes that
    implement those aspects


    jac.comp.wrappingOrder


    The weaving order when several wrappers apply to the same joinpoint


    jac.topology


    For distributed applications, the names of the hosts where the application is
    deployed


    **Using the Introduction Feature**


    You can extend the structure of an application by using the *introduction* feature
    to add new code elements. JAC can *introduce*, or add, two categories of these
    elements: role methods and exception handlers.


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    **79**


    **Role Methods**


    You introduce a *role method* to define new behaviors.


    A role method is defined in a wrapper class. You can choose the name, signature,
    and return type of the method. However, the first parameter must be org.objectweb.jac.core.Wrappee.
    This parameter corresponds to the application object where the method will be
    introduced.


    The wrapper shown in Listing 4-9 illustrates the definition of a role method.


    **Listing 4-9.** *The Definition of a Role Method*


    package aop.jac;


    import org.aopalliance.intercept.ConstructorInvocation;


    import org.aopalliance.intercept.MethodInvocation;


    import org.objectweb.jac.core.AspectComponent;


    import org.objectweb.jac.core.Wrappee;


    import org.objectweb.jac.core.Wrapper;


    public class TraceWrapper4 extends Wrapper {


    public TraceWrapper4(AspectComponent ac) { super(ac); }


    public void computeAmountAndPrint( Wrappee o, String header ) {


    double amount = ((Order)o).computeAmount();


    System.out.println(header+amount);


    }


    public Object construct(ConstructorInvocation ci) throws Throwable {


    return proceed(ci);


    }


    public Object invoke(MethodInvocation mi) throws Throwable {


    return proceed(mi);


    }


    }


    The computeAmountAndPrint method can be introduced in the Order class to compute
    and print the amount of an order. The first parameter, o, is the instance of the
    Order class where the role method is invoked. The second parameter, header, is
    a string that is printed before the amount.


    A role method can be called by the invokeRoleMethod method, which is defined in
    the org.objectweb.jac.core.Wrappee class. This method takes three parameters:
    the instance that receives the call, the name of the role method, and the array
    of objects to pass as parameters to the method.


    For example, the code block


    Wrapping.invokeRoleMethod(


    (Wrappee)o, "computeAmountAndPrint", new Object[]{">> "});


    **80**


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    corresponds to calling the computeAmountAndPrint method for the object o with
    the string ">>"


    as a parameter.


    **Exception Handlers**


    Exception handlers enable you to modularize the treatments that are attached to
    exceptions.


    Rather than scattering several versions of a try/catch block in the application
    code, you can usually write the code that is defined in the catch block in a unique
    and well-defined entity: the exception handler.


    The exception handler is defined in a wrapper and catches exceptions that are
    generated by joinpoints or wrappers. The handler is declared when you call the
    pointcut method to define a pointcut. The signature of the pointcut method is
    imposed, a unique parameter of type Exception must be defined, and the return
    type must be Object. The name of the exception handler can be freely chosen.


    Each defined exception handler can be dedicated to handling a particular type
    of exception. For example, one handler can treat the IOException, whereas another
    handles network exceptions.


    The TraceAspect5 aspect, which is shown in Listing 4-10, illustrates the definition
    of an exception handler.


    **Listing 4-10.** *An Example of a Role Method and an Exception Handler* package
    aop.jac;


    import org.aopalliance.intercept.ConstructorInvocation;


    import org.aopalliance.intercept.MethodInvocation;


    import org.objectweb.jac.core.AspectComponent;


    import org.objectweb.jac.core.Wrapper;


    public class TraceAspect5 extends AspectComponent {


    public TraceAspect5() {


    pointcut(


    "ALL","ALL","ALL", "aop.jac.TraceWrapper4",


    "myIOExceptionHandler", false );


    }


    }


    public class TraceWrapper5 extends Wrapper {


    public TraceWrapper5(AspectComponent ac) { super(ac); }


    public Object myIOExceptionHandler(Exception e) throws Exception {


    System.out.println( "Exception "+e.getMessage()+"raised" ); if ( ! (e instanceof
    java.io.IOException) )


    throw e;


    return null;


    }


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    **81**


    public Object construct(ConstructorInvocation ci) throws Throwable {


    return proceed(ci);


    }


    public Object invoke(MethodInvocation mi) throws Throwable {


    return proceed(mi);


    }


    }


    The call to pointcut specifies that the myIOExceptionHandler method, which is
    defined in the aop.jac.TraceWrapper5 class, will handle exceptions for the joinpoints
    and wrappers that are included in the pointcut. This pointcut includes all the
    methods, classes, and objects that are defined in the application. If the type
    is not IOException, the myIOExceptionHandler method displays a message and propagates
    the exception.


    Several exception handlers can be defined for a given joinpoint; in such a case,
    they are chained. If a handler propagates the exception, the next handler in the
    chain is executed. If all the handlers propagate the exception, the application
    exits.


    **Using the JAC Aspects Library**


    A library containing 16 different aspects is distributed with JAC. The purpose
    of this library is to aid application developers by providing ready-to-use solutions
    for commonly encountered problems. Several aspects are provided with the library
    to demonstrate that AOP can be applied to the development of many different types
    of applications. The aspects provided in the library permit you to quickly program
    a prototype or a demonstration. When used in an operational context, however,
    you must improve and complete these aspects.


    Among the 16 available aspects, the following are mature enough to be used in
    an operational context:


    • GUI aspect


    • Authentication aspect


    • User-profile aspect


    • Confirmation aspect


    • Persistence aspect


    • Integrity aspect


    The following sections present the 16 aspects grouped into 4 categories: user-interface
    aspects, persistence and transaction aspects, distribution aspects, and other
    aspects.


    **Using the User-Interface Aspects**


    The GUI aspect is one of the most original aspects provided by JAC. The purpose
    of this aspect is to define the graphical user interface of the application.


    Two versions of the GUI aspect are provided: Swing and HTML/servlet. They both
    support the same configuration methods. Therefore, the end user can interact with
    the application through a Swing interface or a web browser.


    The org.objectweb.jac.aspects.gui.GuiAC class implements the GUI aspect.


