- fmt: '# Chapter 11: Using AOP Within the Sample Application’s Business Tier


    ## Managing Distributed Transactions with JTA


    Java Transaction API (`JTA`) defines a set of interfaces and mechanisms for using
    distributed transactions. A transaction is distributed when several data sources
    are involved. In general, data sources are located on different servers, but this
    is not mandatory. `JTA` can also be used for only one data source. Within J2EE,
    `JTA` is typically used to make a session EJB facade service transactional.


    The reference banking application only has one data source: a PointBase database.
    It is interesting to evaluate possible data distributions. For example, accounts
    and transactions could be stored in two distinct databases in order to balance
    the load and the data volume. In addition, it is useful for the system administration
    since transactions can call for a different maintenance process than the accounts.
    In this case, the use of `JTA` and an architecture that supports distribution
    is important.


    In short, `JTA` relies on the definition of three communication interfaces between
    three main entities: the application, the transaction manager, and the transactional
    resources. In the context of an application server, `JTA` defines an interface
    between the application server and the transaction manager. This interface permits
    the notification of the manager for operations occurring on EJBs within the transactions.
    It also allows the client to access an automatically and transparently transmitted
    transactional context, which is accessible from any EJB participating in a transaction.
    Within a transaction, a participating EJB can access through the transactional
    context an object that represents the transaction: an instance of `javax.transaction.UserTransaction`.


    ## A JTA Solution


    The code in Listing 11-20 is a rewrite of the `transfer` function of `TxControllerBean`
    so that it ensures transactional properties by using `JTA`.


    **Listing 11-20.** *Manual Control of Transactions with JTA*


    ```

    01 // a modified version of aop.j2ee.business.session.TxControllerBean to use
    JTA

    02 [...]

    03 javax.transaction.UserTransaction ut;

    05 public void transferFunds(BigDecimal amount,String descr,

    06   String fromAccountId,String toAccountId) 07 throws

    08   InvalidParameterException,AccountNotFoundException,

    09   InsufficientFundsException,InsufficientCreditException {

    11   Account fromAccount;

    12   Account toAccount;

    14   fromAccount= checkAccountArgsAndResolve(amount, descr, fromAccountId);

    15   toAccount= checkAccountArgsAndResolve(amount, descr, toAccountId);

    16

    17   ut= context.getUserTransaction();

    19   try {

    20     ut.begin();

    21   } catch (Exception e) {

    22     throw new EJBException("transferFunds: " + e.getMessage());

    23   }

    25   try {

    27     String fromType= fromAccount.getType();

    28     BigDecimal fromBalance= fromAccount.getBalance();

    29

    30     if (DomainUtil.isCreditAccount(fromType)) {

    31       BigDecimal fromNewBalance= fromBalance.add(amount);

    32       if (fromNewBalance.compareTo(fromAccount.getCreditLine()) == 1)

    33         throw new InsufficientCreditException();

    34       executeTx(amount,descr,fromAccountId,fromNewBalance,fromAccount);

    35     } else {

    36       BigDecimal fromNewBalance= fromBalance.subtract(amount);

    37       if (fromNewBalance.compareTo(bigZero) == -1)

    38         throw new InsufficientFundsException();

    39       executeTx(amount.negate(),descr,fromAccountId,fromNewBalance,fromAccount);

    40     }

    42     String toType= toAccount.getType();

    43     BigDecimal toBalance= toAccount.getBalance();

    45     if (DomainUtil.isCreditAccount(toType)) {

    46       BigDecimal toNewBalance= toBalance.subtract(amount);

    47       executeTx(amount.negate(),descr,toAccountId,toNewBalance,toAccount);

    48     } else {

    49       BigDecimal toNewBalance= toBalance.add(amount);

    50       executeTx(amount, descr, toAccountId, toNewBalance, toAccount);

    51     }

    53     ut.commit();

    55   } catch (Exception ex) {

    56     try {

    57       ut.rollback();

    58     } catch (Exception e) {

    59       throw new EJBException("transferFunds: " + e.getMessage());

    60     }

    61     throw new EJBException("transferFunds: " + ex.getMessage());

    62   }

    63 } // transferFunds

    ```


    As shown, managing transactions with `JTA` complicates the application code. Furthermore,
    it is a crosscutting concern since it must be handled with each participating
    EJB.


    This concern adds the following elements:


    - A field that stores the `UserTransaction` object and allows it to be quickly
    accessed (line 3)

    - The initialization of this field at the beginning of the transactional method
    (line 17)

    - A call to `begin`, which indicates a transaction start (line 20)

    - A call to `commit` to ask for the realization of the transaction (line 53)

    - A `rollback` invocation to ask for the cancellation of the transaction in case
    of an error (line 57)


    In addition, we need to manage the exceptions that can be thrown by the transaction
    itself. Here, we handle them in a generic way.


    ## EJBs As an Infrastructure for the Automatic Integration of Transactions


    The J2EE specification given by Sun Microsystems allows the transactions to be
    declaratively defined through dedicated attributes, which are defined in deployment
    descriptors. These attributes are applied to EJB methods and parameterize the
    behavior of the container regarding the transaction manager when these methods
    are invoked.


    These attributes are the following:


    - `TX_NOT_SUPPORTED`: Indicates that the method is not transactional. If this
    method is invoked within a transaction, this transaction is suspended during the
    method execution.

    - `TX_SUPPORTS`: Indicates that the bean that supports the method will be included
    in the transaction as a participant. If the client does not define any transaction,
    the container can create a new transaction depending on the implementation.

    - `TX_REQUIRED`: Indicates that the method must be executed within the context
    of a transaction. If not, the container automatically creates a new one.

    - `TX_REQUIRES_NEW`: Indicates that the method triggers the creation of a new
    transaction, even if the client has already defined one. In this later case, the
    transaction of the client is replaced by the newly created transaction.

    - `TX_BEAN_MANAGED`: Indicates that the EJB method manually implements the transaction
    management by using `JTA`, for instance.

    - `TX_MANDATORY`: Indicates that the method has to be executed within a transaction.
    If not, the container throws a `TransactionRequired` exception.


    Figure 11-2 shows the messages that are sent from the application to the transaction
    manager, and to the transactional resources when the `transferFunds` method is
    set to `TX_REQUIRES_NEW`—which means that a transaction will automatically be
    created by the container, even if a transaction has already been defined by the
    client—and that the methods `Account.setBalance` and `AccountHome.create` are
    set to `TX_REQUIRED`.


    The call to the `transferFunds` method triggers the `begin` message to the manager,
    which in turn creates a new transaction. This transaction is added to the current
    thread’s context and is automatically transmitted to the participating EJBs. When
    the `Account` EJBs are used and the Tx bank-level transactions are created, they
    are added to the current transaction as participants.


    The successful end of the `transferFund` method triggers the `commit`, while an
    `EJBException` catch implies a `rollback`.


    **Figure 11-2.** *Declarative transactions mechanism in J2EE*


    The existence of container-managed transactions allows the program’s code to remain
    free from the transaction concern. However, this technique has its limitations.'
