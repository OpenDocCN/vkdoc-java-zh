    **面向应用管理与监控的 AOP**


    尽管管理和监控对于多层应用至关重要，但开发人员很少考虑这些任务，他们自然倾向于关注应用的主要功能。由于这些任务没有在前期得到处理，管理和监控可以从 AOP
    提供的更高程度的关注点分离中受益。事实上，独立开发一些管理和监控功能是很有意义的，这样可以在需要时插入或拔出这些功能。


    某些标准——简单邮件传输协议 (SMTP) 和 Java 管理扩展 (JMX)——可用于管理和监控，并且最好使用它们而不是从头编写代码。实际上，互操作性通常是管理和监控的一个要求，因为这些任务可能横切企业应用的多个子系统。


    JMX


    通过 JMX，Java 提供了一个用于管理和监控的标准规范及库。JMX 依赖于两个主要功能：


    • 通过特定 API 开放 Java 组件，使管理和监控工具能够完全访问这些组件

    • 一个通知机制，用于在需要时实现自动检查


    **192**


    第 9 章 ■ 服务质量与面向切面编程


    请注意，JMX 被现有应用服务器的管理控制台广泛使用。


    JMX 架构由以下三层组成：


    • *仪表化*：该层的作用是将组件开放给其他层。这些组件随后被称为*可管理资源*。'
- fmt: '# JMX Architecture Overview


    ## Agent Layer


    The *Agent* layer exploits the manageable resources of the previous layer and
    makes them accessible, through adapters, to the outer application (in other words,
    to the distributed services layer). This layer also offers several services—such
    as dynamic class loading, manageable-resources monitoring, and timers—that can
    be used by the distributed services layer.


    ## Distributed Services Layer


    The *Distributed services* layer gathers the application’s external components.
    These components communicate with the agent layer through adapters and are mainly
    composed of the administration and supervision tools.


    The JMX architecture is designed to be open and easy to use. The adapters of the
    agent layer make it easy for a JMX application to interoperate with standards
    and with existing administration and supervision tools (such as IBM Tivoli and
    Hewlett-Packard OpenView).


    The following sections present the different layers of JMX.


    ## Instrumentation Layer


    The instrumentation layer relies on the notion of the manageable resource. Resources
    are implemented as regular Java objects (beans) that must follow a set of conventions
    to be administered and supervised by JMX. These resources are called *MBeans*,
    which stands for *Manageable Beans*.


    There are four types of MBeans: standard, dynamic, open, and model. Since this
    book is not dedicated to JMX, we will deal only with standard MBeans, which are
    general enough to demonstrate our point.


    An MBean is a Java class if it implements an interface that is named from the
    class and the *MBean* suffix. For instance, a `Stats` class is an MBean if it
    implements a `StatsMBean` interface, as shown here:


    ```java

    package aop.management.jmx.simple;


    public class Stats implements StatsMBean {


    ...


    }

    ```


    The role of the MBean interface is to define the fields and methods that are accessible
    from the agent layer. For each attribute, you must define a getter method and,
    if the attribute is modifiable, a setter method. The example in Listing 9-18 defines
    three read-only attributes and a `reset()` method.


    **Listing 9-19.** *A Simple MBean for Statistics Management*


    ```java

    package aop.management.jmx.simple;


    public interface StatsMBean {


    public int getOrders();


    public float getTotalOrdersAmount();


    public String getStatus();


    public void reset();


    }

    ```


    ## Agent Layer


    The agent layer is implemented by a specific JMX component, named `MBeanServer`,
    that is defined in the MBeans specification. This component controls the communications
    between the manageable resources and the outer world.


    The `MBeanServer` component defines useful services, such as the monitoring service
    that generates a notification when a field value is modified—thus allowing for
    the monitoring of the manageable resources. There are three types of monitors:


    - **CounterMonitor**: This type monitors the numeric attributes and sends a notification
    event when a threshold value is reached. A new threshold value can then be calculated.

    - **GaugeMonitor**: This type monitors the attributes and sends a notification
    event when a value goes under or over a limit value.

    - **StringMonitor**: This type monitors the string values and can send a notification
    event when a string equals or differs from a reference string.


    To be notified of monitoring events, Java classes must implement the `javax.management.NotificationListener`
    interface.


    ## Distributed Services Layer


    The distributed services layer consists of a set of tools that can be connected
    to the JMX agent through an adapter. The remainder of this chapter uses the HTTP
    adapter provided by MX4J (an open-source implementation of JMX 1.1). As shown
    in Figure 9-5, the HTTP adapter contains a GUI for administering the MBeans, creating
    new monitors, and more.


    ![Image 6](index-207_1.png)


    **Figure 9-5.** *The GUI for the HTTP adapter provided by MX4J*


    ## Using JMX with AOP'
