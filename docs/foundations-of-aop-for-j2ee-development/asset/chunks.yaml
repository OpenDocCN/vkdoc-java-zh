- fmt: '# Coverage Analysis Granularity


    Coverage analysis can be implemented at several granularity levels. With most
    of the AOP technologies, the granularity is limited to the accessing of fields
    and the invocation of methods and constructors. This type of coverage analysis
    is called *function coverage analysis*.


    A coverage-analysis tool is composed of two elements: the *recorder* and the *comparator*.


    The recorder is in charge of executing the application and recording all the invoked
    methods and accessed attributes. The comparator compares the record with the program’s
    structure to detect unused fields or methods.


    We now present an example that implements only the recorder, which is the part
    that specifically uses AOP. The recorder generates a comma-separated value (CSV)
    file so that the file will be readable using standard tools such as Microsoft
    Excel. The following columns are defined:


    - The type of call or access

    - The name of the class that the called or accessed element belongs to

    - The name of the element

    - The type (for fields) or the return type (for methods)

    - The parameter types (for methods and constructors)

    - The declared exceptions (for methods and constructors)


    The JBoss AOP interceptor is defined in Listing 9-11.


    **Listing 9-11.** *A Simple Code-Coverage Analyzer Implemented with AOP*


    ```

    001 package aop.tests.cover;

    003 import java.io.FileNotFoundException;

    004 import java.io.FileOutputStream;

    005 import java.io.PrintWriter;

    006 import java.lang.reflect.Constructor;

    007 import java.lang.reflect.Field;

    008 import java.lang.reflect.Method;

    010 import org.jboss.aop.ConstructorInvocation;

    011 import org.jboss.aop.FieldInvocation;

    012 import org.jboss.aop.Interceptor;

    013 import org.jboss.aop.Invocation;

    014 import org.jboss.aop.InvocationResponse;

    015 import org.jboss.aop.InvocationType;

    016 import org.jboss.aop.MethodInvocation;

    017 import org.jboss.util.xml.XmlLoadable;

    018 import org.w3c.dom.Element;

    020 public class CoverRecorderInterceptor implements Interceptor, XmlLoadable
    {

    021     private PrintWriter out;

    023     public String getName() {

    024         return "CoverRecorderInterceptor";

    025     }

    027     public void importXml(Element parameter) {

    028         Element t = (Element) parameter.getElementsByTagName("record-file").item(0);

    029         String fileName = "";

    030         if (t != null) {

    031             fileName = t.getAttribute("value");

    032             if ("".equals(fileName)) {

    033                 throw new RuntimeException("...");

    034             }

    035         } else {

    036             throw new RuntimeException("...");

    037         }

    038         try {

    039             FileOutputStream stream = new FileOutputStream(fileName);

    040             out = new PrintWriter(stream);

    041         } catch (FileNotFoundException e) {

    042             throw new RuntimeException("...");

    043         }

    044         out.println("Call type,Class,Name,ReturnType,parameters,exceptions");

    045     }

    047     public void recordMethodCall(String className,

    048                                  String methodName, Class returnType, Class[]
    parameters,

    049                                  Class[] exceptions) {

    050         // ...

    051     }

    053     public InvocationResponse invoke(Invocation invocation)

    054             throws Throwable {

    055         String filter = (String) invocation.getMetaData("cover", "filter");

    056         if (filter != null && filter.equals("true")) {

    057             return invocation.invokeNext();

    058         }

    059         InvocationResponse rsp = invocation.invokeNext();

    060         InvocationType invocationType = invocation.getType();

    061         if (invocationType == InvocationType.METHOD) {

    062             MethodInvocation methodInvocation = (MethodInvocation) invocation;

    063             Method method = methodInvocation.method;

    064             String className = method.getDeclaringClass().getName();

    065             String methodName = method.getName();

    066             Class returnType = method.getReturnType();

    067             Class[] parameters = method.getParameterTypes();

    068             Class[] exceptions = method.getExceptionTypes();

    069             out.print("Method call,");

    070             recordMethodCall(className, methodName, returnType, parameters,

    071                              exceptions);

    072         } else if (invocationType == InvocationType.CONSTRUCTOR) {

    073             ConstructorInvocation constructorInvocation =

    074                 (ConstructorInvocation) invocation;

    075             // ...

    076         }

    077     }

    078 }

    ```'
