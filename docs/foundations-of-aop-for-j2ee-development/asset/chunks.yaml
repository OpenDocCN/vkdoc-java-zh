    public AccountDetails getDetails() throws RemoteException; public BigDecimal getBalance()
    throws RemoteException;


    public String getType() throws RemoteException;


    public BigDecimal getCreditLine() throws RemoteException; public void setType(String
    type) throws RemoteException; public void setDescription(String description) throws
    RemoteException; public void setBalance(BigDecimal balance) throws RemoteException;
    public void setCreditLine(BigDecimal creditLine) throws RemoteException; public
    void setBeginBalance(BigDecimal beginBalance) throws RemoteException; public void
    setBeginBalanceTimeStamp(Date beginBalanceTimeStamp) throws RemoteException;


    }

    ```


    The users are implemented using the `Customer` interface shown in Listing 10-5.


