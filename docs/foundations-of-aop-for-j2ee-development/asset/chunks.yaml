    regular Java, this is the reference to the current object. Similarly, in AspectJ,
    thisJoinPoint is a reference to an object describing the current joinpoint, which
    implements the predefined org.aspectj.lang.JoinPoint interface. Table 3-1 sums
    up the main methods defined in this interface. Two of them, getSignature and getSourceLocation,
    use predefined interfaces, which are Signature and SourceLocation, respectively.
    The AspectJ Javadoc documentation gives more details on the methods provided by
    these interfaces.


