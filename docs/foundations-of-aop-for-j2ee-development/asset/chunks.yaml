    AOP-based Implementation


    AOP has a straightforward approach to making the code independent from the EJB
    technology: create an aspect for transforming POJOs into EJBs, and use an empty
    marker interface—similar to Serializable—to implement the aspect with intertype
    declarations based on this interface.


    If the marker is


    package aop.j2ee.business;


    public interface SessionBeanProtocol {}


    the following aspect POJOSession can transform a POJO implementing this interface
    into an EJB session:


    package aop.j2ee.business.aspect;


    import javax.ejb.*;


    import aop.j2ee.business.aspect.marker.SessionBeanProtocol; public aspect POJOSession
    extends EJBResolver {


    // common session bean behavior


