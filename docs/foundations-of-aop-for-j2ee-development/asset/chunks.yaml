    \n判断一个设计模式是否会从面向切面实现中受益，需要评估以下几点：\n\n*   该模式是否定义了横切结构。\n*   是否满足由Hannemann和Kiczales定义的局部性、可重用性、组合透明性和（非）可插拔性这四个标准。\n\
    *   该模式是否保持基础程序的结构不变。\n\n第9章\n\n服务质量与AOP\n\n**随**着计算能力遵循著名的摩尔定律，软件的极限不断被突破，应用程序也变得越来越复杂。这种复杂性必须被管理和控制，因为它可能导致缺陷和故障，从而影响应用程序的*服务质量*。服务质量是一个广泛的话题，涵盖了多个复杂问题。在本章中，我们不会深入探讨该主题的细节，而是将重点放在有助于确保应用程序实现的功能被正确定义和执行的技术上。这些技术可以看作是迈向更复杂的服务质量问题的第一步。\n\
    \n有几种技术可用于管理应用程序的复杂性。本章介绍了三种互补的技术，所有这些技术都可以通过使用AOP得到改进：\n\n*   *契约式设计*：这种设计方法旨在形式化与类使用相关的约束。契约式设计的原则远未集成到语言中；然而，它们可以通过使用AOP来实现。\n\
    *   *覆盖率分析*：这种技术通过实施合理的测试用例和回归测试来检查完整性，这些测试检查与实现变更相关的功能是否仍然按照初始规范运行。这些测试可以利用AOP的代码插桩能力来更好地监控应用程序的执行。\n\
    *   *管理与监控*：这种技术跟踪正在运行的应用程序，以防止事故或修复故障。通过AOP，管理与监控功能可以很容易地与应用程序的其余部分分离。\n\n**契约式设计**\n\
    \n契约式设计是一种设计方法，包括形式化应用程序组件的使用。为此，必须指定一系列逻辑约束并由组件进行检查，以保证其行为与其规范一致。\n\n契约式设计的概念由Bertrand\
    \ Meyer在他的著作《面向对象软件构造（第二版）》（Prentice Hall，1997）中推广开来。早在1985年，契约就被用于Eiffel等多种语言中。AOP提供了有效实现契约式设计的基本技术。\n\
    \n在详细介绍契约式设计的AOP实现之前，我们将首先在Java上下文中解释这种方法的主要原则。\n\n**171**\n\n**172**\n\n第9章 服务质量与AOP\n\
    \n**契约式设计的基础**\n\n大多数语言的基本一致性控制机制（如类型检查）不足以确保客户端程序正确使用给定的类。实例状态与方法调用或结果的一致性需要使用更高级的概念——*契约*。\n\
    \n通过实现契约，应用程序在以下方面受益：\n\n*   改进了测试和调试。契约允许严格定义执行条件。\n*   改进了文档和可重用性。契约清晰地体现在组件代码或接口中。在重用组件时，可以考虑契约以帮助避免错误。\n\
    *   改进了错误处理。当契约未被履行时，可以更容易地识别初始错误，并可以实施策略来克服问题。\n\n支持契约式设计的语言通常可以在编译时或运行时激活或停用契约以提高性能。请注意，契约可能具有不同的性质，但它们并不意味着取代任何类型的测试，例如与安全相关的测试。即使某些此类测试可能因此变得冗余并可能从测试套件中移除，情况也是如此。\n\
    \n契约的分类\n\n软件级别的契约可以比作法律合同。在合同中，通常有两个缔约方（承包商）。在软件中，两个承包商是用户组件和提供者组件。契约还定义了一个对象，该对象定义了在两个承包商之间实现何种关系。除了承包商和对象之外，契约还必须定义相互义务，这些义务规定了两个承包商如何实现契约的目标。在软件中，这些义务通过*断言*来定义。\n\
    \n■**定义 断言**——一个逻辑布尔表达式，在程序执行的给定点必须为真。\n\n理论上，断言可以在程序代码的任何地方使用。例如，可以将断言应用于除法运算，以检查除数是否为零。\n\
    \n断言条件必须是字面量，并且应避免调用具有副作用的方法。\n\n断言具有通用形式。然而，像Java这样的面向对象语言可以使用四种众所周知的形式：*前置条件*、*后置条件*、*类不变量*和*内部不变量*。\n\
    \n第9章 服务质量与AOP\n\n**173**\n\n■**定义 前置条件**——在方法执行之前必须验证的断言。如果前置条件为假，则不得执行该方法。例如，平方根方法（`sqrt`）会有前置条件`parameter\
    \ >= 0`。"
