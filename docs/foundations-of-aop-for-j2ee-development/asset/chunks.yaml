    public void SessionBeanProtocol.ejbRemove() {}


    public void SessionBeanProtocol.ejbActivate() {}


    public void SessionBeanProtocol.ejbPassivate() {}


    public void SessionBeanProtocol.ejbCreate() { [...] }


    }


    The implementation of the method ejbCreate (in the last line) contains certain
    initializations that are dedicated to EJBs.


    In terms of modularity, the advantages are


    • *Locality*: The code that implements the functions of the facade is located
    in a POJO, while the code dealing with the EJB session is in an aspect.


    • *Reuse*: We can extend the SessionBeanProtocol interface depending on our needs
    and add new intertype declarations in POJOSession. Since the inheritance hierarchy
    is independent from the business, the reuse and factoring of functions common
    to EJB sessions are significantly increased.


    • *Composition*: As the facade implementation is not coupled to the session facade
    design pattern, it is easier to use other patterns at the same time with less-complicated
    code.'
