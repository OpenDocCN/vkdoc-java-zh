  raw: 'The ultimate goal of AOP is to provide better separation of concerns. This
    goal is reached with aspects since they allow the modularization of concerns that
    are not clearly modularized using regular programming techniques. However, with
    the separation of concerns into different modules, another kind of dependency
    appears when different modules are integrated. This dependency, which we can refer
    to as *association coupling*, is particularly important when using statically
    typed AOP.


    For instance, with the statically typed retry aspect, a change in the method signature
    captured by the pointcut invalidates this pointcut definition, as well as the
    associated advice codes. Any evolution of the application can then become tedious
    in the long run. It is a paradox in the sense that separation of concerns makes
    the application more understandable and, at the same time, more difficult to maintain.
    This is the *separation of concerns paradox*.


    The use of generic AOP minimizes this problem, but a coupling still remains within
    pointcuts or aspect configurations when supported (within the configuration interfaces
    of JAC, the XML configuration files of JBoss AOP or AspectWerkz, or even the annotations
    when using the upcoming Java 5–based technologies).


    Even though we cannot deny the separation of concern paradox, aspect-oriented
    design is still a better alternative. With this design, the coupling of aspects
    is more localized than the coupling of the same implementation without any aspects.
    Additionally, it allows for faster refactoring in the case that the application
    changes. In other words, AOP does not remove the dependencies, but it allows for
    better control over them.


    Tool support can also help to control these dependencies. In JAC, for instance,
    the configuration level reduces the dependencies to a minimum. In AspectJ, we
    can improve the decoupling with the systematic use of abstract aspects (see Chapter
    3) and the actual definitions of the pointcuts within concrete aspects extending
    the abstract aspects. The *pointcut library* technique can also be useful. For
    more details about these techniques, please refer to AspectJ’s specific guides.


    Introducing the Data Transfer Objects Transparently


    As previously explained, the data transfer object pattern allows for the optimization
    of client/


    server communications. It gathers a set of elementary requests into higher-level
    requests, which use transfer objects to aggregate the parameters of the elementary
    requests.


    In specific cases, this design pattern greatly benefits from AOP; however, it
    is not recommended for modifying the business API for the purpose of optimizing
    the communications.


    Also, complicating the clients’ implementation for the same reasons would be an
    anti-pattern.


    With the help of AOP, we can define two aspects, one for the client and one for
    the server, so we can entirely free the application code from this optimization
    concern. First, we need to find the server utilization schemas (use cases) within
    the clients code that could benefit from a data transfer object optimization.
    If we take the code of the Simple client, we will see that the account creation
    is done in two consecutive remote invocations: a call to Bank.createCustomer and
    a call to Bank.createAccount, which take as a parameter the current created customer.
    This use case occurs, for instance, when registering a new customer and assigning
    that user a default account. This is a frequent operation that we would like to
    implement with only one remote call, to reduce network traffic. It can also be
    interesting to deal with one unique call/


    transaction so that the rollback can be implemented in a more efficient way (only
    a local client-side cancellation is needed until we actually perform the call).


