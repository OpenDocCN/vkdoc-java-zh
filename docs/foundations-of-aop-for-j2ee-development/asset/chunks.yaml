    **36**


    C H A P T E R 3 ■ A S P E C T J


    **Defining Joinpoints**


    In the previous sections, you learned that wildcards and introspection can be
    used to write generic pointcuts. Up until this point, we have shown joinpoints
    that deal only with method calls. In this section, we will present other types
    of joinpoints.


    Joinpoint Types


    The joinpoint types provided by AspectJ can deal with methods, fields, exceptions,
    constructors, static blocks and, finally, advice-code executions.


    **Methods**


    For methods, AspectJ defines two types of joinpoints: method calls (defined by
    the call keyword) and method executions (defined by the execution keyword). In
    both cases, an expression must be provided to designate the methods to be called
    or executed.


    The first difference between the call and execution types concerns the context
    that the joinpoint occurs in. In the former case, the joinpoint occurs in the
    context of the calling code, whereas in the latter case, the joinpoint occurs
    in the context of the called code.


    A second difference, which is a direct consequence of the first, is that the values
    returned by the getThis and getTarget introspection methods differ. For the call
    type, getThis returns a reference to the caller, and getTarget returns a reference
    to the callee. For execution, both getThis and getTarget return a reference to
    the callee. The call type can thus be seen as more general because both the caller
    and the callee are available.


    A method can be associated with a call joinpoint and an execution joinpoint at
    the same time. In such a case, the code is executed in the following order: **1.**
    The “before” part of the advice code that is associated with the call joinpoint
    **2.** The “before” part of the advice code that is associated with the execution
    joinpoint **3.** The method


    **4.** The “after” part of the advice code that is associated with the execution
    joinpoint **5.** The “after” part of the advice code that is associated with the
    call joinpoint **Fields**


    The get and set joinpoint types intercept the instructions that read and write
    a field, respectively. These types are useful when you want to implement aspects
    that manipulate the state of an object. For instance, in the case of a persistence
    aspect, the state of an object needs to be stored in a file or a database. When
    intercepted, the read and write operations can be easily redirected to the file
    or the database.


    The get and set types take an expression as a parameter that denotes the set of
    fields included in the pointcut. The definition of this expression contains three
    parts for each field: its type, the class that defines it, and its name. All of
    these parts can contain wildcards.


    The following expression intercepts all the read operations on the items field
    of type Map that is defined in the Order class:


    get( Map Order.items )


    C H A P T E R 3 ■ A S P E C T J


    **37**


    As for method calls and executions, the full class names (in other words, those
    including package names) as well as the wildcards (*, .., and +) can be used when
    writing the expressions for get and set.


    **Exceptions**


    The handler type corresponds to a joinpoint that occurs when a catch block of
    instructions begins. This type allows you to define aspects that perform compensation
    treatments when exceptions are thrown.


    For example, this type of joinpoint can be used to log the messages that are generated
    by the thrown exceptions in a running application. Another usage example is defining
    a common treatment for all the exceptions of a given type. However implemented,
    the handling of exceptions with an aspect usually lightens the application—making
    it far more readable and maintainable.


    The handler type is associated with an exception name. A name can contain the
    wildcards (*, .., and +). For example, the following expression intercepts the
    executions of the blocks that catch the java.io.IOException exception or one of
    its subtypes: handler( java.io.Exception+ )


    With the current version of AspectJ, only “before” advice code can be defined
    for pointcuts that use the handler type. Hence, some code can be executed at the
    beginning of a catch block but not at the end.


    **Constructors**


    AspectJ can define pointcuts that include class constructors. To achieve this,
    two joinpoint types are available: initialization and preinitialization. The initialization
    joinpoint corresponds to the actual execution of the declared constructor, excluding
    a possible call to an inherited constructor. The preinitialization joinpoint corresponds
    to the initialization code that is executed before the execution of the constructor,
    including any default field initializations and any field initializations that
    have been declared within the class body.


    As for the call and execution types, the initialization type takes an expression
    as a parameter that denotes the constructor or the set of constructors to be intercepted.
    This expression contains a class name, the new keyword, and a signature, and it
    can contain the usual wildcards (*, .., and +).


    For example, the following expression intercepts the executions of all the constructors,
    regardless of their signatures, that are defined in the Customer class: initialization(
    Customer.new(..) )


    With AspectJ, “before” and “after” advice code is valid with initialization pointcuts,
    but


    “around” advice code is not.


    **Static Code Blocks**


    In Java, static code blocks define the instructions that are executed while a
    class is being initialized—in other words, when the class is loaded in the virtual
    machine. These blocks are often used to initialize static fields.


    **38**


    C H A P T E R 3 ■ A S P E C T J


    Several static code blocks can be associated with a single class. In such a case,
    the order they are executed in corresponds to the order of their definition. The
    staticinitialization joinpoints correspond to the executions of these static blocks.


    With staticinitialization, advice code can be executed before and after a static
    block.


    For instance, the following expression intercepts the execution of all static
    blocks that are defined in the Catalog class:


    staticinitialization( Catalog )


    As for other pointcut descriptors, class names can be associated with package
    names and wildcards.


    **Advice-Code Execution**


    The last existing variety of AspectJ joinpoint, adviceexecution, corresponds,
    as its name suggests, to the execution of advice code. Therefore, you can define
    an aspect that modifies the execution of another aspect. However, the adviceexecution
    type should be used with caution.


    If it is used carelessly, there is a high risk of obtaining endless loops during
    the execution of the application.


    All the joinpoint types we have previously presented accept an expression as a
    parameter; this is not the case for adviceexecution. This joinpoint occurs when
    advice code, including advice code that will be associated with the joinpoint
    itself, is executed.


    Consider the following pointcut descriptor and advice code: pointcut aa(): adviceexecution();


    Object before(): aa() { ... }


    Before each execution of an advice code block, the aa pointcut launches the advice
    code that is given in the example. However, this advice code does not differ from
    any others—its execution triggers the occurrence of the pointcut, then the execution
    of the advice code, and so on. To avoid this endless loop, the adviceexecution
    type must be used with the filtering operators that the next section presents.


    Filtering Operators


    The joinpoints presented previously offer a rich syntax and can be used to define
    many different pointcut descriptors. You will learn in this section that they
    can also be combined with logical operators and that filtering operators allow
    you to restrict the set of caught joinpoints.


    **Logical Operations**


    Each defined pointcut descriptor can be compared to a Boolean function. For a
    given joinpoint, if the pointcut applies, the function returns true; if it does
    not apply, the function returns false.


    With this logical reasoning in mind, the use of the Boolean operations AND, OR,
    and NOT


    is intuitive. They correspond to the conjunction, disjunction, and negation of
    the occurrence of a joinpoint, respectively. AspectJ supports these three operations
    with their Java syntax: && for AND, || for OR, and ! for NOT.


    C H A P T E R 3 ■ A S P E C T J


    **39**


    The following expression encompasses the executions of the computeAmount method
    and of the getPrice method:


    execution( * Order.computeAmount(..) ) || execution( * Catalog.getPrice(..) )
    The evaluation of a pointcut descriptor is computed for every existing joinpoint.
    A given joinpoint can be either the execution of computeAmount or the execution
    of getPrice but never both at the same time. Consequently, the use of && instead
    of || in the previous pointcut descriptor will not intercept any joinpoint.


    The use of && instead of || in a pointcut descriptor is a frequent mistake. However,
    since the syntax of the expression is correct, the AspectJ compiler does not report
    an error. Only by using a tool such as the AJDT Eclipse plug-in for AspectJ (see
    Figure 3-1), which allows you to check the joinpoints that are associated with
    the pointcut, can you detect that no such points exist and that the pointcut descriptors
    are erroneous.


    In general, combining different joinpoint types in a pointcut descriptor must
    be done with the || operator.


    Pointcut descriptors can include tests. An expression containing if is followed
    by a Boolean expression and can be combined with any other pointcut expression.


    For instance, the expression


    if( thisJoinPoint.getArgs().length() == 1 )


    returns true when the current joinpoint defines only one parameter, and it returns
    false in the other cases.


    **Filtering**


    A pointcut descriptor such as get( * aop..*.items ) intercepts all the read operations
    on the items field. For the order-management application, two such joinpoints
    are included:


    • The joinpoint in the addItem method where items is read in order to call the
    put method.


    • The joinpoint in the computeAmount method where items is read in order to call
    get.


    In certain situations, it can be useful to restrict this set to contain only one
    joinpoint. The withincode keyword, associated with a method name, can be used
    for this purpose. The method name can contain wildcards (*, .., and +).


    The expression withincode(expr) will return true if the name of the method containing
    the joinpoint matches expr.


    The expression


    get( * aop..*.items ) && !withincode( * aop..*.computeAmount(..) ) designates
    all the read operations for the items field that are not defined in the computeAmount
    method.


    The use of || instead of && in the previous expression does not lead to the expected
    result.


    Indeed, !withincode(* aop..*.computeAmount(..)) is true for any joinpoint that
    is not in the computeAmount method. The evaluation of the expression with the
    logical OR operator is thus true for these joinpoints, and the pointcut intercepts
    more joinpoints than expected. In sum, no truly useful situation requires the
    joint usage of || and withincode.


    **40**


    C H A P T E R 3 ■ A S P E C T J


    The second keyword, within, exists for filtering joinpoints. This keyword is associated
    with a class or interface name and can contain wildcards. The within keyword allows
    you to retain joinpoints that are defined in a given class or set of classes.


    Two keywords, this and target, allow you to perform filtering depending on object
    references. You previously learned that getThis and getTarget return the current
    object and the target object of a call or execution joinpoint, respectively. For
    instance, for the call type, getThis returns the reference to the caller, and
    getTarget returns the reference to the called object. The this and target keywords
    play the same role for pointcut descriptors, and they apply filtering depending
    on the class of the current object or target object. Each is associated with a
    class or interface name and can contain wildcards.


    The expression


    call( * aop..*.addItem(..) ) && this(aop.aspectj.Order) is true for all the calls
    made to the addItem method by the Order class. This expression excludes any calls
    to addItem made by other classes.


    **Control-Flow Filtering**


    The filtering operators presented previously are static. They do not depend on
    the dynamics of the program or the way the program is run but only on its structure.
    Therefore, all the previous joinpoints can be statically computed without the
    program needing to be run.


    AspectJ defines two additional filtering operators, cflow and cflowbelow. These
    are referred to as *control-flow operators*. Intuitively, the control flow of
    a program encompasses all the methods that are visited during the program’s execution.


    To illustrate the way that cflow and cflowbelow work, take the example of a simple
    program that calls the Foo.foo and Bar.bar methods from the main method. The Foo.foo
    method also calls Bar.bar. This last method does not perform any calls.


    The following pointcut descriptors intercept the calls to the bar method only
    if bar is called from foo, so calls to bar from main are ignored:


    pointcut foopcd(): call( * Foo.foo(..) );


    pointcut callToBarInFoo(): call( * Bar.bar(..) ) && cflow( foopcd() ); The callToBarInFoo
    pointcut descriptor specifies that calls to bar only in the control flow of the
    foopcd pointcut descriptor are considered. The foopcd pointcut descriptor designates
    all the calls to the foo method.


    Intuitively, you can consider that the control flow of the program enters the
    foopcd pointcut when foo is called and exits the pointcut when the call returns.
    The expression cflow(foopcd()) designates all the joinpoints located between this
    entry point and exit point.


    More formally, the cflow operator is associated with a pointcut named p. All the
    joinpoints that occur between the moment the program encounters one of the joinpoints
    included in p and the moment the program exits this joinpoint are denoted by cflow(p()).


    The cflowbelow operator is similar to cflow except that the joinpoints belonging
    to p are not returned by cflowbelow.


    C H A P T E R 3 ■ A S P E C T J


    **41**


    **Pointcut Parameterization**


    In the previous sections, you learned about the keywords, operators, and symbols
    that can be used with AspectJ to define pointcuts. You learned that each pointcut
    descriptor is named and defined in an aspect, and that the advice code defines
    the treatment to be executed before and after the joinpoints that are denoted
    by their associated pointcuts.


    In OOP languages, the methods can be parameterized. In AOP, the parameterization
    also applies to pointcut descriptors. The parameters contain the information that
    is passed from the pointcut to the utilizing advice code.


    The parameters of a pointcut, like those of a method, are defined in parentheses
    after the name of the pointcut. Each parameter has a name and a type.


    The following toBeTraced pointcut descriptor defines four parameters (src, dst,
    ref, and qty):


    pointcut toBeTraced( Customer src, Order dst, String ref, int qty ) Pointcut parameters
    can pass three kinds of information: the source of the joinpoints that are included
    in the pointcut, the target of those joinpoints, and the parameters of those joinpoints.
    The goal is to expose the information from the joinpoint so the advice code can
    access that information.


    The source and target of the joinpoints are accessed with a modified version of
    the this and target operators, which we previously presented. Instead of being
    associated with a class name, the operators here use an identifier. The arguments
    of the joinpoints are accessed with the args operator followed by a list of identifiers.


    As an example, consider the following toBeTraced2 pointcut descriptor: pointcut
    toBeTraced2( Customer src, Order dst, String ref, int qty ) : call(* *.*(..))
    && this(src) && target(dst) && args(ref,qty); This example denotes all the calls
    (by the call(* *.*(..)) subexpression, specifies that the source must be bound
    to the src parameter (by the this(src) subexpression), that the target must be
    bound to dst (by the target(dst) subexpression), and that the arguments must be
    bound to the ref and qty variables (by the args(ref,qty) subexpression).


    Thanks to the type information that is given in the signature of the pointcut,
    you can deduce that the pointcut deals with calls to methods that the Order class
    defines, that take parameters of type String and int, and that are made from the
    Customer class.


    You previously saw that the source, target, and arguments could be accessed through
    the joinpoint-introspection mechanism and the thisJoinPoint keyword. As you have
    seen in this section, pointcut parameterization is an alternative means to achieve
    this end—but in a typed way. Furthermore, parameterizing a pointcut generally
    brings more-efficient run-time performances than introspection. The only drawback
    of parameterization is that the types need to be available at compile time, which
    is not always the case when programming generic pointcuts.


    **Summary of Pointcut Descriptors**


    The AspectJ pointcut language provides a rich syntax and many keywords. Compared
    to JAC, JBoss AOP, and AspectWerkz, which are presented in the following chapters,
    AspectJ can define pointcut descriptors that are more precise—although more complex
    to learn.


    **42**


    C H A P T E R 3 ■ A S P E C T J


