    **AOP 与事务的模块化集成**


    由于其灵活性，AOP 有助于以模块化方式集成事务，并避免之前遇到的限制。


    实际上，要使一个方法（此处为 `transferFunds`）具有事务性，可以使用清单 11-22 中所示的事务切面。


