    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    Creating an Application-Descriptor File


    Each JAC application is associated with a .jac file. This file provides information
    about the entry point of the application and the aspects that need to be initially
    woven. (See the


    “Configuring JAC Applications” section later in this chapter for more details
    on this application-descriptor file.)


    **An Example of an Application-Descriptor File**


    Listing 4-4 show the customer.jac file, which is a valid application-descriptor
    file for the order-management application.


    **Listing 4-4.** *The Application-Descriptor File for the Order-Management Application*
    applicationName: Order management


    launchingClass: aop.jac.Customer


    aspects: traceid traceaspect2.acc true


    jac.acs: traceid aop.jac.TraceAspect2


    An application-descriptor file consists of property names and property values.
    In this type of file, each line begins with a property name followed by a colon
    and ends with a property value. In Listing 4-4, the applicationName property defines
    a string that identifies the application, and the launchingClass property defines
    the fully qualified name of the class to be loaded to launch the application.


    The aspects and jac.acs properties deal with the aspects to be woven when the
    application starts. For the aspects property, each aspect is defined by three
    values: an identifier (here, traceid) that is chosen by the application–descriptor-file
    writer; the name of the aspect-descriptor file (here, traceaspect2.acc); and a
    Boolean value (here, true) that indicates whether the aspect is initially woven.
    For each identifier declared in an aspect, the jac.acs property defines the class
    that implements the aspect. In our example, the traceid identifier corresponds
    to the aop.jac.TraceAspect2 aspect.


    **Compiling a JAC Application**


    Five categories of files are to be included when programming with JAC:


    • The .java files of the application—in this case, Customer.java, Order.java,
    and Catalog.java.


    • The aspect files—here, just TraceAspect2.java.


    • The wrapper files—here, just TraceWrapper.java.


    • The aspect-configuration files—here, just traceaspect2.jac.


    • The application–descriptor file—here, customer.jac.


    The first three categories of files can be compiled by calling the regular Java
    compiler, javac or jikes, with the jac.jar JAC library referenced in the class
    path. The last two categories contain text files that will be loaded and parsed
    by the JAC runtime.


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    **67**


    If JAC was installed in the c:\jac directory, and all the application files were
    in the src directory, you would run the Java compiler with the following command:
    javac -d classes -classpath c:\jac\jac.jar src\*.java


    The resulting .class files would then be stored in the classes directory.


    **Running a JAC Application**


    An aspect-oriented application with JAC can be run by launching the framework
    with an application-descriptor file. The jac.jar library contains all the classes
    that are needed to launch the framework.


    To run the order-management application, the command is as follows: java -jar
    c:\jac\jac.jar -R c:\jac -C src;classes customer.jac The -R option indicates the
    JAC installation directory (c:\jac in our example). The -C


    option specifies the path-like structure (here, the src and classes directories)
    that JAC can load files from. The last parameter in the command line is the name
    of the application-descriptor file.


