    **159**


    ```

    20 protected abstract pointcut event();


    22 protected abstract void notifyEvent(Object subject,Object observer); 23


    24 after(Object s) : event() && target(s) {


    25 Enumeration elements = observers.elements();


    26 while (elements.hasMoreElements()) {


    27 Object o = elements.nextElement();


    28 notifyEvent(s,o);


    29 }


    30 }


    31 }

    ```


    The `AbstractObserverAspect` aspect provides two methods, `addObserver` and `removeObserver`,
    to register and remove observers.


    In the method `notifyEvent` (line 22), the pointcuts `subject` (line 18) and `event`
    (line 20) are code elements that are specific to the subject being observed. They
    are left abstract and will be defined in subaspects. The `notifyEvent` method
    will implement the reaction to a state change.


    The `event` pointcut will define the state changes of the event being observed.
    The `subject` pointcut will define the subject to be observed.


    An important point to notice is that the aspect `AbstractObserverAspect` is not
    a singleton (clause `pertarget` on line 6). One instance of this aspect exists
    per subject to be observed.


    The advice code defined on line 24 notifies all registered observers when a state
    change occurs.


    ## Implementation of Observers


    With the class `Stats` defined previously, this section illustrates the definition
    of an observer to monitor the addition and the removal of an order.


    The code of this observer is shown in Listing 8-10.


    **Listing 8-10.** *Concrete AspectJ Aspect to Bind the Observer Design Pattern
    to the Stats Class*


    ```

    1 package aop.patterns.observer;


    3 public aspect OrdersObserverAspect extends AbstractObserverAspect {


    5 protected pointcut subject() : initialization(Stats.new(..)); 6


    7 protected pointcut event() : set(int Stats.orders);


    9 protected void notifyEvent(Object s,Object o) {


    10 Stats statistics = (Stats)s;


    11 OrdersObserver observer = (OrdersObserver)o;


    12 observer.eventHandler(statistics.getOrders());


    13 }


    14 }

    ```


    **160**


    C H A P T E R 8 ■ D E S I G N P A T T E R N S A N D A O P


    ```

    16 public class OrdersObserver {


    17 public void eventHandler(int value) {


    18 System.out.println("Orders observer called with value: "+value); 19 }


    20 }

    ```


    The `OrdersObserver` class implements the observer, and the `OrdersObserverAspect`
    aspect defines the events and the observed subjects.


    The pointcut `event` (line 7) defines the events that are observed: in this example,
    the pointcut matches all the write operations performed on the field `Stats.order`.
    Thus, the observed events are the addition or the removal of an order.


    When such events occur, the advice code defined in the abstract `AbstractObserverAspect`
