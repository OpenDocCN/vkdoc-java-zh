    \ difficult to evaluate up front. They become important during development, when\
    \ the need for new functions makes the application's code more complex. Therefore,\
    \ it is important to possess experience in developing real-world applications\
    \ in order to accurately evaluate the advantages and disadvantages of a chosen\
    \ solution, whether with AOP or otherwise.\n\nAOP is a young field, and feedback\
