    J2EE 设计模式建议使用实体 EJB 来定义持久化业务对象。理论上，使用实体 EJB 可以简单地添加事务和持久化属性。然而，存在多种模式或框架能够以更简单、更高效的方式处理相同的问题。


    例如，使用 Hibernate 开源框架进行持久化是实体 EJB 的一种高效替代方案。大多数可用的框架不需要特定的扩展，业务对象被定义为 POJO 或传统的
    JavaBean。为了后续的演进，让业务对象尽可能独立于 EJB 对应用程序来说是有益的。


    常规实现


    清单 11-2 展示了将账户实现为实体 EJB 而不使用切面的方式。


