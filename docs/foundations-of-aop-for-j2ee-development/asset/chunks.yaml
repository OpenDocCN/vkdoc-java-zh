    \ the methods defined in classes that implement the `Remote` interface.\n\nPointcut\
    \ expressions can be combined with the logical AND, OR, and NOT operators (`AND`,\
    \ `OR`, and `!`). For example, the following expression\n\n```\n<bind pointcut=\"\
    execution(* Foo->foo()) OR execution(* Bar->bar())\" >\n```\n\nincludes all the\
    \ joinpoints where the `foo` method is executed and all the joinpoints where the\
