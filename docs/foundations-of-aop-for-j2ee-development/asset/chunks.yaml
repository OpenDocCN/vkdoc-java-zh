    随着应用程序的演进，前端控制器代码会变得更加复杂，并处理更多特定情况。避免此问题的一种策略是创建一个继承层次结构来替代过多的条件逻辑。例如，对于一个包含三个不同功能区域的应用程序，我们可以将共性抽象到超类中。尽管这种设计看似简单，但由于表示层及其相关需求复杂且经常被重新定义，因此编程实现起来既复杂又繁琐。


