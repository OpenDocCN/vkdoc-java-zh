    myOrder.addItem("CD",2);


    myOrder.addItem("DVD",1);


    double amount = myOrder.computeAmount();


    System.out.println("Order amount: US$"+amount);


    }


    public static void main(String[] args) {


    new Customer().run();


    }


    }


