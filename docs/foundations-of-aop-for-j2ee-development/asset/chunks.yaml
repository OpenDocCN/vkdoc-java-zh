    03     throws

    04     InvalidParameterException, AccountNotFoundException,

    05     InsufficientFundsException, InsufficientCreditException {

    06

    07     checkAccountArgs(amount, description, accountId);

    08     Account account;

    09     try {

    10         account = findAccountByPrimaryKey(accountId);

    11     } catch (Exception ex) {

    12         throw new AccountNotFoundException(accountId);

    13     }

    14     try {

    15         String type = account.getType();

    16         if (DomainUtil.isCreditAccount(type))

    17             throw new IllegalAccountTypeException(type);

    18         BigDecimal newBalance = account.getBalance().subtract(amount);

    19         if (newBalance.compareTo(bigZero) == -1)

    20             throw new InsufficientFundsException();

    21         account.setBalance(newBalance);

    22         createTx(amount.negate(), description, accountId, newBalance, account);

    23     } catch (RemoteException ex) {

    24         throw new EJBException("withdraw: " + ex.getMessage());

    25     }

    26 } // withdraw

    27 [...]

    ```


    In the preceding code, we can see the different tests implementing the preconditions
    (lines 8, 17, and 20). In this case, the preconditions can be split into two parts:


    - The part that checks the consistency of the parameters, implemented in `checkAccountArgs`
    (line 8). This is the *parameter precondition* part.

    - The part that is more business-related and that checks that the type of account
    allows the current withdrawal operation (line 17) and that the balance is high
    enough to perform the withdrawal (line 20). This is the *business precondition*
    part.


    ### AOP-based Implementation


    The following sections describe the use of AOP to implement the two precondition
    types previously encountered.


    #### Parameter Preconditions Aspect


    It is obvious that the first precondition part benefits from an AOP implementation.
    It is a generic test, which is systematically executed before each account operation,
    for instance, before credit and withdrawal operations. It is therefore a crosscutting
    concern that can be implemented as a pre-/postcondition aspect. With an aspect,
    the implementation is modular (see Listing 11-16).


