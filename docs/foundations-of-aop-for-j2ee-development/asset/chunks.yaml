    </sun-ejb-jar>


    These solutions simplify the programming task enormously, because rather than
    using APIs explicitly in our code, we configure the container declaratively. In
    this way, J2EE allows us to factor out a certain number of nonfunctional crosscutting
    concerns, a point that it has in common with AOP. The next section describes how
    AOP can be used to complement—or even replace—these solutions.


    **Using AOP**


    As you learned in Chapter 8, many design patterns can benefit from an aspect-oriented
    implementation. This also applies to a certain number of J2EE design patterns,
    where there are demonstrable advantages to using AOP. This is the case for the
    service locator and the business delegate, both evidently crosscutting. Other
    design patterns can also be improved by using AOP. For example, the facade and
    the business object can be made independent of the EJB


    technology used.'
