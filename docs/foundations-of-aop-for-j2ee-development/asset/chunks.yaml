    Overview of Other User-Interface Aspects


    In addition to the GuiAC aspect, the following aspects are available to handle
    interactions between the user and the application:


    • *Authentication aspect*: The AuthenticationAC aspect manages access control
    lists.


    Method executions can be restricted to authorized users.


    • *User-profile aspect*: The UserAC aspect manages user profiles.


    • *Session-management aspect*: The SessionAC aspect manages user sessions. Data
    that is dedicated to each individual user of the application can be stored and
    kept in memory while the user is connected to the application.


    • *Confirmation aspect*: The ConfirmationAC aspect displays dialog boxes that
    ask for confirmation from the user.


    **Using the Persistence and Transaction Aspects**


    The persistence aspect permits the saving of data in files or databases. This
    aspect is used to safely store any critical data that is used by an application.


    The transaction aspect provides a way to safely execute an action or a group of
    actions.


    A typical example of a *transaction* is a transfer between two bank accounts.
    In this case, the transfer must be completed or the part of the transaction that
    was already performed will be canceled.


    Both the persistence and transaction aspects use databases. The persistence aspect
    uses databases to safely save data; the transaction aspect uses databases to guarantee
    the properties of atomicity, coherence, isolation, and durability.


    JAC provides two versions of the persistence aspect: PersistenceAC and HibernateAC.


    PersistenceAC uses JDBC to save data in a file or database; HibernateAC uses the
    Hibernate (http://hibernate.bluemars.net) persistence framework.


    JAC provides two versions of the transaction aspect: TransactionAC and DisTransAC.


    TransactionAC performs simple transactions on objects that are stored in memory.
    This aspect does not manage data locking; hence, concurrent executions may give
    inconsistent results.


    DisTransAC uses the ObjectWeb Java Open Transaction Monitor (JOTM) transaction
    monitor.


    JOTM implements a two-phase validation protocol on data that is stored in databases
    and that can be distributed on different hosts of a network. (For more information
    about JOTM, see http://jotm.objectweb.org.)


    **Using the Distribution Aspects**


    JAC provides a set of aspects for executions that occur on hosts distributed over
    a network and for data that exists on such hosts. In this case, the application
    objects interact remotely with an aspect that implements communications based
    on the Java Remote Method Invocation (RMI) protocol. A prototype implementation
    of this aspect that is based on Common Object Request Broker Architecture (CORBA)
    Internet Inter-ORB Protocol (IIOP) is also available.


    Prior to the execution of a distributed application, JAC daemon servers must be
    launched on all the hosts that will take part in the application. Then, the following
    aspects can be used to implement distributed applications:


    **84**


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    • *Deployment aspect*: The DeploymentAC aspect deploys an application on a set
    of remote hosts. Starting from a reference host, the deployment process consists
    of uploading the bytecode of the classes onto selected hosts and then copying
    or instantiating the application objects on these hosts. Alternatively, DeploymentAC
    can install replicas of given objects onto different hosts. This feature constitutes
    the basic mechanism for providing fault-tolerant applications—whenever a host
    holding one of the replicas fails, any of the other hosts that are still running
    can replace the faulty host.


    • *Consistency aspect*: The ConsistencyAC aspect implements a memory-consistency
    protocol among replicas. The chosen protocol provides strong consistency—as soon
    as one of the replicas is modified, the modification is propagated to all the
    other replicas.


    The goal is to keep all the replicas synchronized with the same data.


    • *Broadcasting aspect*: The BroadcastingAC aspect broadcasts a method call to
    a set of distributed replicas.


    • *Load-balancing aspect*: The LoadBalancingAC aspect distributes requests to
    a set of replicas. By using this aspect, you take advantage of the computing power
    of several hosts. This aspect implements a simple round-robin algorithm for the
    load balancing.


    The distribution aspects can be used to distribute both application objects and
    aspect objects. Indeed, when managed by JAC, these types of objects contain no
    fundamental differences. Hence, aspect objects can be remotely deployed or replicated
    with DeploymentAC, and the different replicas can be managed by ConsistencyAC.


    Implementing a distributed application with JAC is not limited to using the four
    distribution aspects but also involves defining pointcuts. In the “Creating Pointcuts”
    section earlier in this chapter, you learned that you must provide three expressions
    to define a pointcut. These expressions define the objects, classes, and methods
    that are included in the pointcut. A fourth expression, called a *host expression*,
    comes into play when you program distributed applications.


    The host expression is a regular expression that specifies the hosts that are
    included in the pointcut. The joinpoints are filtered according to the objects,
    classes, methods, and hosts where the joinpoints occur. Pointcuts are then distributed
    and can include joinpoints located on different hosts.


    **Using Other Aspects**


    To conclude this presentation of the JAC aspects library, we present the following
    general-purpose aspects that are useful in several application contexts:


    • *Cache aspect*: The CacheAC aspect caches method results. When cached, the results
    can be reused without the re-execution of the methods. This speeds up the execution
    time of the application by avoiding unnecessary executions.


    • *Integrity aspect*: The IntegrityAC aspect implements referential-integrity
    constraints between sets of data. This aspect prevents the accidental deletion
    of data that is linked by a logical constraint. For example, when managing clients
    and invoices, the end user must not accidentally delete a client if invoices are
    still associated with the client. The IntegrityAC aspect performs checks that
    enforce such constraints.


