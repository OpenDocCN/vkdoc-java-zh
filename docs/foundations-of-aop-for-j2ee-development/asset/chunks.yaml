    on inheritance, for instance. Within this book, we refer to this technique as
    the *implicit protocol* technique for three reasons:


    • It defines a protocol as methods.


    • This protocol is private to the object but can be made public, for example,
    within an interface that would be implemented by the object.


    • Its implementation is implicitly handled by an external aspect.


    The following section uses this technique for object references resolving with
    research protocols similar to the loadCustomerIds method.


    **AOP VS. DESIGN PATTERNS**


    As explained previously in Chapter 8, AOP offers alternate solutions to design
    patterns. Whether or not to use AOP depends on the needs of the programmer. The
    choice is guided mostly by implementation concerns such as code modularity, complexity,
    and evolution. However, these criteria are subjective and often difficult to evaluate
    up front. They become important during development, when the need for new functions
    makes the application’s code more complex. Therefore, it is important to possess
    experience in developing real-world applications in order to accurately evaluate
    the advantages and disadvantages of a chosen solution, whether with AOP or otherwise.


    AOP is a young field, and feedback from those using it is still needed. This feedback
    should go far beyond regular design patterns, since AOP opens new possibilities.
    In the long term, good AOP practice should be identified and stated in a guide
    similar to the GoF’s book. In such a guide, aspect-oriented design patterns would
    most likely handle problems such as code reuse, complexity, modularity, and evolution.
    As of now, these problems are rarely ever handled by regular design patterns.'
