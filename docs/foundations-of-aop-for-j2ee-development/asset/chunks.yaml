    ## Application Controller


    The *application controller* design pattern centralizes the control and the invocation
    of the application-specific views and commands. Similar to the front controller,
    a typical design implies that a base class implements the commonalities of the
    controllers. Also, the use of an aspect can be more efficient than inheritance
    for factorization.


