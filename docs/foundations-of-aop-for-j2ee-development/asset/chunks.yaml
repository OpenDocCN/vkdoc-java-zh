    **The Business Object**


    J2EE design patterns advise the use of entity EJBs for the definition of persistent
    business objects. In theory, the use of an entity EJB allows the simple adding
    of transactional and persistence properties. However, several patterns or frameworks
    exist to deal with the same issues in a simpler and more efficient way.


    For example, using the Hibernate Open Source framework for persistence is an efficient
    replacement for entity EJBs. Most of the available frameworks do not require specific
    extensions, and business objects are defined as POJO or traditional JavaBeans.
    For further evolutions, it is interesting for the application to leave the business
    objects as independent as possible from EJBs.


