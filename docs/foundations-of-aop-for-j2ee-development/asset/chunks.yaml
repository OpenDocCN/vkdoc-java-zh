    \ behavior of the observed subjects is extended, but not modified.\n- **(Un)pluggability**:\
    \ The link between the observed subject and its observers is weak. The pointcuts\
    \ for events and subjects define precisely where the design pattern must be integrated.\n\
    \n## The Command Design Pattern\n\nThe third design pattern that we study with\
    \ regards to aspect-oriented programming techniques is the Command. We begin by\
    \ providing a quick description of this pattern, and proceed by giving an implementation\
    \ of the pattern using AspectJ. We then conclude this section with an evaluation\
    \ of the implementation.\n\n### Description\n\nThrough classes, the object-oriented\
    \ approach offers a good way for modularizing treatments that can be applied on\
    \ data. These treatments are defined in methods. All the instances of a class\
    \ share the same treatments. Moreover, these treatments are immutable: they never\
    \ change as long as the instance exists. Because of this immutability, the notion\
    \ of a method is a safe, but rigid, way for defining treatments.\n\nThe Command\
    \ design pattern provides a way of defining treatments independently from the\
    \ class where they will be applied. Several different commands can be defined\
    \ and assigned to as many classes as needed.\n\n### Aspect-oriented Implementation\n\
    \nThis section defines our aspect-oriented implementation of the Command design\
    \ pattern. As with the Observer design pattern, we define an abstract aspect that\
    \ provides the generic part of the implementation. This aspect is then extended\
    \ to be specialized for a real command.\n\n#### Generic Part of the Implementation\n\
    \nThe code that is shared by all commands is defined in the `AbstractCommandAspect`\
    \ aspect.\n\nListing 8-12 presents the code of this aspect.\n\n**Listing 8-12.**\
    \ *Implementation of the Command Design Pattern Using AspectJ*\n\n```\n1 package\
    \ aop.patterns.command;\n3 public abstract aspect AbstractCommandAspect pertarget(receiver()){\n\
    5     private Command command = null;\n6     public void setCommand(Command c)\
    \ {\n7         command = c;\n8     }\n10    protected abstract pointcut receiver();\n\
    12    protected abstract pointcut execute();\n14    before(Object receiver) :\
    \ execute() && target(receiver) {\n15        command.execute(receiver);\n16  \
    \  }\n17 }\n```\n\nThe preceding aspect implements the `setCommand` method, which\
    \ sets the command to be executed. Commands implement the `Command` interface,\
    \ which defines a single `execute` method. This method takes as a parameter the\
    \ object (a `Receiver`'s instance) that receives the command.\n\nThe code of these\
    \ two types appears in Listing 8-13.\n\n**Listing 8-13.** *Interfaces to Be Used\
    \ with the Command Design Pattern*\n\n```\npublic interface Command {\n    public\
    \ void execute(Receiver receiver);\n}\npublic interface Receiver {\n    public\
    \ void setCommand(Command command);\n}\n```\n\nTwo abstract pointcuts, `receiver`\
    \ and `execute`, are defined in the `AbstractCommandAspect` aspect. The `receiver`\
    \ pointcut designates the classes where the command is run. The `execute` pointcut\
    \ designates the event that triggers the execution of the command. Notice that\
    \ only one instance of the `AbstractCommandAspect` aspect exists per receiver:\
    \ commands are not shared by receivers, and each different receiver handles its\
    \ own commands.\n\nFinally, a \"before\" advice (line 14) is defined to launch\
    \ the execution of the command. This advice code is executed before the joinpoints\
    \ included in the `execute` pointcut; in other words, before the events that will\
    \ be designated as triggers. Notice that this pointcut is parameterized with the\
    \ target object of the joinpoint, that is to say, the object where the command\
    \ is to be performed.\n\n#### Implementation of Commands\n\nA concrete aspect\
    \ can now be defined to integrate the Command pattern into the `Stats` class (see\
    \ Listing 8-14).\n\n**Listing 8-14.** *Concrete AspectJ Aspect to Bind the Command\
    \ Design Pattern to the Stats Class*\n\n```\n1 package aop.patterns.command;\n\
    ```"
  raw: '• *Composition transparency*: The aspect is not invasive. The behavior of
    the observed subjects is extended, but not modified.


    • *(Un)pluggability*: The link between the observed subject and its observers
    is weak. The pointcuts for events and subjects define precisely where the design
    pattern must be integrated.


    **The Command Design Pattern**


    The third design pattern that we study with regards to aspect-oriented programming
    techniques is the Command. We begin by providing a quick description of this pattern,
    and proceed by giving an implementation of the pattern using AspectJ. We then
    conclude this section with an evaluation of the implementation.


    **Description**


    Through classes, the object-oriented approach offers a good way for modularizing
    treatments that can be applied on data. These treatments are defined in methods.
    All the instances of a class share the same treatments. Moreover, these treatments
    are immutable: they never change as long as the instance exists. Because of this
    immutability, the notion of a method is a safe, but rigid, way for defining treatments.


    The Command design pattern provides a way of defining treatments independently
    from the class where they will be applied. Several different commands can be defined
    and assigned to as many classes as needed.


    **Aspect-oriented Implementation**


    This section defines our aspect-oriented implementation of the Command design
    pattern. As with the Observer design pattern, we define an abstract aspect that
    provides the generic part of the implementation. This aspect is then extended
    to be specialized for a real command.


    Generic Part of the Implementation


    The code that is shared by all commands is defined in the AbstractCommandAspect
    aspect.


    Listing 8-12 presents the code of this aspect.


    **162**


    C H A P T E R 8 ■ D E S I G N P A T T E R N S A N D A O P


    **Listing 8-12.** *Implementation of the Command Design Pattern Using AspectJ*


    1 package aop.patterns.command;


    3 public abstract aspect AbstractCommandAspect pertarget(receiver()){


    5 private Command command = null;


    6 public void setCommand(Command c) {


    7 command = c;


    8 }


    10 protected abstract pointcut receiver();


    12 protected abstract pointcut execute();


    14 before(Object receiver) : execute() && target(receiver) {


    15 command.execute(receiver);


    16 }


    17 }


    The preceding aspect implements the setCommand method, which sets the command
    to be executed. Commands implement the Command interface, which defines a single
    execute method.


    This method takes as a parameter the object (a Receiver’s instance) that receives
    the command.


    The code of these two types appears in Listing 8-13.


    **Listing 8-13.** *Interfaces to Be Used with the Command Design Pattern* public
    interface Command {


    public void execute(Receiver receiver);


    }


    public interface Receiver {


    public void setCommand(Command command);


    }


    Two abstract pointcuts, receiver and execute, are defined in the AbstractCommandAspect
    aspect. The receiver pointcut designates the classes where the command is run.
    The execute pointcut designates the event that triggers the execution of the command.
    Notice that only one instance of the AbstractCommandAspect aspect exists per receiver:
    commands are not shared by receivers, and each different receiver handles its
    own commands.


    Finally, a “before” advice (line 14) is defined to launch the execution of the
    command. This advice code is executed before the joinpoints included in the execute
    pointcut; in other words, before the events that will be designated as triggers.
    Notice that this pointcut is parameterized with the target object of the joinpoint,
    that is to say, the object where the command is to be performed.


    C H A P T E R 8 ■ D E S I G N P A T T E R N S A N D A O P


    **163**


    Implementation of Commands


    A concrete aspect can now be defined to integrate the Command pattern into the
    Stats class (see Listing 8-14).


    **Listing 8-14.** *Concrete AspectJ Aspect to Bind the Command Design Pattern
    to the Stats Class* 1 package aop.patterns.command;'
  trans: "\n•   *组合透明性*：该方面不具有侵入性。被观察对象的行为得到了扩展，但未被修改。\n•   *（可）插拔性*：被观察对象与其观察者之间的联系是松散的。事件和对象上的切入点精确定义了设计模式必须集成的位置。\n\
    \n**命令设计模式**\n\n我们针对面向方面编程技术研究的第三种设计模式是命令模式。我们首先对该模式进行简要描述，然后给出使用 AspectJ 实现该模式的方案。最后，我们将对该实现进行评估，以此作为本节的结论。\n\
    \n**描述**\n\n通过类，面向对象方法为模块化处理可应用于数据的操作提供了一种良好方式。这些操作在方法中定义。一个类的所有实例共享相同的操作。此外，这些操作是不可变的：只要实例存在，它们就永远不会改变。由于这种不变性，方法的概念是一种安全但僵化的定义操作的方式。\n\
    \n命令设计模式提供了一种独立于操作将被应用的类来定义操作的方式。可以定义多个不同的命令，并根据需要将它们分配给任意数量的类。\n\n**面向方面的实现**\n\
    \n本节定义了命令设计模式的面向方面实现。与观察者设计模式一样，我们定义了一个抽象方面，它提供了实现的通用部分。然后扩展该方面，使其专门用于实际的命令。\n\
    \n实现的通用部分\n\n所有命令共享的代码在 `AbstractCommandAspect` 方面中定义。\n\n清单 8-12 展示了该方面的代码。\n\
    \n**162**\n\n第 8 章 ■ 设计模式与 AOP\n\n**清单 8-12.** *使用 AspectJ 实现命令设计模式*\n\n```java\n\
    1 package aop.patterns.command;\n\n3 public abstract aspect AbstractCommandAspect\
    \ pertarget(receiver()){\n\n5 private Command command = null;\n6 public void setCommand(Command\
    \ c) {\n7     command = c;\n8 }\n\n10 protected abstract pointcut receiver();\n\
    \n12 protected abstract pointcut execute();\n\n14 before(Object receiver) : execute()\
    \ && target(receiver) {\n15     command.execute(receiver);\n16 }\n17 }\n```\n\n\
    上述方面实现了 `setCommand` 方法，该方法用于设置要执行的命令。命令实现了 `Command` 接口，该接口定义了一个单一的 `execute`\
    \ 方法。该方法接收一个对象（一个 `Receiver` 的实例）作为参数，该对象是命令的接收者。\n\n这两种类型的代码出现在清单 8-13 中。\n\n\
    **清单 8-13.** *与命令设计模式一起使用的接口*\n```java\npublic interface Command {\n    public\
    \ void execute(Receiver receiver);\n}\n\npublic interface Receiver {\n    public\
    \ void setCommand(Command command);\n}\n```\n\n在 `AbstractCommandAspect` 方面中定义了两个抽象切入点：`receiver`\
    \ 和 `execute`。`receiver` 切入点指定了运行命令的类。`execute` 切入点指定了触发命令执行的事件。请注意，每个接收者只存在一个\
    \ `AbstractCommandAspect` 方面的实例：命令不被接收者共享，每个不同的接收者处理自己的命令。\n\n最后，定义了一个“前置”通知（第\
    \ 14 行）来启动命令的执行。该通知代码在 `execute` 切入点包含的连接点之前执行；换句话说，在将被指定为触发器的事件之前执行。请注意，此切入点使用连接点的目标对象进行参数化，即要执行命令的对象。\n\
    \n第 8 章 ■ 设计模式与 AOP\n\n**163**\n\n命令的实现\n\n现在可以定义一个具体方面，将命令模式集成到 `Stats` 类中（见清单\
    \ 8-14）。\n\n**清单 8-14.** *将命令设计模式绑定到 Stats 类的具体 AspectJ 方面*\n```java\n1 package\
    \ aop.patterns.command;\n```\n"
- fmt: "2 public aspect `CommandAspect` extends `AbstractCommandAspect` {\n\n3 public\
    \ void `Stats.save()` {}\n\n4 protected pointcut `receiver()` : initialization(`Stats.new(..)`);\
    \ 5 protected pointcut `execute()` : call(void `Stats.save()`); 6 }\n\nThis aspect\
    \ designates the instances of the `Stats` class as the receivers of the pattern\
    \ (line 4).\n\nAn empty method, named `save`, is introduced in the `Stats` class.\
    \ Call operations on this method are included in the `execute` pointcut (line\
    \ 5). Given the definition of the “before” advice in `AbstractCommandAspect`,\
    \ the command will be executed before the calls to the `save` method.\n\nSeveral\
    \ new commands can now be defined and associated to the `Stats` class. The `FileSaver`\
    \ class, shown in Listing 8-15, provides an example of such a command.\n\n**Listing\
    \ 8-15.** *FileSaver Command*\n\n```\npackage aop.patterns.command;\n\nimport\
    \ java.io.FileOutputStream;\nimport java.io.PrintWriter;\n\npublic class FileSaver\
    \ implements Command {\n\n    private String fileName;\n\n    public FileSaver(String\
    \ fileName) {\n        this.fileName = fileName;\n    }\n\n    public void execute(Receiver\
    \ receiver) {\n        Stats stats = (Stats)receiver;\n        try {\n       \
    \     FileOutputStream output = new FileOutputStream(fileName);\n            PrintWriter\
    \ writer = new PrintWriter(output);\n            writer.println(\"STATISTICS\"\
    );\n            writer.println(\"Number of orders: \"+stats.getOrders());\n  \
    \          writer.println(\"Total amount: \" +stats.getTotalAmount());\n     \
    \       writer.println(\"Status: \"+stats.getStatus());\n            writer.flush();\n\
    \            writer.close();\n        }\n        catch (Exception e) {\n     \
    \       System.err.println(e);\n        }\n    }\n}\n```\n\nThe `CommandExample`\
    \ class in Listing 8-16 provides a way of testing the aspect-oriented implementation\
    \ of the Command design pattern with the command `FileSaver`.\n\n**Listing 8-16.**\
    \ *Main Class for Testing the Command Design Pattern*\n\n```\npackage aop.patterns.command;\n\
    \npublic class CommandExample {\n\n    public static void main(String[] args)\
    \ {\n        Stats stats = new Stats();\n        CommandAspect.aspectOf(stats)\n\
    \            .setCommand(new FileSaver(\"c://temp/statistics.txt\"));\n      \
    \  stats.incOrders();\n        stats.addAmount(10);\n        stats.incOrders();\n\
    \        stats.addAmount(10);\n        stats.incOrders();\n        stats.addAmount(10);\n\
    \        stats.save();\n    }\n}\n```\n\nWhen run, this program generates a text\
    \ file that contains the following data:\n\n```\nSTATISTICS\nNumber of orders:\
    \ 3\nTotal amount: 30.0\nStatus: OK\n```\n\n**Evaluation of the Implementation**\n\
    \nWith the four criteria defined by Hannemann and Kiczales, we can evaluate our\
    \ implementation as follows.\n\n- *Locality*: The class that receives commands\
    \ is free from any code managing these commands. This code is located in the `AbstractCommandAspect`\
    \ abstract aspect. The calls to commands are handled by concrete aspects that\
    \ extend `AbstractCommandAspect`.\n- *Reusability*: The management of commands\
    \ is reused systematically.\n- *Composition transparency*: The aspect is not invasive.\
    \ The behavior of the classes that receives commands is extended, but not modified.\n\
    - *(Un)pluggability*: The link between the commands and the receivers of a command\
    \ is weak. The pointcuts for receivers and executions define precisely where the\
    \ design pattern must be integrated.\n\n**The Chain of Responsibility Design Pattern**\n\
    \nThe fourth design pattern that we study with regards to aspect-oriented programming\
    \ techniques is the Chain of Responsibility. We begin by providing a quick description\
    \ of this pattern, and proceed by giving an implementation of the pattern using\
