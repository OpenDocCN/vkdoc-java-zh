    As you can see, testing an invariant is similar to testing a postcondition, except
    that the target object’s state has to be accessed through the java.lang.reflect
    API.


    **Testing Applications**


    To guarantee Quality of Service for the end user, applications need to be tested.
    Since AOP


    allows code instrumentation for controlling and logging an application’s execution,
    AOP is a useful tool for implementing tests in a simple way.


    Two main categories of tests exist:


    • Structural


    • Functional


    A *structural test*, or *white-box test*, verifies the application by checking
    its static structure (its code or any equivalent representation). Such a test
    aims to identify static problems—such as bad programming practice, unused variables,
    and unused methods—in the implementation of the application. A typical structural
    test is *coverage analysis*, which consists of executing the application in order
    to detect unused parts. Note that the Java compiler already implements some of
    these verifications—locally, within method bodies.


    A *functional test*, or *black-box test*, verifies that the behavior of the application
    is consistent with its specification. Functional tests are widely used in the
    development process. In particular, these tests can be automatically generated
    from scenarios, which are identified during the analysis and design stages. Among
    the functional tests, the *nonregression tests* consist of executing two different
    versions of the application with the same scenarios. The purpose of such tests
    is to detect potential differences in the behavior of the different versions.


    The following sections show how AOP can be used to implement some of these tests.


