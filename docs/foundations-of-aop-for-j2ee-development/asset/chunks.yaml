    jboss-aop.xml 文件实现


    **织入器实现**


    面向切面系统的核心是*切面织入器*。它是一种用于将切面与类集成的工具。存在多种执行织入的方式。AspectJ 采用编译时织入器，这是语言方法的典型特征；而
    JAC、JBoss AOP 和 Spring AOP 则使用运行时织入器，这是框架方法的典型特征。


    AspectJ 织入器可以接受源代码或字节码作为输入。除了编译时织入模式外，还有一种加载时模式，即当应用程序的字节码加载到 JVM 中时，可以织入切面。编译时（或加载时）织入的优势在于，它生成的织入后应用程序的执行时间优于运行时织入。其缺点在于，执行代码中切面代码与应用程序代码之间没有区别。如果程序员需要修改、添加或移除某个切面，则必须重新织入整个应用程序。


    使用 JAC、JBoss AOP 和 Spring AOP 时，类和切面是分别编译的，织入在应用程序加载和执行时进行。切面和类实例是独立的运行时实体，织入器根据织入指令协调执行。在这种模式下，织入是一种非常类似于绑定的操作：一个切面实例被绑定到该切面所应用的对象上。这种模式的优势在于绑定可以动态修改，从而无需重新编译应用程序即可移除切面并织入新切面。此功能对于像
    Web 服务器这样需要随时可用的应用程序非常有用，因为可以在不停止应用程序的情况下部署新功能。运行时织入的缺点之一是应用程序通常比静态织入的应用程序运行速度慢。


    请注意，尽管 AspectJ 也可以实现运行时织入，但这不太自然，因为 AspectJ 遵循语言方法。编译器执行的大部分类型检查将被禁用，这将抹去语言方法的大部分优势。


    另一方面，框架方法很难实现编译时织入，因为它意味着需要某种预处理工具，而语言方法实现这种工具要高效得多。


    第 7 章 ■ AOP 工具比较


    **139**


    **切面**


    我们已经提到，AspectJ 是一种拥有自己语法（在 AspectJ 5 版本中，这种专用语法可以被注解替代）的语言，而 JAC、JBoss AOP 和 Spring
    AOP 是框架。


    在 AspectJ 中，切面是定义切入点（pointcuts）和通知（advice）代码的软件实体，它们也可以定义字段和方法。切面继承已经实现，但与类继承相比有一些限制。一个具体切面可以扩展一个抽象切面，但不能扩展另一个具体切面。


    在 JAC 中，切面是扩展了 JAC 库提供的 `AspectComponent` 类的常规 Java 类。一个切面定义切入点，通知代码则写在独立的*包装类*中。JAC
    的关键特性之一被称为*切面配置*机制。此工具允许程序员定义切面如何在不同应用程序中重用，同时还能根据每个应用程序的需求进行定制。为此，一组配置元素从切面中外部化到一些配置文件中，这些文件可以在不重新编译整个应用程序的情况下进行修改。


    JBoss AOP 中的切面概念被拆分为两种文件：拦截方法或拦截器实现通知代码，并在 Java 类中定义；切入点将这些拦截器与连接点关联起来，并在 XML
    文件中定义。在 JBoss AOP 的较新版本中，这种区别消失了；与 AspectJ 类似，切入点可以使用 Java 5 注解来定义。


    在 Spring AOP 中，通知和切入点是在常规 Java 类中实现的，这些类被配置为 bean。依赖注入原则允许配置通知和切入点之间的链接。没有显式的切面实体；然而，一个切面可以被视为一组*顾问（advisors）*。


    对这四种工具的研究表明，切面的概念对于 AOP 来说并非强制性的。实际的主要概念是切入点和通知，以及将它们链接在一起的方式。一个切面不过是一组在逻辑上与某个关注点相关的切入点和通知。然而，使这种逻辑链接显式化并非强制要求，能够独立于给定切面来定义通知和切入点也是有用的。在这种情况下，我们可以称这些为匿名切入点或通知。


    除了汇集切入点和通知之外，切面的一个重要角色是作为特定关注点的配置单元。正如刚才通过 JAC 的切面配置机制所解释的，配置能力对于切面重用至关重要。我们将在本章后面详细说明此功能。然而，当一个系统已经原生支持配置层（例如
    Spring bean 配置层）时，就不需要切面概念了。它从包含切入点和通知的某些配置中涌现出来。


    **切入点**


    回顾一下，*切入点*是一组代码位置，称为*连接点*，切面可以在这些位置被织入。这个想法是 AOP 的核心。切入点定义了切面的横切性质。


    一个切入点“谈论”应用程序，并指定切面应用的战略位置。


    **140**


    第 7 章 ■ AOP 工具比较


    在本节中，我们将总结如何编写切入点，以及本书中介绍的各种面向切面语言和框架所支持的连接点类型。


    **切入点定义**


    所有现有的面向切面工具都提供了一种切入点语言，用于定义包含在切入点中的连接点集合。基本上，这种切入点语言可以被视为一种查询语言。查询所应用的结构不是经典的数据库，而是一个程序。这里的目标是定义一种语言，允许开发者以尽可能简单和实用的方式编写相关查询。因此，一种切入点语言通常定义几个关键字、经典的布尔运算符（AND、OR、NOT）以及通配符（例如字符
    *），以便简洁地选择连接点集合。


    在 AspectJ 中，切入点使用专用语法（关键字 `pointcut`）或 Java 5 注解来定义。JAC 切入点通过调用一个使用 GNU 正则表达式的
    API 来定义，该正则表达式基于类名、对象名和方法签名来定义连接点集合。JBoss AOP 切入点可以定义为 XML 标签或 Java 5 注解。Spring
    AOP 切入点可以在 XML 中定义，也可以通过 Java 程序化地定义。

    '
- fmt: "# AOP Tools Comparison\n\nMost of the time, pointcuts are dependant on the\
    \ structure of the application. If the application code changes, the locations\
    \ where an aspect applies will most likely change too. The situation is similar\
    \ when programmers want to reuse their aspects with distinct applications: pointcuts\
    \ have to be adapted to the new application. This is why the aspect configuration\
    \ process mentioned in the previous section is so important. Note that with the\
    \ language approach (`AspectJ`), which implements the weaving at compile time,\
    \ the joinpoints belonging to a given pointcut can be determined at compile time,\
    \ which is hardly the case for frameworks. With the right tools (e.g., the `AJDT\
    \ Eclipse` plug-in), aspect programmers can have better control over their programs\
    \ with the language approach.\n\nAs we said, pointcuts can be seen as queries\
    \ on the program. These queries return a set of joinpoints where the aspects apply.\
    \ An aspect tool is characterized by the supported types of joinpoints. For a\
    \ given program, a type of joinpoint is materialized as a set of joinpoint shadows—that\
    \ is, all the program locations that correspond to a given joinpoint type. For\
    \ instance, the *method call* joinpoint type corresponds to all the places where\
    \ a method is called.\n\nIn the next section, we’ll look at a comparison of the\
    \ tools’ supported joinpoint types.\n\n## Joinpoint Types\n\n`AspectJ` is the\
    \ AOP tool that supports the largest set of joinpoint types. We’ll examine in\
    \ this section the types of joinpoints supported by `AspectJ`, `JAC`, `JBoss AOP`,\
    \ and `Spring AOP`.\n\n- *Method execution*: All AOP tools support this except\
    \ `Spring`, which supports transparent proxying.\n- *Method call*: This type is\
    \ supported by `AspectJ` and `JBoss AOP`. `JAC` does not support it.\n\nWhen programming\
    \ applications with remote communications, however, the method calls can be intercepted\
    \ by wrapping the client-side proxy, which is rather similar to a method call\
    \ joinpoint. `Spring` supports transparent proxying, which can be seen as a method\
    \ call pointcut.\n\n- *Constructor execution*: All AOP tools except `Spring` support\
    \ this type of joinpoint.\n- *Inherited constructor execution*: When a constructor\
    \ calls a superconstructor, `AspectJ` can distinguish the execution of the current\
    \ constructor from that of the inherited one.\n- *Field read*: `AspectJ` and `JBoss\
    \ AOP` can weave aspects around this joinpoint type. `JAC` and `Spring` do not\
    \ support it directly. However, `JAC` performs a bytecode analysis to detect methods\
    \ that read fields.\n- *Field write*: This joinpoint type is similar to the field\
    \ read type.\n- *Exception*: `AspectJ` can intercept the start of an exception\
    \ catch block. Neither `JBoss AOP`, `JAC`, nor `Spring` supports this joinpoint\
    \ type. However, they support some “after throwing” advice (exception handlers\
    \ in `JAC`), which modularize the handling of an exception for all the joinpoints\
    \ included in a pointcut. Note that the “after throwing” advice (which is also\
    \ supported by `AspectJ`) is less powerful than the catch block notification,\
    \ because it does not allow the aspect to modify the way a base program deals\
    \ with existing exceptions.\n- *Static block execution*: This joinpoint type is\
    \ supported by `AspectJ`, but not by the other tools.\n- *Advice code execution*:\
    \ This is an `AspectJ` joinpoint type. With the other tools, advice code is defined\
    \ in a regular Java method. Programmers can thus aspectize the executions and\
    \ the calls of these methods.\n- *Control flow*: `AspectJ` supports joinpoint\
    \ types that correspond to entry into and the exit from a control flow. This feature\
    \ is not available with `JBoss AOP` or `JAC`; however, programmers can emulate\
    \ it. `Spring AOP` supports some kinds of `cflow`.\n\nIt is interesting to note\
    \ that tools that follow the framework approach (`JAC`, `JBoss`, and `Spring`)\
    \ support fewer joinpoint types than `AspectJ`. There are several reasons for\
    \ this, both technology and integration related.\n\nOn the technology side, since\
    \ frameworks are written in pure Java and use reflection, bytecode manipulation,\
    \ and proxying techniques for their implementations, it is more complicated for\
    \ them to implement fine-grained joinpoint types such as, for instance, exception\
    \ catches.\n\nRegarding integration, since the framework approaches are placed\
    \ in the context of component frameworks (`EJB` for `JBoss` and simple beans for\
    \ `JAC` and `Spring`), they often deliberately decide to not support very fine-grained\
    \ joinpoints in order to maintain the encapsulation principle for the aspectized\
    \ components. For instance, `Spring` and `JAC` deliberately do not support field\
    \ read/write joinpoint types so that the advice can be applied only to the component\
    \ interface (i.e., the fixed part of the components). As another example, `Spring\
    \ AOP` does not support constructor execution joinpoints because it may interfere\
    \ with the construction process implemented in the `Spring` factory. Of course,\
    \ these restrictions make the AOP frameworks less flexible than `AspectJ`. On\
    \ the other hand, they prevent the programmers from misusing the framework, and\
    \ they make the AOP programs more reusable. For example, refactoring a class by\
    \ changing its implementation and fields, but not its interface, may impact an\
    \ `AspectJ` pointcut, but it will never impact a `JAC` or `Spring` pointcut, since\
    \ they do not support field interception.\n\nAnother important point is that some\
    \ advanced joinpoint types of AOP provided by `AspectJ` can be implemented by\
    \ using less advanced features. For instance, the `cflow` feature can be simply\
    \ implemented by using execution advice and standard thread-local variables (`java.lang.ThreadLocal`).\
    \ This justifies the fact that these types of joinpoints, although useful for\
    \ simplification and clarity, are not always provided.\n\n## Advice\n\nPointcuts\
    \ allow programmers to define where an aspect applies. The concept of advice code\
    \ defines the behavior of an aspect—in other words, advice code states what an\
    \ aspect is doing.\n\nThe terms used for the code structure that defines the behavior\
    \ of an aspect varies from *advice code* (`AspectJ`), to *wrapper* (`JAC`), to\
    \ *interceptor* (`JBoss AOP` and `Spring AOP`). However, the idea behind these\
    \ terms is the same: to define the instructions that will be executed before and\
    \ after the joinpoints.\n\n### Advice Code Types\n\nThe three main types of advice\
    \ code are “before,” “after,” and “around.”\n\n- “Before” advice code is executed\
    \ before the joinpoints.\n- “After” advice code is executed after the joinpoints.\
    \ There are two main types of “after” advice code:\n  - “After returning” advice\
    \ code is executed after a normal execution/invocation.\n  - “After throwing”\
    \ advice code is executed after an abnormal execution/invocation, which leads\
    \ to an exception being thrown.\n- “Around” advice code is executed both before\
    \ and after the joinpoints.\n\n`AspectJ` and `Spring` provide all of these advice\
    \ code types, while `JAC` and `JBoss AOP` chose to provide only the “around” advice\
    \ code type. Indeed, “around” advice code entails all the other kinds of advice.\
    \ For instance, “before” advice code can be seen as “around” code that calls `proceed`\
    \ and where the “after” part is missing. As another example, “after throwing”\
    \ advice code is “around” advice code that encapsulates the call to `proceed`\
    \ in a `try/catch` block.\n\nProviding the “before” and “after” constructs has\
    \ several advantages. First, it makes the aspect code clearer, as programmers\
    \ can easily see what kind of function is implemented, without having to look\
    \ at the advice code. Second, it helps programmers avoid programming mistakes\
    \ such as forgetting to proceed to the joinpoint. Third, “before” and “after”\
    \ advice code can be implemented more efficiently by the AOP frameworks, since\
    \ the reification of the joinpoint is not needed in these cases (see the “before”\
    \ and “after” advice code in Chapter 6)."
  raw: 'Most of the time, pointcuts are dependant on the structure of the application.
    If the application code changes, the locations where an aspect applies will most
    likely change too. The situation is similar when programmers want to reuse their
    aspects with distinct applications: pointcuts have to be adapted to the new application.
    This is why the aspect configuration process mentioned in the previous section
    is so important. Note that with the language approach (AspectJ), which implements
    the weaving at compile time, the joinpoints belonging to a given pointcut can
    be determined at compile time, which is hardly the case for frameworks. With the
    right tools (e.g., the AJDT Eclipse plug-in), aspect programmers can have better
    control over their programs with the language approach.


    As we said, pointcuts can be seen as queries on the program. These queries return
    a set of joinpoints where the aspects apply. An aspect tool is characterized by
    the supported types of joinpoints. For a given program, a type of joinpoint is
    materialized as a set of joinpoint shadows—that is, all the program locations
    that correspond to a given joinpoint type. For instance, the *method call* joinpoint
    type corresponds to all the places where a method is called.


    In the next section, we’ll look at a comparison of the tools’ supported joinpoint
    types.


    **Joinpoint Types**


    AspectJ is the AOP tool that supports the largest set of joinpoint types. We’ll
    examine in this section the types of joinpoints supported by AspectJ, JAC, JBoss
    AOP, and Spring AOP.


    • *Method execution*: All AOP tools support this except Spring, which supports
    transparent proxying.


    • *Method call*: This type is supported by AspectJ and JBoss AOP. JAC does not
    support it.


    When programming applications with remote communications, however, the method
    calls can be intercepted by wrapping the client-side proxy, which is rather similar
    to a method call joinpoint. Spring supports transparent proxying, which can be
    seen as a method call pointcut.


    • *Constructor execution*: All AOP tools except Spring support this type of joinpoint.


    C H A P T E R 7 ■ A O P T O O L S C O M P A R I S O N


    **141**


    • *Inherited constructor execution*: When a constructor calls a superconstructor,
    AspectJ


    can distinguish the execution of the current constructor from that of the inherited
    one.


    • *Field read*: AspectJ and JBoss AOP can weave aspects around this joinpoint
    type. JAC and Spring do not support it directly. However, JAC performs a bytecode
    analysis to detect methods that read fields.


    • *Field write*: This joinpoint type is similar to the field read type.


    • *Exception*: AspectJ can intercept the start of an exception catch block. Neither
    JBoss AOP, JAC, nor Spring supports this joinpoint type. However, they support
    some “after throwing” advice (exception handlers in JAC), which modularize the
    handling of an exception for all the joinpoints included in a pointcut. Note that
    the “after throwing”


    advice (which is also supported by AspectJ) is less powerful than the catch block
    notification, because it does not allow the aspect to modify the way a base program
    deals with existing exceptions.


    • *Static block execution*: This joinpoint type is supported by AspectJ, but not
    by the other tools.


    • *Advice code execution*: This is an AspectJ joinpoint type. With the other tools,
    advice code is defined in a regular Java method. Programmers can thus aspectize
    the executions and the calls of these methods.


    • *Control flow*: AspectJ supports joinpoint types that correspond to entry into
    and the exit from a control flow. This feature is not available with JBoss AOP
    or JAC; however, programmers can emulate it. Spring AOP supports some kinds of
    cflow.


    It is interesting to note that tools that follow the framework approach (JAC,
    JBoss, and Spring) support fewer joinpoint types than AspectJ. There are several
    reasons for this, both technology and integration related.


    On the technology side, since frameworks are written in pure Java and use reflection,
    bytecode manipulation, and proxying techniques for their implementations, it is
    more complicated for them to implement fine-grained joinpoint types such as, for
    instance, exception catches.


    Regarding integration, since the framework approaches are placed in the context
    of component frameworks (EJB for JBoss and simple beans for JAC and Spring), they
    often deliberately decide to not support very fine-grained joinpoints in order
    to maintain the encapsulation principle for the aspectized components. For instance,
    Spring and JAC deliberately do not support field read/write joinpoint types so
    that the advice can be applied only to the component interface (i.e., the fixed
    part of the components). As another example, Spring AOP


    does not support constructor execution joinpoints because it may interfere with
    the construction process implemented in the Spring factory. Of course, these restrictions
    make the AOP


    frameworks less flexible than AspectJ. On the other hand, they prevent the programmers
    from misusing the framework, and they make the AOP programs more reusable. For
    example, refactoring a class by changing its implementation and fields, but not
    its interface, may impact an AspectJ pointcut, but it will never impact a JAC
    or Spring pointcut, since they do not support field interception.


    Another important point is that some advanced joinpoint types of AOP provided
    by AspectJ can be implemented by using less advanced features. For instance, the
    cflow feature


    **142**


    C H A P T E R 7 ■ A O P T O O L S C O M P A R I S O N


    can be simply implemented by using execution advice and standard thread-local
    variables (java.lang.ThreadLocal). This justifies the fact that these types of
    joinpoints, although useful for simplification and clarity, are not always provided.


    **Advice**


    Pointcuts allow programmers to define where an aspect applies. The concept of
    advice code defines the behavior of an aspect—in other words, advice code states
    what an aspect is doing.


    The terms used for the code structure that defines the behavior of an aspect varies
    from *advice code* (AspectJ), to *wrapper* (JAC), to *interceptor* (JBoss AOP
    and Spring AOP). However, the idea behind these terms is the same: to define the
    instructions that will be executed before and after the joinpoints.


    **Advice Code Types**


    The three main types of advice code are “before,” “after,” and “around.”


    • “Before” advice code is executed before the joinpoints.


    • “After” advice code is executed after the joinpoints. There are two main types
    of “after”


    advice code:


    • “After returning” advice code is executed after a normal execution/invocation.


    • “After throwing” advice code is executed after an abnormal execution/invocation,
    which leads to an exception being thrown.


    • “Around” advice code is executed both before and after the joinpoints.


    AspectJ and Spring provide all of these advice code types, while JAC and JBoss
    AOP chose to provide only the “around” advice code type. Indeed, “around” advice
    code entails all the other kinds of advice. For instance, “before” advice code
    can be seen as “around” code that calls proceed and where the “after” part is
    missing. As another example, “after throwing” advice code is “around” advice code
    that encapsulates the call to proceed in a try/catch block.


    Providing the “before” and “after” constructs has several advantages. First, it
    makes the aspect code clearer, as programmers can easily see what kind of function
    is implemented, without having to look at the advice code. Second, it helps programmers
    avoid programming mistakes such as forgetting to proceed to the joinpoint. Third,
    “before” and “after” advice code can be implemented more efficiently by the AOP
    frameworks, since the reification of the joinpoint is not needed in these cases
    (see the “before” and “after” advice code in Chapter 6).'
  trans: '

    大多数情况下，切点依赖于应用程序的结构。如果应用程序代码发生变化，切面应用的位置也极有可能随之改变。当程序员希望将切面复用于不同的应用程序时，情况也类似：切点必须适应新的应用程序。这就是上一节提到的切面配置过程如此重要的原因。请注意，采用在编译时实现织入的语言方法（AspectJ）时，属于给定切点的连接点可以在编译时确定，而框架则很难做到这一点。借助合适的工具（例如
    AJDT Eclipse 插件），使用语言方法的切面程序员可以更好地控制其程序。


    正如我们所说，切点可以被视为对程序的查询。这些查询返回一组切面应用的连接点。一个切面工具的特征在于其支持的连接点类型。对于给定的程序，一种连接点类型具体表现为一组连接点阴影——即所有对应于该连接点类型的程序位置。例如，*方法调用*连接点类型对应于所有调用方法的位置。


    在下一节中，我们将比较各工具支持的连接点类型。


    **连接点类型**


    AspectJ 是支持连接点类型最多的 AOP 工具。本节我们将考察 AspectJ、JAC、JBoss AOP 和 Spring AOP 所支持的连接点类型。


    • *方法执行*：除 Spring 外，所有 AOP 工具都支持此类型，Spring 支持透明代理。


    • *方法调用*：AspectJ 和 JBoss AOP 支持此类型。JAC 不支持。


    然而，在编写具有远程通信的应用程序时，可以通过包装客户端代理来拦截方法调用，这与方法调用连接点非常相似。Spring 支持透明代理，可视为一种方法调用切点。


    • *构造函数执行*：除 Spring 外，所有 AOP 工具都支持此连接点类型。


    第七章 ■ AOP 工具比较


    **141**


    • *继承构造函数执行*：当构造函数调用父构造函数时，AspectJ 可以区分当前构造函数的执行与继承构造函数的执行。


    • *字段读取*：AspectJ 和 JBoss AOP 可以在此连接点类型周围织入切面。JAC 和 Spring 不直接支持。然而，JAC 会执行字节码分析来检测读取字段的方法。


    • *字段写入*：此连接点类型与字段读取类型类似。


    • *异常*：AspectJ 可以拦截异常捕获块的开始。JBoss AOP、JAC 和 Spring 均不支持此连接点类型。但是，它们支持某种“抛出后”通知（JAC
    中的异常处理器），该通知模块化了切点内所有连接点的异常处理。请注意，“抛出后”通知（AspectJ 也支持）的功能弱于捕获块通知，因为它不允许切面修改基础程序处理现有异常的方式。


    • *静态块执行*：AspectJ 支持此连接点类型，但其他工具不支持。


    • *通知代码执行*：这是 AspectJ 的连接点类型。对于其他工具，通知代码在常规的 Java 方法中定义。因此，程序员可以对这些方法的执行和调用进行切面化。


    • *控制流*：AspectJ 支持对应于进入和退出控制流的连接点类型。JBoss AOP 或 JAC 不提供此功能；但程序员可以模拟实现。Spring AOP
    支持某些类型的 cflow。


    有趣的是，遵循框架方法（JAC、JBoss 和 Spring）的工具支持的连接点类型比 AspectJ 少。这有几个原因，既涉及技术层面，也涉及集成层面。


    在技术方面，由于框架是用纯 Java 编写的，并使用反射、字节码操作和代理技术进行实现，因此它们实现细粒度连接点类型（例如异常捕获）更为复杂。


    在集成方面，由于框架方法置于组件框架的上下文中（JBoss 使用 EJB，JAC 和 Spring 使用简单 Bean），它们通常有意决定不支持非常细粒度的连接点，以维护被切面化组件的封装原则。例如，Spring
    和 JAC 有意不支持字段读/写连接点类型，以便通知仅能应用于组件接口（即组件的固定部分）。再如，Spring AOP 不支持构造函数执行连接点，因为它可能会干扰
    Spring 工厂中实现的构造过程。当然，这些限制使得 AOP 框架的灵活性不如 AspectJ。另一方面，它们防止了程序员误用框架，并使 AOP 程序更具可重用性。例如，通过更改类的实现和字段（而非接口）来重构类，可能会影响
    AspectJ 切点，但绝不会影响 JAC 或 Spring 切点，因为它们不支持字段拦截。


    另一个重要点是，AspectJ 提供的某些高级 AOP 连接点类型可以使用较不高级的特性来实现。例如，cflow 特性


    **142**


    第七章 ■ AOP 工具比较


    可以简单地通过使用执行通知和标准线程局部变量（java.lang.ThreadLocal）来实现。这证明了这些连接点类型虽然有助于简化和清晰，但并非总是被提供的原因。


    **通知**


    切点允许程序员定义切面应用的位置。通知代码的概念定义了切面的行为——换句话说，通知代码说明了切面在做什么。


    用于定义切面行为的代码结构的术语各不相同，从*通知代码*（AspectJ），到*包装器*（JAC），再到*拦截器*（JBoss AOP 和 Spring AOP）。然而，这些术语背后的思想是相同的：定义将在连接点之前和之后执行的指令。


    **通知代码类型**


    三种主要的通知代码类型是“前置”、“后置”和“环绕”。


    • “前置”通知代码在连接点之前执行。


    • “后置”通知代码在连接点之后执行。有两种主要的“后置”通知代码类型：


    • “返回后”通知代码在正常执行/调用之后执行。


    • “抛出后”通知代码在导致抛出异常的异常执行/调用之后执行。


    • “环绕”通知代码在连接点之前和之后都执行。


    AspectJ 和 Spring 提供了所有这些通知代码类型，而 JAC 和 JBoss AOP 选择仅提供“环绕”通知代码类型。实际上，“环绕”通知代码包含了所有其他类型的通知。例如，“前置”通知代码可以看作是调用了
    proceed 且缺少“后置”部分的“环绕”代码。再如，“抛出后”通知代码是将对 proceed 的调用封装在 try/catch 块中的“环绕”通知代码。


    提供“前置”和“后置”结构有几个优点。首先，它使切面代码更清晰，因为程序员无需查看通知代码就能轻松看出实现了哪种功能。其次，它帮助程序员避免编程错误，例如忘记继续执行到连接点。第三，“前置”和“后置”通知代码可以由
    AOP 框架更高效地实现，因为在这些情况下不需要对连接点进行具体化（参见第 6 章的“前置”和“后置”通知代码）。

