    Within the client code given at the beginning of this chapter, we see the use
    of a service called getAccountDetails, which returns an object instance of the
    AccountDetails type. This object aggregates the attributes’ values of an account
    and presents an interface close to Account. This object is one instantiation of
    a participant of a J2EE design pattern: the *data transfer object*.


    A data transfer object can be used in two main cases:


    • When a client computation unit needs to access more than one piece of data returned
    by the business layer (multiple downloads)


    • When a client computation unit needs to send more than one piece of data to
    be completed (multiple uploads)


    It is possible to reduce the number of remote calls by using the data transfer
    object design pattern, as shown in Listing 12-4\. This pattern then proposes the
    use of a transfer object, which is designed to transfer a set of data from the
    client to the server, or vice versa. In this case, we use an AccountDetails transfer
    object. Since the transfer objects must be accessed from the client as well as
    from the server, all the transfer objects of the application are placed in the
    aop.j2ee.commons.to package (to means transfer object).


