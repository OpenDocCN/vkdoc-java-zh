    管理通信层相关问题


    如前所述，在分布式环境中（其本质容易受到服务中断的影响），为了提高应用程序的可靠性，实施重试或缓存等策略非常重要。由于我们已经消除了业务委托模式，这些策略无法再在委托中实现；它们必须在切面中实现。


    AOP 提供了一个自然的框架，用于在主远程通信关注点中分离一些子关注点。例如，可以在两个独立的切面中分离重试和缓存。这种设计选择取决于设计者及其需求。必须在仔细分析可维护性和演进需求之后做出决定。


