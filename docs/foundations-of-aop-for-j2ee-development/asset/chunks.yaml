    **面向切面的实现**


    我们为责任链设计模式提出的实现利用了切面优先级的概念。在之前介绍的设计模式中，定义了一个抽象切面来实现链中所有命令共享的代码。然后，每个具体命令都会扩展这个抽象切面。切面优先级是用于对链中这些命令的执行顺序进行排序的概念。


    实现的通用部分


