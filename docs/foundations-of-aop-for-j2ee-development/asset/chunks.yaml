    />\n08     </interceptors>\n10 </interceptor-pointcut>\n```"
  raw: 'To illustrate this point, we will use the JBoss AOP framework, which allows
    you to activate and deactivate assertions without having to recompile the code.
    This process is not as straightforward with AspectJ. The provided examples can
    be easily transported into the JAC


    framework.


    Implementing Preconditions


    The program in Listing 9-1 defines and uses the sqrt method.


    C H A P T E R 9 ■ Q U A L I T Y O F S E R V I C E A N D A O P


    **175**


    **Listing 9-1.** *An Example of the Use of the sqrt Method* package aop.contracts.preconditions;


    public class PreConditionExample {


    public double sqrt (double p) {


    return Math.sqrt(p);


    }


    public static void main(String[] args) {


    PreConditionExample t = new PreConditionExample();


    System.out.println("sqrt of 4 : "+t.sqrt(4));


    System.out.println("sqrt of 0 : "+t.sqrt(0));


    System.out.println("sqrt of -4 : "+t.sqrt(-4)); System.out.println("sqrt of 9
    : "+t.sqrt (9));


    }


    }


    If you run the program without any preconditions, you obtain the results that
    are shown in Listing 9-2.


    **Listing 9-2.** *An Execution Trace Without Preconditions* sqrt of 4 : 2.0


    sqrt of 0 : 0.0


    sqrt of -4 : NaN


    sqrt of 9 : 3.0


    As you can see, no exceptions are thrown when sqrt is called with a negative parameter
    (– 4). In this case, the value returned by java.lang.Math.sqrt(double) is java.lang.Double.NaN


    to indicate that the result is “not a number.”


    By using JBoss AOP, you can implement a sqrt precondition within an interceptor
    (which corresponds to the notion of advice code), as shown in Listing 9-3.


    **Listing 9-3.** *A Precondition Interceptor for the sqrt Method* 01 package aop.contracts.preconditions;


    03 import java.lang.reflect.Method;


    05 import org.jboss.aop.Interceptor;


    06 import org.jboss.aop.Invocation;


    07 import org.jboss.aop.InvocationResponse;


    08 import org.jboss.aop.InvocationType;


    09 import org.jboss.aop.MethodInvocation;


    **176**


    C H A P T E R 9 ■ Q U A L I T Y O F S E R V I C E A N D A O P


    11 public class PreConditionInterceptor implements Interceptor {


    13 public String getName() {


    14 return "PreConditionInterceptor";


    15 }


    17 public InvocationResponse invoke(Invocation invocation) throws Throwable {


    18 if (invocation.getType() == InvocationType.METHOD) {


    19 MethodInvocation methodInvocation = (MethodInvocation)invocation; 20 Method
    method = methodInvocation.method;


    21 if ("sqrt".equals(method.getName())) {


    22 Double parameter = (Double) methodInvocation.arguments[0]; 23 if (parameter.doubleValue()
    < 0) {


    24 throw new Error("Unfulfilled precondition"); 25 }


    26 }


    27 }


    28 InvocationResponse rsp = invocation.invokeNext(); 29 return rsp;


    30 }


    31 }


    The interceptor in Listing 9-3 implements the org.jboss.aop.Interceptor interface
    and its two methods, getName and invoke. The invoke method behaves as follows:
    **1.** The invocation type—InvocationType.CONSTRUCTOR, InvocationType.METHOD,
    InvocationType.FIELD_READ, or InvocationType.FIELD_WRITE—is tested (see line 18).


    This program is interested only in method invocations.


    **2.** If the name of the invoked method is sqrt, the precondition is checked
    (see line 21).


    **3.** The value of the sqrt argument is obtained from the arguments attribute
    of the methodInvocation object (see line 22).


    **4.** If the parameter has a negative value, an error is thrown (see line 24).


    To actually apply the precondition to the program, the jboss-aop.xml file must
    be modified to declare that a new pointcut is associated with the interceptor.
    For this example, the jboss-aop.xml file must contain the code that is shown in
    Listing 9-4.


    **Listing 9-4.** *The Deployment of the Precondition Interceptor* 01 <interceptor-pointcut


    02 methodFilter="ALL" fieldFilter="NONE" constructorFilter="NONE"


    03 class="aop.contracts.preconditions.PreConditionExample"> 04


