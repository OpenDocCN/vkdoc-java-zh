    49 infos.setType(type);


    50 infos.setDescription(description);


    51 infos.setBalance(balance);


    52 infos.setCreditLine(creditLine);


    53 infos.setBeginBalance(beginBalance);


    54 infos.setBeginBalanceTimeStamp(beginBalanceTimeStamp); 55 String id = bank.createAccountWithCustomer(infos);
    56 // 重置传输对象


    57 to.set(null);


    58 return id;


    59 }


    60 }


    通信优化切面 `TransferOptimizer` 的实现基于一个简单的思路。当序列中的第一个方法被调用时（第一个通知代码），我们将其替换为创建传输对象并对其进行部分初始化（第
    21 行）。然后，这个传输对象被本地保存在一个线程局部变量中（第 11 行和第 30 行）。线程局部变量使得该切面是线程安全的。因此，`TransferOptimizer`
    切面的行为类似于一个上传缓存。


    当序列中的第二个方法被调用时，我们使用参数完成传输对象的初始化，并调用 `createAccountWithCustomer` 远程服务（第 55 行）。


    这个服务由服务器端切面透明地添加。如果线程局部变量返回 null（第 44 行），我们假设当前不在需要优化的序列中，并直接调用该服务（第 46 行）。这种技术可以推广到任何序列。


    优化切面依赖于应用程序代码。如果程序发生更改，该切面很可能会失效。例如，如果程序使用了 `createCustomer` 方法的结果，那么优化将不再有效，因为程序必须为
    `createCustomer` 返回一个 null 值。这种耦合比关注点分离悖论中的耦合更强。在这种情况下，即使对象接口保持稳定，切面也可能失效，因为该切面严重依赖于它们的内部实现。


