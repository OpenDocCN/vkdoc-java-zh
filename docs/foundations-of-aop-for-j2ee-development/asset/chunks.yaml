    ## Input Constraints Verification


    When developing UIs, verifying constraints on the data entered by the users is
    a recurring issue. For example, all data entered to create a new client should
    be verified and checked for accuracy. The program should test that the e-mail,
    ZIP code, and so forth are correctly formatted. The program can also force the
    user to enter additional information.


    It is important to clearly modularize this concern for three main reasons:


    - First, it is a concern that crosscuts all the functions related to data input
    and validation.

    - Second, in general, it is a concern that evolves and is refined over time, sometimes
    independent of other concerns.

    - Third, for the security of the application, the entered data should be controlled
    on the server side. For client latency reasons, it is also preferable to implement
    some control on the client. Aspect-oriented modularization makes it easier to
    maintain consistency between the client and server sides.


    To clarify the second point, we can compare the aspect-oriented development of
    the constraint verification to a use case–based development methodology. In a
    use case–based methodology, we find primary use cases, which correspond to the
    normal behavior of the application (here, the entering of the data by the user),
    and secondary use cases, which correspond to the abnormal behavior of the application
    (here, errors and input error handling).


    Among secondary cases, a use case–guided analysis generally assigns priorities
    to the use cases. Some of them are not critical and do not need to be implemented
    during the first iterations (for instance, checking that the entered name starts
    with an uppercase letter).


    Similarly, when developing UI and data verification, we start with primary cases
    (verifications) and critical secondary cases. Only after the development of these
    cases is completed can we implement the noncritical cases (verifications). If
    the verification concern is not correctly modularized, testing a new case will
    be difficult because its code will be tangled up with the code of the preexisting
    cases.


    Thus, the use of AOP helps to handle the growing complexity of the verification
    concern. In particular, the use of well-chosen pre-/postcondition aspects (such
    as the ones explained in Chapters 9 and 11) allow the modularized implementation
    of the verification concern.


    ## Using AOP in the Design Patterns of the Web Presentation Tier


    In a J2EE context, the web presentation logic relies on Servlets technology. Servlets
    are Java components that reply to HTTP requests coming from the web server and
    are transmitted to the J2EE web container. Some well-known containers are Apache
    Tomcat (reference implementation) and Caucho Resin (`http://www.caucho.com/resin-2.1/index.xtp`).
    To help with the programming of GUI dedicated servlets, Sun Microsystems defined
    the JavaServer Pages (JSP) standard.


    Since servlets are low-level components, certain J2EE design patterns have been
    defined to manage the presentation efficiently. Here we will evaluate how aspects
    enhance the design of the presentation tier when compared to J2EE design pattern–based
    solutions.


    In this section, we introduce the presentation tier design patterns and discuss
    how they can be improved with AOP. We do not rely directly on the sample application
    since the presentation would be too complicated to discuss here. Furthermore,
    the sample application uses the Struts framework, which provides a packaged and
    ready-to-use implementation of a set of J2EE design patterns.


    To fully understand this section, knowledge of Servlets/JSP technologies (`http://java.sun.com/products/jsp/docs.html`)
    and of presentation tier J2EE design patterns (`http://java.sun.com/blueprints/corej2eepatterns/Patterns/index.html`)
    is necessary.


    ### Front Controller


    The role of a *front controller* design pattern is to centralize the base management
    logic of the requests and to forward them to the appropriate managers. Thus, the
    client''s requests go through the front controller, which contains a command dictionary.


    *Command objects* are usually instances of the application controller design pattern,
    even though it is still possible to choose alternate designs. More precisely,
    the controller''s behavior handles the requests by looking up the appropriate
    command for the given request''s URL and delegating this request to the command.
    In addition, the controller can encapsulate server-specific data in a context
    object. *Context objects* are regular Java objects used to make the GUI logic
    as independent as possible from the HTTP protocol.


    Listing 12-15 presents the important parts of a simple front controller.


    **Listing 12-15.** *A Simple Front Controller*


