    \ company AOPSYS, with the primary goal of supporting the use of AOP and SoC-related\
    \ techniques in industry. He is the founder and main programmer of the `JAC` framework,\
    \ which is currently being used by AOPSYS to develop projects for a variety of\
    \ customers. He is the author of more than 20 publications, including international\
