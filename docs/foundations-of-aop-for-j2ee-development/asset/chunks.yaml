    **清单 12-23.** *使用 AOP 实现授权过滤器*


    01 package aop.j2ee.client.web.aspect;


    03 import java.io.IOException;


    04 import javax.servlet.*;


    05 import javax.servlet.http.*;


    06 import aop.j2ee.presentation.bean.SubscriberBean;


