    ## Entity EJBs


    The entity EJBs define the model on which the application’s functions are applied,
    and they are usually implemented within the session facade EJBs. A client may
    directly access an EJB without going through a facade, but this is not advised
    for the following reasons. First, it can result in application services that are
    not well defined. Second, it couples the client’s implementations to the business
    model, which reduces the application evolution possibilities.


    The entity EJBs of our model are the accounts, the users, and the transactions.
    As explained earlier in reference to the data tier, each EJB corresponds to a
    table. The accounts implement the `Account` interface, as shown in Listing 10-4.


    **Listing 10-4.** *The Accounts Interface*


    ```

