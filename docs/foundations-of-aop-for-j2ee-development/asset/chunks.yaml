    \ interceptor are displayed before and after these joinpoints.\n\n## Pointcuts\n\
    \nThis section presents, in detail, the syntax of the XML file for defining pointcuts\
    \ with JBoss AOP.\n\nThe default name for this file is `jboss-aop.xml`, but the\
    \ name can be changed if necessary. The corresponding XML Document Type Definition\
    \ (DTD) defines the `<aop>` tag as the root tag. Several pointcuts can be defined\
    \ in the same file. Each pointcut is defined by the `<bind>` tag and associated\
    \ with an interceptor by the `<interceptor>` tag.\n\nThe general structure of\
    \ a `jboss-aop.xml` file is as follows:\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<aop>\n    <bind pointcut=\" ... pointcut expression ... \" >\n   \
    \     <interceptor class=\" ... interceptor class ... \" />\n    </bind>\n   \
    \ ...\n</aop>\n```\n\n### The Different Types of Pointcuts\n\nJBoss AOP allows\
    \ you to define five types of pointcuts: method, constructor, field, all, and\
    \ method call. Each of these types is associated with a specific keyword, which\
    \ is used when you write a pointcut expression.\n\nIn this section, we explain\
    \ the common rules concerning the wildcards that are used to write pointcut expressions,\
    \ we define the five types of pointcuts, and we give the rules for filtering joinpoints.\n\
    \n#### Wildcards\n\nWhen defining a pointcut, you write an expression to declare\
    \ the elements that must be included in the pointcut. In the previous example\
    \ of the order-management application, the pointcut expression was as follows:\n\
    \n```\n<bind pointcut=\"execution(\n    public void aop.jboss.Order->addItem(java.lang.String,int))\"\
    \ >\n```\n\nOnly the `addItem` method was included in the pointcut, with its fully\
    \ qualified signature provided. In more general cases, you want to include more\
    \ than one method per pointcut. In such cases, the asterisk (`*`) and two-dots\
    \ symbol (`..`) can be used as wildcard characters to replace any part of the\
    \ signature. Additionally, annotations can be used in place of method names and\
