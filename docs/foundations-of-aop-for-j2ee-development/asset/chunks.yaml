    基于 AOP 的实现


    AOP 提供了一种直接的方法使代码独立于 EJB 技术：创建一个用于将 POJO 转换为 EJB 的切面，并使用一个空的标记接口（类似于 Serializable），通过基于该接口的类型间声明来实现该切面。


