    Careful readers would have noted the use of the empty method loadCustomerIds at
    the end of the AccountPOJO class, which is used by the method getDetails. As the
    name suggests, loadCustomerIds loads the customer IDs that are related to the
    current account. It is not implemented in the business object but in the SQLAccount
    aspect (see the “around” advice of Listing 11-4). This is a common technique used
    to delegate the implementation of a function within a dedicated aspect, performed
    in two phases as described here: **1.** You define one or several empty methods
    within an object. These methods define a generic but inactive protocol.


    **2.** You implement these methods within aspects, by using “around” advice codes
    that replace the empty implementation by not calling proceed.


