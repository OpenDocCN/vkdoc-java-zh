- fmt: '# The Singleton Aspect: A Critical Analysis


    The fact that we can transform any class into a singleton simply by applying an
    aspect to it seems initially both simple and useful. However, this invasive modification
    of the Java `new` operator is far from benign.


    ## First, transforming a class into a singleton has consequences for the rest
    of the development.


    The advantage of using the method `getInstance` in the object-oriented approach
    is that we know immediately that this class is a singleton. With the AOP implementation
    of the singleton, any class is potentially a singleton, since all we must do to
    achieve this transformation is change the pointcut definition. For the final programmer,
    not knowing whether a class is a singleton could lead to programming mistakes.


    ## Second, it is important to take precautions when we make an existing class
    into a singleton.


    If the singleton is called by more than one object, we have to ensure that multiple
    calls to this shared instance of the class do not lead to errors. A classic mistake
    when implementing a singleton is that the singleton attributes are obliterated
    each time a new object calls it, leading to incoherencies. These attributes must
    be considered as global shared variables.


    ## Finally, this aspect makes it difficult to use aspect composition, which is
    an important functionality of AOP.


    For example, we cannot compose the singleton aspect with another aspect that also
    replaces the instance returned by the constructor. This could be a real problem,
    for example, when using a factory pattern aspect to replace a local instance of
    an object by an instance provided by a remote proxy.


    # The Observer Design Pattern


    The second design pattern that we study with regards to aspect-oriented programming
    techniques is the Observer. We begin by providing a quick description of this
    pattern, and proceed by giving an implementation of the pattern using AspectJ.
    We then conclude this section with an evaluation of the implementation.


    ## Description


    In many situations, programmers need to be aware of objects’ state changes or
    pay attention to the events produced by objects. For example, a text editor must
    activate the saving functionality when a file is modified. Other examples can
    be found in frameworks for building graphical user interfaces. For instance, Swing
    heavily relies on the mechanism known as *listeners*; listeners are objects that
    consume events emitted by other objects and react to these events.


    The Observer design pattern consists of notifying observer objects when the states
    of other objects, called subjects, change.


    Hence, a pure object-oriented, aspect-free implementation of the observer design
    pattern generally relies on two interfaces: `Observer` and `Subject`. The `Subject`
    interface is implemented by all observed classes and provides methods for registering
    and removing observers. The `Observer` interface is implemented by observers and
    provides methods for notifying state changes.


    ## Aspect-oriented Implementation


    In this section, we propose an aspect-oriented implementation of the Observer
    design pattern.


    With our solution, the management of observers and the detection of state changes
    are handled by an aspect. First, an AspectJ abstract aspect is defined to implement
    the generic part of the code. This aspect can be reused for all observers. Second,
    this aspect is extended to take into account the needs of real observers.


    ### Generic Part of the Implementation


    The code of the abstract aspect is presented in Listing 8-9.


    **Listing 8-9.** *Implementation of the Observer Design Pattern Using AspectJ*


    ```

    1 package aop.patterns.observer;


    3 import java.util.Enumeration;


    4 import java.util.Vector;


    6 public abstract aspect AbstractObserverAspect pertarget (subject()) {


    8 private Vector observers = new Vector();


    10 public void addObserver(Object o) {


    11 observers.add(o);


    12 }


    14 public void removeObserver(Object o) {


    15 observers.remove(o);


    16 }


    18 protected abstract pointcut subject();

    ```'
