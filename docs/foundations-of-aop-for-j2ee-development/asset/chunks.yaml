    AOP Tools Comparison


    **T**he previous chapters presented four of the most widely used tools for AOP:
    AspectJ, JAC, JBoss AOP, and Spring AOP. This chapter compares these four tools
    with regard to programming aspect-oriented applications.


    AspectJ, JAC, JBoss AOP, and Spring AOP each has its own techniques for implementing
    the concepts of AOP presented in Chapter 2\. The three main concepts of AOP— *aspect*,
    *pointcut*, and *advice*—can be implemented with each of the four tools, but their
    forms as well as the means for programming them, such as syntax and API, vary.
    The terms used to describe these concepts may also vary among the tools; for example,
    the term *advice* is used by AspectJ, whereas JAC uses the term *wrapper* and
    JBoss AOP uses *interceptor*.


    Besides some minor conceptual and terminology differences, these tools can be
    classified into two types of approaches: the language approach (AspectJ) and the
    framework approach (JAC, JBoss, and Spring). These two types of approaches imply
    some important differences, which we’ll cover in this chapter.


