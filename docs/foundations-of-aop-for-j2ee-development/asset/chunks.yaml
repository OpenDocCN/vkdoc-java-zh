    to Java objects.


    • The *intercepting filter pattern* is used to allow specific objects to systematically
    intercept requests and process them with additional functions in a modular and
    parameterizable way.


    Although these design patterns are documented, using several together is not an
    easy task for designers or developers. It is often preferable to use frameworks
    that integrate the full range of presentation tier design patterns in a consistent
    and transparent manner. This is the chosen solution for the original version of
    the sample application, Duke’s Bank, which is implemented using the Struts open
    source framework.


    Automatic Integration Solutions


    In the context of J2EE, we use deployment descriptors (see the XML code in this
    section) to configure nonfunctional services that are managed by the container.
    This technique allows us, for example, to integrate transactions into the facade
    services or declaratively add persistence to business objects. It is also possible
    to configure the components to include remote access


    **224**


