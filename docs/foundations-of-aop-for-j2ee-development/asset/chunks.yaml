  trans: '

    正如我们在本章中所见，语言方法支持静态类型检查和更多编译时检查，从而提高了程序质量（例如，参见“连接点类型”一节）。语言方法也更高效，因为编译器可以优化静态绑定的织入代码，并在不需要时避免运行时反射或动态代理。


    另一方面，框架方法使用运行时反射和连接点内省。这些技术使得框架效率较低，但比语言方法更灵活。使用框架方法，可以在应用程序运行时动态调整它。此外，框架方法使用现有语言或工具，如
    Java、XML 或 Ant，这使得这些工具更容易集成到标准开发环境中。最后这一点至关重要，因为它解释了框架方法成功的原因，而语言方法中实际上只有一种被广泛使用：AspectJ。


    AspectJ 的成功是 AspectJ 创建者将工具集成到 Eclipse 等 IDE 中的重大工作的成果。一旦 AspectJ 被良好集成，使用 AOP
    就比专用语言更简单，因为 IDE 可以提供上下文帮助、代码补全和设计错误检测等支持，而这些支持在框架方法中有时会因类型检查较少而变得繁琐。


    第 7 章 ■ AOP 工具比较


    **147**


    尽管语言方法和框架方法有时相互竞争，但我们认为它们应被视为互补的，因为它们具有截然不同的特性。AspectJ 5 所做的工作旨在整合 AspectJ 语言和
    AspectWerkz 框架，这是朝着正确方向迈出的一步。然而，要创建一个能够干净地整合框架灵活性和语言类型检查能力的理想工具，仍有许多工作要做。


    第 8 章


    ■ ■ ■


    设计模式与 AOP


    **设**计模式为反复出现的设计问题提供了通用解决方案。大多数使用面向对象编程的开发者都熟悉它们的用法。模式并非特定于某种语言；事实上，它们解决的大多数问题甚至并非特定于某种编程范式。因此，许多通常通过面向对象编程解决的设计问题都可以使用
    AOP 来解决。


    核心设计模式于 1995 年随着 Addison-Wesley 出版 Erich Gamma、Richard Helm、Ralph Johnson 和 John
    Vlissides（通常被称为“四人帮”或 GoF）所著的《可复用面向对象软件的基础》而流行起来。尽管此后又定义了许多其他设计模式，但大多数都基于这一著作。


    本章旨在用面向切面的方法重新定义选定的设计模式。


    我们将这些重新定义的模式与其面向对象的定义进行比较，以突出 AOP 的优势。


    本章的第一节将快速介绍这些可复用模型。然后，我们将介绍并讨论那些通过 AOP 实现能带来最显著模块化改进的设计模式。


    **设计模式，或可复用软件的基础**


    设计模式是实现可复用性的一种方法，而可复用性是面向对象编程的关键概念之一。


    模式的概念并非编程领域独有；事实上，这一概念源于建筑和城市规划中使用的类似概念，由建筑师克里斯托弗·亚历山大正式提出。沃德·坎宁安和肯·贝克在 1987 年于佛罗里达州奥兰多举行的一次会议上发表的论文《将模式语言用于面向对象程序》中，将这些思想改编用于面向对象编程。


    如前所述，设计模式为特定上下文中的反复出现的问题提供了通用解决方案。使用设计模式的上下文很重要，因为同一个问题可能因上下文不同而有不同的解决方案。一个高质量的设计模式必须是具体且经过充分测试的解决方案的抽象。


    一个设计模式若要被有效使用，必须有良好的文档记录。目前有多个设计模式目录可用，其中 GoF 的书最为著名。每个目录都分为若干部分，包含对设计模式的描述。


    **149**


    **150**


    第 8 章 ■ 设计模式与 AOP


    有了这些文档，几乎任何人都可以使用这些设计模式，并让最佳实践在应用程序开发中轻松应用；然而，要正确使用设计模式，仍然需要理解其可能的应用场景。


    **使用 AOP 实现设计模式**


    目前，关于使用 AOP 实现设计模式的研究正在大量进行。这是因为许多设计模式具有横切性，因此在面向对象范式中难以确保这些模式具有足够的模块性。


    在 2002 年 OOPSLA 会议上，Jan Hannemann 和 Gregor Kiczales¹ 的一篇文章讨论了这一领域的先驱性研究。这项工作强调，使用
    AOP 实现某些设计模式可以带来以下优势：


    • *局部性*：功能代码包含在切面内部，而不是分散在类中，从而提高了模块化程度。

    • *可复用性*：将代码重构为切面可以实现更高程度的抽象和更好的可复用性。

    • *组合透明性*：一个对象可以应用多个模式，而不会使全局实现变得混乱。

    • *（取消）可插拔性*：应用程序的整体结构较少依赖于所实现的设计模式。使用 AOP，只需更改一个参数，就可以激活或停用一个设计模式，例如，在使一个类成为单例时。


    然而，这四种优势并非对所有设计模式都明显。有些模式表现出全部四种优势，有些则完全没有。在 23 种 GoF 设计模式中，有 17 种在使用 AOP 实现时表现出改进；其中
    12 种在所有四个方面都受益。


    接下来的几节将 AOP 技术应用于 GoF 设计模式中的一部分示例。


    **单例设计模式**


    我们使用面向切面编程技术研究的第一个设计模式是单例模式。我们首先简要描述该模式，然后给出该模式的两种实现，一种使用 JBoss AOP，另一种使用 AspectJ。最后，我们对该节进行实现评估。


    **描述**


    单例设计模式可以描述如下：


