    ## Summary


    In this chapter, you saw how AOP—by verifying that an application’s definition
    and execution correspond to its identified requirements—can be used to improve
    the application’s Quality of Service. First, we showed how AOP can help to implement
    contracts in a straightforward way. Second, we showed the AOP implementation of
    two testing techniques: coverage analysis and nonregression tests. Finally, we
    showed how to use AOP for the seamless integration of JMX with a Java application.


    Our AOP implementations did not provide more features than the existing tools
    do. However, our implementations showed how AOP can be used at a developmental
    level to improve code quality—without needing any specific support. Besides, an
    important advantage of AOP technologies is that it provides the ability to plug
    and unplug Quality of Service support when needed—even at run time if dynamic
    AOP tools are used.


    # Chapter 10: Presentation of the Sample Application


    **T**his chapter discusses the architecture and design details of a sample application
    that we’ll use as a case study to demonstrate the strengths of AOP within the
    J2EE environment. This well-known, simple sample application serves to present
    the material in an understandable manner. The sample is developed from the Duke’s
    Bank application of the Sun ONE J2EE application server. This application does
    not depend on Sun ONE specifically, and it can be used efficiently on any J2EE
    application server by adapting the deployment scripts.


    Since this book focuses on AOP, this chapter does not go into the details of J2EE
    programming, but instead provides sufficient information on AOP and where it can
    be useful. A portion of this chapter, however, is a review of the J2EE design
    patterns used by the sample application. Please note that these patterns are different
    from the GOF patterns presented in Chapter 8. Additionally, we do not present
    the application’s full code here; rather, we simply depict its design. If you’d
    like more detailed information on the application, please visit the Downloads
    area of the Apress web site (http://www.apress.com) to access the case study code.
    If you aren’t familiar with J2EE, we highly recommend doing some further reading
    on the subject before you examine the code in detail.


    ## Sample Application Architecture


    Duke’s Bank is a classic J2EE application composed of tiers commonly found when
    developing enterprise applications. It is packaged so that the modules corresponding
    to each tier are clearly separated. To simplify the code, we have slightly modified
    the Duke’s Bank application, notably its packaging. For means of comparison, please
    refer to the original application, which is available on the Sun Microsystems
    web site.


    ### The Application at a Glance


    Before we cover the details of the tiers, we’ll provide an overview of the whole
    application and its organization in the sections that follow.


    #### The Participating Tiers


    As J2EE advises, the application is composed of several tiers, as shown in Figure
    10-1.


    **Figure 10-1.** *The Duke’s Bank application’s architecture*


    The tiers and their roles are as follows:


    - The *data tier* allows for storage of the persistent data and is implemented
    within the PointBase relational database.

    - The *business tier* contains EJBs that implement the application’s logic. These
    EJBs are the session EJB, which provides a client’s view of the application’s
    business logic, and the entity EJB, which represents the persistent objects manipulated
    by the application. The business tier directly accesses the data tier, especially
    through the entity EJBs.

    - The *presentation tier* allows the application to be accessed through a browser.
    It contains a web servlet/JSP container and accesses the business tier. Relative
    to the business tier, the presentation tier can be considered as a specific Java
    client tier.'
