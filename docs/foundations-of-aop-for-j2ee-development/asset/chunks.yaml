    \ 8-4.** *将单例设计模式绑定到 Stats 类*\n\n<bind pointcut=\"execution(aop.patterns.singleton.Stats->new())\"\
    >\n\n<interceptor class=\"aop.patterns.singleton.SingletonInterceptor\">\n\n</bind>\n\
    \n通过使用清单 8-5 中的类，可以轻松检查设计模式是否已正确应用。\n\n**清单 8-5.** *使用 JBoss AOP 测试单例设计模式的主类*\n\
    \npackage aop.patterns.singleton;\n\npublic class SingletonExample {\n\npublic\
    \ static void main(String[] args) {\n\nStats stats1 = new Stats();\n\nStats stats2\
    \ = new Stats();\n\nif (stats1==stats2) {\n\n**154**\n\n第 8 章 ■ 设计模式与 AOP\n\n\
    System.out.println(\"这些实例是相同的！\");\n\n} else {\n\nSystem.out.println(\"这些实例不相同！\"\
    );\n\n}\n\n}\n\n}\n\n我们不再需要 `getInstance` 方法，因为单例是通过对构造函数的标准调用来访问的。单例设计模式现在对应用程序而言完全透明。\n\
    \n运行此程序得到的结果如下：这些实例是相同的！\n\n我们已成功将单例设计模式应用于 `Stats` 类，而无需修改 `Stats` 的代码或任何使用它的类。\n\
    \n**使用 AspectJ 实现单例切面的第二种方法**\n\n使用 AspectJ 可以获得相同的结果。我们首先定义一个抽象切面，该切面独立于确定要转换为单例的类的切入点（参见清单\
    \ 8-6）。\n\n**清单 8-6.** *使用 AspectJ 实现单例设计模式*\n\npackage aop.patterns.singleton;\n\
    \npublic abstract aspect AbstractSingletonAspect {\n\nprivate Object singleton\
    \ = null;\n\nabstract pointcut singletonPointcut();\n\nObject around(): singletonPointcut()\
    \ {\n\nif (singleton == null) {\n\nsingleton = proceed();\n\n}\n\nreturn singleton;\n\
    \n}\n\n}\n\n该抽象切面定义了两个元素：一个抽象切入点（必须由具体切面以及 `AbstractSingletonAspect` 的子类定义）；以及一个“环绕”通知，类似于\
    \ JBoss AOP 拦截器中的 `invoke` 方法。\n\n此实现存在一个流程问题。在 AspectJ 中，切面默认是单例的，这意味着所有由 `singletonPointcut`\
    \ 切入点指定的类共享该切面的一个实例。因此，该切面包含对单例类唯一实例的引用。每次执行通知时，现有的单例都会被新创建的类之一覆盖。\n\n此处不能使用 AspectJ\
    \ 的关键字 `perthis` 和 `pertarget`，因为它们会为类的每个实例生成一个切面实例，这与期望的效果相反。\n\n此问题可以通过以下方式解决：\n\
    \n*   定义一个抽象切面作为多个具体切面的父切面：每个要转换为单例的类对应一个具体切面。这样，各个类就不会干扰其他单例。这是我们在前面示例中选择实现的解决方案。\n\
    *   使用哈希表（`java.util.Hashtable`）为每个被转换的类存储单例。我们在下一节中给出了此解决方案的示例。\n"
- fmt: 'We can now define a concrete aspect for each of the classes to be made into
    a singleton. If we want to transform the `Stats` class into a singleton, as we
    did previously with JBoss AOP, we must program the aspect shown in Listing 8-7.


    **Listing 8-7.** *Concrete AspectJ Aspect to Bind the Singleton Design Pattern
    to the `Stats` Class*


    ```

    package aop.patterns.singleton;


    public aspect SingletonAspect extends AbstractSingletonAspect {


    pointcut singletonPointcut() : call(Stats.new(..));


    }

    ```


    Once the application is compiled, we execute the test class shown previously,
    obtaining the following result:


    ```

    These instances are the same!

    ```


    We obtain the same result as with the JBoss AOP implementation: the `Stats` class
    has been transformed into a singleton.


    **Evaluation of the Implementation**


    Unfortunately, this implementation of the Singleton design pattern has limited
    capability and can cause execution errors.


    The first problem is the multiple constructor issue. In the example, only one
    instance reference is stored so that we always return the same instance of the
    class, regardless of the constructor.


    Another problem is that this implementation is intrusive and can have damaging
    side effects on the way the application behaves, as will be described later.


    **Managing Multiple Constructors**


    In another context, we could use the singleton aspect with a class that contains
    several constructors. Although multiconstructor classes are not as adaptable to
    the singleton design pattern since it is designed to work with only one constructor,
    multiconstructor classes are frequently used in real applications, and therefore
    we can extend the pattern to deal with this case.


    With different constructors, we can expect the creation of different instances
    (which is not the case with our current implementation). This difficulty is, however,
    by no means insurmountable. It is possible to store one instance for each constructor.
    Besides, we can store an instance not only depending on the header, but also on
    the values of the parameters.


    With AspectJ, we obtain the result shown in Listing 8-8 for the abstract aspect.


    **Listing 8-8.** *Second Implementation of the Singleton Design Pattern Using
    AspectJ*


    ```

    package aop.patterns.singleton;


    import java.util.Hashtable;


    public abstract aspect AbstractMultipleSingletonAspect {


    private Hashtable singletons = new Hashtable();


    abstract pointcut singletonPointcut();


    private String getValue(Object o) {


    if (!o.getClass().isArray()) {


    return Integer.toString(o.hashCode());


    } else {


    StringBuffer value = new StringBuffer();


    Object[] temp = (Object[]) o;


    for (int i=0;i<temp.length;i++) {


    value.append(getValue(temp[i]));


    value.append(''|'');


    }


    return value.toString();


    }


    }


    Object around(): singletonPointcut() {


    String arguments;


    String signature = thisJoinPoint.getSignature().toString(); if(thisJoinPoint.getArgs().length>0)
    {


    arguments = getValue(thisJoinPoint.getArgs());


    } else {


    arguments = "";


    }


    Object singleton = singletons.get(signature+arguments);


    if (singleton == null) {


    singleton = proceed();


    singletons.put(signature+arguments,singleton);


    }


    return singleton;


    }


    }

    ```


    This new implementation of the abstract aspect is more complex than the previous
    example because we have used a hash table to store the singleton instances. The
    key used in the hash table is determined according to the signature of the constructor
    and the value of the arguments. The value is obtained using the method `getValue`
    (this method is explained in Chapter 9 in the section “Nonregression Tests.”)


    Now, to support multiple constructors, we have to create the aspect `SingletonAspect`
    by subclassing the abstract aspect `AbstractMultipleSingletonAspect`. Using a
    hash table could also solve the problem stated previously, whereas a concrete
    aspect cannot be shared by several aspectized classes.


    **The Invasive Nature of the Aspect**'
