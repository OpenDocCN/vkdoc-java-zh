    清单 12-3 中的实现显然优于那种直接从客户端代码解析并调用外观的简单实现。然而，这种改进并非完全令人满意，原因如下。首先，为了保持清晰的业务级 API，最好为每个业务对象实现一个业务委托。尽管理论上这项工作只需完成一次，但编写委托代码是一项容易出错且繁琐的任务。其次，对业务委托
    API 的访问构成了一个横切关注点。最后，委托不易重用，因为它们依赖于底层 J2EE 基础设施的通信层。


    请注意，业务委托实现使用了一个名为 `ServiceLocator` 的类，该类实现了另一种客户端设计模式，将在下一节中解释。


    服务定位器


    *服务定位器*设计模式降低了客户端因需要定位和创建远程服务访问存根而产生的复杂性。这种关注点在 J2EE 环境中很典型。


    将这种关注点模块化到服务定位器中，并不能消除所有技术依赖。


    首先，服务定位器的使用者（例如业务委托）必须引用 `javax.ejb.EJBHome` 和 `javax.ejb.EJBLocalHome` 接口。此外，`javax.ejb`、`java.rmi`
    和 `javax.naming` 包中的异常必须由使用代码处理。这些依赖关系在使用了服务定位器的 `BankDelegate` 代码中有所体现。


    在不同的客户端代码中使用服务定位器时，仍会存在一些横切关注点——例如，在基于 Servlet 的表示层客户端和 Swing 客户端的业务委托中。这些横切关注点实现了对
    EJB 接口的引用、对前述异常的处理，以及我们在每个客户端中都能找到的服务定位器引用。


    回顾一下，服务定位器也是 GoF 单例设计模式的一种实现。第 8 章展示了如何通过一个专用切面将普通类自动转换为单例（更多详情请参见第 8 章中的“单例设计模式”一节）。


