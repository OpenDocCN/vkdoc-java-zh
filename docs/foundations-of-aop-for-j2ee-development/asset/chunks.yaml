  raw: 'The executedTx method of line 15 gathers two independent functions that would
    benefit from being explicitly coded within the functional implementation: the
    Tx EJB creation (line 33), and the invocation of setBalance (line 32) on an account.


    As shown in the code, the Tx EJB creation uses a database-related method: DBHelper.


    getNextTxId (line 31), which returns the next available transaction identifier.
    This operation is a low-level operation that should probably not be used within
    a business method.


    Conceptually speaking, we can classify all the presented operations—Home interface
    resolving, account lookup from a primary key, and instantiation of the Tx EJB—within
    a reference-managing concern. This concern depends highly on the J2EE infrastructure
    and on the EJB model. This is clearly a crosscutting concern for all EJB accessing
    or for the creation of EJBs, particularly the session EJBs.


    The use of design patterns such as the locator can make the code less dependent
    on the infrastructure and minimize the design efforts through reuse. However,
    it is then the use of the pattern that becomes a crosscutting concern. Furthermore,
    the use of a locator pattern still requires an indirect use of the EJB model.


    **Using AOP**


    AOP, and more precisely the previously discussed implicit protocol technique,
    significantly simplifies the design and efficiently modularizes the reference-resolving
    crosscutting concern.


    First, we defined the reference accessing protocol in the EJB itself, as shown
    in Listing 11-11.


    In our program, it is a POJO since it automatically implements the javax.ejb.SessionBean
    interface through the POJOSession aspect. This POJO, named TxControllerPOJO, will
    be detailed in the rest of the chapter, once all the applied aspects have been
    presented.


