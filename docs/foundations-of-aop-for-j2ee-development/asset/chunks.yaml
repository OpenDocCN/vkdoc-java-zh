    \n## 实现前置条件\n\n`Listing 9-1`中的程序定义并使用了`sqrt`方法。\n\n**Listing 9-1.** *使用`sqrt`方法的示例*\n\
    ```\npackage aop.contracts.preconditions;\n\npublic class PreConditionExample\
    \ {\n\n    public double sqrt (double p) {\n        return Math.sqrt(p);\n   \
    \ }\n\n    public static void main(String[] args) {\n        PreConditionExample\
    \ t = new PreConditionExample();\n        System.out.println(\"sqrt of 4 : \"\
    +t.sqrt(4));\n        System.out.println(\"sqrt of 0 : \"+t.sqrt(0));\n      \
    \  System.out.println(\"sqrt of -4 : \"+t.sqrt(-4));\n        System.out.println(\"\
    sqrt of 9 : \"+t.sqrt (9));\n    }\n}\n```\n\n如果你在没有前置条件的情况下运行该程序，你将获得如`Listing\
    \ 9-2`所示的结果。\n\n**Listing 9-2.** *没有前置条件的执行跟踪*\n```\nsqrt of 4 : 2.0\nsqrt of\
    \ 0 : 0.0\nsqrt of -4 : NaN\nsqrt of 9 : 3.0\n```\n\n如你所见，当使用负数参数（`-4`）调用`sqrt`时，没有抛出任何异常。在这种情况下，`java.lang.Math.sqrt(double)`返回的值是`java.lang.Double.NaN`，以指示结果是“非数字”。\n\
    \n通过使用`JBoss AOP`，你可以在一个拦截器（对应于通知代码的概念）中实现`sqrt`的前置条件，如`Listing 9-3`所示。\n\n**Listing\
    \ 9-3.** *`sqrt`方法的前置条件拦截器*\n```\n01 package aop.contracts.preconditions;\n03\
    \ import java.lang.reflect.Method;\n05 import org.jboss.aop.Interceptor;\n06 import\
    \ org.jboss.aop.Invocation;\n07 import org.jboss.aop.InvocationResponse;\n08 import\
