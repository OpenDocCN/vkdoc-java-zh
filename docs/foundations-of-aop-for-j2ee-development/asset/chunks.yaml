- fmt: '# The Attributes Defined by the EJB Standard


    The attributes defined by the EJB standard are too simple to cover all the possible
    cases that can arise when developing complex applications. For instance, the programmer
    may need to retry a transaction if it did not complete successfully in the first
    place. It is also common to optimize the application by not applying a transaction
    within some contexts, which depends on the application or environment state. Nevertheless,
    when it comes to optimization, it is sometimes useful to limit the transaction
    application scope to an instruction group rather than to the whole method code.
    In this case, the only way is to use the `TX_BEAN_MANAGED` attribute and to manually
    code the transactional logic.


    Even in the cases when the provided attributes allow the description of the transactional
    logic, this technique still requires some code to be written in order to handle
    the client-side exceptions and some rollback management cases.


    In particular, the programmer may need to force the rollback of a transaction
    within a participant. In this case, the `setRollbackOnly` method shall be used
    (see line 7 of Listing 11-21) in order to cancel the transaction, even if higher-level
    participants try to commit the transaction.


    As an example, the code in Listing 11-21 prevents a negative `setBalance` from
    occurring in any transactional context:


    **Listing 11-21.** *An Example of Use for the `setRollbackOnly` Method*


    ```

    01 [...]

    02 public void setBalance(double amount)

    03 throw InsufficientFundsException {

    04     if( balance >= 0 ) {

    05         balance = amount;

    06     } else {

    07         context.setRollbackOnly();

    08         throw new InsufficientFundsException(balance);

    09     }

    10 }

    11 [...]

    ```


    As you can see, the declarative transaction management is not an ideal solution.
    The following sections show how AOP can be used in its place.


    ## AOP and the Modular Integration of Transactions


    Because of its flexibility, AOP is helpful for integrating transactions in a modular
    way, and by avoiding the limitations previously encountered.


    Indeed, to make a method transactional (here `transferFunds`), the transaction
    aspect shown in Listing 11-22 can be used.


    **Listing 11-22.** *An Aspect for Modularizing Transaction Management Code*


    ```

    01 package aop.j2ee.business.aspect;

    02

    03 import javax.ejb.EJBException;

    04 import aop.j2ee.business.session.txcontroller.TxControllerPOJO;

    05

    06 public privileged aspect Transaction {

    07     Object around(TxControllerPOJO controller) :

    08         execution(* TxControllerPOJO.transferFunds(..)) && this(controller)
    {

    09

    10         Object result;

    11         try {

    12             controller.context.getUserTransaction().begin();

    13         } catch (Exception e) {

    14             throw new EJBException("transferFunds: " + e.getMessage());

    15         }

    16         try {

    17             result=proceed(controller);

    18             controller.context.getUserTransaction().commit();

    19         } catch (Exception ex) {

    20             try {

    21                 controller.context.getUserTransaction().rollback();

    22             } catch (Exception e) {

    23                 throw new EJBException("transferFunds: " + e.getMessage());

    24             }

    25             throw new EJBException("transferFunds: " + ex.getMessage());

    26         }

    27         return result;

    28     }

    29 }

    ```


    Contrary to the container-managed transactions, the code that implements the start
    of a transaction (line 12) is fully open and accessible to the programmer, who
    can then implement all the variants required for the application.


    To limit the transaction’s scope to a group of instructions within a given method,
    you use the *anchoring protocol* technique.


    This technique is similar to the implicit protocol technique, which has already
    been used several times in this book. The main difference is that the aspect does
    not implement the protocol methods but uses them as anchor points to add code
    within the target method.


    For instance, we define two methods, `beginTx` (lines 4 and 19) and `endTx` (lines
    5 and 28), as the anchoring protocol in Listing 11-23.'
