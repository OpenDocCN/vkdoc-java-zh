    \        MethodInvocation methodInvocation = (MethodInvocation)invocation;\n20\
    \             Method method = methodInvocation.method;\n21             if (\"\
    sqrt\".equals(method.getName())) {\n22                 Double parameter = (Double)\
    \ methodInvocation.arguments[0];\n23                 if (parameter.doubleValue()\
    \ < 0) {\n24                     throw new Error(\"Unfulfilled precondition\"\
    );\n25                 }\n26             }\n27         }\n28         InvocationResponse\
    \ rsp = invocation.invokeNext();\n29         return rsp;\n30     }\n31 }\n```\n\
    \n`Listing 9-3`中的拦截器实现了`org.jboss.aop.Interceptor`接口及其两个方法：`getName`和`invoke`。`invoke`方法的行为如下：\n\
    \n1.  测试调用类型——`InvocationType.CONSTRUCTOR`、`InvocationType.METHOD`、`InvocationType.FIELD_READ`或`InvocationType.FIELD_WRITE`（参见第18行）。该程序只对方法调用感兴趣。\n\
    2.  如果被调用方法的名称为`sqrt`，则检查前置条件（参见第21行）。\n3.  从`methodInvocation`对象的`arguments`属性中获取`sqrt`参数的值（参见第22行）。\n\
    4.  如果参数为负值，则抛出一个错误（参见第24行）。\n\n为了将前置条件实际应用到程序中，必须修改`jboss-aop.xml`文件，以声明一个新的切入点与拦截器关联。对于此示例，`jboss-aop.xml`文件必须包含如`Listing\
