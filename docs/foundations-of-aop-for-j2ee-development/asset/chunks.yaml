    **85**


    • *Synchronization aspect*: The SynchronizationAC aspect manages locks to synchronize
    the access to methods. For example, this aspect ensures that a method is not executed
    by more than one method at a time.


    **Programming in UMLAF**


    UML Aspectual Factory (UMLAF) is the standard IDE that is distributed with JAC.
    This IDE is a rapid application development (RAD) environment that allows you
    to easily and rapidly develop applications with JAC. UMLAF uses the Unified Modeling
    Language (UML) notation to design applications.


    UMLAF implements only the class diagrams that are defined in UML. Although this
    is far from a full implementation of UML, class diagrams are nevertheless the
    most widely used diagrams at this time. These diagrams are sufficient in many
    cases—especially when aspects come into play.


    UMLAF extends the UML notation by adding the notions of an aspect and a pointcut.


    Aspects in UMLAF are considered to be a new kind of modeling element (much like
    classes); pointcuts define a new kind of relationship.


    Figure 4-5 displays a snapshot of UMLAF. Three classes (Invoices, Invoice, and
    Client), an aspect (TraceAspect), and a pointcut are defined.


    **Figure 4-5.** *UMLAF—a UML RAD tool for aspect-oriented development with JAC*


    **86**


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    UMLAF covers the entire developmental life cycle of an application. The business
    core of the application can be designed, new aspects can be added, and aspects
    that are defined in the library can be reused. UMLAF automates the writing of
    aspect-configuration files and application descriptors. A code-editing facility
    is provided. UMLAF generates JAC-specific code, compiles applications, and launches
    applications.


    UMLAF is an application that was written with JAC. Nine aspects were used for
    writing UMLAF. The most important ones are GuiAC, SessionAC, PersistenceAC, ConfirmationAC,
    and IntegrityAC.


    **Advanced Features**


    This section presents the advanced features of JAC.


    **Aspect Instantiation**


    When programming aspects with JAC, you must define two varieties of classes: one
    for the aspects and another for the wrappers. One variety extends org.objectweb.jac.core.


    AspectComponent, and the other extends org.objectweb.jac.core.Wrapper.


    The cardinality of the aspect class is always one. Each aspect is represented
    by only one instance per Virtual Machine (VM). An aspect manager (org.objectweb.jac.core.ACManager)
    manages all the aspect instances used by an application and provides features
    to weave aspects into the application.


    The cardinality of the wrapper class is somewhat more complex. First, a wrapper
    can be used in several pointcuts. Second, the cardinality varies for each pointcut
    depending on the value of the one2one parameter, which is given when you define
    a pointcut.


    When one2one is false, only one instance of a wrapper class is created for the
    pointcut.


    This instance is shared by all the joinpoints that are included in the pointcut.
    When several pointcuts use the same wrapper, each pointcut uses its own instance
    of the wrapper.


    When one2one is true, each joinpoint owns an instance of the wrapper class.


    When the application is distributed, these two rules are applied on each host.
    For example, when one2one is false, one instance of a wrapper class exists per
    pointcut and per host.


    **Aspect Ordering**


    When several aspects apply to the same joinpoint, you must define the execution
    order of the aspects. This order can be specified in the application-descriptor
    file with the jac.comp.wrappingOrder property, which is an ordered list of wrapper-class
    names. Whenever two wrappers specified in the list apply to the same joinpoint,
    their execution order is the one defined by the list.


    For example, the following definition specifies that AuthenticationWrapper must
    be executed before VerboseWrapper:


    jac.comp.wrappingOrder: \


    org.objectweb.jac.aspects.authentication.AuthenticationWrapper \ org.objectweb.jac.wrappers.VerboseWrapper


    There is no automatic rule that defines which wrapper must be executed before
    another; this decision is up to you. In the previous example, we chose to first
    authenticate calls and then


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    **87**


    log them. Therefore, only the calls that are successfully authenticated will be
    logged. In a different context, we might choose to log every call—even those that
    are not successfully authenticated. Hence, the reverse order would be defined.


    When the jac.comp.wrappingOrder property is omitted, no ordering rule is enforced,
    and the execution order is not guaranteed for two wrappers that apply to the same
    joinpoint.


    **RTTI**


    Run-time type identification (RTTI) can be thought of as an extension of reflection.
    The purpose is to construct a data structure that represents the code elements
    of a Java program.


    The elements taken into account are classes, methods, and fields. RTTI offers
    the ability to define annotations for these elements. An API is provided to set
    and get these annotations.


    RTTI is, then, very similar to the annotation mechanism introduced by J2SE 5.0—except
    that annotation can be dynamically modified at run time.


    You learned in the “Method-Type Operators” section earlier in this chapter that
    pointcut expressions can contain keywords, such as SETTERS and REMOVERS, that
    select methods according to their behaviors. These behaviors, which are determined
    by a bytecode analysis, are stored as annotations in the RTTI API.


    The method-type operators are not the only annotations that can be stored in the
    RTTI API—any programmer-defined property can be stored. For example, the persistent
    annotation can be attached to every field that needs to be saved in persistent
    storage. Values can also be stored with the properties. For example, the authorizedUsers
    property together with the value 10 can be attached to a method to declare that,
    at most, ten users can concurrently execute this method.


    **Object Naming**


    Every application object created by JAC is assigned a unique name to identify
    it. By default, this name is constructed by appending the pound-sign character
    ( *#*) and an instance number to the lowercase name of the class. The instance
    number starts at 0 and is incremented each time a new instance is created. For
    example, order#0 is assigned to the first instance of the Order class.


    Pointcut expressions can select objects depending on their names.


    The org.objectweb.jac.core.NameRepository class provides a repository for all
    the object names that exist in the application.


    The code block in Listing 4-11 displays the name and the reference of every existing
    object in an application programmed with JAC.


