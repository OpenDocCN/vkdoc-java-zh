    **View Helper**


    The *view helper* is a Java object that implements subparts of a JSP page’s logic.
    This design pattern externalizes Java code out of the JSP for maintenance and
    performance reasons.


    Indeed, when the Java logic of a JSP is implemented in a view helper, the code
    is compiled and loaded only once, thus avoiding the handling of too much Java
    code by the web servlet container.


    In specific cases, the implementation of the view helper is improved by using
    AOP. For instance, we can add filters to modify the behavior of the helper regarding
    some session-based criteria such as user preferences. This use of AOP can be considered
    as a generalization of the interception filters previously described. Note that
    the systematic use of AOP for filtering can lead to better separation of concerns.
    Filtering, for example, can be used to implement some internationalization features
    in a modular way.


    **Web Presentation Tier Summary**


    AOP improvements are less systematic in the presentation tier than in the business
    and client tiers. This is due to two main reasons:'
