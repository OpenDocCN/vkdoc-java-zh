    Foreword


    **A**spect orientation as a concept and aspect-oriented programming (AOP) as a
    technology have emerged as an attempt to provide further separation of concerns
    in the way we compose software. Aspects modularize concerns that otherwise would
    pervade and crosscut many areas of a program or application. As such, they can
    be thought of as a second-dimension modularization of operational nature, where
    the structural idea of a component would be the first.


    Although the ideas, concepts, and approaches (e.g., reflection) behind AOP are
    not new, the approach as it stands is novel in applying these ideas to form the
    aforementioned second dimension of modularization. AOP therefore is an important
    development in modern software engineering.


    The book in your hands, *Foundations of AOP for J2EE Development*, provides an
    excellent overview of this technology, its features, and its limitations. Dr.
    Pawlak, Mr. Retaillé, and Dr. Seinturier have provided detailed discussion of
    aspect orientation as an approach, AOP as a technology, and various implementations
    of AOP and how they might be used.


    It would be mere speculation to attempt to predict the future of AOP, or indeed
    its impact on software engineering or its longevity. What we can say about it
    with certainty, however, is that all students, investigators, and serious practitioners
    of software engineering should become familiar with this technology and assess
    its potential in their own work. *Foundations of AOP for* *J2EE Development* is
    an excellent resource to begin to do so.


    —Houman Younessi


    Professor of Computer Science and Chairman of the Department of Engineering and
    Science Rensselaer Polytechnic Institute, Hartford Graduate Campus Hartford, Connecticut


