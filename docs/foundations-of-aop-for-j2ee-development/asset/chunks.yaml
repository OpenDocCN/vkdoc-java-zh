    **Advice Code**


    You learned that pointcut descriptors define the areas where the instructions
    from an aspect need to be inserted. These instructions are defined in advice code
    blocks.


    In object-oriented languages, the behavior of a class is defined in its methods.
    In contrast, in AOP, this behavior is defined in advice code. In an aspect, there
    may be several advice code blocks, with each one containing a set of instructions.
    In addition, each advice code block has a type and is associated with a pointcut
    descriptor.


    **The Code of an Advice Code Block**


    The code of an advice code block can contain any valid Java instruction, such
    as a method call, a variable assignment, an object creation (using new), a loop
    (using for, while, or do/while), a test (using if), and an exception-handling
    block (using try/catch).


    Two additional instructions, proceed and thisJoinPoint, are also valid in AspectJ.
    These instructions are used exclusively for advice code; in any other context,
    they generate compiler errors. The proceed keyword executes the joinpoint and
    can be used only in “around” advice code. The thisJoinPoint keyword can be used
    for any kind of advice code. As mentioned previously, thisJoinPoint is a reference
    to an object that describes the current joinpoint.


    **The Different Types of Advice Code**


    AspectJ defines five types of advice code. Of these five, “before,” “after,” and
    “around” are the more-commonly encountered ones. The last two types, “after returning”
    and “after throwing,”


    can be seen as refinements of the “after” type.


    **44**


    C H A P T E R 3 ■ A S P E C T J


    The “Before” Type


    “Before” advice code is executed before the joinpoints that are included in the
    pointcut associated with the advice code.


    The following example illustrates the usage of “before” advice code: before():
    toBeTraced() {


    System.out.println("... before the joinpoints included in toBeTraced ...");


    }


    The syntax for the definition of “before” advice code consists of the type of
    advice code (here, before), the name of the pointcut descriptor that is associated
    with the advice code (here, toBeTraced), and the code itself between curly brackets.


    The second part, the name of the pointcut descriptor, is not mandatory. You can
    provide the code of the pointcut descriptor right after the type. In this case,
    the pointcut is said to be *anonymous*. An example of anonymous pointcut is the
    following: before(): call( * Order.addItem(..) ) { ... }


    However, the use of a named pointcut descriptor is preferred because this produces
    programs that are clearer and easier to maintain. Furthermore, when a pointcut
    descriptor is reused in several advice code blocks, the use of a name avoids useless,
    error-prone repetitions.


    In the previous section, you learned that pointcut descriptors can accept parameters.


    Hence, when used, the associated advice code must also be parameterized.


    The example in Listing 3-10 reuses the toBeTraced2 pointcut descriptor with four
    parameters and associates the pointcut with “before” advice.


    **Listing 3-10.** *Defining Parameterized Pointcuts* 1 pointcut


    2 toBeTraced2( Customer src, Order dst, String ref, int qty ): 3 call( * *.*(..)
    ) &&


    4 this(src) && target(dst) && args(ref,qty); 5 before( Customer src, Order dst,
    String ref, int qty ): 6 toBeTraced2(src,dst,ref,qty) {


    7 System.out.println(


    8 "... before the joinpoints included in toBeTraced2 ..."); 9 System.out.println(
    src + " " + dst + " " + ref + " " + qty ); 10 }


    The four parameters that are defined in the pointcut descriptor are also used
    for the definition of the advice code. (See line 6 in Listing 3-10). These parameters
    are then available for any instruction that is defined in the body of the advice
    code block.


    The “After” Type


    “After” advice is executed after each associated joinpoint. Its code uses the
    same syntax rules as “before” advice. The previous examples of the toBeTraced
    and toBeTraced2 pointcut descriptors would be valid simply by replacing the before
    keyword with after.


    C H A P T E R 3 ■ A S P E C T J


    **45**


    The last two types of advice code that are defined by AspectJ are “after returning”
    and


    “after throwing.” These types ensue from the idea that the execution of a joinpoint—for
    instance, a method-execution joinpoint—ends normally or with the raising of an
    exception.


    The former case is handled by the “after returning” type, whereas the latter case
    is handled by the “after throwing” type.


    The “After Returning” Type


    “After returning” advice code is executed after each normal execution of the joinpoints
    that are associated with the pointcut descriptor.


    The following code illustrates the usage of the “after returning” type: after()
    returning (double d): ... {


    System.out.println("The returned value is: "+d);


    }


    The value that is returned by the joinpoint can be accessed with the variable
    found in parentheses after the after returning keywords. The variable is either
    the exact type (here, double) of the value returned by the joinpoint or a valid
    supertype (for example, Object for all Java types, including primitive types).


    The “After Throwing” Type


    “After throwing” advice code is executed when a given joinpoint that is associated
    with a pointcut descriptor ends its execution by raising an exception.


    The following code illustrates the usage of the “after throwing” type: after()
    throwing (Exception e): ... {


    System.out.println("The raised exception is: "+e);


    }


    The exception that is raised by the joinpoint can be accessed with the variable
    defined in parentheses following the after throwing keywords. In the previous
    example, the variable is e.


    This variable can be used anywhere in the body of the advice code.


    The “Around” Type


    “Around” advice code is executed before and after each associated joinpoint. The
    proceed keyword executes the joinpoint, which is bound by the “before” and “after”
    parts of the advice code. Specifically, this keyword executes the joinpoint in
    the following way: **1.** The “before” part is executed.


    **2.** The joinpoint is executed when the proceed keyword is used.


    **3.** The “after” part is executed.


    In “around” advice code, the “before” or “after” part can be empty; then, the
    “around”


    advice code is equivalent to “before” or “after” advice code. The proceed keyword
    is optional in


    “around” advice code. If proceed is not used, the joinpoint is not executed. This
    behavior could


    **46**


    C H A P T E R 3 ■ A S P E C T J


    correspond to a security aspect in which calls from unauthorized users are rejected,
    for instance. The proceed keyword can be used several times in the same “around”
    advice code block. However, this situation is infrequent and corresponds to cases
    in which several attempts at executing the application are needed—for instance,
    after an unexpected error.


    Unlike “before” and “after” advice code, the return type of “around” advice code
    is associated with the return type of the joinpoints. If the “around” advice code
    is not a supertype of the return type that is defined for the joinpoints, the
    AspectJ compiler raises an error. When other return types (including the void
    return type) appear for the joinpoints in a given pointcut, the Object type must
    be used as the return type of the advice code. (In Java, Object is considered
    the supertype of all types.)


    Listing 3-11 illustrates the use of “around” advice code.


    **Listing 3-11.** *“Around” Advice-Code Example*


    Object around(): ... {


    System.out.println("before");


    Object ret = proceed();


    System.out.println("before");


    return ret;


    }


    In Listing 3-11, the call to proceed returns a value that is stored in the ret
    variable. This is the value that is returned by the joinpoint. This value and,
    in fact, all other values, must be returned by the advice code (as is done here
    by the return ret instruction).


    When the advice code is associated with a parameterized pointcut descriptor, all
    the parameters must be passed when proceed is called. This is illustrated by Listing
    3-12.


    **Listing 3-12.** *“Around” Advice Code with Parameters* Object around( Customer
    src, Order dst, String ref, int qty ): toBeTraced2(src,dst,ref,qty) {


    System.out.println("before");


    Object ret = proceed(src,dst,ref,qty);


    System.out.println("after");


    return ret;


    }


    **Advice Code and Exceptions**


    Advice code has the ability to raise an exception when needed. In such cases,
    the type of the exception must be specified in the signature of the advice code.
    For methods, the throws keyword must be used to specify the exception.


    The following piece of code defines “around” advice code that possibly throws
    an exception:


    Object around() throws Exception: ... {


    /* ... */


    if( /*condition*/ )


    throw new Exception();


    /* ... */


    }


    C H A P T E R 3 ■ A S P E C T J


    **47**


    When an exception is declared by advice code, the type of the exception must also
    be specified in the signature of the joinpoint. For instance, a method-execution
    joinpoint must list the exception in the throws clause. This is a limitation that
    obliges the application code to be aware of the exceptions thrown by the aspects.
    In practice, this limitation can be solved by specifying that the advice code
    raises an exception of type RuntimeException. In Java, run-time exceptions are
    unchecked; therefore, the signatures of the program methods can be left unchanged.


    **The Introduction Mechanism**


    In the previous sections, you learned that pointcut descriptors and advice code
    blocks allow an aspect to extend or modify the behavior of an application. Pointcut
    descriptors designate joinpoints (method calls, method executions, read operations,
    write operations, and so on) in the execution flow of a program, and advice code
    blocks add instructions before or after these joinpoints. In all cases, if no
    joinpoints are activated, the advice code will not be executed either.


    The introduction mechanism is used in AspectJ to extend the structure of an application.


    The term *introduction* refers to the process of the aspect adding code elements
    to the application. AspectJ can introduce, or add, six categories of these elements:
    fields, methods, constructors, inherited classes, implemented interfaces, and
    exceptions. The following sections will explain these categories in detail.


    Contrary to advice code, which extends the behavior of an application only when
    the joinpoints are executed, the introduction mechanism is unconditional—the extended
    code is always added.


    AspectJ uses the term *intertype declaration* to refer to the introduction mechanism.
    The concept behind this is that an aspect, which is considered a type, declares
    elements (for example, fields, methods, inherited classes, and implemented interfaces)
    on behalf of other types—in other words, on behalf of the classes of the application.


    No special keyword is defined in AspectJ for introduced elements, which are defined
    declaratively.


    **Fields, Methods, and Constructors**


    An aspect that introduces fields, methods, or constructors in a class performs
    a declaration on behalf of this class. This declaration follows the same rules
    as a regular Java declaration. The name of the field or method is preceded by
    the name of the class that the introduction is to be performed in. Constructors
    are designated with the new keyword.


    The aspect in Listing 3-13 introduces the date field, two methods named getDate
    and setDate, and a constructor in the Order class.


    **Listing 3-13.** *Intertype Declaration*


    import java.util.Date;


    public aspect AddDate {


    private Date Order.date;


    public Date Order.getDate() { return date; }


    public void Order.setDate(Date date) { this.date=date; }


    **48**


    C H A P T E R 3 ■ A S P E C T J


    public Order.new(Date date) { this.date=date; }


    after(): initialization(Order.new(..)) {


    Order myOrder = (Order) thisJoinPoint.getTarget();


    myOrder.date = new Date();


    }


    }


    In the AddDate aspect in Listing 3-13, “after” advice code is defined after the
    instantiations of the Order class. This advice code collects the references of
    the instantiated orders and sets the current date to the introduced date field.


    Although these introductions are simplistic, they should be dealt with cautiously.
    Accordingly, the elements defined in the application must not conflict with the
    elements introduced by the aspect. For instance, if a date field already exists
    in the Order class, a compiler error occurs.


    AspectJ does not provide an option to check whether a field or method name already
    exists before it performs the introduction. The existence of conflicting elements
    is revealed only during compile time when the error occurs. Therefore, it is up
    to you to manually correct the program or the aspect when this occurs.


    **Inherited Classes and Implemented Interfaces**


    In addition to fields and methods, the introduction mechanism provided by AspectJ
    allows you to modify the inheritance and implementation hierarchies defined in
    an application. The declare parents keyword combination permits this.


    The following aspect adds the AddDateItf interface to the Order class and creates
    an inheritance link between AddDateImpl and Order:


    public aspect AddDate2 {


    declare parents: Order implements AddDateItf;


    declare parents: Order extends AddDateImpl;


    }


    The addition of a new interface is always possible since there are no constraints
    in Java on the number of interfaces implemented by a class. This is not the case
    for inheritance because only a single inheritance is supported in Java.


    In the previous example, if the Order class was already a subclass of the Document
    class, the modification of the inheritance link by the AddDate2 aspect would have
    produced a compiler error.


    The names of the classes to be modified can contain wildcards. Logical expressions
    created with the Boolean OR operator (||) can be written to modify several classes
    with a single declaration.


    **Exceptions**


    The last element that can be introduced performs the function of catching the
    exceptions that are raised by an application.


    The exceptions raised by the application are wrapped in a special exception called
    org.aspectj.lang.SoftException.


    C H A P T E R 3 ■ A S P E C T J


    **49**


    The declare soft keyword combination is provided to implement this introduction
    mechanism. A type and a pointcut descriptor must be provided. The type designates
    the type of exceptions to be caught, and the pointcut descriptor designates the
    joinpoints where the exceptions are to be caught.


    For instance, the following line of code


    declare soft: IOException+: call( * InputStream.*(..) )


    declares that the subclasses of a certain exception—the IOException exception
    that is thrown when a method defined in the InputStream class is called—must be
    wrapped in the org.


    aspectj.lang.SoftException exception.


    **Advanced Features**


    The previous sections introduced the many features offered by AspectJ for programming
    aspects. As with other languages, advanced functionalities—apart from the mainstream
    features—that complement the language exist. In AspectJ, these are the concepts
    of the abstract aspect, aspect inheritance, aspect instantiation, aspect ordering,
    and the privileged aspect.


    **The Abstract Aspect**


    The aim of the *abstract aspect* in AspectJ is to define an aspect that has some
    undefined elements (pointcuts or methods). These elements are then said to be
    *abstract*. This concept is similar to that of an abstract class. The precise
    definition of these elements will be given in a subaspect.


    Abstract aspects allow you to factor definitions that are shared by several aspects.
    As with abstract classes, abstract aspects cannot be instantiated.


    The abstract keyword is used to define abstract aspects. It can be written before
    the aspect or pointcut keyword (for defining pointcut descriptors) and before
    the method that is abstract in the aspect. The following section illustrates the
    precise definition of an abstract aspect.


    **Aspect Inheritance**


    Inheritance can be used with aspects like it is used with classes. The goal is
    to extend an aspect without rewriting it completely. Only single inheritance is
    supported.


    As with classes, the extends keyword provides the inheritance feature. In the
    following line of code, the TraceAspect2 aspect extends the TraceAspect aspect:
    public aspect TraceApect2 extends TraceAspect { ... }


    However, aspect inheritance does not follow the same exact rules as class inheritance.
    An aspect can extend only abstract aspects, whereas a class can extend both abstract
    and nonab-stract classes.


    A pointcut can be redefined in a subaspect. If a pointcut is redefined, the redefined
    version will always be used. Pointcut redefinition with aspect inheritance follows
    the same rules as method redefinition with class inheritance.


    **50**


    C H A P T E R 3 ■ A S P E C T J


    Conversely, advice code cannot be redefined. Inherited advice code is thus always
    available in a subaspect.


    The code in Listing 3-14 defines the abstract TraceAspect aspect with the abstract
    toBeTraced pointcut descriptor. TraceAspect2 extends TraceAspect and defines the
    toBeTraced pointcut descriptor.


    **Listing 3-14.** *The Definition of an Abstract Aspect* public abstract aspect
    TraceAspect {


    abstract pointcut toBeTraced();


    before(): toBeTraced() { ... }


    }


    public aspect TraceAspect2 extends TraceAspect {


    pointcut toBeTraced(): call(* Order.*(..));


    }


    **Aspect Instantiation**


    By default, a unique instance of an aspect is created when the application is
    launched. The aspect is then said to be a *singleton*. The same aspect instance
    is shared by all the application objects.


    In special cases, it can be useful to create several instances of a given aspect.
    Different application objects are then aspectized by the different instances.
    For example, this feature can be used to dedicate different pieces of data to
    each part of the application.


    The three following cases can occur:


    • The aspect is a singleton, and only one instance of the aspect exists at run
    time. This is the default case.


    • The aspect is instantiated several times, and the instances are associated with
    different application objects.


    • The aspect is instantiated several times, and the instances are associated with
    different control-flow sequences of the application.


    No keyword exists for the first case because this is the default behavior when
    the aspect keyword is used.


    For the second case, two keywords are available: perthis and pertarget. The aspects
    can then be written as follows:


    aspect <name> perthis( <poincut> ) { ... }


    aspect <name> pertarget( <poincut> ) { ... }


    When perthis is used, an instance of the aspect is created for every object that
    is an executing object of the given pointcut. The other objects (those that are
    not executing objects of the pointcut) are not aspectized. When pertarget is used,
    an instance of the aspect is created for every object that is the target object
    of the given pointcut.


    For the third case, two keywords are available: percflow and percflowbelow. The
    aspects can then be written as follows:


    C H A P T E R 3 ■ A S P E C T J


    **51**


    aspect <name> percflow( <poincut> ) { ... }


    aspect <name> perclfowbelow( <poincut> ) { ... }


    When percflow is used, an aspect instance is created each time the application
    enters the control-flow sequence that is designated by the pointcut. As for the
    cflow operator in pointcut definitions, the joinpoints belongs to the control
    flow. When percflowbelow is used, an aspect instance is created each time the
    application enters the control-flow sequence that is designated by the pointcut,
    but the joinpoints are not included in the control flow.


    The static aspectOf method is defined for each aspect and returns the aspect instance
    that is currently in use. For example, in the singleton TraceAspect aspect, the
    call TraceAspect.


    aspectOf() returns the reference to the singleton. For the perthis and pertarget
    types, a parameter must be passed when aspectOf is called; this parameter gives
    the source or the target object that is associated with the requested instance.
    For the percflow and percflowbelow types, no parameters are needed. The method
    returns the aspect instance or null, depending on whether the current run is included
    in the control-flow sequences that are defined for the aspects.


    **Aspect Ordering**


    When two or more aspects apply to the same joinpoint, the execution order of these
    aspects must be determined.


    AspectJ allows you to define explicit ordering rules. This is called *explicit
    ordering*. If the rules are undefined, the compiler automatically orders the aspects.
    This is called *implicit* *ordering*.


    Explicit Ordering


    The declare precedence keyword combination allows you to declare the execution
    order of different aspects.


    The following code illustrates the usage of this keyword combination: aspect GlobalOrder
    {


    declare precedence: Authentication, Trace;


    }


    aspect Authentication { ... }


    aspect Trace { ... }


    In the previous code, the Authentication aspect is always executed before Trace
    is. Wildcards can be used in the aspect names that are associated with declare
    precedence.


    Despite the location of the definition, the order is valid for the whole program.
    The declare precedence keyword combination can be used several times in a program.
    If the given orders are inconsistent, the AspectJ compiler raises an error.


    Implicit Ordering


    When no order is defined, or when the order is defined for some aspects but not
    for others, AspectJ applies the following rules:


    **52**


    C H A P T E R 3 ■ A S P E C T J


    • The subaspects are applied before the inherited aspects.


    • No order is guaranteed for aspects that are not linked by an inheritance relationship.


    • If several advice code blocks apply to the same joinpoint for a given aspect,
    the following rules apply:


    • “After” advice code blocks are executed last.


    • Advice code blocks are executed in the order in which they are defined in the
    aspect.


    These rules can lead to inconsistencies which are raised by the AspectJ compiler.


    It is recommended that the aspect order be defined explicitly and as often as
    possible with the declare precedence keyword combination. When you write an aspect,
    it is favorable to first write all the “before” advice code and then the “after”
    advice code.


    **The Privileged Aspect**


    For accessing fields or methods, the same rules apply to aspects as Java classes.
    For example, aspects cannot read or write a private or protected field. The purpose
    of this particular rule is to guarantee the integrity of the program and to avoid
    the accidental and erroneous altering of objects.


    Nevertheless, some cases require a bypass of this limitation. AspectJ provides
    for these cases the concept of a privileged aspect:


    privileged aspect <name> { ... }


    A privileged aspect can access all the fields and methods defined in a class—regardless
    of their access modifiers. This feature must be used cautiously as it may corrupt
    the normal behavior of the program.


    **Declaring Warnings and Errors**


    AspectJ offers a mechanism that raises compile-time warnings or errors whenever
    a given pointcut expression is matched by a program. In this way, you can be notified
    if your program defines unwanted code elements.


    For example, the aspect in Listing 3-15 raises a warning if the Remote interface
    is implemented in the bank.ejb package.


    **Listing 3-15.** *Declaring Warnings with an Aspect* public aspect Foo {


    declare warning:


    execution(* Remote+.*(..)) && within(bank.ejb.*):


    " Remote may interfere with EJBs in bank.ejb";


    }


    A message can be associated with each raised warning.


    The declare error keyword combination works similarly.


    C H A P T E R 3 ■ A S P E C T J


    **53**


    **Load-Time Weaving**


    By default, AspectJ is a compile-time weaver. Given a set of .java source files
    and a set of aspects, the ajc command-line tool produces a set of .class files
    in which the aspects are woven to the classes.


    Since version 1.2, AspectJ can weave code at load time. The source code of the
    program is no longer required, and AspectJ can weave any class that can be obtained
    with the class-loading mechanism of the Java language.


    **New Features in AspectJ 5**


    During the writing of this book, AspectJ 1.2.1, which was released on November
    5, 2004, was the latest stable version of AspectJ. However, a newer version, numbered
    1.5.0 and officially called AspectJ 5, is under preparation. The first major developments
    of AspectJ 1.5.0M1 were made available to the developing community in December
    2004\. The main purpose of this evolution was to incorporate the changes brought
    to the Java language by Java 5.


    The features described in the remainder of this section can be found in the developer
    release of AspectJ 1.5.0, which is available at the time of the writing of this
    book. By the time AspectJ 5 is final, these features may have slightly changed
    according to user’s feedback, design choices, or error corrections.


    Most of the changes brought by AspectJ 5 deal with *annotations* (also known as
    *metadata*).


    First, an aspect can deal with an annotated Java program. The annotations defined
    for classes or methods can be taken into account when defining a pointcut. Also,
    annotations can be introduced into a Java program. Second, annotations have an
    impact on the syntax of the AspectJ language itself. Instead of using dedicated
    keywords such as aspect and pointcut, you can write annotated Java classes that
    will be understood by the AspectJ weaver as aspects.


    These two categories of features are presented in the remainder of this section.


    **Working with Annotations in Aspects**


    The handling of annotations in Java programs brings several changes to the AspectJ
    language.


    The changes concern the definition of an aspect, the pointcut-definition language,
    and the introduction of annotations.


    **Annotations and Pointcut Definitions**


    You learned in the previous sections that a pointcut can capture elements of a
    Java program, such as methods and fields, and link them together in order to aspectize
    them. In this process, the writing of a pointcut relies heavily on the elements
    that define a field or method, such as the name, type, or signature. It then seems
    natural to incorporate annotations for fields or methods in the writing of a pointcut.


    With AspectJ 5, the pattern language for a pointcut descriptor is extended with
    the at-sign symbol (@) followed by an annotation name. For instance, the following
    expression execution( @Transaction * *.*(..) )


    designates all the joinpoints that are executions of a method annotated with @Transaction,
    regardless of the method’s return type, declaring class, name, or signature.


    **54**


    C H A P T E R 3 ■ A S P E C T J


    Several annotations can be specified, in which case all of them are required for
    the element to be included in the pointcut.


    The Boolean OR operator (||) can be used between annotations to signify that at
    least one of the annotations must be present. For instance, @(Foo || Bar) means
    that either @Foo or @Bar is required as an annotation.


    The Boolean NOT operator (!) is used in front of an annotation. For instance,
    !@Foo means that all elements that are not annotated with @Foo are included in
    the definition.


    Joinpoints can be filtered according to the annotations available to the source
    and target objects of a method call. The @this and @target operators are defined
    for this purpose. For instance, the following expression


    call( * *.*(..) ) && @target( @Transaction )


    designates all the calls to a method that is annotated with @Transaction.


    At the time this book was written, it was not possible to match joinpoints based
    on their annotation values. This facility may be supported in future releases
    of AspectJ.


    **Introducing Annotations**


    In AspectJ 5, the declare keyword is associated with four new forms that allow
    you to introduce annotations in Java programs.


    Introducing annotations consists of defining a pattern that refers to program
    elements (classes, interfaces, fields, methods, or constructors) and giving the
    annotations that must be introduced for all the program elements that match the
    pattern.


    For instance, the following instruction


    declare @type: bank.* : @EJBean;


    introduces the annotation @EJBean for all the types (classes and interfaces) that
    are defined in the bank package.


    Similarly, annotations can be introduced for methods. The keyword combination
    is then declare @method and the pattern refers to method names. For example, the
    following instruction


    declare @method: bank.*.deposit(..): @Transaction(value="required"); introduces
    the annotation @Transaction(value="required") for all the deposit methods that
    are defined in the bank package.


    The declare @field and declare @constructor keywords follow the same principle.


    **Defining Aspects with Annotations**


    Using the previously presented features, you can write aspects that deal with
    a Java program containing annotations, or you can write aspects that introduce
    annotations.


    The annotations that are presented in this section are very different. Their purpose
    is to replace the current syntax of the AspectJ language and to allow you to write
    annotated Java classes. These classes are understood by the AspectJ weaver not
    as regular Java classes but as aspects. This approach creates an entirely new
    development style in which there are no more syntax extensions, but instead there
    are a set of annotations available for AOP.


    C H A P T E R 3 ■ A S P E C T J


    **55**


    The first annotation is @Aspect. A Java class annotated with @Aspect is understood
    as an aspect. The following code snippet defines the TraceAspect4 aspect:


    @Aspect


    public class TraceAspect4 {


    // ...


    }


    You learned in the “Advanced Features” section earlier in this chapter that aspects
    can be qualified, either with an instantiation clause (using perthis, pertarget,
    percflow, or percflowbelow) or with the privileged keyword. These qualifiers still
    exist with the @Aspect annotation style. For example, the following annotation


    @Aspect(


    instantiationModel=AspectInstantiationModel.PERTARGET,


    perClausePattern="aPointcutDefinition()",


    isPrivileged=true )


    defines a privileged aspect with a PERTARGET instantiation model.


    Pointcut Definition


    With the annotation-based development style, a pointcut is a method with an empty
    body that is annotated with @Pointcut. This annotation takes the pointcut expression
    as a parameter. For example, the following code snippet defines the pointcut toBeTraced:


    @Pointcut( "call(* aop.aspectj.Order.*(..))" ) void toBeTraced() {}


    With this new style, the parameters that would have been defined for a pointcut
    are now defined as parameters of the annotated method.


    Advice-Code Definition


    Advice code blocks are already blocks of instructions, so it is quite natural
    that advice code blocks are now methods. Five new annotations are available, one
    for each different type of advice code: @Before, @After, @AfterReturning, @AfterThrowing,
    and @Around.


    In all five cases, the annotation takes the associated pointcut expression as
    a parameter.


    **“Before” Advice Code**


    The following code snippet illustrates the definition of “before” advice:


    @Before( "toBeTraced()" )


    public void beforeTrace() { ... }


    Note that with this new development style, advice code blocks now share the same
    name as the method.


    If the “before” advice code needs to access the joinpoint, a parameter of type
    JoinPoint is added to the method signature, as shown here:


    **56**


    C H A P T E R 3 ■ A S P E C T J


    @Before( "toBeTraced()" )


    public void beforeTrace( JoinPoint jp ) { ... }


    If the pointcut expression defines parameters, these parameters will also be made
    available as method parameters. The following code lines, for example, define
    “before” advice code for method calls in which the src and dst parameters are
    bound to the source and target, respectively, of the call:


    @Before( "toBeTraced() && this(src) && target(dst)" ) public void beforeTrace(
    Object src, Object dst ) { ... }


    This principle of appending the joinpoint and the pointcut parameters to the signature
    of the advice-code method also applies to other types of advice code.


    **“Around” Advice Code**


    “Around” advice code is similar to “before” advice code. The only issue here is
    raised by the annotation development style, which is linked to proceed. If you
    do not change the old syntax, the call to proceed will lead to a compiler error.
    (Keep in mind that aspects are now regular Java classes.)


    To solve this problem, AspectJ 5 defines proceed as a method of the ProceedingJoinPoint
    interface, which extends the existing JoinPoint interface and allows the joinpoint
    to be visible as a parameter of the “around” advice-code method.


    The following lines of code illustrate the definition of “around” advice code:


    @Around( "toBeTraced()" )


    public Object trace( ProceedingJoinPoint jp ) {


    // ... Before code


    Object ret = jp.proceed();


    // ... After code


    return ret;


    }


    **“After” Advice Code**


    The definition of “after” advice code does not differ from the definition of “before”
    advice code except that the annotation is @After.


    The situation is slightly different for @AfterReturning and @AfterThrowing. The
    returned value or the thrown exception must be made visible in the advice-code
    method.


    In the case of @AfterReturning, a new parameter named returning is added to the
    annotation. Its value identifies the method parameter that will contain the returned
    value. The following lines define “after returning” advice code:


    @AfterReturning( value="toBeTraced()", returning="ret" ) public void afterTrace(
    Object ret ) { ... }


    The value returned by the intercepted joinpoints is assigned to the ret parameter.


    The principle is the same for “after throwing” advice code, except that the annotation
    defines a parameter named throwing for holding the thrown exception.


    C H A P T E R 3 ■ A S P E C T J


    **57**


    Declare Statements


    The declare statement is available in various forms in AspectJ:


    • declare parents ... implements and declare parents ... extends: These are the
    two most current forms, which allow you to introduce a new interface and a new
    superclass, respectively.


    • declare error and declare warning: These forms raise errors and warnings.


    • declare @...: Annotations can be introduced with this form.


    • declare precedence: Aspect ordering can be defined with this form.


    • declare soft: This form can be used to soften exceptions.


    At the time of the writing this book, all the previous forms of declare statements,
    except declare parents ... extends and declare soft, were available with the new
    annotation-based development style. The two exceptions may be added in a future
    release.


    The aspect in Listing 3-16 illustrates the definition of the following:


