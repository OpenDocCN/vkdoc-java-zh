    ## Weaver Implementation


    The heart of an aspect-oriented system is the *aspect weaver*. It is a tool used
    for integrating aspects with classes. Several ways of performing the weaving exist.
    `AspectJ` employs a compile-time weaver, which is typical of the language approach,
    whereas `JAC`, `JBoss AOP`, and `Spring AOP` use run-time weavers, which are typical
    of the framework approach.


    The `AspectJ` weaver can take either source code or bytecode as input. In addition
    to the compile-time weaving mode is a load-time mode, where aspects can be woven
    while the bytecode of the application is loaded into the JVM. The advantage of
    compile-time (or load-time) weaving is that it delivers woven applications with
    better execution times than are possible for run-time weaving. The disadvantage
    is that there is no distinction in the executed code between the aspect code and
    the application code. If the programmer needs to modify, add, or remove an aspect,
    then the entire application must be woven again.


    With `JAC`, `JBoss AOP`, and `Spring AOP`, classes and aspects are compiled separately,
    and the weaving is performed while the application is loaded and executed. Aspect
    and class instances are separate run-time entities, and the weaver orchestrates
    the execution according to the weaving directives. In such a mode, the weaving
    is an operation very similar to binding: an aspect instance is bound to the objects
    where the aspect applies. The advantage of this mode is that the binding can be
    dynamically modified, thus enabling the removal of aspects and the weaving of
    new aspects without recompiling the application. This feature can be useful for
    applications such as web servers, which have to be readily available, since new
    features can be deployed without stopping the application. One of the disadvantages
    of run-time weaving is that the applications are generally slower than statically
    woven ones.


    Note that although `AspectJ` could also implement run-time weaving, it is less
    natural as `AspectJ` follows the language approach. Most of the type checking
    performed by the compiler would then be disabled, which would erase most of the
    advantages of the language approach.


    On the other hand, the framework approach can hardly implement compile-time weaving,
    since it would imply some preprocessing tool, which is implemented much more efficiently
    by the language approach.


    ## Aspect


    We already mentioned that `AspectJ` is a language with its own syntax (with the
    `AspectJ` version 5, this dedicated syntax can be replaced by annotations), whereas
    `JAC`, `JBoss AOP`, and `Spring AOP` are frameworks.


    With `AspectJ`, aspects are software entities that define pointcuts and advice
    code, and they may also define fields and methods. Aspect inheritance has been
    implemented, but with some restrictions compared to class inheritance. A concrete
    aspect can extend an abstract aspect, but not another concrete one.


    With `JAC`, aspects are regular Java classes that extend the `AspectComponent`
    class provided by the `JAC` library. An aspect defines pointcuts, and advice code
    is written in separate *wrapper* *classes*. One of the key features of `JAC` is
    the mechanism known as *aspect configuration*. This tool allows the programmer
    to define the way an aspect can be reused with different applications while also
    tailoring to each application’s needs. For this, a set of configuration elements
    is externalized from the aspects into some configuration files that can be modified
    without recompiling the whole application.


    The concept of an aspect in `JBoss AOP` is split in two kinds of files: intercepting
    methods or interceptors implement advice code and are defined in Java classes,
    and pointcuts associate these interceptors with joinpoints and are defined in
    XML files. With newer versions of `JBoss AOP`, this distinction disappears; like
    in `AspectJ`, pointcuts can be defined with Java 5 annotations.


    With `Spring AOP`, advice and pointcuts are implemented in regular Java classes,
    which are configured as beans. The dependency injection principle allows for the
    configuration of the links between advice and pointcuts. There is no explicit
    aspect entity; however, an aspect can be seen as a set of *advisors*.


    The study of these four tools shows that the concept of an aspect is not mandatory
    for AOP. The actual primary concepts are pointcuts and advice, as well as a way
    to link them together. An aspect is no more than a set of pointcuts and advice
    that are logically related to a given concern. However, making this logical link
    explicit is not mandatory, and it is also useful to be able to define advice and
    pointcuts independently from a given aspect. In this case, we can say that these
    are anonymous pointcuts or advice.


    Besides gathering pointcuts and advice, an important role of an aspect is to be
    used as a configuration unit for a given concern. As just explained with the aspect
    configuration mechanism of `JAC`, the configuration capability is of primary importance
    for aspect reuse. We will detail this feature later in this chapter. However,
    when a system already natively supports a configuration level (such as the Spring
    bean configuration level), the aspect concept is not needed. It emerges from some
    configuration holding pointcuts and advice.


    ## Pointcut


    Recall that a *pointcut* is a set of code locations, called *joinpoints*, where
    an aspect can be woven. This idea is central in AOP. Pointcuts define the crosscutting
    nature of an aspect. A pointcut “talks about” the application and designates strategic
    locations where an aspect applies.


    In this section, we’ll summarize how to write pointcuts and the types of joinpoints
    supported by the various aspect-oriented languages and frameworks featured in
    this book.


    ### Pointcut Definition


    All existing aspect-oriented tools provide a pointcut language for defining the
    set of joinpoints that are included in a pointcut. Basically, this pointcut language
    can be seen as a query language. Instead of being a classic database, the structure
    to which the query is applied is a program. The goal here is to define a language
    that allows developers to write relevant queries in the simplest and most practical
    way possible. Consequently, a pointcut language typically defines a few keywords,
    the classical Boolean operators (AND, OR, NOT), and wildcards such as the character
    `*` for selecting joinpoint sets in a concise way.


    With `AspectJ`, pointcuts are defined with a dedicated syntax (the keyword `pointcut`)
    or with a Java 5 annotation. `JAC` pointcuts are defined by invoking an API with
    GNU regular expressions that define the set of joinpoints based on class names,
    object names, and method signatures. `JBoss AOP` pointcuts are defined either
    as XML tags or as Java 5 annotations. `Spring AOP` pointcuts can be defined either
    in XML or programmatically in Java.'
