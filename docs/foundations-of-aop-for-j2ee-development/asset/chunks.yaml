    JBoss AOP


    **T**his chapter illustrates a third environment for aspect-oriented programming:
    JBoss AOP.


    The syntax and concepts presented in this chapter correspond to version 1.1.1
    of JBoss AOP, which is the latest version available at the time of the writing
    of this book.


    JBoss AOP, like JAC, is a framework for AOP. Aspects and advice code blocks are
    written in regular Java, without any new keywords. However, in JBoss AOP, pointcuts
    are defined in XML—unlike JAC, where they are defined in Java. In addition, the
    weaving is dynamic and performed at run time, similar to that in JAC.


    JBoss AOP was designed and developed by Bill Burke. The JBoss Group—in particular,
    Marc Fleury, the CEO—contributed to the ideas that led to the implementation of
    JBoss AOP.


    JBoss AOP can be used as a stand-alone framework, or it can be included in the
    JBoss 4.x J2EE


    application server.


    JBoss AOP is open-source software released freely under the terms of the GNU Lesser
    General Public License (LGPL). While JBoss AOP is open source, this license allows
    for the incorporation of the software into business products. The JBoss AOP web
    site is http://


    www.jboss.org/products/aop.


    **Using JBoss AOP: An Introduction**


    This section presents an example of an aspect-oriented application with JBoss
    AOP. This example introduces the syntax for writing aspects, pointcuts, and advice
    code.


    We will reuse the order-management application that was presented in Chapter 3\.
    The application manages client orders. We will implement the same trace aspect
    that was programmed in Chapter 3, but with JBoss AOP. This aspect traces the execution
    of the application and determines the called methods and the order that they are
    called in.


    **A First Trace Aspect**


    The first aspect written with JBoss AOP monitors each ordered item by displaying
    a message before and after the addItem method as defined in the Order class.


    This aspect is defined by two files: jboss-aop.xml and TraceInterceptor.java.
    The former is an XML file that defines a pointcut; the latter is a Java file that
    defines the advice code associated with this pointcut.


    JBoss AOP uses the term *interceptor* instead of *advice code*; however, there
    are no differences between the two. Both define code that will be run before and
    after the joinpoints included in the pointcut.


    **91**


    **92**


    C H A P T E R 5 ■ J B O S S A O P


    **A First Pointcut**


    JBoss AOP pointcuts are defined in an XML file. The preferred file name is jboss-aop.xml,
    although this name can be changed.


    Two main XML tags are available: <bind> to define a pointcut, and <interceptor>
    to define the interceptor associated with the pointcut. The “Pointcuts” section
    later in this chapter defines the syntax of these tags in more detail.


    We illustrate the mechanism for defining pointcuts with the jboss-aop.xml file
    that is shown in Listing 5-1.


    **Listing 5-1.** *The XML Definition of a Pointcut with JBoss AOP*


    1 <?xml version="1.0" encoding="UTF-8"?> 2 <aop>


    3 <bind


    4 pointcut="execution(


    5 public void aop.jboss.Order->addItem(java.lang.String,int))"


    6 >


    7 <interceptor class="aop.jboss.TraceInterceptor" /> 8 </bind>


    9 </aop>


    After the regular header for all XML documents (shown on line 1 of Listing 5-1),
    the <aop> tag starts the definition of the aspects.


    The tag for defining a pointcut is <bind>. The pointcut attribute (shown on line
    4 of Listing 5-1) provides the pointcut expression. In the given value, the expression
    contains the execution keyword and a method signature. The execution keyword denotes
    the joinpoints where the methods that are associated to the given signature are
    executed. In Listing 5-1, the signature designates the addItem method defined
    in the Order class. Although not the case in this example, the signature can contain
    wildcards.


    The <interceptor> tag (shown on line 7 of Listing 5-1) defines the interceptor
    that is associated with the pointcut. In the listing, the corresponding class
    is org.jboss.TraceInterceptor.


    **A First Interceptor**


    With JBoss AOP, an interceptor class must implement the org.jboss.aop.advice.Interceptor
    interface. This interface defines two methods: getName, which returns the name
    of the interceptor, and invoke, which defines the code to be run before and after
    the joinpoints.


    The class in Listing 5-2 defines the TraceInterceptor interceptor that was mentioned
    in the previous pointcut definition.


    **Listing 5-2.** *A JBoss AOP Trace Interceptor*


    package aop.jboss;


    import org.jboss.aop.advice.Interceptor;


    import org.jboss.aop.joinpoint.Invocation;


    import org.jboss.aop.joinpoint.MethodInvocation;


    C H A P T E R 5 ■ J B O S S A O P


    **93**


    public class TraceInterceptor implements Interceptor {


    public String getName() { return "TraceInterceptor"; }


    public Object invoke(Invocation invocation) throws Throwable {


    MethodInvocation mi = (MethodInvocation) invocation;


    String methodName = mi.getMethod().getName();


    System.out.println("-> Before "+methodName); Object rsp = invocation.invokeNext();


    System.out.println("-> After "+methodName); return rsp;


    } }


    The invoke method is called by the JBoss AOP framework just before the occurrence
    of a joinpoint. The only argument of this call contains information about the
    joinpoint. The return type corresponds to the value returned by the aspect.


    Several types of joinpoints exist with JBoss AOP. In the previous pointcut definition,
    the only type mentioned was that of method executions. In the example in Listing
    5-2, the invocation parameter in the call to invoke can only denote method executions.
    The first line in the body of invoke performs a cast operation to assign invocation
    to the mi variable, which is of type MethodInvocation. The interceptor displays
    a message, calls the invokeNext method, displays another message, and returns.
    The invokeNext method plays the same role that proceed does with AspectJ or JAC—when
    called, invokeNext executes the joinpoint.


