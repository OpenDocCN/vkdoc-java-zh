    **63**


    Creating a First Wrapper


    As stated earlier, JAC uses the term *wrapper* instead of the term *advice code*.
    No difference exists between an advice code block in AspectJ and a wrapper in
    JAC. Both are code blocks that define the behavior of an aspect. The code that
    a wrapper defines can be executed before or after the joinpoint.


    JAC requires you to define wrappers and aspects in distinct classes. This feature
    allows you to reuse wrappers independently from aspects. As you can see on line
    12 of Listing 4-1, the definition of a pointcut links a wrapper to an aspect.


    Listing 4-2 presents the TraceWrapper code.


    **Listing 4-2.** *A Trace Wrapper*


    1 package aop.jac;


    3 import org.aopalliance.intercept.ConstructorInvocation; 4 import org.aopalliance.intercept.MethodInvocation;


    5 import org.objectweb.jac.core.AspectComponent;


    6 import org.objectweb.jac.core.Wrapper;


    8 public class TraceWrapper extends Wrapper {


    10 public TraceWrapper(AspectComponent ac) {


    11 super(ac);


    12 }


    14 public Object invoke(MethodInvocation mi) throws Throwable {


    15 System.out.println("-> Before addItem"); 16 Object ret = proceed(mi);


    17 System.out.println("-> After addItem"); 18 return ret;


    19 }


    21 public Object construct(ConstructorInvocation ci) throws Throwable {


    22 return proceed(ci);


    23 }


    24 }


    Notice that you define JAC wrappers by extending the Wrapper class. These are
    always


    “around” wrappers; no special definition exists for “before” or “after” wrappers.
    You can define the latter two types by omitting the “after” or “before” part in
    an “around” wrapper.


    JAC wrappers implement the AOP Alliance API.


    **64**


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    **AOP ALLIANCE**


    The AOP Alliance project is an open-source initiative that was created to standardize
    part of the API that several existing AOP frameworks share. You can find the AOP
    Alliance web site at http://


    aopalliance.sourceforge.net.


    The various AOP frameworks offer different features, tools, and programming models.
    However, all the frameworks share a set of internal functionalities. The goal
    of the AOP Alliance project is to identify these features and propose a set of
    standard interfaces to implement them. AOP Alliance thus hopes to foster code
    reuse across different frameworks.


    At this writing, the AOP Alliance API is implemented by four frameworks: dynaop
    (see http://


    dynaop.dev.java.net), JAC (see http://jac.objectweb.org), JoyAop (see http://


    joyaop.sourceforge.net), and Spring (see http://www.springframework.org).


    A wrapper must define a constructor with a parameter of type AspectComponent,
    and the wrapper must call the corresponding inherited constructor. (See line 11
    of Listing 4-2). This constructor is called by the JAC runtime when the wrapper
    is instantiated. The parameter then becomes the reference to the aspect that is
    associated with the wrapper.


    The existing JAC joinpoints are method executions and constructor executions.
    The invoke and construct methods are called by the JAC runtime when these joinpoints
    occur. The methods return an Object and can throw an exception of type Throwable,
    which is the root class for all exceptions and errors in Java. The invoke method
    takes a parameter of type MethodInvocation. This parameter reifies the joinpoint
    with information such as the method name or the parameters of the call. The ConstructorInvocation
    parameter plays the same role for constructor executions.


    The proceed method delimits the “before” and “after” parts of a wrapper. This
    method executes the joinpoint, or it calls the next wrapper if several wrappers
    are woven for the same joinpoint. The call to proceed is optional. Conversely,
    proceed can be called several times.


    The invoke and construct methods are mandatory—even if they define no instructions.


    Creating an Aspect-Configuration File


    Aspect configuration is an essential task when programming with JAC. This feature
    is not often provided by other AOP environments, such as AspectJ, although it
    is a key factor when reusing aspects.


    Each aspect that is defined with JAC is associated with an aspect-configuration
    file. You choose the parameters that are to be configured in the aspect. The end
    user defines the aspect-configuration file and the values that are associated
    with these parameters. For example, when using a transaction-demarcation aspect,
    you must indicate the methods that are to be executed in the transaction. When
    using a persistence aspect, you must designate the attributes that are to be saved
    in a database.


    The principle of an aspect-configuration file exists in other approaches, such
    as that of J2EE. The idea is to separate the code from the initialization values
    that are used by the code.


    The code can then be reused without any modifications or recompilations, whereas
    the initialization values will depend on the execution context.


    J2EE and JAC share the same principle—however, the way that they deal with the
    configuration process differs. In both cases, a set of parameters is associated
    with the persistence, transaction, naming, and access-control services. With J2EE,
    these parameters are provided by the servers, are


    C H A P T E R 4 ■ J A V A A S P E C T C O M P O N E N T S


    **65**


    fixed, and cannot be changed. With JAC, you choose precisely the configuration
    parameters that you want to provide.


    **The Syntax of an Aspect-Configuration File**


    Each aspect defined with JAC is associated with an aspect-configuration file that
    ends with the


    .acc extension. This file is loaded at run time when the aspect is instantiated.
    The file can be modified and reloaded while the program is running or between
    two runs of the same program. The configuration of the program is then dynamically
    adapted.


    Each line in an aspect-configuration file is a call to a public method that is
    defined in the aspect class. A line begins with the name of the method, continues
    with a space-separated list of parameters, and ends with a semicolon. (The “Creating
    an Aspect–Configuration File”


    section later in this chapter defines the syntax of aspect-configuration files
    in more detail.) **An Example of Aspect Configuration**


    Listing 4-3 shows the TraceAspect2 aspect, which rewrites TraceAspect so that
    the pointcut is made configurable through the trace method.


    **Listing 4-3.** *A Configurable Aspect Component for Tracing* package aop.jac;


    import org.objectweb.jac.core.AspectComponent;


    public class TraceAspect2 extends AspectComponent {


    public void trace( String objectPE, String classPE, String methodPE ) {


    pointcut(


    objectPE, classPE, methodPE,


    "aop.jac.TraceWrapper",


    null, false );


    }


    }


    The trace method takes three parameters: objectPE, classPE, and methodPE. To define
    a pointcut, the trace method calls the pointcut method with these three parameters.
    To obtain a program similar to the one that is defined by TraceAspect, the aspect-configuration
    file named traceaspect2.acc can be written as follows:


    trace ".*" "aop.jac.Order" "addItem(java.lang.String,int):void"


    The aspect-configuration file provides the current value for the definition of
    the pointcut.


    These values can be changed without recompiling the aspect. Reloading the aspect-configuration
    file into JAC at run time causes the pointcut that is associated with the aspect
    and the traced joinpoints to change.


    In the preceding example, we made the three parameters that define the pointcut
    configurable. We could have extended the example by adding parameters to the trace
    method for the wrapper class or for the remaining parameters. It is up to the
    aspect programmer to make such choices.


