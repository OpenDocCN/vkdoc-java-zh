    **A First Piece of Advice Code**


    The TraceAspect aspect defines only one piece of advice code. (See line 8 in Listing
    3-5). Three types of advice code exist: “before,” “after,” and “around.” For the
    first type, the advice code is executed before each joinpoint that is associated
    with the pointcut; for the second type, it is executed after; for the third type,
    it is executed before and after.


    For any type of advice code, the joinpoints are designated by a pointcut, and
    each piece of advice code is associated with a pointcut. In the TraceAspect aspect,
    the advice code is of the


    “around” variety, and the associated pointcut is toBeTraced. The code is given
    between brackets. In this example, the “around” advice code is executed before
    and after the calls to the addItem method.


    In the TraceAspect example, AspectJ expects the methods included in the pointcut
    to define the return type as void. It follows that the addItem return type is
    void.


    Advice code is a regular block of code. Any existing Java instruction, such as
    a method call, a variable assignment, a for statement, a while statement, or an
    if statement, can be used.


    AspectJ adds the new keyword proceed to this list. When reached, this keyword
    triggers the execution of the joinpoint. The instructions prior to proceed are
    executed before the joinpoint, and those following proceed are executed after.
    Hence, proceed delimits a “before” part and an


    “after” part in the advice code.


    The execution of a program with “around” advice code is as follows: **1.** The
    program is started.


    **2.** Just before a joinpoint, the “before” part is executed.


    C H A P T E R 3 ■ A S P E C T J


    **29**


    **3.** The proceed method is called.


    **4.** The corresponding joinpoint is executed.


    **5.** The “after” part is executed.


    **6.** Program execution resuming, just after the joinpoint.


    The call to proceed is optional. Certainly, it is valid for “around” advice code
    to not call proceed. In such a case, the code associated with the joinpoint is
    not executed. After the execution of the advice code, the program execution resumes
    directly after the joinpoint.


    Advice code can call proceed in some cases and not in others. This can be seen
    in the case of a security aspect that controls access to a method. If the user
    is authenticated, the call is authorized and the aspect calls proceed. If the
    user does not own sufficient rights, the call is rejected and the security aspect
    does not call proceed. In such a case, the joinpoint is not executed.


    The “before” and “after” advice code blocks do not need to call proceed. They
    are designed to be executed before and after joinpoints. AspectJ raises an error
    if proceed appears in the body of “before” or “after” advice code.


    **Compiling**


    AspectJ is a compile-time weaver (since version 1.2, AspectJ can also weave aspect
    at load-time). The aspect and class input files are woven together by AspectJ
    to produce a final application. This application can then be executed as a regular
    Java application.


    To compile the aspect with the three classes of the order-management application,
    call the ajc compiler from the operating-system command shell with the following
    command: ajc TraceAspect.aj *.java


    This command produces a set of .class files that contain the bytecode of the aspectized
    application.


    The first versions of AspectJ produced Java code. The output of the ajc compiler
    was a Java program in which instructions from aspects and classes were merged.
    This Java code could then be compiled by the regular javac Java compiler. The
    advantage of this approach was that the produced code could easily be read by
    developers, who could then study the way that the pointcuts and advice code blocks
    were implemented.


    Despite these benefits, this approach had several drawbacks. The first had to
    do with performance. The initial translation from Java to Java was costly. In
    addition, a syntax analysis of the Java code was needed before the result of the
    weaving could be generated—and writing a Java syntax analyzer that is fast enough
    to manage huge amounts of code is a difficult task.


    Even more, this task is redundant with the one performed when the produced code
    is compiled. The second disadvantage had to do with the source code needed to
    perform the weaving. In some cases, the application was commercial or came from
    a developer who did not release the source code. As a result, the Java-to-Java
    compilation could not be applied.


    To avoid these difficulties, the new versions of AspectJ can weave bytecode in
    .class or


    .jar files and do not require source code. The ajc compiler provides the option
    –injar to use this feature.


