    C H A P T E R 9 ■ Q U A L I T Y O F S E R V I C E A N D A O P


    Note that JMX is widely used by the administration consoles of the existing application
    servers.


    The JMX architecture is composed of the three following layers:


    • *Instrumentation*: The role of this layer consists of opening the components
    to the other layers. The components are then called *manageable resources*.'
