    \ pointcut expression such as the following:\n\n```\n<bind pointcut=\"foo OR bar\"\
    \ />\n```\n\n#### Method-Execution and Constructor-Execution Pointcuts\n\nThe\
    \ `execution` keyword designates method and constructor executions in pointcut\
    \ definitions. You have already seen several examples of pointcut definitions\
    \ that include method executions. The principle is the same for constructor executions,\
    \ except that the `new` keyword replaces the method name in the definition. For\
    \ example, the following pointcut\n\n```\n<bind pointcut=\"execution(public aop.jboss.Order->new(..))\"\
    \ >\n```\n\nincludes the executions of all the public constructors defined for\
    \ the `Order` class.\n\n#### Field Pointcuts\n\nOperations on fields can be included\
    \ in point"
  raw: '## ■INTRODUCTION


    Compared to OOP, the adoption of AOP appears to be faster. Indeed, even though
    the first versions of object-oriented languages appeared in 1967 with Simula 67,
    it was not until the mid-1980s that objects were used for developing enterprise
    applications with C++. The cost of adopting AOP is less than the cost of adopting
    OOP because AOP languages complement existing OOP languages. Aspects can then
    be smoothly integrated in existing applications without the need for any major
    redevelopment of the existing code.


    C H A P T E R 1


    ■ ■ ■


    Introducing AOP


    **T**his book presents *aspect-oriented programming (AOP)*, which defines a new
    programming paradigm. By the word *paradigm*, we mean a set of principles that
    structure the modeling of programs and, as a consequence, the development of programs.


    As its name suggests, aspect-oriented programming introduces a new concept—that
    of the *aspect*. Some years ago, object-oriented programming (OOP) introduced
    the concept of the object, which initiated a new way to structure applications
    and write programs. The same idea applies to the concept of the aspect.


    In 1996, Gregor Kiczales and his team at the Palo Alto Research Center (PARC),
    a subsid-iary of Xerox Corporation that is located in California, originally defined
    the concept of the aspect. Although this definition made 1996 the official birthday
    of AOP, many of AOP’s underlying ideas preceded this date. Some of OOP’s limitations
    motivated the introduction of the aspect, which also originated in research domains,
    such as those of reflection and the meta-object protocol.


    After the concept of the aspect was defined, an aspect-oriented language, named
    AspectJ, was soon implemented, with the first versions made available in 1998\.
    AspectJ, which remains the most popular AOP language, extends the Java language
    with new keywords that make it possible to program aspects.


    Above and beyond AspectJ, AOP itself has remained a subject of great interest
    since 1998


    within the research community. As a result, many other languages and tools, the
    majority of which are constructed around Java, have been developed. These include
    Java Aspect Components (JAC), JBoss AOP, and AspectWerkz.


    Despite the focus on Java, it’s important to keep in mind that nothing about AOP
    is specific to OOP in general or Java in particular. The notion of the aspect
    is an abstract concept that, like the notion of the object, can be applied to
    different languages. Tools of varying completeness exist to support AOP in C,
    C++, C#, and Smalltalk. Furthermore, any existing language could be extended to
    support the concepts of AOP.


    Because the concept of the aspect is relatively new, encouraging a large community
    of developers to adopt AOP is an important task.


    **Looking at Programming Paradigms**


    Viewed as a programming paradigm, you can see AOP as OOP’s successor. However,
    the aim of AOP


    is not to replace OOP, but to complement it, allowing you to create clearer and
    better-structured programs.


    Since the introduction of assembly language, a family of programming paradigms
    has been developed that allows programmers to create software of increasing complexity.
    The concepts of the procedure and the object have, each in their own ways, contributed
    to better **1**


    **2**


    C H A P T E R 1 ■ I N T R O D U C I N G A O P


    code structuring and greater manageability of large programs. Think of AOP, which
    aims to continue this tradition, as the latest addition to this family of paradigms.


    For example, the concept of the procedure, which languages such as Pascal embody,
    allows you to partition a program into entities called procedures. As you know,
    each procedure is simpler to write and understand than the program as a whole
    is. You therefore build a program as a set of procedures that call one another.
    The use of procedures aids the development of large applications because individuals
    on a team can independently develop procedures. Individuals can also test procedures
    independently, allowing programming errors to be more easily located.


    Although the transition was not instantaneous, procedural programming contributed
    to the disappearance of the goto instruction. This instruction, which transferred
    execution to a specific line of the program, tended to cause “spaghetti code.”
    In other words, the program would quickly become tangled—preventing the ability
    to reuse some parts of the program independently of others.


    Procedural programming, on the other hand, allows you to code elementary tasks
    that each contain clearly identified beginning and end points. This type of programming
    makes it possible to create libraries of procedures that can be reused by many
    different programs.


    Procedural programming simplifies the coding process. It allows programmers to
    develop modular—hence more understandable—programs by giving a clearer structure
    to the code.


    However, procedural programming does not provide a secure structure for any of
    the data.


    Indeed, one of the great weaknesses of this paradigm is that global variables
    can be accessed from anywhere in the program—and doing so improperly can lead
    to unexpected side effects.


    **The Origins of AOP**


    Like all programming paradigms, AOP is based on pre-existing concepts that had
    already been exploited in the past—but in limited, specific situations. While
    recognizing the importance of the work of Gregor Kiczales, who integrated the
    ideas that underpin AOP, the programming community must not forget that many other
    projects served as foundations for this work.


    AOP uses ideas from various domains of information technology—specifically, those
    of meta programming, reflection, and meta-object protocols. These domains were
    developed by Mehmet Aksit, Jean-Pierre Briot, Shigeru Chiba, Pierre Cointe, Jacques
    Ferber, Patricia Maes, Brian Smith, and many others. Additionally, some of AOP’s
    key mechanisms relate to features of object-oriented languages that never became
    popular, such as the before and after instructions of CommonLoops and Flavors.
    Also apparent are the similarities between AOP and certain recent techniques that
    generative programming and model-driven architectures (MDA) use.


    However, the AOP approach as a whole remains original. Therefore, AOP must not
    be seen as competing with the techniques that it was developed from, but as presenting
    a logical and coherent structure that integrates these techniques for solving
    real-world problems.


    **OOP: A Promising Paradigm**


    The aim behind the development of OOP was to organize the data of an application
    and its associated processing into coherent entities. Doing so was achieved by
    having objects that encapsulate data along with the methods that manipulate the
    data and carry out the processing.


    From a conceptual point of view, an application is broken down according to the
    real-world objects that it models. In a stock-management application, for example,
    you might find supplier, article, customer, and other types of objects.


    C H A P T E R 1 ■ I N T R O D U C I N G A O P


    **3**


    By grouping together all the objects that possess the same characteristics, the
    concept of a class complements the concept of the object. In the stock-management
    application, all the supplier objects belong to the same class, which is named
    supplier.


    When designing a solution to a concrete problem, deciding how to split up the
    program into classes and, therefore, objects is far from simple. Many variations
    are possible, so different developers may come up with very different solutions.
    Approaches such as that of the Rational Unified Process (RUP) platform aim to
    rationalize the conceptual choices you need to make.


    Regardless of the design process, the way you divide an application into classes
    and objects must be guided, above all, by the real-world data that the application
    models. The most important factor that influences how you choose the classes is
    the way you want to organize—


    in other words, group together—the business data of the application. Classes first
    and foremost provide a grouping mechanism for the data, with the associated processing
    included as the methods.


    The OOP concepts of the class and the object allow you to write programs that
    feature more of the following than programs that use the procedural paradigm:
    *Modularity*: Because the processing that concerns an item or set of data is grouped
    together with the data in the same software entity (the class), a certain degree
    of modularity is achieved.


    *Reusability*: As a result of modularity, only the extent to which a class is
    well designed, self-sufficient, and targeted at a precise goal determines its
    likelihood of being reusable in different software contexts.


    *Reliability*: Because the data is encapsulated within objects, it can be manipulated
    only through the methods that define the object’s interface. (Directly manipulating
    the data is not possible.) The valid ways to access the objects are therefore
    clearly identified, and programmers can safely use any of them.


    *Extendability*: The concept of inheritance allows you to create new classes from
    those that already exist. A new class can extend an existing class by adding data
    or processing, or it can specialize the existing elements. For example, you could
    extend a class that manages data lists so that it manages only stacks. (A stack
    is a list that requires specific rules for adding and removing elements).


    Because of these advantages, OOP has undeniably improved software engineering.


    Developers have built more-complex programs in a simpler fashion than would have
    been possible through procedural programming. Furthermore, developers have written
    large applications in object-oriented languages. For example, the Java 2 Platform,
    Enterprise Edition (J2EE) application servers were programmed in the Java language.
    Similarly, developers have implemented complex class hierarchies to construct
    graphical user interfaces. The Swing API, included in Java 2 Platform, Standard
    Edition (J2SE), falls into this category.


    However, the transition from procedural programming to OOP occurred with consider-able
    effort, with developer training representing a significant cost. Now that OOP
    is just starting to be widely understood, it is legitimate to ask whether introducing
    a new paradigm such as AOP is desirable.


    To answer that question, we can begin by affirming that AOP does not call into
    question what has been achieved through OOP. Applications that are programmed
    according to AOP


    remain organized into classes and objects. AOP simply adds new concepts that allow
    you to improve object-oriented applications by making them more modular. In addition,
    AOP


    streamlines the development process by allowing the separation of development
    tasks. For example, highly technical functionalities, such as security, can be
    developed by specialized


    **4**


    C H A P T E R 1 ■ I N T R O D U C I N G A O P


    experts, and aspects allow you to more easily integrate these functionalities
    into the rest of the application.


    No doubt the adoption of AOP will take a long time and require effort, but it
    can be done gradually when the need is clearly identified.


    **The Limitations of OOP**


    The importance of OOP for developing complex programs is undeniable. However,
    we will show that writing clear and elegant programs using only OOP is impossible
    in at least two cases: when the application contains *crosscutting functionalities*,
    and when the application includes *code scattering*.


    **The Case of Crosscutting Functionalities**


    Previously, we mentioned that when you analyze how to organize an application
    into classes, the analysis must be driven by the need for separating and encapsulating
    the data and its associated processing into coherent entities.


    Although the classes are programmed independently of one another, they are sometimes
    behaviorally interdependent. Typically, this is the case when you implement rules
    of referential integrity. For example, a customer object must not be deleted while
    an outstanding order remains unpaid; otherwise, the program risks losing the contact
    details for that customer. To enforce this rule, you could modify the customer-deletion
    method so that it initially determines whether all the orders have been paid.
    However, this solution is deficient for several reasons:


    • Determining whether an order has been paid does not belong to customer management
    but to order management. Therefore, the customer class should not have to manage
    this functionality.


    • The customer class should not need to be aware of all the data-integrity rules
    that other classes in the application impose.


    • Modifying the customer class to take these data-integrity rules into account
    restricts the possibilities of reusing the class in other situations. In other
    words, once the customer class implements any functionality that is linked to
    a different class, customer is no longer independently reusable, in many cases.


    Despite the fact that the customer class is not the ideal place to implement this
    referential-integrity rule, many object-oriented programs work this way for lack
    of a better solution. You might be thinking about integrating this functionality
    into an order class instead, but this solution is no better. No reason exists
    for the order class to allow the deletion of a customer. Strictly speaking, this
    rule is linked to neither the customers nor the orders but cuts across these two
    types of entities.


    One of the aims of dividing the data into classes is making the classes independent
    from one another. However, crosscutting functionalities, such as the rules of
    referential integrity, appear superimposed on the division—violating the independence
    of the classes. In other words, OOP does not allow you to neatly implement crosscutting
    functionalities. As a compromise, you can resign yourself to implementing them
    in individual classes, but remain conscious that this solution is not ideal.


    C H A P T E R 1 ■ I N T R O D U C I N G A O P


    **5**


    **The Case of Code Scattering**


    In OOP, the principal way that objects interact is by invoking methods. In other
    words, an object that needs to carry out an action invokes a method that belongs
    to another object. (An object can also invoke one of its own methods.) OOP always
    entail two roles: that of the invoker and that of the invoked.


    When you write the code to call a method, you do not need to worry about *how*
    the service is implemented because the call interacts only with the interface
    of the invoked object. You need only ensure that the parameters in the call correspond
    to those of the method’s signature.


    Because methods are implemented within classes, you write each method as a block
    of code that is clearly delimited. To change a method, you obviously modify the
    file that contains the class where the method is defined. If you alter just the
    body of the method, the modification is transparent because the method will still
    be called in exactly the same way.


    However, if you change the method’s signature (for example, by adding a parameter),
    further implications arise. You must then modify all the calls to the method,
    hence you must modify any classes that invoke the method. If these calls exist
    in several places in the program, making the changes can be extremely time-consuming.


    The main point is this: Even though the implementation of a method is located
    in a single class, the calls to that method can be scattered throughout the application.
    This phenomenon of code scattering slows down maintenance tasks and makes it difficult
    for object-oriented applications to adapt and evolve. Any change in the way that
    a service is used requires many other changes—a costly process that can also introduce
    errors.


    **The Benefits of AOP**


    AOP complements OOP by offering solutions to the two challenges just explained—solutions
    that implement crosscutting functionalities and eliminate code scattering. Chapter
    2 will show that the concept of an aspect allows you to integrate crosscutting
    functionalities and code scattering into an object-oriented application by using
    the new concepts of the pointcut, the joinpoint, and the advice.


    In procedural programming, you divide the application according to the functionalities
    that you need to implement. OOP goes one step further by obliging you to group
    related data items and their associated processing tasks into coherent entities.
    AOP then establishes a certain balance by allowing you to superimpose a new layer
    onto the data-driven composition of OOP. This layer corresponds to the crosscutting
    functionalities that are difficult to integrate directly through the OOP paradigm.


    An aspect-oriented application consists of the following two parts:


    • *Classes*: These constitute the base of the application and implement the business
    logic.


    In other words, the classes implement those parts of the application that deal
    directly with the real-world problem to be modeled.


    • *Aspects*: These integrate the supplementary elements (classes, methods, and
    data) that correspond to crosscutting functionalities and code scattering.


    Designing an aspect-oriented application thus begins by breaking down the problem
    to define the classes and the aspects. No universal rule exists for deciding whether
    a functionality should be implemented in a class or in an aspect. Furthermore,
    you can implement the same functionality in either one or the other, depending
    on the context. For example, you might implement the constraints of real-time
    execution as aspects in a management application but as classes in an application
    that supervises industrial processes.


    **6**


    C H A P T E R 1 ■ I N T R O D U C I N G A O P


    The second design stage consists of putting the classes and the aspects together
    to obtain an operational application. You carry out this process by using the
    AOP concepts of the crosscut and the joinpoint. These concepts allow you to decide
    where in the program to insert the aspects and, therefore, which functionalities
    these aspects will implement.


    On another note, remember that when OOP was introduced, the object-oriented languages
    were either extensions of existing languages (C++ is an extension of C) or completely
    new languages (such as Smalltalk and Java). In both cases, new compilers had to
    be developed.


    AOP presents a slightly different situation because the tools exist either as
    frameworks or as extensions to existing languages. An example of the latter is
    the AspectJ language, which Chapter 3 presents in detail. AspectJ adds new keywords
    to the Java language that allow the use of AOP concepts, such as the aspect, the
    crosscut, and the joinpoint.


    Examples of AOP frameworks are JAC, JBoss AOP, and AspectWerkz, all of which Chapters
    4, 5, and 6 present. These frameworks use the syntax of an existing programming
    language, which in these cases is Java. You use the AOP concepts by means of the
    classes and methods in the framework. For example, defining an aspect through
    JAC comes down to extending a class that the framework contains.


    Since the introduction of AOP, a hot debate has raged between those in favor of
    language extensions and those in favor of frameworks. In one case, you need to
    learn a language’s new keywords; in the other case, you need to learn a new framework’s
    API. Regardless, both cases require a learning phase.


    **Summary**


    This chapter introduced the concept of the aspect which, as its name suggests,
    serves as the main contribution to the AOP paradigm. Gregor Kiczales and his team
    at the Palo Alto Research Center (PARC) defined the concept of the aspect in 1996\.
    Several existing ideas led to the emergence of AOP, and research domains such
    as those of reflection and the meta-object protocol actively contributed.


    Although the concept of the aspect is a general programming concept that could
    be applied to any programming paradigm (functional, procedural, or object-oriented),
    the history of AOP is tightly linked to that of the OOP paradigm. Most of the
    existing AOP languages are extensions of OOP ones, such as Java and C#. Furthermore,
    the motivation for defining the concept of the aspect originated from the limitations
    of OOP.


    This chapter described the two main OOP limitations: crosscutting functionalities
    and code scattering. The former refers to the fact that you cannot keep certain
    functionalities clearly modular when you implement them in classes. The latter
    refers to the fact that you can use classes to keep the implementation—but not
    the use—of functionalities modular. Because AOP provides a solution to these limitations,
    AOP complements rather than replaces OOP as a programming paradigm.


    By analyzing why these limitations occur, this chapter introduced the benefits
    that you can expect from the AOP paradigm—benefits that stem from the clear and
    modular implementation of crosscutting functionalities and code scattering.


    C H A P T E R 2


    ■ ■ ■


    The Concepts of AOP


    **T**his chapter introduces the basic concepts of AOP. Although AOP is relatively
    new, many of the basic concepts are already well established. This chapter gives
    a general introduction to the concepts of AOP, and the rest of the chapters demonstrate
    the use of these concepts with the four most advanced tools that are currently
    available: AspectJ/AspectWerkz, JAC, JBoss AOP, and Spring.


    Every new programming paradigm brings with it a set of concepts and definitions.
    This was the case for the procedural approach, with the notions of the module
    and the procedure, and for the object-oriented approach, with the concepts of
    encapsulation, inheritance, and polymorphism. Important changes accompanied each
    of these new paradigms. From a technical point of view, the structure of the programs
    changed radically, so those involved in software development were required to
    learn new techniques. As with the previous paradigms, AOP brings a set of new
    concepts to the table. However, improvements in the quality of applications and
    the increased modularity that AOP allows counterbalance the costs of learning
    the new concepts.


    Since the majority of AOP environments (including AspectJ/AspectWerkz, JAC, JBoss
    AOP, and Spring) are built on Java, this book uses the terminology and the concepts
    of Java; however, none of the concepts of AOP are specific to this language. In
    the same way that the concept of the object can be applied with success to various
    languages, the concept of the aspect can be implemented with C++ (AspectC++),
    C# (AspectC#), Smalltalk (Apostle), and even procedural languages such as C (AspectC).
    Furthermore, the concepts of AOP are important not only during the coding phase
    but earlier in the software development—during the conceptual program-design phase.
    Tools such as Theme/UML and JAC UML Aspectual Factory (UMLAF) propose Unified
    Modeling Language (UML) notations to model AOP


    concepts.


    **The Concept of an Aspect**


    To understand and manage a complex program, you generally divide it into smaller
    subpro-grams. Optimal partitioning criteria have been the subject of numerous
    studies—the aim of these studies being to help developers with the design, development,
    maintenance, and evolution of software.


    When a program is written with the procedural approach, the application is modularized
    according to the actions or procedures to be carried out. With the object-oriented
    approach, on the other hand, the modularization is based on the data to be encapsulated
    in the classes.


    **7**


    **8**


    C H A P T E R 2 ■ T H E C O N C E P T S O F A O P


    With both paradigms, certain functions are more difficult to modularize than others.
    We say that the code related to such a function is scattered.


    **Code Scattering**


    The issue of code scattering is not linked to a particular language and has been
    shown to be a problem in numerous applications, whether OOP or another paradigm
    has been used. In fact, code scattering can appear in any environment—from Java
    with J2SE or J2EE, to C# with .NET, to additional languages. However, the most
    extensive study of this phenomenon has been carried out using Java.


    For example, the AspectJ team analyzed the Tomcat servlet container. They realized
    that if some functionalities, such as URL pattern matching and XML parsing, were
    cleanly modularized in one or two classes each, others, such as the logging functionality
    and the management of user sessions, were highly scattered throughout the application.


    Analysis of Code Scattering


    Having established that code scattering occurs, it is normal to ask whether you
    could eliminate the problem by composing the class structure differently or designing
    the application in another way.


    The main reason that code scattering occurs has to do with the differences in
    the way that a service is made available and the way that it is used. A class
    gives access to one or more services through its methods. It is relatively easy
    to group the available services together in the same place—in other words, in
    the same class. However, once these services have been used from several classes,
    it is difficult to re-engineer the application to group the calls to those methods
    together. It is therefore not surprising that a fundamental and well-known service
    is called from all over the application.


    Code scattering is an effect that manifests itself in any complex program. However,
    the exact way it manifests itself depends on the application, the modeled concerns,
    the used libraries, and the frameworks. Because it heavily depends on a concrete
    problem, code scattering is difficult to remove.


    Code scattering in an application slows down the development, maintenance, and
    evolution of the program. When several functionalities are scattered, the situation
    worsens because the code starts to contain many calls to multiple concerns that
    are a priori loosely coupled but that need to be integrated together. This phenomenon
    is apparent in many applications.


    **A New Dimension in Modularity**


    The main contribution of AOP is to provide a way of bringing together—in an aspect—code
    that would otherwise have been scattered throughout the application.


    ■**Definition Aspect**—A programming unit designed to capture a functionality
    that crosscuts an application.


    C H A P T E R 2 ■ T H E C O N C E P T S O F A O P


    **9**


    An aspect is often described as being a *crosscutting structure*. In fact, Gregor
    Kiczales, the inventor of the concept of the aspect, stated that, “AOP is about
    capturing a crosscutting structure.”


    The definition of an aspect is almost as general as that of a class. When you
    model a problem, you use classes to represent the types of objects (customers,
    orders, suppliers, and so on), and each object contains the appropriate data (attributes)
    and processes (methods). In the same way, aspects are used to implement functionalities
    (security, persistence, logging, and so on) within an application, and these functionalities
    similarly require data and processing.


    With AOP, an application consists of classes and aspects. An aspect differs from
    a class in that it implements a crosscutting functionality. As you saw earlier,
    a crosscutting functionality within the procedural or object-oriented paradigm
    is one that is called throughout the code of the application. Including classes
    and aspects in the same application means that modularity can occur in two dimensions:
    the base functionalities that are implemented by classes (this dimension could
    be called structural), and the crosscutting functionalities that are implemented
    by aspects (this dimension could be called operational).


    Figure 2-1 illustrates the effect of an aspect on the code of an application.
    The left side of the figure represents an application consisting of three classes.
    The horizontal lines show the lines of code that correspond to a crosscutting
    functionality, such as logging. This functionality crosscuts the application because
    it affects all the classes. The right side of the figure shows the same application
    using an aspect to manage the logging functionality (the shaded rectangle).


    The code of this functionality is now entirely contained within the aspect, and
    the classes are now separate from the code. An application designed in this way
    is simpler to write, maintain, and adapt than one without aspects.


    **Figure 2-1.** *The impact of an aspect on the location of a crosscutting functionality*
    The rest of this section presents some of the characteristics of aspects. We then
    introduce the concept of aspect weaving.


    **10**


    C H A P T E R 2 ■ T H E C O N C E P T S O F A O P


    The Integration of Crosscutting Functionalities


    You will see later in this chapter that an aspect itself is composed of two parts:
    the pointcut and the advice code. The *advice code* contains the code to be executed,
    whereas the *pointcut* defines the points in the program where this code should
    be implemented.


    Clearly, the code of an aspect—or, more precisely, the advice code—depends on
    the operation you want to implement. For example, if you want to ensure data persistence,
    you need to write code that saves the data in a database. Although you could code
    this functionality from first principles directly within the aspect, you would
    rarely choose to do this. It is considered good practice to use a dedicated API,
    such as Hibernate. With this type of framework, the code of the aspect simply
    makes calls to the API. This way of working means that the aspect does not need
    to know how the services are implemented, and the aspect is therefore kept independent
    from a particular implementation.


    Following this best practice, an aspect simply allows you to integrate a crosscutting
    functionality that is implemented using a dedicated API into an application. In
    Figure 2-2, the PersistenceAspect aspect uses Hibernate to integrate the data-persistence
    functionality into Class1 and Class3.


    **Figure 2-2.** *Integration of a crosscutting data-persistence functionality
    using an aspect* Strictly speaking, an aspect does not directly implement a crosscutting
    function but uses a dedicated API to achieve this. However, for ease of readability
    in this book, we shall just say that an aspect implements a crosscutting functionality.


    Nonfunctional Services and Aspects


    Most applications are comprised of two types of concerns: business and nonfunctional.


    *Business concerns*, also called *functional requirements*, correspond to the
    real-world behavior that you want to model. *Nonfunctional concerns*, or *nonfunctional
    requirements*, are additional services that the application must implement—essentially,
    technical or system-level concerns.


    For example, in an application that manages human resources, the functionalities
    for adding


    C H A P T E R 2 ■ T H E C O N C E P T S O F A O P


    **11**


    and deleting an employee are business concerns, whereas application security and
    privileges are nonfunctional concerns.


    However, you need to be careful when using this distinction because a service
    can be nonfunctional in one application but functional in another.


    In most cases, the nonfunctional services are called throughout the code of the
    business layer. Nonfunctional services are therefore fundamentally crosscutting.
    Consequently, nonfunctional services are implemented as aspects in AOP, whereas
    business concerns are implemented as classes. In some cases, however, the business
    concerns are crosscutting—


    making it appropriate to implement them as aspects.


    Dependency Inversion


    With object-oriented or procedural programming, as soon as an application uses
    a technical service from an API, a dependency is created between the application
    and the service. A link is generated for every explicit call the application makes
    to the API. When the API changes or its semantics evolve, calls to its services
    must be changed throughout the application. Such modifications are potentially
    costly—especially when the API is used in many different locations in the application.


    In addition, you must understand the main principles of the API to be able to
    use it. You must know which methods to call, the order to call them in, and the
    parameters to pass to them. The nonfunctional service has to be integrated into
    every new application that is developed. So, even though the API is developed
    only once, it may be integrated into many different applications.


    **Figure 2-3.** *Dependency inversion between an application and a nonfunctional
    API* Figure 2-3 illustrates the direction of dependency in OOP and how this changes
    in AOP.


    The left side shows that, in OOP, the application uses and thus depends on the
    nonfunctional service. The situation is the same with procedural programming.


    **12**


    C H A P T E R 2 ■ T H E C O N C E P T S O F A O P


    The right side shows the situation in AOP. An aspect uses the nonfunctional service
    and integrates it into an application. Contrary to OOP, the application no longer
    depends on the service—it is the aspect that depends on the application. This
    change in the direction of the links between the service and the application is
    not specific to AOP; it is sometimes the case for frameworks, as well. The principal
    advantage of this inversion is that it makes the work of the application developer
    easier.


    With AOP, the application developer does not need to worry about the nonfunctional
    services. It is the aspect developer who, in addition to writing the code of the
    service itself, manages the integration of that service into the application.
    The advantage is that the specialized aspect developer has a better understanding
    of the service than the application developer, who is only a user of this API.
    This lowers the risk of a service being used incorrectly. In particular, the aspect
    developer can make sure that the service integration is correct by implementing
    some constraints on the way the service can be used.


    Aspects and Frameworks


    Like AOP, frameworks show dependency inversion, as previously described, whereby
    the code of the application does not depend on the library.


    A framework1 is a set of classes that offers a reusable structure for writing
    applications.


    Frameworks are used in numerous areas of application development, especially user
    interfaces. A J2EE application server can be considered a framework that manages
    the execution of applications based on web or Enterprise JavaBeans (EJB) components.


    Developing an application with a framework consists of writing code that is handled
    by the framework. This code is not run directly—instead, the framework invokes
    it according to the context. In other words, the framework forms a set of services
    that extends the code that you write.


    The situation is similar with AOP. Services are provided by aspects that extend
    the business layer of the application. The difference is that frameworks provide
    a set of fixed services, whereas those provided by AOP are entirely programmable
    within the aspects. AOP therefore offers a much more general mechanism for dependency
    inversion than frameworks, which are limited to the application domain that they
    were initially conceived for.


    **Aspect Weaving**


    An aspect-oriented application contains classes and one or several aspects. The
    operation that takes these classes and aspects as input and produces an application
    that integrates the functionalities of the classes and the aspects is known as
    *aspect weaving*. The program that performs this operation is called an *aspect
    weaver* or just a *weaver*. The resulting application is said to be *woven*.


    ■**Definition Aspect weaver**—A program that integrates classes and aspects. The
    weaving can be performed at either compile time or run time.


    1\. Ralph Johnson, “Framework = (compopnents + patterns),” *Communications of
    the ACM*, 40(10), (1997) 39–42.


    C H A P T E R 2 ■ T H E C O N C E P T S O F A O P


    **13**


    Compile-Time Weaving


    With compile-time weaving, the weaver is a program that, prior to any execution,
    produces an application code in which the classes are extended by the aspects.
    AspectJ, which is presented in detail in Chapter 3, is the most well-known compile-time
    aspect weaver.


    A compile-time weaver is very similar to a compiler and is often referred to as
    an *aspect* *compiler* or even as a compiler.


    With modern object-oriented languages, such as Java and C#, applications are compiled
    into intermediate bytecode. When weaving aspects with these applications, two
    solutions can be envisioned: weaving the aspects with the source code, or weaving
    them with the bytecode.


    Bytecode weaving is more common than source-code weaving. A bytecode weaver can
    weave commercial and third-party applications that do not make their source code
    available.


    Furthermore, a bytecode weaver is generally simpler to program. The structure
    and the grammar of a source language such as Java are much more complex than that
    of the associated bytecode. The bytecode is therefore simpler to parse and analyze.
    A direct consequence of this increased simplicity is that the performance of a
    bytecode weaver is often superior to that of a source-code weaver.


    The output of a compile-time weaver can be either source code or bytecode. However,
    in the case of bytecode weaving, the output is always bytecode. The advantage
    of generating source code is that it can be easily read by a programmer, who can
    then study the weaving process and understand what the weaver has done. The disadvantage
    of generating source code is that this code must then be compiled into bytecode,
    which slows down the code-production chain. In many cases, fast weaving strategies
    are preferred. That is why early versions of AspectJ generated source code, but
    versions 1.1 and later generate bytecode.


    With compile-time weaving, aspects are added to the application code. When executed,
    this new code does not make any distinction between the original code and the
    code that comes from the aspects. This weaving is thus said to be static. To remove
    or add an aspect, a total reweaving of the application is needed.


    Run-Time Weaving


    With run-time weaving, the distinction between application objects and aspects
    is clearly established during the execution. A run-time weaver is a program that
    is able to orchestrate the execution of these two types of entities. In other
    words, the weaver executes either the application code or the aspect code, depending
    on the defined weaving directives.


    The process of weaving aspects at run time can be compared to maintaining a relationship
    between a set of application objects and a set of aspect instances. An application
    object that is bound to an aspect instance is *aspectized* by this aspect. An
    aspect instance can be bound to several application objects (the aspect crosscuts
    several locations of the application) and, conversely, an application object can
    be bound to several aspect instances (more than one aspect applies to the same
    location).


    The advantage of run-time weaving is that the relationships between objects and
    aspects can be dynamically managed. By adding or removing a binding, you can weave
    or unweave a concern while the application is running. This dynamic quality is
    particularly useful for applications, such as web servers, that must be highly
    available and that cannot be stopped for long time frames.


    **14**


    C H A P T E R 2 ■ T H E C O N C E P T S O F A O P


    In most cases, run-time weavers transform the application’s code or its bytecode
    before running it. The purpose of this adaptation is to make the classes ready
    for run-time weaving. All the code elements that can be adapted at run time are
    modified to introduce hooks. A *hook* is a piece of code that redirects the execution
    flow of the application toward an aspect. Hooks are introduced at the beginnings
    of methods, for example, or just before method calls. The types of locations where
    hooks can be introduced depend on the weaver. Note that hooks are not necessarily
    locations where aspects apply but locations where aspects *potentially* apply.


    Among all the hooks introduced by a run-time weaver, only a selected subset will
    redirect the execution flow toward an aspect. The aspect programmer decides which
    hooks effectively perform this redirection.


    Instead of using a weaver to transform the application code, you can take advantage
    of an alternative solution that consists of running the application in a supervisory
    mode. This technique is similar to running the application in a debugger in that
    whenever the execution reaches a location where an aspect applies, the supervisor
    interrupts the normal execution flow and runs the aspect. The advantage of this
    technique is that it leaves the application free from any transformation. The
    disadvantage is that the supervisory mode introduces a cost that slows down the
    execution of the application.


    In several implementations, the insertion of hooks is performed just before the
    execution—while the application is being loaded into the virtual machine. With
    the Java language, the class-loading mechanism can be customized and associated
    to a bytecode-engineering library, such as the Byte Code Engineering Library (BCEL)
    (see http://jakarta.apache.org/


    bcel), ASM (see http://asm.objectweb.org), or the Java Programming Assistant (Javassist)
    (see http://www.csg.is.titech.ac.jp/~chiba/javassist/index.html). For example,
    the run-time weaver of JAC uses BCEL, whereas that of JBoss AOP uses Javassist.


    The notion of hooks that are inserted by a run-time weaver is closely related
    to the notion of the joinpoint, which is presented in the next section.


    **Joinpoints**


    In the previous section, you learned that an aspect is a software entity that
    implements a crosscutting functionality. The definition of an aspect, or crosscutting
    structure, relies on the notion of a *joinpoint*.


    ■**Definition Joinpoint**—A point in the control flow of a program where one or
    several aspects apply.


    Although the notion of a joinpoint is general (potentially, each instruction of
    a program can be a joinpoint), all the points in the control flow are not considered
    useful for AOP. Joinpoints are grouped according to their types, and only a subset
    of all possible joinpoint types are supported by aspect-oriented languages.


    Furthermore, the notion of the joinpoint is tightly related to a particular execution
    of a program (the control flow). Two different executions of the same program
    may give different sets of joinpoints.


    C H A P T E R 2 ■ T H E C O N C E P T S O F A O P


    **15**


    **Different Types of Joinpoints**


    Although the definition of a joinpoint occurs at run time, that definition is
    based on the structure of a program (its classes, methods, fields, and so on).
    The following chapters present in detail the various joinpoint types that are
    supported by existing aspect-oriented languages.


    The following categories describe the commonly encountered types that are independent
    of any implementation.


    *Methods*: With object-oriented languages, the execution of a program can be seen
    as a sequence of method calls and method executions. The various execution scenarios
    of an application can be expressed in terms of sequences of messages that trigger
    method executions. Method calls and method executions are thus two commonly used
    joinpoint types. Note that method executions are considered joinpoints even if
    they are not, strictly speaking, “points.” A method starts, continues, and ends—its
    execution spans a time period. Instead of considering the beginning and end as
    two separate points, the execution as a whole is a type of joinpoint.


    *Constructors*: Constructors are the main entities used to create the objects
    of an application. As with methods, the calls and executions of a constructor
    correspond to joinpoint types.


    *Exceptions*: An exception is thrown to signal an abnormal run-time situation,
    and it is caught to execute a particular treatment. These two events are major
    points in the execution of an application. They can be both considered joinpoint
    types.


    *Fields*: Many aspects, such as the persistence aspect, need to deal with the
    application’s data. Fields are the main code elements that implement this data.
    Hence, aspect-oriented languages consider read and write operations on fields
    as joinpoint types.


    Method calls and executions are clearly the most widely used joinpoint types in
    AOP.


    Other code elements, such as code blocks like for loops and if statements, define
    the structure of a program. With the exception of static code blocks in AspectJ,
    these elements are considered too fine grained to be used when defining aspects.
    Even though these elements define useful treatments for method bodies, it is assumed
    that the crosscutting nature of a functionality can be captured with higher-level
    elements, such as the ones mentioned in the previous list.


    Aspect-oriented-compiler designers often use the term *joinpoint shadow*. Like
    a hook for run-time weavers, a joinpoint shadow is a place in the program where
    an aspect can potentially apply. Hence, the joinpoints—as the points where the
    aspects *actually* apply—are a subset of the set of joinpoint shadows. Depending
    on the information needed by the aspects, several pieces of data can be constructed
    during run time when a joinpoint is reached. A joinpoint object can even be provided
    by the language.


    Finally, all programs, even the simplest ones, contain many different joinpoints.
    The task of the aspect programmer is to select the joinpoints that are useful
    for implementing a given aspect.


    This selection is performed with the notion of a pointcut, which is presented
    in the next section.


    **16**


    C H A P T E R 2 ■ T H E C O N C E P T S O F A O P


    **Pointcuts**


    In the previous section, you learned that joinpoints are the points in the control
    flow of a program where one or several aspects apply. Yet, the notion of a joinpoint
    is not sufficient by itself to define which joinpoints are pertinent for a given
    aspect. An entity is needed for describing joinpoints. This entity is defined
    by the notion of a *pointcut*.


    ■**Definition Pointcut**—A set of joinpoints where an aspect applies.


    Above all, the crosscutting nature of an aspect is expressed with a pointcut because
    a pointcut groups joinpoints that are located in different source files. Of course,
    these joinpoints are not chosen randomly. They share the “common secret” in that
    they are located in the parts of the program where a given aspect applies. Pointcuts
    are thus a way of “talking about” the application. It is often said that a pointcut
    defines the “where” of an aspect. On the other hand, the “what” of an aspect is
    defined by the advice code, as we will explain in the next section.


    It is important to note that most pointcuts are application dependent. When an
    aspect needs to be reused for a different application, it is likely that the definition
    of the pointcuts will need to be adapted to the locations in the new application.


    As illustrated by the previous definition, the notions of the pointcut and the
    joinpoint are linked. A pointcut is defined by a set of joinpoints and, conversely,
    a set of joinpoints define a specific pointcut. However, note that the natures
    of these two notions are somewhat different.


    Joinpoints are well-defined run-time entities (they occur in the control flow
    of a program), whereas pointcuts cannot be attached to a particular structure
    or time slot of the running program. Instead, pointcuts are to be seen as structural
    code elements that participate in the definition of an aspect.


    As illustrated in the following chapters, a language for defining pointcuts is
    included in every existing aspect-oriented tool. Although each tool defines its
    own syntax, the principles remain the same. The ultimate goal of a pointcut language
    is to provide a simple and flexible way to query the joinpoints about a given
    program’s structure—so an aspect can be applied to the joinpoints. Typically,
    the language is a kind of pattern language with quantification operators, wildcard
    symbols (such as *), and Boolean operators. Keywords are also included for designating
    joinpoint types.


    **EXAMPLES OF POINTCUTS**


    To familiarize you with AOP syntax, the following examples of widely used pointcut
    types show implementations in AOP pseudocode (with a syntax that is similar to
    that of AspectJ):


    • *Data-modification pointcut*: This type of pointcut designates all the write
    operations on a set of fields.


    When data that is represented as a set of fields needs to be saved in a database,
    such a pointcut can be used for persistence aspects, for example. This type of
    pointcut can also be used in GUIs to update views that are associated with data.
    Here is an example of a data-modification pointcut:


    C H A P T E R 2 ■ T H E C O N C E P T S O F A O P


    **17**


    // all the field set operations on all the fields (*) of class C


    pointcut dataModification(): set(C.*)


    • *Method-calls pointcut*: This type of pointcut designates all the calls to a
    set of methods. Such a pointcut can be used to compute a message-sequence chart,
    for example. Here is an example of a method-calls pointcut:


    // all the calls to the methods of C returning void


    // and taking any parameters (..)


    pointcut calls(): call(void C.*(..))


    • *Method-executions pointcut*: This type of pointcut designates all the executions
    of a set of methods.


    Such a pointcut can be used to compute method-execution times, for example. Here
    is an example of a method-executions pointcut:


    // all the executions of the methods of C returning any type (*)


    // and taking any parameters (..)


    pointcut executions(): execution(void A.*(..))


    **Advice Code**


    In the previous section, you learned that a pointcut defines *where* an aspect
    applies. The advice code defines *what* the instructions of an aspect are.


    ■**Definition Advice code**—The definition of the behavior of an aspect.


    Advice code is associated with a pointcut to implement a crosscutting functionality.
    The treatments that are defined in the advice code are performed for all the joinpoints
    that are included in the associated pointcut.


    Much like a method, the advice code owns a body that contains instructions. However,
    unlike a method, the advice code is never called directly but is woven into the
    joinpoints that are specified in the associated pointcut.


    **Different Types of Advice Code**


    Three main types of advice code exist:


    • *before*: The advice code is executed before the joinpoints.


    • *after*: The advice code is executed after the joinpoints.


    • *around*: The advice code is executed before and after the joinpoints.


    For “around” advice code, you need to separate the instructions that must be executed
    before the joinpoints from the ones that must be executed after. This is done
    with a special


    **18**


    C H A P T E R 2 ■ T H E C O N C E P T S O F A O P


    instruction, which in most cases is named proceed. The proceed instruction provides
    a way of resuming the normal execution of the program and executing the code that
    is contained in the joinpoint. To intuitively understand “around” advice code,
    think of a decorator design pattern in which a decorating method is the “around”
    advice code, and proceed is the call to the next decorator or decorator object.


    The execution of a program with “around” advice code can be summed up as follows:
    **1.** The program executes normally.


    **2.** Just before a joinpoint that is included in a pointcut, the “before” part
    defined in the


    “around” advice code is executed.


    **3.** A call to proceed is made.


    **4.** The piece of code that is defined in the joinpoint is executed.


    **5.** The “after” part defined in the “around” advice code is executed.


    **6.** The program execution is resumed just after the joinpoint.


    The call to proceed is optional. If proceed is not called, the code of the joinpoint
    is not executed, and the program execution resumes just after the joinpoint.


    Advice code blocks can be classified according to whether they always call proceed,
    never call it, or call it under certain conditions. For example, a trace aspect
    always calls proceed because its purpose is to keep track of the application’s
    execution—not to modify its normal execution. A security aspect calls proceed
    when access is granted to the user; it doesn’t call proceed when access is denied.
    An optimization aspect never calls proceed if it replaces the original implementation
    of a functionality with an optimized version.


    In addition to the three previously listed advice-code types, some languages (including
    AspectJ) define two other types: “after returning” and “after throwing.” The idea
    is that a method can either return normally or throw an exception. The first case
    corresponds to the execution of the “after returning” advice code, whereas the
    second one leads to the execution of the “after throwing” advice code.


    Here is a simple example (still using pseudocode) of “around” advice code, which
    prints some tracing messages before and after the execution of the joinpoint:
    around void a() {


    System.out.println("before joinpoint");


    proceed();


    System.out.println("after joinpoint");


    }


    Then, in an aspect, this advice code can be linked to pointcuts. For example,
    the following aspect links the previous advice code to the pointcuts that were
    defined in the previous section: aspect MyAspect {


    a() : dataModification();


    a() : calls();


    a() : executions();


    }


    C H A P T E R 2 ■ T H E C O N C E P T S O F A O P


    **19**


    This aspect prints the specified messages around the executions of all the joinpoints
    that are denoted by the dataModification, calls, and executions pointcuts.


    **The Introduction Mechanism**


    The notions of the pointcut and the advice code allow you to reason about the
    structure of an application and to implement crosscutting functionalities through
    *behavioral* modifications.


    The control flow of the program deviates to the advice code, which adds, removes,
    or modifies behavior. The *introduction* mechanism is complementary and allows
    you to extend the static structure of a program.


    ■**Definition Introduction**—An extension mechanism for bringing new structural
    code elements into an application.


    The two most common code elements that are *introduced* by aspects are fields
    and methods. In relation to methods, interfaces can also be introduced—the idea
    is to let a target class implement a new interface. In some aspect-oriented frameworks,
    such as JAC (see Chapter 4), exception handlers can also be introduced. The idea
    is to define handlers for exceptions that are not caught by the application.


    Like the inheritance relationship of OOP, the introduction mechanism allows for
    the extension of existing classes. However, contrary to inheritance, the introduction
    mechanism does not allow for the redefinition of existing elements—it can only
    add new ones. This limitation is due to the goal of conserving the program’s integrity,
    especially when several aspects are composed together. Next, we elaborate on the
    well-known problem of aspect composition.


    **Aspect Composition**


    The concepts that have been defined so far deal with the definition of aspects
    and their integration with applications. This section raises the issue of aspect
    interactions—for example, how distinct aspects that are woven into the same application
    interact. This issue is known as *aspect* *composition*.


    The study of aspect composition can be carried out from two complementary points
    of view: that of design time (when choosing the aspects for an application), and
    that of weave time (when applying several aspects to the same joinpoints).


    **Design**


    Like classes, aspects can be independently programmed and then reused and integrated
    into an application. The aspect programmer must therefore verify that aspects
    do not conflict nor introduce inconsistencies in the execution of the application.


    Several kinds of conflicts can arise:


    *Incompatibility*: Two aspects can introduce incompatible functionalities. For
    example, a transaction aspect and a persistence aspect can conflict. Indeed, when
    programmed with


    **20**


    C H A P T E R 2 ■ T H E C O N C E P T S O F A O P


    persistence frameworks, such as Hibernate, a persistence aspect uses a database
    to store data that is modified during a so-called *persistent session*. Most of
    the time, transactions involve data that is also stored in databases. Hence, the
    database is a resource that is shared by the two aspects. When developed separately,
    the aspects might not be aware of the operations performed on the database by
    one another.


    *Dependence*: Two aspects can be linked. In this case, if one aspect is used,
    the other must also be used.


    *Redundancy*: Two aspects might implement the same functionality differently.
    For example, several data-compression algorithms can be implemented. The joint
    utilization of two data-compression aspects might be useless and should be avoided.


    These kinds of conflicts occur at the semantic level and cannot be simply addressed
    at the programming level with the existing aspect-oriented tools. For example,
    existing aspect weavers cannot automatically detect that two aspects implement
    data-compression algorithms. The weavers reason about the instructions that must
    be appended to the joinpoints, but they usually cannot reason about the semantics
    of these instructions. (However, some research prototypes are currently being
    developed.) Therefore, the job of detecting whether two aspects are incompatible,
    dependant, or redundant is entirely the responsibility of the aspect programmer.


    **Weaving**


    In addition to posing potential semantic conflicts, the composition of several
    aspects might require the execution of the distinct aspects that must be woven
    into an application.


    For example, a security aspect and a trace aspect might define pointcuts that
    include the same set of joinpoints. In this case, the execution order of the two
    aspects should be defined.


    There is no automatic solution to this problem. For example, you might want to
    trace all requests—even those that will be rejected because the user is not authorized.
    (In this case, the trace aspect must be applied first). Or, you might want to
    trace only the requests from authorized users. (In this case, the security aspect
    must be applied first.) Hence, given two aspects, you must decide on and define
    the correct execution order.


    **Summary**


    This chapter introduced the basic concepts of AOP. The concepts that were presented
    are independent of any implementation by a specific language or framework. This
    chapter provided a reference for the following chapters in this book, where the
    concepts will be illustrated specifically with AspectJ, JAC, JBoss AOP, and Spring.


    The concept of an aspect aims to modularize a crosscutting functionality. A functionality
    is said to be crosscutting when its implementation is not cleanly located in one
    file but is scattered throughout many different files of an application. By locating
    these scattered elements in one place, the concept of an aspect improves modularity
    and leads to applications that are easier to understand, debug, and maintain.


    AOP is a technique that complements OOP. The purpose of AOP is not to replace
    classes and objects. Hence, an aspect-oriented application is still organized
    around a set of classes.


    Aspects enhance these classes by implementing crosscutting functionalities.


    C H A P T E R 2 ■ T H E C O N C E P T S O F A O P


    **21**


    Implementing an aspect consists of defining advice code and pointcuts. The advice
    code defines *what* the behavior of the aspect is, and pointcuts define *where*
    this behavior is to be applied in the application. The point in the program execution
    where an aspect applies is called a joinpoint. AOP provides the additional notion
    of introduction, which is the mechanism for extending an application.


