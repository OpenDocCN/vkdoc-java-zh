    \ All public methods named `addItem` that are defined in the `aop.jboss.Order`\
    \ class and that take three parameters, the second being an `int` |\n| `public\
    \ void aop.jboss.Order->add*(..)` | All public methods with a name starting with\
    \ `add` that are defined in the `aop.jboss.Order` class, whatever their parameters\
    \ are |\n| `private * aop.jboss.Order->*(..)` | All private methods that are defined\
    \ in the `aop.jboss.Order` class |\n| `* aop.*.O*->getX()` | The `getX` methods\
    \ defined in any class that has a name starting with the letter *O* and that is\
    \ a subpackage of the `aop` package |\n| `* *->@Remote(..)` | All methods that\
    \ are associated with the `@Remote` annotation |\n| `* @Persistent->*(..)` | All\
    \ methods defined in a class that is associated with the `@Persistent` annotation\
    \ |\n\nWhen you write pointcut expressions, the `$instanceof` keyword can be used\
    \ in place of class names. This keyword is associated with a type name (class\
    \ or interface) and designates all the classes that either implement the given\
