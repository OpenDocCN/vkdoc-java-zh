- fmt: '**Figure 10-6.** *Organization of the `ApplicationClient` project (Java Swing
    client tier)* The root package is `aop.j2ee.client.java`. Within this package,
    you can find two versions of the application: the regular application developed
    without aspects (the `regular` package), and the aspectized version (the `aspectized`
    package). The `aspect` package contains all the AspectJ aspects of this latter
    version; this is an AspectJ project.


    As shown in Figure 10-6, the Java administration client of the original version
    is simple. It is composed of four Java classes: `BankAdmin`, `DataModel`, `EventHandle`,
    and `Simple`. The `BankAdmin` class builds the actual GUI. It throws events that
    correspond to the possible actions of the users. These events are handled by the
    event managers as defined and installed in `EventHandle`.


    The `DataModel` class implements the effects of the actions in terms of calls
    to the business tier, specifically to the `aop.j2ee.business.session.bank` facade.
    Note that the `Simple` class is not part of the original application, but it will
    be used in the next chapter to test simple client-side logic without having to
    deal with the whole client.


    The client layer is by no means a design to be followed; we use it simply as a
    means to describe the concerns that may arise when programming the Java client.


    ## The Web Presentation Tier


    The web presentation tier, which is programmed using Struts, is not aspectized
    because, in this context, the benefits are limited. In Chapter 13 we discuss the
    possible aspectization of the presentation tier design patterns in an application
    context not using Struts.


    ## Sample Application Design


    The design of the sample application was inspired by J2EE applications in general,
    and more specifically by J2EE good practices and design patterns.


    We’ll begin this section by presenting a selection of design patterns and solutions
    that are specific to J2EE and that have been used previously in this context.
    We’ll then explain the ways in which using AOP improves the design of the sample
    application.


    The original Duke’s Bank application is included in the free distribution of the
    Sun ONE application server, which is available on the Sun Microsystems site. Please
    refer to the original application if you wish to make comparisons with the design
    presented here.


    ### Using J2EE Design Solutions


    The design of the original Duke’s Bank application is simple. Not all the available
    J2EE design solutions are used, causing deficiencies in code modularity. For this
    case study, we have changed the application slightly, notably by following J2EE
    design patterns to improve the modularity of the application and also by modifying
    the organization of the code.


    The use of J2EE design patterns offers two main advantages:


    - These design patterns are well-tested, reusable design elements that allow us
    to follow J2EE best practices.

    - J2EE design patterns are well documented and developers are familiar with their
    use (see `http://java.sun.com/blueprints/corej2eepatterns/Patterns/index.html`).
    Using J2EE design patterns allows developers to understand the design of the application
    better and makes it easier to identify the problems that we are looking to resolve
    using aspects.


    Using EJBs in addition to J2EE design patterns allows us to integrate services
    automatically. For example, persistence can be managed in this way by the component
    container or container-managed persistence (CMP) by applying it to the entity
    EJB. The same applies to transactions, or container-managed transactions (CMTs),
    which can be integrated declaratively using the EJB deployment descriptors.


    The next few sections briefly describe the different J2EE design solutions that
    we will develop further later in the chapter. For more details, please refer to
    the J2EE documentation (`http://java.sun.com/j2ee/docs.html`) and to the catalog
    of J2EE design patterns (see the references section at the end of this book).


    ### J2EE Business Tier Design Patterns


    In applications built using J2EE, the business tier is the middle tier, and it
    forms the interface between the client and the enterprise resources (data sources).
    It is therefore extremely important that this tier is implemented in a way that
    ensures good performance, as well as provides for ease of maintenance, evolution,
    scalability, and so on.


    Use of a business tier is not compulsory, but it is, however, highly recommended.
    In applications with a business tier, clients can access the company’s different
    data sources in a logical and consistent way, which is not the case if the application
    allows direct access to the database.


    Making data access consistent enables easier optimization of the application architecture.
    For example, global performance can be improved by using load balancing or caching
    on application servers. These improvements are linked to the use of a business
    layer and are only possible if certain basic rules are respected. J2EE design
    patterns state these rules explicitly.


    The two most important design patterns for the business layer are the session
    facade pattern and the business object pattern, both of which are described in
    the sections that follow.


    #### The Session Facade Pattern


    The *session facade pattern* is simply a session EJB. Its principal functions
    are as follows:


    - To ensure that the client is independent from the business model (the latter
    being subject to modifications over time).

    - To allow access to the data via objects without shared states that can be managed
    and optimized automatically by the application server. Since the problem of state
    synchronization is avoided, the server itself constructs pools of session objects
    according to the different sessions opened by the clients.

    - To create a functional interface to adding extra nonfunctional properties declaratively
    using deployment descriptors, as we will explain later.

    - To provide remote access to identified services via the J2EE lookup and communication
    layers (*Java Naming and Directory Interface*, or *JNDI*, and *Remote Method Invocation*,
    or *RMI*). This access is also configured in the deployment descriptors.


    #### The Business Object Pattern


    The *business object pattern* allows the session facade objects to access data
    via entity EJBs, without resorting to direct use of the connectors for the different
    resources. As with the session facade, use of business objects is not compulsory
    but is recommended.


    The principal functions of the business object pattern are as follows:


    - The encapsulation of data access within the object-oriented model, which simplifies
    data access and avoids, for example, the need for SQL queries. The EJB model advocates,
    among other things, use of Home interfaces for resolving business objects.

    - Use of deployment descriptors for the declarative and automatic introduction
    of nonfunctional properties such as persistence.


    #### The Transfer Object Pattern


    The use of other design patterns can also improve the design of a J2EE application,
    particularly in terms of performance. The *transfer object pattern* allows us
    to group together services used by a facade. This is useful when the services
    have fine-grained parameters that can cause multiple sequences of calls between
    the client and the server, as these calls tend to induce a great deal of network
    traffic, especially costly connections.'
