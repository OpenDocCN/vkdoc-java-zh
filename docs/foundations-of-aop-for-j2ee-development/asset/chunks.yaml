- fmt: '# Dr. Younessi


    Dr. Younessi is currently Professor of Computer Science and Chairman of the Department
    of Engineering and Science at Rensselaer Polytechnic Institute (RPI), Hartford
    Graduate Campus. Prior to joining academia, Dr. Younessi held a number of positions
    of responsibility and leadership in industry. He has led both technical and marketing
    efforts, and has been responsible for projects, budgets, staff, and revenue. In
    his last role in industry, he founded, staffed, and grew (in less than five years)
    an IT consulting firm from an initial size of two (himself and an employee) to
    a sizeable organization of 16 consulting staff and a revenue of several million
    dollars. He has also provided consulting services to some of the largest companies
    and government organizations around the world (the state governments of New York
    and Michigan, BHP, Royal Dutch Shell Oil Corp., Maersk, and Hitachi, to name a
    few).


    Dr. Younessi is frequently asked to many prestigious venues and to participate
    in national and international committees and boards. He was the U.S. head of delegation
    to the ISO SC7 meeting in Malaga, Spain, and a member of the Australian Research
    Council (the Australian equivalent of the NSF) IT grant-proposal review board.
    He has also been part of the Australian team to promulgate and validate the ISO
    15504 standard. Dr. Younessi is also the category editor for the ACM Computing
    Reviews and serves on the editorial or review board of several international journals.


    # Introduction


    **Aspect-oriented programming** (`AOP`) is a programming paradigm that was defined
    at the Xerox Palo Alto Research Center (PARC) in the mid-1990s. The roots of this
    paradigm can be traced back to several works designed to improve code modularity
    and facilitate reuse and maintenance.


    The benefits of `AOP` for modularizing code have drawn attention from many application
    developers, especially those in the domain of web applications. Indeed, `AOP`
    is an excellent complement to Internet-oriented application servers such as Sun
    Microsystems’s `J2EE` or Microsoft’s `.NET`. With `AOP`, developers can facilitate
    the development and boost the productivity of these types of applications. However,
    `AOP` is not limited to the domain of web-centric applications. Similar to other
    programming paradigms (such as objects), `AOP` is a general technique that can
    be applied to any kind of application.


    This book defines and explains the concepts of `AOP`. The implementation of these
    concepts is illustrated by a presentation of four major existing `AOP` products
    (`AspectJ`, `JAC`, `JBoss AOP`, and `Spring AOP`). In addition, this book shows
    how you can use `AOP` for programming `J2EE` applications.


    ## Target Audience


    This book aims to present the concepts of `AOP` in a clear and pedagogical way.
    No prior knowledge of the domain is needed. Instead of focusing on the advanced
    programming concepts of a particular `AOP` language, this book provides a broad
    overview of the existing products available for programming with aspects.


    Many readers, including the following, will be interested in this book:


    - Programmers curious about gaining insight into a new domain of computer science

    - IT project managers wishing to learn what the expected benefits of `AOP` are

    - Application developers seeking accurate information about `AOP` products

    - PhD and MSc students needing an introduction to `AOP` and a state-of-the-art
    comparison of existing implementations


    ## How to Read This Book


    The chapters of this book were written to be as independent as possible; therefore,
    it is not necessary to read the chapters sequentially from the first to the last
    to gain valuable information about `AOP`. Each reader can choose his or her own
    reading plan.


    That said, we will outline some recommended reading for each target audience listed
    in the previous section:


    - **Programmers**: Chapters 1 and 2 are recommended for gaining an overview of
    what `AOP` is and for learning its basic concepts. Reading Chapter 3 on `AspectJ`
    is also recommended, since this chapter shows how the concepts of Chapter 2 are
    implemented in the leading tool of the domain. The three last chapters (10, 11,
    and 12) illustrate the use of `AspectJ` for developing `J2EE` applications.


    - **IT project managers**: Chapter 1 is recommended for obtaining a quick overview
    of `AOP`. The first pages of Chapter 2 are also useful to learn the main motivations
    for the introduction of this new programming paradigm. We also recommend reading
    Chapter 9 to understand how `AOP` can help to improve Quality of Service, which
    has a direct impact on an application’s use. Chapter 10 gives a typical example
    of a `J2EE` application that can benefit from being developed with aspects.


    - **Application developers**: Chapter 2, which covers the concepts of `AOP`, is
    recommended. Chapters 3 through 6 are recommended, as they provide an overview
    of how the concepts of `AOP` are implemented in existing tools. Chapters 8 and
    9 show how `AOP` can be used for programming design patterns, contracts, and application
    managements. Finally, Chapters 11 and 12 present a case study of programming a
    `J2EE` application with `AOP`.


    - **PhD and MSc students**: Chapters 1 and 2 are recommended for gaining an overview
    of `AOP` and for learning its basic concepts. Chapters 3 through 6 are recommended,
    as they provide an overview of how the concepts of `AOP` are implemented in existing
    tools. We recommend reading the comparison in Chapter 7, which explores the differences
    and similarities between these tools. Finally, Chapter 8 illustrates the power
    of `AOP` for implementing crosscutting structures, such as the well-known design
    patterns of software engineering.'
