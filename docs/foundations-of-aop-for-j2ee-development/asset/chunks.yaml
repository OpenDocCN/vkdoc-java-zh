    第 11 章 ■ 在示例应用的业务层中使用 AOP


    **使用 JTA 管理分布式事务**


    Java 事务 API（JTA）定义了一套用于使用分布式事务的接口和机制。当涉及多个数据源时，事务即为分布式事务。通常，数据源位于不同的服务器上，但这并非强制要求。JTA
    也可仅用于单个数据源。在 J2EE 中，JTA 通常用于使会话 EJB 外观服务具备事务性。


    参考银行应用只有一个数据源：PointBase 数据库。评估可能的数据分布方式很有意义。例如，账户和交易可以存储在两个不同的数据库中，以平衡负载和数据量。此外，这对系统管理也很有用，因为交易可能需要与账户不同的维护流程。在这种情况下，使用
    JTA 和支持分布式的架构就显得尤为重要。


    简而言之，JTA 依赖于三个主要实体之间定义的三个通信接口：应用程序、事务管理器和事务资源。在应用服务器的上下文中，JTA 定义了应用服务器与事务管理器之间的接口。该接口允许向管理器通知事务中
    EJB 上发生的操作。它还允许客户端访问自动且透明传输的事务上下文，该上下文可从参与事务的任何 EJB 中访问。在事务内部，参与事务的 EJB 可以通过事务上下文访问一个代表该事务的对象：`javax.transaction.UserTransaction`
    的一个实例。


