    第 12 章 ■ 在示例应用程序的表示层和客户端层中使用 AOP


    在*过滤器对象*设计模式中，我们可以识别出 AOP 的典型结构：“环绕”通知代码。为了达到相同的效果，我们可以用切面替换 `MembershipFilter`
    类，并用“环绕”通知代码替换过滤器方法 `doFilter`（第 20 行）。实际上，在过滤器链上调用 `doFilter` 方法（第 26 行）与在“环绕”通知代码中调用
    `proceed` 具有类似的效果。


    使用 AOP 并不会显著提高代码的模块化程度，因为最终实现与过滤器对象模式非常相似。然而，它可以显著提升性能，因为 Web 容器以透明且不可控的方式处理拦截链。该机制是动态的，可能会引入开销。由于
    AspectJ 等工具支持编译时织入，拦截代码可以直接插入目标类代码中，从而消除了链初始化和迭代机制的实现。


