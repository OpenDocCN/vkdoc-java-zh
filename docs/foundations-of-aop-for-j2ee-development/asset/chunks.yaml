    Similar to the session facade, the business object implementation shows some nonmodularized
    concerns:


    - EJB technology dependency through the implementation of the `EntityBean` interface
    (lines 15, 26, 111).

    - Implementation and management of references (here a collection) towards other
    EJBs (lines 24, 33, 233).

    - Database access, more generally persistence management (lines 27, 71, 81, 96,
    105, 148), since it is a bean-managed persistence (BMP) EJB and not a container-managed
    persistence (CMP) EJB.

    - Business implementation (line 29).

    - EJB instances resolving through the `Home` interface implementation (line 5).


    The following sections illustrate how to clearly modularize these concerns with
    AOP by implementing nonbusiness concerns in aspects.


    ## AOP-based Implementation


    AOP, similar to facade objects, must implement the `javax.ejb.SessionBean` interface;
    business objects, such as entity EJBs, must implement the `javax.ejb.EntityBean`
    interface. AOP can be used, like for the session facade, through a marker interface.


    ```java

    package aop.j2ee.business;


    public interface EntityBeanProtocol {}

    ```


    This empty interface must be implemented by the business objects or any entity
    EJB that will have minimal impact on the code. An aspect (such as the one in Listing
    11-3) transforms POJOs into EJBs and implements the needed methods.


    **Listing 11-3.** *An Aspect to Transform POJO into an Entity EJB*


    ```java

    package aop.j2ee.business.aspect;


    import java.sql.*;

    import javax.ejb.*;

