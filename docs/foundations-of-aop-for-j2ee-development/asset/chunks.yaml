- fmt: "# INTRODUCTION\n\nCompared to OOP, the adoption of AOP appears to be faster.\
    \ Indeed, even though the first versions of object-oriented languages appeared\
    \ in 1967 with Simula 67, it was not until the mid-1980s that objects were used\
    \ for developing enterprise applications with C++. The cost of adopting AOP is\
    \ less than the cost of adopting OOP because AOP languages complement existing\
    \ OOP languages. Aspects can then be smoothly integrated in existing applications\
    \ without the need for any major redevelopment of the existing code.\n\n# Chapter\
    \ 1: Introducing AOP\n\n**T**his book presents *aspect-oriented programming (AOP)*,\
    \ which defines a new programming paradigm. By the word *paradigm*, we mean a\
    \ set of principles that structure the modeling of programs and, as a consequence,\
    \ the development of programs.\n\nAs its name suggests, aspect-oriented programming\
    \ introduces a new concept—that of the *aspect*. Some years ago, object-oriented\
    \ programming (OOP) introduced the concept of the object, which initiated a new\
    \ way to structure applications and write programs. The same idea applies to the\
    \ concept of the aspect.\n\nIn 1996, Gregor Kiczales and his team at the Palo\
    \ Alto Research Center (PARC), a subsidiary of Xerox Corporation that is located\
    \ in California, originally defined the concept of the aspect. Although this definition\
    \ made 1996 the official birthday of AOP, many of AOP's underlying ideas preceded\
    \ this date. Some of OOP's limitations motivated the introduction of the aspect,\
    \ which also originated in research domains, such as those of reflection and the\
    \ meta-object protocol.\n\nAfter the concept of the aspect was defined, an aspect-oriented\
    \ language, named AspectJ, was soon implemented, with the first versions made\
    \ available in 1998. AspectJ, which remains the most popular AOP language, extends\
    \ the Java language with new keywords that make it possible to program aspects.\n\
    \nAbove and beyond AspectJ, AOP itself has remained a subject of great interest\
    \ since 1998 within the research community. As a result, many other languages\
    \ and tools, the majority of which are constructed around Java, have been developed.\
    \ These include Java Aspect Components (JAC), JBoss AOP, and AspectWerkz.\n\n\
    Despite the focus on Java, it's important to keep in mind that nothing about AOP\
    \ is specific to OOP in general or Java in particular. The notion of the aspect\
    \ is an abstract concept that, like the notion of the object, can be applied to\
    \ different languages. Tools of varying completeness exist to support AOP in C,\
    \ C++, C#, and Smalltalk. Furthermore, any existing language could be extended\
    \ to support the concepts of AOP.\n\nBecause the concept of the aspect is relatively\
    \ new, encouraging a large community of developers to adopt AOP is an important\
    \ task.\n\n## Looking at Programming Paradigms\n\nViewed as a programming paradigm,\
    \ you can see AOP as OOP's successor. However, the aim of AOP is not to replace\
    \ OOP, but to complement it, allowing you to create clearer and better-structured\
    \ programs.\n\nSince the introduction of assembly language, a family of programming\
    \ paradigms has been developed that allows programmers to create software of increasing\
    \ complexity. The concepts of the procedure and the object have, each in their\
    \ own ways, contributed to better code structuring and greater manageability of\
    \ large programs. Think of AOP, which aims to continue this tradition, as the\
    \ latest addition to this family of paradigms.\n\nFor example, the concept of\
    \ the procedure, which languages such as Pascal embody, allows you to partition\
    \ a program into entities called procedures. As you know, each procedure is simpler\
    \ to write and understand than the program as a whole is. You therefore build\
    \ a program as a set of procedures that call one another. The use of procedures\
    \ aids the development of large applications because individuals on a team can\
    \ independently develop procedures. Individuals can also test procedures independently,\
    \ allowing programming errors to be more easily located.\n\nAlthough the transition\
    \ was not instantaneous, procedural programming contributed to the disappearance\
    \ of the `goto` instruction. This instruction, which transferred execution to\
    \ a specific line of the program, tended to cause \"spaghetti code.\" In other\
    \ words, the program would quickly become tangled—preventing the ability to reuse\
    \ some parts of the program independently of others.\n\nProcedural programming,\
    \ on the other hand, allows you to code elementary tasks that each contain clearly\
    \ identified beginning and end points. This type of programming makes it possible\
    \ to create libraries of procedures that can be reused by many different programs.\n\
    \nProcedural programming simplifies the coding process. It allows programmers\
    \ to develop modular—hence more understandable—programs by giving a clearer structure\
    \ to the code.\n\nHowever, procedural programming does not provide a secure structure\
    \ for any of the data. Indeed, one of the great weaknesses of this paradigm is\
    \ that global variables can be accessed from anywhere in the program—and doing\
    \ so improperly can lead to unexpected side effects.\n\n## The Origins of AOP\n\
    \nLike all programming paradigms, AOP is based on pre-existing concepts that had\
    \ already been exploited in the past—but in limited, specific situations. While\
    \ recognizing the importance of the work of Gregor Kiczales, who integrated the\
    \ ideas that underpin AOP, the programming community must not forget that many\
    \ other projects served as foundations for this work.\n\nAOP uses ideas from various\
    \ domains of information technology—specifically, those of meta programming, reflection,\
    \ and meta-object protocols. These domains were developed by Mehmet Aksit, Jean-Pierre\
    \ Briot, Shigeru Chiba, Pierre Cointe, Jacques Ferber, Patricia Maes, Brian Smith,\
    \ and many others. Additionally, some of AOP's key mechanisms relate to features\
    \ of object-oriented languages that never became popular, such as the `before`\
    \ and `after` instructions of CommonLoops and Flavors. Also apparent are the similarities\
    \ between AOP and certain recent techniques that generative programming and model-driven\
    \ architectures (MDA) use.\n\nHowever, the AOP approach as a whole remains original.\
    \ Therefore, AOP must not be seen as competing with the techniques that it was\
    \ developed from, but as presenting a logical and coherent structure that integrates\
    \ these techniques for solving real-world problems.\n\n## OOP: A Promising Paradigm\n\
    \nThe aim behind the development of OOP was to organize the data of an application\
    \ and its associated processing into coherent entities. Doing so was achieved\
    \ by having objects that encapsulate data along with the methods that manipulate\
    \ the data and carry out the processing.\n\nFrom a conceptual point of view, an\
    \ application is broken down according to the real-world objects that it models.\
    \ In a stock-management application, for example, you might find supplier, article,\
    \ customer, and other types of objects.\n\nBy grouping together all the objects\
    \ that possess the same characteristics, the concept of a class complements the\
    \ concept of the object. In the stock-management application, all the supplier\
    \ objects belong to the same class, which is named `supplier`.\n\nWhen designing\
    \ a solution to a concrete problem, deciding how to split up the program into\
    \ classes and, therefore, objects is far from simple. Many variations are possible,\
    \ so different developers may come up with very different solutions. Approaches\
    \ such as that of the Rational Unified Process (RUP) platform aim to rationalize\
    \ the conceptual choices you need to make.\n\nRegardless of the design process,\
    \ the way you divide an application into classes and objects must be guided, above\
    \ all, by the real-world data that the application models. The most important\
    \ factor that influences how you choose the classes is the way you want to organize—in\
    \ other words, group together—the business data of the application. Classes first\
    \ and foremost provide a grouping mechanism for the data, with the associated\
    \ processing included as the methods.\n\nThe OOP concepts of the class and the\
    \ object allow you to write programs that feature more of the following than programs\
    \ that use the procedural paradigm:\n\n- **Modularity**: Because the processing\
    \ that concerns an item or set of data is grouped together with the data in the\
    \ same software entity (the class), a certain degree of modularity is achieved.\n\
    - **Reusability**: As a result of modularity, only the extent to which a class\
    \ is well designed, self-sufficient, and targeted at a precise goal determines\
    \ its likelihood of being reusable in different software contexts.\n- **Reliability**:\
    \ Because the data is encapsulated within objects, it can be manipulated only\
    \ through the methods that define the object's interface. (Directly manipulating\
    \ the data is not possible.) The valid ways to access the objects are therefore\
    \ clearly identified, and programmers can safely use any of them.\n- **Extendability**:\
    \ The concept of inheritance allows you to create new classes from those that\
    \ already exist. A new class can extend an existing class by adding data or processing,\
    \ or it can specialize the existing elements. For example, you could extend a\
    \ class that manages data lists so that it manages only stacks. (A stack is a\
    \ list that requires specific rules for adding and removing elements).\n\nBecause\
    \ of these advantages, OOP has undeniably improved software engineering. Developers\
    \ have built more-complex programs in a simpler fashion than would have been possible\
    \ through procedural programming. Furthermore, developers have written large applications\
    \ in object-oriented languages. For example, the Java 2 Platform, Enterprise Edition\
    \ (J2EE) application servers were programmed in the Java language. Similarly,\
    \ developers have implemented complex class hierarchies to construct graphical\
    \ user interfaces. The Swing API, included in Java 2 Platform, Standard Edition\
    \ (J2SE), falls into this category.\n\nHowever, the transition from procedural\
    \ programming to OOP occurred with considerable effort, with developer training\
    \ representing a significant cost. Now that OOP is just starting to be widely\
    \ understood, it is legitimate to ask whether introducing a new paradigm such\
    \ as AOP is desirable.\n\nTo answer that question, we can begin by affirming that\
    \ AOP does not call into question what has been achieved through OOP. Applications\
    \ that are programmed according to AOP remain organized into classes and objects.\
    \ AOP simply adds new concepts that allow you to improve object-oriented applications\
    \ by making them more modular. In addition, AOP streamlines the development process\
    \ by allowing the separation of development tasks. For example, highly technical\
    \ functionalities, such as security, can be developed by specialized experts,\
    \ and aspects allow you to more easily integrate these functionalities into the\
    \ rest of the application.\n\nNo doubt the adoption of AOP will take a long time\
    \ and require effort, but it can be done gradually when the need is clearly identified.\n\
    \n## The Limitations of OOP\n\nThe importance of OOP for developing complex programs\
    \ is undeniable. However, we will show that writing clear and elegant programs\
    \ using only OOP is impossible in at least two cases: when the application contains\
    \ *crosscutting functionalities*, and when the application includes *code scattering*.\n\
    \n### The Case of Crosscutting Functionalities\n\nPreviously, we mentioned that\
    \ when you analyze how to organize an application into classes, the analysis must\
    \ be driven by the need for separating and encapsulating the data and its associated\
    \ processing into coherent entities.\n\nAlthough the classes are programmed independently\
    \ of one another, they are sometimes behaviorally interdependent. Typically, this\
    \ is the case when you implement rules of referential integrity. For example,\
    \ a customer object must not be deleted while an outstanding order remains unpaid;\
    \ otherwise, the program risks losing the contact details for that customer. To\
    \ enforce this rule, you could modify the customer-deletion method so that it\
    \ initially determines whether all the orders have been paid. However, this solution\
    \ is deficient for several reasons:\n\n- Determining whether an order has been\
    \ paid does not belong to customer management but to order management. Therefore,\
    \ the customer class should not have to manage this functionality.\n- The customer\
    \ class should not need to be aware of all the data-integrity rules that other\
    \ classes in the application impose.\n- Modifying the customer class to take these\
    \ data-integrity rules into account restricts the possibilities of reusing the\
    \ class in other situations. In other words, once the customer class implements\
    \ any functionality that is linked to a different class, customer is no longer\
    \ independently reusable, in many cases.\n\nDespite the fact that the customer\
    \ class is not the ideal place to implement this referential-integrity rule, many\
    \ object-oriented programs work this way for lack of a better solution. You might\
    \ be thinking about integrating this functionality into an order class instead,\
    \ but this solution is no better. No reason exists for the order class to allow\
    \ the deletion of a customer. Strictly speaking, this rule is linked to neither\
    \ the customers nor the orders but cuts across these two types of entities.\n\n\
    One of the aims of dividing the data into classes is making the classes independent\
    \ from one another. However, crosscutting functionalities, such as the rules of\
    \ referential integrity, appear superimposed on the division—violating the independence\
    \ of the classes. In other words, OOP does not allow you to neatly implement crosscutting\
    \ functionalities. As a compromise, you can resign yourself to implementing them\
    \ in individual classes, but remain conscious that this solution is not ideal.\n\
    \n### The Case of Code Scattering\n\nIn OOP, the principal way that objects interact\
    \ is by invoking methods. In other words, an object that needs to carry out an\
    \ action invokes a method that belongs to another object. (An object can also\
    \ invoke one of its own methods.) OOP always entail two roles: that of the invoker\
    \ and that of the invoked.\n\nWhen you write the code to call a method, you do\
    \ not need to worry about *how* the service is implemented because the call interacts\
    \ only with the interface of the invoked object. You need only ensure that the\
    \ parameters in the call correspond to those of the method's signature.\n\nBecause\
    \ methods are implemented within classes, you write each method as a block of\
    \ code that is clearly delimited. To change a method, you obviously modify the\
    \ file that contains the class where the method is defined. If you alter just\
    \ the body of the method, the modification is transparent because the method will\
    \ still be called in exactly the same way.\n\nHowever, if you change the method's\
    \ signature (for example, by adding a parameter), further implications arise.\
    \ You must then modify all the calls to the method, hence you must modify any\
    \ classes that invoke the method. If these calls exist in several places in the\
    \ program, making the changes can be extremely time-consuming.\n\nThe main point\
    \ is this: Even though the implementation of a method is located in a single class,\
    \ the calls to that method can be scattered throughout the application. This phenomenon\
    \ of code scattering slows down maintenance tasks and makes it difficult for object-oriented\
    \ applications to adapt and evolve. Any change in the way that a service is used\
    \ requires many other changes—a costly process that can also introduce errors.\n\
    \n## The Benefits of AOP\n\nAOP complements OOP by offering solutions to the two\
    \ challenges just explained—solutions that implement crosscutting functionalities\
    \ and eliminate code scattering. Chapter 2 will show that the concept of an aspect\
    \ allows you to integrate crosscutting functionalities and code scattering into\
    \ an object-oriented application by using the new concepts of the pointcut, the\
    \ joinpoint, and the advice.\n\nIn procedural programming, you divide the application\
    \ according to the functionalities that you need to implement. OOP goes one step\
    \ further by obliging you to group related data items and their associated processing\
    \ tasks into coherent entities. AOP then establishes a certain balance by allowing\
    \ you to superimpose a new layer onto the data-driven composition of OOP. This\
    \ layer corresponds to the crosscutting functionalities that are difficult to\
    \ integrate directly through the OOP paradigm.\n\nAn aspect-oriented application\
    \ consists of the following two parts:\n\n- **Classes**: These constitute the\
    \ base of the application and implement the business logic. In other words, the\
    \ classes implement those parts of the application that deal directly with the\
    \ real-world problem to be modeled.\n- **Aspects**: These integrate the supplementary\
    \ elements (classes, methods, and data) that correspond to crosscutting functionalities\
    \ and code scattering.\n\nDesigning an aspect-oriented application thus begins\
    \ by breaking down the problem to define the classes and the aspects. No universal\
    \ rule exists for deciding whether a functionality should be implemented in a\
    \ class or in an aspect. Furthermore, you can implement the same functionality\
    \ in either one or the other, depending on the context. For example, you might\
    \ implement the constraints of real-time execution as aspects in a management\
    \ application but as classes in an application that supervises industrial processes.\n\
    \nThe second design stage consists of putting the classes and the aspects together\
    \ to obtain an operational application. You carry out this process by using the\
    \ AOP concepts of the crosscut and the joinpoint. These concepts allow you to\
    \ decide where in the program to insert the aspects and, therefore, which functionalities\
    \ these aspects will implement.\n\nOn another note, remember that when OOP was\
    \ introduced, the object-oriented languages were either extensions of existing\
    \ languages (C++ is an extension of C) or completely new languages (such as Smalltalk\
    \ and Java). In both cases, new compilers had to be developed.\n\nAOP presents\
    \ a slightly different situation because the tools exist either as frameworks\
    \ or as extensions to existing languages. An example of the latter is the AspectJ\
    \ language, which Chapter 3 presents in detail. AspectJ adds new keywords to the\
    \ Java language that allow the use of AOP concepts, such as the aspect, the crosscut,\
    \ and the joinpoint.\n\nExamples of AOP frameworks are JAC, JBoss AOP, and AspectWerkz,\
    \ all of which Chapters 4, 5, and 6 present. These frameworks use the syntax of\
    \ an existing programming language, which in these cases is Java. You use the\
    \ AOP concepts by means of the classes and methods in the framework. For example,\
    \ defining an aspect through JAC comes down to extending a class that the framework\
    \ contains.\n\nSince the introduction of AOP, a hot debate has raged between those\
    \ in favor of language extensions and those in favor of frameworks. In one case,\
    \ you need to learn a language's new keywords; in the other case, you need to\
    \ learn a new framework's API. Regardless, both cases require a learning phase.\n\
    \n## Summary\n\nThis chapter introduced the concept of the aspect which, as its\
    \ name suggests, serves as the main contribution to the AOP paradigm. Gregor Kiczales\
    \ and his team at the Palo Alto Research Center (PARC) defined the concept of\
    \ the aspect in 1996. Several existing ideas led to the emergence of AOP, and\
    \ research domains such as those of reflection and the meta-object protocol actively\
    \ contributed.\n\nAlthough the concept of the aspect is a general programming\
    \ concept that could be applied to any programming paradigm (functional, procedural,\
    \ or object-oriented), the history of AOP is tightly linked to that of the OOP\
    \ paradigm. Most of the existing AOP languages are extensions of OOP ones, such\
    \ as Java and C#. Furthermore, the motivation for defining the concept of the\
    \ aspect originated from the limitations of OOP.\n\nThis chapter described the\
    \ two main OOP limitations: crosscutting functionalities and code scattering.\
    \ The former refers to the fact that you cannot keep certain functionalities clearly\
    \ modular when you implement them in classes. The latter refers to the fact that\
    \ you can use classes to keep the implementation—but not the use—of functionalities\
    \ modular. Because AOP provides a solution to these limitations, AOP complements\
    \ rather than replaces OOP as a programming paradigm.\n\nBy analyzing why these\
    \ limitations occur, this chapter introduced the benefits that you can expect\
    \ from the AOP paradigm—benefits that stem from the clear and modular implementation\
    \ of crosscutting functionalities and code scattering.\n\n# Chapter 2: The Concepts\
    \ of AOP\n\n**T**his chapter introduces the basic concepts of AOP. Although AOP\
    \ is relatively new, many of the basic concepts are already well established.\
    \ This chapter gives a general introduction to the concepts of AOP, and the rest\
    \ of the chapters demonstrate the use of these concepts with the four most advanced\
    \ tools that are currently available: AspectJ/AspectWerkz, JAC, JBoss AOP, and\
    \ Spring.\n\nEvery new programming paradigm brings with it a set of concepts and\
    \ definitions. This was the case for the procedural approach, with the notions\
    \ of the module and the procedure, and for the object-oriented approach, with\
    \ the concepts of encapsulation, inheritance, and polymorphism. Important changes\
    \ accompanied each of these new paradigms. From a technical point of view, the\
    \ structure of the programs changed radically, so those involved in software development\
    \ were required to learn new techniques. As with the previous paradigms, AOP brings\
    \ a set of new concepts to the table. However, improvements in the quality of\
    \ applications and the increased modularity that AOP allows counterbalance the\
    \ costs of learning the new concepts.\n\nSince the majority of AOP environments\
    \ (including AspectJ/AspectWerkz, JAC, JBoss AOP, and Spring) are built on Java,\
    \ this book uses the terminology and the concepts of Java; however, none of the\
    \ concepts of AOP are specific to this language. In the same way that the concept\
    \ of the object can be applied with success to various languages, the concept\
    \ of the aspect can be implemented with C++ (AspectC++), C# (AspectC#), Smalltalk\
    \ (Apostle), and even procedural languages such as C (AspectC). Furthermore, the\
    \ concepts of AOP are important not only during the coding phase but earlier in\
    \ the software development—during the conceptual program-design phase. Tools such\
    \ as Theme/UML and JAC UML Aspectual Factory (UMLAF) propose Unified Modeling\
    \ Language (UML) notations to model AOP concepts.\n\n## The Concept of an Aspect\n\
    \nTo understand and manage a complex program, you generally divide it into smaller\
    \ subprograms. Optimal partitioning criteria have been the subject of numerous\
    \ studies—the aim of these studies being to help developers with the design, development,\
    \ maintenance, and evolution of software.\n\nWhen a program is written with the\
    \ procedural approach, the application is modularized according to the actions\
    \ or procedures to be carried out. With the object-oriented approach, on the other\
    \ hand, the modularization is based on the data to be encapsulated in the classes.\n\
    \nWith both paradigms, certain functions are more difficult to modularize than\
    \ others. We say that the code related to such a function is scattered.\n\n###\
    \ Code Scattering\n\nThe issue of code scattering is not linked to a particular\
    \ language and has been shown to be a problem in numerous applications, whether\
    \ OOP or another paradigm has been used. In fact, code scattering can appear in\
    \ any environment—from Java with J2SE or J2EE, to C# with .NET, to additional\
    \ languages. However, the most extensive study of this phenomenon has been carried\
    \ out using Java.\n\nFor example, the AspectJ team analyzed the Tomcat servlet\
    \ container. They realized that if some functionalities, such as URL pattern matching\
    \ and XML parsing, were cleanly modularized in one or two classes each, others,\
    \ such as the logging functionality and the management of user sessions, were\
    \ highly scattered throughout the application.\n\n#### Analysis of Code Scattering\n\
    \nHaving established that code scattering occurs, it is normal to ask whether\
    \ you could eliminate the problem by composing the class structure differently\
    \ or designing the application in another way.\n\nThe main reason that code scattering\
    \ occurs has to do with the differences in the way that a service is made available\
    \ and the way that it is used. A class gives access to one or more services through\
    \ its methods. It is relatively easy to group the available services together\
    \ in the same place—in other words, in the same class. However, once these services\
    \ have been used from several classes, it is difficult to re-engineer the application\
    \ to group the calls to those methods together. It is therefore not surprising\
    \ that a fundamental and well-known service is called from all over the application.\n\
    \nCode scattering is an effect that manifests itself in any complex program. However,\
    \ the exact way it manifests itself depends on the application, the modeled concerns,\
    \ the used libraries, and the frameworks. Because it heavily depends on a concrete\
    \ problem, code scattering is difficult to remove.\n\nCode scattering in an application\
    \ slows down the development, maintenance, and evolution of the program. When\
    \ several functionalities are scattered, the situation worsens because the code\
    \ starts to contain many calls to multiple concerns that are a priori loosely\
    \ coupled but that need to be integrated together. This phenomenon is apparent\
    \ in many applications.\n\n### A New Dimension in Modularity\n\nThe main contribution\
    \ of AOP is to provide a way of bringing together—in an aspect—code that would\
    \ otherwise have been scattered throughout the application.\n\n**Definition Aspect**—A\
    \ programming unit designed to capture a functionality that crosscuts an application.\n\
    \nAn aspect is often described as being a *crosscutting structure*. In fact, Gregor\
    \ Kiczales, the inventor of the concept of the aspect, stated that, \"AOP is about\
    \ capturing a crosscutting structure.\"\n\nThe definition of an aspect is almost\
    \ as general as that of a class. When you model a problem, you use classes to\
    \ represent the types of objects (customers, orders, suppliers, and so on), and\
    \ each object contains the appropriate data (attributes) and processes (methods).\
    \ In the same way, aspects are used to implement functionalities (security, persistence,\
    \ logging, and so on) within an application, and these functionalities similarly\
    \ require data and processing.\n\nWith AOP, an application consists of classes\
    \ and aspects. An aspect differs from a class in that it implements a crosscutting\
    \ functionality. As you saw earlier, a crosscutting functionality within the procedural\
    \ or object-oriented paradigm is one that is called throughout the code of the\
    \ application. Including classes and aspects in the same application means that\
    \ modularity can occur in two dimensions: the base functionalities that are implemented\
    \ by classes (this dimension could be called structural), and the crosscutting\
    \ functionalities that are implemented by aspects (this dimension could be called\
    \ operational).\n\nFigure 2-1 illustrates the effect of an aspect on the code\
    \ of an application. The left side of the figure represents an application consisting\
    \ of three classes. The horizontal lines show the lines of code that correspond\
    \ to a crosscutting functionality, such as logging. This functionality crosscuts\
    \ the application because it affects all the classes. The right side of the figure\
    \ shows the same application using an aspect to manage the logging functionality\
    \ (the shaded rectangle). The code of this functionality is now entirely contained\
    \ within the aspect, and the classes are now separate from the code. An application\
    \ designed in this way is simpler to write, maintain, and adapt than one without\
    \ aspects.\n\n**Figure 2-1.** *The impact of an aspect on the location of a crosscutting\
    \ functionality*\n\nThe rest of this section presents some of the characteristics\
    \ of aspects. We then introduce the concept of aspect weaving.\n\n### The Integration\
    \ of Crosscutting Functionalities\n\nYou will see later in this chapter that an\
    \ aspect itself is composed of two parts: the pointcut and the advice code. The\
    \ *advice code* contains the code to be executed, whereas the *pointcut* defines\
    \ the points in the program where this code should be implemented.\n\nClearly,\
    \ the code of an aspect—or, more precisely, the advice code—depends on the operation\
    \ you want to implement. For example, if you want to ensure data persistence,\
    \ you need to write code that saves the data in a database. Although you could\
    \ code this functionality from first principles directly within the aspect, you\
    \ would rarely choose to do this. It is considered good practice to use a dedicated\
    \ API, such as Hibernate. With this type of framework, the code of the aspect\
    \ simply makes calls to the API. This way of working means that the aspect does\
    \ not need to know how the services are implemented, and the aspect is therefore\
    \ kept independent from a particular implementation.\n\nFollowing this best practice,\
    \ an aspect simply allows you to integrate a crosscutting functionality that is\
    \ implemented using a dedicated API into an application. In Figure 2-2, the `PersistenceAspect`\
    \ aspect uses Hibernate to integrate the data-persistence functionality into `Class1`\
    \ and `Class3`.\n\n**Figure 2-2.** *Integration of a crosscutting data-persistence\
    \ functionality using an aspect*\n\nStrictly speaking, an aspect does not directly\
    \ implement a crosscutting function but uses a dedicated API to achieve this.\
    \ However, for ease of readability in this book, we shall just say that an aspect\
    \ implements a crosscutting functionality.\n\n### Nonfunctional Services and Aspects\n\
    \nMost applications are comprised of two types of concerns: business and nonfunctional.\n\
    \n*Business concerns*, also called *functional requirements*, correspond to the\
    \ real-world behavior that you want to model. *Nonfunctional concerns*, or *nonfunctional\
    \ requirements*, are additional services that the application must implement—essentially,\
    \ technical or system-level concerns.\n\nFor example, in an application that manages\
    \ human resources, the functionalities for adding and deleting an employee are\
    \ business concerns, whereas application security and privileges are nonfunctional\
    \ concerns.\n\nHowever, you need to be careful when using this distinction because\
    \ a service can be nonfunctional in one application but functional in another.\n\
    \nIn most cases, the nonfunctional services are called throughout the code of\
    \ the business layer. Nonfunctional services are therefore fundamentally crosscutting.\
    \ Consequently, nonfunctional services are implemented as aspects in AOP, whereas\
    \ business concerns are implemented as classes. In some cases, however, the business\
    \ concerns are crosscutting—making it appropriate to implement them as aspects.\n\
    \n### Dependency Inversion\n\nWith object-oriented or procedural programming,\
    \ as soon as an application uses a technical service from an API, a dependency\
    \ is created between the application and the service. A link is generated for\
    \ every explicit call the application makes to the API. When the API changes or\
    \ its semantics evolve, calls to its services must be changed throughout the application.\
    \ Such modifications are potentially costly—especially when the API is used in\
    \ many different locations in the application.\n\nIn addition, you must understand\
    \ the main principles of the API to be able to use it. You must know which methods\
    \ to call, the order to call them in, and the parameters to pass to them. The\
    \ nonfunctional service has to be integrated into every new application that is\
    \ developed. So, even though the API is developed only once, it may be integrated\
    \ into many different applications.\n\n**Figure 2-3.** *Dependency inversion between\
    \ an application and a nonfunctional API*\n\nFigure 2-3 illustrates the direction\
    \ of dependency in OOP and how this changes in AOP. The left side shows that,\
    \ in OOP, the application uses and thus depends on the nonfunctional service.\
    \ The situation is the same with procedural programming.\n\nThe right side shows\
    \ the situation in AOP. An aspect uses the nonfunctional service and integrates\
    \ it into an application. Contrary to OOP, the application no longer depends on\
    \ the service—it is the aspect that depends on the application. This change in\
    \ the direction of the links between the service and the application is not specific\
    \ to AOP; it is sometimes the case for frameworks, as well. The principal advantage\
    \ of this inversion is that it makes the work of the application developer easier.\n\
    \nWith AOP, the application developer does not need to worry about the nonfunctional\
    \ services. It is the aspect developer who, in addition to writing the code of\
    \ the service itself, manages the integration of that service into the application.\
    \ The advantage is that the specialized aspect developer has a better understanding\
    \ of the service than the application developer, who is only a user of this API.\
    \ This lowers the risk of a service being used incorrectly. In particular, the\
    \ aspect developer can make sure that the service integration is correct by implementing\
    \ some constraints on the way the service can be used.\n\n### Aspects and Frameworks\n\
    \nLike AOP, frameworks show dependency inversion, as previously described, whereby\
    \ the code of the application does not depend on the library.\n\nA framework is\
    \ a set of classes that offers a reusable structure for writing applications.\
    \ Frameworks are used in numerous areas of application development, especially\
    \ user interfaces. A J2EE application server can be considered a framework that\
    \ manages the execution of applications based on web or Enterprise JavaBeans (EJB)\
    \ components.\n\nDeveloping an application with a framework consists of writing\
    \ code that is handled by the framework. This code is not run directly—instead,\
    \ the framework invokes it according to the context. In other words, the framework\
    \ forms a set of services that extends the code that you write.\n\nThe situation\
    \ is similar with AOP. Services are provided by aspects that extend the business\
    \ layer of the application. The difference is that frameworks provide a set of\
    \ fixed services, whereas those provided by AOP are entirely programmable within\
    \ the aspects. AOP therefore offers a much more general mechanism for dependency\
    \ inversion than frameworks, which are limited to the application domain that\
    \ they were initially conceived for.\n\n## Aspect Weaving\n\nAn aspect-oriented\
    \ application contains classes and one or several aspects. The operation that\
    \ takes these classes and aspects as input and produces an application that integrates\
    \ the functionalities of the classes and the aspects is known as *aspect weaving*.\
    \ The program that performs this operation is called an *aspect weaver* or just\
    \ a *weaver*. The resulting application is said to be *woven*.\n\n**Definition\
    \ Aspect weaver**—A program that integrates classes and aspects. The weaving can\
    \ be performed at either compile time or run time.\n\n### Compile-Time Weaving\n\
    \nWith compile-time weaving, the weaver is a program that, prior to any execution,\
    \ produces an application code in which the classes are extended by the aspects.\
    \ AspectJ, which is presented in detail in Chapter 3, is the most well-known compile-time\
    \ aspect weaver.\n\nA compile-time weaver is very similar to a compiler and is\
    \ often referred to as an *aspect compiler* or even as a compiler.\n\nWith modern\
    \ object-oriented languages, such as Java and C#, applications are compiled into\
    \ intermediate bytecode. When weaving aspects with these applications, two solutions\
    \ can be envisioned: weaving the aspects with the source code, or weaving them\
    \ with the bytecode.\n\nBytecode weaving is more common than source-code weaving.\
    \ A bytecode weaver can weave commercial and third-party applications that do\
    \ not make their source code available. Furthermore, a bytecode weaver is generally\
    \ simpler to program. The structure and the grammar of a source language such\
    \ as Java are much more complex than that of the associated bytecode. The bytecode\
    \ is therefore simpler to parse and analyze. A direct consequence of this increased\
    \ simplicity is that the performance of a bytecode weaver is often superior to\
    \ that of a source-code weaver.\n\nThe output of a compile-time weaver can be\
    \ either source code or bytecode. However, in the case of bytecode weaving, the\
    \ output is always bytecode. The advantage of generating source code is that it\
    \ can be easily read by a programmer, who can then study the weaving process and\
    \ understand what the weaver has done. The disadvantage of generating source code\
    \ is that this code must then be compiled into bytecode, which slows down the\
    \ code-production chain. In many cases, fast weaving strategies are preferred.\
    \ That is why early versions of AspectJ generated source code, but versions 1.1\
    \ and later generate bytecode.\n\nWith compile-time weaving, aspects are added\
    \ to the application code. When executed, this new code does not make any distinction\
    \ between the original code and the code that comes from the aspects. This weaving\
    \ is thus said to be static. To remove or add an aspect, a total reweaving of\
    \ the application is needed.\n\n### Run-Time Weaving\n\nWith run-time weaving,\
    \ the distinction between application objects and aspects is clearly established\
    \ during the execution. A run-time weaver is a program that is able to orchestrate\
    \ the execution of these two types of entities. In other words, the weaver executes\
    \ either the application code or the aspect code, depending on the defined weaving\
    \ directives.\n\nThe process of weaving aspects at run time can be compared to\
    \ maintaining a relationship between a set of application objects and a set of\
    \ aspect instances. An application object that is bound to an aspect instance\
    \ is *aspectized* by this aspect. An aspect instance can be bound to several application\
    \ objects (the aspect crosscuts several locations of the application) and, conversely,\
    \ an application object can be bound to several aspect instances (more than one\
    \ aspect applies to the same location).\n\nThe advantage of run-time weaving is\
    \ that the relationships between objects and aspects can be dynamically managed.\
    \ By adding or removing a binding, you can weave or unweave a concern while the\
    \ application is running. This dynamic quality is particularly useful for applications,\
    \ such as web servers, that must be highly available and that cannot be stopped\
    \ for long time frames.\n\nIn most cases, run-time weavers transform the application's\
    \ code or its bytecode before running it. The purpose of this adaptation is to\
    \ make the classes ready for run-time weaving. All the code elements that can\
    \ be adapted at run time are modified to introduce hooks. A *hook* is a piece\
    \ of code that redirects the execution flow of the application toward an aspect.\
    \ Hooks are introduced at the beginnings of methods, for example, or just before\
    \ method calls. The types of locations where hooks can be introduced depend on\
    \ the weaver. Note that hooks are not necessarily locations where aspects apply\
    \ but locations where aspects *potentially* apply.\n\nAmong all the hooks introduced\
    \ by a run-time weaver, only a selected subset will redirect the execution flow\
    \ toward an aspect. The aspect programmer decides which hooks effectively perform\
    \ this redirection.\n\nInstead of using a weaver to transform the application\
    \ code, you can take advantage of an alternative solution that consists of running\
    \ the application in a supervisory mode. This technique is similar to running\
    \ the application in a debugger in that whenever the execution reaches a location\
    \ where an aspect applies, the supervisor interrupts the normal execution flow\
    \ and runs the aspect. The advantage of this technique is that it leaves the application\
    \ free from any transformation. The disadvantage is that the supervisory mode\
    \ introduces a cost that slows down the execution of the application.\n\nIn several\
    \ implementations, the insertion of hooks is performed just before the execution—while\
    \ the application is being loaded into the virtual machine. With the Java language,\
    \ the class-loading mechanism can be customized and associated to a bytecode-engineering\
    \ library, such as the Byte Code Engineering Library (BCEL) (see http://jakarta.apache.org/bcel),\
    \ ASM (see http://asm.objectweb.org), or the Java Programming Assistant (Javassist)\
    \ (see http://www.csg.is.titech.ac.jp/~chiba/javassist/index.html). For example,\
    \ the run-time weaver of JAC uses BCEL, whereas that of JBoss AOP uses Javassist.\n\
    \nThe notion of hooks that are inserted by a run-time weaver is closely related\
    \ to the notion of the joinpoint, which is presented in the next section.\n\n\
    ## Joinpoints\n\nIn the previous section, you learned that an aspect is a software\
    \ entity that implements a crosscutting functionality. The definition of an aspect,\
    \ or crosscutting structure, relies on the notion of a *joinpoint*.\n\n**Definition\
    \ Joinpoint**—A point in the control flow of a program where one or several aspects\
    \ apply.\n\nAlthough the notion of a joinpoint is general (potentially, each instruction\
    \ of a program can be a joinpoint), all the points in the control flow are not\
    \ considered useful for AOP. Joinpoints are grouped according to their types,\
    \ and only a subset of all possible joinpoint types are supported by aspect-oriented\
    \ languages.\n\nFurthermore, the notion of the joinpoint is tightly related to\
    \ a particular execution of a program (the control flow). Two different executions\
    \ of the same program may give different sets of joinpoints.\n\n### Different\
    \ Types of Joinpoints\n\nAlthough the definition of a joinpoint occurs at run\
    \ time, that definition is based on the structure of a program (its classes, methods,\
    \ fields, and so on). The following chapters present in detail the various joinpoint\
    \ types that are supported by existing aspect-oriented languages.\n\nThe following\
    \ categories describe the commonly encountered types that are independent of any\
    \ implementation.\n\n- **Methods**: With object-oriented languages, the execution\
    \ of a program can be seen as a sequence of method calls and method executions.\
    \ The various execution scenarios of an application can be expressed in terms\
    \ of sequences of messages that trigger method executions. Method calls and method\
    \ executions are thus two commonly used joinpoint types. Note that method executions\
    \ are considered joinpoints even if they are not, strictly speaking, \"points.\"\
    \ A method starts, continues, and ends—its execution spans a time period. Instead\
    \ of considering the beginning and end as two separate points, the execution as\
    \ a whole is a type of joinpoint.\n- **Constructors**: Constructors are the main\
    \ entities used to create the objects of an application. As with methods, the\
    \ calls and executions of a constructor correspond to joinpoint types.\n- **Exceptions**:\
    \ An exception is thrown to signal an abnormal run-time situation, and it is caught\
    \ to execute a particular treatment. These two events are major points in the\
    \ execution of an application. They can be both considered joinpoint types.\n\
    - **Fields**: Many aspects, such as the persistence aspect, need to deal with\
    \ the application's data. Fields are the main code elements that implement this\
    \ data. Hence, aspect-oriented languages consider read and write operations on\
    \ fields as joinpoint types.\n\nMethod calls and executions are clearly the most\
    \ widely used joinpoint types in AOP. Other code elements, such as code blocks\
    \ like `for` loops and `if` statements, define the structure of a program. With\
    \ the exception of static code blocks in AspectJ, these elements are considered\
    \ too fine grained to be used when defining aspects. Even though these elements\
    \ define useful treatments for method bodies, it is assumed that the crosscutting\
    \ nature of a functionality can be captured with higher-level elements, such as\
    \ the ones mentioned in the previous list.\n\nAspect-oriented-compiler designers\
    \ often use the term *joinpoint shadow*. Like a hook for run-time weavers, a joinpoint\
    \ shadow is a place in the program where an aspect can potentially apply. Hence,\
    \ the joinpoints—as the points where the aspects *actually* apply—are a subset\
    \ of the set of joinpoint shadows. Depending on the information needed by the\
    \ aspects, several pieces of data can be constructed during run time when a joinpoint\
    \ is reached. A joinpoint object can even be provided by the language.\n\nFinally,\
    \ all programs, even the simplest ones, contain many different joinpoints. The\
    \ task of the aspect programmer is to select the joinpoints that are useful for\
    \ implementing a given aspect. This selection is performed with the notion of\
    \ a pointcut, which is presented in the next section.\n\n## Pointcuts\n\nIn the\
    \ previous section, you learned that joinpoints are the points in the control\
    \ flow of a program where one or several aspects apply. Yet, the notion of a joinpoint\
    \ is not sufficient by itself to define which joinpoints are pertinent for a given\
    \ aspect. An entity is needed for describing joinpoints. This entity is defined\
    \ by the notion of a *pointcut*.\n\n**Definition Pointcut**—A set of joinpoints\
    \ where an aspect applies.\n\nAbove all, the crosscutting nature of an aspect\
    \ is expressed with a pointcut because a pointcut groups joinpoints that are located\
    \ in different source files. Of course, these joinpoints are not chosen randomly.\
    \ They share the \"common secret\" in that they are located in the parts of the\
    \ program where a given aspect applies. Pointcuts are thus a way of \"talking\
    \ about\" the application. It is often said that a pointcut defines the \"where\"\
    \ of an aspect. On the other hand, the \"what\" of an aspect is defined by the\
    \ advice code, as we will explain in the next section.\n\nIt is important to note\
    \ that most pointcuts are application dependent. When an aspect needs to be reused\
    \ for a different application, it is likely that the definition of the pointcuts\
    \ will need to be adapted to the locations in the new application.\n\nAs illustrated\
    \ by the previous definition, the notions of the pointcut and the joinpoint are\
    \ linked. A pointcut is defined by a set of joinpoints and, conversely, a set\
    \ of joinpoints define a specific pointcut. However, note that the natures of\
    \ these two notions are somewhat different. Joinpoints are well-defined run-time\
    \ entities (they occur in the control flow of a program), whereas pointcuts cannot\
    \ be attached to a particular structure or time slot of the running program. Instead,\
    \ pointcuts are to be seen as structural code elements that participate in the\
    \ definition of an aspect.\n\nAs illustrated in the following chapters, a language\
    \ for defining pointcuts is included in every existing aspect-oriented tool. Although\
    \ each tool defines its own syntax, the principles remain the same. The ultimate\
    \ goal of a pointcut language is to provide a simple and flexible way to query\
    \ the joinpoints about a given program's structure—so an aspect can be applied\
    \ to the joinpoints. Typically, the language is a kind of pattern language with\
    \ quantification operators, wildcard symbols (such as `*`), and Boolean operators.\
    \ Keywords are also included for designating joinpoint types.\n\n### EXAMPLES\
    \ OF POINTCUTS\n\nTo familiarize you with AOP syntax, the following examples of\
    \ widely used pointcut types show implementations in AOP pseudocode (with a syntax\
    \ that is similar to that of AspectJ):\n\n- **Data-modification pointcut**: This\
    \ type of pointcut designates all the write operations on a set of fields. When\
    \ data that is represented as a set of fields needs to be saved in a database,\
    \ such a pointcut can be used for persistence aspects, for example. This type\
    \ of pointcut can also be used in GUIs to update views that are associated with\
    \ data. Here is an example of a data-modification pointcut:\n\n```\n// all the\
    \ field set operations on all the fields (*) of class C\npointcut dataModification():\
    \ set(C.*)\n```\n\n- **Method-calls pointcut**: This type of pointcut designates\
    \ all the calls to a set of methods. Such a pointcut can be used to compute a\
    \ message-sequence chart, for example. Here is an example of a method-calls pointcut:\n\
    \n```\n// all the calls to the methods of C returning void\n// and taking any\
    \ parameters (..)\npointcut calls(): call(void C.*(..))\n```\n\n- **Method-executions\
    \ pointcut**: This type of pointcut designates all the executions of a set of\
    \ methods. Such a pointcut can be used to compute method-execution times, for\
    \ example. Here is an example of a method-executions pointcut:\n\n```\n// all\
    \ the executions of the methods of C returning any type (*)\n// and taking any\
    \ parameters (..)\npointcut executions(): execution(void A.*(..))\n```\n\n## Advice\
    \ Code\n\nIn the previous section, you learned that a pointcut defines *where*\
    \ an aspect applies. The advice code defines *what* the instructions of an aspect\
    \ are.\n\n**Definition Advice code**—The definition of the behavior of an aspect.\n\
    \nAdvice code is associated with a pointcut to implement a crosscutting functionality.\
    \ The treatments that are defined in the advice code are performed for all the\
    \ joinpoints that are included in the associated pointcut.\n\nMuch like a method,\
    \ the advice code owns a body that contains instructions. However, unlike a method,\
    \ the advice code is never called directly but is woven into the joinpoints that\
    \ are specified in the associated pointcut.\n\n### Different Types of Advice Code\n\
    \nThree main types of advice code exist:\n\n- `before`: The advice code is executed\
    \ before the joinpoints.\n- `after`: The advice code is executed after the joinpoints.\n\
    - `around`: The advice code is executed before and after the joinpoints.\n\nFor\
    \ `around` advice code, you need to separate the instructions that must be executed\
    \ before the joinpoints from the ones that must be executed after. This is done\
    \ with a special instruction, which in most cases is named `proceed`. The `proceed`\
    \ instruction provides a way of resuming the normal execution of the program and\
    \ executing the code that is contained in the joinpoint. To intuitively understand\
    \ `around` advice code, think of a decorator design pattern in which a decorating\
    \ method is the `around` advice code, and `proceed` is the call to the next decorator\
    \ or decorator object.\n\nThe execution of a program with `around` advice code\
    \ can be summed up as follows:\n\n1. The program executes normally.\n2. Just before\
    \ a joinpoint that is included in a pointcut, the \"before\" part defined in the\
    \ `around` advice code is executed.\n3. A call to `proceed` is made.\n4. The piece\
    \ of code that is defined in the joinpoint is executed.\n5. The \"after\" part\
    \ defined in the `around` advice code is executed.\n6. The program execution is\
    \ resumed just after the joinpoint.\n\nThe call to `proceed` is optional. If `proceed`\
    \ is not called, the code of the joinpoint is not executed, and the program execution\
    \ resumes just after the joinpoint.\n\nAdvice code blocks can be classified according\
    \ to whether they always call `proceed`, never call it, or call it under certain\
    \ conditions. For example, a trace aspect always calls `proceed` because its purpose\
    \ is to keep track of the application's execution—not to modify its normal execution.\
    \ A security aspect calls `proceed` when access is granted to the user; it doesn't\
    \ call `proceed` when access is denied. An optimization aspect never calls `proceed`\
    \ if it replaces the original implementation of a functionality with an optimized\
    \ version.\n\nIn addition to the three previously listed advice-code types, some\
    \ languages (including AspectJ) define two other types: `after returning` and\
    \ `after throwing`. The idea is that a method can either return normally or throw\
    \ an exception. The first case corresponds to the execution of the `after returning`\
    \ advice code, whereas the second one leads to the execution of the `after throwing`\
    \ advice code.\n\nHere is a simple example (still using pseudocode) of `around`\
    \ advice code, which prints some tracing messages before and after the execution\
    \ of the joinpoint:\n\n```\naround void a() {\n    System.out.println(\"before\
    \ joinpoint\");\n    proceed();\n    System.out.println(\"after joinpoint\");\n\
    }\n```\n\nThen, in an aspect, this advice code can be linked to pointcuts. For\
    \ example, the following aspect links the previous advice code to the pointcuts\
    \ that were defined in the previous section:\n\n```\naspect MyAspect {\n    a()\
    \ : dataModification();\n    a() : calls();\n    a() : executions();\n}\n```\n\
    \nThis aspect prints the specified messages around the executions of all the joinpoints\
    \ that are denoted by the `dataModification`, `calls`, and `executions` pointcuts.\n\
    \n## The Introduction Mechanism\n\nThe notions of the pointcut and the advice\
    \ code allow you to reason about the structure of an application and to implement\
    \ crosscutting functionalities through *behavioral* modifications. The control\
    \ flow of the program deviates to the advice code, which adds, removes, or modifies\
    \ behavior. The *introduction* mechanism is complementary and allows you to extend\
    \ the static structure of a program.\n\n**Definition Introduction**—An extension\
    \ mechanism for bringing new structural code elements into an application.\n\n\
    The two most common code elements that are *introduced* by aspects are fields\
    \ and methods. In relation to methods, interfaces can also be introduced—the idea\
    \ is to let a target class implement a new interface. In some aspect-oriented\
    \ frameworks, such as JAC (see Chapter 4), exception handlers can also be introduced.\
    \ The idea is to define handlers for exceptions that are not caught by the application.\n\
    \nLike the inheritance relationship of OOP, the introduction mechanism allows\
    \ for the extension of existing classes. However, contrary to inheritance, the\
    \ introduction mechanism does not allow for the redefinition of existing elements—it\
    \ can only add new ones. This limitation is due to the goal of conserving the\
    \ program's integrity, especially when several aspects are composed together.\
    \ Next, we elaborate on the well-known problem of aspect composition.\n\n## Aspect\
    \ Composition\n\nThe concepts that have been defined so far deal with the definition\
    \ of aspects and their integration with applications. This section raises the\
    \ issue of aspect interactions—for example, how distinct aspects that are woven\
    \ into the same application interact. This issue is known as *aspect composition*.\n\
    \nThe study of aspect composition can be carried out from two complementary points\
    \ of view: that of design time (when choosing the aspects for an application),\
    \ and that of weave time (when applying several aspects to the same joinpoints).\n\
    \n### Design\n\nLike classes, aspects can be independently programmed and then\
    \ reused and integrated into an application. The aspect programmer must therefore\
    \ verify that aspects do not conflict nor introduce inconsistencies in the execution\
    \ of the application.\n\nSeveral kinds of conflicts can arise:\n\n- **Incompatibility**:\
    \ Two aspects can introduce incompatible functionalities. For example, a transaction\
    \ aspect and a persistence aspect can conflict. Indeed, when programmed with persistence\
    \ frameworks, such as Hibernate, a persistence aspect uses a database to store\
    \ data that is modified during a so-called *persistent session*. Most of the time,\
    \ transactions involve data that is also stored in databases. Hence, the database\
    \ is a resource that is shared by the two aspects. When developed separately,\
    \ the aspects might not be aware of the operations performed on the database by\
    \ one another.\n- **Dependence**: Two aspects can be linked. In this case, if\
    \ one aspect is used, the other must also be used.\n- **Redundancy**: Two aspects\
    \ might implement the same functionality differently. For example, several data-compression\
    \ algorithms can be implemented. The joint utilization of two data-compression\
    \ aspects might be useless and should be avoided.\n\nThese kinds of conflicts\
    \ occur at the semantic level and cannot be simply addressed at the programming\
    \ level with the existing aspect-oriented tools. For example, existing aspect\
    \ weavers cannot automatically detect that two aspects implement data-compression\
    \ algorithms. The weavers reason about the instructions that must be appended\
    \ to the joinpoints, but they usually cannot reason about the semantics of these\
    \ instructions. (However, some research prototypes are currently being developed.)\
    \ Therefore, the job of detecting whether two aspects are incompatible, dependant,\
    \ or redundant is entirely the responsibility of the aspect programmer.\n\n###\
    \ Weaving\n\nIn addition to posing potential semantic conflicts, the composition\
    \ of several aspects might require the execution of the distinct aspects that\
    \ must be woven into an application.\n\nFor example, a security aspect and a trace\
    \ aspect might define pointcuts that include the same set of joinpoints. In this\
    \ case, the execution order of the two aspects should be defined.\n\nThere is\
    \ no automatic solution to this problem. For example, you might want to trace\
    \ all requests—even those that will be rejected because the user is not authorized.\
    \ (In this case, the trace aspect must be applied first). Or, you might want to\
    \ trace only the requests from authorized users. (In this case, the security aspect\
    \ must be applied first.) Hence, given two aspects, you must decide on and define\
    \ the correct execution order.\n\n## Summary\n\nThis chapter introduced the basic\
    \ concepts of AOP. The concepts that were presented are independent of any implementation\
    \ by a specific language or framework. This chapter provided a reference for the\
    \ following chapters in this book, where the concepts will be illustrated specifically\
    \ with AspectJ, JAC, JBoss AOP, and Spring.\n\nThe concept of an aspect aims to\
    \ modularize a crosscutting functionality. A functionality is said to be crosscutting\
    \ when its implementation is not cleanly located in one file but is scattered\
    \ throughout many different files of an application. By locating these scattered\
    \ elements in one place, the concept of an aspect improves modularity and leads\
    \ to applications that are easier to understand, debug, and maintain.\n\nAOP is\
    \ a technique that complements OOP. The purpose of AOP is not to replace classes\
    \ and objects. Hence, an aspect-oriented application is still organized around\
    \ a set of classes. Aspects enhance these classes by implementing crosscutting\
    \ functionalities.\n\nImplementing an aspect consists of defining advice code\
    \ and pointcuts. The advice code defines *what* the behavior of the aspect is,\
    \ and pointcuts define *where* this behavior is to be applied in the application.\
    \ The point in the program execution where an aspect applies is called a joinpoint.\
    \ AOP provides the additional notion of introduction, which is the mechanism for\
    \ extending an application.\n\n# Chapter 3: AspectJ\n\n**I**n the previous chapter,\
    \ we presented the basic concepts of AOP with the notions of the aspect, the pointcut,\
    \ the joinpoint, and the advice code.\n\nIn this chapter, we will illustrate the\
    \ way that these concepts are implemented in AspectJ. The syntax and concepts\
    \ presented here correspond to version 1.2.1 of the language.\n\nGregor Kiczales\
    \ and his team, who are credited with the creation of AOP at the Palo Alto Research\
    \ Center (PARC), are responsible for the invention and development of AspectJ—which\
    \ is now the leading tool for AOP. The first versions of AspectJ were released\
    \ in 1998 and, as of December 2002, the AspectJ project has left PARC and joined\
    \ the open-source Eclipse community. Today, AspectJ is the most widely used aspect-oriented\
    \ language.\n\n### THE HISTORY OF ASPECTJ\n\nThe histories of AspectJ and AOP\
    \ are closely related. AspectJ has always been considered by Gregor Kiczales as\
    \ the project that would illustrate the concepts of AOP. Although the notion of\
    \ the aspect dates back to 1996, and the first versions of AspectJ were released\
    \ in 1998, the ideas and research that culminated in AOP date back to before this\
    \ time. Research in reflection in the 1980s and work on open implementations in\
    \ the 1990s served as background for the development of AOP.\n\nInvented in 1984\
    \ by Brian Smith, and studied and popularized by Patricia Maes in 1997, reflection\
    \ is a programming technique that introduces a two-level architecture. The first\
    \ level, called the *base level*, consists of the application. The second level,\
    \ called the *meta level*, controls and supervises the base level. Although the\
    \ notions of the aspect and the meta level differ, they share a common goal: to\
    \ separate business functionalities from technical concerns. This separation aims\
    \ to result in better modularization of programs. Prior to inventing the concept\
    \ of the aspect, Kiczales spent time conducting research in the domain of reflection.\
    \ In 1991, he was coauthor of *The Art of the Metaobject Protocol* (MIT Press,\
    \ 1991).\n\nThe founding document of AOP was published and presented in 1997 by\
    \ Kiczales during the European Conference on Object-Oriented Programming (ECOOP).\
    \ Presentations had been held previously, in 1996, but the 1997 article is considered\
    \ seminal. Simultaneously, the first prototypes of AOP languages appeared in 1996–97.\n\
    \nChristina Lopez, a member of Kiczales's team at the time and an important contributor,\
    \ developed the D language and its implementation, DJava. The D language contained\
    \ two types of aspects: distribution and concurrency-management. Soon after, Lopez\
    \ and Kiczales realized that this new approach could be generalized and applied\
    \ to other aspects. A general-purpose language that could implement any kind of\
    \ aspect was needed.\n\nIn 1998, Kiczales and his team made the decision to switch\
    \ from D to AspectJ. Soon after, the first implementations of AspectJ were released.\
    \ At almost the same time, Aspect-Oriented Tcl Object System (A-TOS), which was\
    \ the first prototype of Java Aspect Components (JAC), was implemented. Since\
    \ then, several versions of AspectJ have been released, and each one has included\
    \ new features and/or bug fixes. The first major version of AspectJ, designated\
    \ version 1.0, was released in November 2001. This was also the year during which\
    \ AOP was fully recognized by the international computer-science community. A\
    \ special edition of the leading journal, *Communications of the ACM*, was devoted\
    \ to AOP.\n\nIn December 2002, the AspectJ project left PARC and joined the open-source\
    \ Eclipse community. Since then, the AspectJ Development Tools (AJDT) plug-in\
    \ has been developed. It enables you to write, compile, and run an aspect-oriented\
    \ program within the IBM Eclipse IDE.\n\n## A First Application with AspectJ\n\
    \nThis section presents a simple example of an aspect-oriented application with\
    \ AspectJ. This example introduces the syntax for writing aspects, pointcuts,\
    \ and advice code.\n\nThe example is an order-management application that manages\
    \ client orders. The application implements a trace aspect, which traces the execution\
    \ of the application and determines which methods are called and the order that\
    \ they are called in.\n\n### The Order-Management Application\n\nThe order-management\
    \ application enables a client to add items to an order and to compute the amount\
    \ of that order. References to the items and their prices are stored in a catalog.\
    \ This application defines three classes: `Customer`, `Order`, and `Catalog`.\
    \ The `Customer` class, which is shown in Listing 3-1, is the main entry point\
    \ of the application.\n\n**Listing 3-1.** *The Customer Class for the Order-Management\
    \ Application*\n\n```\npackage aop.aspectj;\n\npublic class Customer {\n\n   \
    \ public void run() {\n        Order myOrder = new Order();\n        myOrder.addItem(\"\
    CD\",2);\n        myOrder.addItem(\"DVD\",1);\n        double amount = myOrder.computeAmount();\n\
    \        System.out.println(\"Order amount: US$\"+amount);\n    }\n\n    public\
    \ static void main(String[] args) {\n        new Customer().run();\n    }\n}\n\
    ```\n\nThe `main` method creates an object from the `Customer` class and calls\
    \ the `run` method. The latter method creates an order (a `myOrder` object), calls\
    \ the `addItem` method two times with a reference and a quantity, computes the\
    \ amount of the order, and displays the amount.\n\nThe orders are managed by the\
    \ `Order` class, which is shown in Listing 3-2.\n\n**Listing 3-2.** *The Order\
    \ Class for the Order-Management Application*\n\n```\npackage aop.aspectj;\n\n\
    import java.util.*;\n\npublic class Order {\n\n    private Map items = new HashMap();\n\
    \n    public void addItem(String reference,int quantity) {\n        items.put(reference,new\
    \ Integer(quantity));\n        System.out.println(\n            quantity+\" item(s)\
    \ \"+reference+ \" added to the order\" );\n    }\n\n    public double computeAmount()\
    \ {\n        double amount = 0.0;\n        Iterator iter = items.entrySet().iterator()\n\
    \        while ( iter.hasNext() ) {\n            Map.Entry entry = (Map.Entry)\
    \ iter.next();\n            String item = (String) entry.getKey();\n         \
    \   Integer quantity = (Integer) entry.getValue();\n            double price =\
    \ Catalog.getPrice(item);\n            amount += price*quantity.intValue();\n\
    \        }\n        return amount;\n    }\n}\n```\n\nThe `Order` class records\
    \ the items and the ordered quantities in a hash map (in the `items` field). This\
    \ map is indexed with the item references. The associated map values are the quantities\
    \ of the ordered items. The `addItem` method adds an item to the order and displays\
    \ a message that reports on the operation. The `computeAmount` method iterates\
    \ over the ordered items, determines each price, and returns the total amount\
    \ of the order.\n\nThe price of each item is determined by the `Catalog.getPrice`\
    \ method, which is shown in Listing 3-3.\n\n**Listing 3-3.** *The Catalog Class\
    \ for the Order-Management Application*\n\n```\npackage aop.aspectj;\n\nimport\
    \ java.util.*;\n\npublic class Catalog {\n\n    private static Map priceList =\
    \ new HashMap();\n\n    static {\n        priceList.put( \"CD\", new Double(15.0)\
    \ );\n        priceList.put( \"DVD\", new Double(20.0) );\n    }\n\n    public\
    \ static double getPrice( String reference ) {\n        Double price = (Double)\
    \ priceList.get(reference);\n        return price.doubleValue();\n    }\n}\n```\n\
    \nThe `Catalog` class records the price of each item in the `priceList` hash map.\
    \ This table is indexed by the item references. The associated values are the\
    \ item prices. The static code block initializes the `priceList` map with two\
    \ items: a CD that costs US$15 and a DVD that costs US$20. The `getPrice` method\
    \ returns the price of the item that was given as a parameter.\n\n### Execution\n\
    \nThe order-management application has so far been written purely in Java. The\
    \ principle of AOP is to leave applications unpolluted by code that is not related\
    \ to the main functionality. As a result, AOP allows you to focus on the core\
    \ business, which in this case is the management of orders.\n\nThe nonfunctional\
    \ concerns, such as security, tracing, and the management of transactions, can\
    \ be independently added through aspects. The output of the order-management application\
    \ is shown in Listing 3-4.\n\n**Listing 3-4.** *The Output of the Order-Management\
    \ Application*\n\n```\n2 item(s) CD added to the order\n1 item(s) DVD added to\
    \ the order\nOrder amount: US$50.0\n```\n\n### A First Trace Aspect\n\nThe business\
    \ core of the application has now been developed. We will now proceed with the\
    \ development of a first aspect. This aspect, developed separately from the classes,\
    \ monitors each ordered item by displaying messages before and after the `addItem`\
    \ method, which is defined in the `Order` class.\n\nThe AspectJ code for this\
    \ aspect is shown in Listing 3-5.\n\n**Listing 3-5.** *A First Trace Aspect for\
    \ the Order-Management Application*\n\n```\n1 package aop.aspectj;\n2\n3 public\
    \ aspect TraceAspect {\n4\n5     pointcut toBeTraced():\n6         call( public\
    \ void Order.addItem(String,int) );\n7\n8     void around(): toBeTraced() {\n\
    9         System.out.println(\"-> Before calling addItem\");\n10         proceed();\n\
    11         System.out.println(\"<- After calling addItem\");\n12     }\n13 }\n\
    ```\n\nThe AspectJ language extends the Java syntax with new keywords. In Listing\
    \ 3-5, the first new keyword you encounter is `aspect`. Like a class, an aspect\
    \ is named (in this case, `TraceAspect`) and can be defined in a package (in this\
    \ case, `aop.aspectj`). An aspect can also be extended through inheritance, as\
    \ you will see in the \"Aspect Inheritance\" section later in this chapter.\n\n\
    In the philosophy held by the AspectJ creators, an aspect is a software entity\
    \ that is largely similar to a class—in that both define a piece of code that\
    \ abstracts and modularizes a concern. Although the concern is crosscutting in\
    \ the case of an aspect, classes and aspects belong to the same level and must\
    \ obey—as often as possible—the same rules.\n\nIn the examples that are distributed\
    \ with AspectJ, the similarities go so far that classes and aspects use the same\
    \ `.java` extension.\n\nAspects define pointcuts and advice code; the following\
    \ sections describe these elements.\n\n### A First Pointcut Descriptor\n\nIn an\
    \ aspect, the `pointcut` keyword is used to define a *pointcut descriptor*. Pointcut\
    \ descriptors can be named. In the example of the `TraceAspect` aspect, the pointcut\
    \ descriptor is named `toBeTraced`.\n\nEach pointcut descriptor is an expression\
    \ (see line 6 in Listing 3-5) that denotes the set of associated joinpoints. Several\
    \ different types of joinpoints can be used. However, this is not the case in\
    \ the example of the `toBeTraced` pointcut descriptor, in which `call` is the\
    \ only type of joinpoint.\n\nThe `call` joinpoint designates the points where\
    \ a method is called. The signature of the called method is given in parentheses.\
    \ The signature refers to the `addItem` method, which is defined in the `Order`\
    \ class, has two parameters of type `String` and `int`, returns `void`, and is\
    \ `public`. This signature is so precise that only one method fits this pointcut.\
    \ In the \"Wildcards\" section later in this chapter, you will see that wildcards\
    \ can be used to match several methods with the same pointcut descriptor.\n\n\
    The `toBeTraced` pointcut is associated with the `addItem` method; however, this\
    \ does not mean that only one joinpoint exists for this pointcut. In fact, all\
    \ the locations where the method is called match the pointcut. In the example\
    \ in Listing 3-1, when `addItem` is called two times in the `run` method of the\
    \ `Customer` class, both locations match the pointcut.\n\nIn general, the number\
    \ of joinpoints associated with a pointcut is not predetermined—the number varies\
    \ depending on the particular pointcut and its application. It is possible to\
    \ write a pointcut descriptor with no associated joinpoints and, in this case,\
    \ the aspect will not modify the application. Although this is possible, it is\
    \ highly unlikely that such a pointcut descriptor would be useful—most of the\
    \ time, this type of pointcut descriptor corresponds to an error.\n\nTools are\
    \ available to detect these types of cases and avoid them. For example, the AJDT\
    \ plug-in provides a view that gives the corresponding joinpoints of each defined\
    \ pointcut. Figure 3-1 gives an illustration of this view. As shown in the `advises`\
    \ node, the `toBeTraced` pointcut descriptor is associated with two joinpoints\
    \ for the `Customer` class. If there were no associated joinpoints, the correctness\
    \ of the pointcut would have been questioned.\n\n**Figure 3-1.** *The AJDT view\
    \ of joinpoints associated with a pointcut descriptor*\n\n### A First Piece of\
    \ Advice Code\n\nThe `TraceAspect` aspect defines only one piece of advice code.\
    \ (See line 8 in Listing 3-5). Three types of advice code exist: \"before,\" \"\
    after,\" and \"around.\" For the first type, the advice code is executed before\
    \ each joinpoint that is associated with the pointcut; for the second type, it\
    \ is executed after; for the third type, it is executed before and after.\n\n\
    For any type of advice code, the joinpoints are designated by a pointcut, and\
    \ each piece of advice code is associated with a pointcut. In the `TraceAspect`\
    \ aspect, the advice code is of the \"around\" variety, and the associated pointcut\
    \ is `toBeTraced`. The code is given between brackets. In this example, the \"\
    around\" advice code is executed before and after the calls to the `addItem` method.\n\
    \nIn the `TraceAspect` example, AspectJ expects the methods included in the pointcut\
    \ to define the return type as `void`. It follows that the `addItem` return type\
    \ is `void`.\n\nAdvice code is a regular block of code. Any existing Java instruction,\
    \ such as a method call, a variable assignment, a `for` statement, a `while` statement,\
    \ or an `if` statement, can be used. AspectJ adds the new keyword `proceed` to\
    \ this list. When reached, this keyword triggers the execution of the joinpoint.\
    \ The instructions prior to `proceed` are executed before the joinpoint, and those\
    \ following `proceed` are executed after. Hence, `proceed` delimits a \"before\"\
    \ part and an \"after\" part in the advice code.\n\nThe execution of a program\
    \ with \"around\" advice code is as follows:\n\n1. The program is started.\n2.\
    \ Just before a joinpoint, the \"before\" part is executed.\n3. The `proceed`\
    \ method is called.\n4. The corresponding joinpoint is executed.\n5. The \"after\"\
    \ part is executed.\n6. Program execution resuming, just after the joinpoint.\n\
    \nThe call to `proceed` is optional. Certainly, it is valid for \"around\" advice\
    \ code to not call `proceed`. In such a case, the code associated with the joinpoint\
    \ is not executed. After the execution of the advice code, the program execution\
    \ resumes directly after the joinpoint.\n\nAdvice code can call `proceed` in some\
    \ cases and not in others. This can be seen in the case of a security aspect that\
    \ controls access to a method. If the user is authenticated, the call is authorized\
    \ and the aspect calls `proceed`. If the user does not own sufficient rights,\
    \ the call is rejected and the security aspect does not call `proceed`. In such\
    \ a case, the joinpoint is not executed.\n\nThe \"before\" and \"after\" advice\
    \ code blocks do not need to call `proceed`. They are designed to be executed\
    \ before and after joinpoints. AspectJ raises an error if `proceed` appears in\
    \ the body of \"before\" or \"after\" advice code.\n\n### Compiling\n\nAspectJ\
    \ is a compile-time weaver (since version 1.2, AspectJ can also weave aspect at\
    \ load-time). The aspect and class input files are woven together by AspectJ to\
    \ produce a final application. This application can then be executed as a regular\
    \ Java application.\n\nTo compile the aspect with the three classes of the order-management\
    \ application, call the `ajc` compiler from the operating-system command shell\
    \ with the following command:\n\n```\najc TraceAspect.aj *.java\n```\n\nThis command\
    \ produces a set of `.class` files that contain the bytecode of the aspectized\
    \ application.\n\nThe first versions of AspectJ produced Java code. The output\
    \ of the `ajc` compiler was a Java program in which instructions from aspects\
    \ and classes were merged. This Java code could then be compiled by the regular\
    \ `javac` Java compiler. The advantage of this approach was that the produced\
    \ code could easily be read by developers, who could then study the way that the\
    \ pointcuts and advice code blocks were implemented.\n\nDespite these benefits,\
    \ this approach had several drawbacks. The first had to do with performance. The\
    \ initial translation from Java to Java was costly. In addition, a syntax analysis\
    \ of the Java code was needed before the result of the weaving could be generated—and\
    \ writing a Java syntax analyzer that is fast enough to manage huge amounts of\
    \ code is a difficult task. Even more, this task is redundant with the one performed\
    \ when the produced code is compiled. The second disadvantage had to do with the\
    \ source code needed to perform the weaving. In some cases, the application was\
    \ commercial or came from a developer who did not release the source code. As\
    \ a result, the Java-to-Java compilation could not be applied.\n\nTo avoid these\
    \ difficulties, the new versions of AspectJ can weave bytecode in `.class` or\
    \ `.jar` files and do not require source code. The `ajc` compiler provides the\
    \ option `-injar` to use this feature.\n\n### Running\n\nThe order-management\
    \ application, which is woven with the `TraceAspect` aspect, can be run by calling\
    \ the Java virtual machine with the `Customer` class.\n\nTo be run in a UNIX or\
    \ Windows shell, the command is as follows:\n\n```\njava aop.aspectj.Customer\n\
    ```\n\nThe output of this command is shown in Listing 3-6.\n\n**Listing 3-6.**\
    \ *The Output of the Order-Management Application with the Trace Aspect*\n\n```\n\
    -> Before calling addItem\n2 item(s) CD added to the order\n-> After calling addItem\n\
    -> Before calling addItem\n1 item(s) DVD added to the order\n-> After calling\
    \ addItem\nOrder amount: US$50.0\n```\n\nIn this run, each call to the `addItem`\
    \ method corresponds to a joinpoint. The execution is trapped, and the advice\
    \ code defined in the `TraceAspect` aspect applies. This is \"around\" advice\
    \ code. The message *-> Before calling addItem* is displayed, the `proceed` instruction\
    \ is called, the \"after\" part is executed, and the message *-> After calling\
    \ addItem* is displayed. Note that the call to `proceed` executes the `addItem`\
    \ method.\n\n## Pointcut Descriptors\n\nIn the previous section, we introduced\
    \ the basic elements of the AspectJ syntax. We showed how to write, compile, and\
    \ run a first aspect-oriented application.\n\nAlthough it is simplistic, the order-management\
    \ application illustrates a major AOP characteristic: the separation of business\
    \ from technical code. The `Customer`, `Order`, and `Catalog` classes play the\
    \ role of the business code, whereas the `TraceAspect` aspect implements the technical\
    \ part of the application. This separation is made possible by the use of pointcuts.\n\
    \nPointcuts allow you to describe where the aspects must be applied in the code.\
    \ Therefore, pointcuts give you a way of \"talking about\" the application by\
    \ designating some of the strategic locations of that application.\n\nIn the following\
    \ sections, we present the syntax of the AspectJ language. We begin with the syntax\
    \ of pointcuts and follow with the syntax of advice code. You will see how more-generic\
    \ aspects can be written, how different types of joinpoints can be included, and\
    \ how more-complex pointcuts can be defined.\n\n### Wildcards\n\nThe `toBeTraced`\
    \ pointcut, which was defined in the `TraceAspect` aspect in Listing 3-5, is not\
    \ generic. It captures calls exclusively to the `addItem` method. In more complex\
    \ cases, it is important for you to accurately define pointcuts that contain calls\
    \ to several methods.\n\nAspectJ provides a pattern language, which allows the\
    \ definition of expressions that implicitly denote several methods or classes.\
    \ These symbols (`*`, `..`, and `+`) are called wildcards.\n\nIn the following\
    \ sections, we explain the principle and definition of these wildcards and give\
    \ usage examples of them.\n\n#### Principle\n\nWhen wildcards are used jointly\
    \ with the different types of joinpoints that we describe later in this chapter\
    \ (in the \"Joinpoint Types\" section), the wildcards act as a powerful syntax\
    \ capable of describing many pointcuts. In return, this flexibility can lead to\
    \ pointcut descriptors that are complex and subtle.\n\nOther AOP environments,\
    \ such as JAC and JBoss AOP (see Chapters 4 and 5), have made different choices.\
    \ Their pointcut languages define fewer operators and, as a consequence, their\
    \ expression powers are not as flexible as that of AspectJ. On the other hand,\
    \ their pointcut descriptors are simpler to write, understand, and debug.\n\n\
    The discussion about the trade-offs between power and simplicity remains open.\
    \ Yet, in computer science and other domains, the simple solutions are often the\
    \ most widely used. Similarly, the simplest pointcuts are the ones more frequently\
    \ reused. Therefore, we use the simple pointcuts to illustrate and promote AOP.\n\
    \nThe following sections define the `*`, `..`, and `+` wildcards. They are presented\
    \ according to the element types (method, class, signature, package, and subtype)\
    \ that they denote.\n\n#### Method and Class Names\n\nThe asterisk (`*`) can be\
    \ used to denote method and class names. You will see in the \"Method Signatures\"\
    \ and \"Package Names\" sections, later in this chapter, that the asterisk can\
    \ also be used for signatures and package names.\n\nFor methods, the asterisk\
    \ designates \"some or all of the methods defined in a class.\" The following\
    \ expression designates all the public methods in the `Order` class that have\
    \ two parameters of type `String` and `int` and that return `void`:\n\n```\npublic\
    \ void aop.aspectj.Order.*(String,int)\n```\n\nThe asterisk can be used in combination\
    \ with letters to designate all the method names that contain the substring \"\
    Item\", for instance. In such a case, the expression is `*Item*`.\n\nAs stated,\
    \ the asterisk can also be used for class names. The following expression designates\
    \ all the public methods of all the classes in the `aop.aspectj` package that\
    \ have two parameters of type `String` and `int` and that return `void`:\n\n```\n\
    public void aop.aspectj.*.*(String,int)\n```\n\n#### Method Signatures\n\nNames,\
    \ parameters, return types, and access modifiers (`public`, `protected`, and `private`),\
    \ can be used in AspectJ pointcut descriptors.\n\nMethod parameters can be omitted\
    \ and replaced by two dots (`..`) to indicate \"any parameter.\" The following\
    \ expression illustrates the public methods in the `Order` class that have any\
    \ parameters and that return `void`:\n\n```\npublic void aop.aspectj.Order.*(..)\n\
    ```\n\nHence, the symbol of two dots handles the polymorphism of Java methods.\n\
    \nThe return type and the access modifier can be omitted and replaced by the asterisk\
    \ (`*`). The following expression denotes all the methods defined in the `Order`\
    \ class, regardless of their parameters, return types, and access modifiers:\n\
    \n```\n* * aop.aspectj.Order.*(..)\n```\n\nIn addition, the asterisk that is used\
    \ to replace the access modifier can be omitted without changing the meaning of\
    \ the pointcut. Therefore, the following expression is equivalent to the one just\
    \ presented:\n\n```\n* aop.aspectj.Order.*(..)\n```\n\n#### Package Names\n\n\
    The two-dots symbol can also be used with package names. For example, the following\
    \ expression designates all the methods of any class named `Order` that is in\
    \ any package of the `aop` hierarchy, regardless of the subpackage level:\n\n\
    ```\n* aop..Order.*(..)\n```\n\nThe use of the two-dots symbol between `aop` and\
    \ `Order` is of great importance. Expressions such as `aop.Order.*(..)` and `aop.*.Order.*(..)`\
    \ look similar but lead to completely different results. Although both expressions\
    \ involve the methods defined in an `Order` class, they differ in the following\
    \ ways:\n\n- The `aop..Order.*(..)` expression denotes the entire hierarchy that\
    \ starts with the `aop` package.\n- The `aop.Order.*(..)` expression denotes only\
    \ the class that is defined in the `aop` package.\n- The `aop.*.Order.*(..)` expression\
    \ denotes only the classes that are defined in the direct subpackages of the `aop`\
    \ package.\n\n#### Subtypes\n\nThe last wildcard, the plus sign (`+`), deals with\
    \ type hierarchies and designates all the subclasses of a given class. The following\
    \ expression denotes all the methods of the `Order` class and its subclasses:\n\
    \n```\n* aop.Order+.*(..)\n```\n\nThe plus sign can also be used after an interface\
    \ name. In such a case, the pointcut designates all the methods of all the classes\
    \ that implement the interface.\n\nBecause the plus sign can be used with either\
    \ a class or an interface, it is referred to as a *subtyping operator*.\n\n####\
    \ Wildcard-Usage Example\n\nWe will illustrate the usage of wildcards by showing\
    \ a second version of the trace aspect, which is named `TraceAspect2`. The previous\
    \ version, `TraceAspect`, intercepted only the calls to the `addItem` method.\
    \ The new version is more generic and intercepts the calls to all the methods\
    \ defined in the `Order` class.\n\nThe code of the `TraceAspect2` aspect is shown\
    \ in Listing 3-7.\n\n**Listing 3-7.** *Using Wildcards in Pointcut Descriptors*\n\
    \n```\n1 package aop.aspectj;\n2\n3 public aspect TraceAspect2 {\n4\n5     pointcut\
    \ toBeTraced(): call(* aop.aspectj.Order.*(..));\n6\n7     Object around(): toBeTraced()\
    \ {\n8         System.out.println(\"-> Before the call\");\n9         Object ret\
    \ = proceed();\n10         System.out.println(\"<- After the call\");\n11    \
    \     return ret;\n12     }\n13 }\n```\n\nThe first difference between the `TraceAspect`\
    \ and `TraceAspect2` aspects is in the definition of the pointcut. (See line 5\
    \ in Listing 3-7). The pointcut descriptor is now `call(* aop.aspectj.Order.*(..))`.\
    \ All the calls to the methods defined in the `Order` class are intercepted by\
    \ the pointcut—whatever the methods' parameters and return types are.\n\nA second\
    \ difference can be found in the return type of the advice code block. Previously,\
    \ the type was `void`. Now, the pointcut intercepts either a method that returns\
    \ `void` (for example, `addItem`) or a method that returns `double` (for example,\
    \ `computeAmount`). Strictly speaking, no common supertype exists for both `void`\
    \ and `double`. As a convention, AspectJ considers that `Object` (see line 7 in\
    \ Listing 3-7) is the common supertype for all Java primitive and object types.\
    \ The result of `proceed` is stored in the `ret` variable (see line 9), which\
    \ is returned at the end of the advice code block (see line 11).\n\n### Joinpoint\
    \ Introspection\n\nIn the previous section, you learned that wildcards can be\
    \ used to write generic pointcut descriptors. With wildcards, a pointcut can be\
    \ associated with several methods. You will see in this section how to obtain\
    \ some information about a joinpoint at run time. This is known as the *joinpoint-introspection\
    \ mechanism*.\n\nThe term *introspection* refers to examining the inner cause\
    \ of a given phenomenon and gaining information about it. In the context of AOP,\
    \ the phenomenon is the joinpoint, and you want to retrieve information about\
    \ the part of the actual program that allows the joinpoint to occur. A comparison\
    \ can be made with the Java `java.lang.reflect` API that provides, for any given\
    \ Java program, a description of the program's classes, fields, and methods. The\
    \ program is then said to have *introspected* to obtain information about itself.\n\
    \nIn the context of AOP, the same principle applies. The joinpoint examines itself\
    \ to gain information about itself. This mechanism is useful for determining,\
    \ for instance, the method call that caused the joinpoint to occur.\n\n#### Introspection\
    \ Syntax\n\nThe `thisJoinPoint` keyword implements the introspection mechanism\
    \ in AspectJ. In regular Java, `this` is the reference to the current object.\
    \ Similarly, in AspectJ, `thisJoinPoint` is a reference to an object describing\
    \ the current joinpoint, which implements the predefined `org.aspectj.lang.JoinPoint`\
    \ interface. Table 3-1 sums up the main methods defined in this interface. Two\
    \ of them, `getSignature` and `getSourceLocation`, use predefined interfaces,\
    \ which are `Signature` and `SourceLocation`, respectively. The AspectJ Javadoc\
    \ documentation gives more details on the methods provided by these interfaces.\n\
    \n**Table 3-1.** *Main Methods Defined in `org.aspectj.lang.JoinPoint`*\n\n| Method\
    \ Signature | Definition | Comment |\n|---|---|---|\n| `Object[] getArgs()` |\
    \ Returns the joinpoint arguments | When the joinpoint deals with a method, `getArgs`\
    \ returns the arguments of the call. |\n| `Signature getSignature()` | Returns\
    \ the joinpoint signature | The `Signature` interface gives a representation of\
    \ the signature of the joinpoint. When the joinpoint deals with a method, `Signature`\
    \ provides methods for retrieving the joinpoint method's name, access modifiers\
    \ (`public`, `private`, and so on), class, and return type. |\n| `String getKind()`\
    \ | Returns the joinpoint type | |\n| `SourceLocation getSourceLocation()` | Returns\
    \ the localization of the joinpoint in the source code | `SourceLocation` is a\
    \ predefined interface that provides access to the file name, line number, and\
    \ class where the joinpoint is defined. |\n| `Object getTarget()` | Returns the\
    \ target object of the joinpoint | When the joinpoint deals with a method, `getTarget`\
    \ returns the called object. |\n| `Object getThis()` | Returns the source object\
    \ of the joinpoint | When the joinpoint deals with a method call, `getThis` returns\
    \ the calling object. |\n\n#### Usage Example\n\nWe now illustrate the joinpoint-introspection\
    \ mechanism with a third version of the trace aspect, which is named `TraceAspect3`.\
    \ In comparison to `TraceAspect2`, `TraceAspect3` now displays the following for\
    \ each joinpoint:\n\n- The name of the intercepted method call\n- The parameters\
    \ of the call\n- The current object—in other words, the calling object\n- The\
    \ target object—in other words, the called object\n\nThe code of the `TraceAspect3`\
    \ aspect that performs this introspection and displays these four pieces of information\
    \ is shown in Listing 3-8.\n\n**Listing 3-8.** *An AspectJ Program for Joinpoint\
    \ Introspection*\n\n```\npackage aop.aspectj;\n\npublic aspect TraceAspect3 {\n\
    \n    pointcut toBeTraced(): call(* aop.aspectj.Order.*(..));\n\n    Object around():\
    \ toBeTraced() {\n        String methodName = thisJoinPoint.getSignature().getName();\n\
    \        Object[] args = thisJoinPoint.getArgs();\n        Object caller = thisJoinPoint.getThis();\n\
    \        Object callee = thisJoinPoint.getTarget();\n\n        System.out.println(\"\
    -> Method \"+methodName+\" begins\");\n        System.out.print(\"-> \"+args.length+\"\
    \ parameter(s) \");\n        for (int i = 0; i < args.length; i++)\n         \
    \   System.out.print( args[i]+\" \" );\n        System.out.println();\n      \
    \  System.out.println(\"-> \"+caller+\" to \"+callee);\n        Object ret = proceed();\n\
    \        System.out.println(\"<- Method \"+methodName+\"ends\");\n        return\
    \ ret;\n    }\n}\n```\n\nThe output of the order-management application with the\
    \ `TraceAspect3` aspect is shown in Listing 3-9. Before each call to a method\
    \ from class `Order`, three lines display respectively: the name of the called\
    \ method, the parameters of the call, and the caller and the called object.\n\n\
    **Listing 3-9.** *The Output of the AspectJ Program for Joinpoint Introspection*\n\
    \n```\n-> Method addItem begins\n-> 2 parameter(s) CD 2\n-> aop.aspectj.Customer@1cd2e5f\
    \ to aop.aspectj.Order@19f953d\n2 item(s) CD added to the order\n-> Method addItem\
    \ ends\n-> Method addItem begins\n-> 2 parameter(s) DVD 1\n-> aop.aspectj.Customer@1cd2e5f\
    \ to aop.aspectj.Order@19f953d\n1 item(s) DVD added to the order\n-> Method addItem\
    \ ends\n-> Method computeAmount begins\n-> 0 parameter(s)\n-> aop.aspectj.Customer@1cd2e5f\
    \ to aop.aspectj.Order@19f953d\n-> Method computeAmount ends\nOrder amount: US$50.0\n\
    ```\n\n### Defining Joinpoints\n\nIn the previous sections, you learned that wildcards\
    \ and introspection can be used to write generic pointcuts. Up until this point,\
    \ we have shown joinpoints that deal only with method calls. In this section,\
    \ we will present other types of joinpoints.\n\n#### Joinpoint Types\n\nThe joinpoint\
    \ types provided by AspectJ can deal with methods, fields, exceptions, constructors,\
    \ static blocks and, finally, advice-code executions.\n\n**Methods**\n\nFor methods,\
    \ AspectJ defines two types of joinpoints: method calls (defined by the `call`\
    \ keyword) and method executions (defined by the `execution` keyword). In both\
    \ cases, an expression must be provided to designate the methods to be called\
    \ or executed.\n\nThe first difference between the `call` and `execution` types\
    \ concerns the context that the joinpoint occurs in. In the former case, the joinpoint\
    \ occurs in the context of the calling code, whereas in the latter case, the joinpoint\
    \ occurs in the context of the called code.\n\nA second difference, which is a\
    \ direct consequence of the first, is that the values returned by the `getThis`\
    \ and `getTarget` introspection methods differ. For the `call` type, `getThis`\
    \ returns a reference to the caller, and `getTarget` returns a reference to the\
    \ callee. For `execution`, both `getThis` and `getTarget` return a reference to\
    \ the callee. The `call` type can thus be seen as more general because both the\
    \ caller and the callee are available.\n\nA method can be associated with a `call`\
    \ joinpoint and an `execution` joinpoint at the same time. In such a case, the\
    \ code is executed in the following order:\n\n1. The \"before\" part of the advice\
    \ code that is associated with the `call` joinpoint\n2. The \"before\" part of\
    \ the advice code that is associated with the `execution` joinpoint\n3. The method\n\
    4. The \"after\" part of the advice code that is associated with the `execution`\
    \ joinpoint\n5. The \"after\" part of the advice code that is associated with\
    \ the `call` joinpoint\n\n**Fields**\n\nThe `get` and `set` joinpoint types intercept\
    \ the instructions that read and write a field, respectively. These types are\
    \ useful when you want to implement aspects that manipulate the state of an object.\
    \ For instance, in the case of a persistence aspect, the state of an object needs\
    \ to be stored in a file or a database. When intercepted, the read and write operations\
    \ can be easily redirected to the file or the database.\n\nThe `get` and `set`\
    \ types take an expression as a parameter that denotes the set of fields included\
    \ in the pointcut. The definition of this expression contains three parts for\
    \ each field: its type, the class that defines it, and its name. All of these\
    \ parts can contain wildcards.\n\nThe following expression intercepts all the\
    \ read operations on the `items` field of type `Map` that is defined in the `Order`\
    \ class:\n\n```\nget( Map Order.items )\n```\n\nAs for method calls and executions,\
    \ the full class names (in other words, those including package names) as well\
    \ as the wildcards (`*`, `..`, and `+`) can be used when writing the expressions\
    \ for `get` and `set`.\n\n**Exceptions**\n\nThe `handler` type corresponds to\
    \ a joinpoint that occurs when a `catch` block of instructions begins. This type\
    \ allows you to define aspects that perform compensation treatments when exceptions\
    \ are thrown.\n\nFor example, this type of joinpoint can be used to log the messages\
    \ that are generated by the thrown exceptions in a running application. Another\
    \ usage example is defining a common treatment for all the exceptions of a given\
    \ type. However implemented, the handling of exceptions with an aspect usually\
    \ lightens the application—making it far more readable and maintainable.\n\nThe\
    \ `handler` type is associated with an exception name. A name can contain the\
    \ wildcards (`*`, `..`, and `+`). For example, the following expression intercepts\
    \ the executions of the blocks that catch the `java.io.IOException` exception\
    \ or one of its subtypes:\n\n```\nhandler( java.io.Exception+ )\n```\n\nWith the\
    \ current version of AspectJ, only \"before\" advice code can be defined for pointcuts\
    \ that use the `handler` type. Hence, some code can be executed at the beginning\
    \ of a `catch` block but not at the end.\n\n**Constructors**\n\nAspectJ can define\
    \ pointcuts that include class constructors. To achieve this, two joinpoint types\
    \ are available: `initialization` and `preinitialization`. The `initialization`\
    \ joinpoint corresponds to the actual execution of the declared constructor, excluding\
    \ a possible call to an inherited constructor. The `preinitialization` joinpoint\
    \ corresponds to the initialization code that is executed before the execution\
    \ of the constructor, including any default field initializations and any field\
    \ initializations that have been declared within the class body.\n\nAs for the\
    \ `call` and `execution` types, the `initialization` type takes an expression\
    \ as a parameter that denotes the constructor or the set of constructors to be\
    \ intercepted. This expression contains a class name, the `new` keyword, and a\
    \ signature, and it can contain the usual wildcards (`*`, `..`, and `+`).\n\n\
    For example, the following expression intercepts the executions of all the constructors,\
    \ regardless of their signatures, that are defined in the `Customer` class:\n\n\
    ```\ninitialization( Customer.new(..) )\n```\n\nWith AspectJ, \"before\" and \"\
    after\" advice code is valid with `initialization` pointcuts, but \"around\" advice\
    \ code is not.\n\n**Static Code Blocks**\n\nIn Java, static code blocks define\
    \ the instructions that are executed while a class is being initialized—in other\
    \ words, when the class is loaded in the virtual machine. These blocks are often\
    \ used to initialize static fields.\n\nSeveral static code blocks can be associated\
    \ with a single class. In such a case, the order they are executed in corresponds\
    \ to the order of their definition. The `staticinitialization` joinpoints correspond\
    \ to the executions of these static blocks.\n\nWith `staticinitialization`, advice\
    \ code can be executed before and after a static block. For instance, the following\
    \ expression intercepts the execution of all static blocks that are defined in\
    \ the `Catalog` class:\n\n```\nstaticinitialization( Catalog )\n```\n\nAs for\
    \ other pointcut descriptors, class names can be associated with package names\
    \ and wildcards.\n\n**Advice-Code Execution**\n\nThe last existing variety of\
    \ AspectJ joinpoint, `adviceexecution`, corresponds, as its name suggests, to\
    \ the execution of advice code. Therefore, you can define an aspect that modifies\
    \ the execution of another aspect. However, the `adviceexecution` type should\
    \ be used with caution. If it is used carelessly, there is a high risk of obtaining\
    \ endless loops during the execution of the application.\n\nAll the joinpoint\
    \ types we have previously presented accept an expression as a parameter; this\
    \ is not the case for `adviceexecution`. This joinpoint occurs when advice code,\
    \ including advice code that will be associated with the joinpoint itself, is\
    \ executed.\n\nConsider the following pointcut descriptor and advice code:\n\n\
    ```\npointcut aa(): adviceexecution();\nObject before(): aa() { ... }\n```\n\n\
    Before each execution of an advice code block, the `aa` pointcut launches the\
    \ advice code that is given in the example. However, this advice code does not\
    \ differ from any others—its execution triggers the occurrence of the pointcut,\
    \ then the execution of the advice code, and so on. To avoid this endless loop,\
    \ the `adviceexecution` type must be used with the filtering operators that the\
    \ next section presents.\n\n#### Filtering Operators\n\nThe joinpoints presented\
    \ previously offer a rich syntax and can be used to define many different pointcut\
    \ descriptors. You will learn in this section that they can also be combined with\
    \ logical operators and that filtering operators allow you to restrict the set\
    \ of caught joinpoints.\n\n**Logical Operations**\n\nEach defined pointcut descriptor\
    \ can be compared to a Boolean function. For a given joinpoint, if the pointcut\
    \ applies, the function returns `true`; if it does not apply, the function returns\
    \ `false`.\n\nWith this logical reasoning in mind, the use of the Boolean operations\
    \ AND, OR, and NOT is intuitive. They correspond to the conjunction, disjunction,\
    \ and negation of the occurrence of a joinpoint, respectively. AspectJ supports\
    \ these three operations with their Java syntax: `&&` for AND, `||` for OR, and\
    \ `!` for NOT.\n\nThe following expression encompasses the executions of the `computeAmount`\
    \ method and of the `getPrice` method:\n\n```\nexecution( * Order.computeAmount(..)\
    \ ) || execution( * Catalog.getPrice(..) )\n```\n\nThe evaluation of a pointcut\
    \ descriptor is computed for every existing joinpoint. A given joinpoint can be\
    \ either the execution of `computeAmount` or the execution of `getPrice` but never\
    \ both at the same time. Consequently, the use of `&&` instead of `||` in the\
    \ previous pointcut descriptor will not intercept any joinpoint.\n\nThe use of\
    \ `&&` instead of `||` in a pointcut descriptor is a frequent mistake. However,\
    \ since the syntax of the expression is correct, the AspectJ compiler does not\
    \ report an error. Only by using a tool such as the AJDT Eclipse plug-in for AspectJ\
    \ (see Figure 3-1), which allows you to check the joinpoints that are associated\
    \ with the pointcut, can you detect that no such points exist and that the pointcut\
    \ descriptors are erroneous.\n\nIn general, combining different joinpoint types\
    \ in a pointcut descriptor must be done with the `||` operator.\n\nPointcut descriptors\
    \ can include tests. An expression containing `if` is followed by a Boolean expression\
    \ and can be combined with any other pointcut expression.\n\nFor instance, the\
    \ expression\n\n```\nif( thisJoinPoint.getArgs().length() == 1 )\n```\n\nreturns\
    \ `true` when the current joinpoint defines only one parameter, and it returns\
    \ `false` in the other cases.\n\n**Filtering**\n\nA pointcut descriptor such as\
    \ `get( * aop..*.items )` intercepts all the read operations on the `items` field.\
    \ For the order-management application, two such joinpoints are included:\n\n\
    - The joinpoint in the `addItem` method where `items` is read in order to call\
    \ the `put` method.\n- The joinpoint in the `computeAmount` method where `items`\
    \ is read in order to call `get`.\n\nIn certain situations, it can be useful to\
    \ restrict this set to contain only one joinpoint. The `withincode` keyword, associated\
    \ with a method name, can be used for this purpose. The method name can contain\
    \ wildcards (`*`, `..`, and `+`).\n\nThe expression `withincode(expr)` will return\
    \ `true` if the name of the method containing the joinpoint matches `expr`.\n\n\
    The expression\n\n```\nget( * aop..*.items ) && !withincode( * aop..*.computeAmount(..)\
    \ )\n```\n\ndesignates all the read operations for the `items` field that are\
    \ not defined in the `computeAmount` method.\n\nThe use of `||` instead of `&&`\
    \ in the previous expression does not lead to the expected result. Indeed, `!withincode(*\
    \ aop..*.computeAmount(..))` is `true` for any joinpoint that is not in the `computeAmount`\
    \ method. The evaluation of the expression with the logical OR operator is thus\
    \ `true` for these joinpoints, and the pointcut intercepts more joinpoints than\
    \ expected. In sum, no truly useful situation requires the joint usage of `||`\
    \ and `withincode`.\n\nThe second keyword, `within`, exists for filtering joinpoints.\
    \ This keyword is associated with a class or interface name and can contain wildcards.\
    \ The `within` keyword allows you to retain joinpoints that are defined in a given\
    \ class or set of classes.\n\nTwo keywords, `this` and `target`, allow you to\
    \ perform filtering depending on object references. You previously learned that\
    \ `getThis` and `getTarget` return the current object and the target object of\
    \ a call or execution joinpoint, respectively. For instance, for the `call` type,\
    \ `getThis` returns the reference to the caller, and `getTarget` returns the reference\
    \ to the called object. The `this` and `target` keywords play the same role for\
    \ pointcut descriptors, and they apply filtering depending on the class of the\
    \ current object or target object. Each is associated with a class or interface\
    \ name and can contain wildcards.\n\nThe expression\n\n```\ncall( * aop..*.addItem(..)\
    \ ) && this(aop.aspectj.Order)\n```\n\nis `true` for all the calls made to the\
    \ `addItem` method by the `Order` class. This expression excludes any calls to\
    \ `addItem` made by other classes.\n\n**Control-Flow Filtering**\n\nThe filtering\
    \ operators presented previously are static. They do not depend on the dynamics\
    \ of the program or the way the program is run but only on its structure. Therefore,\
    \ all the previous joinpoints can be statically computed without the program needing\
    \ to be run.\n\nAspectJ defines two additional filtering operators, `cflow` and\
    \ `cflowbelow`. These are referred to as *control-flow operators*. Intuitively,\
    \ the control flow of a program encompasses all the methods that are visited during\
    \ the program's execution.\n\nTo illustrate the way that `cflow` and `cflowbelow`\
    \ work, take the example of a simple program that calls the `Foo.foo` and `Bar.bar`\
    \ methods from the `main` method. The `Foo.foo` method also calls `Bar.bar`. This\
    \ last method does not perform any calls.\n\nThe following pointcut descriptors\
    \ intercept the calls to the `bar` method only if `bar` is called from `foo`,\
    \ so calls to `bar` from `main` are ignored:\n\n```\npointcut foopcd(): call(\
    \ * Foo.foo(..) );\npointcut callToBarInFoo(): call( * Bar.bar(..) ) && cflow(\
    \ foopcd() );\n```\n\nThe `callToBarInFoo` pointcut descriptor specifies that\
    \ calls to `bar` only in the control flow of the `foopcd` pointcut descriptor\
    \ are considered. The `foopcd` pointcut descriptor designates all the calls to\
    \ the `foo` method.\n\nIntuitively, you can consider that the control flow of\
    \ the program enters the `foopcd` pointcut when `foo` is called and exits the\
    \ pointcut when the call returns. The expression `cflow(foopcd())` designates\
    \ all the joinpoints located between this entry point and exit point.\n\nMore\
    \ formally, the `cflow` operator is associated with a pointcut named `p`. All\
    \ the joinpoints that occur between the moment the program encounters one of the\
    \ joinpoints included in `p` and the moment the program exits this joinpoint are\
    \ denoted by `cflow(p())`.\n\nThe `cflowbelow` operator is similar to `cflow`\
    \ except that the joinpoints belonging to `p` are not returned by `cflowbelow`.\n\
    \n### Pointcut Parameterization\n\nIn the previous sections, you learned about\
    \ the keywords, operators, and symbols that can be used with AspectJ to define\
    \ pointcuts. You learned that each pointcut descriptor is named and defined in\
    \ an aspect, and that the advice code defines the treatment to be executed before\
    \ and after the joinpoints that are denoted by their associated pointcuts.\n\n\
    In OOP languages, the methods can be parameterized. In AOP, the parameterization\
    \ also applies to pointcut descriptors. The parameters contain the information\
    \ that is passed from the pointcut to the utilizing advice code.\n\nThe parameters\
    \ of a pointcut, like those of a method, are defined in parentheses after the\
    \ name of the pointcut. Each parameter has a name and a type.\n\nThe following\
    \ `toBeTraced` pointcut descriptor defines four parameters (`src`, `dst`, `ref`,\
    \ and `qty`):\n\n```\npointcut toBeTraced( Customer src, Order dst, String ref,\
    \ int qty )\n```\n\nPointcut parameters can pass three kinds of information: the\
    \ source of the joinpoints that are included in the pointcut, the target of those\
    \ joinpoints, and the parameters of those joinpoints. The goal is to expose the\
    \ information from the joinpoint so the advice code can access that information.\n\
    \nThe source and target of the joinpoints are accessed with a modified version\
    \ of the `this` and `target` operators, which we previously presented. Instead\
    \ of being associated with a class name, the operators here use an identifier.\
    \ The arguments of the joinpoints are accessed with the `args` operator followed\
    \ by a list of identifiers.\n\nAs an example, consider the following `toBeTraced2`\
    \ pointcut descriptor:\n\n```\npointcut toBeTraced2( Customer src, Order dst,\
    \ String ref, int qty ) :\n    call(* *.*(..)) && this(src) && target(dst) &&\
    \ args(ref,qty);\n```\n\nThis example denotes all the calls (by the `call(* *.*(..))`\
    \ subexpression, specifies that the source must be bound to the `src` parameter\
    \ (by the `this(src)` subexpression), that the target must be bound to `dst` (by\
    \ the `target(dst)` subexpression), and that the arguments must be bound to the\
    \ `ref` and `qty` variables (by the `args(ref,qty)` subexpression).\n\nThanks\
    \ to the type information that is given in the signature of the pointcut, you\
    \ can deduce that the pointcut deals with calls to methods that the `Order` class\
    \ defines, that take parameters of type `String` and `int`, and that are made\
    \ from the `Customer` class.\n\nYou previously saw that the source, target, and\
    \ arguments could be accessed through the joinpoint-introspection mechanism and\
    \ the `thisJoinPoint` keyword. As you have seen in this section, pointcut parameterization\
    \ is an alternative means to achieve this end—but in a typed way. Furthermore,\
    \ parameterizing a pointcut generally brings more-efficient run-time performances\
    \ than introspection. The only drawback of parameterization is that the types\
    \ need to be available at compile time, which is not always the case when programming\
    \ generic pointcuts.\n\n### Summary of Pointcut Descriptors\n\nThe AspectJ pointcut\
    \ language provides a rich syntax and many keywords. Compared to JAC, JBoss AOP,\
    \ and AspectWerkz, which are presented in the following chapters, AspectJ can\
    \ define pointcut descriptors that are more precise—although more complex to learn.\n\
    \nTo conclude the discussion of joinpoints, we present Table 3-2, which gives\
    \ a summary of all the existing types of joinpoints in AspectJ. We classify them\
    \ by their function into the following categories:\n\n- Methods (`call` and `execution`)\n\
    - Fields (`get` and `set`)\n- Exceptions (`handler`)\n- Constructors (`initialization`\
    \ and `preinitialization`)\n- Static code blocks (`staticinitialization`)\n- Advice\
    \ code (`adviceexecution`)\n\n**Table 3-2.** *AspectJ Joinpoint Types*\n\n| Type\
    \ | Definition |\n|---|---|\n| `call(methexpr)` | A call to a method that matches\
    \ `methexpr` |\n| `execution(methexpr)` | An execution of a method that matches\
    \ `methexpr` |\n| `get(fieldexpr)` | A read operation on a field that matches\
    \ `fieldexpr` |\n| `set(fieldexpr)` | A write operation on a field that matches\
    \ `fieldexpr` |\n| `handler(exceptexpr)` | An execution of a `catch` block for\
    \ an exception that matches `exceptexpr` |\n| `initialization(constexpr)` | An\
    \ execution of a constructor that matches `constexpr` |\n| `preinitialization(constexpr)`\
    \ | An execution of an inherited constructor that matches `constexpr` |\n| `staticinitialization(classexpr)`\
    \ | An execution of a static block in a class that matches `classexpr` |\n| `adviceexecution()`\
    \ | An execution of an advice code block |\n\nIn addition to these joinpoint types,\
    \ AspectJ pointcut descriptors can also include the operators that are illustrated\
    \ in Table 3-3. These operators can be grouped into the following categories:\n\
    \n- Logical (`&&`, `||`, `!`, `if`)\n- Joinpoint location in the code (`withincode`\
    \ and `within`)\n- Joinpoint source and target (`this` and `target`)\n- Control-flow\
    \ (`cflow` and `cflowbelow`)\n\n**Table 3-3.** *AspectJ Operators in Pointcut\
    \ Descriptors*\n\n| Keyword | Definition |\n|---|---|\n| `&&` | Logical AND |\n\
    | `||` | Logical OR |\n| `!` | Logical NOT |\n| `if(expr)` | Evaluation of the\
    \ Boolean expression `expr` |\n| `withincode(methexpr)` | `true` when the joinpoint\
    \ is defined in a method with a signature that matches `methexpr` |\n| `within(typeexpr)`\
    \ | `true` when the joinpoint is defined in a class with a name that matches `typeexpr`\
    \ |\n| `this(typeexpr)` | `true` when the source-object type for the joinpoint\
    \ matches `typeexpr` |\n| `target(typeexpr)` | `true` when the target-object type\
    \ for the joinpoint matches `typeexpr` |\n| `cflow(pcd)` | `true` for any joinpoint\
    \ located from the entry of the given pointcut descriptor (`pcd`) to the exit,\
    \ inclusive |\n| `cflowbelow(pcd)` | `true` for any joinpoint located from the\
    \ entry of the given pointcut descriptor (`pcd`) to the exit, exclusive |\n\n\
    ## Advice Code\n\nYou learned that pointcut descriptors define the areas where\
    \ the instructions from an aspect need to be inserted. These instructions are\
    \ defined in advice code blocks.\n\nIn object-oriented languages, the behavior\
    \ of a class is defined in its methods. In contrast, in AOP, this behavior is\
    \ defined in advice code. In an aspect, there may be several advice code blocks,\
    \ with each one containing a set of instructions. In addition, each advice code\
    \ block has a type and is associated with a pointcut descriptor.\n\n### The Code\
    \ of an Advice Code Block\n\nThe code of an advice code block can contain any\
    \ valid Java instruction, such as a method call, a variable assignment, an object\
    \ creation (using `new`), a loop (using `for`, `while`, or `do/while`), a test\
    \ (using `if`), and an exception-handling block (using `try/catch`).\n\nTwo additional\
    \ instructions, `proceed` and `thisJoinPoint`, are also valid in AspectJ. These\
    \ instructions are used exclusively for advice code; in any other context, they\
    \ generate compiler errors. The `proceed` keyword executes the joinpoint and can\
    \ be used only in \"around\" advice code. The `thisJoinPoint` keyword can be used\
    \ for any kind of advice code. As mentioned previously, `thisJoinPoint` is a reference\
    \ to an object that describes the current joinpoint.\n\n### The Different Types\
    \ of Advice Code\n\nAspectJ defines five types of advice code. Of these five,\
    \ \"before,\" \"after,\" and \"around\" are the more-commonly encountered ones.\
    \ The last two types, \"after returning\" and \"after throwing,\" can be seen\
    \ as refinements of the \"after\" type.\n\n#### The \"Before\" Type\n\n\"Before\"\
    \ advice code is executed before the joinpoints that are included in the pointcut\
    \ associated with the advice code.\n\nThe following example illustrates the usage\
    \ of \"before\" advice code:\n\n```\nbefore(): toBeTraced() {\n    System.out.println(\"\
    ... before the joinpoints included in toBeTraced ...\");\n}\n```\n\nThe syntax\
    \ for the definition of \"before\" advice code consists of the type of advice\
    \ code (here, `before`), the name of the pointcut descriptor that is associated\
    \ with the advice code (here, `toBeTraced`), and the code itself between curly\
    \ brackets.\n\nThe second part, the name of the pointcut descriptor, is not mandatory.\
    \ You can provide the code of the pointcut descriptor right after the type. In\
    \ this case, the pointcut is said to be *anonymous*. An example of anonymous pointcut\
    \ is the following:\n\n```\nbefore(): call( * Order.addItem(..) ) { ... }\n```\n\
    \nHowever, the use of a named pointcut descriptor is preferred because this produces\
    \ programs that are clearer and easier to maintain. Furthermore, when a pointcut\
    \ descriptor is reused in several advice code blocks, the use of a name avoids\
    \ useless, error-prone repetitions.\n\nIn the previous section, you learned that\
    \ pointcut descriptors can accept parameters. Hence, when used, the associated\
    \ advice code must also be parameterized.\n\nThe example in Listing 3-10 reuses\
    \ the `toBeTraced2` pointcut descriptor with four parameters and associates the\
    \ pointcut with \"before\" advice.\n\n**Listing 3-10.** *Defining Parameterized\
    \ Pointcuts*\n\n```\n1 pointcut\n2     toBeTraced2( Customer src, Order dst, String\
    \ ref, int qty ):\n3         call( * *.*(..) ) &&\n4         this(src) && target(dst)\
    \ && args(ref,qty);\n5 before( Customer src, Order dst, String ref, int qty ):\n\
    6     toBeTraced2(src,dst,ref,qty) {\n7     System.out.println(\n8         \"\
    ... before the joinpoints included in toBeTraced2 ...\");\n9     System.out.println(\
    \ src + \" \" + dst + \" \" + ref + \" \" + qty );\n10 }\n```\n\nThe four parameters\
    \ that are defined in the pointcut descriptor are also used for the definition\
    \ of the advice code. (See line 6 in Listing 3-10). These parameters are then\
    \ available for any instruction that is defined in the body of the advice code\
    \ block.\n\n#### The \"After\" Type\n\n\"After\" advice is executed after each\
    \ associated joinpoint. Its code uses the same syntax rules as \"before\" advice.\
    \ The previous examples of the `toBeTraced` and `toBeTraced2` pointcut descriptors\
    \ would be valid simply by replacing the `before` keyword with `after`.\n\nThe\
    \ last two types of advice code that are defined by AspectJ are \"after returning\"\
    \ and \"after throwing.\" These types ensue from the idea that the execution of\
    \ a joinpoint—for instance, a method-execution joinpoint—ends normally or with\
    \ the raising of an exception. The former case is handled by the \"after returning\"\
    \ type, whereas the latter case is handled by the \"after throwing\" type.\n\n\
    #### The \"After Returning\" Type\n\n\"After returning\" advice code is executed\
    \ after each normal execution of the joinpoints that are associated with the pointcut\
    \ descriptor.\n\nThe following code illustrates the usage of the \"after returning\"\
    \ type:\n\n```\nafter() returning (double d): ... {\n    System.out.println(\"\
    The returned value is: \"+d);\n}\n```\n\nThe value that is returned by the joinpoint\
    \ can be accessed with the variable found in parentheses after the `after returning`\
    \ keywords. The variable is either the exact type (here, `double`) of the value\
    \ returned by the joinpoint or a valid supertype (for example, `Object` for all\
    \ Java types, including primitive types).\n\n#### The \"After Throwing\" Type\n\
    \n\"After throwing\" advice code is executed when a given joinpoint that is associated\
    \ with a pointcut descriptor ends its execution by raising an exception.\n\nThe\
    \ following code illustrates the usage of the \"after throwing\" type:\n\n```\n\
    after() throwing (Exception e): ... {\n    System.out.println(\"The raised exception\
    \ is: \"+e);\n}\n```\n\nThe exception that is raised by the joinpoint can be accessed\
    \ with the variable defined in parentheses following the `after throwing` keywords.\
    \ In the previous example, the variable is `e`. This variable can be used anywhere\
    \ in the body of the advice code.\n\n#### The \"Around\" Type\n\n\"Around\" advice\
    \ code is executed before and after each associated joinpoint. The `proceed` keyword\
    \ executes the joinpoint, which is bound by the \"before\" and \"after\" parts\
    \ of the advice code. Specifically, this keyword executes the joinpoint in the\
    \ following way:\n\n1. The \"before\" part is executed.\n2. The joinpoint is executed\
    \ when the `proceed` keyword is used.\n3. The \"after\" part is executed.\n\n\
    In \"around\" advice code, the \"before\" or \"after\" part can be empty; then,\
    \ the \"around\" advice code is equivalent to \"before\" or \"after\" advice code.\
    \ The `proceed` keyword is optional in \"around\" advice code. If `proceed` is\
    \ not used, the joinpoint is not executed. This behavior could correspond to a\
    \ security aspect in which calls from unauthorized users are rejected, for instance.\
    \ The `proceed` keyword can be used several times in the same \"around\" advice\
    \ code block. However, this situation is infrequent and corresponds to cases in\
    \ which several attempts at executing the application are needed—for instance,\
    \ after an unexpected error.\n\nUnlike \"before\" and \"after\" advice code, the\
    \ return type of \"around\" advice code is associated with the return type of\
    \ the joinpoints. If the \"around\" advice code is not a supertype of the return\
    \ type that is defined for the joinpoints, the AspectJ compiler raises an error.\
    \ When other return types (including the `void` return type) appear for the joinpoints\
    \ in a given pointcut, the `Object` type must be used as the return type of the\
    \ advice code. (In Java, `Object` is considered the supertype of all types.)\n\
    \nListing 3-11 illustrates the use of \"around\" advice code.\n\n**Listing 3-11.**\
    \ *\"Around\" Advice-Code Example*\n\n```\nObject around(): ... {\n    System.out.println(\"\
    before\");\n    Object ret = proceed();\n    System.out.println(\"before\");\n\
    \    return ret;\n}\n```\n\nIn Listing 3-11, the call to `proceed` returns a value\
    \ that is stored in the `ret` variable. This is the value that is returned by\
    \ the joinpoint. This value and, in fact, all other values, must be returned by\
    \ the advice code (as is done here by the `return ret` instruction).\n\nWhen the\
    \ advice code is associated with a parameterized pointcut descriptor, all the\
    \ parameters must be passed when `proceed` is called. This is illustrated by Listing\
    \ 3-12.\n\n**Listing 3-12.** *\"Around\" Advice Code with Parameters*\n\n```\n\
    Object around( Customer src, Order dst, String ref, int qty ):\n    toBeTraced2(src,dst,ref,qty)\
    \ {\n    System.out.println(\"before\");\n    Object ret = proceed(src,dst,ref,qty);\n\
    \    System.out.println(\"after\");\n    return ret;\n}\n```\n\n### Advice Code\
    \ and Exceptions\n\nAdvice code has the ability to raise an exception when needed.\
    \ In such cases, the type of the exception must be specified in the signature\
    \ of the advice code. For methods, the `throws` keyword must be used to specify\
    \ the exception.\n\nThe following piece of code defines \"around\" advice code\
    \ that possibly throws an exception:\n\n```\nObject around() throws Exception:\
    \ ... {\n    /* ... */\n    if( /*condition*/ )\n        throw new Exception();\n\
    \    /* ... */\n}\n```\n\nWhen an exception is declared by advice code, the type\
    \ of the exception must also be specified in the signature of the joinpoint. For\
    \ instance, a method-execution joinpoint must list the exception in the `throws`\
    \ clause. This is a limitation that obliges the application code to be aware of\
    \ the exceptions thrown by the aspects. In practice, this limitation can be solved\
    \ by specifying that the advice code raises an exception of type `RuntimeException`.\
    \ In Java, run-time exceptions are unchecked; therefore, the signatures of the\
    \ program methods can be left unchanged.\n\n## The Introduction Mechanism\n\n\
    In the previous sections, you learned that pointcut descriptors and advice code\
    \ blocks allow an aspect to extend or modify the behavior of an application. Pointcut\
    \ descriptors designate joinpoints (method calls, method executions, read operations,\
    \ write operations, and so on) in the execution flow of a program, and advice\
    \ code blocks add instructions before or after these joinpoints. In all cases,\
    \ if no joinpoints are activated, the advice code will not be executed either.\n\
    \nThe introduction mechanism is used in AspectJ to extend the structure of an\
    \ application. The term *introduction* refers to the process of the aspect adding\
    \ code elements to the application. AspectJ can introduce, or add, six categories\
    \ of these elements: fields, methods, constructors, inherited classes, implemented\
    \ interfaces, and exceptions. The following sections will explain these categories\
    \ in detail.\n\nContrary to advice code, which extends the behavior of an application\
    \ only when the joinpoints are executed, the introduction mechanism is unconditional—the\
    \ extended code is always added.\n\nAspectJ uses the term *intertype declaration*\
    \ to refer to the introduction mechanism. The concept behind this is that an aspect,\
    \ which is considered a type, declares elements (for example, fields, methods,\
    \ inherited classes, and implemented interfaces) on behalf of other types—in other\
    \ words, on behalf of the classes of the application.\n\nNo special keyword is\
    \ defined in AspectJ for introduced elements, which are defined declaratively.\n\
    \n### Fields, Methods, and Constructors\n\nAn aspect that introduces fields, methods,\
    \ or constructors in a class performs a declaration on behalf of this class. This\
    \ declaration follows the same rules as a regular Java declaration. The name of\
    \ the field or method is preceded by the name of the class that the introduction\
    \ is to be performed in. Constructors are designated with the `new` keyword.\n\
    \nThe aspect in Listing 3-13 introduces the `date` field, two methods named `getDate`\
    \ and `setDate`, and a constructor in the `Order` class.\n\n**Listing 3-13.**\
    \ *Intertype Declaration*\n\n```\nimport java.util.Date;\n\npublic aspect AddDate\
    \ {\n\n    private Date Order.date;\n\n    public Date Order.getDate() { return\
    \ date; }\n    public void Order.setDate(Date date) { this.date=date; }\n\n  \
    \  public Order.new(Date date) { this.date=date; }\n\n    after(): initialization(Order.new(..))\
    \ {\n        Order myOrder = (Order) thisJoinPoint.getTarget();\n        myOrder.date\
    \ = new Date();\n    }\n}\n```\n\nIn the `AddDate` aspect in Listing 3-13, \"\
    after\" advice code is defined after the instantiations of the `Order` class.\
    \ This advice code collects the references of the instantiated orders and sets\
    \ the current date to the introduced `date` field.\n\nAlthough these introductions\
    \ are simplistic, they should be dealt with cautiously. Accordingly, the elements\
    \ defined in the application must not conflict with the elements introduced by\
    \ the aspect. For instance, if a `date` field already exists in the `Order` class,\
    \ a compiler error occurs.\n\nAspectJ does not provide an option to check whether\
    \ a field or method name already exists before it performs the introduction. The\
    \ existence of conflicting elements is revealed only during compile time when\
    \ the error occurs. Therefore, it is up to you to manually correct the program\
    \ or the aspect when this occurs.\n\n### Inherited Classes and Implemented Interfaces\n\
    \nIn addition to fields and methods, the introduction mechanism provided by AspectJ\
    \ allows you to modify the inheritance and implementation hierarchies defined\
    \ in an application. The `declare parents` keyword combination permits this.\n\
    \nThe following aspect adds the `AddDateItf` interface to the `Order` class and\
    \ creates an inheritance link between `AddDateImpl` and `Order`:\n\n```\npublic\
    \ aspect AddDate2 {\n    declare parents: Order implements AddDateItf;\n    declare\
    \ parents: Order extends AddDateImpl;\n}\n```\n\nThe addition of a new interface\
    \ is always possible since there are no constraints in Java on the number of interfaces\
    \ implemented by a class. This is not the case for inheritance because only a\
    \ single inheritance is supported in Java.\n\nIn the previous example, if the\
    \ `Order` class was already a subclass of the `Document` class, the modification\
    \ of the inheritance link by the `AddDate2` aspect would have produced a compiler\
    \ error.\n\nThe names of the classes to be modified can contain wildcards. Logical\
    \ expressions created with the Boolean OR operator (`||`) can be written to modify\
    \ several classes with a single declaration.\n\n### Exceptions\n\nThe last element\
    \ that can be introduced performs the function of catching the exceptions that\
    \ are raised by an application.\n\nThe exceptions raised by the application are\
    \ wrapped in a special exception called `org.aspectj.lang.SoftException`.\n\n\
    The `declare soft` keyword combination is provided to implement this introduction\
    \ mechanism. A type and a pointcut descriptor must be provided. The type designates\
    \ the type of exceptions to be caught, and the pointcut descriptor designates\
    \ the joinpoints where the exceptions are to be caught.\n\nFor instance, the following\
    \ line of code\n\n```\ndeclare soft: IOException+: call( * InputStream.*(..) )\n\
    ```\n\ndeclares that the subclasses of a certain exception—the `IOException` exception\
    \ that is thrown when a method defined in the `InputStream` class is called—must\
    \ be wrapped in the `org.aspectj.lang.SoftException` exception.\n\n## Advanced\
    \ Features\n\nThe previous sections introduced the many features offered by AspectJ\
    \ for programming aspects. As with other languages, advanced functionalities—apart\
    \ from the mainstream features—that complement the language exist. In AspectJ,\
    \ these are the concepts of the abstract aspect, aspect inheritance, aspect instantiation,\
    \ aspect ordering, and the privileged aspect.\n\n### The Abstract Aspect\n\nThe\
    \ aim of the *abstract aspect* in AspectJ is to define an aspect that has some\
    \ undefined elements (pointcuts or methods). These elements are then said to be\
    \ *abstract*. This concept is similar to that of an abstract class. The precise\
    \ definition of these elements will be given in a subaspect.\n\nAbstract aspects\
    \ allow you to factor definitions that are shared by several aspects. As with\
    \ abstract classes, abstract aspects cannot be instantiated.\n\nThe `abstract`\
    \ keyword is used to define abstract aspects. It can be written before the `aspect`\
    \ or `pointcut` keyword (for defining pointcut descriptors) and before the method\
    \ that is abstract in the aspect. The following section illustrates the precise\
    \ definition of an abstract aspect.\n\n### Aspect Inheritance\n\nInheritance can\
    \ be used with aspects like it is used with classes. The goal is to extend an\
    \ aspect without rewriting it completely. Only single inheritance is supported.\n\
    \nAs with classes, the `extends` keyword provides the inheritance feature. In\
    \ the following line of code, the `TraceAspect2` aspect extends the `TraceAspect`\
    \ aspect:\n\n```\npublic aspect TraceApect2 extends TraceAspect { ... }\n```\n\
    \nHowever, aspect inheritance does not follow the same exact rules as class inheritance.\
    \ An aspect can extend only abstract aspects, whereas a class can extend both\
    \ abstract and nonabstract classes.\n\nA pointcut can be redefined in a subaspect.\
    \ If a pointcut is redefined, the redefined version will always be used. Pointcut\
    \ redefinition with aspect inheritance follows the same rules as method redefinition\
    \ with class inheritance.\n\nConversely, advice code cannot be redefined. Inherited\
    \ advice code is thus always available in a subaspect.\n\nThe code in Listing\
    \ 3-14 defines the abstract `TraceAspect` aspect with the abstract `toBeTraced`\
    \ pointcut descriptor. `TraceAspect2` extends `TraceAspect` and defines the `toBeTraced`\
    \ pointcut descriptor.\n\n**Listing 3-14.** *The Definition of an Abstract Aspect*\n\
    \n```\npublic abstract aspect TraceAspect {\n    abstract pointcut toBeTraced();\n\
    \    before(): toBeTraced() { ... }\n}\n\npublic aspect TraceAspect2 extends TraceAspect\
    \ {\n    pointcut toBeTraced(): call(* Order.*(..));\n}\n```\n\n### Aspect Instantiation\n\
    \nBy default, a unique instance of an aspect is created when the application is\
    \ launched. The aspect is then said to be a *singleton*. The same aspect instance\
    \ is shared by all the application objects.\n\nIn special cases, it can be useful\
    \ to create several instances of a given aspect. Different application objects\
    \ are then aspectized by the different instances. For example, this feature can\
    \ be used to dedicate different pieces of data to each part of the application.\n\
    \nThe three following cases can occur:\n\n- The aspect is a singleton, and only\
    \ one instance of the aspect exists at run time. This is the default case.\n-\
    \ The aspect is instantiated several times, and the instances are associated with\
    \ different application objects.\n- The aspect is instantiated several times,\
    \ and the instances are associated with different control-flow sequences of the\
    \ application.\n\nNo keyword exists for the first case because this is the default\
    \ behavior when the `aspect` keyword is used.\n\nFor the second case, two keywords\
    \ are available: `perthis` and `pertarget`. The aspects can then be written as\
    \ follows:\n\n```\naspect <name> perthis( <poincut> ) { ... }\naspect <name> pertarget(\
    \ <poincut> ) { ... }\n```\n\nWhen `perthis` is used, an instance of the aspect\
    \ is created for every object that is an executing object of the given pointcut.\
    \ The other objects (those that are not executing objects of the pointcut) are\
    \ not aspectized. When `pertarget` is used, an instance of the aspect is created\
    \ for every object that is the target object of the given pointcut.\n\nFor the\
    \ third case, two keywords are available: `percflow` and `percflowbelow`. The\
    \ aspects can then be written as follows:\n\n```\naspect <name> percflow( <poincut>\
    \ ) { ... }\naspect <name> perclfowbelow( <poincut> ) { ... }\n```\n\nWhen `percflow`\
    \ is used, an aspect instance is created each time the application enters the\
    \ control-flow sequence that is designated by the pointcut. As for the `cflow`\
    \ operator in pointcut definitions, the joinpoints belongs to the control flow.\
    \ When `percflowbelow` is used, an aspect instance is created each time the application\
    \ enters the control-flow sequence that is designated by the pointcut, but the\
    \ joinpoints are not included in the control flow.\n\nThe static `aspectOf` method\
    \ is defined for each aspect and returns the aspect instance that is currently\
    \ in use. For example, in the singleton `TraceAspect` aspect, the call `TraceAspect.aspectOf()`\
    \ returns the reference to the singleton. For the `perthis` and `pertarget` types,\
    \ a parameter must be passed when `aspectOf` is called; this parameter gives the\
    \ source or the target object that is associated with the requested instance.\
    \ For the `percflow` and `percflowbelow` types, no parameters are needed. The\
    \ method returns the aspect instance or `null`, depending on whether the current\
    \ run is included in the control-flow sequences that are defined for the aspects.\n\
    \n### Aspect Ordering\n\nWhen two or more aspects apply to the same joinpoint,\
    \ the execution order of these aspects must be determined.\n\nAspectJ allows you\
    \ to define explicit ordering rules. This is called *explicit ordering*. If the\
    \ rules are undefined, the compiler automatically orders the aspects. This is\
    \ called *implicit ordering*.\n\n#### Explicit Ordering\n\nThe `declare precedence`\
    \ keyword combination allows you to declare the execution order of different aspects.\n\
    \nThe following code illustrates the usage of this keyword combination:\n\n```\n\
    aspect GlobalOrder {\n    declare precedence: Authentication, Trace;\n}\n\naspect\
    \ Authentication { ... }\naspect Trace { ... }\n```\n\nIn the previous code, the\
    \ `Authentication` aspect is always executed before `Trace` is. Wildcards can\
    \ be used in the aspect names that are associated with `declare precedence`.\n\
    \nDespite the location of the definition, the order is valid for the whole program.\
    \ The `declare precedence` keyword combination can be used several times in a\
    \ program. If the given orders are inconsistent, the AspectJ compiler raises an\
    \ error.\n\n#### Implicit Ordering\n\nWhen no order is defined, or when the order\
    \ is defined for some aspects but not for others, AspectJ applies the following\
    \ rules:\n\n- The subaspects are applied before the inherited aspects.\n- No order\
    \ is guaranteed for aspects that are not linked by an inheritance relationship.\n\
    - If several advice code blocks apply to the same joinpoint for a given aspect,\
    \ the following rules apply:\n  - \"After\" advice code blocks are executed last.\n\
    \  - Advice code blocks are executed in the order in which they are defined in\
    \ the aspect.\n\nThese rules can lead to inconsistencies which are raised by the\
    \ AspectJ compiler.\n\nIt is recommended that the aspect order be defined explicitly\
    \ and as often as possible with the `declare precedence` keyword combination.\
    \ When you write an aspect, it is favorable to first write all the \"before\"\
    \ advice code and then the \"after\" advice code.\n\n### The Privileged Aspect\n\
    \nFor accessing fields or methods, the same rules apply to aspects as Java classes.\
    \ For example, aspects cannot read or write a `private` or `protected` field.\
    \ The purpose of this particular rule is to guarantee the integrity of the program\
    \ and to avoid the accidental and erroneous altering of objects.\n\nNevertheless,\
    \ some cases require a bypass of this limitation. AspectJ provides for these cases\
    \ the concept of a privileged aspect:\n\n```\nprivileged aspect <name> { ... }\n\
    ```\n\nA privileged aspect can access all the fields and methods defined in a\
    \ class—regardless of their access modifiers. This feature must be used cautiously\
    \ as it may corrupt the normal behavior of the program.\n\n### Declaring Warnings\
    \ and Errors\n\nAspectJ offers a mechanism that raises compile-time warnings or\
    \ errors whenever a given pointcut expression is matched by a program. In this\
    \ way, you can be notified if your program defines unwanted code elements.\n\n\
    For example, the aspect in Listing 3-15 raises a warning if the `Remote` interface\
    \ is implemented in the `bank.ejb` package.\n\n**Listing 3-15.** *Declaring Warnings\
    \ with an Aspect*\n\n```\npublic aspect Foo {\n    declare warning:\n        execution(*\
    \ Remote+.*(..)) && within(bank.ejb.*):\n            \" Remote may interfere with\
    \ EJBs in bank.ejb\";\n}\n```\n\nA message can be associated with each raised\
    \ warning.\n\nThe `declare error` keyword combination works similarly.\n\n###\
    \ Load-Time Weaving\n\nBy default, AspectJ is a compile-time weaver. Given a set\
    \ of `.java` source files and a set of aspects, the `ajc` command-line tool produces\
    \ a set of `.class` files in which the aspects are woven to the classes.\n\nSince\
    \ version 1.2, AspectJ can weave code at load time. The source code of the program\
    \ is no longer required, and AspectJ can weave any class that can be obtained\
    \ with the class-loading mechanism of the Java language.\n\n## New Features in\
    \ AspectJ 5\n\nDuring the writing of this book, AspectJ 1.2.1, which was released\
    \ on November 5, 2004, was the latest stable version of AspectJ. However, a newer\
    \ version, numbered 1.5.0 and officially called AspectJ 5, is under preparation.\
    \ The first major developments of AspectJ 1.5.0M1 were made available to the developing\
    \ community in December 2004. The main purpose of this evolution was to incorporate\
    \ the changes brought to the Java language by Java 5.\n\nThe features described\
    \ in the remainder of this section can be found in the developer release of AspectJ\
    \ 1.5.0, which is available at the time of the writing of this book. By the time\
    \ AspectJ 5 is final, these features may have slightly changed according to user's\
    \ feedback, design choices, or error corrections.\n\nMost of the changes brought\
    \ by AspectJ 5 deal with *annotations* (also known as *metadata*). First, an aspect\
    \ can deal with an annotated Java program. The annotations defined for classes\
    \ or methods can be taken into account when defining a pointcut. Also, annotations\
    \ can be introduced into a Java program. Second, annotations have an impact on\
    \ the syntax of the AspectJ language itself. Instead of using dedicated keywords\
    \ such as `aspect` and `pointcut`, you can write annotated Java classes that will\
    \ be understood by the AspectJ weaver as aspects.\n\nThese two categories of features\
    \ are presented in the remainder of this section.\n\n### Working with Annotations\
    \ in Aspects\n\nThe handling of annotations in Java programs brings several changes\
    \ to the AspectJ language. The changes concern the definition of an aspect, the\
    \ pointcut-definition language, and the introduction of annotations.\n\n#### Annotations\
    \ and Pointcut Definitions\n\nYou learned in the previous sections that a pointcut\
    \ can capture elements of a Java program, such as methods and fields, and link\
    \ them together in order to aspectize them. In this process, the writing of a\
    \ pointcut relies heavily on the elements that define a field or method, such\
    \ as the name, type, or signature. It then seems natural to incorporate annotations\
    \ for fields or methods in the writing of a pointcut.\n\nWith AspectJ 5, the pattern\
    \ language for a pointcut descriptor is extended with the at-sign symbol (`@`)\
    \ followed by an annotation name. For instance, the following expression\n\n```\n\
    execution( @Transaction * *.*(..) )\n```\n\ndesignates all the joinpoints that\
    \ are executions of a method annotated with `@Transaction`, regardless of the\
    \ method's return type, declaring class, name, or signature.\n\nSeveral annotations\
    \ can be specified, in which case all of them are required for the element to\
    \ be included in the pointcut.\n\nThe Boolean OR operator (`||`) can be used between\
    \ annotations to signify that at least one of the annotations must be present.\
    \ For instance, `@(Foo || Bar)` means that either `@Foo` or `@Bar` is required\
    \ as an annotation.\n\nThe Boolean NOT operator (`!`) is used in front of an annotation.\
    \ For instance, `!@Foo` means that all elements that are not annotated with `@Foo`\
    \ are included in the definition.\n\nJoinpoints can be filtered according to the\
    \ annotations available to the source and target objects of a method call. The\
    \ `@this` and `@target` operators are defined for this purpose. For instance,\
    \ the following expression\n\n```\ncall( * *.*(..) ) && @target( @Transaction\
    \ )\n```\n\ndesignates all the calls to a method that is annotated with `@Transaction`.\n\
    \nAt the time this book was written, it was not possible to match joinpoints based\
    \ on their annotation values. This facility may be supported in future releases\
    \ of AspectJ.\n\n#### Introducing Annotations\n\nIn AspectJ 5, the `declare` keyword\
    \ is associated with four new forms that allow you to introduce annotations in\
    \ Java programs.\n\nIntroducing annotations consists of defining a pattern that\
    \ refers to program elements (classes, interfaces, fields, methods, or constructors)\
    \ and giving the annotations that must be introduced for all the program elements\
    \ that match the pattern.\n\nFor instance, the following instruction\n\n```\n\
    declare @type: bank.* : @EJBean;\n```\n\nintroduces the annotation `@EJBean` for\
    \ all the types (classes and interfaces) that are defined in the `bank` package.\n\
    \nSimilarly, annotations can be introduced for methods. The keyword combination\
    \ is then `declare @method` and the pattern refers to method names. For example,\
    \ the following instruction\n\n```\ndeclare @method: bank.*.deposit(..): @Transaction(value=\"\
    required\");\n```\n\nintroduces the annotation `@Transaction(value=\"required\"\
    )` for all the `deposit` methods that are defined in the `bank` package.\n\nThe\
    \ `declare @field` and `declare @constructor` keywords follow the same principle.\n\
    \n### Defining Aspects with Annotations\n\nUsing the previously presented features,\
    \ you can write aspects that deal with a Java program containing annotations,\
    \ or you can write aspects that introduce annotations.\n\nThe annotations that\
    \ are presented in this section are very different. Their purpose is to replace\
    \ the current syntax of the AspectJ language and to allow you to write annotated\
    \ Java classes. These classes are understood by the AspectJ weaver not as regular\
    \ Java classes but as aspects. This approach creates an entirely new development\
    \ style in which there are no more syntax extensions, but instead there are a\
    \ set of annotations available for AOP.\n\nThe first annotation is `@Aspect`.\
    \ A Java class annotated with `@Aspect` is understood as an aspect. The following\
    \ code snippet defines the `TraceAspect4` aspect:\n\n```\n@Aspect\npublic class\
    \ TraceAspect4 {\n    // ...\n}\n```\n\nYou learned in the \"Advanced Features\"\
    \ section earlier in this chapter that aspects can be qualified, either with an\
    \ instantiation clause (using `perthis`, `pertarget`, `percflow`, or `percflowbelow`)\
    \ or with the `privileged` keyword. These qualifiers still exist with the `@Aspect`\
    \ annotation style. For example, the following annotation\n\n```\n@Aspect(\n \
    \   instantiationModel=AspectInstantiationModel.PERTARGET,\n    perClausePattern=\"\
    aPointcutDefinition()\",\n    isPrivileged=true )\n```\n\ndefines a privileged\
    \ aspect with a `PERTARGET` instantiation model.\n\n#### Pointcut Definition\n\
    \nWith the annotation-based development style, a pointcut is a method with an\
    \ empty body that is annotated with `@Pointcut`. This annotation takes the pointcut\
    \ expression as a parameter. For example, the following code snippet defines the\
    \ pointcut `toBeTraced`:\n\n```\n@Pointcut( \"call(* aop.aspectj.Order.*(..))\"\
    \ ) void toBeTraced() {}\n```\n\nWith this new style, the parameters that would\
    \ have been defined for a pointcut are now defined as parameters of the annotated\
    \ method.\n\n#### Advice-Code Definition\n\nAdvice code blocks are already blocks\
    \ of instructions, so it is quite natural that advice code blocks are now methods.\
    \ Five new annotations are available, one for each different type of advice code:\
    \ `@Before`, `@After`, `@AfterReturning`, `@AfterThrowing`, and `@Around`.\n\n\
    In all five cases, the annotation takes the associated pointcut expression as\
    \ a parameter.\n\n**\"Before\" Advice Code**\n\nThe following code snippet illustrates\
    \ the definition of \"before\" advice:\n\n```\n@Before( \"toBeTraced()\" )\npublic\
    \ void beforeTrace() { ... }\n```\n\nNote that with this new development style,\
    \ advice code blocks now share the same name as the method.\n\nIf the \"before\"\
    \ advice code needs to access the joinpoint, a parameter of type `JoinPoint` is\
    \ added to the method signature, as shown here:\n\n```\n@Before( \"toBeTraced()\"\
    \ )\npublic void beforeTrace( JoinPoint jp ) { ... }\n```\n\nIf the pointcut expression\
    \ defines parameters, these parameters will also be made available as method parameters.\
    \ The following code lines, for example, define \"before\" advice code for method\
    \ calls in which the `src` and `dst` parameters are bound to the source and target,\
    \ respectively, of the call:\n\n```\n@Before( \"toBeTraced() && this(src) && target(dst)\"\
    \ )\npublic void beforeTrace( Object src, Object dst ) { ... }\n```\n\nThis principle\
    \ of appending the joinpoint and the pointcut parameters to the signature of the\
    \ advice-code method also applies to other types of advice code.\n\n**\"Around\"\
    \ Advice Code**\n\n\"Around\" advice code is similar to \"before\" advice code.\
    \ The only issue here is raised by the annotation development style, which is\
    \ linked to `proceed`. If you do not change the old syntax, the call to `proceed`\
    \ will lead to a compiler error. (Keep in mind that aspects are now regular Java\
    \ classes.)\n\nTo solve this problem, AspectJ 5 defines `proceed` as a method\
    \ of the `ProceedingJoinPoint` interface, which extends the existing `JoinPoint`\
    \ interface and allows the joinpoint to be visible as a parameter of the \"around\"\
    \ advice-code method.\n\nThe following lines of code illustrate the definition\
    \ of \"around\" advice code:\n\n```\n@Around( \"toBeTraced()\" )\npublic Object\
    \ trace( ProceedingJoinPoint jp ) {\n    // ... Before code\n    Object ret =\
    \ jp.proceed();\n    // ... After code\n    return ret;\n}\n```\n\n**\"After\"\
    \ Advice Code**\n\nThe definition of \"after\" advice code does not differ from\
    \ the definition of \"before\" advice code except that the annotation is `@After`.\n\
    \nThe situation is slightly different for `@AfterReturning` and `@AfterThrowing`.\
    \ The returned value or the thrown exception must be made visible in the advice-code\
    \ method.\n\nIn the case of `@AfterReturning`, a new parameter named `returning`\
    \ is added to the annotation. Its value identifies the method parameter that will\
    \ contain the returned value. The following lines define \"after returning\" advice\
    \ code:\n\n```\n@AfterReturning( value=\"toBeTraced()\", returning=\"ret\" )\n\
    public void afterTrace( Object ret ) { ... }\n```\n\nThe value returned by the\
    \ intercepted joinpoints is assigned to the `ret` parameter.\n\nThe principle\
    \ is the same for \"after throwing\" advice code, except that the annotation defines\
    \ a parameter named `throwing` for holding the thrown exception.\n\n#### Declare\
    \ Statements\n\nThe `declare` statement is available in various forms in AspectJ:\n\
    \n- `declare parents ... implements` and `declare parents ... extends`: These\
    \ are the two most current forms, which allow you to introduce a new interface\
    \ and a new superclass, respectively.\n- `declare error` and `declare warning`:\
    \ These forms raise errors and warnings.\n- `declare @...`: Annotations can be\
    \ introduced with this form.\n- `declare precedence`: Aspect ordering can be defined\
    \ with this form.\n- `declare soft`: This form can be used to soften exceptions.\n\
    \nAt the time of the writing this book, all the previous forms of `declare` statements,\
    \ except `declare parents ... extends` and `declare soft`, were available with\
    \ the new annotation-based development style. The two exceptions may be added\
    \ in a future release.\n\nThe aspect in Listing 3-16 illustrates the definition\
    \ of the following:\n\n- A precedence rule between all the aspects that have a\
    \ name starting with `Authentication` and the `Trace` aspect\n- The declaration\
    \ to raise a warning whenever the `Remote` interface is implemented in the `bank.ejb`\
    \ package\n- The introduction of the annotation `@EJBean` for the types defined\
    \ in the `bank.ejb` package\n- The introduction of the annotation `@Transaction(value=\"\
    required\")` for the `deposit` methods defined in the `bank.ejb` package\n\n**Listing\
    \ 3-16.** *AnnotationBased Declare Statements*\n\n```\n@Aspect\n@DeclarePrecedence(\
    \ \"Authentication*,Trace\" )\npublic class GlobalOrder {\n\n    @DeclareWarning(\
    \ \"execution(* Remote+.*(..)) && within(bank.ejb.*)\" )\n    final static String\
    \ message = \"Remote may interfere with EJBs in bank.ejb\";\n\n    @DeclareAnnotation(\
    \ \"bank.*\" )\n    @EJBean\n    Object beans;\n\n    @DeclareAnnotation( \"bank.*.deposit(..)\"\
    \ )\n    @Transaction(value=\"required\")\n    void depositMethods() {}\n}\n```\n\
    \n### Aspect Instantiation in AspectJ 5\n\nAspectJ 5 supports the five aspect-instantiation\
    \ modes—the default singleton mode, `perthis`, `pertarget`, `percflow`, and `percflowbelow`—that\
    \ are available in the previous version. (See the \"Aspect Instantiation\" section\
    \ earlier in this chapter for further details.) AspectJ 5 introduces a sixth mode:\
    \ `PERTYPEWITHIN`. With this mode, a new aspect instance is created for each new\
    \ type that is designated in the pointcut expression associated with `PERTYPEWITHIN`.\n\
    \nThe following aspect illustrates the `PERTYPEWITHIN` mode:\n\n```\n@Aspect(\n\
    \    instantiationModel=AspectInstantiationModel.PERTYPEWITHIN,\n    perClausePattern=\"\
    aop.aspectj.*\")\npublic class FooBarAspect { ... }\n```\n\nThis aspect will be\
    \ instantiated for each different class that is defined in the `aop.aspectj` package.\n\
    \n### Other Java 5 Features\n\nAutoboxing does not impose any changes on the AspectJ\
    \ language. The fact that primitive types (`int`, `float`, `double`, and so on)\
    \ are equivalent to their class-based ones (`Integer`, `Float`, `Double`, and\
    \ so on) simply means that when the AspectJ compiler computes the joinpoints that\
    \ match a given pointcut, the compiler does not distinguish between a primitive\
    \ type and its class-based counterpart.\n\nVariable-length argument lists can\
    \ be used when you write a pointcut descriptor. For instance, the following pointcut\
    \ descriptor\n\n```\ncall( * *.*( double, Object... ) )\n```\n\ndesignates all\
    \ the calls to all the methods that take at least a `double` argument and a variable-length\
    \ list of `Object` arguments as parameters.\n\n## Summary\n\nThis chapter presented\
    \ the syntax of the AspectJ language. AspectJ extends the Java language with keywords\
    \ for writing aspects, pointcuts, advice code, and intertype declarations. An\
    \ aspect-oriented application in AspectJ contains Java classes that implement\
    \ the core logic of the application and AspectJ aspects that implement the crosscutting\
    \ functionalities.\n\nThe classes and the aspects are woven together to produce\
    \ the final application. Most of the time, the weaving occurs at compile time.\
    \ AspectJ provides a compiler (named `ajc`) for that. With newer versions of AspectJ,\
    \ the weaving can also be done at load time—when the application is loaded into\
    \ the Java virtual machine.\n\nThe pointcut language provided by AspectJ allows\
    \ you to define where an aspect applies in an application. A pointcut descriptor\
    \ denotes a set of joinpoints. Several types of joinpoints are supported by AspectJ.\
    \ The two that are most frequently used are the `call` and `execution` joinpoints.\
    \ These are the points in the execution flow of a program where a method is called\
    \ or executed, respectively. Several other types of joinpoints exist in AspectJ:\
    \ `get` and `set` for read and write operations, `handler` for exceptions, `initialization`\
    \ and `preinitialization` for constructors, `staticinitialization` for static\
    \ code blocks, and `adviceexecution` for executions of advice code.\n\nAdvice\
    \ code defines the modifications that are brought to an application by an aspect.\
    \ Each advice code block is associated with a pointcut that defines where these\
    \ modifications apply. Three main types of advice code are provided by AspectJ:\
    \ \"before,\" \"after,\" and \"around.\" Advice code applies either before the\
    \ executions of its associated joinpoints, after the executions, or both. In the\
    \ latter case, the advice code is called \"around\" advice code. Two other types\
    \ of advice code are provided by AspectJ: \"after returning,\" and \"after throwing.\"\
    \ The former applies for to that return normally, whereas the latter applies to\
    \ joinpoints that end their executions by raising an exception. The behavior of\
    \ an aspect is provided by the advice code blocks that are attached to the aspect.\
    \ Any Java instructions are valid in those blocks.\n\nAspectJ provides two additional\
    \ instructions: `thisJoinPoint` and `proceed`. The former provides information\
    \ (method name, class name, parameters, and so on) about the current joinpoint.\
    \ The latter, which can be used exclusively with \"around\" advice code, allows\
    \ you to execute the joinpoint.\n\nThe mechanism known by the term *intertype\
    \ declaration* provides a way for AspectJ to extend an application with additional\
    \ features, such as fields, methods, constructors, interfaces, and superclasses.\n\
    \nFinally, AspectJ 5 takes advantage of the many new features of the Java 5 language,\
    \ and it introduces a whole new development style that is based on annotations.\
    \ Instead of using keywords such as `aspect` and `pointcut`, you can write aspects\
    \ as annotated Java classes.\n\n# Chapter 4: Java Aspect Components\n\n**C**hapter\
    \ 3 presented the syntax and usage of one AOP environment: the AspectJ language.\
    \ This chapter presents a second AOP environment: Java Aspect Components (JAC).\n\
    \nLike AspectJ, JAC allows you to develop aspect-oriented programs. However, these\
    \ environments differ in two significant ways. First, AspectJ is a language that\
    \ defines new keywords, whereas JAC is a framework and, as such, is a regular\
    \ Java program. JAC provides an API that allows you to define aspects, pointcuts,\
    \ and pieces of advice code.\n\nSecond, the two environments differ in their aspect-weaving\
    \ mechanisms. AspectJ weaves aspects at compile time or at load time. JAC weaves\
    \ aspects at run time, which leads to more adaptable programs because aspects\
    \ can be dynamically added and removed.\n\nA research team led by Renaud Pawlak,\
    \ with Laurent Martelli and Lionel Seinturier, designed JAC in 1999. The first\
    \ versions were released in 2000, but the ideas behind JAC were rooted in research\
    \ that began in 1998 by the aforementioned team and several computer-science research\
    \ laboratories: the CEDRIC laboratory at CNAM (Conservatoire National des Arts\
    \ et Métiers), Paris; the LIP6 laboratory at University Paris 6; and the LIFL\
    \ laboratory at the University of Lille, France. Other contributors included Laurence\
    \ Duchien and Gérard Florin.\n\nJAC is open-source software that is freely released\
    \ under the terms of the GNU Lesser General Public License (LGPL). This license\
    \ allows JAC to be incorporated into business products. In 2003, JAC joined the\
    \ ObjectWeb community for open-source middleware. For up-to-date information about\
    \ JAC, see http://jac.objectweb.org. For general information about the ObjectWeb\
    \ community, see http://www.objectweb.org.\n\n## Creating a First JAC Application\n\
    \nThis section presents a simple example of an aspect-oriented application that\
    \ uses JAC. The example introduces the syntax for aspects, pointcuts, and advice\
    \ code.\n\nThe example reuses the order-management application, which manages\
    \ client orders, that Chapter 3 presented. However, the code in this chapter uses\
    \ JAC to implement the same trace aspect as the one that was programmed in Chapter\
    \ 3. This aspect traces the execution of the application, thus determining the\
    \ methods that are called and the order that they are called in.\n\n### Creating\
    \ a First Aspect\n\nThe first JAC aspect monitors each ordered item by displaying\
    \ a message before and after the `addItem` method, which the `Order` class defines.\n\
    \nThis aspect is defined by two classes: `TraceAspect` and `TraceWrapper`. The\
    \ `TraceAspect` class defines the pointcut. The `TraceWrapper` class defines the\
    \ advice code, which JAC calls a *wrapper*. Listing 4-1 presents the `TraceAspect`\
    \ code, and Listing 4-2 (later in this chapter) presents the `TraceWrapper` code.\n\
    \n**Listing 4-1.** *A Trace Aspect Component*\n\n```\n1 package aop.jac;\n2\n\
    3 import org.objectweb.jac.core.AspectComponent;\n4\n5 public class TraceAspect\
    \ extends AspectComponent {\n6\n7     public TraceAspect() {\n8         pointcut(\n\
    9             \".*\",\n10             \"aop.jac.Order\",\n11             \"addItem(java.lang.String,int):void\"\
    ,\n12             \"aop.jac.TraceWrapper\",\n13             null, false );\n14\
    \     }\n15 }\n```\n\nNotice that the `TraceAspect` class defines an aspect by\
    \ extending the `AspectComponent` class, which is defined by the JAC API as the\
    \ root class of all aspects. Consequently, JAC aspects are often called *aspect\
    \ components*.\n\n#### Creating a First Pointcut\n\nAs you can see in Listing\
    \ 4-1, the call to the `pointcut` method, which is inherited from `AspectComponent`,\
    \ declares a pointcut in the `TraceAspect` class. The method takes six parameters.\
    \ The first three designate the joinpoints that match the pointcut. The fourth,\
    \ which is shown on line 12, defines the wrapper that is associated with the pointcut.\
    \ The last two parameters define an exception handler and the way that the aspect\
    \ is instantiated. (See the \"Introducing Exception Handlers\" and \"Aspect Instantiation\"\
    \ sections later in this chapter.)\n\nThe methods that match a pointcut are defined\
    \ by three parameters: the method names (on line 11), the class names (on line\
    \ 10), and the object names (on line 9). As you will see in the \"Pointcuts\"\
    \ section later in this chapter, these parameters are strings that can contain\
    \ wildcards.\n\nThe pointcut that `TraceAspect` defines includes the `addItem`\
    \ method, which takes a `String` and an `int` as parameters for all the objects\
    \ that are instances of the `aop.jac.Order` class.\n\nJAC allows you to include\
    \ only selected instances of a class in a pointcut. This feature can be useful\
    \ when programming distributed applications, for example. In such a case, some\
    \ server objects that are instances of the same class commonly need to be aspectized\
    \ differently. Object names in pointcut definitions allow this, as you will see\
    \ in the \"Object Naming\" section later in this chapter.\n\n#### Creating a First\
    \ Wrapper\n\nAs stated earlier, JAC uses the term *wrapper* instead of the term\
    \ *advice code*. No difference exists between an advice code block in AspectJ\
    \ and a wrapper in JAC. Both are code blocks that define the behavior of an aspect.\
    \ The code that a wrapper defines can be executed before or after the joinpoint.\n\
    \nJAC requires you to define wrappers and aspects in distinct classes. This feature\
    \ allows you to reuse wrappers independently from aspects. As you can see on line\
    \ 12 of Listing 4-1, the definition of a pointcut links a wrapper to an aspect.\n\
    \nListing 4-2 presents the `TraceWrapper` code.\n\n**Listing 4-2.** *A Trace Wrapper*\n\
    \n```\n1 package aop.jac;\n2\n3 import org.aopalliance.intercept.ConstructorInvocation;\n\
    4 import org.aopalliance.intercept.MethodInvocation;\n5 import org.objectweb.jac.core.AspectComponent;\n\
    6 import org.objectweb.jac.core.Wrapper;\n7\n8 public class TraceWrapper extends\
    \ Wrapper {\n9\n10     public TraceWrapper(AspectComponent ac) {\n11         super(ac);\n\
    12     }\n13\n14     public Object invoke(MethodInvocation mi) throws Throwable\
    \ {\n15         System.out.println(\"-> Before addItem\");\n16         Object\
    \ ret = proceed(mi);\n17         System.out.println(\"-> After addItem\");\n18\
    \         return ret;\n19     }\n20\n21     public Object construct(ConstructorInvocation\
    \ ci) throws Throwable {\n22         return proceed(ci);\n23     }\n24 }\n```\n\
    \nNotice that you define JAC wrappers by extending the `Wrapper` class. These\
    \ are always \"around\" wrappers; no special definition exists for \"before\"\
    \ or \"after\" wrappers. You can define the latter two types by omitting the \"\
    after\" or \"before\" part in an \"around\" wrapper.\n\nJAC wrappers implement\
    \ the AOP Alliance API.\n\n### AOP ALLIANCE\n\nThe AOP Alliance project is an\
    \ open-source initiative that was created to standardize part of the API that\
    \ several existing AOP frameworks share. You can find the AOP Alliance web site\
    \ at http://aopalliance.sourceforge.net.\n\nThe various AOP frameworks offer different\
    \ features, tools, and programming models. However, all the frameworks share a\
    \ set of internal functionalities. The goal of the AOP Alliance project is to\
    \ identify these features and propose a set of standard interfaces to implement\
    \ them. AOP Alliance thus hopes to foster code reuse across different frameworks.\n\
    \nAt this writing, the AOP Alliance API is implemented by four frameworks: `dynaop`\
    \ (see http://dynaop.dev.java.net), JAC (see http://jac.objectweb.org), `JoyAop`\
    \ (see http://joyaop.sourceforge.net), and Spring (see http://www.springframework.org).\n\
    \nA wrapper must define a constructor with a parameter of type `AspectComponent`,\
    \ and the wrapper must call the corresponding inherited constructor. (See line\
    \ 11 of Listing 4-2). This constructor is called by the JAC runtime when the wrapper\
    \ is instantiated. The parameter then becomes the reference to the aspect that\
    \ is associated with the wrapper.\n\nThe existing JAC joinpoints are method executions\
    \ and constructor executions. The `invoke` and `construct` methods are called\
    \ by the JAC runtime when these joinpoints occur. The methods return an `Object`\
    \ and can throw an exception of type `Throwable`, which is the root class for\
    \ all exceptions and errors in Java. The `invoke` method takes a parameter of\
    \ type `MethodInvocation`. This parameter reifies the joinpoint with information\
    \ such as the method name or the parameters of the call. The `ConstructorInvocation`\
    \ parameter plays the same role for constructor executions.\n\nThe `proceed` method\
    \ delimits the \"before\" and \"after\" parts of a wrapper. This method executes\
    \ the joinpoint, or it calls the next wrapper if several wrappers are woven for\
    \ the same joinpoint. The call to `proceed` is optional. Conversely, `proceed`\
    \ can be called several times.\n\nThe `invoke` and `construct` methods are mandatory—even\
    \ if they define no instructions.\n\n### Creating an Aspect-Configuration File\n\
    \nAspect configuration is an essential task when programming with JAC. This feature\
    \ is not often provided by other AOP environments, such as AspectJ, although it\
    \ is a key factor when reusing aspects.\n\nEach aspect that is defined with JAC\
    \ is associated with an aspect-configuration file. You choose the parameters that\
    \ are to be configured in the aspect. The end user defines the aspect-configuration\
    \ file and the values that are associated with these parameters. For example,\
    \ when using a transaction-demarcation aspect, you must indicate the methods that\
    \ are to be executed in the transaction. When using a persistence aspect, you\
    \ must designate the attributes that are to be saved in a database.\n\nThe principle\
    \ of an aspect-configuration file exists in other approaches, such as that of\
    \ J2EE. The idea is to separate the code from the initialization values that are\
    \ used by the code. The code can then be reused without any modifications or recompilations,\
    \ whereas the initialization values will depend on the execution context.\n\n\
    J2EE and JAC share the same principle—however, the way that they deal with the\
    \ configuration process differs. In both cases, a set of parameters is associated\
    \ with the persistence, transaction, naming, and access-control services. With\
    \ J2EE, these parameters are provided by the servers, are fixed, and cannot be\
    \ changed. With JAC, you choose precisely the configuration parameters that you\
    \ want to provide.\n\n#### The Syntax of an Aspect-Configuration File\n\nEach\
    \ aspect defined with JAC is associated with an aspect-configuration file that\
    \ ends with the `.acc` extension. This file is loaded at run time when the aspect\
    \ is instantiated. The file can be modified and reloaded while the program is\
    \ running or between two runs of the same program. The configuration of the program\
    \ is then dynamically adapted.\n\nEach line in an aspect-configuration file is\
    \ a call to a public method that is defined in the aspect class. A line begins\
    \ with the name of the method, continues with a space-separated list of parameters,\
    \ and ends with a semicolon. (The \"Creating an Aspect–Configuration File\" section\
    \ later in this chapter defines the syntax of aspect-configuration files in more\
    \ detail.)\n\n#### An Example of Aspect Configuration\n\nListing 4-3 shows the\
    \ `TraceAspect2` aspect, which rewrites `TraceAspect` so that the pointcut is\
    \ made configurable through the `trace` method.\n\n**Listing 4-3.** *A Configurable\
    \ Aspect Component for Tracing*\n\n```\npackage aop.jac;\n\nimport org.objectweb.jac.core.AspectComponent;\n\
    \npublic class TraceAspect2 extends AspectComponent {\n\n    public void trace(\
    \ String objectPE, String classPE, String methodPE ) {\n        pointcut(\n  \
    \          objectPE, classPE, methodPE,\n            \"aop.jac.TraceWrapper\"\
    ,\n            null, false );\n    }\n}\n```\n\nThe `trace` method takes three\
    \ parameters: `objectPE`, `classPE`, and `methodPE`. To define a pointcut, the\
    \ `trace` method calls the `pointcut` method with these three parameters. To obtain\
    \ a program similar to the one that is defined by `TraceAspect`, the aspect-configuration\
    \ file named `traceaspect2.acc` can be written as follows:\n\n```\ntrace \".*\"\
    \ \"aop.jac.Order\" \"addItem(java.lang.String,int):void\"\n```\n\nThe aspect-configuration\
    \ file provides the current value for the definition of the pointcut. These values\
    \ can be changed without recompiling the aspect. Reloading the aspect-configuration\
    \ file into JAC at run time causes the pointcut that is associated with the aspect\
    \ and the traced joinpoints to change.\n\nIn the preceding example, we made the\
    \ three parameters that define the pointcut configurable. We could have extended\
    \ the example by adding parameters to the `trace` method for the wrapper class\
    \ or for the remaining parameters. It is up to the aspect programmer to make such\
    \ choices.\n\n### Creating an Application-Descriptor File\n\nEach JAC application\
    \ is associated with a `.jac` file. This file provides information about the entry\
    \ point of the application and the aspects that need to be initially woven. (See\
    \ the \"Configuring JAC Applications\" section later in this chapter for more\
    \ details on this application-descriptor file.)\n\n#### An Example of an Application-Descriptor\
    \ File\n\nListing 4-4 show the `customer.jac` file, which is a valid application-descriptor\
    \ file for the order-management application.\n\n**Listing 4-4.** *The Application-Descriptor\
    \ File for the Order-Management Application*\n\n```\napplicationName: Order management\n\
    launchingClass: aop.jac.Customer\naspects: traceid traceaspect2.acc true\njac.acs:\
    \ traceid aop.jac.TraceAspect2\n```\n\nAn application-descriptor file consists\
    \ of property names and property values. In this type of file, each line begins\
    \ with a property name followed by a colon and ends with a property value. In\
    \ Listing 4-4, the `applicationName` property defines a string that identifies\
    \ the application, and the `launchingClass` property defines the fully qualified\
    \ name of the class to be loaded to launch the application.\n\nThe `aspects` and\
    \ `jac.acs` properties deal with the aspects to be woven when the application\
    \ starts. For the `aspects` property, each aspect is defined by three values:\
    \ an identifier (here, `traceid`) that is chosen by the application–descriptor-file\
    \ writer; the name of the aspect-descriptor file (here, `traceaspect2.acc`); and\
    \ a Boolean value (here, `true`) that indicates whether the aspect is initially\
    \ woven. For each identifier declared in an `aspect`, the `jac.acs` property defines\
    \ the class that implements the aspect. In our example, the `traceid` identifier\
    \ corresponds to the `aop.jac.TraceAspect2` aspect.\n\n### Compiling a JAC Application\n\
    \nFive categories of files are to be included when programming with JAC:\n\n-\
    \ The `.java` files of the application—in this case, `Customer.java`, `Order.java`,\
    \ and `Catalog.java`.\n- The aspect files—here, just `TraceAspect2.java`.\n- The\
    \ wrapper files—here, just `TraceWrapper.java`.\n- The aspect-configuration files—here,\
    \ just `traceaspect2.jac`.\n- The application–descriptor file—here, `customer.jac`.\n\
    \nThe first three categories of files can be compiled by calling the regular Java\
    \ compiler, `javac` or `jikes`, with the `jac.jar` JAC library referenced in the\
    \ class path. The last two categories contain text files that will be loaded and\
    \ parsed by the JAC runtime.\n\nIf JAC was installed in the `c:\\jac` directory,\
    \ and all the application files were in the `src` directory, you would run the\
    \ Java compiler with the following command:\n\n```\njavac -d classes -classpath\
    \ c:\\jac\\jac.jar src\\*.java\n```\n\nThe resulting `.class` files would then\
    \ be stored in the `classes` directory.\n\n### Running a JAC Application\n\nAn\
    \ aspect-oriented application with JAC can be run by launching the framework with\
    \ an application-descriptor file. The `jac.jar` library contains all the classes\
    \ that are needed to launch the framework.\n\nTo run the order-management application,\
    \ the command is as follows:\n\n```\njava -jar c:\\jac\\jac.jar -R c:\\jac -C\
    \ src;classes customer.jac\n```\n\nThe `-R` option indicates the JAC installation\
    \ directory (`c:\\jac` in our example). The `-C` option specifies the path-like\
    \ structure (here, the `src` and `classes` directories) that JAC can load files\
    \ from. The last parameter in the command line is the name of the application-descriptor\
    \ file.\n\n#### Output from a JAC Application\n\nThe previous command gives the\
    \ output that is shown in Listing 4-5.\n\n**Listing 4-5.** *The Output of the\
    \ Order-Management Application*\n\n```\nJAC version 0.12.1\n--- Launching Application\
    \ Order management ---\n--- configuring traceid aspect ---\n-> Before addItem\n\
    2 item(s) CD added to the order\n-> After addItem\n-> Before addItem\n1 item(s)\
    \ DVD added to the order\n-> After addItem\nOrder amount: US$50.0\nJAC system\
    \ shutdown: notifying all ACs...\nBye bye.\n```\n\nThe first three lines of Listing\
    \ 4-5 are automatically displayed by JAC. They contain a welcome message with\
    \ the JAC version number, the name of the application that was launched, and a\
    \ line for each woven aspect. The output of the application follows, showing each\
    \ execution of the `addItem` method, which is wrapped by a message. The last two\
    \ lines of output are displayed by JAC.\n\n## Creating Pointcuts\n\nThe previous\
    \ section introduced the basic elements of JAC. We showed how to write, compile,\
    \ and run a first aspect-oriented application. This section studies the definition\
    \ of a pointcut.\n\nThe `pointcut` method, which is defined in the `AspectComponent`\
    \ class, allows you to define pointcuts. Three categories of parameters can be\
    \ passed when you define a pointcut:\n\n- **Pointcut expression**: This expression\
    \ defines the joinpoints that are included in the pointcut.\n- **Wrapper class**:\
    \ This class defines the code that will be executed before and after the joinpoints.\n\
    - **Exception handler**: The exception handler that is associated with the pointcut\
    \ provides a method to catch and treat the exceptions that the joinpoints and\
    \ the wrapper can throw. The exception handler is a method with a given signature\
    \ that is implemented in the wrapper class. Exception handlers are optional.\n\
    \nThe following sections explain these three categories in detail.\n\n### Pointcut\
    \ Expressions\n\nPointcut expressions in JAC are composed of three subexpressions.\
    \ A fourth is added when programming distributed applications.\n\nThe joinpoints\
    \ that are included in a pointcut are either method executions or constructor\
    \ executions. JAC also performs an automatic bytecode analysis to classify the\
    \ methods that are defined in an application. The purpose of this analysis is\
    \ to detect whether the methods access or modify the object state. This information\
    \ is made available in the pointcut definition language, and you can define pointcuts\
    \ that include all the methods that perform read or write operations on designated\
    \ fields, for example.\n\nThe three subexpressions that are contained in a pointcut\
    \ definition deal with the names of classes, objects, and methods, respectively.\
    \ The subexpressions are referred to as class expressions, object expressions,\
    \ and method expressions. These expressions can be thought of as filters. Their\
    \ purpose is to filter a set of classes, objects, or methods and retain only those\
    \ that match the expressions.\n\nThe roles of the three expressions can be defined\
    \ as follows:\n\n- **Class expression**: A class expression defines a filter for\
    \ class names. The filtering is performed on fully qualified class names—for example,\
    \ names that include the package and class identifiers.\n- **Object expression**:\
    \ An object expression defines a filter for object names. All business objects\
    \ that are instantiated by JAC are automatically associated with a name. This\
    \ name plays a role largely similar to that of a regular Java reference. The purpose\
    \ is to uniquely identify each created object so that you can aspectize certain\
    \ objects of a class (to customize their behaviors) while leaving others unchanged.\
    \ The object names are automatically created by appending instance numbers to\
    \ the class name. For example, the name `order#0` identifies the first instance\
    \ of the `Order` class.\n- **Method expression**: A method expression defines\
    \ a filter for method signatures. A signature contains a name, a comma-separated\
    \ list of parameter types, and a return type. For example, the expression `addItem(java.lang.String,int):void`\
    \ designates the `addItem` method that takes a `String` and an `int` as parameters\
    \ and returns `void`.\n\nThe previous expressions are regular expressions that\
    \ follow the syntax defined by the GNU regexp library.\n\n#### Regular Expressions\n\
    \nJAC uses the GNU regexp library (see http://www.cacas.org/java/gnu/regexp) to\
    \ deal with regular expressions. This library defines a syntax for regular expressions\
    \ and provides an API to check whether a string matches a given regular expression.\n\
    \n**Operators**\n\nThe GNU regexp library defines several operators for writing\
    \ pattern expressions. However, this section focuses only on the main operators.\
    \ For additional information, see the documentation on the GNU regexp Library\
    \ web site.\n\nThe dot (`.`) operator provides a shortcut for designating any\
    \ character. The `*` and `+` operators allow you to designate repetitions of a\
    \ given expression. The `*` operator matches zero or *n* repetitions of an expression,\
    \ whereas `+` matches at least one repetition of an expression. The `.*` expression\
    \ is widely used; it matches any sequence of characters.\n\nThe `[]` operator\
    \ is used to designate a set of characters. For example, the expression `[abc]`\
    \ matches any of the characters *a*, *b*, or *c*. The `^` operator is equivalent\
    \ to a Boolean NOT operator. The expression `[^abc]` matches any character except\
    \ *a*, *b*, or *c*. Intervals can be defined in sets by using the minus operator\
    \ (`-`). For example, the expression `[d-m]` matches any lowercase letter between\
    \ *d* and *m*, inclusive.\n\n**JAC Operators**\n\nIn addition to the operators\
    \ provided by the GNU regexp library, JAC defines four operators that can be used\
    \ in pointcut expressions: `ALL`, `&&`, `||`, and `!`. The `ALL` operator is a\
    \ shortcut for `.*`, and the three remaining operators correspond to the Boolean\
    \ AND, OR, and NOT operators, respectively.\n\n**Examples of Regular Expressions**\n\
    \nThis section illustrates how to use GNU regular expressions with JAC.\n\nThe\
    \ method expression `set.*:void` selects all the methods that have a signature\
    \ starting with `set` and ending with `:void` (the method returns `void`), regardless\
    \ of the parameters.\n\nThe method expression `set.*(java.lang.String):void` selects\
    \ all the methods that have a name starting with `set`, that take a `String` as\
    \ a parameter, and that have a return type of `void`.\n\nThe method expression\
    \ `get.*():.*` selects all the methods that have a name starting with `get` and\
    \ that take no parameters, regardless of the return type.\n\nThe class expression\
    \ `ALL` selects all the existing classes.\n\n#### Method-Type Operators\n\nThe\
    \ purpose of method-type operators is to classify and select methods according\
    \ to their impact on the object state. For example, the you might want to select\
    \ all the methods that modify the object state by setting the value of a given\
    \ field. (Such methods are called *setters*.) In approaches such as that of JavaBeans,\
    \ the definition of a setter relies on naming conventions. In other words, the\
    \ names of all setters must start with `set`. Whatever the body of such a method\
    \ is, the method is considered a setter. Conversely, a method with a name that\
    \ does not start with `set` is not considered a setter—even if the method sets\
    \ a field. This can lead to counterintuitive naming schemes. For example, a method\
    \ that computes and sets the amount of an order must be named `setAmount` if you\
    \ want JavaBeans to consider the method a setter—even if `computeAmount` would\
    \ be more intuitive and logical.\n\nTo detect setters and getters, JAC relies\
    \ on a bytecode analysis performed with the Byte Code Engineering Library (BCEL).\
    \ (See http://jakarta.apache.org/bcel.) When a class is loaded, its bytecode is\
    \ immediately analyzed. For example, when the opcode for reading a field is present\
    \ in a method body, metadata is attached to the method to classify it as a getter.\
    \ This metadata is made available when you write a pointcut.\n\nThe following\
    \ method-type operators are defined by JAC:\n\n- `ACCESSORS`: This operator selects\
    \ each method that reads one or more fields defined in its class.\n- `MODIFIERS`:\
    \ This operator selects each method that writes one or more fields defined in\
    \ its class.\n- `GETTERS(list)`: This operator selects each method that returns\
    \ the value of any of the fields mentioned in the given list. The list is a comma-separated\
    \ list of fields, as in `GETTERS(name,address)`.\n- `SETTERS(list)`: This operator\
    \ selects each method that sets the value of any of the fields mentioned in the\
    \ given list. The value must have been passed to the method as a parameter.\n\n\
    All the previously listed operators can be combined with those defined by the\
    \ GNU regexp library.\n\nThe following expression selects the methods that perform\
    \ a write operation on a field, the methods that return the value of the `age`\
    \ field, and the methods that have a name starting with `compute`:\n\n```\nMODIFIERS\
    \ || GETTERS(age) || compute.*\n```\n\nTo further illustrate these operators,\
    \ consider the `Person` class that is shown in Listing 4-6.\n\n**Listing 4-6.**\
    \ *An Illustration of Method-Type Operators with the Person Class*\n\n```\npublic\
    \ class Person {\n    private String name;\n    private int age;\n\n    public\
    \ void birthday() { age++; }\n    public String whatIsYourNamePlease() { return\
    \ name; }\n    public void foo(String first,String last) { name=first+last; }\n\
    \    public void bar(String name) { this.name=name; }\n}\n```\n\nThe four previously\
    \ listed operators define the following selections:\n\n- `ACCESSORS` selects the\
    \ `whatIsYourNamePlease` and `birthday` methods. The `birthday` method reads the\
    \ `age` field before incrementing it, and the `whatIsYourNamePlease` method reads\
    \ the `name` field before returning it.\n- `MODIFIERS` selects the `birthday`,\
    \ `foo`, and `bar` methods. These methods modify one of the fields that is defined\
    \ in the `Person` class.\n- `GETTERS(name)` selects the `whatIsYourNamePlease`\
    \ method, which returns the value of the `name` field.\n- `SETTERS(name)` selects\
    \ the `bar` method, which sets the `name` field with a value that is passed as\
    \ a parameter. This last condition is important for qualifying the method as a\
    \ setter. Indeed, the `foo` method also sets the field `name`, but it does so\
    \ with a value that is \"passed\" indirectly as a parameter. (In other words,\
    \ the value is obtained through string concatenation.) Therefore, the `foo` method\
    \ is considered not a setter but a modifier.\n\nTwo additional operators exist\
    \ that classify methods depending on their behavior with collections (for example,\
    \ with fields that implement the `java.util.Collection` interface):\n\n- `ADDERS(list)`:\
    \ This operator selects the methods that add an element to a collection. The added\
    \ element must have been passed to the method as a parameter. The given list is\
    \ a comma-separated list of collection fields.\n- `REMOVERS(list)`: This operator\
    \ selects the methods that remove an element from a collection. The removed element\
    \ must have been passed to the method as a parameter.\n\n### Associating a Wrapper\
    \ with a Pointcut\n\nIn the examples of the `TraceAspect` and `TraceAspect2` aspects,\
    \ you learned that the `pointcut` method defines pointcuts. The first parameters\
    \ passed to this method are expressions that deal with the definitions of the\
    \ classes, objects, and methods included in the pointcut. In this section, we\
    \ present the three cases in which a wrapper can be associated with a pointcut.\n\
    \nIn the first and most frequent case, defining the wrapper requires two parameters:\
    \ `wrapperClassName`, which is a string that defines the wrapper class name; and\
    \ `one2one`, which is a Boolean value. The wrapper class must be a subclass of\
    \ `org.objectweb.jac.core.Wrapper`. In all cases, JAC dynamically instantiates\
    \ the specified `wrapperClassName` class. When this instantiation occurs, it depends\
    \ on the value of `one2one`:\n\n- A value of `false` causes all the joinpoints\
    \ included in the pointcut to share the same wrapper. In this case, the wrapper\
    \ is a singleton.\n- A value of `true` causes each joinpoint included in the pointcut\
    \ to be associated with a dedicated instance of the wrapper class.\n\nThe value\
    \ `false` generates fewer objects and thus saves memory. However, if the wrapper\
    \ is stateful and the state depends on the joinpoint, the sharing can lead to\
    \ inconsistencies. In such a case, it is easier to have one dedicated instance\
    \ of a wrapper for each joinpoint and use the value `true` for `one2one`.\n\n\
    The second case is rather similar to the first. Three parameters instead of two\
    \ must be passed to define the wrapper. They are the wrapper class name; the Boolean\
    \ `one2one`; and `initParameters`, which is an array of objects. This last parameter\
    \ contains the initial values that must be passed when instantiating the wrapper.\n\
    \nWith the last case, you pass a unique parameter named `wrappee`. This parameter\
    \ must implement the `org.objectweb.jac.core.Wrapper` type. The instance will\
    \ be used to wrap all the joinpoints included in the pointcut. This case is useful\
    \ when the wrapper cannot be easily created by the framework, or when you want\
    \ to use a customized instance of a wrapper.\n\n## Creating Wrappers\n\nIn the\
    \ previous section, you learned how to define a pointcut with JAC. In this section,\
    \ you will learn how to write wrappers.\n\nProgramming an aspect with JAC consists\
    \ of writing at least two classes: one (such as `TraceAspect2`) for the definition\
    \ of pointcuts, and one for each wrapper associated with a pointcut. This allows\
    \ you to easily reuse pointcut definitions independently from wrappers and vice\
    \ versa.\n\nWrapper classes with JAC must extend the `org.objectweb.jac.core.Wrapper`\
    \ class, which is the root class of all existing wrappers. All wrappers are \"\
    around\" wrappers.\n\nWrapper instances are created either by JAC or by you when\
    \ you define the pointcuts. In all cases, a link is maintained between the aspect\
    \ and the wrapper instances. This link comes into existence when a wrapper is\
    \ instantiated; the wrapper provides a constructor that takes the instance of\
    \ the associated aspect as a parameter. This parameter implements the `org.objectweb.jac.core.AspectComponent`\
    \ type, which is the root class of all JAC aspects.\n\nA typical definition of\
    \ a wrapper class starts with the following lines of code:\n\n```\nimport org.objectweb.jac.core.AspectComponent;\n\
    import org.objectweb.jac.core.Wrapper;\n\npublic class MyWrapper extends Wrapper\
    \ {\n    public MyWrapper(AspectComponent ac) { super(ac); }\n```\n\nWith JAC,\
    \ two types of joinpoints exist: method executions and constructor executions.\
    \ The \"before\" and \"after\" code that is executed around these joinpoints is\
    \ defined in the `invoke` and `construct` methods, which are presented in the\
    \ following sections.\n\n### Methods\n\nThe code that is executed before and after\
    \ a method-execution joinpoint is defined in the `invoke` method. This method\
    \ takes a unique parameter that implements the `MethodInvocation` type, returns\
    \ an `Object`, and throws the `Throwable` type. The definition of `MethodInvocation`\
    \ is detailed in the \"Joinpoint Introspection\" section later in this chapter.\
    \ The declaration of the `invoke` method is shown here:\n\n```\npublic Object\
    \ invoke( MethodInvocation mi ) throws Throwable;\n```\n\nThe `proceed` method\
    \ can be called by the `invoke` method to execute the intercepted method. Several\
    \ aspects can be woven around the same joinpoint. In such a case, a chain of wrappers\
    \ is created around the joinpoint. The `proceed` method executes the next wrapper\
    \ in the chain or, if the end of the chain is reached, the intercepted method.\n\
    \nThe `proceed` method can be called several times in the same `invoke` method.\
    \ In such a case, several executions of the same method are performed. This can\
    \ be useful when you need to rerun a method that previously failed.\n\nOn the\
    \ other hand, the `proceed` method might never be called. In such a case, the\
    \ intercepted method is not executed, and the call is returned to the caller.\n\
    \nThe general format of the `invoke` method is shown in Listing 4-7.\n\n**Listing\
    \ 4-7.** *The General Format of the invoke Method*\n\n```\npublic Object invoke(\
    \ MethodInvocation mi ) throws Throwable {\n    // before code\n    Object ret\
    \ = proceed(mi);\n    // after code\n    return ret;\n}\n```\n\nThe `invoke` method\
    \ is mandatory—even if no code is defined.\n\n### Constructors\n\nLike method\
    \ executions, constructor executions can be aspectized with the `construct` method.\
    \ The signature of this method is as follows:\n\n```\npublic Object construct(\
    \ ConstructorInvocation ci ) throws Throwable;\n```\n\nThe `proceed` method plays\
    \ the same role for `construct` as for `invoke`. No particular characteristics\
    \ distinguish `invoke` from `construct`, except the difference in their names.\n\
    \n## Joinpoint Introspection\n\nThe term *introspection* refers to examining the\
    \ inner cause of a given phenomenon and gaining information about it. In the context\
    \ of AOP, the phenomenon is the joinpoint, and you want to retrieve information\
    \ about the part of the actual program that allows the joinpoint to occur.\n\n\
    With JAC, the introspection mechanism is made available by the `MethodInvocation`\
    \ and `ConstructorInvocation` parameters that are passed when the `invoke` and\
    \ `construct` methods are called. These types are defined in the AOP Alliance\
    \ API, which is included in JAC.\n\nFigure 4-1 illustrates the interface hierarchy\
    \ that defines `MethodInvocation` and `ConstructorInvocation`.\n\n**Figure 4-1.**\
    \ *The `org.aopalliance.intercept` interface hierarchy*\n\nThe `JoinPoint` interface\
    \ is the root type for all interceptions. For each joinpoint, three methods are\
    \ defined: `proceed`, which executes the joinpoint; `getThis`, which returns the\
    \ object where the joinpoint occurred; and `getStaticPart`, which returns the\
    \ code element defining the joinpoint. This code element can be either a method\
    \ or a constructor. It is represented by the `java.lang.reflect.AccessibleObject`\
    \ class which, in the J2SE reflection API, is the superclass of all the code elements\
    \ where reflection applies.\n\nThe `Invocation` interface extends `JoinPoint`\
    \ with the `getArguments` method to manipulate the arguments of the intercepted\
    \ execution. These arguments are returned as an array of objects that can be read\
    \ or written.\n\nThe last two interfaces, `ConstructorInvocation` and `MethodInvocation`,\
    \ correspond to constructor executions and method executions. Each provides a\
    \ method that returns the intercepted constructor (as a parameter of type `java.lang.reflect.Constructor`)\
    \ or the intercepted method (as a parameter of type `java.lang.reflect.Method`).\n\
    \n## Wrapper Chains\n\nSeveral wrappers can be attached to the same joinpoint.\
    \ These wrappers are referred to as *chained*. In a wrapper, the call to `proceed`\
    \ executes the next wrapper in the chain. When the end of the chain has been reached,\
    \ the joinpoint will be executed.\n\nFigure 4-2 illustrates this mechanism with\
    \ a chain of three wrappers. Each arrow represents either a method call or a method\
    \ return. The arrows are numbered to indicate the execution-flow order.\n\n**Figure\
    \ 4-2.** *Execution order in a wrapper chain*\n\nThe initial call is passed to\
    \ the first wrapper in the chain which, in turn, executes the \"before\" code.\
    \ The first and second calls to `proceed` (arrows 2 and 3) execute the next wrapper\
    \ in the chain. When the execution flow reaches the third wrapper, the call to\
    \ `proceed` executes the joinpoint (arrow 4). After the execution of the joinpoint,\
    \ the execution flow returns to the third wrapper (arrow 5) which, in turn, executes\
    \ the \"after\" code. Next, the \"after\" code for the second and first wrappers\
    \ is executed and, last, the call is returned.\n\n## Configuring Aspects and JAC\
    \ Applications\n\nConfiguration is another key mechanism of JAC. This feature\
    \ allows aspects to be reused efficiently. This section presents the syntax of\
    \ both aspect-configuration files and application-descriptor files.\n\n### Configuring\
    \ Aspects\n\nEach aspect that is defined with JAC is associated with a text-based\
    \ aspect-configuration file. The extension for this type of file is `.acc`.\n\n\
    An aspect-configuration file provides the parameters that are required to adapt\
    \ the aspect to a new application. For example, the purpose of this file for a\
    \ transaction aspect is to define which methods in the application are to be executed\
    \ in a transactional context.\n\nThe notion of an aspect-configuration file exists\
    \ in other approaches, such as that of J2EE. In J2EE, aspect-configuration files\
    \ provide certain parameter values that tailor the system services to the specific\
    \ needs of the application. By configuring the services that are provided by the\
    \ application server, it is possible to reuse them with different applications.\
    \ Although the syntax of aspect-configuration files differs between J2EE and JAC\
    \ (in the case of J2EE, the files are XML files), the purpose is the same: allowing\
    \ you to customize the aspects for the application and later modify the customization\
    \ without having to recompile the application.\n\nThe purpose of an aspect-configuration\
    \ file is to define a list of method calls. These calls are passed from JAC to\
    \ the aspect just after the aspect's instantiation. You choose the steps that\
    \ are required to configure the aspect, and the calls perform any configuration\
    \ treatment that you define.\n\nMany possibilities are available when configuring\
    \ aspects. For example, it is possible to configure complex aspects, such as the\
    \ GUI aspect, that would not be possible with an approach based only on parameters\
    \ and values. The power of the GUI aspect lies in its configuration methods which,\
    \ when called from the configuration file, construct the graphical appearance\
    \ of an application. (For more information on the GUI aspect, see the \"Using\
    \ the JAC Aspects Library\" section later in this chapter.)\n\n#### The Syntax\
    \ of Aspect-Configuration Files\n\nAn aspect-configuration file defines the aspect\
    \ methods that must be called when the aspect is instantiated.\n\nEach line in\
    \ the file begins with the name of the method to call, continues with the values\
    \ of the given parameters, and ends with a semicolon. The parameters are specified\
    \ in a space-separated list. String parameters must be written between double\
    \ quotes, and arrays must be written between brackets.\n\nComments in aspect-configuration\
    \ files follow the same syntactic rules that Java does. You can include other\
    \ files in an aspect-configuration file by using the `include` keyword.\n\n####\
    \ An Example of an Aspect-Configuration File\n\nConsider the `PresentationAC`\
    \ aspect that is shown in Listing 4-8.\n\n**Listing 4-8.** *The PresentationAC\
    \ Aspect Component*\n\n```\npackage aop.jac;\n\nimport org.objectweb.jac.core.AspectComponent;\n\
    \npublic class PresentationAC extends AspectComponent {\n\n    public void display()\
    \ { /* ... */ }\n\n    public void setAttributesOrder(\n        String className,\n\
    \        String[] attributeNames ) { /* ... */ }\n\n    public void setCategory(\n\
    \        String className,\n        String[] attributeNames,\n        String value\
    \ ) { /* ... */ }\n}\n```\n\n`PresentationAC` defines the `setAttributesOrder`\
    \ method to specify the display order for the attributes of the given `classname`\
    \ class. This order is defined by the `attributeNames` array, which contains the\
    \ attribute names.\n\nThe aspect-configuration file, named `presentation.acc`,\
    \ contains the following lines:\n\n```\nsetAttributesOrder Customer { lastName,\
    \ firstName, phone, email };\nsetCategory Customer { lastName, firstName } main;\n\
    display ;\n```\n\nThis aspect-configuration file calls the `setAttributesOrder`\
    \ method and then calls the `display` method. The first call takes the value `Customer`\
    \ for the `classname` parameter, and it takes the values `lastName`, `firstName`,\
    \ `phone`, and `email` for the `attributeNames` array. No parameters are defined\
    \ for the call to the `display` method.\n\n#### Grouping Parameters in Aspect-Configuration\
    \ Files\n\nGrouping parameters introduces some so-called \"syntactic sugar\" into\
    \ aspect-configuration files.\n\nThe syntax for grouping parameters is as follows:\n\
    \n```\ngroup <value> {\n    <method> [ <parameter> ... ] ;\n    ...\n}\n```\n\n\
    When a group is used, the given value is added as the first parameter for every\
    \ call that is specified between the curly brackets. Grouping parameters can be\
    \ used to avoid redundancies—especially in cases that use the same value for several\
    \ successive calls.\n\nThe following configuration file, named `presentation2.acc`,\
    \ is equivalent to `presentation.acc`:\n\n```\ngroup Customer {\n    setAttributesOrder\
    \ { lastName, firstName, phone, email };\n    setCategory { lastName, firstName\
    \ } main;\n}\ndisplay ;\n```\n\nStrictly speaking, `group` is not a keyword; it\
    \ is an identifier that you can freely choose. Any identifier that is not a method\
    \ name and that is defined in the aspect can be chosen for defining a group.\n\
    \nDefinitions that use the grouping mechanism can be nested. For example, the\
    \ aspect-configuration file\n\n```\ngroup Customer {\n    attribute lastName {\n\
    \        setCategory General ;\n    }\n}\n```\n\nis equivalent to\n\n```\nsetCategory\
    \ Customer lastName General ;\n```\n\nDefinitions that use the grouping mechanism\
    \ can be factored. For example, the aspect-configuration file\n\n```\ngroup Customer,Employee\
    \ {\n    setAttributesOrder { lastName, firstName, phone, email };\n}\n```\n\n\
    is equivalent to\n\n```\nsetAttributesOrder Customer { lastName, firstName, phone,\
    \ email };\nsetAttributesOrder Employee { lastName, firstName, phone, email };\n\
    ```\n\n### Configuring JAC Applications\n\nA JAC application-descriptor file is\
    \ a text file that provides information about launching the application. It defines\
    \ a set of property names and values that is loaded by JAC when the end user starts\
    \ the application. The extension `.jac` is commonly used for application-descriptor\
    \ files.\n\nEach line in an application-descriptor file starts with the name of\
    \ a property followed by a colon and ends with the property value. The backslash\
    \ character (`\\`) can be used to continue the definition of the value to next\
    \ line.\n\nFor example, the application-descriptor file\n\n```\napplicationName:\
    \ Order management\nlaunchingClass: \\\n    aop.jac.Customer\n```\n\ndefines the\
    \ values \"Order management\" and \"aop.jac.Customer\" for the `applicationName`\
    \ and `launchingClass` properties, respectively.\n\nLines starting with the pound-sign\
    \ character (`#`) are interpreted as comments.\n\nTable 4-1 presents the list\
    \ of properties that can be used in an application-descriptor file.\n\n**Table\
    \ 4-1.** *JAC Application-Descriptor Properties*\n\n| Property | Definition |\n\
    |---|---|\n| `applicationName` | The application name |\n| `launchingClass` |\
    \ The main class name |\n| `aspects` | A series of three values for defining the\
    \ aspect identifiers, the aspect-configuration files, and the Boolean values that\
    \ specify whether the aspects are initially woven |\n| `jac.acs` | A series of\
    \ two values for defining the aspect identifiers and the classes that implement\
    \ those aspects |\n| `jac.comp.wrappingOrder` | The weaving order when several\
    \ wrappers apply to the same joinpoint |\n| `jac.topology` | For distributed applications,\
    \ the names of the hosts where the application is deployed |\n\n## Using the Introduction\
    \ Feature\n\nYou can extend the structure of an application by using the *introduction*\
    \ feature to add new code elements. JAC can *introduce*, or add, two categories\
    \ of these elements: role methods and exception handlers.\n\n### Role Methods\n\
    \nYou introduce a *role method* to define new behaviors.\n\nA role method is defined\
    \ in a wrapper class. You can choose the name, signature, and return type of the\
    \ method. However, the first parameter must be `org.objectweb.jac.core.Wrappee`.\
    \ This parameter corresponds to the application object where the method will be\
    \ introduced.\n\nThe wrapper shown in Listing 4-9 illustrates the definition of\
    \ a role method.\n\n**Listing 4-9.** *The Definition of a Role Method*\n\n```\n\
    package aop.jac;\n\nimport org.aopalliance.intercept.ConstructorInvocation;\n\
    import org.aopalliance.intercept.MethodInvocation;\nimport org.objectweb.jac.core.AspectComponent;\n\
    import org.objectweb.jac.core.Wrappee;\nimport org.objectweb.jac.core.Wrapper;\n\
    \npublic class TraceWrapper4 extends Wrapper {\n\n    public TraceWrapper4(AspectComponent\
    \ ac) { super(ac); }\n\n    public void computeAmountAndPrint( Wrappee o, String\
    \ header ) {\n        double amount = ((Order)o).computeAmount();\n        System.out.println(header+amount);\n\
    \    }\n\n    public Object construct(ConstructorInvocation ci) throws Throwable\
    \ {\n        return proceed(ci);\n    }\n\n    public Object invoke(MethodInvocation\
    \ mi) throws Throwable {\n        return proceed(mi);\n    }\n}\n```\n\nThe `computeAmountAndPrint`\
    \ method can be introduced in the `Order` class to compute and print the amount\
    \ of an order. The first parameter, `o`, is the instance of the `Order` class\
    \ where the role method is invoked. The second parameter, `header`, is a string\
    \ that is printed before the amount.\n\nA role method can be called by the `invokeRoleMethod`\
    \ method, which is defined in the `org.objectweb.jac.core.Wrappee` class. This\
    \ method takes three parameters: the instance that receives the call, the name\
    \ of the role method, and the array of objects to pass as parameters to the method.\n\
    \nFor example, the code block\n\n```\nWrapping.invokeRoleMethod(\n    (Wrappee)o,\
    \ \"computeAmountAndPrint\", new Object[]{\">> \"});\n```\n\ncorresponds to calling\
    \ the `computeAmountAndPrint` method for the object `o` with the string \">>\"\
    \ as a parameter.\n\n### Exception Handlers\n\nException handlers enable you to\
    \ modularize the treatments that are attached to exceptions. Rather than scattering\
    \ several versions of a `try/catch` block in the application code, you can usually\
    \ write the code that is defined in the `catch` block in a unique and well-defined\
    \ entity: the exception handler.\n\nThe exception handler is defined in a wrapper\
    \ and catches exceptions that are generated by joinpoints or wrappers. The handler\
    \ is declared when you call the `pointcut` method to define a pointcut. The signature\
    \ of the `pointcut` method is imposed, a unique parameter of type `Exception`\
    \ must be defined, and the return type must be `Object`. The name of the exception\
    \ handler can be freely chosen.\n\nEach defined exception handler can be dedicated\
    \ to handling a particular type of exception. For example, one handler can treat\
    \ the `IOException`, whereas another handles network exceptions.\n\nThe `TraceAspect5`\
    \ aspect, which is shown in Listing 4-10, illustrates the definition of an exception\
    \ handler.\n\n**Listing 4-10.** *An Example of a Role Method and an Exception\
    \ Handler*\n\n```\npackage aop.jac;\n\nimport org.aopalliance.intercept.ConstructorInvocation;\n\
    import org.aopalliance.intercept.MethodInvocation;\nimport org.objectweb.jac.core.AspectComponent;\n\
    import org.objectweb.jac.core.Wrapper;\n\npublic class TraceAspect5 extends AspectComponent\
    \ {\n\n    public TraceAspect5() {\n        pointcut(\n            \"ALL\",\"\
    ALL\",\"ALL\", \"aop.jac.TraceWrapper4\",\n            \"myIOExceptionHandler\"\
    , false );\n    }\n}\n\npublic class TraceWrapper5 extends Wrapper {\n\n    public\
    \ TraceWrapper5(AspectComponent ac) { super(ac); }\n\n    public Object myIOExceptionHandler(Exception\
    \ e) throws Exception {\n        System.out.println( \"Exception \"+e.getMessage()+\"\
    raised\" );\n        if ( ! (e instanceof java.io.IOException) )\n           \
    \ throw e;\n        return null;\n    }\n\n    public Object construct(ConstructorInvocation\
    \ ci) throws Throwable {\n        return proceed(ci);\n    }\n\n    public Object\
    \ invoke(MethodInvocation mi) throws Throwable {\n        return proceed(mi);\n\
    \    }\n}\n```\n\nThe call to `pointcut` specifies that the `myIOExceptionHandler`\
    \ method, which is defined in the `aop.jac.TraceWrapper5` class, will handle exceptions\
    \ for the joinpoints and wrappers that are included in the pointcut. This pointcut\
    \ includes all the methods, classes, and objects that are defined in the application.\
    \ If the type is not `IOException`, the `myIOExceptionHandler` method displays\
    \ a message and propagates the exception.\n\nSeveral exception handlers can be\
    \ defined for a given joinpoint; in such a case, they are chained. If a handler\
    \ propagates the exception, the next handler in the chain is executed. If all\
    \ the handlers propagate the exception, the application exits.\n\n## Using the\
    \ JAC Aspects Library\n\nA library containing 16 different aspects is distributed\
    \ with JAC. The purpose of this library is to aid application developers by providing\
    \ ready-to-use solutions for commonly encountered problems. Several aspects are\
    \ provided with the library to demonstrate that AOP can be applied to the development\
    \ of many different types of applications. The aspects provided in the library\
    \ permit you to quickly program a prototype or a demonstration. When used in an\
    \ operational context, however, you must improve and complete these aspects.\n\
    \nAmong the 16 available aspects, the following are mature enough to be used in\
    \ an operational context:\n\n- GUI aspect\n- Authentication aspect\n- User-profile\
    \ aspect\n- Confirmation aspect\n- Persistence aspect\n- Integrity aspect\n\n\
    The following sections present the 16 aspects grouped into 4 categories: user-interface\
    \ aspects, persistence and transaction aspects, distribution aspects, and other\
    \ aspects.\n\n### Using the User-Interface Aspects\n\nThe GUI aspect is one of\
    \ the most original aspects provided by JAC. The purpose of this aspect is to\
    \ define the graphical user interface of the application.\n\nTwo versions of the\
    \ GUI aspect are provided: Swing and HTML/servlet. They both support the same\
    \ configuration methods. Therefore, the end user can interact with the application\
    \ through a Swing interface or a web browser.\n\nThe `org.objectweb.jac.aspects.gui.GuiAC`\
    \ class implements the GUI aspect.\n\n#### Overview of the GUI Aspect\n\nFigures\
    \ 4-3 and 4-4 illustrate the GUI aspect. The sample application manages invoices\
    \ and clients. Invoices and clients can be added and removed. Each invoice is\
    \ linked to a client. The application can list either the existing clients with\
    \ their corresponding invoices or the current invoices with their associated clients.\
    \ (For more details on this application, see the JAC web site at http://jac.objectweb.org.\
    \ Click Documentation, and then click JAC Tutorial.) Figure 4-3 is a snapshot\
    \ of the Swing version of the application, whereas Figure 4-4 is a snapshot of\
    \ the HTML/servlet version. Both versions contain the same Java code and aspect-configuration\
    \ file. The only difference lies in the launching option that is passed to JAC\
    \ and that starts either the Swing GUI aspect or the HTML/servlet one.\n\n**Figure\
    \ 4-3.** *Swing version of the GUI aspect*\n\n**Figure 4-4.** *HTML/servlet version\
    \ of the GUI aspect*\n\n#### Overview of Other User-Interface Aspects\n\nIn addition\
    \ to the `GuiAC` aspect, the following aspects are available to handle interactions\
    \ between the user and the application:\n\n- **Authentication aspect**: The `AuthenticationAC`\
    \ aspect manages access control lists. Method executions can be restricted to\
    \ authorized users.\n- **User-profile aspect**: The `UserAC` aspect manages user\
    \ profiles.\n- **Session-management aspect**: The `SessionAC` aspect manages user\
    \ sessions. Data that is dedicated to each individual user of the application\
    \ can be stored and kept in memory while the user is connected to the application.\n\
    - **Confirmation aspect**: The `ConfirmationAC` aspect displays dialog boxes that\
    \ ask for confirmation from the user.\n\n### Using the Persistence and Transaction\
    \ Aspects\n\nThe persistence aspect permits the saving of data in files or databases.\
    \ This aspect is used to safely store any critical data that is used by an application.\n\
    \nThe transaction aspect provides a way to safely execute an action or a group\
    \ of actions. A typical example of a *transaction* is a transfer between two bank\
    \ accounts. In this case, the transfer must be completed or the part of the transaction\
    \ that was already performed will be canceled.\n\nBoth the persistence and transaction\
    \ aspects use databases. The persistence aspect uses databases to safely save\
    \ data; the transaction aspect uses databases to guarantee the properties of atomicity,\
    \ coherence, isolation, and durability.\n\nJAC provides two versions of the persistence\
    \ aspect: `PersistenceAC` and `HibernateAC`. `PersistenceAC` uses JDBC to save\
    \ data in a file or database; `HibernateAC` uses the Hibernate (http://hibernate.bluemars.net)\
    \ persistence framework.\n\nJAC provides two versions of the transaction aspect:\
    \ `TransactionAC` and `DisTransAC`. `TransactionAC` performs simple transactions\
    \ on objects that are stored in memory. This aspect does not manage data locking;\
    \ hence, concurrent executions may give inconsistent results. `DisTransAC` uses\
    \ the ObjectWeb Java Open Transaction Monitor (JOTM) transaction monitor. JOTM\
    \ implements a two-phase validation protocol on data that is stored in databases\
    \ and that can be distributed on different hosts of a network. (For more information\
    \ about JOTM, see http://jotm.objectweb.org.)\n\n### Using the Distribution Aspects\n\
    \nJAC provides a set of aspects for executions that occur on hosts distributed\
    \ over a network and for data that exists on such hosts. In this case, the application\
    \ objects interact remotely with an aspect that implements communications based\
    \ on the Java Remote Method Invocation (RMI) protocol. A prototype implementation\
    \ of this aspect that is based on Common Object Request Broker Architecture (CORBA)\
    \ Internet Inter-ORB Protocol (IIOP) is also available.\n\nPrior to the execution\
    \ of a distributed application, JAC daemon servers must be launched on all the\
    \ hosts that will take part in the application. Then, the following aspects can\
    \ be used to implement distributed applications:\n\n- **Deployment aspect**: The\
    \ `DeploymentAC` aspect deploys an application on a set of remote hosts. Starting\
    \ from a reference host, the deployment process consists of uploading the bytecode\
    \ of the classes onto selected hosts and then copying or instantiating the application\
    \ objects on these hosts. Alternatively, `DeploymentAC` can install replicas of\
    \ given objects onto different hosts. This feature constitutes the basic mechanism\
    \ for providing fault-tolerant applications—whenever a host holding one of the\
    \ replicas fails, any of the other hosts that are still running can replace the\
    \ faulty host.\n- **Consistency aspect**: The `ConsistencyAC` aspect implements\
    \ a memory-consistency protocol among replicas. The chosen protocol provides strong\
    \ consistency—as soon as one of the replicas is modified, the modification is\
    \ propagated to all the other replicas. The goal is to keep all the replicas synchronized\
    \ with the same data.\n- **Broadcasting aspect**: The `BroadcastingAC` aspect\
    \ broadcasts a method call to a set of distributed replicas.\n- **Load-balancing\
    \ aspect**: The `LoadBalancingAC` aspect distributes requests to a set of replicas.\
    \ By using this aspect, you take advantage of the computing power of several hosts.\
    \ This aspect implements a simple round-robin algorithm for the load balancing.\n\
    \nThe distribution aspects can be used to distribute both application objects\
    \ and aspect objects. Indeed, when managed by JAC, these types of objects contain\
    \ no fundamental differences. Hence, aspect objects can be remotely deployed or\
    \ replicated with `DeploymentAC`, and the different replicas can be managed by\
    \ `ConsistencyAC`.\n\nImplementing a distributed application with JAC is not limited\
    \ to using the four distribution aspects but also involves defining pointcuts.\
    \ In the \"Creating Pointcuts\" section earlier in this chapter, you learned that\
    \ you must provide three expressions to define a pointcut. These expressions define\
    \ the objects, classes, and methods that are included in the pointcut. A fourth\
    \ expression, called a *host expression*, comes into play when you program distributed\
    \ applications.\n\nThe host expression is a regular expression that specifies\
    \ the hosts that are included in the pointcut. The joinpoints are filtered according\
    \ to the objects, classes, methods, and hosts where the joinpoints occur. Pointcuts\
    \ are then distributed and can include joinpoints located on different hosts.\n\
    \n### Using Other Aspects\n\nTo conclude this presentation of the JAC aspects\
    \ library, we present the following general-purpose aspects that are useful in\
    \ several application contexts:\n\n- **Cache aspect**: The `CacheAC` aspect caches\
    \ method results. When cached, the results can be reused without the re-execution\
    \ of the methods. This speeds up the execution time of the application by avoiding\
    \ unnecessary executions.\n- **Integrity aspect**: The `IntegrityAC` aspect implements\
    \ referential-integrity constraints between sets of data. This aspect prevents\
    \ the accidental deletion of data that is linked by a logical constraint. For\
    \ example, when managing clients and invoices, the end user must not accidentally\
    \ delete a client if invoices are still associated with the client. The `IntegrityAC`\
    \ aspect performs checks that enforce such constraints.\n- **Synchronization aspect**:\
    \ The `SynchronizationAC` aspect manages locks to synchronize the access to methods.\
    \ For example, this aspect ensures that a method is not executed by more than\
    \ one method at a time.\n\n## Programming in UMLAF\n\nUML Aspectual Factory (UMLAF)\
    \ is the standard IDE that is distributed with JAC. This IDE is a rapid application\
    \ development (RAD) environment that allows you to easily and rapidly develop\
    \ applications with JAC. UMLAF uses the Unified Modeling Language (UML) notation\
    \ to design applications.\n\nUMLAF implements only the class diagrams that are\
    \ defined in UML. Although this is far from a full implementation of UML, class\
    \ diagrams are nevertheless the most widely used diagrams at this time. These\
    \ diagrams are sufficient in many cases—especially when aspects come into play.\n\
    \nUMLAF extends the UML notation by adding the notions of an aspect and a pointcut.\
    \ Aspects in UMLAF are considered to be a new kind of modeling element (much like\
    \ classes); pointcuts define a new kind of relationship.\n\nFigure 4-5 displays\
    \ a snapshot of UMLAF. Three classes (`Invoices`, `Invoice`, and `Client`), an\
    \ aspect (`TraceAspect`), and a pointcut are defined.\n\n**Figure 4-5.** *UMLAF—a\
    \ UML RAD tool for aspect-oriented development with JAC*\n\nUMLAF covers the entire\
    \ developmental life cycle of an application. The business core of the application\
    \ can be designed, new aspects can be added, and aspects that are defined in the\
    \ library can be reused. UMLAF automates the writing of aspect-configuration files\
    \ and application descriptors. A code-editing facility is provided. UMLAF generates\
    \ JAC-specific code, compiles applications, and launches applications.\n\nUMLAF\
    \ is an application that was written with JAC. Nine aspects were used for writing\
    \ UMLAF. The most important ones are `GuiAC`, `SessionAC`, `PersistenceAC`, `ConfirmationAC`,\
    \ and `IntegrityAC`.\n\n## Advanced Features\n\nThis section presents the advanced\
    \ features of JAC.\n\n### Aspect Instantiation\n\nWhen programming aspects with\
    \ JAC, you must define two varieties of classes: one for the aspects and another\
    \ for the wrappers. One variety extends `org.objectweb.jac.core.AspectComponent`,\
    \ and the other extends `org.objectweb.jac.core.Wrapper`.\n\nThe cardinality of\
    \ the aspect class is always one. Each aspect is represented by only one instance\
    \ per Virtual Machine (VM). An aspect manager (`org.objectweb.jac.core.ACManager`)\
    \ manages all the aspect instances used by an application and provides features\
    \ to weave aspects into the application.\n\nThe cardinality of the wrapper class\
    \ is somewhat more complex. First, a wrapper can be used in several pointcuts.\
    \ Second, the cardinality varies for each pointcut depending on the value of the\
    \ `one2one` parameter, which is given when you define a pointcut.\n\nWhen `one2one`\
    \ is `false`, only one instance of a wrapper class is created for the pointcut.\
    \ This instance is shared by all the joinpoints that are included in the pointcut.\
    \ When several pointcuts use the same wrapper, each pointcut uses its own instance\
    \ of the wrapper.\n\nWhen `one2one` is `true`, each joinpoint owns an instance\
    \ of the wrapper class.\n\nWhen the application is distributed, these two rules\
    \ are applied on each host. For example, when `one2one` is `false`, one instance\
    \ of a wrapper class exists per pointcut and per host.\n\n### Aspect Ordering\n\
    \nWhen several aspects apply to the same joinpoint, you must define the execution\
    \ order of the aspects. This order can be specified in the application-descriptor\
    \ file with the `jac.comp.wrappingOrder` property, which is an ordered list of\
    \ wrapper-class names. Whenever two wrappers specified in the list apply to the\
    \ same joinpoint, their execution order is the one defined by the list.\n\nFor\
    \ example, the following definition specifies that `AuthenticationWrapper` must\
    \ be executed before `VerboseWrapper`:\n\n```\njac.comp.wrappingOrder: \\\n  \
    \  org.objectweb.jac.aspects.authentication.AuthenticationWrapper \\\n    org.objectweb.jac.wrappers.VerboseWrapper\n\
    ```\n\nThere is no automatic rule that defines which wrapper must be executed\
    \ before another; this decision is up to you. In the previous example, we chose\
    \ to first authenticate calls and then log them. Therefore, only the calls that\
    \ are successfully authenticated will be logged. In a different context, we might\
    \ choose to log every call—even those that are not successfully authenticated.\
    \ Hence, the reverse order would be defined.\n\nWhen the `jac.comp.wrappingOrder`\
    \ property is omitted, no ordering rule is enforced, and the execution order is\
    \ not guaranteed for two wrappers that apply to the same joinpoint.\n\n### RTTI\n\
    \nRun-time type identification (RTTI) can be thought of as an extension of reflection.\
    \ The purpose is to construct a data structure that represents the code elements\
    \ of a Java program. The elements taken into account are classes, methods, and\
    \ fields. RTTI offers the ability to define annotations for these elements. An\
    \ API is provided to set and get these annotations. RTTI is, then, very similar\
    \ to the annotation mechanism introduced by J2SE 5.0—except that annotation can\
    \ be dynamically modified at run time.\n\nYou learned in the \"Method-Type Operators\"\
    \ section earlier in this chapter that pointcut expressions can contain keywords,\
    \ such as `SETTERS` and `REMOVERS`, that select methods according to their behaviors.\
    \ These behaviors, which are determined by a bytecode analysis, are stored as\
    \ annotations in the RTTI API.\n\nThe method-type operators are not the only annotations\
    \ that can be stored in the RTTI API—any programmer-defined property can be stored.\
    \ For example, the `persistent` annotation can be attached to every field that\
    \ needs to be saved in persistent storage. Values can also be stored with the\
    \ properties. For example, the `authorizedUsers` property together with the value\
    \ `10` can be attached to a method to declare that, at most, ten users can concurrently\
    \ execute this method.\n\n### Object Naming\n\nEvery application object created\
    \ by JAC is assigned a unique name to identify it. By default, this name is constructed\
    \ by appending the pound-sign character (`#`) and an instance number to the lowercase\
    \ name of the class. The instance number starts at 0 and is incremented each time\
    \ a new instance is created. For example, `order#0` is assigned to the first instance\
    \ of the `Order` class.\n\nPointcut expressions can select objects depending on\
    \ their names.\n\nThe `org.objectweb.jac.core.NameRepository` class provides a\
    \ repository for all the object names that exist in the application.\n\nThe code\
    \ block in Listing 4-11 displays the name and the reference of every existing\
    \ object in an application programmed with JAC.\n\n**Listing 4-11.** *Using the\
    \ JAC Naming Repository*\n\n```\nRepository rep = NameRepository.get();\nObject[]\
    \ objects = rep.getObjects();\nfor (int i = 0; i < objects.length; i++) {\n  \
    \  String name = rep.getName(objects[i]);\n    System.out.println(name+\" \"+objects[i]);\n\
    }\n```\n\nThe repository can be queried to find the reference associated with\
    \ a name, and vice versa.\n\n### Run Options\n\nEvery application developed with\
    \ JAC must be launched with the `org.objectweb.jac.core.Jac` class, which is defined\
    \ in the `jac.jar` file. Given the name of the application–descriptor file, this\
    \ class launches an application and the associated aspects.\n\nThe `Jac` class\
    \ accepts a number of command-line parameters, which are presented in Table 4-2.\n\
    \n**Table 4-2.** *JAC Command-Line Parameters*\n\n| Category | Option | Comment\
    \ |\n|---|---|---|\n| Main | `-R directory` | Specifies the root directory of\
    \ the JAC installation |\n| Main | `-C classpath` | Specifies the class path for\
    \ launching the application |\n| Information | `-r` | Displays the version number\
    \ of JAC |\n| Information | `-v` | Displays information messages on the behavior\
    \ of JAC |\n| Information | `-d` | Displays debugging information |\n| Information\
    \ | `-L file` | Redirects messages to the specified file |\n| Information | `-h`\
    \ | Displays a help message |\n| GUI | `-G name` | Launches the Swing version\
    \ of the GUI that has the given name |\n| GUI | `-W name[:port]` | Launches the\
    \ HTML/servlet version of the GUI that has the given name and, if specified, uses\
    \ the given port number for the web server |\n\n## Summary\n\nIn this chapter,\
    \ we presented the JAC framework for dynamic aspect-oriented programming. JAC\
    \ does not introduce any new keywords nor a compiler, but it provides a framework\
    \ and an API for programming aspects. In JAC, aspects are run-time entities that\
    \ can be woven and unwoven while an application is running.\n\nAspects are defined\
    \ by extending the `AspectComponent` class which, in JAC, is the root class for\
    \ all aspects. Among other things, this class defines the `pointcut` method for\
    \ defining pointcuts.\n\nPointcuts include two types of joinpoints: method executions\
    \ and constructor executions. These joinpoints are selected by regular expressions\
    \ that filter the set of all classes, methods, objects and, when the application\
    \ is run in distributed mode, hosts. The granularity of a pointcut is the object.\
    \ Hence, some instances of a class can be included in a pointcut but others cannot.\n\
    \nThe code executed before and after a joinpoint is defined in a wrapper. Wrappers\
    \ are classes that implement the AOP Alliance API. They provide methods for the\
    \ interception and introspection of joinpoints.\n\nIn a JAC application, you can\
    \ introduce two kinds of code elements: role methods and exception handlers. Both\
    \ are defined as methods in a wrapper class.\n\nJAC is distributed with a library\
    \ of 16 ready-to-use aspects. These aspects cover a wide range of commonly encountered\
    \ needs—from maintaining persistent data to implementing a GUI. The aspect that\
    \ carries out the latter functionality may be the most original, and it provides\
    \ a way of displaying an application through Swing or a web browser.\n\nThe key\
    \ mechanism for reusing a JAC aspect is aspect configuration. Configuring an aspect\
    \ consists of defining which parameters tailor the aspect to a specific application\
    \ context. Any parameter can be configured; it is up to you to define which part\
    \ of the aspect to make configurable. The configuration can be changed without\
    \ recompiling the aspect or the application. It can even be reloaded while the\
    \ application is running, in which case it dynamically reconfigures the aspects.\n\
    \nJAC is distributed with an IDE named UMLAF. You can design, program, compile,\
    \ and execute a JAC application with this RAD tool. This tool provides a class-diagram\
    \ view of the application that allows you to graphically design classes and aspects\
    \ and their relationships.\n\n# Chapter 5: JBoss AOP\n\n**T**his chapter illustrates\
    \ a third environment for aspect-oriented programming: JBoss AOP. The syntax and\
    \ concepts presented in this chapter correspond to version 1.1.1 of JBoss AOP,\
    \ which is the latest version available at the time of the writing of this book.\n\
    \nJBoss AOP, like JAC, is a framework for AOP. Aspects and advice code blocks\
    \ are written in regular Java, without any new keywords. However, in JBoss AOP,\
    \ pointcuts are defined in XML—unlike JAC, where they are defined in Java. In\
    \ addition, the weaving is dynamic and performed at run time, similar to that\
    \ in JAC.\n\nJBoss AOP was designed and developed by Bill Burke. The JBoss Group—in\
    \ particular, Marc Fleury, the CEO—contributed to the ideas that led to the implementation\
    \ of JBoss AOP. JBoss AOP can be used as a stand-alone framework, or it can be\
    \ included in the JBoss 4.x J2EE application server.\n\nJBoss AOP is open-source\
    \ software released freely under the terms of the GNU Lesser General Public License\
    \ (LGPL). While JBoss AOP is open source, this license allows for the incorporation\
    \ of the software into business products. The JBoss AOP web site is http://www.jboss.org/products/aop.\n\
    \n## Using JBoss AOP: An Introduction\n\nThis section presents an example of an\
    \ aspect-oriented application with JBoss AOP. This example introduces the syntax\
    \ for writing aspects, pointcuts, and advice code.\n\nWe will reuse the order-management\
    \ application that was presented in Chapter 3. The application manages client\
    \ orders. We will implement the same trace aspect that was programmed in Chapter\
    \ 3, but with JBoss AOP. This aspect traces the execution of the application and\
    \ determines the called methods and the order that they are called in.\n\n###\
    \ A First Trace Aspect\n\nThe first aspect written with JBoss AOP monitors each\
    \ ordered item by displaying a message before and after the `addItem` method as\
    \ defined in the `Order` class.\n\nThis aspect is defined by two files: `jboss-aop.xml`\
    \ and `TraceInterceptor.java`. The former is an XML file that defines a pointcut;\
    \ the latter is a Java file that defines the advice code associated with this\
    \ pointcut.\n\nJBoss AOP uses the term *interceptor* instead of *advice code*;\
    \ however, there are no differences between the two. Both define code that will\
    \ be run before and after the joinpoints included in the pointcut.\n\n#### A First\
    \ Pointcut\n\nJBoss AOP pointcuts are defined in an XML file. The preferred file\
    \ name is `jboss-aop.xml`, although this name can be changed.\n\nTwo main XML\
    \ tags are available: `<bind>` to define a pointcut, and `<interceptor>` to define\
    \ the interceptor associated with the pointcut. The \"Pointcuts\" section later\
    \ in this chapter defines the syntax of these tags in more detail.\n\nWe illustrate\
    \ the mechanism for defining pointcuts with the `jboss-aop.xml` file that is shown\
    \ in Listing 5-1.\n\n**Listing 5-1.** *The XML Definition of a Pointcut with JBoss\
    \ AOP*\n\n```\n1 <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n2 <aop>\n3     <bind\n\
    4         pointcut=\"execution(\n5             public void aop.jboss.Order->addItem(java.lang.String,int))\"\
    \n6     >\n7         <interceptor class=\"aop.jboss.TraceInterceptor\" />\n8 \
    \    </bind>\n9 </aop>\n```\n\nAfter the regular header for all XML documents\
    \ (shown on line 1 of Listing 5-1), the `<aop>` tag starts the definition of the\
    \ aspects.\n\nThe tag for defining a pointcut is `<bind>`. The `pointcut` attribute\
    \ (shown on line 4 of Listing 5-1) provides the pointcut expression. In the given\
    \ value, the expression contains the `execution` keyword and a method signature.\
    \ The `execution` keyword denotes the joinpoints where the methods that are associated\
    \ to the given signature are executed. In Listing 5-1, the signature designates\
    \ the `addItem` method defined in the `Order` class. Although not the case in\
    \ this example, the signature can contain wildcards.\n\nThe `<interceptor>` tag\
    \ (shown on line 7 of Listing 5-1) defines the interceptor that is associated\
    \ with the pointcut. In the listing, the corresponding class is `org.jboss.TraceInterceptor`.\n\
    \n#### A First Interceptor\n\nWith JBoss AOP, an interceptor class must implement\
    \ the `org.jboss.aop.advice.Interceptor` interface. This interface defines two\
    \ methods: `getName`, which returns the name of the interceptor, and `invoke`,\
    \ which defines the code to be run before and after the joinpoints.\n\nThe class\
    \ in Listing 5-2 defines the `TraceInterceptor` interceptor that was mentioned\
    \ in the previous pointcut definition.\n\n**Listing 5-2.** *A JBoss AOP Trace\
    \ Interceptor*\n\n```\npackage aop.jboss;\n\nimport org.jboss.aop.advice.Interceptor;\n\
    import org.jboss.aop.joinpoint.Invocation;\nimport org.jboss.aop.joinpoint.MethodInvocation;\n\
    \npublic class TraceInterceptor implements Interceptor {\n\n    public String\
    \ getName() { return \"TraceInterceptor\"; }\n\n    public Object invoke(Invocation\
    \ invocation) throws Throwable {\n        MethodInvocation mi = (MethodInvocation)\
    \ invocation;\n        String methodName = mi.getMethod().getName();\n       \
    \ System.out.println(\"-> Before \"+methodName);\n        Object rsp = invocation.invokeNext();\n\
    \        System.out.println(\"-> After \"+methodName);\n        return rsp;\n\
    \    }\n}\n```\n\nThe `invoke` method is called by the JBoss AOP framework just\
    \ before the occurrence of a joinpoint. The only argument of this call contains\
    \ information about the joinpoint. The return type corresponds to the value returned\
    \ by the aspect.\n\nSeveral types of joinpoints exist with JBoss AOP. In the previous\
    \ pointcut definition, the only type mentioned was that of method executions.\
    \ In the example in Listing 5-2, the `invocation` parameter in the call to `invoke`\
    \ can only denote method executions. The first line in the body of `invoke` performs\
    \ a cast operation to assign `invocation` to the `mi` variable, which is of type\
    \ `MethodInvocation`. The interceptor displays a message, calls the `invokeNext`\
    \ method, displays another message, and returns. The `invokeNext` method plays\
    \ the same role that `proceed` does with AspectJ or JAC—when called, `invokeNext`\
    \ executes the joinpoint.\n\n### Compiling\n\nThe two most convenient ways of\
    \ compiling an application written with JBoss AOP are with the JBoss AOP IDE or\
    \ with Ant.\n\nThe JBoss AOP IDE, which is a plug-in for Eclipse, allows you to\
    \ write, compile, and run JBoss AOP applications inside Eclipse. Instructions\
    \ for installing the JBoss AOP IDE can be found on the JBoss AOP web site at http://www.jboss.org/products/aop.\
    \ This plug-in adds the notion of a JBoss AOP project to Eclipse. You define a\
    \ pointcut either by modifying the `jbossaop.xml` file, which is automatically\
    \ added when the project is created, or by interactively selecting the methods\
    \ in Eclipse that need to be included in the pointcut.\n\nThe second solution\
    \ for compiling a JBoss AOP application is using Ant. Suppose that JBoss AOP is\
    \ installed in the `c:\\jboss-aop-1.1.1` directory. The file that is shown in\
    \ Listing 5-3 and that is named `build.xml` allows you to compile and run the\
    \ order-management application.\n\n**Listing 5-3.** *An Ant File for Compiling\
    \ a JBoss AOP Application*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
    <project default=\"run\" name=\"Gestion de commandes\">\n\n    <property name=\"\
    jboss-aop.root\" value=\"c:\\jboss-aop-1.1.1\"/>\n\n    <target name=\"prepare\"\
    >\n        <path id=\"classpath\">\n            <pathelement path=\".\" />\n \
    \           <fileset dir=\"${jboss-aop.root}/lib\">\n                <include\
    \ name=\"*.jar\" />\n            </fileset>\n        </path>\n        <taskdef\
    \ name=\"aopc\" classname=\"org.jboss.aop.ant.AopC\"\n            classpathref=\"\
    classpath\"/>\n    </target>\n\n    <target name=\"compile\" depends=\"prepare\"\
    >\n        <javac srcdir=\"src\" destdir=\".\" debug=\"on\" deprecation=\"on\"\
    \n            optimize=\"off\" includes=\"**\">\n            <classpath refid=\"\
    classpath\"/>\n        </javac>\n        <aopc compilerclasspathref=\"classpath\"\
    \ classpathref=\"classpath\"\n            verbose=\"true\">\n            <classpath\
    \ path=\".\"/>\n            <src path=\".\"/>\n            <aoppath path=\"jboss-aop.xml\"\
    />\n        </aopc>\n    </target>\n\n    <target name=\"run\" depends=\"compile\"\
    >\n        <java fork=\"yes\" failOnError=\"true\" className=\"aop.jboss.Customer\"\
    >\n            <sysproperty key=\"jboss.aop.path\" value=\"jboss-aop.xml\"/>\n\
    \            <classpath refid=\"classpath\"/>\n        </java>\n    </target>\n\
    \n</project>\n```\n\nThe `build.xml` file defines three tasks: `compile`, `run`,\
