    **Pointcuts**


    This section presents, in detail, the syntax of the XML file for defining pointcuts
    with JBoss AOP.


    The default name for this file is jboss-aop.xml, but the name can be changed if
    necessary.


    The corresponding XML Document Type Definition (DTD) defines the <aop> tag as
    the root tag. Several pointcuts can be defined in the same file. Each pointcut
    is defined by the <bind> tag and associated with an interceptor by the <interceptor>
    tag.


    The general structure of a jboss-aop.xml file is as follows:


    <?xml version="1.0" encoding="UTF-8"?>


    <aop>


    <bind pointcut=" ... pointcut expression ... " >


    <interceptor class=" ... interceptor class ... " />


    </bind>


    ...


    </aop>


    **96**


    C H A P T E R 5 ■ J B O S S A O P


    **The Different Types of Pointcuts**


    JBoss AOP allows you to define five types of pointcuts: method, constructor, field,
    all, and method call. Each of these types is associated with a specific keyword,
    which is used when you write a pointcut expression.


    In this section, we explain the common rules concerning the wildcards that are
    used to write pointcut expressions, we define the five types of pointcuts, and
    we give the rules for filtering joinpoints.


    Wildcards


    When defining a pointcut, you write an expression to declare the elements that
    must be included in the pointcut. In the previous example of the order-management
    application, the pointcut expression was as follows:


    <bind pointcut="execution(


    public void aop.jboss.Order->addItem(java.lang.String,int))" > Only the addItem
    method was included in the pointcut, with its fully qualified signature provided.
    In more general cases, you want to include more than one method per pointcut.
    In such cases, the asterisk (*) and two-dots symbol (..) can be used as wildcard
    characters to replace any part of the signature. Additionally, annotations can
    be used in place of method names and class names. Table 5-1 illustrates the usage
    of wildcards in method signatures.


    **Table 5-1.** *Examples of Wildcard Usage with JBoss AOP*


    **Expression**


    **Definition**


    public void aop.jboss.


    All public methods named addItem that are defined in the Order->addItem(*,int,*)


    aop.jboss.Order class and that take three parameters, the second being an int


    public void aop.jboss.Order-


    All public methods with a name starting with add that are


    >add*(..)


    defined in the aop.jboss.Order class, whatever their parameters are


    private * aop.jboss.Order-


    All private methods that are defined in the aop.jboss.Order


    >*(..)


    class


    * aop.*.O*->getX()


    The getX methods defined in any class that has a name


    starting with the letter *O* and that is a subpackage of the aop package


    * *->@Remote(..)


    All methods that are associated with the @Remote annotation


    * @Persistent->*(..)


    All methods defined in a class that is associated with the


    @Persistent annotation


    When you write pointcut expressions, the $instanceof keyword can be used in place
    of class names. This keyword is associated with a type name (class or interface)
    and designates all the classes that either implement the given type (if the type
    is an interface) or are subclasses of the given type (if the type is a class).
    For example, * $instanceof(Remote)->*(..) designates all the methods defined in
    classes that implement the Remote interface.


    C H A P T E R 5 ■ J B O S S A O P


    **97**


    Pointcut expressions can be combined with the logical AND, OR, and NOT operators
    (AND, OR, and !). For example, the following expression


    <bind pointcut="execution(* Foo->foo()) OR execution(* Bar->bar())" > includes
    all the joinpoints where the foo method is executed and all the joinpoints where
    the bar method is executed.


    The pointcut-naming mechanism allows you to factor expressions that are used in
    several pointcut definitions. For this, the <pointcut> tag assigns a name to an
    expression. You can then reuse this name when writing a pointcut. For example,
    the two lines


    <pointcut name="foo" expr="execution(* Foo->foo())" />


    <pointcut name="bar" expr="execution(* Bar->bar())" /> define the expressions
    foo and bar, which can then be used in pointcut expression such as the following:


    <bind pointcut="foo OR bar" />


    Method-Execution and Constructor-Execution Pointcuts


    The execution keyword designates method and constructor executions in pointcut
    definitions.


    You have already seen several examples of pointcut definitions that include method
    executions. The principle is the same for constructor executions, except that
    the new keyword replaces the method name in the definition. For example, the following
    pointcut


    <bind pointcut="execution(public aop.jboss.Order->new(..))" > includes the executions
    of all the public constructors defined for the Order class.


    Field Pointcuts


    Operations on fields can be included in pointcut definitions. For these actions,
    three keywords are available: get, set, and field. The get keyword designates
    read operations. The set keyword designates write operations. Finally, the field
    keyword designates read and write operations. These keywords are associated with
    the names of the fields that are to be included in the pointcut. For method signatures,
    these names can contain the asterisk (*) wildcard character. For example, the
    expression


    <bind pointcut="set(private * aop.jboss.Order->articles*)" > designates the write
    operations on all the fields that have a name starting with *articles* and that
    are defined in the Order class.


    **The all Pointcut Type**


    The all pointcut type encompasses all the previously described types—method, constructor,
    and field. For example, the definition


    <bind pointcut="all(aop.jboss.O*)" >


    **98**


    C H A P T E R 5 ■ J B O S S A O P


    includes all the joinpoints where a method or constructor is executed, where a
    field is read or written, and where the location is a class that both belongs
    to the aop.jboss package and has a name starting with the letter *O*.


    Method-Call Pointcuts


    The last type of pointcut defined by JBoss AOP handles method calls. The following
    expression illustrates the usage of the call type:


    <bind pointcut="call(* aop.jboss.Order->*(..))" > This expression includes all
    the joinpoints where a method that is defined in the Order class is called.


    Filtering Joinpoints


    The previous keywords allowed you to select joinpoints based on their types. In
    many situations, you must also select joinpoints based on where the code corresponding
    to the joinpoint is defined (using the within and withincode keywords) and on
    whether the declaring class defines any given methods or fields (using the has
    and hasfield keywords).


    The within keyword is associated with a class expression, such as within(aop.jboss.*.).


    This pointcut-definition snippet includes only the joinpoints that are defined
    in the corresponding classes. In the example, the classes belong to the aop.jboss
    package.


    The withincode keyword plays the same role for method and constructor expressions.
    For example, the expression withincode(public *->*(..)) includes the joinpoints
    that are defined in a public method or constructor.


    A pointcut expression containing the has keyword includes only the joinpoints
    defined in a class that contain the given method (or methods, if the expression
    contains wildcards). For instance, the expression has(void *->foo(..)) selects
    the joinpoints declared in any class that contains a method named foo.


    The hasfield keyword plays the same role for field expressions.


    Note that these filtering operators are seldom used alone. Usually they are combined
    with logical operators and with keywords for selecting joinpoint types. For example,
    the expression


    <bind pointcut="call(* aop.jboss.Order->addItem(..)) AND


    withincode(* aop.jboss.Customer->run())" >


    selects the joinpoints that are located in the run method of the Customer class
    and where the addItem method of the Order class is called.


    **Associating an Interceptor with a Pointcut**


    In the previous section, we presented the definition of a pointcut expression
    with the <bind> tag. In this section, we will present the mechanism that associates
    a pointcut with an interceptor.


    C H A P T E R 5 ■ J B O S S A O P


    **99**


    Declaring an Interceptor


    You can attach an interceptor to a pointcut with the <interceptor> tag. The only
    mandatory information is the name of the class that implements the interceptor.
    For example, the following declaration


    <bind pointcut="execution(* aop.jboss.Order->*(..))">


    <interceptor class="aop.jboss.MyInterceptor" />


    </bind>


    associates the aop.jboss.MyInterceptor interceptor to the pointcut that includes
    the executions of all the methods defined in the Order class.


    Optionally, interceptors can be named. The assigned name can be referenced in
    the jboss-aop.xml file whenever the corresponding interceptor needs to be reused.
    This feature avoids copy-and-paste errors by removing useless, redundant declarations
    of an interceptor-class name. The following lines of code illustrate the usage
    of a named interceptor:


    <interceptor class="aop.jboss.MyInterceptor" name="myInter" />


    <bind pointcut="execution(* aop.jboss.Order->*(..))">


    <interceptor-ref name="myInter" />


    </bind>


    In this example, the interceptor aop.jboss.MyInterceptor interceptor is named
    myInter.


    This name is used in the pointcut definition (see the <interceptor-ref> tag).


    Interceptor Stacks


    The mechanism of an interceptor stack provides a way to group interceptors. The
    stack is named and can be used to define a pointcut. All the interceptors grouped
    in the stack will be executed around the joinpoints included in the pointcut.
    The stack is ordered, and the interceptors are executed in the order of their
    definition in the stack.


    The <stack> tag is used to define an interceptor stack. Interceptors can be added
    to the stack by giving either their class (using the <interceptor> tag) or their
    name (using the


    <interceptor-ref> tag). For example, the following code


    <stack name="myStack">


    <interceptor-ref name="myInter" />


    <interceptor class="aop.jboss.Interceptor2" />


    </stack>


    defines the myStack stack, which contains two interceptors: myInter, and the anonymous
    interceptor implemented by the aop.jboss.Interceptor2 class.


    The <stack-ref> tag is available for associating a pointcut definition with an
    interceptor stack, and it can be used when defining a pointcut:


    <bind pointcut="execution(* aop.jboss.Order->*(..))">


    <stack-ref name="myStack" />


    </bind>


    Note that stacks can also include other stacks.


    **100**


    C H A P T E R 5 ■ J B O S S A O P


    **Interceptors**


    The previous section presented the XML syntax provided by JBoss AOP for defining
    pointcuts.


    This section presents the way that interceptor classes are written.


    JBoss AOP interceptors are equivalent to AspectJ advice code and JAC wrappers—they
    define code that can be run before and after joinpoints.


    **Implementing an Interceptor**


    A JBoss AOP interceptor class must implement the org.jboss.aop.advice.Interceptor
    interface. Two methods are defined in this interface:


    • getName: This method must return an identifier, which you have chosen, for the
    interceptor.


    • invoke: This method defines the code that must be run before and after the joinpoint.


    The signature of the invoke method is:


    Object invoke(Invocation invocation) throws Throwable;


    This method’s unique parameter, invocation, reifies the joinpoint and provides
    information about its parameters and location. In the next section, we will present
    the methods available for joinpoint introspection in detail.


    The invoke method is invoked by the JBoss AOP framework whenever a joinpoint is
    met that matches the pointcut definition associated to the interceptor. The value
    for invocation is provided by the framework.


    In the body of the invoke method, the call to invokeNext executes either the joinpoint
    or, if a stack is defined, the next interceptor in the stack. The invokeNext method
    is implemented by the Invocation type and plays the same role as proceed does
    for AspectJ and JAC.


    In regular cases, invokeNext is invoked one time by the interceptor. However,
    the call to invokeNext is optional. Conversely, an interceptor can attempt to
    call invokeNext several times.


    The general pattern of an interceptor definition is shown in Listing 5-5.


    **Listing 5-5.** *A JBoss AOP Interceptor*


    import org.jboss.aop.advice.Interceptor;


    import org.jboss.aop.joinpoint.Invocation;


    public class MyInterceptor implements Interceptor {


    public String getName() { return "aName"; }


    public Object invoke(Invocation invocation) throws Throwable {


    System.out.println("Before code ");


    Object rsp = invocation.invokeNext();


    System.out.println("After code");


    return rsp;


    } }


    C H A P T E R 5 ■ J B O S S A O P


    **101**


    **Joinpoint Introspection**


    The term *introspection* refers to examining the inner cause of a given phenomenon
    and gaining information about it. In the context of JBoss AOP, you want to retrieve
    information about the part of the program that lets the joinpoint occur.


    The Invocation interface is the root type for the introspection mechanism. This
    interface is implemented by the InvocationBase class. Each type of a joinpoint
    is represented by a subclass of InvocationBase. Figure 5-1 illustrates this hierarchy.
    For clarity, only the main methods are given. You should refer to the Javadoc
    documentation provided with JBoss AOP


    for a list of all the methods that are defined in this hierarchy.


    **Figure 5-1.** *The org.jboss.aop.Invocation hierarchy for joinpoint instrospection
    with JBoss AOP*


    The InvocationBase class provides some common methods that are shared by all the
    joinpoint types. The getTargetObject and getInterceptors methods return the object
    where the current joinpoint occurred and the array of interceptors associated
    to the current joinpoint, respectively. The invokeNext method executes the joinpoint.


    Each class that implements Invocation corresponds to a type of a joinpoint:


    • The CallerInvocation class reifies method and constructor calls. Four direct
    subclasses are defined (only the first one is represented on the figure): MethodCalledByMethodInvocation,
    MethodCalledByConstructorInvocation, ConstructorCalledByMethodInvocation, and
    ConstructorCalledByConstructorInvocation.


    These classes represent method and constructor calls that come from either a method
    or a constructor.


    **102**


    C H A P T E R 5 ■ J B O S S A O P


    • The MethodCalledByMethodInvocation class reifies a method called from another
    method. The parameters of the call can be retrieved with the getArguments method.
    The getCalledClass and getCalledMethod methods return the class and the method
    called, respectively. The getCallingClass and getCallingMethod methods return
    the same pieces of information for the caller side.


    • The ConstructorInvocation class corresponds to the executions of a constructor.
    The getArguments and getConstructor methods retrieve the arguments and the constructor
    that was executed, respectively.


    • The FieldInvocation class corresponds to operations on fields. Two subclasses,
    FieldReadInvocation and FieldWriteInvocation, are defined to reify read and write
    operations, respectively.


    • The MethodInvocation class reifies method executions. The getArguments method
    returns the array of the arguments of the execution. The getMethod method returns
    the method where the execution occurred.


    **Aspect Classes**


    With the Interceptor interface provided by JBoss AOP, you can use the invoke method
    to write the code that would be written in an advice code block with AspectJ.
    This mechanism is limited because you can only write one piece of advice code
    per interceptor class. To suppress this limitation, JBoss AOP proposes the notion
    of the aspect class.


    An aspect class in JBoss AOP is a regular Java class that groups several interception
    methods together. Each method has the same signature as the invoke method in an
    interceptor class. However, you can freely choose the method name. (The name invoke
    is no longer mandatory.) Thus, several different interception methods can be written
    in the same class.


    The MyJBossAOPAspect class, shown in Listing 5-6, illustrates the notion of the
    aspect class.


    **Listing 5-6.** *A JBoss AOP Aspect Class*


    package aop.jboss;


    import org.jboss.aop.joinpoint.Invocation;


    public class MyJBossAOPAspect {


    public Object methInterceptor(Invocation invocation) throws Throwable {


    System.out.println("Before code");


    Object rsp = invocation.invokeNext();


    System.out.println("After code");


    return rsp;


    } }


    As with interceptors, the association between a pointcut and an advice class is
    declared in the jboss-aop.xml file. The <advice> tag must be used. The XML file
    in Listing 5-7 gives an example.


    C H A P T E R 5 ■ J B O S S A O P


    **103**


    **Listing 5-7.** *An XML File for Associating a Pointcut with an Aspect Class*
    1 <?xml version="1.0" encoding="UTF-8"?> 2 <aop>


    3 <aspect class="aop.jboss.MyJBossAOPAspect" /> 4 <bind pointcut="execution(void
    *->addItem(..))"> 5 <advice name="methInterceptor"


    6 aspect="aop.jboss.MyJBossAOPAspect" /> 7 </bind>


    8 </aop>


    The XML file declares that the aop.jboss.MyJBossAOPAspect class is an advice class
    (see line 2 in Listing 5-7), and it binds this class to the pointcut that includes
    all the executions of the addItem method.


    **Using the Mix-In Mechanism**


    With the *mix-in mechanism* provided by JBoss AOP, you can extend the behavior
    of an application. This mechanism is similar to the mechanism known as *intertype
    declaration* in AspectJ.


    With the mix-in mechanism, you can introduce interfaces, fields, and methods to
    the existing classes of an application.


    **Definition**


    Like pointcuts and interceptors, a mix-in is defined in the jboss-aop.xml file
    with the


    <introduction> and <mixin> tags. The basic code for defining a mix-in is as follows:


    <introduction class="aop.jboss.Order">


    <mixin>


    ...


    </mixin>


    </introduction>


    In this example, the mix-in mechanism is applied to the Order class.


    Within the tags <mixin> and </mixin> tags, three other tags can be used:


    • <class>: This tag provides the class that will be “mixed in” with the class
    of the application (in the previous example, the Order class.) The mix-in class
    contains the code elements (fields and methods) that are to be added to the application
    class.


    • <interfaces>: This tag defines the interface implemented by the class that is
    “mixed in”


    with the application. The class can implement several interfaces; in this case,
    a comma-separated list of interface names is given.


    • <construction>: This tag provides the constructor call, which must be used to
    instantiate the mix-in class. We will illustrate its usage in the following section.
    Conceptually, the mix-in mechanism introduces the code element of the mix-in class
    in an application class. Concretely, two objects exist in the Java virtual machine:
    one for the application class and one for the mix-in class. The <construction>
    tag defines the way this mix-in instance is created.


    **104**


    C H A P T E R 5 ■ J B O S S A O P


    **Example**


    To illustrate the mix-in mechanism, we will extend the order-management application
    by adding a date to all the orders that are created. We will begin by defining
    the interface and the class that will be mixed in with the application.


    The CalendarItf interface defines methods for setting and retrieving a date. The
    Calendar class, which is shown in Listing 5-8, provides an implementation for
    this interface.


    **Listing 5-8.** *The Implementation of the Calendar Class* package aop.jboss;


    import java.util.Date;


    public interface CalendarItf {


    public void setDate(Date date);


    public Date getDate();


    }


    public class Calendar implements CalendarItf {


    private Object initial;


    private Date date;


    public Calendar( Object initial ) {


    this.initial = initial;


    date = new Date();


    }


    public void setDate(Date date) {


    this.date = date;


    }


    public Date getDate() {


    return date;


    }


    }


    In addition to the setDate and getDate methods, the Calendar class defines a constructor
    that takes an Object as a parameter. This is the constructor that will be called
    by JBoss AOP


    when this mix-in class is instantiated.


    The XML file in Listing 5-9 associates the Calendar mix-in class with the Order
    application class.


    **Listing 5-9.** *Defining a Mix-In with JBoss AOP*


    <?xml version="1.0" encoding="UTF-8"?>


    <aop>


    <introduction class="aop.jboss.Order">


    <mixin>


    <interfaces> aop.jboss.CalendarItf </interfaces>


    <class> aop.jboss.Calendar </class>


    <construction> new aop.jboss.Calendar(this) </construction>


    C H A P T E R 5 ■ J B O S S A O P


    **105**


    </mixin>


    </introduction>


    </aop>


    An application class that is extended with the mix-in mechanism can be cast to
    the types of the interfaces specified in the <interfaces> tag. In the example
    in Listing 5-9, every instance of Order can be converted to CalendarItf.


    **Annotations**


    Annotations are a new feature introduced by Java 5\. Annotations provide a way
    of extending the definition of a Java program element, such as a method or a class.
    For example, a method can be associated with annotations that reveal additional
    characteristics, such as the fact that the access to the method is restricted
    to given users or the fact that the method must be executed within the context
    of a transaction.


    There are two ways of working with annotations in JBoss AOP. First, you can define
    annotations in your application and use these annotations when writing pointcuts.
    Second, annotations can be used to write aspects. In this last case, annotations
    replace the declarations that are usually written in the jboss-aop.xml XML file.


    **Annotations in Pointcut Definitions**


    When you write a pointcut, an annotation can be used in place of a type name (class
    or interface), method name, or parameter name. All the code elements that are
    associated with the given annotations will match the pointcut.


    For example, the following pointcut


    <bind pointcut="execution(* *->@Transaction(..))" > includes the executions of
    all the methods that are annotated with @Transaction.


    As a second example, consider the following definition:


    <bind pointcut="execution(* $instanceof{@Bean}->*(int,@Key))" > Such a pointcut
    includes the executions of all the methods defined in a class that implements
    an interface annotated with @Bean. As an additional condition, only the methods
    that take two parameters, the first being an int and the second one being annotated
    with @Key, are included.


    **Annotations for Writing Aspects**


    The second use of annotations is for writing aspects. You can write annotated
    Java code to define classes or pointcuts, for example. With annotations, the jboss-aop.xml
    XML file, which was previously required with JBoss AOP, is suppressed. Every definition
    that could be written in XML can now be replaced by an annotation in a Java file.


    **106**


    C H A P T E R 5 ■ J B O S S A O P


    Annotated Aspects


    The first useful annotation is @Aspect. As its name suggests, this annotation
    defines an aspect class. You learned in the previous sections that an aspect class
    is a collection of interception methods. The same definition applies here, except
    that the class is preceded by the @Aspect annotation. In the following example,
    the MyJBossAOPAspect class is declared as an aspect class: import org.jboss.aop.Aspect;


    @Aspect


    public class MyJBossAOPAspect {


    ...


    }


    Annotated Pointcut Definitions


    Within an aspect class, you define interception methods. Two additional actions
    must be performed. First, you must define pointcuts. Second, you must associate
    a pointcut to each defined interception method.


    With JBoss AOP, pointcuts are defined as public static fields of type Pointcut
    and are annotated with @PointcutDef, and interception methods are annotated with
    @Bind. The


    @PointcutDef pointcut takes a string that contains the pointcut expression as
    a parameter. The


    @Bind pointcut takes a string that references the field defining the pointcut
    as a parameter.


    The aspect class that is shown in Listing 5-10 sums up these notions.


    **Listing 5-10.** *The JBoss AOP Annotation Style for Defining Pointcuts* package
    aop.jboss;


    import org.jboss.aop.Aspect;


    import org.jboss.aop.PointcutDef;


    import org.jboss.aop.pointcut.Pointcut;


    @Aspect


    public class MyJBossAOPAspect {


    @PointcutDef( "call(* Foo->Bar(..))" )


    public static Pointcut pcd;


    @Bind( pointcut="aop.jboss.MyJBossAOPAspect.pcd" ) public Object myInterceptor(
    Invocation invocation ) {


    // ... Before code


    Object ret = invocation.invokeNext();


    // ... After code


    return ret;


    }


    The pcd field defines a pointcut that includes the calls to the Bar method defined
    in the Foo class. The myInterceptor method is an interception method that is bound
    to the pcd pointcut.


    C H A P T E R 5 ■ J B O S S A O P


    **107**


    Annotated Mix-In


    You learned in the previous section that the mix-in mechanism allows you to extend
    the application classes. With this mechanism, mix-in classes define code elements
    that will be introduced in target application classes.


    The annotation for defining a mix-in is @Mixin. Two parameters must be defined:
    target is the class where the mix-in must be applied, and interfaces is the list
    of interfaces that are introduced in the target class and that are implemented
    by the mix-in class.


    The @Mixin annotation must be associated with a static method defined in an aspect
    class (in other words, a class annotated with @Aspect) or an interceptor class.
    The method annotated by @Mixin acts as a constructor for mix-in objects. Given
    a parameter that is an application object, this method must return the mix-in
    object, which will be introduced in the application object.


    The AnnotatedMixIn aspect class, which is shown in Listing 5-11, illustrates the
    usage of annotated mix-in.


    **Listing 5-11.** *The JBoss AOP Annotation Style for Defining Mix-Ins* package
    aop.jboss;


    import org.jboss.aop.Aspect;


    import org.jboss.aop.Mixin;


    @Aspect


    public class AnnotatedMixIn {


    @Mixin( target=Order.class, interfaces={CalendarItf.class} ) public static Calendar
    createCalendar( Order myOrder ) {


    return new Calendar(myOrder);


    } }


    In Listing 5-11, the createCalendar method creates an instance of the Calendar
    class. This instance is introduced in the target Order class, and it implements
    the CalendarItf interface.


    Annotated Interceptors


    The @InterceptorDef annotation can be used to define interceptor classes. A second
    annotation, @Bind, must be provided. As for pointcut definitions, this annotation
    binds the interceptor to a given pointcut.


    The interceptor class in Listing 5-12 illustrates the usage of @InterceptorDef.


    **Listing 5-12.** *The JBoss AOP Annotation Style for Defining Interceptors* package
    aop.jboss;


    import org.jboss.aop.advice.Interceptor;


    import org.jboss.aop.joinpoint.Invocation;


    @InterceptorDef


    @Bind( pointcut="execution(public aop.jboss.Order->*(..))" )


    **108**


    C H A P T E R 5 ■ J B O S S A O P


    public class TraceInterceptor implements Interceptor {


    public String getName() { return "TraceInterceptor"; }


    public Object invoke(Invocation invocation) throws Throwable {


    // ... Before code


    Object ret = invocation.invokeNext();


    // ... After code


    return ret;


    } }


    **Advanced Features**


    This section presents the advanced features of JBoss AOP.


    **Dynamic AOP**


    Besides the ability to declare pointcuts in XML files or with annotations, JBoss
    AOP offers the possibility of dynamically declaring and weaving a pointcut.


    The code snippet in Listing 5-13 illustrates this feature.


    **Listing 5-13.** *Dynamic Weaving*


    1 import org.jboss.aop.AspectManager;


    2 import org.jboss.aop.advice.AdviceBinding;


    4 AdviceBinding ab = new AdviceBinding( "execution(* *->foo(..)" ); 5 ab.addInterceptor(
    myInterceptor.class );


    6 AspectManager.instance().addBinding( ab );


    A new pointcut (here, called an *advice binding*) is declared (see line 4 in Listing
    5-13). An interceptor class (myInterceptor) is associated with this pointcut (see
    line 5). Finally, the advice binding is registered with the aspect manager (see
    line 6).


    This functionality requires you to perform a so-called *preparation phase*. For
    JBoss AOP, this phase consists of transforming some selected application objects.
    These objects will then be ready to be aspectized in the future through the addBinding
    method.


    There are two ways of preparing application objects:


    • You can use the <prepare> tag in an XML file. The tag takes a pointcut expression
    as a parameter. All the objects included in the pointcut will be prepared.


    • You can associate the @Prepare annotation with a public static field of type
    Pointcut.


    As with the tag, a parameter for denoting the objects to be prepared is required.


    For example, the following XML code snippet


    <prepare expr="execution( Foo->*(..) )" /> prepares all the objects of the Foo
    class.


    C H A P T E R 5 ■ J B O S S A O P


    **109**


    **Instantiating an Aspect**


    By default, every aspect or interceptor class defined with JBoss AOP is a singleton.
    This means that only one instance of each class can exist when the application
    is run. This mode is called PER_VM.


    The advantage of the PER_VM mode is to limit memory consumption and avoid unnecessary
    creations of the aspect class. The drawback is that any field defined in the class
    will be shared by all the advice-code executions; hence, if these executions are
    concurrent, access to the field may need to be synchronized.


    Three other modes are available for aspects and interceptors: PER_CLASS, PER_INSTANCE,
    and PER_JOINPOINT. In the first case, an instance of the aspect class is created
    for every class that is included in a pointcut associated to this aspect. With
    PER_INSTANCE, an instance of the aspect class is created for each object included
    in the pointcut. Finally, with PER_JOINPOINT, an instance is created for every
    encountered joinpoint.


    These modes are declared either in XML or with annotations. In XML, the <aspect>
    tag for declaring an aspect takes scope as a parameter; scope contains the chosen
    mode. The same parameter is available for the @Aspect annotation.


    If none of these four modes fits your needs, you can decide to provide your own
    factory class. This class will be responsible for creating instances of aspects
    or interceptors. A factory class must implement the org.jboss.aop.advice.AspectFactory
    interface.


    Aspect factory classes are declared either in XML or with annotations.


    **Configuring an Aspect**


    The purpose of the configuration mechanism is to separate the definition of application
    parameters from the definition of the initial values assigned to these parameters.
    The parameters are usually defined as fields in Java classes. The values are defined
    in an external file (for instance, a text file or XML file.) You can then modify
    the values without recompiling the code where the parameters are defined.


    JBoss AOP offers a mechanism for configuring aspect classes with parameters. The
    type of each parameter must be either a primitive type, such as int, double, or
    boolean, or one of the following:


    • String


    • String[]


    • Class


    • Class[]


    • BigDecimal


    • File


    • Document


    • InetAddress


    • URL


    **110**


    C H A P T E R 5 ■ J B O S S A O P


    Aspect classes must provide methods that set their configuration parameters. Parameter
    values are defined in the jboss-aop.xml file. The <attribute> tag can be included
    in each


    <aspect> tag that defines an aspect. The attribute’s name and value associated
    with <attribute> define the value for the corresponding parameter name.


    For example, the following aspect class defines two parameters named header and
    count: public class MyAspect {


    public void setHeader( String value ) { /* ... */ }


    public void setCount( int value ) { /* ... */ }


    }


    The following XML code snippet defines the values “->” and “3” for header and
    count:


    <aspect class="MyAspect">


    <attribute name="header" value="->" />


    <attribute name="count" value="3" />


    </aspect


    **Introducing Annotations**


    With the mix-in mechanism, you can introduce new methods into existing application
    classes.


    In addition, JBoss AOP allows you to introduce annotations into a class, method,
    field, or constructor.


    There are two ways of introducing annotations: in the jboss-aop.xml XML file or
    with annotations. The latter case may be somewhat confusing, but you will see
    that annotations are written to introduce other annotations into an application.


    Introducing Annotations with XML


    In a jboss-aop.xml file, the <annotation-introduction> tag can be used to introduce
    annotations. This tag is associated with a pointcut expression. The annotation
    will be added to each joinpoint included in the pointcut.


    For example, the following XML code snippet


    <annotation-introduction expr="execution(*->foo(..))">


    @Release(production=false,version=1)


    </annotation-introduction>


    introduces the @Release(production=false,version=1) annotation into every foo
    method defined in the application.


    Introducing Annotations with Annotations


    In the “Annotations” section earlier in this chapter, you learned that every part
    of a declaration (aspect, pointcut, mix-in, and so on) that can be written in
    an XML file can also be written as an annotation. Therefore, instead of using
    the previously mentioned XML <annotation-introduction> tag, you can write an annotation
    that will perform the same job.


    The annotation for introducing another annotation is @AnnotationIntroductionDef.
    Three parameters must be provided:


    C H A P T E R 5 ■ J B O S S A O P


    **111**


    • expr: This parameter is a string that contains a pointcut expression. Every
    joinpoint included in the pointcut will be annotated.


    • invisible: When set to false, this Boolean parameter allows the introduced annotation
    to be visible at run time. When set to true, the introduced annotation is visible
    only at compile time.


    • annotation: This parameter is a string that introduces an annotation.


    For example, the same annotation introduction that the previous section illustrated
    can be written as shown in Listing 5-14.


    **Listing 5-14.** *The JBoss AOP Annotation Style for Defining Annotations* package
    aop.jboss;


    import org.jboss.aop.Aspect;


    import org.jboss.aop.AnnotationIntroductionDef;


    import org.jboss.aop.annotation.AnnotationIntroduction;


    @Aspect


    public class AnnotatedAnnotationIntroduction {


    @AnnotationIntroductionDef(


    expr = "execution(*->foo(..))",


    invisible = false,


    annotation="@Release(production=false,version=1)" ) public static AnnotationIntroduction
    a;


    }


    The @AnnotationIntroductionDef annotation must be associated with a public static
    field that is of type AnnotationIntroduction and that is defined in an aspect
    class or interceptor class.


    **Summary**


    In this chapter, you learned to write an application with the JBoss AOP framework.
    JBoss AOP


    can be used alone, or it can be embedded in the JBoss application server. As with
    other AOP


    languages and frameworks, a JBoss AOP aspect is composed of pointcuts and advice
    code.


    JBoss AOP advice code blocks are defined in either interceptor classes or so-called
    aspect classes. With interceptors, you have the possibility of defining just one
    advice code block per class, whereas several advice code blocks can be defined
    in the same aspect class. In both cases, the advice code block is a method, and
    in the case of interceptors, it is named invoke.


    These methods define the code that must be executed before and after joinpoints.
    Just as AspectJ and JAC provide the proceed method for executing the joinpoint,
    JBoss AOP provides the invokeNext method.


    Pointcuts can be defined either in XML files or with annotations added to the
    aspect and interceptor classes. In the former case, the definition of the pointcuts
    is clearly separated from that of the interceptors and aspect classes. Hence,
    these classes are independent of any


    **112**


    C H A P T E R 5 ■ J B O S S A O P


    pointcut and can be reused more easily. With annotations, pointcuts and aspects
    are defined in the same location. The advantage of this situation is that it allows
    the beginner AOP


    programmer to be more intuitive. Annotations are defined next to the aspect classes,
    so they are easier to understand. The other advantage of annotations is that they
    are natively supported by modern IDEs, such as the recent versions of Eclipse,
    which include Java 5.


    Like JAC, JBoss AOP is a framework that supports dynamic AOP. In other words,
    aspects can be woven and unwoven at run time without stopping the application.


    Finally, the recent versions of JBoss AOP are distributed with a library of ready-to-use
    aspects for transaction management (specifically, demarcation, injection, and
    locking), security, remote interactions, clustering, and cache management.


    C H A P T E R 6


    ■ ■ ■


    Spring AOP


    **T**his chapter presents a fourth environment for aspect-oriented programming:
    Spring AOP.


    Spring AOP is part of the Spring Framework Open Source project (http://


    www.springframework.org), which aims to simplify the development of J2EE applications.


    Spring was initially created by Rod Johnson, and has been Open Source since February
    2003.


    The architectural concepts, however, go back to early 2000, and emerged from its
    creator’s experience on J2EE commercial developments, which have been published
    in Rod Johnson’s book, *Expert One-on-One J2EE Design and Development* (Wrox Press,
    2002). Spring is now a successful Open Source project with a very active community,
    and is licensed under the terms of the Apache 2.0 license.


    Although AOP is not the primary goal of the Spring Framework, the support that
    AOP


    provides, though limited, is general enough to be depicted in this book. Similar
    to JAC, Spring AOP supports the AOP Alliance API, which is a common effort of
    standardization for generic interception in Java, as used by many AOP platforms.
    In addition, Spring AOP has been designed to be easily used in many J2EE environments
    and application servers (such as WebLogic, Tomcat, JBoss, Resin, and Jetty).


    In this chapter, we briefly present the architecture of the Spring Framework in
    general. We then focus on Spring AOP and the provided AOP features.


    Note that we use Spring version 1.2 only as a reference since it is the most recent
    and stable version available at the time of this writing.


    **An Overview of the Spring Framework**


    The Spring Framework belongs to the family of lightweight containers. The Spring
    container manages beans. It is simply materialized by a factory (org.springframework.beans.factory.


    BeanFactory) that needs to be called when instantiating new beans. More specifically,
    in a J2EE


    environment, the factory is generally an application context (org.springframework.context.


    ApplicationContext, subclass of BeanFactory) that supports all the operations
    necessary so that the beans can be initialized and run in a J2EE environment.
    AOP and other supports such as message resource handling, event propagation, and
    declarative configuration mechanisms are also implemented by the factory.


    Spring and its factories implement the so-called Inversion of Control (IoC), also
    known as the Dependency Injection. This means that all of the configuration, especially
    the bean dependencies, is in charge of the factories (lightweight containers).
    As a direct consequence, it is not necessary for the beans to resolve other beans
    or to go through complex initialization processes, because the factory does it
    all.


    **113**


    **114**


    C H A P T E R 6 ■ S P R I N G A O P


    **Bean Factories**


    In order to implement the IoC and to correctly initialize the created beans, factories
    need to be aware of an application’s environment. This is why, in most cases,
    factories are configured.


    A typical factory is org.springframework.beans.factory.xml.XmlBeanFactory, which
    allows the factory to be configured through some XML configuration files. The
    following code creates a factory configured with a file called conf.xml:


    ClassPathResource res = new ClassPathResource("conf.xml"); XmlBeanFactory factory
    = new XmlBeanFactory(res);


    In general, however, the configuration file is called applicationContext.xml.
    Since the application may contain several modules, it can also be divided into
    several parts: ClassPathXmlApplicationContext appContext = new ClassPathXmlApplicationContext(


    new String[] {"applicationContext.xml", "applicationContext-part2.xml"}); BeanFactory
    factory = (BeanFactory) appContext;


    In this code, we use the ClassPathXmlApplicationContext factory, which is an application
    context (a factory) that supports XML configuration. Of course, for the final
    user it can simply be seen as a BeanFactory.


    **Creating and Configuring Beans**


    In order to be created, beans require the following:


    • A Java class definition


    • A configuration


    The Java class definition is usually a regular Java class following bean conventions:
    properties should be accessible through getter/setter pairs. Spring, however,
    allows any class to become a bean, and therefore any kind of Java object can be
    managed by the container and referenced by other beans, exactly like regular beans.
    Spring also allows the beans to define a constructor with some parameters, so
    that the bean properties are initialized in a more straightforward way.


    As previously indicated, a typical bean configuration is written in an XML file,
    which contains bean definition entries. (Note that configurations can also be
    achieved programmatically, but we will not enter into this level of detail in
    this book.) Each bean entry defines the name (or id) and the Java class of the
    bean. At this point, the bean can be referenced by other bean definition entries.
    In addition, several configuration parameters can be added to the entries such
    as the values of the properties, the values of the constructor’s parameters, life-cycle
    management configurations, etc.


    A First Bean Definition


    As a simple example, we write the class in Listing 6-1.


    C H A P T E R 6 ■ S P R I N G A O P


    **115**


    **Listing 6-1.** *A First Bean Definition*


    package aop.spring;


    public class ExampleBean {


    private AnotherBean beanOne;


    private YetAnotherBean beanTwo;


    private int i;


    public void setBeanOne(AnotherBean beanOne) {


    this.beanOne = beanOne;


    }


    public void setBeanTwo(YetAnotherBean beanTwo) {


    this.beanTwo = beanTwo;


    }


    public void setIntegerProperty(int i) {


    this.i = i;


    }


    }


    This class contains two references towards AnotherBean and YetAnotherBean, and
    an integer property i. It also defines setters for all of them. In order to make
    this class recognized as a bean by a Spring bean factory or application context,
    we must write the XML configuration in Listing 6-2.


    **Listing 6-2.** *A First Configuration*


    1 <bean id="exampleBean" class="aop.spring.ExampleBean"> 2 <property name="beanOne"><ref
    bean="anotherExampleBean"/></property> 3 <property name="beanTwo"><ref bean="yetAnotherBean"/></property>
    4 <property name="integerProperty"><value>1</value></property> 5 </bean>


    In this configuration, we create a new bean named exampleBean (id attribute of
    the bean element), which is an instance of the class aop.spring.ExampleBean (class
    attribute of the bean element) defined previously. The initialization of the properties
    is done through the property elements. For primary properties, the value element
    will be used to create a primitive value (line 4). For references, a ref element
    will be used to reference another bean (lines 2 and 3).


    Of course, the referenced beans must be defined elsewhere in a similar manner.
    A minimal configuration is as shown in Listing 6-3.


    **Listing 6-3.** *A First Configuration (Continued)*


    <bean id="anotherExampleBean" class="aop.spring.AnotherBean"/>


    <bean id="yetAnotherBean" class="aop.spring.YetAnotherBean"/>


    **116**


    C H A P T E R 6 ■ S P R I N G A O P


    In Spring, beans are singletons by default. In order to change this strategy,
    and to make the factory create a new instance each time a bean is accessed, the
    configuration should set the singleton attribute to false simply by changing the
    first line of the configuration of Listing 6-2:


    <bean id="exampleBean" class="aop.spring.ExampleBean" singleton="false"> An Alternative
    Definition


    As stated previously, an alternative to this is to use constructor initialization.
    In this case, the bean class is defined as shown in Listing 6-4.


    **Listing 6-4.** *A Constructor-based Alternative Definition of Our First Bean*
    package aop.spring;


    public class ExampleBean {


    private AnotherBean beanOne;


    private YetAnotherBean beanTwo;


    private int i;


    public ExampleBean(AnotherBean anotherBean,


    YetAnotherBean yetAnotherBean, int i) {


    this.beanOne = anotherBean;


    this.beanTwo = yetAnotherBean;


    this.i = i;


    }


    }


    And the configuration must be as shown in Listing 6-5.


    **Listing 6-5.** *Constructor-based Configuration*


    <bean id="exampleBean" class="aop.spring.ExampleBean">


    <constructor-arg><ref bean="anotherExampleBean"/></constructor-arg>


    <constructor-arg><ref bean="yetAnotherBean"/></constructor-arg>


    <constructor-arg type="int"><value>1</value></constructor-arg>


    </bean>


    Accessing the Bean


    Once defined, a bean must be accessed through a factory. The BeanFactory class
    defines the following methods:


    • boolean containsBean(String): Checks that the factory contains a given bean
    name


    • Object getBean(String): Instantiates/accesses a given bean name


    • Object getBean(String,Class): Instantiates/accesses a given bean name and casts
    it to a given class


    C H A P T E R 6 ■ S P R I N G A O P


    **117**


    • boolean isSingleton(String): Determines whether or not the bean that corresponds
    to the name is a singleton


    • String[] getAliases(String): Returns the aliases for the given bean name (a
    bean can have several names in the configuration)


    We can now write a program for retrieving a reference on a bean after having checked
    that it exists in the factory and that it is defined as a singleton:


    // we assume that conf.xml contains the bean definition, and that ExampleBean


    // is in the classpath


    ClassPathResource res = new ClassPathResource("conf.xml"); XmlBeanFactory factory
    = new XmlBeanFactory(res);


    ExampleBean myBean=null;


    if(factory.containsBean("exampleBean") && factory.isSingleton("exampleBean"))
    {


    myBean=factory.getBean("exampleBean");


    }


    Bean Initialization and Dependency Injection


    In the two equivalent definitions presented previously, when the program instantiates
    the aop.spring.ExampleBean class, it uses the factory that is parameterized by
    the configuration to automatically inject the values or the bean dependencies.
    In the first case of our example, the factory called the setters to initialize
    the properties: this kind of injection is called *setter-based* *dependency injection*.
    In the second case, the factory automatically called the constructor of the class
    with the appropriate arguments: this is called *constructor-based dependency injection*.


    In the case that several constructor arguments are of the same type, the ambiguity
    can be solved by using the index attribute in the constructor-arg element; the
    index then corresponds to the argument’s index, as declared in the constructor’s
    prototype.


    The strength of the IoC (or Dependency Injection) model is that all the bean dependencies
    are handled by the factory (container). Consequently, the factory implements all
    the lookup, proxying, and any other tedious operations that are normally not completely
    transparent for the beans (as in a typical EJB/J2EE programming model). For instance,
    there is no need to use any locator or business delegate design patterns (see
    the section “Using J2EE Design Solutions” in Chapter 10) because the factory will
    do it for you.


    The bean factory will also check the configuration after it is created, which
    avoids possible errors such as references to nonexisting beans or circular dependencies.


    **Other Bean Configuration Features**


    This section briefly mentions other bean configuration features.


    Overview of the Supported XML Elements for Data


    As you have seen, Spring allows the configuration of the bean primitive properties’
    data with the value XML element and the configuration of the references with the
    ref element.


    Spring also supports collections (lists, sets, and maps) and data elements, as
    shown in the configuration in Listing 6-6.


    **118**


    C H A P T E R 6 ■ S P R I N G A O P


    **Listing 6-6.** *A More Complex Configuration Example*


    <beans>


    ...


    <bean id="moreComplexObject" class="example.ComplexObject">


    <property name="someList">


    <list>


    <value>a list element </value>


    <ref bean="aReferencedBean"/>


    </list>


    </property>


    <property name="someMap">


    <map>


    <entry key="an entry key">


    <value>some value</value>


    </entry>


    <entry key="another entry key for a reference">


    <ref bean="myDataSource"/>


    </entry>


    </map>


    </property>


    <property name="someSet">


    <set>


    <value>some string</value>


    <ref bean="myDataSource"/>


    </set>


    </property>


    </bean>


    </beans>


    We summarize all the available data elements in the following list:


    • bean: Inlines a bean definition (in this case, the bean can be anonymous and
    the id attribute is not needed)


    • ref: Defines a reference to another bean


    • idref: Defines a string value that corresponds to a bean id (in this case, the
    factory checks that the id exists in the application environment)


    • list: Defines a list of any other elements


    • set: Defines a set of any other elements


    • map: Defines a map of entries (entry attribute)


    • props: Defines a java.util.Properties element


    • value: Defines a primitive value


    • null: Defines a null value (indeed, <value\> defines an empty string and should
    be replaced by <null\> when needed)


    C H A P T E R 6 ■ S P R I N G A O P


    **119**


    All of these data elements are also recursively available within a property, an
    entry, a set, or a list element.


    Auto-wiring Collaborators


    In order to minimize the XML configuration code, Spring provides some auto-wiring
    capabilities. *Auto-wiring* consists of enabling the container (factory) to resolve
    the dependencies automatically by using some pragmatic strategies. Even though
    this is not encouraged (well-defined dependencies are preferred), this feature
    is worth mentioning since it illustrates the real benefits and possibilities of
    factories and, consequently, of the IoC concept advocated by Spring.


    The auto-wiring mode of a bean can be configured by using the autowire attribute
    of the bean element. It can take the following values:


    • no: No auto-wiring at all.


    • byname: The references are automatically added by matching the names of the
    properties and the names of the beans.


    • byType: The references are automatically added by matching the types of the
    properties and the types of the beans.


    • constructor: The references are automatically added by matching the types of
    the properties and the types of the bean constructor arguments.


    • autodetect: Chooses constructor or byType through introspection of the bean
    class.


    Other Features


    Spring provides many other configuration features, such as object life-cycle management,
    which specifies some bean destruction methods, as well as other features designed
    for beans to be aware of the container. The reader interested in further details
    on this subject should refer to literature that is specific to Spring, since it
    is not the goal of this book to enter into the non-AOP details of Spring.


    **Abstraction Layers**


    Spring aims to facilitate J2EE development; therefore, it provides a set of abstraction
    layers that assist with the integration of Spring bean-based applications with
    various technologies commonly encountered in J2EE development. These abstraction
    layers, listed here, cleanly integrate with the Spring bean container, especially
    through the IoC capabilities of Spring:


    • A common abstraction layer for transaction management, which allows for pluggable
    transaction managers and demarcate transactions, without the disadvantage of low-level
    issues. Generic strategies for JTA and a single JDBC DataSource are included.


    • A JDBC abstraction layer, which simplifies the writing of queries and error
    handling.


    • Integration with Hibernate, JDO, and iBATIS SQL Maps, in terms of resource holders,
    DAO implementation support, and transaction strategies. First-class Hibernate
    support with a lot of IoC convenience features, which address many typical Hibernate
    integration issues.


    **120**


    C H A P T E R 6 ■ S P R I N G A O P


    • A flexible MVC web application framework, built on core Spring functionality.
    This framework is configurable via strategy interfaces, and accommodates multiple
    view technologies like JSP, Velocity, Tiles, iText, and POI.


    **Spring AOP: An Introduction**


    We have presented the basics of Spring and the IoC principle; in this section,
    we introduce Spring AOP with a simple example.


    For our example, we reuse the same Order Management example as in the previous
    chapters (see Chapters 3, 4, and 5) and implement the same trace aspect that was
    programmed in these chapters, but now with Spring AOP. This aspect traced the
    execution of the application.


    **A Simple Trace Aspect**


    Our first aspect written with Spring AOP monitors each ordered item by displaying
    a message before and after the method addItem as defined in the class Order.


    Defining this aspect requires us to define a Java class TraceInterceptor (similar
    to


    “around” advice), and also to define a corresponding bean in the XML bean definition
    file (usually applicationContext.xml). Still in a bean definition file, a pointcut
    must be defined and linked to the interceptor by using an *advisor*. In the Spring
    Framework, AOP is naturally integrated because it follows the IoC principle and
    is consistently defined with the bean model.


    Interceptor, pointcut, and advisor dependencies are implemented exactly like regular
    bean dependencies.


    In order to enable AOP, the program must use an ApplicationContext factory (or
    a deriva-tive). It is important to notice that the ApplicationContext factory
    will return an AOP proxy when accessing a bean. Spring uses J2SE proxies to generate
    the proxies when possible (when an interface is defined for the bean), and CGLIB
    proxies otherwise. When a method is called on a bean, it is the AOP proxy that
    automatically up-calls the potentially installed interceptors for this method.


    **A Simple Pointcut**


    Spring AOP pointcuts are defined in the XML bean definition entries, but they
    can also be defined programmatically (as you will see later in the “Pointcuts”
    section). A typical way to define a pointcut in XML is to use a set of regular
    expressions (Perl 5 syntax). When all the regular expressions of a pointcut match
    the method’s name (including its class name), it means that the method is a joinpoint
    belonging to the pointcut (see Listing 6-7).


    **Listing 6-7.** *A Pointcut Configuration Example* 1 <bean id="tracePointcut"


    2 class="org.springframework.aop.support.Perl5RegexpMethodPointcut"> 3 <property
    name="pattern"><value>aop.spring.Order.addItem</value></property> 4 </bean>


    C H A P T E R 6 ■ S P R I N G A O P


    **121**


    This XML code defines a new pointcut bean identified by the tracePointcut ID and
    instance of a RegexpMethodPointcut class (supporting regular expression). The
    pattern property of line 3 defines a single regular expression matching the method
    addItem of the Order class.


    **A Simple Interceptor**


    With Spring AOP, an interceptor class must implement the interface org.aopalliance.


    MethodInterceptor and provide the implementation for the invoke method, which
    defines the code to be run before and after the joinpoints.


    The class in Listing 6-8 defines the interceptor TraceInterceptor as mentioned
    in the previous pointcut definition:


    **Listing 6-8.** *A Trace Interceptor with Spring* package aop.spring;


    import org.aopalliance.MethodInterceptor;


    import org.aopalliance.MethodInvocation;


    public class TraceInterceptor implements MethodInterceptor {


    public Object invoke(Invocation invocation) throws Throwable {


    String methodName = invocation.getMethod().getName();


    System.out.println("-> Before "+methodName); Object rsp = invocation.proceed();


    System.out.println("-> After "+methodName); return rsp;


    } }


    The method invoke is called by Spring AOP just before the occurrence of a joinpoint.
    The only argument of this call contains information about the joinpoint. The return
    type corresponds to the value returned by the aspect. Here, the interceptor displays
    a first message, calls the method proceed, displays a second message, and then
    returns. The proceed method has the same semantics as usual: it executes the advised
    method (also *intercepted method* or *method* *joinpoint*).


    Spring can only advise method calls: The creator of Spring considers field advising
    to be potentially harmful in the Spring context, since it violates the bean encapsulation
    principles.


    **A Simple Advisor**


    In order to attach a pointcut to an interceptor, Spring adds the concept of a
    pointcut *advisor*.


    Here, to attach the pointcut and interceptor defined previously, we add the XML
    definition in Listing 6-9.


    **122**


    C H A P T E R 6 ■ S P R I N G A O P


    **Listing 6-9.** *Configuring a Trace Advisor*


    <bean id="traceAdvisor"


    class="org.springframework.aop.support.DefaultMethodPointcutAdvisor">


    <property name="advice">


    <ref local="traceInterceptor"/>


    </property>


    <property name="pointcut">


    <ref local="tracePointcut"/>


    </property>


    </bean>


    where traceInterceptor is the bean identifier of the trace interceptor defined
    as shown in Listing 6-10.


    **Listing 6-10.** *Configuration of the Trace Interceptor*


    <bean id="traceInterceptor"


    class="aop.spring.TraceInterceptor">


    The pointcut definition can be integrated directly into the advisor definition.
    This is the case when, for example, the pointcut does not need to be reused in
    other aspects. In this case, the advisor definition looks as shown in Listing
    6-11.


    **Listing 6-11.** *A More Integrated Configuration of the Trace Advisor*


    <bean id="traceAdvisor"


    class="org.springframework.aop.support.RegexpMethodPointcutAdvisor">


    <property name="advice">


    <ref local="traceInterceptor"/>


    </property>


    <property name="pattern">


    <value>aop.spring.Order.addItem</value>


    </property>


    </bean>


    **Pointcuts**


    This section presents how to define pointcuts in Spring AOP.


    **Basics**


    In Spring, pointcuts are defined as regular beans that must implement the org.springframeork.


    aop.Pointcut interface (see Listing 6-12).


    **Listing 6-12.** *The Pointcut Interface*


    public interface Pointcut {


    ClassFilter getClassFilter();


    C H A P T E R 6 ■ S P R I N G A O P


    **123**


    MethodMatcher getMethodMatcher();


    }


    The class filter of a pointcut is an object that defines the scope of the pointcut.
    It implements the interface in Listing 6-13.


    **Listing 6-13.** *The ClassFilter Interface*


    public interface ClassFilter {


    boolean matches(Class clazz);


    }


    The matches method returns true if the filtered class clazz belongs to the filter
    and, consequently, if it is part of the parent pointcut’s scope.


    The method matcher will then tell, for a filtered class, whether a given method
    is a joinpoint for the parent pointcut. The interface is as shown in Listing 6-14.


    **Listing 6-14.** *The MethodMatcher Interface*


    public interface MethodMatcher {


    boolean matches(Method m, Class targetClass);


    boolean isRuntime();


    boolean matches(Method m, Class targetClass, Object[] args);


    }


    The isRuntime method indicates whether this matcher should be applied at run time
    on an AOP proxy. In the AOP world, this kind of selection is called *dynamic shadow
    selection.* This operation, which will reveal whether or not a shadow is a joinpoint
    for a given pointcut, is performed at run time by using some contextual information.
    When isRuntime returns true, the three-parameter matches method is called with
    the values of the current invocation. If isRuntime returns false, only the two-parameter
    matches method is called. In the latter case, the method matcher is used only
    once—during the AOP proxy initialization process.


    **Programmatically Defined Pointcuts**


    By using this API, programmers can define new pointcuts programmatically. Listing
    6-15, for instance, shows the definition of a pointcut that matches public void
    aop.spring.Order.


    addItem(*,int,*).


    **Listing 6-15.** *A Programmatically Defined Pointcut* package aop.spring;


    public class APointcut implements Pointcut {


    public ClassFilter getClassFilter() {


    return new ClassFilter() {


    public boolean matches(Class clazz) {


    return clazz.getName().equals("aop.spring.Order");


    }


    }


    **124**


    C H A P T E R 6 ■ S P R I N G A O P


    public MethodMatcher getMethodMatcher() {


    return new MethodMatcher() {


    public boolean matches(Method m, Class targetClass) {


    return Modifier.isPublic(m.getModifiers())


    && m.getName().equals("addItem")


    && m.getParameterTypes().length == 3


    && m.getParameterTypes()[1] == int.class;


    }


    public boolean isRuntime() { return false; }


    public boolean matches(Method m, Class targetClass, Object[] args) {


    return false;


    }


    }


    }


    Once this definition is complete, the programmer must simply define the corresponding
    bean, so that the application context can apply this pointcut to the beans.


    <bean id="myPointcut" class="aop.spring.APoincut"> **Regexp Pointcuts**


    Spring provides an implementation for pointcuts that uses regular expressions
    in the class org.springframework.aop.support.AbstractRegexpMethodPointcut (two
    implementations are available: one for Perl5 and one for JDK regexps). A regexp
    pointcut defines the method setPattern(String pattern). The setPatterns(String[]
    patterns) method can be used to define several patterns with the or semantics.
    The advantage of this kind of pointcut is that it can be used in an XML configuration
    to define a pointcut in a declarative way. It covers most of the common cases
    so that programmatically defined pointcuts rarely need to be used. The regexp
    pointcut, however, does not match on the parameter types nor on the return type,
    but only on the fully qualified method name.


    For instance, the code in Listing 6-16 defines a pointcut that matches all the
    getters and setters of the Order class:


    **Listing 6-16.** *A Regexp Pointcut Example*


    <bean id="tracePointcut"


    class="org.springframework.aop.support.Perl5RegexpMethodPointcut">


    <property name="patterns">


    <list>


    <value>aop.spring.Order.get* </value>


    <value>aop.spring.Order.set*</value>


    </list>


    </property>


    </bean>


