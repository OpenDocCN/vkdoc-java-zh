    \ Bank`的原始版本就选择了这种解决方案，该应用程序使用`Struts`开源框架实现。\n\n## 自动集成解决方案\n\n在`J2EE`上下文中，我们使用部署描述符（参见本节中的`XML`代码）来配置由容器管理的非功能性服务。例如，这种技术允许我们将事务集成到外观服务中，或以声明方式将持久性添加到业务对象中。还可以配置组件以包含远程访问功能，例如命名或声明远程接口，以及管理权限的功能。这些自动集成解决方案被称为*声明式管理*或*容器管理*解决方案。\n\
    \n`Listing 10-8`展示了`ejb-jar.xml`文件的一部分。\n\n**Listing 10-8.** *用于自动集成技术服务的`ejb-jar.xml`文件*\n\
    \n```\n<enterprise-beans>\n  <session>\n    <description>no description</description>\n\
    \    <display-name>BankEJB</display-name>\n    <ejb-name>BankEJB</ejb-name>\n\
    \    <home>aop.j2ee.business.session.bank.BankHome</home>\n    <remote>aop.j2ee.business.session.bank.Bank</remote>\n\
    \    <ejb-class>aop.j2ee.business.session.bank.BankBean</ejb-class>\n    <session-type>Stateless</session-type>\n\
    \    <transaction-type>Container</transaction-type>\n  </session>\n</enterprise-beans>\n\
    \n<assembly-descriptor>\n  <security-role>\n    <role-name>BankCustomer</role-name>\n\
    \  </security-role>\n  <security-role>\n    <role-name>BankAdmin</role-name>\n\
    \  </security-role>\n  <container-transaction>\n    <method>\n      <ejb-name>BankEJB</ejb-name>\n\
    \      <method-intf>Remote</method-intf>\n      <method-name>getCustomersOfAccount</method-name>\n\
    \      <method-params>\n        <method-param>java.lang.String</method-param>\n\
    \      </method-params>\n    </method>\n    <trans-attribute>Required</trans-attribute>\n\
    \  </container-transaction>\n  [...]\n```\n\n`Listing 10-9`展示了`sun-ejb-jar.xml`文件的一部分。\n\
    \n**Listing 10-9.** *用于命名和访问的`sun-ejb-jar.xml`文件*\n\n```\n<sun-ejb-jar>\n  <security-role-mapping>\n\
    \    <role-name>BankCustomer</role-name>\n    <group-name>Customer</group-name>\n\
    \  </security-role-mapping>\n  <security-role-mapping>\n    <role-name>BankAdmin</role-name>\n\
    \    <group-name>Admin</group-name>\n  </security-role-mapping>\n  <enterprise-beans>\n\
    \    <name>bank-ejb.jar</name>\n    <unique-id>2059221019</unique-id>\n    <ejb>\n\
    \      <ejb-name>BankEJB</ejb-name>\n      <jndi-name>ejb/bank</jndi-name>\n \
    \     [...]\n    </ejb>\n  </enterprise-beans>\n  [...]\n</sun-ejb-jar>\n```\n\
    \n这些解决方案极大地简化了编程任务，因为我们不是显式地在代码中使用`API`，而是以声明方式配置容器。通过这种方式，`J2EE`允许我们分离出一定数量的非功能性横切关注点，这一点与`AOP`有共同之处。下一节将描述如何使用`AOP`来补充——甚至取代——这些解决方案。\n\
    \n## 使用AOP\n\n正如你在第8章中学到的，许多设计模式可以从面向方面的实现中受益。这也适用于一定数量的`J2EE`设计模式，在这些模式中，使用`AOP`具有明显的优势。`service\
    \ locator`和`business delegate`就是这种情况，它们显然都是横切性的。其他设计模式也可以通过使用`AOP`得到改进。例如，`facade`和`business\
