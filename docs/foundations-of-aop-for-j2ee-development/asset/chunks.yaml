    ## Precondition Factorization


    In Chapter 9, we presented the use of AOP for transparently adding constraints
    within a program, particularly for adding pre- and postconditions.


    Here, we apply the same principles to the reference application.


    ### Regular Implementation


    The implementation of the `TxController` session facade shows that the arguments
    of an account operation must be checked by preconditions.


    If we focus on the withdrawal operation discussed before in the context of `TxControllerPOJO`,
    the implementation shown in Listing 11-15 is obtained.


    **Listing 11-15.** *The Withdraw Implementation, with Arguments Checks Included*


    ```

