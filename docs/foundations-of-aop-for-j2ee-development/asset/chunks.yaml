    09 declare precedence: GoldMembershipFilterAspect,


    10 SilverMembershipFilterAspect, *; 11


    12 private String FrontController.subscriptionType="silver"; 13 private String
    FrontController.denyPage="/secure/denied.jsp; 14


    15 pointcut filter(ServletRequest request,ServletResponse response): 16 execution(protected
    void process(HttpServletRequest, HttpServletResponse)) 17 && args(request,response);
    18


    19 around(ServletRequest request,


    20 ServletResponse response): filter(request,response) {


    22 throws IOException, ServletException {


    23 [...] // 对请求进行处理


    24 // 继续应用过滤器


    25 proceed(request,response);


    26 [...] // 对响应进行处理


    27 }


    28 }


    在面向切面的解决方案中，`proceed` 实现了对下一个过滤器的调用（第 25 行）。过滤器应用的顺序由优先级声明定义（第 9 行）。这里，我们通过切入点应用过滤器，该切入点对应于前端控制器请求处理的执行（第
    15 行）。这确保了所有传入的请求和传出的响应都被过滤。由于所有过滤器的切入点相同，因此可以将其提取到超类中。


    请注意，这种技术比原始技术更灵活。通过修改切入点，例如，我们可以将过滤器安装在应用程序控制器上，而不仅仅是前端控制器上。这种技术的唯一缺点是过滤器不是以声明方式（在
    `web.xml` 文件中）定义的。当进行更改时，应用程序需要重新编译。


    **视图助手**


    *视图助手*是一个 Java 对象，它实现了 JSP 页面逻辑的子部分。出于维护和性能方面的原因，此设计模式将 Java 代码从 JSP 中外部化。实际上，当
    JSP 的 Java 逻辑在视图助手中实现时，代码只被编译和加载一次，从而避免了 Web 容器处理过多 Java 代码。


    在特定情况下，通过使用 AOP 可以改进视图助手的实现。例如，我们可以添加过滤器，根据某些基于会话的标准（如用户偏好）来修改助手的行为。这种 AOP 的使用可以被视为先前描述的拦截过滤器的泛化。请注意，系统性地使用
    AOP 进行过滤可以实现更好的关注点分离。例如，过滤可以用于以模块化方式实现某些国际化功能。


