  raw: 'The automatic integration solutions discussed earlier can also be improved
    by using AOP, as they demonstrate the following associated problems:


    • Because the container manages the integration automatically, there are very
    few ways to adjust this integration in cases where it is unsatisfactory or cannot
    be configured in the required way.


    • Declarative configuration only works well for simple cases and often necessitates
    programming a complementary code fragment in Java, which limits its usefulness.
    It is sometimes preferable not to parameterize at all and rely on explicit design
    solutions such as design patterns and frameworks.


    • Apart from in the case of normalized solutions, solutions for automatic integration
    often depend on the application server, which limits portability.


    AOP avoids most of these limitations by integrating services in a modular way,
    using deployment descriptors when appropriate, but also AspectJ code, resulting
    in a technique that is both flexible and powerful.


    **226**


    C H A P T E R 1 0 ■ P R E S E N T A T I O N O F T H E S A M P L E A P P L I C
    A T I O N


    **Summary**


    This chapter presented a J2EE banking program that was constructed from the Duke’s
    Bank sample application and showed its organization into projects and packages.
    This allowed us to explore its architecture and design comprehensively. After
    reading this chapter, you should now have a basic understanding of the design
    problems of this application and the ways in which AOP can resolve them.


    The next two chapters present a detailed account of the use of AOP with this sample
    application, tier by tier. Although design elements may affect several tiers,
    it is best to concentrate on one at a time when implementing a design pattern.
    This allows the projects corresponding to each of the layers to remain independent
    of each another.


    For each of the tiers, we will evaluate the improvements offered by AOP according
    to three criteria:


    • Improvements in the implementation of the design patterns used, concentrating
    on J2EE design patterns


    • Improvements to a design element that is recognized as being crosscutting, but
    that is not an identified design pattern or does not fit within the documented
    context of a design pattern


    • Improvements whereby the design depends less on the J2EE technologies, especially
    EJBs


    As far as the business layer is concerned, we will also evaluate the possibility
    of replacing automatic integration with a solution using AOP.


    C H A P T E R 1 1


    ■ ■ ■


    Using AOP within the Sample


    Application’s Business Tier


    **W**hen implementing the business tier, programmers use J2EE design patterns.
    Most business tier J2EE design patterns rely on EJBs. The session facade pattern,
    for example, advises the use of a session EJB. Using EJBs allows for the automatic
    integration of additional concerns.


    J2EE design patterns are also simpler than GoF design patterns.


    In this chapter, we will explore the use of AOP within the business tier of our
    reference application. You will see that, within this context, AOP has three main
    advantages:


    • Making the application independent from EJB technology. In changing Enterprise
    environments, which rely on new technologies, independence is a desirable property.


    • Bringing an alternative, more flexible solution to the existing automatic integration
    solutions.


    • Simplifying the J2EE design pattern implementations and making them more transparent
    to the user.


    **AOP OR COMPONENT CONTAINERS?**


    AOP and component-based programming share the same goal: to separate the business
    logic from the technical concerns such as persistence and transactions, and to
    integrate them in a clear and automatic way. The major difficulty of integration
    comes from the interdependencies between the technical concerns, which are then
    interleaved at the code level, thus going against the fundamental principles of
    software engineering: encapsulation and separation of concerns.


    Component containers integrate technical concerns at deployment time. For this,
    they rely on a component model, like EJB, and on deployment descriptors, which
    are defined as XML files for EJBs. The latter files parameterize the integration
    in a declarative manner. However, there is no simple solution to extend or modify
    the integration mechanics when needed. In these cases, the use of design patterns,
    external frameworks, or AOP can help the programmer to tune the integration.


    Among all these solutions, AOP is the only one that specifies the integration
    in an imperative manner, that is to say, through a program, which keeps the base
    program unchanged and technologically independent.


    Indeed, in the case of design patterns, the program’s structure must be modified.
    In the case of frameworks, dependencies need to be added towards the required
    APIs or classes need to be specialized. These are technological dependences that
    can be avoided with AOP.


    **227**


    **228**


