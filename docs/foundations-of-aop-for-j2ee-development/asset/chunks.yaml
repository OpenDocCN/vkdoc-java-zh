    第 12 章 ■ 在示例应用程序的表示层和客户端层使用 AOP


    **类型化 AOP 与通用 AOP**


    一些 AOP 技术允许通知代码和切入点进行静态类型化；这被称为*类型化 AOP*。例如，Prose 项目允许对某些通知参数进行类型化，从而带来优化可能性。Rickard
    Oberg 提出了一种基于抽象模式的实现技术，该技术提供了静态类型化。AspectJ 无疑是解决此问题最先进的语言。特别是，它允许将组成连接点的不同元素绑定到某些切入点变量，这些变量可以在通知实现中使用。


    当 AOP 是非类型化的（或通用的），并且需要访问连接点信息时，最好的替代方案是使用反射。通知代码可以内省一个连接点，并访问当前对象（`this` 或 `target`）、当前调用或执行的方法及其参数。所有这些信息都可以通过非类型化对象（`java.lang.Object`
    或 `java.lang.reflect.Method`）获得。程序员随后根据需要手动转换和拆箱对象。在类型化 AOP 中，程序可以将一个 `int` 参数传递给通知代码，而在通用情况下，同一个参数将是一个需要转换为
    `Integer` 实例的 `Object`。


    两种技术各有优缺点。类型化 AOP 允许在编译和织入阶段进行一定程度的程序验证。因此，IDE 可能在代码补全、上下文帮助和浏览方面提供更好的支持。另一方面，类型化
    AOP 灵活性较差，并且使得编写可重用的通知代码更加困难，如前文重试切面所示。类型化 AOP 意味着基础程序与切面之间存在强依赖关系。如果基础程序接口发生变化，很可能会影响切面的实现，包括通知代码，这可能会阻碍可重用性和演进。这就是关注点分离悖论：关注点分离得越好，它们就越不可能独立演进。相反，通用
    AOP 允许创建通用且可重用的切面。然而，它几乎完全禁用了编译时和织入时的测试。因此，程序员在使用通用 AOP 编程时应更加小心。


    在性能方面，类型化 AOP 比通用 AOP 具有很大优势，尤其是当通知代码使用被通知方法的参数时。实际上，对参数的反射访问意味着创建一个对象数组，这是通用
    AOP 以及更普遍的反射编程（参见 `java.lang.reflect` API）中性能损失的主要原因。我们应该注意到，对于大多数实际应用程序来说，这个性能问题完全微不足道，因为切面和业务层的复杂性使得开销相比之下微不足道。例如，前面介绍的通用重试切面与用于调用外观服务的远程调用相比，产生的开销微不足道。


    为了获得最佳的面向切面设计，应该明智地同时使用类型化和通用 AOP 技术，以便在可能的情况下实现各自的优势。


    第 12 章 ■ 在示例应用程序的表示层和客户端层使用 AOP


    **287**


    **关注点分离悖论**

    '
- fmt: '# AOP 的目标与挑战


    AOP 的最终目标是提供更好的关注点分离。这一目标通过切面实现，因为它们允许将使用常规编程技术无法清晰模块化的关注点进行模块化。然而，当不同模块被集成时，将关注点分离到不同模块会产生另一种依赖关系。这种依赖关系，我们称之为*关联耦合*，在使用静态类型
    AOP 时尤为重要。


    例如，使用静态类型的重试切面时，切入点捕获的方法签名的更改会使该切入点定义以及相关的通知代码失效。从长远来看，应用程序的任何演化都可能变得繁琐。从某种意义上说，这是一个悖论：关注点分离使应用程序更易于理解，同时也使其更难以维护。这就是*关注点分离悖论*。


    使用泛型 AOP 可以最大限度地减少这个问题，但在切入点或切面配置（在`JAC`的配置接口、`JBoss AOP`或`AspectWerkz`的`XML`配置文件中，甚至在使用即将推出的基于`Java
    5`的技术时的注解中）中仍然存在耦合。


    尽管我们无法否认关注点分离悖论，但面向切面的设计仍然是更好的选择。通过这种设计，切面的耦合比没有任何切面的相同实现的耦合更加局部化。此外，它允许在应用程序发生变化时更快地进行重构。换句话说，AOP
    并没有消除依赖关系，但它允许更好地控制这些依赖关系。


    工具支持也有助于控制这些依赖关系。例如，在`JAC`中，配置级别将依赖关系降至最低。在`AspectJ`中，我们可以通过系统性地使用抽象切面（参见第 3 章）以及在扩展抽象切面的具体切面中实际定义切入点来改进解耦。*切入点库*技术也很有用。有关这些技术的更多详细信息，请参阅`AspectJ`的特定指南。


    # 透明地引入数据传输对象


    如前所述，数据传输对象模式允许优化客户端/服务器通信。它将一组基本请求聚合为更高级别的请求，这些请求使用传输对象来聚合基本请求的参数。


    在特定情况下，这种设计模式极大地受益于 AOP；但是，不建议为了优化通信而修改业务 API。同样，出于相同原因使客户端实现复杂化将是一种反模式。


    借助 AOP，我们可以定义两个切面，一个用于客户端，一个用于服务器，这样我们就可以完全将应用程序代码从这种优化关注点中解放出来。首先，我们需要在客户端代码中找到可以从数据传输对象优化中受益的服务器使用模式（用例）。如果我们查看`Simple`客户端的代码，我们会发现账户创建是通过两次连续的远程调用完成的：一次调用`Bank.createCustomer`，另一次调用`Bank.createAccount`，后者将当前创建的客户作为参数。例如，当注册新客户并为该用户分配默认账户时，就会出现这种用例。这是一种频繁的操作，我们希望仅通过一次远程调用来实现，以减少网络流量。处理单个调用/事务也很有意义，这样回滚可以以更高效的方式实现（在实际执行调用之前，只需要进行本地客户端取消操作）。


    ```

