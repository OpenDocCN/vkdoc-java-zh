    **A First Pointcut Descriptor**


    In an aspect, the pointcut keyword is used to define a *pointcut descriptor*.
    Pointcut descriptors can be named. In the example of the TraceAspect aspect, the
    pointcut descriptor is named toBeTraced.


    Each pointcut descriptor is an expression (see line 6 in Listing 3-5) that denotes
    the set of associated joinpoints. Several different types of joinpoints can be
    used. However, this is not the case in the example of the toBeTraced pointcut
    descriptor, in which call is the only type of joinpoint.


    The call joinpoint designates the points where a method is called. The signature
    of the called method is given in parentheses. The signature refers to the addItem
    method, which is defined in the Order class, has two parameters of type String
    and int, returns void, and is public. This signature is so precise that only one
    method fits this pointcut. In the “Wildcards”


    section later in this chapter, you will see that wildcards can be used to match
    several methods with the same pointcut descriptor.


    The toBeTraced pointcut is associated with the addItem method; however, this does
    not mean that only one joinpoint exists for this pointcut. In fact, all the locations
    where the method is called match the pointcut. In the example in Listing 3-1,
    when addItem is called two times in the run method of the Customer class, both
    locations match the pointcut.


    In general, the number of joinpoints associated with a pointcut is not predetermined—the
    number varies depending on the particular pointcut and its application. It is
    possible to write 1\. In many applications, there is a clear difference between
