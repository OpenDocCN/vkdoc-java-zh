    **Summary**


    In this chapter, we depicted the basic features of Spring and illustrated how
    to use Spring AOP.


    Spring provides a lightweight bean container (factory) that implements the Inversion
    of Control (Dependency Injection) principle. The IoC principle allows a clean
    separation between the bean definition and the bean dependency management and
    configuration. In short, when an application needs a bean, it asks the factory
    in charge of creating it and configuring it with the application context (usually
    expressed in XML bean configuration files).


    A strength of Spring is that it applies the same IoC principles to AOP, which
    gives it two primary advantages: First, AOP is cleanly integrated into the bean
    definition, which makes the whole framework convincing and consistent. In addition,
    most of the development and configuration processes are already familiar to programmers
    who have used Spring beans. Second, it gives a good balance between configuration
    and Java programming. Even though most AOP


    basic features are usable through property configuration, it is always possible
    to customize the AOP model programmatically, or even to provide new configurable
    AOP concepts. The clean interface-based design of Spring is actually of a great
    help here.


    From an abstract model perspective, Spring AOP defines the same concepts as classical
    AOP (advice, pointcuts, introductions, cflows), except that it materializes the
    link between an advice and a pointcut with the concept of an *advisor*. Introductions
    are handled as a special type of advice; it is our feeling that some of the concepts
    provided need further enhancement and refinement, which is understandable since
    Spring AOP is a young framework. The open design of Spring, especially interface-based
    design and IoC, will make it easy to improve the model in the future.


    From an implementation perspective, Spring AOP relies on a proxy framework implemented
    on top of the JDK and the CGLIB proxies, which allows for a more dynamic AOP.


    Compared to other AOP implementations, it makes some of the Spring AOP support
    less efficient and less flexible. In particular, the distinction between “call”
    and “execution” advice is not clear, and the cflow mechanism is not as flexible
    as in AspectJ or JBoss-AOP. Having to create a lot of proxies is also less efficient
    than more intrusive implementations such as AspectJ. On the other hand, the Spring
    proxying mechanism, and especially the Spring autoproxying mechanism, gives a
    way to better integrate AOP in a J2EE environment that includes complex legacy
    code.


    C H A P T E R 7


