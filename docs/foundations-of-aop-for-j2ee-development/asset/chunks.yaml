- fmt: '# Book Road Map


    The first two chapters introduce AOP and present the main new concepts of this
    paradigm. The three major notions of AOP—aspects, pointcuts, and joinpoints—are
    defined. These chapters are recommended for readers without any prior knowledge
    of AOP.


    The major existing products of AOP are presented in Chapters 3 through 7. Each
    chapter in this section is dedicated to a particular product: AspectJ (the leading
    language of the domain), JAC, JBoss AOP, and Spring AOP. These chapters can be
    read independently. Each chapter assumes only that you are familiar with the concepts
    presented in the first part. Chapter 7 compares the features of the four presented
    products.


    Chapters 8 and 9 present the uses of AOP for programming design patterns, for
    improving software quality and for supervising and administering applications.
    These chapters are independent and can be read separately. AspectJ is the language
    chosen to illustrate the concepts introduced in these chapters. Reading Chapter
    3 on AspectJ beforehand may help you understand the examples presented.


    A case study of an aspect-oriented J2EE application is presented in Chapters 10
    to 12. Chapter 10 is a general presentation of the application, independent of
    a solution (AOP or not) for implementing it. The next two chapters show how AOP
    can improve the implementation of the business tier of the application, and then
    the presentation tier. Chapters 11 and 12 are stand-alone and can be read separately.


    ## About the Code Examples


    The code examples provided in this book assume some basic knowledge of the Java
    programming language. The case study presented in Chapters 10 through 12 assumes
    knowledge of the principles of programming applications with J2EE.


    All code examples from this book can be downloaded from Source Code area of the
    Apress web site (`http://www.apress.com`). In some cases (especially the J2EE
    case study), the programs presented in the text are truncated and only selected
    relevant excerpts are presented. The downloadable source code for this book contains
    the full version of all programs.


    ## Frequently Asked Questions


    The following series of questions and answers will help you gain a first insight
    into AOP, and understand its impacts on other programming paradigms and its role
    on enterprise application developments.


    ### What Is AOP?


    Several kinds of concerns need to be addressed when developing applications. These
    concerns can be classified in two categories: functional concerns, which deal
    with the business logic of the application, and technical concerns, which are
    related to the executing environment (operating system, network, etc.).


    The principle known as the *separation of concerns* aims to decouple and separate
    each concern as much as possible to foster modularity. Object-oriented programming
    (OOP) has provided a good solution for separating many business concerns, and
    as a result applications are more reusable since the separated concerns can be
    easily reused in several different applications. However, technical or functional
    concerns that are said to be crosscutting are not easily dealt with using OOP.


    AOP is a paradigm for separating concerns and for modularizing crosscutting concerns
    in well-identified software entities called *aspects*.


    ### Does AOP Replace OOP?


    AOP does not replace OOP. AOP complements OOP by modularizing crosscutting concerns.


    Therefore, programming an AOP application is still a matter of writing classes
    with fields and methods. AOP adds a new dimension of modularity in the sense that
    these classes are complemented with aspects, which implement concerns not efficiently
    modularized with classes.


    ### Is AOP Used in Enterprise Applications?


    AOP is a relatively new technique that appeared in the mid-1990s. As far as we
    know, no major software editor sells applications that were developed with AOP.
    However, many vendors, such as IBM, are investigating the use of AOP to improve
    the efficiency of developing J2SE and J2EE applications.'
