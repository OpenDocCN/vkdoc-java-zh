    **Figure 11-3.** *Business tier components and their aspects* We can note that
    the sizes of the business components implementations are clearly smaller for the
    POJO versions. This comes from the persistence externalization.


    Advice codes are used more in facade components (like the last two) than in the
    business components. This comes from an implementation choice, which makes a great
    use of intertype declarations on business components.


    C H A P T E R 1 2


    ■ ■ ■


    Using AOP in the Sample


    Application’s Presentation and


    Client Tiers


    **I**n Chapter 11, we used AOP to improve the business tier design of the Duke’s
    Bank case study application presented in Chapter 10\. In this chapter, we’ll investigate
    the use of AOP in other tiers—in particular, the Java (Swing) client tier and
    the presentation tier. We will not use the data tier since it cannot benefit from
    Java-based AOP techniques (as we explained previously in Chapter 11).


    The original design of the case study does not adapt completely to AOP because
    it uses ad hoc design solutions. The web presentation tier, for example, uses
    the Struts framework, which encapsulates some difficult design issues. This does
    not mean that AOP cannot be useful, especially for improving Struts implementation
    or integration. However, because of the inherent complexity, in this chapter we
    introduce simplified pieces of design to more clearly illustrate the advantages
    of AOP.


    We first show the use of AOP in the Java Swing client, and then we elaborate on
    its impacts for the web (Servlets/JSP) presentation tier.


    **Using AOP for Distributed Communications**


    Communication issues can arise when clients access the business servers in a three-tier
    J2EE


    environment. The client tier contains several design patterns that are designed
    to deal with the concerns that come with distributed communications.


    The J2EE design patterns for communication and data transfer most often impact
    the client side and occasionally impact the server side. Thus, these patterns
    represent an important source of crosscutting, especially when building multiclient
    applications.


    As previously explained, the use of J2EE design patterns is not mandatory. However,
    by using them, we can contrast aspect-oriented implementations with well-documented,
    well-known, and proven reference designs.


    **271**


    **272**


    C H A P T E R 1 2 ■ U S I N G A O P I N T H E S A M P L E A P P L I C A T I O
    N ’ S P R E S E N T A T I O N A N D C L I E N T T I E R S


    **Design Patterns for Business Layer Access**


    The three main J2EE design patterns for client/server communication are the business
    delegate, the service locator, and the data transfer object. In this chapter,
    we illustrate these patterns used with and without the help of AOP.


    For simplicity, we use a basic Java client that accesses the sample application
    presented in Chapter 11 as well as this one. We discuss its limitations and show
    how aspects improve the client implementation independence with regard to the
    technology and the design choices.


    Business Delegate


    The goal of the *business delegate* is to hide the implementation details of the
    server remote access protocol, such as the lookup of the EJB container, through
    a JNDI repository or the processing of remote invocations. As a consequence, this
    design pattern reduces the coupling between the presentation tier clients and
    the business tier.'
