    The implementation of the communication optimization aspect `TransferOptimizer`
    relies on a simple idea. When the first method of the sequence is called (the
    first advice code), we replace the call by the creation of the transfer object
    and its partial initialization (line 21). This transfer object is then locally
    saved in a threadlocal variable (lines 11 and 30). The threadlocal makes the aspect
    thread safe. Hence, the `TransferOptimizer` aspect behaves like an upload cache.


    When the second method of the sequence is called, we complete the transfer object
    initialization with the parameters and invoke the `createAccountWithCustomer`
    remote service (line 55).


    This service is transparently added by the server-side aspect. If the thread local
    returns `null` (line 44), we assume that we are not within a sequence to optimize
    and we directly invoke the service (line 46). This technique can be generalized
    to any sequence.


    Optimization aspects depend on the application code. If the program changes, the
    aspect is likely to be invalidated. For instance, if the program were using the
    `createCustomer` method’s result, the optimization would not be valid any longer,
    since the program would have to return a `null` value for `createCustomer`. This
    coupling is stronger than the separation of concern paradox coupling. In this
    case, the aspect can be invalidated even if the object interfaces are stable,
    since the aspect heavily relies on their internal implementation.


    **Client Tier Communication Aspects Synthesis**


    So far, we have presented three aspects to manage typical concerns found in a
    distributed context, and we have applied them to a simple Java client (`aop.j2ee.client.java.aspectized.Simple`).
    These aspects are illustrated Figure 12-1.


    ![Image 16](index-305_1.png)


    **Figure 12-1.** *Three aspects for client/server communication*


    The three aspects have the following roles:


    - `aop.j2ee.client.java.aspect.Locator` uses an implicit protocol to resolve the
    business facades. The darkest line of the `Simple.java` bar corresponds to the
    implementation of the `getServiceFacade` method, which is defined but not implemented
    by the client.

    - `aop.j2ee.client.java.aspect.Retry` implements a retry policy to minimize the
    impacts of potential communication errors. We use the generic aspect, which applies
    to all the methods (three lines).

    - `aop.j2ee.client.java.aspect.TransferOptimizer` enhances the client’s performance
    by seamlessly introducing a transfer object. The two lines related to this aspect
    correspond to the `createCustomer` and `createAccount` calling sequence, which
    we optimize with the transfer object.


    This is not a complete design of a distributed concern. Coverage of all the possible
    subconcerns of this complicated concern is beyond the scope of this book, but
    this design gives you some indication of how to build well-designed distributed
    applications by using AOP. Note that the same design has also been successfully
    applied to the administration client of the bank.


    **Using AOP for the Presentation of the Client Tier**


    Once the communication concerns are managed, the client handles the presentation,
    which is usually a complicated task. In the case of Swing-based clients, the techniques
    do not differ from non-J2EE applications. For a thin web client, the implementation
    differs, since the presentation is located on the server side within a web container
    over JSP/Servlets.


    This section presents use cases for AOP in the presentation tier. First, we show
    examples of the UI in general. Next, we study the web presentation tier by enhancing
    the design patterns commonly used for this tier.


    **Using AOP for UI Concerns**


    Because of its complexity, the UI often represents an important part of an application’s
    development. Although these concerns are not J2EE specific, aspects can help in
    their development.


    In the sections that follow, we illustrate the use of AOP for two generic UI concerns:
    internationalization and condition verification on input data. To do so, we rely
    on the Java Swing administration client of the banking application.


    **Application Internationalization**


    An ongoing concern during development of J2EE applications is application internationalization.
    *Internationalization* consists of supporting several languages within the same
    application.


    Property files are frequently used to support this concern. In Java, however,
    numerous operations need to be performed in order to implement internationalization.


    For instance, a common solution for handling error messages is to define the error
    message set within a property file, which can be translated into different languages.
    The client-side configuration indicates which file to use in the program. For
    the banking administration client, this configuration is done by a launching parameter:


    ```

    %JAVA_HOME%\bin\java –Daop.j2ee.config.applicationname=BankAdmin

