    **总结**


    在本章中，你了解了 AOP 如何通过验证应用程序的定义和执行与其确定的需求相符，来用于改进应用程序的服务质量。首先，我们展示了 AOP 如何以直接的方式帮助实现契约。其次，我们展示了两种测试技术的
    AOP 实现：覆盖分析和非回归测试。最后，我们展示了如何使用 AOP 将 JMX 无缝集成到 Java 应用程序中。


    我们的 AOP 实现并未提供比现有工具更多的功能。然而，我们的实现展示了如何在开发层面使用 AOP 来提高代码质量——而无需任何特定的支持。此外，AOP 技术的一个重要优势是它提供了在需要时插拔服务质量支持的能力——如果使用动态
    AOP 工具，甚至可以在运行时进行。


