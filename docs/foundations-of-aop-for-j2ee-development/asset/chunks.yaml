    **Context Object**


    The *context object* design pattern encapsulates a contextual state linked to
    a request but independent of the HTTP protocol. The context object can then be
    used in the different roles of the presentation tiers.


    The use of context objects makes the treatments simpler, more generic, and less
    dependent on a particular web container. The context object classes are generally
    part of an inheritance hierarchy, where the parent classes deal with the specificities
    of the HTTP protocol; they contain references to the javax.servlet.http package.


    With AOP, the whole context object design pattern can be made independent from
    the HTTP protocol. The code of HttpRequestContext shows how to introduce the specificities
    of the HTTP protocol (see Listing 12-20).


