    package aop.patterns.singleton;\n\npublic class Stats {\n\n    private int orders\
    \ = 0;\n    private float totalAmount = 0;\n    private String status = \"OK\"\
    ;\n\n    public int getOrders() {\n        return orders;\n    }\n\n    public\
    \ void incOrders() {\n        orders++;\n    }\n\n    public float getTotalAmount()\
    \ {\n        return totalAmount;\n    }\n\n    public void addAmount(float p)\
    \ {\n        totalAmount += p;\n    }\n\n    public String getStatus() {\n   \
    \     return status;\n    }\n\n    public void setStatus(String p) {\n       \
    \ status = p;\n    }\n\n    public void reset() {\n        orders = 0;\n     \
    \   totalAmount = 0;\n        status = \"OK\";\n    }\n}\n```\n\nWe will apply\
    \ the Singleton design pattern to this class by parameterizing the file `jboss-aop.xml`\
    \ in the way shown in Listing 8-4.\n\n**Listing 8-4.** *Binding the Singleton\
    \ Design Pattern to the Stats Class*\n\n```\n<bind pointcut=\"execution(aop.patterns.singleton.Stats->new())\"\
    >\n    <interceptor class=\"aop.patterns.singleton.SingletonInterceptor\">\n</bind>\n\
    ```\n\nIt is easy to check if the design pattern has been applied correctly by\
    \ using the class in Listing 8-5.\n\n**Listing 8-5.** *Main Class for Testing\
    \ the Singleton Design Pattern with JBoss AOP*\n\n```\npackage aop.patterns.singleton;\n\
    \npublic class SingletonExample {\n\n    public static void main(String[] args)\
    \ {\n        Stats stats1 = new Stats();\n        Stats stats2 = new Stats();\n\
    \n        if (stats1 == stats2) {\n            System.out.println(\"These instances\
    \ are the same!\");\n        } else {\n            System.out.println(\"These\
    \ instances are not the same!\");\n        }\n    }\n}\n```\n\nWe no longer need\
    \ the method `getInstance` since the Singleton is accessed through a standard\
    \ call to the constructor. The Singleton design pattern is now entirely transparent\
    \ with respect to the application.\n\nThe result obtained by running this program\
    \ is the following: `These instances are the same!`\n\nWe have successfully applied\
    \ the Singleton design pattern to the class `Stats` without needing to modify\
    \ the code of `Stats`, or any class that uses it.\n\n## A Second Implementation\
    \ of the Singleton Aspect with AspectJ\n\nThe same result can be obtained with\
    \ AspectJ. We start by defining an abstract aspect independent of the pointcut\
    \ that determines the classes to be transformed into singletons (see Listing 8-6).\n\
    \n**Listing 8-6.** *Implementation of the Singleton Design Pattern Using AspectJ*\n\
    \n```\npackage aop.patterns.singleton;\n\npublic abstract aspect AbstractSingletonAspect\
    \ {\n\n    private Object singleton = null;\n\n    abstract pointcut singletonPointcut();\n\
    \n    Object around(): singletonPointcut() {\n        if (singleton == null) {\n\
    \            singleton = proceed();\n        }\n        return singleton;\n  \
    \  }\n}\n```\n\nThe abstract aspect defines two elements: an abstract pointcut,\
    \ which must be defined by the concrete aspects and with subclass `AbstractSingletonAspect`;\
    \ and an “around” advice, which is similar to the `invoke` method in the JBoss\
    \ AOP interceptor.\n\nThis implementation presents a flow. In AspectJ, an aspect\
    \ is a singleton by default, which means that one instance of the aspect is shared\
    \ by all the classes designated by the `singletonPointcut` pointcut. Therefore,\
    \ the aspect contains a reference to one unique instance of the singleton class.\
    \ Each time the advice is executed, the existing singleton is obliterated by one\
    \ of the newly created classes.\n\nThe AspectJ keywords `perthis` and `pertarget`\
    \ cannot be used here since they would generate one instance of the aspect for\
    \ every instance of the class, which is the opposite of the desired effect.\n\n\
    This problem can be solved in the following way:\n\n- Define an abstract aspect\
    \ as a superaspect for several concrete aspects: one for each class to be turned\
    \ into a singleton. This way, the individual classes will not interfere with the\
    \ other singletons. This is the solution we have chosen to implement in the preceding\
    \ example.\n- Use a hash table (`java.util.Hashtable`) to store the singleton\
    \ for each of the transformed classes. We give an example of this solution in\
    \ the next section."
