  \ == 1) 33 throw new InsufficientCreditException();\n\n34 executeTx(amount,descr,fromAccountId,fromNewBalance,fromAccount);\
  \ 35 } else {\n\n36 BigDecimal fromNewBalance= fromBalance.subtract(amount); 37\
