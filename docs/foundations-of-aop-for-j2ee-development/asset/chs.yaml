  第 24、26、29 和 32 行展示了应用程序如何访问国际化消息，这些消息通过字符串键进行索引。由此可见，国际化是一个横切关注点，处理起来可能比较困难。此外，由于这些访问分散在客户端代码中，并与异常处理紧密交织，维护工作也变得更加困难。\n\
  \n在国际化上下文中，错误处理关注点的外部化是在 i18n 切面中完成的。然而，国际化关注点还必须处理诸如计量单位、货币以及图形组件中的标签等问题。\n\n清单\
