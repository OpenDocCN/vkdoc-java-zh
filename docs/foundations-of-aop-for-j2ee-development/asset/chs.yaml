  \ {\n\n055 String filter = (String) invocation.getMetaData(\"cover\", \"filter\"\
  ); 056 if (filter != null && filter.equals(\"true\")) {\n\n057 return invocation.invokeNext();\n\
  \n058 }\n\n059 InvocationResponse rsp = invocation.invokeNext(); 060 InvocationType\
  \ invocationType = invocation.getType(); 061 if (invocationType == InvocationType.METHOD)\
  \ {\n\n062 MethodInvocation methodInvocation = (MethodInvocation)invocation; 063\
  \ Method method = methodInvocation.method;\n\n064 String className = method.getDeclaringClass().getName();\
  \ 065 String methodName = method.getName();\n\n066 Class returnType = method.getReturnType();\
  \ 067 Class[] parameters = method.getParameterTypes(); 068 Class[] exceptions =\
  \ method.getExceptionTypes();\n\n第 9 章 ■ 服务质量与 AOP\n\n**183**\n\n069 out.print(\"\
  Method call,\");\n\n070 recordMethodCall(className,methodName,returnType, parameters,\
  \ 071 exceptions); 072 } else if (invocationType==InvocationType.CONSTRUCTOR) {\n\
  \n073 ConstructorInvocation constructorInvocation =\n\n\n\n074 (ConstructorInvocation)invocation;\
  \ 075 Constructor constructor = constructorInvocation.constructor; 076 String className\
