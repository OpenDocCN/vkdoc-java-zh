  \n示例\n\n递增\n\n空\n\n示例\n\n递减\n\n**图 9-4.** *版本 1 和版本 2 中递增方法的比较*\n\n**面向应用管理与监控的\
  \ AOP**\n\n尽管管理和监控对于多层应用至关重要，但开发人员很少考虑这些任务，他们自然倾向于关注应用的主要功能。由于这些任务没有在前期得到处理，管理和监控可以从\
  \ AOP 提供的更高程度的关注点分离中受益。事实上，独立开发一些管理和监控功能是很有意义的，这样可以在需要时插入或拔出这些功能。\n\n某些标准——简单邮件传输协议\
  \ (SMTP) 和 Java 管理扩展 (JMX)——可用于管理和监控，并且最好使用它们而不是从头编写代码。实际上，互操作性通常是管理和监控的一个要求，因为这些任务可能横切企业应用的多个子系统。\n\
  \nJMX\n\n通过 JMX，Java 提供了一个用于管理和监控的标准规范及库。JMX 依赖于两个主要功能：\n\n• 通过特定 API 开放 Java 组件，使管理和监控工具能够完全访问这些组件\n\
  • 一个通知机制，用于在需要时实现自动检查\n\n**192**\n\n第 9 章 ■ 服务质量与面向切面编程\n\n请注意，JMX 被现有应用服务器的管理控制台广泛使用。\n\
  \nJMX 架构由以下三层组成：\n\n• *仪表化*：该层的作用是将组件开放给其他层。这些组件随后被称为*可管理资源*。\n\n\n• *代理层*：该层利用上一层的可管理资源，并通过适配器使其可供外部应用程序（即分布式服务层）访问。该层还提供若干服务——例如动态类加载、可管理资源监控和定时器——供分布式服务层使用。\n\
  \n• *分布式服务层*：该层汇集了应用程序的外部组件。这些组件通过适配器与代理层通信，主要由管理和监控工具组成。\n\nJMX 架构设计为开放且易于使用。代理层的适配器使得\
  \ JMX 应用程序能够轻松地与标准规范以及现有的管理和监控工具（例如 IBM Tivoli 和 Hewlett-Packard OpenView）实现互操作。\n\
  \n以下各节将介绍 JMX 的不同层次。\n\n**仪表化层**\n\n仪表化层依赖于可管理资源的概念。资源被实现为遵循一组约定的常规 Java 对象（Bean），以便由\
  \ JMX 进行管理和监控。这些资源被称为 *MBeans*，即 *可管理 Bean*。\n\nMBean 有四种类型：标准型、动态型、开放型和模型型。由于本书并非专门介绍\
  \ JMX，我们只讨论标准型 MBean，它们足够通用，足以说明我们的观点。\n\n如果一个 Java 类实现了一个以该类名加上 *MBean* 后缀命名的接口，那么它就是一个\
  \ MBean。例如，如果 `Stats` 类实现了 `StatsMBean` 接口，那么它就是一个 MBean，如下所示：\n\n```java\npackage\
  \ aop.management.jmx.simple;\n\npublic class Stats implements StatsMBean {\n\n...\n\
  \n}\n```\n\nMBean 接口的作用是定义可从代理层访问的字段和方法。对于每个属性，必须定义一个 getter 方法，如果该属性是可修改的，则还需定义一个\
  \ setter 方法。清单 9-18 中的示例定义了三个只读属性和一个重置方法。\n\n第 9 章 ■ 服务质量与面向切面编程\n\n**193**\n\n\
  **清单 9-19.** *一个用于统计管理的简单 MBean*\n```java\npackage aop.management.jmx.simple;\n\n\
  public interface StatsMBean {\n\npublic int getOrders();\n\npublic float getTotalOrdersAmount();\n\
  \npublic String getStatus();\n\npublic void reset();\n\n}\n```\n\n**代理层**\n\n代理层由一个名为\
  \ MBeanServer 的特定 JMX 组件实现，该组件在 MBean 规范中定义。此组件控制可管理资源与外部世界之间的通信。\n\nMBeanServer\
  \ 组件定义了有用的服务，例如监控服务，当字段值被修改时会生成通知——从而允许对可管理资源进行监控。共有三种类型的监控器：\n\n• **计数器监控器**：此类型监控数值属性，并在达到阈值时发送通知事件。然后可以计算新的阈值。\n\
  \n• **仪表监控器**：此类型监控属性，并在值低于或超过限制值时发送通知事件。\n\n• **字符串监控器**：此类型监控字符串值，并可在字符串等于或不同于参考字符串时发送通知事件。\n\
  \n要接收监控事件的通知，Java 类必须实现 `javax.management.NotificationListener` 接口。\n\n**分布式服务层**\n\
  \n分布式服务层由一组可通过适配器连接到 JMX 代理的工具组成。本章的其余部分将使用 MX4J（JMX 1.1 的一个开源实现）提供的 HTTP 适配器。如图\
  \ 9-5 所示，HTTP 适配器包含一个用于管理 MBean、创建新监控器等的图形用户界面。\n\n![图 6](img/index-207_1.png)\n\
  \n**194**\n\n第 9 章 ■ 服务质量与面向切面编程\n\n**图 9-5.** *MX4J 提供的 HTTP 适配器的图形用户界面*\n\n**将\
  \ JMX 与 AOP 结合使用**\n\n\n\n如前所述，要将一个普通的 Java 对象转换为可管理的资源，你需要实现一个 MBean 接口。当对现有应用程序使用\
  \ JMX 时，保持现有对象不变，并通过切面透明地集成 MBean 接口会非常有用。\n\n作为参考示例，我们将使用一个简化的订单管理应用程序。该应用程序由两部分组成：\n\
  \n• 订单管理部分，负责更新订单的某些统计数据\n• 订单创建部分，负责生成某些随机订单以测试订单管理部分\n\n统计数据在 Stats 类中实现，如清单 9-20\
  \ 所示。\n\n第 9 章 ■ 服务质量和面向切面编程\n\n**195**\n\n**清单 9-20.** *统计信息可管理 Bean 的实现* public\
  \ class Stats {\n\nprivate int orders = 0;\n\nprivate float totalAmount = 0;\n\n\
  private String status = \"OK\";\n\npublic int getOrders() {\n\nreturn orders;\n\n\
  }\n\npublic void incOrders() {\n\norders++;\n\n}\n\npublic float getTotalAmount()\
  \ {\n\nreturn totalAmount;\n\n}\n\npublic void addAmount(float p) {\n\ntotalAmount+=p;\n\
  \n}\n\npublic String getStatus() {\n\nreturn status;\n\n}\n\npublic void setStatus(String\
  \ p) {\n\nstatus = p;\n\n}\n\npublic void reset() {\n\norders = 0;\n\ntotalAmount\
  \ = 0;\n\nstatus = \"OK\";\n\n}\n\n}\n\n该类的字段如下：\n\n• orders：该字段包含一个订单计数器。\n• totalAmount：该字段累加所有订单的金额。\n\
  • status：该字段表示订单处理过程的状态（“OK”或“KO”）。\n\n顾名思义，reset 方法将字段重置为初始值。Stats 类由主要的 JMXExample\
  \ 类使用，如清单 9-21 所示。\n\n**196**\n\n第 9 章 ■ 服务质量和面向切面编程\n\n**清单 9-21.** *Stats MBean\
  \ 的简单客户端程序* package aop.management.jmx.simple;\n\npublic class JMXExample {\n\n\
  private static Stats statistics = new Stats();\n\npublic static void sendOrder(float\
  \ amount) {\n\nif (amount>0) {\n\nstatistics.incOrders();\n\nstatistics.addAmount(amount);\n\
  \n} else {\n\nstatistics.setStatus(\"KO\");\n\ntry {\n\nThread.sleep(200);\n\n}\n\
  \ncatch (InterruptedException e) {\n\n}\n\nstatistics.setStatus(\"OK\");\n\n}\n\n\
  }\n\npublic static void main(String[] str) throws Exception {\n\nInjector injection\
  \ = new Injector();\n\ninjection.start();\n\n}\n\n}\n\nsendOrder 方法由 Injector 实例用于模拟订单。如果传递的金额为正，则更新统计数据。否则，生成一个错误，并将\
  \ status 属性设置为“KO”，持续 200 毫秒，然后重置为“OK”。\n\n清单 9-22 中所示的 Injector 类是一个生成随机订单的 Java\
  \ 线程。更准确地说，它生成十个随机订单。每五个订单，就会生成一个无效订单（金额为 –1000）。\n\n**清单 9-22.** *用于随机生成订单的线程*\
  \ package aop.management.jmx.simple;\n\npublic class Injector extends Thread {\n\
  \npublic void run() {\n\nfloat amount = 0;\n\nfor (int i=1;i<=10;i++) {\n\ntry {\n\
