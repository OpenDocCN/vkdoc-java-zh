  \ 32 return logicalRequest;\n\n33 }\n\n34 }\n\n**上下文对象**\n\n*上下文对象*设计模式封装了与请求相关但独立于\
  \ HTTP 协议的上下文状态。随后，该上下文对象可用于表示层的不同角色中。\n\n使用上下文对象可以使处理过程更简单、更通用，并且减少对特定 Web 容器的依赖。上下文对象类通常属于一个继承层次结构，其中父类处理\
  \ HTTP 协议的特定细节；它们包含对 `javax.servlet.http` 包的引用。\n\n借助 AOP，整个上下文对象设计模式可以变得独立于 HTTP\
