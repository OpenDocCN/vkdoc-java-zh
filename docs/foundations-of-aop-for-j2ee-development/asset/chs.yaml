  这个实现是一个常规的 POJO 或 JavaBean。它可以很容易地以其原始形式在 EJB 或 JDBC 之外的框架或技术中重用。例如，你可以编写一个切面，通过其他框架（如\
  \ Hibernate 或 Spring）使该对象持久化。\n\n**246**\n\n第 11 章 ■ 在示例应用的业务层中使用 AOP\n\n细心的读者可能已经注意到，在\
  \ `AccountPOJO` 类的末尾使用了空方法 `loadCustomerIds`，该方法被 `getDetails` 方法调用。顾名思义，`loadCustomerIds`\
  \ 加载与当前账户相关的客户 ID。它不是在业务对象中实现的，而是在 `SQLAccount` 切面中实现的（参见清单 11-4 中的“around”通知）。这是一种常见的技术，用于将函数的实现委托给专门的切面，分两个阶段执行，如下所述：\n\
  \n**1.** 在对象中定义一个或多个空方法。这些方法定义了一个通用但非活动的协议。\n\n**2.** 在切面中实现这些方法，使用“around”通知代码，通过不调用\
  \ `proceed` 来替换空实现。\n\n例如，这种技术比基于继承的面向对象设计更灵活、更明确。在本书中，我们将这种技术称为*隐式协议*技术，原因有三：\n\
  \n• 它将协议定义为方法。\n• 该协议对对象是私有的，但可以公开，例如，在对象实现的接口中。\n• 其实现由外部切面隐式处理。\n\n下一节将使用这种技术，通过类似于\
  \ `loadCustomerIds` 方法的研究协议来解析对象引用。\n\n**AOP 与设计模式**\n\n如第 8 章所述，AOP 为设计模式提供了替代方案。是否使用\
  \ AOP 取决于程序员的需求。选择主要受实现方面的考虑（如代码模块化、复杂性和演进）所引导。然而，这些标准是主观的，并且通常难以预先评估。它们在开发过程中变得重要，因为新功能的需求会使应用程序代码更加复杂。因此，拥有开发实际应用程序的经验对于准确评估所选解决方案（无论是使用\
  \ AOP 还是其他方法）的优缺点至关重要。\n\nAOP 是一个年轻的领域，仍然需要来自使用者的反馈。由于 AOP 开辟了新的可能性，这种反馈应远远超出常规设计模式的范围。从长远来看，良好的\
  \ AOP 实践应该被识别并记录在类似于 GoF 书籍的指南中。在这样的指南中，面向方面的设计模式很可能处理诸如代码重用、复杂性、模块化和演进等问题。目前，常规设计模式很少处理这些问题。\n\
  \n\n\n在本书中，我们提供了一套面向切面的技术，使程序员能够处理上述部分问题。这些解决方案包括隐式协议、锚定协议技术以及国际化切面，这些内容将在第 12 章“使用\
  \ AOP 处理 UI 关注点”一节中详细阐述。然而，尽管这些技术可重用且为良好的 AOP 实践打开了大门，但它们并不能取代设计人员的专业知识。识别可能出现在应用程序任何层面的横切关注点，关键在于设计人员。\n\
  \n第 11 章 ■ 在示例应用程序的业务层中使用 AOP\n\n**247**\n\n**业务层改进：超越设计模式**\n\n某些关注点可能横切业务层，并且难以通过\
  \ J2EE 设计模式处理。对于这些关注点，GoF 设计模式可能是有用的。\n\n如第 8 章所述，与设计模式不兼容的关注点通常可以通过使用 AOP 来实现。事实上，AOP\
  \ 通常能提供比设计模式更简单的解决方案。\n\n在本节中，我们以银行应用程序为案例，研究一种用于模块化引用解析和前置条件的解决方案。\n\n**解析对象引用**\n\
  \n解析对象引用通常通过一个定义良好的协议来实现，该协议允许基于特定标准进行搜索。在 EJB 上下文中，Home 接口定义了此协议，并由 EJB 实现。\n\n\
  清单 11-6 展示了账户业务对象的协议。\n\n**清单 11-6.** *Account 的 Home 接口*\n\n```java\npackage aop.j2ee.business.entity.account;\n\
  \n01 import java.util.*;\n02 import java.math.*;\n03 import javax.ejb.*;\n04 import\
  \ java.rmi.RemoteException;\n05 import aop.j2ee.commons.exception.MissingPrimaryKeyException;\
  \ 06\n07 public interface AccountHome extends EJBHome {\n09 public Account create\
  \ (String accountId, String type, String description, 10 BigDecimal balance, BigDecimal\
  \ creditLine, BigDecimal beginBalance, 11 Date beginBalanceTimeStamp, ArrayList\
  \ customerIds) 12 throws RemoteException, CreateException, MissingPrimaryKeyException;\
  \ 13\n14 public Account findByPrimaryKey(String accountId) 15 throws FinderException,\
  \ RemoteException;\n17 public Collection findByCustomerId(String customerId) 18\
  \ throws FinderException, RemoteException;\n20 } // AccountHome\n```\n\n`create`方法允许客户端对象创建新账户。例如，Bank\
  \ 会话 EJB 在`createAccount`的实现中使用了此方法。这是 Home 接口的典型方法。`findByPrimaryKey(String)`方法也是一个经典方法。它允许客户端对象通过其主键访问给定的账户实例。\n\
  \n最后，`findByCustomerId(String customerId)`揭示了客户（Customer）与账户（Account）之间的关系。\n\n\
  **248**\n\n第 11 章 ■ 在示例应用程序的业务层中使用 AOP\n\n此方法用于访问客户的账户。对于 EJB 之间的每个关系，都可以在 Home\
  \ 接口中定义类似的方法。\n\n使用 Home 接口意味着对 EJB 模型的依赖。尽管这是一种轻量级依赖，但它具有横切效应，因为每个客户端对象（通常是会话 EJB，如\
  \ Bank 和 TxController）都必须实现访问 Home 接口的代码，这些代码会使用一些 EJB 和 JNDI 原语。可以通过使用定位器模式来减少这种技术依赖。然而，这样一来，定位器本身的使用就变成了一个横切关注点，需要额外的设计工作。\n\
  \n为了说明与引用解析相关的复杂性，我们使用 Duke's Bank 示例的原始设计，该设计未使用服务定位器模式。\n\n让我们再次参考 TxController\
  \ 会话 EJB 的实现。请记住，账户解析是在`checkAccountArgsAndResolve`方法中实现的，如清单 11-7 所示。\n\n**清单 11-7.**\
  \ *checkAccountArgsAndResolve 方法*\n\n```java\n01 private Account checkAccountArgsAndResolve(\n\
