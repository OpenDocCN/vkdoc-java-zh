  第 15 行的`executedTx`方法整合了两个独立的功能，若在函数式实现中显式编码将更有利：Tx EJB 的创建（第 33 行）以及对账户调用`setBalance`方法（第\
  \ 32 行）。\n\n如代码所示，Tx EJB 的创建使用了一个与数据库相关的方法：`DBHelper.getNextTxId`（第 31 行），该方法返回下一个可用的事务标识符。此操作属于底层操作，可能不应在业务方法中使用。\n\
  \n从概念上讲，我们可以将所有展示的操作——Home 接口解析、根据主键查找账户以及 Tx EJB 的实例化——归类为引用管理关注点。该关注点高度依赖于 J2EE\
  \ 基础设施和 EJB 模型。这显然是所有 EJB 访问或 EJB 创建（尤其是会话 EJB）的横切关注点。\n\n使用诸如定位器（locator）之类的设计模式可以使代码减少对基础设施的依赖，并通过复用最小化设计工作量。然而，此时模式本身的使用又成为了一个横切关注点。此外，使用定位器模式仍然需要间接使用\
  \ EJB 模型。\n\n**使用 AOP**\n\nAOP，更确切地说是之前讨论的隐式协议技术，显著简化了设计，并有效地将引用解析这一横切关注点模块化。\n\n\
  首先，我们在 EJB 本身中定义了引用访问协议，如清单 11-11 所示。\n\n在我们的程序中，它是一个 POJO，因为它通过`POJOSession`切面自动实现了`javax.ejb.SessionBean`接口。这个名为`TxControllerPOJO`的\
  \ POJO 将在本章后续部分，在介绍完所有应用的切面后进行详细说明。\n\n**第 11 章 ■ 在示例应用程序的业务层中使用 AOP**\n\n**251**\n\
  \n**清单 11-11.** *EJB 解析的隐式协议*\n\n[...]\n\n// TxControllerPOJO 隐式解析协议实现的摘录\nprivate\
  \ Collection findTxByAccountId(Date startDate,\n    Date endDate, String accountId)\
  \ throws Exception {return null;}\nprivate Tx findTxByPrimaryKey(String txId)\n\
  \    throws Exception {return null;}\nprivate Account findAccountByPrimaryKey(String\
  \ accountID) throws Exception {return null;}\nprivate Tx createTx(String accountId,\
  \ Date date,\n    BigDecimal amount, BigDecimal newBalance, String description)\
  \ throws Exception {return null;}\n\n我们现在定义实现此协议的切面。在我们的研究中，这个切面被称为`EJBResolver`切面，它是一个由`POJOSession`和`POJOEntity`具体切面扩展的抽象切面。`EJBResolver`切面的目的是为引用解析实现提供通用行为，如清单\
  \ 11-12 所示。\n\n**清单 11-12.** *EJB 解析隐式协议的切面实现*\n01 package aop.j2ee.business.aspect;\n\
