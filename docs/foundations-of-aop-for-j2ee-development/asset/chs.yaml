  第 11 章 ■ 在示例应用程序的业务层中使用 AOP\n\n**249**\n\n**清单 11-9.** *EJBGetter 类*\n\n```java\n\
  package aop.j2ee.business.util;\n\nimport javax.rmi.PortableRemoteObject;\nimport\
