  \ . . . . . . . . .\n\n\n尤内西博士现任伦斯勒理工学院（RPI）哈特福德研究生校区计算机科学教授及工程与科学系主任。在进入学术界之前，尤内西博士在工业界担任过多个负有责任和领导力的职位。他曾主导技术及市场营销工作，并负责项目、预算、员工及营收。在工业界的最后一份职务中，他创立了一家\
  \ IT 咨询公司，并负责人员招聘与公司发展（在不到五年内），使其从最初仅有两名员工（他本人和一名雇员）成长为拥有 16 名咨询人员、营收达数百万美元的可观规模。他还曾为全球一些最大的企业和政府机构提供咨询服务（例如纽约州和密歇根州政府、必和必拓、荷兰皇家壳牌石油公司、马士基、日立等）。\n\
  \n尤内西博士经常受邀出席众多知名场合，并参与国内及国际委员会与理事会。他曾担任美国代表团团长，参加在西班牙马拉加举行的 ISO SC7 会议，并曾是澳大利亚研究理事会（相当于澳大利亚的国家科学基金会）IT\
  \ 拨款提案评审委员会成员。他还曾参与澳大利亚团队，负责推广和验证 ISO 15504 标准。尤内西博士同时担任《ACM 计算评论》的分类编辑，并服务于多家国际期刊的编辑或评审委员会。\n\
  \n**xix**\n\n引言\n\n***面向方面编程***（*AOP*）是一种编程范式，于 20 世纪 90 年代中期在施乐帕洛阿尔托研究中心（PARC）被定义。该范式的根源可追溯至多项旨在改进代码模块化、促进复用与维护的研究工作。\n\
  \nAOP 在代码模块化方面的优势吸引了众多应用开发者的关注，尤其是 Web 应用领域的开发者。事实上，AOP 是面向互联网的应用服务器（如 Sun Microsystems\
  \ 的 J2EE 或微软的.NET）的绝佳补充。借助 AOP，开发者可以简化此类应用的开发并提升生产力。然而，AOP 并不仅限于以 Web 为中心的应用领域。与其他编程范式（如面向对象）类似，AOP\
  \ 是一种可应用于任何类型应用的通用技术。\n\n本书定义并解释了 AOP 的概念。通过介绍四种主要的现有 AOP 产品（AspectJ、JAC、JBoss AOP\
  \ 和 Spring AOP），对这些概念的实现进行了说明。此外，本书还展示了如何利用 AOP 来编程 J2EE 应用。\n\n**目标读者**\n\n本书旨在以清晰且具有教学性的方式呈现\
  \ AOP 的概念。无需具备该领域的先验知识。本书并未聚焦于特定 AOP 语言的高级编程概念，而是对现有可用于面向方面编程的产品进行了广泛概述。\n\n以下读者将会对本书感兴趣：\n\
  \n• 渴望深入了解计算机科学新领域的程序员\n• 希望了解 AOP 预期收益的 IT 项目经理\n• 寻求关于 AOP 产品准确信息的应用开发者\n• 需要\
  \ AOP 入门介绍及现有实现最新对比的博士生和硕士生\n\n**如何阅读本书**\n\n本书各章节力求尽可能独立；因此，无需从头到尾按顺序阅读即可获取关于 AOP\
  \ 的有价值信息。每位读者可以选择自己的阅读计划。\n\n话虽如此，我们将为上一节列出的每类目标读者推荐一些阅读内容：\n\n**xxi**\n\n**xxii**\n\
  \n## ■引言\n\n• *程序员*：建议阅读第 1 章和第 2 章，以了解 AOP 的概况并学习其基本概念。也建议阅读关于 AspectJ 的第 3 章，因为该章展示了第\
  \ 2 章的概念如何在领域内的领先工具中实现。最后三章（第 10、11 和 12 章）阐述了使用 AspectJ 开发 J2EE 应用的方法。\n• *IT 项目经理*：建议阅读第\
  \ 1 章以快速了解 AOP。第 2 章的前几页也有助于了解引入这种新编程范式的主要动机。我们还建议阅读第 9 章，以理解 AOP 如何帮助改进服务质量，这对应用的使用有直接影响。第\
  \ 10 章给出了一个典型的 J2EE 应用示例，该应用可从面向方面开发中受益。\n• *应用开发者*：建议阅读涵盖 AOP 概念的第 2 章。建议阅读第 3\
  \ 章至第 6 章，因为它们概述了 AOP 概念如何在现有工具中实现。第 8 章和第 9 章展示了如何使用 AOP 来编程设计模式、契约和应用管理。最后，第 11\
  \ 章和第 12 章呈现了一个使用 AOP 编程 J2EE 应用的案例研究。\n• *博士生和硕士生*：建议阅读第 1 章和第 2 章，以了解 AOP 的概况并学习其基本概念。建议阅读第\
  \ 3 章至第 6 章，因为它们概述了 AOP 概念如何在现有工具中实现。我们建议阅读第 7 章中的对比，该章探讨了这些工具之间的差异与相似之处。最后，第 8\
  \ 章阐述了 AOP 在实现横切结构（如软件工程中众所周知的设计模式）方面的强大能力。\n\n\n\n## 书籍路线图\n\n前两章介绍 AOP 并阐述该范式的主要新概念。定义了\
  \ AOP 的三大核心概念——切面、切入点与连接点。建议对 AOP 毫无了解的读者阅读这两章。\n\n第 3 章至第 7 章介绍了 AOP 的主要现有产品。本部分的每一章都专注于一个特定产品：AspectJ（该领域的主流语言）、JAC、JBoss\
  \ AOP 和 Spring AOP。这些章节可以独立阅读。每章仅假设读者熟悉第一部分中介绍的概念。第 7 章对这四个产品的特性进行了比较。\n\n第 8 章和第\
  \ 9 章介绍了 AOP 在编程设计模式、提升软件质量以及监督和管理应用程序方面的用途。这些章节相互独立，可以分开阅读。AspectJ 是用于说明这些章节所介绍概念的语言。提前阅读第\
  \ 3 章关于 AspectJ 的内容可能有助于理解文中示例。\n\n第 10 章至第 12 章介绍了一个面向切面的 J2EE 应用程序案例研究。\n\n第 10\
  \ 章是对该应用程序的总体介绍，与实现方案（无论是否采用 AOP）无关。接下来的两章展示了 AOP 如何改进应用程序业务层和表示层的实现。第 11 章和第 12\
  \ 章是独立的，可以分开阅读。\n\n■引言\n\n**xxiii**\n\n**关于代码示例**\n\n本书提供的代码示例假定读者具备 Java 编程语言的基本知识。第\
  \ 10 章至第 12 章中的案例研究假定读者了解使用 J2EE 进行应用程序编程的原则。\n\n本书中的所有代码示例均可从 Apress 网站（http://www.apress.com）的源代码区域下载。在某些情况下（尤其是\
  \ J2EE 案例研究），文中呈现的程序已被截断，仅选取了相关的部分摘录。本书的可下载源代码包含所有程序的完整版本。\n\n**常见问题解答**\n\n以下系列问答将帮助您初步了解\
  \ AOP，并理解其对其他编程范式的影响及其在企业应用程序开发中的作用。\n\n**什么是 AOP？**\n\n开发应用程序时需要处理多种关注点。这些关注点可分为两类：功能关注点，涉及应用程序的业务逻辑；技术关注点，与执行环境（操作系统、网络等）相关。\n\
  \n被称为*关注点分离*的原则旨在尽可能解耦并分离每个关注点，以促进模块化。面向对象编程（OOP）为分离许多业务关注点提供了良好的解决方案，因此应用程序更具可重用性，因为分离的关注点可以轻松地在多个不同的应用程序中重用。然而，那些被称为横切关注点的技术或功能关注点，使用\
  \ OOP 则不易处理。\n\nAOP 是一种用于分离关注点并将横切关注点模块化到称为*切面*的明确软件实体中的范式。\n\n**AOP 会取代 OOP 吗？**\n\
  \nAOP 不会取代 OOP。AOP 通过模块化横切关注点来补充 OOP。\n\n因此，编写 AOP 应用程序仍然需要编写带有字段和方法的类。AOP 增加了一个新的模块化维度，即这些类通过切面进行补充，这些切面实现了无法通过类有效模块化的关注点。\n\
  \n**AOP 用于企业应用程序吗？**\n\nAOP 是一种相对较新的技术，出现于 20 世纪 90 年代中期。据我们所知，目前还没有大型软件厂商销售使用 AOP\
  \ 开发的应用程序。然而，许多供应商，例如 IBM，正在研究使用 AOP 来提高 J2SE 和 J2EE 应用程序的开发效率。\n\n**xxiv**\n\n\n\
  好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n## ■ 引言\n\n与面向对象编程（OOP）相比，面向切面编程（AOP）的采用速度似乎更快。事实上，尽管面向对象语言的首个版本早在\
  \ 1967 年就随 Simula 67 出现，但直到 20 世纪 80 年代中期，对象才被用于使用 C++开发企业级应用。采用 AOP 的成本低于采用 OOP\
  \ 的成本，因为 AOP 语言是对现有 OOP 语言的补充。因此，切面可以平滑地集成到现有应用中，而无需对现有代码进行任何重大的重新开发。\n\n第 1 章\n\
  \n■ ■ ■\n\nAOP 简介\n\n**本**书介绍*面向切面编程（AOP）*，它定义了一种新的编程范式。*范式*一词，我们指的是一套原则，这些原则构建了程序的建模，并因此构建了程序的开发。\n\
  \n顾名思义，面向切面编程引入了一个新概念——*切面*。几年前，面向对象编程（OOP）引入了对象的概念，它开创了一种构建应用和编写程序的新方式。同样的想法也适用于切面的概念。\n\
  \n1996 年，位于加利福尼亚的施乐公司子公司帕洛阿尔托研究中心（PARC）的 Gregor Kiczales 及其团队最初定义了切面的概念。尽管这个定义使\
  \ 1996 年成为 AOP 的正式诞生年份，但 AOP 的许多基础思想在此之前就已存在。OOP 的一些局限性促使了切面的引入，切面也起源于一些研究领域，例如反射和元对象协议。\n\
  \n在切面的概念被定义之后，一种名为 AspectJ 的面向切面语言很快被实现，其首个版本于 1998 年发布。AspectJ 至今仍是最流行的 AOP 语言，它通过新的关键字扩展了\
  \ Java 语言，使得对切面进行编程成为可能。\n\n除了 AspectJ 之外，AOP 本身自 1998 年以来一直是研究界高度关注的主题。因此，许多其他语言和工具被开发出来，其中大部分都是围绕\
  \ Java 构建的。这些包括 Java 切面组件（JAC）、JBoss AOP 和 AspectWerkz。\n\n尽管焦点集中在 Java 上，但重要的是要记住，AOP\
  \ 没有任何特定于 OOP 或 Java 的特性。切面的概念是一个抽象概念，就像对象的概念一样，可以应用于不同的语言。存在各种完整度的工具来支持 C、C++、C#和\
  \ Smalltalk 中的 AOP。此外，任何现有语言都可以扩展以支持 AOP 的概念。\n\n由于切面的概念相对较新，鼓励庞大的开发者社区采用 AOP 是一项重要的任务。\n\
  \n**审视编程范式**\n\n从编程范式的角度来看，你可以将 AOP 视为 OOP 的继承者。然而，AOP 的目标不是取代 OOP，而是对其进行补充，使你能够创建更清晰、结构更完善的程序。\n\
  \n自从汇编语言引入以来，已经发展出一系列编程范式，使程序员能够创建日益复杂的软件。过程和对象的概念各自以其方式为更好的代码结构和大程序的可管理性做出了贡献。**1**\n\
  \n**2**\n\n第 1 章 ■ A O P 简 介\n\n将 AOP 视为这一范式家族的最新成员，它旨在延续这一传统。\n\n例如，Pascal 等语言所体现的过程概念，允许你将程序划分为称为过程的实体。如你所知，每个过程比整个程序更容易编写和理解。因此，你将程序构建为一组相互调用的过程。过程的使用有助于大型应用的开发，因为团队中的个人可以独立开发过程。个人也可以独立测试过程，从而更容易定位编程错误。\n\
  \n尽管转变并非一蹴而就，但过程式编程促成了 goto 指令的消失。这种指令将执行转移到程序的特定行，往往会导致“意大利面条式代码”。换句话说，程序会很快变得混乱不堪——使得无法独立于其他部分重用程序的某些部分。\n\
  \n另一方面，过程式编程允许你编写包含清晰标识的起点和终点的基本任务。这种编程方式使得创建可由许多不同程序重用的过程库成为可能。\n\n过程式编程简化了编码过程。它通过为代码提供更清晰的结构，使程序员能够开发模块化——因此更易于理解——的程序。\n\
  \n然而，过程式编程并未为任何数据提供安全的结构。事实上，这种范式的一大弱点是全局变量可以从程序的任何地方访问——而不当的访问可能导致意外的副作用。\n\n**AOP\
  \ 的起源**\n\n像所有编程范式一样，AOP 基于先前已经存在但在有限、特定情况下被利用的概念。在承认整合了支撑 AOP 思想的 Gregor Kiczales\
  \ 工作的重要性的同时，编程界不能忘记许多其他项目为这项工作奠定了基础。\n\nAOP 使用了来自信息技术各个领域的思想——特别是元编程、反射和元对象协议。这些领域由\
  \ Mehmet Aksit、Jean-Pierre Briot、千叶茂、Pierre Cointe、Jacques Ferber、Patricia Maes、Brian\
  \ Smith 等众多研究者发展而来。此外，AOP 的一些关键机制与面向对象语言中从未流行的特性有关，例如 CommonLoops 和 Flavors 中的 before\
  \ 和 after 指令。AOP 与生成式编程和模型驱动架构（MDA）使用的某些最新技术之间也存在明显的相似之处。\n\n然而，AOP 方法作为一个整体仍然是原创的。因此，AOP\
  \ 绝不能被视为与其发展而来的技术相竞争，而是呈现一个逻辑连贯的结构，将这些技术整合起来以解决现实世界的问题。\n\n**OOP：一个有前途的范式**\n\n\
  开发 OOP 的目标是将应用的数据及其相关处理组织成连贯的实体。这是通过让对象封装数据以及操作数据并执行处理的方法来实现的。\n\n从概念的角度来看，应用是根据其建模的现实世界对象来分解的。例如，在库存管理应用中，你可能会找到供应商、物品、客户和其他类型的对象。\n\
  \n第 1 章 ■ A O P 简 介\n\n**3**\n\n通过将所有具有相同特征的对象分组在一起，类的概念补充了对象的概念。在库存管理应用中，所有供应商对象都属于同一个类，名为\
  \ Supplier。\n\n在设计具体问题的解决方案时，决定如何将程序拆分为类，进而拆分为对象，远非易事。存在许多可能的变体，因此不同的开发者可能会提出截然不同的解决方案。诸如\
  \ Rational 统一过程（RUP）平台之类的方法旨在使你所需做出的概念选择合理化。\n\n无论设计过程如何，将应用划分为类和对象的方式必须首先由应用建模的现实世界数据来指导。影响你选择类的最重要因素是你希望如何组织——换句话说，如何分组——应用的业务数据。类首先为数据提供了一种分组机制，相关的处理作为方法包含在内。\n\
  \nOOP 的类和对象概念允许你编写比使用过程式范式的程序更具以下特性的程序：\n*模块化*：由于与某个数据项或数据集相关的处理与数据被分组在同一个软件实体（类）中，因此实现了某种程度的模块化。\n\
  *可重用性*：作为模块化的结果，一个类设计得有多好、自给自足程度以及目标精确度决定了它在不同软件环境中被重用的可能性。\n*可靠性*：由于数据封装在对象内部，只能通过定义对象接口的方法来操作数据。（直接操作数据是不可能的。）因此，访问对象的有效方式被清晰地标识出来，程序员可以安全地使用其中任何一种。\n\
  *可扩展性*：继承的概念允许你从已有的类创建新类。新类可以通过添加数据或处理来扩展现有类，也可以特化现有元素。例如，你可以扩展一个管理数据列表的类，使其只管理栈。（栈是一种需要特定规则来添加和删除元素的列表。）\n\
  \n由于这些优势，OOP 无疑改善了软件工程。开发者能够以比过程式编程更简单的方式构建更复杂的程序。此外，开发者已经用面向对象语言编写了大型应用。例如，Java\
  \ 2 平台企业版（J2EE）应用服务器就是用 Java 语言编写的。类似地，开发者实现了复杂的类层次结构来构建图形用户界面。包含在 Java 2 平台标准版（J2SE）中的\
  \ Swing API 就属于这一类。\n\n然而，从过程式编程到 OOP 的转变付出了相当大的努力，开发者培训代表了巨大的成本。既然 OOP 刚刚开始被广泛理解，那么提出引入像\
  \ AOP 这样的新范式是否可取的问题是合理的。\n\n为了回答这个问题，我们首先可以确认 AOP 并没有质疑通过 OOP 所取得的成就。根据 AOP 编程的应用仍然被组织成类和对象。AOP\
  \ 只是添加了新概念，允许你通过使面向对象应用更加模块化来改进它们。此外，AOP 通过允许分离开发任务来简化开发过程。例如，高度技术性的功能，如安全性，可以由专门的\n\
  \n**4**\n\n第 1 章 ■ A O P 简 介\n\n专家开发，而切面允许你更轻松地将这些功能集成到应用的其余部分。\n\n毫无疑问，采用 AOP 将需要很长时间并付出努力，但当需求被明确识别时，可以逐步进行。\n\
  \n**OOP 的局限性**\n\nOOP 对于开发复杂程序的重要性是不可否认的。然而，我们将展示，至少在两种情况下，仅使用 OOP 是不可能编写出清晰优雅的程序的：当应用包含*横切功能*时，以及当应用包含*代码分散*时。\n\
  \n**横切功能的情况**\n\n之前，我们提到过，当你分析如何将应用组织成类时，分析必须由将数据及其相关处理分离并封装到连贯实体中的需求驱动。\n\n尽管类是独立编程的，但它们有时在行为上是相互依赖的。通常，在实现引用完整性规则时就是这种情况。例如，当有未付款的未结订单时，不能删除客户对象；否则，程序可能会丢失该客户的联系信息。为了强制执行此规则，你可以修改客户删除方法，使其首先确定所有订单是否都已付款。然而，这种解决方案存在几个缺陷：\n\
  \n• 确定订单是否已付款不属于客户管理，而属于订单管理。因此，Customer 类不应该必须管理此功能。\n• Customer 类不应该需要知道应用中其他类施加的所有数据完整性规则。\n\
  • 修改 Customer 类以考虑这些数据完整性规则限制了在其他情况下重用该类的可能性。换句话说，一旦 Customer 类实现了任何与不同类相关的功能，在许多情况下，它就不再能独立重用。\n\
  \n尽管 Customer 类不是实现此引用完整性规则的理想位置，但许多面向对象程序由于缺乏更好的解决方案而采用这种方式。你可能正在考虑将此功能集成到 Order\
  \ 类中，但这种解决方案也好不到哪里去。没有理由让 Order 类允许删除客户。严格来说，此规则既不与客户也不与订单相关，而是横切了这两种实体类型。\n\n将数据划分为类的目标之一是使类彼此独立。然而，横切功能，如引用完整性规则，似乎叠加在划分之上——违反了类的独立性。换句话说，OOP\
  \ 不允许你整洁地实现横切功能。作为一种折衷，你可以勉强在单个类中实现它们，但要意识到这种解决方案并不理想。\n\n第 1 章 ■ A O P 简 介\n\n\
  **5**\n\n**代码分散的情况**\n\n在 OOP 中，对象交互的主要方式是调用方法。换句话说，需要执行操作的对象调用属于另一个对象的方法。（对象也可以调用自己的方法。）OOP\
  \ 总是涉及两个角色：调用者和被调用者。\n\n当你编写调用方法的代码时，你不需要担心服务是*如何*实现的，因为调用只与被调用对象的接口交互。你只需要确保调用中的参数与方法签名的参数相对应。\n\
  \n由于方法是在类内部实现的，你将每个方法编写为一个清晰界定的代码块。要更改一个方法，你显然需要修改包含定义该方法的类的文件。如果你只更改方法体，则修改是透明的，因为该方法仍将以完全相同的方式被调用。\n\
  \n但是，如果你更改了方法的签名（例如，通过添加参数），则会产生进一步的影响。然后你必须修改对该方法的所有调用，因此你必须修改任何调用该方法的类。如果这些调用存在于程序中的多个位置，则进行更改可能极其耗时。\n\
  \n要点如下：即使方法的实现位于单个类中，对该方法的调用也可能分散在整个应用中。这种代码分散现象会减慢维护任务的速度，并使面向对象应用难以适应和发展。服务使用方式的任何更改都需要许多其他更改——这是一个成本高昂的过程，也可能引入错误。\n\
  \n**AOP 的优势**\n\nAOP 通过为刚才解释的两个挑战提供解决方案来补充 OOP——这些解决方案实现了横切功能并消除了代码分散。第 2 章将展示，切面的概念允许你通过使用切入点、连接点和通知的新概念，将横切功能和代码分散集成到面向对象应用中。\n\
  \n在过程式编程中，你根据需要实现的功能来划分应用。OOP 更进一步，强制你将相关的数据项及其相关的处理任务分组到连贯的实体中。然后，AOP 通过允许你在 OOP\
  \ 的数据驱动组合之上叠加一个新层来建立某种平衡。该层对应于难以通过 OOP 范式直接集成的横切功能。\n\n一个面向切面应用由以下两部分组成：\n\n• *类*：这些构成了应用的基础并实现了业务逻辑。换句话说，类实现了应用中直接处理要建模的现实世界问题的那些部分。\n\
  • *切面*：这些集成了对应于横切功能和代码分散的补充元素（类、方法和数据）。\n\n因此，设计一个面向切面应用首先要通过分解问题来定义类和切面。对于决定一个功能应该在类中实现还是在切面中实现，没有通用的规则。此外，你可以根据上下文在两者中的任何一个中实现相同的功能。例如，你可以在管理应用中将实时执行的约束实现为切面，但在监督工业过程的应用中将其实现为类。\n\
  \n**6**\n\n第 1 章 ■ A O P 简 介\n\n第二个设计阶段包括将类和切面放在一起以获得一个可操作的应用。你通过使用 AOP 的横切和连接点概念来执行此过程。这些概念允许你决定在程序中的何处插入切面，并因此决定这些切面将实现哪些功能。\n\
  \n另一方面，请记住，当 OOP 被引入时，面向对象语言要么是现有语言的扩展（C++是 C 的扩展），要么是全新的语言（如 Smalltalk 和 Java）。在这两种情况下，都必须开发新的编译器。\n\
  \nAOP 呈现了一种略有不同的情况，因为工具要么作为框架存在，要么作为现有语言的扩展存在。后者的一个例子是 AspectJ 语言，第 3 章将详细介绍。AspectJ\
  \ 向 Java 语言添加了新的关键字，允许使用 AOP 概念，如切面、横切和连接点。\n\nAOP 框架的例子有 JAC、JBoss AOP 和 AspectWerkz，第\
  \ 4、5 和 6 章将介绍这些框架。这些框架使用现有编程语言的语法，在这些情况下是 Java。你通过框架中的类和方法来使用 AOP 概念。例如，通过 JAC\
  \ 定义一个切面归结为扩展框架中包含的一个类。\n\n自从 AOP 引入以来，支持语言扩展和支持框架的人之间一直存在激烈的争论。在一种情况下，你需要学习语言的新关键字；在另一种情况下，你需要学习新框架的\
  \ API。无论如何，这两种情况都需要一个学习阶段。\n\n**总结**\n\n本章介绍了切面的概念，顾名思义，它是 AOP 范式的主要贡献。Gregor Kiczales\
  \ 及其在帕洛阿尔托研究中心（PARC）的团队于 1996 年定义了切面的概念。几个已有的思想导致了 AOP 的出现，而诸如反射和元对象协议等研究领域也积极做出了贡献。\n\
  \n尽管切面的概念是一个通用的编程概念，可以应用于任何编程范式（函数式、过程式或面向对象），但 AOP 的历史与 OOP 范式的历史紧密相连。大多数现有的 AOP\
  \ 语言都是 OOP 语言的扩展，例如 Java 和 C#。此外，定义切面概念的动机源于 OOP 的局限性。\n\n本章描述了 OOP 的两个主要局限性：横切功能和代码分散。前者指的是当你将某些功能实现为类时，无法使其保持清晰的模块化。后者指的是你可以使用类来保持功能的实现（而非使用）的模块化。由于\
  \ AOP 为这些局限性提供了解决方案，AOP 作为编程范式补充而非取代 OOP。\n\n通过分析这些局限性发生的原因，本章介绍了你可以从 AOP 范式中期望的好处——这些好处源于横切功能和代码分散的清晰模块化实现。\n\
  \n第 2 章\n\n■ ■ ■\n\nAOP 的概念\n\n**本**章介绍 AOP 的基本概念。尽管 AOP 相对较新，但许多基本概念已经确立。本章对 AOP\
  \ 的概念进行了一般性介绍，其余章节将使用当前可用的四种最先进的工具：AspectJ/AspectWerkz、JAC、JBoss AOP 和 Spring 来演示这些概念的使用。\n\
  \n每一种新的编程范式都带来了一套概念和定义。过程式方法就是如此，它引入了模块和过程的概念；面向对象方法也是如此，它引入了封装、继承和多态的概念。重要的变化伴随着这些新范式中的每一个。从技术角度来看，程序的结构发生了根本性的变化，因此软件开发相关人员需要学习新技术。与之前的范式一样，AOP\
  \ 也带来了一套新概念。然而，应用质量的提高和 AOP 允许的模块化程度的增加，抵消了学习新概念的成本。\n\n由于大多数 AOP 环境（包括 AspectJ/AspectWerkz、JAC、JBoss\
  \ AOP 和 Spring）都构建在 Java 之上，本书使用 Java 的术语和概念；然而，AOP 的概念没有一个特定于这种语言。就像对象的概念可以成功地应用于各种语言一样，切面的概念可以用\
  \ C++（AspectC++）、C#（AspectC#）、Smalltalk（Apostle）甚至过程式语言如 C（AspectC）来实现。此外，AOP 的概念不仅在编码阶段很重要，而且在软件开发的早期阶段——概念性程序设计阶段——也很重要。诸如\
  \ Theme/UML 和 JAC UML 切面工厂（UMLAF）之类的工具提出了统一建模语言（UML）符号来对 AOP 概念进行建模。\n\n**切面的概念**\n\
  \n为了理解和管理一个复杂的程序，你通常会将其划分为更小的子程序。最佳划分标准一直是众多研究的主题——这些研究的目的是帮助开发者进行软件的设计、开发、维护和演进。\n\
  \n当使用过程式方法编写程序时，应用根据要执行的操作或过程进行模块化。另一方面，使用面向对象方法时，模块化基于要封装在类中的数据。\n\n**7**\n\n**8**\n\
  \n第 2 章 ■ A O P 的 概 念\n\n在这两种范式中，某些功能比其他功能更难模块化。我们说与这种功能相关的代码是分散的。\n\n**代码分散**\n\
  \n代码分散的问题与特定语言无关，并且已被证明是众多应用中的一个问题，无论使用的是 OOP 还是其他范式。事实上，代码分散可以出现在任何环境中——从使用 J2SE\
  \ 或 J2EE 的 Java，到使用.NET 的 C#，再到其他语言。然而，对这一现象最广泛的研究是使用 Java 进行的。\n\n例如，AspectJ 团队分析了\
  \ Tomcat servlet 容器。他们意识到，如果某些功能，如 URL 模式匹配和 XML 解析，被清晰地模块化在一两个类中，那么其他功能，如日志记录功能和用户会话管理，则高度分散在整个应用中。\n\
  \n代码分散分析\n\n在确定代码分散发生之后，很自然会问是否可以通过以不同方式组合类结构或以另一种方式设计应用来消除该问题。\n\n代码分散发生的主要原因与服务提供方式和使用方式的差异有关。一个类通过其方法提供一个或多个服务。将可用的服务分组在同一个地方——换句话说，同一个类中——相对容易。然而，一旦这些服务被多个类使用，就很难重新设计应用以将这些方法的调用分组在一起。因此，一个基础且众所周知的服务从整个应用中被调用也就不足为奇了。\n\
  \n代码分散是一种在任何复杂程序中都会表现出来的效应。然而，其确切的表现方式取决于应用、建模的关注点、使用的库和框架。由于它严重依赖于具体问题，代码分散很难消除。\n\
  \n应用中的代码分散会减慢程序的开发、维护和演进。当多个功能分散时，情况会恶化，因为代码开始包含对多个关注点的许多调用，这些关注点先验地是松散耦合的，但需要集成在一起。这种现象在许多应用中都很明显。\n\
  \n**模块化的新维度**\n\nAOP 的主要贡献是提供了一种方法，将原本会分散在整个应用中的代码集中到一个切面中。\n\n■**定义 切面**——一种编程单元，旨在捕获横切应用的功能。\n\
  \n第 2 章 ■ A O P 的 概 念\n\n**9**\n\n切面通常被描述为一种*横切结构*。事实上，切面概念的发明者 Gregor Kiczales\
  \ 曾说过，“AOP 是关于捕获横切结构的。”\n\n切面的定义几乎和类的定义一样通用。当你对问题进行建模时，你使用类来表示对象的类型（客户、订单、供应商等），每个对象包含适当的数据（属性）和处理（方法）。同样，切面用于在应用中实现功能（安全性、持久性、日志记录等），这些功能同样需要数据和处\n\
