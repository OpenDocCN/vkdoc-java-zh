  \ 方法访问原始异常。在 Java 1.4 之后，异常的原因也会包含在堆栈跟踪中，并通过 `ex.printStackTrace` 方法显示在“caused by”行下方。这仅在切面在构造国际化异常时将原始异常作为参数传递时才有效（参见\
  \ i18n 切面的第 18、21 和 36 行）。\n\n输入约束验证\n\n在开发用户界面时，验证用户输入数据的约束是一个反复出现的问题。例如，创建新客户端时输入的所有数据都应经过验证并检查其准确性。程序应测试电子邮件、邮政编码等格式是否正确。程序还可以强制用户输入附加信息。\n\
  \n清晰地模块化这一关注点非常重要，主要有三个原因：\n\n• 首先，这是一个横切所有与数据输入和验证相关功能的关注点。\n\n• 其次，通常情况下，这是一个会随时间演变和完善的关注点，有时独立于其他关注点。\n\
  \n• 第三，出于应用程序的安全性考虑，输入的数据应在服务器端进行控制。出于客户端延迟的原因，最好也在客户端实施一些控制。面向切面的模块化使得维护客户端和服务器端之间的一致性更加容易。\n\
  \n**298**\n\n第 12 章 ■ 在示例应用程序的表示层和客户端层使用 AOP\n\n为了阐明第二点，我们可以将约束验证的面向切面开发与基于用例的开发方法进行比较。在基于用例的方法中，我们找到主要用例（对应于应用程序的正常行为，此处为用户输入数据）和次要用例（对应于应用程序的异常行为，此处为错误和输入错误处理）。\n\
  \n在次要用例中，基于用例的分析通常会对用例进行优先级排序。其中一些用例并不关键，不需要在第一次迭代中实现（例如，检查输入的名称是否以大写字母开头）。\n\n\
  类似地，在开发用户界面和数据验证时，我们从主要用例（验证）和关键的次要用例开始。只有在这些用例的开发完成后，我们才能实现非关键用例（验证）。如果验证关注点没有正确模块化，测试新用例将很困难，因为其代码会与现有用例的代码纠缠在一起。\n\
  \n因此，使用 AOP 有助于处理验证关注点日益增长的复杂性。特别是，使用精心选择的前置/后置条件切面（例如第 9 章和第 11 章中解释的那些）可以实现验证关注点的模块化实现。\n\
  \n**在 Web 设计模式中使用 AOP**\n\n**表示层**\n\n在 J2EE 环境中，Web 表示逻辑依赖于 Servlet 技术。Servlet\
  \ 是 Java 组件，用于响应来自 Web 服务器的 HTTP 请求，并将这些请求传输到 J2EE Web 容器。一些知名的容器包括 Apache Tomcat（参考实现）和\
  \ Caucho Resin（http://www.caucho.com/resin-2.1/index.xtp）。为了帮助编写面向 GUI 的 Servlet，Sun\
  \ Microsystems 定义了 JavaServer Pages（JSP）标准。\n\n由于 Servlet 是底层组件，因此定义了一些 J2EE 设计模式来有效管理表示层。在这里，我们将评估与基于\
  \ J2EE 设计模式的解决方案相比，切面如何增强表示层的设计。\n\n在本节中，我们将介绍表示层设计模式，并讨论如何通过 AOP 对其进行改进。我们不直接依赖示例应用程序，因为在此讨论表示层会过于复杂。此外，示例应用程序使用了\
  \ Struts 框架，该框架提供了一组 J2EE 设计模式的打包即用实现。\n\n要完全理解本节内容，需要具备 Servlet/JSP 技术（http://java.sun.com/products/jsp/docs.html）和表示层\
  \ J2EE 设计模式（http://java.sun.com/blueprints/corej2eepatterns/Patterns/index.html）的知识。\n\
  \n**前端控制器**\n\n*前端控制器*设计模式的作用是集中管理请求的基础逻辑，并将它们转发给适当的管理器。因此，客户端的请求会经过前端控制器，其中包含一个命令字典。\n\
  \n*命令对象*通常是应用程序控制器设计模式的实例，尽管仍然可以选择其他设计方案。更准确地说，控制器的行为通过查找给定请求 URL 的适当命令来处理请求，并将该请求委托给命令。此外，控制器可以将特定于服务器的数据封装在上下文对象中。*上下文对象*是常规的\
  \ Java 对象，用于使 GUI 逻辑尽可能独立于 HTTP 协议。\n\n清单 12-15 展示了一个简单前端控制器的重要部分。\n\n**清单 12-15.**\
  \ *一个简单的前端控制器*\n\npackage aop.j2ee.client.web.controller;\n\n01 import java.io.IOException;\n\
