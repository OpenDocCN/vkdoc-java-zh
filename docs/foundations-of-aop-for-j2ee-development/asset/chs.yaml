  **总结**\n\n在本章中，你了解了 AOP 如何通过验证应用程序的定义和执行与其确定的需求相符，来用于改进应用程序的服务质量。首先，我们展示了 AOP 如何以直接的方式帮助实现契约。其次，我们展示了两种测试技术的\
  \ AOP 实现：覆盖分析和非回归测试。最后，我们展示了如何使用 AOP 将 JMX 无缝集成到 Java 应用程序中。\n\n我们的 AOP 实现并未提供比现有工具更多的功能。然而，我们的实现展示了如何在开发层面使用\
  \ AOP 来提高代码质量——而无需任何特定的支持。此外，AOP 技术的一个重要优势是它提供了在需要时插拔服务质量支持的能力——如果使用动态 AOP 工具，甚至可以在运行时进行。\n\
  \n第 10 章\n\n■ ■ ■\n\n示例应用程序介绍\n\n**本**章讨论一个示例应用程序的架构和设计细节，我们将把它作为案例研究，以展示 AOP 在\
  \ J2EE 环境中的优势。这个众所周知的简单示例应用程序有助于以易于理解的方式呈现材料。该示例基于 Sun ONE J2EE 应用服务器的 Duke's Bank\
  \ 应用程序开发。此应用程序并不特定依赖于 Sun ONE，通过调整部署脚本，它可以在任何 J2EE 应用服务器上高效使用。\n\n由于本书侧重于 AOP，本章不会深入探讨\
  \ J2EE 编程的细节，而是提供关于 AOP 及其适用场景的充分信息。不过，本章的一部分内容会回顾示例应用程序所使用的 J2EE 设计模式。请注意，这些模式与第\
  \ 8 章中介绍的 GOF 模式不同。此外，我们在此不会展示应用程序的完整代码；而只是描述其设计。\n\n如果您想了解有关该应用程序的更详细信息，请访问 Apress\
  \ 网站（http://www.apress.com）的下载区域，获取案例研究代码。如果您不熟悉 J2EE，我们强烈建议您在详细研究代码之前，先阅读一些关于该主题的进一步资料。\n\
  \n**示例应用程序架构**\n\nDuke's Bank 是一个经典的 J2EE 应用程序，由开发企业应用程序时常见的多个层组成。它的打包方式使得对应于每一层的模块都清晰分离。\n\
  \n为了简化代码，我们对 Duke's Bank 应用程序进行了轻微修改，特别是其打包方式。为了便于比较，请参考 Sun Microsystems 网站上提供的原始应用程序。\n\
  \n**应用程序概览**\n\n在详细介绍各层之前，我们将在以下小节中提供整个应用程序及其组织的概述。\n\n参与的层\n\n正如 J2EE 所建议的，该应用程序由多个层组成，如图\
  \ 10-1 所示。\n\n**205**\n\n**206**\n\n第 10 章 ■ 示例应用程序介绍\n\n**图 10-1.** *Duke's Bank\
  \ 应用程序的架构* 各层及其角色如下：\n\n*   **数据层**：允许存储持久化数据，并在 PointBase 关系数据库中实现。\n*   **业务层**：包含实现应用程序逻辑的\
  \ EJB。这些 EJB 包括会话 EJB（提供客户端对应用程序业务逻辑的视图）和实体 EJB（表示应用程序操作的持久化对象）。业务层直接访问数据层，特别是通过实体\
  \ EJB。\n*   **表示层**：允许通过浏览器访问应用程序。它包含一个 Web Servlet/JSP 容器，并访问业务层。相对于业务层，表示层可以被视为一个特定的\
  \ Java 客户端层。\n\n\n• *客户端层*可以是 Web 应用（瘦客户端）或 Java 应用。在本例中，它是一个 Web 应用，因为它通过 HTTP\
  \ 访问表示层；而在 Java 场景中，它直接访问业务层以定位 EJB，并通过 RMI 进行远程通信。在后一种情况下，Java 客户端在客户端站点自行管理其表示（胖客户端）。\n\
  \n组织与打包代码\n\n虽然你可以使用任何 IDE，但我们推荐使用 Eclipse 开源 IDE（我们使用 Eclipse 开发了本章展示的应用）。Eclipse\
  \ 可从 http://www.eclipse.org 下载。你可以从文件系统导入 Eclipse 项目。编译时需要 AspectJ 的 AJDT 插件，该插件的安装方法在附录中进行了说明。\n\
  \n与原始应用不同，我们通过将代码分离到多个独立项目来组织此应用。这种结构使开发者能够更高效地工作，尤其是在大型项目中，不同团队可以更轻松地分配到特定层的开发任务。\n\
  \n第 10 章 ■ 示例应用展示\n\n**207**\n\nEclipse 项目如下：\n\n• Commons 项目包含多个层共用的所有类。例如，它包含传输对象和服务定位器（后文将详细描述），这些被客户端、业务和表示层使用。\n\
  \n• BusinessUtils 项目包含业务层使用的所有类。\n\n• BusinessComponents 项目包含所有业务 POJO（Plain Old\
  \ Java Objects）。\n\n• EJBComponents 项目包含所有业务 EJB。\n\n• ClientUtils 项目包含客户端层使用的所有类。\n\
  \n• BusinessDelegates 项目包含所有委托（后文将进一步详述），这些委托使客户端能够透明地访问业务对象，无需关心通信层。\n\n• ApplicationClient\
  \ 项目包含客户端应用及其逻辑。\n\n图 10-2 展示了项目依赖关系。\n\n**图 10-2.** *项目依赖关系*\n\n如需进一步了解 Eclipse\
  \ 项目的打包方式，请参考本章后续的截图，这些截图展示了各层的内部组织。\n\n包中包含常规类和面向切面化的应用类。这种组织方式使程序员能够更高效地比较面向切面代码与常规代码，尤其是在使用\
  \ AJDT 插件及其切面可视化工具时。\n\n部署应用\n\n该应用被打包并部署在 Sun ONE J2EE 应用服务器上。我们的网站发布了打包和编译脚本，使项目能够独立于所选\
  \ IDE。尽管项目在 Eclipse 下开发，但未使用任何特定插件或 Eclipse 技术，因此很容易切换到其他 IDE。\n\n**208**\n\n第 10\
  \ 章 ■ 示例应用展示\n\n相关文件如下：\n\n• deploySunONE.bat 文件位于 EJBComponent 项目的根目录，用于将应用部署到\
  \ Sun ONE 服务器，并使用同一目录下的 Ant 脚本 SunONE.xml。执行此脚本需要安装 Ant 并启动 Sun ONE 服务器。\n\n• SunONE.properties\
  \ 文件用于在部署阶段配置和连接服务器。\n\n• 客户端应用的属性文件 j2eeclient.properties 用于配置对 Sun ONE 服务器的远程访问。该文件必须安装在客户端，声明外观\
  \ EJB 可从客户端访问。该文件独立发布。\n\n接下来的章节将介绍不同层中与 AOP 相关的具体细节。\n\n**数据层**\n\n\n\n数据层由关系数据库中的一组表实现。由于该层基于\
  \ RDBMS 技术，因此无法受益于 AOP 的改进。只有其他层对其的访问可以通过 AOP 得到优化。\n\n对于我们的简单应用，可以直接采用对象-关系映射（一个表对应一个业务类）。表创建脚本如清单\
