  \n应用服务器依赖于组件容器。它们的最终目标是尽可能透明地将与分布式企业应用开发相关的所有关注点集成到中间件层中。当某个关注点能够以声明方式集成时，就能提供最佳的集成支持。此时，程序员需要考虑面向容器的管理系统，例如容器管理持久化（CMP）和容器管理事务（CMT），也称为声明式事务管理（DTM）。在\
  \ J2EE 中，集成是通过 XML 部署描述符进行参数化配置的。\n\n在本节中，我们研究面向容器的事务管理。在描述了底层机制和局限性之后，我们将展示 AOP\
  \ 如何为 J2EE 中灵活且透明的事务管理提供一种替代方案。\n\n**262**\n\n\n\n第 11 章 ■ 在示例应用的业务层中使用 AOP\n\n\
  **使用 JTA 管理分布式事务**\n\nJava 事务 API（JTA）定义了一套用于使用分布式事务的接口和机制。当涉及多个数据源时，事务即为分布式事务。通常，数据源位于不同的服务器上，但这并非强制要求。JTA\
  \ 也可仅用于单个数据源。在 J2EE 中，JTA 通常用于使会话 EJB 外观服务具备事务性。\n\n参考银行应用只有一个数据源：PointBase 数据库。评估可能的数据分布方式很有意义。例如，账户和交易可以存储在两个不同的数据库中，以平衡负载和数据量。此外，这对系统管理也很有用，因为交易可能需要与账户不同的维护流程。在这种情况下，使用\
  \ JTA 和支持分布式的架构就显得尤为重要。\n\n简而言之，JTA 依赖于三个主要实体之间定义的三个通信接口：应用程序、事务管理器和事务资源。在应用服务器的上下文中，JTA\
  \ 定义了应用服务器与事务管理器之间的接口。该接口允许向管理器通知事务中 EJB 上发生的操作。它还允许客户端访问自动且透明传输的事务上下文，该上下文可从参与事务的任何\
  \ EJB 中访问。在事务内部，参与事务的 EJB 可以通过事务上下文访问一个代表该事务的对象：`javax.transaction.UserTransaction`\
  \ 的一个实例。\n\n**一种 JTA 解决方案**\n\n清单 11-20 中的代码重写了`TxControllerBean`的`transfer`函数，使其通过使用\
  \ JTA 来确保事务属性。\n\n**清单 11-20.** *使用 JTA 手动控制事务* 01 // 修改后的 aop.j2ee.business.session.TxControllerBean\
  \ 版本，以使用 JTA 02 [...]\n\n03 javax.transaction.UserTransaction ut;\n\n05 public void\
  \ transferFunds(BigDecimal amount,String descr, 06 String fromAccountId,String toAccountId)\
  \ 07 throws\n\n08 InvalidParameterException,AccountNotFoundException, 09 InsufficientFundsException,InsufficientCreditException\
