  \n62 }\n\n**282**\n\n第 12 章 ■ 在示例应用程序的表示层和客户端层中使用 AOP\n\n64 Object around(String\
  \ aDataSource)\n\n65 throws SystemException : connectionservice(aDataSource) {\n\
