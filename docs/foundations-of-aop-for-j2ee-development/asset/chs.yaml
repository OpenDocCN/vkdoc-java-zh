  \ EJBException(\"transferFunds: \" + ex.getMessage());\n\n}\n\n然而，锚定协议技术不允许对异常进行精确管理。这可以通过测试指示我们是否在限定区域内的变量（此处为\
  \ ut）来解决。\n\n当环境允许时，考虑多线程也很重要（在我们的示例中未使用）。因此，必须为需要在通知代码间共享的变量使用线程局部变量。按线程的切面实例化指令也是一个优雅的解决方案。\n\
  \n**总结**\n\n在本章中，我们介绍了如何使用 AOP 来改进业务层的设计。\n\n从关注点分离的角度来看，我们可以得出结论，AOP 已成功应用于我们的案例研究，因为许多横切关注点得到了更清晰的分离，包括：\n\
  \n• 对 EJB/J2EE 技术的依赖\n\n• 业务对象引用的管理和解析\n\n• 持久化\n\n• 前置条件（包括技术前置条件和业务前置条件）\n\n•\
  \ 事务\n\n仍然可以将其他关注点模块化，例如日志记录，我们在此未展示。\n\n图 11-3 显示了应用所有切面后构成业务层的组件。每个灰色条对应一个常规的\
  \ EJB。实际上，灰色表示未应用任何切面。第一个条对应实体 EJB AccountBean，第二个对应 AccountPOJO，依此类推，直到每个组件。\n\n\
  ![Image 15](img/index-283_1.png)\n\n**270**\n\n第 11 章 ■ 在示例应用程序的业务层中使用 AOP\n\n**图\
  \ 11-3.** *业务层组件及其切面* 我们可以注意到，POJO 版本的业务组件实现的大小明显更小。这源于持久化的外部化。\n\n通知代码在外观组件（如最后两个）中的使用比在业务组件中更多。这源于一种实现选择，该选择大量使用了针对业务组件的类型间声明。\n\
  \n第 12 章\n\n■ ■ ■\n\n在示例应用程序的表示层和\n\n客户端层中使用 AOP\n\n**在**第 11 章中，我们使用 AOP 改进了第 10\
  \ 章中介绍的 Duke's Bank 案例研究应用程序的业务层设计。在本章中，我们将研究 AOP 在其他层中的使用——特别是 Java (Swing) 客户端层和表示层。我们不会使用数据层，因为它无法从基于\
  \ Java 的 AOP 技术中受益（正如我们在第 11 章中解释的那样）。\n\n案例研究的原始设计并不完全适应 AOP，因为它使用了特设的设计解决方案。例如，Web\
  \ 表示层使用了 Struts 框架，该框架封装了一些棘手的设计问题。这并不意味着 AOP 没有用处，尤其是在改进 Struts 实现或集成方面。然而，由于固有的复杂性，在本章中，我们引入了一些简化的设计片段，以更清晰地说明\
  \ AOP 的优势。\n\n我们首先展示 AOP 在 Java Swing 客户端中的使用，然后详细阐述其对 Web（Servlets/JSP）表示层的影响。\n\
  \n**使用 AOP 进行分布式通信**\n\n当客户端在三层 J2EE 环境中访问业务服务器时，可能会出现通信问题。客户端层包含几种设计模式，旨在处理分布式通信带来的关注点。\n\
  \n用于通信和数据传输的 J2EE 设计模式最常影响客户端，偶尔也会影响服务器端。因此，这些模式代表了横切的一个重要来源，尤其是在构建多客户端应用程序时。\n\n\
  如前所述，使用 J2EE 设计模式并非强制性的。然而，通过使用它们，我们可以将面向切面的实现与有据可查、众所周知且经过验证的参考设计进行对比。\n\n**271**\n\
  \n**272**\n\n第 12 章 ■ 在示例应用程序的表示层和客户端层中使用 AOP\n\n**用于业务层访问的设计模式**\n\n用于客户端/服务器通信的三种主要\
  \ J2EE 设计模式是业务委托、服务定位器和数据传输对象。在本章中，我们说明了这些模式在有和没有 AOP 帮助下的使用情况。\n\n为简单起见，我们使用一个基本的\
  \ Java 客户端来访问第 11 章以及本章中介绍的示例应用程序。我们讨论了其局限性，并展示了切面如何提高客户端在技术和设计选择方面的实现独立性。\n\n业务委托\n\
  \n*业务委托*的目标是隐藏服务器远程访问协议的实现细节，例如通过 JNDI 存储库查找 EJB 容器或处理远程调用。因此，这种设计模式减少了表示层客户端与业务层之间的耦合。\n\
  \n\n\n然而，这种设计模式并未完全消除依赖关系，因为如果业务服务发生修改，其接口也会随之变化。此外，在每个客户端实现中系统性地引用业务委托层本身也构成了一个横切关注点。\n\
  \n尽管位置透明和分布层透明是该模式的优点，但业务委托可能会引发一些微妙的使用问题。实际上，客户端不能像使用本地对象那样使用业务委托，因为这样做可能会产生严重的性能问题，例如网络过载。因此，客户端程序员必须意识到，他们所操作的对象实际上是远程对象的代理。\n\
  \n清单 12-1 定义了一个简单的 Java 客户端，我们开发它是为了说明本节讨论的问题。这些问题可以移植到真实的银行客户端中：Java Swing 管理客户端和基于\
  \ servlet 的表示层。\n\n**清单 12-1.** *银行应用的简单客户端*\n01 package aop.j2ee.client.java.regular;\n\
