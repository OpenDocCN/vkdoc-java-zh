  \n客户端层绝非一个值得遵循的设计；我们仅将其用作描述在编写 Java 客户端时可能出现的关注点的一种手段。\n\n第 10 章 ■ 示例应用程序的表示层\n\n\
  **219**\n\nWeb 表示层\n\n使用 Struts 编程的 Web 表示层并未进行切面化，因为在此上下文中，其收益有限。在第 13 章中，我们将讨论在不使用\
  \ Struts 的应用程序上下文中，表示层设计模式可能的切面化。\n\n**示例应用程序设计**\n\n示例应用程序的设计总体上受 J2EE 应用程序的启发，更具体地说，是受\
  \ J2EE 最佳实践和设计模式的启发。\n\n在本节开始时，我们将介绍一系列特定于 J2EE 且此前在此上下文中使用过的设计模式和解决方案。然后，我们将解释使用\
  \ AOP 如何改进示例应用程序的设计。\n\n原始的 Duke's Bank 应用程序包含在 Sun ONE 应用服务器的免费发行版中，该发行版可在 Sun\
  \ Microsystems 网站上获取。如果您希望与本文介绍的设计进行比较，请参考原始应用程序。\n\n**使用 J2EE 设计解决方案**\n\n原始 Duke's\
  \ Bank 应用程序的设计很简单。并非所有可用的 J2EE 设计解决方案都被使用，这导致了代码模块性的不足。在本案例研究中，我们对应用程序进行了轻微修改，特别是通过遵循\
  \ J2EE 设计模式来提高应用程序的模块性，并修改了代码的组织结构。\n\n使用 J2EE 设计模式有两个主要优点：\n\n• 这些设计模式是经过充分测试、可重用的设计元素，使我们能够遵循\
  \ J2EE 最佳实践。\n• J2EE 设计模式有完善的文档记录，并且开发人员熟悉其用法（参见 http://java.sun.com/blueprints/corej2eepatterns/Patterns/index.html）。使用\
  \ J2EE 设计模式有助于开发人员更好地理解应用程序的设计，并更容易识别我们希望通过切面解决的问题。\n\n除了 J2EE 设计模式之外，使用 EJB 使我们能够自动集成服务。例如，可以通过组件容器或容器管理持久性（CMP）将其应用于实体\
  \ EJB 来管理持久性。事务或容器管理事务（CMT）也是如此，可以通过 EJB 部署描述符以声明方式集成。\n\n接下来的几节将简要描述我们将在本章后面进一步展开的不同\
  \ J2EE 设计解决方案。有关更多详细信息，请参考 J2EE 文档（http://java.sun.com/j2ee/docs.html）和 J2EE 设计模式目录（参见本书末尾的参考资料部分）。\n\
  \nJ2EE 业务层设计模式\n\n在使用 J2EE 构建的应用程序中，业务层是中间层，它构成了客户端与企业资源（数据源）之间的接口。因此，以能够确保良好性能以及易于维护、演进、可扩展性等方式实现该层至关重要。\n\
  \n**220**\n\n第 10 章 ■ 示例应用程序的表示层\n\n使用业务层并非强制要求，但强烈推荐。在具有业务层的应用程序中，客户端可以以逻辑一致的方式访问公司的不同数据源，而如果应用程序允许直接访问数据库，则情况并非如此。\n\
  \n使数据访问一致有助于更轻松地优化应用程序架构。例如，可以通过在应用服务器上使用负载均衡或缓存来提高整体性能。这些改进与业务层的使用相关，并且只有在遵守某些基本规则时才可能实现。J2EE\
  \ 设计模式明确阐述了这些规则。\n\n业务层最重要的两个设计模式是会话外观模式和业务对象模式，以下各节将对它们进行描述。\n\n**会话外观模式**\n\n\
  *会话外观模式*本质上是一个会话 EJB。其主要功能如下：\n\n• 确保客户端独立于业务模型（后者会随时间推移而修改）。\n• 允许通过无共享状态的对象访问数据，这些对象可以由应用服务器自动管理和优化。由于避免了状态同步问题，服务器本身会根据客户端打开的不同会话构建会话对象池。\n\
  • 创建一个功能接口，以便使用部署描述符以声明方式添加额外的非功能性属性，我们将在后面解释。\n• 通过 J2EE 查找和通信层（*Java 命名和目录接口*，或*JNDI*，以及*远程方法调用*，或*RMI*）提供对已识别服务的远程访问。此访问也在部署描述符中进行配置。\n\
  \n**业务对象模式**\n\n*业务对象模式*允许会话外观对象通过实体 EJB 访问数据，而无需直接使用不同资源的连接器。与会话外观一样，使用业务对象并非强制要求，但推荐使用。\n\
  \n业务对象模式的主要功能如下：\n\n• 在面向对象模型中封装数据访问，从而简化数据访问并避免例如需要 SQL 查询。EJB 模型提倡使用 Home 接口来解析业务对象。\n\
  • 使用部署描述符以声明方式和自动方式引入非功能性属性，例如持久性。\n\n第 10 章 ■ 示例应用程序的表示层\n\n**221**\n\n**传输对象模式**\n\
  \n使用其他设计模式也可以改进 J2EE 应用程序的设计，尤其是在性能方面。*传输对象模式*允许我们将外观使用的服务分组。当服务具有细粒度参数时，这非常有用，因为这些参数可能导致客户端和服务器之间多次调用序列，而这些调用往往会产生大量网络流量，尤其是代价高昂的连接。\n\
  \n\n\n传输对象实现了 `java.io.Serializable` 接口。传输对象的状态对应一组服务的参数和返回值。一个传输对象可以递归地嵌套在另一个传输对象内部；这被称为*复合传输对象*。\n\
  \n传输对象由客户端层和业务层共享。它们必须对这两层都可访问，因此定义在应用程序的 Commons 项目中。\n\nJ2EE 客户端层设计模式\n\n客户端层必须使用远程解析和通信\
  \ API 来访问业务层的服务。然而，这可能会使客户端代码变得复杂。当出现这种复杂情况时，J2EE 设计模式指南建议使用两种设计模式：服务定位器和业务委托。我们将在后续章节中描述这些模式。\n\
  \n**服务定位器模式**\n\n*服务定位器模式*通过向客户端隐藏所涉及的访问机制，允许对服务进行通用访问。例如，使用 Home 接口以及利用缓存管理来提高服务解析性能。\n\
  \n服务定位器通常以单例形式实现，并带有一个客户端直接使用的解析方法。服务解析并不局限于会话外观；例如，我们可以用同样的方式访问数据源。\n\n当外观等 EJB\
  \ 需要访问服务时，服务定位器模式也可用于业务层。由于不同层都使用服务定位器，其代码包含在应用程序的 Commons 项目中。\n\n图 10-7 展示了 Commons\
  \ 项目的组织结构，其中包含了客户端层和业务层使用的类和接口。正如你所料，它包含一个用于管理异常的包（`aop.j2ee.commons.exception`），以及本节中解释的传输对象（`aop.j2ee.commons.to`）和服务定位器（`aop.j2ee.commons.util.locator`）。\n\
  \n![图 12](img/index-235_1.png)\n\n**222**\n\n第 10 章 ■ 示例应用程序介绍\n\n**图 10-7.** *Commons\
  \ 项目的组织结构* **业务委托模式**\n\n*业务委托模式*创建一个客户端对象，允许客户端访问业务层的外观。通常，委托具有与其所委托的外观相同的接口，但这并非必需条件。\n\
  \n业务委托的主要功能如下：\n\n• 使客户端独立于外观，保证更好的应用程序结构和项目的独立性。例如，对于以这种方式编程的应用程序，重新编译业务层不会对客户端产生影响。\n\
  \n• 通过将通用或公共函数归集到委托中，简化客户端代码。例如，委托可用于归集重放策略或某些异常的处理。\n\n• 使客户端更加独立于服务解析的方式。业务委托通常使用服务定位器。\n\
  \n![图 13](img/index-236_1.png)\n\n第 10 章 ■ 示例应用程序介绍\n\n**223**\n\n在我们的应用程序中，客户端管理应用程序使用一个委托来访问\
  \ Bank 外观。出于组织原因，委托可以放在一个单独的项目中，如图 10-8 所示。\n\n**图 10-8.** *BusinessDelegates 项目的组织结构*\
  \ J2EE 表示层设计模式\n\n在开发应用程序的业务层时，推荐使用多种设计模式：\n\n• *前端控制器模式*用于集中管理请求。\n\n• *应用控制器模式*用于透明地管理应用程序级别的请求。\n\
  \n• *上下文对象模式*用于允许对请求参数进行对象封装，从而简化表示层的代码。\n\n\n\n• *视图助手模式*用于将 JSP 页面中的复杂处理迁移到 Java\
  \ 对象中。\n• *拦截过滤器模式*用于允许特定对象以模块化和可参数化的方式系统地拦截请求，并通过附加功能对其进行处理。\n\n尽管这些设计模式已有文档记录，但对设计人员或开发人员而言，同时使用多种模式并非易事。通常更可取的做法是使用能够以一致且透明的方式集成全套表示层设计模式的框架。示例应用程序\
  \ Duke's Bank 的原始版本就采用了这种解决方案，该应用程序是使用 Struts 开源框架实现的。\n\n**自动集成解决方案**\n\n在 J2EE\
  \ 环境中，我们使用部署描述符（参见本节中的 XML 代码）来配置由容器管理的非功能性服务。例如，这种技术使我们能够将事务集成到外观服务中，或以声明方式将持久性添加到业务对象中。还可以配置组件以包含远程访问功能，例如命名或声明远程接口，以及管理权限的功能。这些自动集成解决方案被称为*声明式管理*或*容器管理*解决方案。\n\
  \n清单 10-8 展示了 XML 文件 `ejb-jar.xml` 的一部分。\n\n**清单 10-8.** *用于技术服务自动集成的 ejb-jar.xml\
