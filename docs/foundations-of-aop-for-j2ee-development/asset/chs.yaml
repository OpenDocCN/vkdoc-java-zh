  \ descr, fromAccountId); 15 toAccount= checkAccountArgsAndResolve(amount, descr,\
  \ toAccountId); 16\n\n17 ut= context.getUserTransaction();\n\n第 11 章 ■ 在示例应用的业务层中使用\
  \ AOP\n\n**263**\n\n19 try {\n\n20 ut.begin();\n\n21 } catch (Exception e) {\n\n\
  22 throw new EJBException(\"transferFunds: \" + e.getMessage()); 23 }\n\n25 try\
