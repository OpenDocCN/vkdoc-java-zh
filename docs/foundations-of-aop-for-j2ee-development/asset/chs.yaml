  \n`accessControl` 抽象切入点与应受保护免受未授权访问的方法相关联。“before”通知（第 15 行）执行检查，如果访问被拒绝则抛出异常。\n\
  \n代理的实现\n\n\n\n在清单 8-21 中，我们定义了一个简单的具体切面，该切面仅允许登录名为“admin”且密码为“admin”的用户访问 `Stats`\
