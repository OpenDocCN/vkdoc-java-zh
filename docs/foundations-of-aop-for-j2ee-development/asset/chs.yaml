  \nAOP，类似于外观对象，必须实现 `javax.ejb.SessionBean` 接口；业务对象，例如实体 EJB，必须实现 `javax.ejb.EntityBean`\
  \ 接口。AOP 可以像会话外观一样，通过一个标记接口来使用。\n\npackage aop.j2ee.business;\n\npublic interface\
  \ EntityBeanProtocol {}\n\n这个空接口必须由业务对象或任何实体 EJB 实现，这将对代码产生最小的影响。一个切面（例如清单 11-3\
  \ 中的切面）将 POJO 转换为 EJB 并实现所需的方法。\n\n**清单 11-3.** *将 POJO 转换为实体 EJB 的切面*\n\npackage\
