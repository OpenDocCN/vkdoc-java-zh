  \ {}\n\n}\n\n在这种情况下，与参考实现不同，实体 EJB 的通用行为可以更容易地被分解。与会话 EJB 类似，你可以将分解解耦为两个独立的继承层次结构：一个功能层次结构，用于实现业务逻辑的\
  \ POJO；以及一个技术层次结构（如果需要），由切面和标记组成。\n\n对于 POJOSession 切面，我们扩展了抽象切面 EJBResolver。该切面未在\
  \ EntityBean 接口实现中使用，将在后面的“解析对象引用”部分中描述。\n\n业务持久化的模块化\n\n使用切面与实体 EJB 结合的一个重要优势是，持久化管理可以通过切面以更通用的方式插入。在这里，我们通过使用类型间声明来插入持久化协议。\n\
  \n由于 POJOEntity 切面是抽象的，这些类型间声明可以根据目标 EJB 进行特化，如清单 11-4 所示，该清单展示了账户示例。\n\n**清单 11-4.**\
  \ *一个用于透明地将持久化引入 Account POJO 的切面*\n\npackage aop.j2ee.business.aspect.sql;\n\n\
  import java.sql.*;\n\nimport java.util.*;\n\nimport java.math.*;\n\nimport javax.ejb.*;\n\
  \nimport aop.j2ee.commons.exception.*;\n\nimport aop.j2ee.commons.util.Debug;\n\n\
