  \ throws Exception: execution(\n19         private Account *.findAccountByPrimaryKey(String)\
  \ && args(accountID) {\n20         return accountHome.findByPrimaryKey(accountID);\n\
  21     }\n\n23     Tx around(String txID) throws Exception:\n24         execution(private\
  \ Tx *.findTxByPrimaryKey(String)) && args(txID) {\n25         return txHome.findByPrimaryKey(txID);\n\
  26     }\n\n**252**\n\n**第 11 章 ■ 在示例应用程序的业务层中使用 AOP**\n\n28     Collection around(Date\
  \ start,Date end,String accountId) throws Exception:\n29         execution(private\
  \ Collection *.findTxByAccountId(Date,Date,String))\n30         && args(start,end,accountId)\
  \ {\n31         return txHome.findByAccountId(start,end,accountId);\n32     }\n\n\
  34     Tx around(String accountId, Date date, BigDecimal amount,\n35         BigDecimal\
  \ newBalance, String description)\n36         throws Exception:\n37         execution(private\
  \ Tx *.createTx(String, Date, BigDecimal, BigDecimal, String))\n38         && args(accountId,date,amount,newBalance,description)\
