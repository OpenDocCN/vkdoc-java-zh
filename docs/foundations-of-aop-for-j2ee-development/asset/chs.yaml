  \ 的实现基于一个简单的思路。当序列中的第一个方法被调用时（第一个通知代码），我们将其替换为创建传输对象并对其进行部分初始化（第 21 行）。然后，这个传输对象被本地保存在一个线程局部变量中（第\
  \ 11 行和第 30 行）。线程局部变量使得该切面是线程安全的。因此，`TransferOptimizer` 切面的行为类似于一个上传缓存。\n\n当序列中的第二个方法被调用时，我们使用参数完成传输对象的初始化，并调用\
  \ `createAccountWithCustomer` 远程服务（第 55 行）。\n\n这个服务由服务器端切面透明地添加。如果线程局部变量返回 null（第\
  \ 44 行），我们假设当前不在需要优化的序列中，并直接调用该服务（第 46 行）。这种技术可以推广到任何序列。\n\n优化切面依赖于应用程序代码。如果程序发生更改，该切面很可能会失效。例如，如果程序使用了\
  \ `createCustomer` 方法的结果，那么优化将不再有效，因为程序必须为 `createCustomer` 返回一个 null 值。这种耦合比关注点分离悖论中的耦合更强。在这种情况下，即使对象接口保持稳定，切面也可能失效，因为该切面严重依赖于它们的内部实现。\n\
  \n**客户端层通信切面总结**\n\n到目前为止，我们介绍了三个切面来管理分布式环境中常见的典型关注点，并将它们应用到了一个简单的 Java 客户端（`aop.j2ee.client.java.aspectized.Simple`）上。这些切面如图\
  \ 12-1 所示。\n\n![Image 16](img/index-305_1.png)\n\n**292**\n\n第 12 章 ■ 在示例应用程序的表示层和客户端层使用\
  \ AOP\n\n**图 12-1.** *用于客户端/服务器通信的三个切面* 这三个切面具有以下作用：\n\n• `aop.j2ee.client.java.aspect.Locator`\
  \ 使用隐式协议来解析业务外观。`Simple.java` 条中最暗的线条对应于 `getServiceFacade` 方法的实现，该方法由客户端定义但未实现。\n\
  \n• `aop.j2ee.client.java.aspect.Retry` 实现重试策略，以最小化潜在通信错误的影响。我们使用了通用切面，它适用于所有方法（三条线）。\n\
  \n• `aop.j2ee.client.java.aspect.TransferOptimizer` 通过无缝引入传输对象来提升客户端性能。与该切面相关的两条线对应于\
  \ `createCustomer` 和 `createAccount` 的调用序列，我们使用传输对象对其进行了优化。\n\n这并不是分布式关注点的完整设计。涵盖这个复杂关注点所有可能的子关注点超出了本书的范围，但这个设计为您提供了一些关于如何使用\
  \ AOP 构建设计良好的分布式应用程序的指示。请注意，同样的设计也已成功应用于银行的管理客户端。\n\n第 12 章 ■ 在示例应用程序的表示层和客户端层使用\
  \ AOP\n\n**293**\n\n**在客户端层表示中使用 AOP**\n\n一旦通信关注点得到管理，客户端便处理表示层，这通常是一项复杂的任务。对于基于\
  \ Swing 的客户端，其技术与非 J2EE 应用程序并无不同。对于瘦 Web 客户端，实现方式则有所不同，因为表示层位于服务器端，在基于 JSP/Servlet\
  \ 的 Web 容器内。\n\n本节介绍 AOP 在表示层中的用例。首先，我们展示 UI 的一般示例。接着，通过增强该层常用的设计模式，我们研究 Web 表示层。\n\
  \n**将 AOP 用于 UI 关注点**\n\n由于其复杂性，UI 通常代表应用程序开发中的一个重要部分。尽管这些关注点并非 J2EE 特有，但切面可以帮助它们的开发。\n\
  \n在接下来的章节中，我们说明 AOP 在两个通用 UI 关注点上的使用：国际化和输入数据的条件验证。为此，我们依赖于银行应用程序的 Java Swing 管理客户端。\n\
  \n应用程序国际化\n\nJ2EE 应用程序开发中的一个持续关注点是应用程序国际化。*国际化* 包括在同一个应用程序中支持多种语言。\n\n属性文件经常被用来支持这一关注点。然而，在\
  \ Java 中，为了实现国际化，需要执行许多操作。\n\n例如，处理错误消息的一个常见解决方案是在属性文件中定义错误消息集，该文件可以被翻译成不同的语言。客户端配置指示程序使用哪个文件。对于银行管理客户端，此配置通过启动参数完成：\n\
  \n%JAVA_HOME%\\bin\\java –Daop.j2ee.config.applicationname=BankAdmin\n\n-Daop.j2ee.config.applicationconfigdir=c:/aop/config\n\
  \n-Daop.j2ee.config.applicationpropertyfile=bankadmin.properties aop.j2ee.client.java.BankAdmin\n\
  \n必要时，客户端程序管理对文件中定义的消息的访问机制。通常，这些访问分散在代码各处，特别是在异常处理代码中，如清单 12-12 所示。\n\n**清单 12-12.**\
