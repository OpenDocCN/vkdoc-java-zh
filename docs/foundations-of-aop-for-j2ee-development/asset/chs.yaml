  \           amount,newBalance,description);\n41     }\n\n43     [...] // 其他解析方法\n\
  44 }\n\n对于 EJB 而言，这些方法的实现相当简单，因为它们仅委托给 Home 接口。\n\n注意`DBUtil.getNextTxId`方法（第 39\
  \ 行）的使用，它在创建新事务时使数据库标识符的创建对 POJO 透明。所需 Home 接口的引用存储在未初始化的私有属性中。这些属性可以由实现此抽象切面的具体切面进行初始化。\n\
  \n因此，子切面可以实现会话或实体 EJB 的特性，并且必须初始化这些 Home。例如，`POJOSession`切面在`ejbCreate`方法中执行此初始化，如清单\
  \ 11-13 所示。\n\n**清单 11-13.** *POJOSession 切面中的 EJB 引用初始化*\npackage aop.j2ee.business.aspect;\n\
  \n[...] // 导入\n\npublic aspect POJOSession extends EJBResolver {\n\n    declare\
  \ parents: SessionBeanProtocol\n        extends javax.ejb.SessionBean;\n\n    [...]\
  \ // 其他方法实现见上文\n    public void SessionBeanProtocol.ejbCreate() {\n        try {\n\
  \            if(txHome==null)\n                txHome = EJBGetter.getTxHome();\n\
