  \ {this.customerIds= ids;}\n\n50 public String toString() {\n\n51 return \"account\
  \ \"+accountId+\" (\"+type+\")\\n\"+\n\n52 \"description: \"+description+\"\\n\"\
  +\n\n53 \"balance: \"+balance+\"\\n\"+\n\n54 \"creditLine: \"+creditLine+\"\\n\"\
