  \ 所示，仍然通过使用隐式协议（第 18 行）。\n\n**清单 12-19.** *一个切面化的登录控制器*  \n01 package aop.j2ee.client.web.controller;\n\
  \n03 import aop.j2ee.client.web.controller.ApplicationController; 04 import aop.j2ee.client.web.command.Command;\n\
