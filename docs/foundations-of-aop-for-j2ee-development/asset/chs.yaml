  [...]\n\n</sun-ejb-jar>\n\n这些解决方案极大地简化了编程任务，因为我们不是显式地在代码中使用 API，而是以声明方式配置容器。通过这种方式，J2EE\
  \ 允许我们分离出一定数量的非功能性横切关注点，这一点与 AOP 有共同之处。下一节将描述如何使用 AOP 来补充——甚至取代——这些解决方案。\n\n**使用\
  \ AOP**\n\n正如你在第 8 章中学到的，许多设计模式都可以从面向方面的实现中受益。这也适用于一定数量的 J2EE 设计模式，在这些模式中使用 AOP\
  \ 具有明显的优势。服务定位器和业务委托就是这种情况，两者显然都是横切性的。其他设计模式也可以通过使用 AOP 得到改进。例如，外观和业务对象可以独立于所使用的\
  \ EJB 技术。\n\n\n\n前文讨论的自动集成方案也可以通过使用 AOP 得到改进，因为这些方案暴露了以下相关问题：\n\n• 由于容器自动管理集成，在集成效果不理想或无法按所需方式配置时，可供调整集成的方式非常有限。\n\
  \n• 声明式配置仅适用于简单场景，且通常需要在 Java 中编写补充代码片段，这限制了其实用性。有时，完全不进行参数化，转而依赖设计模式和框架等显式设计方案更为可取。\n\
  \n• 除了标准化方案外，自动集成方案通常依赖于应用服务器，这限制了可移植性。\n\nAOP 通过以模块化方式集成服务，在适当情况下使用部署描述符，同时也使用\
  \ AspectJ 代码，避免了上述大部分限制，从而形成了一种既灵活又强大的技术。\n\n**226**\n\n第 10 章 ■ 示例应用程序介绍\n\n**本章小结**\n\
  \n本章介绍了一个基于 Duke's Bank 示例应用程序构建的 J2EE 银行程序，并展示了其项目和包的组织结构。这使我们能够全面探索其架构和设计。阅读本章后，您应该对该应用程序的设计问题以及\
  \ AOP 解决这些问题的方式有了基本了解。\n\n接下来的两章将逐层详细介绍如何在该示例应用程序中使用 AOP。尽管设计元素可能影响多个层，但在实现设计模式时，最好一次专注于一个层。这使得对应于每一层的项目能够保持相互独立。\n\
  \n对于每一层，我们将根据三个标准评估 AOP 带来的改进：\n\n• 对所用设计模式（重点为 J2EE 设计模式）实现的改进\n\n• 对公认的横切关注点设计元素的改进，但该元素并非已识别的设计模式，或不符合设计模式文档中的上下文\n\
  \n• 使设计减少对 J2EE 技术（尤其是 EJB）依赖的改进\n\n就业务层而言，我们还将评估用 AOP 方案替代自动集成的可能性。\n\n第 11 章\n\
  \n■ ■ ■\n\n在示例应用程序的业务层中使用 AOP\n\n**在**实现业务层时，程序员会使用 J2EE 设计模式。大多数业务层 J2EE 设计模式都依赖于\
  \ EJB。例如，会话外观模式建议使用会话 EJB。使用 EJB 可以实现附加关注点的自动集成。\n\nJ2EE 设计模式也比 GoF 设计模式更简单。\n\n\
  在本章中，我们将探讨在参考应用程序的业务层中使用 AOP。您将看到，在此上下文中，AOP 具有三个主要优势：\n\n• 使应用程序独立于 EJB 技术。在依赖新技术的不断变化的企业环境中，独立性是一个理想的特性。\n\
  \n• 为现有的自动集成方案提供一种替代的、更灵活的解决方案。\n\n• 简化 J2EE 设计模式的实现，使其对用户更加透明。\n\n**AOP 还是组件容器？**\n\
  \nAOP 和基于组件的编程有着共同的目标：将业务逻辑与持久化、事务等技术关注点分离，并以清晰、自动的方式将它们集成。集成的主要困难来自于技术关注点之间的相互依赖关系，这些依赖关系随后会在代码层面交织在一起，从而违背了软件工程的基本原则：封装和关注点分离。\n\
  \n组件容器在部署时集成技术关注点。为此，它们依赖于组件模型（如 EJB）和部署描述符（对于 EJB，定义为 XML 文件）。后者以声明方式参数化集成。然而，在需要时，没有简单的解决方案来扩展或修改集成机制。在这些情况下，使用设计模式、外部框架或\
  \ AOP 可以帮助程序员调整集成。\n\n在所有解决方案中，AOP 是唯一一种以命令式方式（即通过程序）指定集成的方案，该方案保持基础程序不变且技术独立。\n\
  \n实际上，对于设计模式，程序的结构必须被修改。对于框架，需要添加对所需 API 的依赖，或者需要对类进行特化。这些是使用 AOP 可以避免的技术依赖。\n\n\
  **227**\n\n**228**\n\n第 11 章 ■ 在示例应用程序的业务层中使用 AOP\n\n**改进业务层设计模式**\n\n在本节中，我们介绍一些可在业务层使用的设计模式，并讨论它们的弱点。我们表明，在技术和设计选择方面，使用\
  \ AOP 极大地提高了服务器层对象的独立性。\n\n我们特别强调一个事实：借助特定的切面，所有服务器端的 EJB 都可以实现为普通 Java 对象（POJO）。这样，EJB\
  \ 的使用就变得透明了。\n\n**会话外观**\n\n在使用 EJB 的 J2EE 应用程序中，会话外观是一个会话 EJB，它管理一组业务对象并定义了一个中等粒度的应用程序接口。使用外观模式的优点已在关于标准\
  \ GoF 设计模式的文献中概述。\n\n在 J2EE 设计模式中，会话外观必须实现`javax.ejb.SessionBean`接口。应用服务器通过这种方式自动实例化该类，并为客户端处理会话对象池。此外，在\
