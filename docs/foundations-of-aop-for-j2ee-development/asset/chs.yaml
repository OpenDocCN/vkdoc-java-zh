  \n69 jdbcConnectionLocator = new JDBCServiceLocator(); 70 connection = jdbcConnectionLocator.lookup(aDataSource);\
  \ 71 } catch (Exception ne) {\n\n72 throw new SystemException(ne.getMessage());\n\
