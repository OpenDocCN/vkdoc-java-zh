  ; 58 }\n\n60 }\n\n为了能够通过远程方法调用（RMI）进行远程传输，传输对象必须实现 `java.io.Serializable` 接口。如果客户端与服务器对象位于同一虚拟机中（例如，本地\
  \ EJB），则客户端不会使用 RMI，此时 `Serializable` 接口只是冗余信息。\n\n在我们的案例中，对于 Simple 客户端，可以优化客户端/服务器之间的数据传输（上传）。为此，客户端可以使用一个\
  \ `CustomerAndAccountInfos` 传输对象，该对象聚合了给定账户和客户对的一组数据。这样，调用将减少为对 `Bank.createAccountWithCustomer(CustomerAndAccountInfos)`\
  \ 的唯一一次调用，这是为此特定优化而添加到服务器的新服务。\n\n\n\n数据传输对象模式的主要问题源于新服务器端服务的引入。这些服务旨在优化远程数据交换，并且高度依赖于客户端如何使用服务器。它们污染了业务接口，并\n\
  \n**280**\n\n第 12 章 ■ 在示例应用程序的表示层和客户端层中使用 AOP\n\n使得全局应用程序的可维护性降低。例如，当业务需求发生变化时，可能需要对这几种模式进行重大修改。\n\
  \n总之，尽管在某些情况下可以使用传输对象（例如，用于聚合特定对象的状态），但通常来说，使用它们会更加困难（且危险）（例如，在尝试优化通信成本时，如 CustomerAndAccountInfos）。这些对象难以预测，并且可能根据应用程序的架构而变化。因此，为了更好地模块化这一关注点的实现，将极大地有助于提高可维护性。在下一节中，我们将解释\
  \ AOP 如何实现这种分离。\n\n**访问设计模式的面向切面实现** 在前面的章节中，我们介绍了业务层访问的三种主要设计模式：业务委托、服务定位器和数据传输对象。这些模式协同工作，以管理分布式\
  \ J2EE 环境中的业务层访问。我们已经讨论了它们的局限性和缺陷。\n\n在本节中，我们提出这些设计模式的面向切面实现，它可以作为一种优雅的替代方案。\n\n\
  消除业务委托\n\n采用面向切面的设计，业务委托设计模式通常就不再需要了。\n\n实际上，该模式的目的是封装与业务外观的通信（解析、错误处理、重试和超时）。然而，所有这些都可以轻松地封装在“环绕”通知代码中。\n\
  \n该通知将应用于对外观的直接调用，而外观由远程客户端通过其远程接口调用。该接口的解析可以像业务层一样，通过使用隐式协议技术来完成。\n\nJ2EE 服务定位器的第一个切面可以如清单\
  \ 12-5 所示实现。\n\n**清单 12-5.** *定位器切面*\n\n01 package aop.j2ee.client.java.aspect;\n\
  \n03 import java.rmi.RemoteException;\n\n04 import javax.ejb.CreateException;\n\n\
  05 import javax.naming.NamingException;\n\n07 import aop.j2ee.business.session.bank.BankHome;\n\
  \n08 import aop.j2ee.commons.exception.SystemException;\n\n10 import aop.j2ee.commons.util.locator.*;\n\
  \n12 public aspect Locator {\n\n13 public static final String BANK_SERVICE = \"\
  aop.j2ee.business.session.Bank\"; 14\n\n15 public pointcut ejbservice(Class aClass)\
  \ : call(\n\n16 * aop.j2ee.client.java.aspectized..*.getServiceFacade(Class))&&args(aClass);\n\
  \n第 12 章 ■ 在示例应用程序的表示层和客户端层中使用 AOP\n\n**281**\n\n18 protected pointcut connectionservice(String\
  \ aDataSource) : 19 call(* aop.j2ee.client.java.aspectized..*.getDatabaseConnection(String))\
