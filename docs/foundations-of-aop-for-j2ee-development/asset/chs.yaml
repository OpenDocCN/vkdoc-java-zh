  \n112 } catch (SystemException ex) {\n\n113 ex.printStackTrace();\n\n114 return\
  \ null;\n\n115 }\n\n116 return bank.getAccountDetails(accountId);\n\n117 }\n\n119\
  \ [...] // 相同的委托模式\n\n120 // 对其他服务委托给银行\n\n121 }\n\n**276**\n\n第 12 章 ■ 在示例应用程序的表示层和客户端层使用\
  \ AOP\n\n在每个业务委托方法中，我们获取第 11 章中引入的会话外观实例（第 63 行），并使用所需的参数调用该外观的相应服务（第 68 行）。\n\n\
  业务委托的另一个优势在于它封装了远程通信策略。例如，超时、重试和缓存策略都可以在委托内部实现，从而使客户端代码更加独立于这些非功能性关注点。\n\n接下来，清单\
  \ 12-3 中的代码展示了在委托内实现简单重试策略的示例。如果网络或服务器暂时不可用，该策略能使应用程序更加稳定。在这种情况下，如果服务解析失败，我们会在重试（第\
  \ 18 行）之前将当前线程暂停一秒钟（第 17 行）。类似地，如果在调用过程中遇到错误，我们会等待一秒钟（第 33 行），然后递归重试（第 35 行）。请注意，我们在第\
  \ 34 行强制重新解析外观。\n\n**清单 12-3.** *为银行委托添加重试策略* 01 public class BankDelegate {\n\n\
  03 [...]\n\n05 public String createAccount(String customerId, String type, String\
  \ descr, 06 BigDecimal balance, BigDecimal creditLine, BigDecimal beginBalance,\
  \ 07 Date beginBalanceTimeStamp)\n\n08 throws\n\n\n\n09 RemoteException, IllegalAccountTypeException,\
  \ CustomerNotFoundException, 10 InvalidParameterException {\n\n12 Bank bank;\n\n\
  13 try {\n\n14 bank= getServiceFacade();\n\n15 } catch (SystemException ex) {\n\n\
  16 try {\n\n17 Thread.sleep(1000);\n\n18 bank= getServiceFacade();\n\n19 } catch\
  \ (SystemException ex2) {\n\n20 ex2.printStackTrace();\n\n21 return null;\n\n22\
  \ } catch (InterruptedException ex2) {\n\n23 ex2.printStackTrace();\n\n24 return\
  \ null;\n\n25 }\n\n26 }\n\n27 String result=null;\n\n28 try {\n\n29 result = bank.createAccount(customerId,\
  \ type, descr, balance, creditLine,\n\n第 12 章 ■ 在示例应用程序的表示层和客户端层中使用 AOP\n\n**277**\n\
  \n30 beginBalance, beginBalanceTimeStamp); 31 } catch (RemoteException ex) {\n\n\
  32 try {\n\n33 Thread.sleep(1000);\n\n34 bank= null;\n\n35 createAccount(customerId,\
  \ type, description, balance, creditLine, 36 beginBalance, beginBalanceTimeStamp);\
  \ 37 } catch (InterruptedException ex2) {\n\n38 ex2.printStackTrace();\n\n39 }\n\
  \n40 }\n\n41 return result;\n\n42 }\n\n43 [...]\n\n清单 12-3 中的实现显然优于那种直接从客户端代码解析并调用外观的简单实现。然而，这种改进并非完全令人满意，原因如下。首先，为了保持清晰的业务级\
  \ API，最好为每个业务对象实现一个业务委托。尽管理论上这项工作只需完成一次，但编写委托代码是一项容易出错且繁琐的任务。其次，对业务委托 API 的访问构成了一个横切关注点。最后，委托不易重用，因为它们依赖于底层\
  \ J2EE 基础设施的通信层。\n\n请注意，业务委托实现使用了一个名为 `ServiceLocator` 的类，该类实现了另一种客户端设计模式，将在下一节中解释。\n\
  \n服务定位器\n\n*服务定位器*设计模式降低了客户端因需要定位和创建远程服务访问存根而产生的复杂性。这种关注点在 J2EE 环境中很典型。\n\n将这种关注点模块化到服务定位器中，并不能消除所有技术依赖。\n\
  \n首先，服务定位器的使用者（例如业务委托）必须引用 `javax.ejb.EJBHome` 和 `javax.ejb.EJBLocalHome` 接口。此外，`javax.ejb`、`java.rmi`\
  \ 和 `javax.naming` 包中的异常必须由使用代码处理。这些依赖关系在使用了服务定位器的 `BankDelegate` 代码中有所体现。\n\n在不同的客户端代码中使用服务定位器时，仍会存在一些横切关注点——例如，在基于\
  \ Servlet 的表示层客户端和 Swing 客户端的业务委托中。这些横切关注点实现了对 EJB 接口的引用、对前述异常的处理，以及我们在每个客户端中都能找到的服务定位器引用。\n\
  \n回顾一下，服务定位器也是 GoF 单例设计模式的一种实现。第 8 章展示了如何通过一个专用切面将普通类自动转换为单例（更多详情请参见第 8 章中的“单例设计模式”一节）。\n\
  \n**278**\n\n第 12 章 ■ 在示例应用程序的表示层和客户端层中使用 AOP\n\n数据传输对象\n\n在本章开头给出的客户端代码中，我们看到使用了名为\
  \ `getAccountDetails` 的服务，该服务返回一个 `AccountDetails` 类型的对象实例。此对象聚合了一个账户的属性值，并提供了一个与\
  \ `Account` 相近的接口。该对象是 J2EE 设计模式中一个参与者的实例化：*数据传输对象*。\n\n数据传输对象可用于两种主要情况：\n\n*  \
  \ 当客户端计算单元需要访问业务层返回的多条数据时（多次下载）\n*   当客户端计算单元需要发送多条数据以完成处理时（多次上传）\n\n通过使用数据传输对象设计模式，可以减少远程调用的次数，如清单\
  \ 12-4 所示。该模式建议使用一个传输对象，该对象旨在将一组数据从客户端传输到服务器，反之亦然。在这种情况下，我们使用了一个 `AccountDetails`\
  \ 传输对象。由于传输对象必须同时从客户端和服务器访问，因此应用程序的所有传输对象都放在 `aop.j2ee.commons.to` 包中（`to` 代表传输对象）。\n\
  \n**清单 12-4.** *银行应用程序的传输对象* 01 package aop.j2ee.commons.to;\n\n03 import java.math.BigDecimal;\n\
  \n04 import java.util.Date;\n\n05 import java.util.ArrayList;\n\n07 public class\
