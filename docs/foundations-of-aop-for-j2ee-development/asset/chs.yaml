  \n042 throw new RuntimeException(\"...\"); 043 }\n\n044 out.println(\"Call type,Class,Name,ReturnType,parameters,exceptions\"\
  ); 045 }\n\n047 public void recordMethodCall(String className,\n\n048 String methodName,Class\
  \ returnType,Class[] parameters, 049 Class[] exceptions) {\n\n050 ...\n\n051 }\n\
