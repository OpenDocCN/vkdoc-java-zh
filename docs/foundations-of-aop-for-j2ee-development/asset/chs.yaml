  \ 容器负责调用过滤器，这些过滤器可以在 `web.xml` 文件中以声明方式添加和移除，如清单 12-21 所示。\n\n**清单 12-21.** *过滤器的声明式配置*\n\
  \n<filter>\n\n<filter-name>silverMembership</filter-name>\n\n<filter-class>\n\n\
  aop.j2ee.presentation.controller.MembershipFilter\n\n</filter-class>\n\n<init-param>\n\
