  \n取款及其他业务方法的实现具有以下特点：\n\n*   它们比使用 Home 协议的方法更清晰。Home 协议需要通过 JNDI 解析引用、管理这些引用以及识别新创建的\
  \ EJB。使用隐式协议技术则无需这些操作，程序员只需使用协议方法，而无需了解其实现。\n*   它们更具模块化。EJB 解析逻辑的实现位于一个独立的切面中，而不是分散在所有\
  \ EJB 中。这使得公共引用解析机制的复用变得更加容易。\n\n**254**\n\n**第 11 章 ■ 在示例应用程序的业务层中使用 AOP**\n\n\n\
  \n• 他们对技术的依赖程度较低。如果定义的隐式协议具有恰当的细节层次，那么更改解析的实际实现就很简单了。\n\n**前置条件分解**\n\n在第 9 章中，我们介绍了使用\
