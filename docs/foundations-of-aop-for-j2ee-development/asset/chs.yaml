  \ {}\n\n15 public void init(FilterConfig config) throws ServletException {\n\n16\
  \ subscriptionType = config.getInitParameter(\"subscriptionType\"); 17 denyPage\
  \ = config.getInitParameter(\"denyPage\"); 18 }\n\n20 public void doFilter(ServletRequest\
  \ request,\n\n21 ServletResponse response, 22 FilterChain chain)\n\n23 throws IOException,\
  \ ServletException {\n\n24 [...] // 对请求进行处理\n\n25 // 继续应用过滤器链\n\n26 chain.doFilter(request,response);\n\
  \n27 [...] // 对响应进行处理\n\n28 }\n\n30 public void destroy() {}\n\n31 }\n\n**308**\n\
  \n第 12 章 ■ 在示例应用程序的表示层和客户端层中使用 AOP\n\n在*过滤器对象*设计模式中，我们可以识别出 AOP 的典型结构：“环绕”通知代码。为了达到相同的效果，我们可以用切面替换\
  \ `MembershipFilter` 类，并用“环绕”通知代码替换过滤器方法 `doFilter`（第 20 行）。实际上，在过滤器链上调用 `doFilter`\
  \ 方法（第 26 行）与在“环绕”通知代码中调用 `proceed` 具有类似的效果。\n\n使用 AOP 并不会显著提高代码的模块化程度，因为最终实现与过滤器对象模式非常相似。然而，它可以显著提升性能，因为\
  \ Web 容器以透明且不可控的方式处理拦截链。该机制是动态的，可能会引入开销。由于 AspectJ 等工具支持编译时织入，拦截代码可以直接插入目标类代码中，从而消除了链初始化和迭代机制的实现。\n\
  \n清单 12-23 展示了一个面向切面的过滤器实现。\n\n**清单 12-23.** *使用 AOP 实现授权过滤器*\n\n01 package aop.j2ee.client.web.aspect;\n\
  \n03 import java.io.IOException;\n\n04 import javax.servlet.*;\n\n05 import javax.servlet.http.*;\n\
  \n06 import aop.j2ee.presentation.bean.SubscriberBean;\n\n08 public class SilverMembershipFilterAspect\
  \ {\n\n09 declare precedence: GoldMembershipFilterAspect,\n\n10 SilverMembershipFilterAspect,\
  \ *; 11\n\n12 private String FrontController.subscriptionType=\"silver\"; 13 private\
  \ String FrontController.denyPage=\"/secure/denied.jsp; 14\n\n15 pointcut filter(ServletRequest\
  \ request,ServletResponse response): 16 execution(protected void process(HttpServletRequest,\
  \ HttpServletResponse)) 17 && args(request,response); 18\n\n19 around(ServletRequest\
  \ request,\n\n20 ServletResponse response): filter(request,response) {\n\n22 throws\
  \ IOException, ServletException {\n\n23 [...] // 对请求进行处理\n\n24 // 继续应用过滤器\n\n25\
  \ proceed(request,response);\n\n26 [...] // 对响应进行处理\n\n27 }\n\n28 }\n\n在面向切面的解决方案中，`proceed`\
  \ 实现了对下一个过滤器的调用（第 25 行）。过滤器应用的顺序由优先级声明定义（第 9 行）。这里，我们通过切入点应用过滤器，该切入点对应于前端控制器请求处理的执行（第\
  \ 15 行）。这确保了所有传入的请求和传出的响应都被过滤。由于所有过滤器的切入点相同，因此可以将其提取到超类中。\n\n请注意，这种技术比原始技术更灵活。通过修改切入点，例如，我们可以将过滤器安装在应用程序控制器上，而不仅仅是前端控制器上。这种技术的唯一缺点是过滤器不是以声明方式（在\
  \ `web.xml` 文件中）定义的。当进行更改时，应用程序需要重新编译。\n\n**视图助手**\n\n*视图助手*是一个 Java 对象，它实现了 JSP\
  \ 页面逻辑的子部分。出于维护和性能方面的原因，此设计模式将 Java 代码从 JSP 中外部化。实际上，当 JSP 的 Java 逻辑在视图助手中实现时，代码只被编译和加载一次，从而避免了\
  \ Web 容器处理过多 Java 代码。\n\n在特定情况下，通过使用 AOP 可以改进视图助手的实现。例如，我们可以添加过滤器，根据某些基于会话的标准（如用户偏好）来修改助手的行为。这种\
  \ AOP 的使用可以被视为先前描述的拦截过滤器的泛化。请注意，系统性地使用 AOP 进行过滤可以实现更好的关注点分离。例如，过滤可以用于以模块化方式实现某些国际化功能。\n\
  \n**Web 表示层总结**\n\n与业务层和客户端层相比，AOP 在表示层中的改进不那么系统化。这主要有两个原因：\n\n\n\n• Web 层使用 Java\
  \ 和 Servlet 模型来处理请求以及屏幕链接。这是一种基于交互的低级实现，没有明确或稳定的业务模型，无法以系统化的方式应用切面。同样值得注意的是，对于控制器设计模式的面向切面实现，业务特性是在切面内部实现的。\n\
  \n• 表示层已经使用非 Java 技术来分离关注点。例如，布局在 JSP 页面内的 HTML 中定义。除了视图助手之外，表示层无法通过基于 Java 的 AOP\
  \ 技术得到改进。为了获得最大效率，应优先使用或结合其他技术，例如可扩展样式表语言转换（XSLT）。\n\n**总结**\n\n在本章中，我们研究了 AOP 在客户端和表示层中的使用。在可能的情况下，我们在示例中使用了示例应用程序。我们展示了\
  \ AOP 为模块化远程通信相关问题提供了许多改进。用于分发的三种主要 J2EE 设计模式存在许多缺点，这些缺点可以通过使用 AOP 来避免。\n\n**310**\n\
  \n第 12 章 ■ 在示例应用程序的表示层和客户端层中使用 AOP\n\n对于表示层，AOP 对于模块化典型关注点（例如国际化以及前置和后置条件检查）非常有用。现有的表示框架（如\
  \ Struts 和 Swing）已经提供了抽象并处理了与表示相关的关注点。\n\n在这些上下文中，AOP 效率较低；然而，对表示层 J2EE 设计模式的研究表明，AOP\
  \ 可以有效地用于构建或增强此类框架。\n\n索引\n\n■**A**\n\nafter throwing 通知代码, 45\n\n抽象切面, AspectJ,\
