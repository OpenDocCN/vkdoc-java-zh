  \njboss-aop.xml 文件实现\n\n**织入器实现**\n\n面向切面系统的核心是*切面织入器*。它是一种用于将切面与类集成的工具。存在多种执行织入的方式。AspectJ\
  \ 采用编译时织入器，这是语言方法的典型特征；而 JAC、JBoss AOP 和 Spring AOP 则使用运行时织入器，这是框架方法的典型特征。\n\nAspectJ\
  \ 织入器可以接受源代码或字节码作为输入。除了编译时织入模式外，还有一种加载时模式，即当应用程序的字节码加载到 JVM 中时，可以织入切面。编译时（或加载时）织入的优势在于，它生成的织入后应用程序的执行时间优于运行时织入。其缺点在于，执行代码中切面代码与应用程序代码之间没有区别。如果程序员需要修改、添加或移除某个切面，则必须重新织入整个应用程序。\n\
  \n使用 JAC、JBoss AOP 和 Spring AOP 时，类和切面是分别编译的，织入在应用程序加载和执行时进行。切面和类实例是独立的运行时实体，织入器根据织入指令协调执行。在这种模式下，织入是一种非常类似于绑定的操作：一个切面实例被绑定到该切面所应用的对象上。这种模式的优势在于绑定可以动态修改，从而无需重新编译应用程序即可移除切面并织入新切面。此功能对于像\
  \ Web 服务器这样需要随时可用的应用程序非常有用，因为可以在不停止应用程序的情况下部署新功能。运行时织入的缺点之一是应用程序通常比静态织入的应用程序运行速度慢。\n\
  \n请注意，尽管 AspectJ 也可以实现运行时织入，但这不太自然，因为 AspectJ 遵循语言方法。编译器执行的大部分类型检查将被禁用，这将抹去语言方法的大部分优势。\n\
  \n另一方面，框架方法很难实现编译时织入，因为它意味着需要某种预处理工具，而语言方法实现这种工具要高效得多。\n\n第 7 章 ■ AOP 工具比较\n\n**139**\n\
  \n**切面**\n\n我们已经提到，AspectJ 是一种拥有自己语法（在 AspectJ 5 版本中，这种专用语法可以被注解替代）的语言，而 JAC、JBoss\
  \ AOP 和 Spring AOP 是框架。\n\n在 AspectJ 中，切面是定义切入点（pointcuts）和通知（advice）代码的软件实体，它们也可以定义字段和方法。切面继承已经实现，但与类继承相比有一些限制。一个具体切面可以扩展一个抽象切面，但不能扩展另一个具体切面。\n\
  \n在 JAC 中，切面是扩展了 JAC 库提供的 `AspectComponent` 类的常规 Java 类。一个切面定义切入点，通知代码则写在独立的*包装类*中。JAC\
  \ 的关键特性之一被称为*切面配置*机制。此工具允许程序员定义切面如何在不同应用程序中重用，同时还能根据每个应用程序的需求进行定制。为此，一组配置元素从切面中外部化到一些配置文件中，这些文件可以在不重新编译整个应用程序的情况下进行修改。\n\
  \nJBoss AOP 中的切面概念被拆分为两种文件：拦截方法或拦截器实现通知代码，并在 Java 类中定义；切入点将这些拦截器与连接点关联起来，并在 XML\
  \ 文件中定义。在 JBoss AOP 的较新版本中，这种区别消失了；与 AspectJ 类似，切入点可以使用 Java 5 注解来定义。\n\n在 Spring\
  \ AOP 中，通知和切入点是在常规 Java 类中实现的，这些类被配置为 bean。依赖注入原则允许配置通知和切入点之间的链接。没有显式的切面实体；然而，一个切面可以被视为一组*顾问（advisors）*。\n\
  \n对这四种工具的研究表明，切面的概念对于 AOP 来说并非强制性的。实际的主要概念是切入点和通知，以及将它们链接在一起的方式。一个切面不过是一组在逻辑上与某个关注点相关的切入点和通知。然而，使这种逻辑链接显式化并非强制要求，能够独立于给定切面来定义通知和切入点也是有用的。在这种情况下，我们可以称这些为匿名切入点或通知。\n\
  \n除了汇集切入点和通知之外，切面的一个重要角色是作为特定关注点的配置单元。正如刚才通过 JAC 的切面配置机制所解释的，配置能力对于切面重用至关重要。我们将在本章后面详细说明此功能。然而，当一个系统已经原生支持配置层（例如\
  \ Spring bean 配置层）时，就不需要切面概念了。它从包含切入点和通知的某些配置中涌现出来。\n\n**切入点**\n\n回顾一下，*切入点*是一组代码位置，称为*连接点*，切面可以在这些位置被织入。这个想法是\
  \ AOP 的核心。切入点定义了切面的横切性质。\n\n一个切入点“谈论”应用程序，并指定切面应用的战略位置。\n\n**140**\n\n第 7 章 ■ AOP\
  \ 工具比较\n\n在本节中，我们将总结如何编写切入点，以及本书中介绍的各种面向切面语言和框架所支持的连接点类型。\n\n**切入点定义**\n\n所有现有的面向切面工具都提供了一种切入点语言，用于定义包含在切入点中的连接点集合。基本上，这种切入点语言可以被视为一种查询语言。查询所应用的结构不是经典的数据库，而是一个程序。这里的目标是定义一种语言，允许开发者以尽可能简单和实用的方式编写相关查询。因此，一种切入点语言通常定义几个关键字、经典的布尔运算符（AND、OR、NOT）以及通配符（例如字符\
  \ *），以便简洁地选择连接点集合。\n\n在 AspectJ 中，切入点使用专用语法（关键字 `pointcut`）或 Java 5 注解来定义。JAC 切入点通过调用一个使用\
  \ GNU 正则表达式的 API 来定义，该正则表达式基于类名、对象名和方法签名来定义连接点集合。JBoss AOP 切入点可以定义为 XML 标签或 Java\
  \ 5 注解。Spring AOP 切入点可以在 XML 中定义，也可以通过 Java 程序化地定义。\n\n\n\n大多数情况下，切点依赖于应用程序的结构。如果应用程序代码发生变化，切面应用的位置也极有可能随之改变。当程序员希望将切面复用于不同的应用程序时，情况也类似：切点必须适应新的应用程序。这就是上一节提到的切面配置过程如此重要的原因。请注意，采用在编译时实现织入的语言方法（AspectJ）时，属于给定切点的连接点可以在编译时确定，而框架则很难做到这一点。借助合适的工具（例如\
  \ AJDT Eclipse 插件），使用语言方法的切面程序员可以更好地控制其程序。\n\n正如我们所说，切点可以被视为对程序的查询。这些查询返回一组切面应用的连接点。一个切面工具的特征在于其支持的连接点类型。对于给定的程序，一种连接点类型具体表现为一组连接点阴影——即所有对应于该连接点类型的程序位置。例如，*方法调用*连接点类型对应于所有调用方法的位置。\n\
  \n在下一节中，我们将比较各工具支持的连接点类型。\n\n**连接点类型**\n\nAspectJ 是支持连接点类型最多的 AOP 工具。本节我们将考察 AspectJ、JAC、JBoss\
  \ AOP 和 Spring AOP 所支持的连接点类型。\n\n• *方法执行*：除 Spring 外，所有 AOP 工具都支持此类型，Spring 支持透明代理。\n\
  \n• *方法调用*：AspectJ 和 JBoss AOP 支持此类型。JAC 不支持。\n\n然而，在编写具有远程通信的应用程序时，可以通过包装客户端代理来拦截方法调用，这与方法调用连接点非常相似。Spring\
  \ 支持透明代理，可视为一种方法调用切点。\n\n• *构造函数执行*：除 Spring 外，所有 AOP 工具都支持此连接点类型。\n\n第七章 ■ AOP\
  \ 工具比较\n\n**141**\n\n• *继承构造函数执行*：当构造函数调用父构造函数时，AspectJ 可以区分当前构造函数的执行与继承构造函数的执行。\n\
  \n• *字段读取*：AspectJ 和 JBoss AOP 可以在此连接点类型周围织入切面。JAC 和 Spring 不直接支持。然而，JAC 会执行字节码分析来检测读取字段的方法。\n\
  \n• *字段写入*：此连接点类型与字段读取类型类似。\n\n• *异常*：AspectJ 可以拦截异常捕获块的开始。JBoss AOP、JAC 和 Spring\
  \ 均不支持此连接点类型。但是，它们支持某种“抛出后”通知（JAC 中的异常处理器），该通知模块化了切点内所有连接点的异常处理。请注意，“抛出后”通知（AspectJ\
  \ 也支持）的功能弱于捕获块通知，因为它不允许切面修改基础程序处理现有异常的方式。\n\n• *静态块执行*：AspectJ 支持此连接点类型，但其他工具不支持。\n\
  \n• *通知代码执行*：这是 AspectJ 的连接点类型。对于其他工具，通知代码在常规的 Java 方法中定义。因此，程序员可以对这些方法的执行和调用进行切面化。\n\
  \n• *控制流*：AspectJ 支持对应于进入和退出控制流的连接点类型。JBoss AOP 或 JAC 不提供此功能；但程序员可以模拟实现。Spring AOP\
  \ 支持某些类型的 cflow。\n\n有趣的是，遵循框架方法（JAC、JBoss 和 Spring）的工具支持的连接点类型比 AspectJ 少。这有几个原因，既涉及技术层面，也涉及集成层面。\n\
  \n在技术方面，由于框架是用纯 Java 编写的，并使用反射、字节码操作和代理技术进行实现，因此它们实现细粒度连接点类型（例如异常捕获）更为复杂。\n\n在集成方面，由于框架方法置于组件框架的上下文中（JBoss\
  \ 使用 EJB，JAC 和 Spring 使用简单 Bean），它们通常有意决定不支持非常细粒度的连接点，以维护被切面化组件的封装原则。例如，Spring 和\
  \ JAC 有意不支持字段读/写连接点类型，以便通知仅能应用于组件接口（即组件的固定部分）。再如，Spring AOP 不支持构造函数执行连接点，因为它可能会干扰\
  \ Spring 工厂中实现的构造过程。当然，这些限制使得 AOP 框架的灵活性不如 AspectJ。另一方面，它们防止了程序员误用框架，并使 AOP 程序更具可重用性。例如，通过更改类的实现和字段（而非接口）来重构类，可能会影响\
  \ AspectJ 切点，但绝不会影响 JAC 或 Spring 切点，因为它们不支持字段拦截。\n\n另一个重要点是，AspectJ 提供的某些高级 AOP\
  \ 连接点类型可以使用较不高级的特性来实现。例如，cflow 特性\n\n**142**\n\n第七章 ■ AOP 工具比较\n\n可以简单地通过使用执行通知和标准线程局部变量（java.lang.ThreadLocal）来实现。这证明了这些连接点类型虽然有助于简化和清晰，但并非总是被提供的原因。\n\
  \n**通知**\n\n切点允许程序员定义切面应用的位置。通知代码的概念定义了切面的行为——换句话说，通知代码说明了切面在做什么。\n\n用于定义切面行为的代码结构的术语各不相同，从*通知代码*（AspectJ），到*包装器*（JAC），再到*拦截器*（JBoss\
  \ AOP 和 Spring AOP）。然而，这些术语背后的思想是相同的：定义将在连接点之前和之后执行的指令。\n\n**通知代码类型**\n\n三种主要的通知代码类型是“前置”、“后置”和“环绕”。\n\
  \n• “前置”通知代码在连接点之前执行。\n\n• “后置”通知代码在连接点之后执行。有两种主要的“后置”通知代码类型：\n\n• “返回后”通知代码在正常执行/调用之后执行。\n\
  \n• “抛出后”通知代码在导致抛出异常的异常执行/调用之后执行。\n\n• “环绕”通知代码在连接点之前和之后都执行。\n\nAspectJ 和 Spring\
  \ 提供了所有这些通知代码类型，而 JAC 和 JBoss AOP 选择仅提供“环绕”通知代码类型。实际上，“环绕”通知代码包含了所有其他类型的通知。例如，“前置”通知代码可以看作是调用了\
  \ proceed 且缺少“后置”部分的“环绕”代码。再如，“抛出后”通知代码是将对 proceed 的调用封装在 try/catch 块中的“环绕”通知代码。\n\
  \n提供“前置”和“后置”结构有几个优点。首先，它使切面代码更清晰，因为程序员无需查看通知代码就能轻松看出实现了哪种功能。其次，它帮助程序员避免编程错误，例如忘记继续执行到连接点。第三，“前置”和“后置”通知代码可以由\
  \ AOP 框架更高效地实现，因为在这些情况下不需要对连接点进行具体化（参见第 6 章的“前置”和“后置”通知代码）。\n\n\n\n然而，在处理需要根据特定执行上下文进行流程推进或异常捕获等复杂编程场景时，这些优势并非至关重要。在这种情况下，更推荐使用“环绕”通知代码的通用形式，这也解释了为何某些方法仅坚持使用“环绕”通知代码。\n\
  \n请注意，在所有 AOP 工具中，都提供了一种特殊结构来界定“环绕”通知代码的“后置”和“前置”部分。该结构在 AspectJ 中表现为一个关键字（`proceed`），在\
  \ JAC 和 Spring AOP 中表现为一个方法调用（`proceed`），在 JBoss AOP 中则表现为 `invokeNext`。然而，这只是一个细微的差别，其底层语义保持不变。\n\
  \n第 7 章 ■ A O P 工 具 对 比\n\n**143**\n\n最后，AspectJ（语言方法）与其他工具（框架方法）之间的主要区别在于，AspectJ\
  \ 提供了类型化的通知。确实，在 AspectJ 中，通知代码可以接受类型明确的参数，这些参数绑定到某些连接点的上下文元素（例如，参数、目标和调用者）。类型明确的通知代码提高了程序质量、可读性和性能（静态绑定）。然而，类型化通知代码的优势需要与一个事实相权衡：即并非总能以类型化的方式实现通知代码，尤其是当它需要对基础程序执行通用功能时（例如，持久化切面应通用地应用于程序中的所有对象，因此无法进行类型化）。\n\
  \n**连接点自省**\n\n当通知代码在连接点之前、之后或环绕执行时，程序员有时需要检索当前连接点的信息。例如，程序员可能需要知道与连接点关联的方法是什么，或者调用的参数是什么。收集此类信息的过程称为*连接点自省*。本书介绍的所有四种\
  \ AOP 工具都支持此功能。\n\nAspectJ 提供了关键字 `thisJoinPoint`，用于在通知代码中自省连接点。\n\n该关键字返回一个对象的引用，该对象由\
  \ AspectJ 为每个遇到的连接点创建。此对象实现了 `org.aspectj.lang.JoinPoint` 接口，并且根据连接点类型，存在几种不同的方法来检索当前连接点的信息。\n\
  \n对于 JAC、Spring AOP 和 JBoss AOP，通知代码由常规的 Java 方法组成。每当连接点匹配定义的切点时，就会调用这些方法。这些方法接受一个对象作为参数，该对象类似于\
  \ AspectJ 的关键字 `thisJoinPoint`，提供当前连接点的信息。对于 JAC 和 Spring AOP，此对象实现的接口是 `org.aopalliance.intercept.Joinpoint`，该接口属于\
  \ AOP Alliance 标准 API。\n\nJBoss AOP 使用一个类似但特定于 JBoss 的接口：`org.jboss.aop.joinpoint.Invocation`。\n\
  \n## 引入机制\n\n*引入机制*允许使用在切面中定义的代码元素（字段、方法等）来扩展应用程序。\n\n在 AspectJ 中，此机制被称为*类型间声明*。其思想是一个类型（切面）为目标类型执行声明。AspectJ\
  \ 可以引入字段、方法和构造函数。引入的目标是一个类或接口。如果使用接口，则所有实现该接口的类都是引入的目标。AspectJ 也可以引入接口。\n\n对于 JAC，可以引入两种类型的代码元素：方法和异常处理器。\n\
  \n引入的方法（称为*角色方法*）和异常处理器在包装器类中定义。角色方法可以通过依赖 Java 运行时反射能力的 API 来调用。在此使用反射的优势在于引入机制非常灵活：在运行时可以轻松地添加或移除引入。缺点是\
  \ JAC 在实际调用之前不会执行任何类型检查，并且由于反射开销，调用过程相对较慢。\n\n**144**\n\n第 7 章 ■ A O P 工 具 对 比\n\
  \nJBoss AOP 和 Spring AOP 提供了一种称为*混入*的机制，用于将代码元素引入应用程序。通过此机制，在混入类中定义的字段和方法会被附加到作为混入目标的类上。格式良好的混入应实现一个声明了引入方法的接口。在底层，AOP\
  \ 框架将使用字节码操作使目标类实现混入接口。然后，当调用混入方法时，程序员必须将目标对象强制转换为声明该方法的接口。此机制也不是类型安全的，因为 Java 对接口没有实现任何强类型检查（动态绑定）。然而，它的优势在于效率远高于反射。此外，一旦对目标对象进行了强制类型转换，IDE\
  \ 将能够提供一些支持，例如上下文帮助和代码补全。\n\n总结引入机制，只有 AspectJ 语言方法在此特性上是类型安全的，因为编译器实现了一些类型检查机制。遵循框架方法的工具无法做到类型安全，因为它们仍然是纯\
  \ Java，不支持此类特性。然而，JBoss 和 Spring 实现的混入方法似乎是一个很好的折衷方案。确实，大多数程序员会认为，将对象强制转换为给定接口以允许调用引入的方法更为自然。使用\
  \ AspectJ，代码有时可能难以阅读和理解，因为它可以引用目标对象所支持的任何类或接口中都不存在的方法。\n\n**高级特性**\n\n本节比较 AspectJ、JAC、JBoss\
  \ AOP 和 Spring AOP 实现的各种高级特性。具体来说，我们将涵盖切面实例化、排序和重用。\n\n**切面实例化**\n\n与类类似，切面是可以被实例化的代码元素，术语*切面*既可以指类型也可以指实例。然而，与类不同的是，切面不是由程序员直接实例化的；换句话说，程序员从不调用\
  \ `new` 来实例化切面。切面实例由 AOP 语言或框架自动创建。\n\n\n\n使用 AspectJ 时，默认策略是为每个现有切面仅创建一个实例，例如单例切面。因此，切面中定义的数据会被该切面应用到的所有连接点共享。程序员可以通过指定以下方式重新定义此默认策略：为作为切入点执行对象的每个对象（`perthis`\
  \ 子句）或作为切入点目标对象的每个对象（`pertarget` 子句）创建一个切面实例。类似地，每次程序进入一个控制流时，也可以创建一个切面实例（`percflow`\
  \ 和 `percflowbelow` 子句）。AspectJ 5 提供了一种新的实例化策略（`pertypewithin` 子句）。\n\n使用 JAC 时，实例化策略涉及切面和包装器，两者默认都是单例。可以通过指定为切入点中包含的每个连接点创建一个包装器实例，来为包装器选择不同的实例化策略。当使用\
  \ JAC 编写分布式应用程序时，切面和包装器实例会在每个主机上复制。\n\nJBoss AOP 实现的默认策略是，为每个被切面化的应用类关联一个包装器类实例——换句话说，即为切面中定义的某个切入点所匹配的每个类创建一个实例。可以通过指定一个工厂来重新定义此默认策略，该工厂将根据程序员的需求负责创建切面实例。\n\
  \n**第 7 章 ■ AOP 工具比较**\n\n**145**\n\n最后，Spring AOP 的默认策略也是将切面实例化为单例。\n\n尽管框架方法提供了默认策略，但始终可以通过使用较低级别的\
  \ Java API 动态实例化切面。在每个框架（JAC、JBoss 和 Spring）中，都可以动态地向目标对象添加新的通知和引入。这些特性使得框架方法比语言方法灵活得多。\n\
  \n**切面排序**\n\n当多个切面应用于同一个连接点时，必须指定这些切面的执行顺序。大多数情况下，这种排序取决于切面的语义，无法定义自动规则。例如，当考虑一个跟踪切面和一个安全切面时，如果程序员想要跟踪每个请求，则跟踪切面可能在安全切面之前执行。或者，如果程序员只需要跟踪来自未授权用户的请求，则安全切面可能先执行。在这种情况下，程序员必须显式指定顺序。\n\
  \n使用 AspectJ 时，切面排序通过指令 `declare precedence` 定义。该顺序是全局的，适用于整个应用程序。某些排序可能未被指定，在这种情况下，执行顺序无法得到保证。\n\
  \n使用 JAC 时，切面排序通过系统属性 `jac.comp.wrappingOrder` 定义。\n\nJBoss AOP 在 XML 文件 `jboss-aop.xml`\
  \ 中使用 `<precedence>` 标签。Spring AOP 提供了一个必须实现的接口（`org.springframework.core.Ordered`）来指定顺序。\n\
  \n在所有情况下，顺序都是全局的，并且无法保证某些排序不会被遗漏。\n\n乍一看，AspectJ 和 JBoss 采用的优先级特性似乎是最强大的，因为它允许对切面声明进行排序。优先级关系是可传递的，切面系统将通过查看所有切面的所有声明顺序来确定最终顺序。然而，我们认为，在重构程序时（即添加、删除、重命名或更改切面时），优先级构造可能会导致可维护性问题。实际上，可能需要在程序中更改所有优先级声明。因此，对于更复杂的程序，像\
  \ JAC 那样的集中式排序声明似乎是合理的。因此，我们建议程序员通过创建一个专门的切面来管理所有其他切面的排序，从而以集中方式使用 AspectJ 和 JBoss\
  \ 的优先级特性。不幸的是，Spring 的排序特性不允许任何集中式的排序声明。\n\n**切面复用**\n\n就像程序员可以在不同应用程序中复用类库一样，他们也可以编写切面库。请记住，在编写切面时，通知代码定义了切面的行为，而切入点则定义了切面必须在应用程序中集成的位置。因此，切入点高度依赖于应用程序，很少能被复用，所以复用切面的问题本质上就是复用切面代码的问题。\n\
  \n使用 AspectJ 时，继承和抽象切入点允许复用切面。与抽象方法类似，抽象切入点是一个使用名称和签名声明但没有表达式的切入点。抽象切入点可以像任何其他切入点一样用于定义通知代码。\n\
  \n**146**\n\n第 7 章 ■ AOP 工具比较\n\n与类一样，继承机制允许扩展切面，复用超切面的现有定义，在子切面中定义新的通知代码，并使抽象切入点具体化。使用\
  \ AspectJ 时，一个切面可以扩展一个抽象切面，但不能扩展一个具体切面。因此，复用切面就是编写带有通知代码和抽象切入点的抽象切面，然后通过使切入点具体化来扩展它们，从而使切面适应给定的应用程序。\n\
  \n使用 JAC 时，切面的编写被分离到两个常规的 Java 类中：一个用于包装器，一个用于切面组件。此外，配置机制允许在所谓的配置文件中定义依赖于应用程序的参数，例如切入点表达式和系统属性。大多数情况下，使用\
  \ JAC 复用切面只需编写一个新的配置文件，以使切面组件和包装器类适应新的应用程序。\n\nJBoss AOP 将拦截器和切入点的编写分离开来。前者是常规的\
  \ Java 类，而后者是 XML 文件。因此，拦截器很容易复用，而切入点必须适应每个新的应用程序。\n\n最后，Spring AOP 依赖其 bean 配置机制来为不同上下文配置切面。\n\
  \n当我们审视这些工具的切面复用时，可以看到语言方法使用了语言级别的概念（如继承），而框架方法则使用了配置。两者各有优缺点。例如，继承方法不如配置灵活，但它能确保切面与继承的切面之间具有更好的兼容性。在我们看来，这两种方法的结合代表了切面复用的一个完整解决方案。\n\
  \n**总结**\n\n在本章中，我们比较了本书中介绍的四种 AOP 工具：AspectJ、JAC、JBoss AOP 和 Spring AOP。我们概述了这些工具之间的一些次要差异，并解释了主要差异源于语言方法（AspectJ）和框架方法（JAC、JBoss\
  \ AOP 和 Spring AOP）在实现上的不同。\n\n\n正如我们在本章中所见，语言方法支持静态类型检查和更多编译时检查，从而提高了程序质量（例如，参见“连接点类型”一节）。语言方法也更高效，因为编译器可以优化静态绑定的织入代码，并在不需要时避免运行时反射或动态代理。\n\
  \n另一方面，框架方法使用运行时反射和连接点内省。这些技术使得框架效率较低，但比语言方法更灵活。使用框架方法，可以在应用程序运行时动态调整它。此外，框架方法使用现有语言或工具，如\
  \ Java、XML 或 Ant，这使得这些工具更容易集成到标准开发环境中。最后这一点至关重要，因为它解释了框架方法成功的原因，而语言方法中实际上只有一种被广泛使用：AspectJ。\n\
  \nAspectJ 的成功是 AspectJ 创建者将工具集成到 Eclipse 等 IDE 中的重大工作的成果。一旦 AspectJ 被良好集成，使用 AOP\
  \ 就比专用语言更简单，因为 IDE 可以提供上下文帮助、代码补全和设计错误检测等支持，而这些支持在框架方法中有时会因类型检查较少而变得繁琐。\n\n第 7 章\
  \ ■ AOP 工具比较\n\n**147**\n\n尽管语言方法和框架方法有时相互竞争，但我们认为它们应被视为互补的，因为它们具有截然不同的特性。AspectJ\
  \ 5 所做的工作旨在整合 AspectJ 语言和 AspectWerkz 框架，这是朝着正确方向迈出的一步。然而，要创建一个能够干净地整合框架灵活性和语言类型检查能力的理想工具，仍有许多工作要做。\n\
  \n第 8 章\n\n■ ■ ■\n\n设计模式与 AOP\n\n**设**计模式为反复出现的设计问题提供了通用解决方案。大多数使用面向对象编程的开发者都熟悉它们的用法。模式并非特定于某种语言；事实上，它们解决的大多数问题甚至并非特定于某种编程范式。因此，许多通常通过面向对象编程解决的设计问题都可以使用\
  \ AOP 来解决。\n\n核心设计模式于 1995 年随着 Addison-Wesley 出版 Erich Gamma、Richard Helm、Ralph\
  \ Johnson 和 John Vlissides（通常被称为“四人帮”或 GoF）所著的《可复用面向对象软件的基础》而流行起来。尽管此后又定义了许多其他设计模式，但大多数都基于这一著作。\n\
  \n本章旨在用面向切面的方法重新定义选定的设计模式。\n\n我们将这些重新定义的模式与其面向对象的定义进行比较，以突出 AOP 的优势。\n\n本章的第一节将快速介绍这些可复用模型。然后，我们将介绍并讨论那些通过\
  \ AOP 实现能带来最显著模块化改进的设计模式。\n\n**设计模式，或可复用软件的基础**\n\n设计模式是实现可复用性的一种方法，而可复用性是面向对象编程的关键概念之一。\n\
  \n模式的概念并非编程领域独有；事实上，这一概念源于建筑和城市规划中使用的类似概念，由建筑师克里斯托弗·亚历山大正式提出。沃德·坎宁安和肯·贝克在 1987 年于佛罗里达州奥兰多举行的一次会议上发表的论文《将模式语言用于面向对象程序》中，将这些思想改编用于面向对象编程。\n\
  \n如前所述，设计模式为特定上下文中的反复出现的问题提供了通用解决方案。使用设计模式的上下文很重要，因为同一个问题可能因上下文不同而有不同的解决方案。一个高质量的设计模式必须是具体且经过充分测试的解决方案的抽象。\n\
  \n一个设计模式若要被有效使用，必须有良好的文档记录。目前有多个设计模式目录可用，其中 GoF 的书最为著名。每个目录都分为若干部分，包含对设计模式的描述。\n\
  \n**149**\n\n**150**\n\n第 8 章 ■ 设计模式与 AOP\n\n有了这些文档，几乎任何人都可以使用这些设计模式，并让最佳实践在应用程序开发中轻松应用；然而，要正确使用设计模式，仍然需要理解其可能的应用场景。\n\
  \n**使用 AOP 实现设计模式**\n\n目前，关于使用 AOP 实现设计模式的研究正在大量进行。这是因为许多设计模式具有横切性，因此在面向对象范式中难以确保这些模式具有足够的模块性。\n\
  \n在 2002 年 OOPSLA 会议上，Jan Hannemann 和 Gregor Kiczales¹ 的一篇文章讨论了这一领域的先驱性研究。这项工作强调，使用\
  \ AOP 实现某些设计模式可以带来以下优势：\n\n• *局部性*：功能代码包含在切面内部，而不是分散在类中，从而提高了模块化程度。\n• *可复用性*：将代码重构为切面可以实现更高程度的抽象和更好的可复用性。\n\
  • *组合透明性*：一个对象可以应用多个模式，而不会使全局实现变得混乱。\n• *（取消）可插拔性*：应用程序的整体结构较少依赖于所实现的设计模式。使用 AOP，只需更改一个参数，就可以激活或停用一个设计模式，例如，在使一个类成为单例时。\n\
  \n然而，这四种优势并非对所有设计模式都明显。有些模式表现出全部四种优势，有些则完全没有。在 23 种 GoF 设计模式中，有 17 种在使用 AOP 实现时表现出改进；其中\
  \ 12 种在所有四个方面都受益。\n\n接下来的几节将 AOP 技术应用于 GoF 设计模式中的一部分示例。\n\n**单例设计模式**\n\n我们使用面向切面编程技术研究的第一个设计模式是单例模式。我们首先简要描述该模式，然后给出该模式的两种实现，一种使用\
  \ JBoss AOP，另一种使用 AspectJ。最后，我们对该节进行实现评估。\n\n**描述**\n\n单例设计模式可以描述如下：\n\n• *问题及其上下文*：某些类在程序执行期间应只有一个实例。这可能是出于两个原因：要么该类建模了一个唯一对象，例如应用程序的一组全局变量，拥有两个实例可能导致运行时错误；要么因为一个实例足以提供所有所需服务，通过确保不创建多个实例，可以节省内存和资源。\n\
  \n1. Jan Hannemann 和 Gregor Kiczales。“Design Pattern Implementation in Java and\
  \ AspectJ。”第 17 届面向对象编程：系统、语言与应用会议论文集（OOPSLA'02），ACM SIGPLAN Notices，37(11)：161–173，2002\
  \ 年 11 月。\n\n第 8 章 ■ 设计模式与 AOP\n\n**151**\n\n\n\n• *问题的解决方案*：该类必须拥有一个静态属性（通常命名为`instance`），用于存储对唯一实例的引用；同时还需提供一个方法（通常命名为`getInstance`），该方法返回`instance`的值。若`instance`为空，`getInstance`会创建该类的一个新实例，将其引用存入`instance`属性，然后返回给调用者。\n\
  \n清单 8-1 展示了使用 Java 实现单例模式的一种方式。\n\n**清单 8-1.** *使用 Java 实现单例设计模式* public class\
  \ MySingleton {\n\nprivate static MySingleton instance = null;\n\npublic static\
  \ MySingleton getInstance() {\n\nif (instance==null) {\n\ninstance = new MySingleton();\n\
  \n}\n\nreturn instance;\n\n}\n\n}\n\n由于`getInstance`方法的存在，任何使用`MySingleton`的类都能确保使用的是该类的同一个实例。其不便之处在于，其他类无法直接使用`new`操作符来实例化`MySingleton`。因此，对于使用`MySingleton`的类而言，单例设计模式的使用并不透明，因为这些类必须调用`getInstance`而非通常的构造函数。\n\
  \n设计模式在应用程序中相对于其他类的“透明性”问题，并不仅限于单例设计模式。通常，在应用程序中使用某种设计模式，会对其交互的类产生重要影响。\n\n因此，设计模式可能对应用程序的结构产生巨大影响，甚至可能损害原有的对象模型。\n\
  \n虽然仅通过阅读代码就能轻易识别单例模式，但其他设计模式（如命令设计模式）则更难识别。尽管设计模式在结构化代码方面具有可复用性，但其实现通常包含特定于具体上下文的元素，因此代码本身的可复用性较低。\n\
  \n**使用 JBoss AOP 首次实现单例切面**\n\n本节将展示单例设计模式的两种实现方式：一种使用 JBoss AOP，另一种使用 AspectJ。\n\
  \n正如前例所见，阻碍更好模块化的主要问题在于，类必须调用`getInstance`方法而非通常的构造函数。\n\nJBoss AOP 和 AspectJ 允许你通过定义一个切面来简单有效地解决该问题，该切面用于修改构造函数的行为——构造函数由`new`操作符调用，用于创建类的新实例。当构造函数被调用时，切面会拦截它，并用管理单例所需的代码替换`new`方法。\n\
  \n使用 JBoss AOP，我们可以定义清单 8-2 中所示的拦截器。\n\n**清单 8-2.** *使用 JBoss AOP 实现单例设计模式*\n\n\
  package aop.patterns.singleton;\n\nimport org.jboss.aop.advice.Interceptor;\n\n\
  import org.jboss.aop.joinpoint.Invocation;\n\npublic class SingletonInterceptor\
  \ implements Interceptor {\n\nprivate Object singleton;\n\npublic String getName()\
  \ {\n\nreturn \"SingletonInterceptor\";\n\n}\n\npublic Object invoke(Invocation\
  \ invocation) throws Throwable {\n\nif (singleton==null) {\n\nsingleton = invocation.invokeNext();\n\
  \n}\n\nreturn singleton;\n\n}\n\n}\n\n该拦截器的代码与面向对象的单例实现类似：它包含一个用于存储单例唯一实例的属性，以及一个`invoke`方法——当构造函数被调用时，该方法使用相同的条件判断来检查实例是否存在。若实例不存在，`invoke`会调用构造函数，并将生成的实例存储在`singleton`属性中。\n\
  \n请注意，拦截器包含了处理单例的代码，并且可以以对应用程序其余部分完全透明的方式应用于某个类。\n\n为了示例的需要，我们使用一个名为`Stats`的类，该类包含电子商务网站的各种统计数据（见清单\
  \ 8-3）。\n\n\n\n**清单 8-3.** *用于测试单例设计模式的示例类*  \npackage aop.patterns.singleton;\n\
  \npublic class Stats {\n\nprivate int orders = 0;\n\nprivate float totalAmount =\
  \ 0;\n\nprivate String status = \"OK\";\n\npublic int getOrders() {\n\nreturn orders;\n\
  \n}\n\n第 8 章 ■ 设计模式与 AOP\n\n**153**\n\npublic void incOrders() {\n\norders++;\n\n\
  }\n\npublic float getTotalAmount() {\n\nreturn totalAmount;\n\n}\n\npublic void\
  \ addAmount(float p) {\n\ntotalAmount+=p;\n\n}\n\npublic String getStatus() {\n\n\
  return status;\n\n}\n\npublic void setStatus(String p) {\n\nstatus = p;\n\n}\n\n\
  public void reset() {\n\norders = 0;\n\ntotalAmount = 0;\n\nstatus = \"OK\";\n\n\
  }\n\n}\n\n我们将通过参数化 `jboss-aop.xml` 文件的方式，将单例设计模式应用于此类，具体如清单 8-4 所示。\n\n**清单 8-4.**\
  \ *将单例设计模式绑定到 Stats 类*\n\n<bind pointcut=\"execution(aop.patterns.singleton.Stats->new())\"\
  >\n\n<interceptor class=\"aop.patterns.singleton.SingletonInterceptor\">\n\n</bind>\n\
  \n通过使用清单 8-5 中的类，可以轻松检查设计模式是否已正确应用。\n\n**清单 8-5.** *使用 JBoss AOP 测试单例设计模式的主类*\n\n\
  package aop.patterns.singleton;\n\npublic class SingletonExample {\n\npublic static\
  \ void main(String[] args) {\n\nStats stats1 = new Stats();\n\nStats stats2 = new\
  \ Stats();\n\nif (stats1==stats2) {\n\n**154**\n\n第 8 章 ■ 设计模式与 AOP\n\nSystem.out.println(\"\
  这些实例是相同的！\");\n\n} else {\n\nSystem.out.println(\"这些实例不相同！\");\n\n}\n\n}\n\n}\n\n\
  我们不再需要 `getInstance` 方法，因为单例是通过对构造函数的标准调用来访问的。单例设计模式现在对应用程序而言完全透明。\n\n运行此程序得到的结果如下：这些实例是相同的！\n\
  \n我们已成功将单例设计模式应用于 `Stats` 类，而无需修改 `Stats` 的代码或任何使用它的类。\n\n**使用 AspectJ 实现单例切面的第二种方法**\n\
  \n使用 AspectJ 可以获得相同的结果。我们首先定义一个抽象切面，该切面独立于确定要转换为单例的类的切入点（参见清单 8-6）。\n\n**清单 8-6.**\
  \ *使用 AspectJ 实现单例设计模式*\n\npackage aop.patterns.singleton;\n\npublic abstract aspect\
  \ AbstractSingletonAspect {\n\nprivate Object singleton = null;\n\nabstract pointcut\
  \ singletonPointcut();\n\nObject around(): singletonPointcut() {\n\nif (singleton\
  \ == null) {\n\nsingleton = proceed();\n\n}\n\nreturn singleton;\n\n}\n\n}\n\n该抽象切面定义了两个元素：一个抽象切入点（必须由具体切面以及\
  \ `AbstractSingletonAspect` 的子类定义）；以及一个“环绕”通知，类似于 JBoss AOP 拦截器中的 `invoke` 方法。\n\
  \n此实现存在一个流程问题。在 AspectJ 中，切面默认是单例的，这意味着所有由 `singletonPointcut` 切入点指定的类共享该切面的一个实例。因此，该切面包含对单例类唯一实例的引用。每次执行通知时，现有的单例都会被新创建的类之一覆盖。\n\
  \n此处不能使用 AspectJ 的关键字 `perthis` 和 `pertarget`，因为它们会为类的每个实例生成一个切面实例，这与期望的效果相反。\n\n\
  此问题可以通过以下方式解决：\n\n*   定义一个抽象切面作为多个具体切面的父切面：每个要转换为单例的类对应一个具体切面。这样，各个类就不会干扰其他单例。这是我们在前面示例中选择实现的解决方案。\n\
  *   使用哈希表（`java.util.Hashtable`）为每个被转换的类存储单例。我们在下一节中给出了此解决方案的示例。\n\n\n\n现在我们可以为每个需要实现单例模式的类定义具体切面。如果要将\
  \ Stats 类转换为单例，就像之前用 JBoss AOP 所做的那样，我们必须编写清单 8-7 所示的切面。\n\n**清单 8-7.** *将单例设计模式绑定到\
  \ Stats 类的具体 AspectJ 切面*  \npackage aop.patterns.singleton;\n\npublic aspect SingletonAspect\
  \ extends AbstractSingletonAspect {\n\npointcut singletonPointcut() : call(Stats.new(..));\n\
  \n}\n\n编译应用程序后，我们执行之前展示的测试类，得到以下结果：\n\n这些实例是相同的！\n\n我们得到了与 JBoss AOP 实现相同的结果：Stats\
  \ 类已被转换为单例。\n\n**实现评估**\n\n遗憾的是，这种单例设计模式的实现能力有限，并可能导致执行错误。\n\n第一个问题是多构造函数问题。在示例中，只存储了一个实例引用，因此无论使用哪个构造函数，我们始终返回类的同一个实例。\n\
  \n另一个问题是，这种实现具有侵入性，可能对应用程序的行为方式产生破坏性副作用，稍后将对此进行描述。\n\n**156**\n\n第 8 章 ■ 设计模式与 AOP\n\
  \n管理多个构造函数\n\n在另一种情况下，我们可以将单例切面用于包含多个构造函数的类。虽然多构造函数类不太适合单例设计模式（因为该模式设计为仅与一个构造函数配合使用），但在实际应用中多构造函数类经常被使用，因此我们可以扩展该模式来处理这种情况。\n\
  \n使用不同的构造函数，我们期望创建不同的实例（而我们当前的实现并非如此）。然而，这一困难并非无法克服。可以为每个构造函数存储一个实例。此外，我们不仅可以基于构造函数签名，还可以基于参数值来存储实例。\n\
  \n使用 AspectJ，我们为抽象切面获得了清单 8-8 所示的结果。\n\n**清单 8-8.** *使用 AspectJ 的单例设计模式第二种实现*\n\n\
  package aop.patterns.singleton;\n\nimport java.util.Hashtable;\n\npublic abstract\
  \ aspect AbstractMultipleSingletonAspect {\n\nprivate Hashtable singletons = new\
  \ Hashtable();\n\nabstract pointcut singletonPointcut();\n\nprivate String getValue(Object\
  \ o) {\n\nif (!o.getClass().isArray()) {\n\nreturn Integer.toString(o.hashCode());\n\
  \n} else {\n\nStringBuffer value = new StringBuffer();\n\nObject[] temp = (Object[])\
  \ o;\n\nfor (int i=0;i<temp.length;i++) {\n\nvalue.append(getValue(temp[i]));\n\n\
  value.append('|');\n\n}\n\nreturn value.toString();\n\n}\n\n}\n\nObject around():\
  \ singletonPointcut() {\n\nString arguments;\n\nString signature = thisJoinPoint.getSignature().toString();\
  \ if(thisJoinPoint.getArgs().length>0) {\n\narguments = getValue(thisJoinPoint.getArgs());\n\
  \n} else {\n\narguments = \"\";\n\n}\n\n**157**\n\n第 8 章 ■ 设计模式与 AOP\n\nObject singleton\
  \ = singletons.get(signature+arguments);\n\nif (singleton == null) {\n\nsingleton\
  \ = proceed();\n\nsingletons.put(signature+arguments,singleton);\n\n}\n\nreturn\
  \ singleton;\n\n}\n\n}\n\n这种抽象切面的新实现比之前的示例更复杂，因为我们使用了哈希表来存储单例实例。哈希表中使用的键根据构造函数的签名和参数值确定。该值通过\
  \ getValue 方法获得（此方法在第 9 章“非回归测试”一节中解释）。\n\n现在，为了支持多个构造函数，我们必须通过继承抽象切面 AbstractMultipleSingletonAspect\
  \ 来创建 SingletonAspect 切面。使用哈希表也可以解决之前提到的问题，而具体切面不能被多个切面化类共享。\n\n切面的侵入性\n\n\n\n通过将某个切面应用于一个类，就能将其转变为单例，这乍看之下既简单又实用。然而，这种对\
  \ Java `new` 运算符的侵入式修改远非无害。\n\n首先，将一个类转变为单例会对后续开发产生影响。\n\n在面向对象方法中使用 `getInstance`\
  \ 方法的优势在于，我们能立即知道该类是单例。而采用 AOP 实现单例时，任何类都可能是单例，因为要实现这种转变，我们只需修改切点定义。对于最终程序员而言，不清楚一个类是否为单例可能会导致编程错误。\n\
  \n其次，在将现有类转变为单例时，务必采取预防措施。如果该单例被多个对象调用，我们必须确保对该类共享实例的多次调用不会导致错误。实现单例时的一个经典错误是，每次有新对象调用它时，单例的属性都会被覆盖，从而导致不一致。这些属性必须被视为全局共享变量。\n\
  \n最后，这种切面使得切面组合变得困难，而切面组合是 AOP 的一项重要功能。例如，我们无法将单例切面与另一个也替换构造函数返回实例的切面组合。这可能会带来实际问题，比如在使用工厂模式切面将对象的本地实例替换为远程代理提供的实例时。\n\
  \n**观察者设计模式**\n\n我们针对面向切面编程技术研究的第二个设计模式是观察者模式。我们首先简要描述该模式，然后使用 AspectJ 给出其实现，最后对该实现进行评估。\n\
  \n**158**\n\n第 8 章 ■ 设计模式与 AOP\n\n**描述**\n\n在许多情况下，程序员需要了解对象的状态变化，或关注对象产生的事件。例如，当文件被修改时，文本编辑器必须激活保存功能。其他例子可以在构建图形用户界面的框架中找到。例如，Swing\
  \ 严重依赖于一种称为*监听器*的机制；监听器是消费其他对象发出的事件并对此类事件做出反应的对象。\n\n观察者设计模式包括在被称为主题的其他对象状态发生变化时通知观察者对象。\n\
  \n因此，纯粹的面向对象、无切面的观察者设计模式实现通常依赖于两个接口：Observer 和 Subject。所有被观察的类都实现 Subject 接口，该接口提供注册和移除观察者的方法。观察者实现\
  \ Observer 接口，该接口提供通知状态变化的方法。\n\n**面向切面实现**\n\n在本节中，我们提出一种观察者设计模式的面向切面实现。\n\n在我们的解决方案中，观察者的管理和状态变化的检测由切面处理。首先，定义一个\
  \ AspectJ 抽象切面来实现代码的通用部分。该切面可被所有观察者重用。其次，扩展该切面以考虑实际观察者的需求。\n\n实现的通用部分\n\n抽象切面的代码如清单\
  \ 8-9 所示。\n\n**清单 8-9.** *使用 AspectJ 实现观察者设计模式*\n\n1 package aop.patterns.observer;\n\
  \n3 import java.util.Enumeration;\n\n4 import java.util.Vector;\n\n6 public abstract\
  \ aspect AbstractObserverAspect pertarget (subject()) {\n\n8 private Vector observers\
  \ = new Vector();\n\n10 public void addObserver(Object o) {\n\n11 observers.add(o);\n\
  \n12 }\n\n14 public void removeObserver(Object o) {\n\n15 observers.remove(o);\n\
  \n16 }\n\n18 protected abstract pointcut subject();\n\n\n\n第 8 章 ■ 设计模式与 AOP\n\n\
  **159**\n\n20 protected abstract pointcut event();\n\n22 protected abstract void\
  \ notifyEvent(Object subject,Object observer); 23\n\n24 after(Object s) : event()\
  \ && target(s) {\n\n25 Enumeration elements = observers.elements();\n\n26 while\
  \ (elements.hasMoreElements()) {\n\n27 Object o = elements.nextElement();\n\n28\
  \ notifyEvent(s,o);\n\n29 }\n\n30 }\n\n31 }\n\n`AbstractObserverAspect`切面提供了两个方法：`addObserver`和`removeObserver`，用于注册和移除观察者。\n\
  \n在`notifyEvent`方法（第 22 行）中，切点`subject`（第 18 行）和`event`（第 20 行）是特定于被观察主体的代码元素。它们被声明为抽象方法，将在子切面中定义。`notifyEvent`方法将实现对状态变化的响应。\n\
  \n`event`切点将定义被观察事件的状态变化。`subject`切点将定义被观察的主体。\n\n需要注意的一个重要点是，`AbstractObserverAspect`切面并非单例（第\
  \ 6 行的`pertarget`子句）。每个被观察的主体都存在该切面的一个实例。\n\n第 24 行定义的增强代码会在状态变化发生时通知所有已注册的观察者。\n\
  \n观察者的实现\n\n借助之前定义的`Stats`类，本节将演示如何定义一个观察者来监控订单的添加和移除操作。\n\n该观察者的代码如清单 8-10 所示。\n\
  \n**清单 8-10.** *将观察者设计模式绑定到 Stats 类的具体 AspectJ 切面* 1 package aop.patterns.observer;\n\
  \n3 public aspect OrdersObserverAspect extends AbstractObserverAspect {\n\n5 protected\
  \ pointcut subject() : initialization(Stats.new(..)); 6\n\n7 protected pointcut\
  \ event() : set(int Stats.orders);\n\n9 protected void notifyEvent(Object s,Object\
  \ o) {\n\n10 Stats statistics = (Stats)s;\n\n11 OrdersObserver observer = (OrdersObserver)o;\n\
  \n12 observer.eventHandler(statistics.getOrders());\n\n13 }\n\n14 }\n\n**160**\n\
  \n第 8 章 ■ 设计模式与 AOP\n\n16 public class OrdersObserver {\n\n17 public void eventHandler(int\
  \ value) {\n\n18 System.out.println(\"Orders observer called with value: \"+value);\
  \ 19 }\n\n20 }\n\n`OrdersObserver`类实现了观察者，而`OrdersObserverAspect`切面则定义了事件和被观察的主体。\n\
  \n`event`切点（第 7 行）定义了被观察的事件：在本例中，该切点匹配对`Stats.order`字段执行的所有写操作。因此，被观察的事件就是订单的添加或移除操作。\n\
  \n当此类事件发生时，在抽象`AbstractObserverAspect`切面中定义的增强代码会调用`notifyEvent`方法。在此，该方法（第 9 行）会获取订单数量，并将该数量转发给观察者。\n\
  \n观察者（第 16 行）会显示订单总数。\n\n要测试此观察者，请使用清单 8-11 所示的类。\n\n**清单 8-11.** *用于测试单例设计模式的主类*\
  \ package aop.patterns.observer;\n\npublic class ObserverExample {\n\npublic static\
  \ void main(String[] args) {\n\nStats stats = new Stats();\n\nOrdersObserver observer1\
  \ = new OrdersObserver();\n\nOrdersObserverAspect.aspectOf(stats).addObserver(observer1);\
  \ stats.incOrders();\n\nstats.addAmount(10);\n\nstats.incOrders();\n\nstats.addAmount(10);\n\
  \nOrdersObserverAspect.aspectOf(stats).removeObserver(observer1); stats.incOrders();\n\
  \nstats.addAmount(10);\n\n}\n\n}\n\n该程序显示以下结果：\n\nOrders observer called with value:\
  \ 1\n\nOrders observer called with value: 2\n\n第 8 章 ■ 设计模式与 AOP\n\n**161**\n\n\
  **实现评估**\n\n根据 Hannemann 和 Kiczales 定义的四个标准，我们可以如下评估我们的实现：\n\n• **局部性**：主体不包含任何管理观察者的代码。该代码位于`AbstractObserverAspect`抽象切面中。特定于主体的代码元素由扩展`AbstractObserverAspect`的具体切面处理。\n\
  \n• **可重用性**：观察者的管理被系统地重用。\n\n\n\n•   *组合透明性*：该方面不具有侵入性。被观察对象的行为得到了扩展，但未被修改。\n•\
  \   *（可）插拔性*：被观察对象与其观察者之间的联系是松散的。事件和对象上的切入点精确定义了设计模式必须集成的位置。\n\n**命令设计模式**\n\n我们针对面向方面编程技术研究的第三种设计模式是命令模式。我们首先对该模式进行简要描述，然后给出使用\
  \ AspectJ 实现该模式的方案。最后，我们将对该实现进行评估，以此作为本节的结论。\n\n**描述**\n\n通过类，面向对象方法为模块化处理可应用于数据的操作提供了一种良好方式。这些操作在方法中定义。一个类的所有实例共享相同的操作。此外，这些操作是不可变的：只要实例存在，它们就永远不会改变。由于这种不变性，方法的概念是一种安全但僵化的定义操作的方式。\n\
  \n命令设计模式提供了一种独立于操作将被应用的类来定义操作的方式。可以定义多个不同的命令，并根据需要将它们分配给任意数量的类。\n\n**面向方面的实现**\n\
  \n本节定义了命令设计模式的面向方面实现。与观察者设计模式一样，我们定义了一个抽象方面，它提供了实现的通用部分。然后扩展该方面，使其专门用于实际的命令。\n\n\
  实现的通用部分\n\n所有命令共享的代码在 `AbstractCommandAspect` 方面中定义。\n\n清单 8-12 展示了该方面的代码。\n\n**162**\n\
  \n第 8 章 ■ 设计模式与 AOP\n\n**清单 8-12.** *使用 AspectJ 实现命令设计模式*\n\n```java\n1 package\
  \ aop.patterns.command;\n\n3 public abstract aspect AbstractCommandAspect pertarget(receiver()){\n\
  \n5 private Command command = null;\n6 public void setCommand(Command c) {\n7  \
  \   command = c;\n8 }\n\n10 protected abstract pointcut receiver();\n\n12 protected\
  \ abstract pointcut execute();\n\n14 before(Object receiver) : execute() && target(receiver)\
  \ {\n15     command.execute(receiver);\n16 }\n17 }\n```\n\n上述方面实现了 `setCommand`\
  \ 方法，该方法用于设置要执行的命令。命令实现了 `Command` 接口，该接口定义了一个单一的 `execute` 方法。该方法接收一个对象（一个 `Receiver`\
  \ 的实例）作为参数，该对象是命令的接收者。\n\n这两种类型的代码出现在清单 8-13 中。\n\n**清单 8-13.** *与命令设计模式一起使用的接口*\n\
  ```java\npublic interface Command {\n    public void execute(Receiver receiver);\n\
  }\n\npublic interface Receiver {\n    public void setCommand(Command command);\n\
  }\n```\n\n在 `AbstractCommandAspect` 方面中定义了两个抽象切入点：`receiver` 和 `execute`。`receiver`\
  \ 切入点指定了运行命令的类。`execute` 切入点指定了触发命令执行的事件。请注意，每个接收者只存在一个 `AbstractCommandAspect`\
  \ 方面的实例：命令不被接收者共享，每个不同的接收者处理自己的命令。\n\n最后，定义了一个“前置”通知（第 14 行）来启动命令的执行。该通知代码在 `execute`\
  \ 切入点包含的连接点之前执行；换句话说，在将被指定为触发器的事件之前执行。请注意，此切入点使用连接点的目标对象进行参数化，即要执行命令的对象。\n\n第 8\
  \ 章 ■ 设计模式与 AOP\n\n**163**\n\n命令的实现\n\n现在可以定义一个具体方面，将命令模式集成到 `Stats` 类中（见清单 8-14）。\n\
  \n**清单 8-14.** *将命令设计模式绑定到 Stats 类的具体 AspectJ 方面*\n```java\n1 package aop.patterns.command;\n\
  ```\n\n\n\n2 public aspect CommandAspect extends AbstractCommandAspect {\n\n3 public\
  \ void Stats.save() {}\n\n4 protected pointcut receiver() : initialization(Stats.new(..));\
  \ 5 protected pointcut execute() : call(void Stats.save()); 6 }\n\n该切面将 `Stats`\
  \ 类的实例指定为模式的接收者（第 4 行）。\n\n在 `Stats` 类中引入了一个名为 `save` 的空方法。对该方法的调用操作被包含在 `execute`\
  \ 切入点中（第 5 行）。根据 `AbstractCommandAspect` 中“before”通知的定义，命令将在调用 `save` 方法之前执行。\n\n\
  现在可以定义多个新命令并与 `Stats` 类关联。清单 8-15 中所示的 `FileSaver` 类提供了此类命令的一个示例。\n\n**清单 8-15.**\
  \ *FileSaver 命令*\n\npackage aop.patterns.command;\n\nimport java.io.FileOutputStream;\n\
  \nimport java.io.PrintWriter;\n\npublic class FileSaver implements Command {\n\n\
  private String fileName;\n\npublic FileSaver(String fileName) {\n\nthis.fileName\
  \ = fileName;\n\n}\n\npublic void execute(Receiver receiver) {\n\nStats stats =\
  \ (Stats)receiver;\n\ntry {\n\nFileOutputStream output = new FileOutputStream(fileName);\
  \ PrintWriter writer = new PrintWriter(output);\n\nwriter.println(\"STATISTICS\"\
  );\n\nwriter.println(\"Number of orders: \"+stats.getOrders()); writer.println(\"\
  Total amount: \" +stats.getTotalAmount()); writer.println(\"Status: \"+stats.getStatus());\n\
  \nwriter.flush();\n\nwriter.close();\n\n}\n\n**164**\n\n第 8 章 ■ 设计模式与 AOP\n\ncatch\
  \ (Exception e) {\n\nSystem.err.println(e);\n\n}\n\n}\n\n}\n\n清单 8-16 中的 `CommandExample`\
  \ 类提供了一种使用 `FileSaver` 命令测试命令设计模式面向方面实现的方法。\n\n**清单 8-16.** *用于测试命令设计模式的主类* package\
  \ aop.patterns.command;\n\npublic class CommandExample {\n\npublic static void main(String[]\
  \ args) {\n\nStats stats = new Stats();\n\nCommandAspect.aspectOf(stats)\n\n.setCommand(new\
  \ FileSaver(\"c://temp/statistics.txt\")); stats.incOrders();\n\nstats.addAmount(10);\n\
  \nstats.incOrders();\n\nstats.addAmount(10);\n\nstats.incOrders();\n\nstats.addAmount(10);\n\
  \nstats.save();\n\n}\n\n}\n\n运行时，该程序会生成一个包含以下数据的文本文件： STATISTICS\n\nNumber of orders:\
  \ 3\n\nTotal amount: 30.0\n\nStatus: OK\n\n**实现评估**\n\n根据 Hannemann 和 Kiczales 定义的四个标准，我们可以如下评估我们的实现。\n\
  \n• *局部性*：接收命令的类不包含任何管理这些命令的代码。这些代码位于 `AbstractCommandAspect` 抽象切面中。对命令的调用由扩展 `AbstractCommandAspect`\
  \ 的具体切面处理。\n\n• *可重用性*：命令的管理被系统地重用。\n\n第 8 章 ■ 设计模式与 AOP\n\n**165**\n\n• *组合透明性*：该切面不具有侵入性。接收命令的类的行为被扩展，但未被修改。\n\
  \n• *(可)插拔性*：命令与命令接收者之间的关联是松散的。用于接收者和执行的切入点精确定义了设计模式必须集成的位置。\n\n**责任链设计模式**\n\n\
  我们针对面向方面编程技术研究的第四个设计模式是责任链模式。我们首先简要描述该模式，然后使用 AspectJ 给出该模式的实现。最后，我们对该实现进行评估。\n\n\
  **描述**\n\n上一节中介绍的命令设计模式允许定义由对象执行的命令。责任链设计模式或多或少是该原则的扩展，允许你将多个命令分组到一个链中。当执行该链时，会访问链中的每个元素。被访问时，元素要么执行一个命令，要么什么都不做。\n\
  \n\n\n纯面向对象、无切面的责任链设计模式实现通常依赖于一个 Handler 接口。链中的每个命令都必须实现此接口，该接口通常提供两个方法：`setSuccessor`\
  \ 用于设置链中当前命令的后继者，以及 `handle` 用于执行命令。根据程序员选择的条件，`handle` 方法可以执行命令并将调用委托给链中的下一个元素；也可以仅执行命令或仅委托调用。\n\
  \n**面向切面的实现**\n\n我们为责任链设计模式提出的实现利用了切面优先级的概念。在之前介绍的设计模式中，定义了一个抽象切面来实现链中所有命令共享的代码。然后，每个具体命令都会扩展这个抽象切面。切面优先级是用于对链中这些命令的执行顺序进行排序的概念。\n\
  \n实现的通用部分\n\n我们责任链设计模式实现的通用部分定义在 `AbstractChainAspect` 抽象切面中，如清单 8-17 所示。\n\n**清单\
  \ 8-17.** *使用 AspectJ 实现责任链设计模式*\n\n1 package aop.patterns.chainOfResponsibility;\n\
