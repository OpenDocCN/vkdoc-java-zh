  因此，前端控制器代码与应用程序无关。应用程序的特定路径在切面中定义。HTTP 请求被封装在 `aop.j2ee.client.web.protocol` 包中应用程序级别的请求（`RequestContextFactory`\
  \ 和 `RequestContext`）中。\n\n**应用程序控制器**\n\n*应用程序控制器*设计模式集中了应用程序特定视图和命令的控制与调用。与前端控制器类似，典型的设计意味着基类实现了控制器的共性。此外，在分解通用功能时，使用切面可能比继承更高效。\n\
