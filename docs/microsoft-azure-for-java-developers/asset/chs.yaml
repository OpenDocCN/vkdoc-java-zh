  \n图 10-5\n\n创建用户\n\n提供用户的用户名、密码详情以及其他必要信息，如图 10-6 所示。\n\n![](img/523943_1_En_10_Fig6_HTML.jpg)\n\
  \n新建用户窗口的图示，在“标识”下有数据输入栏，用于输入用户名、名称、名字和姓氏。此处，用户名为 mailer@abhisekmisra.onmicrosoft.com，名称为\
  \ mailer。密码下有数据输入栏用于创建初始密码，左下角有创建选项卡。\n\n图 10-6\n\n提供用户详细信息\n\n确保为您创建的用户提供使用位置。点击\
  \ *创建*，如图 10-7 所示。用户将被创建。\n\n![](img/523943_1_En_10_Fig7_HTML.jpg)\n\n新建用户窗口的图示，在“设置”下有用于阻止登录和使用位置的选项卡。使用位置选项卡显示“印度”并被高亮。设置下方是作业信息，包含职务、部门和公司名称选项卡。经理显示未选择经理，左下角的创建选项被高亮。\n\
  \n图 10-7\n\n提供使用位置\n\n用户创建完成后，点击该用户，此操作将导航至用户详细信息部分，我们可以在其中分配许可证。图 10-8 演示了此操作。\n\
  \n![](img/523943_1_En_10_Fig8_HTML.jpg)\n\nMicrosoft Azure 窗口，包含用户界面，其下有如下选项：所有用户、已删除用户、密码重置、用户设置、诊断并解决问题。活动包括登录、审核和批量操作结果。右侧有\
  \ 2 个用户：Abhishek Mishra 和 mailer，其中 mailer 被选中。\n\n图 10-8\n\n点击已创建的用户\n\n点击 *许可证*，然后点击\
  \ *分配*，如图 10-9 所示。\n\n![](img/523943_1_En_10_Fig9_HTML.jpg)\n\n\n\n邮件许可证窗口左侧是“管理”选项卡，其下方包含“个人资料”、“已分配角色”、“管理单位”、“组”、“应用程序”、“许可证”和“设备”等标签页，其中“许可证”处于选中状态。右侧显示“分配”已选中，但在产品下未找到任何许可证分配。\n\
  \n图 10-9\n\n为用户分配许可证\n\n选择 Microsoft 365 E5 开发者许可证。只有当你已购买该订阅时，此许可证才会列在此处。点击*保存*，如图\
  \ 10-10 所示。\n\n![](img/523943_1_En_10_Fig10_HTML.jpg)\n\n更新许可证分配的示意图中，左侧选中了“选择许可证”，其下方选中了“Microsoft\
  \ 365 E5 开发者（不含 Windows 和音频会议）”。左下角的“保存”选项卡处于选中状态。右侧显示“查看许可证选项”，其下方有一个选择栏。\n\n图\
  \ 10-10\n\n选择 Microsoft 365 E5 开发者许可证\n\n现在用户已准备就绪，我们可以从 Java 应用程序中使用该用户发送邮件。我们需要一个服务主体来向\
  \ Azure 租户进行身份验证并发送电子邮件。在 Azure Active Directory 中，点击*应用注册*。然后点击*新注册*，如图 10-11 所示。\n\
  \n![](img/523943_1_En_10_Fig11_HTML.png)\n\n示意图显示的是 abhisekmisra 应用注册窗口。左侧包含“外部身份”、“角色和管理员”、“管理单位”、“企业应用程序”、“设备”、“应用注册”、“身份治理”和“应用程序代理”等标签页，其中“应用注册”处于选中状态。右侧的“新注册”处于选中状态。在“拥有的应用程序”下，找到了\
  \ 3 个应用程序。\n\n图 10-11\n\n点击应用注册\n\n为服务主体提供一个名称，然后点击*注册*，如图 10-12 所示。\n\n![](img/523943_1_En_10_Fig12_HTML.png)\n\
  \n示意图显示的是“注册应用程序”窗口。该窗口包含“名称”输入栏，其中输入了“sp-mailer-demo”并高亮显示。其下方是“支持的帐户类型”，其中选中了“仅此组织目录中的帐户”，左下角是“注册”选项卡，并且已选中。\n\
  \n图 10-12\n\n创建新的服务主体\n\n创建服务主体后，打开该服务主体并点击*API 权限*。点击*添加权限*，然后为 Microsoft Graph\
  \ 添加 *Mail.Send* 权限，如图 10-13 所示。确保为你添加的权限提供管理员同意。\n\n![](img/523943_1_En_10_Fig13_HTML.jpg)\n\
  \nsp-mailer-demo API 权限窗口。左侧的“管理”包含多个选项卡，其中“API 权限”处于选中状态。右侧显示“已配置的权限”，其中“添加权限”和“为\
  \ abhisekmisra 授予管理员同意”处于选中状态。在“API”、“类型”和“描述”列下，分别显示“Mail.Send”、“应用程序”和“以任何用户身份发送邮件”。\n\
  \n图 10-13\n\n提供 API 权限\n\n现在我们需要为服务主体生成一个机密。转到*证书和机密*，然后点击*新建客户端机密*，如图 10-14 所示。生成一个机密并复制你创建的机密的值。你将在\
  \ Java 代码中使用此值进行身份验证和发送邮件。\n\n![](img/523943_1_En_10_Fig14_HTML.jpg)\n\nsp-mailer-demo\
  \ 证书和机密窗口的示意图。左侧的“管理”包含多个选项卡，其中“证书和机密”处于选中状态。右侧显示“证书 0”和“客户端机密 0”，并且后者处于选中状态。用于创建客户端机密的“新建客户端机密”选项卡位于“客户端机密\
  \ 0”下方，并且已选中。\n\n图 10-14\n\n为服务主体生成客户端机密\n\n转到*概述*页面，复制*应用程序（客户端）ID* 和*目录（租户）ID*，如图\
  \ 10-15 所示。我们将在 Java 代码中使用这些值。\n\n![](img/523943_1_En_10_Fig15_HTML.jpg)\n\n示意图显示的是\
  \ sp-mailer-demo 窗口。左侧包含“概述”、“快速入门”和“集成助手”，其中“概述”处于选中状态。右侧显示“基本信息”，其下方是“显示名称：sp-mailer-demo”、“应用程序（客户端）ID”、“对象\
  \ ID”和“目录（租户）ID”。这些 ID 使用水平条高亮显示。\n\n图 10-15\n\n复制服务主体的客户端 ID 和租户 ID\n\n现在我们已经准备好了用户和服务主体。让我们创建基于\
  \ Maven 的 Java 控制台应用程序来发送电子邮件。\n\n让我们将 Microsoft Graph API 和 Identity 包添加到 *pom.xml*\
  \ 文件中，如清单 10-1 所示。\n\n```\ncom.microsoft.graph\nmicrosoft-graph\n5.0,)\n\ncom.azure\n\
  azure-identity\n[1.3,)\n\n清单 10-1\nPom.xml\n```\n\n转到 Java 类文件中的 *main* 函数，如清单 [10-2\
  \ 所示，并添加以下代码。我们需要创建身份验证提供程序，该提供程序将使用服务主体客户端机密来验证和授权代码使用我们创建的用户发送邮件。\n\n```\nString\
  \ clientId=\"{提供服务主体的客户端 ID}\";\nString clientSecret = \"提供服务主体的机密值\";\nString tenantId\
  \ = \"提供租户 ID\";\n//您可以使用默认范围发送。\nList SCOPES = List.of(\"https://graph.microsoft.com/.default\"\
  );\n//基于服务主体构建客户端凭据\nfinal ClientSecretCredential clientCredential = new ClientSecretCredentialBuilder()\n\
  .clientId(clientId)\n.clientSecret(clientSecret)\n.tenantId(tenantId)\n.build();\n\
  //构建一个令牌凭据身份验证提供程序，该提供程序可以使用服务主体进行身份验证\nfinal TokenCredentialAuthProvider tokenProvider\
  \ =\nnew TokenCredentialAuthProvider(SCOPES, clientCredential);\n清单 10-2\n构建身份验证提供程序\n\
  ```\n\n构建图形客户端以使用我们创建的身份验证提供程序，并使用该用户发送邮件，如清单 10-3 所示。\n\n```\n//构建图形客户端\nfinal\
  \ GraphServiceClient graph = GraphServiceClient\n.builder()\n.authenticationProvider(tokenProvider)\n\
  .buildClient();\n清单 10-3\n构建图形客户端对象\n```\n\n现在让我们构建邮件正文和主题，并提供我们需要向其发送邮件的收件人列表，如清单\
  \ 10-4 所示。\n\n```\n//构建消息\nMessage message = new Message();\nmessage.subject = \"\
  订单状态 - IX1234\";\nItemBody body = new ItemBody();\nbody.contentType = BodyType.HTML;\n\
  body.content = \"尊敬的客户  您的订单已准备就绪。即将发货  谢谢运营团队\";\nmessage.body = body;\nLinkedList\
  \ to = new LinkedList();\nRecipient toReceiver = new Recipient();\nEmailAddress\
  \ email = new EmailAddress();\nemail.address = \"abhisek.misra@thecloudcompute.com\"\
  ;\ntoReceiver.emailAddress = email;\nto.add(toReceiver);\nmessage.toRecipients =\
  \ to;\n清单 10-4\n构建邮件方法\n```\n\n让我们使用图形客户端对象，并通过我们之前创建的用户发送邮件，如清单 10-5 所示。\n\n```\n\
  //发送邮件。提供我们在 Azure AD 中创建并分配了 Microsoft 365 开发者 E5 许可证的用户的邮件地址\ngraph.users(\"mailer@abhisekmisra.onmicrosoft.com\"\
  )\n.sendMail(UserSendMailParameterSet\n.newBuilder()\n.withMessage(message)\n.withSaveToSentItems(false)\n\
  .build())\n.buildRequest()\n.post();\n清单 10-5\n发送邮件\n```\n\n以下是从 Java 应用程序使用 Graph\
