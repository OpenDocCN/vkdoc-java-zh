  Sunny\");\nitem = container.createItem(student, new PartitionKey(student.getPartitionKey()),\
  \ new CosmosItemRequestOptions());\n//插入学生 4\nstudent = new Student();\nstudent.setId(\"\
  4\");\nstudent.setMarks(60);\nstudent.setPartitionKey(\"seventh-standard\");\nstudent.setName(\"\
  Abhilash\");\nitem = container.createItem(student, new PartitionKey(student.getPartitionKey()),\
  \ new CosmosItemRequestOptions());\n//从容器查询数据\nint pageSize = 10;\nCosmosQueryRequestOptions\
  \ queryOptions = new CosmosQueryRequestOptions();\n// 设置填充查询指标以获取查询执行的相关指标\nqueryOptions.setQueryMetricsEnabled(true);\n\
  CosmosPagedIterable studentPagedIterable = container.queryItems(\n\"SELECT * FROM\
  \ class WHERE class.partitionKey IN ('eight-standard', 'seventh-standard')\", queryOptions,\
  \ Student.class);\nstudentPagedIterable.iterableByPage(pageSize).forEach(resultItem\
  \ -> {\nresultItem.getResults().forEach(data -> System.out.println(data.getId()\
  \ + \"-\" +data.getName()+\"-\"+data.getMarks()));\n});\n}\n}\n清单 8-8\n完整代码\n```\n\
  \n现在让我们进入门户网站，检查插入到 Cosmos DB 中的数据。点击*数据资源管理器*，如图 8-7 所示。您可以看到 *students* 数据库。\n\
