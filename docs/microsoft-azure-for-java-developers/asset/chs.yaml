  ## 使用表存储


  现在让我们使用表存储。我们将创建一个表，向其中添加一条记录，然后从表中检索该记录。表存储使用分区键和行键来存储数据。分区键帮助你将数据分布到多个分区。例如，如果你正在存储地理数据，你可以使用国家名称作为分区键。你可以将特定国家的数据存储在以国家名称作为分区键的分区中。行键是你在分区中存储数据的主键。


  让我们在 POM 文件中添加以下包依赖项，如清单 6-12 所示。


