- "# 9. 在 Azure Redis 缓存中存储运行时数据\n\n现代应用程序生成并处理运行时数据。它们将运行时数据保存在内存中，或保存在持久性磁盘或数据存储中。将数据存储在内存中，可以更快地访问存储的临时运行时数据。然而，从磁盘或数据库等持久性存储访问数据时，速度比内存存储慢。Azure\
  \ Redis 缓存可帮助您在 Azure 中为应用程序存储和管理运行时数据。Azure Redis 缓存可帮助您快速访问运行时数据，并提高应用程序的性能。\n\
  \n在上一章中，我们学习了 Azure Cosmos DB 的基本概念。然后，我们创建了一个基于 Java 的应用程序，并使用 Azure Cosmos DB\
  \ SQL API 进行了操作。在本章中，我们将学习 Azure Redis 缓存的详细信息。然后，我们将预配 Azure Redis 缓存，并构建一个能够在\
  \ Azure Redis 缓存上执行读写操作的 Java 应用程序。\n\n## 结构\n\n在本章中，我们将讨论 Azure Redis 缓存的以下方面：\n\
  \n*   Azure Redis 缓存简介\n\n*   创建 Azure Redis 缓存\n\n*   使用 Azure Redis 缓存\n\n*  \
  \ 使用控制台操作 Redis 缓存\n\n## 目标\n\n学习本章后，您应能获得以下知识：\n\n*   理解 Azure Redis 缓存的概念\n\n\
  *   通过 Java 应用程序使用 Azure Redis 缓存\n\n\n\n## Azure Redis 缓存简介\n\nRedis 缓存是一种内存缓存服务，可帮助您保存频繁访问的运行时数据。您可以从数据存储中一次性获取数据，并在首次请求时将其保存在缓存中。对于所有后续请求，数据将从缓存中获取，而不是从数据存储中获取。当数据存储中的数据发生变化时，缓存中的数据会使用存储在数据存储中的新版本数据进行刷新。这种方法将确保\
  \ Redis 缓存数据始终保持最新，并且应用程序始终能获取到最新数据。\n\nAzure 将 Redis 缓存作为平台即服务（PaaS）产品提供。您可以在几分钟内启动\
  \ Redis 集群并开始使用它。您无需在 Azure 上为 Redis 缓存设置任何基础设施。底层的 Azure 平台管理所有基础设施方面。Azure Redis\
  \ 缓存可以存储内容、用户会话、分布式数据，甚至可以作为消息代理使用。其用例非常广泛。以下是您可以使用 Redis 缓存实现的一些用例示例：\n\n*   您有一个在\
  \ Azure WebApp 上运行的应用程序。每当用户登录时，该用户的会话数据可以存储在 Azure Redis 缓存中，以便所有 WebApp 实例和用户请求都可以访问这些数据。在高峰时段，Azure\
  \ WebApp 可以扩展到多个实例。\n\n*   您有一个在 Azure、本地或任何基于云的服务器上运行的 Web 应用程序，它使用页眉、页脚、层叠样式表和其他静态页面。您可以将所有这些静态内容的副本存储在\
  \ Azure Redis 缓存中。首次访问时，静态内容可以从服务器获取，而对于后续请求，数据可以从缓存中提供。这种方法将提高应用程序的性能。\n\n*   您有一个应用程序频繁调用数据库来获取数据。在这种情况下，您可以将频繁访问的静态数据存储在\
  \ Azure Redis 缓存中。应用程序可以从缓存中获取数据，而不是从数据库中获取。但是，对于第一个用户请求，数据应从数据库中获取并同时存储在 Redis\
  \ 缓存中。如果数据库中的数据发生变化，Redis 缓存中的数据也应更新。\n\n*   您可以拥有执行分布式事务的应用程序。只有当所有事务都成功时，才应将数据提交到数据库。在这种情况下，您可以将所有事务的中间事务数据存储在\
  \ Redis 缓存中，如果所有事务都成功，则将 Redis 缓存中的数据提交到数据库；如果事务失败，则使缓存中存储的数据失效，作为回滚操作。\n\nAzure\
  \ Redis 缓存为您的应用程序提供极低的延迟和高吞吐量的数据访问。数据存储在由 Azure 平台管理的 Redis 服务器的内存中，可以轻松处理海量数据请求。存储的数据经过加密且高度安全。\n\
  \n以下是 Azure Redis 缓存可用的定价计划：\n\n*   *基本*计划提供在单个虚拟机实例上运行的开源 Redis 缓存版本。您可以将其用于开发和测试目的。此计划不提供\
  \ SLA。\n\n*   *标准*计划提供在两个虚拟机实例上运行的开源 Redis 缓存版本，并且数据会在虚拟机实例之间即时复制。\n\n*   *高级*计划提供在多个强大的虚拟机实例上运行的开源\
  \ Redis 缓存版本。它提供非常高的吞吐量、可用性、低延迟以及许多其他生产级功能。\n\n*   *企业*计划提供比高级计划更高的性能和可用性，并为 Redis\
  \ 缓存提供基于 Redis Labs 的企业级产品。您可以运行基于 Redis 的模块，如 Redis Bloom、RediSearch 和 Redis Time\
  \ Series。\n\n*   *企业闪存*计划提供一种经济高效的基于 Redis Labs 的企业版，该版本在非易失性内存上运行。\n\n## 创建 Azure\
  \ Redis 缓存\n\n让我们使用 Azure 门户创建一个 Azure Redis 缓存。转到 Azure 门户，点击*创建资源*，如图 9-1 所示。我们将使用\
  \ Java 代码对此 Redis 缓存执行读写操作。\n\n![](img/523943_1_En_9_Fig1_HTML.jpg)\n\n资源窗口的屏幕截图。窗口中的内容包括一个搜索栏、文本“Azure\
  \ 服务”以及三个选项：创建资源、资源组和订阅。\n\n图 9-1\n\n创建资源\n\n您将被导航到 Azure 市场。点击*数据库*，然后点击*Azure\
  \ Cache for Redis*。示例如图 9-2 所示。\n\n![](img/523943_1_En_9_Fig2_HTML.jpg)\n\n“创建资源”窗口的屏幕截图。左侧的几个选项包括容器、数据库、开发人员工具、DevOps、标识、集成、IT\
  \ 和管理工具、媒体以及迁移。右侧的几个选项包括 Azure Database for PostgreSQL、Azure Database for MySQL、MongoDB\
  \ Atlas on Azure、HVR for Microsoft Azure 和 Azure Cache for Redis。其中“数据库”和“Azure\
  \ Cache for Redis”被突出显示。\n\n图 9-2\n\n点击 Azure Cache for Redis\n\n提供创建 Redis 缓存的基本详细信息。您需要提供订阅和资源组详细信息、Redis\
  \ 缓存的名称、创建 Redis 缓存的位置以及定价计划。在本演示中，我们使用不提供 SLA 的基本 C0 计划，该计划仅应用于开发和测试目的。点击*下一步：网络*以导航到“网络”选项卡，如图\
  \ 9-3 所示。\n\n![](img/523943_1_En_9_Fig3_HTML.jpg)\n\n“创建资源”窗口的屏幕截图。左侧的几个选项包括容器、数据库、开发人员工具、DevOps、标识、集成、IT\
  \ 和管理工具、媒体以及迁移。右侧的几个选项包括 Azure Database for PostgreSQL、Azure Database for MySQL、MongoDB\
  \ Atlas on Azure、HVR for Microsoft Azure 和 Azure Cache for Redis。其中“数据库”和“Azure\
  \ Cache for Redis”被突出显示。\n\n图 9-3\n\n提供基本详细信息\n\n选择*公共终结点*。但是，在生产场景中，您应该配置一个*专用链接终结点*并设置一个*专用终结点*。使用更高的定价计划，您可以将\
  \ Redis 缓存集成到虚拟网络中。点击*下一步：高级*，如图 9-4 所示。\n\n![](img/523943_1_En_9_Fig4_HTML.png)\n\
  \n“新建 Redis 缓存网络”窗口的屏幕截图。选项包括“基本信息”、“网络”、“高级”、“标签”以及“查看 + 创建”。“网络”选项已创建，显示网络连接和连接方法，包括公共终结点、虚拟网络和专用终结点。\n\
  \n图 9-4\n\n提供网络详细信息\n\n让我们选择最新的 Redis 缓存版本。点击*查看 + 创建*，如图 9-5 所示。\n\n![](img/523943_1_En_9_Fig5_HTML.png)\n\
  \n“新建 Redis 缓存网络”窗口的屏幕截图。选项包括“基本信息”、“网络”、“高级”、“标签”以及“查看 + 创建”。“高级”选项被选中，显示“非 TLS\
  \ 端口”及其启用复选框，以及 Redis 版本选项 4 和 6。下方提供了“查看 + 创建”、“上一步”和“下一步”选项，其中“查看 + 创建”被选中。\n\n\
  图 9-5\n\n点击查看 + 创建\n\n点击*创建*，如图 9-6 所示。此操作将在 Azure 上启动 Redis 缓存集群。\n\n![](img/523943_1_En_9_Fig6_HTML.jpg)\n\
  \n\n\n新的 Redis 缓存网络窗口截图。选项包括：基本信息、网络、高级、标签以及查看并创建。已选中“查看并创建”选项，显示的基本信息包括 DNS 名称、订阅、资源组、位置、SKU，高级信息包括非\
  \ TLS 端口和 Redis 版本。下方提供了“创建”和“上一步”选项，且“创建”已选中。\n\n图 9-6\n\n点击“创建”\n\n创建 Azure Redis\
  \ 缓存后，导航至该缓存并进入*访问密钥*页面，如图 9-7 所示。复制主密钥，将其用作代码中的缓存密钥。预配 Azure Redis 缓存可能需要大约 15\
  \ 分钟或更长时间。\n\n![](img/523943_1_En_9_Fig7_HTML.jpg)\n\n新的 Redis 缓存网络窗口截图。选项包括：基本信息、网络、高级、标签以及查看并创建。已选中“查看并创建”选项，显示的基本信息包括\
  \ DNS 名称、订阅、资源组、位置、SKU，高级信息包括非 TLS 端口和 Redis 版本。下方提供了“创建”和“上一步”选项，且“创建”已选中。\n\n\
  图 9-7\n\n获取缓存密钥\n\n进入*属性*部分，如图 9-8 所示，并复制主机名。我们将在代码中使用该主机名来连接 Azure Redis 缓存。\n\n\
  ![](img/523943_1_En_9_Fig8_HTML.png)\n\nRedis 演示访问密钥窗口截图。左侧选项包括：概述、活动日志、访问控制、标签、诊断并解决问题、事件、访问密钥、高级设置和缩放。右侧内容包括：重新生成主密钥、重新生成辅助密钥、主密钥、辅助密钥、连接字符串和\
  \ URL 信息。\n\n图 9-8\n\n获取主机名\n\n## 使用 Azure Redis 缓存\n\n现在，让我们构建一个 Java 代码，该代码将向缓存插入数据、从缓存读取数据、设置缓存数据的过期时间，以及从\
  \ Redis 缓存中删除数据。我们需要 *jedis* 包来通过 Java 代码使用 Redis 缓存。\n\n让我们将 jedis 包添加到 *pom.xml*\
  \ 文件中。清单 9-1 展示了一个示例。\n\n```\nredis.clients\njedis\n3.2.0\njar\ncompile\n\n清单 9-1\n\
  Pom.xml\n```\n\n我们需要通过 Java 代码连接 Azure Redis 缓存。我们需要提供之前复制的主机名和缓存密钥。清单 9-2 的代码构建了一个连接。\n\
  \n```\nboolean ssl = true;\nString hostName = \"{提供主机名}\";\nString cacheKey = \"\
  {提供缓存密钥}\";\n//Redis 缓存连接端口为 6380\nint port = 6380;\n// 构建到 Redis 缓存的连接\nJedisShardInfo\
  \ shardInfo = new JedisShardInfo(hostName, port, ssl);\nshardInfo.setPassword(cacheKey);\n\
  Jedis jedisCache = new Jedis(shardInfo);\n清单 9-2\n连接到 Redis 缓存\n```\n\n你可以使用 *ping*\
  \ 函数测试连接是否成功，如清单 9-3 所示。如果连接成功，你将收到 *Pong* 作为响应。\n\n```\n// 检查是否能够连接/ ping 到 Redis\
  \ 缓存\nSystem.out.println( \"Ping 结果 : \" + jedisCache.ping());\n清单 9-3\nPing Redis\
  \ 缓存\n```\n\n你可以使用 *set* 函数在缓存中设置数据，如清单 9-4 所示。你可以将数据设置为键值对。\n\n```\n// 设置数据 1 键：Data1，值：This\
  \ is value for Data1\njedisCache.set(\"Data1\", \"This is value for Data1\");\n\
  // 设置数据 2 键：Data2，值：This is value for Data2\njedisCache.set(\"Data2\", \"This is\
  \ value for Data2\");\n清单 9-4\n在 Redis 缓存中设置数据\n```\n\n你可以使用 *get* 函数并传入数据键，从 Azure\
  \ Redis 缓存中获取数据，如清单 9-5 所示。\n\n```\n// 从 Redis 缓存读取数据 1\nSystem.out.println( \"\
  数据 1 的值 : \" + jedisCache.get(\"Data1\"));\n// 从 Redis 缓存读取数据 2\nSystem.out.println(\
  \ \"数据 2 的值 : \" + jedisCache.get(\"Data2\"));\n清单 9-5\n从 Redis 缓存读取数据\n```\n\n\
  你可以选择使用 *expire* 函数为某个键设置缓存数据过期时间，如清单 9-6 所示。你可以指定缓存数据过期前的秒数。\n\n```\n// 为数据 1 设置过期时间\n\
  jedisCache.expire(\"Data1\", 60);\n清单 9-6\n60 秒后使 Redis 缓存中的数据过期\n```\n\n你可以使用 *del*\
  \ 函数删除缓存中的数据，如清单 9-7 所示。\n\n```\n// 删除数据 2\njedisCache.del(\"Data2\");\n清单 9-7\n\
  删除 Redis 缓存中的数据\n```\n\n清单 9-8 是使用 Azure Redis 缓存的完整代码。\n\n```\nimport redis.clients.jedis.*;\n\
  public class RedisDemo {\npublic static void main(String args[])\n{\nboolean ssl\
  \ = true;\nString hostName = \"{提供主机名}\";\nString cacheKey = \"{提供缓存密钥}\";\n//Redis\
  \ 缓存连接端口为 6380\nint port = 6380;\n// 构建到 Redis 缓存的连接\nJedisShardInfo shardInfo =\
  \ new JedisShardInfo(hostName, port, ssl);\nshardInfo.setPassword(cacheKey);\nJedis\
  \ jedisCache = new Jedis(shardInfo);\n// 检查是否能够连接/ ping 到 Redis 缓存\nSystem.out.println(\
  \ \"Ping 结果 : \" + jedisCache.ping());\n// 设置数据 1 键：Data1，值：This is value for Data1\n\
  jedisCache.set(\"Data1\", \"This is value for Data1\");\n// 设置数据 2 键：Data2，值：This\
  \ is value for Data2\njedisCache.set(\"Data2\", \"This is value for Data2\");\n\
  // 从 Redis 缓存读取数据 1\nSystem.out.println( \"数据 1 的值 : \" + jedisCache.get(\"Data1\"\
  ));\n// 从 Redis 缓存读取数据 2\nSystem.out.println( \"数据 2 的值 : \" + jedisCache.get(\"\
  Data2\"));\n// 为数据 1 设置过期时间\njedisCache.expire(\"Data1\", 60);\n// 删除数据 2\njedisCache.del(\"\
  Data2\");\njedisCache.close();\n}\n}\n清单 9-8\n完整代码\n```\n\n图 9-9 显示了代码执行的输出。你可以使用控制台来验证数据。你可以使用\
  \ *Get* 命令查看插入到 Redis 缓存中的数据。下一节将演示如何从 Azure 门户使用 Azure Redis 缓存控制台。\n\n![](img/523943_1_En_9_Fig9_HTML.jpg)\n\
  \nRedis 演示属性窗口截图。左侧选项包括：防火墙、属性、锁、导入数据、导出数据、重启、见解、警报、指标、诊断设置和顾问建议。右侧内容包括：状态、主机名、非\
  \ SSL 端口、SSL 端口、位置和 Redis 版本。左侧的“属性”和右侧的“主机名”已高亮显示。\n\n图 9-9\n\n代码执行输出\n\n\n\n##\
  \ 使用控制台操作 Redis 缓存\n\n在某些场景下，您可能需要浏览存储在 Azure Redis 缓存中的数据。您可以使用 Azure 门户中提供的 Redis\
  \ 控制台来执行所有必要的 Redis 缓存操作。请前往*概述*部分，并点击*控制台*，如图 9-10 所示。\n\n![](img/523943_1_En_9_Fig10_HTML.jpg)\n\
  \n输出窗口的截图。内容为：双引号大写 C 冒号，反斜杠，Program Files 反斜杠，Java 反斜杠 jdk-15.0.2 反斜杠 bin 反斜杠 java.exe\
  \ 双引号。Ping 结果：pong。data 1 的值：this is value for data 1。data 2 的值：this is value for\
  \ data 2。进程已完成，退出代码 0。\n\n图 9-10\n\n转到 Redis 控制台\n\n您可以使用 *SET* 命令将数据插入到缓存中。您可以使用\
  \ *GET* 命令从缓存中读取数据。您可以在此控制台上执行任何 Redis 命令，并与 Redis 缓存集群一起工作。这些命令的使用方法如图 9-11 所示。\n\
  \n![](img/523943_1_En_9_Fig11_HTML.jpg)\n\nRedis 演示窗口的图像。左侧的选项包括搜索栏、概述、活动日志、访问控制、标签、诊断并解决问题、事件和访问密钥。右侧的选项包括控制台、移动、删除、基本信息（包括资源组、状态、位置、订阅和订阅\
  \ ID），其后是内存使用情况。\n\n图 9-11\n\n在 Redis 控制台上执行 Get 和 Set 操作\n\n## 总结\n\n在本章中，我们学习了\
  \ Azure Redis 缓存的基础知识，以及如何使用 Azure 门户创建 Azure Redis 缓存。然后，我们开发了一个基于 Maven 的 Java\
  \ 代码，并在 Azure Redis 缓存上执行了读取、写入、过期和删除操作。在下一章中，我们将学习如何使用 Azure 环境中的 Graph API 从 Java\
  \ 应用程序以编程方式发送电子邮件。\n\n以下是本章的关键要点：\n\n*   Redis 缓存是一种内存缓存产品，可帮助您存储频繁访问的运行时数据。\n\n\
  *   Azure 将 Redis 缓存作为平台即服务产品提供。您可以在几分钟内启动 Redis 集群并开始使用它。您无需在 Azure 上为 Redis 缓存设置任何基础设施。\n\
  \n*   Azure Redis 缓存为您的应用程序提供极低的延迟和高吞吐量的数据访问。\n\n*   存储在 Azure Redis 缓存中的数据是加密且高度安全的。\n\
  \n*   Azure 同时支持开源 Redis 缓存版本和 Redis Lab 企业版。\n\n*   以下是 Azure Redis 缓存可用的定价计划：\n\
  \    *   基本版\n    *   标准版\n    *   高级版\n    *   企业版\n    *   企业闪存版\n\n"
- "# 10. 使用 Graph API 发送电子邮件\n\n现代应用程序需要向利益相关者、客户、开发者或任何与应用程序相关的人员发送电子邮件。可能会出现客户在电子商务应用程序中下订单的场景。一旦订单下达，它将告知客户订单和发货状态。如果订单失败，则应通知运营团队进行调查。您可以在\
  \ Azure 上的虚拟机中配置 SMTP 服务器以满足邮件需求。但是，您最终需要维护虚拟机，并花费成本和精力来保持 SMTP 服务器的正常运行。为了解决这个问题，微软提供了部署在\
  \ Azure 上的 Graph API，帮助您与 Microsoft 365 核心服务进行交互。使用 Graph API，您可以发送电子邮件。\n\n在上一章中，我们学习了\
  \ Azure Redis 缓存的基本概念。然后，我们创建了一个基于 Java 的应用程序，并与 Azure Redis 缓存进行了交互。在本章中，我们将学习\
  \ Graph API 的详细信息。然后，我们将构建一个可以使用 Graph API 发送邮件的 Java 应用程序。\n\n## 结构\n\n在本章中，我们将讨论\
  \ Graph API 的以下方面：\n\n*   Graph API 简介\n*   使用 Graph API 发送邮件的步骤\n*   使用 Microsoft\
  \ Graph API 发送邮件\n*   Microsoft Graph API 浏览器\n\n## 目标\n\n学习完本章后，您应该能够获得以下知识：\n\n\
  *   理解 Graph API 的概念\n*   使用 Graph API 从 Java 应用程序发送邮件\n\n## Graph API 简介\n\nMicrosoft\
  \ Graph API 为您提供了一组 RESTful 端点，您可以使用它们与 Microsoft 365 核心服务、企业移动性与安全性服务、Windows 10\
  \ 服务和 Dynamics 365 服务进行交互。Microsoft Graph API 托管在 Azure 上，开发者可以轻松使用。开发者可以使用 Graph\
  \ API 构建各种应用程序。以下是一些示例。\n\n*   您可以使用 Microsoft 365 核心服务发送和阅读电子邮件、设置会议以及执行与电子邮件相关的操作。您可以使用\
  \ Graph API 端点来帮助您与 Microsoft 365 核心服务进行交互。\n*   您可以使用 Graph API 为企业移动性与安全性服务构建围绕\
  \ Azure AD、Intune、高级威胁防护等的应用程序。\n*   您可以使用 Graph API 为 Windows 10 服务自动控制并将最新补丁应用到您的\
  \ Windows 服务器。\n*   您可以使用 Graph API 为 Dynamics 365 Business Central 构建与 Dynamics\
  \ 365 交互的应用程序。\n\n图 10-1 描述了使用 Graph API 的 Microsoft 服务与客户应用程序之间的交互。\n\n![](img/523943_1_En_10_Fig1_HTML.jpg)\n\
  \n一个模型图，说明了通过 Graph API 在客户应用程序和 Microsoft 服务器之间的交互。顶部是客户应用程序；中间层是 Microsoft Graph\
  \ API，它分为 Microsoft 365 核心服务、企业移动性与安全性、Windows 10 服务和 Dynamics 365。\n\n图 10-1\n\n\
  Microsoft Graph API 和 Microsoft 服务\n\n现在让我们探索一个 Graph API 的 Microsoft 365 核心用例。每当应用程序失败时，开发者需要与他的主管设置一个会议邀请。他需要在邀请中附加来自\
  \ OneDrive 的日志文件。此日志文件由应用程序生成并存储在 OneDrive 中。所有这些操作都应该是自动化的。开发者无需全天候监控 OneDrive\
  \ 并不断安排会议。我们可以使用 Microsoft Graph API 构建一个解决方案来帮助开发者。该解决方案将使用 Graph API 读取主管的日历并找到可用的空闲时段。然后，它将访问开发者的邮箱并与主管设置一个邀请。该解决方案将使用\
  \ Graph API 访问存储在 OneDrive 中的日志并将其附加到邀请中。图 10-2 演示了我们讨论的用例。\n\n![](img/523943_1_En_10_Fig2_HTML.jpg)\n\
  \n一个模型图，说明了 Microsoft Graph API 和 Microsoft 365 之间的网络基础设施。它包括中心的主管；左侧的 OneDrive、经理和邮件；右侧的\
  \ PowerPoint、开发者、日历。\n\n图 10-2\n\nMicrosoft Graph API 和 Microsoft 365 用例\n\n\n\n\
  ## 使用 Graph API 发送邮件的步骤\n\n作为先决条件，您应拥有 Microsoft 365 E5 开发者许可证。该许可证将帮助您为用户或服务帐户配置邮箱以发送邮件。\n\
  \n注意\n\n您可以在 [`https://developer.microsoft.com/en-us/microsoft-365/dev-program`](https://developer.microsoft.com/en-us/microsoft-365/dev-program)\
  \ 免费获取 Microsoft 365 E5 开发者许可证。您可以创建自己的沙盒环境，用于本章的演示。\n\n购买 Microsoft 365 开发者 E5\
  \ 许可证后，您可以按照以下步骤配置 Graph API，并从您的应用程序调用 Graph API 发送电子邮件：\n\n1.  在 Azure 租户中创建一个用户。\n\
  \n2.  为该用户分配 Microsoft 365 E5 许可证，以便使用 Microsoft 365 邮箱。\n\n3.  创建一个服务主体，并为该服务主体授予发送邮件所需的\
  \ Graph API 权限。\n\n4.  配置您的 Java 应用程序以发送邮件。\n\n## 使用 Microsoft Graph API 发送邮件\n\n\
  让我们在 Azure 租户中创建一个用户。我们将使用该用户通过 Java 应用程序发送电子邮件。转到 Azure 门户，点击 *Azure Active Directory*，如图\
