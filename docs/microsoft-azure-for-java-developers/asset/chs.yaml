  您正在构建一个基于 Spring Boot 的微服务应用程序，并将使用平台即服务模型将其托管在 Azure 上。您需要处理诸如为不同环境维护应用程序配置、与 Azure
  上的平台即服务数据库集成，以及利用 Azure Redis 满足缓存需求等问题。您可能还需要集成 Application Insights 进行日志记录和监控，为您的服务配置自动缩放等等。您还需要将应用程序托管环境与
  Git 仓库、Azure DevOps 管道或 Jenkins 集成。并且，您需要在不进行任何代码更改的情况下实现所有这些需求，并尽可能多地使用配置。Azure
  Spring Cloud 将在此处为您轻松提供帮助。


  在上一章中，我们学习了 Azure Kubernetes Service 的基础知识。然后，我们创建了一个基于 Java 的应用程序，将其容器化，并部署到了 Azure
  Kubernetes Service 上。在本章中，我们将学习 Azure Spring Cloud 的详细信息，然后我们将预配一个 Azure Spring
  Cloud 服务，并将应用程序部署到该服务中。




  ## 结构


  在本章中，我们将讨论在 Azure Spring Cloud 上部署 Java 应用的以下几个方面：


  *   Azure Spring Cloud 简介


  *   创建 Azure Spring Cloud 服务


  *   在 Azure Spring Cloud 上部署 Java 应用


  ## 目标


  学习完本章后，你应该能够获得以下收获：


  *   理解 Azure Spring Cloud 的概念


  *   在 Azure Spring Cloud 上构建并运行 Java 应用


  ## Azure Spring Cloud 简介


  Spring Cloud 是一个基于 Java 虚拟机（`–`）的开源框架，可帮助开发者构建健壮的基于云的 Java 解决方案。你可以轻松地整合各种横切关注点，例如分布式消息传递、服务发现、负载均衡、服务注册、路由等。


  Azure Spring Cloud 是一种基于平台即服务的产品。Spring Cloud 不仅适用于 Java 应用，它还可以使用 Steeltoe 托管 .NET
  Core 应用。你需要专注于构建应用。底层平台将负责托管需求。你需要预配服务并将应用部署到其中。


  你可以使用 Spring Cloud 构建基于微服务的应用。它为管理应用配置和服务发现提供了出色的内置支持。它无需编写任何代码即可与 Azure 服务（如 Azure
  Active Directory、Application Insights、Azure Redis 缓存、存储帐户、Cosmos DB 以及其他 PaaS 数据库和服务）良好集成。你可以为
  Azure Spring Cloud 上的应用实例定义服务绑定，并轻松地与其他 Azure 服务集成。


  在 Azure Spring Cloud 上运行的应用实例可以根据扩展标准和条件使用自动配置进行扩展。它还支持手动扩展，你需要手动指定要运行的实例数量。


  Azure Spring Cloud 非常适合使用 Azure DevOps、Jenkins、Maven、Gradle、Terraform 等工具的持续集成和持续部署场景。你可以集成源代码仓库（如
  Azure Repos、GitHub 和 Git 仓库），并轻松采用 DevOps 方式来构建应用。


  你可以使用 Azure Spring Cloud 构建企业级应用。Azure Spring Cloud 在 Azure 上的 VMware 基础设施之上运行。它为端到端的应用生命周期管理提供了出色的支持。你可以轻松地处理企业级关注点，例如监控、审计、安全性、可伸缩性、可用性等。


