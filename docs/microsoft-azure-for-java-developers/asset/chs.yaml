- '# 11. 使用 Azure Monitor 和 Application Insights 进行调试与监控


  应用程序有时可能会变得缓慢，您可能需要排查性能问题。应用程序性能下降可能有多种原因。例如，当应用程序处理长时间运行的请求时，CPU 或内存利用率可能会变高。我们需要一种机制来定期监控应用程序性能指标（如
  CPU、内存和磁盘利用率），并在应用程序达到阈值性能水平时向运维团队发出警报。您可能还需要日志来调试应用程序故障。Azure Monitor 帮助您跟踪应用程序指标，而
  Azure Application Insights 帮助您分析在 Azure、本地或任何其他公有云上运行的应用程序的日志。


  在上一章中，我们学习了 Microsoft Graph API 的基本概念。然后，我们创建了一个基于 Java 的应用程序，并配置了 Microsoft Graph
  API 来发送邮件。在本章中，我们将详细了解 Azure Monitor 和 Azure Application Insights。然后，我们将构建一个 Java
  应用程序，该应用程序可以使用 Azure Monitor 生成性能指标，并使用 Azure Application Insights 生成应用程序日志。


  ## 结构


  在本章中，我们将讨论 Azure Monitor 和 Application Insights 的以下方面：


  *   Azure Monitor 和 Application Insights 简介


  *   配置 Azure Monitor 指标和仪表板


  *   创建性能警报


  *   为 Java 应用程序使用 Application Insights


  ## 目标


  学习本章后，您应该能够获得以下知识：


  *   理解 Azure Monitor 和 Application Insights 的概念


  *   为 Java 应用程序配置 Azure Monitor 和 Application Insights




  ## Azure Monitor 与 Application Insights 简介


  Azure Monitor 可帮助您从 Azure、本地或任何其他云平台上的应用程序和基础架构中收集性能指标和日志数据。它从 Azure 服务、Azure 订阅和
  Azure 租户中收集数据。Azure Monitor 中存储的日志和指标可根据您的需求进行分析和进一步使用。您可以从 Azure Monitor 收集的日志和指标中获取以下见解：


  *   使用 Application Insights，您可以深入了解您的应用程序。

  *   使用容器见解，您可以深入了解您的容器。

  *   使用虚拟机见解，您可以深入了解您的虚拟机。

  *   您可以深入了解您的网络和存储。


  您可以使用 Log Analytics 分析采集的日志，并使用指标浏览器分析指标。您可以构建仪表板和工作簿，以可视化采集的日志和指标数据的分析与见解。您可以通过创建警报和自动缩放设置，根据分析结果对日志和指标做出响应。您可以与
  Logic Apps 工作流集成，并根据分析结果执行操作。图 11-1 展示了 Azure Monitor。


  ![](img/523943_1_En_11_Fig1_HTML.jpg)


  Azure Monitor 的流程图。输入是应用程序、操作系统、Azure 资源、Azure 订阅和租户，这些输入提供给 Azure Monitor。指标和日志进一步提供见解、可视化、分析、响应或警报，并与
  Azure Monitor 中的工作流集成。


  图 11-1


  Azure Monitor


  Application Insights 可帮助您监控并收集在 Azure、本地或任何其他云上运行的应用程序的日志和性能指标数据的见解。它可以与使用各种编程语言和框架（如
  .NET、Java、Python、PHP 等）开发的应用程序集成。图 11-2 展示了 Application Insights。


  ![](img/523943_1_En_11_Fig2_HTML.jpg)


  Application Insights 图表提供业务和数据见解，以形成数据库和外部服务。Application Insights 组件包括警报、Power BI、Visual
  Studio、REST API 和导出。


  图 11-2


  Application Insights


  注意


  Azure Monitor 收集并分析应用程序、基础架构、操作系统、Azure 服务、租户和 Azure 订阅的数据。Application Insights
  是 Azure Monitor 的一个子集，可帮助您分析并从应用程序数据中收集见解。


