  \ Microsoft Azure，右侧有一个搜索栏。空白区域显示 Azure 服务，包括用于创建资源的加号、一个内部有小金字塔的正方形（代表 Azure Active\
  \ Directory），以及一个用于快速入门中心的火箭图标。\n\n图 10-3\n\n点击 Azure Active Directory\n\n点击 *用户*，然后点击\
  \ *新建用户*，如图 10-4 所示。我们可以在此处租户中创建一个新用户。\n\n![](img/523943_1_En_10_Fig4_HTML.jpg)\n\
