  ## 总结


  本章展示了如何使用 Azure DevOps 构建 Java Spring Boot 应用程序并将其部署到 Azure WebApp。我们使用 Git 命令将
  Java 代码签入到 Azure Repos。然后，我们创建了一个基于 YAML 的管道，用于从 Azure Repos 构建 Java 应用程序并将其部署到
  Azure WebApp。在下一章中，我们将学习最佳案例，并探索 Azure 上的实时 Java 应用程序。


  以下是本章的主要要点：


  *   Azure Repos 提供了一个 Git 仓库，您可以执行 Git 命令签入到 Azure Repos。


  *   您还可以使用 Azure DevOps 创建基于 TFS 的代码仓库。


  *   您可以创建基于 YAML 的管道来构建 Java 代码并将其部署到 Azure。


