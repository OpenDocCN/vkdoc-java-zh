- '# 15. 一个接近生产环境的基于 Azure 的 Java 应用程序


  现在我们已经到了本书的结尾。我们学习了基本 Azure 服务的基础知识，这些知识在处理基于 Azure 的 Java 应用程序时会派上用场。我们学习了如何在 Azure
  服务（如 Azure WebApp、Azure Kubernetes Service、Azure Spring Cloud 和 Azure Functions）上部署基于
  Java 的应用程序。我们还学习了如何使用 Azure SQL、Azure Storage 和 Azure Redis Cache。我们探讨了如何监控、保护以及使用
  Azure DevOps 进行自动化基础设施创建。


  在上一章中，我们学习了如何使用 Azure DevOps 构建 Java 应用程序并将其部署到 Azure 服务。在本章中，我们将探讨在 Azure 上设计和实现基于
  Java 的应用程序时应遵循的最佳实践。我们还将处理一个接近生产环境的场景。


  ## 结构


  在本章中，我们将讨论以下内容：


  *   最佳实践


  *   构建一个接近生产环境的场景


  ## 目标


  学习完本章后，您应该能够获得以下知识：


  *   学习如何构建一个可以托管在 Azure 上的基于 Java 的应用程序。


  *   理解在 Azure 上处理 Java 应用程序时的最佳实践。


  ## 最佳实践


  设计应用程序架构是一项关键活动。在实现应用程序架构时，您必须考虑最佳实践。针对 Azure 的应用程序应进行高度精确的规划，以便应用程序在 Azure 环境中按预期运行。让我们讨论一些在为
  Azure 设计基于 Java 的应用程序时应考虑的基本最佳实践。


  *   确定主机选项。


  *   现代化应用程序，然后迁移到 Azure。


  *   为您的应用程序选择合适的 Azure 服务。


  *   规划符合预算的云成本。


  *   规划可扩展性、可用性和可靠性。


  *   制定强大的调试和监控策略。


  *   保护您在 Azure 上的应用程序。


  *   自动化 Azure 服务的启动和应用程序部署。


  *   制定正确的备份和灾难恢复策略。


  ### 确定主机选项


  您可以使用适用于 Java SE 的 App Service、适用于 Tomcat 的 App Service、适用于 JBoss 的 App Service、Azure
  Spring Cloud、Azure Kubernetes Service 和虚拟机来在 Azure 上托管您的 Java 应用程序。您需要使用符合您需求的正确服务。例如，如果您有一个
  Spring Boot 应用程序，那么您可以在 Azure Spring Cloud、App Service 或虚拟机上运行它。


  ### 现代化应用程序，然后迁移到 Azure


  有时您可能会发现使用 Azure 不支持的旧版组件在较旧 Java 版本上开发的应用程序。您必须确保将较旧的 Java 应用程序至少现代化到版本 1.8。您必须将旧版应用程序现代化到受支持的框架和
  Java 版本，然后将其迁移到 Azure。尝试使用现代 Java 开发框架，如 Spring Boot。如果您有一个在不兼容的框架（如 WebSphere Liberty）上运行的
  Java 应用程序，请尝试将其现代化为 Open Liberty 或 Spring Boot，以实现更顺畅的 Azure 迁移。


  ### 为您的应用程序选择合适的 Azure 服务


  您必须设计 Azure 基础设施以满足应用程序的需求。如果您有一个分布式微服务应用程序，请尝试将其托管在 Azure Spring Cloud 或 Azure
  Kubernetes Service 上。您还可以使用 Azure Functions 构建分布式应用程序。您必须使用存储队列或服务总线队列在分布式服务之间交换消息。临时运行时数据应存储在
  Azure Redis Cache 中。


  如果您有一个单体应用、单个服务或基于单个容器的应用程序，则必须使用 Azure WebApp。




  ### 规划符合您需求的云成本


  在为应用程序设计 Azure 基础设施时，总拥有成本是一个关键因素。您必须分析应用程序中可能影响使用成本的计算需求及所有必要需求。例如，您计划使用无服务器节点来扩展
  Azure 集群。无服务器节点在 Azure 容器实例上运行，每次只能容纳一个 Pod。如果您一次需要数千个 Pod，就需要数千个 Azure 容器实例。相反，您可以检查是否可以使用虚拟机规模集进行扩展。单个基于虚拟机的节点一次可以容纳许多
  Pod。


  此外，在为 WebApp 规划应用服务计划时，请确保选择适合您应用程序计算及其他需求的正确计划。规划您的服务层级，或为符合应用程序确切需求的服务预留计算资源。不要预留可能浪费计算资源的更高层级，也不要选择应用程序计算资源不足的更低层级。为
  Azure 服务合理调整计算需求，可以为您节省大量成本。


  ### 规划可伸缩性、可用性和可靠性


  您的 Java 应用程序必须能够根据业务需求进行扩展、始终保持可用并具备容错能力。应用程序应具有高可用性。您必须尝试利用托管应用程序的服务中提供的自动缩放机制。您必须确保在负载均衡器、应用程序网关、流量管理器或
  Front Door 后面运行多个托管应用程序的服务实例，以确保如果其中一个实例发生故障，流量可以路由到其他实例。您必须为失败的操作设置重试机制。在重试期间，未能处理的数据应保持可用，以确保所有数据都能被成功处理。这一措施将确保应用程序的可靠性。


  ### 建立强大的调试和监控策略


  您必须利用 Azure Monitor 和 Application Insights 来收集应用程序和 Azure 基础设施的指标和日志。这一措施将帮助您在生产环境中调试故障、监控应用程序性能，并在出现异常时采取预防措施。应配置适当的警报，以便在发生故障或即将发生故障时通知相关利益方。


  您还可以利用第三方供应商提供的其他监控产品，如 Prometheus 和 AppDynamics。


  ### 保护您在 Azure 上的应用程序安全


  您必须为在 Azure 上运行的 Java 应用程序配置身份验证和授权。您可以使用 Azure Active Directory 或任何其他第三方身份提供商。所有应用程序的访问和操作都应受到监控并定期审计。


  ### 自动化 Azure 服务的启动和应用程序部署


  您必须利用基础设施即代码来自动化启动 Azure 资源，并使用 DevOps 管道促进应用程序部署。此策略将减少基础设施创建和应用程序部署过程中的人工错误。此外，当您在多个环境中部署应用程序时，它还能帮助您节省时间。


  ### 制定正确的备份和灾难恢复策略


  您必须定期备份应用程序数据，并在发生数据丢失时使其可用。存储备份数据可能成本高昂。因此，您必须决定需要保留备份数据多长时间，并清理超过保留期限的备份。您必须为应用程序规划灾难恢复策略。如果应用程序发生故障，您必须能够根据灾难恢复策略，从
  Azure 上的另一个实例或基础设施运行应用程序。并且您必须快速恢复故障基础设施中的应用程序。无论如何，业务必须保持正常运行。


  ## 构建接近生产环境的场景


  现在让我们处理一个接近生产环境的场景。我们将把用例作为问题陈述来讨论，并理解该场景的需求，然后我们将配置 Azure 基础设施并为该问题陈述构建解决方案。这一活动将让您了解如何在生产环境中将
  Java 与 Azure 结合使用。


  ### 问题陈述


  我们在 Azure SQL 数据库中有一个学生表。该表包含班级中学生的学号、姓名和成绩。让我们构建一个 Spring Boot Web 应用程序，从学生表中获取学生记录并在浏览器中呈现。该应用程序应仅对经过身份验证的用户可用。确保为应用程序启用日志记录，以便在应用程序部署到
  Azure WebApp 时能够进行调试。




  ### 实施：创建基础设施


  该应用程序需要以下 Azure 服务：


  *   用于托管应用程序的 Azure WebApp

  *   用于学生表的 Azure SQL 数据库

  *   用于日志记录和监控的 Application Insights

  *   用于应用程序身份验证的 Azure Active Directory 应用程序注册


