- "# 2. Java for Azure WebApp\n\nWebApp 是一种常用的 Azure 服务。您可以构建应用程序并将其托管在 Azure WebApp\
  \ 内，而无需担心托管基础设施。底层 Azure 平台负责处理所有基础设施和托管需求。WebApp 帮助您的应用程序快速上线，因为您可以在几分钟内完成配置并托管应用程序。WebApp\
  \ 支持多种编程语言和框架，例如 .NET、Java、PHP、Node.js 等等。它为托管 Java 应用程序提供了出色的开箱即用支持。\n\n在上一章中，我们学习了云计算的基础知识以及\
  \ Azure 对 Java 的支持。在本章中，我们将学习 Azure WebApp 的详细信息，然后将 Java 应用程序托管在 Azure WebApp 中。\n\
  \n## 结构\n\n在本章中，我们将讨论 Java for Azure WebApp 的以下方面：\n\n*   Azure WebApp\n\n*   App\
  \ Service 计划\n\n*   在 Azure WebApp 上部署 Java 应用程序\n\n*   缩放托管在 Azure WebApp 上的 Java\
  \ 应用程序\n\n## 目标\n\n学习完本章后，您应该能够获得以下知识：\n\n*   理解 Azure WebApp 和 App Service 计划的概念\n\
  \n*   在 Azure WebApp 上部署 Java 应用程序\n\n\n\n## Azure WebApp\n\nAzure WebApp 是 Azure\
  \ 上提供的一项平台即服务（PaaS）产品。你可以构建基于 HTTP 的应用程序和服务，并将其托管在 Azure WebApp 上。你无需担心创建和管理底层托管基础设施，Azure\
  \ 平台会为你处理这些事务。你只需预配服务并托管你的应用程序即可。你可以使用任何支持的语言（如 .NET、Java、Node.js、Python、PHP 和 Ruby）构建\
  \ Web 应用程序、REST API 和移动后端，并在 Azure WebApp 上运行。Azure WebApp 同时支持基于 Windows 和 Linux\
  \ 的环境。你还可以使用 Docker 将应用程序容器化，并在 Azure WebApp 上运行。\n\nAzure WebApp 具有高可用性和可伸缩性。你可以将\
  \ WebApp 配置为自动缩放，也可以手动缩放 WebApp。它拥有丰富的持续集成和持续部署支持，并能轻松与 Azure DevOps、Jenkins、Bitbucket、GitHub\
  \ 甚至任何本地 Git 仓库集成。它还支持通过 FTP 部署应用程序。\n\n你可以为 Azure WebApp 创建多个部署槽位。你的应用程序将在生产部署槽位上运行，你可以为\
  \ Azure WebApp 创建一个过渡部署槽位，并托管新开发的应用程序版本。大部分应用程序流量可以导向生产槽位，部分应用程序流量可以导向过渡槽位。最终，一旦你对新开发的应用程序有足够信心，你可以将过渡槽位中的内容与生产槽位交换，并将所有流量重定向到生产槽位。你可以使用基础设施即代码和\
  \ DevOps 解决方案来自动化此过程。\n\n注意\n\n你可以通过为 WebApp 预配额外的相同实例来水平缩放 Azure WebApp，或者通过更改应用服务计划来垂直缩放它。垂直缩放称为纵向扩展过程，水平缩放称为横向扩展过程。\n\
  \n## 应用服务计划\n\n有些应用程序是 CPU 密集型的，有些是内存密集型的，还有一些应用程序可以在较少的计算资源上运行。每个应用程序都有其计算、基础设施需求以及其他需求，如缩放、数据存储等，Azure\
  \ WebApp 通过应用服务计划来满足这些应用程序需求。应用服务计划定义了 Azure WebApp 的计算资源、缩放、部署槽位、定价层以及其他必要功能。根据应用程序需求，你可以为\
  \ WebApp 选择应用服务计划。每个 WebApp 都在一个应用服务计划上运行。你可以在一个应用服务计划上共享多个 WebApp，并在多个 WebApp 之间共享底层托管基础设施。\n\
  \n以下是为基于 Azure WebApp 的应用服务计划提供的定价层：\n\n*   共享计算\n*   专用计算\n*   隔离\n\n### 共享计算\n\
  \n共享计算提供免费或共享计划，底层托管基础设施将由运行在应用服务计划上的 WebApp 与多个客户共享。此层不提供缩放功能，但保证你的应用程序的计算隔离。你只能将此层用于开发和测试目的。\n\
  \n### 专用计算\n\n使用专用计算，你将为运行在你的应用服务计划上的所有 WebApp 拥有专用的底层托管基础设施。它可以是基本、高级或标准层。高级层提供最大数量的计算资源和缩放实例，其次是标准层和基本层。保证你的应用程序的计算隔离。\n\
  \n### 隔离\n\n隔离计划为你的 Azure 提供专用的虚拟网络。此层在保证计算隔离的同时，还保证了网络隔离。\n\n## 在 Azure WebApp\
