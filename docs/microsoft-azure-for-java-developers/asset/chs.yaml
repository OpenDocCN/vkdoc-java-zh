- "# 13. 使用 Azure DevOps 和 Azure CLI 预配资源\n\n基础设施即代码（IaC）是基于云的企业中广泛采用的做法。你可以使用脚本和\
  \ DevOps 工具自动创建云基础设施。你需要创建这些脚本或解决方案一次，并在多个环境中重复使用它们。这种方法可以为你节省大量时间和精力。有许多可用的基础设施即代码（IaC）实用程序和工具，可以帮助你自动预配\
  \ Azure 基础设施。\n\n在上一章中，我们学习了 Azure Active Directory 的基本概念。然后，我们创建了一个可以使用 Azure Active\
  \ Directory 执行用户身份验证和授权的 Java 应用程序。在本章中，我们将探讨 Azure 的基础设施即代码（IaC）选项，然后使用 Azure CLI\
  \ 和 Azure DevOps 启动一个 Azure Web 应用。\n\n## 结构\n\n在本章中，我们将讨论使用 Azure DevOps 和 Azure\
  \ CLI 创建基础设施的以下方面：\n\n*   Azure 上的基础设施即代码（IaC）简介\n\n*   创建用于启动 Azure Web 应用的 Azure\
  \ CLI 脚本\n\n*   创建用于启动 Azure Web 应用的 Azure DevOps 管道\n\n## 目标\n\n学习本章后，你应该能够获得以下知识：\n\
  \n*   探索可用于通过自动化创建 Azure 基础设施的选项\n\n*   使用 Azure DevOps 和 Azure CLI 创建 Azure 资源\n\
  \n\n\n## Azure 基础设施即代码 (IaC) 简介\n\nAzure 门户可帮助您轻松创建 Azure 资源。您会获得一个直观且基于向导的用户界面，并可使用它来创建资源。但是，您需要手动登录\
  \ Azure 门户，然后在门户中提供资源详细信息并创建资源。如果您只有一个环境，这种方法效果很好。然而，企业通常拥有多个环境，例如开发、测试、验收和生产环境。如果您使用\
  \ Azure 门户在这些环境中创建资源，最终可能会进行许多重复性活动。您需要在开发环境中为应用程序创建资源，然后在其他环境中创建相同的资源集。这种方法工作量大，并且由于涉及手动操作，存在引入错误的风险。但是，您可以自动执行资源创建活动，并在多个环境中触发自动化。这种方法将为您节省大量时间，并且不会出错。与使用\
  \ Azure 门户创建资源的方法相比，您可以更快地创建好环境。\n\n以下是一些流行的用于自动化创建 Azure 资源的**基础设施即代码 (IaC)** 方案：\n\
  \n*   Azure CLI\n*   Azure PowerShell\n*   ARM 模板\n*   Terraform\n*   Bicep\n\n\
  Azure CLI 是一个跨平台方案，您可以在 Windows、Linux 或 Mac 系统上启动 Azure 资源。您可以从命令提示符、bash 提示符或 PowerShell\
  \ 提示符运行 Azure CLI 脚本。\n\nAzure PowerShell 为您提供了有助于启动 Azure 资源的 PowerShell 模块。如果您使用可在\
  \ PowerShell 6 及更高版本上运行的 Azure PowerShell Core，则可以构建跨平台脚本。\n\n使用 ARM 模板，您可以将 Azure\
  \ 基础设施表示为 JSON 模板，然后将该模板部署到 Azure 环境并启动您的 Azure 资源。Azure CLI 和 Azure PowerShell\
  \ 都公开了可用于部署这些模板的命令。\n\nAzure PowerShell、Azure CLI 和 ARM 模板是 Microsoft 提供的用于创建 Azure\
  \ 资源的方案。Terraform 是一个第三方方案，可帮助您编写脚本来创建 Azure 资源。\n\n您可以使用 Azure DevOps 管道来调用使用 Azure\
  \ CLI、PowerShell、Terraform 或 ARM 模板开发的脚本，以启动 Azure 基础设施。在这种情况下，您可以构建发布管道以在各种环境中启动基础设施。这种方法将帮助您构建一键式自动化，从而启动\
  \ Azure 基础设施并部署应用程序。\n\n## 创建用于启动 Azure WebApp 的 Azure CLI 脚本\n\n让我们创建一个 Azure CLI\
