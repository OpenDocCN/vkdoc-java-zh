- '# 14. 使用 Azure DevOps 进行构建和部署


  持续集成管道构建应用程序，持续部署管道将应用程序部署到目标托管环境。这种 DevOps 方法自动化了应用程序的构建和部署方法，并被所有现代企业所采用。这些管道减少了部署过程中的手动错误，并确保更快的市场发布。我们可以使用
  Azure DevOps 管道来构建应用程序并将其部署到 Azure。


  在上一章中，我们学习了基础设施即代码（IaC）的基本概念。然后，我们创建了一个 Azure CLI 脚本来启动 Azure 资源。我们还使用了 Azure DevOps
  CLI 任务来创建 Web 应用。在本章中，我们将学习如何使用 Azure DevOps 管道将 Java 应用程序部署到 Azure。


  ## 结构


  在本章中，我们将讨论以下基于 DevOps 的应用程序部署概念：


  *   创建一个 Java 应用程序并将其提交到基于 Git 的 Azure Repos


  *   创建一个基于 YAML 的管道来构建应用程序并将其部署到 Azure Web 应用


  ## 目标


  学习完本章后，你应该能够获得以下知识：


  *   学习如何使用 Azure Repos


  *   学习如何使用 Azure DevOps 管道构建 Java 应用程序并将其部署到 Azure




  ## 创建 Java 应用程序并将其提交到基于 Git 的 Azure Repos


  让我们构建一个简单的 Java Spring Boot API，它将返回一个字符串。你可以使用 Spring Initializr 生成该应用程序。清单 14-1
  展示了该应用程序的 POM 文件。我们需要包含 *Spring Web* 依赖项，如清单 14-1 所示。


  ```


  4.0.0


  org.springframework.boot

  spring-boot-starter-parent

  2.6.6


  com.iac

  demo

  0.0.1-SNAPSHOT

  demo

  Demo project for Spring Boot


  org.springframework.boot

  spring-boot-starter-web


  org.springframework.boot

  spring-boot-starter-test

  test


  org.springframework.boot

  spring-boot-maven-plugin


  清单 14-1

  POM.xml

  ```


  你可以生成一个包含 Main 方法和 REST API 的类文件。清单 14-2 展示了该类文件的内容。


  ```

  package com.iac.demo;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.RestController;

  @SpringBootApplication

  @RestController

  public class DemoApplication {

  public static void main(String[] args) {

  SpringApplication.run(DemoApplication.class, args);

  }

  @GetMapping("/")

  public String index() {

  return "Hello Spring Boot on WebApp !!";

  }

  }

  清单 14-2

  类文件

  ```


  一旦应用程序构建成功，你就可以将代码签入到 Azure Repos。前提条件是，你的系统上应该已经安装了 Git。我们可以使用上一章创建的 Azure DevOps
  项目。打开 Azure DevOps URL 并导航到该项目。点击 *Repos*，然后点击 *生成 Git 凭据*，如图 14-1 所示。


  ![](img/523943_1_En_14_Fig1_HTML.jpg)


  一个表示生成 Git 凭据的窗口截图。


  图 14-1


  生成 Git 凭据


  复制 HTTPS URL、Git 用户名和密码，如图 14-2 所示。


  ![](img/523943_1_En_14_Fig2_HTML.jpg)


  一个“克隆到您的计算机”对话框，用于复制 Git 凭据。


  图 14-2


  复制 Git 凭据


  在 Windows 资源管理器中，导航到包含 POM 文件的 Java 项目根文件夹。执行清单 14-3 中的命令来初始化一个本地 Git 仓库。


  ```

  git init

  清单 14-3

  初始化本地 Git 仓库

  ```


  执行清单 14-4 中的命令，将文件夹内容添加到本地 Git 仓库。


  ```

  git add .

  清单 14-4

  将本地更改添加到 Git 仓库

  ```


  执行清单 14-5 中的命令，提交本地 Git 仓库中添加的文件。


  ```

  git commit -m "Initial commit"

  清单 14-5

  将添加的文件提交到本地 Git 仓库

  ```


  执行清单 14-6 中的命令，连接到 Azure DevOps 中的 Git 仓库，并将本地 Git 更改推送到该仓库。将 [HTTPS_URL] 替换为你之前在生成
  Git 凭据时复制的 URL。


  ```

  git remote add origin [HTTPS_URL]

  git push -u origin --all

  清单 14-6

  将本地 Git 仓库更改推送到 Azure Repos

  ```


  系统会提示你提供 Git 的凭据。你可以提供生成 Git 凭据时复制的用户名和密码。确保你提供了用户名和域——例如，abc@xyx.onmicrosoft.com。Java
  项目将被签入到 Azure DevOps Repo，如图 14-3 所示。


