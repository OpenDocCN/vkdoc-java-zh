  \n访问密钥网页的截图。\n\n图 3-7\n\n获取存储帐户的连接字符串\n\n现在让我们开始使用 Maven 插件创建 Azure Function。作为先决条件，你应该已经安装了以下实用程序：\n\
  \n*   Azure Functions Core Tools（最新版本）\n\n*   Java 11\n\n*   Azure CLI\n\n*   Visual\
  \ Studio Code\n\n*   Maven（任何与 Java 11 兼容的版本）\n\n启动 Visual Studio Code，打开你计划工作的文件夹，并基于终端打开一个新的命令提示符。在终端中执行清单\
  \ 3-1 中的以下命令。这将在本地为你创建一个 Azure Function 代码。我们将进一步修改代码。\n\n```\nmvn archetype:generate\
  \ \"-DarchetypeGroupId=com.microsoft.azure\" \"-DarchetypeArtifactId=azure-functions-archetype\"\
  \ \"-DjavaVersion=11\"\n清单 3-1\n生成 Azure Function 代码\n```\n\n当提示时，为你的 Java 函数提供组\
  \ ID、工件 ID、包名称和版本，最后通过按 *Y* 确认你的选择，如图 3-8 所示。\n\n![](img/523943_1_En_3_Fig8_HTML.jpg)\n\
  \n终端选项卡下用于 Maven 执行的一系列代码。\n\n图 3-8\n\nMaven 执行\n\n该函数创建时带有 HTTP 触发器绑定，该绑定将从浏览器调用函数代码。让我们向存储队列添加一个输出绑定。打开\
  \ Function.java 文件，如图 3-9 所示。\n\n![](img/523943_1_En_3_Fig9_HTML.jpg)\n\n表示 Function.java\
  \ 文件位置的截图。\n\n图 3-9\n\nFunction.java 文件位置\n\n\n\n将现有代码替换为清单 3-2 中的代码。我们添加了一个队列输出绑定，该绑定与连接字符串名称为\
  \ *AzureWebJobsStorage* 的存储帐户集成。稍后，我们将在 Azure 函数应用 *Configuration* 中设置 *AzureWebJobsStorage*\
  \ 的值。可以看到，我们使用属性 *QueueOutput* 进行声明式配置来连接到存储队列，无需编写大量代码。*queuename* 参数值指定了存储帐户中的队列名称。代码行\
  \ `msg.setValue(\"Name received : \"+name);` 将消息添加到队列中。\n\n```\npackage com.myfunc;\n\
  import com.microsoft.azure.functions.ExecutionContext;\nimport com.microsoft.azure.functions.HttpMethod;\n\
  import com.microsoft.azure.functions.HttpRequestMessage;\nimport com.microsoft.azure.functions.HttpResponseMessage;\n\
  import com.microsoft.azure.functions.HttpStatus;\nimport com.microsoft.azure.functions.OutputBinding;\n\
  import com.microsoft.azure.functions.annotation.AuthorizationLevel;\nimport com.microsoft.azure.functions.annotation.FunctionName;\n\
  import com.microsoft.azure.functions.annotation.HttpTrigger;\nimport com.microsoft.azure.functions.annotation.QueueOutput;\n\
  import java.util.Optional;\n/**\n* Azure Functions with HTTP Trigger.\n*/\npublic\
  \ class Function {\n/**\n* This function listens at endpoint \"/api/HttpExample\"\
  . Two ways to invoke it using \"curl\" command in bash:\n* 1\\. curl -d \"HTTP Body\"\
  \ {your host}/api/HttpExample\n* 2\\. curl \"{your host}/api/HttpExample?name=HTTP%20Query\"\
  \n*/\n@FunctionName(\"HttpExample\")\npublic HttpResponseMessage run(\n@HttpTrigger(\n\
  name = \"req\",\nmethods = {HttpMethod.GET, HttpMethod.POST},\nauthLevel = AuthorizationLevel.ANONYMOUS)\n\
  HttpRequestMessage> request,\n@QueueOutput(\nname = \"msg\",\nqueueName = \"outqueue\"\
  ,\nconnection = \"AzureWebJobsStorage\")\nOutputBinding msg,\nfinal ExecutionContext\
  \ context) {\ncontext.getLogger().info(\"Java HTTP trigger processed a request.\"\
  );\n// Parse query parameter\nfinal String query = request.getQueryParameters().get(\"\
  name\");\nfinal String name = request.getBody().orElse(query);\n//Set value to the\
  \ Queue.\nmsg.setValue(\"Name received : \"+name);\nif (name == null) {\nreturn\
  \ request.createResponseBuilder(HttpStatus.BAD_REQUEST).body(\"Please pass a name\
  \ on the query string or in the request body\").build();\n} else {\nreturn request.createResponseBuilder(HttpStatus.OK).body(\"\
  Hello, \" + name).build();\n}\n}\n}\n清单 3-2\nFunction.java\n```\n\n我们已为函数添加了一个 QueueOutput\
  \ 绑定。还需要编辑测试类。打开 *FunctionTest.java* 类，并将代码替换为清单 3-3 中的代码。我们正在替换 *Function().run*\
  \ 方法调用，以包含我们在参数中创建的输出绑定。\n\n```\npackage com.myfunc;\nimport com.microsoft.azure.functions.*;\n\
  import org.mockito.invocation.InvocationOnMock;\nimport org.mockito.stubbing.Answer;\n\
  import java.util.*;\nimport java.util.logging.Logger;\nimport org.junit.jupiter.api.Test;\n\
  import static org.junit.jupiter.api.Assertions.*;\nimport static org.mockito.ArgumentMatchers.*;\n\
  import static org.mockito.Mockito.*;\n/**\n* Unit test for Function class.\n*/\n\
  public class FunctionTest {\n/**\n* Unit test for HttpTriggerJava method.\n*/\n\
  @Test\npublic void testHttpTriggerJava() throws Exception {\n// Setup\n@SuppressWarnings(\"\
  unchecked\")\nfinal HttpRequestMessage> req = mock(HttpRequestMessage.class);\n\
  final Map queryParams = new HashMap();\nqueryParams.put(\"name\", \"Azure\");\n\
  doReturn(queryParams).when(req).getQueryParameters();\nfinal Optional queryBody\
  \ = Optional.empty();\ndoReturn(queryBody).when(req).getBody();\ndoAnswer(new Answer()\
  \ {\n@Override\npublic HttpResponseMessage.Builder answer(InvocationOnMock invocation)\
  \ {\nHttpStatus status = (HttpStatus) invocation.getArguments()[0];\nreturn new\
  \ HttpResponseMessageMock.HttpResponseMessageBuilderMock().status(status);\n}\n\
  }).when(req).createResponseBuilder(any(HttpStatus.class));\nfinal ExecutionContext\
  \ context = mock(ExecutionContext.class);\ndoReturn(Logger.getGlobal()).when(context).getLogger();\n\
  // Invoke\nfinal OutputBinding msg = (OutputBinding)mock(OutputBinding.class);\n\
  final HttpResponseMessage ret = new Function().run(req, msg, context);\n// Verify\n\
  assertEquals(ret.getStatus(), HttpStatus.OK);\n}\n}\n清单 3-3\nFunctionTest.java\n\
  ```\n\n现在让我们修改 *pom.xml* 文件。您可以选择将资源组名称、函数应用名称和函数位置替换为您选择的值，如清单 3-4 所示。我们需要确保函数应用名称是唯一的，并且没有其他\
  \ Azure 函数使用此名称。例如，您可以使用 *myfunc-demo-28*。如果 Azure 基础设施中没有人占用此名称，则不会出现任何错误，您可以使用它。\n\
  \n```\n\n4.0.0\ncom.myfunc\nfuncdemo\n1.0-SNAPSHOT\njar\nAzure Java Functions\n\n\
  UTF-8\n\n1.14.1\n1.4.2\nmyfunc-demo-28\n\ncom.microsoft.azure.functions\nazure-functions-java-library\n\
  ${azure.functions.java.library.version}\n\norg.junit.jupiter\njunit-jupiter\n5.4.2\n\
  test\n\norg.mockito\nmockito-core\n2.23.4\ntest\n\norg.apache.maven.plugins\nmaven-compiler-plugin\n\
  3.8.1\n\n${java.version}\n${java.version}\n${project.build.sourceEncoding}\n\ncom.microsoft.azure\n\
  azure-functions-maven-plugin\n${azure.functions.maven.plugin.version}\n\n${functionAppName}\n\
  \nrg-myjavafunc-demo\n\njava-functions-app-service-plan\n\nwestus\n\n-->\n\n-->\n\
  \nwindows\n\nFUNCTIONS_EXTENSION_VERSION\n~3\n\npackage-functions\n\npackage\n\n\
  maven-clean-plugin\n3.1.0\n\nobj\n\n清单 3-4\npom.xml\n```\n\n让我们使用以下 Maven 命令构建并打包\
  \ Azure 函数代码，如清单 3-5 所示。\n\n```\nmvn clean package\n清单 3-5\n构建并打包函数应用\n```\n\n使用以下\
  \ Azure CLI 命令登录到 Azure，如清单 3-6 所示。\n\n```\naz login\n清单 3-6\n登录到 Azure\n```\n\n\
  选择您的订阅，如清单 3-7 所示。\n\n```\naz account set -s \"Your Subscription\"\n清单 3-7\n选择订阅\n\
  ```\n\n执行以下命令，如清单 3-8 所示。\n\n```\nmvn azure-functions:deploy\n清单 3-8\n将函数部署到 Azure\n\
  ```\n\n注意\n\n在 WSL 中，Azure 登录的默认身份验证类型是 DEVICE_CODE。我们需要打开浏览器，输入设备代码，然后登录。CMD 的默认身份验证类型是\
  \ Azure CLI。如果您已登录，则无需额外登录。\n\n如果遇到名称冲突错误，则必须将 *pom.xml* 中的 *functionAppName* 更改为唯一名称，然后再次运行\
  \ `mvn clean package` 和 `mvn azure-functions:deploy`。\n\n构建完成后，复制函数 URL，如图 3-10\
  \ 所示。稍后我们将使用此 URL 从浏览器调用 Azure 函数。\n\n\n\n![](img/523943_1_En_3_Fig10_HTML.jpg)\n\
  \n表示功能 URL 的截图。\n\n图 3-10\n\n功能 URL\n\n导航到我们创建的 Azure Function。你可以在 POM 文件中提供的资源组内找到它。进入\
