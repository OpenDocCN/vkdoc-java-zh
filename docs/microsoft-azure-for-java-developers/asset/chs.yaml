  \ 文件将生成在 target 文件夹内。构建成功后会自动创建 target 文件夹。让我们使用以下代码清单创建 Docker 文件。该文件应命名为 *Dockerfile*，不带任何扩展名。请确保在应用\
  \ pom.xml 文件所在的目录中创建如清单 4-4 所示的 Docker 文件。Docker 文件使用 *openjdk:11* 作为基础镜像。它会将应用\
  \ JAR 文件复制到 /usr/app 文件夹。请确保将下面列出的 Docker 文件中的 JAR 名称替换为在 target 文件夹中为您生成的 JAR 文件的名称。然后，它将暴露端口\
  \ 8080，并将应用 JAR 文件定义为入口点，以便容器启动时 JAR 文件随之启动。\n\n```\nFROM openjdk:11\nCOPY target/aksdemo-0.0.1-SNAPSHOT.jar\
  \ /usr/app/\nWORKDIR /usr/app\nEXPOSE 8080\nENTRYPOINT [\"java\",\"-jar\",\"aksdemo-0.0.1-SNAPSHOT.jar\"\
