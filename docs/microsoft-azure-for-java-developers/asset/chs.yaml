  ## 总结


  在本章中，我们运用了本书中学到的概念来设计和开发一个复杂的用例。我们探索了 IntelliJ Azure 插件，用于构建 Java 应用程序并将其部署到 Azure
  WebApp。我们在一个 Spring Boot 应用程序中应用了多个概念，例如从 Azure SQL 读取数据、使用 Azure AD 进行身份验证、使用 Application
  Insights 监控应用程序，以及部署到 Azure WebApp。




