- '# 7.  Java 应用程序中的 Azure SQL


  应用程序使用关系数据库来存储数据。我们需要设置一个关系数据库服务器，并将应用程序数据库托管在该服务器上。Azure 提供了一个 SQL 数据库，它是一种平台即服务产品。你无需购买任何服务器基础设施或在云上创建虚拟机来安装
  SQL 服务器。相反，你需要在 Azure 上预配 SQL 数据库服务并开始使用该数据库。当你不再需要该数据库时，可以停用该服务。


  在上一章中，我们学习了 Azure 存储服务的概念。然后，我们创建了一个基于 Java 的应用程序，并使用了 Azure 存储服务。在本章中，我们将学习 Azure
  SQL 数据库服务的详细信息，然后我们将预配 Azure SQL 数据库，并从 Java 应用程序代码中使用 Azure SQL 数据库。


  ## 结构


  在本章中，我们将讨论 Azure 存储服务的以下方面：


  *   Azure SQL 数据库简介


  *   创建 Azure SQL 数据库


  *   使用 Azure SQL 数据库


  *   保护 Azure 数据库


  ## 目标


  学习本章后，你应该能够获得以下知识：


  *   理解 Azure SQL 数据库的概念


  *   从 Java 应用程序使用 Azure SQL 数据库




  ## Azure SQL 数据库简介


  Azure 提供 Microsoft SQL、MySQL、PostgreSQL 和 MariaDB 等关系型数据库，作为平台即服务（Platform-as-a-Service）产品。Azure
  平台管理这些数据库的底层服务器基础设施。您可以在几分钟内创建这些数据库并开始使用。这些数据库中存储的数据具有高度可扩展性、安全性和可用性。您可以根据计算需求和期望的性能级别来配置数据库。


  底层 Azure 平台管理所有数据库活动，如备份、修补和升级。Azure SQL 数据库始终运行在 Microsoft SQL Server 引擎的最新稳定版本上。每当有新稳定版本可用时，底层平台会自动更新
  SQL 数据库引擎，无需人工干预。它具有高可用性，可提供 99.99% 的可用性。


  您可以选择部署一个由底层 Azure 平台完全管理的单一数据库，该数据库保证与其他数据库隔离；或者选择在弹性池中运行多个单一数据库，共享 CPU 和内存等计算资源。您可以使用基于
  vCore 的购买模型来配置 SQL 数据库，根据需求预留内存量、vCore 数量和存储速度。您也可以为 SQL 数据库选择基于 DTU 的购买模型，根据需求选择
  DTU 数量。Azure SQL 还提供无服务器购买模型。您只需在 SQL 数据库被使用且存在数据库事务时才需要付费。对于无服务器数据库，当没有事务时，数据库会进入空闲状态，并在有数据库事务时唤醒。


  注意


  DTU 代表数据库事务单位（Database Transaction Unit），是一个基于 CPU、内存和数据 I/O 性能规格组合的数字。


  Azure SQL 数据库不支持 Microsoft SQL Server 的某些功能，如链接服务器、SQL 代理、SQL 数据同步、SQL 审计、Service
  Broker 等。如果您正在使用这些功能，将本地 SQL Server 数据库直接迁移到 Azure 可能会面临挑战。但是，在这种情况下，您可以使用 Azure
  SQL 托管实例，它支持 Azure 上几乎所有本地 SQL Server 企业版的功能。Azure SQL 托管实例也是 Azure 上的一种平台即服务关系型数据库产品。您可以使用
  Azure SQL 托管实例获得原生虚拟网络集成，这是 Azure SQL 数据库所不支持的。然而，SQL Server Analysis Services (SSAS)
  和 SQL Server Reporting Services (SSRS) 等功能不受 Azure SQL 托管实例和 Azure SQL 数据库支持。


