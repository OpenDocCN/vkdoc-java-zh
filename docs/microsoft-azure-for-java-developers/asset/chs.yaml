  | 计算 | 虚拟机、Web 应用、函数应用、Kubernetes |

  | 数据 | SQL、MySQL、Cosmos DB |

  | 存储 | Blob 存储、队列存储、文件存储、Data Lake |

  | 网络 | 虚拟网络、防火墙、负载均衡器 |

