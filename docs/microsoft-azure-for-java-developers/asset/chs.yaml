- '# 12. 使用 Azure Active Directory 进行身份验证和授权


  应用程序应允许经过身份验证的用户访问。经过身份验证的用户应能访问其被授权的应用程序模块，并在应用程序中执行允许的活动。Azure Active Directory
  是 Azure 上的一个身份提供程序，可供托管在 Azure、本地或任何其他公有云或私有云上的应用程序用于身份验证和授权。


  在上一章中，我们学习了 Azure Monitor 和 Application Insights 的基本概念。然后，我们创建了一个 Java 应用程序，该应用程序可以使用
  Azure Monitor 生成性能指标，并使用 Azure Application Insights 为应用程序生成日志。在本章中，我们将使用 Spring
  Security 和 Azure Active Directory 来保护一个 Java 应用程序。


  ## 结构


  在本章中，我们将讨论 Azure Active Directory 的以下方面。


  *   Azure Active Directory 简介


  *   为身份验证和授权配置 Azure Active Directory


  *   配置 Java Spring Boot 应用程序


  *   Azure AD 的身份验证场景


  ## 目标


  学习本章后，您应能获得以下知识：


  *   理解 Azure Active Directory 的概念


  *   使用 Azure Active Directory


  *   使用 Azure Active Directory 为 Java Spring Boot 应用程序配置身份验证和授权


  ## Azure Active Directory 简介


  Azure Active Directory 是 Azure 上的一项身份即服务（IDaaS）产品。它在 Azure 上提供企业级的身份管理解决方案。Azure
  Active Directory 提供多租户目录管理服务。您还可以使用 AD Connect 将本地 Active Directory 集成到 Azure Active
  Directory，并将本地目录中的所有用户、组和角色同步到 Azure。您可以将其用作 Azure 上的域控制器，并将您的 Azure 虚拟机加入其中。


  Azure Active Directory 帮助您管理在 Azure、本地或任何其他云上运行的应用程序的用户身份验证和授权。它提供诸如单点登录、多重身份验证以及其他现代身份管理和治理产品等功能。您可以使用
  SAML、OAuth、OpenID Connect 或 WS-Federation 来对应用程序用户进行身份验证和授权。


  它支持集成 B2B 场景，即另一个业务组织可以进行身份验证、协作并消费该业务组织的服务。它还支持 B2C 场景，即最终客户可以进行身份验证、协作并消费该业务组织的服务。


  Azure Active Directory 是一项平台即服务产品，您只需配置和使用域和身份服务，无需构建和管理任何基础架构。


