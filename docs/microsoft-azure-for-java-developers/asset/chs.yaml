  在本章中，我们学习了 Application Insights 和 Azure Monitor 的基础知识。我们学习了如何为 Azure Monitor 指标配置仪表板和警报。随后，我们开发了一个基于
  Maven 的 Java 代码，并将日志推送到了 Application Insights。在下一章中，我们将学习如何使用 Azure Monitor 对应用程序用户进行身份验证。


  以下是本章的关键要点：


  *   Azure Monitor 帮助您从 Azure、本地或任何其他云平台上的应用程序和基础架构中收集性能指标和日志数据。


  *   Application Insights 帮助您监控并收集在 Azure、本地或任何其他云上运行的应用程序的日志和性能指标数据的见解。


  *   Application Insights 可以与使用各种编程语言和框架（如 .NET、Java、Python、PHP 等）开发的应用程序集成。


