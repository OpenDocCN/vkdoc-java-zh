  \ 0。\n\n图 2-19\n\n横向缩放 WebApp\n\n## 总结\n\n在本章中，我们学习了 Azure WebApp 的详细信息，然后探讨了什么是应用服务计划以及\
  \ Azure WebApp 的其他功能。我们预配了一个 Azure WebApp，然后使用 Maven 插件将 Java Spring Boot 应用程序部署到了\
  \ Azure WebApp。我们还从高层次了解了 Azure WebApp 的缩放。在下一章中，我们将学习 Azure Functions 的基础知识，然后构建一个基于\
  \ Java 的 Azure Function。\n\n以下是本章的关键要点：\n\n*   Azure WebApp 是 Azure 上的一种平台即服务产品。您可以构建基于\
  \ HTTP 的应用程序和服务，并将其托管在 Azure WebApp 上。\n\n*   您无需担心创建和管理底层托管基础设施，Azure 平台会为您处理这些。\n\
  \n*   应用服务计划定义了 Azure WebApp 的计算资源、缩放、部署槽位、定价层和其他必要功能。\n\n*   Azure WebApp 的应用服务计划提供以下定价层。\n\
  \    *   共享计算\n\n    *   专用计算\n\n    *   隔离\n\n*   您可以使用 Maven 插件将 Java Spring Boot\
  \ 应用程序部署到 Azure WebApp。\n\n# 3. 基于 Java 的 Azure Functions\n\nAzure Functions 是 Azure\
  \ 上的无服务器产品。它们最适合运行短时间执行并执行业务逻辑的代码。Azure Functions 可以用作应用程序的后台工作进程并执行后台作业。它们还可以执行从简单到高度复杂的业务逻辑，并像\
  \ API 一样被使用。Azure Functions 功能强大，可以部署基于微服务等复杂架构的现代应用程序。Azure Functions 可用于托管微服务架构中的服务。\n\
  \n在上一章中，我们学习了 Azure WebApp 的基础知识。然后我们开发了一个 Java Spring Boot 应用程序，并使用 Maven 插件将其部署到了\
  \ Azure WebApp。在本章中，我们将学习 Azure Functions 的详细信息，然后构建一个基于 Java 的 Azure Function。\n\
  \n## 结构\n\n在本章中，我们将讨论 Java 在 Azure WebApp 中的以下方面：\n\n*   无服务器和 Azure Functions 简介\n\
  \n*   Azure Functions 用例\n\n*   托管计划\n\n*   触发器和绑定\n\n*   构建基于 Java 的 Azure Function\n\
  \n## 目标\n\n学习完本章后，您应该能够获得以下知识：\n\n*   理解 Azure Functions 的概念\n\n*   构建基于 Java 的\
  \ Azure Function\n\n\n\n## 无服务器计算与 Azure Functions 简介\n\n如今，云上的无服务器架构正日益流行。许多现代应用（如微服务）都采用基于无服务器的云托管方式。与平台即服务和基础设施即服务托管模式相比，无服务器托管成本更低。你只需在服务执行任务时付费，如果服务处于空闲状态且未执行任何活动，则无需支付任何费用。你可以开发应用程序并将其部署到无服务器服务上，无需担心底层托管基础设施。Azure\
  \ 平台将预配和管理无服务器服务运行所需的基础设施。扩展是任何应用的重要方面，无论它运行在云端还是本地。无服务器服务可以轻松自动地横向扩展，无需你进行任何配置。你无法控制无服务器服务的扩展方式。无服务器服务会感知传入的工作负载，并根据传入流量进行横向扩展。\n\
  \n以下是 Azure 上提供的一些流行的无服务器服务：\n\n*   Azure Functions\n*   Durable Functions\n*  \
  \ Azure Logic Apps\n*   Azure Event Grid\n*   Azure Serverless SQL\n*   Azure Serverless\
  \ Kubernetes Service\n*   Azure Serverless Cosmos DB\n\nAzure Functions 是 Azure\
  \ 上的函数即服务产品，属于无服务器服务。你可以构建代码并将其托管在 Azure Functions 上。当 Azure Functions 执行时，你会被计费；当它们空闲时，则不会收费。Azure\
  \ Function 运行的底层基础设施以及扩展方面都由底层 Azure 平台管理。Azure Functions 支持运行短时间执行的代码。但是，你可以选择合适的托管计划，让应用程序运行更长时间。表\
  \ 3-1 展示了基于所选 Function 运行时的编程语言支持。在撰写本书时，目前支持四个运行时版本。\n\n表 3-1\nAzure Functions\
  \ 运行时及支持的编程语言\n\n| 编程语言 | 运行时 1.x | 运行时 2.x | 运行时 3.x | 运行时 4.x |\n| --- | --- |\
  \ --- | --- | --- |\n| C# | .NET 4.8 | .NET Core 2.1 | .NET Core 3.1, .NET 5 | .NET\
  \ 6 |\n| JavaScript | Node.js 6 | Node.js 10, 8 | Node.js 14, 12, 10 | Node.js 14,\
  \ 16 |\n| F# | .NET 4.8 | .NET Core 2.1 | .NET Core 3.1 | .NET 6 |\n| Java | 不支持\
  \ | Java 8 | Java 11, 8 | Java 11, 8 |\n| PowerShell | 不支持 | PowerShell Core 6 |\
  \ PowerShell 7, Core 6 | PowerShell 7 |\n| Python | 不支持 | Python 3.7, 3.6 | Python\
  \ 3.9, 3.8, 3.7, 3.6 | Python 3.9, 3.8 |\n| Typescript | 不支持 | 支持 | 支持 | 支持 |\n\n\
  Azure Functions 基于 Azure WebJobs 构建。然而，Azure WebJobs 作为后台工作进程运行，并且始终与 Azure WebApp\
  \ 共享应用服务计划。Azure Functions 有自己的托管计划。你也可以在同一个应用服务计划上托管多个 Azure Functions。\n\nAzure\
  \ Functions 在受到支持的触发器触发时执行。它们完成执行后进入空闲状态。Azure Functions 仅在再次被触发时才会唤醒并投入运行。\n\n\
  ## Azure Functions 用例\n\n以下是你可以使用 Azure Functions 的几种场景。然而，Azure Functions 可以适用于广泛的场景，帮助你构建基于云的现代无服务器应用程序。\n\
  \n*   你可以使用 Azure Functions 构建 n 层应用程序。你可以将业务和数据访问逻辑分解成更小的块，并将每个块托管在一个 Azure Function\
  \ 中。\n*   你可以在 Azure Functions 中运行后台处理作业。\n*   你可以使用 Azure Functions 和 Durable Functions\
  \ 构建基于工作流的应用程序，其中你可以使用 Azure Durable Functions 和 Azure Functions 来编排每个工作流步骤。\n*\
  \   你可以使用 Azure Functions 构建基于微服务的应用程序。每个 Azure Function 可以托管一个业务服务。\n*   你可以使用\
  \ Azure Functions 构建基于计划的应用程序，这些应用程序在特定的时间间隔、一天中的特定时间、一个月或一年中运行。\n*   你可以构建通知系统，以触发\
  \ Azure Function，根据条件和事件通知最终用户或系统。\n*   你可以在物联网场景中使用 Azure Functions 执行业务活动，或处理接收到的数据并将其放入存储中，或将其发送到下一组处理流程。\n\
  *   你可以在事件驱动场景中使用 Azure Functions 和 Azure Event Grid，这些函数可以被触发并执行任务。\n\n## 托管计划\n\
  \n托管计划决定了 Azure Functions 运行的底层基础设施。它们决定了 Azure Functions 的扩展需求、执行间隔、虚拟网络集成以及许多其他重要方面。你可以根据计算需求（如内存使用、CPU\
  \ 使用等）为 Azure Function 选择托管计划。此外，在决定所需的托管计划时，你还需要将扩展需求、执行超时和虚拟网络集成作为其他重要因素加以考虑。以下是\
  \ Azure Functions 支持的托管计划。\n\n### 消费计划\n\n消费计划是一个纯粹的无服务器计划。你无法控制托管和扩展基础设施。根据传入流量，它会在运行时添加额外的实例，当负载减少时，它会关闭多余的实例。此计划具有成本效益，因为你仅在\
  \ Function 执行时付费，当 Function 空闲且未执行任何任务时，你不会产生任何费用。Function 默认可以执行五分钟，你可以将其设置为最长执行十分钟。\n\
  \n当 Function 不执行时，它会进入睡眠或空闲状态。每当它再次被触发时，它就会投入运行并开始执行。但是，Function 在被触发后不会立即开始执行。由于\
  \ Function 需要从空闲状态唤醒并准备好服务请求，因此会存在延迟。这种延迟被称为冷启动现象，我们在使用此计划时会遇到。\n\n### 高级计划\n\n\
  高级计划确保 Azure Function 的实例始终保持预热状态并准备好服务请求。这将避免冷启动现象。与消费计划一样，你无法控制 Function 的扩展方式。但是，你对\
  \ Azure Function 运行的底层基础设施拥有更大的控制权。你可以为计划选择 SKU，例如 EP1、EP2 或 EP3，并为 Function 选择计算需求。你可以配置\
  \ Azure Function 在虚拟网络中运行。使用高级计划，Azure Functions 默认可以执行 30 分钟，你可以将其配置为永不超时。\n\n\
  ### 专用计划\n\n专用计划与 WebApp 应用服务计划相同。使用此计划时，Azure Functions 可以持续运行，永远不会进入空闲状态。此计划将使你的\
  \ Function 像 WebApp 一样运行，并且不是无服务器计划。你可以根据 CPU 使用率、内存和其他计算需求选择应用服务计划 SKU，并且可以配置自动扩展或手动扩展，从而完全控制\
  \ Function 的扩展方式。\n\n### 应用服务环境计划\n\n此计划提供专用计划的所有功能。它还有助于在虚拟网络内的隔离环境中运行你的 Azure\
  \ Function。你可以获得安全的网络、高扩展性和计算能力。\n\n### Kubernetes 计划\n\n此计划在 Azure Kubernetes 服务内部运行\
  \ Azure Functions，并帮助在 Kubernetes 集群内持续运行 Azure Functions。\n\n\n\n## 触发器与绑定\n\n\
  触发器可将 Azure Functions 从空闲状态唤醒并触发其执行。Azure Functions 可由多种服务触发，这些服务触发 Azure Functions\
  \ 并将待处理的数据作为有效负载触发器输入进行传递。每个 Azure Functions 只能有一个触发器。在某些场景下，你的 Azure Function 可能需要与外部服务交互。例如，它可能需要从\
  \ Azure Blob 获取数据，进行处理，然后将其放回 Azure 存储队列。当你的 Function 需要与其他 Azure 或非 Azure 服务交换数据时，绑定可以帮助你。\n\
  \n你无需编写大量代码即可实现触发器和绑定。你可以为 Azure Function 以声明方式创建触发器和绑定。这种声明式方法使你无需编写与 Function\
  \ 代码中的其他服务交互所需的复杂代码和逻辑。触发器始终是单向的，并且是 Azure Function 的输入。绑定是双向的，可以是 Azure Function\
  \ 的输入或输出。\n\n图 3-1 演示了 Azure Function 如何使用触发器和绑定。当项目添加到 Azure Cosmos DB 时，它会触发 Azure\
  \ Function。Azure Function 使用绑定与 Blob 存储交互，获取 blob 数据进行处理。它处理 blob 数据，并使用输出绑定将其发送到事件中心。\n\
  \n![](img/523943_1_En_3_Fig1_HTML.jpg)\n\nAzure Functions 中触发器和绑定的表示。\n\n图 3-1\n\
  \nAzure Functions 中的触发器和绑定 以下是 Azure Functions Runtime 1.x 支持的触发器：\n\n*   Blob 存储\n\
  \n*   Azure Cosmos DB\n\n*   Event Grid\n\n*   Event Hubs\n\n*   HTTP 和 webhooks\n\
  \n*   IoT Hub\n\n*   队列存储\n\n*   Service Bus\n\n*   计时器\n\n以下是 Azure Functions Runtime\
  \ 2.x 及更高版本支持的触发器：\n\n*   Blob 存储\n\n*   Azure Cosmos DB\n\n*   Dapr\n\n*   Event\
  \ Grid\n\n*   Event Hubs\n\n*   HTTP 和 webhooks\n\n*   IoT Hub\n\n*   Kafka\n\n\
  *   队列存储\n\n*   RabbitMQ\n\n*   Service Bus\n\n*   计时器\n\n以下是 Azure Functions Runtime\
  \ 1.x 支持的绑定及其支持的输入和输出方向：\n\n*   Blob 存储（输入、输出）\n\n*   Azure Cosmos DB（输入、输出）\n\n\
  *   Event Grid（输出）\n\n*   Event Hubs（输出）\n\n*   HTTP 和 webhooks（输出）\n\n*   IoT Hub（输出）\n\
  \n*   移动应用（输入、输出）\n\n*   通知中心（输出）\n\n*   队列存储（输出）\n\n*   SendGrid（输出）\n\n*   Service\
  \ Bus（输出）\n\n*   表存储（输入、输出）\n\n*   Twilio（输出）\n\n以下是 Azure Functions Runtime 2.x\
  \ 及更高版本支持的绑定及其支持的输入和输出方向：\n\n*   Blob 存储（输入、输出）\n\n*   Azure Cosmos DB（输入、输出）\n\n\
  *   Event Grid（输出）\n\n*   Event Hubs（输出）\n\n*   HTTP 和 webhooks（输出）\n\n*   IoT Hub（输出）\n\
  \n*   队列存储（输出）\n\n*   SendGrid（输出）\n\n*   Service Bus（输出）\n\n*   表存储（输入、输出）\n\n\
  *   Twilio（输出）\n\n*   Dapr（输入、输出）\n\n*   Kafka（输出）\n\n*   RabbitMQ（输出）\n\n*   SignalR（输入、输出）\n\
  \n你不能使用消耗计划创建 Kafka 和 RabbitMQ 触发器。Dapr 触发器适用于 Azure Kubernetes 服务。\n\n## 构建基于 Java\
  \ 的 Azure Function\n\n让我们创建一个由 HTTP 触发器调用的 Azure Function。HTTP 触发器将帮助你通过浏览器访问 Function。我们将传递一个人的姓名作为查询字符串，然后该人的姓名将通过输出绑定保存到存储队列。\n\
  \n让我们创建一个存储帐户，Azure Function 将在其中创建一个队列并将该人的姓名作为消息放入其中。转到 Azure 门户，单击*创建资源*，如图 3-2\
  \ 所示。\n\n![](img/523943_1_En_3_Fig2_HTML.jpg)\n\nMicrosoft Azure 网站的窗口。\n\n图 3-2\n\
