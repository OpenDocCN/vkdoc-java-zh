    \ on Azure seamlessly. However, your Java application should have been developed\
    \ using Java 8 or above. If you have a legacy Java application, you should modernize\
    \ your Java application, upgrade it to Java 8 version or above, and run it on\
    \ Azure.\n\nYou may choose to build a Java application and run it on a Linux or\
    \ Windows Virtual Machine. You may also use a readily available Virtual Machine\
    \ offering like Oracle WebLogic Server from the Azure Marketplace conveniently.\
    \ Your hosting environment would be more or less similar to the on-premises server,\
    \ and you will have complete control over the hosting environment. You may also\
