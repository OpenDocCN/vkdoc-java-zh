    \ and metrics in the Azure Monitor can be analyzed and used further based on your\
    \ needs. You can gather the following insights from the logs and metrics ingested\
    \ collected by Azure Monitor:\n\n- Using Application Insights, you can get insights\
    \ into your applications.\n- Using Container Insights, you can get insights into\
    \ your containers.\n- Using Virtual Machine Insights, you can get insights for\
    \ your Virtual Machines.\n- You can get insights into your network and storage.\n\
    \nYou can analyze the ingested logs using Log Analytics and analyze the metrics\
    \ using Metrics Explorer. You can build dashboards and workbooks to visualize\
    \ the analytics and insights for the ingested logs and metrics data. You can respond\
    \ to the logs and metrics based on your analysis by creating alerts and auto-scale\
    \ settings. You can integrate with Logic Apps workflows and perform actions based\
    \ on your analytics. Figure [11-1](#523943_1_En_11_Chapter.xhtml#Fig1) demonstrates\
    \ Azure Monitor.\n\n![](images/523943_1_En_11_Chapter/523943_1_En_11_Fig1_HTML.jpg)\n\
    \nThe flowchart of Azure monitor. The inputs are applications, operating systems,\
    \ azure resources, azure subscription, and tenants, which give to Azure monitor.\
    \ The metrics and logs further provide insights, visualize, analyze, respond or\
    \ alert and integrate with workflows in the azure monitor.\n\nFigure 11-1\n\n\
    Azure Monitor\n\nApplication Insights helps you monitor and gather insights for\
    \ your logs and performance metrics data for your applications running on Azure,\
    \ on-premises, or any other cloud. It can be integrated with applications developed\
    \ using various programming languages and frameworks like .NET, Java, Python,\
