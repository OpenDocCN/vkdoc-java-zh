    Azure Active Directory），以及一个用于快速入门中心的火箭图标。


    图 10-3


    点击 Azure Active Directory


    点击 *用户*，然后点击 *新建用户*，如图 10-4 所示。我们可以在此处租户中创建一个新用户。


    ![](img/523943_1_En_10_Fig4_HTML.jpg)


    Microsoft Azure 用户配置文件窗口，包含用户信息。用户界面下有以下选项：所有用户、已删除用户、密码重置、用户设置、诊断并解决问题。活动包括登录、审核和批量操作结果。右侧选择了新用户，其中有一个用户：Abhishek
    Mishra。


    图 10-4


