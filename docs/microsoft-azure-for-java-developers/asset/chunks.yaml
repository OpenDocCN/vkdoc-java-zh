    ## Azure Monitor 与 Application Insights 简介


    Azure Monitor 可帮助您从 Azure、本地或任何其他云平台上的应用程序和基础架构中收集性能指标和日志数据。它从 Azure 服务、Azure
    订阅和 Azure 租户中收集数据。Azure Monitor 中存储的日志和指标可根据您的需求进行分析和进一步使用。您可以从 Azure Monitor
    收集的日志和指标中获取以下见解：


    *   使用 Application Insights，您可以深入了解您的应用程序。

    *   使用容器见解，您可以深入了解您的容器。

    *   使用虚拟机见解，您可以深入了解您的虚拟机。

    *   您可以深入了解您的网络和存储。


    您可以使用 Log Analytics 分析采集的日志，并使用指标浏览器分析指标。您可以构建仪表板和工作簿，以可视化采集的日志和指标数据的分析与见解。您可以通过创建警报和自动缩放设置，根据分析结果对日志和指标做出响应。您可以与
    Logic Apps 工作流集成，并根据分析结果执行操作。图 11-1 展示了 Azure Monitor。


    ![](img/523943_1_En_11_Fig1_HTML.jpg)


    Azure Monitor 的流程图。输入是应用程序、操作系统、Azure 资源、Azure 订阅和租户，这些输入提供给 Azure Monitor。指标和日志进一步提供见解、可视化、分析、响应或警报，并与
    Azure Monitor 中的工作流集成。


    图 11-1


    Azure Monitor


    Application Insights 可帮助您监控并收集在 Azure、本地或任何其他云上运行的应用程序的日志和性能指标数据的见解。它可以与使用各种编程语言和框架（如
    .NET、Java、Python、PHP 等）开发的应用程序集成。图 11-2 展示了 Application Insights。


    ![](img/523943_1_En_11_Fig2_HTML.jpg)


    Application Insights 图表提供业务和数据见解，以形成数据库和外部服务。Application Insights 组件包括警报、Power
    BI、Visual Studio、REST API 和导出。


    图 11-2


    Application Insights


    注意


    Azure Monitor 收集并分析应用程序、基础架构、操作系统、Azure 服务、租户和 Azure 订阅的数据。Application Insights
    是 Azure Monitor 的一个子集，可帮助您分析并从应用程序数据中收集见解。


    ## 配置 Azure Monitor 指标和仪表板


    让我们使用 Azure Monitor 为 Azure WebApp 配置指标。然后，我们将创建一个专用仪表板来显示这些指标。作为先决条件，我们应该事先创建一个
    WebApp。请参阅第 2 章了解如何创建 WebApp。转到 Azure 门户并搜索 *Monitor*。在搜索结果中单击 *Monitor*，如图 11-3
    所示。


    ![](img/523943_1_En_11_Fig3_HTML.jpg)


    Application Insights 图表提供业务和数据见解，以形成数据库和外部服务。Application Insights 组件包括警报、Power
    BI、Visual Studio、REST API 和导出。


    图 11-3


    搜索 Monitor


    在 Azure Monitor 中单击 *Metrics*，如图 11-4 所示。


    ![](img/523943_1_En_11_Fig4_HTML.jpg)


    Microsoft Azure 窗口的屏幕截图，其中搜索栏中提到了 monitor。下拉菜单中找到了 monitor 选项，以及其他选项，如 azure monitor
    private link scopes、azure monitors for SAP solutions 和 logz metrics data sources。


    图 11-4


    转到 Metrics


    选择订阅并展开创建 Azure WebApp 的资源组，如图 11-5 所示。


    ![](img/523943_1_En_11_Fig5_HTML.jpg)


    Microsoft Monitor 的屏幕截图。Metrics 选项在左侧菜单中显示为第四个选项。菜单中的其他选项包括概述、活动日志、警报、日志、服务健康状态和工作簿。


    图 11-5


    选择资源组


    选择 WebApp 并单击 *OK*，如图 11-6 所示。


    ![](img/523943_1_En_11_Fig6_HTML.jpg)


    选择作用域（显示浏览选项卡）的屏幕截图。选择的订阅是 visual studio enterprise，所有资源类型已选择。作用域是 r g hyphen
    func demo、r g hyphen monitor 的下拉列表（包含 safor monitor）以及 web app for monitor。选中的选项是
    web app for monitor。


    图 11-6


    选择 WebApp


    选择 CPU 时间总和的指标详细信息，如图 11-7 所示。


    ![](img/523943_1_En_11_Fig7_HTML.jpg)


    已单击新建图表选项。web app for monitor 的 Sum C P U time，其中作用域是 web app for monitor，指标命名空间是
    app service standard，指标是 C P U time 选项，聚合方式是总和。其下方是空白线条，每条线条对应不同的时间刻度。


    图 11-7


    配置指标


    让我们将此指标添加到仪表板。将指标添加到仪表板后，单击 *New chart* 以创建新指标。首先，将现有指标添加到仪表板，然后创建新指标。单击 *Save
    to Dashboard* 和 *Pin to Dashboard*，如图 11-8 所示。


    ![](img/523943_1_En_11_Fig8_HTML.jpg)


    本地时间为过去 24 小时，并包含自动加 5 分钟。保存到仪表板的下拉菜单还有 2 个选项：固定到仪表板和发送到工作簿。在下拉菜单中选择固定到仪表板选项。


    图 11-8


    添加到仪表板


    转到 *Create new* 选项卡并提供仪表板名称。单击 *Create and pin*，如图 11-9 所示。


    ![](img/523943_1_En_11_Fig9_HTML.jpg)


    现有或新建仪表板的屏幕截图。新仪表板的类型可以选择为专用或共享。仪表板名称是 my hyphen dashboard hyphen monotor hyphen
    demo。底部的提示选项是创建并固定以创建仪表板，以及取消选项。


    图 11-9


    创建仪表板


    现在单击 *New chart* 并添加一个请求总和的指标，如图 11-10 所示。


    ![](img/523943_1_En_11_Fig10_HTML.jpg)

