  raw: 'Azure resources or services that you create are arranged inside a resource
    group. A resource group is a logical container for all your resources, and resource
    groups are grouped inside subscriptions. Subscriptions define the pricing model
    for the Azure resources you are using. You need to purchase an Azure subscription
    so that you can start creating your resources. Subscriptions are further grouped
    into management groups. You can define management and governance strategies for
    your resources at either the management group level, subscription level, or resource
    group level. You can have multiple management groups inside a management group.
    However, you cannot have nested subscriptions or resource groups. Figure [1-2](#523943_1_En_1_Chapter.xhtml#Fig2)
    demonstrates how we can group resources inside the resource groups and subscriptions.


    ![](images/523943_1_En_1_Chapter/523943_1_En_1_Fig2_HTML.jpg)


    A chart representing the grouping of azure resources.


    Figure 1-2


    Grouping of Azure resources


    ## Java Support on Azure


    Azure has an excellent support for Java-based applications . You can build a Spring
    MVC or a Spring Boot or an Open Liberty or any other kind of Java application
    and can run these applications on Azure seamlessly. However, your Java application
    should have been developed using Java 8 or above. If you have a legacy Java application,
    you should modernize your Java application, upgrade it to Java 8 version or above,
    and run it on Azure.


    You may choose to build a Java application and run it on a Linux or Windows Virtual
    Machine. You may also use a readily available Virtual Machine offering like Oracle
    WebLogic Server from the Azure Marketplace conveniently. Your hosting environment
    would be more or less similar to the on-premises server, and you will have complete
    control over the hosting environment. You may also choose to build your application
    and host it on Azure WebApp. Azure WebApp is a Platform-as-a-Service offering.
    Without worrying about the underlying hosting infrastructure and software, you
    need to build your application and host it on Azure WebApp . You can build modern
    distributed Java applications using Microservices patterns and host the application
    as containers in Azure Kubernetes Service. You may also choose to run your application
    on Azure Spring Cloud. Azure Spring Cloud is a Spring Cloud offering on Azure.
    You can build robust serverless applications using Java-based Azure Functions,
    Azure Logic Apps, and other serverless offerings on Azure. In a nutshell, you
    have a wide range of possibilities available on Azure for your Java applications.


    You can integrate your Java applications with other popular Azure services like
    Azure Active Directory, Azure Redis Cache, Azure SQL, Azure Cosmos DB, Azure Cognitive
    Services, Azure Logic Apps, and many more. These services would help you build
    a cloud-native solution without needing any on-premises components for caching,
    databases, content delivery, authentication, authorization, or other concerns
    for your application.


    All popular Java editors like Eclipse, IntelliJ, and Visual Studio Code support
    deploying to Azure seamlessly. You can also package and deploy your Java application
    to Azure using Maven or Gradle. You can leverage popular DevOps tools like Azure
    DevOps or Jenkins to build Continuous Integration and Continuous Deployment of
    your application on Azure.


    You can monitor your Java application running on Azure using Azure Monitor and
    Application Insights. You can ingest your application logs to Log Analytics Workspace
    and query the logs when you need them.


    You can integrate your Java application with Azure Active Directory and enable
    authentication and authorization using OAuth for your Java application. Azure
    Active Directory is a widely accepted identity management solution on Azure. You
    can build robust enterprise-grade identity management strategies and enable popular
    identity features like single sign-on or multifactor authentication for your Java
    application using Azure Active Directory.


    Note


    Azure provides native out-of-the-box support for Java applications. Your application
    should be on Java 8 or above.


    ## Summary


    In this chapter, we learned the basics of cloud computing. We explored the different
    cloud hosting types like Infrastructure as a Service, Platform as a Service, and
    Software as a Service. We then explored Microsoft Azure and the Java support provided
    by Microsoft Azure. In the next chapter, we will learn the basics of Azure WebApp
    and then build a Spring Boot Java application, package it with Maven, and deploy
    it to Azure WebApp using Maven-based Azure Plugins.


    The following are the key takeaways from this chapter:


    *   Cloud computing is all about renting cloud hosting services from a cloud vendor.


    *   Microsoft Azure, Amazon Web Services, and Google Cloud Platform are leading
    cloud vendors today.


    *   You can host your application on the cloud either using the Infrastructure-as-a-Service
    (IaaS) model or Platform-as-a-Service (PaaS) model, or Software-as-a-Service (SaaS)
    model.


    *   Azure supports hosting Java applications seamlessly.


    *   Your Java application should be on Java 8 or above to run on Azure.


    *   You can run your Java application on a Virtual Machine or Azure WebApp or
    Azure Function or Azure Kubernetes Service, or Azure Spring Cloud.


    # 2. Java for Azure WebApp


    WebApp is a frequently used Azure service. You can build your application and
    host it inside Azure WebApp without worrying about the hosting infrastructure.
    The underlying Azure platform takes care of all the infrastructure and the hosting
    needs. WebApp helps your application go to live in no time as you can provision
    it in a few minutes and host your application. WebApp supports a wide range of
    programming languages and frameworks like .NET, Java, PHP, Node.js, and many more.
    It provides excellent out-of-the-box support for hosting Java applications.


    In the previous chapter, we learned the basics of cloud computing and the support
    of Java on Azure. In this chapter, we will learn the details of Azure WebApp,
    and then we will host a Java application inside an Azure WebApp.


    ## Structure


    In this chapter, we will discuss the following aspects of Java for Azure WebApp:


    *   Azure WebApp


    *   App Service Plan


    *   Deploy Java application on Azure WebApp


    *   Scaling Java applications hosted on Azure WebApp


    ## Objectives


    After studying this chapter, you should be able to get the following learnings:


    *   Understand the concept of Azure WebApp and App Service Plan


    *   Deploy Java applications on Azure WebApp'
