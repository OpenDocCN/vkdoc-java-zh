    Redis 演示缓存的高级设置窗口截图。从左侧面板中，“高级设置”选项卡被高亮显示。在右侧，“仅通过 SSL 访问”被拒绝，并且设置已保存。


    图 5-16


    允许 Azure Redis 缓存的非 SSL 访问


    部署完成后，浏览 `hello` API 的应用程序 URL，你可以在响应中看到存储在 Azure Redis 缓存中的值，如图 5-17 所示。


    ![](img/523943_1_En_5_Fig17_HTML.jpg)


    应用程序运行时窗口的截图。搜索选项卡包含 URL：https://spring-cloud-app-demo-demo-app.azuremicroservices.io/hello。屏幕上的输出显示：Hello
    World!!!!。


    图 5-17


    浏览在 Azure Spring Cloud 上运行的应用程序


    ## 总结


    在本章中，我们学习了 Azure Spring Cloud 的详细信息。我们学习了如何使用服务绑定将其他 Azure 服务与在 Azure Spring Cloud
    上运行的应用程序集成，并探讨了如何使用 Maven 命令将应用程序 JAR 部署到 Azure Spring Cloud。然后，我们开发了一个 Java Spring
    Boot 应用程序，并将其部署在 Azure Spring Cloud 上。在下一章中，我们将学习如何从 Java 应用程序以编程方式使用 Azure 存储。


    以下是本章的关键要点：


    *   Azure Spring Cloud 帮助你在 Azure 上托管 Spring Boot 应用程序，而无需更改代码。


    *   它可以托管 Java 和 .NET Core 应用程序。


    *   它最适合运行基于微服务的应用程序。


    *   你需要专注于构建应用程序。底层平台将处理托管需求。你需要预配 Azure Spring Cloud 服务并将应用程序部署到其上。


    *   使用服务绑定，你可以与其他 Azure 服务集成，而无需更改代码。


    # 第三部分将 Java 应用程序与流行的 Azure 服务集成


    # 6. 与 Azure 存储帐户集成


    你可能需要为应用程序在 Azure 中存储图像、文件和其他二进制大型对象数据。你可能还需要为应用程序实现基于队列的数据结构或半结构化表数据。对于所有这些需求，你都可以使用
    Azure 存储。Microsoft 提供了可在 Java 应用程序代码中使用的包，以便与你的存储帐户进行交互。


    在上一章中，我们学习了 Azure Spring Cloud 的基础知识。然后，我们创建了一个基于 Java 的应用程序，并将其托管在 Azure Spring
    Cloud 上。在本章中，我们将学习 Azure 存储服务的详细信息，然后我们将预配 Azure 存储，并从 Java 应用程序代码中使用 Azure 存储。


    ## 结构


    在本章中，我们将讨论 Azure 存储服务的以下方面：


    *   Azure 存储简介


    *   创建 Azure 存储帐户


    *   使用 Azure 存储 Blob


    *   使用 Azure 存储队列


    *   使用 Azure 存储表


    ## 目标


    学习完本章后，你应该能够做到以下几点：


    *   理解 Azure 存储服务的概念


    *   从 Java 应用程序中使用 Azure 存储服务

