    Output on the browser


    The application trace logs get ingested at runtime in Application Insights as
    in Figure [15-21](#523943_1_En_15_Chapter.xhtml#Fig21).


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig21_HTML.jpg)


    A window screenshot of application logs in application insights.


    Figure 15-21


    Application logs in Application Insights


    ## Summary


    In this chapter, we used the concepts we learned in the book to design and develop
    a complex use case. We explored the IntelliJ Azure plug-in to build and deploy
    Java applications to Azure WebApp. We applied multiple concepts like reading from
    Azure SQL, authenticating using Azure AD, monitoring applications using Application
    Insights, and deploying to Azure WebApp in a single Spring Boot application.'
