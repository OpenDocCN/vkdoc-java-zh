    选择 *创建用户*，如图 10-5 所示。


    ![](img/523943_1_En_10_Fig5_HTML.jpg)


    新建用户窗口的图示，包含创建用户和邀请用户选项。创建用户选项被选中，其内容为：在您的组织中创建新用户。该用户的用户名格式类似于 Alice@abhisekmisra.onmicrosoft.com。底部左侧显示“我想批量创建用户。帮我决定”。右侧显示邀请用户。


    图 10-5


