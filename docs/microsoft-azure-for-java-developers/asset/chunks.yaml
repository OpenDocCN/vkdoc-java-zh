    \n![](images/523943_1_En_7_Chapter/523943_1_En_7_Fig3_HTML.jpg)\n\n*A screenshot\
    \ of the creation of the SQL database. The blank columns of Subscription and Resource\
    \ group under the title Project details are highlighted. The blank columns of\
