    1.0-SNAPSHOT


    com.azure

    azure-cosmos

    4.4.0


    Listing 8-1

    POM.xml

    ```


    Inside a Cosmos DB database, data is stored inside a container, and the data stored
    should have a partition key and ID column. Let us create a Java class as in Listing
    [8-2](#523943_1_En_8_Chapter.xhtml#PC2) having the `Main` function where we can
    add the code to create a database, create a container to store student data, insert
    records to it, and read the records. Let us create a `Student` class with the
    data fields for the student data. It must have the `id` and the `partitionKey`
    fields. The data is stored in partitions for faster data access, and each of the
    partition is identified by a partition key. A combination of partition key and
    ID will uniquely identify a record.


    ```

    public class Student {

    public Student(){

    }

    private String id;

    private String name;

    private int marks;

    private String partitionKey;

    public String getName() {

    return name;

    }

    public void setName(String name) {

    this.name = name;

    }

    public int getMarks() {

    return marks;

    }

    public void setMarks(int marks) {

    this.marks = marks;

    }

    public String getPartitionKey() {

    return partitionKey;

    }

    public void setPartitionKey(String partitionKey) {

    this.partitionKey = partitionKey;

    }

    public String getId() {

    return id;

    }

    public void setId(String id) {

    this.id = id;

    }

    }

    Listing 8-2

    Student.java

    ```


    Let us add the code shown in Listing [8-3](#523943_1_En_8_Chapter.xhtml#PC3) to
    the `Main` method to connect to Azure Cosmos DB. We need to provide the endpoint
    URL and the key that we copied earlier from the Azure portal.


    ```

    String endpoint = "{Provide endpoint URL}";

    String key = "{Provide Access Key}";

    // Create connection to Database

    CosmosClient client = new CosmosClientBuilder()

    .endpoint(endpoint)

    .key(key)

    .buildClient();

    Listing 8-3

    Connect to database

    ```


    Let us create a database named `students` using the code from Listing [8-4](#523943_1_En_8_Chapter.xhtml#PC4).
    The database will only get created if it does not exist.


    ```

    // Create Database

    String databaseName = "students";

    CosmosDatabaseResponse databaseDetails = client.createDatabaseIfNotExists(databaseName);

    CosmosDatabase database = client.getDatabase(databaseDetails.getProperties().getId());

    System.out.println("Database created - " + database.getId() );

    Listing 8-4

    Create a database

    ```


    Let us create a container named `class` where we can store student data for different
    classes as in Listing [8-5](#523943_1_En_8_Chapter.xhtml#PC5). The container will
    only get created if it does not exist.


    ```

    // Create Container

    String containerName = "class";

    CosmosContainerProperties containerProperties = new CosmosContainerProperties(containerName,
    "/partitionKey");

    CosmosContainerResponse containerResponse = database.createContainerIfNotExists(containerProperties);

    CosmosContainer container = database.getContainer(containerResponse.getProperties().getId());

    System.out.println("Container created " + container.getId());

    Listing 8-5

    Create Container

    ```


    Let us insert data for four students as in Listing [8-6](#523943_1_En_8_Chapter.xhtml#PC6).


    ```

    //Insert data to the Container

    //Insert Student 1

    Student student = new Student();

    student.setId("1");

    student.setMarks(80);

    student.setPartitionKey("eight-standard");

    student.setName("Abhishek");

    CosmosItemResponse item = container.createItem(student, new PartitionKey(student.getPartitionKey()),
    new CosmosItemRequestOptions());

    //Insert Student 2

    student = new Student();

    student.setId("2");

    student.setMarks(60);

    student.setPartitionKey("ninth-standard");

    student.setName("Abhijeet");

    item = container.createItem(student, new PartitionKey(student.getPartitionKey()),
    new CosmosItemRequestOptions());

    //Insert Student 3

    student = new Student();

    student.setId("3");

    student.setMarks(70);

    student.setPartitionKey("eight-standard");

    student.setName("Sunny");

    item = container.createItem(student, new PartitionKey(student.getPartitionKey()),
    new CosmosItemRequestOptions());

    //Insert Student 4

    student = new Student();

    student.setId("4");

    student.setMarks(60);

    student.setPartitionKey("seventh-standard");

    student.setName("Abhilash");

    item = container.createItem(student, new PartitionKey(student.getPartitionKey()),
    new CosmosItemRequestOptions());

    Listing 8-6

    Insert data

    ```


    Let us read the students data stored as in Listing [8-7](#523943_1_En_8_Chapter.xhtml#PC7).


    ```

    //Query data from the container

    int pageSize = 10;

    CosmosQueryRequestOptions queryOptions = new CosmosQueryRequestOptions();

    //  Set populate query metrics to get metrics around query executions

    queryOptions.setQueryMetricsEnabled(true);

    CosmosPagedIterable studentPagedIterable = container.queryItems

    (SELECT * FROM class WHERE class.partitionKey IN (''eight-standard'', ''seventh-standard'')",
    queryOptions, Student.class);

    studentPagedIterable.iterableByPage(pageSize).forEach(resultItem -> {

    resultItem.getResults().forEach(data -> System.out.println(data.getId() + "-"
    +data.getName()+"-"+data.getMarks()));

    });

    Listing 8-7

    Read data

    ```


    Listing [8-8](#523943_1_En_8_Chapter.xhtml#PC8) is the complete code that interacts
    with the Azure Cosmos DB.'
