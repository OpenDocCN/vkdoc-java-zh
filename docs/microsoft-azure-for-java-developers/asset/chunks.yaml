- fmt: '# Introduction to Containers


    We build an application and make it ready for production use. To host the application,
    we purchase a hosting server and an operating system and install the hosting software
    and all necessary dependencies to run. Once the hosting environment is ready,
    along with the application dependencies, we host the application on the server.
    We end up spending a lot of time and effort in procuring a hosting server and
    making it ready for the application to run on it. We sometimes get into the complexities
    of configuring the hosting environment and the dependencies that further add to
    the delay. Suppose you have multiple environments in your enterprise. In that
    case, you will have to spend the same amount of effort to get the application
    up and running across multiple environments like test, acceptance, or production.


    You may choose to host your application on Virtual Machines. You can purchase
    a powerful server and run multiple Virtual Machines on the server. In the case
    of Virtual Machines, you purchase a server, install an operating system on the
    server referred to as the host operating system, and then install a virtualization
    software like `Hyper-V`. The virtualization software virtualizes the underlying
    server hardware like the CPU, RAM, disks, and other infrastructure and runs multiple
    Virtual Machines on the server. These Virtual Machines run in isolation and have
    their share of the virtualized hardware infrastructure. Each virtual machine has
    an operating system referred to as the guest operating system. You need to install
    the hosting software like `Tomcat` or `IIS`, or `node.js` and application dependencies
    on these Virtual Machines and then host your applications on these Virtual Machines.
    Here in the case of the virtual machine, you need to spend effort in preparing
    the hosting environment and making the virtual machine ready to host the application.
    This application hosting approach is almost the same as hosting your application
    on a physical server. However, the advantage you get here is that you share the
    underlying hardware infrastructure and run multiple applications in isolation
    in the Virtual Machines. This approach saves you cost.


    Containers are a smarter way of hosting your application. You can build your application,
    containerize it, and keep it in a container registry along with all necessary
    application dependencies. The container registry stores the container images.
    `Azure Container Registry` and `Docker Hub` are examples of container registry.
    You may choose to allow everyone to use your images without needing any authentication.
    You will have to store your container images in a public container registry like
    the `Docker Hub` for such scenarios. You may use a private container registry
    like `Azure Container Registry` and provide your container images to authenticated
    users who have access to the container registry.


    Once you have the container image in the container registry, you can get a server
    with an operating system and install the container runtime software like `containerd`
    or `Docker`. And then pull the container image and run it on the server. You need
    not configure the hosting environment or the application dependencies. The container
    image has the application dependencies and the hosting software along with the
    application. Once you pull the container image and run it as a container, your
    application is up and running. The container runtime virtualizes the underlying
    operating system and runs the containers as operating system threads. Figure [4-1](#523943_1_En_4_Chapter.xhtml#Fig1)
    demonstrates the difference between Virtual Machines and containers.


    ![](images/523943_1_En_4_Chapter/523943_1_En_4_Fig1_HTML.jpg)


    A diagram represents virtual machines and containers.


    **Figure 4-1** Virtual Machines and containers


    **Note**


    Containers are lightweight as compared to Virtual Machines. In the case of Virtual
    Machines, you virtualize the underlying hardware infrastructure, and the virtual
    machine has an operating system in it. In the case of containers, the server’s
    operating system is virtualized, and the containers run as operating system threads
    without needing an operating system for itself.


    # Understanding Azure Kubernetes Service


    Applications may need multiple containers to host each of their modules. Let us
    take an example of a three-tier loosely coupled application that has a user interface
    tier, a business logic tier, and a data access tier. We need to create a container
    image for the user interface tier, a container image for the business logic tier,
    and a container image for the data access tier. Then we can run each of these
    images as containers in the production environment. Think of a scenario when the
    data access container goes down. In that case, the entire application will go
    down as the business layer container will not connect with the database without
    the data access layer. Also, what will happen if there is a sudden surge in the
    incoming request for the application. We may have to add more containers to handle
    the incoming requests dynamically. These containers should be able to communicate
    securely. The container and application health should be monitored for performance
    degradation and failures. You must take care of all these concerns.


    There can be thousands of containers in an application to manage. To make your
    life easy, we have container orchestrators like `Kubernetes`, `Docker Swarm`,
    and many more. These orchestrators manage these containers and ensure that the
    containers are highly available, reliable, scalable, fault-tolerant, and secured.
    They address all the concerns we discussed for the containers in an application.
    For example, if a container dies, the orchestrator will spin up another container
    in no time to replace the container that died.


    `Kubernetes` is an open-source container orchestrator offering from Google. It
    consists of a master node or the control plane and multiple worker nodes. Your
    containers run inside the pods in the worker nodes. Virtual Machines are worker
    nodes in most cases. If you are planning to scale at a very high rate, then you
    can use serverless nodes that are `Azure Container Instances`. Serverless nodes
    can scale automatically based on incoming traffic and spin out much faster as
    compared to Virtual Machines. The control plane controls and manages the worker
    nodes. It decides which worker node to run the pods and closely monitors the pods
    and the worker nodes. You can run identical containers called replicas as a replica
    set. For example, you can have multiple pods for the data access tier in a replica
    set. If one of the replicas in a replica set goes down, other replicas are still
    available to serve the request until another replica spins up. You can configure
    your `Kubernetes` cluster to scale the pods or the worker nodes automatically
    when the incoming load increases.


    Setting up the `Kubernetes` cluster is cumbersome. You may have to spend a lot
    of effort and time to get your `Kubernetes` cluster up and running. The control
    plane is the most complex part of the `Kubernetes` cluster. Cloud providers like
    Amazon, Microsoft, and Google help you spin out the `Kubernetes` cluster in minutes.
    They provide `Kubernetes` as a service on their cloud and abstract all necessary
    complexities while spinning up the `Kubernetes` cluster and managing the control
    plane for you. You have no control over the control plane. The underlying cloud
    platform manages the control plane for you, and you can manage the worker nodes
    and the application container deployment. Such `Kubernetes` offering on cloud
    is referred to as managed Kubernetes service. `Azure Kubernetes Service` is an
    example of managed Kubernetes service on Azure.


    **Note**


    Load balancer service exposes your application on HTTP port, while node port exposes
    your application on a nonstandard port from 30000 to 32767.'
