    ## Work with Application Insights for Java Application


    Now let us spin up an Application Insights resource and push some Java logs to
    it. You need to package the Application Insights agent for Java with the application
    and pass it as the JVM argument. This action would automatically push application
    logs and performance metrics to Application Insights for popular Java-based loggers
    like Log4j, `java.util.logging`, and SLF4J without any additional configuration.


    Let us create an Application Insights. Go to the Azure portal and search for *Application
    Insights*. Click *Application Insights* in the search result as in Figure [11-29](#523943_1_En_11_Chapter.xhtml#Fig29).


    ![](images/523943_1_En_11_Chapter/523943_1_En_11_Fig29_HTML.jpg)


