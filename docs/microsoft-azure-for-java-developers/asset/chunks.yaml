- fmt: "# 邮件许可证与发送配置指南\n\n## 用户许可证分配\n\n进入邮件许可证窗口，左侧是“管理”选项，其下包含“个人资料”、“已分配角色”、“管理单元”、“组”、“应用程序”、“许可证”和“设备”等标签页，其中“许可证”已被选中。右侧显示“已分配”选项，在“产品”下未找到任何许可证分配。\n\
    \n**图 10-9**\n\n为用户分配许可证\n\n选择`Microsoft 365 E5 Developer`许可证。只有当你已购买该订阅时，此许可证才会列在此处。点击`保存`，如图\
    \ 10-10 所示。\n\n![图 10-10 选择 Microsoft 365 E5 Developer 许可证](images/523943_1_En_10_Chapter/523943_1_En_10_Fig10_HTML.jpg)\n\
    \n更新许可证分配的示意图：左侧选中“选择许可证”，其下选中了`Microsoft 365 E5 Developer (不含 Windows 和音频会议)`。左下角的“保存”标签页已被选中。右侧显示“查看许可证选项”，其下有一个选择栏。\n\
    \n**图 10-10**\n\n选择`Microsoft 365 E5 Developer`许可证\n\n## 创建服务主体\n\n现在用户已准备就绪，我们可以通过\
    \ Java 应用程序使用该用户发送邮件。我们需要一个服务主体来向 Azure 租户进行身份验证并发送电子邮件。在 Azure Active Directory\
    \ 中，点击`应用注册`，然后点击`新建注册`，如图 10-11 所示。\n\n![图 10-11 点击应用注册](images/523943_1_En_10_Chapter/523943_1_En_10_Fig11_HTML.png)\n\
    \n示意图显示`abhisekmisra`应用注册窗口。左侧包含“外部身份”、“角色和管理员”、“管理单元”、“企业应用程序”、“设备”、“应用注册”、“Identity\
    \ Governance”和“应用程序代理”等标签页，其中“应用注册”被选中。右侧的“新建注册”已被选中。在“拥有的应用程序”下找到 3 个应用程序。\n\n\
    **图 10-11**\n\n点击`应用注册`\n\n为服务主体提供一个名称，然后点击`注册`，如图 10-12 所示。\n\n![图 10-12 创建新的服务主体](images/523943_1_En_10_Chapter/523943_1_En_10_Fig12_HTML.png)\n\
    \n示意图显示“注册应用程序”窗口。该窗口包含名称输入栏，其中输入了`sp-mailer-demo`并高亮显示。其下方是“支持的帐户类型”，其中仅选中了“仅此组织目录中的帐户”，左下角是“注册”标签页，且已被选中。\n\
    \n**图 10-12**\n\n创建新的服务主体\n\n## 配置 API 权限与客户端密钥\n\n服务主体创建完成后，打开该服务主体并点击`API 权限`。点击`添加权限`，为\
    \ Microsoft Graph 添加`Mail.Send`权限，如图 10-13 所示。确保为你添加的权限授予管理员同意。\n\n![图 10-13 提供\
    \ API 权限](images/523943_1_En_10_Chapter/523943_1_En_10_Fig13_HTML.jpg)\n\n`sp-mailer-demo`\
    \ API 权限窗口。左侧的“管理”下有多个标签页，其中`API 权限`被选中。右侧显示“已配置的权限”，其中`添加权限`和`为 abhisekmisra\
    \ 授予管理员同意`被选中。`Mail.Send`（应用程序）和`以任何用户身份发送邮件`分别位于 API、类型和描述下。\n\n**图 10-13**\n\
    \n提供 API 权限\n\n现在我们需要为服务主体生成一个密钥。转到`证书和密钥`，点击`新建客户端密钥`，如图 10-14 所示。生成一个密钥并复制其值。你将在\
    \ Java 代码中使用此值进行身份验证和发送邮件。\n\n![图 10-14 为服务主体生成客户端密钥](images/523943_1_En_10_Chapter/523943_1_En_10_Fig14_HTML.jpg)\n\
    \n`sp-mailer-demo`证书和密钥窗口示意图。左侧的“管理”下有多个标签页，其中`证书和密钥`被选中。右侧显示“证书 0”和“客户端密钥 0”，后者被选中。`新建客户端密钥`标签页位于“客户端密钥\
    \ 0”下方，且已被选中。\n\n**图 10-14**\n\n为服务主体生成客户端密钥\n\n转到`概述`页面，复制`应用程序(客户端)ID`和`目录(租户)ID`，如图\
    \ 10-15 所示。我们将在 Java 代码中使用这些值。\n\n![图 10-15 复制服务主体的客户端 ID 和租户 ID](images/523943_1_En_10_Chapter/523943_1_En_10_Fig15_HTML.jpg)\n\
    \n示意图显示`sp-mailer-demo`窗口。左侧包含“概述”、“快速入门”和“集成助手”，其中“概述”被选中。右侧显示“基本信息”，其下包含“显示名称：sp-mailer-demo”、“应用程序(客户端)ID”、“对象\
    \ ID”和“目录(租户)ID”。这些 ID 使用水平条高亮显示。\n\n**图 10-15**\n\n复制服务主体的客户端 ID 和租户 ID\n\n##\
    \ 创建 Java 控制台应用程序\n\n现在用户和服务主体都已准备就绪。让我们创建基于 Maven 的 Java 控制台应用程序来发送电子邮件。\n\n\
    将 Microsoft Graph API 和 Identity 包添加到`pom.xml`文件中，如清单 10-1 所示。\n\n```xml\n<dependency>\n\
    \    <groupId>com.microsoft.graph</groupId>\n    <artifactId>microsoft-graph</artifactId>\n\
    \    <version>[5.0,)</version>\n</dependency>\n<dependency>\n    <groupId>com.azure</groupId>\n\
    \    <artifactId>azure-identity</artifactId>\n    <version>[1.3,)</version>\n\
    </dependency>\n```\n\n**清单 10-1**\n`pom.xml`\n\n转到 Java 类文件中的`main`函数，如清单 10-2\
    \ 所示，并添加以下代码。我们需要创建身份验证提供程序，该提供程序将使用服务主体客户端密钥进行身份验证，并授权代码使用我们创建的用户发送邮件。\n\n```java\n\
    String clientId = \"{Provide Client ID for Service Principal}\";\nString clientSecret\
    \ = \"Provide Secret value for Service Principal\";\nString tenantId = \"Provide\
    \ Tenant ID\";\n// You can send using the default scope.\nList<String> SCOPES\
    \ = List.of(\"https://graph.microsoft.com/.default\");\n// Build Client Credential\
    \ based on the Service Principal\nfinal ClientSecretCredential clientCredential\
    \ = new ClientSecretCredentialBuilder()\n        .clientId(clientId)\n       \
    \ .clientSecret(clientSecret)\n        .tenantId(tenantId)\n        .build();\n\
    // Build a Token Credential Auth provider that can authenticate using the Service\
    \ Principal\nfinal TokenCredentialAuthProvider tokenProvider =\n        new TokenCredentialAuthProvider(SCOPES,\
    \ clientCredential);\n```\n\n**清单 10-2**\n构建身份验证提供程序\n\n构建图形客户端以使用我们创建的身份验证提供程序，并使用该用户发送邮件，如清单\
    \ 10-3 所示。\n\n```java\n// Build the Graph Client\nfinal GraphServiceClient graph\
    \ = GraphServiceClient\n        .builder()\n        .authenticationProvider(tokenProvider)\n\
    \        .buildClient();\n```\n\n**清单 10-3**\n构建图形客户端对象\n\n现在让我们构建邮件正文和主题，并提供需要发送邮件的收件人列表，如清单\
    \ 10-4 所示。\n\n```java\n// Construct the message\nMessage message = new Message();\n\
    message.subject = \"Order Status - IX1234\";\nItemBody body = new ItemBody();\n\
    body.contentType = BodyType.HTML;\nbody.content = \"Dear Customer <br> Your order\
    \ is ready. It will be dispatched soon <br> Thanks<br>OPs Team\";\nmessage.body\
    \ = body;\nLinkedList<Recipient> to = new LinkedList<>();\nRecipient toReceiver\
    \ = new Recipient();\nEmailAddress email = new EmailAddress();\nemail.address\
    \ = \"abhisek.misra@thecloudcompute.com\";\ntoReceiver.emailAddress = email;\n\
    to.add(toReceiver);\nmessage.toRecipients = to;\n```\n\n**清单 10-4**\n构建邮件方法\n\n\
    让我们使用图形客户端对象，通过我们之前创建的用户发送邮件，如清单 10-5 所示。\n\n```java\n// Send mail. Provide the\
    \ mail address of the user we created in the Azure AD\n// and have assigned Microsoft365\
    \ Developer E5 license\ngraph.users(\"mailer@abhisekmisra.onmicrosoft.com\")\n\
    \        .sendMail(UserSendMailParameterSet\n                .newBuilder()\n \
    \               .withMessage(message)\n                .withSaveToSentItems(false)\n\
    \                .build())\n        .buildRequest()\n        .post();\n```\n\n\
    **清单 10-5**\n发送邮件\n\n以下是使用 Java 应用程序通过 Graph API 发送邮件的完整代码，如清单 10-6 所示。"
