    \ for the Azure resources you are using. You need to purchase an Azure subscription\
    \ so that you can start creating your resources. Subscriptions are further grouped\
    \ into management groups. You can define management and governance strategies\
    \ for your resources at either the management group level, subscription level,\
    \ or resource group level. You can have multiple management groups inside a management\
    \ group. However, you cannot have nested subscriptions or resource groups. Figure\
    \ [1-2](#523943_1_En_1_Chapter.xhtml#Fig2) demonstrates how we can group resources\
    \ inside the resource groups and subscriptions.\n\n![](images/523943_1_En_1_Chapter/523943_1_En_1_Fig2_HTML.jpg)\n\
