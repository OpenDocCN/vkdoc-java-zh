    ## Summary


    This chapter showed how to build and deploy a Java Spring Boot application to
    Azure WebApp using Azure DevOps. We used Git commands to check in the Java code
    to Azure Repos. We then created a YAML-based pipeline to build and deploy the
    Java application from Azure Repos to Azure WebApp. In the next chapter, we will
    learn the best cases and explore a real-time Java application on Azure.


    The following are the key takeaways from this chapter:


    - Azure Repos provides a Git repository, and you can execute Git commands to check
    in to Azure Repos.

    - You can also create a TFS-based code repository using Azure DevOps.

    - You can create a YAML-based pipeline to build Java code and deploy it to Azure.


    # 15. A Near-Production Azure-Based Java Application


    Now we have come to the end of the book. We have learned the basics of the essential
    Azure services that will come in handy while working with Java-based applications
    on Azure. We learned how to deploy Java-based applications on Azure services like
    Azure WebApp, Azure Kubernetes Service, Azure Spring Cloud, and Azure Functions.
    We also learned how to work with Azure SQL, Azure Storage, and Azure Redis Cache.
    We explored how to monitor, secure, and use Azure DevOps for automated infrastructure
    creation.


    We learned how to build and deploy Java applications to Azure services using Azure
    DevOps in the last chapter. In this chapter, we will explore the best practices
    to be followed while designing and implementing a Java-based application on Azure.
    We will also work on a near-production scenario.


    ## Structure


    In this chapter, we will discuss the following:


    - Best practices

    - Build a near-production scenario


    ## Objectives


    After studying this chapter, you should be able to get the following learnings:


    - Learn how to build a Java-based application that can be hosted on Azure.

    - Understand the best practices while working on Java applications for Azure.


    ## Best Practices


    Designing an application architecture is a crucial activity. You must consider
    the best practices while implementing the application architecture. Applications
    targeted for Azure should be planned with very high precision so that the application
    performs as expected in the Azure environment. Let us discuss a few essential
    best practices that you should consider while designing a Java-based application
    for Azure.


    - Identify the host options.

    - Modernize application and then move to Azure.

    - Choose the right Azure services for your application.

    - Plan the cloud cost meeting your budget.

    - Plan for scalability, availability, and reliability.

    - Have a robust debugging and monitoring strategy in place.

    - Secure your application on Azure.

    - Automate spinning up Azure services and application deployment.

    - Have the right backup and disaster recovery strategy in place.


    ### Identify the Host Options


    You can use App Service for Java SE, App Service for Tomcat, App Service for JBoss,
    Azure Spring Cloud, Azure Kubernetes Service, and Virtual Machines to host your
    Java application on Azure. You need to use the right service matching you need.
    For example, if you have a Spring Boot application, then you can run it on Azure
    Spring Cloud, App Service, or Virtual Machines.


    ### Modernize Application and Then Move to Azure


    You may sometimes find applications developed on older Java versions using legacy
    components not supported on Azure. You must ensure that you modernize the older
    Java applications to at least version 1.8. You must modernize your legacy application
    to a supported framework and Java version and then migrate it to Azure. Try using
    modern Java development frameworks like Spring Boot. If you have a Java application
    running on noncompatible frameworks like WebSphere Liberty, try modernizing it
    to either Open Liberty or Spring Boot for a smoother Azure migration.


    ### Choose the Right Azure Services for Your Application


    You must design the Azure infrastructure to suit the need of your application.
    If you have a distributed microservices application, try hosting it on Azure Spring
    Cloud or Azure Kubernetes Service. You can also build distributed applications
    using Azure Functions. You must use Storage Queues or Service Bus Queues to exchange
    messages across distributed services. The temporary runtime data should be stored
    in Azure Redis Cache.


    If you have a monolith, a single service, or a single container-based application,
    you must use Azure WebApp.'
