    运行在 Pod 内的应用程序容器需要暴露给最终用户，以便他们访问应用。甚至在某些场景下，你可能希望某个 Pod 仅在集群内部暴露，供另一个 Pod 使用。这类场景可以通过在集群内运行的
    Kubernetes 服务来处理。集群 IP 服务允许 Pod 进行内部通信，而负载均衡器服务和节点端口服务则允许将 Pod 暴露给最终用户。让我们回到之前讨论的三层应用示例。我们需要将用户界面层暴露给最终用户。用户界面层需要与业务逻辑层通信，而业务逻辑层则需要与数据访问层通信。业务逻辑层和数据访问层不应暴露给外部用户，其访问权限应限制在集群内部。为了解决这个场景，我们可以在用户界面层前面部署一个负载均衡器服务，从而将用户界面层暴露给最终用户。同时，可以在业务逻辑层和数据访问层前面部署集群
    IP 服务，以将其通信限制在集群内部。


    作为开发者，你需要将应用程序容器化并推送到容器注册表。然后，启动 Kubernetes 集群，并为该集群构建一个部署 YAML 文件。这个部署 YAML 文件将包含所有必要的详细信息，例如副本数量、服务、要在集群上运行的容器，以及应用程序容器在
    Kubernetes 工作节点上运行所需的其他众多细节。接着，你将此部署文件传递给控制平面。控制平面会根据你在 YAML 文件中提供的信息，将 Pod 调度到工作节点上。这些
    Pod 会从部署文件中指定的容器注册表拉取容器镜像，然后将其作为容器启动。


    ## 将 Java 应用程序容器化并在 Azure Kubernetes 服务上运行


    让我们构建一个 Java Spring Boot 应用程序，将其容器化，推送到 Azure 容器注册表，并在 Azure Kubernetes 服务集群中运行它。我们将使用
    Spring Initializr 生成 Spring Boot 应用程序，并手动创建一个 Docker 文件。


    前提条件是，你需要在本地系统上安装 Docker Desktop，以便将应用程序容器化。Docker 提供了 Docker Desktop 的社区版，供你体验
    Docker 产品并尝试使用 Docker 容器。你可以使用 Docker Desktop 社区版。


    我们将首先创建 Azure Kubernetes 服务和 Azure 容器注册表。然后，构建应用程序，将其容器化，推送到 Azure 容器注册表，最后在 Azure
    Kubernetes 服务上运行应用程序容器。


    ### 创建 Azure 容器注册表


    Azure 容器注册表是一个私有的 Docker 注册表，可以在 Azure 平台上存储容器镜像。只有拥有注册表访问权限的用户才能访问存储的镜像。它还可以存储
    Helm Chart 等工件，以及其他与开放容器倡议（OCI）规范相关的工件。让我们创建一个 Azure 容器注册表。转到 Azure 门户，点击 *创建资源*，如图
    4-2 所示。


