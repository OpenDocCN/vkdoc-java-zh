- fmt: '# Summary


    In this chapter, we learned `Application Insights` and `Azure Monitor` basics.
    We learned how to configure dashboard and alerts for `Azure Monitor` metrics.
    We then developed a `Maven`-based Java code and pushed logs to `Application Insights`.
    In the next chapter, we will learn how to authenticate application users using
    `Azure Monitor`.


    The following are the key takeaways from this chapter:


    - `Azure Monitor` helps you collect performance metrics and logs data from your
    applications and infrastructure on Azure, on-premises, or any other cloud platforms.

    - `Application Insights` helps you monitor and gather insights for your logs and
    performance metrics data for your applications running on Azure, on-premises,
    or any other cloud.

    - `Application Insights` can be integrated with applications developed using various
    programming languages and frameworks like `.NET`, `Java`, `Python`, `PHP`, etc.


    # 12. Authentication and Authorization Using Azure Active Directory


    Applications should allow access to authenticated users. The authenticated users
    should access the application modules that they are authorized for and perform
    the allowed activities in the application. `Azure Active Directory` is an identity
    provider on Azure that can be used for authentication and authorization by applications
    either hosted on Azure or on-premises or on any other public or private cloud.


    In the previous chapter, we learned the basic concept of `Azure Monitor` and `Application
    Insights`. We then created a Java application that can use `Azure Monitor` to
    generate performance metrics and `Azure Application Insights` that can generate
    logs for the application. In this chapter, we will secure a Java application using
    `Spring Security` and `Azure Active Directory`.


    ## Structure


    In this chapter, we will discuss the following aspects of `Azure Active Directory`.


    - Introduction to `Azure Active Directory`

    - Configure `Azure Active Directory` for authentication and authorization

    - Configure a Java `Spring Boot` application

    - Authentication scenarios for `Azure AD`


    ## Objectives


    After studying this chapter, you should be able to get the following learnings:


    - Understand the concept of `Azure Active Directory`

    - Work with `Azure Active Directory`

    - Configure authentication and authorization for Java `Spring Boot` application
    using `Azure Active Directory`


    ## Introduction to Azure Active Directory


    `Azure Active Directory` is an `Identity-as-a-Service` (`IDaaS`) offering on Azure.
    It provides an enterprise-grade identity management solution on Azure. `Azure
    Active Directory` offers multitenant directory management service. You can also
    integrate on-premises `Active Directory` to `Azure Active Directory` using `AD
    Connect` and sync all the users, groups, and roles in the on-premises directory
    to Azure. You can use it as a `Domain Controller` on Azure and join your `Azure
    Virtual Machines` to it.


    `Azure Active Directory` helps you manage user authentication and authorization
    for your applications running on Azure or on-premises or any other cloud. It offers
    functionalities like `Single Sign-On`, `Multifactor Authentication`, and other
    modern identity management and governance offerings. You can use `SAML`, `OAuth`,
    `OpenID Connect`, or `WS-Federation` to authenticate and authorize the application
    users.


    It supports integrating `B2B` scenarios where another business organization can
    authenticate, collaborate, and consume services of the business organization.
    It also supports `B2C` scenarios where the end customers can authenticate, collaborate,
    and consume services of the business organization.


    `Azure Active Directory` is a `Platform-as-a-Service` offering, and you just need
    to configure and use the domain and identity services without needing to build
    and manage any infrastructure.


    ## Configure Azure Active Directory for Authentication and Authorization


    Let us configure `Azure Active Directory` and use it to authenticate a user and
    authorize it to use a Java Web API. The following are the steps we will perform.
    We will use the default tenant. However, you may prefer to create a new tenant
    and use it. The following are the steps we will execute to configure `Azure Active
    Directory` for authentication and authorization.


    1. Create a user in `Azure Active Directory`.

    2. Register an application in `Azure Active Directory`.

    3. Assign the user to the application role.


    ### Create a User in Azure Active Directory


    Let us create a user in the default tenant. Go to the Azure portal. Search for
    `Azure Active Directory`. Click `Azure Active Directory` in the search results
    as in Figure [12-1](#523943_1_En_12_Chapter.xhtml#Fig1).


    ![](images/523943_1_En_12_Chapter/523943_1_En_12_Fig1_HTML.jpg)


    An image of Azure window. The top part consists of the search bar with azure active
    directory in it. The left side consists of azure services, with create a resource
    option and recent resources below. The central part of the window has the following
    options all, services 84, marketplace 4, and azure active directory 0. The services
    including azure active directory, security, and activity log are provided below.


    Figure 12-1 Search for Azure Active Directory


    You will get navigated to the Default tenant or directory. Click `Users` as in
    Figure [12-2](#523943_1_En_12_Chapter.xhtml#Fig2). We need to create a User using
    which we can perform authentication and authorization.


    ![](images/523943_1_En_12_Chapter/523943_1_En_12_Fig2_HTML.jpg)


    An image of the default directory overview. The options to the left are overview,
    preview features, diagnose and solve problems, and manage including users, and
    groups, in which users is selected. The options in the center are, add, overview
    with search field, basic information, and name.


    Figure 12-2 Click Users


    Click `New user` to create a user as in Figure [12-3](#523943_1_En_12_Chapter.xhtml#Fig3).
    We need this new user to perform authentication and authorization on the application.


    ![](images/523943_1_En_12_Chapter/523943_1_En_12_Fig3_HTML.jpg)


    An image of the users, all users window. The options on the left are, all users
    deleted users, password reset, user settings, diagnose and solve problems, and
    activity including sign-in logs. All users option is selected. The contents at
    the center consist of new user, new guest user, search users field, and list of
    users from which new user option is selected.


    Figure 12-3 Click New user


    Select `Create user` as in Figure [12-4](#523943_1_En_12_Chapter.xhtml#Fig4).
    We need to create a user in the default directory or tenant and do not need a
    guest user.


    ![](images/523943_1_En_12_Chapter/523943_1_En_12_Fig4_HTML.jpg)


    A screenshot of the new user''s default dictionary window. The two options presented
    below are create user and invite user, with the former selected. Below are the
    user credential fields, which include the user name and email address.


    Figure 12-4 Select Create user


    Provide the user''s name, password, and other necessary details. Click `Create`
    as in Figure [12-5](#523943_1_En_12_Chapter.xhtml#Fig5). A new user will get created.


    ![](images/523943_1_En_12_Chapter/523943_1_En_12_Fig5_HTML.jpg)


    An illustration of the create user window. The fields present are user name, name,
    first name, last name, password, with options such as auto generate password,
    and let me create the password, in which create password option is selected. followed
    by initial password field, and create option at the lower left corner.


    Figure 12-5 Create a user'
