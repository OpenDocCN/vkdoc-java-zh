- fmt: '# Introduction to Infrastructure as Code (IaC) on Azure


    The Azure portal helps you create Azure resources with ease. You get an intuitive
    and wizard-based user interface using which you can create your resources. However,
    you need to manually log in to the Azure portal and then provide the resource
    details in the portal and create your resource. This approach works well if you
    have a single environment. However, enterprises have multiple environments like
    development, testing, acceptance, and production. If you use the Azure portal
    to create resources across these environments, you may end up in many repetitive
    activities. You will create the resources for the application in the development
    environment and then create the same set of resources in other environments. This
    approach is effort-intensive and risks introducing errors due to the manual efforts
    involved. However, you can automate the resource creation activity and trigger
    the automation across multiple environments. This approach would save much time
    for you and would be error-free. You can get your environments created faster
    than the approach of creating resources using the Azure portal.


    The following are some popular Infrastructure-as-Code (IaC) offerings to automate
    the creation of Azure resources:


    * `Azure CLI`

    * `Azure PowerShell`

    * `ARM Templates`

    * `Terraform`

    * `Bicep`


    `Azure CLI` is a cross-platform offering where you can spin up Azure resources
    either from Windows, Linux, or Mac systems. You can run the `Azure CLI` scripts
    from a command prompt, bash prompt, or PowerShell prompt.


    `Azure PowerShell` offers you PowerShell modules that will help you spin up Azure
    resources. If you use `Azure PowerShell Core` that can run on PowerShell 6 and
    above, you can build cross-platform scripts.


    Using `ARM Templates`, you can represent the Azure infrastructure as a JSON template
    and then deploy the template to the Azure environment and spin up your Azure resources.
    Both `Azure CLI` and `Azure PowerShell` expose commands that you can use to deploy
    these templates.


    `Azure PowerShell`, `Azure CLI`, and `ARM Templates` are Microsoft offerings to
    create Azure resources. `Terraform` is a third-party offering that would help
    you script Azure resources creation.


    You can use Azure DevOps pipelines to invoke the scripts developed using `Azure
    CLI`, `PowerShell`, `Terraform`, or `ARM Templates` to spin up Azure infrastructure.
    In this case, you can build release pipelines to spin up infrastructure across
    various environments. This approach will help you build single-click automation
    that will spin up Azure infrastructure and deploy an application.


    ## Create an Azure CLI Script to Spin Up Azure WebApp


    Let us create an `Azure CLI` script to spin up Azure WebApp. As a prerequisite,
    you should install the `Azure CLI` in your system. Follow the installation steps
    provided in Listing [13-1](#523943_1_En_13_Chapter.xhtml#PC1).


    ```

    https://docs.microsoft.com/en-us/cli/azure/install-azure-cli

    Listing 13-1

    Azure CLI Installation URL

    ```


    Let us open PowerShell or command prompt or bash prompt. We need to log in to
    Azure as the first step using the command as in Listing [13-2](#523943_1_En_13_Chapter.xhtml#PC2).


    ```

    az login

    Listing 13-2

    Log in to Azure

    ```


    You will get prompted in your browser to provide your credentials as in Figure
    [13-1](#523943_1_En_13_Chapter.xhtml#Fig1).


    ![](images/523943_1_En_13_Chapter/523943_1_En_13_Fig1_HTML.jpg)


    A screenshot of Microsoft Azure''s sign-in page. The page includes a Microsoft
    logo. A blank field for email, phone, or Skype. Below the blank field, the active
    links are as follows. No account, question mark, create one. You cannot access
    your account. a question mark The bottom tabs are titled back and next, and they
    are followed by sign-in options.


    Figure 13-1


    Log in to Azure


    Once you have logged in to Azure, you need to select a subscription where you
    need to create your resources. Execute the command as in Listing [13-3](#523943_1_En_13_Chapter.xhtml#PC3)
    to select your subscription. Replace `{subscription}` with your subscription name
    or subscription ID. You can use the `az account show` command to list out all
    the subscriptions in the chapter.


    ```

    az account set -s "{subscription}"

    Listing 13-3

    Select a subscription

    ```


    You need to create a resource group inside which you can create a WebApp. You
    may choose to use an existing resource group. In that case, you can ignore this
    step. Replace `{name}` with the resource group name. Here, we are creating the
    resource group in the eastus location. You may choose to have an Azure location
    matching your need. Listing [13-4](#523943_1_En_13_Chapter.xhtml#PC4) demonstrates
    the command to create a resource group.


    ```

    az group create --location eastus --name {name}

    Listing 13-4

    Create a resource group

    ```


    We need an App Service Plan for our WebApp. Execute the command as in Listing
    [13-5](#523943_1_En_13_Chapter.xhtml#PC5) to explore how to use the create command
    for the App Service Plan. You will also learn about the various App Service Plan
    SKUs available here and other details.


    ```

    az appservice plan create --help

    Listing 13-5

    Create App Service Plan Help

    ```


    Execute the command as in Listing [13-6](#523943_1_En_13_Chapter.xhtml#PC6) to
    create an App Service Plan in the region eastus and with standard SKU (S1). Replace
    `{resourcegroup-name}` with the name of the resource group and `{name}` with the
    name of the App Service Plan.


    ```

    az appservice plan create --resource-group {resourcegroup-name} --name {name}
    --sku S1 --location eastus

    Listing 13-6

    Create an App Service Plan

    ```


    Execute the command as in Listing [13-7](#523943_1_En_13_Chapter.xhtml#PC7) to
    create a WebApp. Replace `{name}` with the name of the WebApp, `{resourcegroup-name}`
    with the name of the resource group, and `{plan-name}` with the name of the App
    Service Plan.


    ```

    az webapp create --name {name} --resource-group {resourcegroup-name} --plan {plan-name}  --runtime
    "java:11:Java SE:11"

    Listing 13-7

    Create a WebApp

    ```


    Your WebApp gets created in the resource group provided. You can use the command
    `curl -s -o /dev/null -w "%{http_code}" https://{name}.azurewebsites.net/` where
    `{name}` is the name of the WebApp. You should get response code as 200.'
