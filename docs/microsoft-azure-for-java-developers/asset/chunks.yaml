    # Part I Building and Deploying Java Applications to Azure


    # 1. Getting Started with Java Development for Azure


    Cloud is the new generation hosting environment. All modern applications developed
    using cutting-edge frameworks are hosted on the cloud. Cloud hosting helps you
    save cost and address concerns. You need not worry about building and managing
    the underlying infrastructure hosting your application. You build your application
    and host it on the cloud, thus easing the development and maintenance efforts.
    Microsoft Azure, Amazon Web Services, and Google Cloud Platform are the popular
    cloud vendors. However, there are a lot of other vendors providing cloud hosting.


    A lot of large enterprises build their application using Java, and Azure provides
    excellent support for Java. These enterprises can run their Java applications
    on Azure with ease and build robust cloud-native Java solutions running on Azure.


    ## Structure


    In this chapter, we will discuss the following aspects of Azure for Java developers:


    *   What is Cloud Computing

    *   Introduction to Azure

    *   Java support on Azure


    ## Objectives


    After studying this chapter, you should be able to get the following learnings:


    *   Understand the fundamentals of cloud computing on Azure

    *   Identify Azure services that support Java applications

    *   Identify Java frameworks that can be hosted on Azure


    ## What Is Cloud Computing'
