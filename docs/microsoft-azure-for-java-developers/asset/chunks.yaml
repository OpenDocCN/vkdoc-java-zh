    ## Configure a Spring Boot Application


    Now let us configure authentication and authorization for Java Spring Boot application
    to perform authentication and authorization. Create a Spring Boot application
    that can expose an API. You can use *Spring Intializr* to generate the project
    as we did in the previous chapters. Make sure that the `pom.xml` file contains
    the packages as listed in the following code. We need to configure Spring Security
    along with Azure Active Directory for the API project. Listing [12-1](#523943_1_En_12_Chapter.xhtml#PC1)
