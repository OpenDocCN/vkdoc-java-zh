    *   最佳实践


    *   构建一个接近生产环境的场景


    ## 目标


    学习完本章后，您应该能够获得以下知识：


    *   学习如何构建一个可以托管在 Azure 上的基于 Java 的应用程序。


    *   理解在 Azure 上处理 Java 应用程序时的最佳实践。


    ## 最佳实践


    设计应用程序架构是一项关键活动。在实现应用程序架构时，您必须考虑最佳实践。针对 Azure 的应用程序应进行高度精确的规划，以便应用程序在 Azure 环境中按预期运行。让我们讨论一些在为
    Azure 设计基于 Java 的应用程序时应考虑的基本最佳实践。


    *   确定主机选项。


    *   现代化应用程序，然后迁移到 Azure。


    *   为您的应用程序选择合适的 Azure 服务。


    *   规划符合预算的云成本。


    *   规划可扩展性、可用性和可靠性。


    *   制定强大的调试和监控策略。


    *   保护您在 Azure 上的应用程序。


    *   自动化 Azure 服务的启动和应用程序部署。


    *   制定正确的备份和灾难恢复策略。


    ### 确定主机选项


    您可以使用适用于 Java SE 的 App Service、适用于 Tomcat 的 App Service、适用于 JBoss 的 App Service、Azure
    Spring Cloud、Azure Kubernetes Service 和虚拟机来在 Azure 上托管您的 Java 应用程序。您需要使用符合您需求的正确服务。例如，如果您有一个
    Spring Boot 应用程序，那么您可以在 Azure Spring Cloud、App Service 或虚拟机上运行它。


    ### 现代化应用程序，然后迁移到 Azure


    有时您可能会发现使用 Azure 不支持的旧版组件在较旧 Java 版本上开发的应用程序。您必须确保将较旧的 Java 应用程序至少现代化到版本 1.8。您必须将旧版应用程序现代化到受支持的框架和
    Java 版本，然后将其迁移到 Azure。尝试使用现代 Java 开发框架，如 Spring Boot。如果您有一个在不兼容的框架（如 WebSphere
    Liberty）上运行的 Java 应用程序，请尝试将其现代化为 Open Liberty 或 Spring Boot，以实现更顺畅的 Azure 迁移。


    ### 为您的应用程序选择合适的 Azure 服务


    您必须设计 Azure 基础设施以满足应用程序的需求。如果您有一个分布式微服务应用程序，请尝试将其托管在 Azure Spring Cloud 或 Azure
    Kubernetes Service 上。您还可以使用 Azure Functions 构建分布式应用程序。您必须使用存储队列或服务总线队列在分布式服务之间交换消息。临时运行时数据应存储在
    Azure Redis Cache 中。


    如果您有一个单体应用、单个服务或基于单个容器的应用程序，则必须使用 Azure WebApp。

    '
- fmt: '### Plan the Cloud Cost Meeting Your Need


    The total cost of ownership is an essential factor while designing the Azure infrastructure
    for your application. You must analyze the compute and all necessary needs for
    your application that can influence the cost of usage. For example, you plan to
    scale your Azure cluster using serverless nodes. Serverless nodes run on Azure
    Container Instances and can accommodate a single pod at a time. If you need thousands
    of pods at a time, you need thousands of Azure Container Instances. Instead, you
    can check if you can scale using the Virtual Machine Scale Set. A single Virtual
    Machine-based node can accommodate many pods at a time.


    Also, while planning the App Service Plan for your WebApp, make sure that you
    pick the right plan suiting your application compute and other requirement needs.
    Plan your service tiers or reserve the compute for the services matching the right
    needs for your application. Do not reserve a higher tier where you may waste compute
    or reserve a lower tier where your application will fall short of compute. Right-sizing
    the compute needs for the Azure services saves a lot of cost for you.


    ### Plan for Scalability, Availability, and Reliability


    Your Java application must be able to scale, always available, and fault-tolerant
    as per the business requirements. The application should be highly available.
    You must try to leverage auto-scaling mechanisms available in the services where
    you are hosting your application. You must ensure that you have multiple instances
    of the services hosting your applications running behind a load balancer or an
    application gateway or a traffic manager, or a front door to ensure that if one
    of the instances goes down, the traffic should get routed to other instances.
    You must have a retry mechanism in place for failed operations. The data that
    could not be processed should be available during retries so that none of the
    data fails to get processed. This activity would make sure that the application
    is reliable.


    ### Have a Robust Debugging and Monitoring Strategy in Place


    You must leverage Azure Monitor and Application Insights to collect metrics and
    logs for your application and the Azure infrastructure. This activity would help
    you debug failures in the Production environment, monitor your application’s performance,
    and take precautionary measures in case of anomalies. Appropriate alerts should
    be configured to notify the stakeholders if there is a failure or if something
    will fail.


    You can also leverage other monitoring offerings like Prometheus and AppDynamics
    provided by third-party vendors.


    ### Secure Your Application on Azure


    You must configure authentication and authorization for your Java application
    running on Azure. You may use Azure Active Directory or any other third-party
    identity provider. All the application accesses and operations should be monitored
    and periodically audited.


    ### Automate Spinning Up Azure Services and Application Deployment


    You must leverage Infrastructure as Code (IaC) to automate spinning up Azure resources
    and facilitate application deployments using DevOps pipelines. This strategy will
    reduce manual errors during infrastructure creation and application deployments.
    Also, it will help you save time when you deploy your application across multiple
    environments.


    ### Have the Right Backup and Disaster Recovery Strategy in Place


    You must periodically back up application data and make it available if there
    is a data loss. Storing the backup data can be costly. So you must decide upon
    for how long you need to retain the backup data and clean up the backups beyond
    the retention period. You must plan a disaster recovery strategy for your application.
    If the application goes down, you must be able to run the application from another
    instance or infrastructure on Azure based on your disaster recovery strategy.
    And you must recover the application in the failed infrastructure fast and quick.
    At any cost, the business should be up and running.


    ## Build a Near-Production Scenario


    Now let us work on a near-production scenario. We will discuss the use case as
    the problem statement and understand the requirement for the scenario, and then
    we will provision the Azure infrastructure and build the solution for the problem
    statement. This activity will give you an idea of how to use Java with Azure in
    the production environment.


    ### Problem Statement


    We have a student table in the Azure SQL database. The table contains the roll
    number, name, and marks of the students in a class. Let us build a Spring Boot
    web application to get the student records from the student table and render it
    in the browser. The application should be available to authenticated users only.
    Make sure that you enable logging for the application so that you can debug the
    application when it is deployed on Azure WebApp.'
