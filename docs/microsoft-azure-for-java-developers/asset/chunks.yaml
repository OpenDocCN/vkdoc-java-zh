    \ Function\n\n## 目标\n\n学习完本章后，您应该能够获得以下知识：\n\n*   理解 Azure Functions 的概念\n\n*\
    \   构建基于 Java 的 Azure Function\n"
- fmt: '# Introduction to Serverless and Azure Functions


    Serverless architecture on the cloud is gaining momentum these days. Many modern
    applications like microservices are adopting serverless-based hosting on the cloud.
    Serverless hosting is cheaper than Platform-as-a-Service and Infrastructure-as-a-Service
    hosting models. You get charged only when your service is executing and doing
    a task, and you do not get any bills if your service is idle and is not performing
    any activity. You can develop the application and deploy it to the serverless
    service, and you need not worry about the underlying hosting infrastructure. The
    Azure platform will provision and manage the infrastructure needed for the serverless
    service to run. Scaling is an important aspect of any application, whether it
    runs on the cloud or on-premises. Serverless services can scale out with ease
    automatically without needing you to make any configuration. You do not have any
    control over how the serverless services will scale. The serverless services will
    sense the incoming workload and scale out based on the incoming traffic.


    The following are some of the popular serverless services available on Azure:


    - `Azure Functions`

    - `Durable Functions`

    - `Azure Logic Apps`

    - `Azure Event Grid`

    - `Azure Serverless SQL`

    - `Azure Serverless Kubernetes Service`

    - `Azure Serverless Cosmos DB`


    `Azure Functions` are Function-as-a-Service (FaaS) offerings on Azure and are
    serverless services. You can build your code and host on `Azure Functions`. You
    get billed when the `Azure Functions` execute, and you are not charged when they
    are idle. The underlying infrastructure on which the `Azure Function` runs and
    the scaling aspects are managed by the underlying Azure platform. `Azure Functions`
    support running code that executes for a short time interval. However, you can
    choose an appropriate hosting plan and run your application for a longer duration.
    Table [3-1](#523943_1_En_3_Chapter.xhtml#Tab1) demonstrates the programing language
    support based on the Function runtime you choose. At present, while authoring
    this book, there are four runtime versions supported.


    **Table 3-1** Azure Functions runtime and supported programming languages


    | ProgrammingLanguage | Runtime 1.x | Runtime 2.x | Runtime 3.x | Runtime 4.x
    |

    | --- | --- | --- | --- | --- |

    | C# | .NET 4.8 | .NET Core 2.1 | .NET Core 3.1, .NET 5 | .NET 6 |

    | JavaScript | Node.js 6 | Node.js 10, 8 | Node.js 14, 12, 10 | Node.js 14, 16
    |

    | F# | .NET 4.8 | .NET Core 2.1 | .NET Core 3.1 | .NET 6 |

    | Java | No Support | Java 8 | Java 11, 8 | Java 11, 8 |

    | PowerShell | No Support | PowerShell Core 6 | PowerShell 7, Core 6 | PowerShell
    7 |

    | Python | No Support | Python 3.7, 3.6 | Python 3.9, 3.8, 3.7, 3.6 | Python 3.9,
    3.8 |

    | Typescript | No Support | Supported | Supported | Supported |


    `Azure Functions` are based on top of `Azure WebJobs`. However, `Azure WebJobs`
    run as a background worker and always shares the `App Service Plan` for the Azure
    WebApp. `Azure Functions` have a hosting plan of their own. You can also host
    multiple `Azure Functions` on an `App Service Plan`.


    `Azure Functions` execute whenever they get triggered by the supported Triggers.
    They complete the execution and get into an idle state. `Azure Functions` again
    wake up and spring into action only when triggered.


    ## Azure Functions Use Cases


    The following are a few scenarios where you can use `Azure Functions`. However,
    `Azure Functions` can fit into a wide range of scenarios and help you build modern
    cloud-based serverless applications.


    - You can build an n-tier application using `Azure Functions`. You can break the
    business and data access logic into smaller chunks and host each of these chunks
    in an `Azure Function`.

    - You can run background processing jobs in the `Azure Functions`.

    - You can use `Azure Functions` and `Durable Functions` to build workflow-based
    applications where you can orchestrate each of the workflow steps using `Azure
    Durable Functions` and `Azure Functions`.

    - You can use `Azure Functions` to build microservices-based applications. Each
    of the `Azure Functions` can host a business service.

    - You can use `Azure Functions` to build schedule-based applications that run
    in a particular time interval or during a particular time of a day or a month
    or year.

    - You can build notification systems to trigger an `Azure Function` to notify
    an end user or a system based on conditions and events.

    - You can use `Azure Functions` in the IoT scenarios to perform a business activity
    or process the ingested data and put it in storage, or send it to the next set
    of processing.

    - You can use `Azure Functions` and `Azure Event Grid` in event-driven scenarios
    where these functions can get triggered and perform a task.


    ## Hosting Plans


    Hosting plans decide the underlying infrastructure on which `Azure Functions`
    run. They decide the scaling needs, execution interval, virtual network integration,
    and many other important aspects for your `Azure Functions`. You can choose your
    hosting plan for the `Azure Function` based on your computing requirements like
    memory usage, CPU usage, and many more. Also, you need to consider the scaling
    needs, execution time-out, and virtual network integration as other important
    aspects while deciding the hosting plan you may need. The following are the hosting
    plans supported by `Azure Functions`.


    ### Consumption Plan


    `Consumption Plan` is a pure serverless plan. You do not have any control over
    the hosting and scaling infrastructure. Based on the incoming traffic, it adds
    additional instances in the runtime, and when the load decreases, it shuts down
    the extra instances. This plan is cost-effective as you get billed only when the
    Function is executing, and you do not incur any bill when the Function is idle
    and is not performing any task. The Functions can execute for five minutes by
    default, and you can set them to execute for ten minutes at maximum.


    The Function gets into sleep or an idle state when it is not executing. Whenever
    it gets triggered again, it springs into action and starts executing. However,
    the Function does not start executing as soon as triggered. There is a delay as
    the Function needs to wake up from the idle state and get ready to serve the request.
    This delay is called as cold start phenomenon that we get while using this plan.


    ### Premium Plan


    `Premium Plan` makes sure that an instance of an `Azure Function` is always warmed
    up and ready to serve the request. This will avoid the cold start phenomenon.
    Like `Consumption Plan`, you do not have any control over how the Function scales.
    However, you have greater control over the infrastructure on which the `Azure
    Function` is running. You can choose a SKU for the Plan like `EP1`, `EP2`, or
    `EP3` and choose the computing needs for the Function. You can configure the `Azure
    Function` to run in a Virtual Network. Using the `Premium Plan`, `Azure Functions`
    can execute for 30 minutes by default, and you can configure it to never time
    out.


    ### Dedicated Plan


    The `Dedicated Plan` is the same as the WebApp `App Service Plan`. `Azure Functions`
    can run continuously and never get into an idle state when using this plan. This
    plan would make your Function run just like a WebApp and is not a serverless plan.
    You can choose an `App Service Plan` SKU based on your CPU usage, memory, and
    other computing requirements, and you can either configure auto-scale or scale
    manually and have full control over how the Function scales.


    ### App Service Environment Plan


    This plan provides all features of the `Dedicated Plan`. It also helps run your
    `Azure Function` in an isolated environment inside a virtual network. You get
    a secured network, high scaling, and computing power.


    ### Kubernetes Plan


    This plan runs `Azure Functions` inside `Azure Kubernetes Service` and helps run
    `Azure Functions` continuously inside the Kubernetes cluster.'
  raw: '## Introduction to Serverless and Azure Functions


    Serverless architecture on the cloud is gaining momentum these days. Many modern
    applications like microservices are adopting serverless-based hosting on the cloud.
    Serverless hosting is cheaper than Platform-as-a-Service and Infrastructure-as-a-Service
    hosting models. You get charged only when your service is executing and doing
    a task, and you do not get any bills if your service is idle and is not performing
    any activity. You can develop the application and deploy it to the serverless
    service, and you need not worry about the underlying hosting infrastructure. The
    Azure platform will provision and manage the infrastructure needed for the serverless
    service to run. Scaling is an important aspect of any application, whether it
    runs on the cloud or on-premises. Serverless services can scale out with ease
    automatically without needing you to make any configuration. You do not have any
    control over how the serverless services will scale. The serverless services will
    sense the incoming workload and scale out based on the incoming traffic .


    The following are some of the popular serverless services available on Azure:


    *   Azure Functions


    *   Durable Functions


    *   Azure Logic Apps


    *   Azure Event Grid


    *   Azure Serverless SQL


    *   Azure Serverless Kubernetes Service


    *   Azure Serverless Cosmos DB


    Azure Functions are Function-as-a-Service (FaaS) offerings on Azure and are serverless
    services. You can build your code and host on Azure Functions. You get billed
    when the Azure Functions execute, and you are not charged when they are idle.
    The underlying infrastructure on which the Azure Function runs and the scaling
    aspects are managed by the underlying Azure platform. Azure Functions support
    running code that executes for a short time interval. However, you can choose
    an appropriate hosting plan and run your application for a longer duration. Table
    [3-1](#523943_1_En_3_Chapter.xhtml#Tab1) demonstrates the programing language
    support based on the Function runtime you choose. At present, while authoring
    this book, there are four runtime versions supported.


    Table 3-1


    Azure Functions runtime and supported programming languages


    | ProgrammingLanguage | Runtime 1.x | Runtime 2.x | Runtime 3.x | Runtime 4.x
    |

    | --- | --- | --- | --- | --- |

    | C# | .NET 4.8 | .NET Core 2.1 | .NET Core 3.1, .NET 5 | .NET 6 |

    | JavaScript | Node.js 6 | Node.js 10, 8 | Node.js 14, 12, 10 | Node.js 14, 16
    |

    | F# | .NET 4.8 | .NET Core 2.1 | .NET Core 3.1 | .NET 6 |

    | Java | No Support | Java 8 | Java 11, 8 | Java 11, 8 |

    | PowerShell | No Support | PowerShell Core 6 | PowerShell 7, Core 6 | PowerShell
    7 |

    | Python | No Support | Python 3.7, 3.6 | Python 3.9, 3.8, 3.7, 3.6 | Python 3.9,
    3.8 |

    | Typescript | No Support | Supported | Supported | Supported |


    Azure Functions are based on top of Azure WebJobs. However, Azure WebJobs run
    as a background worker and always shares the App Service Plan for the Azure WebApp.
    Azure Functions have a hosting plan of their own. You can also host multiple Azure
    Functions on an App Service Plan.


    Azure Functions execute whenever they get triggered by the supported Triggers.
    They complete the execution and get into an idle state. Azure Functions again
    wake up and spring into action only when triggered .


    ## Azure Functions Use Cases


    The following are a few scenarios where you can use Azure Functions. However,
    Azure Functions can fit into a wide range of scenarios and help you build modern
    cloud-based serverless applications .


    *   You can build an n-tier application using Azure Functions. You can break the
    business and data access logic into smaller chunks and host each of these chunks
    in an Azure Function.


    *   You can run background processing jobs in the Azure Functions.


    *   You can use Azure Functions and Durable Functions to build workflow-based
    applications where you can orchestrate each of the workflow steps using Azure
    Durable Functions and Azure Functions.


    *   You can use Azure Functions to build microservices-based applications. Each
    of the Azure Functions can host a business service .


    *   You can use Azure Functions to build schedule-based applications that run
    in a particular time interval or during a particular time of a day or a month
    or year.


    *   You can build notification systems to trigger an Azure Function to notify
    an end user or a system based on conditions and events.


    *   You can use Azure Functions in the IoT scenarios to perform a business activity
    or process the ingested data and put it in storage, or send it to the next set
    of processing.


    *   You can use Azure Functions and Azure Event Grid in event-driven scenarios
    where these functions can get triggered and perform a task.


    ## Hosting Plans


    Hosting plans decide the underlying infrastructure on which Azure Functions run.
    They decide the scaling needs, execution interval, virtual network integration,
    and many other important aspects for your Azure Functions. You can choose your
    hosting plan for the Azure Function based on your computing requirements like
    memory usage, CPU usage, and many more. Also, you need to consider the scaling
    needs, execution time-out, and virtual network integration as other important
    aspects while deciding the hosting plan you may need. The following are the hosting
    plans supported by Azure Functions.


    ### Consumption Plan


    Consumption Plan is a pure serverless plan. You do not have any control over the
    hosting and scaling infrastructure. Based on the incoming traffic, it adds additional
    instances in the runtime, and when the load decreases, it shuts down the extra
    instances. This plan is cost-effective as you get billed only when the Function
    is executing, and you do not incur any bill when the Function is idle and is not
    performing any task. The Functions can execute for five minutes by default, and
    you can set them to execute for ten minutes at maximum.


    The Function gets into sleep or an idle state when it is not executing. Whenever
    it gets triggered again, it springs into action and starts executing. However,
    the Function does not start executing as soon as triggered. There is a delay as
    the Function needs to wake up from the idle state and get ready to serve the request.
    This delay is called as cold start phenomenon that we get while using this plan
    .


    ### Premium Plan


    Premium Plan makes sure that an instance of an Azure Function is always warmed
    up and ready to serve the request. This will avoid the cold start phenomenon.
    Like Consumption Plan, you do not have any control over how the Function scales.
    However, you have greater control over the infrastructure on which the Azure Function
    is running. You can choose a SKU for the Plan like EP1, EP2, or EP3 and choose
    the computing needs for the Function. You can configure the Azure Function to
    run in a Virtual Network. Using the Premium Plan, Azure Functions can execute
    for 30 minutes by default, and you can configure it to never time out .


    ### Dedicated Plan


    The Dedicated Plan is the same as the WebApp App Service Plan. Azure Functions
    can run continuously and never get into an idle state when using this plan. This
    plan would make your Function run just like a WebApp and is not a serverless plan.
    You can choose an App Service Plan SKU based on your CPU usage, memory, and other
    computing requirements, and you can either configure auto-scale or scale manually
    and have full control over how the Function scales.


    ### App Service Environment Plan


    This plan provides all features of the Dedicated Plan. It also helps run your
    Azure Function in an isolated environment inside a virtual network. You get a
    secured network, high scaling, and computing power .


    ### Kubernetes Plan


    This plan runs Azure Functions inside Azure Kubernetes Service and helps run Azure
    Functions continuously inside the Kubernetes cluster.'
  trans: '

    ## 无服务器计算与 Azure Functions 简介


    如今，云上的无服务器架构正日益流行。许多现代应用（如微服务）都采用基于无服务器的云托管方式。与平台即服务和基础设施即服务托管模式相比，无服务器托管成本更低。你只需在服务执行任务时付费，如果服务处于空闲状态且未执行任何活动，则无需支付任何费用。你可以开发应用程序并将其部署到无服务器服务上，无需担心底层托管基础设施。Azure
    平台将预配和管理无服务器服务运行所需的基础设施。扩展是任何应用的重要方面，无论它运行在云端还是本地。无服务器服务可以轻松自动地横向扩展，无需你进行任何配置。你无法控制无服务器服务的扩展方式。无服务器服务会感知传入的工作负载，并根据传入流量进行横向扩展。


    以下是 Azure 上提供的一些流行的无服务器服务：


    *   Azure Functions

    *   Durable Functions

    *   Azure Logic Apps

    *   Azure Event Grid

    *   Azure Serverless SQL

    *   Azure Serverless Kubernetes Service

    *   Azure Serverless Cosmos DB


    Azure Functions 是 Azure 上的函数即服务产品，属于无服务器服务。你可以构建代码并将其托管在 Azure Functions 上。当 Azure
    Functions 执行时，你会被计费；当它们空闲时，则不会收费。Azure Function 运行的底层基础设施以及扩展方面都由底层 Azure 平台管理。Azure
    Functions 支持运行短时间执行的代码。但是，你可以选择合适的托管计划，让应用程序运行更长时间。表 3-1 展示了基于所选 Function 运行时的编程语言支持。在撰写本书时，目前支持四个运行时版本。


    表 3-1

    Azure Functions 运行时及支持的编程语言


    | 编程语言 | 运行时 1.x | 运行时 2.x | 运行时 3.x | 运行时 4.x |

    | --- | --- | --- | --- | --- |

    | C# | .NET 4.8 | .NET Core 2.1 | .NET Core 3.1, .NET 5 | .NET 6 |

    | JavaScript | Node.js 6 | Node.js 10, 8 | Node.js 14, 12, 10 | Node.js 14, 16
    |

    | F# | .NET 4.8 | .NET Core 2.1 | .NET Core 3.1 | .NET 6 |

    | Java | 不支持 | Java 8 | Java 11, 8 | Java 11, 8 |

    | PowerShell | 不支持 | PowerShell Core 6 | PowerShell 7, Core 6 | PowerShell 7 |

    | Python | 不支持 | Python 3.7, 3.6 | Python 3.9, 3.8, 3.7, 3.6 | Python 3.9, 3.8
    |

    | Typescript | 不支持 | 支持 | 支持 | 支持 |


    Azure Functions 基于 Azure WebJobs 构建。然而，Azure WebJobs 作为后台工作进程运行，并且始终与 Azure WebApp
    共享应用服务计划。Azure Functions 有自己的托管计划。你也可以在同一个应用服务计划上托管多个 Azure Functions。


    Azure Functions 在受到支持的触发器触发时执行。它们完成执行后进入空闲状态。Azure Functions 仅在再次被触发时才会唤醒并投入运行。


    ## Azure Functions 用例


    以下是你可以使用 Azure Functions 的几种场景。然而，Azure Functions 可以适用于广泛的场景，帮助你构建基于云的现代无服务器应用程序。


    *   你可以使用 Azure Functions 构建 n 层应用程序。你可以将业务和数据访问逻辑分解成更小的块，并将每个块托管在一个 Azure Function
    中。

    *   你可以在 Azure Functions 中运行后台处理作业。

    *   你可以使用 Azure Functions 和 Durable Functions 构建基于工作流的应用程序，其中你可以使用 Azure Durable
    Functions 和 Azure Functions 来编排每个工作流步骤。

    *   你可以使用 Azure Functions 构建基于微服务的应用程序。每个 Azure Function 可以托管一个业务服务。

    *   你可以使用 Azure Functions 构建基于计划的应用程序，这些应用程序在特定的时间间隔、一天中的特定时间、一个月或一年中运行。

    *   你可以构建通知系统，以触发 Azure Function，根据条件和事件通知最终用户或系统。

    *   你可以在物联网场景中使用 Azure Functions 执行业务活动，或处理接收到的数据并将其放入存储中，或将其发送到下一组处理流程。

    *   你可以在事件驱动场景中使用 Azure Functions 和 Azure Event Grid，这些函数可以被触发并执行任务。


    ## 托管计划


    托管计划决定了 Azure Functions 运行的底层基础设施。它们决定了 Azure Functions 的扩展需求、执行间隔、虚拟网络集成以及许多其他重要方面。你可以根据计算需求（如内存使用、CPU
    使用等）为 Azure Function 选择托管计划。此外，在决定所需的托管计划时，你还需要将扩展需求、执行超时和虚拟网络集成作为其他重要因素加以考虑。以下是
    Azure Functions 支持的托管计划。


    ### 消费计划


    消费计划是一个纯粹的无服务器计划。你无法控制托管和扩展基础设施。根据传入流量，它会在运行时添加额外的实例，当负载减少时，它会关闭多余的实例。此计划具有成本效益，因为你仅在
    Function 执行时付费，当 Function 空闲且未执行任何任务时，你不会产生任何费用。Function 默认可以执行五分钟，你可以将其设置为最长执行十分钟。


    当 Function 不执行时，它会进入睡眠或空闲状态。每当它再次被触发时，它就会投入运行并开始执行。但是，Function 在被触发后不会立即开始执行。由于
    Function 需要从空闲状态唤醒并准备好服务请求，因此会存在延迟。这种延迟被称为冷启动现象，我们在使用此计划时会遇到。


    ### 高级计划


    高级计划确保 Azure Function 的实例始终保持预热状态并准备好服务请求。这将避免冷启动现象。与消费计划一样，你无法控制 Function 的扩展方式。但是，你对
    Azure Function 运行的底层基础设施拥有更大的控制权。你可以为计划选择 SKU，例如 EP1、EP2 或 EP3，并为 Function 选择计算需求。你可以配置
    Azure Function 在虚拟网络中运行。使用高级计划，Azure Functions 默认可以执行 30 分钟，你可以将其配置为永不超时。


    ### 专用计划


    专用计划与 WebApp 应用服务计划相同。使用此计划时，Azure Functions 可以持续运行，永远不会进入空闲状态。此计划将使你的 Function
    像 WebApp 一样运行，并且不是无服务器计划。你可以根据 CPU 使用率、内存和其他计算需求选择应用服务计划 SKU，并且可以配置自动扩展或手动扩展，从而完全控制
    Function 的扩展方式。


    ### 应用服务环境计划


    此计划提供专用计划的所有功能。它还有助于在虚拟网络内的隔离环境中运行你的 Azure Function。你可以获得安全的网络、高扩展性和计算能力。


    ### Kubernetes 计划


    此计划在 Azure Kubernetes 服务内部运行 Azure Functions，并帮助在 Kubernetes 集群内持续运行 Azure Functions。

    '
- fmt: '# Triggers and Bindings


    `Triggers` wake Azure Functions from an idle state and trigger their execution.
    Azure Functions can be triggered from a wide range of services, and these services
    trigger Azure Functions and pass the data to process as a payload trigger input.
    Azure Functions can have a single trigger. You may have scenarios where your Azure
    Function must interface with external services. For example, it may need to get
    some data from Azure Blob, process it, and put it back in the Azure Storage Queue.
    `Bindings` help you in scenarios where your Function needs to exchange data with
    other Azure or non-Azure services.


    You need not write much code and implement `Triggers` and `Bindings`. You can
    create the `Triggers` and `Bindings` for your Azure Function declaratively. This
    declarative approach saves you from writing complex code and logic needed to interact
    with other services from your Function code. `Triggers` are always unidirectional
    and are an input for the Azure Function. `Bindings` are bidirectional and can
    be an input or output for the Azure Function.


    Figure [3-1](#523943_1_En_3_Chapter.xhtml#Fig1) demonstrates how an Azure Function
    works with `Triggers` and `Bindings`. When an item is added to the Azure Cosmos
    DB, it triggers the Azure Function. The Azure Function interacts with the Blob
    Storage using binding and gets the blob data to process. It processes the blob
    data and sends it to the event hub using an output binding.


    ![](images/523943_1_En_3_Chapter/523943_1_En_3_Fig1_HTML.jpg)


    A representation of `Triggers` and `Bindings` in Azure functions.


    **Figure 3-1** Triggers and Bindings in Azure Functions


    The following are `Triggers` supported for Azure Functions Runtime 1.x:


    - Blob storage

    - Azure Cosmos DB

    - Event Grid

    - Event Hubs

    - HTTP and webhooks

    - IoT Hub

    - Queue storage

    - Service Bus

    - Timer


    The following are `Triggers` supported for Azure Functions Runtime 2.x and more:


    - Blob storage

    - Azure Cosmos DB

    - Dapr

    - Event Grid

    - Event Hubs

    - HTTP and webhooks

    - IoT Hub

    - Kafka

    - Queue storage

    - RabbitMQ

    - Service Bus

    - Timer


    The following are the `Bindings` supported along with Input and Output directions
    supported for Azure Functions Runtime 1.x:


    - Blob storage (Input, Output)

    - Azure Cosmos DB (Input, Output)

    - Event Grid (Output)

    - Event Hubs (Output)

    - HTTP and webhooks (Output)

    - IoT Hub (Output)

    - Mobile Apps (Input, Output)

    - Notification Hubs (Output)

    - Queue storage (Output)

    - SendGrid (Output)

    - Service Bus (Output)

    - Table storage (Input, Output)

    - Twilio (Output)


    The following are the `Bindings` supported along with Input and Output directions
    supported for Azure Functions Runtime 2.x and above:


    - Blob storage (Input, Output)

    - Azure Cosmos DB (Input, Output)

    - Event Grid (Output)

    - Event Hubs (Output)

    - HTTP and webhooks (Output)

    - IoT Hub (Output)

    - Queue storage (Output)

    - SendGrid (Output)

    - Service Bus (Output)

    - Table storage (Input, Output)

    - Twilio (Output)

    - Dapr (Input, Output)

    - Kafka (Output)

    - RabbitMQ (Output)

    - SignalR (Input, Output)


    You cannot create Kafka and RabbitMQ `Triggers` using Consumption Plan. Dapper
    `Triggers` are applicable for Azure Kubernetes Service.


    # Build a Java-Based Azure Function


    Let us create an Azure Function invoked by an HTTP `Trigger`. HTTP `Trigger` would
    help you access Function in the browser. We will pass a person''s name as a query
    string, and then the person''s name would get saved to the Storage Queue using
    an output binding.


    Let us create a Storage Account where the Azure Function will create a Queue and
    put the person''s name as a message. Go to the Azure portal and click *Create
    a resource* as in Figure [3-2](#523943_1_En_3_Chapter.xhtml#Fig2).


    ![](images/523943_1_En_3_Chapter/523943_1_En_3_Fig2_HTML.jpg)


    A window of the Microsoft Azure website.


    **Figure 3-2** Create a resource


    Search for *Storage Account* as in Figure [3-3](#523943_1_En_3_Chapter.xhtml#Fig3)
    in the Marketplace. You can also find Storage Account in the list of popular services
    in the Marketplace.


    ![](images/523943_1_En_3_Chapter/523943_1_En_3_Fig3_HTML.jpg)


    A screenshot of the webpage for the search of a storage account.


    **Figure 3-3** Search for Storage Account


    Click *Create* as in Figure [3-4](#523943_1_En_3_Chapter.xhtml#Fig4) to start
    creating a Storage Account.


    ![](images/523943_1_En_3_Chapter/523943_1_En_3_Fig4_HTML.jpg)


    A screenshot of the Microsoft webpage for creating a storage account.


    **Figure 3-4** Click Create


    Provide subscription details, resource group details, the name for the Storage
    Account, and location. Click *Review + create* as in Figure [3-5](#523943_1_En_3_Chapter.xhtml#Fig5).


    ![](images/523943_1_En_3_Chapter/523943_1_En_3_Fig5_HTML.jpg)


    A screenshot of the webpage titled create a storage account with instance details.


    **Figure 3-5** Provide basic details for the Storage Account


    Click *Create* as in Figure [3-6](#523943_1_En_3_Chapter.xhtml#Fig6). This will
    provision a Storage Account for you.


    ![](images/523943_1_En_3_Chapter/523943_1_En_3_Fig6_HTML.jpg)


    A screenshot of the webpage titled create a storage account which has Basic and
    Advanced headings with some parameters.


    **Figure 3-6** Click Create


    Once the Storage Account gets created, navigate to the Storage Account, go to
    the *Access Keys* section as in Figure [3-7](#523943_1_En_3_Chapter.xhtml#Fig7),
    and copy the connection string. Later, we will use the connection string to connect
    to the Storage Account from the Azure Function.


    ![](images/523943_1_En_3_Chapter/523943_1_En_3_Fig7_HTML.jpg)


    A screenshot of the access keys webpage.


    **Figure 3-7** Get Connection String for the Storage Account


    Now let us start creating Azure Function using the Maven plug-in. As a prerequisite,
    you should have the following utilities already installed:


    - Azure Functions Core Tools (latest version)

    - Java 11

    - Azure CLI

    - Visual Studio Code

    - Maven (any version compatible with Java 11)


    Launch Visual Studio Code, open the folder where you plan to work, and open a
    new command prompt based on Terminal. Execute the following command as in Listing
    [3-1](#523943_1_En_3_Chapter.xhtml#PC1) in the Terminal. This will create an Azure
    Function Code for you locally. We will modify the code further.


    ```

    mvn archetype:generate "-DarchetypeGroupId=com.microsoft.azure" "-DarchetypeArtifactId=azure-functions-archetype"
    "-DjavaVersion=11"

    ```


    **Listing 3-1** Generate Azure Function code


    When prompted, provide the group ID, artifact ID, package name, and version for
    your Java function and in the end provide your selection confirmation by hitting
    *Y* as in Figure [3-8](#523943_1_En_3_Chapter.xhtml#Fig8).


    ![](images/523943_1_En_3_Chapter/523943_1_En_3_Fig8_HTML.jpg)


    A series of codes under the terminal tab for Maven execution.


    **Figure 3-8** Maven execution


    The Function gets created with HTTP `Trigger` Binding that would invoke the Function
    code from the browser. Let us add an output binding to the Storage Queue. Open
    the `Function.java` file as in Figure [3-9](#523943_1_En_3_Chapter.xhtml#Fig9).


    ![](images/523943_1_En_3_Chapter/523943_1_En_3_Fig9_HTML.jpg)


    A screenshot which represents a `Function.java` file location.


    **Figure 3-9** `Function.java` file location'
