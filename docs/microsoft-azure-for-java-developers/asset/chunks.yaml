- fmt: "# Introduction to Azure Storage\n\nAzure Storage is a Platform-as-a-Service\
    \ offering that stores images, files, and other data objects as blobs. It provides\
    \ an SMB-based file system to store files and has also support for NFS, offers\
    \ you a queue-based messaging data store, and helps you store NoSQL table data\
    \ in the Azure environment. It is highly scalable, available, and secured. The\
    \ following are offerings for Azure Storage:\n\n- `Azure Containers (Blobs)` help\
    \ you store images, videos, files, and other binary large object data. You can\
    \ keep big unstructured data like Virtual Machine disks.\n- `Azure Files` provide\
    \ a managed file share to keep your files and access using SMB, NFS, or HTTP protocol.\n\
    - `Azure Queues` provide a queue-based messaging store for your application.\n\
    - `Azure Tables` help you store semi-structured NoSQL data.\n\nData replication\
    \ is an important design aspect for data stores on the cloud. This mechanism helps\
    \ you recover data during a disaster or an outage and keeps your business running.\
    \ Azure Storage supports the following data replications or redundancy mechanisms:\n\
    \n- `Locally Redundant Storage (LRS)` helps you store three copies of your data\
    \ in the same data center. If the data center goes down, you will not be able\
    \ to access the data.\n- `Zone-Redundant Storage (ZRS)` stores three copies of\
    \ data in different data centers or storage clusters separated physically in a\
    \ region. If a data center goes down, you can still access data stored in other\
    \ data centers. However, if there is a region-wide outage, you will not be able\
    \ to access the data.\n- `Geo-Redundant Storage (GRS)` duplicates your data three\
    \ times in a primary region, and then all the duplicated set of data is replicated\
    \ to a secondary region. If the primary region goes down, you can access the data\
    \ from the secondary region.\n- `Read Access Geo-Redundant Storage (RA-GRS)` is\
    \ the same as Geo-Redundant Storage. However, the data in the secondary region\
    \ is read-only.\n\nYou can choose either a standard tier or a premium tier to\
    \ store the data on Azure Storage. The Standard tier stores your data in a standard\
    \ hard disk, and the premium tier stores your data in an SSD disk. The premium\
    \ tier is more performant than the standard tier. The following are the types\
    \ of Storage Accounts available on Azure:\n\n- `General Purpose V1` accounts are\
    \ legacy storage service accounts and support blob, file, queue, and table service.\
    \ It supports only the standard tier and all replication options except ZRS.\n\
    - `General Purpose V2` accounts support blob, file, queue, and table service.\
    \ It supports the standard and premium tier and all replication options.\n- `Blob\
    \ Storage` helps you store block blobs and append blobs. It supports only the\
    \ standard tier and all replication options except ZRS.\n- `File Storage` provides\
    \ you with file service. It supports the premium tier and LRS and ZRS replication\
    \ options.\n- `Block Blob` helps you store block blobs and append blobs. It supports\
    \ the premium tier and LRS and ZRS replication options.\n\n> **Note**  \n> `Block\
    \ Blobs` store binary and text data. `Page Blobs` help you store large files like\
    \ virtual hard disks. `Append Blobs` are the same as `Block Blobs` but highly\
    \ performant append operations.\n\n## Create an Azure Storage Account\n\nLet us\
    \ create an Azure Storage account. Go to the Azure portal shown in Figure [6-1](#523943_1_En_6_Chapter.xhtml#Fig1)\
    \ and click `Create a resource`. You will be taken to the Marketplace, as shown\
    \ in Figure [6-2](#523943_1_En_6_Chapter.xhtml#Fig2).\n\n![](images/523943_1_En_6_Chapter/523943_1_En_6_Fig1_HTML.jpg)\n\
    \nA screenshot of the Microsoft Azure webpage. A search box is on the top panel.\
    \ The screen reads Azure services which include the following options along with\
    \ their icons. Create a resource, resource groups, and subscriptions. Create a\
    \ resource is highlighted.\n\n**Figure 6-1** – Create a resource\n\nSearch for\
    \ `Storage Account` in the Marketplace as shown in Figure [6-2](#523943_1_En_6_Chapter.xhtml#Fig2).\
    \ Then click `Create`.\n\n![](images/523943_1_En_6_Chapter/523943_1_En_6_Fig2_HTML.jpg)\n\
    \nA screenshot of the webpage titled marketplace. The left panel contains the\
    \ following tabs. Get started, service providers, management, my marketplace,\
    \ and categories. The highlighted tab, get started, opens the following details\
    \ on the right. A highlighted search bar at the top reads storage account. A highlighted\
    \ tab, create, is at the bottom.\n\n**Figure 6-2** – Search for Storage Account\n\
    \nYou will now be on the Create a storage account dialog shown in Figure [6-3](#523943_1_En_6_Chapter.xhtml#Fig3).\
    \ Provide subscription details, resource group name, storage account name, region,\
    \ and performance tier and click `Review + create`.\n\n![](images/523943_1_En_6_Chapter/523943_1_En_6_Fig3_HTML.jpg)\n\
    \nA screenshot of the webpage titled create a storage account. The tab basic opens\
    \ the following data. The blank fields against subscription and resource group\
    \ are highlighted. Insurance details: the blank fields against the account name,\
    \ region, and performance are highlighted. The tab on the bottom left, review\
    \ plus create, is highlighted.\n\n**Figure 6-3** – Provide Storage Account basic\
    \ details\n\nClick `Create` as shown in Figure [6-4](#523943_1_En_6_Chapter.xhtml#Fig4).\
    \ This would spin up the Storage Account.\n\n![](images/523943_1_En_6_Chapter/523943_1_En_6_Fig4_HTML.jpg)\n\
    \nA screenshot of the webpage titled create a storage account. Validation is passed.\
