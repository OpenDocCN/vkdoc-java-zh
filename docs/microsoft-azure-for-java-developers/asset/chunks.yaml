    \ using them. The data stored in these databases are highly scalable, secured,\
    \ and available. You can provision the database matching your compute needs and\
    \ desired performance level.\n\nThe underlying Azure platform manages all database\
    \ activities like backup, patching, and upgrades. Azure SQL database always runs\
    \ on the latest stable version for the Microsoft SQL Server engine. The underlying\
    \ platform automatically updates the SQL database engine without manual intervention\
    \ whenever a new stable version is available. It is highly available and provides\
    \ 99.99% availability.\n\nYou may choose to deploy a single database that is fully\
    \ managed by the underlying Azure platform and guarantees you isolation from other\
    \ databases or choose to run multiple single databases on an elastic pool sharing\
    \ the compute resources like CPU and memory. You can provision the SQL database\
    \ using the `vCore`-based purchasing model, where you can reserve the amount of\
    \ memory, number of `vCores`, and storage speed based on your requirements. You\
    \ may also choose the `DTU`-based purchasing model for the SQL database, where\
    \ you can choose the number of `DTUs` based on your requirement. Azure SQL also\
    \ provides a serverless purchase model. You will get billed only when the SQL\
    \ database is used, and there are database transactions for serverless databases.\
    \ When there are no transactions, then the database goes to the idle state and\
    \ wakes up whenever there is a database transaction.\n\n> **Note**  \n> `DTU`\
    \ stands for Database Transaction Unit and is a number based on the combination\
    \ of CPU, Memory, and Data I/O performance specification.\n\nAzure SQL database\
    \ does not support Microsoft SQL Server features like linked server, SQL agent,\
    \ SQL data sync, SQL Auditing, Service Broker, and many more. You may face challenges\
    \ in migrating an on-premises SQL Server database as is to Azure if you are using\
