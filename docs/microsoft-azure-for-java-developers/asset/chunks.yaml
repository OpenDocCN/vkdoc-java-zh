    ## 使用 SQL API 操作 Cosmos DB


    现在，让我们编写一个 Java Maven 项目，并使用 SQL API 进行操作。我们需要将 Cosmos DB 包添加到 POM 文件中。清单 8-1
    展示了你可以使用的 POM 文件。


    ```


    4.0.0

    com.cosmosdb

    sqldemo

    1.0-SNAPSHOT


    com.azure

    azure-cosmos

    4.4.0


    清单 8-1

    POM.xml

    ```


    在 Cosmos DB 数据库中，数据存储在容器内，并且存储的数据应包含分区键和 ID 列。让我们创建一个如清单 8-2 所示的 Java 类，其中包含 Main
    函数，我们可以在其中添加代码来创建数据库、创建用于存储学生数据的容器、向其中插入记录以及读取记录。让我们创建一个包含学生数据字段的 Student 类。它必须包含
    *id* 和 *partitionKey* 字段。数据存储在分区中以便更快地访问，每个分区由分区键标识。分区键和 ID 的组合将唯一标识一条记录。


    ```

    public class Student {

    public Student(){

    }

    private String id;

    private String name;

    private int marks;

    private String partitionKey;

    public String getName() {

    return name;

    }

    public void setName(String name) {

    this.name = name;

    }

    public int getMarks() {

    return marks;

    }

    public void setMarks(int marks) {

    this.marks = marks;

    }

    public String getPartitionKey() {

    return partitionKey;

    }

    public void setPartitionKey(String partitionKey) {

    this.partitionKey = partitionKey;

    }

    public String getId() {

    return id;

    }

    public void setId(String id) {

    this.id = id;

    }

    }

