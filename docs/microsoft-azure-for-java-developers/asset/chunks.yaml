    of entering the URL below, followed by implicit grant and hybrid flows. Configure,
    and cancel options are located on the lower left corner from which configure is
    selected


    Figure 12-12


    Configure Redirect URI


    Now let us create an application role for the user. We will assign this role to
    the user we created. Click the `App roles` section and then click `Create app
    role` as in Figure [12-13](#523943_1_En_12_Chapter.xhtml#Fig13).


    ![](images/523943_1_En_12_Chapter/523943_1_En_12_Fig13_HTML.jpg)


    An image of the spring bot demo app roles window. The options on the left are
    search bar, overview, quickstart, integration assistant, branding and properties,
    authentication, certificates and secrets, token configuration, API permissions,
    expose an API, app roles, and owners. The contents at the center are create app
    role and got feedback.


    Figure 12-13


    Click `App roles`


    Provide the role details. We will use the value for the role in the Java code.
    Click `Apply` as in Figure [12-14](#523943_1_En_12_Chapter.xhtml#Fig14). The role
