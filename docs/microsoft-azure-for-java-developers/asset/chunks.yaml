    ## Summary


    In this chapter, we learned the details of Azure Functions, explored the hosting
    plans available for Azure Functions, and then learned the concept of Triggers
    and Bindings. We then developed an Azure Function that gets triggered using an
    HTTP Trigger and puts a message in the Storage Queue using Output Queue Binding.
    We then deployed the Function to Azure using the Maven plug-in. In the next chapter,
    we will learn how to containerize a Java application and run it on Azure Kubernetes
    Service.


    The following are the key takeaways from this chapter:


    *   You can build your application and host on serverless services without creating
    and managing hosting infrastructure. These services scale automatically without
    needing to make any scaling configuration, and you get charged only when the service
    is executing.


    *   Azure Functions are Function-as-a-Service (FaaS) offerings on Azure and are
    serverless services.


    *   Hosting plans decide the underlying infrastructure on which Azure Functions
    run. They decide the scaling needs, execution interval, virtual network integration,
    and many other important aspects for your Azure Functions. Hosting plans available
    are Consumption Plan, Premium Plan, Dedicated Plan, App Service Environment Plan,
    and Kubernetes Plan.


    *   Triggers wake Azure Functions from an idle state and start their execution.
    Bindings help the Azure Function exchange data with other Azure or non-Azure services.
    You create Triggers and Bindings declaratively without needing to write much code.


    # 4. Containerizing Java Applications with Azure Kubernetes Service


    Containers are modern application hosting options today. You can build your application,
    containerize your application along with the hosting environment and application
    dependencies, and then keep the containerized image in a centralized registry.
    You can pull the containerized image in the target environments and run it as
    containers with ease. You can build the image once and run it in many environments
    without setting up any hosting or application dependencies. An application may
    consist of multiple containers. For example, you can have a container for the
    user interface, a container for the business layer, and another container for
    data access. All these containers in the application need to communicate with
    each other securely. The containers should be always up and running to serve the
    client request. You should manage all these containers with ease and address architectural
    concerns like availability, reliability, scalability, and many more. Kubernetes
    is a container orchestration platform that would help you orchestrate and manage
    these containers. It would address all cross-cutting concerns that we discussed.


    In the previous chapter, we learned the basics of Azure Functions. We then created
    a Java-based Azure Function and deployed it on Azure. In this chapter, we will
    learn the details of Azure Kubernetes Service, and then we will containerize a
    Java application and run it on Azure Kubernetes Service.


    ## Structure


    In this chapter, we will discuss the following aspects of containerizing Java
    applications with Azure Kubernetes Service:


    *   Introduction to containers


    *   Understanding Azure Kubernetes Service


    *   Containerize a Java application and run it on Azure Kubernetes Service


    ## Objectives


    After studying this chapter, you should be able to get the following learnings:


    *   Understand the concept of Azure Kubernetes Service


    *   Build and run Java applications on Azure Kubernetes Service'
