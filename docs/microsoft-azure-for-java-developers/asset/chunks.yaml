    URI。点击*添加重定向 URI*，如图 12-9 所示。


    ![](img/523943_1_En_12_Fig9_HTML.jpg)


    添加平台窗口的图像。任务栏上的选项包括：删除、终结点和预览功能。下面提供的字段包括：显示名称、对象 ID、目录租户 ID、客户端凭据、重定向 URL、应用程序
    ID URI 和受支持的帐户类型。


