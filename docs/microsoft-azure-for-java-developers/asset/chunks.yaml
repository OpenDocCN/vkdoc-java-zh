    ## Azure AD 的身份验证场景


    Azure AD 支持以下身份验证场景：


    *   网页浏览器到 Web 应用程序


    *   单页应用程序


    *   本机应用程序到 Web API


    *   Web 应用程序到 Web API


    *   服务器应用程序到 Web API


    让我们详细讨论每种场景。

    '
- fmt: '### Web Browser to Web Application


    当用户在浏览器中请求应用程序的主页时，用户将被重定向到`Azure AD`登录页面。用户登录`Azure AD`，如果登录成功，浏览器会获得一个安全令牌作为`Reply
    URL`。然后浏览器将此安全令牌发送给应用程序。安全令牌包含用户的声明（`claims`）。应用程序验证此令牌并启动一个会话。应用程序可以检查声明，并允许用户根据声明中提到的内容在应用程序上执行操作。此登录支持的协议包括`OpenID
    Connect`、`SAML 2.0`和`WS-Federation`。您可以使用`MSAL Azure AD SDK`来执行身份验证。


    ### Single Page Application


    单页应用程序（`Single Page Application`）使用`OAuth 2.0`隐式身份验证机制来授予用户访问应用程序及其后端`API`的权限。开发人员可以使用`ADAL
    JavaScript`库来执行身份验证。用户在浏览器中请求单页应用程序。浏览器在浏览器中加载应用程序登录页面。用户点击登录按钮后，浏览器向`Azure AD`授权端点发送一个`GET`请求，并请求一个`ID
    token`。`GET`查询根据您在门户中为应用程序配置的`client ID`和`Reply URL`作为查询字符串参数传递。然后`Azure AD`将验证请求和`Reply
    URL`。接着它会要求用户登录。如果用户能够成功登录，`Azure AD`会将`ID token`作为`Reply URL`的一部分返回。然后应用程序可以提取令牌，并根据用户声明相应地允许访问后端`API`。


    ### Native Application to Web API


    在这种情况下，本机应用程序代表用户调用`Web API`。它使用带有公共令牌的`OAuth 2.0`授权码授权类型。本机应用程序从`Azure AD`授权端点请求授权码，然后要求用户登录。用户登录后，应用程序获得一个授权码。然后应用程序将授权码发送到`Azure
    AD`令牌端点，并获取`JWT`令牌。接着它将`JWT`令牌传递给`Web API`的请求授权标头中。`Web API`验证`JWT`令牌，然后允许应用程序访问`Web
    API`。


    ### Web Application to Web API


    在这里，您可以使用委托用户身份（`Delegated User Identity`）或应用程序身份（`Application Identity`）来访问`Web
    API`。在使用应用程序身份的情况下，您使用`OAuth 2.0`客户端凭据授权。用户像在“浏览器到Web应用程序”场景中一样登录到`Web`应用程序。然后`Web`应用程序通过请求`Azure
    AD`令牌端点来尝试获取访问令牌。`Azure AD`对请求进行身份验证，如果身份验证成功，应用程序将获得一个`JWT`令牌。`JWT`令牌用于调用`Web
    API`。`Web API`验证`JWT`令牌并提供访问权限。在此场景中，`Web API`不会在`JWT`令牌中获取用户详细信息，因为`Web`应用程序正在驱动身份验证。委托用户身份帮助`Web`应用程序以用户身份进行身份验证，并且`JWT`将包含`Web
    API`可以使用的用户详细信息。


    ### Server Application to Web API


    服务器应用程序可以是守护程序或批处理应用程序，无法像人类一样进行身份验证。它需要将凭据（可以是密码或证书）连同应用程序`URI`和客户端`ID`一起传递给`Azure
    AD`。它使用带有凭据授权的应用程序身份或带有`OAuth 2.0`代理流程的委托用户身份进行身份验证。


    ## Summary


    在本章中，我们学习了`Azure Active Directory`的基础知识。我们学习了如何在`Azure Active Directory`中创建用户和注册应用程序。然后我们开发了一个基于`Maven`的`Java`代码，并在`Azure
    Active Directory`中使用了该应用程序。在下一章中，我们将学习如何使用`Azure DevOps`和`Azure CLI`来预配`Azure`资源。


    以下是本章的关键要点：


    *   `Azure Active Directory`是`Azure`上的一种身份即服务（`IDaaS`）产品。

    *   `Azure Active Directory`帮助您管理在`Azure`、本地或任何其他云上运行的应用程序的用户身份验证和授权。

    *   `Azure Active Directory`支持集成`B2B`和`B2C`场景。

    *   您可以使用`AD Connect`将本地`Active Directory`集成到`Azure Active Directory`，并将本地目录中的所有用户、组和角色同步到`Azure`。


    # Part III: DevOps and Best Practices


    # 13. Provisioning Resources with Azure DevOps and Azure CLI


    基础设施即代码（`IaC`）是基于云的企业中广泛采用的做法。您使用脚本和`DevOps`工具自动化创建云基础设施。您需要创建这些脚本或解决方案一次，并在多个环境中重用它们。这种方法为您节省了大量时间和精力。有许多基础设施即代码（`IaC`）实用程序和工具可以帮助您自动化预配`Azure`基础设施。


    在上一章中，我们学习了`Azure Active Directory`的基本概念。然后我们创建了一个`Java`应用程序，该应用程序可以使用`Azure Active
    Directory`执行用户身份验证和授权。在本章中，我们将探讨`Azure`的基础设施即代码（`IaC`）选项，然后使用`Azure CLI`和`Azure
    DevOps`启动一个`Azure WebApp`。


    ## Structure


    在本章中，我们将讨论使用`Azure DevOps`和`Azure CLI`创建基础设施的以下方面：


    *   `Azure`上的基础设施即代码（`IaC`）简介

    *   创建`Azure CLI`脚本以启动`Azure WebApp`

    *   创建`Azure DevOps`管道以启动`Azure WebApp`


    ## Objectives


    学习完本章后，您应该能够获得以下知识：


    *   探索可用于通过自动化创建`Azure`基础设施的选项

    *   使用`Azure DevOps`和`Azure CLI`创建`Azure`资源'
  raw: '### Web Browser to Web Application


    When the user requests the home page of the application in the browser, then the
    user will get redirected to the Azure AD login page. The user signs in to the
    Azure AD and if the sign-in is successful, the browser gets a security token as
    Reply URL. The browser then sends this security token to the application. The
    security token contains the claims for the user. The application validates this
    token and starts a session. The application can check for the claims and allow
    the user to perform the actions on the application as mentioned in the claims.
    The supported protocols for this sign-on are OpenID Connect, SAML 2.0, and WS-Federation.
    You can use MSAL Azure AD SDKs to perform the authentication.


    ### Single Page Application


    A Single Page Application uses the OAuth 2.0 implicit authentication mechanism
    to grant users access to the application and its back-end APIs. Developers can
    use ADAL JavaScript libraries to perform the authentication. The user requests
    for the Single Page Application in the browser. The browser loads the application
    sign-in page on the browser. Once the user clicks the sign-in button, the browser
    fires a GET request to the Azure AD authorization endpoint and requests for an
    ID token. The GET query passes on client ID and Reply URL as per your configuration
    for the application in the portal as query string parameters. Then Azure AD will
    validate the request and the Reply URL. Then it asks the user to sign in. If the
    user is able to sign in successfully, Azure AD returns the ID token as part of
    the Reply URL. The application can then extract the token and accordingly allow
    access to the back-end APIs based on the user claims.


    ### Native Application to Web API


    In this case, a native application calls a Web API on behalf of the user. It uses
    the OAuth 2.0 authorization code grant type with a public token. The native application
    requests for the authorization code from the Azure AD authorization endpoint,
    and then the user is asked to sign in. Once the user signs in, the application
    gets an authorization code. Then the application sends the authorization code
    to the Azure AD Token endpoint and gets the JWT token. It then passes on the JWT
    token to the Web API in the request authorization header. The Web API validates
    the JWT token and then allows the application to access the Web API.


    ### Web Application to Web API


    Here, you can use either Delegated User Identity or Application Identity to access
    the Web API. In the case of Application Identity, you use the OAuth 2.0 client
    credentials grant. The user signs in to the Web Application as in the Browser
    to Web Application scenario. Then the Web Application tries to get the access
    token by requesting the Azure AD Token endpoint. Azure AD authenticates the request,
    and if the authentication is successful, the application gets a JWT token. The
    JWT token is used to call the Web API. The Web API validates the JWT token and
    provides access. In this scenario, the Web API does not get the user details in
    the JWT token as the Web Application is driving the authentication. Delegated
    User Identity helps the Web Application to authenticate as the user, and the JWT
    will have user details that can be used by the Web API.


    ### Server Application to Web API


    The Server application can be a daemon or a batch application that cannot authenticate
    like a human. It needs to pass on the credentials that can be a password or a
    certificate to Azure AD along with application URI and client ID. It uses either
    Application Identity with the credentials grant or Delegated User Identity with
    OAuth 2.0 on-behalf-of flow for authentication purposes.


    ## Summary


    In this chapter, we learned Azure Active Directory basics. We learned how to create
    a user and register an application in Azure Active Directory. We then developed
    a Maven-based Java code and used the application in Azure Active Directory. In
    the next chapter, we will learn how to provision Azure resources using Azure DevOps
    and Azure CLI.


    The following are the key takeaways from this chapter:


    *   Azure Active Directory is an Identity-as-a-Service (IDaaS) offering on Azure.


    *   Azure Active Directory helps you manage user authentication and authorization
    for your applications running on Azure or on-premises or any other cloud.


    *   Azure Active Directory supports integrating B2B and B2C scenarios.


    *   You can integrate on-premises Active Directory to Azure Active Directory using
    AD Connect and sync all the users, groups, and roles in the on-premises directory
    to Azure.


    # Part IIIDevOps and Best Practices


    # 13. Provisioning Resources with Azure DevOps and Azure CLI


    Infrastructure as Code (IaC) is a widely adopted practice in a cloud-based enterprise.
    You automate the creation of cloud infrastructure using scripts and DevOps tools.
    You need to create these scripts or solutions once and reuse them across multiple
    environments. This approach saves a lot of time and effort for you. There are
    many Infrastructure-as-Code (IaC) utilities and tools available that will help
    you automate provisioning the Azure infrastructure.


    In the previous chapter, we learned the basic concept of Azure Active Directory.
    We then created a Java application that can use Azure Active Directory to perform
    user authentication and authorization. In this chapter, we will explore the Infrastructure-as-Code
    (IaC) options for Azure and then spin up an Azure WebApp using Azure CLI and Azure
    DevOps.


    ## Structure


    In this chapter, we will discuss the following aspects of infrastructure creation
    using Azure DevOps and Azure CLI:


    *   Introduction to Infrastructure as Code (IaC) on Azure


    *   Create an Azure CLI script to spin up Azure WebApp


    *   Create an Azure DevOps pipeline to spin up Azure WebApp


    ## Objectives


    After studying this chapter, you should be able to get the following learnings:


    *   Explore the options available to create Azure infrastructure using automation


    *   Create Azure resources using Azure DevOps and Azure CLI'
  trans: '

    ### 从 Web 浏览器到 Web 应用程序


    当用户在浏览器中请求应用程序的主页时，用户将被重定向到 Azure AD 登录页面。用户在 Azure AD 中登录，如果登录成功，浏览器会获得一个安全令牌作为回复
    URL。然后，浏览器将此安全令牌发送给应用程序。该安全令牌包含用户的声明。应用程序验证此令牌并启动一个会话。应用程序可以检查这些声明，并允许用户根据声明中的描述在应用程序上执行操作。此登录过程支持的协议包括
    OpenID Connect、SAML 2.0 和 WS-Federation。你可以使用 MSAL Azure AD SDK 来执行身份验证。


    ### 单页应用程序


    单页应用程序使用 OAuth 2.0 隐式身份验证机制来授予用户访问应用程序及其后端 API 的权限。开发者可以使用 ADAL JavaScript 库来执行身份验证。用户在浏览器中请求单页应用程序。浏览器在浏览器中加载应用程序的登录页面。一旦用户点击登录按钮，浏览器就会向
    Azure AD 授权端点发起一个 GET 请求，并请求一个 ID 令牌。该 GET 查询会根据你在门户中为应用程序配置的内容，将客户端 ID 和回复 URL
    作为查询字符串参数传递。然后，Azure AD 会验证请求和回复 URL。接着，它会要求用户登录。如果用户能够成功登录，Azure AD 会将 ID 令牌作为回复
    URL 的一部分返回。然后，应用程序可以提取该令牌，并根据用户声明相应地允许访问后端 API。


    ### 从本机应用程序到 Web API


    在这种情况下，本机应用程序代表用户调用 Web API。它使用带有公共令牌的 OAuth 2.0 授权码授予类型。本机应用程序向 Azure AD 授权端点请求授权码，然后系统会要求用户登录。用户登录后，应用程序会获得一个授权码。然后，应用程序将该授权码发送到
    Azure AD 令牌端点，并获取 JWT 令牌。接着，它会在请求的授权标头中将 JWT 令牌传递给 Web API。Web API 验证 JWT 令牌，然后允许应用程序访问该
    Web API。


    ### 从 Web 应用程序到 Web API


    在这里，你可以使用**委托用户身份**或**应用程序身份**来访问 Web API。在使用应用程序身份的情况下，你使用 OAuth 2.0 客户端凭据授予。用户像在“浏览器到
    Web 应用程序”场景中一样登录到 Web 应用程序。然后，Web 应用程序尝试通过请求 Azure AD 令牌端点来获取访问令牌。Azure AD 对请求进行身份验证，如果身份验证成功，应用程序将获得一个
    JWT 令牌。该 JWT 令牌用于调用 Web API。Web API 验证 JWT 令牌并提供访问权限。在此场景中，由于是 Web 应用程序驱动身份验证，Web
    API 不会在 JWT 令牌中获取用户详细信息。委托用户身份帮助 Web 应用程序以用户身份进行身份验证，并且 JWT 将包含 Web API 可以使用的用户详细信息。


    ### 从服务器应用程序到 Web API


    服务器应用程序可以是守护程序或批处理应用程序，它们无法像人类一样进行身份验证。它需要将凭据（可以是密码或证书）以及应用程序 URI 和客户端 ID 传递给
    Azure AD。为了进行身份验证，它使用带有凭据授予的应用程序身份，或使用带有 OAuth 2.0 代理流的委托用户身份。


    ## 总结


    在本章中，我们学习了 Azure Active Directory 的基础知识。我们学习了如何在 Azure Active Directory 中创建用户和注册应用程序。然后，我们开发了一个基于
    Maven 的 Java 代码，并在 Azure Active Directory 中使用了该应用程序。在下一章中，我们将学习如何使用 Azure DevOps
    和 Azure CLI 来预配 Azure 资源。


    以下是本章的关键要点：


    *   Azure Active Directory 是 Azure 上的一种身份即服务（IDaaS）产品。


    *   Azure Active Directory 帮助你管理在 Azure、本地或任何其他云上运行的应用程序的用户身份验证和授权。


    *   Azure Active Directory 支持集成 B2B 和 B2C 场景。


    *   你可以使用 AD Connect 将本地 Active Directory 集成到 Azure Active Directory，并将本地目录中的所有用户、组和角色同步到
    Azure。


    # 第三部分 DevOps 与最佳实践


    # 13. 使用 Azure DevOps 和 Azure CLI 预配资源


    基础设施即代码（IaC）是基于云的企业中广泛采用的做法。你可以使用脚本和 DevOps 工具自动创建云基础设施。你需要创建这些脚本或解决方案一次，并在多个环境中重复使用它们。这种方法可以为你节省大量时间和精力。有许多可用的基础设施即代码（IaC）实用程序和工具，可以帮助你自动预配
    Azure 基础设施。


    在上一章中，我们学习了 Azure Active Directory 的基本概念。然后，我们创建了一个可以使用 Azure Active Directory
    执行用户身份验证和授权的 Java 应用程序。在本章中，我们将探讨 Azure 的基础设施即代码（IaC）选项，然后使用 Azure CLI 和 Azure
    DevOps 启动一个 Azure Web 应用。


    ## 结构


    在本章中，我们将讨论使用 Azure DevOps 和 Azure CLI 创建基础设施的以下方面：


    *   Azure 上的基础设施即代码（IaC）简介


    *   创建用于启动 Azure Web 应用的 Azure CLI 脚本


    *   创建用于启动 Azure Web 应用的 Azure DevOps 管道


    ## 目标


    学习本章后，你应该能够获得以下知识：


    *   探索可用于通过自动化创建 Azure 基础设施的选项


    *   使用 Azure DevOps 和 Azure CLI 创建 Azure 资源

