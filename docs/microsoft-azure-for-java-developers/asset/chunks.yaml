- fmt: "# Using Console to Work with Redis Cache\n\nYou may have scenarios where you\
    \ may need to explore the data stored in the Azure Redis Cache. You can use the\
    \ Redis Console that is available in the Azure portal to perform all necessary\
    \ operations on Redis Cache. Go to the *Overview* section and click *Console*\
    \ as in Figure [9-10](#523943_1_En_9_Chapter.xhtml#Fig10).\n\n![](images/523943_1_En_9_Chapter/523943_1_En_9_Fig10_HTML.jpg)\n\
    \nA screenshot of the output window. The contents are: `\"C:\\Program Files\\\
    Java\\jdk-15.0.2\\bin\\java.exe\"`. Ping result: `pong`. Value for `data1`: `this\
    \ is value for data 1`. Value for `data2`: `this is value for data 2`. Process\
    \ finished with exit code `0`.\n\n**Figure 9-10** Go to Redis Console\n\nYou can\
    \ insert data to the cache using the `SET` command. You can read data from the\
    \ cache using the `GET` command. You can execute any Redis command on this console\
    \ and work with the Redis Cache cluster. The use of these commands is shown in\
    \ Figure [9-11](#523943_1_En_9_Chapter.xhtml#Fig11).\n\n![](images/523943_1_En_9_Chapter/523943_1_En_9_Fig11_HTML.jpg)\n\
    \nAn image of the Redis for demo window. The options on the left include search\
    \ bar, overview, activity log, access control, tags, diagnose and solve problems,\
    \ events, and access keys. The options on the right include console, move, delete,\
    \ essentials including resource group, status, location, subscription, and subscription\
    \ ID followed by memory usage.\n\n**Figure 9-11** Perform Get and Set operations\
    \ on Redis Console\n\n## Summary\n\nIn this chapter, we learned Azure Redis Cache\
    \ basics and how to create an Azure Redis Cache using the Azure portal. We then\
    \ developed a Maven-based Java code and performed read, write, expire, and delete\
    \ operations on the Azure Redis Cache. In the next chapter, we will learn how\
    \ to send emails programmatically from Java applications using Graph APIs in the\
    \ Azure environment.\n\nThe following are the key takeaways from this chapter:\n\
    \n- Redis Cache is an in-memory cache offering that helps you keep frequently\
    \ accessed runtime data.\n- Azure offers Redis Cache as a Platform-as-a-Service\
    \ offering. You can spin the Redis Cluster in a few minutes and start using it.\
    \ You need not set up any infrastructure for Redis Cache on Azure.\n- Azure Redis\
    \ Cache offers you very low latency and high-throughput data access for your applications.\n\
    - The data stored in Azure Redis Cache is encrypted and highly secured.\n- Azure\
    \ supports both the open source Redis Cache version and the Redis Lab Enterprise\
    \ version.\n- The following are pricing plans available for Azure Redis Cache:\n\
    \    - Basic\n    - Standard\n    - Premium\n    - Enterprise\n    - Enterprise\
    \ Flash\n\n# 10. Sending Emails Using Graph API\n\nModern applications need to\
    \ send emails to the stakeholders, customers, or developers or anyone related\
    \ to the application. There can be a scenario where the customer is placing an\
    \ order in an e-commerce application. And once the order gets placed, it will\
    \ let the customer know the order and the dispatch status. If the order fails,\
    \ it should notify the operations team to look into it. You can configure your\
    \ SMTP server for mailing needs on a virtual machine on Azure. However, you will\
    \ end up maintaining the virtual machine and spend cost and effort to keep the\
    \ SMTP server up and running. To address this issue, Microsoft provides Graph\
    \ API deployed on Azure and helps you interact with Microsoft 365 Core services.\
    \ Using the Graph API, you can send emails.\n\nIn the previous chapter, we learned\
    \ the basic concept of the Azure Redis Cache. We then created a Java-based application\
    \ and worked with the Azure Redis Cache. In this chapter, we will learn the details\
    \ of the Graph API. Then we will build a Java application that can send mails\
    \ using Graph API.\n\n## Structure\n\nIn this chapter, we will discuss the following\
    \ aspects of the Graph API:\n\n- Introduction to Graph API\n- Steps to send mail\
    \ using Graph API\n- Send mail using Microsoft Graph API\n- Microsoft Graph API\
    \ Explorer\n\n## Objectives\n\nAfter studying this chapter, you should be able\
    \ to get the following learnings:\n\n- Understand the concept of the Graph API\n\
    - Send mail from Java application using Graph API\n\n## Introduction to Graph\
    \ API\n\nMicrosoft Graph API provides you with a set of RESTful endpoints that\
    \ you can use to interact with Microsoft 365 Core services, Enterprise Mobility\
    \ and Security services, Windows 10 services, and Dynamics 365 services. Microsoft\
    \ Graph API is hosted on Azure and can be easily used by developers. Developers\
    \ can build a variety of applications using Graph API. The following are a few\
    \ examples.\n\n- You can send and read emails, set meetings, and perform email-related\
    \ operations using Microsoft 365 Core services. You can use Graph API endpoints\
    \ to help you interact with Microsoft 365 Core services.\n- You can build applications\
    \ that revolve around Azure AD, Intune, Advanced Threat Protection, and many more\
    \ using Graph API for Enterprise Mobility and Security services.\n- You can automate\
    \ controlling and applying the latest patches to your Windows server using Graph\
    \ API for Windows 10 services.\n- You can build applications that interact with\
    \ Dynamics 365 using Graph API for Dynamics 365 Business Central.\n\nFigure [10-1](#523943_1_En_10_Chapter.xhtml#Fig1)\
    \ depicts the interaction between Microsoft services and customer applications\
    \ using Graph API.\n\n![](images/523943_1_En_10_Chapter/523943_1_En_10_Fig1_HTML.jpg)\n\
    \nA model diagram illustrating interaction amidst customer applications and Microsoft\
    \ servers via Graph API. It includes customer applications on top; the middle\
    \ layer has Microsoft Graph API that splits into Microsoft 365 core services,\
    \ enterprise mobility, security, Windows 10 services, and Dynamics 365.\n\n**Figure\
    \ 10-1** Microsoft Graph API and Microsoft services\n\nNow let us explore a Microsoft\
    \ 365 Core use case for Graph API. A developer needs to set up a meeting invite\
    \ with his supervisor whenever an application fails. He needs to attach a log\
    \ file from the OneDrive in the invite. This log file is generated by the application\
    \ and stored in the OneDrive. All these actions should be automated. The developer\
    \ need not monitor the OneDrive 24×7 and keep scheduling meetings. We can build\
    \ a solution to help the developer using Microsoft Graph API. The solution will\
    \ use Graph API to read Lead’s calendar and find a free slot available. It will\
    \ then access the developer’s mailbox and set up an invite with the Lead. The\
    \ solution will use the Graph API to access the log stored in OneDrive and attach\
    \ it to the invite. Figure [10-2](#523943_1_En_10_Chapter.xhtml#Fig2) demonstrates\
    \ the use case we discussed.\n\n![](images/523943_1_En_10_Chapter/523943_1_En_10_Fig2_HTML.jpg)\n\
    \nA model diagram illustrates the network infrastructure between Microsoft Graph\
    \ API and Microsoft 365. It includes lead in the center; OneDrive, manager, and\
    \ mail on left; PowerPoint, developer, and calendar on right.\n\n**Figure 10-2**\
    \ Microsoft Graph API and Microsoft 365 use case"
