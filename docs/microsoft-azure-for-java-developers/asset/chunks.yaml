- fmt: '# Create a Java Spring Boot Application


    Let us create a Java Spring Boot application that we will deploy to Azure WebApp.
    Navigate to the following URL to generate a Java Spring Boot application.


    ```

    https://start.spring.io/

    Listing 2-1

    Spring Initializr URL

    ```


    Select the *Project* as *Maven Project*, *Language* as *Java*, and *Spring Boot*
    version. The Spring Boot version keeps getting updated very frequently, and you
    can use the version based on your preferences or the latest one available. Provide
    the *Project Metadata* as in Figure [2-1](#523943_1_En_2_Chapter.xhtml#Fig1).
    Select *Packaging* as JAR and *Java* version as *11*.


    ![](images/523943_1_En_2_Chapter/523943_1_En_2_Fig1_HTML.jpg)


    A screenshot of the Spring initializer. The options of Maven project, Java, and
    2.6.0 are selected under Project, Language and Spring Boot respectively. Project
    metadata lists the following options and fields to enter, Group, Artifact, Name,
    Description, and Package name. Options Jar and 11 are selected and highlighted
    under Packaging and Java respectively.


    **Figure 2-1** Configure Spring Boot project


    We need to add the Spring Web dependency to our application. Click on the *ADD
    DEPENDENCIES* button shown in Figure [2-2](#523943_1_En_2_Chapter.xhtml#Fig2).
    We will create a REST API in our sample application, and the Spring Web dependency
    will help us create it.


    ![](images/523943_1_En_2_Chapter/523943_1_En_2_Fig2_HTML.jpg)


    A screenshot of a page for adding dependencies. A box on the right reads, Add
    dependencies, C T R L plus B. The main page reads, No dependency selected.


    **Figure 2-2** Click ADD DEPENDENCIES


    Select *Spring Web* as in Figure [2-3](#523943_1_En_2_Chapter.xhtml#Fig3).


    ![](images/523943_1_En_2_Chapter/523943_1_En_2_Fig3_HTML.jpg)


    A screenshot of spring web dependency. The developer tools are listed as Spring
    native, Spring boot Dev Tools, Lombok, and Spring configuration processor. The
    web includes Spring web, which is highlighted, and Spring reactive web.


    **Figure 2-3** Select Spring Web dependency


    Click on the *GENERATE* button as in Figure [2-4](#523943_1_En_2_Chapter.xhtml#Fig4).
    This action will generate a sample Java Spring Boot application that will get
    downloaded locally.


    ![](images/523943_1_En_2_Chapter/523943_1_En_2_Fig4_HTML.jpg)


    A screenshot of the Spring initializer. The tabs include Project, Maven project,
    Language, Java, Spring boot, 2.6.0, and Project metadata. The project metadata
    includes the following options and their respective fields to enter, group, com
    dot sample, artifact and name, app, and description demo project. There are 2
    buttons at the bottom, including Generate C T R L, which is highlighted and Explore
    C T R L plus space.


    **Figure 2-4** Generate Spring Boot project


    Open the application in Visual Studio Code. Go to the `AppApplication.java` file.
    You will find it inside the `java\com\sample\app` folder as in Figure [2-5](#523943_1_En_2_Chapter.xhtml#Fig5).


    ![](images/523943_1_En_2_Chapter/523943_1_En_2_Fig5_HTML.jpg)


    A screenshot of a page to find the file location. The tab on the top reads, Explorer.
    The drop-down tab titled Open editors includes App Application dot java s r c
    slash main slash java slash com slash sample slash app. The drop-down tab titled
    app includes dot m v n, s r c, main, java slash com slash sample slash app, and
    App Application dot java which is highlighted.


    **Figure 2-5** `AppApplication.java` file location


    Replace the code in the `AppApplication.java` file with the code in Listing [2-2](#523943_1_En_2_Chapter.xhtml#PC2).
    We are annotating the `AppApplication` class as REST Controller and adding a REST
    GET API named `hello`. When we invoke this REST API, we will get the `Hello World`
    string as the response.


    ```

    package com.sample.app;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    @SpringBootApplication

    @RestController

    public class AppApplication {

    public static void main(String[] args) {

    SpringApplication.run(AppApplication.class, args);

    }

    @GetMapping("/hello")

    public String hello() {

    return String.format("Hello World !!");

    }

    }

    Listing 2-2

    AppApplication.java

    ```


    Now let us open a new terminal window and build the application using Maven (Figure
    [2-6](#523943_1_En_2_Chapter.xhtml#Fig6)).


    ![](images/523943_1_En_2_Chapter/523943_1_En_2_Fig6_HTML.jpg)


    A screenshot of a terminal window. The tool bars on the top include File, Edit,
    Selection, view, go, run, terminal, and help. The terminal includes New terminal
    which is highlighted, Run task, run build task, run active file, run selected
    text, configure tasks, and configure default build task. The options on the left
    list open editors and Application is selected.


    **Figure 2-6** Open a new terminal window


    Let us execute the following command to build the application as in Listing [2-3](#523943_1_En_2_Chapter.xhtml#PC3).
    Make sure you navigate to the directory in the terminal where the `pom.xml` file
    is present.


    ```

    mvn install

    Listing 2-3

    Build the application

    ```


    Once the build is successful, a directory named `target` with the runnable JAR
    file gets created. Navigate to the `target` directory and execute the following
    command in the target directory as in Listing [2-4](#523943_1_En_2_Chapter.xhtml#PC4).


    ```

    java -jar app-0.0.1-SNAPSHOT.jar

    Listing 2-4

    Run application

    ```


    Once the application boots up successfully, browse the following URL in the browser
    as in Listing [2-5](#523943_1_En_2_Chapter.xhtml#PC5).


    ```

    http://localhost:8080/hello

    Listing 2-5

    URL for the running application

    ```


    You can see the response from the `hello` REST API as in Figure [2-7](#523943_1_En_2_Chapter.xhtml#Fig7).


    ![](images/523943_1_En_2_Chapter/523943_1_En_2_Fig7_HTML.jpg)


    A screenshot of java spring boot R E S T A P I window. The bar on the top reads,
    localhost colon 8080 slash hello. The search window reads localhost colon 8080
    slash hello and is highlighted. The refresh and back buttons are on the top. The
    text on the main page reads, Hello world, with two exclamatory marks.


    **Figure 2-7** Browse Java Spring Boot REST API


    We can deploy this application to Azure. Now let us provision an Azure WebApp
    on which we can deploy this application.'
