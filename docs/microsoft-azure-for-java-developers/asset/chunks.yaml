- fmt: 'Go to the `DemoApplication` Java class and convert it into a REST Controller
    using the `RestController` attribute. Add the `createStudents` POST method to
    insert a Student record to the student table and add a `getStudents` GET method
    to fetch all the records in the `student` table. See Listing [7-6](#523943_1_En_7_Chapter.xhtml#PC6)
    for the code.


    ```

    package com.database.demo;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.http.HttpStatus;

    import org.springframework.web.bind.annotation.*;

    @SpringBootApplication

    @RestController

    @RequestMapping("/")

    public class DemoApplication {

    public static void main(String[] args) {

    SpringApplication.run(DemoApplication.class, args);

    }

    private final StudentRepository studentRepository;

    public DemoApplication(StudentRepository studentRepository) {

    this.studentRepository = studentRepository;

    }

    @PostMapping("/")

    @ResponseStatus(HttpStatus.CREATED)

    public Student createStudents(@RequestBody Student student) {

    return studentRepository.save(student);

    }

    @GetMapping("/")

    public Iterable getStudents() {

    return studentRepository.findAll();

    }

    }

    Listing 7-6

    DemoApplication class

    ```


