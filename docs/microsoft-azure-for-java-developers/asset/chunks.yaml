    ## Build a Near-Production Scenario


    Now let us work on a near-production scenario. We will discuss the use case as
    the problem statement and understand the requirement for the scenario, and then
    we will provision the Azure infrastructure and build the solution for the problem
    statement. This activity will give you an idea of how to use Java with Azure in
    the production environment.


    ### Problem Statement


    We have a student table in the Azure SQL database. The table contains the roll
    number, name, and marks of the students in a class. Let us build a Spring Boot
    web application to get the student records from the student table and render it
    in the browser. The application should be available to authenticated users only.
    Make sure that you enable logging for the application so that you can debug the
    application when it is deployed on Azure WebApp.'
  trans: '

    ### 规划符合您需求的云成本


    在为应用程序设计 Azure 基础设施时，总拥有成本是一个关键因素。您必须分析应用程序中可能影响使用成本的计算需求及所有必要需求。例如，您计划使用无服务器节点来扩展
    Azure 集群。无服务器节点在 Azure 容器实例上运行，每次只能容纳一个 Pod。如果您一次需要数千个 Pod，就需要数千个 Azure 容器实例。相反，您可以检查是否可以使用虚拟机规模集进行扩展。单个基于虚拟机的节点一次可以容纳许多
    Pod。


    此外，在为 WebApp 规划应用服务计划时，请确保选择适合您应用程序计算及其他需求的正确计划。规划您的服务层级，或为符合应用程序确切需求的服务预留计算资源。不要预留可能浪费计算资源的更高层级，也不要选择应用程序计算资源不足的更低层级。为
    Azure 服务合理调整计算需求，可以为您节省大量成本。


    ### 规划可伸缩性、可用性和可靠性


    您的 Java 应用程序必须能够根据业务需求进行扩展、始终保持可用并具备容错能力。应用程序应具有高可用性。您必须尝试利用托管应用程序的服务中提供的自动缩放机制。您必须确保在负载均衡器、应用程序网关、流量管理器或
    Front Door 后面运行多个托管应用程序的服务实例，以确保如果其中一个实例发生故障，流量可以路由到其他实例。您必须为失败的操作设置重试机制。在重试期间，未能处理的数据应保持可用，以确保所有数据都能被成功处理。这一措施将确保应用程序的可靠性。


    ### 建立强大的调试和监控策略


    您必须利用 Azure Monitor 和 Application Insights 来收集应用程序和 Azure 基础设施的指标和日志。这一措施将帮助您在生产环境中调试故障、监控应用程序性能，并在出现异常时采取预防措施。应配置适当的警报，以便在发生故障或即将发生故障时通知相关利益方。


    您还可以利用第三方供应商提供的其他监控产品，如 Prometheus 和 AppDynamics。


    ### 保护您在 Azure 上的应用程序安全


    您必须为在 Azure 上运行的 Java 应用程序配置身份验证和授权。您可以使用 Azure Active Directory 或任何其他第三方身份提供商。所有应用程序的访问和操作都应受到监控并定期审计。


    ### 自动化 Azure 服务的启动和应用程序部署


    您必须利用基础设施即代码来自动化启动 Azure 资源，并使用 DevOps 管道促进应用程序部署。此策略将减少基础设施创建和应用程序部署过程中的人工错误。此外，当您在多个环境中部署应用程序时，它还能帮助您节省时间。


    ### 制定正确的备份和灾难恢复策略


    您必须定期备份应用程序数据，并在发生数据丢失时使其可用。存储备份数据可能成本高昂。因此，您必须决定需要保留备份数据多长时间，并清理超过保留期限的备份。您必须为应用程序规划灾难恢复策略。如果应用程序发生故障，您必须能够根据灾难恢复策略，从
    Azure 上的另一个实例或基础设施运行应用程序。并且您必须快速恢复故障基础设施中的应用程序。无论如何，业务必须保持正常运行。


    ## 构建接近生产环境的场景


    现在让我们处理一个接近生产环境的场景。我们将把用例作为问题陈述来讨论，并理解该场景的需求，然后我们将配置 Azure 基础设施并为该问题陈述构建解决方案。这一活动将让您了解如何在生产环境中将
    Java 与 Azure 结合使用。


    ### 问题陈述


    我们在 Azure SQL 数据库中有一个学生表。该表包含班级中学生的学号、姓名和成绩。让我们构建一个 Spring Boot Web 应用程序，从学生表中获取学生记录并在浏览器中呈现。该应用程序应仅对经过身份验证的用户可用。确保为应用程序启用日志记录，以便在应用程序部署到
    Azure WebApp 时能够进行调试。

    '
- fmt: '### Implementation: Create Infrastructure


    We need the following Azure services for the application:


    - `Azure WebApp` that will host the application

    - `Azure SQL Database` for the student table

    - `Application Insights` for logging and monitoring

    - `Azure Active Directory Application Registration` for application authentication


    Let us create each of these services first before building the Java application.
    We can start with creating `Azure WebApp` and `Application Insights`. `Azure WebApp`
    will host the application, and `Application Insights` will be used for logging
    and monitoring purposes. The application will ingest runtime logs into `Application
    Insights` that can be used later for debugging purposes.


    Go to the Azure portal and click *Create a resource* as in Figure [15-1](#523943_1_En_15_Chapter.xhtml#Fig1).
    You will get navigated to Azure Marketplace.


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig1_HTML.jpg)


    A Microsoft Azure window has the Azure services to create a resource.


    **Figure 15-1** Create a resource


    Click *Web* in the Marketplace and then click *Web App* as in Figure [15-2](#523943_1_En_15_Chapter.xhtml#Fig2).


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig2_HTML.jpg)


    A representation of click web app.


    **Figure 15-2** Click Web App


    Provide subscription, resource group, and name for the WebApp as in Figure [15-3](#523943_1_En_15_Chapter.xhtml#Fig3).


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig3_HTML.jpg)


    A screenshot which represents provide basic details.


    **Figure 15-3** Provide basic details


    Scroll down and provide other necessary basic details for the Web App as in Figure
    [15-4](#523943_1_En_15_Chapter.xhtml#Fig4).


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig4_HTML.jpg)


    A screenshot representing how to create application insights.


    **Figure 15-4** Provide basic details


    Go to the *Monitoring* tab and enable Application Insights. You need to select
    an existing Application Insights or create a new one. Click *Review + create*
    as in Figure [15-5](#523943_1_En_15_Chapter.xhtml#Fig5).


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig5_HTML.jpg)


    A screenshot representing click create in create web app.


    **Figure 15-5** Create Application Insights


    Click *Create* as in Figure [15-6](#523943_1_En_15_Chapter.xhtml#Fig6). Your Web
    App and Application Insights will get created. The Application Insights will get
    associated with the Web App, and you can ingest application logs to the Application
    Insights without making any other changes in the Web App.


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig6_HTML.jpg)


    A screenshot which represents how to create a resource.


    **Figure 15-6** Click Create


    Now let us spin up the Azure SQL database, create the student table and insert
    some student data. Go to the Azure portal and click *Create a resource* as in
    Figure [15-7](#523943_1_En_15_Chapter.xhtml#Fig7).


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig7_HTML.jpg)


    A Microsoft Azure window has the Azure services.


    **Figure 15-7** Create a resource


    Click *Databases* and then click *SQL Database* as in Figure [15-8](#523943_1_En_15_Chapter.xhtml#Fig8).


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig8_HTML.jpg)


    A screenshot of window representing a click SQL Database.


    **Figure 15-8** Click SQL Database


    Provide basic details for the Azure SQL database. Click *Next : Networking* as
    in Figure [15-9](#523943_1_En_15_Chapter.xhtml#Fig9).


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig9_HTML.jpg)


    A screenshot of the window representing to provide basic details.


    **Figure 15-9** Provide basic details


    Select the access to the database as a *Public endpoint* as in Figure [15-10](#523943_1_En_15_Chapter.xhtml#Fig10).
    Modify firewall rules for the database to allow other Azure services to access
    it, and also, you should be able to access the database from your local system.
    Click *Review + create*. And then click *Create*.


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig10_HTML.jpg)


    A screenshot illustrates the rules to configure firewall with the title Create
    SQL database.


    **Figure 15-10** Configure firewall rules


    Once the database gets created, go to the *Query editor* as in Figure [15-11](#523943_1_En_15_Chapter.xhtml#Fig11),
    provide the database credentials, and log in to the database.


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig11_HTML.jpg)


    The screenshot represents Go to the query editor window.


    **Figure 15-11** Go to the Query editor


    Run the SQL query shown in Listing [15-1](#523943_1_En_15_Chapter.xhtml#PC1) to
    create the student table.


    ```

    create table student

    (

    roll int identity primary key,

    name varchar(100),

    age int,

    marks int

    )

    ```


    **Listing 15-1** Create the student table


    Insert some student data into the database.


    ```

    insert into [dbo].[student] values (''Abhishek M'', 18,88)

    insert into [dbo].[student] values (''Sam'', 16,72)

    insert into [dbo].[student] values (''Tom'', 18,64)

    insert into [dbo].[student] values (''Jim'', 19,92)

    ```


    **Listing 15-2** Insert student data


    We can follow the same steps as Chapter [12](#523943_1_En_12_Chapter.xhtml) to
    create a user in Azure Active Directory and register an application. While registering
    the application in Azure Active Directory, make sure you provide the following
    URL as in Listing [15-3](#523943_1_En_15_Chapter.xhtml#PC3) as Redirect URI. Replace
    `{WebApp}` with the name of the WebApp we created.


    ```

    https://{WebApp}.azurewebsites.net/login/oauth2/code/

    ```


    **Listing 15-3** Redirect URI


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig12_HTML.jpg)


    A screenshot of redirect URI configuration.


    **Figure 15-12** Redirect URI configuration'
