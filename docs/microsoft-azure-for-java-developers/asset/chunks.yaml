    \ 2 个密钥，包括高亮显示的读写密钥和只读密钥。读写密钥包括 URI、主密钥和辅助密钥。左侧的选项卡包括专用网关、密钥（高亮显示）和锁。\n\n图 8-7\n\
    \n点击数据资源管理器\n\n展开 Student 数据库，您可以看到 *class* 容器。点击*项*，如图 8-8 所示，您可以看到存储的学生记录。\n\
    \n![](img/523943_1_En_8_Fig8_HTML.jpg)\n\nSQL API 的截图。右侧的项显示编辑筛选器，包含 ID 从 1 到\
    \ 4 以及分区键。分区键列出了 eight standard、ninth standard、eighth standard 和 seventh standard。数据的下拉选项卡包括\
    \ students 和 class。class 的下拉选项卡包括 items 和 settings。\n\n图 8-8\n\n点击项\n\n点击任意一条记录，查看存储的数据，如图\
    \ 8-9 所示。\n\n![](img/523943_1_En_8_Fig9_HTML.jpg)\n\n左侧的选项显示编辑筛选器，包含 ID 从 1 到\
    \ 4 以及分区键。分区键列出了 eight standard、ninth standard、eighth standard 和 seventh standard。右侧窗口显示描述符和\
    \ ID、名称、分数、分区键、_rid 和 _self 的数据。描述符编号从 1 到 11。\n\n图 8-9\n\n点击一个项\n\n## 总结\n\n\
    在本章中，我们学习了 Azure Cosmos DB，以及如何使用 Azure 门户创建基于 Azure SQL API 的 Azure Cosmos DB。然后，我们开发了一个基于\
    \ Maven 的 Java 代码，并在 Azure Cosmos DB 上执行了插入和读取操作。在下一章中，我们将学习如何通过 Java 应用程序以编程方式使用\
    \ Azure Redis 缓存。\n\n以下是本章的关键要点：\n\n*   Azure Cosmos DB 是一个 NoSQL 数据库，支持全球范围内的水平数据复制，并确保低延迟。\n\
    \n*   存储在 Azure Cosmos DB 中的 NoSQL 数据可以使用以下 API 进行访问。\n    *   SQL API\n\n   \
    \ *   MongoDB API\n\n    *   Cassandra API\n\n    *   Table API\n\n    *   Gremlin\
    \ API\n\n*   您可以使用以下模式创建 Azure Cosmos DB 账户：\n    *   预配吞吐量\n\n    *   无服务器\n\n\
    \    *   自动缩放\n\n# 9. 在 Azure Redis 缓存中存储运行时数据\n\n现代应用程序生成并处理运行时数据。它们将运行时数据保存在内存中，或保存在持久性磁盘或数据存储中。将数据存储在内存中，可以更快地访问存储的临时运行时数据。然而，从磁盘或数据库等持久性存储访问数据时，速度比内存存储慢。Azure\
    \ Redis 缓存可帮助您在 Azure 中为应用程序存储和管理运行时数据。Azure Redis 缓存可帮助您快速访问运行时数据，并提高应用程序的性能。\n\
    \n在上一章中，我们学习了 Azure Cosmos DB 的基本概念。然后，我们创建了一个基于 Java 的应用程序，并使用 Azure Cosmos DB\
    \ SQL API 进行了操作。在本章中，我们将学习 Azure Redis 缓存的详细信息。然后，我们将预配 Azure Redis 缓存，并构建一个能够在\
    \ Azure Redis 缓存上执行读写操作的 Java 应用程序。\n\n## 结构\n\n在本章中，我们将讨论 Azure Redis 缓存的以下方面：\n\
    \n*   Azure Redis 缓存简介\n\n*   创建 Azure Redis 缓存\n\n*   使用 Azure Redis 缓存\n\n*\
    \   使用控制台操作 Redis 缓存\n\n## 目标\n\n学习本章后，您应能获得以下知识：\n\n*   理解 Azure Redis 缓存的概念\n\
    \n*   通过 Java 应用程序使用 Azure Redis 缓存\n"
- fmt: '# Introduction to Azure Redis Cache


    `Redis Cache` is an in-memory cache offering that helps you keep frequently accessed
    runtime data. You can fetch your data once from the data store and keep that in
    the cache for the first request. The data will get fetched from the cache for
    all subsequent requests instead of getting it from the data store. When the data
    in the data store changes, the data in the cache gets refreshed with the new version
    of data stored in the data store. This approach would ensure that the `Redis Cache`
    data is always up to date and the application always gets the latest data.


    Azure offers `Redis Cache` as a Platform-as-a-Service offering. You can spin the
    `Redis Cluster` in a few minutes and start using it. You need not set up any infrastructure
    for `Redis Cache` on Azure. The underlying Azure platform manages all the infrastructure
    aspects. Azure `Redis Cache` can store content, user session, and distributed
    data and even work as a message broker. The use cases are many. The following
    are some examples of use cases that you can achieve using `Redis Cache`:


    *   You have an application running on Azure `WebApp`. Whenever a user logs in,
    the session data for the user can be stored in the Azure `Redis Cache` so that
    the data can be available to all the `WebApp` instances and user requests. During
    peak hours, the Azure `WebApp` can scale to multiple instances.


    *   You have a Web application running either on Azure or on-premises or any cloud-based
    server, and it uses headers, footers, cascading style sheets, and other static
    pages. You can store a copy of all these static contents in the Azure `Redis Cache`.
    For the first time, the static content can be fetched from the server, and for
    the following requests, the data can be served from the cache. This approach would
    increase the performance of the application.


    *   You have an application that makes frequent database calls to fetch data.
    In such cases, you can store the frequently accessed and static data in the Azure
    `Redis Cache`. The application can fetch the data from the cache instead of the
    database. However, the data should be fetched from the database and simultaneously
    stored in the `Redis Cache` for the first user request. If the data changes in
    the database, the `Redis Cache` data should also be updated.


    *   You can have applications that perform distributed transactions. If all the
    transactions are successful, then only the data should be committed to the database.
    In such cases, you can store the intermediate transaction data for all the transactions
    in the `Redis Cache`, and if all the transactions are successful, then commit
    the data in the `Redis Cache` to the database or invalidate the data stored in
    cache for failed transactions as a rollback effort.


    Azure `Redis Cache` offers you very low latency and high-throughput data access
    for your applications. The data is stored in the memory of the Redis server managed
    by the Azure platform and can serve huge volumes of data requests with ease. The
    data stored is encrypted and highly secured.


    The following are pricing plans available for Azure `Redis Cache`:


    *   The `Basic` plan offers an open source `Redis Cache` version running on a
    single virtual machine instance. You can use this for development and test purposes.
    This plan offers no SLAs.


    *   The `Standard` plan offers an open source `Redis Cache` version running on
    two virtual machine instances, and the data gets replicated instantaneously across
    the virtual machine instances.


    *   The `Premium` plan offers an open source `Redis Cache` version running on
    multiple powerful virtual machine instances. It offers very high throughput, availability,
    low latency, and many other production-grade features.


    *   The `Enterprise` plan offers higher performance and availability than the
    `Premium` plan and provides Redis Labs-based enterprise offering for `Redis Cache`.
    You can run Redis-based modules like `Redis Bloom`, `RediSearch`, and `Redis Time
    Series`.


    *   The `Enterprise flash` plan offers a cost-effective Redis Labs-based enterprise
    version that runs on nonvolatile memory.


    ## Create Azure Redis Cache


    Let us create an Azure `Redis Cache` using the Azure portal. Go to the Azure portal
    and click `Create a resource` as shown in Figure [9-1](#523943_1_En_9_Chapter.xhtml#Fig1).
    We will perform read and write operations on this `Redis Cache` using the Java
    code.


    ![](images/523943_1_En_9_Chapter/523943_1_En_9_Fig1_HTML.jpg)


    A screenshot of the resource window. The contents in the window includes a search
    bar, text reading azure services with three options: create a resource, resource
    groups, and subscriptions.


    Figure 9-1


    `Create a resource`


    You will get navigated to Azure Marketplace. Click `Databases` and then click
    `Azure Cache for Redis`. See Figure [9-2](#523943_1_En_9_Chapter.xhtml#Fig2) for
    an example.


    ![](images/523943_1_En_9_Chapter/523943_1_En_9_Fig2_HTML.jpg)


    A screenshot of the create a resource window. A few options on the left include
    containers, databases, developer tools, devops, identity, integration, I T and
    management tools, media, and migration. A few options on the right include azure
    database for postgre S Q L, azure database for my S Q L, mongo D B atlas on azure,
    H V R for microsoft azure, and Azure cache for redis. Databases and Azure cache
    for redis are highlighted.


    Figure 9-2


    Click `Azure Cache for Redis`


    Provide the basic details to create the `Redis Cache`. You need to give the subscription
    and the resource group details, a name for the `Redis Cache`, the location to
    create the `Redis Cache`, and a pricing plan. We are using the `Basic C0` plan
    with no SLA for this demonstration, and this should be used only for development
    and testing purposes. Click `Next : Networking` to navigate to the Networking
    tab as in Figure [9-3](#523943_1_En_9_Chapter.xhtml#Fig3).


    ![](images/523943_1_En_9_Chapter/523943_1_En_9_Fig3_HTML.jpg)


    A screenshot of the create a resource window. A few options on the left include
    containers, databases, developer tools, devops, identity, integration, I T and
    management tools, media, and migration. A few options on the right include azure
    database for postgre S Q L, azure database for my S Q L, mongo D B atlas on azure,
    H V R for microsoft azure, and Azure cache for redis. Databases and Azure cache
    for redis are highlighted.


    Figure 9-3


    Provide basic details


    Select `Public Endpoint`. However, you should configure a `Private Link Endpoint`
    in the production scenario and set up a `Private Endpoint`. Using a higher pricing
    plan, you can integrate the `Redis Cache` in the `Virtual Network`. Click `Next
    : Advanced` as in Figure [9-4](#523943_1_En_9_Chapter.xhtml#Fig4).


    ![](images/523943_1_En_9_Chapter/523943_1_En_9_Fig4_HTML.png)


    A screenshot of the new redis cache network window. The options are basics, networking,
    advanced, tags, and review plus create. The networking option is created, displaying
    network connectivity, and connectivity methods including public endpoint, virtual
    networks, and private endpoints.


    Figure 9-4


    Provide networking details


    Let us select the latest `Redis Cache` version. Click `Review + create` as in
    Figure [9-5](#523943_1_En_9_Chapter.xhtml#Fig5).


    ![](images/523943_1_En_9_Chapter/523943_1_En_9_Fig5_HTML.png)


    A screenshot of the new redis cache network window. The options are basics, networking,
    advanced, tags, and review plus create. The advanced option is selected, displaying
    non T L S port with a check box for enabling it, and the redis version options
    of 4 and 6. Review plus create, previous, and next options are provided below
    with Review plus create is selected.


    Figure 9-5


    Click `Review + create`


    Click `Create` as in Figure [9-6](#523943_1_En_9_Chapter.xhtml#Fig6). This action
    will spin up the `Redis Cache` cluster on Azure.


