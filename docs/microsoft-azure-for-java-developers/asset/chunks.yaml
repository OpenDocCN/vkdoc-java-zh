  trans: '

    ## 容器简介


    我们构建一个应用程序并使其可用于生产环境。为了托管该应用程序，我们购买一台托管服务器和一个操作系统，并安装托管软件以及所有必要的依赖项来运行它。一旦托管环境准备就绪，连同应用程序的依赖项一起，我们将应用程序托管在服务器上。我们最终花费了大量时间和精力来采购托管服务器并使其准备好运行应用程序。有时我们还会陷入配置托管环境和依赖项的复杂性中，这进一步导致了延迟。假设您的企业中有多个环境。在这种情况下，您将需要花费同样的精力来让应用程序在测试、验收或生产等多个环境中启动并运行。


    您可以选择将应用程序托管在虚拟机上。您可以购买一台性能强大的服务器，并在该服务器上运行多个虚拟机。对于虚拟机，您需要购买一台服务器，在服务器上安装一个操作系统（称为主机操作系统），然后安装像
    Hyper-V 这样的虚拟化软件。虚拟化软件将底层服务器硬件（如 CPU、RAM、磁盘和其他基础设施）虚拟化，并在服务器上运行多个虚拟机。这些虚拟机隔离运行，并拥有各自份额的虚拟化硬件基础设施。每个虚拟机都有一个操作系统，称为客户操作系统。您需要在这些虚拟机上安装像
    Tomcat、IIS 或 node.js 这样的托管软件以及应用程序依赖项，然后将应用程序托管在这些虚拟机上。在这里，对于虚拟机，您需要花费精力来准备托管环境并使虚拟机准备好托管应用程序。这种应用程序托管方式与将应用程序托管在物理服务器上几乎相同。然而，您在这里获得的好处是，您可以共享底层硬件基础设施，并在虚拟机中隔离运行多个应用程序。这种方法可以为您节省成本。


    容器是一种更智能的应用程序托管方式。您可以构建应用程序，将其容器化，并将其与所有必要的应用程序依赖项一起保存在容器注册表中。容器注册表存储容器镜像。Azure
    容器注册表和 Docker Hub 就是容器注册表的例子。您可以选择允许所有人使用您的镜像而无需任何身份验证。对于此类场景，您需要将容器镜像存储在像 Docker
    Hub 这样的公共容器注册表中。您也可以使用像 Azure 容器注册表这样的私有容器注册表，并向有权访问该容器注册表的经过身份验证的用户提供您的容器镜像。


    一旦您在容器注册表中有了容器镜像，您就可以获得一台带有操作系统的服务器，并安装像 containerd 或 Docker 这样的容器运行时软件。然后拉取容器镜像并在服务器上运行它。您无需配置托管环境或应用程序依赖项。容器镜像包含了应用程序依赖项、托管软件以及应用程序本身。一旦您拉取容器镜像并将其作为容器运行，您的应用程序就启动并运行了。容器运行时虚拟化底层操作系统，并将容器作为操作系统线程运行。图
    4-1 展示了虚拟机与容器之间的区别。


    ![](img/523943_1_En_4_Fig1_HTML.jpg)


    一张图展示了虚拟机和容器。


    图 4-1


    虚拟机和容器


    注意


    与虚拟机相比，容器更轻量级。对于虚拟机，您虚拟化的是底层硬件基础设施，并且虚拟机内部有一个操作系统。而对于容器，服务器操作系统被虚拟化，容器作为操作系统线程运行，无需自身拥有操作系统。


    ## 了解 Azure Kubernetes 服务


    应用程序可能需要多个容器来托管其每个模块。让我们以一个三层松耦合应用程序为例，它有一个用户界面层、一个业务逻辑层和一个数据访问层。我们需要为用户界面层创建一个容器镜像，为业务逻辑层创建一个容器镜像，为数据访问层创建一个容器镜像。然后，我们可以将这些镜像中的每一个作为容器在生产环境中运行。设想一个场景：数据访问容器宕机了。在这种情况下，整个应用程序将宕机，因为业务层容器在没有数据访问层的情况下无法连接数据库。此外，如果应用程序的传入请求突然激增，会发生什么？我们可能需要添加更多容器来动态处理传入请求。这些容器应该能够安全地通信。应监控容器和应用程序的健康状况，以发现性能下降和故障。您必须处理所有这些关注点。


    一个应用程序中可能有成千上万个容器需要管理。为了让您的工作更轻松，我们有像 Kubernetes、Docker Swarm 等容器编排器。这些编排器管理这些容器，并确保容器具有高可用性、可靠性、可扩展性、容错性和安全性。它们解决了我们讨论过的应用程序中容器的所有问题。例如，如果一个容器宕机了，编排器会立即启动另一个容器来替换宕机的容器。


    Kubernetes 是谷歌提供的一个开源容器编排器。它由一个主节点（或控制平面）和多个工作节点组成。您的容器在工作节点的 Pod 内运行。在大多数情况下，虚拟机就是工作节点。如果您计划进行非常高速的扩展，那么您可以使用无服务器节点，即
    Azure 容器实例。无服务器节点可以根据传入流量自动扩展，并且比虚拟机启动速度快得多。控制平面控制和管理工作节点。它决定哪个工作节点来运行 Pod，并密切监控
    Pod 和工作节点。您可以将相同的容器（称为副本）作为副本集运行。例如，您可以在一个副本集中为数据访问层设置多个 Pod。如果副本集中的一个副本宕机了，其他副本仍然可以提供服务请求，直到另一个副本启动。您可以配置
    Kubernetes 集群，使其在传入负载增加时自动扩展 Pod 或工作节点。


    设置 Kubernetes 集群很繁琐。您可能需要花费大量精力和时间才能让 Kubernetes 集群启动并运行。控制平面是 Kubernetes 集群中最复杂的部分。像亚马逊、微软和谷歌这样的云提供商可以帮助您在几分钟内启动
    Kubernetes 集群。它们在其云上提供 Kubernetes 即服务，并在启动 Kubernetes 集群和为您管理控制平面时抽象出所有必要的复杂性。您对控制平面没有控制权。底层云平台为您管理控制平面，而您可以管理工作节点和应用程序容器的部署。云上的这种
    Kubernetes 服务称为托管 Kubernetes 服务。Azure Kubernetes 服务就是 Azure 上托管 Kubernetes 服务的一个例子。


    注意


    负载均衡器服务通过 HTTP 端口暴露您的应用程序，而节点端口则通过 30000 到 32767 之间的非标准端口暴露您的应用程序。

