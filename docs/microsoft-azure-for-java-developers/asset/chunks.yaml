- fmt: '# Structure


    In this chapter, we will discuss the following aspects of deploying Java applications
    on Azure Spring Cloud:


    - Introduction to Azure Spring Cloud

    - Create an Azure Spring Cloud service

    - Deploy a Java application on Azure Spring Cloud


    # Objectives


    After studying this chapter, you should be able to get the following learnings:


    - Understand the concept of Azure Spring Cloud

    - Build and run Java applications on Azure Spring Cloud


    # Introduction to Azure Spring Cloud


    Spring Cloud is a Java Virtual Machine–based open source framework that helps
    developers to build robust cloud-based Java solution. You can incorporate a variety
    of cross-cutting concerns like distributed messaging, service discovery, load
    balancing, service registrations, routing, and many more with ease.


    Azure Spring Cloud is a Platform-as-a-Service-based offering. Spring Cloud is
    not just for Java application, so it can also host .NET Core applications using
    Steeltoe. You need to focus on building the application. The underlying platform
    will take care of the hosting requirements. You need to provision the service
    and deploy your application to it.


    You can build microservices-based applications using Spring Cloud. It provides
    excellent built-in support for managing application configuration and service
    discovery. It integrates well with Azure services like Azure Active Directory,
    Application Insights, Azure Redis Cache, Storage Account, Cosmos DB, and other
    PaaS databases and services without writing any code. You can define service bindings
    for the application instances on Azure Spring Cloud and easily integrate with
    other Azure services.


    Application instances running on Azure Spring Cloud can scale using automatic
    configuration based on scaling criteria and conditions. It also supports manual
    scaling, where you need to specify the number of instances you need to run manually.


    Azure Spring Cloud works well for Continuous Integration and Continuous Deployment
    scenarios using Azure DevOps, Jenkins, Maven, Gradle, Terraform, and many more.
    You can integrate source control repositories like Azure Repos, GitHub, and Git
    repository and embrace the DevOps way of building your application with ease.


    You can build enterprise-grade applications using Azure Spring Cloud. Azure Spring
    Cloud runs on top of VMware Infrastructure on Azure. It provides excellent support
    for end-to-end application life cycle management. You can address enterprise-level
    concerns like monitoring, auditing, security, scalability, availability, and many
    more with ease.


    # Create an Azure Spring Cloud Service


    Let us create an Azure Spring Cloud service using the Azure portal. Go to the
    Azure portal and search for *azure spring apps*, as shown in Figure [5-1](#523943_1_En_5_Chapter.xhtml#Fig1),
    and then click *Azure Spring Apps* in the result.


    ![](images/523943_1_En_5_Chapter/523943_1_En_5_Fig1_HTML.jpg)


    A screenshot of the window of the Azure portal. The search bar has text that reads
    Azure spring apps, with the All tab selected. All search results are given below
    including Azure Spring Apps, Azure cosmos D B, Azure database for My S Q L, and
    snapshots. Azure spring apps search result is highlighted.


    Figure 5-1 Search for Azure Spring Apps


    Click *Create* as in Figure [5-2](#523943_1_En_5_Chapter.xhtml#Fig2). You will
    get navigated to screen where you can create Azure Spring Cloud.


    ![](images/523943_1_En_5_Chapter/523943_1_En_5_Fig2_HTML.jpg)


    A screenshot of Azure spring apps window. It has options to create, manage view,
    and refresh. Create tab is highlighted. The filter for any field is blank.


    Figure 5-2 Click Create


    Provide resource group name, subscription name, spring cloud name, location, and
    tier. Click *Review + create* as shown in Figure [5-3](#523943_1_En_5_Chapter.xhtml#Fig3).


    ![](images/523943_1_En_5_Chapter/523943_1_En_5_Fig3_HTML.png)


    A screenshot of the Azure Spring Apps window. The basics tab is selected. The
    project details include selecting the subscription type and create a new resource
    group, both fields are highlighted. The second part for service details requires
    Name and Region that are highlighted. A tab on the lower left side reads, review
    and create, which is highlighted.


    Figure 5-3 Click Review + create


    Click *Create* as shown in Figure [5-4](#523943_1_En_5_Chapter.xhtml#Fig4). This
    action will provision Azure Spring Cloud.


    ![](images/523943_1_En_5_Chapter/523943_1_En_5_Fig4_HTML.jpg)


    A screenshot of Azure Spring Apps create window. It has product details and different
    terms. The product details read Azure Spring Apps by Microsoft. The right side
    has pricing for the basic tier. Terms have different agreement criteria before
    creation. A tab on the lower left side is highlighted and it reads, Create.


