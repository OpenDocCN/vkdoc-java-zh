    \ shows the URL for the Microsoft Graph API Explorer.\n\n```\nhttps://developer.microsoft.com/en-us/graph/graph-explorer\n\
    Listing 10-7\nThe Microsoft Graph API Explorer URL\n```\n\nNow let us go to the\
    \ Microsoft Graph API Explorer and try out a popular Graph API that will get the\
