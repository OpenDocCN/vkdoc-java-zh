    ## 总结


    在本章中，我们学习了 Azure 存储的详细信息，并探讨了 Blob、队列、表和文件的概念。我们学习了如何使用 Azure 门户创建 Azure 存储。然后，我们开发了一个
    Java 代码，并对队列、表和 Blob 执行了操作。在下一章中，我们将学习如何从 Java 应用程序以编程方式使用 Azure SQL 数据库。


    以下是本章的关键要点：


    *   Azure 容器（Blob）可帮助你存储图像、视频、文件和其他二进制大型对象数据。


    *   Azure 文件提供托管的文件共享，用于保存文件，并可通过 SMB、NFS 或 HTTP 协议进行访问。


    *   Azure 队列为你的应用程序提供基于队列的消息存储。


    *   Azure 表可帮助你存储半结构化的 NoSQL 数据。


    *   Azure 存储是一种平台即服务产品，可将图像、文件和其他数据对象存储为 Blob。它提供基于 SMB 的文件系统来存储文件，为你提供基于队列的消息数据存储，并帮助你在
    Azure 环境中存储 NoSQL 表数据。


    # 7.  Java 应用程序中的 Azure SQL


    应用程序使用关系数据库来存储数据。我们需要设置一个关系数据库服务器，并将应用程序数据库托管在该服务器上。Azure 提供了一个 SQL 数据库，它是一种平台即服务产品。你无需购买任何服务器基础设施或在云上创建虚拟机来安装
    SQL 服务器。相反，你需要在 Azure 上预配 SQL 数据库服务并开始使用该数据库。当你不再需要该数据库时，可以停用该服务。


    在上一章中，我们学习了 Azure 存储服务的概念。然后，我们创建了一个基于 Java 的应用程序，并使用了 Azure 存储服务。在本章中，我们将学习 Azure
    SQL 数据库服务的详细信息，然后我们将预配 Azure SQL 数据库，并从 Java 应用程序代码中使用 Azure SQL 数据库。


    ## 结构


    在本章中，我们将讨论 Azure 存储服务的以下方面：


    *   Azure SQL 数据库简介


    *   创建 Azure SQL 数据库


    *   使用 Azure SQL 数据库


    *   保护 Azure 数据库


    ## 目标


    学习本章后，你应该能够获得以下知识：


    *   理解 Azure SQL 数据库的概念


    *   从 Java 应用程序使用 Azure SQL 数据库

