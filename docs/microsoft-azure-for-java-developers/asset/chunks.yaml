  raw: '## Introduction to Azure Monitor and Application Insights


    Azure Monitor helps you collect performance metrics and logs data from your applications
    and infrastructure on Azure, on-premises, or any other cloud platforms. It collects
    data from Azure Services, Azure Subscription, and Azure Tenant. The stored logs
    and metrics in the Azure Monitor can be analyzed and used further based on your
    needs. You can gather the following insights from the logs and metrics ingested
    collected by Azure Monitor:


    *   Using Application Insights, you can get insights into your applications.


    *   Using Container Insights, you can get insights into your containers.


    *   Using Virtual Machine Insights, you can get insights for your Virtual Machines.


    *   You can get insights into your network and storage.


    You can analyze the ingested logs using Log Analytics and analyze the metrics
    using Metrics Explorer. You can build dashboards and workbooks to visualize the
    analytics and insights for the ingested logs and metrics data. You can respond
    to the logs and metrics based on your analysis by creating alerts and auto-scale
    settings. You can integrate with Logic Apps workflows and perform actions based
    on your analytics. Figure [11-1](#523943_1_En_11_Chapter.xhtml#Fig1) demonstrates
    Azure Monitor.


    ![](images/523943_1_En_11_Chapter/523943_1_En_11_Fig1_HTML.jpg)


    The flowchart of Azure monitor. The inputs are applications, operating systems,
    azure resources, azure subscription, and tenants, which give to Azure monitor.
    The metrics and logs further provide insights, visualize, analyze, respond or
    alert and integrate with workflows in the azure monitor.


    Figure 11-1


    Azure Monitor


    Application Insights helps you monitor and gather insights for your logs and performance
    metrics data for your applications running on Azure, on-premises, or any other
    cloud. It can be integrated with applications developed using various programming
    languages and frameworks like .NET, Java, Python, PHP, and many more. Figure [11-2](#523943_1_En_11_Chapter.xhtml#Fig2)
    demonstrates Application Insights.


    ![](images/523943_1_En_11_Chapter/523943_1_En_11_Fig2_HTML.jpg)


    The chart of application I U gives business and data insights to form the database
    and external services. The application insights components are alerts, power B
    I, visual studio, REST A P I, and export.


    Figure 11-2


    Application Insights


    Note


    Azure Monitor collects and analyzes data for application, infrastructure, operating
    system, Azure services, tenants, and Azure subscriptions. Application Insights
    is a subset of Azure Monitor and helps you analyze and gather insights from application
    data.


    ## Configure Azure Monitor Metrics and Dashboard


    Let us configure Metrics for an Azure WebApp using Azure Monitor. We will then
    create a private dashboard to display the metrics. As a prerequisite, we should
    have a WebApp created beforehand. Refer to Chapter [2](#523943_1_En_2_Chapter.xhtml)
    to learn how to create WebApp. Go to the Azure portal and search for *Monitor*.
    Click *Monitor* in the search results as in Figure [11-3](#523943_1_En_11_Chapter.xhtml#Fig3).


    ![](images/523943_1_En_11_Chapter/523943_1_En_11_Fig3_HTML.jpg)


    The chart of application I U gives business and data insights to form the database
    and external services. The application insights components are alerts, power B
    I, visual studio, REST A P I, and export.


    Figure 11-3


    Search for Monitor


    Click *Metrics* in the Azure Monitor as in Figure [11-4](#523943_1_En_11_Chapter.xhtml#Fig4).


    ![](images/523943_1_En_11_Chapter/523943_1_En_11_Fig4_HTML.jpg)


