    创建 SQL 数据库服务器步骤的屏幕截图。“服务器名称”和“位置”下拉列中的信息被高亮显示。同样，“身份验证方法”、“服务器管理员登录名”、“密码”和“确认密码”列中的信息也被高亮显示。底部的“确定”按钮也被高亮显示。


