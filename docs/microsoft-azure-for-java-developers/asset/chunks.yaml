    ## 总结


    在本章中，我们学习了 Application Insights 和 Azure Monitor 的基础知识。我们学习了如何为 Azure Monitor 指标配置仪表板和警报。随后，我们开发了一个基于
    Maven 的 Java 代码，并将日志推送到了 Application Insights。在下一章中，我们将学习如何使用 Azure Monitor 对应用程序用户进行身份验证。


    以下是本章的关键要点：


    *   Azure Monitor 帮助您从 Azure、本地或任何其他云平台上的应用程序和基础架构中收集性能指标和日志数据。


    *   Application Insights 帮助您监控并收集在 Azure、本地或任何其他云上运行的应用程序的日志和性能指标数据的见解。


    *   Application Insights 可以与使用各种编程语言和框架（如 .NET、Java、Python、PHP 等）开发的应用程序集成。


    # 12. 使用 Azure Active Directory 进行身份验证和授权


    应用程序应允许经过身份验证的用户访问。经过身份验证的用户应能访问其被授权的应用程序模块，并在应用程序中执行允许的活动。Azure Active Directory
    是 Azure 上的一个身份提供程序，可供托管在 Azure、本地或任何其他公有云或私有云上的应用程序用于身份验证和授权。


    在上一章中，我们学习了 Azure Monitor 和 Application Insights 的基本概念。然后，我们创建了一个 Java 应用程序，该应用程序可以使用
    Azure Monitor 生成性能指标，并使用 Azure Application Insights 为应用程序生成日志。在本章中，我们将使用 Spring
    Security 和 Azure Active Directory 来保护一个 Java 应用程序。


    ## 结构


    在本章中，我们将讨论 Azure Active Directory 的以下方面。


    *   Azure Active Directory 简介


    *   为身份验证和授权配置 Azure Active Directory


    *   配置 Java Spring Boot 应用程序


    *   Azure AD 的身份验证场景


    ## 目标


    学习本章后，您应能获得以下知识：


    *   理解 Azure Active Directory 的概念


    *   使用 Azure Active Directory


    *   使用 Azure Active Directory 为 Java Spring Boot 应用程序配置身份验证和授权


    ## Azure Active Directory 简介


    Azure Active Directory 是 Azure 上的一项身份即服务（IDaaS）产品。它在 Azure 上提供企业级的身份管理解决方案。Azure
    Active Directory 提供多租户目录管理服务。您还可以使用 AD Connect 将本地 Active Directory 集成到 Azure
    Active Directory，并将本地目录中的所有用户、组和角色同步到 Azure。您可以将其用作 Azure 上的域控制器，并将您的 Azure 虚拟机加入其中。


    Azure Active Directory 帮助您管理在 Azure、本地或任何其他云上运行的应用程序的用户身份验证和授权。它提供诸如单点登录、多重身份验证以及其他现代身份管理和治理产品等功能。您可以使用
    SAML、OAuth、OpenID Connect 或 WS-Federation 来对应用程序用户进行身份验证和授权。


    它支持集成 B2B 场景，即另一个业务组织可以进行身份验证、协作并消费该业务组织的服务。它还支持 B2C 场景，即最终客户可以进行身份验证、协作并消费该业务组织的服务。


    Azure Active Directory 是一项平台即服务产品，您只需配置和使用域和身份服务，无需构建和管理任何基础架构。


    ## 为身份验证和授权配置 Azure Active Directory


    让我们配置 Azure Active Directory，并使用它对用户进行身份验证并授权其使用 Java Web API。以下是我们将执行的步骤。我们将使用默认租户。但是，您可能更倾向于创建一个新租户并使用它。以下是我们将为配置
    Azure Active Directory 进行身份验证和授权而执行的步骤。


    1.  在 Azure Active Directory 中创建一个用户。


    2.  在 Azure Active Directory 中注册一个应用程序。


    3.  将用户分配到应用程序角色。


    ### 在 Azure Active Directory 中创建用户


    让我们在默认租户中创建一个用户。转到 Azure 门户。搜索 *Azure Active Directory*。在搜索结果中点击 *Azure Active
    Directory*，如图 12-1 所示。


    ![](img/523943_1_En_12_Fig1_HTML.jpg)


    一个 Azure 窗口的图像。顶部是搜索栏，其中包含 azure active directory。左侧是 Azure 服务，包含创建资源选项及其下方的最近使用的资源。窗口中央部分有以下选项：全部、服务
    84、市场 4 和 azure active directory 0。下方提供了包括 azure active directory、安全性和活动日志在内的服务。


    图 12-1


    搜索 Azure Active Directory


    您将被导航到默认租户或目录。点击 *用户*，如图 12-2 所示。我们需要创建一个用户，以便执行身份验证和授权。


    ![](img/523943_1_En_12_Fig2_HTML.jpg)


    默认目录概述的图像。左侧的选项包括：概述、预览功能、诊断并解决问题，以及管理（包括用户和组），其中用户被选中。中央的选项包括：添加、带有搜索字段的概述、基本信息和名称。


    图 12-2


    点击用户


    点击 *新建用户* 以创建一个用户，如图 12-3 所示。我们需要这个新用户来对应用程序执行身份验证和授权。


