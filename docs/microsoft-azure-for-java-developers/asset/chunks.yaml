    ## Work with Azure Redis Cache


    Now let us build a Java code that will insert data to the cache, read from it,
    set expiry for the cache data, and delete the data from the Redis Cache. We need
    the *jedis* package to work with the Redis Cache from Java code.


    Let us add the jedis package to the *pom.xml* file. Listing [9-1](#523943_1_En_9_Chapter.xhtml#PC1)
    shows an example.


    ```

    redis.clients

    jedis

    3.2.0

    jar

    compile


    Listing 9-1

    Pom.xml

    ```


    We need to connect the Azure Redis Cache from the Java code . We need to provide
    the hostname and the cache key we copied earlier. Listing [9-2](#523943_1_En_9_Chapter.xhtml#PC2)
    code builds a connection.


    ```

    boolean ssl = true;

    String hostName = "{Provide Host Name}";

    String cacheKey = "{Provide Cache Key}";

    //Redis Cache connects on port 6380

    int port = 6380;

    // Build connection to Redis Cache

    JedisShardInfo shardInfo = new JedisShardInfo(hostName, port, ssl);

    shardInfo.setPassword(cacheKey);

    Jedis jedisCache = new Jedis(shardInfo);

    Listing 9-2

    Connect to Redis Cache

    ```


    You can test if the connection is successful using the *ping* function as in Listing
    [9-3](#523943_1_En_9_Chapter.xhtml#PC3). You will get a response as *Pong* if
    the connection is successful.


    ```

    // Check if you are able to connect/ping to Redis Cache

    System.out.println( "Ping Result : " + jedisCache.ping());

    Listing 9-3

    Ping Redis Cache

    ```


    You can use the *set* function to set data in the cache as in Listing [9-4](#523943_1_En_9_Chapter.xhtml#PC4).
    You can set the data as key-value pairs.


    ```

    // Set Data 1 Key : Data 1, Value : This is value for Data1

    jedisCache.set("Data1", "This is value for Data1");

    // Set Data 2 Key : Data 2, Value : This is value for Data2

    jedisCache.set("Data2", "This is value for Data2");

    Listing 9-4

    Set data in Redis Cache

    ```


    You can use the *get* function and pass on the data key to fetch the data from
    the Azure Redis Cache as in Listing [9-5](#523943_1_En_9_Chapter.xhtml#PC5).


    ```

    // Read Data 1 from Redis Cache

    System.out.println( "Value for Data 1 : " + jedisCache.get("Data1"));

    // Read Data 2 from Redis Cache

    System.out.println( "Value for Data 2 : " + jedisCache.get("Data2"));

    Listing 9-5

    Read data from Redis Cache

    ```


    You can choose to expire the cache data for a key using the *expire* function
    as in Listing [9-6](#523943_1_En_9_Chapter.xhtml#PC6). You can specify the number
    of seconds after the cache data expires.


    ```

    // Set Expiry for Data 1

    jedisCache.expire("Data1", 60);

    Listing 9-6

    Expire data in Redis Cache after 60 seconds

    ```


    You can delete the data in the cache using the *del* function as in Listing [9-7](#523943_1_En_9_Chapter.xhtml#PC7).


    ```

    // Delete Data 2

    jedisCache.del("Data2");

    Listing 9-7

    Delete the data in Redis Cache

    ```


    Listing [9-8](#523943_1_En_9_Chapter.xhtml#PC8) is the complete code to work with
    Azure Redis Cache.


    ```

    import redis.clients.jedis.*;

    public class RedisDemo {

    public static void main(String args[])

    {

    boolean ssl = true;

    String hostName = "{Provide Host Name}";

    String cacheKey = "{Provide Cache Key}";

    //Redis Cache connects on port 6380

    int port = 6380;

    // Build connection to Redis Cache

    JedisShardInfo shardInfo = new JedisShardInfo(hostName, port, ssl);

    shardInfo.setPassword(cacheKey);

    Jedis jedisCache = new Jedis(shardInfo);

    // Check if you are able to connect/ping to Redis Cache

    System.out.println( "Ping Result : " + jedisCache.ping());

    // Set Data 1 Key : Data 1, Value : This is value for Data1

    jedisCache.set("Data1", "This is value for Data1");

    // Set Data 2 Key : Data 2, Value : This is value for Data2

    jedisCache.set("Data2", "This is value for Data2");

    // Read Data 1 from Redis Cache

    System.out.println( "Value for Data 1 : " + jedisCache.get("Data1"));

    // Read Data 2 from Redis Cache

    System.out.println( "Value for Data 2 : " + jedisCache.get("Data2"));

    // Set Expiry for Data 1

    jedisCache.expire("Data1", 60);

    // Delete Data 2

    jedisCache.del("Data2");

    jedisCache.close();

    }

    }

    Listing 9-8

    Complete code

    ```


