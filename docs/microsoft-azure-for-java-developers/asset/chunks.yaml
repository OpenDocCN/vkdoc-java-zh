    # 8. 使用 Azure Cosmos DB


    现代应用程序使用 NoSQL 数据库来存储数据。这些数据库应具有高度可扩展性、响应迅速且延迟极低。这些应用程序在全球范围内可用，因此其数据库也需要在全球范围内可用。对于此类应用程序，数据复制应能即时在全球范围内完成。Azure
    Cosmos DB 是 Azure 上基于云的 NoSQL 数据库，可以满足这些要求。


    在上一章中，我们学习了 Azure SQL 数据库的基本概念。然后，我们创建了一个基于 Java 的应用程序，并使用 Azure SQL 数据库进行了操作。在本章中，我们将学习
    Azure Cosmos DB 的详细信息，然后我们将预配 Azure Cosmos DB 并构建一个能够在 Azure Cosmos DB 上执行读写操作的
    Java 应用程序。


    ## 结构


    在本章中，我们将讨论 Azure Cosmos DB 的以下方面：


    *   Azure Cosmos DB 简介


    *   创建 SQL API Cosmos DB


    *   使用 SQL API


    ## 目标


    学习本章后，您应该能够完成以下任务：


    *   理解 Azure Cosmos DB 的概念


    *   从 Java 应用程序使用 Azure Cosmos DB


    ## Azure Cosmos DB 简介


    Azure Cosmos DB 是 Azure 上的一种平台即服务 NoSQL 数据库，最适合实时和近实时应用程序。它确保非常高的吞吐量，并保证弹性的读写可扩展性。存储的数据可以全局复制，并确保极低的延迟。该数据库可以跨多个
    Azure 区域进行复制，从而实现高可用性。


    您可以使用多种受支持的数据库 API 来访问存储在 Azure Cosmos DB 中的数据。以下是受支持的 API：


    *   *SQL API* 帮助您使用 SQL 查询访问存储的数据。您可以使用 SQL API 将关系数据库工作负载迁移到 Cosmos DB。


    *   *MongoDB API* 帮助您使用 MongoDB 查询访问数据。您可以使用 MongoDB 支持的 BSON 格式将数据插入到文档结构中。


    *   *Cassandra API* 帮助您使用面向列的架构存储数据。您可以使用 Cassandra 查询语言查询数据。


    *   *Table API* 帮助您以键值格式存储数据。


    *   *Gremlin API* 使用边和顶点以图形数据库格式存储数据。您可以使用图形查询语言查询数据。


    对于 Azure Cosmos DB，您需要按小时为您所需的吞吐量和消耗的存储空间付费。吞吐量使用请求单位来定义。请求单位是执行数据库操作所消耗的 CPU、内存和
    IOPs 的组合。您可以根据消耗的请求单位来创建 Azure Cosmos DB 帐户。以下是创建 Cosmos DB 帐户的受支持方式：


    *   *预配吞吐量*模式帮助您选择数据库操作所需的每秒请求单位数。您可以根据需要，以编程方式或手动增加或减少请求单位来进行缩放。


    *   使用*无服务器模式*，您无需选择任何请求单位，您只需按计费周期内消耗的请求单位数量付费。


    *   *自动缩放模式*可根据应用程序的需求自动缩放请求单位。此模式最适合具有不可预测流量模式的工作负载。


    ## 创建 SQL API Cosmos DB


