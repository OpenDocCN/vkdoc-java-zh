    to expose the user interface tier to the end user. The user interface tier should
    communicate with the business logic tier, and the business logic tier should communicate
    with the data access tier. The business logic tier and the data access tier should
    not be exposed to the external users, and its access should be limited inside
    the cluster. To address this scenario, we can have a load balancer service in
    front of the user interface tier so that the user interface tier gets exposed
    to the end user. You can have a cluster IP service in front of the business logic
    tier and the data access tier to limit its communication within the cluster.


    As a developer, you containerize the application and push it to the container
    registry . You then spin up the Kubernetes cluster and build a deployment YAML
    file for the Kubernetes cluster. The deployment YAML file will have all necessary
    details like the number of replicas, services, containers to run on the cluster,
    and many more details needed for the application containers to run on Kubernetes
    worker nodes. You then pass on this deployment file to the control plane. The
    control plane then schedules the pods on the worker nodes based on the information
    you have provided in the YAML file . The pods will pull the container images from
    the container registry specified in the deployment file and then start them as
    containers.


    ## Containerize a Java Application and Run It on Azure Kubernetes Service


    Let us build a Java Spring Boot application, containerize it, push it to Azure
    Container Registry, and run it in the Azure Kubernetes Service cluster. We will
    use Spring Initializr to generate the Spring Boot application and create a Docker
    file manually.


    You should have Docker Desktop installed on your local system to containerize
    your application as a prerequisite. Docker provides a community edition for Docker
    Desktop to experiment with Docker offerings and try out the Docker containers.
    You can use the Docker Desktop community edition.


    We will create the Azure Kubernetes Service and the Azure Container Registry first.
    Then we will build the application, containerize it, push it to the Azure Container
    Registry, and then run the application container on Azure Kubernetes Service.


    ### Create Azure Container Registry


    Azure Container Registry is a private Docker registry and can store container
    images on Azure platform. The images stored will be accessible to only those who
    have access to the registry. It can also store artifacts like Helm Charts and
    other artifacts pertaining to Open Container Initiative (OCI) specifications.
    Let us create an Azure Container Registry. Go to the Azure portal and click *Create
    a resource,* as shown in Figure [4-2](#523943_1_En_4_Chapter.xhtml#Fig2).


