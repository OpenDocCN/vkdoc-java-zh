- fmt: '### Run the Container on Azure Kubernetes Service


    Now we have containerized the Java application and have pushed it to the Azure
    Container Registry. Let us run the container image on Azure Kubernetes Service.
    We will use the *Azure Cloud Shell* to execute the *Azure CLI* and `kubectl` commands
    to deploy the container image on Azure Kubernetes Service. If you are planning
    to try this locally on your system, then you need to install Azure CLI and `kubectl`
    locally. You must also log in to the Azure environment locally before you try
    out the illustrated steps. With *Azure Cloud Shell*, you need not do any installations
    or log in to the Azure environment and you can get started directly with the commands
    illustrated here. Go to the Azure portal and click Azure Cloud Shell. Select the
    *Bash* prompt when the cloud shell opens up as shown in Figure [4-19](#523943_1_En_4_Chapter.xhtml#Fig19).


    ![](images/523943_1_En_4_Chapter/523943_1_En_4_Fig19_HTML.jpg)


    A screenshot of the azure cloud shell window. It has a search bar and 5 prompts
    on the right side of the search bar. The first one, bash prompt is highlighted.
    The components of the page are S Q L databases, storage accounts, content moderator,
    virtual networks, and A P I management.


    Figure 4-19


    Open Azure Cloud Shell


    We need to fetch the credentials locally on the cloud shell and authenticate with
    the Azure Kubernetes Service. Run the command shown in Listing [4-12](#523943_1_En_4_Chapter.xhtml#PC12)
    to get authenticated.


    ```

    az aks get-credentials -n aksdemo -g rg-aksdemo –admin

    Listing 4-12

    Get the cluster credentials

    ```


    Now let us open the `nano` editor and create the `deploy.yaml` file. In this YAML,
    we specify the container image repository details, the number of replicas, the
    load balancer service for exposing the pod to the Internet, and the port details
    where the image would run on the pod and the load balancer service. In a nutshell,
    we are defining the Kubernetes deployment configuration with three replicas and
    a load balancer service that will expose the application to the Internet. Run
    the command shown in Listing [4-13](#523943_1_En_4_Chapter.xhtml#PC13) to open
    the `nano` editor.


    ```

    nano deploy.yaml

    Listing 4-13

    Open the nano editor

    ```


    Paste the YAML shown in Listing [4-14](#523943_1_En_4_Chapter.xhtml#PC14) in the
    `deploy.yaml`. Save the YAML and close the `nano` editor.


    **Note**


    You need to provide the image path in Listing [4-14](#523943_1_En_4_Chapter.xhtml#PC14)
    based on the Azure Container Registry you are using and the name of the container
    image that you created.


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: mydemoapp

    labels:

    app: mydemoapp

    spec:

    selector:

    matchLabels:

    app: mydemoapp

    replicas: 3

