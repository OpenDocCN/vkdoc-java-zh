    The screenshot of Microsoft Azure with application insights in the search box.
    The option is seen in the services drop down menu and another option of application
    gateways is below it.


    Figure 11-30


    Create Application Insights


    Provide the basic details for Application Insights. We need to keep the logs in
    a Log Analytics workspace, and hence, we need to create one or use an existing
    one. Application Insights will connect to this Log Analytics workspace and get
    the log insights. Click *Review + create* and then click *Create* as in Figure
    [11-31](#523943_1_En_11_Chapter.xhtml#Fig31).


