    Listing [15-5](#523943_1_En_15_Chapter.xhtml#PC5) is the `application.properties`
    file. Here in this file, we need to provide the database connection details, Application
    Insights instrumentation key, and Azure Active Directory details.


    ```

    logging.level.org.springframework.jdbc.core=DEBUG

    # Specifies Database details:

    spring.datasource.url=jdbc:sqlserver://{Provide Database Name}.database.windows.net:1433;database={Provide
    Database Name};encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;

    spring.datasource.username={Provide Database User Name}@{Provide Database Name}

    spring.datasource.password={Provide Database Password}

    spring.sql.init.mode=always

    # Specifies App Insights Instrumentation Key:

    azure.application-insights.instrumentation-key={Provide Instrumentation Key}

    spring.application.name=StudentApp

    # Specifies your Active Directory ID:

    azure.activedirectory.tenant-id={Provide Tenant ID}

    # Specifies your App Registration''s Application ID:

    azure.activedirectory.client-id={Provide Client ID}

    # Specifies your App Registration''s secret key:

    azure.activedirectory.client-secret={Provide Client Secret}

    Listing 15-5

    Application.properties

    ```


    Let us create a `Student` class as in Listing [15-6](#523943_1_En_15_Chapter.xhtml#PC6).
    The `Student` class works as a domain model for the `student` database table.


    ```

    package com.database.demo;

    import org.springframework.data.annotation.Id;

    public class Student {

    public Student(){

    }

    public Student(String name, int Age, int marks){

    this.name = name;

    this.age = age;

    this.marks = marks;

    }

    @Id

    private int roll;

    private String name;

    private int age;

    private int marks;

    private int getRoll()

    {

    return roll;

    }

    private void setRoll(int roll)

    {

    this.roll = roll;

    }

    public String getName() {

    return name;

    }

    public void setName(String name) {

    this.name = name;

    }

    public int getAge() {

    return age;

    }

    public void setAge(int age) {

    this.age = age;

    }

    public int getMarks() {

    return marks;

    }

    public void setMarks(int marks) {

    this.marks = marks;

    }

    }

    Listing 15-6

    Student class

    ```


    Now let us add a `StudentRepository` interface as in Listing [15-7](#523943_1_En_15_Chapter.xhtml#PC7)
    in the same folder where we have the `Student` class and the `DemoApplication`
    class. The `StudentRepository` interface works as the repository class for the
    database and the domain model. The Spring Data JDBC manages this repository class.


    ```

    package com.database.demo;

    import org.springframework.data.repository.CrudRepository;

    public interface StudentRepository extends CrudRepository {

    }

    Listing 15-7

    StudentRepository class

    ```


    Create the `DemoApplication` Java class as in Listing [15-8](#523943_1_En_15_Chapter.xhtml#PC8)
    and convert it into a REST Controller. In the REST GET API, we access the Azure
    SQL database and return an HTML response with the student details. Authentication
    is enabled, and we are logging traces and exceptions to Application Insights.


    ```

    package com.database.demo;

    import com.microsoft.applicationinsights.TelemetryClient;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.http.HttpStatus;

    import org.springframework.security.access.prepost.PreAuthorize;

    import org.springframework.web.bind.annotation.*;

    @SpringBootApplication

    @RestController

    @RequestMapping("/")

    public class DemoApplication {

    public static void main(String[] args) {

    SpringApplication.run(DemoApplication.class, args);

    }

    static final TelemetryClient telemetryClient = new TelemetryClient();

    private final StudentRepository studentRepository;

    public DemoApplication(StudentRepository studentRepository) {

    this.studentRepository = studentRepository;

    }

    @GetMapping("/")

    @ResponseBody

    @PreAuthorize("hasAuthority(''APPROLE_superuser'')")

    public String getStudents() {

    Iterable students = studentRepository.findAll();

    String html = "" ;

    try{

    for (Student student: students) {

    html = html+"";

    html = html+"Roll : " + student.getRoll()+"";

    html = html+"Name : " + student.getName()+"";

    html = html+"Age : " + student.getAge()+"";

    html = html+"Marks : " + student.getMarks()+"";

    telemetryClient.trackTrace("Processing Success with Roll : "+student.getRoll());

    }

    html = html+"";

    }

    catch(Exception ex){

    telemetryClient.trackException(ex);

    }

    return html;

    }

    }

    Listing 15-8

    DemoApplication class

    ```


    Build the application. It should compile successfully.'
