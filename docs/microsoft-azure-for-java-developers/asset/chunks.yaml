    supported for Azure Functions Runtime 2.x and above :


    *   Blob storage (Input, Output)


    *   Azure Cosmos DB (Input, Output)


    *   Event Grid (Output)


    *   Event Hubs (Output)


    *   HTTP and webhooks (Output)


    *   IoT Hub (Output)


    *   Queue storage (Output)


    *   SendGrid (Output)


    *   Service Bus (Output)


    *   Table storage (Input, Output)


    *   Twilio (Output)


    *   Dapr (Input, Output)


    *   Kafka (Output)


    *   RabbitMQ (Output)


    *   SignalR (Input, Output)


    You cannot create Kafka and RabbitMQ Triggers using Consumption Plan. Dapper Triggers
    are applicable for Azure Kubernetes Service.


