- fmt: "### Figure 13-15\n**Provide login credentials**\n\nYou can provide the command\
    \ to create a resource group, an App Service Plan, and the WebApp. Select `*PowerShell*`\
    \ as `*Script Type*` and `*Inline script*` as `*Script Location*` as in Figure\
    \ [13-16](#523943_1_En_13_Chapter.xhtml#Fig16). We need not log in to the Azure\
    \ portal and select a subscription.\n\n![A screenshot of the resource group creation\
    \ page. Display name: Azure CLI, Azure resource manager connection, script type:\
    \ power shell, script location: inline script, and inline script The highlighted\
    \ text under inline script says to create a resource group, an app service plan,\
    \ and a web app.](images/523943_1_En_13_Chapter/523943_1_En_13_Fig16_HTML.jpg)\n\
    \n### Figure 13-16\n**Configure the Azure CLI task**\n\nProvide a meaningful name\
    \ to the pipeline as in Figure [13-17](#523943_1_En_13_Chapter.xhtml#Fig17).\n\
    \n![A screenshot of the webpage titled create web app. The text, create a web\
    \ app, on the top is highlighted. The options on the panel below are pipeline,\
    \ tasks, variables, retention, options, and history. The dropdown on the tasks\
    \ opens the following options. Stage 1, agent job, and Azure CLI.](images/523943_1_En_13_Chapter/523943_1_En_13_Fig17_HTML.jpg)\n\
    \n### Figure 13-17\n**Provide a pipeline name**\n\nClick `*Save*` as in Figure\
    \ [13-18](#523943_1_En_13_Chapter.xhtml#Fig18). This action will save the pipeline.\n\
    \n![A screenshot of the webpage to save the task. The save option on the top is\
    \ highlighted. The options under Azure CLI include task version, display name,\
    \ Azure resource manager connection, and script type. The dropdown box under the\
    \ Azure resource manager connection is shaded.](images/523943_1_En_13_Chapter/523943_1_En_13_Fig18_HTML.jpg)\n\
    \n### Figure 13-18\n**Save the pipeline**\n\nClick `*Create release*` to create\
    \ a new release as in Figure [13-19](#523943_1_En_13_Chapter.xhtml#Fig19).\n\n\
    ![A screenshot of the Azure CLI webpage. The option to create a release is highlighted\
    \ at the top. The options under Azure CLI includes task version, display name,\
    \ Azure resource manager connection with a shaded dropdown box, and script type.](images/523943_1_En_13_Chapter/523943_1_En_13_Fig19_HTML.jpg)\n\
    \n### Figure 13-19\n**Create a release**\n\nSelect the stage and click `*Create*`\
    \ as in Figure [13-20](#523943_1_En_13_Chapter.xhtml#Fig20).\n\n![A screenshot\
    \ of the webpage where a new release can be created. The fields mentioned are\
    \ as follows. Pipeline: stage 1: change the trigger from automated to manual by\
    \ clicking on it. Stages of a trigger change: stage 1 is displayed in the highlighted\
    \ dropdown box. Release information. The create tab is highlighted on the bottom\
    \ left.](images/523943_1_En_13_Chapter/523943_1_En_13_Fig20_HTML.jpg)\n\n### Figure\
    \ 13-20\n**Click Create**\n\nClick on the release that got created as in Figure\
    \ [13-21](#523943_1_En_13_Chapter.xhtml#Fig21).\n\n![A screenshot of the webpage\
    \ to create web app. The text on the top reads release, release 1, has been created.\
    \ Release 1 is highlighted. The option on the panel below includes pipeline, tasks,\
    \ variables, retention, options, and history. The task dropdown opens the following\
    \ data. Stage 1, agent job, and Azure CLI.](images/523943_1_En_13_Chapter/523943_1_En_13_Fig21_HTML.jpg)\n\
    \n### Figure 13-21\n**Click on the release created**\n\nClick `*Deploy*` as in\
    \ Figure [13-22](#523943_1_En_13_Chapter.xhtml#Fig22).\n\n![A screenshot of the\
    \ release 1 webpage. The pipeline option on the top panel opens a screen below.\
    \ It is divided into 2 parts, left and right. Release is mentioned on the left\
    \ and stages on the right. The left screen has a box titled manually triggered.\
    \ The right screen has a box titled stage 1, not deployed, The option to deploy\
    \ is highlighted.](images/523943_1_En_13_Chapter/523943_1_En_13_Fig22_HTML.jpg)\n\
    \n### Figure 13-22\n**Deploy release**\n\nClick `*Deploy*` to start creating the\
    \ WebApp as in Figure [13-23](#523943_1_En_13_Chapter.xhtml#Fig23). Once the pipeline\
    \ completes successfully, the WebApp gets created.\n\n![A screenshot of the webpage\
    \ titled stage 1, deploy the release. The overview section has the following contents.\
    \ To be deployed, release 1. Artifacts: no artifact is associated with this release.\
    \ A comment box. The tabs to deploy and cancel are at the bottom. The deploy tab\
    \ is highlighted.](images/523943_1_En_13_Chapter/523943_1_En_13_Fig23_HTML.jpg)\n\
    \n### Figure 13-23\n**Click Deploy**\n\nFor verification, you can use the command\
    \ `curl -s -o /dev/null -w \"%{http_code}\"` [`https://mywebappiacdemo01.azurewebsites.net/`](https://mywebappiacdemo01.azurewebsites.net/)\
    \ and check for the status code as 200.\n\n## Summary\n\nThis chapter taught us\
    \ how to create Azure resources using Azure CLI and Azure DevOps. We created a\
    \ resource group, an App Service Plan, and an Azure WebApp using Azure CLI and\
    \ Azure DevOps. In the next chapter, we will learn how to deploy Java applications\
    \ to Azure using Azure DevOps.\n\nThe following are the key takeaways from this\
    \ chapter:\n\n*   Creating Azure resources using the Azure portal is effort-intensive\
    \ and risks introducing errors due to the manual efforts involved. You can automate\
    \ the resource creation activity and trigger the automation across multiple deployment\
    \ environments. This approach would save much time for you and would be error-free.\n\
    \n*   The following are some popular Infrastructure-as-Code (IaC) offerings to\
    \ automate the creation of Azure resources:\n    *   Azure CLI\n    *   Azure\
    \ PowerShell\n    *   ARM Templates\n    *   Terraform\n    *   Bicep\n\n# 14.\
    \ Building and Deploying Using Azure DevOps\n\nContinuous Integration Pipelines\
    \ build the application, and Continuous Deployment Pipelines deploy the applications\
    \ on the target hosting environment. This DevOps approach automates an application's\
    \ build and deployment methodology and is adopted across all modern enterprises.\
    \ These pipelines reduce manual errors during the deployment process and ensure\
    \ faster market release. We can use Azure DevOps Pipelines to build an application\
    \ and deploy it to Azure.\n\nIn the previous chapter, we learned the basic concept\
    \ of Infrastructure as Code (IaC). We then created an Azure CLI script to spin\
    \ up Azure resources. We also used the Azure DevOps CLI task to create a WebApp.\
    \ In this chapter, we will learn how to deploy a Java application to Azure using\
    \ Azure DevOps Pipeline.\n\n## Structure\n\nIn this chapter, we will discuss the\
    \ following DevOps-based application deployment concepts:\n\n*   Create a Java\
    \ application and commit it to Git-based Azure Repos\n*   Create a YAML-based\
    \ pipeline to build the application and deploy it to Azure WebApp\n\n## Objectives\n\
    \nAfter studying this chapter, you should be able to get the following learnings:\n\
    \n*   Learn how to work with Azure Repos\n*   Learn how to build and deploy Java\
    \ applications to Azure using Azure DevOps Pipeline"
