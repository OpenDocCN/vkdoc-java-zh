    *API permissions*. Click *Add a permission* and add the *Mail.Send* permission
    for Microsoft Graph as shown in Figure [10-13](#523943_1_En_10_Chapter.xhtml#Fig13).
    Make sure that you provide the admin consent to the permission you added.


    ![](images/523943_1_En_10_Chapter/523943_1_En_10_Fig13_HTML.jpg)


