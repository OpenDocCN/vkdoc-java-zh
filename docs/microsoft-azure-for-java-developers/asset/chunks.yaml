- fmt: '# Working with Azure Storage Blob


    Let us create a Maven-based Java console application using your favorite Java
    editors and implement logic to create a blob container, create a blob inside the
    container, and then read the blob we created inside the container.


    Add the package dependency shown in Listing [6-1](#523943_1_En_6_Chapter.xhtml#PC1)
    to the POM file of your Java application.


    ```

    com.azure

    azure-storage-blob

    12.13.0

    ```


    *Listing 6-1 Storage account package dependency*


    Go to the Storage Account in the Azure portal and get the connection string for
    the Storage Account in the Access keys section as shown in Figure [6-5](#523943_1_En_6_Chapter.xhtml#Fig5).


    ![](images/523943_1_En_6_Chapter/523943_1_En_6_Fig5_HTML.jpg)


    *A screenshot of the webpage titled access keys. The left panel has the following
    options. Search bar, storage browser, data storage, and security plus networking.
    The option, access keys, under security is highlighted. On the right, the highlighted
    tab named show keys provides the storage account name, key, and correction string.*


    *Figure 6-5 Get access keys*


    Now go to the main method of the Java class and add the following code to create
    a blob container. You need to create a `BlobServiceClient` object to help you
    work with the blob containers inside the Storage Account. You need to list all
    available containers using the `listBlobContainers` function and check if your
    container exists. Create the container using function `createBlobContainer` if
    it does not exist, else get the reference to the existing container using function
    `getBlobContainerClient`.


    ```

    String connectionString = "{Provide your Connection String}";

    String containerName = "sample";

    // Build the BlobServiceClient from connection string

    BlobServiceClient blobClient = new BlobServiceClientBuilder().connectionString(connectionString).buildClient();

    // Check if Container exists

    // List all containers and then check if the container already exists

    var existingContainers = blobClient.listBlobContainers();

    Boolean containerExists = false;

    for(BlobContainerItem containerItem : existingContainers)

    {

    if(containerItem.getName().equalsIgnoreCase(containerName)) {

    containerExists = true;

    }

    }

    //If the container does not exist then create the container

    // If the container exists then get reference for the existing container

    BlobContainerClient container;

    if(!containerExists) {

    // Create container

    container = blobClient.createBlobContainer(containerName);

    }

    else {

    // Get reference to the existing container

    container = blobClient.getBlobContainerClient(containerName);

    }

    ```


    *Listing 6-2 Create a container*


    Now let us create a blob with some data inside the container. Use the `getBlobClient`
    function to create a reference for the blob you are planning to upload, and then
    use the `upload` method to upload the blob with content `Hello Blob !!!!`. The
    code is demonstrated in Listing [6-3](#523943_1_En_6_Chapter.xhtml#PC3).


    ```

    //Create a blob inside the container

    String blobName = "sample.txt";

    BlobClient blob = container.getBlobClient(blobName);

    String data = "Hello Blob !!!!";

    InputStream dataStream = new ByteArrayInputStream(data.getBytes(StandardCharsets.UTF_8));

    blob.upload(dataStream,data.length(),true);

    ```


    *Listing 6-3 Create a blob inside the container*


    Now let us iterate all the blobs in our container and get the data in each blob.
    Use the `listBlobs` function to get all the blobs inside the container. Iterate
    through all the blobs and use the `getBlobClient` function to reference the blob.
    Use the `download` function to get the blob in an output stream as in Listing
    [6-4](#523943_1_En_6_Chapter.xhtml#PC4).


    ```

    // Read all blobs in the container

    var blobs = container.listBlobs();

    // Iterate through each of the blobs in the container

    for(BlobItem blobItem : blobs){

    // Get blob name

    System.out.println("Blob Name : "+blobItem.getName());

    // Read blob data

    BlobClient blobRead = container.getBlobClient(blobItem.getName());

    int blobSize = (int) blobRead.getProperties().getBlobSize();

    ByteArrayOutputStream outputStream = new ByteArrayOutputStream(blobSize);

    blobRead.download(outputStream);

    System.out.println("Blob Data : "+outputStream.toString());

    }

    ```


    *Listing 6-4 List all blobs and read the blobs*


