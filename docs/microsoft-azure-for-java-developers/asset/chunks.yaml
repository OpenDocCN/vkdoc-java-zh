    现在，我们已经将 Java 应用容器化，并将其推送到了 Azure 容器注册表。接下来，让我们在 Azure Kubernetes Service 上运行该容器镜像。我们将使用
    *Azure Cloud Shell* 来执行 *Azure CLI* 和 *kubectl* 命令，以在 Azure Kubernetes Service
    上部署容器镜像。如果你打算在本地系统上尝试此操作，则需要在本机安装 Azure CLI 和 kubectl。在尝试图示步骤之前，你还必须登录到本地的 Azure
    环境。使用 *Azure Cloud Shell*，你无需进行任何安装或登录 Azure 环境，可以直接使用此处图示的命令开始操作。转到 Azure 门户，点击
    Azure Cloud Shell。当云 Shell 打开时，选择 *Bash* 提示符，如图 4-19 所示。


    ![](img/523943_1_En_4_Fig19_HTML.jpg)


    Azure Cloud Shell 窗口的截图。它有一个搜索栏，搜索栏右侧有 5 个提示符。第一个是 Bash 提示符，已被高亮显示。页面组件包括 SQL
    数据库、存储帐户、内容审查器、虚拟网络和 API 管理。


    图 4-19


    打开 Azure Cloud Shell


    我们需要在云 Shell 中本地获取凭据，并使用 Azure Kubernetes Service 进行身份验证。运行清单 4-12 中所示的命令以进行身份验证。


    ```

    az aks get-credentials -n aksdemo -g rg-aksdemo –admin

    清单 4-12

    获取集群凭据

    ```


    现在，让我们打开 *nano* 编辑器并创建 *deploy.yaml* 文件。在此 YAML 文件中，我们指定了容器镜像仓库的详细信息、副本数量、用于将
    Pod 暴露到 Internet 的负载均衡器服务，以及镜像在 Pod 和负载均衡器服务上运行的端口详细信息。简而言之，我们正在定义具有三个副本和一个负载均衡器服务的
    Kubernetes 部署配置，该服务将把应用程序暴露到 Internet。运行清单 4-13 中所示的命令以打开 nano 编辑器。


    ```

    nano deploy.yaml

    清单 4-13

    打开 nano 编辑器

    ```


    将清单 4-14 中所示的 YAML 粘贴到 deploy.yaml 文件中。保存 YAML 并关闭 nano 编辑器。


    注意


    你需要根据所使用的 Azure 容器注册表以及所创建的容器镜像的名称，在清单 4-14 中提供镜像路径。


    ```

