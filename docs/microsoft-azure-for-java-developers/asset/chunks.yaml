    您创建的 Azure 资源或服务都排列在资源组内。资源组是所有资源的逻辑容器，而资源组则分组在订阅中。订阅定义了您所使用的 Azure 资源的定价模式。您需要购买一个
    Azure 订阅，才能开始创建资源。订阅进一步分组到管理组中。您可以在管理组级别、订阅级别或资源组级别为资源定义管理和治理策略。一个管理组内可以包含多个管理组。但是，您不能嵌套订阅或资源组。图
    1-2 展示了我们如何在资源组和订阅中对资源进行分组。


    ![](img/523943_1_En_1_Fig2_HTML.jpg)


    一张表示 Azure 资源分组的图表。


    图 1-2


    Azure 资源的分组


    ## Azure 对 Java 的支持


    Azure 对基于 Java 的应用程序提供了出色的支持。您可以构建 Spring MVC、Spring Boot、Open Liberty 或任何其他类型的
    Java 应用程序，并让这些应用程序在 Azure 上无缝运行。但是，您的 Java 应用程序应使用 Java 8 或更高版本开发。如果您有旧版 Java
    应用程序，则应将其现代化，升级到 Java 8 或更高版本，然后在 Azure 上运行。


    您可以选择构建 Java 应用程序并在 Linux 或 Windows 虚拟机上运行。您也可以方便地使用 Azure 市场中现成的虚拟机产品，例如 Oracle
    WebLogic Server。您的托管环境将与本地服务器大致相似，并且您将完全控制托管环境。您也可以选择构建应用程序并将其托管在 Azure WebApp
    上。Azure WebApp 是一种平台即服务产品。无需担心底层托管基础设施和软件，您只需构建应用程序并将其托管在 Azure WebApp 上即可。您可以使用微服务模式构建现代分布式
    Java 应用程序，并将应用程序作为容器托管在 Azure Kubernetes 服务中。您也可以选择在 Azure Spring Cloud 上运行应用程序。Azure
    Spring Cloud 是 Azure 上的 Spring Cloud 产品。您可以使用基于 Java 的 Azure Functions、Azure Logic
    Apps 以及 Azure 上的其他无服务器产品构建强大的无服务器应用程序。简而言之，Azure 为您的 Java 应用程序提供了广泛的可能性。


    您可以将 Java 应用程序与其他流行的 Azure 服务集成，例如 Azure Active Directory、Azure Redis 缓存、Azure
    SQL、Azure Cosmos DB、Azure 认知服务、Azure Logic Apps 等等。这些服务将帮助您构建云原生解决方案，而无需为应用程序的缓存、数据库、内容交付、身份验证、授权或其他问题使用任何本地组件。


    所有流行的 Java 编辑器（如 Eclipse、IntelliJ 和 Visual Studio Code）都支持无缝部署到 Azure。您还可以使用 Maven
    或 Gradle 打包 Java 应用程序并将其部署到 Azure。您可以利用 Azure DevOps 或 Jenkins 等流行的 DevOps 工具，在
    Azure 上为您的应用程序构建持续集成和持续部署。


    您可以使用 Azure Monitor 和 Application Insights 监控在 Azure 上运行的 Java 应用程序。您可以将应用程序日志引入
    Log Analytics 工作区，并在需要时查询这些日志。


    您可以将 Java 应用程序与 Azure Active Directory 集成，并使用 OAuth 为 Java 应用程序启用身份验证和授权。Azure
    Active Directory 是 Azure 上广泛接受的身份管理解决方案。您可以使用 Azure Active Directory 为 Java 应用程序构建强大的企业级身份管理策略，并启用单点登录或多重身份验证等流行的身份功能。


    注意


    Azure 为 Java 应用程序提供原生开箱即用的支持。您的应用程序应使用 Java 8 或更高版本。


    ## 总结


    在本章中，我们学习了云计算的基础知识。我们探讨了不同的云托管类型，例如基础设施即服务、平台即服务和软件即服务。然后，我们探讨了 Microsoft Azure
    以及 Microsoft Azure 提供的 Java 支持。在下一章中，我们将学习 Azure WebApp 的基础知识，然后构建一个 Spring Boot
    Java 应用程序，使用 Maven 打包它，并使用基于 Maven 的 Azure 插件将其部署到 Azure WebApp。


    以下是本章的关键要点：


    *   云计算就是从云供应商处租用云托管服务。


    *   Microsoft Azure、Amazon Web Services 和 Google Cloud Platform 是当今领先的云供应商。


    *   您可以使用基础设施即服务 (IaaS) 模型、平台即服务 (PaaS) 模型或软件即服务 (SaaS) 模型将应用程序托管在云上。


    *   Azure 支持无缝托管 Java 应用程序。


    *   您的 Java 应用程序应使用 Java 8 或更高版本才能在 Azure 上运行。


    *   您可以在虚拟机、Azure WebApp、Azure Function、Azure Kubernetes 服务或 Azure Spring Cloud
    上运行 Java 应用程序。


    # 2. Java for Azure WebApp


    WebApp 是一种常用的 Azure 服务。您可以构建应用程序并将其托管在 Azure WebApp 内，而无需担心托管基础设施。底层 Azure 平台负责处理所有基础设施和托管需求。WebApp
    帮助您的应用程序快速上线，因为您可以在几分钟内完成配置并托管应用程序。WebApp 支持多种编程语言和框架，例如 .NET、Java、PHP、Node.js
    等等。它为托管 Java 应用程序提供了出色的开箱即用支持。


    在上一章中，我们学习了云计算的基础知识以及 Azure 对 Java 的支持。在本章中，我们将学习 Azure WebApp 的详细信息，然后将 Java
    应用程序托管在 Azure WebApp 中。


    ## 结构


    在本章中，我们将讨论 Java for Azure WebApp 的以下方面：


    *   Azure WebApp


    *   App Service 计划


    *   在 Azure WebApp 上部署 Java 应用程序


    *   缩放托管在 Azure WebApp 上的 Java 应用程序


    ## 目标


    学习完本章后，您应该能够获得以下知识：


    *   理解 Azure WebApp 和 App Service 计划的概念


    *   在 Azure WebApp 上部署 Java 应用程序

