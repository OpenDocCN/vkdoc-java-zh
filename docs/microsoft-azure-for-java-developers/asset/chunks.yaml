    ## 总结


    在本章中，我们学习了 Azure Functions 的详细信息，探讨了 Azure Functions 可用的托管计划，然后学习了触发器和绑定的概念。接着，我们开发了一个
    Azure Function，它通过 HTTP 触发器触发，并使用输出队列绑定将消息放入存储队列。然后，我们使用 Maven 插件将该函数部署到 Azure。在下一章中，我们将学习如何将
    Java 应用程序容器化，并在 Azure Kubernetes 服务上运行它。


    以下是本章的关键要点：


    *   你可以在无服务器服务上构建和托管应用程序，而无需创建和管理托管基础设施。这些服务会自动扩展，无需进行任何扩展配置，并且仅在服务执行时收费。


    *   Azure Functions 是 Azure 上的函数即服务 (FaaS) 产品，属于无服务器服务。


    *   托管计划决定了 Azure Functions 运行的底层基础设施。它们决定了 Azure Functions 的扩展需求、执行间隔、虚拟网络集成以及许多其他重要方面。可用的托管计划包括消耗计划、高级计划、专用计划、应用服务环境计划和
    Kubernetes 计划。


    *   触发器将 Azure Functions 从空闲状态唤醒并开始执行。绑定帮助 Azure Function 与其他 Azure 或非 Azure 服务交换数据。你可以声明式地创建触发器和绑定，而无需编写大量代码。


    # 4. 使用 Azure Kubernetes 服务将 Java 应用程序容器化


    容器是当今现代化的应用程序托管选项。你可以构建应用程序，将应用程序与托管环境和应用程序依赖项一起容器化，然后将容器化镜像保存在集中式注册表中。你可以在目标环境中拉取容器化镜像，并轻松地将其作为容器运行。你可以构建一次镜像，然后在多个环境中运行，而无需设置任何托管或应用程序依赖项。一个应用程序可能由多个容器组成。例如，你可以有一个用于用户界面的容器、一个用于业务层的容器，以及另一个用于数据访问的容器。应用程序中的所有这些容器需要安全地相互通信。这些容器应始终保持运行状态以服务客户端请求。你应该轻松管理所有这些容器，并解决可用性、可靠性、可扩展性等架构问题。Kubernetes
    是一个容器编排平台，可以帮助你编排和管理这些容器。它将解决我们讨论的所有横切关注点。


    在上一章中，我们学习了 Azure Functions 的基础知识。然后，我们创建了一个基于 Java 的 Azure Function 并将其部署到 Azure。在本章中，我们将学习
    Azure Kubernetes 服务的详细信息，然后将 Java 应用程序容器化，并在 Azure Kubernetes 服务上运行它。


    ## 结构


    在本章中，我们将讨论使用 Azure Kubernetes 服务将 Java 应用程序容器化的以下方面：


    *   容器简介


    *   了解 Azure Kubernetes 服务


    *   将 Java 应用程序容器化并在 Azure Kubernetes 服务上运行


    ## 目标


    学习本章后，你应该能够获得以下知识：


    *   理解 Azure Kubernetes 服务的概念


    *   在 Azure Kubernetes 服务上构建并运行 Java 应用程序

