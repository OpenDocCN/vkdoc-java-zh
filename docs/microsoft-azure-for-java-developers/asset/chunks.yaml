- fmt: '# Working with Azure Storage Queue


    Let us create a Maven-based Java console application using your favorite Java
    editors and implement logic to create a storage queue, send messages to the queue,
    and then read the messages from the queue.


    Listing [6-6](#523943_1_En_6_Chapter.xhtml#PC6) shows a package dependency. Add
    that dependency to the POM file of your Java application.


    ```

    com.azure

    azure-storage-queue

    12.0.1


    Listing 6-6

    Add package dependency to the POM file

    ```


    We have already copied the connection string from the Azure portal. Let us go
    to the main method and add the following code to create the queue. We are getting
    the `QueueClient` object and creating a queue using the `create` function as in
    Listing [6-7](#523943_1_En_6_Chapter.xhtml#PC7).


    ```

    String queueName = "sample-queue";

    String connectionString = "{Provide connection string}";

    // Get reference to QueueClient

    QueueClient queueClient = new QueueClientBuilder().connectionString(connectionString).queueName(queueName).buildClient();

    //Create Queue

    queueClient.create();

    Listing 6-7

    Create a queue

    ```


    We are adding messages to the queue using `sendMessage` function as in Listing
    [6-8](#523943_1_En_6_Chapter.xhtml#PC8).


    ```

    //Add message to the Queue

    queueClient.sendMessage("My Message Added");

    queueClient.sendMessage("My Message Added 01");

    queueClient.sendMessage("My Message Added 02");

    queueClient.sendMessage("My Message Added 04");

    Listing 6-8

    Add messages to the queue

    ```


    We are reading the first message from the queue using the `peekMessage` function
    as in Listing [6-9](#523943_1_En_6_Chapter.xhtml#PC9).


    ```

    //Peek message from the Queue

    var message = queueClient.peekMessage();

    System.out.println("Peek first message in queue : "+message.getMessageText());

    Listing 6-9

    Peek message from queue

    ```


    We are reading all the messages from the queue and deleting the read messages
    using the `receiveMessages` function as in Listing [6-10](#523943_1_En_6_Chapter.xhtml#PC10).


    ```

    //Get all messages from the queue and remove them from the queue

    var messages = queueClient.receiveMessages(queueClient.getProperties().getApproximateMessagesCount());

    for(QueueMessageItem msg:messages){

    System.out.println("Added Message : "+msg.getMessageText());

    }

    Listing 6-10

    Read all messages from queue

    ```


    Listing [6-11](#523943_1_En_6_Chapter.xhtml#PC11) shows the complete code to perform
    queue operations. You can check the item that got added in the Storage Queue.
    Go to the storage account in the Azure portal and click `Storage browser` and
    then click `Queue`.


    ```

    import com.azure.storage.queue.*;

    import com.azure.storage.queue.models.*;

    import java.io.*;

    import java.nio.charset.StandardCharsets;

    public class QueueDemo {

    public static void main(String args[])

    {

    String queueName = "sample-queue";

    String connectionString = "{Provide connection string}";

    // Get reference to QueueClient

    QueueClient queueClient = new QueueClientBuilder().connectionString(connectionString).queueName(queueName).buildClient();

    //Create Queue

    queueClient.create();

    //Add message to the Queue

    queueClient.sendMessage("My Message Added");

    queueClient.sendMessage("My Message Added 01");

    queueClient.sendMessage("My Message Added 02");

    queueClient.sendMessage("My Message Added 04");

    //Peek message from the Queue

    var message = queueClient.peekMessage();

    System.out.println("Peek first message in queue : "+message.getMessageText());

    //Get all messages from the queue and remove them from the queue

    var messages = queueClient.receiveMessages(queueClient.getProperties().getApproximateMessagesCount());

    for(QueueMessageItem msg:messages){

    System.out.println("Added Message : "+msg.getMessageText());

    }

    }

    }

    Listing 6-11

    Working with storage queue

    ```


    # Working with Table Storage


    Now let us work with Table Storage. We will create a table, add a record to it,
    and then retrieve the record from the table. Table Storage stores data using partition
    key and row key. Partition key helps you spread the data across multiple partitions.
    For example, you are storing geographic data; you can use country names as partition
    keys. You can store the country-specific data in the partition represented by
    the country name as the partition key. Row key is the primary key for the data
    you are storing in the partition.


    Let us add the following package dependency in the POM file as in Listing [6-12](#523943_1_En_6_Chapter.xhtml#PC12).


    ```

    com.azure

    azure-data-tables

    12.1.5


    Listing 6-12

    Add dependency

    ```


    We have already copied the connection string from the Azure portal. Let us go
    to the main method and add the following code to create the table. We are getting
    the `TableServiceClient` object and creating a queue using the `createTableIfNotExists`
    function as in Listing [6-13](#523943_1_En_6_Chapter.xhtml#PC13). The table will
    only be created if it does not exist.


    ```

    String tableName="students";

    String connectionString="{Provide Connection String}";

    // Create table

    TableServiceClient tableServiceClient = new TableServiceClientBuilder()

    .connectionString(connectionString)

    .buildClient();

    TableClient tableClient = tableServiceClient.createTableIfNotExists(tableName);

    Listing 6-13

    Create the table

    ```


    We created the `TableEntity` object using the row key and the partition key for
    the data. We then populated the properties for the `TableEntity` object with the
    data we need to insert into the table as in Listing [6-14](#523943_1_En_6_Chapter.xhtml#PC14).


    ```

    // Add record to the table

    String partitionKey="Electronics Department";

    String rowKey="Sam";

    TableEntity entity = new TableEntity(partitionKey, rowKey)

    .addProperty("Age", 22)

    .addProperty("Grade", "A")

    .addProperty("Marks", 88);

    tableClient.createEntity(entity);

    // Add another record to the table

    tableClient = tableServiceClient.getTableClient(tableName);

    rowKey = "Rob";

    entity = new TableEntity(partitionKey, rowKey)

    .addProperty("Age", 24)

    .addProperty("Grade", "B")

    .addProperty("Marks", 60);

    tableClient.createEntity(entity);

    Listing 6-14

    Add record to table

    ```


    We can form a filter query and fetch the data stored in the table as in Listing
    [6-15](#523943_1_En_6_Chapter.xhtml#PC15). The `listEntities` function fetches
    the data from the table.


    ```

    //Retrieve the records in the table

    tableClient = tableServiceClient.getTableClient(tableName);

    String filterQuery = "PartitionKey eq ''Electronics Department''";

    ListEntitiesOptions options = new ListEntitiesOptions().setFilter(filterQuery);

    // Loop through the result set and display.

    tableClient.listEntities(options, null, null).forEach(tableEntity -> {

    System.out.println(tableEntity.getPartitionKey() +

    " " + tableEntity.getRowKey() +

    "\t" + tableEntity.getProperty("Age") +

    "\t" + tableEntity.getProperty("Grade") +

    "\t" + tableEntity.getProperty("Marks"));

    });

    Listing 6-15

    Retrieve records from the table

    ```


    Listing [6-16](#523943_1_En_6_Chapter.xhtml#PC16) shows the complete code for
    the table operation.'
