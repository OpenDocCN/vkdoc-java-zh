    \ You can modify the API call here and retrigger the API.\n\n![](images/523943_1_En_10_Chapter/523943_1_En_10_Fig18_HTML.png)\n\
    \nA screenshot of the graph API. Under the get option, the request body has braces.\
    \ The response preview has the coding with the information about the user. Here,\
    \ the display name is Abhishek Mishra, Surname is Mishra, and the giver's name\
    \ is Abhishek. His id and user principal name are hidden. The mail, phone, job\
    \ title, and language are null.\n\nFigure 10-18\n\nmy profile Graph API response\n\
    \n## Summary\n\nIn this chapter, we learned Microsoft Graph API basics and how\
    \ to configure permissions for Azure AD users to send mails using Microsoft Graph\
    \ API. We then developed a Maven-based Java code and sent mail using Microsoft\
    \ Graph API. In the next chapter, we will learn how to monitor Java applications\
    \ using Azure Monitor and Application Insights.\n\nThe following are the key takeaways\
    \ from this chapter:\n\n*   Microsoft Graph API provides you with a set of RESTful\
    \ endpoints that you can use to interact with Microsoft 365 Core services, Enterprise\
    \ Mobility and Security services, Windows 10 services, and Dynamics 365 services.\n\
    \n*   You should have a Microsoft 365 E5 Developer license to send mails using\
    \ Graph API as a prerequisite. This license would help you configure the mailbox\
    \ for the user or service account to send mails.\n\n*   The following are the\
    \ steps to configure Graph API and invoke the Graph API to send email from your\
    \ application:\n    *   You need to create a user in your Azure tenant.\n\n  \
    \  *   Assign Microsoft 365 E5 license to the user to use a Microsoft 365 mailbox.\n\
    \n    *   Create a service principal and provide necessary Graph API permission\
    \ to the service principal to send mail.\n\n    *   Configure your Java application\
    \ to send mail.\n\n# 11. Debugging and Monitoring Using Azure Monitor and Application\
    \ Insights\n\nApplications may get sluggish at times, and you may need to troubleshoot\
    \ performance issues. There can be various reasons for the degradation of application\
    \ performance. For example, the CPU or memory utilization can get high while the\
    \ application is processing a long-running request. We need a mechanism to periodically\
    \ monitor the application performance metrics like CPU, memory, and disk utilization\
    \ and alert the operations team whenever the application reaches the threshold\
    \ performance level. You may also need logs to debug your application failures.\
    \ Azure Monitor helps you track application metrics, and Azure Application Insights\
    \ helps you analyze the logs for your application running on Azure or on-premises\
    \ or any other public cloud.\n\nIn the previous chapter, we learned the basic\
    \ concept of the Microsoft Graph APIs. We then created a Java-based application\
    \ and configured Microsoft Graph API to send mails. In this chapter, we will learn\
    \ the details of the Azure Monitor and Azure Application Insights. Then we will\
    \ build a Java application that can Azure Monitor to generate performance metrics\
    \ and Azure Application Insights that can generate logs for the application.\n\
    \n## Structure\n\nIn this chapter, we will discuss the following aspects of the\
    \ Azure Monitor and Application Insights:\n\n*   Introduction to Azure Monitor\
    \ and Application Insights\n\n*   Configure Azure Monitor Metrics and Dashboard\n\
    \n*   Create performance alerts\n\n*   Work with Application Insights for Java\
    \ application\n\n## Objectives\n\nAfter studying this chapter, you should be able\
    \ to get the following learnings:\n\n*   Understand the concept of Azure Monitor\
    \ and Application Insights\n\n*   Configure Azure Monitor and Application Insights\
    \ for Java application"
