  trans: '

    ### 云部署模式


    您可以选择将应用程序托管在公有云供应商上，例如亚马逊、Azure、谷歌或其他云服务商。在公有云场景下，云基础设施由公有云供应商管理，任何个人或组织都可以从公有云租用云服务。不过，您无法控制公有云中抽象化的云基础设施。组织也可以选择创建自己的私有云，该组织内的所有项目都可以使用其私有云提供的云服务。在私有云场景下，组织对云基础设施拥有更大的控制权，因为它拥有该基础设施。然而，组织在购买和搭建云基础设施时可能会产生巨额资本支出，并在维护云环境时产生运营支出。您还可以选择将应用程序及其组件部分部署在公有云上，部分部署在组织的私有云上，形成混合云模式。例如，您的应用程序前端和服务运行在公有云上，而数据库则运行在组织的私有云上。


    以下是云计算的优势：


    *   您无需承担基础设施的所有权和维护成本，因为云供应商负责管理基础设施。您可以预测未来的云成本，并高效规划基础设施和应用程序预算。


    *   您只需单击一下，即可在几分钟内配置或取消配置云服务。如果不再需要该基础设施，您也不会被其锁定。


    *   您无需花费精力为应用程序搭建基础设施，从而确保更快的上市时间。


    *   您托管的应用程序具有高可用性，因为云供应商管理底层云环境，并根据您与供应商商定的服务级别协议，保证应用程序的高可用性。您还可以将应用程序的副本托管在跨多个区域的多个数据中心。这种策略可以确保即使某个数据中心或区域发生故障，您的应用程序仍然可用。


    *   您的应用程序运行在由云供应商管理的可靠且容错的基础设施上，您无需担心这些应用层面的问题。


    *   您的应用程序运行在高度可扩展的基础设施上。每当应用程序的传入请求增加或需要更多计算能力时，底层云环境会创建额外的基础设施来管理负载。同样，当不再需要额外的基础设施时，底层云基础设施会将其取消配置。您可以选择通过预定义所需服务实例的数量来手动扩展，也可以设置自动扩展，根据应用程序性能指标进行扩展。例如，如果传入负载增加，底层云基础设施会监控传入负载。当
    CPU 利用率、内存利用率或其他性能指标达到设定的阈值时，它会自动启动额外的资源。


    *   您的应用程序运行在弹性基础设施上，您可以设置扩展限制。底层基础设施不会添加或移除超出该限制的额外服务实例，这有助于您在扩展场景下控制成本。您的基础设施将在您定义的范围内进行扩展。


    *   将应用程序托管在云上可以确保您的应用程序能够全球可用。领先的云供应商在全球各地都设有数据中心。只要云供应商在该区域有数据中心，您就可以将应用程序托管在任何地方。


    *   您可以管理应用程序的客户延迟问题。您可以将应用程序的副本托管在靠近客户的数据中心。可用的基于云的负载均衡器在全球范围内运行，可以对托管在多个区域的应用程序进行负载均衡。这些负载均衡器会将客户请求路由到靠近客户的数据中心。


    *   您的应用程序运行在由云供应商管理的高度安全的环境中。领先的云供应商已获得主要安全机构和政府对其服务的认证。如今，许多政府门户网站和应用程序都运行在云上。


    ## Azure 简介


    Azure 是微软提供的云服务。它于 2008 年在微软的专业开发者大会上首次公布。微软于 2010 年 2 月将其云平台正式发布，并命名为 Windows
    Azure，随后在 2014 年更名为 Microsoft Azure。如今，Microsoft Azure 拥有 200 多种基于云的服务，可帮助您在 Azure
    上构建和托管前沿解决方案。


    在 Azure 上运行的应用程序可以是面向客户的简单网站、强大的数据平台、基于机器学习的复杂智能应用程序，或任何其他新一代解决方案。Azure 支持多种软件语言和框架，例如
    .NET Core、Java、Python 等。Microsoft Azure 是全球领先的私营组织和政府的热门云选择。您可以轻松地在 Azure 上构建高可用、可靠、容错且安全的解决方案。您在
    Azure 上的解决方案可以基于基础设施即服务模式、平台即服务模式或软件即服务模式。


    Azure 提供全球基础设施，包括遍布全球的 200 多个物理数据中心。这些数据中心通过微软拥有的高可用且安全的互联网络连接。这些数据中心被分组为可用区，一个地理区域由一组可用区组成。您可以将
    Azure 解决方案托管在单个可用区内的多个数据中心，使解决方案具有本地冗余；或托管在跨多个可用区的数据中心，使解决方案具有可用区冗余；或托管在跨多个区域的数据中心，使解决方案具有地理冗余。


    Azure 数据中心遍布全球，您的解决方案可以托管在靠近客户群的任何地方。您可以为在 Azure 上运行的工作负载构建出色的数据备份和恢复策略，因为您可以将数据和解决方案备份到跨多个可用区或区域的数据中心。即使运行您应用程序的主可用区或区域发生故障，您在
    Azure 上运行的解决方案也可以从您拥有备份的辅助可用区或区域迅速恢复并投入使用。


    Azure 提供跨多个类别的广泛服务，例如计算、数据、存储、网络等。表 1-1 描述了云从业者经常使用的一些 Azure 服务。


    表 1-1

    一些流行的 Azure 服务


    | 类别 | 服务 |

    | --- | --- |

    | 计算 | 虚拟机、Web 应用、函数应用、Kubernetes |

    | 数据 | SQL、MySQL、Cosmos DB |

    | 存储 | Blob 存储、队列存储、文件存储、Data Lake |

    | 网络 | 虚拟网络、防火墙、负载均衡器 |

    | 人工智能 | 认知服务、机器学习服务 |

    | 物联网 | IoT 中心 |


    您可以使用 Azure 门户（提供图形化直观的用户体验）或命令行工具（如 Azure CLI 或 Azure PowerShell）或这些服务公开的 REST
    API 来配置、删除或与您的 Azure 资源进行交互。您还可以使用 Terraform、Azure ARM 模板、Chef 或其他流行的基础设施即代码产品来构建基础设施即代码解决方案。

