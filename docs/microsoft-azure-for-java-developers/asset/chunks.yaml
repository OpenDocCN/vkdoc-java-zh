    Boot 应用程序。


    ```

    https://start.spring.io/

    清单 2-1

    Spring Initializr URL

    ```


    将*项目*选择为 *Maven 项目*，*语言*选择为 *Java*，并选择 *Spring Boot* 版本。Spring Boot 版本更新非常频繁，您可以根据个人偏好或选择最新的可用版本。按照图
    2-1 所示提供*项目元数据*。将*打包方式*选择为 JAR，*Java* 版本选择为 *11*。


