    We develop an application and host it on a server. We purchase the server infrastructure,
    install the Operating System, add it to the network, and install the necessary
    hosting software and application dependencies. And then, we host the application
    on the server. The entire process is time-consuming and incurs capital expenditure
    for purchasing the server infrastructure and necessary software required for the
    application to run.


    Once we have hosted the application, we need to keep the server and the hosting
    environment up and running. We need to perform fixes for the hardware failures
    and even replace the hardware if needed. We may have to apply software patches
    for the Operating System and the application hosting software from time to time
    as needed. We may also need hardware experts to work along with the application
    developers to perform the maintenance activity. We would incur operational expenditure
    in maintaining the hardware. Also, once we purchase the server, then we will have
    to live with it. If we plan to retire the application, then we may not need the
    server infrastructure anymore. We are blocked with the server as we have purchased
    it.


    To address these issues, enterprises started planning virtualized hosting environments.
    They started purchasing powerful data centers or server infrastructure and virtualized
    the underlying infrastructure as multiple Virtual Machines and started hosting
    the application on these Virtual Machines. They provisioned Virtual Machines to
    host new applications and decommissioned the Virtual Machines whenever the application
    retired. This process made the hosting environment to be available on demand.
    Large organizations like Amazon and Microsoft took inspiration from these virtualized
    environments and started building cloud infrastructure. They started running their
    applications on these cloud infrastructures and then commercialized their cloud
    services.


    Cloud computing is all about renting computing services like hosting environments,
    databases, storage, and many more. You can build your application, rent a hosting
    environment from a cloud vendor like Microsoft Azure or Amazon Web Services, and
    host your application in the rented hosting environment. You need not worry about
    the underlying hosting infrastructure as the cloud vendor will manage it. You
    need to deploy your application in the cloud service provided by the cloud vendor.
    This approach will save you both capital and operational expenditure. You need
    not purchase any server to host your application and need not worry about keeping
    the server up and running. You need to rent the hosting environment on demand
    from the cloud vendor and host your application. The cloud vendor will maintain
    the infrastructure, and you can decommission the infrastructure whenever you do
    not need it. And not just the hosting environment, you can rent other services
    like databases, storage, network, and many more such services as per your application
    requirements.


    Note


    Cloud computing is all about renting cloud hosting services from a cloud vendor
    like Microsoft Azure, Amazon Web Services, or Google Cloud Platform.


    ### Cloud Service Types


    You may choose to rent the Virtual Machine service from the cloud vendor and host
    your application on the Virtual Machine. Before hosting your application, you
    will have to install and configure the hosting environment and all necessary application
    dependencies. For example, suppose you are hosting a Java application. In that
    case, you need to install the Java Runtime Environment (JRE) as the hosting software
    and other necessary application dependencies. You need to install the Operating
    System and the hosting environment patches from time to time as per the need.
    Even though you save on the ownership cost of the underlying hosting infrastructure,
    you still incur some operational expenditure and need to plan some dedicated efforts
    for maintenance tasks. However, you need not worry about hardware failures for
    the underlying infrastructure as they will be taken care of by the cloud vendor.
    This approach of renting the Virtual Machine and hosting your application is called
    Infrastructure as a Service (IaaS) . Here in this hosting model, you get complete
    control of the hosting environment. You can install all necessary application
    dependencies as you need and configure the hosting environment. Hosting the application
    on a Virtual Machine gives you a similar experience of hosting it on an on-premises
    server.


    Note


    In the case of Infrastructure as a Service, you get greater control over the underlying
    hosting environment. However, this cloud hosting approach is expensive.


    Infrastructure-as-a-Service hosting option incurs operational cost and effort.
    To make the process more efficient, the cloud vendors came up with another effective
    hosting model. In this new model, the cloud vendor would take care of all operational
    aspects of the hosting environment and the underlying hosting infrastructure.
    As a developer, you need to build your application, rent the hosting environment,
    and then host the application. You need not worry about creating the underlying
    infrastructure or the hosting environment. The cloud vendor will own all the maintenance
    activities for the underlying infrastructure, Operating System, and hosting software
    . This approach is a cost-effective option as you need not worry about purchasing
    the infrastructure and maintaining the infrastructure and the hosting environment.
    You need to focus on building the application and deploying it to the hosting
    environment running on the cloud vendor infrastructure. Your application will
    be production-ready faster as compared to the Infrastructure-as-a-Service hosting
    model or the on-premises servers. However, you do not have any control over the
    underlying hosting environment and the infrastructure that is abstracted to you.


    Note


    In the case of Platform as a Service, you have no control or minimal control over
    the underlying hosting environment. However, this cloud hosting approach is cheaper
    than the Infrastructure-as-a-Service approach.


    Software as a Service is another interesting hosting option available. Here, in
    this case, the vendor creates a software product and hosts it in its cloud environment.
    You, as a developer, can also build a product and host it in the cloud environment
    of a vendor and then expose subscription models for your end customers. The customers
    can purchase the subscription models for your product and get billed either yearly,
    monthly, daily, or any other options provided by your product subscription model.
    The customers would configure data and user access for the product. They would
    not have access to the underlying infrastructure and hosting environment or the
    application code running on the cloud. Microsoft Office 365 or Netflix are examples
    of Software as a Service.


    Note


    In Software as a Service, you have no control over the cloud infrastructure, hosting
    environment, and application code. You configure the data and access for the application.


    Figure [1-1](#523943_1_En_1_Chapter.xhtml#Fig1) summarizes the preceding discussion
    around Infrastructure as a Service, Platform as a Service, and Software as a Service
    . The figure shows where the responsibilities lie for each of the three architectures.


