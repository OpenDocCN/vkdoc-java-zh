    ### 在 Azure Active Directory 中注册应用程序


    现在，让我们在默认租户中创建一个应用程序。我们将使用此应用程序为 Java 应用程序配置身份验证和授权。转到 Azure 门户中的 Azure Active
    Directory，然后点击*应用注册*，如图 12-6 所示。


    ![](img/523943_1_En_12_Fig6_HTML.jpg)


