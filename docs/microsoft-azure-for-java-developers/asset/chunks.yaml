    ## 触发器与绑定


    触发器可将 Azure Functions 从空闲状态唤醒并触发其执行。Azure Functions 可由多种服务触发，这些服务触发 Azure Functions
    并将待处理的数据作为有效负载触发器输入进行传递。每个 Azure Functions 只能有一个触发器。在某些场景下，你的 Azure Function 可能需要与外部服务交互。例如，它可能需要从
    Azure Blob 获取数据，进行处理，然后将其放回 Azure 存储队列。当你的 Function 需要与其他 Azure 或非 Azure 服务交换数据时，绑定可以帮助你。


    你无需编写大量代码即可实现触发器和绑定。你可以为 Azure Function 以声明方式创建触发器和绑定。这种声明式方法使你无需编写与 Function
    代码中的其他服务交互所需的复杂代码和逻辑。触发器始终是单向的，并且是 Azure Function 的输入。绑定是双向的，可以是 Azure Function
    的输入或输出。


    图 3-1 演示了 Azure Function 如何使用触发器和绑定。当项目添加到 Azure Cosmos DB 时，它会触发 Azure Function。Azure
    Function 使用绑定与 Blob 存储交互，获取 blob 数据进行处理。它处理 blob 数据，并使用输出绑定将其发送到事件中心。


