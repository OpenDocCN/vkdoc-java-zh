  raw: '## Introduction to Azure Storage


    Azure Storage is a Platform-as-a-Service offering that stores images, files, and
    other data objects as blobs. It provides an SMB-based file system to store files
    and has also support for NFS, offers you a queue-based messaging data store, and
    helps you store NoSQL table data in the Azure environment. It is highly scalable,
    available, and secured. The following are offerings for Azure Storage :


    *   *Azure Containers (Blobs)* help you store images, videos, files, and other
    binary large object data. You can keep big unstructured data like Virtual Machine
    disks.


    *   *Azure Files* provide a managed file share to keep your files and access using
    SMB, NFS, or HTTP protocol.


    *   *Azure Queues* provide a queue-based messaging store for your application.


    *   *Azure Tables* help you store semi-structured NoSQL data.


    Data replication is an important design aspect for data stores on the cloud. This
    mechanism helps you recover data during a disaster or an outage and keeps your
    business running. Azure Storage supports the following data replications or redundancy
    mechanisms:


    *   *Locally Redundant Storage (LRS)* helps you store three copies of your data
    in the same data center. If the data center goes down, you will not be able to
    access the data.


    *   *Zone-Redundant Storage (ZRS)* stores three copies of data in different data
    centers or storage clusters separated physically in a region. If a data center
    goes down, you can still access data stored in other data centers. However, if
    there is a region-wide outage, you will not be able to access the data.


    *   *Geo-Redundant Storage (GRS)* duplicates your data three times in a primary
    region, and then all the duplicated set of data is replicated to a secondary region.
    If the primary region goes down, you can access the data from the secondary region.


    *   *Read Access Geo-Redundant Storage (RA-GRS)* is the same as Geo-Redundant
    Storage. However, the data in the secondary region is read-only.


    You can choose either a standard tier or a premium tier to store the data on Azure
    Storage. The Standard tier stores your data in a standard hard disk, and the premium
    tier stores your data in an SSD disk. The premium tier is more performant than
    the standard tier. The following are the types of Storage Accounts available on
    Azure :


    *   *General Purpose V1* accounts are legacy storage service accounts and support
    blob, file, queue, and table service. It supports only the standard tier and all
    replication options except ZRS.


    *   *General Purpose V2* accounts support blob, file, queue, and table service.
    It supports the standard and premium tier and all replication options.


    *   *Blob Storage* helps you store block blobs and append blobs. It supports only
    the standard tier and all replication options except ZRS.


    *   *File Storage* provides you with file service. It supports the premium tier
    and LRS and ZRS replication options.


    *   *Block Blob* helps you store block blobs and append blobs. It supports the
    premium tier and LRS and ZRS replication options .


    Note


    Block Blobs store binary and text data. Page Blobs help you store large files
    like virtual hard disks. Append Blobs are the same as Block Blobs but highly performant
    append operations.


