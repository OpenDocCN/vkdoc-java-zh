  trans: '

    ### 将应用程序部署到 Azure WebApp


    现在，让我们将应用程序部署到 Azure WebApp。这里，我们将使用 IntelliJ 编辑器构建应用程序，然后使用 IntelliJ 的 Azure
    插件将其部署到 Azure。你可以参考第 2 章了解如何使用 Maven 插件部署应用程序。不过，你也可以使用 Eclipse、Visual Studio
    Code 或任何其他支持部署到 Azure 的 Java 编辑器。进入 IntelliJ 设置，点击 *Plugins*，然后在 *Marketplace*
    中搜索 *Azure*。安装 *Azure Toolkit for IntelliJ* 插件，如图 15-13 所示。


    ![](img/523943_1_En_15_Fig13_HTML.png)


    显示如何安装 Azure Toolkit 插件的窗口截图。


    图 15-13


    安装 Azure Toolkit 插件


    插件安装完成后，右键点击项目，如图 15-14 所示。


    ![](img/523943_1_En_15_Fig14_HTML.jpg)


    右键点击项目的窗口截图。


    图 15-14


    右键点击项目


    点击 *Azure*，然后点击 *Deploy to Azure Web Apps*，如图 15-15 所示。


    ![](img/523943_1_En_15_Fig15_HTML.jpg)


    部署到 Azure Web Apps 的窗口截图。


    图 15-15


    部署到 Azure WebApps


    选择 *Azure CLI*，然后点击 *Sign in*，如图 15-16 所示。根据提示提供你的凭据。


    ![](img/523943_1_En_15_Fig16_HTML.jpg)


    选择 Azure CLI 的窗口截图。


    图 15-16


    选择 Azure CLI


    选择订阅，然后点击 *Select*，如图 15-17 所示。


    ![](img/523943_1_En_15_Fig17_HTML.jpg)


    显示“选择订阅”窗口及 Azure CLI 凭据的窗口截图。


    图 15-17


    选择订阅


    选择我们创建的 WebApp，然后点击 *Run*，如图 15-18 所示。


    ![](img/523943_1_En_15_Fig18_HTML.jpg)


    选择订阅的窗口截图。


    图 15-18


    部署到 WebApp


    部署完成后，等待十分钟，让应用程序在 WebApp 中启动。十分钟后，导航到 WebApp 的 URL。系统会提示你提供登录凭据，如图 15-19 所示。请使用你在
    Azure Active Directory 的注册应用程序中创建并授权的用户凭据。


    ![](img/523943_1_En_15_Fig19_HTML.jpg)


    提供登录凭据的窗口截图。


    图 15-19


    提供登录凭据


    你可以在浏览器上看到渲染出的学生详细信息，如图 15-20 所示。


    ![](img/523943_1_En_15_Fig20_HTML.jpg)


    浏览器输出结果的示意图。


    图 15-20


    浏览器上的输出结果


    应用程序的跟踪日志会在运行时被采集到 Application Insights 中，如图 15-21 所示。


    ![](img/523943_1_En_15_Fig21_HTML.jpg)


    Application Insights 中应用程序日志的窗口截图。


    图 15-21


    Application Insights 中的应用程序日志


    ## 总结


    在本章中，我们运用了本书中学到的概念来设计和开发一个复杂的用例。我们探索了 IntelliJ Azure 插件，用于构建 Java 应用程序并将其部署到 Azure
    WebApp。我们在一个 Spring Boot 应用程序中应用了多个概念，例如从 Azure SQL 读取数据、使用 Azure AD 进行身份验证、使用
    Application Insights 监控应用程序，以及部署到 Azure WebApp。

