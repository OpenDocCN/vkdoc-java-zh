    Click `Add a platform` as in Figure [12-10](#523943_1_En_12_Chapter.xhtml#Fig10).
    We need to add a web platform as we are dealing with a web application.


    ![](images/523943_1_En_12_Chapter/523943_1_En_12_Fig10_HTML.jpg)


    An image of the spring bot demo authentication window. The options on the left
    are search bar, overview, quickstart, integration assistant, branding and properties,
    authentication, certificates and secrets, token configuration, API permissions,
    expose an API, app roles, and owners. The contents at the center are platform
    configurations, and supported account types.


    Figure 12-10


    Add a platform


    Select `Web` as we are going to use this application in a Java-based API project.
    Figure [12-11](#523943_1_En_12_Chapter.xhtml#Fig11) demonstrates this action.


    ![](images/523943_1_En_12_Chapter/523943_1_En_12_Fig11_HTML.jpg)


    An image of the configuration platforms window. The web applications are web and
    single page application. The web option is selected. The mobile and desktop applications
    are iOS or macOS including Objective C, Swift, Xamarin, and Android. including
    Java, Kotlin, and Xamarin


    Figure 12-11


    Select `Web`


    Provide Redirect URIs as `http://localhost:8080/login/oauth2/code/`. Click `Configure`
    as in Figure [12-12](#523943_1_En_12_Chapter.xhtml#Fig12). The application gets
    created in the default tenant.


    ![](images/523943_1_En_12_Chapter/523943_1_En_12_Fig12_HTML.jpg)


