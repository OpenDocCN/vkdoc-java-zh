    一个窗口的截图，其搜索栏中显示 URL：HTTP://40.76.150.75:8080/hello。屏幕上的输出显示：hello world。


    图 4-22


    浏览集群中运行的应用程序


    ## 总结


    在本章中，我们学习了容器和 Kubernetes 的详细信息。然后，我们了解了什么是 Azure Kubernetes Service。接着，我们开发了一个
    Java Spring Boot 应用程序，将其容器化为 Docker 镜像，并推送到了 Azure 容器注册表。我们拉取了该容器镜像，并在 Azure Kubernetes
    Service 集群上运行了它。我们探索了基本的 Docker 和 kubectl 命令，这些命令将帮助我们与 Docker 引擎和 Kubernetes
    集群进行交互。在下一章中，我们将构建一个 Java 应用程序并在 Azure Spring Cloud 上运行它。


    以下是本章的关键要点：


    *   您可以构建应用程序，将其容器化，并连同所有必要的应用程序依赖项一起保存在容器注册表中。


    *   容器注册表存储容器镜像。Azure 容器注册表和 Docker Hub 是容器注册表的示例。


    *   对于容器而言，服务器的操作系统是虚拟化的，容器作为操作系统线程运行，无需为自身配备操作系统。


    *   Kubernetes 是 Google 提供的一款开源容器编排工具。它由一个主节点（或控制平面）和多个工作节点组成。


    *   您的容器在工作节点的 Pod 内运行。


    *   Azure Kubernetes Service 是 Azure 上托管的 Kubernetes 服务。


    # 5. 在 Azure Spring Cloud 上运行 Java 应用程序


    您正在构建一个基于 Spring Boot 的微服务应用程序，并将使用平台即服务模型将其托管在 Azure 上。您需要处理诸如为不同环境维护应用程序配置、与
    Azure 上的平台即服务数据库集成，以及利用 Azure Redis 满足缓存需求等问题。您可能还需要集成 Application Insights 进行日志记录和监控，为您的服务配置自动缩放等等。您还需要将应用程序托管环境与
    Git 仓库、Azure DevOps 管道或 Jenkins 集成。并且，您需要在不进行任何代码更改的情况下实现所有这些需求，并尽可能多地使用配置。Azure
    Spring Cloud 将在此处为您轻松提供帮助。


    在上一章中，我们学习了 Azure Kubernetes Service 的基础知识。然后，我们创建了一个基于 Java 的应用程序，将其容器化，并部署到了
    Azure Kubernetes Service 上。在本章中，我们将学习 Azure Spring Cloud 的详细信息，然后我们将预配一个 Azure
    Spring Cloud 服务，并将应用程序部署到该服务中。

