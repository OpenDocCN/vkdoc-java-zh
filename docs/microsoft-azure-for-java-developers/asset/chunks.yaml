    host your application. You can build web applications, REST APIs, and mobile back
    end using any supported languages like .NET, Java, Node.js, Python, PHP, and Ruby
    and run it on Azure WebApp. Both the Windows- and Linux-based environments are
    supported on Azure WebApp. You can also containerize your application using Docker
    and run it on Azure WebApp.


    Azure WebApp is highly available and scalable. You can either configure your WebApp
    to scale automatically or scale the WebApp manually. It has a rich continuous
    integration and continuous deployment support and integrates easily with Azure
    DevOps, Jenkins, Bitbucket, GitHub, and even any local Git repository. It also
    supports deploying an application using FTP.


    You can have multiple deployment slots for the Azure WebApp. Your application
    would run on a production deployment slot, and you can create a staging deployment
    slot for an Azure WebApp and host a newly developed version of your application.
    The majority of the application traffic can be diverted to the production slot,
    and part of the application traffic can be diverted to the staging slot. Eventually,
    you can swap the content in the staging slot to the production slot and redirect
    all the traffic to the production slot once you have enough confidence in the
    newly developed application. You can automate this process using Infrastructure-as-Code
    and DevOps solutions .


    Note


    You can scale the Azure WebApp horizontally by provisional additional identical
    instances for the WebApp or scale it vertically by changing the App Service Plan.
    Scaling vertically is referred to as the scale-up process, and scaling horizontally
    is referred to as the scale-out process.


    ## App Service Plan


    Some applications are CPU intensive, and some are memory intensive, and some applications
    can run on fewer computing resources. Every application has its computing, infrastructure
    requirement, and other needs like scaling, data storage, and many more, and Azure
    WebApp caters to this application requirement using App Service Plan. App Service
    Plan defines the computing resources, scaling, deployment slots, pricing tier,
    and other necessary features for an Azure WebApp. Based on the application requirement,
    you can choose an App Service Plan for your WebApp. Every WebApp runs on an App
    Service Plan. You can share multiple WebApps on an App Service Plan and share
    the underlying hosting infrastructure across multiple WebApps.


    The following pricing tiers are available for Azure WebApp-based App Service Plan:


    *   Shared Compute


    *   Dedicated Compute


    *   Isolated


    ### Shared Compute


    Shared Compute offers Free or Shared plans, and the underlying hosting infrastructure
    would get shared by the WebApp running on App Service Plans for multiple customers.
    This tier does not offer scaling features, and compute isolation is guaranteed
    for your application. You can use this tier for development and testing purposes
    only.


    ### Dedicated Compute


    With Dedicated Compute , you have a dedicated underlying hosting infrastructure
    for all your WebApps running on your App Service Plan. It can be basic, premium,
    or standard tier. The premium tier offers the maximum number of computing resources
    and scaling instances followed by the standard and basic tiers. Compute isolation
    is guaranteed for your application.


    ### Isolated


    The Isolated plan provides a dedicated Virtual Network for your Azure. This tier
    guarantees network isolation along with compute isolation.


    ## Deploy Java Application on Azure WebApp


    Let us build a Java Spring Boot application and deploy it on an Azure WebApp.
    We will use Maven to build and deploy the application to the Azure WebApp. The
    following are the prerequisites you should be ready with before you start with
    the deployment steps. You can choose the latest version or any other version that
    you are comfortable working with for the tools mentioned.


    *   Visual Studio Code


    *   Java version 8 or above installed on your system


    *   A compatible Maven version with your installed Java version installed on your
    system


    *   Should have an Azure Subscription with permissions to create a resource group
    and resources inside the resource group


    *   Azure CLI installed on your system'
  trans: '

    ## Azure WebApp


    Azure WebApp 是 Azure 上提供的一项平台即服务（PaaS）产品。你可以构建基于 HTTP 的应用程序和服务，并将其托管在 Azure WebApp
    上。你无需担心创建和管理底层托管基础设施，Azure 平台会为你处理这些事务。你只需预配服务并托管你的应用程序即可。你可以使用任何支持的语言（如 .NET、Java、Node.js、Python、PHP
    和 Ruby）构建 Web 应用程序、REST API 和移动后端，并在 Azure WebApp 上运行。Azure WebApp 同时支持基于 Windows
    和 Linux 的环境。你还可以使用 Docker 将应用程序容器化，并在 Azure WebApp 上运行。


    Azure WebApp 具有高可用性和可伸缩性。你可以将 WebApp 配置为自动缩放，也可以手动缩放 WebApp。它拥有丰富的持续集成和持续部署支持，并能轻松与
    Azure DevOps、Jenkins、Bitbucket、GitHub 甚至任何本地 Git 仓库集成。它还支持通过 FTP 部署应用程序。


    你可以为 Azure WebApp 创建多个部署槽位。你的应用程序将在生产部署槽位上运行，你可以为 Azure WebApp 创建一个过渡部署槽位，并托管新开发的应用程序版本。大部分应用程序流量可以导向生产槽位，部分应用程序流量可以导向过渡槽位。最终，一旦你对新开发的应用程序有足够信心，你可以将过渡槽位中的内容与生产槽位交换，并将所有流量重定向到生产槽位。你可以使用基础设施即代码和
    DevOps 解决方案来自动化此过程。


    注意


    你可以通过为 WebApp 预配额外的相同实例来水平缩放 Azure WebApp，或者通过更改应用服务计划来垂直缩放它。垂直缩放称为纵向扩展过程，水平缩放称为横向扩展过程。


    ## 应用服务计划


    有些应用程序是 CPU 密集型的，有些是内存密集型的，还有一些应用程序可以在较少的计算资源上运行。每个应用程序都有其计算、基础设施需求以及其他需求，如缩放、数据存储等，Azure
    WebApp 通过应用服务计划来满足这些应用程序需求。应用服务计划定义了 Azure WebApp 的计算资源、缩放、部署槽位、定价层以及其他必要功能。根据应用程序需求，你可以为
    WebApp 选择应用服务计划。每个 WebApp 都在一个应用服务计划上运行。你可以在一个应用服务计划上共享多个 WebApp，并在多个 WebApp 之间共享底层托管基础设施。


    以下是为基于 Azure WebApp 的应用服务计划提供的定价层：


    *   共享计算

    *   专用计算

    *   隔离


    ### 共享计算


    共享计算提供免费或共享计划，底层托管基础设施将由运行在应用服务计划上的 WebApp 与多个客户共享。此层不提供缩放功能，但保证你的应用程序的计算隔离。你只能将此层用于开发和测试目的。


    ### 专用计算


    使用专用计算，你将为运行在你的应用服务计划上的所有 WebApp 拥有专用的底层托管基础设施。它可以是基本、高级或标准层。高级层提供最大数量的计算资源和缩放实例，其次是标准层和基本层。保证你的应用程序的计算隔离。


    ### 隔离


    隔离计划为你的 Azure 提供专用的虚拟网络。此层在保证计算隔离的同时，还保证了网络隔离。


    ## 在 Azure WebApp 上部署 Java 应用程序


    让我们构建一个 Java Spring Boot 应用程序，并将其部署到 Azure WebApp 上。我们将使用 Maven 来构建应用程序并将其部署到
    Azure WebApp。以下是你在开始部署步骤之前应准备好的先决条件。对于提到的工具，你可以选择最新版本或任何你习惯使用的其他版本。


    *   Visual Studio Code

    *   系统上安装的 Java 8 或更高版本

    *   系统上安装的与已安装的 Java 版本兼容的 Maven 版本

    *   应拥有一个 Azure 订阅，并具有创建资源组以及资源组内资源的权限

    *   系统上安装的 Azure CLI

