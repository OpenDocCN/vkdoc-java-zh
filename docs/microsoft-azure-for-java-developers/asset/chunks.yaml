    ## Introduction


    This book helps you build and run Java-based applications on Azure. You will get
    an understanding of available services on Azure that support Java-based applications
    and learn with practical demonstrations how to create these services and run the
    Java applications on these services. The book shows how to deploy your Java applications
    in Azure WebApp, Azure Kubernetes Service, Azure Functions, and Azure Spring Cloud.
    Also covered is integration with components such as Graph API, Azure Storage,
    Azure Redis Cache, and Azure SQL.


    This book is for Java developers planning to build Azure-based Java applications
    and deploy them on Azure. Developers should be aware of the preliminary cloud
    fundamentals to help them understand the Java capability available on Azure. The
    developer need not be an expert in Azure to grasp the book''s content and start
    building Java-based applications using the capability available on Azure. However,
    developers should have a good understanding of the Java programming language and
    frameworks.


    The book starts with a brief discussion of cloud computing and an introduction
    to Java support on Azure. You’ll then learn how to deploy Java applications using
    each of the deployment models, and you’ll see examples of integrating with Azure
    services that are of particular interest to Java programmers. Security is an important
    aspect, and this book shows how to enable authentication and authorization for
    your Java applications using Azure Active Directory.


    Implementing a DevOps strategy is essential in today’s market when building any
    application. Examples in this book show how to build continuous integration and
    continuous deployment pipelines to build and deploy Java applications on Azure.
    The book focuses on the best practices one should follow while designing and implementing
    Java applications on Azure. The book also elaborates on monitoring and debugging
    Java applications running on Azure using Application Insights and Azure Monitor.


    ## Acknowledgments


    I would like to thank Apress for giving me the opportunity to work on this book.
    Also thanks to the technical reviewer and the editor and the entire Apress team
    for supporting me in this journey.


