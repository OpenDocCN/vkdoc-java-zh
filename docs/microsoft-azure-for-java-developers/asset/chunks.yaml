- fmt: "# Scaling Java Applications Hosted on Azure WebApp\n\nScaling is an important\
    \ aspect of any application. During peak hours, your application should be able\
    \ to run on additional computing resources, and it should be able to release the\
    \ additional computing resources once the load decreases. You have the option\
    \ to scale either vertically or horizontally in the case of Azure WebApp. To scale\
    \ your WebApp vertically, you need to go to the WebApp in the Azure portal and\
    \ click `Scale-up (App Service plan)` as in Figure [2-16](#523943_1_En_2_Chapter.xhtml#Fig16).\
    \ You can select the App Service Plan of your choice meeting your need.\n\n![](images/523943_1_En_2_Chapter/523943_1_En_2_Fig16_HTML.jpg)\n\
    \nA screenshot of the Home page of the web app window. The app service on the\
    \ top is titled my demo web app 28. The options on the screen list Scale up app\
    \ service plan, which is highlighted, Scale out app service plan, Web Jobs, Push,\
    \ and My S Q L in app.\n\nFigure 2-16\n\nScale-up WebApp\n\nThen you can switch\
    \ to another plan and click `Apply` as in Figure [2-17](#523943_1_En_2_Chapter.xhtml#Fig17).\n\
    \n![](images/523943_1_En_2_Chapter/523943_1_En_2_Fig17_HTML.jpg)\n\nA screenshot\
    \ of the web app. The 3 options on the top are Dev slash test, Production, which\
    \ is selected, and Isolated. The recommended pricing tiers are S 1, P 1 V 2, P\
    \ 2 V 2, P 3 V 2, P 1 V 3, P 2 V 3, and P 3 V 3. The Apply button Apply is highlighted.\n\
    \nFigure 2-17\n\nClick Apply\n\nYou can click `See additional options` to explore\
    \ more plans as in Figure [2-18](#523943_1_En_2_Chapter.xhtml#Fig18).\n\n![](images/523943_1_En_2_Chapter/523943_1_En_2_Fig18_HTML.jpg)\n\
    \nA screenshot of a window. The recommended pricing tiers are P 3 V 2, P 1 V 3,\
    \ P 2 V 3, and P 3 V 3. The button titled See additional options is selected and\
    \ highlighted. The options are Included features and Included hardware. The features\
    \ include Custom domains slash S S L and hardware includes Azure compute units,\
    \ A C U.\n\nFigure 2-18\n\nSee additional plans\n\nTo scale your WebApp horizontally,\
    \ you need to go to the WebApp in the Azure portal and click `Scale-out (App Service\
    \ plan)` as in Figure [2-19](#523943_1_En_2_Chapter.xhtml#Fig19). You can scale\
    \ either manually by specifying the number of instances you need for your application\
    \ or automatically based on custom metrics and rules like CPU utilization, memory\
    \ utilization, and other compute resources performance needs.\n\n![](images/523943_1_En_2_Chapter/523943_1_En_2_Fig19_HTML.jpg)\n\
    \nA screenshot of the Web App window titled Scale out, app service plan. The tab\
    \ on the left titled Scale out, app service plan is highlighted. The app service\
    \ plan includes App service plan, Quotas, and change app service plan. Choose\
    \ how to scale your resource under configure displays 2 options, including Manual\
    \ scale and custom autoscale. The instance count drag bar under manual scale is\
    \ at 0.\n\nFigure 2-19\n\nScale-out WebApp\n\n## Summary\n\nIn this chapter, we\
    \ learned the details of Azure WebApp and then explored what App Service Plan\
    \ is and other features of Azure WebApp. We provisioned an Azure WebApp and then\
    \ deployed a Java Spring Boot application to Azure WebApp using Maven plug-in.\
    \ We also learned about scaling Azure WebApp at a high level. In the next chapter,\
    \ we will learn the basics of Azure Functions, and then we will build a Java-based\
    \ Azure Function.\n\nThe following are the key takeaways from this chapter:\n\n\
    - Azure WebApp is a Platform-as-a-Service offering on Azure. You can build HTTP-based\
    \ applications and services and host them on the Azure WebApp.\n- You need not\
    \ worry about creating and managing the underlying hosting infrastructure, and\
    \ the Azure platform will take care of this for you.\n- App Service Plan defines\
    \ the computing resources, scaling, deployment slots, pricing tier, and other\
    \ necessary features for an Azure WebApp.\n- The following pricing tiers are available\
    \ for Azure WebApp-based App Service Plan.\n  - Shared Compute\n  - Dedicated\
    \ Compute\n  - Isolated\n- You can use the Maven plug-in to deploy a Java Spring\
    \ Boot application to Azure WebApp.\n\n# Java-Based Azure Functions\n\nAzure Functions\
    \ are serverless offerings on Azure. They are best suited to run code that can\
    \ run for a short duration and perform business logic. Azure Functions can be\
    \ used as a background worker for your application and perform a background job.\
    \ They can also perform simple to highly complex business logic and be consumed\
    \ like an API. Azure Functions are powerful and can deploy modern applications\
    \ based on complex architecture like microservices. Azure Functions can be used\
    \ to host the services in the microservices architecture.\n\nIn the previous chapter,\
    \ we learned the basics of Azure WebApp. We then developed a Java Spring Boot\
    \ application and deployed it on Azure WebApp using the Maven plug-in. In this\
    \ chapter, we will learn the details of Azure Functions, and then we will build\
    \ a Java-based Azure Function.\n\n## Structure\n\nIn this chapter, we will discuss\
    \ the following aspects of Java for Azure WebApp:\n\n- Introduction to serverless\
    \ and Azure Functions\n- Azure Functions use cases\n- Hosting plans\n- Triggers\
    \ and Bindings\n- Build a Java-based Azure Function\n\n## Objectives\n\nAfter\
    \ studying this chapter, you should be able to get the following learnings:\n\n\
    - Understand the concept of Azure Functions\n- Build a Java-based Azure Function"
