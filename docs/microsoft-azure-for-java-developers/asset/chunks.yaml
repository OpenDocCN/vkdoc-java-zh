    ## Summary


    In this chapter, we learned the details of Azure Storage and explored the concept
    of Blob, Queue, Table, and File. We learned how to create an Azure Storage using
    the Azure portal. We then developed a Java code and then performed operations
    on Queue, Table, and Blob. In the next chapter, we will learn how to work with
    Azure SQL database programmatically from Java applications.


    The following are the key takeaways from this chapter:


    - Azure Containers (Blobs) help you store images, videos, files, and other binary
    large object data.

    - Azure Files provide a managed file share to keep your files and access using
    SMB, NFS, or HTTP protocol.

    - Azure Queues provide a queue-based messaging store for your application.

    - Azure Tables help you store semi-structured NoSQL data.

    - Azure Storage is a Platform-as-a-Service offering that stores images, files,
    and other data objects as blobs. It provides an SMB-based file system to store
    files, offers you a queue-based messaging data store, and helps you store NoSQL
    table data in the Azure environment.


    # 7. Azure SQL from Java Applications


    Applications use a relational database to store data. We need to set up a relational
    database server and host the application database on the server. Azure provides
    an SQL database that is a Platform-as-a-Service offering. You need not purchase
    any server infrastructure or create a virtual machine on the cloud to install
    the SQL server. Instead, you need to provision the SQL database service on Azure
    and start using the database. And when you do not need the database anymore, you
    can decommission the service.


    In the previous chapter, we learned the Azure Storage service concepts. We then
    created a Java-based application and worked with Azure Storage services. In this
    chapter, we will learn the details of the Azure SQL database service, and then
    we will provision the Azure SQL database and work with the Azure SQL database
    from the Java application code.


    ## Structure


    In this chapter, we will discuss the following aspects of the Azure Storage service:


    - Introduction to Azure SQL database

    - Create an Azure SQL database

    - Work with Azure SQL database

    - Securing Azure databases


    ## Objectives


    After studying this chapter, you should be able to get the following learnings:


    - Understand the concept of the Azure SQL database

    - Work with Azure SQL database from Java application'
