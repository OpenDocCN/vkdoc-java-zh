  trans: "\n## 使用控制台操作 Redis 缓存\n\n在某些场景下，您可能需要浏览存储在 Azure Redis 缓存中的数据。您可以使用 Azure\
    \ 门户中提供的 Redis 控制台来执行所有必要的 Redis 缓存操作。请前往*概述*部分，并点击*控制台*，如图 9-10 所示。\n\n![](img/523943_1_En_9_Fig10_HTML.jpg)\n\
    \n输出窗口的截图。内容为：双引号大写 C 冒号，反斜杠，Program Files 反斜杠，Java 反斜杠 jdk-15.0.2 反斜杠 bin 反斜杠\
    \ java.exe 双引号。Ping 结果：pong。data 1 的值：this is value for data 1。data 2 的值：this\
    \ is value for data 2。进程已完成，退出代码 0。\n\n图 9-10\n\n转到 Redis 控制台\n\n您可以使用 *SET* 命令将数据插入到缓存中。您可以使用\
    \ *GET* 命令从缓存中读取数据。您可以在此控制台上执行任何 Redis 命令，并与 Redis 缓存集群一起工作。这些命令的使用方法如图 9-11 所示。\n\
    \n![](img/523943_1_En_9_Fig11_HTML.jpg)\n\nRedis 演示窗口的图像。左侧的选项包括搜索栏、概述、活动日志、访问控制、标签、诊断并解决问题、事件和访问密钥。右侧的选项包括控制台、移动、删除、基本信息（包括资源组、状态、位置、订阅和订阅\
    \ ID），其后是内存使用情况。\n\n图 9-11\n\n在 Redis 控制台上执行 Get 和 Set 操作\n\n## 总结\n\n在本章中，我们学习了\
    \ Azure Redis 缓存的基础知识，以及如何使用 Azure 门户创建 Azure Redis 缓存。然后，我们开发了一个基于 Maven 的 Java\
    \ 代码，并在 Azure Redis 缓存上执行了读取、写入、过期和删除操作。在下一章中，我们将学习如何使用 Azure 环境中的 Graph API 从\
    \ Java 应用程序以编程方式发送电子邮件。\n\n以下是本章的关键要点：\n\n*   Redis 缓存是一种内存缓存产品，可帮助您存储频繁访问的运行时数据。\n\
    \n*   Azure 将 Redis 缓存作为平台即服务产品提供。您可以在几分钟内启动 Redis 集群并开始使用它。您无需在 Azure 上为 Redis\
    \ 缓存设置任何基础设施。\n\n*   Azure Redis 缓存为您的应用程序提供极低的延迟和高吞吐量的数据访问。\n\n*   存储在 Azure\
    \ Redis 缓存中的数据是加密且高度安全的。\n\n*   Azure 同时支持开源 Redis 缓存版本和 Redis Lab 企业版。\n\n* \
    \  以下是 Azure Redis 缓存可用的定价计划：\n    *   基本版\n    *   标准版\n    *   高级版\n    *  \
    \ 企业版\n    *   企业闪存版\n\n# 10. 使用 Graph API 发送电子邮件\n\n现代应用程序需要向利益相关者、客户、开发者或任何与应用程序相关的人员发送电子邮件。可能会出现客户在电子商务应用程序中下订单的场景。一旦订单下达，它将告知客户订单和发货状态。如果订单失败，则应通知运营团队进行调查。您可以在\
    \ Azure 上的虚拟机中配置 SMTP 服务器以满足邮件需求。但是，您最终需要维护虚拟机，并花费成本和精力来保持 SMTP 服务器的正常运行。为了解决这个问题，微软提供了部署在\
    \ Azure 上的 Graph API，帮助您与 Microsoft 365 核心服务进行交互。使用 Graph API，您可以发送电子邮件。\n\n在上一章中，我们学习了\
    \ Azure Redis 缓存的基本概念。然后，我们创建了一个基于 Java 的应用程序，并与 Azure Redis 缓存进行了交互。在本章中，我们将学习\
    \ Graph API 的详细信息。然后，我们将构建一个可以使用 Graph API 发送邮件的 Java 应用程序。\n\n## 结构\n\n在本章中，我们将讨论\
    \ Graph API 的以下方面：\n\n*   Graph API 简介\n*   使用 Graph API 发送邮件的步骤\n*   使用 Microsoft\
    \ Graph API 发送邮件\n*   Microsoft Graph API 浏览器\n\n## 目标\n\n学习完本章后，您应该能够获得以下知识：\n\
    \n*   理解 Graph API 的概念\n*   使用 Graph API 从 Java 应用程序发送邮件\n\n## Graph API 简介\n\n\
    Microsoft Graph API 为您提供了一组 RESTful 端点，您可以使用它们与 Microsoft 365 核心服务、企业移动性与安全性服务、Windows\
    \ 10 服务和 Dynamics 365 服务进行交互。Microsoft Graph API 托管在 Azure 上，开发者可以轻松使用。开发者可以使用\
    \ Graph API 构建各种应用程序。以下是一些示例。\n\n*   您可以使用 Microsoft 365 核心服务发送和阅读电子邮件、设置会议以及执行与电子邮件相关的操作。您可以使用\
    \ Graph API 端点来帮助您与 Microsoft 365 核心服务进行交互。\n*   您可以使用 Graph API 为企业移动性与安全性服务构建围绕\
    \ Azure AD、Intune、高级威胁防护等的应用程序。\n*   您可以使用 Graph API 为 Windows 10 服务自动控制并将最新补丁应用到您的\
    \ Windows 服务器。\n*   您可以使用 Graph API 为 Dynamics 365 Business Central 构建与 Dynamics\
    \ 365 交互的应用程序。\n\n图 10-1 描述了使用 Graph API 的 Microsoft 服务与客户应用程序之间的交互。\n\n![](img/523943_1_En_10_Fig1_HTML.jpg)\n\
    \n一个模型图，说明了通过 Graph API 在客户应用程序和 Microsoft 服务器之间的交互。顶部是客户应用程序；中间层是 Microsoft Graph\
    \ API，它分为 Microsoft 365 核心服务、企业移动性与安全性、Windows 10 服务和 Dynamics 365。\n\n图 10-1\n\
    \nMicrosoft Graph API 和 Microsoft 服务\n\n现在让我们探索一个 Graph API 的 Microsoft 365 核心用例。每当应用程序失败时，开发者需要与他的主管设置一个会议邀请。他需要在邀请中附加来自\
    \ OneDrive 的日志文件。此日志文件由应用程序生成并存储在 OneDrive 中。所有这些操作都应该是自动化的。开发者无需全天候监控 OneDrive\
    \ 并不断安排会议。我们可以使用 Microsoft Graph API 构建一个解决方案来帮助开发者。该解决方案将使用 Graph API 读取主管的日历并找到可用的空闲时段。然后，它将访问开发者的邮箱并与主管设置一个邀请。该解决方案将使用\
    \ Graph API 访问存储在 OneDrive 中的日志并将其附加到邀请中。图 10-2 演示了我们讨论的用例。\n\n![](img/523943_1_En_10_Fig2_HTML.jpg)\n\
    \n一个模型图，说明了 Microsoft Graph API 和 Microsoft 365 之间的网络基础设施。它包括中心的主管；左侧的 OneDrive、经理和邮件；右侧的\
    \ PowerPoint、开发者、日历。\n\n图 10-2\n\nMicrosoft Graph API 和 Microsoft 365 用例\n"
- fmt: '# Steps to Send Mail Using Graph API


    As a prerequisite, you should have a Microsoft 365 E5 Developer license. This
    license would help you configure the mailbox for the user or service account to
    send mails.


    **Note:** You can get a free Microsoft 365 E5 Developer License at [`https://developer.microsoft.com/en-us/microsoft-365/dev-program`](https://developer.microsoft.com/en-us/microsoft-365/dev-program).
    You can create your own sandbox environment that you can use for the demonstration
    in this chapter.


    Once you have purchased the Microsoft 365 Developer E5 license, you can follow
    the following steps to configure Graph API and invoke the Graph API to send email
    from your application:


    1. Create a user in your Azure tenant.

    2. Assign Microsoft 365 E5 license to the user to use a Microsoft 365 mailbox.

    3. Create a service principal and provide necessary Graph API permission to the
    service principal to send mail.

    4. Configure your Java application to send mail.


    ## Send Mail Using Microsoft Graph API


    Let us create a user in the Azure tenant. We will use this user to send emails
    using the Java application. Go to the Azure portal and click *Azure Active Directory*
    as shown in Figure [10-3](#523943_1_En_10_Chapter.xhtml#Fig3).


    ![](images/523943_1_En_10_Chapter/523943_1_En_10_Fig3_HTML.jpg)


