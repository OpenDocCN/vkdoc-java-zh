- fmt: '# 8. Work with Azure Cosmos DB


    Modern applications use NoSQL databases for storing data. These databases should
    be highly scalable and responsive and have very low latency. These applications
    are globally available, and this needs their databases to be available globally.
    Data replication should happen in no time across the globe for such applications.
    Azure Cosmos DB is a cloud-based NoSQL database on Azure that can meet these requirements.


    In the previous chapter, we learned the basic concept of the Azure SQL database.
    We then created a Java-based application and worked with the Azure SQL database.
    In this chapter, we will learn the details of the Azure Cosmos DB, and then we
    will provision the Azure Cosmos DB and build a Java application that can perform
    read and write operations on Azure Cosmos DB.


    ## Structure


    In this chapter, we will discuss the following aspects of the Azure Cosmos DB:


    * Introduction to Azure Cosmos DB

    * Create an SQL API Cosmos DB

    * Work with SQL API


    ## Objectives


    After studying this chapter, you should be able to do the following:


    * Understand the concept of Azure Cosmos DB

    * Work with Azure Cosmos DB from Java application


    ## Introduction to Azure Cosmos DB


    Azure Cosmos DB is a Platform-as-a-Service NoSQL database on Azure and is best
    suited for real-time and near-real-time applications. It ensures very high throughput
    and ensures elastic read and write scalability. The data stored can be replicated
    globally and ensures very low latency. The database can be highly available as
    it can be replicated across multiple Azure regions.


    You can access the data stored in Azure Cosmos DB using multiple supported database
    APIs. The following are the supported APIs:


    * *SQL API* helps you access the stored data using SQL queries. You can migrate
    your relational database workload to Cosmos DB using SQL APIs.

    * *API for MongoDB* helps you access data MongoDB queries. You can insert your
    data in the document structure using the MongoDB-supported BSON format.

    * *Cassandra API* helps you store data using column-oriented schema. You can query
    the data using Cassandra Query Language.

    * *Table API* helps you store data in a key-value format.

    * *Gremlin API* stores data in a graph database format using edges and vertices.
    You can query the data using the graph query language.


    For Azure Cosmos DB, you get charged for the throughput you need and the storage
    you consume on an hourly basis. The throughput is defined using Request Units.
    Request Units are the combination of CPU, memory, and IOPs consumed to perform
    a database operation. You can create an Azure Cosmos DB account based on your
    consumption of the Restricted Units. The following are the supported ways to create
    a Cosmos DB account:


    * *Provisioned throughput* mode helps you choose the number of Restricted Units
    per second you need for your database operations. You can scale by increasing
    or decreasing the Restricted Units programmatically or manually based on your
    need.

    * You do not choose any Restricted Units using the *Serverless mode,* and you
    get billed for the number of Restricted Units you have consumed during the billing
    period.

    * *Autoscale mode* helps you scale the Restricted Unit automatically based on
    the application''s need. This mode is best suited for workloads that have unpredictable
    traffic patterns.


    ## Create an SQL API Cosmos DB


    Let us create an Azure Cosmos DB for SQL API using the Azure portal. Go to the
    Azure portal as shown in Figure [8-1](#523943_1_En_8_Chapter.xhtml#Fig1), and
    click *Create a resource* as in Figure [8-1](#523943_1_En_8_Chapter.xhtml#Fig1).


    ![](images/523943_1_En_8_Chapter/523943_1_En_8_Fig1_HTML.jpg)


    A screenshot of the Microsoft Azure. The Azure services include Create a resource,
    which is highlighted, Resource groups, and Subscriptions. The search window on
    the top reads, search resources, services, and docs G plus slash.


    Figure 8-1


    Create a resource


    You will be taken to the Azure Marketplace in Figure [8-2](#523943_1_En_8_Chapter.xhtml#Fig2).
    Click *Databases*. You will get all the database offerings here. Click *Azure
    Cosmos DB* as in Figure [8-2](#523943_1_En_8_Chapter.xhtml#Fig2).


    ![](images/523943_1_En_8_Chapter/523943_1_En_8_Fig2_HTML.jpg)


    A screenshot of the steps for creating a resource. The popular products are Azure
    S Q L managed instance, S Q L database, Azure cosmos D B, which is highlighted,
    and Azure database for Postgre S Q L. The categories list Analytics, Blockchain,
    Compute, containers, and databases, which is highlighted.


    Figure 8-2


    Click Azure Cosmos DB


    Click *Create* for *Core (SQL) – Recommended* as in Figure [8-3](#523943_1_En_8_Chapter.xhtml#Fig3).


    ![](images/523943_1_En_8_Chapter/523943_1_En_8_Fig3_HTML.jpg)


    A screenshot of the selection of A P I option. The A P I options are listed as
    Core S Q L, recommended; Azure table; Azure cosmos D B A P I for Mongo D B, and
    Gremlin graph. The question on the top reads, Which A P I best suits your workload.


    Figure 8-3


    Click Core (SQL) – Recommended


    Provide the subscription and the resource group details. Provide the account name
    for the Cosmos DB and location. Click *Review + create* as in Figure [8-4](#523943_1_En_8_Chapter.xhtml#Fig4).


    ![](images/523943_1_En_8_Chapter/523943_1_En_8_Fig4_HTML.jpg)


    A screenshot of the selection of A P I option. The A P I options are listed as
    Core S Q L, recommended; Azure table; Azure cosmos D B A P I for Mongo D B, and
    Gremlin graph. The question on the top reads, Which A P I best suits your workload.


    Figure 8-4


    Click Review + create


    Click *Create* as in Figure [8-5](#523943_1_En_8_Chapter.xhtml#Fig5). This action
    will spin up Azure Cosmos DB for you.


    ![](images/523943_1_En_8_Chapter/523943_1_En_8_Fig5_HTML.jpg)


    A screenshot of the validation success azure cosmos D B account core S Q L. The
    tabs on the top are basics, global distribution, networking, backup policy, and
    encryption. The basics include Subscription, resource group, location, account
    name, A P I, capacity mode, and Availability zones. The button titled Create is
    at the bottom.


    Figure 8-5


    Click Create


    Once the Cosmos DB gets created, navigate to the Cosmos DB and click *Keys* as
    in Figure [8-6](#523943_1_En_8_Chapter.xhtml#Fig6). We need the endpoint URL and
    the access key to connect to the Cosmos DB from the Java code.


    ![](images/523943_1_En_8_Chapter/523943_1_En_8_Fig6_HTML.jpg)


    A screenshot of the keys for the azure cosmos D B account. There are 2 keys listed
    on the right, including read and write keys, which are highlighted, and read-only
    keys. The read and write keys include U R I, primary key, and Secondary key. The
    tabs on the left include Dedicated gateway, keys, which is highlighted, and locks.


    Figure 8-6


    Click Keys'
