    ## Deploy a Java Application on Azure Spring Cloud


    Now let us build a Java Spring Boot application that we will deploy to the Azure
    Spring Cloud service we created earlier. We will integrate the Azure Spring Cloud
    service with Azure Redis Cache using service binding and then write to the Azure
    Redis Cache from the Java Spring Boot application. We need not write any code
    or configuration in the application code for the Azure Redis Cache integration.


    As a prerequisite, you should have an Azure Redis Cache. We will explore how to
    provision Azure Redis Cache in Chapter [9](#523943_1_En_9_Chapter.xhtml).


    Let us go to the Spring Initializr using the URL shown in Listing [5-1](#523943_1_En_5_Chapter.xhtml#PC1).


    ```

    https://start.spring.io/

    Listing 5-1

    Spring Initializr URL

    ```


