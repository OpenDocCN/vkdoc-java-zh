    '
- fmt: '# Maven package Java project Web App to Linux on Azure


    Build your Java project and deploy it to Azure as a Linux web app. Add steps that
    analyze code, save build artifacts, deploy, and more: https://docs.microsoft.com/azure/devops/pipelines/languages/java


    ```

    trigger:

    - master

    variables:

    # Azure Resource Manager connection created during pipeline creation

    azureSubscription: ''3956cc05-4215-45e5-98f9-6d3eef83b0d8''

    # Web app name

    webAppName: ''webapp-iacdemo-linux''

    # Environment name

    environmentName: ''webapp-iacdemo-linux''

    # Agent VM image name

    vmImageName: ''ubuntu-latest''

    stages:

    - stage: Build

    displayName: Build stage

    jobs:

    - job: MavenPackageAndPublishArtifacts

    displayName: Maven Package and Publish Artifacts

    pool:

    vmImage: $(vmImageName)

    steps:

    - task: Maven@3

    displayName: ''Maven Package''

    inputs:

    mavenPomFile: ''pom.xml''

    - task: CopyFiles@2

    displayName: ''Copy Files to artifact staging directory''

    inputs:

    SourceFolder: ''$(System.DefaultWorkingDirectory)''

    Contents: ''**/target/*.?(war|jar)''

    TargetFolder: $(Build.ArtifactStagingDirectory)

    - upload: $(Build.ArtifactStagingDirectory)

    artifact: drop

    - stage: Deploy

    displayName: Deploy stage

    dependsOn: Build

    condition: succeeded()

    jobs:

    - deployment: DeployLinuxWebApp

    displayName: Deploy Linux Web App

    environment: $(environmentName)

    pool:

    vmImage: $(vmImageName)

    strategy:

    runOnce:

    deploy:

    steps:

    - task: AzureWebApp@1

    displayName: ''Azure Web App Deploy: webapp-iacdemo-linux''

    inputs:

    azureSubscription: $(azureSubscription)

    appType: webAppLinux

    appName: $(webAppName)

    package: ''$(Pipeline.Workspace)/drop/**/target/*.?(war|jar)''

    ```


