- fmt: '### Deploy the Application to Azure WebApp


    Now let us deploy the application to Azure WebApp. Here, we will use the IntelliJ
    editor to build the application and then use the Azure plug-in for IntelliJ to
    deploy it to Azure. You can go through Chapter [2](#523943_1_En_2_Chapter.xhtml)
    for using Maven plug-in to deploy the application. However, you can use Eclipse
    or Visual Studio Code or any other Java editor that supports deployment to Azure.
    Go to IntelliJ settings, click *Plugins* and search for *Azure* in the *Marketplace*.
    Install *Azure Toolkit for IntelliJ* plug-in as in Figure [15-13](#523943_1_En_15_Chapter.xhtml#Fig13).


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig13_HTML.png)


    A window screenshot of how to install azure toolkit plug in.


    Figure 15-13


    Install Azure Toolkit plug-in


    Once the plug-in is installed, right-click on the project as in Figure [15-14](#523943_1_En_15_Chapter.xhtml#Fig14).


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig14_HTML.jpg)


    A window screenshot with right-click on the project.


    Figure 15-14


    Right-click on the project


    Click *Azure* and then click *Deploy to Azure Web Apps* as in Figure [15-15](#523943_1_En_15_Chapter.xhtml#Fig15).


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig15_HTML.jpg)


    A window screenshot to deploy to azure web apps.


    Figure 15-15


    Deploy to Azure WebApps


    Select *Azure CLI* and click *Sign in* as in Figure [15-16](#523943_1_En_15_Chapter.xhtml#Fig16).
    Provide your credentials when prompted.


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig16_HTML.jpg)


    A window screenshot to select azure C L I.


    Figure 15-16


    Select Azure CLI


    Select the subscription and click *Select* as in Figure [15-17](#523943_1_En_15_Chapter.xhtml#Fig17).


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig17_HTML.jpg)


    A window screenshot of the Select Subscriptions window with Azure C L I credential.


    Figure 15-17


    Select the subscription


    Select the WebApp we created and click *Run* as in Figure [15-18](#523943_1_En_15_Chapter.xhtml#Fig18).


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig18_HTML.jpg)


    A window screenshot to select the subscription.


    Figure 15-18


    Deploy to WebApp


    Once the deployment is complete, wait for ten minutes for the application to boot
    up in the WebApp. Navigate the WebApp URL after ten minutes. You will be prompted
    to provide login credentials as in Figure [15-19](#523943_1_En_15_Chapter.xhtml#Fig19).
    Use the user’s credentials you created and authorized in the registered application
    in Azure Active Directory.


    ![](images/523943_1_En_15_Chapter/523943_1_En_15_Fig19_HTML.jpg)


