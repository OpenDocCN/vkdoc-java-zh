  trans: '

    ## Azure Redis 缓存简介


    Redis 缓存是一种内存缓存服务，可帮助您保存频繁访问的运行时数据。您可以从数据存储中一次性获取数据，并在首次请求时将其保存在缓存中。对于所有后续请求，数据将从缓存中获取，而不是从数据存储中获取。当数据存储中的数据发生变化时，缓存中的数据会使用存储在数据存储中的新版本数据进行刷新。这种方法将确保
    Redis 缓存数据始终保持最新，并且应用程序始终能获取到最新数据。


    Azure 将 Redis 缓存作为平台即服务（PaaS）产品提供。您可以在几分钟内启动 Redis 集群并开始使用它。您无需在 Azure 上为 Redis
    缓存设置任何基础设施。底层的 Azure 平台管理所有基础设施方面。Azure Redis 缓存可以存储内容、用户会话、分布式数据，甚至可以作为消息代理使用。其用例非常广泛。以下是您可以使用
    Redis 缓存实现的一些用例示例：


    *   您有一个在 Azure WebApp 上运行的应用程序。每当用户登录时，该用户的会话数据可以存储在 Azure Redis 缓存中，以便所有 WebApp
    实例和用户请求都可以访问这些数据。在高峰时段，Azure WebApp 可以扩展到多个实例。


    *   您有一个在 Azure、本地或任何基于云的服务器上运行的 Web 应用程序，它使用页眉、页脚、层叠样式表和其他静态页面。您可以将所有这些静态内容的副本存储在
    Azure Redis 缓存中。首次访问时，静态内容可以从服务器获取，而对于后续请求，数据可以从缓存中提供。这种方法将提高应用程序的性能。


    *   您有一个应用程序频繁调用数据库来获取数据。在这种情况下，您可以将频繁访问的静态数据存储在 Azure Redis 缓存中。应用程序可以从缓存中获取数据，而不是从数据库中获取。但是，对于第一个用户请求，数据应从数据库中获取并同时存储在
    Redis 缓存中。如果数据库中的数据发生变化，Redis 缓存中的数据也应更新。


    *   您可以拥有执行分布式事务的应用程序。只有当所有事务都成功时，才应将数据提交到数据库。在这种情况下，您可以将所有事务的中间事务数据存储在 Redis
    缓存中，如果所有事务都成功，则将 Redis 缓存中的数据提交到数据库；如果事务失败，则使缓存中存储的数据失效，作为回滚操作。


    Azure Redis 缓存为您的应用程序提供极低的延迟和高吞吐量的数据访问。数据存储在由 Azure 平台管理的 Redis 服务器的内存中，可以轻松处理海量数据请求。存储的数据经过加密且高度安全。


    以下是 Azure Redis 缓存可用的定价计划：


    *   *基本*计划提供在单个虚拟机实例上运行的开源 Redis 缓存版本。您可以将其用于开发和测试目的。此计划不提供 SLA。


    *   *标准*计划提供在两个虚拟机实例上运行的开源 Redis 缓存版本，并且数据会在虚拟机实例之间即时复制。


    *   *高级*计划提供在多个强大的虚拟机实例上运行的开源 Redis 缓存版本。它提供非常高的吞吐量、可用性、低延迟以及许多其他生产级功能。


    *   *企业*计划提供比高级计划更高的性能和可用性，并为 Redis 缓存提供基于 Redis Labs 的企业级产品。您可以运行基于 Redis 的模块，如
    Redis Bloom、RediSearch 和 Redis Time Series。


    *   *企业闪存*计划提供一种经济高效的基于 Redis Labs 的企业版，该版本在非易失性内存上运行。


    ## 创建 Azure Redis 缓存


    让我们使用 Azure 门户创建一个 Azure Redis 缓存。转到 Azure 门户，点击*创建资源*，如图 9-1 所示。我们将使用 Java 代码对此
    Redis 缓存执行读写操作。


    ![](img/523943_1_En_9_Fig1_HTML.jpg)


    资源窗口的屏幕截图。窗口中的内容包括一个搜索栏、文本“Azure 服务”以及三个选项：创建资源、资源组和订阅。


    图 9-1


    创建资源


    您将被导航到 Azure 市场。点击*数据库*，然后点击*Azure Cache for Redis*。示例如图 9-2 所示。


    ![](img/523943_1_En_9_Fig2_HTML.jpg)


    “创建资源”窗口的屏幕截图。左侧的几个选项包括容器、数据库、开发人员工具、DevOps、标识、集成、IT 和管理工具、媒体以及迁移。右侧的几个选项包括 Azure
    Database for PostgreSQL、Azure Database for MySQL、MongoDB Atlas on Azure、HVR for
    Microsoft Azure 和 Azure Cache for Redis。其中“数据库”和“Azure Cache for Redis”被突出显示。


