    \n标题为“创建 Web 应用”的网页截图。顶部的文本“创建 Web 应用”被高亮显示。下方面板的选项包括：管道、任务、变量、保留、选项和历史记录。任务下拉菜单打开以下选项：阶段\
    \ 1、代理作业和 Azure CLI。\n\n图 13-17\n\n提供管道名称\n\n点击 *保存*，如图 13-18 所示。此操作将保存管道。\n\n\
    ![](img/523943_1_En_13_Fig18_HTML.jpg)\n\n保存任务的网页截图。顶部的“保存”选项被高亮显示。Azure CLI 下的选项包括：任务版本、显示名称、Azure\
    \ 资源管理器连接和脚本类型。Azure 资源管理器连接下的下拉框被阴影覆盖。\n\n图 13-18\n\n保存管道\n\n点击 *创建发布* 以创建一个新发布，如图\
    \ 13-19 所示。\n\n![](img/523943_1_En_13_Fig19_HTML.jpg)\n\nAzure CLI 网页的截图。顶部的“创建发布”选项被高亮显示。Azure\
    \ CLI 下的选项包括：任务版本、显示名称、带有阴影下拉框的 Azure 资源管理器连接以及脚本类型。\n\n图 13-19\n\n创建发布\n\n选择阶段并点击\
    \ *创建*，如图 13-20 所示。\n\n![](img/523943_1_En_13_Fig20_HTML.jpg)\n\n可以创建新发布的网页截图。提到的字段如下：管道：阶段\
    \ 1：通过点击将触发器从自动更改为手动。触发器更改的阶段：高亮显示的下拉框中显示阶段 1。发布信息。左下角的“创建”选项卡被高亮显示。\n\n图 13-20\n\
    \n点击创建\n\n点击已创建的发布，如图 13-21 所示。\n\n![](img/523943_1_En_13_Fig21_HTML.jpg)\n\n\
    创建 Web 应用的网页截图。顶部的文本显示“发布，发布 1，已创建”。发布 1 被高亮显示。下方面板的选项包括：管道、任务、变量、保留、选项和历史记录。任务下拉菜单打开以下数据：阶段\
    \ 1、代理作业和 Azure CLI。\n\n图 13-21\n\n点击已创建的发布\n\n点击 *部署*，如图 13-22 所示。\n\n![](img/523943_1_En_13_Fig22_HTML.jpg)\n\
    \n发布 1 网页的截图。顶部面板的“管道”选项打开一个下方屏幕。它分为左右两部分。左侧显示“发布”，右侧显示“阶段”。左侧屏幕有一个标题为“手动触发”的框。右侧屏幕有一个标题为“阶段\
    \ 1，未部署”的框。“部署”选项被高亮显示。\n\n图 13-22\n\n部署发布\n\n点击 *部署* 开始创建 Web 应用，如图 13-23 所示。一旦管道成功完成，Web\
    \ 应用即被创建。\n\n![](img/523943_1_En_13_Fig23_HTML.jpg)\n\n标题为“阶段 1，部署发布”的网页截图。概述部分包含以下内容：待部署：发布\
    \ 1。项目：没有项目与此发布关联。一个评论框。底部的“部署”和“取消”选项卡。“部署”选项卡被高亮显示。\n\n图 13-23\n\n点击部署\n\n为了验证，你可以使用命令\
    \ `curl -s -o /dev/null -w \"%{http_code}\"` [`https://mywebappiacdemo01.azurewebsites.net/`](https://mywebappiacdemo01.azurewebsites.net/)\
    \ 并检查状态码是否为 200。\n\n## 总结\n\n本章教会了我们如何使用 Azure CLI 和 Azure DevOps 创建 Azure 资源。我们使用\
    \ Azure CLI 和 Azure DevOps 创建了一个资源组、一个应用服务计划和一个 Azure Web 应用。在下一章中，我们将学习如何使用 Azure\
    \ DevOps 将 Java 应用程序部署到 Azure。\n\n以下是本章的关键要点：\n\n*   使用 Azure 门户创建 Azure 资源工作量大，且由于涉及手动操作，存在引入错误的风险。你可以自动化资源创建活动，并在多个部署环境中触发自动化。这种方法将为你节省大量时间，并且不会出错。\n\
    \n*   以下是一些流行的基础设施即代码（IaC）产品，用于自动化创建 Azure 资源：\n    *   Azure CLI\n\n    *   Azure\
    \ PowerShell\n\n    *   ARM 模板\n\n    *   Terraform\n\n    *   Bicep\n\n# 14. 使用\
    \ Azure DevOps 进行构建和部署\n\n持续集成管道构建应用程序，持续部署管道将应用程序部署到目标托管环境。这种 DevOps 方法自动化了应用程序的构建和部署方法，并被所有现代企业所采用。这些管道减少了部署过程中的手动错误，并确保更快的市场发布。我们可以使用\
    \ Azure DevOps 管道来构建应用程序并将其部署到 Azure。\n\n在上一章中，我们学习了基础设施即代码（IaC）的基本概念。然后，我们创建了一个\
    \ Azure CLI 脚本来启动 Azure 资源。我们还使用了 Azure DevOps CLI 任务来创建 Web 应用。在本章中，我们将学习如何使用\
    \ Azure DevOps 管道将 Java 应用程序部署到 Azure。\n\n## 结构\n\n在本章中，我们将讨论以下基于 DevOps 的应用程序部署概念：\n\
    \n*   创建一个 Java 应用程序并将其提交到基于 Git 的 Azure Repos\n\n*   创建一个基于 YAML 的管道来构建应用程序并将其部署到\
    \ Azure Web 应用\n\n## 目标\n\n学习完本章后，你应该能够获得以下知识：\n\n*   学习如何使用 Azure Repos\n\n*\
    \   学习如何使用 Azure DevOps 管道构建 Java 应用程序并将其部署到 Azure\n"
- fmt: '# Create a Java Application and Commit It to Git-Based Azure Repos


    Let us build a simple Java Spring Boot API that will return a string. You can
    generate the application using Spring Initializr. Listing [14-1](#523943_1_En_14_Chapter.xhtml#PC1)
    shows the POM file for the application. We need to include the *Spring Web* dependency
    as in Listing [14-1](#523943_1_En_14_Chapter.xhtml#PC1).


    ```

    4.0.0


    org.springframework.boot

    spring-boot-starter-parent

    2.6.6


    com.iac

    demo

    0.0.1-SNAPSHOT

    demo

    Demo project for Spring Boot


    org.springframework.boot

    spring-boot-starter-web


    org.springframework.boot

    spring-boot-starter-test

    test


    org.springframework.boot

    spring-boot-maven-plugin


    Listing 14-1

    POM.xml

    ```


    You can generate a class file with the `Main` method and a REST API. Listing [14-2](#523943_1_En_14_Chapter.xhtml#PC2)
    shows the content of the class file.


    ```

    package com.iac.demo;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    @SpringBootApplication

    @RestController

    public class DemoApplication {

    public static void main(String[] args) {

    SpringApplication.run(DemoApplication.class, args);

    }

    @GetMapping("/")

    public String index() {

    return "Hello Spring Boot on WebApp !!";

    }

    }

    Listing 14-2

    Class file

    ```


    Once the application builds successfully, you can check in the code to the Azure
    Repos. As a prerequisite, you should have Git installed on your system. We can
    use the Azure DevOps project we created in the previous chapter. Open the Azure
    DevOps URL and navigate to the project. Click *Repos* and then click *Generate
    Git Credentials* as in Figure [14-1](#523943_1_En_14_Chapter.xhtml#Fig1).


    ![](images/523943_1_En_14_Chapter/523943_1_En_14_Fig1_HTML.jpg)


    A window screenshot representing Generate Git credentials.


    Figure 14-1


    Generate Git credentials


    Copy the HTTPS URL, Git username, and password as in Figure [14-2](#523943_1_En_14_Chapter.xhtml#Fig2).


    ![](images/523943_1_En_14_Chapter/523943_1_En_14_Fig2_HTML.jpg)


    A clone image to your computer dialogue box. to copy the Git credentials.


    Figure 14-2


    Copy Git credentials


    Navigate to the Java project root folder in the Windows Explorer with the POM
    file. Execute the command from Listing [14-3](#523943_1_En_14_Chapter.xhtml#PC3)
    to initiate a local Git repository.


    ```

    git init

    Listing 14-3

    Initialize a local Git repository

    ```


    Execute the command as in Listing [14-4](#523943_1_En_14_Chapter.xhtml#PC4) to
    add the folder content to the local Git repository.


    ```

    git add .

    Listing 14-4

    Add local changes to the Git repository

    ```


    Execute the command as in Listing [14-5](#523943_1_En_14_Chapter.xhtml#PC5) to
    commit the added files in the local Git repository.


    ```

    git commit -m "Initial commit"

    Listing 14-5

    Commit added files to the local Git repository

    ```


    Execute the commands as in Listing [14-6](#523943_1_En_14_Chapter.xhtml#PC6) to
    connect to the Git repository in Azure DevOps and push the local Git changes to
    it. Replace `[HTTPS_URL]` with the URL you copied earlier while generating the
    Git credentials.


    ```

    git remote add origin [HTTPS_URL]

    git push -u origin --all

    Listing 14-6

    Push local Git repository changes to Azure Repos

    ```


    You will get prompted to provide credentials for Git. You can provide the username
    and password you copied while generating Git credentials. Ensure you provide the
    username and the domain—for example, `abc@xyx.onmicrosoft.com`. The Java project
    will get checked into the Azure DevOps Repo as in Figure [14-3](#523943_1_En_14_Chapter.xhtml#Fig3).


    ![](images/523943_1_En_14_Chapter/523943_1_En_14_Fig3_HTML.jpg)


    A window screenshot representing the added project to Git Repo.


    Figure 14-3


    Added project to Git Repo


    ## Create a YAML-Based Pipeline


    Let us create a YAML-based pipeline to build the Java project from the Azure Repos
    and deploy it on Azure WebApp. As a prerequisite, you should have created a Linux-based
    Azure WebApp for Java 11 applications. You can refer to Chapter [13](#523943_1_En_13_Chapter.xhtml)
    on more details here. Click *Pipelines* as in Figure [14-4](#523943_1_En_14_Chapter.xhtml#Fig4).


    ![](images/523943_1_En_14_Chapter/523943_1_En_14_Fig4_HTML.jpg)


    A window screenshot of Azure DevOps representing click pipelines.


    Figure 14-4


    Click Pipelines


    Click *Create Pipeline* as in Figure [14-5](#523943_1_En_14_Chapter.xhtml#Fig5)
    to create a YAML-based pipeline.


    ![](images/523943_1_En_14_Chapter/523943_1_En_14_Fig5_HTML.png)


    A window which displays create your first pipeline by clicking on the create pipeline.


    Figure 14-5


    Click Create Pipeline


    You will be asked to provide the source code repository details where the Java
    code is checked in. We have checked in to Azure Repos Git. So select *Azure Repos
    Git* as in Figure [14-6](#523943_1_En_14_Chapter.xhtml#Fig6).


    ![](images/523943_1_En_14_Chapter/523943_1_En_14_Fig6_HTML.png)


    A window screenshot which displays select Azure Repos Git.


    Figure 14-6


    Select Azure Repos Git


    Select the repository where you have checked in the code as in Figure [14-7](#523943_1_En_14_Chapter.xhtml#Fig7).


    ![](images/523943_1_En_14_Chapter/523943_1_En_14_Fig7_HTML.jpg)


    A windows screenshot which represents select the code repository.


    Figure 14-7


    Select the code repository


    You can select the template *Maven package Java project Web App to Linux on Azure*
    as in Figure [14-8](#523943_1_En_14_Chapter.xhtml#Fig8). If you do not see this
    template listed, click *Show More* and search for it.


    ![](images/523943_1_En_14_Chapter/523943_1_En_14_Fig8_HTML.jpg)


    A window screenshot representing select a subscription.


    Figure 14-8


    Select the pipeline template


    Select the Azure subscription where you have created the Azure WebApp. Click *Continue*
    as in Figure [14-9](#523943_1_En_14_Chapter.xhtml#Fig9).


    ![](images/523943_1_En_14_Chapter/523943_1_En_14_Fig9_HTML.png)


    A window screenshot which represents Sign in and space to provide your credentials.


    Figure 14-9


    Select a subscription


    You will be prompted to provide your login credentials as in Figure [14-10](#523943_1_En_14_Chapter.xhtml#Fig10).
    Provide your credentials to log in to the system.


    ![](images/523943_1_En_14_Chapter/523943_1_En_14_Fig10_HTML.png)


    A windows screenshot to click validate and configure.


    Figure 14-10


    Provide your credentials


    Select the name of the WebApp where you are planning to deploy the Java code.
    Click *Validate and configure* as in Figure [14-11](#523943_1_En_14_Chapter.xhtml#Fig11).
    You need to wait for some time for the WebApp to get reflected here in the Azure
    DevOps environment after creating it. At times, it may take a few hours.


    ![](images/523943_1_En_14_Chapter/523943_1_En_14_Fig11_HTML.png)


    An image of the web app window. The maven package java project web app to linux
    on azure. Build your java project and deploy it to azure as a linux web app. The
    field to include the web app name is provided below.


    Figure 14-11


    Click Validate and configure


    The YAML pipeline will get generated for you. Listing [14-7](#523943_1_En_14_Chapter.xhtml#PC7)
    demonstrates the YAML pipeline content.'
