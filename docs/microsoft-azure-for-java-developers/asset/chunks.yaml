    \ logs to Log Analytics Workspace and query the logs when you need them.\n\nYou\
    \ can integrate your Java application with Azure Active Directory and enable authentication\
    \ and authorization using OAuth for your Java application. Azure Active Directory\
    \ is a widely accepted identity management solution on Azure. You can build robust\
    \ enterprise-grade identity management strategies and enable popular identity\
    \ features like single sign-on or multifactor authentication for your Java application\
    \ using Azure Active Directory.\n\n> **Note**  \n> Azure provides native out-of-the-box\
    \ support for Java applications. Your application should be on Java 8 or above.\n\
    \n## Summary\n\nIn this chapter, we learned the basics of cloud computing. We\
    \ explored the different cloud hosting types like Infrastructure as a Service,\
    \ Platform as a Service, and Software as a Service. We then explored Microsoft\
    \ Azure and the Java support provided by Microsoft Azure. In the next chapter,\
    \ we will learn the basics of Azure WebApp and then build a Spring Boot Java application,\
    \ package it with Maven, and deploy it to Azure WebApp using Maven-based Azure\
    \ Plugins.\n\nThe following are the key takeaways from this chapter:\n\n- Cloud\
    \ computing is all about renting cloud hosting services from a cloud vendor.\n\
    - Microsoft Azure, Amazon Web Services, and Google Cloud Platform are leading\
    \ cloud vendors today.\n- You can host your application on the cloud either using\
