- fmt: '### Cloud Deployment Models


    You may choose to host your application on a public cloud vendor like Amazon,
    Azure, Google, or other cloud providers. In the case of the public cloud, cloud
    infrastructure is managed by the public cloud vendor, and any individual or person
    can rent cloud services from the public cloud. However, you do not have control
    over the cloud infrastructure that is abstracted to you. An organization may choose
    to create its private cloud, and all the projects in that organization can use
    the cloud services exposed by the organization’s private cloud. In the case of
    private cloud, the organization has greater control over the cloud infrastructure
    as it owns the infrastructure. However, the organization may incur huge capital
    expenditure in purchasing and setting up the cloud infrastructure and operational
    expenditure in maintaining the cloud environment. You may also choose to host
    your application and its components partly on the public cloud and partly on your
    organization’s private cloud as a hybrid cloud model. For example, your application
    front end and services run on the public cloud, and the databases run on your
    organization’s private cloud.


    The following are the advantages of cloud computing:


    - You save the infrastructure ownership and maintenance cost as the cloud vendor
    manages infrastructure. You can predict the future cloud cost and plan your infrastructure
    and application budget efficiently.

    - You can provision and de-provision the cloud services with a single click and
    in minutes. You are not locked to the infrastructure if you do not need it anymore.

    - You save effort in setting up the infrastructure for your application to ensure
    faster time to market.

    - Your hosted application becomes highly available as the cloud vendor manages
    the underlying cloud environment and guarantees you high availability for your
    application based on the Service Level Agreements you have agreed upon with the
    vendor. You can also host a copy of your application across multiple data centers
    spread across multiple regions. This strategy would ensure that your application
    is available even if there is a data center or region-based outage.

    - Your application runs on a reliable and fault-tolerant infrastructure managed
    by the cloud vendor, and you need not worry about these application concerns.

    - Your application runs on a highly scalable infrastructure. Whenever the application’s
    incoming requests increase or need more computing power, the underlying cloud
    environment would create additional infrastructure to manage the load. Also, when
    additional infrastructure is no longer needed, the underlying cloud infrastructure
    de-provisions them. You may choose to scale manually by predefining the number
    of service instances you need, or you may set up automatic scaling that would
    help you scale based on the application performance metrics. For example, if the
    incoming load increases, the underlying cloud infrastructure would monitor the
    incoming load. When the CPU utilization, memory utilization, or other performance
    metrics reach the threshold value set, it would automatically spin up additional
    resources.

    - Your application runs on an elastic infrastructure, and you can set the scaling
    limits. The underlying infrastructure would not add or remove additional service
    instances beyond that limit, and this action would help you control the cost in
    case of scaling scenarios. Your infrastructure would scale within limits defined
    by you.

    - Hosting your application on the cloud would ensure that your application can
    be available globally. The leading cloud vendors have their data centers spread
    across the globe. You can host your application anywhere, provided the cloud vendor
    has a data center available in that region.

    - You can manage the customer latency issues for your application. You can host
    a copy of your application in a data center near your customers. Cloud-based load
    balancers are available that operate at a global level and can load-balance your
    applications hosted across multiple regions. These load balancers would route
    the customer request to a data center near the customer.

    - Your application runs in a highly secured environment managed by the cloud vendor.
    Leading cloud vendors have certified their services from leading security agencies
    and the government. A lot of government portals and applications run on the cloud
    today.


    ## Introduction to Azure


    Azure is a cloud offering from Microsoft. It was first announced at Microsoft’s
    Professional Developers Conference in 2008. Microsoft made its cloud platform
    generally available in February 2010 and launched it as Windows Azure, and in
    the year 2014, renamed it Microsoft Azure. Today, Microsoft Azure has a wide range
    of 200 plus cloud-based services that would help you build and host cutting-edge
    solutions on Azure.


    Your application running on Azure can be a simple customer-facing website, a robust
    data platform, a complex Machine Learning–based intelligent application, or any
    other new-generation solution. Azure supports a wide range of software languages
    and frameworks like .NET Core, Java, Python, and many more. Microsoft Azure is
    a popular cloud choice for leading private organizations and governments across
    the globe. You can build highly available, reliable, fault-tolerant, and secured
    solutions on Azure with ease. Your solution on Azure can be based on the Infrastructure-as-a-Service
    model or Platform-as-a-Service model, or Software-as-a-Service model.


    Azure provides a global infrastructure comprising more than 200 physical data
    centers spread across the globe. These data centers are linked using a highly
    available and secured interconnected network owned by Microsoft. These data centers
    are grouped into zones, and a geographic region consists of a group of zones.
    You can host your Azure solution across data centers in a zone, making the solution
    locally redundant; or data centers across multiple zones, making the solution
    zone redundant; or data centers across multiple regions, making the solution geo-redundant.


    Azure data centers are spread across the globe, and your solution can be hosted
    anywhere near your customer base. You can build excellent data backup and recovery
    strategies for your workloads running on Azure as you can back up your data and
    solution across data centers in multiple zones or regions. Even if the primary
    zone or region running your application goes down, your solution running on Azure
    can be restored and made available in no time from a secondary zone or region
    where you have a backup for your solution.


    Azure provides a wide range of services spread across multiple categories like
    Compute, Data, Storage, Networking, and many more. Table 1-1 depicts some of the
    Azure services that are used frequently by cloud practitioners.


    **Table 1-1** Few of the popular Azure services


    | Category | Services |

    | --- | --- |

    | Compute | Virtual Machine, WebApp, Function App, Kubernetes |

    | Data | SQL, MySQL, Cosmos DB |

    | Storage | Blob Storage, Queue Storage, File Storage, Data Lake |

    | Networking | Virtual Network, Firewall, Load Balancer |

    | Artificial Intelligence | Cognitive Services, Machine Learning Services |

    | Internet of Things (IoT) | IoT Hub |


    You can provision, delete, or interact with your Azure resources using Azure portal
    that provides a graphically intuitive user experience or command-line utilities
    like `Azure CLI` or `Azure PowerShell` or REST APIs exposed by these services.
    You can also build Infrastructure-as-Code solutions using `Terraform`, `Azure
    ARM` templates, `Chef`, or other popular Infrastructure-as-Code offerings.'
