    应用的默认页面


    ## 在 Azure Spring Cloud 上部署 Java 应用


    现在，让我们构建一个 Java Spring Boot 应用，并将其部署到我们之前创建的 Azure Spring Cloud 服务上。我们将使用服务绑定将
    Azure Spring Cloud 服务与 Azure Redis 缓存集成，然后从 Java Spring Boot 应用向 Azure Redis 缓存写入数据。我们无需在应用代码中为
    Azure Redis 缓存集成编写任何代码或配置。


    作为先决条件，您应该拥有一个 Azure Redis 缓存。我们将在第 [9](#523943_1_En_9_Chapter.xhtml) 章中探讨如何预配
    Azure Redis 缓存。


    让我们使用清单 [5-1](#523943_1_En_5_Chapter.xhtml#PC1) 中所示的 URL 访问 Spring Initializr。


    ```

    https://start.spring.io/

    清单 5-1

    Spring Initializr URL

    ```


    为项目提供 `group`、`artifact`、`name` 和其他基本详细信息。选择 `11` 作为 Java 版本，`JAR` 作为打包方式，如图 [5-11](#523943_1_En_5_Chapter.xhtml#Fig11)
    所示。


    ![](images/523943_1_En_5_Chapter/523943_1_En_5_Fig11_HTML.jpg)


    Spring Initializr 列表窗口的截图。它显示了项目详细信息。项目选择为 `Maven`，语言设置为 `Java`，Spring Boot 版本为
    `2.6.2`。项目元数据列出了 `Group`、`Artifact`、`Name`、`Description` 和 `Package name` 及其各自的字段。在“打包”和“Java”下分别选择了
    `JAR` 和 `11`。


    **图 5-11**


    提供项目详细信息


    添加 `Spring Web` 和 `Spring Data Reactive Redis` 依赖项，并生成项目，如图 [5-12](#523943_1_En_5_Chapter.xhtml#Fig12)
    所示。


    ![](images/523943_1_En_5_Chapter/523943_1_En_5_Fig12_HTML.jpg)


    Spring Initializr 列表窗口的截图。它显示了项目详细信息。项目选择为 `Maven`，语言设置为 `Java`，Spring Boot 版本为
    `2.6.2`。项目元数据列出了 `Group`、`Artifact`、`Name`、`Description` 和 `Package name` 及其各自的字段。在“打包”和“Java”下分别选择了
    `JAR` 和 `11`。


    **图 5-12**


    添加项目依赖项


    我们需要将 Azure Redis 缓存与我们创建的 Azure Spring Cloud 应用实例集成。转到应用实例，然后导航到“服务绑定”（`Service
    bindings`）部分。点击“创建服务绑定”（`Create service binding`），如图 [5-13](#523943_1_En_5_Chapter.xhtml#Fig13)
