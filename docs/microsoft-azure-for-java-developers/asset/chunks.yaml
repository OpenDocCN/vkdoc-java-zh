    \ Graph API 响应\n\n## 总结\n\n在本章中，我们学习了 Microsoft Graph API 的基础知识，以及如何为 Azure AD\
    \ 用户配置权限以使用 Microsoft Graph API 发送邮件。然后，我们开发了一个基于 Maven 的 Java 代码，并使用 Microsoft\
    \ Graph API 发送了邮件。在下一章中，我们将学习如何使用 Azure Monitor 和 Application Insights 监控 Java\
    \ 应用程序。\n\n以下是本章的关键要点：\n\n*   Microsoft Graph API 为您提供了一组 RESTful 端点，您可以使用它们与\
    \ Microsoft 365 核心服务、企业移动性与安全性服务、Windows 10 服务和 Dynamics 365 服务进行交互。\n\n*   作为先决条件，您需要拥有\
    \ Microsoft 365 E5 开发者许可证才能使用 Graph API 发送邮件。此许可证将帮助您为用户或服务帐户配置邮箱以发送邮件。\n\n* \
    \  以下是配置 Graph API 并从您的应用程序调用 Graph API 发送电子邮件的步骤：\n    *   您需要在 Azure 租户中创建一个用户。\n\
    \n    *   为用户分配 Microsoft 365 E5 许可证以使用 Microsoft 365 邮箱。\n\n    *   创建一个服务主体，并为该服务主体授予必要的\
    \ Graph API 权限以发送邮件。\n\n    *   配置您的 Java 应用程序以发送邮件。\n\n# 11. 使用 Azure Monitor\
    \ 和 Application Insights 进行调试与监控\n\n应用程序有时可能会变得缓慢，您可能需要排查性能问题。应用程序性能下降可能有多种原因。例如，当应用程序处理长时间运行的请求时，CPU\
    \ 或内存利用率可能会变高。我们需要一种机制来定期监控应用程序性能指标（如 CPU、内存和磁盘利用率），并在应用程序达到阈值性能水平时向运维团队发出警报。您可能还需要日志来调试应用程序故障。Azure\
    \ Monitor 帮助您跟踪应用程序指标，而 Azure Application Insights 帮助您分析在 Azure、本地或任何其他公有云上运行的应用程序的日志。\n\
    \n在上一章中，我们学习了 Microsoft Graph API 的基本概念。然后，我们创建了一个基于 Java 的应用程序，并配置了 Microsoft\
    \ Graph API 来发送邮件。在本章中，我们将详细了解 Azure Monitor 和 Azure Application Insights。然后，我们将构建一个\
    \ Java 应用程序，该应用程序可以使用 Azure Monitor 生成性能指标，并使用 Azure Application Insights 生成应用程序日志。\n\
    \n## 结构\n\n在本章中，我们将讨论 Azure Monitor 和 Application Insights 的以下方面：\n\n*   Azure\
    \ Monitor 和 Application Insights 简介\n\n*   配置 Azure Monitor 指标和仪表板\n\n*   创建性能警报\n\
    \n*   为 Java 应用程序使用 Application Insights\n\n## 目标\n\n学习本章后，您应该能够获得以下知识：\n\n* \
    \  理解 Azure Monitor 和 Application Insights 的概念\n\n*   为 Java 应用程序配置 Azure Monitor\
    \ 和 Application Insights\n"
- fmt: "# Introduction to Azure Monitor and Application Insights\n\nAzure Monitor\
    \ helps you collect performance metrics and logs data from your applications and\
    \ infrastructure on Azure, on-premises, or any other cloud platforms. It collects\
