- fmt: '# Azure WebApp


    `Azure WebApp` is a Platform-as-a-Service offering on Azure. You can build HTTP-based
    applications and services and host them on the `Azure WebApp`. You need not worry
    about creating and managing the underlying hosting infrastructure, and the Azure
    platform will take care of this for you. You need to provision the service and
    host your application. You can build web applications, REST APIs, and mobile back
    end using any supported languages like `.NET`, `Java`, `Node.js`, `Python`, `PHP`,
    and `Ruby` and run it on `Azure WebApp`. Both the Windows- and Linux-based environments
    are supported on `Azure WebApp`. You can also containerize your application using
    `Docker` and run it on `Azure WebApp`.


    `Azure WebApp` is highly available and scalable. You can either configure your
    `WebApp` to scale automatically or scale the `WebApp` manually. It has a rich
    continuous integration and continuous deployment support and integrates easily
    with `Azure DevOps`, `Jenkins`, `Bitbucket`, `GitHub`, and even any local Git
    repository. It also supports deploying an application using `FTP`.


    You can have multiple deployment slots for the `Azure WebApp`. Your application
    would run on a production deployment slot, and you can create a staging deployment
    slot for an `Azure WebApp` and host a newly developed version of your application.
    The majority of the application traffic can be diverted to the production slot,
    and part of the application traffic can be diverted to the staging slot. Eventually,
    you can swap the content in the staging slot to the production slot and redirect
    all the traffic to the production slot once you have enough confidence in the
    newly developed application. You can automate this process using Infrastructure-as-Code
    and DevOps solutions.


    **Note**


    You can scale the `Azure WebApp` horizontally by provisional additional identical
    instances for the `WebApp` or scale it vertically by changing the `App Service
    Plan`. Scaling vertically is referred to as the scale-up process, and scaling
    horizontally is referred to as the scale-out process.


    ## App Service Plan


    Some applications are CPU intensive, and some are memory intensive, and some applications
    can run on fewer computing resources. Every application has its computing, infrastructure
    requirement, and other needs like scaling, data storage, and many more, and `Azure
    WebApp` caters to this application requirement using `App Service Plan`. `App
    Service Plan` defines the computing resources, scaling, deployment slots, pricing
    tier, and other necessary features for an `Azure WebApp`. Based on the application
    requirement, you can choose an `App Service Plan` for your `WebApp`. Every `WebApp`
    runs on an `App Service Plan`. You can share multiple `WebApps` on an `App Service
    Plan` and share the underlying hosting infrastructure across multiple `WebApps`.


    The following pricing tiers are available for `Azure WebApp`-based `App Service
    Plan`:


    *   Shared Compute

    *   Dedicated Compute

    *   Isolated


    ### Shared Compute


    `Shared Compute` offers Free or Shared plans, and the underlying hosting infrastructure
    would get shared by the `WebApp` running on `App Service Plans` for multiple customers.
    This tier does not offer scaling features, and compute isolation is guaranteed
    for your application. You can use this tier for development and testing purposes
    only.


    ### Dedicated Compute


    With `Dedicated Compute`, you have a dedicated underlying hosting infrastructure
    for all your `WebApps` running on your `App Service Plan`. It can be basic, premium,
    or standard tier. The premium tier offers the maximum number of computing resources
    and scaling instances followed by the standard and basic tiers. Compute isolation
    is guaranteed for your application.


    ### Isolated


    The `Isolated` plan provides a dedicated Virtual Network for your Azure. This
    tier guarantees network isolation along with compute isolation.


    ## Deploy Java Application on Azure WebApp


    Let us build a Java Spring Boot application and deploy it on an `Azure WebApp`.
    We will use `Maven` to build and deploy the application to the `Azure WebApp`.
    The following are the prerequisites you should be ready with before you start
    with the deployment steps. You can choose the latest version or any other version
    that you are comfortable working with for the tools mentioned.


    *   `Visual Studio Code`

    *   Java version 8 or above installed on your system

    *   A compatible `Maven` version with your installed Java version installed on
    your system

    *   Should have an Azure Subscription with permissions to create a resource group
    and resources inside the resource group

    *   `Azure CLI` installed on your system'
