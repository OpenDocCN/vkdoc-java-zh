    ## Securing Azure Databases


    Let us secure the Azure database we created. We can set the firewall on the Azure
    SQL server and specify who can access the database. If needed, we can integrate
    the database with Virtual Network to make sure that the database is accessible
    privately from within the virtual network. We can also selectively allow a range
    of IP addresses to access the database. You can manage the data in transit by
    enabling TLS for the database to make sure that the data gets transported over
    a secured channel. To enable the firewall, go to the *Overview* section for the
    SQL database in the Azure portal and click *Set server firewall* as in Figure
    [7-16](#523943_1_En_7_Chapter.xhtml#Fig16).


    ![](images/523943_1_En_7_Chapter/523943_1_En_7_Fig16_HTML.jpg)


