    ## Summary


    In this chapter, we learned the details of Azure Spring Cloud. We learned how
    to integrate other Azure services with application running on Azure Spring Cloud
    using service bindings and also explored how to use Maven commands to deploy application
    jars to Azure Spring Cloud. We then developed a Java Spring Boot application and
    deployed it on Azure Spring Cloud. In the next chapter, we will learn how to work
    with Azure Storage programmatically from Java applications.


    The following are the key takeaways from this chapter:


    *   Azure Spring Cloud helps you host Spring Boot applications on Azure without
    making code changes.


    *   It can host both Java and .NET Core applications.


    *   It is best suited for running microservices-based applications.


    *   You need to focus on building the application. The underlying platform will
    take care of the hosting requirements. You need to provision the Azure Spring
    Cloud service and deploy your application on it.


    *   Using service bindings, you can integrate with other Azure services without
    making code changes.


    # Part IIIntegrating Java Applications with Popular Azure Services


    # 6. Integrating with an Azure Storage Account


    You may have a requirement to store images, files, and other binary large object
    data in Azure for your application. You may also need to implement a queue-based
    data structure for your application or semi-structured table data in Azure. You
    can use Azure Storage for all such requirements. Microsoft provides packages that
    can be used in your Java application code to interact with your Storage account.


    In the previous chapter, we learned the basics of Azure Spring Cloud. We then
    created a Java-based application and hosted it on Azure Spring Cloud. In this
    chapter, we will learn the details of the Azure Storage service, and then we will
    provision Azure Storage and work with Azure Storage from the Java application
    code.


    ## Structure


    In this chapter, we will discuss the following aspects of the Azure Storage service:


    *   Introduction to Azure Storage


    *   Creating an Azure Storage Account


    *   Working with Azure Storage Blob


    *   Working with Azure Storage Queue


    *   Working with Azure Storage Table


    ## Objectives


    After studying this chapter, you should be able to do the following:


    *   Understand the concept of Azure Storage service


    *   Work with Azure Storage service from Java applications'
