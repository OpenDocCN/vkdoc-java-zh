- fmt: '# Kubernetes Services and Application Deployment


    The application containers running inside pods should be exposed to the end users
    to access the application. Even you may have scenarios where a pod should be exposed
    only inside the cluster for another pod to consume. Such scenarios are handled
    using the Kubernetes services running inside the cluster. A `ClusterIP` service
    allows pods to communicate internally. The `LoadBalancer` service and the `NodePort`
    service allow the pods to be exposed to the end users.


    Let us go back to the three-tier application example that we discussed earlier.
    We need to expose the user interface tier to the end user. The user interface
    tier should communicate with the business logic tier, and the business logic tier
    should communicate with the data access tier. The business logic tier and the
    data access tier should not be exposed to the external users, and its access should
    be limited inside the cluster. To address this scenario, we can have a `LoadBalancer`
    service in front of the user interface tier so that the user interface tier gets
    exposed to the end user. You can have a `ClusterIP` service in front of the business
    logic tier and the data access tier to limit its communication within the cluster.


    As a developer, you containerize the application and push it to the container
    registry. You then spin up the Kubernetes cluster and build a deployment YAML
    file for the Kubernetes cluster. The deployment YAML file will have all necessary
    details like the number of replicas, services, containers to run on the cluster,
    and many more details needed for the application containers to run on Kubernetes
    worker nodes. You then pass on this deployment file to the control plane. The
    control plane then schedules the pods on the worker nodes based on the information
    you have provided in the YAML file. The pods will pull the container images from
    the container registry specified in the deployment file and then start them as
    containers.


    ## Containerize a Java Application and Run It on Azure Kubernetes Service


    Let us build a Java Spring Boot application, containerize it, push it to Azure
    Container Registry, and run it in the Azure Kubernetes Service cluster. We will
    use Spring Initializr to generate the Spring Boot application and create a Docker
    file manually.


    You should have Docker Desktop installed on your local system to containerize
    your application as a prerequisite. Docker provides a community edition for Docker
    Desktop to experiment with Docker offerings and try out the Docker containers.
    You can use the Docker Desktop community edition.


    We will create the Azure Kubernetes Service and the Azure Container Registry first.
    Then we will build the application, containerize it, push it to the Azure Container
    Registry, and then run the application container on Azure Kubernetes Service.


    ### Create Azure Container Registry


    Azure Container Registry is a private Docker registry and can store container
    images on Azure platform. The images stored will be accessible to only those who
    have access to the registry. It can also store artifacts like Helm Charts and
    other artifacts pertaining to Open Container Initiative (OCI) specifications.
    Let us create an Azure Container Registry. Go to the Azure portal and click *Create
    a resource,* as shown in Figure [4-2](#523943_1_En_4_Chapter.xhtml#Fig2).


    ![](images/523943_1_En_4_Chapter/523943_1_En_4_Fig2_HTML.jpg)


    A screenshot of the Microsoft azure window to create a resource.


    Figure 4-2


    Create a resource


    Click on the *Containers* tab. You will get all Container-related offerings here,
    and you can see them in Figure [4-3](#523943_1_En_4_Chapter.xhtml#Fig3). Click
    *Container Registry*.


    ![](images/523943_1_En_4_Chapter/523943_1_En_4_Fig3_HTML.jpg)


    A windows screenshot of go to the containers tab.


    Figure 4-3


    Go to the Containers tab


    Provide subscription, resource group, name, SKU, and location for the container
    registry. Click *Review + create* as shown in Figure [4-4](#523943_1_En_4_Chapter.xhtml#Fig4).


    ![](images/523943_1_En_4_Chapter/523943_1_En_4_Fig4_HTML.jpg)


    A screenshot of create container registry window. It has project details to be
    filled for subscription, and resource group. Instance details to be filled are
    registry name, location, and S K U. There is a tab for availability zones that
    is not mandatory to be filled. Review plus create tab on the lower side is highlighted.


    Figure 4-4


    Provide basic details


    Click *Create* as shown in Figure [4-5](#523943_1_En_4_Chapter.xhtml#Fig5). This
    will spin up an Azure Container Registry for you.


    ![](images/523943_1_En_4_Chapter/523943_1_En_4_Fig5_HTML.jpg)


    A screenshot of create container registry window with text, validation passed.
    The details are provided for subscription, resource group, location, availability
    zones, S K U, and networking and encryption details. Public network access is
    enabled. Two options on the lower side for create and previous. Create tab is
    highlighted.


    Figure 4-5


    Click Create


    Once the container registry gets created, go to the Azure portal and navigate
    to the container registry. Click *Access keys* as shown in Figure [4-6](#523943_1_En_4_Chapter.xhtml#Fig6).
    Enable Admin user. Copy the login server, username, and password. We will use
    these credentials to push the container images to the container registry later.


    ![](images/523943_1_En_4_Chapter/523943_1_En_4_Fig6_HTML.jpg)


    A screenshot of the access keys window of the registry. The left panel has settings
    for access keys, encryption, and identity, the tab for access keys is highlighted.
    The right panel has details for registry name, login server, admin user, username,
    and password. Admin user enabled, and tabs for login server, username, and password
    highlighted.


    Figure 4-6


    Access keys'
