    ## Summary


    In this chapter, we learned the details of containers and Kubernetes. We then
    learned what Azure Kubernetes Service is. We then developed a Java Spring Boot
    application, containerized it in a Docker image, and pushed it to the Azure Container
    Registry. We pulled the container image and ran it on the Azure Kubernetes Service
    cluster. We explored basic Docker and `kubectl` commands that will help us interact
    with the Docker engine and the Kubernetes cluster. In the next chapter, we will
    build a Java application and run it on Azure Spring Cloud.


    The following are the key takeaways from this chapter:


    - You can build your application, containerize it, and keep it in a container
    registry along with all necessary application dependencies.

    - The container registry stores the container images. Azure Container Registry
    and Docker Hub are examples of container registry.

    - In the case of containers, the server''s operating system is virtualized, and
    the containers run as operating system threads without needing an operating system
    for themselves.

    - Kubernetes is an open source container orchestrator offering from Google. It
    consists of a master node or the control plane and multiple worker nodes.

    - Your containers run inside the pods in the worker nodes.

    - Azure Kubernetes Service is a managed Kubernetes offering on Azure.


    # 5. Running Java Applications on Azure Spring Cloud


    You are building a Spring Boot–based microservices application that you will host
    on Azure using the Platform-as-a-Service model. You need to take care of concerns
    like keeping application configurations for different environments, integrating
    with Platform-as-a-Service (PaaS) databases on Azure, and leveraging Azure Redis
    for caching needs. You may have to integrate application insights for logging
    and monitoring and configure automatic scaling for your services and many more.
    You also need to integrate your application hosting environment with a Git repository,
    Azure DevOps pipelines, or Jenkins. And you need to achieve all these requirements
    without making any code changes and use configurations as much as possible. Azure
    Spring Cloud will help you here with ease.


    In the previous chapter, we learned the basics of Azure Kubernetes Service. We
    then created a Java-based application, containerized it, and deployed it on Azure
    Kubernetes Service. In this chapter, we will learn the details of Azure Spring
    Cloud, and then we will provision an Azure Spring Cloud service and deploy the
    application in the service.'
