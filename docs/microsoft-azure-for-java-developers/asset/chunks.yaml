    Function App的`Configuration`中设置`AzureWebJobsStorage`的值。您可以看到，我们使用`QueueOutput`属性进行声明式配置来连接到存储队列，而无需编写大量代码。`queuename`参数值指定存储帐户中的队列名称。代码行`msg.setValue("Name
