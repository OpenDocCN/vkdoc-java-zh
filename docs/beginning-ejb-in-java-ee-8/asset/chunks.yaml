    `findCustomerByEmail()` 方法来获取一个实例，在我们的案例中，该实例恰好是一个 `Individual` 子实体。一旦检索到 `Customer`，它就会被分配给一个类级属性，以便随后可以通过此有状态会话
    Bean 上的其他方法引用它。由于我们使用的是扩展的持久化上下文，除非该实例被主动从持久化上下文中移除，否则它将在 Bean 的整个生命周期内（跨越事务边界）保持受管状态。


