  raw: '### Instantiating the Embeddable EJB Container and Starting Derby


    Before any test in this class is executed, we want to initialize the Embeddable
    EJB Container. Because this is a somewhat resource-intensive operation (albeit
    not as expensive as launching a full-blown GlassFish server), we would like to
    do this only once each time the JUnit tester is launched. JUnit lets you annotate
    static methods with `@BeforeClass`, and it executes these methods once per JUnit
    session, before the first unit test method is executed on that class. Our class-level
    setup method is as follows:


    ```

    @BeforeClass

    public static void setUpClass() throws Exception {

    PrintWriter pw = new PrintWriter(System.out);

    //  Start the Derby Database server, waiting until it is responsive

    //  before continuing

    try {

    derbyServer = new org.apache.derby.drda.NetworkServerControl();

    derbyServer.start(pw);

    int i = 50;

    while (--i > 0) {

    try {

    derbyServer.ping();

    break;

    } catch (Exception ex) {

    System.out.println("Derby Server started; waiting for response...");

    }

    Thread.sleep(100);

    }

    } finally {

    pw.close();

    }

    //  Instantiate an Embeddable EJB Container

    ejbContainer = javax.ejb.embeddable.EJBContainer.createEJBContainer();

    }

    ```


    We begin by starting up the Derby database to allow our persistence unit to connect
    to a running server. Because the `org.apache.derby.drda.NetworkServerControl.start()`
    method is asynchronous, we have to assume that the server might not be available
    for connections right away, so we ping it in a loop, sleeping briefly between
    iterations, until it is ready or we decide to time out.


    Once Derby is available for connections, we create the Embeddable EJB Container
    through the `javax.ejb.embeddable.EJBContainer.createEJBContainer()` call. Our
    `WineAppServiceTest` class is called from the JUnit tester, and NetBeans launches
    the tester with a class-path containing the JPA persistence unit `.jar` file (from
    Chapter [7](#A311833_3_En_7_Chapter.html)) along with the EJBs defined in our
    Chapter [13](#A311833_3_En_13_Chapter.html) EJB jar and all of the necessary Java
    libraries required to run the JUnit framework and instantiate the Embeddable EJB
    Container. The current (at the time of this writing) GlassFish implementation
    links to a GlassFish server installation area to provide the services an EJB Container
    generally requires from its host Java EE server environment. Again, because we
    are running in a Java SE environment, the Java EE GlassFish server is not actually
    started, but classes required by the Embeddable EJB Container are loaded as needed
    from the Java libraries that comprise GlassFish.


    At the conclusion of the JUnit session, the Embeddable EJB Container and the Derby
    Database server must be closed properly to release any resources that they may
    continue to hold. JUnit invokes methods annotated `@AfterClass` at this time,
    and our method `tearDownClass()` performs these tasks:


    ```

    @AfterClass

    public static void tearDownClass() throws Exception {

    //  Close the Embeddable EJB Container, releasing all resources

    ejbContainer.close();

    //  Shutdown the Derby Database server

    derbyServer.shutdown();

    }

    ```


    ### Initializing Data in the Persistence Unit


    Whereas steps such as starting the Derby and Embeddable EJB Container need to
    be performed only once per JUnit test session, other initialization steps must
    be executed prior to every JUnit test. Per-test initialization steps goes in a
    method (or methods) annotated `@Before`, like this:


    ```

    @Before

    public void setUp() {

    //  Inititalize the data in the domain model

    PopulateDemoData.resetData("Chapter13-EmbeddableEJBTests-ResourceLocal", System.out);

    }

    ```


    For our tests, we want to ensure that each unit test begins with the same data
    in the database, so we execute a script that initializes the database and resets
    the data to the desired state. You may be familiar with this static `PopulateDemoData.resetData()`
    method from when it was used in other chapters. Note that we pass the name of
    a persistence unit so that we can reuse it in different application contexts.
    The JPA persistence unit in the `Chapter07-ServiceIntegration-jpa` project defines
    its own `persistence.xml` file, and within it a `<persistence-unit>` named `Chapter07-WineAppUnit-ResourceLocal`.
    The `<persistence-unit>` we are using for our JUnit tests is “`Chapter13-EmbeddableEJBTests-ResourceLocal`”
    and it is defined in our context project, `Chapter13-EmbeddedEJBTests`, in the
    “`Configuration Files`” section. Since the entity classes in our JPA persistence
    unit are visible to our Test/EJB module, we are free to define additional persistence
    units that reference these same entity classes. JPA is happy to let you define
    multiple persistence units for the same entity classes, using multiple `persistence.xml`
    files if desired, allowing each persistence unit to specify a different database
    connection, schema generation plan, persistence provider, or any other configuration
    option. We define a new persistence unit in this case so that we can map them
    to a database connection that is suited to testing purposes. This connection is
    described next.'
