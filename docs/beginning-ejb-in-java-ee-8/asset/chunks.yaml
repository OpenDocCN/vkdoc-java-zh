- fmt: '#### Creating a Bean Class


    A stateless session bean class is any standard Java class that has a class-level
    annotation of `@Stateless`. Starting with version 3, the EJB specification doesn’t
    mandate the requirement of SEIs. Providing an SEI along with a bean class is optional.
    In the use case in which the bean class will be published as a Web service without
    any service endpoint interface, the bean class will have the additional class-level
    annotation `@WebService` (JSR 224). The `@WebService` annotation is in the `javax.jws`
    package, and it marks the bean class as an implementation for a SOAP-based Web
    service.


    The `@WebService` annotation takes the parameters described in Table [6-3](#A311833_3_En_6_Chapter.html#Tab3).


    **Table 6-3** The `@WebService` Annotation


    | Parameter | Description | Additional Info |

    | --- | --- | --- |

    | `name` | The name of the Web service that gets mapped to `wsdl:portType`. |
    If not specified, the name of the Java class is taken. |

    | `targetNamespace` | The XML namespace used for the Web service. | If not specified,
    the name of the Java class is taken. |

    | `serviceName` | The name of the Web service that gets mapped to `wsdl:service`.
    | If not specified, the name of the Java class is taken. |

    | `wsdlLocation` | The location of the WSDL document, which comes in handy when
    the bean class is implementing existing Web service. |   |


    To illustrate a stateless session bean that gets published as a Web service, we
    will create a `CreditServiceEndpointBean` that will be published as `CreditService`.


    In Listing [6-9](#A311833_3_En_6_Chapter.html#Par71), we have a Java class, `CreditCheckEndpointBean`,
    which has two class-level annotations: `@Stateless` and `@WebService`. The `@Stateless`
    annotation provides an additional parameter to mark the bean as `CreditCheckEndpointBean`.
    If the same class is exposed to remote or local clients, those clients will access
    the stateless session bean with that name. The `@WebService` annotation provides
    two additional parameters: one to mark the service name as `CreditService` and
    the other to specify the target namespace (instead of using the default Java package
    structure).


    ```

    package com.apress.ejb.chapter06.services;

    import javax.ejb.Stateless;

    import javax.jws.WebMethod;

    import javax.jws.WebService;

    @Stateless(name = "CreditCheckEndpointBean")

    @WebService(serviceName = "CreditService", targetNamespace = "http://www.apress.com/ejb/credit")

    public class CreditCheckEndpointBean  {

    public CreditCheckEndpointBean() {

    }

    }

    Listing 6-9

    CreditCheckEndpointBean.java

    ```


    The `@WebMethod` annotation defined in JSR 224 allows you to customize the method
    that is exposed as a Web service operation. If no `@WebMethod` annotations are
    specified in the bean class that has the `@WebService` annotation, then all public
    methods are exposed as Web service operations.


    The `@WebMethod` annotation takes the parameters described in Table [6-4](#A311833_3_En_6_Chapter.html#Tab4).


    **Table 6-4** The `@WebMethod` Annotation


    | Parameter | Description | Additional Info |

    | --- | --- | --- |

    | `operationName` | The name of the `wsdl:operation` that matches this method.
    | By default, this is the name of the Java method. |

    | `action` | The action for this operation. In the case of SOAP bindings, it will
    be the value of the `SOAP action` header. | By default, this is the name of the
    Java method. |


    In Listing [6-10](#A311833_3_En_6_Chapter.html#Par75), we have added the following
    method into the `CreditCheckEndpointBean` class, which will be exposed as a Web
    service operation. The operation name is customized as `CreditCheck` using `@WebMethod`
    parameters. The method takes a `java.lang.String` parameter (which is the credit
    card number) and returns a `java.lang.boolean` value of `true` or `false`, depending
    on whether the credit card is valid. For simplicity’s sake, we will always return
    `true`.


    ```

    @WebMethod(operationName="CreditCheck")

    public boolean validateCC(String cc){

    return true;

    }

    Listing 6-10

    The validateCC Method in CreditCheckEndpointBean.java

    ```


    #### Web Service Endpoint Interface


    JAX-WS doesn’t mandate the requirement of an SEI to implement a Web service endpoint.
    You can use the annotations provided in JSR 224 to mark the bean class as a Web
    service and one or more business methods as Web service operations. In the use
    case in which an SEI is defined for a stateless session bean, the following should
    be observed:


    *   The SEI must have a `javax.jws.WebService` annotation.

    *   One or more methods can have a `javax.jws.WebMethod` annotation.

    *   All method parameters and return types should be compatible with the JAXB
    XML schema mapping definition.

    *   Arguments and return types of methods must be valid JAX-RPC value types, which
    include Java primitives (`int`, `long`, and so on), Java classes (`String`, `Date`,
    and so forth), Java Beans, and arrays.

    *   `Throw` clauses must include a `java.rmi.RemoteException` in addition to any
    other application exceptions.


    **Note:** Support for JAX-RPC has been made optional since Java EE 7. Since Java
    EE 7, the specification encourages new applications to use the facilities provided
    by JAX-WS that simplify Web service development. The current version of JAX-RPC
    is 1.1.


    In our examples, we are adding annotations to the bean class itself, as shown
    in Listings [6-9](#A311833_3_En_6_Chapter.html#Par71) and [6-10](#A311833_3_En_6_Chapter.html#Par75).


    Listing [6-11](#A311833_3_En_6_Chapter.html#Par85) illustrates a service endpoint
    interface for the use case in which an SEI is provided, and Listing [6-12](#A311833_3_En_6_Chapter.html#Par86)
    shows the `CreditCheckEndpointBean` class implementing the SEI.


    ```

    @WebService(serviceName="CreditService",targetNamespace="http://www.apress.com/ejb/credit")

    public interface CreditCheckEndpoint {

    @WebMethod(operationName="CreditCheck")

    public boolean validateCC(String cc);

    }

    Listing 6-11

    A Service Endpoint Interface for the Use Case

    ```


    ```

    @Stateless

    public class CreditCheckEndpointBean implements CreditCheckEndpoint {

    public CreditCheckEndpointBean() {

    }

    //implementation goes here

    }

    Listing 6-12

    The CreditCheckEndpointBean Class Implementing the SEI

    ```


    ## Packaging, Deploying, and Testing Web Services


    Stateless session beans that have Web service annotations need to be packaged
    into EJB Java Archive (JAR) files before they are deployed into EJB containers.
    For some EJB containers or application servers, they first need to be assembled
    into EAR [Enterprise Archive] files). Most EJB containers or application servers
    provide deployment utilities or Ant tasks to facilitate deployment of EJBs to
    their containers. Java-integrated development environments (IDEs) like JDeveloper,
    NetBeans, and Eclipse also provide deployment features that allow developers to
    package, assemble, and deploy EJBs to application servers. Packaging, assembly,
    and deployment aspects are covered in detail in Chapter [11](#A311833_3_En_11_Chapter.html).


    In this chapter, we have developed one stateless session bean (`CreditCheckEndpointBean`)
    with Web service annotations. We will perform the following steps to compile,
    deploy, and test the stateless session bean to be published as a Web service.


    ### Prerequisites


    Before performing any of the steps detailed in the next sections, complete the
    “Getting Started” section of Chapter [1](#A311833_3_En_1_Chapter.html), which
    walks you through the installation and environment setup required for the samples
    in this chapter.'
  raw: '#### Creating a Bean Class


    A stateless session bean class is any standard Java class that has a class-level
    annotation of `@Stateless`. Starting with version 3, the EJB specification doesn’t
    mandate the requirement of SEIs. Providing an SEI along with a bean class is optional.
    In the use case in which the bean class will be published as a Web service without
    any service endpoint interface, the bean class will have the additional class-level
    annotation `@WebService` (JSR 224). The `@WebService` annotation is in the `javax.jws`
    package, and it marks the bean class as an implementation for a SOAP-based Web
    service.


    The `@WebService` annotation takes the parameters described in Table [6-3](#A311833_3_En_6_Chapter.html#Tab3).


    Table 6-3


    The @WebService Annotation


    | Parameter | Description | Additional Info |

    | --- | --- | --- |

    | `name` | The name of the Web service that gets mapped to `wsdl:portType`. |
    If not specified, the name of the Java class is taken. |

    | `targetNamespace` | The XML namespace used for the Web service . | If not specified,
    the name of the Java class is taken. |

    | `serviceName` | The name of the Web service that gets mapped to `wsdl:service`.
    | If not specified, the name of the Java class is taken. |

    | `wsdlLocation` | The location of the WSDL document, which comes in handy when
    the bean class is implementing existing Web service. |   |


    To illustrate a stateless session bean that gets published as a Web service, we
    will create a `CreditServiceEndpointBean` that will be published as `CreditService`.


    In Listing [6-9](#A311833_3_En_6_Chapter.html#Par71), we have a Java class, `CreditCheckEndpointBean`
    , which has two class-level annotations: `@Stateless` and `@WebService`. The `@Stateless`
    annotation provides an additional parameter to mark the bean as `CreditCheckEndpointBean`.
    If the same class is exposed to remote or local clients, those clients will access
    the stateless session bean with that name. The `@WebService` annotation provides
    two additional parameters: one to mark the service name as `CreditService` and
    the other to specify the target namespace (instead of using the default Java package
    structure).


    ```

    package com.apress.ejb.chapter06.services;

    import javax.ejb.Stateless;

    import javax.jws.WebMethod;

    import javax.jws.WebService;

    @Stateless(name = "CreditCheckEndpointBean")

    @WebService(serviceName = "CreditService", targetNamespace = "http://www.apress.com/ejb/credit")

    public class CreditCheckEndpointBean  {

    public CreditCheckEndpointBean() {

    }

    }

    Listing 6-9

    CreditCheckEndpointBean.java

    ```


    The `@WebMethod` annotation defined in JSR 224 allows you to customize the method
    that is exposed as a Web service operation. If no `@WebMethod` annotations are
    specified in the bean class that has the `@WebService` annotation, then all public
    methods are exposed as Web service operations.


    The `@WebMethod` annotation takes the parameters described in Table [6-4](#A311833_3_En_6_Chapter.html#Tab4).


    Table 6-4


    The @WebMethod Annotation


    | Parameter | Description | Additional Info |

    | --- | --- | --- |

    | `operationName` | The name of the `wsdl:operation` that matches this method.
    | By default, this is the name of the Java method. |

    | `action` | The action for this operation. In the case of SOAP bindings, it will
    be the value of the `SOAP action` header. | By default, this is the name of the
    Java method. |


    In Listing [6-10](#A311833_3_En_6_Chapter.html#Par75), we have added the following
    method into the `CreditCheckEndpointBean` class , which will be exposed as a Web
    service operation. The operation name is customized as `CreditCheck` using `@WebMethod`
    parameters. The method takes a `java.lang.String` parameter (which is the credit
    card number) and returns a `java.lang.boolean` value of `true` or `false`, depending
    on whether the credit card is valid. For simplicity’s sake, we will always return
    `true`.


    ```

    @WebMethod(operationName="CreditCheck")

    public boolean validateCC(String cc){

    return true;

    }

    Listing 6-10

    The validateCC Method in CreditCheckEndpointBean.java

    ```


