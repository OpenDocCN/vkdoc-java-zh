  raw: '#### Bean Constructor Parameter Injection


    A CDI bean designates a single one of its constructors to be its bean constructor.
    This is the constructor that the CDI container uses to instantiate the bean. Bean
    constructor parameter injection occurs when we add an `@javax.inject.Inject` annotation
    to a bean constructor with one or more parameters. If a bean constructor has more
    than one parameter, then all of the parameters are valid injection points, which
    means that the container must provide values for all the parameters of a bean
    constructor. If the bean class does not have a bean constructor with an `@Inject`
    annotation, then the default (parameterless) constructor is used as the bean constructor.


    It is possible for a client application to bypass the container and directly instantiate
    the bean. The obvious result in such cases is that the returned object is not
    bound to any context and the life cycle of the new instance is not managed by
    the container.


    Listing [10-4](#A311833_3_En_10_Chapter.html#Par111) shows how the `beanConstParaInjVintage`
    field in the `WineCellarClient` class can be initialized with a vintage `Wine`
    type using a bean constructor parameter injection.


    Note


    The CDI container will choose the default implementation of the `Wine` interface
    and pass an instance of that implementation onto the `WineCellarClient` bean constructor.


    ```

    package com.apress.ejb.chapter10;

    import javax.inject.Inject;

    public class WineCellarClient {

    private Wine beanConstParaInjVintage;

    @Inject

    WineCellarClient(Wine vintage)

    {

    this.beanConstParaInjVintage = vintage;

    }

    }

    Listing 10-4

    WineCellarClient.java

    ```


    #### Initializer Method Parameter Injection


    CDI can also initialize a bean’s properties afterward by calling methods on the
    bean that have been annotated `@javax.inject.Inject`. A bean method with an `@javax.inject.Inject`
    annotation is called an initializer method. An initializer method must be nonabstract,
    nonstatic, and nongeneric. An initializer method can have zero or more parameters.
    If an initializer method has multiple parameters, then all of the parameters are
    valid injection points and the CDI container must be able to supply values for
    all of the parameters. It is legal for a bean class to declare multiple initializer
    methods.


    It is possible for a client application to bypass the container and directly call
    the initializer method. Again, the obvious result in such cases is that the container
    will pass no parameters to the method.


    Listing [10-5](#A311833_3_En_10_Chapter.html#Par115) shows how the `WineCellarClient`
    class can be modified to use the initializer method parameter injection instead
    of bean constructor parameter injection to achieve the same result.


    ```

    package com.apress.ejb.chapter10;

    import javax.inject.Inject;

    public class WineCellarClient {

    private Wine initParaInjVintage;

    WineCellarClient()

    {

    }

    @Inject

    public void setVintageWine(Wine vintage)

    {

    this.initParaInjVintage = vintage;

    }

    }

    Listing 10-5

    WineCellarClient.java

    ```


    #### Field Injection


    Finally, a CDI container can instantiate a class-level field by selecting an unambiguous
    implementation of the field’s interface type. A class-level field can be injected
    by annotating it with the `@Inject` annotation. An injected field must be a nonstatic,
    nonfinal field of a bean class or of any Java EE component class supporting injection.


    Listing [10-6](#A311833_3_En_10_Chapter.html#Par118) shows how field injection
    simplifies initialization of the `fieldInjVintage`.


    ```

    package com.apress.ejb.chapter10;

    import javax.inject.Inject;

    public class WineCellarClient {

    @Inject

    private Wine fieldInjVintage;

    }

    Listing 10-6

    WineCellarClient.java

    ```


    ### Dependency Resolution


    The CDI specification guarantees loosely coupled and typesafe resolution of injected
    beans. The CDI container can unambiguously select an implementation of a bean
    type (class or interface) with exactly one implementation. But it is possible
    for a bean type to have multiple implementations. For example, we can add another
    class `WhiteWine` , as shown in the Listing [10-7](#A311833_3_En_10_Chapter.html#Par120),
    that implements the interface `Wine` that we created in Listing [10-1](#A311833_3_En_10_Chapter.html#Par64).


    ```

    package com.apress.ejb.chapter10;

    public class WhiteWine implements Wine {

    public String getColor() {

    return "White";

    }

    }

    Listing 10-7

    WhiteWine.java

    ```


    After introduction of the `WhiteWine` implementation, our `WineClient,` in which
    `Wine` is injected, needs to distinguish between the two implementations of `Wine`:
    that is, `RedWine` and `WhiteWine`. The CDI container raises an unsatisfied or
    ambiguous dependency deployment time error when it is not able to isolate one
    bean class that needs to be injected at a given injection point. This ambiguous
    dependency issue can be resolved by using any one of the following three solutions:


    *   Qualifiers (for compile-time resolution)

    *   Alternatives (for deployment-time resolution)

    *   Producers (for runtime resolution)


    #### Qualifiers


    A qualifier type enables CDI components to interact in a loosely coupled way by
    providing polymorphism at compile time and dynamic binding at runtime. A qualifier
    type allows the client to specify the desired characteristics of the instance
    to be injected without having to know which concrete implementation class is being
    chosen.


    Let us try and understand qualifiers using an example. The addition of `WhiteWine`
    class in Listing [10-7](#A311833_3_En_10_Chapter.html#Par120) forced the container
    to raise an error, as the container could not decide whether to instantiate the
    `RedWine` or the `WhiteWine` implementation. We will use a qualifier to resolve
    this dependency. Listing [10-8](#A311833_3_En_10_Chapter.html#Par127) shows a
    user-defined qualifier named `Red`.


    ```

    package com.apress.ejb.chapter10;

    import static java.lang.annotation.ElementType.TYPE;

    import static java.lang.annotation.ElementType.FIELD;

    import static java.lang.annotation.ElementType.PARAMETER;

    import static java.lang.annotation.ElementType.METHOD;

    import static java.lang.annotation.RetentionPolicy.RUNTIME;

    import java.lang.annotation.Retention;

    import java.lang.annotation.Target;

    import javax.inject.Qualifier;

    @Qualifier

    @Retention(RUNTIME)

    @Target({METHOD, FIELD, PARAMETER, TYPE})

    public @interface Red {

    }

    Listing 10-8

    Red.java

    ```


    We will augment the `RedWine` class shown in Listing [10-2](#A311833_3_En_10_Chapter.html#Par66)
    with the `Red` qualifier, as shown in Listing [10-9](#A311833_3_En_10_Chapter.html#Par129).


    ```

    package com.apress.ejb.chapter10;

    import javax.enterprise.context.ApplicationScoped;

    // Instance will be created only once, will be shared

    // across the application and will be destroyed on

    // application shutdown

    @ApplicationScoped

    @Red

    public class RedWine implements Wine {

    public String getColor() {

    return "Red";

    }

    }

    Listing 10-9

    RedWine.java

    ```


    Introducing this custom qualifier allows us to resolve the ambiguous dependency
    error. `WineClient`, as coded in Listing [10-3](#A311833_3_En_10_Chapter.html#Par68),
    will now instantiate `WhiteWine,` as `WhiteWine` has the `@Default` qualifier,
    and the injection point also has the same `@Default` qualifier. Listing [10-10](#A311833_3_En_10_Chapter.html#Par131)
    shows how we can instantiate the `newWine` field with `RedWine` implementation
    by adding the `@Red` qualifier at the injection point.


    ```

    package com.apress.ejb.chapter10;

    import javax.inject.Inject;

    public class WineClient {

    // Instantiating in classic way

    // private Wine oldWine = new RedWine();

    // Instantiating via field dependency injection

    @Inject

    @Red

    private Wine newWine;

    }

    Listing 10-10

    WineClient. java

    ```


    Now that we have a basic understanding of how qualifiers help us in resolving
    ambiguity, we will look into the four types of CDI qualifiers.'
