- fmt: "# Interceptors: Callback Methods\n\nBoth enterprise beans and entities may\
    \ designate some of their methods, or methods on separate classes, to be called\
    \ when certain lifecycle events occur. For instance, a session bean may indicate\
    \ that a certain method should be called after the bean has been instantiated,\
    \ but before it has been handed off to a client. This method may initialize state\
    \ information on the bean, or look up resources using `JNDI`, or any other action\
    \ it wishes, provided that it does not require a transactional context. Such callback\
    \ methods are called interceptors, and they allow bean developers to participate\
    \ programmatically in the interaction between an enterprise bean, or an entity,\
    \ and its container. An important advantage of this pattern (also known as cross-cutting)\
    \ is that a single interceptor may be defined once and then applied to multiple\
    \ methods, or even multiple EJBs. The EJB 3.2 specification also added an option\
    \ for the lifecycle callback interceptor methods of stateful session beans to\
    \ be executed in a transaction context determined by the lifecycle callback method’s\
    \ transaction attribute.\n\n## POJO Implementation\n\nEJB 3 took great strides\
    \ to eliminate the trappings that beset enterprise bean classes and their required\
    \ interfaces in earlier EJB releases. Similar to complaints over having to define\
    \ XML metadata to specify even the most basic bean behavior, developers found\
    \ it burdensome to have to write custom interfaces to handle an enterprise bean’s\
    \ factory support, and inconvenient to require a session bean’s interfaces to\
    \ extend EJB-specific interfaces. All of these limitations were addressed in EJB\
    \ 3.\n\nHome methods are no longer mandated, although they’re still supported.\
    \ For session beans and MDBs, a default constructor replaces the no-argument `ejbCreate()`\
    \ method required by earlier EJB specs.\n\nFor entities, the `Home` interface\
    \ is replaced by an `EntityManagerFactory` instance that produces `EntityManager`\
    \ instances for a JPA persistence unit to manage entity lifecycle operations,\
    \ including query execution.\n\n## Intelligent Use of Defaults\n\nAn excellent\
    \ example of how EJB 3 simplifies the development process is its leveraging of\
    \ default behavior to provide rich functionality with no coding or declarative\
    \ metadata required. For instance, by simply marking a POJO with the `@Entity`\
    \ annotation, all of its public properties automatically become persistent fields,\
    \ and the table and column names take on derived values that match the entity\
    \ and field names. Additional annotations or XML elements are only required when\
    \ overriding the default behavior of a particular area. Only when the table name\
    \ does not match the entity name is the `@Table` annotation required. Great care\
    \ has been taken to ensure that the default values match the most common usages\
    \ so that, in the majority of use cases, explicit metadata is not required, leading\
    \ to leaner, more clutter-free code.\n\n> **Note**  \n> One consequence of relying\
    \ on default behavior is that the class does not describe its full behavior anywhere,\
    \ so you need to have a good understanding of the default behavior that is being\
    \ applied. IDEs can be useful in deriving and displaying the enterprise bean or\
    \ entity with its fully defaulted values explicitly shown.\n\n## Distributed Computing\
    \ Model\n\nEssential to any enterprise application is the ability to execute tasks\
    \ and run components in separate Java threads or processes. Through the RMI-based\
    \ remoting services, clients in an application client tier may access EJBs running\
    \ in an application server anywhere on the network. The pass-by-value behavior\
    \ of remote interface methods provides a coarse-grained model designed to reduce\
    \ network traffic between clients and servers that are loosely connected to each\
    \ other. Many applications that use EJB do not require remote access, however,\
    \ and elect to configure their EJBs for local use. This eliminates the overhead\
    \ of remote access support while continuing to offer the remaining enterprise\
    \ services.\n\n### EJB Roles\n\nThe EJB spec defines seven roles for individuals\
    \ involved in the different stages of defining an enterprise bean or entity, or\
    \ in providing services and API implementation to enterprise beans. This book\
    \ is targeted at the three roles involved in defining enterprise beans and their\
    \ associated metadata. In practice, one or more of these roles may be performed\
    \ by the same individual, and certain tasks may be performed by one role and overridden\
    \ by another; but it is useful to understand the logical partitioning of tasks\
    \ in the EJB development process. We will refer to these roles in various sections\
    \ throughout the book.\n\n#### The Enterprise Bean Provider\n\nThe Enterprise\
    \ Bean Provider, also known as the Bean Provider, has the responsibility of defining\
    \ and implementing the business logic and structure of an enterprise bean. This\
    \ includes defining the Java class, implementing service methods, specifying transactional\
    \ and security information declaratively on the bean and its methods, injection\
    \ or lookup of required resources, and anything else that can be applied to the\
    \ enterprise bean class.\n\nApplied to JPA entities, the Bean Provider defines\
    \ the persistent structure of the entity and its relationships with other entities.\
    \ The provider may define mapping and primary key–generation behavior, but this\
    \ role is generally limited to defining the logical dependencies and structure\
    \ of the entity.\n\n#### The Application Assembler\n\nThe Application Assembler\
    \ combines EJBs into EJB modules and entities into persistence archives, and then\
    \ it combines these modules together with other Java EE modules to produce an\
    \ application. This task requires resolving references to logical server resources\
    \ including references between EJBs. The Application Assembler must work with\
    \ the interfaces and metadata defined for the EJB and entity components but need\
    \ not be familiar with the implementation details.\n\n#### The Deployer\n\nThe\
    \ Deployer takes an application that has been assembled by the Application Assembler\
    \ and deploys it to a particular application server instance or cluster. The Deployer\
    \ must resolve all of the external dependencies defined by the EJB component,\
    \ mapping them to concrete resources installed in the application server environment.\
    \ In the case of entities, the Deployer may provide or override the details of\
    \ the live database objects to which the entities will map.\n\n## How This Book\
    \ Is Organized\n\nTo orient you to the structure of the remainder of this book,\
    \ here is a brief summary of each chapter. There is no requirement that you read\
    \ these chapters in order. Sample programs accompany each chapter, and they may\
    \ be run independently of one another. Topics are introduced progressively, though,\
    \ and thus if you find a reference in one chapter to a term or concept that is\
    \ not defined in that chapter, chances are that it was defined in an earlier chapter\
    \ of the book.\n\n### Chapter 1: Introduction to the EJB 3.2 Architecture & CDI\
    \ Services\n\nThis chapter opens by introducing the book and offering an orientation\
    \ to EJB. This orientation covers the EJB development framework and component\
    \ model, the core features of EJB, the history of EJB, the EJB 3 simplified development\
    \ model, and the EJB distributed computing model. The chapter concludes with a\
    \ “Getting Started” section to help you install the NetBeans IDE and GlassFish\
    \ Java EE reference implementation server required to run the many sample applications\
    \ provided with this book.\n\n### Chapter 2: EJB Session Beans\n\nChapter 2 explores\
    \ EJB’s primary service object: the session bean. Session beans are examined in\
    \ their many roles: as entity facades, as service components—both with and without\
    \ state, as singleton or timer-driven objects, and as the primary orchestrators\
    \ of transaction and security services."
  raw: '#### Interceptors: Callback Methods


    Both enterprise beans and entities may designate some of their methods, or methods
    on separate classes, to be called when certain lifecycle events occur. For instance,
    a session bean may indicate that a certain method should be called after the bean
    has been instantiated, but before it has been handed off to a client. This method
    may initialize state information on the bean, or look up resources using JNDI,
    or any other action it wishes, provided that it does not require a transactional
    context. Such callback methods are called interceptors, and they allow bean developers
    to participate programmatically in the interaction between an enterprise bean,
    or an entity, and its container. An important advantage of this pattern (also
    known as cross-cutting) is that a single interceptor may be defined once and then
    applied to multiple methods, or even multiple EJBs. The EJB 3.2 specification
    also added an option for the lifecycle callback interceptor methods of stateful
    session beans to be executed in a transaction context determined by the lifecycle
    callback method’s transaction attribute.


    #### POJO Implementation


    EJB 3 took great strides to eliminate the trappings that beset enterprise bean
    classes and their required interfaces in earlier EJB releases. Similar to complaints
    over having to define XML metadata to specify even the most basic bean behavior,
    developers found it burdensome to have to write custom interfaces to handle an
    enterprise bean’s factory support, and inconvenient to require a session bean’s
    interfaces to extend EJB-specific interfaces. All of these limitations were addressed
    in EJB 3.


    Home methods are no longer mandated, although they’re still supported. For session
    beans and MDBs, a default constructor replaces the no-argument `ejbCreate()` method
    required by earlier EJB specs.


    For entities, the `Home` interface is replaced by an `EntityManagerFactory` instance
    that produces `EntityManager` instances for a JPA persistence unit to manage entity
    lifecycle operations, including query execution.


    #### Intelligent Use of Defaults


    An excellent example of how EJB 3 simplifies the development process is its leveraging
    of default behavior to provide rich functionality with no coding or declarative
    metadata required. For instance, by simply marking a POJO with the `@Entity` annotation,
    all of its public properties automatically become persistent fields, and the table
    and column names take on derived values that match the entity and field names.
    Additional annotations or XML elements are only required when overriding the default
    behavior of a particular area. Only when the table name does not match the entity
    name is the `@Table` annotation required. Great care has been taken to ensure
    that the default values match the most common usages so that, in the majority
    of use cases, explicit metadata is not required, leading to leaner, more clutter-free
    code.


    Note


    One consequence of relying on default behavior is that the class does not describe
    its full behavior anywhere, so you need to have a good understanding of the default
    behavior that is being applied. IDEs can be useful in deriving and displaying
    the enterprise bean or entity with its fully defaulted values explicitly shown.


    ### Distributed Computing Model


    Essential to any enterprise application is the ability to execute tasks and run
    components in separate Java threads or processes. Through the RMI-based remoting
    services, clients in an application client tier may access EJBs running in an
    application server anywhere on the network. The pass-by-value behavior of remote
    interface methods provides a coarse-grained model designed to reduce network traffic
    between clients and servers that are loosely connected to each other. Many applications
    that use EJB do not require remote access, however, and elect to configure their
    EJBs for local use. This eliminates the overhead of remote access support while
    continuing to offer the remaining enterprise services.


    #### EJB Roles


    The EJB spec defines seven roles for individuals involved in the different stages
    of defining an enterprise bean or entity, or in providing services and API implementation
    to enterprise beans. This book is targeted at the three roles involved in defining
    enterprise beans and their associated metadata. In practice, one or more of these
    roles may be performed by the same individual, and certain tasks may be performed
    by one role and overridden by another; but it is useful to understand the logical
    partitioning of tasks in the EJB development process. We will refer to these roles
    in various sections throughout the book.


    ##### The Enterprise Bean Provider


    The Enterprise Bean Provider, also known as the Bean Provider, has the responsibility
    of defining and implementing the business logic and structure of an enterprise
    bean. This includes defining the Java class, implementing service methods, specifying
    transactional and security information declaratively on the bean and its methods,
    injection or lookup of required resources, and anything else that can be applied
    to the enterprise bean class.


    Applied to JPA entities, the Bean Provider defines the persistent structure of
    the entity and its relationships with other entities. The provider may define
    mapping and primary key–generation behavior, but this role is generally limited
    to defining the logical dependencies and structure of the entity.


    ##### The Application Assembler


    The Application Assembler combines EJBs into EJB modules and entities into persistence
    archives, and then it combines these modules together with other Java EE modules
    to produce an application. This task requires resolving references to logical
    server resources including references between EJBs. The Application Assembler
    must work with the interfaces and metadata defined for the EJB and entity components
    but need not be familiar with the implementation details.


    ##### The Deployer


    The Deployer takes an application that has been assembled by the Application Assembler
    and deploys it to a particular application server instance or cluster. The Deployer
    must resolve all of the external dependencies defined by the EJB component, mapping
    them to concrete resources installed in the application server environment. In
    the case of entities, the Deployer may provide or override the details of the
    live database objects to which the entities will map.


    ## How This Book Is Organized


    To orient you to the structure of the remainder of this book, here is a brief
    summary of each chapter. There is no requirement that you read these chapters
    in order. Sample programs accompany each chapter, and they may be run independently
    of one another. Topics are introduced progressively, though, and thus if you find
    a reference in one chapter to a term or concept that is not defined in that chapter,
    chances are that it was defined in an earlier chapter of the book.


    ### Chapter [1](#A311833_3_En_1_Chapter.html): Introduction to the EJB 3.2 Architecture
    & CDI Services


    This chapter opens by introducing the book and offering an orientation to EJB.
    This orientation covers the EJB development framework and component model, the
    core features of EJB, the history of EJB, the EJB 3 simplified development model,
    and the EJB distributed computing model. The chapter concludes with a “Getting
    Started” section to help you install the NetBeans IDE and GlassFish Java EE reference
    implementation server required to run the many sample applications provided with
    this book.


    ### Chapter [2](#A311833_3_En_2_Chapter.html): EJB Session Beans


    Chapter [2](#A311833_3_En_2_Chapter.html) explores EJB’s primary service object:
    the session bean. Session beans are examined in their many roles: as entity facades,
    as service components—both with and without state, as singleton or timer-driven
    objects, and as the primary orchestrators of transaction and security services.'
