    #### Testing the Any Qualifier Client


    Next, we will test the `Any` qualifier, demonstrated in Listing [10-12](#A311833_3_En_10_Chapter.html#Par137),
    which will return the list of all the implementations of the `Wine` interface.


    In addition to the `RedWine` and `WhiteWine` implementations, we have also created
    the `SparklingWine` implementation along with its `Sparkling` qualifier. Expand
    the `com.apress.ejb.chapter10.anyqualifier` package, and right-click on the `AnyWineClient`
    servlet to invoke the context menu, as shown in Figure [10-8](#A311833_3_En_10_Chapter.html#Fig8).
    Select the `Run` option to execute the servlet client.


    ![A311833_3_En_10_Fig8_HTML.jpg](A311833_3_En_10_Fig8_HTML.jpg)


    Figure 10-8


    Running the Any qualifier client


    By using the `@Any` qualifier, the container is able to determine all the implementations
    of the `Wine` interface. The result of the executed servlet is shown in Figure
    [10-9](#A311833_3_En_10_Chapter.html#Fig9).


    ![A311833_3_En_10_Fig9_HTML.jpg](A311833_3_En_10_Fig9_HTML.jpg)


    Figure 10-9


    Result from the Any qualifier client servlet


    You can try to run the client again with the following changes and observe the
    difference in the output:


    *   Create a `RoseWine` implementation along with its `Rose` qualifier in the
