  trans: '

    ### 正向生成——持久化


    在自顶向下的模型中，实体类作为数据源，数据库模式则被创建用于为实体类数据提供持久化支持。底层表结构可作为部署实体类的附带结果生成；你可以在`@Table`、`@Column`及相关注解中指定元数据，以指导部署工具生成模式结构。


    ### 逆向工程——适配


    在自底向上的方法中，数据库模式是数据源：模式是固定的，而 Java 对象（即实体类）的存在是为了将数据库对象适配到 Java 世界中。此过程通常通过 IDE
    使用 EJB 逆向工程工具实现，会为每个表生成默认的实体类，并为每个列生成默认的字段。


    ### 哪种方法适合你的项目？


    在实际开发项目中，这两种方法同样常见。你的需求将决定使用哪种工具来连接数据库与实体 Bean。你可以将这个问题视为持久化与适配之间的选择：数据库模式的存在仅仅是为了为实体
    Bean 提供持久化支持，还是你在将数据库模式适配到 Java 空间？在开始创建实体 Bean 时，请思考这个问题。


    ## 示例应用：CustomerOrderManager


    在 CustomerOrderManager 示例中，我们展示了会话 Bean 如何作为多个相互关联的 JPA 实体的外观。我们的`CustomerOrderManager`会话
    Bean 将 CRUD（创建、检索、更新、删除）操作作为服务方法暴露出来，允许客户端访问和操作`Customer`、`CustomerOrder`和`Address`实体。会话外观上的这些服务方法提供了事务、访问控制及其他企业级服务，并允许持久化框架处理
    JPA 实体与底层关系型数据库管理系统之间的接口。

    '
- fmt: "### Customer.java\n\n`Customer.java`类，如清单[3-21](#A311833_3_En_3_Chapter.html#Par203)所示，包含一对命名查询，并具有一个简单的主键。它通过`billingAddress`和`shippingAddress`字段持有与`Address`实体的两个单向`@OneToOne`关系。它还通过`customerOrders`字段暴露了一个与`CustomerOrder`的双向`@OneToMany`关系。请注意，`customerOrders`字段的属性访问器由`addCustomerOrder()`和`removeCustomerOrder()`方法补充。客户端在向`Customer`添加或移除`CustomerOrder`时，应使用这些方法，以确保所涉及的两个实体类上的关系字段都使用正确的关系信息进行更新。\n\
    \n```java\n@Entity\n@NamedQueries({\n@NamedQuery(name = \"Customer.findAll\",\n\
    query = \"select o from Customer o\"),\n@NamedQuery(name = \"Customer.findByEmail\"\
    ,\nquery = \"select o from Customer o where o.email = :email\")})\n@Table(name\
    \ = \"CH03_CUSTOMER\")\n@TableGenerator(name = \"Customer_ID_Generator\",\ntable\
    \ = \"CUSTOMER_ID_GENERATOR\",\npkColumnName = \"PRIMARY_KEY_NAME\",\npkColumnValue\
    \ = \"Customer.id\",\nvalueColumnName = \"NEXT_ID_VALUE\")\npublic class Customer\
    \ implements Serializable {\n@Id\n@Column(nullable = false)\n@GeneratedValue(strategy\
    \ = GenerationType.TABLE,\ngenerator = \"Customer_ID_Generator\")\nprivate BigDecimal\
    \ id;\n@Version\nprivate int version;\n@Column(length = 4000)\nprivate String\
    \ email;\n@OneToMany(mappedBy = \"customer\", cascade = {CascadeType.ALL})\nprivate\
    \ List customerOrders;\n@OneToOne(cascade = {CascadeType.ALL})\n@JoinColumn(name\
    \ = \"BILLING_ADDRESS\")\nprivate Address billingAddress;\n@OneToOne(cascade =\
    \ {CascadeType.ALL})\n@JoinColumn(name = \"SHIPPING_ADDRESS\")\nprivate Address\
    \ shippingAddress;\npublic BigDecimal getId() { return id; }\npublic void setId(BigDecimal\
    \ id) { this.id = id; }\npublic int getVersion() { return version; }\npublic void\
    \ setVersion(int version) { this.version = version; }\npublic String getEmail()\
    \ { return email; }\npublic void setEmail(String email) { this.email = email;\
    \ }\npublic List getCustomerOrders() { return customerOrders; }\npublic void setCustomerOrders(List\
    \ customerOrders) {\nthis.customerOrders = customerOrders;\n}\npublic CustomerOrder\
    \ addCustomerOrder(CustomerOrder customerOrder) {\nif (customerOrders == null)\
    \ {\ncustomerOrders = new ArrayList();\n}\ncustomerOrders.add(customerOrder);\n\
    customerOrder.setCustomer(this);\nreturn customerOrder;\n}\npublic CustomerOrder\
    \ removeCustomerOrder(CustomerOrder customerOrder) {\ngetCustomerOrders().remove(customerOrder);\n\
    customerOrder.setCustomer(null);\nreturn customerOrder;\n}\npublic Address getBillingAddress()\
    \ { return billingAddress; }\npublic void setBillingAddress(Address billingAddress)\
    \ {\nthis.billingAddress = billingAddress;\n}\npublic Address getShippingAddress()\
    \ { return shippingAddress; }\npublic void setShippingAddress(Address shippingAddress)\
    \ {\nthis.shippingAddress = shippingAddress;\n}\n}\n```\n*清单 3-21 Customer.java*\n\
    \n`CustomerOrder`实体的一个实例，如清单[3-22](#A311833_3_En_3_Chapter.html#Par205)所示，代表客户下的订单。在此示例中，为了简洁起见，我们省略了相关的`OrderItem`实体。完整的Apress\
    \ Wines Online应用程序（其中还包含许多其他实体）将在第[7](#A311833_3_En_7_Chapter.html)章中探讨。\n\n```java\n\
    @Entity\n@NamedQueries({\n@NamedQuery(name = \"CustomerOrder.findAll\",\nquery\
    \ = \"select o from CustomerOrder o\")})\n@Table(name = \"CH03_CUSTOMER_ORDER\"\
    )\n@TableGenerator(name = \"CustomerOrder_ID_Generator\",\ntable = \"CUSTOMERORDER_ID_GENERATOR\"\
    ,\npkColumnName = \"PRIMARY_KEY_NAME\", pkColumnValue = \"CustomerOrder.id\",\n\
    valueColumnName = \"NEXT_ID_VALUE\")\npublic class CustomerOrder implements Serializable\
    \ {\n@Id\n@Column(nullable = false)\n@GeneratedValue(strategy = GenerationType.TABLE,\n\
    generator = \"CustomerOrder_ID_Generator\")\nprivate BigDecimal id;\n@Version\n\
    private int version;\n@Temporal(TemporalType.DATE)\n@Column(name = \"CREATION_DATE\"\
    )\nprivate Date creationDate;\nprivate String status;\n@ManyToOne\n@JoinColumn(name\
    \ = \"CUSTOMER_ID\")\nprivate Customer customer;\npublic Date getCreationDate()\
    \ { return creationDate; }\npublic void setCreationDate(Date creationDate) {\n\
    this.creationDate = creationDate;\n}\npublic BigDecimal getId() { return id; }\n\
    public void setId(BigDecimal id) { this.id = id; }\npublic String getStatus()\
    \ { return status; }\npublic void setStatus(String status) { this.status = status;\
    \ }\npublic int getVersion() { return version; }\npublic void setVersion(int version)\
    \ { this.version = version; }\npublic Customer getCustomer() { return customer;\
    \ }\npublic void setCustomer(Customer customer) { this.customer = customer; }\n\
    }\n```\n*清单 3-22 CustomerOrder.java*\n\n此示例中的最后一个实体是`Address`，如清单[3-23](#A311833_3_En_3_Chapter.html#Par207)所示。`Address`实体被`Customer`实体引用，但本身不持有任何关系字段，这使得来自`Customer`的引用是单向的。\n\
    \n```java\n@Entity\n@NamedQueries({\n@NamedQuery(name = \"Address.findAll\",\n\
    query = \"select o from Address o\")})\n@Table(name = \"CH03_ADDRESS\")\n@TableGenerator(name\
    \ = \"Address_ID_Generator\",\ntable = \"CH03_ADDRESS_ID_GEN\",\npkColumnName\
    \ = \"PRIMARY_KEY_NAME\",\npkColumnValue = \"Address.id\",\nvalueColumnName =\
    \ \"NEXT_ID_VALUE\")\npublic class Address implements Serializable {\n@Column(length\
    \ = 4000)\nprivate String city;\n@Id\n@Column(nullable = false)\n@GeneratedValue(strategy\
    \ = GenerationType.TABLE,\ngenerator = \"Address_ID_Generator\")\nprivate BigDecimal\
    \ id;\nprivate String state;\n@Column(length = 4000)\nprivate String street1;\n\
    @Column(length = 4000)\nprivate String street2;\n@Version\nprivate Integer version;\n\
    @Column(name = \"ZIP_CODE\")\nprivate int zipCode;\npublic String getCity() {\
    \ return city; }\npublic void setCity(String city) { this.city = city; }\npublic\
    \ BigDecimal getId() { return id; }\npublic void setId(BigDecimal id) { this.id\
    \ = id; }\npublic String getState() { return state; }\npublic void setState(String\
    \ state) { this.state = state; }\npublic String getStreet1() { return street1;\
    \ }\npublic void setStreet1(String street1) { this.street1 = street1; }\npublic\
    \ String getStreet2() { return street2; }\npublic void setStreet2(String street2)\
    \ { this.street2 = street2; }\npublic Integer getVersion() { return version; }\n\
    public void setVersion(Integer version) { this.version = version; }\npublic int\
    \ getZipCode() { return zipCode; }\npublic void setZipCode(int zipCode) { this.zipCode\
    \ = zipCode; }\n}\n```\n*清单 3-23 Address.java*\n\n`CustomerOrderManager`无状态会话bean作为前面显示的三个实体的外观，并提供了对`EntityManager`上`persist()`、`merge()`和`remove()`方法的接口。它如清单[3-24](#A311833_3_En_3_Chapter.html#Par209)所示。\n\
    \n```java\n@Stateless\npublic class CustomerOrderManager {\n@PersistenceContext(unitName\
    \ = \"Chapter03PersistenceUnit\")\nprivate EntityManager em;\npublic CustomerOrderManager()\
    \ {\n}\npublic  T persistEntity(T entity) {\nem.persist(entity);\nreturn entity;\n\
    }\npublic  T mergeEntity(T entity) {\nreturn em.merge(entity);\n}\npublic void\
    \ removeCustomer(Customer customer) {\ncustomer = em.find(Customer.class, customer.getId());\n\
    em.remove(customer);\n}\n/** select o from Customer o */\npublic List getCustomerFindAll()\
    \ {\nreturn em.createNamedQuery(\"Customer.findAll\", Customer.class).getResultList();\n\
    }\npublic void removeAddress(Address address) {\naddress = em.find(Address.class,\
    \ address.getId());\nem.remove(address);\n}\n/** select o from Address o */\n\
    public List getAddressFindAll() {\nreturn em.createNamedQuery(\"Address.findAll\"\
    , Address.class).getResultList();\n}\npublic void removeCustomerOrder(CustomerOrder\
    \ customerOrder) {\ncustomerOrder = em.find(CustomerOrder.class, customerOrder.getId());\n\
    em.remove(customerOrder);\n}\n/** select o from CustomerOrder o */\npublic List\
    \ getCustomerOrderFindAll() {\nreturn em\n.createNamedQuery(\"CustomerOrder.findAll\"\
    , CustomerOrder.class)\n.getResultList();\n}\n/** select o from CustomerOrder\
    \ o where o.email = :email */\npublic List getCustomerOrderFindByEmail(String\
    \ email) {\nreturn em\n.createNamedQuery(\"CustomerOrder.findByEmail\", CustomerOrder.class)\n\
    .setParameter(\"email\", email)\n.getResultList();\n}\n}\n```\n*清单 3-24 CustomerOrderManager.java*\n\
    \n要部署此示例，您需要一个`persistence.xml`文件，该文件声明一个可由会话bean引用的命名持久化单元（请参见清单[3-25](#A311833_3_En_3_Chapter.html#Par211)）。\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<persistence xmlns=\"http://java.sun.com/xml/ns/persistence\"\
    \n             xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n     \
    \        xsi:schemaLocation=\"http://java.sun.com/xml/ns/persistence http://java.sun.com/xml/ns/persistence/persistence_1_0.xsd\"\
    \n             version=\"1.0\">\n    <persistence-unit name=\"Chapter03PersistenceUnit\"\
    \ transaction-type=\"JTA\">\n        <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
    \        <jta-data-source>jdbc/wineapp</jta-data-source>\n        <class>com.apress.ejb.chapter03.entities.Address</class>\n\
    \        <class>com.apress.ejb.chapter03.entities.CustomerOrder</class>\n    \
    \    <class>com.apress.ejb.chapter03.entities.Customer</class>\n        <properties>\n\
    \            <property name=\"eclipselink.ddl-generation\" value=\"create-tables\"\
    />\n        </properties>\n    </persistence-unit>\n</persistence>\n```\n*清单 3-25\
    \ persistence.xml*"
  raw: '### Customer.java


    The `Customer.java` class, shown in Listing [3-21](#A311833_3_En_3_Chapter.html#Par203),
    hosts a pair of named queries and has a simple primary key. It holds two unidirectional
    `@OneToOne` relationships with the `Address` entity implemented through the `billingAddress`
    and `shippingAddress` fields. It also has a bidirectional `@OneToMany` relationship
    with `CustomerOrder`, exposed through the `customerOrders` field. Note that the
    property accessors for the `customerOrders` field are complemented by `addCustomerOrder()`
    and `removeCustomerOrder()` methods. These methods should be used by clients when
    adding or removing a `CustomerOrder` from a `Customer` to ensure that the relationship
    fields on both entity classes involved are properly updated with the correct relationship
    information.


    ```

    @Entity

    @NamedQueries({

    @NamedQuery(name = "Customer.findAll",

    query = "select o from Customer o"),

    @NamedQuery(name = "Customer.findByEmail",

    query = "select o from Customer o where o.email = :email")})

    @Table(name = "CH03_CUSTOMER")

    @TableGenerator(name = "Customer_ID_Generator",

    table = "CUSTOMER_ID_GENERATOR",

    pkColumnName = "PRIMARY_KEY_NAME",

    pkColumnValue = "Customer.id",

    valueColumnName = "NEXT_ID_VALUE")

    public class Customer implements Serializable {

    @Id

    @Column(nullable = false)

    @GeneratedValue(strategy = GenerationType.TABLE,

    generator = "Customer_ID_Generator")

    private BigDecimal id;

    @Version

    private int version;

    @Column(length = 4000)

    private String email;

    @OneToMany(mappedBy = "customer", cascade = {CascadeType.ALL})

    private List customerOrders;

    @OneToOne(cascade = {CascadeType.ALL})

    @JoinColumn(name = "BILLING_ADDRESS")

    private Address billingAddress;

    @OneToOne(cascade = {CascadeType.ALL})

    @JoinColumn(name = "SHIPPING_ADDRESS")

    private Address shippingAddress;

    public BigDecimal getId() { return id; }

    public void setId(BigDecimal id) { this.id = id; }

    public int getVersion() { return version; }

    public void setVersion(int version) { this.version = version; }

    public String getEmail() { return email; }

    public void setEmail(String email) { this.email = email; }

    public List getCustomerOrders() { return customerOrders; }

    public void setCustomerOrders(List customerOrders) {

    this.customerOrders = customerOrders;

    }

    public CustomerOrder addCustomerOrder(CustomerOrder customerOrder) {

    if (customerOrders == null) {

    customerOrders = new ArrayList();

    }

    customerOrders.add(customerOrder);

    customerOrder.setCustomer(this);

    return customerOrder;

    }

    public CustomerOrder removeCustomerOrder(CustomerOrder customerOrder) {

    getCustomerOrders().remove(customerOrder);

    customerOrder.setCustomer(null);

    return customerOrder;

    }

    public Address getBillingAddress() { return billingAddress; }

    public void setBillingAddress(Address billingAddress) {

    this.billingAddress = billingAddress;

    }

    public Address getShippingAddress() { return shippingAddress; }

    public void setShippingAddress(Address shippingAddress) {

    this.shippingAddress = shippingAddress;

    }

    }

    Listing 3-21

    Customer.java

    ```


    An instance of the `CustomerOrder` entity, shown in Listing [3-22](#A311833_3_En_3_Chapter.html#Par205),
    represents an order placed by a customer. For this example, we have eliminated
    the related `OrderItem` entities for brevity. The full-blown Apress Wines Online
    application, which includes a number of other entities as well, is explored in
    Chapter [7](#A311833_3_En_7_Chapter.html).


    ```

    @Entity

    @NamedQueries({

    @NamedQuery(name = "CustomerOrder.findAll",

    query = "select o from CustomerOrder o")})

    @Table(name = "CH03_CUSTOMER_ORDER")

    @TableGenerator(name = "CustomerOrder_ID_Generator",

    table = "CUSTOMERORDER_ID_GENERATOR",

    pkColumnName = "PRIMARY_KEY_NAME", pkColumnValue = "CustomerOrder.id",

    valueColumnName = "NEXT_ID_VALUE")

    public class CustomerOrder implements Serializable {

    @Id

    @Column(nullable = false)

    @GeneratedValue(strategy = GenerationType.TABLE,

    generator = "CustomerOrder_ID_Generator")

    private BigDecimal id;

    @Version

    private int version;

    @Temporal(TemporalType.DATE)

    @Column(name = "CREATION_DATE")

    private Date creationDate;

    private String status;

    @ManyToOne

    @JoinColumn(name = "CUSTOMER_ID")

    private Customer customer;

    public Date getCreationDate() { return creationDate; }

    public void setCreationDate(Date creationDate) {

    this.creationDate = creationDate;

    }

    public BigDecimal getId() { return id; }

    public void setId(BigDecimal id) { this.id = id; }

    public String getStatus() { return status; }

    public void setStatus(String status) { this.status = status; }

    public int getVersion() { return version; }

    public void setVersion(int version) { this.version = version; }

    public Customer getCustomer() { return customer; }

    public void setCustomer(Customer customer) { this.customer = customer; }

    }

    Listing 3-22

    CustomerOrder.java

    ```


    The final entity in this example is `Address` , shown in Listing [3-23](#A311833_3_En_3_Chapter.html#Par207).
    The `Address` entity is referenced by the `Customer` entity but holds no relationship
    field of its own, making the references from `Customer` unidirectional.


    ```

    @Entity

    @NamedQueries({

    @NamedQuery(name = "Address.findAll",

    query = "select o from Address o")})

    @Table(name = "CH03_ADDRESS")

    @TableGenerator(name = "Address_ID_Generator",

    table = "CH03_ADDRESS_ID_GEN",

    pkColumnName = "PRIMARY_KEY_NAME",

    pkColumnValue = "Address.id",

    valueColumnName = "NEXT_ID_VALUE")

    public class Address implements Serializable {

    @Column(length = 4000)

    private String city;

    @Id

    @Column(nullable = false)

    @GeneratedValue(strategy = GenerationType.TABLE,

    generator = "Address_ID_Generator")

    private BigDecimal id;

    private String state;

    @Column(length = 4000)

    private String street1;

    @Column(length = 4000)

    private String street2;

    @Version

    private Integer version;

    @Column(name = "ZIP_CODE")

    private int zipCode;

    public String getCity() { return city; }

    public void setCity(String city) { this.city = city; }

    public BigDecimal getId() { return id; }

    public void setId(BigDecimal id) { this.id = id; }

    public String getState() { return state; }

    public void setState(String state) { this.state = state; }

    public String getStreet1() { return street1; }

