    ##### @Default


    当一个 Bean 或注入点没有显式定义限定符时，CDI 容器会假定其限定符为 `@javax.enterprise.inject.Default`。如果 CDI
    Bean 只有一个实现，那么 CDI 容器可以轻松选择该实现进行注入，因为不存在歧义。`@Default` 是一个内置限定符，它告知 CDI 容器：当未指定其他限定符（除了
    @Named，见下文）时，注入单个默认的 Bean 实现。清单 10-7 中的 `WhiteWine` 类具有 `@Default` 限定符，可以按清单 10-11
    所示编写，其行为不会发生任何变化。


    ```

    package com.apress.ejb.chapter10;

    import javax.enterprise.inject.Default;

    @Default

    public class WhiteWine implements Wine {

    public String getColor() {

    return "White";

    }

    }

    清单 10-11

    WhiteWine.java

    ```


    ##### @Any


    与 `@Default` 限定符一样，所有 Bean 都隐式具有 `@Any` 限定符。我们可以向 `WhiteWine` 类添加 `@javax.enterprise.inject.Any`
    注解，如清单 10-11 所示，与 `@Default` 共存，其行为不会发生任何变化。在注入点上使用 `@Any` 限定符，对于遍历某个 Bean 类型的所有实现非常有用。


    清单 10-12 展示了如何使用 `@Any` 限定符来遍历 `Wine` 的所有实现。


    ```

    package com.apress.ejb.chapter10;

    import javax.enterprise.inject.Any;

    import javax.enterprise.inject.Instance;

    import javax.inject.Inject;

    public class AllWinesClient {

    @Inject

    @Any

    private Instance allWines;

    private void printAllWineColors(){

    for (Wine wine : allWines){

    System.out.println(wine.getColor());

    }

    }

    }

    清单 10-12

    AllWinesClient.java

    ```


    ##### @Named


    `@Named` 内置限定符用于那些需要通过统一表达式语言（EL）对 Web 层进行访问的 Bean。默认情况下，使用首字母小写的 Bean 名称来访问该
    Bean。也可以将非默认名称作为参数传递给 `@Named` 限定符。


    ##### @New


    `@New` 限定符会将 Bean 的实例与其声明的作用域解除关联。应用程序可以通过使用 `@New` 限定符来获取不受声明作用域约束的 Bean 实例。`@New`
    限定符强制容器创建一个新的 Bean 实例，该实例不受指定的 CDI 上下文生命周期的约束。


    例如，如清单 10-10 所示，`newWine` 的实例将是应用程序作用域的，因为它使用了 `@Red` 注解进行限定，并且 `RedWine` Bean
    是应用程序作用域的。如果我们更新客户端以包含 `@New` 注解，如清单 10-13 所示，那么 `newWine` 实例将是依赖作用域的——即采用其普通
    Java 上下文的生命周期——而不再是应用程序作用域。


    ```

    package com.apress.ejb.chapter10;

    import javax.enterprise.inject.New;

    import javax.inject.Inject;

    public class WineClient {

    // 以经典方式实例化

    // private Wine oldWine = new RedWine();

    // 通过字段依赖注入实例化

    @Inject

    @Red

    @New

    private Wine newWine;

    }

    清单 10-13

    WineClient.java

    ```


    用户定义的限定符可以使用 `@Qualifier` 注解创建，如清单 10-8 所示。


    ### 备选方案


    备选方案通过在部署时提供多态性，使 CDI 组件能够以松散耦合的方式进行交互。备选 Bean 通过在 Bean 类上添加 `@Alternative` 注解来声明。如果备选
    Bean 需要可用于查找、注入或 EL 解析，则必须在 `beans.xml` 文件中显式声明。当注入点存在歧义依赖时，容器会尝试通过查找可注入的 Bean
    中的可用备选方案来解决歧义。


    备选方案使用 `beans.xml` 中提供的信息来选择需要实例化的实现。由于选择实现的责任从 Java 代码转移到了部署描述符中，因此如果我们决定选择不同的实现，则无需重新编译
    Java 代码。


    要使用备选方案在部署时解决依赖关系，请将 `@javax.enterprise.inject.Alternative` 注解分别添加到清单 10-2 和清单
    10-7 中提到的 `RedWine` 和 `WhiteWine` 实现中。然后，使用应该被实例化的实现类更新 `beans.xml`，如清单 10-14
    所示。在这种情况下，CDI 容器将实例化 `RedWine` 类。如果我们稍后决定实例化 `WhiteWine` 类，则无需重新编译客户端。我们只需要相应地更新
    `beans.xml` 描述符即可。如果在部署时 `beans.xml` 包含多个实现类或包含无法解析的类名，容器会自动检测到该问题并将其视为错误。


    ```


    com.apress.ejb.chapter10.RedWine


    清单 10-14

    beans.xml

    ```

