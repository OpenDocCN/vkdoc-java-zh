    \ to `EJBs` without the overhead of some of the more resource-intensive features\
    \ required by a full `EJB Container`;\n- `Embeddable EJB Container`: An implementation\
    \ of `EJB Lite` that runs in a pure Java SE environment instead of a Java EE application\
    \ server, and which provides a lightweight environment for testing `EJBs` through\
    \ `JUnit`.\n\nWhile examining a `JUnit` test class that was written to test `EJB`\
    \ facades over a `JPA` persistence unit, we dissected the configuration requirements\
    \ when running tests in an `Embeddable EJB Container`.\n\nFinally, we walked through\
    \ the steps for building and executing our `JUnit` tests in `NetBeans` against\
    \ the `GlassFish` implementation of an `Embeddable EJB Server`. The tests were\
    \ preconfigured to fail, and we walked through the process of examining and uncovering\
    \ the causes of the failures, using the debugger to assist us in arriving at their\
    \ solutions.\n\nWe closed the chapter with an important takeaway about exercising\
