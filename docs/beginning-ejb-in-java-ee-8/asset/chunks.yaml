    \ the TTR.\n\n![A311833_3_En_9_Fig13_HTML.jpg](A311833_3_En_9_Fig13_HTML.jpg)\n\
    \nFigure 9-13\n\nTTR comparison\n\n![A311833_3_En_9_Fig12_HTML.jpg](A311833_3_En_9_Fig12_HTML.jpg)\n\
    \nFigure 9-12\n\nAART comparison\n\nIn Figure [9-12](#A311833_3_En_9_Chapter.html#Fig12),\
    \ the Aggregate Average Response Times (AART) are pretty much the same, so we\
