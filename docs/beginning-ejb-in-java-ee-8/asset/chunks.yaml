    ### 异常处理


    EJB 规范概述了两种类型的异常：


    - 应用程序异常

    - 系统异常


    应用程序异常是与业务逻辑执行相关的异常，客户端应处理这些异常。例如，如果客户端应用程序传递了无效参数（如错误的信用卡号），则可能引发应用程序异常。


    另一方面，系统异常是由系统级故障引起的，例如 Java 命名和目录接口（JNDI）错误或无法获取数据库连接。系统异常必须是`java.rmi.RemoteException`的子类，或者是非应用程序异常的`java.lang.RuntimeException`的子类。


    从 EJB 应用程序的角度来看，应用程序异常是通过编写继承`java.lang.Exception`类的特定于应用程序的异常类来完成的。


    对于系统异常，应用程序会捕获特定异常（例如由 JNDI 故障导致的`NamingException`），并抛出`EJBException`。在本章中，示例并未使用任何资源，但在后续章节中有更多关于系统异常的示例。


    ## 单例会话 Bean


    单例会话 Bean 在 EJB 3.1 中引入，是一个每个应用程序仅实例化一次的会话 Bean 组件。对于一个应用程序，只能存在一个单例会话 Bean 实例。一旦实例化，单例会话
    Bean 将在应用程序的整个生命周期内存在。单例会话 Bean 在客户端调用之间保持其状态，但在容器关闭或崩溃后无法保存该状态。与无状态和有状态会话 Bean
    类似，单例会话 Bean 由一个 Bean 类以及可选的一个或多个业务接口组成。


    ### Bean 类


    单例会话 Bean 类是任何带有类级别注解`@Singleton`的标准 Java 类。如果使用部署描述符代替注解，则应将 Bean 类标记为单例会话 Bean。如果同时使用注解和部署描述符（混合模式），则当类中指定了任何其他类级别或成员级别注解时，必须指定`@Singleton`注解。


    注意


    单例可以在首次调用时初始化，也可以在部署时使用`@Startup`注解进行初始化。


    为了说明单例会话 Bean，我们将创建一个`ShopperCount`会话 Bean，用于跟踪登录我们购物网站的用户数量。清单 [2-17](#A311833_3_En_2_Chapter.html#Par172)
    展示了`ShopperCount`会话 Bean 的定义。


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    @Singleton (name = "ShopperCount")

    @Startup

    public class ShopperCountBean {

    private int shopperCounter;

    // Increment number of shopper counter

    public void incrementShopperCount() {

    shopperCounter++;

    }

    // Return number of shoppers

    public int getShopperCount() {

    return shopperCounter;

    }

    }

    Listing 2-17

    ShopperCountBean.java

    ```


    单例会话 Bean 由 EJB 容器决定何时实例化。但是，你可以使用`@Startup`注解 Bean 类，以指示容器必须在应用程序启动序列期间初始化该单例
    Bean。


    当应用程序中使用多个单例会话 Bean 时，应用程序可能要求它们按特定顺序初始化。`@DependsOn`注解声明了单例会话 Bean 的启动依赖关系。清单
    [2-18](#A311833_3_En_2_Chapter.html#Par175) 展示了依赖于`ShopperCount`会话 Bean 的`LogShopperCount`会话
    Bean 的定义。


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    import javax.ejb.DependsOn;

    import java.util.logging.Logger;

    @Singleton

    @Startup

    @DependsOn("ShopperCount")

    public class LogShopperCount {

    private final Logger log = Logger.getLogger("LogShopperCount.class");

    public void logShopperCount() {

    // Log shopper count

    }

    }

    Listing 2-18

    LogShopperCount.java

    ```


    与无状态和有状态会话 Bean 不同，单例会话 Bean 不得实现`javax.ejb.SessionSynchronization`接口或使用会话同步注解。


    ### 业务接口


    单例会话 Bean 的业务接口与无状态和有状态会话 Bean 的接口类似，并且使用`@Local`和`@Remote`注解以相同方式进行注解。单例会话 Bean
    支持无接口本地视图，这使得对于本地视图而言，业务接口的声明是可选的。


    ### 业务方法


    单例会话 Bean 中的业务方法与无状态和有状态会话 Bean 中的方法类似。我们将通过添加一个重置计数器的业务方法来增强`ShopperCount` Bean。


    清单 [2-19](#A311833_3_En_2_Chapter.html#Par180) 展示了实现业务方法的`ShopperCount` Bean。


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    @Singleton(name = "ShopperCount")

    @Startup

    public class ShopperCountBean {

    private int shopperCounter = 0;

    // Increment number of shopper counter

    public void incrementShopperCount() {

    shopperCounter++;

    }

    // Return number of shoppers

    public int getShopperCount() {

    return shopperCounter;

    }

    // Reset counter

    public void resetCounter() {

    shopperCounter = 0;

    }

    }

    Listing 2-19

    ShopperCountBean.java

