    ### 示例：注解实例变量


    清单 3-4 中的代码片段演示了实例变量注解，并展示了验证和副作用代码。此示例同样可在本章的源代码区域中找到，其中实体提供者将客户端接口收窄，仅暴露 `get`/`setZipCode()`
    方法，但向持久化提供者同时指定了 `zipCodeInternal` 和 `zipCode` 属性。在实例变量上放置注解，可以在实体的客户端 API 与其持久化端接口之间实现清晰的分离。


    ```

    @Entity

    public class Address implements Serializable {

    @Id

    private long addressId;

    @Column(name = "ZIP")

    private int zipCodeInternal;

    @Transient

    private String zipCode;

    public long getAddressId() { return addressId; }

    public void setAddressId(long addressId) { this.addressId = addressId; }

    public String getZipCode() {

    if (zipCode == null && zipCodeInternal > 0) {

    zipCode = convertToStr(zipCodeInternal);

    }

    return zipCode;

    }

    public void setZipCode(String zipCode) throws IllegalArgumentException {

    //  验证 zipcode 字符串，确保它能干净地缩减为

    //  5 位或 9 位整数，并将其赋值给内部持久化

    //  的 ''zipCodeInternal'' 类字段

    //  . . . . . .

    this.zipCode = zipCode;

    zipCodeInternal = convertToInt(zipCode);

    }

    private int convertToInt(String zipCode) {

    return new Integer(zipCode).intValue();

    }

    private String convertToStr(int zipCode) {

    return new Integer(zipCode).toString();

    }

    }

    清单 3-4

    使用实例变量注解的实体

    ```


    `get`/`setZipCode()` 方法允许实体将内部数据惰性地转换为对客户端友好的 `String` 表示形式，但仅在请求时进行。对于 `zipCodeInternal`
    实例变量，甚至没有指定任何属性访问器。


    #### @Transient 注解


    你可能不希望让实体类的所有字段或属性都持久化。派生字段或瞬态字段可以注解为 `@Transient`，以指示持久化框架应忽略它们。`zipCode` 实例变量被标记为
    `@Transient`，表示持久化提供者不应管理它。此实例变量仅用于将内部的 `int` 值适配为对客户端友好的派生 `String` 值。


    ### 示例：注解属性访问器


    清单 3-5 演示了实体开发者在注解实体的属性访问器时，如何使用副作用代码。


    ```

    @Entity

    public class Address implements Serializable {

    private BigDecimal addressId;

    private int zipCode;

    private String city;

    @Id

    public BigDecimal getAddressId() { return addressId; }

    public void setAddressId(BigDecimal addressId) { this.addressId = addressId; }

    public int getZipCode() { return zipCode; }

    public void setZipCode(int zipCode) {

    if (zipCode != this.zipCode)

    {

    city = null; // 强制 city 被惰性重新派生

    this.zipCode = zipCode;

    }

    }

    public String getCity() {

    //  如果可用，从 zipcode 属性派生 city

    if (city == null && zipCode > 0) {

    city = deriveCityFromZip();

    }

    return city;

    }

    public void setCity(String city) {

    this.city = city;

    }

    private String deriveCityFromZip() {

    /* 此处为实现代码. . . */

    return null;

    }

    }

    清单 3-5

    使用属性访问器注解的实体

    ```


    将 `@Id` 注解放在 `getAddressId()` 属性访问器上，可以消除访问策略的歧义，指示持久化提供者应使用属性访问器。强制持久化提供者通过属性访问器分配数据，使得实体有机会在分配新邮政编码时重置
    `city` 值。此外，知道 `city` 字段将通过其 getter 方法由持久化管理器获取，允许实体仅在通过 `getCity()` 访问器请求时才惰性计算其值。如果该实体的使用涉及在实体持久化（或合并）到数据库之前多次调用
    `setZipCode()`，那么将 `city` 值的派生推迟到实际请求时才进行，效率更高。如果此实体使用实例变量访问，则每次分配 `zipCode` 时都需要急切地更新
    `city` 字段，因为随时可能发出将实体更改合并到数据库的请求。然而，如前所述，使用实体生命周期回调方法可以避免急切派生此值的开销。


    #### 访问类型总结


    JPA 提供了两种模型，供持久化提供者访问实体上的字段数据：直接通过实例变量，或间接通过属性访问器。在一般情况下，我们发现注解实体的实例变量比注解其属性访问器更可取。你很少需要验证来自持久化存储的数据，并且
    setter 方法中的任何副作用代码通常应惰性执行，而不是在实体实例化时急切执行。此外，字段级注解允许你将通过该字段的 get/set 方法暴露的公共属性类型与底层列表示解耦。例如，你可能希望通过
    `getZipcode()/setZipcode()` 方法将 `zipCode` 属性暴露为 `String`，但在内部将其转换为整数，使用 `Integer`
    类型的字段，以便持久化到数据库中的 `INTEGER` 列。最后，使用实体生命周期回调方法提供了在实体数据加载后和保存前进行额外初始化或准备的机会。


    ### 声明主键


    实体必须声明其主键。主键用于在实体类型的所有实例中唯一标识一个实体实例。主键可以是简单的，由基本 Java 类的单个字段表示，例如 `String` 或 `Long`，如之前的
    `Customer` 示例（清单 3-2）所示。或者，主键也可以是复杂的，由包含多个基本字段或属性的复合类表示。


    实体表上由主键字段映射的底层列，可能受数据库主键约束的正式约束，但这并非必需。然而，要求任何实体实例的主键列值在实体的所有实例中解析为唯一值。数据库约束有助于强制执行此要求，在缺乏约束的情况下，应小心确保应用程序分配唯一值。

    '
- fmt: '### Simple Primary Key


    A simple primary key is declared by annotating a single basic-type field on the
    entity class with the `@Id` annotation (see Listing [3-6](#A311833_3_En_3_Chapter.html#Par65)).
    A basic-type field is a basic Java type (a list of basic types is shown in Table
    [3-2](#A311833_3_En_3_Chapter.html#Tab2)).


    ```java

    @Entity

    public class Customer implements Serializable {

    @Id

    private Integer id;

    private String name;

    public Customer() {}

    public Customer(Integer id) { this.id = id; }

    public Integer getId() { return id; }

    public void setId(Integer id) { this.id = id; }

    public String getName() { return name; }

    public void setName(String name) { this.name = name; }

    }

    ```


    Note that we could eliminate the usefulness of an alternate constructor in our
    entity class by using a database sequence to populate the PK value automatically.
    Listing [3-7](#A311833_3_En_3_Chapter.html#Par67) shows how this might look, using
    an ID value generator provided by JPA.


    ```java

    @Entity

    @SequenceGenerator(name = " CustomerSequence",

    sequenceName = " CUSTOMER_SEQ",

    initialValue = 100, allocationSize = 20)

    public class Customer implements Serializable {

    @Id

    @GeneratedValue(strategy = GenerationType.SEQUENCE,

    generator = " CustomerSequence")

    private Integer id;

    private String name;

    public Integer getId() { return id; }

    public void setId(Integer id) { this.id = id; }

    public String getName() { return name; }

    public void setName(String name) { this.name = name;}

    }

    ```


    #### The `@GeneratedValue` Annotation


    The `@GeneratedValue` annotation tells the persistence framework to auto-populate
    this column with the specified sequence generator, which must be defined on one
    of the entities in your persistence archive. (It is defined directly on the `Customer`
    entity.) A `@SequenceGenerator` annotation defines a sharable sequence generator,
    which can either define a new framework-generated sequence or refer to an existing
    sequence in your database. ID generators will be explored more fully in Chapter
    [4](#A311833_3_En_4_Chapter.html).


    ### Composite Primary Key


    If an entity’s primary key maps to multiple database columns, it uses a complex,
    or composite, primary key. This may be represented in one of two ways on the entity
    class. The entity may declare each field in the composite key directly on the
    entity class (annotating each one with `@Id`), and specify a composite key class
    that provides these exact same fields in an `@IdClass` annotation. Alternatively,
    the entity may designate a single, complex field to represent its primary key
    by annotating that field with `@EmbeddedId`. The class type of the `@EmbeddedId`
    field is the entity’s composite key class. This composite key class is annotated
    `@Embeddable` and must specify the mapping details for each of its fields. These
    fields will end up mapping to the base table on the entity. With either approach,
    the composite primary key class must override the `hashCode()` and `equals(Object
    obj)` methods on `java.lang.Object`.


    Listing [3-8](#A311833_3_En_3_Chapter.html#Par71) shows how these options look.


    ```java

    @Entity

    @IdClass(CustomerPK.class)

    public class Customer implements Serializable {

    @Id

    private Integer customerId;

    @Id

    private String name;

    public Integer getCustomerId() { return customerId; }

    public void setCustomerId(Integer customerId) { this.customerId = customerId;
    }

    public void setName(String name) { this.name = name; }

    public String getName() { return name; }

    }

    ```


    #### The `@IdClass` Annotation


    The `@IdClass` identifies an ordinary POJO (such as the example shown in Listing
    [3-9](#A311833_3_En_3_Chapter.html#Par73)) that does not require any metadata.
    Any mapping details required for the primary key fields are specified on the fields
    on the entity.


    ```java

    public class CustomerPK implements Serializable {

    private Integer id;

    private String name;

    public void setId(Integer id) { this.id = id; }

    public Integer getId() { return id; }

    public void setName(String name) { this.name = name; }

    public String getName() { return name; }

    @Override

    public int hashCode() { return 0; /* Implementation here */ }

    @Override

    public boolean equals(Object obj) { return false; /* Implementation here */ }

    }

    ```


    The composite primary key class must conform to the access type (annotated instance
    variables vs. property accessors) of the entity, and all its fields or properties
    must have matching fields or properties on the entity class. The corresponding
    fields on the entity must be annotated `@Id`.


    #### The `@EmbeddedId` Annotation


    Alternatively, the entity may designate one of its fields or properties to be
    its composite primary key by annotating it `@EmbeddedId` (see Listing [3-10](#A311833_3_En_3_Chapter.html#Par76)).


    ```java

    @Entity

    public class Customer implements Serializable {

    @EmbeddedId

    private CustomerPK customerId;

    public CustomerPK getCustomerId() { return customerId; }

    public void setCustomerId(CustomerPK customerId) {

    this.customerId = customerId;

    }

    // . . .

    }

    ```


    #### The `@Embeddable` Annotation


    Every `@EmbeddedId` must reference a class that is marked `@Embeddable`. Listing
    [3-11](#A311833_3_En_3_Chapter.html#Par78) shows the corresponding embeddable
    composite key class.


    ```java

    @Embeddable

    public class CustomerPK implements Serializable {

    Long id;

    String name;

    public void setId(Long id) { this.id = id; }

    public Long getId() { return id; }

    public void setName(String name) { this.name = name; }

    public String getName() { return name; }

    @Override

    public int hashCode() { return 0; /* Implementation here */ }

    @Override

    public boolean equals(Object obj) { return false; /* Implementation here */ }

    }

    ```


    The composite key class `CustomerPK` must be annotated `@Embeddable`. Unlike in
    the `@IdClass` case, its instance variables or property accessors may have `@Column`
    annotations to specify their mapping details.


    ### Summary of Entity Examples


    The basic `@Entity` and `@Id` annotations are sufficient to define an entity class,
    making the on-ramp to coding entities very straightforward. As you become more
    familiar with the annotations available to you, and as your requirements become
    more demanding, you can simply add annotations to your entities to achieve powerful
    persistence features.


    We just covered the very basics in this section. We’ll now turn our attention
    away from the entity class itself and toward the `EntityManager` and some other
    important services in the persistence framework. Later, we’ll return to explore
    more annotations that satisfy more complex needs.


    ## The Persistence Archive


    Until now, we have referred to the persistence archive as the encapsulation of
    a group of collocated entities that are deployed as a JAR file. This archive defines
    the entities and related non-entity classes that are bundled together for deployment.
    Strictly speaking, a persistence archive does not need to live in its own dedicated
    `.jar` file. Persistence archives can be bundled inside `.war` files, EJB `.jar`
    files, and even exist as `.class` files and a `META-INF/persistence.xml` file
    on a Java application’s class path.


    Regardless of its surrounding context, we now take a closer look at the contents
    of this archive.'
