    ### Beans 与 beans.xml


    Beans 是由容器管理的、包含业务逻辑的组件，例如托管 Bean 和会话 Bean。读者需要注意，CDI 并未引入一种名为“CDI Bean”且拥有独特组件模型的新
    Bean 类型。CDI 提供了一套服务，可供托管 Bean 和 EJB（它们由其现有的组件模型定义）使用。CDI 容器识别各个部署模块中发现的 Bean 的过程称为
    Bean 发现。通过 Bean 发现被容器发现的 Bean 会参与 CDI 生命周期。这些 Bean 的生命周期由容器根据 CDI 规范进行管理。


    注意


    在本章中，除非另有说明，“Bean”一词指的是参与 CDI 生命周期的 Java Bean。


    如果容器在 WAR 文件的 `WEB-INF` 目录或 JAR 文件的 `META-INF` 目录中检测到 `beans.xml` 文件，则该模块内的 Bean
    会参与 CDI 生命周期。模块中存在 `beans.xml` 有助于容器快速隔离与 CDI 相关的模块，从而加快 Bean 发现速度。CDI 不要求 `beans.xml`
    声明模块中可用的 Bean；`beans.xml` 可以为空。CDI 构件（如替代项、拦截器和原型）会根据需要在 `beans.xml` 中声明。


    CDI 容器为其 Bean 提供以下服务：


    *   透明的创建、销毁和作用域管理

    *   注入到 Java 客户端时，通过限定符进行类型安全的作用域解析

    *   在 JSF 客户端的统一 EL 表达式中使用时，通过名称进行类型安全的作用域解析

    *   生命周期回调

    *   其他 Bean 实例的自动注入

    *   拦截与装饰

    *   事件通知


    通过声明一个类级别的字段并使用 `javax.inject.Inject` 注解对其进行标注，可以将 Bean 注入到其他 Bean 和客户端中。通过使用
    `javax.inject.Named` 注解对 Bean 进行标注，它们也可以通过统一 EL 表达式与 JSP 和 JSF 等 Web 层技术一起使用。


    ### 作用域


    对象的作用域决定了该对象各个实例的生命周期。包含有状态对象实例的应用程序需要这些实例在定义的时间段内保持其状态。作用域规定了 Bean 实例应在何时创建，以及容器应在何时销毁它。


    CDI 有以下五种类型的作用域。


    #### 应用作用域


    应用作用域的 Bean 的状态在应用程序的所有用户之间共享。一个应用作用域的对象在应用程序的生命周期内仅创建一次——即首次被注入时——并且仅在应用程序关闭时被销毁。应用作用域使用
    `@javax.enterprise.context.ApplicationScoped` 注解声明。


    #### 请求作用域


    请求作用域的 Bean 的状态由单个请求中涉及的所有 Bean 共享。一个请求作用域的 Bean 在每个请求中创建一次，并在该请求完成后被销毁。请求作用域使用
    `@javax.enterprise.context.RequestScoped` 注解声明。


    #### 会话作用域


    会话作用域的 Bean 的状态在同一 HTTP 会话内的多个请求之间共享。一个会话作用域的 Bean 在 HTTP 会话开始时创建，并在 HTTP 会话关闭或超时时被销毁。会话作用域使用
    `@javax.enterprise.context.SessionScoped` 注解声明。


    #### 对话作用域


    对话作用域的 Bean 的状态在 JSF faces 请求或非 faces 请求的所有标准生命周期阶段之间共享。一个 JSF 请求仅与一个对话相关联。任何对话都可以处于瞬态或长期运行状态。瞬态是对话的默认状态。通过调用
    `Conversation.begin()` 将对话标记为长期运行，通过调用 `Conversation.end()` 将其标记为瞬态。在 JSF 请求结束时，对话作用域的对象必须处于瞬态才能被销毁。对话作用域使用
    `@javax.enterprise.context.ConversationScoped` 注解声明。


    #### 依赖伪作用域


    依赖作用域是默认作用域，当未显式定义作用域时，容器会应用它。具有依赖作用域的 Bean 的实例仅绑定到一个对象。此类 Bean 的实例会随着关联对象的创建和销毁而同步创建和销毁。这些
    Bean 实例不会在客户端应用程序之间共享。依赖作用域使用 `@javax.enterprise.context.Dependent` 注解声明。


    注意


    用户可以通过使用 `@javax.inject.Scope` 注解来定义自定义作用域。


    ### 使用 @Inject 进行依赖注入


    在引入依赖注入的 JSR 330 发布之前，需要依赖类服务的客户端要么必须实例化该类的具体实例，要么依赖外部模块在需要之前连接好依赖关系。这要么在客户端和依赖类之间创建了紧密耦合的编译时依赖关系，要么导致客户端依赖外部进程来适当地“配置”自身。通过依赖注入，客户端和依赖类之间的契约变得解耦，并且客户端对自身如何被初始化获得了一定的控制权。客户端可以请求通过其接口注入一个资源，并依赖容器注入一个客户端有意未知的某个具体实现类的可接受实例。CDI
    通过引入一种方式（限定符，见下文），让客户端能够告诉容器它需要注入类具有哪些抽象特性，从而扩展了客户端控制其配置的能力。容器在运行时根据这些需求来决定注入哪个依赖类。这创建了一个更加松散耦合的系统，其中注入类的需求在客户端中以声明式和动态的方式配置，并由容器在运行时绑定到一个实现类。


    `@javax.inject.Inject` 注解定义了一个注入点，在 Bean 中有三个位置可以由 CDI 容器执行注入：在构造函数声明上初始化参数值、在方法声明上初始化参数值，以及在字段声明上初始化类成员。接下来我们将逐一考察这些位置。

