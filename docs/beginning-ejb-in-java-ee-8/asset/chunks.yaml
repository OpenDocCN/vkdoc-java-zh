    Person.java，一个使用 @IdClass 作为复合主键的实体

    ```


    ### 映射使用复合键的关系


    在定义目标实体使用复合主键的关系时，拥有实体必须将其关系字段映射到相应类型的列。这需要使用 `@JoinColumns` 注解（或等效的 XML 元数据）。如果这些列恰好嵌套在拥有实体的主键中，或者它们受到
    `NOT NULL` 约束，那么该关系必须在调用 `EntityManager.persist()` 操作将此实体持久化到持久化上下文时绑定，或者至少在调用
    `EntityManager.flush()` 发出数据库 `INSERT` 调用时绑定。


    在以下示例中，`PersonPK` 复合主键类包含两个字段——`id` 和 `addressId`——它们是强制性的（`NOT NULL`），因为它们是主键的一部分。由于
    `addressId` 和关系字段 `homeAddress` 都映射到同一个 `ADDRESS_ID` 列，并且这些字段中只有一个可以是可插入和可更新的，我们必须将其中一个字段标记为只读。在清单
    4-30 中，关系字段 `homeAddress` 通过在 `@JoinColumn` 注解上分配 `insertable=false` 和 `updatable=false`
    属性而被标记为只读。


    ```

    /*

    * Person: 一个抽象实体，也是 SINGLE_TABLE 层次结构的根，

    * 演示了使用复合键，该键包含一个字段，其映射的列

    * 也映射到一个关系字段。

    */

    @Entity

    @Inheritance(strategy = InheritanceType.SINGLE_TABLE)

    @NamedQueries({

    @NamedQuery(name = "Person.findAll", query = "select o from Person o")})

    @TableGenerator(name = "Person_ID_Generator", table = "CH04_FKINPK_PERSON_ID_GEN",

    pkColumnName = "PRIMARY_KEY_NAME", pkColumnValue = "Person.id",

    valueColumnName = "NEXT_ID_VALUE")

    @Table(name = "CH04_FKINPK_PERSON")

    @IdClass (PersonPK.class)

    public abstract class Person

    implements Serializable

    {

    @Id

    @Column(name = "ADDRESS_ID")

    private Integer addressId;

    @Id

    @Column(nullable = false)

    @GeneratedValue(strategy = GenerationType.TABLE, generator = "Person_ID_Generator")

    private Integer id;

    @Column(name = "FIRST_NAME")

    private String firstName;

    @Column(name = "LAST_NAME")

    private String lastName;

    @Version

    private Integer version;

    @OneToOne(cascade = { CascadeType.ALL })

    @JoinColumn(name = "HOME_ADDRESS")

    private Address homeAddress;

    public Person() {

    }

    /* get/set methods */

    }

