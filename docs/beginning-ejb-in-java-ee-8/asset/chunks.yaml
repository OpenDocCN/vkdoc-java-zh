    ```


    在下一节中，我们将介绍编译、部署和运行我们处理的用例。


    ## 编译、部署和测试 MDB


    MDB 需要打包到 EJB JAR（Java 归档）文件中，然后才能部署到 EJB 容器中。然后可以部署这些 EJB 归档文件。（对于某些 EJB 容器或应用服务器，它们需要组装成
    EAR [企业归档] 文件）。大多数 EJB 容器或应用服务器提供部署实用程序或 Ant 任务，以方便将 EJB 部署到其容器中。像 JDeveloper、NetBeans
    和 Eclipse 这样的 Java 集成开发环境（IDE）也提供部署功能，允许开发人员将 EJB 打包、组装和部署到应用服务器。打包、组装和部署方面在第
    11 章中有详细说明。


    在本章中，我们开发了一个无状态会话 Bean（`OrderProcessing`）和一个 MDB（`StatusMailer`）。在部署 MDB 之前，必须使用客户端应用程序和
    MDB 将相应使用的队列和主题来配置 JMS 提供程序。


    以下各节描述了编译、部署和测试这些 MDB 和会话 Bean 的步骤。


    ### 先决条件


    在执行后续各节中详述的任何步骤之前，请先完成第 1 章的“入门”部分，该部分将引导您完成本章示例所需的安装和环境设置。

