    )\npublic class CustomerServiceBean {\n    @Resource\n    SessionContext ctx;\n\
    \n    public void performService() {\n        EntityManager em = (EntityManager)ctx.lookup(\"\
    Chapter03PersistenceUnit\");\n        // . . .\n    }\n}\n\n清单 3-15\n通过 JNDI 查找\
    \ EntityManager\n```\n\n注入的 `SessionContext` 资源提供了一个 JNDI 命名空间，用于在运行时获取其他资源。\n\
    \n### 事务支持\n\n`EntityManager` 还公开了用于开始、提交和回滚事务的方法，这些方法适用于资源本地（非 JTA）事务。此主题将在第\
