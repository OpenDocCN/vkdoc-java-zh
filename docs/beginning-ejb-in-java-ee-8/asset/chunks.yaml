    ### The Display Cart Items Page


    Listing [12-21](#A311833_3_En_12_Chapter.html#Par209) shows the `cartItems.jsp`
    JSF page. In this page, we want to display all of the items in the shopping cart
    using a data table component. The `#{JSFShoppingCart.cartItems}` expression is
    used as a value-binding expression for the `h:dataTable1` component. This means
    that again we have to update our `JSFShoppingCart` managed bean with code that
    will populate the `cartItems` property. Finally, the JSF page has a `h:commandButton`
    component that the user will use as a Submit button to complete the order. `#{JSFShoppingCart.ProcessOrder}`
    is a method-binding expression used for the Submit button.


    ```

    Cart Items Page


    Beginning EJB: Wine Store Application

    Shopping Cart


    Listing 12-21

    cartItems.jsp

    ```


    Figure [12-25](#A311833_3_En_12_Chapter.html#Fig25) (in the “Compiling, Deploying,
    and Testing the JSF Application” section) shows the `cartItems.jsp` page rendered
    in the browser.


    Listing [12-22](#A311833_3_En_12_Chapter.html#Par212) shows the code snippets
    that are used to update the `JSFShoppingCart` managed bean. We have a property—`cartItems`—of
    `java.util.List` type, with accessor methods. In the getter method, we are retrieving
    the `Customer` object and the instance of the `ShoppingCart` stateful EJB from
    the `Login` managed bean, and we are calling the business method `getAllCartItems()`
    that returns the list of items in the cart. The second method, `ProcessOrder()`,
    also retrieves the instance of the `ShoppingCart` stateful EJB from the `Login`
    managed bean and invokes the `ProcessOrder` business method on the back-end application
    to complete the order on the JSF application side. Upon successful execution,
    the `ProcessOrder()` method in `JSFShoppingCart` returns `success` as a value
    that is used for navigation back to the home page of the application.


    ```

    List cartItems = new ArrayList();

    public void setCartItems(List cartItems) {

    this.cartItems = cartItems;

    }

    public List getCartItems() {

    FacesContext ctx = FacesContext.getCurrentInstance();

    Application app = ctx.getApplication();

    ValueBinding customerBinding = app.createValueBinding("#{Login.customer}");

    Individual customer = (Individual)customerBinding.getValue(ctx);

    ValueBinding shoppingCartBinding = app.createValueBinding("#{Login.shoppingCart}");

    shoppingCart = (ShoppingCartLocal)shoppingCartBinding.getValue(ctx);

    return shoppingCart.getAllCartItems(customer);

    }

    public String ProcessOrder() {

    FacesContext ctx = FacesContext.getCurrentInstance();

    Application app = ctx.getApplication();

    ValueBinding shoppingCartBinding = app.createValueBinding("#{Login.shoppingCart}");

    shoppingCart = (ShoppingCartLocal)shoppingCartBinding.getValue(ctx);

    shoppingCart.sendOrderToOPC();

    return "success";

    }

