    ## Summary


    In this chapter, we introduced you to Web Services and Microservices as part of
    Java EE 8. We explained the Web Service architecture that goes by the find-bind-execute
    model—and how standards like `UDDI`, `WSDL`, and `SOAP` have made Web services
    ubiquitous as compared to earlier distributed computing models in terms of standardization
    and interoperability. We also briefly discussed the REST architectural pattern
    and RESTful Web services, which have simplified creation and use of Web services.


    We looked into the details of the `UDDI`, `SOAP`, and `WSDL` standards, and we
    demonstrated how `WSDL` documents and `SOAP` messages are constructed with a simple
    credit service example.


    We discussed some use cases for which Web services can be used, and we discussed
    how they fit into intranet and Internet models, including some examples of existing
    e-commerce sites that provide Web services.


    We then dived into the Java EE platform and looked at different standards (`JAX-WS`,
    `JAX-RS`, `JAXB`, `JAXR`, `SAAJ`, and `JSR 224`) that are enabling developers
    to create Web services that are portable and interoperable within the `.NET` platform.


    Then we looked at how to publish EJB stateless session beans as Web services using
    simple Web Services Metadata annotations. We developed a credit service that can
    be invoked from Web service clients.


    Next we looked at compiling, deploying, and testing Web services using the `GlassFish`
    application server and servlet clients, and we also looked at how this programming
    model is similar to invoking Web services with EJBs.


    Finally, we introduced the Java EE Microservices as part of the new Java Platform
    and how to build a simple Microservice example using Boot Spring project.


    So far, we have discussed the individual components of the EJB specifications:
    session beans, JPA entities, MDBs, and Web services. In the next chapter, we will
    discuss how you can integrate all of these components to build an enterprise application.


    # 7. Integrating Session Beans, Entities, Message-Driven Beans, and Web Services


    ## Introduction


    Previous chapters in this book covered the individual components of EJB and related
    technologies. These included session beans, message-driven beans (MDBs), stateless
    session beans as Web services, and JPA entities. In this chapter, we will show
    you how to integrate these components into a complete Java EE 8 application using
    a fictitious wine store application as an example.


    ## Application Overview


    The sample application that we are going to develop in this chapter is the Wines
    Online application, which provides customers (either individuals or distributors)
    with a variety of search criteria with which they can browse, select wines, add
    them to a shopping cart, and process their order. Customers need to register with
    the Wines Online application before they can submit orders. Once an order is submitted,
    the customer’s credit card is validated, and this triggers an order processing
    message and an e-mail notification to the customer on the status of the order.


    Screens used by the customer to search, navigate, and submit orders are part of
    a simple JavaServer Faces (JSF) Web application that interacts with back-end services
    and components developed using EJBs. In this chapter, our focus will be on developing
    the back-end part of the application, which can be tested with both a servlet
    and a simple Java client. In Chapter [12](#A311833_3_En_12_Chapter.html), we will
    develop a JSF client for these back-end services.


    As shown in Figure [7-1](#A311833_3_En_7_Chapter.html#Fig1), the Wines Online
    application consists of several back-end components that are used by the client
    application, and these back-end components in turn make use of different types
    of services to perform CRUD (create, retrieve, update, delete) operations, send
    e-mail notifications to the customer about order status, process the incoming
    orders, and verify the credit card status of the customer. We will discuss the
    behavior and functionality of these components in the next section.


    ![A311833_3_En_7_Fig1_HTML.jpg](A311833_3_En_7_Fig1_HTML.jpg)


    Figure 7-1


    The Wines Online application architecture


    ## Application Components and Services


    The back-end wine store application consists of different types of EJBs that are
    created as components and services. The key components and services are described
    in the following sections.'
