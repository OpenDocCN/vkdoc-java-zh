    these technologies and incorporate them under a standard component development
    model. EJB was born to fill this need. Over the ensuing years, EJB has evolved
    to encompass numerous features (while judiciously rejecting others), and it has
    matured into a robust and standard framework for deploying and executing business
    components in a distributed, multiuser environment.


    ### What Is EJB?


    Each release of EJB is managed through the Java Community Process (JCP) as a Java
    Specification Request (JSR). The latest release, which is covered in this book,
    is defined by `JSR 345`: Enterprise JavaBeans ^(TM) 3.2. EJB JSRs prior to EJB
    3.0 covered Persistent components, but since the introduction of JPA, persistence
    is now managed through its own JSRs. Nonetheless, the two areas complement each
    other well, and we have included several chapters in this book dedicated largely
    to JPA.


