- fmt: '# What Are Microservices?


    Microservices are a variant of the service-oriented architecture (SOA) architectural
    style.


    Microservices define a new architectural structure model so that a simple application
    is developed as a set of multiple single and lightweight services.


    Compared to previous architectural approaches, Microservices defined clearly a
    new trend in the software development industry.


    A major benefit of Microservice is that each of them is independently deployable
    and scalable as well as that it can be written in different programming languages.


    Microservices are commonly directly invoked by HTTP REST API calls. Standards
    like `RAML` (Restful API Modelling Language) allow for the formal definition of
    REST APIs.


    The development of Microservices is a combination of direct calls through HTTP
    and indirect calls through a message broker.


    We will see the main differences between monolithic and Microservices as well
    as provide an example of Microservice development.


    Here are some of the most important advantages and disadvantages of Microservices:


    **Advantages:**


    - Better software practices

    - Fault tolerance

    - Evolutionary design

    - Easy to deploy

    - Reduce Coupling

    - Right Tool for the Job

    - Continuous Delivery

    - Smaller codebases are easier to reason about

    - Easy to replace old services

    - Efficient Scaling

    - Easier to develop, understand, and maintain

    - Starts faster than a monolith

    - Local changes can be easily deployed

    - Improves fault isolation

    - Not tech driven but business focused


    **Disadvantages:**


    - Tooling overhead

    - Debugging

    - Distributed transactions

    - Latency

    - Dependency

    - Additional complexity of distributed systems

    - Significant operational complexity, needs high level of automation.

    - Rollout plan to coordinate deployments


    **Microservices Technology Stack might include:**


    - Java

    - Spring

    - Hibernate

    - NodeJS

    - PostgreSQL

    - Redis

    - Bootstrap

    - AngularJS

    - Amazon Web Services

    - Docker

    - RabbitMQ

    - Hystrix


    Figure [6-18](#A311833_3_En_6_Chapter.html#Fig18) shows the Microservices concept.


    ![A311833_3_En_6_Fig18_HTML.jpg](A311833_3_En_6_Fig18_HTML.jpg)


    **Figure 6-18** Microservices concept


    Figure [6-19](#A311833_3_En_6_Chapter.html#Fig19) shows the main differences between
    Monolith and Microservices.


    ![A311833_3_En_6_Fig19_HTML.jpg](A311833_3_En_6_Fig19_HTML.jpg)


    **Figure 6-19** Monolith vs Microservices


    In general, traditional software development processes result in relatively large
    teams working on a single, monolithic deployment artifact while Microservices
    are a fundamental shift in how IT approaches software development.


    Figure [6-20](#A311833_3_En_6_Chapter.html#Fig20) shows the Microservices general
    architecture.


    ![A311833_3_En_6_Fig20_HTML.jpg](A311833_3_En_6_Fig20_HTML.jpg)


    **Figure 6-20** Microservice Architecture


    ## Java EE 8 and Microservices


    The Java EE platform can be used, of course, to develop Microservices.


    In general, the Java EE set of specifications allows the Java developer to create
    easily monolithic applications since they don’t need to worry about handling technical
    concerns like scaling, security, network handling, transaction management, etc.
    When developing monolithic applications, Java EE developers only have to focus
    on business concerns instead.


    But the problem when developing a monolithic application is that the application
    will be structured as an `EAR` file with multiple modules including the following:


    - An `EJB`-module that handles integration aspects like SOAP web services, Message
    handling, etc.

    - An `EJB`-module with a common persistence layer to access data stores with traditional
    means like `JPA`, `JDBC`, `JCA`, etc.

    - Multiple `WAR` modules


    This scenario very easily will turn to be very complex to develop while with tools
    like `Maven` or `OSGi`, modularizing a Java EE application such as Microservices,
    has simplified the development of monoliths on Java EE, meaning that the Java
    EE developer’s entire application can be deployed in a single `WAR` file.


    Here are the major advantages of developing Microservices with Java EE:


    - Java EE is incredibly lightweight

    - Rapid to develop

    - Majority of alternative Java frameworks based on Java EE APIs

    - Concentrates on building business functionality

    - Produces small skinny wars

    - Versioned runtime – aids operations


    **Microservices development platforms in Java include:**


    - Java EE

    - Microprofile

    - OSGI

    - Vertx

    - Akka

    - Dropwizard

    - etc.


    **Java EE Microservice building tools include:**


    - Maven

    - Gradle


    **Microservice creates the following artifacts types:**


    - `jar`, `war`, `ear`, `rar`, etc.

    - Java EE server RT configuration


    Next we will show an example of Java EE 8 Microservices.


    ## Microservices Example Using Spring Boot and NetBeans


    We will now show how to develop a Java EE 8 microservice application using Spring
    Boot and NetBeans IDE v8.2.


    Spring Boot is an innovative project that can help the Java developer to create
    simple stand-alone, production-grade Spring based Applications, etc. Spring Boot
    can be found at [`https://projects.spring.io/spring-boot/`](https://projects.spring.io/spring-boot/).'
