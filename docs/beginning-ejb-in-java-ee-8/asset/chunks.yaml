    \n我们可以为 `h:commandLink` 组件指定 `action` 属性，该属性可以是一个基于受管 bean 中方法或属性的表达式。或者，`action`\
    \ 属性也可以是 `faces-config.xml` 中定义的导航案例的名称。对于“所有葡萄酒的完整列表”选项，我们将使用方法绑定表达式 `#{WineList.findAllWines}`\
    \ 作为 `action` 属性值，而对于其余两个选项，我们将使用导航案例的名称。\n\n图 12-21（位于“编译、部署和测试 JSF 应用程序”部分）显示了在浏览器中渲染的\
    \ `winehome.jsp` 页面。\n\n下一步是定义 `WineList` 受管 bean，它将与后端 EJB 通信以获取所有葡萄酒的列表。清单 12-8\
    \ 显示了 `WineList` bean 的代码。我们将首先使用 `@EJB` 注解注入 `SearchFacade` EJB。bean 类中的 `findAllWines()`\
    \ 方法利用注入的 `SearchFacade` 无状态会话 bean，并调用 `getWineFindAll()` 业务方法，该方法返回可用葡萄酒的列表。返回的葡萄酒列表存储在受管\
    \ bean 的 `winesList` 属性中，并且字符串 `allwines` 作为导航案例返回。\n\n```\npackage com.apress.ejb.chapter12.view.managed;\n\
    import com.apress.ejb.chapter07.ejb.SearchFacadeLocal;\nimport com.apress.ejb.chapter07.entities.Wine;\n\
    import java.util.ArrayList;\nimport java.util.List;\nimport javax.ejb.EJB;\nimport\
    \ javax.faces.application.Application;\nimport javax.faces.component.html.HtmlDataTable;\n\
    import javax.faces.context.FacesContext;\nimport javax.faces.el.ValueBinding;\n\
    public class WineList\n{\npublic WineList() {\n}\n@EJB\nprivate SearchFacadeLocal\
    \ searchFacade;\nprivate List winesList = new ArrayList();\npublic String findAllWines()\
    \ {\nif (searchFacade == null) {\nreturn \"gohome\";\n}\nelse {\nwinesList = searchFacade.getWineFindAll();\n\
    return \"allwines\";\n}\n}\npublic void setWinesList(List winesList) {\nthis.winesList\
    \ = winesList;\n}\npublic List getWinesList() {\nreturn winesList;\n}\n}\n清单 12-8\n\
    WineList.java\n```\n\n为了完成此页面的工作，我们将使用清单 12-9 中所示的详细信息扩展 `faces-config.xml` 文件。我们将\
    \ `WineList` 定义为受管 bean，并添加了三个额外的导航规则，这些规则创建了以下链接：\n\n*   从 `winehome.jsp` 到 `searchwines.jsp`，将用户带到搜索页面\n\
    *   从 `winehome.jsp` 到 `wineList.jsp`，在执行受管 bean 中提供的 `findAllWines()` 方法之后\n\
    *   从 `winehome.jsp` 到 `cartItems.jsp`，显示购物车中所有项目的列表\n\n```\nWineList\ncom.apress.ejb.chapter12.view.managed.WineList\n\
    session\n\n/winehome.jsp\n\nsearch\n/searchwines.jsp\n\nallwines\n/wineList.jsp\n\
    \ncartitems\n/cartItems.jsp\n\n清单 12-9\nfaces-config.xml，包含 WineList 受管 Bean\n\
    ```\n\n我们将在接下来的章节中处理我们要导航到的三个页面。\n"
- fmt: "### The Search Page\n\nListing [12-10](#A311833_3_En_12_Chapter.html#Par177)\
    \ shows the code for the `searchwines.jsp` JSF page. This page allows the user\
    \ to search for the wines by year, country, or varietal. We are using the `h:selectOneListBox`\
    \ components that are populated with a static list of values for each of the search\
    \ criteria. The value selected from the list box is stored in the properties of\
    \ the `SearchWines` managed bean using the value-binding expressions specified\
    \ in the `value` attribute of the `h:selectOneListBox` component. We have also\
    \ provided three Submit buttons whose `action` attributes have method-binding\
    \ expressions, such as `#{WineList.searchByYear}`, to trigger a method in the\
    \ `WineList` managed bean that will retrieve the results from the EJB back-end\
    \ application.\n\n```\nSearch Wines Page\n\nBeginning EJB: Wine Store Application\
    \ \nSearch Wines\n\nListing 12-10\nsearchwines.jsp\n```\n\nFigure [12-22](#A311833_3_En_12_Chapter.html#Fig22)\
    \ (in the “Compiling, Deploying, and Testing the JSF Application” section) shows\
    \ the `searchwines.jsp` page rendered in a browser.\n\nThe next step is to add\
    \ new methods to the `WineList` managed bean and define a new managed bean called\
    \ `SearchWines`. Listing [12-11](#A311833_3_En_12_Chapter.html#Par180) shows the\
    \ `SearchWines` managed bean that has three properties (`year`, `varietal`, and\
    \ `country`) and their accessors. User-selected values in the `searchwines.jsp`\
    \ page are stored in these properties, which can be retrieved by the `WineList`\
    \ managed bean.\n\n```\npackage com.apress.ejb.chapter12.view.managed;\npublic\
    \ class SearchWines\n{\npublic SearchWines() {\n}\npublic String year;\npublic\
    \ String varietal;\npublic String country;\npublic void setYear(String year) {\n\
    this.year = year;\n}\npublic String getYear() {\nreturn year;\n}\npublic void\
    \ setVarietal(String varietal) {\nthis.varietal = varietal;\n}\npublic String\
    \ getVarietal() {\nreturn varietal;\n}\npublic void setCountry(String country)\
    \ {\nthis.country = country;\n}\npublic String getCountry() {\nreturn country;\n\
    }\n}\nListing 12-11\nSearchWines.java\n```\n\nWe have to add new functionality\
    \ to the `WineList` managed bean created earlier (see Listing [12-8](#A311833_3_En_12_Chapter.html#Par169))\
    \ by adding three more methods that are bound in the method-binding expressions\
    \ of the `searchwines.jsp` JSF page. Listing [12-12](#A311833_3_En_12_Chapter.html#Par182)\
    \ shows the three methods: `searchByYear()`, `searchByCountry()`, and `searchByVarietal()`.\
    \ Each of these methods needs the value of the properties from the `SearchWines`\
    \ managed bean. JSF provides access to the requested data and data from other\
    \ objects through the `FacesContext` object. Once we have the reference to `FacesContext`,\
    \ we can get access to the application and the managed beans. All methods use\
    \ the technique of getting the `Application` from `FacesContext` and calling the\
    \ `createValueBinding()` method with the value-binding expression to retrieve\
    \ the value of the relevant property from the `SearchWines` managed bean. Once\
    \ the value of the property is retrieved from `SearchWines`, the method calls\
    \ the business methods in the `SearchFacade` EJB by passing in the parameters\
    \ that match the search criteria to retrieve the list of wines. The retrieved\
    \ list of wines is stored in the `winesList` property that is of `java.util.List`\
    \ type.\n\n```\npublic String searchByCountry() {\nFacesContext ctx = FacesContext.getCurrentInstance();\n\
    Application app = ctx.getApplication();\nValueBinding wineyear = app.createValueBinding(\"\
    #{SearchWines.country}\");\nString country = wineyear.getValue(ctx).toString();\n\
    if (searchFacade == null) {\nreturn \"gohome\";\n}\nelse {\nwinesList = searchFacade.getWineFindByCountry(country);\n\
    return \"success\";\n}\n}\npublic String searchByVarietal() {\nFacesContext ctx\
    \ = FacesContext.getCurrentInstance();\nApplication app = ctx.getApplication();\n\
    ValueBinding wineyear = app.createValueBinding(\"#{SearchWines.varietal}\");\n\
    String varietal = wineyear.getValue(ctx).toString();\nif (searchFacade == null)\
    \ {\nreturn \"gohome\";\n}\nelse {\nwinesList = searchFacade.getWineFindByVarietal(varietal);\n\
    return \"success\";\n}\n}\npublic String searchByYear() {\nFacesContext ctx =\
    \ FacesContext.getCurrentInstance();\nApplication app = ctx.getApplication();\n\
    ValueBinding wineyear = app.createValueBinding(\"#{SearchWines.year}\");\nString\
    \ year = wineyear.getValue(ctx).toString();\nif (searchFacade == null) {\nreturn\
    \ \"gohome\";\n}\nelse {\nwinesList = searchFacade.getWineFindByYear(new Integer(year));\n\
    return \"success\";\n}\n}\nListing 12-12\nWineList.java, with Search Methods\n\
    ```\n\nAll of the methods return a value of `success` that will be used as a navigation\
    \ case. We need to add this navigation case into `faces-config.xml` and also register\
    \ `SearchWines` as a managed bean. Listing [12-13](#A311833_3_En_12_Chapter.html#Par184)\
    \ shows the snippets of XML that need to be added to `faces-config.xml`. A `success`\
    \ value returned by the methods will take the user to `wineList.jsp` that will\
    \ display the list of wines. Notice that we have set the scope of the `SearchWines`\
    \ managed bean to `session`, as we are accessing the properties from other managed\
    \ beans as well.\n\n```\n/searchwines.jsp\n\ngohome\n/winehome.jsp\n\nsuccess\n\
    /wineList.jsp\n\nSearchWines\ncom.apress.ejb.chapter12.view.managed.SearchWines\n\
    session\n\nListing 12-13\nfaces-config.xml, with the SearchWines Managed Bean\n\
    ```\n\nSo far, we have completed the following tasks:\n\n* Creating the login\
    \ page\n* Creating the registration page\n* Creating the home page with a list\
    \ of options\n* Creating the search page\n\nWe will now work on showing the wine\
    \ list to the user in the `wineList.jsp` page."
