- fmt: "### The Customer Façade Component\n\n`CustomerFacadeBean` is a stateless session\
    \ bean. It provides business methods to allow the client application either to\
    \ query the customer based on its e-mail address or perform CRUD operations on\
    \ the `Customer` entity and its subclasses. This façade is injected with an `EntityManager`\
    \ via the `@PersistenceContext` annotation that it uses to perform CRUD operations\
    \ on `Customer` entities. Listing [7-1](#A311833_3_En_7_Chapter.html#Par21) shows\
    \ the `getCustomerFindByEmail` method in `CustomerFacadeBean`. This method calls\
    \ the named query `Customer.findByEmail` defined in the `Customer` entity of the\
    \ wine store persistence unit using the `createNamedQuery()` method in the `EntityManager`.\n\
    \n> **Note**  \n> `createNamedQuery()` is a method in the `javax.persistence.EntityManager`\
    \ interface. This method creates an instance of `javax.persistence.Query` for\
    \ executing a named query specified in JPQL (Java Persistence Query Language)\
    \ or native SQL.\n\n```\npublic Customer getCustomerFindByEmail(String email)\
    \ {\nreturn em.createNamedQuery(\"Customer.findByEmail\", Customer.class).setParameter(\"\
    email\", email).\ngetSingleResult();\n}\n```\n*Listing 7-1 The getCustomerFindByEmail\
    \ Method*\n\nListing [7-2](#A311833_3_En_7_Chapter.html#Par24) shows the complete\
    \ code for `CustomerFacadeBean`, which has the business methods to perform CRUD\
    \ operations using the `EntityManager`. This bean class does not implement Local\
    \ or Remote interfaces, and so the EJB container calls the bean class directly\
    \ in Local mode.\n\n> **Note**  \n> In Chapter [2](#A311833_3_En_2_Chapter.html),\
    \ we provided the details on the differences between remote and client view architectures\
    \ for session beans with a summary of advantages and disadvantages along with\
    \ a discussion of the no-interface mode introduced in EJB 3.1. Chapter [3](#A311833_3_En_3_Chapter.html)\
    \ provided the details on the methods that are available on the `EntityManager`\
    \ to perform the CRUD operations.\n\n```\n@Stateless(name = \"CustomerFacade\"\
    , mappedName = \"Chapter07-IntegratedSamples-Chapter07-ServiceIntegration-ejb-CustomerFacade\"\
    )\npublic class CustomerFacadeBean {\n@PersistenceContext(unitName = \"Chapter07-WineAppUnit-JTA\"\
    )\nprivate EntityManager em;\npublic  T persistEntity(T entity) {\nem.persist(entity);\n\
    return entity;\n}\npublic  T mergeEntity(T entity) {\nreturn em.merge(entity);\n\
    }\npublic void removeCustomer(Customer customer) {\ncustomer = em.find(Customer.class,\
    \ customer.getId());\nem.remove(customer);\n}\n/**\n* select o from Customer o\n\
    */\npublic List getCustomerFindAll() {\nreturn em.createNamedQuery(\"Customer.findAll\"\
    , Customer.class).getResultList();\n}\npublic Customer getCustomerFindById(Integer\
    \ id) {\nreturn em.find(Customer.class, id);\n}\n/**\n* select o from Customer\
    \ o where o.email = :email\n*/\npublic Customer getCustomerFindByEmail(String\
    \ email) {\nreturn em.createNamedQuery(\"Customer.findByEmail\", Customer.class).setParameter(\"\
    email\", email).\ngetSingleResult();\n}\npublic Customer registerCustomer(Customer\
    \ customer) {\nreturn persistEntity(customer);\n}\n}\n```\n*Listing 7-2 CustomerFacadeBean.java*\n\
    \n### The Search Façade Component\n\n`SearchFacadeBean` is a stateless session\
    \ bean. This bean provides business methods that allow the client application\
    \ to query the `Wine` entity in the persistence unit based on the year, country,\
    \ and varietal of the wine. The persistence unit in `SearchFacadeBean` is injected\
    \ via the `@PersistenceContext` annotation. Listing [7-3](#A311833_3_En_7_Chapter.html#Par26)\
    \ shows the complete code for `SearchFacadeBean`, which has the business methods\
    \ to perform search operations using the `EntityManager`. This bean class has\
    \ a business interface, `SearchFacadeLocal`, which supports local client access.\
    \ The methods `getWineFindAll()`, `getWineFindByYear()`, `getWineFindByCountry()`,\
    \ and `getWineFindByVarietal()` call the respectively named queries defined in\
    \ the `Wine` entity of the wine store persistence unit using the `createNamedQuery()`\
    \ method in the `EntityManager`, and return zero or more `Wine` objects in `java.util.List`.\n\
    \n```\n@Stateless(name = \"SearchFacade\", mappedName = \"Chapter07-IntegratedSamples-Chapter07-ServiceIntegration-ejb-SearchFacade\"\
    )\npublic class SearchFacadeBean implements SearchFacadeLocal {\n@PersistenceContext(unitName\
    \ = \"Chapter07-WineAppUnit-JTA\")\nprivate EntityManager em;\npublic Object queryByRange(String\
    \ jpqlStmt, int firstResult, int maxResults) {\nQuery query = em.createQuery(jpqlStmt);\n\
    if (firstResult > 0) {\nquery = query.setFirstResult(firstResult);\n}\nif (maxResults\
    \ > 0) {\nquery = query.setMaxResults(maxResults);\n}\nreturn query.getResultList();\n\
    }\npublic  T persistEntity(T entity) {\nem.persist(entity);\nreturn entity;\n\
    }\npublic  T mergeEntity(T entity) {\nreturn em.merge(entity);\n}\npublic void\
    \ removeWine(Wine wine) {\nwine = em.find(Wine.class, wine.getId());\nem.remove(wine);\n\
    }\n/**\n* select object(o) from Wine o\n*/\npublic List getWineFindAll() {\nreturn\
    \ em.createNamedQuery(\"Wine.findAll\", Wine.class).getResultList();\n}\n/**\n\
    * select object(wine) from Wine wine where wine.year = :year\n*/\npublic List\
    \ getWineFindByYear(Integer year) {\nreturn em.createNamedQuery(\"Wine.findByYear\"\
    , Wine.class).setParameter(\"year\", year).\ngetResultList();\n}\n/**\n* select\
    \ object(wine) from Wine wine where wine.country = :country\n*/\npublic List getWineFindByCountry(String\
    \ country) {\nreturn em.createNamedQuery(\"Wine.findByCountry\", Wine.class).setParameter(\"\
    country\", country).\ngetResultList();\n}\n/**\n* select object(wine) from Wine\
    \ wine where wine.varietal = :varietal\n*/\npublic List getWineFindByVarietal(String\
    \ varietal) {\nreturn em.createNamedQuery(\"Wine.findByVarietal\", Wine.class).setParameter(\"\
    varietal\",varietal).getResultList();\n}\n}\n```\n*Listing 7-3 SearchFacadeBean.java*\n\
    \n### The Shopping Cart Component\n\n`ShoppingCartBean` is a stateful session\
    \ bean and uses an extended persistence context. This bean preserves the state\
    \ of a customer who is logged into the system and is currently either adding or\
    \ removing wine items from the shopping cart. Once the customer submits an order,\
    \ `ShoppingCartBean` sends the customer information to the order processing façade,\
    \ which takes care of processing the order. We have decided to use a stateful\
    \ session bean for this use case for the following reasons:\n\n- There is more\
    \ than one type of client application that accesses the back-end application (Web,\
    \ Swing, and command-line client).\n- We want to show the usage of EJB stateful\
    \ session beans in a typical application.\n\n> **Note**  \n> In general, there\
    \ is a common belief that stateful session beans are a bit heavyweight to store\
    \ the state (as compared to storing the state on the client using an HTTP session\
    \ for Web clients). There is evidence that there isn’t a drastic cost in terms\
    \ of either performance or transactions associated with stateful session beans.\
    \ (See *J2EE Performance Testing with BEA WebLogic Server*, by Peter Zadrozny\
    \ [Apress, 2003], for thorough coverage of this topic.)\n\n`ShoppingCartBean`\
    \ has the business methods described in the following subsections.\n\n#### Finding\
    \ Customers\n\nListing [7-4](#A311833_3_En_7_Chapter.html#Par33) shows the `findCustomer()`\
    \ method in `ShoppingCartBean`. This method uses the injected `CustomerFacadeBean`\
    \ and calls the `findCustomerByEmail()` method to get an instance, which in our\
    \ case happens to be an `Individual` subentity. Once a `Customer` is retrieved,\
    \ it is assigned to a class-level attribute so that it can be referenced subsequently\
    \ through other methods on this stateful session bean. Because we are using an\
    \ extended persistence context, this instance will remain managed throughout the\
    \ life of the bean, through transaction boundaries, unless it is actively removed\
    \ from the persistence context.\n\n```\npublic Customer findCustomer(String email)\
    \ {\ncustomer = customerFacade.getCustomerFindByEmail(email);\nreturn customer;\n\
    }\n```\n*Listing 7-4 The findCustomer Business Method*"
