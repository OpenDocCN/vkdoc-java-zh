    #### 消息确认


    EJB 容器提供消息确认服务。有两种消息确认模式：


    *   `自动确认`

    *   `允许重复确认`


    对于`自动确认`模式，消息传递确认在`onMessage()`方法执行后发生。此属性适用于要求无重复消息的应用程序。例如，库存系统应且仅应接收一次新订单。对于`允许重复确认`模式，确认是延迟执行的，这意味着可能存在消息重复传递，但减少了会话在即时确认方面的开销。例如，在订单处理过程中发送的电子邮件可能允许重复消息。我们可以使用`@ActivationConfigProperty`注解来指定消息确认属性。代码清单
