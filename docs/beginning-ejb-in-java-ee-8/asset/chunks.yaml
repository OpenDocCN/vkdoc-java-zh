    ## 在 JPA 实体中使用事务


    本节将讨论以下问题：


    *   在持久化层中，事务是如何管理的？

    *   持久化框架提供了哪些选项来控制涉及实体的事务？

    *   持久化上下文在事务中扮演什么角色？

    *   实体是如何与事务上下文关联和解除关联的？


    如果你还记得第 3 章的内容，持久化单元定义了一组实体类，而持久化上下文则是来自单个持久化单元的一组受管理的实体实例。在任何时刻，跨应用服务器中执行的多个应用程序，许多持久化上下文可能活跃地与任何给定的持久化单元相关联，但每个持久化上下文最多与一个事务上下文相关联。


    ### 实体与事务上下文之间的关系


    从前面关于 EJB 服务器如何作为事务协调器将资源与事务上下文关联起来的讨论中，你可能已经意识到，持久化上下文就是与事务关联的资源。通过这种方式，持久化上下文通过方法调用进行传播，以便持久化单元中的实体，当它们与同一个事务上下文关联时，可以通过它们共同的持久化上下文看到彼此的中间状态。此外，对于任何给定的持久化单元，只能有一个持久化上下文与给定的事务上下文相关联，这一限制确保了对于任何标识为
    `I` 的类型为 `T` 的实体，其状态在任何事务上下文中都只会由一个持久化上下文来表示。


    在一个应用程序线程中，任何时刻都只有一个事务上下文可用，但 EJB 服务器可以自由地将一个持久化上下文与该线程解除关联，并为同一个持久化单元关联一个新的持久化上下文，以满足事务隔离边界。当
    EJB 服务器这样做时，新实例化的持久化上下文将无法看到对与挂起的持久化上下文关联的任何实体所做的中间更改。


    ### 容器管理 vs. 应用程序管理的持久化上下文


    EJB 中的持久化服务允许你完全放弃容器管理的持久化上下文，并在应用程序代码中显式管理持久化上下文的生命周期。当注入（或通过 JNDI 获取）一个 `EntityManager`
    实例时，它作为一个容器管理的持久化上下文出现。容器会自动将容器管理的持久化上下文与使用 `EntityManager` 时恰好处于上下文中的任何事务关联起来，并在事务结束时销毁该持久化上下文（有一个例外——请参见下面的扩展持久化上下文）。如果应用程序希望控制其持久化上下文如何或是否与事务关联，以及它是否能在事务边界之后继续存在，它可以获取一个
    `EntityManagerFactory`（同样通过容器注入或 JNDI 查找），并显式创建管理其持久化上下文的 `EntityManager` 实例。当通过
    `EntityManagerFactory` 获取 `EntityManager` 时，使用的是应用程序管理的持久化上下文——这是在 Java EE 容器外部运行时的要求。有关在
    Java EE 容器外部（例如在纯 Java SE 环境中）使用应用程序管理的 `EntityManager` 的更多信息，请参见第 4 章。


    ### 事务范围的持久化上下文 vs. 扩展持久化上下文


    在事务创建时创建、在事务结束时销毁的持久化上下文，称为事务范围的持久化上下文。这是与无状态会话 Bean 上使用的所有 `EntityManager` 关联的持久化上下文的行为。


    对于有状态会话 Bean，存在一种特殊形式的容器管理 `EntityManager`，它不与事务的生命周期绑定，而是与有状态会话 Bean 自身的生命周期绑定。这被称为扩展的
    `EntityManager`，它的行为很像应用程序管理的持久化上下文，但 EJB 容器方便地管理其生命周期。由于扩展持久化上下文不会像事务范围的持久化上下文那样在每个事务结束时被销毁，因此即使实体已与数据库同步，它们也可以保持在受管理状态。在某些情况下，这避免了在提交后如果希望继续使用它们时，需要重新查询它们或以其他方式获取受管理实例。在会话式环境（例如
    Web 应用程序）中，这可能非常有用。扩展持久化上下文会保持打开状态，直到其上下文中的有状态会话 Bean 被销毁。只有有状态会话 Bean 才能使用扩展持久化上下文。在创建
    `EntityManager` 实例时，其持久化上下文类型就已定义，并且在 `EntityManager` 的生命周期内不能更改。默认类型是事务范围的；要通过指定扩展持久化上下文来注入
    `EntityManager`，你可以使用以下指令指定注入：


    ```

    @PersistenceContext(unitName="WineAppUnit", type = PersistenceContextType.EXTENDED)

    private EntityManager em;

    ```


    或者你可以在 XML 描述符中定义一个 `persistence-context-ref` 元素。


    在本章末尾的事务示例中，我们将比较使用事务范围持久化上下文的无状态会话 Bean 与使用扩展持久化上下文的有状态会话 Bean 的行为。


    ### JTA vs. 资源本地的 EntityManager


    `EntityManager` 可以被定义为参与 JTA 事务或非 JTA（资源本地）事务。JTA 的特性——最显著的是对分布式事务的支持——以及 Bean
    与 JTA 事务的接口 `javax.transaction.UserTransaction` 的使用，之前已经描述过。资源本地的 `EntityManager`
    使用 `javax.persistence.EntityTransaction` 接口来服务事务，该接口可通过 `EntityManager.getEntityTransaction()`
    方法提供给客户端。该接口暴露了预期的事务划分方法 `begin()`、`commit()` 和 `rollback()`，以及 `getRollbackOnly()`
    和 `setRollbackOnly()` 方法（这些方法等同于之前描述的企业 Bean 可用的 `EJBContext` 和 `UserTransaction`
    方法），还有一个 `isActive()` 方法，用于指示事务当前是否正在进行中。


    容器管理的 `EntityManager` 必须是 JTA `EntityManager`。应用程序管理的 `EntityManager` 可以是 JTA
    或资源本地的，但只有当 `EntityManager` 位于 Java EE 环境中时，它们才能是 JTA `EntityManager`。


    你可能想要使用资源本地 `EntityManager` 的一个原因是，虽然 JTA 提供了分布式事务的基础设施，但资源本地事务可以通过消除这种基础设施的开销来提供性能优化。另一个原因是，你可能希望在独立的
    Java SE 环境中使用你的 JPA 实体，而该环境不支持 JTA 和/或数据源资源。


    在本章后面剖析示例应用程序中的 Java 外观时，我们将研究 `EntityTransaction` 的使用。

    '
- fmt: '## Two Sample Scenarios


    The following two sample scenarios use the entities in the persistence unit defined
    for the Wines Online application, which we examined in Chapter [7](#A311833_3_En_7_Chapter.html).
    The first scenario uses a stateless CMT session bean, leveraging the declarative
    transaction services provided by the EJB container. The second scenario shows
    how transactions can be managed explicitly by both the bean and the client when
    using a stateful BMT session bean. At the end of this chapter you will find step-by-step
    instructions for building, deploying, and testing these samples in GlassFish using
    NetBeans. For now, we will examine the source files and discuss the different
    ways EJB and JPA can interact in a transactional environment.


    ### Stateless Session Beans with CMT Demarcation


    We begin with a default, straightforward, implementation of a stateless session
    bean, `OrderProcessorCMTBean.java` (shown in Listing [8-1](#A311833_3_En_8_Chapter.html#Par86)).
    This session bean uses CMT demarcation to leverage EJB’s declarative transaction
    support. It is followed by a simple servlet client, `OrderProcessorCMTClient.java`
    (shown in Listing [8-2](#A311833_3_En_8_Chapter.html#Par87)).


    ```

    @Stateless(name = "OrderProcessorCMT", mappedName = "Chapter08-TransactionSamples-OrderProcessorCMT")

    public class OrderProcessorCMTBean {

    @Resource

    SessionContext sessionContext;

    @PersistenceContext(unitName = "Chapter08-TransactionSamples-JTA")

    private EntityManager em;

    /**

    * Remove any existing Customers with email ''wineapp@yahoo.com'' and any existing
    Wine with

    * country ''United States''. The EJB container will ensure that this work is performed
    in

    * a transactional context.

    */

    public String initialize() {

    StringBuffer strBuf = new StringBuffer();

    strBuf.append("Removed ");

    int i = 0;

    //  Filter the data by removing any existing Customers with email

    //  ''wineapp@yahoo.com'' (or whatever is defined in the user.properties file).

    for (Customer customer :

    getCustomerFindByEmail(PopulateDemoData.TO_EMAIL_ADDRESS)) {

    em.remove(customer);

    i++;

    }

    strBuf.append(i);

    strBuf.append(" Customer(s) and ");

    //  Remove any existing Wine with country ''United States''

    i = 0;

    for (Wine wine : getWineFindByCountry("United States")) {

    em.remove(wine);

    i++;

    }

    strBuf.append(i);

    strBuf.append(" Wine(s)");

    return strBuf.toString();

    }

    /**

    * Create a new CustomerOrder from the items in a Customer''s cart. Creates a new
    CustomerOrder

    * entity, and then creates a new OrderItem entity for each CartItem found in the
    Customer''s cart.

    *

    * Using CMT w/ the default REQUIRED xaction attribute, if this method is invoked
    without a

    * transaction context, a new transaction will be created by the EJB container
    upon invoking the

    * method, and committed upon successfully completing the method.

    *

    * @return a status message (plain text)

    */

    public CustomerOrder createCustomerOrder(Customer customer) {

    return createCustomerOrderUsingSupports(customer);

    }

    @TransactionAttribute(TransactionAttributeType.SUPPORTS)

    public CustomerOrder createCustomerOrderUsingSupports(Customer customer) {

    if (customer == null) {

    throw new IllegalArgumentException("OrderProcessingBean.createCustomerOrder():
    Customer not specified");

    }

    if (!em.contains(customer)) {

    customer = em.merge(customer);

    }

    final CustomerOrder customerOrder = new CustomerOrder();

    customer.addCustomerOrder(customerOrder);

    final Timestamp orderDate = new Timestamp(System.currentTimeMillis());

    final List cartItemList =

    new ArrayList(customer.getCartItemList());

    for (CartItem cartItem : cartItemList) {

    //  Create a new OrderItem for this CartItem

    final OrderItem orderItem = new OrderItem();

    orderItem.setOrderDate(orderDate);

    orderItem.setPrice(cartItem.getWine().getRetailPrice());

    orderItem.setQuantity(cartItem.getQuantity());

    orderItem.setStatus("Order Created");

    orderItem.setWine(cartItem.getWine());

    customerOrder.addOrderItem(orderItem);

    //  Remove the CartItem

    customer.removeCartItem(cartItem);

    }

    return persistEntity(customerOrder);

    }

    public  T persistEntity(T entity) {

    em.persist(entity);

    return entity;

    }

    public  T mergeEntity(T entity) {

    return em.merge(entity);

    }

    public  void removeEntity(T entity) {

    em.remove(em.merge(entity));

    }

    public  List findAll(Class entityClass) {

    CriteriaQuery cq = em.getCriteriaBuilder().createQuery();

    cq.select(cq.from(entityClass));

    return em.createQuery(cq).getResultList();

    }

    public  List findAllByRange(Class entityClass, int[] range) {

    CriteriaQuery cq = em.getCriteriaBuilder().createQuery();

    cq.select(cq.from(entityClass));

    Query q = em.createQuery(cq);

    q.setMaxResults(range[1] - range[0]);

    q.setFirstResult(range[0]);

    return q.getResultList();

    }

    /**

    * select o from Customer o where o.email = :email

    */

    @TransactionAttribute(TransactionAttributeType.NOT_SUPPORTED)

    public List getCustomerFindByEmail(String email) {

    return em.createNamedQuery("Customer.findByEmail", Customer.class).setParameter("email",
    email).getResultList();

    }

    /**

    * select object(wine) from Wine wine where wine.country = :country

    */

    @TransactionAttribute(TransactionAttributeType.NOT_SUPPORTED)

    public List getWineFindByCountry(String country) {

    return em.createNamedQuery("Wine.findByCountry", Wine.class).setParameter("country",
    country).getResultList();

    }

    }

