    As first thing we want to make sure we install the Java SE Development Kit (JDK)
    version 8 from the Java web site:


    [`http://www.oracle.com/technetwork/pt/java/javase/downloads/jdk8-downloads-2133151.html`](http://www.oracle.com/technetwork/pt/java/javase/downloads/jdk8-downloads-2133151.html)


    Once Java SE Development Kit (JDK) version 8 is installed you can test if it works
    by running the command shown in Figure [1-1](#A311833_3_En_1_Chapter.html#Fig1).


    ![A311833_3_En_1_Fig1_HTML.jpg](A311833_3_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Checking Java version installed


    Please notice that there is also a distribution of the JDK 8u161 that includes
    the Java SE bundle of NetBeans IDE version 8.2:


    [`http://www.oracle.com/technetwork/java/javase/downloads/jdk-netbeans-jsp-142931.html`](http://www.oracle.com/technetwork/java/javase/downloads/jdk-netbeans-jsp-142931.html)


    In this book we installed separately JDK and NetBeans.


    ### Downloading the NetBeans IDE


    You can download the latest NetBeans installer from the following location:


    [`http://netbeans.org/downloads/`](http://netbeans.org/downloads/)


    Make sure that you download the installer with “Java EE” technology, as shown
    in Figure [1-2](#A311833_3_En_1_Chapter.html#Fig2). This installer will also contain
    the required Java SE and GlassFish packages. Ant is included with GlassFish; you
    can either use it or configure the environment properties to use another installation.
    The GlassFish project recommends that you use Ant, which is bundled with its install.


    ![A311833_3_En_1_Fig2_HTML.jpg](A311833_3_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Downloading the NetBeans IDE Note


    When we started writing this book, the latest NetBeans version was 8.2, which
    was used to test the setup and the sample code. Remember that multiple installations
    of NetBeans IDE 5.x, 6.x, and 7.x can coexist with NetBeans IDE 8.2 on the same
    system. You, actually, don''t need to uninstall the earlier versions in order
    to install or run NetBeans IDE 8.2.


    Once the download is complete, you are set to start the installation of NetBeans
    along with its integrated GlassFish server.


    ### Installing NetBeans IDE and Its Integrated GlassFish Server


    Navigate to the directory where the NetBeans IDE installer has been downloaded,
    and run the installer. The first page of the installer wizard lists the packages
    that will be installed.


    If no Java SE Development Kit (JDK) version is installed you will receive the
    message shown in Figure [1-3](#A311833_3_En_1_Chapter.html#Fig3).


    ![A311833_3_En_1_Fig3_HTML.jpg](A311833_3_En_1_Fig3_HTML.jpg)


    Figure 1-3


    No Java SE Development Kit (JDK) is installed


    If, instead, Java SE Development Kit (JDK) is installed but you see the “No compatible
    JDK was found” warning message, as shown in Figure [1-4](#A311833_3_En_1_Chapter.html#Fig4),
    then you will have to exit the wizard and first download and install the right
    and compatible Java SE Development Kit 8.


    ![A311833_3_En_1_Fig4_HTML.jpg](A311833_3_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Installing NetBeans. “No compatible JDK was found” warning Note


    Even if you don’t see the "`No compatible JDK was found`" warning, verify that
    you have Java Platform (JDK) 8 installed. If you don’t have the Java Platform
    (JDK) 8 installed, then you might get a "`javac: invalid target release: 1.8.0`"
    error while executing the samples in this book.


    Rerun the NetBeans installer after a compatible JDK version is installed. Verify
    that the “No compatible JDK found” warning does not reoccur, and traverse the
    wizard, keeping all of the default values selected. The “Summary” page will list
    the folders where the NetBeans IDE and the GlassFish application server will be
    installed. Finish the wizard by pressing the `Install` button, as shown in Figure
    [1-5](#A311833_3_En_1_Chapter.html#Fig5).


    ![A311833_3_En_1_Fig5_HTML.jpg](A311833_3_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Installing the NetBeans IDE and GlassFish application server


    After a successful installation, your NetBeans IDE and GlassFish application server
    will be ready for use. In the upcoming sections, we will show you how to create
    a simple NetBeans project and verify that the installed GlassFish server is functioning
    properly.


    ### Testing the NetBeans IDE and GlassFish Installation


    Assuming that all of the preceding steps have been executed successfully, you
    are ready to start the NetBeans IDE and the integrated GlassFish application server.
    We will also demonstrate a few simple tests to ensure that you are set to run
    the samples in this book.


    #### Starting NetBeans IDE


    The NetBeans IDE provides a graphical environment for creating, deploying, and
    executing Java EE applications. Administrative tasks like starting and shutting
    down the GlassFish server domains can also be performed using NetBeans.


    Invoke NetBeans, either by selecting “NetBeans” in the Start Menu of your Windows
    7 machine or running `C:\Program Files (x86)\NetBeans 8.2\bin\netbeans64.exe`
    from the command prompt. Note that the exact path will depend on the installation
    location that is mentioned in Figure [1-3](#A311833_3_En_1_Chapter.html#Fig3),
    and for 32-bit systems the executable will be named `netbeans.exe`. If you are
    running Windows 8 or 10, then you need to press the “Windows” key and start typing
    “NetBeans.” The Apps Search tool will search for the NetBeans executable that
    you can select to launch the NetBeans IDE.


    The NetBeans IDE and GlassFish application server is shown in Figure [1-6](#A311833_3_En_1_Chapter.html#Fig6).


    ![A311833_3_En_1_Fig6_HTML.jpg](A311833_3_En_1_Fig6_HTML.jpg)


    Figure 1-6


    NetBeans IDE and GlassFish application server'
