    ### Lifecycle Callback Methods


    There will be certain instances in which an application that uses MDBs requires
    fine-grained control. Two lifecycle event callbacks are supported for MDBs:


    *   `PostConstruct`

    *   `PreDestroy`


    The `PostConstruct` callback occurs before the first message listener method invocation
    on the bean and after the container has performed the dependency injection. The
    `PreDestroy` callback occurs when the MDB is removed from the pool or destroyed.


    For example, a `PostConstruct` callback can be used to initialize some attributes
    or resources, and a `PreDestroy` callback can be used to clean up or release the
    acquired resources.


    Callback methods defined on an MDB class should have the following signature:


    ```

    public void  ()

    ```


    Callback methods can also be defined on a bean’s listener class, in which case
    the methods should have the following signature:


    ```

    public void (Object)

    ```


    where `Object` may be declared as the actual bean type, which is the argument
    passed to the callback method at run time.


    Callback methods can be any methods in the MDB that have callback annotations.
    The following rules apply to these methods:


    *   The method should be public.

    *   The method cannot be final or static.

    *   The return type should be `void`.


    The methods can take either zero or one argument, as shown previously. A callback
    listener class is denoted by the `@CallbackListener` annotation on the MDB class
    with which it is associated.


    ### Interceptors


    The EJB specification provides annotations called interceptors, which allow you
    to intercept a business method invocation. Interceptor methods can be defined
    for MDBs.


    You can add either an `@AroundInvoke` annotation or an `<around-invoke-method>`
    element in the deployment descriptor for a particular method, or you can define
    an interceptor class whose methods are invoked before the `onMessage()` method
    is invoked in the MDB class. An interceptor class is denoted using the `@Interceptor`
    annotation on the MDB class with which it is associated. In the case of multiple
    interceptor classes, the `@Interceptors` annotation is used. Only one `AroundInvoke`
    method may be present on the bean class or on any given interceptor class. An
    `AroundInvoke` method cannot be an `onMessage()` method of the MDB class.


    `AroundInvoke` methods should have the following signature:


    ```

    public Object (InvocationContext) throws Exception

    ```


    The definition of `InvocationContext` is as follows:


    ```

    package javax.ejb;

    public interface InvocationContext {

    public Object getBean();

    public java.lang.reflect.Method getMethod();

    public Object[] getParameters();

    public void setParameters(Object[] params);

    public EJBContext getEJBContext();

    public java.util.Map getContextData();

    public Object proceed() throws Exception;

    }

    ```


    The following list describes each of the methods:


    *   `getBean()`: Returns the instance of the bean on which the method was called

    *   `getMethod()`: Returns the method on the bean instance that was called

    *   `getParameters()`: Returns the parameters for the method call

    *   `setParameters()`: Allows modification of the parameters for the method call

    *   `getEJBContext()`: Gives the interceptor methods access to the bean’s `EJBContext`

    *   `getContextData()`: Allows values to be passed between interceptor methods
    in the same `InvocationContext` instance using the `Map` returned

    *   `proceed()`: Invokes the next interceptor if there is one, or invokes the
    target bean method


    ### Exception Handling


    The EJB spec outlines two types of exceptions: application exceptions and system
    exceptions. For more general information on these exceptions, see the “Exception
    Handling” section of Chapter [2](#A311833_3_En_2_Chapter.html). In the case of
    an MDB, the listener method must not throw a `java.rmi.RemoteException` or, in
    general, a runtime exception. The client assumes that the message consumer continues
    to exist even though a runtime exception has occurred. If the client sends a message
    after a runtime exception is thrown, then the EJB container delegates the messages
    to a different MDB instance. Also, if you allow an exception to “escape” an MDB,
    the message isn’t considered to be consumed, and it goes back on the queue/topic.
    Then the offending message gets redelivered. This is known as the “poison message”
    problem .


    Callback methods can throw runtime exceptions. A runtime exception thrown by a
    callback method that executes within a transaction causes that transaction to
    be rolled back. Callback methods must not throw application exceptions.'
