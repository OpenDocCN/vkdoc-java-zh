    ### 简单主键


    简单主键通过在实体类中使用 `@Id` 注解标注单个基本类型字段来声明（参见清单 3-6）。基本类型字段是指 Java 基本类型（基本类型列表见表 3-2）。


    ```

    @Entity

    public class Customer implements Serializable {

    @Id

    private Integer id;

    private String name;

    public Customer() {}

    public Customer(Integer id) { this.id = id; }

    public Integer getId() { return id; }

    public void setId(Integer id) { this.id = id; }

    public String getName() { return name; }

    public void setName(String name) { this.name = name; }

    }

    清单 3-6

    一个具有简单主键的实体

    ```


    请注意，我们可以通过使用数据库序列自动填充主键值，来消除实体类中备用构造函数的必要性。清单 3-7 展示了如何使用 JPA 提供的 ID 值生成器来实现这一点。


    ```

    @Entity

    @SequenceGenerator(name = " CustomerSequence",

    sequenceName = " CUSTOMER_SEQ",

    initialValue = 100, allocationSize = 20)

    public class Customer implements Serializable {

    @Id

    @GeneratedValue(strategy = GenerationType.SEQUENCE,

    generator = " CustomerSequence")

    private Integer id;

    private String name;

    public Integer getId() { return id; }

    public void setId(Integer id) { this.id = id; }

    public String getName() { return name; }

    public void setName(String name) { this.name = name;}

    }

    清单 3-7

    一个使用 @GeneratedValue 填充的具有简单主键的实体

    ```


    #### @GeneratedValue 注解


    `@GeneratedValue` 注解告知持久化框架使用指定的序列生成器自动填充该列，该生成器必须在持久化归档中的某个实体上定义。（它直接定义在 `Customer`
    实体上。）`@SequenceGenerator` 注解定义了一个可共享的序列生成器，它可以定义一个新的框架生成的序列，也可以引用数据库中已有的序列。ID
    生成器将在第 4 章中更全面地探讨。


    ### 复合主键


    如果实体的主键映射到多个数据库列，则使用复杂主键（或称复合主键）。在实体类中，这可以通过两种方式之一来表示。实体可以直接在实体类上声明复合键中的每个字段（使用
    `@Id` 注解标注每个字段），并在 `@IdClass` 注解中指定一个提供完全相同字段的复合键类。或者，实体可以通过使用 `@EmbeddedId` 注解标注一个单一的复杂字段来将其指定为主键。`@EmbeddedId`
    字段的类类型就是实体的复合键类。这个复合键类使用 `@Embeddable` 注解标注，并且必须指定其每个字段的映射细节。这些字段最终将映射到实体的基表。无论采用哪种方法，复合主键类都必须重写
    `java.lang.Object` 中的 `hashCode()` 和 `equals(Object obj)` 方法。


    清单 3-8 展示了这些选项的具体形式。


    ```

    @Entity

    @IdClass(CustomerPK.class)

    public class Customer implements Serializable {

    @Id

    private Integer customerId;

    @Id

    private String name;

    public Integer getCustomerId() { return customerId; }

    public void setCustomerId(Integer customerId) { this.customerId = customerId;
    }

    public void setName(String name) { this.name = name; }

    public String getName() { return name; }

    }

    清单 3-8

    一个使用 @IdClass 的具有复合主键的实体

    ```


    #### @IdClass 注解


    `@IdClass` 标识了一个普通的 POJO（例如清单 3-9 中所示的示例），该 POJO 不需要任何元数据。主键字段所需的任何映射细节都在实体的字段上指定。


    ```

    public class CustomerPK implements Serializable {

    private Integer id;

    private String name;

    public void setId(Integer id) { this.id = id; }

    public Integer getId() { return id; }

    public void setName(String name) { this.name = name; }

    public String getName() { return name; }

    @Override

    public int hashCode() { return 0; /* 此处为实现代码 */ }

    @Override

    public boolean equals(Object obj) { return false; /* 此处为实现代码 */ }

    }

    清单 3-9

    一个作为复合主键的简单 POJO

    ```


    复合主键类必须符合实体的访问类型（注解实例变量 vs. 属性访问器），并且其所有字段或属性必须在实体类中有匹配的字段或属性。实体上对应的字段必须使用 `@Id`
    注解标注。


    #### @EmbeddedId 注解


    或者，实体可以通过使用 `@EmbeddedId` 注解标注其某个字段或属性来将其指定为复合主键（参见清单 3-10）。


    ```

    @Entity

    public class Customer implements Serializable {

    @EmbeddedId

    private CustomerPK customerId;

    public CustomerPK getCustomerId() { return customerId; }

    public void setCustomerId(CustomerPK customerId) {

    this.customerId = customerId;

    }

    // . . .

    }

    清单 3-10

    一个使用 @EmbeddedId 注解的实体

    ```


    #### @Embeddable 注解


    每个 `@EmbeddedId` 必须引用一个标记为 `@Embeddable` 的类。清单 3-11 展示了相应的可嵌入复合键类。


    ```

    @Embeddable

    public class CustomerPK implements Serializable {

    Long id;

    String name;

    public void setId(Long id) { this.id = id; }

    public Long getId() { return id; }

    public void setName(String name) { this.name = name; }

    public String getName() { return name; }

    @Override

    public int hashCode() { return 0; /* 此处为实现代码 */ }

    @Override

    public boolean equals(Object obj) { return false; /* 此处为实现代码 */ }

    }

    清单 3-11

    一个 @Embeddable 复合键类

    ```


    复合键类 `CustomerPK` 必须使用 `@Embeddable` 注解标注。与 `@IdClass` 的情况不同，其实例变量或属性访问器可以包含 `@Column`
    注解来指定其映射细节。


    ### 实体示例总结


    基本的 `@Entity` 和 `@Id` 注解足以定义一个实体类，这使得实体编码的入门变得非常直接。随着你对可用注解越来越熟悉，以及需求变得越来越复杂，你可以简单地向实体添加注解来实现强大的持久化特性。


    我们刚刚介绍了本节中最基础的内容。现在，我们将把注意力从实体类本身转向 `EntityManager` 以及持久化框架中的其他一些重要服务。稍后，我们将回来探讨更多满足更复杂需求的注解。


    ## 持久化归档


    到目前为止，我们将持久化归档称为一组部署为 JAR 文件的共存实体的封装。该归档定义了为部署而捆绑在一起的实体和相关非实体类。严格来说，持久化归档并不需要存在于其专用的
    .jar 文件中。持久化归档可以打包在 .war 文件、EJB .jar 文件中，甚至可以作为 .class 文件和 META-INF/persistence.xml
    文件存在于 Java 应用程序的类路径上。


    无论其上下文环境如何，我们现在都将更仔细地审视此归档的内容。

    '
- fmt: "### The `persistence.xml` File\n\nA persistence archive requires a `persistence.xml`\
    \ file in its `META-INF` directory. This file groups subsets of entities in the\
    \ archive into what are known as persistence units. A `persistence.xml` file must\
    \ define at least one persistence unit, and the same entity may be included in\
    \ multiple persistence units within the same `persistence.xml` file.\n\nThe `persistence.xml`\
    \ and `orm.xml` mapping files and schemas were updated in JPA 2.2 version.\n\n\
    The `persistence.xml` file defines a persistence unit, and it is located in the\
    \ `META-INF` directory of the root of the persistence unit.\n\nThe `orm.xml` file,\
    \ contained in the `META-INF` directory of the root of the persistence unit, includes\
    \ the managed persistence classes used to take the form of annotations of the\
    \ object-relational mapping information. The `orm.xml` mapping file or other mapping\
    \ file will be loaded as a resource by the persistence provider.\n\n**Note**\n\
    \nThe JPA versions 2.1 and 2.2 request that the XML file mappings, such as `persistence.xml`\
    \ and `orm.xml`, to be located in the Java class path.\n\nThe JPA 2.2 version\
    \ says that:\n\n“An object/relational mapping XML file named `orm.xml` may be\
    \ specified in the `META-INF` directory in the root of the persistence unit or\
    \ in the `META-INF` directory of any jar file referenced by the `persistence.xml`.”\n\
    \nNotice that we can add more mapping files that may be present anywhere on the\
    \ class path and the `Classloader` can load them as resources.\n\nListing [3-12](#A311833_3_En_3_Chapter.html#Par93)\
    \ demonstrates an example of a `persistence.xml` file.\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<persistence xmlns=\"http://xmlns.jcp.org/xml/ns/persistence\"\
    \n             xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n     \
    \        xsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/persistence\n      \
    \       http://xmlns.jcp.org/xml/ns/persistence/persistence_2_2.xsd\"\n      \
    \       version=\"2.2\">\n    <persistence-unit name=\"Chapter03PersistenceUnit\"\
    \ transaction-type=\"JTA\">\n        <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
    \        <jta-data-source>jdbc/wineapp</jta-data-source>\n        <class>com.apress.ejb.chapter03.entities.Address</class>\n\
    \        <class>com.apress.ejb.chapter03.entities.Customer</class>\n        <class>com.apress.ejb.chapter03.entities.CustomerOrder</class>\n\
    \        <exclude-unlisted-classes>false</exclude-unlisted-classes>\n    </persistence-unit>\n\
    \    <persistence-unit name=\"Chapter03PersistenceUnit-JSE\" transaction-type=\"\
    RESOURCE_LOCAL\">\n        <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
    \        <class>com.apress.ejb.chapter03.entities.Customer</class>\n    </persistence-unit>\n\
    </persistence>\n```\n\n*Listing 3-12 An Example of a `persistence.xml` File*\n\
    \nNotice the attribute `version=\"2.2\"` that since JDK version 8 can be used\
    \ as JPA version.\n\nThis `persistence.xml` file defines two persistence units,\
    \ `Chapter03PersistenceUnit` and `Chapter03PersistenceUnit-JSE`. The `Customer`\
    \ class is defined in both. The first persistence unit is used by Java EE clients\
    \ (like session beans), whereas the second unit is configured for use by Java\
    \ SE clients (like the `CustomerService.java` class shown in Listing [3-14](#A311833_3_En_3_Chapter.html#Par104)).\
    \ Specifying different configuration settings in the two persistence units allows\
    \ you to insulate the client from the configuration details of the persistent\
    \ units, and it makes an entity that is run in both Java SE and EE environments\
    \ appear virtually the same in both cases.\n\n## The `EntityManager`\n\nThe `EntityManager`\
    \ is the client’s gateway to entity management services offered by the JPA persistence\
    \ framework. Client sessions must obtain an `EntityManager` instance before interacting\
    \ with persistent entity instances. The `EntityManager` provides support for querying,\
    \ updating, refreshing, and removing existing entity instances, and for registering\
    \ entity classes to create new persistent objects with identity.\n\n### Persistence\
    \ Context\n\nThe `EntityManager` maintains a cache of instances within a transactional\
    \ context called a persistence context. The persistence context allows the `EntityManager`\
    \ to track modified, created, and removed entity instances, and to reconcile entity\
    \ instances with changes that were committed by external transactions concurrent\
    \ with the `EntityManager`'s own transaction.\n\nEntity instances queried through\
    \ the `EntityManager` may be freely passed to clients both inside and outside\
    \ the EJB container. Clients may access and update the entity data as they would\
    \ an ordinary Java object. To apply changes back to the persistent store, the\
    \ client calls the `merge()` method on the `EntityManager` within a transactional\
    \ scope, and the `EntityManager` persists the state of the entity data into the\
    \ back-end store.\n\n### Acquiring an `EntityManager` Instance\n\nAn `EntityManager`\
    \ instance can be acquired both from within the EJB container (Java EE) and outside\
    \ it (Java SE). This offers clients the flexibility to interact with persistent\
    \ entity beans in a uniform way, without regard to whether the persistence code\
    \ is running inside or outside the Java EE container.\n\n#### A Session Bean Using\
    \ Container Injection\n\nListing [3-13](#A311833_3_En_3_Chapter.html#Par101) provides\
    \ an example of a session bean acquiring an `EntityManager` instance through container\
    \ injection.\n\n```\n@Stateless\npublic class CustomerManager {\n    @PersistenceContext(unitName=\"\
    Chapter03PersistenceUnit\")\n    private EntityManager em;\n\n    public void\
    \ createCustomer() {\n        final Customer cust = new Customer();\n        cust.setName(\"\
    Moneybags MgGee\");\n        em.persist(cust);\n    }\n}\n```\n\n*Listing 3-13\
    \ A Session Bean Injected with an `EntityManager` Instance*\n\nIn this example,\
    \ we use container injection to obtain an `EntityManager` instance that is bound\
    \ to the `Chapter03PersistenceUnit` persistence unit, which includes our `Customer`\
    \ entity from Listing [3-7](#A311833_3_En_3_Chapter.html#Par67). We then use this\
    \ `EntityManager` to persist a new `Customer` instance. Note that this example\
    \ assumes that an ID generator or other service exists to auto-populate the primary\
    \ key of the new instance.\n\n#### A Java SE Service Client Using an `EntityManagerFactory`\n\
    \nThere are times when container injection is not an option, or when more control\
    \ over the life cycle of the `EntityManager` is desired by the application. In\
    \ such cases, the client can obtain an `EntityManager` by first acquiring an `EntityManagerFactory`.\
    \ The `javax.persistence.Persistence` class serves as a factory for acquiring\
    \ an `EntityManagerFactory`, and it may be used from both a Java EE environment\
    \ and a Java SE environment. Listing [3-14](#A311833_3_En_3_Chapter.html#Par104)\
    \ shows how an ordinary Java SE service client would obtain an `EntityManager`.\n\
    \n```\npublic class CustomerService {\n    public static void main(String[] args)\
    \ {\n        final EntityManagerFactory emf =\n            Persistence.createEntityManagerFactory(\"\
    Chapter03PersistenceUnit-JSE\");\n        final EntityManager em = emf.createEntityManager();\n\
    \        final Customer cust = new Customer();\n        cust.setName(\"Best Customer\
    \ Ever\");\n        em.persist(cust);\n    }\n}\n```\n\n*Listing 3-14 A POJO that\
    \ Serves as an Entity Façade*\n\nHere we create an `EntityManagerFactory` that\
    \ is again bound to the `Chapter03PersistenceUnit-JSE` persistence unit, which\
    \ includes our `Customer` entity from Listing [3-7](#A311833_3_En_3_Chapter.html#Par67).\
    \ We then create an `EntityManager` instance from that factory and use it to persist\
    \ a new `Customer` instance.\n\n#### Looking Up the `EntityManager` Through JNDI\n\
    \nA third option, available also through both Java SE and EE environments, is\
    \ to look up the `EntityManagerFactory`, or the `EntityManager` itself, through\
    \ Java Naming and Directory Interface (JNDI). Listing [3-15](#A311833_3_En_3_Chapter.html#Par107)\
    \ shows an example of how this is done from within a session bean.\n\n```\n@Stateless\n\
    @PersistenceContext(unitName=\"Chapter03PersistenceUnit\")\npublic class CustomerServiceBean\
    \ {\n    @Resource\n    SessionContext ctx;\n\n    public void performService()\
    \ {\n        EntityManager em = (EntityManager)ctx.lookup(\"Chapter03PersistenceUnit\"\
    );\n        // . . .\n    }\n}\n```\n\n*Listing 3-15 `EntityManager` Lookup Through\
    \ JNDI*\n\nThe injected `SessionContext` resource provides a JNDI namespace for\
    \ acquiring other resources at runtime.\n\n### Transaction Support\n\nThe `EntityManager`\
    \ also exposes methods to begin, commit, and roll back transactions for use with\
    \ resource-local (non-JTA) transactions. This topic is covered in depth in Chapter\
    \ [8](#A311833_3_En_8_Chapter.html)."
  raw: '### The persistence.xml File


    A persistence archive requires a `persistence.xml` file in its `META-INF` directory.
    This file groups subsets of entities in the archive into what are known as persistence
    units. A `persistence.xml` file must define at least one persistence unit, and
    the same entity may be included in multiple persistence units within the same
    `persistence.xml` file.


    The persistence.xml and orm.xml mapping files and schemas were updated in JPA
    2.2 version.


    The persistence.xml file defines a persistence unit, and it is located in the
    META-INF directory of the root of the persistence unit.


    The orm.xml file, contained in the META-INF directory of the root of the persistence
    unit, includes the managed persistence classes used to take the form of annotations
    of the object-relational mapping information. The orm.xml mapping file or other
    mapping file will be loaded as a resource by the persistence provider.


    Note


    The JPA versions 2.1 and 2.2 request that the XML file mappings, such as persistence.xml
    and orm.xml, to be located in the Java class path.


    The JPA 2.2 version says that:


    “An object/relational mapping XML file named orm.xml may be specified in the META-INF
    directory in the root of the persistence unit or in the META-INF directory of
    any jar file referenced by the persistence.xml.”


    Notice that we can add more mapping files that may be present anywhere on the
    class path and the Classloader can load them as resources.


    Listing [3-12](#A311833_3_En_3_Chapter.html#Par93) demonstrates an example of
    a `persistence.xml` file.


    ```


    org.eclipse.persistence.jpa.PersistenceProvider

    jdbc/wineapp

    com.apress.ejb.chapter03.entities.Address

    com.apress.ejb.chapter03.entities.Customer

    com.apress.ejb.chapter03.entities.CustomerOrder

    false


    org.eclipse.persistence.jpa.PersistenceProvider

    com.apress.ejb.chapter03.entities.Customer


    Listing 3-12

    An Example of a persistence.xml File

    ```


    Notice the attribute version=“2.2” that since JDK version 8 can be used as Ja
    PA version.


    This `persistence.xml` file defines two persistence units, `Chapter03PersistenceUnit`
    and `Chapter03PersistenceUnit-JSE`. The `Customer` class is defined in both. The
    first persistence unit is used by Java EE clients (like session beans), whereas
    the second unit is configured for use by Java SE clients (like the `CustomerService.java`
    class shown in Listing [3-14](#A311833_3_En_3_Chapter.html#Par104)). Specifying
    different configuration settings in the two persistence units allows you to insulate
    the client from the configuration details of the persistent units, and it makes
    an entity that is run in both Java SE and EE environments appear virtually the
    same in both cases.


    ## The EntityManager


    The `EntityManager` is the client’s gateway to entity management services offered
    by the JPA persistence framework. Client sessions must obtain an `EntityManager`
    instance before interacting with persistent entity instances. The `EntityManager`
    provides support for querying, updating, refreshing, and removing existing entity
    instances, and for registering entity classes to create new persistent objects
    with identity.


    ### Persistence Context


    The `EntityManager` maintains a cache of instances within a transactional context
    called a persistence context. The persistence context allows the `EntityManager`
    to track modified, created, and removed entity instances, and to reconcile entity
    instances with changes that were committed by external transactions concurrent
    with the `EntityManagers` own transaction.


    Entity instances queried through the `EntityManager` may be freely passed to clients
    both inside and outside the EJB container. Clients may access and update the entity
    data as they would an ordinary Java object. To apply changes back to the persistent
    store, the client calls the `merge()` method on the `EntityManager` within a transactional
    scope, and the `EntityManager` persists the state of the entity data into the
    back-end store.


    ### Acquiring an EntityManager Instance


    An `EntityManager` instance can be acquired both from within the EJB container
    (Java EE) and outside it (Java SE). This offers clients the flexibility to interact
    with persistent entity beans in a uniform way, without regard to whether the persistence
    code is running inside or outside the Java EE container.


    #### A Session Bean Using Container Injection


    Listing [3-13](#A311833_3_En_3_Chapter.html#Par101) provides an example of a session
    bean acquiring an `EntityManager` instance through container injection.


    ```

    @Stateless

    public class CustomerManager {

    @PersistenceContext(unitName="Chapter03PersistenceUnit")

    private EntityManager em;

    public void createCustomer() {

    final Customer cust = new Customer();

    cust.setName("Moneybags MgGee");

    em.persist(cust);

    }

    }

    Listing 3-13

    A Session Bean Injected with an EntityManager Instance

    ```


    In this example, we use container injection to obtain an `EntityManager` instance
    that is bound to the `Chapter03PersistenceUnit` persistence unit, which includes
    our `Customer` entity from Listing [3-7](#A311833_3_En_3_Chapter.html#Par67).
    We then use this `EntityManager` to persist a new `Customer` instance. Note that
    this example assumes that an ID generator or other service exists to auto-populate
    the primary key of the new instance.


    #### A Java SE Service Client Using an EntityManagerFactory


    There are times when container injection is not an option, or when more control
    over the life cycle of the `EntityManager` is desired by the application. In such
    cases, the client can obtain an `EntityManager` by first acquiring an `EntityManagerFactory`.
    The `javax.persistence.Persistence` class serves as a factory for acquiring an
    `EntityManagerFactory`, and it may be used from both a Java EE environment and
    a Java SE environment. Listing [3-14](#A311833_3_En_3_Chapter.html#Par104) shows
    how an ordinary Java SE service client would obtain an `EntityManager`.


    ```

    public class CustomerService {

    public static void main(String[] args) {

    final EntityManagerFactory emf =

    Persistence.createEntityManagerFactory("Chapter03PersistenceUnit-JSE");

    final EntityManager em = emf.createEntityManager();

    final Customer cust = new Customer();

    cust.setName("Best Customer Ever");

    em.persist(cust);

    }

    }

    Listing 3-14

    A POJO that Serves as an Entity Façade

    ```


    Here we create an `EntityManagerFactory` that is again bound to the `Chapter03PersistenceUnit-JSE`
    persistence unit, which includes our `Customer` entity from Listing [3-7](#A311833_3_En_3_Chapter.html#Par67).
    We then create an `EntityManager` instance from that factory and use it to persist
    a new `Customer` instance.


    #### Looking Up the EntityManager Through JNDI


    A third option, available also through both Java SE and EE environments, is to
    look up the `EntityManagerFactory`, or the `EntityManager` itself, through Java
    Naming and Directory Interface (JNDI). Listing [3-15](#A311833_3_En_3_Chapter.html#Par107)
    shows an example of how this is done from within a session bean.


    ```

    @Stateless

    @PersistenceContext(unitName="Chapter03PersistenceUnit")

    public class CustomerServiceBean {

    @Resource

    SessionContext ctx;

    public void performService() {

    EntityManager em = (EntityManager)ctx.lookup("Chapter03PersistenceUnit");

    // . . .

    }

    }

    Listing 3-15

    EntityManager Lookup Through JNDI

    ```


    The injected `SessionContext` resource provides a JNDI namespace for acquiring
    other resources at runtime.


    ### Transaction Support


    The `EntityManager` also exposes methods to begin, commit, and roll back transactions
    for use with resource-local (non-JTA) transactions. This topic is covered in depth
    in Chapter [8](#A311833_3_En_8_Chapter.html).'
