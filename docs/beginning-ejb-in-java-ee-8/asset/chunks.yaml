- fmt: "### The Notification Page\n\nWe’re almost there! We will add one final JSF\
    \ page `processOrder.jsp` that will display an order submission message to the\
    \ user and provide a link to navigate back to the home page. Listing [12-24](#A311833_3_En_12_Chapter.html#Par216)\
    \ shows the code for `processOrder.jsp`. As you can see, the page is pretty static—it\
    \ prints out notification text and uses an `h:commandLink` component to route\
    \ the user back to the `winehome.jsp` page that shows the list of options for\
    \ searching wines, viewing the contents of the shopping cart, and so on.\n\n```\n\
    Process Order Page\n\nBeginning EJB: Wine Store Application \nYour order has been\
    \ submitted, you will receive an email with order id and details. \n\nListing\
    \ 12-24\nprocessOrder.jsp\n```\n\nFigure [12-26](#A311833_3_En_12_Chapter.html#Fig26)\
    \ (in the “Compiling, Deploying, and Testing the JSF Application” section) shows\
    \ the `processOrder.jsp` page being rendered in the browser.\n\nTo complete the\
    \ process, we will add one final navigation case into `faces-config.xml`, as shown\
    \ in Listing [12-25](#A311833_3_En_12_Chapter.html#Par219).\n\n```\n/processOrder.jsp\n\
    \nwinehome2\n/winehome.jsp\n\nListing 12-25\nfaces-config.xml, with the processOrder\
    \ Navigation Rule\n```\n\nWith that, we have completed the JSF application with\
    \ the control flow shown previously in Figure [12-12](#A311833_3_En_12_Chapter.html#Fig12).\
    \ Now we will look at deploying and executing the completed application and walk\
    \ through the screens that we have developed, which access the EJB back-end application.\n\
    \n## Compiling, Deploying, and Testing the JSF Application\n\nJSF applications\
    \ need to be packaged into Web Archive (WAR) files before they’re assembled into\
    \ Enterprise Archive (EAR) files that hold all of the required modules and libraries\
    \ for the application. Most application servers provide deployment utilities or\
    \ Ant tasks to facilitate deployment of EJBs to their containers. Java-integrated\
    \ development environments (IDEs) like JDeveloper, NetBeans, and Eclipse also\
    \ provide deployment features that allow developers to package, assemble, and\
    \ deploy applications to application servers.\n\nPackaging, assembly, and deployment\
    \ aspects are covered in detail in Chapter [11](#A311833_3_En_11_Chapter.html).\
    \ In this chapter, we have developed a JSF application that accesses the back-end\
    \ application built in Chapter [7](#A311833_3_En_7_Chapter.html). We will perform\
    \ the following steps to deploy and test the JSF application.\n\n### Prerequisites\n\
    \nBefore performing the steps detailed in the next sections, complete the “Getting\
    \ Started” section of Chapter [1](#A311833_3_En_1_Chapter.html), which will walk\
    \ you through the installation and environment setup required for the samples\
    \ in this chapter. Since we have built our JSF application on top of the work\
    \ we have done in Chapter [7](#A311833_3_En_7_Chapter.html), you will need to\
    \ make sure that you have completed the following steps:\n\n*   You must have\
    \ created the resources detailed in the “Creating Data Sources, JMS Resources,\
    \ and Mail Resources” section of Chapter [7](#A311833_3_En_7_Chapter.html).\n\
    *   You must have successfully deployed the application as detailed in the “Deploying\
    \ the Application” section of Chapter [7](#A311833_3_En_7_Chapter.html).\n\n**Note**\n\
    \nThe sample code of Chapter [7](#A311833_3_En_7_Chapter.html) is dependent on\
    \ Chapter [6](#A311833_3_En_6_Chapter.html). Hence, make sure that you have completed\
    \ both Chapter [6](#A311833_3_En_6_Chapter.html) and Chapter [7](#A311833_3_En_7_Chapter.html)\
    \ before you proceed further. Refer to the `Readme.txt` bundled with the sample\
    \ code in case you face any problems in executing the sample code.\n\n### Compiling\
    \ the JSF Application\n\nCopy the `Chapter12-JSFClientSamples` directory and its\
    \ contents into a directory of your choice. As the sample code of this chapter\
    \ references the artifacts of Chapter [6](#A311833_3_En_6_Chapter.html), make\
    \ sure that you have the `Chapter06-WebServiceSamples` directory alongside the\
    \ `Chapter12-JSFClientSamples` directory. Run the NetBeans IDE, and open the `Chapter12-JSFClientSamples`\
    \ file using the `File ➤ Open Project` menu, as shown in Figure [12-13](#A311833_3_En_12_Chapter.html#Fig13).\n\
    \n![A311833_3_En_12_Fig13_HTML.jpg](A311833_3_En_12_Fig13_HTML.jpg)\n\nFigure\
    \ 12-13\n\nOpening the `Chapter12-JSFClientSamples` file\n\n**Note**\n\nBefore\
    \ you open the `Chapter12-JSFClientSamples` file within NetBeans, make sure you\
    \ have closed the `Chapter07-ServiceIntegration` project and `Chapter06-WebServiceSamples`\
    \ from the NetBeans IDE. The sample code of Chapter [12](#A311833_3_En_12_Chapter.html)\
    \ is built on top of Chapter [6](#A311833_3_En_6_Chapter.html) and Chapter [7](#A311833_3_En_7_Chapter.html),\
    \ and having these projects open within NetBeans will result in compilation errors.\
    \ NetBeans will automatically open the required projects when `Chapter12-JSFClientSamples`\
    \ is opened.\n\nExpand the `Chapter12-JSFClientSamples-war` node, and observe\
    \ that all of the JSF files and managed beans discussed in this chapter are listed\
    \ as shown in Figure [12-14](#A311833_3_En_12_Chapter.html#Fig14).\n\n![A311833_3_En_12_Fig14_HTML.jpg](A311833_3_En_12_Fig14_HTML.jpg)\n\
    \nFigure 12-14\n\nVerifying the packages in the `Chapter12-JSFClientSamples-war`\
    \ project\n\nInvoke the context menu on the `Chapter07-ServiceIntegration` node,\
    \ and build the application by selecting the `Clean and Build` menu option, as\
    \ shown in Figure [12-15](#A311833_3_En_12_Chapter.html#Fig15). The JSF pages\
    \ and their managed beans will compile without any errors.\n\n![A311833_3_En_12_Fig15_HTML.jpg](A311833_3_En_12_Fig15_HTML.jpg)\n\
    \nFigure 12-15\n\nBuilding the project"
