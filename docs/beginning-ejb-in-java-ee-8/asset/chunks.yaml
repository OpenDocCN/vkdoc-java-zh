- fmt: '### Example: Annotating Instance Variables


    The code snippet in Listing [3-4](#A311833_3_En_3_Chapter.html#Par55) demonstrates
    instance variable annotation, and it illustrates validation and side-effect code.
    In this example, which can also be found in the Source Code area for this chapter,
    the entity provider narrows the client interface to expose only the `get`/`setZipCode()`
    methods, but specifies both `zipCodeInternal` and `zipCode` properties to the
    persistence provider. Placing annotations on the instance variables provides a
    clean separation between the entity’s client-side API and its persistence-side
    interface.


    ```java

    @Entity

    public class Address implements Serializable {

    @Id

    private long addressId;

    @Column(name = "ZIP")

    private int zipCodeInternal;

    @Transient

    private String zipCode;

    public long getAddressId() { return addressId; }

    public void setAddressId(long addressId) { this.addressId = addressId; }

    public String getZipCode() {

    if (zipCode == null && zipCodeInternal > 0) {

    zipCode = convertToStr(zipCodeInternal);

    }

    return zipCode;

    }

    public void setZipCode(String zipCode) throws IllegalArgumentException {

    //  Validate the zipcode String, to make sure it reduces cleanly to

    //  either a 5- or 9- digit integer, and assign it to the internal

    //  persistent ''zipCodeInternal'' class field

    //  . . . . . .

    this.zipCode = zipCode;

    zipCodeInternal = convertToInt(zipCode);

    }

    private int convertToInt(String zipCode) {

    return new Integer(zipCode).intValue();

    }

    private String convertToStr(int zipCode) {

    return new Integer(zipCode).toString();

    }

    }

    Listing 3-4

    An Entity That Uses Instance Variable Annotations

    ```


    The `get`/`setZipCode()` methods allow the entity to transform the internal data
    lazily into a client-friendly `String` representation, but only when requested.
    No property accessors are even specified for the `zipCodeInternal` instance variable.


    #### The @Transient Annotation


    You may not wish to make all fields or properties of an entity class persistent.
    Derived or transient fields may be annotated `@Transient` to indicate that they
    should be ignored by the persistence framework. The `zipCode` instance variable
    is marked `@Transient`, indicating that the persistence provider should not manage
    it. This instance variable serves only to adapt the internal `int` value into
    a client-friendly, derived `String` value.


    ### Example: Annotating Property Accessors


    Listing [3-5](#A311833_3_En_3_Chapter.html#Par59) demonstrates how an entity developer
    may use side-effect code when annotating an entity’s property accessors.


    ```java

    @Entity

    public class Address implements Serializable {

    private BigDecimal addressId;

    private int zipCode;

    private String city;

    @Id

    public BigDecimal getAddressId() { return addressId; }

    public void setAddressId(BigDecimal addressId) { this.addressId = addressId; }

    public int getZipCode() { return zipCode; }

    public void setZipCode(int zipCode) {

    if (zipCode != this.zipCode)

    {

    city = null; // Force city to be lazily re-derived

    this.zipCode = zipCode;

    }

    }

    public String getCity() {

    //  Derive the city from the zipcode property, if available

    if (city == null && zipCode > 0) {

    city = deriveCityFromZip();

    }

    return city;

    }

    public void setCity(String city) {

    this.city = city;

    }

    private String deriveCityFromZip() {

    /* Implementation here. . . */

    return null;

    }

    }

    Listing 3-5

    An Entity That Uses Property Accessor Annotations

    ```


    Placing the `@Id` annotation on the `getAddressId()` property accessor disambiguates
    the access policy, indicating that property accessors should be used by the persistence
    provider. Forcing the persistence provider to assign data through the property
    accessor affords the entity the opportunity to reset the `city` value when a new
    zip code is assigned. Also, knowing that the `city` field will be obtained by
    the persistence manager through its getter method allows the entity lazily to
    calculate its value only when requested through the `getCity()` accessor. Should
    the usage of this entity involve many calls to `setZipCode()` before the entity
    is persisted (or merged) out to the database, it is more efficient to defer deriving
    the `city` value until it is actually requested. Were this entity to use instance
    variable access, it would be necessary to update the `city` field eagerly each
    time the `zipCode` was assigned, since a request could come at any time to merge
    the entity changes into the database. As mentioned earlier, however, the use of
    entity lifecycle callback methods could avoid the overhead of eagerly deriving
    this value.


    #### Access Type Summary


    JPA offers two models for how the persistence provider accesses the field data
    on an entity, either directly through instance variables and indirectly through
    property accessors. In the general case, we have found that annotating an entity’s
    instance variables is preferable to annotating its property accessors. You’ll
    rarely have a need to validate data coming in from the persistent store, and any
    side-effect code in setter methods typically should be performed lazily, not eagerly
    at the time the entity is instantiated. Furthermore, field-level annotations allow
    you to decouple the public property types exposed through that field’s get/set
    methods from the underlying column representation. For instance, you may want
    to expose the `zipCode` property as a `String` through the `getZipcode()/setZipcode()`
    methods, but convert it internally to an integer, using a field of type `Integer`,
    for persistence to an `INTEGER` column in the database. Finally, the use of entity
    lifecycle callback methods provides the opportunity for additional initialization
    or preparation, both after the entity data is loaded and before it is saved.


    ### Declaring the Primary Key


    An entity must declare its primary key. The primary key serves to identify an
    entity instance uniquely among all of the instances of the entity type. A primary
    key may be simple, represented by a single field of a basic Java class, like `String`
    or `Long`, as in the previous `Customer` example (Listing [3-2](#A311833_3_En_3_Chapter.html#Par23)).
    Alternatively, a primary key may be complex, represented by a composite class
    comprised of multiple elementary fields or properties.


    The underlying column or columns on the entity’s table that are mapped to by the
    primary key field or fields may be formally bound by a database primary key constraint,
    but this is not a requirement. It is, however, required that the primary key column
    value or values for any entity instance resolve to a unique value across all instances
    of that entity. Database constraints are useful in enforcing this requirement,
    and in their absence, care should be taken to ensure that unique values are assigned
    by application.'
