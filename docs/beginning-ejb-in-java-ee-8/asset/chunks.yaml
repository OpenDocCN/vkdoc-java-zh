  trans: '

    ## 什么是事务？


    在本节中，我们将探讨以下问题：


    *   什么是事务，为什么它对企业应用至关重要？

    *   定义稳健可靠事务的核心 ACID（原子性、一致性、隔离性、持久性）属性是什么？

    *   什么是 JTA，什么是分布式事务，什么是两阶段提交？


    事务是一组必须作为一个单元执行的操作。这些操作可以是同步或异步的，可能涉及持久化数据对象、发送电子邮件、验证信用卡以及许多其他事件。一个经典的例子是银行转账，其中一个操作从一个账户扣除资金（即更新数据库表中的一条记录），另一个操作将相同的资金存入另一个账户（更新同一或不同数据库表中的另一行）。从查询这两个账户的外部应用程序的角度来看，绝不能出现这些资金同时在两个账户中可见的情况。也不能存在资金在两个账户中都不可见的时刻。只有当此事务中的两个操作都成功执行后，这些更改才能从另一个应用程序上下文中可见。必须以这种方式作为一个单元一起执行的一组操作，被称为事务。


    事务中的操作按顺序或并行执行，通常在一个（相对较短的）时间段内完成。在所有操作都执行完毕后，事务被应用，即提交。如果在事务执行过程中出现错误或其他无效状况，事务可能会被取消，即回滚，并且在该事务上下文中已执行的操作将被撤销。


    ### 分布式事务


    当事务中的操作跨数据库或位于不同计算机或进程上的其他资源执行时，这被称为分布式事务。此类企业级事务需要在所涉及的资源之间进行特殊协调，并且极难可靠地编程。这正是
    JTA 的用武之地，它提供了资源可以实现并绑定以参与分布式事务的接口。


    EJB 容器是一个支持 JTA 的事务管理器，因此它可以参与涉及其他 EJB 容器以及第三方 JTA 资源（如许多数据库管理系统 (DBMS)）的分布式事务。这减轻了业务应用程序开发人员协调分布式事务的复杂性，使他们能够自由地集成松散耦合的服务，并按照自己的选择在企业中分布数据。此外，正如您将在以下各节中看到的，EJB
    允许开发人员选择是显式地划分事务边界——通过调用 begin、commit 或 roll back（取消）事务——还是允许 EJB 容器沿着 EJB 方法边界自动执行事务划分。


    ### 事务的 ACID 属性


    不，不是那种迷幻的 Kool-Aid。事务形式多样、规模各异，可能涉及同步和异步操作，但它们都具有一些共同的核心特性，即 ACID 组件。ACID 指的是定义稳健可靠事务的四个特性：原子性、一致性、隔离性和持久性。表
    8-1 描述了这四个组件。


    表 8-1


    事务的 ACID 属性


    | 特性 | 描述 |

    | --- | --- |

    | 原子性 | 事务由一个或多个作为一组（称为工作单元）执行的操作组成。原子性确保在事务结束时，这些操作要么全部成功执行（成功提交），要么全部不执行（成功回滚）。在事务结束时，如果只有部分操作完成，则违反了原子性。
    |

    | 一致性 | 一致的事务具有数据完整性。一致性确保在事务结束时，数据处于一致状态，从而不会违反数据库约束或逻辑验证规则。 |

    | 隔离性 | 事务隔离性规定外部世界无法看到事务的中间状态。查看事务中涉及的数据对象的外部程序，在事务提交之前不得看到修改后的数据对象。事务隔离性本身是一门复杂的科学，在很大程度上超出了本讨论的范围，但可以说，EJB
    服务器提供商通常提供可配置的隔离设置，让您可以选择事务范围内的资源彼此看到对方待定更改的程度，以及在上下文事务期间外部提交的更改（脏读）的程度。没有标准的隔离设置，因此可移植的应用程序不应依赖其运行时环境中的特定配置。
    |

    | 持久性 | 正确执行的事务是永久性的，不会受到任何系统故障的影响。将数据提交到关系数据库中（随后可以查询结果）通常可以实现这一要求。 |


    自然，EJB 满足了所有这些要求，我们将在后续示例中指出如何处理每一项。


    ### Java 事务 API (JTA)


    JTA 为客户端和事务感知的资源管理器定义了一个接口，以参与容错的分布式事务。EJB 自动绑定到这些服务，因此客户端和企业 Bean 都可以方便地参与分布式编程，而无需显式编写诸如两阶段提交协议之类的逻辑。EJB
    进入其 JTA 事务的主要接口是通过 `javax.transaction.UserTransaction` 对象接口，该接口由 EJB 容器实例化，并可通过注入到企业
    Bean 类或通过 Java 命名和目录接口 (JNDI) 查找获得。


    ### 两阶段提交协议


    如果您使用关系数据库编写过逻辑，您可能熟悉两阶段提交协议。该策略赋予参与分布式事务的资源管理器否决权，通过“准备”命令通知它们即将发出提交，并允许它们声明是否可以应用其更改。只有当所有资源管理器一致同意它们已准备好应用其更改时，事务管理器才会下达最终命令来实际应用更改。通常，资源管理器在“准备”步骤中执行大部分更改，因此最终的“提交”步骤执行起来微不足道。这降低了在“提交”步骤中发生错误的可能性。稳健的事务管理器和资源管理器甚至能够处理这种意外情况。

    '
- fmt: "# Transaction Support in EJB\n\nThis section will explore the following questions:\n\
    \n- What transaction services are available to enterprise bean developers?\n-\
    \ How do session beans, message-driven beans (MDBs), and entities interact in\
    \ a transactional context?\n\nMuch of the infrastructure in the EJB server is\
    \ dedicated to supporting these services, and for good reason. Not only does EJB\
    \ provide a robust JTA transaction manager, it makes it accessible through declarative\
    \ metadata that can be specified on interoperable, portable business components.\
    \ Virtually all Java EE applications require transaction services, and EJB brings\
    \ them to the application developer in a very slick package.\n\nFrom its inception,\
    \ the EJB framework has provided a convenient way to manage transactions and access\
    \ control by letting you define the behavior declaratively on a method-by-method\
    \ basis. Beyond these container-provided services, EJB lets you turn control over\
    \ to your application to define transaction event boundaries and other custom\
    \ behavior.\n\nIn this chapter, we look at the role transactions play in accomplishing\
    \ a range of common tasks in your application. In a typical Java EE application,\
    \ session beans typically serve to establish the boundaries of a transaction and\
    \ manipulate entities to interact with the database in the transactional context.\
    \ Our examples mix session bean and entity operations to illustrate both the built-in\
    \ (declarative) and manual behavior provided by EJB. In the spirit of the simplified\
    \ development model, EJB provides a lot of its most useful features by default,\
    \ so it should come as no surprise that the default transaction options are both\
    \ useful and powerful.\n\n## EJB Transaction Services\n\nThe EJB transaction model\
    \ is built on this JTA model, in which session beans or other application clients\
    \ provide the transactional context in which enterprise services are performed\
    \ as a logical unit of work. Enterprise services in the Java EE environment that\
    \ typically operate in a transactional context include creating, retrieving, updating,\
    \ and deleting entities; sending JMS messages to the queue; executing MDBs; firing\
    \ e-mail requests; invoking Web services; executing JDBC operations; and much\
    \ more.\n\nEJB provides a built-in JTA transaction manager, but the real power\
    \ lies in the declarative services that EJB offers to bean providers. Using metadata\
    \ tags instead of programmatic logic, EJB developers can seamlessly participate\
    \ in JTA transactions and declaratively control the transactional behavior of\
    \ each business method on an enterprise bean.\n\nEJB extends this programming\
    \ model by providing explicit support for both JTA transactions and non-JTA (resource-local)\
    \ transactions. Resource-local transactions are restricted to a single resource\
    \ manager, such as a database connection, but may result in a performance optimization\
    \ by avoiding the overhead of a distributed transaction monitor.\n\nIn addition,\
    \ application builders may leverage the container-provided services for automatically\
    \ managing transactions, or they may choose to take control of the transaction\
    \ boundaries and handle the transaction begin, commit, and rollback events explicitly.\
    \ Within a single application, both approaches may be used, in combination if\
    \ desired. Whereas the choice of whether to have the container or the application\
    \ itself demarcate transactions is defined on the enterprise bean, the decision\
    \ of which type of transaction model to use with JPA entities—JTA or resource-local—is\
    \ determined by how the persistence unit is configured in the `persistence.xml`\
    \ file.\n\nThe persistent objects in the game—the entities—are entirely, and happily,\
    \ unaware of their governing transaction framework. The transactional context\
    \ in which an entity operates is not part of its definition, and so the same entity\
    \ class may be used in whatever transactional context the application chooses,\
    \ provided an appropriate `EntityManager` is created to service the entity’s lifecycle\
    \ events.\n\nIf all of this seems a little daunting at this point, fear not. It\
    \ will all make sense once we walk through some examples in code that demonstrate\
    \ how all the pieces work together. It is also worth noting that EJB’s built-in\
    \ Container-Managed Transaction (CMT) support is more than adequate for most applications\
    \ running inside the EJB container. This chapter will let you explore your options—but\
    \ unless you are writing applications involving entities that live wholly outside\
    \ of the EJB container, the default support is likely to serve your needs quite\
    \ nicely.\n\n## Session Bean Transactional Behavior in the Service Model\n\nThis\
    \ next section will explore the following questions:\n\n- What declarative transaction\
    \ support does the EJB container offer to session beans?\n  - What is the difference\
    \ between container-managed transaction (CMT) demarcation and bean-managed transaction\
    \ (BMT) demarcation? When would you choose one approach over the other?\n  - What\
    \ are CMT attributes?\n  - How does EJB support the explicit demarcation of transaction\
    \ boundaries using bean-managed transaction (BMT) beans?\n- What is implicit vs.\
    \ explicit commit behavior?\n\nThe enterprise bean is the heart of the EJB service\
    \ layer. Through session beans, the EJB container offers declarative demarcation\
    \ of transaction events, along with the option to demarcate transaction events\
    \ explicitly in the bean or in the application client code. Let’s consider these\
    \ two approaches separately, beginning with the default option: leveraging container-managed\
    \ transaction demarcation using declarative markup."
