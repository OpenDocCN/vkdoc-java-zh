    In the next section, we will look at compiling, deploying, and running the use
    case on which we have worked.


    ## Compiling, Deploying, and Testing MDBs


    MDBs need to be packaged into EJB JAR (Java Archive) files before they can be
    deployed into EJB containers. These EJB archives can then be deployed. (For some
    EJB containers or application servers, they need to be assembled into EAR [Enterprise
    Archive] files). Most EJB containers or application servers provide deployment
    utilities or Ant tasks to facilitate deployment of EJBs to their containers. Java-integrated
    development environments (IDEs) like JDeveloper, NetBeans, and Eclipse also provide
    deployment features that allow developers to package, assemble, and deploy EJBs
    to application servers. Packaging, assembly, and deployment aspects are covered
    in detail in Chapter [11](#A311833_3_En_11_Chapter.html).


    In this chapter, we have developed one stateless session bean (`OrderProcessing`)
    and one MDB (`StatusMailer`). JMS providers have to be configured with queues
    and topics that will be used by the client application and MDB accordingly before
    the MDBs are deployed.


    The following sections describe the steps to compile, deploy, and test these MDBs
    and session beans.


    ### Prerequisites


    Before performing any of the steps detailed in the next sections, complete the
    “Getting Started” section of Chapter [1](#A311833_3_En_1_Chapter.html), which
    will walk you through the installation and environment setup required for the
    samples in this chapter.'
