- fmt: "# Timer Service\n\nThe EJB Timer Service is a container-managed service that\
    \ allows callbacks to be scheduled for time-based events. Timer notifications\
    \ can be scheduled to occur at a calendar-based schedule, at a specific time,\
    \ after a specific time, or at specific recurring intervals.\n\nRemember that\
    \ Enterprise bean timers are either programmatic timers or automatic timers.\n\
    \nUse timers for application-level processes. Don’t use timers for real-time events.\
    \ Typical examples of using a timer include the following:\n\n* A timer in an\
    \ expense reporting application prints newly filed expenses every evening at 9\
    \ PM.\n* A timer in a bug tracking application emails a list of open bugs to team\
    \ members every morning at 6 AM.\n* A timer in a human resources application emails\
    \ a list of public holidays to all the employees on the 1st of January every year.\n\
    \n**Note**\n\nThe timer service of the enterprise bean can be used to enable scheduling\
    \ timed notifications for all types of enterprise beans except for stateful session\
    \ beans.\n\nAs we just said Enterprise bean timers are either programmatic timers\
    \ or automatic timers. The programmatic timers can be set by explicitly calling\
    \ one of the timer creation methods of the `TimerService` interface, while the\
    \ automatic timers are created by deploying an enterprise bean that contains a\
    \ method annotated with the `javax.ejb.Schedule` or `javax.ejb.Schedules` annotations.\n\
    \nCreating a timer is simplified in EJB 3.1 via introduction of `@Schedule` and\
    \ `@Schedules` annotations that automatically create timers based on metadata\
    \ specified on a method. In Listing [2-22](#A311833_3_En_2_Chapter.html#Par210),\
    \ we augment our `LogShopperCount` by adding a recurring timer that will log the\
    \ shopper count every two hours.\n\n```\npackage com.apress.ejb.chapter02;\nimport\
    \ javax.ejb.DependsOn;\nimport javax.ejb.Schedule;\nimport javax.ejb.Singleton;\n\
    import javax.ejb.Startup;\n@Singleton\n@Startup\n@DependsOn(\"ShopperCountBean\"\
    )\npublic class LogShopperCount {\n// Logs shopper count every 2 hours\n@Schedule(hour=\"\
    */2\")\npublic void logShopperCount() {\n// Log shopper count\n}\n}\nListing 2-22\n\
    LogShopperCount.java\n```\n\nPass the `Timer` object in methods annotated with\
    \ `@Schedule` to get information about the timer. Listing [2-23](#A311833_3_En_2_Chapter.html#Par212)\
    \ demonstrates the use of the `Timer` object to get information about the timer\
    \ that just expired.\n\n```\npackage com.apress.ejb.chapter02;\nimport javax.ejb.DependsOn;\n\
    import javax.ejb.Schedule;\nimport javax.ejb.Singleton;\nimport javax.ejb.Startup;\n\
    import javax.ejb.Timer;\n@Singleton\n@Startup\n@DependsOn(\"ShopperCount\")\n\
    public class LogShopperCount {\n// Logs shopper count every 2 hours\n@Schedule(hour=\"\
    */2\")\npublic void logShopperCount(Timer timer) {\n// Log shopper count\nString\
    \ timerInfo = (String) timer.getInfo();\nSystem.out.println(timerInfo);\n}\n}\n\
    Listing 2-23\nLogShopperCount.java\n```\n\n## Calendar-Based Time Expressions\n\
    \nThe Timer Service is inspired by the UNIX `cron` utility. Table [2-1](#A311833_3_En_2_Chapter.html#Tab1)\
    \ lists the various attributes of a calendar-based time expression.\n\n**Table\
    \ 2-1** Attributes of calendar-based time expression\n\n| Attribute | Description\
    \ | Allowable Values | Default |\n| --- | --- | --- | --- |\n| second | One or\
    \ more seconds within a minute | [ 0, 59 ] | 0 |\n| minute | One or more minutes\
    \ within an hour | [ 0, 59 ] | 0 |\n| hour | One or more hours within a day |\
    \ [ 0, 23 ] | 0 |\n| dayOfMonth | One or more days within a month | [ 1, 31 ]\
    \ or [ −7, -1 ] or “Last” or {1st, 2nd, 3rd, 4th, 5th, “Last”} {“Sun”, “Mon”,\
    \ “Tue”, “Wed”, “Thu”, “Fri”, “Sat”} | * |\n| month | One or more months within\
    \ a year | [ 1, 12 ] or {“Jan”, “Feb”, “Mar”, “Apr”, “May”, “Jun”, “Jul”, “Aug”,\
    \ “Sep”, “Oct”, “Nov”, “Dec”} | * |\n| dayOfWeek | One or more days within a week\
    \ | [ 0, 7 ] or {“Sun”, “Mon”, “Tue”, “Wed”, “Thu”, “Fri”, “Sat”} | * |\n| year\
    \ | A particular calendar year | 4-digit calendar year | * |\n\n**Note**\n\nFor\
    \ `dayOfWeek`, both 0 and 7 represent Sunday and a negative number (−7 to −1),\
    \ which means the nth day or days before the end of the month. All string constants\
    \ (“Sun”, “Jan”, “Last”, “1st”) are case insensitive. Increments are supported\
    \ only by second, minute, and hour. Duplicate values within a list are ignored.\n\
    \n## Examples of Calendar-Based Time Expressions\n\nLet us see some examples that\
    \ demonstrate the use of calendar-based time expressions.\n\n* “Every second of\
    \ every minute of every hour of everyday”\n  * `@Schedule(second=\"*\", minute=\"\
    *\", hour=\"*\")`\n* “Every fifteen minutes within the hour”\n  * `@Schedule(minute=\"\
    */15\", hour=\"*\")`\n  * `@Schedule(minute=\"0, 15, 30, 45\", hour=\"*\")`\n\
    * “Every Friday at midnight”\n  * `@Schedule(dayOfWeek=\"Fri\")`\n* “Every six\
    \ hours on weekends”\n  * `@Schedule(hour=\"*/6\", dayOfWeek=\"Sat, Sun\")`\n\
    * “Every weekday morning at 7:30am U.S. Pacific Time”\n  * `@Schedule(minute=\"\
    30\", hour=\"7\", dayOfWeek=\"Mon-Fri\", timezone=\"America/Los_Angeles\")`\n\
    * “On 10th of January and September at 6am”\n  * `@Schedule(month=\"Jan, Sep\"\
    , dayOfMonth=\"10\", hour=\"6\")`\n* “Last Friday of December at 6pm”\n  * `@Schedule(month=\"\
    Dec\", dayOfMonth=\"Last Fri\", hour=\"18\")`\n* “Second to last day (one day\
    \ before the last day) of each month”\n  * `@Schedule(dayOfMonth=\"-1\")`\n* “Every\
    \ day only for year 2013”\n  * `@Schedule(year=\"2013\")`\n\n## Timer Persistence\n\
    \nTimers are persistent. A timer is persisted by the Timer Service by storing\
    \ it in a database. The database used by the Timer Service can be changed by setting\
    \ the Timer Service’s Timer DataSource setting to a valid JDBC resource. Persistence\
    \ helps timers survive application shutdown, container crashes, and container\
    \ shutdowns.\n\nPersistence can be disabled on a per-timer basis by setting the\
    \ persistent attribute of the `@Schedule` annotation to false. A non-persistent\
    \ timer’s lifetime is associated with the JVM that created it. A non-persistent\
    \ timer is considered cancelled in the event of application shutdown, container\
    \ crash, or crash/shutdown of the JVM on which the timer was created."
  raw: "## Timer Service\n\nThe EJB Timer Service is a container-managed service that\
    \ allows callbacks to be scheduled for time-based events. Timer notifications\
    \ can be scheduled to occur at a calendar-based schedule, at a specific time,\
    \ after a specific time, or at specific recurring intervals.\n\nRemember that\
    \ Enterprise bean timers are either programmatic timers or automatic timers.\n\
    \nUse timers for application-level processes. Don’t use timers for real-time events.\
    \ Typical examples of using a timer include the following:\n\n*   A timer in an\
    \ expense reporting application prints newly filed expenses every evening at 9\
    \ PM.\n*   A timer in a bug tracking application emails a list of open bugs to\
    \ team members every morning at 6 AM.\n*   A timer in a human resources application\
    \ emails a list of public holidays to all the employees on the 1st of January\
    \ every year.\n\nNote\n\nThe timer service of the enterprise bean can be used\
    \ to enable scheduling timed notifications for all types of enterprise beans except\
    \ for stateful session beans.\n\nAs we just said Enterprise bean timers are either\
    \ programmatic timers or automatic timers. The programmatic timers can be set\
    \ by explicitly calling one of the timer creation methods of the TimerService\
    \ interface, while the automatic timers are created by deploying an enterprise\
    \ bean that contains a method annotated with the javax.ejb.Schedule or javax.ejb.Schedules\
    \ annotations.\n\nCreating a timer is simplified in EJB 3.1 via introduction of\
    \ `@Schedule` and `@Schedules` annotations that automatically create timers based\
    \ on metadata specified on a method. In Listing [2-22](#A311833_3_En_2_Chapter.html#Par210),\
    \ we augment our `LogShopperCount` by adding a recurring timer that will log the\
    \ shopper count every two hours.\n\n```\npackage com.apress.ejb.chapter02;\nimport\
    \ javax.ejb.DependsOn;\nimport javax.ejb.Schedule;\nimport javax.ejb.Singleton;\n\
    import javax.ejb.Startup;\n@Singleton\n@Startup\n@DependsOn(\"ShopperCountBean\"\
    )\npublic class LogShopperCount {\n// Logs shopper count every 2 hours\n@Schedule(hour=\"\
    */2\")\npublic void logShopperCount() {\n// Log shopper count\n}\n}\nListing 2-22\n\
    LogShopperCount.java\n```\n\nPass the `Timer` object in methods annotated with\
    \ `@Schedule` to get information about the timer. Listing [2-23](#A311833_3_En_2_Chapter.html#Par212)\
    \ demonstrates the use of the `Timer` object to get information about the timer\
    \ that just expired.\n\n```\npackage com.apress.ejb.chapter02;\nimport javax.ejb.DependsOn;\n\
    import javax.ejb.Schedule;\nimport javax.ejb.Singleton;\nimport javax.ejb.Startup;\n\
    import javax.ejb.Timer;\n@Singleton\n@Startup\n@DependsOn(\"ShopperCount\")\n\
    public class LogShopperCount {\n// Logs shopper count every 2 hours\n@Schedule(hour=\"\
    */2\")\npublic void logShopperCount(Timer timer) {\n// Log shopper count\nString\
    \ timerInfo = (String) timer.getInfo();\nSystem.out.println(timerInfo);\n}\n}\n\
    Listing 2-23\nLogShopperCount.java\n```\n\n### Calendar-Based Time Expressions\n\
    \nThe Timer Service is inspired by the UNIX `cron` utility. Table [2-1](#A311833_3_En_2_Chapter.html#Tab1)\
    \ lists the various attributes of a calendar-based time expression.\n\nTable 2-1\n\
    \nAttributes of calendar-based time expression\n\n| Attribute | Description |\
    \ Allowable Values | Default |\n| --- | --- | --- | --- |\n| second | One or more\
    \ seconds within a minute | [ 0, 59 ] | 0 |\n| minute | One or more minutes within\
    \ an hour | [ 0, 59 ] | 0 |\n| hour | One or more hours within a day | [ 0, 23\
    \ ] | 0 |\n| dayOfMonth | One or more days within a month | [ 1, 31 ] or [ −7,\
    \ -1 ] or “Last” or {1st, 2nd, 3rd, 4th, 5th, “Last”} {“Sun”, “Mon”, “Tue”, “Wed”,\
    \ “Thu”, “Fri”, “Sat”} | * |\n| month | One or more months within a year | [ 1,\
    \ 12 ] or {“Jan”, “Feb”, “Mar”, “Apr”, “May”, “Jun”, “Jul”, “Aug”, “Sep”, “Oct”,\
    \ “Nov”, “Dec”} | * |\n| dayOfWeek | One or more days within a week | [ 0, 7 ]\
    \ or {“Sun”, “Mon”, “Tue”, “Wed”, “Thu”, “Fri”, “Sat”} | * |\n| year | A particular\
    \ calendar year | 4-digit calendar year | * |\n\nNote\n\nFor `dayOfWeek`, both\
    \ 0 and 7 represent Sunday and a negative number (−7 to −1), which means the nth\
    \ day or days before the end of the month. All string constants (“Sun”, “Jan”,\
    \ “Last”, “1st”) are case insensitive. Increments are supported only by second,\
    \ minute, and hour. Duplicate values within a list are ignored.\n\n### Examples\
    \ of Calendar-Based Time Expressions\n\nLet us see some examples that demonstrate\
    \ the use of calendar-based time expressions.\n\n*   “Every second of every minute\
    \ of every hour of everyday”\n    *   `@Schedule(second=\"*\", minute=\"*\", hour=\"\
    *\")`\n*   “Every fifteen minutes within the hour”\n    *   `@Schedule(minute=\"\
    */15\", hour=\"*\")`\n    *   `@Schedule(minute=\"0, 15, 30, 45\", hour=\"*\"\
    )`\n*   “Every Friday at midnight”\n    *   `@Schedule(dayOfWeek=\"Fri\")`\n*\
    \   “Every six hours on weekends”\n    *   `@Schedule(hour=\"*/6\", dayOfWeek=\"\
    Sat, Sun\")`\n*   “Every weekday morning at 7:30am U.S. Pacific Time”\n    * \
    \  `@Schedule(minute=\"30\", hour=\"7\", dayOfWeek=\"Mon-Fri\", timezone=\"America/Los_Angeles\"\
    )`\n*   “On 10th of January and September at 6am”\n    *   `@Schedule(month=\"\
    Jan, Sep\", dayOfMonth=\"10\", hour=\"6\")`\n*   “Last Friday of December at 6pm”\n\
    \    *   `@Schedule(month=\"Dec\", dayOfMonth=\"Last Fri\", hour=\"18\")`\n* \
    \  “Second to last day (one day before the last day) of each month”\n    *   `@Schedule(dayOfMonth=\"\
    -1\")`\n*   “Every day only for year 2013”\n    *   `@Schedule(year=\"2013\")`\n\
    \n### Timer Persistence\n\nTimers are persistent. A timer is persisted by the\
    \ Timer Service by storing it in a database. The database used by the Timer Service\
    \ can be changed by setting the Timer Service’s Timer DataSource setting to a\
    \ valid JDBC resource. Persistence helps timers survive application shutdown,\
    \ container crashes, and container shutdowns.\n\nPersistence can be disabled on\
    \ a per-timer basis by setting the persistent attribute of the `@Schedule` annotation\
    \ to false. A non-persistent timer’s lifetime is associated with the JVM that\
    \ created it. A non-persistent timer is considered cancelled in the event of application\
    \ shutdown, container crash, or crash/shutdown of the JVM on which the timer was\
    \ created."
  trans: "\n## 定时器服务\n\nEJB 定时器服务是一种容器管理服务，允许为基于时间的事件调度回调。定时器通知可以按日历计划、在特定时间、特定时间之后或按特定的重复间隔进行调度。\n\
    \n请记住，企业 Bean 定时器要么是编程式定时器，要么是自动定时器。\n\n将定时器用于应用程序级别的流程。不要将定时器用于实时事件。使用定时器的典型示例包括：\n\
    \n*   费用报告应用程序中的定时器，每晚 9 点打印新提交的费用。\n*   错误跟踪应用程序中的定时器，每天早上 6 点向团队成员发送未解决错误的列表。\n\
    *   人力资源应用程序中的定时器，每年 1 月 1 日向所有员工发送公共假期列表。\n\n注意\n\n企业 Bean 的定时器服务可用于为除有状态会话 Bean\
    \ 之外的所有类型的企业 Bean 启用定时通知的调度。\n\n正如我们刚才所说，企业 Bean 定时器要么是编程式定时器，要么是自动定时器。编程式定时器可以通过显式调用\
    \ `TimerService` 接口的定时器创建方法来设置，而自动定时器则通过部署一个包含使用 `javax.ejb.Schedule` 或 `javax.ejb.Schedules`\
    \ 注解的方法的企业 Bean 来创建。\n\n在 EJB 3.1 中，通过引入 `@Schedule` 和 `@Schedules` 注解，创建定时器得到了简化，这些注解会根据方法上指定的元数据自动创建定时器。在清单\
    \ 2-22 中，我们通过添加一个每两小时记录一次购物者数量的重复定时器来增强我们的 `LogShopperCount`。\n\n```\npackage\
    \ com.apress.ejb.chapter02;\nimport javax.ejb.DependsOn;\nimport javax.ejb.Schedule;\n\
    import javax.ejb.Singleton;\nimport javax.ejb.Startup;\n@Singleton\n@Startup\n\
    @DependsOn(\"ShopperCountBean\")\npublic class LogShopperCount {\n// 每 2 小时记录一次购物者数量\n\
    @Schedule(hour=\"*/2\")\npublic void logShopperCount() {\n// 记录购物者数量\n}\n}\n清单\
    \ 2-22\nLogShopperCount.java\n```\n\n将 `Timer` 对象传递给使用 `@Schedule` 注解的方法，以获取有关定时器的信息。清单\
    \ 2-23 演示了如何使用 `Timer` 对象获取有关刚刚到期的定时器的信息。\n\n```\npackage com.apress.ejb.chapter02;\n\
    import javax.ejb.DependsOn;\nimport javax.ejb.Schedule;\nimport javax.ejb.Singleton;\n\
    import javax.ejb.Startup;\nimport javax.ejb.Timer;\n@Singleton\n@Startup\n@DependsOn(\"\
    ShopperCount\")\npublic class LogShopperCount {\n// 每 2 小时记录一次购物者数量\n@Schedule(hour=\"\
    */2\")\npublic void logShopperCount(Timer timer) {\n// 记录购物者数量\nString timerInfo\
    \ = (String) timer.getInfo();\nSystem.out.println(timerInfo);\n}\n}\n清单 2-23\n\
    LogShopperCount.java\n```\n\n### 基于日历的时间表达式\n\n定时器服务的灵感来源于 UNIX `cron` 工具。表 2-1\
    \ 列出了基于日历的时间表达式的各种属性。\n\n表 2-1\n\n基于日历的时间表达式的属性\n\n| 属性 | 描述 | 允许值 | 默认值 |\n|\
    \ --- | --- | --- | --- |\n| second | 一分钟内的一秒或多秒 | [ 0, 59 ] | 0 |\n| minute |\
    \ 一小时内的一分钟或多分钟 | [ 0, 59 ] | 0 |\n| hour | 一天内的一小时或多小时 | [ 0, 23 ] | 0 |\n| dayOfMonth\
    \ | 一个月内的一天或多天 | [ 1, 31 ] 或 [ −7, -1 ] 或 “Last” 或 {1st, 2nd, 3rd, 4th, 5th, “Last”}\
    \ {“Sun”, “Mon”, “Tue”, “Wed”, “Thu”, “Fri”, “Sat”} | * |\n| month | 一年内的一个月或多个月\
    \ | [ 1, 12 ] 或 {“Jan”, “Feb”, “Mar”, “Apr”, “May”, “Jun”, “Jul”, “Aug”, “Sep”,\
    \ “Oct”, “Nov”, “Dec”} | * |\n| dayOfWeek | 一周内的一天或多天 | [ 0, 7 ] 或 {“Sun”, “Mon”,\
    \ “Tue”, “Wed”, “Thu”, “Fri”, “Sat”} | * |\n| year | 特定的日历年份 | 4 位数字的日历年份 | *\
    \ |\n\n注意\n\n对于 `dayOfWeek`，0 和 7 都代表星期日，负数（−7 到 −1）表示月末前的第 n 天。所有字符串常量（“Sun”、“Jan”、“Last”、“1st”）都不区分大小写。只有\
    \ second、minute 和 hour 支持增量。列表中的重复值将被忽略。\n\n### 基于日历的时间表达式示例\n\n让我们看一些演示如何使用基于日历的时间表达式的示例。\n\
    \n*   “每天每时每分每秒”\n    *   `@Schedule(second=\"*\", minute=\"*\", hour=\"*\")`\n\
    *   “每小时内的每十五分钟”\n    *   `@Schedule(minute=\"*/15\", hour=\"*\")`\n    *   `@Schedule(minute=\"\
    0, 15, 30, 45\", hour=\"*\")`\n*   “每个星期五午夜”\n    *   `@Schedule(dayOfWeek=\"\
    Fri\")`\n*   “周末每六小时”\n    *   `@Schedule(hour=\"*/6\", dayOfWeek=\"Sat, Sun\"\
    )`\n*   “每个工作日上午 7:30（美国太平洋时间）”\n    *   `@Schedule(minute=\"30\", hour=\"7\"\
    , dayOfWeek=\"Mon-Fri\", timezone=\"America/Los_Angeles\")`\n*   “1 月 10 日和 9\
    \ 月 10 日上午 6 点”\n    *   `@Schedule(month=\"Jan, Sep\", dayOfMonth=\"10\", hour=\"\
    6\")`\n*   “12 月最后一个星期五下午 6 点”\n    *   `@Schedule(month=\"Dec\", dayOfMonth=\"\
    Last Fri\", hour=\"18\")`\n*   “每个月的倒数第二天（最后一天的前一天）”\n    *   `@Schedule(dayOfMonth=\"\
    -1\")`\n*   “仅在 2013 年的每一天”\n    *   `@Schedule(year=\"2013\")`\n\n### 定时器持久性\n\
    \n定时器是持久的。定时器服务通过将定时器存储在数据库中来持久化它。可以通过将定时器服务的定时器数据源设置更改为有效的 JDBC 资源来更改定时器服务使用的数据库。持久性有助于定时器在应用程序关闭、容器崩溃和容器关闭后仍然存在。\n\
    \n可以通过将 `@Schedule` 注解的 persistent 属性设置为 false 来按定时器禁用持久性。非持久性定时器的生命周期与创建它的 JVM\
    \ 相关联。如果应用程序关闭、容器崩溃或创建定时器的 JVM 崩溃/关闭，则认为非持久性定时器已取消。\n"
- fmt: "# Client View for Session Beans\n\nA session bean can be seen as a logical\
    \ extension of a client program or application, where much of the logic and data\
    \ processing for that application happens. A client application typically accesses\
    \ the session object through the session bean’s client view interfaces. These\
    \ are the business interfaces that were discussed in earlier sections.\n\nA client\
    \ application that accesses session beans can be one of three types:\n\n- **Web\
    \ Services**: You can publish stateless session beans as web services that can\
    \ be invoked by Web Services clients. We will discuss Web Services and clients\
    \ in Chapter [6](#A311833_3_En_6_Chapter.html).\n\nTable 2-2  \nConsiderations\
    \ for Choosing Between Local and Remote Clients\n\n| Remote | Local |\n| --- |\
    \ --- |\n| Loose coupling between the bean and the client | Lightweight access\
    \ to a component |\n| Location independence | Location dependence |\n| Expensive\
    \ remote calls | Must be collocated with the bean |\n| Objects must be serialized\
    \ | Not required |\n| Objects are passed by value | Objects are passed by reference\
    \ |\n\n- **Remote**: Remote clients run in a separate JVM from the session beans\
    \ that they access, as shown in Figure [2-4](#A311833_3_En_2_Chapter.html#Fig4).\
    \ A remote client accesses a session bean through the bean’s remote business interface.\
    \ A remote client can be another EJB, a Java client program, or a Java servlet.\
    \ Remote clients have location independence, meaning that they can use the same\
    \ API as the clients running in the same JVM.\n\n- **Local**: Local clients run\
    \ in the same JVM, as shown in Figure [2-3](#A311833_3_En_2_Chapter.html#Fig3),\
    \ and access the session bean through the local business interface. A local client\
    \ can be another EJB, or a web application using Java Servlets, JavaServer Pages\
    \ (JSP), or JavaServer Faces (JSF). Local clients are location dependent. Remote\
    \ and local clients are compared in Table [2-2](#A311833_3_En_2_Chapter.html#Tab2).\n\
    \nIn some cases, the session beans need to have both local and remote business\
    \ interfaces to support different types of client applications. A client can obtain\
    \ a session bean’s business interface via dependency injection or JNDI lookup.\
    \ Before invoking the methods in the session bean, the client needs to obtain\
    \ a stub object of the bean via JNDI. Once the client has a handle to the stub\
    \ object, it can call the business methods in the session bean. In the case of\
    \ a stateless session bean, a new stub can be obtained on every invocation. In\
    \ the case of a stateful session bean, the stub needs to be cached on the client\
    \ side so that the container knows which instance of the bean to return on subsequent\
    \ calls. Using dependency injection, we can obtain the business interface of the\
    \ `SearchFacade` session bean with the following code:\n\n```\n@EJB SearchFacade\
    \ searchFacade;\n```\n\nIf the client accessing the session bean is remote, the\
    \ client can use JNDI lookup once the context interface has been obtained with\
    \ the right environment properties. Local clients can also use JNDI lookup, but\
    \ dependency injection results in simpler code. Listing [2-24](#A311833_3_En_2_Chapter.html#Par246)\
    \ shows the `SearchFacadeTest` client program’s code that looks up the `SearchFacade`\
    \ bean, invokes the `wineSearch()` business method, and prints out the returned\
    \ list of wines. `SearchFacadeClient` also looks up the `ShopperCount` singleton\
    \ bean and invokes the `getShopperCount()` business method to print the number\
    \ of shoppers logged.\n\n**Note**: If the remote client is a Java application\
    \ or command-line program, an application client container can be used to invoke\
    \ the session beans. Application client containers support dependency injection\
    \ for remote clients. We will discuss application client containers in Chapter\
    \ [12](#A311833_3_En_12_Chapter.html), along with other types of client applications.\n\
    \n```\npackage com.apress.ejb.chapter02;\nimport java.io.IOException;\nimport\
    \ java.io.PrintWriter;\nimport java.util.List;\nimport javax.ejb.EJB;\nimport\
    \ javax.servlet.ServletException;\nimport javax.servlet.annotation.WebServlet;\n\
    import javax.servlet.http.HttpServlet;\nimport javax.servlet.http.HttpServletRequest;\n\
    import javax.servlet.http.HttpServletResponse;\n@WebServlet(name = \"SearchFacadeClient\"\
    , urlPatterns = {\"/SearchFacadeClient\"})\npublic class SearchFacadeClient extends\
    \ HttpServlet {\n@EJB\nSearchFacadeBean searchFacade;\n@EJB\nShopperCountBean\
    \ shopperCount;\nprotected void processRequest(HttpServletRequest request, HttpServletResponse\
    \ response)\nthrows ServletException, IOException {\nresponse.setContentType(\"\
    text/html;charset=UTF-8\");\nPrintWriter out = response.getWriter();\ntry {\n\
    out.println(\"\");\nout.println(\"\");\nout.println(\"Servlet SearchFacadeClient\"\
    );\nout.println(\"\");\nout.println(\"\");\nout.println(\" Starting Search Facade\
    \ test ... \");\nout.println(\"SearchFacade Lookup\");\nout.println(\"Searching\
    \ wines\");\nList winesList = searchFacade.wineSearch(\"Red\");\nout.println(\"\
    Printing wines list\");\nfor (String wine:(List)winesList ){\nout.println(\"\"\
