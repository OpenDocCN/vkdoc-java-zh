    ### Exception Handling


    The EJB specification outlines two types of exceptions:


    *   Application exceptions

    *   System exceptions


    Application exceptions are exceptions related to execution of business logic that
    the client should handle. For example, an application exception might be raised
    if the client application passes an invalid argument, such as the wrong credit
    card number.


    System exceptions , on the other hand, are caused by system-level faults, such
    as Java Naming and Directory Interface (JNDI) errors or failure to acquire a database
    connection. A system exception must be a subclass of a `java.rmi.RemoteException`
    or a subclass of a `java.lang.RuntimeException` that is not an application exception.


    From the EJB application point of view, application exceptions are completed by
    writing application-specific exception classes that subclass the `java.lang.Exception`
    class.


    In the case of a system exception, the application catches particular exceptions,
    such as a `NamingException` that results from a JNDI failure, and throws an `EJBException`.
    In this chapter, the examples aren’t using any resources as such, but there are
    more examples of system exceptions in the later chapters.


    ## Singleton Session Beans


    Introduced in EJB 3.1, a singleton session bean is a session bean component that
    is instantiated only once per application. For an application, only one instance
    of a singleton session bean can ever exist. Once instantiated, a singleton session
    bean lives for the full duration of the application. The singleton session bean
    maintains its state between client invocations, but it cannot save that state
    after a container shutdown or crash. Similar to stateless and stateful session
    beans, the singleton session bean is comprised of a bean class and, optionally,
    one or more business interfaces.


    ### The Bean Class


    A singleton session bean class is any standard Java class that has a class-level
    annotation of `@Singleton`. If deployment descriptors are used instead of annotations,
    the bean class should be denoted as a singleton session bean. If you are using
    annotations and deployment descriptors (mixed mode), then the `@Singleton` annotation
    must be specified if any other class-level or member-level annotations are specified
    in the class.


    Note


    Singleton can be initialized when called for the first time or on deployment using
    the annotation “@Startup.”


    To illustrate a singleton session bean, we will create a `ShopperCount` session
    bean that will keep track of the number of users logged onto our shopping website.
    Listing [2-17](#A311833_3_En_2_Chapter.html#Par172) shows the definition of the
    `ShopperCount` session bean.


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    @Singleton (name = "ShopperCount")

    @Startup

    public class ShopperCountBean {

    private int shopperCounter;

    // Increment number of shopper counter

    public void incrementShopperCount() {

    shopperCounter++;

    }

    // Return number of shoppers

    public int getShopperCount() {

    return shopperCounter;

    }

    }

    Listing 2-17

    ShopperCountBean.java

    ```


    A singleton session bean is instantiated at the discretion of the EJB container.
    However, you can annotate the bean class with `@Startup` to indicate that the
    container must initialize the singleton bean during the application startup sequence.


    When multiple singleton session beans are used within an application, the application
    might require that they be initialized in a specific sequence. `@DependsOn` annotation
    declares the startup dependencies of a singleton session bean. Listing [2-18](#A311833_3_En_2_Chapter.html#Par175)
    shows the definition of the `LogShopperCount` session bean that is dependent on
    the `ShopperCount` session bean.


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    import javax.ejb.DependsOn;

    import java.util.logging.Logger;

    @Singleton

    @Startup

    @DependsOn("ShopperCount")

    public class LogShopperCount {

    private final Logger log = Logger.getLogger("LogShopperCount.class");

    public void logShopperCount() {

    // Log shopper count

    }

    }

    Listing 2-18

    LogShopperCount.java

    ```


    Unlike stateless and stateful session beans, a singleton session bean must not
    implement the `javax.ejb.SessionSynchronization` interface or use session synchronization
    annotations.


    ### The Business Interface


    Business interfaces for singleton session beans are similar to the interfaces
    for stateless and stateful session beans, and they are annotated in the same way
    using `@Local` and `@Remote` annotations. Singleton session beans support the
    no-interface local view, making the declaration of a business interface optional
    for a local view.


    ### Business Methods


    Business methods in singleton session beans are similar to the methods in stateless
    and stateful session beans. We will augment the `ShopperCount` bean by adding
    a business method that will reset the counter.


    Listing [2-19](#A311833_3_En_2_Chapter.html#Par180) shows the `ShopperCount` bean
    implementing business methods.


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    @Singleton(name = "ShopperCount")

    @Startup

    public class ShopperCountBean {

    private int shopperCounter = 0;

    // Increment number of shopper counter

    public void incrementShopperCount() {

    shopperCounter++;

    }

    // Return number of shoppers

    public int getShopperCount() {

    return shopperCounter;

    }

    // Reset counter

    public void resetCounter() {

    shopperCounter = 0;

    }

    }

    Listing 2-19

    ShopperCountBean.java

    ```'
