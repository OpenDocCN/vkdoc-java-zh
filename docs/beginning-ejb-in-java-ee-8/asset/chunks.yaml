    In addition to marking the standard Java class with the `@MessageDriven` annotation,
    the following requirements apply to an MDB class:


    *   The MDB class must implement the message listener interface. In the case of
    JMS, this will be `javax.jms.MessageListener`.

    *   The class cannot be final or abstract.

    *   The class should have a no-argument public constructor that is used by the
    EJB container to create instances of the bean class.


    If both annotations and deployment descriptors are used, the settings or values
    in the deployment descriptor will override the annotations in the classes during
    the deployment process.


