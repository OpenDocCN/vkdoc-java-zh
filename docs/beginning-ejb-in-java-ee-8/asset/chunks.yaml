  trans: '

    #### JSF 生命周期


    图 12-10 展示了处理初始请求以及来自客户端应用或用户界面的回送的 JSF 生命周期。以下列表描述了生命周期的各个阶段：


    ![A311833_3_En_12_Fig10_HTML.jpg](img/A311833_3_En_12_Fig10_HTML.jpg)


    **图 12-10** JSF 生命周期


    *   **恢复视图**：如果传入的请求是初始请求，JSF 实现会创建视图。在视图创建过程中，会为每个 UI 组件创建 UI 对象，并将其存储在组件树中。随后，UI
    视图的状态会被保存，以供后续请求使用。如果传入的请求是回送，JSF 实现会恢复已保存的 UI 来处理当前请求。

    *   **应用请求值**：在此阶段，会使用作为请求一部分发送的数据来更新属于视图的 UI 对象。

    *   **处理验证**：在此阶段，会对已提交的数据进行验证。

    *   **更新模型**：在此阶段，会使用来自请求的已验证数据更新后端对象。接收到的数据转换也在此阶段进行。

    *   **调用应用**：在此阶段，会调用后端应用来完成请求的处理，并将响应渲染回客户端。

    *   **渲染响应**：在此生命周期阶段，会渲染 UI 组件，并将响应发送回客户端。


    #### JSF 应用


    一个典型的 JSF 应用包含以下部分：


    *   **JSP 页面或 Facelets**：应用中的 JSP 页面或 Facelets 包含封装在 JSP 标签中的 JSF UI 组件。每个 JSF
    组件都是一个与标记无关的构建块。它包含三个主要部分：一个 UIComponent、一个渲染器和一个标签处理器。UIComponent 定义了组件的行为（例如，单选按钮组或菜单等
    UI 组件的行为）。它在运行时还与特定的渲染器相关联。渲染器负责决定向客户端渲染何种标记。标签处理器是一个 JSP 标签，允许在 JSP 中使用 JSF UI
    组件。

    *   **导航模型**：关于控制流如何在应用中流转的信息，定义在一个名为 `faces-config.xml` 的 XML 部署描述符中。该文件可以保存多种其他类型的信息，例如验证器、转换器和托管
    Bean 列表。每个 JSF 应用可以包含多个 `faces-config.xml` 文件。

    *   **托管 Bean**：这些是促进应用逻辑的普通 Java 类。它们可以用作来自后端组件数据的绑定，或者用于调用后端应用中的业务方法。


    ### JSF 工具与组件


    仅仅拥有标准并不总是有帮助。来自开发者社区和供应商的支持对于一项技术的成功起着重要作用。虽然 JSF 的目标是极大地简化 Web 应用开发，但仅靠标准化无法实现这一目标。我们需要为开发者提供全套可用的
    UI 组件来构建应用，以及全套的开发工具来辅助应用构建过程。在过去几年中，诸如 JDeveloper、Java Studio Creator 和 Eclipse
    等开发工具已经为构建 JSF 应用提供了支持。作为 JSF 框架的一个开源实现，Apache MyFaces 提供的组件比 JSF 参考实现中的组件功能更丰富。Oracle
    也在 ADF Faces 的框架下发布了超过 100 个标准 Faces 组件。这些 ADF Faces 组件已被捐赠给 Apache 软件基金会，并且现在已成为
    MyFaces 项目（又名 Trinidad）的一部分。所有这些因素都为 JSF 技术的成功及其被开发者采用做出了重大贡献。


    **注意**


    关于 MyFaces 项目的信息，请访问：[`http://myfaces.apache.org`](http://myfaces.apache.org)。


    ## 使用 JSF 和 EJB 开发 Web 应用


    在第 7 章中，我们做了大量工作来集成不同类型的 EJB（会话 Bean、MDB、实体和 Web 服务），以便为 Wines Online 应用开发一个功能完备的
    EJB 后端基础设施。在本节中，我们将开发一个 JSF 客户端应用，该应用将运行在 EJB 后端应用之上，如图 12-11 所示。


    ![A311833_3_En_12_Fig11_HTML.jpg](img/A311833_3_En_12_Fig11_HTML.jpg)


    **图 12-11** 示例应用架构


    本节的主要目标是向您展示如何开发一组 JSF 页面，并将它们连接到后端应用中的 EJB 组件。考虑到这一点，我们将从用户浏览一组 Web 页面以执行以下操作的方式开始：


    *   注册为新客户

    *   登录

    *   根据不同条件搜索葡萄酒

    *   将葡萄酒添加到购物车

    *   查看购物车内容

    *   提交订单


    图 12-12 展示了应用流程，并说明了一组允许用户执行上述操作的 JSF 页面。我们将一次构建一个页面，根据需要将每个页面连接到 EJB 后端应用，并完成整个应用。


    ![A311833_3_En_12_Fig12_HTML.jpg](img/A311833_3_En_12_Fig12_HTML.jpg)


    **图 12-12** JSF 应用页面流程


    我们将从一个简单的登录页面开始。

