    ## Interaction with Session Beans


    CDI enhances the functionality provided by the session beans by associating them
    with a definite scope and creating a loosely coupled typesafe ecosystem that resolves
    ambiguity through injection at compile time, deploy time, or runtime. In return,
    managed beans can be annotated with a `@Stateful`, `@Stateless`, or `@Singleton`
    annotation enhancing them with declarative enterprise features like role-based
    security, transaction management, scalability, and concurrency in a multiuser
    environment.


    ### Session Bean Scope


    Session beans participate in the contextual life cycle provided by the CDI container
    like any other bean. A session bean can be associated with CDI scopes by adding
    CDI-specific scope annotations (`@ApplicationScoped`, `@RequestScoped`, `@SessionScoped`,
    or `@ConversationScoped`). As a result, the container automatically creates a
    session bean instance when it is needed by the client and, when no longer in scope,
    the container automatically destroys the instance.


    By default, all generic session beans have `@Dependent` pseudo-scope, and hence
    they cannot be shared between the client applications. Inherently, some types
    of session beans play well with specific types of scopes. For example, a singleton
    session bean can have only one instance that exists during the entire life of
    an application. This property of the singleton session bean compliments the property
    of an application-scoped bean. Adding an `@ApplicationScoped` annotation to a
    stateless session bean does not make sense as a stateless session bean instance
    is associated with a client only for the duration of its invocation and does not
    maintain a conversational state with the client.


    As a result, users must follow the rules mentioned in Table [10-1](#A311833_3_En_10_Chapter.html#Tab1)
    while applying the CDI scopes to a session bean. If a session bean specifies an
    illegal scope, the container automatically detects the problem and treats it as
    a definition error.


    **Table 10-1** Session Bean to CDI Scope Mapping


    | Session Bean Type | Scope |

    | --- | --- |

    | `@Singleton` | `@ApplicationScoped` or `@Dependent` |

    | `@Stateless` | `@Dependent` |

    | `@Stateful` | `@ApplicationScoped`, `@RequestScoped`, `@SessionScoped`, `@ConversationScoped`,
    or `@Dependent` |


    ### Resolving Session Bean Ambiguity


    Just like any other bean, session beans participating in the CDI life cycle can
    encounter the “unsatisfied or ambiguous dependency” error when the CDI container
    is not able to isolate one session bean that can be injected at a given injection
    point. These ambiguities can be resolved by applying qualifiers, alternatives,
    or producers to the participating session bean.


    Session beans participating in a CDI life cycle use qualifiers (`@Default`, `@Any`,
    `@New`, `@Named`, or user defined) to resolve ambiguous dependencies at compile
    time, just like any other bean.


    If an ambiguous dependency needs to be resolved at deployment time, then an alternative
    session bean must be declared explicitly in `beans.xml`. Once declared in `beans.xml`,
    it is automatically available for lookup, injection, or EL resolution.


    The producer method of a session bean must be either a business method of the
    EJB or a static method of the bean class. If this is not the case, the container
    automatically detects the problem and treats it as a definition error. Similarly,
    the producer field must be a static field of the bean class.


    Users can use qualifiers, alternatives, and producers with session beans in exactly
    the same way they use them with other beans.


    ### Limitations


    While CDI and session beans are great companions with each filling the gap that
    was left by the other, session beans participating in the CDI life cycle do have
    some limitations. For example, remote interfaces of session beans are not included
    in set of bean types and cannot participate in the CDI life cycle.'
  raw: '### Producers


    We have seen how to use the `@Inject` annotation to inject beans and to resolve
    ambiguous dependencies that we face during injection using qualifiers and alternatives.
    Using producers, we can inject any object in any other object provided that we
    produce the object that needs to be injected. A producer method acts as a source
    of objects that need to be injected. The objects that need to be injected need
    not be instances of a bean, and the concrete type of the object that needs to
    be injected can be decided at runtime. This provides a loosely coupled but typesafe
    polymorphism at runtime. One of the practical uses of producers is to inject Java
    EE resources like `EntityManager`, `QueueConnetion`, `QueueSession`, and so on.
    CDI also provides the `@Dispose` annotation, which we can use to free up the resources
    by closing them when they go out of scope.


    Producer Field is a simpler alternative to Producer Methods.


    Listing [10-16](#A311833_3_En_10_Chapter.html#Par152) shows how a producer method
    can be used to select which implementation of the `Wine` interface is chosen for
    dependency injection. The decision to choose the exact implementation for injection
    is taken at runtime. The qualifier `RandomSelector` defined in Listing [10-15](#A311833_3_En_10_Chapter.html#Par150)
    is similar to the qualifier `Red` defined in Listing [10-8](#A311833_3_En_10_Chapter.html#Par127).


