  trans: "\n### 实际测试运行\n\n现在我们已经完成了所有准备工作，可以开始运行正式测试了。这些测试将帮助我们了解在极端压力条件下，哪种继承模型表现最佳。\n\
    \n这部分性能测试是机械性的，而且相当枯燥。第一步是启动 Grinder 控制台，并确保测试参数设置正确。首先，我们验证采样间隔是否设置为 5000 毫秒。接着，我们检查是否忽略了\
    \ 12 个样本（每个样本 5 秒，总计我们之前选择的 60 秒）。然后，我们选择在收集 36 个样本（每个样本 5 秒，总计我们之前选择的 180 秒）后停止收集数据。\n\
    \n每次测试运行的步骤如下：\n\n1.  根据继承模型，使用相应的 URL 重置数据库：\n\n    ```\n    http://yourserver:port/Chapter09-PerformanceJoined-war/ResetJoinedData\n\
    \    http://yourserver:port/Chapter09-PerformanceSingleTable-war/ResetSingleTableData\n\
    \    ```\n\n2.  重启 GlassFish 服务器。  \n3.  编辑 `grinder.properties` 文件，修改用户数量。  \n\
    4.  点击 Grinder 控制台上的“开始捕获统计信息”按钮。这将清除之前运行的所有结果。  \n5.  点击 Grinder 控制台上的“启动进程”按钮。\
    \  \n6.  等待数据收集完成。一个很好的标志是，左侧面板中央的线条从绿色的“正在收集样本：XX”变为红色的“正在忽略样本：XX”。  \n7.  点击\
    \ Grinder 控制台上的“重置进程”按钮。此步骤实际上会停止模拟用户的执行。  \n8.  点击“保存结果”按钮。提供一个描述性文件名，并保存控制台上显示的结果，以供后续分析。\
    \  \n9.  从本列表的开头重新开始。\n\n完成 `JOINED` 表继承策略的所有测试运行后，您可以继续为 `SINGLE_TABLE` 继承方案的一组测试运行进行所有准备工作。\n\
    \n如前几节所述，我们两次测试之间的区别在于 O/R 映射注解和数据库模式。一旦应用程序准备好进行下一组测试运行，只需重复您为上一组测试运行所做的步骤即可。\n\
    \n### 分析结果\n\n我们必须首先声明，本章呈现的结果并非旨在推崇某一种继承方法优于另一种。它们仅用于说明如何应用该方法以及如何使用 Grinder\
    \ 工具包。正因如此，我们在进行此性能测试时，对哪种继承模型表现更好没有任何预期。\n\n我们首先回顾多表继承模型在 100 个用户下的测试运行结果，以此开始分析。这些结果如表\
    \ 9-3 所示。\n\n表 9-3\n\n多表，100 用户结果\n\n| 100 用户 | ART | TPS |\n| --- | --- | ---\
    \ |\n| 请求 1 | 1,240 | 34.1 |\n| 请求 2 | 594 | 34.1 |\n| 请求 3 | 549 | 34.1 |\n|\
    \ 请求 4 | 543 | 34.1 |\n| 总计 | 732 | 136 |\n\n有两件事应该会迅速引起您的注意。第一是获取应用程序主页所需的时间很长——略超过\
    \ 1 秒——尤其是与测试脚本中所有其他响应时间相比。这可以解释为，在设置主页时，虽然简单，但涉及将数据从服务器发送到浏览器，这通常被认为比更新购物车更耗费资源。接下来应该引起您注意的是，结账过程持续不到\
    \ 1 秒。虽然对于验证库存并执行与结账相关的其他操作的过程来说，这是一个理想的时间，但事实是，这个测试系统上的库存并不多。\n\n查看单表继承模型在 100\
    \ 个用户下的测试运行结果（如表 9-4 所示），您可以看到类似的行为模式，因此至少它是一致的。\n\n表 9-4\n\n单表，100 用户结果\n\n|\
    \ 100 用户 | ART | TPS |\n| --- | --- | --- |\n| 请求 1 | 1,320 | 33.4 |\n| 请求 2 |\
    \ 580 | 33.4 |\n| 请求 3 | 540 | 33.5 |\n| 请求 4 | 543 | 33.6 |\n| 总计 | 745 | 134\
    \ |\n\n这部分分析仅限于审查每个单独的请求，并且通常使用从用户上限的测试运行中收集的结果来完成。下一步是分析我们选择的所有用户负载下的 AART 和\
    \ TTR。我们从使用多表继承模型的结果开始，如表 9-5 所示。\n\n表 9-5\n\n多表，所有用户结果\n\n| 用户 | AART | TTR |\n\
    | --- | --- | --- |\n| 40 | 291 | 137 |\n| 60 | 438 | 137 |\n| 80 | 584 | 137\
    \ |\n| 100 | 732 | 136 |\n| 120 | 919 | 130 |\n| 140 | 1,120 | 125 |\n\n从该表可以看出，饱和点从性能测试一开始就达到了，这相当不寻常。这意味着继承模型从一开始就吞噬了所有可用资源。\n\
    \n让我们回顾一下单表继承模型的结果，以便进行一些比较。它们如表 9-6 所示。\n\n表 9-6\n\n单表，所有用户结果\n\n| 用户 | AART\
    \ | TTR |\n| --- | --- | --- |\n| 40 | 296 | 135 |\n| 60 | 446 | 135 |\n| 80 |\
    \ 592 | 134 |\n| 100 | 745 | 134 |\n| 120 | 908 | 132 |\n| 140 | 1,120 | 125 |\n\
    \n我们再次看到从一开始就出现相同的饱和模式。这可能归因于 Derby 数据库和内存使用情况。还可以看到，总事务速率和聚合平均响应时间都略低于多表继承模型。\n\
    \n这种比较可以更清楚地从图 9-12 和图 9-13 所示的图表中看出。图 9-12 包含两组 AART 结果的比较；图 9-13 包含 TTR 的比较。\n\
    \n![A311833_3_En_9_Fig13_HTML.jpg](img/A311833_3_En_9_Fig13_HTML.jpg)\n\n图 9-13\n\
    \nTTR 比较\n\n![A311833_3_En_9_Fig12_HTML.jpg](img/A311833_3_En_9_Fig12_HTML.jpg)\n\
    \n图 9-12\n\nAART 比较\n\n在图 9-12 中，聚合平均响应时间 (AART) 几乎相同，因此我们必须仔细查看总事务速率 (TTR)，以尝试了解在我们正在进行的性能测试条件下，哪种模型更有利。\n\
    \n在图 9-13 中，单表模型不仅比多表模型更快达到饱和点，而且总事务速率也略低于多表模型。如您所见，单表模型在 60 个并发用户时开始下降，而多表模型则在\
    \ 80 个并发用户时开始下降。然而，多表模型出现了更早的大幅下降。根据收集到的数据，我们可以得出结论：`JOINED`（即多表）继承模型在高度压力条件下表现出略优的性能。\n"
- fmt: "# Summary\n\nIn this chapter, we have presented The Grinder, a methodology\
    \ to conduct performance tests, and a toolkit to generate the load for the performance\
    \ tests. We went through an example of a performance test that used the methodology\
    \ and the toolkit. In particular, we discussed performance criteria, with a review\
    \ of the two performance indicators: response time and throughput. We covered\
    \ the simulation of application usage, with a discussion about test scripts and\
    \ think times. We also covered the defining of test metrics, such as the number\
    \ of users, sample size, and exclusion of data, as well as how to determine the\
    \ accuracy of the performance test.\n\nTo illustrate the use of this methodology,\
    \ we presented a detailed case study using the application we created in the previous\
    \ chapters and compared two inheritance strategies.\n\nIn the next chapter, we\
    \ will look into Contexts and Dependency Injection (CDI) and how it can be used\
    \ to enhance EJBs and the application development experience.\n\n# 10. Contexts\
    \ and Dependency Injection\n\nIn this chapter, we will discuss Contexts and Dependency\
    \ Injection (CDI). CDI provides powerful services to glue the various tiers of\
    \ the Java EE framework together. The first public draft of Java Contexts and\
    \ Dependency Injection for the Java EE Platform, as defined in JSR 299, was made\
    \ public in 2008. During the initial development phase, the JSR 299 specification\
    \ was called Web Beans. After the specification was renamed to Contexts and Dependency\
    \ Injection, the initial reference implementation was given the name Web Beans.\
    \ The use of the same name, Web Beans, in two different contexts created some\
    \ confusion among the community members, and this led to the renaming of the reference\
    \ implementation from Web Beans to Weld. Notice that Weld 3.0, the reference Implementation\
    \ of CDI, will be integrated with the upcoming GlassFish 5.\n\nCDI builds upon\
    \ the Interceptor Specification (JSR 318), the Managed Bean Specification (JSR\
    \ 316), and the Dependency Injection for Java Specification (JSR 330).\n\nYou\
    \ might be wondering why we have included a chapter on CDI in this book. There\
    \ are two reasons for this: First, the dependency injection behavior first introduced\
    \ in EJB is enhanced in CDI; and second, CDI supplements EJB by providing the\
    \ contextual functionality to an application. EJB complements CDI by providing\
    \ enterprise services like security, transaction management, and scalability to\
    \ an application. If an application developer wisely decides when to use CDI,\
    \ EJB, or both, then the resulting application will be both nimble and scalable.\n\
    \nAfter you have finished this chapter, you will gain an insight into the following\
    \ areas:\n\n- CDI basics\n- Relationship of CDI with EJB\n- Deploying and executing\
    \ CDI clients\n\n## What Is CDI?\n\nBefore the arrival of CDI on the Java EE scene,\
    \ there was no easy way for the three tiers of Java EE technology—namely, the\
    \ Web tier, the business tier, and the persistence tier—to interact with each\
    \ other in a loosely coupled but typesafe manner. The Web tier did not have a\
    \ proper mechanism to support transactions because it focused on presenting the\
    \ content and had limited access to transactional resources.\n\nCDI was mainly\
    \ introduced to help with:\n\n- Life cycle for stateful objects bound to lifecycle\
    \ contexts\n- Typesafe dependency injection mechanism\n- Event notification\n\
    - Integration with the Unified Expression Language (EL)\n\nCDI services help in\
    \ unifying Enterprise JavaBeans (EJB) and JavaServer Faces (JSF) programming models.\
    \ CDI services allow Enterprise JavaBeans to be used as the Managed Beans in JavaServer\
    \ Faces framework. CDI also provides a good support for accessing transactional\
    \ resources, which facilitates an easy creation of Web applications using Java\
    \ Persistence API. CDI bridges this gap. Using CDI, the Web tier can directly\
    \ interact with the beans in the business and persistence tiers. This is the reason\
    \ why CDI was initially named Web Beans.\n\nContexts and Dependency Injection\
    \ for Java EE (CDI) 1.0 (JSR-299) was first introduced as part of the Java EE\
    \ 6 platform including:\n\n- A well-defined life cycle for stateful objects bound\
    \ to lifecycle contexts\n  - Where the set of contexts is extensible\n- A typesafe\
    \ dependency injection mechanism without verbose\n- Configuration\n  - Dependencies\
    \ can be selected at development or deployment time\n- Typesafe decorators and\
    \ interceptors\n- An event notification model\n- An SPI allowing portable extensions\
    \ to integrate cleanly with the container\n\nThen CDI 1.1/1.2 (JSR-346) was developed,\
    \ including the following:\n\n- Add automatic enablement of CDI in Java EE (`beans.xml`\
    \ is not required)\n- Add introspection with event, bean, decorator, and interceptor\
    \ metadata\n- Ease access to bean manager from outside CDI with `CDI` class\n\
    - Add global enablement of interceptors using the `@Priority` annotation\n- Add\
    \ unmanaged allowing easy access to non-contextual instances\n- Spec clarification\
    \ of CDI Life Cycle and Events\n- Reworking Bean defining annotation to avoid\
    \ conflict with other JSR 330 frameworks\n- Clarification on conversation resolution\n\
    - OSGi official support in the API\n\nFinally, CDI 2.0 (JSR-365), completed in\
    \ May 2017, is a major evolution of the CDI 1.2 (JSR 346) specification lead by\
    \ Antoine Sabot-Durand (Red Hat Inc.).\n\nThe Java EE 8 platform requires CDI\
    \ 2.0, which comes with the following new features:\n\n- Built-in annotation literals\
    \ that can be used for creating instances of annotations\n- An API which can be\
    \ used for bootstrapping a CDI container in Java SE 8\n- Some new configurators\
    \ interfaces, which can be used for dynamically defining as well as modifying\
    \ CDI objects\n- Support for observer ordering, which is used to determine the\
    \ order in which the observer methods for a particular event are invoked\n- Support\
    \ for firing events asynchronously\n- Spec was split into three parts\n- Java\
    \ SE Support, using CDI outside Java EE\n- Alignment on Java 8 features (streams,\
    \ lambdas, repeating qualifiers)\n- Event enhancement\n- Configurators for major\
    \ SPI elements\n- Possibility to apply interceptor on producers\n\nThe CDI 2.0\
    \ specification was split into three parts such as Java SE, Java EE, and CDI Core.\
    \ The main reason for splitting was:\n\n- To align on many other Java EE specs\
    \ that support Java SE bootstrapping\n  - JAX-RS, JPA, etc.\n- To boost CDI adoption\
    \ for Spec and Frameworks\n  - Java SE has been already supported by Weld, Apache\
    \ OpenWebBeans, Apache DeltaSpike, and so on, but API is different from each implementation.\n\
    \  - Programming model should be defined to avoid user confusion.\n- To provide\
    \ a mean of building new stacks out of Java EE (MicroProfile)"
  raw: "## Summary\n\nIn this chapter, we have presented The Grinder, a methodology\
    \ to conduct performance tests, and a toolkit to generate the load for the performance\
    \ tests. We went through an example of a performance test that used the methodology\
    \ and the toolkit. In particular, we discussed performance criteria, with a review\
    \ of the two performance indicators: response time and throughput. We covered\
    \ the simulation of application usage, with a discussion about test scripts and\
    \ think times. We also covered the defining of test metrics, such as the number\
    \ of users, sample size, and exclusion of data, as well as how to determine the\
    \ accuracy of the performance test.\n\nTo illustrate the use of this methodology,\
    \ we presented a detailed case study using the application we created in the previous\
    \ chapters and compared two inheritance strategies.\n\nIn the next chapter, we\
    \ will look into Contexts and Dependency Injection (CDI) and how it can be used\
    \ to enhance EJBs and the application development experience.\n\n# 10. Contexts\
    \ and Dependency Injection\n\nIn this chapter, we will discuss Contexts and Dependency\
    \ Injection (CDI). CDI provides powerful services to glue the various tiers of\
    \ the Java EE framework together. The first public draft of Java Contexts and\
    \ Dependency Injection for the Java EE Platform, as defined in JSR 299, was made\
    \ public in 2008\\. During the initial development phase, the JSR 299 specification\
    \ was called Web Beans . After the specification was renamed to Contexts and Dependency\
    \ Injection, the initial reference implementation was given the name Web Beans.\
    \ The use of the same name, Web Beans, in two different contexts created some\
    \ confusion among the community members, and this led to the renaming of the reference\
    \ implementation from Web Beans to Weld. Notice that Weld 3.0, the reference Implementation\
    \ of CDI, will be integrated with the upcoming GlassFish 5.\n\nCDI builds upon\
    \ the Interceptor Specification (JSR 318), the Managed Bean Specification (JSR\
    \ 316), and the Dependency Injection for Java Specification (JSR 330).\n\nYou\
    \ might be wondering why we have included a chapter on CDI in this book. There\
    \ are two reasons for this: First, the dependency injection behavior first introduced\
    \ in EJB is enhanced in CDI; and second, CDI supplements EJB by providing the\
    \ contextual functionality to an application. EJB complements CDI by providing\
    \ enterprise services like security, transaction management, and scalability to\
    \ an application. If an application developer wisely decides when to use CDI,\
    \ EJB, or both, then the resulting application will be both nimble and scalable.\n\
    \nAfter you have finished this chapter, you will gain an insight into the following\
    \ areas:\n\n*   CDI basics\n*   Relationship of CDI with EJB\n*   Deploying and\
    \ executing CDI clients\n\n## What Is CDI?\n\nBefore the arrival of CDI on the\
    \ Java EE scene, there was no easy way for the three tiers of Java EE technology—namely,\
    \ the Web tier, the business tier, and the persistence tier—to interact with each\
    \ other in a loosely coupled but typesafe manner. The Web tier did not have a\
    \ proper mechanism to support transactions because it focused on presenting the\
    \ content and had limited access to transactional resources.\n\nCDI was mainly\
    \ introduced to help with:\n\n*   Life cycle for stateful objects bound to lifecycle\
    \ contexts\n*   Typesafe dependency injection mechanism\n*   Event notification\n\
    *   Integration with the Unified Expression Language (EL)\n\nCDI services help\
    \ in unifying Enterprise JavaBeans (EJB) and JavaServer Faces (JSF) programming\
    \ models. CDI services allow Enterprise JavaBeans to be used as the Managed Beans\
    \ in JavaServer Faces framework. CDI also provides a good support for accessing\
    \ transactional resources, which facilitates an easy creation of Web applications\
    \ using Java Persistence API. CDI bridges this gap. Using CDI, the Web tier can\
    \ directly interact with the beans in the business and persistence tiers. This\
    \ is the reason why CDI was initially named Web Beans.\n\nContexts and Dependency\
    \ Injection for Java EE (CDI) 1.0 (JSR-299) was first introduced as part of the\
    \ Java EE 6 platform including:\n\n*   A well-defined life cycle for stateful\
    \ objects bound to lifecycle contexts\n    *   Where the set of contexts is extensible\n\
    *   A typesafe dependency injection mechanism without verbose\n*   Configuration\n\
    \    *   Dependencies can be selected at development or deployment time\n*   Typesafe\
    \ decorators and interceptors\n*   An event notification model\n*   An SPI allowing\
    \ portable extensions to integrate cleanly with the container\n\nThen CDI 1.1/1.2\
    \ (JSR-346) was developed, including the following:\n\n*   Add automatic enablement\
    \ of CDI in Java EE (beans.xml is not required)\n*   Add introspection with event,\
    \ bean, decorator, and interceptor metadata\n*   Ease access to bean manager from\
    \ outside CDI with CDI class\n*   Add global enablement of interceptors using\
    \ the @Priority annotation\n*   Add unmanaged allowing easy access to non-contextual\
    \ instances\n*   Spec clarification of CDI Life Cycle and Events\n*   Reworking\
    \ Bean defining annotation to avoid conflict with other JSR 330 frameworks\n*\
    \   Clarification on conversation resolution\n*   OSGi official support in the\
    \ API\n\nFinally, CDI 2.0 (JSR-365), completed in May 2017, is a major evolution\
    \ of the CDI 1.2 (JSR 346) specification lead by Antoine Sabot-Durand (Red Hat\
    \ Inc.).\n\nThe Java EE 8 platform requires CDI 2.0, which comes with the following\
    \ new features:\n\n*   Built-in annotation literals that can be used for creating\
    \ instances of annotations\n*   An API which can be used for bootstrapping a CDI\
    \ container in Java SE 8\n*   Some new configurators interfaces, which can be\
    \ used for dynamically defining as well as modifying CDI objects\n*   Support\
    \ for observer ordering, which is used to determine the order in which the observer\
    \ methods for a particular event are invoked\n*   Support for firing events asynchronously\n\
    *   Spec was split into three parts\n*   Java SE Support, using CDI outside Java\
    \ EE\n*   Alignment on Java 8 features (streams, lambdas, repeating qualifiers)\n\
    *   Event enhancement\n*   Configurators for major SPI elements\n*   Possibility\
    \ to apply interceptor on producers\n\nThe CDI 2.0 specification was split into\
    \ three parts such as Java SE, Java EE, and CDI Core. The main reason for splitting\
    \ was:\n\n*   To align on many other Java EE specs that support Java SE bootstrapping\n\
    \    *   JAX-RS, JPA, etc.\n*   To boost CDI adoption for Spec and Frameworks\n\
    \    *   Java SE has been already supported by Weld, Apache OpenWebBeans, Apache\
    \ DeltaSpike, and so on, but API is different from each implementation.\n    *\
    \   Programming model should be defined to avoid user confusion.\n*   To provide\
    \ a mean of building new stacks out of Java EE (MicroProfile)"
  trans: "\n## 总结\n\n在本章中，我们介绍了 The Grinder，这是一种执行性能测试的方法论，以及一套用于生成性能测试负载的工具包。我们通过一个使用该方法和工具包的性能测试示例进行了讲解。具体来说，我们讨论了性能标准，并回顾了两个性能指标：响应时间和吞吐量。我们涵盖了应用程序使用情况的模拟，并讨论了测试脚本和思考时间。我们还涉及了测试指标的界定，例如用户数量、样本大小和数据排除，以及如何确定性能测试的准确性。\n\
    \n为了说明该方法的使用，我们使用前几章创建的应用程序展示了一个详细的案例研究，并比较了两种继承策略。\n\n在下一章中，我们将探讨上下文与依赖注入（CDI），以及如何使用它来增强\
    \ EJB 和应用程序开发体验。\n\n# 10. 上下文与依赖注入\n\n在本章中，我们将讨论上下文与依赖注入（CDI）。CDI 提供了强大的服务，用于将\
    \ Java EE 框架的各个层级粘合在一起。Java 平台上下文与依赖注入（定义于 JSR 299）的第一个公开草案于 2008 年发布。在最初的开发阶段，JSR\
    \ 299 规范被称为 Web Beans。在规范更名为上下文与依赖注入后，最初的参考实现被命名为 Web Beans。在两种不同上下文中使用相同的名称“Web\
    \ Beans”在社区成员中造成了一些混淆，这导致参考实现从 Web Beans 更名为 Weld。请注意，CDI 的参考实现 Weld 3.0 将集成到即将发布的\
    \ GlassFish 5 中。\n\nCDI 建立在拦截器规范（JSR 318）、托管 Bean 规范（JSR 316）和 Java 依赖注入规范（JSR\
    \ 330）之上。\n\n您可能会想，为什么我们在本书中包含了关于 CDI 的章节。这有两个原因：首先，EJB 中首次引入的依赖注入行为在 CDI 中得到了增强；其次，CDI\
    \ 通过为应用程序提供上下文功能来补充 EJB。EJB 通过为应用程序提供安全、事务管理和可伸缩性等企业服务来补充 CDI。如果应用程序开发者明智地决定何时使用\
    \ CDI、EJB 或两者兼用，那么最终生成的应用程序将既灵活又具有可伸缩性。\n\n完成本章后，您将对以下领域有所了解：\n\n*   CDI 基础\n\
    *   CDI 与 EJB 的关系\n*   部署和执行 CDI 客户端\n\n## 什么是 CDI？\n\n在 CDI 出现在 Java EE 领域之前，Java\
    \ EE 技术的三个层级——即 Web 层、业务层和持久化层——之间没有一种简单的方式能够以松散耦合但类型安全的方式进行交互。Web 层没有合适的机制来支持事务，因为它专注于呈现内容，并且对事务资源的访问有限。\n\
    \n引入 CDI 主要是为了帮助解决以下问题：\n\n*   绑定到生命周期上下文的有状态对象的生命周期\n*   类型安全的依赖注入机制\n*   事件通知\n\
    *   与统一表达式语言（EL）的集成\n\nCDI 服务有助于统一企业 JavaBean（EJB）和 JavaServer Faces（JSF）编程模型。CDI\
    \ 服务允许企业 JavaBean 在 JavaServer Faces 框架中用作托管 Bean。CDI 还为访问事务资源提供了良好的支持，这有助于使用\
    \ Java 持久化 API 轻松创建 Web 应用程序。CDI 弥合了这一差距。使用 CDI，Web 层可以直接与业务层和持久化层中的 Bean 进行交互。这就是\
    \ CDI 最初被命名为 Web Beans 的原因。\n\nJava EE 的上下文与依赖注入（CDI）1.0（JSR-299）首次作为 Java EE\
    \ 6 平台的一部分引入，包括：\n\n*   为绑定到生命周期上下文的有状态对象定义良好的生命周期\n    *   其中上下文集合是可扩展的\n*  \
    \ 无需冗长配置的类型安全依赖注入机制\n*   配置\n    *   可以在开发或部署时选择依赖项\n*   类型安全的装饰器和拦截器\n*   事件通知模型\n\
    *   一个 SPI，允许可移植扩展干净地集成到容器中\n\n随后开发了 CDI 1.1/1.2（JSR-346），包括以下内容：\n\n*   在 Java\
    \ EE 中自动启用 CDI（不需要 `beans.xml`）\n*   添加对事件、Bean、装饰器和拦截器元数据的自省支持\n*   通过 `CDI`\
    \ 类简化从 CDI 外部访问 Bean 管理器\n*   使用 `@Priority` 注解添加拦截器的全局启用\n*   添加 `@Unmanaged`\
    \ 以轻松访问非上下文实例\n*   明确 CDI 生命周期和事件的规范\n*   重新定义 Bean 定义注解以避免与其他 JSR 330 框架冲突\n\
    *   明确对话解析\n*   API 中的官方 OSGi 支持\n\n最后，于 2017 年 5 月完成的 CDI 2.0（JSR-365）是由 Antoine\
    \ Sabot-Durand（Red Hat Inc.）领导的 CDI 1.2（JSR 346）规范的一次重大演进。\n\nJava EE 8 平台要求使用\
    \ CDI 2.0，它带来了以下新特性：\n\n*   可用于创建注解实例的内置注解字面量\n*   可用于在 Java SE 8 中引导 CDI 容器的\
    \ API\n*   一些新的配置器接口，可用于动态定义和修改 CDI 对象\n*   支持观察者排序，用于确定特定事件的观察者方法的调用顺序\n*   支持异步触发事件\n\
    *   规范被分为三个部分\n*   Java SE 支持，即在 Java EE 之外使用 CDI\n*   与 Java 8 特性对齐（流、Lambda\
    \ 表达式、可重复限定符）\n*   事件增强\n*   主要 SPI 元素的配置器\n*   能够在生产者上应用拦截器\n\nCDI 2.0 规范被分为三个部分：Java\
    \ SE、Java EE 和 CDI 核心。拆分的主要原因是：\n\n*   与许多其他支持 Java SE 引导的 Java EE 规范保持一致\n  \
    \  *   JAX-RS、JPA 等\n*   促进规范和框架对 CDI 的采用\n    *   Weld、Apache OpenWebBeans、Apache\
    \ DeltaSpike 等已经支持 Java SE，但每个实现的 API 不同。\n    *   应定义编程模型以避免用户混淆。\n*   提供一种在\
    \ Java EE（MicroProfile）之外构建新堆栈的方法\n"
- fmt: "After the splitting, the specification name was also changed from “Contexts\
    \ and Dependency Injection for Java EE (JSR 346)” to “Contexts and Dependency\
    \ Injection for Java (JSR 365).”\n\n> **Note**  \n> Custom libraries using CDI\
    \ 1.x might be built again to align with CDI 2.0.\n\nInformation about CDI can\
    \ be found at: [`http://www.cdi-spec.org/`](http://www.cdi-spec.org/)\n\nThe CDI\
    \ specification can be found at: [`http://docs.jboss.org/cdi/spec/2.0/cdi-spec.html`](http://docs.jboss.org/cdi/spec/2.0/cdi-spec.html)\n\
    \nFigure [10-1](#A311833_3_En_10_Chapter.html#Fig1) shows the architecture of\
    \ a Java EE application before the arrival of CDI on the Java EE scene, and Figure\
    \ [10-2](#A311833_3_En_10_Chapter.html#Fig2) shows how the Web tier and the business\
    \ tier interact after the arrival of CDI.\n\n![A311833_3_En_10_Fig2_HTML.jpg](A311833_3_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2 — CDI Application Architecture\n\n![A311833_3_En_10_Fig1_HTML.jpg](A311833_3_En_10_Fig1_HTML.jpg)\n\
    \nFigure 10-1 — Java EE Application Architecture before CDI\n\nThe two important\
    \ features provided by CDI are a part of its name:\n\n* **Contexts**: Deals with\
    \ binding the stateful components (like stateful session beans) to a well-defined\
    \ scope. Stateful components are those that retain information across their invocations.\
    \ A CDI container associates stateful components with a definite scope—creating\
    \ them when required and destroying them when they are out of scope. As a result,\
    \ the client is not burdened with managing the life cycle of the stateful components.\n\
    * **Dependency Injection**: Deals with injecting the components into an application\
    \ in a loosely coupled but typesafe way. The injected components are instantiated\
    \ by the container, which means users don’t need to create an instance of the\
    \ component using `new`. Users can use the interface instead of the actual implementation\
    \ of the interface for injection. This allows users to defer selection of a specific\
    \ implementation, of a bean type that needs to be injected, to deploy at runtime.\n\
    \n> **Note**  \n> We can use injection points only in a CDI-enabled application,\
    \ and Java EE 8 platform requires Dependency Injection for Java 1.0.\n\nListings\
    \ [10-1](#A311833_3_En_10_Chapter.html#Par64), [10-2](#A311833_3_En_10_Chapter.html#Par66),\
    \ and [10-3](#A311833_3_En_10_Chapter.html#Par68) demonstrate the concepts of\
    \ “Contexts” and “Dependency Injection” in their simplest form. In the following\
    \ sections of this chapter, we will build upon this example to demonstrate the\
    \ various features of CDI. Listing [10-1](#A311833_3_En_10_Chapter.html#Par64)\
    \ defines a `Wine` interface that is implemented by the `RedWine` class, as shown\
    \ in Listing [10-2](#A311833_3_En_10_Chapter.html#Par66).\n\n```\npackage com.apress.ejb.chapter10;\n\
    public interface Wine {\npublic String getColor();\n}\n```\n\nListing 10-1 — `Wine.java`\n\
    \nThe `RedWine` class demonstrates the “Context” aspect of CDI. It has the `ApplicationScoped`\
    \ annotation, which means that an instance of `RedWine` will be created only once\
    \ when the application is instantiated, and that instance will be destroyed when\
    \ the application is shut down. During the lifetime of the application, this instance\
    \ will be shared across the application. We will learn more about scopes later\
    \ in this chapter.\n\n```\npackage com.apress.ejb.chapter10;\nimport javax.enterprise.context.ApplicationScoped;\n\
    @ApplicationScoped\npublic class RedWine implements Wine {\npublic String getColor()\
    \ {\nreturn \"Red\";\n}\n}\n```\n\nListing 10-2 — `RedWine.java` demonstrates\
    \ the Context aspect\n\nThe client shown in Listing [10-3](#A311833_3_En_10_Chapter.html#Par68)\
    \ injects the field `newWine` using the `@Inject` annotation. Fields injected\
    \ using the `@Inject` annotation are instantiated by the container, which means\
    \ that users do not need to create an instance of the object using `new`, nor\
    \ do they need a compile-time dependency on the actual implementation class. An\
    \ important thing to observe here is that the `newWine` field is of type `Wine`.\
    \ In this particular case, the container automatically uses the `RedWine` implementation\
    \ for instantiation. If we had to instantiate `RedWine` in the classical way,\
    \ then we would have to use the `RedWine` implementation instead of the `Wine`\
    \ interface. As a result, there would have been a tight coupling between the client\
    \ and the `Wine` object that could not be changed either at deploy time or at\
    \ runtime. We will learn more about how the CDI container knows which implementation\
    \ to inject when we discuss dependency injection later in this chapter.\n\n```\n\
    package com.apress.ejb.chapter10;\nimport javax.inject.Inject;\npublic class WineClient\
    \ {\n// Instantiating the classical way\nprivate Wine oldWine = new RedWine();\n\
    // Instantiating via field dependency injection\n@Inject\nprivate Wine newWine;\n\
    }\n```\n\nListing 10-3 — `WineClient.java` demonstrates the Dependency Injection\
    \ Aspect\n\nFor reference, the CDI specification also defines the following services.\
    \ A more detailed explanation of these advanced CDI topics is outside the scope\
    \ of this chapter, but you are encouraged to refer to the CDI spec for additional\
    \ information.\n\n* Integration of the Web tier with contextual objects via Unified\
    \ Expression Language (EL)\n* Decorators that implement beans and can intercept\
    \ the invocation of those beans by business methods\n* Interceptors for separating\
    \ business logic from cross-cutting concerns\n* Event notification model that\
    \ defines the interaction between beans in a loosely coupled manner\n* Ability\
    \ to interact cleanly with the container via Portable Extensions\n\n## Relationship\
    \ with EJB\n\nCDI bridges the gap between the Web tier consisting of Servlets,\
    \ JSP, and JSF and the enterprise tier consisting of EJB and JPA. Servlets, JSP,\
    \ and JSF are responsible for content presentation but do not have transaction\
    \ management and persistence functionality. EJB and JPA, support database-related\
    \ operations like commit, rollback, and other transaction management functionality.\
    \ Using CDI, Web applications can perform database-related operations supported\
    \ by JPA using session beans as a façade.\n\nSession Beans participate in the\
    \ CDI life cycle like managed beans. Session Beans can be injected into other\
    \ session beans and managed beans. Managed Beans can be injected into session\
    \ beans. Users should be careful while deciding whether to use session beans or\
    \ managed beans. Session Beans should be used when the application requires the\
    \ following advanced enterprise services:\n\n* Role-based security\n* Transaction\
    \ management\n* Scalability through instance pooling\n* Concurrency\n* Events\
    \ and timers\n\nManaged beans will suffice for applications that require dependency\
    \ injection, lifecycle management, and interceptors. Managed Beans can be easily\
    \ upgraded to session beans by adding `@Stateless`, `@Stateful`, or `@Singleton`\
    \ annotation.\n\n> **Note**  \n> Message-Driven Beans and Entities are non-contextual\
    \ objects and may not be injected into other objects. Message-Driven Beans take\
    \ advantage of a few CDI features, like interceptors and decorators, as the container\
    \ performs injection on all managed bean instances including the noncontextual\
    \ ones.\n\n## CDI Concepts\n\nNow that we have a basic understanding of CDI, its\
    \ place in the Java EE stack, and its relationship with EJB, let us take a detailed\
    \ look at Contexts and Dependency Injection."
