- fmt: '### The Bean Class


    A stateful session bean class is any standard Java class that has a class-level
    annotation of `@Stateful`. If deployment descriptors are used instead of annotations,
    the bean class should be denoted as a stateful session bean. In the case of mixed
    mode, in which you are using annotations and deployment descriptors, the `@Stateful`
    annotation must be specified if any other class-level or member-level annotations
    are specified in the class.


    To illustrate a stateful session bean, we will create a `ShoppingCart` session
    bean that will keep track of the items added to a user’s shopping cart and their
    respective quantities. In this chapter, we will use hard-coded values for the
    shopping cart to illustrate the state and conversation maintenance between the
    client and stateful session bean. Listing [2-9](#A311833_3_En_2_Chapter.html#Par129)
    shows the definition of a `ShoppingCart` session bean.


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Stateful;

    @Stateful(name="ShoppingCart")

    public class ShoppingCartBean implements ShoppingCart, ShoppingCartLocal {

    public ShoppingCartBean() {

    }

    }

    Listing 2-9

    ShoppingCartBean.java

    ```


    There will be certain use cases in which the application wants to be notified
    by the EJB container before or after transactions take place and then use these
    notifications to manage data and cache. A stateful session bean can receive this
    kind of notification by the EJB container when it implements the `javax.ejb.SessionSynchronization`
    interface. This is an optional feature. There are three different types of transaction
    notifications that the stateful session bean receives from the EJB container:


    *   `afterBegin`: Indicates that a new transaction has begun

    *   `beforeCompletion`: Indicates that the transaction is going to be committed

    *   `afterCompletion`: Indicates that a transaction has been completed


    For example, the `ShoppingCart` session bean could implement the `javax.ejb.SessionSynchronization`
    interface to get an `afterCompletion` notification so that it can clear out the
    shopping cart cache.


    ### The Business Interface


    Business interfaces for stateful session beans are similar to those used for stateless
    session beans, and they are annotated in the same way, using `@Local` and `@Remote`
    annotations. Local views of stateful session beans can be accessed without a separate
    local business interface. The `ShoppingCart` session bean has both remote and
    local interfaces, as shown in Figure [2-6](#A311833_3_En_2_Chapter.html#Fig6).


    ![A311833_3_En_2_Fig6_HTML.jpg](A311833_3_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Business interfaces for ShoppingCart


    We will primarily use the local interface from our web application. The remote
    interface is added to facilitate unit testing of the bean in this chapter.


    Listings [2-10](#A311833_3_En_2_Chapter.html#Par138) and [2-11](#A311833_3_En_2_Chapter.html#Par139)
    show the remote and local `ShoppingCart` business interfaces, with `@Remote` and
    `@Local` annotations, respectively.


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Remote;

    @Remote

    public interface ShoppingCart {

    }

    Listing 2-10

    ShoppingCart.java

    ```


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Local;

    @Local

    public interface ShoppingCartLocal {

    }

    Listing 2-11

    ShoppingCartLocal.java

    ```


    Alternatively, you can use the coding style shown in Listing [2-12](#A311833_3_En_2_Chapter.html#Par141),
    in which you can specify the `@Local` and `@Remote` annotations before specifying
    `@Stateful` or `@Stateless` with the name of the business interface.


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Local;

    import javax.ejb.Remote;

    import javax.ejb.Stateful;

    @Local({ShoppingCartLocal.class})

    @Remote({ShoppingCart.class})

    @Stateful(name="ShoppingCart")

    public class ShoppingCartBean implements ShoppingCart, ShoppingCartLocal {

    public ShoppingCartBean() {

    }

    }

    Listing 2-12

    ShoppingCartBean.java

    ```


    Note


    We will follow the earlier convention in this book, in which `@Local` and `@Remote`
    annotations are marked on the business interfaces.


    ### Business Methods


    Business methods in stateful session beans are similar to those in stateless session
    beans. We will augment the `ShoppingCart` bean by adding business methods that
    will add and remove wines from the shopping cart and return a list of cart items.


    Listing [2-13](#A311833_3_En_2_Chapter.html#Par145) shows the `ShoppingCart` bean
    implementing the `addWineItem()`, `removeWineItem()`, and `getCartItems()` methods.


    ```

    package com.apress.ejb.chapter02;

    import java.util.ArrayList;

    import javax.ejb.Stateful;

    @Stateful(name="ShoppingCart")

    public class ShoppingCartBean implements ShoppingCart, ShoppingCartLocal {

    public ShoppingCartBean() {

    }

    public ArrayList cartItems;

    public void addWineItem(String wine) {

    cartItems.add(wine);

    }

    public void removeWineItem(String wine) {

    cartItems.remove(wine);

    }

    public void setCartItems(ArrayList cartItems) {

    this.cartItems = cartItems;

    }

    public ArrayList getCartItems() {

    return cartItems;

    }

    }

    Listing 2-13

    ShoppingCartBean.java

    ```


    ### Lifecycle Callback Methods


    Stateful session beans support callback events for construction, destruction,
    activation, and passivation. Following are the callbacks that map to the preceding
    events:


    *   `PostConstruct`: Denoted with the `@PostConstruct` annotation.

    *   `PreDestroy`: Denoted with the `@PreDestroy` annotation.

    *   `PreActivate`: Denoted with the `@PreActivate` annotation.

    *   `PrePassivate`: Denoted with the `@PrePassivate` annotation.


    The `PostConstruct` callback happens after a bean instance is instantiated in
    the EJB container. If the bean is using any dependency injection mechanism for
    acquiring references to resources or other objects in its environment, the `PostConstruct`
    event happens after injection is performed and before the first business method
    in the bean class is called.


    In the case of the `ShoppingCart` session bean, we could have a business method
    called `initialize()` that initializes the `cartItems` list, as shown in Listing
    [2-14](#A311833_3_En_2_Chapter.html#Par153).


    ```

    @PostConstruct

    public void initialize() {

    cartItems = new ArrayList();

    }

    Listing 2-14

    The PostConstruct Method

    ```


    The `PreDestroy` callback happens after any method where an `@Remove` annotation
    has been completed. In the case of the `ShoppingCart` session bean, we could have
    a business method called `exit()` that writes the `cartItems` list into a database.
    In this chapter, we will just print out a message to the system console to illustrate
    the callback. Listing [2-15](#A311833_3_En_2_Chapter.html#Par155) shows the code
    for the `exit()` method, which has the `@PreDestroy` annotation.


    ```

    @PreDestroy

    public void exit() {

    // items list into the database.

    System.out.println("Saved items list into database");

    }

    Listing 2-15

    The PreDestroy Method

    ```


    The `@Remove` annotation is a useful lifecycle method for stateful session beans.
    When the method with the `@Remove` annotation is called, the container will remove
    the bean instance from the object pool after the method is executed. Listing [2-16](#A311833_3_En_2_Chapter.html#Par157)
    shows the code for the `stopSession()` method, which has the `@Remove` annotation.


    ```

    @Remove

    public void stopSession() {

    // The method body can be empty.

    System.out.println("From stopSession method with @Remove annotation");

    }

    Listing 2-16

    The Remove Method

    ```


    The `PrePassivate` callback kicks in when a stateful session bean instance is
    idle for too long. During this event, the container might passivate and store
    its state to a cache. The method tagged with `@PrePassivate` is called before
    the container passivates the bean instance.


    The `PostActivate` event gets raised when the client application again uses a
    passivated stateful session bean. A new instance with restored state is created.
    The method with the `@PostActivate` annotation is called when the bean instance
    is ready.'
