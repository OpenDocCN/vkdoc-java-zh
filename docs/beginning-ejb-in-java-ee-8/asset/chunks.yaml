- fmt: '### Client View


    To a client application, an MDB is simply a message consumer. A client application
    can be any Java client of a Java EE component that is using the JMS API to send
    a message. From the perspective of the client application, the existence of an
    MDB is completely hidden behind the destination or endpoint for which the MDB
    is the message listener.


    A client’s JNDI namespace may be configured to include the destinations or endpoints
    of MDBs installed in multiple EJB containers located on multiple machines on a
    network. The actual locations of an enterprise bean and EJB container are, in
    general, transparent to the client using the enterprise bean.


    References to message destinations can be injected via the `@Resource` annotation
    (which is in the `javax.annotation` package) or via JNDI lookup in cases in which
    the resource has been defined in the deployment descriptor.


    **Note**


    Starting with EJB 3.2, a JMS resource adapter can construct a subscription name
    by looking up an MDB using its standard name.


    In the use case discussed earlier and shown in Figure [5-5](#A311833_3_En_5_Chapter.html#Fig5),
    we have a session bean that is acting as an intermediary between the client application
    and the message topic. The client application invokes a business method in the
    session bean, and the session becomes the client or JMS message producer that
    is creating and sending the message. To illustrate this, we will create a stateless
    session bean, `OrderProcessing`, with one business method, `SendOrderStatus()`.
    Listing [5-8](#A311833_3_En_5_Chapter.html#Par123) shows the code for the `OrderProcessing`
    session bean. We are using the `@Resource` annotation to inject the `TopicConnectionFactory`
    and `Topic` to which the `StatusMailer` MDB is listening. We will use some hard-coded
    values in the session bean to simulate the customer e-mail address and the content
    for the e-mail. In the `try` block, we create a connection to the `statusMessageTopicConnectionFactory`
    and start the connection. Using the created session, we create a topic session
    and topic producer with the `createSession()` and `createProducer()` methods.
    Finally, we create a `MapMessage` object; populate the message with the e-mail
    address, subject, and content; and send the message to the `Topic` using the `send()`
    method.


    ```

    package com.apress.ejb.chapter05;

    import javax.annotation.Resource;

    import javax.ejb.Stateless;

    import javax.jms.Connection;

    import javax.jms.JMSException;

    import javax.jms.MapMessage;

    import javax.jms.MessageProducer;

    import javax.jms.Session;

    import javax.jms.Topic;

    import javax.jms.TopicConnectionFactory;

    @Stateless(name = "OrderProcessing")

    public class OrderProcessingBean

    {

    public OrderProcessingBean() {

    }

    @Resource(mappedName = "StatusMessageTopicConnectionFactory")

    private TopicConnectionFactory statusMessageTopicCF;

    @Resource(mappedName = "StatusMessageTopic")

    private Topic statusTopic;

    public String SendOrderStatus() {

    String from = "chirag.rathod@oracle.com";

    String to = "chirag.rathod@oracle.com";

    String content =

    "Your order has been processed " + "If you have questions" +

    " call EJB Application with order id # " + "1234567890";

    try {

    System.out.println("Before status TopicCF connection");

    Connection connection = statusMessageTopicCF.createConnection();

    System.out.println("Created connection");

    connection.start();

    System.out.println("statted connection");

    System.out.println("Starting Topic Session");

    Session topicSession =

    connection.createSession(false, Session.AUTO_ACKNOWLEDGE);

    MessageProducer publisher = topicSession.createProducer(statusTopic);

    System.out.println("created producer");

    MapMessage message = topicSession.createMapMessage();

    message.setStringProperty("from", from);

    message.setStringProperty("to", to);

    message.setStringProperty("subject", "Status of your wine order");

    message.setStringProperty("content", content);

    System.out.println("before send");

    publisher.send(message);

    System.out.println("after send");

    }

    catch (JMSException e) {

    e.printStackTrace();

    }

    return "Created a MapMessage and sent it to StatusTopic";

    }

    }

