    ## Summary


    In this chapter, we have covered some ways to integrate different types of EJBs,
    JPA entities, and Web services with resources like data sources, JMS topics, and
    JavaMail.


    We looked at the conceptual design of our fictitious wine store application, and
    we laid out the design for the components and services that need to be built.
    We looked at individual components and services, and we demonstrated how to use
    different types of EJBs to solve specific application problems.


    The wine store application illustrated the various parts of typical back-end applications,
    which included a comprehensive persistence unit that utilized a range of JPA mappings,
    session beans that interacted with entities in the persistence unit, MDBs, and
    Web services using dependency injection.


    We also looked at how to inject various types of resources in session beans and
    MDBs and how to build asynchronicity into the application using the MDBs.


    Additionally, we looked into dealing with managed and detached entities from the
    persistence context and integrating an asynchronous model into a typical back-end
    application.


    Finally, we detailed steps on how you can package individual components and services
    into modules, assemble them into a Java EE application, and deploy them to the
    GlassFish server.


    In the next chapter, we discuss the transactional services provided by the EJB
    container and explore the different types of transactional models that you can
    use in a variety of application architectures.


    # 8. Transaction Management


    Much of the work surrounding the design and development of enterprise applications
    involves decisions about how to coordinate the flow of persistent data. This includes
    when and where to cache data, when to apply it to a persistent store (typically
    the database), how to resolve simultaneous attempts to access the same data, and
    how to resolve errors that might occur when an action occurs that violates a constraint
    in the database. A reliable database is capable of handling these issues at a
    low level—in the database tier—but these same issues can exist in the middle (application
    server) and client tiers as well, and typically require special application logic.
    For example, a database provides built-in concurrency control through pessimistic
    locking support, whereas an application may choose to use an optimistic locking
    strategy to achieve a result more optimized for performance.


    One of the principal benefits of using EJB is its support for enterprise-wide
    services like transaction management and security control. In this chapter, we
    will explore how EJB offers transaction services and how you can leverage them
    to meet your specific requirements.


    To illustrate what EJB has to offer and how to use it, we will examine a scenario
    from our sample Apress Wines Online application that exemplifies the aforementioned
    data flow issues. We will illustrate EJB’s transaction support by showing ways
    to perform tasks that range from simple and concise to slightly more complex but
    more flexible. Before we dive into the examples, though, we present an overview
    of some of the important transaction concepts in the EJB transaction realm, including
    the Java Transaction API (JTA), the many flexible transaction options offered
    to you by the EJB container through declarative EJB metadata, and a look at how
    transactions are handled in the persistence tier. EJB has offered these essential
    transaction services since its inception, so those of you who are comfortable
    with these concepts can skip ahead to the example section to see how they manifest
    themselves in an EJB world involving the Java Persistence API (JPA).'
