    ### 何时使用会话 Bean？


    会话 Bean 用于编写业务逻辑、维护客户端的会话状态，以及建模执行一个或多个业务操作的后端流程或用户任务。


    例如，当我们有某些方法或 API 不需要容器服务时，应考虑使用会话 Bean。在这种情况下，使用会话 Bean 反而会给容器带来额外开销。


    此外，数据访问对象（DAO）类不需要作为会话 Bean，因为它们将在 EJB 应用服务层中使用。


    在本书中，我们还将看到如何将无状态 EJB 会话 Bean（作为 DAO）与 Java 持久化 API（JPA）一起实现。


    典型的例子包括：


    *   人力资源应用中，用于创建新员工并将该员工分配到特定部门的会话 Bean

    *   费用报告应用中，用于创建新费用报告的会话 Bean

    *   订单录入应用中，用于为特定客户创建新订单的会话 Bean

    *   电子商务应用中，用于管理购物车内容的会话 Bean

    *   利用 EJB 容器中事务服务的会话 Bean（免去应用程序开发者编写事务支持的麻烦）

    *   当客户端应用未部署在同一服务器上时，用于解决部署需求的会话 Bean

    *   利用容器在组件或方法级别提供的安全支持的会话 Bean

    *   实现日志记录功能并在应用的不同组件之间共享的会话 Bean


    会话 Bean 可用于传统的两层或三层架构（配合专业/富客户端应用），也可用于基于 Web 的三层应用。这些应用可以部署在不同的逻辑和物理层组合中。在下一节中，我们将探讨一些可能的组合。


    #### 富客户端三层架构


    图 2-1 展示了一个典型的会话 Bean 三层架构，前端是富客户端应用，包含供最终用户（如客户服务代表、银行柜员等）使用的数据录入界面。这些客户端应用可以使用
    Java Swing 技术与 Java 平台标准版（Java SE）开发，也可以是简单的旧式 Java 对象（POJO），通过命令行运行。通常，最终用户从其桌面启动客户端应用，输入一些数据，然后通过按下某个用户界面组件（如“提交”按钮）触发事件。一般的工作流程可能如下所示：


    ![A311833_3_En_2_Fig1_HTML.jpg](img/A311833_3_En_2_Fig1_HTML.jpg)


    图 2-1


    富客户端三层架构中的会话 Bean


    1.  用户操作通过远程方法调用（RMI）建立与 EJB 容器中运行的会话 Bean 的连接。

    2.  客户端应用调用会话 Bean 中的一个或多个业务方法。

    3.  会话 Bean 处理请求，并通过与数据库、企业应用、遗留系统等交互来验证数据，以执行特定的业务操作或任务。

    4.  最后，会话 Bean 通过数据集合或包含确认消息的简单对象，将响应发送回客户端应用。


    #### Web 应用三层架构


    如图 2-2 所示，这种架构通常由运行在台式机或笔记本电脑浏览器中的 Web 应用作为前端。如今，其他类型的客户端设备，如智能手机、平板电脑、手机和 telnet
    设备，也被用于运行这些应用。运行在浏览器或移动设备中的 Web 应用使用 JavaServer Pages（JSP）、JavaServer Faces（JSF）或
    Java Servlet 等 Web 技术来呈现用户界面（数据录入界面、提交按钮等）。典型的用户操作，例如输入搜索条件或向 Web 应用购物车添加特定商品，将通过上述
    Web 技术之一调用 EJB 容器中运行的会话 Bean。一旦会话 Bean 被调用，它就会处理请求并将响应发送回 Web 应用，Web 应用按需格式化响应，然后将响应发送给请求的客户端设备（浏览器、智能手机、telnet
    等）。


    ![A311833_3_En_2_Fig2_HTML.jpg](img/A311833_3_En_2_Fig2_HTML.jpg)


    图 2-2


    Web 应用三层架构中的会话 Bean


    在刚刚讨论的三层架构中，客户端应用（即 Web 应用）和会话 Bean 可以在同一应用服务器实例中运行（共置），也可以在同一台机器的不同实例中运行。它们还可以运行在物理上分离的、各自拥有应用服务器实例的机器上。


    ## 无状态会话 Bean


    无状态会话 Bean 由以下元素组成：


    *   一个 Bean 类，包含要执行的业务方法实现


    可选地，一个或多个业务接口允许向客户端应用展示 Bean 业务方法的不同组合。无状态会话 Bean 池是一个包含所有无状态会话 Bean 实例的池。因此，当有请求到达某个
    Bean 时，容器会分配一个 Bean，无状态会话 Bean 方法执行完毕后会将 Bean 放回池中。如果没有可用的 Bean 来处理请求，该请求将被放入队列。


    ### 设置依赖项


    为了使用 Java EE 8 Enterprise Beans 3.2，我们需要确保将最新版本添加到 `pom.xml` 文件的依赖配置部分，这将确保所有
    Java EE 8 API 在编译期间可用：


    ```

    javax

    javaee-web-api

    8.0

    compile

    true


    ```


    您可以查看 Maven 仓库以找到最新的 Java EE 8 API `pom.xml` 文件：


    [`https://search.maven.org/remotecontent?filepath=javax/javaee-api/8.0/javaee-api-8.0.pom`](https://search.maven.org/remotecontent?filepath=javax/javaee-api/8.0/javaee-api-8.0.pom)

    '
- fmt: '### The Bean Class


    A stateless session bean class is any standard Java class that has a class-level
    annotation of `@Stateless`. If deployment descriptors are used instead of annotations,
    then the bean class should be denoted as a stateless session bean in the `ejb-jar.xml`
    descriptor. If you use both annotations and deployment descriptors (mixed mode),
    then the `@Stateless` annotation must be specified if any other class-level or
    member-level annotations are specified in the bean class. If both annotations
    and deployment descriptors are used, then the settings or values in the deployment
    descriptor will override the annotations in the classes during the deployment
    process.


    **Note:** Starting with EJB 3.1, a session bean class can be a subclass of another
    session bean class.


    To illustrate the use of stateless session beans, we will create a `SearchFacade`
    session bean that provides various search facilities to client applications regarding
    available wines. The workflow is as follows:


    1. Users of the application will type in or choose one or more search criteria,
    which will be submitted to the `SearchFacade` session bean.

    2. The `SearchFacade` bean will access back-end databases to retrieve the requested
    information. To simplify the code examples in this chapter, we will actually retrieve
    the list of hard-coded values within the bean class. In later chapters, we will
    augment the `SearchFacade` bean to access the back-end database.

    3. The bean returns to the client applications the information that satisfied
    the search criteria.


    Listing [2-1](#A311833_3_En_2_Chapter.html#Par54) shows the definition of the
    `SearchFacade` bean. In the following sections of this chapter, we will build
    the code that will show the preceding workflow in action. `SearchFacadeBean` is
    a standard Java class with a class-level annotation of `@Stateless`.


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Stateless;

    @Stateless(name="SearchFacade")

    public class SearchFacadeBean implements SearchFacade, SearchFacadeLocal {

    public SearchFacadeBean() {

    }

    }

    Listing 2-1

    SearchFacadeBean.java

    ```


    ### The Business Interface


    A stateless session business interface is a standard Java interface with no other
    special requirements. This interface has a list of business method definitions
    that will be available for the client application. A session bean can have a business
    interface that is implemented by the bean class; generated at design time by tools
    such as JDeveloper, NetBeans, or Eclipse; or generated at deployment time by the
    EJB container.


    Business interfaces can also use annotations, as described in the following list:


    * The `@Remote` annotation can be used to denote the remote business interface.

    * The `@Local` annotation can be used to denote the local business interface.


    **Note:** Starting with EJB 3.1, session beans support the “no-interface local
    view.” This is a variation of the local view that exposes public methods of a
    bean class without a separate business interface.


    If no annotation is specified in the interface, then the public methods of the
    bean class itself become its own de facto local interface.


    If your architecture has a requirement whereby the client application (web application
    or rich client) has to run on a different Java Virtual Machine (JVM) from the
    one that is used to run the session beans in an EJB container, then you need to
    use the remote interface. Make sure that the methods in the interface remote are
    really supposed to be remotely exposed. The separate JVMs can be on the same physical
    machine or on separate machines. If your application architecture is going to
    use the same JVM for both the client application and the session beans, then performance
    is improved by using a local interface (which can be the no-interface option).


    It is possible that your application architecture requires both remote and local
    interfaces. For example, an enterprise might have an order entry application that
    is developed using session beans that have business methods for submitting new
    orders and also addressing administrative tasks, such as data entry for the products.
    Potentially, you could have two different client applications that access the
    back-end order entry application, as follows:


    * A web client application (as shown in Figure [2-3](#A311833_3_En_2_Chapter.html#Fig3))
    that can be run in the same JVM as the session bean and used to submit new orders


    ![A311833_3_En_2_Fig3_HTML.jpg](A311833_3_En_2_Fig3_HTML.jpg)


    Figure 2-3: A web client using local interfaces of session beans


    * A rich client application (as shown in Figure [2-4](#A311833_3_En_2_Chapter.html#Fig4))
    that runs on an end-user desktop machine and is used by the administrator for
    data entry purposes


    ![A311833_3_En_2_Fig4_HTML.jpg](A311833_3_En_2_Fig4_HTML.jpg)


    Figure 2-4: A rich client using remote interfaces of session beans


    The `SearchFacade` session bean has both remote and local interfaces, as shown
    in Figure [2-5](#A311833_3_En_2_Chapter.html#Fig5).


    ![A311833_3_En_2_Fig5_HTML.jpg](A311833_3_En_2_Fig5_HTML.jpg)


    Figure 2-5: The business interfaces of the `SearchFacade` session bean


    Listing [2-2](#A311833_3_En_2_Chapter.html#Par67) shows the code snippet for the
    `SearchFacade` remote business interface with an `@Remote` annotation and a `wineSearch()`
    method declaration. The `wineSearch()` method takes one parameter that represents
    the type of the wine, and it returns a list of wines that match the wine type
    criteria.


    ```

    package com.apress.ejb.chapter02;

    import java.util.List;

    import javax.ejb.Remote;

    @Remote

    public interface SearchFacade {

    List wineSearch(String wineType);

    }

    Listing 2-2

    SearchFacade.java

    ```


    Listing [2-3](#A311833_3_En_2_Chapter.html#Par69) shows the code snippet for the
    `SearchFacade` local business interface with an `@Local` annotation and a `wineSearch()`
    method declaration.


    ```

    package com.apress.ejb.chapter02;

    import java.util.List;

    import javax.ejb.Local;

    @Local

    public interface SearchFacadeLocal {

    List wineSearch(String wineType);

    }

    Listing 2-3

    SearchFacadeLocal.java

    ```


    ### Business Methods


    The methods implemented in the bean class must correspond to the business methods
    declared in the remote or local business interfaces. They are matched up based
    on the convention that they have the same name and method signature. Other methods
    in the bean class that do not have the corresponding declaration in the business
    interfaces will be private to the bean class methods.


    The `SearchFacade` bean implements one method, `wineSearch()`, which has been
    declared in both remote and local business interfaces. The `wineSearch()` method
    returns a static wines list based on the type of wine. Listing [2-4](#A311833_3_En_2_Chapter.html#Par72)
    shows the implementation for `wineSearch()`.


    ```

    package com.apress.ejb.chapter02;

    import java.util.ArrayList;

    import java.util.List;

    import javax.ejb.Stateless;

    @Stateless(name="SearchFacade")

    public class SearchFacadeBean implements SearchFacade, SearchFacadeLocal {

    public SearchFacadeBean() {

    }

    public List wineSearch(String wineType) {

    List wineList = new ArrayList();

    if (wineType.equals("Red")) {

    wineList.add("Bordeaux");

    wineList.add("Merlot");

    wineList.add("Pinot Noir");

    }

    else if (wineType.equals("White")) {

    wineList.add("Chardonnay");

    }

    return wineList;

    }

    }

    Listing 2-4

    SearchFacadeBean.java

    ```'
