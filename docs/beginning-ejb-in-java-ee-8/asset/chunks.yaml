- fmt: '### The Test Script


    In Listing [9-2](#A311833_3_En_9_Chapter.html#Par122) we present the core of the
    Jython program generated by the HTTP Proxy when we recorded the session with a
    joined tables inheritance scheme. The think time statements, which appear in bold,
    normally will present the amount of time it took you to go from one request to
    the next while recording the test script, as measured in milliseconds. As mentioned
    earlier, we replaced the original values with zero, but you can also just delete
    that line (see Listing [9-2](#A311833_3_En_9_Chapter.html#Par122)).


    ```

    def __call__(self):

    """Called for every run performed by the worker thread."""

    self.page1()      # GET WineStoreJoined.jsp (request 101)

    grinder.sleep(0)

    self.page2()      # POST WineStoreJoined.jsp (request 201)

    grinder.sleep(0)

    self.page3()      # POST WineStoreJoined.jsp (request 301)

    grinder.sleep(0)

    self.page4()      # POST WineStoreJoined.jsp (request 401)

    Listing 9-2

    Main Section of the Test Script

    ```


    As an example of the page methods, we present in Listing [9-3](#A311833_3_En_9_Chapter.html#Par124)
    the one for page 1, the first request of the test script, along with a few definitions
    that happen before the first page method.


    ```

    url0 = ''http://glassfish:8080''

    request101 = createRequest(Test(101, ''GET WineStoreJoined.jsp''), url0)

    class TestRunner:

    """A TestRunner instance is created for each worker thread."""

    # A method for each recorded page.

    def page1(self):

    """GET WineStoreJoined.jsp (request 101)."""

    result = request101.GET(''/Chapter09-PerformanceJoined-war/faces/WineStoreJoined.jsp'')

    self.token_j_id_id17 = \

    httpUtilities.valueFromHiddenInput(''j_id_id17'') # ''j_id_id17''

    self.token_javaxfacesViewState = \

    httpUtilities.valueFromHiddenInput(''javax.faces.ViewState'') # ''9131085258160566843:4053788772783974794''

    return result

    Listing 9-3

    Example of the page method

    ```


    ### Running the Simulated Users


    You will have to modify the classpath of the following command according to where
    you installed the Grinder software. To execute the grinder, though, all you need
    is the following simple command. Just don’t launch it before you start the Grinder
    console.


    ```

    java -classpath \grinder\lib\grinder.jar net.grinder.Grinder

    ```


    ### The Grinder Console


    As an alternate way to start the console, all we do is change the directory to
    `C:\grinder\lib` and issue the following command to bring up the console:


    ```

    java –classpath grinder.jar net.grinder.Console

    ```


    Figure [9-9](#A311833_3_En_9_Chapter.html#Fig9) shows the Grinder console.


    ![A311833_3_En_9_Fig9_HTML.jpg](A311833_3_En_9_Fig9_HTML.jpg)


    Figure 9-9


    The Grinder console


    The console has a couple of buttons on the top-left side that are used to indicate
    the Grinder agent to start or reset the worker threads: that is, the simulated
    users. When you hover over them, it will present a description of the function
    of the button. Figure [9-10](#A311833_3_En_9_Chapter.html#Fig10) shows the Grinder
    console during the execution of a performance test and the information it normally
    displays.


    ![A311833_3_En_9_Fig10_HTML.jpg](A311833_3_En_9_Fig10_HTML.jpg)


    Figure 9-10


    Performance test with the Grinder


    Just to make sure that things are working fine, go ahead and do a quick test with
    only one simulated user for one cycle (after configuring the database; see “The
    Database” section, above). The steps are as follows:


    1. Use the following URL to reset the database: `http://yourserver:port/Chapter09-PerformanceJoined-war/ResetJoinedData`

    2. Reset the Glassfish server.

    3. Start the Grinder console: `java -classpath <classpath_to_the_grinder> net.grinder.Console`

    4. Edit the `grinder.properties` file, and verify that you have only one user
    and one cycle.

    5. Start the grinder agent and the grinder console by typing the following commands:
    `java -classpath <classpath_to_the_grinder> net.grinder.Grinder`

    6. Click the start button on the Grinder console. No results will be displayed
    on the console because it will run for only one cycle.

    7. Check the window where you started the Grinder agent. When it states that it
    has finished and is waiting for the console signal, click the reset button on
    the Grinder console.

    8. Go to the log directory, and review the file that starts with the word `out`.
    This file contains a summary of the whole test run, including statistics. If there
    is a problem, this file and the error file will provide you with the necessary
    information to solve it.


    After you have run these steps once for each test, you may want to update the
    `persistence.xml` file in both the JPA projects of each test app to turn off table
    generation. We left this flag on so that the tables would be created the first
    time you ran the `ResetJoinedData/ResetSingleTableData` servlets. After you have
    run each script once to create the tables for your persistence unit, you can avoid
    the overhead (and the warnings issued) due to the tables already existing for
    each subsequent run.


    Now that everything is set and ready, you can go on to the next step.'
