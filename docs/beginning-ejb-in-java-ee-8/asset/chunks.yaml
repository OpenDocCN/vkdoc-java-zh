- fmt: "#### Embeddable EJB Container Client\n\nA client using the Embeddable EJB\
    \ Container looks up EJBs through JNDI instead of through injection since a Java\
    \ EE server provides client injection, which is absent in this environment. EJBs\
    \ themselves may be injected with other EJBs, however, along with other resources\
    \ that are provided by their EJB Container.\n\nIn the JUnit examples shown later\
    \ in this chapter, the JUnit test classes themselves are the clients of the Embeddable\
    \ EJB Container. They instantiate the container directly through a static factory\
    \ method, optionally initializing the container with configuration properties.\
    \ The container then provides an `InitialContext` to the client that can be used\
    \ to look up EJB and other resources through a JNDI namespace. The Embeddable\
    \ EJB Container is capable of supporting EJBs at runtime, injecting session beans\
    \ with resources, providing a JTA context for performing transactions, and all\
    \ other services specified in EJB Lite that are listed in Table [13-1](#A311833_3_En_13_Chapter.html#Tab1).\n\
    \nWhen the Embeddable EJB Container is instantiated in an environment where the\
    \ GlassFish Embeddable Server (which also runs in a Java SE environment) is present,\
    \ GlassFish augments the experience by providing services to the Embedded EJB\
    \ Container.\n\n## JUnit Tests\n\nHaving explored the core concepts of this chapter,\
    \ let us now look at some examples in the code. Like the Embeddable EJB Container,\
    \ JUnit is essentially a Java library that you include in the class-path to enable\
    \ functionality in your application. While it is beyond the scope of this chapter\
    \ to describe all of the features of JUnit (including grouping tests into Suites,\
    \ defining initialization Parameters, and so on), for the purposes of our example,\
    \ it is useful to view the basic task of writing and executing JUnit classes as\
    \ follows:\n\n- Write test classes that follow JUnit patterns to initialize the\
    \ test environment.\n  - Write one or more methods that perform a specific unit\
    \ test by calling one or more methods on an EJB, obtain the results from those\
    \ method calls, and compare the results with previously defined expected results.\n\
    \  - At a per-class level, instantiate the Embeddable EJB Container the first\
    \ time that any test method in the class is invoked, and close the container to\
    \ release resources after the last test method is invoked.\n  - At a per-test\
    \ level, initialize the database connection used by the JPA persistence unit to\
    \ remove any existing data, and reset the state to a properly configured one.\n\
    - Invoke the JUnit test runner, passing as arguments the names of test classes\
    \ you wish to execute and adding the following to the class-path:\n  - The JUnit\
    \ classes (`.jar` file(s))\n  - The JUnit classes you wrote (optionally in `.jar`\
    \ file(s))\n  - The EJB `.jar` file(s) for EJBs you are testing, along with any\
    \ dependent `.jar` files (like JPA persistence units)\n  - An Embeddable EJB Container\
    \ `.jar`, along with any dependent `.jar` files it needs\n\nAn IDE like NetBeans,\
    \ JDeveloper, or Eclipse greatly simplifies the invocation process, as you will\
    \ see later in the chapter, and it will even set up a lot of the basic plumbing\
    \ in your JUnit test classes. This leaves you with the core task of writing just\
    \ the code specific to each unit test.\n\nLet us now dissect a JUnit test class\
    \ we have written against the EJBs in our WineApp sample application to test a\
    \ handful of scenarios.\n\n### WineAppServiceTest: A JUnit Test Class for the\
    \ WineAppService EJB\n\nFor this chapter’s example, we offer in Listing [13-1](#A311833_3_En_13_Chapter.html#Par30)\
    \ a JUnit test class that contains all of the elements required to unit test EJBs\
    \ in the Embeddable EJB Container."
  raw: "#### Embeddable EJB Container Client\n\nA client using the Embeddable EJB\
    \ Container looks up EJBs through JNDI instead of through injection since a Java\
    \ EE server provides client injection, which is absent in this environment. EJBs\
    \ themselves may be injected with other EJBs, however, along with other resources\
    \ that are provided by their EJB Container.\n\nIn the JUnit examples shown later\
    \ in this chapter, the JUnit test classes themselves are the clients of the Embeddable\
    \ EJB Container. They instantiate the container directly through a static factory\
    \ method, optionally initializing the container with configuration properties.\
    \ The container then provides an InitialContext to the client that can be used\
    \ to look up EJB and other resources through a JNDI namespace. The Embeddable\
    \ EJB Container is capable of supporting EJBs at runtime, injecting session beans\
    \ with resources, providing a JTA context for performing transactions, and all\
    \ other services specified in EJB Lite that are listed in Table [13-1](#A311833_3_En_13_Chapter.html#Tab1).\n\
    \nWhen the Embeddable EJB Container is instantiated in an environment where the\
    \ GlassFish Embeddable Server (which also runs in a Java SE environment) is present,\
    \ GlassFish augments the experience by providing services to the Embedded EJB\
    \ Container.\n\n## JUnit Tests\n\nHaving explored the core concepts of this chapter,\
    \ let us now look at some examples in the code. Like the Embeddable EJB Container,\
    \ JUnit is essentially a Java library that you include in the class-path to enable\
    \ functionality in your application. While it is beyond the scope of this chapter\
    \ to describe all of the features of JUnit (including grouping tests into Suites,\
    \ defining initialization Parameters, and so on), for the purposes of our example,\
    \ it is useful to view the basic task of writing and executing JUnit classes as\
    \ follows:\n\n*   Write test classes that follow JUnit patterns to initialize\
    \ the test environment.\n    *   Write one or more methods that perform a specific\
    \ unit test by calling one or more methods on an EJB, obtain the results from\
    \ those method calls, and compare the results with previously defined expected\
    \ results.\n    *   At a per-class level, instantiate the Embeddable EJB Container\
    \ the first time that any test method in the class is invoked, and close the container\
    \ to release resources after the last test method is invoked.\n    *   At a per-test\
    \ level, initialize the database connection used by the JPA persistence unit to\
    \ remove any existing data, and reset the state to a properly configured one.\n\
    *   Invoke the JUnit test runner, passing as arguments the names of test classes\
    \ you wish to execute and adding the following to the class-path:\n    *   The\
    \ JUnit classes (`.jar` file(s))\n    *   The JUnit classes you wrote (optionally\
    \ in `.jar` file(s))\n    *   The EJB `.jar` file(s) for EJBs you are testing,\
    \ along with any dependent `.jar` files (like JPA persistence units)\n    *  \
    \ An Embeddable EJB Container `.jar`, along with any dependent `.jar` files it\
    \ needs\n\nAn IDE like NetBeans, JDeveloper, or Eclipse greatly simplifies the\
    \ invocation process, as you will see later in the chapter, and it will even set\
    \ up a lot of the basic plumbing in your JUnit test classes. This leaves you with\
    \ the core task of writing just the code specific to each unit test.\n\nLet us\
    \ now dissect a JUnit test class we have written against the EJBs in our WineApp\
    \ sample application to test a handful of scenarios.\n\n### WineAppServiceTest:\
    \ A JUnit Test Class for the WineAppService EJB\n\nFor this chapter’s example,\
    \ we offer in Listing [13-1](#A311833_3_En_13_Chapter.html#Par30) a JUnit test\
    \ class that contains all of the elements required to unit test EJBs in the Embeddable\
    \ EJB Container."
  trans: "\n#### 可嵌入式 EJB 容器客户端\n\n使用可嵌入式 EJB 容器的客户端通过 JNDI 查找 EJB，而非通过注入方式，因为 Java\
    \ EE 服务器提供了客户端注入，而在此环境中该功能缺失。不过，EJB 本身可以注入其他 EJB，以及其 EJB 容器提供的其他资源。\n\n在本章稍后展示的\
    \ JUnit 示例中，JUnit 测试类本身即为可嵌入式 EJB 容器的客户端。它们通过静态工厂方法直接实例化容器，并可选择使用配置属性对容器进行初始化。随后，容器会向客户端提供一个\
    \ `InitialContext`，客户端可通过 JNDI 命名空间查找 EJB 及其他资源。可嵌入式 EJB 容器能够在运行时支持 EJB，为会话 Bean\
    \ 注入资源，提供用于执行事务的 JTA 上下文，以及 EJB Lite 规范中列出的所有其他服务（参见表 13-1）。\n\n当可嵌入式 EJB 容器在包含\
    \ GlassFish 可嵌入式服务器（同样运行于 Java SE 环境）的环境中实例化时，GlassFish 会通过向可嵌入式 EJB 容器提供服务来增强用户体验。\n\
    \n## JUnit 测试\n\n在探讨了本章的核心概念后，让我们来看一些代码示例。与可嵌入式 EJB 容器类似，JUnit 本质上是一个 Java 库，你将其包含在类路径中即可为应用程序启用相关功能。虽然描述\
    \ JUnit 的所有特性（包括将测试分组为测试套件、定义初始化参数等）超出了本章范围，但就我们的示例而言，了解编写和执行 JUnit 类的基本任务如下会很有帮助：\n\
    \n*   编写遵循 JUnit 模式的测试类，以初始化测试环境。\n    *   编写一个或多个方法，通过调用 EJB 的一个或多个方法执行特定单元测试，从这些方法调用中获取结果，并将结果与先前定义的预期结果进行比较。\n\
    \    *   在类级别上，当类中任何测试方法首次被调用时实例化可嵌入式 EJB 容器，并在最后一个测试方法被调用后关闭容器以释放资源。\n    * \
    \  在测试级别上，初始化 JPA 持久化单元使用的数据库连接，以清除任何现有数据，并将状态重置为正确配置的状态。\n*   调用 JUnit 测试运行器，将待执行测试类的名称作为参数传递，并将以下内容添加到类路径中：\n\
    \    *   JUnit 类（`.jar` 文件）\n    *   你编写的 JUnit 类（可选地打包在 `.jar` 文件中）\n    *  \
    \ 待测试 EJB 的 `.jar` 文件，以及任何依赖的 `.jar` 文件（如 JPA 持久化单元）\n    *   可嵌入式 EJB 容器的 `.jar`\
    \ 文件，以及其所需的任何依赖 `.jar` 文件\n\n如本章后续所示，NetBeans、JDeveloper 或 Eclipse 等 IDE 能极大简化调用过程，甚至会在你的\
    \ JUnit 测试类中设置许多基础框架。这样，你只需专注于编写每个单元测试特有的核心代码。\n\n现在，让我们剖析一个针对 WineApp 示例应用程序中的\
    \ EJB 编写的 JUnit 测试类，以测试几个场景。\n\n### WineAppServiceTest：WineAppService EJB 的 JUnit\
    \ 测试类\n\n作为本章的示例，我们在清单 13-1 中提供了一个 JUnit 测试类，其中包含在可嵌入式 EJB 容器中对 EJB 进行单元测试所需的所有元素。\n"
