    ## 会话 Bean 的客户端视图


    会话 Bean 可被视为客户端程序或应用的逻辑扩展，该应用的大部分逻辑和数据处理都在此进行。客户端应用通常通过会话 Bean 的客户端视图接口来访问会话对象。这些接口就是前面章节讨论过的业务接口。


    访问会话 Bean 的客户端应用可分为以下三种类型：


    *   **Web 服务**：你可以将无状态会话 Bean 发布为 Web 服务，供 Web 服务客户端调用。我们将在第 6 章讨论 Web 服务及其客户端。


    表 2-2


    选择本地与远程客户端的考量因素


    | 远程 | 本地 |

    | --- | --- |

    | Bean 与客户端之间的松耦合 | 对组件的轻量级访问 |

    | 位置无关性 | 位置相关性 |

    | 昂贵的远程调用 | 必须与 Bean 部署在同一位置 |

    | 对象必须序列化 | 不需要 |

    | 对象通过值传递 | 对象通过引用传递 |


    *   **远程**：远程客户端运行在与它们所访问的会话 Bean 不同的 JVM 中，如图 2-4 所示。远程客户端通过 Bean 的远程业务接口访问会话
    Bean。远程客户端可以是另一个 EJB、一个 Java 客户端程序或一个 Java Servlet。远程客户端具有位置无关性，这意味着它们可以使用与运行在同一个
    JVM 中的客户端相同的 API。

    *   **本地**：本地客户端运行在同一个 JVM 中，如图 2-3 所示，并通过本地业务接口访问会话 Bean。本地客户端可以是另一个 EJB，或者是使用
    Java Servlet、JavaServer Pages (JSP) 或 JavaServer Faces (JSF) 的 Web 应用。本地客户端具有位置相关性。远程客户端与本地客户端的比较见表
    2-2。


    在某些情况下，会话 Bean 需要同时拥有本地和远程业务接口，以支持不同类型的客户端应用。客户端可以通过依赖注入或 JNDI 查找来获取会话 Bean 的业务接口。在调用会话
    Bean 中的方法之前，客户端需要通过 JNDI 获取 Bean 的存根对象。一旦客户端获得了存根对象的句柄，它就可以调用会话 Bean 中的业务方法。对于无状态会话
    Bean，每次调用都可以获取一个新的存根。对于有状态会话 Bean，存根需要在客户端缓存，以便容器知道在后续调用中返回哪个 Bean 实例。使用依赖注入，我们可以通过以下代码获取
    `SearchFacade` 会话 Bean 的业务接口：


    ```

    @EJB SearchFacade searchFacade;

    ```


    如果访问会话 Bean 的客户端是远程的，那么在获取了具有正确环境属性的上下文接口后，客户端可以使用 JNDI 查找。本地客户端也可以使用 JNDI 查找，但依赖注入能产生更简洁的代码。清单
    2-24 展示了 `SearchFacadeTest` 客户端程序的代码，该程序查找 `SearchFacade` Bean，调用 `wineSearch()`
    业务方法，并打印返回的葡萄酒列表。`SearchFacadeClient` 还查找了 `ShopperCount` 单例 Bean，并调用 `getShopperCount()`
    业务方法来打印已登录的购物者数量。


    注意


    如果远程客户端是一个 Java 应用或命令行程序，则可以使用应用客户端容器来调用会话 Bean。应用客户端容器支持远程客户端的依赖注入。我们将在第 12 章与其他类型的客户端应用一起讨论应用客户端容器。


    ```

    package com.apress.ejb.chapter02;

    import java.io.IOException;

