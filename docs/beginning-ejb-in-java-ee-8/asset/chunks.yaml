    \ 章中，我们介绍了依赖注入作为编程设计模式的概念。在本节中，我们将初步了解如何在无状态会话 Bean 中使用依赖注入。依赖注入将在第 10 章中详细讨论。\n\
    \nEJB 容器提供了将各种类型的资源注入无状态会话 Bean 的功能。通常，为了执行用户任务或处理来自客户端应用程序的请求，会话 Bean 中的业务方法需要一种或多种类型的资源。这些资源可以是其他会话\
    \ Bean、数据源或消息队列。托管 Bean 可以使用上下文和依赖注入（CDI）注入到会话 Bean 中。\n\n无状态会话 Bean 尝试使用的资源可以通过注解或部署描述符进行注入。可以通过对实例变量进行注解或对\
    \ setter 方法进行注解来获取资源。清单 2-5 展示了一个基于 setter 和实例变量注入 `myDb` 的示例，该变量代表数据源。\n\n```\n\
    @Resource\nDataSource myDb;\n// 或\n@Resource\npublic void setMyDb(DataSource myDb)\
    \ {\nthis.myDb = myDb;\n}\n清单 2-5\n数据源注入\n```\n\n你通常会使用 setter 注入来预配置或初始化注入资源的属性。\n"
- fmt: '# Lifecycle Callback Methods


    There will be certain instances or use cases in which the application using session
    beans requires fine-grained control over lifecycle events like its own creation,
    removal, and so on. For example, the `SearchFacade` session bean might need to
    perform some database initialization when it is created or close some database
    connections when it is destroyed. The application can gain fine-grained control
    over the various stages of the bean life cycle via methods known as callback methods.
    A callback method can be any method in the session bean that has callback annotations.
    The EJB container calls these methods at the appropriate stages of the bean’s
    life cycle (bean creation and destruction).


    Following are two such callbacks for stateless session beans:


    * `PostConstruct`: Denoted with the `@PostConstruct` annotation. Methods on the
    bean class that use a specific signature, as described below, can be marked with
    this annotation.

    * `PreDestroy`: Denoted with the `@PreDestroy` annotation. Again, any method in
    the bean class with a specific signature, as described below, can be marked with
    this annotation.


    Callback methods defined on a bean class should have the following signature:


    ```

    void ()

    ```


    Callback methods can also be defined on a bean’s listener class; these methods
    should have the following signature:


    ```

    void (Object)

    ```


    where `Object` may be declared as the actual bean type, which is the argument
    passed to the callback method at runtime. Lifecycle callback methods can have
    public, private, protected, or package-level access. A lifecycle callback method
    must not be declared as `final` or `static`.


    `PostConstruct` callbacks happen after a bean instance is instantiated in the
    EJB container. If the bean is using any dependency injection mechanisms for acquiring
    references to resources or other objects in its environment, `PostConstruct` will
    occur after injection is performed and before the first business method in the
    bean class is called. In the case of the `SearchFacade` session bean, you could
    have a business method, `wineSearchByCountry()`, which would return the wine list
    for a particular country and have a `PostConstruct` callback method, `initializeCountryWineList()`,
    that would initialize the country’s wine list whenever the bean gets instantiated.
    Ideally, you would load the list from a back-end datastore; but in this chapter,
    we will just use some hard-coded values that get populated into a `HashMap`, as
    shown in Listing [2-6](#A311833_3_En_2_Chapter.html#Par103).


    ```

    @PostConstruct

    public void initializeCountryWineList() {

    // countryMap is HashMap

    countryMap.put("Australia", "Sauvignon Blanc");

    countryMap.put("Australia", "Grenache");

    countryMap.put("France","Gewurztraminer");

    countryMap.put("France","Bordeaux");

    }

    Listing 2-6

    The PostConstruct Method

    ```


    The `PreDestroy` callback happens before the container destroys an unused or expired
    bean instance from its object pool. This callback can be used to close any connection
    pool that has been created with dependency injection and also to release any other
    resources.


    In the case of the `SearchFacade` session bean, we could add a `PreDestroy` callback
    method (`destroyWineList()`) into the `SearchFacade` bean, which would clear the
    country wine list whenever the bean gets destroyed. Ideally, during `PreDestroy`,
    we would close any resources that have been created with dependency injection;
    but in this chapter, we will just clear the `HashMap` that has the countries and
    wine list. Listing [2-7](#A311833_3_En_2_Chapter.html#Par106) shows the `destroyWineList()`
    code.


    ```

    @PreDestroy

    public void destroyWineList() {

    countryMap.clear();

    }

    Listing 2-7

    The PreDestroy Method

    ```


    ## Interceptors


    The EJB specification provides annotations called interceptors, which allow you
    to interpose on a business method invocation to add your own wrapper code before
    and/or after the method is called. An interceptor method can be defined for session
    and message-driven beans (MDBs). We will show you the usage of interceptors in
    the session bean context.


    There are a number of use cases for interceptors in a typical application in which
    you would find a need to perform a certain task before or after the business method
    is invoked. For example, you may wish to do one of the following:


    * Perform additional security checks before a critical business method that transfers
    more than $100,000 dollars

    * Do some performance analysis to compute the time it takes to perform the task

    * Do additional logging before or after the method invocation


    There are two ways to define an interceptor. You can either add an `@AroundInvoke`
    annotation on a particular method, or you can annotate the bean class to designate
    an interceptor class that will interpose on all (or an explicit subset of) methods
    on the bean class. An interceptor class is denoted by the `@Interceptor` annotation
    on the bean class with which it is associated. In the case of multiple interceptor
    classes, the `@Interceptors` annotation is used. Method specific interceptor is
    denoted by applying the `@Interceptors` annotation to the business method. Methods
    that are annotated with `@AroundInvoke` should have the following signature:


    ```

    Object (InvocationContext) throws Exception

    ```


    `AroundInvoke` methods can have public, private, protected, or package-level access.
    An `AroundInvoke` method must not be declared as `final` or `static`. The definition
    of `InvocationContext` is as follows:


    ```

    package javax.ejb;

    public interface InvocationContext {

    public Object getBean();

    public java.lang.reflect.Method getMethod();

    public Object[] getParameters();

    public void setParameters(Object[] params);

    public EJBContext getEJBContext();

    public java.util.Map getContextData();

    public Object proceed() throws Exception;

    }

    ```


    The following list describes the methods in the preceding code:


    * `getBean()` returns the instance of the bean on which the method was called.

    * `getMethod()` returns the method on the bean instance that was called.

    * `getParameters()` returns the parameters for the method call.

    * `setParameters()` modifies the parameters used for the method call.

    * `getEJBContext()` gives the interceptor methods access to the bean’s `EJBContext`.

    * `getContextData()` allows values to be passed between interceptor methods in
    the same `InvocationContext` instance using the `Map` returned.

    * `proceed()` invokes the next interceptor, if there is one, or invokes the target
    bean method.


    In the `SearchFacade` session bean, we can add an interceptor that logs the time
    taken to execute each business method when invoked by the client applications.
    Listing [2-8](#A311833_3_En_2_Chapter.html#Par125) shows a time log method that
    will print out the time taken to execute a business method. `InvocationContext`
    is used to get the name of bean class and the invoked method name. Before invoking
    the business method, current system time is captured and deducted from the system
    time after the business method is executed. Finally, the details are printed out
    to the console log using `System.out.println`.


    ```

    @AroundInvoke

    public Object TimerLog (InvocationContext ctx) throws Exception {

    String beanClassName = ctx.getClass().getName();

    String businessMethodName = ctx.getMethod().getName();

    String target = beanClassName + "." + businessMethodName ;

    long startTime = System.currentTimeMillis();

    System.out.println ("Invoking " + target);

    try {

    return ctx.proceed();

    }

    finally {

    System.out.println ("Exiting" + target);

    long totalTime = System.currentTimeMillis() - startTime;

    System.out.println ("Business method" + businessMethodName +

    "in" + beanClassName + "takes" + totalTime + "ms to execute");

    }

    }

    Listing 2-8

    The Interceptor Method

    ```


    ## Stateful Session Beans


    Similar to stateless session beans, stateful beans comprise a bean class and,
    optionally, one or more business interfaces.'
