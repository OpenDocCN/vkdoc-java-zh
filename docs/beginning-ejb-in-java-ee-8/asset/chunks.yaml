    The @ActivationConfigProperty Annotation

    ```


    #### The Message Selector


    The message selector allows filtering of incoming messages based on the selection
    criteria provided by the bean developer using the `@ActivationConfigProperty`
    annotation. This property is useful for restricting the messages that the bean
    receives. For example, the MDB that processes the incoming orders might only process
    orders pertaining to red and white wines. The property name used to specify is
    `messageSelector`.


    #### Message Destination


    The message destination describes whether the MDB listens on a queue or topic.
    Bean developers can provide the description in the bean using the `@ActivationConfigProperty`
    annotation. The value of the property must be either `javax.jms.Queue` or `javax.jms.Topic`.
    For example, a new order may need to be processed by an inventory system as a
    next step in the workflow; in this case, the order entry system doesn’t have to
    broadcast the new order message. Both the order entry and inventory system can
    agree on a particular destination. Listing [5-3](#A311833_3_En_5_Chapter.html#Par69)
    shows the code to specify destination name and type.


    #### Subscription Durability


    If the bean is designed to listen to a topic, then the bean developer can further
    specify the durability of the message. The topic can be either `Durable` or `Non-Durable`.
    Usage of `Durable` topics ensures reliability for the applications. They ensure
    that messages are not missed, even if the EJB container is temporarily offline.
    For example, we may need to make sure that the new purchase orders received from
    client applications are not lost if the EJB container goes down. All purchase
    orders have to be reliably processed by the MDBs. We can use the `@ActivationConfigProperty`
    annotation to specify the durability using the `subscriptionDurability` property.
    Listing [5-5](#A311833_3_En_5_Chapter.html#Par80) shows the code to set the property
    to `Durable`. If this property is not set, the container will assume the default
    of `Non-Durable`.


    ```

    @MessageDriven(

    activationConfig= {

    @ActivationConfigProperty(propertyName="subscriptionDurability", propertyValue="Durable")}

    )

