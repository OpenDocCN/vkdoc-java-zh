    constraints when the row data is inserted during the `EntityManager.persist()`
    call.


    There are two ways you can use a composite primary key to implement your entity’s
    identity. They are described in the following sections.'
  trans: '

    ## 多态 JPQL 查询


    类似地，JPQL 和条件 API 查询可以选择或连接超类型类的实体，并且任何符合查询条件的子类型实例都将被返回在查询结果列表中。此外，查询可以使用内部的 `JOIN`
    子句将引用绑定到超类型层次结构中的任意类型，唯一的限制是 `JOIN` 子句的左侧和右侧必须解析为共同的基类型。


    在前面的继承层次结构中，定义在抽象 `Person` 和 `Employee` 实体上的命名查询 `"Person.findAll"` 和 `"Employee.findAll"`
    就是多态查询的示例。从这些查询返回的实例都是具体的实体——要么是 `FullTimeEmployee`，要么是 `PartTimeEmployee`。


    举例来说，让我们看看示例客户端中的一些代码。清单 4-23 查询了所有家庭地址位于圣马特奥某处的 `Employee` 实例。该查询是在抽象 `Employee`
    实体上发出的，并遍历了定义在根 `Person` 实体上的 `homeAddress` 关系字段。任何从此查询返回的实体都是具体的，要么是 `FullTimeEmployee`，要么是
    `PartTimeEmployee`。


    ```

    //  用于演示多态关系使用的临时 JPQL

    final String stmt =

    "select o from Employee o where o.homeAddress.city = ''San Mateo''";

    final List emps = em.createQuery(stmt).getResultList();

    for (Employee emp : emps)

    {

    System.out.println(emp.getFirstName());

    System.out.println(emp.getLastName());

    }

    清单 4-23

    演示 JPQL 中多态关系使用的代码清单

    ```


    ## 使用原生 SQL 查询


    JPQL 提供了按名称引用实体字段以及通过关系与其他实体连接的能力，而无需考虑底层映射细节。这为数据库模式定义者和查询定义者角色之间提供了一定程度的独立性。然而，有时您希望控制查询以利用特定的索引、返回稀疏数据集，或者以其他方式发出用
    SQL 表达更方便的查询。JPA 让您可以轻松做到这一点，并且如果您愿意，它甚至支持将查询结果映射回实体。


    例如，您可能希望使用原生 SQL 查询，仅从一个恰好映射到您某个实体的表中返回名称和主键列数据。然后，查询到的名称值可以通过组合框呈现给用户，只有当用户选择一个名称时，您才去访问
    `EntityManager`，并使用 `EntityManager.find(Object primaryKey)` 调用将该名称对应的主键值绑定到一个实体实例上。如果您使用
    JPQL 返回一个完全加载的实体集合，而不是仅返回稀疏的键和名称数据集，那么您将查询比实际需要更多的数据字段，从而导致消耗比实际需要更多的资源。


    清单 4-24 中的示例展示了如何定义一个返回 `Address` 实体类型实例的命名原生 SQL 查询。执行此命名原生查询对客户端来说与执行等效的 JPQL
    命名查询相同。


    ```

    @NamedNativeQueries({

    @NamedNativeQuery(name = "Address.findAllNative",

    query = "select id, city, state, street1, street2, zip_code from ch04_join_address",

    resultClass=Address.class)})

    清单 4-24

    演示原生 SQL 支持的代码清单

    ```


    ## 查询条件 API


    自 2.0 版本起，JPA 引入了一种使用强类型组件来定义和执行查询的替代 JPQL 的方法。仅使用 Java，条件 API 允许您动态构建任意复杂的查询并执行它们，以返回与通过
    JPQL 所能实现的相同结果，但具有编译时类型检查。由于相同的底层查询引擎同时用于 JPQL 和条件 API，它们在能力上是等效的，并且对于 JPQL 中可以表达的每个特性，都有一个对应的条件
    API 调用。例如，在需要通过查询构建器动态定义查询的情况下，条件 API 可能比动态构建等效的 JPQL 语句更易于管理。我们在第 3 章中讨论了 JPA
    2.2 作为 Java EE 8 的一部分引入了哪些更改。


    虽然完整的条件 API（如同 JPQL 语言的完整特性集）超出了本书的范围，但我们在清单 4-25 中展示了一个如何使用它的示例。


    ```

    /**

    *  条件 API 等效于以下 JPQL 查询：

    *

    *    select o from Address o where o.city = :city

    */

    public List getAddressFindByCity(String city) {

    //  定义一个查询以返回 Address 类型的对象

    CriteriaBuilder cb = em.getCriteriaBuilder();

    CriteriaQuery c = cb.createQuery(Address.class);

    Root addr = c.from(Address.class);

    //  添加 SELECT 子句

    c.select(addr);

    //  在 WHERE 子句中定义一个谓词，将 city 属性与参数值进行比较

    ParameterExpression p = cb.parameter(String.class, "city");

    c.where(cb.equal(addr.get("city"), p));

    //  绑定 ''city'' 参数

    TypedQuery q = em.createQuery(c);

    q.setParameter("city", city);

    //  将查询结果作为 List 返回

    return q.getResultList();

    }

    清单 4-25

    演示查询条件 API 使用的代码清单

    ```


    条件 API 是一种更正式的方法，但在合适的应用场景中可能非常有用。


    ## 复合主键与嵌套外键


    在将实体映射到新模式时，最佳实践是指定一个专用的单列作为主键列，正如我们在前面的示例中所做的那样。实体的主键值一旦分配就不能更新。此外，专门使用一列来保存主键，而不是使用名称或其他包含有意义属性数据的列，可以消除用户希望修改恰好是主键一部分的语义重要字段时可能产生的潜在冲突。遵循一种对所有实体通用的单一方法也是可取的，而使用单个专用列作为主键是我们发现效果良好的简单模式。


    然而，在某些情况下，模式已经定义好并正在被适配为 JPA 实体，或者出于其他原因需要复合主键。我们经常遇到的一种遗留情况是，复合主键包含列，例如外键列，这些列也参与了与其他实体的关系。除此之外，这些关系必然是强制性的（因为所有主键列必须为
    `NOT NULL`），因此当您需要持久化这些相关实体时，必须小心如何持久化您的实体图，以避免在 `EntityManager.persist()` 调用期间插入行数据时违反
    `NOT NULL` 约束。


    有两种方法可以使用复合主键来实现实体的标识。它们将在以下章节中描述。

    '
- fmt: '### Using an Embedded Composite Key (`@EmbeddedId`)


    If the fields of the composite key do not represent useful property data that
    you consider to be part of the entity definition, you can designate a single entity
    field to be the primary key field and set its type to be the composite key class
    type. This composite key class is marked `@Embedded`. Its fields will be mapped
    as if they were part of the entity itself, but they will only be accessible to
    clients through the composite field.


    The embedded composite key field `myId` on the entity is annotated `@EmbeddedId`.
    In Listing [4-26](#A311833_3_En_4_Chapter.html#Par143), we introduce the `@Embeddable`
    class `MyIdClass`, containing the field’s `firstName` and `lastName` fields that
    were previously on `Person`.


    ```

    @Embeddable

    public class MyIdClass {

    @Column(name = "FIRST_NAME", length = 400)

    private String firstName;

    @Column(name = "LAST_NAME", length = 400)

    private String lastName;

    @Override

    public boolean equals(Object obj) {

    return (obj instanceof MyIdClass &&

    firstName.equals(((MyIdClass) obj).getFirstName()) &&

    lastName.equals(((MyIdClass) obj).getLastName()));

    }

    @Override

    public int hashCode() {

    return System.identityHashCode(this);

    }

    /* get/set methods */

    }

    Listing 4-26

    MyIdClass.java, an @Embeddable class suitable for use as an @EmbeddedId

    ```


    Listing [4-27](#A311833_3_En_4_Chapter.html#Par145) shows this new class being
    used as an `@EmbeddedId` on the `Person` class.


    ```

    @Entity

    @NamedQueries({

    @NamedQuery(name = "Person.findAll", query = "select o from Person o")})

    @Table(name = "CH04_EMBID_PERSON")

    public class Person implements Serializable {

    @SuppressWarnings("compatibility:-7074714881275658754")

    private static final long serialVersionUID = 5291172566067954515L;

    @EmbeddedId

    private MyIdClass myId = new MyIdClass();

    @Version

    private Integer version;

    public Person() {

    }

    /* get/set methods */

    }

    Listing 4-27

    Person.java, Illustrating Usage of a Composite Primary Key Using an @EmbeddedId
    Annotation

    ```


    To transform the `Person` class to use an embedded ID, we replaced the `@Id Integer
    id` field with the `@EmbeddedId myIdClass myId` field. To fit this entity back
    into our sample `JOINED` entity hierarchy, the `manager` relationship field on
    `Person`’s `Employee` subentity and the PK fields on all subentities would need
    to be modified to map to all of the columns in the new primary key.


    ### Exposing Composite Key Class Fields Directly on the Entity Class (`@IdClass`)


    An alternative approach to mapping a composite primary key is to declare fields
    explicitly on the entity class for each field in the primary key class, but annotate
    each of them `@Id`, as shown in Listing [4-28](#A311833_3_En_4_Chapter.html#Par149).
    If any of the fields on the primary key double as useful properties on your entity,
    you will probably want to take this approach. You then define a new composite
    key class that declares each of these `@Id` fields, taking care that they exactly
    match the key class fields in name and type.


    Starting with the classes from the previous example that used an `@EmbeddedId`,
    we can modify `MyIdClass` to remove the `@Embedded` annotation, as shown in Listing
    [4-28](#A311833_3_En_4_Chapter.html#Par149).


    ```

    public class MyIdClass implements Serializable {

    @Column(name = "FIRST_NAME", length = 400)

    private String firstName;

    @Column(name = "LAST_NAME", length = 400)

    private String lastName;

    public MyIdClass() {

    }

    public MyIdClass(String firstName, String lastName) {

    this.firstName = firstName;

    this.lastName = lastName;

    }

    @Override

    public boolean equals(Object obj) {

    return obj instanceof MyIdClass && firstName.equals(((MyIdClass) obj).getFirstName())
    && lastName.equals(((MyIdClass) obj).getLastName());

    }

    @Override

    public int hashCode() {

    return System.identityHashCode(this);

    }

    /* get/set methods */

    }

    Listing 4-28

    MyIdClass.java, a Serializable Java class suitable for Use as an @IdClass

    ```


    This composite key class requires no special annotations. It is primarily used
    when looking up a `Person` instance through its primary key, using the `EntityManager.find()`
    method.


    On `Person`, both the `firstName` and `lastName` fields are now marked `@Id`.
    We have added an `@IdClass` annotation that identifies `MyIdClass` as the composite
    primary key class, as shown in Listing [4-29](#A311833_3_En_4_Chapter.html#Par152).


    ```

    @Entity

    @NamedQueries({

    @NamedQuery(name = "Person.findAll", query = "select o from Person o")})

    @Table(name = "CH04_IDCLASS_PERSON")

    @IdClass(MyIdClass.class)

    public class Person implements Serializable {

    @SuppressWarnings("compatibility:-7074714881275658754")

    private static final long serialVersionUID = 5291172566067954515L;

    @Id

    @Column(name = "FIRST_NAME", length = 400)

    private String firstName;

    @Id

    @Column(name = "LAST_NAME", length = 400)

    private String lastName;

    @Embedded

    private Address homeAddress;

    @Version

    private Integer version;

    public Person() {

    }

    /* get/set methods */

    }

    Listing 4-29

    Person.java, an Entity Employing an @IdClass as a Composite Primary Key

    ```


    ### Mapping Relationships That Use Composite Keys


    When defining a relationship in which the target entity uses a composite primary
    key, the owning entity must map its relationship field to columns of the corresponding
    type. This requires use of the `@JoinColumns` annotation (or equivalent XML metadata).
    If these columns happen to be nested in the owning entity’s primary key, or if
    they are otherwise `NOT NULL` constrained, then the relationship must be bound
    at the time the `EntityManager.persist()` operation is called to persist this
    entity into the persistence context, or at least by the time `EntityManager.flush()`
    is called to issue the database `INSERT` call.


    In the following example, the `PersonPK` composite primary key class contains
    two fields—`id` and `addressId`—that are mandatory (`NOT NULL`) since they are
    part of the primary key. Since the `addressId` and the relationship field `homeAddress`
    both map to the same `ADDRESS_ID` column, and only one of these fields may be
    insertable and updatable, we must mark one of the fields to be read-only. In Listing
    [4-30](#A311833_3_En_4_Chapter.html#Par155), the relationship field `homeAddress`
    is marked as read-only by assigning the `insertable=false` and `updatable=false`
    attributes on the `@JoinColumn` annotation.


    ```

    /*

    * Person: An abstract entity, and the root of a SINGLE_TABLE hierarchy,

    * demonstrating use of a composite key that contains a field whose mapped

    * column is also mapped to a relationship field.

    */

    @Entity

    @Inheritance(strategy = InheritanceType.SINGLE_TABLE)

    @NamedQueries({

    @NamedQuery(name = "Person.findAll", query = "select o from Person o")})

    @TableGenerator(name = "Person_ID_Generator", table = "CH04_FKINPK_PERSON_ID_GEN",

    pkColumnName = "PRIMARY_KEY_NAME", pkColumnValue = "Person.id",

    valueColumnName = "NEXT_ID_VALUE")

    @Table(name = "CH04_FKINPK_PERSON")

    @IdClass (PersonPK.class)

    public abstract class Person

    implements Serializable

    {

    @Id

    @Column(name = "ADDRESS_ID")

    private Integer addressId;

    @Id

    @Column(nullable = false)

    @GeneratedValue(strategy = GenerationType.TABLE, generator = "Person_ID_Generator")

    private Integer id;

    @Column(name = "FIRST_NAME")

    private String firstName;

    @Column(name = "LAST_NAME")

    private String lastName;

    @Version

    private Integer version;

    @OneToOne(cascade = { CascadeType.ALL })

    @JoinColumn(name = "HOME_ADDRESS")

    private Address homeAddress;

    public Person() {

    }

    /* get/set methods */

    }

    Listing 4-30

    Person.java, with a Composite Primary Key that Maps to a Column that Is Shared
    by Both an Ordinary @Id Field and a Relationship Field

    ```


    When using this `Person` class, you may retrieve data through the `homeAddress`
    relationship field, but you may not update this field. Its value must be populated
    at the time the entity is persisted, and since it is part of the entity’s primary
    key, it may not subsequently be modified.'
