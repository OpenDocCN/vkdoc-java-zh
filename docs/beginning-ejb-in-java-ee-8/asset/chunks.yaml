    Java 工件的包。我们将这些工件生成在 `com.apress.ejb.chapter06.services.client` 包中。输入这些详细信息，如图
    6-13 所示，然后完成向导。


    ![A311833_3_En_6_Fig13_HTML.jpg](img/A311833_3_En_6_Fig13_HTML.jpg)


