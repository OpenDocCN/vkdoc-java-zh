    打开 Chapter03-PersistenceSamples 项目


    展开 `Chapter03-PersistenceSamples-ejb` 节点，观察包含此示例应用程序的 EJB 外观层和 JPA 实体的包，以及章节列表的源代码。`persistence.xml`
