- fmt: "#### Creating an Enterprise Archive (EAR) File (Optional)\n\nIf you (as the\
    \ Assembler) have created multiple archives that you want to deploy together as\
    \ a logical group, you will need to bundle these archives together inside a wrapper\
    \ JAR file known as an EAR file, which uses the suffix `.ear`. This EAR file is\
    \ referred to as a Java EE application. If you have created only a single EJB\
    \ JAR or WAR archive, no further packaging is required. You can skip the step\
    \ of creating a wrapper EAR file, and deploy the EJB JAR or WAR file as a stand-alone\
    \ module.\n\nAn application acts as a packaging boundary, ensuring that the Java\
    \ EE components in all modules are able to communicate with each other within\
    \ a single naming context. A Java EE application does not necessarily correspond\
    \ to an actual end-user application as it may be used by many different client\
    \ applications, but it allows client applications to connect to the Java EE application\
    \ once and access the Java EE components in that application from a single context.\n\
    \nAn EAR file may contain an application-level deployment descriptor, `application.xml`,\
    \ in its `META-INF` directory. This file is optional in Java EE 5, since it is\
    \ now possible to rely on default rules to provide default names and properties\
    \ for each module. By default, each module name defaults to the short name of\
    \ its archive file, minus the file suffix (`.jar`, `.war`, and so on). Defining\
    \ an `application.xml` descriptor allows you to refine the default names and properties\
    \ and to choose selectively which modules in the EAR file to include in the application\
    \ for a particular deployment. The Figure [11-3](#A311833_3_En_11_Chapter.html#Fig3)\
    \ shows the EAR File Structure.\n\n> **Note**  \n> A WAR file and an EAR file\
    \ are standard JAR files with a `.war` or `.ear` extension respectively.\n\n![A311833_3_En_11_Fig3_HTML.jpg](A311833_3_En_11_Fig3_HTML.jpg)\n\
    \n**Figure 11-3** EAR File Structure\n\n#### Assembler-Specific Tasks\n\nDepending\
    \ on the completeness and the complexity of the deployment descriptors for each\
    \ module, the Assembler may be required to complete or refine some of the external\
    \ references declared by the Provider. In many cases, the modules are sufficiently\
    \ self-contained and complete so that there is no further work for the Assembler\
    \ to perform, even when a deployment descriptor is not supplied by the Provider.\
    \ In more complex deployment scenarios, when Provider-supplied documentation is\
    \ used (possibly communicated through description properties on either the annotations\
    \ or in the deployment descriptor), the Assembler may need to consolidate semantically\
    \ equivalent but disparately named resources into a minimal, distinct set. Conversely,\
    \ the Assembler may need to avoid resource name collisions by renaming resource\
    \ references that share the same name but hold different semantics.\n\nFor example,\
    \ if the Assembler is bundling two Java EE modules produced by different providers\
    \ into a single Java EE application, both providers may reference the same logical\
    \ EJB but use different names, or they may reference them with the names not yet\
    \ bound. It is the responsibility of the Assembler to detect cases such as this,\
    \ using the documentation provided by the Provider(s), and update the EJB references\
    \ to bind to a single name. This name may be chosen by the Assembler and assigned\
    \ to the EJB in that application context.\n\nAny changes made by the Assembler\
    \ are applied only to the module and application deployment descriptor files,\
    \ and not to the Java source. This process works because of the rules of precedence\
    \ dictated by Java EE, which in the case where conflicting metadata properties\
    \ are defined both in the Java annotation source and the XML deployment descriptors,\
    \ the deployment descriptors will prevail. The Assembler is able to resolve inconsistencies\
    \ in the Java source by working only with the deployment descriptor files.\n\n\
    ### The Deployer\n\nThe tasks and deliverables of the Deployer are depicted in\
    \ Figure [11-4](#A311833_3_En_11_Chapter.html#Fig4).\n\n![A311833_3_En_11_Fig4_HTML.jpg](A311833_3_En_11_Fig4_HTML.jpg)\n\
    \n**Figure 11-4** Tasks and deliverables of the Application Deployer\n\n#### Deployer-Specific\
    \ Tasks\n\nAgain, using instructions from the Assembler (and Provider)—typically\
    \ communicated through description properties in the deployment descriptors or\
    \ source annotations, the Deployer is required to bind all external references\
    \ onto concrete resources (EJB references, resource references, persistence unit\
    \ references, and so on) in the target application server environment. Only the\
    \ Deployer can presume to know about the target server environment, and Java EE\
    \ has deliberately added a layer of indirection to all resource usage to allow\
    \ this binding to occur without affecting the work of either the Provider or the\
    \ Assembler. This is why all resources used by the Java EE components are referred\
    \ to via indirect references.\n\nAs was the case with the Assembler, Java EE policy\
    \ dictates that the Deployer is allowed to make changes only to the XML deployment\
    \ descriptor files and not to annotations in the Java source.\n\n#### Invoking\
    \ the Application Server-Specific Deployment Tool\n\nFinally, your Java EE module\
    \ or your Java EE application is ready to be submitted to the application server.\
    \ Your application server will provide a deployment tool that lets you complete\
    \ the deployment and install the Java EE components in the application server,\
    \ ready to be executed by the end-user applications. During this stage, the deployment\
    \ tool will validate the module(s) being submitted for internal integrity and\
    \ ensure that all resources can be bound to actual objects that reside in the\
    \ application server environment. The deployment will fail if any required resources\
    \ cannot be located at deploy time, or if referenced library components are not\
    \ found.\n\n> **Note**  \n> The application server will run once per environment,\
    \ meaning that only one runtime is started.\n\n#### Summary of Overview\n\nJava\
    \ EE deployment lets you deploy individual modules, library components, or complete\
    \ applications. In many cases, deployment may simply involve packaging the compiled\
    \ source, together with the descriptors (a `persistence.xml` file is mandatory\
    \ for persistence units, but `ejb-jar.xml`, `web.xml`, and `application.xml` files\
    \ are optional for an EJB JAR, WAR and EAR modules respectively) and submitting\
    \ them to a deployment tool. When assembling applications from multiple modules\
    \ that may have been built by different component providers and may be of differing\
    \ versions, the Assembler role takes on greater importance.\n\n## Java EE Deployment\
    \ Infrastructure\n\nNow that we have summarized the deployment process, let us\
    \ explore some areas of the Java EE infrastructure that are central to deployment.\
    \ An understanding of this topic is useful when it is time to make your own decisions\
    \ about how to package your code into modules and to resolve and bind external\
    \ references.\n\n### The Java EE Server\n\nThe Java EE server is the program running\
    \ inside your application server that provides enterprise services to your Java\
    \ EE components when they are executed. The Java EE server is also responsible\
    \ for handling deployment requests and redirecting them to the Java EE containers\
    \ that it hosts.\n\nThe Java EE specification defines the list of core services\
    \ that must be supported by a Java EE server. These include messaging, database,\
    \ security, transaction, persistence, and many other services. The Java EE server\
    \ may also be extended to provide additional services, or alternative implementations\
    \ of existing services, which are beyond those mandated by the specification.\
    \ Java EE specification defines how a server may be extended to provide its containers\
    \ with access to remote and external services by adapting them into the Java EE\
    \ environment using resource adapters through the Java EE Connector API."
  raw: '#### Creating an Enterprise Archive (EAR) File (Optional)


    If you (as the Assembler) have created multiple archives that you want to deploy
    together as a logical group, you will need to bundle these archives together inside
    a wrapper JAR file known as an EAR file, which uses the suffix `.ear`. This EAR
    file is referred to as a Java EE application. If you have created only a single
    EJB JAR or WAR archive, no further packaging is required. You can skip the step
    of creating a wrapper EAR file, and deploy the EJB JAR or WAR file as a stand-alone
    module.


    An application acts as a packaging boundary, ensuring that the Java EE components
    in all modules are able to communicate with each other within a single naming
    context. A Java EE application does not necessarily correspond to an actual end-user
    application as it may be used by many different client applications, but it allows
    client applications to connect to the Java EE application once and access the
    Java EE components in that application from a single context.


    An EAR file may contain an application-level deployment descriptor, `application.xml`,
    in its `META-INF` directory. This file is optional in Java EE 5, since it is now
    possible to rely on default rules to provide default names and properties for
    each module. By default, each module name defaults to the short name of its archive
    file, minus the file suffix (`.jar`, `.war`, and so on). Defining an `application.xml`
    descriptor allows you to refine the default names and properties and to choose
    selectively which modules in the EAR file to include in the application for a
    particular deployment. The Figure [11-3](#A311833_3_En_11_Chapter.html#Fig3) shows
    the EAR File Structure.


    Note


    A WAR file and an EAR file are standard JAR files with a `.war` or `.ear` extension
    respectively.


    ![A311833_3_En_11_Fig3_HTML.jpg](A311833_3_En_11_Fig3_HTML.jpg)


    Figure 11-3


    EAR File Structure


    #### Assembler-Specific Tasks


    Depending on the completeness and the complexity of the deployment descriptors
    for each module, the Assembler may be required to complete or refine some of the
    external references declared by the Provider. In many cases, the modules are sufficiently
    self-contained and complete so that there is no further work for the Assembler
    to perform, even when a deployment descriptor is not supplied by the Provider.
    In more complex deployment scenarios, when Provider-supplied documentation is
    used (possibly communicated through description properties on either the annotations
    or in the deployment descriptor), the Assembler may need to consolidate semantically
    equivalent but disparately named resources into a minimal, distinct set. Conversely,
    the Assembler may need to avoid resource name collisions by renaming resource
    references that share the same name but hold different semantics.


    For example, if the Assembler is bundling two Java EE modules produced by different
    providers into a single Java EE application, both providers may reference the
    same logical EJB but use different names, or they may reference them with the
    names not yet bound. It is the responsibility of the Assembler to detect cases
    such as this, using the documentation provided by the Provider(s), and update
    the EJB references to bind to a single name. This name may be chosen by the Assembler
    and assigned to the EJB in that application context.


    Any changes made by the Assembler are applied only to the module and application
    deployment descriptor files, and not to the Java source. This process works because
    of the rules of precedence dictated by Java EE, which in the case where conflicting
    metadata properties are defined both in the Java annotation source and the XML
    deployment descriptors, the deployment descriptors will prevail. The Assembler
    is able to resolve inconsistencies in the Java source by working only with the
    deployment descriptor files.


    ### The Deployer


    The tasks and deliverables of the Deployer are depicted in Figure [11-4](#A311833_3_En_11_Chapter.html#Fig4).


    ![A311833_3_En_11_Fig4_HTML.jpg](A311833_3_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Tasks and deliverables of the Application Deployer


    #### Deployer-Specific Tasks


    Again, using instructions from the Assembler (and Provider)—typically communicated
    through description properties in the deployment descriptors or source annotations,
    the Deployer is required to bind all external references onto concrete resources
    (EJB references, resource references, persistence unit references, and so on)
    in the target application server environment. Only the Deployer can presume to
    know about the target server environment, and Java EE has deliberately added a
    layer of indirection to all resource usage to allow this binding to occur without
    affecting the work of either the Provider or the Assembler. This is why all resources
    used by the Java EE components are referred to via indirect references.


    As was the case with the Assembler, Java EE policy dictates that the Deployer
    is allowed to make changes only to the XML deployment descriptor files and not
    to annotations in the Java source.


    #### Invoking the Application Server-Specific Deployment Tool


    Finally, your Java EE module or your Java EE application is ready to be submitted
    to the application server. Your application server will provide a deployment tool
    that lets you complete the deployment and install the Java EE components in the
    application server, ready to be executed by the end-user applications. During
    this stage, the deployment tool will validate the module(s) being submitted for
    internal integrity and ensure that all resources can be bound to actual objects
    that reside in the application server environment. The deployment will fail if
    any required resources cannot be located at deploy time, or if referenced library
    components are not found.


    Note


    The application server will run once per environment, meaning that only one runtime
    is started.


    #### Summary of Overview


    Java EE deployment lets you deploy individual modules, library components, or
    complete applications. In many cases, deployment may simply involve packaging
    the compiled source, together with the descriptors (a `persistence.xml` file is
    mandatory for persistence units, but `ejb-jar.xml`, `web.xml,` and `application.xml`
    files are optional for an EJB JAR, WAR and EAR modules respectively) and submitting
    them to a deployment tool. When assembling applications from multiple modules
    that may have been built by different component providers and may be of differing
    versions, the Assembler role takes on greater importance.


    ## Java EE Deployment Infrastructure


    Now that we have summarized the deployment process, let us explore some areas
    of the Java EE infrastructure that are central to deployment. An understanding
    of this topic is useful when it is time to make your own decisions about how to
    package your code into modules and to resolve and bind external references.


    ### The Java EE Server


    The Java EE server is the program running inside your application server that
    provides enterprise services to your Java EE components when they are executed.
    The Java EE server is also responsible for handling deployment requests and redirecting
    them to the Java EE containers that it hosts.


    The Java EE specification defines the list of core services that must be supported
    by a Java EE server. These include messaging, database, security, transaction,
    persistence, and many other services. The Java EE server may also be extended
    to provide additional services, or alternative implementations of existing services,
    which are beyond those mandated by the specification. Java EE specification defines
    how a server may be extended to provide its containers with access to remote and
    external services by adapting them into the Java EE environment using resource
    adapters through the Java EE Connector API.'
  trans: '

    #### 创建企业归档 (EAR) 文件（可选）


    如果您（作为装配者）创建了多个归档文件，并希望将它们作为一个逻辑组一起部署，则需要将这些归档文件打包到一个称为 EAR 文件的包装 JAR 文件中，该文件使用后缀
    `.ear`。此 EAR 文件被称为 Java EE 应用程序。如果您只创建了单个 EJB JAR 或 WAR 归档文件，则无需进一步打包。您可以跳过创建包装
    EAR 文件的步骤，并将 EJB JAR 或 WAR 文件作为独立模块进行部署。


    一个应用程序充当着打包边界，确保所有模块中的 Java EE 组件能够在单个命名上下文中相互通信。一个 Java EE 应用程序不一定对应于一个实际的最终用户应用程序，因为它可能被许多不同的客户端应用程序使用，但它允许客户端应用程序一次性连接到该
    Java EE 应用程序，并从单个上下文访问该应用程序中的 Java EE 组件。


    一个 EAR 文件可能在其 `META-INF` 目录中包含一个应用程序级部署描述符 `application.xml`。该文件在 Java EE 5 中是可选的，因为现在可以依赖默认规则为每个模块提供默认名称和属性。默认情况下，每个模块名称默认为其归档文件的短名称，减去文件后缀（`.jar`、`.war`
    等）。定义 `application.xml` 描述符允许您优化默认名称和属性，并有选择地选择 EAR 文件中哪些模块包含在特定部署的应用程序中。图 11-3
    展示了 EAR 文件结构。


    注意


    WAR 文件和 EAR 文件是分别带有 `.war` 或 `.ear` 扩展名的标准 JAR 文件。


    ![A311833_3_En_11_Fig3_HTML.jpg](img/A311833_3_En_11_Fig3_HTML.jpg)


    图 11-3


    EAR 文件结构


    #### 装配者特定任务


    根据每个模块部署描述符的完整性和复杂性，装配者可能需要完成或完善提供者声明的一些外部引用。在许多情况下，模块是足够自包含和完整的，因此即使提供者没有提供部署描述符，装配者也不需要执行进一步的工作。在更复杂的部署场景中，当使用提供者提供的文档（可能通过注解或部署描述符中的描述属性传达）时，装配者可能需要将语义等价但名称不同的资源整合到一个最小的、不同的集合中。相反，装配者可能需要通过重命名共享相同名称但具有不同语义的资源引用来避免资源名称冲突。


    例如，如果装配者正在将两个由不同提供者生成的 Java EE 模块打包到一个 Java EE 应用程序中，两个提供者可能引用同一个逻辑 EJB 但使用了不同的名称，或者他们可能使用尚未绑定的名称来引用它们。装配者有责任使用提供者提供的文档来检测此类情况，并更新
    EJB 引用以绑定到单个名称。此名称可由装配者选择，并在该应用程序上下文中分配给该 EJB。


    装配者所做的任何更改仅应用于模块和应用程序部署描述符文件，而不应用于 Java 源代码。此过程之所以有效，是因为 Java EE 规定的优先级规则：在 Java
    注解源代码和 XML 部署描述符中都定义了冲突的元数据属性的情况下，部署描述符将优先。装配者只需处理部署描述符文件，就能解决 Java 源代码中的不一致性。


    ### 部署者


    部署者的任务和交付物如图 11-4 所示。


    ![A311833_3_En_11_Fig4_HTML.jpg](img/A311833_3_En_11_Fig4_HTML.jpg)


    图 11-4


    应用程序部署者的任务和交付物


    #### 部署者特定任务


    同样，使用来自装配者（和提供者）的指令——通常通过部署描述符或源代码注解中的描述属性传达——部署者需要将所有外部引用绑定到目标应用服务器环境中的具体资源（EJB
    引用、资源引用、持久化单元引用等）。只有部署者才能假定了解目标服务器环境，并且 Java EE 特意为所有资源使用添加了一层间接性，以允许这种绑定在不影响提供者或装配者工作的情况下发生。这就是为什么
    Java EE 组件使用的所有资源都通过间接引用进行引用。


    与装配者的情况一样，Java EE 策略规定部署者只能对 XML 部署描述符文件进行更改，而不能更改 Java 源代码中的注解。


    #### 调用应用服务器特定的部署工具


    最后，您的 Java EE 模块或 Java EE 应用程序已准备好提交给应用服务器。您的应用服务器将提供一个部署工具，让您完成部署并在应用服务器中安装 Java
    EE 组件，准备由最终用户应用程序执行。在此阶段，部署工具将验证提交的模块的内部完整性，并确保所有资源都可以绑定到驻留在应用服务器环境中的实际对象。如果在部署时找不到任何必需的资源，或者找不到引用的库组件，则部署将失败。


    注意


    应用服务器将在每个环境中运行一次，这意味着只启动一个运行时。


    #### 概述总结


    Java EE 部署允许您部署单个模块、库组件或完整的应用程序。在许多情况下，部署可能仅仅涉及将编译后的源代码与描述符（持久化单元必须要有 `persistence.xml`
    文件，但对于 EJB JAR、WAR 和 EAR 模块，`ejb-jar.xml`、`web.xml` 和 `application.xml` 文件是可选的）打包在一起，并提交给部署工具。当从可能由不同组件提供者构建且可能版本不同的多个模块组装应用程序时，装配者的角色变得更加重要。


    ## Java EE 部署基础设施


    现在我们已经总结了部署过程，让我们探讨一下 Java EE 基础设施中一些对部署至关重要的领域。当您需要自行决定如何将代码打包到模块中以及如何解析和绑定外部引用时，理解这个主题会很有帮助。


    ### Java EE 服务器


    Java EE 服务器是在您的应用服务器内部运行的程序，它在您的 Java EE 组件执行时为其提供企业服务。Java EE 服务器还负责处理部署请求，并将其重定向到其托管的
    Java EE 容器。


    Java EE 规范定义了 Java EE 服务器必须支持的核心服务列表。这些服务包括消息传递、数据库、安全性、事务、持久化以及许多其他服务。Java EE
    服务器也可以扩展以提供超出规范要求的额外服务，或现有服务的替代实现。Java EE 规范定义了如何扩展服务器，以通过 Java EE 连接器 API 使用资源适配器将其适配到
    Java EE 环境中，从而为其容器提供对远程和外部服务的访问。

    '
- fmt: '### The Java EE Containers


    The primary purpose of the Java EE server is to support Java EE containers, which
    provide various environments in which Java EE components are run.


    Containers are the interface between a component and the low-level, platform-specific
    functionality that supports the component.


    Before we can execute it, we must assemble into a Java EE module and deploy into
    its container the following: a Web, enterprise bean, or application client component,
    which means that we need to specify the container settings for each component
    in the Java EE application and for the Java EE application itself.


    We must use the Java EE container settings to customize the underlying support
    provided by the Java EE server, including services as the following:


    - The Java EE security model;

    - The Java EE transaction model;

    - `JNDI` lookup services;

    - The Java EE remote connectivity model.


    The Java EE 8 specification stipulates support for the following Java EE containers
    shown in Figure [11-5](#A311833_3_En_11_Chapter.html#Fig5) and are the following:


    ![A311833_3_En_11_Fig5_HTML.jpg](A311833_3_En_11_Fig5_HTML.jpg)


    Figure 11-5


    A JAVA EE 8 Container


    - Java EE server: The runtime portion of a Java EE product.

    - EJB container: Manages the execution of enterprise beans for Java EE applications.

    - Web container: Manages the execution of web pages, servlets, and some EJB components
    for Java EE applications.

    - Application client container: Manages the execution of application client components.

    - Applet container: Manages the execution of applets and consists of a web browser
    and a Java Plug-in running on the client together.


    While the EJB and Web containers execute in the application server running in
    the middle tier, the application client container typically executes in a Java
    SE environment on the client tier, and the applet container typically runs inside
    a Web browser. Nonetheless, they all rely on their underlying Java EE server for
    the many enterprise services that they in turn provide—through APIs—to the components
    that execute inside their container environment. For example, a Java EE server
    provides native messaging services to a Java EE container, and the container exposes
    messaging services to its components through the `JMS` (`Java Message Service`)
    API. Similarly, the container exposes database services through `Java Database
    Connectivity` (`JDBC`), transaction services through `Java Transaction API` (`JTA`),
    and so on. The Java EE containers also interpose on all communication between
    Java EE application components executing in Java EE containers, to provide component
    and resource injection. This is illustrated in Figure [11-6](#A311833_3_En_11_Chapter.html#Fig6).


    ![A311833_3_En_11_Fig6_HTML.jpg](A311833_3_En_11_Fig6_HTML.jpg)


    Figure 11-6


    A JAVA EE Server


    In addition to the many built-in services offered to Java EE components by the
    Java EE containers, Java EE allows for the integration of third-party services—through
    resource adapters and the Connector API—that are exposed to Java EE components
    through their containers using the Java EE Service Provider Interface (`SPI`).


    ## Java EE Deployment Components


    The principal building block components of a Java EE deployment are the Java EE
    application and the Java EE modules. Let’s take a look at what defines these components.


    ### The Java EE Application


    Java EE lets you deploy both individual Java EE modules and entire Java EE applications
    to the server. As mentioned in the preceding “Overview of the Packaging and Deployment
    Processes” section, when deploying an application, you package the individual
    Java EE modules, together with any associated deployment descriptors and dependent
    library components, into a wrapper archive `JAR` file known as an `EAR` file,
    which has the suffix `.ear`. Deploying an individual Java EE module is essentially
    a shortcut to avoid wrapping one `JAR` file around another single `JAR` file.


    Apart from its packaging structure, a Java EE application operates, at runtime,
    as a context in which one or more associated Java EE components, such as EJBs,
    servlets, and application clients, can operate and communicate with one another
    using a shared class loader and namespace. It may be useful to think of a Java
    EE application as a loosely coupled group of Java EE modules that are able to
    see each other and to share resources.


    ### Java EE Module Types


    Java EE defines the following Java EE module types: EJB, Web application, application
    client, and resource adapter. The first three correspond to their eponymous containers,
    and their deployment is delegated to these containers. Deploying a resource adapter
    module installs the resources in the Java EE server and registers these resources
    for use by Java EE components. Ordinary Java classes and other resources referenced
    by your Java EE modules may also be included as library components within an `EAR`
    file, either packaged as `JAR` files or stored as directories, and deployed with
    your Java EE application.


    Note that a `JPA` persistence unit, comprising a set of `JPA` entities, is not
    a Java EE module but a library component. We describe some of the reasons for
    this in the “Persistence Unit” section that follows.


    Let’s take a closer look at each of the Java EE module types.'
