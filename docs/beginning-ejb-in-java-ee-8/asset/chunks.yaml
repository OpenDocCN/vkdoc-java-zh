    for his insight, spirit, and dedication at all stages of the endeavor. Late nights
    and early mornings are made lighter when a close collaborator is also such a good
    friend! Raghu Srinivasan and John Bracken were invaluable in design meetings and
    discussions of EJB and JPA best practices. Chris Carter supported me on my quest,
    even when it took my attentions away from JDeveloper; he knew that the insights
    gained from researching and writing this book would surely pay back dividends
    to the team. And an enjoyable hour and a half with Marina Vatkina discussing the
    latest state and future directions of EJB 3.2 was both enlightening and timely.


    With the technical help from all of the above, writing a book on this topic I
    hold dear would have been a mere marathon, if it weren’t for all of the diversions
    of everyday life! But for these welcome distractions, I would like to single out
    a few individuals among many. Adam Beyda and Lauren Webster have given me a lifetime
    of insight and perspective on what really matters. And Bob Lieb’s deep guidance
    and navigation through the psychological waters of writing a book was essential.
    Rhonda Jeffrey, Andy Cortwright, Dave Clark, and Marianna Klebanov: thank you
    for being good sounding boards and wonderful friends during this past year.


    My parents, Andrea and Peter Wetherbee, thank you for your love and encouragement
    and the constant reminder that you are my biggest fans.


    In the end, my primary motivation for punching this thing through came from the
    desire to, once again, spend more time with my children and close friends. That
    time is now!


    —Jon Wetherbee


    When Jon Wetherbee asked me if I would be interested in doing a “non-work” related
    project with him, I had no idea about what I would be getting into. I would like
    to thank Jon for giving me this wonderful opportunity of coauthoring this second
    edition. For me he is more than a lead author—he is a friend and guide who led
    me through the path that resulted in this book.


    I would like to thank Srinivasan T. Raman and Chris Carter who not only supported
    me during this endeavor but also encouraged me. I would have burnt a lot more
    midnight oil writing this book if Oracle would not have given me time and resources.
    For this I am grateful to Oracle Corporation.


    My parents, Chandrabala and Jayantilal Rathod, thank you for your love. Last but
    not least I would like to thank my wife Ashwini and daughter Shaylee for making
    me feel like an “author” who was authoring the next “bestseller.”


    —Chirag Rathod


    Many thanks go to my wonderful family – my wife Pia, and my children Luna, Leo,
    and Neve for supporting me when working on this book. You are the most beautiful
    reason of my life.


    I want to thank my beloved late mother, Maria Augusta Ciniglio, who always supported
    and loved me so much. I will love and miss you forever my dearest mom.


    I also need to thank my beloved father Giuseppe and my brothers Mario and Roberto
    for your endless love and for being the best dad and brothers in the world.


    To Franco Gentilucci and Maurizio De Marco for being two wonderful friends.


    This book is also dedicated to my late dearest cousin Ann Goss. You will be missed.


    A special thanks also goes to Catrin Bergholm and Sakari Salomaa for being two
    wonderful persons and bringing joy to my family.


    Thanks a lot to Steve Anglin and Matthew Moodie for giving me the opportunity
    to work as writer on this book, as well as Mark Powers for doing such a great
    job during the editorial process and supporting me all the time; and finally Mario
    Faliero, a good friend and the technical reviewer of this book, for helping me
    to make a better book.


    —Massimo Nardone'
  trans: '

    ## 本书适合哪些读者？


    本书面向具备 Java 开发经验的企业软件开发者，他们曾使用早期版本的 EJB 或相关技术构建过单层或多层应用，并希望基于最新的跨平台行业标准来构建企业级软件。


    作为一本入门级教材的作者，我们有两个主要目标：


    *   第一个目标是让您熟练掌握 EJB 的众多核心要素及若干密切相关的技术，从而能够在 Java EE 环境中设计、构建、部署、执行和测试完整的企业级应用。我们希望您能轻松掌握构建和组装基于
    EJB 组件的应用所需的关键细节。

    *   第二个目标是让您对 Java EE 整体中的服务层和持久化层有一个广阔的视角，特别是对 EJB 所提供的全部功能有一个全面的了解。我们期望您在读完本书后，能够建立一个广度优先的知识基础，以此为跳板，更深入地探索
    EJB 及相关规范的特定领域。


    为此，本书力求为 EJB 提供一个易于上手的入门路径，让您能够熟练地构建充分利用 EJB 广度的服务和应用程序。我们刻意避免深入探讨规范的许多领域，以便您能熟悉整体环境，而不会被细枝末节的选项所干扰。我们相信，这种基于对
    EJB 广泛功能的扎实理解而建立的广度优先基础，将使您能够以最佳状态，利用规范和其他高级文本作为参考指南，更深入地探索您自己的软件开发项目所需的 EJB API
    特定领域。


    ## 致谢


    本书的诞生离不开众多人士的努力与洞见，他们在本书的整个创作过程中提供了技术输入和纯粹的灵感。特别感谢我的同事兼本书第二版的主要合著者 Chirag Rathod，感谢他在项目的各个阶段所展现的洞察力、精神与奉献。当亲密的合作者同时也是如此要好的朋友时，熬夜工作也变得轻松愉快！Raghu
    Srinivasan 和 John Bracken 在设计会议以及讨论 EJB 和 JPA 最佳实践时提供了宝贵的帮助。Chris Carter 支持我的探索，即使这让我暂时放下了
    JDeveloper 的工作；他知道，从研究和撰写本书中获得的见解必将回馈给整个团队。与 Marina Vatkina 就 EJB 3.2 的最新状态和未来方向进行的一个半小时的愉快讨论，既富有启发性又非常及时。


    有了上述所有人的技术帮助，如果不是日常生活中的种种干扰，撰写这本我珍视的主题的书本应只是一场马拉松！但对于这些令人愉快的分心之事，我想特别感谢其中的几位。Adam
    Beyda 和 Lauren Webster 让我对什么才是真正重要的有了终生的洞察和视角。Bob Lieb 在撰写本书的心理历程中给予的深刻指导和导航至关重要。Rhonda
    Jeffrey、Andy Cortwright、Dave Clark 和 Marianna Klebanov：感谢你们在过去一年里成为我良好的倾听者和出色的朋友。


    我的父母 Andrea 和 Peter Wetherbee，感谢你们的爱与鼓励，并不断提醒我你们是我最忠实的粉丝。


    最后，我完成这件事的主要动力来自于再次希望与我的孩子和亲密朋友共度更多时光。现在，就是那个时刻了！


    ——Jon Wetherbee


    当 Jon Wetherbee 问我是否有兴趣与他一起做一个“非工作”相关的项目时，我完全不知道这会让我陷入什么境地。我要感谢 Jon 给我这个共同撰写第二版的绝佳机会。对我来说，他不仅仅是主要作者——他是一位朋友和导师，引领我走上了最终成就本书的道路。


    我要感谢 Srinivasan T. Raman 和 Chris Carter，他们不仅在此过程中支持我，还鼓励了我。如果不是 Oracle 给予我时间和资源，我可能会为撰写本书而熬更多个深夜。为此，我感谢
    Oracle 公司。


    我的父母 Chandrabala 和 Jayantilal Rathod，感谢你们的爱。最后但同样重要的是，我要感谢我的妻子 Ashwini 和女儿 Shaylee，是你们让我感觉自己像一位正在创作下一部“畅销书”的“作者”。


    ——Chirag Rathod


    非常感谢我美好的家人——我的妻子 Pia，以及我的孩子 Luna、Leo 和 Neve，感谢你们在我撰写本书期间给予的支持。你们是我生命中最美好的理由。


    我想感谢我已故的挚爱母亲 Maria Augusta Ciniglio，她一直如此支持和深爱着我。我将永远爱您、想念您，我最亲爱的妈妈。


    我还要感谢我亲爱的父亲 Giuseppe 以及我的兄弟 Mario 和 Roberto，感谢你们无尽的爱，并成为世界上最好的父亲和兄弟。


    感谢 Franco Gentilucci 和 Maurizio De Marco，你们是两位出色的朋友。


    本书也献给我已故的挚爱表姐 Ann Goss。我们会想念你的。


    特别感谢 Catrin Bergholm 和 Sakari Salomaa，你们是两位出色的人，为我的家庭带来了欢乐。


    非常感谢 Steve Anglin 和 Matthew Moodie 给我机会作为作者参与本书的工作，以及 Mark Powers 在编辑过程中所做的出色工作并一直支持我；最后感谢
    Mario Faliero，一位好朋友和本书的技术审阅者，感谢他帮助我使本书变得更好。


    ——Massimo Nardone

