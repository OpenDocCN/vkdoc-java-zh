- fmt: '### Lifecycle Callback Methods


    Singleton life cycle goes so that we will create the singleton session bean instance
    and then after inject the container; it will be put the instance in a managed
    pool named “method-ready” waiting for a request.


    Singleton session beans support callback events for construction and destruction.
    Following are the callbacks that map to the preceding events:


    - `PostConstruct`: Denoted with the `@PostConstruct` annotation

    - `PreDestroy`: Denoted with the `@PreDestroy` annotation.


    `PostConstruct` callback happens after a bean instance is instantiated in the
    EJB container. If the bean is using any dependency injection mechanism for acquiring
    references to resources or other objects in its environment, the `PostConstruct`
    event happens after injection is performed and before the first business method
    in the bean class is called.


    `PreDestroy` callback happens during application shutdown. The container considers
    the `DependsOn` relationship between singleton session beans and removes them
    in a sequence that is in the reverse order of the sequence in which they were
    created. For the `ShopperCount` example, `LogShopperCount` bean will be removed
    before the `ShopperCount` bean.


    Listing [2-20](#A311833_3_En_2_Chapter.html#Par188) shows the code for the `applicationStartup()`
    method with the `@PostConstruct` annotation. This method resets the `shopperCounter`
    on startup. Listing [2-20](#A311833_3_En_2_Chapter.html#Par188) also shows the
    code for the `applicationShutdown()` method with the `@PreDestroy` annotation.
    This method prints a message on application shutdown.


    ```

    package com.apress.ejb.chapter02;

    import javax.annotation.PostConstruct;

    import javax.annotation.PreDestroy;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    @Singleton(name = "ShopperCount")

    @Startup

    public class ShopperCountBean {

    private int shopperCounter;

    // Increment number of shopper counter

    public void incrementShopperCount() {

    shopperCounter++;

    }

    // Return number of shoppers

    public int getShopperCount() {

    return shopperCounter;

    }

    // Reset counter

    public void resetCounter() {

    shopperCounter = 0;

    }

    // Reset counter

    @PostConstruct

    public void applicationStartup() {

    System.out.println("From applicationStartup method.");

    resetCounter();

    }

    @PreDestroy

    public void applicationShutdown() {

    System.out.println("From applicationShutdown method.");

    }

    }

    Listing 2-20

    ShopperCountBean.java

    ```


    Like a stateless session bean, a singleton session bean is never passivated, so
    the `@PrePassivate` and `@PostActivate` annotations should not be used to decorate
    methods on a singleton session bean.


    ### Concurrency Management


    A singleton session bean is instantiated only once per application, and hence
    it is designed to support concurrent access. Concurrent access means multiple
    clients can access the same instance of a singleton session bean at the same time.
    The management of concurrent access is transparent to the clients. A client needs
    only a reference to a singleton session bean, and it is unconcerned about other
    clients accessing the same instance of the singleton session bean.


    Concurrency is managed in two ways:


    - Container-Managed concurrency: The container controls concurrent access and
    allows fine-grained control of the state synchronization behavior by offering
    a fixed set of options. This is the default concurrency management type.

    - Bean-Managed concurrency: The container allows full access to the concurrent
    bean instance, and the user is responsible for state synchronization.


    The type of concurrency—container-managed or bean-managed—is specified by the
    `javax.ejb.ConcurrencyManagement` annotation specified on the singleton session
    bean class. For container-managed concurrency, the type attribute of `@ConcurrencyManagement`
    is set to `javax.ejb.ConcurrencyManagementType.CONTAINER`; for bean-managed concurrency,
    the type attribute of `@ConcurrencyManagement` is set to `javax.ejb.ConcurrencyManagementType.BEAN`.


    #### Container-Managed Concurrency


    For a singleton session bean using container-managed concurrency, the container
    manages concurrency by associating each business method with either a shared `Read`
    lock or an exclusive `Write` lock. A `Read` or `Write` lock is specified using
    the `@Lock` annotation.


    Listing [2-21](#A311833_3_En_2_Chapter.html#Par197) demonstrates container-managed
    concurrency by using the `Read` lock on the `getShopperCount` method and `Write`
    lock on the `incrementShopperCount` method. With this change, multiple clients
    can get the value of `shopperCounter` concurrently, but access to `incrementShopperCount`
    is blocked for all other clients while one client is accessing it.


    ```

    package com.apress.ejb.chapter02;

    import javax.annotation.PostConstruct;

    import javax.annotation.PreDestroy;

    import javax.ejb.ConcurrencyManagement;

    import javax.ejb.ConcurrencyManagementType;

    import javax.ejb.Lock;

    import javax.ejb.LockType;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    @Singleton(name = "ShopperCount")

    @Startup

    @ConcurrencyManagement(ConcurrencyManagementType.CONTAINER)

    public class ShopperCountBean {

    private int shopperCounter;

    // Increment number of shopper counter

    @Lock(LockType.WRITE)

    public void incrementShopperCount() {

    shopperCounter++;

    }

    // Return number of shoppers

    @Lock(LockType.READ)

    public int getShopperCount() {

    return shopperCounter;

    }

    // Reset counter

    public void resetCounter() {

    shopperCounter = 0;

    }

    // Reset counter

    @PostConstruct

    public void applicationStartup() {

    resetCounter();

    }

    @PreDestroy

    public void applicationShutdown() {

    System.out.println("From applicationShutdown method.");

    }

    }

    Listing 2-21

    ShopperCountBean.java

    ```


    For a singleton session bean, an `@Lock` annotation at the class level specifies
    that all business methods will use the specified lock type unless a different
    type is explicitly set at the method level. When the `@Lock` annotation is not
    explicitly present on the singleton session bean class, the default lock type,
    `@Lock(LockType.WRITE)`, is applied to all business methods.


    #### Bean-Managed Concurrency


    In the case of bean-managed concurrency, the container allows full concurrent
    access to the singleton session bean instance, and the bean developer must provide
    protection to the bean’s internal state against synchronization errors that result
    from concurrent access. You can use synchronization primitives like `synchronized`
    and `volatile` for this purpose.


    ### Error Handling


    Errors can occur during initialization of a singleton session bean. These errors
    are fatal and, as a result, the singleton session bean instance must be discarded.
    Attempted invocations on a singleton session bean instance that failed to initialize
    will result in the `javax.ejb.NoSuchEJBException`. Once a singleton session bean
    is instantiated successfully, it will not be destroyed if exceptions are thrown
    from either business methods or callbacks.'
