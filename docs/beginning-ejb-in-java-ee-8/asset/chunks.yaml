    as smartphones, tablets, cell phones, and telnet devices) are also being used
    to run these applications. The Web application running in a browser or mobile
    device renders the user interface using Web technologies such as JavaServer Pages
    (JSP), JavaServer Faces (JSF), or Java Servlets. Typical user actions, such as
    entering search criteria or adding items to a shopping cart, will invoke/call
