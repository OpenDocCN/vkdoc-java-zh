    Bean developers can provide configuration properties along with MDB classes, which
    get used at deployment time. The EJB container uses these properties to configure
    the bean and link it to the appropriate JMS provider. These configuration properties
    can be set using the `@ActivationConfigProperty` annotation. This annotation can
    be provided as one of the parameters for the `@MessageDriven` annotation. Listing
    [5-3](#A311833_3_En_5_Chapter.html#Par69) shows the `@MessageDriven` annotation
    with properties for the `StatusMailer` MDB. We have defined two `ActivationConfigProperty`
    annotations that specify the logical destination name and the destination type.


