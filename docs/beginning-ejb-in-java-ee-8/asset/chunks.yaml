    in the browser.


    We will update the `JSFShoppingCart` managed bean with a new `Quantity` property
    and an `addToCart()` method. Listing [12-19](#A311833_3_En_12_Chapter.html#Par205)
    shows the code snippets for these two things. The `Quantity` property has the
    accessor methods, and the `addToCart()` method uses the technique of getting the
    application from `FacesContext` and retrieving the instance of the `ShoppingCart`
    stateful EJB from the `Login` managed bean. Once that is done, the `addWineItem()`
    business method is invoked to add the selected wine and quantity to the list of
    cart items in the `ShoppingCart` EJB. The `addToCart()` method returns a value
    of `success` that will be used as a navigation case.


    ```

    String Quantity;

    public void setQuantity(String quantity) {

    this.Quantity = quantity;

    }

    public String getQuantity() {

    return Quantity;

    }

    public String addToCart() {

    Integer qty = new Integer(Quantity);

    FacesContext ctx = FacesContext.getCurrentInstance();

    Application app = ctx.getApplication();

    //check whether customer has already logged in.

    ValueBinding customerBinding = app.createValueBinding("#{Login.customer}");

    if (customerBinding.getValue(ctx) == null) {

    return "success";

    }

    else {

    ValueBinding shoppingCartBinding = app.createValueBinding("#{Login.shoppingCart}");

    shoppingCart = (ShoppingCartLocal)shoppingCartBinding.getValue(ctx);

    shoppingCart.addWineItem(selectedWine, qty.intValue());

    return "success";

    }

    }

