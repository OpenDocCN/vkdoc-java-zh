    \ will all make sense once we walk through some examples in code that demonstrate\
    \ how all the pieces work together. It is also worth noting that EJB’s built-in\
    \ Container-Managed Transaction (CMT) support is more than adequate for most applications\
    \ running inside the EJB container. This chapter will let you explore your options—but\
    \ unless you are writing applications involving entities that live wholly outside\
    \ of the EJB container, the default support is likely to serve your needs quite\
    \ nicely.\n\n## Session Bean Transactional Behavior in the Service Model\n\nThis\
    \ next section will explore the following questions:\n\n*   What declarative transaction\
    \ support does the EJB container offer to session beans?\n    *   What is the\
    \ difference between container-managed transaction (CMT) demarcation and bean-managed\
    \ transaction (BMT) demarcation? When would you choose one approach over the other?\n\
    \    *   What are CMT attributes?\n    *   How does EJB support the explicit demarcation\
    \ of transaction boundaries using bean-managed transaction (BMT) beans?\n*   What\
    \ is implicit vs. explicit commit behavior?\n\nThe enterprise bean is the heart\
    \ of the EJB service layer. Through session beans, the EJB container offers declarative\
    \ demarcation of transaction events, along with the option to demarcate transaction\
    \ events explicitly in the bean or in the application client code. Let’s consider\
    \ these two approaches separately, beginning with the default option: leveraging\
    \ container-managed transaction demarcation using declarative markup."
  trans: "\n## EJB 中的事务支持\n\n本节将探讨以下问题：\n\n*   企业 Bean 开发者可以使用哪些事务服务？\n*   会话 Bean、消息驱动\
    \ Bean (MDB) 和实体在事务上下文中如何交互？\n\nEJB 服务器中的大部分基础设施都致力于支持这些服务，这并非没有道理。EJB 不仅提供了一个健壮的\
    \ JTA 事务管理器，还通过可在可互操作、可移植的业务组件上指定的声明性元数据使其易于访问。几乎所有 Java EE 应用程序都需要事务服务，而 EJB\
    \ 以一种非常简洁的方式将它们提供给应用程序开发者。\n\n从其诞生之初，EJB 框架就提供了一种便捷的方式来管理事务和访问控制，它允许你基于每个方法以声明方式定义行为。除了这些容器提供的服务之外，EJB\
    \ 还允许你将控制权交给应用程序，以定义事务事件边界和其他自定义行为。\n\n在本章中，我们将探讨事务在应用程序中完成一系列常见任务时所扮演的角色。在一个典型的\
    \ Java EE 应用程序中，会话 Bean 通常用于建立事务边界，并操作实体以在事务上下文中与数据库交互。我们的示例混合了会话 Bean 和实体操作，以说明\
    \ EJB 提供的内置（声明式）和手动行为。本着简化开发模型的精神，EJB 默认提供了许多最有用的特性，因此默认事务选项既实用又强大也就不足为奇了。\n\n\
    ### EJB 事务服务\n\nEJB 事务模型构建于 JTA 模型之上，在该模型中，会话 Bean 或其他应用程序客户端提供事务上下文，企业服务作为逻辑工作单元在其中执行。Java\
    \ EE 环境中通常在事务上下文中运行的企业服务包括：创建、检索、更新和删除实体；向队列发送 JMS 消息；执行 MDB；触发电子邮件请求；调用 Web 服务；执行\
    \ JDBC 操作等等。\n\nEJB 提供了一个内置的 JTA 事务管理器，但真正的力量在于 EJB 为 Bean 提供者提供的声明式服务。通过使用元数据标签而非编程逻辑，EJB\
    \ 开发者可以无缝地参与 JTA 事务，并以声明方式控制企业 Bean 上每个业务方法的事务行为。\n\nEJB 通过为 JTA 事务和非 JTA（资源本地）事务提供显式支持来扩展此编程模型。资源本地事务仅限于单个资源管理器（例如数据库连接），但可以通过避免分布式事务监视器的开销来实现性能优化。\n\
    \n此外，应用程序构建者可以利用容器提供的服务来自动管理事务，或者他们可以选择控制事务边界并显式处理事务的开始、提交和回滚事件。在单个应用程序中，如果需要，可以结合使用这两种方法。虽然选择由容器还是应用程序本身来划分事务是在企业\
    \ Bean 上定义的，但决定对 JPA 实体使用哪种事务模型（JTA 或资源本地）则取决于 `persistence.xml` 文件中持久化单元的配置方式。\n\
    \n游戏中的持久化对象——实体——完全且愉快地对其管理事务框架一无所知。实体运行的事务上下文不是其定义的一部分，因此，只要创建了适当的 `EntityManager`\
    \ 来服务实体的生命周期事件，同一个实体类就可以在应用程序选择的任何事务上下文中使用。\n\n如果这一切在此时看起来有点令人生畏，请不要担心。一旦我们通过一些代码示例来演示所有部分如何协同工作，一切都会变得清晰。同样值得注意的是，EJB\
    \ 内置的容器管理事务 (CMT) 支持对于在 EJB 容器内运行的大多数应用程序来说已经足够。本章将让你探索各种选项——但除非你编写的应用程序涉及完全在\
    \ EJB 容器之外运行的实体，否则默认支持很可能很好地满足你的需求。\n\n## 服务模型中会话 Bean 的事务行为\n\n下一节将探讨以下问题：\n\n\
    *   EJB 容器为会话 Bean 提供了哪些声明式事务支持？\n    *   容器管理事务 (CMT) 划分和 Bean 管理事务 (BMT) 划分有什么区别？你会在什么情况下选择其中一种方法？\n\
    \    *   什么是 CMT 属性？\n    *   EJB 如何使用 Bean 管理事务 (BMT) Bean 来支持事务边界的显式划分？\n* \
    \  隐式提交行为与显式提交行为有何区别？\n\n企业 Bean 是 EJB 服务层的核心。通过会话 Bean，EJB 容器提供了事务事件的声明式划分，以及选择在\
    \ Bean 或应用程序客户端代码中显式划分事务事件的选项。让我们分别考虑这两种方法，从默认选项开始：利用声明式标记进行容器管理的事务划分。\n"
- fmt: '### Container-Managed Transaction (CMT) Demarcation


    The EJB container provides built-in transaction management services that are available
    by default to session beans and MDBs. The bean designates transaction characteristics
    for each of its methods through metadata (using either annotations or XML), and
    the EJB container follows those directives to determine the transactional action
    (if any) to perform. Using these directives, the EJB container may automatically
    begin a new transaction, or suspend or reuse an existing transaction when the
    method is invoked, and possibly commit the transaction before the method returns
    to the caller.


    **Note**


    Only the bean developer may assign the transaction management type of an enterprise
    bean. Application assemblers are permitted to override the bean’s method-level
    container-managed transaction attributes through the `ejb-jar.xml` file, but they
    must use caution to avoid the possibility of deadlock. Application assemblers
    and deployers are generally not permitted to override the bean’s transaction management
    type.


    When an EJB declares its transactional behavior in metadata, the container interposes
    on calls to the enterprise bean’s methods and applies transactional behavior at
    the session bean’s method boundaries, providing a fixed set of options that you
    can specify for each method. The default behavior provided by the container (i.e.,
    when no other directive is specified) is to check, immediately before invoking
    the method, whether a transaction context is associated with the current thread.
    If no transaction context is available, the container begins a new transaction
    before executing the method. If a transaction is available, the container allows
    that transaction to be propagated to the method call and made available to the
    method code. Then, upon returning from the method invocation, the container checks
    again. If the container was responsible for creating a new transaction context,
    it automatically commits that transaction after the method is exited. If it didn’t
    create the transaction, then it allows the transaction to continue unaffected.
    By interposing on the bean’s method calls, the EJB container is able to apply
    transactional behavior at runtime that was specified declaratively at development
    time.


    The default behavior, described in the previous paragraph, is but one of six CMT
    demarcation options provided by the container. You can attribute any one of these
    six demarcation options to any method on a session bean. Some of the attribute
    values require specific conditions to be met; when they are not met, an exception
    is thrown. These six attributes are listed in Table [8-2](#A311833_3_En_8_Chapter.html#Tab2).


    **Table 8-2** Container Transaction Attribute Definitions


    | Transaction Attribute | Behavior |

    | --- | --- |

    | `MANDATORY` | A transaction must be in effect at the time the method is called.
    If no transaction is available, a `javax.ejb.EJBTransactionRequired` exception
    is thrown. This transaction remains in effect while the method is executed, and
    it is left active upon returning control to the caller. |

    | `REQUIRED` | This is the default transaction attribute value. Upon entering
    the method, the container interposes to create a new transaction context if one
    is not already available. If the container created a transaction upon entering
    the method, it commits that transaction when the method call completes. If a transaction
    was already in effect, the container does not commit it before returning control
    to the client. |

    | `REQUIRES_NEW` | The container always creates a new transaction before executing
    a method thusly marked. If a transaction context is already available when the
    method is invoked, then the container suspends that transaction by dissociating
    it from the current thread before creating the new transaction. The container
    then reassociates the original transaction with the current thread after committing
    the intervening one. |

    | `SUPPORTS` | This option is basically a no-op, resulting in no additional work
    by the container. If a transaction context is available, it is used by the method.
    If no transaction context is available, then the container invokes the method
    with no transaction context. Upon exiting the method, any preexisting transaction
    context remains in effect. |

    | `NOT_SUPPORTED` | The container invokes the method with an unspecified transaction
    context. If a transaction context is available when the method is called, then
    the container dissociates the transaction from the current thread before invoking
    the method, and then it reassociates the transaction with the thread upon returning
    from the method. |

    | `NEVER` | The method must not be invoked with a transaction context. The container
    will not create one before calling the method, and if one is already in effect,
    the container throws `javax.ejb.EJBException`. |


    **Note**


    In general, transaction attributes may be specified on a session bean’s business
    interface methods or Web service endpoint interface, or on an MDB’s listener method,
    but some additional restrictions apply for specific cases. Such details are beyond
    the scope of this book but may be found in the EJB Core Contracts and Requirements
    spec.


    All six attributes are typically available for session bean methods, though certain
    attributes are not available on a session timeout callback method, or when the
    session bean implements `javax.ejb.SessionSynchronization`. MDBs support only
    the `REQUIRED` and `NOT_SUPPORTED` attributes. Here is an example of how you would
    specify the transaction behavior on a session bean method to override the transaction
    behavior specified (or defaulted) at the bean level:


    ```

    @TransactionAttribute(TransactionAttributeType.SUPPORTS)

    public CustomerOrder createCustomerOrderUsingSupports(Customer customer)

    throws Exception { ... }

    ```


    Table [8-3](#A311833_3_En_8_Chapter.html#Tab3) illustrates an EJB’s transactional
    behavior, dependent on its transaction attribute and the presence or absence of
    a transactional context at the time the session method is called. For each transaction
    attribute, we list on separate rows the method body and resource transactional
    context when a client transaction is absent (None), and when a client transaction
    is present (Tc). Whenever a new transaction is created for the duration of the
    method (Tm), it is always committed by the EJB container before control is returned
    to the caller. Both the transaction associated with the method body code and the
    transaction associated with resources that are used by the method are shown.


    **Table 8-3** Client and Bean Transaction States for Each of the Six Transaction
    Attributes


    | Transaction Attribute | Client’s Transaction | Transaction Associated with Business
    Method | Transaction Associated with Resource Managers |

    | --- | --- | --- | --- |

    | `MANDATORY` | None | Error | N/A |

    |   | Tc | Tc | Tc |

    | `NEVER` | None | None | None |

    |   | Tc | Error | N/A |

    | `NOT_SUPPORTED` | None | None | None |

    |   | Tc | None | None |

    | `REQUIRED` | None | Tm | Tm |

    |   | Tc | Tc | Tc |

    | `REQUIRES_NEW` | None | Tm | Tm |

    |   | Tc | Tm | Tm |

    | `SUPPORTS` | None | None | None |

    |   | Tc | Tc | Tc |


    Table [8-3](#A311833_3_En_8_Chapter.html#Tab3) illustrates how the container interposes
    on CMT-demarcated methods to propagate a transactional context differently for
    each transaction attribute. This table also illustrates that the transactional
    context used within the bean method is always the one that is in turn propagated
    to other methods called by that CMT bean method. Note that a client to an enterprise
    bean may itself be another enterprise bean.'
