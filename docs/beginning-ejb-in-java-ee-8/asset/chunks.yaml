- fmt: "### The Login Page\n\nTo simplify the login process, we will use the e-mail\
    \ address of the customer to authenticate and authorize the order. `Email` is\
    \ one of the mapped fields in the `Customer` entity of the persistence unit used\
    \ in Chapter [7](#A311833_3_En_7_Chapter.html). Listing [12-1](#A311833_3_En_12_Chapter.html#Par141)\
    \ shows the code for `login.jsp`. To begin, there are two tag library directives,\
    \ some standard HTML tags, and some tags to render the JSF UI components. Any\
    \ page that includes JSF elements must have the `f:view` tag as the outermost\
    \ JSF tag. The `h:form` tag creates an HTML form, the `h:inputText` tag creates\
    \ an input text field, and the `h:commandButton` tag creates a Submit button in\
    \ the form. As you may notice, the `value` attributes for `h:inputText` have a\
    \ different syntax from the ones used in HTML. We are using the Expression Language\
    \ (EL) syntax — `#{}`. The expression `#{Login.email}` means that the JSP page\
    \ wants to access the e-mail property from the `Login` object. The `Login` object\
    \ is a managed bean, which will be discussed shortly. Similar to a HTML form,\
    \ there is an `action` attribute for `h:commandButton`. The EL syntax used for\
    \ `action` is `#{Login.processLogin}`, which means that when the user hits the\
    \ Submit button, a `POST` operation will trigger the `processLogin` method in\
    \ the `Login` managed bean.\n\n```\nLogin Page\n\nBeginning EJB: Wine Store Application\
    \ \nEnter Email address:\n\nListing 12-1\nlogin.jsp\n```\n\nFigure [12-18](#A311833_3_En_12_Chapter.html#Fig18),\
    \ shown in the “Compiling, Deploying, and Testing the JSF Application” section\
    \ later in the chapter, shows the `login.jsp` page rendered in the browser.\n\n\
    The next step is to create a `Login` managed bean that will be used with `login.jsp`.\
    \ Managed beans are JavaBeans that are used by JSF applications. These objects\
    \ are managed by the JSF implementation, and the properties and methods in these\
    \ objects can be referenced from JSP pages using value-binding and method-binding\
    \ expressions. Listing [12-2](#A311833_3_En_12_Chapter.html#Par144) shows the\
    \ `Login` managed bean. `Login` has three property fields along with their accessor:\
    \ `email`, `customer`, and `shoppingCart`. We have an `@EJB` annotation on top\
    \ of the `setShoppingCart()` method. We are using setter injection to inject the\
    \ stateful session bean `ShoppingCart` that we had developed in Chapter [7](#A311833_3_En_7_Chapter.html).\
    \ We have one additional method `processLogin()` in our bean that calls the `findCustomer(String\
    \ email)` business method using the injected `shoppingCart` stateful session bean.\
    \ This business method returns a `Customer` object if the e-mail ID exists in\
    \ our customer database. Additional logic is incorporated to return a string value\
    \ stored in the `faces-config.xml` file, for use in our navigation model. We will\
    \ discuss this shortly.\n\n```\npackage com.apress.ejb.chapter12.view.managed;\n\
    import com.apress.ejb.chapter07.ejb.ShoppingCartLocal;\nimport com.apress.ejb.chapter07.entities.Customer;\n\
    import javax.ejb.EJB;\npublic class Login\n{\npublic Login() {\n}\nString email;\n\
    Customer customer;\nShoppingCartLocal shoppingCart;\npublic void setEmail(String\
    \ email) {\nthis.email = email;\n}\npublic String getEmail() {\nreturn email;\n\
    }\npublic String processLogin() {\nString navigation = null;\ncustomer = (Customer)shoppingCart.findCustomer(email);\n\
    if (customer != null) {\nnavigation = \"winehome\";\n}\nelse {\nnavigation = \"\
    register\";\n}\nreturn navigation;\n}\npublic void setCustomer(Customer customer)\
    \ {\nthis.customer = customer;\n}\npublic Customer getCustomer() {\nreturn customer;\n\
    }\n@EJB\npublic void setShoppingCart(ShoppingCartLocal shoppingCart) {\nthis.shoppingCart\
    \ = shoppingCart;\n}\npublic ShoppingCartLocal getShoppingCart() {\nreturn shoppingCart;\n\
    }\n}\nListing 12-2\nLogin.java\n```\n\nThe deployment descriptor `faces-config.xml`\
    \ has information on page navigation, managed beans, and so on. Listing [12-3](#A311833_3_En_12_Chapter.html#Par149)\
    \ shows the `faces-config.xml` with control flow to and from `login.jsp`. It also\
    \ shows the `Login` class being registered as a managed bean. We have set the\
    \ scope of the `Login` managed bean to `session`. This allows us to store information\
    \ about the customer and shopping cart through the session so that we don’t have\
    \ to re-query our back-end application for the same information. This also facilitates\
    \ the usage of this information across other pages and invokes other business\
    \ methods on the `ShoppingCart` stateful session bean without having to look up\
    \ the bean again. Additionally, we have created three navigation rules:\n\n* \
    \  From `login.jsp` to `winehome.jsp`, with the value `winehome`: This will be\
    \ used if the login is successful.\n*   From `login.jsp` to `newCustomer.jsp`,\
    \ with the value `register`: This will be used if the login fails and the customer\
    \ wants to register as a new customer.\n*   From `newCustomer.jsp` to `login.jsp`,\
    \ with the value `success`: This will be used to navigate the customer back to\
    \ the login page after successful registration.\n\n```\nLogin\ncom.apress.ejb.chapter12.view.managed.Login\n\
    session\n\n/login.jsp\n\nwinehome\n/winehome.jsp\n\nregister\n/newCustomer.jsp\n\
    \n/newCustomer.jsp\n\nsuccess\n/login.jsp\n\nListing 12-3\nfaces-config.xml\n\
    ```\n\nSo far, we have shown you how to get started with a JSF application with\
    \ a simple login page that can look up EJBs and invoke business methods. In the\
    \ next few sections, we will continue on our venture to complete the remaining\
    \ wine store JSF application pages.\n\n### The New Customer Registration Page\n\
    \nListing [12-4](#A311833_3_En_12_Chapter.html#Par152) shows the code for the\
    \ `newCustomer.jsp` JSF page. This page is very similar to the `login.jsp` page\
    \ created earlier, except that it has more input fields that capture the customer\
    \ information. All input fields in the JSP page (First Name, Last Name, Phone,\
    \ Email, Street 1, Street 2, City, State, Zip Code, Credit Card, and Credit Card\
    \ Expiration date) have value-binding expressions that map to properties in the\
    \ `NewCustomer` managed bean. It also has a Submit button whose action is mapped\
    \ to the `AddNewCustomer()` method in the managed bean using the expression `#{NewCustomer.AddNewCustomer}`.\n\
    \n```\nNew Customer Page\n\nBeginning EJB: Wine Store Application \nEnter the\
    \ following information to register as a new customer:\n\nFirst Name\n\nLast Name\n\
    \nPhone\n\nEmail\n\nStreet 1\n\nStreet 2\n\nCity\n\nState\n\nZip Code\n\nCredit\
    \ Card\n\nCredit Card Expiry date\n\nListing 12-4\nnewCustomer.jsp\n```\n\nFigure\
    \ [12-19](#A311833_3_En_12_Chapter.html#Fig19) (in the “Compiling, Deploying,\
    \ and Testing the JSF Application” section) shows the `newCustomer.jsp` page being\
    \ rendered in the browser.\n\nAfter the `newCustomer.jsp` page is created, we\
    \ will create the `NewCustomer` managed bean. Listing [12-5](#A311833_3_En_12_Chapter.html#Par155)\
    \ shows the code for this managed bean that has getter and setter methods for\
    \ all of the properties referred by the `newCustomer.jsp` page. In addition, the\
    \ class injects the `CustomerFacade` stateless session bean using the `@EJB` annotation.\
    \ Finally, the `AddNewCustomer()` method creates a new `Individual` entity instance\
    \ using the getter methods of the properties and calls the `AddCustomer()` business\
    \ method in `CustomerFacade`. Upon successful execution, this method returns a\
    \ `success` string that navigates the user to the login page."
