    ![A311833_3_En_3_Fig9_HTML.jpg](A311833_3_En_3_Fig9_HTML.jpg)


    Figure 3-9


    Output of CustomerOrderManagerClient servlet


    Take a look at the code in `CustomerOrderManagerClient.java`. Feel free to experiment
    by creating additional entities, testing the `mergeEntity()` and other service
    methods on the EJB session bean, and observing the resulting behavior. To reset
    the test schema back to its original state, you can always re-execute the step
    depicted in Figure [3-4](#A311833_3_En_3_Chapter.html#Fig4).


    ## Summary


    This chapter introduced the Java Persistence API 2.2 introduced with Java EE 8
    and a few of the essential services it offers. We examined how a simple JavaBean
    can be transformed into a JPA entity simply by adding a couple of annotations.
    We then extended this example to illustrate how you can further refine your entities
    to add greater flexibility by declaratively specifying additional annotations
    on the entity class.


    We explored these essential components of JPA: the persistence archive, the persistence
    unit, the persistence context, and the `EntityManager`. We walked through the
    entity life cycle to examine an entity’s behavior as it transitions between the
    following states: new, managed, detached, and removed.


    The section on O/R mapping explored how entities map to their underlying tables,
    and how you can control the basic mapping to allow a field to map to a column
    with a different name.


    We discussed the role of an entity’s primary key, explored both simple and composite
    primary keys, and how to define each. We showed how to configure an ID generator
    to have JPA auto-assign an entity’s PK at the time it is persisted.


    We then delved into entity relationships and discussed the relationship field
    types supported by JPA: `@OneToOne`, `@OneToMany`, `@ManyToOne`, and `@ManyToMany`.


    A discussion of JPQL ensued with examples of how to declare and execute named
    queries and how to use dynamic and bulk update and delete queries.


    We concluded with a sample application that illustrated how related entities interact
    and how they can be manipulated through a session façade that is in turn called
    from an HTTP servlet.'
