  raw: '#### Creating a Purchase Order


    Listing [7-11](#A311833_3_En_7_Chapter.html#Par58) shows the `processOrder()`
    method in `OrderProcessFacadeBean. ShoppingCartBean` calls this business method
    when an order is submitted by the client application. This method has one parameter,
    which is of `Customer` entity type. The customer’s shopping cart is contained
    in its `cartItems` list, each member of which references a wine and a quantity
    added to the cart by the customer while shopping.


    To start with, the method checks whether the received entity is managed. If not,
    a call to the `merge()` method of the `EntityManager` is made to retrieve a managed
    `Customer` object.


    Note


    It is worth noting that when we run this application (following the steps at the
    end of this chapter), the customer parameter will be found in the persistence
    context, and so the merge step will not be performed. This is because `processOrder()`
    is called from an existing transactional context—the transaction that was created
    when its calling method, `ShoppingCartBean.sendOrderToOPC()` was invoked. A single
    persistence context is always bound to a given transaction, and in this case the
    extended persistence context from `ShoppingCartBean` is the one associated with
    this transaction. When `sendOrderToOPC()` is invoked, an existing context transaction
    is found and used. When `em.contains(customer)` is called inside `processOrder`,
    the EntityManager for `OrderProcessFacadeBean` observes that a persistence context
    is already associated with this transaction, and it uses this persistence context,
    which is the same extended persistence context associated with ShoppingCartBean.
    This is why the customer instance is already determined to be managed.


    Once the managed customer entity is obtained, it checks whether the customer is
    an `Individual` or a `Distributor`. For individuals, a call to the `performCreditCheck()`
    method is made to verify the credit card. If the credit card is found to be invalid,
    the message “Invalid Credit Card” is sent back to the client application via `ShoppingCartBean`.
    For distributors, the `memberStatus` property is checked, and any value other
    than “APPROVED” is rejected.


    If the customer is approved, then processing continues, and a new order of type
    `CustomerOrder` is created. This new order is populated with the collection of
    `CartItem` objects associated with the `Customer` and found in its `cartItems`
    property. For each cart item, an `OrderItem` object is created to capture the
    quantity of each wine and the total price for the wine in that cart item. The
    price for each order item is calculated using the available retail price information
    for each `Wine` entity.


    Once all the cart items have been processed and corresponding order items have
    been created, the new `CustomerOrder` containing the order items is persisted,
    in part to acquire a generated value for its `id` field, which is used when generating
    an e-mail from within the call `sendPOtoMDB()`. The `removeCartItem()` method
    is then called on each cart item to remove it from the `Customer`.


    The non-entity utility class `PurchaseOrder`, which associates a `Customer` object
    with a specific `CustomerOrder`, is created. This Purchase Order instance is passed
    as an argument to the `sendPOtoMDB()` method, sending the purchase order to the
    processing service. Once the call is made, the process becomes asynchronous, and
    a message is sent back to the client application that the order has been sent
    for processing.


    Since the entire method is executed in a transactional context, changes to the
    customer object, and any other managed objects, will be persisted when the transaction
    concludes.


    ```

    public String processOrder(Customer customer) {

    String processStatus = null;

    if (!em.contains(customer)) {

    customer = em.merge(customer);

    }

    if (customer instanceof Individual) {

    if (!performCreditCheck((Individual) customer)) {

    processStatus = "Invalid Credit Card number or credit check failed";

    }

    } else if (customer instanceof Distributor) {

    if (!"APPROVED".equals(((Distributor) customer).getMemberStatus())) {

    processStatus = "Distributor credit check rejected";

    }

    }

    if (processStatus == null) {

    CustomerOrder order = new CustomerOrder();

    order.setCreationDate(new Timestamp(System.currentTimeMillis()));

    em.persist(order);

    List cartItems = customer.getCartItemList();

    if (cartItems != null) {

    List tempCartItems = new ArrayList();

    for (CartItem cItem : cartItems) {

    OrderItem oItem = new OrderItem();

    int qty = cItem.getQuantity();

    oItem.setQuantity(qty);

    oItem.setOrderDate(new Timestamp(System.currentTimeMillis()));

    oItem.setWine(cItem.getWine());

    Wine tempWine = cItem.getWine();

    Float d = tempWine.getRetailPrice();

    Float price = d * cItem.getQuantity();

    oItem.setPrice(price);

    order.addOrderItem(oItem);

    tempCartItems.add(cItem);

    }

    for (CartItem cartItem : tempCartItems) {

    customer.removeCartItem(cartItem);

    em.remove(cartItem);

    }

    }

    customer.addCustomerOrder(order);

    PurchaseOrder po = new PurchaseOrder();

    po.setCustomer(customer);

    po.setCustomerOrder(order);

    sendPOtoMDB(po);

    processStatus = "Purchase Order sent for processing to the process queue";

    }

    return processStatus;

    }

