- fmt: '### Developing a Web Service Client Program


    The `@WebServiceRef` annotation either provides a reference to the SEI generated
    by the container, or a reference to the SEI provided by the application developer.
    Listing [6-13](#A311833_3_En_6_Chapter.html#Par109) shows a servlet class that
    is going to be a Web service client. In this servlet class, `CreditServiceClient`,
    we are using dependency injection to inject the credit service that we have deployed
    earlier as a Web service. The `@WebServiceRef` annotation is used to inject the
    `CreditService` that has been generated as the proxy class. Once we have injected
    the available resource, we use that proxy class to get the Web service port using
    the `getCreditCheckEndpointBeanPort()` method. After successfully getting the
    port, we can invoke the operations that are available on the port. In our case,
    we have defined only one operation, `creditCheck`. You can see that this is being
    invoked with a credit card number of 12345678.


    ```

    package com.apress.ejb.chapter06.client;

    import com.apress.ejb.chapter06.services.client.CreditCheckEndpointBean;

    import com.apress.ejb.chapter06.services.client.CreditService;

    import java.io.IOException;

    import java.io.PrintWriter;

    import javax.servlet.ServletException;

    import javax.servlet.annotation.WebServlet;

    import javax.servlet.http.HttpServlet;

    import javax.servlet.http.HttpServletRequest;

    import javax.servlet.http.HttpServletResponse;

    import javax.xml.ws.WebServiceRef;

    @WebServlet(name = "CreditServiceClient", urlPatterns = {"/CreditServiceClient"})

    public class CreditServiceClient extends HttpServlet {

    @WebServiceRef(wsdlLocation = "http://localhost:64082/CreditService/CreditCheckEndpointBean?WSDL")

    CreditService service;

    protected void processRequest(HttpServletRequest request, HttpServletResponse
    response)

    throws ServletException, IOException {

    response.setContentType("text/html;charset=UTF-8");

    PrintWriter out = response.getWriter();

    try {

    out.println("");

    out.println("");

    out.println("Servlet CreditServiceClient");

    out.println("");

    out.println("");

    CreditCheckEndpointBean creditService = service.getCreditCheckEndpointBeanPort();

    out.println("Credit Check returned: " + creditService.creditCheck("12345678")
    + "");

    out.println("");

    out.println("");

    } finally {

    out.close();

    }

    }

    @Override

    protected void doGet(HttpServletRequest request, HttpServletResponse response)

    throws ServletException, IOException {

    processRequest(request, response);

    }

    @Override

    protected void doPost(HttpServletRequest request, HttpServletResponse response)

    throws ServletException, IOException {

    processRequest(request, response);

    }

    @Override

    public String getServletInfo() {

    return "Short description";

    }

    }

    Listing 6-13

    CreditServiceClient.java

    ```


    ### Compiling the Client Class


    Invoke the context menu on the `Chapter06-WebServiceSamples-war` node, and build
    the client by selecting the `Clean and Build` menu option, as shown in Figure
    [6-15](#A311833_3_En_6_Chapter.html#Fig15).


    ![A311833_3_En_6_Fig15_HTML.jpg](A311833_3_En_6_Fig15_HTML.jpg)


    Figure 6-15


    Compiling the Web service client


    ### Running the Web Service Client


    Once we have compiled the client, we need to run it.


    To run the client servlet, invoke the context menu on the `Chapter06-WebServiceSamples`
    node, and select the `Run` menu option, as shown in Figure [6-16](#A311833_3_En_6_Chapter.html#Fig16).


    ![A311833_3_En_6_Fig16_HTML.jpg](A311833_3_En_6_Fig16_HTML.jpg)


    Figure 6-16


    Running the client


    Once the `CreditServiceClient` runs successfully, NetBeans will open your default
    browser and execute the selected servlet. Here is the output from the `CreditServiceClient`
    servlet as shown in Figure [6-17](#A311833_3_En_6_Chapter.html#Fig17).


    ![A311833_3_En_6_Fig17_HTML.jpg](A311833_3_En_6_Fig17_HTML.jpg)


    Figure 6-17


    Checking the servlet output


    ## Session Beans as Web Service Clients


    A session bean can also be a client to a Web service. In the sample application
    that we will build in Chapter [7](#A311833_3_En_7_Chapter.html), the `OrderProcessing`
    session bean, which coordinates the workflow, can invoke the credit service to
    check the validity of the credit card before starting to process the order. To
    act as a client to a Web service, the `OrderProcessing` session bean would make
    use of the `@WebServiceRef` annotation, similar to what we have shown in the previous
    client sample.


    Listing [6-14](#A311833_3_En_6_Chapter.html#Par116) shows the stateless session
    bean `OrderProcessFacadeBean`, which implements both local and remote business
    interfaces. The `@WebServiceRef` annotation is used to inject a reference to the
    `CreditService` WSDL document. The `PerformCheckCredit()` method in the `OrderProcessFacadeBean`
    session bean uses the injected reference to get the port in the `CreditService`
    and invokes the `creditCheck` operation. As you can see, the process of injecting
    the Web service, getting the port, and calling the operations from a session bean
    is similar to what we have done with the client that acted as a Web service client.


    ```

    @Stateless(name="OrderProcessFacade")

    public class OrderProcessFacadeBean implements OrderProcessFacade,

    OrderProcessFacadeLocal {

    @WebServiceRef(type=CreditService.class)

    CreditService service;

    public OrderProcessFacadeBean() {

    }

    private boolean PerformCreditCheck(Individual customer){

    String ccnum  = customer.getCcNum().toString();

    CreditCheckEndpointBean creditService =

    service.getCreditCheckEndpointBeanPort();

    return creditService.creditCheck(ccnum);

    }

    }

    Listing 6-14

    OrderProcessFacadeBean.java

    ```'
