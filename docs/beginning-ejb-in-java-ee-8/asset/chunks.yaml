    public CascadeType[] cascade() default {};

    public FetchType fetch() default FetchType.EAGER;

    public boolean optional() default true;

    }

    ```


    `@OneToMany`关系注解被添加到一个`Collection`关系字段上，该字段对应的另一端实体要么没有关系字段，要么有一个指向本实体的单值关系字段。如果关系另一端的实体上存在这样一个字段，则该字段会被注解为`@ManyToOne`，表明它是某个`Collection`的一部分，并且知道拥有该`Collection`的实体类型。与`@OneToOne`关系字段类似，在`@OneToMany`关系上指定`mappedBy`属性就足以标识两个关系字段所使用的映射。


    ```java

    @Entity

    public class Orders implements Serializable {

    . . .

    @OneToMany(mappedBy="orders")

    protected Collection orderItemsCollection;

    . . .

    }

    @Entity

    public class OrderItems implements Serializable {

    . . .

    @ManyToOne

    @JoinColumn(name="SELECTION_REF", referencedColumnName="SELECTION_PK")

    protected Orders orders;

    . . .

    }

    ```


    请注意，通过使用泛型集合类型（`Collection<OrderItems>`），持久化框架能够确定关系另一端的实体类型。这样一来，解析`@OneToMany`端映射所需的全部信息就是该实体上的字段或属性名，在本例中即为`orders`。


    ### `@ManyToMany`


    以下是`@ManyToMany`关系注解的定义：


    ```java

    @Target(value = {ElementType.METHOD, ElementType.FIELD})

    @Retention(value = RetentionPolicy.RUNTIME)

    public @interface ManyToMany {

    public Class targetEntity() default void.class;

    public CascadeType[] cascade() default {};

    public FetchType fetch() default FetchType.LAZY;

    public String mappedBy() default "";

    }

    ```


    `@ManyToMany`注解被分配给一个`Collection`关系字段，以表明目标实体也拥有一个源实体类型的`Collection`。这种映射类型需要一个`@JoinTable`，通常称为交集表。该连接表持有指向关系两端实体主键的引用。在下面的示例中，交集表`EJB_PROJ`有两列：`EMP_ID`是引用`EMPLOYEE`表`ID`主键列的引用列，`PROJ_ID`是引用`PROJECT`表`ID`主键列的引用列。


    ```java

    @Entity

    public class Employee implements Serializable {

    . . .

    @ManyToMany(mappedBy="employees", cascade=CascadeType.PERSIST)

    @JoinTable(name="EMP_PROJ",

    joinColumns={@JoinColumn(name="EMP_ID",

    referencedColumnName="ID")},

    inverseJoinColumns={@JoinColumn(name="PROJ_ID",

    referencedColumnName="ID")})

    protected Collection projects;

    . . .

    }

    @Entity

    public class Project implements Serializable {

    . . .

    @ManyToMany(mappedBy="projects")

    protected Set employees;

    . . .

    }

    ```


    在`@ManyToMany`上使用`(mappedBy="projects")`属性，使得`@JoinTable`注解中包含的映射信息可以被两个关系字段共享。


    ### 懒加载 vs. 急加载字段绑定


    默认情况下，出于性能考虑，所有字段值都被指定为懒加载，这是因为每个字段映射（如`@Basic`、`@OneToMany`等）上的隐含`fetch`属性都持有默认值`FetchType.LAZY`。实际上，这个默认的`FetchType.LAZY`值只是一个提示，持久化管理器并不一定要遵守该请求。对于许多字段（包括几乎所有简单值），在实际需要时才懒加载实体的字段会带来显著负担，因此持久化管理器通常会忽略`FetchType.LAZY`指令，而直接进行急加载。


    然而，当在字段映射上指定了非默认值`FetchType.EAGER`时，这就不再是一个可选请求。当字段被如此修饰时，持久化管理器有义务在实体实例化时立即绑定其值。这在处理关系字段时尤其重要。关系字段可以使用`fetch=FetchType.EAGER`属性进行注解，以确保即使实体变为游离状态，客户端仍然能够遍历该关系字段以访问相关的实体实例。


    当实体处于受管状态时，关系值将在首次被请求时绑定。但是，当实体被实例化然后游离（例如，被序列化并传递给远程客户端）时，可能需要预先急加载其所有关系字段。在这种情况下，您可以覆盖默认的`fetch`值，并在关系字段上设置`(fetch=FetchType.EAGER)`。然而，请注意此操作的后果，因为如果急加载的集合又急加载了它们引用的对象，依此类推，可能会导致级联加载风暴。


    ### 级联操作


    与其他实体相关联的实体可以跨引用级联某些生命周期操作。这允许对一个实体的操作传播到某些其他相关实体。级联选项通过各个关系字段上的注解来定义，以便您可以精确控制级联行为。以下是级联选项：


    ```java

    public enum CascadeType {

    ALL,

    PERSIST,

    MERGE,

    REMOVE,

    REFRESH

    }

    ```


    例如，一个持有对独占拥有的`Address`实体引用的`Customer`实体，可能希望将对`Customer`的所有操作都传播到`Address`实例。


    ```java

    @Entity

    public class Customer implements Serializable {

    . . .

    @OneToOne(cascade=CascadeType.ALL)

    protected Address address;

    . . .

    }

    ```


    当对`Customer`实体调用`persist()`或`remove()`等`EntityManager`操作时，该操作也会被调用到`address`字段中持有的`Address`实例，以及该`Address`实例的任何级联字段，依此类推。


    使用这些`cascade`注解属性，实体开发者可以声明式地、简洁地指定级联行为，并且使客户端无需在顶层实例上执行`persist()`、`merge()`、`remove()`或`refresh()`生命周期操作时，跟踪需要被操作的实例网络。'
