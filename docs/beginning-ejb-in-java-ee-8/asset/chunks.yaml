  trans: '

    ## 摘要


    本章介绍了 Java EE 部署的主题，涵盖了通用部署问题以及特定于 EJB 和 JPA 实体的部署领域。我们首先概述了部署期间执行的任务，并指出，根据所部署
    Java EE 模块的复杂性，某些步骤可能并非必需。本概述部分还解释了装配员和部署员的角色，并在这两个角色的背景下说明了部署任务。


    为了提供一些关于部署基础设施的背景知识（这些知识将有助于你选择如何划分应用程序和解析外部引用），我们探讨了 Java EE 服务器和四个 Java EE 容器：EJB、Web、应用程序客户端和
    Applet。这引出了对相应 Java EE 模块类型以及 Java EE 应用程序定义的讨论。我们还解释了如何使用库组件来打包你的 JPA 持久化单元和非
    Java EE 组件。


    本章的其余部分更深入地探讨了装配员和部署员的角色，并以关于如何部署 EJB 模块和 JPA 持久化单元的更多具体细节作为结尾。


    在下一章中，我们将探讨如何构建能够在多用户分布式环境中与 EJB 组件交互的客户端。


    # 12. EJB 客户端应用程序


    到目前为止，在我们的旅程中，我们已经详细介绍了会话 Bean、使用 Java 持久化 API (JPA) 的实体、消息驱动 Bean (MDB)、将无状态会话
    Bean 发布为 Web 服务，以及集成所有这些组件。除此之外，我们还介绍了事务和性能的具体细节。虽然我们一直在开发简单的 Servlet 作为客户端应用程序来说明组件的工作方式，但我们尚未深入讨论不同类型的
    EJB 客户端应用程序以及如何开发它们。在本章中，我们将讨论客户端应用程序可能涉及的不同应用程序架构，并将构建常见的几种架构。


    ## 应用程序架构


    Java EE 平台在组件如何跨不同层和架构进行分布方面提供了灵活性。你可以根据应用程序或配置需求选择正确的架构和编程模型。在本节中，我们将介绍你可以使用的不同架构和编程模型。


    图 12-1 展示了基于 Web 的应用程序的架构布局。这种架构通常由运行在浏览器中的 Web 应用程序作为前端。如今，其他类型的客户端设备（例如智能手机、平板电脑、手机和
    Telnet 设备）也被用来运行这些应用程序。运行在浏览器或移动设备中的 Web 应用程序使用诸如 JavaServer Pages (JSP)、JavaServer
    Faces (JSF) 或 Java Servlet 等 Web 技术来渲染用户界面。典型的用户操作，例如输入搜索条件或向购物车添加商品，将通过上述一种 Web
    技术调用/调用运行在 EJB 容器中的会话 Bean。一旦会话 Bean 被调用，它们会处理请求，并发送回响应。


    ![A311833_3_En_12_Fig1_HTML.jpg](img/A311833_3_En_12_Fig1_HTML.jpg)


    图 12-1


    基于 Web 的应用程序架构


    这种架构允许你利用会话 Bean 的所有优势，例如封装与实体的交互、管理事务和安全性等。缺点是，你需要一个 EJB 容器或应用服务器来部署和运行会话 Bean。在这种架构中，另一点需要注意的是，你可以将
    Web 和 EJB 容器运行在两个不同的物理机器上，或者运行在同一物理机器的两个独立的 Java 虚拟机 (JVM) 上。这种方法的优缺点已在第 2 章中讨论过。


    这种架构的一个轻微变体如图 12-2 所示，其中 Web 和 EJB 容器位于同一个 JVM 中。在这种架构中，Web 组件以本地模式与 EJB 组件交互。这种方法的优缺点也已在第
    2 章中讨论过。


    ![A311833_3_En_12_Fig2_HTML.jpg](img/A311833_3_En_12_Fig2_HTML.jpg)


    图 12-2


    具有本地调用的基于 Web 的应用程序架构


    JPA 规范提供了一个轻量级的持久化对象模型，使用普通的旧 Java 对象 (POJO) 和注解进行对象/关系 (O/R) 映射。这与早期 EJB 规范在持久化方面所做的截然不同。这种持久化模型的轻量级特性使得应用程序架构成为可能，允许
    Web 应用程序直接与持久化对象模型或 JPA 实体交互。图 12-3 展示了这种编程模型的架构布局。在这种架构中，Web 组件将使用 `EntityManager`
    与实体交互，以执行 CRUD（创建、检索、更新、删除）操作和查询来检索数据。


    ![A311833_3_En_12_Fig3_HTML.jpg](img/A311833_3_En_12_Fig3_HTML.jpg)


    图 12-3


    使用 JPA 实体的基于 Web 的应用程序架构


    这种编程模型的优点在于，你可以在任何标准的轻量级 Web 容器（例如 Tomcat）上运行你的 Web 应用程序。你不需要任何 EJB 容器或应用服务器，因为你没有使用会话
    Bean 或 MDB。这种架构与 JPA 规范所基于的其他 O/R 框架（例如 TopLink 和 Hibernate）一起被广泛使用。缺点是，你会失去 EJB
    容器提供的一些服务（例如事务和安全性）。


    在构建使用 EJB 或实体的 Web 应用程序时，上述三种架构是最常用的。这些架构的其他变体也是可能的，但我们不会深入探讨所有选项。

    '
- fmt: "接下来的两种架构是编程模型，其中客户端应用程序属于桌面类型，为数据录入目的提供丰富的用户界面功能。\n\n图[12-4](#A311833_3_En_12_Chapter.html#Fig4)展示了一种架构，其中运行在桌面上的客户端应用程序调用远程会话。运行在桌面上的客户端应用程序具有供最终用户（如客户服务代表和银行柜员）使用的数据录入界面。这些客户端应用程序可以使用Java\
    \ SE中的`Java Swing`技术或从命令行运行的普通Java类（`POJO`）来开发。通常，最终用户从桌面启动客户端应用程序，输入一些数据，并通过按下屏幕上的某个UI组件（如提交按钮）来触发事件。\n\
    \n![A311833_3_En_12_Fig4_HTML.jpg](A311833_3_En_12_Fig4_HTML.jpg)\n\n图12-4 专业的桌面客户端应用程序架构\n\
    \n客户端应用程序可以安装在桌面机器上，也可以使用`Java Web Start`等技术从服务器下载。在这种架构中，由于会话Bean将在远程服务器上运行，因此客户端应用程序始终会远程调用会话Bean。与Web应用程序一样，这种架构可以利用会话Bean的优势。\n\
    \n图[12-5](#A311833_3_En_12_Chapter.html#Fig5)展示了一种直接使用`JPA`实体而不通过会话Bean的架构。在这种编程模型中，客户端应用程序和打包在持久化单元中的实体被部署在一起，并组装成一个单一的应用程序单元。客户端应用程序使用`EntityManager`来执行CRUD操作和查询以检索数据。\n\
    \n![A311833_3_En_12_Fig5_HTML.jpg](A311833_3_En_12_Fig5_HTML.jpg)\n\n图12-5 使用`JPA`实体的专业客户端应用程序架构\n\
    \n这种编程模型的优点在于，您可以在标准的Java SE环境中运行应用程序，而无需使用`EJB`容器；但明显的缺点是，您将失去由`EJB`容器提供的安全性和事务管理等服务。\n\
    \n如第[6](#A311833_3_En_6_Chapter.html)章所述，无状态会话Bean可以作为Web服务发布。一旦无状态会话Bean被发布为Web服务，任何能够组装和发送简单对象访问协议（`SOAP`）消息的Web服务客户端应用程序都可以调用已发布的Web服务。图[12-6](#A311833_3_En_12_Chapter.html#Fig6)展示了这种架构。\n\
    \n![A311833_3_En_12_Fig6_HTML.jpg](A311833_3_En_12_Fig6_HTML.jpg)\n\n图12-6 Web服务客户端应用程序架构\n\
    \n企业通常拥有多个与异构后端系统或服务交互的业务流程。业务流程执行语言（`BPEL`）是一种标准标记语言，允许您将离散的Web服务组装成一个单一的业务流程。基于`BPEL`的业务流程使用标准的Web服务架构和基础设施来调用一个或多个Web服务。图[12-7](#A311833_3_En_12_Chapter.html#Fig7)展示了一种架构，其中基于`BPEL`的业务流程调用了一个发布为Web服务的无状态会话Bean。例如，第[6](#A311833_3_En_6_Chapter.html)章演示了如何创建和发布一个检查信用卡有效性的信用服务。在订单处理业务流程的上下文中，该信用服务可能是业务流程为完成订单处理而与之交互的多个服务之一。\n\
    \n![A311833_3_En_12_Fig7_HTML.jpg](A311833_3_En_12_Fig7_HTML.jpg)\n\n图12-7 作为客户端应用程序的业务流程\n\
    \n到目前为止，我们已经研究了涉及`EJB`或`JPA`组件的可能架构和编程模型。在接下来的章节中，我们将深入探讨图[12-2](#A311833_3_En_12_Chapter.html#Fig2)中所示的基于Web的应用程序架构，并演示如何扩展在第[7](#A311833_3_En_7_Chapter.html)章中为Wines\
    \ Online应用程序开发的集成后端应用程序。我们选择这种架构是因为它被广泛使用，并且有助于我们说明容器服务的用法。\n\n## JSF\n\nJavaServer\
    \ Faces技术为构建Java EE的服务器端用户界面建立了标准。JavaServer Faces（`JSF`）自定义标签库用于在视图中表达UI组件，并将组件连接到服务器端对象。在编写本手稿时，使用的是`JSF`版本2.3。\n\
    \n在本节中，我们将研究开发一个Web应用程序，该应用程序使用JavaServer Faces（`JSF`）通过图[12-2](#A311833_3_En_12_Chapter.html#Fig2)所示的架构与集成的`EJB`后端应用程序进行通信。我们将从简要介绍`JSF`的几个概念开始，为您开发一个完整的Web应用程序做好准备。`JSF`于2002年首次引入，需要`JDK\
    \ 1.5`或更高版本，因此首要条件是在您的机器上安装`JDK`。\n\n`JSF`主要帮助我们完成以下工作：\n\n*   通过添加组件标签将组件拖放到页面上，\n\
    *   将组件生成的事件连接到服务器端应用程序代码，\n*   将页面上的UI组件绑定到服务器端数据，\n*   使用可重用和可扩展的组件构建UI，\n*\
    \   在服务器请求的生命周期之外保存和恢复UI状态。\n\n在本手稿中，使用了`JSF`版本2.3，其中包括以下新特性：\n\n*   `CDI`对齐改进；\n\
    *   `JSF 2.3`工件现在可以轻松注入到Java类和`EL`表达式中；\n*   改进了`WebSocket`，这是一种在`TCP`上提供全双工双向通信的协议；\n\
    *   日期时间API改进；\n*   API增强，包括`UIData`、`UIRepeat`等。\n\n注意\n\n本节绝不对`JSF`进行全面讨论。与任何其他Java\
    \ EE技术一样，有关`JSF`的详细信息可以在以下网址找到：[`https://myfaces.apache.org/jsfintro.html`](https://myfaces.apache.org/jsfintro.html)\n\
    \n`JSF`视图包括：\n\n*   组件树\n*   `Facelets`或`HTML`\n*   表达式语言\n*   根据需要与`JSTL`和其他标签库混合使用\n\
    *   组件库\n\n以下是Java EE 8中`JSF 2.3`的新增内容：\n\n*   两个特性驱动者：Oracle与社区\n*   特性清理\n*\
    \   基于社区请求的小型新特性集\n*   用于构建Java EE应用程序的成熟标准\n\n`JSF 2.3`新特性包括：\n\n*   注入`ViewMap`\n\
    \    *   `@ViewMap`\n    *   `@Inject`\n    *   `Map viewMap;`\n*   注入`UiViewRoot\
    \ @Inject`\n    *   `UIViewRoot viewRoot;`\n*   `#1332` - 让`CDI`处理`#{view}`\n\
    *   `#1331` - 让`CDI`处理`#{application}`\n*   `#1254` - 契约属性限制过于严格\n*   `#1328`\
    \ - 让`CDI`处理`#{session}` EL解析\n*   `#1325` - 让`CDI`处理`#{applicationScope}`\n*\
    \   `#1311` - 让`CDI`处理`#{facesContext}` EL解析\n*   `#1323` - 支持`@Inject`注入`applicationMap\
    \ @ApplicationMap`\n    *   `@Inject`\n    *   `Map applicationMap;`\n    *  \
    \ `Map applicationMap;`\n*   `#1322` - 简化`#{externalContext}`以使用`ExternalContextProducer`\n\
    *   `#1309` - 支持`@Inject`注入`ExternalContext`\n    *   `@Inject ExternalContext\
    \ externalContext;`\n*   `#527` - 支持`@Inject`注入`FacesContext`\n    *   `@Inject\
    \ FacesContext facesContext;`\n*   `javax.faces.bean.ManagedProperty`替换\n*   `#1396`\
    \ - 用于SSE和WebSocket的`f:socket`"
  raw: "The next two architectures are programming models in which the client applications\
    \ are of the desktop variety, which provide rich UI functionality for data entry\
    \ purposes.\n\nFigure [12-4](#A311833_3_En_12_Chapter.html#Fig4) shows an architecture\
    \ in which a client application running on the desktop invokes a remote session.\
    \ The client application running on the desktop has data entry screens used by\
    \ the end users (such as customer service representatives and bank tellers). These\
    \ client applications can be developed using Java Swing technology in Java SE\
    \ or using plain Java classes (POJOs) that are run from the command line. Generally,\
    \ the end users launch the client application from their desktop, enter some data,\
    \ and trigger an event by pressing some onscreen UI component (such as a Submit\
    \ button).\n\n![A311833_3_En_12_Fig4_HTML.jpg](A311833_3_En_12_Fig4_HTML.jpg)\n\
    \nFigure 12-4\n\nA professional desktop client application architecture\n\nClient\
    \ applications can either be installed on the desktop machine or downloaded from\
    \ a server using technologies like Java Web Start. In this architecture, there\
    \ will always be remote invocation of the session beans from the client applications,\
    \ as the session beans will be running on a remote server. This architecture can\
    \ leverage the benefits of session beans, as is the case with Web applications.\n\
    \nFigure [12-5](#A311833_3_En_12_Chapter.html#Fig5) shows an architecture that\
    \ uses JPA entities directly instead of going through the session beans. In this\
    \ programming model, the client application and entities packaged in a persistence\
    \ unit are collocated and assembled as a single application unit. The client application\
    \ makes use of the `EntityManager` to perform CRUD operations and queries to retrieve\
    \ the data.\n\n![A311833_3_En_12_Fig5_HTML.jpg](A311833_3_En_12_Fig5_HTML.jpg)\n\
    \nFigure 12-5\n\nA professional client application architecture using JPA entities\n\
    \nThe upside of this programming model is that you can run your applications in\
    \ a standard Java SE environment without using an EJB container, but the obvious\
    \ downside is that you will lose the services like security and transaction management\
    \ that are provided by the EJB container.\n\nAs described in Chapter [6](#A311833_3_En_6_Chapter.html),\
    \ stateless session beans can be published as Web services. Once a stateless session\
    \ bean is published as a Web service, any Web service client application that\
    \ can assemble and send a Simple Object Access Protocol (SOAP) message can invoke\
    \ the published Web service. Figure [12-6](#A311833_3_En_12_Chapter.html#Fig6)\
    \ shows this architecture.\n\n![A311833_3_En_12_Fig6_HTML.jpg](A311833_3_En_12_Fig6_HTML.jpg)\n\
    \nFigure 12-6\n\nA Web service client application architecture\n\nEnterprises\
    \ typically have several business processes that interact with heterogeneous back-end\
    \ systems or services. Business Process Execution Language (BPEL) is a standard\
    \ markup language that allows you to assemble discrete Web services as a single\
    \ business process. BPEL-based business processes use standard Web services architecture\
    \ and infrastructure to invoke one or more Web services. Figure [12-7](#A311833_3_En_12_Chapter.html#Fig7)\
    \ shows an architecture in which a BPEL-based business process invokes a stateless\
    \ session bean published as a Web service. For example, Chapter [6](#A311833_3_En_6_Chapter.html)\
    \ demonstrated how to create and publish a credit service that checks the validity\
    \ of a credit card. In the context of an order-processing business process, this\
    \ credit service may be one of several services with which the business process\
    \ interacts to fulfill the order process.\n\n![A311833_3_En_12_Fig7_HTML.jpg](A311833_3_En_12_Fig7_HTML.jpg)\n\
    \nFigure 12-7\n\nA business process as a client application\n\nSo far, we have\
    \ looked at the possible architectures and programming models that involve EJB\
    \ or JPA components. In the next sections, we will drill down into the Web-based\
    \ application architecture shown in Figure [12-2](#A311833_3_En_12_Chapter.html#Fig2)\
    \ and demonstrate how you can expand on the integrated back-end application developed\
    \ for the Wines Online application in Chapter [7](#A311833_3_En_7_Chapter.html).\
    \ We chose this architecture because it is commonly used and helps us illustrate\
    \ the usage of container services.\n\n## JSF\n\nJavaServer Faces technology establishes\
    \ the standard for building server-side user interfaces for Java EE. JavaServer\
    \ Faces (JSF) custom tags libraries for expressing UI components within a view\
    \ and for wiring components to server-side objects. The JSF version 2.3 was used\
    \ during the writing of this manuscript.\n\nIn this section, we will look at developing\
    \ a Web application that uses JavaServer Faces (JSF) to talk to an integrated\
    \ EJB back-end application using the architecture shown in Figure [12-2](#A311833_3_En_12_Chapter.html#Fig2).\
    \ We will start with a brief introduction to several concepts of JSF to prepare\
    \ you to develop a full-fledged Web application. JSF was first introduced in 2002\
    \ and requires JDK 1.5 or higher, so the very first requirement is to have JDK\
    \ installed on your machine.\n\nMainly JSF will help us to do the following:\n\
    \n*   Drop components onto a page by adding component tags,\n*   Wire component-generated\
    \ events to server-side application code,\n*   Bind UI components on a page to\
    \ server-side data,\n*   Construct a UI with reusable and extensible components,\n\
    *   Save and restore UI state beyond the life of server requests.\n\nIn this manuscript,\
    \ the JSF version 2.3 was used including new features include like these:\n\n\
    *   The CDI alignment improvements;\n*   JSF 2.3 artifacts can now be easily injected\
    \ into Java classes and EL expressions;\n*   Improvement of WebSocket, which is\
    \ a protocol that provides full duplex bidirectional communication over TCP;\n\
    *   Date-Time API improvements;\n*   API enhancements including UIData, UIRepeat,\
    \ etc.\n\nNote\n\nThis section by no means provides a comprehensive discussion\
    \ of JSF. As with any other Java EE technology, detailed information about JSF\
    \ can be found at: [`https://myfaces.apache.org/jsfintro.html`](https://myfaces.apache.org/jsfintro.html)\n\
    \nJSF Views include:\n\n*   Tree of Components\n*   Facelets or HTML\n*   Expression\
    \ Language\n*   Mix with JSTL and other tab libraries, as needed\n*   Component\
    \ Libraries\n\nHere is what's new in JSF 2.3 in Java EE 8:\n\n*   Two feature\
    \ drivers: Oracle & Community\n*   Feature clean-up\n*   Small new feature set\
    \ based upon community requests\n*   Mature standard for building Java EE applications\n\
    \nJSF 2.3 New Features include:\n\n*   Inject ViewMap\n    *   @ViewMap\n    *\
    \   @Inject\n    *   Map viewMap;\n*   Inject UiViewRoot @Inject\n    *   UIViewRoot\
    \ viewRoot;\n*   #1332 - Let CDI handle #{view}\n*   #1331 - Let CDI handle #{application}\n\
    *   #1254 - Contracts attribute too restrictive\n*   #1328 - Let CDI handle #{session}\
    \ EL resolving\n*   #1325 - Let CDI handle #{applicationScope}\n*   #1311 - Let\
    \ CDI handle #{facesContext} EL resolving\n*   #1323 - Support @Inject for the\
    \ applicationMap @ApplicationMap\n    *   @Inject\n    *   Map applicationMap;\n\
    \    *   Map applicationMap;\n*   #1322 - Simplify #{externalContext} to use ExternalContextProducer\n\
    *   #1309 - Support @Inject for ExternalContext\n    *   @Inject ExternalContext\
    \ externalContext;\n*   #527 - Support @Inject for FacesContext\n    *   @Inject\
    \ FacesContext facesContext;\n*   javax.faces.bean.ManagedProperty Replacement\n\
    *   #1396 - f:socket for SSE and WebSocket"
  trans: "\n接下来的两种架构是编程模型，其中客户端应用程序属于桌面类型，为数据录入目的提供了丰富的用户界面功能。\n\n图 12-4 展示了一种架构，其中运行在桌面上的客户端应用程序调用远程会话。运行在桌面上的客户端应用程序具有供最终用户（例如客户服务代表和银行柜员）使用的数据录入界面。这些客户端应用程序可以使用\
    \ Java SE 中的 Java Swing 技术开发，也可以使用从命令行运行的普通 Java 类（POJO）开发。通常，最终用户从桌面启动客户端应用程序，输入一些数据，然后通过按下屏幕上的某个\
    \ UI 组件（例如“提交”按钮）来触发事件。\n\n![A311833_3_En_12_Fig4_HTML.jpg](img/A311833_3_En_12_Fig4_HTML.jpg)\n\
    \n图 12-4\n\n专业的桌面客户端应用程序架构\n\n客户端应用程序可以安装在桌面机器上，也可以使用 Java Web Start 等技术从服务器下载。在这种架构中，客户端应用程序将始终远程调用会话\
    \ Bean，因为会话 Bean 将在远程服务器上运行。这种架构可以利用会话 Bean 的优势，就像 Web 应用程序一样。\n\n图 12-5 展示了一种直接使用\
    \ JPA 实体而不经过会话 Bean 的架构。在这种编程模型中，客户端应用程序和打包在持久化单元中的实体被部署在一起，并组装成一个单一的应用程序单元。客户端应用程序使用\
    \ `EntityManager` 来执行 CRUD 操作和查询以检索数据。\n\n![A311833_3_En_12_Fig5_HTML.jpg](img/A311833_3_En_12_Fig5_HTML.jpg)\n\
    \n图 12-5\n\n使用 JPA 实体的专业客户端应用程序架构\n\n这种编程模型的优点在于，你可以在标准的 Java SE 环境中运行应用程序，而无需使用\
    \ EJB 容器，但明显的缺点是你将失去 EJB 容器提供的安全性和事务管理等服务。\n\n如第 6 章所述，无状态会话 Bean 可以作为 Web 服务发布。一旦无状态会话\
    \ Bean 作为 Web 服务发布，任何能够组装和发送简单对象访问协议（SOAP）消息的 Web 服务客户端应用程序都可以调用已发布的 Web 服务。图\
    \ 12-6 展示了这种架构。\n\n![A311833_3_En_12_Fig6_HTML.jpg](img/A311833_3_En_12_Fig6_HTML.jpg)\n\
    \n图 12-6\n\nWeb 服务客户端应用程序架构\n\n企业通常拥有多个与异构后端系统或服务交互的业务流程。业务流程执行语言（BPEL）是一种标准标记语言，允许你将离散的\
    \ Web 服务组装成一个单一的业务流程。基于 BPEL 的业务流程使用标准的 Web 服务架构和基础设施来调用一个或多个 Web 服务。图 12-7 展示了一种架构，其中基于\
    \ BPEL 的业务流程调用了一个作为 Web 服务发布的无状态会话 Bean。例如，第 6 章演示了如何创建和发布一个检查信用卡有效性的信用服务。在订单处理业务流程的上下文中，该信用服务可能是业务流程为完成订单处理而与之交互的多个服务之一。\n\
    \n![A311833_3_En_12_Fig7_HTML.jpg](img/A311833_3_En_12_Fig7_HTML.jpg)\n\n图 12-7\n\
    \n作为客户端应用程序的业务流程\n\n到目前为止，我们已经了解了涉及 EJB 或 JPA 组件的可能架构和编程模型。在接下来的章节中，我们将深入探讨图 12-2\
    \ 中所示的基于 Web 的应用程序架构，并演示如何扩展在第 7 章中为 Wines Online 应用程序开发的集成后端应用程序。我们选择这种架构是因为它很常用，并且有助于说明容器服务的使用。\n\
    \n## JSF\n\nJavaServer Faces 技术为构建 Java EE 的服务器端用户界面建立了标准。JavaServer Faces（JSF）自定义标签库用于在视图中表达\
    \ UI 组件，并将组件连接到服务器端对象。本书撰写时使用的是 JSF 2.3 版本。\n\n在本节中，我们将研究开发一个 Web 应用程序，该应用程序使用\
    \ JavaServer Faces（JSF）与集成的 EJB 后端应用程序通信，采用图 12-2 所示的架构。我们将从简要介绍 JSF 的几个概念开始，为你开发一个功能完备的\
    \ Web 应用程序做好准备。JSF 于 2002 年首次推出，需要 JDK 1.5 或更高版本，因此首要条件是在你的机器上安装 JDK。\n\nJSF 主要帮助我们完成以下工作：\n\
    \n*   通过添加组件标签将组件拖放到页面上，\n*   将组件生成的事件连接到服务器端应用程序代码，\n*   将页面上的 UI 组件绑定到服务器端数据，\n\
    *   使用可重用和可扩展的组件构建 UI，\n*   在服务器请求的生命周期之外保存和恢复 UI 状态。\n\n在本书中，使用了 JSF 2.3 版本，其中包括以下新特性：\n\
    \n*   CDI 对齐改进；\n*   JSF 2.3 工件现在可以轻松注入到 Java 类和 EL 表达式中；\n*   改进了 WebSocket，这是一种通过\
    \ TCP 提供全双工双向通信的协议；\n*   日期时间 API 改进；\n*   API 增强，包括 UIData、UIRepeat 等。\n\n注意\n\
    \n本节绝非对 JSF 的全面讨论。与任何其他 Java EE 技术一样，有关 JSF 的详细信息可以在以下网址找到：[`https://myfaces.apache.org/jsfintro.html`](https://myfaces.apache.org/jsfintro.html)\n\
    \nJSF 视图包括：\n\n*   组件树\n*   Facelets 或 HTML\n*   表达式语言\n*   根据需要与 JSTL 和其他标签库混合使用\n\
    *   组件库\n\n以下是 Java EE 8 中 JSF 2.3 的新特性：\n\n*   两个特性驱动者：Oracle 和社区\n*   特性清理\n\
    *   基于社区请求的小型新特性集\n*   用于构建 Java EE 应用程序的成熟标准\n\nJSF 2.3 新特性包括：\n\n*   注入 ViewMap\n\
    \    *   @ViewMap\n    *   @Inject\n    *   Map viewMap;\n*   注入 UiViewRoot @Inject\n\
    \    *   UIViewRoot viewRoot;\n*   #1332 - 让 CDI 处理 #{view}\n*   #1331 - 让 CDI\
    \ 处理 #{application}\n*   #1254 - Contracts 属性限制过于严格\n*   #1328 - 让 CDI 处理 #{session}\
    \ EL 解析\n*   #1325 - 让 CDI 处理 #{applicationScope}\n*   #1311 - 让 CDI 处理 #{facesContext}\
    \ EL 解析\n*   #1323 - 支持对 applicationMap 使用 @Inject @ApplicationMap\n    *   @Inject\n\
    \    *   Map applicationMap;\n    *   Map applicationMap;\n*   #1322 - 简化 #{externalContext}\
    \ 以使用 ExternalContextProducer\n*   #1309 - 支持对 ExternalContext 使用 @Inject\n  \
    \  *   @Inject ExternalContext externalContext;\n*   #527 - 支持对 FacesContext 使用\
    \ @Inject\n    *   @Inject FacesContext facesContext;\n*   javax.faces.bean.ManagedProperty\
    \ 的替代方案\n*   #1396 - 用于 SSE 和 WebSocket 的 f:socket\n"
- fmt: "### Evolution of Java EE Web Technologies\n\nJava EE technologies have evolved\
    \ to deliver a mature, reliable, and stable platform that allows developers to\
    \ build enterprise-scale applications. The platform has evolved significantly\
    \ in the Web technologies space as well. Figure [12-8](#A311833_3_En_12_Chapter.html#Fig8)\
    \ shows the evolution of Web technologies in the Java EE platform.\n\n![A311833_3_En_12_Fig8_HTML.jpg](A311833_3_En_12_Fig8_HTML.jpg)\n\
    \nFigure 12-8\n\nThe evolution of Java EE Web technologies\n\nPrior to the arrival\
    \ of Java Servlets, CGI scripts were used to generate dynamic Web content. CGI\
    \ scripts had their own limitations, including the scripts being run as individual\
    \ processes, which led to scalability issues.\n\nAfter CGI scripts, Java Servlets\
    \ became the basis of all Web technologies in the Java EE platform. Java Servlets\
    \ provided a great start for developing standards-based Web components and applications\
    \ that are portable across Web containers. One of the disadvantages of Java Servlets\
    \ was they were code intensive—all of the HTML was printed out using `println()`\
    \ methods. Servlets did not provide a bridge between the graphic designers who\
    \ created the design of the pages and the Java programmers who created the dynamic\
    \ content.\n\nJSP was next in the evolution of Web technologies; it bridged the\
    \ gap between graphic designers and Java programmers. Based on Java Servlets technology,\
    \ JSP pages are HTML pages with embedded Java code. This model allowed graphic\
    \ designers to create JSP pages, which programmers could then make dynamic by\
    \ adding Java code or scriplets. When compiled, JSP pages become Java servlets.\n\
    \nWhile the advent of JSP pages was nice, many developers now had to deal with\
    \ mundane tasks like iterating over collections of data. This led to the creation\
    \ of the JSP Standard Tag Library (JSTL), which automated some of these tasks.\n\
    \nWhile all of these advances in technologies simplified the building of Web applications,\
    \ there was no standard component model for developing them. On top of this, development\
    \ of Web applications with reusable components in fourth-generation languages\
    \ (4GLs) like Visual Basic, Oracle Forms, and PowerBuilder weren’t available yet\
    \ either.\n\nJSF is the latest Java EE Web technology. With the component model,\
    \ it addresses the issues of reusable components and ease of building Web applications.\
    \ The reusable component model is not the only thing that JSF provides, though.\
    \ We will look into some of the other features and benefits of JSF in the following\
    \ sections.\n\n#### The Model-View-Controller Pattern\n\nDuring the early phases\
    \ of Java EE Web technology development, most of the Web applications were built\
    \ using the so-called Model-I approach. The basic idea of Model-I is that the\
    \ Web technology that renders the dynamic Web content is closely intertwined with\
    \ the business logic of the back-end systems. There was no separation of concerns\
    \ in this approach, which led to application maintenance issues. The Model-II\
    \ approach (also known as the Model-View-Controller [MVC] pattern) was a follow-up\
    \ to the Model-I approach. The key to this approach is the clean separation between\
    \ the view layer and the model layer that supplies the data and business logic.\n\
    \nMajor Model-View-Controller benefits include:\n\n*   Action-oriented framework\
    \ layered on top of JAX-RS\n*   Manual controller logic… you control your own\
    \ destiny\n*   No UI Components\n*   You choose your front-end technology\n\n\
    The MVC pattern isn’t specific to the Java language as such; it dates back to\
    \ languages like Smalltalk. In this approach, the model layer is used for the\
    \ business logic and data, the view is used to render the user interface, and\
    \ the controller is used for application flow and event handling. While the Java\
    \ EE platform had been evolving with respect to the model and view-side technologies,\
    \ it didn’t include a built-in framework that could be used on the controller\
    \ side. Instead, many developers built homegrown controllers using Java Servlets\
    \ technology. Many others turned to Apache Struts, which provided an alternative\
    \ to writing homegrown controllers. Apache Struts is a widely used open source\
    \ framework that has become the de facto controller framework for Web applications.\n\
    \nFinally, JSF technology standardized the controller aspect of the MVC pattern\
    \ by providing a controller as part of the framework.\n\nMVC 1.0 controllers benefits\
    \ include:\n\n*   Controls the request-processing for an MVC application\n*  \
    \ JAX-RS Implementation\n*   Class annotated with `@Controller` either at class\
    \ level or method level\n*   Must be CDI Managed\n*   Possible to create hybrid\
    \ classes (`@Controller` at method level)\n*   Four return types: `String`, `void`,\
    \ `Response`, `Viewable`\n    *   `String`: returns path to view\n    *   `void`:\
    \ requires `@javax.mvc.View` annotation\n    *   `Response`: typical `javax.ws.rs.core.Response`,\
    \ providing full access to the response\n    *   `Viewable`: `javax.mvc.Viewable`\
    \ containing information about the view and how to process\n*   Default response\
    \ type `text/html`, but can be modified with `@Produces`\n\nThe MVC 1.0 includes\
    \ models to utilize entity classes for data, or store into a CDI bean.\n\nTwo\
    \ ways to work with models include:\n\n*   `javax.mvc.Models` class\n*   CDI-Based\
    \ Models\n\nJSR 371: Model-View-Controller 1.0 Specification can be found at:\
    \ [`https://www.mvc-spec.org/`](https://www.mvc-spec.org/)\n\nHere are the major\
    \ differences between JSF and MVC:\n\nJSF:\n\n*   Component Based\n*   Controller\
    \ Logic\n*   Automates Processing\n*   Facelets\n*   Rapid Development\n*   Works\
    \ well with REST\n*   Stateful… remains across requests\n\nMVC:\n\n*   Action\
    \ Based\n*   Layered on Top of JAX-RS\n*   Manual Validations/Conversions\n* \
    \  Many Different View Options\n*   Fine Control Request/Response\n*   Great fit\
    \ for REST\n*   No State Across Requests\n\n### JSF Architecture\n\nFigure [12-9](#A311833_3_En_12_Chapter.html#Fig9)\
    \ shows the simplified JSF architecture. JSF has a front controller servlet called\
    \ `FacesServlet`. `FacesServlet` performs the role of brokering the incoming requests\
    \ from clients to the right places. As mentioned earlier, JSF comes with reusable\
    \ Web components that can be used to develop user interfaces. These UI components\
    \ can be associated with objects called managed beans. These managed beans handle\
    \ the logic for the application and interact with back-end systems or components\
    \ like EJBs. Each UI component in JSF can be associated with a different render\
    \ kit that can generate different markup, such as HTML or WML (Wireless Markup\
    \ Language), onto different types of devices.\n\n![A311833_3_En_12_Fig9_HTML.jpg](A311833_3_En_12_Fig9_HTML.jpg)\n\
    \nFigure 12-9\n\nJSF architecture"
