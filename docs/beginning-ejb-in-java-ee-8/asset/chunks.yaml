- fmt: '# 4. Advanced Persistence Features


    We have organized the persistence sections of this book into three main chapters.
    The previous chapter introduced the Java Persistence API (JPA), and it gave you
    a starting point for creating entities, wiring up object/relational (O/R) mappings,
    and writing queries that retrieve them. With an understanding of these concepts,
    you can create and build applications with powerful, persistent entities that
    run both inside and outside an EJB container.


    In this chapter, we build upon this knowledge and explore areas of the Java Persistence
    API (JPA) that offer greater flexibility and power to your applications, including
    the following:


    - How to define and work with entity inheritance hierarchies

    - How to work with abstract entities, mapped superclasses, and non-entity classes

    - How to build queries with Java Persistence Query Language (JPQL), native SQL,
    and the query criteria API

    - How to configure ID generators to auto-populate primary key fields

    - How to specify entity lifecycle callbacks

    - How to configure optimistic locking


    The third main area of the Persistence API, which will be covered in Chapter [8](#A311833_3_En_8_Chapter.html),
    involves EJB support for transaction management when working with JPA entities.
    The EJB container provides you with options for session beans to manage the life
    cycle of the `EntityManager`, control the longevity of your persistence context,
    and use either Java Transaction API (JTA) or resource-local transactions. With
    good knowledge of the way EJB and JPA support transactions and how you can apply
    this technology, you will have the tools to build full-scale, persistent enterprise
    applications.


    As with the rest of this book, this chapter covers many of the concepts defined
    in the specification, but it is not intended to supplant it. Indeed, readers are
    strongly encouraged to consult the spec as a reference document and a resource
    for exploring these concepts in even greater depth, and to discover others that
    go beyond the scope of this introductory text. Here we focus on translating some
    of the fundamental features from spec into their applied use, providing examples
    of how the new persistence features can be used to accomplish your real-world
    goals of building component-based enterprise Java applications.


    Each of the major concepts in this chapter is captured in a separate, runnable
    example. The steps required to run the examples are covered at the end of the
    chapter in the section entitled “Compiling, Deploying, and Testing the JPA Entities.”
    The general structure is that we provide a stand-alone NetBeans project for each
    example and supply each with its own JPA persistence unit, entities, and Java
    test service classes. You can run and test the examples from a Java client in
    a pure Java SE environment without running Glassfish, or you can execute the servlets
    that accompany each of these projects to run the sample in a Java EE Web environment.


    **Note**


    As discussed in the previous chapter, entities may designate their persistent
    state to be defined by either their instance variables or bean property accessors.
    To improve readability in this chapter, we use the term *field* to refer generically
    to the persistent members of an entity, leaving open the detail of how the entity
    declares its persistent properties.


    ## Mapping Entity Inheritance Hierarchies


    Java has supported single class inheritance—in which a non-interface class may
    extend a single other class—since its inception. While it has been a common practice
    to exploit the code reuse and polymorphism benefits of inheritance in many areas
    of the business domain, data inheritance was not supported in the EJB persistence
    domain until the introduction of JPA. This had been a major shortcoming since,
    in the real world, data is often hierarchical; and the lack of standard, built-in
    support for inheritance of data objects has required countless workarounds and
    headaches. Leveraging the ease of use of JDK annotations, JPA delivers declarative
    support for defining and mapping entity inheritance hierarchies, including abstract
    entities and polymorphic relationships and queries.


    **Note**


    An abstract entity is an entity class that contains the `abstract` modifier and
    therefore cannot be instantiated in its own right. An abstract entity must be
    an intermediate class in an entity inheritance hierarchy; it may not itself be
    a leaf entity since it may only be instantiated through one of its subentities.
    Correspondingly, all leaf entities in an entity inheritance hierarchy must be
    concrete and therefore instantiable. An abstract entity exists to provide a common
    data structure for its subentities and to represent its subentities through polymorphic
    relationships with other entities.


    Much of the entity inheritance support in JPA is borne of the work of designers
    and tool developers who have, over the years, come up with ways to roll their
    own O/R mappings, and JPA has conveniently adopted several alternative inheritance
    mapping approaches that derive from these efforts.


    Within a given entity inheritance hierarchy, a single inheritance strategy applies
    to all entities in the hierarchy. Additionally, all entities in a hierarchy must
    use the same primary key type, regardless of the inheritance strategy. This makes
    it reasonable for the container to support polymorphic relationships, regardless
    of the mapping strategy employed for the class hierarchy.


    Also, should your database have the restriction that a table be limited to 256
    columns, note that entities are free to distribute their field mappings across
    joined rows in multiple tables.


    ### Getting Started


    All of the code snippets in this chapter exist in runnable form that you can download
    and execute directly in your local environment together with SQL scripts for creating
    the corresponding tables and other database artifacts in your local database.
    The steps for running the samples are described at the end of the chapter. Since
    these examples deal only with entities, we can leverage the pure Java SE (outside-the-container)
    support offered in JPA and skip the step of deploying these entities into a Java
    EE container. You will see that a simple Java class is sufficient to create an
    `EntityManager` that can interact with these entities and drive example tests.
    Seeing these concepts in action will help clear up questions left unanswered here,
    and the samples should also provide a useful launch pad for testing out your own
    ideas.


    ### Entity Inheritance Mapping Strategies


    JPA provides declarative support for three main implementation strategies that
    dictate how the entities in a hierarchy map to underlying tables. We will examine
    each strategy by applying it to a sample entity hierarchy and explore the strengths
    and weaknesses of each approach. This comparison is intended to help you decide
    how to map each of the entity hierarchies in your own application.'
