  trans: '

    ### 初步测试


    这第一组测试的目标是熟悉应用程序及其行为，并发现测试脚本或应用程序可能存在的任何潜在问题。由于我们正在测试两种不同的继承实现，使用哪一种进行初步测试其实无关紧要，因此我们选择使用多表继承的实现来进行初始测试。我们已经用单个用户完成了一个周期的测试运行。现在，我们可以进行无限周期的测试运行，并让它运行几分钟。然后，我们将继续测试多个并发用户在一个周期内的表现。这样做是为了确保应用程序和测试脚本能够正确处理并发。我们通常会选择
    10 个用户。之后，我们将测试 10 个用户进行无限周期的运行，持续几分钟。一旦这些测试成功完成，我们就知道测试脚本和应用程序运行正常，可以准备进行下一步了。


    我们希望选择具有代表性的用户数量，进行大约六次快速测试运行，以便清晰地展示应用程序在用户负载增加时的行为表现。


    在进行完整应用程序的性能测试时，我们通常会寻找达到或超过最大可接受响应时间时的用户上限。由于这是一项面向性能的设计测试，并且我们在测试脚本中没有使用任何思考时间，因此我们将专注于找到应用程序达到饱和点的用户数量。这个策略（如果可以称之为策略的话）就是随机选择一个用户数量。


    测试运行时间很短，因为我们不需要精确的上限值，只需要一个近似值。在这种情况下，我们选择从 100 个并发用户开始，并收集 2.5 分钟的测试运行数据。由于我们使用的采样间隔是
    5 秒，我们只需在 Grinder 控制台的“Collect samples forever”框中输入 30。输入 30 后，该框的标题将变为“Stop after
    30 samples”。为了简单起见，我们不会排除初始数据。我们通过在 Grinder 控制台的“Ignore samples”框中输入 0 来实现这一点。收集到的统计数据所呈现的值会略高于正常值。这不是问题，因为这些只是初步测试。按照最佳实践，我们在每次性能测试前都会重置数据库和
    Glassfish 服务器。


    我们开始第一次测试运行，得到的 AART（平均响应时间）为 737 毫秒。


    注意


    您可以在控制台左栏底部（以图形方式显示 TPS 的方块的左侧）找到此信息，其标题为“(mean)”。


    TTR（每秒事务数）为 137（您可以在找到 AART 的同一位置找到此信息，其标题为“TPS (mean)”）。接下来，我们将尝试使用 120 个用户。为此，我们修改`grinder.properties`文件，将`grinder.threads`属性更改为
    120。我们进行下一次运行，得到的 AART 为 911 毫秒，TTR 为 133。由于 120 个用户的 TTR 低于 100 个用户，我们知道饱和点大约在
    100 个用户或更少，因此我们的下一次测试运行将使用 80 个用户。


    在`grinder.properties`文件中更改用户数量后，我们启动测试运行。我们得到的 AART 为 593 毫秒，TTR 为 136。这些结果表明饱和点大约在
    100 个用户左右，因此我们将以此作为上限。（真是幸运的猜测，选择了 100 个用户作为初始测试点！）


    基于此信息，我们选择 40 个用户作为下限，100 个用户作为上限。测试运行将分别使用 40、60、80、100、120 和 140 个用户进行。这将为我们提供六个参考点，应该能清晰地展示应用程序的行为。


    ### 样本量


    现在我们已经选择了并发用户的上限和下限，我们需要确定测试应该运行多长时间。这相当简单。我们只需要进行一次比之前选择的 2.5 分钟更长时间的测试运行。我们对此类测试的经验表明，大约
    7 分钟通常是一个不错的选择。测试运行将使用上限，即 100 个用户进行。


    测试运行结束后，我们获取由 The Grinder 生成的数据文件，该文件包含每个模拟用户在每次测试中的个体响应时间。该文件可以在日志目录中找到，文件名以`data`开头。接下来，我们绘制一条曲线，展示测试时间段内的
    AART。本次测试运行的结果如图 9-11 所示。在这里，我们可以看到响应时间曲线在测试开始后约 60 秒趋于稳定。


    ![A311833_3_En_9_Fig11_HTML.jpg](img/A311833_3_En_9_Fig11_HTML.jpg)


    图 9-11


    样本量分析图，绘制了测试时间段内的 AART


    我们还可以看到，曲线在 60 秒后保持相当稳定，在 240 秒后则极其稳定。因此，我们决定测试运行将持续 240 秒（4 分钟——既好又短），其中我们将忽略前
    60 秒的数据。由于我们在 Grinder 控制台中将样本大小定义为 5 秒，这意味着我们将忽略 12 个样本，并收集 36 个样本。


    ### 校准


    现在我们继续确定性能测试的准确性。由于这将基于使用上限的三次测试运行来完成，我们只需要额外进行两次运行。我们可以使用前一次运行的适当数据来确定样本量。


    提示


    根据我们的经验，使用此方法的典型误差范围在 5%到 10%之间。当测试脚本中存在思考时间时，误差往往会增大。在这些情况下，发现高达 30%的数字并不罕见。


    表 9-1 和表 9-2 显示了从测试运行中收集到的 AART 和 TTR 结果的差异。


    表 9-2


    误差范围 (TTR)


    | TTR | 运行 1 | 运行 2 | 运行 3 |

    | --- | --- | --- | --- |

    | 运行 1 |   | 99.3% | 100.0% |

    | 运行 2 | 100.7% |   | 100.0% |

    | 运行 3 | 100.7% | 100.0% |   |


    表 9-1


    误差范围 (AART)


    | AART | 运行 1 | 运行 2 | 运行 3 |

    | --- | --- | --- | --- |

    | 运行 1 |   | 100.1% | 100.0% |

    | 运行 2 | 99.9% |   | 100.0% |

    | 运行 3 | 99.9% | 100.0% |   |


    这些表格中最大的差异是 100.7%（例如，TTR 表中运行 2 与运行 1 的比较）和 99.9%（例如，AART 表中运行 3 与运行 1 的比较）。因此，本次性能测试的官方误差范围为
    0.7%，这是一个非常好的数字。

    '
- fmt: "### The Actual Test Runs\n\nNow that we have completed all of the preparations,\
    \ we are ready to start running the formal tests that will give us a picture as\
    \ to which inheritance model behaves best under extremely stressful conditions.\n\
    \nThis part of the performance tests is mechanical and rather boring. The initial\
    \ step is to start the Grinder console and make sure that the parameters for our\
    \ tests are set correctly. First, we verify that the sample interval is set to\
    \ 5,000 milliseconds. Next, we check that we ignore 12 samples (of 5 seconds each,\
    \ totaling the 60 seconds that we chose earlier). Then we choose to stop collecting\
    \ data after 36 samples (of 5 seconds each, totaling the 180 seconds that we chose\
    \ earlier).\n\nThe steps to follow for each test run are as follows:\n\n1.  Reset\
    \ the database using the corresponding URL depending on the inheritance model:\n\
    \n    ```\n    http://yourserver:port/Chapter09-PerformanceJoined-war/ResetJoinedData\n\
    \    http://yourserver:port/Chapter09-PerformanceSingleTable-war/ResetSingleTableData\n\
    \    ```\n\n2.  Restart the GlassFish server.  \n3.  Edit the `grinder.properties`\
    \ file, and modify the number of users.  \n4.  Click the “Start to capture statistics”\
    \ button on the Grinder console. This will clear out all the results of the previous\
    \ run.  \n5.  Click the “Start processes” button on the Grinder console.  \n6.\
    \  Wait for the data collection to complete. A good indicator is when the line\
    \ on the center of the left panel goes from stating “Collecting samples: XX” in\
    \ green to stating “Ignoring samples: XX” in red.  \n7.  Click the “Reset processes”\
    \ button on the Grinder console. This step actually stops the execution of the\
    \ simulated users.  \n8.  Click the “Save results” button. Provide a descriptive\
    \ file name, and save the results displayed on the console for later analysis.\
    \  \n9.  Start over again at the beginning of this list.  \n\nOnce you have finished\
    \ with all of the test runs for the `JOINED` table inheritance strategy, you can\
    \ proceed to do all of the preparations for the set of test runs for the `SINGLE_TABLE`\
    \ inheritance scheme.\n\nAs explained in the earlier sections, the differences\
    \ between our two tests are O/R mapping annotations and the database schema. Once\
    \ the application is ready for the next set of test runs, just repeat the steps\
    \ you did for the previous set of test runs.\n\n### Analyzing the Results\n\n\
    We have to start by stating that the results presented in this chapter are not\
    \ meant to endorse one inheritance method over another. They are provided only\
    \ to illustrate how to apply the methodology and how to use the Grinder toolkit.\
    \ Because of this, we have gone into this performance test with no expectations\
    \ about which inheritance model will work better.\n\nWe start our analysis by\
    \ reviewing the results of the test run of the multiple-table inheritance with\
    \ 100 users. These results are shown in Table [9-3](#A311833_3_En_9_Chapter.html#Tab3).\n\
    \n**Table 9-3**  \n**Multiple-Table, 100-User Results**\n\n| 100 Users | ART |\
    \ TPS |\n| --- | --- | --- |\n| Request 1 | 1,240 | 34.1 |\n| Request 2 | 594\
    \ | 34.1 |\n| Request 3 | 549 | 34.1 |\n| Request 4 | 543 | 34.1 |\n| Total |\
    \ 732 | 136 |\n\nTwo things should quickly come to your attention. The first is\
    \ that the time required to obtain the home page of the application was long—a\
    \ little over 1 second—especially when compared to all of the other response times\
    \ in the test script. This can be explained because in setting up the main page,\
    \ although simple, it involves sending data from the server to the browser, which\
    \ in general is considered a more expensive operation than updating a shopping\
    \ cart. The next thing that should catch your eye is that the checkout process\
    \ lasts less than 1 second. While this is an ideal time for a process that verifies\
    \ inventory and that performs other actions associated with a checkout, the truth\
    \ is that there is not much of an inventory on this test system.\n\nLooking at\
    \ the results from the test run of the single-table inheritance model with 100\
    \ users (shown in Table [9-4](#A311833_3_En_9_Chapter.html#Tab4)), you can see\
    \ a similar pattern of behavior, so at least it’s consistent.\n\n**Table 9-4**\
    \  \n**Single-Table, 100-User Results**\n\n| 100 Users | ART | TPS |\n| --- |\
    \ --- | --- |\n| Request 1 | 1,320 | 33.4 |\n| Request 2 | 580 | 33.4 |\n| Request\
    \ 3 | 540 | 33.5 |\n| Request 4 | 543 | 33.6 |\n| Total | 745 | 134 |\n\nThis\
    \ part of the analysis is limited to reviewing every individual request, and it\
    \ is usually done with the results collected from the test run with the upper\
    \ limit of users. The next step is to analyze the AART and TTR for all of the\
    \ user loads that we selected. We start with the results from using the multiple-table\
    \ inheritance model, which is shown in Table [9-5](#A311833_3_En_9_Chapter.html#Tab5).\n\
    \n**Table 9-5**  \n**Multiple-Table, All-User Results**\n\n| Users | AART | TTR\
    \ |\n| --- | --- | --- |\n| 40 | 291 | 137 |\n| 60 | 438 | 137 |\n| 80 | 584 |\
    \ 137 |\n| 100 | 732 | 136 |\n| 120 | 919 | 130 |\n| 140 | 1,120 | 125 |\n\nFrom\
    \ this table, it can be seen that the saturation point is reached from the beginning\
    \ of the performance tests, which is quite unusual. This means that the inheritance\
    \ model is gobbling up all of the resources available from the beginning.\n\n\
    Let’s review the results for the single-table inheritance model so that we can\
    \ do some comparisons. They are presented in Table [9-6](#A311833_3_En_9_Chapter.html#Tab6).\n\
    \n**Table 9-6**  \n**Single-Table, All-User Results**\n\n| Users | AART | TTR\
    \ |\n| --- | --- | --- |\n| 40 | 296 | 135 |\n| 60 | 446 | 135 |\n| 80 | 592 |\
    \ 134 |\n| 100 | 745 | 134 |\n| 120 | 908 | 132 |\n| 140 | 1,120 | 125 |\n\nOnce\
    \ again, we see the same pattern of saturation from the beginning. This could\
    \ be attributed to the Derby database and memory usage. What can also be seen\
    \ is that both the Total Transactional Rate and the Aggregate Average Response\
    \ Times are slightly lower than those of the multiple-table inheritance model.\n\
    \nThis comparison can be seen more clearly in the charts presented in Figure [9-12](#A311833_3_En_9_Chapter.html#Fig12),\
    \ which contains a comparison of both sets of results for the AART; and Figure\
    \ [9-13](#A311833_3_En_9_Chapter.html#Fig13), which contains the comparison for\
    \ the TTR.\n\n![A311833_3_En_9_Fig13_HTML.jpg](A311833_3_En_9_Fig13_HTML.jpg)\n\
    \n**Figure 9-13**  \n**TTR comparison**\n\n![A311833_3_En_9_Fig12_HTML.jpg](A311833_3_En_9_Fig12_HTML.jpg)\n\
    \n**Figure 9-12**  \n**AART comparison**\n\nIn Figure [9-12](#A311833_3_En_9_Chapter.html#Fig12),\
    \ the Aggregate Average Response Times (AART) are pretty much the same, so we\
    \ will have to look carefully at the Total Transactional Rate (TTR) to try to\
    \ understand which model is more beneficial under the conditions of the performance\
    \ tests we are doing.\n\nIn Figure [9-13](#A311833_3_En_9_Chapter.html#Fig13),\
    \ not only does the single-table model reach the saturation point faster than\
    \ the multiple-table model, but the Total Transactional rate is slightly lower\
    \ than that of the multiple-table model. As you can see, the single-table model\
    \ starts degrading at 60 concurrent users, whereas the multiple-table model does\
    \ so at 80 concurrent users. The big drop, however, happens earlier for the multiple-table\
    \ model. Based on the data collected, we can conclude that the `JOINED`, or multiple-table,\
    \ inheritance model presents a slightly better performance under highly stressful\
    \ conditions."
  raw: "### The Actual Test Runs\n\nNow that we have completed all of the preparations,\
    \ we are ready to start running the formal tests that will give us a picture as\
    \ to which inheritance model behaves best under extremely stressful conditions.\n\
    \nThis part of the performance tests is mechanical and rather boring. The initial\
    \ step is to start the Grinder console and make sure that the parameters for our\
    \ tests are set correctly. First, we verify that the sample interval is set to\
    \ 5,000 milliseconds. Next, we check that we ignore 12 samples (of 5 seconds each,\
    \ totaling the 60 seconds that we chose earlier). Then we choose to stop collecting\
    \ data after 36 samples (of 5 seconds each, totaling the 180 seconds that we chose\
    \ earlier).\n\nThe steps to follow for each test run are as follows:\n\n1.  Reset\
    \ the database using the corresponding URL depending on the inheritance model:\n\
    \n    ```\n    http://yourserver:port/Chapter09-PerformanceJoined-war/ResetJoinedData\n\
    \    http://yourserver:port/Chapter09-PerformanceSingleTable-war/ResetSingleTableData\n\
    \    ```\n\n2.  Restart the GlassFish server.  \n3.  Edit the `grinder.properties`\
    \ file, and modify the number of users.  \n4.  Click the “Start to capture statistics”\
    \ button on the Grinder console. This will clear out all the results of the previous\
    \ run.  \n5.  Click the “Start processes” button on the Grinder console.  \n6.\
    \  Wait for the data collection to complete. A good indicator is when the line\
    \ on the center of the left panel goes from stating “Collecting samples: XX” in\
    \ green to stating “Ignoring samples: XX” in red.  \n7.  Click the “Reset processes”\
    \ button on the Grinder console. This step actually stops the execution of the\
    \ simulated users.  \n8.  Click the “Save results” button. Provide a descriptive\
    \ file name, and save the results displayed on the console for later analysis.\
    \  \n9.  Start over again at the beginning of this list.  \n\nOnce you have finished\
    \ with all of the test runs for the `JOINED` table inheritance strategy, you can\
    \ proceed to do all of the preparations for the set of test runs for the `SINGLE_TABLE`\
    \ inheritance scheme.\n\nAs explained in the earlier sections, the differences\
    \ between our two tests are O/R mapping annotations and the database schema. Once\
    \ the application is ready for the next set of test runs, just repeat the steps\
    \ you did for the previous set of test runs.\n\n### Analyzing the Results\n\n\
    We have to start by stating that the results presented in this chapter are not\
    \ meant to endorse one inheritance method over another. They are provided only\
    \ to illustrate how to apply the methodology and how to use the Grinder toolkit.\
