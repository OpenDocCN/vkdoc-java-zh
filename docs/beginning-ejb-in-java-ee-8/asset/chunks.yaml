    #### @Embedded 与 @Embeddable


    一个实体或映射超类可以包含标记为 `@Embedded` 的字段，这些字段的类型必须是相应标记为 `@Embeddable` 的类。与映射超类类似，可嵌入类可以为其持久化字段持有映射元数据。当以这种方式使用时，引用可嵌入对象的字段被标记为
    `@Embedded`，而可嵌入类上的字段则映射到所属实体的表。可嵌入类完全由其嵌入类所拥有，并与所属对象一起进行持久化、合并、查询和删除。可嵌入类的实例没有自己的持久化标识，也不能在实体之间传递。它们通常作为一种字段组织工具使用，方便将一组持久化字段封装为所属实体上的单个字段。


    举个例子，让我们将 `Address` 实体（清单 4-20）转换为一个可嵌入类，并将其作为 `Person` 实体（清单 4-21）上的一个字段嵌入。图
