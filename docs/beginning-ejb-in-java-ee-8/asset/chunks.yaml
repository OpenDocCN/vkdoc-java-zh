    ### Common Base Table with Joined Subclass Tables (InheritanceType.JOINED)


    In the `JOINED` strategy, each entity in the hierarchy introduces its own table,
    but only to map fields that are declared on that entity type. The root entity
    in the hierarchy maps to a root table that defines the primary key structure to
    be used by all tables in the entity hierarchy, as well as the discriminator column
    and optionally a version column. Each of the other tables in the hierarchy defines
    a primary key that matches the root table’s primary key, and they optionally add
    a foreign key constraint from their ID column(s) to the root table’s ID column(s).
    The non-root tables do not hold discriminator type or version columns. Since each
    entity instance in the hierarchy is represented by a virtual row that spans its
    own table as well as the tables for all of its superentities, it eventually joins
    with a row in the root table that captures this discriminator type and version
    information. Querying all the fields of any type requires a join across all of
    the tables within the supertype hierarchy.


    Figure [4-3](#A311833_3_En_4_Chapter.html#Fig3) illustrates the schema that maps
    our entities using the `JOINED` inheritance strategy. As in the previous example,
    we have prefixed the tables with the strategy indicator, in this case `CH04_JOIN_`,
    so that all of the tables in these examples can be loaded into a single test schema
    without danger of name collision.


    ![A311833_3_En_4_Fig3_HTML.jpg](A311833_3_En_4_Fig3_HTML.jpg)


