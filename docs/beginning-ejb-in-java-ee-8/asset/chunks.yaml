    query or a specific group of queries. In a messaging system, it might be a single
    message; and in a servlet-based application, it might be a request. Even when
    there is consensus as to exactly what is being measured, the values obtained for
    throughput can often be misinterpreted. The reason for this is that many people
    regard this metric in much the same way as they regard “miles per hour”: as a
    measurement of speed. In fact, throughput is a measure of capacity.


