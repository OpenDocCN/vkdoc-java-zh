  raw: '## Client View for Session Beans


    A session bean can be seen as a logical extension of a client program or application,
    where much of the logic and data processing for that application happens. A client
    application typically accesses the session object through the session bean’s client
    view interfaces. These are the business interfaces that were discussed in earlier
    sections.


    A client application that accesses session beans can be one of three types:


    *   Web Services : You can publish stateless session beans as web services that
    can be invoked by Web Services clients. We will discuss Web Services and clients
    in Chapter [6](#A311833_3_En_6_Chapter.html).


    Table 2-2


    Considerations for Choosing Between Local and Remote Clients


    | Remote | Local |

    | --- | --- |

    | Loose coupling between the bean and the client | Lightweight access to a component
    |

    | Location independence | Location dependence |

    | Expensive remote calls | Must be collocated with the bean |

    | Objects must be serialized | Not required |

    | Objects are passed by value | Objects are passed by reference |


    *   Remote : Remote clients run in a separate JVM from the session beans that
    they access, as shown in Figure [2-4](#A311833_3_En_2_Chapter.html#Fig4). A remote
    client accesses a session bean through the bean’s remote business interface. A
    remote client can be another EJB, a Java client program, or a Java servlet. Remote
    clients have location independence, meaning that they can use the same API as
    the clients running in the same JVM.

    *   Local : Local clients run in the same JVM, as shown in Figure [2-3](#A311833_3_En_2_Chapter.html#Fig3),
    and access the session bean through the local business interface. A local client
    can be another EJB, or a web application using Java Servlets, JavaServer Pages
    (JSP), or JavaServer Faces (JSF). Local clients are location dependent. Remote
    and local clients are compared in Table [2-2](#A311833_3_En_2_Chapter.html#Tab2).


    In some cases, the session beans need to have both local and remote business interfaces
    to support different types of client applications. A client can obtain a session
    bean’s business interface via dependency injection or JNDI lookup. Before invoking
    the methods in the session bean, the client needs to obtain a stub object of the
    bean via JNDI. Once the client has a handle to the stub object, it can call the
    business methods in the session bean. In the case of a stateless session bean,
    a new stub can be obtained on every invocation. In the case of a stateful session
    bean, the stub needs to be cached on the client side so that the container knows
    which instance of the bean to return on subsequent calls. Using dependency injection,
    we can obtain the business interface of the `SearchFacade` session bean with the
    following code:


    ```

    @EJB SearchFacade searchFacade;

    ```


    If the client accessing the session bean is remote, the client can use JNDI lookup
    once the context interface has been obtained with the right environment properties.
    Local clients can also use JNDI lookup, but dependency injection results in simpler
    code. Listing [2-24](#A311833_3_En_2_Chapter.html#Par246) shows the `SearchFacadeTest`
    client program’s code that looks up the `SearchFacade` bean, invokes the `wineSearch()`
    business method, and prints out the returned list of wines. `SearchFacadeClient`
    also looks up the `ShopperCount` singleton bean and invokes the `getShopperCount()`
    business method to print the number of shoppers logged.


    Note


    If the remote client is a Java application or command-line program, an application
    client container can be used to invoke the session beans. Application client containers
    support dependency injection for remote clients. We will discuss application client
    containers in Chapter [12](#A311833_3_En_12_Chapter.html), along with other types
    of client applications.


    ```

    package com.apress.ejb.chapter02;

    import java.io.IOException;

    import java.io.PrintWriter;

    import java.util.List;

    import javax.ejb.EJB;

    import javax.servlet.ServletException;

    import javax.servlet.annotation.WebServlet;

    import javax.servlet.http.HttpServlet;

    import javax.servlet.http.HttpServletRequest;

    import javax.servlet.http.HttpServletResponse;

    @WebServlet(name = "SearchFacadeClient", urlPatterns = {"/SearchFacadeClient"})

    public class SearchFacadeClient extends HttpServlet {

    @EJB

    SearchFacadeBean searchFacade;

    @EJB

    ShopperCountBean shopperCount;

    protected void processRequest(HttpServletRequest request, HttpServletResponse
    response)

    throws ServletException, IOException {

    response.setContentType("text/html;charset=UTF-8");

    PrintWriter out = response.getWriter();

    try {

    out.println("");

    out.println("");

    out.println("Servlet SearchFacadeClient");

    out.println("");

    out.println("");

    out.println(" Starting Search Facade test ... ");

    out.println("SearchFacade Lookup");

    out.println("Searching wines");

    List winesList = searchFacade.wineSearch("Red");

    out.println("Printing wines list");

    for (String wine:(List)winesList ){

    out.println("" + wine + "");

    }

    System.out.println("Printing Shopper Count after incrementing it ...");

    shopperCount.incrementShopperCount();

    out.println("" + shopperCount.getShopperCount() + "");

    out.println("");

    out.println("");

    } finally {

    out.close();

    }

    }

    @Override

    protected void doGet(HttpServletRequest request, HttpServletResponse response)

    throws ServletException, IOException {

    processRequest(request, response);

    }

    @Override

    protected void doPost(HttpServletRequest request, HttpServletResponse response)

    throws ServletException, IOException {

    processRequest(request, response);

    }

    @Override

    public String getServletInfo() {

    return "Short description";

    }

    }

    Listing 2-24

    SearchFacadeClient.java

    ```


