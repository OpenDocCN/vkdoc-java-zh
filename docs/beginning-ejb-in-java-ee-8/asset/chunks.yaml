    address.setCity(city);\naddress.setZipCode(zipCode);\ncustomer.setDefaultBillingAddress(address);\n\
    customer.setCcNum(ccnum);\ncustomer.setCcExpDate(ccexpDate);\nif (customerFacade\
    \ != null) {\ncustomerFacade.registerCustomer(customer);\n}\nreturn \"success\"\
    ;\n}\n}\n```\n**Listing 12-5** `NewCustomer.java`\n\n**Note** Chapter [7](#A311833_3_En_7_Chapter.html)\
    \ provides the details on all the EJBs and business methods available for the\
    \ clients.\n\nNow we need to update the `faces-config.xml` file shown in Listing\
