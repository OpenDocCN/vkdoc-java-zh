  trans: "\n### 通知页面\n\n我们快完成了！我们将添加最后一个 JSF 页面 `processOrder.jsp`，它会向用户显示订单提交消息，并提供一个返回主页的链接。清单\
    \ 12-24 展示了 `processOrder.jsp` 的代码。如你所见，该页面相当静态——它输出通知文本，并使用 `h:commandLink` 组件将用户引导回\
    \ `winehome.jsp` 页面，该页面显示搜索葡萄酒、查看购物车内容等选项的列表。\n\n```\n\n处理订单页面\n\nBeginning EJB:\
    \ Wine Store Application \n您的订单已提交，您将收到一封包含订单 ID 和详细信息的电子邮件。\n\n清单 12-24\nprocessOrder.jsp\n\
    ```\n\n图 12-26（位于“编译、部署和测试 JSF 应用程序”部分）展示了 `processOrder.jsp` 页面在浏览器中的渲染效果。\n\n\
    为了完成整个流程，我们将在 `faces-config.xml` 中添加最后一个导航规则，如清单 12-25 所示。\n\n```\n/processOrder.jsp\n\
    \nwinehome2\n/winehome.jsp\n\n清单 12-25\nfaces-config.xml，包含 processOrder 导航规则\n\
    ```\n\n至此，我们完成了 JSF 应用程序，其控制流如图 12-12 所示。现在，我们将部署并执行这个完整的应用程序，并逐步浏览我们开发的、用于访问\
    \ EJB 后端应用程序的各个屏幕。\n\n## 编译、部署和测试 JSF 应用程序\n\nJSF 应用程序需要先打包成 Web 归档 (WAR) 文件，然后才能组装成企业归档\
    \ (EAR) 文件，后者包含应用程序所需的所有模块和库。大多数应用服务器都提供部署工具或 Ant 任务，以便于将 EJB 部署到其容器中。像 JDeveloper、NetBeans\
    \ 和 Eclipse 这样的 Java 集成开发环境 (IDE) 也提供了部署功能，允许开发者打包、组装并将应用程序部署到应用服务器。\n\n关于打包、组装和部署的详细内容，请参见第\
    \ 11 章。在本章中，我们开发了一个 JSF 应用程序，用于访问在第 7 章中构建的后端应用程序。我们将执行以下步骤来部署和测试该 JSF 应用程序。\n\
    \n### 前提条件\n\n在执行后续章节详述的步骤之前，请先完成第 1 章的“入门”部分，该部分将引导您完成本章示例所需的安装和环境设置。由于我们的 JSF\
    \ 应用程序是基于第 7 章的工作构建的，因此您需要确保已完成以下步骤：\n\n*   您必须已创建第 7 章“创建数据源、JMS 资源和邮件资源”部分中详述的资源。\n\
    *   您必须已按照第 7 章“部署应用程序”部分中的说明成功部署了应用程序。\n\n注意\n\n第 7 章的示例代码依赖于第 6 章。因此，在继续之前，请确保您已完成第\
    \ 6 章和第 7 章。如果在执行示例代码时遇到任何问题，请参考示例代码附带的 `Readme.txt` 文件。\n\n### 编译 JSF 应用程序\n\n\
    将 `Chapter12-JSFClientSamples` 目录及其内容复制到您选择的目录中。由于本章的示例代码引用了第 6 章的工件，请确保 `Chapter06-WebServiceSamples`\
    \ 目录与 `Chapter12-JSFClientSamples` 目录位于同一层级。运行 NetBeans IDE，并使用 `文件 ➤ 打开项目` 菜单打开\
    \ `Chapter12-JSFClientSamples` 文件，如图 12-13 所示。\n\n![A311833_3_En_12_Fig13_HTML.jpg](img/A311833_3_En_12_Fig13_HTML.jpg)\n\
    \n图 12-13\n\n打开 Chapter12-JSFClientSamples 文件 注意\n\n在 NetBeans 中打开 `Chapter12-JSFClientSamples`\
    \ 文件之前，请确保已从 NetBeans IDE 中关闭 `Chapter07-ServiceIntegration` 项目和 `Chapter06-WebServiceSamples`。第\
    \ 12 章的示例代码构建在第 6 章和第 7 章的基础上，如果在 NetBeans 中同时打开这些项目，将会导致编译错误。当打开 `Chapter12-JSFClientSamples`\
    \ 时，NetBeans 会自动打开所需的项目。\n\n展开 `Chapter12-JSFClientSamples-war` 节点，观察本章讨论的所有 JSF\
    \ 文件和托管 Bean 是否都已列出，如图 12-14 所示。\n\n![A311833_3_En_12_Fig14_HTML.jpg](img/A311833_3_En_12_Fig14_HTML.jpg)\n\
    \n图 12-14\n\n验证 Chapter12-JSFClientSamples-war 项目中的包\n\n在 `Chapter07-ServiceIntegration`\
    \ 节点上调用上下文菜单，并通过选择 `清理并构建` 菜单选项来构建应用程序，如图 12-15 所示。JSF 页面及其托管 Bean 将无错误地编译。\n\n\
    ![A311833_3_En_12_Fig15_HTML.jpg](img/A311833_3_En_12_Fig15_HTML.jpg)\n\n图 12-15\n\
    \n构建项目\n"
- fmt: '### Deploying and Running the Wine Store Application


    Once the JSF pages and managed beans are successfully compiled, we need to set
    the run target that we wish to execute. To set the run target, invoke the context
    menu on `Chapter07-ServiceIntegration` node, and select the `Properties` menu
    option. As shown in Figure [12-16](#A311833_3_En_12_Chapter.html#Fig16), select
    the `Run` category, enter the run target as `faces/login.jsp` in `Relative URL`
    text field, and click OK.


    ![A311833_3_En_12_Fig16_HTML.jpg](A311833_3_En_12_Fig16_HTML.jpg)


    Figure 12-16: Setting the run target


    Now you are ready to run the wine store application with the JSF user interface.
    To run the application, invoke the context menu on `Chapter07-ServiceIntegration`
    node and select the `Run` menu option, as shown in Figure [12-17](#A311833_3_En_12_Chapter.html#Fig17).
    Running the application will deploy the application on the integrated GlassFish
    application server and launch the wine store application in your default browser.


    ![A311833_3_En_12_Fig17_HTML.jpg](A311833_3_En_12_Fig17_HTML.jpg)


    Figure 12-17: Running the wine store application


    Upon startup, the login page rendered as shown in Figure [12-18](#A311833_3_En_12_Chapter.html#Fig18).


    ![A311833_3_En_12_Fig18_HTML.jpg](A311833_3_En_12_Fig18_HTML.jpg)


    Figure 12-18: The wine store application login page


    Note: As the aim of this sample application is solely to learn the technology,
    its code does not have the required data validations entry that you would normally
    find in enterprise applications. Thus, make sure you enter valid values for the
    given text fields.


    Enter your e-mail in the “Enter Email address” text field, and click the “Login”
    button. Since you haven’t registered as a customer yet, and your e-mail does not
    exist in the customer database, you will be redirected to the customer registration
    page, as shown in Figure [12-19](#A311833_3_En_12_Chapter.html#Fig19). Enter the
    relevant values in the input fields as shown, and click the “Submit” button.


    ![A311833_3_En_12_Fig19_HTML.jpg](A311833_3_En_12_Fig19_HTML.jpg)


    Figure 12-19: The customer registration page


    Upon successful registration, you will be routed back to the login page. On the
    login page, enter the e-mail address that you have used in the registration process
    and click the “Login” button, as shown in Figure [12-20](#A311833_3_En_12_Chapter.html#Fig20).


    ![A311833_3_En_12_Fig20_HTML.jpg](A311833_3_En_12_Fig20_HTML.jpg)


    Figure 12-20: The wine store application login page


    After the e-mail address is validated, you will be routed to the wine store home
    page that will show you a list of options, as shown in Figure [12-21](#A311833_3_En_12_Chapter.html#Fig21).


    ![A311833_3_En_12_Fig21_HTML.jpg](A311833_3_En_12_Fig21_HTML.jpg)


    Figure 12-21: The wine store home page


    We will walk you through the search use case. Click the link that reads, “Search
    by year, country, or varietal.” You will be routed to the search page, as shown
    in Figure [12-22](#A311833_3_En_12_Chapter.html#Fig22).


    ![A311833_3_En_12_Fig22_HTML.jpg](A311833_3_En_12_Fig22_HTML.jpg)


    Figure 12-22: The search page


    Select “Zinfandel” as the varietal, and click the “Go” button. Figure [12-23](#A311833_3_En_12_Chapter.html#Fig23)
    shows the list of wines that satisfy the search criteria.


    ![A311833_3_En_12_Fig23_HTML.jpg](A311833_3_En_12_Fig23_HTML.jpg)


    Figure 12-23: The wine list page


    In the wine list page, click the “Add to Cart” button for the wine that you wish
    to add to the shopping cart. This will bring you to the JSF page, as shown in
    Figure [12-24](#A311833_3_En_12_Chapter.html#Fig24), which shows the details of
    the wines and a text box for entering the quantity.


    ![A311833_3_En_12_Fig24_HTML.jpg](A311833_3_En_12_Fig24_HTML.jpg)


    Figure 12-24: The wine details page


    Enter “10” for quantity, and click the “Add to cart” button. You will be routed
    to the shopping cart page. At this stage, you can either submit your order by
    pressing the “Submit Order” button or use your browser’s back button to go to
    the page that lists the wines and add more wines to your shopping cart. As shown
    in Figure [12-25](#A311833_3_En_12_Chapter.html#Fig25), the shopping cart page
    shows all of the items in the shopping cart.


    ![A311833_3_En_12_Fig25_HTML.jpg](A311833_3_En_12_Fig25_HTML.jpg)


    Figure 12-25: The shopping cart page


    The shopping cart page provides a “Submit Order” button for submitting the order.
    Click this button, and the order will be processed by the EJB back-end application.
    You will then be shown a notification page, as shown in Figure [12-26](#A311833_3_En_12_Chapter.html#Fig26).


    ![A311833_3_En_12_Fig26_HTML.jpg](A311833_3_En_12_Fig26_HTML.jpg)


    Figure 12-26: The notification page


    Once the order has been processed, you will receive an e-mail notification, as
    shown in Figure [12-27](#A311833_3_En_12_Chapter.html#Fig27).


    ![A311833_3_En_12_Fig27_HTML.jpg](A311833_3_En_12_Fig27_HTML.jpg)


    Figure 12-27: The notification e-mail


    ## The Application Client Container


    We have mentioned and used the application client container in earlier chapters,
    and we have shown a couple of application architectures in Figure [12-4](#A311833_3_En_12_Chapter.html#Fig4)
    and Figure [12-5](#A311833_3_En_12_Chapter.html#Fig5). Application clients or
    client programs that are developed using technologies like Java Swing can be run
    in stand-alone Java SE environments. Application client containers provide additional
    system services (such as security and deployment) that client programs can use
    during execution.


    An application client can leverage authentication services provided by the application
    client container for authenticating its users. The container’s service may be
    integrated with the native platform’s authentication system to provide single
    sign-on capability to the enterprise users.


    Client programs using an application client container can invoke EJBs. Similar
    to other Java EE components, programs running in a client container can use the
    Java Naming and Directory Interface (JNDI) to look up EJBs or resources like Java
    Message Service (JMS) and JavaMail. Application client containers also provide
    injection facilities to client programs. Since application client containers do
    not create instances of an application client, static fields and methods should
    be used for injecting any resources.


    Application clients are packaged into JAR files. If an application client container
    is used to run the client programs, then you will have to bundle or package the
    application client container along with the application so that you can run it
    on individual desktop machines.'
