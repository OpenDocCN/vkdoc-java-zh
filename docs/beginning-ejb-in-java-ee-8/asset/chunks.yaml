  trans: "\n### 搜索页面\n\n清单 12-10 展示了 `searchwines.jsp` JSF 页面的代码。该页面允许用户按年份、国家或葡萄品种搜索葡萄酒。我们使用了\
    \ `h:selectOneListBox` 组件，这些组件通过每个搜索条件的静态值列表进行填充。从列表框中选择的值会通过 `h:selectOneListBox`\
    \ 组件的 `value` 属性中指定的值绑定表达式，存储在 `SearchWines` 托管 Bean 的属性中。我们还提供了三个提交按钮，其 `action`\
    \ 属性包含方法绑定表达式，例如 `#{WineList.searchByYear}`，用于触发 `WineList` 托管 Bean 中的方法，该方法将从\
    \ EJB 后端应用程序中检索结果。\n\n```\n\nSearch Wines Page\n\nBeginning EJB: Wine Store Application\
    \ \nSearch Wines\n\nListing 12-10\nsearchwines.jsp\n```\n\n图 12-22（位于“编译、部署和测试\
    \ JSF 应用程序”部分）展示了在浏览器中渲染后的 `searchwines.jsp` 页面。\n\n下一步是向 `WineList` 托管 Bean 添加新方法，并定义一个名为\
    \ `SearchWines` 的新托管 Bean。清单 12-11 展示了 `SearchWines` 托管 Bean，它包含三个属性（`year`、`varietal`\
    \ 和 `country`）及其访问器。用户在 `searchwines.jsp` 页面中选择的值存储在这些属性中，`WineList` 托管 Bean 可以检索这些值。\n\
    \n```\npackage com.apress.ejb.chapter12.view.managed;\npublic class SearchWines\n\
    {\npublic SearchWines() {\n}\npublic String year;\npublic String varietal;\npublic\
    \ String country;\npublic void setYear(String year) {\nthis.year = year;\n}\n\
    public String getYear() {\nreturn year;\n}\npublic void setVarietal(String varietal)\
    \ {\nthis.varietal = varietal;\n}\npublic String getVarietal() {\nreturn varietal;\n\
    }\npublic void setCountry(String country) {\nthis.country = country;\n}\npublic\
    \ String getCountry() {\nreturn country;\n}\n}\nListing 12-11\nSearchWines.java\n\
    ```\n\n我们需要为之前创建的 `WineList` 托管 Bean（参见清单 12-8）添加新功能，即增加三个方法，这些方法绑定在 `searchwines.jsp`\
    \ JSF 页面的方法绑定表达式中。清单 12-12 展示了这三个方法：`searchByYear()`、`searchByCountry()` 和 `searchByVarietal()`。每个方法都需要从\
    \ `SearchWines` 托管 Bean 中获取属性值。JSF 通过 `FacesContext` 对象提供对请求数据和其他对象数据的访问。一旦我们获得了\
    \ `FacesContext` 的引用，就可以访问应用程序和托管 Bean。所有方法都使用相同的技术：从 `FacesContext` 获取 `Application`，然后调用带有值绑定表达式的\
    \ `createValueBinding()` 方法，以从 `SearchWines` 托管 Bean 中检索相关属性的值。从 `SearchWines`\
    \ 检索到属性值后，该方法通过传入与搜索条件匹配的参数，调用 `SearchFacade` EJB 中的业务方法，以检索葡萄酒列表。检索到的葡萄酒列表存储在\
    \ `winesList` 属性中，该属性的类型为 `java.util.List`。\n\n```\npublic String searchByCountry()\
    \ {\nFacesContext ctx = FacesContext.getCurrentInstance();\nApplication app =\
    \ ctx.getApplication();\nValueBinding wineyear = app.createValueBinding(\"#{SearchWines.country}\"\
    );\nString country = wineyear.getValue(ctx).toString();\nif (searchFacade == null)\
    \ {\nreturn \"gohome\";\n}\nelse {\nwinesList = searchFacade.getWineFindByCountry(country);\n\
    return \"success\";\n}\n}\npublic String searchByVarietal() {\nFacesContext ctx\
    \ = FacesContext.getCurrentInstance();\nApplication app = ctx.getApplication();\n\
    ValueBinding wineyear = app.createValueBinding(\"#{SearchWines.varietal}\");\n\
    String varietal = wineyear.getValue(ctx).toString();\nif (searchFacade == null)\
    \ {\nreturn \"gohome\";\n}\nelse {\nwinesList = searchFacade.getWineFindByVarietal(varietal);\n\
    return \"success\";\n}\n}\npublic String searchByYear() {\nFacesContext ctx =\
    \ FacesContext.getCurrentInstance();\nApplication app = ctx.getApplication();\n\
    ValueBinding wineyear = app.createValueBinding(\"#{SearchWines.year}\");\nString\
    \ year = wineyear.getValue(ctx).toString();\nif (searchFacade == null) {\nreturn\
    \ \"gohome\";\n}\nelse {\nwinesList = searchFacade.getWineFindByYear(new Integer(year));\n\
    return \"success\";\n}\n}\nListing 12-12\nWineList.java, with Search Methods\n\
    ```\n\n所有方法都返回一个 `success` 值，该值将用作导航规则。我们需要将此导航规则添加到 `faces-config.xml` 中，并将 `SearchWines`\
    \ 注册为托管 Bean。清单 12-13 展示了需要添加到 `faces-config.xml` 中的 XML 片段。方法返回的 `success` 值会将用户导航到\
    \ `wineList.jsp`，该页面将显示葡萄酒列表。请注意，我们将 `SearchWines` 托管 Bean 的作用域设置为 `session`，因为我们也会从其他托管\
    \ Bean 访问其属性。\n\n```\n/searchwines.jsp\n\ngohome\n/winehome.jsp\n\nsuccess\n/wineList.jsp\n\
    \nSearchWines\ncom.apress.ejb.chapter12.view.managed.SearchWines\nsession\n\n\
    Listing 12-13\nfaces-config.xml, with the SearchWines Managed Bean\n```\n\n到目前为止，我们已经完成了以下任务：\n\
    \n*   创建登录页面\n*   创建注册页面\n*   创建包含选项列表的主页\n*   创建搜索页面\n\n接下来，我们将致力于在 `wineList.jsp`\
    \ 页面中向用户展示葡萄酒列表。\n"
- fmt: '### The Wine List Page


    Listing [12-14](#A311833_3_En_12_Chapter.html#Par192) shows the code for the `wineList.jsp`
    JSF page. In this page, we are using a new UI component called `h:dataTable`.
    This component allows collections of data to be rendered from managed bean properties
    that are of type `java.util.List`. In the previous sections, we have been storing
    the retrieved wines in the `winesList` property. The `#{WinesList.winesList}`
    expression is used for the `value` attribute of `h:dataTable` to display the list
    of wines in the table format. Once the list of wines is displayed to the user,
    the user can select one of the wines displayed in the data table component so
    that the user can see the details of the wine in a different page and add it to
    the shopping cart if the user wants to buy it. In order to keep track of the selected
    wine in the data table component, we have added the binding attribute to `h:dataTable`.
    One last thing we need to do is to provide a hyperlink for each row in the data
    table that the user can click to select the wine. To achieve this, we will wrap
    the column displaying the wine ID with the `h:commandLink` component. The value
    of the `h:commandLink action` attribute is set to the `#{WinesList.invokeAddToCart}`
    expression, which means that we need to extend the `WinesList` managed bean with
    a new method: `invokeAddToCart()`.


    ```

    Wine List Page


    Beginning EJB: Wine Store Application


    Listing 12-14

    wineList.jsp

    ```


    Figure [12-23](#A311833_3_En_12_Chapter.html#Fig23) (in the “Compiling, Deploying,
    and Testing the JSF Application” section) shows the `wineList.jsp` page rendered
    in the browser.


    Listing [12-15](#A311833_3_En_12_Chapter.html#Par195) shows the new code that
    we need to add to the `WinesList` managed bean. We will add a new property, `dataTable1`,
    with respective accessor methods and a brand new method, `invokeAddToCart()`.
    The new `dataTable1` property is used to set the value of the binding attribute
    in the `h:dataTable1` component in `wineList.jsp`, as shown in Listing [12-14](#A311833_3_En_12_Chapter.html#Par192).
    In the `invokeAddToCart()` method, we are retrieving the selected row using the
    `getRowData()` method of the `dataTable1` property and setting it as the value
    of the `selectedWine` property in a new managed bean: `JSFShoppingCart`. We have
    used the technique of getting the application from `FacesContext` and setting
    the value of the property, instead of retrieving the value as we did in the earlier
    use case. The `invokeAddToCart()` method returns `addtocart` on successful execution
