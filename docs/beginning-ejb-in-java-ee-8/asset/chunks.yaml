    # 1. EJB 3.2 架构与 CDI 服务简介


    当我们着手撰写本书时，我们的目标是向开发者介绍企业级 JavaBean（EJB），并密切关注这项技术如何在日常的真实世界应用中使用。JSR-345：Enterprise
    JavaBeans™，3.2 版 EJB 核心合约与需求是一份深度的规范，它同时满足了初级开发者和硬核高级用户的需求。这是一个需要满足的庞大受众群体，而作为参考指南，EJB
    规范文档很好地覆盖了这一点。在撰写一本关于如何使用 EJB 的书籍时，我们必须缩小我们的受众范围；尽管如此，我们相信我们写出了一本能够满足大多数 Java
    EE 开发者需求的书籍。


    本书的目标读者是那些有 Java 经验、使用过早期版本的 EJB 或其他技术构建过单层或多层应用，并且准备好迎接使用基于标准的技术构建企业级应用的挑战（和回报）的开发者。考虑到总共
    1100 页的参考材料（涵盖 EJB 和 Java 持久化 API（JPA）规范）可能令人望而生畏，我们为开发者提供了一个入门通道，逐步展开 EJB 的各个部分，并为你提供所需的信息和代码示例，让你能够卷起袖子开始工作。


    随着每一章的展开，你不仅会学习到规范的一个新领域，还会通过具体的示例学习如何将其应用到自己的应用程序中。许多这些示例直接来自第 7 章和第 12 章中构建的综合性、端到端的
    Java EE 企业级葡萄酒在线应用程序，这样你就能看到它们如何融入更大的图景。我们鼓励你获取这些示例并加以实践。在你喜欢的 IDE 或开发环境中尝试它们，修改它们并尝试新事物。本书涵盖的
    EJB 及相关 API——JPA、Web 服务以及上下文和依赖注入（CDI）——为你提供了大量的工作基础。一旦你熟悉了构建、部署和测试的基础知识，你会发现
    EJB 组件不仅功能强大，而且易于构建和使用。


    本书的作者们共同使用 EJB 与 Java EE 技术栈中的其他技术构建了许多应用程序，我们试图在书中收录关于我们学到的实用模式、我们发现成功的策略以及你可以避免的一些陷阱的建议。本书的大部分章节致力于探索
    EJB 的特定领域，但我们还包含了关于 Java 持久化 API（JPA）、上下文和依赖注入（CDI）、Web 服务、评估你的 EJB 应用程序性能以及部署到你选择的
    Java EE 应用服务器的章节。本章末尾的“入门”部分将帮助你设置好环境，以运行本书每章末尾提供的许多有用的示例应用程序。


    我们希望本书不仅能作为 EJB 信息的参考指南，还能作为一本操作指南和实用示例的宝库，在你构建自己的应用程序时可以随时参考。祝阅读愉快！


    ## Java 企业版（Java EE）8 架构的新特性是什么？


    Java 企业版（Java EE）平台的第一个版本发布于 2013 年 6 月，而在我更新这份手稿时，Java EE 9 已经发布了。


    Java EE 8 包含了对核心 API 的更新，例如 Servlet 4.0 和上下文与依赖注入 2.0，以及两个新的 API——用于 JSON 绑定的
    Java API（JSR 367）和 Java EE 安全 API（JSR 375）。


    Java EE 是 Java SE 平台的超集，包含超过 30 个规范和一个运行时环境，这意味着 Java EE 组件可以充分利用所有 Java SE API。


    以下是 Java EE 8 中最重要的变更列表：


    *   Java EE 8 平台

    *   JSON-B 1.0

    *   JSON-P 1.1

    *   JAX-RS 2.1

    *   MVC 1.0

    *   Java Servlet 4.0

    *   JSF 2.3

    *   JMS 2.1

    *   CDI 2.0

    *   Java EE 安全 1.0

    *   Java EE 管理 2.0

    *   并发工具

    *   连接器架构

    *   WebSocket

    *   JPA

    *   EJB

    *   JTA

    *   JCache

    *   JavaMail


    关于 Java EE 8 的更多信息可以在官方 Java 网页上找到：[`http://www.oracle.com/technetwork/java/javaee/overview/index.html`](http://www.oracle.com/technetwork/java/javaee/overview/index.html)


    ## EJB 简介


    在 20 世纪 90 年代末，随着 Java 因应对大规模应用企业需求的独立技术（如 RMI、JTA 和 CORBA）的出现而得到加强，对一种能够统一这些技术并将其纳入标准组件开发模型的业务组件框架的需求应运而生。EJB
    应运而生以满足这一需求。在随后的几年里，EJB 不断发展，包含了众多特性（同时明智地拒绝了其他特性），并已成熟为一个健壮且标准的框架，用于在分布式、多用户环境中部署和执行业务组件。


    ### 什么是 EJB？


    EJB 的每个版本都通过 Java 社区流程（JCP）作为 Java 规范请求（JSR）进行管理。本书涵盖的最新版本由 JSR 345：Enterprise
    JavaBeans™ 3.2 定义。在 EJB 3.0 之前的 EJB JSR 涵盖了持久化组件，但自从引入 JPA 以来，持久化现在通过其自己的 JSR
    进行管理。尽管如此，这两个领域相辅相成，我们在本书中包含了几个主要致力于 JPA 的章节。


    EJB 3.2 规范，标题为 JSR 345：Enterprise JavaBeans™，3.2 版 EJB 核心合约与需求，连同 EJB 3.2 API
    中定义的类库，共同定义了一个组件模型和一个容器框架。


    #### EJB 组件模型


    作为一个组件模型，EJB 定义了三种对象类型，开发者可以按如下方式构建和定制：


    *   会话 Bean 可以是无状态的、有状态的或单例的，它们执行业务服务操作。这些服务可以声明式地配置为在分布式、事务性和访问控制上下文中运行。

    *   消息驱动 Bean（MDB）通过与消息队列或主题关联，响应外部事件而被异步调用。


    与此相辅相成的是，Java 持久化 API（JPA）主要定义了以下持久化对象类型：


    *   实体是具有唯一标识并代表持久化业务数据的对象。


    会话 Bean 和消息驱动 Bean 是 EJB，它们通常被统称为企业 Bean。在早期版本的 EJB 中，实体被称为实体 Bean，它们也属于这一类别。然而，在
    EJB 3 中，实体现在由持久化提供者管理，而不是 EJB 容器，并且它们不再被视为企业 Bean。增强的消息驱动 Bean 合约使用一个无方法的消息监听器接口，将所有公共方法暴露为消息监听器方法。

