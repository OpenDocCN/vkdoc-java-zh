    \    assertNotNull(\"customerOrder2.getId() is null\", customerOrder2.getId());\n\
    }\n```\n\nThis high-level test covers some ground and also exercises a real-world\
    \ process. It is designed to sniff out any breakages across a relatively large\
    \ swath of code, and it complements other tests that are designed to pinpoint\
    \ very specific areas of the code should changes to the app cause these tests\
    \ to start to fail.\n\nHaving examined our JUnit test code in detail, you can\
    \ now follow the steps outlined in the next section to build and run these tests\
    \ in NetBeans using JUnit with the Embedded EJB Container.\n\n## Building and\
    \ Testing the Sample Code\n\nNow that we’ve examined how JUnit tests can be written\
    \ to execute EJB unit tests against an Embeddable EJB Container, let’s execute\
    \ the test cases we just covered from within NetBeans.\n\n### Prerequisites\n\n\
    Before performing any of the steps detailed in the next sections, complete the\
    \ “Getting Started” section of Chapter [1](#A311833_3_En_1_Chapter.html). This\
    \ section will walk you through the installation and environment setup required\
    \ for the samples in this chapter.\n\n### Opening the Sample Application\n\nThis\
    \ chapter’s root project holds a dependency on the JPA persistence unit defined\
    \ in `Chapter07-ServiceIntegration-jpa`. Launch the NetBeans IDE, and open the\
    \ `Chapter13-EmbeddableEJBTests` project using the `File ➤ Open Project` menu.\
    \ Make sure that the `'Open Required Projects'` check box is checked as shown\
    \ in Figure [13-1](#A311833_3_En_13_Chapter.html#Fig1).\n\n![A311833_3_En_13_Fig1_HTML.jpg](A311833_3_En_13_Fig1_HTML.jpg)\n\
    \n**Figure 13-1** Opening the `Chapter13-EmbeddableEJBTests` project\n\nThis project\
    \ is a stand-alone EJB project, a departure from the other Java EE Application\
    \ projects that we have used for the other chapters. The project consists of a\
    \ handful of EJBs to be tested, under the `Source Packages` folder; a `persistence.xml`\
    \ file defining the persistence units used by the EJBs, in the `Configuration\
    \ Files` folder; and our JUnit test class in the `Test Packages` folder. The structure\
    \ is shown in Figure [13-2](#A311833_3_En_13_Chapter.html#Fig2).\n\n![A311833_3_En_13_Fig2_HTML.jpg](A311833_3_En_13_Fig2_HTML.jpg)\n\
    \n**Figure 13-2** Observing the structure of the `Chapter13-EmbeddableEJBTests`\
    \ project\n\n### Compiling the Sources\n\nInvoke the context menu on the `Chapter13-EmbeddableEJBTests`\
    \ node, and build the application by selecting the `Clean and Build` menu option,\
    \ as shown in Figure [13-3](#A311833_3_En_13_Chapter.html#Fig3).\n\n![A311833_3_En_13_Fig3_HTML.jpg](A311833_3_En_13_Fig3_HTML.jpg)\n\
    \n**Figure 13-3** Building the application\n\n### Running the JUnit Tests\n\n\
    There are several ways to launch JUnit tests from NetBeans, but for these tests,\
    \ you will right-click on the `WineAppServiceTest` class and choose “`Test File`,”\
    \ as shown in Figure [13-4](#A311833_3_En_13_Chapter.html#Fig4).\n\n![A311833_3_En_13_Fig4_HTML.jpg](A311833_3_En_13_Fig4_HTML.jpg)\n\
    \n**Figure 13-4** Launching the JUnit Tester to execute the unit tests in `WineAppServiceTest.java`\n\
    \nThis step instantiates the Embeddable EJB Container, initializes the database,\
    \ and executes the three unit tests in our class. The results of the test will\
    \ appear in the `Test Results` tab.\n\nAs you will see, the second and third tests\
    \ fail due to assertion failures. So let’s diagnose these problems.\n\n### Fixing\
    \ the Test Cases\n\nOur first failure occurs in the second unit test – `testCreateIndividual()`\
    \ – with the message `shippingAddress.getId()` is `null`. Interestingly, the prior\
    \ assertion check in that unit test—checking the `id` field on the `shippingAddress`\
    \ property currently known to our `customer`—succeeded. You might be forgiven\
    \ for thinking that these asserts should be checking the same object—the object\
    \ that was originally assigned to the `customer` using `setDefaultShippingAddress()`—because,\
    \ although we performed a `merge()` on `customer`, `shippingAddress` is a new\
    \ instance and so logically it was persisted and not merged. Since the `persist()`\
    \ operation transforms the object into a managed instance in-place, without creating\
    \ a new managed object the way that `merge()` does, shouldn’t our original `shippingAddress`\
    \ instance now just be the original instance but in a managed state?\n\n#### Cascading\
    \ MERGE Operations\n\nThe answer is that a cascade `MERGE` performs a `merge()`\
    \ of new instances as well as of detached and managed ones; new instances in this\
    \ case are not persisted through a call to `persist()`. Thus our original `shippingAddress`\
    \ reference is now stale, and the `customer` holds a reference to the new managed\
    \ copy of `shippingAddress`. This is an important “gotcha” when persisting and\
    \ merging entities that cascade `MERGE` operations to objects they reference.\
    \ A `merge()` is performed on both new and existing objects that are found during\
    \ a cascading `MERGE` operation. Whereas `persist()` transforms the original instance\
    \ into a managed copy and places it in the persistence context, `merge()` creates\
