    | Request 3 | 549 | 34.1 |\n| Request 4 | 543 | 34.1 |\n| Total | 732 | 136 |\n\
    \nTwo things should quickly come to your attention. The first is that the time\
    \ required to obtain the home page of the application was long—a little over 1\
    \ second—especially when compared to all of the other response times in the test\
    \ script. This can be explained because in setting up the main page, although\
    \ simple, it involves sending data from the server to the browser, which in general\
    \ is considered a more expensive operation than updating a shopping cart. The\
    \ next thing that should catch your eye is that the checkout process lasts less\
    \ than 1 second. While this is an ideal time for a process that verifies inventory\
    \ and that performs other actions associated with a checkout, the truth is that\
    \ there is not much of an inventory on this test system.\n\nLooking at the results\
    \ from the test run of the single-table inheritance model with 100 users (shown\
    \ in Table [9-4](#A311833_3_En_9_Chapter.html#Tab4)), you can see a similar pattern\
    \ of behavior, so at least it’s consistent.\n\nTable 9-4\n\nSingle-Table, 100-User\
    \ Results\n\n| 100 Users | ART | TPS |\n| --- | --- | --- |\n| Request 1 | 1,320\
    \ | 33.4 |\n| Request 2 | 580 | 33.4 |\n| Request 3 | 540 | 33.5 |\n| Request\
    \ 4 | 543 | 33.6 |\n| Total | 745 | 134 |\n\nThis part of the analysis is limited\
    \ to reviewing every individual request, and it is usually done with the results\
    \ collected from the test run with the upper limit of users. The next step is\
    \ to analyze the AART and TTR for all of the user loads that we selected. We start\
    \ with the results from using the multiple-table inheritance model, which is shown\
    \ in Table [9-5](#A311833_3_En_9_Chapter.html#Tab5).\n\nTable 9-5\n\nMultiple-Table,\
    \ All-User Results\n\n| Users | AART | TTR |\n| --- | --- | --- |\n| 40 | 291\
    \ | 137 |\n| 60 | 438 | 137 |\n| 80 | 584 | 137 |\n| 100 | 732 | 136 |\n| 120\
    \ | 919 | 130 |\n| 140 | 1,120 | 125 |\n\nFrom this table, it can be seen that\
    \ the saturation point is reached from the beginning of the performance tests,\
    \ which is quite unusual. This means that the inheritance model is gobbling up\
    \ all of the resources available from the beginning.\n\nLet’s review the results\
    \ for the single-table inheritance model so that we can do some comparisons. They\
    \ are presented in Table [9-6](#A311833_3_En_9_Chapter.html#Tab6).\n\nTable 9-6\n\
    \nSingle-Table, All-User Results\n\n| Users | AART | TTR |\n| --- | --- | ---\
    \ |\n| 40 | 296 | 135 |\n| 60 | 446 | 135 |\n| 80 | 592 | 134 |\n| 100 | 745 |\
    \ 134 |\n| 120 | 908 | 132 |\n| 140 | 1,120 | 125 |\n\nOnce again, we see the\
    \ same pattern of saturation from the beginning. This could be attributed to the\
    \ Derby database and memory usage. What can also be seen is that both the Total\
    \ Transactional Rate and the Aggregate Average Response Times are slightly lower\
    \ than those of the multiple-table inheritance model.\n\nThis comparison can be\
    \ seen more clearly in the charts presented in Figure [9-12](#A311833_3_En_9_Chapter.html#Fig12),\
    \ which contains a comparison of both sets of results for the AART; and Figure\
