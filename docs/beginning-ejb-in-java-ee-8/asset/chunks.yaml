    The `Person` class becomes a mapped superclass (`@MappedSuperclass`), and it is
    stripped of its `@NamedQuery`, `@Table`, and `@Inheritance` annotations. `@Inheritance`
    is moved onto `Employee`, which becomes the new root entity in the hierarchy.


    While a mapped superclass may not be referenced as the target of a persistence
    relationship field, it may have persistence relationship fields of its own, so
    the `homeAddress` field that references the `Address` entity is perfectly legal.


    Also note that we can continue to define the `@Id` and `@Version` fields on the
    mapped superclass, and we can even continue to specify an ID generator for the
    `id` field. Entities that extend this mapped superclass map these fields, along
    with all other fields defined on the mapped superclass, onto their own tables.


    ### Non-Entity Class


    Entities may also make use of non-entity classes within their type hierarchies.
    An entity may subclass a non-entity class, or a non-entity class may extend it.
    Such classes may be concrete or abstract, and so they may be instantiable, but
    their fields will not be persistable or maintained by the JPA persistence framework.
    They also may not participate at all in persistent entity relationships or JPQL
    queries. If a class in a type hierarchy serves only as an organizing construct
    for its subclasses, and it is not involved in entity relationships (and there
    is no other reason to mark it as an entity), then it is best left as an ordinary
    class. It can always be turned into an entity later by annotating it or designating
    it an entity in the XML descriptor.


    ### Non-Entity Single-Value and Collection Fields


    Finally, an entity may embed a non-entity class, or a collection of non-entity
    classes, for its own private use. Such embedded references may be to single objects
    or to collections of objects. Single-object fields are typically of the type of
    which we are already familiar: Basic object types, like `String`, `int`, or `Long`,
    which are implicitly marked `@Basic`. Single-object fields may also have complex
    types, and we are familiar with these already as entity references, using fields
    marked `@OneToOne` or `@ManyToOne`. When fields reference complex non-entity types,
    they are marked `@Embedded` and the target class must be annotated `@Embeddable`.
    Collection references to non-entity objects are marked `@ElementCollection`, and
    they may be collections of either `@Basic` or `@Embeddable` class types. Let’s
    take a closer look at these non-entity field references.'
  raw: '### Mapped Superclass (@MappedSuperclass)


    A mapped superclass is a non-entity class that is nonetheless recognized by the
    persistence manager, and which declares persistent fields and their mappings.
    Since it is not an entity, it may not be the target of persistent entity relationships,
    nor may it be used in JPQL queries. It may, however, provide persistent properties
    common to any entities that extend it, whether directly or indirectly. Starting
    with the previous inheritance example, let us transform the root entity, `Person`,
    into a mapped superclass. Listings [4-18](#A311833_3_En_4_Chapter.html#Par107)
    and [4-19](#A311833_3_En_4_Chapter.html#Par108) show the transformed classes.


    ```

