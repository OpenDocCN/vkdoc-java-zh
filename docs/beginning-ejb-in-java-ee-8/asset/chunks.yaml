    \ to navigate to the next page. This page provides three options to the user:\n\
    \n*   A complete list of available wines\n*   The ability to search wines by year,\
    \ country, or varietal\n*   The ability to view the shopping cart and submit orders\n\
    \n```\nWine Home Page\n\nBeginning EJB: Wine Store Application \n```\n**Listing\
    \ 12-7** `winehome.jsp`\n\nWe can specify the `action` attribute with the `h:commandLink`\
    \ component that can be an expression based on a method or property in a managed\
    \ bean. Alternatively, the `action` attribute can be the name of the navigation\
    \ case that is defined in `faces-config.xml`. We are going to use the method-binding\
    \ expression `#{WineList.findAllWines}` as an `action` property value for the\
    \ “Complete List of Wines” option, and we will use the names of the navigation\
    \ case for the remaining two options.\n\nFigure [12-21](#A311833_3_En_12_Chapter.html#Fig21)\
    \ (in the “Compiling, Deploying, and Testing the JSF Application” section) shows\
    \ the `winehome.jsp` page rendered in a browser.\n\nThe next step is to define\
    \ the `WineList` managed bean that will talk to the back-end EJB to get the list\
    \ of all wines. Listing [12-8](#A311833_3_En_12_Chapter.html#Par169) shows the\
    \ code for the `WineList` bean. We will start by injecting the `SearchFacade`\
    \ EJB using the `@EJB` annotation. The `findAllWines()` method in the bean class\
    \ makes use of the injected `SearchFacade` stateless session bean and calls the\
    \ `getWineFindAll()` business method that returns the list of available wines.\
    \ The returned list of wines is stored in the `winesList` property of the managed\
    \ bean, and the `allwines` string is returned as the navigation case.\n\n```java\n\
    package com.apress.ejb.chapter12.view.managed;\nimport com.apress.ejb.chapter07.ejb.SearchFacadeLocal;\n\
    import com.apress.ejb.chapter07.entities.Wine;\nimport java.util.ArrayList;\n\
    import java.util.List;\nimport javax.ejb.EJB;\nimport javax.faces.application.Application;\n\
    import javax.faces.component.html.HtmlDataTable;\nimport javax.faces.context.FacesContext;\n\
    import javax.faces.el.ValueBinding;\npublic class WineList\n{\npublic WineList()\
    \ {\n}\n@EJB\nprivate SearchFacadeLocal searchFacade;\nprivate List winesList\
    \ = new ArrayList();\npublic String findAllWines() {\nif (searchFacade == null)\
    \ {\nreturn \"gohome\";\n}\nelse {\nwinesList = searchFacade.getWineFindAll();\n\
    return \"allwines\";\n}\n}\npublic void setWinesList(List winesList) {\nthis.winesList\
    \ = winesList;\n}\npublic List getWinesList() {\nreturn winesList;\n}\n}\n```\n\
    **Listing 12-8** `WineList.java`\n\nTo finish the work for this page, we will\
    \ extend the `faces-config.xml` file with the details shown in Listing [12-9](#A311833_3_En_12_Chapter.html#Par174).\
    \ We have defined `WineList` as a managed bean and added three more navigation\
    \ rules that create the following links:\n\n*   From `winehome.jsp` to `searchwines.jsp`,\
    \ to take the user to the search page\n*   From `winehome.jsp` to `wineList.jsp`,\
    \ after executing the `findAllWines()` method provided in the managed bean\n*\
    \   From `winehome.jsp` to `cartItems.jsp`, to show the list of all items in the\
    \ shopping cart\n\n```\nWineList\ncom.apress.ejb.chapter12.view.managed.WineList\n\
    session\n\n/winehome.jsp\n\nsearch\n/searchwines.jsp\n\nallwines\n/wineList.jsp\n\
    \ncartitems\n/cartItems.jsp\n```\n**Listing 12-9** `faces-config.xml`, with the\
    \ `WineList` Managed Bean\n\nWe will work on the three pages to which we are navigating\
    \ in the next sections."
