    #### @Basic 注解


    对于简单 Java 类型的实体字段，例如 `String` 或 `int`（如 `customerId` 和 `name` 字段），JPA 会自动配置使用
    `@Basic` 注解。简单类型的数组，以及任何其他实现了 `Serializable` 接口的类型，也可以标记为 `@Basic`。


    持久化框架提供了将列数据类型自动转换为特定 Java 类型的功能，并且 JPA 持久化提供程序在部署期间为实体类生成表时，会尝试定义合适的默认列类型。大多数数字、字符串和日期类型都会被自动转换。


    表 3-2 列出了可以标注 `@Basic` 注解并自动映射的 Java 类型列表。


    表 3-2


    适用于简单映射的字段/属性类型


    | Java 类型 |

    | --- |

    | Java 原始类型（`int`、`long`、`char` 等） |

    | 原始类型包装类（`Integer`、`Long`、`Char` 等） |

    | Java 可序列化类型 |

    | 用户定义的可序列化类型 |

    | 枚举类型 |

    | `java.lang.String` |

    | `java.math.BigInteger` |

    | `java.math.BigDecimal` |

    | `java.util.Date` |

    | `java.util.Calendar` |

    | `java.sql.Date` |

    | `java.sql.Time` |

    | `java.sql.Timestamp` |

    | `byte[]` |

    | `Byte[]` |

    | `char[]` |

    | `Character[]` |


    #### 其他字段类型


    还有许多其他类型说明符可以应用于不同类型的列。例如，一个实体也可能持有对其他实体的引用，这些引用也通过实体上的属性来表示。我们将在本章后面部分介绍如何指定这些关系属性的一些示例。


    一个实体可能拥有除属性访问方法之外的其他方法，但通常这些方法仅限于支持方法，用于管理集合关系属性的添加和移除操作。


    ### 编码要求


    除了 `@Entity` 注解和主键说明符之外，实体的最低编码要求是：它必须有一个 `public` 或 `protected` 的默认（无参数）构造函数，并且该类不能是
    final 的。在这个 `Customer` 示例中，隐含了一个默认构造函数，因为在一个公共类上，如果没有定义任何非默认构造函数，Java 会假定存在一个默认构造函数。也可以在实体上指定非默认构造函数，它们通常用于使用实体的必需属性来初始化实体。


    #### java.io.Serializable 接口


    那些需要按值传递的实体（例如，通过远程会话 Bean 传递给 EJB 容器外部的 Java SE 客户端时），必须实现 `java.io.Serializable`
    标记（无方法）接口。实现此接口向编译器表明，它必须强制实体类上的所有字段都是可序列化的，以便任何实例都可以被序列化为字节流，并通过 HTTP 上的远程方法调用（RMI）进行传递。


    #### 在实例变量上放置注解 vs. JavaBean 属性访问器上放置注解


    在定义实体类时，你可以选择将成员级别的注解放在实体实例变量上，或者放在这些实例变量对应的 JavaBean 属性访问器上。就像在通过注解还是 XML 指定元数据之间做选择一样，这很大程度上是个人偏好问题。


    注意


    自 JPA 2.0 起，允许 Java 开发者在实例变量和属性 getter 方法上同时进行注解。在此之前，继承层次结构中的所有实体必须选择遵循单一的方法。


    无论成员级别的注解指定在何处，实体的实例变量都不能是 public 的，并且该实体的客户端（包括相关实体）必须始终通过访问器方法来访问实体的属性。由实体提供者决定哪些属性访问器设为
    public（暴露给客户端），哪些设为 protected（仅对持久化提供程序可用）。当注解实例变量时，如果需要，实体无需定义任何属性访问器方法。


    根据策略，只有持久化框架和类方法本身才允许直接访问这些字段。对于两种访问类型，客户端都必须通过实体类上的公共访问器或其他方法来访问字段数据。


    选择一种方法而非另一种方法会产生几个实质性的后果。这些将在以下章节中讨论。


    ### 实体数据访问


    当注解指定在实体的实例变量上时，持久化管理器在向实体读写持久化属性时，会直接访问实例变量。当注解属性访问器而非实例变量时，持久化管理器会通过这些属性访问器来读写属性数据。


    直接注解实体的实例变量避免了方法调用的开销，并提供了一定的性能优化，因为持久化管理器直接与字段交互。注解属性访问器则为实体开发者提供了一种简单的方法，可以在所有尝试读写属性数据时进行拦截并执行自定义逻辑。


    如果需要，后一种选项为实体开发者提供了按需惰性派生持久化属性值的机会。但是，请注意，在实体状态转换期间，属性访问器方法上的任何验证或副作用代码都会被调用。正如你将在下一章中看到的，如果实体开发者希望在首次加载实体的持久化状态时，或者在将更改保存到持久化存储之前，初始化临时数据或优化持久化数据，那么最好使用实体生命周期回调方法来执行这些步骤。结合使用字段级注解和实体生命周期回调的好处是，setter
    方法中的验证和其他代码只会在客户端调用 setter 时被调用，而不会在框架从持久化存储实例化实体时被调用。


    另一个考虑因素是实体在参与查询时的行为方式。这是一个类似的问题，因为查询语句可能既检索又更新实体上的字段数据。因此，了解使用属性访问器可能产生的任何副作用非常重要。


    ### 属性名称


    选择注解实例变量还是属性访问器的第二个实质性影响发生在属性访问器表达出的默认字段名称与实例变量名称不同时。当注解属性访问器时，逻辑属性名称是使用 JavaBean
    属性命名约定从 getter 方法派生出来的；而如果注解的是实例变量，则逻辑属性名称就是该实例变量的名称。

