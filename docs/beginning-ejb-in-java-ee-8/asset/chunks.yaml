    Listing 13-2

    persistence.xml, containing the two persistence units used by our tests

    ```


    The two persistence units are nearly identical but for their transactional and
    schema generation behavior. The first persistence unit, `Chapter13-EmbeddableEJBTests-ResourceLocal`,
    references `jdbc/__default` as a `non-jta-data-source`, and it is used by our
    non-EJB Java façade inside the `PopulateDemoData.resetData()` operation. Since
    we know our tests will execute this operation prior to each test, we configure
    its persistence unit always to drop and re-create the schema objects required
    by the entities in that unit. This is reflected in the property defined for that
    unit:


    > **Note**

    > In JPA 2.0 and earlier, schema generation options were not defined in the spec,
    and users had to rely on platform-specific support for this, like the EclipseLink
    property shown above. JPA 2.1 introduces support for schema generation through
    a number of standard configuration properties, including a parallel property to
    the one above: `javax.persistence.schema-generation-action`. Currently the Java
    EE 8 provides the JAP version 2.2 but for compatibility with JPA 2.0 libraries,
    for now we use the EclipseLink property in our examples.


    The second persistence unit in our `persistence.xml` file, `Chapter13-EmbeddableEJBTests-JTA`,
    can assume that the schema has already been created, so we deliberately do not
    enlist a schema generation option for this persistence unit.


    If we needed to free up resources acquired during the individual unit tests runs,
    we could free them up using a method annotated `@After`. In our example, we don’t
    need to do this, so we leave the method body empty.


    #### The Unit Test Methods


    Having now covered the test initialization steps, we turn our attention to the
    unit tests themselves. Each unit test is annotated `@Test` to differentiate it
    from ordinary methods that might also be on the class, and we include three test
    methods.


    The first test, `findCustomerByEmail()`: executes a single method `findCustomerByEmail()`
    on the `WineAppService` EJB, which returns a `Customer` instance. It then asserts
    that the firstname + lastName is `James Brown`, the expected result. Our test
    class controls the state of the data in the persistence unit, and so it knows
    what to expect.


    ```

    /**

    * Test findCustomerByEmail on WineAppService.

    *

    * Assert that the Customer returned is named "James Brown".

    *

    * @throws Exception

    */

    @Test

    public void testFindCustomerByEmail() throws Exception {

    System.out.println("findCustomerByEmail");

    WineAppService wineAppSvcFacade =

    (WineAppService) ejbContainer.getContext().lookup("java:global/classes/WineAppService");

    Customer customer =

    wineAppSvcFacade.findCustomerByEmail(PopulateDemoData.TO_EMAIL_ADDRESS);

    assertEquals("WineAppServiceFacade.findCustomerByEmail(): Checking customer name",

    "James Brown",

    customer.getFirstName() + " " + customer.getLastName());

    }

    ```


    #### EJB Lookup Through JNDI


    EJB injection is not available to us from the JUnit test class, since it is running
    in an ordinary Java SE environment and not inside the Embeddable EJB Container.
    Thus we use JNDI through the `javax.naming.Context` API provided by our `EJBContainer`
    object to get references to the EJBs we are testing. There are several ways to
    look up an EJB, depending on whether it is global to the application or local
    to your context module. In this example, our EJBs are registered globally to the
    application, and we can use the global namespace to find them, using a URL such
    as `java:global/classes/WineAppService`.


    The second test, `testCreateIndividual()`, is a superset of the first test, but
    it does not rely on any side effects of the first test:


    ```

    /**

    * Test createIndividual() on WineAppService and findCustomerByEmail() on

    * CustomerFacade.

    *

    * Assert that the Individual instance created in createIndividual() has the

    * expected email property.

    * Assert that the Customer retrieved in

    * findCustomerByEmail() has the expected name.

    */

    @Test

    public void testCreateIndividual() throws Exception {

    System.out.println("createIndividual");

    WineAppService wineAppSvcFacade =

    (WineAppService) ejbContainer.getContext().lookup("java:global/classes/WineAppService");

    String email = "drwho@yahoo.com";

    Individual individual =

    wineAppSvcFacade.createIndividual("Adam", "Beyda", email);

    assertEquals("WineAppServiceFacade.createIndividual(): Checking Individual.email
    prop",

    email, individual.getEmail());

    CustomerFacade custFacade =

    (CustomerFacade) ejbContainer.getContext().lookup("java:global/classes/CustomerFacade");

    Customer customer = custFacade.findCustomerByEmail(email);

    assertEquals("CustomerFacade.findCustomerByEmail(): Checking Customer.email prop",

    "Adam Beyda", customer.getFirstName() + " " + customer.getLastName());

    //  Managed/detached entity state check

    Address shippingAddress = new Address("San Mateo", null, null, null, null);

    customer.setDefaultShippingAddress(shippingAddress);

    customer = custFacade.merge(customer);

    assertNotNull("customer.getDefaultShippingAddress().getId() is null",

    customer.getDefaultShippingAddress().getId());

    assertNotNull("shippingAddress.getId() is null",

    shippingAddress.getId());

    }

    ```


    This tests our transactional method `createIndividual()` on `WineAppService`,
    which creates and persists an instance of `Individual`. We then query it through
    `findCustomerByEmail()` on a separate EJB, `CustomerFacade`, to verify that it
    can be found.


    A secondary step in the test creates a new address and assigns it as the customer’s
    default shipping address. We will return to this when running the tests later
    in this chapter.


    Our third unit test, `testCreateCustomerOrder()`, further tests the app behavior
    by calling multiple transactional methods on different EJBs and combining test-side
    and server-side steps that build up a customer cart and process it to create a
    customer order.'
