    ## JMS 2.1


    JMS 2.1 最初由 Oracle 于 2014 年 8 月提出，随后根据 Java 社区流程提交为 JSR 368。它被提出并最终获批成为 Java EE
    8 的一部分。


    早期草案评审 1（EDR1）于 2015 年 10 月发布以供公众评审，其中包含关于灵活 JMS 消息驱动 Bean 的新章节。


    2016 年 3 月，EDR2 最终发布以供公众评审，但随后 Oracle 停止了 JMS 2.1 的开发，并宣布他们正在更改 Java EE 8 的优先级，其中包括
    JMS 2.1 的开发。


    最终，在 2016 年 11 月，Oracle 正式提议撤回该 JSR，并确认 JMS 仍将是 Java EE 8 的一部分，但将使用现有版本 JMS 2.0，而非新版本
    2.1。


    JMS 2.1 规范可在此网页中找到：


    [`https://jcp.org/en/jsr/detail?id=368`](https://jcp.org/en/jsr/detail?id=368)


    以下是 JMS 2.1 中最重要的变更：


    *   与 Java SE 8 对齐

    *   灵活的 MDB（EE）

    *   异步消息传递的变更，包括 MDB 如何将任何 `MessageListener` 接口实现为任何 CDI Bean

    *   CDI Bean 作为监听器

    *   批量投递，包括确认模式、`setMessageListener`（EE）等

    *   可重复注解，包括重新投递配置（EE）


    ## 使用 MDB


    MDB 是一个异步消息消费者，用于处理通过 JMS 投递的消息。当 MDB 执行处理消息的工作时，运行 MDB 的 EJB 容器负责处理服务（事务、安全、资源、并发、消息确认），让
    Bean 开发者专注于处理消息的业务逻辑。传统的 JMS 应用程序需要自行编写其中一些服务。MDB 本质上是无状态的，这意味着 EJB 容器可以拥有大量 MDB
    实例并发执行，以处理来自各种应用程序或 JMS 生产者的数百条 JMS 消息，并为企业应用程序提供服务质量（QoS），例如高可用性和可靠性。


    EJB 客户端应用程序不能像访问会话 Bean 和实体那样直接访问 MDB。与 MDB 通信的唯一方式是将 JMS 消息发送到 MDB 正在监听的目标。任何使用
    JMS API 的 Java 应用程序或 Java EE 组件都可以通过向队列或主题发送消息来成为 MDB 的消息提供者。


    ### 何时使用 MDB？


    在本章前面，我们讨论了企业中异步性的需求。异步消息传递在应用程序、系统和服务之间提供了松散耦合，从而为应用程序和系统提供了更大的灵活性和变更管理能力。MDB
    提供了一种标准的消息组件模型，可在企业中实现异步和面向消息的架构目标。


    图 5-4 展示了一个面向消息的应用程序，它包含订单录入、库存、计费和发货系统，这些系统异步通信以处理一个工作流，该工作流从新的采购订单开始，到订单发货给客户结束。订单录入系统捕获客户的新订单，处理订单，并将其发送到指定的消息队列（在图
    5-4 中，这是“新订单”队列）。库存系统从队列中取出消息，检查库存是否可用。如果不可用，则向“供应商”队列发送消息；如果可以发货，则将消息放入“订单就绪”队列。计费系统取出这条新消息，处理客户的计费，然后将消息放回“发货”队列。最后，发货应用程序取出消息，将订单发货给客户，并向客户发送一封包含跟踪信息的电子邮件。


    ![A311833_3_En_5_Fig4_HTML.jpg](img/A311833_3_En_5_Fig4_HTML.jpg)


    图 5-4


    一个订单到发货的 JMS 消息传递系统


    ### MDB 类


    与会话 Bean 不同，MDB 没有任何业务接口。它仅包含以下内容：


    *   一个消息驱动类

    *   一个可选的回调监听器类

    *   一个可选的拦截器类


    MDB 类是任何带有类级别注解 `@MessageDriven` 的标准 Java 类。如果使用部署描述符代替注解，则应将 Bean 类标记为 MDB 类。在混合模式下（即同时使用注解和部署描述符），如果在
    Bean 类中指定了任何其他类级别或成员级别的注解，则必须指定 `@MessageDriven` 注解。`@MessageDriven` 注解参数可用于指定
    Bean 正在监听的 JMS 队列或主题。表 5-2 详细说明了这些参数。


    表 5-2


    @MessageDriven 注解的参数详情


    | 参数 | 描述 |

    | --- | --- |

    | `ActivationConfigProperty` | 用于指定目标名称和类型的属性集 |

    | `description` | Bean 类的描述 |

    | `mappedName` | MDB 正在监听的 Topic 或 Queue 的物理 Java 命名和目录接口（JNDI）名称 |

    | `messageListener` | MDB 所扩展的接口类的接口名称 |

    | `name` | MDB 的名称，如果它必须与 Bean 类名称不同的话 |


    为了说明 MDB 的使用，我们将创建图 5-5 中所示的用例。我们将有一个应用程序客户端，它是一个 Java 命令行程序，用于调用 `OrderProcessing`
    会话 Bean 中的业务方法。`OrderProcessing` 会话 Bean 将创建一条 JMS 消息并将其发送到在 GlassFish 应用服务器中注册/配置的主题。一个名为
    `StatusMailer` 的 MDB 将监听该主题并处理传入的消息。接收到的消息将包含客户的详细信息，并将用于向客户发送关于其订单状态的电子邮件通知。这个简单的用例将使我们能够演示
    MDB 如何工作，以及如何在会话 Bean 和 MDB 中注入不同类型的资源。


    ![A311833_3_En_5_Fig5_HTML.jpg](img/A311833_3_En_5_Fig5_HTML.jpg)


    图 5-5


    一个示例 MDB 用例


    清单 5-1 展示了 `StatusMailer` MDB 的定义。我们使用 `@MessageDriven` 注解标记了 `StatusMailerBean`
    类。


    ```

    package com.apress.ejb.chapter05;

    import javax.ejb.MessageDriven;

    @MessageDriven

    public class StatusMailerBean {

    }

    清单 5-1

    StatusMailerBean.java

    ```


    MDB 类有一个方法 `onMessage()`，当消息到达 MDB 正在监听的队列/主题时，EJB 容器会调用该方法。`onMessage()` 方法包含如何处理传入消息的业务逻辑。`onMessage()`
    方法包含一个参数，即 JMS 消息。在 `StatusMailer` Bean 的情况下，`onMessage()` 方法检查消息是否为 `MapMessage`
    类型，然后从消息中获取客户信息，创建一封关于订单状态的电子邮件，然后向客户发送电子邮件。清单 5-2 展示了 `onMessage()` 方法的代码。在一个
    `try` 块中，我们首先检查接收到的消息是否如我们所预期的那样是 `MapMessage` 类型。如果是，则使用 `getStringProperty()`
    来检索消息中 `from`、`to`、`subject` 和 `content` 属性的值。

