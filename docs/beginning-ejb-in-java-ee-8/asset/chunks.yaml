    ### JAX-WS


    JAX-WS（Java API for XML Web Services）定义了用于从 Java 应用程序和 Java EE 组件（如 EJB）访问 Web
    服务的 Java API 和注解。JAX-WS 提供了 WSDL 与 Java 接口之间，或从 Java 接口到 WSDL 的映射功能。映射到 WSDL 的接口被称为服务端点接口。JAX-WS
    还提供了客户端和服务器端的 API 及注解，用于通过 SOAP 发送和接收 Web 服务请求。Java EE 中的 JAX-WS 规范依赖于 Java EE
    平台的其他相关规范（224）和 JAXB。JAX-WS 的当前版本是 2.3（JSR 224）。它还支持最新的 Web 服务标准，如 SOAP 1.2 和
    WSDL 2.0。图 6-4 展示了 Web 服务调用的简化示意图。


    ![A311833_3_En_6_Fig4_HTML.jpg](img/A311833_3_En_6_Fig4_HTML.jpg)


    图 6-4


    Web 服务调用内部机制


    ### JAX-RS


    JAX-RS（JAX-RS：Java API for RESTful Web Services）定义了用于基于 REST 架构模式创建 Web 服务的 Java
    API 和注解。JAX-RS 1.1 版本通过 JSR-311 成为 Java EE 6 的组成部分。JAX-RS 提供了诸如 `@PATH`、`@GET`、`@PUT`、`@POST`、`@DELETE`、`@HEAD`、`@PRODUCES`、`@CONSUMES`
    等注解，这些注解有助于将 POJO（普通 Java 对象）映射为 Web 资源。JAX-RS 的当前版本是 2.1（JSR 370）。


    ### JAXB


    Web 服务的消费者和提供者使用 XML 消息来发送请求和响应。这些消息可以是类似包含 XSD 的采购订单，这使得相关方（提供者和消费者）能够理解该采购订单。使用底层语言
    API 处理 XML 文档可能耗时且涉及复杂代码。在 Java EE 上下文中，JAXB（Java Architecture for XML Binding）规范提供了标准
    API，用于将 XML 文档表示为 Java 构件，以便开发人员能够基于模式（XSD）处理代表 XML 文档的 Java 对象。JAXB 规范有助于将 XML
    文档解组为 Java 对象集合，并将 Java 对象集合编组回 XML 文档。JAXB 规范为 XML 模式提供全面支持，并为 JAX-WS 提供绑定支持，同时它还利用了其他
    Java EE 规范，如 JSR 175。


    ### JAXR


    UDDI 是 Web 服务注册中心的标准。JAXR（Java API for XML Registries）规范定义了一组标准 API，允许 Java 客户端访问注册中心。这些
    API 也可用于 UDDI 之外的 XML 注册中心。


    ### SAAJ


    类似于可以在电子邮件中使用的附件，你可以向调用 Web 服务的 SOAP 消息发送附件。SAAJ（SOAP with Attachments API for
    Java）Java API for XML Registries 定义了一组标准 API，允许 Java SE 或 EE 组件构建带有附件的 SOAP 消息。


    ### JSR 224


    JSR 224（Java 平台 Web 服务元数据）定义了一组标准注解，可用于简化 Web 服务开发。这些注解可用于 Java 类或可作为 JAX-WS 组件的
    EJB 会话 Bean。JSR 224 补充了旧的 JSR-181 注解。


    ## 作为 Web 服务的 EJB 无状态会话 Bean


    使用 WSDL 描述的 Web 服务端点在本质上是无状态的。无状态会话 Bean 也具有相同的无状态特性，非常适合开发 Web 服务。EJB 规范依赖于 Java
    EE 平台中的其他 Web 服务规范，包括 JAX-WS、JAXB 和 JSR 224，无论是用于消费 Web 服务还是将无状态会话 Bean 发布为 Web
    服务。


    服务端点接口（SEI）是映射到 Web 服务的接口。JAX-WS 提供了这个映射层。为了开发一个新的 Web 服务，你可以采用自底向上或自顶向下的方法，这两种方法将在下面描述。


    在自底向上的方法中，你从一个 SEI 和一个可以发布为 Web 服务的实现开始。在此过程中，Web 服务构件（如 WSDL 文档）会在部署时或通过 Java
    EE 应用服务器提供的管理工具或实用程序生成。


    在自顶向下的情况下，你从一个 WSDL 文档开始，并使用实现 JAX-WS 的工具生成一个 SEI。一旦有了 SEI，你就可以为其添加实现。对于 EJB 无状态会话
    Bean，你需要使用 JAX-WS 和 JSR 224 规范中提供的注解来标记业务接口和/或 Bean 类，以便在部署时生成正确的 Web 服务构件集。Java
    EE 规范要求添加到组件中的注解在部署时被处理，以生成正确的构件集。带有 Web 服务注解的 EJB 无状态会话 Bean 也不例外；它们也在部署时由应用服务器提供的部署实用程序处理。每个
    SEI 对应一个无状态会话 Bean。


    ### 开发一个新的 Web 服务


    无状态会话 Bean 使用第 2 章中描述的编程模型来实现。如果你想将一个无状态会话 Bean 作为 Web 服务，你将需要以下类：


    *   一个 Bean 类（实现）

    *   一个 Web 服务端点接口（可选）

    *   如果 Bean 类有本地或远程客户端，则需要额外的业务接口

