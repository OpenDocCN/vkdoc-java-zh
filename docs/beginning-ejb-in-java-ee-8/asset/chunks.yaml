    You can see from the highlighted differences that they are very minimal. Ignoring
    table name differences, which are thrown in simply out of our desire to avoid
    name collisions with the tables in the other examples, only the `@Inheritance`
    annotation has changed on the root entity `Person`. Aside from its table and sequence
    names, the `Address` entity is identical to Listing [4-5](#A311833_3_En_4_Chapter.html#Par46),
    the previous example of the `SINGLE_TABLE` strategy.


    ### Pros and Cons of the JOINED Strategy


    #### Design-Time Considerations


    With the `JOINED` strategy, introducing a new type to the hierarchy, at any level,
    simply involves interjecting a new table into the schema. Subtypes of that type
    will automatically join with that new type at runtime. Similarly, modifying any
    entity type in the hierarchy by adding, modifying, or removing fields affects
    only the immediate table mapped to that type. This option provides the greatest
    flexibility at design time, since changes to any type are always limited to that
    type’s dedicated table.


    #### Performance Impact


    The `JOINED` approach does not suffer from the use of `UNION` operations, but
    inherently requires multiple `JOIN` operations to perform just about any query.
    Querying across all instances initially involves only a single query of the topmost
    base entity’s table to retrieve a list of all of the primary keys of instances
    in the hierarchy. Due to the presence of the discriminator column in the base
    entity’s table, resolution of these instances into entity classes can be efficient,
    depending on the lazy loading strategies employed by the persistence manager implementation.


    ### Single-Table-per-Outermost Concrete Entity Class (InheritanceType.TABLE_PER_CLASS)


    Support for the final inheritance mapping strategy is optional for persistence
    providers. It is not required for compliance with the JPA spec, so portable applications
    should avoid it until it is officially mandated or at least widely supported.
    This inheritance mapping option maps each outermost concrete entity to its own,
    dedicated table. Each table maps all of the fields in that entity’s entire type
    hierarchy; since there is no shared table, no columns are shared. The only table
    structure requirement is that all tables must share a common primary key structure,
    meaning that the name(s) and type(s) of the primary key column(s) must match across
    all tables in the hierarchy.


    For good measure, Figure [4-4](#A311833_3_En_4_Chapter.html#Fig4) illustrates
    our third type of hierarchy using the `TABLE_PER_CLASS` inheritance strategy,
    which demonstrates the use of the single-table-per-entity subclass approach. The
    tables are required to share nothing in common except the structure of their primary
    key; and since the table implicitly identifies the entity type, no discriminator
    column is required. Note that while tables are shown for the `abstract` entities
    `Person` and `Employee`, they are not actually used. Future versions of EclipseLink
    (the reference implementation of JPA) will probably be amended to suppress generation
    of these tables when using the `TABLE_PER_CLASS` inheritance strategy. Annotating
    these classes `@MappedSuperclass` instead of `@Entity` would prevent classes from
    being generated in this case but would also prevent these classes from participating
    in Entity relationships or JPQL statements.


    ![A311833_3_En_4_Fig4_HTML.jpg](A311833_3_En_4_Fig4_HTML.jpg)


    **Figure 4-4** A schema that maps our example entities using the `TABLE_PER_CLASS`
    strategy. Concrete leaf entities are mapped to dedicated tables that contain columns
    that map all of their declared and inherited fields.'
