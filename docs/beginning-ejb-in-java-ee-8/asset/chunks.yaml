  trans: '

    ### 容器管理事务（CMT）边界划分


    EJB 容器提供了内置的事务管理服务，会话 Bean 和消息驱动 Bean（MDB）默认可以使用这些服务。Bean 通过元数据（使用注解或 XML）为其每个方法指定事务特性，EJB
    容器遵循这些指令来确定要执行的事务操作（如果有的话）。利用这些指令，EJB 容器可以在方法被调用时自动开始一个新事务，或者挂起或重用现有事务，并可能在方法返回调用者之前提交该事务。


    注意


    只有 Bean 开发者可以为企业 Bean 分配事务管理类型。允许应用程序组装者通过 `ejb-jar.xml` 文件覆盖 Bean 的方法级容器管理事务属性，但他们必须谨慎操作以避免死锁的可能性。通常不允许应用程序组装者和部署者覆盖
    Bean 的事务管理类型。


    当 EJB 在元数据中声明其事务行为时，容器会拦截对企业 Bean 方法的调用，并在会话 Bean 的方法边界应用事务行为，提供一组固定的选项供你为每个方法指定。容器提供的默认行为（即未指定其他指令时）是在调用方法之前立即检查当前线程是否关联了事务上下文。如果没有可用的事务上下文，容器会在执行方法之前开始一个新事务。如果存在可用的事务，容器会允许该事务传播到方法调用，并使其对方法代码可用。然后，在从方法调用返回时，容器会再次检查。如果容器负责创建了新的事务上下文，它会在方法退出后自动提交该事务。如果容器没有创建该事务，则允许该事务不受影响地继续执行。通过拦截
    Bean 的方法调用，EJB 容器能够在运行时应用开发时声明式指定的事务行为。


    上一段描述的默认行为只是容器提供的六种 CMT 边界划分选项之一。你可以将这六种边界划分选项中的任意一种分配给会话 Bean 上的任何方法。某些属性值需要满足特定条件；当条件不满足时，会抛出异常。这六个属性列在表
    8-2 中。


    表 8-2


    容器事务属性定义


    | 事务属性 | 行为 |

    | --- | --- |

    | `MANDATORY` | 调用方法时必须存在一个有效的事务。如果没有可用的事务，则抛出 `javax.ejb.EJBTransactionRequired`
    异常。该方法执行期间此事务保持有效，并且在将控制权返回给调用者时保持活动状态。 |

    | `REQUIRED` | 这是默认的事务属性值。进入方法时，如果尚无可用的上下文，容器会介入创建一个新的事务上下文。如果容器在进入方法时创建了事务，则会在方法调用完成时提交该事务。如果已经存在一个有效的事务，容器在将控制权返回给客户端之前不会提交它。
    |

    | `REQUIRES_NEW` | 容器在执行标记为此属性的方法之前总是创建一个新事务。如果在调用方法时已经存在一个事务上下文，则容器会将该事务与当前线程分离以挂起它，然后再创建新事务。在提交中间事务后，容器会将原始事务重新关联到当前线程。
    |

    | `SUPPORTS` | 此选项基本上是一个空操作，不会导致容器执行额外工作。如果存在事务上下文，则方法会使用它。如果没有可用的事务上下文，则容器会在没有事务上下文的情况下调用该方法。退出方法时，任何预先存在的事务上下文保持有效。
    |

    | `NOT_SUPPORTED` | 容器在未指定事务上下文的情况下调用该方法。如果在调用方法时存在事务上下文，则容器会在调用方法之前将该事务与当前线程分离，然后在从方法返回时将该事务重新关联到线程。
    |

    | `NEVER` | 调用方法时不得带有事务上下文。容器在调用方法之前不会创建事务上下文，如果已经存在一个有效的事务，容器会抛出 `javax.ejb.EJBException`。
    |


    注意


    通常，事务属性可以在会话 Bean 的业务接口方法或 Web 服务端点接口上指定，也可以在 MDB 的监听器方法上指定，但在特定情况下会有一些额外的限制。此类细节超出了本书的范围，但可以在
    EJB 核心契约与需求规范中找到。


    所有六个属性通常都可用于会话 Bean 方法，尽管某些属性在会话超时回调方法上不可用，或者当会话 Bean 实现 `javax.ejb.SessionSynchronization`
    时不可用。MDB 仅支持 `REQUIRED` 和 `NOT_SUPPORTED` 属性。以下是一个示例，说明如何在会话 Bean 方法上指定事务行为以覆盖在
    Bean 级别指定（或默认）的事务行为：


    ```

    @TransactionAttribute(TransactionAttributeType.SUPPORTS)

    public CustomerOrder createCustomerOrderUsingSupports(Customer customer)

    throws Exception { ... }

    ```


    表 8-3 展示了 EJB 的事务行为，该行为取决于其事务属性以及在调用会话方法时是否存在事务上下文。对于每个事务属性，我们在单独的行中列出了当客户端事务不存在（None）和当客户端事务存在（Tc）时的方法体和资源事务上下文。每当为方法执行期间创建新事务（Tm）时，该事务总是在控制权返回给调用者之前由
    EJB 容器提交。表中同时显示了与方法体代码关联的事务以及与该方法使用的资源关联的事务。


    表 8-3


    六种事务属性对应的客户端和 Bean 事务状态


    | 事务属性 | 客户端的事务 | 与业务方法关联的事务 | 与资源管理器关联的事务 |

    | --- | --- | --- | --- |

    | `MANDATORY` | 无 | 错误 | 不适用 |

    |   | Tc | Tc | Tc |

    | `NEVER` | 无 | 无 | 无 |

    |   | Tc | 错误 | 不适用 |

    | `NOT_SUPPORTED` | 无 | 无 | 无 |

    |   | Tc | 无 | 无 |

    | `REQUIRED` | 无 | Tm | Tm |

    |   | Tc | Tc | Tc |

    | `REQUIRES_NEW` | 无 | Tm | Tm |

    |   | Tc | Tm | Tm |

    | `SUPPORTS` | 无 | 无 | 无 |

    |   | Tc | Tc | Tc |


    表 8-3 展示了容器如何拦截具有 CMT 边界划分的方法，从而为每个事务属性以不同方式传播事务上下文。该表还说明了在 Bean 方法中使用的事务上下文总是会依次传播给该
    CMT Bean 方法所调用的其他方法。请注意，企业 Bean 的客户端本身可能是另一个企业 Bean。

    '
- fmt: '### The `EJBContext.setRollbackOnly` and `getRollbackOnly` Methods


    In the event that an exception or other error condition is encountered in a method
    on a CMT-demarcated enterprise bean, the bean may wish to prevent the context
    transaction from being committed.


    The `MessageDrivenContext` methods can be used, in the following ways, whenever
    we use container-managed transactions:


    *   `setRollbackOnly`: This method can be used for error handling.

    *   `getRollbackOnly`: This method can be used to test whether the current transaction
    has been marked for rollback.


    The bean is not allowed to roll back the transaction explicitly, but it may obtain
    the `javax.ejb.EJBContext` resource (through container injection or JNDI lookup)
    and call its `setRollbackOnly()` method to ensure that the container will not
    commit the transaction. Similarly, a bean method may at any time call the `EJBContext.getRollbackOnly()`
    method to determine whether the current transaction has been marked for rollback,
    whether by the current bean or by another bean or resource associated with the
    current transaction.


    ### Bean-Managed Transaction (BMT) Demarcation


    For some enterprise beans, the declarative CMT services may not provide the demarcation
    granularity that they require. For instance, a client may wish to call multiple
    methods on a session bean without having each method commit its work upon completion.
    In this case, the client has several options: it can either instantiate its own
    JTA (or resource-local) transaction and thus control the transaction begin/end
    boundaries explicitly; it can write a custom CMT session bean to wrap the work
    inside a transactional bean method and perform the steps inside the container-managed
    transaction; or it can control the transaction demarcation explicitly by using
    a transaction resource available through the EJB context.


    EJB offers the latter option—known as bean-managed transaction (BMT) support to
    enterprise beans as a convenient way to handle their demarcation of transaction
    events. To turn off the automatic CMT demarcation services, enterprise beans simply
    specify the `@TransactionManagement(TransactionManagementType.BEAN)` annotation
    or assign the equivalent metadata to the session bean in the `ejb-jar.xml` file.
    With BMT demarcation, the EJB container still provides the transaction support
    to the bean, through a `UserTransaction` object available through the bean’s `EJBContext`
    object. The primary difference is that the bean code makes explicit calls to begin,
    commit, and roll back transactions instead of using CMT attributes to declaratively
    assign transactional behavior to its methods. The container does not interpose
    on BMT methods to begin and commit transactions, and it does not propagate transactions
    begun by a client to beans that elect to demarcate their own transactions. While
    any given enterprise bean must choose one plan or the other (CMT vs. BMT demarcation)
    for its methods, both types of beans may interact with each other within a single
    transaction context.


    To demarcate transactions, an enterprise bean obtains an `EJBContext` (that is,
    `SessionContext` for a session bean, or `MessageDrivenContext` for an MDB) resource
    through injection:


    ```

    @Resource

    SessionContext sessionContext;

    ```


    and then acquires a JTA `javax.transaction.UserTransaction` instance through this
    resource:


    ```

    UserTransaction txn = sessionContext.getUserTransaction();

    ```


    This EJB container-provided `UserTransaction` interface provides `begin()`, `commit()`,
    and `rollback()` transaction demarcation methods to the bean. Similarly, non–enterprise
    bean clients may acquire a `UserTransaction` resource from a JTA server other
    than the EJB container to demarcate transactions from an application client environment,
    or they may use a non-JTA resource-local `EntityTransaction` obtained through
    an `EntityManager` (see below). Regardless of how they begin a transaction, though,
    it becomes the transaction in context when they invoke a session bean method,
    and the rules from Table [8-3](#A311833_3_En_8_Chapter.html#Tab3) apply.


    In the example we will examine shortly, a stateful session bean using an `EXTENDED`
    persistence context and BMT demarcation initiates a transaction in one method
    that is then propagated to subsequent method calls until the transaction is finally
    committed in a separate method. This behavior could not be specified with the
    same method structure by calling these methods separately on a CMT session bean,
    although it would be possible to achieve the same results by wrapping these separate
    calls inside a single CMT-demarcated custom method on a CMT session bean.


    **Note**


    How does the EJB server wire up a transaction context? You may be curious as to
    how the EJB server is able to automatically enlist database connections, and other
    resources obtained programmatically inside an enterprise bean, with the transaction
    context. Since the EJB server is providing the context for executing bean methods,
    it is able to interpose on these requests and perform this side-effect logic without
    interrupting the flow of execution within the method. That is, it intercepts the
    method invocation before it is performed; does some extra work (like checking
    the state of the transaction context, possibly creating a new transaction, and
    associating the enterprise bean with that context); and then invokes the bean
    method. Upon returning from the bean method invocation, it again has an opportunity
    to perform extra logic, such as committing the transaction that was created when
    the method was called, before returning control to the client that invoked the
    bean method in the first place.


    When we use bean-managed transactions, the delivery of a message to the `onMessage`
    method takes place outside the JTA transaction context.


    The transaction will:


    *   begin when we call the `UserTransaction.begin` method within the `onMessage`
    method, and

    *   end when we call `UserTransaction.commit` or `UserTransaction.rollback`.


    Notice that any call to the `Connection.createSession` method should take place
    within the transaction.


    ### Implicit Commit vs. Explicit Commit


    When using CMT, the container requires that any transaction that it begins when
    a method is called will be concluded when the method returns to the caller. This
    is known as implicit commit behavior, or sometimes referred to as auto-commit
    behavior. The container must enforce this rule or run the risk of losing track
    of the transaction as control passes up the process stack. While you can still
    use the container-managed transactions with CMT to allow multiple methods to be
    called within a single transaction, you must do this by wrapping your method calls
    within an outer container-managed method. From the perspective of a client, this
    still appears to be a single method call, to the wrapper method.


    When using BMT with stateful session beans, you have the flexibility to achieve
    an explicit commit model, where the bean or the client can control the beginning
    and end of a transaction and call multiple methods explicitly during that time
    before concluding with an explicit call to commit or roll back the work. This
    puts the burden on the client, or on the bean developer, to ensure that transactions
    are not left dangling. With proper care, however, this is a powerful tool when
    the application requires this behavior. As mentioned earlier, EJB provides a built-in
    transaction for session beans and MDBs to use for this—the `javax.transaction.UserTransaction`—which
    the bean can access through its injected `javax.ejb.EJBContext` property (as either
    a `SessionContext` or a `MessageDrivenContext` instance).


    We will further explore both implicit and explicit commit behavior in the sample
    app at the end of this chapter.'
