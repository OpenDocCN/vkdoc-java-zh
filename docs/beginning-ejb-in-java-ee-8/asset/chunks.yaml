- fmt: '### JAX-WS


    `JAX-WS` (Java API for XML Web Services) defines Java APIs and annotations for
    accessing Web services from Java applications and Java EE components like EJBs.
    `JAX-WS` provides mapping facilities between WSDL and Java interfaces, or from
    Java interfaces to WSDL. WSDL-mapped interfaces are called service endpoint interfaces.
    `JAX-WS` also provides the client-side and server-side APIs and annotations to
    send and receive Web service requests via SOAP. The `JAX-WS` specification in
    Java EE depends on other relevant specifications of the Java EE platform224 and
    `JAXB`. The current version of `JAX-WS` is 2.3 (JSR 224). It also provides support
    for the latest Web services standards like SOAP 1.2 and WSDL 2.0. Figure [6-4](#A311833_3_En_6_Chapter.html#Fig4)
    shows a simplified diagram of a Web service invocation.


    ![A311833_3_En_6_Fig4_HTML.jpg](A311833_3_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Web service invocation internals


    ### JAX-RS


    `JAX-RS` (JAX-RS: Java API for RESTful Web Services) defines Java APIs and annotations
    for creating Web services based on the REST architectural pattern. `JAX-RS` version
    1.1 became an integral part of Java EE 6 through JSR-311. `JAX-RS` provides annotations
    like `@PATH`, `@GET`, `@PUT`, `@POST`, `@DELETE`, `@HEAD`, `@PRODUCES`, `@CONSUMES`,
    and so forth that help in mapping a POJO (plain old java objects) as a Web resource.
    The current version of `JAX-RS` is 2.1 (JSR 370).


    ### JAXB


    Web services consumers and providers use XML messages to send requests and responses.
    These messages can be something like a purchase order that has an XSD, which allows
    the parties involved (provider and consumer) to understand the purchase order.
    Working with XML documents using low-level language APIs can be time consuming
    and can involve complex code. The `JAXB` (Java Architecture for XML Binding) specification,
    in context of Java EE, provides standard APIs for representing XML documents as
    Java artifacts so that developers can work off Java objects that represent the
    XML documents based on schemas (XSD). The `JAXB` specification facilitates unmarshalling
    XML documents into sets of Java objects and marshalling sets of Java objects back
    into XML documents. The `JAXB` specification provides full support for XML schemas
    and binding support for `JAX-WS`, and it leverages other Java EE specifications,
    such as JSR 175.


    ### JAXR


    UDDI is the standard for Web services registry. The `JAXR` (Java API for XML Registries)
    specification defines a standard set of APIs that allows Java clients to access
    the registry. These APIs can also be used against XML registries other than UDDI
    ones.


    ### SAAJ


    Similar to the attachments that you can use in e-mail messages, you can send attachments
    to the SOAP messages that invoke Web services. `SAAJ` (SOAP with Attachments API
    for Java) Java API for XML Registries define a standard set of APIs that allow
    Java SE or EE components to construct SOAP messages with attachments.


    ### JSR 224


    `JSR 224` (Web Services Metadata for the Java Platform) defines a standard set
    of annotations that can be used to simplify Web services development. These annotations
    can be used with Java classes or EJB session beans that can be `JAX-WS` components.
    `JSR 224` supplements the old JSR-181 annotations.


    ## EJB Stateless Session Beans as Web Services


    Web services endpoints that are described using WSDL are stateless in nature.
    Stateless session beans also share the same statelessness and are well suited
    for developing Web services. The EJB specification relies on other Web services
    specifications in the Java EE platform, including `JAX-WS`, `JAXB`, and `JSR 224`,
    either to consume Web services or publish stateless session beans as Web services.


    A service endpoint interface (SEI) is one that is mapped to a Web service. `JAX-WS`
    provides this mapping layer. In order to develop a new Web service, you can take
    either the bottom-up or top-down approach, both of which are described below.


    In the case of the bottom-up approach, you start with an SEI and an implementation
    that can be published as a Web service. In this process, Web service artifacts
    like WSDL documents are generated at deployment time or by the administrative
    tools or utilities provided by Java EE application servers.


    In the top-down case, you start with a WSDL document and generate an SEI using
    tools that implement `JAX-WS`. Once you have an SEI, you can add the implementation
    behind it. In the case of EJB stateless session beans, you need to use the annotations
    provided in the `JAX-WS` and `JSR 224` specifications to mark the business interfaces
    and/or bean classes so that the right set of Web services artifacts will be generated
    at deployment time. Java EE specifications require that the annotations added
    to components be processed at deployment time to generate the right set of artifacts.
    EJB stateless session beans with Web services annotations are no different; they
    are also processed at deployment time by the deployment utilities provided by
    the application servers. There will be one stateless session bean for each SEI.


    ### Developing a New Web Service


    Stateless session beans are implemented using the programming model described
    in Chapter [2](#A311833_3_En_2_Chapter.html). In case you want to make a stateless
    session bean as a Web service, you will need the following classes:


    *   A bean class (implementation)

    *   A Web service endpoint interface (optional)

    *   Additional business interfaces if the bean class has local or remote clients'
