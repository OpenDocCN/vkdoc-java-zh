    \ content.\n\nJSP was next in the evolution of Web technologies; it bridged the\
    \ gap between graphic designers and Java programmers. Based on Java Servlets technology,\
    \ JSP pages are HTML pages with embedded Java code. This model allowed graphic\
    \ designers to create JSP pages, which programmers could then make dynamic by\
    \ adding Java code or scriplets . When compiled, JSP pages become Java servlets.\n\
    \nWhile the advent of JSP pages was nice, many developers now had to deal with\
    \ mundane tasks like iterating over collections of data. This led to the creation\
    \ of the JSP Standard Tag Library (JSTL) , which automated some of these tasks.\n\
