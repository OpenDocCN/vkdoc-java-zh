- fmt: '### Performance Criteria


    Depending on the type of application, your focus will vary between two basic performance
    indicators: response time and throughput.


    When working with synchronous interactive applications, we define a maximum acceptable
    response time. This is the maximum amount of time that we are willing to wait
    before we get a response from the application.


    For a batch or back-end application, we define the minimum acceptable throughput,
    typically as transactions per second (`TPS`), but this has to be based on a solid
    understanding of exactly how a transaction will be defined in your system.


    Each of these metrics is inextricably linked to one another; however, we have
    not been able to find any mathematical or geometrical relation between them.


    Our advice is to define your performance metrics clearly and unambiguously and
    to test to well-defined requirements. Not doing so is an open invitation to test
    and tune endlessly.


    As we will be collecting data during the performance test runs, we need to have
    a clear understanding of the basic statistics, so let’s examine them in more detail.


    For the purposes of this book, we define response time as the length of time a
    client has to wait from the moment it sends a request to the moment it receives
    the last byte of the response from the application.


    The sets of data that we collect from a performance test run consist of the individual
    response times of every request that makes up the test script. Each request in
    a test script is executed one after another, by each simulated user for a certain
    period of time. Our base measurement of analysis is the arithmetic mean of the
    response times for all users of a particular request: the average response time
    (`ART`).


    Aggregate average response time (`AART`) is a measurement that we use extensively
    when analyzing performance data, and we define it as the sum of the `ART`s of
    every individual request in a test script, divided by the number of requests in
    that test script.


    Admittedly, `AART` has no real meaning in terms of how an application is performing,
    but it does provide an excellent indicator of how loaded the entire system is.
    As such, we sometimes refer to this measurement as the load factor. A typical
    `AART` curve when plotted against the number of simultaneous users looks like
    the one presented in Figure [9-1](#A311833_3_En_9_Chapter.html#Fig1).


    ![A311833_3_En_9_Fig1_HTML.jpg](A311833_3_En_9_Fig1_HTML.jpg)


    Figure 9-1


    A typical `AART` curve


    Throughput is not a clear-cut metric in the same way as is response time. The
    standard way of expressing throughput is in `TPS`, and it is vital to understand
    what a transaction represents in the application being tested. It might be a single
    query or a specific group of queries. In a messaging system, it might be a single
    message; and in a servlet-based application, it might be a request. Even when
    there is consensus as to exactly what is being measured, the values obtained for
    throughput can often be misinterpreted. The reason for this is that many people
    regard this metric in much the same way as they regard “miles per hour”: as a
    measurement of speed. In fact, throughput is a measure of capacity.


    We can attempt to explain how throughput works in terms of a supermarket analogy.
    Imagine that a supermarket runs a promotion whereby 10 shoppers will get for free
    everything they can put in their shopping carts in 15 minutes. The supermarket
    is the application, the shoppers are analogous to the requests (or messages),
    and the supermarket staff who are restocking the shelves are analogous to the
    components of your system that are working to cope with the demand.


    Even if all 10 shoppers reach capacity (by completely filling their carts in 15
    minutes), it doesn’t necessarily mean that they’ve taken everything available
    in the supermarket. However, as we increase the number of shoppers, we will reach
    a point where there are enough shoppers to empty the supermarket in that time.
    We call this the point of saturation, as there are no more resources available.
    As we increase the number of shoppers beyond this point, crowding in the aisles
    causes reduced shopper mobility (longer response times) and, ultimately, an actual
    drop in throughput.


    Similar to `ART`, our base measurement of analysis is the arithmetic mean of the
    requests per second for all users of a particular request. We call this `TPS`.


    For the purposes of analyzing performance data, and independently of the definition
    of throughput used for a specific performance test, we use the concept of total
    transactional rate (`TTR`). `TTR` is the addition of the `TPS` measurements of
    each request in a test script. `TTR` provides us with an excellent indicator of
    system capacity. Figure [9-2](#A311833_3_En_9_Chapter.html#Fig2) shows a typical
    `TTR` curve, which reaches the point of saturation at about 100 users. At that
    point, it starts dropping (due to, for example, too many shoppers).


    ![A311833_3_En_9_Fig2_HTML.jpg](A311833_3_En_9_Fig2_HTML.jpg)


    Figure 9-2


    A typical `TTR` curve


    The `AART` curve presented in Figure [9-1](#A311833_3_En_9_Chapter.html#Fig1)
    is the result of data collected from the same test run as the `TTR` curve presented
    in Figure [9-2](#A311833_3_En_9_Chapter.html#Fig2). If you review the `AART` curve,
    you can see that the response time increases in a linear fashion until it reaches
    100 users. After that, the increase is more dramatic. This coincides with the
    `TTR` curve, in which the saturation point is reached at 100 users. After that,
    the performance of the application in general degrades. Analyzing these two curves,
    you can state that the application has an upper limit of 100 users under the conditions
    of the performance test.


    ### Simulating Application Usage


    The objective of this section of the methodology is to ensure that we are collecting
    our performance data in test conditions that mimic reality as closely as possible.
    This applies more so when performance testing whole applications, and less so
    when designing for performance.


    For every application, there will be a number of different profiles of use that
    will be run concurrently. Sometimes, we will be able to simulate usage with a
    single test script and a single request. In other cases, it can take a dozen or
    so profiles, each with a different amount of requests.


    A special note has to be made regarding think time, also known as sleep time.
    This is the amount of time that elapses between the executions of each individual
    request in a test script. In real life, think time can be highly variable. It
    can be as little as a few seconds (for example, when clicking a button that will
    take us to the next page), or as much as 5 to 10 minutes (for instance, when examining
    the transactions we made in our bank account over the last month). For the performance
    tests, we have adopted two basic strategies:


    *   Using the real think time: This case is used when doing a performance test
    of a complete, working application.

    *   Using zero think time: This case is used when performing more general investigative
    measurements, such as comparing programming techniques. The consequence of this
    is that we are not testing under realistic conditions. However, we can perform
    accurate comparative measurements, and once we have chosen the best scenario from
    these results, we can then perform tests with realistic think times.'
  raw: '### Performance Criteria


    Depending on the type of application, your focus will vary between two basic performance
    indicators: response time and throughput.


    When working with synchronous interactive applications, we define a maximum acceptable
    response time. This is the maximum amount of time that we are willing to wait
    before we get a response from the application.


    For a batch or back-end application, we define the minimum acceptable throughput,
    typically as transactions per second (TPS), but this has to be based on a solid
    understanding of exactly how a transaction will be defined in your system.


    Each of these metrics is inextricably linked to one another; however, we have
    not been able to find any mathematical or geometrical relation between them.


    Our advice is to define your performance metrics clearly and unambiguously and
    to test to well-defined requirements. Not doing so is an open invitation to test
    and tune endlessly.


    As we will be collecting data during the performance test runs, we need to have
    a clear understanding of the basic statistics, so let’s examine them in more detail.


    For the purposes of this book, we define response time as the length of time a
    client has to wait from the moment it sends a request to the moment it receives
    the last byte of the response from the application.


    The sets of data that we collect from a performance test run consist of the individual
    response times of every request that makes up the test script. Each request in
    a test script is executed one after another, by each simulated user for a certain
    period of time. Our base measurement of analysis is the arithmetic mean of the
    response times for all users of a particular request: the average response time
    (ART).


    Aggregate average response time (AART) is a measurement that we use extensively
    when analyzing performance data, and we define it as the sum of the ARTs of every
    individual request in a test script, divided by the number of requests in that
    test script.


    Admittedly, AART has no real meaning in terms of how an application is performing,
    but it does provide an excellent indicator of how loaded the entire system is.
    As such, we sometimes refer to this measurement as the load factor. A typical
    AART curve when plotted against the number of simultaneous users looks like the
    one presented in Figure [9-1](#A311833_3_En_9_Chapter.html#Fig1).


    ![A311833_3_En_9_Fig1_HTML.jpg](A311833_3_En_9_Fig1_HTML.jpg)


