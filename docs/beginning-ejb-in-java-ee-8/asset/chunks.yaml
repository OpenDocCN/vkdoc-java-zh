- fmt: '### Configuring the EJB Web Service


    We have built our wine store back-end application on top of the work we did in
    Chapter [6](#A311833_3_En_6_Chapter.html), in which we implemented the credit
    service.


    1. The application in this chapter will not compile until you follow the steps
    in Chapter [6](#A311833_3_En_6_Chapter.html) to deploy the Web Service and create
    the Web service client. These steps are outlined here, but you may wish to refer
    to Chapter [6](#A311833_3_En_6_Chapter.html) for more comprehensive instructions
    for performing these operations. Right-click on the `Chapter06-WebServiceSamples-ejb`
    project, and choose ‘Clean and Build’ followed by ‘Deploy.’

    2. In the `Chapter06-WebServiceSamples` project, open the ‘Web Services’ section,
    right-click on `CreditCheckEndpointBean`, and choose ‘Test Web Service.’ When
    the Web page comes up, click on ‘WSDL File’ link, and then copy the browsers URL
    for the `.wsdl` file (typically, `http://localhost:8080/CreditService/CreditCheckEndpointBean?Tester`).

    3. Now right-click on the `Chapter06-WebServiceSamples-ejb` project again, and
    choose ‘New | Web Service Client.’ In the wizard, select the ‘WSDL URL’ radio
    button and paste the `.wsdl` URL you copied in step 2. Set the package to `com.apress.ejb.chapter06.services.client`
    and choose Finish. This will complete the Web Service configuration required to
    run the Chapter [7](#A311833_3_En_7_Chapter.html) samples.


    A quick look at the modules included in this example reveals that, in addition
    to the EJB/WebServices module from Chapter [6](#A311833_3_En_6_Chapter.html),
    we have another EJB module containing Session bean facades and MDBs, a number
    of JPA entities that comprise a JPA persistence unit, and a Web module containing
    a test servlet.


    ### The wineapp@yahoo.com Account and the user.properties File


    We have set up a Yahoo! mail account, `wineapp@yahoo.com`, that you may use for
    testing purposes. The password is: `wine_app`. All samples in this book that involve
    a JavaMail Session default to this account. You are free to use it, or you may
    prefer to send and receive e-mail through your own mail server (for example, if
    you are behind a firewall) using your own e-mail account(s).


    In the `Chapter07-ServiceIntegration-jpa` project, you will find a `user.properties`
    file in the root source directory. This file allows you to specify the From: and
    To: e-mail addresses for the e-mail generated by this sample. It is shown in Listing
    [7-21](#A311833_3_En_7_Chapter.html#Par105):


    ```

    # Specify the From: and To: email accounts that will be shown

    # in the mail header that is sent from the JavaMail Session

    # named ''mail/wineappMail'' and configured in Chapter 5. Note

    # that although the email header may appear to be from the

    # From account below, it will originate from the account

    # configured in the ''mail/wineappMail'' JavaMail Session.

    from_email_address = wineapp@yahoo.com

    to_email_address = wineapp@yahoo.com

    Listing 7-21

    The user.properties file found in the source root of the Chapter07-ServiceIntegration-jpa
    project

    ```


    To change the To: and/or From: e-mail addresses, feel free to edit this plaintext
    file. Also, refer to the `Readme.txt` file for guidance with proxy servers and
    other issues resulting from non-default installation environments.


    ### Building, Deploying, and Executing the Sample Application


    With all of the configuration steps completed, you are now ready to build, deploy,
    and run this chapter’s `WineApp` application through its simple servlet client.
    To ensure that any previous artifacts are removed, begin by selecting all five
    NetBeans projects and invoking the ‘Clean’ operation, shown in Figure [7-8](#A311833_3_En_7_Chapter.html#Fig8).


    ![A311833_3_En_7_Fig8_HTML.jpg](A311833_3_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Cleaning the Chapter07-ServiceIntegration project Note


    If GlassFish is running already, and you get errors while building because .jar
    files cannot be deleted, try shutting down GlassFish and re-invoking the ‘Clean’
    operation.


    The next steps are to build, package, and deploy the EJB, JPA, and Web modules
    and run the servlet client. All of these steps are performed automatically when
    invoking the ‘Run’ operation shown in Figure [7-9](#A311833_3_En_7_Chapter.html#Fig9).
    NetBeans is able to track the state of the projects and perform any required work
    prior to executing the `ShoppingCartClient` servlet.


    ![A311833_3_En_7_Fig9_HTML.jpg](A311833_3_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Running the Chapter07-ServiceIntegration project, which executes the servlet `ShoppingCartClient`
    found in the `Chapter07-ServiceIntegration-web` module


    Client applications and different application architectures will be discussed
    in detail in Chapter [12](#A311833_3_En_12_Chapter.html). In order to test the
    deployed wine store application, we have provided a simple servlet client. GlassFish
    injects the `ShoppingCart` and `SearchFacade` session beans into the servlet to
    search the wines, add items to the shopping cart, and finally submit the order.


    Listing [7-22](#A311833_3_En_7_Chapter.html#Par118) shows the code for the servlet
    client. To begin, the client looks up the `SearchFacadeBean` session bean and
    calls the `findWineByYear()` method, which returns a list of wines. In order to
    add wines to the shopping cart, the client program looks up the `ShoppingCart`
    session bean and calls the `findCustomer()` method. Once the customer has been
    found, the client goes into a `while` loop and adds the list of wines retrieved
    from `SearchFacadeBean` using the `addWineItem()` method in the `ShoppingCart`
    bean. To keep the client simple, the quantity of each wine is set to 20. Once
    the client finishes adding all of the wines to the shopping cart, the `sendOrderToOPC()`
    method in the `ShoppingCart` bean is called to submit the order.


    The `ShoppingCartClient` servlet uses EJB injection to obtain the EJBs `SearchFacade`
    and `ShoppingCart` through their Local interfaces. This servlet performs the following
    steps, logging its progress by sending HTML back to the browser window:


    - Initializes the sample data through a Java service façade—`PopulateDemoData`—that
    uses the JPA entities to populate the database

    - Uses the stateful `ShoppingCart` to find an existing customer by e-mail in the
    sample data set and cache it in the session bean

    - Uses the `SearchFacade` to look up the wines from 2004 using the `"Wine.findByYear"`
    JPQL named query, displays information about wines from that year, and adds 20
    bottles of each to the customer’s shopping cart using the `addWineItem()` method
    in the `ShoppingCart` bean

    - Once the client finishes adding all of the wines to the shopping cart, the `sendOrderToOPC()`
    method in the `ShoppingCart` bean is called to submit the order


    Listing [7-22](#A311833_3_En_7_Chapter.html#Par118) shows the servlet source.'
