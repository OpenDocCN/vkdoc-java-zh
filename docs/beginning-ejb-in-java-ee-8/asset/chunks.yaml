  trans: '

    #### 创建 Bean 类


    无状态会话 Bean 类是一个标准的 Java 类，带有类级别的 `@Stateless` 注解。从版本 3 开始，EJB 规范不再强制要求 SEI。是否提供
    SEI 以及 Bean 类是可选的。在 Bean 类将作为 Web 服务发布且不包含任何服务端点接口的用例中，Bean 类将额外带有类级别的 `@WebService`
    注解（JSR 224）。`@WebService` 注解位于 `javax.jws` 包中，它将 Bean 类标记为基于 SOAP 的 Web 服务的实现。


    `@WebService` 注解接受表 6-3 中描述的参数。


    表 6-3


    @WebService 注解


    | 参数 | 描述 | 附加信息 |

    | --- | --- | --- |

    | `name` | 映射到 `wsdl:portType` 的 Web 服务名称。 | 如果未指定，则使用 Java 类的名称。 |

    | `targetNamespace` | 用于 Web 服务的 XML 命名空间。 | 如果未指定，则使用 Java 类的名称。 |

    | `serviceName` | 映射到 `wsdl:service` 的 Web 服务名称。 | 如果未指定，则使用 Java 类的名称。 |

    | `wsdlLocation` | WSDL 文档的位置，当 Bean 类实现现有 Web 服务时会派上用场。 |   |


    为了说明一个作为 Web 服务发布的无状态会话 Bean，我们将创建一个 `CreditServiceEndpointBean`，它将作为 `CreditService`
    发布。


    在清单 6-9 中，我们有一个 Java 类 `CreditCheckEndpointBean`，它有两个类级别的注解：`@Stateless` 和 `@WebService`。`@Stateless`
    注解提供了一个额外的参数，将 Bean 标记为 `CreditCheckEndpointBean`。如果同一个类暴露给远程或本地客户端，这些客户端将使用该名称访问无状态会话
    Bean。`@WebService` 注解提供了两个额外的参数：一个将服务名称标记为 `CreditService`，另一个指定目标命名空间（而不是使用默认的
    Java 包结构）。


    ```

    package com.apress.ejb.chapter06.services;

    import javax.ejb.Stateless;

    import javax.jws.WebMethod;

    import javax.jws.WebService;

    @Stateless(name = "CreditCheckEndpointBean")

    @WebService(serviceName = "CreditService", targetNamespace = "http://www.apress.com/ejb/credit")

    public class CreditCheckEndpointBean  {

    public CreditCheckEndpointBean() {

    }

    }

    清单 6-9

    CreditCheckEndpointBean.java

    ```


    JSR 224 中定义的 `@WebMethod` 注解允许你自定义作为 Web 服务操作暴露的方法。如果带有 `@WebService` 注解的 Bean
    类中没有指定任何 `@WebMethod` 注解，那么所有公共方法都将作为 Web 服务操作暴露。


    `@WebMethod` 注解接受表 6-4 中描述的参数。


    表 6-4


    @WebMethod 注解


    | 参数 | 描述 | 附加信息 |

    | --- | --- | --- |

    | `operationName` | 与此方法匹配的 `wsdl:operation` 的名称。 | 默认情况下，这是 Java 方法的名称。 |

    | `action` | 此操作的动作。对于 SOAP 绑定，它将是 `SOAP action` 标头的值。 | 默认情况下，这是 Java 方法的名称。
    |


    在清单 6-10 中，我们在 `CreditCheckEndpointBean` 类中添加了以下方法，该方法将作为 Web 服务操作暴露。操作名称通过 `@WebMethod`
    参数自定义为 `CreditCheck`。该方法接受一个 `java.lang.String` 参数（即信用卡号），并根据信用卡是否有效返回 `true`
    或 `false` 的 `java.lang.boolean` 值。为简单起见，我们将始终返回 `true`。


    ```

    @WebMethod(operationName="CreditCheck")

    public boolean validateCC(String cc){

    return true;

    }

    清单 6-10

    CreditCheckEndpointBean.java 中的 validateCC 方法

    ```


    #### Web 服务端点接口


    JAX-WS 不强制要求使用 SEI 来实现 Web 服务端点。你可以使用 JSR 224 中提供的注解将 Bean 类标记为 Web 服务，并将一个或多个业务方法标记为
    Web 服务操作。在为无状态会话 Bean 定义了 SEI 的用例中，应遵守以下规则：


    *   SEI 必须具有 `javax.jws.WebService` 注解。

    *   一个或多个方法可以具有 `javax.jws.WebMethod` 注解。

    *   所有方法参数和返回类型应与 JAXB XML 模式映射定义兼容。

    *   方法的参数和返回类型必须是有效的 JAX-RPC 值类型，包括 Java 基本类型（`int`、`long` 等）、Java 类（`String`、`Date`
    等）、Java Bean 和数组。

    *   `Throw` 子句必须包含 `java.rmi.RemoteException` 以及任何其他应用程序异常。


    注意


    自 Java EE 7 起，对 JAX-RPC 的支持已成为可选项。从 Java EE 7 开始，规范鼓励新应用程序使用 JAX-WS 提供的简化 Web
    服务开发的工具。当前版本的 JAX-RPC 是 1.1。


    在我们的示例中，我们将注解添加到 Bean 类本身，如清单 6-9 和 6-10 所示。


    清单 6-11 说明了提供 SEI 的用例的服务端点接口，清单 6-12 显示了实现该 SEI 的 `CreditCheckEndpointBean` 类。


    ```

    @WebService(serviceName="CreditService",targetNamespace="http://www.apress.com/ejb/credit")

    public interface CreditCheckEndpoint {

    @WebMethod(operationName="CreditCheck")

    public boolean validateCC(String cc);

    }

    清单 6-11

    用例的服务端点接口

    ```


    ```

    @Stateless

    public class CreditCheckEndpointBean implements CreditCheckEndpoint {

    public CreditCheckEndpointBean() {

    }

    // 实现代码在此处

    }

    清单 6-12

    实现 SEI 的 CreditCheckEndpointBean 类

    ```


    ## 打包、部署和测试 Web 服务


    带有 Web 服务注解的无状态会话 Bean 需要先打包到 EJB Java 归档（JAR）文件中，然后才能部署到 EJB 容器中。对于某些 EJB 容器或应用服务器，它们首先需要被组装成
    EAR（企业归档）文件。大多数 EJB 容器或应用服务器提供部署实用程序或 Ant 任务，以方便将 EJB 部署到其容器中。像 JDeveloper、NetBeans
    和 Eclipse 这样的 Java 集成开发环境（IDE）也提供部署功能，允许开发者将 EJB 打包、组装和部署到应用服务器。打包、组装和部署方面的内容将在第
    11 章中详细讨论。


    在本章中，我们开发了一个带有 Web 服务注解的无状态会话 Bean（`CreditCheckEndpointBean`）。我们将执行以下步骤来编译、部署和测试将作为
    Web 服务发布的无状态会话 Bean。


    ### 前提条件


    在执行后续章节详述的任何步骤之前，请先完成第 1 章的“入门”部分，该部分将引导你完成本章示例所需的安装和环境设置。

    '
- fmt: '### Compiling the Session Bean


    Copy the `Chapter06-WebServiceSamples` directory and its contents into a directory
    of your choice. Run the NetBeans IDE, and open the `Chapter06-WebServiceSamples`
    project using the `File ➤ Open Project` menu. Make sure that the `Open Required
    Projects` check box is checked, as shown in Figure [6-5](#A311833_3_En_6_Chapter.html#Fig5).


    ![A311833_3_En_6_Fig5_HTML.jpg](A311833_3_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Opening the `Chapter06-WebServiceSamples` project


    Expand the `Chapter06-WebServiceSamples-ejb` node as shown in Figures [6-6](#A311833_3_En_6_Chapter.html#Fig6)
    and [6-7](#A311833_3_En_6_Chapter.html#Fig7), and observe that the session bean-based
    Web service that we created appears in the `com.apress.ejb.chapter06.services`
    package. Similarly, the client servlet also appears under the `Chapter06-WebServiceSamples-war`
    node.


    ![A311833_3_En_6_Fig6_HTML.jpg](A311833_3_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Verifying that the Session Bean and its clients are available in the project


    Invoke the context menu on the `Chapter06-WebServiceSamples` node, and build the
    application by selecting the `Clean and Build` menu option. The session bean-based
    Web service will compile without any errors, but the client in the `Chapter06-WebServiceSamples-war`
    node will show compilation errors. We will ignore these errors in the client for
    now.


    ![A311833_3_En_6_Fig7_HTML.jpg](A311833_3_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Building the application


    ### Deploying the Session Bean-Based Web Service


    Once we have compiled the session bean, we can deploy it to the GlassFish application
    server. Invoke the context menu on the `Chapter06-WebServiceSamples-ejb` node,
    and deploy the application by selecting the `Deploy` menu option, as shown in
    Figure [6-8](#A311833_3_En_6_Chapter.html#Fig8).


    ![A311833_3_En_6_Fig8_HTML.jpg](A311833_3_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Deploying `CreditService`


    ### Testing the Credit Service


    After successful deployment, we can use the test harness to see if `CreditService`
    can be invoked properly or not. To invoke the test harness, expand the `Web Services`
    node under `Chapter06-WebServiceSamples-ejb` to expose the `CreditCheckEndpointBean`
    node, and select the `Test Web Service` menu option, as shown in Figure [6-9](#A311833_3_En_6_Chapter.html#Fig9).


    ![A311833_3_En_6_Fig9_HTML.jpg](A311833_3_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Testing `CreditService`


    In the generated test harness page (shown in Figure [6-10](#A311833_3_En_6_Chapter.html#Fig10)),
    enter `12345` as the credit card number, and click the `creditCheck` button. You
    can also click on the `WSDL File` link to check its contents. Bookmark the WSDL
    `File` URL, as it will be used for creating a Web service client in the later
    sections.


    ![A311833_3_En_6_Fig10_HTML.jpg](A311833_3_En_6_Fig10_HTML.jpg)


    Figure 6-10


    The Web service test harness


    In the generated page, you can test the results with a SOAP request and response,
    as shown in Figure [6-11](#A311833_3_En_6_Chapter.html#Fig11).


    ![A311833_3_En_6_Fig11_HTML.jpg](A311833_3_En_6_Fig11_HTML.jpg)


    Figure 6-11


    SOAP request and response messages


    So far, we have seen how to test the deployed Web services using the test harness.
    In the next section, we will discuss Web Services clients and how you can develop
    and run programs that can invoke Web services. In our case, we will be testing
    against the deployed credit service.


    ## Web Service Client View


    A stateless session bean that is published as a Web service can be accessed using
    the client view described by the WSDL document that gets generated during deployment
    (as shown in Listing [6-7](#A311833_3_En_6_Chapter.html#Par28)). Since the stateless
    session bean is published as a Web service using standards such as WSDL, any type
    of client application that can send and receive SOAP messages (irrespective of
    technology or language) can invoke it. The client application can be written using
    .NET or Java EE, or scripting languages such as PHP, Python, or Ruby. From the
    client point of view, what it sees as a contract is a WSDL document. In order
    to access the Web service, programmatic interfaces should be generated from the
    WSDL document.


    Web services are location independent, and they can be accessed remotely. If the
    client application invoking a Web service is a Java client or other Java EE component,
    such as an EJB, it uses JAX-WS client APIs or annotations to invoke the Web service
    via SOAP and HTTP.


    ### Developing a Java Client That Accesses the Web Service


    In order to access a Web service via a WSDL service contract, the client program
    needs programmatic interfaces (commonly known as stubs or proxies) generated from
    the WSDL document. Once the stubs have been generated from the WSDL document,
    we can use the JAX-WS annotations to get a reference to the Web service and invoke
    it.


    #### Generating Web Service Proxy Classes


    We will start by generating stubs for the `CreditService` WSDL document using
    the `Web Service Client` wizard provided by the NetBeans IDE. Invoke the `Web
    Service Client` wizard from the context menu of the `Chapter06-WebServiceSamples-ejb`
    node, as shown in Figure [6-12](#A311833_3_En_6_Chapter.html#Fig12).


    ![A311833_3_En_6_Fig12_HTML.jpg](A311833_3_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Invoking the Web Service Client wizard


    In the `Web Service Client` wizard, select the `WSDL URL` radio button, and enter
    the `WSDL File` URL that you had bookmarked in the earlier section (see Figure
    [6-10](#A311833_3_En_6_Chapter.html#Fig10)). We also need to specify the package
    where the client Java artifacts will be generated. We will generate these artifacts
    in the `com.apress.ejb.chapter06.services.client` package. Enter these details,
    as shown in Figure [6-13](#A311833_3_En_6_Chapter.html#Fig13), and finish the
    wizard.


    ![A311833_3_En_6_Fig13_HTML.jpg](A311833_3_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Creating a Web Service Client


    Once the stubs are generated and compiled, we can see artifacts under the `Generated
    Sources (jax-ws)` node, as shown in Figure [6-14](#A311833_3_En_6_Chapter.html#Fig14).


    ![A311833_3_En_6_Fig14_HTML.jpg](A311833_3_En_6_Fig14_HTML.jpg)


    Figure 6-14


    Verifying the generated stub sources


    Note: GlassFish also provides the command-line utility `wsimport.bat`, which can
