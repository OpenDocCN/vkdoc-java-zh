    In this section, we will develop a JSF client application that will work on top
    of the EJB back-end application, as shown in Figure [12-11](#A311833_3_En_12_Chapter.html#Fig11).


    ![A311833_3_En_12_Fig11_HTML.jpg](A311833_3_En_12_Fig11_HTML.jpg)


    Figure 12-11


    Sample application architecture


    The main goal of this section is to show you how to develop a set of JSF pages
    and wire them to EJB components in the back-end application. With this in mind,
