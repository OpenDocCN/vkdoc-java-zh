  raw: '##### @Default


    When a bean or an injection point does not explicitly define a qualifier, the
    CDI container assumes the qualifier as `@javax.enterprise.inject.Default`. If
    the CDI bean has only one implementation, then the CDI container can easily select
    that implementation for injection, as there is no ambiguity. The `@Default` is
    a built-in qualifier that informs the CDI container to inject a single, default
    bean implementation when no other qualifier (other than @Named, see below) is
    specified. The `WhiteWine` class in Listing [10-7](#A311833_3_En_10_Chapter.html#Par120)
    has the `@Default` qualifier and can be written, as shown in Listing [10-11](#A311833_3_En_10_Chapter.html#Par134),
    without any change in behavior.


    ```

    package com.apress.ejb.chapter10;

    import javax.enterprise.inject.Default;

    @Default

    public class WhiteWine implements Wine {

    public String getColor() {

    return "White";

    }

    }

    Listing 10-11

    WhiteWine.java

    ```


    ##### @Any


    Just like the `@Default` qualifier, all beans implicitly have the `@Any` qualifier.
    We can add an `@javax.enterprise.inject.Any` annotation to the `WhiteWine` class,
    as shown in Listing [10-11](#A311833_3_En_10_Chapter.html#Par134), alongside `@Default`
    without any change in behavior. An `@Any` qualifier at an injection point is useful
    for iterating over all of the implementations of a bean type.


    Listing [10-12](#A311833_3_En_10_Chapter.html#Par137) shows how a `@Any` qualifier
    can be used to iterate over all of the implementations of `Wine`.


    ```

    package com.apress.ejb.chapter10;

    import javax.enterprise.inject.Any;

    import javax.enterprise.inject.Instance;

    import javax.inject.Inject;

    public class AllWinesClient {

    @Inject

    @Any

    private Instance allWines;

    private void printAllWineColors(){

    for (Wine wine : allWines){

    System.out.println(wine.getColor());

    }

    }

    }

    Listing 10-12

    AllWinesClient.java

    ```


    ##### @Named


    The `@Named` built-in qualifier is used by the beans that are required to be made
    accessible to the Web tier through the Unified Expression Language (EL). By default,
    the bean name with its first letter in lowercase is used to access the bean. A
    non-default name can be passed as an argument to the `@Named` qualifier.


    ##### @New


    The `@New` qualifier disassociates an instance of the bean from its declared scope.
    An application can obtain the bean instances that are not bound to the declared
    scope by using the `@New` qualifier. The `@New` qualifier forces the container
    to create a new instance of the bean that is not bound to the specified CDI contextual
    life cycle.


    For example, an instance of `newWine`, as shown in Listing [10-10](#A311833_3_En_10_Chapter.html#Par131),
    will be application scoped as it is qualified with the `@Red` annotation and the
    `RedWine` bean is application scoped. If we update the client to include the `@New`
    annotation, as shown in Listing [10-13](#A311833_3_En_10_Chapter.html#Par141),
    then the `newWine` instance will be dependent scoped—adopt the life cycle of its
    normal Java context—and not application scoped.


    ```

    package com.apress.ejb.chapter10;

    import javax.enterprise.inject.New;

    import javax.inject.Inject;

    public class WineClient {

    // Instantiating in classic way

    // private Wine oldWine = new RedWine();

    // Instantiating via field dependency injection

    @Inject

    @Red

    @New

    private Wine newWine;

    }

    Listing 10-13

    WineClient.java

    ```


    User-defined qualifiers can be created using the `@Qualifier` annotation, as shown
    in Listing [10-8](#A311833_3_En_10_Chapter.html#Par127).


    ### Alternatives


    Alternatives enable the CDI components to interact in a loosely coupled way by
    providing polymorphism at deployment time. An alternative bean is declared by
    annotating the bean class with an `@Alternative` annotation. An alternative bean
    must be explicitly declared in the `beans.xml` file if it has to be available
    for lookup, injection, or EL resolution. When an ambiguous dependency exists at
    an injection point, the container attempts to resolve the ambiguity by looking
    for the available alternative among the beans that could be injected.


    Alternatives use the information supplied in `beans.xml` to select the implementation
    that needs to be instantiated. As the responsibility of choosing the implementation
    is shifted out of the Java code and into a deployment descriptor, recompilation
    of the Java code is not warranted if we decide to choose a different implementation.


    To resolve a dependency at deploy time using alternatives, add the `@javax.enterprise.inject.Alternative`
    annotation to the `RedWine` and the `WhiteWine` implementations mentioned in Listing
    [10-2](#A311833_3_En_10_Chapter.html#Par66) and Listing [10-7](#A311833_3_En_10_Chapter.html#Par120),
    respectively. Then update the `beans.xml` with the implementation class that should
    be instantiated, as shown in Listing [10-14](#A311833_3_En_10_Chapter.html#Par146).
    The CDI container will instantiate the `RedWine` class in this case. Recompilation
    of the client is not required if we decide to instantiate the `WhiteWine` class
    later. We only need to update the `beans.xml` descriptor accordingly. If at deployment
    time the `beans.xml` contains more than one implementation class or with a class
    name that cannot be resolved, the container automatically detects the problem
    and treats it as an error.


    ```


    com.apress.ejb.chapter10.RedWine


    Listing 10-14

    beans.xml

    ```'
