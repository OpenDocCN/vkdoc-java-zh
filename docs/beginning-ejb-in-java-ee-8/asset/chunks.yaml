    #### Message Acknowledgment


    The EJB container provides a message acknowledgment service. There are two message
    acknowledgment modes:


    *   `Auto-acknowledge`

    *   `Dups-ok-acknowledge`


    In the case of `Auto-acknowledge` , the message delivery acknowledgment happens
    after the `onMessage()` method. This property is useful for applications that
    require no duplicate messages. For example, a new order should be received by
    the inventory system once and only once. In the case of `Dups-ok-acknowledge`
    , the acknowledgment is done lazily, which means that there might be duplicate
    delivery of messages, but it reduces the overhead for the session in terms of
    immediate acknowledgment. For example, an e-mail message that gets sent out during
    the order process can possibly allow duplicate messages. We can use the `@ActivationConfigProperty`
    annotation to specify the message acknowledgment property. Listing [5-4](#A311833_3_En_5_Chapter.html#Par76)
    shows the property set to allow duplicates.


    ```

    @MessageDriven(

    activationConfig= {

    @ActivationConfigProperty(propertyName="acknowledgeMode",

    propertyValue="Dups-ok-acknowledge")}

    )

