  raw: 'Coupled to this stateful session bean is an Interceptor class that serves
    to interpose on each method that applies changes through the EntityManager to
    automatically begin a transaction. This pattern is similar to SQL’s transactional
    model, where a transaction is implicitly begun each time a DML operation like
    INSERT, UPDATE, or DELETE is called. Hence, the client is responsible only for
    calling COMMIT or ROLLBACK to conclude the transaction, but there is no explicit
    call to begin the transaction. The Interceptor class is shown here, in Listing
    [8-6](#A311833_3_En_8_Chapter.html#Par147).


    ```

    class OrderProcessorBMTBeanTxnInterceptor {

    public OrderProcessorBMTBeanTxnInterceptor() {

    }

    @AroundInvoke

    Object beginTrans(InvocationContext invocationContext) throws Exception {

    final OrderProcessorBMTBean orderProcessorBMTBean = (OrderProcessorBMTBean) invocationContext.getTarget();

    final UserTransaction txn = orderProcessorBMTBean.sessionContext.getUserTransaction();

    if (txn.getStatus() == Status.STATUS_NO_TRANSACTION) {

    txn.begin();

    }

    return invocationContext.proceed();

    }

    }

