    Web service stubs given a valid WSDL document. In case you are deploying the Web
    service to other Java EE compatible servers, these servers might also provide
    some tools or utilities to generate the stubs for the Web service.


    Once the stubs are generated and compiled, the next step is to create a client
    that will consume `CreditService`.


    The JAX-WS specification provides the `@WebServiceRef` annotations that can be
    used to declare a reference to a Web service, which in our case is `CreditService`.


    The `@WebServiceRef` annotation can take the parameters described in Table [6-5](#A311833_3_En_6_Chapter.html#Tab5).


    Table 6-5


    The @WebServiceRef Annotation


    | Parameter | Description | Additional Info |

    | --- | --- | --- |

    | `name` | The name that identifies the Web service reference | The name that
    is local to the application component using the resource |

