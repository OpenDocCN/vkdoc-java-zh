  raw: '## Compiling, Deploying, and Testing the CDI Application


    Unlike EJB, CDI doesn’t define any special deployment archive. CDI beans can be
    packaged within a JAR, EJB-JAR, or WAR file. The only condition is that the archive
    must be a bean archive, which means that the archive must include the `beans.xml`
    descriptor. The location of CDI beans within an archive is dependent on the location
    of its `beans.xml` .


    *   If the `beans.xml` is located in the `META-INF` directory of the archive,
    then the CDI beans must be packaged in a library JAR, an EJB JAR, or a RAR archive.

    *   If the `beans.xml` is located in the `WEB-INF` directory of the WAR file,
    then the CDI beans must be packaged in `WEB-INF/classes` directory of a WAR file.


    In the case of some CDI containers, packaged CDI archives need to be assembled
    into an Enterprise Archive (EAR) file before deployment. Application servers provide
    deployment utilities or Ant tasks to facilitate deployment of CDI beans. Java
    IDEs (integrated development environments) like JDeveloper, NetBeans, and Eclipse
    also provide deployment features that allow developers to package and deploy CDI
    beans to an application server.


    Throughout this chapter, we have used code snippets that demonstrate the two core
    aspects of CDI: scope and dependency injection. We started with developing a simple
    `Wine` interface and then went on to create two implementations of it – `RedWine`
    and `WhiteWine`. We learned about the various scopes and added the application
    scope to the `RedWine` implementation. We also saw examples that resolved ambiguous
    dependency by using qualifiers, alternatives, and producers. The `WineClient`
    client that we listed in the chapter until now demonstrates how clients can potentially
    interact with the CDI beans, but it is not a full-fledged executable client. We
    will now convert the `WineClient` client into a servlet client and test the CDI
    beans using it by deploying them on the GlassFish application server. The following
    sections will walk you through the steps necessary to compile, deploy, and test
    these CDI beans using their corresponding servlet clients.


    ### Prerequisites


    Before performing any of the steps detailed in the next sections, complete the
    “Getting Started” section of chapter [1](#A311833_3_En_1_Chapter.html). This section
    will walk you through the installation and environment setup required for the
    samples in this chapter.


    Note


    While creating a new NetBeans project, make sure that you have selected the “Enable
    Contexts and Dependency Injection” check box on the “Server and Settings” page
    of the new application wizard. This will create a `beans.xml` and add the CDI-related
    runtime libraries to your project.


    ### Structure of the Sample Code


    We have divided the samples into the following four packages, and all the artifacts
    within those packages have the package-private scope. We do this separation so
    that the CDI objects and their clients do not interfere with each other, and we
    can observe their behavior in isolation.


    *   `com.apress.ejb.chapter10.userdefinedqualifier`

    *   `com.apress.ejb.chapter10.anyqualifier`

    *   `com.apress.ejb.chapter10.alternatives`

    *   `com.apress.ejb.chapter10.producers`


    ### Compiling the CDI Beans and Their Clients


    Copy the `Chapter10-CDISamples` directory and its contents into a directory of
    your choice. Run the NetBeans IDE, and open the `Chapter10-CDISamples` project
    using the `File` ➤ `Open Project` menu, as shown in Figure [10-3](#A311833_3_En_10_Chapter.html#Fig3).


    ![A311833_3_En_10_Fig3_HTML.jpg](A311833_3_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Opening the Chapter10-CDISamples project


    Expand the `Chapter10-CDISamples` node and observe that the various packages listed
    above appear under the `Source Packages` section as shown in Figure [10-4](#A311833_3_En_10_Chapter.html#Fig4).


    ![A311833_3_En_10_Fig4_HTML.jpg](A311833_3_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Verifying the packages in the Chapter10-CDISamples project


    Invoke the context menu on the `Chapter10-CDISamples` node, and build the application
    by selecting the `Clean and Build` menu option, as shown in Figure [10-5](#A311833_3_En_10_Chapter.html#Fig5).
    The CDI bean and their clients compile without any errors.


    ![A311833_3_En_10_Fig5_HTML.jpg](A311833_3_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Building the project


    ### Deploying and Running the CDI Clients


    Once we have compiled the CDI project, we can run the clients directly using the
    `Run` option available on the context menu of each of the servlet clients. When
    we run the servlet client the NetBeans IDE will automatically package the CDI
    beans and their clients and deploy them to the integrated GlassFish application
    server.


    #### Testing the User-Defined Qualifier Client


    We will start with testing and experimenting with the user-defined qualifier `Red`,
    which we created in Listing [10-8](#A311833_3_En_10_Chapter.html#Par127) and used
