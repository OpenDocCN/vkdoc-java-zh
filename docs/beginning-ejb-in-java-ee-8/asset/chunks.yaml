- fmt: '# Support for Optimistic Locking (`@Version`)


    As shown in the previous examples, you can use the `@Version` annotation to designate
    a field to be used by the `EntityManager` to perform optimistic locking for merge
    operations and concurrency management. Optimistic locking is a useful performance
    optimization that offloads work that would otherwise be required of the database.
    Databases typically offer a pessimistic locking service that allows the database
    client (in our case, the JPA `EntityManager`) to lock a row in a table to prevent
    another client from updating it while the `EntityManager` is applying some changes.
    This is an effective mechanism to ensure that two clients do not modify the same
    row at the same time, but it requires expensive, low-level access checks inside
    the database. An alternative to pessimistic locking is to move concurrency control
    into a database client like the `EntityManager` and employ an optimistic locking
    strategy. Using a dedicated `@Version` column, the `EntityManager` follows a couple
    of simple rules. Whenever it sends a modified entity out to the database, as during
    a commit or flush operation, it looks at the current value of the entity instance’s
    `@Version` field, queries the current state of that entity’s row from the database,
    and compares the version values. If they are the same, it increments the entity
    instance’s `@Version` field (or whatever field is annotated `@Version`), and it
    sends the change out to the database, causing an `UPDATE` statement to be executed.
    If the version values are different, this means that some other client modified
    the row between the time the row was last queried by the `EntityManager` and loaded
    into an entity instance and the time that instance was flushed back out to the
    database. When such a difference is detected, we call it a concurrency exception,
    and the `EntityManager` throws an exception and marks the transaction for rollback.
    The client of the `EntityManager` needs to anticipate that a concurrency exception
    might occur, and it must be prepared to resolve the conflict, typically by notifying
    the user of the conflict so that the entity can be refreshed before proceeding.


    The use of a dedicated `@Version` column on an entity allows the `EntityManager`
    to perform optimistic locking simply by comparing the value of the `@Version`
    field stored in the entity instance with the value of the `VERSION` column in
    the database. If you don’t specify an `@Version` field, the `EntityManager` has
    to walk through each field in the entity instance and compare its value to its
    corresponding, mapped column in the database, which is far more laborious. A declared
    `@Version` field will be auto-populated by the persistence framework and should
    not be updated by application code.


    The bottom line is that it’s not a requirement to use an `@Version` field, but
    it’s good practice to define an `@Version` field on your entities to allow the
    `EntityManager` to take advantage of this optimization.


    # Support for Autogenerated Primary Key Values (`@GeneratedValue`)


    In addition to built-in optimistic locking support through the `@Version` column,
    JPA provides several convenient ways to auto-populate primary key columns when
    an entity is persisted. You can declare that a field’s value should be populated
    using the following:


    * An automatic mechanism maintained by the persistence framework (`strategy=GenerationType.AUTO`)

    * A custom database sequence (`strategy=GenerationType.SEQUENCE` or `GenerationType.IDENTITY`)

    * A custom database table, emulating a pseudo-sequence (`strategy=GenerationType.TABLE`)


    We have found the auto-populated PK feature to be very high on the convenience
    scale, saving us from coding this up for each entity in our application. Using
    schema generation settings on the persistence unit in `persistence.xml` allows
    you to have JPA auto-create the required artifacts (sequence or table) in the
    database and even configure them with the settings specified through JPA metadata
    using annotations or XML. Once installed, the `AUTO` case generates unique identifiers
    for any `@Id` field that is annotated `@GeneratedValue` or `@GeneratedValue(strategy=GenerationType.AUTO)`,
    and at least it leaves the entity class a little less cluttered. Since not all
    databases support sequence objects, you may wish to use a table generator, as
    shown in the examples throughout this chapter.


    Listing [4-31](#A311833_3_En_4_Chapter.html#Par166) demonstrates usage of the
    default ID generation feature.


    ```

    @Entity

    @Inheritance(strategy = InheritanceType.JOINED)

    @DiscriminatorColumn(name = "TYPE")

    @Table(name = "CH04_JOIN_PERSON")

    @NamedQuery(name = "findAllPerson", query = "select object(o) from Person o")

    public abstract class Person implements Serializable {

    @Id

    @GeneratedValue

    private Long id;

    /* ... */

    }

    Listing 4-31

    Person.java, Employing a Default ID Generator

    ```


    SQL scripts to generate all the tables and sequences for the examples in this
    chapter are available in the Sample Code area. In addition, JPA providers generate
    DDL objects, and even some DML that it requires, to support any entities that
    are deployed; so pre-creating a schema is not strictly necessary. However, while
    JPA will take guidance about what table and column names to use, for example,
    there is currently no way to specify the names of constraints or other artifacts
    that are created automatically for you. Thus, if you need to control the names
    and other details of the mapped objects, it is best to pre-create the schema before
    you first deploy your persistence unit.


    To illustrate how to pre-create the tables and sequences required for ID generation,
    Listings [4-31](#A311833_3_En_4_Chapter.html#Par169) and [4-32](#A311833_3_En_4_Chapter.html#Par169)
    show the DDL required to create the ID generator tables and sequences used in
    these examples.


    ```

    /**

    * To create ID generator sequence "CH04_SEQID_PERSON_ID_GEN":

    * CREATE SEQUENCE "CH04_SEQID_PERSON_ID_GEN" INCREMENT BY 50 START WITH 50;

    */

    @Entity

    @Table(name = "CH04_JOIN_PERSON")

    @SequenceGenerator(name = "Person_ID_Generator", sequenceName = "CH04_JOIN_PERSON_ID_GEN",

    allocationSize = 50, initialValue=1)

    @Inheritance(strategy = InheritanceType.JOINED)

    public abstract class Person implements Serializable {

    ...

    @Id

    @Column(nullable = false)

    @GeneratedValue(strategy = GenerationType.SEQUENCE, generator = "Person_ID_Generator")

    private Integer id;

    ...

    }

    Listing 4-32

    Usage of @GeneratedValue with a @SequenceGenerator

    ```


    Listing [4-33](#A311833_3_En_4_Chapter.html#Par171) provides an example of a table-based
    ID generator declaration, along with an INSERT statement for creating a named
    row for the pseudo-sequence.


    ```

    /**

    * To create ID generator table "CH04_JOIN_PERSON_ID_GEN": CREATE TABLE

    * "CH04_JOIN_PERSON_ID_GEN" ("PRIMARY_KEY_NAME" VARCHAR2(4000) PRIMARY KEY,

    * "NEXT_ID_VALUE" NUMBER(38));

    *

    * To initialize this table with data for this entity''s ID generator ''Person.id''

    * (starting with value ''0''): INSERT INTO "CH04_JOIN_PERSON_ID_GEN" VALUES

    * (''Person.id'', 0);

    */

    @Entity

    @Table(name = "CH04_JOIN_PERSON")

    @TableGenerator(name = "Person_ID_Generator", table = "CH04_JOIN_PERSON_ID_GEN",

    pkColumnName = "PRIMARY_KEY_NAME", pkColumnValue = "Person.id",

    valueColumnName = "NEXT_ID_VALUE")

    @Inheritance(strategy = InheritanceType.JOINED)

    public abstract class Person implements Serializable {

    ...

    @Id

    @Column(nullable = false)

    @GeneratedValue(strategy = GenerationType.TABLE, generator = "Person_ID_Generator")

    private Integer id;

    ...

    }

    Listing 4-33

    Usage of @GeneratedValue with a @TableGenerator

    ```'
