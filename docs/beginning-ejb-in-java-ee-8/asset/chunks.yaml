  trans: '

    #### 示例实体层次结构


    为了说明这三种策略如何在代码中体现，图 4-1 展示了一个示例实体层次结构，其中同时体现了继承和多态关系。


    ![A311833_3_En_4_Fig1_HTML.jpg](img/A311833_3_En_4_Fig1_HTML.jpg)


    图 4-1


    一个以基础实体 Person 为根的实体类型层次结构，展示了层次结构内部和外部的实体之间的关系


    在此示例中，`Person` 实体作为实体层次结构中的根类，并由 `Employee` 实体扩展。`Employee` 进一步特化，衍生出另外两个实体：`FullTimeEmployee`
    和 `PartTimeEmployee`。图中通过无名称的白色箭头表示继承关系，通过有名称的开放箭头表示普通实体关系。


    在我们的示例中，根实体 `Person` 和中间实体 `Employee` 都是抽象的。只有叶子实体 `FullTimeEmployee` 和 `PartTimeEmployee`，以及独立实体
    `Address` 是具体的且可实例化的。请注意，即使是抽象实体也可能参与与其他实体的关系，并且正如你将从后续代码中看到的，抽象实体也可能在 JPQL 语句中使用。每当引用非叶子实体时，该引用隐式地假定所引用的实际具体实现可能是该实体或其任何子类实体。不过，非叶子实体也可以是具体的，如果我们选择在示例中这样做，我们可以将这些基类设为具体类。


    根实体 `Person` 还持有一个对 `Address` 实例的单值引用，由 `Person` 上的 `homeAddress` 字段表示。此关系被 `Person`
    的所有子类继承；因此，所有 `Employee`（`FullTimeEmployee` 和 `PartTimeEmployee`）的实例也可以引用它们的 `homeAddress`
    字段。请注意，`Address` 上没有对应的字段引用 `Person`，因此这是一个单向关系。从上一章关于实体关系的讨论中，你会记得这是一个一对一关系。


    注意


    两个实体之间仅通过其中一个实体的字段暴露的关系称为**单向关系**。通过两个实体的字段暴露的关系称为**双向关系**。


    此外，我们在 `FullTimeEmployee`（一个 `manager`）和一组 `Employee`（其 `managedEmployees`）之间定义了一个一对多、双向的关系。由于此关系通过关系两端的字段暴露（在这种情况下，涉及的两个实体实际上是同一个实体
    `Employee`），因此这是一个双向的一对多关系。


    在查看每个示例时，你会看到 Java 源文件在三种继承映射策略中基本保持不变。只有用于声明继承策略的类级别注解以及一些细节（如表名）将一个示例中的实体与另一个示例中的实体区分开来。这是一个关键优势——可以在不影响实体
    Java API 的情况下替换所选的继承策略。在接下来的三节中，我们将说明如何将每种映射策略应用于此层次结构。


    在这些继承示例中，我们为 `Address` 实体包含了一个单独的表，该表与映射到每个继承层次结构的表并列，如数据库模式图所示。严格来说，不必为每个实体层次结构替换
    `ADDRESS` 表，因为与 `Person` 实体关联的任何表都可以持有其自身对公共 `ADDRESS` 表的外键引用。然而，我们采用这种方法是为了帮助隔离每个继承示例。


    #### 对象/关系继承映射策略


    注意


    除非另有说明，你可以假定本章中提到的所有 JPA 类都在 `javax.persistence.*` 包中。


    现在我们已经定义了实体层次结构，让我们看看 JPA 原生支持的三种 O/R 策略如何用于将此 `Person` 实体层次结构以及关联的 `Address`
    实体映射到关系模式。以下是 `InheritanceType` 枚举定义的每种策略的总结：


    *   `SINGLE_TABLE`：每个类层次结构一张表。这是默认策略。实体层次结构本质上被扁平化为其字段的总和，这些字段被映射到单个表中。

    *   `JOINED`：公共基表与连接的子类表。在这种方法中，层次结构中的每个实体都映射到其自己的专用表，该表仅映射在该实体上声明的字段。层次结构中的根实体映射到基表，层次结构中所有其他实体的表都引用此基表。

    *   `TABLE_PER_CLASS`：每个最外层具体实体类一张表。第三种继承映射选项对于符合 JPA 2.1 规范最终草案的 JPA 容器也不是必需的，因此可移植的应用程序应避免使用它，直到它被正式强制要求或至少得到广泛支持。此策略将每个叶子（即最外层、具体的）实体映射到其自己的专用表。每个这样的叶子实体分支被扁平化，将其声明的字段与其所有超实体上声明的字段组合起来，这些字段的总和被映射到其表上。


    ```

    public enum InheritanceType

    { SINGLE_TABLE, JOINED, TABLE_PER_CLASS };

    ```


    ##### @GeneratedValue 注解


    在每个继承策略示例中，我们使用 `@GeneratedValue` 注解来自动填充 `Person` 实体层次结构和独立实体 `Address` 的主键。在我们的示例中，为了保持一致性，我们指定一个名为
    `id` 的字段作为主键。在元数据中指定 ID 生成器允许持久化提供程序在实体实际作为一行保存到数据库之前为其分配 ID 值。声明式地指定 `@GeneratedValue`
    注解当然比在应用程序代码中分配 ID 更容易，并且相对于使用数据库触发器自动填充 ID 值的替代方案，这也是一种优化。由于在持久化关系映射时会使用 ID 值，这节省了持久化管理器再次从数据库查询该行以检索触发器填充值的麻烦。有关如何自定义基于序列或表的
    ID 生成器的详细信息将在本章后面提供。


    我们现在将探讨每种策略，讨论其优缺点，并通过示例说明其用法。


    注意


    下面列表中显示的示例的 Java 源文件都可以在本章的源代码区域中找到。

    '
- fmt: "### Single-Table-per-Class Inheritance Hierarchy (`InheritanceType.SINGLE_TABLE`)\n\
    \nThe default inheritance mapping strategy is `SINGLE_TABLE`, in which all the\
    \ entities in the class hierarchy map onto a single table. A dedicated discriminator\
    \ column on this table identifies the specific entity type associated with each\
    \ row, and each entity in the hierarchy is given a unique value to store in this\
    \ column. By default, the discriminator value for an entity is its entity name,\
    \ although an entity may override this value using the `@DiscriminatorValue` annotation.\
    \ This approach performs well for querying, since only a single table is involved,\
    \ and if your type of hierarchy can abide by the practical limitations, this is\
    \ probably the best approach to use.\n\nFigure [4-2](#A311833_3_En_4_Chapter.html#Fig2)\
    \ shows a diagram of a schema that maps our example entities using the `SINGLE_TABLE`\
    \ strategy. We have chosen to prefix these tables with `CH04_ST_` to avoid conflicts\
    \ with the `PERSON` and `ADDRESS` tables in our example schema that are used by\
    \ the full Enterprise Wines Online application.\n\n![A311833_3_En_4_Fig2_HTML.jpg](A311833_3_En_4_Fig2_HTML.jpg)\n\
    \n**Figure 4-2**\n\nThe `CH04_ST_PERSON` table holds all entity instances in the\
    \ entity hierarchy rooted by `Person`. The `CH04_ST_ADDRESS` table holds the associated\
    \ `Address` instances.\n\nAll of the properties across the entity hierarchy rooted\
    \ by the `Person` entity map to columns on a single table, `CH04_ST_PERSON`. This\
    \ table holds a foreign key reference, bound to the `HOME_ADDRESS` column, to\
    \ `CH04_ST_ADDRESS`, which is mapped to the `Address` entity. It also holds a\
    \ foreign key reference, using the `MANAGER` column, back to itself. This foreign\
    \ key is not constrained to be unique, indicating that multiple rows may hold\
    \ the same value in their `MANAGER` column.\n\n#### Example Entity Classes\n\n\
    Listings [4-1](#A311833_3_En_4_Chapter.html#Par41) through [4-4](#A311833_3_En_4_Chapter.html#Par44)\
    \ show how the entities in the `Person` hierarchy are mapped using the `SINGLE_TABLE`\
    \ inheritance strategy. The inheritance strategy is declared on the root entity\
    \ in the hierarchy, and it also applies to all subentities in the hierarchy. Annotations\
    \ introduced in the example entities that have not yet been covered are explained\
    \ in the sections that follow.\n\n```\n/*\n* Person: An abstract entity, and the\
    \ root of an inheritance hierarchy\n*\n* To create ID generator table \"CH04_ST_PERSON_ID_GEN\"\
    :\n* CREATE TABLE \"CH04_ST_PERSON_ID_GEN\" (\"PRIMARY_KEY_NAME\" VARCHAR2(4000)\
    \ PRIMARY KEY,     \"NEXT_ID_VALUE\" NUMBER(38));\n*\n* To initialize this table\
    \ with data for this entity's ID generator 'Person.id' (starting with     value\
    \ '0'):\n* INSERT INTO \"CH04_ST_PERSON_ID_GEN\" VALUES ('Person.id', 0);\n*/\n\
