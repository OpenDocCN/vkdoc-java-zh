  trans: '

    ## 摘要


    在本章中，我们介绍了可用于满足不同需求的各种应用架构，以及与之配套的编程模型。我们探讨了适用于 Web 和桌面应用的架构，还研究了能够利用发布为 Web 服务的
    EJB 的 Web 服务客户端应用和业务流程服务。


    我们讨论了基于 Java EE 的 Web 技术如何演进，从而显著简化了 Web 应用开发。


    我们深入剖析了 JSF 架构、JSF 生命周期和 JSF 应用，以及 JSF 工具和 UI 组件的当前状态。


    最终，我们构建了一个全面的 JSF 应用，用于与第 7 章开发的集成式 EJB 后端应用进行通信。在开发过程中，我们演示了几种编程技术，用于在 JSF 应用中共享数据，以及在后端应用中查找和调用业务方法。


    最后，我们研究了应用客户端容器，包括它为在桌面机器上运行的客户端程序提供的服务。


    本书的最后一章将详细介绍各种 EJB 测试场景，并指导您如何使用 JUnit 在 GlassFish 的可嵌入 EJB 容器中测试 EJB 组件（和 JPA
    实体）。


    # 13. 在可嵌入 EJB 容器中进行测试


    与所有关键任务软件一样，EJB 组件在部署到生产环境之前必须经过充分测试。EJB 中最精细的粒度是其方法；因此，适当的单元测试必须隔离地测试每个 EJB 的每个方法。对于无状态会话
    Bean，这通常就足够了。由于有状态会话 Bean 也可能包含状态，因此完全覆盖还需要包含更粗粒度的场景，涉及方法调用序列。当无状态会话 Bean 通过 JPA
    实体等方式在数据库中有效存储“状态”信息时，通常也需要多步骤的测试场景。在本章中，我们将研究单方法和多方法测试，涵盖主要作为基于 JPA 操作的服务接口的无状态和有状态会话
    Bean。


    ## 测试客户端


    到目前为止，本书中的示例主要使用 Servlet 作为客户端来调用 EJB 方法。使用诸如 ServletUnit 之类的测试框架，Servlet 可以作为测试
    EJB 的可行单元测试平台。类似地，调用 EJB 的 JSF 客户端可以使用 HttpUnit 框架进行单元测试，该框架允许您记录用户在浏览器中与 JSF
    客户端的交互，然后将实际屏幕结果与预期屏幕结果进行比较。然而，这两种方法都必须在完整的 Java EE 应用服务器内执行。在本章中，我们将探索一种在纯 Java
    SE 环境中测试 EJB 的轻量级选项。


    ## EJB Lite


    EJB Lite 在 EJB 3.1 中引入，并在 EJB 3.2 中进一步增强，它被指定为完整 EJB 容器功能的最小子集。认识到许多企业应用只需要完整
    EJB API 的一个子集，EJB Lite 包含了 EJB 的许多最重要特性，但占用空间更小。EJB Lite 的实现包括下面描述的可嵌入 EJB 容器；以及
    Java EE Web Profile。


    由于 EJB Lite 是 EJB API 的严格子集，任何符合 EJB Lite 的应用也将在 Java EE 服务器内的完整 EJB 容器中运行。也就是说，EJB
    Lite 不显式支持 EJB API 之外的任何行为。


    ## 可嵌入 EJB 容器


    可嵌入 EJB 容器本质上是一个 Java 库，它提供由 EJB Lite 规范定义的服务。它模拟在 Java EE 环境中运行的 EJB 容器，但它在 Java
    SE 环境中运行。实际上，尝试从 Java EE 环境内部实例化可嵌入 EJB 容器是受限的。这个可嵌入容器为 EJB 提供了一个运行环境，提供注入的资源、安全性和
    JTA 事务接口，以便 EJB 可以在受控环境中进行测试。


    ## 本章组织方式


    在本章中，我们将探讨围绕单元测试的一些主要概念。然后，我们将研究如何使用可嵌入 EJB 容器设置、执行和调试 JUnit 测试，并从我们的 WineApp
    应用中的几个场景中汲取经验。接下来，我们将仔细研究 EJB Lite 提供的服务，揭示其优势和局限性，并展示一些有用的捷径来隔离正在测试的 EJB 和 JPA
    组件，同时降低测试环境的复杂性。


    在研究了使您能够在可嵌入 EJB 容器中使用 EJB 的 JUnit 测试代码之后，我们将研究一些您可以利用的、特别适合测试环境的配置选项。在本章结束时，我们将逐步指导您如何在
    NetBeans 中设置和配置 JUnit 环境，然后执行和调试测试。


    ### 概念


    让我们更仔细地研究一下本章将涵盖的一些主要概念。


    #### JUnit


    JUnit 是一个广泛用于测试各种形式 Java 类的测试框架。测试类是普通的 Java 类，它们被注解以标识具有特殊用途的方法。被注解为 `@Test`
    的方法标识一个单独的单元测试。该测试在被测试的类上调用一个或多个方法，获取调用这些方法的结果，并将实际结果与预期结果进行比较。当它们不同时，测试报告失败，测试人员会收到警报，表明某个测试需要关注。


    通过编写全面测试一个或多个类行为的 JUnit 测试，测试人员可以在每次对被测代码或任何间接调用的代码进行更改时执行这些测试。任何失败都表明预期的行为不再发生。此外，由于单元测试通常针对非常特定的功能点，失败的测试可以清晰地告知测试人员导致问题的特定代码区域。


    由于 EJB 是一个遵循公共接口的组件，它非常适合这种形式的单元测试。EJB 3.1 引入的 EJB Lite 和可嵌入 EJB 容器正式允许 EJB 在纯
    Java SE 环境中通过 JUnit 测试框架进行单元测试，而无需修改。


    #### EJB Lite


    让我们更仔细地研究一下构成 EJB Lite 的特性子集。表 13-1 显示了 EJB 3.2 的主要特性中哪些包含在 EJB 3.2 Lite 中。


    表 13-1


    属于 EJB 3.2 Lite 一部分的 EJB 3.2 特性


    | EJB 3.2 特性 | 是否包含在 EJB 3.2 Lite 中 |

    | --- | --- |

    | 会话 Bean（无状态、有状态和单例） | 是 |

    | 消息驱动 Bean (MDB) | 否 |

    | 实体 Bean (EJB 2.x) | 否 |

    | Java 持久化 API (JPA) 2.0 | 是 |

    | 无接口视图 | 是 |

    | 本地业务接口 | 是 |

    | 远程接口 | 否 |

    | 可嵌入 API | 是 |

    | JAX-WS Web 服务端点 | 否 |

    | JAX-RPC Web 服务端点 | 否 |

    | 非持久化 EJB 定时器服务 | 是 |

    | 持久化 EJB 定时器服务 | 否 |

    | 本地异步会话 Bean 调用 | 是 |

    | 远程异步会话 Bean 调用 | 否 |

    | 拦截器 | 是 |

    | RMI-IIOP 互操作性 | 否 |

    | 容器管理事务 | 是 |

    | Bean 管理事务 | 是 |

    | 声明式安全 | 是 |

    | 编程式安全 | 是 |


    最值得注意的是，在 EJB 3.2 Lite 中，支持所有形式的本地会话 Bean，但不支持远程会话 Bean、MDB 和作为 Web 服务的 EJB。EJB
    Lite 中包含安全性和 JTA 支持，包括对 BMT 和 CMT 的支持。最后，为 JPA 提供了对 EntityManager 和 EntityManagerFactory
    注入的支持。

