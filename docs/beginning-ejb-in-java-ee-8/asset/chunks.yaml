- fmt: '### Dependency Injection in MDBs


    MDBs can use dependency injection to acquire references to resources such as JavaMail,
    EJBs, or other objects. The resources that an MDB tries to acquire and use must
    be available in the container context or environment context.


    In the sample use case from Figure [5-5](#A311833_3_En_5_Chapter.html#Fig5), we
    talked about creating an e-mail after the message is processed and sending the
    order status to the customer via e-mail. In order to do this in the `StatusMailer`
    message bean, we need to acquire a JavaMail session so that we can create an e-mail
    and send it. JavaMail is an API that provides a platform-independent framework
    for building mail applications. The JavaMail API is available with the Java EE
    platform.


    We can acquire a JavaMail session in an MDB using dependency injection. Listing
    [5-7](#A311833_3_En_5_Chapter.html#Par86) shows the completed `StatusMailer` MDB
    using dependency injection and the JavaMail API. The `@Resource` annotation is
    used to inject a JavaMail session with the name `mail/wineappMail`, which has
    been registered as a mail resource in the GlassFish application server. The injected
    mail session is used to create `javax.mail.Message`, and the setter methods are
    used to create the headers and content of the mail message. Finally, the `send()`
    method in the `javax.mail.Transport` class is used to send the created message.


    ```

    package com.apress.ejb.chapter05;

    import javax.annotation.Resource;

    import javax.ejb.ActivationConfigProperty;

    import javax.jms.Message;

    import javax.ejb.MessageDriven;

    import javax.jms.MapMessage;

    import javax.mail.Transport;

    import javax.mail.internet.InternetAddress;

    import javax.mail.internet.MimeMessage;

    @MessageDriven(activationConfig= {

    @ActivationConfigProperty(propertyName="destinationName",

    propertyValue="StatusMessageTopic"),

    @ActivationConfigProperty(propertyName="destinationType",

    propertyValue="javax.jms.Topic")

    }, mappedName="StatusMessageTopic")

    public class StatusMailerBean implements javax.jms.MessageListener{

    @Resource(name="mail/wineappMail" )

    private javax.mail.Session ms;

    public void onMessage(Message message){

    try  {

    if (message instanceof MapMessage) {

    MapMessage orderMessage = (MapMessage)message;

    String from = orderMessage.getStringProperty("from");

    String to = orderMessage.getStringProperty("to");

    String subject = orderMessage.getStringProperty("subject");

    String content = orderMessage.getStringProperty("content");

    javax.mail.Message msg = new MimeMessage(ms);

    msg.setFrom(new InternetAddress(from));

    InternetAddress[] address = {new InternetAddress(to)};

    msg.setRecipients(javax.mail.Message.RecipientType.TO, address);

    msg.setSubject(subject);

    msg.setSentDate(new java.util.Date());

    msg.setContent(content, "text/html");

    System.out.println("MDB: Sending Message...");

    Transport.send(msg);

    System.out.println("MDB: Message Sent");

    }

    else {

    System.out.println("Invalid message ");

    }

    } catch (Exception ex)  {

    ex.printStackTrace();

    }

    }

    }

