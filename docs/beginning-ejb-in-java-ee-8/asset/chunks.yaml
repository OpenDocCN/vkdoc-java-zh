    Java EE 的服务器，这些服务器也可能提供一些工具或实用程序来生成 Web 服务的存根。


    一旦存根生成并编译完成，下一步就是创建一个将使用 `CreditService` 的客户端。


    JAX-WS 规范提供了 `@WebServiceRef` 注解，可用于声明对 Web 服务的引用，在我们的案例中就是 `CreditService`。


    `@WebServiceRef` 注解可以接受表 6-5 中描述的参数。


