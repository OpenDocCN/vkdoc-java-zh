    OrderProcessingBean.java

    ```


    **Note**


    In Listing [5-8](#A311833_3_En_5_Chapter.html#Par123), update the value of “from”
    and “to” fields to your e-mail ID.


    One last thing we need to do to complete the use case discussed in Figure [5-5](#A311833_3_En_5_Chapter.html#Fig5)
    is to come up with the client application that will look up the `OrderProcessing`
    session bean and invoke the `SendOrderStatus()` message. Listing [5-9](#A311833_3_En_5_Chapter.html#Par126)
    shows the code for the client application. In the `try` block, we are doing a
    JNDI lookup of the `OrderProcessing` session bean and calling the `SendOrderStatus()`
    business method.


    ```

    package com.apress.ejb.chapter05;

    import java.io.IOException;

    import java.io.PrintWriter;

    import javax.ejb.EJB;

    import javax.servlet.ServletException;

    import javax.servlet.annotation.WebServlet;

    import javax.servlet.http.HttpServlet;

    import javax.servlet.http.HttpServletRequest;

    import javax.servlet.http.HttpServletResponse;

    @WebServlet(name = "StatusMailerClient", urlPatterns = {"/StatusMailerClient"})

    public class StatusMailerClient extends HttpServlet {

    @EJB

    OrderProcessingBean orderProcessing;

    protected void processRequest(HttpServletRequest request, HttpServletResponse
    response)

    throws ServletException, IOException {

    response.setContentType("text/html;charset=UTF-8");

    PrintWriter out = response.getWriter();

    try {

    out.println("");

    out.println("");

    out.println("Servlet StatusMailerClient");

    out.println("");

    out.println("");

    out.println("OrderProcessing session bean lookup to be done");

    out.println("Invoking SendOrderStatus() business method now");

    out.println("" + orderProcessing.SendOrderStatus() + "");

    out.println("Done !!!");

    out.println("");

    out.println("");

    } finally {

    out.close();

    }

    }

    @Override

    protected void doGet(HttpServletRequest request, HttpServletResponse response)

    throws ServletException, IOException {

    processRequest(request, response);

    }

    @Override

    protected void doPost(HttpServletRequest request, HttpServletResponse response)

    throws ServletException, IOException {

    processRequest(request, response);

    }

    @Override

    public String getServletInfo() {

    return "Short description";

    }

    }

