  trans: '

    ### 安装 Java SE 开发工具包 (JDK) 8


    首先，我们要确保从 Java 官网安装 Java SE 开发工具包 (JDK) 8 版本：


    [`http://www.oracle.com/technetwork/pt/java/javase/downloads/jdk8-downloads-2133151.html`](http://www.oracle.com/technetwork/pt/java/javase/downloads/jdk8-downloads-2133151.html)


    安装完 Java SE 开发工具包 (JDK) 8 后，你可以通过运行图 1-1 所示的命令来测试它是否正常工作。


    ![A311833_3_En_1_Fig1_HTML.jpg](img/A311833_3_En_1_Fig1_HTML.jpg)


    图 1-1


    检查已安装的 Java 版本


    请注意，还有一个 JDK 8u161 的发行版，其中包含了 NetBeans IDE 8.2 版本的 Java SE 捆绑包：


    [`http://www.oracle.com/technetwork/java/javase/downloads/jdk-netbeans-jsp-142931.html`](http://www.oracle.com/technetwork/java/javase/downloads/jdk-netbeans-jsp-142931.html)


    在本书中，我们分别安装了 JDK 和 NetBeans。


    ### 下载 NetBeans IDE


    你可以从以下位置下载最新的 NetBeans 安装程序：


    [`http://netbeans.org/downloads/`](http://netbeans.org/downloads/)


    请确保下载带有“Java EE”技术的安装程序，如图 1-2 所示。此安装程序还将包含所需的 Java SE 和 GlassFish 包。Ant 包含在 GlassFish
    中；你可以使用它，或者配置环境属性以使用其他安装。GlassFish 项目建议你使用其捆绑的 Ant。


    ![A311833_3_En_1_Fig2_HTML.jpg](img/A311833_3_En_1_Fig2_HTML.jpg)


    图 1-2


    下载 NetBeans IDE 注意


    当我们开始编写本书时，最新的 NetBeans 版本是 8.2，我们用它来测试设置和示例代码。请记住，NetBeans IDE 5.x、6.x 和 7.x
    的多个安装可以与 NetBeans IDE 8.2 在同一系统上共存。实际上，你无需卸载早期版本即可安装或运行 NetBeans IDE 8.2。


    下载完成后，你就可以开始安装 NetBeans 及其集成的 GlassFish 服务器了。


    ### 安装 NetBeans IDE 及其集成的 GlassFish 服务器


    导航到下载 NetBeans IDE 安装程序的目录，然后运行安装程序。安装向导的第一页会列出将要安装的包。


    如果没有安装 Java SE 开发工具包 (JDK) 版本，你将收到如图 1-3 所示的消息。


    ![A311833_3_En_1_Fig3_HTML.jpg](img/A311833_3_En_1_Fig3_HTML.jpg)


    图 1-3


    未安装 Java SE 开发工具包 (JDK)


    相反，如果已安装 Java SE 开发工具包 (JDK)，但你看到“未找到兼容的 JDK”警告消息，如图 1-4 所示，那么你将不得不退出向导，首先下载并安装正确且兼容的
    Java SE 开发工具包 8。


    ![A311833_3_En_1_Fig4_HTML.jpg](img/A311833_3_En_1_Fig4_HTML.jpg)


    图 1-4


    安装 NetBeans。“未找到兼容的 JDK”警告注意


    即使你没有看到“`未找到兼容的 JDK`”警告，也请验证你是否已安装 Java 平台 (JDK) 8。如果你没有安装 Java 平台 (JDK) 8，那么在执行本书中的示例时，可能会遇到“`javac:
    invalid target release: 1.8.0`”错误。


    安装兼容的 JDK 版本后，重新运行 NetBeans 安装程序。验证“未找到兼容的 JDK”警告不再出现，然后遍历向导，保持所有默认值选中。“摘要”页面将列出
    NetBeans IDE 和 GlassFish 应用服务器将要安装的文件夹。按下`安装`按钮完成向导，如图 1-5 所示。


    ![A311833_3_En_1_Fig5_HTML.jpg](img/A311833_3_En_1_Fig5_HTML.jpg)


    图 1-5


    安装 NetBeans IDE 和 GlassFish 应用服务器


    成功安装后，你的 NetBeans IDE 和 GlassFish 应用服务器即可使用。在接下来的章节中，我们将向你展示如何创建一个简单的 NetBeans
    项目，并验证已安装的 GlassFish 服务器是否正常运行。


    ### 测试 NetBeans IDE 和 GlassFish 安装


    假设上述所有步骤都已成功执行，你就可以启动 NetBeans IDE 和集成的 GlassFish 应用服务器了。我们还将演示一些简单的测试，以确保你可以运行本书中的示例。


    #### 启动 NetBeans IDE


    NetBeans IDE 提供了一个用于创建、部署和执行 Java EE 应用程序的图形化环境。诸如启动和关闭 GlassFish 服务器域之类的管理任务也可以使用
    NetBeans 执行。


    启动 NetBeans，可以通过在 Windows 7 机器的“开始”菜单中选择“NetBeans”，或者在命令提示符下运行 `C:\Program Files
    (x86)\NetBeans 8.2\bin\netbeans64.exe`。请注意，确切路径将取决于图 1-3 中提到的安装位置，对于 32 位系统，可执行文件将命名为
    `netbeans.exe`。如果你运行的是 Windows 8 或 10，则需要按下“Windows”键并开始输入“NetBeans”。应用搜索工具将搜索
    NetBeans 可执行文件，你可以选择它来启动 NetBeans IDE。


    NetBeans IDE 和 GlassFish 应用服务器如图 1-6 所示。


    ![A311833_3_En_1_Fig6_HTML.jpg](img/A311833_3_En_1_Fig6_HTML.jpg)


    图 1-6


    NetBeans IDE 和 GlassFish 应用服务器

