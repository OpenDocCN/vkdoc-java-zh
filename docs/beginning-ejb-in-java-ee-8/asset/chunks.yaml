    Listing 5-2 The `onMessage` Method Code


    In addition to marking the standard Java class with the `@MessageDriven` annotation,
    the following requirements apply to an MDB class:


    - The MDB class must implement the message listener interface. In the case of
    JMS, this will be `javax.jms.MessageListener`.

    - The class cannot be final or abstract.

    - The class should have a no-argument public constructor that is used by the EJB
    container to create instances of the bean class.


    If both annotations and deployment descriptors are used, the settings or values
    in the deployment descriptor will override the annotations in the classes during
    the deployment process.


    ### Configuration Properties


    Bean developers can provide configuration properties along with MDB classes, which
    get used at deployment time. The EJB container uses these properties to configure
    the bean and link it to the appropriate JMS provider. These configuration properties
    can be set using the `@ActivationConfigProperty` annotation. This annotation can
    be provided as one of the parameters for the `@MessageDriven` annotation. Listing
    5-3 shows the `@MessageDriven` annotation with properties for the `StatusMailer`
    MDB. We have defined two `ActivationConfigProperty` annotations that specify the
    logical destination name and the destination type.


    ```java

    @MessageDriven(activationConfig= {

    @ActivationConfigProperty(propertyName="destinationName",

    propertyValue="StatusMessageTopic"),

    @ActivationConfigProperty(propertyName="destinationType",

    propertyValue="javax.jms.Topic")

    }, mappedName="StatusMessageTopic")

    public class StatusMailerBean implements javax.jms.MessageListener {

    }

    ```

    Listing 5-3 The `@MessageDriven` Annotation with Properties for the `StatusMailer`
    MDB


    Standard configuration properties available for MDBs in EJB version 3.0 and 3.1
    correspond to the configuration properties in JMS version 1.1. Standard configuration
    properties for MDBs in EJB version 3.2 have been extended to correspond to the
    configuration properties in JMS version 2.0. Table 5-3 shows the correspondence
    between the EJB version and JMS version.


    **Table 5-3** Mapping of EJB MDB version to JMS version


    | EJB Version | JMS Version |

    | --- | --- |

    | EJB 3.0 | JMS 1.1 |

    | EJB 3.1 | JMS 1.1 |

    | EJB 3.2 | JMS 2.0 |

    | EJB 3.2 | JMS 2.1 |


    In the following sections, we will show what configuration properties can be set
    for MDBs.


    #### Message Acknowledgment


    The EJB container provides a message acknowledgment service. There are two message
    acknowledgment modes:


    - `Auto-acknowledge`

    - `Dups-ok-acknowledge`


    In the case of `Auto-acknowledge`, the message delivery acknowledgment happens
    after the `onMessage()` method. This property is useful for applications that
    require no duplicate messages. For example, a new order should be received by
    the inventory system once and only once. In the case of `Dups-ok-acknowledge`,
    the acknowledgment is done lazily, which means that there might be duplicate delivery
    of messages, but it reduces the overhead for the session in terms of immediate
    acknowledgment. For example, an e-mail message that gets sent out during the order
    process can possibly allow duplicate messages. We can use the `@ActivationConfigProperty`
    annotation to specify the message acknowledgment property. Listing 5-4 shows the
    property set to allow duplicates.


    ```java

    @MessageDriven(

    activationConfig= {

    @ActivationConfigProperty(propertyName="acknowledgeMode",

    propertyValue="Dups-ok-acknowledge")}

    )

    ```

    Listing 5-4 The `@ActivationConfigProperty` Annotation


    #### The Message Selector


    The message selector allows filtering of incoming messages based on the selection
    criteria provided by the bean developer using the `@ActivationConfigProperty`
    annotation. This property is useful for restricting the messages that the bean
    receives. For example, the MDB that processes the incoming orders might only process
    orders pertaining to red and white wines. The property name used to specify is
    `messageSelector`.


    #### Message Destination


    The message destination describes whether the MDB listens on a queue or topic.
    Bean developers can provide the description in the bean using the `@ActivationConfigProperty`
    annotation. The value of the property must be either `javax.jms.Queue` or `javax.jms.Topic`.
    For example, a new order may need to be processed by an inventory system as a
    next step in the workflow; in this case, the order entry system doesn’t have to
    broadcast the new order message. Both the order entry and inventory system can
    agree on a particular destination. Listing 5-3 shows the code to specify destination
    name and type.


    #### Subscription Durability


    If the bean is designed to listen to a topic, then the bean developer can further
    specify the durability of the message. The topic can be either `Durable` or `Non-Durable`.
    Usage of `Durable` topics ensures reliability for the applications. They ensure
    that messages are not missed, even if the EJB container is temporarily offline.
    For example, we may need to make sure that the new purchase orders received from
    client applications are not lost if the EJB container goes down. All purchase
    orders have to be reliably processed by the MDBs. We can use the `@ActivationConfigProperty`
    annotation to specify the durability using the `subscriptionDurability` property.
    Listing 5-5 shows the code to set the property to `Durable`. If this property
    is not set, the container will assume the default of `Non-Durable`.


    ```java

    @MessageDriven(

    activationConfig= {

    @ActivationConfigProperty(propertyName="subscriptionDurability", propertyValue="Durable")}

    )

    ```

    Listing 5-5 The Code to Set the Property to `Durable`


    In the `StatusMailer` MDB, we will create properties using the `@ActivationConfigProperty`
    annotation. The message’s `destinationName` is set to `StatusMessageTopic`, and
    `destinationType` is set to `javax.jms.Topic`. We will use the `mappedName` parameter
    to specify the physical destination name of the topic. In our case, it is the
    same as `destinationName`. Listing 5-6 shows the `StatusMailer` MDB in its current
    state of completion.


    ```java

