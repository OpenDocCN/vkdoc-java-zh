    a percentage, and the greatest difference of all values is taken as the margin
    of error for the performance test.


    Now that we have described all the preparation work, we can move on to describe
    the actual test runs that will provide us with the data that we need to perform
    the analysis and to make the conclusions of the performance test. The actual test
    runs are rather mechanical and boring procedures in which you start with a test
    run using the lower limit of users, increase the number of users, perform another
    test run, and so on until you reach the upper limit. As mentioned earlier, you
    will probably want to have a couple of additional test runs in which the upper
    limit is exceeded.


    Because the base of the methodology is consistency, you will have to reset or
    restart every component or subsystem that makes up the application. In our case,
    that will be the database and the Java EE server.


    We will go over a practical example of implementing the methodology later in this
    chapter to illustrate how to use it.'
  trans: '

    ### 定义测试指标


    该方法基于每次测试运行使用固定数量的用户。性能测试由多次测试运行组成，通常每次后续测试运行都会增加用户负载。有些人倾向于在单次测试运行期间逐步增加用户数量。我们认为这会引入一个可能对结果产生负面影响的新变量，并且从寻找最大用户负载的角度来看，这在统计上是不正确的。


    第一步是找到一个具有代表性的并发用户数量（下限），可以按规律递增，直到达到应用程序的饱和点（上限）。我们通常会在上限之上额外进行几次测试运行，只是为了更好地理解应用程序的行为（或异常行为）。


    不幸的是，预先精确选择上限并没有确切的科学方法。我们通常会随机选择一个用户数量，然后进行几次测试运行，其中用户数量分别高于和低于这个初始随机选择，并分析结果以确定我们应该采取的方向——是增加还是减少用户数量。


    第二步是定义样本量：即测试运行将执行的时长。为了选择合适的样本量，我们必须在两种不同的需求之间达成妥协。第一种是我们希望拥有足够的数据，使样本具有统计显著性。第二种是希望测试尽可能短，因为我们有许多测试运行要做，不想在上面花费太多时间。


    为了确定样本量，我们使用用户上限进行一次测试运行，持续时间比平时更长。然后我们绘制 AART 随时间变化的曲线并进行分析。我们寻找曲线上相当稳定的一段。


    另一点需要说明的是数据排除。当你首次开始测试时，响应时间通常高于正常水平。这是因为构成应用程序的所有子系统都需要一点时间来加速。例如，JVM 中的优化器需要几分钟来优化运行中的代码。数据库的缓存也是如此，它需要一点时间才能发挥作用（应用程序的其他组件也是如此）。


    这些最初出现的异常高的响应时间，只会影响在生产环境中通常运行数周的应用程序的最初几个用户。然而，在我们的案例中，我们只测试几分钟，这些结果会对我们的样本结果产生负面偏差。因此，我们排除最初收集的几组数据，并在曲线稳定后开始采样。


    因此，样本量将在实际测试运行开始后的某个时间点开始，并持续一段时间，这段时间为我们提供足够的数据，使其具有统计显著性。


    接下来是评估测试结果准确性的问题。根据所进行的性能测试类型，你可以使用两种不同的方法，以高确定性来衡量准确性。


    对于涉及完整应用程序的性能测试，我们通常计算以下指标，我们称之为样本质量：


    质量 = 标准差 / 算术平均值


    我们通常将此公式应用于收集到的 AART 数据。


    提示


    根据我们的经验，可接受的质量数值范围在 0.06 到 0.2 之间。当质量数值超过 0.25 时，我们会仔细分析所有可用数据，以找出样本质量如此低下的原因。有时，这可能导致我们丢弃该次测试运行产生的数据。


    在进行专注于性能设计的测试时，更具体地说，当思考时间为零时，我们使用另一种称为校准的方法。这里我们使用用户上限进行三次测试运行。然后，我们比较每次测试运行的
    AART 和 TTR 结果。比较以百分比形式进行，所有值中的最大差异被视为性能测试的误差范围。


    现在我们已经描述了所有的准备工作，可以继续描述实际的测试运行，这些运行将为我们提供执行分析和得出性能测试结论所需的数据。实际的测试运行是相当机械和枯燥的过程：你从使用用户下限开始一次测试运行，然后增加用户数量，进行另一次测试运行，依此类推，直到达到上限。如前所述，你可能希望额外进行几次超过上限的测试运行。


    由于该方法的基础是一致性，你必须重置或重启构成应用程序的每个组件或子系统。在我们的案例中，这将是数据库和 Java EE 服务器。


    我们将在本章后面通过一个实施该方法的实际示例来说明如何使用它。

    '
- fmt: "# The Grinder\n\nThe Grinder is a Java-based load-testing framework that is\
    \ freely available under a BSD-style open source license. The Grinder, along with\
    \ its source code, documentation, ancillary modules, test scripts, and much more,\
    \ can be found at [`http://grinder.sourceforge.net`](http://grinder.sourceforge.net).\
    \ There are also some mailing lists that you can join in order to participate\
    \ in the Grinder community.\n\nPlease remember that the Grinder version 3 is required\
    \ for Java EE 8.\n\nThe Grinder is extremely powerful, yet it’s easy to use and\
    \ is a lightweight toolkit. It allows you to simulate users and behaviors via\
    \ test scripts across a number of machines. It consists of the following:\n\n\
    - A worker process that interprets the test scripts written in Jython and performs\
    \ the tests using a number of worker threads, each of which simulates a user.\n\
    - An agent process that manages the worker processes. If you are running the simulated\
    \ users on more than one computer, you will need one agent process for every computer.\n\
    - The console, which collates and displays statistics while coordinating the other\
    \ processes.\n\nThe grinder process is shows in Figure [9-3](#A311833_3_En_9_Chapter.html#Fig3).\n\
    \n![A311833_3_En_9_Fig3_HTML.jpg](A311833_3_En_9_Fig3_HTML.jpg)\n\nFigure 9-3\n\
    \nThe Grinder Process\n\nA performance test using The Grinder is a collection\
    \ of test runs that can include one or more test scripts. A test run is the continuous\
    \ sequential execution of test scripts. The test runs can last either a specific\
    \ number of cycles or a specific period of time. A cycle is a single execution\
    \ of a test script.\n\n> **Note**  \n> What we call a cycle is defined in the\
    \ documentation of The Grinder as a run, which we find confusing.\n\nTest scripts\
    \ are used to simulate the application usage. Test scripts represent the usage\
    \ profiles that you want to simulate. A test script contains one or more requests,\
    \ which resemble the typical interaction that a user of a specific profile would\
    \ have with the application.\n\n> **Note**  \n> Again, to avoid confusion, we\
    \ use the word request instead of test, as defined in the documentation of The\
    \ Grinder.\n\nA Grinder test script is a Jython program that can contain certain\
    \ logic to modify the default behavior, which is the sequential execution of the\
    \ requests (for example, to execute certain requests based on the response of\
    \ an already executed request).\n\nA test script can be written by hand or, if\
    \ the simulated user interacts with the application via an HTML interface, it\
    \ can be recorded. The TCP Proxy module can be used to accomplish this. This module\
    \ is part of The Grinder distribution. The HTML plug-in filter of the proxy allows\
    \ your interaction with an application through a Web browser to be recorded. For\
    \ details on how to use this functionality, please refer to the documentation.\n\
    \nIn addition to executing URLs, The Grinder can also execute Java code as part\
    \ of a request in a test script. This gives you the flexibility of simulating\
    \ heavy clients, such as Swing-based clients.\n\nEach agent process sets up a\
    \ connection with the console to receive commands (such as start, stop, and reset),\
    \ which it passes on to its worker processes. Each worker process sets up a connection\
    \ to the console to report statistics.\n\nIn addition to the statistics presented\
    \ on the console, for each test run, every worker process writes logging information\
    \ and a final statistics summary to a file with a name that starts with the word\
    \ `out`. Errors are written to a file with a name that starts with the word `error`.\
    \ If no errors occur during a test run, no error file will be created. Detailed\
    \ statistical information for every request executed is written to a file with\
    \ a name that starts with the word `data`. These files follow a naming convention\
    \ that, in addition to the words we described, also contain the name of the computer\
    \ hosting the worker process and the number of the working process, as you can\
    \ have more than one.\n\nModifying values in the `grinder.properties` configuration\
    \ easily alters the behavior of The Grinder. Very likely, the most common properties\
    \ you will be modifying are the following:\n\n- `grinder.threads`: This property\
    \ specifies the number of simulated users that will execute the specified test\
    \ script.\n- `grinder.runs`: This property specifies the number of times a simulated\
    \ user will sequentially execute the test script (cycles). If the value is zero,\
    \ it will execute forever.\n- `grinder.consoleHost`: This is the name or IP address\
    \ of the computer running the Grinder console.\n- `grinder.logProcessStreams`:\
    \ Set to `true`, this property will provide extremely detailed information about\
    \ the execution of every simulated user. This information appears in the `out`\
    \ file. It is useful during the preliminary runs, but we strongly suggest that\
    \ you set it to `false` for all of the other runs, as it will degrade the performance\
    \ of the test runs.\n- `grinder.logDirectory`: This property specifies the directory\
    \ in which you want to place the three log files described earlier.\n- `grinder.script`:\
    \ This is the file name of the test script to be executed.\n\nThere are many more\
    \ properties available. Please consult the Grinder documentation for a full list\
    \ of properties."
  raw: '## The Grinder


    The Grinder is a Java-based load-testing framework that is freely available under
    a BSD-style open source license. The Grinder, along with its source code, documentation,
    ancillary modules, test scripts, and much more, can be found at [`http://grinder.sourceforge.net`](http://grinder.sourceforge.net)
    . There are also some mailing lists that you can join in order to participate
    in the Grinder community.


    Please remember that the Grinder version 3 is required for Java EE 8.


    The Grinder is extremely powerful, yet it’s easy to use and is a lightweight toolkit.
    It allows you to simulate users and behaviors via test scripts across a number
    of machines. It consists of the following:


    *   A worker process that interprets the test scripts written in Jython and performs
    the tests using a number of worker threads, each of which simulates a user.

    *   An agent process that manages the worker processes. If you are running the
    simulated users on more than one computer, you will need one agent process for
    every computer.

    *   The console, which collates and displays statistics while coordinating the
    other processes.


    The grinder process is shows in Figure [9-3](#A311833_3_En_9_Chapter.html#Fig3).


    ![A311833_3_En_9_Fig3_HTML.jpg](A311833_3_En_9_Fig3_HTML.jpg)


    Figure 9-3


    The Grinder Process


    A performance test using The Grinder is a collection of test runs that can include
    one or more test scripts. A test run is the continuous sequential execution of
    test scripts. The test runs can last either a specific number of cycles or a specific
    period of time. A cycle is a single execution of a test script.


    Note


    What we call a cycle is defined in the documentation of The Grinder as a run,
    which we find confusing.


    Test scripts are used to simulate the application usage. Test scripts represent
    the usage profiles that you want to simulate. A test script contains one or more
    requests, which resemble the typical interaction that a user of a specific profile
    would have with the application.


    Note


    Again, to avoid confusion, we use the word request instead of test, as defined
    in the documentation of The Grinder.


    A Grinder test script is a Jython program that can contain certain logic to modify
    the default behavior, which is the sequential execution of the requests (for example,
    to execute certain requests based on the response of an already executed request).


    A test script can be written by hand or, if the simulated user interacts with
    the application via an HTML interface, it can be recorded. The TCP Proxy module
    can be used to accomplish this. This module is part of The Grinder distribution.
    The HTML plug-in filter of the proxy allows your interaction with an application
    through a Web browser to be recorded. For details on how to use this functionality,
    please refer to the documentation.


    In addition to executing URLs, The Grinder can also execute Java code as part
    of a request in a test script. This gives you the flexibility of simulating heavy
    clients, such as Swing-based clients.


    Each agent process sets up a connection with the console to receive commands (such
    as start, stop, and reset), which it passes on to its worker processes. Each worker
    process sets up a connection to the console to report statistics.


    In addition to the statistics presented on the console, for each test run, every
    worker process writes logging information and a final statistics summary to a
    file with a name that starts with the word `out`. Errors are written to a file
    with a name that starts with the word `error`. If no errors occur during a test
    run, no error file will be created. Detailed statistical information for every
    request executed is written to a file with a name that starts with the word `data`.
    These files follow a naming convention that, in addition to the words we described,
    also contain the name of the computer hosting the worker process and the number
    of the working process, as you can have more than one.


    Modifying values in the `grinder.properties` configuration easily alters the behavior
    of The Grinder. Very likely, the most common properties you will be modifying
    are the following:


    *   `grinder.threads`: This property specifies the number of simulated users that
    will execute the specified test script.

    *   `grinder.runs`: This property specifies the number of times a simulated user
    will sequentially execute the test script (cycles). If the value is zero, it will
    execute forever.

    *   `grinder.consoleHost`: This is the name or IP address of the computer running
    the Grinder console.

    *   `grinder.logProcessStreams`: Set to `true`, this property will provide extremely
    detailed information about the execution of every simulated user. This information
    appears in the `out` file. It is useful during the preliminary runs, but we strongly
    suggest that you set it to `false` for all of the other runs, as it will degrade
    the performance of the test runs.

    *   `grinder.logDirectory`: This property specifies the directory in which you
    want to place the three log files described earlier.

    *   `grinder.script`: This is the file name of the test script to be executed.


    There are many more properties available. Please consult the Grinder documentation
    for a full list of properties.'
  trans: '

    ## Grinder 工具


    Grinder 是一款基于 Java 的负载测试框架，采用 BSD 风格的开源许可证，可免费使用。您可以在 [`http://grinder.sourceforge.net`](http://grinder.sourceforge.net)
    找到 Grinder 及其源代码、文档、辅助模块、测试脚本等更多内容。此外，还有一些邮件列表可供加入，以便参与 Grinder 社区。


    请记住，Java EE 8 需要 Grinder 3 版本。


    Grinder 功能极其强大，同时又易于使用，是一个轻量级的工具包。它允许您通过测试脚本在多台机器上模拟用户和行为。它包含以下组件：


    *   **工作进程**：解释用 Jython 编写的测试脚本，并使用多个工作线程执行测试，每个线程模拟一个用户。

    *   **代理进程**：管理工作进程。如果您在多台计算机上运行模拟用户，则每台计算机需要一个代理进程。

    *   **控制台**：在协调其他进程的同时，整理并显示统计数据。


    Grinder 的进程如图 9-3 所示。


    ![A311833_3_En_9_Fig3_HTML.jpg](img/A311833_3_En_9_Fig3_HTML.jpg)


    图 9-3


    Grinder 进程


    使用 Grinder 进行性能测试是一系列测试运行的集合，其中可以包含一个或多个测试脚本。一次测试运行是指测试脚本的连续顺序执行。测试运行可以持续特定的循环次数或特定的时间段。一个循环是指测试脚本的单次执行。


    注意


    我们在 Grinder 文档中称之为“循环”的概念被定义为一次“运行”，我们认为这容易造成混淆。


    测试脚本用于模拟应用程序的使用情况。测试脚本代表了您想要模拟的使用场景。一个测试脚本包含一个或多个请求，这些请求模拟了特定场景的用户与应用程序之间的典型交互。


    注意


    再次强调，为避免混淆，我们使用“请求”一词代替 Grinder 文档中定义的“测试”。


    Grinder 测试脚本是一个 Jython 程序，它可以包含某些逻辑来修改默认行为（即请求的顺序执行），例如，根据已执行请求的响应来执行某些请求。


    测试脚本可以手动编写，或者，如果模拟用户通过 HTML 界面与应用程序交互，则可以录制。TCP 代理模块可用于实现此目的。该模块是 Grinder 发行版的一部分。代理的
    HTML 插件过滤器允许您录制通过 Web 浏览器与应用程序的交互。有关如何使用此功能的详细信息，请参阅文档。


    除了执行 URL 之外，Grinder 还可以在测试脚本的请求中执行 Java 代码。这为您模拟重型客户端（例如基于 Swing 的客户端）提供了灵活性。


    每个代理进程都与控制台建立连接以接收命令（例如启动、停止和重置），并将这些命令传递给其工作进程。每个工作进程都与控制台建立连接以报告统计数据。


    除了控制台上显示的统计数据外，对于每次测试运行，每个工作进程都会将日志信息和最终统计摘要写入一个文件名以 `out` 开头的文件中。错误信息写入一个文件名以
    `error` 开头的文件中。如果测试运行期间未发生错误，则不会创建错误文件。每个已执行请求的详细统计信息写入一个文件名以 `data` 开头的文件中。这些文件遵循命名约定，除了我们描述的关键词外，文件名还包含托管工作进程的计算机名称和工作进程编号，因为您可能拥有多个工作进程。


    修改 `grinder.properties` 配置文件中的值可以轻松改变 Grinder 的行为。您最常修改的属性很可能如下：


    *   `grinder.threads`：此属性指定将执行指定测试脚本的模拟用户数量。

    *   `grinder.runs`：此属性指定模拟用户顺序执行测试脚本的次数（循环次数）。如果值为零，则将无限执行。

    *   `grinder.consoleHost`：运行 Grinder 控制台的计算机名称或 IP 地址。

    *   `grinder.logProcessStreams`：将此属性设置为 `true` 将提供关于每个模拟用户执行的极其详细的信息。这些信息会出现在
    `out` 文件中。这在初步运行期间很有用，但我们强烈建议您在所有其他运行中将其设置为 `false`，因为它会降低测试运行的性能。

    *   `grinder.logDirectory`：此属性指定您希望放置上述三个日志文件的目录。

    *   `grinder.script`：这是要执行的测试脚本的文件名。


    还有更多可用属性。请查阅 Grinder 文档以获取完整的属性列表。

    '
- fmt: '# The Test Application


    The test application that we have used for performance testing is a subset of
    the integrated Wines Online back-end application developed in Chapter [7](#A311833_3_En_7_Chapter.html).
    The user interface is developed using JavaServer Faces (`JSF`).


    The latest `JSF` specifications can be found in this web page:


    [`https://javaee.github.io/javaserverfaces-spec/`](https://javaee.github.io/javaserverfaces-spec/)


    JavaServer Faces (`JSF`) is a Java Community Process (`JCP`) Standard technology
    for authoring component-based user interfaces on the Java EE platform.


    Please notice that the `JSF` available by the time this manuscript was written
    was version 2.3, which was part of Java EE 8 in April 2017.


    The executable implementations of the `JSF` 2.3 can be found in the `javax.faces`
    repository:


    [`https://maven.java.net/content/repositories/releases/org/glassfish/javax.faces/2.3.0/`](https://maven.java.net/content/repositories/releases/org/glassfish/javax.faces/2.3.0/)


    Please refer to the NetBeans Introduction to JavaServer Faces 2.x on the NetBeans
    web page:


    [`https://netbeans.org/kb/docs/web/jsf20-intro.html`](https://netbeans.org/kb/docs/web/jsf20-intro.html)


    Figure [9-4](#A311833_3_En_9_Chapter.html#Fig4) displays the `JSF` page, which
    shows the catalog of all available wines in a list box. Users can select wine
    items of their choice, enter the quantity in the input text box, and click the
    “Add to Cart” button. Users can repeat the same process to add more wines, and
    finally they can click the “Submit Order” button.


    ![A311833_3_En_9_Fig4_HTML.jpg](A311833_3_En_9_Fig4_HTML.jpg)


    Figure 9-4


    The wine store `JSF` application


    Figure [9-5](#A311833_3_En_9_Chapter.html#Fig5) shows the interaction between
    the `JSF` application and the back-end wine store application. When the `JSF`
    application is launched from the browser, a call to the `getWineDisplayList()`
    method (which uses an injected EJB in the managed bean) is made. This retrieves
    a list of all available wines using the `findAll()` method on the injected `WineFacade`
    EJB. The initial `JSF` page displays the retrieved list of wines. When the user
    adds a wine item and clicks the “Add to Cart” button, the `addWineToCart()` method
    in the `ShoppingCart` session bean is invoked, creating a new customer and adding
    the wine to the customer’s cart items. Adding a customer only happens when the
    `addWineToCart()` item is called for the first time. When the user finally submits
    the order from the client application, the `processOrder()` method in the `ShoppingCart`
    session bean is invoked, which creates a new customer order, adds all the cart
    items to the order as order items, deletes the items in the cart, and finally
    deducts the inventory.


    ![A311833_3_En_9_Fig5_HTML.jpg](A311833_3_En_9_Fig5_HTML.jpg)


    Figure 9-5


    The wine store application components and services interaction


    Figure [9-6](#A311833_3_En_9_Chapter.html#Fig6) illustrates the Java Persistence
    API (`JPA`) entities, the inheritance model between the Java classes, and the
    relationships between them. The `BusinessContact` entity is inherited by the `Customer`
    and `Supplier` entities. The `Customer` entity is inherited by the `Individual`
    and `Distributor` entities. The `InventoryItem`, `CartItem`, and `OrderItem` entities
    inherit the `WineItem` entity. The wine store persistence unit also contains different
    types of relationships between these entities (including one-to-one, one-to-many,
    and many-to-many) that are exercised in the test application. Relationship fields
    whose names end in `List` are 0..* properties; all others are single-value properties.
    The relationship mappings used in these entities were covered in Chapter [3](#A311833_3_En_3_Chapter.html)
    and Chapter [4](#A311833_3_En_4_Chapter.html).


    ![A311833_3_En_9_Fig6_HTML.jpg](A311833_3_En_9_Fig6_HTML.jpg)


    Figure 9-6


    The wine store domain model


    For the performance tests that we are going to run, all of the previously discussed
    components (the `JSF` application, the `ShoppingCart` and `WineFacade` session
    beans, and the Java classes in the persistence unit) remain exactly the same.
    The only differences between the two tests are the object/relational (`O/R`) mapping
    annotations specified in the `JPA` entities of the domain model and the database
    schema to which these Java classes are mapped. The first test uses a `JOINED`
    entity inheritance strategy in which the two root entities (`BusinessContact`
    and `WineItem`) map to the root table in the hierarchy, and the tables for all
    the subentities join to that table. Figure [9-7](#A311833_3_En_9_Chapter.html#Fig7)
    shows the database schema used for mapping the persistent Java classes using a
    `JOINED` inheritance strategy.


    ![A311833_3_En_9_Fig7_HTML.jpg](A311833_3_En_9_Fig7_HTML.jpg)


    Figure 9-7


    The database schema for the `JOINED` entity inheritance strategy


    In the second test, we use a `SINGLE_TABLE` entity inheritance strategy in which
    the entities in each class hierarchy all map onto a single table. Figure [9-8](#A311833_3_En_9_Chapter.html#Fig8)
    shows the database schema that is used to map the second test case.


    ![A311833_3_En_9_Fig8_HTML.jpg](A311833_3_En_9_Fig8_HTML.jpg)


    Figure 9-8


    The database schema for the `SINGLE_TABLE` entity inheritance strategy


    Note: Inheritance strategies are explained in detail in Chapter [4](#A311833_3_En_4_Chapter.html).


    # The Performance Test


    Following the methodology described earlier, and using the test program just described,
    we will get on with the task of comparing the inheritance models to find out which
    one is best under the following conditions.


    ## The Test Environment


    We have set up a test machine in the cloud, which has eight cores and 8GB of memory.
    It runs an instance of the GlassFish server (in this book version 4.1.1). The
    test application uses the Derby database, which is also running on this server.
    We run The Grinder from our laptop, which is not in the data center where we have
    the test machine running, so all the traffic is going over the Internet. Normally,
    we would not do this, as we prefer to work in so-called sterile conditions; that
    is, the only traffic on the test network is the one generated by the tests. However,
    after doing many preliminary tests, we found that the margin of error of the tests
    to be so very low (1%), that we decided to continue working this way.


    The test computer runs only the corresponding software required for the tests,
    besides the default processes of the operating systems. We use the default settings
    on all of the software involved. We realize that better performance can be obtained
    by fine-tuning these components, but that would be beyond the scope of this book.'
  raw: '## The Test Application


    The test application that we have used for performance testing is a subset of
    the integrated Wines Online back-end application developed in Chapter [7](#A311833_3_En_7_Chapter.html).
    The user interface is developed using JavaServer Faces (JSF) .


    The latest JSF specifications can be found in this web page:


    [`https://javaee.github.io/javaserverfaces-spec/`](https://javaee.github.io/javaserverfaces-spec/)


    JavaServer Faces (JSF) is a Java Community Process (JCP) Standard technology for
    authoring component-based user interfaces on the Java EE platform.


    Please notice that the JSF available by the time this manuscript was written was
    version 2.3, which was part of Java EE 8 in April 2017.


    The executable implementations of the JSF 2.3 can be found in the javax.faces
    repository:


    [`https://maven.java.net/content/repositories/releases/org/glassfish/javax.faces/2.3.0/`](https://maven.java.net/content/repositories/releases/org/glassfish/javax.faces/2.3.0/)


    Please refer to the NetBeans Introduction to JavaServer Faces 2.x on the NetBeans
    web page:


    [`https://netbeans.org/kb/docs/web/jsf20-intro.html`](https://netbeans.org/kb/docs/web/jsf20-intro.html)


    Figure [9-4](#A311833_3_En_9_Chapter.html#Fig4) displays the JSF page, which shows
    the catalog of all available wines in a list box. Users can a select wine items
    of their choice, enter the quantity in the input text box, and click the “Add
    to Cart” button. Users can repeat the same process to add more wines, and finally
    they can click the “Submit Order” button.


    ![A311833_3_En_9_Fig4_HTML.jpg](A311833_3_En_9_Fig4_HTML.jpg)


    Figure 9-4


    The wine store JSF application


    Figure [9-5](#A311833_3_En_9_Chapter.html#Fig5) shows the interaction between
    the JSF application and the back-end wine store application. When the JSF application
    is launched from the browser, a call to the `getWineDisplayList()` method (which
    uses an injected EJB in the managed bean) is made. This retrieves a list of all
    available wines using the `findAll()` method on the injected `WineFacade` EJB.
    The initial JSF page displays the retrieved list of wines. When the user adds
    a wine item and clicks the “Add to Cart” button, the `addWineToCart()` method
    in the `ShoppingCart` session bean is invoked, creating a new customer and adding
    the wine to the customer’s cart items. Adding a customer only happens when the
    `addWineToCart()` item is called for the first time. When the user finally submits
    the order from the client application, the `processOrder()` method in the `ShoppingCart`
    session bean is invoked, which creates a new customer order, adds all the cart
    items to the order as order items, deletes the items in the cart, and finally
    deducts the inventory.


    ![A311833_3_En_9_Fig5_HTML.jpg](A311833_3_En_9_Fig5_HTML.jpg)


    Figure 9-5


    The wine store application components and services interaction


    Figure [9-6](#A311833_3_En_9_Chapter.html#Fig6) illustrates the Java Persistence
    API (JPA) entities, the inheritance model between the Java classes, and the relationships
    between them. The `BusinessContact` entity is inherited by the `Customer` and
    `Supplier` entities. The `Customer` entity is inherited by the `Individual` and
    `Distributor` entities. The `InventoryItem`, `CartItem`, and `OrderItem` entities
    inherit the `WineItem` entity. The wine store persistence unit also contains different
    types of relationships between these entities (including one-to-one, one-to-many,
    and many-to-many) that are exercised in the test application. Relationship fields
    whose names end in `List` are 0..* properties; all others are single-value properties.
    The relationship mappings used in these entities were covered in Chapter [3](#A311833_3_En_3_Chapter.html)
    and Chapter [4](#A311833_3_En_4_Chapter.html).


    ![A311833_3_En_9_Fig6_HTML.jpg](A311833_3_En_9_Fig6_HTML.jpg)


    Figure 9-6


    The wine store domain model


    For the performance tests that we are going to run, all of the previously discussed
    components (the JSF application, the `ShoppingCart` and `WineFacade` session beans,
    and the Java classes in the persistence unit) remain exactly the same. The only
    differences between the two tests are the object/relational (O/R) mapping annotations
    specified in the JPA entities of the domain model and the database schema to which
    these Java classes are mapped. The first test uses a `JOINED` entity inheritance
    strategy in which the two root entities (`BusinessContact` and `WineItem`) map
    to the root table in the hierarchy, and the tables for all the subentities join
    to that table. Figure [9-7](#A311833_3_En_9_Chapter.html#Fig7) shows the database
    schema used for mapping the persistent Java classes using a `JOINED` inheritance
    strategy.


    ![A311833_3_En_9_Fig7_HTML.jpg](A311833_3_En_9_Fig7_HTML.jpg)


    Figure 9-7


    The database schema for the JOINED entity inheritance strategy


    In the second test, we use a `SINGLE_TABLE` entity inheritance strategy in which
    the entities in each class hierarchy all map onto a single table. Figure [9-8](#A311833_3_En_9_Chapter.html#Fig8)
    shows the database schema that is used to map the second test case.


    ![A311833_3_En_9_Fig8_HTML.jpg](A311833_3_En_9_Fig8_HTML.jpg)


    Figure 9-8


    The database schema for the SINGLE_TABLE entity inheritance strategy Note


    Inheritance strategies are explained in detail in Chapter [4](#A311833_3_En_4_Chapter.html).


    ## The Performance Test


    Following the methodology described earlier, and using the test program just described,
    we will get on with the task of comparing the inheritance models to find out which
    one is best under the following conditions.


    ### The Test Environment


    We have set up a test machine in the cloud, which has eight cores and 8GB of memory.
    It runs an instance of the GlassFish server (in this book version 4.1.1). The
    test application uses the Derby database, which is also running on this server.
    We run The Grinder from our laptop, which is not in the data center where we have
    the test machine running, so all the traffic is going over the Internet. Normally,
    we would not do this, as we prefer to work in so-called sterile conditions; that
    is, the only traffic on the test network is the one generated by the tests. However,
    after doing many preliminary tests, we found that the margin of error of the tests
    to be so very low (1%), that we decided to continue working this way.


    The test computer runs only the corresponding software required for the tests,
    besides the default processes of the operating systems. We use the default settings
    on all of the software involved. We realize that better performance can be obtained
    by fine-tuning these components, but that would be beyond the scope of this book.'
  trans: '

    ## 测试应用程序


    我们用于性能测试的测试应用程序是第 7 章中开发的集成版 Wines Online 后端应用程序的一个子集。其用户界面是使用 JavaServer Faces
    (JSF) 开发的。


    最新的 JSF 规范可在此网页中找到：


    [`https://javaee.github.io/javaserverfaces-spec/`](https://javaee.github.io/javaserverfaces-spec/)


    JavaServer Faces (JSF) 是一种 Java 社区过程 (JCP) 标准技术，用于在 Java EE 平台上编写基于组件的用户界面。


    请注意，在撰写本文时，可用的 JSF 版本是 2.3，该版本于 2017 年 4 月成为 Java EE 8 的一部分。


    JSF 2.3 的可执行实现可在 javax.faces 仓库中找到：


    [`https://maven.java.net/content/repositories/releases/org/glassfish/javax.faces/2.3.0/`](https://maven.java.net/content/repositories/releases/org/glassfish/javax.faces/2.3.0/)


    请参考 NetBeans 网页上的 NetBeans JavaServer Faces 2.x 入门指南：


    [`https://netbeans.org/kb/docs/web/jsf20-intro.html`](https://netbeans.org/kb/docs/web/jsf20-intro.html)


    图 9-4 展示了 JSF 页面，该页面在列表框中显示了所有可用葡萄酒的目录。用户可以选择他们想要的葡萄酒商品，在输入文本框中输入数量，然后点击“添加到购物车”按钮。用户可以重复相同的过程来添加更多葡萄酒，最后他们可以点击“提交订单”按钮。


    ![A311833_3_En_9_Fig4_HTML.jpg](img/A311833_3_En_9_Fig4_HTML.jpg)


    图 9-4


    葡萄酒商店 JSF 应用程序


    图 9-5 展示了 JSF 应用程序与后端葡萄酒商店应用程序之间的交互。当从浏览器启动 JSF 应用程序时，会调用 `getWineDisplayList()`
    方法（该方法在托管 Bean 中使用了一个注入的 EJB）。这会通过注入的 `WineFacade` EJB 上的 `findAll()` 方法检索所有可用葡萄酒的列表。初始
    JSF 页面会显示检索到的葡萄酒列表。当用户添加一个葡萄酒商品并点击“添加到购物车”按钮时，会调用 `ShoppingCart` 会话 Bean 中的 `addWineToCart()`
    方法，创建一个新客户并将该葡萄酒添加到客户的购物车商品中。仅在首次调用 `addWineToCart()` 方法时才会创建客户。当用户最终从客户端应用程序提交订单时，会调用
    `ShoppingCart` 会话 Bean 中的 `processOrder()` 方法，该方法会创建一个新的客户订单，将所有购物车商品作为订单商品添加到订单中，删除购物车中的商品，并最终扣减库存。


    ![A311833_3_En_9_Fig5_HTML.jpg](img/A311833_3_En_9_Fig5_HTML.jpg)


    图 9-5


    葡萄酒商店应用程序组件与服务交互


    图 9-6 展示了 Java 持久化 API (JPA) 实体、Java 类之间的继承模型以及它们之间的关系。`BusinessContact` 实体被 `Customer`
    和 `Supplier` 实体继承。`Customer` 实体被 `Individual` 和 `Distributor` 实体继承。`InventoryItem`、`CartItem`
    和 `OrderItem` 实体继承自 `WineItem` 实体。葡萄酒商店持久化单元还包含了这些实体之间不同类型的关系（包括一对一、一对多和多对多），这些关系在测试应用程序中得到了运用。名称以
    `List` 结尾的关系字段是 0..* 属性；所有其他字段都是单值属性。这些实体中使用的关系映射已在第 3 章和第 4 章中介绍过。


    ![A311833_3_En_9_Fig6_HTML.jpg](img/A311833_3_En_9_Fig6_HTML.jpg)


    图 9-6


    葡萄酒商店领域模型


    对于我们将要运行的性能测试，之前讨论的所有组件（JSF 应用程序、`ShoppingCart` 和 `WineFacade` 会话 Bean 以及持久化单元中的
    Java 类）都保持不变。两次测试之间的唯一区别在于领域模型 JPA 实体中指定的对象/关系 (O/R) 映射注解，以及这些 Java 类所映射到的数据库模式。第一次测试使用了
    `JOINED` 实体继承策略，其中两个根实体（`BusinessContact` 和 `WineItem`）映射到层次结构中的根表，而所有子实体的表都连接到该根表。图
    9-7 展示了使用 `JOINED` 继承策略映射持久化 Java 类所使用的数据库模式。


    ![A311833_3_En_9_Fig7_HTML.jpg](img/A311833_3_En_9_Fig7_HTML.jpg)


    图 9-7


    JOINED 实体继承策略的数据库模式


    在第二次测试中，我们使用了 `SINGLE_TABLE` 实体继承策略，其中每个类层次结构中的实体都映射到单个表。图 9-8 展示了用于映射第二个测试用例的数据库模式。


    ![A311833_3_En_9_Fig8_HTML.jpg](img/A311833_3_En_9_Fig8_HTML.jpg)


    图 9-8


    SINGLE_TABLE 实体继承策略的数据库模式


    注意


    继承策略在第 4 章中有详细解释。


    ## 性能测试


    遵循前面描述的方法，并使用刚刚描述的测试程序，我们将着手比较继承模型的任务，以找出在以下条件下哪种模型最佳。


    ### 测试环境


    我们在云中设置了一台测试机器，该机器拥有八个核心和 8GB 内存。它运行着一个 GlassFish 服务器实例（本书中使用的是 4.1.1 版本）。测试应用程序使用了同样运行在此服务器上的
    Derby 数据库。我们从笔记本电脑上运行 The Grinder，该笔记本电脑并不在运行测试机器的数据中心内，因此所有流量都通过互联网传输。通常我们不会这样做，因为我们更倾向于在所谓的无菌条件下工作；也就是说，测试网络上的唯一流量就是测试本身产生的流量。然而，在进行了许多初步测试后，我们发现测试的误差范围非常低（1%），因此我们决定继续以这种方式工作。


    测试计算机除了运行操作系统的默认进程外，仅运行测试所需的相应软件。我们对所有涉及的软件都使用默认设置。我们意识到，通过微调这些组件可以获得更好的性能，但这超出了本书的范围。

    '
- fmt: '### The Test Script


    As mentioned earlier in this chapter, the idea is to create a test script that
    resembles as closely as possible the usage of the application in real life. Since
    this is a design-for-performance test, we use a test script that loosely resembles
    the typical usage profile of the application:


    1. The user goes to the wine application website (home).

    2. The user selects a couple of bottles of one type of wine.

    3. The user selects a few bottles of another type of wine.

    4. The user checks out.


    Since, in this example, we are comparing a couple of different inheritance models
    to understand which one applies best to our circumstances (design for performance),
    we use a zero think time.


    Admittedly, running this set of performance tests using Derby is not very realistic,
    but the intent here is to provide an example on how to use the methodology. Our
    intention is that readers will apply this process to testing their own application,
    in their own application environment.


    The output of the TCP Proxy module can be redirected to a file. This output is
    a Jython program that contains a high-level flow of the recorded tests, and it
    is easily readable by humans. This is where we modify or remove the `grinder.sleeptime`
    directives to eliminate the think time, or where we change the name or IP address
    of the target machine running the application. We review in detail the actual
    `wine.py` test script in the next section.


    ### Setup


    The installation of GlassFish was explained in the Getting Started section of
    Chapter [1](#A311833_3_En_1_Chapter.html), so we won’t go over that here. You
    just need to make sure that the GlassFish server is up and running, and that the
    application is deployed with the necessary resources (JDBC connection pool and
    resource). One way to start the GlassFish server is to change directories to `%GLASSFISH_HOME%/bin`
    in a command shell and issue the following command:


    ```

    asadmin start-domain

    ```


    To stop the GlassFish server, you issue the following command:


    ```

    asadmin stop-domain

    ```


    Throughout the performance tests, we restart the GlassFish server with:


    ```

    asadmin restart-domain

    ```


    #### The Database


    Each of the two tests requires its own database connection to ensure that your
    DB schemas don’t collide. The tables mapped by each inheritance schema use similar
    names but have different structures. To minimize the installation requirements,
    we used the Derby database supplied with GlassFish for our tests. The projects
    are preconfigured for Derby, and to run them out of the box you will need to create
    the Derby databases. Refer to the Creating the Database Connection and Sample
    Schema section in Chapter [3](#A311833_3_En_3_Chapter.html) for steps on how to
    create a new database (and associated connection) in Derby. For these tests, you
    will need to create a `WineAppJoin` database with user `wineapp_join/wineapp_join`
    and a `WineAppST` database with user `wineapp_st/wineapp_st`.


    ##### Configuring Connections to Your Own Database


    You may wish to use Oracle or some other production database when running your
    tests. To do so, you would update the `persistence.xml` file in the JPA project
    for each test (`Chapter09-PerformanceJoined-jpa` and `Chapter09-PerformanceSingleTable-jpa`)
    to modify the connection and information to point to your database. First create
    a separate database connection for each test, as we did for Derby above. For Oracle,
    we suggest that you begin by creating new DB users `wineapp_join/wineapp_join`
    and `wineapp_st/wineapp_st` in your database. Then go to the Services tab in NetBeans,
    right-click on Databases, and choose New Connection… to create a new database
    connection for each user.


    Once your test database connections are created, you can edit the `persistence.xml`
    file in each JPA project through its Design editor tab by selecting the appropriate
    Joined or SingleTable connection through the JDBC Connection combo.


    Similarly, you would need to update the `<property>` entries of the `<jdbc-connection-pool>`
    entry in the `glassfish-resources.xml` file inside the EJB project for each test
    (`Chapter09-PerformanceJoined-ejb` and `Chapter09-PerformanceSingleTable-ejb`)
    to update the connection information. (NetBeans 7.2.1 doesn’t provide an editor
    to do this through a drop-down list, but you can easily cut/paste the `<property>`
    elements that specify the connection details.) Be sure to preserve the `<jdbc-resource>
    jndi-name` property as `jdbc/wineAppJoin`, or `jdbc/wineAppST` for the `SINGLE_TABLE`
    test, since this resource is referenced by name from the persistence units in
    the EJB projects.


    #### The Grinder


    The next step is to install The Grinder on the computer dedicated to creating
    the simulated user load. Once you have downloaded The Grinder from [`http://grinder.sourceforge.net`](http://grinder.sourceforge.net),
    all you need to do is to unzip it in the desired directory.


    The Grinder version 3.11 was installed for this testing in the `C:\grinder-3.11`
    directory of our laptop. Once you’ve done that, you can extract the Grinder-related
    files from the download package. These are in the `grinder` directory. We installed
    these files in the `C:\SampleCode` directory. There are three files needed for
    our example: `grinder.properties`, `joined.py`, and `single.py`. The last two
    files are the actual test scripts.


    Refer to the Grinder.properties web page for additional information about how
    to configure this file:


    [`http://grinder.sourceforge.net/g3/properties.html`](http://grinder.sourceforge.net/g3/properties.html)


    Let’s start by reviewing the first script, `grinder.properties`, shown in Listing
    [9-1](#A311833_3_En_9_Chapter.html#Par119).


    ```

    # Beginning EJB in Java EE 8

    # Chapter 9: EJB Performance and Testing

    # The number of worker processes

    grinder.processes=1

    # Number of simulated users

    grinder.threads=140

    # Run forever

    grinder.runs=0

    # Name of the machine where the console runs

    grinder.consoleHost=localhost

    # We don''t want a full detailed log file

    grinder.logProcessStreams=false

    # Place the log files in this directory

    grinder.logDirectory=log

    # Start all the simulated users at the same time

    grinder.initialSleepTime=0

    # properties file. The default is "helloworld.py".

    # Execute the test script called joined.py

    grinder.script=joined.py

    Listing 9-1

    grinder.properties

    ```


    The comments in this properties file are pretty clear. You will just be changing
    the number of simulated users (`grinder.threads`) and the number of cycles that
    the test script will run (`grinder.runs`). Just make sure that you have the correct
    name or IP address of the machine on which the Grinder console will be running.
    Other than that, you really don’t need to change anything else in this properties
    file.'
