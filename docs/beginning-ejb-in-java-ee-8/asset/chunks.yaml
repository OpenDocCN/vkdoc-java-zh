    \ for wines based on different criteria. We will start by creating a simple JSF\
    \ page that will provide the links to different options available to the user.\n\
    \n### The Links Page\n\nListing [12-7](#A311833_3_En_12_Chapter.html#Par165) shows\
    \ the code for the `winehome.jsp` JSF page. This page uses an `h:commandLink`\
    \ JSF UI component that allows you to embed output text that should be displayed\
