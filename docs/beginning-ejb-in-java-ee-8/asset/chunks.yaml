    \ 文件位于持久化单元根目录的 META-INF 目录中，它包含了用于以对象-关系映射信息注解形式存在的受管持久化类。persistence 提供者会将 orm.xml\
    \ 映射文件或其他映射文件作为资源加载。\n\n注意\n\nJPA 2.1 和 2.2 版本要求 XML 文件映射（例如 persistence.xml 和\
    \ orm.xml）位于 Java 类路径中。\n\nJPA 2.2 版本指出：\n\n“一个名为 orm.xml 的对象/关系映射 XML 文件可以指定在持久化单元根目录的\
    \ META-INF 目录中，或者位于 persistence.xml 引用的任何 jar 文件的 META-INF 目录中。”\n\n请注意，我们可以添加更多可能位于类路径上任何位置的映射文件，并且\
