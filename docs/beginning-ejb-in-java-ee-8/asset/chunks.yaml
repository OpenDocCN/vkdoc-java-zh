    ## Compiling, Deploying, and Testing the Session Beans


    Session beans need to be packaged into EJB JAR (`.jar`) files before they are
    deployed into EJB containers. In the case of some EJB containers or application
    servers, packaged EJB archives need to be assembled into Enterprise Archive (EAR)
    files before deployment. EJB containers or application servers provide deployment
    utilities or Ant tasks to facilitate deployment of EJBs. Java IDEs (integrated
    development environments) like JDeveloper, NetBeans, and Eclipse also provide
    deployment features that allow developers to package, assemble, and deploy EJBs
    to application servers. Packaging, assembly, and deployment are covered in detail
    in Chapter [11](#A311833_3_En_11_Chapter.html).


    So far in this chapter we have developed one stateless session bean (`SearchFacade`),
    one stateful session bean (`ShoppingCart`), and one singleton session bean (`ShopperCount`).
    The following sections will walk you through the steps necessary to compile, deploy,
    and test these session beans.


    ### Prerequisites


    Before performing any of the steps detailed in the next sections, complete the
    “Getting Started” section of Chapter [1](#A311833_3_En_1_Chapter.html). This section
    will walk you through the installation and environment setup required for the
    samples in this chapter.


    ### Compiling the Session Beans and Their Clients


    Copy the `Chapter02-SessionSamples` directory and its contents into a directory
    of your choice. Run the NetBeans IDE and open the `Chapter02-SessionSamples` project
    using the **File ➤ Open Project** menu. Make sure the **Open Required Projects**
    check box is checked, as shown in Figure [2-7](#A311833_3_En_2_Chapter.html#Fig7).


    ![A311833_3_En_2_Fig7_HTML.jpg](A311833_3_En_2_Fig7_HTML.jpg)


    **Figure 2-7** Opening the `Chapter02-SessionSamples` project


    Expand the `Chapter02-SessionSamples-ejb` node and observe that the three session
    beans that we created appear in the `com.apress.ejb.chapter02` package. Similarly,
    the three client servlets appear under the `Chapter02-SessionSamples-war` node,
    as shown in Figure [2-8](#A311833_3_En_2_Chapter.html#Fig8).


    ![A311833_3_En_2_Fig8_HTML.jpg](A311833_3_En_2_Fig8_HTML.jpg)


    **Figure 2-8** Verifying that Session Beans and their clients are available in
    the project


    Invoke the context menu on `Chapter02-SessionSamples` node and build the application
    by selecting the **Clean and Build** menu option, as shown in Figure [2-9](#A311833_3_En_2_Chapter.html#Fig9).


    ![A311833_3_En_2_Fig9_HTML.jpg](A311833_3_En_2_Fig9_HTML.jpg)


    **Figure 2-9** Building the application


    ### Deploying the Session Beans and Their Clients


    Once you have compiled the session beans and the servlet clients, you can deploy
    the application to the GlassFish application server. Invoke the context menu on
    `Chapter02-SessionSamples` node and deploy the application by selecting the **Deploy**
    menu option, as shown in Figure [2-10](#A311833_3_En_2_Chapter.html#Fig10).


    ![A311833_3_En_2_Fig10_HTML.jpg](A311833_3_En_2_Fig10_HTML.jpg)


    **Figure 2-10** Deploying the application


    NetBeans will start the integrated GlassFish application server and deploy the
    application to the server as shown in Figure [2-11](#A311833_3_En_2_Chapter.html#Fig11).


    ![A311833_3_En_2_Fig11_HTML.jpg](A311833_3_En_2_Fig11_HTML.jpg)


    **Figure 2-11** Application deployment result


    The server’s log window will log the deployment status of the application as shown
    in Figure [2-12](#A311833_3_En_2_Chapter.html#Fig12).


    ![A311833_3_En_2_Fig12_HTML.jpg](A311833_3_En_2_Fig12_HTML.jpg)


    **Figure 2-12** Log showing successful deployment


    ### Running the Client Programs


    Once the session beans and their client servlets are successfully deployed, we
    need to set the run target that we wish to execute. We have a choice of three
    run targets: `ShopperCountClient`, `SearchFacadeClient`, or `ShoppingCartClient`.
