- fmt: '# EJB Performance and Testing


    As developers, we are always trying to find the most efficient way to write code
    that delivers the highest performance. Over the years, we have learned that some
    of the assumptions we make are not always right and that certain programming models
    and techniques that we use do not achieve the expected level of performance. The
    surprise here is that most of the time, our expectations are defeated with models
    and techniques that our logic and gut feelings tell us are best.


    Performance of computer systems is a very complex issue. Just think about the
    following: We are programming a piece of Java code that takes advantage of an
    infrastructure called Java Enterprise Edition (Java EE), which happens to run
    on top of a Java Virtual Machine (JVM). In this book we will utilize the Java
    EE version 8. The virtual machine is hosted on an operating system, which runs
    on a computer that interacts with other computers using networks composed of hardware
    and software components. Each of these layers—the network, the computer, the operating
    system, the JVM, and the Java EE server—has a number of knobs that can be used
    to configure and optimize behavior. Each of them will present a different behavior
    under various usage conditions, which will inevitably impact the behavior of the
    other layers. Within this rather complex context, it becomes a little easier to
    understand why our logic will not always work.


    The bottom line is that we just cannot generalize when making performance statements.
    The only way that we can find out what performance to expect from our system is
    to test it in conditions as close as possible to the ones in which the code will
    run when in the production environment.


    Every software application is unique. In order to understand the performance of
    your own application, you must test it yourself, according to your own definition
    of performance. In some situations, good performance will mean the ability to
    support a large number of users; in others (for example, when the user load is
    small), it will simply mean being able to run as fast as possible.


    In this chapter, we describe a methodology that you can use to test the performance
    of your systems in a consistent way. We also present tools that you can use to
    conduct these tests. Finally, we carry out a performance test to illustrate the
    methodology and the usage of the tools. The methodology and toolkit are useful
    in two basic situations:


    - Performance testing a complete application

    - Designing for performance (examining the performance costs of various aspects
    of the Java EE API and how certain design decisions will impact overall performance)


    In the first scenario, we treat the application like a black box. We test the
    application under various user loads and investigate the performance of every
    request made by the users. The data is analyzed—we search for requests that don’t
    meet the required criteria, and opportunities for improving performance are identified.


    While the aforementioned is useful, our advice is to performance test as early
    in the development cycle as possible. This way, you can use the methodology and
    the data you obtain from it to help you design for performance, rather than performance
    testing after the fact.


    The example presented in this chapter focuses on designing for performance, rather
    than testing a complete application. If you are interested in learning more about
    the methodology of testing an application and performance testing in general,
    you can refer to *J2EE Performance Testing with BEA WebLogic Server* by Peter
    Zadrozny (Apress, 2003). In this chapter, we present an adaptation of the methodology
    presented in Zadrozny’s book, which is narrowly focused on the example at hand.


    ## The Testing Methodology


    The focus of the testing methodology is consistency of data measurement. The following
    list provides a high-level overview of the steps that are involved in the methodology.
    We present them and describe them in the logical order in which they will be carried
    out when performing each test:


    1. Define the performance criteria. We must define the relevant performance metrics
    for the specific application in question and set a realistic target for that metric
    (for instance, a maximum acceptable response time).

    2. Accurately simulate the application usage. The key aspect of this is the definition
    of the test scripts. These are configuration files that contain a set of requests
    that represent typical usage profiles of the application.

    3. Define the test metrics. These include the duration of the tests, the size
    of the sample, the amount of initial data to exclude, and others.

    4. Perform the tests.'
