  trans: "\n### 登录页面\n\n为简化登录流程，我们将使用客户的电子邮件地址来验证和授权订单。`Email` 是第 7 章使用的持久化单元中 `Customer`\
    \ 实体的映射字段之一。清单 12-1 展示了 `login.jsp` 的代码。首先，有两个标签库指令、一些标准 HTML 标签以及一些用于渲染 JSF UI\
    \ 组件的标签。任何包含 JSF 元素的页面都必须将 `f:view` 标签作为最外层的 JSF 标签。`h:form` 标签创建一个 HTML 表单，`h:inputText`\
    \ 标签创建一个输入文本字段，`h:commandButton` 标签在表单中创建一个提交按钮。你可能注意到，`h:inputText` 的 `value`\
    \ 属性与 HTML 中使用的语法不同。我们使用的是表达式语言 (EL) 语法 — `#{}`。表达式 `#{Login.email}` 表示 JSP 页面想要访问\
    \ `Login` 对象中的 email 属性。`Login` 对象是一个托管 bean，稍后将对此进行讨论。与 HTML 表单类似，`h:commandButton`\
    \ 有一个 `action` 属性。`action` 使用的 EL 语法是 `#{Login.processLogin}`，这意味着当用户点击提交按钮时，一个\
    \ `POST` 操作将触发 `Login` 托管 bean 中的 `processLogin` 方法。\n\n```\n\n登录页面\n\nBeginning\
    \ EJB: Wine Store Application \n输入电子邮件地址：\n\n清单 12-1\nlogin.jsp\n```\n\n图 12-18（显示在本章后面的“编译、部署和测试\
    \ JSF 应用程序”部分）展示了在浏览器中渲染的 `login.jsp` 页面。\n\n下一步是创建一个将与 `login.jsp` 一起使用的 `Login`\
    \ 托管 bean。托管 bean 是 JSF 应用程序使用的 JavaBean。这些对象由 JSF 实现管理，并且这些对象中的属性和方法可以通过使用值绑定和方法绑定表达式从\
    \ JSP 页面引用。清单 12-2 展示了 `Login` 托管 bean。`Login` 有三个属性字段及其访问器：`email`、`customer`\
    \ 和 `shoppingCart`。我们在 `setShoppingCart()` 方法上方有一个 `@EJB` 注解。我们使用 setter 注入来注入我们在第\
    \ 7 章开发的有状态会话 bean `ShoppingCart`。我们的 bean 中还有一个额外的方法 `processLogin()`，它使用注入的\
    \ `shoppingCart` 有状态会话 bean 调用 `findCustomer(String email)` 业务方法。如果客户数据库中存在该电子邮件\
    \ ID，此业务方法将返回一个 `Customer` 对象。还加入了额外的逻辑，以返回存储在 `faces-config.xml` 文件中的字符串值，供我们的导航模型使用。我们稍后将对此进行讨论。\n\
    \n```\npackage com.apress.ejb.chapter12.view.managed;\nimport com.apress.ejb.chapter07.ejb.ShoppingCartLocal;\n\
    import com.apress.ejb.chapter07.entities.Customer;\nimport javax.ejb.EJB;\npublic\
    \ class Login\n{\npublic Login() {\n}\nString email;\nCustomer customer;\nShoppingCartLocal\
    \ shoppingCart;\npublic void setEmail(String email) {\nthis.email = email;\n}\n\
    public String getEmail() {\nreturn email;\n}\npublic String processLogin() {\n\
    String navigation = null;\ncustomer = (Customer)shoppingCart.findCustomer(email);\n\
    if (customer != null) {\nnavigation = \"winehome\";\n}\nelse {\nnavigation = \"\
    register\";\n}\nreturn navigation;\n}\npublic void setCustomer(Customer customer)\
    \ {\nthis.customer = customer;\n}\npublic Customer getCustomer() {\nreturn customer;\n\
    }\n@EJB\npublic void setShoppingCart(ShoppingCartLocal shoppingCart) {\nthis.shoppingCart\
    \ = shoppingCart;\n}\npublic ShoppingCartLocal getShoppingCart() {\nreturn shoppingCart;\n\
    }\n}\n清单 12-2\nLogin.java\n```\n\n部署描述符 `faces-config.xml` 包含页面导航、托管 bean 等信息。清单\
    \ 12-3 展示了包含进出 `login.jsp` 控制流的 `faces-config.xml`。它还展示了 `Login` 类被注册为托管 bean。我们将\
    \ `Login` 托管 bean 的作用域设置为 `session`。这允许我们通过会话存储有关客户和购物车的信息，这样我们就不必为相同的信息重新查询后端应用程序。这也便于在其他页面中使用这些信息，并调用\
    \ `ShoppingCart` 有状态会话 bean 上的其他业务方法，而无需再次查找该 bean。此外，我们创建了三个导航规则：\n\n*   从 `login.jsp`\
    \ 到 `winehome.jsp`，值为 `winehome`：如果登录成功，将使用此规则。\n*   从 `login.jsp` 到 `newCustomer.jsp`，值为\
    \ `register`：如果登录失败且客户想要注册为新客户，将使用此规则。\n*   从 `newCustomer.jsp` 到 `login.jsp`，值为\
    \ `success`：此规则用于在成功注册后将客户导航回登录页面。\n\n```\n\nLogin\ncom.apress.ejb.chapter12.view.managed.Login\n\
    session\n\n/login.jsp\n\nwinehome\n/winehome.jsp\n\nregister\n/newCustomer.jsp\n\
    \n/newCustomer.jsp\n\nsuccess\n/login.jsp\n\n清单 12-3\nfaces-config.xml\n```\n\n\
    到目前为止，我们已经向你展示了如何通过一个简单的登录页面开始使用 JSF 应用程序，该页面可以查找 EJB 并调用业务方法。在接下来的几节中，我们将继续完成葡萄酒商店\
    \ JSF 应用程序的其余页面。\n\n### 新客户注册页面\n\n清单 12-4 展示了 `newCustomer.jsp` JSF 页面的代码。此页面与之前创建的\
    \ `login.jsp` 页面非常相似，只是它有更多用于捕获客户信息的输入字段。JSP 页面中的所有输入字段（名字、姓氏、电话、电子邮件、街道 1、街道\
    \ 2、城市、州、邮政编码、信用卡和信用卡到期日期）都具有值绑定表达式，这些表达式映射到 `NewCustomer` 托管 bean 中的属性。它还有一个提交按钮，其操作使用表达式\
    \ `#{NewCustomer.AddNewCustomer}` 映射到托管 bean 中的 `AddNewCustomer()` 方法。\n\n```\n\
    \n新客户页面\n\nBeginning EJB: Wine Store Application \n输入以下信息以注册为新客户：\n\n名字\n\n姓氏\n\
    \n电话\n\n电子邮件\n\n街道 1\n\n街道 2\n\n城市\n\n州\n\n邮政编码\n\n信用卡\n\n信用卡到期日期\n\n清单 12-4\n\
    newCustomer.jsp\n```\n\n图 12-19（在“编译、部署和测试 JSF 应用程序”部分）展示了在浏览器中渲染的 `newCustomer.jsp`\
    \ 页面。\n\n创建 `newCustomer.jsp` 页面后，我们将创建 `NewCustomer` 托管 bean。清单 12-5 展示了此托管 bean\
    \ 的代码，它为 `newCustomer.jsp` 页面引用的所有属性提供了 getter 和 setter 方法。此外，该类使用 `@EJB` 注解注入了\
    \ `CustomerFacade` 无状态会话 bean。最后，`AddNewCustomer()` 方法使用属性的 getter 方法创建一个新的 `Individual`\
    \ 实体实例，并调用 `CustomerFacade` 中的 `AddCustomer()` 业务方法。成功执行后，此方法返回一个 `success` 字符串，将用户导航到登录页面。\n"
