    # 4. 高级持久化特性


    我们将本书中关于持久化的内容组织为三个主要章节。前一章介绍了 Java 持久化 API（JPA），并为你提供了创建实体、建立对象/关系（O/R）映射以及编写检索实体的查询的起点。理解了这些概念后，你就可以创建并构建具有强大持久化实体的应用程序，这些实体既能在
    EJB 容器内部运行，也能在其外部运行。


    在本章中，我们将以此为基础，深入探讨 Java 持久化 API（JPA）中能为你的应用程序提供更大灵活性和强大功能的领域，包括以下内容：


    *   如何定义和处理实体继承层次结构

    *   如何使用抽象实体、映射超类和非实体类

    *   如何使用 Java 持久化查询语言（JPQL）、原生 SQL 和查询条件 API 构建查询

    *   如何配置 ID 生成器以自动填充主键字段

    *   如何指定实体生命周期回调

    *   如何配置乐观锁


    持久化 API 的第三个主要领域将在第 8 章中介绍，涉及在使用 JPA 实体时 EJB 对事务管理的支持。EJB 容器为你提供了多种选项，让会话 Bean
    能够管理 `EntityManager` 的生命周期、控制持久化上下文的持续时间，以及使用 Java 事务 API（JTA）或资源本地事务。充分了解 EJB
    和 JPA 如何支持事务以及如何应用这项技术后，你将拥有构建大规模持久化企业级应用所需的工具。


    与本书其他部分一样，本章涵盖了规范中定义的许多概念，但无意取代规范。事实上，我们强烈建议读者将规范作为参考文档和资源，以更深入地探索这些概念，并发现其他超出本入门文本范围的内容。在此，我们专注于将规范中的一些基本特性转化为实际应用，并提供示例说明如何使用新的持久化特性来实现构建基于组件的企业级
    Java 应用程序这一现实目标。


    本章中的每个主要概念都包含在一个独立的、可运行的示例中。运行这些示例所需的步骤将在本章末尾的“编译、部署和测试 JPA 实体”一节中介绍。总体结构是，我们为每个示例提供一个独立的
    NetBeans 项目，并为每个项目提供其自己的 JPA 持久化单元、实体和 Java 测试服务类。你可以在纯 Java SE 环境中从 Java 客户端运行和测试这些示例，而无需运行
    Glassfish；或者，你也可以执行每个项目附带的 Servlet，在 Java EE Web 环境中运行示例。


    注意


    正如前一章所讨论的，实体可以指定其持久化状态由其实例变量或 Bean 属性访问器定义。为了提高本章的可读性，我们使用术语“字段”来泛指实体的持久化成员，而不具体说明实体如何声明其持久化属性。


    ## 映射实体继承层次结构


    Java 从一开始就支持单类继承——即非接口类可以扩展另一个类。虽然在业务领域的许多方面，利用继承带来的代码复用和多态性优势已成为常见做法，但在 JPA 引入之前，EJB
    持久化领域并不支持数据继承。这曾是一个重大缺陷，因为在现实世界中，数据往往是层次化的；而缺乏对数据对象继承的标准内置支持，导致了无数变通方法和令人头疼的问题。利用
    JDK 注解的易用性，JPA 提供了对定义和映射实体继承层次结构的声明式支持，包括抽象实体以及多态关系和查询。


    注意


    抽象实体是包含 `abstract` 修饰符的实体类，因此不能直接实例化。抽象实体必须是实体继承层次结构中的中间类；它本身不能是叶子实体，因为它只能通过其子实体之一进行实例化。相应地，实体继承层次结构中的所有叶子实体都必须是具体的，因此是可实例化的。抽象实体的存在是为了为其子实体提供公共数据结构，并通过与其他实体的多态关系来表示其子实体。


    JPA 中许多实体继承的支持源于设计人员和工具开发者的工作，他们多年来想出了各种自行实现 O/R 映射的方法，而 JPA 则方便地采用了源自这些努力的几种替代继承映射方法。


    在给定的实体继承层次结构中，单一的继承策略适用于该层次结构中的所有实体。此外，无论采用何种继承策略，层次结构中的所有实体都必须使用相同的主键类型。这使得容器能够合理地支持多态关系，无论类层次结构采用何种映射策略。


    另外，如果你的数据库有表列数限制（例如 256 列），请注意实体可以自由地将其字段映射分布到多个表的连接行中。


    ### 入门指南


    本章中的所有代码片段都以可运行的形式存在，你可以直接下载并在本地环境中执行，同时附带了用于在本地数据库中创建相应表和其他数据库对象的 SQL 脚本。运行示例的步骤将在本章末尾描述。由于这些示例仅涉及实体，我们可以利用
    JPA 提供的纯 Java SE（容器外）支持，并跳过将这些实体部署到 Java EE 容器的步骤。你将看到，一个简单的 Java 类就足以创建能够与这些实体交互并驱动示例测试的
    `EntityManager`。实际观察这些概念将有助于澄清此处未解答的问题，并且这些示例也应为你测试自己的想法提供一个有用的起点。


    ### 实体继承映射策略


    JPA 为三种主要的实现策略提供了声明式支持，这些策略决定了层次结构中的实体如何映射到底层表。我们将通过将每种策略应用于一个示例实体层次结构来研究它们，并探讨每种方法的优缺点。此比较旨在帮助你决定如何在自己的应用程序中映射每个实体层次结构。

    '
- fmt: '#### Sample Entity Hierarchy


    To illustrate how these three strategies are manifested in code, Figure [4-1](#A311833_3_En_4_Chapter.html#Fig1)
    shows a sample entity hierarchy that demonstrates both inheritance and polymorphic
    relationships.


    ![A311833_3_En_4_Fig1_HTML.jpg](A311833_3_En_4_Fig1_HTML.jpg)


    Figure 4-1


    An entity type hierarchy, rooted in the base entity `Person`, showing relationships
    between entities both inside and outside the hierarchy


    In this example, the `Person` entity serves as the root class in an entity hierarchy,
    and it is extended by the `Employee` entity. `Employee` is further specialized
    to produce two other entities: `FullTimeEmployee` and `PartTimeEmployee`. Inheritance
    relationships are expressed in the figure through unnamed white arrowheads, and
    ordinary entity relationships are expressed with named open arrowheads.


    The root `Person` entity and the intermediate `Employee` entity are both abstract
    in our example. Only the leaf entities `FullTimeEmployee` and `PartTimeEmployee`,
    and the stand-alone entity `Address`, are concrete and instantiable. Note that
    even abstract entities may be involved in relationships with other entities and,
    as you will see from the code that follows, abstract entities may also be used
    in JPQL statements. Whenever a non-leaf entity is referenced, that reference implicitly
    assumes that the actual concrete implementation being referenced may be that entity
    or any of its subclass entities. Non-leaf entities may also be concrete, though,
    and had we chosen to do this in our example, we could have made these base classes
    concrete.


    The root `Person` entity also holds a single-value reference to an `Address` instance,
    represented by the `homeAddress` field on `Person`. This relationship is inherited
    by all subclasses of `Person`; so all instances of `Employee` (`FullTimeEmployee`
    and `PartTimeEmployee`) can also refer to their `homeAddress` field. Note that
    there is no corresponding field on `Address` referencing `Person`, so this is
    a unidirectional relationship. From our coverage of entity relationships in the
    previous chapter, you will recall that this is a one-to-one relationship.


    **Note**


    A relationship between two entities that is exposed through a field on only one
    of the entities is known as a unidirectional relationship. A relationship exposed
    through fields on both entities involved is known as a bidirectional relationship.


    In addition, we have defined a one-to-many, bidirectional relationship between
    a `FullTimeEmployee` (a `manager`) and a collection of `Employee`s (its `managedEmployees`).
    Because this relationship is exposed through fields at both ends of the relationship
    (in this case, the two entities involved are actually the same entity, `Employee`),
    this is a bidirectional, one-to-many relationship.


    As you look at each example, you will see how the Java source files are essentially
    constant across the three inheritance mapping strategies. Only the class-level
    annotations for declaring the inheritance strategies, and some details, like the
    table names, separate the entities in one example from another. This is a key
    benefit—the chosen inheritance strategy can be replaced without impacting the
    entities’ Java API. In the three sections that follow, we will illustrate how
    each mapping strategy can be applied to this hierarchy.


    In these inheritance examples, we included a separate table for the `Address`
    entity alongside the tables mapped to each inheritance hierarchy, as depicted
    in the database schema diagrams. It is not strictly necessary to replace the `ADDRESS`
    table for each entity hierarchy, since whatever table is associated with the `Person`
    entity could hold its own foreign key reference to a common `ADDRESS` table. However,
    we took this approach to help isolate each inheritance example.


    #### Object/Relational Inheritance Mapping Strategies


    **Note**


    Unless otherwise specified, you can assume that all JPA classes mentioned in this
    chapter are in the `javax.persistence.*` package.


    Now that we have defined our entity hierarchy, let’s look at how each of the three
    O/R strategies supported natively by JPA can be used to map this `Person` entity
    hierarchy, and the associated `Address` entity, to a relational schema. Here is
    a summary of each strategy defined by the `InheritanceType` enum:


    *   `SINGLE_TABLE`: Single-table-per-class inheritance hierarchy. This is the
    default strategy. The entity hierarchy is essentially flattened into the sum of
    its fields, and these fields are mapped down to a single table.

    *   `JOINED`: Common base table with joined subclass tables. In this approach,
    each entity in the hierarchy maps to its own dedicated table that maps only the
    fields declared on that entity. The root entity in the hierarchy is mapped to
    the base table, and the tables for all other entities in the hierarchy reference
    this base table.

    *   `TABLE_PER_CLASS`: Single-table-per-outermost concrete entity class. The third
    inheritance mapping option is also not required of JPA containers for compliance
    with the final draft of the JPA 2.1 spec, so portable applications should avoid
    it until it is officially mandated or at least widely supported. This strategy
    maps each leaf (that is, outermost, concrete) entity to its own dedicated table.
    Each such leaf entity branch is flattened, combining its declared fields with
    the declared fields on all of its superentities, and the sum of these fields is
    mapped onto its table.


    ```

    public enum InheritanceType

    { SINGLE_TABLE, JOINED, TABLE_PER_CLASS };

    ```


    ##### The `@GeneratedValue` Annotation


    In each of the inheritance strategy examples, we use the `@GeneratedValue` annotation
    to auto-populate the entity’s primary key for both the `Person` entity hierarchy
    and the stand-alone `Address` entity. In our examples, we designate a field named
    `id` as the primary key, simply for consistency. Specifying an ID generator in
    metadata allows the persistence provider to assign an entity its ID value before
    the entity is actually saved as a row in the database. Declarative specification
    of the `@GeneratedValue` annotation is certainly easier than assigning the ID
    in application code, and it is also an optimization over the alternative of auto-populating
    the ID value using a database trigger. Since the ID value is used when persisting
    relationship mappings, this saves the persistence manager the trouble of querying
    the row back again from the database to retrieve the trigger-populated value.
    Details on how to customize sequence- or table-based ID generators are provided
    later in the chapter.


    We will now explore each strategy, discussing its strengths and weaknesses, and
    illustrating its use through examples.


    **Note**


    Java source files for the examples shown in the listings below can all be found
    in the Source Code area for this chapter.'
