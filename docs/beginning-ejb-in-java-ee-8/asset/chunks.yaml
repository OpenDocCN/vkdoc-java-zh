    \ may initialize property data on the instance according to rules defined for\
    \ that enterprise bean. This feature is called dependency injection, and it is\
    \ an example of inversion of control pattern, whereby an external provider initializes\
    \ the properties of an object instance instead of by the class itself. EJB 3 introduced\
