    \ there was no standard component model for developing them. On top of this, development\
    \ of Web applications with reusable components in fourth-generation languages\
    \ (4GLs) like Visual Basic, Oracle Forms, and PowerBuilder weren’t available yet\
    \ either.\n\nJSF is the latest Java EE Web technology. With the component model,\
    \ it addresses the issues of reusable components and ease of building Web applications.\
    \ The reusable component model is not the only thing that JSF provides, though.\
    \ We will look into some of the other features and benefits of JSF in the following\
    \ sections.\n\n#### The Model-View-Controller Pattern\n\nDuring the early phases\
    \ of Java EE Web technology development, most of the Web applications were built\
    \ using the so-called Model-I approach. The basic idea of Model-I is that the\
    \ Web technology that renders the dynamic Web content is closely intertwined with\
    \ the business logic of the back-end systems. There was no separation of concerns\
    \ in this approach, which led to application maintenance issues. The Model-II\
    \ approach (also known as the Model-View-Controller [MVC] pattern) was a follow-up\
    \ to the Model-I approach. The key to this approach is the clean separation between\
    \ the view layer and the model layer that supplies the data and business logic.\n\
    \nMajor Model-View-Controller benefits include:\n\n*   Action-oriented framework\
    \ layered on top of JAX-RS\n*   Manual controller logic… you control your own\
    \ destiny\n*   No UI Components\n*   You choose your front-end technology\n\n\
    The MVC pattern isn’t specific to the Java language as such; it dates back to\
    \ languages like Smalltalk. In this approach, the model layer is used for the\
    \ business logic and data, the view is used to render the user interface, and\
    \ the controller is used for application flow and event handling. While the Java\
    \ EE platform had been evolving with respect to the model and view-side technologies,\
    \ it didn’t include a built-in framework that could be used on the controller\
    \ side. Instead, many developers built homegrown controllers using Java Servlets\
    \ technology. Many others turned to Apache Struts, which provided an alternative\
    \ to writing homegrown controllers. Apache Struts is a widely used open source\
    \ framework that has become the de facto controller framework for Web applications.\n\
    \nFinally, JSF technology standardized the controller aspect of the MVC pattern\
    \ by providing a controller as part of the framework.\n\nMVC 1.0 controllers benefits\
    \ include:\n\n*   Controls the request-processing for an MVC application\n*  \
    \ JAX-RS Implementation\n*   Class annotated with @Controller either at class\
    \ level or method level\n*   Must be CDI Managed\n*   Possible to create hybrid\
    \ classes (@Controller at method level)\n*   Four return types: String, void,\
    \ Response, Viewable\n    *   String: returns path to view\n    *   Void: requires\
    \ @javax.mvc.View annotation Response: typical javax.ws.rs.core.Response, providing\
    \ full access to the response Viewable: javax.mvc.Viewable containing information\
    \ about the view and how to process\n*   Default response type text/html, but\
    \ can be modified with @Produces\n\nThe MVC 1.0 includes models to utilize entity\
    \ classes for data, or store into a CDI bean.\n\nTwo ways to work with models\
    \ include:\n\n*   javax.mvc.Models class\n*   CDI-Based Models\n\nJSR 371: Model-View-Controller\
    \ 1.0 Specification can be found at: [`https://www.mvc-spec.org/`](https://www.mvc-spec.org/)\n\
    \nHere are the major differences between JSF and MVC:\n\nJSF:\n\n*   Component\
    \ Based\n*   Controller Logic\n*   Automates Processing\n*   Facelets\n*   Rapid\
    \ Development\n*   Works well with REST\n*   Stateful… remains across requests\n\
    \nMVC:\n\n*   Action Based\n*   Layered on Top of JAX-RS\n*   Manual Validations/Conversions\n\
    *   Many Different View Options\n*   Fine Control Request/Response\n*   Great\
    \ fit for REST\n*   No State Across Requests\n\n### JSF Architecture\n\nFigure [12-9](#A311833_3_En_12_Chapter.html#Fig9)\
    \ shows the simplified JSF architecture. JSF has a front controller servlet called\
    \ `FacesServlet` . `FacesServlet` performs the role of brokering the incoming\
    \ requests from clients to the right places. As mentioned earlier, JSF comes with\
    \ reusable Web components that can be used to develop user interfaces. These UI\
    \ components can be associated with objects called managed beans . These managed\
    \ beans handle the logic for the application and interact with back-end systems\
    \ or components like EJBs. Each UI component in JSF can be associated with a different\
    \ render kit that can generate different markup, such as HTML or WML (Wireless\
    \ Markup Language), onto different types of devices.\n\n![A311833_3_En_12_Fig9_HTML.jpg](A311833_3_En_12_Fig9_HTML.jpg)\n\
    \nFigure 12-9\n\nJSF architecture"
  trans: "\n### Java EE Web 技术的演进\n\nJava EE 技术已发展成为一个成熟、可靠且稳定的平台，使开发者能够构建企业级应用。该平台在\
    \ Web 技术领域也经历了显著的演进。图 12-8 展示了 Java EE 平台中 Web 技术的演进历程。\n\n![A311833_3_En_12_Fig8_HTML.jpg](img/A311833_3_En_12_Fig8_HTML.jpg)\n\
    \n图 12-8\n\nJava EE Web 技术的演进\n\n在 Java Servlet 出现之前，CGI 脚本被用于生成动态 Web 内容。CGI\
    \ 脚本有其自身的局限性，包括脚本作为独立进程运行，这导致了可扩展性问题。\n\n在 CGI 脚本之后，Java Servlet 成为了 Java EE 平台中所有\
    \ Web 技术的基础。Java Servlet 为开发基于标准、可在不同 Web 容器间移植的 Web 组件和应用提供了一个良好的开端。Java Servlet\
    \ 的缺点之一是代码密集——所有 HTML 都通过 `println()` 方法输出。Servlet 未能为创建页面设计的图形设计师和创建动态内容的 Java\
    \ 程序员之间搭建起桥梁。\n\nJSP 是 Web 技术演进中的下一步；它弥合了图形设计师与 Java 程序员之间的鸿沟。基于 Java Servlet\
    \ 技术，JSP 页面是嵌入了 Java 代码的 HTML 页面。这种模式允许图形设计师创建 JSP 页面，然后程序员可以通过添加 Java 代码或脚本片段使其具有动态性。JSP\
    \ 页面在编译后会变成 Java Servlet。\n\n虽然 JSP 页面的出现很不错，但许多开发者现在不得不处理诸如遍历数据集合之类的繁琐任务。这促使了\
    \ JSP 标准标签库（JSTL）的诞生，它自动化了其中一些任务。\n\n尽管这些技术进步简化了 Web 应用的构建，但当时仍缺乏一个标准的组件模型来开发它们。除此之外，使用像\
    \ Visual Basic、Oracle Forms 和 PowerBuilder 这样的第四代语言（4GL）开发具有可重用组件的 Web 应用也尚不可行。\n\
    \nJSF 是最新的 Java EE Web 技术。凭借其组件模型，它解决了可重用组件以及简化 Web 应用构建的问题。不过，可重用组件模型并非 JSF 提供的唯一特性。我们将在后续章节中探讨\
    \ JSF 的其他一些特性和优势。\n\n#### 模型-视图-控制器模式\n\n在 Java EE Web 技术开发的早期阶段，大多数 Web 应用都是使用所谓的\
    \ Model-I 方法构建的。Model-I 的基本思想是，渲染动态 Web 内容的 Web 技术与后端系统的业务逻辑紧密交织在一起。这种方法没有关注点分离，导致了应用维护问题。Model-II\
    \ 方法（也称为模型-视图-控制器 [MVC] 模式）是 Model-I 方法的后续发展。这种方法的关键在于视图层与提供数据和业务逻辑的模型层之间的清晰分离。\n\
    \n模型-视图-控制器的主要优势包括：\n\n*   基于 JAX-RS 的面向动作框架\n*   手动控制器逻辑……你掌控自己的命运\n*   无 UI\
    \ 组件\n*   你选择你的前端技术\n\nMVC 模式并非 Java 语言所特有；它可以追溯到像 Smalltalk 这样的语言。在这种方法中，模型层用于业务逻辑和数据，视图用于渲染用户界面，控制器用于应用流程和事件处理。虽然\
    \ Java EE 平台在模型和视图相关技术方面一直在演进，但它并未包含一个可用于控制器侧的内置框架。相反，许多开发者使用 Java Servlet 技术构建了自制的控制器。还有许多人转向了\
    \ Apache Struts，它为编写自制控制器提供了一种替代方案。Apache Struts 是一个广泛使用的开源框架，已成为 Web 应用事实上的控制器框架。\n\
    \n最终，JSF 技术通过提供控制器作为框架的一部分，标准化了 MVC 模式中的控制器方面。\n\nMVC 1.0 控制器的优势包括：\n\n*   控制\
    \ MVC 应用的请求处理\n*   JAX-RS 实现\n*   在类级别或方法级别使用 `@Controller` 注解的类\n*   必须是 CDI\
    \ 管理的\n*   可以创建混合类（在方法级别使用 `@Controller`）\n*   四种返回类型：String、void、Response、Viewable\n\
    \    *   String：返回视图路径\n    *   Void：需要 `@javax.mvc.View` 注解\n    *   Response：典型的\
    \ `javax.ws.rs.core.Response`，提供对响应的完全访问\n    *   Viewable：`javax.mvc.Viewable`，包含关于视图及其处理方式的信息\n\
    *   默认响应类型为 text/html，但可以通过 `@Produces` 修改\n\nMVC 1.0 包含模型，用于利用实体类处理数据，或存储到 CDI\
    \ bean 中。\n\n使用模型的两种方式包括：\n\n*   `javax.mvc.Models` 类\n*   基于 CDI 的模型\n\nJSR 371：模型-视图-控制器\
    \ 1.0 规范可在以下网址找到：[`https://www.mvc-spec.org/`](https://www.mvc-spec.org/)\n\n\
    以下是 JSF 和 MVC 之间的主要区别：\n\nJSF：\n\n*   基于组件\n*   控制器逻辑\n*   自动化处理\n*   Facelets\n\
    *   快速开发\n*   与 REST 配合良好\n*   有状态……跨请求保持\n\nMVC：\n\n*   基于动作\n*   基于 JAX-RS 的层次化\n\
    *   手动验证/转换\n*   多种不同的视图选项\n*   精细控制请求/响应\n*   非常适合 REST\n*   跨请求无状态\n\n### JSF\
    \ 架构\n\n图 12-9 展示了简化的 JSF 架构。JSF 有一个名为 `FacesServlet` 的前端控制器 Servlet。`FacesServlet`\
    \ 扮演着将来自客户端的传入请求代理到正确位置的角色。如前所述，JSF 带有可重用的 Web 组件，可用于开发用户界面。这些 UI 组件可以与称为托管 bean\
    \ 的对象相关联。这些托管 bean 处理应用的逻辑，并与后端系统或组件（如 EJB）进行交互。JSF 中的每个 UI 组件都可以与不同的渲染工具包相关联，这些工具包可以生成不同的标记，例如\
    \ HTML 或 WML（无线标记语言），以适应不同类型的设备。\n\n![A311833_3_En_12_Fig9_HTML.jpg](img/A311833_3_En_12_Fig9_HTML.jpg)\n\
    \n图 12-9\n\nJSF 架构\n"
- fmt: '### The JSF Life Cycle


    Figure [12-10](#A311833_3_En_12_Chapter.html#Fig10) shows the JSF life cycle that
    handles the initial requests, as well as the postbacks from the client application
    or user interface. The following list describes the lifecycle phases:


    ![A311833_3_En_12_Fig10_HTML.jpg](A311833_3_En_12_Fig10_HTML.jpg)


    Figure 12-10


    The JSF life cycle


    - **Restore view**: If the incoming request is an initial request, the JSF implementation
    creates the view. During the view creation, the UI objects for each UI component
    are created and stored in a component tree. The state of the UI view is then saved
    for subsequent requests. If the incoming request is a postback, the JSF implementation
    restores the saved UI to process the current request.

    - **Apply request values**: In this phase, the data that was sent as part of the
    request is used to update the UI objects that are part of the view.

    - **Process validation**: In this phase, the data that has been submitted is validated.

    - **Update model**: In this phase, the back-end objects are updated with the validated
    data from the request. Conversion of received data also happens in this phase.

    - **Invoke application**: In this phase, the back-end application is invoked to
    complete the processing of the request, and the response is rendered back to the
    client.

    - **Render response**: In this phase of the life cycle, the UI components are
    rendered, and the response is sent back to the client.


    ### The JSF Application


    A typical JSF application consists of the following:


    - **JSP pages or Facelets**: The JSP pages or Facelets in the application contain
    the JSF UI components that are encapsulated in the JSP tags. Each JSF component
    is a building block that is markup agnostic. It contains three major pieces: a
    `UIComponent`, a renderer, and a tag handler. The `UIComponent` defines the behavior
    of the component (for example, the behavior of a UI component like a radio group
    or a menu). It is also associated with a specific renderer at runtime. The renderer
    is in charge of what markup is being rendered to the client. A tag handler is
    a JSP tag that allows for usage of JSF UI components in JSP.

    - **Navigation model**: The information about how the control flows through the
    application is defined in an XML deployment descriptor called `faces-config.xml`.
    This file can hold several other types of information, such as validators, converters,
    and lists of managed beans. Each JSF application can contain more than one `faces-config.xml`
    file.

    - **Managed beans**: These are plain Java classes that facilitate the application
    logic. They can be used as bindings to the data coming from a back-end component,
    or to invoke a business method in the back-end application.


    ### JSF Tools and Components


    Having a standard doesn’t always help. Support from developer communities and
    vendors plays an important role in making a technology successful. While the goal
    of JSF is to simplify drastically Web application development, this goal cannot
    be reached with standardization alone. We need the full range of available UI
    components for developers to build applications, as well as the full range of
    development tools to assist in the application-building process. In the last couple
    of years, development tools such as JDeveloper, Java Studio Creator, and Eclipse
    have provided support for building JSF applications. Apache MyFaces, an open source
    implementation of the JSF framework, offers components that provide more functionality
    than those from the JSF reference implementation. Oracle has also released more
    than 100 standard Faces components under the umbrella of ADF Faces. These ADF
    Faces components have been donated to the Apache Software Foundation, and are
    now part of the MyFaces project, A.K.A. Trinidad. All of these factors have significantly
    contributed to the success of the JSF technology and its adoption by developers.


    > **Note**: Information about the MyFaces project can be found at: [`http://myfaces.apache.org`](http://myfaces.apache.org).


    ## Developing Web Applications Using JSF and EJB


    A significant amount of work was done in Chapter [7](#A311833_3_En_7_Chapter.html)
    to integrate different types of EJBs (session beans, MDBs, entities, and Web services)
    to develop a full-fledged EJB back-end infrastructure for the Wines Online application.
    In this section, we will develop a JSF client application that will work on top
    of the EJB back-end application, as shown in Figure [12-11](#A311833_3_En_12_Chapter.html#Fig11).


    ![A311833_3_En_12_Fig11_HTML.jpg](A311833_3_En_12_Fig11_HTML.jpg)


    Figure 12-11


    Sample application architecture


    The main goal of this section is to show you how to develop a set of JSF pages
    and wire them to EJB components in the back-end application. With this in mind,
    we’ll start with the ways in which the user would navigate through a set of Web
    pages to perform the following operations:


    - Register as a new customer

    - Log in

    - Search wines based on different criteria

    - Add wines to the shopping cart

    - View the contents of the shopping cart

    - Submit orders


    Figure [12-12](#A311833_3_En_12_Chapter.html#Fig12) shows the application flow,
    and it illustrates a set of JSF pages that allows the user to perform the aforementioned
    actions. We will build one page at a time, wire each page to the EJB back-end
    application as needed, and complete the application.


    ![A311833_3_En_12_Fig12_HTML.jpg](A311833_3_En_12_Fig12_HTML.jpg)


    Figure 12-12


    JSF application page flow


    We’ll start with a simple login page.'
