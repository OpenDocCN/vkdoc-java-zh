    The processOrder Business Method

    ```


    #### Sending a Purchase Order to the Order Processing Service


    Listing [7-12](#A311833_3_En_7_Chapter.html#Par60) shows the `sendPOtoMDB()` method
    in `OrderProcessFacadeBean`. This business method makes use of injected Java Messaging
    Service (JMS) resources for a topic connection factory and a topic. A connection
    to a topic connection factory is created and the connection is started. Once a
    connection is available, a session is created and a `MessageProducer` is created
    with a topic. An `ObjectMessage` is created to take the `PurchaseOrder` object,
    and the `MessageProducer` is used to send the `PurchaseOrder` to the topic.


    ```

    private void sendPOtoMDB(PurchaseOrder po) {

    //send PO to MDB now

    Connection connection = null;

    Session session = null;

    try {

    connection = poTopicCF.createConnection();

    connection.start();

    session = connection.createSession(false, Session.AUTO_ACKNOWLEDGE);

    MessageProducer producer = session.createProducer(poTopic);

    ObjectMessage objMessage = session.createObjectMessage();

    objMessage.setObject(po);

    producer.send(objMessage);

    } catch (JMSException e) {

    e.printStackTrace();

    } finally {

    if (session != null) {

    try {

    session.close();

    } catch (JMSException ex) {

    Logger.getLogger(OrderProcessFacadeBean.class.getName()).log(Level.SEVERE, null,
    ex);

    }

    }

    if (connection != null) {

    try {

    connection.close();

    } catch (JMSException ex) {

    Logger.getLogger(OrderProcessFacadeBean.class.getName()).log(Level.SEVERE, null,
    ex);

    }

    }

    }

    }

