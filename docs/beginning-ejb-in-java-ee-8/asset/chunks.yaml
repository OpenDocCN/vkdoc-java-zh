  raw: '# 3. Entities and the Java Persistence API (JPA)


    Now that you have explored how EJB provides business services through session
    beans, we’ll turn your attention to a different kind of component called entities
    , which are classes that represent tables in a database, and whose instances represent
    rows in those tables. Whereas session beans provide services to a client application,
    entities represent the business data. A common pattern is for a session bean to
    provide a convenient interface for manipulating entities in the context of transactional,
    security, access control, and other enterprise services. Methods to perform Create,
    Retrieve, Update, and Delete operations, also known as CRUD methods, are exposed
    on a session bean to the client to provide a “façade” pattern that we will use
    throughout the book.


    The Java Persistence consists of four areas:


    *   The Java Persistence API

    *   The Java Persistence Criteria API

    *   The Query Language

    *   Object & Relational Mapping Metadata


    Java Persistence API (JPA) was first introduced in Java EE 5, and it marked a
    departure from the previous persistence model of “entity beans” that were defined
    as part of the EJB specification. JPA is widely regarded as a tremendous improvement
    over the entity beans model defined in earlier versions of EJB. JPA borrows unabashedly
    from both proprietary and open source models such as TopLink, Hibernate, JDO,
    and Spring, which gained traction as popular alternatives to the often heavyweight
    and cumbersome entity bean model defined in earlier EJB revisions. Consequently,
    like session beans, entities are simple POJOs (plain old Java objects), and apart
    from a sliver of metadata indicating that they are an entity—captured in a Java
    annotation or in the persistence XML descriptor—they are a very clean representation
    of the underlying database table. While JPA expanded the persistence model in
    reach and ability, entities themselves conveniently became largely decoupled from
    their supporting persistence framework, allowing them to be used as ordinary POJOs
    as well as objects managed by the persistence framework, both inside and outside
    a Java EE container.


    JPA 1.0 was introduced in Java EE 5, JPA 2.0 accompanied Java EE 6, JPA 2.1 followed
    by Java EE 7, and JPA 2.2 was included in Java EE 8\. The final version of JPa
    2.2 will be part of Java EE 9.


    Note


    When using a JPA 1.0, JPA 2.0, or JPA 2.1 implementation, the schema will be `orm_1_0.xsd,
    orm_2_0.xsd` or `orm_2_1.xsd` respectively, located at [`http://xmlns.jcp.org/xml/ns/persistence/`](http://xmlns.jcp.org/xml/ns/persistence/)
    `.` When using the JPA 2.2 the schema will be instead named persistence_2_2.xsd
    and it will be also located as before at [`http://xmlns.jcp.org/xml/ns/persistence/`](http://xmlns.jcp.org/xml/ns/persistence/)


    In this book we will utilize version 2.2 of the Java Persistence API as part of
    the Java EE 8.


    Notice that in general JPA 2.2 is just a small release with a few new features
    added, while the rest of them will be still part of the JPA 2.1.


    Maintenance release of JPA 2.2 started during 2017 under JSR 338 and was finally
    approved on June 19, 2017.


    Here is the official Java Persistence 2.2 Maintenance release statement:


    “The Java Persistence 2.2 specification enhances the Java Persistence API with
    support for repeating annotations; injection into attribute converters; support
    for mapping of the java.time.LocalDate, java.time.LocalTime, java.time.LocalDateTime,
    java.time.OffsetTime, and java.time.OffsetDateTime types; and methods to retrieve
    the results of Query and TypedQuery as streams.”


    The JPA 2.2\. changelog file can be found here:


    [`https://jcp.org/aboutJava/communityprocess/maintenance/jsr338/ChangeLog-JPA-2.2-MR.txt`](https://jcp.org/aboutJava/communityprocess/maintenance/jsr338/ChangeLog-JPA-2.2-MR.txt)


    In the spirit of this book, the two chapters on persistence will cover the most
    commonly used features included in JAP 2.2, describing their use through practical
    examples using our online wine store application. This chapter will get you started
    writing entity classes and using the key persistence features. The next chapter
    will explore more advanced persistence features. Through examples, these chapters
    explain the major areas of the persistence-programming model. They are not meant,
    however, to be a substitute for the expansive JPA specification. We encourage
    you to refer to the JPA spec when you’re ready to explore details that go beyond
    the scope of this discussion.


    Table [3-1](#A311833_3_En_3_Chapter.html#Tab1) summarizes what we’ll be covering
    in this chapter.


    Table 3-1


    Key Topics in This Chapter


    | Concept | Description |

    | --- | --- |

    | An entity example | We begin with a simple JavaBean and progressively add annotations
    required to transform it into a simple entity and then beyond. |

    | Primary entity annotations | Further refining the requirements of an entity,
    the entity class must have a no-argument `public` or `protected` constructor and
    must not be `final`. Entities define their persistent structure through their
    JavaBeans property accessors or instance variables, and they may also include
    custom methods. |

    | The `EntityManager` | The `EntityManager` object provides persistence services,
    including transaction management and query, merge, remove, find, and refresh operations.
    It is central to an understanding of the JPA persistence framework. |

    | Entity life cycle | An entity instance may go through many formal states during
    its life as an in-memory Java object. Understanding these different states will
    help you know when the entity is in a consistent or inconsistent state with the
    back-end database and how to reconcile these differences within a transactional
    context. |

    | Object/relational (O/R) mapping | JPA defines declarative markup through annotations
    and/or XML descriptors to map entity fields to table columns in a relational database
    management system (RDBMS). |

    | Entity relationships | Entity classes may hold unary and collection references
    to themselves or to other entities. Note that, in JPA, relationship fields are
    not bidirectionally maintained by the container. |

    | Java Persistence Query | JPA defines an SQL-like language—JPQL—that supports
    queries along with bulk update and Language (JPQL) delete operations. Queries
    may either be defined statically, as named queries, or dynamically. Queries may
    take bind parameters and return Java objects, including entity instances or Maps.
    |

    | Persistence vs. Adaption | As a practical consideration when designing your
    entity classes, consider whether the entity class is the primary design object
    or whether the database schema is the source of truth. In the former case, the
    database serves mainly to persist the entity data; whereas in the latter case,
    the entity class serves to adapt the table into Java. |

    | Example application | Finally, we give an example application consisting of
    three JPA entities, an EJB, and an HTTP servlet that demonstrates all of the concepts
    in this chapter in a simple, working model. |


    ## An Entity Example


    Let’s take a look at how you can transform a simple JavaBean into an entity and
    progressively customize it to add functionality and flexibility.'
  trans: '

    # 3. 实体与 Java 持久化 API (JPA)


    在了解了 EJB 如何通过会话 Bean 提供业务服务之后，我们将把注意力转向一种不同类型的组件，称为实体。实体是代表数据库中表的类，其实例代表这些表中的行。会话
    Bean 为客户端应用程序提供服务，而实体则代表业务数据。一种常见的模式是，会话 Bean 提供一个便捷的接口，用于在事务、安全、访问控制和其他企业服务的上下文中操作实体。执行创建、检索、更新和删除操作的方法（也称为
    CRUD 方法）在会话 Bean 上暴露给客户端，以提供一种“外观”模式，我们将在本书中通篇使用这种模式。


    Java 持久化包含四个领域：


    *   Java 持久化 API

    *   Java 持久化 Criteria API

    *   查询语言

    *   对象与关系映射元数据


    Java 持久化 API (JPA) 首次引入于 Java EE 5，它标志着与之前定义为 EJB 规范一部分的“实体 Bean”持久化模型的分离。JPA
    被广泛认为是对早期 EJB 版本中定义的实体 Bean 模型的巨大改进。JPA 毫不掩饰地借鉴了诸如 TopLink、Hibernate、JDO 和 Spring
    等专有和开源模型，这些模型作为早期 EJB 修订版中通常重量级且繁琐的实体 Bean 模型的流行替代方案而获得关注。因此，与会话 Bean 类似，实体是简单的
    POJO（普通旧式 Java 对象），除了表明它们是实体的一小部分元数据（捕获在 Java 注解或持久化 XML 描述符中）之外，它们是对底层数据库表非常清晰的表示。虽然
    JPA 在范围和能力上扩展了持久化模型，但实体本身却方便地与其支持的持久化框架在很大程度上解耦，允许它们既可以用作普通 POJO，也可以用作持久化框架管理的对象，无论是在
    Java EE 容器内部还是外部。


    JPA 1.0 引入于 Java EE 5，JPA 2.0 伴随 Java EE 6 出现，JPA 2.1 紧随 Java EE 7，而 JPA 2.2 包含在
    Java EE 8 中。JPA 2.2 的最终版本将成为 Java EE 9 的一部分。


    注意


    当使用 JPA 1.0、JPA 2.0 或 JPA 2.1 实现时，模式将分别是 `orm_1_0.xsd`、`orm_2_0.xsd` 或 `orm_2_1.xsd`，位于
    [`http://xmlns.jcp.org/xml/ns/persistence/`](http://xmlns.jcp.org/xml/ns/persistence/)
    。当使用 JPA 2.2 时，模式将改名为 `persistence_2_2.xsd`，并且同样位于之前的地址 [`http://xmlns.jcp.org/xml/ns/persistence/`](http://xmlns.jcp.org/xml/ns/persistence/)
    。


    在本书中，我们将使用 Java 持久化 API 的 2.2 版本，作为 Java EE 8 的一部分。


    请注意，总的来说，JPA 2.2 只是一个小的发布版本，增加了一些新特性，而其余特性仍然是 JPA 2.1 的一部分。


    JPA 2.2 的维护版本于 2017 年在 JSR 338 下启动，并于 2017 年 6 月 19 日最终获得批准。


    以下是官方的 Java 持久化 2.2 维护版本声明：


    “Java 持久化 2.2 规范通过支持重复注解、向属性转换器注入、支持 `java.time.LocalDate`、`java.time.LocalTime`、`java.time.LocalDateTime`、`java.time.OffsetTime`
    和 `java.time.OffsetDateTime` 类型的映射，以及提供将 `Query` 和 `TypedQuery` 的结果作为流检索的方法，增强了
    Java 持久化 API。”


    JPA 2.2 的变更日志文件可以在这里找到：


    [`https://jcp.org/aboutJava/communityprocess/maintenance/jsr338/ChangeLog-JPA-2.2-MR.txt`](https://jcp.org/aboutJava/communityprocess/maintenance/jsr338/ChangeLog-JPA-2.2-MR.txt)


    本着本书的精神，关于持久化的两章将涵盖 JPA 2.2 中包含的最常用特性，通过使用我们的在线葡萄酒商店应用程序的实际示例来描述它们的用法。本章将引导您开始编写实体类并使用关键的持久化特性。下一章将探讨更高级的持久化特性。通过这些示例，这些章节解释了持久化编程模型的主要领域。然而，它们无意替代内容广泛的
    JPA 规范。当您准备好探索超出本讨论范围的细节时，我们鼓励您参考 JPA 规范。


    表 3-1 总结了本章将要涵盖的内容。


    表 3-1


    本章关键主题


    | 概念 | 描述 |

    | --- | --- |

    | 实体示例 | 我们从简单的 JavaBean 开始，逐步添加所需的注解，将其转换为一个简单的实体，然后再进一步。 |

    | 主要实体注解 | 进一步细化实体的要求，实体类必须有一个无参的 `public` 或 `protected` 构造方法，并且不能是 `final` 的。实体通过其
    JavaBeans 属性访问器或实例变量定义其持久化结构，并且它们还可以包含自定义方法。 |

    | `EntityManager` | `EntityManager` 对象提供持久化服务，包括事务管理以及查询、合并、移除、查找和刷新操作。它是理解 JPA
    持久化框架的核心。 |

    | 实体生命周期 | 一个实体实例在其作为内存中 Java 对象的生命周期中可能会经历许多正式状态。理解这些不同的状态将帮助您了解实体何时与后端数据库处于一致或不一致的状态，以及如何在事务上下文中协调这些差异。
    |

    | 对象/关系 (O/R) 映射 | JPA 通过注解和/或 XML 描述符定义声明式标记，以将实体字段映射到关系数据库管理系统 (RDBMS) 中的表列。
    |

    | 实体关系 | 实体类可以持有对自身或其他实体的一元引用和集合引用。请注意，在 JPA 中，关系字段不是由容器双向维护的。 |

    | Java 持久化查询语言 (JPQL) | JPA 定义了一种类似 SQL 的语言——JPQL——它支持查询以及批量更新和删除操作。查询可以静态定义为命名查询，也可以动态定义。查询可以接受绑定参数并返回
    Java 对象，包括实体实例或 Map。 |

    | 持久化 vs. 适配 | 在设计实体类时，作为一个实际考虑，要判断实体类是主要的设计对象，还是数据库模式是事实来源。在前一种情况下，数据库主要用于持久化实体数据；而在后一种情况下，实体类用于将表适配到
    Java 中。 |

    | 示例应用程序 | 最后，我们给出一个示例应用程序，它由三个 JPA 实体、一个 EJB 和一个 HTTP Servlet 组成，在一个简单的工作模型中演示了本章的所有概念。
    |


    ## 实体示例


    让我们看看如何将一个简单的 JavaBean 转换为一个实体，并逐步对其进行定制以增加功能和灵活性。

    '
- fmt: '### A Simple JavaBean: `Customer.java`


    We begin with a simple JavaBean, as shown in Listing [3-1](#A311833_3_En_3_Chapter.html#Par21).
    This class has properties as defined by the JavaBeans standard. Each property
    on the JavaBean is represented to the world outside the bean through a pair of
    property accessor methods. For each property, a getter method retrieves its data,
    and a setter method assigns it. Internally, these property accessor methods read
    and write to a private, dedicated instance variable on the JavaBean class.


    ```

    public class Customer {

    private long customerId;

    private String name;

    public long getCustomerId() { return customerId; }

    public void setCustomerId(long customerId) { this.customerId = customerId; }

    public String getName() { return name; }

    public void setName(String name) { this.name = name; }

    }

    Listing 3-1

    A Simple JavaBean

    ```


    ### A Simple Entity: `Customer.java`


    Listing [3-2](#A311833_3_En_3_Chapter.html#Par23) shows our simple JavaBean after
    it has been transformed into an entity.


    ```

    @Entity

    public class Customer implements Serializable {

    @Id

    private long customerId;

    private String name;

    public long getCustomerId() { return customerId; }

    public void setCustomerId(long customerId) { this.customerId = customerId; }

    public String getName() { return name; }

    public void setName(String name) { this.name = name; }

    }

    Listing 3-2

    A Simple Entity

    ```


    The only changes required were to add the `@Entity` and `@Id` annotations. The
    `@Id` annotation identifies `customerId` as the primary key for the entity, which
    is required to express its unique identity. These are the minimum metadata requirements
    to transform this class into an entity. We also added the `Serializable` interface,
    as this is a good practice to ensure compatibility with remote clients.


    #### The `@Entity` Annotation


    The `@Entity` annotation is required to identify this class as an entity at the
    time the entity is deployed. When entities are deployed in a persistence archive
    (JAR file), they may be accompanied by non-entity classes. This annotation, or
    its equivalent declaration in the `orm.xml` file, tells the container to look
    for further annotations on the class and otherwise handle its O/R mappings, allow
    it to participate in queries and persistent relationships with other entities,
    and undergo byte weaving or other procedures when they are later instantiated
    by the persistence provider. All classes that are not marked as entities are ignored
    by the persistence provider during deployment.


    #### The `@Id` Annotation


    The `@Id` annotation indicates which field or fields—there may be several—is the
    entity’s primary key, or identifier. The value in the identifier field (or fields)
    must be unique across all entity instances of the entity type `Customer` so that
    it can uniquely identify this entity. In the case that the primary key spans multiple
    columns in the table, a composite primary key is required, and the `@Id` fields
    may be replaced by a single field that is annotated `@EmbeddedId`. We will discuss
    how to specify composite keys later in the chapter.


    #### Comparison with EJB 2.x


    The fundamental JPA coding construct is the entity class. In EJB 2.x and earlier,
    an entity bean served as the primary persistence object and was comprised of a
    bean class and a local and/or remote component and home interface. Beginning with
    JPA, most of the trappings of the entity bean have been stripped away or simplified
    through strong use of defaults and annotations. What remains is simply the entity
    bean class, known now as the entity class, or more simply still, the entity. While
    it is equally valid to specify persistence metadata in an XML descriptor, for
    brevity, all examples in this chapter use Java annotations. As in the EJB 3 realm,
    each declarative construct specified by an annotation has a corresponding representation
    in the XML descriptor for the persistence unit (collection of collocated entities),
    and so may be equivalently specified in XML. The decision whether to use annotations
    or XML is entirely a matter of personal choice.


    #### Configuration by Default


    The previous two annotations were specified explicitly. Given the EJB 3 simplified
    development model that leverages configuration by default, you will not be surprised
    to find out that a lot of other metadata in this example is implied by default.
    Before exploring these default settings, it is worth considering why the `@Entity`
    and `@Id` annotations were chosen to be specified explicitly, rather than implied
    implicitly.


    The `@Entity` annotations could have been the default settings for each class
    deployed through a persistence archive, and a hypothetical `@NotEntity` annotation
    could have been used to specify a non-entity class. However, following the pattern
    set by session- and message-driven beans, the explicit opt-in pattern was chosen
    instead.


    Similarly, all fields could have been assumed to be part of the primary key, but
    in practice only a small subset (usually only one) of an entity’s properties typically
    comprises an entity’s primary key. The spec designers felt that it makes better
    sense in this case to use the opt-in pattern of explicitly specifying `@Id` on
    primary key fields, implying that all columns are not part of the primary key.
    This type of decision characterizes the configuration-by-default approach, in
    which annotations are not required for the more common cases and are only used
    when an override is needed.


    The next section will examine some of the behavior that this `Customer` entity
    acquired by default, and it will show how you can override this default behavior.


    ### An Entity with Defaults Exposed: `Customer.java`


    Listing [3-3](#A311833_3_En_3_Chapter.html#Par33) shows the same entity with some
    of its defaults shown.


    ```

    @Entity(name="Customer")

    @Table(name=" CUSTOMER")

    public class Customer implements Serializable {

    @Id

    @Column(name="CUSTOMERID", table="CUSTOMER", unique=true,

    nullable=false, insertable=true, updatable=true)

    private long customerId;

    @Basic(fetch=FetchType.EAGER)

    @Column(name="NAME", table="CUSTOMER")

    private String name;

    // . . .

    }

    Listing 3-3

    An Entity with Defaults Shown

    ```


    Each entity has a name, and unless otherwise specified, this name defaults to
    the unqualified class name, which in this case is `LiCustomer`. This name is used
    when referring to the entity in query statements (Java Persistence Query Language,
    or JPQL, is covered in Chapter [4](#A311833_3_En_4_Chapter.html)) and is typically
    specified when the unqualified class name is awkward or is a reserved name in
    JPQL.


    #### The `@Table` Annotation


    An entity instance typically represents a single row in a table, and it exposes
    each column value in that row through a corresponding property on the entity.
    Consequently, an entity must map to a table in a database, and that table is specified
    using the `@Table` annotation. Its name defaults to the entity name. Since not
    all databases support mixed-case table names, this translates to a table named
    `CUSTOMER`.


    #### The `@Column` Annotation


    Similarly, each field declared on the entity maps by default to a column with
    the same name, and so the `customerId` and `name` fields map to the `CUSTOMERID`
    and `NAME` columns in the `CUSTOMER` table. The `@Column` annotation may also
    be used to override default column-type information, as well as column-level constraints,
    such as those used to indicate that the column is optional, insertable, and/or
    updatable. Ordinarily, it is only necessary to specify this level of detail when
    you are relying on the container to create the table when an entity is deployed.'
