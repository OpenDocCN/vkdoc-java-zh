- fmt: '### SOAP


    Simple Object Access Protocol (SOAP), currently v 1.2, is an XML-based protocol
    used for exchanging information in a decentralized and distributed environment
    using XML. SOAP is a standard developed by the W3C. Fundamentally, SOAP is the
    default transport layer for the Web services.


    A SOAP message is an ordinary XML document containing the following elements:


    - The required `Envelope` element identifies the XML document as a SOAP message.
    `Envelope` is the top-level element in the document. The envelope is required,
    and it basically marks the start and end of the SOAP message (although messages
    can contain links to objects outside the envelope). The envelope contains the
    `Header` and the `Body` elements.

    - The optional `Header` element contains header information. When the SOAP protocol
    is used over HTTP, the HTTP headers provide information about the content type,
    content length, and recipient of the message. A header is included to add features
    to a SOAP message without prior agreement between the communicating parties.

    - The required `Body` element contains call-and-response information. `Body` is
    a mandatory element that contains the information for the recipient of the message.

    - The optional `Fault` element provides information about errors that occur while
    the message is processed. The `Body` element can contain an optional `Fault` element
    to report errors.


    Figure [6-2](#A311833_3_En_6_Chapter.html#Fig2) illustrates the elements of a
    SOAP message.


    ![A311833_3_En_6_Fig2_HTML.jpg](A311833_3_En_6_Fig2_HTML.jpg)


    Figure 6-2


    A SOAP Message


    ### REST


    REST (REpresentational State Transfer) is a software architecture pattern that
    uses HTTP (Hyper Text Transfer Protocol) to discover, query, and manipulate resources
    in a decentralized and distributed environment. In recent times, REST has gained
    popularity compared to WSDL-SOAP-based implementation because of its simplicity.


    Using REST, the client accesses a resource on the server, using the URI (Universal
    Resource Identifier) and the standard set of HTTP methods (`GET`, `POST`, `PUT`,
    and `DELETE`). In response, the server returns a representation of the resource,
    which is nothing but a document that contains the current or intended state of
    the resource. After each access invocation and a corresponding new resource representation
    response, the client is said to transfer state, hence the name Representational
    State Transfer. The REST architectural pattern mandates the following six constraints:


    1.  Client–server Architecture : Clients and servers should be separate and can
    only interact via a uniform interface. This separation means that clients are
    not concerned with the data-storage internals of the server, and the server is
    not concerned with the user interface of the clients.

    2.  Stateless Interaction : Clients and server can only interact using a stateless
    protocol like HTTP. A server cannot store a client context between requests. All
    requests must contain all of the information required for those requests.

    3.  Cacheable : Server responses must identify themselves as cacheable or non-cacheable.
    This can be used to prevent clients from using stale data, and it can also help
    in improving the performance and scalability.

    4.  Layered System : Clients should be able to connect to an intermediary system
    seamlessly rather than directly to the end server. Intermediary systems provide
    facilities like load balancing and shared caching that improve scalability of
    the system.

    5.  Named Resources : Clients must be able to identify individual server resources
    in each request using URIs.

    6.  Uniform Interface : A uniform interface between clients and servers allow
    them to evolve independently.


    #### RESTful Web Services


    RESTful Web services are services that are built based on the above-mentioned
    REST principles. RESTful Web services use HTTP and implement operations that map
    to common HTTP methods as shown in Table [6-1](#A311833_3_En_6_Chapter.html#Tab1).


    Table 6-1


    HTTP Method to CRUD operation mapping


    | HTTP Method | CRUD Operation |

    | --- | --- |

    | `POST` | create |

    | `GET` | retrieve |

    | `PUT` | update |

    | `DELETE` | delete |


    Listing [6-8](#A311833_3_En_6_Chapter.html#Par46) shows a simple RESTful Web service
    named `CreditCheck` that takes a credit card number as an input and returns `true`
    or `false` based on its validity. For simplicity’s sake, our method always returns
    `true`.


    ```

    package com.apress.ejb.chapter06.services;

    import javax.ws.rs.Consumes;

    import javax.ws.rs.PUT;

    import javax.ws.rs.Path;

    import javax.ws.rs.PathParam;

    import javax.ws.rs.Produces;

    @Path("creditCheck")

    public class CreditCheck {

    @PUT

    @Consumes("text/plain")

    @Produces("text/plain")

    @Path("isValid")

    public boolean isValid(@PathParam("cardNumber")String ccNumber) {

    return true;

    }

    }

    Listing 6-8

    CreditCheck.java

    ```


    Users can invoke the `isValid` method in `CreditCheck` as follows, and `ccNumber`
    will be assigned the value 12345.


    `http://<host>:<port>/<resource>/creditCheck/isValid/12345`


    #### RESTful vs. SOAP-Based Web Services


    Table [6-2](#A311833_3_En_6_Chapter.html#Tab2) lists the important difference
    and similarities between RESTful Web service and SOAP-based Web service.


    Table 6-2


    RESTful vs. SOAP-Based Web Services


    | Criteria | SOAP | RESTful |

    | --- | --- | --- |

    | Specification | JAX-WS | JAX-RS |

    | Simple/Complex | Complex | Simple |

    | Message Size | Large (XML markup) | Small (no extra XML markup) |

    | Standards Based | Yes | No |

    | Transport | HTTP, SMTP, JMS | HTTP |

    | Caching | No | GET operations can be cached |

    | Protocols | JMS, SMTP, HTTP | HTTP |

    | Human Readable Payload | No | Yes |

    | Language and Platform | Independent | Independent |


    ### When Do You Use Web Services?


    Web services provide a standard way to expose existing or new applications and
    data to external parties—including customers, suppliers, and partners—or across
    departments in an enterprise, using industry standards. Web services can also
    be used to integrate heterogeneous applications and data.


    While many enterprises use Web services internally, there are numerous examples
    of external Web services that are available. Some of the popular ones are package-tracking
    services (provided by shippers like FedEx, UPS, and USPS). E-commerce websites,
    like [`www.amazon.com`](http://www.amazon.com), [`www.yahoo.com`](http://www.yahoo.com),
    [`www.ebay.com`](http://www.ebay.com), and [`www.google.com`](http://www.google.com)
    expose their core functionality using Web services. Developers can subscribe and
    use the Web services provided by these e-commerce providers to develop applications
    that add value to, or provide seamless integration with, back-end systems.


    ## Java EE 8 and Web Services


    The Java EE platform has evolved over the last few years to become a mature, stable,
    reliable, and available platform for enterprise applications. While technologies
    like JDBC (Java Database Connectivity), JMS, and EJB have been in the Java EE
    platform right from the start, however, only in J2EE 1.4 has the development and
    deployment of Web services assumed better shape as they’ve been standardized to
    make the Web services in the Java EE platform more portable across application
    servers and interoperable with .NET Web Services. The common goal for the Java
    EE specifications was to provide ease of development and deployment for applications
    and services. Some of the key specifications in Java EE that are related to Web
    services are JAX-WS, JAXB, JAXR, SAAJ, and the JSR 224 annotations. In the following
    sections, we will show what these specifications are and how they can be used
    with EJB. Figure [6-3](#A311833_3_En_6_Chapter.html#Fig3) shows how EJB interacts
    with different Web service-related specifications under the Java EE platform.


    ![A311833_3_En_6_Fig3_HTML.jpg](A311833_3_En_6_Fig3_HTML.jpg)


    Figure 6-3


    EJB and Web Services'
