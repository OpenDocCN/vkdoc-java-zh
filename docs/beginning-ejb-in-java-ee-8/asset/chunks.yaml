  trans: '

    #### 此方法的优势


    使用带有 CMT 边界的默认无状态会话 Bean 的主要优势在于，客户端无需关心事务逻辑的启动、结束或其他协调工作。此外，调用 Bean 方法时线程中当前生效的任何事务上下文都会自动传播到该方法调用（如果事务属性为`REQUIRED`或`SUPPORTS`）。每次对`OrderProcessorCMT`
    Bean 的调用要么成功完成（此时可假定工作已持久化保存），要么抛出异常（此时该方法中执行的工作将完全回滚）。这是一种非常简单的模型。


    #### 此方法的局限性


    通常来说，简单是好事，但有时也过于局限。虽然此示例允许客户端在客户端层创建和操作新的实体实例（例如创建`Customer`、`Wine`和`CartItem`实例时），但客户端必须依赖
    EJB 来确保其对实体模型所做的更新能在事务中持久化到数据库，因为事务总是在控制权交还给客户端之前由 EJB 容器启动和终止。


    在下一个示例中，我们将展示如何使用有状态会话 Bean，结合 BMT 和扩展持久化上下文，使客户端在应用程序的事务行为方面拥有更大的灵活性（以及相应的责任）。


    注意


    EJB 用户中普遍存在一种观念，认为出于性能原因应避免使用有状态会话 Bean。我们进行的性能测试强烈表明，有状态会话 Bean 一直受到不公正的诋毁，如果正确使用，它们实际上可以提升性能。此外，在
    EJB 中，它们的价值得到了提升，因为它们提供了`PersistenceContext.EXTENDED`选项，允许实体实例跨事务缓存以供使用。


    ### 带有 BMT 边界和扩展持久化上下文的有状态会话 Bean


    为了说明如何扩展 EJB 事务支持的范围，以下是使用有状态 BMT 会话 Bean `OrderProcessorBMTBean.java`编写的同一应用程序。此
    BMT 示例也利用了 EJB 内置的事务支持，但并非依赖容器在方法边界管理事务边界，而是展示了如何在企业 Bean 代码内部显式地划分事务，并可由客户端控制。


    使用有状态会话 Bean 时并不要求必须使用 BMT 边界，事实上这个选项通常并不常用。我们在清单 8-5 中展示它，是为了说明如果您愿意，可以如何使用它。

    '
