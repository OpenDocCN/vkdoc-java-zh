    ##### 移除之前的测试数据


    我们可以像之前的 CMT 示例那样，通过会话 Bean 方法调用来填充测试环境。然而，使用 BMT 让我们可以选择在客户端以交互方式执行此工作。这是因为 `OrderProcessorBMT`
    Bean 的持久化上下文是 `EXTENDED`（扩展的），允许实体在控制权从企业 Bean 返回到客户端后，仍然与持久化上下文保持关联。


    ```

    //  通过移除所有电子邮件为 ''wineapp@yahoo.com''（或 user.properties 文件中定义的任何地址）的现有 Customer
    来过滤数据。

    //  对 OrderProcessorBMT 上事务性方法的第一次调用将开始一个事务。

    for (Customer customer :

    orderProcessorBMT.getCustomerFindByEmail(PopulateDemoData.TO_EMAIL_ADDRESS)) {

    orderProcessorBMT.removeEntity(customer);

    n++;

    }

    strBuf.append(n + " Customer(s) and ");

    //  移除所有国家为 ''United States'' 的现有 Wine

    n = 0;

    for (Wine wine : orderProcessorBMT.getWineFindByCountry("United States")) {

    orderProcessorBMT.removeEntity(wine);

    n++;

    }

    strBuf.append(n + " Wine(s)");

    out.print(strBuf.toString() + "");

    //  应用这些更改，提交实体移除操作

    orderProcessorBMT.commitTransaction();

    ```


    每次对 `removeEntity()` 的调用都在通过其拦截器在 `OrderProcessorBMT` Bean 上启动的事务中执行，并将实体置于其持久化上下文中的“已移除”状态。在这些步骤结束时，客户端调用
    `commitTransaction()` 来实际执行数据库中的 `DELETE` 操作并提交事务。


    ##### 在客户端创建新的 Customer 和 CartItem 实体实例


    与之前的无状态会话示例一样，实例化 `Customer` 及其 `CartItem` 实体实例并将它们关联起来的步骤不涉及事务，并且可以完全在客户端内部执行：


    ```

    //  创建一个 Customer 并添加一些 CartItem 及其关联的 Wine

    Individual customer = new Individual();

    customer.setFirstName("Transaction");

    customer.setLastName("Head");

    customer.setEmail(PopulateDemoData.TO_EMAIL_ADDRESS);

    for (int i = 0; i < 5; i++) {

    final Wine wine = new Wine();

    wine.setCountry("United States");

    wine.setDescription("Delicious wine");

    wine.setName("Xacti");

    wine.setRegion("Dry Creek Valley");

    wine.setRetailPrice(new Float(20.00D + i));

    wine.setVarietal("Zinfandel");

    wine.setYear(2000 + i);

    orderProcessorBMT.persistEntity(wine);

    final CartItem cartItem = new CartItem();

    cartItem.setCreatedDate(new Timestamp(System.currentTimeMillis()));

    cartItem.setCustomer(customer);

    cartItem.setQuantity(12);

    cartItem.setWine(wine);

    customer.addCartItem(cartItem);

    }

    ```


    值得注意的是，在 JPA 之前，这项工作需要付出更多的努力并消耗更多的资源。使用 EJB 2.x 实体 Bean 时，客户端开发人员有两个主要选择。一种方法是，开发人员可以创建数据传输对象（DTO）或遵循其他类似模式，通过代理来模拟创建和关联实体对象的任务。然后，这个
    DTO 类网络会被传递到会话 Bean 层，就像我们之前所做的那样；但在会话 Bean 内部，必须从 DTO 对象显式创建和初始化实际的实体 Bean。


    第二种方法，直接从客户端更新实体 Bean，编码更简单，但可能会以更高的性能开销为代价。如果客户端位于 Java EE 层之外，每次方法调用都会产生 RMI/IIOP（互联网内部
    ORB 协议上的远程方法调用）编组的开销，以便与驻留在 EJB 容器中的实际 EJB 对象进行通信。当客户端位于 Java EE 层内时，这些开销中的大部分都会被消除，因为它可以使用本地实体
    Bean 接口直接与活动的实体 Bean 通信；但 Java SE 客户端被迫对实体 Bean 使用远程接口。除此之外，容器管理关系（CMR）仅在本地组件接口上受支持；因此，在
    EJB 2.x 世界中，即使是直接的实体 Bean 关系查找和更新，Java SE 客户端也无法使用。


    ##### 持久化 Customer


    尽管在此示例中，我们选择将事务 `begin()` 操作嵌入到拦截 BMT 会话 Bean 方法的拦截器类中，但我们也可以向客户端公开一个 `beginTransaction()`
    调用。因为我们选择了所采用的方法，所以只需要调用 `persistEntity()`，它会隐式地开始事务（但不会提交它）：


    ```

    //  持久化 Customer，依赖级联设置来同时持久化所有相关的 CartItem 实体。

    //  重新赋值 customer 以获取 EJB 容器在持久化时分配的 ID 值。

    orderProcessorBMT.persistEntity(customer);

    ```


    事务上下文不会扩展到客户端线程本身；它只存在于会话 Bean 的线程中。在拦截器内部发生的对 `UserTransaction.begin()` 的调用会在该线程上建立一个事务上下文，当会话
    Bean 的 `persistEntity()` 方法被调用时，该上下文可供其使用。


    ##### 创建 CustomerOrder


    我们的事务现在生效，并继续执行创建客户订单的步骤。此阶段类似于无状态 CMT 示例，不同之处在于事务已经创建，并且必须在结束时显式提交。


    ```

    //  创建一个客户订单并从 CartItem 创建 OrderItem

    final CustomerOrder customerOrder =

    orderProcessorBMT.createCustomerOrder(customer);

    out.print("Retrieving Customer Order Items... ");

    for (OrderItem orderItem : customerOrder.getOrderItemList()) {

    final Wine wine = orderItem.getWine();

    out.println(wine.getName() + " with ID " + wine.getId());

    }

    out.println("done");

    //  提交订单，应用到目前为止所做的所有更改

    orderProcessorBMT.commitTransaction();

    ```


    如果客户端希望在此阶段取消订单，例如通过客户端面板中公开的交互式确认/取消按钮，即使在 `CustomerOrder` 创建之后，BMT 选项也提供了这种可能性。


    #### 此方法的优点


    使用显式事务划分的好处在于它提供了额外的灵活性。EJB 服务器仍然以事务管理器的身份运行，只是它将事务划分控制权暴露给企业 Bean，而不是基于每个方法上的
    `@TransactionAttribute` 设置来自动化此划分。虽然无状态示例可以在创建 `CustomerOrder` 之前提示用户，但此方法允许创建和验证
    `CustomerOrder`——例如，在提交给用户确认之前。但是，必须谨慎使用 BMT，原因如下一节所述。


    #### 此方法的局限性


    可以说，额外的灵活性通常被跟踪事务状态和避免会话 Bean 客户端误用的额外负担所抵消。将开始和结束事务的过程交由客户端调用会话 Bean 方法的顺序来支配，可能会产生悬空事务。客户端与
    Bean 本身协调，有责任干净地结束每个已开始的事务——无论是提交还是回滚。如果您能控制客户端如何使用 Bean，这可能是一个合理的风险——但会话 Bean
    是公开发布的，可能很难预测谁会使用它们以及如何使用它们。


    可以编写 BMT 会话 Bean 来防止误用，但这种防护代码很可能最终使 Bean 的行为与 CMT Bean 类似，在这种情况下，您的努力几乎没有什么收获。

