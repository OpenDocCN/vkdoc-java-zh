- fmt: '#### `@Embedded` and `@Embeddable`


    An entity or mapped superclass may contain fields marked `@Embedded`, and their
    type must be a class that is correspondingly marked `@Embeddable`. Like a mapped
    superclass, an embeddable class may hold mapping metadata for its persistent fields.
    When used in this way, the field that references an embeddable object is marked
    `@Embedded` and the fields on the embeddable class map to the owning entity’s
    table. Embeddable classes are wholly owned by the class that embeds them and are
    persisted, merged, queried, and removed in concert with their owning object. Instances
    of embeddable classes have no persistent identity of their own, and they may not
    be passed around among entities. They are generally used for their convenience
    as a field organization tool, allowing a set of persistent fields to be encapsulated
    as a single field on the owning entity.


    As an example, let us transform our `Address` entity (Listing [4-20](#A311833_3_En_4_Chapter.html#Par117))
    into an embeddable class and embed it as a field on the `Person` entity (Listing
    [4-21](#A311833_3_En_4_Chapter.html#Par118)). Figure [4-5](#A311833_3_En_4_Chapter.html#Fig5)
    shows the underlying schema configured like our `JOINED` hierarchy, with the exception
    that the data columns on `CH04_JOIN_ADDRESS` have been folded into the `CH04_EMB_PERSON`
    table.


    ![A311833_3_En_4_Fig5_HTML.jpg](A311833_3_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Table `CH04_EMB_PERSON` holds columns for all fields in the `Person` entity, as
    well as fields from an embedded `Address`


    The transformation of `Address.java` into an `@Embeddable`, non-entity class is
    shown in Listing [4-20](#A311833_3_En_4_Chapter.html#Par117). The `@Id` and `@Version`
    fields are now gone, since an `Address` no longer has identity on its own. The
    `Employee`, `FullTimeEmployee`, and `PartTimeEmployee` entities are unchanged
    from the `JOINED` hierarchy configuration.


    ```

    /**

    * Address: An embeddable non-entity class

    */

    @Embeddable

    public class Address implements Serializable {

    @SuppressWarnings("compatibility:-5340972441524875330")

    private static final long serialVersionUID = -5279408726470732092L;

    @Column(length = 400)

    private String city;

    @Column(length = 2)

    private String state;

    @Column(length = 400)

    private String street1;

    @Column(length = 400)

    private String street2;

    @Column(name = "ZIP_CODE")

    private String zipCode;

    public Address() {

    }

    /* get/set methods */

    }

    Listing 4-20

    Address.java, an Embeddable Non-Entity Class

    ```


    ```

    /**

    * Person: An abstract entity, and the root of an inheritance hierarchy

    *

    * To create ID generator table "CH04_EMB_PERSON_ID_GEN": CREATE TABLE "CH04_EMB_PERSON_ID_GEN"

    * ("PRIMARY_KEY_NAME" VARCHAR2(4000) PRIMARY KEY, "NEXT_ID_VALUE" NUMBER(38));

    *

    * To initialize this table with data for this entity''s ID generator ''Person.id''
    (starting with

    * value ''0''): INSERT INTO "CH04_EMB_PERSON_ID_GEN" VALUES (''Person.id'', 0);

    */

    @Entity

    @NamedQueries({

    @NamedQuery(name = "Person.findAll", query = "select o from Person o")})

    @Table(name = "CH04_EMB_PERSON")

    @TableGenerator(name = "Person_ID_Generator", table = "CH04_EMB_PERSON_ID_GEN",

    pkColumnName = "PRIMARY_KEY_NAME", pkColumnValue = "Person.id",

    valueColumnName = "NEXT_ID_VALUE")

    @Inheritance(strategy = InheritanceType.JOINED)

    public abstract class Person implements Serializable {

    @SuppressWarnings("compatibility:-7074714881275658754")

    private static final long serialVersionUID = 5291172566067954515L;

    @Id

    @Column(nullable = false)

    @GeneratedValue(strategy = GenerationType.TABLE, generator = "Person_ID_Generator")

    private Integer id;

    @Column(name = "FIRST_NAME", length = 400)

    private String firstName;

    @Column(name = "LAST_NAME", length = 400)

    private String lastName;

    @Embedded

    private Address homeAddress;

    @Version

    private Integer version;

    public Person() {

