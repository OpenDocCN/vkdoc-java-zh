    ## 编译、部署和测试 CDI 应用


    与 EJB 不同，CDI 并未定义任何特殊的部署归档格式。CDI Bean 可以打包在 JAR、EJB-JAR 或 WAR 文件中。唯一的要求是该归档文件必须是一个
    Bean 归档，这意味着归档文件中必须包含 `beans.xml` 描述符。CDI Bean 在归档文件中的位置取决于其 `beans.xml` 的位置。


    *   如果 `beans.xml` 位于归档文件的 `META-INF` 目录中，则 CDI Bean 必须打包在库 JAR、EJB JAR 或 RAR
    归档文件中。

    *   如果 `beans.xml` 位于 WAR 文件的 `WEB-INF` 目录中，则 CDI Bean 必须打包在 WAR 文件的 `WEB-INF/classes`
    目录中。


    在某些 CDI 容器中，打包好的 CDI 归档文件在部署前需要组装成一个企业归档（EAR）文件。应用服务器提供了部署工具或 Ant 任务来简化 CDI Bean
    的部署。像 JDeveloper、NetBeans 和 Eclipse 这样的 Java 集成开发环境（IDE）也提供了部署功能，允许开发者将 CDI Bean
    打包并部署到应用服务器。


    在本章中，我们使用了代码片段来演示 CDI 的两个核心方面：作用域和依赖注入。我们从开发一个简单的 `Wine` 接口开始，然后继续创建了它的两个实现——`RedWine`
    和 `WhiteWine`。我们学习了各种作用域，并为 `RedWine` 实现添加了应用作用域。我们还看到了通过使用限定符、备选方案和生产者来解决歧义依赖的示例。我们到目前为止在章节中列出的
    `WineClient` 客户端演示了客户端如何与 CDI Bean 进行交互，但它并不是一个功能完备的可执行客户端。我们现在将把 `WineClient`
    客户端转换为一个 Servlet 客户端，并通过将其部署在 GlassFish 应用服务器上来测试 CDI Bean。以下各节将引导您完成使用相应的 Servlet
    客户端编译、部署和测试这些 CDI Bean 所需的步骤。


    ### 前提条件


    在执行下一节详述的任何步骤之前，请先完成第 1 章的“入门”部分。该部分将引导您完成本章示例所需的安装和环境设置。


    注意


    在创建新的 NetBeans 项目时，请确保您已在新建应用程序向导的“服务器和设置”页面上选中了“启用上下文和依赖注入”复选框。这将创建一个 `beans.xml`
    并将 CDI 相关的运行时库添加到您的项目中。


    ### 示例代码的结构


    我们将示例分为以下四个包，并且这些包中的所有工件都具有包私有作用域。我们进行这种分离是为了让 CDI 对象及其客户端互不干扰，并且我们可以隔离地观察它们的行为。


    *   `com.apress.ejb.chapter10.userdefinedqualifier`

    *   `com.apress.ejb.chapter10.anyqualifier`

    *   `com.apress.ejb.chapter10.alternatives`

    *   `com.apress.ejb.chapter10.producers`


    ### 编译 CDI Bean 及其客户端


    将 `Chapter10-CDISamples` 目录及其内容复制到您选择的目录中。运行 NetBeans IDE，并使用 `文件` ➤ `打开项目` 菜单打开
    `Chapter10-CDISamples` 项目，如图 10-3 所示。


    ![A311833_3_En_10_Fig3_HTML.jpg](img/A311833_3_En_10_Fig3_HTML.jpg)


    图 10-3


    打开 Chapter10-CDISamples 项目


    展开 `Chapter10-CDISamples` 节点，观察上述各个包出现在“源包”部分下，如图 10-4 所示。


    ![A311833_3_En_10_Fig4_HTML.jpg](img/A311833_3_En_10_Fig4_HTML.jpg)


    图 10-4


    验证 Chapter10-CDISamples 项目中的包


    调用 `Chapter10-CDISamples` 节点的上下文菜单，并通过选择 `清理并构建` 菜单选项来构建应用程序，如图 10-5 所示。CDI Bean
    及其客户端编译无误。


    ![A311833_3_En_10_Fig5_HTML.jpg](img/A311833_3_En_10_Fig5_HTML.jpg)


    图 10-5


    构建项目


    ### 部署和运行 CDI 客户端


    一旦我们编译了 CDI 项目，就可以直接使用每个 Servlet 客户端上下文菜单中的 `运行` 选项来运行客户端。当我们运行 Servlet 客户端时，NetBeans
    IDE 将自动打包 CDI Bean 及其客户端，并将其部署到集成的 GlassFish 应用服务器。


    #### 测试用户自定义限定符客户端


    我们将从测试和实验用户自定义限定符 `Red` 开始，我们在清单 10-8 中创建了它，并在清单 10-9 和 10-10 中使用了它。


    除了 `Red` 限定符之外，我们还创建了 `White` 限定符，并将其添加到了 `Wine` 接口的 `WhiteWine` 实现中。展开 `com.apress.ejb.chapter10.userdefinedqualifier`
    包，右键单击 `UsrDefQlfWineClient` Servlet 以调用上下文菜单，如图 10-6 所示。接下来选择 `运行` 选项来执行 Servlet
    客户端。


    ![A311833_3_En_10_Fig6_HTML.jpg](img/A311833_3_En_10_Fig6_HTML.jpg)


    图 10-6


    运行用户自定义限定符客户端


    尽管 `Wine` 接口有两个实现——`RedWine` 和 `WhiteWine`——CDI 容器能够通过在被注入的 `newWine` 字段上使用 `@Red`
    注解来解决歧义依赖。执行的 Servlet 的结果如图 10-7 所示。


    ![A311833_3_En_10_Fig7_HTML.jpg](img/A311833_3_En_10_Fig7_HTML.jpg)


    图 10-7


    用户自定义限定符 Servlet 的结果


    您可以尝试进行以下更改后再次运行客户端，并观察输出中的差异：


    *   将注入的 `newWine` 字段上的 `@Red` 注解替换为 `@White` 注解。

    *   移除注入的 `newWine` 字段上的 `@Red` 和 `@White` 注解，然后执行 Servlet 客户端。


    #### 测试 Any 限定符客户端


    接下来，我们将测试 `Any` 限定符，如清单 10-12 所示，它将返回 `Wine` 接口所有实现的列表。


    除了 `RedWine` 和 `WhiteWine` 实现之外，我们还创建了 `SparklingWine` 实现及其 `Sparkling` 限定符。展开
    `com.apress.ejb.chapter10.anyqualifier` 包，右键单击 `AnyWineClient` Servlet 以调用上下文菜单，如图
    10-8 所示。选择 `运行` 选项来执行 Servlet 客户端。


    ![A311833_3_En_10_Fig8_HTML.jpg](img/A311833_3_En_10_Fig8_HTML.jpg)


    图 10-8


    运行 Any 限定符客户端


    通过使用 `@Any` 限定符，容器能够确定 `Wine` 接口的所有实现。执行的 Servlet 的结果如图 10-9 所示。


    ![A311833_3_En_10_Fig9_HTML.jpg](img/A311833_3_En_10_Fig9_HTML.jpg)


    图 10-9


    Any 限定符客户端 Servlet 的结果


    您可以尝试进行以下更改后再次运行客户端，并观察输出中的差异：


    *   在同一包中创建一个 `RoseWine` 实现及其 `Rose` 限定符，然后重新运行 Servlet 客户端。

    *   移除注入的 `allWines` 字段上的 `@Any` 注解，然后执行 Servlet 客户端。

