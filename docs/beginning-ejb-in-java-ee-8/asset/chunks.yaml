- fmt: "# Message-Oriented Architecture\n\nToday’s IT organizations have dozens of\
    \ applications and services that perform such well-defined tasks as inventory,\
    \ billing, expense reporting, and order entry. With the evolution of the Internet\
    \ and e-business, enterprises have started to think about how different applications\
    \ can work independently but still be a part of an information workflow process\
    \ at the same time.\n\nThis new demand brings us to the concept of integrating\
    \ existing applications, as well as building new applications that work coherently\
    \ with existing applications. Integrating existing applications with new applications\
    \ is a very complex task: first due to the large number of applications used by\
    \ most enterprises, and second because of their complex business workflow.\n\n\
    Messaging is one of the most viable solutions for integrating existing and new\
    \ applications in an asynchronous communication and loosely coupled transaction\
    \ model. Asynchronous messaging allows applications to communicate by exchanging\
    \ messages independently without them having to be hardwired to each other. An\
    \ application or business process sending a message does not have to wait for\
    \ the receiver as long as both sender and receiver understand and agree upon a\
    \ message format and an intermediate destination.\n\nHere are the MDBs messaging\
    \ concepts:\n\n- Process of sending a loosely coupled, asynchronous message.\n\
    - The sender doesn’t know when the message is received.\n- The sender can guarantee\
    \ that the message will not be lost en route.\n- The `MOM` (message-oriented middleware)\
    \ service acts like a voicemail when the receiver is AFK.\n\n## What Is JMS?\n\
    \n`JMS` is a Java Message-Oriented Middleware (`MOM`) API that allows applications\
    \ to send and receive messages asynchronously. `JMS` is part of the standard Java\
    \ EE API as defined by `JSR 914`. `JMS` is analogous to `JDBC` (Java Database\
    \ Connectivity), which provides a standard API to connect to several types of\
    \ databases (Oracle, DB2, MySQL). Likewise, `JMS` provides a standard API to connect\
    \ to several types of messaging systems (IBM MQ, SonicMQ).\n\n> **Note:** `MOM`\
    \ stores the Message in a Location specified by the sender and later collected\
    \ by the consumer.\n\n`JMS` architecture consists of the following:\n\n**Table\
    \ 5-1** JMS Message Types\n\n| Message Type | Description |\n| --- | --- |\n|\
    \ `ByteMessage` | Consists of a series of bytes |\n| `MapMessage` | Consists of\
    \ a set of name/value pairs |\n| `ObjectMessage` | Consists of a serialized Java\
    \ object |\n| `StreamMessage` | Consists of a sequence of primitive data types\
    \ |\n| `TextMessage` | Consists of strings |\n\n- **JMS provider:** A messaging\
    \ system (as shown in Figure [5-1](#A311833_3_En_5_Chapter.html#Fig1)) that handles\
    \ the routing and delivery of messages. A `JMS` provider can be a messaging component\
    \ of an application server (such as Oracle WebLogic Server, IBM WebSphere, Oracle\
    \ GlassFish Server). `JMS` providers are also known as `JMS` servers.\n\n  ![A311833_3_En_5_Fig1_HTML.jpg](A311833_3_En_5_Fig1_HTML.jpg)\n\
    \n  **Figure 5-1** A `JMS` messaging system\n\n- **JMS client:** Any Java application\
    \ or Java EE component that uses the `JMS` API either to consume or produce a\
    \ `JMS` message.\n- **JMS consumer:** A `JMS` client application that consumes\
    \ `JMS` messages. The inventory, billing, and shipping applications shown in Figure\
    \ [5-1](#A311833_3_En_5_Chapter.html#Fig1) are `JMS` message consumers.\n- **JMS\
    \ producer:** A `JMS` client that generates the message. The order entry application\
    \ shown in Figure [5-1](#A311833_3_En_5_Chapter.html#Fig1) is a `JMS` message\
    \ producer.\n- **JMS message:** A message consisting of a header, properties,\
    \ and a body. The header identifies the message and contains a standard information\
    \ just like `JMSTimestamp`. `MOM` sets this header to the current time when the\
    \ message is sent. The properties provide additional attributes that are specific\
    \ to the application and provider. The property is explicitly created by the application\
    \ `Message.setBooleanProperty(\"\", true);` and it can be Boolean, byte, double,\
    \ float, int, long, short, String, Object, etc. The body contains the content\
    \ of the message and it can be `ObjectMessage`, `ByteMessage`, `MapMessage`, `StreamMessage`,\
    \ and `TestMessage`. The `JMS` specification provides support to send and receive\
    \ different types of messages. Table [5-1](#A311833_3_En_5_Chapter.html#Tab1)\
    \ shows the message types and descriptions.\n\n`JMS` has two types of resources:\
    \ `JMSContext` and `Destination`.\n\n`JMS` application will retrieve the `JMSContext`\
    \ using DI with the CDI `@Inject` and configure the `JMSContext` to connect to\
    \ a connection factory with `@JMSConnectionFactory`.\n\n## Messaging Application\
    \ Architecture\n\nGenerally, two different classes of messaging applications exist:\n\
    \n- **The point-to-point (P2P) model:** only one consumer will process a given\
    \ message, PTP message destinations are called queues, A writes to the queue and\
    \ B reads from the queue.\n- **The publish-subscribe (pub-sub) model:** each subscriber\
    \ receives a copy of the message.\n\nThe P2P model is based on message queues,\
    \ where a queue holds the `JMS` messages sent by the `JMS` client application.\
    \ Message producers and consumers decide upon a common queue to exchange messages.\n\
    \nThe P2P model is used if there is one and only one message consumer for each\
    \ message. For example, the order entry system shown in Figure [5-2](#A311833_3_En_5_Chapter.html#Fig2)\
    \ sends a new order into the message queue, which is picked up by the inventory\
    \ system. Similarly, the message sent by the inventory system is consumed by the\
    \ shipping system, and the message from the shipping system is consumed by the\
    \ billing system.\n\n![A311833_3_En_5_Fig2_HTML.jpg](A311833_3_En_5_Fig2_HTML.jpg)\n\
    \n**Figure 5-2** A `JMS` messaging system using queues\n\nThe pub-sub model is\
    \ based on topics, where the topic is the destination address of the message.\
    \ Multiple recipients or `JMS` consumers can retrieve each message. In this model,\
    \ publishers are not always aware of possible subscribers. The pub-sub model is\
    \ used for broadcast-type applications, as shown in Figure [5-3](#A311833_3_En_5_Chapter.html#Fig3),\
    \ in which a message is delivered for more than one `JMS` client. Topics, each\
    \ having a unique name, are defined in the messaging server. Each message, with\
    \ its associated subject, gets published and delivered to all subscribers.\n\n\
    ![A311833_3_En_5_Fig3_HTML.jpg](A311833_3_En_5_Fig3_HTML.jpg)\n\n**Figure 5-3**\
    \ A `JMS` messaging system using topics\n\n## JMS 2.0\n\n`JMS 2.0` was released\
    \ in April 2013, and it was the first update to the `JMS` specification since\
    \ version 1.1 was released in 2002.\n\n`JMS 2.0` is currently part of the Java\
    \ EE 7 platform and can be used in Java EE Web or EJB applications or as a stand-alone\
    \ in a Java SE environment.\n\nThe `JMS 2.0` main goals include:\n\n- API modernization\n\
    - Java EE Alignment\n- EJB3/MDB Alignment\n- Minor Corrections and Clarifications\
    \ since version 1.1\n- New API for sending and receiving messages\n- New API also\
    \ supports resource injection\n\nThe `JMS 2.0`’s biggest change was the introduction\
    \ of a new API for sending and receiving messages, helping the programmer to reduce\
    \ the amount of code to write."
  raw: "## Message-Oriented Architecture\n\nToday’s IT organizations have dozens of\
    \ applications and services that perform such well-defined tasks as inventory,\
    \ billing, expense reporting, and order entry. With the evolution of the Internet\
    \ and e-business, enterprises have started to think about how different applications\
    \ can work independently but still be a part of an information workflow process\
    \ at the same time.\n\nThis new demand brings us to the concept of integrating\
    \ existing applications, as well as building new applications that work coherently\
    \ with existing applications. Integrating existing applications with new applications\
    \ is a very complex task: first due to the large number of applications used by\
    \ most enterprises, and second because of their complex business workflow.\n\n\
    Messaging is one of the most viable solutions for integrating existing and new\
    \ applications in an asynchronous communication and loosely coupled transaction\
    \ model. Asynchronous messaging allows applications to communicate by exchanging\
    \ messages independently without them having to be hardwired to each other. An\
    \ application or business process sending a message does not have to wait for\
    \ the receiver as long as both sender and receiver understand and agree upon a\
    \ message format and an intermediate destination.\n\nHere are the MDBs messaging\
    \ concepts:\n\n*   Process of sending a loosely coupled, asynchronous message.\n\
    *   The sender doesn’t know when the message is received.\n*   The sender can\
    \ guarantee that the message will not be lost en route.\n*   The MOM (message-oriented\
    \ middleware) service acts like a voicemail when the receiver is AFK.\n\n### What\
    \ Is JMS?\n\nJMS is a Java Message-Oriented Middleware (MOM) API that allows applications\
    \ to send and receive messages asynchronously. JMS is part of the standard Java\
    \ EE API as defined by JSR 914\\. JMS is analogous to JDBC (Java Database Connectivity),\
    \ which provides a standard API to connect to several types of databases (Oracle,\
    \ DB2, MySQL). Likewise, JMS provides a standard API to connect to several types\
    \ of messaging systems (IBM MQ, SonicMQ).\n\nNote\n\nMOM stores the Message in\
    \ a Location specified by the sender and later collected by the consumer.\n\n\
    JMS architecture consists of the following:\n\nTable 5-1\n\nJMS Message Types\n\
    \n| Message Type | Description |\n| --- | --- |\n| `ByteMessage` | Consists of\
    \ a series of bytes |\n| `MapMessage` | Consists of a set of name/value pairs\
    \ |\n| `ObjectMessage` | Consists of a serialized Java object |\n| `StreamMessage`\
    \ | Consists of a sequence of primitive data types |\n| `TextMessage` | Consists\
    \ of strings |\n\n*   JMS provider: A messaging system (as shown in Figure [5-1](#A311833_3_En_5_Chapter.html#Fig1))\
    \ that handles the routing and delivery of messages. A JMS provider can be a messaging\
    \ component of an application server (such as Oracle WebLogic Server, IBM WebSphere,\
    \ Oracle GlassFish Server). JMS providers are also known as JMS servers.\n\n \
    \   ![A311833_3_En_5_Fig1_HTML.jpg](A311833_3_En_5_Fig1_HTML.jpg)\n\n    Figure\
    \ 5-1\n\n    A JMS messaging system\n*   JMS client: Any Java application or Java\
    \ EE component that uses the JMS API either to consume or produce a JMS message.\n\
    *   JMS consumer: A JMS client application that consumes JMS messages. The inventory,\
    \ billing, and shipping applications shown in Figure [5-1](#A311833_3_En_5_Chapter.html#Fig1)\
    \ are JMS message consumers.\n*   JMS producer: A JMS client that generates the\
    \ message. The order entry application shown in Figure [5-1](#A311833_3_En_5_Chapter.html#Fig1)\
    \ is a JMS message producer.\n*   JMS message: A message consisting of a header,\
    \ properties, and a body. The header identifies the message and contains a standard\
    \ information just like JMSTimestamp. MOM sets this header to the current time\
    \ when the message is sent. The properties provide additional attributes that\
    \ are specific to the application and provider. The property is explicitly created\
    \ by the application Message.setBooleanProperty(“”,true); and it can be Boolean,\
    \ byte, double, float, int, long, short, String, Object, etc. The body contains\
    \ the content of the message and it can be ObjectMessage, ByteMessage, MapMessage,\
    \ StreamMessage, and TestMessage. The JMS specification provides support to send\
    \ and receive different types of messages. Table [5-1](#A311833_3_En_5_Chapter.html#Tab1)\
    \ shows the message types and descriptions.\n\nJMS has two types of resources:\
    \ JMSContext and Destination.\n\nJMS application will retrieve the JMSContext\
    \ using DI with the CDI @Inject and configure the JMSContext to connect to a connection\
    \ factory with @JMSConnectionFactory.\n\n### Messaging Application Architecture\n\
    \nGenerally, two different classes of messaging applications exist:\n\n*   The\
    \ point-to-point (P2P) model: only one consumer will process a given message,\
    \ PTP message destinations are called queues, A writes to the queue and B reads\
    \ from the queue.\n*   The publish-subscribe (pub-sub) model: each subscriber\
    \ receives a copy of the message.\n\nThe P2P model is based on message queues,\
    \ where a queue holds the JMS messages sent by the JMS client application. Message\
    \ producers and consumers decide upon a common queue to exchange messages.\n\n\
    The P2P model is used if there is one and only one message consumer for each message.\
    \ For example, the order entry system shown in Figure [5-2](#A311833_3_En_5_Chapter.html#Fig2)\
    \ sends a new order into the message queue, which is picked up by the inventory\
    \ system. Similarly, the message sent by the inventory system is consumed by the\
    \ shipping system, and the message from the shipping system is consumed by the\
    \ billing system.\n\n![A311833_3_En_5_Fig2_HTML.jpg](A311833_3_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2\n\nA JMS messaging system using queues\n\nThe pub-sub model is based\
    \ on topics, where the topic is the destination address of the message. Multiple\
    \ recipients or JMS consumers can retrieve each message. In this model, publishers\
    \ are not always aware of possible subscribers. The pub-sub model is used for\
    \ broadcast-type applications, as shown in Figure [5-3](#A311833_3_En_5_Chapter.html#Fig3),\
    \ in which a message is delivered for more than one JMS client. Topics, each having\
    \ a unique name, are defined in the messaging server. Each message, with its associated\
    \ subject, gets published and delivered to all subscribers.\n\n![A311833_3_En_5_Fig3_HTML.jpg](A311833_3_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3\n\nA JMS messaging system using topics\n\n## JMS 2.0\n\nJMS 2.0 was\
    \ released in April 2013, and it was the first update to the JMS specification\
    \ since version 1.1 was released in 2002.\n\nJMS 2.0 is currently part of the\
    \ Java EE 7 platform and can be used in Java EE Web or EJB applications or as\
    \ a stand-alone in a Java SE environment.\n\nThe JMS 2.0 main goals include:\n\
    \n*   API modernization\n*   Java EE Alignment\n*   EJB3/MDB Alignment\n*   Minor\
    \ Corrections and Clarifications since version 1.1\n*   New API for sending and\
    \ receiving messages\n*   New API also supports resource injection\n\nThe JMS\
    \ 2.0’s biggest change was the introduction of a new API for sending and receiving\
    \ messages, helping the programmer to reduce the amount of code to write."
  trans: "\n## 面向消息的架构\n\n如今，IT 组织拥有数十个应用程序和服务，用于执行诸如库存管理、计费、费用报告和订单录入等定义明确的任务。随着互联网和电子商务的发展，企业开始思考不同的应用程序如何既能独立工作，又能同时成为信息工作流的一部分。\n\
    \n这一新需求引出了集成现有应用程序，以及构建能与现有应用程序协同工作的新应用程序的概念。将现有应用程序与新应用程序集成是一项非常复杂的任务：首先是因为大多数企业使用的应用程序数量庞大，其次是因为它们复杂的业务工作流。\n\
    \n消息传递是在异步通信和松耦合事务模型中集成现有和新应用程序的最可行解决方案之一。异步消息传递允许应用程序通过独立交换消息进行通信，而无需彼此硬连接。发送消息的应用程序或业务流程不必等待接收方，只要发送方和接收方都理解并商定消息格式和中间目的地即可。\n\
    \n以下是 MDB 的消息传递概念：\n\n*   发送松耦合、异步消息的过程。\n*   发送方不知道消息何时被接收。\n*   发送方可以保证消息在传输过程中不会丢失。\n\
    *   当接收方不在（AFK）时，MOM（面向消息的中间件）服务的作用类似于语音信箱。\n\n### 什么是 JMS？\n\nJMS 是一个 Java 面向消息的中间件（MOM）API，允许应用程序异步发送和接收消息。JMS\
    \ 是 JSR 914 定义的标准 Java EE API 的一部分。JMS 类似于 JDBC（Java 数据库连接），后者提供了连接多种类型数据库（Oracle、DB2、MySQL）的标准\
    \ API。同样，JMS 提供了连接多种类型消息传递系统（IBM MQ、SonicMQ）的标准 API。\n\n注意\n\nMOM 将消息存储在发送方指定的位置，随后由消费者收集。\n\
    \nJMS 架构由以下部分组成：\n\n表 5-1\n\nJMS 消息类型\n\n| 消息类型 | 描述 |\n| --- | --- |\n| `ByteMessage`\
    \ | 由一系列字节组成 |\n| `MapMessage` | 由一组名称/值对组成 |\n| `ObjectMessage` | 由一个序列化的 Java\
    \ 对象组成 |\n| `StreamMessage` | 由一系列原始数据类型组成 |\n| `TextMessage` | 由字符串组成 |\n\n*\
    \   JMS 提供者：一个消息传递系统（如图 5-1 所示），负责处理消息的路由和传递。JMS 提供者可以是应用服务器的消息传递组件（例如 Oracle\
    \ WebLogic Server、IBM WebSphere、Oracle GlassFish Server）。JMS 提供者也称为 JMS 服务器。\n\
    \n    ![A311833_3_En_5_Fig1_HTML.jpg](img/A311833_3_En_5_Fig1_HTML.jpg)\n\n  \
    \  图 5-1\n\n    一个 JMS 消息传递系统\n*   JMS 客户端：任何使用 JMS API 消费或生成 JMS 消息的 Java 应用程序或\
    \ Java EE 组件。\n*   JMS 消费者：一个消费 JMS 消息的 JMS 客户端应用程序。图 5-1 中显示的库存、计费和发货应用程序是 JMS\
    \ 消息消费者。\n*   JMS 生产者：一个生成消息的 JMS 客户端。图 5-1 中显示的订单录入应用程序是 JMS 消息生产者。\n*   JMS\
    \ 消息：由标头、属性和正文组成的消息。标头标识消息并包含标准信息，例如 `JMSTimestamp`。MOM 在发送消息时将此标头设置为当前时间。属性提供特定于应用程序和提供者的附加属性。属性由应用程序显式创建，例如\
    \ `Message.setBooleanProperty(“”,true);`，它可以是布尔型、字节型、双精度浮点型、浮点型、整型、长整型、短整型、字符串、对象等。正文包含消息的内容，可以是\
    \ `ObjectMessage`、`ByteMessage`、`MapMessage`、`StreamMessage` 和 `TextMessage`。JMS\
    \ 规范支持发送和接收不同类型的消息。表 5-1 显示了消息类型及其描述。\n\nJMS 有两种类型的资源：`JMSContext` 和 `Destination`。\n\
    \nJMS 应用程序将使用 CDI 的 `@Inject` 通过依赖注入（DI）获取 `JMSContext`，并使用 `@JMSConnectionFactory`\
    \ 配置 `JMSContext` 以连接到连接工厂。\n\n### 消息传递应用程序架构\n\n通常，存在两种不同类别的消息传递应用程序：\n\n*  \
    \ 点对点（P2P）模型：只有一个消费者会处理给定的消息，PTP 消息目的地称为队列，A 写入队列，B 从队列读取。\n*   发布-订阅（pub-sub）模型：每个订阅者都会收到消息的一个副本。\n\
    \nP2P 模型基于消息队列，队列保存由 JMS 客户端应用程序发送的 JMS 消息。消息生产者和消费者商定一个公共队列来交换消息。\n\n如果每条消息有且只有一个消息消费者，则使用\
    \ P2P 模型。例如，图 5-2 中显示的订单录入系统将新订单发送到消息队列，该队列由库存系统接收。类似地，库存系统发送的消息由发货系统消费，而发货系统发送的消息由计费系统消费。\n\
    \n![A311833_3_En_5_Fig2_HTML.jpg](img/A311833_3_En_5_Fig2_HTML.jpg)\n\n图 5-2\n\
    \n一个使用队列的 JMS 消息传递系统\n\n发布-订阅模型基于主题，主题是消息的目标地址。多个接收者或 JMS 消费者可以检索每条消息。在此模型中，发布者并不总是知道可能的订阅者。发布-订阅模型用于广播类型的应用程序，如图\
    \ 5-3 所示，其中一条消息被传递给多个 JMS 客户端。主题在消息传递服务器中定义，每个主题都有唯一的名称。每条消息及其关联的主题被发布并传递给所有订阅者。\n\
    \n![A311833_3_En_5_Fig3_HTML.jpg](img/A311833_3_En_5_Fig3_HTML.jpg)\n\n图 5-3\n\
    \n一个使用主题的 JMS 消息传递系统\n\n## JMS 2.0\n\nJMS 2.0 于 2013 年 4 月发布，这是自 2002 年发布 1.1\
    \ 版以来对 JMS 规范的首次更新。\n\nJMS 2.0 目前是 Java EE 7 平台的一部分，可用于 Java EE Web 或 EJB 应用程序，或作为\
    \ Java SE 环境中的独立组件使用。\n\nJMS 2.0 的主要目标包括：\n\n*   API 现代化\n*   与 Java EE 对齐\n*\
    \   与 EJB3/MDB 对齐\n*   自 1.1 版以来的次要修正和澄清\n*   用于发送和接收消息的新 API\n*   新 API 也支持资源注入\n\
    \nJMS 2.0 最大的变化是引入了用于发送和接收消息的新 API，帮助程序员减少需要编写的代码量。\n"
- fmt: '# JMS 2.1


    `JMS 2.1` was first proposed by Oracle in August 2014 and then submitted as `JSR
    368` in accordance with the Java Community Process. It was proposed and then finally
    approved to be part of `Java EE 8`.


    The early draft review 1 (`EDR1`) was published for public review in October 2015,
    including a new chapter on flexible JMS message-driven beans.


    In March 2016 the `EDR2` was finally published for public review but then Oracle
    stopped the development of `JMS 2.1`, announcing that they were changing the `Java
    EE 8` priorities including the development of `JMS 2.1`.


    Finally, in November 2016 Oracle formally proposed that the `JSR` be withdrawn
    and confirmed that `JMS` would remain part of `Java EE 8`, but the existing version
    `JMS 2.0` would be used rather than a new version `2.1`.


    The `JMS 2.1` specification can be found in this web page:


    [`https://jcp.org/en/jsr/detail?id=368`](https://jcp.org/en/jsr/detail?id=368)


    Here are the most important changes in `JMS 2.1`:


    - Alignment with `Java SE 8`

    - Flexible MDBs (`EE`)

    - Change in the asynchronous messaging, including how MDB implements any `MessageListener`
    interface to any CDI bean

    - CDI Beans as Listeners

    - Batch delivery including Acknowledgment Modes, the `setMessageLstener` (`EE`),
    etc.

    - Repeatable Annotations including the redelivery configuration (`EE`)


    ## Using MDBs


    An MDB is an asynchronous message consumer that processes messages delivered via
    `JMS`. While MDBs do the job of processing the messages, the EJB container in
    which the MDBs run take care of the services (transactions, security, resources,
    concurrency, message acknowledgment), letting the bean developer focus on the
    business logic of processing messages. Traditional `JMS` applications would have
    to custom write some of these services. MDBs are stateless in nature, which means
    that EJB containers can have numerous instances of MDBs execute concurrently to
    process hundreds of `JMS` messages coming in from various applications or `JMS`
    producers and also provide quality of service (`QoS`), such as high availability
    and reliability for enterprise applications.


    EJB client applications cannot access MDBs directly as they can with session beans
    and entities. The only way to communicate with an MDB would be by sending a `JMS`
    message to the destination to which the MDB is listening. Any Java application
    or `Java EE` component using the `JMS API` can be the message provider for the
    MDB by sending messages to queues or topics.


    ### When Do You Use MDBs?


    Earlier in the chapter, we discussed the need for asynchrony in enterprises. Asynchronous
    messaging provides loose coupling between applications, systems, and services,
    thus providing greater flexibility and change management for applications and
    systems. MDBs provide a standard messaging component model that achieves the goal
    of asynchronous and message-oriented architecture in enterprises.


    Figure [5-4](#A311833_3_En_5_Chapter.html#Fig4) shows a message-oriented application
    that has order entry, inventory, billing, and shipping systems that communicate
    asynchronously to handle a workflow that starts with a new purchase order and
    ends when the order gets shipped to the customer. An order entry system captures
    a new order from a customer, processes the order, and sends it into a designated
    message queue (in Figure [5-4](#A311833_3_En_5_Chapter.html#Fig4), this is the
    New Order queue). The inventory system picks up the message from the queue and
    checks whether or not the inventory is available. If not, it sends a message to
    the Suppliers queue; if the order can be shipped, then it puts a message into
    the Order Ready queue. This new message is picked up by the billing system, which
    processes the billing for the customer and puts a message back into the Shipping
    queue. Finally, the shipping application picks up the message, gets the order
    shipped to the customer, and sends an e-mail to the customer with tracking information.


    ![A311833_3_En_5_Fig4_HTML.jpg](A311833_3_En_5_Fig4_HTML.jpg)


    Figure 5-4


    An order-to-shipping JMS messaging system


    ### MDB Classes


    Unlike a session bean, an MDB doesn’t have any business interfaces. It has only
    the following:


    - A message-driven class

    - An optional callback listener class

    - An optional interceptor class


    An MDB class is any standard Java class that has a class-level annotation `@MessageDriven`.
    If deployment descriptors are used instead of annotations, the bean class should
    be denoted as an MDB class. In the case of mixed mode, in which you are using
    annotations and deployment descriptors, the `@MessageDriven` annotation must be
    specified if any other class-level or member-level annotations are specified in
    the bean class. The `@MessageDriven` annotation parameters can be used to specify
    the `JMS` queues or topics to which the bean is listening. Table [5-2](#A311833_3_En_5_Chapter.html#Tab2)
    details the parameters.


    Table 5-2


    Parameter details for the `@MessageDriven` Annotation


    | Parameter | Description |

    | --- | --- |

    | `ActivationConfigProperty` | The set of properties used to specify the destination
    name and type |

    | `description` | A description of the bean class |

