- fmt: '### Beans and `beans.xml`


    Beans are container-managed components that contain business logic: for example,
    managed beans and session beans. It is important for readers to note that CDI
    does not introduce a new bean type called a “CDI Bean” with its own unique component
    model. CDI provides a set of services that can be consumed by managed beans and
    EJBs that are defined by their existing component models. The process that the
    CDI container undergoes of identifying beans found in the various deployment modules
    is called bean discovery. The beans discovered by the container via bean discovery
    participate in the CDI life cycle. The life cycle of these beans is managed by
    the container as per the CDI specification.


    **Note:** Throughout this chapter, the word “bean” implies Java beans participating
    in the CDI life cycle unless specified otherwise.


    The beans within a module participate in the CDI life cycle if the container detects
    a `beans.xml` file in the `WEB-INF` directory of a WAR file or the `META-INF`
    directory of a JAR file. Presence of `beans.xml` within a module aids the container
    to isolate quickly the CDI-related modules, making bean discovery quicker. CDI
    does not require the `beans.xml` to declare the beans available in the module;
    `beans.xml` can be empty. CDI artifacts like alternatives, interceptors, and stereotypes
    are declared in the `beans.xml` if required.


    The CDI container provides the following services to its beans:


    - Transparent creation, destruction, and scoping

    - Typesafe-scoped resolution via qualifiers when injected into Java clients

    - Typesafe-scoped resolution via name when used in Unified EL Expressions for
    JSF clients

    - Lifecycle callbacks

    - Automatic injection of other bean instances

    - Interception and decoration

    - Event notification


    Beans are injected into other beans and clients by declaring a class-level field
    and annotating it with the `javax.inject.Inject` annotation. Beans can also be
    used with Web tier technologies like JSP and JSF via Unified EL Expressions, by
    annotating them with the `javax.inject.Named` annotation.


    ### Scope


    The scope of an object determines the life span of individual instances of that
    object. An application containing stateful object instances needs these instances
    to hold their state for a defined period. The scope dictates when a bean instance
    should be created and when the container should destroy it.


    CDI has the following five types of scopes.


    #### Application Scope


    The state of an application-scoped bean is shared across all of the users of the
    application. An application-scoped object is created only once during the lifetime
    of the application—the first time it is injected—and is destroyed only when the
    application is shut down. An application scope is declared using the `@javax.enterprise.context.ApplicationScoped`
    annotation.


    #### Request Scope


    The state of a request-scoped bean is shared by all of the beans involved in a
    single request. A request-scoped bean is created once per request and destroyed
    upon completion of that request. A request scope is declared using the `@javax.enterprise.context.RequestScoped`
    annotation.


    #### Session Scope


    The state of a session-scoped bean is shared across multiple requests within the
    same HTTP session. A session-scoped bean is created when the HTTP session begins
    and is destroyed when the HTTP session closes or times out. A session scope is
    declared using the `@javax.enterprise.context.SessionScoped` annotation.


    #### Conversation Scope


    The state of a conversation-scoped bean is shared across all of the standard lifecycle
    phases of a JSF faces or non-faces request. One JSF request is associated with
    only one conversation. Any conversation can be either in transient state or in
    long-running state. Transient is the default state for a conversation. A conversation
    is marked long running by calling `Conversation.begin()`, and it is marked as
    transient by calling `Conversation.end()`. At the end of a JSF request, a conversation-scoped
    object has to be in transient state to be destroyed. A conversation scope is declared
    using the `@javax.enterprise.context.ConversationScoped` annotation.


    #### Dependent Pseudo-Scope


    The dependent scope is the default scope, and the container applies it when no
    scope is explicitly defined. The instances of beans with a dependent scope are
    bound to only one object. Instances of such beans are created and destroyed in
    sync with the creation and destruction of the associated object. These bean instances
    are not shared between the client applications. The dependent scope is declared
    using the `@javax.enterprise.context.Dependent` annotation.


    **Note:** Users can define custom scopes by using the `@javax.inject.Scope` annotation.


    ### Dependency Injection with `@Inject`


    Before the publication of JSR 330, which introduced Dependency Injection, a client
    requiring services of a dependent class either had to instantiate a concrete instance
    of that class or rely upon an outside module to wire up the dependency before
    it was required. This created either a tightly coupled compile-time dependency
    between the client and the dependent class or reliance by the client on an outside
    process to “configure” the client appropriately. With dependency injection, the
    contract between the client and the dependent class became decoupled, and the
    client gained some control over how it was initialized. The client could request
    a resource to be injected by its interface and relied on the container to inject
    an acceptable instance of some concrete implementation class deliberately unknown
    to the client. CDI extends the power of the client to control its configuration
    by introducing a way (Qualifiers, see below) for the client to tell the container
    which abstract characteristics it requires of the injected class. The container
    uses these requirements to decide, at runtime, which dependent class to inject.
    This creates an even more loosely coupled system whereby the injected class requirements
    are configured declaratively and dynamically in the client and bound to an implementation
    class by the container at runtime.


    The `@javax.inject.Inject` annotation defines an injection point, and there are
    three locations in a bean where injection can be performed by the CDI container:
    to initialize parameter values on a constructor declaration, to initialize parameter
    values on a method declaration, and to initialize a class member in a field declaration.
    We will examine each of these next.'
