    ## Compiling, Deploying, and Testing the Session Beans


    Session beans need to be packaged into EJB JAR (`.jar`) files before they are
    deployed into EJB containers. In the case of some EJB containers or application
    servers, packaged EJB archives need to be assembled into Enterprise Archive (EAR)
    files before deployment. EJB containers or application servers provide deployment
    utilities or Ant tasks to facilitate deployment of EJBs. Java IDEs (integrated
    development environments) like JDeveloper, NetBeans, and Eclipse also provide
    deployment features that allow developers to package, assemble, and deploy EJBs
    to application servers. Packaging, assembly, and deployment are covered in detail
    in Chapter [11](#A311833_3_En_11_Chapter.html).


    So far in this chapter we have developed one stateless session bean (`SearchFacade`),
    one stateful session bean (`ShoppingCart`), and one singleton session bean (`ShopperCount`).
    The following sections will walk you through the steps necessary to compile, deploy,
    and test these session beans.


    ### Prerequisites


    Before performing any of the steps detailed in the next sections, complete the
    “Getting Started” section of Chapter [1](#A311833_3_En_1_Chapter.html). This section
    will walk you through the installation and environment setup required for the
    samples in this chapter.


