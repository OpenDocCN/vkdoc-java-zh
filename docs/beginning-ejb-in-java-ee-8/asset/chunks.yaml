    ##### @JoinColumn 注解


    `Employee` 实体有一个类型为 `FullTypeEmployee` 的 `manager` 字段，其映射方式如下：


    ```

    @ManyToOne

    @JoinColumn(name = "MANAGER")

    private FullTimeEmployee manager;

    ```


    `manager` 字段的类型为 `FullTimeEmployee`，它映射到 `MANAGER` 列，该列由 `@JoinColumn` 注解上的 `name
    = "MANAGER"` 属性标识。`MANAGER` 列恰好是 `FullTypeEmployee` 实体所映射表的外键引用，在本例中，该表就是 `CH04_ST_PERSON`
    表。为此类列定义外键并非严格必要，但通常被认为是良好的数据库设计。由于 `manager` 字段映射到外键列，因此它被视为关系的拥有方。


    此双向关系的另一端实体 `FullTimeEmployee` 持有 `managedEmployees` 字段。


    ```

    @OneToMany(mappedBy = "manager", cascade = {CascadeType.PERSIST, CascadeType.MERGE})

    private List managedEmployees;

    ```


    由于我们已经在拥有方指定了映射，因此该字段只需使用 `mappedBy = "manager"` 属性来引用那个 `manager` 字段即可。这样，两个关系字段都映射到同一个外键，并且不需要连接表。


    注意


    JPA 允许您将 `@OneToMany` 字段映射到目标实体表上的外键，即使目标实体没有暴露相应的 `@ManyToOne` 关系字段。为此，您需要在 `@OneToMany`
    字段上使用 `@JoinColumn` 来标识远程外键，而不是使用 `mappedBy` 属性。


    这个 `managedEmployees` 字段包含一个 `Employee` 实例列表，实际上这些实例将是具体的 `FullTimeEmployee` 和/或
    `PartTimeEmployee` 实例。


    `cascade = { CascadeType.PERSIST, CascadeType.MERGE }` 属性表示，对此实体 `Employee` 执行的任何合并或持久化操作，也必须应用于此关系字段引用的所有
    `FullTimeEmployee` 实例。例如，如果创建了一个新的 `Employee` 实例，并为其分配了一个 `FullTimeEmployee` 作为经理，那么通过
    `EntityManager.persist()` 持久化该 `Employee` 实例的操作，也会同时持久化任何被引用的、尚未被持久化的 `FullTimeEmployee`
    实例。


    `Person` 实体通过 `homeAddress` 字段与 `Address` 建立关系。


    ```

    @OneToOne(cascade=CascadeType.ALL)

    @JoinColumn(name = "HOME_ADDRESS")

    private Address homeAddress;

    ```


    由于 `Address` 上没有引用 `Person` 的对应字段，因此这是一个单向关系。`@OneToOne` 上的 `cascade` 属性指明了哪些操作应传播到被引用的对象。因为我们指定了
    `CascadeType.ALL` 的级联规则，所以应用于 `Person` 的所有事件——`DETACH`、`MERGE`、`PERSIST`、`REFRESH`
    和 `REMOVE`——都会自动应用于其 `homeAddress` 对象。


    ##### @DiscriminatorColumn 注解


    每当我们像使用 `InheritanceType.SINGLE_TABLE` 策略那样，将多个实体类映射到单个表时，必须要有某种方法来识别表中任何给定行的具体实体类型。为了确定实体类型，持久化管理器会在根实体的表中查找名为
    `DTYPE` 的列来获取此信息。如果您的模式需要使用不同的列名来捕获此信息，您可以使用 `@DiscriminatorColumn` 注解来标识 JPA
    应使用的列；在清单 4-1 中，Person.java 实体通过 `@DiscriminatorColumn(name = "TYPE")` 注解指定了一个名为
    `TYPE` 的鉴别器列。如果我们像在其余示例中那样使用名为 `DTYPE` 的列，则可以完全省略此注解并接受默认值。


    ##### @DiscriminatorValue 注解


    存储在鉴别器列中的值称为鉴别器值。每个具体实体都显式声明或默认接受一个唯一的鉴别器值，该值用于标识与表中每一行关联的具体实体类型。鉴别器值默认为实体名称，在此示例中，我们为层次结构中的每个实体都接受了此默认值。当将遗留表和数据库适配到
    JPA，并且您希望将预先存在的鉴别器值映射到名称不同的实体时，可以使用 `@DiscriminatorValue` 注解来指定层次结构中需要覆盖的每个实体所使用的鉴别器值。


    #### SINGLE_TABLE 策略的优缺点


    我们从设计时和性能的角度来权衡每个继承层次结构的优缺点。我们从 SINGLE_TABLE 策略开始。


    ##### 设计时考量


    当类型层次结构相当简单且稳定时，SINGLE_TABLE 映射方法效果很好。向层次结构添加新类型以及向现有超类型添加字段，只需向表中添加新列即可。然而，在特别大型的部署中，这可能会对数据库内部的索引和列布局产生不利影响。如果您的层次结构可能超出单个表的列限制（通常为
    256 列），或者由于某种原因需要将多个非常大的字段映射到内联 LOB（大对象）列，则可能需要引入 `@SecondaryTable` 映射。在这种情况下，采用后续方法之一可能更为明智。此外，对于层次结构中并非所有类型共享的列，不能使用
    NOT NULL 约束。


    ##### 性能影响


    SINGLE_TABLE 策略对于查询层次结构中的所有类型或特定类型非常高效。内部持久化框架不需要表连接——只需要一个列出类型标识符的 `WHERE` 子句。特别是，涉及采用此映射策略的类型的关系，其性能表现良好。


    #### 示例客户端代码


    正如我们在本章“入门”部分提到的，我们准备了示例客户端代码来测试继承示例，以及本章后面出现的其他示例。在本章提供的示例代码中，我们为每个继承示例都提供了一个
    Java 客户端和一个 HTTP servlet。清单 4-6 展示了一个简单的 Java 类，它作为一个外观（类似于 EJB Session Bean 外观），用于实例化
    `Chapter04-PersistenceIISamples-SingleTable` 持久化单元的 `EntityManager`，并公开用于操作该单元中
    JPA 实体的 CRUD 方法。清单 4-7 展示了一个用于此服务的 Java 客户端，它执行这些 CRUD 方法并打印结果。我们本也可以为此目的使用实际的
    EJB Session 外观，但我们想演示一个普通的 Java 类如何在非 JavaEE 环境中与 JPA 实体交互。


    在示例代码区域中，我们为其他继承策略提供了类似的 Java 服务外观和配套的 Java 客户端。除了每个策略使用的持久化单元以及用特定继承策略细节注解的实体类不同之外，它们在各个继承策略之间是相同的。


    类似地，我们为每个继承策略提供了一个简单的 HTTP servlet 客户端，演示了在 JavaEE Web 环境中使用 JPA 实体。这些 servlet
    替代了 Java 客户端，并直接与相同的 Java 服务外观进行交互。

