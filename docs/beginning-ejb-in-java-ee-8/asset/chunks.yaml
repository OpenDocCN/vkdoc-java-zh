    #### EJB 容器


    EJB 容器为 EJB 组件的运行提供了支持环境。该环境提供事务与安全服务、资源池化与缓存、组件生命周期服务、并发支持等功能——本书将逐一探讨这些内容。EJB
    组件通过特定于 EJB 的元数据，详细说明它们希望如何与支持容器进行交互。这些元数据要么由容器捕获并在运行时应用于 EJB 的行为，要么在 EJB 组件部署到
    EJB 容器时被解释，并用于构建包装层。EJB 3.2 规范还定义了 EJB API 组，并为支持其他 API 组的 EJB Lite 容器制定了明确的规则。


    ### EJB 开发模型的核心特性


    在其发展历程中，EJB 始终专注于交付具备若干核心特性的组件。


    #### 声明式元数据


    EJB 组件模型的标志性特征之一是，开发者能够使用 Java 注解和/或 XML 描述符，以声明方式（而非编程方式）指定企业 Bean 和实体的行为。这极大地简化了开发流程，因为无需在
    Java 源代码中掺杂服务实现代码，即可为 Bean 添加大量定制化功能。为兼顾开发者偏好与应用灵活性，EJB 为开发者提供了注解和 XML 两种选择，并允许在同一
    EJB 或实体中同时使用这两种方式来指定元数据中的行为。当同一元数据片段在注解和 XML 中均有定义时，XML 声明在解决冲突时具有优先权。本章后续的“EJB
    3 简化开发模型”部分将进一步探讨此方法的其他优势。


    #### 例外配置


    与声明式指定行为的能力相辅相成的是，EJB 中大量使用了智能默认值。许多行为会自动附加到 EJB 或实体上，无需显式声明，例如会话 Bean 方法的事务行为，以及映射到实体持久化数据属性的表和列的名称。仅当需要非默认行为时，才需要显式指定注解或对应的
    XML。在利用默认行为的最常见情况下，这种方法能够产生非常精简、干净的代码。这种开发模型被称为“例外配置”，因为仅在例外（非默认）情况下才需要显式配置组件的行为。


    #### 可伸缩性


    大型应用程序要求随着客户端负载的增加而具有良好的伸缩能力。EJB 服务器采用资源池化来最大化对象复用，利用持久化缓存来避免重复查询或创建相同对象，并在中间层实现乐观锁定策略，以减轻关系数据库管理系统（RDBMS）的负载并避免并发锁定问题。EJB
    容器还管理着 EJB 的生命周期，允许释放和复用相关资源以优化性能。


    #### 位置透明性


    EJB 可以配置为远程访问，从而允许通过网络连接进行访问。客户端（可能是另一个 EJB）只需请求一个远程 EJB 的实例，本地和远程 EJB 容器便会透明地管理通信细节。


    #### 事务性


    Java 事务 API（JTA）定义了分布式事务的标准 API，而 EJB 容器则充当 EJB 的 JTA 事务管理器。自诞生以来，EJB 规范就定义了一个标准模型，用于在企业
    Bean 上以声明方式指定容器管理的事务行为。


    #### 多用户安全性


    可以在 EJB 上以声明方式指定方法级别的访问控制，从而强制执行由应用服务器管理员定义的用户和角色级别权限。


    #### 可移植性


    符合规范的 EJB 至少理论上可以部署到任何实现了 EJB 规范的应用服务器上。在实践中（这在 EJB 3 之前的版本中尤其如此），供应商提供了自己的元数据定义，企业
    Bean 开发者逐渐依赖这些定义，从而被锁定在特定供应商的实现中。随着 EJB 的成熟，它逐渐吸收了这些原先的平台特定特性，因此今天实现的 EJB 比过去具有更强的可移植性。


    #### 可复用性


    EJB 是松耦合的组件。一个 EJB 可以被复用并打包到多个应用程序中，但它必须与所依赖的 EJB 的业务接口捆绑在一起，或者能够访问这些接口。


    #### 持久化


    尽管 JPA 实体已不再包含在 EJB 规范中，但它们仍然是 EJB 的重要补充。实体是具有唯一标识的持久化领域对象。一个实体类映射到一个数据库表，每个实体实例由该表中的一行数据表示。


    ### EJB 规范的演进


    每次引入新版本的 EJB 规范时，它都会包含重要的新特性，以满足普遍需求并采纳新兴技术。以下是自 1996 年 EJB 规范诞生以来，或者更确切地说，自 1998
    年首次商业实现以来，其演进历程的简要总结。


    #### EJB 1.0


    初始版本 1.0 开始支持有状态和无状态的服务对象，称为会话 Bean；并可选支持持久化领域对象，称为实体 Bean。为了实现可移植性，EJB 通过一种特殊的远程接口进行访问，该接口提供了可移植性和远程访问能力，但带来了远程通信基础设施和按值传递语义的开销。


    #### EJB 1.1


    后续版本 1.1 强制要求供应商支持实体 Bean，并引入了 XML 部署描述符，以取代将元数据存储在特殊的序列化类文件中。


    #### EJB 2.0


    EJB 2.0 通过引入本地接口，解决了远程接口的开销和按值传递的缺点。只有运行在 J2EE 容器内的客户端才能通过本地接口访问 EJB，但按引用传递的方法调用使得组件间的交互更加高效。同时引入了一种新型
    EJB——消息驱动 Bean（MDB），它可以参与异步消息系统。实体 Bean 获得了对容器管理关系（CMR）的支持，允许 Bean 开发者以声明方式指定由
    EJB 容器管理的实体 Bean 之间的持久化关系。此外，还引入了 Enterprise JavaBeans 查询语言（EJB QL），使开发者能够使用一种类似
    SQL 的语言来查询实体 Bean 实例。


    #### EJB 2.1


    EJB 2.1 增加了对 Web 服务的支持，允许会话 Bean 暴露端点接口，并引入了定时器服务，使得 EJB 可以在指定的时间或时间间隔被调用。EJB
    2.1 还扩展了 EJB QL 函数，并引入了一个 XML 模式来替代定义 `ejb-jar.xml` 部署描述符的 DTD。

