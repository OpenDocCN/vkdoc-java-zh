    ### 显示所选葡萄酒详情页面


    清单 12-18 展示了 `addtoCart.jsp` JSF 页面的代码。在这个特定页面上，我们将使用 `h:outputText` 组件来显示葡萄酒信息，并使用
    `h:inputText` 组件让用户输入所选葡萄酒的数量。`h:outputText` 的 `value` 属性由上一节开发的 `JSFShoppingCart`
    托管 bean 中的 `selectedWine` 属性填充。`h:inputText` 的值通过表达式 `#{JSFShoppingCart.quantity}`
    设置；这将是一个我们需要添加到 `JSFShoppingCart` 中的新属性。此页面中最后需要注意的一点是 `h:commandButton` 组件，用户将用它作为提交按钮来将葡萄酒添加到购物车。`h:commandButton`
    的 `action` 属性值设置为 `#{JSFShoppingCart.addToCart}` 表达式。`addToCart()` 是一个新方法，我们将必须将其添加到
    `JSFShoppingCart` bean 中。


