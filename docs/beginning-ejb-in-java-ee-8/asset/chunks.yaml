- fmt: '# Java Persistence Query Language (JPQL)


    The Java Persistence API provides two methods for querying entities such as the
    Java Persistence query language (JPQL) and the Criteria API.


    Let’s compare a bit JPQL and Criteria APIs. JPQL queries are generally more concise
    and readable than Criteria queries. JPQL is easy to learn for programmers with
    previous SQL knowledge.


    JPQL queries are not typesafe, which means that they require a cast when retrieving
    the query result from the entity manager. Because of that the type-casting errors
    may not be caught at compiling time.


    Also, JPQL queries do not support open-ended parameters. Criteria API queries
    are typesafe and therefore don’t require casting. Remember that when comparing
    performance between JPQL and Criteria API, Criteria API queries provide better
    performance because JPQL dynamic queries must be parsed each time they are called.


    One of the common Criteria API disadvantages is that they are typically more verbose
    than JPQL queries. This means that they will require the programmers to create
    many objects and perform operations on those objects before submitting the Criteria
    API query to the entity manager.


    JPA defines its own query language to support entity-based queries along with
    bulk update and delete operations. JPQL shares much in common with SQL, with the
    main difference being that the primary structures are entities and fields instead
    of tables and columns. Like SQL, JPQL queries may be defined either statically,
    through declared `@NamedQuery` annotations, or as dynamic statements submitted
    to the `EntityManager` and processed at runtime. Queries may take bind parameters,
    and their returned results may be entities or ordinary Java objects.


    By expressing queries in terms of entities and their fields, JPQL statements become
    independent of the underlying schema. Thus, a JPQL query need not change when
    an entity’s mappings are modified.


    JPQL queries are executed by the `EntityManager` on the persistence context, so
    query results will include uncommitted data that is pending in the context transaction.


    ## @NamedQuery and @NamedQueries


    ```

    @Target({TYPE}) @Retention(RUNTIME)

    public @interface NamedQuery {

    String name();

    String query ();

    LockModeType lockMode() default LockModeType.NONE;

    QueryHint[] hints() default {};

    }

    @Target({TYPE}) @Retention(RUNTIME)

    public @interface NamedQueries {

    NamedQuery [] value ();

    }

    ```


    An entity may declare named JPQL statements inside `@NamedQuery` annotations to
    define reusable queries. A `@NamedQuery` consists simply of a `name` and a `query`
    containing the JPQL text. `@NamedQuery` names must be unique across the persistence
    unit.


    ```

    @Entity

    @NamedQueries({

    @NamedQuery(name="Inventory.findAll",

    query="select o from Inventory o"),

    @NamedQuery(name="Inventory.findByYear",

    query="select o from Inventory o where o.year=:year"),

    @NamedQuery(name="Inventory.findByRegion",

    query="select o from Inventory o where o.region=?1 ")

    })

    public class Inventory implements Serializable {

    . . .

    }

    ```


    ## Binding Query Parameters


    Queries may take bind parameters, either as named parameters or indexed parameters.
    To invoke the queries from the previous section, client code, such as a session
    bean, might issue the following calls:


    ```

    @Stateless

    public class InventoryManagerBean implements InventoryManager,

    InventoryManagerLocal {

    . . .

    /** select o from Inventory o */

    public List findAllInventory() {

    return em.createNamedQuery("Inventory.findAll", Inventory.class).getResultList();

    }

    /** select o from Inventory o where o.year=:year */

    public List findInventoryByYear(Object year) {

    return em.createNamedQuery("Inventory.findByYear", Inventory.class).setParameter("year",year).getResultList();

    }

    /** select object(o) from Inventory o where o.region=?1  */

    public List findInventoryByRegion(Object p1) {

    return em.createNamedQuery("findInventoryByRegion", Inventory.class).setParameter(0,p1).getResultList();

    }

    . . .

    }

    ```


    Note that the `findInventoryByYear` query takes a named parameter, `:year`, whereas
    `findInventoryByRegion` uses an indexed parameter, `?1`. These approaches are
    equivalent but require different `setParameter()` calls when binding the parameters
    prior to query execution time, as shown in the previous sample code.


    ## Dynamic Queries


    So far, we have shown example queries that are defined through the `@NamedQuery`
    annotation on an entity class. It is also possible to execute queries dynamically
    by passing query strings that may be constructed on the fly at runtime.


    Listing [3-19](#A311833_3_En_3_Chapter.html#Par190) shows an example of how this
    is done.


    ```

    @Stateless

    public class CustomerManagerBean {

    @PersistenceContext(unitName = "Chapter03PersistenceUnit")

    private EntityManager em;

    /** select object(o) from Customer o */

    public List findAllCustomers() {

    return em.createQuery("select o from Customer o", Customer.class).getResultList();

    }

    // . . .

    }

    Listing 3-19

    Example of Dynamic JPQL Usage

    ```


    ## Bulk Update and Delete Operations


    JPQL may also be used to perform bulk update and delete operations across multiple
    instances of a specific entity class, including subclass instances. These JPQL
    statements may also take parameters and return the number of entity instances
    affected by the operation. An example of a bulk delete operation is shown in Listing
    [3-20](#A311833_3_En_3_Chapter.html#Par192).


    ```

    @Stateless

    public class CustomerManagerBean {

    @PersistenceContext(unitName = "Chapter03PersistenceUnit")

    private EntityManager em;

    /**

    * Perform a bulk delete of fulfilled CustomerOrder items

    */

    public int bulkDeleteFulfilledOrders() {

    return em.createQuery("delete from CustomerOrder o where o.status = ''FULFILLED''").executeUpdate();

    }

    // . . .

    }

    Listing 3-20

    Example of a Bulk Delete Statement in JPQL

    ```


    Bulk delete and update statements are executed through the `EntityManagers` query
    engine using the `EntityManager.createQuery()` call. They may also be specified
    either declaratively, through `@NamedQuery` elements, or dynamically, as shown
    above in Listing [3-20](#A311833_3_En_3_Chapter.html#Par192).


    Caution


    Care should be taken when performing bulk update and delete operations, since
    they bypass the `PersistenceContext` and can lead to cache inconsistency. They
    are essentially translated straight into SQL and executed without observing optimistic
    locking checks or following cascade rules specified on relationship fields. As
    a rule of thumb, bulk operations should be performed in their own transaction
    context, or else at the beginning of a transaction. If a `PersistenceContext`
    whose `type` is `PersistenceContextType.EXTENDED` is used, make sure you call
    `EntityManager.flush()` after performing a bulk operation. That way, no entities
    will exist in the cache following the bulk operation that might be out of date
    or removed.


    ## Complex Queries


    We will cover more advanced areas of JPQL in the next chapter, including queries
    that return ordinary, non-entity Java objects; and native queries written in SQL,
    which may return results that are converted into entity instances.


    Note


    One of the most important changes in JPA 2.2 is the ability to stream the result
    of a query execution using the method `Stream getResultStream()` added to `Query`
    and `TypedQuery` interface. This can be very usable when we need to process a
    huge result set.


    ## Persistence vs. Adaption


    One of the decisions an application designer has to make when approaching JPA
    entity classes is whether to design them top down or bottom up: that is, whether
    first to create the entities and let the database schema follow, or whether to
    create the database schema first. It is, of course, possible to build both entities
    and tables in parallel, but in many cases one or the other of these objects is
    fixed, and the other must be built to match.'
