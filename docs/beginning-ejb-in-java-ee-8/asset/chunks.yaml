    root directory of the EAR file. In the preceding example, the `MyEjb-Client.jar`
    file is also located in the root directory of the EAR file.


    An EJB module may also include a persistence unit, which is described in the following
    section. A persistence unit may only exist in the EJB JAR in expanded form; JAR
    files may not be nested inside the EJB JAR file. A persistence unit is defined
    by the presence of a `META-INF/persistence.xml` file in the contents of the EJB
    JAR file.


    An EJB module may be assigned a name using a module declaration inside a `META-INF/application.xml`
    file. When no `META-INF/application.xml` file is present during deployment, as
    when the EJB JAR file is deployed stand-alone or within an EAR file that does
    not include this descriptor, it is assigned a default name. This name is derived
    from the name of the EJB JAR archive, minus any directory information or the `.jar`
    suffix. For example, an EJB JAR file may be bundled in an EAR file in the following
    location:


    ```

    ./OrderManagerEJBModule.jar

    ```


    In this case, its default module name would be `OrderManagerEJBModule`.


    #### EJBs in a WAR File


    The EJB 3.0 specification simplified the packaging of EJBs by making the packaging
    of XML descriptors like `ejb-jar.xml` optional. The EJB 3.1 specification has
    taken this simplification even further by allowing the packaging of EJBs (POJOs
    annotated with `@Stateless`, `@Stateful`, `@Singleton`, or `@MessageDriven` annotations)
    directly in the `WEB-INF/classes` directory of the WAR file. Similarly, the `ejb-jar.xml`
    descriptor, if present, can be packaged directly into the `WEB-INF` directory
    along with `web.xml`. With this change, users no longer need to create a separate
    EJB JAR module for packaging the EJBs. Figure [11-7](#A311833_3_En_11_Chapter.html#Fig7)
    depicts this new packaging option.


    ![A311833_3_En_11_Fig7_HTML.jpg](A311833_3_En_11_Fig7_HTML.jpg)


    Figure 11-7


    Packaging EJB directly under WEB-INF\classes directory of WAR file


    #### Persistence Unit


    A group of JPA entities, known as a persistence unit, is neither strictly a module
    type nor does it have its own dedicated container. Instead, the Java EE server
    supports persistence directly as one of the core services it offers to the Java
    EE containers. This allows JPA entities to behave as persistent objects and interact
    with Java EE components while executing in the other Java EE container environments.
    By not being constrained to their own container, JPA entities are also free to
    execute and demonstrate persistent behavior outside the Java EE environment.


    Note


    In a deployment context, the term persistence unit refers to a group of collocated
    JPA entities and a corresponding (and mandatory) `META-INF/persistence.xml` file.
    This group of files may be packaged into its own JAR file, or the files may be
    bundled directly inside an EJB JAR or WAR file. In turn, the `persistence.xml`
    file defines one or more `<persistence-unit>` entries that may further partition
    the entities in the persistence unit packaging structure. In this chapter, we
    differentiate these two concepts that share similar names by always using the
    hyphen (persistence-unit) when describing the `<persistence-unit>` XML element.
    Thus, any reference to a persistent unit can be assumed to refer to the group
    of entities Collocated with a `persistence.xml` file.


    As mentioned in the preceding note, the packaging of persistence units is different
    from the packaging of other module types. When packaged in a Java EE application
    EAR file, a persistence unit is treated as a library component (see the “Library
    Components” section below). It can be packaged into a JAR file, or its classes
    can be packaged directly inside an EJB JAR or WAR file. Either way, a `META-INF/persistence.xml`
    file serves to identify the entities contained in the persistence unit. We will
    discuss the packaging details in the “Assembling a Persistence Unit” section later
    in this chapter.


    #### Web Application Module


    A Web application module is comprised of servlets, HTML pages, JSF, JSP documents,
    and any other Web-based files. Its deployment descriptor is the `WEB-INF/web.xml`
    file and, as with the EJB module, the presence of this file is now optional starting
    with Java EE 5 since its contents can be derived using default rules. When archived,
    the contents of a Web application module are packaged into a JAR file with the
    suffix `.war`. This is commonly referred to as a WAR file.


    The contents of a WAR file follow a special structure to suit application partitioning
    in Web browsers better. Of particular relevance when bundling persistence units
    into a WAR file, Java `.class` files are placed in the `WEB-INF/classes` directory,
    and dependent JAR files may be added directly to the `WEB-INF/lib` directory.


    Similar to an EJB module, a Web module may be assigned a name using a module declaration
    inside a `META-INF/application.xml` file. When no `META-INF/application.xml` file
    is present during deployment, as when the WAR file is deployed stand-alone or
    within an EAR file that does not include this descriptor, it is assigned a default
    name. This name is derived from the name of the WAR archive, minus any directory
    information or the `.war` suffix. For example, a WAR file may be bundled in an
    EAR file in the following location:


    ```

    ./OrderManagerWebApp.war

    ```


    In this case, its default module name would be `OrderManagerWebApp`.


    #### Resource Adapter Module


    Resource adapters offer a mechanism for extending a Java EE server. They allow
    resources and services managed by external systems to be integrated into the Java
    EE server for use by components executing in the Java EE containers. A resource
    adapter module contains a set of resource adapters and an optional `META-INF/ra.xml`
    deployment descriptor.


    During deployment, a resource adapter is packaged into a Resource Archive (RAR)
    file, which is a JAR file with the suffix `.rar`.'
  trans: '

    #### EJB 模块


    EJB 模块由一个或多个会话 Bean 和/或消息驱动 Bean (MDB) 组成。它被打包成一个 EJB JAR 文件，如果其中包含 `ejb-jar.xml`
    部署描述符（从 Java EE 5 开始为可选），则该描述符必须位于 JAR 文件的 `META-INF` 目录中。特定于平台的描述符也可以添加到此 `META-INF`
    目录中。如果 EJB JAR 文件不包含 `ejb-jar.xml` 文件，则 EJB Bean 类必须使用 `@Stateless`、`@Stateful`、`@Singleton`
    或 `@MessageDriven` 注解来标识自身为 EJB。


    在许多情况下，最好将客户端对 EJB 模块的视图隔离到其自己的归档文件中。当客户端仅与会话 Bean 的接口通信时，它不需要访问会话 Bean 类。在这种情况下，最佳实践是仅将会话
    Bean 的接口以及任何其他依赖类打包到一个单独的 EJB 客户端 JAR 库中。此 JAR 文件可以提供给客户端，但也可以从 EJB JAR 文件中引用，这样这些接口就不需要在
    EJB JAR 文件内部重复。为了引用 EJB 客户端 JAR 文件，或 EAR 文件中的任何其他 JAR 文件或目录，装配器会在 JAR 文件的 `META-INF/MANIFEST.MF`
    文件中添加一个指向这些位置的 `Class-Path` 条目：


    ```

    Class-Path: MyEjb-Client.jar

    ```


    注意


    有关 `MANIFEST.MF` 文件的更多信息，包括本章中提到的 `Class-Path` 和 `Extension-List` 条目的用法，请参阅：[`http://docs.oracle.com/javase/6/docs/technotes/guides/jar/jar.html`](http://docs.oracle.com/javase/6/docs/technotes/guides/jar/jar.html)。


    可以通过用空格字符分隔 `.jar` 和目录条目来以这种方式引用多个 JAR 文件或目录。被引用的 JAR 文件的路径是相对于 EJB JAR 文件本身的，该文件必须位于
    EAR 文件的根目录中。在前面的示例中，`MyEjb-Client.jar` 文件也位于 EAR 文件的根目录中。


    EJB 模块还可以包含一个持久化单元，这将在下一节中描述。持久化单元只能以展开形式存在于 EJB JAR 中；JAR 文件不能嵌套在 EJB JAR 文件内部。持久化单元通过
    EJB JAR 文件内容中存在 `META-INF/persistence.xml` 文件来定义。


    可以使用 `META-INF/application.xml` 文件中的模块声明为 EJB 模块分配名称。当部署期间不存在 `META-INF/application.xml`
    文件时（例如，当 EJB JAR 文件独立部署或位于不包含此描述符的 EAR 文件中时），将为其分配一个默认名称。此名称源自 EJB JAR 归档文件的名称，减去任何目录信息或
    `.jar` 后缀。例如，EJB JAR 文件可能打包在 EAR 文件中的以下位置：


    ```

    ./OrderManagerEJBModule.jar

    ```


    在这种情况下，其默认模块名称将是 `OrderManagerEJBModule`。


    #### WAR 文件中的 EJB


    EJB 3.0 规范通过使 `ejb-jar.xml` 等 XML 描述符的打包变为可选，简化了 EJB 的打包。EJB 3.1 规范进一步简化了这一过程，允许将
    EJB（使用 `@Stateless`、`@Stateful`、`@Singleton` 或 `@MessageDriven` 注解的 POJO）直接打包到
    WAR 文件的 `WEB-INF/classes` 目录中。类似地，`ejb-jar.xml` 描述符（如果存在）可以与 `web.xml` 一起直接打包到
    `WEB-INF` 目录中。通过此更改，用户不再需要创建单独的 EJB JAR 模块来打包 EJB。图 11-7 描述了这种新的打包选项。


    ![A311833_3_En_11_Fig7_HTML.jpg](img/A311833_3_En_11_Fig7_HTML.jpg)


    图 11-7


    将 EJB 直接打包在 WAR 文件的 WEB-INF\classes 目录下


    #### 持久化单元


    一组 JPA 实体（称为持久化单元）既不是严格的模块类型，也没有其专用的容器。相反，Java EE 服务器直接将持久化作为其向 Java EE 容器提供的核心服务之一来支持。这允许
    JPA 实体在其它 Java EE 容器环境中执行时，表现为持久化对象并与 Java EE 组件交互。由于不受限于其自身的容器，JPA 实体也可以在 Java
    EE 环境之外自由执行并展示持久化行为。


    注意


    在部署上下文中，术语“持久化单元”指的是一组共置的 JPA 实体和一个对应的（且必需的）`META-INF/persistence.xml` 文件。这组文件可以打包到其自己的
    JAR 文件中，或者这些文件可以直接捆绑在 EJB JAR 或 WAR 文件内部。反过来，`persistence.xml` 文件定义了一个或多个 `<persistence-unit>`
    条目，这些条目可以进一步划分持久化单元打包结构中的实体。在本章中，我们通过始终在描述 `<persistence-unit>` XML 元素时使用连字符（persistence-unit）来区分这两个名称相似的概念。因此，任何对“持久化单元”的引用都可以假定是指与
    `persistence.xml` 文件共置的一组实体。


    如前所述，持久化单元的打包不同于其他模块类型的打包。当打包在 Java EE 应用程序 EAR 文件中时，持久化单元被视为一个库组件（请参阅下面的“库组件”部分）。它可以打包到一个
    JAR 文件中，或者其类可以直接打包在 EJB JAR 或 WAR 文件内部。无论哪种方式，`META-INF/persistence.xml` 文件都用于标识持久化单元中包含的实体。我们将在本章后面的“组装持久化单元”部分讨论打包细节。


    #### Web 应用程序模块


    Web 应用程序模块由 Servlet、HTML 页面、JSF、JSP 文档以及任何其他基于 Web 的文件组成。其部署描述符是 `WEB-INF/web.xml`
    文件，与 EJB 模块一样，从 Java EE 5 开始，此文件的存在现在是可选的，因为其内容可以使用默认规则推导出来。归档时，Web 应用程序模块的内容被打包成一个后缀为
    `.war` 的 JAR 文件。这通常被称为 WAR 文件。


    WAR 文件的内容遵循一种特殊结构，以更好地适应 Web 浏览器中的应用程序分区。在将持久化单元捆绑到 WAR 文件中时，特别需要注意的是，Java `.class`
    文件放置在 `WEB-INF/classes` 目录中，而依赖的 JAR 文件可以直接添加到 `WEB-INF/lib` 目录中。


    与 EJB 模块类似，可以使用 `META-INF/application.xml` 文件中的模块声明为 Web 模块分配名称。当部署期间不存在 `META-INF/application.xml`
    文件时（例如，当 WAR 文件独立部署或位于不包含此描述符的 EAR 文件中时），将为其分配一个默认名称。此名称源自 WAR 归档文件的名称，减去任何目录信息或
    `.war` 后缀。例如，WAR 文件可能打包在 EAR 文件中的以下位置：


    ```

    ./OrderManagerWebApp.war

    ```


    在这种情况下，其默认模块名称将是 `OrderManagerWebApp`。


    #### 资源适配器模块


    资源适配器提供了一种扩展 Java EE 服务器的机制。它们允许将由外部系统管理的资源和服务集成到 Java EE 服务器中，供在 Java EE 容器中执行的组件使用。资源适配器模块包含一组资源适配器和一个可选的
    `META-INF/ra.xml` 部署描述符。


    在部署期间，资源适配器被打包成一个资源归档 (RAR) 文件，这是一个后缀为 `.rar` 的 JAR 文件。

