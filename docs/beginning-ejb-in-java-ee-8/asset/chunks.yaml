    Person.java，具有一个复合主键，该主键映射到一个由普通 @Id 字段和关系字段共享的列

    ```


    使用此 `Person` 类时，您可以通过 `homeAddress` 关系字段检索数据，但不能更新此字段。其值必须在实体被持久化时填充，并且由于它是实体主键的一部分，之后不能修改。

