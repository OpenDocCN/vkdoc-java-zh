  trans: '

    #### 库的版本管理


    尽管 Java EE 规范并未强制要求，但许多应用服务器支持 Java EE 应用程序隔离级别，允许每个 Java EE 应用程序拥有自己的类加载器。这使得同一台
    Java EE 服务器上同时运行的多个应用程序可以引用同一捆绑或安装库组件的不同版本。一个实用的场景是，当你希望将部分应用程序迁移到新库版本时，可以在服务器中安装新库版本，然后有选择地更新希望使用新库版本的应用程序的
    `Specification-Version` 属性。


    或者，支持此隔离级别的 Java EE 服务器允许你部署一个捆绑了自身依赖库版本的 Java EE 应用程序。Java EE 规范中的优先级规则规定，当捆绑库与具有相同
    `Extension-Name` 的已安装库发生冲突时，将优先使用捆绑库。这保证了应用程序始终使用其捆绑的库，无论服务器已安装库基础中存在该库的哪些版本。


    ## 应用服务器与平台无关性


    Java EE 一直高度重视可移植性，尽管在实践中这往往难以实现。理想情况下，所有 Java EE 服务器都尽可能完整地实现规范，然后在性能和特性上体现差异化，例如支持可配置的隔离级别以及规范推荐（或暗示但非强制）的高级对象/关系（O/R）映射选项。


    应用服务器需要定义自己的平台特定描述符，用于增强 Java EE 规范的核心需求，事实上几乎所有应用服务器实现都提供了此类描述符。随着时间的推移（在 JPA
    映射元数据领域尤为明显），规范中缺失的功能由供应商实现解决后，会被纳入规范并变得通用。例如，EJB 2.1 没有提供关于如何为实体 Bean 定义 O/R
    映射的支持或规定，也没有说明如何实现实体继承层次结构。从 EJB 3 开始，JPA 吸收了来自 TopLink、Hibernate 和 Java 数据对象（JDO）的许多最佳理念，并将它们直接整合到
    `orm.xml` 文件中，以提供这些功能及其他特性。


    ### 部署工具


    应用服务器供应商几乎都统一采用了 JSR 88，该规范指定使用称为 MBean 的受管 JavaBean 来管理部署过程。MBean 是自描述的，并遵循 Java
    管理扩展（JMX）规范定义的设计模式，为 Java EE 服务器和应用服务器的部署工具之间提供接口。Java EE 部署 MBean 暴露的实际接口因应用服务器而异；但所有部署工具现在都在不同程度上使用它们，这一事实为不同供应商的部署工具提供了一定的一致性。


    通常，供应商的部署工具不仅会引导装配员完成打包 Java EE 模块、库和应用程序归档的过程，还会指导其指定一些元数据，用于填充 Java EE 通用和平台特定的部署描述符。这些工具还会接受
    EJB、WAR 或 EAR 文件，并实际在服务器本身中执行安装和验证部署任务。


    注意


    Cargo 是一个轻量级封装，允许你以标准方式操作 Java EE 容器。Cargo 旨在通过 Ant 任务、Maven 和 IDE 插件等媒介，为许多流行的
    Java EE 容器提供抽象 API。有关 Cargo 的更多信息，请参见 [`http://cargo.codehaus.org`](http://cargo.codehaus.org)。


    ### 部署计划


    某些供应商的应用服务器工具会将部署者的选择记录在一个称为部署计划的文档中。由于部署通常是一个迭代过程，尤其是在开发和测试阶段，捕获部署者的选择可以方便其不必重复指定相同的信息。


    目前，JSR 88 或其他规范中并未规定部署计划的标准格式，因此它不是一个可以在不同应用服务器实现之间复用的文档。如果你觉得这很不方便，可以参与 JCP 并组建或加入一个
    JSR，以推动该领域的标准化。


    ## 部署角色


    任何全面的企业服务平台本质上都是复杂的。认识到这一现实，Java EE 架构师将 Java EE 服务划分为定义明确的 API。同样，他们将与开发和配置 Java
    EE 应用程序各个阶段相关的任务划分为定义明确的角色。我们提到，与构建各种应用程序组件（如 EJB、实体、Servlet、JSF JSP 等）相关的任务属于
    Java EE 的应用程序组件提供者角色。还有其他角色，例如系统组件提供者，负责在应用服务器中安装应用程序组件所需的资源。其中包括数据库资源、授权策略、安全角色以及许多其他资源，包括通过资源适配器引入的服务。


    我们之前介绍了应用程序装配员和应用程序部署者的角色。但在本节中，我们将更深入地探讨这些角色。


    ### 应用程序装配员


    以下是作为应用程序装配员需要了解的内容。


    #### 定义和描述外部依赖


    提供者通过注解、部署描述符或两者，标识其组件的外部需求。这些依赖可能涉及其他 EJB、持久化单元、环境属性值、数据库连接或该应用程序组件外部的任何其他对象。装配员有责任进一步描述这些外部依赖，以便部署者能够弄清楚如何将它们映射到特定应用服务器环境中的具体资源。外部依赖通过注解或部署描述符中的
    `<ejb-ref>`、`<ejb-local-ref>`、`<resource-ref>`、`<resource-env-ref>`、`<security-role-ref>`
    和 `<message-destination-ref>` 条目来定义。装配员的工作是分析这些外部引用并进行修补。此过程包括以下步骤。

    '
- fmt: "# Packaging\n\nThe Assembler performs the packaging stage to bundle application\
    \ components into container-specific JAR files and component libraries. This packaging\
    \ process was outlined in the preceding “Overview of the Packaging and Deployment\
    \ Processes” section. You can use `Ant` or ZIP utilities to perform these steps\
    \ of grouping the Java EE components into modules and packaging them into JAR\
    \ files. However, this is an area that benefits from the use of a visual packaging\
    \ tool, typically available through an IDE. The Assembler packages EJB and application\
    \ client modules into JAR files, Web application modules into WAR files, and resource\
    \ adapters into RAR files.\n\nWhen assembling a stand-alone Java EE module with\
    \ no bundled libraries, no further packaging is needed. The module’s JAR file\
    \ is ready to be deployed.\n\nIf multiple modules are involved, or if libraries\
    \ need to be bundled as well, the Assembler creates an EAR file and adds the modules\
    \ and libraries to this archive. The Assembler may add the modules using an internal\
    \ directory structure, provided that the `lib` directory, or the directory specified\
    \ by `<library-directory>` in the `application.xml` file, is honored as the location\
    \ for implicitly shared libraries.\n\nAn optional `application.xml` file in the\
    \ EAR file’s `META-INF` directory may be used to identify the modules explicitly,\
    \ which are included in the application. This is the way of telling the deployment\
    \ tool to ignore the modules that are not meant of be part of the application,\
    \ but for some reason are included as part of the application.\n\n## The Application\
    \ Deployer\n\nThe module or package produced by the Assembler is then handed off\
    \ to the Deployer. The Deployer has intimate knowledge of the target application\
    \ server environment, including information about all the resources that are currently\
    \ deployed in that environment.\n\nThe Deployer’s actual experience differs due\
    \ to the varying tool sets offered by vendors to accompany their application servers.\
    \ The logical processes of the deployment state are outlined in the following\
    \ sections.\n\n### Unpackaging the Archive\n\nThe EAR file, or stand-alone module\
    \ JAR file, is unpackaged and its contents are analyzed.\n\n### Deriving the Module\
    \ Descriptors\n\nThe Deployer processes the descriptor for each Java EE module.\
    \ If a descriptor was provided, and if its `metadata-complete` property is set\
    \ to `true`, then the Deployer can send the module off to the appropriate container.\
    \ If the descriptor is not supplied, or if `metadata-complete` is not set to `true`,\
    \ then the Java source contents of that module must be scanned to detect annotations.\
    \ All metadata properties found by scanning the annotations are coalesced with\
    \ properties found in the descriptor. During this reconciliation step, Java EE\
    \ precedence rules dictate that whenever both an annotation and the descriptor\
    \ provide a value for a given property, the value in the descriptor prevails.\
    \ The result of this reconciliation state is a completed descriptor for that module.\n\
    \n### Deploying to the Containers\n\nEach completed module can be sent to its\
    \ corresponding container to be installed and registered. Once complete, the Java\
    \ EE components in these modules are ready to be accessed by clients.\n\n## Assembling\
    \ an EJB JAR Module\n\nAn EJB JAR file is a pretty straightforward archive. The\
    \ `.class` files are laid out in the JAR file in directories corresponding to\
    \ their packages, rooted at the top-level directory of the JAR. The `ejb-jar.xml`\
    \ deployment descriptor, if present, goes in the `META-INF` directory, typically\
    \ accompanied by any other platform-specific descriptors.\n\nArbitrary classes\
    \ may be included alongside the EJB classes and interfaces. It is a common practice\
    \ to package the shared library JARs in the same EAR file as the EJB JAR file.\
    \ Libraries bundled in the surrounding EAR file may be referenced using the `Class-Path`\
    \ property of the EJB JAR file’s `META-INF/MANIFEST.MF` file, as described in\
    \ the preceding “Library Components” section. Similarly, you may reference installed\
    \ libraries previously deployed but outside the context application by listing\
    \ them in the `Extension-List` property in the `META-INF/MANIFEST.MF` file.\n\n\
    When it comes to specifying the metadata for an EJB, the `ejb-jar.xml` descriptor\
    \ and the Java source annotations are mutually redundant. The decision to use\
    \ one approach over another is largely a matter of Provider preference, though\
    \ this decision is also affected by how the application will be edited, assembled,\
    \ and deployed. However, the top-level settings, (such as `<ejb-client-jar>`)\
    \ have no corresponding annotations and must be assigned through this descriptor.\n\
    \n> **Note**  \n> Starting with Java EE 5, we have the ability to deploy EJB and\
    \ WAR modules directly, without packaging them as a Java EE application. This\
    \ is only appropriate if these modules hold no external dependencies on classes\
    \ in other JAR files that are not already deployed to the target application server\
    \ environment.\n\n### Naming Scope\n\nWithin a Java EE application, no two EJBs\
    \ may have the same name. It is the Assembler’s responsibility to detect this\
    \ case and rename EJBs appropriately to resolve the conflict.\n\n## Assembling\
    \ a Persistence Unit\n\nA persistence unit is a set of JPA entity, mapped superclass,\
    \ and embeddable classes coupled with a mandatory `META-INF/persistence.xml` file.\
    \ Java EE offers a fixed set of ways to bundle a persistence unit during deployment.\
    \ You can package a persistence unit in any of the following ways:\n\n- Into one\
    \ or more JAR files, which in turn may be packaged within a WAR or an EAR file\n\
    - As a set of classes within an EJB-JAR file\n- In the `classes` directory of\
    \ a WAR file\n- Or as a combination of the above-mentioned ways\n\nThe JAR file\
    \ or directory where its `META-INF/persistence.xml` file is located is called\
    \ the root of the persistence unit, and it defines the root directory for the\
    \ classes that comprise the persistence unit. The root of the persistence unit\
    \ must be one of the following:\n\n- An EJB-JAR file\n- The `WEB-INF/classes`\
    \ directory of a WAR file\n- A JAR file in the `WEB-INF/lib` directory of a WAR\
    \ file\n- A JAR file in the library directory of an EAR file\n- An application\
    \ client JAR file\n\nThe decision of where you bundle your persistence unit determines\
    \ which modules will have visibility to it. For instance, adding it to the EAR\
    \ file’s library directory gives access to all other modules in the application.\
    \ Placing it in the EJB, Web application, or application client JAR limits its\
    \ scope to that module.\n\nIn addition to the `persistence.xml` file, one or more\
    \ O/R mapping files may be added to the `META-INF` directory to augment or override\
    \ any annotations that may have been specified in the managed JPA classes. The\
    \ JPA specifies the default file name to be `META-INF/orm.xml`, but each `<persistence-unit>`\
    \ defined in the `persistence.xml` file may specify its own mapping files, using\
    \ `<mapping-file>` elements. Notice that Java EE 8 comes with the JPA version\
    \ 2.2.\n\n### Naming Scope\n\nWithin a Java EE application, it is possible for\
    \ two JPA entities to have the same name, but only if they are in separate contexts.\
    \ For instance, two Web application modules may bundle separate persistence units\
    \ inside their `WEB-INF/lib` or `WEB-INF/classes` directories. In this case, the\
    \ persistence units are private to each Web application module, and duplicate\
    \ names between these persistence units will not cause a conflict.\n\nIt is the\
    \ Assembler’s responsibility to detect conflicts within the same naming scope\
    \ and rename `entity-name` properties appropriately to resolve the conflict."
  raw: '#### Packaging


    The Assembler performs the packaging stage to bundle application components into
    container-specific JAR files and component libraries. This packaging process was
    outlined in the preceding “Overview of the Packaging and Deployment Processes”
    section. You can use Ant or ZIP utilities to perform these steps of grouping the
    Java EE components into modules and packaging them into JAR files. However, this
    is an area that benefits from the use of a visual packaging tool, typically available
    through an IDE. The Assembler packages EJB and application client modules into
    JAR files, Web application modules into WAR files, and resource adapters into
    RAR files.


    When assembling a stand-alone Java EE module with no bundled libraries, no further
    packaging is needed. The module’s JAR file is ready to be deployed.


    If multiple modules are involved, or if libraries need to be bundled as well,
    the Assembler creates an EAR file and adds the modules and libraries to this archive.
    The Assembler may add the modules using an internal directory structure, provided
    that the `lib` directory, or the directory specified by `<library-directory>`
    in the `application.xml` file, is honored as the location for implicitly shared
    libraries.


    An optional `application.xml` file in the EAR file’s `META-INF` directory may
    be used to identify the modules explicitly, which are included in the application.
    This is the way of telling the deployment tool to ignore the modules that are
    not meant of be part of the application, but for some reason are included as part
    of the application.


    ### The Application Deployer


    The module or package produced by the Assembler is then handed off to the Deployer.
    The Deployer has intimate knowledge of the target application server environment,
    including information about all the resources that are currently deployed in that
    environment.


    The Deployer’s actual experience differs due to the varying tool sets offered
    by vendors to accompany their application servers. The logical processes of the
    deployment state are outlined in the following sections.


    #### Unpackaging the Archive


    The EAR file, or stand-alone module JAR file, is unpackaged and its contents are
    analyzed.


    #### Deriving the Module Descriptors


    The Deployer processes the descriptor for each Java EE module. If a descriptor
    was provided, and if its `metadata-complete` property is set to `true`, then the
    Deployer can send the module off to the appropriate container. If the descriptor
    is not supplied, or if `metadata-complete` is not set to `true`, then the Java
    source contents of that module must be scanned to detect annotations. All metadata
    properties found by scanning the annotations are coalesced with properties found
    in the descriptor. During this reconciliation step, Java EE precedence rules dictate
    that whenever both an annotation and the descriptor provide a value for a given
    property, the value in the descriptor prevails. The result of this reconciliation
    state is a completed descriptor for that module.


    #### Deploying to the Containers


    Each completed module can be sent to its corresponding container to be installed
    and registered. Once complete, the Java EE components in these modules are ready
    to be accessed by clients.


    ## Assembling an EJB JAR Module


    An EJB JAR file is a pretty straightforward archive. The `.class` files are laid
    out in the JAR file in directories corresponding to their packages, rooted at
    the top-level directory of the JAR. The `ejb-jar.xml` deployment descriptor, if
    present, goes in the `META-INF` directory, typically accompanied by any other
    platform-specific descriptors.


    Arbitrary classes may be included alongside the EJB classes and interfaces. It
    is a common practice to package the shared library JARs in the same EAR file as
    the EJB JAR file. Libraries bundled in the surrounding EAR file may be referenced
    using the `Class-Path` property of the EJB JAR file’s `META-INF/MANIFEST.MF` file,
    as described in the preceding “Library Components” section. Similarly, you may
    reference installed libraries previously deployed but outside the context application
    by listing them in the `Extension-List` property in the `META-INF/ MANIFEST.MF`
    file.


    When it comes to specifying the metadata for an EJB, the `ejb-jar.xml` descriptor
    and the Java source annotations are mutually redundant. The decision to use one
    approach over another is largely a matter of Provider preference, though this
    decision is also affected by how the application will be edited, assembled, and
    deployed. However, the top-level settings, (such as `<ejb-client-jar>`) have no
    corresponding annotations and must be assigned through this descriptor.


    Note


    Starting with Java EE 5, we have the ability to deploy EJB and WAR modules directly,
    without packaging them as a Java EE application. This is only appropriate if these
    modules hold no external dependencies on classes in other JAR files that are not
    already deployed to the target application server environment.


    ### Naming Scope


    Within a Java EE application, no two EJBs may have the same name. It is the Assembler’s
    responsibility to detect this case and rename EJBs appropriately to resolve the
    conflict.


    ## Assembling a Persistence Unit


    A persistence unit is a set of JPA entity, mapped superclass, and embeddable classes
    coupled with a mandatory `META-INF/persistence.xml` file. Java EE offers a fixed
    set of ways to bundle a persistence unit during deployment. You can package a
    persistence unit in any of the following ways:


    *   Into one or more JAR files, which in turn may be packaged within a WAR or
    an EAR file

    *   As a set of classes within an EJB-JAR file

    *   In the `classes` directory of a WAR file

    *   Or as a combination of the above-mentioned ways


    The JAR file or directory where its `META-INF/persistence.xml` file is located
    is called the root of the persistence unit, and it defines the root directory
    for the classes that comprise the persistence unit. The root of the persistence
    unit must be one of the following:


    *   An EJB-JAR file

    *   The `WEB-INF/classes` directory of a WAR file

    *   A JAR file in the `WEB-INF/lib` directory of a WAR file

    *   A JAR file in the library directory of an EAR file

    *   An application client JAR file


    The decision of where you bundle your persistence unit determines which modules
    will have visibility to it. For instance, adding it to the EAR file’s library
    directory gives access to all other modules in the application. Placing it in
    the EJB, Web application, or application client JAR limits its scope to that module.


    In addition to the `persistence.xml` file, one or more O/R mapping files may be
    added to the `META-INF` directory to augment or override any annotations that
    may have been specified in the managed JPA classes. The JPA specifies the default
    file name to be `META-INF/orm.xml`, but each `<persistence-unit>` defined in the
    `persistence.xml` file may specify its own mapping files, using `<mapping-file>`
    elements. Notice that Java EE 8 comes with the JPA version 2.2.


    ### Naming Scope


    Within a Java EE application, it is possible for two JPA entities to have the
    same name, but only if they are in separate contexts. For instance, two Web application
    modules may bundle separate persistence units inside their `WEB-INF/lib` or `WEB-INF/classes`
    directories. In this case, the persistence units are private to each Web application
    module, and duplicate names between these persistence units will not cause a conflict.


    It is the Assembler’s responsibility to detect conflicts within the same naming
    scope and rename entity-`name` properties appropriately to resolve the conflict.'
  trans: '

    #### 打包


    装配器执行打包阶段，将应用程序组件打包到特定于容器的 JAR 文件和组件库中。此打包过程已在前面“打包和部署流程概述”部分中概述。您可以使用 Ant 或 ZIP
    工具来执行这些步骤，将 Java EE 组件分组到模块中，并将它们打包到 JAR 文件中。然而，这是一个受益于使用可视化打包工具的领域，该工具通常可通过 IDE
    获得。装配器将 EJB 和应用程序客户端模块打包到 JAR 文件中，将 Web 应用程序模块打包到 WAR 文件中，并将资源适配器打包到 RAR 文件中。


    在组装一个没有捆绑库的独立 Java EE 模块时，无需进一步打包。该模块的 JAR 文件即可直接部署。


    如果涉及多个模块，或者也需要捆绑库，则装配器会创建一个 EAR 文件，并将模块和库添加到该归档文件中。装配器可以使用内部目录结构添加模块，前提是 `lib`
    目录或 `application.xml` 文件中由 `<library-directory>` 指定的目录被视作隐式共享库的位置。


    EAR 文件 `META-INF` 目录中可选的 `application.xml` 文件可用于显式标识应用程序中包含的模块。这是告诉部署工具忽略那些本不属于应用程序，但由于某种原因被包含在应用程序中的模块的方式。


    ### 应用程序部署器


    装配器生成的模块或包随后被移交给部署器。部署器对目标应用程序服务器环境有深入的了解，包括有关该环境中当前部署的所有资源的信息。


    由于供应商为其应用程序服务器提供的工具集各不相同，部署器的实际体验也有所不同。部署状态的逻辑过程将在以下各节中概述。


    #### 解包归档文件


    EAR 文件或独立模块 JAR 文件被解包，并分析其内容。


    #### 派生模块描述符


    部署器处理每个 Java EE 模块的描述符。如果提供了描述符，并且其 `metadata-complete` 属性设置为 `true`，则部署器可以将该模块发送到相应的容器。如果未提供描述符，或者
    `metadata-complete` 未设置为 `true`，则必须扫描该模块的 Java 源代码内容以检测注解。通过扫描注解发现的所有元数据属性将与描述符中找到的属性合并。在此协调步骤中，Java
    EE 优先级规则规定，每当注解和描述符都为给定属性提供值时，描述符中的值优先。此协调状态的结果是该模块的完整描述符。


    #### 部署到容器


    每个完整的模块都可以发送到其对应的容器进行安装和注册。完成后，这些模块中的 Java EE 组件即可供客户端访问。


    ## 组装 EJB JAR 模块


    EJB JAR 文件是一个非常直接的归档文件。`.class` 文件在 JAR 文件中按照其包对应的目录进行布局，根目录位于 JAR 的顶层目录。`ejb-jar.xml`
    部署描述符（如果存在）放在 `META-INF` 目录中，通常还附带任何其他特定于平台的描述符。


    任意类都可以与 EJB 类和接口一起包含在内。一种常见的做法是将共享库 JAR 与 EJB JAR 文件打包在同一个 EAR 文件中。可以使用 EJB JAR
    文件的 `META-INF/MANIFEST.MF` 文件中的 `Class-Path` 属性来引用打包在外部 EAR 文件中的库，如前面“库组件”部分所述。类似地，您可以通过在
    `META-INF/MANIFEST.MF` 文件的 `Extension-List` 属性中列出它们，来引用先前部署但在上下文应用程序之外的已安装库。


    在指定 EJB 的元数据时，`ejb-jar.xml` 描述符和 Java 源代码注解是相互冗余的。选择使用哪种方法主要取决于提供者的偏好，尽管此决定也受到应用程序将如何编辑、组装和部署的影响。但是，顶层设置（例如
    `<ejb-client-jar>`）没有对应的注解，必须通过此描述符进行分配。


    注意


    从 Java EE 5 开始，我们可以直接部署 EJB 和 WAR 模块，而无需将它们打包为 Java EE 应用程序。这仅适用于这些模块不依赖于其他 JAR
    文件中尚未部署到目标应用程序服务器环境的类的情况。


    ### 命名范围


    在 Java EE 应用程序中，不能有两个 EJB 具有相同的名称。装配器有责任检测这种情况并适当地重命名 EJB 以解决冲突。


    ## 组装持久化单元


    持久化单元是一组 JPA 实体、映射超类和可嵌入类，以及一个必需的 `META-INF/persistence.xml` 文件。Java EE 提供了一组固定的方式来在部署期间捆绑持久化单元。您可以通过以下任何一种方式打包持久化单元：


    *   打包到一个或多个 JAR 文件中，这些 JAR 文件又可以打包到 WAR 或 EAR 文件中

    *   作为 EJB-JAR 文件中的一组类

    *   在 WAR 文件的 `classes` 目录中

    *   或者作为上述方式的组合


    其 `META-INF/persistence.xml` 文件所在的 JAR 文件或目录称为持久化单元的根，它定义了构成持久化单元的类的根目录。持久化单元的根必须是以下之一：


    *   一个 EJB-JAR 文件

    *   WAR 文件的 `WEB-INF/classes` 目录

    *   WAR 文件的 `WEB-INF/lib` 目录中的一个 JAR 文件

    *   EAR 文件的库目录中的一个 JAR 文件

    *   一个应用程序客户端 JAR 文件


    您捆绑持久化单元的位置决定了哪些模块可以访问它。例如，将其添加到 EAR 文件的库目录中，可以授予应用程序中所有其他模块的访问权限。将其放置在 EJB、Web
    应用程序或应用程序客户端 JAR 中，则将其范围限制在该模块内。


    除了 `persistence.xml` 文件之外，还可以将一个或多个 O/R 映射文件添加到 `META-INF` 目录，以增强或覆盖托管 JPA 类中可能已指定的任何注解。JPA
    指定默认文件名为 `META-INF/orm.xml`，但 `persistence.xml` 文件中定义的每个 `<persistence-unit>`
    都可以使用 `<mapping-file>` 元素指定其自己的映射文件。请注意，Java EE 8 附带 JPA 版本 2.2。


    ### 命名范围


    在 Java EE 应用程序中，两个 JPA 实体可能具有相同的名称，但前提是它们位于不同的上下文中。例如，两个 Web 应用程序模块可以在其 `WEB-INF/lib`
    或 `WEB-INF/classes` 目录中捆绑单独的持久化单元。在这种情况下，持久化单元对每个 Web 应用程序模块是私有的，这些持久化单元之间的重复名称不会导致冲突。


    装配器有责任检测同一命名范围内的冲突，并适当地重命名实体 `name` 属性以解决冲突。

    '
- fmt: '# Summary


    This chapter introduced the topic of Java EE deployment, and it covered both general
    deployment issues and areas of deployment that are specific to EJBs and JPA entities.
    We began the discussion with an overview of the tasks that are performed during
    deployment, noting that, depending on the complexity of the Java EE modules being
    deployed, some steps may not be required. This overview section also explained
    the roles of the Assembler and Deployer, and it explained the deployment tasks
    in the context of these two roles.


    To provide some background into the deployment infrastructure (knowledge that
    will assist you when choosing how to partition your applications and resolve external
    references), we explored the Java EE server and the four Java EE containers: EJB,
    Web, application client, and applet. This led to a discussion of the corresponding
    Java EE module types, and the definition of a Java EE application. We also explained
    how to use library components to package your JPA persistence units and non-Java
    EE components.


    The remainder of the chapter provided a more in-depth look at the roles of the
    Assembler and Deployer, and it concluded with further specifics on how to deploy
    EJB modules and JPA persistence units.


    In the next chapter, we explore how to build clients that are capable of interacting
    with EJB components in a multiuser, distributed environment.


    # 12. EJB Client Applications


    So far in our journey, we have covered, in detail, session beans, entities using
    the Java Persistence API (JPA), message-driven beans (MDBs), publishing stateless
    session beans as Web services, and integrating all of these components. On top
    of this, we have covered specific details on transactions and performance. While
    we have been developing simple servlets as our client applications to illustrate
    how the components work, we haven’t thoroughly discussed the different types of
    EJB client applications and how to develop them. In this chapter, we will discuss
    different application architectures in which client applications can be involved,
    and we will build the common ones.


    ## Application Architecture


    The Java EE platform provides flexibility on how components can be distributed
    across different tiers and architectures. You can choose the right architecture
    and programming model based on the application or configuration requirements.
    In this section, we will look at the different architectures and programming models
    that you can use.


    Figure [12-1](#A311833_3_En_12_Chapter.html#Fig1) shows the architectural layout
    for Web-based applications. This architecture is typically front ended by a Web
    application running in a browser. These days, other types of client devices (such
    as smartphones, tablets, cell phones, and telnet devices) are also being used
    to run these applications. The Web application running in a browser or mobile
    device renders the user interface using Web technologies such as JavaServer Pages
    (JSP), JavaServer Faces (JSF), or Java Servlets. Typical user actions, such as
    entering search criteria or adding items to a shopping cart, will invoke/call
    session beans running in an EJB container via one of the aforementioned Web technologies.
    Once the session beans are invoked, they process the requests, and responses are
    sent back.


    ![A311833_3_En_12_Fig1_HTML.jpg](A311833_3_En_12_Fig1_HTML.jpg)


    Figure 12-1


    A Web-based application architecture


    This architecture allows you to leverage all of the benefits of session beans,
    such as encapsulating interactions with entities, managing transactions and security,
    and so on. The downside is that you need an EJB container or an application server
    to deploy and run the session beans. Another thing to note in this architecture
    is that you can run the Web and EJB containers on two different physical machines
    or on two separate Java Virtual Machines (JVMs) on the same physical machine.
    The pros and cons of this approach were discussed in Chapter [2](#A311833_3_En_2_Chapter.html).


    A slight modification of this architecture is shown in Figure [12-2](#A311833_3_En_12_Chapter.html#Fig2),
    in which the Web and EJB containers are collocated in the same JVM. In this architecture,
    Web components interact with EJB components in local mode. The pros and cons of
    this approach were also discussed in Chapter [2](#A311833_3_En_2_Chapter.html).


    ![A311833_3_En_12_Fig2_HTML.jpg](A311833_3_En_12_Fig2_HTML.jpg)


    Figure 12-2


    A Web-based application architecture with local invocation


    The JPA specification provides a lightweight persistence object model with plain
    old Java objects (POJOs) and annotations for object/relational (O/R) mapping.
    This is drastically different from what the earlier EJB specifications were doing
    for persistence. The lightweight nature of this persistence model makes it possible
    to have application architectures that allow Web applications to interact directly
    with persistence object models or JPA entities. Figure [12-3](#A311833_3_En_12_Chapter.html#Fig3)
    shows the architectural layout for this kind of programming model. In this architecture,
    the Web components will interact with entities using the `EntityManager` to perform
    CRUD (create, retrieve, update, delete) operations and queries to retrieve data.


    ![A311833_3_En_12_Fig3_HTML.jpg](A311833_3_En_12_Fig3_HTML.jpg)


    Figure 12-3


    A Web-based application architecture using JPA entities


    The upside of this programming model is that you can run your Web applications
    on any standard lightweight Web container (such as Tomcat). You don’t need any
    EJB containers or application servers, as you aren’t using session beans or MDBs.
    This architecture is widely used with other O/R frameworks, such as TopLink and
    Hibernate, on which the JPA specification is based. The downside is that you lose
    some of the services provided by EJB containers (such as transactions and security).


    The preceding three architectures are most commonly used when building Web applications
    with EJBs or entities. Other variants of these architectures are possible, but
    we will not be drilling down into all of the options.'
  raw: '## Summary


    This chapter introduced the topic of Java EE deployment, and it covered both general
    deployment issues and areas of deployment that are specific to EJBs and JPA entities.
    We began the discussion with an overview of the tasks that are performed during
    deployment, noting that, depending on the complexity of the Java EE modules being
    deployed, some steps may not be required. This overview section also explained
    the roles of the Assembler and Deployer, and it explained the deployment tasks
    in the context of these two roles.


    To provide some background into the deployment infrastructure (knowledge that
    will assist you when choosing how to partition your applications and resolve external
    references), we explored the Java EE server and the four Java EE containers: EJB,
    Web, application client, and applet. This led to a discussion of the corresponding
    Java EE module types, and the definition of a Java EE application. We also explained
    how to use library components to package your JPA persistence units and non-Java
    EE components.


    The remainder of the chapter provided a more in-depth look at the roles of the
    Assembler and Deployer, and it concluded with further specifics on how to deploy
    EJB modules and JPA persistence units.


    In the next chapter, we explore how to build clients that are capable of interacting
    with EJB components in a multiuser, distributed environment.


    # 12. EJB Client Applications


    So far in our journey, we have covered, in detail, session beans, entities using
