    boolean unique() default false;

    boolean nullable() default true;

    boolean insertable() default true;

    boolean updatable() default true;

    String columnDefinition() default "";

    String table() default "";

    int length() default 255;

    int precision() default 0; // decimal precision

    int scale() default 0; // decimal scale

    }

    清单 3-18

    @Column 注解

    ```


    如你所见，如果需要，可以完整指定列的属性。当你希望给出部署时指令以生成自定义列定义时，这非常有用。最常见的情况是，你使用 `name` 属性将列名与字段或属性名解耦，例如当列名过于实用或晦涩时。


    此处，字段 `identifier` 被指示映射到名为 `ID` 的列，从而解除了默认情况下将它们绑定在一起的命名依赖关系：


    ```

    @Entity

    @Table(name="ADDRESSES")

    public class Address implements Serializable {

    ...

    @Column(name="ID")

    String identifier;

    ...

    }

    ```


    ### 复杂映射


    更复杂的映射，包括涉及每个实体多个表、复杂数据类型、嵌入类和继承层次结构的映射，将在下一章中介绍。现在，让我们研究一下实体之间的关系是如何映射的。


    ## 实体关系


    实体可以持有对自身或其他实体的单值引用和集合引用。此外，关系可以作为关系字段暴露在参与关系的一个或两个实体上。对于熟悉 EJB 2.x 的人来说，请注意，在
    JPA 中，关系字段不再由容器双向维护。更新双向关系一端的关系字段不再自动导致另一端的关系字段也被更新。在映射关系字段时，其主键始终代表目标实体。关系的源端（或拥有端）可以映射到源实体表上的外键，但不需要在底层列上指定实际的数据库外键约束。


    让我们看看 JPA 如何让你定义关系。


    ### @OneToOne


    以下是 `@OneToOne` 关系注解的定义：


    ```

    @Target({ElementType.METHOD, ElementType.FIELD})

    @Retention(RetentionPolicy.RUNTIME)

    public @interface OneToOne {

    Class targetEntity() default void.class;

    CascadeType[] cascade() default {};

    FetchType fetch() default EAGER;

    boolean optional() default true;

    String mappedBy() default "";

    }

    ```


    `@OneToOne` 关系由关系一端或两端的单值实体引用表示。一个关系字段将映射到其表上的列，这些列引用关系另一端表上的主键列。


    以下是一个示例，其中 `Customer` 使用了 `Address`，但 `Address` 不知道 `Customer` 对其的使用情况，因此其类中没有关系字段：


    ```

    @Entity

    public class Customer implements Serializable {

    . . .

    @OneToOne

    @JoinColumn(name="MAILING_ADDRESS_REF",

    referencedColumnName="ADDRESS_PK")

    protected Address address;

    . . .

    }

    ```


    要使其成为双向关系，只需向 `Address` 添加一个指向 `Customer` 的关系字段：


    ```

    @Entity

    public class Address implements Serializable {

    . . .

    @OneToOne(mappedBy="address")

    protected Customer customer;

    . . .

    }

    ```


    请注意，通过使用 `(mappedBy="address")` 属性，无需在 `Address.customer` 字段上重复指定 `@JoinColumn`
    信息。此外，关系另一端的实体类型是从 `customer` 字段类型派生的。


    如果你随后要使关系成为单向但方向相反，只需将 `@JoinColumn` 注解从 `Customer.address` 移动到 `Address.customer`，然后移除
    `Customer.address` 字段。


