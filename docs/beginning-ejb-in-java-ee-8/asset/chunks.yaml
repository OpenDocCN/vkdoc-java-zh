    ### Bean 类


    单例会话 Bean 类是任何带有类级别注解 `@Singleton` 的标准 Java 类。如果使用部署描述符代替注解，则应将 Bean 类标记为单例会话
    Bean。如果你同时使用注解和部署描述符（混合模式），则如果在类中指定了任何其他类级别或成员级别的注解，则必须指定 `@Singleton` 注解。


    注意


    单例可以在首次调用时初始化，也可以在部署时使用 `@Startup` 注解进行初始化。


    为了说明单例会话 Bean，我们将创建一个 `ShopperCount` 会话 Bean，用于跟踪登录我们购物网站的用户数量。清单 2-17 显示了 `ShopperCount`
    会话 Bean 的定义。


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    @Singleton (name = "ShopperCount")

    @Startup

    public class ShopperCountBean {

    private int shopperCounter;

    // 增加购物者计数器

    public void incrementShopperCount() {

    shopperCounter++;

    }

    // 返回购物者数量

    public int getShopperCount() {

    return shopperCounter;

    }

    }

    清单 2-17

    ShopperCountBean.java

    ```


    单例会话 Bean 由 EJB 容器自行决定何时实例化。但是，你可以使用 `@Startup` 注解 Bean 类，以指示容器必须在应用程序启动序列期间初始化该单例
    Bean。


    当在应用程序中使用多个单例会话 Bean 时，应用程序可能要求它们按特定顺序初始化。`@DependsOn` 注解声明了单例会话 Bean 的启动依赖关系。清单
    2-18 显示了依赖于 `ShopperCount` 会话 Bean 的 `LogShopperCount` 会话 Bean 的定义。


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    import javax.ejb.DependsOn;

    import java.util.logging.Logger;

    @Singleton

    @Startup

    @DependsOn("ShopperCount")

    public class LogShopperCount {

    private final Logger log = Logger.getLogger("LogShopperCount.class");

    public void logShopperCount() {

    // 记录购物者数量

    }

    }

    清单 2-18

    LogShopperCount.java

    ```


    与无状态和有状态会话 Bean 不同，单例会话 Bean 不得实现 `javax.ejb.SessionSynchronization` 接口或使用会话同步注解。


    ### 业务接口


    单例会话 Bean 的业务接口与无状态和有状态会话 Bean 的接口类似，并且使用 `@Local` 和 `@Remote` 注解以相同的方式进行注解。单例会话
    Bean 支持无接口本地视图，这使得对于本地视图而言，业务接口的声明是可选的。


    ### 业务方法


    单例会话 Bean 中的业务方法与无状态和有状态会话 Bean 中的方法类似。我们将通过添加一个重置计数器的业务方法来增强 `ShopperCount` Bean。


    清单 2-19 显示了实现业务方法的 `ShopperCount` Bean。


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    @Singleton(name = "ShopperCount")

    @Startup

    public class ShopperCountBean {

    private int shopperCounter = 0;

    // 增加购物者计数器

    public void incrementShopperCount() {

    shopperCounter++;

    }

    // 返回购物者数量

    public int getShopperCount() {

    return shopperCounter;

    }

    // 重置计数器

    public void resetCounter() {

    shopperCounter = 0;

    }

    }

    清单 2-19

    ShopperCountBean.java

    ```

