    ## 总结


    本章以本书和 EJB 的介绍开篇。本指南涵盖了关于 EJB 核心特性、EJB 框架和组件模型的基本信息。其中包括对 EJB 历史、EJB 3 简化开发模型以及
    EJB 分布式计算模型的简要概述。


    在“本书的组织结构”部分，我们提供了每一章的摘要，以说明本书的总体流程，并帮助您决定如果您希望不按顺序阅读各章，应首先关注哪些领域。


    本章以“入门”部分结束，帮助您安装和配置 NetBeans IDE 及其集成的 GlassFish 应用服务器（该服务器包含最新 Java EE 规范的参考实现）；并验证安装是否成功。完成此任务后，您现在拥有了运行本书代码示例以及后续章节中研究
    EJB 众多特性所需的软件基础设施。在下一章中，我们将详细讨论 EJB 会话 Bean。


    # 2. EJB 会话 Bean


    本章将讨论 EJB 会话 Bean，即 EJB 客户端应用程序使用的核心业务服务对象。您将理解简化的 EJB 会话 Bean 模型，并深入了解以下主题：


    *   会话 Bean 的类型——有状态、无状态和单例——以及何时使用每一种

    *   Bean 类、业务接口和业务方法

    *   异步方法

    *   回调方法

    *   拦截器

    *   异常处理

    *   客户端视图

    *   与会话 Bean 相关的注解依赖注入

    *   定时器服务


    ## 会话 Bean 简介


    会话 Bean 是 EJB 技术中最重要的部分，因为它们为 Java 应用程序的业务流程建模，并为每个流程封装业务逻辑。


    会话 Bean 是 Java 组件，它们可以在独立的 EJB 容器中运行，也可以在作为标准 Java 平台企业版 (Java EE) 应用服务器一部分的 EJB
    容器中运行。这些 Java 组件通常用于为特定的用户任务或用例建模，例如输入客户信息或实现一个与客户端应用程序维护会话状态的流程。会话 Bean 可以为多种类型的应用程序（如人力资源、订单录入和费用报告应用程序）保存业务逻辑。EJB
    容器为会话 Bean 提供服务，而 Bean 则使用 Java 注解和/或 XML 元数据来指示它需要哪些服务。


    容器将管理企业会话 Bean，并为它们提供许多服务，包括安全性、事务、线程安全等。


    ### 会话 Bean 的类型


    会话 Bean 分为三种类型：


    *   **无状态**：这种类型的 Bean 不维护任何代表客户端应用程序的会话状态。

    *   **有状态**：这种类型的 Bean 维护状态，并且 Bean 的特定实例与特定的客户端请求相关联。有状态 Bean 可以被视为在服务器上运行的客户端程序的扩展。

    *   **单例**：这种类型的 Bean 每个应用程序仅实例化一次。单例 Bean 在应用程序的整个生命周期中存在，并在客户端调用之间维护其状态。


    我们将在以下各节中深入探讨无状态、有状态和单例 Bean 的更多细节。

