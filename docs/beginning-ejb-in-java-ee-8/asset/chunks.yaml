  trans: '

    ## Java 持久化查询语言 (JPQL)


    Java 持久化 API 提供了两种查询实体的方法：Java 持久化查询语言 (JPQL) 和 Criteria API。


    我们来简单比较一下 JPQL 和 Criteria API。JPQL 查询通常比 Criteria 查询更简洁、更易读。对于有 SQL 基础的程序员来说，JPQL
    很容易学习。


    JPQL 查询不是类型安全的，这意味着从实体管理器检索查询结果时需要进行强制类型转换。因此，类型转换错误可能无法在编译时被发现。


    此外，JPQL 查询不支持开放式参数。Criteria API 查询是类型安全的，因此不需要强制类型转换。请记住，在比较 JPQL 和 Criteria API
    的性能时，Criteria API 查询提供了更好的性能，因为 JPQL 动态查询每次被调用时都必须进行解析。


    Criteria API 的一个常见缺点是，它们通常比 JPQL 查询更冗长。这意味着在将 Criteria API 查询提交给实体管理器之前，程序员需要创建许多对象并对这些对象执行操作。


    JPA 定义了自己的查询语言，以支持基于实体的查询以及批量更新和删除操作。JPQL 与 SQL 有很多共同之处，主要区别在于其主要结构是实体和字段，而不是表和列。与
    SQL 一样，JPQL 查询可以通过声明的 `@NamedQuery` 注解静态定义，也可以作为动态语句提交给 `EntityManager` 并在运行时处理。查询可以接受绑定参数，其返回结果可以是实体或普通的
    Java 对象。


    通过以实体及其字段来表达查询，JPQL 语句变得独立于底层模式。因此，当实体的映射被修改时，JPQL 查询无需更改。


    JPQL 查询由 `EntityManager` 在持久化上下文中执行，因此查询结果将包含上下文中待提交的未提交数据。


    ### @NamedQuery 和 @NamedQueries


    ```

    @Target({TYPE}) @Retention(RUNTIME)

    public @interface NamedQuery {

    String name();

    String query ();

    LockModeType lockMode() default LockModeType.NONE;

    QueryHint[] hints() default {};

    }

    @Target({TYPE}) @Retention(RUNTIME)

    public @interface NamedQueries {

    NamedQuery [] value ();

    }

    ```


    一个实体可以在 `@NamedQuery` 注解中声明命名的 JPQL 语句，以定义可重用的查询。`@NamedQuery` 仅包含一个 `name` 和一个包含
    JPQL 文本的 `query`。`@NamedQuery` 的名称在持久化单元中必须是唯一的。


    ```

    @Entity

    @NamedQueries({

    @NamedQuery(name="Inventory.findAll",

    query="select o from Inventory o"),

    @NamedQuery(name="Inventory.findByYear",

    query="select o from Inventory o where o.year=:year"),

    @NamedQuery(name="Inventory.findByRegion",

    query="select o from Inventory o where o.region=?1 ")

    })

    public class Inventory implements Serializable {

    . . .

    }

    ```


    ### 绑定查询参数


    查询可以接受绑定参数，可以是命名参数或索引参数。要调用上一节中的查询，客户端代码（例如会话 Bean）可能会发出以下调用：


    ```

    @Stateless

    public class InventoryManagerBean implements InventoryManager,

    InventoryManagerLocal {

    . . .

    /** select o from Inventory o */

    public List findAllInventory() {

    return em.createNamedQuery("Inventory.findAll", Inventory.class).getResultList();

    }

    /** select o from Inventory o where o.year=:year */

    public List findInventoryByYear(Object year) {

    return em.createNamedQuery("Inventory.findByYear", Inventory.class).setParameter("year",year).getResultList();

    }

    /** select object(o) from Inventory o where o.region=?1  */

    public List findInventoryByRegion(Object p1) {

    return em.createNamedQuery("findInventoryByRegion", Inventory.class).setParameter(0,p1).getResultList();

    }

    . . .

    }

    ```


    请注意，`findInventoryByYear` 查询使用了一个命名参数 `:year`，而 `findInventoryByRegion` 使用了一个索引参数
    `?1`。这两种方法是等效的，但在查询执行前绑定参数时需要调用不同的 `setParameter()` 方法，如前面的示例代码所示。


    ### 动态查询


    到目前为止，我们展示的示例查询都是通过在实体类上使用 `@NamedQuery` 注解来定义的。也可以通过传递在运行时动态构建的查询字符串来动态执行查询。


    清单 3-19 展示了如何实现这一点。


    ```

    @Stateless

    public class CustomerManagerBean {

    @PersistenceContext(unitName = "Chapter03PersistenceUnit")

    private EntityManager em;

    /** select object(o) from Customer o */

    public List findAllCustomers() {

    return em.createQuery("select o from Customer o", Customer.class).getResultList();

    }

    // . . .

    }

    清单 3-19

    动态 JPQL 使用示例

    ```


    ### 批量更新和删除操作


    JPQL 也可用于对特定实体类（包括子类实例）的多个实例执行批量更新和删除操作。这些 JPQL 语句也可以接受参数，并返回受操作影响的实体实例数量。批量删除操作的示例如清单
    3-20 所示。


    ```

    @Stateless

    public class CustomerManagerBean {

    @PersistenceContext(unitName = "Chapter03PersistenceUnit")

    private EntityManager em;

    /**

    * 批量删除已完成的 CustomerOrder 项

    */

    public int bulkDeleteFulfilledOrders() {

    return em.createQuery("delete from CustomerOrder o where o.status = ''FULFILLED''").executeUpdate();

    }

    // . . .

    }

    清单 3-20

    JPQL 中批量删除语句示例

    ```


    批量删除和更新语句通过 `EntityManager` 的查询引擎使用 `EntityManager.createQuery()` 调用执行。它们也可以像上面清单
    3-20 所示，通过 `@NamedQuery` 元素声明式地指定，或动态地指定。


    警告


    执行批量更新和删除操作时应格外小心，因为它们会绕过 `PersistenceContext`，并可能导致缓存不一致。它们本质上被直接转换为 SQL 并执行，而不进行乐观锁检查或遵循关系字段上指定的级联规则。根据经验，批量操作应在自己的事务上下文中执行，或者至少在事务开始时执行。如果使用了
    `type` 为 `PersistenceContextType.EXTENDED` 的 `PersistenceContext`，请确保在批量操作后调用
    `EntityManager.flush()`。这样，批量操作后缓存中就不会存在可能已过时或已删除的实体。


    ### 复杂查询


    我们将在下一章介绍 JPQL 更高级的领域，包括返回普通非实体 Java 对象的查询；以及用 SQL 编写的原生查询，这些查询可以返回转换为实体实例的结果。


    注意


    JPA 2.2 中最重要的变化之一是能够使用添加到 `Query` 和 `TypedQuery` 接口的方法 `Stream getResultStream()`
    来流式处理查询执行的结果。当我们需要处理大量结果集时，这非常有用。


    ## 持久化 vs. 适配


    应用程序设计者在处理 JPA 实体类时必须做出的决策之一是，是自上而下还是自下而上地设计：即，是先创建实体并让数据库模式随之生成，还是先创建数据库模式。当然，也可以并行构建实体和表，但在许多情况下，其中一个对象是固定的，另一个必须构建以与之匹配。

    '
- fmt: '### Forward Generation—Persistence


    In the top-down model, the entity class serves as the source of truth, and the
    database schema is created to provide persistence for the entity class data. The
    underlying table(s) can be generated as a side effect of deploying the entity
    class; you may wish to specify metadata in `@Table`, `@Column`, and related annotations
    to guide the deployment tool in generating the structure of the schema.


    ### Reverse Engineering—Adaption


    In the bottom-up approach, the database schema is the source of truth: the schema
    is fixed, and the Java objects—entity classes—exist to adapt the database objects
    into the Java world. This process, typically provided through an IDE using an
    EJB reverse engineering tool, generates a default entity class for each table
    and a default field for each column.


    ### Which One Is Right for Your Project?


    Both approaches are equally common in real-world development projects. Your needs
    will dictate which tools you will want to use to glue the database to the entity
    beans. You may think of the issue as one of persistence vs. adaption: does the
    database schema exist solely to provide persistence for the entity beans, or are
    you adapting the database schema into the Java space? Consider this question when
    you begin to create your entity beans.


    ## Example Application: CustomerOrderManager


    In the `CustomerOrderManager` example, we show how a session bean may serve as
    a façade for a handful of interrelated JPA entities. Our `CustomerOrderManager`
    session bean exposes CRUD (create, retrieve, update, delete) operations as service
    methods, allowing clients to access and manipulate `Customer`, `CustomerOrder`,
    and `Address` entities. These service methods on the session façade provide transaction,
    access control, and other enterprise-level services, and they allow the persistence
    framework to handle the interface between the JPA entities and the underlying
    RDBMS.'
