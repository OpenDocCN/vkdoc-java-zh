- fmt: "### Testing Using Sample Project\n\nOnce the NetBeans IDE has opened, we will\
    \ create a sample project to test the compilation, deployment, and execution aspects\
    \ of the IDE as well as the application server.\n\nTo create a new project, open\
    \ the `New Project` wizard by pressing `Ctrl-Shift-N`. Select the `Java Web` category\
    \ and the `Web Application` project, as shown in Figure [1-7](#A311833_3_En_1_Chapter.html#Fig7).\
    \ Traverse the wizard, keeping all of the default values selected, and `Finish`\
    \ the wizard.\n\n![A311833_3_En_1_Fig7_HTML.jpg](A311833_3_En_1_Fig7_HTML.jpg)\n\
    \nFigure 1-7\n\nCreating a sample test project\n\nCreate a project named `WebApplication1`.\
    \ Next we will create a servlet under the project `WebApplication1`. To create\
    \ a servlet, invoke the context menu by right-clicking on the project name in\
    \ the project navigator. Select the `Servlet ...` menu that is available under\
    \ `New`, as shown in Figure [1-8](#A311833_3_En_1_Chapter.html#Fig8).\n\n![A311833_3_En_1_Fig8_HTML.jpg](A311833_3_En_1_Fig8_HTML.jpg)\n\
    \nFigure 1-8\n\nCreating a test servlet\n\nIn the `New Servlet` wizard, enter\
    \ a package name and `Finish` the wizard keeping the other default values, as\
    \ shown in Figure [1-9](#A311833_3_En_1_Chapter.html#Fig9). We have used `setup`\
    \ as the package name.\n\n![A311833_3_En_1_Fig9_HTML.jpg](A311833_3_En_1_Fig9_HTML.jpg)\n\
    \nFigure 1-9\n\nTraversing the New Servlet wizard\n\nAfter the `NewServlet` class\
    \ is created, we can instantly run it by invoking the context menu on the servlet\
    \ file and selecting the `Run File` menu option, as shown in Figure [1-10](#A311833_3_En_1_Chapter.html#Fig10).\n\
    \n![A311833_3_En_1_Fig10_HTML.jpg](A311833_3_En_1_Fig10_HTML.jpg)\n\nFigure 1-10\n\
    \nRunning the servlet\n\nWhen we run the servlet, NetBeans will automatically\
    \ start the integrated GlassFish server.\n\nAs part of running the servlet, NetBeans\
    \ will compile, package, and deploy it to the integrated GlassFish server. After\
    \ the deployment, NetBeans will automatically open the servlet URL in the default\
    \ browser, as shown in Figure [1-11](#A311833_3_En_1_Chapter.html#Fig11).\n\n\
    ![A311833_3_En_1_Fig11_HTML.jpg](A311833_3_En_1_Fig11_HTML.jpg)\n\nFigure 1-11\n\
    \nRunning the servlet class\n\nSuccessful execution of the servlet class means\
    \ that the installation of NetBeans and the integrated GlassFish server have gone\
    \ through successfully, and the setup to run the examples presented in this book\
    \ is ready.\n\n**Note:** By no means is this section of the chapter a user guide\
    \ for the GlassFish application server. For more information on GlassFish, see\
    \ [`https://javaee.github.io/glassfish/`](https://javaee.github.io/glassfish/).\n\
    \n### Administrating the GlassFish Application Server\n\nNetBeans provides us\
    \ with a graphical interface to perform various GlassFish server-related administrative\
    \ tasks. You can restart, start, and stop the GlassFish server from the `Services`\
    \ tab, as shown in Figure [1-12](#A311833_3_En_1_Chapter.html#Fig12).\n\n![A311833_3_En_1_Fig12_HTML.jpg](A311833_3_En_1_Fig12_HTML.jpg)\n\
    \nFigure 1-12\n\nAdministrating the Glassfish application server\n\nOnce GlassFish\
    \ has successfully started, you can test whether the server is able to accept\
    \ the basic HTTP requests. To do so, open a browser, type in the URL `http://localhost:8080/`\
    \ and, if the server is up and running, you will be able to see the page shown\
    \ in Figure [1-13](#A311833_3_En_1_Chapter.html#Fig13).\n\n![A311833_3_En_1_Fig13_HTML.jpg](A311833_3_En_1_Fig13_HTML.jpg)\n\
    \nFigure 1-13\n\nTesting GlassFish server\n\n**Note:** Substitute `localhost`\
    \ with the machine name or IP address if you are trying to access it from a machine\
    \ other than the one on which GlassFish is installed. If you changed the port\
    \ number during installation, use that port instead of 8080.\n\nThe next step\
    \ is to test the access to the administration console of the GlassFish server.\
    \ Make sure that the GlassFish server is up and running, and then select the `View\
    \ Domain Admin Console` menu option from the context menu, as shown in Figure\
    \ [1-12](#A311833_3_En_1_Chapter.html#Fig12). NetBeans will launch the default\
    \ browser and open the administrator console. Alternatively, you can type in the\
    \ URL `http://localhost:4848/`, and you will be able to see the administration\
    \ console page, as shown in Figure [1-14](#A311833_3_En_1_Chapter.html#Fig14).\n\
    \n![A311833_3_En_1_Fig14_HTML.jpg](A311833_3_En_1_Fig14_HTML.jpg)\n\nFigure 1-14\n\
    \nThe GlassFish administration console\n\n**Note:** Substitute `localhost` with\
    \ the machine name or IP address if you are trying to gain access from a machine\
    \ other than the one on which GlassFish is installed. You will have to enter the\
    \ username and password on the administration console login page. If you changed\
    \ the port number during installation, use that port instead of 4848.\n\n### Troubleshooting\n\
    \nEven after precisely following the steps mentioned in this chapter and taking\
    \ the utmost care while installing and configuring the NetBeans IDE along with\
    \ its integrated GlassFish application server, you may face problems while running\
    \ the sample code that accompanies this book. This section will try to highlight\
    \ issues that you may come across and provides information on how to mitigate\
    \ them.\n\n#### “No Compatible JDK was found” Warning During Installation\n\n\
    You get a “`No compatible JDK was found`” warning message on the first page of\
    \ the NetBeans installer wizard.\n\n##### Diagnosis\n\nSamples in this book require\
    \ NetBeans version 8.2 since we utilize Java EE 8. NetBeans 8.2, in turn, requires\
    \ Java Platform (JDK) 8. You will get a “`No compatible JDK was found`” warning\
    \ message if Java Platform (JDK) 8 is not installed on your machine.\n\n#####\
    \ Solution\n\nYou will have to exit the wizard and install Java Platform (JDK)\
    \ 8 after downloading it from the following location:\n\n[`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\n\
    \n#### Unable to See GlassFish Server’s Test Page\n\nYou are unable to see the\
    \ GlassFish server’s test page as shown in Figure [1-13](#A311833_3_En_1_Chapter.html#Fig13)\
    \ after installing the NetBeans IDE and its integrated GlassFish application server.\n\
    \n##### Diagnosis\n\nYou may not able to see the test page because of the following\
    \ reasons:\n\n*   GlassFish server is not running.\n*   Browser is unable to resolve\
    \ the server’s hostname.\n*   Incorrect port number is mentioned in the URL.\n\
    \n##### Solution\n\n*   Start/restart the GlassFish server using the context menu\
    \ as shown in Figure [1-12](#A311833_3_En_1_Chapter.html#Fig12).\n*   Verify that\
    \ the machine name or the IP address that is used in the URL is correct. You can\
    \ find your machine’s IP address by executing the `ipconfig` command on your Windows\
    \ machine’s command prompt. If you are using `localhost`, then verify that the\
    \ browser is able to resolve it by looping it back to your machine’s IP address.\n\
    *   Verify that the port number used in the URL is correct. This solution is explained\
    \ in a section that follows.\n\n#### Unable to Resolve “localhost” Hostname\n\n\
    Your browser or the NetBeans IDE’s tester is able to run the GlassFish server’s\
    \ test page using the machine name or the IP address but is unable to resolve\
    \ the `localhost` hostname.\n\n##### Diagnosis\n\nThe NetBeans IDE’s tester or\
    \ the browser is unable to loopback to your machine using `localhost`.\n\n#####\
    \ Solution\n\nUpdate the `C:\\Windows\\System32\\drivers\\etc\\hosts` file of\
    \ your Windows machine to add an entry that maps the IP address of your machine\
    \ to `localhost`.\n\n```\n# localhost name resolution is handled within DNS itself.\n\
    # 127.0.0.1          localhost\n# ::1                localhost\n    localhost\n\
    ```\n\n#### Browser is Unable to Connect to “8080” Port\n\nThe host name part\
    \ of your URL is correct, but your browser is unable to connect to the GlassFish\
    \ application server at port 8080."
  raw: "#### Testing Using Sample Project\n\nOnce the NetBeans IDE has opened, we\
    \ will create a sample project to test the compilation, deployment, and execution\
    \ aspects of the IDE as well as the application server.\n\nTo create a new project,\
    \ open the `New Project` wizard by pressing `Ctrl-Shift-N`. Select the `Java Web`\
    \ category and the `Web Application` project, as shown in Figure [1-7](#A311833_3_En_1_Chapter.html#Fig7).\
    \ Traverse the wizard, keeping all of the default values selected, and `Finish`\
    \ the wizard.\n\n![A311833_3_En_1_Fig7_HTML.jpg](A311833_3_En_1_Fig7_HTML.jpg)\n\
    \nFigure 1-7\n\nCreating a sample test project\n\nCreate a project named `WebApplication1`.\
    \ Next we will create a servlet under the project `WebApplication1`. To create\
    \ a servlet, invoke the context menu by right-clicking on the project name in\
    \ the project navigator. Select the `Servlet ...` menu that is available under\
    \ `New`, as shown in Figure [1-8](#A311833_3_En_1_Chapter.html#Fig8).\n\n![A311833_3_En_1_Fig8_HTML.jpg](A311833_3_En_1_Fig8_HTML.jpg)\n\
    \nFigure 1-8\n\nCreating a test servlet\n\nIn the `New Servlet` wizard, enter\
    \ a package name and `Finish` the wizard keeping the other default values, as\
    \ shown in Figure [1-9](#A311833_3_En_1_Chapter.html#Fig9). We have used `setup`\
    \ as the package name.\n\n![A311833_3_En_1_Fig9_HTML.jpg](A311833_3_En_1_Fig9_HTML.jpg)\n\
    \nFigure 1-9\n\nTraversing the New Servlet wizard\n\nAfter the `NewServlet` class\
    \ is created, we can instantly run it by invoking the context menu on the servlet\
    \ file and selecting the `Run File` menu option, as shown in Figure [1-10](#A311833_3_En_1_Chapter.html#Fig10).\n\
    \n![A311833_3_En_1_Fig10_HTML.jpg](A311833_3_En_1_Fig10_HTML.jpg)\n\nFigure 1-10\n\
    \nRunning the servlet\n\nWhen we run the servlet, NetBeans will automatically\
    \ start the integrated GlassFish server.\n\nAs part of running the servlet, NetBeans\
    \ will compile, package, and deploy it to the integrated GlassFish server. After\
    \ the deployment, NetBeans will automatically open the servlet URL in the default\
    \ browser, as shown in Figure [1-11](#A311833_3_En_1_Chapter.html#Fig11).\n\n\
    ![A311833_3_En_1_Fig11_HTML.jpg](A311833_3_En_1_Fig11_HTML.jpg)\n\nFigure 1-11\n\
    \nRunning the servlet class\n\nSuccessful execution of the servlet class means\
    \ that the installation of NetBeans and the integrated GlassFish server have gone\
    \ through successfully, and the setup to run the examples presented in this book\
    \ is ready.\n\nNote\n\nBy no means is this section of the chapter a user guide\
    \ for the GlassFish application server. For more information on GlassFish, see\
    \ [`https://javaee.github.io/glassfish/`](https://javaee.github.io/glassfish/)\n\
    \n### Administrating the GlassFish Application Server\n\nNetBeans provides us\
    \ with a graphical interface to perform various GlassFish server-related administrative\
    \ tasks. You can restart, start, and stop the GlassFish server from the `Services`\
    \ tab, as shown in Figure [1-12](#A311833_3_En_1_Chapter.html#Fig12).\n\n![A311833_3_En_1_Fig12_HTML.jpg](A311833_3_En_1_Fig12_HTML.jpg)\n\
    \nFigure 1-12\n\nAdministrating the Glassfish application server\n\nOnce GlassFish\
    \ has successfully started, you can test whether the server is able to accept\
    \ the basic HTTP requests. To do so, open a browser, type in the URL `http://localhost:8080/`\
    \ and, if the server is up and running, you will be able to see the page shown\
    \ in Figure [1-13](#A311833_3_En_1_Chapter.html#Fig13).\n\n![A311833_3_En_1_Fig13_HTML.jpg](A311833_3_En_1_Fig13_HTML.jpg)\n\
    \nFigure 1-13\n\nTesting GlassFish server Note\n\nSubstitute `localhost` with\
    \ the machine name or IP address if you are trying to access it from a machine\
    \ other than the one on which GlassFish is installed. If you changed the port\
    \ number during installation, use that port instead of 8080.\n\nThe next step\
    \ is to test the access to the administration console of the GlassFish server.\
    \ Make sure that the GlassFish server is up and running, and then select the `View\
    \ Domain Admin Console` menu option from the context menu, as shown in Figure\
    \ [1-12](#A311833_3_En_1_Chapter.html#Fig12). NetBeans will launch the default\
    \ browser and open the administrator console. Alternatively, you can type in the\
    \ URL `http://localhost:4848/`, and you will be able to see the administration\
    \ console page, as shown in Figure [1-14](#A311833_3_En_1_Chapter.html#Fig14).\n\
    \n![A311833_3_En_1_Fig14_HTML.jpg](A311833_3_En_1_Fig14_HTML.jpg)\n\nFigure 1-14\n\
    \nThe GlassFish administration console Note\n\nSubstitute `localhost` with the\
    \ machine name or IP address if you are trying to gain access from a machine other\
    \ than the one on which GlassFish is installed. You will have to enter the username\
    \ and password on the administration console login page. If you changed the port\
    \ number during installation, use that port instead of 4848.\n\n### Troubleshooting\n\
    \nEven after precisely following the steps mentioned in this chapter and taking\
    \ the utmost care while installing and configuring the NetBeans IDE along with\
    \ its integrated GlassFish application server, you may face problems while running\
    \ the sample code that accompanies this book. This section will try to highlight\
    \ issues that you may come across and provides information on how to mitigate\
    \ them.\n\n#### “No Compatible JDK was found” Warning During Installation\n\n\
    You get a “`No compatible JDK was found`” warning message on the first page of\
    \ the NetBeans installer wizard.\n\n##### Diagnosis\n\nSamples in this book require\
    \ NetBeans version 8.2 since we utilize Java EE 8\\. NetBeans 8.2, in turn, requires\
    \ Java Platform (JDK) 8\\. You will get a “`No compatible JDK was found`” warning\
    \ message if Java Platform (JDK) 8 is not installed on your machine.\n\n#####\
    \ Solution\n\nYou will have to exit the wizard and install Java Platform (JDK)\
    \ 8 after downloading it from the following location:\n\n[`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\n\
    \n#### Unable to See GlassFish Server’s Test Page\n\nYou are unable to see the\
    \ GlassFish server’s test page as shown in Figure [1-13](#A311833_3_En_1_Chapter.html#Fig13)\
    \ after installing the NetBeans IDE and its integrated GlassFish application server.\n\
    \n##### Diagnosis\n\nYou may not able to see the test page because of the following\
    \ reasons:\n\n*   GlassFish server is not running.\n*   Browser is unable to resolve\
    \ the server’s hostname.\n*   Incorrect port number is mentioned in the URL.\n\
    \n##### Solution\n\n*   Start/restart the GlassFish server using the context menu\
    \ as shown in Figure [1-12](#A311833_3_En_1_Chapter.html#Fig12).\n*   Verify that\
    \ the machine name or the IP address that is used in the URL is correct. You can\
    \ find your machine’s IP address by executing the `ipconfig` command on your Windows\
    \ machine’s command prompt. If you are using `localhost` , then verify that the\
    \ browser is able to resolve it by looping it back to your machine’s IP address.\n\
    *   Verify that the port number used in the URL is correct. This solution is explained\
    \ in a section that follows.\n\n#### Unable to Resolve “localhost” Hostname\n\n\
    Your browser or the NetBeans IDE’s tester is able to run the GlassFish server’s\
    \ test page using the machine name or the IP address but is unable to resolve\
    \ the `localhost` hostname.\n\n##### Diagnosis\n\nThe NetBeans IDE’s tester or\
    \ the browser is unable to loopback to your machine using `localhost`.\n\n#####\
    \ Solution\n\nUpdate the `C:\\Windows\\System32\\drivers\\etc\\hosts` file of\
    \ your Windows machine to add an entry that maps the IP address of your machine\
    \ to `localhost`.\n\n```\n# localhost name resolution is handled within DNS itself.\n\
    # 127.0.0.1          localhost\n# ::1                localhost\n    localhost\n\
    ```\n\n#### Browser is Unable to Connect to “8080” Port\n\nThe host name part\
    \ of your URL is correct, but your browser is unable to connect to the GlassFish\
    \ application server at port 8080."
  trans: "\n#### 使用示例项目进行测试\n\n打开 NetBeans IDE 后，我们将创建一个示例项目，以测试 IDE 及应用服务器的编译、部署和执行功能。\n\
    \n要创建新项目，请按 `Ctrl-Shift-N` 打开 `新建项目` 向导。选择 `Java Web` 类别和 `Web 应用程序` 项目，如图 1-7\
    \ 所示。浏览向导，保持所有默认值不变，然后点击 `完成` 结束向导。\n\n![A311833_3_En_1_Fig7_HTML.jpg](img/A311833_3_En_1_Fig7_HTML.jpg)\n\
    \n图 1-7\n\n创建示例测试项目\n\n创建一个名为 `WebApplication1` 的项目。接下来，我们将在 `WebApplication1`\
    \ 项目下创建一个 Servlet。要创建 Servlet，请在项目导航器中右键单击项目名称以调用上下文菜单。选择 `新建` 下的 `Servlet ...`\
    \ 菜单，如图 1-8 所示。\n\n![A311833_3_En_1_Fig8_HTML.jpg](img/A311833_3_En_1_Fig8_HTML.jpg)\n\
    \n图 1-8\n\n创建测试 Servlet\n\n在 `新建 Servlet` 向导中，输入包名并保持其他默认值不变，然后点击 `完成` 结束向导，如图\
    \ 1-9 所示。我们使用了 `setup` 作为包名。\n\n![A311833_3_En_1_Fig9_HTML.jpg](img/A311833_3_En_1_Fig9_HTML.jpg)\n\
    \n图 1-9\n\n浏览新建 Servlet 向导\n\n创建 `NewServlet` 类后，我们可以通过调用 Servlet 文件上的上下文菜单并选择\
    \ `运行文件` 菜单选项来立即运行它，如图 1-10 所示。\n\n![A311833_3_En_1_Fig10_HTML.jpg](img/A311833_3_En_1_Fig10_HTML.jpg)\n\
    \n图 1-10\n\n运行 Servlet\n\n当我们运行 Servlet 时，NetBeans 将自动启动集成的 GlassFish 服务器。\n\n\
    作为运行 Servlet 的一部分，NetBeans 将编译、打包并将其部署到集成的 GlassFish 服务器。部署后，NetBeans 将自动在默认浏览器中打开\
    \ Servlet URL，如图 1-11 所示。\n\n![A311833_3_En_1_Fig11_HTML.jpg](img/A311833_3_En_1_Fig11_HTML.jpg)\n\
    \n图 1-11\n\n运行 Servlet 类\n\nServlet 类成功执行意味着 NetBeans 和集成的 GlassFish 服务器已成功安装，并且运行本书中示例的设置已准备就绪。\n\
    \n注意\n\n本章的这一部分绝不是 GlassFish 应用服务器的用户指南。有关 GlassFish 的更多信息，请参阅 [`https://javaee.github.io/glassfish/`](https://javaee.github.io/glassfish/)\n\
    \n### 管理 GlassFish 应用服务器\n\nNetBeans 为我们提供了一个图形界面来执行各种与 GlassFish 服务器相关的管理任务。您可以从\
    \ `服务` 选项卡中重启、启动和停止 GlassFish 服务器，如图 1-12 所示。\n\n![A311833_3_En_1_Fig12_HTML.jpg](img/A311833_3_En_1_Fig12_HTML.jpg)\n\
    \n图 1-12\n\n管理 GlassFish 应用服务器\n\n一旦 GlassFish 成功启动，您可以测试服务器是否能够接受基本的 HTTP 请求。为此，请打开浏览器，输入\
    \ URL `http://localhost:8080/`，如果服务器正在运行，您将能够看到如图 1-13 所示的页面。\n\n![A311833_3_En_1_Fig13_HTML.jpg](img/A311833_3_En_1_Fig13_HTML.jpg)\n\
    \n图 1-13\n\n测试 GlassFish 服务器 注意\n\n如果您尝试从非安装 GlassFish 的机器访问，请将 `localhost` 替换为机器名或\
    \ IP 地址。如果您在安装期间更改了端口号，请使用该端口而不是 8080。\n\n下一步是测试对 GlassFish 服务器管理控制台的访问。确保 GlassFish\
    \ 服务器已启动并正在运行，然后从上下文菜单中选择 `查看域管理控制台` 菜单选项，如图 1-12 所示。NetBeans 将启动默认浏览器并打开管理控制台。或者，您可以输入\
    \ URL `http://localhost:4848/`，您将能够看到管理控制台页面，如图 1-14 所示。\n\n![A311833_3_En_1_Fig14_HTML.jpg](img/A311833_3_En_1_Fig14_HTML.jpg)\n\
    \n图 1-14\n\nGlassFish 管理控制台 注意\n\n如果您尝试从非安装 GlassFish 的机器访问，请将 `localhost` 替换为机器名或\
    \ IP 地址。您需要在管理控制台登录页面输入用户名和密码。如果您在安装期间更改了端口号，请使用该端口而不是 4848。\n\n### 故障排除\n\n即使精确遵循本章中提到的步骤，并在安装和配置\
    \ NetBeans IDE 及其集成的 GlassFish 应用服务器时格外小心，您在运行本书附带的示例代码时仍可能遇到问题。本节将尝试强调您可能遇到的问题，并提供有关如何缓解这些问题的信息。\n\
    \n#### 安装期间出现“未找到兼容的 JDK”警告\n\n您在 NetBeans 安装程序向导的第一页收到“`未找到兼容的 JDK`”警告消息。\n\n\
    ##### 诊断\n\n本书中的示例需要 NetBeans 版本 8.2，因为我们使用了 Java EE 8。而 NetBeans 8.2 需要 Java\
    \ 平台 (JDK) 8。如果您的机器上未安装 Java 平台 (JDK) 8，您将收到“`未找到兼容的 JDK`”警告消息。\n\n##### 解决方案\n\
    \n您必须退出向导，并从以下位置下载并安装 Java 平台 (JDK) 8：\n\n[`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\n\
    \n#### 无法看到 GlassFish 服务器的测试页面\n\n安装 NetBeans IDE 及其集成的 GlassFish 应用服务器后，您无法看到如图\
    \ 1-13 所示的 GlassFish 服务器测试页面。\n\n##### 诊断\n\n您可能由于以下原因无法看到测试页面：\n\n*   GlassFish\
    \ 服务器未运行。\n*   浏览器无法解析服务器的主机名。\n*   URL 中提到了错误的端口号。\n\n##### 解决方案\n\n*   使用上下文菜单启动/重启\
    \ GlassFish 服务器，如图 1-12 所示。\n*   验证 URL 中使用的机器名或 IP 地址是否正确。您可以通过在 Windows 机器的命令提示符下执行\
    \ `ipconfig` 命令来找到您机器的 IP 地址。如果您使用的是 `localhost`，请验证浏览器是否能够通过将其回环到您机器的 IP 地址来解析它。\n\
    *   验证 URL 中使用的端口号是否正确。此解决方案将在后续章节中说明。\n\n#### 无法解析“localhost”主机名\n\n您的浏览器或 NetBeans\
    \ IDE 的测试器能够使用机器名或 IP 地址运行 GlassFish 服务器的测试页面，但无法解析 `localhost` 主机名。\n\n#####\
    \ 诊断\n\nNetBeans IDE 的测试器或浏览器无法使用 `localhost` 回环到您的机器。\n\n##### 解决方案\n\n更新 Windows\
    \ 机器的 `C:\\Windows\\System32\\drivers\\etc\\hosts` 文件，添加一个将您机器的 IP 地址映射到 `localhost`\
    \ 的条目。\n\n```\n# localhost 名称解析由 DNS 本身处理。\n# 127.0.0.1          localhost\n#\
    \ ::1                localhost\n    localhost\n```\n\n#### 浏览器无法连接到“8080”端口\n\n\
    您 URL 的主机名部分是正确的，但您的浏览器无法连接到端口 8080 上的 GlassFish 应用服务器。\n"
- fmt: '### Diagnosis


    Your browser will be unable to use the `8080` port number for the GlassFish application
    server if it is used by another application. During installation the configuration
    tool will first try to assign the `8080` port to the GlassFish application server,
    but if it detects that the `8080` port number is unavailable, then it will assign
    a different port number to it.


    ### Solution


    You can find the port at which GlassFish application server is running with the
    following steps:


    - Navigate to the `Services` tab of the NetBeans IDE and invoke the context menu
    on the GlassFish server node as shown in Figure [1-12](#A311833_3_En_1_Chapter.html#Fig12).

    - Select the `Properties` menu option to open the `Servers` dialog.

    - Select the GlassFish server instance in the left panel.

    - The `Location` text field, under the `Common` tab, will show the port number
    at which the GlassFish application server is running.


    ## Errors While Compiling or Executing Sample Application Projects


    You get compilation errors after opening the sample application project, or the
    sample application project does not execute as expected.


    ### Diagnosis


    The samples provided as part of this book are tested with NetBeans version 8.2
    and Java Platform (JDK) 8.


    You might get the “`javac: invalid target release: 1.8`” error while compiling
    the sample application projects provided with this book if the NetBeans IDE is
    not configured to use Java Platform (JDK) 8.


    The sample application code contains hard-coded port numbers corresponding to
    the NetBeans installation on which they were created. The sample will not execute
    as expected if the port number hard-coded in the sample code is different from
    your NetBeans installation.


    ### Solution


    To resolve the “`javac: invalid target release: 1.8`” error, you have to verify
    that NetBeans is using Java Platform (JDK) 8. You may have to install it from
    the URL mentioned in the earlier sections.


    If the sample application is not working as expected, then verify that the port
    numbers used by the sample code are same as that of your NetBeans installation.


    You can consult the `Readme.txt` file provided with each sample application for
    additional information.


    ## Unable to Send or Receive the “wine order” Mail


    You are unable to send or receive the “wine order” mail while executing the sample
    application project.


    ### Diagnosis


    Few sample projects send out a mail as part of their execution. You may have trouble
    sending the mail and may not receive it because of the following reasons:


    - You have not updated the `from` and `to` e-mail addresses in the sample code.

    - You are running the sample on a machine that is behind a firewall.

    - `JMS Resource` configuration is incorrect.

    - `JavaMail Session` configuration is incorrect.


    ### Solution


    Before you execute the sample application project that sends out a mail, verify
    that:


    - You have created and configured the `JMS Resource` as shown in Chapter [5](#A311833_3_En_5_Chapter.html).

    - You have created and configured the `JavaMail Session` as shown in Chapter [5](#A311833_3_En_5_Chapter.html).

    - You have updated the `from` and `to` e-mail addresses in the sample’s source
    code.

    - You are not behind a firewall.


    You can consult the `Readme.txt` file provided with the sample application of
    Chapter [5](#A311833_3_En_5_Chapter.html) for information on how to configure
    `JavaMail Session` properties for popular mail services.


    Even after verifying these details, if you are facing problems in sending or receiving
    the mail, then check the GlassFish server log for any more details on the issue.


    ## Summary


    This chapter opened with an introduction to this book and EJB. This orientation
    covered essential information about the core features of EJB, the EJB framework,
    and the component model. It included a brief overview of the history of EJB, the
    EJB 3 simplified development model, and the EJB distributed computing model.


    In the “How This Book Is Organized” section, we provided a summary of each chapter
    to illustrate the general flow of the book, and to help you decide which areas
    to focus on first, should you wish to read the chapters out of sequence.


    The chapter concluded with a “Getting Started” section to help you install and
    configure the NetBeans IDE and its integrated GlassFish application server, which
    has the reference implementation of the latest Java EE specifications; and to
    verify that the installation was successful. Having completed this task, you now
    have the required software infrastructure to run the code samples in this book
    and to examine the many features of EJB throughout the subsequent chapters. In
    the next chapter we will discuss in detail the EJB session beans.


    # 2. EJB Session Beans


    This chapter will discuss EJB session beans, the core business service objects
    used by EJB client applications. You’ll gain an understanding of the simplified
    EJB session bean model with insights into the following topics:


    - Types of session beans—stateful, stateless, and singleton—and when to use each
    one

    - The bean class, business interfaces, and business methods

    - Asynchronous methods

    - Callback methods

    - Interceptors

    - Exception handling

    - Client view

    - Dependency injection with annotations related to session beans

    - Timer service


    ## Introduction to Session Beans


    Session beans are the most important part of EJB technology because they model
    the business process of the Java Application and encapsulate a business logic
    for each process.


    Session beans are Java components that run either in stand-alone EJB containers
    or in EJB containers that are part of standard Java Platform, Enterprise Edition
    (Java EE) application servers. These Java components are typically used to model
    a particular user task or use case, such as entering customer information or implementing
    a process that maintains a conversation state with a client application. Session
    beans can hold the business logic for many types of applications, such as human
    resources, order entry, and expense reporting applications. The EJB container
    provides services to the session bean, and the bean indicates which services it
    needs using Java annotations and/or XML metadata.


    The container will manage the enterprise session beans and provide them with a
    number of services including security, transaction, thread-safety, etc.


    ### Types of Session Beans


    Session beans are of three types:


    - **Stateless**: This type of bean does not maintain any conversational state
    on behalf of a client application.

    - **Stateful**: This type of bean maintains a state, and a particular instance
    of the bean is associated with a specific client request. Stateful beans can be
    seen as extensions to client programs, which are running on the server.

    - **Singleton**: This type of bean is instantiated only once per application.
    Singleton beans live for the full duration of the application and maintain their
    state between client invocations.


    We will drill down into more specifics of stateless, stateful, and singleton beans
    in the following sections.'
