- fmt: "### Creating a Purchase Order\n\nListing [7-11](#A311833_3_En_7_Chapter.html#Par58)\
    \ shows the `processOrder()` method in `OrderProcessFacadeBean`. `ShoppingCartBean`\
    \ calls this business method when an order is submitted by the client application.\
    \ This method has one parameter, which is of `Customer` entity type. The customer’s\
    \ shopping cart is contained in its `cartItems` list, each member of which references\
    \ a wine and a quantity added to the cart by the customer while shopping.\n\n\
    To start with, the method checks whether the received entity is managed. If not,\
    \ a call to the `merge()` method of the `EntityManager` is made to retrieve a\
    \ managed `Customer` object.\n\n> **Note**  \n> It is worth noting that when we\
    \ run this application (following the steps at the end of this chapter), the customer\
    \ parameter will be found in the persistence context, and so the merge step will\
    \ not be performed. This is because `processOrder()` is called from an existing\
    \ transactional context—the transaction that was created when its calling method,\
    \ `ShoppingCartBean.sendOrderToOPC()` was invoked. A single persistence context\
    \ is always bound to a given transaction, and in this case the extended persistence\
    \ context from `ShoppingCartBean` is the one associated with this transaction.\
    \ When `sendOrderToOPC()` is invoked, an existing context transaction is found\
    \ and used. When `em.contains(customer)` is called inside `processOrder`, the\
    \ `EntityManager` for `OrderProcessFacadeBean` observes that a persistence context\
    \ is already associated with this transaction, and it uses this persistence context,\
    \ which is the same extended persistence context associated with `ShoppingCartBean`.\
    \ This is why the customer instance is already determined to be managed.\n\nOnce\
    \ the managed customer entity is obtained, it checks whether the customer is an\
    \ `Individual` or a `Distributor`. For individuals, a call to the `performCreditCheck()`\
    \ method is made to verify the credit card. If the credit card is found to be\
    \ invalid, the message “Invalid Credit Card” is sent back to the client application\
    \ via `ShoppingCartBean`. For distributors, the `memberStatus` property is checked,\
    \ and any value other than “APPROVED” is rejected.\n\nIf the customer is approved,\
    \ then processing continues, and a new order of type `CustomerOrder` is created.\
    \ This new order is populated with the collection of `CartItem` objects associated\
    \ with the `Customer` and found in its `cartItems` property. For each cart item,\
    \ an `OrderItem` object is created to capture the quantity of each wine and the\
    \ total price for the wine in that cart item. The price for each order item is\
    \ calculated using the available retail price information for each `Wine` entity.\n\
    \nOnce all the cart items have been processed and corresponding order items have\
    \ been created, the new `CustomerOrder` containing the order items is persisted,\
    \ in part to acquire a generated value for its `id` field, which is used when\
    \ generating an e-mail from within the call `sendPOtoMDB()`. The `removeCartItem()`\
    \ method is then called on each cart item to remove it from the `Customer`.\n\n\
    The non-entity utility class `PurchaseOrder`, which associates a `Customer` object\
    \ with a specific `CustomerOrder`, is created. This `PurchaseOrder` instance is\
    \ passed as an argument to the `sendPOtoMDB()` method, sending the purchase order\
    \ to the processing service. Once the call is made, the process becomes asynchronous,\
    \ and a message is sent back to the client application that the order has been\
    \ sent for processing.\n\nSince the entire method is executed in a transactional\
    \ context, changes to the customer object, and any other managed objects, will\
    \ be persisted when the transaction concludes.\n\n```java\npublic String processOrder(Customer\
    \ customer) {\n    String processStatus = null;\n    if (!em.contains(customer))\
    \ {\n        customer = em.merge(customer);\n    }\n    if (customer instanceof\
    \ Individual) {\n        if (!performCreditCheck((Individual) customer)) {\n \
    \           processStatus = \"Invalid Credit Card number or credit check failed\"\
    ;\n        }\n    } else if (customer instanceof Distributor) {\n        if (!\"\
    APPROVED\".equals(((Distributor) customer).getMemberStatus())) {\n           \
    \ processStatus = \"Distributor credit check rejected\";\n        }\n    }\n \
    \   if (processStatus == null) {\n        CustomerOrder order = new CustomerOrder();\n\
    \        order.setCreationDate(new Timestamp(System.currentTimeMillis()));\n \
    \       em.persist(order);\n        List cartItems = customer.getCartItemList();\n\
    \        if (cartItems != null) {\n            List tempCartItems = new ArrayList();\n\
    \            for (CartItem cItem : cartItems) {\n                OrderItem oItem\
    \ = new OrderItem();\n                int qty = cItem.getQuantity();\n       \
    \         oItem.setQuantity(qty);\n                oItem.setOrderDate(new Timestamp(System.currentTimeMillis()));\n\
    \                oItem.setWine(cItem.getWine());\n                Wine tempWine\
    \ = cItem.getWine();\n                Float d = tempWine.getRetailPrice();\n \
    \               Float price = d * cItem.getQuantity();\n                oItem.setPrice(price);\n\
    \                order.addOrderItem(oItem);\n                tempCartItems.add(cItem);\n\
    \            }\n            for (CartItem cartItem : tempCartItems) {\n      \
    \          customer.removeCartItem(cartItem);\n                em.remove(cartItem);\n\
    \            }\n        }\n        customer.addCustomerOrder(order);\n       \
    \ PurchaseOrder po = new PurchaseOrder();\n        po.setCustomer(customer);\n\
    \        po.setCustomerOrder(order);\n        sendPOtoMDB(po);\n        processStatus\
    \ = \"Purchase Order sent for processing to the process queue\";\n    }\n    return\
    \ processStatus;\n}\n```\n*Listing 7-11 — The `processOrder` Business Method*\n\
    \n### Sending a Purchase Order to the Order Processing Service\n\nListing [7-12](#A311833_3_En_7_Chapter.html#Par60)\
    \ shows the `sendPOtoMDB()` method in `OrderProcessFacadeBean`. This business\
    \ method makes use of injected Java Messaging Service (JMS) resources for a topic\
    \ connection factory and a topic. A connection to a topic connection factory is\
    \ created and the connection is started. Once a connection is available, a session\
    \ is created and a `MessageProducer` is created with a topic. An `ObjectMessage`\
    \ is created to take the `PurchaseOrder` object, and the `MessageProducer` is\
    \ used to send the `PurchaseOrder` to the topic.\n\n```java\nprivate void sendPOtoMDB(PurchaseOrder\
    \ po) {\n    //send PO to MDB now\n    Connection connection = null;\n    Session\
    \ session = null;\n    try {\n        connection = poTopicCF.createConnection();\n\
    \        connection.start();\n        session = connection.createSession(false,\
    \ Session.AUTO_ACKNOWLEDGE);\n        MessageProducer producer = session.createProducer(poTopic);\n\
    \        ObjectMessage objMessage = session.createObjectMessage();\n        objMessage.setObject(po);\n\
    \        producer.send(objMessage);\n    } catch (JMSException e) {\n        e.printStackTrace();\n\
    \    } finally {\n        if (session != null) {\n            try {\n        \
    \        session.close();\n            } catch (JMSException ex) {\n         \
    \       Logger.getLogger(OrderProcessFacadeBean.class.getName()).log(Level.SEVERE,\
    \ null, ex);\n            }\n        }\n        if (connection != null) {\n  \
