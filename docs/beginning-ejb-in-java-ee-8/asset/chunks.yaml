  trans: '

    ### 生命周期回调方法


    单例生命周期的流程是：我们首先创建单例会话 Bean 实例，然后将其注入容器；之后，该实例会被放入一个名为“method-ready”的受管池中，等待处理请求。


    单例会话 Bean 支持构造和销毁时的回调事件。以下是映射到上述事件的回调方法：


    *   `PostConstruct`：使用 `@PostConstruct` 注解标记

    *   `PreDestroy`：使用 `@PreDestroy` 注解标记。


    `PostConstruct` 回调发生在 Bean 实例在 EJB 容器中被实例化之后。如果 Bean 使用任何依赖注入机制来获取其环境中资源或其他对象的引用，则
    `PostConstruct` 事件会在注入执行之后、Bean 类中的第一个业务方法被调用之前发生。


    `PreDestroy` 回调发生在应用程序关闭期间。容器会考虑单例会话 Bean 之间的 `DependsOn` 关系，并按照与创建顺序相反的顺序移除它们。对于
    `ShopperCount` 示例，`LogShopperCount` Bean 将在 `ShopperCount` Bean 之前被移除。


    清单 2-20 展示了带有 `@PostConstruct` 注解的 `applicationStartup()` 方法的代码。该方法在启动时重置 `shopperCounter`。清单
    2-20 还展示了带有 `@PreDestroy` 注解的 `applicationShutdown()` 方法的代码。该方法在应用程序关闭时打印一条消息。


    ```

    package com.apress.ejb.chapter02;

    import javax.annotation.PostConstruct;

    import javax.annotation.PreDestroy;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    @Singleton(name = "ShopperCount")

    @Startup

    public class ShopperCountBean {

    private int shopperCounter;

    // 增加购物者计数器

    public void incrementShopperCount() {

    shopperCounter++;

    }

    // 返回购物者数量

    public int getShopperCount() {

    return shopperCounter;

    }

    // 重置计数器

    public void resetCounter() {

    shopperCounter = 0;

    }

    // 重置计数器

    @PostConstruct

    public void applicationStartup() {

    System.out.println("来自 applicationStartup 方法。");

    resetCounter();

    }

    @PreDestroy

    public void applicationShutdown() {

    System.out.println("来自 applicationShutdown 方法。");

    }

    }

    清单 2-20

    ShopperCountBean.java

    ```


    与无状态会话 Bean 类似，单例会话 Bean 永远不会被钝化，因此不应使用 `@PrePassivate` 和 `@PostActivate` 注解来装饰单例会话
    Bean 的方法。


    ### 并发管理


    单例会话 Bean 在每个应用程序中仅实例化一次，因此它被设计为支持并发访问。并发访问意味着多个客户端可以同时访问同一个单例会话 Bean 实例。并发访问的管理对客户端是透明的。客户端只需要一个对单例会话
    Bean 的引用，而无需关心其他客户端是否也在访问同一个单例会话 Bean 实例。


    并发管理有两种方式：


    *   **容器管理并发**：容器控制并发访问，并通过提供一组固定的选项来实现对状态同步行为的细粒度控制。这是默认的并发管理类型。

    *   **Bean 管理并发**：容器允许对并发 Bean 实例进行完全访问，用户负责状态同步。


    并发类型（容器管理或 Bean 管理）由在单例会话 Bean 类上指定的 `javax.ejb.ConcurrencyManagement` 注解指定。对于容器管理并发，`@ConcurrencyManagement`
    的 `type` 属性设置为 `javax.ejb.ConcurrencyManagementType.CONTAINER`；对于 Bean 管理并发，`@ConcurrencyManagement`
    的 `type` 属性设置为 `javax.ejb.ConcurrencyManagementType.BEAN`。


    #### 容器管理并发


    对于使用容器管理并发的单例会话 Bean，容器通过将每个业务方法与共享的 `Read` 锁或独占的 `Write` 锁关联来管理并发。使用 `@Lock`
    注解指定 `Read` 或 `Write` 锁。


    清单 2-21 通过在 `getShopperCount` 方法上使用 `Read` 锁，在 `incrementShopperCount` 方法上使用 `Write`
    锁，演示了容器管理并发。通过此更改，多个客户端可以并发获取 `shopperCounter` 的值，但是当一个客户端正在访问 `incrementShopperCount`
    时，所有其他客户端对该方法的访问将被阻塞。


    ```

    package com.apress.ejb.chapter02;

    import javax.annotation.PostConstruct;

    import javax.annotation.PreDestroy;

    import javax.ejb.ConcurrencyManagement;

    import javax.ejb.ConcurrencyManagementType;

    import javax.ejb.Lock;

    import javax.ejb.LockType;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    @Singleton(name = "ShopperCount")

    @Startup

    @ConcurrencyManagement(ConcurrencyManagementType.CONTAINER)

    public class ShopperCountBean {

    private int shopperCounter;

    // 增加购物者计数器

    @Lock(LockType.WRITE)

    public void incrementShopperCount() {

    shopperCounter++;

    }

    // 返回购物者数量

    @Lock(LockType.READ)

    public int getShopperCount() {

    return shopperCounter;

    }

    // 重置计数器

    public void resetCounter() {

    shopperCounter = 0;

    }

    // 重置计数器

    @PostConstruct

    public void applicationStartup() {

    resetCounter();

    }

    @PreDestroy

    public void applicationShutdown() {

    System.out.println("来自 applicationShutdown 方法。");

    }

    }

    清单 2-21

    ShopperCountBean.java

    ```


    对于单例会话 Bean，类级别的 `@Lock` 注解指定所有业务方法将使用指定的锁类型，除非在方法级别显式设置了不同的类型。当单例会话 Bean 类上没有显式存在
    `@Lock` 注解时，默认锁类型 `@Lock(LockType.WRITE)` 将应用于所有业务方法。


    #### Bean 管理并发


    在 Bean 管理并发的情况下，容器允许对单例会话 Bean 实例进行完全并发访问，Bean 开发者必须保护 Bean 的内部状态，防止因并发访问导致的同步错误。为此，您可以使用诸如
    `synchronized` 和 `volatile` 之类的同步原语。


    ### 错误处理


    单例会话 Bean 在初始化期间可能会发生错误。这些错误是致命的，因此必须丢弃该单例会话 Bean 实例。尝试调用初始化失败的单例会话 Bean 实例将导致抛出
    `javax.ejb.NoSuchEJBException`。一旦单例会话 Bean 成功实例化，即使业务方法或回调抛出异常，它也不会被销毁。

