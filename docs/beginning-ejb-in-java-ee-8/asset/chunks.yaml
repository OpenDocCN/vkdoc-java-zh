    #### 测试脚本


    在清单 9-2 中，我们展示了当使用连接表继承方案录制会话时，HTTP 代理生成的 Jython 程序的核心部分。以粗体显示的思考时间语句，通常表示录制测试脚本时从一个请求到下一个请求所花费的时间（以毫秒为单位）。如前所述，我们将原始值替换为零，但您也可以直接删除该行（参见清单
    9-2）。


    ```

    def __call__(self):

    """Called for every run performed by the worker thread."""

    self.page1()      # GET WineStoreJoined.jsp (request 101)

    grinder.sleep(0)

    self.page2()      # POST WineStoreJoined.jsp (request 201)

    grinder.sleep(0)

    self.page3()      # POST WineStoreJoined.jsp (request 301)

    grinder.sleep(0)

    self.page4()      # POST WineStoreJoined.jsp (request 401)

    Listing 9-2

    Main Section of the Test Script

    ```


    作为页面方法的一个示例，我们在清单 9-3 中展示了页面 1（测试脚本的第一个请求）的方法，以及第一个页面方法之前的一些定义。


    ```

    url0 = ''http://glassfish:8080''

    request101 = createRequest(Test(101, ''GET WineStoreJoined.jsp''), url0)

    class TestRunner:

    """A TestRunner instance is created for each worker thread."""

    # A method for each recorded page.

    def page1(self):

    """GET WineStoreJoined.jsp (request 101)."""

    result = request101.GET(''/Chapter09-PerformanceJoined-war/faces/WineStoreJoined.jsp'')

    self.token_j_id_id17 = \

    httpUtilities.valueFromHiddenInput(''j_id_id17'') # ''j_id_id17''

    self.token_javaxfacesViewState = \

    httpUtilities.valueFromHiddenInput(''javax.faces.ViewState'') # ''9131085258160566843:4053788772783974794''

    return result

    Listing 9-3

    Example of the page method

    ```


    #### 运行模拟用户


    您需要根据 Grinder 软件的安装位置修改以下命令的类路径。不过，要执行 Grinder，您只需要以下简单的命令。但请确保在启动 Grinder 控制台之前不要运行它。


    ```

    java -classpath \grinder\lib\grinder.jar net.grinder.Grinder

    ```


    #### Grinder 控制台


    作为启动控制台的另一种方式，我们只需将目录更改为 `C:\grinder\lib`，然后发出以下命令来启动控制台：


    ```

    java –classpath grinder.jar net.grinder.Console

    ```


    图 9-9 展示了 Grinder 控制台。


    ![A311833_3_En_9_Fig9_HTML.jpg](img/A311833_3_En_9_Fig9_HTML.jpg)


    图 9-9


    Grinder 控制台


    控制台左上角有几个按钮，用于指示 Grinder 代理启动或重置工作线程（即模拟用户）。当您将鼠标悬停在它们上方时，会显示按钮功能的描述。图 9-10 展示了性能测试执行期间的
    Grinder 控制台及其通常显示的信息。


    ![A311833_3_En_9_Fig10_HTML.jpg](img/A311833_3_En_9_Fig10_HTML.jpg)


    图 9-10


    使用 Grinder 进行性能测试


    为了确保一切正常，请先使用一个模拟用户运行一个周期进行快速测试（在配置数据库之后；请参见上文“数据库”部分）。步骤如下：


    1.  使用以下 URL 重置数据库：`http://yourserver:port/Chapter09-PerformanceJoined-war/ResetJoinedData`
     

    2.  重置 Glassfish 服务器。  

    3.  启动 Grinder 控制台：`java -classpath` <classpath_to_the_grinder></classpath_to_the_grinder>`net.grinder.Console`
     

    4.  编辑 `grinder.properties` 文件，并确认您只有一个用户和一个周期。  

    5.  通过输入以下命令启动 Grinder 代理和 Grinder 控制台：`java -classpath` <classpath_to_the_grinder></classpath_to_the_grinder>`net.grinder.Grinder.`
     

    6.  点击 Grinder 控制台上的启动按钮。控制台上不会显示任何结果，因为它只运行一个周期。  

    7.  检查您启动 Grinder 代理的窗口。当它显示已完成并等待控制台信号时，点击 Grinder 控制台上的重置按钮。  

    8.  转到日志目录，查看以 `out` 开头的文件。该文件包含整个测试运行的摘要，包括统计数据。如果出现问题，该文件和错误文件将为您提供解决问题所需的信息。


    在您为每个测试运行一次这些步骤后，您可能希望更新每个测试应用的 JPA 项目中的 `persistence.xml` 文件，以关闭表生成。我们保留此标志，以便在您首次运行
    `ResetJoinedData/ResetSingleTableData` servlet 时创建表。在您为持久化单元运行一次每个脚本以创建表之后，您可以避免因后续每次运行时表已存在而产生的开销（以及发出的警告）。


    现在一切就绪，您可以继续下一步了。

    '
- fmt: '### Preliminary Tests


    The objective of this first set of tests is to get familiar with the application
    and its behavior, as well as to discover any potential problems we might have
    with the test script or the application. As we’re testing two different implementations
    of inheritance, it really doesn’t matter which implementation we use for these
    preliminary tests, so we choose to conduct our initial tests with the implementation
    that uses multiple tables. We already performed one test run with one user for
    one cycle. Now we can move on to a test run for unlimited cycles and let it run
    for a couple of minutes. Then we’ll move on to test with multiple simultaneous
    users for one cycle. This is done to make sure that the application and the test
    script can handle concurrency correctly. We will typically choose 10 users. After
    that, we’ll test 10 users for unlimited cycles for a couple of minutes. Once these
    tests have completed successfully, we’ll know that the test script and application
    are working fine, and we’ll be ready for the next step.


    We’re looking to select a representative number of users for about half a dozen
    quick test runs that can clearly show us how the application behaves as we increase
    the user load.


    When dealing with performance tests of full applications, we typically look for
    the upper limit of users when the maximum acceptable response time is reached
    or exceeded. Since this is a design-for-performance test, and we are not using
    any think time in the test script, we are going to focus on finding the number
    of users for which the saturation point of the application is reached. The strategy,
    as much as it can be called that, is to pick a number of users at random.


    The test runs are short, since we don’t need an exact upper limit number, just
    an approximation. In this case, we choose to start with 100 simultaneous users,
    and we will collect data from the test runs for 2.5 minutes. Since we are using
    a sample interval of 5 seconds, we just type 30 in the Grinder console’s “Collect
    samples forever” box. The title to the box will change to “Stop after 30 samples”
    after we type 30. To keep things simple, we will not exclude the initial data.
    We do this by typing 0 in the Grinder console’s “Ignore samples” box. The collected
    statistics will present values that are a little higher than normal. This is not
    an issue, as these tests are just preliminary. Following best practices, we reset
    the database and the Glassfish server for every performance test.


    We start our first test run, and we obtain an AART of 737 milliseconds.


    > **Note:** You can find this information on the bottom part of the left column
    of the console (to the left of the square that graphically presents the TPS) with
    the title “(mean)”.


    The TTR is 137 (you can find this information in the same place that you found
    the AART, with the title “TPS (mean)”). Next, we will try again with 120 users.
    For this, we modify the `grinder.properties` file by changing the `grinder.threads`
    property to 120. We perform the next run and obtain an AART of 911 milliseconds
    and a TTR of 133. As the TTR for 120 users is lower than that for 100 users, we
    know that the saturation point is at about 100 or fewer users, so our next test
    run will be with 80 users.


    After changing the number of users in the `grinder.properties` file, we start
    the test run. We obtain an AART of 593 milliseconds and a TTR of 136. These results
    indicate that the saturation point is somewhere around the 100-user mark, so we
    will use this as the upper limit. (Talk about a lucky guess in choosing 100 users
    as the initial test point!)


    Based on this information, we choose to select 40 users as the lower limit and
    100 users as the upper limit. The test runs will be done with 40, 60, 80, 100,
    120, and 140 users. This will provide us with six reference points, which should
    clearly show us the behavior of the application.


    ### Sample Size


    Now that we have chosen the upper and lower limits of simultaneous users, we want
    to figure out how long the tests should run. This is rather simple. All we need
    to do is to perform a test run that will execute for a longer period of time than
    the 2.5 minutes we chose earlier. Our experience with this kind of test tells
    us that about 7 minutes is typically a good choice. The test run will be performed
    with the upper limit, which is 100 users.


    Once we have concluded the test run, we take the data file generated by The Grinder
    that contains the individual response times for every simulated user for every
    test. This file can be found in the log directory with a file name that starts
    with the word `data`. Next we plot a curve that presents the AART over the time
    period of the test. The results of this test run are presented in Figure [9-11](#A311833_3_En_9_Chapter.html#Fig11).
    Here we can see that the response time curve stabilizes at about 60 seconds into
    the test run.


    ![A311833_3_En_9_Fig11_HTML.jpg](A311833_3_En_9_Fig11_HTML.jpg)


    **Figure 9-11** Sample size analysis chart, plotting AARP over time period of
    the test


    We can also see that the curve remains fairly stable after the 60-second mark
    and extremely stable after the 240-second mark. Therefore, we decide the test
    runs will last 240 seconds (4 minutes—nice and short), of which we will ignore
    the first 60 seconds. As we have defined the sample size in the Grinder console
    to be 5 seconds; this means that we will ignore 12 samples and collect 36 samples.


    ### Calibration


    Now we proceed to find out the accuracy of our performance test. Since this will
    be done based on three test runs using the upper limit, we only have to do two
    additional runs. We can use the appropriate data from the previous run to determine
    the sample size.


    > **Tip:** It has been our experience that typical margins of error using this
    method are between 5 and 10 percent. They tend to increase when there are think
    times in the test scripts. In these cases, it’s not unusual to find numbers as
    high as 30 percent.


    Table [9-1](#A311833_3_En_9_Chapter.html#Tab1) and Table [9-2](#A311833_3_En_9_Chapter.html#Tab2)
    show the differential of the results collected from the test runs for the AART
    and the TTR.


    **Table 9-1** Margin of Error (AART)


    | AART | Run 1 | Run 2 | Run 3 |

    | --- | --- | --- | --- |

    | Run 1 |   | 100.1 percent | 100.0 percent |

    | Run 2 | 99.9 percent |   | 100.0 percent |

    | Run 3 | 99.9 percent | 100.0 percent |   |


    **Table 9-2** Margin of Error (TTR)


    | TTR | Run 1 | Run 2 | Run 3 |

    | --- | --- | --- | --- |

    | Run 1 |   | 99.3 percent | 100.0 percent |

    | Run 2 | 100.7 percent |   | 100.0 percent |

    | Run 3 | 100.7 percent | 100.0 percent |   |


    The biggest differences in these tables are 100.7 percent (for instance, run 2
    vs. run 1 in the TTR table), and 99.9 percent (for example, run 3 vs. run 1 in
    the AART table). Thus, the official margin of error of this performance test is
    0.7 percent, which is a very good number.'
