- fmt: '# Polymorphic JPQL Queries


    Similarly, JPQL and criteria API queries can select or join entities of a supertype
    class, and any instances of subtypes matching the query criteria will be returned
    in the query result list. What’s more, queries may use internal `JOIN` clauses
    to bind references to types anywhere along a supertype hierarchy, with the only
    restriction being that the left and right side of the `JOIN` clause resolve to
    a common base type.


    In the previous inheritance hierarchy, the `"Person.findAll"` and `"Employee.findAll"`
    named queries defined on the abstract `Person` and `Employee` entities are examples
    of polymorphic queries. Instances returned from these queries are all concrete
    entities—either `FullTimeEmployee` or `PartTimeEmployee`.


    By way of example, let us look at some code from our sample client. Listing [4-23](#A311833_3_En_4_Chapter.html#Par129)
    queries all `Employee` instances whose home address is somewhere in San Mateo.
    The query is issued on the abstract `Employee` entity, and it traverses through
    the `homeAddress` relationship field defined on the root `Person` entity. Any
    entities that are returned from this will be concrete, either `FullTimeEmployee`
    or `PartTimeEmployee`.


    ```

    //  Ad-hoc JPQL to demonstrate polymorphic relationship usage

    final String stmt =

    "select o from Employee o where o.homeAddress.city = ''San Mateo''";

    final List emps = em.createQuery(stmt).getResultList();

    for (Employee emp : emps)

    {

    System.out.println(emp.getFirstName());

    System.out.println(emp.getLastName());

    }

    Listing 4-23

    Code Listing that Demonstrates Polymorphic Relationship Usage in JPQL

    ```


    ## Using Native SQL Queries


    JPQL offers the ability to reference entity fields by name and join with other
    entities through relationships, without regard to the underlying mapping details.
    This offers a fair degree of independence between the database schema definer
    and the query definer roles. There are times, however, when you’ll want to take
    control of the query to leverage specific indexes, return sparse data sets, or
    otherwise issue a query that is more conveniently expressed in SQL. JPA lets you
    do this easily, and it even offers support for mapping the query results back
    to entities if you desire.


    As an example, you may wish to use a native SQL query to return just the name
    and primary key column data from a table that happens to map to one of your entities.
    The queried name values could then be presented to the user through a combo box,
    and only when the user chooses a name would you go out to the `EntityManager`
    and bind that name’s corresponding primary key value to an entity instance using
    the `EntityManager.find(Object primaryKey)` call. Had you used JPQL to return
    a collection of fully loaded entities, instead of just the sparse key and name
    data set, you would have queried more data fields than necessary, causing more
    resources to be consumed than were actually needed.


    The example in Listing [4-24](#A311833_3_En_4_Chapter.html#Par133) shows how to
    define a named native SQL query that returns instances of entity type `Address`.
    Executing this named native query is the same to the client as executing the equivalent
    JPQL named query.


    ```

    @NamedNativeQueries({

    @NamedNativeQuery(name = "Address.findAllNative",

    query = "select id, city, state, street1, street2, zip_code from ch04_join_address",

    resultClass=Address.class)})

    Listing 4-24

    Code Listing that Demonstrates Native SQL Support

    ```


    ## The Query Criteria API


    JPA, since version 2.0, introduced an alternative to JPQL for defining and executing
    queries, using strongly typed components. Using only Java, the criteria API allows
    you to dynamically construct arbitrarily complex queries and execute them to return
    the same results that could be achieved through JPQL, but with compile-time type
    checking. Since the same underlying query engine is used for both the JPQL and
    criteria API, they are equivalent in strength, and there is an analogous criteria
    API call for each feature that can be expressed in JPQL. For situations where
    a query is also dynamically defined through a query builder, for instance, the
    criteria API can be more manageable than dynamically constructing an equivalent
    JPQL statement. We discussed in Chapter [3](#A311833_3_En_3_Chapter.html) which
    changes were introduced in JPA 2.2 as part of Java EE 8.


    While the full criteria API, like the full feature set of the JPQL language, goes
    beyond the scope of this book, we show an example of how it can be used in Listing
    [4-25](#A311833_3_En_4_Chapter.html#Par136).


    ```

    /**

    *  Criteria API equivalent to the following JPQL query:

    *

    *    select o from Address o where o.city = :city

    */

    public List getAddressFindByCity(String city) {

    //  Define a query to return objects of type Address

    CriteriaBuilder cb = em.getCriteriaBuilder();

    CriteriaQuery c = cb.createQuery(Address.class);

    Root addr = c.from(Address.class);

    //  Add the SELECT clause

    c.select(addr);

    //  Define a predicate in the WHERE clause to compare the city

    //  property with a parameter value

    ParameterExpression p = cb.parameter(String.class, "city");

    c.where(cb.equal(addr.get("city"), p));

    //  Bind the ''city'' parameter

    TypedQuery q = em.createQuery(c);

    q.setParameter("city", city);

    //  Return the query results as a List

    return q.getResultList();

    }

    Listing 4-25

    Code Listing that Demonstrates use of the query criteria API

    ```


    The criteria API is a more formal approach but can be extremely useful in the
    right application situation.


    ## Composite Primary Keys and Nested Foreign Keys


    When mapping entities to a new schema, it is good practice to designate a single,
    dedicated column to be the primary key column, as we have done in the previous
    examples. An entity’s primary key value cannot be updated once it has been assigned.
    Also, dedicating a column to hold the primary key instead of using a name or other
    column that holds meaningful property data eliminates potential conflicts that
    might arise should a user wish to modify a semantically significant field that
    happens to be part of the primary key. It is also desirable to follow a single
    approach that is common to all of your entities, and use of a single dedicated
    column for the primary key is a simple pattern that we have found to work well.


    There are cases, however, in which the schema has already been defined and is
    being adapted into Java as JPA entities, and cases in which, for other reasons,
    a composite primary key is required. A legacy case that we run into a lot occurs
    when a composite primary key includes columns, such as foreign key columns, that
    are also involved in relationships with other entities. On top of this, these
    relationships are necessarily mandatory (since all primary key columns must be
    `NOT NULL`), so you will need to be careful about how you persist your entity
    graphs when you need to persist such related entities in order to avoid `NOT NULL`
    constraints when the row data is inserted during the `EntityManager.persist()`
    call.


    There are two ways you can use a composite primary key to implement your entity’s
    identity. They are described in the following sections.'
