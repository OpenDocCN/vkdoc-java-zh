    为了将 `Person` 类转换为使用嵌入式 ID，我们用 `@EmbeddedId myIdClass myId` 字段替换了 `@Id Integer
    id` 字段。为了将此实体重新纳入我们的示例 `JOINED` 实体层次结构，需要修改 `Person` 的 `Employee` 子实体上的 `manager`
    关系字段以及所有子实体上的 PK 字段，以映射到新主键中的所有列。


    ### 在实体类上直接公开复合键类字段（@IdClass）


    映射复合主键的另一种方法是在实体类上为主键类中的每个字段显式声明字段，但为每个字段添加 `@Id` 注解，如清单 4-28 所示。如果主键上的任何字段同时也是实体上的有用属性，您可能希望采用这种方法。然后，您需要定义一个新的复合键类，声明这些
    `@Id` 字段中的每一个，并确保它们在名称和类型上与键类字段完全匹配。


    从上一个使用 `@EmbeddedId` 的示例中的类开始，我们可以修改 `MyIdClass` 以移除 `@Embedded` 注解，如清单 4-28 所示。


    ```

    public class MyIdClass implements Serializable {

    @Column(name = "FIRST_NAME", length = 400)

    private String firstName;

    @Column(name = "LAST_NAME", length = 400)

    private String lastName;

    public MyIdClass() {

    }

    public MyIdClass(String firstName, String lastName) {

    this.firstName = firstName;

    this.lastName = lastName;

    }

    @Override

    public boolean equals(Object obj) {

    return obj instanceof MyIdClass && firstName.equals(((MyIdClass) obj).getFirstName())
    && lastName.equals(((MyIdClass) obj).getLastName());

    }

    @Override

    public int hashCode() {

    return System.identityHashCode(this);

    }

    /* get/set methods */

    }

