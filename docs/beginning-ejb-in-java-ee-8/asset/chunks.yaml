- fmt: '## Summary


    This chapter covered EJB session bean details using a specific set of examples.
    We looked at the simplified EJB model for developing session beans using standard
    Java language artifacts, such as Java classes and interfaces. We looked at session
    beans and some typical use cases in which session beans can be used for developing
    applications. We discussed three different types of session beans (stateless,
    stateful, and singleton), including the differences between them, and some general
    use cases for each. We covered session bean usage in 2-tier and 3-tier application
    architectures. We discussed the usage of dependency injection in stateless, stateful,
    and singleton beans. We considered ways to gain fine-grained control over application
    flow, including the use of lifecycle callback methods and interceptors in stateless
    and stateful beans, as well as the use of annotations like `@PostConstruct` and
    `@PreDestroy`. We looked at what is required to compile/build, package, and deploy
    session beans to the GlassFish application server. Finally, we looked at running
    the sample client programs using the GlassFish application client container.


    In the next two chapters, we will drill down into the Java Persistence API (JPA)
    so that you can learn how to map POJOs to database tables and perform query and
    CRUD operations.'
