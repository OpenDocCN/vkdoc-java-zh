  trans: '

    ### 使用 CMT 会话 Bean 过滤测试数据


    通过 Java 外观（借助一个工具类）填充演示数据后，Servlet 客户端会调用一个无状态的 CMT 会话 Bean `OrderProcessorCMTBean`
    来过滤这些数据，移除可能由先前调用创建的 `Customer` 和 `Wine` 实体。我们本可以将数据填充和过滤功能整合到一个绑定到单个持久化单元的外观中，但这里我们特意混合搭配了不同的选项，以展示它们如何协同工作。实现这一点的关键在于，两个持久化单元（一个为
    `RESOURCE_LOCAL`，另一个为 `JTA`）都指向同一个数据库连接。


    ```

    //  通过移除所有 email 为 ''xaction.head@yahoo.com'' 的现有 Customer

    //  以及所有 country 为 ''United States'' 的现有 Wine 来过滤数据。

    out.print("正在过滤演示数据... ");

    System.out.println(orderProcessorCMT.initialize());

    out.println("完成");

    ```


    无状态会话 Bean `OrderProcessorCMTBean` 没有显式声明其事务行为，因此它采用默认的 `TransactionManagement`
    值——CMT，这等同于在 Bean 上添加以下注解：


    ```

    @TransactionManagement(TransactionManagementType.CONTAINER)

    ```


    由于 `initialize()` 方法没有使用 `TransactionAttribute` 覆盖注解，并且 `OrderProcessorCMTBean`
    也没有在 Bean 级别为所有方法覆盖默认的 `TransactionAttribute` 值，因此它采用默认的事务属性值，等同于以下设置：


    ```

    @TransactionAttribute(TransactionAttributeType.REQUIRED)

    ```


    由于客户端既没有开始也没有继承一个事务，因此在 `initialize()` 方法执行期间，EJB 容器会创建并开始一个事务，并且在该方法成功完成后提交所有更改。CMT
    Bean 始终会表现出隐式提交行为，因为容器不允许其开始的事务在方法完成后继续存在。隐式提交会导致该方法期间所做的任何更改持久化，并应用到数据库中，从而使这些更改此后对所有客户端可见。


    #### 在客户端创建新的 Customer 和 CartItem 实体实例


    客户端的下一步是创建一个新的 `Customer` 实体实例（实际上是抽象 `Customer` 实体的具体子类 `Individual`），创建一些 `Wine`
    实例，并将由 `CartItem` 实例表示的几瓶葡萄酒添加到客户的购物车中：


    ```

    //  创建一个 Customer 并添加一些 CartItem 及其关联的 Wine

    Individual customer = new Individual();

    customer.setFirstName("Transaction");

    customer.setLastName("Head");

    customer.setEmail(PopulateDemoData.TO_EMAIL_ADDRESS);

    for (int i = 0; i < 5; i++) {

    final Wine wine = new Wine();

    wine.setCountry("United States");

    wine.setDescription("美味的葡萄酒");

    wine.setName("Xacti");

    wine.setRegion("干溪谷");

    wine.setRetailPrice(new Float(20.00D + i));

    wine.setVarietal("仙粉黛");

    wine.setYear(2000 + i);

    orderProcessorCMT.persistEntity(wine);

    final CartItem cartItem = new CartItem();

    cartItem.setCreatedDate(new Timestamp(System.currentTimeMillis()));

    cartItem.setCustomer(customer);

    cartItem.setQuantity(12);

    cartItem.setWine(wine);

    customer.addCartItem(cartItem);

    }

    ```


    请注意，在此阶段，只有 `wine` 实例被显式持久化。所有其他创建的实体都直接或间接地与 `customer` 实例关联，并且它们仅存在于 Servlet
    的方法上下文中。在创建这些实体对象、分配其普通属性以及将它们相互关联的过程中，不涉及任何事务。`wine` 实例特意没有通过级联规则与其他对象关联，因此必须显式持久化它们。


    ##### 持久化 Customer


    创建了 `Customer` 和关联的 `CartItem` 对象后，客户端将 `Customer` 传递给 `OrderProcessorCMT` Bean
    的 `persistEntity()` 方法。由于 `Customer` 和 `CartItem` 实体上的关系被注解为 `cascade = {CascadeType.ALL}`，持久化
    `Customer` 实体的操作会级联到所有关联的实体，因此它们也都被持久化了。此方法调用将开始一个事务，将客户及相关对象持久化到数据库，并提交工作：


    ```

    //  持久化 Customer，依赖级联设置来同时持久化所有相关的 CartItem 实体。

    //  调用后，Customer 实例将拥有一个由 EJB 容器在持久化时分配的 ID 值。

    orderProcessorCMT.persistEntity(customer);

    ```


    另外请注意，由于我们在持久化单元中为每个实体的基类设置了 ID 生成器，它们的 `id` 字段会在持久化时自动填充，并且映射到实体关系的外键列也会正确连接。对于使用表生成器的
    `BusinessContext` 类，其 `id` 字段的 ID 生成器定义如下：


    ```

    @Id

    @Column(nullable = false)

    @GeneratedValue(strategy = GenerationType.TABLE, generator = "BusinessContact_ID_Generator")

    private Integer id;

    ```


    我们传递给 `persistEntity()` 的 `Customer` 实例会被更新，变为受管理且已持久化的状态。如果我们通过 `OrderProcessorCMTBean`
    的远程接口调用 `persistEntity()`，则调用将使用按值传递语义，我们需要在方法结果中捕获更新后的 `Customer` 实例。由于我们在 Java
    EE 层内使用本地模式调用会话 Bean，因此使用的是按引用传递语义，所以 `Customer` 实例会直接被更新。


    在 `persistEntity()` 调用结束时，`Customer`（`Individual`）及其所有关联数据现在已应用到数据库中，并对所有客户端（包括我们自己的客户端）可用。

    '
- fmt: '### Creating the CustomerOrder


    An instance of a `Customer` entity now exists as a persistent row in the database,
    so we can call `createCustomerOrder()` with `customer` to create a new `CustomerOrder`,
    and create an `OrderItem` for each `CartItem` on the `Customer`:


    ```

    //  Create a customer order and create OrderItems from the CartItems

    final CustomerOrder customerOrder =

    orderProcessorCMT.createCustomerOrder(customer);

    ```


    Here again, the `createCustomerOrder()` method definition is not annotated with
    a transaction attribute, so it defaults to `REQUIRED`, and the EJB container creates
    and begins a new transaction for the duration of that method, and then commits
    it upon returning control to the client. Note that the implementation of the `createCustomerOrder()`
    method delegates to another method, `createCustomerOrderUsingSupports()`, which
    is annotated as follows:


    ```

    @TransactionAttribute(TransactionAttributeType.SUPPORTS)

    public CustomerOrder createCustomerOrderUsingSupports(Customer customer) {...}

    ```


    This delegation exists purely to allow us to illustrate the transaction behavior
    involved when calling a method marked `SUPPORTS` from a method marked `REQUIRED`.
    The method called from the client, `createCustomerOrder()`, causes a transaction
    to be created that is propagated to its delegate, `createCustomerOrderUsingSupports()`.
    This latter method inherits the transaction context created by the EJB container
    for its caller. Had the client called `createCustomerOrderUsingSupports()` directly,
    an exception would have been thrown during its execution, when the `remove()`
    and `persist()` operations were called outside a transaction context.


    A lot is going on inside the `createCustomerOrderUsingSupports()` method. Because
    the customer argument might be detached (in our case it isn’t, since our servlet
    is running within a local Java EE environment), it needs to be turned into a managed
    instance. If it is already managed, this precaution is unnecessary but not harmful:


    ```

    if (!em.contains(customer)) {

    customer = em.merge(customer);

    }

    ```


    Next, the `CustomerOrder` instance is created and added to the `Customer`. Our
    implementation of the `addCustomerOrder()` method adds the `CustomerOrder` to
    the `Customer`’s `customerOrderList` property and also assigns the `customer`
    back-pointer property on `CustomerOrder`, effectively wiring up the bidirectional
    relationship:


    ```

    final CustomerOrder customerOrder = new CustomerOrder();

    customer.addCustomerOrder(customerOrder);

    ```


    and the `CustomerOrder` is then populated with new `OrderItem`s to match each
    `CartItem` in the `Customer`’s shopping cart. We copy the customer’s `CartItem`
    list into an `ArrayList` so we can iterate over it and remove each `CartItem`
    from the `Customer` after a corresponding `OrderItem` has been created in the
    `CustomerOrder`, without causing a concurrency exception:


    ```

    final Timestamp orderDate = new Timestamp(System.currentTimeMillis());

    final List cartItemList =

    new ArrayList(customer.getCartItemList());

    for (CartItem cartItem : cartItemList) {

    //  Create a new OrderItem for this CartItem

    final OrderItem orderItem = new OrderItem();

    orderItem.setOrderDate(orderDate);

    orderItem.setPrice(cartItem.getWine().getRetailPrice());

    orderItem.setQuantity(cartItem.getQuantity());

    orderItem.setStatus("Order Created");

    orderItem.setWine(cartItem.getWine());

    customerOrder.addOrderItem(orderItem);

    //  Remove the CartItem

    customer.removeCartItem(cartItem);

    }

    ```


    As each `OrderItem` is created, its `CartItem` is removed from the `Customer`.
    An `orphanRemoval=true` property on the `@OneToMany` relationship annotating `Customer.orderItemList`
    ensures that after each `CartItem` is removed from the `Customer`, it will be
    automatically removed from persistent storage as well when the context transaction
    is committed.


    At last, the newly populated `CustomerOrder` is persisted and returned to the
    caller:


    ```

    return persistEntity(customerOrder);

    ```


    The transaction is not committed until after the `createCustomerOrderUsingSupports()`
    method has completed and control is returned from the wrapper `createCustomerOrder()`
    method. Assuming that we are using a JTA transaction that uses a two-phase commit
    (for instance, a container-managed transaction created by the EJB container),
    should anything go wrong in the course of either of these methods, the entire
    transaction will be rolled back, and neither this client nor any outside application
    will ever be aware that a `CustomerOrder` was created.


    ### Does This Pass the ACID Test?


    Have the core ACID requirements that characterize a valid transaction been met?
    Let’s look at how EJB addresses each one.


    #### Atomicity


    The EJB container ensures that whenever a stateless CMT method marked `REQUIRED`
    or `REQUIRES_NEW` is called, if the container interposes to create a new transaction
    (this will always happen with `REQUIRES_NEW`), it will resolve that transaction
    upon exiting the method. If the method completes successfully, and if the bean
    code did not call `EJBContext.setRollbackOnly()`, the transaction will be committed.
    If the method throws an exception, or if `EJBContext.setRollbackOnly()` is called,
    the transaction will be rolled back. These two transaction attributes are the
    only ones for which the container may interpose to create a new transaction. For
    all other transaction attributes, either an externally managed transaction is
    involved (in which case the container will not interpose to commit it when the
    method is exited), or the method is called with no transaction context. In the
    latter case, because we are using a transaction-scoped persistence context and
    there is no transactional context, calls to `persist()`, `merge()`, or `remove()`
    will cause a `javax.persistence.TransactionRequiredException`. Were we to be using
    a stateful session bean with an extended persistence context, these changes would
    be tracked by the persistence context, even outside of a transaction, and applied
    should a transaction be subsequently created (and associated with this persistence
    context) and committed.


    #### Consistency


    Any database constraints or concurrency conditions (whether enforced in the database
    or in the EJB container) are guaranteed to be satisfied when a transaction is
    committed through the EJB services. Violations will result in exceptions being
    thrown from the EJB container, and the transaction will automatically be rolled
    back. A successful commit indicates that all defined constraint conditions have
    been met.


    #### Isolation


    This requirement is largely the responsibility of the underlying JTA resources.
    Each resource may expose its own configurable isolation level settings to provide
    varying degrees of consistency to the resources involved in a transaction. Isolation
    levels determine the extent to which resources within the transaction are able
    to see the partial (in-transaction) state of other resources involved in the transaction,
    and largely translate into cache consistency settings within the resource. Isolation
    also determines that the transaction should not see uncommitted data of another
    transaction. To remain database neutral, our example did not attempt to configure
    these settings.


    #### Durability


    This is also largely the responsibility of the underlying JTA resources involved
    in the transaction (e.g., the database or mail server). At the conclusion of a
    JTA transaction, any such resources are expected to be able to show the new state
    of the data when queried. We demonstrated this by querying the details of the
    new `CustomerOrder` from the client after the `createCustomerOrder()` method,
    and its transaction encapsulated within, had completed.'
  raw: '##### Creating the CustomerOrder


    An instance of a `Customer` entity now exists as a persistent row in the database,
    so we can call `createCustomerOrder()` with `customer` to create a new `CustomerOrder`,
    and create an `OrderItem` for each `CartItem` on the `Customer`:


    ```

    //  Create a customer order and create OrderItems from the CartItems

    final CustomerOrder customerOrder =

    orderProcessorCMT.createCustomerOrder(customer);

    ```


    Here again, the `createCustomerOrder()` method definition is not annotated with
    a transaction attribute, so it defaults to `REQUIRED`, and the EJB container creates
    and begins a new transaction for the duration of that method, and then commits
    it upon returning control to the client. Note that the implementation of the `createCustomerOrder()`
    method delegates to another method, `createCustomerOrderUsingSupports()`, which
    is annotated as follows:


    ```

    @TransactionAttribute(TransactionAttributeType.SUPPORTS)

    public CustomerOrder createCustomerOrderUsingSupports(Customer customer) {...}

    ```


    This delegation exists purely to allow us to illustrate the transaction behavior
    involved when calling a method marked `SUPPORTS` from a method marked `REQUIRED`.
    The method called from the client, `createCustomerOrder()`, causes a transaction
    to be created that is propagated to its delegate, `createCustomerOrderUsingSupports()`.
    This latter method inherits the transaction context created by the EJB container
    for its caller. Had the client called `createCustomerOrderUsingSupports()` directly,
    an exception would have been thrown during its execution, when the `remove()`
    and `persist()` operations were called outside a transaction context.


    A lot is going on inside the `createCustomerOrderUsingSupports()` method. Because
    the customer argument might be detached (in our case it isn’t, since our servlet
    is running within a local Java EE environment), it needs to be turned into a managed
    instance. If it is already managed, this precaution is unnecessary but not harmful:


    ```

    if (!em.contains(customer)) {

    customer = em.merge(customer);

    }

    ```


    Next, the `CustomerOrder` instance is created and added to the `Customer`. Our
    implementation of the `addCustomerOrder()` method adds the `CustomerOrder` to
    the `Customer`’s `customerOrderList` property and also assigns the `customer`
    back-pointer property on `CustomerOrder`, effectively wiring up the bidirectional
    relationship:


    ```

    final CustomerOrder customerOrder = new CustomerOrder();

    customer.addCustomerOrder(customerOrder);

    ```


    and the `CustomerOrder` is then populated with new `OrderItem`s to match each
    `CartItem` in the `Customer`’s shopping cart. We copy the customer’s `CartItem`
    list into an `ArrayList` so we can iterate over it and remove each `CartItem`
    from the `Customer` after a corresponding `OrderItem` has been created in the
    `CustomerOrder`, without causing a concurrency exception:


    ```

    final Timestamp orderDate = new Timestamp(System.currentTimeMillis());

    final List cartItemList =

    new ArrayList(customer.getCartItemList());

    for (CartItem cartItem : cartItemList) {

    //  Create a new OrderItem for this CartItem

    final OrderItem orderItem = new OrderItem();

    orderItem.setOrderDate(orderDate);

    orderItem.setPrice(cartItem.getWine().getRetailPrice());

    orderItem.setQuantity(cartItem.getQuantity());

    orderItem.setStatus("Order Created");

    orderItem.setWine(cartItem.getWine());

    customerOrder.addOrderItem(orderItem);

    //  Remove the CartItem

    customer.removeCartItem(cartItem);

    }

    ```


    As each `OrderItem` is created, its `CartItem` is removed from the `Customer`.
    An `orphanRemoval=true` property on the `@OneToMany` relationship annotating `Customer.orderItemList`
    ensures that after each `CartItem` is removed from the `Customer`, it will be
    automatically removed from persistent storage as well when the context transaction
    is committed.


    At last, the newly populated `CustomerOrder` is persisted and returned to the
    caller:


    ```

    return persistEntity(customerOrder);

    ```


    The transaction is not committed until after the `createCustomerOrderUsingSupports()`
    method has completed and control is returned from the wrapper `createCustomerOrder()`
    method. Assuming that we are using a JTA transaction that uses a two-phase commit
    (for instance, a container-managed transaction created by the EJB container),
    should anything go wrong in the course of either of these methods, the entire
    transaction will be rolled back, and neither this client nor any outside application
    will ever be aware that a `CustomerOrder` was created.


    #### Does This Pass the ACID Test ?


    Have the core ACID requirements that characterize a valid transaction been met?
    Let’s look at how EJB addresses each one.


    ##### Atomicity


    The EJB container ensures that whenever a stateless CMT method marked `REQUIRED`
    or `REQUIRES_NEW` is called, if the container interposes to create a new transaction
    (this will always happen with `REQUIRES_NEW`), it will resolve that transaction
    upon exiting the method. If the method completes successfully, and if the bean
    code did not call `EJBContext.setRollbackOnly()`, the transaction will be committed.
    If the method throws an exception, or if `EJBContext.setRollbackOnly()` is called,
    the transaction will be rolled back. These two transaction attributes are the
    only ones for which the container may interpose to create a new transaction. For
    all other transaction attributes, either an externally managed transaction is
    involved (in which case the container will not interpose to commit it when the
    method is exited), or the method is called with no transaction context. In the
    latter case, because we are using a transaction-scoped persistence context and
    there is no transactional context, calls to `persist()`, `merge()`, or `remove()`
    will cause a `javax.persistence.TransactionRequiredException`. Were we to be using
    a stateful session bean with an extended persistence context, these changes would
    be tracked by the persistence context, even outside of a transaction, and applied
    should a transaction be subsequently created (and associated with this persistence
    context) and committed.


    ##### Consistency


    Any database constraints or concurrency conditions (whether enforced in the database
    or in the EJB container) are guaranteed to be satisfied when a transaction is
    committed through the EJB services. Violations will result in exceptions being
    thrown from the EJB container, and the transaction will automatically be rolled
    back. A successful commit indicates that all defined constraint conditions have
    been met.


    ##### Isolation


    This requirement is largely the responsibility of the underlying JTA resources.
    Each resource may expose its own configurable isolation level settings to provide
    varying degrees of consistency to the resources involved in a transaction. Isolation
    levels determine the extent to which resources within the transaction are able
    to see the partial (in-transaction) state of other resources involved in the transaction,
    and largely translate into cache consistency settings within the resource. Isolation
    also determines that the transaction should not see uncommitted data of another
    transaction. To remain database neutral, our example did not attempt to configure
    these settings.


    ##### Durability


    This is also largely the responsibility of the underlying JTA resources involved
    in the transaction (e.g., the database or mail server). At the conclusion of a
    JTA transaction, any such resources are expected to be able to show the new state
    of the data when queried. We demonstrated this by querying the details of the
    new `CustomerOrder` from the client after the `createCustomerOrder()` method,
    and its transaction encapsulated within, had completed.'
  trans: '

    ##### 创建客户订单


    `Customer` 实体的一个实例现在作为数据库中的持久化行存在，因此我们可以使用 `customer` 调用 `createCustomerOrder()`
    来创建一个新的 `CustomerOrder`，并为 `Customer` 上的每个 `CartItem` 创建一个 `OrderItem`：


    ```

    // 创建一个客户订单，并根据 CartItems 创建 OrderItems

    final CustomerOrder customerOrder =

    orderProcessorCMT.createCustomerOrder(customer);

    ```


    同样地，`createCustomerOrder()` 方法定义没有使用事务属性进行注解，因此它默认为 `REQUIRED`，EJB 容器会在该方法执行期间创建并开始一个新事务，然后在将控制权返回给客户端时提交该事务。请注意，`createCustomerOrder()`
    方法的实现委托给了另一个方法 `createCustomerOrderUsingSupports()`，该方法注解如下：


    ```

    @TransactionAttribute(TransactionAttributeType.SUPPORTS)

    public CustomerOrder createCustomerOrderUsingSupports(Customer customer) {...}

    ```


    这种委托纯粹是为了让我们能够说明从标记为 `REQUIRED` 的方法调用标记为 `SUPPORTS` 的方法时所涉及的事务行为。从客户端调用的方法 `createCustomerOrder()`
    会创建一个事务，该事务会传播给其委托方法 `createCustomerOrderUsingSupports()`。后一个方法继承了 EJB 容器为其调用者创建的事务上下文。如果客户端直接调用
    `createCustomerOrderUsingSupports()`，那么当在事务上下文之外调用 `remove()` 和 `persist()` 操作时，其执行过程中将会抛出异常。


    `createCustomerOrderUsingSupports()` 方法内部做了很多事情。因为 `customer` 参数可能是分离的（在我们的例子中并非如此，因为我们的
    servlet 在本地 Java EE 环境中运行），所以需要将其转换为受管实例。如果它已经是受管的，则此预防措施是不必要的，但也没有坏处：


    ```

    if (!em.contains(customer)) {

    customer = em.merge(customer);

    }

    ```


    接下来，创建 `CustomerOrder` 实例并将其添加到 `Customer`。我们的 `addCustomerOrder()` 方法实现将 `CustomerOrder`
    添加到 `Customer` 的 `customerOrderList` 属性中，同时还设置了 `CustomerOrder` 上的 `customer`
    反向指针属性，从而有效地建立了双向关系：


    ```

    final CustomerOrder customerOrder = new CustomerOrder();

    customer.addCustomerOrder(customerOrder);

    ```


    然后，用新的 `OrderItem` 填充 `CustomerOrder`，以匹配 `Customer` 购物车中的每个 `CartItem`。我们将客户的
    `CartItem` 列表复制到一个 `ArrayList` 中，以便可以对其进行迭代，并在 `CustomerOrder` 中创建相应的 `OrderItem`
    后，从 `Customer` 中移除每个 `CartItem`，而不会导致并发异常：


    ```

    final Timestamp orderDate = new Timestamp(System.currentTimeMillis());

    final List cartItemList =

    new ArrayList(customer.getCartItemList());

    for (CartItem cartItem : cartItemList) {

    // 为此 CartItem 创建一个新的 OrderItem

    final OrderItem orderItem = new OrderItem();

    orderItem.setOrderDate(orderDate);

    orderItem.setPrice(cartItem.getWine().getRetailPrice());

    orderItem.setQuantity(cartItem.getQuantity());

    orderItem.setStatus("Order Created");

    orderItem.setWine(cartItem.getWine());

    customerOrder.addOrderItem(orderItem);

    // 移除 CartItem

    customer.removeCartItem(cartItem);

    }

    ```


    每创建一个 `OrderItem`，其对应的 `CartItem` 就会从 `Customer` 中移除。注解 `Customer.orderItemList`
    的 `@OneToMany` 关系上的 `orphanRemoval=true` 属性确保每个 `CartItem` 从 `Customer` 中移除后，当上下文事务提交时，它也会自动从持久化存储中移除。


    最后，新填充的 `CustomerOrder` 被持久化并返回给调用者：


    ```

    return persistEntity(customerOrder);

    ```


    事务直到 `createCustomerOrderUsingSupports()` 方法完成并且控制权从包装方法 `createCustomerOrder()`
    返回后才提交。假设我们使用的是采用两阶段提交的 JTA 事务（例如，由 EJB 容器创建的容器管理事务），那么如果这两个方法中的任何一个在执行过程中出现问题，整个事务都将回滚，并且此客户端或任何外部应用程序都不会知道曾经创建过一个
    `CustomerOrder`。


    #### 这能通过 ACID 测试吗？


    表征有效事务的核心 ACID 要求是否得到满足？让我们看看 EJB 如何解决每一个问题。


    ##### 原子性


    EJB 容器确保，每当调用标记为 `REQUIRED` 或 `REQUIRES_NEW` 的无状态 CMT 方法时，如果容器介入创建一个新事务（对于 `REQUIRES_NEW`
    总是会发生），它将在退出该方法时解析该事务。如果方法成功完成，并且 bean 代码没有调用 `EJBContext.setRollbackOnly()`，则事务将被提交。如果方法抛出异常，或者调用了
    `EJBContext.setRollbackOnly()`，则事务将被回滚。这两个事务属性是容器可能介入创建新事务的唯一属性。对于所有其他事务属性，要么涉及外部管理的事务（在这种情况下，容器在方法退出时不会介入提交它），要么在没有事务上下文的情况下调用该方法。在后一种情况下，因为我们使用的是事务范围的持久化上下文并且没有事务上下文，所以对
    `persist()`、`merge()` 或 `remove()` 的调用将导致 `javax.persistence.TransactionRequiredException`。如果我们使用带有扩展持久化上下文的有状态会话
    bean，那么即使在事务之外，这些更改也会被持久化上下文跟踪，并且如果随后创建（并与此持久化上下文关联）并提交了事务，则会应用这些更改。


    ##### 一致性


    通过 EJB 服务提交事务时，保证满足任何数据库约束或并发条件（无论是在数据库中还是在 EJB 容器中强制执行）。违反将导致 EJB 容器抛出异常，并且事务将自动回滚。成功的提交表明所有定义的约束条件都已满足。


    ##### 隔离性


    此要求主要取决于底层 JTA 资源。每个资源可能公开其自己可配置的隔离级别设置，以便为事务中涉及的资源提供不同程度的*一致性*。隔离级别决定了事务内的资源能够看到事务中涉及的其他资源的部分（事务中）状态的程度，并且在很大程度上转化为资源内的缓存一致性设置。隔离性还确保事务不应看到另一个事务的未提交数据。为了保持数据库中立，我们的示例没有尝试配置这些设置。


    ##### 持久性


    这也主要取决于事务中涉及的底层 JTA 资源（例如，数据库或邮件服务器）。在 JTA 事务结束时，任何此类资源在被查询时都应能够显示数据的新状态。我们通过以下方式演示了这一点：在
    `createCustomerOrder()` 方法及其封装的事务完成后，从客户端查询新 `CustomerOrder` 的详细信息。

    '
- fmt: '#### Benefits of This Approach


    A principal benefit of using a default stateless session bean with CMT demarcation
    is that the client does not need to be concerned about beginning, ending, or otherwise
    coordinating the transaction logic. Also, any transaction context currently in
    effect on the thread in which the bean method is called is automatically propagated
    to that method call (if the transaction attribute is `REQUIRED` or `SUPPORTS`).
    Each call it makes to the `OrderProcessorCMT` bean either completes successfully
    (in which case it can be assumed that the work has been applied persistently)
    or results in an exception (whereupon the work performed in that method is completely
    rolled back). It’s a very simple model.


    #### Limitations of This Approach


    In general, simple is good, but sometimes it is too limiting. While this example
    allows the client to create and manipulate new entity instances in the client
    tier, as when it created the `Customer`, `Wine` and `CartItem` instances, the
    client must rely on the EJBs to ensure that the updates it makes to the entity
    model are persisted to the database within a transaction, since transactions are
    always begun and terminated by the EJB container before control is handed back
    to the client.


    In the next example, we will show how using stateful session beans, coupled with
    BMT and an extended persistence context, empowers the client with greater flexibility
    (and with it, responsibility) over the transactional behavior of the application.


    **Note**


    There has been a popular conception among EJB users that stateful session beans
    should be avoided for performance reasons. The performance tests that we have
    done strongly suggest that stateful session beans have been falsely maligned,
    and that when correctly used, they can actually boost performance. Furthermore,
    in EJB, their value is increased, since they provide you this `PersistenceContext.EXTENDED`
    option, allowing entity instances to be cached for use across transactions.


    ### Stateful Session Beans with BMT Demarcation and Extended Persistence Context


    To illustrate extending the reach of EJB’s transaction support, here is the same
    application written using a stateful BMT session bean, `OrderProcessorBMTBean.java`.
    This BMT example also leverages EJB’s built-in transaction support, but instead
    of relying on the container to manage transaction demarcation at method boundaries,
    shows how to demarcate transactions explicitly, inside the enterprise bean code
    and controlled from the client as well.


    There is no requirement that you use BMT demarcation when using stateful session
    beans, and in fact this option is not typically used. We show it here in Listing
    [8-5](#A311833_3_En_8_Chapter.html#Par145) to illustrate how you would use it,
    should you be so inclined.'
