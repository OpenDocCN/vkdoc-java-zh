    it starts dropping (due to, for example, too many shoppers).


    ![A311833_3_En_9_Fig2_HTML.jpg](A311833_3_En_9_Fig2_HTML.jpg)


    Figure 9-2


    A typical TTR curve


    The AART curve presented in Figure [9-1](#A311833_3_En_9_Chapter.html#Fig1) is
    the result of data collected from the same test run as the TTR curve presented
    in Figure [9-2](#A311833_3_En_9_Chapter.html#Fig2). If you review the AART curve,
