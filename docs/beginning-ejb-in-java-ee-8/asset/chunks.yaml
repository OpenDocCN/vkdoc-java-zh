    ## Summary


    In this chapter, we introduced you to the concept of message-oriented middleware
    and why enterprises are looking at loosely coupled applications that can converse
    in an asynchronous fashion.


    We covered message application architecture with the P2P and pub-sub models, and
    we discussed why messaging is one of the best ways to implement asynchronous applications.
    We looked at JMS in detail, including different JMS components such as providers,
    consumers, clients, and different types of messages. We looked at MDBs and the
    different artifacts that can make them. We covered the different configuration
    properties of MDBs and how they can be set using annotations. We explained dependency
    injection in MDBs using the specific example of injecting a JavaMail resource.
    We discussed what it takes to compile, package, deploy, and test MDBs, along with
    information on how you can create different types of resources in the GlassFish
    application server. Finally, we covered running sample client programs using the
    application client container in GlassFish and viewing the output and receiving
    e-mail messages sent by MDBs.


    In the next chapter, we will drill down into web services, including how you can
    publish session beans as web services and how to invoke web services from EJB
    applications.


    # 6. EJB, Web Services, and Microservices


    This chapter will explain Java EE 8Web Services and Microservices and their differences.
    We will introduce the core Web Services standards (SOAP, WSDL, UDDI, XML), and
    discuss the evolution of Web Services and Microservices support in the Java EE
    platform. We will also drill down into how you can publish EJB stateless session
    beans as Web services as well as how to invoke the published Web service from
    a command-line Java client program and a stateless session bean. Finally, we will
    show a short example about Microservices using the Spring Boot project.'
