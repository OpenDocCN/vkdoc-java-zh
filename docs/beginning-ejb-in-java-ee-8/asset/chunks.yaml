  trans: '

    #### EJBContext.setRollbackOnly 与 getRollbackOnly 方法


    在采用容器管理事务（CMT）的企业 Bean 方法中，如果遇到异常或其他错误情况，该 Bean 可能希望阻止上下文事务被提交。


    在使用容器管理事务时，可以通过以下方式使用 `MessageDrivenContext` 方法：


    *   `setRollbackOnly`：此方法可用于错误处理。

    *   `getRollbackOnly`：此方法可用于测试当前事务是否已被标记为回滚。


    Bean 不允许显式回滚事务，但它可以获取 `javax.ejb.EJBContext` 资源（通过容器注入或 JNDI 查找），并调用其 `setRollbackOnly()`
    方法，以确保容器不会提交该事务。类似地，Bean 方法可以随时调用 `EJBContext.getRollbackOnly()` 方法，以确定当前事务是否已被标记为回滚——无论是由当前
    Bean、其他 Bean 还是与当前事务关联的资源所标记。


    ### Bean 管理事务（BMT）划分


    对于某些企业 Bean，声明式的 CMT 服务可能无法提供它们所需的划分粒度。例如，客户端可能希望调用会话 Bean 上的多个方法，而不希望每个方法在完成后都提交其工作。在这种情况下，客户端有几种选择：它可以实例化自己的
    JTA（或资源本地）事务，从而显式控制事务的开始/结束边界；它可以编写一个自定义的 CMT 会话 Bean，将工作封装在一个事务性 Bean 方法内，并在容器管理的事务中执行这些步骤；或者，它可以通过使用
    EJB 上下文中可用的事务资源来显式控制事务划分。


    EJB 为企业 Bean 提供了后一种选项——称为 Bean 管理事务（BMT）支持——作为处理其事务事件划分的便捷方式。要关闭自动的 CMT 划分服务，企业
    Bean 只需指定 `@TransactionManagement(TransactionManagementType.BEAN)` 注解，或在 `ejb-jar.xml`
    文件中将会话 Bean 分配等效的元数据。使用 BMT 划分时，EJB 容器仍然通过 Bean 的 `EJBContext` 对象中可用的 `UserTransaction`
    对象，为 Bean 提供事务支持。主要区别在于，Bean 代码显式调用 begin、commit 和 rollback 事务，而不是使用 CMT 属性以声明方式为其方法分配事务行为。容器不会干预
    BMT 方法来开始和提交事务，也不会将客户端开始的事务传播给选择自行划分事务的 Bean。虽然任何给定的企业 Bean 必须为其方法选择一种方案（CMT 与
    BMT 划分），但两种类型的 Bean 可以在单个事务上下文内相互交互。


    为了划分事务，企业 Bean 通过注入获取一个 `EJBContext`（即，对于会话 Bean 是 `SessionContext`，对于 MDB 是 `MessageDrivenContext`）资源：


    ```

    @Resource

    SessionContext sessionContext;

    ```


    然后通过此资源获取一个 JTA `javax.transaction.UserTransaction` 实例：


    ```

    UserTransaction txn = sessionContext.getUserTransaction();

    ```


    这个由 EJB 容器提供的 `UserTransaction` 接口为 Bean 提供了 `begin()`、`commit()` 和 `rollback()`
    事务划分方法。类似地，非企业 Bean 客户端可以从 EJB 容器之外的 JTA 服务器获取 `UserTransaction` 资源，以从应用程序客户端环境划分事务，或者它们可以使用通过
    `EntityManager` 获取的非 JTA 资源本地 `EntityTransaction`（见下文）。然而，无论它们如何开始事务，当它们调用会话 Bean
    方法时，该事务都会成为上下文中的事务，并且表 8-3 中的规则适用。


    在我们即将研究的示例中，一个使用 `EXTENDED` 持久化上下文和 BMT 划分的有状态会话 Bean 在一个方法中启动一个事务，该事务随后传播到后续的方法调用，直到该事务最终在另一个方法中被提交。这种行为的实现，无法通过在
    CMT 会话 Bean 上分别调用这些方法并采用相同的方法结构来达成，尽管可以通过将这些单独的调用包装在 CMT 会话 Bean 的单个 CMT 划分的自定义方法内来实现相同的结果。


    注意


    EJB 服务器如何连接事务上下文？您可能对 EJB 服务器如何能够自动将数据库连接以及在企业 Bean 内部以编程方式获取的其他资源注册到事务上下文中感到好奇。由于
    EJB 服务器为执行 Bean 方法提供了上下文，它能够干预这些请求并执行这种副作用逻辑，而不会中断方法内的执行流程。也就是说，它在方法调用执行之前进行拦截；执行一些额外的工作（例如检查事务上下文的状态，可能创建一个新事务，并将企业
    Bean 与该上下文关联）；然后调用 Bean 方法。从 Bean 方法调用返回后，它再次有机会执行额外的逻辑，例如提交在调用该方法时创建的事务，然后再将控制权返回给最初调用该
    Bean 方法的客户端。


    当我们使用 Bean 管理事务时，将消息投递到 `onMessage` 方法的过程发生在 JTA 事务上下文之外。


    该事务将：


    *   在我们于 `onMessage` 方法内调用 `UserTransaction.begin` 方法时开始，并且

    *   在我们调用 `UserTransaction.commit` 或 `UserTransaction.rollback` 时结束。


    请注意，任何对 `Connection.createSession` 方法的调用都应在事务内进行。


    ### 隐式提交与显式提交


    使用 CMT 时，容器要求其在调用方法时开始的任何事务，都必须在方法返回给调用者时结束。这被称为隐式提交行为，有时也称为自动提交行为。容器必须强制执行此规则，否则当控制权沿进程堆栈向上传递时，可能会丢失对事务的跟踪。虽然您仍然可以使用
    CMT 的容器管理事务来允许在单个事务内调用多个方法，但您必须通过将方法调用包装在外部容器管理的方法中来实现这一点。从客户端的角度来看，这仍然是对包装器方法的单个方法调用。


    当对有状态会话 Bean 使用 BMT 时，您可以灵活地实现显式提交模型，其中 Bean 或客户端可以控制事务的开始和结束，并在此期间显式调用多个方法，最后通过显式调用
    commit 或 rollback 来结束工作。这给客户端或 Bean 开发者带来了负担，以确保事务不会悬空。然而，如果处理得当，当应用程序需要这种行为时，这将是一个强大的工具。如前所述，EJB
    为会话 Bean 和 MDB 提供了一个内置事务供其使用——`javax.transaction.UserTransaction`——Bean 可以通过其注入的
    `javax.ejb.EJBContext` 属性（作为 `SessionContext` 或 `MessageDrivenContext` 实例）访问该事务。


    我们将在本章末尾的示例应用程序中进一步探讨隐式和显式提交行为。

    '
- fmt: '# Using Transactions with JPA Entities


    This section will discuss the following questions:


    - How are transactions managed in the persistence layer?

    - What options does the persistence framework offer for controlling transactions
    involving entities?

    - What is the role of the persistence context in a transaction?

    - How do entities become associated with, and dissociated from, a transactional
    context?


    If you recall from Chapter [3](#A311833_3_En_3_Chapter.html), a persistence unit
    defines a set of entity classes, and a persistence context is a managed set of
    entity instances from a single persistence unit. At any point in time, across
    multiple applications executing in an application server, many persistence contexts
    may be actively associated with any given persistence unit, but each persistence
    context is associated with, at most, one transaction context.


    ## Relationship Between Entities and a Transaction Context


    From the preceding discussion about how the EJB server acts as a transaction coordinator
    in associating resources with a transaction context, you may have realized that
    the persistence context is the resource that gets associated with a transaction.
    In this way, a persistence context is propagated through method calls so that
    entities in a persistence unit can see each other’s intermediate state, through
    their common persistence context, whenever they are associated with the same transaction
    context. Also, the restriction that only one persistence context for any given
    persistence unit must be associated with a given transaction context ensures that
    for any entity of type `T` with identity `I`, its state will be represented by
    only one persistence context within any transaction context.


    Within an application thread, only one transaction context is available at any
    moment, but the EJB server is free to dissociate one persistence context from
    that thread and associate a new persistence context for the same persistence unit
    to satisfy transaction isolation boundaries. When the EJB server does this, the
    newly instantiated persistence context is not able to see the intermediate changes
    made to any entities associated with the suspended persistence context.


    ## Container-Managed vs. Application-Managed Persistence Context


    The persistence services in EJB let you opt out of container-managed persistence
    contexts altogether and manage the life cycles of your persistence context explicitly
    within your application code. When an `EntityManager` instance is injected (or
    acquired through JNDI), it comes in as a container-managed persistence context.
    The container automatically associates container-managed persistence contexts
    with any transaction that happens to be in context at the time that the `EntityManager`
    is used, and it destroys the persistence context when the transaction concludes
    (with one caveat—see extended persistence contexts, below). Should an application
    wish to control how or whether its persistence contexts are associated with transactions,
    and whether it survives past transactional boundaries, it may obtain an `EntityManagerFactory`
    (again, through container injection or JNDI lookup) and explicitly create the
    `EntityManager` instances that manage their persistence contexts. An application-managed
    persistence context is used when the `EntityManager` is obtained through an `EntityManagerFactory`—a
    requirement when running outside the Java EE container. For more information on
    using an application-managed `EntityManager` outside of a Java EE container, as
    in a pure Java SE environment, please see Chapter [4](#A311833_3_En_4_Chapter.html).


    ## Transaction-Scoped Persistence Context vs. Extended Persistence Context


    A persistence context that is created when a transaction is created, and destroyed
    when the transaction ends, is known as a transaction-scoped persistence context.
    This is the behavior of persistence contexts associated with all `EntityManager`s
    used on a stateless session bean.


    For stateful session beans, there exists a special form of container-managed `EntityManager`
    that is not bound to the life of a transaction, but it is instead bound to the
    life of a stateful session bean itself. This is known as an extended `EntityManager`,
    and it behaves much like an application-managed persistence context but the EJB
    container conveniently manages its life cycle. Because an extended persistence
    context is not destroyed at the conclusion of each transaction as is a transaction-scoped
    persistence context, entities can remain in a managed state even after they have
    been synchronized with the database. In some cases, this avoids the need to re-query
    them or otherwise obtain a managed instance if you wish to continue working with
    them after a commit. In a conversational environment, such as a Web application,
    this can be very useful. An extended persistence context stays open until its
    context stateful session bean is destroyed. Only stateful session beans may use
    extended persistence contexts. At the time an `EntityManager` instance is created,
    its persistence context type is defined, and it may not be changed during the
    `EntityManager`s lifetime. The default type is transaction scoped; to inject an
    `EntityManager` by specifying an extended persistence context, you may specify
    the injection directive with the following:


    ```

    @PersistenceContext(unitName="WineAppUnit", type = PersistenceContextType.EXTENDED)

    private EntityManager em;

    ```


    or you may define a `persistence-context-ref` element in the XML descriptor.


    In the transaction examples at the end of this chapter, we will compare the behavior
    of a stateless session bean using a transaction-scoped persistence context with
    a stateful session bean that uses an extended persistence context.


    ## JTA vs. Resource-Local EntityManagers


    An `EntityManager` may be defined to participate in either a JTA transaction or
    a non-JTA (resource-local) transaction. The features of JTA—most notably, support
    for distributed transactions—have been described previously, along with usage
    of the bean’s interface to a JTA transaction, `javax.transaction.UserTransaction`.
    Resource-local `EntityManager`s service transactions using the `javax.persistence.EntityTransaction`
    interface available to clients through the `EntityManager.getEntityTransaction()`
    method. This interface exposes the expected transaction demarcation methods `begin()`,
    `commit()`, and `rollback()`, along with `getRollbackOnly()` and `setRollbackOnly()`
    methods that are equivalent to the `EJBContext` and `UserTransaction` methods
    available to enterprise beans described previously, and an `isActive()` method
    to indicate whether a transaction is currently in progress.


    Container-managed `EntityManager`s must be JTA `EntityManager`s. Application-managed
    `EntityManager`s may be either JTA or resource-local, but they may only be JTA
    `EntityManager`s if the `EntityManager` resides in the Java EE environment.


    One reason you might want to use a resource-local `EntityManager` is that while
    JTA provides the infrastructure for distributed transactions, resource-local transactions
    can provide a performance optimization by eliminating the overhead of this infrastructure.
    Another reason is you may wish to use your JPA entities in a stand-alone Java
    SE environment where JTA or data-source resources are not supported.


    We will examine use of the `EntityTransaction` when we dissect a Java façade in
    the sample application later in this chapter.'
  raw: '## Using Transactions with JPA Entities


    This section will discuss the following questions:


    *   How are transactions managed in the persistence layer?

    *   What options does the persistence framework offer for controlling transactions
    involving entities?

    *   What is the role of the persistence context in a transaction?

    *   How do entities become associated with, and dissociated from, a transactional
    context?


    If you recall from Chapter [3](#A311833_3_En_3_Chapter.html), a persistence unit
    defines a set of entity classes, and a persistence context is a managed set of
    entity instances from a single persistence unit. At any point in time, across
    multiple applications executing in an application server, many persistence contexts
    may be actively associated with any given persistence unit, but each persistence
    context is associated with, at most, one transaction context.


    ### Relationship Between Entities and a Transaction Context


    From the preceding discussion about how the EJB server acts as a transaction coordinator
    in associating resources with a transaction context, you may have realized that
    the persistence context is the resource that gets associated with a transaction.
    In this way, a persistence context is propagated through method calls so that
    entities in a persistence unit can see each other’s intermediate state, through
    their common persistence context, whenever they are associated with the same transaction
    context. Also, the restriction that only one persistence context for any given
    persistence unit must be associated with a given transaction context ensures that
    for any entity of type `T` with identity `I`, its state will be represented by
    only one persistence context within any transaction context.


    Within an application thread, only one transaction context is available at any
    moment, but the EJB server is free to dissociate one persistence context from
    that thread and associate a new persistence context for the same persistence unit
    to satisfy transaction isolation boundaries. When the EJB server does this, the
    newly instantiated persistence context is not able to see the intermediate changes
    made to any entities associated with the suspended persistence context.


    ### Container-Managed vs. Application-Managed Persistence Context


    The persistence services in EJB let you opt out of container-managed persistence
    contexts altogether and manage the life cycles of your persistence context explicitly
    within your application code. When an `EntityManager` instance is injected (or
    acquired through JNDI), it comes in as a container-managed persistence context.
    The container automatically associates container-managed persistence contexts
    with any transaction that happens to be in context at the time that the `EntityManager`
    is used, and it destroys the persistence context when the transaction concludes
    (with one caveat`—`see extended persistence contexts, below). Should an application
    wish to control how or whether its persistence contexts are associated with transactions,
    and whether it survives past transactional boundaries, it may obtain an `EntityManagerFactory`
    (again, through container injection or JNDI lookup) and explicitly create the
    `EntityManager` instances that manage their persistence contexts. An application-managed
    persistence context is used when the `EntityManager` is obtained through an `EntityManagerFactory`—a
    requirement when running outside the Java EE container. For more information on
    using an application-managed `EntityManager` outside of a Java EE container, as
    in a pure Java SE environment, please see Chapter [4](#A311833_3_En_4_Chapter.html).


    ### Transaction-Scoped Persistence Context vs. Extended Persistence Context


    A persistence context that is created when a transaction is created, and destroyed
    when the transaction ends, is known as a transaction-scoped persistence context.
    This is the behavior of persistence contexts associated with all EntityManagers
    used on a stateless session bean.


    For stateful session beans, there exists a special form of container-managed EntityManager
    that is not bound to the life of a transaction, but it is instead bound to the
    life of a stateful session bean itself. This is known as an extended `EntityManager`,
    and it behaves much like an application-managed persistence context but the EJB
    container conveniently manages its life cycle. Because an extended persistence
    context is not destroyed at the conclusion of each transaction as is a transaction-scoped
    persistence context, entities can remain in a managed state even after they have
    been synchronized with the database. In some cases, this avoids the need to re-query
    them or otherwise obtain a managed instance if you wish to continue working with
    them after a commit. In a conversational environment, such as a Web application,
    this can be very useful. An extended persistence context stays open until its
    context stateful session bean is destroyed. Only stateful session beans may use
    extended persistence contexts. At the time an `EntityManager` instance is created,
    its persistence context type is defined, and it may not be changed during the
    `EntityManagers` lifetime. The default type is transaction scoped; to inject an
    `EntityManager` by specifying an extended persistence context, you may specify
    the injection directive with the following:


    ```

    @PersistenceContext(unitName="WineAppUnit", type = PersistenceContextType.EXTENDED)

    private EntityManager em;

    ```


    or you may define a `persistence-context-ref` element in the XML descriptor.


    In the transaction examples at the end of this chapter, we will compare the behavior
    of a stateless session bean using a transaction-scoped persistence context with
    a stateful session bean that uses an extended persistence context.


    ### JTA vs. Resource-Local EntityManagers


    An `EntityManager` may be defined to participate in either a JTA transaction or
    a non-JTA (resource-local) transaction. The features of JTA—most notably, support
    for distributed transactions—have been described previously, along with usage
    of the bean’s interface to a JTA transaction, `javax.transaction.UserTransaction`.
    Resource-local `EntityManagers` service transactions using the `javax.persistence.EntityTransaction`
    interface available to clients through the `EntityManager.getEntityTransaction()`
    method. This interface exposes the expected transaction demarcation methods `begin()`,
    `commit()`, and `rollback()`, along with `getRollbackOnly()` and `setRollbackOnly()`
    methods that are equivalent to the `EJBContext` and `UserTransaction` methods
    available to enterprise beans described previously, and an `isActive()` method
    to indicate whether a transaction is currently in progress.


    Container-managed `EntityManagers` must be JTA `EntityManagers`. Application-managed
    `EntityManagers` may be either JTA or resource-local, but they may only be JTA
    `EntityManagers` if the `EntityManager` resides in the Java EE environment.


    One reason you might want to use a resource-local `EntityManager` is that while
    JTA provides the infrastructure for distributed transactions, resource-local transactions
    can provide a performance optimization by eliminating the overhead of this infrastructure.
    Another reason is you may wish to use your JPA entities in a stand-alone Java
    SE environment where JTA or/or data-source resources are not supported.


    We will examine use of the `EntityTransaction` when we dissect a Java façade in
    the sample application later in this chapter.'
