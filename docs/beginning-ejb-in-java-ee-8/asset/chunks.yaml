    #### EJB 3.0


    EJB 3.0 是该标准演进过程中的一个重要里程碑。它引入了一种新的、简化的开发模型（见下文），使得 EJB 组件变成了 POJO（普通老式 Java 对象）；EJB
    的 Bean 类不再需要实现 EJB 特定的接口；并且，使 Java 类成为 EJB 的那些属性被提取到 Java 注解中，或者被捕获在外部 `ejb-jar.xml`
    部署描述符文件中。只需满足几个基本条件，任何类都可以成为 EJB，并利用 EJB 容器提供的企业级服务。


    同样在 EJB 3.0 中新增的是，规范中的实体 Bean 部分被新的 JPA 规范所取代，并且与新的简化开发模型一致，JPA 实体也是 POJO。JPA
    实体也与 EJB 容器解耦，可以独立于 EJB 使用，包括在纯 Java SE 环境中。


    #### EJB 3.1


    EJB 3.1 进一步改进了 EJB 3.0 中引入的简化开发模型。现在本地 EJB 支持无接口选项。为会话 Bean 提供了单例模式，以及异步和增强的定时器支持。EJB
    Lite——EJB 容器功能的一个可嵌入子集——允许 EJB 组件在与 EJB 客户端相同的虚拟机中执行。


    #### EJB 3.2


    在 EJB 3.2 中，异步和增强的定时器功能被添加到 EJB Lite 子集中。除了其他改进之外，Bean 开发者可以对生命周期拦截器方法的事务性拥有更多控制权，并且管理本地和远程行为声明的规则也得到了简化。


    JSR-000345 Enterprise JavaBeansTM 3.2 最终版可从以下网页下载：


    [`http://download.oracle.com/otndocs/jcp/ejb-3_2-fr-spec/index.html`](http://download.oracle.com/otndocs/jcp/ejb-3_2-fr-spec/index.html)


    最新的 EJB 3.2 版本发布日期为 2013 年 4 月 10 日，并且从 Java EE 7 到 EE 8 没有发生变化。


    主要变化包括以下内容：


    *   增强了禁用有状态会话 Bean 钝化的选项。

    *   增强了用于访问 EJB 模块中所有活动定时器的 `TimerService` API。

    *   增强了可嵌入的 `EJBContainer` 以实现 `AutoClosable` 接口。

    *   移除了对 `javax.ejb.Timer` 和 `javax.ejb.TimerHandle` 的限制，这些限制要求引用只能在 Bean 内部使用。

    *   增强了标准 JMS MDB 激活属性的列表。

    *   增加了对上一版本中可选功能的支持，并将其描述移至单独的 EJB 可选功能文档中。


    ### EJB 3 简化开发模型


    EJB 3.0 与早期版本相比有显著不同。EJB 3 的设计者着手重新设计开发体验；引入一个大大简化的开发模型，以减少企业 Bean 本身的复杂性；同时，整合了许多同类技术中的理念。共识是：该规范被广泛认为已经实现了这些目标，并且在此过程中克服了许多阻碍早期版本
    EJB 被广泛采用的问题。


    #### XML 与注解


    如果你熟悉早期版本的 EJB，你在 EJB 3 中首先会注意到的事情之一是，不再需要在部署描述符中捕获 EJB 元数据。EJB 现在允许你使用 Java 注解将
    EJB 元数据存储在 Bean 源代码中。这并不是说 XML 部署描述符已经消失；它们仍然存在并且运行良好，许多开发者更喜欢它们而不是注解。使用 XML 可以将
    Java 源代码与 EJB 元数据解耦，允许相同的实体或企业 Bean 类在不同的上下文中使用，其中特定于上下文的信息被捕获在 XML 中，并且不会“污染”
    Bean 类。


    然而，许多用户更倾向于在其 POJO 类的上下文中直接查看他们的 EJB 元数据并使用注解。为了避免陷入一场“宗教战争”（双方都有很多直言不讳的支持者），我们建议你自己选择。我们遵循的一个简单规则是：如果我们需要将实体和
    Bean 类与其 EJB 元数据解耦，例如当我们想要对两个不同的实体继承策略使用相同的实体类时，我们将元数据放在 XML 中。否则，我们坚持使用注解。别忘了——你总是可以混合搭配，依靠一个坚定的策略：每当使用
    XML 和注解都为某个元素指定了元数据时，XML 总是胜出。这允许 Bean 开发者下游的任何角色（参见本章后面的“EJB 角色”部分）覆盖元数据设置，而无需更新
    Java 源代码，因为覆盖可以专门应用于 XML 描述符。


    注意


    我们还推荐一种更高级的策略：仅在定义企业 Bean 或实体的行为（该行为真正是其定义不可或缺的一部分）时使用注解，例如实体关系字段的关系类型，或会话 Bean
    上方法的事务要求。任何可以合理覆盖的内容，例如实体映射到的表的名称，或用于填充实体主键的值生成器的详细信息，都将放在 XML 描述符中，在那里可以由应用程序组装器（或许与数据库管理员协商）在部署时指定。虽然在
    Java 源文件中使用注解指定默认值没有坏处，但这种方法认识到了固定元数据（不应修改）和松散元数据（可以在不改变企业 Bean 或实体行为的情况下自由修改）之间的区别。


    #### 依赖注入


    在 Java EE 容器中实例化 EJB 之后，但在将其交给客户端之前，容器可以根据为该企业 Bean 定义的规则初始化实例上的属性数据。此功能称为依赖注入，它是控制反转模式的一个例子，即由外部提供者而不是类本身来初始化对象实例的属性。EJB
    3 在 Java EE 中引入了依赖注入的使用，并且很大程度上因为它非常流行，这个功能现在有了自己的规范。当前的依赖注入 API 通过 JSR-330：Java
    ^(TM) 的依赖注入进行管理，并且该功能通过 JSR 346：Java ^(TM) EE 1.1 的上下文和依赖注入进一步扩展，我们将在第 10 章“上下文和依赖注入”中介绍。


    注意


    注入使用“推送”模型将数据推送到 Bean，并且无论 Bean 是否实际使用该数据都会发生。如果有可能不使用该数据，Bean 可以选择避免承担资源派生的成本，而仅在确实（或可能）使用时，通过在
    Java 代码中执行 Java 命名和目录接口（JNDI）查找来“拉取”数据。


    EJB 中依赖注入使用的常见示例如下：


    *   将 `EntityManager` 注入到会话 Bean 中，以便与持久化单元中的实体进行交互

    *   将 `UserTransaction` 注入到管理其事务边界的会话 Bean 中

