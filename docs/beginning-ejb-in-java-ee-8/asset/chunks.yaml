- fmt: '# Building, Deploying, and Testing: A Transactional Scenario from the Wines
    Online Application


    Now that we’ve examined many of the details of transaction support offered by
    EJB, let’s execute the test cases we just covered.


    For both the CMT and BMT scenarios, we invoke a servlet client that creates a
    new customer, builds up a shopping cart consisting of cart item entries, and then
    creates a customer order consisting of order items based on the cart items in
    the cart. We chose these examples for this chapter because they involve multiple
    operations that can be partitioned into transactional work units of greater or
    less granularity depending on the requirements of the client.


    To illustrate the default support provided by EJB, we use the example we explored
    first: a standard stateless session bean implementation that uses the default
    CMT demarcation. In our second example, we demonstrate the client taking some
    responsibility for managing the transaction, using a stateful session bean using
    BMT demarcation and an extended persistence context.


    ## Prerequisites


    Before performing any of the steps detailed in the next sections, complete the
    “Getting Started” section of Chapter [1](#A311833_3_En_1_Chapter.html). This section
    will walk you through the installation and environment setup required for the
    samples in this chapter.


    ## Opening the Sample Application


    This chapter’s root project holds a dependency on the JPA persistence unit defined
    in `Chapter07-ServiceIntegration-jpa`. Launch the NetBeans IDE, and open the `Chapter08-TransactionSamples`
    project using the `File` ➤ `Open Project` menu. Make sure that the `Open Required
    Projects` check box is checked. See Figure [8-1](#A311833_3_En_8_Chapter.html#Fig1).


    ![A311833_3_En_8_Fig1_HTML.jpg](A311833_3_En_8_Fig1_HTML.jpg)


    Figure 8-1 Opening the `Chapter08-TransactionSamples` project


    This application consists of three modules: a JPA persistence unit taken directly
    from Chapter [7](#A311833_3_En_7_Chapter.html); an EJB module containing CMT and
    BMT session beans explored in this chapter; and a Web module containing the two
    servlet clients that we also examined. See Figure [8-2](#A311833_3_En_8_Chapter.html#Fig2).


    ![A311833_3_En_8_Fig2_HTML.jpg](A311833_3_En_8_Fig2_HTML.jpg)


    Figure 8-2 Observing the structure of the `Chapter08-TransactionSamples` application


    ## Creating the Database Connection


    The samples in this chapter require a database connection, and for these tests
    we will use the Derby database that is bundled with NetBeans and Glassfish. If
    you have already created the `WineApp` database, also used for the examples in
    Chapter [3](#A311833_3_En_3_Chapter.html), Chapter [4](#A311833_3_En_4_Chapter.html),
    and Chapter [7](#A311833_3_En_7_Chapter.html), continue to the next step. Otherwise,
    click on the `Services` tab, expand the `Databases` icon, and invoke `Create Database...`
    on the `Java DB` node. Create a database named `WineApp` with username and password
    `wineapp/wineapp` as shown in Figure [8-3](#A311833_3_En_8_Chapter.html#Fig3).


    ![A311833_3_En_8_Fig3_HTML.jpg](A311833_3_En_8_Fig3_HTML.jpg)


    Figure 8-3 Creating the `WineApp` database and connection


    This last step created a database connection, which is referenced from the persistence
    units in the `persistence.xml` files found in both the JPA and EJB projects. While
    it is possible to pre-create the database objects (tables, sequences, key constraints,
    etc.), we will let JPA create these database objects automatically the first time
    they are needed by each persistence unit.


    ## Compiling the Sources


    After the `WineApp` database has been created, invoke the context menu on `Chapter08-TransactionSamples`
    node, and build the application by selecting the `Clean and Build` menu option
    as shown in Figure [8-4](#A311833_3_En_8_Chapter.html#Fig4).


    ![A311833_3_En_8_Fig4_HTML.jpg](A311833_3_En_8_Fig4_HTML.jpg)


    Figure 8-4 Building the application


    ## Deploying and Running the Client Programs


    Once the project sources have built successfully, invoke the same menu and choose
    `Deploy` as shown in Figure [8-5](#A311833_3_En_8_Chapter.html#Fig5).


    ![A311833_3_En_8_Fig5_HTML.jpg](A311833_3_En_8_Fig5_HTML.jpg)


    Figure 8-5 Deploying the application


    When that completes, invoke either the `Run` or `Debug` menu item to launch the
    `OrderProcessorCMTClient` servlet. We have preconfigured the `Chapter09-TransactionSamples`
    project to run this servlet by default. The servlet will display the output from
    the example using the default browser configured for NetBeans as shown in Figure
    [8-6](#A311833_3_En_8_Chapter.html#Fig6).


    ![A311833_3_En_8_Fig6_HTML.jpg](A311833_3_En_8_Fig6_HTML.jpg)


    Figure 8-6 Output from running the `OrderProcessorCMTClient` servlet


    If you choose to debug, feel free to add some breakpoints to the `OrderProcessorCMTBean.java`
    session bean, the `OrderProcessorCMTClient.java` servlet, the JPA entities, or
    any of the other source files in the application.


    Next, launch the second example, the `OrderProcessorBMTClient` servlet. To do
    this, you may either update your browser URL to replace `CMT` with `BMT` or update
    the properties of the `Chapter09-TransactionSamples` project. Just re-deploy the
    project using the `OrderProcessorCMTBean.java` session bean and then selecting
    the `Run` category. The result is shown in Figure [8-7](#A311833_3_En_8_Chapter.html#Fig7).


    ![A311833_3_En_8_Fig7_HTML.jpg](A311833_3_En_8_Fig7_HTML.jpg)


    Figure 8-7 Configuring the `Chapter09-TransactionSamples` project’s Run target


    ## Summary


    This chapter has defined the concepts essential to all transaction behavior and
    explored the transactional features offered by the EJB server and interfaces accessible
    to the enterprise bean developer.


    We began by exploring the core ACID characteristics that define a transaction—atomicity,
    consistency, isolation, and durability. We introduced JTA and described the features
    and benefits of its distributed transaction model, including the behavior of the
    essential two-phase commit protocol.


    We looked at how the EJB server acts as a JTA transaction manager, allowing EJBs
    to participate seamlessly in distributed transactions, and alleviating bean developers
    of the need to explicitly bind persistence or other transactional operations with
    transactional resources. We also detailed EJB’s declarative support for these
    transaction services to enterprise bean developers, exploring both CMT and BMT
    demarcation–supported enterprise beans, and using both implicit and explicit commit
    models. For CMT beans, we described the behavior and implications of each of the
    six transaction attributes that may be used to define the transactional behavior
    of a CMT bean method. In the JPA realm, we explored the relationship between transactions
    and persistence contexts and explained how extended persistence contexts may be
    used with stateful session beans to support entities in resolving relationships
    with other entities, even outside of a transactional context.


    The chapter then examined some live examples based on a scenario taken from the
    Wines Online application. These examples illustrated the use of CMT and BMT demarcation,
    extended persistence context on stateful session beans, rollback scenarios, client-controlled
    transactions, interactions with entities outside a transactional context using
    a BMT bean, and transaction context propagation between methods on a CMT bean.


    We concluded with steps for running the CMT and BMT example applications that
    we examined.


    In the next chapter, we will explore some techniques you can use to analyze the
    EJB-specific performance of your applications. Using a couple of common examples,
    we will demonstrate how you can set up your own tests to analyze your specific
    application components.'
