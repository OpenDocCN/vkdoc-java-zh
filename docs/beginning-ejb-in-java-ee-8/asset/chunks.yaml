  trans: '

    ### 性能标准


    根据应用类型的不同，你的关注点会在两个基本性能指标之间有所侧重：**响应时间**和**吞吐量**。


    在处理同步交互式应用时，我们会定义一个可接受的最大响应时间。这是我们愿意等待应用给出响应的最长时间。


    对于批处理或后端应用，我们会定义可接受的最小吞吐量，通常以每秒事务数（TPS）来衡量，但这必须基于对系统中事务具体定义方式的透彻理解。


    这两个指标彼此之间有着千丝万缕的联系；然而，我们尚未找到它们之间任何数学或几何上的关系。


    我们的建议是，清晰且无歧义地定义你的性能指标，并针对明确的需求进行测试。不这样做，无异于为无休止的测试和调优敞开大门。


    由于我们将在性能测试运行期间收集数据，因此需要清楚理解基本的统计概念，下面我们来详细探讨一下。


    就本书而言，我们将响应时间定义为：客户端从发送请求的那一刻起，到收到来自应用的响应的最后一个字节为止，所必须等待的时间长度。


    我们从一次性能测试运行中收集的数据集，包含了构成测试脚本的每个请求的个体响应时间。测试脚本中的每个请求，由每个模拟用户在一段时间内依次执行。我们分析的基本度量是特定请求在所有用户中的响应时间的算术平均值：即平均响应时间（ART）。


    聚合平均响应时间（AART）是我们在分析性能数据时广泛使用的一个度量，我们将其定义为：测试脚本中每个个体请求的 ART 之和，除以该测试脚本中的请求数量。


    诚然，AART 在应用实际运行表现方面并无实际意义，但它确实能很好地指示整个系统的负载程度。因此，我们有时也将这个度量称为负载因子。一个典型的 AART 曲线，当以并发用户数为横轴绘制时，其形状如图
    9-1 所示。


    ![A311833_3_En_9_Fig1_HTML.jpg](img/A311833_3_En_9_Fig1_HTML.jpg)


    图 9-1


    一条典型的 AART 曲线


    吞吐量并不像响应时间那样是一个界限分明的度量。表达吞吐量的标准方式是 TPS，理解事务在被测应用中代表什么至关重要。它可能是一个单一的查询，也可能是一组特定的查询。在消息系统中，它可能是一条单一的消息；在基于
    Servlet 的应用中，它可能是一个请求。即使对于具体测量什么达成了共识，所获得的吞吐量值也常常会被误解。原因在于，许多人看待这个度量就像看待“英里每小时”一样：将其视为速度的度量。实际上，吞吐量是容量的度量。


    我们可以尝试用超市的类比来解释吞吐量的工作原理。想象一下，一家超市举办了一场促销活动，10 位购物者可以在 15 分钟内免费拿走他们能放进购物车的所有东西。超市就是应用，购物者类比于请求（或消息），而负责补货的超市员工则类比于系统中努力应对需求的各个组件。


    即使所有 10 位购物者都达到了容量上限（在 15 分钟内完全装满他们的购物车），这也不一定意味着他们拿走了超市里所有的东西。然而，随着我们增加购物者的数量，最终会达到一个点，即有足够多的购物者能在规定时间内清空超市。我们称这个点为饱和点，因为此时已无更多可用资源。当我们继续增加购物者数量超过这个点时，通道内的拥挤会导致购物者移动速度下降（响应时间变长），最终导致吞吐量实际下降。


    与 ART 类似，我们分析的基本度量是特定请求在所有用户中每秒请求数的算术平均值。我们称之为 TPS。


    为了分析性能数据，并且独立于特定性能测试所使用的吞吐量定义，我们引入了总事务速率（TTR）的概念。TTR 是测试脚本中每个请求的 TPS 测量值之和。TTR
    为我们提供了一个极好的系统容量指标。图 9-2 展示了一条典型的 TTR 曲线，它在约 100 个用户时达到饱和点。此时，曲线开始下降（例如，由于购物者过多）。


    ![A311833_3_En_9_Fig2_HTML.jpg](img/A311833_3_En_9_Fig2_HTML.jpg)


    图 9-2


    一条典型的 TTR 曲线


    图 9-1 中展示的 AART 曲线，与图 9-2 中展示的 TTR 曲线来自同一次测试运行的数据。如果你审视 AART 曲线，可以看到响应时间呈线性增长，直到达到
    100 个用户。之后，增长变得更加剧烈。这与 TTR 曲线相吻合，后者在 100 个用户时达到饱和点。此后，应用的整体性能开始下降。分析这两条曲线，你可以得出结论：在该性能测试的条件下，该应用的用户上限为
    100 人。


    ### 模拟应用使用情况


    本方法论这一节的目标是确保我们在尽可能模拟现实的测试条件下收集性能数据。这一点在进行整个应用的性能测试时尤为重要，而在为性能而设计时则相对次要。


    对于每个应用，都会有一些不同的使用场景同时运行。有时，我们可以用一个测试脚本和一个请求来模拟使用情况。在其他情况下，可能需要十几个场景，每个场景包含不同数量的请求。


    关于思考时间（也称为休眠时间）需要特别说明。这是测试脚本中每个个体请求执行之间所经过的时间。在现实生活中，思考时间可能变化很大。它可能短至几秒钟（例如，点击一个按钮进入下一页），也可能长达
    5 到 10 分钟（例如，查看过去一个月银行账户的交易记录）。对于性能测试，我们采用了两种基本策略：


    *   **使用真实思考时间**：此情况用于对完整、正在运行的应用进行性能测试时。

    *   **使用零思考时间**：此情况用于进行更通用的调查性测量时，例如比较编程技术。这样做的后果是我们并非在现实条件下进行测试。然而，我们可以进行精确的比较测量，一旦从这些结果中选出了最佳方案，我们就可以使用真实的思考时间进行测试。

    '
- fmt: '### Defining Test Metrics


    The methodology is based on using a fixed number of users per test run. A performance
    test is made up by a number of test runs, usually increasing the user load with
    each subsequent test run. Some people are interested in ramping up the number
    of users during a single test run. We believe that this introduces a new variable
    that can have negative effects on the results, and it is statistically incorrect
    from the standpoint of finding a maximum user load.


    The first step is finding a representative number of simultaneous users (the lower
    limit) that can be increased in a regular fashion until reaching the saturation
    point of the application (the upper limit). We typically have a couple of additional
    test runs over the upper limit, just to understand better the behavior (or misbehavior)
    of the application.


    Unfortunately, there is no exact science for choosing the upper limit up front.
    We usually select a random number of users and perform a couple of test runs in
    which the number of users is higher and lower than that initial random choice,
    and we analyze the results to determine the direction we should pursue—either
    increasing or decreasing the number of users.


    The second step is defining the sample size: that is, the length of time for which
    the test run will execute. To choose the actual sample size, we have to reach
    a compromise between two divergent interests. The first is that we want to have
    enough data so that the sample is statistically significant. The second is the
    desire to make the tests as short as possible, since we will have many test runs
    to do and we don’t want to spend too much time on them.


    To figure out the sample size, we perform a test run using the upper limit of
    users, for a longer-than-usual period of time. We then plot the `AART` against
    time and analyze the curve. We are looking for a segment of the curve that is
    pretty much stable.


    Another point that has to be made is that of data exclusion. When you first start
    a test, the response times are usually higher than normal. This is because all
    of the subsystems that make up the application take a little while to get up to
    speed. For example, the optimizer in the `JVM` needs a couple of minutes to optimize
    the running code. The same goes for the cache of the database, which will take
    a little time before it is useful (and so on with other components of the application).


    These unusually high response times that are seen initially only affect the first
    few users on a production application that will typically run for weeks. However,
    in our case, in which we will be testing for just a few minutes, these results
    will negatively skew our sample results. Because of this, we exclude the first
    few sets of data we collect, and we start the sample when the curve has stabilized.


    Thus, the sample size will start at a certain time after the actual test run has
    started, and it will last for a certain period that provides us with enough data
    to deem it statistically significant.


    Next is the issue of assessing the accuracy of the test results. Depending on
    the kind of performance test that is being conducted, you can use two different
    ways to measure accuracy with a high level of certainty.


    For performance tests that deal with a complete application, we usually calculate
    the following metric, which we call the quality of a sample:


    `quality = standard deviation / arithmetic mean`


    We usually apply this formula to the `AART` data collected.


    **Tip**


    Based on our experience, acceptable quality numbers lie in the range of 0.06 to
    0.2. When the quality number exceeds 0.25, we carefully analyze all of the available
    data to find out the reason for such a low-quality sample. Sometimes, this can
    lead us to discard the data generated by the test run in question.


    When doing tests focused on designing for performance and, more specifically,
    when the think time is zero, we use another method called calibration. Here we
    perform three test runs with the upper limit of users. We then compare the `AART`
    and `TTR` results of each test run against each other. The comparison is done
    as a percentage, and the greatest difference of all values is taken as the margin
    of error for the performance test.


    Now that we have described all the preparation work, we can move on to describe
    the actual test runs that will provide us with the data that we need to perform
    the analysis and to make the conclusions of the performance test. The actual test
    runs are rather mechanical and boring procedures in which you start with a test
    run using the lower limit of users, increase the number of users, perform another
    test run, and so on until you reach the upper limit. As mentioned earlier, you
    will probably want to have a couple of additional test runs in which the upper
    limit is exceeded.


    Because the base of the methodology is consistency, you will have to reset or
    restart every component or subsystem that makes up the application. In our case,
    that will be the database and the `Java EE` server.


    We will go over a practical example of implementing the methodology later in this
    chapter to illustrate how to use it.'
