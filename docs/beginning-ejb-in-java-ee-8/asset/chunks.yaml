    \ client.\n\n### EJB 3.2\n\nIn EJB 3.2, the Asynchronous and enhanced Timer features\
    \ are added to the EJB Lite subset. Along with other improvements, the bean developer\
    \ is offered more control over the transactionality of lifecycle interceptor methods,\
