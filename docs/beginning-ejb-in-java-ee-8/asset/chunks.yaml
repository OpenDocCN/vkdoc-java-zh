    \ `EJBContainer` to implement `AutoClosable` interface is enhanced.\n- The restrictions\
    \ on `javax.ejb.Timer` and `javax.ejb.TimerHandle` that required references to\
    \ be used only inside a bean were removed.\n- The list of standard JMS MDB activation\
    \ properties is enhanced.\n- Support for the optional features in the previous\
    \ release and moving their description to a separate EJB Optional Features documents\
    \ was added.\n\n### EJB 3 Simplified Development Model\n\nEJB 3.0 was a significant\
    \ departure from earlier releases. The architects of EJB 3 set out to redesign\
    \ the development experience; to introduce a greatly simplified development model\
    \ that would reduce the complexity of the enterprise beans themselves; and, at\
    \ the same time, incorporate many of the ideas found in peer technologies. The\
    \ consensus is in: the spec has been widely hailed as having achieved these goals,\
    \ and in so doing has overcome many of the problems that prevented earlier versions\
    \ of EJB from becoming widely adopted.\n\n#### XML and Annotations\n\nIf you are\
    \ familiar with earlier versions of EJB, one of the first things you will notice\
    \ in EJB 3 is that it is no longer necessary to capture EJB metadata in a deployment\
    \ descriptor. EJB now lets you store your EJB metadata inside your bean source\
    \ using Java annotations. This isn’t to say that XML deployment descriptors have\
    \ gone away; they are still alive and well, and many developers prefer them to\
    \ annotations. Using XML decouples the Java source from the EJB metadata, allowing\
    \ the same entity or enterprise bean classes to be used in different contexts,\
    \ where the context-specific information is captured in the XML and doesn’t “pollute”\
    \ the bean class.\n\nMany users, however, will prefer to view their EJB metadata\
    \ directly in the context of their POJO classes and use annotations. To avoid\
    \ wading into a religious war (vocal proponents on both sides abound), we suggest\
    \ that you choose for yourself. A simple rule we follow is this: if we need to\
    \ decouple our entity and bean classes from their EJB metadata, as when we want\
    \ to use the same entity classes with two different entity inheritance strategies,\
    \ we put our metadata in XML. Otherwise, we stick with annotations. Don’t forget—you\
    \ can always mix and match, relying on the firm policy that whenever metadata\
    \ is specified for an element using both XML and annotations, the XML always wins.\
