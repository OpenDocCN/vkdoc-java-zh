- fmt: "# Interceptors: Entity Callback Methods\n\nJPA provides support for a number\
    \ of callback methods, or interceptors, that allow you to add your own custom\
    \ code when certain lifecycle events occur on an entity or a mapped superclass.\
    \ You can register interceptors to be invoked when certain lifecycle events occur\
    \ on specific entity types, or broadly whenever a lifecycle event occurs on any\
    \ entity. The latter case is one of the few times when you must use XML to specify\
    \ metadata, since the effect is applied globally across all entities in the persistence\
    \ unit.\n\nThe following annotations may be applied to methods to indicate that\
    \ they are entity callback methods:\n\n* `@PrePersist`\n* `@PostPersist`\n* `@PreRemove`\n\
    * `@PostRemove`\n* `@PreUpdate`\n* `@PostUpdate`\n* `@PostLoad`\n\nTo use a callback\
    \ method, you write a method to perform the behavior you desire and then simply\
    \ annotate it using one of the above lifecycle callback annotations (for instance,\
    \ `@PrePersist`). Callback methods may have any name you choose, but must not\
    \ take any parameters and must return `void`. A single method may be annotated\
    \ with multiple entity callback annotations, if desired.\n\nAlternatively, callback\
    \ classes may be registered for an entity (or a mapped superclass) to intercept\
    \ one or more lifecycle events on one or more entity types. Multiple interceptor\
    \ methods may be registered for any given entity lifecycle event, and they are\
    \ executed in the order in which they are specified.\n\nEntity callback methods\
    \ can be used to validate an entity’s contents prior to the entity being persisted,\
    \ and to populate transient, derived fields following instantiation. Listing [4-34](#A311833_3_En_4_Chapter.html#Par184)\
    \ shows how you might plug an `@PreUpdate` interceptor into the `FullTimeEmployee`\
    \ entity in your company’s payroll system to give all employees from a certain\
    \ ZIP code an automatic raise whenever that employee instance is updated for any\
    \ reason. (Wishful thinking!)\n\n```java\n@Entity\n@Inheritance\npublic class\
    \ FullTimeEmployee extends Employee {\n...\n@PreUpdate\npublic void wishfulThinking()\
    \ {\nif (getHomeAddress().getZipCode() == 94402) {\nsetSalary(getSalary() + 10000);\n\
    }\n}\n...\n}\n```\n\n*Listing 4-34*  \n*FullTimeEmployee.java, Employing an Illicit\
    \ Entity Callback to Finally Stick It to the Man!*\n\n## Compiling, Deploying,\
    \ and Testing the JPA Entities\n\nFor each of the seven major features described\
    \ in this chapter, we provide a stand-alone NetBeans project to test the feature\
    \ from a pure Java SE context. In addition, each of these projects is accompanied\
    \ by a dedicated HTTP servlet that will test the same code through a Java EE Web\
    \ application. You are encouraged to explore these samples from both client environments,\
    \ edit the JPA entities and test code, and observe the results.\n\n### Prerequisites\n\
    \nBefore performing any of the steps detailed in the next sections, complete the\
    \ “Getting Started” section of Chapter [1](#A311833_3_En_1_Chapter.html). This\
    \ section will walk you through the installation and environment setup required\
    \ for the samples in this chapter.\n\n### Opening the Sample Application\n\nCopy\
    \ the `Chapter04-PersistenceIISamples` directory and its contents into a directory\
    \ of your choice. Run the NetBeans IDE, and open the `Chapter04-PersistenceIISamples`\
    \ project using the `File` ➤ `Open Project` menu. Make sure that the “`Open Required\
    \ Projects`” check box is checked. See Figure [4-6](#A311833_3_En_4_Chapter.html#Fig6).\n\
    \n![A311833_3_En_4_Fig6_HTML.jpg](A311833_3_En_4_Fig6_HTML.jpg)\n\n*Figure 4-6*\
    \  \n*Opening the Chapter04-PersistenceIISamples project*\n\nNo EJB Session beans\
    \ are used in these examples, although they could easily have been used instead\
    \ of the Java service façade classes. The Java facades emulate the default transactional\
    \ behavior of a Stateless Session bean by auto-committing the results whenever\
    \ they perform a `persist`, `merge`, or `remove` operation. The principle difference\
    \ is that EJBs execute in an EJB container, which offers enterprise services that\
    \ are not required for these JPA examples.\n\nThe samples for this chapter consist\
    \ of seven Java class libraries and one Web application containing a servlet for\
    \ each of the seven Java libraries. Expand the first Java class library—`Chapter04-PersistenceIISamples-embeddable`,\
    \ and observe the general structure common to each project as shown in Figure\
    \ [4-7](#A311833_3_En_4_Chapter.html#Fig7).\n\n![A311833_3_En_4_Fig7_HTML.jpg](A311833_3_En_4_Fig7_HTML.jpg)\n\
    \n*Figure 4-7*  \n*Observing the structure of the Chapter04-PersistenceIISamples-joined\
    \ project*\n\nEach Java class library contains the following:\n\n* A single JPA\
    \ persistence unit consisting of some number of JPA entities or other mapped classes\
    \ along with a `META-INF/persistence.xml` file\n* A Java service façade–`JavaServiceFacade.java`–a\
    \ wrapper class that provides CRUD methods for manipulating the JPA entities in\
    \ the context persistence unit\n* A Java client–`JavaServiceFacadeClient.java`–for\
    \ the service façade that executes the test case for that persistence unit\n\n\
    ### Creating the Database Connection\n\nThe samples in this chapter require a\
    \ database connection, and for these tests we will use the Derby database that\
    \ is bundled with NetBeans and Glassfish. If you have not already created the\
    \ WineApp database, also used for the Chapter [3](#A311833_3_En_3_Chapter.html)\
    \ examples, click on the `Services` tab, expand the `Databases` icon, and invoke\
    \ “`Create Database...`” on the `Java DB` node. Create a database named “`WineApp`”\
    \ with username and password `wineapp/wineapp` as shown in Figure [4-8](#A311833_3_En_4_Chapter.html#Fig8).\n\
    \n![A311833_3_En_4_Fig8_HTML.jpg](A311833_3_En_4_Fig8_HTML.jpg)\n\n*Figure 4-8*\
    \  \n*Creating the WineApp database and connection*\n\nIn case you did create\
    \ the WineApp database in Chapter [3](#A311833_3_En_3_Chapter.html), then you\
    \ should find it underneath the Java DB section as shown in Figure [4-9](#A311833_3_En_4_Chapter.html#Fig9).\n\
    \n![A311833_3_En_4_Fig9_HTML.jpg](A311833_3_En_4_Fig9_HTML.jpg)\n\n*Figure 4-9*\
    \  \n*“WineApp” Java DB*\n\nThis last step created a database connection and is\
    \ referenced from the persistence units in each of the `persistence.xml` files\
    \ found in the JPA projects. While it is possible to pre-create the database objects\
    \ (tables, sequences, key constraints, and so on), we will let JPA create these\
    \ database objects automatically the first time they are needed by each persistence\
    \ unit.\n\n### Compiling the Sources\n\nInvoke the context menu on `Chapter04-PersistenceIISamples`\
    \ node, and build the application by selecting the `Clean and Build` menu option\
    \ as shown in Figure [4-10](#A311833_3_En_4_Chapter.html#Fig10).\n\n![A311833_3_En_4_Fig10_HTML.jpg](A311833_3_En_4_Fig10_HTML.jpg)\n\
    \n*Figure 4-10*  \n*Building the application*"
  raw: '## Interceptors: Entity Callback Methods


    JPA provides support for a number of callback methods, or interceptors, that allow
    you to add your own custom code when certain lifecycle events occur on an entity
    or a mapped superclass. You can register interceptors to be invoked when certain
    lifecycle events occur on specific entity types, or broadly whenever a lifecycle
    event occurs on any entity. The latter case is one of the few times when you must
    use XML to specify metadata, since the effect is applied globally across all entities
    in the persistence unit.


    The following annotations may be applied to methods to indicate that they are
    entity callback methods :


    *   `@PrePersist`

    *   `@PostPersist`

    *   `@PreRemove`

    *   `@PostRemove`

    *   `@PreUpdate`

    *   `@PostUpdate`

    *   `@PostLoad`


    To use a callback method, you write a method to perform the behavior you desire
    and then simply annotate it using one of the above lifecycle callback annotations
    (for instance, `@PrePersist`). Callback methods may have any name you choose,
    but must not take any parameters and must return void. A single method may be
    annotated with multiple entity callback annotations, if desired.


    Alternatively, callback classes may be registered for an entity (or a mapped superclass)
    to intercept one or more lifecycle events on one or more entity types. Multiple
    interceptor methods may be registered for any given entity lifecycle event, and
    they are executed in the order in which they are specified.


    Entity callback methods can be used to validate an entity’s contents prior to
    the entity being persisted, and to populate transient, derived fields following
    instantiation. Listing [4-34](#A311833_3_En_4_Chapter.html#Par184) shows how you
    might plug an `@PreUpdate` interceptor into the `FullTimeEmployee` entity in your
    company’s payroll system to give all employees from a certain ZIP code an automatic
    raise whenever that employee instance is updated for any reason. (Wishful thinking!)


    ```

    @Entity

    @Inheritance

    public class FullTimeEmployee extends Employee {

    ...

    @PreUpdate

    public void wishfulThinking() {

    if (getHomeAddress().getZipCode() == 94402) {

    setSalary(getSalary() + 10000);

    }

    }

    ...

    }

    Listing 4-34

    FullTimeEmployee.java, Employing an Illicit Entity Callback to Finally Stick It
    to the Man!

    ```


    ## Compiling, Deploying, and Testing the JPA Entities


    For each of the seven major features described in this chapter, we provide a stand-alone
    NetBeans project to test the feature from a pure Java SE context. In addition,
    each of these projects is accompanied by a dedicated HTTP servlet that will test
    the same code through a Java EE Web application. You are encouraged to explore
    these samples from both client environments, edit the JPA entities and test code,
    and observe the results.


    ### Prerequisites


    Before performing any of the steps detailed in the next sections, complete the
    “Getting Started” section of Chapter [1](#A311833_3_En_1_Chapter.html). This section
    will walk you through the installation and environment setup required for the
    samples in this chapter.


    ### Opening the Sample Application


    Copy the `Chapter04-PersistenceIISamples` directory and its contents into a directory
    of your choice. Run the NetBeans IDE, and open the `Chapter04-PersistenceIISamples`
    project using the `File` ➤ `Open Project` menu. Make sure that the “`Open Required
    Projects`” check box is checked. See Figure [4-6](#A311833_3_En_4_Chapter.html#Fig6).


    ![A311833_3_En_4_Fig6_HTML.jpg](A311833_3_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Opening the Chapter04-PersistenceIISamples project


    No EJB Session beans are used in these examples, although they could easily have
    been used instead of the Java service façade classes. The Java facades emulate
    the default transactional behavior of a Stateless Session bean by auto-committing
    the results whenever they perform a persist, merge, or remove operation. The principle
    difference is that EJBs execute in an EJB container, which offers enterprise services
    that are not required for these JPA examples.


    The samples for this chapter consist of seven Java class libraries and one Web
    application containing a servlet for each of the seven Java libraries. Expand
    the first Java class library—`Chapter04-PersistenceIISamples-embeddable`, and
    observe the general structure common to each project as shown in Figure [4-7](#A311833_3_En_4_Chapter.html#Fig7).


    ![A311833_3_En_4_Fig7_HTML.jpg](A311833_3_En_4_Fig7_HTML.jpg)


    Figure 4-7


    Observing the structure of the Chapter04-PersistenceIISamples-joined project


    Each Java class library contains the following:


    *   A single JPA persistence unit consisting of some number of JPA entities or
    other mapped classes along with a `META-INF/persistence.xml` file

    *   A Java service façade–`JavaServiceFacade.java`–a wrapper class that provides
    CRUD methods for manipulating the JPA entities in the context persistence unit

    *   A Java client–`JavaServiceFacadeClient.java`–for the service façade that executes
    the test case for that persistence unit


    ### Creating the Database Connection


    The samples in this chapter require a database connection , and for these tests
    we will use the Derby database that is bundled with NetBeans and Glassfish. If
    you have not already created the WineApp database, also used for the Chapter [3](#A311833_3_En_3_Chapter.html)
    examples, click on the `Services` tab, expand the `Databases` icon, and invoke
    “`Create Database...`” on the `Java DB` node. Create a database named “`WineApp`”
    with username and password `wineapp/wineapp` as shown in Figure [4-8](#A311833_3_En_4_Chapter.html#Fig8).


    ![A311833_3_En_4_Fig8_HTML.jpg](A311833_3_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Creating the WineApp database and connection


    In case you did create the WineApp database in Chapter [3](#A311833_3_En_3_Chapter.html),
    then you should find it underneath the Java DB section as shown in Figure [4-9](#A311833_3_En_4_Chapter.html#Fig9).


    ![A311833_3_En_4_Fig9_HTML.jpg](A311833_3_En_4_Fig9_HTML.jpg)


    Figure 4-9


    “WineApp” Java DB


    This last step created a database connection and is referenced from the persistence
    units in each of the `persistence.xml` files found in the JPA projects. While
    it is possible to pre-create the database objects (tables, sequences, key constraints,
    and so on), we will let JPA create these database objects automatically the first
    time they are needed by each persistence unit.


    ### Compiling the Sources


    Invoke the context menu on `Chapter04-PersistenceIISamples` node, and build the
    application by selecting the `Clean and Build` menu option as shown in Figure
    [4-10](#A311833_3_En_4_Chapter.html#Fig10).


    ![A311833_3_En_4_Fig10_HTML.jpg](A311833_3_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Building the application'
