    ### The E-Mail Service


    The e-mail service is an MDB. This MDB processes the incoming messages by sending
    out e-mails using an e-mail resource that is injected as a resource reference.


    Listing [7-19](#A311833_3_En_7_Chapter.html#Par79) shows the code for the `onMessage()`
    method in the `StatusMailerBean` MDB. We will start by retrieving all of the properties
    from the message, and then we will create an object of `javax.mail.Message` using
    the injected mail resource reference `mailSession`. Then the message is decorated
    with relevant e-mail information, and the `send()` method is called to send the
    e-mail message.


    ```

    public void onMessage(Message message) {

    try {

    if (message instanceof MapMessage) {

    MapMessage orderMessage = (MapMessage) message;

    String from = orderMessage.getStringProperty("from");

    String to = orderMessage.getStringProperty("to");

    String subject = orderMessage.getStringProperty("subject");

    String content = orderMessage.getStringProperty("content");

    javax.mail.Message msg = new MimeMessage(mailSession);

    msg.setFrom(new InternetAddress(from));

    InternetAddress[] address = {new InternetAddress(to)};

    msg.setRecipients(RecipientType.TO, address);

    msg.setSubject(subject);

    msg.setSentDate(new java.util.Date());

    msg.setContent(content, "text/html");

    System.out.println("MDB: Sending Message from " + from + " to " + to + "...");

    Transport.send(msg);

    System.out.println("MDB: Message Sent");

    } else {

    System.out.println("Invalid message ");

    }

    } catch (Exception ex) {

    ex.printStackTrace();

    }

    }

