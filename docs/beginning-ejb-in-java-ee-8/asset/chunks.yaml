    ## 总结


    在本章中，我们向您介绍了作为 Java EE 8 一部分的 Web 服务和微服务。我们解释了遵循查找-绑定-执行模型的 Web 服务架构，以及像 UDDI、WSDL
    和 SOAP 这样的标准如何在标准化和互操作性方面使 Web 服务比早期的分布式计算模型更加普及。我们还简要讨论了 REST 架构模式和 RESTful Web
    服务，它们简化了 Web 服务的创建和使用。


    我们深入研究了 UDDI、SOAP 和 WSDL 标准的细节，并通过一个简单的信用服务示例演示了如何构建 WSDL 文档和 SOAP 消息。


    我们讨论了一些可以使用 Web 服务的用例，并讨论了它们如何适应内联网和互联网模型，包括一些提供 Web 服务的现有电子商务网站示例。


    然后，我们深入探讨了 Java EE 平台，并研究了不同的标准（JAX-WS、JAX-RS、JAXB、JAXR、SAAJ 和 JSR 224），这些标准使开发人员能够创建可在
    .NET 平台内移植和互操作的 Web 服务。


    接着，我们研究了如何使用简单的 Web 服务元数据注解将 EJB 无状态会话 Bean 发布为 Web 服务。我们开发了一个可以从 Web 服务客户端调用的信用服务。


    接下来，我们研究了使用 GlassFish 应用服务器和 Servlet 客户端编译、部署和测试 Web 服务，并且还研究了这种编程模型与使用 EJB 调用
    Web 服务的相似之处。


    最后，我们介绍了作为新 Java 平台一部分的 Java EE 微服务，以及如何使用 Spring Boot 项目构建一个简单的微服务示例。


    到目前为止，我们已经讨论了 EJB 规范的各个组件：会话 Bean、JPA 实体、MDB 和 Web 服务。在下一章中，我们将讨论如何集成所有这些组件来构建一个企业级应用程序。


    # 7. 集成会话 Bean、实体、消息驱动 Bean 和 Web 服务


    ## 引言


    本书前面的章节涵盖了 EJB 及相关技术的各个组件。这些包括会话 Bean、消息驱动 Bean (MDB)、作为 Web 服务的无状态会话 Bean 以及
    JPA 实体。在本章中，我们将通过一个虚构的葡萄酒商店应用程序示例，向您展示如何将这些组件集成到一个完整的 Java EE 8 应用程序中。


    ## 应用程序概述


    我们将在本章中开发的示例应用程序是 Wines Online 应用程序，它为顾客（个人或分销商）提供多种搜索条件，使他们能够浏览、选择葡萄酒，将其添加到购物车，并处理订单。顾客必须先向
    Wines Online 应用程序注册，然后才能提交订单。订单提交后，将验证顾客的信用卡，这会触发订单处理消息，并向顾客发送关于订单状态的电子邮件通知。


    顾客用于搜索、导航和提交订单的屏幕是一个简单的 JavaServer Faces (JSF) Web 应用程序的一部分，该应用程序与使用 EJB 开发的后端服务和组件进行交互。在本章中，我们的重点将是开发应用程序的后端部分，这部分可以使用
    Servlet 和简单的 Java 客户端进行测试。在第 12 章中，我们将为这些后端服务开发一个 JSF 客户端。


    如图 7-1 所示，Wines Online 应用程序由客户端应用程序使用的多个后端组件组成，而这些后端组件又使用不同类型的服务来执行 CRUD（创建、检索、更新、删除）操作、向顾客发送关于订单状态的电子邮件通知、处理传入订单以及验证顾客的信用卡状态。我们将在下一节讨论这些组件的行为和功能。


    ![A311833_3_En_7_Fig1_HTML.jpg](img/A311833_3_En_7_Fig1_HTML.jpg)


    图 7-1


    Wines Online 应用程序架构


    ## 应用程序组件和服务


    后端葡萄酒商店应用程序由不同类型的 EJB 组成，这些 EJB 被创建为组件和服务。关键组件和服务将在以下各节中描述。

    '
- fmt: '### The Shopping Cart Component


    The shopping cart component manages the cart items for a registered customer who
    has logged into the application. This component is a stateful session bean, and
    it keeps track of cart items (wines and quantity) that are added to and removed
    from the shopping cart. Finally, the shopping cart component transfers the order
    information to the order processing component.


    ### The Search Façade Component


    The search façade component allows the customer to retrieve all wines or search
    for wines using criteria such as year, country, and varietal. This component is
    a stateless session bean, and it returns a list of wines based on executed search
    criteria.


    ### The Customer Façade Component


    The customer façade component allows customers to register themselves as members
    of the wine application and also retrieve customer information based on their
    e-mail addresses. This component is a stateless session bean.


    ### The Order Processing Façade Component


    The order processing façade component acts as a coordinator between the credit
    service and the order processing service. This component processes the cart items
    and creates a purchase order (PO) that can be consumed by the order processing
    service. This component is a stateless session bean.


    ### Persistence Services


    Persistence services comprise a packaged persistence unit that consists of a set
    of entities that are mapped to the wine store database schema. All other components
    and services in the back-end part of the application use this common persistence
    unit to perform CRUD operations.


    ### The E-Mail Service


    The e-mail service is an MDB that sends out an e-mail to the customer about the
    status of the order submitted. This service is essentially the same MDB that we
    built in Chapter [5](#A311833_3_En_5_Chapter.html), and it requires the same JMS
    and Java Mail Session resources.


    ### The Credit Service


    The credit service is a Web service that is consumed by the application. This
    service takes credit card information as an input message and returns the status
    of the credit for a particular customer. We will use the credit service developed
    in Chapter [6](#A311833_3_En_6_Chapter.html).


    ### The Order Processing Service


    The order processing service is an MDB that does the bulk of the order processing
    after a purchase order has been received.


    ## The Wines Online Application Business Process


    Figure [7-2](#A311833_3_En_7_Chapter.html#Fig2) illustrates the process flow for
    the wine application. Once the shopping cart service submits the customer and
    cart item information to the order processing façade, it verifies that the customer
    credit card information is accurate and the card is valid before proceeding to
    process the order. After approval is received from the credit service, it creates
    a purchase order that contains the customer and order information and submits
    it to the order processing service. If a negative response is received from the
    credit service, the order is cancelled, and the e-mail service sends a notification
    to the customer. Once a purchase order is received by the order processing service,
    it proceeds to fulfill the order, which entails updating the inventory and sending
    an e-mail notification on the status of the order to the customer using the e-mail
    service.


    ![A311833_3_En_7_Fig2_HTML.jpg](A311833_3_En_7_Fig2_HTML.jpg)


    Figure 7-2


    The Wines Online application business process


    Figure [7-3](#A311833_3_En_7_Chapter.html#Fig3) illustrates the interactions that
    occur among the components and services of the wine application. A step-by-step
    explanation of these interactions follows the diagram.


    ![A311833_3_En_7_Fig3_HTML.jpg](A311833_3_En_7_Fig3_HTML.jpg)


    Figure 7-3


    The Wines Online application component and service interactions


    ## In-Depth Component/Service Walkthrough


    In the following sections, we will walk through the code for each individual component
    to explain its interaction with the other components and services. Each of the
    listings contains code that is included in the `Chapter07-IntegratedServices`
    sample application. At the end of the chapter, you will find step-by-step instructions
    on how to configure, build, deploy, and execute this application.


    ### Persistence Services


    Persistence services present a domain model to the application in the form of
    a JPA persistence unit. This persistence unit is comprised of JPA entities along
    with an `EntityManager` for performing CRUD operations on the entities and for
    managing the persistent state of those entities in a transactional context.


    Figure [7-4](#A311833_3_En_7_Chapter.html#Fig4) illustrates the entities, the
    inheritance models, and the relationships between them. The `Customer` entity
    is inherited by the `Individual` and `Distributor` entities. `InventoryItem`,
    `CartItem`, and `OrderItem` entities inherit the `WineItem` entity. The `BusinessContact`
    entity is inherited by the `Supplier` entity. The wine store persistence unit
    also contains different types of relationships between these entities (including
    one-to-one, one-to-many, and many-to-many), which will be accessed from the application
    code. The mappings used in these entities were covered in Chapter [3](#A311833_3_En_3_Chapter.html)
    and Chapter [4](#A311833_3_En_4_Chapter.html). We will focus on the code that
    is used in other components of this application to integrate this persistence
    unit.


    ![A311833_3_En_7_Fig4_HTML.jpg](A311833_3_En_7_Fig4_HTML.jpg)


    Figure 7-4


    The Wines Online domain model'
