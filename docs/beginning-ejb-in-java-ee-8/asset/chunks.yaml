    表达式用作 `h:dataTable1` 组件的值绑定表达式。这意味着我们必须再次更新 `JSFShoppingCart` 托管 bean，添加用于填充 `cartItems`
    属性的代码。最后，JSF 页面有一个 `h:commandButton` 组件，用户将用它作为提交按钮来完成订单。`#{JSFShoppingCart.ProcessOrder}`
    是用于提交按钮的方法绑定表达式。


