    #### The @Entity Annotation


    The `@Entity` annotation is required to identify this class as an entity at the
    time the entity is deployed. When entities are deployed in a persistence archive
    (JAR file), they may be accompanied by non-entity classes. This annotation, or
    its equivalent declaration in the `orm.xml` file, tells the container to look
    for further annotations on the class and otherwise handle its O/R mappings, allow
    it to participate in queries and persistent relationships with other entities,
    and undergo byte weaving or other procedures when they are later instantiated
    by the persistence provider. All classes that are not marked as entities are ignored
    by the persistence provider during deployment.


    #### The @Id Annotation


    The `@Id` annotation indicates which field or fields—there may be several—is the
    entity’s primary key, or identifier. The value in the identifier field (or fields)
    must be unique across all entity instances of the entity type `Customer` so that
    it can uniquely identify this entity. In the case that the primary key spans multiple
    columns in the table, a composite primary key is required, and the `@Id` fields
    may be replaced by a single field that is annotated `@EmbeddedId`. We will discuss
    how to specify composite keys later in the chapter.


    #### Comparison with EJB 2.x


    The fundamental JPA coding construct is the entity class. In EJB 2.x and earlier,
    an entity bean served as the primary persistence object and was comprised of a
    bean class and a local and/or remote component and home interface. Beginning with
    JPA, most of the trappings of the entity bean have been stripped away or simplified
    through strong use of defaults and annotations. What remains is simply the entity
    bean class, known now as the entity class, or more simply still, the entity. While
    it is equally valid to specify persistence metadata in an XML descriptor, for
    brevity, all examples in this chapter use Java annotations. As in the EJB 3 realm,
    each declarative construct specified by an annotation has a corresponding representation
    in the XML descriptor for the persistence unit (collection of collocated entities),
    and so may be equivalently specified in XML. The decision whether to use annotations
    or XML is entirely a matter of personal choice.


    #### Configuration by Default


    The previous two annotations were specified explicitly. Given the EJB 3 simplified
    development model that leverages configuration by default, you will not be surprised
    to find out that a lot of other metadata in this example is implied by default.
    Before exploring these default settings, it is worth considering why the `@Entity`
    and `@Id` annotations were chosen to be specified explicitly, rather than implied
    implicitly.


    The `@Entity` annotations could have been the default settings for each class
    deployed through a persistence archive, and a hypothetical `@NotEntity` annotation
    could have been used to specify a non-entity class. However, following the pattern
    set by session- and message-driven beans, the explicit opt-in pattern was chosen
    instead.


    Similarly, all fields could have been assumed to be part of the primary key, but
    in practice only a small subset (usually only one) of an entity’s properties typically
    comprises an entity’s primary key. The spec designers felt that it makes better
    sense in this case to use the opt-in pattern of explicitly specifying `@Id` on
    primary key fields, implying that all columns are not part of the primary key.
    This type of decision characterizes the configuration-by-default approach, in
    which annotations are not required for the more common cases and are only used
    when an override is needed.


    The next section will examine some of the behavior that this `Customer` entity
    acquired by default, and it will show how you can override this default behavior.


    ### An Entity with Defaults Exposed: Customer.java


    Listing [3-3](#A311833_3_En_3_Chapter.html#Par33) shows the same entity with some
    of its defaults shown.


    ```

    @Entity(name="Customer")

    @Table(name=" CUSTOMER")

    public class Customer implements Serializable {

    @Id

    @Column(name="CUSTOMERID", table="CUSTOMER", unique=true,

    nullable=false, insertable=true, updatable=true)

    private long customerId;

    @Basic(fetch=FetchType.EAGER)

    @Column(name="NAME", table="CUSTOMER")

    private String name;

    // . . .

    }

    Listing 3-3

    An Entity with Defaults Shown

    ```


    Each entity has a name, and unless otherwise specified, this name defaults to
    the unqualified class name, which in this case is `LiCustomer` . This name is
    used when referring to the entity in query statements (Java Persistence Query
    Language, or JPQL, is covered in Chapter [4](#A311833_3_En_4_Chapter.html)) and
    is typically specified when the unqualified class name is awkward or is a reserved
    name in JPQL.


    #### The @Table Annotation


    An entity instance typically represents a single row in a table, and it exposes
    each column value in that row through a corresponding property on the entity.
    Consequently, an entity must map to a table in a database, and that table is specified
    using the `@Table` annotation. Its name defaults to the entity name. Since not
    all databases support mixed-case table names, this translates to a table named
    `CUSTOMER`.


    #### The @Column Annotation


    Similarly, each field declared on the entity maps by default to a column with
    the same name, and so the `customerId` and `name` fields map to the `CUSTOMERID`
    and `NAME` columns in the `CUSTOMER` table. The `@Column` annotation may also
    be used to override default column-type information, as well as column-level constraints,
    such as those used to indicate that the column is optional, insertable, and/or
    updatable. Ordinarily, it is only necessary to specify this level of detail when
    you are relying on the container to create the table when an entity is deployed.'
  trans: '

    ### 一个简单的 JavaBean：Customer.java


    我们从清单 3-1 所示的一个简单 JavaBean 开始。该类具有 JavaBeans 标准定义的属性。JavaBean 上的每个属性都通过一对属性访问器方法向
    Bean 外部呈现。对于每个属性，getter 方法检索其数据，setter 方法为其赋值。在内部，这些属性访问器方法读取和写入 JavaBean 类上一个私有的、专用的实例变量。


    ```

    public class Customer {

    private long customerId;

    private String name;

    public long getCustomerId() { return customerId; }

    public void setCustomerId(long customerId) { this.customerId = customerId; }

    public String getName() { return name; }

    public void setName(String name) { this.name = name; }

    }

    清单 3-1

    一个简单的 JavaBean

    ```


    ### 一个简单的实体：Customer.java


    清单 3-2 展示了我们的简单 JavaBean 被转换为实体后的样子。


    ```

    @Entity

    public class Customer implements Serializable {

    @Id

    private long customerId;

    private String name;

    public long getCustomerId() { return customerId; }

    public void setCustomerId(long customerId) { this.customerId = customerId; }

    public String getName() { return name; }

    public void setName(String name) { this.name = name; }

    }

    清单 3-2

    一个简单的实体

    ```


    唯一需要的更改是添加了 `@Entity` 和 `@Id` 注解。`@Id` 注解将 `customerId` 标识为实体的主键，这是表达其唯一标识所必需的。这是将该类转换为实体所需的最低元数据要求。我们还添加了
    `Serializable` 接口，因为这是确保与远程客户端兼容的良好实践。


    #### @Entity 注解


    `@Entity` 注解是必需的，用于在实体部署时将其标识为实体。当实体部署在持久化归档文件（JAR 文件）中时，它们可能伴随有非实体类。此注解，或其等效声明（在
    `orm.xml` 文件中），告诉容器查找该类上的进一步注解，并处理其 O/R 映射，使其能够参与查询和与其他实体的持久关系，并在持久化提供程序稍后实例化它们时进行字节编织或其他处理。在部署期间，所有未标记为实体的类都会被持久化提供程序忽略。


    #### @Id 注解


    `@Id` 注解指示哪个或哪些字段（可能有多个）是实体的主键或标识符。标识符字段中的值在实体类型 `Customer` 的所有实体实例中必须是唯一的，以便能够唯一标识此实体。如果主键跨越表中的多个列，则需要复合主键，并且
    `@Id` 字段可以被一个标注了 `@EmbeddedId` 的单个字段替换。我们将在本章后面讨论如何指定复合键。


    #### 与 EJB 2.x 的比较


    JPA 的基本编码结构是实体类。在 EJB 2.x 及更早版本中，实体 Bean 作为主要的持久化对象，由一个 Bean 类以及本地和/或远程组件和 Home
    接口组成。从 JPA 开始，实体 Bean 的大部分外在特征都通过大量使用默认值和注解而被剥离或简化。剩下的只是实体 Bean 类，现在称为实体类，或者更简单地称为实体。虽然在
    XML 描述符中指定持久化元数据同样有效，但为简洁起见，本章中的所有示例都使用 Java 注解。与 EJB 3 领域一样，每个由注解指定的声明性构造在持久化单元（共置实体的集合）的
    XML 描述符中都有对应的表示形式，因此可以在 XML 中等效地指定。决定使用注解还是 XML 完全是个人的选择。


    #### 默认配置


    前两个注解是显式指定的。鉴于 EJB 3 简化了开发模型并利用了默认配置，您不会惊讶地发现此示例中的许多其他元数据都是默认隐含的。在探索这些默认设置之前，值得思考为什么选择显式指定
    `@Entity` 和 `@Id` 注解，而不是隐式地暗示它们。


    `@Entity` 注解本可以是每个通过持久化归档部署的类的默认设置，并且可以使用一个假设的 `@NotEntity` 注解来指定非实体类。然而，遵循会话
    Bean 和消息驱动 Bean 设定的模式，选择了显式选择加入的模式。


    类似地，所有字段本可以被假定为主键的一部分，但在实践中，通常只有一小部分（通常只有一个）实体的属性构成实体的主键。规范设计者认为，在这种情况下，使用在主键字段上显式指定
    `@Id` 的选择加入模式更有意义，这意味着所有列都不是主键的一部分。这种类型的决策体现了默认配置方法的特点，即在更常见的情况下不需要注解，仅在需要覆盖时才使用它们。


    下一节将检查此 `Customer` 实体默认获得的一些行为，并将展示如何覆盖此默认行为。


    ### 暴露默认值的实体：Customer.java


    清单 3-3 展示了同一个实体及其部分默认值。


    ```

    @Entity(name="Customer")

    @Table(name=" CUSTOMER")

    public class Customer implements Serializable {

    @Id

    @Column(name="CUSTOMERID", table="CUSTOMER", unique=true,

    nullable=false, insertable=true, updatable=true)

    private long customerId;

    @Basic(fetch=FetchType.EAGER)

    @Column(name="NAME", table="CUSTOMER")

    private String name;

    // . . .

    }

    清单 3-3

    显示默认值的实体

    ```


    每个实体都有一个名称，除非另有指定，否则此名称默认为非限定类名，在本例中为 `Customer`。此名称在查询语句（Java 持久化查询语言，简称 JPQL，将在第
    4 章介绍）中引用实体时使用，并且通常在非限定类名不便于使用或属于 JPQL 中的保留名称时显式指定。


    #### @Table 注解


    一个实体实例通常代表表中的一行，并通过实体上的相应属性公开该行中的每个列值。因此，实体必须映射到数据库中的一张表，该表使用 `@Table` 注解指定。其名称默认为实体名称。由于并非所有数据库都支持混合大小写的表名，因此这会被转换为名为
    `CUSTOMER` 的表。


    #### @Column 注解


    类似地，实体上声明的每个字段默认映射到同名的列，因此 `customerId` 和 `name` 字段映射到 `CUSTOMER` 表中的 `CUSTOMERID`
    和 `NAME` 列。`@Column` 注解也可用于覆盖默认的列类型信息以及列级约束，例如用于指示该列是否可选、是否可插入和/或是否可更新的约束。通常，仅当您依赖容器在部署实体时创建表时，才需要指定此级别的详细信息。

    '
- fmt: '### The `@Basic` Annotation


    Entity fields that are of simple Java types, such as `String` or `int` (like the
    `customerId` and `name` fields), are automatically configured by the JPA to use
    the `@Basic` annotation. Arrays of simple types, and any other type that implements
    the `Serializable` interface, may also be marked `@Basic`.


    The persistence framework provides automatic conversion of column data types to
    certain Java types, and JPA persistence providers will attempt to define a suitable
    default column type when generating tables for entity classes during deployment.
    Most numeric, string, and date types will be converted automatically.


    Table 3-2 presents a list of Java types that can be annotated `@Basic` and mapped
    automatically.


    **Table 3-2** Field/Property Types That Are Valid for Simple Mappings


    | Java Type |

    | --- |

    | Java primitive types (`int`, `long`, `char`, and so on) |

    | Primitive wrapper types (`Integer`, `Long`, `Char`, and so on) |

    | Java serializable types |

    | User-defined serializable types |

    | `enums` |

    | `java.lang.String` |

    | `java.math.BigInteger` |

    | `java.math.BigDecimal` |

    | `java.util.Date` |

    | `java.util.Calendar` |

    | `java.sql.Date` |

    | `java.sql.Time` |

    | `java.sql.Timestamp` |

    | `byte[]` |

    | `Byte[]` |

    | `char[]` |

    | `Character[]` |


    ### Additional Field Types


    There are a number of other type specifiers that may be applied to different types
    of columns. For instance, an entity may also hold references to other entities,
    and these references are also represented by properties on the entity. We will
    look at some examples of how to specify these relationship properties later in
    this chapter.


    An entity may have methods beyond its property access methods, but typically these
    are limited to support methods for managing add and remove operations from collection
    relationship properties.


    ### Coding Requirements


    In addition to the `@Entity` annotation and a primary key specifier, the minimal
    coding requirements for an entity are that it has a `public` or `protected` default
    (no-argument) constructor and that the class is not `final`. In this `Customer`
    example, a default constructor was implied since, in the absence of any non-default
    constructors on a public class, a default constructor is assumed by Java. Non-default
    constructors may also be specified on an entity, and they are often used for initializing
    the entity with its mandatory properties.


    #### The `java.io.Serializable` Interface


    Entities that will be passed by value, as when passed by remote session beans
    to Java SE clients that are external to the EJB container, must implement the
    `java.io.Serializable` marker (no method) interface. Implementing this interface
    indicates to the compiler that it must enforce all fields on the entity class
    to be serializable so that any instance can be serialized to a byte stream and
    passed using remote method invocation (RMI) over HTTP.


    #### Placing Annotations on Instance Variables vs. JavaBean Property Accessors


    When defining an entity class, you may choose to place member-level annotations
    on the entity instance variables or on the corresponding JavaBean property accessors
    for those instance variables. As with the decision between specifying metadata
    using annotations or XML, this is largely a matter of personal preference.


    > **Note:** Since JPA 2.0, Java developers are allowed to annotate both instance
    variables and property getters. Previously, all entities in an inheritance hierarchy
    had to choose a single approach to follow.


    Regardless of where the member-level annotations are specified, the entity’s instance
    variables must not be `public`, and clients of that entity, including related
    entities, must always access an entity’s properties through accessor methods.
    It is up to the entity provider to decide which property accessors to make `public`,
    exposing them to clients; and which to make `protected`, making them available
    only to the persistence provider. When annotating instance variables, the entity
    need not define any property accessor methods, if desired.


    By policy, only the persistence framework and the class methods themselves are
    allowed to access these fields directly. For both access types, clients must access
    field data through public accessor or other methods on the entity class.


    There are several material consequences of choosing one approach over the other.
    These are discussed in the following sections.


    ### Entity Data Access


    When annotations are specified on the entity’s instance variables, the persistence
    manager accesses the instance variables directly when reading and writing a persistent
    property to and from the entity. When annotating property accessors instead of
    instance variables, the persistence manager reads and writes property data through
    these property accessors.


    Annotating the entity’s instance variables directly avoids the overhead of method
    calls and provides a slight performance optimization, since the persistence manager
    talks directly to the fields. Annotating the property accessors provides a simple
    way for the entity developer to intercept and perform custom logic during all
    attempts to read and write property data.


    This latter option affords the entity developer a chance lazily to derive persistent
    property values on demand, if desired. However, be aware that any validation or
    side-effect code on the property accessor methods will be called during entity
    state transitions. As you’ll see in the next chapter, if the entity developer
    wishes to initialize transient data or refine persistent data at the time that
    the entity’s persistent state is first loaded, or prior to saving changes out
    to persistent storage, it is preferable to perform these steps using entity lifecycle
    callback methods. Using the combination of field-level annotations and entity
    lifecycle callbacks has the benefit that validation and other code in the setter
    methods will only be called when a client calls the setter, and not when the entity
    is being instantiated from persistent storage by the framework.


    Another consideration is how the entity behaves when it is involved in a query.
    This is a similar issue, since a query statement may both retrieve and update
    field data on an entity. Thus, it is important to be aware of any possible side
    effects of using property accessors.


    ### Property Name


    The second material impact of choosing whether to annotate instance variables
    or property accessors occurs when the property accessor expresses a default field
    name that is different from the instance variable name. When annotating property
    accessors, the logical property name is derived from the getter using the JavaBean
    property-naming convention, whereas if the instance variable is annotated, the
    logical property name becomes the instance variable’s name.'
