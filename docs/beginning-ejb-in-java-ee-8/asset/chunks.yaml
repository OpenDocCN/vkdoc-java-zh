  trans: '

    ## 支持乐观锁（@Version）


    如前面的示例所示，你可以使用 `@Version` 注解来指定一个字段，供 `EntityManager` 在合并操作和并发管理时执行乐观锁。乐观锁是一种有用的性能优化手段，它将原本需要数据库承担的工作转移了出来。数据库通常提供悲观锁服务，允许数据库客户端（此处指
    JPA 的 `EntityManager`）锁定表中的某一行，以防止在 `EntityManager` 应用某些更改时其他客户端更新该行。这是一种确保两个客户端不会同时修改同一行的有效机制，但它需要在数据库内部进行代价高昂的低级访问检查。悲观锁的一种替代方案是将并发控制转移到像
    `EntityManager` 这样的数据库客户端中，并采用乐观锁策略。通过使用专用的 `@Version` 列，`EntityManager` 遵循几条简单的规则。每当它将修改后的实体发送到数据库时（例如在提交或刷新操作期间），它会查看实体实例的
    `@Version` 字段的当前值，从数据库中查询该实体行的当前状态，并比较版本值。如果它们相同，它会递增实体实例的 `@Version` 字段（或任何标注了
    `@Version` 的字段），并将更改发送到数据库，从而执行一条 `UPDATE` 语句。如果版本值不同，则意味着在 `EntityManager` 上次查询该行并将其加载到实体实例，到该实例被刷新回数据库的这段时间内，有其他客户端修改了该行。当检测到这种差异时，我们称之为并发异常，`EntityManager`
    会抛出异常并将事务标记为回滚。`EntityManager` 的客户端需要预见到可能发生并发异常，并且必须准备好解决冲突，通常是通过通知用户存在冲突，以便在继续操作前刷新实体。


    在实体上使用专用的 `@Version` 列，使得 `EntityManager` 只需比较实体实例中存储的 `@Version` 字段值与数据库中 `VERSION`
    列的值，即可执行乐观锁。如果你没有指定 `@Version` 字段，`EntityManager` 就必须遍历实体实例中的每个字段，并将其值与数据库中对应的映射列进行比较，这要繁琐得多。声明的
    `@Version` 字段将由持久化框架自动填充，应用程序代码不应更新它。


    总而言之，使用 `@Version` 字段并非强制要求，但在实体上定义 `@Version` 字段是一种良好的实践，可以让 `EntityManager`
    利用这一优化。


    ## 支持自动生成的主键值（@GeneratedValue）


    除了通过 `@Version` 列提供的内置乐观锁支持外，JPA 还提供了几种便捷的方式，在持久化实体时自动填充主键列。你可以声明使用以下方式填充字段值：


    *   持久化框架维护的自动机制（`strategy=GenerationType.AUTO`）

    *   自定义数据库序列（`strategy=GenerationType.SEQUENCE` 或 `GenerationType.IDENTITY`）

    *   模拟伪序列的自定义数据库表（`strategy=GenerationType.TABLE`）


    我们发现自动填充主键功能在便捷性方面非常出色，省去了我们在应用程序中为每个实体编写此代码的麻烦。在 `persistence.xml` 中对持久化单元使用模式生成设置，可以让你让
    JPA 在数据库中自动创建所需的工件（序列或表），甚至可以通过注解或 XML 使用 JPA 元数据指定的设置来配置它们。一旦安装，`AUTO` 情况会为任何标注了
    `@GeneratedValue` 或 `@GeneratedValue(strategy=GenerationType.AUTO)` 的 `@Id` 字段生成唯一标识符，至少能让实体类看起来不那么杂乱。由于并非所有数据库都支持序列对象，你可能希望使用表生成器，如本章各示例所示。


    清单 4-31 演示了默认 ID 生成特性的用法。


    ```

    @Entity

    @Inheritance(strategy = InheritanceType.JOINED)

    @DiscriminatorColumn(name = "TYPE")

    @Table(name = "CH04_JOIN_PERSON")

    @NamedQuery(name = "findAllPerson", query = "select object(o) from Person o")

    public abstract class Person implements Serializable {

    @Id

    @GeneratedValue

    private Long id;

    /* ... */

    }

    清单 4-31

    Person.java，使用默认 ID 生成器

    ```


    用于生成本章示例中所有表和序列的 SQL 脚本可在示例代码区域中找到。此外，JPA 提供商会生成 DDL 对象，甚至一些所需的 DML，以支持部署的任何实体；因此，预先创建模式并非绝对必要。然而，虽然
    JPA 会接受关于使用哪些表和列名的指导（例如），但目前还没有办法指定自动为你创建的约束或其他工件的名称。因此，如果你需要控制映射对象的名称和其他细节，最好在首次部署持久化单元之前预先创建模式。


    为了说明如何预先创建 ID 生成所需的表和序列，清单 4-31 和 4-32 展示了在这些示例中创建 ID 生成器表和序列所需的 DDL。


    ```

    /**

    * 创建 ID 生成器序列 "CH04_SEQID_PERSON_ID_GEN":

    * CREATE SEQUENCE "CH04_SEQID_PERSON_ID_GEN" INCREMENT BY 50 START WITH 50;

    */

    @Entity

    @Table(name = "CH04_JOIN_PERSON")

    @SequenceGenerator(name = "Person_ID_Generator", sequenceName = "CH04_JOIN_PERSON_ID_GEN",

    allocationSize = 50, initialValue=1)

    @Inheritance(strategy = InheritanceType.JOINED)

    public abstract class Person implements Serializable {

    ...

    @Id

    @Column(nullable = false)

    @GeneratedValue(strategy = GenerationType.SEQUENCE, generator = "Person_ID_Generator")

    private Integer id;

    ...

    }

    清单 4-32

    @GeneratedValue 与 @SequenceGenerator 的用法

    ```


    清单 4-33 提供了一个基于表的 ID 生成器声明的示例，以及一条用于为伪序列创建命名行的 INSERT 语句。


    ```

    /**

    * 创建 ID 生成器表 "CH04_JOIN_PERSON_ID_GEN": CREATE TABLE

    * "CH04_JOIN_PERSON_ID_GEN" ("PRIMARY_KEY_NAME" VARCHAR2(4000) PRIMARY KEY,

    * "NEXT_ID_VALUE" NUMBER(38));

    *

    * 为此实体的 ID 生成器 ''Person.id'' 初始化该表的数据（从值 ''0'' 开始）:

    * INSERT INTO "CH04_JOIN_PERSON_ID_GEN" VALUES (''Person.id'', 0);

    */

    @Entity

    @Table(name = "CH04_JOIN_PERSON")

    @TableGenerator(name = "Person_ID_Generator", table = "CH04_JOIN_PERSON_ID_GEN",

    pkColumnName = "PRIMARY_KEY_NAME", pkColumnValue = "Person.id",

    valueColumnName = "NEXT_ID_VALUE")

    @Inheritance(strategy = InheritanceType.JOINED)

    public abstract class Person implements Serializable {

    ...

    @Id

    @Column(nullable = false)

    @GeneratedValue(strategy = GenerationType.TABLE, generator = "Person_ID_Generator")

    private Integer id;

    ...

    }

    清单 4-33

    @GeneratedValue 与 @TableGenerator 的用法

    ```

