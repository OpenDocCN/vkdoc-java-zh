  raw: '## JMS 2.1


    JMS 2.1 was first proposed by Oracle in August 2014 and then submitted as JSR
    368 in accordance with the Java Community Process. It was proposed and then finally
    approved to be part of Java EE 8.


    The early draft review 1 (EDR1) was published for public review in October 2015,
    including a new chapter on flexible JMS message-driven beans.


    In March 2016 the EDR2 was finally published for public review but then Oracle
    stopped the development of JMS 2.1, announcing that they were changing the Java
    EE 8 priorities including the development of JMS 2.1.


    Finally, in November 2016 Oracle formally proposed that the JSR be withdrawn and
    confirmed that JMS would remain part of Java EE 8, but the existing version JMS
    2.0 would be used rather than a new version 2.1.


    The JMS 2.1 specification can be found in this web page:


    [`https://jcp.org/en/jsr/detail?id=368`](https://jcp.org/en/jsr/detail?id=368)


    Here are the most important changes in JMS 2.1:


    *   Alignment with Java SE 8

    *   Flexible MDBs (EE)

    *   Change in the asynchronous messaging, including how MDB implements any MessageListener
    interface to any CDI bean

    *   CDI Beans as Listeners

    *   Batch delivery including Acknowledgment Modes, the setMessageLstener (EE),
    etc.

    *   Repeatable Annotations including the redelivery configuration (EE)


    ## Using MDBs


    An MDB is an asynchronous message consumer that processes messages delivered via
    JMS. While MDBs do the job of processing the messages, the EJB container in which
    the MDBs run take care of the services (transactions, security, resources, concurrency,
    message acknowledgment), letting the bean developer focus on the business logic
    of processing messages. Traditional JMS applications would have to custom write
    some of these services. MDBs are stateless in nature, which means that EJB containers
    can have numerous instances of MDBs execute concurrently to process hundreds of
    JMS messages coming in from various applications or JMS producers and also provide
    quality of service (QoS), such as high availability and reliability for enterprise
    applications.


    EJB client applications cannot access MDBs directly as they can with session beans
    and entities. The only way to communicate with an MDB would be by sending a JMS
    message to the destination to which the MDB is listening. Any Java application
    or Java EE component using the JMS API can be the message provider for the MDB
    by sending messages to queues or topics.


    ### When Do You Use MDBs?


    Earlier in the chapter, we discussed the need for asynchrony in enterprises. Asynchronous
    messaging provides loose coupling between applications, systems, and services,
    thus providing greater flexibility and change management for applications and
    systems. MDBs provide a standard messaging component model that achieves the goal
    of asynchronous and message-oriented architecture in enterprises.


    Figure [5-4](#A311833_3_En_5_Chapter.html#Fig4) shows a message-oriented application
    that has order entry, inventory, billing, and shipping systems that communicate
    asynchronously to handle a workflow that starts with a new purchase order and
    ends when the order gets shipped to the customer. An order entry system captures
    a new order from a customer, processes the order, and sends it into a designated
    message queue (in Figure [5-4](#A311833_3_En_5_Chapter.html#Fig4), this is the
    New Order queue). The inventory system picks up the message from the queue and
    checks whether or not the inventory is available. If not, it sends a message to
    the Suppliers queue; if the order can be shipped, then it puts a message into
    the Order Ready queue. This new message is picked up by the billing system, which
    processes the billing for the customer and puts a message back into the Shipping
    queue. Finally, the shipping application picks up the message, gets the order
    shipped to the customer, and sends an e-mail to the customer with tracking information.


    ![A311833_3_En_5_Fig4_HTML.jpg](A311833_3_En_5_Fig4_HTML.jpg)


    Figure 5-4


    An order-to-shipping JMS messaging system


    ### MDB Classes


    Unlike a session bean, an MDB doesn’t have any business interfaces. It has only
    the following:


    *   A message-driven class

    *   An optional callback listener class

    *   An optional interceptor class


    An MDB class is any standard Java class that has a class-level annotation `@MessageDriven`.
    If deployment descriptors are used instead of annotations, the bean class should
    be denoted as an MDB class. In the case of mixed mode, in which you are using
    annotations and deployment descriptors, the `@MessageDriven` annotation must be
    specified if any other class-level or member-level annotations are specified in
    the bean class. The `@MessageDriven` annotation parameters can be used to specify
    the JMS queues or topics to which the bean is listening. Table [5-2](#A311833_3_En_5_Chapter.html#Tab2)
    details the parameters.


    Table 5-2


    Parameter details for the @MessageDriven Annotation


    | Parameter | Description |

    | --- | --- |

    | `ActivationConfigProperty` | The set of properties used to specify the destination
    name and type |

    | `description` | A description of the bean class |

    | `mappedName` | The physical Java Naming and Directory Interface (JNDI) name
    of the topic or queue to which the MDB is listening |

    | `messageListener` | The interface name of the interface class that the MDB is
    extending |

    | `name` | The name of the MDB, if it has to be a different name than the bean
    class |


    To illustrate the use of an MDB, we will create the use case shown in Figure [5-5](#A311833_3_En_5_Chapter.html#Fig5).
