    #### Transaction Analysis


    The following sections will analyze this second example from a transactional perspective.
    We have empowered the session bean with state (i.e., `Stateful`), giving it control
    over the demarcation of its transactions, and allowed its associated persistence
    context to survive from one transaction to the next.


    ##### Session Bean Declaration


    These features have arisen through the combination of annotations and code. You’ll
    notice that this session bean is annotated:


    ```

    @Stateful(name = "OrderProcessorBMT", mappedName = "Chapter08-TransactionSamples-OrderProcessorBMT")

    @TransactionManagement(TransactionManagementType.BEAN)

    @Interceptors(OrderProcessorBMTBeanTxnInterceptor.class)

    public class OrderProcessorBMTBean {

    @Resource

    SessionContext sessionContext;

    @PersistenceContext(unitName = "Chapter08-TransactionSamples-JTA", type = PersistenceContextType.EXTENDED)

    private EntityManager em;

    ...

    }

    ```


    It injects both a `SessionContext` and an `EntityManager`. Being stateful allows
    the enterprise bean to retain state from one client invocation to the next. In
    this case, that state is the persistence context and the associated transaction,
    which must survive through multiple method invocations. The BMT declaration means
    that the container should not automatically interpose on method boundaries to
    demarcate transactions. Attempts to add `TransactionAttribute` qualifiers to methods
    on a BMT session bean will be caught and raise an exception at deployment time.


    The `@PersistenceContext` annotation holds a `type` property with value `PersistenceContextType.EXTENDED`,
    meaning that it persists from one transaction to the next, and allows associated
    entities to remain managed even after the transaction in which they were created
    has ended. The `UserTransaction` object available through the `sessionContext`
    property is this BMT bean’s interface onto the EJB container’s JTA transaction
    manager, and exposes the `begin()`, `commit()`, and `rollback()` transaction demarcation
    methods.'
