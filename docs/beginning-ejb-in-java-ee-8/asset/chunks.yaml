- fmt: "#### Asynchronous Business Methods\n\nAsynchronous methods immediately return\
    \ to the caller without waiting for the method execution to complete. Asynchronous\
    \ methods are typically used for processor-intensive or long-running, background\
    \ tasks, such as printing a document or sending a large e-mail.\n\nStarting with\
    \ EJB 3.1, a session bean can declare that one or more of its methods can be executed\
    \ asynchronously. When a session bean client invokes an asynchronous method, the\
    \ container immediately returns the control to the client. This allows the client\
    \ to perform tasks in parallel while the business method completes its execution\
    \ on a separate thread. For example, clients can use this functionality to show\
    \ the progress of a long-running task using a progress bar.\n\nAn asynchronous\
    \ method is defined by annotating a business method with `javax.ejb.Asynchronous`\
    \ annotation. An `@Asynchronous` annotation at the class level marks all the business\
    \ methods of the session bean as asynchronous. An asynchronous method must return\
    \ either `void` or an implementation of the `java.lang.concurrent.Future<V>` interface.\
    \ Asynchronous methods that return `void` cannot throw application exceptions.\
    \ Application exceptions can only be thrown by asynchronous methods that return\
    \ `Future<V>`.\n\nAsynchronous methods defined on a bean class should have the\
    \ following signature:\n\n```\npublic void (Object)\n```\n\nor\n\n```\npublic\
    \ java.util.concurrent.Future (Object) throws \n```\n\nSession bean clients invoke\
    \ asynchronous methods in the same way they invoke synchronous methods. If an\
    \ asynchronous method has been defined to return a result, the client immediately\
    \ receives an instance of `Future<V>` interface. A client can use this instance\
    \ for any of the following operations:\n\n- Retrieving the final result set using\
    \ the `get()` method. Since this method call blocks synchronously until a result\
    \ is returned or an exception is thrown, typically it is not called until `isDone()`\
    \ returns true.\n- Checking the status of the asynchronous method using the `isDone()`\
    \ method.\n- Cancelling the method invocation using `cancel(boolean)` method.\
    \ Calling `cancel()` does not interrupt the thread, it simply sets a state flag\
    \ that can be checked within the running method so that it may gracefully interrupt\
    \ its execution and return.\n- Checking if the method invocation was cancelled\
    \ using `isCancelled()` method.\n- Checking for exceptions.\n\n**Note:** Session\
    \ bean methods that are exposed as web services can’t be asynchronous.\n\nIf an\
    \ asynchronous method returns a result, it must return that result using the `javax.ejb.AsyncResult<V>`\
    \ convenience wrapper object. Note that this object is not actually returned to\
    \ the client but is intercepted by the EJB container and unwrapped to service\
    \ method calls on the `Future<V>` object that was actually returned to the client\
    \ when the client invoked the method.\n\n### Dependency Injection\n\nIn Chapter\
    \ [1](#A311833_3_En_1_Chapter.html), we introduced the concept of dependency injection\
    \ as a programming design pattern. In this section, we will take a cursory look\
    \ into using dependency injection in stateless session beans. Dependency injection\
    \ is discussed in detail in Chapter [10](#A311833_3_En_10_Chapter.html).\n\nEJB\
    \ containers provide the facilities to inject various types of resources into\
    \ stateless session beans. Typically, in order to perform user tasks or process\
    \ requests from client applications, the business methods in the session bean\
    \ require one or more types of resources. These resources can be other session\
    \ beans, data sources, or message queues. Managed beans can be injected into session\
    \ beans using Contexts and Dependency Injection (CDI).\n\nThe resources that the\
    \ stateless session bean is trying to use can be injected using annotations or\
    \ deployment descriptors. Resources can be acquired by annotation of instance\
    \ variables or annotation of the setter methods. Listing [2-5](#A311833_3_En_2_Chapter.html#Par91)\
    \ shows an example of a setter and instance variable–based injection of `myDb`,\
    \ which represents the data source.\n\n```\n@Resource\nDataSource myDb;\n// or\n\
    @Resource\npublic void setMyDb(DataSource myDb) {\nthis.myDb = myDb;\n}\nListing\
    \ 2-5\nData Source Injection\n```\n\nYou’ll typically use the setter injections\
    \ to preconfigure or initialize properties of the injected resource."
