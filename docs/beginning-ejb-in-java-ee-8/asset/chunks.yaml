    ### 运行客户端程序


    在创建好 `WineApp` 数据库并构建项目后，即可运行示例客户端。打开 `Chapter04-PersistenceIISamples-singletable`
    项目，展开 `com.apress.ejb.chapter04.singletable.service` 包。您将看到 Java 服务外观类（`JavaServiceFacade.java`）及其客户端类。右键点击
    `JavaServiceFacadeClient.java`，选择“`运行文件`”。测试将在 NetBeans 中运行，输出结果会发送到日志窗口。参见图 4-11。


    ![A311833_3_En_4_Fig11_HTML.jpg](img/A311833_3_En_4_Fig11_HTML.jpg)


    图 4-11


    在 Java SE 环境中执行 SINGLE_TABLE 继承示例


    接下来，运行 HTTP Servlet 客户端：打开 `Chapter04-PersistenceIISamples-war` 项目，展开 `com.apress.ejb.chapter04.client`
    包。打开 NetBeans 用于运行 Servlet 的浏览器。（如果不确定，请通过“工具” ➤ “选项” ➤ “常规”打开 NetBeans 首选项。）右键点击
    `SingleTableInheritanceClient.java` Servlet，选择“`运行文件`”，以 Web 应用程序的方式运行测试，如图 4-12
    所示。


    ![A311833_3_En_4_Fig12_HTML.jpg](img/A311833_3_En_4_Fig12_HTML.jpg)


    图 4-12


    执行 `com.apress.ejb.chapter04.client Servlet`


    NetBeans 将在默认浏览器中执行该 Servlet，如图 4-13 所示。在测试执行过程中，任何冲突的现有数据都会被删除，新的测试数据会被创建，然后被查询并以表格形式呈现。引用的对象（包括引用对象的列表）会显示在嵌套的表格单元格中。图
    4-13 展示了该客户端 Servlet 的输出，其中记录了 Servlet 的操作日志。


    ![A311833_3_En_4_Fig13_HTML.jpg](img/A311833_3_En_4_Fig13_HTML.jpg)


    图 4-13


    在 Java EE Web 环境中执行 SINGLE_TABLE 继承示例


    请查看 `SingleTableInheritanceClient.java` 中的代码。您可以自由尝试创建额外的实体、测试 Java 服务外观上的查询和其他服务方法，并观察结果行为。要将测试模式重置回初始状态，您可以随时删除
    WineApp 测试数据库，然后重新执行图 4-8 所示的步骤。


    ### 测试其他持久化示例


    其余六个项目分别测试了本章涵盖的不同特性，这些特性已在项目名称中标识。建议您将这些项目作为参考，了解如何配置各种继承层次结构、映射超类、嵌入类以及复合主键。


    由于本章中的每个项目结构相同，并且每个项目都附带一个专用的 HTTP Servlet 测试器，因此上述步骤可以指导您以相同的方式执行每个示例。


    ## 总结


    本章内容相当丰富，掌握了这些信息后，您应该能够构建一些强大的实体，并根据您的应用领域进行最佳配置。以下是本章涵盖的关键概念总结。


    ### 映射实体继承层次结构


    JPA 为实体类继承层次结构提供了三种常见的 O/R 映射策略的内置支持：SINGLE_TABLE、JOINED 和 TABLE_PER_CLASS。我们分析了每种方法的优缺点，并提供了最适合每种策略的常见用例示例。


    ### 在继承层次结构中使用抽象实体、映射超类和非实体类


    JPA 在类型层次结构中混合使用实体与抽象类和非实体类时提供了灵活的解决方案。实体可以是具体的，也可以是抽象的。只有实体类可以被查询或作为映射实体关系的目标，但实体仍然可以使用非实体类，既可以通过
    `@Embedded` 和 `@ElementCollection` 嵌入它们，也可以通过扩展它们或被它们扩展。我们展示了一些混合使用这些选项的示例来说明它们的用法。


    ### 多态关系


    可以在实体之间指定关系，包括层次结构中的抽象超类型实体。这允许您与继承层次结构中任意位置的实体定义关系，该关系也会隐式地涉及该实体的子类型。


    ### 多态 JPQL 查询


    类似地，JPQL 查询可以选择或连接超类型类的实体，并且任何符合查询条件的子类型实例都将包含在查询结果中。我们研究了如何使用 JPQL 构建可重用的 `@NamedQuery`
    对象，以及自 JPA 2.0 以来引入的 QueryCriteria API。


    ### 使用原生 SQL 查询


    `EntityManager` 允许您发出原生 SQL 查询，这既是对经验丰富的 SQL 开发者的友好表示，也是一种优化手段，可以避免在只需要少数几个字段时查询实体的所有字段所带来的开销。我们提供了一个示例，说明如何定义一个返回实体实例的命名原生
    SQL 查询，以便将结果无缝集成到应用程序中。


    ### 使用查询条件 API


    作为 JPQL 的类型安全替代方案，自 JPA 2.0 以来引入的条件 API 允许您通过动态组装子句和谓词来构建查询，形成一个 CriteriaQuery
    对象，该对象可以被调用来检索实体或其他结果。图 4-14 展示了 persistence.xml 文件在 NetBeans IDE 8.2 中的外观。


    ![A311833_3_En_4_Fig14_HTML.jpg](img/A311833_3_En_4_Fig14_HTML.jpg)


    图 4-14


    Persistence.xml 文件


    ### 复合主键和嵌套外键


    我们探讨了不同类型的复合主键用法，展示了如何使用 `@EmbeddedId` 字段和多个 `@Id` 字段。当实体的主键映射到的列也参与了与其他实体的关系时（例如，当主键包含一个或多个也是外键一部分的列时），情况可能会变得有些棘手。我们提供了一些处理这种情况的示例。


    ### 乐观锁支持


    使用 `@Version` 注解，您可以指定一个字段（该字段在继承层次结构中的所有实体中通用），供 `EntityManager` 在管理并发时（例如在合并操作期间）执行乐观锁定。该字段将由持久化框架自动填充，不应由应用程序代码更新。


    ### 自动生成主键值支持


    JPA 为使用唯一值填充 `@Id` 字段提供了声明式支持。我们提供了如何声明基于数据库序列和基于表的 ID 生成器的示例。


    ### 拦截器：实体回调方法


    您可以在实体类或您选择的辅助类上指定方法，以处理实体生命周期回调。我们列出了可用的回调方法，并解释了如何使用它们来注册您自己的自定义方法，这些方法将在生命周期事件期间被调用。


    # 5. EJB 消息驱动 Bean


    本章讨论了面向消息架构的必要性。它介绍了 Java 消息服务（JMS）、消息传递应用程序的典型架构，并详细阐述了 EJB 消息驱动 Bean（MDB）背后的概念。本章还涵盖了与
    MDB 相关的注解、依赖注入和拦截器。

