    Listing [10-16](#A311833_3_En_10_Chapter.html#Par152) shows the `WineSelector`
    class that has a `getWine` method that returns an instance of `Wine`. The important
    thing to note here is the exact instance of `Wine` (`RedWine` or `WhiteWine`)
    that will be returned is decided at the runtime. In this case, that decision is
    based on the number generated by the random number generator.


    ```

    package com.apress.ejb.chapter10;

    import java.util.Random;

    import javax.enterprise.inject.New;

    import javax.enterprise.inject.Produces;

    public class WineSelector {

    @Produces

    @RandomSelector

    public Wine getWine(@New RedWine rw, @New WhiteWine ww) {

    final int wineNumber = new Random().nextInt(2);

    if (wineNumber == 0) {

    return rw;

    }

    else if (wineNumber == 1) {

    return ww;

    }

    else{

    return null;

    }

    }

    }

