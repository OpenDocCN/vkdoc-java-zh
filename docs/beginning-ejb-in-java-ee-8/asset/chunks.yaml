- fmt: '### The Credit Service


    The credit service is a stateless session bean that is published as a Web service
    using JSR 181 (Web Services Metadata for the Java Platform) annotations. The idea
    behind creating this Web service is twofold:


    - It shows how you can expose a stateless session bean as a Web service.

    - It shows how you can consume a Web service from an EJB application.


    This Web service is consumed by `OrderProcessFacadeBean` to check the customer’s
    credit card. We are going to use the credit service that we developed in Chapter
    [6](#A311833_3_En_6_Chapter.html).


    ### The Database Schema


    The Wines Online application uses a single database schema to store all of the
    information related to customers, orders, inventory, and so on. Figure [7-5](#A311833_3_En_7_Chapter.html#Fig5)
    shows a database diagram with all of the tables and relationships. The schema
    is designed to accommodate or showcase most of the O/R (object/relational) mappings
    in the JPA specification that are covered in this book, including the different
    types of inheritance strategies between entities. Not shown are the tables dedicated
    to ID generation for each root entity in an inheritance hierarchy (for example,
    `BUSINESS_CONTACT_ID_GEN`) or entity not involved in inheritance (for instance,
    `ADDRESS_ID_GEN`).


    ![A311833_3_En_7_Fig5_HTML.jpg](A311833_3_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Database diagram for the Wines Online application


    ## Building, Deploying, and Testing the Application


    EJBs need to be packaged into EJB JAR (Java Archive) files before they are assembled
    into EAR (Enterprise Archive) files that hold all of the required modules and
    libraries for the application. Most application servers provide deployment utilities
    or Ant tasks to facilitate deployment of EJBs to their containers. Java integrated
    development environments (IDEs) like NetBeans, JDeveloper, and Eclipse provide
    graphical deployment tools that allow developers to package, assemble, and deploy
    applications to application servers. There is no requirement that EJBs have to
    be packaged into EJB JAR files and assembled into EAR files. You can also deploy
    the EJB JAR files themselves. In this chapter, we will assemble them into EAR
    files so that we can make the persistence unit a shared module (in its own JAR
    file), and also to set the stage for Chapter [12](#A311833_3_En_12_Chapter.html),
    in which we will be building client applications for the wine store back end that
    we have just developed. We will also package the EJB/WebService module from Chapter
    [6](#A311833_3_En_6_Chapter.html) into this EAR file, along with a Web module
    that contains a simple test servlet that drives the test scenario.


    Packaging, assembly, and deployment aspects are covered in detail in Chapter [11](#A311833_3_En_11_Chapter.html).
    In this chapter, we have developed the wine store application back end using session
    beans, MDBs, JPA entities, and Web services. Using NetBeans and deploying to GlassFish,
    we will perform the following steps to package, assemble, deploy, and test the
    services defined in this chapter.


    ### Prerequisites


    Before performing any of the steps detailed in the next sections, complete the
    “Getting Started” section of Chapter [1](#A311833_3_En_1_Chapter.html), which
    will walk you through the installation and environment setup required for the
    samples in this chapter.


    ### Creating the Database Connection


    The samples in this chapter require a database connection, and for these tests
    we will use the Derby database that is bundled with NetBeans and Glassfish. If
    you have not already created the WineApp database, also used for the Chapter [3](#A311833_3_En_3_Chapter.html)
    and Chapter [4](#A311833_3_En_4_Chapter.html) examples, click on the `Services`
    tab, expand the `Databases` icon, and invoke `"Create Database..."` on the `Java
    DB` node. Create a database named `"WineApp"` with username and password `wineapp/wineapp`,
    as shown in Figure [7-6](#A311833_3_En_7_Chapter.html#Fig6).


    ![A311833_3_En_7_Fig6_HTML.jpg](A311833_3_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Creating the WineApp database and connection


    This last step created a database connection, which is referenced from the persistence
    units in the `persistence.xml` files found in both the JPA and EJB projects. While
    it is possible to pre-create the database objects (tables, sequences, key constraints,
    and so on), we will let JPA create these database objects automatically the first
    time they are needed by each persistence unit.


    Note


    The samples for this chapter, like those for Chapter [3](#A311833_3_En_3_Chapter.html),
    include a JDBC data source that references these connection details. If you choose
    to use different credentials, make sure that you update the `persistence.xml`
    files, as well as the data source defined in the `glassfish-resources.xml` file
    in the `Chapter07-IntegratedServices-ejb` project.


    ### Creating the JMS and JavaMail Resources


    The MDBs in this integrated application require JMS resources. In Chapter [5](#A311833_3_En_5_Chapter.html),
    we created a JMS topic connection factory and a JMS topic, and we will create
    an additional one of each that will be consumed by the MDBs. Initially, `OrderProcessFacadeBean`
    sends a message to the queue that is consumed by `OrderProcessingMDBBean`. In
    turn, `OrderProcessingMDBBean` uses a JMS topic connection factory to send a message
    to the queue that will be used by `StatusMailerBean` to send out e-mail messages
    to the customer. Each of our topic connection factories also requires a JMS topic
    to be defined.


    If you have not completed the samples in Chapter [5](#A311833_3_En_5_Chapter.html)
    (EJB Message-Driven Beans), follow the steps in that chapter in the section “Creating
    the JMS and JavaMail Resources.” In addition to the resources created for that
    chapter’s samples, you will need to create an additional `TopicConnectionFactory`
    and `Topic`. Chapter [5](#A311833_3_En_5_Chapter.html) will guide you in creating
    these additional resources using the GlassFish admin console.


    The new resources you will need to create are a `TopicConnectionFactory` named
    `poTopicConnectionFactory` and a `Topic` named `PurchaseOrderTopic`.


    ### Opening the Sample Application


    Before performing the next step, you may wish to close any existing projects in
    NetBeans to avoid clutter. Open `Chapter07-ServiceIntegration` using the `File`
    ➤ `Open Project` menu, as shown in Figure [7-7](#A311833_3_En_7_Chapter.html#Fig7).
    Make sure that the `Open Required Projects` check box is checked.


    ![A311833_3_En_7_Fig7_HTML.jpg](A311833_3_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Opening the Chapter07-ServiceIntegration project


    Note that this will open the `Chapter06-WebServiceSamples-ejb` project as well,
    since it is used directly by the Chapter [7](#A311833_3_En_7_Chapter.html) samples.
    Some of the source files will initially be flagged with warnings because they
    are missing dependencies until the EJB Web Service has been configured in the
    next step.'
