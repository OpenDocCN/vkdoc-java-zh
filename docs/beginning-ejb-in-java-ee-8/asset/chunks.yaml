    how the components work, we haven’t thoroughly discussed the different types of
    EJB client applications and how to develop them. In this chapter, we will discuss
    different application architectures in which client applications can be involved,
    and we will build the common ones.


    ## Application Architecture


    The Java EE platform provides flexibility on how components can be distributed
