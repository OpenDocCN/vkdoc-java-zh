  trans: '

    ### 第 3 章：实体与 Java 持久化 API (JPA)


    本章介绍 Java 持久化 API (JPA)，以及可用于在 Java EE 容器内外支持实体的各种持久化服务。本章涵盖基本的 O/R 映射，并介绍 Java
    持久化查询语言（JPQL）。


    ### 第 4 章：高级持久化特性


    本章深入探讨更高级的持久化概念，描述 JPA 为映射实体继承层次结构所提供的支持。通过三种受支持的继承映射策略的示例，指出每种方法的优缺点，以帮助您决定哪种策略最适合您应用的特定需求。在其他主题中，本章还涵盖复杂主键
    (PK) 映射、用于使用数据库序列或表自动填充主键值的 ID 生成器、锁定策略以及缓存管理。


    ### 第 5 章：EJB 消息驱动 Bean


    本章介绍如何使用 MDB 为您的应用添加异步、事件驱动的行为。本章的代码示例将解释并演示 Java 的消息传递 API——JMS。


    ### 第 6 章：EJB、Web 服务与微服务


    会话 Bean 为 Web 服务提供了出色的实现，本章将探讨 EJB 对这种技术完美结合的支持。


    ### 第 7 章：集成会话 Bean、实体、消息驱动 Bean 与微服务


    在分别介绍了所有不同的组件模型类型之后，第 7 章将它们整合到一个集成的 Java EE 应用中。我们认为，了解所有部分如何组合在一起以生成一个运行中的应用将特别有用。


    ### 第 8 章：事务管理


    EJB 提供丰富的事务服务支持，并使 Bean 提供者能够轻松地以声明方式为企业 Bean 指定自定义的、由容器提供的事务行为。EJB 还允许企业 Bean
    选择退出此模型并控制自己的事务划分行为。本章将两种可选的事务模型应用于一个单一的逻辑场景，以权衡每种方法的优势。


    ### 第 9 章：EJB 性能与测试


    本章提供了关于如何评估 EJB 组件性能的宝贵见解，以帮助您决定 EJB 提供的众多选项中哪一个适合您的应用。除了解释如何设置性能测试之外，我们还提供了一些我们运行过的性能测试案例，并附有我们对结果的评估。


    ### 第 10 章：上下文与依赖注入


    上下文与依赖注入 (CDI) 服务在 Java EE 6 中引入，它通过一种强大的方式增强了 EJB 中定义的组件模型，即向您的应用中注入资源，这些资源的生命周期是上下文相关的，并由服务器方便地管理。本章介绍
    CDI，并解释 EJB 开发者如何利用这种支持来丰富应用的行为。


    ### 第 11 章：EJB 打包与部署


    组装和部署被整合到本章中，我们将涵盖应用组装者和部署者角色所需的任务。本章讨论打包 EJB 和持久化模块、以不同方式将模块组装到企业归档 (EAR) 文件中、解析模块之间以及打包在不同模块中的
    EJB 之间的引用，以及将资源需求绑定到目标应用服务器环境中安装的具体资源。


    ### 第 12 章：EJB 客户端应用


    在本章中，我们将引导您了解可用于构建应用的应用架构和不同的编程模型，包括每种方法的优缺点。完成这些之后，我们将确定一种应用架构——使用 JavaServer
    Faces (JSF) 技术开发 Web 应用。然后，我们将深入探讨 JSF 架构和概念，并专注于将 JSF 用户界面组件和 JSF 导航模型与我们在第 7
    章中开发的 EJB/WebService/JPA 后端应用集成。


    最后，我们还将解释如何使用轻量级应用客户端容器在纯 Java SE 环境中执行您的会话 Bean。此轻量级容器提供了在其环境中执行的 EJB，并具备真正的
    EJB 容器所提供的某些服务（例如容器注入）。


    ### 第 13 章：在可嵌入 EJB 容器中测试


    在生产部署中，EJB 组件在应用服务器内的 Java EE 环境中运行。出于测试目的，EJB 允许您在 EJB 容器的轻量级子集中测试您的 EJB 组件，该子集称为
    EJB Lite，并作为可嵌入 EJB 容器实现，可以在纯 Java SE 环境中运行。本章涵盖各种 EJB 测试场景，并指导您使用 JUnit 在 GlassFish
    的可嵌入 EJB 容器中测试 EJB 组件（和 JPA 实体）。


    ## 入门指南


    本章的这一部分将帮助您准备好运行本书其余部分示例所需的软件安装和配置。在撰写本文时，EJB 3.2 规范即将最终定稿。GlassFish 应用服务器已经实现了该规范，使开发者社区能够亲身体验新规范。


    GlassFish 是一个开源应用服务器，实现了 Java EE 平台的最新特性。事实上，GlassFish 是 Java EE 平台所有规范（包括 EJB
    3.2 规范）的参考实现。NetBeans IDE 紧密跟踪 GlassFish 的发布，确保 NetBeans 支持 Java EE 规范的最新状态，并使
    NetBeans 成为部署和运行本书示例的理想平台。您会发现，每一章都附带一个 NetBeans 应用项目，该项目由一个或多个附加项目组成，这些项目代表 EJB、Web
    或其他模块，演示了该章涵盖的特性。尽管这些示例应用都配置为在 GlassFish 服务器中运行，但它们是可移植的（由于遵循 Java EE 标准），并且可以部署到您选择的任何
    Java EE 8 服务器。


    虽然我们是在 Windows 7 环境中使用 NetBeans 构建和测试本书中的示例，但代码示例并非特定于操作系统，它们可以在任何能够运行 NetBeans
    及其集成的 GlassFish 服务器的系统上执行。尽管如此，您可能需要在其他操作系统上调整环境设置以安装和执行 NetBeans 及其集成的 GlassFish
    服务器。


    注意


    您可以在以下网站找到有关 NetBeans IDE 及其集成的 GlassFish 应用服务器的更多详细信息：[`http://netbeans.org/features/index.html`](http://netbeans.org/features/index.html)


    本章的其余部分将涵盖以下内容：


    *   安装 Java SE 开发工具包 (JDK)

    *   下载 NetBeans IDE

    *   安装 NetBeans 及其集成的 GlassFish 服务器

    *   测试 NetBeans 和 GlassFish 安装

    *   管理 GlassFish 应用服务器


    即使您熟悉 NetBeans 和 GlassFish，我们也建议您阅读以下部分，因为运行其余章节中的示例代码依赖于正确完成此设置。

    '
