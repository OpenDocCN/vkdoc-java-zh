- fmt: '# Compiling, Deploying, and Testing the JPA Entities


    ## Prerequisites


    Before performing any of the steps detailed in the next sections, complete the
    “Getting Started” section of Chapter [1](#A311833_3_En_1_Chapter.html). This section
    will walk you through the installation and environment setup required for the
    samples in this chapter.


    ## Opening the Sample Application


    Copy the `Chapter03-PersistenceSamples` directory and its contents into a directory
    of your choice. Run the NetBeans IDE, and open the `Chapter03-PersistenceSamples`
    project using the `File` ➤ `Open Project` menu. Make sure the `Open Required Projects`
    check box is checked. See Figure [3-1](#A311833_3_En_3_Chapter.html#Fig1).


    ![A311833_3_En_3_Fig1_HTML.jpg](A311833_3_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Opening the `Chapter03-PersistenceSamples` project


    Expand the `Chapter03-PersistenceSamples-ejb` node and observe the packages containing
    the EJB façade and the JPA entities for this sample application, and the sources
    for the chapter listings. The `persistence.xml` file can be found in the `Configuration
    Files` folder, and the JDBC data-sources that specify the database connection
    are found in the `glassfish-resources.xml` file under `Server Resources`. As described
    in “The Persistence Archive” section above, a JPA persistence archive may be packaged
    in various ways within the application. In this example, we are bundling the persistence
    archive together with the EJB façade, in the EJB `.jar` file.


    The client HTTP servlet, `CustomerOrderManagerClient.java`, lives in the `Chapter03-PersistenceSamples-war`
    project. See Figure [3-2](#A311833_3_En_3_Chapter.html#Fig2).


    ![A311833_3_En_3_Fig2_HTML.jpg](A311833_3_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Verifying that the EJB and the JPA artifacts are available in the project


    ## Creating the Database Connection and Sample Schema


    The samples in this chapter require a database connection and a database schema
    populated with tables that map to the JPA entities. To create the database itself,
    click on the `Services` tab, expand the `Databases` icon, and invoke `Create Database...`
    on the `Java DB` node. Create a database named `WineApp`, with username and password
    `wineapp/wineapp` as shown in Figure [3-3](#A311833_3_En_3_Chapter.html#Fig3).


    ![A311833_3_En_3_Fig3_HTML.jpg](A311833_3_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Creating the `WineApp` database and connection


    This last step created a database connection, which can now be used to create
    the database schema. To do this, switch to the `Files` tab, expand the `Chapter03-PersistenceSamples`
    folder and then the `database` folder, right-click on the `Chapte03-WineAppSchema.sql`
    file, and choose `Run File`. In the dialog, be sure to select the new `WineApp`
    connection created in the previous step. You can safely ignore errors that are
    raised in the `Chapter03-WineAppSchema.sql` script caused by an attempt to clean
    out objects that don’t yet exist. See Figure [3-4](#A311833_3_En_3_Chapter.html#Fig4).


    ![A311833_3_En_3_Fig4_HTML.jpg](A311833_3_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Creating the sample database schema in the `WineApp` database


    ## Compiling the Entities, EJBs, and the Client


    Invoke the context menu on `Chapter03-PersistenceSamples` node and build the application
    by selecting the `Clean and Build` menu option. See Figure [3-5](#A311833_3_En_3_Chapter.html#Fig5).


    ![A311833_3_En_3_Fig5_HTML.jpg](A311833_3_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Building the application


    ## Deploying the JPA Persistence Unit, the EJB Module, and the Servlet


    Once you have compiled the application, you can deploy it to the GlassFish application
    server. Invoke the context menu on `Chapter03-PersistenceSamples` node and deploy
    the application by selecting the `Deploy` menu option. See Figure [3-6](#A311833_3_En_3_Chapter.html#Fig6).


    ![A311833_3_En_3_Fig6_HTML.jpg](A311833_3_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Deploying the application


    NetBeans will start the integrated GlassFish application server and deploy the
    application to the server. The server’s log window will log the deployment status
    of the application. See Figure [3-7](#A311833_3_En_3_Chapter.html#Fig7).


    ![A311833_3_En_3_Fig7_HTML.jpg](A311833_3_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Log showing successful deployment


    ## Running the Client Programs


    Once the entities, the EJB, and its client servlet are successfully deployed,
    we need to set the run target that we wish to execute. To set the run target,
    invoke the context menu on `Chapter03-PersistenceSamples` node and select the
    `Properties` menu option. Select the `Run` category, enter the run target `CustomerOrderManagerClient`
    in the `Relative URL` text field, and OK the dialog.


    To run the client HTTP servlet, invoke the context menu on `Chapter03-PersistenceSamples`
    node and select the `Run` menu option, as shown in Figure [3-8](#A311833_3_En_3_Chapter.html#Fig8).


    ![A311833_3_En_3_Fig8_HTML.jpg](A311833_3_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Running the selected servlet


    NetBeans will open your default browser and execute the selected servlet. Any
    existing conflicting data is deleted, new test data is created, and then it is
    queried and rendered in tabular format. To avoid circular dependencies, an entity’s
    properties are displayed only the first time it is encountered; any subsequent
    reference to that entity is shown as `[<entity> <PK> already printed]`. Referenced
    objects, including lists of referenced objects, are shown in nested table cells.
    Here is the output for the client servlet, showing the log of the servlet’s actions.
    See Figure [3-9](#A311833_3_En_3_Chapter.html#Fig9).


    ![A311833_3_En_3_Fig9_HTML.jpg](A311833_3_En_3_Fig9_HTML.jpg)


    Figure 3-9


    Output of `CustomerOrderManagerClient` servlet


    Take a look at the code in `CustomerOrderManagerClient.java`. Feel free to experiment
    by creating additional entities, testing the `mergeEntity()` and other service
    methods on the EJB session bean, and observing the resulting behavior. To reset
    the test schema back to its original state, you can always re-execute the step
    depicted in Figure [3-4](#A311833_3_En_3_Chapter.html#Fig4).


    ## Summary


    This chapter introduced the Java Persistence API 2.2 introduced with Java EE 8
    and a few of the essential services it offers. We examined how a simple JavaBean
    can be transformed into a JPA entity simply by adding a couple of annotations.
    We then extended this example to illustrate how you can further refine your entities
    to add greater flexibility by declaratively specifying additional annotations
    on the entity class.


    We explored these essential components of JPA: the persistence archive, the persistence
    unit, the persistence context, and the `EntityManager`. We walked through the
    entity life cycle to examine an entity’s behavior as it transitions between the
    following states: new, managed, detached, and removed.


    The section on O/R mapping explored how entities map to their underlying tables,
    and how you can control the basic mapping to allow a field to map to a column
    with a different name.


    We discussed the role of an entity’s primary key, explored both simple and composite
    primary keys, and how to define each. We showed how to configure an ID generator
    to have JPA auto-assign an entity’s PK at the time it is persisted.


    We then delved into entity relationships and discussed the relationship field
    types supported by JPA: `@OneToOne`, `@OneToMany`, `@ManyToOne`, and `@ManyToMany`.


    A discussion of JPQL ensued with examples of how to declare and execute named
    queries and how to use dynamic and bulk update and delete queries.


    We concluded with a sample application that illustrated how related entities interact
    and how they can be manipulated through a session façade that is in turn called
    from an HTTP servlet.'
