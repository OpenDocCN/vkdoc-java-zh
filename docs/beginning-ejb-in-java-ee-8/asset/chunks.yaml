    ### 生命周期回调方法


    有状态会话 Bean 支持构造、销毁、激活和钝化等回调事件。以下是映射到上述事件的回调方法：


    *   `PostConstruct`：使用 `@PostConstruct` 注解标记。

    *   `PreDestroy`：使用 `@PreDestroy` 注解标记。

    *   `PreActivate`：使用 `@PreActivate` 注解标记。

    *   `PrePassivate`：使用 `@PrePassivate` 注解标记。


    `PostConstruct` 回调发生在 Bean 实例在 EJB 容器中被实例化之后。如果 Bean 使用任何依赖注入机制来获取对其环境中资源或其他对象的引用，则
    `PostConstruct` 事件会在注入执行之后、Bean 类中的第一个业务方法被调用之前发生。


    对于 `ShoppingCart` 会话 Bean，我们可以有一个名为 `initialize()` 的业务方法来初始化 `cartItems` 列表，如清单
    2-14 所示。


    ```

    @PostConstruct

    public void initialize() {

    cartItems = new ArrayList();

    }

    清单 2-14

    PostConstruct 方法

    ```


    `PreDestroy` 回调发生在任何带有 `@Remove` 注解的方法完成之后。对于 `ShoppingCart` 会话 Bean，我们可以有一个名为
    `exit()` 的业务方法，它将 `cartItems` 列表写入数据库。在本章中，我们将仅向系统控制台打印一条消息来说明此回调。清单 2-15 展示了带有
    `@PreDestroy` 注解的 `exit()` 方法的代码。


    ```

    @PreDestroy

    public void exit() {

    // items list into the database.

    System.out.println("Saved items list into database");

    }

    清单 2-15

    PreDestroy 方法

    ```


    `@Remove` 注解对于有状态会话 Bean 来说是一个有用的生命周期方法。当调用带有 `@Remove` 注解的方法时，容器将在该方法执行后从对象池中移除该
    Bean 实例。清单 2-16 展示了带有 `@Remove` 注解的 `stopSession()` 方法的代码。


    ```

    @Remove

    public void stopSession() {

    // The method body can be empty.

    System.out.println("From stopSession method with @Remove annotation");

    }

    清单 2-16

    Remove 方法

    ```


    当有状态会话 Bean 实例空闲时间过长时，`PrePassivate` 回调会被触发。在此事件期间，容器可能会钝化并将其状态存储到缓存中。带有 `@PrePassivate`
    注解的方法会在容器钝化 Bean 实例之前被调用。


    当客户端应用程序再次使用一个已钝化的有状态会话 Bean 时，会触发 `PostActivate` 事件。此时会创建一个具有恢复状态的新实例。当 Bean
    实例准备就绪时，会调用带有 `@PostActivate` 注解的方法。

