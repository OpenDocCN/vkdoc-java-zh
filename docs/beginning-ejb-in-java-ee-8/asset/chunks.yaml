    tier interact after the arrival of CDI.


    ![A311833_3_En_10_Fig2_HTML.jpg](A311833_3_En_10_Fig2_HTML.jpg)


    Figure 10-2


    CDI Application Architecture


    ![A311833_3_En_10_Fig1_HTML.jpg](A311833_3_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Java EE Application Architecture before CDI


    The two important features provided by CDI are a part of its name:


    *   Contexts: Deals with binding the stateful components (like stateful session
    beans) to a well-defined scope. Stateful components are those that retain information
    across their invocations. A CDI container associates stateful components with
    a definite scope—creating them when required and destroying them when they are
    out of scope. As a result, the client is not burdened with managing the life cycle
    of the stateful components.

    *   Dependency Injection: Deals with injecting the components into an application
    in a loosely coupled but typesafe way. The injected components are instantiated
    by the container, which means users don’t need to create an instance of the component
    using new. Users can use the interface instead of the actual implementation of
    the interface for injection. This allows users to defer selection of a specific
    implementation, of a bean type that needs to be injected, to deploy at runtime.


    Note


    We can use injection points only in a CDI-enabled application, and Java EE 8 platform
    requires Dependency Injection for Java 1.0.


    Listings [10-1](#A311833_3_En_10_Chapter.html#Par64), [10-2](#A311833_3_En_10_Chapter.html#Par66),
    and [10-3](#A311833_3_En_10_Chapter.html#Par68) demonstrate the concepts of “Contexts”
    and “Dependency Injection” in their simplest form. In the following sections of
    this chapter, we will build upon this example to demonstrate the various features
    of CDI. Listing [10-1](#A311833_3_En_10_Chapter.html#Par64) defines a `Wine` interface
    that is implemented by the `RedWine` class, as shown in Listing [10-2](#A311833_3_En_10_Chapter.html#Par66).


    ```

    package com.apress.ejb.chapter10;

    public interface Wine {

    public String getColor();

    }

    Listing 10-1

    Wine.java

    ```


    The `RedWine` class demonstrates the “Context” aspect of CDI. It has the `ApplicationScoped`
    annotation, which means that an instance of `RedWine` will be created only once
    when the application is instantiated, and that instance will be destroyed when
    the application is shut down. During the lifetime of the application, this instance
    will be shared across the application. We will learn more about scopes later in
    this chapter.


    ```

    package com.apress.ejb.chapter10;

    import javax.enterprise.context.ApplicationScoped;

    @ApplicationScoped

    public class RedWine implements Wine {

    public String getColor() {

    return "Red";

    }

    }

    Listing 10-2

    RedWine.java demonstrates the Context aspect

    ```


    The client shown in Listing [10-3](#A311833_3_En_10_Chapter.html#Par68) injects
    the field `newWine` using the `@Inject` annotation. Fields injected using the
    `@Inject` annotation are instantiated by the container, which means that users
    do not need to create an instance of the object using new, nor do they need a
    compile-time dependency on the actual implementation class. An important thing
    to observe here is that the `newWine` field is of type `Wine`. In this particular
    case, the container automatically uses the `RedWine` implementation for instantiation.
    If we had to instantiate `RedWine` in the classical way, then we would have to
    use the `RedWine` implementation instead of the `Wine` interface. As a result,
    there would have been a tight coupling between the client and the `Wine` object
    that could not be changed either at deploy time or at runtime. We will learn more
    about how the CDI container knows which implementation to inject when we discuss
    dependency injection later in this chapter.


    ```

    package com.apress.ejb.chapter10;

    import javax.inject.Inject;

    public class WineClient {

    // Instantiating the classical way

    private Wine oldWine = new RedWine();

    // Instantiating via field dependency injection

    @Inject

    private Wine newWine;

    }

    Listing 10-3

    WineClient.java demonstrates the Dependency Injection Aspect

    ```


    For reference, the CDI specification also defines the following services. A more
    detailed explanation of these advanced CDI topics is outside the scope of this
    chapter, but you are encouraged to refer to the CDI spec for additional information.


    *   Integration of the Web tier with contextual objects via Unified Expression
    Language (EL)

    *   Decorators that implement beans and can intercept the invocation of those
    beans by business methods

    *   Interceptors for separating business logic from cross-cutting concerns

    *   Event notification model that defines the interaction between beans in a loosely
    coupled manner

    *   Ability to interact cleanly with the container via Portable Extensions


    ## Relationship with EJB


    CDI bridges the gap between the Web tier consisting of Servlets, JSP, and JSF
    and the enterprise tier consisting of EJB and JPA. Servlets, JSP, and JSF are
    responsible for content presentation but do not have transaction management and
    persistence functionality. EJB and JPA, support database-related operations like
    commit, rollback, and other transaction management functionality. Using CDI, Web
    applications can perform database-related operations supported by JPA using session
    beans as a façade.


    Session Beans participate in the CDI life cycle like managed beans. Session Beans
    can be injected into other session beans and managed beans. Managed Beans can
    be injected into session beans. Users should be careful while deciding whether
    to use session beans or managed beans. Session Beans should be used when the application
    requires the following advanced enterprise services:


    *   Role-based security

    *   Transaction management

    *   Scalability through instance pooling

    *   Concurrency

    *   Events and timers


    Managed beans will suffice for applications that require dependency injection,
    lifecycle management, and interceptors. Managed Beans can be easily upgraded to
    session beans by adding `@Stateless`, `@Stateful`, or `@Singleton` annotation.


    Note


    Message-Driven Beans and Entities are non-contextual objects and may not be injected
    into other objects. Message-Driven Beans take advantage of a few CDI features,
    like interceptors and decorators, as the container performs injection on all managed
    bean instances including the noncontextual ones.


    ## CDI Concepts


    Now that we have a basic understanding of CDI, its place in the Java EE stack,
    and its relationship with EJB, let us take a detailed look at Contexts and Dependency
    Injection.'
