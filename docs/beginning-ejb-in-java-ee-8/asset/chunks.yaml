    ## Summary


    In this chapter, we covered Contexts and Dependency Injection (CDI) version 2.0\.
    We looked at the place that CDI occupies within Java EE framework and the benefits
    it provides by gluing Web and business tiers. We especially learned that we can
    now use CDI 2.0 on Java EE as well as Java SE as well as how the CDI 2.0 new features
    help increase developer productivity. We explained the two main components of
    CDI framework, namely, contexts and dependency injection. We also looked at the
    contextual life cycle of stateful components participating in the CDI life cycle
    and discussed different types of scopes. Using examples, we also looked at different
    ways that dependency can be injected and how ambiguous dependency issues can be
    resolved at compile time, deploy time, or runtime. We discussed the relationship
    between CDI and EJB, specifically with session beans. Finally, we deployed and
    executed the sample CDI client program using the GlassFish application server
    and experimented with the sample code to see how changes to the code affect the
    output.


    # 11. EJB Packaging and Deployment


    Until now, we have focused on how to build EJBs, Java Persistence API (JPA) entities,
    and their clients, for exploiting the surrounding enterprise services offered
    by the EJB container. In Java EE parlance, these tasks fall under the role of
    Application Component Provider, which is simply referred to as the Provider. In
    this chapter, we explore the topics that surround the process of packaging your
    components into modules and library components, binding external references declared
    in your Java EE components to actual resources in your server environment, and
    sending it all off to an application server so that the components can be executed
    at runtime by an application. These responsibilities are handled by the Java EE
    roles of the Application Assembler (the Assembler) and the Application Deployer
    (the Deployer). While in practice it is common for a single individual to perform
    one or more of these roles, or for many people to perform any single role, for
    the purpose of explaining these topics, we will partition the deployment tasks
    into stages that correspond to these designated roles.


    We will emphasize EJB and JPA entity components and also touch upon deployment
    of the other Java EE module types: Web application modules, application clients,
    and resource adapters. We will also look at the relationship between the Java
    EE server and the four Java EE containers that it supports, and we will explore
    some of the services that are provided by a Java EE server.


    Following a brief overview of the deployment tasks in which we introduce much
    of the deployment terminology, we offer a look at the Java EE infrastructure components—the
    Java EE server and containers—that support deployment. We will explore the different
    types of Java EE modules and how they fit together and how you specify the deployment
    descriptors—metadata files—that define each module. A section on library components
    is offered, which explains how to declare class-path dependencies between Java
    EE modules and library components. We then provide a more detailed examination
    of the Assembler and Deployer roles, and we conclude with the deployment requirements
    that are specific to EJB modules and JPA persistence units.


    In the current Java world, it is very important the usage of Java Virtual Machine
    (JMV). Basically, every Java program requires a JVM running on our machine so
    that all the Java bytecode is run using that JVM. This means that VM will be not
    distributed with each program. The same concept is used for Java EE. After reading
    this chapter, you should understand how to do the following:


    *   Group your EJB, JPA, and other application components into Java EE modules
    and library components.

    *   Resolve naming collisions and redundancies found in external references.

    *   Package a Java EE application consisting of one or more Java EE modules and
    library components.

    *   Declare class-path dependencies between modules and libraries.

    *   Bind external references to physical resources in the application server environment.'
