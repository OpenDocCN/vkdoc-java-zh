    #### 拦截器：回调方法


    企业级 Bean 和实体都可以指定其某些方法或独立类中的方法，在特定生命周期事件发生时被调用。例如，会话 Bean 可以指定某个方法在 Bean 实例化之后、交付给客户端之前被调用。该方法可以初始化
    Bean 的状态信息，使用 JNDI 查找资源，或执行任何其他不要求事务上下文的操作。此类回调方法被称为拦截器，它们允许 Bean 开发者以编程方式参与企业级
    Bean（或实体）与其容器之间的交互。这种模式（也称为横切）的一个重要优势是，单个拦截器可以定义一次，然后应用于多个方法，甚至多个 EJB。EJB 3.2
    规范还增加了一个选项，允许有状态会话 Bean 的生命周期回调拦截器方法在由该生命周期回调方法的事务属性决定的事务上下文中执行。


    #### POJO 实现


    EJB 3 在消除早期 EJB 版本中困扰企业级 Bean 类及其必需接口的繁文缛节方面取得了巨大进步。与开发者抱怨即使定义最基本的 Bean 行为也必须定义
    XML 元数据类似，他们发现必须编写自定义接口来处理企业级 Bean 的工厂支持很繁琐，并且要求会话 Bean 的接口扩展 EJB 特定接口也很不方便。所有这些限制都在
    EJB 3 中得到了解决。


    Home 方法不再是强制性的，尽管它们仍然受支持。对于会话 Bean 和 MDB，默认构造函数取代了早期 EJB 规范要求的无参 `ejbCreate()`
    方法。


    对于实体，`Home` 接口被一个 `EntityManagerFactory` 实例取代，该实例为 JPA 持久化单元生成 `EntityManager`
    实例，以管理实体生命周期操作，包括查询执行。


    #### 智能使用默认值


    EJB 3 如何简化开发过程的一个绝佳示例是，它利用默认行为来提供丰富的功能，而无需任何编码或声明性元数据。例如，只需用 `@Entity` 注解标记一个
    POJO，其所有公共属性就会自动成为持久化字段，并且表和列名称会采用与实体和字段名称匹配的派生值。仅在需要覆盖特定区域的默认行为时，才需要额外的注解或 XML
    元素。仅当表名与实体名不匹配时，才需要 `@Table` 注解。我们已非常谨慎地确保默认值与最常见的用法相匹配，因此在大多数用例中，不需要显式元数据，从而产生更精简、更整洁的代码。


    注意


    依赖默认行为的一个后果是，类不会在任何地方描述其完整行为，因此你需要很好地理解正在应用的默认行为。IDE 在推导和显示企业级 Bean 或实体（并明确显示其完全默认值）方面可能很有用。


    ### 分布式计算模型


    任何企业应用程序的核心都是能够在单独的 Java 线程或进程中执行任务和运行组件。通过基于 RMI 的远程服务，应用程序客户端层中的客户端可以访问网络上任何位置的应用服务器中运行的
    EJB。远程接口方法的传值行为提供了一种粗粒度模型，旨在减少松散连接的客户端和服务器之间的网络流量。然而，许多使用 EJB 的应用程序不需要远程访问，并选择将其
    EJB 配置为本地使用。这消除了远程访问支持的开销，同时继续提供其余的企业服务。


    #### EJB 角色


    EJB 规范为参与定义企业级 Bean 或实体的不同阶段，或为企业级 Bean 提供服务和 API 实现的个人定义了七个角色。本书针对的是参与定义企业级 Bean
    及其相关元数据的三个角色。在实践中，这些角色中的一个或多个可能由同一个人执行，某些任务可能由一个角色执行并由另一个角色覆盖；但理解 EJB 开发过程中任务的逻辑划分是有用的。我们将在本书的各个章节中引用这些角色。


    ##### 企业级 Bean 提供者


    企业级 Bean 提供者，也称为 Bean 提供者，负责定义和实现企业级 Bean 的业务逻辑和结构。这包括定义 Java 类、实现服务方法、在 Bean
    及其方法上声明性地指定事务和安全性信息、注入或查找所需资源，以及任何其他可应用于企业级 Bean 类的内容。


    应用于 JPA 实体时，Bean 提供者定义实体的持久化结构及其与其他实体的关系。提供者可以定义映射和主键生成行为，但此角色通常仅限于定义实体的逻辑依赖关系和结构。


    ##### 应用程序组装者


    应用程序组装者将 EJB 组合成 EJB 模块，将实体组合成持久化归档，然后将这些模块与其他 Java EE 模块组合在一起以生成应用程序。此任务需要解析对逻辑服务器资源的引用，包括
    EJB 之间的引用。应用程序组装者必须使用为 EJB 和实体组件定义的接口和元数据，但无需熟悉实现细节。


    ##### 部署者


    部署者获取由应用程序组装者组装好的应用程序，并将其部署到特定的应用服务器实例或集群。部署者必须解析 EJB 组件定义的所有外部依赖关系，将它们映射到安装在应用服务器环境中的具体资源。对于实体，部署者可以提供或覆盖实体将映射到的实际数据库对象的详细信息。


    ## 本书的组织结构


    为了帮助你了解本书其余部分的结构，以下是各章的简要总结。你不必按顺序阅读这些章节。每章都附有示例程序，它们可以独立运行。不过，主题是逐步引入的，因此，如果你在某章中遇到一个在该章中未定义的术语或概念，它很可能是在本书的前面章节中定义的。


    ### 第 1 章：EJB 3.2 架构与 CDI 服务简介


    本章首先介绍本书，并提供对 EJB 的概述。该概述涵盖 EJB 开发框架和组件模型、EJB 的核心特性、EJB 的历史、EJB 3 简化开发模型以及 EJB
    分布式计算模型。本章最后以“入门”部分结束，帮助你安装运行本书提供的众多示例应用程序所需的 NetBeans IDE 和 GlassFish Java EE
    参考实现服务器。


    ### 第 2 章：EJB 会话 Bean


    第 2 章探讨了 EJB 的主要服务对象：会话 Bean。会话 Bean 在其多种角色中被审视：作为实体外观、作为服务组件（无论有无状态）、作为单例或定时器驱动对象，以及作为事务和安全服务的主要协调者。

    '
- fmt: '### Chapter 3: Entities and the Java Persistence API (JPA)


    The Java Persistence API (JPA) is introduced, along with the various persistence
    services that are available to support entities both within a Java EE container
    and outside of one. This chapter covers basic O/R mappings, and it introduces
    the Java Persistence Query Language, or JPQL.


    ### Chapter 4: Advanced Persistence Features


    Delving into more advanced persistence concepts, this chapter describes the support
    offered in JPA for mapping entity inheritance hierarchies. Examples of the three
    supported inheritance mapping strategies identify the strengths and weaknesses
    of each approach in order to help you decide which one best suits the particular
    needs of your application. Among other topics, this chapter also covers complex
    primary key (PK) mappings, ID generators for autopopulating primary key values
    using a database sequence or table, locking strategies, and cache management.


    ### Chapter 5: EJB Message-Driven Beans


    This chapter describes how you can use MDBs to add asynchronous, event-driven
    behavior to your application. JMS, Java’s messaging API, is explained and demonstrated
    in this chapter’s code examples.


    ### Chapter 6: EJB, Web Services, and Microservices


    Session beans provide an excellent implementation for Web Services, and this chapter
    explores EJB’s support for this fine marriage of technologies.


    ### Chapter 7: Integrating Session Beans, Entities, Message-Driven Beans, and
    Microservices


    After covering all of the different component model types individually, Chapter
    7 brings them all together in an integrated Java EE application. We think you
    will find it particularly useful to see how everything fits together to produce
    a running application.


    ### Chapter 8: Transaction Management


    EJB offers rich transaction service support, and it makes it easy for Bean Providers
    to declaratively specify custom container-provided transactional behavior on an
    enterprise bean. EJB also allows enterprise beans to opt out of this model and
    control their own transaction demarcation behavior. This chapter applies two alternative
    transactional models to a single logical scenario for weighing the benefits of
    each approach.


    ### Chapter 9: EJB Performance and Testing


    This chapter provides an invaluable look at how to gauge the performance of your
    EJB components in order to help you decide which of the many options EJB offers
    is right for your application. In addition to explaining how to set up performance
    tests, we present some performance test cases that we have run, complete with
    our assessments of the results.


    ### Chapter 10: Contexts and Dependency Injection


    Introduced in Java EE 6, Contexts and Dependency Injection (CDI) services augment
    the component model defined in EJB with a powerful means of injecting resources
    into your application whose life cycles are contextual and conveniently managed
    by the server. This chapter introduces CDI and explains how EJB developers can
    leverage this support to enrich an application’s behavior.


    ### Chapter 11: EJB Packaging and Deployment


    Assembly and deployment are rolled into this chapter as we cover the tasks required
    of the Application Assembler and Deployer roles. This chapter discusses packaging
    EJB and persistence modules, assembling modules in different ways into an enterprise
    archive (EAR) file, resolving references between modules and between EJBs packaged
    into different modules, and binding resource requirements to concrete resources
    installed in the target application server environment.


    ### Chapter 12: EJB Client Applications


    In this chapter, we walk you through application architectures and different programming
    models that you can use to build applications, including the pros and cons of
    each approach. Once we have done that, we settle on one application architecture—developing
    Web applications using JavaServer Faces (JSF) technology. We then drill down into
    the JSF architecture and concepts and focus on integrating JSF user interface
    components and the JSF navigation model with the EJB/WebService/JPA back-end application
    that we developed in Chapter 7.


    Finally, we also explain how to use a lightweight application client container
    to execute your session beans in a pure Java SE environment. This lightweight
    container provides EJBs that execute in its environment with some of the services
    (such as container injection) that are offered by a true EJB container.


    ### Chapter 13: Testing in an Embeddable EJB Container


    In a production deployment, EJB components run in a Java EE environment, inside
    an application server. For testing purposes, EJB allows you to test your EJB components
    within a lightweight subset of the EJB Container, known as EJB Lite and implemented
    as an Embeddable EJB Container, which can run in a pure Java SE environment. This
    chapter covers a variety of EJB testing scenarios and guides you in using JUnit
    to test EJB components (and JPA entities) in GlassFish’s Embeddable EJB Container.


    ## Getting Started


    This section of the chapter will get you ready with the software installation
    and configuration required to work with the samples in the rest of the book. At
    the time of this writing, the EJB 3.2 specification was on its way to being finalized.
    The GlassFish application server had implemented the specification that allowed
    the developer community to get hands-on experience with the new specification.


    GlassFish is an open source application server that implements the newest features
    of the Java EE platform. In fact, GlassFish is the reference implementation for
    all of the specifications of the Java EE platform, including the EJB 3.2 specification.
    Glassfish releases are tracked closely by the NetBeans IDE, ensuring that NetBeans
    supports the very latest state of the Java EE specifications and making NetBeans
    the ideal platform for deploying and running the examples in this book. You will
    find that each successive chapter is accompanied by a NetBeans application project
    comprised of one or more additional projects representing the EJB, Web, or other
    modules that demonstrate the features covered in that chapter. Although these
    sample applications are all configured to run in the GlassFish server, they are
    portable (by virtue of following the Java EE standards) and may be deployed to
    the Java EE 8 server of your choice.


    Although we built and tested the examples in this book using NetBeans in a Windows
    7 environment, the code samples are not operating-system specific, and they can
    be executed on any system that can run NetBeans and its integrated GlassFish server.
    Nevertheless, you might have to tweak the environment settings to install and
    execute NetBeans and its integrated GlassFish server on other operating systems.


    **Note**


    You can find more details on the NetBeans IDE and its integrated GlassFish application
    server at the following website: [`http://netbeans.org/features/index.html`](http://netbeans.org/features/index.html)


    The remaining sections of this chapter will cover the following:


    - Installing Java SE Development Kit (JDK)

    - Downloading the NetBeans IDE

    - Installing NetBeans and its integrated GlassFish server

    - Testing NetBeans and GlassFish installation

    - Administrating the GlassFish application server


    Even if you are familiar with NetBeans and GlassFish, we recommend that you read
    through the following sections, as running the sample code in the rest of the
    chapters depends on this setup being done correctly.'
