  raw: '### Single-Table-per-Class Inheritance Hierarchy (InheritanceType.SINGLE_TABLE)


    The default inheritance mapping strategy is `SINGLE_TABLE`, in which all the entities
    in the class hierarchy map onto a single table. A dedicated discriminator column
    on this table identifies the specific entity type associated with each row, and
    each entity in the hierarchy is given a unique value to store in this column.
    By default, the discriminator value for an entity is its entity name, although
    an entity may override this value using the `@DiscriminatorValue` annotation.
    This approach performs well for querying, since only a single table is involved,
    and if your type of hierarchy can abide by the practical limitations, this is
    probably the best approach to use.


    Figure [4-2](#A311833_3_En_4_Chapter.html#Fig2) shows a diagram of a schema that
    maps our example entities using the `SINGLE_` `TABLE` strategy. We have chosen
    to prefix these tables with `CH04_ST_` to avoid conflicts with the `PERSON` and
    `ADDRESS` tables in our example schema that are used by the full Enterprise Wines
    Online application.


    ![A311833_3_En_4_Fig2_HTML.jpg](A311833_3_En_4_Fig2_HTML.jpg)


    Figure 4-2


    The CH04_ST_PERSON table holds all entity instances in the entity hierarchy rooted
    by Person. The CH04_ST_ADDRESS table holds the associated Address instances.


    All of the properties across the entity hierarchy rooted by the `Person` entity
    map to columns on a single table, `CH04_ST_` `PERSON` . This table holds a foreign
    key reference, bound to the `HOME_ADDRESS` column, to `CH04_ST_ADDRESS`, which
    is mapped to the `Address` entity. It also holds a foreign key reference, using
    the `MANAGER` column, back to itself. This foreign key is not constrained to be
    unique, indicating that multiple rows may hold the same value in their `MANAGER`
    column.


    #### Example Entity Classes


    Listings [4-1](#A311833_3_En_4_Chapter.html#Par41) through [4-4](#A311833_3_En_4_Chapter.html#Par44)
    show how the entities in the `Person` hierarchy are mapped using the `SINGLE_TABLE`
    inheritance strategy. The inheritance strategy is declared on the root entity
    in the hierarchy, and it also applies to all subentities in the hierarchy. Annotations
    introduced in the example entities that have not yet been covered are explained
    in the sections that follow.


    ```

    /*

    * Person: An abstract entity, and the root of an inheritance hierarchy

    *

    * To create ID generator table "CH04_ST_PERSON_ID_GEN":

    * CREATE TABLE "CH04_ST_PERSON_ID_GEN" ("PRIMARY_KEY_NAME" VARCHAR2(4000) PRIMARY
    KEY,     "NEXT_ID_VALUE" NUMBER(38));

    *

    * To initialize this table with data for this entity''s ID generator ''Person.id''
    (starting with     value ''0''):

    * INSERT INTO "CH04_ST_PERSON_ID_GEN" VALUES (''Person.id'', 0);

    */

    @Entity

    @NamedQueries({ @NamedQuery(name = "Person.findAll", query = "select o from Person
    o") })

    @Table(name = "CH04_ST_PERSON")

    @TableGenerator(name = "Person_ID_Generator", table = "CH04_ST_PERSON_ID_GEN",
    pkColumnName = "PRIMARY_KEY_NAME",

    pkColumnValue = "Person.id", valueColumnName = "NEXT_ID_VALUE")

    @Inheritance(strategy = InheritanceType.SINGLE_TABLE)

    @DiscriminatorColumn(name="TYPE")

    public abstract class Person

    implements Serializable

    {

    @SuppressWarnings("compatibility:-7074714881275658754")

    private static final long serialVersionUID = 5291172566067954515L;

    @Id

    @Column(nullable = false)

    @GeneratedValue(strategy = GenerationType.TABLE, generator = "Person_ID_Generator")

    private Integer id;

    @Column(name = "FIRST_NAME", length = 400)

    private String firstName;

    @Column(name = "LAST_NAME", length = 400)

    private String lastName;

    @OneToOne(cascade=CascadeType.ALL)

    @JoinColumn(name = "HOME_ADDRESS")

    private Address homeAddress;

    @Version

    private Integer version;

    public Person() {

    }

    /* get/set methods... */

    }

