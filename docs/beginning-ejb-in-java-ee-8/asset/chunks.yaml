    \ forever. I love you mom. RIP.  \n—Massimo\n\n## Preface\n\nDear Reader,\n\n\
    When we conceived the original edition of this book in 2006, the lightweight EJB\
    \ 3 API was still in its early stages, yet it was clear to us that the EJB specification\
    \ designers had at last achieved the right blend of power and usability. Coming\
    \ from the EJB 2.x world, it was like a breath of fresh air, and reminded us of\
    \ how it felt to discover Java technology after years of programming C and C++.\
    \ The EJB component, redefined as an ordinary Java class whose metadata could\
    \ be declared through Java annotations, and enhanced by the introduction of generics,\
    \ container injection, and interceptors, became the basis for a much more nimble\
    \ development model: one that gained elegance through simplicity.\n\nEnter the\
    \ new Java Persistence API (JPA), where entities, too, were recast as lightweight\
    \ Java classes and O/R mapping metadata could be specified through spec-defined\
    \ annotations, and we suddenly had a comprehensive enterprise component model\
    \ comprising the latest technologies, all rolled into a worldwide standard. So\
    \ you can see what got our buzz going.\n\nFast forward to now, and the release\
    \ of the EJB 3.2 and JPA 2.1 specs. Spanning over a thousand pages combined, these\
    \ specifications have matured to address a number of new areas and improve upon\
    \ their ease of use. Once again we saw an opportunity to translate this latest\
    \ material into an approachable format that reads well and makes liberal use of\
    \ examples that you can build, execute, and further explore on your own machine.\n\
    \nIn this second edition, accompanying the release of Java EE 7, we introduce\
    \ the EJB 3.2 and JPA 2.1 APIs along with key features in the CDI and JAX-RS specifications\
    \ through a series of digestible chapters, allowing you to become comfortable\
    \ with these technologies one topic at a time. Within each chapter we provide\
    \ executable source code examples that demonstrate how each feature works, and\
    \ how the pieces fit together. So you don’t have to swallow the whole enchilada\
    \ in one humongous gulp. In the spirit of our Apress Wines Online application,\
    \ which we use for numerous examples throughout the book, we want you to truly\
    \ savor and appreciate the richness of the Java EE 7 component ecosystem.\n\n\
    For each technology we provide straightforward examples, but we also strive to\
    \ explain when and where to use its features and what their strengths and weakness\
    \ are, and offer insights into best usage practices. Following these topical explorations,\
    \ we explain how to integrate EJB and related components into a comprehensive\
    \ Java EE 7 application, and then turn the spotlight on transaction management,\
    \ performance analysis, deployment, testing in an Embeddable EJB Container, and\
    \ how to build solid EJB clients.\n\nOur job is to transform you from EJB novice\
    \ to expert, and we want you to enjoy the ride!\n\nJonathan Wetherbee, Massimo\
    \ Nardone, Chirag Rathod, and Raghu Kodali"
