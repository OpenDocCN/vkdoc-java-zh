    \ 3-7 的 `Customer` 实体。然后，我们使用此 `EntityManager` 来持久化一个新的 `Customer` 实例。请注意，此示例假设存在一个\
    \ ID 生成器或其他服务来自动填充新实例的主键。\n\n#### 使用 EntityManagerFactory 的 Java SE 服务客户端\n\n\
    有时无法使用容器注入，或者应用程序希望对 `EntityManager` 的生命周期拥有更多控制权。在这种情况下，客户端可以先获取一个 `EntityManagerFactory`，然后通过它来获得\
    \ `EntityManager`。`javax.persistence.Persistence` 类充当获取 `EntityManagerFactory`\
    \ 的工厂，并且可以在 Java EE 环境和 Java SE 环境中使用。清单 3-14 展示了普通的 Java SE 服务客户端如何获取 `EntityManager`。\n\
