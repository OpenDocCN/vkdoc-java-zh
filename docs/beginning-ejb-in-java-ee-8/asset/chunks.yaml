    ### Returning Managed Objects from EJB Methods


    The third test appears to fail with a similar issue. We can fix it in the same
    way by explicitly merging all of the objects within our test client to obtain
    managed references after they have been added to the persistence context—whether
    directly or through a cascading `MERGE` operation. However, in this case, we are
    calling an EJB method to assemble a `CustomerOrder` instead of wiring things up
    within the test client, and we decide to address this issue in the EJB code itself.


    Let’s go into the debugger and see if we can see why our `customerOrder` reference
    has a null `id` field when the same `customerOrder` queried from the database
    has its `id` field properly assigned.


    Open the `WineAppService.java` file, and add a breakpoint on the `custFacade.merge(customer);`
    call inside `createCustomerOrder()`, as shown in Figure [13-6](#A311833_3_En_13_Chapter.html#Fig6).


    ![A311833_3_En_13_Fig6_HTML.jpg](A311833_3_En_13_Fig6_HTML.jpg)


    ### Figure 13-6

    Setting a breakpoint inside `WineAppService.createCustomerOrder()`


    With the breakpoint set, right-click on `WineAppServiceTest.java`, and this time
    select the item “`Debug Test File`” to launch the JUnit tester in debug mode.


    When our breakpoint is hit, open up the `Variables` panel and navigate to the
    `customerOrder` local variable. Expand `customerOrder` to view the current values
    of its properties, navigate to its inherited properties, and observe that its
    `id` property is null. This is to be expected. At this stage in the method, `customerOrder`
    is a new instance and has not yet been persisted. Thus, its primary key value
    hasn’t been generated or assigned yet to its `id` field.


    Step over the line with the breakpoint to perform the `merge()` on `customer`.
    We know from the cascade rules on `Customer` that when a `Customer` instance (or
    any of its subtypes) is merged, all referenced `CustomerOrder` instances will
    be merged as well.


    When inspecting `customerOrder` in the Variables window again after executing
    the merge, we find that its `id` field is still null. The `@GeneratedValue` setting
    on its `id` field ensures that a value is assigned when it is persisted or merged
    into the persistence context, so evidently this object is not the managed copy
    created when `merge()` was called on its `customer` parent. Consequently, the
    method `createCustomerOrder()` is returning the wrong instance of `customerOrder`.
    To fix this, edit the return statement to return a managed instance of `customerOrder`
    instead as shown in Figure [13-7](#A311833_3_En_13_Chapter.html#Fig7).


    ![A311833_3_En_13_Fig7_HTML.jpg](A311833_3_En_13_Fig7_HTML.jpg)


    ### Figure 13-7

    Updating `WineAppService.createCustomerOrder()` to return a managed instance of
    `customerOrder`


    This gets us past the `customerOrder.getId() is null` assertion failure that we
    were hitting. Running the tests again lands us at the final issue we need to resolve.
    Our `customer` instance was in a managed state after it was created through `createCustomerOrder()`
    a few lines previously. However, the assertion failure `customerOrder2.getId()`
    is `null` indicates that it is somehow holding onto a stale copy of `customerOrder`.
    A closer inspection identifies that our copy of `customer` became detached when
    it was merged inside `createCustomerOrder()`. Because we do not pass the merged
    copy back to the client, the client is responsible for obtaining the new managed
    copy. Acquiring this managed copy through another `merge()` call fixes the problem,
    as shown on line 173 in Figure [13-8](#A311833_3_En_13_Chapter.html#Fig8).


    ![A311833_3_En_13_Fig8_HTML.jpg](A311833_3_En_13_Fig8_HTML.jpg)


    ### Figure 13-8

    Updating `WineAppServiceTest.testCreateCustomerOrder()` to assign a managed instance
    to the `customer` variable


    … and with that, our tests now execute successfully.'
