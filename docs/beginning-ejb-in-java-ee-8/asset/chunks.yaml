    PopulateDemoData.java, a utility class resets the sample data by delegating to
    a transactional Java façade over JPA entities

    ```


    Notice that instead of injecting an EJB façade using the `@EJB` notation, we instantiate
    the Java façade (`JavaServiceFacade`) through its constructor and pass it the
    name of a `RESOURCE_LOCAL` persistence unit, which we can see from the original
    call is `"Chapter07-WineAppUnit-ResourceLocal"`. This helper class is calling
    operations like `persistEntity()` and `removeCustomerOrder()` on the façade without
    explicitly calling for the operation to be committed, which is an indication that
    the façade uses implicit commit behavior.


    We also take care to ensure that the façade is notified, through its own `close()`
    method, after it is used. This allows it to release its own resources: notably,
    its `EntityManagerFactory` and `EntityManager` resources. These are housekeeping
    items you don’t need to worry about with EJBs, since the EJB container handles
    this level of resource management for you.'
