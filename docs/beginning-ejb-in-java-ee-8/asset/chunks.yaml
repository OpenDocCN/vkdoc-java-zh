    ## 构建、部署与测试：来自葡萄酒在线应用的一个事务场景


    现在我们已经了解了 EJB 提供的事务支持的许多细节，让我们执行刚才介绍的那些测试用例。


    对于 CMT 和 BMT 两种场景，我们都会调用一个 Servlet 客户端，该客户端会创建一个新客户，构建一个由购物车条目组成的购物车，然后根据购物车中的商品创建一个包含订单项的客户订单。我们选择这些示例作为本章内容，是因为它们涉及多个操作，这些操作可以根据客户端的需求，被划分为粒度或大或小的事务工作单元。


    为了说明 EJB 提供的默认支持，我们使用首先探讨的示例：一个标准的无状态会话 Bean 实现，它使用了默认的 CMT 划分。在第二个示例中，我们演示了客户端承担部分事务管理责任，使用了一个采用
    BMT 划分和扩展持久化上下文的有状态会话 Bean。


    ### 前提条件


    在执行后续章节详述的任何步骤之前，请先完成第 1 章的“入门”部分。该部分将引导您完成本章示例所需的安装和环境设置。


    ### 打开示例应用程序


    本章的根项目依赖于 `Chapter07-ServiceIntegration-jpa` 中定义的 JPA 持久化单元。启动 NetBeans IDE，使用
    `文件` ➤ `打开项目` 菜单打开 `Chapter08-TransactionSamples` 项目。确保选中“`打开所需项目`”复选框。见图 8-1。


    ![A311833_3_En_8_Fig1_HTML.jpg](img/A311833_3_En_8_Fig1_HTML.jpg)


    图 8-1


    打开 Chapter08-TransactionSamples 项目


    此应用程序包含三个模块：一个直接取自第 7 章的 JPA 持久化单元；一个包含本章探讨的 CMT 和 BMT 会话 Bean 的 EJB 模块；以及一个包含我们也已探讨过的两个
    Servlet 客户端的 Web 模块。见图 8-2。


    ![A311833_3_En_8_Fig2_HTML.jpg](img/A311833_3_En_8_Fig2_HTML.jpg)


    图 8-2


    观察 Chapter08-TransactionSamples 应用程序的结构


    ### 创建数据库连接


    本章的示例需要一个数据库连接，对于这些测试，我们将使用 NetBeans 和 Glassfish 捆绑的 Derby 数据库。如果您已经创建了 `WineApp`
    数据库（该数据库也用于第 3 章、第 4 章和第 7 章的示例），请继续下一步。否则，请单击 `服务` 选项卡，展开 `数据库` 图标，然后在 `Java
    DB` 节点上调用“`创建数据库...`”。创建一个名为“`WineApp`”的数据库，用户名和密码为 `wineapp/wineapp`，如图 8-3 所示。


    ![A311833_3_En_8_Fig3_HTML.jpg](img/A311833_3_En_8_Fig3_HTML.jpg)


    图 8-3


    创建 WineApp 数据库和连接


    最后一步创建了一个数据库连接，JPA 和 EJB 项目中的 `persistence.xml` 文件里的持久化单元都会引用该连接。虽然可以预先创建数据库对象（表、序列、键约束等），但我们将让
    JPA 在每个持久化单元首次需要这些数据库对象时自动创建它们。


    ### 编译源代码


    创建 `WineApp` 数据库后，在 `Chapter08-TransactionSamples` 节点上调用上下文菜单，并通过选择 `清理并构建` 菜单选项来构建应用程序，如图
    8-4 所示。


    ![A311833_3_En_8_Fig4_HTML.jpg](img/A311833_3_En_8_Fig4_HTML.jpg)


    图 8-4


    构建应用程序


    ### 部署并运行客户端程序


    项目源代码成功构建后，调用相同的菜单并选择 `部署`，如图 8-5 所示。


    ![A311833_3_En_8_Fig5_HTML.jpg](img/A311833_3_En_8_Fig5_HTML.jpg)


    图 8-5


    部署应用程序


    部署完成后，调用 `运行` 或 `调试` 菜单项来启动 `OrderProcessorCMTClient` Servlet。我们已预先配置 `Chapter09-TransactionSamples`
    项目默认运行此 Servlet。该 Servlet 将使用为 NetBeans 配置的默认浏览器显示示例输出，如图 8-6 所示。


    ![A311833_3_En_8_Fig6_HTML.jpg](img/A311833_3_En_8_Fig6_HTML.jpg)


    图 8-6


    运行 OrderProcessorCMTClient Servlet 的输出


    如果您选择调试，可以随意在 `OrderProcessorCMTBean.java` 会话 Bean、`OrderProcessorCMTClient.java`
    Servlet、JPA 实体或应用程序中的任何其他源文件中添加一些断点。


    接下来，启动第二个示例，即 `OrderProcessorBMTClient` Servlet。为此，您可以更新浏览器 URL，将 `CMT` 替换为 `BMT`，或者更新
    `Chapter09-TransactionSamples` 项目的属性。只需使用 `OrderProcessorCMTBean.java` 会话 Bean
    重新部署项目，然后选择 `运行` 类别即可。结果如图 8-7 所示。


    ![A311833_3_En_8_Fig7_HTML.jpg](img/A311833_3_En_8_Fig7_HTML.jpg)


    图 8-7


    配置 Chapter09-TransactionSamples 项目的运行目标


    ## 总结


    本章定义了所有事务行为所必需的核心概念，并探讨了 EJB 服务器提供的事务特性以及企业 Bean 开发者可以访问的接口。


    我们首先探讨了定义事务的核心 ACID 特性——原子性、一致性、隔离性和持久性。我们介绍了 JTA，并描述了其分布式事务模型的特性与优势，包括关键的两阶段提交协议的行为。


    我们研究了 EJB 服务器如何充当 JTA 事务管理器，使 EJB 能够无缝地参与分布式事务，并减轻了 Bean 开发者显式地将持久化或其他事务操作与事务资源绑定的需求。我们还详细介绍了
    EJB 为企业 Bean 开发者提供的对这些事务服务的声明式支持，探讨了 CMT 和 BMT 两种划分方式所支持的企业 Bean，并使用了隐式和显式两种提交模型。对于
    CMT Bean，我们描述了可用于定义 CMT Bean 方法事务行为的六种事务属性各自的行为及其含义。在 JPA 领域，我们探讨了事务与持久化上下文之间的关系，并解释了如何将扩展持久化上下文与有状态会话
    Bean 结合使用，以支持实体在事务上下文之外也能解析与其他实体的关系。


    然后，本章基于葡萄酒在线应用中的一个场景，考察了一些实际示例。这些示例说明了 CMT 和 BMT 划分的使用、有状态会话 Bean 上的扩展持久化上下文、回滚场景、客户端控制的事务、使用
    BMT Bean 在事务上下文之外与实体交互，以及 CMT Bean 方法之间的事务上下文传播。


    最后，我们提供了运行所探讨的 CMT 和 BMT 示例应用程序的步骤。


    在下一章中，我们将探讨一些可用于分析应用程序中 EJB 特定性能的技术。通过几个常见示例，我们将演示如何设置自己的测试来分析特定的应用程序组件。

