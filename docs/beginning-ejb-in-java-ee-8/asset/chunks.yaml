    ## 总结


    本章通过一组特定示例详细介绍了 EJB 会话 Bean。我们探讨了如何使用标准 Java 语言构件（如 Java 类和接口）来开发会话 Bean 的简化 EJB
    模型。我们了解了会话 Bean 及其在开发应用程序时的一些典型用例。我们讨论了三种不同类型的会话 Bean（无状态、有状态和单例），包括它们之间的区别以及各自的一些通用用例。我们还介绍了会话
    Bean 在两层和三层应用程序架构中的使用方式。我们讨论了依赖注入在无状态、有状态和单例 Bean 中的应用。我们考虑了如何对应用程序流程进行细粒度控制，包括在无状态和有状态
    Bean 中使用生命周期回调方法和拦截器，以及使用诸如 `@PostConstruct` 和 `@PreDestroy` 之类的注解。我们了解了编译/构建、打包以及将会话
    Bean 部署到 GlassFish 应用服务器所需的条件。最后，我们探讨了如何使用 GlassFish 应用客户端容器运行示例客户端程序。


    在接下来的两章中，我们将深入探讨 Java 持久化 API（JPA），以便你学习如何将 POJO 映射到数据库表，并执行查询及增删改查（CRUD）操作。

