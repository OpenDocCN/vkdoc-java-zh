- fmt: '### Java Façade Using Application-Managed EntityManager


    This brings us to the details of the Java façade itself. This façade was actually
    quietly introduced in Chapter [7](#A311833_3_En_7_Chapter.html), where it is bundled
    with the common persistence archive we are sharing from that chapter. We will
    now see how this is handled, by now examining the `JavaServiceFacade` class in
    Listing [8-4](#A311833_3_En_8_Chapter.html#Par96):


    ```

    public class JavaServiceFacade {

    private final EntityManagerFactory emf;

    private final EntityManager em;

    public JavaServiceFacade() {

    this("Chapter13-EmbeddableEJBTests-ResourceLocal");

    }

    public JavaServiceFacade(String persistenceUnit) {

    emf = Persistence.createEntityManagerFactory(persistenceUnit);

    em = emf.createEntityManager();

    }

    public void close() {

    if (em != null && em.isOpen()) {

    em.close();

    }

    if (emf != null && emf.isOpen()) {

    emf.close();

    }

    }

    /**

    * All changes that have been made to the managed entities in the persistence context
    are applied

    * to the database and committed.

    */

    private void commitTransaction() {

    final EntityTransaction entityTransaction = em.getTransaction();

    if (!entityTransaction.isActive()) {

    entityTransaction.begin();

    }

    entityTransaction.commit();

    }

    public  T persistEntity(T entity) {

    em.persist(entity);

    commitTransaction();

    return entity;

    }

    public  T mergeEntity(T entity) {

    entity = em.merge(entity);

    commitTransaction();

    return entity;

    }

    public  void removeEntity(T entity) {

    em.remove(em.merge(entity));

    commitTransaction();

    }

    public  List findAll(Class entityClass) {

    CriteriaQuery cq = em.getCriteriaBuilder().createQuery();

    cq.select(cq.from(entityClass));

    return em.createQuery(cq).getResultList();

    }

    public  int getCount(Class entityClass) {

    CriteriaQuery cq = em.getCriteriaBuilder().createQuery();

    Root rt = cq.from(entityClass);

    cq.select(em.getCriteriaBuilder().count(rt));

    javax.persistence.Query q = em.createQuery(cq);

    return ((Long) q.getSingleResult()).intValue();

    }

    /**

    * select object(wine) from Wine wine where wine.year = :year

    */

    public List getWineFindByYear(int year) {

    return em.createNamedQuery("Wine.findByYear", Wine.class).setParameter("year",
    year).getResultList();

    }

    /**

    * select object(wine) from Wine wine where wine.country = :country

    */

    public List getWineFindByCountry(String country) {

    return em.createNamedQuery("Wine.findByCountry", Wine.class).setParameter("country",
    country).getResultList();

    }

    /**

    * select object(wine) from Wine wine where wine.varietal = :varietal

    */

    public List getWineFindByVarietal(String varietal) {

    return em.createNamedQuery("Wine.findByVarietal", Wine.class).setParameter("varietal",
    varietal).getResultList();

    }

    }

    Listing 8-4

    JavaServiceFacade.java, a transactional Java façade over JPA entities, exhibiting
    implicit commit behavior

    ```


    This façade obtains its `EntityManager` from an `EntityManagerFactory`, and so
    the life cycle of this `EntityManager` is now the responsibility of the façade
    instead of the container. An application-managed `EntityManager` is bound to a
    persistence context cache that can exist outside of a transactional context, and
    live through multiple transactions, which is essentially the same as an `EXTENDED`
    persistence context for a stateful session bean. This allows calls such as `EntityManager.persist()`
    to be made before a transaction has been started. Such an out-of-transaction call
    would add a new entity to the persistence context but would not immediately result
    in an SQL call to update the database.


    **Note**


    Even before an `EntityManager` transaction is begun, the persistence context quietly
    begins its own private transaction, as needed, to service any ID generator requests
    when `EntityManager.persist()` is called. Because we have bound the PK fields
    of our entities to a `@GeneratedValue` ID generator, these IDs are actually eagerly
    obtained and assigned to the entities during the `persist()`.


    The persistence context cache is not flushed to the database until the transaction
    is actually begun, through an `EntityTransaction.begin()` call, which could be
    immediately before an `EntityTransaction.commit()` call is performed. That is,
    you have the choice to begin the transaction before any changes are applied to
    the persistence context or defer the beginning of the transaction until you are
    ready to commit. In our sample, we defer the `begin()` call to inside the `commitTransaction()`
    method:


    ```

    private void commitTransaction() {

    final EntityTransaction entityTransaction = em.getTransaction();

    if (!entityTransaction.isActive()) {

    entityTransaction.begin();

    }

    entityTransaction.commit();

    }

    ```


    Contrast this behavior with a stateless session bean using the default CMT behavior
    of `TransactionAttributeType.REQUIRED`, which implicitly begins a transaction
    when a session bean method call is made, and it commits the work to the database
    upon returning from that method call. The transaction begins and ends within the
    boundaries of that method call, and such CMT beans would never expose `commitTransaction()`
    or `rollbackTransaction()` methods to their clients, as we will see in the BMT
    example next. The implicit commit behavior avoids leaving uncommitted data hanging
    around in a cache, vulnerable to loss due to hardware or network failure. However,
    it also incurs additional back-end processing to complete the work and commits
    it each time an atomic operation is performed (not to mention, a persistence context
    cache is created and destroyed with each call), which can affect performance.


    A `RESOURCE_LOCAL` `EntityManager` provides its clients with an `EntityTransaction`
    object for managing transactions. The `commitTransaction()` method in Listing
    [8-4](#A311833_3_En_8_Chapter.html#Par96) demonstrates its use, and the implicit
    behavior of this façade is achieved by the policy of calling `commitTransaction()`
    at the end of every method that updates the persistence context (through a `persist`,
    `merge`, or `remove` operation).'
