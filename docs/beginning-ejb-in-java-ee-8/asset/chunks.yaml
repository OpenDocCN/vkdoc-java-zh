    #### 添加酒品项


    清单 7-5 展示了 `ShoppingCartBean` 中的 `addWineItem()` 方法。客户端应用程序调用此业务方法，将特定酒品项及其数量添加到购物车中。代码创建了一个新的
    `CartItem` 实体实例，并使用 `CartItem` 中的 setter 方法设置了数量、酒品和创建时间。


    注意


    快速回顾实体实例的三种状态：受管、分离和新建。受管实例是被持久化上下文主动引用的实例，对该实例所做的所有更改都会被持久化上下文跟踪。当持久化上下文与数据库同步时，在受管实例中发现的所有待处理更改都会通过
    SQL 语句刷新到数据库中。分离实体实例是不再被持久化上下文引用的实例，因此其更改不会被跟踪。如果客户端修改了分离实例，客户端需要确保这些更改被合并到受管实例中（例如，通过
    `EntityManager.merge()` 调用），否则这些更改将永远不会与数据库同步。新建实体实例类似于分离实例，只是它尚未被持久化到数据库中。


    `addWineItem()` 方法使用指定的属性创建一个新的 `CartItem`，并将其添加到 `Customer` 实例中。由于我们查询了 `Customer`
    实例并将其缓存在有状态会话 bean 的类级变量中，因此可以确信它处于受管状态。`ShoppingCartBean` 使用容器管理的事务，并且 `addWineItem()`
    方法默认使用 `TransactionAttributeType.REQUIRED`，因此在该方法执行期间将启动并提交一个事务。提交时，持久化上下文将与数据库同步，并且受管
    `customer` 实例中任何待处理的更改都将被推送到数据库中。由于 `Customer` 的 `cartItemList` 属性上的级联规则，任何被引用的
    `CartItem` 实例也将被持久化。因此，此方法调用的结果将是 `CartItem` 表中新增一行，该行包含对 `Customer` 表（或 `Individual`
    表，具体取决于实体继承层次结构的映射方式）的外键引用。


    ```

    public void addWineItem(Wine wine, int quantity) {

    CartItem cartItem = new CartItem(quantity, wine);

    customer.addCartItem(cartItem);

    }

    清单 7-5

    addWineItem 业务方法

