    indicates that it is somehow holding onto a stale copy of `customerOrder`. A

    closer inspection identifies that our copy of `customer` became

    detached when it was merged inside `createCustomerOrder()`.

    Because we do not pass the merged copy back to the client, the client is

    responsible for obtaining the new managed copy. Acquiring this managed

    copy through another `merge()` call fixes

    the problem, as shown on line 173 in Figure [13-8](#A311833_3_En_13_Chapter.html#Fig8).


    ![A311833_3_En_13_Fig8_HTML.jpg](A311833_3_En_13_Fig8_HTML.jpg)


    Figure 13-8


    Updating WineAppServiceTest.testCreateCustomerOrder() to assign a

    managed instance to the customer variable


    … and with that, our tests now execute successfully.'
  trans: '

    图 13-5


    更新测试方法 `WineAppServiceTest.testCreateIndividual()` 以刷新过时的引用


    从 EJB 方法返回受管对象


    第三个测试似乎因类似问题而失败。我们可以通过显式合并测试客户端中的所有对象来解决，以便在它们被添加到持久化上下文后（无论是直接添加还是通过级联的 `MERGE`
    操作）获得受管引用。然而，在这种情况下，我们调用的是 EJB 方法来组装一个 `CustomerOrder`，而不是在测试客户端中手动连接各个部分，因此我们决定在
    EJB 代码本身中解决这个问题。


    让我们进入调试器，看看能否找出为什么我们的 `customerOrder` 引用的 `id` 字段为 `null`，而数据库中查询到的同一个 `customerOrder`
    的 `id` 字段却被正确赋值。


    打开 `WineAppService.java` 文件，在 `createCustomerOrder()` 方法内部的 `custFacade.merge(customer);`
    调用处添加一个断点，如图 13-6 所示。


    ![A311833_3_En_13_Fig6_HTML.jpg](img/A311833_3_En_13_Fig6_HTML.jpg)


    图 13-6


    在 `WineAppService.createCustomerOrder()` 内部设置断点


    设置好断点后，右键点击 `WineAppServiceTest.java`，这次选择“`Debug Test File`”项，以调试模式启动 JUnit 测试器。


    当断点被触发时，打开 `Variables` 面板并导航到 `customerOrder` 局部变量。展开 `customerOrder` 查看其属性的当前值，导航到其继承的属性，并观察到其
    `id` 属性为 `null`。这是意料之中的。在方法的这个阶段，`customerOrder` 是一个新实例，尚未被持久化。因此，其主键值尚未生成或赋值给其
    `id` 字段。


    单步执行断点所在的行，对 `customer` 执行 `merge()` 操作。根据 `Customer` 上的级联规则，我们知道当合并一个 `Customer`
    实例（或其任何子类型）时，所有引用的 `CustomerOrder` 实例也会被合并。


    在执行合并后再次检查 `Variables` 窗口中的 `customerOrder`，我们发现其 `id` 字段仍然为 `null`。其 `id` 字段上的
    `@GeneratedValue` 设置确保在将其持久化或合并到持久化上下文时会分配一个值，因此显然这个对象并不是在对其父对象 `customer` 调用
    `merge()` 时创建的受管副本。因此，`createCustomerOrder()` 方法返回了错误的 `customerOrder` 实例。要修复此问题，请修改返回语句，改为返回一个受管的
    `customerOrder` 实例，如图 13-7 所示。


    ![A311833_3_En_13_Fig7_HTML.jpg](img/A311833_3_En_13_Fig7_HTML.jpg)


    图 13-7


    更新 `WineAppService.createCustomerOrder()` 以返回 `customerOrder` 的受管实例


    这让我们通过了之前遇到的 `customerOrder.getId() is null` 断言失败。再次运行测试，我们遇到了最后一个需要解决的问题。我们的
    `customer` 实例在几行之前通过 `createCustomerOrder()` 创建后处于受管状态。然而，断言失败 `customerOrder2.getId()`
    为 `null` 表明它不知何故持有了一个过时的 `customerOrder` 副本。进一步检查发现，我们的 `customer` 副本在 `createCustomerOrder()`
    内部被合并时变成了游离状态。因为我们没有将合并后的副本传回给客户端，所以客户端需要负责获取新的受管副本。通过另一次 `merge()` 调用来获取这个受管副本解决了问题，如图
    13-8 的第 173 行所示。


    ![A311833_3_En_13_Fig8_HTML.jpg](img/A311833_3_En_13_Fig8_HTML.jpg)


    图 13-8


    更新 `WineAppServiceTest.testCreateCustomerOrder()` 以将受管实例赋值给 `customer` 变量


    ……至此，我们的测试现在成功执行了。

