    在某些用例中，应用程序希望在事务发生之前或之后收到 EJB 容器的通知，然后利用这些通知来管理数据和缓存。当有状态会话 Bean 实现了 `javax.ejb.SessionSynchronization`
    接口时，它可以接收来自 EJB 容器的此类通知。这是一个可选特性。有状态会话 Bean 从 EJB 容器接收三种不同类型的事务通知：


    *   `afterBegin`：指示一个新事务已开始

    *   `beforeCompletion`：指示事务即将提交

    *   `afterCompletion`：指示一个事务已完成


    例如，`ShoppingCart` 会话 Bean 可以实现 `javax.ejb.SessionSynchronization` 接口来获取 `afterCompletion`
    通知，以便它可以清除购物车缓存。


