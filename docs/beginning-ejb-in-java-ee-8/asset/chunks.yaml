- fmt: '# Summary


    In this chapter, we introduced different application architectures that you can
    use to meet different requirements, as well as the programming models that go
    along with them. We looked at architectures that are useful for Web and desktop
    applications, and we also looked at Web service client applications and business
    process services that can make use of EJBs published as Web services.


    We discussed how Java EE based Web technologies have evolved, resulting in significantly
    simplified Web application development.


    We drilled down into JSF architecture, the JSF life cycle, and JSF applications,
    as well as the current state of tools and UI components for JSF.


    Ultimately, we built a comprehensive JSF application to communicate with the integrated
    EJB back-end application developed in Chapter [7](#A311833_3_En_7_Chapter.html).
    During the development process, we illustrated several programming techniques
    for sharing the data in the JSF application and looking up and invoking business
    methods in the back-end application.


    Finally, we examined the application client container, including the services
    that it provides to client programs running on desktop machines.


    The last chapter of this book will detail the various EJB testing scenarios and
    will guide you on using `JUnit` to test EJB components (and JPA entities) in GlassFish’s
    Embeddable EJB Container.


    # 13. Testing in an Embeddable EJB Container


    As with all mission-critical software, EJB components must be well tested before
    they are deployed into a production environment. The finest level of granularity
    in an EJB is its method; so proper unit tests must test each method of each EJB
    in isolation. For stateless Session beans, this is typically sufficient. Because
    a stateful Session bean may also contain state, full coverage additionally requires
    inclusion of more coarse-grained scenarios as well, involving sequences of method
    calls. When a stateless Session bean effectively stores “state” information in
    a database, as through JPA entities, multistep test scenarios are generally also
    required. In this chapter, we will look at both single-method and multi-method
    tests, covering stateless and stateful Session beans serving primarily as service
    interfaces for JPA-based operations.


    ## Test Clients


    Thus far, the examples in this book have largely used servlets as clients to call
    EJB methods. Using test frameworks, such as `ServletUnit`, servlets can serve
    as a viable unit test bed for testing EJBs. Similarly, JSF clients that call EJBs
    can be unit tested using the `HttpUnit` framework, which allows you to record
    user interactions with JSF clients running in a browser and then compare the actual
    screen results with expected screen results. However, both approaches must be
    executed within a full Java EE application server. In this chapter, we will explore
    a lightweight option for testing EJBs running in a pure Java SE environment.


    ## EJB Lite


    EJB Lite was introduced in EJB 3.1 and further enhanced in EJB 3.2, and it is
    specified to be a minimal subset of the full EJB Container functionality. Recognizing
    that many enterprise applications require only a subset of the full EJB API, EJB
    Lite includes many of the most important features of EJB but with a smaller footprint.
    Implementations of EJB Lite include the Embeddable EJB Container, described below;
    and the Java EE Web Profile.


    Because EJB Lite is a strict subset of the EJB API, any application that is compliant
    with EJB Lite will also run in a full EJB Container within a Java EE server. That
    is, EJB Lite does not explicitly support any behavior that is outside of the EJB
    API.


    ## Embeddable EJB Container


    An Embeddable EJB Container is essentially a Java library that provides the services
    defined by the EJB Lite specification. It emulates an EJB Container running in
    a Java EE environment, but it runs in a Java SE environment. In fact, attempting
    to instantiate an Embeddable EJB Container from within a Java EE environment is
    restricted. This embeddable container provides an operating environment for EJBs,
    supplying injected resources, security, and a JTA transactional interface so that
    EJBs can be tested in a controlled environment.


    ## How This Chapter Is Organized


    In this chapter, we explore some of the principle concepts around unit testing.
    We then look at how to set up, execute, and debug `JUnit` tests using an Embeddable
    EJB Container, drawing from a handful of scenarios in our `WineApp` application.
    We will next take a close look at the services offered by EJB Lite, uncover its
    strengths and limitations, and show some useful shortcuts to isolate the EJB and
    JPA components being tested while reducing complexity in the test environment.


    After we examine the `JUnit` test code that enables you to work with EJBs in the
    Embeddable EJB Container, we will look at some of the configuration options that
    you can leverage that are particularly well suited for a test environment. At
    the conclusion of the chapter, we will walk you through step-by-step instructions
    on how to set up and configure a `JUnit` environment in NetBeans, and then execute
    and debug the tests.


    ### Concepts


    Let’s take a closer look at some of the principal concepts that we’ll be covering
    in this chapter.


    #### JUnit


    `JUnit` is a test framework widely used for testing Java classes of all forms.
    Test classes are ordinary Java classes that have been annotated to identify methods
    that serve special purposes. A method annotated as `@Test` identifies a single
    unit test. The test invokes one or more methods on a class being tested, obtains
    the results from calling those methods, and compares the actual with the expected
    results. When they differ, the test reports a failure, and the tester is alerted
    that a test needs attention.


    By writing `JUnit` tests that comprehensively test the behavior of one or more
    classes, the tester can then execute those tests each time changes are made to
    the code being tested or to any code that is called indirectly. Any failures indicate
    that the expected behavior is no longer occurring. Furthermore, because a unit
    test typically targets a very specific bit of functionality, the failed test can
    clearly identify to the tester the specific code area that caused the disruption.


    Because an EJB is a component that honors a public interface, it lends itself
    well to this form of unit testing. The introduction to EJB 3.1 of EJB Lite and
    Embeddable EJB Containers formally allows EJBs to be unit tested, without modification,
    through the `JUnit` testing framework in a pure Java SE environment.


    #### EJB Lite


    Let us take a closer look at the subset of features that comprise EJB Lite. Table
    [13-1](#A311833_3_En_13_Chapter.html#Tab1) shows which of the major features of
    EJB 3.2 are included in EJB 3.2 Lite.


    **Table 13-1** The features of EJB 3.2 that are part of EJB 3.2 Lite


    | EJB 3.2 Feature | Included in EJB 3.2 Lite |

    | --- | --- |

    | Session Beans (stateless, stateful, and singleton) | Yes |

    | Message-Driven Beans (MDBs) | No |

    | Entity Beans (EJB 2.x) | No |

    | Java Persistence API (JPA) 2.0 | Yes |

    | No Interface | Yes |

    | Local business interface | Yes |

    | Remote interface | No |

    | Embeddable API | Yes |

    | JAX-WS Web Service End Point | No |

    | JAX-RPC Web Service End Point | No |

    | Nonpersistent EJB Timer Service | Yes |

    | Persistent EJB Timer Service | No |

    | Local asynchronous session bean invocations | Yes |

    | Remote asynchronous session bean invocations | No |

    | Interceptors | Yes |

    | RMI-IIOP Interoperability | No |

    | Container-managed transactions | Yes |

    | Bean-managed transactions | Yes |

    | Declarative Security | Yes |

    | Programmatic Security | Yes |


    Most notably, in EJB 3.2 Lite all forms of Local session beans are supported,
    but Remote session beans, MDBs, and EJBs as Web Services are not. Security and
    JTA support is in EJB Lite, including support for BMT and CMT. Finally, support
    for `EntityManager` and `EntityManagerFactory` injection is offered for JPA.'
  raw: '## Summary


    In this chapter, we introduced different application architectures that you can
    use to meet different requirements, as well as the programming models that go
    along with them. We looked at architectures that are useful for Web and desktop
    applications, and we also looked at Web service client applications and business
    process services that can make use of EJBs published as Web services.


    We discussed how Java EE based Web technologies have evolved, resulting in significantly
    simplified Web application development.


    We drilled down into JSF architecture, the JSF life cycle, and JSF applications,
    as well as the current state of tools and UI components for JSF.


    Ultimately, we built a comprehensive JSF application to communicate with the integrated
    EJB back-end application developed in Chapter [7](#A311833_3_En_7_Chapter.html).
    During the development process, we illustrated several programming techniques
    for sharing the data in the JSF application and looking up and invoking business
    methods in the back-end application.


    Finally, we examined the application client container, including the services
    that it provides to client programs running on desktop machines.


    The last chapter of this book will detail the various EJB testing scenarios and
    will guide you on using JUnit to test EJB components (and JPA entities) in GlassFish’s
    Embeddable EJB Container.


    # 13. Testing in an Embeddable EJB Container


    As with all mission-critical software, EJB components must be well tested before
    they are deployed into a production environment. The finest level of granularity
    in an EJB is its method; so proper unit tests must test each method of each EJB
    in isolation. For stateless Session beans, this is typically sufficient. Because
    a stateful Session bean may also contain state, full coverage additionally requires
    inclusion of more coarse-grained scenarios as well, involving sequences of method
    calls. When a stateless Session bean effectively stores “state” information in
    a database, as through JPA entities, multistep test scenarios are generally also
    required. In this chapter, we will look at both single-method and multi-method
    tests, covering stateless and stateful Session beans serving primarily as service
    interfaces for JPA-based operations.


