- fmt: '# The Entity Life Cycle


    An entity instance may go through many formal states during its life as an in-memory
    Java object. Understanding these different states will help you know when the
    entity is in a consistent or inconsistent state with the back-end database, and
    how to reconcile these differences within a transactional context.


    An entity instance will typically go through many states of persistence during
    its lifetime as a Java object. Since EJB 3, entity classes are completely transparent.
    They are created using ordinary constructors instead of the `Home` and `LocalHome`
    factory interfaces of earlier EJB versions. They may be freely passed to and from
    the EJB container and between clients, and they may be updated by a client without
    the overhead of a callback to the EJB container.


    ## The Life Cycle of a New Entity Instance


    Let’s take a look at the life cycle of a newly created persistent entity instance.
    In its life, the entity may visit the new, managed, detached, and removed states.


    ### New Entity Instance


    A client creates a new entity instance by using one of the entity’s Java constructors.
    This is a significant simplification over earlier EJB specifications, which required
    that users define `create()` factory methods on the entity bean’s `Home` and/or
    `LocalHome` interfaces. The default (no argument) constructor is required of all
    entity classes, but additional constructors may also be defined. The client may
    live outside or within an EJB container. At the point of construction, it is in
    the new state and does not yet have persistent identity because it has not been
    associated with an `EntityManagers` persistence context. The client is free to
    call any of its methods and assign data values, and all updates to the entity
    are kept local to the entity class.


    ### Managed Entity Instance


    To turn this entity class into a persistent object, the client acquires an `EntityManager`
    instance and calls the `EntityManager.persist()` method. Listing [3-16](#A311833_3_En_3_Chapter.html#Par115)
    shows a code snippet from a session bean that acquires the `EntityManager` through
    injection and then persists the entity instance passed as a parameter to the `persistEntity()`
    method.


    ```

    @Stateless

    public class MySessionEJB {

    @PersistenceContext(unitName = "Chapter03PersistenceUnit")

    private EntityManager em;

    public void persistEntity(Object entity) {

    em.persist(entity);

    }

    }

    Listing 3-16

    Example Showing How an Entity Instance Is Made Persistent

    ```


    When the entity is made persistent, it is added to a persistence context as a
    managed instance. Being managed affords the entity the following advantages:


    - By default, all fields on the entity are designated to be lazily loaded by the
    persistence provider. While a lazy designation is really only a hint (see the
    “Lazy vs. Eager Field Bindings” section later in the chapter), lazy field binding
    can be seamlessly performed only on managed instances.

    - When an entity is managed, changes made to it may be tracked by the persistence
    manager to optimize subsequent `EntityManager.merge()` operations. For instance,
    change tracking may be handled directly on the entity instance using byte weaving
    provided by the persistence provider when the entity was instantiated. This is
    particularly important when managing a network of related entities, so that a
    minimum of effort is required to calculate the change set when the network of
    entities is merged back to the persistence context.


    In general, there is no guarantee that a call to `EntityManager.persist()` will
    cause an SQL `INSERT` statement to be performed immediately. It is up to the persistence
    manager to decide whether to perform this step immediately or at a later time
    but prior to committing the transaction. In this example, however, the default
    behavior of a method on a Stateless session bean is to create a new transaction
    and commit the work each time one of its methods is called, so the entity was
    not only inserted but committed as well.


    Sequence values may have been assigned to the entity instance, and other side-effect
    code may also have been executed during this step.


    ### Detached Entity Instance


    The entity remains in a managed state for the life of the persistence context
    in which it is contained, or until it is removed from the database. If one of
    these events occurs, or if the instance is passed by value to a client, it becomes
    a detached entity instance and is no longer associated with a persistence context.
    Detached entities do not undergo change tracking or other internal optimizations.
    In particular, the persistence provider is not available to bind fields lazily
    that were not already bound at the time the entity became detached, and attempting
    to access a detached entity’s field that has not yet been bound will throw a runtime
    exception. To merge its state back into the persistence context and make it a
    managed instance once again, you need to pass a detached entity to the `EntityManager.merge()`
    method.


    While an entity instance returned from an `EntityManager.merge()` call is managed,
    changes are not propagated immediately to the persistent storage; they merely
    update the entity itself. Suppose the client modifies the entity:


    ```

    entity = mySession.persistEntity(entity);

    entity.setName("foo");

    ```


    After the second statement above, the name change has been applied only to the
    entity instance, and no changes have been propagated to the persistence context
    or to the database. To apply these changes to the persistence context, you would
    call the `EntityManager.merge()` operation, as follows:


    ```

    // Assumes the EntityManager em was obtained, possibly through injection

    em.merge(entity);

    ```


    This updates the persistence context cache, and possibly updates the row in the
    underlying database as well, depending on the transactional settings in effect.


    ### Removed Entity Instance


    An entity becomes a removed instance when its `remove()` method is called. The
    row (or rows, if this entity maps to multiple tables) that represents its persistent
    state will be removed when the context transaction is committed.


    # O/R Mapping


    We have examined a number of annotations that define the general behavior of an
    entity. Let us now explore the annotations involved in the O/R mapping of persistent
    fields or properties on the entity to table columns in the database.


    The heart of an entity class is the list of fields or properties that define its
    persistent structure. These fields or properties that define its persistent state
    must map to columns in a database table. It is the job of the persistence framework
    to load this state from the database into an entity instance before it is handed
    out to a client and to copy this state back out to the rows of the table when
    it is persisted. Whereas in earlier versions of EJB, this O/R mapping information
    was specific to the various container-managed persistence (CMP) providers, in
    JPA, this mapping markup is now part of the specification. Like nearly every part
    of EJB since version 3.0, users have the choice of specifying this information
    through annotations or using XML in the `orm.xml` file.'
  raw: '## The Entity Life Cycle


    An entity instance may go through many formal states during its life as an in-memory
    Java object. Understanding these different states will help you know when the
    entity is in a consistent or inconsistent state with the back-end database, and
    how to reconcile these differences within a transactional context.


    An entity instance will typically go through many states of persistence during
    its lifetime as a Java object. Since EJB 3, entity classes are completely transparent.
    They are created using ordinary constructors instead of the `Home` and `LocalHome`
    factory interfaces of earlier EJB versions. They may be freely passed to and from
    the EJB container and between clients, and they may be updated by a client without
    the overhead of a callback to the EJB container.


    ### The Life Cycle of a New Entity Instance


    Let’s take a look at the life cycle of a newly created persistent entity instance.
    In its life, the entity may visit the new, managed, detached, and removed states.


    #### New Entity Instance


    A client creates a new entity instance by using one of the entity’s Java constructors.
    This is a significant simplification over earlier EJB specifications, which required
    that users define `create()` factory methods on the entity bean’s `Home` and/or
    `LocalHome` interfaces. The default (no argument) constructor is required of all
    entity classes, but additional constructors may also be defined. The client may
    live outside or within an EJB container. At the point of construction, it is in
    the new state and does not yet have persistent identity because it has not been
    associated with an `EntityManagers` persistence context. The client is free to
    call any of its methods and assign data values, and all updates to the entity
    are kept local to the entity class.


    #### Managed Entity Instance


    To turn this entity class into a persistent object, the client acquires an `EntityManager`
    instance and calls the `EntityManager.persist()` method. Listing [3-16](#A311833_3_En_3_Chapter.html#Par115)
    shows a code snippet from a session bean that acquires the `EntityManager` through
    injection and then persists the entity instance passed as a parameter to the `persistEntity()`
    method.


    ```

    @Stateless

    public class MySessionEJB {

    @PersistenceContext(unitName = "Chapter03PersistenceUnit")

    private EntityManager em;

    public void persistEntity(Object entity) {

    em.persist(entity);

    }

    }

    Listing 3-16

    Example Showing How an Entity Instance Is Made Persistent

    ```


    When the entity is made persistent, it is added to a persistence context as a
    managed instance. Being managed affords the entity the following advantages:


    *   By default, all fields on the entity are designated to be lazily loaded by
    the persistence provider. While a lazy designation is really only a hint (see
    the “Lazy vs. Eager Field Bindings” section later in the chapter), lazy field
    binding can be seamlessly performed only on managed instances.

    *   When an entity is managed, changes made to it may be tracked by the persistence
    manager to optimize subsequent `EntityManager.merge()` operations. For instance,
    change tracking may be handled directly on the entity instance using byte weaving
    provided by the persistence provider when the entity was instantiated. This is
    particularly important when managing a network of related entities, so that a
    minimum of effort is required to calculate the change set when the network of
    entities is merged back to the persistence context.


    In general, there is no guarantee that a call to `EntityManager.persist()` will
    cause an SQL `INSERT` statement to be performed immediately. It is up to the persistence
    manager to decide whether to perform this step immediately or at a later time
    but prior to committing the transaction. In this example, however, the default
    behavior of a method on a Stateless session bean is to create a new transaction
    and commit the work each time one of its methods is called, so the entity was
    not only inserted but committed as well.


    Sequence values may have been assigned to the entity instance, and other side-effect
    code may also have been executed during this step.


    #### Detached Entity Instance


    The entity remains in a managed state for the life of the persistence context
    in which it is contained, or until it is removed from the database. If one of
    these events occurs, or if the instance is passed by value to a client, it becomes
    a detached entity instance and is no longer associated with a persistence context.
    Detached entities do not undergo change tracking or other internal optimizations.
    In particular, the persistence provider is not available to bind fields lazily
    that were not already bound at the time the entity became detached, and attempting
    to access a detached entity’s field that has not yet been bound will throw a runtime
    exception. To merge its state back into the persistence context and make it a
    managed instance once again, you need to pass a detached entity to the `EntityManager.merge()`
    method.


    While an entity instance returned from an `EntityManager.merge()` call is managed,
    changes are not propagated immediately to the persistent storage; they merely
    update the entity itself. Suppose the client modifies the entity:


    ```

    entity = mySession.persistEntity(entity);

    entity.setName("foo");

    ```


    After the second statement above, the name change has been applied only to the
    entity instance, and no changes have been propagated to the persistence context
    or to the database. To apply these changes to the persistence context, you would
    call the `EntityManager.merge()` operation, as follows:


    ```

    // Assumes the EntityManager em was obtained, possibly through injection

    em.merge(entity);

    ```


    This updates the persistence context cache, and possibly updates the row in the
    underlying database as well, depending on the transactional settings in effect.


    #### Removed Entity Instance


    An entity becomes a removed instance when its `remove()` method is called. The
    row (or rows, if this entity maps to multiple tables) that represents its persistent
    state will be removed when the context transaction is committed.


    ## O/R Mapping


    We have examined a number of annotations that define the general behavior of an
    entity. Let us now explore the annotations involved in the O/R mapping of persistent
    fields or properties on the entity to table columns in the database.


    The heart of an entity class is the list of fields or properties that define its
    persistent structure. These fields or properties that define its persistent state
    must map to columns in a database table. It is the job of the persistence framework
    to load this state from the database into an entity instance before it is handed
    out to a client and to copy this state back out to the rows of the table when
    it is persisted. Whereas in earlier versions of EJB, this O/R mapping information
    was specific to the various container-managed persistence (CMP) providers, in
    JPA, this mapping markup is now part of the specification. Like nearly every part
    of EJB since version 3.0, users have the choice of specifying this information
    through annotations or using XML in the `orm.xml` file.'
  trans: '

    ## 实体生命周期


    一个实体实例在作为内存中的 Java 对象时，可能会经历多种正式状态。理解这些不同的状态有助于你了解实体何时与后端数据库保持一致或不一致的状态，以及如何在事务上下文中协调这些差异。


    一个实体实例在其作为 Java 对象的生命周期中，通常会经历多种持久化状态。自 EJB 3 起，实体类变得完全透明。它们通过普通的构造函数创建，而不是早期
    EJB 版本中的 `Home` 和 `LocalHome` 工厂接口。它们可以自由地在 EJB 容器与客户端之间传递，也可以被客户端更新，而无需回调 EJB
    容器的开销。


    ### 新实体实例的生命周期


    让我们来看一个新建持久化实体实例的生命周期。在其生命周期中，实体可能会经历新建、托管、分离和已删除状态。


    #### 新建实体实例


    客户端通过使用实体的 Java 构造函数之一来创建新的实体实例。与早期 EJB 规范相比，这是一个显著的简化，早期规范要求用户在实体 Bean 的 `Home`
    和/或 `LocalHome` 接口上定义 `create()` 工厂方法。所有实体类都需要默认（无参）构造函数，但也可以定义额外的构造函数。客户端可以位于
    EJB 容器外部或内部。在构造时，它处于新建状态，并且尚未拥有持久化标识，因为它尚未与 `EntityManager` 的持久化上下文关联。客户端可以自由调用其任何方法并赋值，所有对实体的更新都保留在实体类本地。


    #### 托管实体实例


    要将此实体类转变为持久化对象，客户端需要获取一个 `EntityManager` 实例并调用 `EntityManager.persist()` 方法。清单
    3-16 展示了一个会话 Bean 的代码片段，该 Bean 通过注入获取 `EntityManager`，然后将作为参数传递给 `persistEntity()`
    方法的实体实例持久化。


    ```

    @Stateless

    public class MySessionEJB {

    @PersistenceContext(unitName = "Chapter03PersistenceUnit")

    private EntityManager em;

    public void persistEntity(Object entity) {

    em.persist(entity);

    }

    }

    清单 3-16

    展示如何使实体实例持久化的示例

    ```


    当实体被持久化时，它会作为托管实例添加到持久化上下文中。被托管为实体带来了以下优势：


    *   默认情况下，实体上的所有字段都被指定为由持久化提供程序延迟加载。虽然延迟指定实际上只是一个提示（请参阅本章后面的“延迟与即时字段绑定”部分），但延迟字段绑定只能无缝地在托管实例上执行。

    *   当实体被托管时，对其所做的更改可能会被持久化管理器跟踪，以优化后续的 `EntityManager.merge()` 操作。例如，可以使用持久化提供程序在实例化实体时提供的字节编织技术，直接在实体实例上处理更改跟踪。这在管理相关实体网络时尤其重要，以便在将实体网络合并回持久化上下文时，计算变更集所需的工作量最小。


    通常，无法保证调用 `EntityManager.persist()` 会立即执行 SQL `INSERT` 语句。由持久化管理器决定是立即执行此步骤，还是稍后但在提交事务之前执行。然而，在此示例中，无状态会话
    Bean 上方法的默认行为是每次调用其方法时创建一个新事务并提交工作，因此实体不仅被插入，而且已被提交。


    在此步骤中，可能已为实体实例分配了序列值，并且可能还执行了其他副作用代码。


    #### 分离实体实例


    实体在其所属的持久化上下文生命周期内，或从数据库中删除之前，一直处于托管状态。如果发生这些事件之一，或者实例通过值传递给客户端，它就会变成分离的实体实例，并且不再与持久化上下文关联。分离的实体不会进行更改跟踪或其他内部优化。特别是，持久化提供程序无法延迟绑定在实体分离时尚未绑定的字段，尝试访问尚未绑定的分离实体字段将抛出运行时异常。要将其状态合并回持久化上下文并使其再次成为托管实例，需要将分离的实体传递给
    `EntityManager.merge()` 方法。


    虽然从 `EntityManager.merge()` 调用返回的实体实例是托管的，但更改不会立即传播到持久化存储；它们仅更新实体本身。假设客户端修改了实体：


    ```

    entity = mySession.persistEntity(entity);

    entity.setName("foo");

    ```


    在上述第二条语句之后，名称更改仅应用于实体实例，并且没有将任何更改传播到持久化上下文或数据库。要将这些更改应用于持久化上下文，需要调用 `EntityManager.merge()`
    操作，如下所示：


    ```

    // 假设已获取 EntityManager em，可能通过注入

    em.merge(entity);

    ```


    这会更新持久化上下文缓存，并且可能还会更新底层数据库中的行，具体取决于生效的事务设置。


    #### 已删除实体实例


    当实体的 `remove()` 方法被调用时，它就成为已删除实例。当上下文事务提交时，表示其持久化状态的行（如果此实体映射到多个表，则为多行）将被删除。


    ## O/R 映射


    我们已经研究了许多定义实体一般行为的注解。现在让我们探讨涉及将实体上的持久化字段或属性 O/R 映射到数据库表列的注解。


    实体类的核心是定义其持久化结构的字段或属性列表。这些定义其持久化状态的字段或属性必须映射到数据库表中的列。持久化框架的工作是在实体实例分发给客户端之前，将此状态从数据库加载到实体实例中，并在持久化时将此状态复制回表的行中。在早期版本的
    EJB 中，此 O/R 映射信息特定于各种容器管理持久化（CMP）提供程序，而在 JPA 中，此映射标记现在是规范的一部分。与自 3.0 版以来 EJB 的几乎所有部分一样，用户可以选择通过注解或在
    `orm.xml` 文件中使用 XML 来指定此信息。

    '
- fmt: '### The `@Table` Annotation (Revisited)


    The `@Table` annotation lets you specify details about the base table to which
    an entity is mapped. Listing [3-17](#A311833_3_En_3_Chapter.html#Par131) shows
    the `@Table` annotation definition.


    ```

    @Target({ElementType.TYPE})

    @Retention(RetentionPolicy.RUNTIME)

    public @interface Table {

    String name() default "";

    String catalog() default "";

    String schema() default "";

    UniqueConstraint[] uniqueConstraints() default {};

    }

    Listing 3-17

    The @Table Annotation

    ```


    Each entity identifies a database table that will hold its persistent data as
    follows:


    ```

    @Entity

    @Table(name="ADDRESSES")

    public class Address implements Serializable {

    . . .

    }

    ```


    Here, the `@Table` annotation is used to override the default table name for the
    `Address` entity. In the absence of an `@Table` annotation, the default table
    name is the same name as the entity class itself. (It would default to `"ADDRESS"`
    in this example.) The `@Table` annotation also allows you to specify database
    schema and constraint information for use when the table is generated during deployment.
    An entity may also map to more than one table by specifying the `@SecondaryTable`
    annotation.


    **Note**


    The predefined annotation types `@Target` and `@Retention` may be specified on
    an annotation definition to provide information to the compiler about the annotation.
    The `@Target` annotation identifies the program element (in our example, a part
    of a class) that can accept the annotation. The `@Retention` annotation is used
    to indicate whether the annotation should be available only in the Java source
    file or also in the compiled class file. When `@Retention(SOURCE)` is specified,
    the annotation is useful as documentation, and it may be used by a design-time
    tool like an integrated development environment (IDE), but the annotation usage
    is not compiled into the `.class` file. When `@Retention(RUNTIME)` is specified,
    the information is also compiled into the `.class` file, and so it may be obtained
    through Java reflection for use by deployment or runtime tools like the EJB container.


    ### The `@Column` Annotation (Revisited)


    Entity class fields or properties are mapped to database columns using the `@Column`
    annotation. Again, if no `@Column` annotation is defined for a field through its
    instance variable or property accessor, the mapped column name gets its name from
    the field.


    Listing [3-18](#A311833_3_En_3_Chapter.html#Par138) gives the definition of the
    `@Column` annotation.


    ```

    @Target({ElementType.METHOD, ElementType.FIELD})

    @Retention(RetentionPolicy.RUNTIME)

    public @interface Column {

    String name() default "";

    boolean unique() default false;

    boolean nullable() default true;

    boolean insertable() default true;

    boolean updatable() default true;

    String columnDefinition() default "";

    String table() default "";

    int length() default 255;

    int precision() default 0; // decimal precision

    int scale() default 0; // decimal scale

    }

    Listing 3-18

    The @Column Annotation

    ```


    As you can see, it is possible to specify a column’s attributes fully if desired.
    This is useful when you want to give deploy-time directives to generate custom
    column definitions. Most typically, you will use the `name` attribute to decouple
    the column name from the field or property name, as when the column name is too
    utilitarian or cryptic.


    Here, the field `identifier` is told to map to a column called `ID`, releasing
    the naming dependency that binds them by default:


    ```

    @Entity

    @Table(name="ADDRESSES")

    public class Address implements Serializable {

    ...

    @Column(name="ID")

    String identifier;

    ...

    }

    ```


    ### Complex Mappings


    More complex mappings, including those involving multiple tables per entity, complex
    data types, embedded classes, and inheritance hierarchies will be covered in the
    next chapter. For now, let us examine how relationships between entities are mapped.


    ## Entity Relationships


    Entities may hold single-value and collection references to themselves or to other
    entities. Additionally, relationships may be exposed as relationship fields on
    either one or both entities involved in the relationship. For those of you familiar
    with EJB 2.x, be aware that in JPA, relationship fields are no longer bidirectionally
    maintained by the container. Updating the field at one end of a bidirectional
    relationship no longer causes the field at the other end to be updated automatically
    as well. When mapping a relationship field, its primary key always represents
    the target entity. The source, or owning end of the relationship, may be mapped
    to a foreign key on the source entity’s table, but there is no requirement that
    an actual database foreign key constraint be specified on the underlying columns.


    Let’s take a look at how JPA lets you define relationships.


    ### `@OneToOne`


    Following is the definition of the `@OneToOne` relationship annotation:


    ```

    @Target({ElementType.METHOD, ElementType.FIELD})

    @Retention(RetentionPolicy.RUNTIME)

    public @interface OneToOne {

    Class targetEntity() default void.class;

    CascadeType[] cascade() default {};

    FetchType fetch() default EAGER;

    boolean optional() default true;

    String mappedBy() default "";

    }

    ```


    The `@OneToOne` relationship is represented by a single-value entity reference
    at one or both ends of the relationship. One relationship field will map to columns
    on its table that reference the primary key columns on the table at the other
    end of the relationship.


    Here is an example in which `Customer` uses `Address`, but `Address` knows nothing
    about its usage by `Customer`, and so it does not have a relationship field in
    its class:


    ```

    @Entity

    public class Customer implements Serializable {

    . . .

    @OneToOne

    @JoinColumn(name="MAILING_ADDRESS_REF",

    referencedColumnName="ADDRESS_PK")

    protected Address address;

    . . .

    }

    ```


    To make this a bidirectional relationship, simply add a relationship field to
    `Address` that points back to `Customer`:


    ```

    @Entity

    public class Address implements Serializable {

    . . .

    @OneToOne(mappedBy="address")

    protected Customer customer;

    . . .

    }

    ```


    Note that by using the `(mappedBy="address")` attribute, there is no need to specify
    the `@JoinColumn` information on the `Address.customer` field redundantly. Also,
    the entity type at the other end of the relationship is derived from the `customer`
    field type.


    If you were then to make the relationship unidirectional but in the opposite direction,
    you would just move the `@JoinColumn` annotation from `Customer.address` onto
    `Address.customer` and then remove the `Customer.address` field.


    ### `@OneToMany` and `@ManyToOne`


    Similarly, here are the definitions of the `@OneToMany` and `@ManyToOne` annotations:


    #### `@OneToMany`:


    ```

    @Target(value = {ElementType.METHOD, ElementType.FIELD})

    @Retention(value = RetentionPolicy.RUNTIME)

    public @interface OneToMany {

    public Class targetEntity() default void.class;

    public CascadeType[] cascade() default {};

    public FetchType fetch() default FetchType.LAZY;

    public String mappedBy() default "";

    public boolean orphanRemoval() default false;

    }

    ```'
