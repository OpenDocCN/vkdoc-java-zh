  trans: '

    ### 配置 EJB Web 服务


    我们在第 6 章工作的基础上构建了葡萄酒商店后端应用程序，并在该章中实现了信用服务。


    1.  本章中的应用程序只有在您按照第 6 章的步骤部署 Web 服务并创建 Web 服务客户端后才能编译。此处概述了这些步骤，但您可能需要参考第 6 章以获取执行这些操作的更全面说明。右键单击
    `Chapter06-WebServiceSamples-ejb` 项目，然后依次选择“清理并构建”和“部署”。

    2.  在 `Chapter06-WebServiceSamples` 项目中，打开“Web 服务”部分，右键单击 `CreditCheckEndpointBean`，然后选择“测试
    Web 服务”。当网页出现时，单击“WSDL 文件”链接，然后复制浏览器中 `.wsdl` 文件的 URL（通常为 `http://localhost:8080/CreditService/CreditCheckEndpointBean?Tester`）。

    3.  现在再次右键单击 `Chapter06-WebServiceSamples-ejb` 项目，然后选择“新建 | Web 服务客户端”。在向导中，选择“WSDL
    URL”单选按钮，并粘贴您在步骤 2 中复制的 `.wsdl` URL。将包设置为“`com.apress.ejb.chapter06.services.client`”，然后选择“完成”。这将完成运行第
    7 章示例所需的 Web 服务配置。


    快速查看此示例中包含的模块可以发现，除了第 6 章的 EJB/WebServices 模块之外，我们还有另一个包含会话 Bean 外观和 MDB 的 EJB
    模块、多个构成 JPA 持久化单元的 JPA 实体，以及一个包含测试 Servlet 的 Web 模块。


    ### wineapp@yahoo.com 账户与 user.properties 文件


    我们设置了一个 Yahoo! 邮件账户 `wineapp@yahoo.com`，您可以将其用于测试目的。密码是：`wine_app`。本书中所有涉及 JavaMail
    会话的示例默认使用此账户。您可以自由使用它，或者您可能更倾向于通过自己的邮件服务器（例如，如果您在防火墙后面）使用自己的电子邮件账户来发送和接收电子邮件。


    在 `Chapter07-ServiceIntegration-jpa` 项目中，您会在根源目录下找到一个 `user.properties` 文件。此文件允许您指定此示例生成的电子邮件的“发件人：”和“收件人：”电子邮件地址。如清单
    7-21 所示：


    ```

    # 指定将显示在邮件头中的“发件人：”和“收件人：”电子邮件账户，

    # 该邮件头由名为 ''mail/wineappMail'' 的 JavaMail 会话发送，

    # 并在第 5 章中配置。请注意，

    # 尽管邮件头可能显示来自下面的“发件人”账户，

    # 但它实际上源自 ''mail/wineappMail'' JavaMail 会话中配置的账户。

    from_email_address = wineapp@yahoo.com

    to_email_address = wineapp@yahoo.com

    清单 7-21

    位于 Chapter07-ServiceIntegration-jpa 项目源根目录中的 user.properties 文件

    ```


    要更改“收件人：”和/或“发件人：”电子邮件地址，请随意编辑此纯文本文件。此外，请参考 `Readme.txt` 文件以获取有关代理服务器以及因非默认安装环境导致的其他问题的指导。


    ### 构建、部署和执行示例应用程序


    完成所有配置步骤后，您现在可以准备通过其简单的 Servlet 客户端来构建、部署和运行本章的 `WineApp` 应用程序。为确保移除任何先前的工件，请首先选择所有五个
    NetBeans 项目并调用“清理”操作，如图 7-8 所示。


    ![A311833_3_En_7_Fig8_HTML.jpg](img/A311833_3_En_7_Fig8_HTML.jpg)


    图 7-8


    清理 Chapter07-ServiceIntegration 项目 注意


    如果 GlassFish 已在运行，并且您在构建时因无法删除 .jar 文件而遇到错误，请尝试关闭 GlassFish 并重新调用“清理”操作。


    接下来的步骤是构建、打包和部署 EJB、JPA 和 Web 模块，并运行 Servlet 客户端。当调用图 7-9 中所示的“运行”操作时，所有这些步骤都会自动执行。NetBeans
    能够跟踪项目的状态，并在执行 `ShoppingCartClient` Servlet 之前执行任何必要的工作。


    ![A311833_3_En_7_Fig9_HTML.jpg](img/A311833_3_En_7_Fig9_HTML.jpg)


    图 7-9


    运行 Chapter07-ServiceIntegration 项目，该项目执行位于 Chapter07-ServiceIntegration-web 模块中的
    Servlet ShoppingCartClient


