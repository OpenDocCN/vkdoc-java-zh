    ## 什么是微服务？


    微服务是面向服务架构（SOA）风格的一种变体。


    微服务定义了一种新的架构结构模型，使得一个简单的应用程序被开发为一组多个单一且轻量级的服务。


    与以往的架构方法相比，微服务明确地定义了软件开发行业的一个新趋势。


    微服务的一个主要优点是，每个服务都可以独立部署和扩展，并且可以使用不同的编程语言编写。


    微服务通常通过 HTTP REST API 调用直接调用。像 RAML（RESTful API 建模语言）这样的标准允许对 REST API 进行正式定义。


    微服务的开发是直接通过 HTTP 调用和间接通过消息代理调用的结合。


    我们将看到单体架构与微服务之间的主要区别，并提供一个微服务开发的示例。


    以下是微服务最重要的一些优点和缺点：


    优点：


    *   更好的软件实践

    *   容错性

    *   演进式设计

    *   易于部署

    *   降低耦合度

    *   为工作选择合适的工具

    *   持续交付

    *   更小的代码库更易于推理

    *   易于替换旧服务

    *   高效扩展

    *   更易于开发、理解和维护

    *   启动速度比单体应用快

    *   局部变更易于部署

    *   改善故障隔离

    *   非技术驱动，而是业务聚焦


    缺点：


    *   工具开销

    *   调试困难

    *   分布式事务

    *   延迟

    *   依赖关系

    *   分布式系统的额外复杂性

    *   显著的运维复杂性，需要高水平的自动化

    *   协调部署的发布计划


    微服务技术栈可能包括：


    *   Java

    *   Spring

    *   Hibernate

    *   NodeJS

    *   PostgreSQL

    *   Redis

    *   Bootstrap

    *   AngularJS

    *   亚马逊云服务

    *   Docker

    *   RabbitMQ

    *   Hystrix


    图 6-18 展示了微服务概念。


    ![A311833_3_En_6_Fig18_HTML.jpg](img/A311833_3_En_6_Fig18_HTML.jpg)


    图 6-18


    微服务概念


    图 6-19 展示了单体架构与微服务之间的主要区别。


    ![A311833_3_En_6_Fig19_HTML.jpg](img/A311833_3_En_6_Fig19_HTML.jpg)


    图 6-19


    单体架构与微服务对比


    总的来说，传统的软件开发流程会导致相对较大的团队在一个单一的、单体式的部署工件上工作，而微服务则是 IT 处理软件开发方式的一个根本性转变。


    图 6-20 展示了微服务的通用架构。


    ![A311833_3_En_6_Fig20_HTML.jpg](img/A311833_3_En_6_Fig20_HTML.jpg)


    图 6-20


    微服务架构


    ## Java EE 8 与微服务


    当然，Java EE 平台可用于开发微服务。


    总的来说，Java EE 规范集允许 Java 开发人员轻松创建单体应用程序，因为他们无需担心处理诸如扩展、安全、网络处理、事务管理等技术问题。在开发单体应用时，Java
    EE 开发人员只需专注于业务问题。


    但是，开发单体应用时的问题是，应用程序将被结构化为一个包含多个模块的 EAR 文件，包括以下内容：


    *   一个处理集成方面（如 SOAP Web 服务、消息处理等）的 EJB 模块。

    *   一个具有通用持久化层的 EJB 模块，用于通过传统方式（如 JPA、JDBC、JCA 等）访问数据存储。

    *   多个 WAR 模块


    这种情况很容易变得非常复杂，难以开发。而使用 Maven 或 OSGi 等工具，将 Java EE 应用程序模块化（例如微服务），简化了 Java EE 上单体应用的开发，这意味着
    Java EE 开发人员的整个应用程序可以部署在单个 WAR 文件中。


    以下是使用 Java EE 开发微服务的主要优势：


    *   Java EE 极其轻量

    *   开发快速

    *   大多数替代 Java 框架都基于 Java EE API

    *   专注于构建业务功能

    *   生成小巧的 WAR 文件

    *   版本化运行时 – 有助于运维


    Java 中的微服务开发平台包括：


    *   Java EE

    *   Microprofile

    *   OSGI

    *   Vertx

    *   Akka

    *   Dropwizard

    *   等等


    Java EE 微服务构建工具包括：


    *   Maven

    *   Gradle


    微服务创建以下类型的工件：


    *   jar, war, ear, rar 等

    *   Java EE 服务器运行时配置


    接下来，我们将展示一个 Java EE 8 微服务的示例。


    ## 使用 Spring Boot 和 NetBeans 的微服务示例


    现在，我们将展示如何使用 Spring Boot 和 NetBeans IDE v8.2 开发一个 Java EE 8 微服务应用程序。


    Spring Boot 是一个创新项目，可以帮助 Java 开发人员创建简单的、独立的、生产级的基于 Spring 的应用程序等。Spring Boot 可以在
    [`https://projects.spring.io/spring-boot/`](https://projects.spring.io/spring-boot/)
    找到。

    '
- fmt: '### Prerequisites


    Prerequisites for this example are the following:


    - `NetBeans IDE 8.2`

