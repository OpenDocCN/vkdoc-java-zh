    ### 单表每类继承层次结构 (InheritanceType.SINGLE_TABLE)


    默认的继承映射策略是 `SINGLE_TABLE`，在该策略中，类层次结构中的所有实体都映射到单个表。此表上的专用鉴别器列标识与每一行关联的特定实体类型，并且层次结构中的每个实体都被赋予一个唯一值存储在此列中。默认情况下，实体的鉴别器值是其实体名称，尽管实体可以使用
    `@DiscriminatorValue` 注解覆盖此值。这种方法在查询时性能良好，因为只涉及单个表，并且如果你的类型层次结构能够遵守实际限制，这可能是最佳的使用方法。


    图 4-2 展示了一个模式图，该模式使用 `SINGLE_` `TABLE` 策略映射我们的示例实体。我们选择为这些表添加前缀 `CH04_ST_`，以避免与完整
    Enterprise Wines Online 应用程序使用的示例模式中的 `PERSON` 和 `ADDRESS` 表冲突。


    ![A311833_3_En_4_Fig2_HTML.jpg](img/A311833_3_En_4_Fig2_HTML.jpg)


    图 4-2


    `CH04_ST_PERSON` 表保存了以 `Person` 为根的实体层次结构中的所有实体实例。`CH04_ST_ADDRESS` 表保存了关联的 `Address`
    实例。


    以 `Person` 实体为根的实体层次结构中的所有属性都映射到单个表 `CH04_ST_` `PERSON` 的列。该表持有一个外键引用，绑定到 `HOME_ADDRESS`
    列，指向映射到 `Address` 实体的 `CH04_ST_ADDRESS` 表。它还使用 `MANAGER` 列持有一个指向自身的外键引用。此外键不强制唯一，表示多行可以在其
    `MANAGER` 列中持有相同的值。


    #### 示例实体类


    清单 4-1 到 4-4 展示了如何使用 `SINGLE_TABLE` 继承策略映射 `Person` 层次结构中的实体。继承策略在层次结构的根实体上声明，并且也适用于层次结构中的所有子实体。示例实体中引入但尚未涵盖的注解将在后续章节中解释。


    ```

    /*

    * Person: 一个抽象实体，也是继承层次结构的根

    *

    * 创建 ID 生成器表 "CH04_ST_PERSON_ID_GEN":

    * CREATE TABLE "CH04_ST_PERSON_ID_GEN" ("PRIMARY_KEY_NAME" VARCHAR2(4000) PRIMARY
    KEY,     "NEXT_ID_VALUE" NUMBER(38));

    *

    * 为此实体的 ID 生成器 ''Person.id'' 初始化此表的数据（从值 ''0'' 开始）:

    * INSERT INTO "CH04_ST_PERSON_ID_GEN" VALUES (''Person.id'', 0);

    */

    @Entity

    @NamedQueries({ @NamedQuery(name = "Person.findAll", query = "select o from Person
    o") })

    @Table(name = "CH04_ST_PERSON")

    @TableGenerator(name = "Person_ID_Generator", table = "CH04_ST_PERSON_ID_GEN",
    pkColumnName = "PRIMARY_KEY_NAME",

    pkColumnValue = "Person.id", valueColumnName = "NEXT_ID_VALUE")

    @Inheritance(strategy = InheritanceType.SINGLE_TABLE)

    @DiscriminatorColumn(name="TYPE")

    public abstract class Person

    implements Serializable

    {

    @SuppressWarnings("compatibility:-7074714881275658754")

    private static final long serialVersionUID = 5291172566067954515L;

    @Id

    @Column(nullable = false)

    @GeneratedValue(strategy = GenerationType.TABLE, generator = "Person_ID_Generator")

    private Integer id;

    @Column(name = "FIRST_NAME", length = 400)

    private String firstName;

    @Column(name = "LAST_NAME", length = 400)

    private String lastName;

    @OneToOne(cascade=CascadeType.ALL)

    @JoinColumn(name = "HOME_ADDRESS")

    private Address homeAddress;

    @Version

    private Integer version;

    public Person() {

    }

    /* get/set 方法... */

    }

