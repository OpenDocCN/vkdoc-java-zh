    \ Ever\");\n        em.persist(cust);\n    }\n}\n\n清单 3-14\n充当实体外观的 POJO\n```\n\
    \n这里我们创建了一个 `EntityManagerFactory`，它同样绑定到 `Chapter03PersistenceUnit-JSE` 持久化单元，该单元包含了来自清单\
    \ 3-7 的 `Customer` 实体。然后，我们从该工厂创建一个 `EntityManager` 实例，并使用它来持久化一个新的 `Customer`\
    \ 实例。\n\n#### 通过 JNDI 查找 EntityManager\n\n第三种选择（同样适用于 Java SE 和 EE 环境）是通过 Java\
    \ 命名和目录接口（JNDI）查找 `EntityManagerFactory` 或 `EntityManager` 本身。清单 3-15 展示了如何在会话\
