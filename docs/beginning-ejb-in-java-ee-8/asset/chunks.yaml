    project, and expand the `com.apress.ejb.chapter04.singletable.service` package.
    You will see the Java service façade (`JavaServiceFacade.java`) and its client
    class. Right-click on `JavaServiceFacadeClient.java`, and choose "`Run File`".
    The test will run within NetBeans, and the output is sent to a log window. See
    Figure [4-11](#A311833_3_En_4_Chapter.html#Fig11).


