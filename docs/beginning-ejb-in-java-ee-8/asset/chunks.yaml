    \nThe latest EJB 3.2 version release is dated April 10, 2013, and did not change\
    \ from Java EE 7 to EE 8.\n\nMajor changes include the following:\n\n- An option\
    \ to disable passivation of stateful session beans is enhanced.\n- The `TimerService`\
