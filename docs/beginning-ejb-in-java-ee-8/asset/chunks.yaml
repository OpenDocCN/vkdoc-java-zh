    注意


    预定义的注解类型 `@Target` 和 `@Retention` 可以在注解定义中指定，以向编译器提供关于该注解的信息。`@Target` 注解标识可以接受该注解的程序元素（在我们的示例中，是类的一部分）。`@Retention`
    注解用于指示该注解是仅在 Java 源文件中可用，还是在编译后的类文件中也可用。当指定 `@Retention(SOURCE)` 时，该注解作为文档有用，并且可能被设计时工具（如集成开发环境
    (IDE)）使用，但注解的使用不会编译到 `.class` 文件中。当指定 `@Retention(RUNTIME)` 时，该信息也会编译到 `.class`
    文件中，因此可以通过 Java 反射获取，供部署或运行时工具（如 EJB 容器）使用。


