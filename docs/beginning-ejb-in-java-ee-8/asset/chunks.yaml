    #### Bean 构造函数参数注入


    一个 CDI bean 会指定其众多构造函数中的一个作为其 bean 构造函数。CDI 容器使用此构造函数来实例化该 bean。当我们向一个带有一个或多个参数的
    bean 构造函数添加 `@javax.inject.Inject` 注解时，就会发生 bean 构造函数参数注入。如果 bean 构造函数有多个参数，那么所有参数都是有效的注入点，这意味着容器必须为
    bean 构造函数的所有参数提供值。如果 bean 类没有带有 `@Inject` 注解的 bean 构造函数，那么默认的（无参）构造函数将被用作 bean
    构造函数。


    客户端应用程序有可能绕过容器，直接实例化该 bean。在这种情况下，显而易见的结果是，返回的对象不与任何上下文绑定，并且新实例的生命周期不受容器管理。


    清单 10-4 展示了如何使用 bean 构造函数参数注入，用 `Wine` 类型的年份酒来初始化 `WineCellarClient` 类中的 `beanConstParaInjVintage`
    字段。


    注意


    CDI 容器将选择 `Wine` 接口的默认实现，并将该实现的一个实例传递给 `WineCellarClient` bean 构造函数。


    ```

    package com.apress.ejb.chapter10;

    import javax.inject.Inject;

    public class WineCellarClient {

    private Wine beanConstParaInjVintage;

    @Inject

    WineCellarClient(Wine vintage)

    {

    this.beanConstParaInjVintage = vintage;

    }

    }

    清单 10-4

    WineCellarClient.java

    ```


    #### 初始化器方法参数注入


    CDI 还可以通过调用 bean 上带有 `@javax.inject.Inject` 注解的方法，在之后初始化 bean 的属性。带有 `@javax.inject.Inject`
    注解的 bean 方法被称为初始化器方法。初始化器方法必须是非抽象的、非静态的且非泛型的。初始化器方法可以有零个或多个参数。如果初始化器方法有多个参数，那么所有参数都是有效的注入点，并且
    CDI 容器必须能够为所有参数提供值。一个 bean 类声明多个初始化器方法是合法的。


    客户端应用程序有可能绕过容器，直接调用初始化器方法。同样，在这种情况下，显而易见的结果是容器不会向该方法传递任何参数。


    清单 10-5 展示了如何修改 `WineCellarClient` 类，使用初始化器方法参数注入代替 bean 构造函数参数注入，以达到相同的结果。


    ```

    package com.apress.ejb.chapter10;

    import javax.inject.Inject;

    public class WineCellarClient {

    private Wine initParaInjVintage;

    WineCellarClient()

    {

    }

    @Inject

    public void setVintageWine(Wine vintage)

    {

    this.initParaInjVintage = vintage;

    }

    }

    清单 10-5

    WineCellarClient.java

    ```


    #### 字段注入


    最后，CDI 容器可以通过选择字段接口类型的明确实现来实例化一个类级别的字段。通过使用 `@Inject` 注解标记类级别的字段，可以对其进行注入。被注入的字段必须是
    bean 类或任何支持注入的 Java EE 组件类中的非静态、非 final 字段。


    清单 10-6 展示了字段注入如何简化 `fieldInjVintage` 的初始化。


    ```

    package com.apress.ejb.chapter10;

    import javax.inject.Inject;

    public class WineCellarClient {

    @Inject

    private Wine fieldInjVintage;

    }

    清单 10-6

    WineCellarClient.java

    ```


    ### 依赖解析


    CDI 规范保证了注入的 bean 是松散耦合且类型安全的。对于只有一个实现的 bean 类型（类或接口），CDI 容器可以明确地选择其实现。但一个 bean
    类型可能有多个实现。例如，我们可以添加另一个类 `WhiteWine`，如清单 10-7 所示，它实现了我们在清单 10-1 中创建的接口 `Wine`。


    ```

    package com.apress.ejb.chapter10;

    public class WhiteWine implements Wine {

    public String getColor() {

    return "White";

    }

    }

    清单 10-7

    WhiteWine.java

    ```


    在引入 `WhiteWine` 实现之后，我们的 `WineClient`（其中注入了 `Wine`）需要区分 `Wine` 的两个实现：即 `RedWine`
    和 `WhiteWine`。当 CDI 容器无法隔离出需要在给定注入点注入的一个 bean 类时，它会引发一个未满足或不明确的依赖部署时错误。这个不明确的依赖问题可以通过使用以下三种解决方案中的任何一种来解决：


    *   限定符（用于编译时解析）

    *   备选方案（用于部署时解析）

    *   生产者（用于运行时解析）


    #### 限定符


    限定符类型通过提供编译时的多态性和运行时的动态绑定，使 CDI 组件能够以松散耦合的方式进行交互。限定符类型允许客户端指定要注入的实例的所需特性，而无需知道选择了哪个具体的实现类。


    让我们通过一个例子来尝试理解限定符。清单 10-7 中 `WhiteWine` 类的添加迫使容器引发错误，因为容器无法决定是实例化 `RedWine` 还是
    `WhiteWine` 实现。我们将使用一个限定符来解决这个依赖问题。清单 10-8 展示了一个名为 `Red` 的用户自定义限定符。


    ```

    package com.apress.ejb.chapter10;

    import static java.lang.annotation.ElementType.TYPE;

    import static java.lang.annotation.ElementType.FIELD;

    import static java.lang.annotation.ElementType.PARAMETER;

    import static java.lang.annotation.ElementType.METHOD;

    import static java.lang.annotation.RetentionPolicy.RUNTIME;

    import java.lang.annotation.Retention;

    import java.lang.annotation.Target;

    import javax.inject.Qualifier;

    @Qualifier

    @Retention(RUNTIME)

    @Target({METHOD, FIELD, PARAMETER, TYPE})

    public @interface Red {

    }

    清单 10-8

    Red.java

    ```


    我们将为清单 10-2 中所示的 `RedWine` 类添加 `Red` 限定符，如清单 10-9 所示。


    ```

    package com.apress.ejb.chapter10;

    import javax.enterprise.context.ApplicationScoped;

    // 实例将只创建一次，将在整个应用程序中共享，

    // 并在应用程序关闭时销毁

    @ApplicationScoped

    @Red

    public class RedWine implements Wine {

    public String getColor() {

    return "Red";

    }

    }

    清单 10-9

    RedWine.java

    ```


    引入这个自定义限定符使我们能够解决不明确的依赖错误。如清单 10-3 中所编码的 `WineClient`，现在将实例化 `WhiteWine`，因为 `WhiteWine`
    具有 `@Default` 限定符，并且注入点也具有相同的 `@Default` 限定符。清单 10-10 展示了如何通过在注入点添加 `@Red` 限定符，用
    `RedWine` 实现来实例化 `newWine` 字段。


    ```

    package com.apress.ejb.chapter10;

    import javax.inject.Inject;

    public class WineClient {

    // 以经典方式实例化

    // private Wine oldWine = new RedWine();

    // 通过字段依赖注入实例化

    @Inject

    @Red

    private Wine newWine;

    }

    清单 10-10

    WineClient.java

    ```


    现在我们对限定符如何帮助我们解决歧义有了基本的了解，接下来我们将研究 CDI 限定符的四种类型。

