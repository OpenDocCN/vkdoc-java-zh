  \n## 应用程序架构\n\nJava EE 平台在组件如何跨不同层和架构进行分布方面提供了灵活性。你可以根据应用程序或配置需求选择正确的架构和编程模型。在本节中，我们将介绍你可以使用的不同架构和编程模型。\n\
