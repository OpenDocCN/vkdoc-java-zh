  \ 是用于提交按钮的方法绑定表达式。\n\n```\n\n购物车项目页面\n\nBeginning EJB: 葡萄酒商店应用\n购物车\n\n清单 12-21\n\
  cartItems.jsp\n```\n\n图 12-25（位于“编译、部署和测试 JSF 应用”部分）展示了在浏览器中渲染的 `cartItems.jsp`\
