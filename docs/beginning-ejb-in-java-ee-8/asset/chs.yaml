  \ where wine.varietal = :varietal\n*/\n@ExcludeClassInterceptors\npublic List getWineFindByVarietal(String\
  \ varietal) {\nreturn em.createNamedQuery(\"Wine.findByVarietal\", Wine.class).setParameter(\"\
  varietal\", varietal).getResultList();\n}\n/**\n* select o from InventoryItem o\
  \ where o.wine = :wine\n*/\n@ExcludeClassInterceptors\npublic List getInventoryItemFindItemByWine(Object\
  \ wine) {\nreturn em.createNamedQuery(\"InventoryItem.findItemByWine\", InventoryItem.class).setParameter(\"\
  wine\", wine).getResultList();\n}\n}\n清单 8-5\nOrderProcessorBMTBean.java，一个使用 BMT\
  \ 划分和扩展持久化上下文的有状态会话 Bean\n```\n\n\n与此有状态会话 Bean 关联的是一个拦截器类，其作用是在每个通过`EntityManager`应用变更的方法上介入，以自动开启事务。这种模式类似于\
  \ SQL 的事务模型，即每次调用 INSERT、UPDATE 或 DELETE 等 DML 操作时都会隐式开启事务。因此，客户端只需调用 COMMIT 或 ROLLBACK\
  \ 来结束事务，而无需显式调用开启事务的方法。拦截器类如下所示，见清单 8-6。\n\n```\nclass OrderProcessorBMTBeanTxnInterceptor\
  \ {\npublic OrderProcessorBMTBeanTxnInterceptor() {\n}\n@AroundInvoke\nObject beginTrans(InvocationContext\
  \ invocationContext) throws Exception {\nfinal OrderProcessorBMTBean orderProcessorBMTBean\
  \ = (OrderProcessorBMTBean) invocationContext.getTarget();\nfinal UserTransaction\
  \ txn = orderProcessorBMTBean.sessionContext.getUserTransaction();\nif (txn.getStatus()\
  \ == Status.STATUS_NO_TRANSACTION) {\ntxn.begin();\n}\nreturn invocationContext.proceed();\n\
  }\n}\n清单 8-6\nOrderProcessorBMTBeanTxnInterceptor.java，一个由 OrderProcessorBMTBean\
  \ 使用的拦截器，用于在每次通过 EntityManager 应用变更的方法被调用时，利用 BMT Bean 的 SessionContext 中的 UserTransaction\
