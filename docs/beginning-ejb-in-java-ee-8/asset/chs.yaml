  ## Web 服务客户端视图


  发布为 Web 服务的无状态会话 Bean 可以通过部署期间生成的 WSDL 文档所描述的客户端视图进行访问（如清单 6-7 所示）。由于无状态会话 Bean
  是使用 WSDL 等标准发布为 Web 服务的，因此任何能够发送和接收 SOAP 消息的客户端应用程序（无论技术或语言）都可以调用它。客户端应用程序可以使用 .NET
  或 Java EE，或 PHP、Python 或 Ruby 等脚本语言编写。从客户端的角度来看，它看到的契约是一个 WSDL 文档。为了访问 Web 服务，应该从
  WSDL 文档生成编程接口。


  Web 服务是位置无关的，并且可以远程访问。如果调用 Web 服务的客户端应用程序是 Java 客户端或其他 Java EE 组件（例如 EJB），则它使用 JAX-WS
  客户端 API 或注解通过 SOAP 和 HTTP 调用 Web 服务。


  ### 开发访问 Web 服务的 Java 客户端


  为了通过 WSDL 服务契约访问 Web 服务，客户端程序需要从 WSDL 文档生成的编程接口（通常称为存根或代理）。一旦从 WSDL 文档生成了存根，我们就可以使用
  JAX-WS 注解来获取对 Web 服务的引用并调用它。


  #### 生成 Web 服务代理类


