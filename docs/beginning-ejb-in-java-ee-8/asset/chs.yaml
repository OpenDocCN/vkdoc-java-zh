  ```\n\n\n\n清单 2-26 展示了 `ShopperCountClient` Servlet，它查找单例 `ShopperCount` 会话 Bean，调用\
  \ `resetCounter()` 业务方法重置购物者计数，调用 `incrementShopperCount()` 业务方法增加购物者计数，最后打印统计到的购物者总数。购物者计数的值将在整个应用程序中可见。\n\
