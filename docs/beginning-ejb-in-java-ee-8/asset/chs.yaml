  \ 事务分析\n\n以下部分将从事务角度分析第二个示例。我们赋予了会话 Bean 状态（即`Stateful`），使其能够控制自身事务的边界划分，并允许其关联的持久化上下文从一个事务延续到下一个事务。\n\
  \n##### 会话 Bean 声明\n\n这些特性是通过注解和代码的组合实现的。您会注意到这个会话 Bean 被注解为：\n\n```\n@Stateful(name\
  \ = \"OrderProcessorBMT\", mappedName = \"Chapter08-TransactionSamples-OrderProcessorBMT\"\
  )\n@TransactionManagement(TransactionManagementType.BEAN)\n@Interceptors(OrderProcessorBMTBeanTxnInterceptor.class)\n\
  public class OrderProcessorBMTBean {\n@Resource\nSessionContext sessionContext;\n\
  @PersistenceContext(unitName = \"Chapter08-TransactionSamples-JTA\", type = PersistenceContextType.EXTENDED)\n\
  private EntityManager em;\n...\n}\n```\n\n它注入了`SessionContext`和`EntityManager`。有状态特性允许企业\
  \ Bean 在一次客户端调用到下一次调用之间保持状态。在这种情况下，该状态就是持久化上下文和关联的事务，它们必须跨越多个方法调用而存在。BMT 声明意味着容器不应自动在方法边界上介入以划分事务。尝试向\
  \ BMT 会话 Bean 的方法添加`TransactionAttribute`限定符将在部署时被捕获并引发异常。\n\n`@PersistenceContext`注解包含一个`type`属性，其值为`PersistenceContextType.EXTENDED`，这意味着它会从一个事务持久化到下一个事务，并允许关联的实体即使在创建它们的事务结束后仍保持受管状态。通过`sessionContext`属性可用的`UserTransaction`对象是此\
  \ BMT Bean 与 EJB 容器 JTA 事务管理器的接口，并公开了`begin()`、`commit()`和`rollback()`事务边界划分方法。\n\
  \n\n\n##### 移除之前的测试数据\n\n我们可以像之前的 CMT 示例那样，通过会话 Bean 方法调用来填充测试环境。然而，使用 BMT 让我们可以选择在客户端以交互方式执行此工作。这是因为\
  \ `OrderProcessorBMT` Bean 的持久化上下文是 `EXTENDED`（扩展的），允许实体在控制权从企业 Bean 返回到客户端后，仍然与持久化上下文保持关联。\n\
  \n```\n//  通过移除所有电子邮件为 'wineapp@yahoo.com'（或 user.properties 文件中定义的任何地址）的现有 Customer\
  \ 来过滤数据。\n//  对 OrderProcessorBMT 上事务性方法的第一次调用将开始一个事务。\nfor (Customer customer :\n\
  orderProcessorBMT.getCustomerFindByEmail(PopulateDemoData.TO_EMAIL_ADDRESS)) {\n\
  orderProcessorBMT.removeEntity(customer);\nn++;\n}\nstrBuf.append(n + \" Customer(s)\
  \ and \");\n//  移除所有国家为 'United States' 的现有 Wine\nn = 0;\nfor (Wine wine : orderProcessorBMT.getWineFindByCountry(\"\
  United States\")) {\norderProcessorBMT.removeEntity(wine);\nn++;\n}\nstrBuf.append(n\
  \ + \" Wine(s)\");\nout.print(strBuf.toString() + \"\");\n//  应用这些更改，提交实体移除操作\n\
  orderProcessorBMT.commitTransaction();\n```\n\n每次对 `removeEntity()` 的调用都在通过其拦截器在\
  \ `OrderProcessorBMT` Bean 上启动的事务中执行，并将实体置于其持久化上下文中的“已移除”状态。在这些步骤结束时，客户端调用 `commitTransaction()`\
  \ 来实际执行数据库中的 `DELETE` 操作并提交事务。\n\n##### 在客户端创建新的 Customer 和 CartItem 实体实例\n\n与之前的无状态会话示例一样，实例化\
  \ `Customer` 及其 `CartItem` 实体实例并将它们关联起来的步骤不涉及事务，并且可以完全在客户端内部执行：\n\n```\n//  创建一个\
  \ Customer 并添加一些 CartItem 及其关联的 Wine\nIndividual customer = new Individual();\n\
  customer.setFirstName(\"Transaction\");\ncustomer.setLastName(\"Head\");\ncustomer.setEmail(PopulateDemoData.TO_EMAIL_ADDRESS);\n\
  for (int i = 0; i < 5; i++) {\nfinal Wine wine = new Wine();\nwine.setCountry(\"\
  United States\");\nwine.setDescription(\"Delicious wine\");\nwine.setName(\"Xacti\"\
  );\nwine.setRegion(\"Dry Creek Valley\");\nwine.setRetailPrice(new Float(20.00D\
  \ + i));\nwine.setVarietal(\"Zinfandel\");\nwine.setYear(2000 + i);\norderProcessorBMT.persistEntity(wine);\n\
  final CartItem cartItem = new CartItem();\ncartItem.setCreatedDate(new Timestamp(System.currentTimeMillis()));\n\
  cartItem.setCustomer(customer);\ncartItem.setQuantity(12);\ncartItem.setWine(wine);\n\
  customer.addCartItem(cartItem);\n}\n```\n\n值得注意的是，在 JPA 之前，这项工作需要付出更多的努力并消耗更多的资源。使用\
  \ EJB 2.x 实体 Bean 时，客户端开发人员有两个主要选择。一种方法是，开发人员可以创建数据传输对象（DTO）或遵循其他类似模式，通过代理来模拟创建和关联实体对象的任务。然后，这个\
  \ DTO 类网络会被传递到会话 Bean 层，就像我们之前所做的那样；但在会话 Bean 内部，必须从 DTO 对象显式创建和初始化实际的实体 Bean。\n\
  \n第二种方法，直接从客户端更新实体 Bean，编码更简单，但可能会以更高的性能开销为代价。如果客户端位于 Java EE 层之外，每次方法调用都会产生 RMI/IIOP（互联网内部\
  \ ORB 协议上的远程方法调用）编组的开销，以便与驻留在 EJB 容器中的实际 EJB 对象进行通信。当客户端位于 Java EE 层内时，这些开销中的大部分都会被消除，因为它可以使用本地实体\
  \ Bean 接口直接与活动的实体 Bean 通信；但 Java SE 客户端被迫对实体 Bean 使用远程接口。除此之外，容器管理关系（CMR）仅在本地组件接口上受支持；因此，在\
  \ EJB 2.x 世界中，即使是直接的实体 Bean 关系查找和更新，Java SE 客户端也无法使用。\n\n##### 持久化 Customer\n\n\
  尽管在此示例中，我们选择将事务 `begin()` 操作嵌入到拦截 BMT 会话 Bean 方法的拦截器类中，但我们也可以向客户端公开一个 `beginTransaction()`\
  \ 调用。因为我们选择了所采用的方法，所以只需要调用 `persistEntity()`，它会隐式地开始事务（但不会提交它）：\n\n```\n//  持久化\
  \ Customer，依赖级联设置来同时持久化所有相关的 CartItem 实体。\n//  重新赋值 customer 以获取 EJB 容器在持久化时分配的\
  \ ID 值。\norderProcessorBMT.persistEntity(customer);\n```\n\n事务上下文不会扩展到客户端线程本身；它只存在于会话\
  \ Bean 的线程中。在拦截器内部发生的对 `UserTransaction.begin()` 的调用会在该线程上建立一个事务上下文，当会话 Bean 的 `persistEntity()`\
  \ 方法被调用时，该上下文可供其使用。\n\n##### 创建 CustomerOrder\n\n我们的事务现在生效，并继续执行创建客户订单的步骤。此阶段类似于无状态\
  \ CMT 示例，不同之处在于事务已经创建，并且必须在结束时显式提交。\n\n```\n//  创建一个客户订单并从 CartItem 创建 OrderItem\n\
  final CustomerOrder customerOrder =\norderProcessorBMT.createCustomerOrder(customer);\n\
  out.print(\"Retrieving Customer Order Items... \");\nfor (OrderItem orderItem :\
  \ customerOrder.getOrderItemList()) {\nfinal Wine wine = orderItem.getWine();\n\
  out.println(wine.getName() + \" with ID \" + wine.getId());\n}\nout.println(\"done\"\
  );\n//  提交订单，应用到目前为止所做的所有更改\norderProcessorBMT.commitTransaction();\n```\n\n如果客户端希望在此阶段取消订单，例如通过客户端面板中公开的交互式确认/取消按钮，即使在\
  \ `CustomerOrder` 创建之后，BMT 选项也提供了这种可能性。\n\n#### 此方法的优点\n\n使用显式事务划分的好处在于它提供了额外的灵活性。EJB\
  \ 服务器仍然以事务管理器的身份运行，只是它将事务划分控制权暴露给企业 Bean，而不是基于每个方法上的 `@TransactionAttribute` 设置来自动化此划分。虽然无状态示例可以在创建\
  \ `CustomerOrder` 之前提示用户，但此方法允许创建和验证 `CustomerOrder`——例如，在提交给用户确认之前。但是，必须谨慎使用 BMT，原因如下一节所述。\n\
  \n#### 此方法的局限性\n\n可以说，额外的灵活性通常被跟踪事务状态和避免会话 Bean 客户端误用的额外负担所抵消。将开始和结束事务的过程交由客户端调用会话\
  \ Bean 方法的顺序来支配，可能会产生悬空事务。客户端与 Bean 本身协调，有责任干净地结束每个已开始的事务——无论是提交还是回滚。如果您能控制客户端如何使用\
  \ Bean，这可能是一个合理的风险——但会话 Bean 是公开发布的，可能很难预测谁会使用它们以及如何使用它们。\n\n可以编写 BMT 会话 Bean 来防止误用，但这种防护代码很可能最终使\
  \ Bean 的行为与 CMT Bean 类似，在这种情况下，您的努力几乎没有什么收获。\n\n\n\n## 构建、部署与测试：来自葡萄酒在线应用的一个事务场景\n\
  \n现在我们已经了解了 EJB 提供的事务支持的许多细节，让我们执行刚才介绍的那些测试用例。\n\n对于 CMT 和 BMT 两种场景，我们都会调用一个 Servlet\
  \ 客户端，该客户端会创建一个新客户，构建一个由购物车条目组成的购物车，然后根据购物车中的商品创建一个包含订单项的客户订单。我们选择这些示例作为本章内容，是因为它们涉及多个操作，这些操作可以根据客户端的需求，被划分为粒度或大或小的事务工作单元。\n\
  \n为了说明 EJB 提供的默认支持，我们使用首先探讨的示例：一个标准的无状态会话 Bean 实现，它使用了默认的 CMT 划分。在第二个示例中，我们演示了客户端承担部分事务管理责任，使用了一个采用\
  \ BMT 划分和扩展持久化上下文的有状态会话 Bean。\n\n### 前提条件\n\n在执行后续章节详述的任何步骤之前，请先完成第 1 章的“入门”部分。该部分将引导您完成本章示例所需的安装和环境设置。\n\
  \n### 打开示例应用程序\n\n本章的根项目依赖于 `Chapter07-ServiceIntegration-jpa` 中定义的 JPA 持久化单元。启动\
  \ NetBeans IDE，使用 `文件` ➤ `打开项目` 菜单打开 `Chapter08-TransactionSamples` 项目。确保选中“`打开所需项目`”复选框。见图\
  \ 8-1。\n\n![A311833_3_En_8_Fig1_HTML.jpg](img/A311833_3_En_8_Fig1_HTML.jpg)\n\n\
  图 8-1\n\n打开 Chapter08-TransactionSamples 项目\n\n此应用程序包含三个模块：一个直接取自第 7 章的 JPA 持久化单元；一个包含本章探讨的\
  \ CMT 和 BMT 会话 Bean 的 EJB 模块；以及一个包含我们也已探讨过的两个 Servlet 客户端的 Web 模块。见图 8-2。\n\n![A311833_3_En_8_Fig2_HTML.jpg](img/A311833_3_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\n\n观察 Chapter08-TransactionSamples 应用程序的结构\n\n### 创建数据库连接\n\n本章的示例需要一个数据库连接，对于这些测试，我们将使用\
  \ NetBeans 和 Glassfish 捆绑的 Derby 数据库。如果您已经创建了 `WineApp` 数据库（该数据库也用于第 3 章、第 4 章和第\
  \ 7 章的示例），请继续下一步。否则，请单击 `服务` 选项卡，展开 `数据库` 图标，然后在 `Java DB` 节点上调用“`创建数据库...`”。创建一个名为“`WineApp`”的数据库，用户名和密码为\
  \ `wineapp/wineapp`，如图 8-3 所示。\n\n![A311833_3_En_8_Fig3_HTML.jpg](img/A311833_3_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n\n创建 WineApp 数据库和连接\n\n最后一步创建了一个数据库连接，JPA 和 EJB 项目中的 `persistence.xml`\
  \ 文件里的持久化单元都会引用该连接。虽然可以预先创建数据库对象（表、序列、键约束等），但我们将让 JPA 在每个持久化单元首次需要这些数据库对象时自动创建它们。\n\
  \n### 编译源代码\n\n创建 `WineApp` 数据库后，在 `Chapter08-TransactionSamples` 节点上调用上下文菜单，并通过选择\
  \ `清理并构建` 菜单选项来构建应用程序，如图 8-4 所示。\n\n![A311833_3_En_8_Fig4_HTML.jpg](img/A311833_3_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4\n\n构建应用程序\n\n### 部署并运行客户端程序\n\n项目源代码成功构建后，调用相同的菜单并选择 `部署`，如图 8-5 所示。\n\n\
  ![A311833_3_En_8_Fig5_HTML.jpg](img/A311833_3_En_8_Fig5_HTML.jpg)\n\n图 8-5\n\n部署应用程序\n\
  \n部署完成后，调用 `运行` 或 `调试` 菜单项来启动 `OrderProcessorCMTClient` Servlet。我们已预先配置 `Chapter09-TransactionSamples`\
  \ 项目默认运行此 Servlet。该 Servlet 将使用为 NetBeans 配置的默认浏览器显示示例输出，如图 8-6 所示。\n\n![A311833_3_En_8_Fig6_HTML.jpg](img/A311833_3_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6\n\n运行 OrderProcessorCMTClient Servlet 的输出\n\n如果您选择调试，可以随意在 `OrderProcessorCMTBean.java`\
  \ 会话 Bean、`OrderProcessorCMTClient.java` Servlet、JPA 实体或应用程序中的任何其他源文件中添加一些断点。\n\n\
  接下来，启动第二个示例，即 `OrderProcessorBMTClient` Servlet。为此，您可以更新浏览器 URL，将 `CMT` 替换为 `BMT`，或者更新\
  \ `Chapter09-TransactionSamples` 项目的属性。只需使用 `OrderProcessorCMTBean.java` 会话 Bean\
  \ 重新部署项目，然后选择 `运行` 类别即可。结果如图 8-7 所示。\n\n![A311833_3_En_8_Fig7_HTML.jpg](img/A311833_3_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7\n\n配置 Chapter09-TransactionSamples 项目的运行目标\n\n## 总结\n\n本章定义了所有事务行为所必需的核心概念，并探讨了\
  \ EJB 服务器提供的事务特性以及企业 Bean 开发者可以访问的接口。\n\n我们首先探讨了定义事务的核心 ACID 特性——原子性、一致性、隔离性和持久性。我们介绍了\
  \ JTA，并描述了其分布式事务模型的特性与优势，包括关键的两阶段提交协议的行为。\n\n我们研究了 EJB 服务器如何充当 JTA 事务管理器，使 EJB 能够无缝地参与分布式事务，并减轻了\
  \ Bean 开发者显式地将持久化或其他事务操作与事务资源绑定的需求。我们还详细介绍了 EJB 为企业 Bean 开发者提供的对这些事务服务的声明式支持，探讨了\
  \ CMT 和 BMT 两种划分方式所支持的企业 Bean，并使用了隐式和显式两种提交模型。对于 CMT Bean，我们描述了可用于定义 CMT Bean 方法事务行为的六种事务属性各自的行为及其含义。在\
  \ JPA 领域，我们探讨了事务与持久化上下文之间的关系，并解释了如何将扩展持久化上下文与有状态会话 Bean 结合使用，以支持实体在事务上下文之外也能解析与其他实体的关系。\n\
  \n然后，本章基于葡萄酒在线应用中的一个场景，考察了一些实际示例。这些示例说明了 CMT 和 BMT 划分的使用、有状态会话 Bean 上的扩展持久化上下文、回滚场景、客户端控制的事务、使用\
  \ BMT Bean 在事务上下文之外与实体交互，以及 CMT Bean 方法之间的事务上下文传播。\n\n最后，我们提供了运行所探讨的 CMT 和 BMT 示例应用程序的步骤。\n\
  \n在下一章中，我们将探讨一些可用于分析应用程序中 EJB 特定性能的技术。通过几个常见示例，我们将演示如何设置自己的测试来分析特定的应用程序组件。\n\n\n\
  \n"
- "# 9. EJB 性能与测试\n\n作为开发者，我们始终在寻找编写高性能代码的最高效方式。多年来，我们逐渐意识到，某些我们曾深信不疑的假设并不总是正确的，而某些编程模型和技术也未能达到预期的性能水平。令人惊讶的是，大多数时候，那些我们凭逻辑和直觉认为最优的模型与技术，反而辜负了我们的期望。\n\
  \n计算机系统的性能是一个极其复杂的问题。试想一下：我们编写的 Java 代码依赖于名为 Java 企业版（Java EE）的基础设施，而它又运行在 Java\
  \ 虚拟机（JVM）之上。本书将使用 Java EE 8 版本。虚拟机则托管于操作系统之上，而操作系统运行在计算机中，这些计算机通过由硬件和软件组件构成的网络与其他计算机交互。每一层——网络、计算机、操作系统、JVM\
  \ 以及 Java EE 服务器——都拥有大量可用于配置和优化行为的参数。在不同的使用条件下，每一层都会表现出不同的行为，这不可避免地会影响其他层的表现。在这种相当复杂的背景下，我们就不难理解为什么单凭逻辑推理往往行不通了。\n\
  \n关键在于，我们绝不能对性能表现一概而论。要了解系统能达到怎样的性能水平，唯一的方法就是在尽可能接近生产环境运行条件的场景下进行测试。\n\n每个软件应用都是独一无二的。要理解你自己应用的性能，你必须根据自己对性能的定义亲自进行测试。在某些情况下，良好的性能意味着能够支持大量用户；而在另一些情况下（例如用户负载较小时），则仅仅意味着能够尽可能快地运行。\n\
  \n在本章中，我们将介绍一种可用于以一致的方式测试系统性能的方法论。我们还将介绍可用于执行这些测试的工具。最后，我们将进行一次性能测试，以演示该方法论和工具的使用。这套方法论和工具包在两种基本场景下非常有用：\n\
  \n*   对完整应用进行性能测试\n*   为性能而设计（考察 Java EE API 各个方面的性能开销，以及某些设计决策将如何影响整体性能）\n\n在第一种场景中，我们将应用视为一个黑盒。我们在不同的用户负载下测试应用，并调查用户发出的每个请求的性能。分析收集到的数据——我们寻找那些未达到所需标准的请求，并识别出改进性能的机会。\n\
  \n虽然上述方法很有用，但我们建议尽可能在开发周期的早期进行性能测试。这样，你就可以利用该方法论及其获得的数据来帮助你进行性能设计，而不是事后才进行性能测试。\n\
  \n本章中的示例侧重于为性能而设计，而非测试一个完整的应用。如果你有兴趣了解更多关于应用测试方法论和一般性能测试的知识，可以参考 Peter Zadrozny\
  \ 所著的《J2EE Performance Testing with BEA WebLogic Server》（Apress, 2003）。在本章中，我们呈现了\
  \ Zadrozny 书中方法论的一个改编版本，该版本紧密聚焦于手头的示例。\n\n## 测试方法论\n\n该测试方法论的核心在于数据测量的一致性。以下列表提供了该方法论所涉及步骤的概要。我们将按照执行每次测试时的逻辑顺序来呈现和描述这些步骤：\n\
  \n1.  **定义性能标准。** 我们必须为所讨论的特定应用定义相关的性能指标，并为该指标设定一个现实的目标（例如，最大可接受的响应时间）。\n2.  **准确模拟应用使用情况。**\
  \ 其关键方面是测试脚本的定义。这些是包含一组请求的配置文件，这些请求代表了应用的典型使用模式。\n3.  **定义测试指标。** 这些包括测试的持续时间、样本大小、要排除的初始数据量等。\n\
  4.  **执行测试。**\n\n\n\n### 性能标准\n\n根据应用类型的不同，你的关注点会在两个基本性能指标之间有所侧重：**响应时间**和**吞吐量**。\n\
  \n在处理同步交互式应用时，我们会定义一个可接受的最大响应时间。这是我们愿意等待应用给出响应的最长时间。\n\n对于批处理或后端应用，我们会定义可接受的最小吞吐量，通常以每秒事务数（TPS）来衡量，但这必须基于对系统中事务具体定义方式的透彻理解。\n\
  \n这两个指标彼此之间有着千丝万缕的联系；然而，我们尚未找到它们之间任何数学或几何上的关系。\n\n我们的建议是，清晰且无歧义地定义你的性能指标，并针对明确的需求进行测试。不这样做，无异于为无休止的测试和调优敞开大门。\n\
  \n由于我们将在性能测试运行期间收集数据，因此需要清楚理解基本的统计概念，下面我们来详细探讨一下。\n\n就本书而言，我们将响应时间定义为：客户端从发送请求的那一刻起，到收到来自应用的响应的最后一个字节为止，所必须等待的时间长度。\n\
  \n我们从一次性能测试运行中收集的数据集，包含了构成测试脚本的每个请求的个体响应时间。测试脚本中的每个请求，由每个模拟用户在一段时间内依次执行。我们分析的基本度量是特定请求在所有用户中的响应时间的算术平均值：即平均响应时间（ART）。\n\
  \n聚合平均响应时间（AART）是我们在分析性能数据时广泛使用的一个度量，我们将其定义为：测试脚本中每个个体请求的 ART 之和，除以该测试脚本中的请求数量。\n\
  \n诚然，AART 在应用实际运行表现方面并无实际意义，但它确实能很好地指示整个系统的负载程度。因此，我们有时也将这个度量称为负载因子。一个典型的 AART 曲线，当以并发用户数为横轴绘制时，其形状如图\
  \ 9-1 所示。\n\n![A311833_3_En_9_Fig1_HTML.jpg](img/A311833_3_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\n\n一条典型的 AART 曲线\n\n吞吐量并不像响应时间那样是一个界限分明的度量。表达吞吐量的标准方式是 TPS，理解事务在被测应用中代表什么至关重要。它可能是一个单一的查询，也可能是一组特定的查询。在消息系统中，它可能是一条单一的消息；在基于\
  \ Servlet 的应用中，它可能是一个请求。即使对于具体测量什么达成了共识，所获得的吞吐量值也常常会被误解。原因在于，许多人看待这个度量就像看待“英里每小时”一样：将其视为速度的度量。实际上，吞吐量是容量的度量。\n\
  \n我们可以尝试用超市的类比来解释吞吐量的工作原理。想象一下，一家超市举办了一场促销活动，10 位购物者可以在 15 分钟内免费拿走他们能放进购物车的所有东西。超市就是应用，购物者类比于请求（或消息），而负责补货的超市员工则类比于系统中努力应对需求的各个组件。\n\
  \n即使所有 10 位购物者都达到了容量上限（在 15 分钟内完全装满他们的购物车），这也不一定意味着他们拿走了超市里所有的东西。然而，随着我们增加购物者的数量，最终会达到一个点，即有足够多的购物者能在规定时间内清空超市。我们称这个点为饱和点，因为此时已无更多可用资源。当我们继续增加购物者数量超过这个点时，通道内的拥挤会导致购物者移动速度下降（响应时间变长），最终导致吞吐量实际下降。\n\
  \n与 ART 类似，我们分析的基本度量是特定请求在所有用户中每秒请求数的算术平均值。我们称之为 TPS。\n\n为了分析性能数据，并且独立于特定性能测试所使用的吞吐量定义，我们引入了总事务速率（TTR）的概念。TTR\
  \ 是测试脚本中每个请求的 TPS 测量值之和。TTR 为我们提供了一个极好的系统容量指标。图 9-2 展示了一条典型的 TTR 曲线，它在约 100 个用户时达到饱和点。此时，曲线开始下降（例如，由于购物者过多）。\n\
  \n![A311833_3_En_9_Fig2_HTML.jpg](img/A311833_3_En_9_Fig2_HTML.jpg)\n\n图 9-2\n\n\
  一条典型的 TTR 曲线\n\n图 9-1 中展示的 AART 曲线，与图 9-2 中展示的 TTR 曲线来自同一次测试运行的数据。如果你审视 AART 曲线，可以看到响应时间呈线性增长，直到达到\
  \ 100 个用户。之后，增长变得更加剧烈。这与 TTR 曲线相吻合，后者在 100 个用户时达到饱和点。此后，应用的整体性能开始下降。分析这两条曲线，你可以得出结论：在该性能测试的条件下，该应用的用户上限为\
  \ 100 人。\n\n### 模拟应用使用情况\n\n本方法论这一节的目标是确保我们在尽可能模拟现实的测试条件下收集性能数据。这一点在进行整个应用的性能测试时尤为重要，而在为性能而设计时则相对次要。\n\
  \n对于每个应用，都会有一些不同的使用场景同时运行。有时，我们可以用一个测试脚本和一个请求来模拟使用情况。在其他情况下，可能需要十几个场景，每个场景包含不同数量的请求。\n\
  \n关于思考时间（也称为休眠时间）需要特别说明。这是测试脚本中每个个体请求执行之间所经过的时间。在现实生活中，思考时间可能变化很大。它可能短至几秒钟（例如，点击一个按钮进入下一页），也可能长达\
  \ 5 到 10 分钟（例如，查看过去一个月银行账户的交易记录）。对于性能测试，我们采用了两种基本策略：\n\n*   **使用真实思考时间**：此情况用于对完整、正在运行的应用进行性能测试时。\n\
  *   **使用零思考时间**：此情况用于进行更通用的调查性测量时，例如比较编程技术。这样做的后果是我们并非在现实条件下进行测试。然而，我们可以进行精确的比较测量，一旦从这些结果中选出了最佳方案，我们就可以使用真实的思考时间进行测试。\n\
  \n\n\n### 定义测试指标\n\n该方法基于每次测试运行使用固定数量的用户。性能测试由多次测试运行组成，通常每次后续测试运行都会增加用户负载。有些人倾向于在单次测试运行期间逐步增加用户数量。我们认为这会引入一个可能对结果产生负面影响的新变量，并且从寻找最大用户负载的角度来看，这在统计上是不正确的。\n\
  \n第一步是找到一个具有代表性的并发用户数量（下限），可以按规律递增，直到达到应用程序的饱和点（上限）。我们通常会在上限之上额外进行几次测试运行，只是为了更好地理解应用程序的行为（或异常行为）。\n\
  \n不幸的是，预先精确选择上限并没有确切的科学方法。我们通常会随机选择一个用户数量，然后进行几次测试运行，其中用户数量分别高于和低于这个初始随机选择，并分析结果以确定我们应该采取的方向——是增加还是减少用户数量。\n\
  \n第二步是定义样本量：即测试运行将执行的时长。为了选择合适的样本量，我们必须在两种不同的需求之间达成妥协。第一种是我们希望拥有足够的数据，使样本具有统计显著性。第二种是希望测试尽可能短，因为我们有许多测试运行要做，不想在上面花费太多时间。\n\
  \n为了确定样本量，我们使用用户上限进行一次测试运行，持续时间比平时更长。然后我们绘制 AART 随时间变化的曲线并进行分析。我们寻找曲线上相当稳定的一段。\n\
  \n另一点需要说明的是数据排除。当你首次开始测试时，响应时间通常高于正常水平。这是因为构成应用程序的所有子系统都需要一点时间来加速。例如，JVM 中的优化器需要几分钟来优化运行中的代码。数据库的缓存也是如此，它需要一点时间才能发挥作用（应用程序的其他组件也是如此）。\n\
  \n这些最初出现的异常高的响应时间，只会影响在生产环境中通常运行数周的应用程序的最初几个用户。然而，在我们的案例中，我们只测试几分钟，这些结果会对我们的样本结果产生负面偏差。因此，我们排除最初收集的几组数据，并在曲线稳定后开始采样。\n\
  \n因此，样本量将在实际测试运行开始后的某个时间点开始，并持续一段时间，这段时间为我们提供足够的数据，使其具有统计显著性。\n\n接下来是评估测试结果准确性的问题。根据所进行的性能测试类型，你可以使用两种不同的方法，以高确定性来衡量准确性。\n\
  \n对于涉及完整应用程序的性能测试，我们通常计算以下指标，我们称之为样本质量：\n\n质量 = 标准差 / 算术平均值\n\n我们通常将此公式应用于收集到的 AART\
  \ 数据。\n\n提示\n\n根据我们的经验，可接受的质量数值范围在 0.06 到 0.2 之间。当质量数值超过 0.25 时，我们会仔细分析所有可用数据，以找出样本质量如此低下的原因。有时，这可能导致我们丢弃该次测试运行产生的数据。\n\
  \n在进行专注于性能设计的测试时，更具体地说，当思考时间为零时，我们使用另一种称为校准的方法。这里我们使用用户上限进行三次测试运行。然后，我们比较每次测试运行的\
  \ AART 和 TTR 结果。比较以百分比形式进行，所有值中的最大差异被视为性能测试的误差范围。\n\n现在我们已经描述了所有的准备工作，可以继续描述实际的测试运行，这些运行将为我们提供执行分析和得出性能测试结论所需的数据。实际的测试运行是相当机械和枯燥的过程：你从使用用户下限开始一次测试运行，然后增加用户数量，进行另一次测试运行，依此类推，直到达到上限。如前所述，你可能希望额外进行几次超过上限的测试运行。\n\
  \n由于该方法的基础是一致性，你必须重置或重启构成应用程序的每个组件或子系统。在我们的案例中，这将是数据库和 Java EE 服务器。\n\n我们将在本章后面通过一个实施该方法的实际示例来说明如何使用它。\n\
  \n\n\n## Grinder 工具\n\nGrinder 是一款基于 Java 的负载测试框架，采用 BSD 风格的开源许可证，可免费使用。您可以在 [`http://grinder.sourceforge.net`](http://grinder.sourceforge.net)\
  \ 找到 Grinder 及其源代码、文档、辅助模块、测试脚本等更多内容。此外，还有一些邮件列表可供加入，以便参与 Grinder 社区。\n\n请记住，Java\
  \ EE 8 需要 Grinder 3 版本。\n\nGrinder 功能极其强大，同时又易于使用，是一个轻量级的工具包。它允许您通过测试脚本在多台机器上模拟用户和行为。它包含以下组件：\n\
  \n*   **工作进程**：解释用 Jython 编写的测试脚本，并使用多个工作线程执行测试，每个线程模拟一个用户。\n*   **代理进程**：管理工作进程。如果您在多台计算机上运行模拟用户，则每台计算机需要一个代理进程。\n\
  *   **控制台**：在协调其他进程的同时，整理并显示统计数据。\n\nGrinder 的进程如图 9-3 所示。\n\n![A311833_3_En_9_Fig3_HTML.jpg](img/A311833_3_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n\nGrinder 进程\n\n使用 Grinder 进行性能测试是一系列测试运行的集合，其中可以包含一个或多个测试脚本。一次测试运行是指测试脚本的连续顺序执行。测试运行可以持续特定的循环次数或特定的时间段。一个循环是指测试脚本的单次执行。\n\
  \n注意\n\n我们在 Grinder 文档中称之为“循环”的概念被定义为一次“运行”，我们认为这容易造成混淆。\n\n测试脚本用于模拟应用程序的使用情况。测试脚本代表了您想要模拟的使用场景。一个测试脚本包含一个或多个请求，这些请求模拟了特定场景的用户与应用程序之间的典型交互。\n\
  \n注意\n\n再次强调，为避免混淆，我们使用“请求”一词代替 Grinder 文档中定义的“测试”。\n\nGrinder 测试脚本是一个 Jython 程序，它可以包含某些逻辑来修改默认行为（即请求的顺序执行），例如，根据已执行请求的响应来执行某些请求。\n\
  \n测试脚本可以手动编写，或者，如果模拟用户通过 HTML 界面与应用程序交互，则可以录制。TCP 代理模块可用于实现此目的。该模块是 Grinder 发行版的一部分。代理的\
  \ HTML 插件过滤器允许您录制通过 Web 浏览器与应用程序的交互。有关如何使用此功能的详细信息，请参阅文档。\n\n除了执行 URL 之外，Grinder\
  \ 还可以在测试脚本的请求中执行 Java 代码。这为您模拟重型客户端（例如基于 Swing 的客户端）提供了灵活性。\n\n每个代理进程都与控制台建立连接以接收命令（例如启动、停止和重置），并将这些命令传递给其工作进程。每个工作进程都与控制台建立连接以报告统计数据。\n\
  \n除了控制台上显示的统计数据外，对于每次测试运行，每个工作进程都会将日志信息和最终统计摘要写入一个文件名以 `out` 开头的文件中。错误信息写入一个文件名以\
  \ `error` 开头的文件中。如果测试运行期间未发生错误，则不会创建错误文件。每个已执行请求的详细统计信息写入一个文件名以 `data` 开头的文件中。这些文件遵循命名约定，除了我们描述的关键词外，文件名还包含托管工作进程的计算机名称和工作进程编号，因为您可能拥有多个工作进程。\n\
  \n修改 `grinder.properties` 配置文件中的值可以轻松改变 Grinder 的行为。您最常修改的属性很可能如下：\n\n*   `grinder.threads`：此属性指定将执行指定测试脚本的模拟用户数量。\n\
  *   `grinder.runs`：此属性指定模拟用户顺序执行测试脚本的次数（循环次数）。如果值为零，则将无限执行。\n*   `grinder.consoleHost`：运行\
  \ Grinder 控制台的计算机名称或 IP 地址。\n*   `grinder.logProcessStreams`：将此属性设置为 `true` 将提供关于每个模拟用户执行的极其详细的信息。这些信息会出现在\
  \ `out` 文件中。这在初步运行期间很有用，但我们强烈建议您在所有其他运行中将其设置为 `false`，因为它会降低测试运行的性能。\n*   `grinder.logDirectory`：此属性指定您希望放置上述三个日志文件的目录。\n\
  *   `grinder.script`：这是要执行的测试脚本的文件名。\n\n还有更多可用属性。请查阅 Grinder 文档以获取完整的属性列表。\n\n\n\
  \n## 测试应用程序\n\n我们用于性能测试的测试应用程序是第 7 章中开发的集成版 Wines Online 后端应用程序的一个子集。其用户界面是使用 JavaServer\
  \ Faces (JSF) 开发的。\n\n最新的 JSF 规范可在此网页中找到：\n\n[`https://javaee.github.io/javaserverfaces-spec/`](https://javaee.github.io/javaserverfaces-spec/)\n\
  \nJavaServer Faces (JSF) 是一种 Java 社区过程 (JCP) 标准技术，用于在 Java EE 平台上编写基于组件的用户界面。\n\n\
  请注意，在撰写本文时，可用的 JSF 版本是 2.3，该版本于 2017 年 4 月成为 Java EE 8 的一部分。\n\nJSF 2.3 的可执行实现可在\
  \ javax.faces 仓库中找到：\n\n[`https://maven.java.net/content/repositories/releases/org/glassfish/javax.faces/2.3.0/`](https://maven.java.net/content/repositories/releases/org/glassfish/javax.faces/2.3.0/)\n\
  \n请参考 NetBeans 网页上的 NetBeans JavaServer Faces 2.x 入门指南：\n\n[`https://netbeans.org/kb/docs/web/jsf20-intro.html`](https://netbeans.org/kb/docs/web/jsf20-intro.html)\n\
  \n图 9-4 展示了 JSF 页面，该页面在列表框中显示了所有可用葡萄酒的目录。用户可以选择他们想要的葡萄酒商品，在输入文本框中输入数量，然后点击“添加到购物车”按钮。用户可以重复相同的过程来添加更多葡萄酒，最后他们可以点击“提交订单”按钮。\n\
  \n![A311833_3_En_9_Fig4_HTML.jpg](img/A311833_3_En_9_Fig4_HTML.jpg)\n\n图 9-4\n\n\
  葡萄酒商店 JSF 应用程序\n\n图 9-5 展示了 JSF 应用程序与后端葡萄酒商店应用程序之间的交互。当从浏览器启动 JSF 应用程序时，会调用 `getWineDisplayList()`\
  \ 方法（该方法在托管 Bean 中使用了一个注入的 EJB）。这会通过注入的 `WineFacade` EJB 上的 `findAll()` 方法检索所有可用葡萄酒的列表。初始\
  \ JSF 页面会显示检索到的葡萄酒列表。当用户添加一个葡萄酒商品并点击“添加到购物车”按钮时，会调用 `ShoppingCart` 会话 Bean 中的 `addWineToCart()`\
  \ 方法，创建一个新客户并将该葡萄酒添加到客户的购物车商品中。仅在首次调用 `addWineToCart()` 方法时才会创建客户。当用户最终从客户端应用程序提交订单时，会调用\
  \ `ShoppingCart` 会话 Bean 中的 `processOrder()` 方法，该方法会创建一个新的客户订单，将所有购物车商品作为订单商品添加到订单中，删除购物车中的商品，并最终扣减库存。\n\
  \n![A311833_3_En_9_Fig5_HTML.jpg](img/A311833_3_En_9_Fig5_HTML.jpg)\n\n图 9-5\n\n\
  葡萄酒商店应用程序组件与服务交互\n\n图 9-6 展示了 Java 持久化 API (JPA) 实体、Java 类之间的继承模型以及它们之间的关系。`BusinessContact`\
  \ 实体被 `Customer` 和 `Supplier` 实体继承。`Customer` 实体被 `Individual` 和 `Distributor` 实体继承。`InventoryItem`、`CartItem`\
  \ 和 `OrderItem` 实体继承自 `WineItem` 实体。葡萄酒商店持久化单元还包含了这些实体之间不同类型的关系（包括一对一、一对多和多对多），这些关系在测试应用程序中得到了运用。名称以\
  \ `List` 结尾的关系字段是 0..* 属性；所有其他字段都是单值属性。这些实体中使用的关系映射已在第 3 章和第 4 章中介绍过。\n\n![A311833_3_En_9_Fig6_HTML.jpg](img/A311833_3_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6\n\n葡萄酒商店领域模型\n\n对于我们将要运行的性能测试，之前讨论的所有组件（JSF 应用程序、`ShoppingCart` 和 `WineFacade`\
  \ 会话 Bean 以及持久化单元中的 Java 类）都保持不变。两次测试之间的唯一区别在于领域模型 JPA 实体中指定的对象/关系 (O/R) 映射注解，以及这些\
  \ Java 类所映射到的数据库模式。第一次测试使用了 `JOINED` 实体继承策略，其中两个根实体（`BusinessContact` 和 `WineItem`）映射到层次结构中的根表，而所有子实体的表都连接到该根表。图\
  \ 9-7 展示了使用 `JOINED` 继承策略映射持久化 Java 类所使用的数据库模式。\n\n![A311833_3_En_9_Fig7_HTML.jpg](img/A311833_3_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7\n\nJOINED 实体继承策略的数据库模式\n\n在第二次测试中，我们使用了 `SINGLE_TABLE` 实体继承策略，其中每个类层次结构中的实体都映射到单个表。图\
  \ 9-8 展示了用于映射第二个测试用例的数据库模式。\n\n![A311833_3_En_9_Fig8_HTML.jpg](img/A311833_3_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8\n\nSINGLE_TABLE 实体继承策略的数据库模式\n\n注意\n\n继承策略在第 4 章中有详细解释。\n\n## 性能测试\n\n遵循前面描述的方法，并使用刚刚描述的测试程序，我们将着手比较继承模型的任务，以找出在以下条件下哪种模型最佳。\n\
  \n### 测试环境\n\n我们在云中设置了一台测试机器，该机器拥有八个核心和 8GB 内存。它运行着一个 GlassFish 服务器实例（本书中使用的是 4.1.1\
  \ 版本）。测试应用程序使用了同样运行在此服务器上的 Derby 数据库。我们从笔记本电脑上运行 The Grinder，该笔记本电脑并不在运行测试机器的数据中心内，因此所有流量都通过互联网传输。通常我们不会这样做，因为我们更倾向于在所谓的无菌条件下工作；也就是说，测试网络上的唯一流量就是测试本身产生的流量。然而，在进行了许多初步测试后，我们发现测试的误差范围非常低（1%），因此我们决定继续以这种方式工作。\n\
  \n测试计算机除了运行操作系统的默认进程外，仅运行测试所需的相应软件。我们对所有涉及的软件都使用默认设置。我们意识到，通过微调这些组件可以获得更好的性能，但这超出了本书的范围。\n\
  \n\n\n### 测试脚本\n\n如本章前面所述，我们的思路是创建一个尽可能贴近真实应用使用场景的测试脚本。由于这是一个面向性能设计的测试，我们使用的测试脚本大致模拟了应用的典型使用场景：\n\
  \n1.  用户访问葡萄酒应用网站（首页）。\n2.  用户选择某类葡萄酒中的几瓶。\n3.  用户选择另一类葡萄酒中的几瓶。\n4.  用户结账。\n\n在本示例中，由于我们要比较几种不同的继承模型，以确定哪种模型最适合我们的场景（面向性能设计），因此我们使用了零思考时间。\n\
  \n诚然，使用 Derby 运行这组性能测试并不十分真实，但我们的目的是提供一个关于如何使用该方法的示例。我们希望读者能够将这一流程应用到自己的应用环境中，对自己的应用进行测试。\n\
  \nTCP 代理模块的输出可以重定向到一个文件中。该输出是一个 Jython 程序，其中包含了录制测试的高级流程，并且易于人类阅读。我们正是在这里修改或删除 `grinder.sleeptime`\
  \ 指令以消除思考时间，或者更改运行应用的目标机器的名称或 IP 地址。我们将在下一节详细审查实际的 `wine.py` 测试脚本。\n\n### 环境设置\n\
  \nGlassFish 的安装已在第 1 章的“入门”部分介绍过，因此这里不再赘述。你只需确保 GlassFish 服务器已启动并运行，并且应用已使用必要的资源（JDBC\
  \ 连接池和资源）完成部署。启动 GlassFish 服务器的一种方法是在命令提示符中切换到 `%GLASSFISH_HOME%/bin` 目录，然后执行以下命令：\n\
  \n```\nasadmin start-domain\n```\n\n要停止 GlassFish 服务器，请执行以下命令：\n\n```\nasadmin stop-domain\n\
  ```\n\n在整个性能测试过程中，我们使用以下命令重启 GlassFish 服务器：\n\n```\nasadmin restart-domain\n```\n\
  \n#### 数据库\n\n这两个测试各自需要独立的数据库连接，以确保数据库模式不会冲突。每个继承模式映射的表使用相似的名称，但具有不同的结构。为尽量简化安装要求，我们在测试中使用了\
  \ GlassFish 自带的 Derby 数据库。项目已预先配置为使用 Derby，要开箱即用，你需要创建 Derby 数据库。关于如何在 Derby 中创建新数据库（及关联连接）的步骤，请参考第\
  \ 3 章的“创建数据库连接和示例模式”部分。对于这些测试，你需要创建一个用户为 `wineapp_join/wineapp_join` 的 `WineAppJoin`\
  \ 数据库，以及一个用户为 `wineapp_st/wineapp_st` 的 `WineAppST` 数据库。\n\n##### 配置连接到自有数据库\n\n\
  你可能希望在运行测试时使用 Oracle 或其他生产数据库。为此，你需要更新每个测试的 JPA 项目（`Chapter09-PerformanceJoined-jpa`\
  \ 和 `Chapter09-PerformanceSingleTable-jpa`）中的 `persistence.xml` 文件，修改连接信息以指向你的数据库。首先，像上面为\
  \ Derby 所做的那样，为每个测试创建一个独立的数据库连接。对于 Oracle，我们建议你首先在数据库中创建新的数据库用户 `wineapp_join/wineapp_join`\
  \ 和 `wineapp_st/wineapp_st`。然后，转到 NetBeans 中的“服务”选项卡，右键单击“数据库”，选择“新建连接...”，为每个用户创建一个新的数据库连接。\n\
  \n创建好测试数据库连接后，你可以通过每个 JPA 项目的设计编辑器选项卡，在 JDBC 连接组合框中选择相应的“Joined”或“SingleTable”连接，来编辑\
  \ `persistence.xml` 文件。\n\n类似地，你需要更新每个测试的 EJB 项目（`Chapter09-PerformanceJoined-ejb`\
  \ 和 `Chapter09-PerformanceSingleTable-ejb`）中 `glassfish-resources.xml` 文件里的 `<jdbc-connection-pool>`\
  \ 条目的 `<property>` 元素，以更新连接信息。（NetBeans 7.2.1 未提供通过下拉列表进行此操作的编辑器，但你可以轻松地剪切/粘贴指定连接详细信息的\
  \ `<property>` 元素。）请确保将 `<jdbc-resource> jndi-name` 属性保留为 `jdbc/wineAppJoin`，对于\
  \ `SINGLE_TABLE` 测试则保留为 `jdbc/wineAppST`，因为 EJB 项目中的持久化单元会通过名称引用此资源。\n\n#### The\
  \ Grinder\n\n下一步是在专用于创建模拟用户负载的计算机上安装 The Grinder。从 [`http://grinder.sourceforge.net`](http://grinder.sourceforge.net)\
  \ 下载 The Grinder 后，你只需将其解压到所需目录即可。\n\n本次测试安装了 The Grinder 3.11 版本，位于我们笔记本电脑的 `C:\\\
  grinder-3.11` 目录中。完成后，你可以从下载包中提取与 Grinder 相关的文件。这些文件位于 `grinder` 目录中。我们将这些文件安装在\
  \ `C:\\SampleCode` 目录中。我们的示例需要三个文件：`grinder.properties`、`joined.py` 和 `single.py`。后两个文件是实际的测试脚本。\n\
  \n有关如何配置此文件的更多信息，请参考 Grinder.properties 网页：\n\n[`http://grinder.sourceforge.net/g3/properties.html`](http://grinder.sourceforge.net/g3/properties.html)\n\
  \n让我们先来审查第一个脚本 `grinder.properties`，如清单 9-1 所示。\n\n```\n# Beginning EJB in Java\
  \ EE 8\n# Chapter 9: EJB Performance and Testing\n# 工作进程数\ngrinder.processes=1\n\
  # 模拟用户数\ngrinder.threads=140\n# 永远运行\ngrinder.runs=0\n# 运行控制台的机器名称\ngrinder.consoleHost=localhost\n\
  # 我们不需要完整的详细日志文件\ngrinder.logProcessStreams=false\n# 将日志文件放置在此目录中\ngrinder.logDirectory=log\n\
  # 所有模拟用户同时启动\ngrinder.initialSleepTime=0\n# 属性文件。默认值为 \"helloworld.py\"。\n# 执行名为\
  \ joined.py 的测试脚本\ngrinder.script=joined.py\n清单 9-1\ngrinder.properties\n```\n\n\
  此属性文件中的注释非常清晰。你只需更改模拟用户数（`grinder.threads`）和测试脚本将运行的周期数（`grinder.runs`）。请确保 Grinder\
  \ 控制台将要运行的机器名称或 IP 地址正确无误。除此之外，你实际上无需更改此属性文件中的任何其他内容。\n\n\n\n#### 测试脚本\n\n在清单 9-2\
  \ 中，我们展示了当使用连接表继承方案录制会话时，HTTP 代理生成的 Jython 程序的核心部分。以粗体显示的思考时间语句，通常表示录制测试脚本时从一个请求到下一个请求所花费的时间（以毫秒为单位）。如前所述，我们将原始值替换为零，但您也可以直接删除该行（参见清单\
  \ 9-2）。\n\n```\ndef __call__(self):\n\"\"\"Called for every run performed by the\
  \ worker thread.\"\"\"\nself.page1()      # GET WineStoreJoined.jsp (request 101)\n\
  grinder.sleep(0)\nself.page2()      # POST WineStoreJoined.jsp (request 201)\ngrinder.sleep(0)\n\
  self.page3()      # POST WineStoreJoined.jsp (request 301)\ngrinder.sleep(0)\nself.page4()\
  \      # POST WineStoreJoined.jsp (request 401)\nListing 9-2\nMain Section of the\
  \ Test Script\n```\n\n作为页面方法的一个示例，我们在清单 9-3 中展示了页面 1（测试脚本的第一个请求）的方法，以及第一个页面方法之前的一些定义。\n\
  \n```\nurl0 = 'http://glassfish:8080'\nrequest101 = createRequest(Test(101, 'GET\
  \ WineStoreJoined.jsp'), url0)\nclass TestRunner:\n\"\"\"A TestRunner instance is\
  \ created for each worker thread.\"\"\"\n# A method for each recorded page.\ndef\
  \ page1(self):\n\"\"\"GET WineStoreJoined.jsp (request 101).\"\"\"\nresult = request101.GET('/Chapter09-PerformanceJoined-war/faces/WineStoreJoined.jsp')\n\
  self.token_j_id_id17 = \\\nhttpUtilities.valueFromHiddenInput('j_id_id17') # 'j_id_id17'\n\
  self.token_javaxfacesViewState = \\\nhttpUtilities.valueFromHiddenInput('javax.faces.ViewState')\
  \ # '9131085258160566843:4053788772783974794'\nreturn result\nListing 9-3\nExample\
  \ of the page method\n```\n\n#### 运行模拟用户\n\n您需要根据 Grinder 软件的安装位置修改以下命令的类路径。不过，要执行\
  \ Grinder，您只需要以下简单的命令。但请确保在启动 Grinder 控制台之前不要运行它。\n\n```\njava -classpath \\grinder\\\
  lib\\grinder.jar net.grinder.Grinder\n```\n\n#### Grinder 控制台\n\n作为启动控制台的另一种方式，我们只需将目录更改为\
  \ `C:\\grinder\\lib`，然后发出以下命令来启动控制台：\n\n```\njava –classpath grinder.jar net.grinder.Console\n\
  ```\n\n图 9-9 展示了 Grinder 控制台。\n\n![A311833_3_En_9_Fig9_HTML.jpg](img/A311833_3_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9\n\nGrinder 控制台\n\n控制台左上角有几个按钮，用于指示 Grinder 代理启动或重置工作线程（即模拟用户）。当您将鼠标悬停在它们上方时，会显示按钮功能的描述。图\
  \ 9-10 展示了性能测试执行期间的 Grinder 控制台及其通常显示的信息。\n\n![A311833_3_En_9_Fig10_HTML.jpg](img/A311833_3_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10\n\n使用 Grinder 进行性能测试\n\n为了确保一切正常，请先使用一个模拟用户运行一个周期进行快速测试（在配置数据库之后；请参见上文“数据库”部分）。步骤如下：\n\
  \n1.  使用以下 URL 重置数据库：`http://yourserver:port/Chapter09-PerformanceJoined-war/ResetJoinedData`\
  \  \n2.  重置 Glassfish 服务器。  \n3.  启动 Grinder 控制台：`java -classpath` <classpath_to_the_grinder></classpath_to_the_grinder>`net.grinder.Console`\
  \  \n4.  编辑 `grinder.properties` 文件，并确认您只有一个用户和一个周期。  \n5.  通过输入以下命令启动 Grinder 代理和\
  \ Grinder 控制台：`java -classpath` <classpath_to_the_grinder></classpath_to_the_grinder>`net.grinder.Grinder.`\
  \  \n6.  点击 Grinder 控制台上的启动按钮。控制台上不会显示任何结果，因为它只运行一个周期。  \n7.  检查您启动 Grinder 代理的窗口。当它显示已完成并等待控制台信号时，点击\
  \ Grinder 控制台上的重置按钮。  \n8.  转到日志目录，查看以 `out` 开头的文件。该文件包含整个测试运行的摘要，包括统计数据。如果出现问题，该文件和错误文件将为您提供解决问题所需的信息。\n\
  \n在您为每个测试运行一次这些步骤后，您可能希望更新每个测试应用的 JPA 项目中的 `persistence.xml` 文件，以关闭表生成。我们保留此标志，以便在您首次运行\
  \ `ResetJoinedData/ResetSingleTableData` servlet 时创建表。在您为持久化单元运行一次每个脚本以创建表之后，您可以避免因后续每次运行时表已存在而产生的开销（以及发出的警告）。\n\
  \n现在一切就绪，您可以继续下一步了。\n\n\n\n### 初步测试\n\n这第一组测试的目标是熟悉应用程序及其行为，并发现测试脚本或应用程序可能存在的任何潜在问题。由于我们正在测试两种不同的继承实现，使用哪一种进行初步测试其实无关紧要，因此我们选择使用多表继承的实现来进行初始测试。我们已经用单个用户完成了一个周期的测试运行。现在，我们可以进行无限周期的测试运行，并让它运行几分钟。然后，我们将继续测试多个并发用户在一个周期内的表现。这样做是为了确保应用程序和测试脚本能够正确处理并发。我们通常会选择\
  \ 10 个用户。之后，我们将测试 10 个用户进行无限周期的运行，持续几分钟。一旦这些测试成功完成，我们就知道测试脚本和应用程序运行正常，可以准备进行下一步了。\n\
  \n我们希望选择具有代表性的用户数量，进行大约六次快速测试运行，以便清晰地展示应用程序在用户负载增加时的行为表现。\n\n在进行完整应用程序的性能测试时，我们通常会寻找达到或超过最大可接受响应时间时的用户上限。由于这是一项面向性能的设计测试，并且我们在测试脚本中没有使用任何思考时间，因此我们将专注于找到应用程序达到饱和点的用户数量。这个策略（如果可以称之为策略的话）就是随机选择一个用户数量。\n\
  \n测试运行时间很短，因为我们不需要精确的上限值，只需要一个近似值。在这种情况下，我们选择从 100 个并发用户开始，并收集 2.5 分钟的测试运行数据。由于我们使用的采样间隔是\
  \ 5 秒，我们只需在 Grinder 控制台的“Collect samples forever”框中输入 30。输入 30 后，该框的标题将变为“Stop after\
  \ 30 samples”。为了简单起见，我们不会排除初始数据。我们通过在 Grinder 控制台的“Ignore samples”框中输入 0 来实现这一点。收集到的统计数据所呈现的值会略高于正常值。这不是问题，因为这些只是初步测试。按照最佳实践，我们在每次性能测试前都会重置数据库和\
  \ Glassfish 服务器。\n\n我们开始第一次测试运行，得到的 AART（平均响应时间）为 737 毫秒。\n\n注意\n\n您可以在控制台左栏底部（以图形方式显示\
  \ TPS 的方块的左侧）找到此信息，其标题为“(mean)”。\n\nTTR（每秒事务数）为 137（您可以在找到 AART 的同一位置找到此信息，其标题为“TPS\
  \ (mean)”）。接下来，我们将尝试使用 120 个用户。为此，我们修改`grinder.properties`文件，将`grinder.threads`属性更改为\
  \ 120。我们进行下一次运行，得到的 AART 为 911 毫秒，TTR 为 133。由于 120 个用户的 TTR 低于 100 个用户，我们知道饱和点大约在\
  \ 100 个用户或更少，因此我们的下一次测试运行将使用 80 个用户。\n\n在`grinder.properties`文件中更改用户数量后，我们启动测试运行。我们得到的\
  \ AART 为 593 毫秒，TTR 为 136。这些结果表明饱和点大约在 100 个用户左右，因此我们将以此作为上限。（真是幸运的猜测，选择了 100 个用户作为初始测试点！）\n\
  \n基于此信息，我们选择 40 个用户作为下限，100 个用户作为上限。测试运行将分别使用 40、60、80、100、120 和 140 个用户进行。这将为我们提供六个参考点，应该能清晰地展示应用程序的行为。\n\
  \n### 样本量\n\n现在我们已经选择了并发用户的上限和下限，我们需要确定测试应该运行多长时间。这相当简单。我们只需要进行一次比之前选择的 2.5 分钟更长时间的测试运行。我们对此类测试的经验表明，大约\
  \ 7 分钟通常是一个不错的选择。测试运行将使用上限，即 100 个用户进行。\n\n测试运行结束后，我们获取由 The Grinder 生成的数据文件，该文件包含每个模拟用户在每次测试中的个体响应时间。该文件可以在日志目录中找到，文件名以`data`开头。接下来，我们绘制一条曲线，展示测试时间段内的\
  \ AART。本次测试运行的结果如图 9-11 所示。在这里，我们可以看到响应时间曲线在测试开始后约 60 秒趋于稳定。\n\n![A311833_3_En_9_Fig11_HTML.jpg](img/A311833_3_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11\n\n样本量分析图，绘制了测试时间段内的 AART\n\n我们还可以看到，曲线在 60 秒后保持相当稳定，在 240 秒后则极其稳定。因此，我们决定测试运行将持续\
  \ 240 秒（4 分钟——既好又短），其中我们将忽略前 60 秒的数据。由于我们在 Grinder 控制台中将样本大小定义为 5 秒，这意味着我们将忽略 12\
  \ 个样本，并收集 36 个样本。\n\n### 校准\n\n现在我们继续确定性能测试的准确性。由于这将基于使用上限的三次测试运行来完成，我们只需要额外进行两次运行。我们可以使用前一次运行的适当数据来确定样本量。\n\
  \n提示\n\n根据我们的经验，使用此方法的典型误差范围在 5%到 10%之间。当测试脚本中存在思考时间时，误差往往会增大。在这些情况下，发现高达 30%的数字并不罕见。\n\
  \n表 9-1 和表 9-2 显示了从测试运行中收集到的 AART 和 TTR 结果的差异。\n\n表 9-2\n\n误差范围 (TTR)\n\n| TTR |\
  \ 运行 1 | 运行 2 | 运行 3 |\n| --- | --- | --- | --- |\n| 运行 1 |   | 99.3% | 100.0% |\n\
  | 运行 2 | 100.7% |   | 100.0% |\n| 运行 3 | 100.7% | 100.0% |   |\n\n表 9-1\n\n误差范围\
  \ (AART)\n\n| AART | 运行 1 | 运行 2 | 运行 3 |\n| --- | --- | --- | --- |\n| 运行 1 |  \
  \ | 100.1% | 100.0% |\n| 运行 2 | 99.9% |   | 100.0% |\n| 运行 3 | 99.9% | 100.0% |\
  \   |\n\n这些表格中最大的差异是 100.7%（例如，TTR 表中运行 2 与运行 1 的比较）和 99.9%（例如，AART 表中运行 3 与运行 1\
  \ 的比较）。因此，本次性能测试的官方误差范围为 0.7%，这是一个非常好的数字。\n\n\n\n### 实际测试运行\n\n现在我们已经完成了所有准备工作，可以开始运行正式测试了。这些测试将帮助我们了解在极端压力条件下，哪种继承模型表现最佳。\n\
  \n这部分性能测试是机械性的，而且相当枯燥。第一步是启动 Grinder 控制台，并确保测试参数设置正确。首先，我们验证采样间隔是否设置为 5000 毫秒。接着，我们检查是否忽略了\
  \ 12 个样本（每个样本 5 秒，总计我们之前选择的 60 秒）。然后，我们选择在收集 36 个样本（每个样本 5 秒，总计我们之前选择的 180 秒）后停止收集数据。\n\
  \n每次测试运行的步骤如下：\n\n1.  根据继承模型，使用相应的 URL 重置数据库：\n\n    ```\n    http://yourserver:port/Chapter09-PerformanceJoined-war/ResetJoinedData\n\
  \    http://yourserver:port/Chapter09-PerformanceSingleTable-war/ResetSingleTableData\n\
  \    ```\n\n2.  重启 GlassFish 服务器。  \n3.  编辑 `grinder.properties` 文件，修改用户数量。  \n\
  4.  点击 Grinder 控制台上的“开始捕获统计信息”按钮。这将清除之前运行的所有结果。  \n5.  点击 Grinder 控制台上的“启动进程”按钮。\
  \  \n6.  等待数据收集完成。一个很好的标志是，左侧面板中央的线条从绿色的“正在收集样本：XX”变为红色的“正在忽略样本：XX”。  \n7.  点击 Grinder\
  \ 控制台上的“重置进程”按钮。此步骤实际上会停止模拟用户的执行。  \n8.  点击“保存结果”按钮。提供一个描述性文件名，并保存控制台上显示的结果，以供后续分析。\
  \  \n9.  从本列表的开头重新开始。\n\n完成 `JOINED` 表继承策略的所有测试运行后，您可以继续为 `SINGLE_TABLE` 继承方案的一组测试运行进行所有准备工作。\n\
  \n如前几节所述，我们两次测试之间的区别在于 O/R 映射注解和数据库模式。一旦应用程序准备好进行下一组测试运行，只需重复您为上一组测试运行所做的步骤即可。\n\
  \n### 分析结果\n\n我们必须首先声明，本章呈现的结果并非旨在推崇某一种继承方法优于另一种。它们仅用于说明如何应用该方法以及如何使用 Grinder 工具包。正因如此，我们在进行此性能测试时，对哪种继承模型表现更好没有任何预期。\n\
  \n我们首先回顾多表继承模型在 100 个用户下的测试运行结果，以此开始分析。这些结果如表 9-3 所示。\n\n表 9-3\n\n多表，100 用户结果\n\n\
  | 100 用户 | ART | TPS |\n| --- | --- | --- |\n| 请求 1 | 1,240 | 34.1 |\n| 请求 2 | 594\
  \ | 34.1 |\n| 请求 3 | 549 | 34.1 |\n| 请求 4 | 543 | 34.1 |\n| 总计 | 732 | 136 |\n\n\
  有两件事应该会迅速引起您的注意。第一是获取应用程序主页所需的时间很长——略超过 1 秒——尤其是与测试脚本中所有其他响应时间相比。这可以解释为，在设置主页时，虽然简单，但涉及将数据从服务器发送到浏览器，这通常被认为比更新购物车更耗费资源。接下来应该引起您注意的是，结账过程持续不到\
  \ 1 秒。虽然对于验证库存并执行与结账相关的其他操作的过程来说，这是一个理想的时间，但事实是，这个测试系统上的库存并不多。\n\n查看单表继承模型在 100\
  \ 个用户下的测试运行结果（如表 9-4 所示），您可以看到类似的行为模式，因此至少它是一致的。\n\n表 9-4\n\n单表，100 用户结果\n\n| 100\
  \ 用户 | ART | TPS |\n| --- | --- | --- |\n| 请求 1 | 1,320 | 33.4 |\n| 请求 2 | 580 |\
  \ 33.4 |\n| 请求 3 | 540 | 33.5 |\n| 请求 4 | 543 | 33.6 |\n| 总计 | 745 | 134 |\n\n这部分分析仅限于审查每个单独的请求，并且通常使用从用户上限的测试运行中收集的结果来完成。下一步是分析我们选择的所有用户负载下的\
  \ AART 和 TTR。我们从使用多表继承模型的结果开始，如表 9-5 所示。\n\n表 9-5\n\n多表，所有用户结果\n\n| 用户 | AART |\
  \ TTR |\n| --- | --- | --- |\n| 40 | 291 | 137 |\n| 60 | 438 | 137 |\n| 80 | 584\
  \ | 137 |\n| 100 | 732 | 136 |\n| 120 | 919 | 130 |\n| 140 | 1,120 | 125 |\n\n从该表可以看出，饱和点从性能测试一开始就达到了，这相当不寻常。这意味着继承模型从一开始就吞噬了所有可用资源。\n\
  \n让我们回顾一下单表继承模型的结果，以便进行一些比较。它们如表 9-6 所示。\n\n表 9-6\n\n单表，所有用户结果\n\n| 用户 | AART |\
  \ TTR |\n| --- | --- | --- |\n| 40 | 296 | 135 |\n| 60 | 446 | 135 |\n| 80 | 592\
  \ | 134 |\n| 100 | 745 | 134 |\n| 120 | 908 | 132 |\n| 140 | 1,120 | 125 |\n\n我们再次看到从一开始就出现相同的饱和模式。这可能归因于\
  \ Derby 数据库和内存使用情况。还可以看到，总事务速率和聚合平均响应时间都略低于多表继承模型。\n\n这种比较可以更清楚地从图 9-12 和图 9-13\
  \ 所示的图表中看出。图 9-12 包含两组 AART 结果的比较；图 9-13 包含 TTR 的比较。\n\n![A311833_3_En_9_Fig13_HTML.jpg](img/A311833_3_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13\n\nTTR 比较\n\n![A311833_3_En_9_Fig12_HTML.jpg](img/A311833_3_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12\n\nAART 比较\n\n在图 9-12 中，聚合平均响应时间 (AART) 几乎相同，因此我们必须仔细查看总事务速率 (TTR)，以尝试了解在我们正在进行的性能测试条件下，哪种模型更有利。\n\
  \n在图 9-13 中，单表模型不仅比多表模型更快达到饱和点，而且总事务速率也略低于多表模型。如您所见，单表模型在 60 个并发用户时开始下降，而多表模型则在\
  \ 80 个并发用户时开始下降。然而，多表模型出现了更早的大幅下降。根据收集到的数据，我们可以得出结论：`JOINED`（即多表）继承模型在高度压力条件下表现出略优的性能。\n\
  \n\n\n## 总结\n\n在本章中，我们介绍了 The Grinder，这是一种执行性能测试的方法论，以及一套用于生成性能测试负载的工具包。我们通过一个使用该方法和工具包的性能测试示例进行了讲解。具体来说，我们讨论了性能标准，并回顾了两个性能指标：响应时间和吞吐量。我们涵盖了应用程序使用情况的模拟，并讨论了测试脚本和思考时间。我们还涉及了测试指标的界定，例如用户数量、样本大小和数据排除，以及如何确定性能测试的准确性。\n\
  \n为了说明该方法的使用，我们使用前几章创建的应用程序展示了一个详细的案例研究，并比较了两种继承策略。\n\n在下一章中，我们将探讨上下文与依赖注入（CDI），以及如何使用它来增强\
  \ EJB 和应用程序开发体验。\n\n"
- "# 10. 上下文与依赖注入\n\n在本章中，我们将讨论上下文与依赖注入（CDI）。CDI 提供了强大的服务，用于将 Java EE 框架的各个层级粘合在一起。Java\
  \ 平台上下文与依赖注入（定义于 JSR 299）的第一个公开草案于 2008 年发布。在最初的开发阶段，JSR 299 规范被称为 Web Beans。在规范更名为上下文与依赖注入后，最初的参考实现被命名为\
  \ Web Beans。在两种不同上下文中使用相同的名称“Web Beans”在社区成员中造成了一些混淆，这导致参考实现从 Web Beans 更名为 Weld。请注意，CDI\
  \ 的参考实现 Weld 3.0 将集成到即将发布的 GlassFish 5 中。\n\nCDI 建立在拦截器规范（JSR 318）、托管 Bean 规范（JSR\
  \ 316）和 Java 依赖注入规范（JSR 330）之上。\n\n您可能会想，为什么我们在本书中包含了关于 CDI 的章节。这有两个原因：首先，EJB 中首次引入的依赖注入行为在\
  \ CDI 中得到了增强；其次，CDI 通过为应用程序提供上下文功能来补充 EJB。EJB 通过为应用程序提供安全、事务管理和可伸缩性等企业服务来补充 CDI。如果应用程序开发者明智地决定何时使用\
  \ CDI、EJB 或两者兼用，那么最终生成的应用程序将既灵活又具有可伸缩性。\n\n完成本章后，您将对以下领域有所了解：\n\n*   CDI 基础\n* \
  \  CDI 与 EJB 的关系\n*   部署和执行 CDI 客户端\n\n## 什么是 CDI？\n\n在 CDI 出现在 Java EE 领域之前，Java\
  \ EE 技术的三个层级——即 Web 层、业务层和持久化层——之间没有一种简单的方式能够以松散耦合但类型安全的方式进行交互。Web 层没有合适的机制来支持事务，因为它专注于呈现内容，并且对事务资源的访问有限。\n\
  \n引入 CDI 主要是为了帮助解决以下问题：\n\n*   绑定到生命周期上下文的有状态对象的生命周期\n*   类型安全的依赖注入机制\n*   事件通知\n\
  *   与统一表达式语言（EL）的集成\n\nCDI 服务有助于统一企业 JavaBean（EJB）和 JavaServer Faces（JSF）编程模型。CDI\
  \ 服务允许企业 JavaBean 在 JavaServer Faces 框架中用作托管 Bean。CDI 还为访问事务资源提供了良好的支持，这有助于使用 Java\
  \ 持久化 API 轻松创建 Web 应用程序。CDI 弥合了这一差距。使用 CDI，Web 层可以直接与业务层和持久化层中的 Bean 进行交互。这就是 CDI\
  \ 最初被命名为 Web Beans 的原因。\n\nJava EE 的上下文与依赖注入（CDI）1.0（JSR-299）首次作为 Java EE 6 平台的一部分引入，包括：\n\
  \n*   为绑定到生命周期上下文的有状态对象定义良好的生命周期\n    *   其中上下文集合是可扩展的\n*   无需冗长配置的类型安全依赖注入机制\n\
  *   配置\n    *   可以在开发或部署时选择依赖项\n*   类型安全的装饰器和拦截器\n*   事件通知模型\n*   一个 SPI，允许可移植扩展干净地集成到容器中\n\
  \n随后开发了 CDI 1.1/1.2（JSR-346），包括以下内容：\n\n*   在 Java EE 中自动启用 CDI（不需要 `beans.xml`）\n\
  *   添加对事件、Bean、装饰器和拦截器元数据的自省支持\n*   通过 `CDI` 类简化从 CDI 外部访问 Bean 管理器\n*   使用 `@Priority`\
  \ 注解添加拦截器的全局启用\n*   添加 `@Unmanaged` 以轻松访问非上下文实例\n*   明确 CDI 生命周期和事件的规范\n*   重新定义\
  \ Bean 定义注解以避免与其他 JSR 330 框架冲突\n*   明确对话解析\n*   API 中的官方 OSGi 支持\n\n最后，于 2017 年\
  \ 5 月完成的 CDI 2.0（JSR-365）是由 Antoine Sabot-Durand（Red Hat Inc.）领导的 CDI 1.2（JSR 346）规范的一次重大演进。\n\
  \nJava EE 8 平台要求使用 CDI 2.0，它带来了以下新特性：\n\n*   可用于创建注解实例的内置注解字面量\n*   可用于在 Java SE\
  \ 8 中引导 CDI 容器的 API\n*   一些新的配置器接口，可用于动态定义和修改 CDI 对象\n*   支持观察者排序，用于确定特定事件的观察者方法的调用顺序\n\
  *   支持异步触发事件\n*   规范被分为三个部分\n*   Java SE 支持，即在 Java EE 之外使用 CDI\n*   与 Java 8 特性对齐（流、Lambda\
  \ 表达式、可重复限定符）\n*   事件增强\n*   主要 SPI 元素的配置器\n*   能够在生产者上应用拦截器\n\nCDI 2.0 规范被分为三个部分：Java\
  \ SE、Java EE 和 CDI 核心。拆分的主要原因是：\n\n*   与许多其他支持 Java SE 引导的 Java EE 规范保持一致\n    *\
  \   JAX-RS、JPA 等\n*   促进规范和框架对 CDI 的采用\n    *   Weld、Apache OpenWebBeans、Apache\
  \ DeltaSpike 等已经支持 Java SE，但每个实现的 API 不同。\n    *   应定义编程模型以避免用户混淆。\n*   提供一种在 Java\
  \ EE（MicroProfile）之外构建新堆栈的方法\n\n\n\n拆分后，规范名称也从“Java EE 的上下文与依赖注入（JSR 346）”变更为“Java\
  \ 的上下文与依赖注入（JSR 365）”。\n\n注意\n\n使用 CDI 1.x 的自定义库可能需要重新构建以适配 CDI 2.0。\n\n关于 CDI 的信息可查阅：[`http://www.cdi-spec.org/`](http://www.cdi-spec.org/)\n\
  \nCDI 规范可查阅：[`http://docs.jboss.org/cdi/spec/2.0/cdi-spec.html`](http://docs.jboss.org/cdi/spec/2.0/cdi-spec.html)\n\
  \n图 10-1 展示了 CDI 出现之前 Java EE 应用程序的架构，而图 10-2 则展示了 CDI 出现后 Web 层与业务层之间的交互方式。\n\n\
  ![A311833_3_En_10_Fig2_HTML.jpg](img/A311833_3_En_10_Fig2_HTML.jpg)\n\n图 10-2\n\n\
  CDI 应用程序架构\n\n![A311833_3_En_10_Fig1_HTML.jpg](img/A311833_3_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1\n\nCDI 出现前的 Java EE 应用程序架构\n\nCDI 提供的两个重要特性就体现在其名称中：\n\n*   **上下文**：负责将有状态组件（如有状态会话\
  \ Bean）绑定到定义明确的作用域。有状态组件是指在多次调用之间保留信息的组件。CDI 容器将有状态组件与特定作用域关联——在需要时创建它们，在超出作用域时销毁它们。因此，客户端无需承担管理有状态组件生命周期的负担。\n\
  *   **依赖注入**：负责以松耦合但类型安全的方式将组件注入到应用程序中。被注入的组件由容器实例化，这意味着用户无需使用 `new` 来创建组件实例。用户可以使用接口而非接口的实际实现来进行注入。这允许用户将需要注入的\
  \ Bean 类型的具体实现选择推迟到运行时部署。\n\n注意\n\n我们只能在启用了 CDI 的应用程序中使用注入点，而 Java EE 8 平台要求使用 Java\
  \ 依赖注入 1.0。\n\n清单 10-1、10-2 和 10-3 以最简单的形式演示了“上下文”和“依赖注入”的概念。在本章后续章节中，我们将以此示例为基础来演示\
  \ CDI 的各种特性。清单 10-1 定义了一个 `Wine` 接口，该接口由 `RedWine` 类实现，如清单 10-2 所示。\n\n```\npackage\
  \ com.apress.ejb.chapter10;\npublic interface Wine {\npublic String getColor();\n\
  }\n清单 10-1\nWine.java\n```\n\n`RedWine` 类演示了 CDI 的“上下文”方面。它带有 `ApplicationScoped`\
  \ 注解，这意味着当应用程序被实例化时，`RedWine` 的实例只会被创建一次，并且该实例将在应用程序关闭时被销毁。在应用程序的生命周期内，该实例将在整个应用程序中共享。我们将在本章后面部分详细了解作用域。\n\
  \n```\npackage com.apress.ejb.chapter10;\nimport javax.enterprise.context.ApplicationScoped;\n\
  @ApplicationScoped\npublic class RedWine implements Wine {\npublic String getColor()\
  \ {\nreturn \"Red\";\n}\n}\n清单 10-2\nRedWine.java 演示了上下文方面\n```\n\n清单 10-3 中显示的客户端使用\
  \ `@Inject` 注解注入了 `newWine` 字段。使用 `@Inject` 注解注入的字段由容器实例化，这意味着用户无需使用 `new` 创建对象实例，也无需在编译时依赖于实际的实现类。这里需要注意的一个重要点是，`newWine`\
  \ 字段的类型是 `Wine`。在这种特定情况下，容器会自动使用 `RedWine` 实现进行实例化。如果我们必须以传统方式实例化 `RedWine`，那么我们将不得不使用\
  \ `RedWine` 实现而不是 `Wine` 接口。结果，客户端和 `Wine` 对象之间将存在紧密耦合，这种耦合在部署时或运行时都无法更改。我们将在本章后面讨论依赖注入时，进一步了解\
  \ CDI 容器如何知道要注入哪个实现。\n\n```\npackage com.apress.ejb.chapter10;\nimport javax.inject.Inject;\n\
  public class WineClient {\n// 传统方式实例化\nprivate Wine oldWine = new RedWine();\n//\
  \ 通过字段依赖注入实例化\n@Inject\nprivate Wine newWine;\n}\n清单 10-3\nWineClient.java 演示了依赖注入方面\n\
  ```\n\n作为参考，CDI 规范还定义了以下服务。对这些高级 CDI 主题的更详细解释超出了本章的范围，但鼓励您参考 CDI 规范以获取更多信息。\n\n\
  *   通过统一表达式语言 (EL) 将 Web 层与上下文对象集成\n*   实现 Bean 并可以通过业务方法拦截这些 Bean 调用的装饰器\n*   用于将业务逻辑与横切关注点分离的拦截器\n\
  *   定义 Bean 之间以松耦合方式交互的事件通知模型\n*   通过可移植扩展与容器进行清晰交互的能力\n\n## 与 EJB 的关系\n\nCDI 弥合了由\
  \ Servlet、JSP 和 JSF 组成的 Web 层与由 EJB 和 JPA 组成的企业层之间的鸿沟。Servlet、JSP 和 JSF 负责内容呈现，但不具备事务管理和持久化功能。EJB\
  \ 和 JPA 支持与数据库相关的操作，如提交、回滚和其他事务管理功能。使用 CDI，Web 应用程序可以使用会话 Bean 作为外观来执行 JPA 支持的数据库相关操作。\n\
  \n会话 Bean 像托管 Bean 一样参与 CDI 生命周期。会话 Bean 可以被注入到其他会话 Bean 和托管 Bean 中。托管 Bean 可以被注入到会话\
  \ Bean 中。用户在决定使用会话 Bean 还是托管 Bean 时应谨慎。当应用程序需要以下高级企业服务时，应使用会话 Bean：\n\n*   基于角色的安全性\n\
  *   事务管理\n*   通过实例池实现的可伸缩性\n*   并发性\n*   事件和定时器\n\n对于需要依赖注入、生命周期管理和拦截器的应用程序，托管 Bean\
  \ 就足够了。通过添加 `@Stateless`、`@Stateful` 或 `@Singleton` 注解，可以轻松地将托管 Bean 升级为会话 Bean。\n\
  \n注意\n\n消息驱动 Bean 和实体是非上下文对象，可能不会被注入到其他对象中。消息驱动 Bean 利用了 CDI 的一些特性，例如拦截器和装饰器，因为容器会对所有托管\
  \ Bean 实例（包括非上下文实例）执行注入。\n\n## CDI 概念\n\n现在我们对 CDI、它在 Java EE 技术栈中的位置以及它与 EJB 的关系有了基本了解，接下来让我们详细探讨上下文和依赖注入。\n\
  \n\n\n### Beans 与 beans.xml\n\nBeans 是由容器管理的、包含业务逻辑的组件，例如托管 Bean 和会话 Bean。读者需要注意，CDI\
  \ 并未引入一种名为“CDI Bean”且拥有独特组件模型的新 Bean 类型。CDI 提供了一套服务，可供托管 Bean 和 EJB（它们由其现有的组件模型定义）使用。CDI\
  \ 容器识别各个部署模块中发现的 Bean 的过程称为 Bean 发现。通过 Bean 发现被容器发现的 Bean 会参与 CDI 生命周期。这些 Bean 的生命周期由容器根据\
  \ CDI 规范进行管理。\n\n注意\n\n在本章中，除非另有说明，“Bean”一词指的是参与 CDI 生命周期的 Java Bean。\n\n如果容器在 WAR\
  \ 文件的 `WEB-INF` 目录或 JAR 文件的 `META-INF` 目录中检测到 `beans.xml` 文件，则该模块内的 Bean 会参与 CDI\
  \ 生命周期。模块中存在 `beans.xml` 有助于容器快速隔离与 CDI 相关的模块，从而加快 Bean 发现速度。CDI 不要求 `beans.xml`\
  \ 声明模块中可用的 Bean；`beans.xml` 可以为空。CDI 构件（如替代项、拦截器和原型）会根据需要在 `beans.xml` 中声明。\n\n\
  CDI 容器为其 Bean 提供以下服务：\n\n*   透明的创建、销毁和作用域管理\n*   注入到 Java 客户端时，通过限定符进行类型安全的作用域解析\n\
  *   在 JSF 客户端的统一 EL 表达式中使用时，通过名称进行类型安全的作用域解析\n*   生命周期回调\n*   其他 Bean 实例的自动注入\n\
  *   拦截与装饰\n*   事件通知\n\n通过声明一个类级别的字段并使用 `javax.inject.Inject` 注解对其进行标注，可以将 Bean 注入到其他\
  \ Bean 和客户端中。通过使用 `javax.inject.Named` 注解对 Bean 进行标注，它们也可以通过统一 EL 表达式与 JSP 和 JSF\
  \ 等 Web 层技术一起使用。\n\n### 作用域\n\n对象的作用域决定了该对象各个实例的生命周期。包含有状态对象实例的应用程序需要这些实例在定义的时间段内保持其状态。作用域规定了\
  \ Bean 实例应在何时创建，以及容器应在何时销毁它。\n\nCDI 有以下五种类型的作用域。\n\n#### 应用作用域\n\n应用作用域的 Bean 的状态在应用程序的所有用户之间共享。一个应用作用域的对象在应用程序的生命周期内仅创建一次——即首次被注入时——并且仅在应用程序关闭时被销毁。应用作用域使用\
  \ `@javax.enterprise.context.ApplicationScoped` 注解声明。\n\n#### 请求作用域\n\n请求作用域的 Bean\
  \ 的状态由单个请求中涉及的所有 Bean 共享。一个请求作用域的 Bean 在每个请求中创建一次，并在该请求完成后被销毁。请求作用域使用 `@javax.enterprise.context.RequestScoped`\
  \ 注解声明。\n\n#### 会话作用域\n\n会话作用域的 Bean 的状态在同一 HTTP 会话内的多个请求之间共享。一个会话作用域的 Bean 在 HTTP\
  \ 会话开始时创建，并在 HTTP 会话关闭或超时时被销毁。会话作用域使用 `@javax.enterprise.context.SessionScoped`\
  \ 注解声明。\n\n#### 对话作用域\n\n对话作用域的 Bean 的状态在 JSF faces 请求或非 faces 请求的所有标准生命周期阶段之间共享。一个\
  \ JSF 请求仅与一个对话相关联。任何对话都可以处于瞬态或长期运行状态。瞬态是对话的默认状态。通过调用 `Conversation.begin()` 将对话标记为长期运行，通过调用\
  \ `Conversation.end()` 将其标记为瞬态。在 JSF 请求结束时，对话作用域的对象必须处于瞬态才能被销毁。对话作用域使用 `@javax.enterprise.context.ConversationScoped`\
  \ 注解声明。\n\n#### 依赖伪作用域\n\n依赖作用域是默认作用域，当未显式定义作用域时，容器会应用它。具有依赖作用域的 Bean 的实例仅绑定到一个对象。此类\
  \ Bean 的实例会随着关联对象的创建和销毁而同步创建和销毁。这些 Bean 实例不会在客户端应用程序之间共享。依赖作用域使用 `@javax.enterprise.context.Dependent`\
  \ 注解声明。\n\n注意\n\n用户可以通过使用 `@javax.inject.Scope` 注解来定义自定义作用域。\n\n### 使用 @Inject 进行依赖注入\n\
  \n在引入依赖注入的 JSR 330 发布之前，需要依赖类服务的客户端要么必须实例化该类的具体实例，要么依赖外部模块在需要之前连接好依赖关系。这要么在客户端和依赖类之间创建了紧密耦合的编译时依赖关系，要么导致客户端依赖外部进程来适当地“配置”自身。通过依赖注入，客户端和依赖类之间的契约变得解耦，并且客户端对自身如何被初始化获得了一定的控制权。客户端可以请求通过其接口注入一个资源，并依赖容器注入一个客户端有意未知的某个具体实现类的可接受实例。CDI\
  \ 通过引入一种方式（限定符，见下文），让客户端能够告诉容器它需要注入类具有哪些抽象特性，从而扩展了客户端控制其配置的能力。容器在运行时根据这些需求来决定注入哪个依赖类。这创建了一个更加松散耦合的系统，其中注入类的需求在客户端中以声明式和动态的方式配置，并由容器在运行时绑定到一个实现类。\n\
  \n`@javax.inject.Inject` 注解定义了一个注入点，在 Bean 中有三个位置可以由 CDI 容器执行注入：在构造函数声明上初始化参数值、在方法声明上初始化参数值，以及在字段声明上初始化类成员。接下来我们将逐一考察这些位置。\n\
  \n\n\n#### Bean 构造函数参数注入\n\n一个 CDI bean 会指定其众多构造函数中的一个作为其 bean 构造函数。CDI 容器使用此构造函数来实例化该\
  \ bean。当我们向一个带有一个或多个参数的 bean 构造函数添加 `@javax.inject.Inject` 注解时，就会发生 bean 构造函数参数注入。如果\
  \ bean 构造函数有多个参数，那么所有参数都是有效的注入点，这意味着容器必须为 bean 构造函数的所有参数提供值。如果 bean 类没有带有 `@Inject`\
  \ 注解的 bean 构造函数，那么默认的（无参）构造函数将被用作 bean 构造函数。\n\n客户端应用程序有可能绕过容器，直接实例化该 bean。在这种情况下，显而易见的结果是，返回的对象不与任何上下文绑定，并且新实例的生命周期不受容器管理。\n\
  \n清单 10-4 展示了如何使用 bean 构造函数参数注入，用 `Wine` 类型的年份酒来初始化 `WineCellarClient` 类中的 `beanConstParaInjVintage`\
  \ 字段。\n\n注意\n\nCDI 容器将选择 `Wine` 接口的默认实现，并将该实现的一个实例传递给 `WineCellarClient` bean 构造函数。\n\
  \n```\npackage com.apress.ejb.chapter10;\nimport javax.inject.Inject;\npublic class\
  \ WineCellarClient {\nprivate Wine beanConstParaInjVintage;\n@Inject\nWineCellarClient(Wine\
  \ vintage)\n{\nthis.beanConstParaInjVintage = vintage;\n}\n}\n清单 10-4\nWineCellarClient.java\n\
  ```\n\n#### 初始化器方法参数注入\n\nCDI 还可以通过调用 bean 上带有 `@javax.inject.Inject` 注解的方法，在之后初始化\
  \ bean 的属性。带有 `@javax.inject.Inject` 注解的 bean 方法被称为初始化器方法。初始化器方法必须是非抽象的、非静态的且非泛型的。初始化器方法可以有零个或多个参数。如果初始化器方法有多个参数，那么所有参数都是有效的注入点，并且\
  \ CDI 容器必须能够为所有参数提供值。一个 bean 类声明多个初始化器方法是合法的。\n\n客户端应用程序有可能绕过容器，直接调用初始化器方法。同样，在这种情况下，显而易见的结果是容器不会向该方法传递任何参数。\n\
  \n清单 10-5 展示了如何修改 `WineCellarClient` 类，使用初始化器方法参数注入代替 bean 构造函数参数注入，以达到相同的结果。\n\n\
  ```\npackage com.apress.ejb.chapter10;\nimport javax.inject.Inject;\npublic class\
  \ WineCellarClient {\nprivate Wine initParaInjVintage;\nWineCellarClient()\n{\n\
  }\n@Inject\npublic void setVintageWine(Wine vintage)\n{\nthis.initParaInjVintage\
  \ = vintage;\n}\n}\n清单 10-5\nWineCellarClient.java\n```\n\n#### 字段注入\n\n最后，CDI 容器可以通过选择字段接口类型的明确实现来实例化一个类级别的字段。通过使用\
  \ `@Inject` 注解标记类级别的字段，可以对其进行注入。被注入的字段必须是 bean 类或任何支持注入的 Java EE 组件类中的非静态、非 final\
  \ 字段。\n\n清单 10-6 展示了字段注入如何简化 `fieldInjVintage` 的初始化。\n\n```\npackage com.apress.ejb.chapter10;\n\
  import javax.inject.Inject;\npublic class WineCellarClient {\n@Inject\nprivate Wine\
  \ fieldInjVintage;\n}\n清单 10-6\nWineCellarClient.java\n```\n\n### 依赖解析\n\nCDI 规范保证了注入的\
  \ bean 是松散耦合且类型安全的。对于只有一个实现的 bean 类型（类或接口），CDI 容器可以明确地选择其实现。但一个 bean 类型可能有多个实现。例如，我们可以添加另一个类\
  \ `WhiteWine`，如清单 10-7 所示，它实现了我们在清单 10-1 中创建的接口 `Wine`。\n\n```\npackage com.apress.ejb.chapter10;\n\
  public class WhiteWine implements Wine {\npublic String getColor() {\nreturn \"\
  White\";\n}\n}\n清单 10-7\nWhiteWine.java\n```\n\n在引入 `WhiteWine` 实现之后，我们的 `WineClient`（其中注入了\
  \ `Wine`）需要区分 `Wine` 的两个实现：即 `RedWine` 和 `WhiteWine`。当 CDI 容器无法隔离出需要在给定注入点注入的一个\
  \ bean 类时，它会引发一个未满足或不明确的依赖部署时错误。这个不明确的依赖问题可以通过使用以下三种解决方案中的任何一种来解决：\n\n*   限定符（用于编译时解析）\n\
  *   备选方案（用于部署时解析）\n*   生产者（用于运行时解析）\n\n#### 限定符\n\n限定符类型通过提供编译时的多态性和运行时的动态绑定，使 CDI\
  \ 组件能够以松散耦合的方式进行交互。限定符类型允许客户端指定要注入的实例的所需特性，而无需知道选择了哪个具体的实现类。\n\n让我们通过一个例子来尝试理解限定符。清单\
  \ 10-7 中 `WhiteWine` 类的添加迫使容器引发错误，因为容器无法决定是实例化 `RedWine` 还是 `WhiteWine` 实现。我们将使用一个限定符来解决这个依赖问题。清单\
  \ 10-8 展示了一个名为 `Red` 的用户自定义限定符。\n\n```\npackage com.apress.ejb.chapter10;\nimport\
  \ static java.lang.annotation.ElementType.TYPE;\nimport static java.lang.annotation.ElementType.FIELD;\n\
  import static java.lang.annotation.ElementType.PARAMETER;\nimport static java.lang.annotation.ElementType.METHOD;\n\
  import static java.lang.annotation.RetentionPolicy.RUNTIME;\nimport java.lang.annotation.Retention;\n\
  import java.lang.annotation.Target;\nimport javax.inject.Qualifier;\n@Qualifier\n\
  @Retention(RUNTIME)\n@Target({METHOD, FIELD, PARAMETER, TYPE})\npublic @interface\
  \ Red {\n}\n清单 10-8\nRed.java\n```\n\n我们将为清单 10-2 中所示的 `RedWine` 类添加 `Red` 限定符，如清单\
  \ 10-9 所示。\n\n```\npackage com.apress.ejb.chapter10;\nimport javax.enterprise.context.ApplicationScoped;\n\
  // 实例将只创建一次，将在整个应用程序中共享，\n// 并在应用程序关闭时销毁\n@ApplicationScoped\n@Red\npublic class\
  \ RedWine implements Wine {\npublic String getColor() {\nreturn \"Red\";\n}\n}\n\
  清单 10-9\nRedWine.java\n```\n\n引入这个自定义限定符使我们能够解决不明确的依赖错误。如清单 10-3 中所编码的 `WineClient`，现在将实例化\
  \ `WhiteWine`，因为 `WhiteWine` 具有 `@Default` 限定符，并且注入点也具有相同的 `@Default` 限定符。清单 10-10\
  \ 展示了如何通过在注入点添加 `@Red` 限定符，用 `RedWine` 实现来实例化 `newWine` 字段。\n\n```\npackage com.apress.ejb.chapter10;\n\
  import javax.inject.Inject;\npublic class WineClient {\n// 以经典方式实例化\n// private\
  \ Wine oldWine = new RedWine();\n// 通过字段依赖注入实例化\n@Inject\n@Red\nprivate Wine newWine;\n\
  }\n清单 10-10\nWineClient.java\n```\n\n现在我们对限定符如何帮助我们解决歧义有了基本的了解，接下来我们将研究 CDI 限定符的四种类型。\n\
  \n\n\n##### @Default\n\n当一个 Bean 或注入点没有显式定义限定符时，CDI 容器会假定其限定符为 `@javax.enterprise.inject.Default`。如果\
  \ CDI Bean 只有一个实现，那么 CDI 容器可以轻松选择该实现进行注入，因为不存在歧义。`@Default` 是一个内置限定符，它告知 CDI 容器：当未指定其他限定符（除了\
  \ @Named，见下文）时，注入单个默认的 Bean 实现。清单 10-7 中的 `WhiteWine` 类具有 `@Default` 限定符，可以按清单 10-11\
  \ 所示编写，其行为不会发生任何变化。\n\n```\npackage com.apress.ejb.chapter10;\nimport javax.enterprise.inject.Default;\n\
  @Default\npublic class WhiteWine implements Wine {\npublic String getColor() {\n\
  return \"White\";\n}\n}\n清单 10-11\nWhiteWine.java\n```\n\n##### @Any\n\n与 `@Default`\
  \ 限定符一样，所有 Bean 都隐式具有 `@Any` 限定符。我们可以向 `WhiteWine` 类添加 `@javax.enterprise.inject.Any`\
  \ 注解，如清单 10-11 所示，与 `@Default` 共存，其行为不会发生任何变化。在注入点上使用 `@Any` 限定符，对于遍历某个 Bean 类型的所有实现非常有用。\n\
  \n清单 10-12 展示了如何使用 `@Any` 限定符来遍历 `Wine` 的所有实现。\n\n```\npackage com.apress.ejb.chapter10;\n\
  import javax.enterprise.inject.Any;\nimport javax.enterprise.inject.Instance;\n\
  import javax.inject.Inject;\npublic class AllWinesClient {\n@Inject\n@Any\nprivate\
  \ Instance allWines;\nprivate void printAllWineColors(){\nfor (Wine wine : allWines){\n\
  System.out.println(wine.getColor());\n}\n}\n}\n清单 10-12\nAllWinesClient.java\n```\n\
  \n##### @Named\n\n`@Named` 内置限定符用于那些需要通过统一表达式语言（EL）对 Web 层进行访问的 Bean。默认情况下，使用首字母小写的\
  \ Bean 名称来访问该 Bean。也可以将非默认名称作为参数传递给 `@Named` 限定符。\n\n##### @New\n\n`@New` 限定符会将\
  \ Bean 的实例与其声明的作用域解除关联。应用程序可以通过使用 `@New` 限定符来获取不受声明作用域约束的 Bean 实例。`@New` 限定符强制容器创建一个新的\
  \ Bean 实例，该实例不受指定的 CDI 上下文生命周期的约束。\n\n例如，如清单 10-10 所示，`newWine` 的实例将是应用程序作用域的，因为它使用了\
  \ `@Red` 注解进行限定，并且 `RedWine` Bean 是应用程序作用域的。如果我们更新客户端以包含 `@New` 注解，如清单 10-13 所示，那么\
  \ `newWine` 实例将是依赖作用域的——即采用其普通 Java 上下文的生命周期——而不再是应用程序作用域。\n\n```\npackage com.apress.ejb.chapter10;\n\
  import javax.enterprise.inject.New;\nimport javax.inject.Inject;\npublic class WineClient\
  \ {\n// 以经典方式实例化\n// private Wine oldWine = new RedWine();\n// 通过字段依赖注入实例化\n@Inject\n\
  @Red\n@New\nprivate Wine newWine;\n}\n清单 10-13\nWineClient.java\n```\n\n用户定义的限定符可以使用\
  \ `@Qualifier` 注解创建，如清单 10-8 所示。\n\n### 备选方案\n\n备选方案通过在部署时提供多态性，使 CDI 组件能够以松散耦合的方式进行交互。备选\
  \ Bean 通过在 Bean 类上添加 `@Alternative` 注解来声明。如果备选 Bean 需要可用于查找、注入或 EL 解析，则必须在 `beans.xml`\
  \ 文件中显式声明。当注入点存在歧义依赖时，容器会尝试通过查找可注入的 Bean 中的可用备选方案来解决歧义。\n\n备选方案使用 `beans.xml` 中提供的信息来选择需要实例化的实现。由于选择实现的责任从\
  \ Java 代码转移到了部署描述符中，因此如果我们决定选择不同的实现，则无需重新编译 Java 代码。\n\n要使用备选方案在部署时解决依赖关系，请将 `@javax.enterprise.inject.Alternative`\
  \ 注解分别添加到清单 10-2 和清单 10-7 中提到的 `RedWine` 和 `WhiteWine` 实现中。然后，使用应该被实例化的实现类更新 `beans.xml`，如清单\
  \ 10-14 所示。在这种情况下，CDI 容器将实例化 `RedWine` 类。如果我们稍后决定实例化 `WhiteWine` 类，则无需重新编译客户端。我们只需要相应地更新\
  \ `beans.xml` 描述符即可。如果在部署时 `beans.xml` 包含多个实现类或包含无法解析的类名，容器会自动检测到该问题并将其视为错误。\n\n\
  ```\n\ncom.apress.ejb.chapter10.RedWine\n\n清单 10-14\nbeans.xml\n```\n\n\n\n### 生产者\n\
  \n我们已经了解了如何使用 `@Inject` 注解来注入 Bean，以及如何通过限定符和替代方案来解决注入过程中遇到的歧义依赖问题。利用生产者，我们可以将任何对象注入到任何其他对象中，前提是我们能够生产出需要被注入的对象。生产者方法充当了需要被注入的对象的来源。需要被注入的对象不必是\
  \ Bean 的实例，并且其具体类型可以在运行时决定。这提供了一种松散耦合但类型安全的运行时多态性。生产者的一个实际用途是注入 Java EE 资源，例如 `EntityManager`、`QueueConnetion`、`QueueSession`\
  \ 等。CDI 还提供了 `@Dispose` 注解，我们可以用它来在资源超出作用域时关闭它们，从而释放资源。\n\n生产者字段是生产者方法的一种更简单的替代方案。\n\
  \n清单 10-16 展示了如何使用生产者方法来选择将 `Wine` 接口的哪个实现用于依赖注入。选择注入哪个具体实现的决策是在运行时做出的。清单 10-15\
  \ 中定义的限定符 `RandomSelector` 与清单 10-8 中定义的限定符 `Red` 类似。\n\n```\npackage com.apress.ejb.chapter10;\n\
  import static java.lang.annotation.ElementType.TYPE;\nimport static java.lang.annotation.ElementType.FIELD;\n\
  import static java.lang.annotation.ElementType.PARAMETER;\nimport static java.lang.annotation.ElementType.METHOD;\n\
  import static java.lang.annotation.RetentionPolicy.RUNTIME;\nimport java.lang.annotation.Retention;\n\
  import java.lang.annotation.Target;\nimport javax.inject.Qualifier;\n@Qualifier\n\
  @Retention(RUNTIME)\n@Target({METHOD, FIELD, PARAMETER, TYPE})\npublic @interface\
  \ RandomSelector {\n}\n清单 10-15\nRandomSelector.java\n```\n\n清单 10-16 展示了 `WineSelector`\
  \ 类，它有一个返回 `Wine` 实例的 `getWine` 方法。这里需要注意的重要一点是，返回的 `Wine` 的具体实例（`RedWine` 或 `WhiteWine`）是在运行时决定的。在这个例子中，该决策基于随机数生成器生成的数字。\n\
  \n```\npackage com.apress.ejb.chapter10;\nimport java.util.Random;\nimport javax.enterprise.inject.New;\n\
  import javax.enterprise.inject.Produces;\npublic class WineSelector {\n@Produces\n\
  @RandomSelector\npublic Wine getWine(@New RedWine rw, @New WhiteWine ww) {\nfinal\
  \ int wineNumber = new Random().nextInt(2);\nif (wineNumber == 0) {\nreturn rw;\n\
  }\nelse if (wineNumber == 1) {\nreturn ww;\n}\nelse{\nreturn null;\n}\n}\n}\n清单\
  \ 10-16\nWineSelector.java\n```\n\n清单 10-17 展示了 `WineClient` 类，它使用 `RandomSelector`\
  \ 限定符，根据清单 10-16 中生成的随机数来实例化 `randomWine` 字段。\n\n```\npackage com.apress.ejb.chapter10;\n\
  import javax.inject.Inject;\npublic class WineClient {\n@Inject\n@RandomSelector\n\
  private Wine randomWine;\n}\n清单 10-17\nWineClient.java\n```\n\n## 与会话 Bean 的交互\n\
  \nCDI 通过将会话 Bean 与明确的作用域关联，并创建一个松散耦合的类型安全生态系统（该系统在编译时、部署时或运行时通过注入解决歧义），从而增强了会话 Bean\
  \ 提供的功能。作为回报，托管 Bean 可以使用 `@Stateful`、`@Stateless` 或 `@Singleton` 注解进行标注，从而为其增强声明式企业特性，例如基于角色的安全性、事务管理、可伸缩性以及多用户环境中的并发性。\n\
  \n### 会话 Bean 作用域\n\n会话 Bean 像任何其他 Bean 一样，参与 CDI 容器提供的上下文生命周期。可以通过添加 CDI 特定的作用域注解（`@ApplicationScoped`、`@RequestScoped`、`@SessionScoped`\
  \ 或 `@ConversationScoped`）将会话 Bean 与 CDI 作用域关联起来。因此，当客户端需要时，容器会自动创建会话 Bean 实例，并且当不再处于作用域内时，容器会自动销毁该实例。\n\
  \n默认情况下，所有通用会话 Bean 都具有 `@Dependent` 伪作用域，因此它们不能在客户端应用程序之间共享。本质上，某些类型的会话 Bean 与特定类型的作用域配合良好。例如，单例会话\
  \ Bean 在应用程序的整个生命周期内只能有一个实例。单例会话 Bean 的这一特性与应用程序作用域 Bean 的特性相辅相成。向无状态会话 Bean 添加\
  \ `@ApplicationScoped` 注解是没有意义的，因为无状态会话 Bean 实例仅在其调用期间与客户端关联，并且不与客户端维护会话状态。\n\n\
  因此，用户在将会话 Bean 应用 CDI 作用域时，必须遵循表 10-1 中提到的规则。如果会话 Bean 指定了非法的作用域，容器会自动检测到该问题并将其视为定义错误。\n\
  \n表 10-1\n\n会话 Bean 到 CDI 作用域的映射\n\n| 会话 Bean 类型 | 作用域 |\n| --- | --- |\n| `@Singleton`\
  \ | `@ApplicationScoped 或 @Dependent` |\n| `@Stateless` | `@Dependent` |\n| `@Stateful`\
  \ | `@ApplicationScoped`、`@RequestScoped`、`@SessionScoped`、`@ConversationScoped`\
  \ 或 `@Dependent` |\n\n### 解决会话 Bean 歧义\n\n就像任何其他 Bean 一样，参与 CDI 生命周期的会话 Bean 在 CDI\
  \ 容器无法隔离出一个可用于给定注入点的会话 Bean 时，可能会遇到“未满足或歧义依赖”错误。这些歧义可以通过对参与的会话 Bean 应用限定符、替代方案或生产者来解决。\n\
  \n参与 CDI 生命周期的会话 Bean 像任何其他 Bean 一样，使用限定符（`@Default`、`@Any`、`@New`、`@Named` 或用户自定义的）在编译时解决歧义依赖。\n\
  \n如果需要在部署时解决歧义依赖，则必须在 `beans.xml` 中显式声明一个替代会话 Bean。一旦在 `beans.xml` 中声明，它就会自动可用于查找、注入或\
  \ EL 解析。\n\n会话 Bean 的生产者方法必须是 EJB 的业务方法或 Bean 类的静态方法。如果不是这种情况，容器会自动检测到该问题并将其视为定义错误。类似地，生产者字段必须是\
  \ Bean 类的静态字段。\n\n用户可以像使用其他 Bean 一样，以完全相同的方式将会话 Bean 与限定符、替代方案和生产者结合使用。\n\n### 局限性\n\
  \n虽然 CDI 和会话 Bean 是很好的搭档，彼此填补了对方留下的空白，但参与 CDI 生命周期的会话 Bean 确实存在一些局限性。例如，会话 Bean\
  \ 的远程接口不包含在 Bean 类型集合中，并且不能参与 CDI 生命周期。\n\n\n\n## 编译、部署和测试 CDI 应用\n\n与 EJB 不同，CDI\
  \ 并未定义任何特殊的部署归档格式。CDI Bean 可以打包在 JAR、EJB-JAR 或 WAR 文件中。唯一的要求是该归档文件必须是一个 Bean 归档，这意味着归档文件中必须包含\
  \ `beans.xml` 描述符。CDI Bean 在归档文件中的位置取决于其 `beans.xml` 的位置。\n\n*   如果 `beans.xml`\
  \ 位于归档文件的 `META-INF` 目录中，则 CDI Bean 必须打包在库 JAR、EJB JAR 或 RAR 归档文件中。\n*   如果 `beans.xml`\
  \ 位于 WAR 文件的 `WEB-INF` 目录中，则 CDI Bean 必须打包在 WAR 文件的 `WEB-INF/classes` 目录中。\n\n在某些\
  \ CDI 容器中，打包好的 CDI 归档文件在部署前需要组装成一个企业归档（EAR）文件。应用服务器提供了部署工具或 Ant 任务来简化 CDI Bean 的部署。像\
  \ JDeveloper、NetBeans 和 Eclipse 这样的 Java 集成开发环境（IDE）也提供了部署功能，允许开发者将 CDI Bean 打包并部署到应用服务器。\n\
  \n在本章中，我们使用了代码片段来演示 CDI 的两个核心方面：作用域和依赖注入。我们从开发一个简单的 `Wine` 接口开始，然后继续创建了它的两个实现——`RedWine`\
  \ 和 `WhiteWine`。我们学习了各种作用域，并为 `RedWine` 实现添加了应用作用域。我们还看到了通过使用限定符、备选方案和生产者来解决歧义依赖的示例。我们到目前为止在章节中列出的\
  \ `WineClient` 客户端演示了客户端如何与 CDI Bean 进行交互，但它并不是一个功能完备的可执行客户端。我们现在将把 `WineClient`\
  \ 客户端转换为一个 Servlet 客户端，并通过将其部署在 GlassFish 应用服务器上来测试 CDI Bean。以下各节将引导您完成使用相应的 Servlet\
  \ 客户端编译、部署和测试这些 CDI Bean 所需的步骤。\n\n### 前提条件\n\n在执行下一节详述的任何步骤之前，请先完成第 1 章的“入门”部分。该部分将引导您完成本章示例所需的安装和环境设置。\n\
  \n注意\n\n在创建新的 NetBeans 项目时，请确保您已在新建应用程序向导的“服务器和设置”页面上选中了“启用上下文和依赖注入”复选框。这将创建一个 `beans.xml`\
  \ 并将 CDI 相关的运行时库添加到您的项目中。\n\n### 示例代码的结构\n\n我们将示例分为以下四个包，并且这些包中的所有工件都具有包私有作用域。我们进行这种分离是为了让\
  \ CDI 对象及其客户端互不干扰，并且我们可以隔离地观察它们的行为。\n\n*   `com.apress.ejb.chapter10.userdefinedqualifier`\n\
