  完成\");\n```\n\n无状态会话 Bean `OrderProcessorCMTBean` 没有显式声明其事务行为，因此它采用默认的 `TransactionManagement`\
  \ 值——CMT，这等同于在 Bean 上添加以下注解：\n\n```\n@TransactionManagement(TransactionManagementType.CONTAINER)\n\
  ```\n\n由于 `initialize()` 方法没有使用 `TransactionAttribute` 覆盖注解，并且 `OrderProcessorCMTBean`\
