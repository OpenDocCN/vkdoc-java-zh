  \  \n——马西莫  \n前言\n\n亲爱的读者：\n\n当我们在 2006 年构思本书第一版时，轻量级的 EJB 3 API 仍处于早期阶段，但我们清楚地看到，EJB\
  \ 规范设计者终于实现了功能与易用性的完美结合。从 EJB 2.x 的世界走来，这犹如一股清新的空气，让我们想起了在多年使用 C 和 C++ 编程后，发现 Java\
  \ 技术时的那种感觉。EJB 组件被重新定义为普通的 Java 类，其元数据可通过 Java 注解声明，并通过引入泛型、容器注入和拦截器得到增强，从而成为更灵活开发模型的基础——这种模型通过简洁性获得了优雅。随着新的\
  \ Java 持久化 API (JPA) 的出现，实体也被重塑为轻量级 Java 类，O/R 映射元数据可通过规范定义的注解指定，我们突然拥有了一个包含最新技术的全面企业组件模型，并全部整合到一个全球标准中。所以，你能理解我们为何如此兴奋。\n\
  \n时光飞逝，如今 EJB 3.2 和 JPA 2.1 规范已经发布。这些规范合计超过一千页，已经成熟，涵盖了多个新领域，并进一步提升了易用性。我们再次看到了一个机会，可以将这些最新材料转化为易于理解的格式，使其可读性强，并大量使用示例，让你可以在自己的机器上构建、执行并进一步探索。在这本伴随\
  \ Java EE 7 发布的第二版中，我们通过一系列易于消化的章节，介绍了 EJB 3.2 和 JPA 2.1 API，以及 CDI 和 JAX-RS 规范的关键特性，让你能够一次一个主题地逐步熟悉这些技术。在每一章中，我们都提供了可执行的源代码示例，演示每个功能如何工作，以及各个部分如何组合在一起。因此，你无需一口吞下整个“玉米卷饼”。秉承我们在本书众多示例中使用的\
  \ Apress Wines Online 应用程序的精神，我们希望你能真正品味和欣赏 Java EE 7 组件生态系统的丰富性。\n\n对于每项技术，我们不仅提供简单的示例，还努力解释何时何地使用其功能、它们的优缺点，并提供最佳实践见解。在完成这些主题探索之后，我们将解释如何将\
  \ EJB 及相关组件集成到全面的 Java EE 7 应用程序中，然后重点介绍事务管理、性能分析、部署、在可嵌入 EJB 容器中进行测试，以及如何构建健壮的\
  \ EJB 客户端。\n\n我们的任务是将你从 EJB 新手转变为专家，我们希望你能享受这段旅程！\n\n乔纳森·韦瑟比、马西莫·纳尔多内、奇拉格·拉索德与拉古·科达利\n\
  \n\n## 本书适合哪些读者？\n\n本书面向具备 Java 开发经验的企业软件开发者，他们曾使用早期版本的 EJB 或相关技术构建过单层或多层应用，并希望基于最新的跨平台行业标准来构建企业级软件。\n\
  \n作为一本入门级教材的作者，我们有两个主要目标：\n\n*   第一个目标是让您熟练掌握 EJB 的众多核心要素及若干密切相关的技术，从而能够在 Java EE\
  \ 环境中设计、构建、部署、执行和测试完整的企业级应用。我们希望您能轻松掌握构建和组装基于 EJB 组件的应用所需的关键细节。\n*   第二个目标是让您对 Java\
  \ EE 整体中的服务层和持久化层有一个广阔的视角，特别是对 EJB 所提供的全部功能有一个全面的了解。我们期望您在读完本书后，能够建立一个广度优先的知识基础，以此为跳板，更深入地探索\
  \ EJB 及相关规范的特定领域。\n\n为此，本书力求为 EJB 提供一个易于上手的入门路径，让您能够熟练地构建充分利用 EJB 广度的服务和应用程序。我们刻意避免深入探讨规范的许多领域，以便您能熟悉整体环境，而不会被细枝末节的选项所干扰。我们相信，这种基于对\
  \ EJB 广泛功能的扎实理解而建立的广度优先基础，将使您能够以最佳状态，利用规范和其他高级文本作为参考指南，更深入地探索您自己的软件开发项目所需的 EJB API\
  \ 特定领域。\n\n## 致谢\n\n本书的诞生离不开众多人士的努力与洞见，他们在本书的整个创作过程中提供了技术输入和纯粹的灵感。特别感谢我的同事兼本书第二版的主要合著者\
