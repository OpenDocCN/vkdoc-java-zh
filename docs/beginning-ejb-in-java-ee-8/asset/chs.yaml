  \n图 13-3\n\n构建应用程序\n\n运行 JUnit 测试\n\n有多种方法可以从 NetBeans 启动 JUnit 测试，但对于这些测试，您将右键单击\
  \ `WineAppServiceTest` 类并选择“`测试文件`”，如图 13-4 所示。\n\n![A311833_3_En_13_Fig4_HTML.jpg](img/A311833_3_En_13_Fig4_HTML.jpg)\n\
  \n图 13-4\n\n启动 JUnit 测试器以执行 WineAppServiceTest.java 中的单元测试\n\n此步骤实例化可嵌入的 EJB 容器，初始化数据库，并执行我们类中的三个单元测试。测试结果将显示在\
  \ `测试结果` 选项卡中。\n\n您将看到，第二个和第三个测试因断言失败而失败。那么让我们诊断这些问题。\n\n修复测试用例\n\n我们的第一个失败发生在第二个单元测试\
  \ `testCreateIndividual()` 中，消息为 `shippingAddress.getId()` 是 `null`。\n有趣的是，该单元测试中先前的断言检查——检查当前\
  \ `customer` 已知的 `shippingAddress` 属性上的 `id` 字段——成功了。\n您可能会认为这些断言应该检查同一个对象——即最初使用\
  \ `setDefaultShippingAddress()` 分配给 `customer` 的对象——因为，\n尽管我们对 customer 执行了 `merge()`，\n\
  但 `shippingAddress` 是一个新实例，因此逻辑上它被持久化了，而不是被合并了。\n由于 `persist()` 操作会将对象就地转换为受管实例，而不会像\
  \ `merge()` 那样创建新的受管对象，\n难道我们原始的 `shippingAddress` 实例现在不应该是处于受管状态的原始实例吗？\n\n级联 MERGE\
  \ 操作\n\n答案是，级联 `MERGE` 不仅对分离和受管实例执行 `merge()`，也对新实例执行；在这种情况下，新实例不会通过调用 `persist()`\
  \ 来持久化。因此，我们原始的 `shippingAddress` 引用现在已过时，而 `customer` 持有对新受管副本 `shippingAddress`\
  \ 的引用。当持久化和合并那些将 `MERGE` 操作级联到它们所引用对象的实体时，这是一个重要的“陷阱”。在级联 `MERGE` 操作期间找到的新对象和现有对象上都会执行\
  \ `merge()`。\n而 `persist()` 将原始实例转换为受管副本并将其放入持久化上下文中，`merge()` 则会创建原始实例的新受管副本并添加该副本。正在被合并的原始对象（在我们的例子中是\
  \ `customer`）会被正确更新以引用 `shippingAddress` 的新受管副本。\n然而，对原始分离实例的任何引用——例如，我们的 `shippingAddress`\
  \ 变量——现在都已过时，需要在使用前刷新。\n\n因此，要解决此问题，我们需要通过调用 `merge()` 从 `EntityManager` 获取 `shippingAddress`\
  \ 对象的新受管副本。如果我们修改测试代码，添加第 124 行，如图 13-5 所示，并重新运行测试，此测试现在将成功。\n\n![A311833_3_En_13_Fig5_HTML.jpg](img/A311833_3_En_13_Fig5_HTML.jpg)\n\
  \n\n\n图 13-5\n\n更新测试方法 `WineAppServiceTest.testCreateIndividual()` 以刷新过时的引用\n\n\
  从 EJB 方法返回受管对象\n\n第三个测试似乎因类似问题而失败。我们可以通过显式合并测试客户端中的所有对象来解决，以便在它们被添加到持久化上下文后（无论是直接添加还是通过级联的\
  \ `MERGE` 操作）获得受管引用。然而，在这种情况下，我们调用的是 EJB 方法来组装一个 `CustomerOrder`，而不是在测试客户端中手动连接各个部分，因此我们决定在\
  \ EJB 代码本身中解决这个问题。\n\n让我们进入调试器，看看能否找出为什么我们的 `customerOrder` 引用的 `id` 字段为 `null`，而数据库中查询到的同一个\
  \ `customerOrder` 的 `id` 字段却被正确赋值。\n\n打开 `WineAppService.java` 文件，在 `createCustomerOrder()`\
  \ 方法内部的 `custFacade.merge(customer);` 调用处添加一个断点，如图 13-6 所示。\n\n![A311833_3_En_13_Fig6_HTML.jpg](img/A311833_3_En_13_Fig6_HTML.jpg)\n\
  \n图 13-6\n\n在 `WineAppService.createCustomerOrder()` 内部设置断点\n\n设置好断点后，右键点击 `WineAppServiceTest.java`，这次选择“`Debug\
  \ Test File`”项，以调试模式启动 JUnit 测试器。\n\n当断点被触发时，打开 `Variables` 面板并导航到 `customerOrder`\
  \ 局部变量。展开 `customerOrder` 查看其属性的当前值，导航到其继承的属性，并观察到其 `id` 属性为 `null`。这是意料之中的。在方法的这个阶段，`customerOrder`\
  \ 是一个新实例，尚未被持久化。因此，其主键值尚未生成或赋值给其 `id` 字段。\n\n单步执行断点所在的行，对 `customer` 执行 `merge()`\
  \ 操作。根据 `Customer` 上的级联规则，我们知道当合并一个 `Customer` 实例（或其任何子类型）时，所有引用的 `CustomerOrder`\
  \ 实例也会被合并。\n\n在执行合并后再次检查 `Variables` 窗口中的 `customerOrder`，我们发现其 `id` 字段仍然为 `null`。其\
  \ `id` 字段上的 `@GeneratedValue` 设置确保在将其持久化或合并到持久化上下文时会分配一个值，因此显然这个对象并不是在对其父对象 `customer`\
  \ 调用 `merge()` 时创建的受管副本。因此，`createCustomerOrder()` 方法返回了错误的 `customerOrder` 实例。要修复此问题，请修改返回语句，改为返回一个受管的\
  \ `customerOrder` 实例，如图 13-7 所示。\n\n![A311833_3_En_13_Fig7_HTML.jpg](img/A311833_3_En_13_Fig7_HTML.jpg)\n\
  \n图 13-7\n\n更新 `WineAppService.createCustomerOrder()` 以返回 `customerOrder` 的受管实例\n\
  \n这让我们通过了之前遇到的 `customerOrder.getId() is null` 断言失败。再次运行测试，我们遇到了最后一个需要解决的问题。我们的\
  \ `customer` 实例在几行之前通过 `createCustomerOrder()` 创建后处于受管状态。然而，断言失败 `customerOrder2.getId()`\
  \ 为 `null` 表明它不知何故持有了一个过时的 `customerOrder` 副本。进一步检查发现，我们的 `customer` 副本在 `createCustomerOrder()`\
  \ 内部被合并时变成了游离状态。因为我们没有将合并后的副本传回给客户端，所以客户端需要负责获取新的受管副本。通过另一次 `merge()` 调用来获取这个受管副本解决了问题，如图\
  \ 13-8 的第 173 行所示。\n\n![A311833_3_En_13_Fig8_HTML.jpg](img/A311833_3_En_13_Fig8_HTML.jpg)\n\
  \n图 13-8\n\n更新 `WineAppServiceTest.testCreateCustomerOrder()` 以将受管实例赋值给 `customer`\
  \ 变量\n\n……至此，我们的测试现在成功执行了。\n\n\n\n除了探讨执行和调试涉及会话 Bean 和实体的 JUnit 测试的逐步过程外，本练习的一个重要收获是，合并操作（尤其是涉及级联`MERGE`的操作）可能导致过时的引用，这在代码中可能难以发现。一种安全的方法是，如果需要继续引用新实体，则始终显式持久化它们，而不是允许它们通过级联合并被持久化，因为后者会导致原始实例变为游离状态。此外，如果在方法调用后对实体的状态（可能已被持久化或合并）有任何疑问，请记住合并对象以获取其当前受管状态。\n\
  \n总结\n\n本章首先介绍了以下关键概念：\n\n*   JUnit：用于对 Java 类进行单元测试的框架；\n*   EJB Lite：EJB API 的一个最小子集，它为\
  \ EJB 提供基本服务，而无需完整 EJB 容器所需的一些资源密集型功能；\n*   可嵌入 EJB 容器：EJB Lite 的一种实现，它在纯 Java SE\
  \ 环境中运行，而不是在 Java EE 应用服务器中，并提供了一个轻量级环境，用于通过 JUnit 测试 EJB。\n\n在检查一个为测试 JPA 持久化单元上的\
  \ EJB 外观而编写的 JUnit 测试类时，我们剖析了在可嵌入 EJB 容器中运行测试时的配置要求。\n\n最后，我们逐步介绍了在 NetBeans 中针对\
  \ GlassFish 实现的可嵌入 EJB 服务器构建和执行 JUnit 测试的步骤。这些测试被预先配置为失败，我们逐步检查并揭示了失败的原因，使用调试器帮助我们找到解决方案。\n\
  \n本章以一个重要的收获作为结尾：在处理实体引用时要谨慎，因为当相关实体被合并时，由于级联规则，这些实体引用可能会在合并或持久化过程中变为游离状态。\n\n索引\n\
