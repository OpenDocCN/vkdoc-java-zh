  \ GlassFish 服务器，如图 1-12 所示。\n*   验证 URL 中使用的机器名或 IP 地址是否正确。您可以通过在 Windows 机器的命令提示符下执行\
  \ `ipconfig` 命令来找到您机器的 IP 地址。如果您使用的是 `localhost`，请验证浏览器是否能够通过将其回环到您机器的 IP 地址来解析它。\n\
  *   验证 URL 中使用的端口号是否正确。此解决方案将在后续章节中说明。\n\n#### 无法解析“localhost”主机名\n\n您的浏览器或 NetBeans\
  \ IDE 的测试器能够使用机器名或 IP 地址运行 GlassFish 服务器的测试页面，但无法解析 `localhost` 主机名。\n\n##### 诊断\n\
  \nNetBeans IDE 的测试器或浏览器无法使用 `localhost` 回环到您的机器。\n\n##### 解决方案\n\n更新 Windows 机器的\
  \ `C:\\Windows\\System32\\drivers\\etc\\hosts` 文件，添加一个将您机器的 IP 地址映射到 `localhost`\
  \ 的条目。\n\n```\n# localhost 名称解析由 DNS 本身处理。\n# 127.0.0.1          localhost\n# ::1\
  \                localhost\n    localhost\n```\n\n#### 浏览器无法连接到“8080”端口\n\n您 URL\
  \ 的主机名部分是正确的，但您的浏览器无法连接到端口 8080 上的 GlassFish 应用服务器。\n\n\n\n##### 诊断\n\n如果 8080 端口号已被其他应用程序占用，您的浏览器将无法使用该端口访问\
  \ GlassFish 应用服务器。在安装过程中，配置工具会首先尝试将 8080 端口分配给 GlassFish 应用服务器，但如果检测到 8080 端口号不可用，则会为其分配一个不同的端口号。\n\
  \n##### 解决方案\n\n您可以按照以下步骤找到 GlassFish 应用服务器运行的端口：\n\n*   导航至 NetBeans IDE 的 `Services`\
  \ 选项卡，并在 GlassFish 服务器节点上调用上下文菜单，如图 1-12 所示。\n*   选择 `Properties` 菜单选项以打开 `Servers`\
  \ 对话框。\n*   在左侧面板中选择 GlassFish 服务器实例。\n*   `Common` 选项卡下的 `Location` 文本字段将显示 GlassFish\
  \ 应用服务器正在运行的端口号。\n\n#### 编译或执行示例应用程序项目时出错\n\n打开示例应用程序项目后，您可能会遇到编译错误，或者示例应用程序项目无法按预期执行。\n\
  \n##### 诊断\n\n本书提供的示例已使用 NetBeans 8.2 版本和 Java 平台 (JDK) 8 进行了测试。\n\n如果 NetBeans\
  \ IDE 未配置为使用 Java 平台 (JDK) 8，则在编译本书提供的示例应用程序项目时，您可能会遇到“`javac: invalid target release:\
  \ 1.8`”错误。\n\n示例应用程序代码包含与创建它们时所用的 NetBeans 安装相对应的硬编码端口号。如果示例代码中硬编码的端口号与您的 NetBeans\
  \ 安装不同，则示例将无法按预期执行。\n\n##### 解决方案\n\n要解决“`javac: invalid target release: 1.8`”错误，您必须验证\
  \ NetBeans 是否正在使用 Java 平台 (JDK) 8。您可能需要从前面章节提到的 URL 安装它。\n\n如果示例应用程序无法按预期工作，请验证示例代码使用的端口号是否与您的\
  \ NetBeans 安装相同。\n\n您可以查阅每个示例应用程序附带的 `Readme.txt` 文件以获取更多信息。\n\n#### 无法发送或接收“葡萄酒订单”邮件\n\
  \n在执行示例应用程序项目时，您无法发送或接收“葡萄酒订单”邮件。\n\n##### 诊断\n\n少数示例项目在执行过程中会发送邮件。您可能会在发送邮件时遇到问题，并且可能由于以下原因无法收到邮件：\n\
