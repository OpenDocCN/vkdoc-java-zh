  \ 应用程序直接与持久化对象模型或 JPA 实体交互。图 12-3 展示了这种编程模型的架构布局。在这种架构中，Web 组件将使用 `EntityManager`\
  \ 与实体交互，以执行 CRUD（创建、检索、更新、删除）操作和查询来检索数据。\n\n![A311833_3_En_12_Fig3_HTML.jpg](img/A311833_3_En_12_Fig3_HTML.jpg)\n\
