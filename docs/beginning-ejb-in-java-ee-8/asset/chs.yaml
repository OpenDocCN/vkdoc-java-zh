  \n## JSF\n\nJavaServer Faces 技术为构建 Java EE 的服务器端用户界面建立了标准。JavaServer Faces（JSF）自定义标签库用于在视图中表达\
  \ UI 组件，并将组件连接到服务器端对象。本书撰写时使用的是 JSF 2.3 版本。\n\n在本节中，我们将研究开发一个 Web 应用程序，该应用程序使用 JavaServer\
  \ Faces（JSF）与集成的 EJB 后端应用程序通信，采用图 12-2 所示的架构。我们将从简要介绍 JSF 的几个概念开始，为你开发一个功能完备的 Web\
  \ 应用程序做好准备。JSF 于 2002 年首次推出，需要 JDK 1.5 或更高版本，因此首要条件是在你的机器上安装 JDK。\n\nJSF 主要帮助我们完成以下工作：\n\
  \n*   通过添加组件标签将组件拖放到页面上，\n*   将组件生成的事件连接到服务器端应用程序代码，\n*   将页面上的 UI 组件绑定到服务器端数据，\n\
  *   使用可重用和可扩展的组件构建 UI，\n*   在服务器请求的生命周期之外保存和恢复 UI 状态。\n\n在本书中，使用了 JSF 2.3 版本，其中包括以下新特性：\n\
  \n*   CDI 对齐改进；\n*   JSF 2.3 工件现在可以轻松注入到 Java 类和 EL 表达式中；\n*   改进了 WebSocket，这是一种通过\
  \ TCP 提供全双工双向通信的协议；\n*   日期时间 API 改进；\n*   API 增强，包括 UIData、UIRepeat 等。\n\n注意\n\n\
  本节绝非对 JSF 的全面讨论。与任何其他 Java EE 技术一样，有关 JSF 的详细信息可以在以下网址找到：[`https://myfaces.apache.org/jsfintro.html`](https://myfaces.apache.org/jsfintro.html)\n\
  \nJSF 视图包括：\n\n*   组件树\n*   Facelets 或 HTML\n*   表达式语言\n*   根据需要与 JSTL 和其他标签库混合使用\n\
