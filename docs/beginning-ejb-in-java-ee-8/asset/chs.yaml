  @TransactionAttribute(TransactionAttributeType.REQUIRED)\n```\n\n由于客户端既没有开始也没有继承一个事务，因此在\
  \ `initialize()` 方法执行期间，EJB 容器会创建并开始一个事务，并且在该方法成功完成后提交所有更改。CMT Bean 始终会表现出隐式提交行为，因为容器不允许其开始的事务在方法完成后继续存在。隐式提交会导致该方法期间所做的任何更改持久化，并应用到数据库中，从而使这些更改此后对所有客户端可见。\n\
