  ```\n\n## 编译、部署和测试会话 Bean\n\n会话 Bean 在部署到 EJB 容器之前，需要打包成 EJB JAR（`.jar`）文件。在某些 EJB\
  \ 容器或应用服务器的情况下，打包好的 EJB 归档文件在部署前需要组装成企业归档（EAR）文件。EJB 容器或应用服务器提供了部署工具或 Ant 任务来简化\
  \ EJB 的部署。像 JDeveloper、NetBeans 和 Eclipse 这样的 Java IDE（集成开发环境）也提供了部署功能，允许开发者将 EJB\
  \ 打包、组装并部署到应用服务器。打包、组装和部署将在第 11 章中详细讨论。\n\n到目前为止，在本章中我们已经开发了一个无状态会话 Bean（`SearchFacade`）、一个有状态会话\
  \ Bean（`ShoppingCart`）和一个单例会话 Bean（`ShopperCount`）。接下来的部分将引导您完成编译、部署和测试这些会话 Bean\
