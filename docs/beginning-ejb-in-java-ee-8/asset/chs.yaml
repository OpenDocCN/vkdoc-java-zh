  \ 返回后才提交。假设我们使用的是采用两阶段提交的 JTA 事务（例如，由 EJB 容器创建的容器管理事务），那么如果这两个方法中的任何一个在执行过程中出现问题，整个事务都将回滚，并且此客户端或任何外部应用程序都不会知道曾经创建过一个\
  \ `CustomerOrder`。\n\n#### 这能通过 ACID 测试吗？\n\n表征有效事务的核心 ACID 要求是否得到满足？让我们看看 EJB 如何解决每一个问题。\n\
  \n##### 原子性\n\nEJB 容器确保，每当调用标记为 `REQUIRED` 或 `REQUIRES_NEW` 的无状态 CMT 方法时，如果容器介入创建一个新事务（对于\
  \ `REQUIRES_NEW` 总是会发生），它将在退出该方法时解析该事务。如果方法成功完成，并且 bean 代码没有调用 `EJBContext.setRollbackOnly()`，则事务将被提交。如果方法抛出异常，或者调用了\
  \ `EJBContext.setRollbackOnly()`，则事务将被回滚。这两个事务属性是容器可能介入创建新事务的唯一属性。对于所有其他事务属性，要么涉及外部管理的事务（在这种情况下，容器在方法退出时不会介入提交它），要么在没有事务上下文的情况下调用该方法。在后一种情况下，因为我们使用的是事务范围的持久化上下文并且没有事务上下文，所以对\
  \ `persist()`、`merge()` 或 `remove()` 的调用将导致 `javax.persistence.TransactionRequiredException`。如果我们使用带有扩展持久化上下文的有状态会话\
  \ bean，那么即使在事务之外，这些更改也会被持久化上下文跟踪，并且如果随后创建（并与此持久化上下文关联）并提交了事务，则会应用这些更改。\n\n#####\
  \ 一致性\n\n通过 EJB 服务提交事务时，保证满足任何数据库约束或并发条件（无论是在数据库中还是在 EJB 容器中强制执行）。违反将导致 EJB 容器抛出异常，并且事务将自动回滚。成功的提交表明所有定义的约束条件都已满足。\n\
  \n##### 隔离性\n\n此要求主要取决于底层 JTA 资源。每个资源可能公开其自己可配置的隔离级别设置，以便为事务中涉及的资源提供不同程度的*一致性*。隔离级别决定了事务内的资源能够看到事务中涉及的其他资源的部分（事务中）状态的程度，并且在很大程度上转化为资源内的缓存一致性设置。隔离性还确保事务不应看到另一个事务的未提交数据。为了保持数据库中立，我们的示例没有尝试配置这些设置。\n\
  \n##### 持久性\n\n这也主要取决于事务中涉及的底层 JTA 资源（例如，数据库或邮件服务器）。在 JTA 事务结束时，任何此类资源在被查询时都应能够显示数据的新状态。我们通过以下方式演示了这一点：在\
  \ `createCustomerOrder()` 方法及其封装的事务完成后，从客户端查询新 `CustomerOrder` 的详细信息。\n\n\n\n####\
  \ 此方法的优势\n\n使用带有 CMT 边界的默认无状态会话 Bean 的主要优势在于，客户端无需关心事务逻辑的启动、结束或其他协调工作。此外，调用 Bean\
  \ 方法时线程中当前生效的任何事务上下文都会自动传播到该方法调用（如果事务属性为`REQUIRED`或`SUPPORTS`）。每次对`OrderProcessorCMT`\
  \ Bean 的调用要么成功完成（此时可假定工作已持久化保存），要么抛出异常（此时该方法中执行的工作将完全回滚）。这是一种非常简单的模型。\n\n#### 此方法的局限性\n\
  \n通常来说，简单是好事，但有时也过于局限。虽然此示例允许客户端在客户端层创建和操作新的实体实例（例如创建`Customer`、`Wine`和`CartItem`实例时），但客户端必须依赖\
  \ EJB 来确保其对实体模型所做的更新能在事务中持久化到数据库，因为事务总是在控制权交还给客户端之前由 EJB 容器启动和终止。\n\n在下一个示例中，我们将展示如何使用有状态会话\
  \ Bean，结合 BMT 和扩展持久化上下文，使客户端在应用程序的事务行为方面拥有更大的灵活性（以及相应的责任）。\n\n注意\n\nEJB 用户中普遍存在一种观念，认为出于性能原因应避免使用有状态会话\
  \ Bean。我们进行的性能测试强烈表明，有状态会话 Bean 一直受到不公正的诋毁，如果正确使用，它们实际上可以提升性能。此外，在 EJB 中，它们的价值得到了提升，因为它们提供了`PersistenceContext.EXTENDED`选项，允许实体实例跨事务缓存以供使用。\n\
  \n### 带有 BMT 边界和扩展持久化上下文的有状态会话 Bean\n\n为了说明如何扩展 EJB 事务支持的范围，以下是使用有状态 BMT 会话 Bean\
  \ `OrderProcessorBMTBean.java`编写的同一应用程序。此 BMT 示例也利用了 EJB 内置的事务支持，但并非依赖容器在方法边界管理事务边界，而是展示了如何在企业\
  \ Bean 代码内部显式地划分事务，并可由客户端控制。\n\n使用有状态会话 Bean 时并不要求必须使用 BMT 边界，事实上这个选项通常并不常用。我们在清单\
  \ 8-5 中展示它，是为了说明如果您愿意，可以如何使用它。\n\n\n```java\n@Stateful(name = \"OrderProcessorBMT\"\
  , mappedName = \"Chapter08-TransactionSamples-OrderProcessorBMT\")\n@TransactionManagement(TransactionManagementType.BEAN)\n\
  @Interceptors(OrderProcessorBMTBeanTxnInterceptor.class)\npublic class OrderProcessorBMTBean\
  \ {\n@Resource\nSessionContext sessionContext;\n@PersistenceContext(unitName = \"\
  Chapter08-TransactionSamples-JTA\", type = PersistenceContextType.EXTENDED)\nprivate\
