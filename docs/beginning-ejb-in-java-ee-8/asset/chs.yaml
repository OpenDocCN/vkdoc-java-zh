  \ 4-5（即之前`SINGLE_TABLE`策略的示例）完全相同。\n\n#### JOINED 策略的优缺点\n\n##### 设计时考量\n\n使用 JOINED\
  \ 策略，在层次结构的任何级别引入新类型，只需在模式中插入一个新表即可。该类型的子类型将在运行时自动与该新类型进行连接。同样，通过添加、修改或删除字段来修改层次结构中的任何实体类型，只会影响直接映射到该类型的表。此选项在设计时提供了最大的灵活性，因为对任何类型的更改始终仅限于该类型专用的表。\n\
  \n##### 性能影响\n\nJOINED 方法不会受到`UNION`操作的影响，但本质上需要多次`JOIN`操作才能执行几乎任何查询。跨所有实例进行查询最初只需对最顶层基实体的表执行一次查询，以检索层次结构中所有实例的主键列表。由于基实体表中存在鉴别器列，根据持久化管理器实现所采用的延迟加载策略，将这些实例解析为实体类可以是高效的。\n\
  \n### 每个最外层具体实体类一张表 (InheritanceType.TABLE_PER_CLASS)\n\n对最后一种继承映射策略的支持对于持久化提供者来说是可选的。JPA\
  \ 规范并不强制要求支持该策略，因此可移植的应用程序应避免使用它，直到它被官方强制要求或至少得到广泛支持。此继承映射选项将每个最外层的具体实体映射到其自己专用的表。每个表映射该实体整个类型层次结构中的所有字段；由于没有共享表，因此也没有共享列。唯一的表结构要求是所有表必须共享一个共同的主键结构，这意味着主键列的名称和类型必须在层次结构中的所有表中匹配。\n\
  \n为了更清楚地说明，图 4-4 展示了使用 TABLE_PER_CLASS 继承策略的第三种层次结构类型，该图演示了每个实体子类一张表的方法。这些表除了主键结构之外无需共享任何共同点；并且由于表隐式标识了实体类型，因此不需要鉴别器列。请注意，虽然为`abstract`实体`Person`和`Employee`显示了表，但它们实际上并未被使用。未来版本的\
  \ EclipseLink（JPA 的参考实现）可能会进行修订，以在使用`TABLE_PER_CLASS`继承策略时抑制这些表的生成。在这种情况下，将这些类标注为`@MappedSuperclass`而不是`@Entity`可以防止生成类，但也会阻止这些类参与实体关系或\
  \ JPQL 语句。\n\n![A311833_3_En_4_Fig4_HTML.jpg](img/A311833_3_En_4_Fig4_HTML.jpg)\n\
