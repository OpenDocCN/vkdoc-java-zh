  ### 订单处理外观组件


  `OrderProcessFacadeBean` 是一个无状态会话 Bean。该 Bean 提供了由 `ShoppingCartBean` 调用的业务方法，用于提交订单，以及其他与信用卡和订单处理服务交互的方法。`OrderProcessFacadeBean`
  包含以下小节中描述的业务方法。


  #### 信用检查


  清单 7-10 展示了 `OrderProcessFacadeBean` 中的 `performCreditCheck()` 方法。该方法使用通过 `@WebServiceRef`
  注解注入的 `CreditService` 来获取 Web 服务的端口。一旦端口可用，代码就可以调用 `creditCheck` Web 服务操作，该操作接受一个信用卡号，并以布尔值形式返回该卡有效性的消息。我们使用的是在第
  6 章中开发的信用服务。


  ```

  private boolean performCreditCheck(Individual individual) {

  String ccnum = individual.getCcNum().toString();

  CreditCheckEndpointBean creditService = service.getCreditCheckEndpointBeanPort();

  return creditService.creditCheck(ccnum);

  }

  清单 7-10

  performCreditCheck 业务方法

  ```




  #### 创建采购订单


  清单 7-11 展示了 `OrderProcessFacadeBean` 中的 `processOrder()` 方法。当客户端应用提交订单时，`ShoppingCartBean`
  会调用此业务方法。该方法有一个参数，类型为 `Customer` 实体。客户的购物车包含在其 `cartItems` 列表中，列表中的每个成员都引用了一款葡萄酒以及客户在购物时添加到购物车的数量。


  首先，该方法会检查接收到的实体是否为受管状态。如果不是，则会调用 `EntityManager` 的 `merge()` 方法来获取一个受管的 `Customer`
  对象。


  注意


  值得注意的是，当我们运行此应用程序时（按照本章末尾的步骤操作），客户参数将在持久化上下文中找到，因此不会执行合并步骤。这是因为 `processOrder()`
  是从一个现有的事务上下文中调用的——该事务是在其调用方法 `ShoppingCartBean.sendOrderToOPC()` 被调用时创建的。单个持久化上下文始终绑定到给定的事务，在这种情况下，来自
  `ShoppingCartBean` 的扩展持久化上下文就是与此事务关联的那个。当调用 `sendOrderToOPC()` 时，会找到并使用一个现有的上下文事务。当在
  `processOrder` 内部调用 `em.contains(customer)` 时，`OrderProcessFacadeBean` 的 `EntityManager`
  会观察到持久化上下文已与此事务关联，并使用该持久化上下文，即与 `ShoppingCartBean` 关联的同一个扩展持久化上下文。这就是客户实例已被确定为受管状态的原因。


  一旦获取到受管的客户实体，它会检查客户是 `Individual` 还是 `Distributor`。对于个人客户，会调用 `performCreditCheck()`
  方法来验证信用卡。如果发现信用卡无效，则会通过 `ShoppingCartBean` 向客户端应用发送消息“信用卡无效”。对于分销商，会检查 `memberStatus`
  属性，任何非“APPROVED”的值都会被拒绝。


  如果客户通过验证，则继续处理，并创建一个类型为 `CustomerOrder` 的新订单。这个新订单会填充与 `Customer` 关联并在其 `cartItems`
  属性中找到的 `CartItem` 对象集合。对于每个购物车项，会创建一个 `OrderItem` 对象来记录每款葡萄酒的数量以及该购物车项中葡萄酒的总价。每个订单项的价格使用每个
  `Wine` 实体可用的零售价信息进行计算。


  处理完所有购物车项并创建相应的订单项后，包含这些订单项的新 `CustomerOrder` 会被持久化，部分目的是为了获取其 `id` 字段的生成值，该值在从
  `sendPOtoMDB()` 调用内部生成电子邮件时使用。然后，对每个购物车项调用 `removeCartItem()` 方法，将其从 `Customer`
  中移除。


  创建了非实体工具类 `PurchaseOrder`，它将一个 `Customer` 对象与一个特定的 `CustomerOrder` 关联起来。此采购订单实例作为参数传递给
  `sendPOtoMDB()` 方法，将采购订单发送到处理服务。一旦调用完成，该过程变为异步，并向客户端应用发送一条消息，告知订单已发送进行处理。


  由于整个方法是在事务上下文中执行的，因此对客户对象以及任何其他受管对象的更改将在事务结束时被持久化。


  ```

  public String processOrder(Customer customer) {

  String processStatus = null;

  if (!em.contains(customer)) {

  customer = em.merge(customer);

  }

  if (customer instanceof Individual) {

  if (!performCreditCheck((Individual) customer)) {

  processStatus = "信用卡号无效或信用检查失败";

  }

  } else if (customer instanceof Distributor) {

  if (!"APPROVED".equals(((Distributor) customer).getMemberStatus())) {

  processStatus = "分销商信用检查被拒绝";

  }

  }

  if (processStatus == null) {

  CustomerOrder order = new CustomerOrder();

  order.setCreationDate(new Timestamp(System.currentTimeMillis()));

  em.persist(order);

  List cartItems = customer.getCartItemList();

  if (cartItems != null) {

  List tempCartItems = new ArrayList();

  for (CartItem cItem : cartItems) {

  OrderItem oItem = new OrderItem();

  int qty = cItem.getQuantity();

  oItem.setQuantity(qty);

  oItem.setOrderDate(new Timestamp(System.currentTimeMillis()));

  oItem.setWine(cItem.getWine());

  Wine tempWine = cItem.getWine();

  Float d = tempWine.getRetailPrice();

  Float price = d * cItem.getQuantity();

  oItem.setPrice(price);

  order.addOrderItem(oItem);

  tempCartItems.add(cItem);

  }

  for (CartItem cartItem : tempCartItems) {

  customer.removeCartItem(cartItem);

  em.remove(cartItem);

  }

  }

  customer.addCustomerOrder(order);

  PurchaseOrder po = new PurchaseOrder();

  po.setCustomer(customer);

  po.setCustomerOrder(order);

  sendPOtoMDB(po);

  processStatus = "采购订单已发送到处理队列进行处理";

  }

  return processStatus;

  }

  清单 7-11

  processOrder 业务方法

  ```


  #### 向订单处理服务发送采购订单


  清单 7-12 展示了 `OrderProcessFacadeBean` 中的 `sendPOtoMDB()` 方法。此业务方法使用了注入的 Java 消息服务（JMS）资源，用于主题连接工厂和主题。创建到主题连接工厂的连接并启动该连接。一旦连接可用，就会创建一个会话，并使用主题创建一个
  `MessageProducer`。创建一个 `ObjectMessage` 来承载 `PurchaseOrder` 对象，并使用 `MessageProducer`
  将 `PurchaseOrder` 发送到主题。


  ```

  private void sendPOtoMDB(PurchaseOrder po) {

  // 现在将采购订单发送到 MDB

  Connection connection = null;

  Session session = null;

  try {

  connection = poTopicCF.createConnection();

  connection.start();

  session = connection.createSession(false, Session.AUTO_ACKNOWLEDGE);

  MessageProducer producer = session.createProducer(poTopic);

  ObjectMessage objMessage = session.createObjectMessage();

  objMessage.setObject(po);

  producer.send(objMessage);

  } catch (JMSException e) {

  e.printStackTrace();

  } finally {

  if (session != null) {

  try {

  session.close();

  } catch (JMSException ex) {

  Logger.getLogger(OrderProcessFacadeBean.class.getName()).log(Level.SEVERE, null,
  ex);

  }

  }

  if (connection != null) {

  try {

  connection.close();

  } catch (JMSException ex) {

  Logger.getLogger(OrderProcessFacadeBean.class.getName()).log(Level.SEVERE, null,
  ex);

  }

  }

  }

  }

  清单 7-12

  sendPOtoMDB 业务方法

  ```


