  ## Java EE 8 与微服务


  当然，Java EE 平台可用于开发微服务。


  总的来说，Java EE 规范集允许 Java 开发人员轻松创建单体应用程序，因为他们无需担心处理诸如扩展、安全、网络处理、事务管理等技术问题。在开发单体应用时，Java
  EE 开发人员只需专注于业务问题。


  但是，开发单体应用时的问题是，应用程序将被结构化为一个包含多个模块的 EAR 文件，包括以下内容：


  *   一个处理集成方面（如 SOAP Web 服务、消息处理等）的 EJB 模块。

  *   一个具有通用持久化层的 EJB 模块，用于通过传统方式（如 JPA、JDBC、JCA 等）访问数据存储。

  *   多个 WAR 模块


  这种情况很容易变得非常复杂，难以开发。而使用 Maven 或 OSGi 等工具，将 Java EE 应用程序模块化（例如微服务），简化了 Java EE 上单体应用的开发，这意味着
  Java EE 开发人员的整个应用程序可以部署在单个 WAR 文件中。


  以下是使用 Java EE 开发微服务的主要优势：


  *   Java EE 极其轻量

  *   开发快速

  *   大多数替代 Java 框架都基于 Java EE API

  *   专注于构建业务功能

  *   生成小巧的 WAR 文件

  *   版本化运行时 – 有助于运维


  Java 中的微服务开发平台包括：


  *   Java EE

  *   Microprofile

  *   OSGI

  *   Vertx

  *   Akka

  *   Dropwizard

  *   等等


  Java EE 微服务构建工具包括：


  *   Maven

  *   Gradle


  微服务创建以下类型的工件：


  *   jar, war, ear, rar 等

  *   Java EE 服务器运行时配置


  接下来，我们将展示一个 Java EE 8 微服务的示例。


