  ## 总结


  在本章中，我们介绍了一些将不同类型的 EJB、JPA 实体和 Web 服务与数据源、JMS 主题和 JavaMail 等资源集成的方法。


  我们研究了虚构葡萄酒商店应用程序的概念设计，并规划了需要构建的组件和服务的设计。我们研究了各个组件和服务，并演示了如何使用不同类型的 EJB 来解决特定的应用程序问题。


  葡萄酒商店应用程序说明了典型后端应用程序的各个部分，其中包括一个利用一系列 JPA 映射的综合持久化单元、与持久化单元中的实体交互的会话 Bean、MDB 以及使用依赖注入的
  Web 服务。


  我们还研究了如何在会话 Bean 和 MDB 中注入各种类型的资源，以及如何使用 MDB 在应用程序中构建异步性。


  此外，我们还探讨了如何处理持久化上下文中的托管实体和分离实体，以及如何将异步模型集成到典型的后端应用程序中。


  最后，我们详细介绍了如何将各个组件和服务打包到模块中，将它们组装到 Java EE 应用程序中，并将其部署到 GlassFish 服务器。


  在下一章中，我们将讨论 EJB 容器提供的事务服务，并探索可在各种应用程序架构中使用的不同类型的事务模型。


  '
- "# 8. 事务管理\n\n围绕企业应用程序设计和开发的大部分工作都涉及如何协调持久化数据流的决策。这包括何时何地缓存数据、何时将其应用到持久化存储（通常是数据库）、如何解决同时访问同一数据的尝试，以及如何解决在发生违反数据库约束的操作时可能出现的错误。可靠的数据库能够在较低级别（数据库层）处理这些问题，但同样的问题也可能存在于中间层（应用服务器）和客户端层，并且通常需要特殊的应用程序逻辑。例如，数据库通过悲观锁定支持提供内置的并发控制，而应用程序可能会选择使用乐观锁定策略来获得更优化的性能结果。\n\
  \n使用 EJB 的主要好处之一是它支持事务管理和安全控制等企业级服务。在本章中，我们将探讨 EJB 如何提供事务服务，以及如何利用这些服务来满足您的特定需求。\n\
  \n为了说明 EJB 提供的功能以及如何使用它，我们将从示例 Apress Wines Online 应用程序中检查一个场景，该场景体现了上述数据流问题。我们将通过展示执行任务的方法来说明\
  \ EJB 的事务支持，这些方法从简单简洁到稍微复杂但更灵活。不过，在深入探讨示例之前，我们将概述 EJB 事务领域中的一些重要事务概念，包括 Java 事务\
  \ API (JTA)、EJB 容器通过声明式 EJB 元数据为您提供的许多灵活的事务选项，以及事务在持久化层中的处理方式。EJB 从一开始就提供了这些基本的事务服务，因此，如果您对这些概念已经熟悉，可以直接跳到示例部分，了解它们如何在涉及\
  \ Java 持久化 API (JPA) 的 EJB 世界中体现。\n\n\n## 什么是事务？\n\n在本节中，我们将探讨以下问题：\n\n*   什么是事务，为什么它对企业应用至关重要？\n\
  *   定义稳健可靠事务的核心 ACID（原子性、一致性、隔离性、持久性）属性是什么？\n*   什么是 JTA，什么是分布式事务，什么是两阶段提交？\n\n\
  事务是一组必须作为一个单元执行的操作。这些操作可以是同步或异步的，可能涉及持久化数据对象、发送电子邮件、验证信用卡以及许多其他事件。一个经典的例子是银行转账，其中一个操作从一个账户扣除资金（即更新数据库表中的一条记录），另一个操作将相同的资金存入另一个账户（更新同一或不同数据库表中的另一行）。从查询这两个账户的外部应用程序的角度来看，绝不能出现这些资金同时在两个账户中可见的情况。也不能存在资金在两个账户中都不可见的时刻。只有当此事务中的两个操作都成功执行后，这些更改才能从另一个应用程序上下文中可见。必须以这种方式作为一个单元一起执行的一组操作，被称为事务。\n\
  \n事务中的操作按顺序或并行执行，通常在一个（相对较短的）时间段内完成。在所有操作都执行完毕后，事务被应用，即提交。如果在事务执行过程中出现错误或其他无效状况，事务可能会被取消，即回滚，并且在该事务上下文中已执行的操作将被撤销。\n\
  \n### 分布式事务\n\n当事务中的操作跨数据库或位于不同计算机或进程上的其他资源执行时，这被称为分布式事务。此类企业级事务需要在所涉及的资源之间进行特殊协调，并且极难可靠地编程。这正是\
  \ JTA 的用武之地，它提供了资源可以实现并绑定以参与分布式事务的接口。\n\nEJB 容器是一个支持 JTA 的事务管理器，因此它可以参与涉及其他 EJB\
  \ 容器以及第三方 JTA 资源（如许多数据库管理系统 (DBMS)）的分布式事务。这减轻了业务应用程序开发人员协调分布式事务的复杂性，使他们能够自由地集成松散耦合的服务，并按照自己的选择在企业中分布数据。此外，正如您将在以下各节中看到的，EJB\
  \ 允许开发人员选择是显式地划分事务边界——通过调用 begin、commit 或 roll back（取消）事务——还是允许 EJB 容器沿着 EJB 方法边界自动执行事务划分。\n\
  \n### 事务的 ACID 属性\n\n不，不是那种迷幻的 Kool-Aid。事务形式多样、规模各异，可能涉及同步和异步操作，但它们都具有一些共同的核心特性，即\
  \ ACID 组件。ACID 指的是定义稳健可靠事务的四个特性：原子性、一致性、隔离性和持久性。表 8-1 描述了这四个组件。\n\n表 8-1\n\n事务的\
  \ ACID 属性\n\n| 特性 | 描述 |\n| --- | --- |\n| 原子性 | 事务由一个或多个作为一组（称为工作单元）执行的操作组成。原子性确保在事务结束时，这些操作要么全部成功执行（成功提交），要么全部不执行（成功回滚）。在事务结束时，如果只有部分操作完成，则违反了原子性。\
  \ |\n| 一致性 | 一致的事务具有数据完整性。一致性确保在事务结束时，数据处于一致状态，从而不会违反数据库约束或逻辑验证规则。 |\n| 隔离性 | 事务隔离性规定外部世界无法看到事务的中间状态。查看事务中涉及的数据对象的外部程序，在事务提交之前不得看到修改后的数据对象。事务隔离性本身是一门复杂的科学，在很大程度上超出了本讨论的范围，但可以说，EJB\
  \ 服务器提供商通常提供可配置的隔离设置，让您可以选择事务范围内的资源彼此看到对方待定更改的程度，以及在上下文事务期间外部提交的更改（脏读）的程度。没有标准的隔离设置，因此可移植的应用程序不应依赖其运行时环境中的特定配置。\
  \ |\n| 持久性 | 正确执行的事务是永久性的，不会受到任何系统故障的影响。将数据提交到关系数据库中（随后可以查询结果）通常可以实现这一要求。 |\n\n\
  自然，EJB 满足了所有这些要求，我们将在后续示例中指出如何处理每一项。\n\n### Java 事务 API (JTA)\n\nJTA 为客户端和事务感知的资源管理器定义了一个接口，以参与容错的分布式事务。EJB\
  \ 自动绑定到这些服务，因此客户端和企业 Bean 都可以方便地参与分布式编程，而无需显式编写诸如两阶段提交协议之类的逻辑。EJB 进入其 JTA 事务的主要接口是通过\
  \ `javax.transaction.UserTransaction` 对象接口，该接口由 EJB 容器实例化，并可通过注入到企业 Bean 类或通过 Java\
  \ 命名和目录接口 (JNDI) 查找获得。\n\n### 两阶段提交协议\n\n如果您使用关系数据库编写过逻辑，您可能熟悉两阶段提交协议。该策略赋予参与分布式事务的资源管理器否决权，通过“准备”命令通知它们即将发出提交，并允许它们声明是否可以应用其更改。只有当所有资源管理器一致同意它们已准备好应用其更改时，事务管理器才会下达最终命令来实际应用更改。通常，资源管理器在“准备”步骤中执行大部分更改，因此最终的“提交”步骤执行起来微不足道。这降低了在“提交”步骤中发生错误的可能性。稳健的事务管理器和资源管理器甚至能够处理这种意外情况。\n\
  \n\n\n## EJB 中的事务支持\n\n本节将探讨以下问题：\n\n*   企业 Bean 开发者可以使用哪些事务服务？\n*   会话 Bean、消息驱动\
  \ Bean (MDB) 和实体在事务上下文中如何交互？\n\nEJB 服务器中的大部分基础设施都致力于支持这些服务，这并非没有道理。EJB 不仅提供了一个健壮的\
  \ JTA 事务管理器，还通过可在可互操作、可移植的业务组件上指定的声明性元数据使其易于访问。几乎所有 Java EE 应用程序都需要事务服务，而 EJB 以一种非常简洁的方式将它们提供给应用程序开发者。\n\
  \n从其诞生之初，EJB 框架就提供了一种便捷的方式来管理事务和访问控制，它允许你基于每个方法以声明方式定义行为。除了这些容器提供的服务之外，EJB 还允许你将控制权交给应用程序，以定义事务事件边界和其他自定义行为。\n\
  \n在本章中，我们将探讨事务在应用程序中完成一系列常见任务时所扮演的角色。在一个典型的 Java EE 应用程序中，会话 Bean 通常用于建立事务边界，并操作实体以在事务上下文中与数据库交互。我们的示例混合了会话\
  \ Bean 和实体操作，以说明 EJB 提供的内置（声明式）和手动行为。本着简化开发模型的精神，EJB 默认提供了许多最有用的特性，因此默认事务选项既实用又强大也就不足为奇了。\n\
  \n### EJB 事务服务\n\nEJB 事务模型构建于 JTA 模型之上，在该模型中，会话 Bean 或其他应用程序客户端提供事务上下文，企业服务作为逻辑工作单元在其中执行。Java\
  \ EE 环境中通常在事务上下文中运行的企业服务包括：创建、检索、更新和删除实体；向队列发送 JMS 消息；执行 MDB；触发电子邮件请求；调用 Web 服务；执行\
  \ JDBC 操作等等。\n\nEJB 提供了一个内置的 JTA 事务管理器，但真正的力量在于 EJB 为 Bean 提供者提供的声明式服务。通过使用元数据标签而非编程逻辑，EJB\
  \ 开发者可以无缝地参与 JTA 事务，并以声明方式控制企业 Bean 上每个业务方法的事务行为。\n\nEJB 通过为 JTA 事务和非 JTA（资源本地）事务提供显式支持来扩展此编程模型。资源本地事务仅限于单个资源管理器（例如数据库连接），但可以通过避免分布式事务监视器的开销来实现性能优化。\n\
  \n此外，应用程序构建者可以利用容器提供的服务来自动管理事务，或者他们可以选择控制事务边界并显式处理事务的开始、提交和回滚事件。在单个应用程序中，如果需要，可以结合使用这两种方法。虽然选择由容器还是应用程序本身来划分事务是在企业\
  \ Bean 上定义的，但决定对 JPA 实体使用哪种事务模型（JTA 或资源本地）则取决于 `persistence.xml` 文件中持久化单元的配置方式。\n\
  \n游戏中的持久化对象——实体——完全且愉快地对其管理事务框架一无所知。实体运行的事务上下文不是其定义的一部分，因此，只要创建了适当的 `EntityManager`\
  \ 来服务实体的生命周期事件，同一个实体类就可以在应用程序选择的任何事务上下文中使用。\n\n如果这一切在此时看起来有点令人生畏，请不要担心。一旦我们通过一些代码示例来演示所有部分如何协同工作，一切都会变得清晰。同样值得注意的是，EJB\
  \ 内置的容器管理事务 (CMT) 支持对于在 EJB 容器内运行的大多数应用程序来说已经足够。本章将让你探索各种选项——但除非你编写的应用程序涉及完全在 EJB\
  \ 容器之外运行的实体，否则默认支持很可能很好地满足你的需求。\n\n## 服务模型中会话 Bean 的事务行为\n\n下一节将探讨以下问题：\n\n*   EJB\
  \ 容器为会话 Bean 提供了哪些声明式事务支持？\n    *   容器管理事务 (CMT) 划分和 Bean 管理事务 (BMT) 划分有什么区别？你会在什么情况下选择其中一种方法？\n\
  \    *   什么是 CMT 属性？\n    *   EJB 如何使用 Bean 管理事务 (BMT) Bean 来支持事务边界的显式划分？\n*   隐式提交行为与显式提交行为有何区别？\n\
  \n企业 Bean 是 EJB 服务层的核心。通过会话 Bean，EJB 容器提供了事务事件的声明式划分，以及选择在 Bean 或应用程序客户端代码中显式划分事务事件的选项。让我们分别考虑这两种方法，从默认选项开始：利用声明式标记进行容器管理的事务划分。\n\
  \n\n\n### 容器管理事务（CMT）边界划分\n\nEJB 容器提供了内置的事务管理服务，会话 Bean 和消息驱动 Bean（MDB）默认可以使用这些服务。Bean\
  \ 通过元数据（使用注解或 XML）为其每个方法指定事务特性，EJB 容器遵循这些指令来确定要执行的事务操作（如果有的话）。利用这些指令，EJB 容器可以在方法被调用时自动开始一个新事务，或者挂起或重用现有事务，并可能在方法返回调用者之前提交该事务。\n\
  \n注意\n\n只有 Bean 开发者可以为企业 Bean 分配事务管理类型。允许应用程序组装者通过 `ejb-jar.xml` 文件覆盖 Bean 的方法级容器管理事务属性，但他们必须谨慎操作以避免死锁的可能性。通常不允许应用程序组装者和部署者覆盖\
  \ Bean 的事务管理类型。\n\n当 EJB 在元数据中声明其事务行为时，容器会拦截对企业 Bean 方法的调用，并在会话 Bean 的方法边界应用事务行为，提供一组固定的选项供你为每个方法指定。容器提供的默认行为（即未指定其他指令时）是在调用方法之前立即检查当前线程是否关联了事务上下文。如果没有可用的事务上下文，容器会在执行方法之前开始一个新事务。如果存在可用的事务，容器会允许该事务传播到方法调用，并使其对方法代码可用。然后，在从方法调用返回时，容器会再次检查。如果容器负责创建了新的事务上下文，它会在方法退出后自动提交该事务。如果容器没有创建该事务，则允许该事务不受影响地继续执行。通过拦截\
  \ Bean 的方法调用，EJB 容器能够在运行时应用开发时声明式指定的事务行为。\n\n上一段描述的默认行为只是容器提供的六种 CMT 边界划分选项之一。你可以将这六种边界划分选项中的任意一种分配给会话\
  \ Bean 上的任何方法。某些属性值需要满足特定条件；当条件不满足时，会抛出异常。这六个属性列在表 8-2 中。\n\n表 8-2\n\n容器事务属性定义\n\
  \n| 事务属性 | 行为 |\n| --- | --- |\n| `MANDATORY` | 调用方法时必须存在一个有效的事务。如果没有可用的事务，则抛出 `javax.ejb.EJBTransactionRequired`\
  \ 异常。该方法执行期间此事务保持有效，并且在将控制权返回给调用者时保持活动状态。 |\n| `REQUIRED` | 这是默认的事务属性值。进入方法时，如果尚无可用的上下文，容器会介入创建一个新的事务上下文。如果容器在进入方法时创建了事务，则会在方法调用完成时提交该事务。如果已经存在一个有效的事务，容器在将控制权返回给客户端之前不会提交它。\
  \ |\n| `REQUIRES_NEW` | 容器在执行标记为此属性的方法之前总是创建一个新事务。如果在调用方法时已经存在一个事务上下文，则容器会将该事务与当前线程分离以挂起它，然后再创建新事务。在提交中间事务后，容器会将原始事务重新关联到当前线程。\
  \ |\n| `SUPPORTS` | 此选项基本上是一个空操作，不会导致容器执行额外工作。如果存在事务上下文，则方法会使用它。如果没有可用的事务上下文，则容器会在没有事务上下文的情况下调用该方法。退出方法时，任何预先存在的事务上下文保持有效。\
  \ |\n| `NOT_SUPPORTED` | 容器在未指定事务上下文的情况下调用该方法。如果在调用方法时存在事务上下文，则容器会在调用方法之前将该事务与当前线程分离，然后在从方法返回时将该事务重新关联到线程。\
  \ |\n| `NEVER` | 调用方法时不得带有事务上下文。容器在调用方法之前不会创建事务上下文，如果已经存在一个有效的事务，容器会抛出 `javax.ejb.EJBException`。\
  \ |\n\n注意\n\n通常，事务属性可以在会话 Bean 的业务接口方法或 Web 服务端点接口上指定，也可以在 MDB 的监听器方法上指定，但在特定情况下会有一些额外的限制。此类细节超出了本书的范围，但可以在\
  \ EJB 核心契约与需求规范中找到。\n\n所有六个属性通常都可用于会话 Bean 方法，尽管某些属性在会话超时回调方法上不可用，或者当会话 Bean 实现\
  \ `javax.ejb.SessionSynchronization` 时不可用。MDB 仅支持 `REQUIRED` 和 `NOT_SUPPORTED` 属性。以下是一个示例，说明如何在会话\
  \ Bean 方法上指定事务行为以覆盖在 Bean 级别指定（或默认）的事务行为：\n\n```\n@TransactionAttribute(TransactionAttributeType.SUPPORTS)\n\
  public CustomerOrder createCustomerOrderUsingSupports(Customer customer)\nthrows\
  \ Exception { ... }\n```\n\n表 8-3 展示了 EJB 的事务行为，该行为取决于其事务属性以及在调用会话方法时是否存在事务上下文。对于每个事务属性，我们在单独的行中列出了当客户端事务不存在（None）和当客户端事务存在（Tc）时的方法体和资源事务上下文。每当为方法执行期间创建新事务（Tm）时，该事务总是在控制权返回给调用者之前由\
  \ EJB 容器提交。表中同时显示了与方法体代码关联的事务以及与该方法使用的资源关联的事务。\n\n表 8-3\n\n六种事务属性对应的客户端和 Bean 事务状态\n\
  \n| 事务属性 | 客户端的事务 | 与业务方法关联的事务 | 与资源管理器关联的事务 |\n| --- | --- | --- | --- |\n| `MANDATORY`\
  \ | 无 | 错误 | 不适用 |\n|   | Tc | Tc | Tc |\n| `NEVER` | 无 | 无 | 无 |\n|   | Tc | 错误\
  \ | 不适用 |\n| `NOT_SUPPORTED` | 无 | 无 | 无 |\n|   | Tc | 无 | 无 |\n| `REQUIRED` | 无\
  \ | Tm | Tm |\n|   | Tc | Tc | Tc |\n| `REQUIRES_NEW` | 无 | Tm | Tm |\n|   | Tc\
  \ | Tm | Tm |\n| `SUPPORTS` | 无 | 无 | 无 |\n|   | Tc | Tc | Tc |\n\n表 8-3 展示了容器如何拦截具有\
  \ CMT 边界划分的方法，从而为每个事务属性以不同方式传播事务上下文。该表还说明了在 Bean 方法中使用的事务上下文总是会依次传播给该 CMT Bean 方法所调用的其他方法。请注意，企业\
  \ Bean 的客户端本身可能是另一个企业 Bean。\n\n\n\n#### EJBContext.setRollbackOnly 与 getRollbackOnly\
  \ 方法\n\n在采用容器管理事务（CMT）的企业 Bean 方法中，如果遇到异常或其他错误情况，该 Bean 可能希望阻止上下文事务被提交。\n\n在使用容器管理事务时，可以通过以下方式使用\
  \ `MessageDrivenContext` 方法：\n\n*   `setRollbackOnly`：此方法可用于错误处理。\n*   `getRollbackOnly`：此方法可用于测试当前事务是否已被标记为回滚。\n\
  \nBean 不允许显式回滚事务，但它可以获取 `javax.ejb.EJBContext` 资源（通过容器注入或 JNDI 查找），并调用其 `setRollbackOnly()`\
  \ 方法，以确保容器不会提交该事务。类似地，Bean 方法可以随时调用 `EJBContext.getRollbackOnly()` 方法，以确定当前事务是否已被标记为回滚——无论是由当前\
  \ Bean、其他 Bean 还是与当前事务关联的资源所标记。\n\n### Bean 管理事务（BMT）划分\n\n对于某些企业 Bean，声明式的 CMT\
  \ 服务可能无法提供它们所需的划分粒度。例如，客户端可能希望调用会话 Bean 上的多个方法，而不希望每个方法在完成后都提交其工作。在这种情况下，客户端有几种选择：它可以实例化自己的\
  \ JTA（或资源本地）事务，从而显式控制事务的开始/结束边界；它可以编写一个自定义的 CMT 会话 Bean，将工作封装在一个事务性 Bean 方法内，并在容器管理的事务中执行这些步骤；或者，它可以通过使用\
  \ EJB 上下文中可用的事务资源来显式控制事务划分。\n\nEJB 为企业 Bean 提供了后一种选项——称为 Bean 管理事务（BMT）支持——作为处理其事务事件划分的便捷方式。要关闭自动的\
  \ CMT 划分服务，企业 Bean 只需指定 `@TransactionManagement(TransactionManagementType.BEAN)`\
  \ 注解，或在 `ejb-jar.xml` 文件中将会话 Bean 分配等效的元数据。使用 BMT 划分时，EJB 容器仍然通过 Bean 的 `EJBContext`\
  \ 对象中可用的 `UserTransaction` 对象，为 Bean 提供事务支持。主要区别在于，Bean 代码显式调用 begin、commit 和 rollback\
  \ 事务，而不是使用 CMT 属性以声明方式为其方法分配事务行为。容器不会干预 BMT 方法来开始和提交事务，也不会将客户端开始的事务传播给选择自行划分事务的\
  \ Bean。虽然任何给定的企业 Bean 必须为其方法选择一种方案（CMT 与 BMT 划分），但两种类型的 Bean 可以在单个事务上下文内相互交互。\n\n\
  为了划分事务，企业 Bean 通过注入获取一个 `EJBContext`（即，对于会话 Bean 是 `SessionContext`，对于 MDB 是 `MessageDrivenContext`）资源：\n\
  \n```\n@Resource\nSessionContext sessionContext;\n```\n\n然后通过此资源获取一个 JTA `javax.transaction.UserTransaction`\
  \ 实例：\n\n```\nUserTransaction txn = sessionContext.getUserTransaction();\n```\n\n\
  这个由 EJB 容器提供的 `UserTransaction` 接口为 Bean 提供了 `begin()`、`commit()` 和 `rollback()`\
  \ 事务划分方法。类似地，非企业 Bean 客户端可以从 EJB 容器之外的 JTA 服务器获取 `UserTransaction` 资源，以从应用程序客户端环境划分事务，或者它们可以使用通过\
  \ `EntityManager` 获取的非 JTA 资源本地 `EntityTransaction`（见下文）。然而，无论它们如何开始事务，当它们调用会话 Bean\
  \ 方法时，该事务都会成为上下文中的事务，并且表 8-3 中的规则适用。\n\n在我们即将研究的示例中，一个使用 `EXTENDED` 持久化上下文和 BMT\
  \ 划分的有状态会话 Bean 在一个方法中启动一个事务，该事务随后传播到后续的方法调用，直到该事务最终在另一个方法中被提交。这种行为的实现，无法通过在 CMT\
  \ 会话 Bean 上分别调用这些方法并采用相同的方法结构来达成，尽管可以通过将这些单独的调用包装在 CMT 会话 Bean 的单个 CMT 划分的自定义方法内来实现相同的结果。\n\
  \n注意\n\nEJB 服务器如何连接事务上下文？您可能对 EJB 服务器如何能够自动将数据库连接以及在企业 Bean 内部以编程方式获取的其他资源注册到事务上下文中感到好奇。由于\
  \ EJB 服务器为执行 Bean 方法提供了上下文，它能够干预这些请求并执行这种副作用逻辑，而不会中断方法内的执行流程。也就是说，它在方法调用执行之前进行拦截；执行一些额外的工作（例如检查事务上下文的状态，可能创建一个新事务，并将企业\
  \ Bean 与该上下文关联）；然后调用 Bean 方法。从 Bean 方法调用返回后，它再次有机会执行额外的逻辑，例如提交在调用该方法时创建的事务，然后再将控制权返回给最初调用该\
  \ Bean 方法的客户端。\n\n当我们使用 Bean 管理事务时，将消息投递到 `onMessage` 方法的过程发生在 JTA 事务上下文之外。\n\n\
  该事务将：\n\n*   在我们于 `onMessage` 方法内调用 `UserTransaction.begin` 方法时开始，并且\n*   在我们调用\
  \ `UserTransaction.commit` 或 `UserTransaction.rollback` 时结束。\n\n请注意，任何对 `Connection.createSession`\
  \ 方法的调用都应在事务内进行。\n\n### 隐式提交与显式提交\n\n使用 CMT 时，容器要求其在调用方法时开始的任何事务，都必须在方法返回给调用者时结束。这被称为隐式提交行为，有时也称为自动提交行为。容器必须强制执行此规则，否则当控制权沿进程堆栈向上传递时，可能会丢失对事务的跟踪。虽然您仍然可以使用\
  \ CMT 的容器管理事务来允许在单个事务内调用多个方法，但您必须通过将方法调用包装在外部容器管理的方法中来实现这一点。从客户端的角度来看，这仍然是对包装器方法的单个方法调用。\n\
  \n当对有状态会话 Bean 使用 BMT 时，您可以灵活地实现显式提交模型，其中 Bean 或客户端可以控制事务的开始和结束，并在此期间显式调用多个方法，最后通过显式调用\
  \ commit 或 rollback 来结束工作。这给客户端或 Bean 开发者带来了负担，以确保事务不会悬空。然而，如果处理得当，当应用程序需要这种行为时，这将是一个强大的工具。如前所述，EJB\
  \ 为会话 Bean 和 MDB 提供了一个内置事务供其使用——`javax.transaction.UserTransaction`——Bean 可以通过其注入的\
  \ `javax.ejb.EJBContext` 属性（作为 `SessionContext` 或 `MessageDrivenContext` 实例）访问该事务。\n\
  \n我们将在本章末尾的示例应用程序中进一步探讨隐式和显式提交行为。\n\n\n\n## 在 JPA 实体中使用事务\n\n本节将讨论以下问题：\n\n*   在持久化层中，事务是如何管理的？\n\
  *   持久化框架提供了哪些选项来控制涉及实体的事务？\n*   持久化上下文在事务中扮演什么角色？\n*   实体是如何与事务上下文关联和解除关联的？\n\n\
  如果你还记得第 3 章的内容，持久化单元定义了一组实体类，而持久化上下文则是来自单个持久化单元的一组受管理的实体实例。在任何时刻，跨应用服务器中执行的多个应用程序，许多持久化上下文可能活跃地与任何给定的持久化单元相关联，但每个持久化上下文最多与一个事务上下文相关联。\n\
  \n### 实体与事务上下文之间的关系\n\n从前面关于 EJB 服务器如何作为事务协调器将资源与事务上下文关联起来的讨论中，你可能已经意识到，持久化上下文就是与事务关联的资源。通过这种方式，持久化上下文通过方法调用进行传播，以便持久化单元中的实体，当它们与同一个事务上下文关联时，可以通过它们共同的持久化上下文看到彼此的中间状态。此外，对于任何给定的持久化单元，只能有一个持久化上下文与给定的事务上下文相关联，这一限制确保了对于任何标识为\
  \ `I` 的类型为 `T` 的实体，其状态在任何事务上下文中都只会由一个持久化上下文来表示。\n\n在一个应用程序线程中，任何时刻都只有一个事务上下文可用，但\
  \ EJB 服务器可以自由地将一个持久化上下文与该线程解除关联，并为同一个持久化单元关联一个新的持久化上下文，以满足事务隔离边界。当 EJB 服务器这样做时，新实例化的持久化上下文将无法看到对与挂起的持久化上下文关联的任何实体所做的中间更改。\n\
  \n### 容器管理 vs. 应用程序管理的持久化上下文\n\nEJB 中的持久化服务允许你完全放弃容器管理的持久化上下文，并在应用程序代码中显式管理持久化上下文的生命周期。当注入（或通过\
  \ JNDI 获取）一个 `EntityManager` 实例时，它作为一个容器管理的持久化上下文出现。容器会自动将容器管理的持久化上下文与使用 `EntityManager`\
  \ 时恰好处于上下文中的任何事务关联起来，并在事务结束时销毁该持久化上下文（有一个例外——请参见下面的扩展持久化上下文）。如果应用程序希望控制其持久化上下文如何或是否与事务关联，以及它是否能在事务边界之后继续存在，它可以获取一个\
  \ `EntityManagerFactory`（同样通过容器注入或 JNDI 查找），并显式创建管理其持久化上下文的 `EntityManager` 实例。当通过\
  \ `EntityManagerFactory` 获取 `EntityManager` 时，使用的是应用程序管理的持久化上下文——这是在 Java EE 容器外部运行时的要求。有关在\
  \ Java EE 容器外部（例如在纯 Java SE 环境中）使用应用程序管理的 `EntityManager` 的更多信息，请参见第 4 章。\n\n###\
  \ 事务范围的持久化上下文 vs. 扩展持久化上下文\n\n在事务创建时创建、在事务结束时销毁的持久化上下文，称为事务范围的持久化上下文。这是与无状态会话 Bean\
  \ 上使用的所有 `EntityManager` 关联的持久化上下文的行为。\n\n对于有状态会话 Bean，存在一种特殊形式的容器管理 `EntityManager`，它不与事务的生命周期绑定，而是与有状态会话\
  \ Bean 自身的生命周期绑定。这被称为扩展的 `EntityManager`，它的行为很像应用程序管理的持久化上下文，但 EJB 容器方便地管理其生命周期。由于扩展持久化上下文不会像事务范围的持久化上下文那样在每个事务结束时被销毁，因此即使实体已与数据库同步，它们也可以保持在受管理状态。在某些情况下，这避免了在提交后如果希望继续使用它们时，需要重新查询它们或以其他方式获取受管理实例。在会话式环境（例如\
  \ Web 应用程序）中，这可能非常有用。扩展持久化上下文会保持打开状态，直到其上下文中的有状态会话 Bean 被销毁。只有有状态会话 Bean 才能使用扩展持久化上下文。在创建\
  \ `EntityManager` 实例时，其持久化上下文类型就已定义，并且在 `EntityManager` 的生命周期内不能更改。默认类型是事务范围的；要通过指定扩展持久化上下文来注入\
  \ `EntityManager`，你可以使用以下指令指定注入：\n\n```\n@PersistenceContext(unitName=\"WineAppUnit\"\
  , type = PersistenceContextType.EXTENDED)\nprivate EntityManager em;\n```\n\n或者你可以在\
  \ XML 描述符中定义一个 `persistence-context-ref` 元素。\n\n在本章末尾的事务示例中，我们将比较使用事务范围持久化上下文的无状态会话\
  \ Bean 与使用扩展持久化上下文的有状态会话 Bean 的行为。\n\n### JTA vs. 资源本地的 EntityManager\n\n`EntityManager`\
  \ 可以被定义为参与 JTA 事务或非 JTA（资源本地）事务。JTA 的特性——最显著的是对分布式事务的支持——以及 Bean 与 JTA 事务的接口 `javax.transaction.UserTransaction`\
  \ 的使用，之前已经描述过。资源本地的 `EntityManager` 使用 `javax.persistence.EntityTransaction` 接口来服务事务，该接口可通过\
  \ `EntityManager.getEntityTransaction()` 方法提供给客户端。该接口暴露了预期的事务划分方法 `begin()`、`commit()`\
  \ 和 `rollback()`，以及 `getRollbackOnly()` 和 `setRollbackOnly()` 方法（这些方法等同于之前描述的企业\
  \ Bean 可用的 `EJBContext` 和 `UserTransaction` 方法），还有一个 `isActive()` 方法，用于指示事务当前是否正在进行中。\n\
  \n容器管理的 `EntityManager` 必须是 JTA `EntityManager`。应用程序管理的 `EntityManager` 可以是 JTA\
  \ 或资源本地的，但只有当 `EntityManager` 位于 Java EE 环境中时，它们才能是 JTA `EntityManager`。\n\n你可能想要使用资源本地\
  \ `EntityManager` 的一个原因是，虽然 JTA 提供了分布式事务的基础设施，但资源本地事务可以通过消除这种基础设施的开销来提供性能优化。另一个原因是，你可能希望在独立的\
  \ Java SE 环境中使用你的 JPA 实体，而该环境不支持 JTA 和/或数据源资源。\n\n在本章后面剖析示例应用程序中的 Java 外观时，我们将研究\
  \ `EntityTransaction` 的使用。\n\n\n\n## 两个示例场景\n\n以下两个示例场景使用了为 Wines Online 应用程序定义的持久化单元中的实体，我们在第\
  \ 7 章中对此进行了探讨。第一个场景使用了一个无状态的 CMT 会话 Bean，利用了 EJB 容器提供的声明式事务服务。第二个场景展示了在使用有状态的 BMT\
  \ 会话 Bean 时，Bean 和客户端如何显式地管理事务。在本章末尾，你将找到使用 NetBeans 在 GlassFish 中构建、部署和测试这些示例的分步说明。现在，我们将分析源文件，并讨论\
  \ EJB 和 JPA 在事务环境中交互的不同方式。\n\n### 使用 CMT 边界的无状态会话 Bean\n\n我们从无状态会话 Bean `OrderProcessorCMTBean.java`（如清单\
  \ 8-1 所示）的一个默认、直接的实现开始。此会话 Bean 使用 CMT 边界来利用 EJB 的声明式事务支持。紧随其后的是一个简单的 Servlet 客户端\
