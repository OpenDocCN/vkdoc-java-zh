  commitTransaction();\nreturn strBuf.toString();\n}\n/**\n* 根据客户购物车中的商品创建新的 CustomerOrder。创建一个新的\
  \ CustomerOrder 实体，\n* 然后为在客户购物车中找到的每个 CartItem 创建一个新的 OrderItem 实体。\n*\n* 使用 CMT\
  \ 和默认的 Required 事务属性，如果此方法在没有事务上下文的情况下被调用，\n* EJB 容器将在调用该方法时创建一个新事务，并在成功完成该方法时提交该事务。\n\
