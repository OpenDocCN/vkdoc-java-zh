  \ Telnet 设备）也被用来运行这些应用程序。运行在浏览器或移动设备中的 Web 应用程序使用诸如 JavaServer Pages (JSP)、JavaServer\
  \ Faces (JSF) 或 Java Servlet 等 Web 技术来渲染用户界面。典型的用户操作，例如输入搜索条件或向购物车添加商品，将通过上述一种 Web\
  \ 技术调用/调用运行在 EJB 容器中的会话 Bean。一旦会话 Bean 被调用，它们会处理请求，并发送回响应。\n\n![A311833_3_En_12_Fig1_HTML.jpg](img/A311833_3_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1\n\n基于 Web 的应用程序架构\n\n这种架构允许你利用会话 Bean 的所有优势，例如封装与实体的交互、管理事务和安全性等。缺点是，你需要一个\
