  \ 会话 Bean 的 Servlet\n```\n\n#### 事务分析\n\n以下部分将从事务角度分析此测试运行。\n\n\n\n##### 通过事务性 Java\
  \ 外观填充测试数据\n\nServlet 客户端首先会清空数据。CMT Bean 的客户端不会创建事务，也不会关心事务细节。它将所有工作委托给 CMT 会话\
  \ Bean（并间接委托给）一个 Java 外观，并依赖它们在事务上下文中执行工作。客户端首先调用第 7 章示例应用程序中的 `PopulateDemoData`\
  \ 类，这是一个辅助类，它委托给一个使用应用程序管理的 `EntityManager` 的 Java 外观，以重置演示数据，为新的测试运行做准备。我们首先提供这个示例，是为了观察在应用程序管理的\
  \ `EntityManager` 上下文中事务的原始用法。稍后我们将检查 EJB 会话 Bean 的行为。\n\n```\n//  创建并持久化一批 JPA\
  \ 实体，用数据填充数据库\nout.print(\"正在填充演示数据... \");\nPopulateDemoData.resetData(\"Chapter07-WineAppUnit-ResourceLocal\"\
  , System.out);\nout.println(\"完成\");\n```\n\nPopulateDemoData 类如清单 8-3 所示：\n\n```\n\
  public class PopulateDemoData {\npublic static final String FROM_EMAIL_ADDRESS;\n\
