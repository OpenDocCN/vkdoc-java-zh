  \ 类型的属性 `cartItems`，并带有访问器方法。在 getter 方法中，我们从 `Login` 托管 bean 中检索 `Customer` 对象和\
  \ `ShoppingCart` 有状态 EJB 的实例，并调用返回购物车项目列表的业务方法 `getAllCartItems()`。第二个方法 `ProcessOrder()`\
  \ 也从 `Login` 托管 bean 中检索 `ShoppingCart` 有状态 EJB 的实例，并在后端应用上调用 `ProcessOrder` 业务方法，以在\
  \ JSF 应用端完成订单。成功执行后，`JSFShoppingCart` 中的 `ProcessOrder()` 方法返回 `success` 作为值，用于导航回应用的主页。\n\
