- '# 6. EJB、Web 服务与微服务


  本章将解释 Java EE 8 Web 服务与微服务及其区别。我们将介绍核心 Web 服务标准（SOAP、WSDL、UDDI、XML），并讨论 Java EE
  平台中 Web 服务和微服务支持的演变。我们还将深入探讨如何将 EJB 无状态会话 Bean 发布为 Web 服务，以及如何从命令行 Java 客户端程序和无状态会话
  Bean 调用已发布的 Web 服务。最后，我们将展示一个使用 Spring Boot 项目的关于微服务的简短示例。




  ## 什么是 Web 服务？


  Web 服务本质上构成了一种业务逻辑或功能，这些逻辑或功能存在于某个应用程序或模块中，并通过服务接口暴露给客户端应用程序（通常称为服务消费者）。Web 服务的消费者无需了解该
  Web 服务的任何实现细节——客户端仅凭服务接口中提供的信息即可访问或调用该 Web 服务。这种架构从根本上提供了一种松耦合模型，消费者无需了解作为 Web 服务暴露的业务逻辑在实现时所特有的技术或基础设施细节。


  W3C（万维网联盟）的 Web 服务架构工作组为 Web 服务提供了如下定义：


  > Web 服务是一种旨在支持网络上可互操作的机器间交互的软件系统。它拥有一个以机器可处理格式（特别是 WSDL）描述的接口。其他系统通过其描述所规定的方式与该
  Web 服务进行交互，通常使用 SOAP 消息，并借助 HTTP 协议结合 XML 序列化以及其他与 Web 相关的标准进行传输。


  虽然将细节抽象到接口的概念已在多种语言和分布式架构（例如 EJB 和 CORBA）中使用，但 Web 服务的关键区别在于使用标准来描述服务的抽象、调用和注册。


  Web 服务架构遵循“查找-绑定-执行”模型，在该模型中，您在注册中心（UDDI）中找到所需的服务，获取该服务的描述，将其绑定到服务（根据描述创建将发送到服务的消息），最后执行或调用该服务。图
  6-1 展示了“查找-绑定-执行”模型。UDDI、WSDL 和 SOAP 是使这种“查找-绑定-执行”模型无处不在并区别于早期计算模型的标准。


  ![A311833_3_En_6_Fig1_HTML.jpg](img/A311833_3_En_6_Fig1_HTML.jpg)


  图 6-1


  Web 服务架构


  ### UDDI


  统一描述、发现和集成（UDDI）提供了一种基于标准的方法来定位 Web 服务以及获取调用该服务的信息。它还提供了关于该服务的额外元数据。UDDI 帮助您动态绑定
  Web 服务，而无需将它们硬编码到外部接口，并且还有助于提供分类法。企业或服务提供商可以提供基本的联系信息（包括标识）、服务的分类、描述其行为的信息以及 Web
  服务的实际位置。


  目前版本为 3 的 UDDI 在过去几年中不断发展。版本 1 侧重于为服务提供注册中心，而版本 2 侧重于使规范与其他 Web 服务规范和灵活的分类法保持一致。当前版本侧重于为私有或公共服务实现的安全交互提供支持。包括
  Oracle、SAP、Microsoft、IBM、Cisco、Computer Associates 和 Systinet 在内的多家公司都是结构化信息标准促进组织（OASIS）的
  UDDI 技术委员会成员。大多数应用服务器供应商（如 Oracle 和 IBM）要么将 UDDI 注册中心作为其应用服务器的标准组件提供，要么将 OEM 的 UDDI
  注册中心（来自 Systinet 或其他注册中心提供商）作为其中间件平台的一部分提供。


  ### WSDL


  Web 服务描述语言（WSDL），当前版本为 2.0，是一种使用 XML 描述服务接口的技术。WSDL 是由 W3C 开发的标准，过去几年中许多供应商和个人为其做出了贡献。WSDL
  描述了服务做什么、如何调用其操作以及在哪里找到它。


  WSDL 的详细信息可以分为两类：服务接口定义细节和服务实现定义细节。服务接口定义是一种抽象的或可重用的服务定义，可以被多个服务实现定义实例化和引用。它包含以下
