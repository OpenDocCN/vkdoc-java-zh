  一条 SOAP 消息


  ### REST


  REST（表述性状态传递）是一种软件架构模式，它使用 HTTP（超文本传输协议）在分布式和去中心化环境中发现、查询和操作资源。近年来，由于其简单性，REST 比基于
  WSDL-SOAP 的实现更受欢迎。


  使用 REST，客户端通过 URI（统一资源标识符）和标准的 HTTP 方法集（GET、POST、PUT 和 DELETE）访问服务器上的资源。作为响应，服务器返回资源的表述，这实际上是一个包含资源当前或预期状态的文档。在每次访问调用和相应的新资源表述响应之后，客户端被认为进行了状态传递，因此得名表述性状态传递。REST
  架构模式规定了以下六个约束：


  1.  客户端-服务器架构：客户端和服务器应该分离，并且只能通过统一接口进行交互。这种分离意味着客户端不关心服务器的数据存储内部细节，服务器也不关心客户端的用户界面。

  2.  无状态交互：客户端和服务器只能使用像 HTTP 这样的无状态协议进行交互。服务器不能在请求之间存储客户端上下文。所有请求必须包含这些请求所需的所有信息。

  3.  可缓存：服务器响应必须将其自身标识为可缓存或不可缓存。这可用于防止客户端使用过时数据，也有助于提高性能和可扩展性。

  4.  分层系统：客户端应该能够无缝连接到中间系统，而不是直接连接到最终服务器。中间系统提供负载均衡和共享缓存等功能，从而提高系统的可扩展性。

  5.  命名资源：客户端必须能够在每个请求中使用 URI 识别单个服务器资源。

  6.  统一接口：客户端和服务器之间的统一接口允许它们独立演进。


  #### RESTful Web 服务


  RESTful Web 服务是基于上述 REST 原则构建的服务。RESTful Web 服务使用 HTTP 并实现映射到常见 HTTP 方法的操作，如表 6-1
  所示。


  表 6-1


  HTTP 方法到 CRUD 操作的映射


  | HTTP 方法 | CRUD 操作 |

  | --- | --- |

  | `POST` | 创建 |

  | `GET` | 检索 |

  | `PUT` | 更新 |

  | `DELETE` | 删除 |


  清单 6-8 展示了一个名为 `CreditCheck` 的简单 RESTful Web 服务，它接受一个信用卡号作为输入，并根据其有效性返回 `true` 或
  `false`。为简单起见，我们的方法始终返回 `true`。


  ```

  package com.apress.ejb.chapter06.services;

  import javax.ws.rs.Consumes;

  import javax.ws.rs.PUT;

  import javax.ws.rs.Path;

  import javax.ws.rs.PathParam;

  import javax.ws.rs.Produces;

  @Path("creditCheck")

  public class CreditCheck {

  @PUT

  @Consumes("text/plain")

  @Produces("text/plain")

  @Path("isValid")

  public boolean isValid(@PathParam("cardNumber")String ccNumber) {

  return true;

  }

  }

  清单 6-8

  CreditCheck.java

  ```


  用户可以如下调用 `CreditCheck` 中的 `isValid` 方法，并且 `ccNumber` 将被赋值为 12345。


  `http://<host>:<port>/<resource>/creditCheck/isValid/12345`


  #### RESTful 与基于 SOAP 的 Web 服务


  表 6-2 列出了 RESTful Web 服务和基于 SOAP 的 Web 服务之间的重要区别和相似之处。


  表 6-2


  RESTful 与基于 SOAP 的 Web 服务


  | 标准 | SOAP | RESTful |

  | --- | --- | --- |

  | 规范 | JAX-WS | JAX-RS |

  | 简单/复杂 | 复杂 | 简单 |

  | 消息大小 | 大（XML 标记） | 小（无额外 XML 标记） |

  | 基于标准 | 是 | 否 |

  | 传输 | HTTP, SMTP, JMS | HTTP |

  | 缓存 | 否 | GET 操作可被缓存 |

  | 协议 | JMS, SMTP, HTTP | HTTP |

  | 人类可读负载 | 否 | 是 |

  | 语言和平台 | 独立 | 独立 |


  ### 何时使用 Web 服务？


  Web 服务提供了一种标准方式，使用行业标准将现有或新的应用程序和数据暴露给外部各方——包括客户、供应商和合作伙伴——或企业内的不同部门。Web 服务也可用于集成异构应用程序和数据。


  虽然许多企业在内部使用 Web 服务，但也有许多可用的外部 Web 服务示例。一些流行的服务包括包裹跟踪服务（由 FedEx、UPS 和 USPS 等承运商提供）。电子商务网站，如
  [`www.amazon.com`](http://www.amazon.com) 、 [`www.yahoo.com`](http://www.yahoo.com)
  、 [`www.ebay.com`](http://www.ebay.com) 和 [`www.google.com`](http://www.google.com)
  ，通过 Web 服务暴露其核心功能。开发者可以订阅并使用这些电子商务提供商提供的 Web 服务，来开发能够为后端系统增加价值或与其无缝集成的应用程序。


  ## Java EE 8 与 Web 服务


  Java EE 平台在过去几年中已经发展成为一个成熟、稳定、可靠且可用的企业应用平台。虽然像 JDBC（Java 数据库连接）、JMS 和 EJB 这样的技术从一开始就存在于
  Java EE 平台中，但直到 J2EE 1.4，Web 服务的开发和部署才呈现出更好的形态，因为它们已被标准化，使得 Java EE 平台中的 Web 服务在应用服务器之间更具可移植性，并与
  .NET Web 服务可互操作。Java EE 规范的共同目标是为应用程序和服务提供易于开发和部署的特性。Java EE 中与 Web 服务相关的一些关键规范包括
  JAX-WS、JAXB、JAXR、SAAJ 和 JSR 224 注解。在接下来的章节中，我们将展示这些规范是什么，以及它们如何与 EJB 一起使用。图 6-3
  展示了 EJB 如何在 Java EE 平台下与不同的 Web 服务相关规范进行交互。


  ![A311833_3_En_6_Fig3_HTML.jpg](img/A311833_3_En_6_Fig3_HTML.jpg)


  图 6-3


  EJB 与 Web 服务




  ### JAX-WS


  JAX-WS（Java API for XML Web Services）定义了用于从 Java 应用程序和 Java EE 组件（如 EJB）访问 Web 服务的
  Java API 和注解。JAX-WS 提供了 WSDL 与 Java 接口之间，或从 Java 接口到 WSDL 的映射功能。映射到 WSDL 的接口被称为服务端点接口。JAX-WS
  还提供了客户端和服务器端的 API 及注解，用于通过 SOAP 发送和接收 Web 服务请求。Java EE 中的 JAX-WS 规范依赖于 Java EE 平台的其他相关规范（224）和
  JAXB。JAX-WS 的当前版本是 2.3（JSR 224）。它还支持最新的 Web 服务标准，如 SOAP 1.2 和 WSDL 2.0。图 6-4 展示了
  Web 服务调用的简化示意图。


  ![A311833_3_En_6_Fig4_HTML.jpg](img/A311833_3_En_6_Fig4_HTML.jpg)


  图 6-4


  Web 服务调用内部机制


  ### JAX-RS


  JAX-RS（JAX-RS：Java API for RESTful Web Services）定义了用于基于 REST 架构模式创建 Web 服务的 Java
  API 和注解。JAX-RS 1.1 版本通过 JSR-311 成为 Java EE 6 的组成部分。JAX-RS 提供了诸如 `@PATH`、`@GET`、`@PUT`、`@POST`、`@DELETE`、`@HEAD`、`@PRODUCES`、`@CONSUMES`
  等注解，这些注解有助于将 POJO（普通 Java 对象）映射为 Web 资源。JAX-RS 的当前版本是 2.1（JSR 370）。


  ### JAXB


  Web 服务的消费者和提供者使用 XML 消息来发送请求和响应。这些消息可以是类似包含 XSD 的采购订单，这使得相关方（提供者和消费者）能够理解该采购订单。使用底层语言
  API 处理 XML 文档可能耗时且涉及复杂代码。在 Java EE 上下文中，JAXB（Java Architecture for XML Binding）规范提供了标准
  API，用于将 XML 文档表示为 Java 构件，以便开发人员能够基于模式（XSD）处理代表 XML 文档的 Java 对象。JAXB 规范有助于将 XML
  文档解组为 Java 对象集合，并将 Java 对象集合编组回 XML 文档。JAXB 规范为 XML 模式提供全面支持，并为 JAX-WS 提供绑定支持，同时它还利用了其他
  Java EE 规范，如 JSR 175。


  ### JAXR


  UDDI 是 Web 服务注册中心的标准。JAXR（Java API for XML Registries）规范定义了一组标准 API，允许 Java 客户端访问注册中心。这些
  API 也可用于 UDDI 之外的 XML 注册中心。


  ### SAAJ


  类似于可以在电子邮件中使用的附件，你可以向调用 Web 服务的 SOAP 消息发送附件。SAAJ（SOAP with Attachments API for Java）Java
  API for XML Registries 定义了一组标准 API，允许 Java SE 或 EE 组件构建带有附件的 SOAP 消息。


  ### JSR 224


  JSR 224（Java 平台 Web 服务元数据）定义了一组标准注解，可用于简化 Web 服务开发。这些注解可用于 Java 类或可作为 JAX-WS 组件的
  EJB 会话 Bean。JSR 224 补充了旧的 JSR-181 注解。


  ## 作为 Web 服务的 EJB 无状态会话 Bean


  使用 WSDL 描述的 Web 服务端点在本质上是无状态的。无状态会话 Bean 也具有相同的无状态特性，非常适合开发 Web 服务。EJB 规范依赖于 Java
  EE 平台中的其他 Web 服务规范，包括 JAX-WS、JAXB 和 JSR 224，无论是用于消费 Web 服务还是将无状态会话 Bean 发布为 Web
  服务。


  服务端点接口（SEI）是映射到 Web 服务的接口。JAX-WS 提供了这个映射层。为了开发一个新的 Web 服务，你可以采用自底向上或自顶向下的方法，这两种方法将在下面描述。


  在自底向上的方法中，你从一个 SEI 和一个可以发布为 Web 服务的实现开始。在此过程中，Web 服务构件（如 WSDL 文档）会在部署时或通过 Java EE
  应用服务器提供的管理工具或实用程序生成。


  在自顶向下的情况下，你从一个 WSDL 文档开始，并使用实现 JAX-WS 的工具生成一个 SEI。一旦有了 SEI，你就可以为其添加实现。对于 EJB 无状态会话
  Bean，你需要使用 JAX-WS 和 JSR 224 规范中提供的注解来标记业务接口和/或 Bean 类，以便在部署时生成正确的 Web 服务构件集。Java
  EE 规范要求添加到组件中的注解在部署时被处理，以生成正确的构件集。带有 Web 服务注解的 EJB 无状态会话 Bean 也不例外；它们也在部署时由应用服务器提供的部署实用程序处理。每个
  SEI 对应一个无状态会话 Bean。


  ### 开发一个新的 Web 服务


  无状态会话 Bean 使用第 2 章中描述的编程模型来实现。如果你想将一个无状态会话 Bean 作为 Web 服务，你将需要以下类：


  *   一个 Bean 类（实现）

  *   一个 Web 服务端点接口（可选）

  *   如果 Bean 类有本地或远程客户端，则需要额外的业务接口




  #### 创建 Bean 类


  无状态会话 Bean 类是一个标准的 Java 类，带有类级别的 `@Stateless` 注解。从版本 3 开始，EJB 规范不再强制要求 SEI。是否提供
  SEI 以及 Bean 类是可选的。在 Bean 类将作为 Web 服务发布且不包含任何服务端点接口的用例中，Bean 类将额外带有类级别的 `@WebService`
  注解（JSR 224）。`@WebService` 注解位于 `javax.jws` 包中，它将 Bean 类标记为基于 SOAP 的 Web 服务的实现。


  `@WebService` 注解接受表 6-3 中描述的参数。


  表 6-3


  @WebService 注解


  | 参数 | 描述 | 附加信息 |

  | --- | --- | --- |

  | `name` | 映射到 `wsdl:portType` 的 Web 服务名称。 | 如果未指定，则使用 Java 类的名称。 |

  | `targetNamespace` | 用于 Web 服务的 XML 命名空间。 | 如果未指定，则使用 Java 类的名称。 |

  | `serviceName` | 映射到 `wsdl:service` 的 Web 服务名称。 | 如果未指定，则使用 Java 类的名称。 |

  | `wsdlLocation` | WSDL 文档的位置，当 Bean 类实现现有 Web 服务时会派上用场。 |   |


  为了说明一个作为 Web 服务发布的无状态会话 Bean，我们将创建一个 `CreditServiceEndpointBean`，它将作为 `CreditService`
  发布。


  在清单 6-9 中，我们有一个 Java 类 `CreditCheckEndpointBean`，它有两个类级别的注解：`@Stateless` 和 `@WebService`。`@Stateless`
  注解提供了一个额外的参数，将 Bean 标记为 `CreditCheckEndpointBean`。如果同一个类暴露给远程或本地客户端，这些客户端将使用该名称访问无状态会话
  Bean。`@WebService` 注解提供了两个额外的参数：一个将服务名称标记为 `CreditService`，另一个指定目标命名空间（而不是使用默认的
  Java 包结构）。


  ```

  package com.apress.ejb.chapter06.services;

  import javax.ejb.Stateless;

  import javax.jws.WebMethod;

  import javax.jws.WebService;

  @Stateless(name = "CreditCheckEndpointBean")

  @WebService(serviceName = "CreditService", targetNamespace = "http://www.apress.com/ejb/credit")

  public class CreditCheckEndpointBean  {

  public CreditCheckEndpointBean() {

  }

  }

  清单 6-9

  CreditCheckEndpointBean.java

  ```


  JSR 224 中定义的 `@WebMethod` 注解允许你自定义作为 Web 服务操作暴露的方法。如果带有 `@WebService` 注解的 Bean 类中没有指定任何
  `@WebMethod` 注解，那么所有公共方法都将作为 Web 服务操作暴露。


  `@WebMethod` 注解接受表 6-4 中描述的参数。


  表 6-4


  @WebMethod 注解


  | 参数 | 描述 | 附加信息 |

  | --- | --- | --- |

  | `operationName` | 与此方法匹配的 `wsdl:operation` 的名称。 | 默认情况下，这是 Java 方法的名称。 |

  | `action` | 此操作的动作。对于 SOAP 绑定，它将是 `SOAP action` 标头的值。 | 默认情况下，这是 Java 方法的名称。 |


