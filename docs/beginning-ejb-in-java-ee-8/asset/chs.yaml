  ##### 设计时考量\n\n使用 TABLE_PER_CLASS 策略时，当新的最外层具体类型被引入层次结构时，会添加新的表。这很好，因为既不会影响现有表，也不会影响它们的数据。然而，由于每个类型也会映射其所有超类型的字段，因此在基类上引入新字段，或引入新的基实体本身，都需要修改层次结构中所有受影响子类型的表，以映射任何新引入的字段。\n\
  \n##### 性能影响\n\n使用 TABLE_PER_CLASS 方法时，跨多个类型进行查询需要 `UNION` 选择语句，这可能性能不佳，但查询单个类型非常高效，因为查询只涉及一个表。应避免此层次结构中的多态关系（涉及超类型），因为它们必然需要此\
  \ `UNION` 操作来解析为具体的子类型实例。\n\n### O/R 实现方法比较\n\n现在我们已经探讨了三种继承映射实现，让我们看看在选择用于类型层次结构的实现方法时应考虑的类继承层次结构的一些特征。以下列表包含关于您自己的实体层次结构的主观问题。它们没有精确的答案；相反，它们旨在在构建应用程序时激发设计考量。\n\
  \n*   类层次结构可以是静态的，具有固定数量的子类型，也可以是动态的，具有不同数量的子类型。您需要将新子类型纳入层次结构的频率如何？\n*   层次结构可以是深的，包含许多子类，也可以是浅的，只包含少数几个。您的层次结构粒度如何？\n\
  *   层次结构中的类型可能差异很大，子类上的属性集与基类上的属性集非常不同，或者属性差异很小。您的实体的持久属性集彼此之间的差异有多大？\n*   其他实体是否会与此类型层次结构中的类定义关系；如果是，基类是否会经常成为被引用的类型？\n\
  *   此层次结构中的类型是否会被频繁查询、更新或删除？SQL `JOIN` 或 `UNION` 操作的存在与否将如何影响应用程序的性能？\n*   在应用程序的生命周期中，您更新类型层次结构本身的频率如何？这种变更的影响因继承策略而异，需要考虑以下因素：\n\
  \    *   向层次结构添加或删除新类型（例如重构类时）。\n    *   在层次结构中的实体上添加、删除或修改字段。\n*   添加、删除或修改涉及此层次结构中类型的关系。\n\
  \n注意\n\n第 9 章将探讨这三种继承策略的性能比较，以及如何设置自己的性能比较测试的详细信息。请查看我们性能测试的结果；并在构建实体层次结构时对其进行测试，以帮助您决定哪种策略在应用程序上下文中最有意义。\n\
  \n## 在继承层次结构中使用抽象实体、映射超类和非实体类\n\n在实体类层次结构中，JPA 允许混合使用非实体类和抽象类。使用上面的 JOINED 示例，让我们看看如何映射这些类。\n\
  \n### 抽象实体类\n\n如上一节关于继承层次结构所示，JPA 实体可以是具体的，也可以是抽象的。抽象实体只是一个不能单独实例化的实体——它仍然可以参与实体关系和查询，并且其字段会按照其类型层次结构的映射策略进行持久化。清单\
  \ 4-17 是我们一个抽象实体的示例。\n\n```\n/**\n* Person: 一个抽象实体，也是继承层次结构的根\n*/\n@Entity\n@NamedQueries({\n\
  @NamedQuery(name = \"Person.findAll\", query = \"select o from Person o\")})\n@Table(name\
  \ = \"CH04_JOIN_PERSON\")\n@TableGenerator(name = \"Person_ID_Generator\", table\
  \ = \"CH04_JOIN_PERSON_ID_GEN\",\npkColumnName = \"PRIMARY_KEY_NAME\", pkColumnValue\
  \ = \"Person.id\",\nvalueColumnName = \"NEXT_ID_VALUE\")\n@Inheritance(strategy\
  \ = InheritanceType.JOINED)\npublic abstract class Person implements Serializable\
  \ {\n...\n@OneToOne(cascade=CascadeType.ALL)\n@JoinColumn(name = \"HOME_ADDRESS\"\
  )\nprivate Address homeAddress;\n...\n}\n清单 4-17\nPerson.java，JOINED 继承层次结构中的抽象根实体\n\
  ```\n\n抽象的 `Person` 实体不仅可以被查询（这里我们定义了一个名为 `\"Person.findAll\"` 的命名查询），它还持有一个与 `Address`\
  \ 实体的关联，该关联由其所有子类共享。尽管 `Person` 是抽象的，但它可以指定自己的映射和自己的表。只是它不会有自己的鉴别器值，因为永远不会有基类 `Person`\
  \ 的具体实体实例。\n\n\n\n### 映射超类（@MappedSuperclass）\n\n映射超类是一种非实体类，但持久化管理器仍能识别它，并且它可以声明持久化字段及其映射。由于它不是实体，因此不能作为持久化实体关系的目标，也不能在\
  \ JPQL 查询中使用。不过，它可以为任何直接或间接继承它的实体提供通用的持久化属性。从之前的继承示例开始，让我们将根实体 `Person` 转换为一个映射超类。清单\
  \ 4-18 和 4-19 展示了转换后的类。\n\n```\n/**\n* Person: 一个映射超类，也是继承层次结构中的基类（但不是根实体）\n*\n\
  * 创建 ID 生成器表 \"CH04_MS_PERSON_ID_GEN\"：CREATE TABLE\n* \"CH04_MS_PERSON_ID_GEN\"\
  \ (\"PRIMARY_KEY_NAME\" VARCHAR2(4000) PRIMARY KEY,\n* \"NEXT_ID_VALUE\" NUMBER(38));\n\
  *\n* 为此实体的 ID 生成器 'Person.id' 初始化该表的数据\n* （从值 '0' 开始）：INSERT INTO \"CH04_MS_PERSON_ID_GEN\"\
  \ VALUES\n* ('Person.id', 0);\n*/\n@MappedSuperclass\n@TableGenerator(name = \"\
  Person_ID_Generator\", table = \"CH04_MS_PERSON_ID_GEN\",\npkColumnName = \"PRIMARY_KEY_NAME\"\
  , pkColumnValue = \"Person.id\",\nvalueColumnName = \"NEXT_ID_VALUE\")\npublic abstract\
  \ class Person implements Serializable {\n@SuppressWarnings(\"compatibility:-7074714881275658754\"\
  )\nprivate static final long serialVersionUID = 5291172566067954515L;\n@Id\n@Column(nullable\
  \ = false)\n@GeneratedValue(strategy = GenerationType.TABLE, generator = \"Person_ID_Generator\"\
  )\nprivate Integer id;\n@Column(name = \"FIRST_NAME\", length = 400)\nprivate String\
  \ firstName;\n@Column(name = \"LAST_NAME\", length = 400)\nprivate String lastName;\n\
  @OneToOne(cascade=CascadeType.ALL)\n@JoinColumn(name = \"HOME_ADDRESS\")\nprivate\
  \ Address homeAddress;\n@Version\nprivate Integer version;\npublic Person() {\n\
  }\n/* get/set 方法 */\n}\n清单 4-18\nPerson.java，一个抽象映射超类（非实体）\n```\n\n```\n/*\n* Employee:\
  \ 继承层次结构中的根。继承自 Person，一个映射超类。\n*/\n@Entity\n@NamedQueries({\n@NamedQuery(name =\
  \ \"Employee.findAll\", query = \"select o from Employee o\")})\n@Table(name = \"\
  CH04_MS_EMPLOYEE\")\n@Inheritance(strategy = InheritanceType.JOINED)\npublic abstract\
  \ class Employee extends Person implements Serializable {\n@SuppressWarnings(\"\
  compatibility:276774077273820023\")\nprivate static final long serialVersionUID\
  \ = -8529011412038476148L;\n@Column(length = 400)\nprivate String department;\n\
  @Column(length = 400)\nprivate String email;\n@ManyToOne\n@JoinColumn(name = \"\
  MANAGER\")\nprivate FullTimeEmployee manager;\npublic Employee() {\n}\n/* get/set\
  \ 方法 */\n}\n清单 4-19\nEmployee.java，一个 JOINED 实体继承层次结构中的抽象根实体，也是映射超类的子类\n```\n\n\
  `Person` 类变成了一个映射超类（`@MappedSuperclass`），并且去掉了它的 `@NamedQuery`、`@Table` 和 `@Inheritance`\
  \ 注解。`@Inheritance` 被移到了 `Employee` 上，`Employee` 成为层次结构中新的根实体。\n\n虽然映射超类不能作为持久化关系字段的目标引用，但它可以拥有自己的持久化关系字段，因此引用\
  \ `Address` 实体的 `homeAddress` 字段是完全合法的。\n\n还要注意，我们可以继续在映射超类上定义 `@Id` 和 `@Version`\
  \ 字段，甚至可以继续为 `id` 字段指定 ID 生成器。继承此映射超类的实体将这些字段以及映射超类上定义的所有其他字段映射到它们自己的表中。\n\n###\
  \ 非实体类\n\n实体也可以在其类型层次结构中使用非实体类。实体可以继承非实体类，或者非实体类可以继承实体。这些类可以是具体的或抽象的，因此它们可以被实例化，但它们的字段不会被\
  \ JPA 持久化框架持久化或维护。它们也不能参与持久化实体关系或 JPQL 查询。如果类型层次结构中的某个类仅作为其子类的组织构造，并且不涉及实体关系（也没有其他理由将其标记为实体），那么最好将其保留为普通类。以后随时可以通过添加注解或在\
  \ XML 描述符中将其指定为实体来将其转换为实体。\n\n### 非实体单值字段和集合字段\n\n最后，实体可以嵌入一个非实体类或非实体类的集合，供其自身私有使用。此类嵌入引用可以是单个对象或对象集合。单值字段通常是我们已经熟悉的类型：基本对象类型，如\
  \ `String`、`int` 或 `Long`，它们被隐式标记为 `@Basic`。单值字段也可以具有复杂类型，我们对此已经熟悉，即作为实体引用，使用标记为\
  \ `@OneToOne` 或 `@ManyToOne` 的字段。当字段引用复杂的非实体类型时，它们被标记为 `@Embedded`，并且目标类必须使用 `@Embeddable`\
  \ 注解。对非实体对象的集合引用被标记为 `@ElementCollection`，它们可以是 `@Basic` 或 `@Embeddable` 类类型的集合。让我们更仔细地看看这些非实体字段引用。\n\
  \n\n\n#### @Embedded 与 @Embeddable\n\n一个实体或映射超类可以包含标记为 `@Embedded` 的字段，这些字段的类型必须是相应标记为\
  \ `@Embeddable` 的类。与映射超类类似，可嵌入类可以为其持久化字段持有映射元数据。当以这种方式使用时，引用可嵌入对象的字段被标记为 `@Embedded`，而可嵌入类上的字段则映射到所属实体的表。可嵌入类完全由其嵌入类所拥有，并与所属对象一起进行持久化、合并、查询和删除。可嵌入类的实例没有自己的持久化标识，也不能在实体之间传递。它们通常作为一种字段组织工具使用，方便将一组持久化字段封装为所属实体上的单个字段。\n\
  \n举个例子，让我们将 `Address` 实体（清单 4-20）转换为一个可嵌入类，并将其作为 `Person` 实体（清单 4-21）上的一个字段嵌入。图\
  \ 4-5 展示了与我们 `JOINED` 层次结构配置类似的底层模式，不同之处在于 `CH04_JOIN_ADDRESS` 上的数据列已被合并到 `CH04_EMB_PERSON`\
  \ 表中。\n\n![A311833_3_En_4_Fig5_HTML.jpg](img/A311833_3_En_4_Fig5_HTML.jpg)\n\n图\
  \ 4-5\n\n表 CH04_EMB_PERSON 包含 Person 实体中所有字段的列，以及来自嵌入的 Address 的字段\n\n将 `Address.java`\
  \ 转换为 `@Embeddable` 非实体类的过程如清单 4-20 所示。`@Id` 和 `@Version` 字段现已消失，因为 Address 不再拥有自己的标识。`Employee`、`FullTimeEmployee`\
  \ 和 `PartTimeEmployee` 实体与 `JOINED` 层次结构配置相比保持不变。\n\n```\n/**\n* Address: 一个可嵌入的非实体类\n\
  */\n@Embeddable\npublic class Address implements Serializable {\n@SuppressWarnings(\"\
  compatibility:-5340972441524875330\")\nprivate static final long serialVersionUID\
  \ = -5279408726470732092L;\n@Column(length = 400)\nprivate String city;\n@Column(length\
  \ = 2)\nprivate String state;\n@Column(length = 400)\nprivate String street1;\n\
  @Column(length = 400)\nprivate String street2;\n@Column(name = \"ZIP_CODE\")\nprivate\
  \ String zipCode;\npublic Address() {\n}\n/* get/set 方法 */\n}\n清单 4-20\nAddress.java，一个可嵌入的非实体类\n\
  ```\n\n```\n/**\n* Person: 一个抽象实体，也是继承层次结构的根\n*\n* 创建 ID 生成器表 \"CH04_EMB_PERSON_ID_GEN\"\
  : CREATE TABLE \"CH04_EMB_PERSON_ID_GEN\"\n* (\"PRIMARY_KEY_NAME\" VARCHAR2(4000)\
  \ PRIMARY KEY, \"NEXT_ID_VALUE\" NUMBER(38));\n*\n* 为此实体的 ID 生成器 'Person.id' 初始化该表的数据（从值\
  \ '0' 开始）：\n* INSERT INTO \"CH04_EMB_PERSON_ID_GEN\" VALUES ('Person.id', 0);\n\
  */\n@Entity\n@NamedQueries({\n@NamedQuery(name = \"Person.findAll\", query = \"\
  select o from Person o\")})\n@Table(name = \"CH04_EMB_PERSON\")\n@TableGenerator(name\
  \ = \"Person_ID_Generator\", table = \"CH04_EMB_PERSON_ID_GEN\",\npkColumnName =\
  \ \"PRIMARY_KEY_NAME\", pkColumnValue = \"Person.id\",\nvalueColumnName = \"NEXT_ID_VALUE\"\
  )\n@Inheritance(strategy = InheritanceType.JOINED)\npublic abstract class Person\
  \ implements Serializable {\n@SuppressWarnings(\"compatibility:-7074714881275658754\"\
  )\nprivate static final long serialVersionUID = 5291172566067954515L;\n@Id\n@Column(nullable\
  \ = false)\n@GeneratedValue(strategy = GenerationType.TABLE, generator = \"Person_ID_Generator\"\
  )\nprivate Integer id;\n@Column(name = \"FIRST_NAME\", length = 400)\nprivate String\
  \ firstName;\n@Column(name = \"LAST_NAME\", length = 400)\nprivate String lastName;\n\
  @Embedded\nprivate Address homeAddress;\n@Version\nprivate Integer version;\npublic\
  \ Person() {\n}\n/* get/set 方法 */\n}\n清单 4-21\nPerson.java，一个持有 @Embedded homeAddress\
  \ 字段的实体\n```\n\n当持久化一个 `Person` 实例时，其 `homeAddress` 实例上字段的值会被保存到 `CH04_EMB_PERSON`\
  \ 表的列中。\n\n#### @ElementCollection\n\n自 JPA 2.0 引入的一个有用的映射特性是能够在实体或映射超类中嵌入非实体对象的集合，并使这些集合完全由嵌入类所拥有。`@ElementCollection`\
  \ 是使用 `@Embeddable` 和 `@Basic` 字段的集合对应物；只是集合中的实例始终存储在独立于所属实体或映射超类的表中。同样，它也是实体关系类型\
  \ `@OneToMany` 的非实体对应物。清单 4-22 展示了我们的 Employee 实体持有两个元素集合：一个是 `@Embeddable` 实例的集合，另一个是\
  \ `@Basic` 实例的集合。\n\n```\n@Entity\npublic abstract class Person implements Serializable\
  \ {\n...\n@ElementCollection(fetch=FetchType.LAZY)\nprivate List addresses;\n@ElementCollection\n\
  Private Collection favoriteCities;\npublic Person() {\n}\n/* get/set 方法 */\n}\n\
  清单 4-22\nPerson.java，一个持有两个 @ElementCollection 字段的实体\n```\n\n这段代码演示了 `@ElementCollection`\
  \ 的一些最简单用法，主要采用了默认映射。通过使用更高级的映射，你可以自定义集合映射表与 `Person` 根表的连接方式、查找是立即加载还是延迟加载、列名和表名、如何将元素集合指定为\
  \ `Map`，以及许多其他细节。\n\n## 多态关系\n\n如前面的示例所示，实体关系可以在层次结构中的具体实体和抽象实体之间指定。你可以与继承层次结构中的任何实体定义关系，并且该关系将隐式地包含该实体的子类型。即使在映射超类上声明的持久化实体关系字段也是多态的。以这种方式隐式包含子类型的关系称为多态关系。\n\
  \n在 JPA 中，关系可以针对任何其他实体类定义，包括层次结构中的抽象超类型实体。这种对多态关系的支持补充了 JPA 对映射类层次结构的支持，并为跨实体类型层次结构在任何级别查询实体提供了强大的构造。在前面的实体层次结构示例中，`FullTimeEmployee.manager`\
  \ 到 `Employee.managedEmployees` 的关系说明了具体实体 `FullTimeEmployee`（`manager`）与其抽象 `Employee`（`managedEmployee`）实例集合之间的一对多双向关系。此示例展示了同一层次结构内实体之间的关系，但它同样可以轻松地在不同实体层次结构的实体之间定义。\n\
  \n### 关系映射\n\n映射多态关系不需要了解关系中任一实体的继承表映射策略。这一点从以下事实可以明显看出：在我们应用三种继承映射策略时，示例实体类中的关系字段映射保持不变。所有关系都映射到目标类的主键，这种映射假设之所以成为可能，是因为规范要求类层次结构中的所有类共享一个共同的主键结构，即使每个子类映射到自己的表也是如此。为每个实体定义的映射信息足以让\
  \ JPA 持久化框架将基类型引用解析到实际的子类实例上。关系字段使用 `JOIN` 和 `UNION` 语句自动派生，并且这些查询进一步受到 `WHERE`\
  \ 子句的约束，这些子句引用了鉴别器列的值。\n\n\n\n## 多态 JPQL 查询\n\n类似地，JPQL 和条件 API 查询可以选择或连接超类型类的实体，并且任何符合查询条件的子类型实例都将被返回在查询结果列表中。此外，查询可以使用内部的\
  \ `JOIN` 子句将引用绑定到超类型层次结构中的任意类型，唯一的限制是 `JOIN` 子句的左侧和右侧必须解析为共同的基类型。\n\n在前面的继承层次结构中，定义在抽象\
  \ `Person` 和 `Employee` 实体上的命名查询 `\"Person.findAll\"` 和 `\"Employee.findAll\"` 就是多态查询的示例。从这些查询返回的实例都是具体的实体——要么是\
  \ `FullTimeEmployee`，要么是 `PartTimeEmployee`。\n\n举例来说，让我们看看示例客户端中的一些代码。清单 4-23 查询了所有家庭地址位于圣马特奥某处的\
  \ `Employee` 实例。该查询是在抽象 `Employee` 实体上发出的，并遍历了定义在根 `Person` 实体上的 `homeAddress` 关系字段。任何从此查询返回的实体都是具体的，要么是\
  \ `FullTimeEmployee`，要么是 `PartTimeEmployee`。\n\n```\n//  用于演示多态关系使用的临时 JPQL\nfinal\
  \ String stmt =\n\"select o from Employee o where o.homeAddress.city = 'San Mateo'\"\
  ;\nfinal List emps = em.createQuery(stmt).getResultList();\nfor (Employee emp :\
  \ emps)\n{\nSystem.out.println(emp.getFirstName());\nSystem.out.println(emp.getLastName());\n\
  }\n清单 4-23\n演示 JPQL 中多态关系使用的代码清单\n```\n\n## 使用原生 SQL 查询\n\nJPQL 提供了按名称引用实体字段以及通过关系与其他实体连接的能力，而无需考虑底层映射细节。这为数据库模式定义者和查询定义者角色之间提供了一定程度的独立性。然而，有时您希望控制查询以利用特定的索引、返回稀疏数据集，或者以其他方式发出用\
  \ SQL 表达更方便的查询。JPA 让您可以轻松做到这一点，并且如果您愿意，它甚至支持将查询结果映射回实体。\n\n例如，您可能希望使用原生 SQL 查询，仅从一个恰好映射到您某个实体的表中返回名称和主键列数据。然后，查询到的名称值可以通过组合框呈现给用户，只有当用户选择一个名称时，您才去访问\
  \ `EntityManager`，并使用 `EntityManager.find(Object primaryKey)` 调用将该名称对应的主键值绑定到一个实体实例上。如果您使用\
  \ JPQL 返回一个完全加载的实体集合，而不是仅返回稀疏的键和名称数据集，那么您将查询比实际需要更多的数据字段，从而导致消耗比实际需要更多的资源。\n\n清单\
  \ 4-24 中的示例展示了如何定义一个返回 `Address` 实体类型实例的命名原生 SQL 查询。执行此命名原生查询对客户端来说与执行等效的 JPQL 命名查询相同。\n\
  \n```\n@NamedNativeQueries({\n@NamedNativeQuery(name = \"Address.findAllNative\"\
  ,\nquery = \"select id, city, state, street1, street2, zip_code from ch04_join_address\"\
  ,\nresultClass=Address.class)})\n清单 4-24\n演示原生 SQL 支持的代码清单\n```\n\n## 查询条件 API\n\
  \n自 2.0 版本起，JPA 引入了一种使用强类型组件来定义和执行查询的替代 JPQL 的方法。仅使用 Java，条件 API 允许您动态构建任意复杂的查询并执行它们，以返回与通过\
  \ JPQL 所能实现的相同结果，但具有编译时类型检查。由于相同的底层查询引擎同时用于 JPQL 和条件 API，它们在能力上是等效的，并且对于 JPQL 中可以表达的每个特性，都有一个对应的条件\
  \ API 调用。例如，在需要通过查询构建器动态定义查询的情况下，条件 API 可能比动态构建等效的 JPQL 语句更易于管理。我们在第 3 章中讨论了 JPA\
  \ 2.2 作为 Java EE 8 的一部分引入了哪些更改。\n\n虽然完整的条件 API（如同 JPQL 语言的完整特性集）超出了本书的范围，但我们在清单\
  \ 4-25 中展示了一个如何使用它的示例。\n\n```\n/**\n*  条件 API 等效于以下 JPQL 查询：\n*\n*    select o from\
  \ Address o where o.city = :city\n*/\npublic List getAddressFindByCity(String city)\
  \ {\n//  定义一个查询以返回 Address 类型的对象\nCriteriaBuilder cb = em.getCriteriaBuilder();\n\
  CriteriaQuery c = cb.createQuery(Address.class);\nRoot addr = c.from(Address.class);\n\
  //  添加 SELECT 子句\nc.select(addr);\n//  在 WHERE 子句中定义一个谓词，将 city 属性与参数值进行比较\nParameterExpression\
  \ p = cb.parameter(String.class, \"city\");\nc.where(cb.equal(addr.get(\"city\"\
  ), p));\n//  绑定 'city' 参数\nTypedQuery q = em.createQuery(c);\nq.setParameter(\"\
  city\", city);\n//  将查询结果作为 List 返回\nreturn q.getResultList();\n}\n清单 4-25\n演示查询条件\
  \ API 使用的代码清单\n```\n\n条件 API 是一种更正式的方法，但在合适的应用场景中可能非常有用。\n\n## 复合主键与嵌套外键\n\n在将实体映射到新模式时，最佳实践是指定一个专用的单列作为主键列，正如我们在前面的示例中所做的那样。实体的主键值一旦分配就不能更新。此外，专门使用一列来保存主键，而不是使用名称或其他包含有意义属性数据的列，可以消除用户希望修改恰好是主键一部分的语义重要字段时可能产生的潜在冲突。遵循一种对所有实体通用的单一方法也是可取的，而使用单个专用列作为主键是我们发现效果良好的简单模式。\n\
  \n然而，在某些情况下，模式已经定义好并正在被适配为 JPA 实体，或者出于其他原因需要复合主键。我们经常遇到的一种遗留情况是，复合主键包含列，例如外键列，这些列也参与了与其他实体的关系。除此之外，这些关系必然是强制性的（因为所有主键列必须为\
  \ `NOT NULL`），因此当您需要持久化这些相关实体时，必须小心如何持久化您的实体图，以避免在 `EntityManager.persist()` 调用期间插入行数据时违反\
  \ `NOT NULL` 约束。\n\n有两种方法可以使用复合主键来实现实体的标识。它们将在以下章节中描述。\n\n\n\n### 使用嵌入式复合主键（@EmbeddedId）\n\
  \n如果复合主键的字段不代表您认为属于实体定义一部分的有用属性数据，您可以将单个实体字段指定为主键字段，并将其类型设置为复合主键类类型。此复合主键类标记为 `@Embedded`。它的字段将被映射，就像它们是实体本身的一部分一样，但客户端只能通过复合字段访问它们。\n\
  \n实体上的嵌入式复合主键字段 `myId` 使用 `@EmbeddedId` 注解。在清单 4-26 中，我们引入了 `@Embeddable` 类 `MyIdClass`，其中包含之前位于\
  \ `Person` 上的字段 `firstName` 和 `lastName`。\n\n```\n@Embeddable\npublic class MyIdClass\
  \ {\n@Column(name = \"FIRST_NAME\", length = 400)\nprivate String firstName;\n@Column(name\
  \ = \"LAST_NAME\", length = 400)\nprivate String lastName;\n@Override\npublic boolean\
  \ equals(Object obj) {\nreturn (obj instanceof MyIdClass &&\nfirstName.equals(((MyIdClass)\
  \ obj).getFirstName()) &&\nlastName.equals(((MyIdClass) obj).getLastName()));\n\
  }\n@Override\npublic int hashCode() {\nreturn System.identityHashCode(this);\n}\n\
  /* get/set methods */\n}\n清单 4-26\nMyIdClass.java，一个适合用作 @EmbeddedId 的 @Embeddable\
  \ 类\n```\n\n清单 4-27 展示了这个新类在 `Person` 类上被用作 `@EmbeddedId`。\n\n```\n@Entity\n@NamedQueries({\n\
  @NamedQuery(name = \"Person.findAll\", query = \"select o from Person o\")})\n@Table(name\
  \ = \"CH04_EMBID_PERSON\")\npublic class Person implements Serializable {\n@SuppressWarnings(\"\
  compatibility:-7074714881275658754\")\nprivate static final long serialVersionUID\
  \ = 5291172566067954515L;\n@EmbeddedId\nprivate MyIdClass myId = new MyIdClass();\n\
  @Version\nprivate Integer version;\npublic Person() {\n}\n/* get/set methods */\n\
  }\n清单 4-27\nPerson.java，演示如何使用 @EmbeddedId 注解实现复合主键\n```\n\n为了将 `Person` 类转换为使用嵌入式\
  \ ID，我们用 `@EmbeddedId myIdClass myId` 字段替换了 `@Id Integer id` 字段。为了将此实体重新纳入我们的示例\
  \ `JOINED` 实体层次结构，需要修改 `Person` 的 `Employee` 子实体上的 `manager` 关系字段以及所有子实体上的 PK 字段，以映射到新主键中的所有列。\n\
  \n### 在实体类上直接公开复合键类字段（@IdClass）\n\n映射复合主键的另一种方法是在实体类上为主键类中的每个字段显式声明字段，但为每个字段添加 `@Id`\
  \ 注解，如清单 4-28 所示。如果主键上的任何字段同时也是实体上的有用属性，您可能希望采用这种方法。然后，您需要定义一个新的复合键类，声明这些 `@Id`\
  \ 字段中的每一个，并确保它们在名称和类型上与键类字段完全匹配。\n\n从上一个使用 `@EmbeddedId` 的示例中的类开始，我们可以修改 `MyIdClass`\
  \ 以移除 `@Embedded` 注解，如清单 4-28 所示。\n\n```\npublic class MyIdClass implements Serializable\
  \ {\n@Column(name = \"FIRST_NAME\", length = 400)\nprivate String firstName;\n@Column(name\
  \ = \"LAST_NAME\", length = 400)\nprivate String lastName;\npublic MyIdClass() {\n\
  }\npublic MyIdClass(String firstName, String lastName) {\nthis.firstName = firstName;\n\
  this.lastName = lastName;\n}\n@Override\npublic boolean equals(Object obj) {\nreturn\
  \ obj instanceof MyIdClass && firstName.equals(((MyIdClass) obj).getFirstName())\
  \ && lastName.equals(((MyIdClass) obj).getLastName());\n}\n@Override\npublic int\
  \ hashCode() {\nreturn System.identityHashCode(this);\n}\n/* get/set methods */\n\
  }\n清单 4-28\nMyIdClass.java，一个适合用作 @IdClass 的可序列化 Java 类\n```\n\n这个复合键类不需要特殊的注解。它主要用于通过主键查找\
  \ `Person` 实例，使用 `EntityManager.find()` 方法。\n\n在 `Person` 上，`firstName` 和 `lastName`\
  \ 字段现在都标记为 `@Id`。我们添加了一个 `@IdClass` 注解，将 `MyIdClass` 标识为复合主键类，如清单 4-29 所示。\n\n```\n\
  @Entity\n@NamedQueries({\n@NamedQuery(name = \"Person.findAll\", query = \"select\
  \ o from Person o\")})\n@Table(name = \"CH04_IDCLASS_PERSON\")\n@IdClass(MyIdClass.class)\n\
  public class Person implements Serializable {\n@SuppressWarnings(\"compatibility:-7074714881275658754\"\
  )\nprivate static final long serialVersionUID = 5291172566067954515L;\n@Id\n@Column(name\
  \ = \"FIRST_NAME\", length = 400)\nprivate String firstName;\n@Id\n@Column(name\
  \ = \"LAST_NAME\", length = 400)\nprivate String lastName;\n@Embedded\nprivate Address\
  \ homeAddress;\n@Version\nprivate Integer version;\npublic Person() {\n}\n/* get/set\
  \ methods */\n}\n清单 4-29\nPerson.java，一个使用 @IdClass 作为复合主键的实体\n```\n\n### 映射使用复合键的关系\n\
  \n在定义目标实体使用复合主键的关系时，拥有实体必须将其关系字段映射到相应类型的列。这需要使用 `@JoinColumns` 注解（或等效的 XML 元数据）。如果这些列恰好嵌套在拥有实体的主键中，或者它们受到\
  \ `NOT NULL` 约束，那么该关系必须在调用 `EntityManager.persist()` 操作将此实体持久化到持久化上下文时绑定，或者至少在调用\
  \ `EntityManager.flush()` 发出数据库 `INSERT` 调用时绑定。\n\n在以下示例中，`PersonPK` 复合主键类包含两个字段——`id`\
  \ 和 `addressId`——它们是强制性的（`NOT NULL`），因为它们是主键的一部分。由于 `addressId` 和关系字段 `homeAddress`\
  \ 都映射到同一个 `ADDRESS_ID` 列，并且这些字段中只有一个可以是可插入和可更新的，我们必须将其中一个字段标记为只读。在清单 4-30 中，关系字段\
  \ `homeAddress` 通过在 `@JoinColumn` 注解上分配 `insertable=false` 和 `updatable=false` 属性而被标记为只读。\n\
  \n```\n/*\n* Person: 一个抽象实体，也是 SINGLE_TABLE 层次结构的根，\n* 演示了使用复合键，该键包含一个字段，其映射的列\n\
  * 也映射到一个关系字段。\n*/\n@Entity\n@Inheritance(strategy = InheritanceType.SINGLE_TABLE)\n\
  @NamedQueries({\n@NamedQuery(name = \"Person.findAll\", query = \"select o from\
  \ Person o\")})\n@TableGenerator(name = \"Person_ID_Generator\", table = \"CH04_FKINPK_PERSON_ID_GEN\"\
  ,\npkColumnName = \"PRIMARY_KEY_NAME\", pkColumnValue = \"Person.id\",\nvalueColumnName\
  \ = \"NEXT_ID_VALUE\")\n@Table(name = \"CH04_FKINPK_PERSON\")\n@IdClass (PersonPK.class)\n\
  public abstract class Person\nimplements Serializable\n{\n@Id\n@Column(name = \"\
  ADDRESS_ID\")\nprivate Integer addressId;\n@Id\n@Column(nullable = false)\n@GeneratedValue(strategy\
  \ = GenerationType.TABLE, generator = \"Person_ID_Generator\")\nprivate Integer\
  \ id;\n@Column(name = \"FIRST_NAME\")\nprivate String firstName;\n@Column(name =\
  \ \"LAST_NAME\")\nprivate String lastName;\n@Version\nprivate Integer version;\n\
  @OneToOne(cascade = { CascadeType.ALL })\n@JoinColumn(name = \"HOME_ADDRESS\")\n\
  private Address homeAddress;\npublic Person() {\n}\n/* get/set methods */\n}\n清单\
  \ 4-30\nPerson.java，具有一个复合主键，该主键映射到一个由普通 @Id 字段和关系字段共享的列\n```\n\n使用此 `Person` 类时，您可以通过\
  \ `homeAddress` 关系字段检索数据，但不能更新此字段。其值必须在实体被持久化时填充，并且由于它是实体主键的一部分，之后不能修改。\n\n\n\n\
  ## 支持乐观锁（@Version）\n\n如前面的示例所示，你可以使用 `@Version` 注解来指定一个字段，供 `EntityManager` 在合并操作和并发管理时执行乐观锁。乐观锁是一种有用的性能优化手段，它将原本需要数据库承担的工作转移了出来。数据库通常提供悲观锁服务，允许数据库客户端（此处指\
  \ JPA 的 `EntityManager`）锁定表中的某一行，以防止在 `EntityManager` 应用某些更改时其他客户端更新该行。这是一种确保两个客户端不会同时修改同一行的有效机制，但它需要在数据库内部进行代价高昂的低级访问检查。悲观锁的一种替代方案是将并发控制转移到像\
  \ `EntityManager` 这样的数据库客户端中，并采用乐观锁策略。通过使用专用的 `@Version` 列，`EntityManager` 遵循几条简单的规则。每当它将修改后的实体发送到数据库时（例如在提交或刷新操作期间），它会查看实体实例的\
  \ `@Version` 字段的当前值，从数据库中查询该实体行的当前状态，并比较版本值。如果它们相同，它会递增实体实例的 `@Version` 字段（或任何标注了\
  \ `@Version` 的字段），并将更改发送到数据库，从而执行一条 `UPDATE` 语句。如果版本值不同，则意味着在 `EntityManager` 上次查询该行并将其加载到实体实例，到该实例被刷新回数据库的这段时间内，有其他客户端修改了该行。当检测到这种差异时，我们称之为并发异常，`EntityManager`\
  \ 会抛出异常并将事务标记为回滚。`EntityManager` 的客户端需要预见到可能发生并发异常，并且必须准备好解决冲突，通常是通过通知用户存在冲突，以便在继续操作前刷新实体。\n\
  \n在实体上使用专用的 `@Version` 列，使得 `EntityManager` 只需比较实体实例中存储的 `@Version` 字段值与数据库中 `VERSION`\
  \ 列的值，即可执行乐观锁。如果你没有指定 `@Version` 字段，`EntityManager` 就必须遍历实体实例中的每个字段，并将其值与数据库中对应的映射列进行比较，这要繁琐得多。声明的\
  \ `@Version` 字段将由持久化框架自动填充，应用程序代码不应更新它。\n\n总而言之，使用 `@Version` 字段并非强制要求，但在实体上定义 `@Version`\
  \ 字段是一种良好的实践，可以让 `EntityManager` 利用这一优化。\n\n## 支持自动生成的主键值（@GeneratedValue）\n\n除了通过\
  \ `@Version` 列提供的内置乐观锁支持外，JPA 还提供了几种便捷的方式，在持久化实体时自动填充主键列。你可以声明使用以下方式填充字段值：\n\n*\
  \   持久化框架维护的自动机制（`strategy=GenerationType.AUTO`）\n*   自定义数据库序列（`strategy=GenerationType.SEQUENCE`\
  \ 或 `GenerationType.IDENTITY`）\n*   模拟伪序列的自定义数据库表（`strategy=GenerationType.TABLE`）\n\
  \n我们发现自动填充主键功能在便捷性方面非常出色，省去了我们在应用程序中为每个实体编写此代码的麻烦。在 `persistence.xml` 中对持久化单元使用模式生成设置，可以让你让\
  \ JPA 在数据库中自动创建所需的工件（序列或表），甚至可以通过注解或 XML 使用 JPA 元数据指定的设置来配置它们。一旦安装，`AUTO` 情况会为任何标注了\
  \ `@GeneratedValue` 或 `@GeneratedValue(strategy=GenerationType.AUTO)` 的 `@Id` 字段生成唯一标识符，至少能让实体类看起来不那么杂乱。由于并非所有数据库都支持序列对象，你可能希望使用表生成器，如本章各示例所示。\n\
  \n清单 4-31 演示了默认 ID 生成特性的用法。\n\n```\n@Entity\n@Inheritance(strategy = InheritanceType.JOINED)\n\
  @DiscriminatorColumn(name = \"TYPE\")\n@Table(name = \"CH04_JOIN_PERSON\")\n@NamedQuery(name\
  \ = \"findAllPerson\", query = \"select object(o) from Person o\")\npublic abstract\
  \ class Person implements Serializable {\n@Id\n@GeneratedValue\nprivate Long id;\n\
  /* ... */\n}\n清单 4-31\nPerson.java，使用默认 ID 生成器\n```\n\n用于生成本章示例中所有表和序列的 SQL 脚本可在示例代码区域中找到。此外，JPA\
  \ 提供商会生成 DDL 对象，甚至一些所需的 DML，以支持部署的任何实体；因此，预先创建模式并非绝对必要。然而，虽然 JPA 会接受关于使用哪些表和列名的指导（例如），但目前还没有办法指定自动为你创建的约束或其他工件的名称。因此，如果你需要控制映射对象的名称和其他细节，最好在首次部署持久化单元之前预先创建模式。\n\
  \n为了说明如何预先创建 ID 生成所需的表和序列，清单 4-31 和 4-32 展示了在这些示例中创建 ID 生成器表和序列所需的 DDL。\n\n```\n\
  /**\n* 创建 ID 生成器序列 \"CH04_SEQID_PERSON_ID_GEN\":\n* CREATE SEQUENCE \"CH04_SEQID_PERSON_ID_GEN\"\
  \ INCREMENT BY 50 START WITH 50;\n*/\n@Entity\n@Table(name = \"CH04_JOIN_PERSON\"\
  )\n@SequenceGenerator(name = \"Person_ID_Generator\", sequenceName = \"CH04_JOIN_PERSON_ID_GEN\"\
  ,\nallocationSize = 50, initialValue=1)\n@Inheritance(strategy = InheritanceType.JOINED)\n\
  public abstract class Person implements Serializable {\n...\n@Id\n@Column(nullable\
  \ = false)\n@GeneratedValue(strategy = GenerationType.SEQUENCE, generator = \"Person_ID_Generator\"\
  )\nprivate Integer id;\n...\n}\n清单 4-32\n@GeneratedValue 与 @SequenceGenerator 的用法\n\
  ```\n\n清单 4-33 提供了一个基于表的 ID 生成器声明的示例，以及一条用于为伪序列创建命名行的 INSERT 语句。\n\n```\n/**\n*\
  \ 创建 ID 生成器表 \"CH04_JOIN_PERSON_ID_GEN\": CREATE TABLE\n* \"CH04_JOIN_PERSON_ID_GEN\"\
  \ (\"PRIMARY_KEY_NAME\" VARCHAR2(4000) PRIMARY KEY,\n* \"NEXT_ID_VALUE\" NUMBER(38));\n\
  *\n* 为此实体的 ID 生成器 'Person.id' 初始化该表的数据（从值 '0' 开始）:\n* INSERT INTO \"CH04_JOIN_PERSON_ID_GEN\"\
  \ VALUES ('Person.id', 0);\n*/\n@Entity\n@Table(name = \"CH04_JOIN_PERSON\")\n@TableGenerator(name\
  \ = \"Person_ID_Generator\", table = \"CH04_JOIN_PERSON_ID_GEN\",\npkColumnName\
  \ = \"PRIMARY_KEY_NAME\", pkColumnValue = \"Person.id\",\nvalueColumnName = \"NEXT_ID_VALUE\"\
  )\n@Inheritance(strategy = InheritanceType.JOINED)\npublic abstract class Person\
  \ implements Serializable {\n...\n@Id\n@Column(nullable = false)\n@GeneratedValue(strategy\
  \ = GenerationType.TABLE, generator = \"Person_ID_Generator\")\nprivate Integer\
  \ id;\n...\n}\n清单 4-33\n@GeneratedValue 与 @TableGenerator 的用法\n```\n\n\n\n## 拦截器：实体回调方法\n\
  \nJPA 支持多种回调方法（或称拦截器），允许你在实体或映射超类的特定生命周期事件发生时，添加自定义代码。你可以注册拦截器，使其在特定实体类型的生命周期事件发生时被调用，或者更广泛地，在任何实体的生命周期事件发生时被调用。后一种情况是少数必须使用\
  \ XML 指定元数据的场景之一，因为其效果会全局应用于持久化单元中的所有实体。\n\n以下注解可应用于方法，以表明它们是实体回调方法：\n\n*   `@PrePersist`\n\
  *   `@PostPersist`\n*   `@PreRemove`\n*   `@PostRemove`\n*   `@PreUpdate`\n*   `@PostUpdate`\n\
  *   `@PostLoad`\n\n要使用回调方法，你需要编写一个方法来实现所需行为，然后使用上述生命周期回调注解之一（例如 `@PrePersist`）对其进行注解。回调方法可以任意命名，但不得接受任何参数，且必须返回\
  \ `void`。如果需要，单个方法可以使用多个实体回调注解进行注解。\n\n或者，可以为实体（或映射超类）注册回调类，以拦截一个或多个实体类型上的一个或多个生命周期事件。可以为任何给定的实体生命周期事件注册多个拦截器方法，它们将按照指定的顺序执行。\n\
  \n实体回调方法可用于在实体持久化之前验证其内容，并在实例化后填充瞬态、派生字段。清单 4-34 展示了如何将 `@PreUpdate` 拦截器插入公司薪资系统中的\
  \ `FullTimeEmployee` 实体，以便每当来自某个邮政编码的员工实例因任何原因被更新时，自动为其加薪。（一厢情愿的想法！）\n\n```\n@Entity\n\
  @Inheritance\npublic class FullTimeEmployee extends Employee {\n...\n@PreUpdate\n\
  public void wishfulThinking() {\nif (getHomeAddress().getZipCode() == 94402) {\n\
  setSalary(getSalary() + 10000);\n}\n}\n...\n}\n清单 4-34\nFullTimeEmployee.java，使用非法实体回调最终向体制叫板！\n\
  ```\n\n## 编译、部署和测试 JPA 实体\n\n对于本章描述的七个主要特性，我们分别提供了一个独立的 NetBeans 项目，用于在纯 Java SE\
  \ 环境中测试该特性。此外，每个项目都附带一个专用的 HTTP Servlet，用于通过 Java EE Web 应用程序测试相同的代码。我们鼓励你从两个客户端环境探索这些示例，编辑\
  \ JPA 实体和测试代码，并观察结果。\n\n### 前提条件\n\n在执行后续章节详述的任何步骤之前，请先完成第 1 章的“入门”部分。该部分将引导你完成本章示例所需的安装和环境设置。\n\
  \n### 打开示例应用程序\n\n将 `Chapter04-PersistenceIISamples` 目录及其内容复制到你选择的目录中。运行 NetBeans\
  \ IDE，并使用 `文件` ➤ `打开项目` 菜单打开 `Chapter04-PersistenceIISamples` 项目。确保选中“`打开所需项目`”复选框。参见图\
  \ 4-6。\n\n![A311833_3_En_4_Fig6_HTML.jpg](img/A311833_3_En_4_Fig6_HTML.jpg)\n\n\
  图 4-6\n\n打开 Chapter04-PersistenceIISamples 项目\n\n这些示例中未使用 EJB Session Bean，尽管它们本可以轻松替代\
  \ Java 服务外观类。Java 外观类在执行 persist、merge 或 remove 操作时自动提交结果，从而模拟无状态 Session Bean 的默认事务行为。主要区别在于\
  \ EJB 在 EJB 容器中执行，该容器提供企业级服务，而这些服务对于这些 JPA 示例并非必需。\n\n本章的示例由七个 Java 类库和一个 Web 应用程序组成，该\
  \ Web 应用程序为七个 Java 库各包含一个 Servlet。展开第一个 Java 类库——`Chapter04-PersistenceIISamples-embeddable`，观察每个项目共有的通用结构，如图\
  \ 4-7 所示。\n\n![A311833_3_En_4_Fig7_HTML.jpg](img/A311833_3_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7\n\n观察 Chapter04-PersistenceIISamples-joined 项目的结构\n\n每个 Java 类库包含以下内容：\n\
  \n*   一个 JPA 持久化单元，由若干 JPA 实体或其他映射类以及一个 `META-INF/persistence.xml` 文件组成\n*   一个\
  \ Java 服务外观——`JavaServiceFacade.java`——一个包装类，提供用于操作上下文持久化单元中 JPA 实体的 CRUD 方法\n*\
  \   一个 Java 客户端——`JavaServiceFacadeClient.java`——用于执行该持久化单元测试用例的服务外观\n\n### 创建数据库连接\n\
  \n本章的示例需要数据库连接，对于这些测试，我们将使用 NetBeans 和 Glassfish 捆绑的 Derby 数据库。如果你尚未创建第 3 章示例也使用的\
  \ WineApp 数据库，请单击“`服务`”选项卡，展开“`数据库`”图标，然后在“`Java DB`”节点上调用“`创建数据库...`”。创建一个名为“`WineApp`”的数据库，用户名和密码为\
  \ `wineapp/wineapp`，如图 4-8 所示。\n\n![A311833_3_En_4_Fig8_HTML.jpg](img/A311833_3_En_4_Fig8_HTML.jpg)\n\
  \n图 4-8\n\n创建 WineApp 数据库和连接\n\n如果你确实在第 3 章中创建了 WineApp 数据库，那么你应该能在 Java DB 部分下找到它，如图\
  \ 4-9 所示。\n\n![A311833_3_En_4_Fig9_HTML.jpg](img/A311833_3_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9\n\n“WineApp” Java DB\n\n最后一步创建了一个数据库连接，并在 JPA 项目中每个 `persistence.xml` 文件的持久化单元中引用该连接。虽然可以预先创建数据库对象（表、序列、键约束等），但我们将让\
  \ JPA 在每个持久化单元首次需要时自动创建这些数据库对象。\n\n### 编译源代码\n\n在 `Chapter04-PersistenceIISamples`\
  \ 节点上调用上下文菜单，并通过选择“`清理并构建`”菜单选项来构建应用程序，如图 4-10 所示。\n\n![A311833_3_En_4_Fig10_HTML.jpg](img/A311833_3_En_4_Fig10_HTML.jpg)\n\
  \n图 4-10\n\n构建应用程序\n\n\n\n### 运行客户端程序\n\n在创建好 `WineApp` 数据库并构建项目后，即可运行示例客户端。打开 `Chapter04-PersistenceIISamples-singletable`\
  \ 项目，展开 `com.apress.ejb.chapter04.singletable.service` 包。您将看到 Java 服务外观类（`JavaServiceFacade.java`）及其客户端类。右键点击\
  \ `JavaServiceFacadeClient.java`，选择“`运行文件`”。测试将在 NetBeans 中运行，输出结果会发送到日志窗口。参见图 4-11。\n\
  \n![A311833_3_En_4_Fig11_HTML.jpg](img/A311833_3_En_4_Fig11_HTML.jpg)\n\n图 4-11\n\
  \n在 Java SE 环境中执行 SINGLE_TABLE 继承示例\n\n接下来，运行 HTTP Servlet 客户端：打开 `Chapter04-PersistenceIISamples-war`\
  \ 项目，展开 `com.apress.ejb.chapter04.client` 包。打开 NetBeans 用于运行 Servlet 的浏览器。（如果不确定，请通过“工具”\
  \ ➤ “选项” ➤ “常规”打开 NetBeans 首选项。）右键点击 `SingleTableInheritanceClient.java` Servlet，选择“`运行文件`”，以\
  \ Web 应用程序的方式运行测试，如图 4-12 所示。\n\n![A311833_3_En_4_Fig12_HTML.jpg](img/A311833_3_En_4_Fig12_HTML.jpg)\n\
  \n图 4-12\n\n执行 `com.apress.ejb.chapter04.client Servlet`\n\nNetBeans 将在默认浏览器中执行该\
  \ Servlet，如图 4-13 所示。在测试执行过程中，任何冲突的现有数据都会被删除，新的测试数据会被创建，然后被查询并以表格形式呈现。引用的对象（包括引用对象的列表）会显示在嵌套的表格单元格中。图\
  \ 4-13 展示了该客户端 Servlet 的输出，其中记录了 Servlet 的操作日志。\n\n![A311833_3_En_4_Fig13_HTML.jpg](img/A311833_3_En_4_Fig13_HTML.jpg)\n\
  \n图 4-13\n\n在 Java EE Web 环境中执行 SINGLE_TABLE 继承示例\n\n请查看 `SingleTableInheritanceClient.java`\
  \ 中的代码。您可以自由尝试创建额外的实体、测试 Java 服务外观上的查询和其他服务方法，并观察结果行为。要将测试模式重置回初始状态，您可以随时删除 WineApp\
  \ 测试数据库，然后重新执行图 4-8 所示的步骤。\n\n### 测试其他持久化示例\n\n其余六个项目分别测试了本章涵盖的不同特性，这些特性已在项目名称中标识。建议您将这些项目作为参考，了解如何配置各种继承层次结构、映射超类、嵌入类以及复合主键。\n\
  \n由于本章中的每个项目结构相同，并且每个项目都附带一个专用的 HTTP Servlet 测试器，因此上述步骤可以指导您以相同的方式执行每个示例。\n\n##\
  \ 总结\n\n本章内容相当丰富，掌握了这些信息后，您应该能够构建一些强大的实体，并根据您的应用领域进行最佳配置。以下是本章涵盖的关键概念总结。\n\n###\
  \ 映射实体继承层次结构\n\nJPA 为实体类继承层次结构提供了三种常见的 O/R 映射策略的内置支持：SINGLE_TABLE、JOINED 和 TABLE_PER_CLASS。我们分析了每种方法的优缺点，并提供了最适合每种策略的常见用例示例。\n\
  \n### 在继承层次结构中使用抽象实体、映射超类和非实体类\n\nJPA 在类型层次结构中混合使用实体与抽象类和非实体类时提供了灵活的解决方案。实体可以是具体的，也可以是抽象的。只有实体类可以被查询或作为映射实体关系的目标，但实体仍然可以使用非实体类，既可以通过\
  \ `@Embedded` 和 `@ElementCollection` 嵌入它们，也可以通过扩展它们或被它们扩展。我们展示了一些混合使用这些选项的示例来说明它们的用法。\n\
  \n### 多态关系\n\n可以在实体之间指定关系，包括层次结构中的抽象超类型实体。这允许您与继承层次结构中任意位置的实体定义关系，该关系也会隐式地涉及该实体的子类型。\n\
  \n### 多态 JPQL 查询\n\n类似地，JPQL 查询可以选择或连接超类型类的实体，并且任何符合查询条件的子类型实例都将包含在查询结果中。我们研究了如何使用\
  \ JPQL 构建可重用的 `@NamedQuery` 对象，以及自 JPA 2.0 以来引入的 QueryCriteria API。\n\n### 使用原生\
  \ SQL 查询\n\n`EntityManager` 允许您发出原生 SQL 查询，这既是对经验丰富的 SQL 开发者的友好表示，也是一种优化手段，可以避免在只需要少数几个字段时查询实体的所有字段所带来的开销。我们提供了一个示例，说明如何定义一个返回实体实例的命名原生\
  \ SQL 查询，以便将结果无缝集成到应用程序中。\n\n### 使用查询条件 API\n\n作为 JPQL 的类型安全替代方案，自 JPA 2.0 以来引入的条件\
  \ API 允许您通过动态组装子句和谓词来构建查询，形成一个 CriteriaQuery 对象，该对象可以被调用来检索实体或其他结果。图 4-14 展示了 persistence.xml\
  \ 文件在 NetBeans IDE 8.2 中的外观。\n\n![A311833_3_En_4_Fig14_HTML.jpg](img/A311833_3_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14\n\nPersistence.xml 文件\n\n### 复合主键和嵌套外键\n\n我们探讨了不同类型的复合主键用法，展示了如何使用 `@EmbeddedId`\
  \ 字段和多个 `@Id` 字段。当实体的主键映射到的列也参与了与其他实体的关系时（例如，当主键包含一个或多个也是外键一部分的列时），情况可能会变得有些棘手。我们提供了一些处理这种情况的示例。\n\
  \n### 乐观锁支持\n\n使用 `@Version` 注解，您可以指定一个字段（该字段在继承层次结构中的所有实体中通用），供 `EntityManager`\
  \ 在管理并发时（例如在合并操作期间）执行乐观锁定。该字段将由持久化框架自动填充，不应由应用程序代码更新。\n\n### 自动生成主键值支持\n\nJPA 为使用唯一值填充\
  \ `@Id` 字段提供了声明式支持。我们提供了如何声明基于数据库序列和基于表的 ID 生成器的示例。\n\n### 拦截器：实体回调方法\n\n您可以在实体类或您选择的辅助类上指定方法，以处理实体生命周期回调。我们列出了可用的回调方法，并解释了如何使用它们来注册您自己的自定义方法，这些方法将在生命周期事件期间被调用。\n\
  \n"
- "# 5. EJB 消息驱动 Bean\n\n本章讨论了面向消息架构的必要性。它介绍了 Java 消息服务（JMS）、消息传递应用程序的典型架构，并详细阐述了\
  \ EJB 消息驱动 Bean（MDB）背后的概念。本章还涵盖了与 MDB 相关的注解、依赖注入和拦截器。\n\n\n\n## 面向消息的架构\n\n如今，IT\
  \ 组织拥有数十个应用程序和服务，用于执行诸如库存管理、计费、费用报告和订单录入等定义明确的任务。随着互联网和电子商务的发展，企业开始思考不同的应用程序如何既能独立工作，又能同时成为信息工作流的一部分。\n\
  \n这一新需求引出了集成现有应用程序，以及构建能与现有应用程序协同工作的新应用程序的概念。将现有应用程序与新应用程序集成是一项非常复杂的任务：首先是因为大多数企业使用的应用程序数量庞大，其次是因为它们复杂的业务工作流。\n\
  \n消息传递是在异步通信和松耦合事务模型中集成现有和新应用程序的最可行解决方案之一。异步消息传递允许应用程序通过独立交换消息进行通信，而无需彼此硬连接。发送消息的应用程序或业务流程不必等待接收方，只要发送方和接收方都理解并商定消息格式和中间目的地即可。\n\
  \n以下是 MDB 的消息传递概念：\n\n*   发送松耦合、异步消息的过程。\n*   发送方不知道消息何时被接收。\n*   发送方可以保证消息在传输过程中不会丢失。\n\
  *   当接收方不在（AFK）时，MOM（面向消息的中间件）服务的作用类似于语音信箱。\n\n### 什么是 JMS？\n\nJMS 是一个 Java 面向消息的中间件（MOM）API，允许应用程序异步发送和接收消息。JMS\
  \ 是 JSR 914 定义的标准 Java EE API 的一部分。JMS 类似于 JDBC（Java 数据库连接），后者提供了连接多种类型数据库（Oracle、DB2、MySQL）的标准\
  \ API。同样，JMS 提供了连接多种类型消息传递系统（IBM MQ、SonicMQ）的标准 API。\n\n注意\n\nMOM 将消息存储在发送方指定的位置，随后由消费者收集。\n\
  \nJMS 架构由以下部分组成：\n\n表 5-1\n\nJMS 消息类型\n\n| 消息类型 | 描述 |\n| --- | --- |\n| `ByteMessage`\
  \ | 由一系列字节组成 |\n| `MapMessage` | 由一组名称/值对组成 |\n| `ObjectMessage` | 由一个序列化的 Java\
  \ 对象组成 |\n| `StreamMessage` | 由一系列原始数据类型组成 |\n| `TextMessage` | 由字符串组成 |\n\n*  \
  \ JMS 提供者：一个消息传递系统（如图 5-1 所示），负责处理消息的路由和传递。JMS 提供者可以是应用服务器的消息传递组件（例如 Oracle WebLogic\
  \ Server、IBM WebSphere、Oracle GlassFish Server）。JMS 提供者也称为 JMS 服务器。\n\n    ![A311833_3_En_5_Fig1_HTML.jpg](img/A311833_3_En_5_Fig1_HTML.jpg)\n\
  \n    图 5-1\n\n    一个 JMS 消息传递系统\n*   JMS 客户端：任何使用 JMS API 消费或生成 JMS 消息的 Java 应用程序或\
  \ Java EE 组件。\n*   JMS 消费者：一个消费 JMS 消息的 JMS 客户端应用程序。图 5-1 中显示的库存、计费和发货应用程序是 JMS\
  \ 消息消费者。\n*   JMS 生产者：一个生成消息的 JMS 客户端。图 5-1 中显示的订单录入应用程序是 JMS 消息生产者。\n*   JMS 消息：由标头、属性和正文组成的消息。标头标识消息并包含标准信息，例如\
  \ `JMSTimestamp`。MOM 在发送消息时将此标头设置为当前时间。属性提供特定于应用程序和提供者的附加属性。属性由应用程序显式创建，例如 `Message.setBooleanProperty(“”,true);`，它可以是布尔型、字节型、双精度浮点型、浮点型、整型、长整型、短整型、字符串、对象等。正文包含消息的内容，可以是\
  \ `ObjectMessage`、`ByteMessage`、`MapMessage`、`StreamMessage` 和 `TextMessage`。JMS\
  \ 规范支持发送和接收不同类型的消息。表 5-1 显示了消息类型及其描述。\n\nJMS 有两种类型的资源：`JMSContext` 和 `Destination`。\n\
  \nJMS 应用程序将使用 CDI 的 `@Inject` 通过依赖注入（DI）获取 `JMSContext`，并使用 `@JMSConnectionFactory`\
  \ 配置 `JMSContext` 以连接到连接工厂。\n\n### 消息传递应用程序架构\n\n通常，存在两种不同类别的消息传递应用程序：\n\n*   点对点（P2P）模型：只有一个消费者会处理给定的消息，PTP\
  \ 消息目的地称为队列，A 写入队列，B 从队列读取。\n*   发布-订阅（pub-sub）模型：每个订阅者都会收到消息的一个副本。\n\nP2P 模型基于消息队列，队列保存由\
  \ JMS 客户端应用程序发送的 JMS 消息。消息生产者和消费者商定一个公共队列来交换消息。\n\n如果每条消息有且只有一个消息消费者，则使用 P2P 模型。例如，图\
  \ 5-2 中显示的订单录入系统将新订单发送到消息队列，该队列由库存系统接收。类似地，库存系统发送的消息由发货系统消费，而发货系统发送的消息由计费系统消费。\n\
  \n![A311833_3_En_5_Fig2_HTML.jpg](img/A311833_3_En_5_Fig2_HTML.jpg)\n\n图 5-2\n\n\
  一个使用队列的 JMS 消息传递系统\n\n发布-订阅模型基于主题，主题是消息的目标地址。多个接收者或 JMS 消费者可以检索每条消息。在此模型中，发布者并不总是知道可能的订阅者。发布-订阅模型用于广播类型的应用程序，如图\
  \ 5-3 所示，其中一条消息被传递给多个 JMS 客户端。主题在消息传递服务器中定义，每个主题都有唯一的名称。每条消息及其关联的主题被发布并传递给所有订阅者。\n\
  \n![A311833_3_En_5_Fig3_HTML.jpg](img/A311833_3_En_5_Fig3_HTML.jpg)\n\n图 5-3\n\n\
  一个使用主题的 JMS 消息传递系统\n\n## JMS 2.0\n\nJMS 2.0 于 2013 年 4 月发布，这是自 2002 年发布 1.1 版以来对\
  \ JMS 规范的首次更新。\n\nJMS 2.0 目前是 Java EE 7 平台的一部分，可用于 Java EE Web 或 EJB 应用程序，或作为 Java\
  \ SE 环境中的独立组件使用。\n\nJMS 2.0 的主要目标包括：\n\n*   API 现代化\n*   与 Java EE 对齐\n*   与 EJB3/MDB\
  \ 对齐\n*   自 1.1 版以来的次要修正和澄清\n*   用于发送和接收消息的新 API\n*   新 API 也支持资源注入\n\nJMS 2.0 最大的变化是引入了用于发送和接收消息的新\
  \ API，帮助程序员减少需要编写的代码量。\n\n\n\n## JMS 2.1\n\nJMS 2.1 最初由 Oracle 于 2014 年 8 月提出，随后根据\
  \ Java 社区流程提交为 JSR 368。它被提出并最终获批成为 Java EE 8 的一部分。\n\n早期草案评审 1（EDR1）于 2015 年 10\
  \ 月发布以供公众评审，其中包含关于灵活 JMS 消息驱动 Bean 的新章节。\n\n2016 年 3 月，EDR2 最终发布以供公众评审，但随后 Oracle\
  \ 停止了 JMS 2.1 的开发，并宣布他们正在更改 Java EE 8 的优先级，其中包括 JMS 2.1 的开发。\n\n最终，在 2016 年 11 月，Oracle\
  \ 正式提议撤回该 JSR，并确认 JMS 仍将是 Java EE 8 的一部分，但将使用现有版本 JMS 2.0，而非新版本 2.1。\n\nJMS 2.1\
  \ 规范可在此网页中找到：\n\n[`https://jcp.org/en/jsr/detail?id=368`](https://jcp.org/en/jsr/detail?id=368)\n\
  \n以下是 JMS 2.1 中最重要的变更：\n\n*   与 Java SE 8 对齐\n*   灵活的 MDB（EE）\n*   异步消息传递的变更，包括\
  \ MDB 如何将任何 `MessageListener` 接口实现为任何 CDI Bean\n*   CDI Bean 作为监听器\n*   批量投递，包括确认模式、`setMessageListener`（EE）等\n\
  *   可重复注解，包括重新投递配置（EE）\n\n## 使用 MDB\n\nMDB 是一个异步消息消费者，用于处理通过 JMS 投递的消息。当 MDB 执行处理消息的工作时，运行\
  \ MDB 的 EJB 容器负责处理服务（事务、安全、资源、并发、消息确认），让 Bean 开发者专注于处理消息的业务逻辑。传统的 JMS 应用程序需要自行编写其中一些服务。MDB\
  \ 本质上是无状态的，这意味着 EJB 容器可以拥有大量 MDB 实例并发执行，以处理来自各种应用程序或 JMS 生产者的数百条 JMS 消息，并为企业应用程序提供服务质量（QoS），例如高可用性和可靠性。\n\
  \nEJB 客户端应用程序不能像访问会话 Bean 和实体那样直接访问 MDB。与 MDB 通信的唯一方式是将 JMS 消息发送到 MDB 正在监听的目标。任何使用\
  \ JMS API 的 Java 应用程序或 Java EE 组件都可以通过向队列或主题发送消息来成为 MDB 的消息提供者。\n\n### 何时使用 MDB？\n\
  \n在本章前面，我们讨论了企业中异步性的需求。异步消息传递在应用程序、系统和服务之间提供了松散耦合，从而为应用程序和系统提供了更大的灵活性和变更管理能力。MDB\
  \ 提供了一种标准的消息组件模型，可在企业中实现异步和面向消息的架构目标。\n\n图 5-4 展示了一个面向消息的应用程序，它包含订单录入、库存、计费和发货系统，这些系统异步通信以处理一个工作流，该工作流从新的采购订单开始，到订单发货给客户结束。订单录入系统捕获客户的新订单，处理订单，并将其发送到指定的消息队列（在图\
  \ 5-4 中，这是“新订单”队列）。库存系统从队列中取出消息，检查库存是否可用。如果不可用，则向“供应商”队列发送消息；如果可以发货，则将消息放入“订单就绪”队列。计费系统取出这条新消息，处理客户的计费，然后将消息放回“发货”队列。最后，发货应用程序取出消息，将订单发货给客户，并向客户发送一封包含跟踪信息的电子邮件。\n\
  \n![A311833_3_En_5_Fig4_HTML.jpg](img/A311833_3_En_5_Fig4_HTML.jpg)\n\n图 5-4\n\n\
  一个订单到发货的 JMS 消息传递系统\n\n### MDB 类\n\n与会话 Bean 不同，MDB 没有任何业务接口。它仅包含以下内容：\n\n*   一个消息驱动类\n\
  *   一个可选的回调监听器类\n*   一个可选的拦截器类\n\nMDB 类是任何带有类级别注解 `@MessageDriven` 的标准 Java 类。如果使用部署描述符代替注解，则应将\
  \ Bean 类标记为 MDB 类。在混合模式下（即同时使用注解和部署描述符），如果在 Bean 类中指定了任何其他类级别或成员级别的注解，则必须指定 `@MessageDriven`\
  \ 注解。`@MessageDriven` 注解参数可用于指定 Bean 正在监听的 JMS 队列或主题。表 5-2 详细说明了这些参数。\n\n表 5-2\n\
  \n@MessageDriven 注解的参数详情\n\n| 参数 | 描述 |\n| --- | --- |\n| `ActivationConfigProperty`\
  \ | 用于指定目标名称和类型的属性集 |\n| `description` | Bean 类的描述 |\n| `mappedName` | MDB 正在监听的\
  \ Topic 或 Queue 的物理 Java 命名和目录接口（JNDI）名称 |\n| `messageListener` | MDB 所扩展的接口类的接口名称\
  \ |\n| `name` | MDB 的名称，如果它必须与 Bean 类名称不同的话 |\n\n为了说明 MDB 的使用，我们将创建图 5-5 中所示的用例。我们将有一个应用程序客户端，它是一个\
  \ Java 命令行程序，用于调用 `OrderProcessing` 会话 Bean 中的业务方法。`OrderProcessing` 会话 Bean 将创建一条\
  \ JMS 消息并将其发送到在 GlassFish 应用服务器中注册/配置的主题。一个名为 `StatusMailer` 的 MDB 将监听该主题并处理传入的消息。接收到的消息将包含客户的详细信息，并将用于向客户发送关于其订单状态的电子邮件通知。这个简单的用例将使我们能够演示\
  \ MDB 如何工作，以及如何在会话 Bean 和 MDB 中注入不同类型的资源。\n\n![A311833_3_En_5_Fig5_HTML.jpg](img/A311833_3_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5\n\n一个示例 MDB 用例\n\n清单 5-1 展示了 `StatusMailer` MDB 的定义。我们使用 `@MessageDriven`\
  \ 注解标记了 `StatusMailerBean` 类。\n\n```\npackage com.apress.ejb.chapter05;\nimport\
  \ javax.ejb.MessageDriven;\n@MessageDriven\npublic class StatusMailerBean {\n}\n\
  清单 5-1\nStatusMailerBean.java\n```\n\nMDB 类有一个方法 `onMessage()`，当消息到达 MDB 正在监听的队列/主题时，EJB\
  \ 容器会调用该方法。`onMessage()` 方法包含如何处理传入消息的业务逻辑。`onMessage()` 方法包含一个参数，即 JMS 消息。在 `StatusMailer`\
  \ Bean 的情况下，`onMessage()` 方法检查消息是否为 `MapMessage` 类型，然后从消息中获取客户信息，创建一封关于订单状态的电子邮件，然后向客户发送电子邮件。清单\
  \ 5-2 展示了 `onMessage()` 方法的代码。在一个 `try` 块中，我们首先检查接收到的消息是否如我们所预期的那样是 `MapMessage`\
  \ 类型。如果是，则使用 `getStringProperty()` 来检索消息中 `from`、`to`、`subject` 和 `content` 属性的值。\n\
  \n\n```content\n```\npackage com.apress.ejb.chapter05;\nimport javax.ejb.MessageDriven;\n\
  @MessageDriven\npublic class StatusMailerBean {\npublic void onMessage(Message message){\n\
  try  {\nif (message instanceof MapMessage) {\nMapMessage orderMessage = (MapMessage)message;\n\
  String from = orderMessage.getStringProperty(\"from\");\nString to = orderMessage.getStringProperty(\"\
  to\");\nString subject = orderMessage.getStringProperty(\"subject\");\nString content\
  \ = orderMessage.getStringProperty(\"content\");\n}\nelse {\nSystem.out.println(\"\
  Invalid message \");\n}\n} catch (Exception ex)  {\nex.printStackTrace();\n}\n}\n\
  }\n代码清单 5-2\nonMessage 方法代码\n```\n\n除了用`@MessageDriven`注解标记标准 Java 类外，MDB 类还需满足以下要求：\n\
  \n*   MDB 类必须实现消息监听器接口。对于 JMS 而言，该接口为`javax.jms.MessageListener`。\n*   该类不能是 final\
  \ 或 abstract 类型。\n*   该类应包含一个无参公共构造函数，供 EJB 容器用于创建 Bean 类的实例。\n\n如果同时使用注解和部署描述符，在部署过程中，部署描述符中的设置或值将覆盖类中的注解。\n\
  \n### 配置属性\n\nBean 开发者可以为 MDB 类提供配置属性，这些属性将在部署时使用。EJB 容器利用这些属性来配置 Bean，并将其链接到相应的\
  \ JMS 提供程序。这些配置属性可通过`@ActivationConfigProperty`注解进行设置。该注解可作为`@MessageDriven`注解的参数之一提供。代码清单\
  \ 5-3 展示了为`StatusMailer` MDB 添加属性的`@MessageDriven`注解。我们定义了两个`ActivationConfigProperty`注解，分别指定了逻辑目标名称和目标类型。\n\
  \n```\n@MessageDriven(activationConfig= {\n@ActivationConfigProperty(propertyName=\"\
  destinationName\",\npropertyValue=\"StatusMessageTopic\"),\n@ActivationConfigProperty(propertyName=\"\
  destinationType\",\npropertyValue=\"javax.jms.Topic\")\n}, mappedName=\"StatusMessageTopic\"\
  )\npublic class StatusMailerBean implements javax.jms.MessageListener {\n}\n代码清单\
  \ 5-3\n为 StatusMailer MDB 添加属性的@MessageDriven 注解\n```\n\nEJB 3.0 和 3.1 版本中 MDB 可用的标准配置属性，与\
  \ JMS 1.1 版本的配置属性相对应。EJB 3.2 版本中 MDB 的标准配置属性已扩展，以对应 JMS 2.0 版本的配置属性。表 5-3 展示了 EJB\
  \ 版本与 JMS 版本之间的对应关系。\n\n表 5-3\n\nEJB MDB 版本与 JMS 版本映射关系\n\n| EJB 版本 | JMS 版本 |\n\
  | --- | --- |\n| EJB 3.0 | JMS 1.1 |\n| EJB 3.1 | JMS 1.1 |\n| EJB 3.2 | JMS 2.0\
  \ |\n| EJB 3.2 | JMS 2.1 |\n\n在接下来的章节中，我们将展示可以为 MDB 设置哪些配置属性。\n\n#### 消息确认\n\nEJB\
  \ 容器提供消息确认服务。有两种消息确认模式：\n\n*   `自动确认`\n*   `允许重复确认`\n\n对于`自动确认`模式，消息传递确认在`onMessage()`方法执行后发生。此属性适用于要求无重复消息的应用程序。例如，库存系统应且仅应接收一次新订单。对于`允许重复确认`模式，确认是延迟执行的，这意味着可能存在消息重复传递，但减少了会话在即时确认方面的开销。例如，在订单处理过程中发送的电子邮件可能允许重复消息。我们可以使用`@ActivationConfigProperty`注解来指定消息确认属性。代码清单\
  \ 5-4 展示了设置为允许重复的属性。\n\n```\n@MessageDriven(\nactivationConfig= {\n@ActivationConfigProperty(propertyName=\"\
  acknowledgeMode\",\npropertyValue=\"Dups-ok-acknowledge\")}\n)\n代码清单 5-4\n@ActivationConfigProperty\
  \ 注解\n```\n\n#### 消息选择器\n\n消息选择器允许根据 Bean 开发者通过`@ActivationConfigProperty`注解提供的选择条件，对传入消息进行过滤。此属性用于限制\
  \ Bean 接收的消息。例如，处理传入订单的 MDB 可能只处理与红葡萄酒和白葡萄酒相关的订单。用于指定该属性的属性名为`messageSelector`。\n\
  \n#### 消息目标\n\n消息目标描述了 MDB 是监听队列还是主题。Bean 开发者可以通过`@ActivationConfigProperty`注解在\
  \ Bean 中提供描述。该属性的值必须是`javax.jms.Queue`或`javax.jms.Topic`。例如，新订单可能需要由库存系统作为工作流中的下一步进行处理；在这种情况下，订单录入系统无需广播新订单消息。订单录入系统和库存系统可以就特定目标达成一致。代码清单\
  \ 5-3 展示了指定目标名称和类型的代码。\n\n#### 订阅持久性\n\n如果 Bean 设计为监听主题，则 Bean 开发者可以进一步指定消息的持久性。主题可以是`持久`或`非持久`。使用`持久`主题可确保应用程序的可靠性。即使\
  \ EJB 容器暂时离线，也能确保消息不会丢失。例如，我们需要确保如果 EJB 容器宕机，从客户端应用程序接收的新采购订单不会丢失。所有采购订单都必须由 MDB\
  \ 可靠地处理。我们可以使用`@ActivationConfigProperty`注解，通过`subscriptionDurability`属性来指定持久性。代码清单\
  \ 5-5 展示了将该属性设置为`Durable`的代码。如果未设置此属性，容器将采用默认值`Non-Durable`。\n\n```\n@MessageDriven(\n\
  activationConfig= {\n@ActivationConfigProperty(propertyName=\"subscriptionDurability\"\
  , propertyValue=\"Durable\")}\n)\n代码清单 5-5\n将属性设置为 Durable 的代码\n```\n\n在`StatusMailer`\
  \ MDB 中，我们将使用`@ActivationConfigProperty`注解创建属性。消息的`destinationName`设置为`StatusMessageTopic`，`destinationType`设置为`javax.jms.Topic`。我们将使用`mappedName`参数指定主题的物理目标名称。在我们的例子中，它与`destinationName`相同。代码清单\
  \ 5-6 展示了当前完成状态下的`StatusMailer` MDB。\n\n```\npackage com.apress.ejb.chapter05;\n\
  import javax.ejb.ActivationConfigProperty;\nimport javax.jms.Message;\nimport javax.ejb.MessageDriven;\n\
  import javax.jms.MapMessage;\n@MessageDriven(activationConfig= {\n@ActivationConfigProperty(propertyName=\"\
  destinationName\", propertyValue=\"StatusMessageTopic\"),\n@ActivationConfigProperty(propertyName=\"\
  destinationType\", propertyValue=\"javax.jms.Topic\")\n}, mappedName=\"StatusMessageTopic\"\
  )\npublic class StatusMailerBean implements javax.jms.MessageListener{\npublic void\
  \ onMessage(Message message){\ntry  {\nif (message instanceof MapMessage) {\nMapMessage\
  \ orderMessage = (MapMessage)message;\nString from = orderMessage.getStringProperty(\"\
  from\");\nString to = orderMessage.getStringProperty(\"to\");\nString subject =\
  \ orderMessage.getStringProperty(\"subject\");\nString content = orderMessage.getStringProperty(\"\
  content\");\n}\nelse {\nSystem.out.println(\"Invalid message \");\n}\n} catch (Exception\
  \ ex)  {\nex.printStackTrace();\n}\n}\n}\n代码清单 5-6\nStatusMailerBean.java\n```\n\
  ```\n\n\n### MDB 中的依赖注入\n\nMDB 可以使用依赖注入来获取对 JavaMail、EJB 或其他对象等资源的引用。MDB 尝试获取和使用的资源必须在容器上下文或环境上下文中可用。\n\
  \n在图 5-5 的示例用例中，我们讨论了在消息处理完成后创建一封电子邮件，并通过电子邮件将订单状态发送给客户。为了在 `StatusMailer` 消息 Bean\
  \ 中实现这一点，我们需要获取一个 JavaMail 会话，以便创建并发送电子邮件。JavaMail 是一个 API，它提供了一个独立于平台的框架来构建邮件应用程序。JavaMail\
  \ API 在 Java EE 平台中可用。\n\n我们可以使用依赖注入在 MDB 中获取 JavaMail 会话。清单 5-7 展示了使用依赖注入和 JavaMail\
  \ API 完成的 `StatusMailer` MDB。`@Resource` 注解用于注入一个名为 `mail/wineappMail` 的 JavaMail\
  \ 会话，该会话已在 GlassFish 应用服务器中注册为邮件资源。注入的邮件会话用于创建 `javax.mail.Message`，并使用 setter 方法创建邮件消息的头部和内容。最后，使用\
  \ `javax.mail.Transport` 类中的 `send()` 方法发送创建的消息。\n\n```\npackage com.apress.ejb.chapter05;\n\
  import javax.annotation.Resource;\nimport javax.ejb.ActivationConfigProperty;\n\
  import javax.jms.Message;\nimport javax.ejb.MessageDriven;\nimport javax.jms.MapMessage;\n\
  import javax.mail.Transport;\nimport javax.mail.internet.InternetAddress;\nimport\
  \ javax.mail.internet.MimeMessage;\n@MessageDriven(activationConfig= {\n@ActivationConfigProperty(propertyName=\"\
  destinationName\",\npropertyValue=\"StatusMessageTopic\"),\n@ActivationConfigProperty(propertyName=\"\
  destinationType\",\npropertyValue=\"javax.jms.Topic\")\n}, mappedName=\"StatusMessageTopic\"\
  )\npublic class StatusMailerBean implements javax.jms.MessageListener{\n@Resource(name=\"\
  mail/wineappMail\" )\nprivate javax.mail.Session ms;\npublic void onMessage(Message\
  \ message){\ntry  {\nif (message instanceof MapMessage) {\nMapMessage orderMessage\
  \ = (MapMessage)message;\nString from = orderMessage.getStringProperty(\"from\"\
  );\nString to = orderMessage.getStringProperty(\"to\");\nString subject = orderMessage.getStringProperty(\"\
  subject\");\nString content = orderMessage.getStringProperty(\"content\");\njavax.mail.Message\
  \ msg = new MimeMessage(ms);\nmsg.setFrom(new InternetAddress(from));\nInternetAddress[]\
  \ address = {new InternetAddress(to)};\nmsg.setRecipients(javax.mail.Message.RecipientType.TO,\
  \ address);\nmsg.setSubject(subject);\nmsg.setSentDate(new java.util.Date());\n\
  msg.setContent(content, \"text/html\");\nSystem.out.println(\"MDB: Sending Message...\"\
  );\nTransport.send(msg);\nSystem.out.println(\"MDB: Message Sent\");\n}\nelse {\n\
  System.out.println(\"Invalid message \");\n}\n} catch (Exception ex)  {\nex.printStackTrace();\n\
  }\n}\n}\n清单 5-7\n使用依赖注入和 JavaMail API 完成的 StatusMailer MDB\n```\n\n### 生命周期回调方法\n\
  \n在某些情况下，使用 MDB 的应用程序需要细粒度的控制。MDB 支持两种生命周期事件回调：\n\n*   `PostConstruct`\n*   `PreDestroy`\n\
  \n`PostConstruct` 回调发生在 Bean 上第一次调用消息监听器方法之前，并且在容器执行依赖注入之后。`PreDestroy` 回调发生在 MDB\
  \ 从池中移除或销毁时。\n\n例如，`PostConstruct` 回调可用于初始化某些属性或资源，而 `PreDestroy` 回调可用于清理或释放已获取的资源。\n\
  \n在 MDB 类上定义的回调方法应具有以下签名：\n\n```\npublic void  ()\n```\n\n回调方法也可以在 Bean 的监听器类上定义，在这种情况下，方法应具有以下签名：\n\
  \n```\npublic void (Object)\n```\n\n其中 `Object` 可以声明为实际的 Bean 类型，该类型是运行时传递给回调方法的参数。\n\
  \n回调方法可以是 MDB 中任何带有回调注解的方法。以下规则适用于这些方法：\n\n*   方法应为 public。\n*   方法不能是 final 或 static。\n\
  *   返回类型应为 `void`。\n\n如前所示，方法可以接受零个或一个参数。回调监听器类通过与其关联的 MDB 类上的 `@CallbackListener`\
  \ 注解来标识。\n\n### 拦截器\n\nEJB 规范提供了一些称为拦截器的注解，允许您拦截业务方法的调用。可以为 MDB 定义拦截器方法。\n\n您可以为特定方法添加\
  \ `@AroundInvoke` 注解或在部署描述符中添加 `<around-invoke-method>` 元素，或者您可以定义一个拦截器类，其方法在 MDB\
  \ 类中的 `onMessage()` 方法被调用之前被调用。拦截器类通过与其关联的 MDB 类上的 `@Interceptor` 注解来标识。在存在多个拦截器类的情况下，使用\
  \ `@Interceptors` 注解。Bean 类或任何给定的拦截器类上只能存在一个 `AroundInvoke` 方法。`AroundInvoke` 方法不能是\
  \ MDB 类的 `onMessage()` 方法。\n\n`AroundInvoke` 方法应具有以下签名：\n\n```\npublic Object (InvocationContext)\
  \ throws Exception\n```\n\n`InvocationContext` 的定义如下：\n\n```\npackage javax.ejb;\n\
  public interface InvocationContext {\npublic Object getBean();\npublic java.lang.reflect.Method\
  \ getMethod();\npublic Object[] getParameters();\npublic void setParameters(Object[]\
  \ params);\npublic EJBContext getEJBContext();\npublic java.util.Map getContextData();\n\
  public Object proceed() throws Exception;\n}\n```\n\n以下列表描述了每个方法：\n\n*   `getBean()`:\
  \ 返回被调用方法所在的 Bean 实例\n*   `getMethod()`: 返回被调用的 Bean 实例上的方法\n*   `getParameters()`:\
  \ 返回方法调用的参数\n*   `setParameters()`: 允许修改方法调用的参数\n*   `getEJBContext()`: 使拦截器方法能够访问\
  \ Bean 的 `EJBContext`\n*   `getContextData()`: 允许使用返回的 `Map` 在同一个 `InvocationContext`\
  \ 实例中的拦截器方法之间传递值\n*   `proceed()`: 如果有下一个拦截器则调用它，否则调用目标 Bean 方法\n\n### 异常处理\n\n\
  EJB 规范概述了两种类型的异常：应用程序异常和系统异常。有关这些异常的更多一般信息，请参见第 2 章的“异常处理”部分。对于 MDB，监听器方法不得抛出 `java.rmi.RemoteException`\
  \ 或一般的运行时异常。客户端假定消息消费者即使在发生运行时异常后仍然存在。如果在抛出运行时异常后客户端发送消息，则 EJB 容器会将消息委托给另一个 MDB\
  \ 实例。此外，如果您允许异常“逃逸”出 MDB，则该消息不被视为已被消费，它会回到队列/主题中。然后，有问题的消息会被重新投递。这被称为“毒消息”问题。\n\n\
  回调方法可以抛出运行时异常。由在事务内执行的回调方法抛出的运行时异常会导致该事务回滚。回调方法不得抛出应用程序异常。\n\n\n\n### 客户端视图\n\n\
  对于客户端应用程序而言，MDB 只是一个消息消费者。客户端应用程序可以是任何使用 JMS API 发送消息的 Java EE 组件的 Java 客户端。从客户端应用程序的角度来看，MDB\
  \ 的存在完全隐藏在 MDB 作为消息监听器的目标或端点之后。\n\n客户端的 JNDI 命名空间可以配置为包含安装在网络上多台机器上的多个 EJB 容器中的\
  \ MDB 的目标或端点。企业 Bean 和 EJB 容器的实际位置，通常对使用该企业 Bean 的客户端是透明的。\n\n对消息目标的引用可以通过 `@Resource`\
  \ 注解（位于 `javax.annotation` 包中）注入，或者如果资源已在部署描述符中定义，则可以通过 JNDI 查找进行注入。\n\n注意\n\n从\
  \ EJB 3.2 开始，JMS 资源适配器可以通过使用其标准名称查找 MDB 来构造订阅名称。\n\n在前面讨论并如图 5-5 所示的用例中，我们有一个会话\
  \ Bean 充当客户端应用程序和消息主题之间的中介。客户端应用程序调用会话 Bean 中的业务方法，该会话成为创建和发送消息的客户端或 JMS 消息生产者。为了说明这一点，我们将创建一个无状态会话\
  \ Bean `OrderProcessing`，其中包含一个业务方法 `SendOrderStatus()`。清单 5-8 显示了 `OrderProcessing`\
  \ 会话 Bean 的代码。我们使用 `@Resource` 注解来注入 `TopicConnectionFactory` 和 `StatusMailer` MDB\
  \ 正在监听的 `Topic`。我们将在会话 Bean 中使用一些硬编码值来模拟客户电子邮件地址和电子邮件内容。在 `try` 块中，我们创建一个到 `statusMessageTopicConnectionFactory`\
  \ 的连接并启动该连接。使用创建的会话，我们通过 `createSession()` 和 `createProducer()` 方法创建一个主题会话和主题生产者。最后，我们创建一个\
  \ `MapMessage` 对象；用电子邮件地址、主题和内容填充消息；并使用 `send()` 方法将消息发送到 `Topic`。\n\n```\npackage\
  \ com.apress.ejb.chapter05;\nimport javax.annotation.Resource;\nimport javax.ejb.Stateless;\n\
  import javax.jms.Connection;\nimport javax.jms.JMSException;\nimport javax.jms.MapMessage;\n\
  import javax.jms.MessageProducer;\nimport javax.jms.Session;\nimport javax.jms.Topic;\n\
  import javax.jms.TopicConnectionFactory;\n@Stateless(name = \"OrderProcessing\"\
  )\npublic class OrderProcessingBean\n{\npublic OrderProcessingBean() {\n}\n@Resource(mappedName\
  \ = \"StatusMessageTopicConnectionFactory\")\nprivate TopicConnectionFactory statusMessageTopicCF;\n\
  @Resource(mappedName = \"StatusMessageTopic\")\nprivate Topic statusTopic;\npublic\
  \ String SendOrderStatus() {\nString from = \"chirag.rathod@oracle.com\";\nString\
  \ to = \"chirag.rathod@oracle.com\";\nString content =\n\"Your order has been processed\
  \ \" + \"If you have questions\" +\n\" call EJB Application with order id # \" +\
  \ \"1234567890\";\ntry {\nSystem.out.println(\"Before status TopicCF connection\"\
  );\nConnection connection = statusMessageTopicCF.createConnection();\nSystem.out.println(\"\
  Created connection\");\nconnection.start();\nSystem.out.println(\"statted connection\"\
  );\nSystem.out.println(\"Starting Topic Session\");\nSession topicSession =\nconnection.createSession(false,\
  \ Session.AUTO_ACKNOWLEDGE);\nMessageProducer publisher = topicSession.createProducer(statusTopic);\n\
  System.out.println(\"created producer\");\nMapMessage message = topicSession.createMapMessage();\n\
  message.setStringProperty(\"from\", from);\nmessage.setStringProperty(\"to\", to);\n\
  message.setStringProperty(\"subject\", \"Status of your wine order\");\nmessage.setStringProperty(\"\
  content\", content);\nSystem.out.println(\"before send\");\npublisher.send(message);\n\
  System.out.println(\"after send\");\n}\ncatch (JMSException e) {\ne.printStackTrace();\n\
  }\nreturn \"Created a MapMessage and sent it to StatusTopic\";\n}\n}\n清单 5-8\nOrderProcessingBean.java\n\
  ```\n\n注意\n\n在清单 5-8 中，将“from”和“to”字段的值更新为您的电子邮件 ID。\n\n为了完成图 5-5 中讨论的用例，我们需要做的最后一件事是提出一个客户端应用程序，该应用程序将查找\
  \ `OrderProcessing` 会话 Bean 并调用 `SendOrderStatus()` 消息。清单 5-9 显示了客户端应用程序的代码。在 `try`\
  \ 块中，我们对 `OrderProcessing` 会话 Bean 进行 JNDI 查找，并调用 `SendOrderStatus()` 业务方法。\n\n\
