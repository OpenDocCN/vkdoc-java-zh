- '# 7. 集成会话 Bean、实体、消息驱动 Bean 和 Web 服务


  ## 引言


  本书前面的章节涵盖了 EJB 及相关技术的各个组件。这些包括会话 Bean、消息驱动 Bean (MDB)、作为 Web 服务的无状态会话 Bean 以及 JPA
  实体。在本章中，我们将通过一个虚构的葡萄酒商店应用程序示例，向您展示如何将这些组件集成到一个完整的 Java EE 8 应用程序中。


  ## 应用程序概述


  我们将在本章中开发的示例应用程序是 Wines Online 应用程序，它为顾客（个人或分销商）提供多种搜索条件，使他们能够浏览、选择葡萄酒，将其添加到购物车，并处理订单。顾客必须先向
  Wines Online 应用程序注册，然后才能提交订单。订单提交后，将验证顾客的信用卡，这会触发订单处理消息，并向顾客发送关于订单状态的电子邮件通知。


  顾客用于搜索、导航和提交订单的屏幕是一个简单的 JavaServer Faces (JSF) Web 应用程序的一部分，该应用程序与使用 EJB 开发的后端服务和组件进行交互。在本章中，我们的重点将是开发应用程序的后端部分，这部分可以使用
  Servlet 和简单的 Java 客户端进行测试。在第 12 章中，我们将为这些后端服务开发一个 JSF 客户端。


  如图 7-1 所示，Wines Online 应用程序由客户端应用程序使用的多个后端组件组成，而这些后端组件又使用不同类型的服务来执行 CRUD（创建、检索、更新、删除）操作、向顾客发送关于订单状态的电子邮件通知、处理传入订单以及验证顾客的信用卡状态。我们将在下一节讨论这些组件的行为和功能。


