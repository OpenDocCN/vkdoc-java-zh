  \ wineAppSvcFacade =\n        (WineAppService) ejbContainer.getContext().lookup(\"\
  java:global/classes/WineAppService\");\n    String email = \"drwho@yahoo.com\";\n\
  \    Individual individual =\n        wineAppSvcFacade.createIndividual(\"Adam\"\
  , \"Beyda\", email);\n    assertEquals(\"WineAppServiceFacade.createIndividual():\
