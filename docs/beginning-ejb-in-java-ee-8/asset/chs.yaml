  \ EL 解析\n*   #1323 - 支持对 applicationMap 使用 @Inject @ApplicationMap\n    *   @Inject\n\
  \    *   Map applicationMap;\n    *   Map applicationMap;\n*   #1322 - 简化 #{externalContext}\
  \ 以使用 ExternalContextProducer\n*   #1309 - 支持对 ExternalContext 使用 @Inject\n    *\
  \   @Inject ExternalContext externalContext;\n*   #527 - 支持对 FacesContext 使用 @Inject\n\
  \    *   @Inject FacesContext facesContext;\n*   javax.faces.bean.ManagedProperty\
  \ 的替代方案\n*   #1396 - 用于 SSE 和 WebSocket 的 f:socket\n\n\n\n### Java EE Web 技术的演进\n\
  \nJava EE 技术已发展成为一个成熟、可靠且稳定的平台，使开发者能够构建企业级应用。该平台在 Web 技术领域也经历了显著的演进。图 12-8 展示了 Java\
  \ EE 平台中 Web 技术的演进历程。\n\n![A311833_3_En_12_Fig8_HTML.jpg](img/A311833_3_En_12_Fig8_HTML.jpg)\n\
  \n图 12-8\n\nJava EE Web 技术的演进\n\n在 Java Servlet 出现之前，CGI 脚本被用于生成动态 Web 内容。CGI 脚本有其自身的局限性，包括脚本作为独立进程运行，这导致了可扩展性问题。\n\
  \n在 CGI 脚本之后，Java Servlet 成为了 Java EE 平台中所有 Web 技术的基础。Java Servlet 为开发基于标准、可在不同\
  \ Web 容器间移植的 Web 组件和应用提供了一个良好的开端。Java Servlet 的缺点之一是代码密集——所有 HTML 都通过 `println()`\
  \ 方法输出。Servlet 未能为创建页面设计的图形设计师和创建动态内容的 Java 程序员之间搭建起桥梁。\n\nJSP 是 Web 技术演进中的下一步；它弥合了图形设计师与\
  \ Java 程序员之间的鸿沟。基于 Java Servlet 技术，JSP 页面是嵌入了 Java 代码的 HTML 页面。这种模式允许图形设计师创建 JSP\
  \ 页面，然后程序员可以通过添加 Java 代码或脚本片段使其具有动态性。JSP 页面在编译后会变成 Java Servlet。\n\n虽然 JSP 页面的出现很不错，但许多开发者现在不得不处理诸如遍历数据集合之类的繁琐任务。这促使了\
  \ JSP 标准标签库（JSTL）的诞生，它自动化了其中一些任务。\n\n尽管这些技术进步简化了 Web 应用的构建，但当时仍缺乏一个标准的组件模型来开发它们。除此之外，使用像\
  \ Visual Basic、Oracle Forms 和 PowerBuilder 这样的第四代语言（4GL）开发具有可重用组件的 Web 应用也尚不可行。\n\
  \nJSF 是最新的 Java EE Web 技术。凭借其组件模型，它解决了可重用组件以及简化 Web 应用构建的问题。不过，可重用组件模型并非 JSF 提供的唯一特性。我们将在后续章节中探讨\
  \ JSF 的其他一些特性和优势。\n\n#### 模型-视图-控制器模式\n\n在 Java EE Web 技术开发的早期阶段，大多数 Web 应用都是使用所谓的\
  \ Model-I 方法构建的。Model-I 的基本思想是，渲染动态 Web 内容的 Web 技术与后端系统的业务逻辑紧密交织在一起。这种方法没有关注点分离，导致了应用维护问题。Model-II\
  \ 方法（也称为模型-视图-控制器 [MVC] 模式）是 Model-I 方法的后续发展。这种方法的关键在于视图层与提供数据和业务逻辑的模型层之间的清晰分离。\n\
  \n模型-视图-控制器的主要优势包括：\n\n*   基于 JAX-RS 的面向动作框架\n*   手动控制器逻辑……你掌控自己的命运\n*   无 UI 组件\n\
  *   你选择你的前端技术\n\nMVC 模式并非 Java 语言所特有；它可以追溯到像 Smalltalk 这样的语言。在这种方法中，模型层用于业务逻辑和数据，视图用于渲染用户界面，控制器用于应用流程和事件处理。虽然\
  \ Java EE 平台在模型和视图相关技术方面一直在演进，但它并未包含一个可用于控制器侧的内置框架。相反，许多开发者使用 Java Servlet 技术构建了自制的控制器。还有许多人转向了\
  \ Apache Struts，它为编写自制控制器提供了一种替代方案。Apache Struts 是一个广泛使用的开源框架，已成为 Web 应用事实上的控制器框架。\n\
  \n最终，JSF 技术通过提供控制器作为框架的一部分，标准化了 MVC 模式中的控制器方面。\n\nMVC 1.0 控制器的优势包括：\n\n*   控制 MVC\
  \ 应用的请求处理\n*   JAX-RS 实现\n*   在类级别或方法级别使用 `@Controller` 注解的类\n*   必须是 CDI 管理的\n\
  *   可以创建混合类（在方法级别使用 `@Controller`）\n*   四种返回类型：String、void、Response、Viewable\n \
  \   *   String：返回视图路径\n    *   Void：需要 `@javax.mvc.View` 注解\n    *   Response：典型的\
  \ `javax.ws.rs.core.Response`，提供对响应的完全访问\n    *   Viewable：`javax.mvc.Viewable`，包含关于视图及其处理方式的信息\n\
  *   默认响应类型为 text/html，但可以通过 `@Produces` 修改\n\nMVC 1.0 包含模型，用于利用实体类处理数据，或存储到 CDI\
  \ bean 中。\n\n使用模型的两种方式包括：\n\n*   `javax.mvc.Models` 类\n*   基于 CDI 的模型\n\nJSR 371：模型-视图-控制器\
  \ 1.0 规范可在以下网址找到：[`https://www.mvc-spec.org/`](https://www.mvc-spec.org/)\n\n以下是\
  \ JSF 和 MVC 之间的主要区别：\n\nJSF：\n\n*   基于组件\n*   控制器逻辑\n*   自动化处理\n*   Facelets\n*\
  \   快速开发\n*   与 REST 配合良好\n*   有状态……跨请求保持\n\nMVC：\n\n*   基于动作\n*   基于 JAX-RS 的层次化\n\
  *   手动验证/转换\n*   多种不同的视图选项\n*   精细控制请求/响应\n*   非常适合 REST\n*   跨请求无状态\n\n### JSF\
  \ 架构\n\n图 12-9 展示了简化的 JSF 架构。JSF 有一个名为 `FacesServlet` 的前端控制器 Servlet。`FacesServlet`\
  \ 扮演着将来自客户端的传入请求代理到正确位置的角色。如前所述，JSF 带有可重用的 Web 组件，可用于开发用户界面。这些 UI 组件可以与称为托管 bean\
  \ 的对象相关联。这些托管 bean 处理应用的逻辑，并与后端系统或组件（如 EJB）进行交互。JSF 中的每个 UI 组件都可以与不同的渲染工具包相关联，这些工具包可以生成不同的标记，例如\
  \ HTML 或 WML（无线标记语言），以适应不同类型的设备。\n\n![A311833_3_En_12_Fig9_HTML.jpg](img/A311833_3_En_12_Fig9_HTML.jpg)\n\
  \n图 12-9\n\nJSF 架构\n\n\n\n#### JSF 生命周期\n\n图 12-10 展示了处理初始请求以及来自客户端应用或用户界面的回送的 JSF\
  \ 生命周期。以下列表描述了生命周期的各个阶段：\n\n![A311833_3_En_12_Fig10_HTML.jpg](img/A311833_3_En_12_Fig10_HTML.jpg)\n\
  \n**图 12-10** JSF 生命周期\n\n*   **恢复视图**：如果传入的请求是初始请求，JSF 实现会创建视图。在视图创建过程中，会为每个 UI\
  \ 组件创建 UI 对象，并将其存储在组件树中。随后，UI 视图的状态会被保存，以供后续请求使用。如果传入的请求是回送，JSF 实现会恢复已保存的 UI 来处理当前请求。\n\
  *   **应用请求值**：在此阶段，会使用作为请求一部分发送的数据来更新属于视图的 UI 对象。\n*   **处理验证**：在此阶段，会对已提交的数据进行验证。\n\
  *   **更新模型**：在此阶段，会使用来自请求的已验证数据更新后端对象。接收到的数据转换也在此阶段进行。\n*   **调用应用**：在此阶段，会调用后端应用来完成请求的处理，并将响应渲染回客户端。\n\
  *   **渲染响应**：在此生命周期阶段，会渲染 UI 组件，并将响应发送回客户端。\n\n#### JSF 应用\n\n一个典型的 JSF 应用包含以下部分：\n\
  \n*   **JSP 页面或 Facelets**：应用中的 JSP 页面或 Facelets 包含封装在 JSP 标签中的 JSF UI 组件。每个 JSF\
  \ 组件都是一个与标记无关的构建块。它包含三个主要部分：一个 UIComponent、一个渲染器和一个标签处理器。UIComponent 定义了组件的行为（例如，单选按钮组或菜单等\
  \ UI 组件的行为）。它在运行时还与特定的渲染器相关联。渲染器负责决定向客户端渲染何种标记。标签处理器是一个 JSP 标签，允许在 JSP 中使用 JSF UI\
  \ 组件。\n*   **导航模型**：关于控制流如何在应用中流转的信息，定义在一个名为 `faces-config.xml` 的 XML 部署描述符中。该文件可以保存多种其他类型的信息，例如验证器、转换器和托管\
  \ Bean 列表。每个 JSF 应用可以包含多个 `faces-config.xml` 文件。\n*   **托管 Bean**：这些是促进应用逻辑的普通 Java\
  \ 类。它们可以用作来自后端组件数据的绑定，或者用于调用后端应用中的业务方法。\n\n### JSF 工具与组件\n\n仅仅拥有标准并不总是有帮助。来自开发者社区和供应商的支持对于一项技术的成功起着重要作用。虽然\
  \ JSF 的目标是极大地简化 Web 应用开发，但仅靠标准化无法实现这一目标。我们需要为开发者提供全套可用的 UI 组件来构建应用，以及全套的开发工具来辅助应用构建过程。在过去几年中，诸如\
  \ JDeveloper、Java Studio Creator 和 Eclipse 等开发工具已经为构建 JSF 应用提供了支持。作为 JSF 框架的一个开源实现，Apache\
  \ MyFaces 提供的组件比 JSF 参考实现中的组件功能更丰富。Oracle 也在 ADF Faces 的框架下发布了超过 100 个标准 Faces 组件。这些\
  \ ADF Faces 组件已被捐赠给 Apache 软件基金会，并且现在已成为 MyFaces 项目（又名 Trinidad）的一部分。所有这些因素都为 JSF\
  \ 技术的成功及其被开发者采用做出了重大贡献。\n\n**注意**\n\n关于 MyFaces 项目的信息，请访问：[`http://myfaces.apache.org`](http://myfaces.apache.org)。\n\
  \n## 使用 JSF 和 EJB 开发 Web 应用\n\n在第 7 章中，我们做了大量工作来集成不同类型的 EJB（会话 Bean、MDB、实体和 Web\
  \ 服务），以便为 Wines Online 应用开发一个功能完备的 EJB 后端基础设施。在本节中，我们将开发一个 JSF 客户端应用，该应用将运行在 EJB\
  \ 后端应用之上，如图 12-11 所示。\n\n![A311833_3_En_12_Fig11_HTML.jpg](img/A311833_3_En_12_Fig11_HTML.jpg)\n\
  \n**图 12-11** 示例应用架构\n\n本节的主要目标是向您展示如何开发一组 JSF 页面，并将它们连接到后端应用中的 EJB 组件。考虑到这一点，我们将从用户浏览一组\
  \ Web 页面以执行以下操作的方式开始：\n\n*   注册为新客户\n*   登录\n*   根据不同条件搜索葡萄酒\n*   将葡萄酒添加到购物车\n*\
  \   查看购物车内容\n*   提交订单\n\n图 12-12 展示了应用流程，并说明了一组允许用户执行上述操作的 JSF 页面。我们将一次构建一个页面，根据需要将每个页面连接到\
  \ EJB 后端应用，并完成整个应用。\n\n![A311833_3_En_12_Fig12_HTML.jpg](img/A311833_3_En_12_Fig12_HTML.jpg)\n\
  \n**图 12-12** JSF 应用页面流程\n\n我们将从一个简单的登录页面开始。\n\n\n\n### 登录页面\n\n为简化登录流程，我们将使用客户的电子邮件地址来验证和授权订单。`Email`\
  \ 是第 7 章使用的持久化单元中 `Customer` 实体的映射字段之一。清单 12-1 展示了 `login.jsp` 的代码。首先，有两个标签库指令、一些标准\
  \ HTML 标签以及一些用于渲染 JSF UI 组件的标签。任何包含 JSF 元素的页面都必须将 `f:view` 标签作为最外层的 JSF 标签。`h:form`\
  \ 标签创建一个 HTML 表单，`h:inputText` 标签创建一个输入文本字段，`h:commandButton` 标签在表单中创建一个提交按钮。你可能注意到，`h:inputText`\
  \ 的 `value` 属性与 HTML 中使用的语法不同。我们使用的是表达式语言 (EL) 语法 — `#{}`。表达式 `#{Login.email}` 表示\
  \ JSP 页面想要访问 `Login` 对象中的 email 属性。`Login` 对象是一个托管 bean，稍后将对此进行讨论。与 HTML 表单类似，`h:commandButton`\
  \ 有一个 `action` 属性。`action` 使用的 EL 语法是 `#{Login.processLogin}`，这意味着当用户点击提交按钮时，一个\
  \ `POST` 操作将触发 `Login` 托管 bean 中的 `processLogin` 方法。\n\n```\n\n登录页面\n\nBeginning\
  \ EJB: Wine Store Application \n输入电子邮件地址：\n\n清单 12-1\nlogin.jsp\n```\n\n图 12-18（显示在本章后面的“编译、部署和测试\
  \ JSF 应用程序”部分）展示了在浏览器中渲染的 `login.jsp` 页面。\n\n下一步是创建一个将与 `login.jsp` 一起使用的 `Login`\
  \ 托管 bean。托管 bean 是 JSF 应用程序使用的 JavaBean。这些对象由 JSF 实现管理，并且这些对象中的属性和方法可以通过使用值绑定和方法绑定表达式从\
  \ JSP 页面引用。清单 12-2 展示了 `Login` 托管 bean。`Login` 有三个属性字段及其访问器：`email`、`customer` 和\
  \ `shoppingCart`。我们在 `setShoppingCart()` 方法上方有一个 `@EJB` 注解。我们使用 setter 注入来注入我们在第\
  \ 7 章开发的有状态会话 bean `ShoppingCart`。我们的 bean 中还有一个额外的方法 `processLogin()`，它使用注入的 `shoppingCart`\
  \ 有状态会话 bean 调用 `findCustomer(String email)` 业务方法。如果客户数据库中存在该电子邮件 ID，此业务方法将返回一个\
  \ `Customer` 对象。还加入了额外的逻辑，以返回存储在 `faces-config.xml` 文件中的字符串值，供我们的导航模型使用。我们稍后将对此进行讨论。\n\
  \n```\npackage com.apress.ejb.chapter12.view.managed;\nimport com.apress.ejb.chapter07.ejb.ShoppingCartLocal;\n\
  import com.apress.ejb.chapter07.entities.Customer;\nimport javax.ejb.EJB;\npublic\
  \ class Login\n{\npublic Login() {\n}\nString email;\nCustomer customer;\nShoppingCartLocal\
  \ shoppingCart;\npublic void setEmail(String email) {\nthis.email = email;\n}\n\
  public String getEmail() {\nreturn email;\n}\npublic String processLogin() {\nString\
  \ navigation = null;\ncustomer = (Customer)shoppingCart.findCustomer(email);\nif\
  \ (customer != null) {\nnavigation = \"winehome\";\n}\nelse {\nnavigation = \"register\"\
  ;\n}\nreturn navigation;\n}\npublic void setCustomer(Customer customer) {\nthis.customer\
  \ = customer;\n}\npublic Customer getCustomer() {\nreturn customer;\n}\n@EJB\npublic\
  \ void setShoppingCart(ShoppingCartLocal shoppingCart) {\nthis.shoppingCart = shoppingCart;\n\
  }\npublic ShoppingCartLocal getShoppingCart() {\nreturn shoppingCart;\n}\n}\n清单\
  \ 12-2\nLogin.java\n```\n\n部署描述符 `faces-config.xml` 包含页面导航、托管 bean 等信息。清单 12-3 展示了包含进出\
  \ `login.jsp` 控制流的 `faces-config.xml`。它还展示了 `Login` 类被注册为托管 bean。我们将 `Login` 托管\
  \ bean 的作用域设置为 `session`。这允许我们通过会话存储有关客户和购物车的信息，这样我们就不必为相同的信息重新查询后端应用程序。这也便于在其他页面中使用这些信息，并调用\
  \ `ShoppingCart` 有状态会话 bean 上的其他业务方法，而无需再次查找该 bean。此外，我们创建了三个导航规则：\n\n*   从 `login.jsp`\
  \ 到 `winehome.jsp`，值为 `winehome`：如果登录成功，将使用此规则。\n*   从 `login.jsp` 到 `newCustomer.jsp`，值为\
  \ `register`：如果登录失败且客户想要注册为新客户，将使用此规则。\n*   从 `newCustomer.jsp` 到 `login.jsp`，值为\
  \ `success`：此规则用于在成功注册后将客户导航回登录页面。\n\n```\n\nLogin\ncom.apress.ejb.chapter12.view.managed.Login\n\
  session\n\n/login.jsp\n\nwinehome\n/winehome.jsp\n\nregister\n/newCustomer.jsp\n\
  \n/newCustomer.jsp\n\nsuccess\n/login.jsp\n\n清单 12-3\nfaces-config.xml\n```\n\n\
  到目前为止，我们已经向你展示了如何通过一个简单的登录页面开始使用 JSF 应用程序，该页面可以查找 EJB 并调用业务方法。在接下来的几节中，我们将继续完成葡萄酒商店\
  \ JSF 应用程序的其余页面。\n\n### 新客户注册页面\n\n清单 12-4 展示了 `newCustomer.jsp` JSF 页面的代码。此页面与之前创建的\
  \ `login.jsp` 页面非常相似，只是它有更多用于捕获客户信息的输入字段。JSP 页面中的所有输入字段（名字、姓氏、电话、电子邮件、街道 1、街道 2、城市、州、邮政编码、信用卡和信用卡到期日期）都具有值绑定表达式，这些表达式映射到\
  \ `NewCustomer` 托管 bean 中的属性。它还有一个提交按钮，其操作使用表达式 `#{NewCustomer.AddNewCustomer}`\
  \ 映射到托管 bean 中的 `AddNewCustomer()` 方法。\n\n```\n\n新客户页面\n\nBeginning EJB: Wine Store\
  \ Application \n输入以下信息以注册为新客户：\n\n名字\n\n姓氏\n\n电话\n\n电子邮件\n\n街道 1\n\n街道 2\n\n城市\n\
  \n州\n\n邮政编码\n\n信用卡\n\n信用卡到期日期\n\n清单 12-4\nnewCustomer.jsp\n```\n\n图 12-19（在“编译、部署和测试\
  \ JSF 应用程序”部分）展示了在浏览器中渲染的 `newCustomer.jsp` 页面。\n\n创建 `newCustomer.jsp` 页面后，我们将创建\
  \ `NewCustomer` 托管 bean。清单 12-5 展示了此托管 bean 的代码，它为 `newCustomer.jsp` 页面引用的所有属性提供了\
  \ getter 和 setter 方法。此外，该类使用 `@EJB` 注解注入了 `CustomerFacade` 无状态会话 bean。最后，`AddNewCustomer()`\
  \ 方法使用属性的 getter 方法创建一个新的 `Individual` 实体实例，并调用 `CustomerFacade` 中的 `AddCustomer()`\
  \ 业务方法。成功执行后，此方法返回一个 `success` 字符串，将用户导航到登录页面。\n\n\n\n```\npackage com.apress.ejb.chapter12.view.managed;\n\
  import com.apress.ejb.chapter07.ejb.CustomerFacadeLocal;\nimport com.apress.ejb.chapter07.entities.Address;\n\
  import com.apress.ejb.chapter07.entities.Individual;\nimport javax.ejb.EJB;\npublic\
  \ class NewCustomer\n{\nprivate String firstName;\nprivate String lastName;\nprivate\
  \ String phone;\nprivate String email;\nprivate String streetOne;\nprivate String\
  \ streetTwo;\nprivate String city;\nprivate String state;\nprivate String zipCode;\n\
  private String ccnum;\nprivate String ccexpDate;\n@EJB\nCustomerFacadeLocal customerFacade;\n\
  public NewCustomer() {\n}\npublic void setFirstName(String firstName) {\nthis.firstName\
  \ = firstName;\n}\npublic String getFirstName() {\nreturn firstName;\n}\npublic\
  \ void setLastName(String lastName) {\nthis.lastName = lastName;\n}\npublic String\
  \ getLastName() {\nreturn lastName;\n}\npublic void setPhone(String phone) {\nthis.phone\
  \ = phone;\n}\npublic String getPhone() {\nreturn phone;\n}\npublic void setEmail(String\
  \ email) {\nthis.email = email;\n}\npublic String getEmail() {\nreturn email;\n\
  }\npublic void setStreetOne(String streetOne) {\nthis.streetOne = streetOne;\n}\n\
  public String getStreetOne() {\nreturn streetOne;\n}\npublic void setStreetTwo(String\
  \ streetTwo) {\nthis.streetTwo = streetTwo;\n}\npublic String getStreetTwo() {\n\
  return streetTwo;\n}\npublic void setCity(String city) {\nthis.city = city;\n}\n\
  public String getCity() {\nreturn city;\n}\npublic void setState(String state) {\n\
  this.state = state;\n}\npublic String getState() {\nreturn state;\n}\npublic void\
  \ setZipCode(String zipCode) {\nthis.zipCode = zipCode;\n}\npublic String getZipCode()\
  \ {\nreturn zipCode;\n}\npublic void setCcnum(String ccnum) {\nthis.ccnum = ccnum;\n\
  }\npublic String getCcnum() {\nreturn ccnum;\n}\npublic void setCcexpDate(String\
  \ ccexpDate) {\nthis.ccexpDate = ccexpDate;\n}\npublic String getCcexpDate() {\n\
  return ccexpDate;\n}\npublic String AddNewCustomer() {\nIndividual customer = new\
  \ Individual();\ncustomer.setFirstName(firstName);\ncustomer.setLastName(lastName);\n\
  customer.setPhone(phone);\ncustomer.setEmail(email);\nAddress address = new Address();\n\
  address.setStreet1(streetOne);\naddress.setStreet2(streetTwo);\naddress.setState(state);\n\
  address.setCity(city);\naddress.setZipCode(zipCode);\ncustomer.setDefaultBillingAddress(address);\n\
  customer.setCcNum(ccnum);\ncustomer.setCcExpDate(ccexpDate);\nif (customerFacade\
  \ != null) {\ncustomerFacade.registerCustomer(customer);\n}\nreturn \"success\"\
  ;\n}\n}\n清单 12-5\nNewCustomer.java\n```\n\n注意\n\n第 7 章提供了客户端可用的所有 EJB 和业务方法的详细信息。\n\
  \n现在，我们需要更新清单 12-3 中所示的 `faces-config.xml` 文件，将 `NewCustomer` 添加为受管 bean。清单 12-6\
  \ 显示了需要添加的 XML 片段。与 `Login` 受管 bean 不同，我们将此 bean 的作用域设置为 `request`，因为我们不需要跨会话存储客户注册信息。\n\
  \n```\nNewCustomer\ncom.apress.ejb.chapter12.view.managed.NewCustomer\nrequest\n\
  \n清单 12-6\nfaces-config.xml，包含 NewCustomer 受管 Bean\n```\n\n注意\n\n我们已经在清单 12-3 中添加了从\
  \ `newCustomer.jsp` 到 `login.jsp` 的导航案例。\n\n我们已经完成了登录和新客户注册任务。下一步是允许用户根据不同的条件搜索葡萄酒。我们将从创建一个简单的\
  \ JSF 页面开始，该页面将提供指向用户可用不同选项的链接。\n\n### 链接页面\n\n清单 12-7 显示了 `winehome.jsp` JSF 页面的代码。此页面使用了一个\
  \ `h:commandLink` JSF UI 组件，该组件允许您嵌入在页面渲染时应显示的输出文本。它还包含一个用户可以点击以导航到下一页的活动链接。此页面为用户提供了三个选项：\n\
  \n*   所有可用葡萄酒的完整列表\n*   按年份、国家或品种搜索葡萄酒的功能\n*   查看购物车和提交订单的功能\n\n```\n\nWine Home\
  \ Page\n\nBeginning EJB: Wine Store Application \n\n清单 12-7\nwinehome.jsp\n```\n\
  \n我们可以为 `h:commandLink` 组件指定 `action` 属性，该属性可以是一个基于受管 bean 中方法或属性的表达式。或者，`action`\
  \ 属性也可以是 `faces-config.xml` 中定义的导航案例的名称。对于“所有葡萄酒的完整列表”选项，我们将使用方法绑定表达式 `#{WineList.findAllWines}`\
  \ 作为 `action` 属性值，而对于其余两个选项，我们将使用导航案例的名称。\n\n图 12-21（位于“编译、部署和测试 JSF 应用程序”部分）显示了在浏览器中渲染的\
  \ `winehome.jsp` 页面。\n\n下一步是定义 `WineList` 受管 bean，它将与后端 EJB 通信以获取所有葡萄酒的列表。清单 12-8\
  \ 显示了 `WineList` bean 的代码。我们将首先使用 `@EJB` 注解注入 `SearchFacade` EJB。bean 类中的 `findAllWines()`\
  \ 方法利用注入的 `SearchFacade` 无状态会话 bean，并调用 `getWineFindAll()` 业务方法，该方法返回可用葡萄酒的列表。返回的葡萄酒列表存储在受管\
  \ bean 的 `winesList` 属性中，并且字符串 `allwines` 作为导航案例返回。\n\n```\npackage com.apress.ejb.chapter12.view.managed;\n\
  import com.apress.ejb.chapter07.ejb.SearchFacadeLocal;\nimport com.apress.ejb.chapter07.entities.Wine;\n\
  import java.util.ArrayList;\nimport java.util.List;\nimport javax.ejb.EJB;\nimport\
  \ javax.faces.application.Application;\nimport javax.faces.component.html.HtmlDataTable;\n\
  import javax.faces.context.FacesContext;\nimport javax.faces.el.ValueBinding;\n\
  public class WineList\n{\npublic WineList() {\n}\n@EJB\nprivate SearchFacadeLocal\
  \ searchFacade;\nprivate List winesList = new ArrayList();\npublic String findAllWines()\
  \ {\nif (searchFacade == null) {\nreturn \"gohome\";\n}\nelse {\nwinesList = searchFacade.getWineFindAll();\n\
  return \"allwines\";\n}\n}\npublic void setWinesList(List winesList) {\nthis.winesList\
  \ = winesList;\n}\npublic List getWinesList() {\nreturn winesList;\n}\n}\n清单 12-8\n\
  WineList.java\n```\n\n为了完成此页面的工作，我们将使用清单 12-9 中所示的详细信息扩展 `faces-config.xml` 文件。我们将\
  \ `WineList` 定义为受管 bean，并添加了三个额外的导航规则，这些规则创建了以下链接：\n\n*   从 `winehome.jsp` 到 `searchwines.jsp`，将用户带到搜索页面\n\
  *   从 `winehome.jsp` 到 `wineList.jsp`，在执行受管 bean 中提供的 `findAllWines()` 方法之后\n* \
  \  从 `winehome.jsp` 到 `cartItems.jsp`，显示购物车中所有项目的列表\n\n```\nWineList\ncom.apress.ejb.chapter12.view.managed.WineList\n\
  session\n\n/winehome.jsp\n\nsearch\n/searchwines.jsp\n\nallwines\n/wineList.jsp\n\
  \ncartitems\n/cartItems.jsp\n\n清单 12-9\nfaces-config.xml，包含 WineList 受管 Bean\n```\n\
  \n我们将在接下来的章节中处理我们要导航到的三个页面。\n\n\n\n### 搜索页面\n\n清单 12-10 展示了 `searchwines.jsp` JSF\
  \ 页面的代码。该页面允许用户按年份、国家或葡萄品种搜索葡萄酒。我们使用了 `h:selectOneListBox` 组件，这些组件通过每个搜索条件的静态值列表进行填充。从列表框中选择的值会通过\
  \ `h:selectOneListBox` 组件的 `value` 属性中指定的值绑定表达式，存储在 `SearchWines` 托管 Bean 的属性中。我们还提供了三个提交按钮，其\
  \ `action` 属性包含方法绑定表达式，例如 `#{WineList.searchByYear}`，用于触发 `WineList` 托管 Bean 中的方法，该方法将从\
  \ EJB 后端应用程序中检索结果。\n\n```\n\nSearch Wines Page\n\nBeginning EJB: Wine Store Application\
  \ \nSearch Wines\n\nListing 12-10\nsearchwines.jsp\n```\n\n图 12-22（位于“编译、部署和测试 JSF\
  \ 应用程序”部分）展示了在浏览器中渲染后的 `searchwines.jsp` 页面。\n\n下一步是向 `WineList` 托管 Bean 添加新方法，并定义一个名为\
  \ `SearchWines` 的新托管 Bean。清单 12-11 展示了 `SearchWines` 托管 Bean，它包含三个属性（`year`、`varietal`\
  \ 和 `country`）及其访问器。用户在 `searchwines.jsp` 页面中选择的值存储在这些属性中，`WineList` 托管 Bean 可以检索这些值。\n\
  \n```\npackage com.apress.ejb.chapter12.view.managed;\npublic class SearchWines\n\
  {\npublic SearchWines() {\n}\npublic String year;\npublic String varietal;\npublic\
  \ String country;\npublic void setYear(String year) {\nthis.year = year;\n}\npublic\
  \ String getYear() {\nreturn year;\n}\npublic void setVarietal(String varietal)\
