  \n图 12-27\n\n通知电子邮件\n\n## 应用程序客户端容器\n\n我们在前面的章节中已经提到并使用了应用程序客户端容器，并且在图 12-4 和图 12-5\
  \ 中展示了几种应用程序架构。使用诸如 Java Swing 等技术开发的应用程序客户端或客户端程序可以在独立的 Java SE 环境中运行。应用程序客户端容器提供了客户端程序在执行期间可以使用的额外系统服务（例如安全性和部署）。\n\
  \n应用程序客户端可以利用应用程序客户端容器提供的身份验证服务来验证其用户。容器的服务可以与本地平台的身份验证系统集成，为企业用户提供单点登录功能。\n\n使用应用程序客户端容器的客户端程序可以调用\
  \ EJB。与其他 Java EE 组件类似，在客户端容器中运行的程序可以使用 Java 命名和目录接口 (JNDI) 来查找 EJB 或诸如 Java 消息服务\
  \ (JMS) 和 JavaMail 之类的资源。应用程序客户端容器还为客户端程序提供了注入功能。由于应用程序客户端容器不会创建应用程序客户端的实例，因此应使用静态字段和方法来注入任何资源。\n\
  \n应用程序客户端被打包成 JAR 文件。如果使用应用程序客户端容器来运行客户端程序，则必须将应用程序客户端容器与应用程序一起捆绑或打包，以便您可以在单独的桌面计算机上运行它。\n\
  \n\n\n## 摘要\n\n在本章中，我们介绍了可用于满足不同需求的各种应用架构，以及与之配套的编程模型。我们探讨了适用于 Web 和桌面应用的架构，还研究了能够利用发布为\
  \ Web 服务的 EJB 的 Web 服务客户端应用和业务流程服务。\n\n我们讨论了基于 Java EE 的 Web 技术如何演进，从而显著简化了 Web\
  \ 应用开发。\n\n我们深入剖析了 JSF 架构、JSF 生命周期和 JSF 应用，以及 JSF 工具和 UI 组件的当前状态。\n\n最终，我们构建了一个全面的\
  \ JSF 应用，用于与第 7 章开发的集成式 EJB 后端应用进行通信。在开发过程中，我们演示了几种编程技术，用于在 JSF 应用中共享数据，以及在后端应用中查找和调用业务方法。\n\
  \n最后，我们研究了应用客户端容器，包括它为在桌面机器上运行的客户端程序提供的服务。\n\n本书的最后一章将详细介绍各种 EJB 测试场景，并指导您如何使用 JUnit\
  \ 在 GlassFish 的可嵌入 EJB 容器中测试 EJB 组件（和 JPA 实体）。\n\n"
- "# 13. 在可嵌入 EJB 容器中进行测试\n\n与所有关键任务软件一样，EJB 组件在部署到生产环境之前必须经过充分测试。EJB 中最精细的粒度是其方法；因此，适当的单元测试必须隔离地测试每个\
  \ EJB 的每个方法。对于无状态会话 Bean，这通常就足够了。由于有状态会话 Bean 也可能包含状态，因此完全覆盖还需要包含更粗粒度的场景，涉及方法调用序列。当无状态会话\
  \ Bean 通过 JPA 实体等方式在数据库中有效存储“状态”信息时，通常也需要多步骤的测试场景。在本章中，我们将研究单方法和多方法测试，涵盖主要作为基于 JPA\
  \ 操作的服务接口的无状态和有状态会话 Bean。\n\n## 测试客户端\n\n到目前为止，本书中的示例主要使用 Servlet 作为客户端来调用 EJB 方法。使用诸如\
  \ ServletUnit 之类的测试框架，Servlet 可以作为测试 EJB 的可行单元测试平台。类似地，调用 EJB 的 JSF 客户端可以使用 HttpUnit\
  \ 框架进行单元测试，该框架允许您记录用户在浏览器中与 JSF 客户端的交互，然后将实际屏幕结果与预期屏幕结果进行比较。然而，这两种方法都必须在完整的 Java\
  \ EE 应用服务器内执行。在本章中，我们将探索一种在纯 Java SE 环境中测试 EJB 的轻量级选项。\n\n## EJB Lite\n\nEJB Lite\
  \ 在 EJB 3.1 中引入，并在 EJB 3.2 中进一步增强，它被指定为完整 EJB 容器功能的最小子集。认识到许多企业应用只需要完整 EJB API 的一个子集，EJB\
  \ Lite 包含了 EJB 的许多最重要特性，但占用空间更小。EJB Lite 的实现包括下面描述的可嵌入 EJB 容器；以及 Java EE Web Profile。\n\
  \n由于 EJB Lite 是 EJB API 的严格子集，任何符合 EJB Lite 的应用也将在 Java EE 服务器内的完整 EJB 容器中运行。也就是说，EJB\
  \ Lite 不显式支持 EJB API 之外的任何行为。\n\n## 可嵌入 EJB 容器\n\n可嵌入 EJB 容器本质上是一个 Java 库，它提供由 EJB\
  \ Lite 规范定义的服务。它模拟在 Java EE 环境中运行的 EJB 容器，但它在 Java SE 环境中运行。实际上，尝试从 Java EE 环境内部实例化可嵌入\
  \ EJB 容器是受限的。这个可嵌入容器为 EJB 提供了一个运行环境，提供注入的资源、安全性和 JTA 事务接口，以便 EJB 可以在受控环境中进行测试。\n\
  \n## 本章组织方式\n\n在本章中，我们将探讨围绕单元测试的一些主要概念。然后，我们将研究如何使用可嵌入 EJB 容器设置、执行和调试 JUnit 测试，并从我们的\
  \ WineApp 应用中的几个场景中汲取经验。接下来，我们将仔细研究 EJB Lite 提供的服务，揭示其优势和局限性，并展示一些有用的捷径来隔离正在测试的\
  \ EJB 和 JPA 组件，同时降低测试环境的复杂性。\n\n在研究了使您能够在可嵌入 EJB 容器中使用 EJB 的 JUnit 测试代码之后，我们将研究一些您可以利用的、特别适合测试环境的配置选项。在本章结束时，我们将逐步指导您如何在\
  \ NetBeans 中设置和配置 JUnit 环境，然后执行和调试测试。\n\n### 概念\n\n让我们更仔细地研究一下本章将涵盖的一些主要概念。\n\n\
  #### JUnit\n\nJUnit 是一个广泛用于测试各种形式 Java 类的测试框架。测试类是普通的 Java 类，它们被注解以标识具有特殊用途的方法。被注解为\
  \ `@Test` 的方法标识一个单独的单元测试。该测试在被测试的类上调用一个或多个方法，获取调用这些方法的结果，并将实际结果与预期结果进行比较。当它们不同时，测试报告失败，测试人员会收到警报，表明某个测试需要关注。\n\
  \n通过编写全面测试一个或多个类行为的 JUnit 测试，测试人员可以在每次对被测代码或任何间接调用的代码进行更改时执行这些测试。任何失败都表明预期的行为不再发生。此外，由于单元测试通常针对非常特定的功能点，失败的测试可以清晰地告知测试人员导致问题的特定代码区域。\n\
  \n由于 EJB 是一个遵循公共接口的组件，它非常适合这种形式的单元测试。EJB 3.1 引入的 EJB Lite 和可嵌入 EJB 容器正式允许 EJB 在纯\
  \ Java SE 环境中通过 JUnit 测试框架进行单元测试，而无需修改。\n\n#### EJB Lite\n\n让我们更仔细地研究一下构成 EJB Lite\
  \ 的特性子集。表 13-1 显示了 EJB 3.2 的主要特性中哪些包含在 EJB 3.2 Lite 中。\n\n表 13-1\n\n属于 EJB 3.2 Lite\
  \ 一部分的 EJB 3.2 特性\n\n| EJB 3.2 特性 | 是否包含在 EJB 3.2 Lite 中 |\n| --- | --- |\n| 会话\
  \ Bean（无状态、有状态和单例） | 是 |\n| 消息驱动 Bean (MDB) | 否 |\n| 实体 Bean (EJB 2.x) | 否 |\n|\
  \ Java 持久化 API (JPA) 2.0 | 是 |\n| 无接口视图 | 是 |\n| 本地业务接口 | 是 |\n| 远程接口 | 否 |\n| 可嵌入\
  \ API | 是 |\n| JAX-WS Web 服务端点 | 否 |\n| JAX-RPC Web 服务端点 | 否 |\n| 非持久化 EJB 定时器服务\
  \ | 是 |\n| 持久化 EJB 定时器服务 | 否 |\n| 本地异步会话 Bean 调用 | 是 |\n| 远程异步会话 Bean 调用 | 否 |\n\
  | 拦截器 | 是 |\n| RMI-IIOP 互操作性 | 否 |\n| 容器管理事务 | 是 |\n| Bean 管理事务 | 是 |\n| 声明式安全 |\
  \ 是 |\n| 编程式安全 | 是 |\n\n最值得注意的是，在 EJB 3.2 Lite 中，支持所有形式的本地会话 Bean，但不支持远程会话 Bean、MDB\
  \ 和作为 Web 服务的 EJB。EJB Lite 中包含安全性和 JTA 支持，包括对 BMT 和 CMT 的支持。最后，为 JPA 提供了对 EntityManager\
  \ 和 EntityManagerFactory 注入的支持。\n\n\n\n#### 可嵌入式 EJB 容器客户端\n\n使用可嵌入式 EJB 容器的客户端通过\
  \ JNDI 查找 EJB，而非通过注入方式，因为 Java EE 服务器提供了客户端注入，而在此环境中该功能缺失。不过，EJB 本身可以注入其他 EJB，以及其\
  \ EJB 容器提供的其他资源。\n\n在本章稍后展示的 JUnit 示例中，JUnit 测试类本身即为可嵌入式 EJB 容器的客户端。它们通过静态工厂方法直接实例化容器，并可选择使用配置属性对容器进行初始化。随后，容器会向客户端提供一个\
  \ `InitialContext`，客户端可通过 JNDI 命名空间查找 EJB 及其他资源。可嵌入式 EJB 容器能够在运行时支持 EJB，为会话 Bean\
  \ 注入资源，提供用于执行事务的 JTA 上下文，以及 EJB Lite 规范中列出的所有其他服务（参见表 13-1）。\n\n当可嵌入式 EJB 容器在包含\
  \ GlassFish 可嵌入式服务器（同样运行于 Java SE 环境）的环境中实例化时，GlassFish 会通过向可嵌入式 EJB 容器提供服务来增强用户体验。\n\
  \n## JUnit 测试\n\n在探讨了本章的核心概念后，让我们来看一些代码示例。与可嵌入式 EJB 容器类似，JUnit 本质上是一个 Java 库，你将其包含在类路径中即可为应用程序启用相关功能。虽然描述\
  \ JUnit 的所有特性（包括将测试分组为测试套件、定义初始化参数等）超出了本章范围，但就我们的示例而言，了解编写和执行 JUnit 类的基本任务如下会很有帮助：\n\
  \n*   编写遵循 JUnit 模式的测试类，以初始化测试环境。\n    *   编写一个或多个方法，通过调用 EJB 的一个或多个方法执行特定单元测试，从这些方法调用中获取结果，并将结果与先前定义的预期结果进行比较。\n\
  \    *   在类级别上，当类中任何测试方法首次被调用时实例化可嵌入式 EJB 容器，并在最后一个测试方法被调用后关闭容器以释放资源。\n    *   在测试级别上，初始化\
  \ JPA 持久化单元使用的数据库连接，以清除任何现有数据，并将状态重置为正确配置的状态。\n*   调用 JUnit 测试运行器，将待执行测试类的名称作为参数传递，并将以下内容添加到类路径中：\n\
  \    *   JUnit 类（`.jar` 文件）\n    *   你编写的 JUnit 类（可选地打包在 `.jar` 文件中）\n    *   待测试\
  \ EJB 的 `.jar` 文件，以及任何依赖的 `.jar` 文件（如 JPA 持久化单元）\n    *   可嵌入式 EJB 容器的 `.jar` 文件，以及其所需的任何依赖\
  \ `.jar` 文件\n\n如本章后续所示，NetBeans、JDeveloper 或 Eclipse 等 IDE 能极大简化调用过程，甚至会在你的 JUnit\
  \ 测试类中设置许多基础框架。这样，你只需专注于编写每个单元测试特有的核心代码。\n\n现在，让我们剖析一个针对 WineApp 示例应用程序中的 EJB 编写的\
  \ JUnit 测试类，以测试几个场景。\n\n### WineAppServiceTest：WineAppService EJB 的 JUnit 测试类\n\n\
  作为本章的示例，我们在清单 13-1 中提供了一个 JUnit 测试类，其中包含在可嵌入式 EJB 容器中对 EJB 进行单元测试所需的所有元素。\n\n\n\n\
  ```\npublic class WineAppServiceTest {\nprivate static EJBContainer ejbContainer;\n\
  private static NetworkServerControl derbyServer;\npublic WineAppServiceTest() {\n\
  }\n@BeforeClass\npublic static void setUpClass() throws Exception {\nPrintWriter\
  \ pw = new PrintWriter(System.out);\n//  启动 Derby 数据库服务器，等待其响应后再继续\ntry {\nderbyServer\
  \ = new org.apache.derby.drda.NetworkServerControl();\nderbyServer.start(pw);\n\
  int i = 50;\nwhile (--i > 0) {\ntry {\nderbyServer.ping();\nbreak;\n} catch (Exception\
  \ ex) {\nSystem.out.println(\"Derby 服务器已启动，正在等待响应...\");\n}\nThread.sleep(100);\n\
  }\n} finally {\npw.close();\n}\n//  实例化一个可嵌入的 EJB 容器\nejbContainer = javax.ejb.embeddable.EJBContainer.createEJBContainer();\n\
  }\n@AfterClass\npublic static void tearDownClass() throws Exception {\n//  关闭可嵌入的\
  \ EJB 容器，释放所有资源\nejbContainer.close();\n//  关闭 Derby 数据库服务器\nderbyServer.shutdown();\n\
  }\n@Before\npublic void setUp() {\n//  初始化领域模型中的数据\nPopulateDemoData.resetData(\"\
  Chapter13-EmbeddableEJBTests-ResourceLocal\", System.out);\n}\n@After\npublic void\
  \ tearDown() {\n}\n/**\n* 测试 WineAppService 上的 findCustomerByEmail 方法。\n*\n* 断言返回的\
  \ Customer 名为 \"James Brown\"。\n*\n* @throws Exception\n*/\n@Test\npublic void testFindCustomerByEmail()\
  \ throws Exception {\nSystem.out.println(\"findCustomerByEmail\");\nWineAppService\
  \ wineAppSvcFacade =\n(WineAppService) ejbContainer.getContext().lookup(\"java:global/classes/WineAppService\"\
  );\nCustomer customer =\nwineAppSvcFacade.findCustomerByEmail(PopulateDemoData.TO_EMAIL_ADDRESS);\n\
  assertEquals(\"WineAppServiceFacade.findCustomerByEmail(): 检查客户姓名\",\n\"James Brown\"\
  ,\ncustomer.getFirstName() + \" \" + customer.getLastName());\n}\n/**\n* 测试 WineAppService\
  \ 上的 createIndividual() 方法和 CustomerFacade 上的 findCustomerByEmail() 方法。\n*\n* 断言在\
  \ createIndividual() 中创建的 Individual 实例具有预期的 email 属性。\n* 断言在 findCustomerByEmail()\
  \ 中检索到的 Customer 具有预期的姓名。\n* 断言合并后 shippingAddress 属性处于受管状态。\n*/\n@Test\npublic\
  \ void testCreateIndividual() throws Exception {\nSystem.out.println(\"createIndividual\"\
  );\nWineAppService wineAppSvcFacade =\n(WineAppService) ejbContainer.getContext().lookup(\"\
  java:global/classes/WineAppService\");\nString email = \"drwho@yahoo.com\";\nIndividual\
  \ individual =\nwineAppSvcFacade.createIndividual(\"Adam\", \"Beyda\", email);\n\
  assertEquals(\"WineAppServiceFacade.createIndividual(): 检查 Individual.email 属性\"\
  ,\nemail, individual.getEmail());\nCustomerFacade custFacade =\n(CustomerFacade)\
  \ ejbContainer.getContext().lookup(\"java:global/classes/CustomerFacade\");\nCustomer\
  \ customer = custFacade.findCustomerByEmail(email);\nassertEquals(\"CustomerFacade.findCustomerByEmail():\
  \ 检查 Customer.email 属性\",\n\"Adam Beyda\", customer.getFirstName() + \" \" + customer.getLastName());\n\
  //  受管/分离实体状态检查\nAddress shippingAddress = new Address(\"San Mateo\", null, null,\
  \ null, null);\ncustomer.setDefaultShippingAddress(shippingAddress);\ncustomer =\
  \ custFacade.merge(customer);\nassertNotNull(\"customer.getDefaultShippingAddress().getId()\
  \ 为空\",\ncustomer.getDefaultShippingAddress().getId());\nassertNotNull(\"shippingAddress.getId()\
  \ 为空\",\nshippingAddress.getId());\n}\n/**\n* 测试 WineAppService 上的 createIndividual()\
  \ 和 createCustomerOrder() 方法，\n* WineFacade 上的 getWineFindByYear() 方法，以及 CustomerFacade\
  \ 上的 merge() 方法。\n*\n* 断言创建的订单总价值为 110。\n* 断言 customerOrder 和 customer 对象处于受管状态。\n\
  */\n@Test\npublic void testCreateCustomerOrder() throws Exception {\nSystem.out.println(\"\
  createCustomerOrder\");\nContext context = ejbContainer.getContext();\nWineAppService\
  \ wineAppSvcFacade =\n(WineAppService) context.lookup(\"java:global/classes/WineAppService\"\
  );\nWineFacade wineFacade =\n(WineFacade) context.lookup(\"java:global/classes/WineFacade\"\
  );\nCustomerFacade custFacade =\n(CustomerFacade) context.lookup(\"java:global/classes/CustomerFacade\"\
  );\n//  将 CartItem 添加到客户的购物车中，并合并客户更改\nfinal String email = \"drwho@yahoo.com\"\
  ;\nCustomer customer = wineAppSvcFacade.createIndividual(\"Adam\", \"Beyda\", email);\n\
  for (Wine wine : wineFacade.getWineFindByYear(2005)) {\ncustomer.addCartItem(new\
  \ CartItem(10, wine));\n}\ncustomer = custFacade.merge(customer);\nCustomerOrder\
  \ customerOrder = wineAppSvcFacade.createCustomerOrder(customer);\nFloat total =\
  \ new Float(0);\nfor (OrderItem orderItem : customerOrder.getOrderItemList()) {\n\
  total += orderItem.getQuantity() * orderItem.getPrice();\n}\nassertEquals(\"检查客户订单总额是否为\
  \ $270\", total, new Float(270));\n//  从持久化上下文中查询客户的最新状态\n//  （借助 CMT 使用新事务），并检查其是否包含一个具有已填充\
  \ 'id' 字段的客户订单\nCustomerOrder customerOrder1 =\nwineAppSvcFacade.findCustomerByEmail(email).getCustomerOrderList().get(0);\n\
  assertNotNull(\"customerOrder1.getId() 为空\", customerOrder1.getId());\n//  检查原始客户订单的\
  \ 'id' 字段是否已自动填充\nassertNotNull(\"customerOrder.getId() 为空\", customerOrder.getId());\n\
  //  检查客户引用的客户订单的 'id' 字段是否已自动填充\nCustomerOrder customerOrder2 = customer.getCustomerOrderList().get(0);\n\
  assertNotNull(\"customerOrder2.getId() 为空\", customerOrder2.getId());\n}\n}\n清单\
  \ 13-1\nWineAppServiceTest.java，一个用于测试 WineApp 应用程序中 EJB 的 JUnit 类\n```\n\n当此测试类在\
  \ JUnit 测试器中执行时，每个标记为 `@Test` 的方法都会作为独立的单元测试单独运行。然而，在执行这些方法中的任何一个之前，JUnit 会执行一些初始化步骤，以实例化可嵌入的\
  \ EJB 容器并初始化持久化单元中的数据。接下来，我们将从初始化步骤开始，探讨此 JUnit 类的各个元素。\n\n\n\n### 实例化可嵌入 EJB 容器并启动\
  \ Derby\n\n在执行本类中的任何测试之前，我们需要初始化可嵌入 EJB 容器。由于这是一个相对资源密集型的操作（尽管不如启动一个完整的 GlassFish\
  \ 服务器那么昂贵），我们希望每次启动 JUnit 测试器时只执行一次。JUnit 允许你使用 `@BeforeClass` 注解静态方法，这些方法会在每个 JUnit\
  \ 会话中执行一次，且在该类上执行第一个单元测试方法之前运行。我们的类级设置方法如下：\n\n```\n@BeforeClass\npublic static\
  \ void setUpClass() throws Exception {\nPrintWriter pw = new PrintWriter(System.out);\n\
  //  启动 Derby 数据库服务器，等待其响应后再继续\ntry {\nderbyServer = new org.apache.derby.drda.NetworkServerControl();\n\
  derbyServer.start(pw);\nint i = 50;\nwhile (--i > 0) {\ntry {\nderbyServer.ping();\n\
  break;\n} catch (Exception ex) {\nSystem.out.println(\"Derby 服务器已启动；正在等待响应...\"\
  );\n}\nThread.sleep(100);\n}\n} finally {\npw.close();\n}\n//  实例化一个可嵌入 EJB 容器\n\
  ejbContainer = javax.ejb.embeddable.EJBContainer.createEJBContainer();\n}\n```\n\
  \n我们首先启动 Derby 数据库，以便持久化单元能够连接到正在运行的服务器。由于 `org.apache.derby.drda.NetworkServerControl.start()`\
  \ 方法是异步的，我们必须假设服务器可能不会立即准备好接受连接，因此我们在一个循环中对其进行 ping 操作，每次迭代之间短暂休眠，直到它准备就绪或我们决定超时。\n\
  \n一旦 Derby 准备好接受连接，我们就通过调用 `javax.ejb.embeddable.EJBContainer.createEJBContainer()`\
  \ 来创建可嵌入 EJB 容器。我们的 `WineAppServiceTest` 类由 JUnit 测试器调用，NetBeans 启动测试器时使用的类路径包含\
  \ JPA 持久化单元 `.jar` 文件（来自第 7 章）、第 13 章 EJB jar 中定义的 EJB，以及运行 JUnit 框架和实例化可嵌入 EJB\
  \ 容器所需的所有必要 Java 库。当前（撰写本文时）的 GlassFish 实现会链接到 GlassFish 服务器安装区域，以提供 EJB 容器通常从其宿主\
  \ Java EE 服务器环境所需的服务。同样，由于我们在 Java SE 环境中运行，Java EE GlassFish 服务器实际上并未启动，但可嵌入 EJB\
  \ 容器所需的类会按需从构成 GlassFish 的 Java 库中加载。\n\n在 JUnit 会话结束时，必须正确关闭可嵌入 EJB 容器和 Derby 数据库服务器，以释放它们可能持有的任何资源。JUnit\
  \ 此时会调用使用 `@AfterClass` 注解的方法，我们的 `tearDownClass()` 方法执行这些任务：\n\n```\n@AfterClass\n\
  public static void tearDownClass() throws Exception {\n//  关闭可嵌入 EJB 容器，释放所有资源\n\
  ejbContainer.close();\n//  关闭 Derby 数据库服务器\nderbyServer.shutdown();\n}\n```\n\n\
  ### 在持久化单元中初始化数据\n\n虽然启动 Derby 和可嵌入 EJB 容器等步骤在每个 JUnit 测试会话中只需执行一次，但其他初始化步骤必须在每个\
  \ JUnit 测试之前执行。每个测试的初始化步骤放在一个（或多个）使用 `@Before` 注解的方法中，如下所示：\n\n```\n@Before\npublic\
  \ void setUp() {\n//  初始化领域模型中的数据\nPopulateDemoData.resetData(\"Chapter13-EmbeddableEJBTests-ResourceLocal\"\
  , System.out);\n}\n```\n\n对于我们的测试，我们希望确保每个单元测试开始时数据库中的数据相同，因此我们执行一个脚本来初始化数据库并将数据重置为所需状态。你可能对这个静态的\
  \ `PopulateDemoData.resetData()` 方法很熟悉，它在其他章节中也使用过。请注意，我们传递了一个持久化单元的名称，以便可以在不同的应用程序上下文中重用它。`Chapter07-ServiceIntegration-jpa`\
  \ 项目中的 JPA 持久化单元定义了它自己的 `persistence.xml` 文件，其中包含一个名为 `Chapter07-WineAppUnit-ResourceLocal`\
  \ 的 `<persistence-unit>`。我们用于 JUnit 测试的 `<persistence-unit>` 是 “`Chapter13-EmbeddableEJBTests-ResourceLocal`”，它定义在我们的上下文项目\
  \ `Chapter13-EmbeddedEJBTests` 的 “`Configuration Files`” 部分中。由于 JPA 持久化单元中的实体类对我们的测试/EJB\
  \ 模块是可见的，我们可以自由定义引用这些相同实体类的其他持久化单元。JPA 允许你为相同的实体类定义多个持久化单元，如果需要，可以使用多个 `persistence.xml`\
  \ 文件，从而允许每个持久化单元指定不同的数据库连接、模式生成计划、持久化提供程序或任何其他配置选项。在这种情况下，我们定义一个新的持久化单元，以便将它们映射到适合测试目的的数据库连接。这个连接将在下一节中描述。\n\
  \n\n\n#### 使用“jdbc/__default”连接\n\nGlassFish 预配置了一个非常适合可嵌入 EJB 容器使用的连接。该连接在请求时自动创建，并在嵌入式\
  \ GlassFish 服务器关闭时自动删除。它作为名为 `jdbc/__default` 的数据源资源提供给客户端，并被我们在 `Chapter13-EmbeddableEJBTests`\
  \ 中找到的 `persistence.xml` 文件中定义的 JTA 和 RESOURCE_LOCAL 持久化单元所使用，该文件如清单 13-2 所示。\n\n\
  ```\norg.eclipse.persistence.jpa.PersistenceProvider\njdbc/__default\ncom.apress.ejb.chapter07.entities.Address\n\
  com.apress.ejb.chapter07.entities.BusinessContact\ncom.apress.ejb.chapter07.entities.CartItem\n\
  com.apress.ejb.chapter07.entities.Customer\ncom.apress.ejb.chapter07.entities.CustomerOrder\n\
  com.apress.ejb.chapter07.entities.Distributor\ncom.apress.ejb.chapter07.entities.Individual\n\
  com.apress.ejb.chapter07.entities.InventoryItem\ncom.apress.ejb.chapter07.entities.OrderItem\n\
  com.apress.ejb.chapter07.entities.Supplier\ncom.apress.ejb.chapter07.entities.Wine\n\
  com.apress.ejb.chapter07.entities.WineItem\ntrue\n\norg.eclipse.persistence.jpa.PersistenceProvider\n\
  jdbc/__default\ncom.apress.ejb.chapter07.entities.Address\ncom.apress.ejb.chapter07.entities.BusinessContact\n\
  com.apress.ejb.chapter07.entities.CartItem\ncom.apress.ejb.chapter07.entities.Customer\n\
  com.apress.ejb.chapter07.entities.CustomerOrder\ncom.apress.ejb.chapter07.entities.Distributor\n\
  com.apress.ejb.chapter07.entities.Individual\ncom.apress.ejb.chapter07.entities.InventoryItem\n\
  com.apress.ejb.chapter07.entities.OrderItem\ncom.apress.ejb.chapter07.entities.Supplier\n\
  com.apress.ejb.chapter07.entities.Wine\ncom.apress.ejb.chapter07.entities.WineItem\n\
  true\n\n清单 13-2\npersistence.xml，包含我们测试使用的两个持久化单元\n```\n\n这两个持久化单元除了事务和模式生成行为外几乎完全相同。第一个持久化单元\
  \ `Chapter13-EmbeddableEJBTests-ResourceLocal` 将 `jdbc/__default` 引用为 `non-jta-data-source`，并在\
  \ `PopulateDemoData.resetData()` 操作中被我们的非 EJB Java 外观使用。由于我们知道测试会在每次测试前执行此操作，因此我们将其持久化单元配置为始终删除并重新创建该单元中实体所需的模式对象。这体现在为该单元定义的属性中：\n\
  \n```\n注意\n\n在 JPA 2.0 及更早版本中，规范未定义模式生成选项，用户必须依赖特定平台的支持，例如上面显示的 EclipseLink 属性。JPA\
  \ 2.1 通过许多标准配置属性引入了对模式生成的支持，包括与上述属性并行的属性：“`javax.persistence.schema-generation-action`”。目前\
  \ Java EE 8 提供 JPA 版本 2.2，但为了与 JPA 2.0 库兼容，我们在示例中暂时使用 EclipseLink 属性。\n```\n\n`persistence.xml`\
  \ 文件中的第二个持久化单元 `Chapter13-EmbeddableEJBTests-JTA` 可以假定模式已经创建，因此我们特意不为该持久化单元启用模式生成选项。\n\
  \n如果我们需要释放在单个单元测试运行期间获取的资源，我们可以使用标注了 `@After` 的方法来释放它们。在我们的示例中，我们不需要这样做，因此我们将方法体留空。\n\
  \n单元测试方法\n\n现在我们已经介绍了测试初始化步骤，接下来将注意力转向单元测试本身。每个单元测试都标注了 `@Test`，以区别于类中可能存在的其他普通方法，我们包含了三个测试方法。\n\
  \n第一个测试 `findCustomerByEmail()` 在 `WineAppService` EJB 上执行单个方法 `findCustomerByEmail()`，该方法返回一个\
  \ `Customer` 实例。然后它断言 firstName + lastName 是“`James Brown`”，即预期结果。我们的测试类控制持久化单元中数据的状态，因此它知道预期结果是什么。\n\
  \n```\n/**\n * 测试 WineAppService 上的 findCustomerByEmail。\n *\n * 断言返回的 Customer\
  \ 名为 \"James Brown\"。\n *\n * @throws Exception\n */\n@Test\npublic void testFindCustomerByEmail()\
  \ throws Exception {\n    System.out.println(\"findCustomerByEmail\");\n    WineAppService\
  \ wineAppSvcFacade =\n        (WineAppService) ejbContainer.getContext().lookup(\"\
  java:global/classes/WineAppService\");\n    Customer customer =\n        wineAppSvcFacade.findCustomerByEmail(PopulateDemoData.TO_EMAIL_ADDRESS);\n\
  \    assertEquals(\"WineAppServiceFacade.findCustomerByEmail(): 检查客户姓名\",\n    \
  \             \"James Brown\",\n                 customer.getFirstName() + \" \"\
  \ + customer.getLastName());\n}\n```\n\n通过 JNDI 进行 EJB 查找\n\nEJB 注入对 JUnit 测试类不可用，因为它运行在普通的\
  \ Java SE 环境中，而不是在可嵌入 EJB 容器内部。因此，我们通过 `EJBContainer` 对象提供的 `javax.naming.Context`\
  \ API 使用 JNDI 来获取我们正在测试的 EJB 的引用。根据 EJB 是全局应用于应用程序还是本地应用于上下文模块，有几种查找 EJB 的方法。在此示例中，我们的\
  \ EJB 是全局注册到应用程序的，我们可以使用全局命名空间来查找它们，使用诸如 `\"java:global/classes/WineAppService\"\
  ` 之类的 URL。\n\n第二个测试 `testCreateIndividual()` 是第一个测试的超集，但它不依赖于第一个测试的任何副作用：\n\n```\n\
  /**\n * 测试 WineAppService 上的 createIndividual() 和 CustomerFacade 上的 findCustomerByEmail()。\n\
  \ *\n * 断言在 createIndividual() 中创建的 Individual 实例具有预期的 email 属性。\n * 断言在 findCustomerByEmail()\
