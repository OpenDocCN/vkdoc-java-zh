  ```\n\n我们需要为之前创建的 `WineList` 托管 Bean（参见清单 12-8）添加新功能，即增加三个方法，这些方法绑定在 `searchwines.jsp`\
  \ JSF 页面的方法绑定表达式中。清单 12-12 展示了这三个方法：`searchByYear()`、`searchByCountry()` 和 `searchByVarietal()`。每个方法都需要从\
  \ `SearchWines` 托管 Bean 中获取属性值。JSF 通过 `FacesContext` 对象提供对请求数据和其他对象数据的访问。一旦我们获得了\
  \ `FacesContext` 的引用，就可以访问应用程序和托管 Bean。所有方法都使用相同的技术：从 `FacesContext` 获取 `Application`，然后调用带有值绑定表达式的\
  \ `createValueBinding()` 方法，以从 `SearchWines` 托管 Bean 中检索相关属性的值。从 `SearchWines` 检索到属性值后，该方法通过传入与搜索条件匹配的参数，调用\
  \ `SearchFacade` EJB 中的业务方法，以检索葡萄酒列表。检索到的葡萄酒列表存储在 `winesList` 属性中，该属性的类型为 `java.util.List`。\n\
  \n```\npublic String searchByCountry() {\nFacesContext ctx = FacesContext.getCurrentInstance();\n\
  Application app = ctx.getApplication();\nValueBinding wineyear = app.createValueBinding(\"\
  #{SearchWines.country}\");\nString country = wineyear.getValue(ctx).toString();\n\
  if (searchFacade == null) {\nreturn \"gohome\";\n}\nelse {\nwinesList = searchFacade.getWineFindByCountry(country);\n\
  return \"success\";\n}\n}\npublic String searchByVarietal() {\nFacesContext ctx\
  \ = FacesContext.getCurrentInstance();\nApplication app = ctx.getApplication();\n\
  ValueBinding wineyear = app.createValueBinding(\"#{SearchWines.varietal}\");\nString\
  \ varietal = wineyear.getValue(ctx).toString();\nif (searchFacade == null) {\nreturn\
  \ \"gohome\";\n}\nelse {\nwinesList = searchFacade.getWineFindByVarietal(varietal);\n\
  return \"success\";\n}\n}\npublic String searchByYear() {\nFacesContext ctx = FacesContext.getCurrentInstance();\n\
  Application app = ctx.getApplication();\nValueBinding wineyear = app.createValueBinding(\"\
  #{SearchWines.year}\");\nString year = wineyear.getValue(ctx).toString();\nif (searchFacade\
  \ == null) {\nreturn \"gohome\";\n}\nelse {\nwinesList = searchFacade.getWineFindByYear(new\
  \ Integer(year));\nreturn \"success\";\n}\n}\nListing 12-12\nWineList.java, with\
  \ Search Methods\n```\n\n所有方法都返回一个 `success` 值，该值将用作导航规则。我们需要将此导航规则添加到 `faces-config.xml`\
  \ 中，并将 `SearchWines` 注册为托管 Bean。清单 12-13 展示了需要添加到 `faces-config.xml` 中的 XML 片段。方法返回的\
  \ `success` 值会将用户导航到 `wineList.jsp`，该页面将显示葡萄酒列表。请注意，我们将 `SearchWines` 托管 Bean 的作用域设置为\
  \ `session`，因为我们也会从其他托管 Bean 访问其属性。\n\n```\n/searchwines.jsp\n\ngohome\n/winehome.jsp\n\
  \nsuccess\n/wineList.jsp\n\nSearchWines\ncom.apress.ejb.chapter12.view.managed.SearchWines\n\
  session\n\nListing 12-13\nfaces-config.xml, with the SearchWines Managed Bean\n\
  ```\n\n到目前为止，我们已经完成了以下任务：\n\n*   创建登录页面\n*   创建注册页面\n*   创建包含选项列表的主页\n*   创建搜索页面\n\
  \n接下来，我们将致力于在 `wineList.jsp` 页面中向用户展示葡萄酒列表。\n\n\n\n### 葡萄酒列表页面\n\n清单 12-14 展示了 `wineList.jsp`\
  \ JSF 页面的代码。在此页面中，我们使用了一个名为 `h:dataTable` 的新 UI 组件。该组件能够将类型为 `java.util.List` 的管理\
  \ Bean 属性中的数据集合渲染出来。在前面的章节中，我们一直将检索到的葡萄酒存储在 `winesList` 属性中。`#{WinesList.winesList}`\
  \ 表达式被用于 `h:dataTable` 的 `value` 属性，以表格形式显示葡萄酒列表。当葡萄酒列表展示给用户后，用户可以选择数据表组件中显示的某一款葡萄酒，以便在另一个页面查看该葡萄酒的详细信息，并在想要购买时将其添加到购物车。为了追踪数据表组件中被选中的葡萄酒，我们为\
  \ `h:dataTable` 添加了 `binding` 属性。最后需要做的是，为数据表中的每一行提供一个用户可点击以选择葡萄酒的超链接。为此，我们将显示葡萄酒\
  \ ID 的列用 `h:commandLink` 组件包裹起来。`h:commandLink` 的 `action` 属性值被设置为 `#{WinesList.invokeAddToCart}`\
  \ 表达式，这意味着我们需要为 `WinesList` 管理 Bean 扩展一个新方法：`invokeAddToCart()`。\n\n```\n\n葡萄酒列表页面\n\
  \nBeginning EJB: Wine Store Application\n\n清单 12-14\nwineList.jsp\n```\n\n图 12-23（位于“编译、部署和测试\
  \ JSF 应用程序”部分）展示了在浏览器中渲染后的 `wineList.jsp` 页面。\n\n清单 12-15 展示了我们需要添加到 `WinesList`\
  \ 管理 Bean 中的新代码。我们将添加一个新属性 `dataTable1`，以及相应的访问器方法，还有一个全新的方法 `invokeAddToCart()`。新的\
  \ `dataTable1` 属性用于设置 `wineList.jsp` 中 `h:dataTable1` 组件的 `binding` 属性值，如清单 12-14\
  \ 所示。在 `invokeAddToCart()` 方法中，我们通过 `dataTable1` 属性的 `getRowData()` 方法获取选中的行，并将其设置为新管理\
  \ Bean `JSFShoppingCart` 中 `selectedWine` 属性的值。我们采用了从 `FacesContext` 获取应用程序并设置属性值的技术，而不是像之前用例那样获取值。`invokeAddToCart()`\
  \ 方法在成功执行后返回 `addtocart`，我们将把它用作导航规则。\n\n```\nprivate HtmlDataTable dataTable1;\n\
  public void setDataTable1(HtmlDataTable dataTable1) {\nthis.dataTable1 = dataTable1;\n\
