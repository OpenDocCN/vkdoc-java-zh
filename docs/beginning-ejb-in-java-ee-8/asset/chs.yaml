  \n在 `JOINED` 策略中，层次结构中的每个实体都有自己的表，但仅用于映射在该实体类型上声明的字段。层次结构中的根实体映射到一个根表，该表定义了实体层次结构中所有表要使用的主键结构，以及鉴别器列和可选的版本列。层次结构中的其他每个表都定义一个与根表主键匹配的主键，并且可以选择从其\
  \ ID 列向根表的 ID 列添加外键约束。非根表不包含鉴别器类型或版本列。由于层次结构中的每个实体实例由一个虚拟行表示，该行跨越其自身的表以及其所有超类的表，因此它最终会与根表中捕获此鉴别器类型和版本信息的行进行连接。查询任何类型的所有字段都需要在超类型层次结构中的所有表之间进行连接。\n\
