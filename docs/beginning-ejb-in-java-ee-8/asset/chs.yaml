  \nsuccess\n/cartItems.jsp\n\n清单 12-20\nfaces-config.xml，包含 addtoCart 导航规则\n```\n\
  \n### 显示购物车项目页面\n\n清单 12-21 展示了 `cartItems.jsp` JSF 页面。在此页面中，我们想使用数据表组件显示购物车中的所有项目。`#{JSFShoppingCart.cartItems}`\
