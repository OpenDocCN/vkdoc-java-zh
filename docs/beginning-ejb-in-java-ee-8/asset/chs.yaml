  \n构建和测试示例代码\n\n既然我们已经研究了如何编写 JUnit 测试来针对可嵌入的 EJB 容器执行 EJB 单元测试，那么让我们在 NetBeans 中执行我们刚刚介绍的测试用例。\n\
