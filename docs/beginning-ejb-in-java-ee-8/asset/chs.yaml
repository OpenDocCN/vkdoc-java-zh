  \ JPA 实体的事务性 Java 门面，展示了隐式提交行为\n```\n\n该门面从 `EntityManagerFactory` 获取其 `EntityManager`，因此该\
  \ `EntityManager` 的生命周期现在由门面负责，而非容器。应用程序管理的 `EntityManager` 绑定到一个持久化上下文缓存，该缓存可以存在于事务上下文之外，并跨越多个事务存活，这本质上与有状态会话\
  \ Bean 的 `EXTENDED` 持久化上下文相同。这允许在事务启动之前调用诸如 `EntityManager.persist()` 之类的方法。这种事务外的调用会将一个新实体添加到持久化上下文中，但不会立即产生更新数据库的\
  \ SQL 调用。\n\n注意\n\n即使在 EntityManager 事务开始之前，持久化上下文也会在需要时悄然启动自己的私有事务，以在调用 `EntityManager.persist()`\
  \ 时处理任何 ID 生成器请求。由于我们将实体的 PK 字段绑定到了 `@GeneratedValue` ID 生成器，这些 ID 实际上会在 `persist()`\
  \ 期间被急切地获取并分配给实体。\n\n持久化上下文缓存不会刷新到数据库，直到事务通过 `EntityTransaction.begin()` 调用实际开始，而该调用可能紧接在\
  \ `EntityTransaction.commit()` 调用执行之前。也就是说，你可以选择在将任何更改应用到持久化上下文之前开始事务，或者将事务的开始推迟到准备提交时。在我们的示例中，我们将\
  \ `begin()` 调用推迟到了 `commitTransaction()` 方法内部：\n\n```\nprivate void commitTransaction()\
  \ {\nfinal EntityTransaction entityTransaction = em.getTransaction();\nif (!entityTransaction.isActive())\
  \ {\nentityTransaction.begin();\n}\nentityTransaction.commit();\n}\n```\n\n将此行为与使用默认\
  \ CMT 行为 `TransactionAttributeType.REQUIRED` 的无状态会话 Bean 进行对比，后者在调用会话 Bean 方法时隐式启动一个事务，并在从该方法调用返回时将工作提交到数据库。事务在该方法调用的边界内开始和结束，并且此类\
  \ CMT Bean 永远不会向其客户端暴露 `commitTransaction()` 或 `rollbackTransaction()` 方法，正如我们将在下一个\
  \ BMT 示例中看到的那样。隐式提交行为避免了将未提交的数据留在缓存中，从而防止因硬件或网络故障而丢失。然而，它也会产生额外的后端处理来完成工作，并在每次执行原子操作时提交（更不用说，每次调用都会创建和销毁一个持久化上下文缓存），这可能会影响性能。\n\
  \n一个 `RESOURCE_LOCAL` 类型的 `EntityManager` 为其客户端提供一个 `EntityTransaction` 对象来管理事务。清单\
  \ 8-4 中的 `commitTransaction()` 方法演示了其用法，而该门面的隐式行为是通过在每个更新持久化上下文（通过 persist、merge\
  \ 或 remove 操作）的方法末尾调用 `commitTransaction()` 的策略来实现的。\n\n\n\n### 使用 CMT 会话 Bean 过滤测试数据\n\
  \n通过 Java 外观（借助一个工具类）填充演示数据后，Servlet 客户端会调用一个无状态的 CMT 会话 Bean `OrderProcessorCMTBean`\
  \ 来过滤这些数据，移除可能由先前调用创建的 `Customer` 和 `Wine` 实体。我们本可以将数据填充和过滤功能整合到一个绑定到单个持久化单元的外观中，但这里我们特意混合搭配了不同的选项，以展示它们如何协同工作。实现这一点的关键在于，两个持久化单元（一个为\
  \ `RESOURCE_LOCAL`，另一个为 `JTA`）都指向同一个数据库连接。\n\n```\n//  通过移除所有 email 为 'xaction.head@yahoo.com'\
  \ 的现有 Customer\n//  以及所有 country 为 'United States' 的现有 Wine 来过滤数据。\nout.print(\"\
