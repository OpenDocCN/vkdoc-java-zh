  ### 持久化服务


  持久化服务以 JPA 持久化单元的形式向应用程序提供领域模型。该持久化单元由 JPA 实体以及一个 EntityManager 组成，EntityManager
  用于对实体执行 CRUD 操作，并在事务上下文中管理这些实体的持久化状态。


  图 7-4 展示了实体、继承模型以及它们之间的关系。`Customer` 实体由 `Individual` 和 `Distributor` 实体继承。`InventoryItem`、`CartItem`
  和 `OrderItem` 实体继承 `WineItem` 实体。`BusinessContact` 实体由 `Supplier` 实体继承。葡萄酒商店持久化单元还包含这些实体之间不同类型的关联（包括一对一、一对多和多对多），这些关联将从应用程序代码中访问。这些实体中使用的映射已在第
  3 章和第 4 章中介绍过。我们将重点介绍该应用程序其他组件中用于集成此持久化单元的代码。


