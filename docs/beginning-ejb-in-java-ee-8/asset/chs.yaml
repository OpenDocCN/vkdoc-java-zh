  ## 总结


  在本章中，我们向您介绍了作为 Java EE 8 一部分的 Web 服务和微服务。我们解释了遵循查找-绑定-执行模型的 Web 服务架构，以及像 UDDI、WSDL
  和 SOAP 这样的标准如何在标准化和互操作性方面使 Web 服务比早期的分布式计算模型更加普及。我们还简要讨论了 REST 架构模式和 RESTful Web
  服务，它们简化了 Web 服务的创建和使用。


  我们深入研究了 UDDI、SOAP 和 WSDL 标准的细节，并通过一个简单的信用服务示例演示了如何构建 WSDL 文档和 SOAP 消息。


  我们讨论了一些可以使用 Web 服务的用例，并讨论了它们如何适应内联网和互联网模型，包括一些提供 Web 服务的现有电子商务网站示例。


  然后，我们深入探讨了 Java EE 平台，并研究了不同的标准（JAX-WS、JAX-RS、JAXB、JAXR、SAAJ 和 JSR 224），这些标准使开发人员能够创建可在
  .NET 平台内移植和互操作的 Web 服务。


  接着，我们研究了如何使用简单的 Web 服务元数据注解将 EJB 无状态会话 Bean 发布为 Web 服务。我们开发了一个可以从 Web 服务客户端调用的信用服务。


  接下来，我们研究了使用 GlassFish 应用服务器和 Servlet 客户端编译、部署和测试 Web 服务，并且还研究了这种编程模型与使用 EJB 调用 Web
  服务的相似之处。


  最后，我们介绍了作为新 Java 平台一部分的 Java EE 微服务，以及如何使用 Spring Boot 项目构建一个简单的微服务示例。


  到目前为止，我们已经讨论了 EJB 规范的各个组件：会话 Bean、JPA 实体、MDB 和 Web 服务。在下一章中，我们将讨论如何集成所有这些组件来构建一个企业级应用程序。


