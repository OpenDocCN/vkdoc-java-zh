  i++;\n}\nstrBuf.append(i);\nstrBuf.append(\" 个客户和 \");\n//  移除所有国家为 'United States'\
  \ 的现有葡萄酒\ni = 0;\nfor (Wine wine : getWineFindByCountry(\"United States\")) {\n\
