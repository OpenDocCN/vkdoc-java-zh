  ```\n\n图 12-24（位于“编译、部署和测试 JSF 应用”部分）展示了在浏览器中渲染的 `addtoCart.jsp` 页面。\n\n我们将使用一个新的\
  \ `Quantity` 属性和一个 `addToCart()` 方法来更新 `JSFShoppingCart` 托管 bean。清单 12-19 展示了这两部分的代码片段。`Quantity`\
  \ 属性具有访问器方法，而 `addToCart()` 方法则使用从 `FacesContext` 获取应用并从 `Login` 托管 bean 中检索 `ShoppingCart`\
  \ 有状态 EJB 实例的技术。完成后，将调用 `addWineItem()` 业务方法，将所选葡萄酒和数量添加到 `ShoppingCart` EJB 中的购物车项目列表中。`addToCart()`\
  \ 方法返回一个值为 `success` 的结果，该结果将用作导航规则。\n\n```\nString Quantity;\npublic void setQuantity(String\
  \ quantity) {\nthis.Quantity = quantity;\n}\npublic String getQuantity() {\nreturn\
  \ Quantity;\n}\npublic String addToCart() {\nInteger qty = new Integer(Quantity);\n\
  FacesContext ctx = FacesContext.getCurrentInstance();\nApplication app = ctx.getApplication();\n\
  //检查客户是否已登录。\nValueBinding customerBinding = app.createValueBinding(\"#{Login.customer}\"\
  );\nif (customerBinding.getValue(ctx) == null) {\nreturn \"success\";\n}\nelse {\n\
  ValueBinding shoppingCartBinding = app.createValueBinding(\"#{Login.shoppingCart}\"\
  );\nshoppingCart = (ShoppingCartLocal)shoppingCartBinding.getValue(ctx);\nshoppingCart.addWineItem(selectedWine,\
  \ qty.intValue());\nreturn \"success\";\n}\n}\n清单 12-19\nJSFShoppingCart.java，包含\
  \ addToCart 方法\n```\n\n为了完成此任务，我们需要向 `faces-config.xml` 添加一个导航规则。清单 12-20 展示了 XML\
