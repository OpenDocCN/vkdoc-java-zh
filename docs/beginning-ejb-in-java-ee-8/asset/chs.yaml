  ### SOAP


  简单对象访问协议（SOAP），当前版本为 1.2，是一种基于 XML 的协议，用于在分布式和去中心化环境中使用 XML 交换信息。SOAP 是由 W3C 开发的标准。从根本上说，SOAP
  是 Web 服务的默认传输层。


  一条 SOAP 消息是一个普通的 XML 文档，包含以下元素：


  *   必需的 `Envelope` 元素将 XML 文档标识为 SOAP 消息。`Envelope` 是文档中的顶级元素。该信封是必需的，它基本上标记了 SOAP
  消息的开始和结束（尽管消息可以包含指向信封外部对象的链接）。信封包含 `Header` 和 `Body` 元素。

  *   可选的 `Header` 元素包含头部信息。当 SOAP 协议通过 HTTP 使用时，HTTP 头部提供有关内容类型、内容长度和消息接收者的信息。包含头部是为了在不事先与通信方达成协议的情况下向
  SOAP 消息添加功能。

  *   必需的 `Body` 元素包含调用和响应信息。`Body` 是必需元素，包含供消息接收者使用的信息。

  *   可选的 `Fault` 元素提供有关消息处理过程中发生的错误的信息。`Body` 元素可以包含一个可选的 `Fault` 元素来报告错误。


  图 6-2 展示了 SOAP 消息的元素。


