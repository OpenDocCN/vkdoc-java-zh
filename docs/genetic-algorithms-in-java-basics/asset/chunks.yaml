    problems. In the following chapters you’ll reuse the Population and Individual
    classes with only slight modifications. However, each following chapter will require
    heavy modifications to the GeneticAlgorithm class, as that class is where crossover,
    mutation, termination conditions, and fitness evaluation occurs.


