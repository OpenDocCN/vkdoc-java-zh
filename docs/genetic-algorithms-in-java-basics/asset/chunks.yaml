    \        return distance;\n    }\n\n    public int getX() {\n        return this.x;\n\
    \    }\n\n    public int getY() {\n        return this.y;\n    }\n}\n```\n\nThe\
    \ `City` class has a constructor that takes an x and y coordinate to create a\
    \ city on a 2D plane. The class also contains a `distanceFrom` method that calculates\
    \ the straight-line distance from the current city to another city using the Pythagorean\
    \ Theorem. Finally, there are two getter methods which can be used to retrieve\
    \ the city’s x and y position.\n\nNext, we should reinstate the `Individual` class\
    \ constructor we deleted in the “Before You Start” section. The traveling salesman\
    \ problem has different constraints on the chromosome from those of our last two\
    \ problems. Recall that the only constraints in the robot controller problem were\
    \ that the chromosome must be 128 bits long, and that it must be binary.\n\nUnfortunately,\
    \ this is not the case with the traveling salesman problem; the constraints are\
