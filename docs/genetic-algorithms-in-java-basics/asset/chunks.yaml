- fmt: "### Termination Check\n\nThe termination check we will use for this implementation\
    \ is slightly different from the one used in our previous genetic algorithm. Here,\
    \ we are going to terminate after a maximum number of generations have passed.\n\
    \nTo add this termination check, begin by adding the following `isTerminationConditionMet`\
    \ method to the `GeneticAlgorithm` class.\n\n```\npublic boolean isTerminationConditionMet(int\
    \ generationsCount, int maxGenerations) {\n    return (generationsCount > maxGenerations);\n\
    }\n```\n\nThis method simply accepts the current generation counter and the maximum\
    \ generations allowed and returns `true` or `false` depending on if the algorithm\
    \ should terminate or not. Truthfully, this is simple enough that we could use\
    \ the logic directly in the genetic algorithm loop’s “while” condition – however,\
    \ in favor of consistency, we’ll always implement the termination condition check\
    \ as a method in the `GeneticAlgorithm` class, even if it’s a trivial method like\
    \ the one above.\n\nNow we can apply our termination check to the evolution loop\
    \ by adding the following code to `RobotController`’s `main` method. We simply\
    \ pass through the number of generations and the maximum number of generations\
    \ as parameters.\n\nBy adding the termination condition to the “while” statement\
    \ you’re essentially making the loop functional, so we should also take this opportunity\
    \ to print out some stats and debug information.\n\nThe changes below are straightforward:\
    \ first, update the “while” conditional to use `ga.isTerminationConditionMet`.\
    \ Second, add calls to `population.getFittest` and `System.out.println` both in\
    \ the loop and after it in order to display progress and results.\n\nHere’s what\
    \ the `RobotController` class should look like at this point; we’ve just eliminated\
    \ three more TODOs and only have two left:\n\n```\npackage chapter3;\n\npublic\
    \ class RobotController {\n\n    public static int maxGenerations = 1000;\n\n\
    \    public static void main(String[] args) {\n        Maze maze = new Maze(new\
    \ int[][] {\n            { 0, 0, 0, 0, 1, 0, 1, 3, 2 },\n            { 1, 0, 1,\
    \ 1, 1, 0, 1, 3, 1 },\n            { 1, 0, 0, 1, 3, 3, 3, 3, 1 },\n          \
    \  { 3, 3, 3, 1, 3, 1, 1, 0, 1 },\n            { 3, 1, 3, 3, 3, 1, 1, 0, 0 },\n\
    \            { 3, 3, 1, 1, 1, 1, 0, 1, 1 },\n            { 1, 3, 0, 1, 3, 3, 3,\
    \ 3, 3 },\n            { 0, 3, 1, 1, 3, 1, 0, 1, 3 },\n            { 1, 3, 3,\
    \ 3, 3, 1, 1, 1, 4 }\n        });\n\n        // Create genetic algorithm\n   \
    \     GeneticAlgorithm ga = new GeneticAlgorithm(200, 0.05, 0.9, 2, 10);\n   \
    \     Population population = ga.initPopulation(128);\n\n        // Evaluate population\n\
    \        ga.evalPopulation(population, maze);\n\n        int generation = 1;\n\
    \n        // Start evolution loop\n        while (ga.isTerminationConditionMet(generation,\
    \ maxGenerations) == false) {\n            // Print fittest individual from population\n\
    \            Individual fittest = population.getFittest(0);\n            System.out.println(\"\
    G\" + generation + \" Best solution (\" + fittest.getFitness() + \"): \" + fittest.toString());\n\
    \n            // TODO: Apply crossover\n            // TODO: Apply mutation\n\n\
    \            // Evaluate population\n            ga.evalPopulation(population,\
    \ maze);\n\n            // Increment the current generation\n            generation++;\n\
    \        }\n\n        System.out.println(\"Stopped after \" + maxGenerations +\
    \ \" generations.\");\n        Individual fittest = population.getFittest(0);\n\
    \        System.out.println(\"Best solution (\" + fittest.getFitness() + \"):\
    \ \" + fittest.toString());\n    }\n}\n```\n\nIf you were to hit the Run button\
    \ now, you’d watch the algorithm quickly loop through 1,000 generations (with\
    \ no actual evolution!) and proudly present to you a very, very bad solution with\
    \ a fitness of, statistically speaking, most likely 1.0.\n\nThis is unsurprising;\
    \ we still haven’t implemented crossover or mutation! As you learned in [Chapter\
    \ 2](#A978-1-4842-0328-6_2_Chapter.html), you need at least one of those mechanisms\
    \ to drive evolution forward, but generally, you want both in order to avoid getting\
    \ stuck in a local optimum.\n\nWe have two TODOs left in the main method above,\
    \ and fortunately, we can resolve one of them very quickly. The mutation technique\
    \ we learned in [Chapter 2](#A978-1-4842-0328-6_2_Chapter.html) – bit flip mutation\
    \ – is also valid for this problem.\n\nWhen evaluating the feasibility of a mutation\
    \ or crossover algorithm, you must first consider the constraints on what’s considered\
    \ a valid chromosome. In this case, for this specific problem, a valid chromosome\
    \ only has two constraints: it must be binary, and it must be 128 bits long. As\
    \ long as those two constraints are met, there is no combination or sequence of\
    \ bits that is considered invalid. So, we’re able to reuse our simple mutation\
    \ method from [Chapter 2](#A978-1-4842-0328-6_2_Chapter.html).\n\nEnabling mutation\
    \ is simple, and is the same as in last chapter. Update the “TODO: Mutate population”\
    \ line to reflect the following:\n\n```\n// Apply mutation\npopulation = ga.mutatePopulation(population);\n\
    ```\n\nTry running the program again at this point. The results aren’t spectacular;\
    \ you may get a fitness score of 5 or 10 after 1,000 generations. However, one\
    \ thing is clear: the population is now evolving, and we’re getting closer to\
    \ the finish.\n\nWe have only one TODO remaining: crossover.\n\n### Selection\
    \ Method and Crossover\n\nIn our previous genetic algorithm, we used roulette\
    \ wheel selection to choose the parents for a uniform crossover operation. Recall\
    \ that crossover is a category of techniques used to combine the genetic information\
    \ of two parents. In this implementation, we are going to use a new selection\
    \ method called tournament selection and a new crossover method called single\
    \ point crossover."
  raw: '### Termination Check


    The termination check we will use for this implementation is slightly different
    from the one used in our previous genetic algorithm. Here, we are going to terminate
    after a maximum number of generations have passed.


    To add this termination check, begin by adding the following isTerminationConditionMet
    method to the GeneticAlgorithm class.


    `public boolean isTerminationConditionMet(int generationsCount, int maxGenerations)
    {`


    `return (generationsCount > maxGenerations);`


    `}`


    This method simply accepts the current generation counter and the maximum generations
    allowed and returns true or false depending on if the algorithm should terminate
    or not. Truthfully, this is simple enough that we could use the logic directly
    in the genetic algorithm loop’s “while” condition – however, in favor of consistency,
    we’ll always implement the termination condition check as a method in the GeneticAlgorithm
    class, even if it’s a trivial method like the one above.


    Now we can apply our termination check to the evolution loop by adding the following
    code to RobotController’s main method. We simply pass through the number of generations
    and the maximum number of generations as parameters.


    By adding the termination condition to the “while” statement you’re essentially
    making the loop functional, so we should also take this opportunity to print out
    some stats and debug information.


    The changes below are straightforward: first, update the “while” conditional to
    use ga.isTerminationConditionMet. Second, add calls to population.getFittest and
    System.out.println both in the loop and after it in order to display progress
    and results.


    Here’s what the RobotController class should look like at this point; we’ve just
    eliminated three more TODOs and only have two left:


    `package chapter3;`


    `public class RobotController {`


    `public static int maxGenerations = 1000;`


    `public static void main(String[] args) {`


    `Maze maze = new Maze(new int[][] {`


    `{ 0, 0, 0, 0, 1, 0, 1, 3, 2 },`


    `{ 1, 0, 1, 1, 1, 0, 1, 3, 1 },`


    `{ 1, 0, 0, 1, 3, 3, 3, 3, 1 },`


    `{ 3, 3, 3, 1, 3, 1, 1, 0, 1 },`


    `{ 3, 1, 3, 3, 3, 1, 1, 0, 0 },`


    `{ 3, 3, 1, 1, 1, 1, 0, 1, 1 },`


    `{ 1, 3, 0, 1, 3, 3, 3, 3, 3 },`


    `{ 0, 3, 1, 1, 3, 1, 0, 1, 3 },`


    `{ 1, 3, 3, 3, 3, 1, 1, 1, 4 }`


    `});`


    `// Create genetic algorithm`


    `GeneticAlgorithm ga = new GeneticAlgorithm(200, 0.05, 0.9, 2, 10);`


    `Population population = ga.initPopulation(128);`


    `// Evaluate population`


    `ga.evalPopulation(population, maze);`


    `int generation = 1;`


    `// Start evolution loop`


    `while (ga.isTerminationConditionMet(generation, maxGenerations) == false) {`


    `// Print fittest individual from population`


    `Individual fittest = population.getFittest(0);`


    `System.out.println("G" + generation + " Best solution (" + fittest.getFitness()
    + "): " + fittest.toString());`


    `// TODO: Apply crossover`


    `// TODO: Apply mutation`


    `// Evaluate population`


    `ga.evalPopulation(population, maze);`


    `// Increment the current generation`


    `generation++;`


    `}`


    `System.out.println("Stopped after " + maxGenerations + " generations.");`


    `Individual fittest = population.getFittest(0);`


    `System.out.println("Best solution (" + fittest.getFitness() + "): " + fittest.toString());`


    `}`


    `}`


    If you were to hit the Run button now, you’d watch the algorithm quickly loop
    through 1,000 generations (with no actual evolution!) and proudly present to you
    a very, very bad solution with a fitness of, statistically speaking, most likely
    1.0.


    This is unsurprising; we still haven’t implemented crossover or mutation! As you
    learned in [Chapter 2](#A978-1-4842-0328-6_2_Chapter.html), you need at least
    one of those mechanisms to drive evolution forward, but generally, you want both
    in order to avoid getting stuck in a local optimum.


    We have two TODOs left in the main method above, and fortunately, we can resolve
    one of them very quickly. The mutation technique we learned in [Chapter 2](#A978-1-4842-0328-6_2_Chapter.html)
    – bit flip mutation – is also valid for this problem.


    When evaluating the feasibility of a mutation or crossover algorithm, you must
    first consider the constraints on what’s considered a valid chromosome. In this
    case, for this specific problem, a valid chromosome only has two constraints:
    it must be binary, and it must be 128 bits long. As long as those two constraints
    are met, there is no combination or sequence of bits that is considered invalid.
    So, we’re able to reuse our simple mutation method from [Chapter 2](#A978-1-4842-0328-6_2_Chapter.html).


    Enabling mutation is simple, and is the same as in last chapter. Update the “TODO:
    Mutate population” line to reflect the following:


    `// Apply mutation`


    `population = ga.mutatePopulation(population);`


    Try running the program again at this point. The results aren’t spectacular; you
    may get a fitness score of 5 or 10 after 1,000 generations. However, one thing
    is clear: the population is now evolving, and we’re getting closer to the finish.


    We have only one TODO remaining: crossover.


    ### Selection Method and Crossover


    In our previous genetic algorithm, we used roulette wheel selection to choose
    the parents for a uniform crossover operation. Recall that crossover is a category
    of techniques used to combine the genetic information of two parents. In this
    implementation, we are going to use a new selection method called tournament selection
    and a new crossover method called single point crossover.'
