- fmt: "### Fitness Value Hashing\n\nAs discussed previously, the fitness function\
    \ is usually the most computationally expensive component of a genetic algorithm.\
    \ Thus, even small improvements to the fitness function can have a considerable\
    \ effect on performance. Value hashing is another method that can reduce the amount\
    \ of time spent calculating fitness values by storing previously computed fitness\
    \ values in a hash table. In large distributed systems, you could use a centralized\
    \ caching service (such as `Redis` or `memcached`) to the same end.\n\nDuring\
    \ execution, solutions found previously will occasionally be revisited due to\
    \ the random mutations and recombinations of individuals. This occasional revisiting\
    \ of solutions becomes more common as the genetic algorithm converges and starts\
    \ to find solutions in an increasingly smaller area of the search space.\n\nEach\
    \ time a solution is revisited its fitness value needs to be recalculated, wasting\
    \ processing power on repetitive, duplicate calculations. Fortunately, this can\
    \ be easily fixed by storing fitness values in a hash table after they have been\
    \ calculated. When a previously visited solution is revisited, its fitness value\
    \ can be pulled straight from the hash table, avoiding the need to recalculate\
    \ it.\n\nTo add the fitness value hashing to your code, first create the fitness\
    \ hash table in the `GeneticAlgorithm` class,\n\n```\n// Create fitness hashtable\n\
    private Map<Individual, Double> fitnessHash = Collections.synchronizedMap(\n \
    \   new LinkedHashMap<Individual, Double>() {\n        @Override\n        protected\
    \ boolean removeEldestEntry(Entry<Individual, Double> eldest) {\n            //\
    \ Store a maximum of 1000 fitness values\n            return this.size() > 1000;\n\
    \        }\n    });\n```\n\nIn this example, the hash table will store a maximum\
    \ of 1000 fitness values before we begin to remove the oldest values. This can\
    \ be changed as required for the best trade-off in performance. Although a larger\
    \ hash table can hold more fitness values, it comes at the cost of memory usage.\n\
    \nNow, the `get` and `put` methods can be added to retrieve and store the fitness\
    \ values. This can be done by updating the `calcFitness` method as follows. Note\
    \ that we’ve removed the `IntStream` code from the last section, so that we can\
    \ evaluate a single improvement at a time.\n\n```\n/**\n * Calculate individual’s\
    \ fitness value\n *\n * @param individual\n * @param timetable\n * @return fitness\n\
    \ */\npublic double calcFitness(Individual individual, Timetable timetable){\n\
    \    Double storedFitness = this.fitnessHash.get(individual);\n    if (storedFitness\
    \ != null) {\n        return storedFitness;\n    }\n\n    // Create new timetable\
    \ object for thread\n    Timetable threadTimetable = new Timetable(timetable);\n\
    \    threadTimetable.createClasses(individual);\n\n    // Calculate fitness\n\
    \    int clashes = threadTimetable.calcClashes();\n    double fitness = 1 / (double)\
    \ (clashes + 1);\n    individual.setFitness(fitness);\n\n    // Store fitness\
    \ in hashtable\n    this.fitnessHash.put(individual, fitness);\n    return fitness;\n\
    }\n```\n\nFinally, because we are using the `Individual` object as a key for the\
    \ hash table, we need to override the `equals` and `hashCode` methods of the `Individual`\
    \ class. This is because we need the hash to be generated based on the individual’s\
    \ chromosome, not the object itself, as it is by default. This is important because\
    \ two separate individuals with the same chromosomes should be identified as the\
    \ same by the fitness value hash table.\n\n```\n/**\n * Generates hash code based\
    \ on individual’s\n * chromosome\n *\n * @return Hash value\n */\n@Override\n\
    public int hashCode() {\n    int hash = Arrays.hashCode(this.chromosome);\n  \
    \  return hash;\n}\n\n/**\n * Equates based on individual’s chromosome\n *\n *\
    \ @return Equality boolean\n */\n@Override\npublic boolean equals(Object obj)\
    \ {\n    if (obj == null) {\n        return false;\n    }\n    if (getClass()\
    \ != obj.getClass()) {\n        return false;\n    }\n    Individual individual\
    \ = (Individual) obj;\n    return Arrays.equals(this.chromosome, individual.chromosome);\n\
    }\n```\n\n### Encoding\n\nAnother component which can affect the genetic algorithm’s\
    \ performance is the encoding chosen. Although, in theory, any problem can be\
    \ represented using a binary encoding of 0s and 1s, it’s rarely the most efficient\
    \ encoding to choose.\n\nWhen a genetic algorithm struggles to converge, it can\
    \ often be because a bad encoding was chosen for the problem causing it to struggle\
    \ when searching for new solutions. There is no hard science to picking a good\
    \ encoding, but using an overly complex encoding will typically produce bad results.\
    \ For example, if you want an encoding which can encode 10 numbers between 0-10,\
    \ it would usually be best to use an encoding of 10 integers instead of a binary\
    \ string. This way it’s easier to apply mutation and crossover functions which\
    \ can be applied to the individual integers instead of bits representing integer\
    \ values. It also means you don’t need to deal with invalid chromosomes such as\
    \ `1111` representing the value 15 which is beyond our 0-10 required range.\n\n\
    ### Mutation and Crossover Methods\n\nPicking good mutation and crossover methods\
    \ is another important factor when considering options to improve a genetic algorithm’s\
    \ performance. The optimal mutation and crossover methods to use will depend mostly\
    \ on the encoding chosen and the nature of the problem itself. A good mutation\
    \ or crossover method should be capable of producing valid solutions, but also\
    \ be able to mutate and crossover individuals in an expected way.\n\nFor example:\
    \ if we were optimizing a function which accepts any value between 0-10, one possible\
    \ mutation method is Gaussian mutation which adds a random value to the gene increasing\
    \ or decreasing its original value slightly. However, another possible mutation\
    \ method is boundary mutation where a random value between a lower and upper boundary\
    \ is chosen to replace the gene. Both of these mutation methods are capable of\
    \ producing valid mutations, however depending on the nature of the problem and\
    \ other specifics of the implementation, one will likely outperform the other.\
    \ A bad mutation method might simply round the value down to 0 or up to 10 depending\
    \ on the original value. In this situation, the amount of mutation that occurs\
    \ depends on the gene’s value which can result in poor performance. An initial\
    \ value of 1 would be changed to 0 which is a relatively small change. However,\
    \ a value of 5 would be changed to 10 which is much larger. This bias can cause\
    \ a preference for values closer to 0 and 10 which will often negatively impact\
    \ the search process of the genetic algorithm."
  raw: '### Fitness Value Hashing


    As discussed previously, the fitness function is usually the most computationally
    expensive component of a genetic algorithm. Thus, even small improvements to the
    fitness function can have a considerable effect on performance. Value hashing
    is another method that can reduce the amount of time spent calculating fitness
    values by storing previously computed fitness values in a hash table. In large
    distributed systems, you could use a centralized caching service (such as Redis
    or memcached) to the same end.


    During execution, solutions found previously will occasionally be revisited due
    to the random mutations and recombinations of individuals. This occasional revisiting
    of solutions becomes more common as the genetic algorithm converges and starts
    to find solutions in an increasingly smaller area of the search space.


    Each time a solution is revisited its fitness value needs to be recalculated,
    wasting processing power on repetitive, duplicate calculations. Fortunately, this
    can be easily fixed by storing fitness values in a hash table after they have
    been calculated. When a previously visited solution is revisited, its fitness
    value can be pulled straight from the hash table, avoiding the need to recalculate
    it.


    To add the fitness value hashing to your code, first create the fitness hash table
    in the GeneticAlgorithm class,


    `// Create fitness hashtable`


    `private Map<Individual, Double> fitnessHash = Collections.synchronizedMap(`


    `new LinkedHashMap<Individual, Double>() {`


    `@Override`


    `protected boolean removeEldestEntry(Entry<Individual, Double> eldest) {`


    `// Store a maximum of 1000 fitness values`


    `return this.size() > 1000;`


    `}`


    `});`


    In this example, the hash table will store a maximum of 1000 fitness values before
    we begin to remove the oldest values. This can be changed as required for the
    best trade-off in performance. Although a larger hash table can hold more fitness
    values, it comes at the cost of memory usage.


    Now, the get and put methods can be added to retrieve and store the fitness values.
    This can be done by updating the calcFitness method as follows. Note that we’ve
    removed the IntStream code from the last section, so that we can evaluate a single
    improvement at a time.


    `/**`


    `* Calculate individual’s fitness value`


    `*`


    `* @param individual`


    `* @param timetable`


    `* @return fitness`


    `*/`


    `public double calcFitness(Individual individual, Timetable timetable){`


    `Double storedFitness = this.fitnessHash.get(individual);`


    `if (storedFitness != null) {`


    `return storedFitness;`


    `}`


    `// Create new timetable object for thread`


    `Timetable threadTimetable = new Timetable(timetable);`


    `threadTimetable.createClasses(individual);`


    `// Calculate fitness`


    `int clashes = threadTimetable.calcClashes();`


    `double fitness = 1 / (double) (clashes + 1);`


    `individual.setFitness(fitness);`


    `// Store fitness in hashtable`


    `this.fitnessHash.put(individual, fitness);`


    `return fitness;`


    `}`


    Finally, because we are using the Individual object as a key for the hash table,
    we need to override the “equals” and “hashCode” methods of the Individual class.
    This is because we need the hash to be generated based on the individual’s chromosome,
    not the object itself, as it is by default. This is important because two separate
    individuals with the same chromosomes should be identified as the same by the
    fitness value hash table.


    `/**`


    `* Generates hash code based on individual’s`


    `* chromosome`


    `*`


    `* @return Hash value`


    `*/`


    `@Override`


    `public int hashCode() {`


    `int hash = Arrays.hashCode(this.chromosome);`


    `return hash;`


    `}`


    `/**`


    `* Equates based on individual’s chromosome`


    `*`


    `* @return Equality boolean`


    `*/`


    `@Override`


    `public boolean equals(Object obj) {`


    `if (obj == null) {`


    `return false;`


    `}`


    `if (getClass() != obj.getClass()) {`


    `return false;`


    `}`


    `Individual individual = (Individual) obj;`


    `return Arrays.equals(this.chromosome, individual.chromosome);`


    `}`


    ### Encoding


    Another component which can affect the genetic algorithm’s performance is the
    encoding chosen. Although, in theory, any problem can be represented using a binary
    encoding of 0s and 1s, it’s rarely the most efficient encoding to choose.


    When a genetic algorithm struggles to converge, it can often be because a bad
    encoding was chosen for the problem causing it to struggle when searching for
    new solutions. There is no hard science to picking a good encoding, but using
    an overly complex encoding will typically produce bad results. For example, if
    you want an encoding which can encode 10 numbers between 0-10, it would usually
    be best to use an encoding of 10 integers instead of a binary string. This way
    it’s easier to apply mutation and crossover functions which can be applied to
    the individual integers instead of bits representing integer values. It also means
    you don’t need to deal with invalid chromosomes such as “1111” representing the
    value 15 which is beyond our 0-10 required range.


    ### Mutation and Crossover Methods


    Picking good mutation and crossover methods is another important factor when considering
    options to improve a genetic algorithm’s performance. The optimal mutation and
    crossover methods to use will depend mostly on the encoding chosen and the nature
    of the problem itself. A good mutation or crossover method should be capable of
    producing valid solutions, but also be able to mutate and crossover individuals
    in an expected way.


    For example: if we were optimizing a function which accepts any value between
    0-10, one possible mutation method is Gaussian mutation which adds a random value
    to the gene increasing or decreasing its original value slightly. However, another
    possible mutation method is boundary mutation where a random value between a lower
    and upper boundary is chosen to replace the gene. Both of these mutation methods
    are capable of producing valid mutations, however depending on the nature of the
    problem and other specifics of the implementation, one will likely outperform
    the other. A bad mutation method might simply round the value down to 0 or up
    to 10 depending on the original value. In this situation, the amount of mutation
    that occurs depends on the gene’s value which can result in poor performance.
    An initial value of 1 would be changed to 0 which is a relatively small change.
    However, a value of 5 would be changed to 10 which is much larger. This bias can
    cause a preference for values closer to 0 and 10 which will often negatively impact
    the search process of the genetic algorithm.'
  trans: '

    ### 适应度值哈希


    如前所述，适应度函数通常是遗传算法中计算开销最大的部分。因此，即使对适应度函数进行微小的改进，也能对性能产生显著影响。值哈希是另一种方法，它通过将先前计算过的适应度值存储在哈希表中，来减少计算适应度值所花费的时间。在大型分布式系统中，你可以使用集中式缓存服务（例如
    Redis 或 memcached）来实现同样的目的。


    在执行过程中，由于个体的随机变异和重组，先前找到的解决方案偶尔会被重新访问。随着遗传算法收敛并开始在搜索空间中越来越小的区域内寻找解决方案，这种对解决方案的重新访问会变得更加常见。


    每次重新访问一个解决方案时，都需要重新计算其适应度值，这浪费了处理能力在重复的、重复的计算上。幸运的是，这可以通过在计算后将适应度值存储在哈希表中来轻松解决。当重新访问一个先前访问过的解决方案时，其适应度值可以直接从哈希表中获取，从而避免了重新计算的需要。


    要将适应度值哈希添加到你的代码中，首先在 `GeneticAlgorithm` 类中创建适应度哈希表：


    `// 创建适应度哈希表`


    `private Map<Individual, Double> fitnessHash = Collections.synchronizedMap(`


    `new LinkedHashMap<Individual, Double>() {`


    `@Override`


    `protected boolean removeEldestEntry(Entry<Individual, Double> eldest) {`


    `// 最多存储 1000 个适应度值`


    `return this.size() > 1000;`


    `}`


    `});`


    在这个例子中，哈希表在开始移除最旧的值之前，最多会存储 1000 个适应度值。这可以根据需要更改，以实现最佳的性能权衡。虽然更大的哈希表可以容纳更多的适应度值，但代价是内存使用量增加。


    现在，可以添加 `get` 和 `put` 方法来检索和存储适应度值。这可以通过如下更新 `calcFitness` 方法来实现。请注意，我们移除了上一节中的
    `IntStream` 代码，以便我们可以一次评估一个改进。


    `/**`


    `* 计算个体的适应度值`


    `*`


    `* @param individual`


    `* @param timetable`


    `* @return fitness`


    `*/`


    `public double calcFitness(Individual individual, Timetable timetable){`


    `Double storedFitness = this.fitnessHash.get(individual);`


    `if (storedFitness != null) {`


    `return storedFitness;`


    `}`


    `// 为线程创建新的时间表对象`


    `Timetable threadTimetable = new Timetable(timetable);`


    `threadTimetable.createClasses(individual);`


    `// 计算适应度`


    `int clashes = threadTimetable.calcClashes();`


    `double fitness = 1 / (double) (clashes + 1);`


    `individual.setFitness(fitness);`


    `// 将适应度存储在哈希表中`


    `this.fitnessHash.put(individual, fitness);`


    `return fitness;`


    `}`


    最后，由于我们使用 `Individual` 对象作为哈希表的键，我们需要重写 `Individual` 类的 `equals` 和 `hashCode`
    方法。这是因为我们需要哈希值基于个体的染色体生成，而不是像默认那样基于对象本身。这一点很重要，因为具有相同染色体的两个不同个体应该被适应度值哈希表识别为相同。


    `/**`


    `* 基于个体的染色体生成哈希码`


    `*`


    `* @return 哈希值`


    `*/`


    `@Override`


    `public int hashCode() {`


    `int hash = Arrays.hashCode(this.chromosome);`


    `return hash;`


    `}`


    `/**`


    `* 基于个体的染色体进行相等性判断`


    `*`


    `* @return 相等性布尔值`


    `*/`


    `@Override`


    `public boolean equals(Object obj) {`


    `if (obj == null) {`


    `return false;`


    `}`


    `if (getClass() != obj.getClass()) {`


    `return false;`


    `}`


    `Individual individual = (Individual) obj;`


    `return Arrays.equals(this.chromosome, individual.chromosome);`


    `}`


    ### 编码


    另一个可能影响遗传算法性能的组件是所选择的编码方式。虽然理论上任何问题都可以使用 0 和 1 的二进制编码来表示，但这很少是最有效的编码选择。


    当遗传算法难以收敛时，通常可能是因为为问题选择了糟糕的编码方式，导致其在搜索新解决方案时遇到困难。选择好的编码方式没有硬性科学，但使用过于复杂的编码通常会产生糟糕的结果。例如，如果你想要一种能够编码
    0-10 之间 10 个数字的编码方式，通常最好使用 10 个整数的编码，而不是二进制字符串。这样更容易应用变异和交叉函数，这些函数可以应用于单个整数，而不是表示整数值的位。这也意味着你不需要处理无效的染色体，例如表示值
    15 的“1111”，这超出了我们所需的 0-10 范围。


    ### 变异和交叉方法


    在选择改进遗传算法性能的方案时，选择好的变异和交叉方法是另一个重要因素。要使用的最佳变异和交叉方法主要取决于所选的编码方式和问题本身的特性。一个好的变异或交叉方法应该能够产生有效的解决方案，同时也能够以预期的方式对个体进行变异和交叉。


    例如：如果我们正在优化一个接受 0-10 之间任意值的函数，一种可能的变异方法是高斯变异，它向基因添加一个随机值，略微增加或减少其原始值。然而，另一种可能的变异方法是边界变异，其中选择一个介于下限和上限之间的随机值来替换该基因。这两种变异方法都能够产生有效的变异，但根据问题的性质和实现的其他细节，其中一种可能会优于另一种。一个糟糕的变异方法可能只是根据原始值将值向下舍入为
    0 或向上舍入为 10。在这种情况下，发生的变异量取决于基因的值，这可能导致性能不佳。初始值 1 会被更改为 0，这是一个相对较小的变化。然而，值 5 会被更改为
    10，这要大得多。这种偏差可能导致对接近 0 和 10 的值的偏好，这通常会对遗传算法的搜索过程产生负面影响。

