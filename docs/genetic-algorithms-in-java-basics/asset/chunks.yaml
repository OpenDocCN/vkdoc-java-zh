  trans: '

    ## 问题描述


    我们要解决的问题是设计一个机器人控制器，使其能够利用机器人的传感器成功引导机器人穿越迷宫。机器人可以执行四种动作：向前移动一步、左转、右转，以及极少情况下保持不动。机器人还配备了六个传感器：三个在前方，一个在左侧，一个在右侧，一个在后方。


    ![A978-1-4842-0328-6_3_Figa_HTML.jpg](img/A978-1-4842-0328-6_3_Figa_HTML.jpg)


    我们要探索的迷宫由机器人无法穿越的墙壁构成，并有一条标出的路线，如图 3-1 所示，我们希望机器人能沿着这条路线行进。请记住，本章的目的并非训练机器人解决迷宫问题，而是自动编程一个带有六个传感器的机器人控制器，使其不会撞墙；我们只是将迷宫作为一个复杂环境来测试我们的机器人控制器。


    ![A978-1-4842-0328-6_3_Fig1_HTML.jpg](img/A978-1-4842-0328-6_3_Fig1_HTML.jpg)


    图 3-1.


    我们希望机器人遵循的路线


    当传感器检测到相邻的墙壁时，它们会被激活。例如，如果机器人的前方传感器检测到前方有墙壁，它就会被激活。


    ## 实现


    ### 准备工作


    本章将基于你在第 2 章中开发的代码进行构建。开始之前，请创建一个新的 Eclipse 或 NetBeans 项目，或者在本书的现有项目中创建一个名为“chapter3”的新包。


    从第 2 章复制 `Individual`、`Population` 和 `GeneticAlgorithm` 类，并将它们导入第 3 章。请务必更新每个类文件顶部的包名！它们的最顶部都应显示“package
    chapter3”。


    在本章中，除了将包名改为“chapter3”之外，你无需修改 `Individual` 和 `Population` 类。


    但是，你需要修改 `GeneticAlgorithm` 类中的几个方法。此时，你应该完全删除以下五个方法：`calcFitness`、`evalPopulation`、`isTerminationConditionMet`、`selectParent`
    和 `crossoverPopulation`。你将在本章中重写这五个方法，现在删除它们有助于确保你不会意外地复用第 2 章的实现。


    此外，你还需要在本章中创建几个额外的类（`Robot` 和 `Maze`，以及包含程序 `main` 方法的执行类 `RobotController`）。如果你在
    Eclipse 中工作，可以通过 **File ➤ New ➤ Class** 菜单选项轻松创建新类。请注意包名字段，确保它显示为“chapter3”。


    ### 编码


    正确编码数据通常是遗传算法中最棘手的方面。让我们首先定义问题：我们需要一个机器人控制器针对所有可能的输入组合的完整指令集的二进制表示。


    如前所述，我们的机器人有四种动作：保持不动、向前移动一步、左转和右转。这些动作可以用二进制表示为：


    *   “00”：保持不动

    *   “01”：向前移动

    *   “10”：左转

    *   “11”：右转


    我们还有六个开/关传感器，这为我们提供了 2⁶（64）种可能的传感器输入组合。如果每个动作需要 2 位来编码，那么我们可以用 128 位来表示控制器对任何可能输入的响应。换句话说，我们的机器人可能面临
    64 种不同的场景，而我们的控制器需要为每种场景定义一个动作。由于一个动作需要两位，我们的控制器需要 64 * 2 = 128 位的存储空间。


    由于遗传算法的染色体最容易以数组形式操作，我们的染色体将是一个长度为 128 的位数组。在这种情况下，通过我们的变异和交叉方法，你无需担心它们正在修改哪条特定指令，它们只需操作遗传代码即可。然而，在我们这边，我们需要在将编码数据用于机器人控制器之前对其进行解包。


    鉴于我们需要 128 位来表示 64 种不同传感器组合的指令，我们应该如何实际构建染色体，以便能够打包和解包它？也就是说，染色体的每个部分对应哪种传感器输入组合？动作的顺序是什么？在染色体中，我们可以在哪里找到针对“前方和右前传感器被激活”这一情况下的动作？染色体中的位代表输出，但输入是如何表示的呢？


    对许多人来说，这将是一个不直观的问题（和解决方案），所以让我们逐步走向解决方案。第一步可能是考虑一个简单的、人类可读的输入和输出列表：


    `传感器 #1（前方）：开`


    `传感器 #2（左前）：关`


    `传感器 #3（右前）：开`


    `传感器 #4（左侧）：关`


    `传感器 #5（右侧）：关`


    `传感器 #6（后方）：关`


    指令：左转（动作“10”，如上定义）


    再加上另外 63 个条目来表示所有可能的组合，这种格式显得笨拙。很明显，这种枚举方式对我们来说行不通。让我们再迈出一小步，将所有内容缩写，并将“开”和“关”翻译为
    1 和 0：


    `#1：1`


    `#2：0`


    `#3：1`


    `#4：0`


    `#5：0`


    `#6：0`


    `指令：10`


    我们正在取得进展，但这仍然无法将 64 条指令打包到一个 128 位的数组中。下一步是获取六个传感器值——即输入——并进一步编码它们。让我们将它们从右到左排列，并从输出中删除“指令”一词：


    `#6:0, #5:0, #4:0, #3:1, #2:0, #1:1 => 10`


    现在让我们删除传感器的编号：


    `000101 => 10`


    如果我们现在将传感器值的位字符串转换为十进制，我们得到以下结果：


    `5 => 10`


    现在我们有所发现了。左边的“5”代表传感器输入，右边的“10”代表机器人在面对这些输入时应该做什么（输出）。因为我们是从传感器输入的二进制表示推导出来的，所以只有一种传感器组合能给我们数字
    5。


    我们可以使用数字 5 作为染色体中代表传感器输入组合的位置。如果我们手动构建这个染色体，并且知道“10”（左转）是对“5”（前方和右前传感器检测到墙壁）的正确响应，我们会将“1”和“0”放置在染色体的第
    11 和第 12 个位置（每个动作需要 2 位，我们从位置 0 开始计数），如下所示：


    `xx xx xx xx xx 10 xx xx xx xx (... 还有 54 对...)`

    '
- fmt: "# 排版后的内容\n\nIn the above fake chromosome, the first pair (position 0) represents\
    \ the action to take when the sensor inputs total is 0: everything off. The second\
    \ pair (position 1) represents the action to take when the sensor inputs total\
    \ 1: only the front sensor detects a wall. The third pair, position 2, represents\
    \ only the front-left sensor triggered. The fourth pair, position 3, represents\
    \ both the front and the front-left sensor being active. And so on, until you\
    \ get to the final pair, position 63, which represents all sensors being triggered.\n\
    \nAnother visualization of this encoding scheme is represented in Figure [3-2](#A978-1-4842-0328-6_3_Chapter.html#Fig2).\
    \ The left-most “Sensors” column represents the sensors’ bitfield, which maps\
    \ to a chromosome position after you convert the bitfield to decimal. Once you’ve\
    \ converted the sensors’ bitfield to decimal, you can place the desired action\
    \ at the corresponding location in the chromosome.\n\n![A978-1-4842-0328-6_3_Fig2_HTML.jpg](A978-1-4842-0328-6_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2.\n\nMapping the sensor values to actions\n\nThis encoding scheme\
    \ may seem obtuse at first – and the chromosome is not human-readable – but it\
    \ has a couple of helpful properties. First, the chromosome can be manipulated\
    \ as an array of bits, rather than a complicated tree structure or hashmap, which\
    \ makes crossover, mutation and other manipulations much easier. Secondly, every\
    \ 128-bit value is a valid solution (though not necessarily a good one) – more\
    \ on this later in the chapter.\n\nFigure [3-2](#A978-1-4842-0328-6_3_Chapter.html#Fig2)\
    \ describes how a typical chromosome can map the robot’s sensor values to actions.\n\
    \n## Initialization\n\nIn this implementation, we first need to create and initialize\
    \ a maze to run the robot in. To do this, create the following `Maze` class to\
