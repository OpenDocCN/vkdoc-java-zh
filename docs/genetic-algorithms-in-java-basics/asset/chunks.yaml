- fmt: '#### Crossover Methods


    In addition to the various selection methods that can be used during crossover,
    there are also different methods to exchange the genetic information between two
    individuals. Different problems have slightly different properties and work better
    with specific crossover methods. For example, the all-ones problem simply requires
    a string that consists entirely of 1s. A string of `"00111"` has the same fitness
    value as a string of `"10101"` – they both contain three 1s. With genetic algorithms
    of this type, this isn’t always the case. Imagine we are trying to create a string
    which lists, in order, the numbers one to five. In this case the string `"12345"`
    has a very different fitness value from `"52431"`. This is because we’re not just
    looking for the correct numbers, but also the correct order. For problems such
    as this, a crossover method that respects the order of the genes is preferable.


    The crossover method we will be implementing here is uniform crossover. In this
    method each gene of the offspring has a 50% change of coming from either its first
    parent or its second parent.


    ![A978-1-4842-0328-6_2_Figb_HTML.jpg](A978-1-4842-0328-6_2_Figb_HTML.jpg)


    #### Crossover Pseudo Code


    Now that we have a selection and a crossover method, let’s look at some pseudo
    code which outlines the crossover process to be implemented.


    ```

    1: For each individual in population:

    2:      newPopulation = new array;

    2:       If crossoverRate > random():

    3:             secondParent = selectParent();

    4:            offspring = crossover(individual, secondParent);

    5:            newPopulation.push(offspring);

    6:      Else:

    7:            newPopulation.push(individual);

    8:      End if

    9: End loop;

    ```


    #### Crossover Implementation


    To implement roulette wheel selection, add a `selectParent()` method anywhere
    in the `GeneticAlgorithm` class.


    ```

    public Individual selectParent(Population population) {


    // Get individuals

    Individual individuals[] = population.getIndividuals();


    // Spin roulette wheel

    double populationFitness = population.getPopulationFitness();

    double rouletteWheelPosition = Math.random() * populationFitness;


    // Find parent

    double spinWheel = 0;

    for (Individual individual : individuals) {

    spinWheel += individual.getFitness();

    if (spinWheel >= rouletteWheelPosition) {

    return individual;

    }

    }


    return individuals[population.size() - 1];

    }

    ```


    The `selectParent()` method essentially runs a roulette wheel in reverse; at a
    casino, the wheel already has markings on it, and then you spin the wheel and
    wait for the ball to drop into position. Here, however, we select a random position
    first and then work backward to figure out which individual lies in that position.
    Algorithmically, it’s easier this way. Choose a random number between 0 and the
    total population fitness, then loop through each individual, summing their fitnesses
    as you go, until you reach the random position you chose at the outset.


    Now that the selection method has been added, the next step is to create the crossover
    method using this `selectParent()` method to select the crossover mates. To begin,
    add the following crossover method to the `GeneticAlgorithm` class.


    ```

    public Population crossoverPopulation(Population population) {


    // Create new population

    Population newPopulation = new Population(population.size());


    // Loop over current population by fitness

    for (int populationIndex = 0; populationIndex < population.size(); populationIndex++)
    {

    Individual parent1 = population.getFittest(populationIndex);


    // Apply crossover to this individual?

    if (this.crossoverRate > Math.random() && populationIndex > this.elitismCount)
    {


    // Initialize offspring

    Individual offspring = new Individual(parent1.getChromosomeLength());


    // Find second parent

    Individual parent2 = selectParent(population);


    // Loop over genome

    for (int geneIndex = 0; geneIndex < parent1.getChromosomeLength(); geneIndex++)
    {


    // Use half of parent1''s genes and half of parent2''s genes

    if (0.5 > Math.random()) {

    offspring.setGene(geneIndex, parent1.getGene(geneIndex));

    } else {

    offspring.setGene(geneIndex, parent2.getGene(geneIndex));

    }

    }


    // Add offspring to new population

    newPopulation.setIndividual(populationIndex, offspring);

    } else {


    // Add individual to new population without applying crossover

    newPopulation.setIndividual(populationIndex, parent1);

    }

    }


    return newPopulation;

    }

    ```


    In the first line of the `crossoverPopulation()` method, a new empty population
    is created for the next generation. Next, the population is looped over and the
    crossover rate is used to consider each individual for crossover. (There’s also
    a mysterious “elitism” term here, which we’ll discuss in the next section.) If
    the individual doesn’t go through crossover, its added straight to the next population,
    otherwise a new individual is created. The offspring’s chromosome is filled by
    looping over the parent chromosomes and randomly adding genes from each parent
    to the offspring’s chromosome. When this crossover process has finished for each
    individual of the population, the crossover method returns the next generation’s
    population.


    From here we can implement the crossover function into our main method in the
    `AllOnesGA` class. The entire `AllOnesGA` class and main method is printed below;
    however the only change from before is the addition of the line that calls `crossoverPopulation()`
    below the “Apply crossover” comment.


    ```

    package chapter2;


    public class AllOnesGA {


    public static void main(String[] args) {


    // Create GA object

    GeneticAlgorithm ga = new GeneticAlgorithm(100, 0.001, 0.95, 0);


    // Initialize population

    Population population = ga.initPopulation(50);


    // Evaluate population

    ga.evalPopulation(population);


    // Keep track of current generation

    int generation = 1;


    while (ga.isTerminationConditionMet(population) == false) {


    // Print fittest individual from population

    System.out.println("Best solution: " + population.getFittest(0).toString());


    // Apply crossover

    population = ga.crossoverPopulation(population);


    // Apply mutation

    // TODO


    // Evaluate population

    ga.evalPopulation(population);


    // Increment the current generation

    generation++;

    }


    System.out.println("Found solution in " + generation + " generations");

    System.out.println("Best solution: " + population.getFittest(0).toString());

    }


    }

    ```


    At this point, running the program should work and return a valid solution! Try
    it for yourself by clicking the Run button in Eclipse and observing the console
    that appears.


    As you can see, crossover alone is sufficient to evolve a population. However,
    genetic algorithms without mutation are prone to getting stuck in local optima
    without ever finding the global optimum. We won’t see this demonstrated in such
    a simple problem, but in more complex problem domains we need some mechanism to
    nudge a population away from local optimums to try and see if there’s a better
    solution elsewhere. This is where the randomness of mutation comes into play:
    if a solution is stagnating near a local optimum, a random event may kick it in
    the right direction and send it toward a better solution.'
