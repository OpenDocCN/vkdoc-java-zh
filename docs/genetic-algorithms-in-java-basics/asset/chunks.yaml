    a new Java class called “TSP” in package “chapter[4](#A978-1-4842-0328-6_4_Chapter.html)”
    by using the File ➤ New ➤ Class menu item. As in [Chapter 3](#A978-1-4842-0328-6_3_Chapter.html),
    we’ll stub out the genetic algorithm pseudocode with a number of TODOs so we can
