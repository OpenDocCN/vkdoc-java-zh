    `* @param groupId 小组 ID`

    `* @param groupSize 小组人数`

    `* @param moduleIds 模块 ID 数组`

    `*/`

    `public void addGroup(int groupId, int groupSize, int moduleIds[]) {`

    `this.groups.put(groupId, new Group(groupId, groupSize, moduleIds));`

    `this.numClasses = 0;`

    `}`


