- fmt: "### Termination Check\n\nThe next thing needed is to check if our termination\
    \ condition has been met. There are many different types of termination conditions.\
    \ Sometimes, it’s possible to know what the optimal solution is (rather, it’s\
    \ possible to know the fitness value of the optimal solution), in which case we\
    \ can check directly for the correct solution. However, it’s not always possible\
    \ to know what the fitness of the best solution is, so we can terminate when the\
    \ solution has become “good enough”; that is, whenever the solution exceeds some\
    \ fitness threshold. We could also terminate when the algorithm has run for too\
    \ long (too many generations), or we can combine a number of factors when deciding\
    \ to terminate the algorithm.\n\nDue to the simplicity of the all-ones problem,\
    \ and the fact that we know the correct fitness should be 1, it’s reasonable in\
    \ this case to terminate when the correct solution has been found. This won’t\
    \ always be the case! In fact, it will only rarely be the case – but we’re lucky\
    \ this is an easy problem.\n\nTo begin, we must first construct a function which\
    \ can check if our termination condition has occurred. We can do this by adding\
    \ the following code to the `GeneticAlgorithm` class. Add this anywhere, and as\
    \ usual we’ve omitted the surrounding class for brevity’s sake.\n\n```\npublic\
    \ boolean isTerminationConditionMet(Population population) {\n    for (Individual\
    \ individual : population.getIndividuals()) {\n        if (individual.getFitness()\
    \ == 1) {\n            return true;\n        }\n    }\n    return false;\n}\n\
    ```\n\nThe above method checks each individual in the population and will return\
    \ `true` – indicating that we’ve found a termination condition and can stop –\
    \ if the fitness of any individual in the population is 1.\n\nNow that the termination\
    \ condition has been built, a loop can be added to the main bootstrap method in\
    \ the `AllOnesGA` class using the newly added termination check as its loop conditional.\
    \ When the termination check returns `true`, the genetic algorithm will stop looping\
    \ and return its results.\n\nTo create the evolution loop, modify the `main` method\
    \ of our executive `AllOnesGA` class to represent the following. The first two\
    \ lines of the snippet below are already in the `main` method. By adding this\
    \ code we’re continuing to implement the pseudocode presented at the beginning\
    \ of the chapter – recall that the “main” method is a concrete representation\
    \ of the genetic algorithm pseudocode. Here’s what the `main` method should look\
    \ like now:\n\n```\npublic static void main(String[] args) {\n    // These two\
    \ lines were already here:\n    GeneticAlgorithm ga = new GeneticAlgorithm(100,\
    \ 0.001, 0.95, 0);\n    Population population = ga.initPopulation(50);\n\n   \
    \ // The following is the new code you should be adding:\n    ga.evalPopulation(population);\n\
    \    int generation = 1;\n\n    while (ga.isTerminationConditionMet(population)\
    \ == false) {\n        // Print fittest individual from population\n        System.out.println(\"\
    Best solution: \" + population.getFittest(0).toString());\n\n        // Apply\
    \ crossover\n        // TODO!\n\n        // Apply mutation\n        // TODO!\n\
    \n        // Evaluate population\n        ga.evalPopulation(population);\n\n \
    \       // Increment the current generation\n        generation++;\n    }\n\n\
    \    System.out.println(\"Found solution in \" + generation + \" generations\"\
    );\n    System.out.println(\"Best solution: \" + population.getFittest(0).toString());\n\
    }\n```\n\nWe’ve added an evolution loop that checks the output of `isTerminationConditionMet`.\
    \ Also new to the `main` method are the addition of `evalPopulation` calls both\
    \ before and during the loop, the `generation` variable that keeps track of the\
    \ generation number, and the debug message that helpfully lets you know what the\
    \ best solution in each generation looks like.\n\nWe’ve also added an end-game:\
    \ when we exit the loop, we’ll print some information about the final solution.\n\
    \nHowever, at this point our genetic algorithm will run, but it won’t ever evolve!\
    \ We’ll be stuck in an infinite loop unless we’re lucky enough that one of our\
    \ randomly generated individuals happens to be all ones. You can see this behavior\
    \ directly by clicking the “Run” button in Eclipse; the same solution will be\
    \ presented over and over and the loop will never end. You’ll have to force the\
    \ program to stop running by clicking the “Terminate” button above Eclipse’s console.\n\
    \nTo continue building our genetic algorithm we need to implement two additional\
    \ concepts: crossover and mutation. These concepts actually drive the evolution\
    \ of a population forward through random mutation and survival of the fittest.\n\
    \n### Crossover\n\nAt this point, it’s time to start evolving the population by\
    \ applying mutation and crossover. The crossover operator is the process in which\
    \ individuals from the population trade genetic information, hopefully to create\
    \ a new individual which contains the best parts from its parents’ genomes.\n\n\
    During crossover each individual in the population is considered for crossover;\
    \ this is where the crossover rate parameter is used. By comparing the crossover\
    \ rate to a random number, we can decide whether the individual should have crossover\
    \ applied to it, or whether it should be added straight into the next population\
    \ unaffected by crossover. If an individual is selected for crossover then a second\
    \ parent needs be found. To find the second parent, we need to pick one of many\
    \ possible selection methods.\n\n#### Roulette Wheel Selection\n\nRoulette wheel\
    \ selection - also known as fitness proportionate selection - is a selection method\
    \ which uses the analogy of a roulette wheel to select individuals from a population.\
    \ The idea is that individuals from the population are placed on a metaphoric\
    \ roulette wheel depending on their fitness value. The higher the fitness of the\
    \ individual, the more space it’s allocated on the roulette wheel. The image below\
    \ demonstrates how individuals are typically positioned in this process.\n\n![A978-1-4842-0328-6_2_Figa_HTML.jpg](A978-1-4842-0328-6_2_Figa_HTML.jpg)\n\
    \nEach number on the wheel above represents an individual from the population.\
    \ The higher the fitness of the individual, the larger their portion of the roulette\
    \ wheel. If you now imagine spinning this wheel, it’s much more likely that the\
    \ fitter individuals will be picked because they fill more space on the wheel.\
    \ This is why this selection method is often referred to as fitness proportionate\
    \ selection; because solutions are selected based on their fitness in proportion\
    \ to the fitness of the rest of the population.\n\nThere are many other selection\
    \ methods that we could use such as: tournament selection ([Chapter 3](#A978-1-4842-0328-6_3_Chapter.html))\
    \ and stochastic universal sampling (an advanced form of fitness proportional\
    \ selection). However, in this chapter we will be implementing one of the most\
    \ common selection methods: roulette wheel selection. In later chapters we will\
    \ be looking at other selection methods and how they differ."
  raw: '### Termination Check


    The next thing needed is to check if our termination condition has been met. There
    are many different types of termination conditions. Sometimes, it’s possible to
    know what the optimal solution is (rather, it’s possible to know the fitness value
    of the optimal solution), in which case we can check directly for the correct
    solution. However, it’s not always possible to know what the fitness of the best
    solution is, so we can terminate when the solution has become “good enough”; that
    is, whenever the solution exceeds some fitness threshold. We could also terminate
    when the algorithm has run for too long (too many generations), or we can combine
    a number of factors when deciding to terminate the algorithm.


    Due to the simplicity of the all-ones problem, and the fact that we know the correct
    fitness should be 1, it’s reasonable in this case to terminate when the correct
    solution has been found. This won’t always be the case! In fact, it will only
    rarely be the case – but we’re lucky this is an easy problem.


    To begin, we must first construct a function which can check if our termination
    condition has occurred. We can do this by adding the following code to the GeneticAlgorithm
    class. Add this anywhere, and as usual we’ve omitted the surrounding class for
    brevity’s sake.


    `public boolean isTerminationConditionMet(Population population) {`


    `for (Individual individual : population.getIndividuals()) {`


    `if (individual.getFitness() == 1) {`


    `return true;`


    `}`


    `}`


    `return false;`


    `}`


    The above method checks each individual in the population and will return true
    – indicating that we’ve found a termination condition and can stop – if the fitness
    of any individual in the population is 1.


    Now that the termination condition has been built, a loop can be added to the
    main bootstrap method in the AllOnesGA class using the newly added termination
    check as its loop conditional. When the termination check returns true, the genetic
    algorithm will stop looping and return its results.


    To create the evolution loop, modify the main method of our executive AllOnesGA
    class to represent the following. The first two lines of the snippet below are
    already in the main method. By adding this code we’re continuing to implement
    the pseudocode presented at the beginning of the chapter – recall that the “main”
    method is a concrete representation of the genetic algorithm pseudocode. Here’s
    what the main method should look like now:


    `public static void main(String[] args) {`


    `// These two lines were already here:`


    `GeneticAlgorithm ga = new GeneticAlgorithm(100, 0.001, 0.95, 0);`


    `Population population = ga.initPopulation(50);`


    `// The following is the new code you should be adding:`


    `ga.evalPopulation(population);`


    `int generation = 1;`


    `while (ga.isTerminationConditionMet(population) == false) {`


    `// Print fittest individual from population`


    `System.out.println("Best solution: " + population.getFittest(0).toString());`


    `// Apply crossover`


    `// TODO!`


    `// Apply mutation`


    `// TODO!`


    `// Evaluate population`


    `ga.evalPopulation(population);`


    `// Increment the current generation`


    `generation++;`


    `}`


    `System.out.println("Found solution in " + generation + " generations");`


    `System.out.println("Best solution: " + population.getFittest(0).toString());`


    `}`


    We’ve added an evolution loop that checks the output of isTerminationConditionMet.
    Also new to the main method are the addition of evalPopulation calls both before
    and during the loop, the generation variable that keeps track of the generation
    number, and the debug message that helpfully lets you know what the best solution
    in each generation looks like.


    We’ve also added an end-game: when we exit the loop, we’ll print some information
    about the final solution.


    However, at this point our genetic algorithm will run, but it won’t ever evolve!
    We’ll be stuck in an infinite loop unless we’re lucky enough that one of our randomly
    generated individuals happens to be all ones. You can see this behavior directly
    by clicking the “Run” button in Eclipse; the same solution will be presented over
    and over and the loop will never end. You’ll have to force the program to stop
    running by clicking the “Terminate” button above Eclipse’s console.


    To continue building our genetic algorithm we need to implement two additional
    concepts: crossover and mutation. These concepts actually drive the evolution
    of a population forward through random mutation and survival of the fittest.


    ### Crossover


    At this point, it’s time to start evolving the population by applying mutation
    and crossover. The crossover operator is the process in which individuals from
    the population trade genetic information, hopefully to create a new individual
    which contains the best parts from its parents’ genomes.


    During crossover each individual in the population is considered for crossover;
    this is where the crossover rate parameter is used. By comparing the crossover
    rate to a random number, we can decide whether the individual should have crossover
    applied to it, or whether it should be added straight into the next population
    unaffected by crossover. If an individual is selected for crossover then a second
    parent needs be found. To find the second parent, we need to pick one of many
    possible selection methods.


    #### Roulette Wheel Selection


    Roulette wheel selection - also known as fitness proportionate selection - is
    a selection method which uses the analogy of a roulette wheel to select individuals
    from a population. The idea is that individuals from the population are placed
    on a metaphoric roulette wheel depending on their fitness value. The higher the
    fitness of the individual, the more space it’s allocated on the roulette wheel.
    The image below demonstrates how individuals are typically positioned in this
    process.


    ![A978-1-4842-0328-6_2_Figa_HTML.jpg](A978-1-4842-0328-6_2_Figa_HTML.jpg)


    Each number on the wheel above represents an individual from the population. The
    higher the fitness of the individual, the larger their portion of the roulette
    wheel. If you now imagine spinning this wheel, it’s much more likely that the
    fitter individuals will be picked because they fill more space on the wheel. This
    is why this selection method is often referred to as fitness proportionate selection;
    because solutions are selected based on their fitness in proportion to the fitness
    of the rest of the population.


    There are many other selection methods that we could use such as: tournament selection
    ([Chapter 3](#A978-1-4842-0328-6_3_Chapter.html)) and stochastic universal sampling
    (an advanced form of fitness proportional selection). However, in this chapter
    we will be implementing one of the most common selection methods: roulette wheel
    selection. In later chapters we will be looking at other selection methods and
    how they differ.'
  trans: '

    ### 终止条件检查


    接下来需要检查终止条件是否已满足。终止条件有多种不同类型。有时，我们可以知道最优解是什么（更准确地说，可以知道最优解的适应度值），在这种情况下可以直接检查是否找到了正确解。然而，并非总能知道最优解的适应度，因此我们可以在解变得“足够好”时终止；也就是说，当解超过某个适应度阈值时。我们也可以在算法运行时间过长（代数过多）时终止，或者在决定终止算法时综合多个因素。


    由于全一问题比较简单，并且我们知道正确的适应度应为 1，因此在这种情况下，在找到正确解时终止是合理的。但这并非总是如此！事实上，这种情况很少见——不过我们很幸运，这是一个简单的问题。


    首先，我们必须构建一个函数来检查终止条件是否已触发。我们可以通过向`GeneticAlgorithm`类中添加以下代码来实现。请将其添加至任意位置，为简洁起见，我们照例省略了周围的类定义。


    `public boolean isTerminationConditionMet(Population population) {`


    `for (Individual individual : population.getIndividuals()) {`


    `if (individual.getFitness() == 1) {`


    `return true;`


    `}`


    `}`


    `return false;`


    `}`


    上述方法会检查种群中的每个个体，如果种群中任意个体的适应度为 1，则返回`true`——表示已满足终止条件，可以停止。


    现在终止条件已构建完成，可以在`AllOnesGA`类的主引导方法中添加一个循环，将新添加的终止检查作为循环条件。当终止检查返回`true`时，遗传算法将停止循环并返回结果。


    要创建进化循环，请修改`AllOnesGA`执行类的主方法，使其如下所示。下面代码片段的前两行已存在于主方法中。通过添加这段代码，我们正在继续实现本章开头展示的伪代码——请记住，“main”方法是遗传算法伪代码的具体实现。主方法现在应如下所示：


    `public static void main(String[] args) {`


    `// 这两行代码已存在：`


    `GeneticAlgorithm ga = new GeneticAlgorithm(100, 0.001, 0.95, 0);`


    `Population population = ga.initPopulation(50);`


    `// 以下是应添加的新代码：`


    `ga.evalPopulation(population);`


    `int generation = 1;`


    `while (ga.isTerminationConditionMet(population) == false) {`


    `// 打印种群中最优个体`


    `System.out.println("最佳解: " + population.getFittest(0).toString());`


    `// 应用交叉`


    `// 待实现！`


    `// 应用变异`


    `// 待实现！`


    `// 评估种群`


    `ga.evalPopulation(population);`


    `// 增加当前代数`


    `generation++;`


    `}`


    `System.out.println("在 " + generation + " 代中找到解");`


    `System.out.println("最佳解: " + population.getFittest(0).toString());`


    `}`


    我们添加了一个进化循环，用于检查`isTerminationConditionMet`的输出。主方法中还新增了循环前后对`evalPopulation`的调用、用于跟踪代数的`generation`变量，以及有助于了解每一代最优解样貌的调试信息。


    我们还添加了结束机制：当退出循环时，将打印关于最终解的一些信息。


    然而，此时我们的遗传算法虽然会运行，但永远不会进化！除非我们足够幸运，随机生成的某个个体恰好是全一，否则我们将陷入无限循环。你可以直接点击 Eclipse
    中的“Run”按钮来观察这一行为；相同的解会反复出现，循环永远不会结束。你必须点击 Eclipse 控制台上方的“Terminate”按钮来强制停止程序。


    要继续构建我们的遗传算法，需要实现另外两个概念：交叉和变异。这些概念通过随机变异和适者生存，真正推动种群的进化。


    ### 交叉


    现在，是时候通过应用变异和交叉来开始进化种群了。交叉算子是指种群中的个体交换遗传信息的过程，希望以此创造出包含其父母基因组中最优部分的新个体。


    在交叉过程中，种群中的每个个体都会被考虑是否进行交叉；这里会用到交叉率参数。通过将交叉率与随机数进行比较，我们可以决定该个体是否应应用交叉，还是应直接加入下一代种群而不受交叉影响。如果某个个体被选中进行交叉，则需要找到第二个父本。要找到第二个父本，我们需要从多种可能的**选择方法**中选取一种。


    #### 轮盘赌选择


    轮盘赌选择——也称为适应度比例选择——是一种选择方法，它利用轮盘赌的类比从种群中选择个体。其思想是，种群中的个体根据其适应度值被放置在一个隐喻性的轮盘上。个体的适应度越高，它在轮盘上占据的空间就越大。下图展示了在此过程中个体通常如何被定位。


    ![A978-1-4842-0328-6_2_Figa_HTML.jpg](img/A978-1-4842-0328-6_2_Figa_HTML.jpg)


    上图中轮盘上的每个数字代表种群中的一个个体。个体的适应度越高，其在轮盘上所占的比例就越大。现在想象转动这个轮盘，适应度更高的个体被选中的可能性要大得多，因为它们在轮盘上占据了更多空间。这就是为什么这种选择方法常被称为适应度比例选择；因为解是根据其适应度相对于种群中其他个体适应度的比例来被选中的。


    我们还可以使用许多其他选择方法，例如：锦标赛选择（第 3 章）和随机通用采样（适应度比例选择的一种高级形式）。不过，在本章中，我们将实现最常见的选择方法之一：轮盘赌选择。在后续章节中，我们将探讨其他选择方法及其差异。

