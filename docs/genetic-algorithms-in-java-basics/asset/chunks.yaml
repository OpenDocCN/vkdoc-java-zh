  trans: '

    ## 总结


    在本章中，我们介绍了使用遗传算法进行课程安排的基础知识。我们并非使用遗传算法来寻找最优解，而是利用它来寻找满足若干硬约束的第一个有效解。


    我们还探索了一种新的变异策略，该策略能确保变异后的染色体保持有效。我们没有直接修改染色体并引入随机性（在本例中这可能导致无效染色体），而是创建了一个已知有效的随机个体，并以类似于均匀交叉的方式与其交换基因。该算法仍被视为均匀变异，但本章采用的新方法使得确保有效变异更加容易。


    此外，我们将第 2 章中的均匀交叉与第 3 章中的锦标赛选择相结合，展示了遗传算法的许多方面都是模块化、独立的，并且能够以不同方式组合。


    最后，我们讨论了遗传算法中适应度分数的灵活性。我们了解到，无量纲的适应度分数可用于引入软约束，并使其与硬约束协调一致，最终目标不仅是产生有效结果，还要产生高质量的结果。


    # 优化


    在本章中，我们将探讨常用于优化遗传算法的不同技术。随着待解决问题的复杂化，额外的优化技术变得越来越重要。一个经过良好优化的算法在解决较大问题时可以节省数小时甚至数天的时间；因此，当问题达到一定复杂度时，优化技术至关重要。


    除了探讨一些常见的优化技术外，本章还将使用前几章案例研究中的遗传算法，提供几个实现示例。


    ## 自适应遗传算法


    自适应遗传算法（AGA）是遗传算法中一个流行的子集，在适当的情况下，它能比标准实现提供显著的性能提升。正如我们在前几章中所了解的，决定遗传算法性能的一个关键因素是其参数的配置方式。在构建高效遗传算法时，我们已经讨论了为变异率和交叉率找到正确值的重要性。通常，配置参数需要一些试错过程，并结合一些直觉，才能最终达到令人满意的配置。自适应遗传算法之所以有用，是因为它们能够根据算法的状态自动调整这些参数，从而辅助参数调优。这些参数调整发生在遗传算法运行期间，有望在执行过程中的任何特定时刻使用最佳参数。正是这种对算法参数的持续自适应调整，常常能带来遗传算法性能的提升。


    自适应遗传算法利用平均种群适应度和种群当前最佳适应度等信息，以最适合其当前状态的方式计算和更新其参数。例如，通过将任何特定个体与种群中当前最适应个体进行比较，可以评估该个体相对于当前最佳个体的表现。通常，我们希望增加保存表现良好个体的机会，并减少保存表现不佳个体的机会。实现这一点的一种方法是允许算法自适应地更新变异率。


    不幸的是，事情并没有那么简单。过了一段时间，种群将开始收敛，个体将开始更接近搜索空间中的单个点。当这种情况发生时，由于个体之间差异很小，搜索的进展可能会停滞。在这种情况下，稍微提高变异率可能是有效的，从而鼓励在搜索空间内探索其他区域。


    我们可以通过计算当前最佳适应度与平均种群适应度之间的差异来判断算法是否已开始收敛。当平均种群适应度接近当前最佳适应度时，我们就知道种群已开始在搜索空间的一个小区域周围收敛。


    然而，自适应遗传算法不仅可以用于调整变异率。类似的技术也可以应用于调整遗传算法的其他参数，例如交叉率，以便根据需要提供进一步的改进。

    '
- fmt: "### Implementation\n\nAs with many things concerning genetic algorithms, the\
    \ optimal way to update the parameters usually requires some experimentation.\
    \ We will explore one of the more common approaches and leave it to you personally\
    \ to experiment with other approaches if you wish.\n\nAs discussed previously,\
    \ when calculating what the mutation rate should be for any given individual,\
    \ two of the most important characteristics to consider are how well the current\
    \ individual is performing and how well the entire population is performing as\
    \ a whole. The algorithm we will use to assess these two characteristics and update\
    \ the mutation rate is as follows:\n\n`p [m] = (f [max] - f [i] ) / (f [max] –\
    \ f [avg] ) * m, f [i] > f [avg]`\n\n`p [m] = m, f [i] ≤ f [avg]`\n\nWhen the\
    \ individual’s fitness is greater than the population’s average fitness we take\
    \ the best fitness from the population (`f[max]`) and find the difference between\
    \ the current individual’s fitness (`f[i]`). We then find the difference between\
    \ the max population fitness and the average population fitness (`f[avg]`) and\
    \ divide the two values. We can use this value to scale our mutation rate that\
    \ was set during initialization. If the individual’s fitness is the same or less\
    \ than the population’s average fitness we simply use the mutation rate as set\
    \ during initialization.\n\nTo make things easier, we can implement our new adaptive\
    \ genetic algorithm code into our previous class scheduler code. To begin, we\
    \ need to add a new method for getting the average fitness of the population.\
    \ We can do this by adding the following method to the `Population` class, anywhere\
    \ in the file:\n\n```\n/**\n * Get average fitness\n *\n * @return The average\
    \ individual fitness\n */\npublic double getAvgFitness(){\n    if (this.populationFitness\
    \ == -1) {\n        double totalFitness = 0;\n        for (Individual individual\
    \ : population) {\n            totalFitness += individual.getFitness();\n    \
    \    }\n        this.populationFitness = totalFitness;\n    }\n    return populationFitness\
    \ / this.size();\n}\n```\n\nNow we can complete the implementation by updating\
    \ the mutation function to use our adaptive mutation algorithm:\n\n```\n/**\n\
    \ * Apply mutation to population\n *\n * @param population\n * @param timetable\n\
    \ * @return The mutated population\n */\npublic Population mutatePopulation(Population\
    \ population, Timetable timetable){\n    // Initialize new population\n    Population\
    \ newPopulation = new Population(this.populationSize);\n    // Get best fitness\n\
    \    double bestFitness = population.getFittest(0).getFitness();\n    // Loop\
    \ over current population by fitness\n    for (int populationIndex = 0; populationIndex\
    \ < population.size(); populationIndex++) {\n        Individual individual = population.getFittest(populationIndex);\n\
    \        // Create random individual to swap genes with\n        Individual randomIndividual\
    \ = new Individual(timetable);\n        // Calculate adaptive mutation rate\n\
    \        double adaptiveMutationRate = this.mutationRate;\n        if (individual.getFitness()\
    \ > population.getAvgFitness()) {\n            double fitnessDelta1 = bestFitness\
    \ - individual.getFitness();\n            double fitnessDelta2 = bestFitness -\
    \ population.getAvgFitness();\n            adaptiveMutationRate = (fitnessDelta1\
    \ / fitnessDelta2) * this.mutationRate;\n        }\n        // Loop over individual’s\
    \ genes\n        for (int geneIndex = 0; geneIndex < individual.getChromosomeLength();\
    \ geneIndex++) {\n            // Skip mutation if this is an elite individual\n\
    \            if (populationIndex > this.elitismCount) {\n                // Does\
    \ this gene need mutating?\n                if (adaptiveMutationRate > Math.random())\
    \ {\n                    // Swap for new gene\n                    individual.setGene(geneIndex,\
    \ randomIndividual.getGene(geneIndex));\n                }\n            }\n  \
    \      }\n        // Add individual to population\n        newPopulation.setIndividual(populationIndex,\
    \ individual);\n    }\n    // Return mutated population\n    return newPopulation;\n\
    }\n```\n\nThis new `mutatePopulation` method is identical to the original except\
    \ for the adaptive mutation code which implements the algorithm mentioned above.\n\
    \nWhen initializing the genetic algorithm with adaptive mutation enabled, the\
    \ mutation rate used will now be the maximum possible mutation rate and will scale\
    \ down depending on the fitness of the current individual and population as a\
    \ whole. Because of this, a higher initial mutation rate may be beneficial.\n\n\
    ### Exercises\n\nUse what you know about the adaptive mutation rate to implement\
    \ an adaptive crossover rate into your genetic algorithm.\n\n## Multi-Heuristics\n\
    \nWhen it comes to optimizing genetic algorithms implementing a secondary heuristic\
    \ is another common method to achieve significant performance improvements under\
    \ certain conditions. Implementing a second heuristic into a genetic algorithm\
    \ allows us to combine the best aspects of multiple heuristic approaches into\
    \ one algorithm, providing further control over the search strategy and performance.\n\
    \nTwo popular heuristics that are often implemented into genetic algorithms are\
    \ simulated annealing and Tabu search. Simulated annealing is a search heuristic\
    \ modeled on the process of annealing found in metallurgy. Put simply, it is a\
    \ hill climbing algorithm that is designed to gradually reduce the rate in which\
    \ worse solutions are accepted. In the context of genetic algorithms, simulated\
    \ annealing will reduce the mutation rate and/or crossover rate over time.\n\n\
    On the other hand, Tabu search is a search algorithm that keeps a list of “tabu”\
    \ (which derives from “taboo”) solutions that prevents the algorithm from returning\
    \ to previously visited areas in the search space that are known to be weak. This\
    \ tabu list helps the algorithm avoid repeatedly considering solutions it’s previously\
    \ found and knows to be weak.\n\nTypically, a multi-heuristic approach would only\
    \ be implemented in situations where including it could bring certain needed improvements\
    \ to the search process. For example, if the genetic algorithm is converging on\
    \ an area in the search space too quickly, implementing simulated annealing into\
    \ the algorithm might help to control how soon the algorithm converges."
