- fmt: '# History of Evolutionary Computation


    Evolutionary computation was first explored as an optimization tool in the 1950s
    when computer scientists were playing with the idea of applying Darwinian ideas
    of biological evolution to a population of candidate solutions. They theorized
    that it may be possible to apply evolutionary operators such as crossover – which
    is an analog to biological reproduction – and mutation – which is the process
    in which new genetic information is added to the genome. It’s these operators
    when coupled with selection pressure that provide genetic algorithms the ability
    to “evolve” new solutions when left over a period of time.


    In the 1960s “evolution strategies” – an optimization technique applying the ideas
    of natural selection and evolution – was first proposed by Rechenberg (1965, 1973)
    and his ideas were later expanded on by Schwefel (1975, 1977). Other computer
    scientists at the time were working independently on similar fields of research
    such as Fogel L.J; Owens, A.J; and Walsh, M.J (1966), who were the first to introduce
    the field of evolutionary programming. Their technique involved representing candidate
    solutions as finite-state machines and applying mutation to create new solutions.


    During the 1950s and 1960s some biologists studying evolution began experimenting
    with simulating evolution using computers. However, it was Holland, J.H. (1975)
    who first invented and developed the concept of genetic algorithms during the
    1960s and 1970s. He finally presented his ideas in 1975 in his groundbreaking
    book, “Adaption in Natural and Artificial Systems”. Holland’s book demonstrated
    how Darwinian evolution could be abstracted and modeled using computers for use
    in optimization strategies. His book explained how biological chromosomes can
    be modeled as strings of 1s and 0s, and how populations of these chromosomes can
    be “evolved” by implementing techniques that are found in natural selection such
    as mutation, selection and crossover.


    Holland’s original definition of a genetic algorithm has gradually changed over
    the decades from when it was first introduced back in the 1970s. This is somewhat
    due to recent researchers working in the field of evolutionary computation occasionally
    bringing ideas from the different approaches together. Although this has blurred
    the lines between many of the methodologies it has provided us with rich set of
    tools which can help us better tackle specific problems. The term “genetic algorithm”
    in this book will be used to refer to both Holland’s classical vision of a genetic
    algorithm, and also to the wider, present day, interpretation of the words.


    Computer scientists to this day are still looking at biology and biological systems
    to give them ideas on how they can create better algorithms. One of the more recent
    biologically inspired optimization algorithms would be Ant Colony Optimization
    which was first proposed in 1992 by Marco, D. (1992). Ant Colony optimization
    models the behavior of ants as a method for solving various optimization problems
    such as the Traveling Salesman Problem.


    # The Advantage of Evolutionary Computation


    The very rate at which intelligent machines have been adopted within our society
    is an acknowledgement of their usefulness. The vast majority of problems we use
    computers to solve can be reduced to relatively simple static decision problems.
    These problems can become rapidly more complex as the amount of possible inputs
    and outputs increase, and only further complicated when the solution needs to
    adapt to a changing problem. In addition to this, some problems may also require
    an algorithm to search through a huge number of possible solutions in an attempt
    to find a feasible solution. Depending on the amount of solutions that need to
    be searched through, classical computational methods may not be able find a feasible
    solution in the timeframe available – even using a super computer. It’s in these
    circumstances where evolutionary computation can offer a helping hand.


    To give you an idea of a typical problem we can solve with classical computational
    methods, consider a traffic light system. Traffic lights are relatively simple
    systems which only require a basic level of intelligence to operate. A traffic
    light system will usually have just a few inputs which can alert it to events
    such as a car or pedestrian waiting to use the junction. It then needs to manage
    those inputs and correctly change the lights in a way in which cars and pedestrians
    can use the junction efficiently without causing any accidents. Although, there
    may be a certain amount of knowledge required to operate a traffic light system,
    its inputs and outputs are basic enough that a set of instructions to operate
    the traffic light system can be designed and programmed by humans without much
    problem.


    Often we will need an intelligent system to handle more complex inputs and outputs.
    This could mean it is no longer as simple, or maybe impossible, for a human to
    program a set of instructions so the machine can correctly map the inputs to a
    viable output. In these cases where the complexity of the problem makes it unpractical
    for a human programmer to solve with code, optimization and learning algorithms
    can provide us with a method to use the computer’s processing power to find a
    solution to the problem itself. An example of this might be when building a fraud
    detection system that can recognize fraudulent transactions based on transaction
    information. Although a relationship may occur between the transaction data and
    a fraudulent transaction, it could depend on many subtleties within the data itself.
    It’s these subtle patterns in the input that might be hard for a human to code
    for, making it a good candidate for applying evolutionary computation.


    Evolutionary algorithms are also useful when humans don’t know how to solve a
    problem. A classic example of this was when NASA was looking for an antenna design
    that met all their requirements for a 2006 space mission. NASA wrote a genetic
    algorithm which evolved an antenna design to meet all of their specific design
    constraints such as, signal quality, size, weight and cost. In this example NASA
    didn’t know how to design an antenna which would fit all their requirements, so
    they decided to write a program which could evolve one instead.


    Another situation in which we may want to apply an evolutionary computation strategy
    is when the problem is constantly changing, requiring an adaptive solution. This
    problem can be found when building an algorithm to make predictions on the stock
    market. An algorithm that makes accurate predictions about the stock market one
    week might not make accurate predictions the following week. This is due to the
    forever shifting patterns and trends of the stock market and thus making prediction
    algorithms very unreliable unless they’re able to quickly adapt to the changing
    patterns as they occur. Evolutionary computation can help accommodate for these
    changes by providing a method in which adaptations can be made to the prediction
    algorithm as necessary.'
