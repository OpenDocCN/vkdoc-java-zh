    在上述虚拟染色体中，第一对（位置 0）代表当传感器输入总和为 0 时（即所有传感器均未触发）要执行的动作。第二对（位置 1）代表当传感器输入总和为 1 时（即只有前传感器检测到墙壁）要执行的动作。第三对（位置
    2）代表仅左前传感器被触发的情况。第四对（位置 3）代表前传感器和左前传感器同时被触发的情况。以此类推，直到最后一对（位置 63），它代表所有传感器都被触发的情况。


    图 3-2 展示了这种编码方案的另一种可视化方式。最左侧的“传感器”列代表传感器的位域，将其转换为十进制后，即可映射到染色体上的一个位置。一旦将传感器的位域转换为十进制，就可以将期望的动作放置在染色体上的相应位置。


    ![A978-1-4842-0328-6_3_Fig2_HTML.jpg](img/A978-1-4842-0328-6_3_Fig2_HTML.jpg)


    图 3-2.


    将传感器值映射到动作


    这种编码方案起初可能看起来有些晦涩难懂——而且染色体本身也不具备人类可读性——但它有几个有用的特性。首先，染色体可以作为一个位数组进行操作，而不是复杂的树结构或哈希映射，这使得交叉、变异和其他操作变得容易得多。其次，每一个
    128 位的值都是一个有效的解（尽管不一定是一个好的解）——本章稍后会详细介绍这一点。


    图 3-2 描述了一个典型的染色体如何将机器人的传感器值映射到动作。


