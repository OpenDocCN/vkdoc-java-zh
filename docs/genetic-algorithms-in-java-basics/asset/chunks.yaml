    最终，有些问题需要在庞大甚至无限的潜在解决方案中搜索，以找到针对当前问题的最佳或“足够好”的解决方案。从根本上说，所有进化算法都可视为搜索算法，它们在一组可能的解决方案中搜索，寻找最佳——或称“最适应”——的解决方案。如果你将生物体基因组中所有潜在的基因组合视为候选解决方案，或许就能直观理解这一点。生物进化非常擅长在这些可能的基因序列中搜索，以找到足够适应其环境的解决方案。在更大的搜索空间中，即使使用进化算法，也很可能找不到给定问题的最佳解决方案。然而，对于大多数优化问题来说，这很少成为问题，因为我们通常只需要一个足以完成任务的解决方案即可。


    进化计算所提供的方法可以被视为一种“自下而上”的范式。也就是说，算法中涌现出的所有复杂性都源于简单、基础的规则。与之相对的是“自上而下”的方法，它要求算法中展现的所有复杂性都由人类编写。遗传算法开发起来相当简单；这使得它们在原本需要复杂算法来解决问题时，成为一个有吸引力的选择。


    以下是一份特征列表，这些特征可以使一个问题成为应用进化算法的良好候选：


    *   当问题难以通过编写代码来解决时

    *   当人类不确定如何解决问题时

    *   当问题在不断变化时

    *   当逐一搜索每个可能的解决方案不可行时

    *   当“足够好”的解决方案可以接受时


    ## 生物进化


    生物进化，通过自然选择的过程，最早由查尔斯·达尔文（1859 年）在其著作《物种起源》中提出。正是他的生物进化概念启发了早期的计算机科学家，他们将生物进化改编并用作其优化技术的模型，这些技术体现在进化计算算法中。


    由于遗传算法中使用的许多思想和概念直接源于生物进化，因此对该主题有基本的了解有助于更深入地理解该领域。话虽如此，在我们开始探索遗传算法之前，让我们先快速了解一下生物进化的（经过一定简化的）基础知识。


    所有生物体都包含 DNA，它编码了构成该生物体的所有不同特征。DNA 可以被看作是生命从头开始创造生物体的说明书。改变生物体的 DNA 会改变其特征，例如眼睛和头发的颜色。DNA
    由单个基因组成，正是这些基因负责编码生物体的特定特征。


    生物体的基因聚集在染色体中，一整套染色体构成了生物体的基因组。所有生物体至少有一条染色体，但通常拥有更多，例如人类有 46 条染色体，而有些物种的染色体数量超过
    1000 条！在遗传算法中，我们通常将染色体称为候选解决方案。这是因为遗传算法通常使用单条染色体来编码候选解决方案。


    特定特征的各种可能设置被称为“等位基因”，而该特征在染色体上被编码的位置被称为“基因座”。我们将特定的基因组称为“基因型”，而该基因型所编码的物理生物体被称为“表型”。


    当两个生物体交配时，来自双方的 DNA 被汇集并组合在一起，使得产生的生物体——通常称为后代——从其第一个亲本获得 50%的 DNA，从第二个亲本获得另外
    50%的 DNA。生物体 DNA 中的基因偶尔会发生突变，使其拥有在父母双方中都未发现的 DNA。这些突变通过向种群中添加以前无法获得的基因，为种群提供了遗传多样性。种群中所有可能的遗传信息被称为该种群的“基因库”。


    如果产生的生物体足够适应其环境而得以生存，它很可能会自行交配，使其 DNA 能够延续到未来的种群中。然而，如果产生的生物体不够适应环境而无法生存并最终交配，其遗传物质就不会传播到未来的种群中。这就是为什么进化有时被称为“适者生存”——只有最适应的个体才能生存并传递其
    DNA。正是这种选择压力，缓慢地引导着进化，以找到越来越适应、适应性更强的个体。


    ### 生物进化示例


    为了帮助阐明这一过程如何逐步导致越来越适应的个体的进化，请考虑以下示例：


    在一个遥远的星球上，存在着一种呈白色方块形状的物种。


    ![A978-1-4842-0328-6_1_Figa_HTML.jpg](img/A978-1-4842-0328-6_1_Figa_HTML.jpg)


    白色方块物种已经和平生活了数千年，直到最近，一个新物种——黑色圆圈——出现了。


    ![A978-1-4842-0328-6_1_Figb_HTML.jpg](img/A978-1-4842-0328-6_1_Figb_HTML.jpg)


    黑色圆圈物种是食肉动物，开始以白色方块种群为食。


    ![A978-1-4842-0328-6_1_Figc_HTML.jpg](img/A978-1-4842-0328-6_1_Figc_HTML.jpg)


    白色方块没有任何办法防御黑色圆圈。直到有一天，一个幸存的白色方块随机地从白色方块变异成了黑色方块。黑色圆圈不再将新的黑色方块视为食物，因为它和自己颜色相同。


    ![A978-1-4842-0328-6_1_Figd_HTML.jpg](img/A978-1-4842-0328-6_1_Figd_HTML.jpg)


    一些幸存的方块种群进行了交配，产生了新一代的方块。这些新方块中的一些继承了黑色方块的基因。


    ![A978-1-4842-0328-6_1_Fige_HTML.jpg](img/A978-1-4842-0328-6_1_Fige_HTML.jpg)


    然而，白色的方块继续被吃掉……


    ![A978-1-4842-0328-6_1_Figf_HTML.jpg](img/A978-1-4842-0328-6_1_Figf_HTML.jpg)


    最终，得益于它们看起来与黑色圆圈相似的进化优势，它们不再被吃掉。现在剩下的唯一颜色方块就是黑色方块了。


    ![A978-1-4842-0328-6_1_Figg_HTML.jpg](img/A978-1-4842-0328-6_1_Figg_HTML.jpg)


    不再成为黑色圆圈猎物的黑色方块，再次得以和平生活。


    ![A978-1-4842-0328-6_1_Figh_HTML.jpg](img/A978-1-4842-0328-6_1_Figh_HTML.jpg)


    ## 基本术语


    遗传算法建立在生物进化的概念之上，因此，如果你熟悉进化论中的术语，你很可能会注意到在处理遗传算法时遇到的术语存在重叠。这两个领域之间的相似性当然是由于进化算法，更具体地说，是遗传算法与自然界中发现的过程相类似。

