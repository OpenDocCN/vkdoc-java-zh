- fmt: 'Finally, some problems require searching through a large, or possibly, infinite
    amount of potential solutions to find the best, or good enough, solution for the
    problem faced. Fundamentally, all evolutionary algorithms can be viewed as search
    algorithms which search through a set of possible solutions looking the best –
    or “fittest” - solution. You may be able to visualize this if you think of all
    the potential combinations of genes found in an organism’s genome as candidate
    solutions. Biological evolution is great at searching through these possible genetic
    sequences to find a solution which sufficiently suits its environment. In larger
    search spaces it’s likely - even when using evolutionary algorithms - the best
    solution to a given problem won’t be found. However, this is rarely an issue for
    most optimization problems because typically we only require a solution good enough
    to get the job done.


    The approach provided by evolutionary computation can be thought of as a “bottom-up”
    paradigm. That is when all the complexity that emerges from an algorithm comes
    from simple, underlying, rules. The alternative to this would be a “top-down”
    approach which would require all the complexity demonstrated within the algorithm
    to be written by humans. Genetic algorithms are fairly simple to develop; making
    them an appealing choice when otherwise a complex algorithm is required to solve
    the problem.


    Here is a list of features which can make a problem a good candidate for an evolutionary
    algorithm:


    - If the problem is sufficiently hard to write code to solve

    - When a human isn’t sure how to solve the problem

    - If a problem is constantly changing

    - When it’s not feasible to search through each possible solution

    - When a “good-enough” solution is acceptable


    ## Biological Evolution


    Biological evolution, through the process of natural selection, was first proposed
    by Charles Darwin (1859) in his book, “The Origin of Species”. It was his concept
    of biological evolution which inspired early computer scientists to adapt and
    use biological evolution as a model for their optimization techniques, found in
    evolutionary computation algorithms.


    Because many of the ideas and concepts used in genetic algorithms stem directly
    from biological evolution, a basic familiarity with the subject is useful for
    a deeper understanding into the field. With that being said, before we begin exploring
    genetic algorithms, let’s first run through the (somewhat simplified) basics of
    biological evolution.


    All organisms contain DNA which encodes all of the different traits that make
    up that organism. DNA can be thought of as life’s instruction manual to create
    the organism from scratch. Changing the DNA of an organism will change its traits
    such as eye and hair color. DNA is made up of individual genes, and it is these
    genes that are responsible for encoding the specific traits of an organism.


    An organism’s genes are grouped together in chromosomes and a complete set of
    chromosomes make up an organism’s genome. All organisms will have a least one
    chromosome, but usually contain many more, for example humans have 46 chromosomes
    with some species, having more than 1000! In genetic algorithms we usually refer
    to the chromosome as the candidate solution. This is because genetic algorithms
    typically use a single chromosome to encode the candidate solution.


    The various possible settings for a specific trait are called an “allele”, and
    the position in the chromosome where that trait is encoded is called a “locus”.
    We refer to a specific genome as a “genotype” and the physical organism that genotype
    encodes is called the “phenotype”.


    When two organisms mate, DNA from both organisms are brought together and combined
    in such a way that the resulting organism – usually referred to as the offspring
    – acquires 50% of its DNA from its first parent, and the other 50% from the second.
    Every so often a gene from the organisms DNA will mutate providing it with DNA
    found in neither of its parents. These mutations provide the population with genetic
    diversity by adding genes to the population that weren’t available beforehand.
    All possible genetic information in the population is referred as the population’s
    “gene pool”.


    If the resulting organism is fit enough to survive in its environment it’s likely
    to mate itself, allowing its DNA to continue on into future populations. If however,
    the resulting organism isn’t fit enough to survive and eventually mate its genetic
    material won’t propagate into future populations. This is why evolution is occasionally
    referred to as survival of the fittest – only the fittest individuals survive
    and pass on their DNA. It’s this selective pressure that slowly guides evolution
    to find increasingly fitter and better adapted individuals.


    ### An Example of Biological Evolution


    To help clarify how this process will gradually lead to the evolution of increasingly
    fitter individuals, consider the following example:


    On a distant planet there exists a species that takes the shape of a white square.


    ![A978-1-4842-0328-6_1_Figa_HTML.jpg](A978-1-4842-0328-6_1_Figa_HTML.jpg)


    The white square species has lived for thousands of years in peace, until recently
    when a new species arrived, the black circle.


    ![A978-1-4842-0328-6_1_Figb_HTML.jpg](A978-1-4842-0328-6_1_Figb_HTML.jpg)


    The black circle species were carnivores and began feeding on the white square
    population.


    ![A978-1-4842-0328-6_1_Figc_HTML.jpg](A978-1-4842-0328-6_1_Figc_HTML.jpg)


    The white squares didn’t have any way to defend themselves against the black circles.
    Until one day, one of the surviving white squares randomly mutated from a white
    square into a black square. The black circle no longer saw the new black square
    as food because it was the same color as itself.


    ![A978-1-4842-0328-6_1_Figd_HTML.jpg](A978-1-4842-0328-6_1_Figd_HTML.jpg)


    Some of the surviving square population mated, creating a new generation of squares.
    Some of these new squares inherited the black square color gene.


    ![A978-1-4842-0328-6_1_Fige_HTML.jpg](A978-1-4842-0328-6_1_Fige_HTML.jpg)


    However, the white colored squares continued to be eaten…


    ![A978-1-4842-0328-6_1_Figf_HTML.jpg](A978-1-4842-0328-6_1_Figf_HTML.jpg)


    Eventually, thanks to their evolutionary advantage of looking similar to the black
    circle, they were no longer eaten. Now the only color of square left was the black
    square.


    ![A978-1-4842-0328-6_1_Figg_HTML.jpg](A978-1-4842-0328-6_1_Figg_HTML.jpg)


    No longer prey to the black circle, the black squares were once again free to
    live in peace.


    ![A978-1-4842-0328-6_1_Figh_HTML.jpg](A978-1-4842-0328-6_1_Figh_HTML.jpg)


    ## Basic Terminology


    Genetic algorithms were built on the concepts of biological evolution, so if you’re
    familiar with the terminology found in evolution, you’ll likely notice overlap
    in the terminology found when working with genetic algorithms. The similarities
    between the fields are of course due to evolutionary algorithms, and more specifically,
    genetic algorithms being analogous to processes found in nature.'
