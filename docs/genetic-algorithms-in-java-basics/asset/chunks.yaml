  raw: 'In the above fake chromosome, the first pair (position 0) represents the action
    to take when the sensor inputs total is 0: everything off. The second pair (position
    1) represents the action to take when the sensor inputs total 1: only the front
    sensor detects a wall. The third pair, position 2, represents only the front-left
    sensor triggered. The fourth pair, position 3, represents both the front and the
    front-left sensor being active. And so on, until you get to the final pair, position
    63, which represents all sensors being triggered.


    Another visualization of this encoding scheme is represented in Figure [3-2](#A978-1-4842-0328-6_3_Chapter.html#Fig2).
    The left-most “Sensors” column represents the sensors’ bitfield, which maps to
    a chromosome position after you convert the bitfield to decimal. Once you’ve converted
    the sensors’ bitfield to decimal, you can place the desired action at the corresponding
    location in the chromosome.


    ![A978-1-4842-0328-6_3_Fig2_HTML.jpg](A978-1-4842-0328-6_3_Fig2_HTML.jpg)


    Figure 3-2.


    Mapping the sensor values to actions


    This encoding scheme may seem obtuse at first – and the chromosome is not human-readable
    – but it has a couple of helpful properties. First, the chromosome can be manipulated
    as an array of bits, rather than a complicated tree structure or hashmap, which
    makes crossover, mutation and other manipulations much easier. Secondly, every
    128-bit value is a valid solution (though not necessarily a good one) – more on
    this later in the chapter.


    Figure [3-2](#A978-1-4842-0328-6_3_Chapter.html#Fig2) describes how a typical
    chromosome can map the robot’s sensor values to actions.


