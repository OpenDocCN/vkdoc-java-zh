    simply swap the genetic information at two points. Swap mutation works by looping
    though the genes in the individual’s chromosome with each gene being considered
    for mutation determined by the mutation rate. If a gene is selected for mutation,
    another random gene in the chromosome is picked and then their positions are swapped.


