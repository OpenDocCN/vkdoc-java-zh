    By reading this book and working its examples, you’re taking your first step toward
    ultimately becoming an expert in machine learning. It may change the course of
    your career, but that’s up to you. We can only do our best to educate and give
    you the tools that you need to build your own future. Good luck!


    —Burak Kanber'
  trans: '

    ## 为什么选择遗传算法？


    遗传算法是机器学习的一个子集。在实践中，遗传算法通常不是解决某个特定问题的最佳单一算法。几乎每个问题都有更好、更具针对性的解决方案！那为什么还要费心呢？遗传算法是一种出色的多用途工具，可以应用于许多不同类型的问题。这就像瑞士军刀和专用棘轮螺丝刀之间的区别。如果你的工作是拧紧
    300 颗螺丝，你会选择螺丝刀；但如果你的工作是拧几颗螺丝、剪一块布、在皮革上打个孔，然后打开一瓶冰镇汽水犒劳自己，那么瑞士军刀是更好的选择。


    此外，我认为遗传算法是学习整个机器学习的最佳入门。如果机器学习是一座冰山，遗传算法就是冰山一角的一部分。遗传算法有趣、激动人心且新颖。由于遗传算法模拟了自然生物过程，它在计算世界和自然世界之间建立了联系。编写你的第一个遗传算法，并看着令人惊叹的结果从混沌和随机中涌现出来，对许多学生来说都是令人敬畏的体验。


    机器学习冰山一角的其他研究领域同样令人兴奋，但它们往往更狭窄、更难理解。而遗传算法则易于理解、实现起来有趣，并且引入了所有机器学习技术都使用的许多概念。


    如果你对机器学习感兴趣但不知从何入手，那就从遗传算法开始吧。你将学到重要的概念，这些概念可以迁移到其他领域；你将构建——不，是赢得——一个出色的多用途工具，可以用来解决许多类型的问题，而且无需学习高等数学就能理解。


    ## 关于本书


    本书为你提供了对遗传算法简单直接的介绍。无需数学、数据结构或算法方面的先决知识，就能充分利用本书——不过我们确实希望你具备中级计算机编程水平。虽然本书使用的编程语言是
    Java，但我们没有使用任何 Java 特有的高级语言结构或第三方库。只要你熟悉面向对象编程，就能毫无困难地理解书中的示例。读完本书，你将能够用你选择的语言（无论是面向对象语言、函数式语言还是过程式语言）轻松实现遗传算法。


    本书将引导你使用遗传算法解决四个不同的问题。在此过程中，你将学到许多技巧，未来在构建遗传算法时可以混合搭配使用。当然，遗传算法是一个庞大且成熟的领域，也有其底层的数学形式，一本书不可能涵盖该领域的所有内容。因此我们划定了界限：我们避免学究式的讨论，避开数学形式，也不涉足高级遗传算法的领域。本书的目标是让你通过实际示例快速上手，并为你提供足够的基础，以便你自行继续学习高级主题。


    ## 源代码


    本书中呈现的代码是全面的；让示例运行所需的一切都已印在书页中。然而，为了节省空间和纸张，我们在展示示例时经常省略代码注释和 Java 文档注释。请访问[`​www.​apress.​com/​9781484203293`](http://www.apress.com/9781484203293)并打开“源代码/下载”选项卡，下载随附的
    Eclipse 项目，其中包含本书中的所有示例代码——你会发现许多有用的注释和文档注释，这些在书页中是找不到的。


    通过阅读本书并实践其中的示例，你正在迈出成为机器学习专家的第一步。这可能会改变你的职业轨迹，但这取决于你自己。我们只能尽力教育你，并为你提供构建自己未来所需的工具。祝你好运！


    ——布拉克·坎伯

