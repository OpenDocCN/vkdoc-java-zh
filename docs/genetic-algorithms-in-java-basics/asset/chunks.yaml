    `}`\n\nNow, resolve the first TODO at the top of the `main` method by replacing\
    \ it with the following:\n\n```\n// Get a Timetable object with all the available\
    \ information.\nTimetable timetable = initializeTimetable();\n```\n\nThe top of\
    \ the `main` method should now look like this:\n\n```\npublic class TimetableGA\
    \ {\n\npublic static void main(String[] args) {\n    // Get a Timetable object\
    \ with all the available information.\n    Timetable timetable = initializeTimetable();\n\
    \n    // Initialize GA ... (and the rest of the class, unchanged from before!)\n\
    \    GeneticAlgorithm ga = new GeneticAlgorithm(100, 0.01, 0.9, 2, 5);\n```\n\n\
    This gives us a `Timetable` instance with all of the necessary information, and\
    \ the `GeneticAlgorithm` object we create is similar to those in previous chapters:\
    \ a genetic algorithm with a population of 100, a mutation rate of 0.01, a crossover\
    \ rate of 0.9, 2 elite individuals and a tournament size of 5.\n\nWe now have\
    \ seven TODOs remaining. The next TODO is related to initializing a population.\
    \ In order to create a population, we’ll need to know the length of the chromosome\
    \ we need; and that’s determined by the number of groups and modules in the `Timetable`.\n\
    \nWe need to be able to initialize a `Population` from a `Timetable` object, which\
    \ means that we also need to be able to initialize an `Individual` from a `Timetable`\
    \ object. In order to resolve this TODO, therefore, we must do three things: add\
    \ an `initPopulation(Timetable)` method to the `GeneticAlgorithm` class, add a\
    \ constructor to `Population` that accepts a `Timetable`, and add a constructor\
    \ to `Individual` that accepts a `Timetable`.\n\nLet’s start from the bottom and\
    \ work our way up. Update the `Individual` class by adding a new constructor that\
    \ builds an `Individual` from a `Timetable`. The constructor uses the `Timetable`\
    \ object to determine the number of classes that must be scheduled, which dictates\
    \ the chromosome length. The chromosome itself is built by taking random rooms,\
    \ timeslots, and professors from the `Timetable`.\n\nAdd the following method\
    \ to the `Individual` class, anywhere you like:\n\n```\npublic Individual(Timetable\
    \ timetable) {\n    int numClasses = timetable.getNumClasses();\n    // 1 gene\
    \ for room, 1 for time, 1 for professor\n    int chromosomeLength = numClasses\
    \ * 3;\n    // Create random individual\n    int newChromosome[] = new int[chromosomeLength];\n\
    \    int chromosomeIndex = 0;\n    // Loop through groups\n    for (Group group\
    \ : timetable.getGroupsAsArray()) {\n        // Loop through modules\n       \
    \ for (int moduleId : group.getModuleIds()) {\n            // Add random time\n\
    \            int timeslotId = timetable.getRandomTimeslot().getTimeslotId();\n\
    \            newChromosome[chromosomeIndex] = timeslotId;\n            chromosomeIndex++;\n\
    \            // Add random room\n            int roomId = timetable.getRandomRoom().getRoomId();\n\
    \            newChromosome[chromosomeIndex] = roomId;\n            chromosomeIndex++;\n\
    \            // Add random professor\n            Module module = timetable.getModule(moduleId);\n\
    \            newChromosome[chromosomeIndex] = module.getRandomProfessorId();\n\
    \            chromosomeIndex++;\n        }\n    }\n    this.chromosome = newChromosome;\n\
    }\n```\n\nThis constructor accepts a `timetable` object and loops over each student\
    \ group and each module the group is enrolled in (giving us the total number of\
    \ Classes that need scheduling). For each Class a random room, professor, and\
    \ timeslot is selected and the corresponding ID is added to the chromosome.\n\n\
    Next, add this constructor method to the `Population` class. This constructor\
    \ builds a `Population` from `Individual`s initialized with the `Timetable`, by\
    \ simply calling the `Individual` constructor we just created.\n\n```\npublic\
    \ Population(int populationSize, Timetable timetable) {\n    // Initial population\n\
    \    this.population = new Individual[populationSize];\n    // Loop over population\
    \ size\n    for (int individualCount = 0; individualCount < populationSize; individualCount++)\
    \ {\n        // Create individual\n        Individual individual = new Individual(timetable);\n\
    \        // Add individual to population\n        this.population[individualCount]\
    \ = individual;\n    }\n}\n```\n\nNext, re-implement the `initPopulation` method\
