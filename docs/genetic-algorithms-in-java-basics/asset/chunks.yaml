    Let’s also take this opportunity to initialize an array of 100 randomly generated
    City objects at the top of the “main” method. Simply generate random x and y coordinates
    and pass them to the City constructor. Make sure your TSP class looks like the
    following:


    `package chapter4;`


    `public class TSP {`


    `public static int maxGenerations = 3000;`


    `public static void main(String[] args) {`


    `int numCities = 100;`


    `City cities[] = new City[numCities];`


    `// Loop to create random cities`


    `for (int cityIndex = 0; cityIndex < numCities; cityIndex++) {`


    `int xPos = (int) (100 * Math.random());`


    `int yPos = (int) (100 * Math.random());`


    `cities[cityIndex] = new City(xPos, yPos);`


    `}`


