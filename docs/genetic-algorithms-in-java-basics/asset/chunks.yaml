  raw: '### Mutation


    Recall that constraints upon the chromosome often dictate the mutation and crossover
    techniques one selects for a genetic algorithm. In this case, a chromosome is
    built of specific room, professor, and timeslot IDs; we can not simply select
    random numbers. Additionally, since the rooms, professors, and timeslots all have
    a different range of IDs, we also can not simply choose a random number between
    1 and “X”. Potentially, we could choose random numbers for each of the different
    types of objects we’re encoding (room, professor, and timeslot), but that also
    assumes that IDs are contiguous, and they may not be!


    We can take a tip from uniform crossover to solve our mutation problem. In uniform
    crossover, genes are selected at random from an existing and valid parent. The
    parent might not be the fittest individual in the population, but at least it’s
    valid.


    Mutation can be implemented in a similar manner. Instead of choosing a random
    number for a random gene in the chromosome, we can create a new random but valid
    individual and essentially run uniform crossover to achieve mutation! That is,
    we can use our Individual(Timetable) constructor to create a brand new random
    Individual, and then select genes from the random Individual to copy into the
    Individual to be mutated. This technique is called uniform mutation, and makes
    sure that all of our mutated individuals are fully valid, never selecting a gene
    that doesn’t make sense. Add the following method anywhere in the GeneticAlgorithm
    class:


    `public Population mutatePopulation(Population population, Timetable timetable)
    {`


          `// Initialize new population`


          `Population newPopulation = new Population(this.populationSize);`


          `// Loop over current population by fitness`


          `for (int populationIndex = 0; populationIndex < population.size(); populationIndex++)
    {`


                `Individual individual = population.getFittest(populationIndex);`


                `// Create random individual to swap genes with`


                `Individual randomIndividual = new Individual(timetable);`


                `// Loop over individual’s genes`


                `for (int geneIndex = 0; geneIndex < individual.getChromosomeLength();
    geneIndex++) {`


                      `// Skip mutation if this is an elite individual`


                      `if (populationIndex > this.elitismCount) {`


                            `// Does this gene need mutation?`


                            `if (this.mutationRate > Math.random()) {`


                                  `// Swap for new gene`


                                  `individual.setGene(geneIndex, randomIndividual.getGene(geneIndex));`


                            `}`


                      `}`


                `}`


                `// Add individual to population`


                `newPopulation.setIndividual(populationIndex, individual);`


          `}`


          `// Return mutated population`


          `return newPopulation;`


    `}`


    In this method, like mutations in previous chapters, the population is mutated
    by looping over the population’s non-elite individuals. Unlike other mutation
    techniques which tend to modify genes directly, this mutation algorithm creates
    a random but valid individual and copies genes at random from that.


    We can now resolve the final TODO in our executive class’ main method. Add this
    one-liner to the main loop:


    `// Apply mutation`


    `population = ga.mutatePopulation(population, timetable);`


    We should now have everything in place to run our genetic algorithm and create
    a new college timetable. If your Java IDE is showing errors, or if it won’t compile
    at this point, please go back through this chapter and resolve any issues you
    find.


    ### Execution


    Make sure your TimetableGA class looks like the following:


    `package chapter` `5` `;`


    `public class TimetableGA {`


    `public static void main(String[] args) {`


    `// Get a Timetable object with all the available information.`


    `Timetable timetable = initializeTimetable();`


    `// Initialize GA`


    `GeneticAlgorithm ga = new GeneticAlgorithm(100, 0.01, 0.9, 2, 5);`


    `// Initialize population`


    `Population population = ga.initPopulation(timetable);`


    `// Evaluate population`


    `ga.evalPopulation(population, timetable);`


    `// Keep track of current generation`


    `int generation = 1;`


    `// Start evolution loop`


    `while (ga.isTerminationConditionMet(generation, 1000) == false`


    `&& ga.isTerminationConditionMet(population) == false) {`


    `// Print fitness`


    `System.out.println("G" + generation + " Best fitness: " + population.getFittest(0).getFitness());`


    `// Apply crossover`


    `population = ga.crossoverPopulation(population);`


    `// Apply mutation`


    `population = ga.mutatePopulation(population, timetable);`


    `// Evaluate population`


    `ga.evalPopulation(population, timetable);`


    `// Increment the current generation`


    `generation++;`


    `}`


    `// Print fitness`


    `timetable.createClasses(population.getFittest(0));`


    `System.out.println();`


    `System.out.println("Solution found in " + generation + " generations");`


    `System.out.println("Final solution fitness: " + population.getFittest(0).getFitness());`


    `System.out.println("Clashes: " + timetable.calcClashes());`


    `// Print classes`


    `System.out.println();`


    `Class classes[] = timetable.getClasses();`


    `int classIndex = 1;`


    `for (Class bestClass : classes) {`


    `System.out.println("Class " + classIndex + ":");`


    `System.out.println("Module: " +`


    `timetable.getModule(bestClass.getModuleId()).getModuleName());`


    `System.out.println("Group: " +`


    `timetable.getGroup(bestClass.getGroupId()).getGroupId());`


    `System.out.println("Room: " +`


    `timetable.getRoom(bestClass.getRoomId()).getRoomNumber());`


    `System.out.println("Professor: " +`


    `timetable.getProfessor(bestClass.getProfessorId()).getProfessorName());`


    `System.out.println("Time: " +`


    `timetable.getTimeslot(bestClass.getTimeslotId()).getTimeslot());`


    `System.out.println("-----");`


    `classIndex++;`


    `}`


    `}`


    `/**`


    `* Creates a Timetable with all the necessary course information.`


    `* @return`


    `*/`


    `private static Timetable initializeTimetable() {`


    `// Create timetable`


    `Timetable timetable = new Timetable();`


    `// Set up rooms`


    `timetable.addRoom(1, "A1", 15);`


    `timetable.addRoom(2, "B1", 30);`


    `timetable.addRoom(4, "D1", 20);`


    `timetable.addRoom(5, "F1", 25);`


    `// Set up timeslots`


    `timetable.addTimeslot(1, "Mon 9:00 - 11:00");`


    `timetable.addTimeslot(2, "Mon 11:00 - 13:00");`


    `timetable.addTimeslot(3, "Mon 13:00 - 15:00");`


    `timetable.addTimeslot(4, "Tue 9:00 - 11:00");`


    `timetable.addTimeslot(5, "Tue 11:00 - 13:00");`


    `timetable.addTimeslot(6, "Tue 13:00 - 15:00");`


