    the number of generations it takes to find a solution? How does increasing the
    population size affect the speed of the algorithm and how does it affect the number
    of generations it takes to find a solution?   Set the mutation rate to 0\. How
    does this affect the genetic algorithms ability to find a solution? Use a high
    mutation rate, how does this affect the algorithm?   Apply a low crossover rate.
    How does the algorithm preform with a lower crossover rate?   Decrease and increase
    the complexity of the problem by experimenting with shorter and larger chromosomes.
    Do different parameters work better when dealing with shorter or larger chromosomes?
