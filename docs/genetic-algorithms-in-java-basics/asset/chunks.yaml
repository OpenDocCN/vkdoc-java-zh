    ### 编码


    我们在课程表安排应用中使用的编码需要能够高效地编码我们所需的所有课程属性。对于此实现，这些属性包括：课程安排的时间段、授课的教授以及课程的教室。


    我们可以简单地为每个时间段、教授和教室分配一个数字 ID。然后，我们可以使用一个编码整数数组的染色体——这是我们熟悉的方法。这意味着每个需要安排的课程只需要三个整数即可编码，如下所示：


