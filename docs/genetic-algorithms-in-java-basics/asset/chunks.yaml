    This class contains the constructor to create a new Robot. It also contains functions
    to read the robot’s sensors, to get the robot’s heading and to move the robot
    around the maze. This Robot class is our way of simulating a simple robot so that
    we don’t have to run 1,000 generations of evolution on a population of 100 actual
    robots. You’ll often find classes like Maze and Robot in optimization problems
    like these, where it’s cost effective to simulate via software before refining
    your results in production hardware.


    Recall that it’s technically the Maze class that evaluates the fitness of a route.
    However, we still need to implement the calcFitness method in our GeneticAlgorithm
    class. Rather than calculating the fitness score directly, the calcFitness method
    is responsible for tying together the Individual, Robot, and Maze classes by creating
    a new Robot with the Individual’s chromosome (i.e., sensor controller instruction
    set) and evaluating it against our Maze.


    Write the following calcFitness function in the GeneticAlgorithm class. As always,
    this method can go anywhere in the class.


    `public double calcFitness(Individual individual, Maze maze) {`


    `int[] chromosome = individual.getChromosome();`


    `Robot robot = new Robot(chromosome, maze, 100);`


    `robot.run();`


    `int fitness = maze.scoreRoute(robot.getRoute());`


    `individual.setFitness(fitness);`


    `return fitness;`


    `}`


    Here, the calcFitness method accepts two parameters, individual and maze, which
    it uses to create a new robot and run it through the maze. The robot’s route is
    then scored and stored as the individual’s fitness.


    This code will create a robot, place it in our maze and test it using the evolved
    controller. The final parameter of the Robot constructor is the max number of
    moves the robot is allowed to make. This will prevent it from getting stuck in
    dead ends, or moving around in never ending circles. We can then simply take the
    score of the robot’s route and return it as the fitness using Maze’s scoreRoute
    method.


    With a working calcFitness method, we can now create an evalPopulation method.
    Recall from [Chapter 2](#A978-1-4842-0328-6_2_Chapter.html) that the evalPopulation
    method simply loops over each individual in the population and calls calcFitness
    for that individual, summing the total population fitness as it goes. In fact,
    this chapter’s evalPopulation is almost equivalent to [Chapter 2](#A978-1-4842-0328-6_2_Chapter.html)’s
    – but in this case, we also need to pass the maze object to the calcFitness method,
    so we need a slight modification.


    Add the following method to the GeneticAlgorithm class, anywhere you like:


    `public void evalPopulation(Population population, Maze maze) {`


    `double populationFitness = 0;`


    `for (Individual individual : population.getIndividuals()) {`


