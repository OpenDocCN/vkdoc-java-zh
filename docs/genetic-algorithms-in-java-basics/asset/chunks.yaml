    ### 执行


    TSP 类的最终代码应如下所示：


    `package chapter4;`


    `public class TSP {`


    `public static int maxGenerations = 3000;`


    `public static void main(String[] args) {`


    `// 创建城市`


    `int numCities = 100;`


    `City cities[] = new City[numCities];`


    `// 循环创建随机城市`


    `for (int cityIndex = 0; cityIndex < numCities; cityIndex++) {`


    `// 生成 x,y 坐标`


    `int xPos = (int) (100 * Math.random());`


    `int yPos = (int) (100 * Math.random());`


    `// 添加城市`


    `cities[cityIndex] = new City(xPos, yPos);`


    `}`


    `// 初始化遗传算法`


    `GeneticAlgorithm ga = new GeneticAlgorithm(100, 0.001, 0.9, 2, 5);`


    `// 初始化种群`


    `Population population = ga.initPopulation(cities.length);`


    `// 评估种群`


    `//ga.evalPopulation(population, cities);`


    `Route startRoute = new Route(population.getFittest(0), cities);`


    `System.out.println("起始距离: " + startRoute.getDistance());`


    `// 记录当前代数`


    `int generation = 1;`


    `// 开始进化循环`


    `while (ga.isTerminationConditionMet(generation, maxGenerations) == false) {`


    `// 打印种群中最优个体`


    `Route route = new Route(population.getFittest(0), cities);`


    `System.out.println("第"+generation+"代 最佳距离: " + route.getDistance());`


    `// 应用交叉`


    `population = ga.crossoverPopulation(population);`


    `// 应用变异`


    `population = ga.mutatePopulation(population);`


    `// 评估种群`


    `ga.evalPopulation(population, cities);`


    `// 当前代数递增`


    `generation++;`


    `}`


    `System.out.println("在 " + maxGenerations + " 代后停止。");`


    `Route route = new Route(population.getFittest(0), cities);`


    `System.out.println("最佳距离: " + route.getDistance());`


    `}`


    `}`


    此外，请对照以下属性和方法签名检查你的 `GeneticAlgorithm` 类。如果你遗漏了其中某个方法的实现，或者某个方法签名不匹配，请返回并解决该问题。


    `package chapter4;`


    `import java.util.Arrays;`


    `public class GeneticAlgorithm {`


    `private int populationSize;`


    `private double mutationRate;`


    `private double crossoverRate;`


    `private int elitismCount;`


    `protected int tournamentSize;`


    `public GeneticAlgorithm(int populationSize, double mutationRate, double crossoverRate,
    int elitismCount, int tournamentSize) { }`


    `public Population initPopulation(int chromosomeLength){ }`


    `public boolean isTerminationConditionMet(int generationsCount, int maxGenerations)
    { }`


    `public double calcFitness(Individual individual, City cities[]) { }`


    `public void evalPopulation(Population population, City cities[]) { }`


    `public Individual selectParent(Population population) { }`


    `public Population crossoverPopulation(Population population) { }`


    `public Population mutatePopulation(Population population) { }`


    `}`


    最后，请确保已通过替换构造函数并添加 `containsGene` 方法来更新 `Individual` 类。


    此时，点击“运行”并观察输出。像往常一样，提醒自己遗传算法是由统计学支配的随机过程，不能仅凭一次试验就得出任何结论。不幸的是，由于该问题初始化了一组随机城市，每次运行程序都会得到不同的最优解；这使得用遗传算法参数进行实验并判断其性能变得困难。本章末尾的第一个练习是硬编码一个城市列表，以便你能准确地基准测试算法的性能。


    不过，此时你可以进行一些有趣的观察。多次运行算法并观察最佳距离。它们都相似吗？至少在同一数量级？这很有趣，因为每次运行都使用不同的城市集合。但仔细想想，这很合理：虽然每次城市的位置不同，但每次仍然有
    100 个城市，并且它们仍然随机放置在一个 100x100 的地图上，这意味着我们可以相当容易地估算出问题解的总距离。


    考虑一个 100x100 的地图——其面积为 10,000 个单位——但你的目标不是访问 100 个城市，而是访问 10,000 个城市。如果城市均匀分布在地图上（每个网格点一个），那么最佳解的距离恰好是
    10,100（以锯齿形方式访问地图上的每个格子）。如果不是均匀分布，而是随机分布这 10,000 个城市，那么最佳解将是一个以 10,000 为中心的统计分布，由于放置的随机性，每次运行会略有不同。


    现在我们可以反向思考，考虑更少的城市：在地图上均匀放置 25 个城市，最短路径是 600 个单位。这里的关系变得清晰：距离与地图面积的平方根乘以城市数量的平方根有关。利用这个关系，我们发现均匀放置
    100 个城市的最小距离是 1,100（即 ![$$ \surd (map)*\surd (numCities)+\surd (map) $$](img/A978-1-4842-0328-6_4_Chapter_TeX2GIF_IEq1.gif)；末尾添加的平方根项用于计算南北向的行程，但当我们开始进行统计讨论时，可以忽略该项）。如果我们将同样的
    100 个城市随机放置在地图上，我们可以预期最小距离是一个以 1,000 为中心的分布。类似地，1,000 个城市的最佳距离应接近 3,100。


    如果你调整城市数量，你会发现对于较小的数量，算法很容易证实这些猜想，但自然地，对于超过 100 个城市的情况，它很难找到最小值。


    既然我们理解了地图大小、城市数量和预期最佳距离之间的关系，即使没有固定的城市集合，我们也可以进行实验，转而使用我们的统计预期。一个特别值得关注的领域是变异对结果质量的影响。


    如果你将解空间想象成一片连绵起伏的丘陵景观，那么遗传算法就像是将 100 个具有不同行为的人随机投放到这片景观中，看看哪个个体能找到最低的山谷。（在这种情况下，由于我们的
    `Individual` 构造函数不是随机的，我们实际上是将所有个体投放在同一个位置。）经过几代之后，个体及其后代将向下移动，并在找到附近最低的山谷时停止。然而，变异会将它们捡起并投放到一个新的随机位置——这个位置可能比之前更好或更差，但至少它是一个新的、独特的位置，允许它们在一个全新的景观中继续搜索。


    然而，变异通常可能带来短期的损害。变异可能是有利的，也可能是不利的——这就是为什么我们使用精英主义来保护最佳个体免受变异影响。但是，变异引入的多样性可以产生深远的长期影响，因为它将一个个体放置在一个原本可能不会被探索的景观上：想象一座高大的火山，中间有一个巨大的深渊，其中包含整个景观的最低点（全局最优解，被不利的景观所包围）。任何种群都不太可能爬上火山并在中心找到全局最优解——除非一次随机变异将一个个体放置在了火山口边缘。


    话虽如此，请观察不同变异率和精英计数对长期运行（数万代）的困难问题（200 个或更多城市）的影响。变异是有帮助还是有害？精英主义是有帮助还是有害？

