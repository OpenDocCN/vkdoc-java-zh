  trans: '

    ### 局部最优


    在实现优化算法时，需要考虑的一个障碍是算法逃离搜索空间中局部最优位置的能力。为了更好地理解什么是局部最优，请参考图 1-6。


    ![A978-1-4842-0328-6_1_Fig6_HTML.jpg](img/A978-1-4842-0328-6_1_Fig6_HTML.jpg)


    图 1-6.


    局部最优可能具有欺骗性


    这里我们可以看到适应度景观上有两座山峰，其高度略有不同。如前所述，优化算法无法看到整个适应度景观，它所能做的最好的事情就是找到它认为可能位于搜索空间中最佳位置的解。正是由于这一特性，优化算法常常会在不知不觉中将其搜索集中在搜索空间的次优区域。


    当实现一个简单的爬山算法来解决任何足够复杂的问题时，这个问题很快就会显现出来。简单的爬山算法没有任何内在的方法来处理局部最优，因此它通常会在搜索空间的局部最优区域终止搜索。简单的随机爬山算法类似于没有种群和交叉操作的遗传算法。该算法相当容易理解：它从搜索空间中的一个随机点开始，然后通过评估其邻居解来尝试找到更好的解。当爬山算法在其邻居中找到更好的解时，它会移动到新的位置并重新开始搜索过程。这个过程会通过沿着它在搜索空间中所处的任何山峰逐步向上移动，从而逐渐找到改进的解——因此得名“爬山算法”。当爬山算法再也找不到更好的解时，它会假定自己位于山顶并停止搜索。


    图 1-7 展示了爬山算法一次典型运行过程可能的样子。


    ![A978-1-4842-0328-6_1_Fig7_HTML.jpg](img/A978-1-4842-0328-6_1_Fig7_HTML.jpg)


    图 1-7.


    展示了爬山算法的工作原理


    上图演示了，如果简单爬山算法的搜索起始于搜索空间中的局部最优区域，它很容易返回一个局部最优解。


    尽管在未评估整个搜索区域之前，没有保证能避免局部最优的方法，但存在许多算法的变体可以帮助避免局部最优。其中最基本且有效的方法之一称为随机重启爬山算法，它简单地多次从随机起始位置运行爬山算法，然后返回多次运行中找到的最佳解。这种优化方法相对容易实现，而且效果出奇地好。其他方法，如模拟退火（参见
    Kirkpatrick、Gelatt 和 Vecchi，1983 年）和禁忌搜索（参见 Glover，1989 年和 Glover，1990 年），都是对爬山算法的轻微变体，它们都具有有助于减少局部最优的特性。


    遗传算法在避免局部最优和获取接近最优解方面效果出奇地好。它实现这一点的方式之一是拥有一个种群，使其能够对搜索空间的大范围进行采样，从而定位继续搜索的最佳区域。图
    1-8 展示了初始化时种群可能如何分布。


    ![A978-1-4842-0328-6_1_Fig8_HTML.jpg](img/A978-1-4842-0328-6_1_Fig8_HTML.jpg)


    图 1-8.


    初始化时的采样区域


    经过几代之后，种群将开始向上一代中能找到最佳解的区域收敛。这是因为在**选择**过程中，适应度较低的解会被移除，从而为在**交叉**和**变异**过程中产生新的、适应度更高的解腾出空间（图
    1-9）。


    ![A978-1-4842-0328-6_1_Fig9_HTML.jpg](img/A978-1-4842-0328-6_1_Fig9_HTML.jpg)


    图 1-9.


    经过几代变异后的适应度图


    **变异**算子也在规避局部最优中发挥作用。变异允许一个解从其当前位置跳跃到搜索空间中的另一个位置。这个过程常常会导致在搜索空间中更优的区域发现适应度更高的解。


    ## 参数


    尽管所有遗传算法都基于相同的概念，但它们的具体实现可能差异很大。具体实现可能不同的方式之一在于其参数。一个基本的遗传算法在实现时至少需要考虑几个参数。主要的三个参数是：**变异率**、**种群大小**，第三个是**交叉率**。


    ### 变异率


    变异率是指解染色体中特定基因发生变异的概率。从技术上讲，遗传算法的变异率没有正确的值，但某些变异率会比其他值提供好得多的结果。较高的变异率允许种群中有更多的遗传多样性，也有助于算法避免局部最优。然而，过高的变异率会导致每一代之间的遗传变异过大，从而使算法丢失在前一种群中找到的优秀解。


    如果变异率过低，算法在搜索空间中移动所需的时间会过长，从而阻碍其找到令人满意的解。变异率过高也会延长找到可接受解所需的时间。尽管高变异率有助于遗传算法避免陷入局部最优，但当设置过高时，它会对搜索产生负面影响。如前所述，这是因为每一代中的解被变异到如此大的程度，以至于在应用变异后它们实际上被随机化了。


    为了理解配置良好的变异率为何重要，考虑两个二进制编码的候选解：“100”和“101”。没有变异，新的解只能来自交叉。然而，当我们对解进行交叉时，后代只有两种可能的结果：“100”或“101”。这是因为父代基因组中唯一的区别在于它们的最后一位。如果后代从第一个父代那里获得最后一位，它将是“1”；否则，如果来自第二个父代，它将是“0”。如果算法需要找到替代解，它就需要对现有解进行变异，从而为其提供基因库中其他地方没有的新遗传信息。


    变异率应设置为一个值，该值既能提供足够的多样性以防止算法陷入平台期，又不会过高导致算法丢失前一种群中有价值的遗传信息。这种平衡将取决于所解决问题的性质。

    '
- fmt: '### Population Size


    The population size is simply the number of individuals in the genetic algorithm’s
    population in any one generation. The larger the population’s size, the more of
    the search space the algorithm can sample. This will help lead it in the direction
    of more accurate, and globally optimal, solutions. A small population size will
    often result in the algorithm finding less desirable solutions in locally optimal
    areas of the search space, however they require less computational resources per
    generation.


    Again here, like with the mutation rate, a balance needs to be found for optimum
    performance of the genetic algorithm. Likewise, the population size required will
    change depending on the nature of the problem being solved. Large hilly search
    spaces commonly require a larger population size to find the best solutions. Interestingly,
    when picking a population size there is a point in which increasing the size will
    cease to provide the algorithm with much improvement in the accuracy of the solutions
    it finds. Instead, it will slow the execution down due to the extra computational
    demand needed to process the additional individuals. A population size around
    this transition is usually going to provide the best balance between resources
    and results.


    ### Crossover Rate


    The frequency in which crossover is applied also has an effect on the overall
    performance of the genetic algorithm. Changing the crossover rate adjusts the
    chance in which solutions in the population will have the crossover operator applied
    to them. A high rate allows for many new, potentially superior, solutions to be
    found during the crossover phase. A lower rate will help keep the genetic information
    from fitter individuals intact for the next generation. The crossover rate should
    usually be set to a reasonably high rate promoting the search for new solutions
    while allowing a small percentage of the population to be kept unaffected for
    the next generation.


    ## Genetic Representations


    Aside from the parameters, another component that can affect a genetic algorithm’s
    performance is the genetic representation used. This is the way the genetic information
    is encoded within the chromosomes. Better representations will encode the solution
    in a way that is expressive while also being easily evolvable. Holland’s (1975)
    genetic algorithm was based on a binary genetic representation. He proposed using
    chromosomes that were comprised of strings containing 0s and 1s. This binary representation
    is probably the simplest encoding available, however for many problems it isn’t
    quite expressive enough to be a suitable first choice. Consider the example in
    which a binary representation is used to encode an integer which is being optimized
    for use in some function. In this example, `"000"` represents 0, and `"111"` represents
    7, as it typically would in binary. If the first gene in the chromosome is mutated
    - by flipping the bit from 0 to 1, or from 1 to 0 - it would change the encoded
    value by 4 (`"111"` = 7, `"011"` = 3). However, if the final gene in the chromosome
    is changed it will only effect the encoded value by 1 (`"111"` = 7, `"110"` =
    6). Here the mutation operator has a different effect on the candidate solution
    depending on which gene in its chromosome is being operated on. This disparity
    isn’t ideal as it will reduce performance and predictability of the algorithm.
    For this example, it would have been better to use an integer with a complimentary
    mutation operator which could add or subtract a relatively small amount to the
    gene’s value.


    Aside from simple binary representations and integers, genetic algorithms can
    use: floating point numbers, trees-based representations, objects, and any other
    data structure required for its genetic encoding. Picking the right representation
    is key when it comes to building an effective genetic algorithm.


    ## Termination


    Genetic algorithms can continue to evolve new candidate solutions for however
    long is necessary. Depending on the nature of the problem, a genetic algorithm
    could run for anywhere between a few seconds to many years! We call the condition
    in which a genetic algorithm finishes its search its termination condition.


    Some typical termination conditions would be:


    * A maximum number of generations is reached

    * Its allocated time limit has been exceeded

    * A solution has been found that meets the required criteria

    * The algorithm has reached a plateau


    Occasionally it might be preferable to implement multiple termination conditions.
    For example, it can be convenient to set a maximum time limit with the possibility
    of terminating earlier if an adequate solution is found.


    ## The Search Process


    To finish the chapter let’s take a step-by-step look at the basic process behind
    a genetic algorithm, illustrated in Figure [1-10](#A978-1-4842-0328-6_1_Chapter.html#Fig10).


    Genetic algorithms begin by initializing a population of candidate solutions.
    This is typically done randomly to provide an even coverage of the entire search
    space. Next, the population is evaluated by assigning a fitness value to each
    individual in the population. In this stage we would often want to take note of
    the current fittest solution, and the average fitness of the population. After
    evaluation, the algorithm decides whether it should terminate the search depending
    on the termination conditions set. Usually this will be because the algorithm
    has reached a fixed number of generations or an adequate solution has been found.
    If the termination condition is not met, the population goes through a selection
    stage in which individuals from the population are selected based on their fitness
    score – the higher the fitness, the better chance an individual has of being selected.
    The next stage is to apply crossover and mutation to the selected individuals.
    This stage is where new individuals are created for the next generation. At this
    point the new population goes back to the evaluation step and the process starts
    again. We call each cycle of this loop a generation. When the termination condition
    is finally met, the algorithm will break out of the loop and typically return
    its finial search results back to the user.


    ![A978-1-4842-0328-6_1_Fig10_HTML.jpg](A978-1-4842-0328-6_1_Fig10_HTML.jpg)


    Figure 1-10. A general genetic algorithm process


    ## CITATIONS


    Turing, A.M. (1950). “Computing Machinery and Intelligence”


    Simon, H.A. (1965). “The Shape of Automation for Men and Management”


    Barricell, N.A. (1975). “Symbiogenetic Evolution Processes Realised by Artificial
    Methods”


    Darwin, C. (1859). “On the Origin of Species”


    Dorigo, M. (1992). “Optimization, Learning and Natural Algorithms”


    Rechenberg, I. (1965) “Cybernetic Solution Path of an Experimental Problem”


    Rechenberg, I. (1973) “Evolutionsstrategie: Optimierung technischer Systeme nach
    Prinzipien der biologischen Evolution”


    Schwefel, H.-P. (1975) “Evolutionsstrategie und numerische Optimierung”


    Schwefel, H.-P. (1977) “Numerische Optimierung von Computer-Modellen mittels der
    Evolutionsstrategie”


    Fogel L.J; Owens, A.J; and Walsh, M.J. (1966) “Artificial Intelligence through
    Simulated Evolution”


    Holland, J.H. (1975) “Adaptation in Natural and Artificial Systems”


    Dorigo, M. (1992) “Optimization, Learning and Natural Algorithms”


    Glover, F. (1989) “Tabu search. Part I”


    Glover, F. (1990) “Tabu search. Part II”


    Kirkpatrick, S; Gelatt, C.D, Jr., and Vecchi, M.P. (1983) “Optimization by simulated
    annealing”'
