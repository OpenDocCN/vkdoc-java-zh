    This class contains methods to add rooms, timeslots, professors, modules and groups
    to the timetable. In this manner, the Timetable class serves dual purposes: a
    Timetable object knows all of the available rooms, timeslots, professors, etc.,
    but the Timetable object can also read a chromosome, create a subset of classes
    from that chromosome, and help evaluate the fitness of the chromosome.


    Pay close attention to the two important methods in this class: createClasses
    and calcClashes.


    The createClasses method accepts an Individual (that is, a chromosome) – and using
    its knowledge of the total number of student groups and modules that must be scheduled,
    creates a number of Class objects for those groups and modules. The method then
    starts reading the chromosome and assigns the variable information (a timeslot,
    a room, and a professor) to each one of those classes. Therefore, the createClasses
    method makes sure that every module and student group is accounted for, but it
    uses a genetic algorithm and the resultant chromosome to try different combinations
    of timeslots, rooms, and professors. The Timetable class caches this information
    locally (as “this.classes”) for later use.


    Once the Classes have been built, the calcClashes method checks each one in turn
    and counts the number of “clashes”. In this case, a “clash” is any hard constraint
    violation, such as a class whose room is too small, a conflict with room and timeslot,
    or a conflict with professor and timeslot. The number of clashes is used later
    by the GeneticAlgorithm’s calcFitness method.'
