    Single point crossover is an alternative crossover method to the uniform crossover
    method we implemented previously. Single point crossover is a very simple crossover
    method in which a single position in the genome is chosen at random to define
    which genes come from which parent. The genetic information before the crossover
    position comes from parent1, while the genetic information, after the position,
    comes from parent2.


    ![A978-1-4842-0328-6_3_Figb_HTML.jpg](A978-1-4842-0328-6_3_Figb_HTML.jpg)


    Single point crossover is reasonably easy to implement and allows contiguous groups
    of bits to be transferred from parents more effectively than in uniform crossover.
    This is a valuable property of crossover algorithms. Consider our specific problem,
    where the chromosome is an encoded set of instructions based on six sensor inputs,
    and each instruction is more than one bit long.


