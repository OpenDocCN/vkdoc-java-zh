    ## Analysis and Refinement


    The class-scheduling problem is a good example of using genetic algorithms to
    search a solution space for valid solutions rather than optimal solutions. This
    problem can have many solutions with a fitness of 1, and all we need to do is
    find just one of those valid solutions. When considering only hard constraints,
    there’s no real difference between any two valid solutions, and we can choose
    simply the first solution we find.


    Unlike the traveling salesman problem from [Chapter 4](#A978-1-4842-0328-6_4_Chapter.html),
    this property of the class-scheduling problem means the algorithm can actually
    return invalid solutions. A solution in the traveling salesman problem can be
    invalid if it doesn’t visit each city once, but because we took great care to
    design our initialization, crossover, and mutation algorithms, we won’t ever encounter
    an invalid solution using the code from [Chapter 4](#A978-1-4842-0328-6_4_Chapter.html).
    All of the routes returned by our TSP solver are valid, and it’s just a matter
    of finding the shortest possible route. If we stop the TSP algorithm at any point,
    during any generation, and pick a member of the population at random, it will
    be a valid solution.


    In this chapter, however, most solutions are invalid and we stop only when we
    find the first valid solution or run out of time. The difference between the two
    problems is as follows: in the traveling salesman problem, it’s easy to create
    a valid solution (just ensure every city is visited once; no guarantees as to
    the solution’s fitness, though!), but in the class scheduler, creating a valid
    solution is the difficult part.


    Additionally, without any soft constraints, there’s no difference in fitness between
    any two valid solutions returned by the class scheduler. In this context, hard
    constraints determine whether a solution is valid, but soft constraints determine
    a solution’s quality. The implementation above does not prefer any particular
    valid solution, because it has no means of determining the quality of a solution—it
    only knows if a solution is valid or not.


    Adding soft constraints to the class scheduler changes the problem significantly.
    No longer are we searching for just any valid solution, but we want the best valid
    solution.


    Fortunately, genetic algorithms are particularly good at this type of constraint
    juggling. The fact that an individual is judged only by a single number—its fitness—works
    to our advantage. The algorithm that determines an individual’s fitness is completely
    opaque to the genetic algorithm—it’s a black box as far as the genetic algorithm
    is concerned. While the fitness score is massively important to the genetic algorithm
    and can’t be implemented haphazardly, its simplicity and opaqueness also lets
    us use it to reconcile all sorts of constraints and conditions. Because everything
    boils down to a single non-dimensional fitness score, we are able to scale and
    transform as many constraints as we like, and the importance of that constraint
    is represented by how strongly it contributes to the fitness score.


    The class scheduler implemented above uses only hard constraints and confines
    the fitness score to the range 0-1. When combining different types of constraints,
    one should make sure that hard constraints have an overwhelming effect on the
    fitness score, while soft constraints make a more modest contribution.


    As an example, imagine you needed to add a handful of soft constraints to the
    class scheduler, each with a slightly different importance. The hard constraints
    still apply, of course. How do you reconcile soft constraints with hard constraints?
    The existing fitness score of `1 / (clashes + 1)` clearly does not incorporate
    soft constraints—and even if it considered a broken soft constraint a “clash”,
    would still put them all on equal footing with hard constraints. Under that model,
    it’s possible to select an invalid solution because it may have a number of satisfied
    soft constraints that make up for the lost fitness caused by the broken hard constraint.


    Instead, consider a new fitness scoring system: each broken hard constraint subtracts
    100 from the fitness score, while any satisfied soft constraint may add 1, 2,
    or 3 points to the fitness score depending on its importance. Under this scheme,
    we should only consider solutions with a score of zero or above, as anything negative
    has a broken hard constraint. This scheme also ensures that there’s no way a broken
    hard constraint can be canceled out by a large number of satisfied soft constraints
    – the contribution of a hard constraint to the fitness score is so overwhelming
    that there’s no way the soft constraints can make up the 100 points penalized
    by a broken hard constraint. Finally, this scheme also allows you to prioritize
    the soft constraints—more important constraints can contribute more to the fitness
    score.


    To further illustrate the idea that the fitness score normalizes constraints;
    consider any mapping and directions tool (like Google Maps). When you search for
    directions between two locations, the primary contributor to the fitness score
    is the amount of time it takes to get from place to place. A simple algorithm
    might use travel time in minutes as its fitness score (in this case, we’ll call
    it “cost score”, since lower is better, and the inverse of fitness is generally
    called “cost”).


    A route that takes 60 minutes is better than a route that takes 70 minutes – but
    we know that’s not always the case in real life. Perhaps the shorter route has
    an exorbitant toll of $20. The user may choose the “Avoid Tolls” option, and now
    the algorithm has to reconcile driving minutes versus toll dollars. How many minutes
    is a dollar worth? If you decide that each dollar adds one point to the cost score,
    the shorter route now has a cost of 80, and loses to the longer but cheaper route.
    On the other hand, if you weigh toll-avoidance less and decide that one dollar
    of toll only adds a cost of 0.25 to the route, the shorter route will still win
    with a cost of 65.


    Ultimately, when working with hard and soft constraints in genetic algorithms,
    be sure to understand what the fitness score represents and how each constraint
    will affect an individual’s score.


    ### Exercises


    - Add soft constraints to the class scheduler. This could include preferred professor
    time and preferred classrooms.

    - Implement support for a config file or database connection to add initial timetable
    data.

    - Build a class scheduler for a school timetable that requires students to have
    a class scheduled for each period.'
