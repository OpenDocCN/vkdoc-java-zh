    \ Apply crossover\n            // TODO: Apply mutation\n            // TODO: Evaluate\
    \ population\n\n            // Increment the current generation\n            generation++;\n\
    \        }\n\n        // TODO: Display results\n    }\n}\n```\n\nHopefully, this\
    \ procedure is becoming familiar; we’re once again beginning to implement the\
    \ pseudocode presented at the beginning of [Chapter 2](#A978-1-4842-0328-6_2_Chapter.html).\
    \ We’ve also generated an array of `City` objects that we’ll use in our evaluation\
