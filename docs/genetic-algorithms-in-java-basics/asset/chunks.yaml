    # Robotic Controllers


    ## Introduction


    In this chapter, we are going to use the knowledge we gained from the previous
    chapter to solve a real world problem using a genetic algorithm. The real world
    problem we will be working on is designing robotic controllers.


    Genetic algorithms are often applied to robotics as a method of designing sophisticated
    robotic controllers that enable a robot to perform complex tasks and behaviors,
    removing the need to manually code a complicated robotic controller. Imagine you
    have built a robot that can transport goods around a warehouse. You have installed
    sensors, which allow the robot to see its local environment, and you have given
    it wheels so it can navigate based on input from its sensors. The problem is how
    you can link the sensor data to motor actions so that the robot can navigate the
    warehouse.


    The field of artificial intelligence where genetic algorithms, and more generally,
    the ideas of Darwinian evolution are applied to robotics is referred to as evolutionary
    robotics. This isn’t the only bottom-up approach used for this problem, however.
    Neural networks are also frequently used to successfully map robotic sensors to
    outputs by using reinforcement-learning algorithms to guide the learning process.


    Typically, a genetic algorithm will evaluate a large population of individuals
    to locate the best individuals for the next generation. Evaluating an individual
    is done by running a fitness function that gauges the performance of an individual
    based on certain pre-defined criteria. However, applying genetic algorithms and
    their fitness functions to physical robots gives rise to a new challenge; physically
    evaluating each robotic controller isn’t feasible for large populations. This
    is due to the difficulty in physically testing each robotic controller and the
    time it would take to do so. For this reason, robotic controllers are typically
    evaluated by applying them to simulated models of real, physical robots and environments.
    This enables quick evaluations of each controller in software that later can be
    applied to their physical counterparts. In this chapter, we will use our knowledge
    of binary genetic algorithms to design a robotic controller and begin applying
    it to a virtual robot in a virtual environment.'
