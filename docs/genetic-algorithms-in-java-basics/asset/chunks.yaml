    Now we need to evaluate the population and assign fitness values to the individuals
    so we know which perform the best. The first step is to define the fitness function
    for the problem. Here, we simply need to calculate the total distance of the route
    given by the individual’s chromosome.


    First, we need to create a new class that can store a route and calculate its
    total distance. Create a new class called “Route” in package “chapter[4](#A978-1-4842-0328-6_4_Chapter.html)”
    and insert the following code:


    `package chapter4;`


    `public class Route {`


    `private City route[];`


    `private double distance = 0;`


    `public Route(Individual individual, City cities[]) {`


    `// Get individual’s chromosome`


    `int chromosome[] = individual.getChromosome();`


    `// Create route`


    `this.route = new City[cities.length];`


    `for (int geneIndex = 0; geneIndex < chromosome.length; geneIndex++) {`


    `this.route[geneIndex] = cities[chromosome[geneIndex]];`


    `}`


    `}`


    `public double getDistance() {`


    `if (this.distance > 0) {`


    `return this.distance;`


    `}`


    `// Loop over cities in route and calculate route distance`


    `double totalDistance = 0;`


    `for (int cityIndex = 0; cityIndex + 1 < this.route.length; cityIndex++) {`


    `totalDistance += this.route[cityIndex].distanceFrom(this.route[cityIndex + 1]);`


    `}`


    `totalDistance += this.route[this.route.length - 1].distanceFrom(this.route[0]);`


    `this.distance = totalDistance;`


    `return totalDistance;`


    `}`


    `}`


    This class contains only a constructor and a single method to calculate the total
    route distance. The constructor accepts an Individual and a list of City definitions
    (the same City array we created in the TSP class’ “main” function). The constructor
    then builds an array of City objects in the order of the Individual’s chromosome;
    this data structure makes it simple to evaluate the total route distance in the
    getDistance method.


    The getDistance method loops through the route array (an ordered array of City
    objects) and calls the City class’ “distanceFrom” method to calculate the distance
    between each two cities in turn, summing as it goes.


    To implement this fitness scoring method, we need to update the calcFitness function
    in the GeneticAlgorithm class. The calcFitness class should delegate the distance
    calculation to the Route class and, in order to do so, it needs to accept our
    City definition array and pass it to the Route class.


    Add the following method to the GeneticAlgorithm class, anywhere in the file.


    `public double calcFitness(Individual individual, City cities[]){`


    `// Get fitness`


    `Route route = new Route(individual, cities);`


    `double fitness = 1 / route.getDistance();`


    `// Store fitness`


    `individual.setFitness(fitness);`


    `return fitness;`


    `}`


    In this function, the fitness is calculated by dividing 1 by the total route distance
    – a shorter distance therefore has a higher score. After the fitness has been
    calculated, it is stored for quick recall in case it is needed again.


    Now we can update our evalPopulation method in the GeneticAlgorithm class to accept
    the cities parameter and find the fitness for every individual in the population.


    `public void evalPopulation(Population population, City cities[]){`


    `double populationFitness = 0;`


    `// Loop over population evaluating individuals and summing population fitness`


    `for (Individual individual : population.getIndividuals()) {`


    `populationFitness += this.calcFitness(individual, cities);`


    `}`


    `double avgFitness = populationFitness / population.size();`


    `population.setPopulationFitness(avgFitness);`


    `}`


    As usual, this function loops over the population and each individual’s fitness
    is calculated. Unlike previous implementations, we’re calculating an average population
    fitness instead of a total population fitness. (Since we’re using tournament selection
    rather than roulette wheel selection, we don’t actually need the population’s
    fitness; nothing would change if we simply didn’t record this value.)


