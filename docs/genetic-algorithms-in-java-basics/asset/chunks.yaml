    rate.


    `/**`


         `* Cool temperature`


         `*/`


        `public void coolTemperature() {`


            `this.temperature *= (1 - this.coolingRate);`


        `}`


    Now, we can update the mutation function to consider the temperature variable
    when deciding whether to apply mutation. We can do this by changing this line
    of code,


    `// Does this gene need mutation?`


    `if (this.mutationRate > Math.random()) {`


    To now include the new temperature variable,


    `// Does this gene need mutation?`


    `if ((this.mutationRate * this.getTempature()) > Math.random()) {`


    To finish this off, update the genetic algorithm’s loop code in the executive
    class’ “main” method to run the coolTemperature( ) function at the end of each
    generation. Again, you may need to adjust the initial mutation rate as it will
    now function as a max rate depending on the temperature value.


    ### Exercises


    Use what you know about the simulated annealing heuristic to apply it to crossover
    rate.


    ## Performance Improvements


    Aside from improving the search heuristics, there are other ways to optimize a
    genetic algorithm. Possibly one of the most effective ways to optimize a genetic
    algorithm is by simply writing efficient code. When building genetic algorithms
    that need to run for many thousands of generations, just taking a fraction of
    a second off of each generation’s processing time can greatly reduce the overall
    running time.


    ### Fitness Function Design


    With the fitness function typically being the most processing demanding component
    of a genetic algorithm, it makes sense to focus code improvements on the fitness
    function to see the best return in performance.


    Before making improvements to the fitness function, it’s a good idea to first
    ensure it adequately represents the problem. A genetic algorithm uses its fitness
    function to gauge the best area of the search space to focus its search in. This
    means a poorly designed fitness function can have a huge negative impact on the
    search ability and overall performance of the genetic algorithm. As an example,
    imagine a genetic algorithm has been built to design a car panel, but the fitness
    function which evaluated the car panel did so entirely by measuring the car’s
    top speed. This overly simple fitness function may not provide an adequate fitness
    value if it was also important that the panel could meet certain durability or
    ergonomic constraints as well as being aerodynamic enough.


    ### Parallel Processing


    Modern computers will often come equipped with several separate processing units
    or “cores”. Unlike standard single-core systems, multi-core systems are able to
    use additional cores to process multiple computations simultaneously. This means
    any well-designed application should be able to take advantage of this characteristic
    allowing its processing requirements to be distributed across the extra processing
    cores available. For some applications, this could be as simple as processing
    GUI related computations on one core and all the other computations on another.


    Supporting the benefits of multi-core systems is one simple but effective way
    to achieve performance improvements on modern computers. As we discussed previously,
    the fitness function is often going to be the bottleneck of a genetic algorithm.
    This makes it a perfect candidate for multi-core optimization. By using multiple
    cores, it’s possible to calculate the fitness of numerous individuals simultaneously,
    which makes a huge difference when there are often hundreds of individuals to
    evaluate per population.


    Lucky for us, Java 8 provides some very useful libraries that makes supporting
    parallel processing in our genetic algorithm much easier. Using IntStream, we
    can achieve parallel processing in our fitness function without worrying about
    the fine details of parallel processing (such as the number of cores we need to
    support); it will instead create an optimal number of threads depending on the
    number of cores available.


    You may have wondered why, in [Chapter 5](#A978-1-4842-0328-6_5_Chapter.html),
    the GeneticAlgorithm calcFitness method clones the Timetable object before using
    it. When threading applications for parallel processing, one needs to take care
    to ensure that objects in one thread will not affect objects in another thread.
    In this case, changes made to the timetable object from one thread may have unexpected
    results in other threads using the same object at the same time – cloning the
    Timetable first allows us to give each thread its own object.


    We can take advantage of threading in [Chapter 5](#A978-1-4842-0328-6_5_Chapter.html)’s
    class scheduler by modifying the GeneticAlgorithm’s evalPopulation method to use
    Java’s IntStream:


    `/**`


         `* Evaluate population`


         `*`


         `* @param population`


         `* @param timetable`


         `*/`


