    ### 执行


    至此，你已经完成了第一个遗传算法。本章前面部分完整打印了 `Individual` 和 `Population` 类，你编写的这些类版本应与上述代码完全一致。最终的
    `AllOnesGA` 执行类——即引导并运行算法的类——已直接提供在上方。


    `GeneticAlgorithm` 类相当长，你是逐步构建它的，因此请在此处确认你已经实现了以下属性和方法。为节省篇幅，我已省略所有注释和方法体——这里仅展示类的折叠视图——但请确保你的类版本中每个方法都已按上述描述实现。


    `package chapter2;`


    `public class GeneticAlgorithm {`


        `private int populationSize;`


        `private double mutationRate;`


        `private double crossoverRate;`


        `private int elitismCount;`


        `public GeneticAlgorithm(int populationSize, double mutationRate, double crossoverRate,
    int elitismCount) { }`


        `public Population initPopulation(int chromosomeLength) { }`


        `public double calcFitness(Individual individual) { }`


        `public void evalPopulation(Population population) { }`


        `public boolean isTerminationConditionMet(Population population) { }`


        `public Individual selectParent(Population population) { }`


        `public Population crossoverPopulation(Population population) { }`


        `public Population mutatePopulation(Population population) { }`


    `}`


    如果你使用的是 Eclipse IDE，现在可以通过打开 `AllOnesGA` 文件并点击通常位于 IDE 顶部菜单中的“运行”按钮来运行该算法。


    运行时，算法会将信息打印到控制台，点击运行后这些信息应自动显示在 Eclipse 中。由于每个遗传算法都具有随机性，每次运行的结果会略有不同，但以下是输出可能的样子示例：


    `Best solution: 11001110100110111111010111001001100111110011111111`


    `Best solution: 11001110100110111111010111001001100111110011111111`


    `Best solution: 11001110100110111111010111001001100111110011111111`


    `[ ... 此处省略大量行 ... ]`


    `Best solution: 11111111111111111111111111111011111111111111111111`


    `Best solution: 11111111111111111111111111111011111111111111111111`


    `Found solution in 113 generations`


    `Best solution: 11111111111111111111111111111111111111111111111111`


    此时，你应该尝试调整传递给 `GeneticAlgorithm` 构造函数的各种参数：`populationSize`、`mutationRate`、`crossoverRate`
    和 `elitismCount`。别忘了统计规律支配着遗传算法的性能，因此你不能仅凭一次运行来评估算法或参数设置的性能——在判断其性能之前，你至少需要对每种不同设置运行
    10 次试验。


    ## 总结


    在本章中，你学习了实现遗传算法的基础知识。本章开头的伪代码为你将在本书其余部分实现的所有遗传算法提供了一个通用的概念模型：每个遗传算法都会初始化并评估一个种群，然后进入一个执行交叉、变异和重新评估的循环。只有在满足终止条件时，循环才会退出。


    在本章中，你构建了遗传算法的支持组件，特别是 `Individual` 和 `Population` 类，这些类将在后续章节中大量复用。然后，你专门构建了一个
    `GeneticAlgorithm` 类来解决“全一”问题，并成功运行了它。


    你还学到了以下内容：虽然每个遗传算法在概念和结构上相似，但不同的问题领域需要不同的评估技术实现（即适应度评分、交叉技术和变异技术）。


    本书的其余部分将通过示例问题探讨这些不同的技术。在接下来的章节中，你将复用 `Population` 和 `Individual` 类，仅需稍作修改。然而，后续每一章都需要对
    `GeneticAlgorithm` 类进行大量修改，因为该类是交叉、变异、终止条件和适应度评估发生的地方。


    练习运行遗传算法几次，观察进化过程的随机性。通常需要多少代才能找到这个问题的解？   增加和减少种群规模。减少种群规模如何影响算法的速度？它是否也会影响找到解所需的代数？增加种群规模如何影响算法的速度？它又如何影响找到解所需的代数？
      将变异率设置为 0。这对遗传算法找到解的能力有何影响？使用高变异率，这对算法有何影响？   应用低交叉率。算法在较低交叉率下表现如何？   通过尝试更短和更长的染色体来降低和增加问题的复杂度。在处理更短或更长的染色体时，不同的参数是否效果更好？
      比较启用和未启用精英策略时遗传算法的性能。   使用高精英策略值进行测试。这对搜索性能有何影响？


    # 机器人控制器


    ## 引言


    在本章中，我们将利用从上一章获得的知识，使用遗传算法解决一个现实世界的问题。我们将要解决的现实世界问题是设计机器人控制器。


    遗传算法常被应用于机器人学，作为设计复杂机器人控制器的一种方法，使机器人能够执行复杂的任务和行为，从而无需手动编写复杂的机器人控制器。想象一下，你制造了一个可以在仓库内运输货物的机器人。你安装了传感器，使机器人能够看到其局部环境，并且你给了它轮子，使其能够根据传感器输入进行导航。问题在于如何将传感器数据与电机动作联系起来，以便机器人能够在仓库中导航。


    在人工智能领域中，将遗传算法，以及更广义的达尔文进化思想应用于机器人学的领域被称为进化机器人学。然而，这并不是解决这个问题的唯一自下而上的方法。神经网络也经常被成功用于将机器人传感器映射到输出，通过使用强化学习算法来指导学习过程。


    通常，遗传算法会评估一个大的个体种群，以定位最适合下一代的个体。评估个体是通过运行一个适应度函数来完成的，该函数根据某些预定义的标准来衡量个体的表现。然而，将遗传算法及其适应度函数应用于物理机器人带来了一个新的挑战：对于大型种群来说，物理评估每个机器人控制器是不可行的。这是因为物理测试每个机器人控制器的难度以及所需的时间。出于这个原因，机器人控制器通常通过将其应用于真实物理机器人和环境的模拟模型来进行评估。这使得可以在软件中快速评估每个控制器，随后再将其应用于物理对应物。在本章中，我们将利用二进制遗传算法的知识来设计一个机器人控制器，并开始将其应用于虚拟环境中的虚拟机器人。

    '
- fmt: '# The Problem


    The problem we are going to solve is designing a robotic controller that can use
    the robot''s sensors to navigate a robot successfully through a maze. The robot
    can take four actions: move one-step forward, turn left, turn right, or, rarely,
    do nothing. The robot also has six sensors: three on the front, one on the left,
    one on the right and one on the back.


    ![A978-1-4842-0328-6_3_Figa_HTML.jpg](A978-1-4842-0328-6_3_Figa_HTML.jpg)


    The maze we are going to explore is comprised of walls that the robot can''t cross
    and will have an outlined route, shown in Figure [3-1](#A978-1-4842-0328-6_3_Chapter.html#Fig1),
    which we want the robot to follow. Keep in mind that the purpose of this chapter
    isn''t to train a robot to solve mazes. Our purpose is to automatically program
    a robot controller with six sensors so that it doesn''t crash into walls; we''re
    simply using the maze as a complicated environment in which to test our robot
    controller.


    ![A978-1-4842-0328-6_3_Fig1_HTML.jpg](A978-1-4842-0328-6_3_Fig1_HTML.jpg)


    Figure 3-1. The route we want the robot to follow


    The robot''s sensors will activate whenever they detect a wall adjacent to the
    sensor. For example, the robot''s front sensor will activate if it detects a wall
    in front of the robot.


    # Implementation


    ## Before You Start


    This chapter will build on the code you developed in [Chapter 2](#A978-1-4842-0328-6_2_Chapter.html).
    Before you start, create a new Eclipse or NetBeans project, or create a new package
    in your existing project for this book called "chapter[3](#A978-1-4842-0328-6_3_Chapter.html)".


    Copy the `Individual`, `Population`, and `GeneticAlgorithm` classes over from
    [Chapter 2](#A978-1-4842-0328-6_2_Chapter.html) and import them into [Chapter
    3](#A978-1-4842-0328-6_3_Chapter.html). Make sure to update the package name at
    the top of each class file! They should all say "package chapter[3](#A978-1-4842-0328-6_3_Chapter.html)"
    at the very top.


    In this chapter, you won''t have to modify the `Individual` and `Population` classes
    at all, except for changing the package name to "chapter[3](#A978-1-4842-0328-6_3_Chapter.html)".


    However, you will be modifying several methods in the `GeneticAlgorithm` class.
    At this point, you should completely delete the following five methods: `calcFitness`,
    `evalPopulation`, `isTerminationConditionMet`, `selectParent`, and `crossoverPopulation`.
    You''ll rewrite these five methods throughout this chapter, and deleting them
    right now will help ensure you don''t accidentally reuse [Chapter 2](#A978-1-4842-0328-6_2_Chapter.html)''s
    implementations.


    You''ll also be creating a few additional classes this chapter (`Robot` and `Maze`,
    and also the executive `RobotController` class that contains the program''s `main`
    method). If you''re working in Eclipse, it''s easy to create a new class via the
    File ➤ New ➤ Class menu option. Pay attention to the package name field and make
    sure it says "chapter[3](#A978-1-4842-0328-6_3_Chapter.html)".


    ## Encoding


    Encoding data the right way can often be the trickiest aspect of a genetic algorithm.
    Let''s start by first defining the problem: we need a binary representation of
    the robot controller''s complete instruction set for all possible combinations
    of inputs.


    As discussed earlier, our robot will have four actions: do nothing, move forward
    one step, turn left and turn right. These can be represented in binary as:


    *   "00": do nothing

    *   "01": move forward

    *   "10": turn left

    *   "11": turn right


    We also have six different on/off sensors giving us 2⁶ (64) possible combinations
    of sensor inputs. If each action requires 2 bits to encode, we can represent the
    controller''s response to any possible input in 128 bits. Phrased another way,
    we have 64 different scenarios our robot can find itself in, and our controller
    needs to have an action defined for each scenario. Since an action requires two
    bits, our controller requires 64*2 = 128 bits of storage.


    Since genetic algorithm chromosomes are easiest to manipulate as arrays, our chromosome
    will be a bit array of length 128. In this scenario, with our mutation and crossover
    methods you don''t need to worry about which particular instruction they''re modifying,
    they just get to manipulate genetic code. On our end, however, we''ll have to
    unpack the encoded data before we can use it in the robot controller.


    Given that 128 bits is our requirement for representing instructions for 64 different
    sensor combinations, how should we actually structure the chromosome so that we
    can pack and unpack it? That is, which combination of sensor inputs does each
    section of the chromosome correspond to? In what order are the actions? Where
    can we find the action for the situation "front and front-right sensors are activated"
    within the chromosome? The bits in the chromosome represent output, but how is
    input represented?


    This will be an unintuitive question (and solution) to many people, so let''s
    move toward the solution in small steps. The first step might be to consider a
    simple, human readable list of inputs and outputs:


    `Sensor #1 (front): on`


    `Sensor #2 (front-left): off`


    `Sensor #3 (front-right): on`


    `Sensor #4 (left): off`


    `Sensor #5 (right): off`


    `Sensor #6 (back): off`


    Instruction: turn left (action "10" as defined above)


    With an additional 63 entries to represent all possible combinations, this format
    is unwieldy. It''s clear that this type of enumeration won''t work for us. Let''s
    take another small step by abbreviating everything and translating "on" and "off"
    to 1 and 0:


    `#1: 1`


    `#2: 0`


    `#3: 1`


    `#4: 0`


    `#5: 0`


    `#6: 0`


    `Instruction: 10`


    We''re making progress, but this still doesn''t pack 64 instructions into a 128-bit
    array. Our next step is to take the six sensor values – the inputs – and encode
    those further. Let''s line them up from right to left, and drop the word "Instruction"
    from the output:


    `#6:0, #5:0, #4:0, #3:1, #2:0, #1:1 => 10`


    Now let''s drop the numbering of the sensors:


    `000101 => 10`


    If we now convert the sensor values'' bit string to decimal, we get the following:


    `5 => 10`


    Now we''re onto something. The "5" on the left hand side represents the sensor
    inputs, and the "10" on the right represents what the robot should do when faced
    with those inputs (the output). Because we got here from a binary representation
    of the sensor inputs, there''s only one combination of sensors that can give us
    the number 5.


    We can use the number 5 as the position in the chromosome that represents a combination
    of sensor inputs. If we were building this chromosome by hand, and we knew that
    "10" (turn left) is the correct response to "5" (front and front-right sensors
    detecting a wall), we would place "1" and "0" in the 11^(th) and 12^(th) spots
    in the chromosome (each action requires 2 bits, and we start counting positions
    from 0), like so:


    `xx xx xx xx xx 10 xx xx xx xx (... 54 more pairs...)`'
