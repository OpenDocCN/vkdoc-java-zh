    ### 评估


    在评估阶段，我们需要定义一个适应度函数来评估每个机器人控制器。我们可以通过为机器人在路线上做出的每个正确且独特的移动增加个体适应度来实现这一点。回想一下，我们之前创建的
    Maze 类有一个`scoreRoute`方法可以执行此评估。然而，路线本身来自一个自主控制的机器人。因此，在我们可以将路线交给 Maze 类进行评估之前，我们需要创建一个能够遵循指令并通过执行这些指令生成路线的
    Robot 类。


    创建一个 Robot 类来管理机器人的功能。在 Eclipse 中，您可以通过选择菜单选项 File ➤ New ➤ Class 来创建一个新类。确保使用正确的包名。将以下代码添加到文件中：


    `package chapter3;`


    `import java.util.ArrayList;`


    `/**`


