  raw: '## Summary


    Genetic algorithms can be modified in different ways to achieve significant performance
    improvements. In this chapter, we looked at a number of different optimization
    strategies and how to implement them into a genetic algorithm.


    Adaptive genetic algorithms is one optimization strategy which can provide performance
    improvements over a standard genetic algorithm. An adaptive genetic algorithm
    allows the algorithm to update its parameters dynamically, typically modifying
    the mutation rate or crossover rate. This dynamic update of parameters often achieves
    better results than statically defined parameters which don’t adjust based on
    the algorithm’s state.


    Another optimization strategy we considered in this chapter is multi-heuristics.
    This strategy involves combining a genetic algorithm with another heuristic such
    as the simulated annealing algorithm. By combining search characters with another
    heuristic, it is possible to achieve performance improvements in situations where
    those characteristics are useful. The simulated annealing algorithm we looked
    at in this chapter is based on the annealing process found in metallurgy. When
    implemented in a genetic algorithm, it allows for large changes to occur in the
    genome initially, then gradually reduces the amount of change allowing the algorithm
    to focus on promising areas of the search space.


    One of the easiest ways to achieve a performance improvement is by optimizing
    the fitness function. The fitness function is typically the most computationally
    expensive component, making it ideal for optimization. It’s also important that
    the fitness function is well-defined and provides a good reflection of an individual’s
    actual fitness. If the fitness function gives a poor reflection of an individual’s
    performance, it can slow the search process and direct it towards poor areas of
    the search space.


    One easy way to optimize the fitness function is by supporting parallel processing.
    By processing multiple fitness functions at a time, it is possible to greatly
    reduce the amount of time the genetic algorithm spends evaluating individuals.


    Another tactic which can be used to reduce the amount of time needed to process
    the fitness function is fitness value hashing. Fitness value hashing uses a hash
    table to store fitness values for a number of recently used chromosomes. If those
    chromosomes appear again in the algorithm, it can recall the fitness value instead
    of recalculating it. This can prevent tedious reprocessing of individuals that
    have already been evaluated in the past.


    Finally, it can also be effective to consider if improving the genetic encoding
    or using a different mutation or crossover method could improve the evolution
    process. For example, using an encoding which poorly represents the encoded individual,
    or a mutation method which doesn’t generate the required diversity in the genome
    can cause stagnation of the algorithm and lead to poor solutions being produced.


