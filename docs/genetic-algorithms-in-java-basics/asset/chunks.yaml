    performance is the genetic representation used. This is the way the genetic information
    is encoded within the chromosomes. Better representations will encode the solution
    in a way that is expressive while also being easily evolvable. Holland’s (1975)
    genetic algorithm was based on a binary genetic representation. He proposed using
    chromosomes that were comprised of strings containing 0s and 1s. This binary representation
    is probably the simplest encoding available, however for many problems it isn’t
    quite expressive enough to be a suitable first choice. Consider the example in
    which a binary representation is used to encode an integer which is being optimized
    for use in some function. In this example, “000” represents 0, and “111” represents
    7, as it typically would in binary. If the first gene in the chromosome is mutated
    - by flipping the bit from 0 to 1, or from 1 to 0 - it would change the encoded
    value by 4 (“111” = 7, “011” = 3). However, if the final gene in the chromosome
    is changed it will only effect the encoded value by 1 (“111” = 7, “110” = 6).
    Here the mutation operator has a different effect on the candidate solution depending
    on which gene in its chromosome is being operated on. This disparity isn’t ideal
    as it will reduce performance and predictability of the algorithm. For this example,
    it would have been better to use an integer with a complimentary mutation operator
    which could add or subtract a relatively small amount to the gene’s value.


    Aside from simple binary representations and integers, genetic algorithms can
    use: floating point numbers, trees-based representations, objects, and any other
    data structure required for its genetic encoding. Picking the right representation
    is key when it comes to building an effective genetic algorithm.


    ## Termination


    Genetic algorithms can continue to evolve new candidate solutions for however
    long is necessary. Depending on the nature of the problem, a genetic algorithm
    could run for anywhere between a few seconds to many years! We call the condition
    in which a genetic algorithm finishes its search its termination condition.


    Some typical termination conditions would be:


    *   A maximum number of generations is reached

    *   Its allocated time limit has been exceeded

    *   A solution has been found that meets the required criteria

    *   The algorithm has reached a plateau


    Occasionally it might be preferable to implement multiple termination conditions.
    For example, it can be convenient to set a maximum time limit with the possibility
    of terminating earlier if an adequate solution is found.


    ## The Search Process


    To finish the chapter let’s take a step-by-step look at the basic process behind
    a genetic algorithm, illustrated in Figure [1-10](#A978-1-4842-0328-6_1_Chapter.html#Fig10).


    Genetic algorithms begin by initializing a population of candidate solutions.
    This is typically done randomly to provide an even coverage of the entire search
    space.   Next, the population is evaluated by assigning a fitness value to each
    individual in the population. In this stage we would often want to take note of
    the current fittest solution, and the average fitness of the population.   After
    evaluation, the algorithm decides whether it should terminate the search depending
    on the termination conditions set. Usually this will be because the algorithm
    has reached a fixed number of generations or an adequate solution has been found.
      If the termination condition is not met, the population goes through a selection
    stage in which individuals from the population are selected based on their fitness
    score – the higher the fitness, the better chance an individual has of being selected.
      The next stage is to apply crossover and mutation to the selected individuals.
    This stage is where new individuals are created for the next generation.   At
    this point the new population goes back to the evaluation step and the process
    starts again. We call each cycle of this loop a generation.   When the termination
    condition is finally met, the algorithm will break out of the loop and typically
    return its finial search results back to the user.  


    ![A978-1-4842-0328-6_1_Fig10_HTML.jpg](A978-1-4842-0328-6_1_Fig10_HTML.jpg)


    Figure 1-10.


    A general genetic algorithm process


    ## CITATIONS


