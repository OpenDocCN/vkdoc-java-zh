- fmt: "### Termination Check\n\nAs we have already learned, there is no way to know\
    \ if we have found an optimal solution to the traveling salesman problem unless\
    \ we try every possible solution. This means the termination check we use in this\
    \ implementation cannot terminate when the optimal solution has been found, because\
    \ it simply has no way of knowing.\n\nSeeing as we have no way to terminate when\
    \ the optimal solution has been found, we can simply allow the algorithm to run\
    \ for a set number of generations before finally terminating, and therefore we\
    \ are able to reuse the `isTerminationConditionMet` method in the `GeneticAlgorithm`\
    \ class from [Chapter 3](#A978-1-4842-0328-6_3_Chapter.html).\n\nNote, however,\
    \ that in situations like these—where the best solution can not be known—that\
    \ there are many sophisticated techniques for termination beyond simply setting\
    \ an upper bound on the number of generations.\n\nOne common technique is to measure\
    \ the improvement of the population’s fitness over time. If the population is\
    \ still improving rapidly, you may want to allow the algorithm to continue on.\
    \ Once the population stops improving, you can end the evolution and present the\
    \ best solution.\n\nYou may never find the globally optimum solution in a complex\
    \ solution space like the traveling salesman problem’s, but there are many strong\
    \ local optima, and a plateau in progress typically indicates that you’ve found\
    \ one of these local optima.\n\nThere are several ways you can measure the progress\
    \ of a genetic algorithm over time. The simplest method is to measure the number\
    \ of consecutive generations where there has been no improvement in the best individual.\
    \ If the number of generations with no improvement has crossed some threshold,\
    \ for instance 500 generations with no improvement, you can stop the algorithm.\n\
    \nOne drawback of this simple approach with large solution spaces is that you\
    \ may see constant improvement in the population’s fitness – it just may be painfully\
    \ slow! There are so many combinations that it’s feasible to get a one-point improvement\
    \ every dozen generations or so, and you’ll never actually encounter 500 consecutive\
    \ generations with no improvement. You could, of course, set a maximum upper bound\
    \ on generations irrespective of improvement. You could also implement a more\
    \ sophisticated technique, such as taking the moving average of various windows\
    \ and comparing them against each other. If the fitness improvement has been trending\
    \ downwards for several windows, stop the algorithm.\n\nIn our case, however,\
    \ we’ll stick with the naïve approach from [Chapter 3](#A978-1-4842-0328-6_3_Chapter.html),\
    \ and leave it up to the reader to implement a better termination condition as\
    \ an exercise at the end of the chapter.\n\n### Crossover\n\nWith the traveling\
    \ salesman problem, both the genes and the order of the genes in the chromosome\
    \ are very important. In fact, for the traveling salesman problem we shouldn’t\
    \ ever have more than one copy of a specific gene in our chromosome. This is because\
    \ it would create an invalid solution because a city shouldn’t be visited more\
    \ than once on a given route. Consider a case where we have three cities: City\
    \ A, City B and City C. A route of A,B,C is valid; however, a route of C,B,C is\
    \ not: this route visits City C twice, and also never visits City A. Because of\
    \ this, it’s essential that we find and apply a crossover method that produces\
    \ valid results for our problem.\n\nWe also need to be respectful of the ordering\
    \ of the parent’s chromosomes during the crossover process. This is because the\
    \ order of the chromosome affects the solution’s fitness. In fact, it’s only the\
    \ order that matters. To understand better why this is the case, consider how\
    \ these following two routes are completely different even though they contain\
    \ the exact same genes:\n\n`Route 1: A,B,C,D,E`\n\n`Route 2: C,A,D,B,E`\n\nWe\
    \ previously looked at uniform crossover; however, the uniform crossover method\
    \ works on the level of individual genes and doesn’t respect the order of the\
    \ chromosome. Single-point and two-point crossover methods do a better job as\
    \ they deal with chunks of the chromosome, which will preserve order within those\
    \ chunks. The problem with single-point and two-point crossover though, is that\
    \ they aren’t careful about which genes are being added and removed from the chromosome.\
    \ This means we are likely to end up with invalid solutions with chromosomes that\
    \ contain more than one reference for the same city or have cities missing altogether.\n\
    \nA crossover method, which addresses both these problems, is ordered crossover.\
    \ In this crossover method, a subset of the first parent’s chromosome is selected.\
    \ That subset is then added to the child chromosome in the same position.\n\n\
    ![A978-1-4842-0328-6_4_Figa_HTML.jpg](A978-1-4842-0328-6_4_Figa_HTML.jpg)\n\n\
    The next step is to add the second parent’s genetic information to the offspring’s\
    \ chromosome. We do this by starting from the end position of the selected subset,\
    \ and then include each gene from parent 2, which isn’t already in the offspring’s\
    \ chromosome.\n\nIn this example, we would start from the gene “2” checking if\
    \ it can be found in the offspring’s chromosome. Because 2 isn’t currently in\
    \ the offspring’s chromosome, we can add it to the first available position in\
    \ the offspring’s chromosome. Then, because we reached the end of parent 2’s chromosome,\
    \ we go back to the first gene, “5”. This time the 5 is in the offspring’s chromosome\
    \ so we skip it and move onto the 1. We keep doing this until we end up with the\
    \ following:\n\n![A978-1-4842-0328-6_4_Figb_HTML.jpg](A978-1-4842-0328-6_4_Figb_HTML.jpg)\n\
    \nThis method of crossover retains a lot of the order from the parents, but also\
    \ ensures solutions remain valid for problems such as the traveling salesman problem.\n\
    \nThere’s one aspect of this algorithm we can’t pull off with our current `Individual`\
    \ class: this technique requires checking the offspring’s chromosome for the existence\
    \ of a specific gene. In previous chapters, we didn’t have specific genes – we\
    \ had binary chromosomes – so there was no need to implement a method that checks\
    \ for the existence of a gene in a chromosome.\n\nFortunately, this is an easy\
    \ method to add. Open the `Individual` class and add a method called `containsGene`\
    \ anywhere in the file:\n\n```\npublic boolean containsGene(int gene) {\n    for\
    \ (int i = 0; i < this.chromosome.length; i++) {\n        if (this.chromosome[i]\
    \ == gene) {\n            return true;\n        }\n    }\n    return false;\n\
    }\n```\n\nThis method looks at each gene in the chromosome, and if it finds the\
    \ gene it’s looking for it will return `true`; otherwise it returns `false`. The\
    \ usage of this method addresses the question: “Does this solution visit City\
    \ #5? Let’s call `individual.containsGene(5)` to find out.”"
  raw: '### Termination Check


    As we have already learned, there is no way to know if we have found an optimal
    solution to the traveling salesman problem unless we try every possible solution.
    This means the termination check we use in this implementation cannot terminate
    when the optimal solution has been found, because it simply has no way of knowing.


    Seeing as we have no way to terminate when the optimal solution has been found,
    we can simply allow the algorithm to run for a set number of generations before
    finally terminating, and therefore we are able to reuse the isTerminationConditionMet
    method in the GeneticAlgorithm class from [Chapter 3](#A978-1-4842-0328-6_3_Chapter.html).


    Note, however, that in situations like these—where the best solution can not be
    known—that there are many sophisticated techniques for termination beyond simply
    setting an upper bound on the number of generations.


    One common technique is to measure the improvement of the population’s fitness
    over time. If the population is still improving rapidly, you may want to allow
    the algorithm to continue on. Once the population stops improving, you can end
    the evolution and present the best solution.


    You may never find the globally optimum solution in a complex solution space like
    the traveling salesman problem’s, but there are many strong local optima, and
    a plateau in progress typically indicates that you’ve found one of these local
    optima.


    There are several ways you can measure the progress of a genetic algorithm over
    time. The simplest method is to measure the number of consecutive generations
    where there has been no improvement in the best individual. If the number of generations
    with no improvement has crossed some threshold, for instance 500 generations with
    no improvement, you can stop the algorithm.


    One drawback of this simple approach with large solution spaces is that you may
    see constant improvement in the population’s fitness – it just may be painfully
    slow! There are so many combinations that it’s feasible to get a one-point improvement
    every dozen generations or so, and you’ll never actually encounter 500 consecutive
    generations with no improvement. You could, of course, set a maximum upper bound
    on generations irrespective of improvement. You could also implement a more sophisticated
    technique, such as taking the moving average of various windows and comparing
    them against each other. If the fitness improvement has been trending downwards
    for several windows, stop the algorithm.


    In our case, however, we’ll stick with the naïve approach from [Chapter 3](#A978-1-4842-0328-6_3_Chapter.html),
    and leave it up to the reader to implement a better termination condition as an
    exercise at the end of the chapter.


    ### Crossover


    With the traveling salesman problem, both the genes and the order of the genes
    in the chromosome are very important. In fact, for the traveling salesman problem
    we shouldn’t ever have more than one copy of a specific gene in our chromosome.
    This is because it would create an invalid solution because a city shouldn’t be
    visited more than once on a given route. Consider a case where we have three cities:
    City A, City B and City C. A route of A,B,C is valid; however, a route of C,B,C
    is not: this route visits City C twice, and also never visits City A. Because
    of this, it’s essential that we find and apply a crossover method that produces
    valid results for our problem.


    We also need to be respectful of the ordering of the parent’s chromosomes during
    the crossover process. This is because the order of the chromosome affects the
    solution’s fitness. In fact, it’s only the order that matters. To understand better
    why this is the case, consider how these following two routes are completely different
    even though they contain the exact same genes:


    `Route 1: A,B,C,D,E`


    `Route 2: C,A,D,B,E`


    We previously looked at uniform crossover; however, the uniform crossover method
    works on the level of individual genes and doesn’t respect the order of the chromosome.
    Single-point and two-point crossover methods do a better job as they deal with
    chunks of the chromosome, which will preserve order within those chunks. The problem
    with single-point and two-point crossover though, is that they aren’t careful
    about which genes are being added and removed from the chromosome. This means
    we are likely to end up with invalid solutions with chromosomes that contain more
    than one reference for the same city or have cities missing altogether.


    A crossover method, which addresses both these problems, is ordered crossover.
    In this crossover method, a subset of the first parent’s chromosome is selected.
    That subset is then added to the child chromosome in the same position.


    ![A978-1-4842-0328-6_4_Figa_HTML.jpg](A978-1-4842-0328-6_4_Figa_HTML.jpg)


    The next step is to add the second parent’s genetic information to the offspring’s
    chromosome. We do this by starting from the end position of the selected subset,
    and then include each gene from parent 2, which isn’t already in the offspring’s
    chromosome.


    In this example, we would start from the gene “2” checking if it can be found
    in the offspring’s chromosome. Because 2 isn’t currently in the offspring’s chromosome,
    we can add it to the first available position in the offspring’s chromosome. Then,
    because we reached the end of parent 2’s chromosome, we go back to the first gene,
    “5”. This time the 5 is in the offspring’s chromosome so we skip it and move onto
    the 1\. We keep doing this until we end up with the following:


    ![A978-1-4842-0328-6_4_Figb_HTML.jpg](A978-1-4842-0328-6_4_Figb_HTML.jpg)


    This method of crossover retains a lot of the order from the parents, but also
    ensures solutions remain valid for problems such as the traveling salesman problem.


    There’s one aspect of this algorithm we can’t pull off with our current Individual
    class: this technique requires checking the offspring’s chromosome for the existence
    of a specific gene. In previous chapters, we didn’t have specific genes – we had
    binary chromosomes – so there was no need to implement a method that checks for
    the existence of a gene in a chromosome.


    Fortunately, this is an easy method to add. Open the Individual class and add
    a method called “containsGene” anywhere in the file:


    `public boolean containsGene(int gene) {`


    `for (int i = 0; i < this.chromosome.length; i++) {`


    `if (this.chromosome[i] == gene) {`


    `return true;`


    `}`


    `}`


    `return false;`


    `}`


    This method looks at each gene in the chromosome, and if it finds the gene it’s
    looking for it will return true; otherwise it returns false. The usage of this
    method addresses the question: “Does this solution visit City #5? Let’s call individual.containsGene(5)
    to find out.”'
  trans: '

    ### 终止检查


    正如我们已经了解到的，除非尝试每一种可能的解，否则无法知道是否找到了旅行商问题的最优解。这意味着我们在此实现中使用的终止检查无法在找到最优解时终止，因为它根本无法判断。


    既然我们无法在找到最优解时终止，我们可以简单地让算法在运行指定代数后终止，因此我们可以复用第 3 章中`GeneticAlgorithm`类的`isTerminationConditionMet`方法。


    但请注意，在像这样无法得知最优解的情况下，除了简单地为代数设置上限外，还有许多复杂的终止技术。


    一种常见的技术是衡量种群适应度随时间的变化。如果种群仍在快速改进，你可能希望让算法继续运行。一旦种群停止改进，你就可以结束进化并呈现最佳解。


    在像旅行商问题这样复杂的解空间中，你可能永远找不到全局最优解，但存在许多强大的局部最优解，而进展停滞通常表明你已经找到了其中一个局部最优解。


    有几种方法可以衡量遗传算法随时间的进展。最简单的方法是测量最佳个体没有改进的连续代数。如果无改进的代数超过了某个阈值，例如连续 500 代无改进，你就可以停止算法。


    这种简单方法在大型解空间中的一个缺点是，你可能会看到种群适应度持续改进——只是改进速度慢得令人痛苦！组合数量如此之多，以至于每十几代左右获得一个点的改进是可行的，而你实际上永远不会遇到连续
    500 代无改进的情况。当然，你可以不考虑改进情况而设置一个最大代数上限。你也可以实现更复杂的技术，例如计算多个窗口的移动平均值并进行相互比较。如果适应度改进在多个窗口中呈下降趋势，就停止算法。


    但在我们的案例中，我们将沿用第 3 章中的简单方法，并将实现更好终止条件的任务留给读者作为本章末尾的练习。


    ### 交叉


    在旅行商问题中，基因以及基因在染色体中的顺序都非常重要。事实上，对于旅行商问题，我们的染色体中不应该有超过一个特定基因的副本。这是因为这会产生无效解，因为一条给定路线不应多次访问同一个城市。考虑一个有三座城市的情况：城市
    A、城市 B 和城市 C。路线 A、B、C 是有效的；然而，路线 C、B、C 是无效的：这条路线访问了城市 C 两次，并且从未访问城市 A。因此，找到并应用一种能为我们的问题产生有效结果的交叉方法至关重要。


    在交叉过程中，我们还需要尊重父代染色体的顺序。这是因为染色体的顺序会影响解的适应度。事实上，只有顺序才是重要的。为了更好地理解这一点，请考虑以下两条路线虽然包含完全相同的基因，但为何完全不同：


    `路线 1: A,B,C,D,E`


    `路线 2: C,A,D,B,E`


    我们之前研究过均匀交叉；然而，均匀交叉方法作用于单个基因层面，并不尊重染色体的顺序。单点交叉和两点交叉方法做得更好，因为它们处理的是染色体片段，这将在这些片段内保留顺序。但单点交叉和两点交叉的问题在于，它们没有注意哪些基因被添加或移除了染色体。这意味着我们很可能会得到无效解，其染色体包含对同一城市的多个引用，或者完全缺少某些城市。


    一种同时解决这两个问题的交叉方法是有序交叉。在这种交叉方法中，会从第一个父代染色体中选择一个子集。然后将该子集以相同位置添加到子代染色体中。


    ![A978-1-4842-0328-6_4_Figa_HTML.jpg](img/A978-1-4842-0328-6_4_Figa_HTML.jpg)


    下一步是将第二个父代的遗传信息添加到子代染色体中。我们通过从所选子集的结束位置开始，然后依次包含父代 2 中尚未出现在子代染色体中的每个基因来实现。


    在这个例子中，我们将从基因“2”开始，检查它是否能在子代染色体中找到。因为 2 当前不在子代染色体中，我们可以将其添加到子代染色体的第一个可用位置。然后，由于我们到达了父代
    2 染色体的末尾，我们回到第一个基因“5”。这次 5 在子代染色体中，所以我们跳过它，继续处理 1。我们一直这样做，直到得到以下结果：


    ![A978-1-4842-0328-6_4_Figb_HTML.jpg](img/A978-1-4842-0328-6_4_Figb_HTML.jpg)


    这种交叉方法保留了父代的大量顺序，同时也确保了解对于旅行商问题等问题保持有效。


    我们当前的`Individual`类无法实现该算法的一个方面：这种技术需要检查子代染色体中是否存在特定基因。在之前的章节中，我们没有特定的基因——我们有二进制染色体——因此无需实现检查染色体中是否存在基因的方法。


    幸运的是，这是一个容易添加的方法。打开`Individual`类，在文件中的任意位置添加一个名为`containsGene`的方法：


