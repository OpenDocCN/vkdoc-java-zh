- fmt: '# Summary


    Genetic algorithms can be used to design sophisticated controllers, which may
    be difficult or time consuming for a human to do manually. The robot controller
    is evaluated by the fitness function, which will often simulate the robot and
    its environment to save time by not needing to physically test the robot.


    By giving the robot a maze and a preferred route, a genetic algorithm can be applied
    to find a controller that can use the robot’s sensors to successfully navigate
    the maze. This can be done by assigning each sensor an action in the individual’s
    chromosome encoding. By making small random changes with crossover and mutation,
    guided by the selection process, better controllers are gradually found.


    `Tournament selection` is one of the more popular selection methods used in genetic
    algorithms. It works by picking a pre-decided number of individuals from the population
    at random, then comparing the chosen individual’s fitness values to find the best.
    The individual with the highest fitness value “wins” the tournament, and is then
    returned as the selected individual. Larger tournament sizes lead to high selection
    pressure, which needs to be carefully considered when picking an optimal tournament
    size.


    When an individual has been selected, it will undergo crossover; one of the crossover
    methods that could be used is single point crossover. In this crossover method,
    a single point in the chromosome is picked at random, then any genetic information
    before that point comes from parent A, and any genetic information after that
    point comes from parent B. This leads to a reasonably random mix of parent’s genetic
    information, however often the improved two-point crossover method is used instead.
    In two-point crossover, a start and end point are picked which are used instead
    to select the genetic information that comes from parent A and the remaining genetic
    information then comes from parent B.


    ### Exercises


    Add a second termination condition that terminates the algorithm when the route
    has been fully explored. Run the algorithm with different tournament sizes. Study
    how the performance is affected. Add a selection probability to the tournament
    selection method. Test with different probability settings. Examine how it affects
    the genetic algorithm’s performance. Implement two-point crossover. Does it improve
    the results?


    # Traveling Salesman


    ## Introduction


    In this chapter, we are going to explore the traveling salesman problem and how
    it can be solved using a genetic algorithm. In doing so, we will be looking at
    the properties of the traveling salesman problem and how we can use those properties
    to design the genetic algorithm.


    The traveling salesman problem (TSP) is a classic optimization problem, studied
    as far back as the 1800s. The traveling salesman problem involves finding the
    most efficient route through a collection of cities, visiting each city exactly
    once.


    The traveling salesman problem is often described in terms of optimizing a route
    through a collection of cities; however, the traveling salesman problem can be
    applied to other applications. For example, the notion of cities can be thought
    of as customers for certain applications, or even as soldering points on a microchip.
    The idea of distance can also be revised to consider other constraints such as
    time.


    In its simplest form, cities can be represented as nodes on a graph, with the
    distance between each city represented by the length of the edges (see Figure
    [4-1](#A978-1-4842-0328-6_4_Chapter.html#Fig1)). A “route” or a “tour”, simply
    defines which edges should be used, and in what order. The route’s score can then
    be calculated by summing the edges used in the route.


    ![A978-1-4842-0328-6_4_Fig1_HTML.jpg](A978-1-4842-0328-6_4_Fig1_HTML.jpg)


    Figure 4-1. Our graph showing the cities and the respective distances between
    them


    During the 1900s, the traveling salesman problem was studied by many mathematicians
    and scientists; however to this day the problem remains unsolved. The only guaranteed
    method to produce an optimal solution for the traveling salesman problem is by
    using a brute force algorithm. A brute force algorithm is an algorithm designed
    to systematically try every possible solution. Then you find the optimal solution
    from the complete set of candidate solutions. Attempting solving the traveling
    salesman problem with a brute force algorithm is an extremely hard task because
    the number of potential solutions experiences factorial growth as the number of
    cities is increased. Factorial functions grow even faster than exponential functions,
    which is why it’s so hard to brute force the traveling salesman problem. For example,
    for 5 cities, there are 120 possible solutions (1x2x3x4x5), and for 10 cities
    that number will have increased to 3,628,800 solutions! By 15 cities, there are
    over a trillion solutions. At 60 cities, there are more possible solutions than
    there are atoms in the observable universe.


    Brute force algorithms can be used to find optimal solutions when there are only
    a few cities but they become more and more challenging as the number of cities
    increase. Even when techniques are applied to remove reverse and identical routes,
    it still becomes quickly infeasible to find an optimal solution in a reasonable
    amount of time.


    In reality, we know that finding an optimal solution usually isn’t necessary because
    a good enough solution will typically be all that’s required. There are a number
    of different algorithms that can quickly find solutions that are likely to be
    within only a couple of percent of optimal. One of the more commonly used algorithms
    is the nearest neighbor algorithm. With this algorithm, a starting city is picked
    at random. Then, the next nearest unvisited city is found and picked as the second
    city in the route. This process of picking the next nearest the unvisited city
    is continued until all cities have been visited and a complete route has been
    found. The nearest neighbor algorithm has been shown to be surprisingly effective
    at producing reasonable solutions that score within a fraction the optimal solution.
    Better still, this can be done in a very short time frame. These characteristics
    make it an attractive solution in many situations, and a possible alternative
    to genetic algorithms.


    ## The Problem


    The problem we will be tackling in this implementation is a typical traveling
    salesman problem in which we need to optimize a route through a collection of
    cities. We can generate a number of random cities in 2D space by setting each
    city to a random `x`, `y` position.


    When finding the distance between two cities we will simply use the shortest length
    between the cities as the distance. We can calculate this distance with the following
    equation:


    ![$$ Dis \tan ce=\sqrt{{\left({x}_a-{x}_b\right)}^2+{\left({y}_a-{y}_b\right)}^2}
    $$](A978-1-4842-0328-6_4_Chapter_TeX2GIF_Equa.gif)


    Often, the problem will be more complex than this. In this example we are assuming
    a direct ideal path exists between each city; this is also known as the “Euclidean
    distance”. This usually isn’t going to be a typical case as there could be various
    obstacles making the actual shortest path much longer than the Euclidean distance.
    We are also assuming that traveling from City-A to City-B takes just as long as
    traveling from City-B to City-A. Again, in reality this is rarely the case. Often
    there will be obstacles such as one-way roads that will affect the distance between
    cities while traveling in a certain direction. An implementation of the traveling
    salesman problem where the distance between the cities changes depending on the
    direction is called an asymmetric traveling salesman problem.


    ## Implementation


    It is time to go ahead and tackle the problem using our knowledge of genetic algorithms.
    After setting up a new Java/Eclipse package for this problem, we’ll begin by encode
    the route.'
