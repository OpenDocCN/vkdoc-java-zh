    近年来，机器学习领域的人气急剧增长。当然，原因有很多，但处理能力的稳步提升、RAM 和存储空间成本的持续下降，以及按需云计算的兴起，无疑是重要的推动因素。


    然而，这些因素只是促成了机器学习的兴起，并不能解释其根本原因。机器学习究竟有何魅力？机器学习就像一座冰山；其尖端是由计算机视觉、语音识别、生物信息学、医学研究，甚至能赢得《危险边缘！》比赛的计算机（IBM
    的 Watson）等新颖且激动人心的研究领域构成的。这些领域不容轻视或低估；它们在未来几年必将成为巨大的市场驱动力。


    然而，冰山还有很大一部分位于水下，这部分已经足够成熟，可以在今天为我们所用——尽管很少见到年轻工程师声称“商业智能”是他们学习该领域的动力。机器学习——是的，当今的机器学习——让企业能够从复杂的客户行为中学习。机器学习帮助我们理解股票市场、天气模式、拥挤音乐会场地的人群行为，甚至可以用来预测下一次流感爆发的地点。


    事实上，随着处理资源变得越来越廉价，很难想象未来机器学习不会在大多数企业的客户渠道、运营、生产和增长战略中扮演核心角色。


    然而，存在一个问题。机器学习是一个复杂且困难的领域，中途放弃率很高。培养专业知识需要时间和精力。我们面临一项艰巨但重要的任务：为了跟上该领域专家日益增长的需求，我们需要让机器学习更易于入门。到目前为止，我们落后于需求。麦肯锡公司
    2011 年的“大数据白皮书”估计，到 2018 年，机器学习领域的人才需求将比供给高出 50-60%！虽然这让现有的机器学习专家在未来几年处于有利地位，但也阻碍了我们近期实现机器学习全部潜力的能力。

