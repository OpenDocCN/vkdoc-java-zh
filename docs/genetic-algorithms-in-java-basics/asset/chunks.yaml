    The final code for the TSP class should look like this:


    `package chapter4;`


    `public class TSP {`


    `public static int maxGenerations = 3000;`


    `public static void main(String[] args) {`


    `// Create cities`


    `int numCities = 100;`


    `City cities[] = new City[numCities];`


    `// Loop to create random cities`


    `for (int cityIndex = 0; cityIndex < numCities; cityIndex++) {`


    `// Generate x,y position`


    `int xPos = (int) (100 * Math.random());`


    `int yPos = (int) (100 * Math.random());`


    `// Add city`


    `cities[cityIndex] = new City(xPos, yPos);`


    `}`


    `// Initial GA`


    `GeneticAlgorithm ga = new GeneticAlgorithm(100, 0.001, 0.9, 2, 5);`


    `// Initialize population`


    `Population population = ga.initPopulation(cities.length);`


    `// Evaluate population`


    `//ga.evalPopulation(population, cities);`


    `Route startRoute = new Route(population.getFittest(0), cities);`


    `System.out.println("Start Distance: " + startRoute.getDistance());`


    `// Keep track of current generation`


    `int generation = 1;`


    `// Start evolution loop`


    `while (ga.isTerminationConditionMet(generation, maxGenerations) == false) {`


    `// Print fittest individual from population`


    `Route route = new Route(population.getFittest(0), cities);`


    `System.out.println("G"+generation+" Best distance: " + route.getDistance());`


    `// Apply crossover`


    `population = ga.crossoverPopulation(population);`


    `// Apply mutation`


    `population = ga.mutatePopulation(population);`


    `// Evaluate population`


    `ga.evalPopulation(population, cities);`


    `// Increment the current generation`


    `generation++;`


    `}`


    `System.out.println("Stopped after " + maxGenerations + " generations.");`


    `Route route = new Route(population.getFittest(0), cities);`


    `System.out.println("Best distance: " + route.getDistance());`


    `}`


    `}`


    Additionally, check your GeneticAlgorithm class against the following properties
    and method signatures. If you missed implementing one of these methods, or one
    of your method signatures doesn’t match, please go back and resolve the issue
    now.


    `package chapter4;`


    `import java.util.Arrays;`


    `public class GeneticAlgorithm {`


    `private int populationSize;`


    `private double mutationRate;`


    `private double crossoverRate;`


    `private int elitismCount;`


    `protected int tournamentSize;`


    `public GeneticAlgorithm(int populationSize, double mutationRate, double crossoverRate,
    int elitismCount, int tournamentSize) { }`


    `public Population initPopulation(int chromosomeLength){ }`


    `public boolean isTerminationConditionMet(int generationsCount, int maxGenerations)
    { }`


    `public double calcFitness(Individual individual, City cities[]) { }`


    `public void evalPopulation(Population population, City cities[]) { }`


    `public Individual selectParent(Population population) { }`


    `public Population crossoverPopulation(Population population) { }`


    `public Population mutatePopulation(Population population) { }`


    `}`


    Finally, make sure you’ve updated the Individual class by replacing the constructor
    and adding the containsGene method.


    At this point, click “Run” and observe the output. As usual, remind yourself that
    genetic algorithms are stochastic processes dictated by statistics, and that you
    can’t make any conclusions based on just one trial. Unfortunately, the fact that
    this problem initializes a random set of cities means that each run of the program
    will have a different optimal solution; this makes experimenting with the genetic
    algorithm parameters and judging their performance difficult. The first exercise
    at the end of the chapter is to hard-code a list of cities so that you can accurately
    benchmark the algorithm’s performance.


    However, there are a few interesting observations you can make at this point.
    Run the algorithm a number of times and observe the best distance. Are they all
    similar? At least in the same ballpark? This is interesting, because each run
    uses a different set of cities. But upon reflection, it makes sense: while the
    cities are in different locations each time, there are still 100 of them every
    time, and they’re still placed randomly on a 100x100 map, which means that we
    can estimate pretty easily the problem solution’s total distance.


    Consider a 100x100 map – which has an area of 10,000 units – but instead of visiting
    100 cities, your goal is to visit 10,000 cities. If the cities are placed evenly
    on the map (one on each grid point), the best solution should be a distance of
    exactly 10,100 (visiting every tile on the map in a zigzag). If, instead of evenly
    distributing the cities, you were to randomly distribute those 10,000 cities,
    the best solution would be a statistical distribution centering at 10,000, varying
    slightly from run to run due to the randomness of the placement.


    Now we can work backward and consider fewer cities; place only 25 cities evenly
    on the map and the shortest route is 600 units. The relationship here becomes
    clear: the distance is related to the square root of the map’s area times the
    square root of the number of cities. Using this relationship we find that 100
    cities placed evenly has a minimum distance of 1,100 (that’s ![$$ \surd (map)*\surd
    (numCities)+\surd (map) $$](A978-1-4842-0328-6_4_Chapter_TeX2GIF_IEq1.gif); the
    added square root term at the end accounts for the north-south travel, but we
    can drop that term when we start speaking statistically). If we place those same
    100 cities randomly on our map, we can expect the minimum distance to be a distribution
    centering around 1,000\. Similarly, 1,000 cities should have a best distance near
    3,100.


    If you play with the number of cities, you’ll find that the algorithm easily confirms
    these suspicions for smaller numbers, but naturally, it has difficulty finding
    the minimum for more than 100 cities.


    Now that we understand the relationship between the map size, the number of cities,
    and the expected best distance, we can experiment even without a constant set
    of cities and use our statistical expectations instead. One area of particular
    interest is the effect of mutation on the result quality.


    If you imagine the solution space as a landscape of lots of rolling hills, a genetic
    algorithm is like dropping 100 people with different behaviors at random locations
    on the landscape and seeing which individual finds the lowest valley. (In this
    case, because our Individual constructor isn’t random, we’re actually dropping
    all individuals on the same spot.) Through the generations, individuals and their
    offspring will move downhill and then stop when they’ve found the lowest valley
    near them. Mutation, however, picks them up and drops them into a new random location
    – the location may be better or worse than the previous one, but at least it’s
    a new, unique location that allows them to continue their search in a fresh landscape.


    Mutation, however, can often have short-term detriments. Mutations can be either
    favorable or unfavorable – which is why we use elitism to protect the best individuals
    from mutation. However, the diversity that mutation introduces can have profound
    long-term effects, by placing an individual on a landscape that may otherwise
    not be explored: imagine a tall volcano with a huge chasm in the middle that contains
    the lowest point in the landscape (the global optimum, surrounded by unfavorable
    landscape). It’s unlikely that any population would climb the volcano and find
    the global optimum at the center – unless a random mutation placed an individual
    on the lip of the volcano.


    With that being said, observe the effects of different mutation rates and elitism
    counts on long-running (tens of thousands of generations) difficult problems (200
    cities or more). Does mutation help or hurt? Does elitism help or hurt?'
