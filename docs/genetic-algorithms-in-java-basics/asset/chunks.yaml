    The field of machine learning has grown immensely in popularity in recent years.
    There are, of course, many reasons for this, but the steady advancement of processing
    power, steadily falling costs of RAM and storage space, and the rise of on-demand
    cloud computing are certainly significant contributors.


    But those factors only enabled the rise of machine learning; they don’t explain
    it. What is it about machine learning that’s so compelling? Machine learning is
    like an iceberg; the tip is made of novel and exciting areas of research like
    computer vision, speech recognition, bioinformatics, medical research, and even
    computers that can win a game of Jeopardy! (IBM’s Watson). These fields are not
    to be downplayed or understated; they will absolutely become huge market drivers
    in years to come.


    However, there is a large underwater portion of the iceberg that is mature enough
    to be useful to us today -- though it’s rare to see young engineers claiming "business
    intelligence" as their motivation for studying the field. Machine learning--yes,
    machine learning as it stands today--lets businesses learn from complex customer
    behavior. Machine learning helps us understand the stock market, weather patterns,
    crowd behavior at crowded concert venues, and can even be used to predict where
    the next flu breakout will be.


    In fact, as processing resources become ever cheaper, it’s hard to imagine a future
    where machine learning doesn’t play a central role in most businesses'' customer
    pipeline, operations, production, and growth strategies.


    There is, however, a problem. Machine learning is a complex and difficult field
    with a high dropout rate. It takes time and effort to develop expertise. We’re
    faced with a difficult but important task: we need to make machine learning more
    accessible in order to keep up with growing demand for experts in the field. So
    far, we’re behind the curve. McKinsey &; Company’s 2011 "Big Data Whitepaper"
    estimated that demand for talent in machine learning will be 50-60% greater than
    its supply by the year 2018! While this puts existing machine learning experts
    in a great position for the next several years, it also hinders our ability to
    realize the full effects of machine learning in the near future.'
