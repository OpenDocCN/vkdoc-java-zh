  trans: '

    ## 摘要


    旅行商问题是一个经典的优化问题，其核心是：在给定一系列城市的情况下，找到一条最短的可能路线，要求每个城市只访问一次，并最终返回起点城市。


    这是一个尚未解决的优化问题，目前只有通过暴力算法才能找到最优解。然而，由于旅行商问题中可能解的数量会随着城市数量的增加而急剧增长，即使使用最强大的计算机，暴力求解也很快变得不可行。在这种情况下，通常会采用启发式方法来寻找一个良好的近似解。


    我们实现了一个基于二维图形上城市的基本旅行商问题，并通过直线距离将它们连接起来。


    通过使用有序的城市 ID 列表作为染色体的编码，我们能够表示旅行商问题的一个解。但是，由于每个城市 ID 必须在编码中至少出现一次，且只能出现一次，我们研究了两种能够满足这一约束的新交叉和变异方法：有序交叉和交换变异。


    在有序交叉中，父本 1 染色体中的一个随机子集被添加到子代中，然后，子代中所需的剩余遗传信息按照其在父本 2 染色体中出现的顺序进行添加。这种先添加父本 1
    的部分遗传信息，再仅从父本 2 添加缺失遗传信息的方法，保证了每个城市 ID 在解中只会出现一次。


    在交换变异中，选择两个基因并交换它们的位置。同样，这种变异方法保证了旅行商问题解的有效性，因为它既不会完全移除某个城市 ID，也不会导致某个城市出现两次。


    ### 练习


    *   将城市硬编码到 TSP 类的“main”方法中，以便能够准确地测量性能基准。

    *   添加对最短路线和最快路线的支持，使用用户定义的城市间距离和时间。

    *   添加对非对称 TSP 的支持（从 A 到 B 的代价可能不等于从 B 到 A 的代价）。

    *   修改 Individual 类的构造函数，以随机化城市的顺序。这会对算法性能产生什么影响？

    *   更新终止条件，以衡量算法的进展，并在没有取得显著进展时退出。这对算法的性能和结果有何影响？


    # 课程排课


    ## 引言


    在本章中，我们将创建一个遗传算法，用于为大学课程表排课。我们将探讨课程排课算法可能应用的几种不同场景，以及设计课程表时通常需要满足的约束条件。最后，我们将构建一个简单的课程排课器，它可以扩展以支持更复杂的实现。


    在人工智能领域，课程排课是约束满足问题的一个变体。这类问题涉及一组变量，需要以不违反一组既定约束的方式进行分配。


    约束分为两类：硬约束——必须满足才能产生可行解的约束；以及软约束——优先考虑但不能以牺牲硬约束为代价的约束。


    例如，在制造新产品时，产品的功能需求是硬约束，它规定了重要的性能要求。没有这些约束，产品就不复存在。一部不能打电话的手机几乎不能称之为手机！然而，也可能存在软约束，虽然并非必需，但同样值得考虑，例如产品的成本、重量或美观性。


    在创建课程排课算法时，通常需要考虑许多硬约束和软约束。课程排课问题的一些典型硬约束包括：


    *   一位教授在任何给定时间只能上一节课

    *   教室必须足够大以容纳上课的学生

    *   任何给定时间，一个教室只能上一节课

    *   教室必须配备所有必需的设备


    一些典型的软约束可能包括：


    *   教室容量应与班级规模相匹配

    *   教授偏好的教室

    *   教授偏好的上课时间


    有时，多个软约束可能会相互冲突，需要在它们之间找到权衡。例如，一个班级可能只有 10 名学生，因此一个软约束可能会奖励分配一个容量约为 10 人的合适教室；然而，授课教授可能更喜欢一个能容纳
    30 人的大教室。如果教授的偏好被作为软约束考虑，课程排课器将有望找到其中一种更受偏好的配置。


    在更高级的实现中，还可以对软约束进行加权，以便算法了解哪些软约束是最重要的。


    与旅行商问题类似，可以使用迭代方法来寻找课程排课问题的最优解；然而，随着课程配置数量的增加，找到最优解变得越来越困难。在这种情况下，当可能的课程配置数量超出迭代方法可行求解的范围时，遗传算法是一个很好的替代方案。虽然不能保证找到最优解，但它们非常擅长在合理的时间范围内找到接近最优的解。


    ## 问题


    本章将要研究的课程排课问题是一个大学课程排课器，它可以根据我们提供的数据（例如可用的教授、可用的教室、时间段和学生群体）来创建大学课程表。


    需要注意的是，构建大学课程表与构建中小学课程表略有不同。中小学课程表要求学生全天都有排满的课程，没有空闲时段。相反，典型的大学课程表通常会根据学生注册的模块数量而出现空闲时段。


    课程排课器将为每节课分配一个时间段、一位教授、一个教室和一个学生群体。我们可以通过将学生群体的数量乘以每个学生群体注册的模块数量来计算需要排课的总课程数。


    对于我们的应用程序排出的每节课，我们将考虑以下硬约束：


    *   课程只能安排在空闲的教室

    *   一位教授一次只能教一节课

    *   教室必须足够大以容纳学生群体


    为了在本实现中保持简单，我们目前只考虑硬约束；然而，根据课程表的具体要求，通常还会有更多硬约束。规范中很可能还会包含一些软约束，我们现在暂时忽略它们。虽然并非必需，但考虑软约束通常会对遗传算法生成的课程表质量产生重大影响。


    ## 实现


    是时候利用我们对遗传算法的知识来着手解决这个问题了。为此问题设置一个新的 Java/Eclipse 包后，我们将从编码染色体开始。

