  trans: '

    ### 术语


    在深入探讨遗传算法领域之前，我们首先理解一些基本语言和术语非常重要。随着本书内容的推进，更复杂的术语将根据需要逐步引入。以下是一些常见术语的参考列表。


    *   **种群** – 这仅仅是一组候选解的集合，可以对它们应用诸如变异和交叉等遗传算子。

    *   **候选解** – 针对给定问题的一个可能解决方案。

    *   **基因** – 构成染色体的不可分割的构建块。经典情况下，一个基因由 0 或 1 组成。

    *   **染色体** – 染色体是一串基因。染色体定义了一个特定的候选解。一个采用二进制编码的典型染色体可能包含类似“01101011”的内容。

    *   **变异** – 随机改变候选解中基因以创造新特征的过程。

    *   **交叉** – 将染色体组合以创造新候选解的过程。这有时也被称为重组。

    *   **选择** – 挑选候选解以繁殖下一代解的技术。

    *   **适应度** – 衡量候选解适应给定问题程度的分数。


    ## 搜索空间


    在计算机科学中，当处理具有许多需要搜索的候选解的优化问题时，我们将这些解的集合称为“搜索空间”。搜索空间内的每个特定点都作为给定问题的一个候选解。在这个搜索空间内存在一个距离的概念，其中彼此距离较近的解比距离较远的解更有可能表现出相似的特征。为了理解这些距离在搜索空间上是如何组织的，请考虑以下使用二进制遗传表示的示例：


    “101”与“111”仅相差 1。这是因为从“101”转换到“111”只需要改变一次（将 0 翻转为 1）。这意味着这些解在搜索空间上仅相隔 1 个位置。


    另一方面，“000”与“111”相差 3。这使得它的距离为 3，将“000”与“111”在搜索空间上相隔 3 个位置。


    由于变化较少的解彼此聚集得更近，因此搜索空间上解之间的距离可用于近似估计另一个解所具有的特征。这种理解常被许多搜索算法用作策略，以改进其搜索结果。


    ### 适应度景观


    当搜索空间内的候选解根据其各自的适应度水平被标记时，我们就可以开始将搜索空间视为一个“适应度景观”。图 1-1 展示了一个二维适应度景观可能的样子。


    ![A978-1-4842-0328-6_1_Fig1_HTML.jpg](img/A978-1-4842-0328-6_1_Fig1_HTML.jpg)


    图 1-1.


    一个二维适应度景观


    在我们适应度景观的底部坐标轴上是我们要优化的值，左侧坐标轴上是其对应的适应度值。我应该指出，这通常是对实际情况的过度简化。大多数现实世界的应用都有多个需要优化的值，从而形成一个多维的适应度景观。


    在上面的例子中，可以看到搜索空间中每个候选解的适应度值。这使得很容易看出最优解位于何处，然而，要在现实中实现这一点，搜索空间中的每个候选解都需要评估其适应度函数。对于具有指数级搜索空间的复杂问题，评估每个解的适应度值是不可行的。在这些情况下，搜索算法的工作就是在只能看到搜索空间极小一部分的情况下，找到最佳解可能所在的位置。图
    1-2 是一个搜索算法通常可能看到的示例。


    ![A978-1-4842-0328-6_1_Fig2_HTML.jpg](img/A978-1-4842-0328-6_1_Fig2_HTML.jpg)


    图 1-2.


    一个更典型的搜索适应度空间


    考虑一个正在搜索包含十亿（1,000,000,000）个可能解的搜索空间的算法。即使每个解只需要 1 秒来评估并分配一个适应度值，明确搜索每个潜在解仍然需要超过
    30 年！如果我们不知道搜索空间中每个解的适应度值，那么我们就无法确切知道最佳解位于何处。在这种情况下，唯一合理的方法是使用一种能够在可用时间范围内找到足够好解的搜索算法。在这些条件下，遗传算法和进化算法通常非常擅长在相对较短的时间内找到可行的、接近最优的解。


    遗传算法在搜索搜索空间时采用种群方法。作为其搜索策略的一部分，遗传算法会假设两个排名靠前的解可以组合起来形成一个适应度更高的后代。这个过程可以在我们的适应度景观上可视化（图
    1-3）。


    ![A978-1-4842-0328-6_1_Fig3_HTML.jpg](img/A978-1-4842-0328-6_1_Fig3_HTML.jpg)


    图 1-3.


    适应度图中的父代与子代


    遗传算法中的变异算子允许我们搜索特定候选解的近邻。当对一个基因应用变异时，其值会被随机改变。这可以想象为在搜索空间上迈出一步（图 1-4）。


    ![A978-1-4842-0328-6_1_Fig4_HTML.jpg](img/A978-1-4842-0328-6_1_Fig4_HTML.jpg)


    图 1-4.


    展示变异的适应度图


    在交叉和变异这两个例子中，最终得到的解有可能比我们最初拥有的解适应度更低（图 1-5）。


    ![A978-1-4842-0328-6_1_Fig5_HTML.jpg](img/A978-1-4842-0328-6_1_Fig5_HTML.jpg)


    图 1-5.


    一个适应度较差的解


    在这些情况下，如果该解的表现足够差，它最终会在选择过程中被从基因库中移除。只要种群的平均趋势是朝向适应度更高的解，单个候选解中微小的负面变化是可以接受的。

    '
- fmt: '### Local Optimums


    An obstacle that should be considered when implementing an optimization algorithm
    is how well the algorithm can escape from locally optimal positions in the search
    space. To better visualize what a local optimum is, refer to Figure [1-6](#A978-1-4842-0328-6_1_Chapter.html#Fig6).


    ![A978-1-4842-0328-6_1_Fig6_HTML.jpg](A978-1-4842-0328-6_1_Fig6_HTML.jpg)


    Figure 1-6. A local optimum can be deceiving


    Here we can see two hills on the fitness landscape which have peaks of slightly
    different heights. As mentioned earlier, the optimization algorithm isn’t able
    to see the entire fitness landscape, and instead, the best it can do is find solutions
    which it believes are likely to be in an optimal position on the search space.
    It’s because of this characteristic the optimization algorithm can often unknowingly
    focus its search on suboptimal portions of the search space.


    This problem becomes quickly noticeable when implementing a simple hill climbing
    algorithm to solve problems of any sufficient complexity. A simple hill climber
    doesn’t have any inherent method to deal with local optimums, and as a result
    will often terminate its search in locally optimal regions of the search space.
    A simple stochastic hill climber is comparable to a genetic algorithm without
    a population and crossover. The algorithm is fairly easy to understand, it starts
    off at a random point in the search space, then attempts to find a better solution
    by evaluating its neighbor solutions. When the hill climber finds a better solution
    amongst its neighbors, it will move to the new position and restart the search
    process again. This process will gradually find improved solutions by taking steps
    up whatever hill it found itself on in the search space – hence the name, hill
    climber. When the hill climber can no longer find a better solution it will assume
    it is at the top of the hill and stop the search.


    Figure [1-7](#A978-1-4842-0328-6_1_Chapter.html#Fig7) illustrates how a typical
    run-through of a hill climber algorithm might look.


    ![A978-1-4842-0328-6_1_Fig7_HTML.jpg](A978-1-4842-0328-6_1_Fig7_HTML.jpg)


    Figure 1-7. Shows how the hill climber works


    The diagram above demonstrates how a simple hill climber algorithm can easily
    return a locally optimal solution if it’s search begins in a locally optimal area
    of the search space.


    Although there isn’t any guaranteed way to avoid local optimums without first
    evaluating the entire search area, there are many variations of the algorithm
    which can help avoid local optimums. One of the most basic and effective methods
    is called random-restart hill climbing, which simply runs the hill climbing algorithm
    multiple times from random starting positions then returns the best solution found
    from its various runs. This optimization method is relatively easy to implement
    and surprisingly effective. Other approaches such as, Simulated Annealing (see
    Kirkpatrick, Gelatt, and Vecchi (1983)) and Tabu search (see Glover (1989) and
    Glover (1990)) are slight variations to the hill climbing algorithm which both
    having properties that can help reduce local optimums.


    Genetic algorithms are surprisingly effective at avoiding local optimums and retrieving
    solutions that are close to optimal. One of the ways it achieves this is by having
    a population that allows it to sample a large area of the search space locating
    the best areas to continue the search. Figure [1-8](#A978-1-4842-0328-6_1_Chapter.html#Fig8)
    shows how the population might be distributed at initialization.


    ![A978-1-4842-0328-6_1_Fig8_HTML.jpg](A978-1-4842-0328-6_1_Fig8_HTML.jpg)


    Figure 1-8. Sample areas at initialization


    After a few generations have past, the population will begin to conform towards
    where the best solutions could be found in the previous generations. This is because
    less fit solutions will be removed during the selection process making way for
    new, fitter, solutions to be made during crossover and mutation (Figure [1-9](#A978-1-4842-0328-6_1_Chapter.html#Fig9)).


    ![A978-1-4842-0328-6_1_Fig9_HTML.jpg](A978-1-4842-0328-6_1_Fig9_HTML.jpg)


    Figure 1-9. The fitness diagram after some generations have mutated


    The mutation operator also plays a role in evading local optimums. Mutation allows
    a solution to jump from its current position to another position on the search
    space. This process will often lead to the discovery of fitter solutions in more
    optimal areas in the search space.


    ## Parameters


    Although all genetic algorithms are based on the same concepts, their specific
    implementations can vary quite a bit. One of the ways specific implementations
    can vary is by their parameters. A basic genetic algorithm will have at least
    a few parameters that need to be considered during the implementation. The main
    three are the rate of mutation, the population size and the third is the crossover
    rate.


    ### Mutation Rate


    The mutation rate is the probability in which a specific gene in a solution’s
    chromosome will be mutated. There is technically no correct value for the mutation
    rate of a genetic algorithm, but some mutation rates will provide vastly better
    results than others. A higher mutation rate allows for more genetic diversity
    in the population and can also help the algorithm avoid local optimums. However,
    a mutation rate that’s too high can cause too much genetic variation between each
    generation causing it to lose good solutions it found in its previous population.


    If the mutation rate is too low, the algorithm can take an unreasonably long time
    to move along the search space hindering its ability to find a satisfactory solution.
    A mutation rate that’s too high can also prolong the time it takes to find an
    acceptable solution. Although, a high mutation rate can help the genetic algorithm
    avoid getting stuck in local optimums, when it’s set too high it can have a negative
    impact on the search. This, as was said before, is due to the solutions in each
    generation being mutated to such a large extent that they’re practically randomized
    after mutation has been applied.


    To understand why a well configured mutation rate is important, consider two binary
    encoded candidate solutions, `"100"` and `"101"`. Without mutation new solutions
    can only come from crossover. However, when we crossover our solutions there are
    only two possible outcomes available for the offspring, `"100"` or `"101"`. This
    is because the only difference in the parent’s genome’s can be found in their
    last bits. If the offspring receives its last bit from the first parent, it will
    be a `"1"`, otherwise if it’s from the second, it would be a `"0"`. If the algorithm
    needed to find an alternative solution it would need to mutate an existing solution,
    giving it new genetic information that isn’t available elsewhere in the gene pool.


    The mutation rate should be set to a value that allows for enough diversity to
    prevent the algorithm plateauing, but not so much that it causes the algorithm
    to lose valuable genetic information from the previous population. This balance
    will depend on the nature of the problem being solved.'
  raw: '### Local Optimums


    An obstacle that should be considered when implementing an optimization algorithm
    is how well the algorithm can escape from locally optimal positions in the search
    space. To better visualize what a local optimum is, refer to Figure [1-6](#A978-1-4842-0328-6_1_Chapter.html#Fig6).


    ![A978-1-4842-0328-6_1_Fig6_HTML.jpg](A978-1-4842-0328-6_1_Fig6_HTML.jpg)


    Figure 1-6.


    A local optimum can be deceiving


    Here we can see two hills on the fitness landscape which have peaks of slightly
    different heights. As mentioned earlier, the optimization algorithm isn’t able
    to see the entire fitness landscape, and instead, the best it can do is find solutions
    which it believes are likely to be in an optimal position on the search space.
    It’s because of this characteristic the optimization algorithm can often unknowingly
    focus its search on suboptimal portions of the search space.


    This problem becomes quickly noticeable when implementing a simple hill climbing
    algorithm to solve problems of any sufficient complexity. A simple hill climber
    doesn’t have any inherent method to deal with local optimums, and as a result
    will often terminate its search in locally optimal regions of the search space.
    A simple stochastic hill climber is comparable to a genetic algorithm without
    a population and crossover. The algorithm is fairly easy to understand, it starts
    off at a random point in the search space, then attempts to find a better solution
    by evaluating its neighbor solutions. When the hill climber finds a better solution
    amongst its neighbors, it will move to the new position and restart the search
    process again. This process will gradually find improved solutions by taking steps
    up whatever hill it found itself on in the search space – hence the name, hill
    climber. When the hill climber can no longer find a better solution it will assume
    it is at the top of the hill and stop the search.


