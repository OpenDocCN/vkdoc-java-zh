    ### 终止检查


    本次实现中使用的终止检查与我们之前的遗传算法略有不同。在这里，我们将在达到最大代数后终止算法。


    要添加此终止检查，首先在 `GeneticAlgorithm` 类中添加以下 `isTerminationConditionMet` 方法。


    `public boolean isTerminationConditionMet(int generationsCount, int maxGenerations)
    {`


    `return (generationsCount > maxGenerations);`


    `}`


    该方法仅接收当前代数计数器和允许的最大代数，并根据算法是否应终止返回 `true` 或 `false`。说实话，这个方法非常简单，我们完全可以直接在遗传算法循环的
    `while` 条件中使用该逻辑——但为了保持一致性，我们始终将终止条件检查实现为 `GeneticAlgorithm` 类中的一个方法，即使它像上面这样微不足道。


    现在，我们可以通过将以下代码添加到 `RobotController` 的 `main` 方法中，将终止检查应用于进化循环。我们只需将代数和最大代数作为参数传入。


    通过在 `while` 语句中添加终止条件，你实际上使循环具备了功能性，因此我们也应借此机会打印一些统计信息和调试信息。


    以下修改非常直接：首先，更新 `while` 条件以使用 `ga.isTerminationConditionMet`。其次，在循环内和循环后添加对 `population.getFittest`
    和 `System.out.println` 的调用，以显示进度和结果。


    以下是此时 `RobotController` 类应呈现的样子；我们刚刚又消除了三个 TODO，只剩下两个：


    `package chapter3;`


    `public class RobotController {`


    `public static int maxGenerations = 1000;`


    `public static void main(String[] args) {`


    `Maze maze = new Maze(new int[][] {`


    `{ 0, 0, 0, 0, 1, 0, 1, 3, 2 },`


    `{ 1, 0, 1, 1, 1, 0, 1, 3, 1 },`


    `{ 1, 0, 0, 1, 3, 3, 3, 3, 1 },`


    `{ 3, 3, 3, 1, 3, 1, 1, 0, 1 },`


    `{ 3, 1, 3, 3, 3, 1, 1, 0, 0 },`


    `{ 3, 3, 1, 1, 1, 1, 0, 1, 1 },`


    `{ 1, 3, 0, 1, 3, 3, 3, 3, 3 },`


    `{ 0, 3, 1, 1, 3, 1, 0, 1, 3 },`


    `{ 1, 3, 3, 3, 3, 1, 1, 1, 4 }`


    `});`


    `// 创建遗传算法`


    `GeneticAlgorithm ga = new GeneticAlgorithm(200, 0.05, 0.9, 2, 10);`


    `Population population = ga.initPopulation(128);`


    `// 评估种群`


    `ga.evalPopulation(population, maze);`


    `int generation = 1;`


    `// 开始进化循环`


    `while (ga.isTerminationConditionMet(generation, maxGenerations) == false) {`


    `// 打印种群中最优个体`


    `Individual fittest = population.getFittest(0);`


    `System.out.println("G" + generation + " 最佳解 (" + fittest.getFitness() + "): "
    + fittest.toString());`


    `// TODO: 应用交叉`


    `// TODO: 应用变异`


    `// 评估种群`


    `ga.evalPopulation(population, maze);`


    `// 增加当前代数`


    `generation++;`


    `}`


    `System.out.println("在 " + maxGenerations + " 代后停止。");`


    `Individual fittest = population.getFittest(0);`


