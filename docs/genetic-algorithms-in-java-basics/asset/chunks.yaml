    #### 锦标赛选择


    与轮盘赌选择类似，锦标赛选择提供了一种基于个体适应度值进行选择的方法。也就是说，个体的适应度越高，该个体被选中进行交叉的概率就越大。


    锦标赛选择通过进行一系列“锦标赛”来选择父代。首先，从种群中随机选择个体进入锦标赛。接着，可以认为这些个体通过比较各自的适应度值来相互竞争，然后选择适应度最高的个体作为父代。


    锦标赛选择需要定义一个锦标赛规模，该参数指定了应从种群中选取多少个体参与锦标赛竞争。与大多数参数一样，所选值的大小会带来性能上的权衡。较大的锦标赛规模会考虑种群中更大比例的部分，这使得找到种群中高分个体的可能性大大增加。相反，较小的锦标赛规模由于竞争较少，会从种群中更随机地选择个体，结果往往是挑选出排名较低的个体。较大的锦标赛规模可能导致遗传多样性丧失，因为只有最优的个体被选为父代。反之，较小的锦标赛规模则会因选择压力降低而减缓算法的进展。


    锦标赛选择是遗传算法中最常用的选择方法之一。其优势在于实现起来相对简单，并且可以通过调整锦标赛规模来改变选择压力。然而，它也存在局限性。试想，当适应度最低的个体被放入锦标赛时，无论种群中其他哪些个体被加入锦标赛，它都永远不会被选中，因为其他个体的适应度值必然更高。这个缺点可以通过在算法中加入选择概率来解决。例如，如果选择概率设为
    0.6，那么适应度最高的个体被选中的概率就是 60%。如果适应度最高的个体未被选中，则会继续考虑第二高的个体，依此类推，直到选中某个个体。虽然这种修改允许即使是排名最差的个体偶尔也能被选中，但它没有考虑个体之间的适应度差异。例如，如果三个个体被选入锦标赛，其适应度值分别为
    9、2 和 1。在这种情况下，即使适应度值为 2 的个体其适应度值变为 8，它被选中的概率也不会更高。这意味着，有时个体会被赋予不合理的高或低的选择几率。


    我们不会在锦标赛选择的实现中加入选择概率；不过，这对读者来说是一个极好的练习。


    要实现锦标赛选择，请在 `GeneticAlgorithm` 类中的任意位置添加以下代码：


    `public Individual selectParent(Population population) {`


          `// 创建锦标赛`


          `Population tournament = new Population(this.tournamentSize);`


          `// 向锦标赛中添加随机个体`


          `population.shuffle();`


          `for (int i = 0; i < this.tournamentSize; i++) {`


                `Individual tournamentIndividual = population.getIndividual(i);`


                `tournament.setIndividual(i, tournamentIndividual);`


          `}`


          `// 返回最优个体`


          `return tournament.getFittest(0);`


    `}`


    首先，我们创建一个新的种群来容纳选择锦标赛中的所有个体。接着，随机向该种群中添加个体，直到其大小等于锦标赛规模参数。最后，从锦标赛种群中选择并返回最优个体。


    #### 单点交叉


    单点交叉是我们之前实现的均匀交叉方法的另一种交叉方法。单点交叉是一种非常简单的交叉方法，它随机选择基因组中的一个位置，以确定哪些基因来自哪个父代。交叉位置之前的遗传信息来自父代
    1，而交叉位置之后的遗传信息来自父代 2。


    ![A978-1-4842-0328-6_3_Figb_HTML.jpg](img/A978-1-4842-0328-6_3_Figb_HTML.jpg)


    单点交叉相当容易实现，并且允许将连续的基因位组从父代更有效地传递下去，这比均匀交叉更有效。这是交叉算法的一个宝贵特性。考虑我们的具体问题，其中染色体是一组基于六个传感器输入的编码指令，并且每条指令的长度超过一个比特。


    设想一个理想的交叉情况如下：父代 1 在前 32 个传感器操作上表现出色，而父代 2 在最后 16 个操作上表现出色。如果我们使用第 2 章中的均匀交叉技术，那么各处都会出现混乱的比特位！由于均匀交叉随机选择比特位进行交换，单个指令会在交叉过程中被改变和破坏。每条指令的两个比特位可能根本无法保留，因为每条指令中的两个比特位之一可能会被修改。然而，单点交叉让我们能够利用这种理想情况。如果交叉点正好位于染色体的中间，那么后代将获得来自父代
    1 的 64 个连续比特位（代表 32 条指令），同时也获得来自父代 2 的优秀的 16 条指令。因此，这个后代现在在 64 种可能状态中的 48 种上表现出色。这个概念正是遗传算法的基础：后代可能比任何一个父代都更强，因为它继承了双方的最佳特质。


    然而，单点交叉并非没有局限性。单点交叉的一个局限性是，父代基因组的某些组合根本无法实现。例如，考虑两个父代：一个基因组为“00100”，另一个基因组为“10001”。仅通过交叉无法得到子代“10101”，尽管所需的基因在两个父代中都存在。幸运的是，我们还有变异作为一种进化机制，如果同时实现了交叉和变异，那么基因组“10101”是可能出现的。


    单点交叉的另一个局限性是，左侧的基因有偏向于来自父代 1 的趋势，而右侧的基因有偏向于来自父代 2 的趋势。为了解决这个问题，可以实现两点交叉，即使用两个位置，使得分区能够跨越父代基因组的边缘。我们将两点交叉作为留给读者的一个练习。


    ![A978-1-4842-0328-6_3_Figc_HTML.jpg](img/A978-1-4842-0328-6_3_Figc_HTML.jpg)


    要实现单点交叉，请在 `GeneticAlgorithm` 类中添加以下代码。这个 `crossoverPopulation` 方法依赖于你上面实现的 `selectParent`
    方法，因此使用了锦标赛选择。请注意，并没有要求必须将锦标赛选择与单点交叉搭配使用；你可以使用任何 `selectParent` 的实现，不过针对这个问题，我们选择了锦标赛选择和单点交叉，因为它们都是非常常见且需要理解的重要概念。


