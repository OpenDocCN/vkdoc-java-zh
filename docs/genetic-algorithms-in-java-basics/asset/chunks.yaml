- fmt: '# Summary


    The traveling salesman problem is a classic optimization problem that asks: what
    is the shortest possible route between a list of cities, visiting each city once,
    and returning back to the initial city?


    It is an unsolved optimization problem in which an optimal solution can only be
    found if a brute force algorithm is used. However, because the number of possible
    solutions to the traveling salesman problem grows so rapidly with each city added,
    it soon becomes infeasible to brute force solutions even with the most powerful
    computers. For these cases, heuristic methods are used to find a good approximation
    instead.


    We covered a basic implementation of the traveling salesman problem using cities
    on a 2D graph and connected them by straight-line distance.


    Using an ordered list of city IDs for the chromosomes’ encoding, we were able
    to represent a solution to the traveling salesman problem. However, because each
    city ID must appear in the encoding at least once, and only once, we looked at
    two new crossover and mutation methods that can keep to this constraint: ordered
    crossover and swap mutation.


    In ordered crossover, a random subset of `parent1`’s chromosome is added to the
    offspring, then the remaining genetic information needed is added to the offspring
    in the order it’s found in `parent2`’s chromosome. This method of adding a subset
    of `parent1`’s genetic information, then only adding the missing remaining genetic
    information from `parent2` guarantees each city ID will appear once and only once
    in the solution.


    In swap mutation, two genes are selected and their positions are swapped. Again,
    this mutation method guarantees a valid solution for the traveling salesman problem,
    as it doesn’t allow a city ID to be removed completely, nor can it cause a city
    to appear twice.


    ## Exercises


    - Hard-code cities into the `TSP` class `main` method so that you can accurately
    take benchmarks of performance.

    - Add support for both, shortest route and quickest route using user defined distances
    and times between cities.

    - Add support for an asymmetric TSP (the cost of traveling from A to B may not
    equal the cost from traveling from B to A).

    - Modify the `Individual` class constructor to randomize the order of cities.
    How does this affect the performance of the algorithm?

    - Update the termination condition to measure the algorithm’s progress and quit
    when no significant progress is being made. How does this affect the algorithm’s
    performance and results?


    # Class Scheduling


    ## Introduction


    In this chapter, we will create a genetic algorithm that schedules classes for
    a college timetable. We will examine a couple of different scenarios in which
    a class-scheduling algorithm may be used, and the constraints that are usually
    implemented when designing a timetable. Finally, we will build a simple class
    scheduler, which can be expanded to support more complex implementations.


    In artificial intelligence, class scheduling is a variation of the constraint
    satisfaction problem. This category of problem relates to problems, which have
    a set of variables that need to be assigned in such a way that they avoid violating
    a defined set of constraints.


    Constraints fall into two categories: hard constraints—constraints which need
    to be satisfied to produce a functional solution, and soft constraints—constraints
    which are preferred but not at the expense of the hard constraints.


    For instance, when manufacturing a new product, the product’s functional requirements
    are hard constraints and specify the important performance requirements. Without
    these constraints, you have no product. A phone that can’t make calls is hardly
    a phone! However, you may also have soft constraints, which, although unrequired,
    are still important to consider, such as the cost, weight, or aesthetics of the
    product.


    When creating a class-scheduling algorithm there will typically be many hard and
    soft constraints that need to be considered. Some typical hard constraints for
    the class-scheduling problem are:


    - Professors can only be in one class at any given time

    - Classrooms need to be big enough to host the class

    - Classrooms can only host one class at any given time

    - Classrooms must contain any required equipment


    Some typical soft constraints may be:


    - Room capacity should be suitable for the class size

    - Preferred classroom of the professor

    - Preferred class time of the professor


    Sometimes multiple soft constraints may conflict and a tradeoff will need to be
    found between them. For example, a class might only have 10 students so a soft
    constraint may reward assigning a suitable classroom, which has capacity of around
    10; however, the professor taking the class may prefer a larger classroom, which
    can hold 30 students. If professor preferences are accounted for as soft constraints,
    one of these configurations will be preferred and hopefully found by the class
    scheduler.


    In more advanced implementations it is also possible to weight soft constraints
    so the algorithm understands which soft constraints are the most important to
    consider.


    Like the traveling salesman problem, iterative methods can be used to find an
    optimal solution to the class-scheduling problem; however, it becomes increasingly
    more difficult to find an optimal solution as the number of class configurations
    increases. In these circumstances, where the possible number of class configurations
    exceeds what is feasible to solve by iterative methods, genetic algorithms are
    good alternatives. Although they’re not guaranteed to find the optimal solution,
    they are extremely good at finding close to optimal solutions within a reasonable
    timeframe.


    ## The Problem


    The class-scheduling problem we will be looking at in this chapter is a college
    class scheduler that can create a college timetable based on data we provide it,
    such as the available professors, available rooms, timeslots and student groups.


    We should note that building a college timetable is slightly different from building
    a grade school timetable. Grade school timetables require their students to have
    a full timetable of scheduled classes throughout the day with no free periods.
    Conversely, typical college timetables will frequently have free periods depending
    on how many modules the student enrolls in.


    Each class will be assigned a timeslot, a professor, a room and a student group
    by the class scheduler. We can calculate the total number of classes that will
    need scheduling by summing the number of student groups multiplied by the number
    of modules each student group is enrolled in.


    For each class scheduled by our application we will consider the following hard
    constraints:


    - Classes can only be scheduled in free classrooms

    - A professor can only teach one class at any one time

    - Classrooms must be big enough to accommodate the student group


    To keep things simple in this implementation we will consider only hard constraints
    for now; however there would typically be many more hard constraints depending
    on the timetable specifications. There would also likely be a number of soft constraints
    included in the specification, which for now we will ignore. Although not necessary,
    considering soft constraints can often make a big difference in the quality of
    the timetables produced by the genetic algorithm.


    ## Implementation


    It is time to go ahead and tackle the problem using our knowledge of genetic algorithms.
    After setting up a new Java/Eclipse package for this problem, we’ll begin by encoding
    the chromosome.'
  raw: '## Summary


    The traveling salesman problem is a classic optimization problem that asks: what
    is the shortest possible route between a list of cities, visiting each city once,
    and returning back to the initial city?


    It is an unsolved optimization problem in which an optimal solution can only be
    found if a brute force algorithm is used. However, because the number of possible
    solutions to the traveling salesman problem grows so rapidly with each city added,
    it soon becomes infeasible to brute force solutions even with the most powerful
    computers. For these cases, heuristic methods are used to find a good approximation
    instead.


    We covered a basic implementation of the traveling salesman problem using cities
    on a 2D graph and connected them by straight-line distance.


    Using an ordered list of city IDs for the chromosomes’ encoding, we were able
    to represent a solution to the traveling salesman problem. However, because each
    city ID must appear in the encoding at least once, and only once, we looked at
    two new crossover and mutation methods that can keep to this constraint: ordered
    crossover and swap mutation.


    In ordered crossover, a random subset of parent1’s chromosome is added to the
    offspring, then the remaining genetic information needed is added to the offspring
    in the order it’s found in parent2’s chromosome. This method of adding a subset
    of parent1’s genetic information, then only adding the missing remaining genetic
    information from parent2 guarantees each city ID will appear once and only once
    in the solution.


    In swap mutation, two genes are selected and their positions are swapped. Again,
    this mutation method guarantees a valid solution for the traveling salesman problem,
    as it doesn’t allow a city ID to be removed completely, nor can it cause a city
    to appear twice.


    ### Exercises


    Hard-code cities into the TSP class “main” method so that you can accurately take
    benchmarks of performance.   Add support for both, shortest route and quickest
    route using user defined distances and times between cities.   Add support for
    an asymmetric TSP (the cost of traveling from A to B may not equal the cost from
    traveling from B to A).   Modify the Individual class constructor to randomize
    the order of cities. How does this affect the performance of the algorithm?  
    Update the termination condition to measure the algorithm’s progress and quit
    when no significant progress is being made. How does this affect the algorithm’s
    performance and results?


