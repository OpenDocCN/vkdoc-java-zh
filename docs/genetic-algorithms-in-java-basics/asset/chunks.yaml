    ## Summary


    In this chapter, you’ve learned the basics of implementing a genetic algorithm.
    The pseudocode at the beginning of the chapter provides a generic conceptual model
    for all genetic algorithms you’ll implement throughout the rest of the book: each
    genetic algorithm will initialize and evaluate a population, and then enter a
    loop that performs crossover, mutation, and re-evaluation. The loop only exits
    if a termination condition is met.


