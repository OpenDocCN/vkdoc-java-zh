- fmt: '### Terms


    It’s important that before we go deeper into the field of genetic algorithms we
    first understand some of the basic language and terminology used. As the book
    progresses, more complex terminology will be introduced as required. Below is
    a list of some of the more common terms for reference.


    - **Population** – This is simply just a collection of candidate solutions which
    can have genetic operators such as mutation and crossover applied to them.

    - **Candidate Solution** – A possible solution to a given problem.

    - **Gene** – The indivisible building blocks making up the chromosome. Classically
    a gene consists of 0 or a 1.

    - **Chromosome** – A chromosome is a string of genes. A chromosome defines a specific
    candidate solution. A typical chromosome with a binary encoding might contain
    something like, `"01101011"`.

    - **Mutation** – The process in which genes in a candidate solution are randomly
    altered to create new traits.

    - **Crossover** – The process in which chromosomes are combined to create a new
    candidate solution. This is sometimes referred to as recombination.

    - **Selection** – This is the technique of picking candidate solutions to breed
    the next generation of solutions.

    - **Fitness** – A score which measures the extent to which a candidate solution
    is adapted to suit a given problem.


    ## Search Spaces


    In computer science when dealing with optimization problems that have many candidate
    solutions which need to be searched through, we refer to the collection of solutions
    as a “search space”. Each specific point within the search space serves as a candidate
    solution for the given problem. Within this search space there is a concept of
    distance where solutions that are placed closer to one another are more likely
    to express similar traits than solutions placed further apart. To understand how
    these distances are organized on the search space, consider the following example
    using a binary genetic representation:


    `"101"` is only 1 difference away from `"111"`. This is because there is only
    1 change required (flipping the 0 to 1) to transition from `"101"` to `"111"`.
    This means these solutions are only 1 space apart on the search space.


    `"000"` on the other hand, is three differences away from `"111"`. This gives
    it a distance of 3, placing `"000"` 3 spaces from `"111"` on the search space.


    Because solutions with fewer changes are grouped nearer to one another, the distance
    between solutions on the search space can be used to provide an approximation
    of the characteristics held by another solution. This understanding is often used
    as a tactic by many search algorithms to improve their search results.


    ### Fitness Landscapes


    When candidate solutions found within the search space are labeled by their individual
    fitness levels we can begin to think of the search space as a “fitness landscape”.
    Figure [1-1](#A978-1-4842-0328-6_1_Chapter.html#Fig1) provides an example of what
    a 2D fitness landscape might look like.


    ![A978-1-4842-0328-6_1_Fig1_HTML.jpg](A978-1-4842-0328-6_1_Fig1_HTML.jpg)


    Figure 1-1. A 2D fitness landscape


    On the bottom axis of our fitness landscape is the value we’re optimizing for,
    and on the left axis is its corresponding fitness value. I should note, this is
    typically an over simplification of what would be found in practice. Most real
    world applications have multiple values that need optimizing creating a multi-dimensional
    fitness landscape.


    In the above example the fitness value for every candidate solution in the search
    space can be seen. This makes it easy to see where the fittest solution is located,
    however, for this to be possible in reality, each candidate solution in the search
    space would have needed to have their fitness function evaluated. For complex
    problems with exponential search spaces it just isn’t plausible to evaluate every
    solution’s fitness value. In these cases, it is the search algorithm’s job to
    find where the best solution likely resides while being limited to only having
    a tiny proportion of the search space visible. Figure [1-2](#A978-1-4842-0328-6_1_Chapter.html#Fig2)
    is an example of what a search algorithm might typically see.


    ![A978-1-4842-0328-6_1_Fig2_HTML.jpg](A978-1-4842-0328-6_1_Fig2_HTML.jpg)


    Figure 1-2. A more typical search fitness space


    Consider an algorithm that is searching through a search space of one billion
    (1,000,000,000) possible solutions. Even if each solution only takes 1 second
    to evaluate and be assigned a fitness value, it would still take over 30 years
    to explicitly search through each potential solution! If we don’t know the fitness
    value for each solution in the search space then we are unable to definitively
    know where the best solution resides. In this case, the only reasonable approach
    is to use a search algorithm capable of finding a good-enough solution in the
    time frame available. In these conditions, genetic algorithms and evolutionary
    algorithms in general, are very effective at finding feasible, near optimum solutions
    in a relatively short time frame.


    Genetic algorithms use a population approach when searching the search space.
    As part of their search strategy genetic algorithms will assume two well ranking
    solutions can be combined to form an even fitter offspring. This process can be
    visualized on our fitness landscape (Figure [1-3](#A978-1-4842-0328-6_1_Chapter.html#Fig3)).


    ![A978-1-4842-0328-6_1_Fig3_HTML.jpg](A978-1-4842-0328-6_1_Fig3_HTML.jpg)


    Figure 1-3. Parent and offspring in the fitness plot


    The mutation operator found in genetic algorithms allows us to search the close
    neighbors of the specific candidate solution. When mutation is applied to a gene
    its value is randomly changed. This can be pictured by taking a single step on
    the search space (Figure [1-4](#A978-1-4842-0328-6_1_Chapter.html#Fig4)).


    ![A978-1-4842-0328-6_1_Fig4_HTML.jpg](A978-1-4842-0328-6_1_Fig4_HTML.jpg)


    Figure 1-4. A fitness plot showing the mutation


    In the example of both crossover and mutation it is possible to end up with a
    solution less fit than what we originally set out with (Figure [1-5](#A978-1-4842-0328-6_1_Chapter.html#Fig5)).


    ![A978-1-4842-0328-6_1_Fig5_HTML.jpg](A978-1-4842-0328-6_1_Fig5_HTML.jpg)


    Figure 1-5. A poor fitness solution


    In these circumstances, if the solution performs poorly enough, it will eventually
    be removed from the gene pool during the selection process. Small negative changes
    in individual candidate solutions are fine as long as the population’s average
    trend tends towards fitter solutions.'
