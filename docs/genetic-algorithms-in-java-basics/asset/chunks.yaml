            `// Loop over population evaluating individuals and suming population
    fitness`


            `for (Individual individual : population.getIndividuals()) {`


                `populationFitness += individual.getFitness();`


            `}`


            `population.setPopulationFitness(populationFitness);`


        `}`


    Now the calcFitness function is able to run across multiple cores if the system
    supports them.


    Because the genetic algorithms covered in this book have used fairly simple fitness
    functions, parallel processing may not provide much of a performance improvement.
    A nice way to test how much parallel processing can improve the genetic algorithms
    performance might be to add a call to Thread.sleep( ) in the fitness function.
    This will simulate a fitness function which takes a significant amount of time
    to complete execution.'
