    Like roulette wheel selection, tournament selection provides a method for selecting
    individuals based on their fitness value. That is, the higher an individual’s
    fitness the greater the chance that the individual will be chosen for crossover.


    Tournament selection selects its parents by running a series of “tournaments”.
    First, individuals are randomly selected from the population and entered into
    a tournament. Next, these individuals can be thought to compete with each other
    by comparing their fitness values, then choosing the individual with the highest
    fitness for the parent.


    Tournament selection requires a tournament size to be defined that specifies how
    many individuals from the population it should pick to compete in a tournament.
    As with most parameters, there is a tradeoff in performance depending on the value
    chosen. A high tournament size will consider a larger proportion of the population.
    This makes it much more likely to find the higher scoring individuals in the population.
    Alternately, a low tournament size will select individuals from the population
    more randomly due to less competition, often picking lower ranking individuals
    as a result. A high tournament size can lead to a loss of genetic diversity where
    only the best individuals are being selected as parents. Conversely, a low tournament
    size can slow progress of the algorithm due to the reduced selection pressure.


    Tournament selection is one of the most common selection methods used in genetic
    algorithms. Its strengths being that it’s a relatively simple algorithm to implement
    and allows for variable selection pressure by updating the tournament size. It
    does have limitations however. Consider when the lowest scoring individual is
    placed into a tournament. It wouldn’t matter what other individuals from the population
    are added to the tournament, it will never be chosen because the other individuals
    are guaranteed to have a higher fitness value. This drawback could be resolved
    by adding a selection probability to the algorithm. For example, if the selection
    probability is set to 0.6, there would be a 60% chance the fittest individual
    is selected. If the fittest individual isn’t selected, it will then move on to
    the second fittest individual and so on until an individual has been picked. While
    this modification allows even the worst ranking individuals to be selected occasionally,
    it doesn’t take into account the fitness difference between individuals. For example,
    if three individuals were chosen for tournament selection, one having a fitness
    value of 9, one with a fitness value of 2, and the other with a fitness value
    of 1\. In this case, the individual with a fitness value of 2 would be no more
    likely to be picked if the fitness value was 8\. This means occasionally individuals
    are given unreasonably high or low odds for selection.


    We will not implement selection probability in our tournament selection implementation;
    however, it is an excellent exercise for the reader.


    To implement tournament selection add the following code to the GeneticAlgorithm
    class, anywhere you like:


    `public Individual selectParent(Population population) {`


          `// Create tournament`


          `Population tournament = new Population(this.tournamentSize);`


          `// Add random individuals to the tournament`


          `population.shuffle();`


          `for (int i = 0; i < this.tournamentSize; i++) {`


                `Individual tournamentIndividual = population.getIndividual(i);`


                `tournament.setIndividual(i, tournamentIndividual);`


          `}`


          `// Return the best`


          `return tournament.getFittest(0);`


    `}`


    First, we create a new population to hold all the individuals in the selection
    tournament. Next, individuals are randomly added to the population until its size
    equals the tournament size parameter. Finally, the best individual from the tournament
    population is selected and returned.


