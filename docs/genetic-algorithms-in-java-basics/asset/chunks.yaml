    we take the best fitness from the population (f[max]) and find the difference
    between the current individual’s fitness (f[i]). We then find the difference between
    the max population fitness and the average population fitness (f[avg]) and divide
    the two values. We can use this value to scale our mutation rate that was set
    during initialization. If the individual’s fitness is the same or less than the
    population’s average fitness we simply use the mutation rate as set during initialization.


    To make things easier, we can implement our new adaptive genetic algorithm code
    into our previous class scheduler code. To begin, we need to add a new method
    for getting the average fitness of the population. We can do this by adding the
    following method to the Population class, anywhere in the file:


    `/**`


         `* Get average fitness`


         `*`


         `* @return The average individual fitness`


         `*/`


        `public double getAvgFitness(){`


            `if (this.populationFitness == -1) {`


                `double totalFitness = 0;`


                `for (Individual individual : population) {`


                    `totalFitness += individual.getFitness();`


                `}`


                `this.populationFitness = totalFitness;`


            `}`


            `return populationFitness / this.size();`


        `}`


    Now we can complete the implementation by updating the mutation function to use
    our adaptive mutation algorithm,


    `/**`


         `* Apply mutation to population`


         `*`


         `* @param population`


         `* @param timetable`


         `* @return The mutated population`


         `*/`


        `public Population mutatePopulation(Population population, Timetable timetable){`


            `// Initialize new population`


            `Population newPopulation = new Population(this.populationSize);`


            `// Get best fitness`


            `double bestFitness = population.getFittest(0).getFitness();`


            `// Loop over current population by fitness`


            `for (int populationIndex = 0; populationIndex < population.size(); populationIndex++)
    {`


                `Individual individual = population.getFittest(populationIndex);`


                `// Create random individual to swap genes with`


                `Individual randomIndividual = new Individual(timetable);`


                `// Calculate adaptive mutation rate`


                `double adaptiveMutationRate = this.mutationRate;`


                `if (individual.getFitness() > population.getAvgFitness()) {`


                    `double fitnessDelta1 = bestFitness - individual.getFitness();`


                    `double fitnessDelta2 = bestFitness - population.getAvgFitness();`


                    `adaptiveMutationRate = (fitnessDelta1 / fitnessDelta2) * this.mutationRate;`


                `}`


                `// Loop over individual’s genes`


                `for (int geneIndex = 0; geneIndex < individual.getChromosomeLength();
    geneIndex++) {`


                    `// Skip mutation if this is an elite individual`


                    `if (populationIndex > this.elitismCount) {`


                        `// Does this gene need mutating?`


                        `if (adaptiveMutationRate > Math.random()) {`


                            `// Swap for new gene`


                            `individual.setGene(geneIndex, randomIndividual.getGene(geneIndex));`


                        `}`


                    `}`


                `}`


                `// Add individual to population`


                `newPopulation.setIndividual(populationIndex, individual);`


            `}`


            `// Return mutated population`


            `return newPopulation;`


        `}`


    This new mutatePopulation method is identical to the original except for the adaptive
    mutation code which implements the algorithm mentioned above.


    When initializing the genetic algorithm with adaptive mutation enabled, the mutation
    rate used will now be the maximum possible mutation rate and will scale down depending
    on the fitness of the current individual and population as a whole. Because of
    this, a higher initial mutation rate may be beneficial.


    ### Exercises


    Use what you know about the adaptive mutation rate to implement an adaptive crossover
    rate into your genetic algorithm.


    ## Multi-Heuristics


    When it comes to optimizing genetic algorithms implementing a secondary heuristic
    is another common method to achieve significant performance improvements under
    certain conditions. Implementing a second heuristic into a genetic algorithm allows
    us to combine the best aspects of multiple heuristic approaches into one algorithm,
    providing further control over the search strategy and performance.


    Two popular heuristics that are often implemented into genetic algorithms are
    simulated annealing and Tabu search. Simulated annealing is a search heuristic
    modeled on the process of annealing found in metallurgy. Put simply, it is a hill
    climbing algorithm that is designed to gradually reduce the rate in which worse
    solutions are accepted. In the context of genetic algorithms, simulated annealing
    will reduce the mutation rate and/or crossover rate over time.


    On the other hand, Tabu search is a search algorithm that keeps a list of “tabu”
    (which derives from “taboo”) solutions that prevents the algorithm from returning
    to previously visited areas in the search space that are known to be weak. This
    tabu list helps the algorithm avoid repeatedly considering solutions it’s previously
    found and knows to be weak.


    Typically, a multi-heuristic approach would only be implemented in situations
    where including it could bring certain needed improvements to the search process.
    For example, if the genetic algorithm is converging on an area in the search space
    too quickly, implementing simulated annealing into the algorithm might help to
    control how soon the algorithm converges.'
