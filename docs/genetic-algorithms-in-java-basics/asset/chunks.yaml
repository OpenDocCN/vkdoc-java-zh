    `Population population = ga.initPopulation(cities.length);`


    `// TODO: Evaluate population`


    `// Keep track of current generation`


    `int generation = 1;`


    `// Start evolution loop`


    `while (ga.isTerminationConditionMet(generation, maxGenerations) == false) {`


    `// TODO: Print fittest individual from population`


    `// TODO: Apply crossover`


    `// TODO: Apply mutation`


    `// TODO: Evaluate population`


    `// Increment the current generation`


    `generation++;`


    `}`


    `// TODO: Display results`


    `}`


    `}`


    Hopefully, this procedure is becoming familiar; we’re once again beginning to
    implement the pseudocode presented at the beginning of [Chapter 2](#A978-1-4842-0328-6_2_Chapter.html).
    We’ve also generated an array of City objects that we’ll use in our evaluation
    methods, much like how we generated a Maze object to evaluate individuals against
    in the last chapter.


    The rest is rote: initialize a GeneticAlgorithm object (including population size,
    mutation rate, crossover rate, elitism count, and tournament size), then initialize
    a population. The individuals’ chromosome length must be the same as the number
    of cities we wish to visit.


