    ### 精英主义


    在讨论变异之前，我们先来看看在交叉方法中引入的“elitismCount”参数。


    一个基本的遗传算法常常会因为交叉和变异算子的影响，在代际更迭中丢失种群中的最优个体。然而，我们又需要这些算子来寻找更优的解。要直观地看到这个问题，只需修改你的遗传算法代码，让它打印出每一代中最优个体的适应度。你会注意到，虽然适应度通常会上升，但有时最优解会在交叉和变异过程中丢失，并被一个较差的解所取代。


    解决这个问题的一个简单优化技术是，始终允许一个或多个最优个体不加修改地直接添加到下一代种群中。这样，最优个体就不会在代际间丢失了。尽管这些个体没有经历交叉操作，但它们仍然可以被选作其他个体的父代，从而使其遗传信息得以与种群中的其他个体共享。这种保留最优个体到下一代的过程被称为**精英主义**。


    通常，种群中“精英”个体的最佳数量只占总种群规模很小的一部分。这是因为如果这个值太高，会因保留了过多个体而导致遗传多样性不足，从而减慢遗传算法的搜索过程。与之前讨论的其他参数类似，找到实现最佳性能的平衡点至关重要。


    在交叉和变异的上下文中实现精英主义都很简单。让我们重新审视 `crossoverPopulation()` 中检查是否应应用交叉的条件判断：


    `// 对这个个体应用交叉吗？`


    `if (this.crossoverRate > Math.random() && populationIndex >= this.elitismCount)
    {`


          `// ...`


    `}`


    只有当交叉条件满足，并且该个体不被视为精英时，才会应用交叉。


    什么使一个个体成为精英？此时，种群中的个体已经根据其适应度进行了排序，因此最强的个体拥有最低的索引。所以，如果我们想要三个精英个体，就应该跳过索引 0-2
    的个体。这将保留最强的个体，并让它们不加修改地进入下一代。我们将在接下来的变异代码中使用完全相同的条件判断。


    ### 变异


    完成进化过程需要添加的最后一件事是变异。与交叉类似，有许多不同的变异方法可供选择。当使用二进制字符串时，一种比较常见的方法称为**位翻转变异**。你可能已经猜到了，位翻转变异就是将位的值从
    1 翻转为 0，或从 0 翻转为 1，具体取决于其初始值。当染色体使用其他表示方式编码时，通常会实现不同的变异方法，以更好地利用该编码。


    选择变异和交叉方法时最重要的因素之一是，确保所选的方法仍然能产生有效的解。我们将在后续章节中看到这个概念的实际应用，但对于当前这个问题，我们只需要确保基因变异后可能的值只有
    0 和 1。如果一个基因变异成了，比如说，7，那就会给我们一个无效的解。


    在本章中，这个建议似乎无关紧要且过于明显，但考虑另一个简单问题：你需要将数字 1 到 6 排序且不重复（即最终得到“123456”）。一个简单地随机选择 1
    到 6 之间数字的变异算法可能会产生“126456”，其中“6”被使用了两次，这将是一个无效的解，因为每个数字只能使用一次。正如你所见，即使是简单的问题有时也需要复杂的技术。


    与交叉类似，变异是根据变异率应用于个体的。如果变异率设置为 0.1，那么每个基因在变异阶段有 10% 的几率发生变异。


    让我们继续为我们的 `GeneticAlgorithm` 类添加变异函数。我们可以将其添加在任何位置：


    `public Population mutatePopulation(Population population) {`


    `// 初始化新种群`


    `Population newPopulation = new Population(this.populationSize);`


    `// 按适应度循环当前种群`


    `for (int populationIndex = 0; populationIndex < population.size(); populationIndex++)
    {`


    `Individual individual = population.getFittest(populationIndex);`


    `// 循环个体的基因`


    `for (int geneIndex = 0; geneIndex < individual.getChromosomeLength(); geneIndex++)
    {`


    `// 如果是精英个体则跳过变异`


    `if (populationIndex >= this.elitismCount) {`


    `// 这个基因需要变异吗？`


    `if (this.mutationRate > Math.random()) {`


    `// 获取新基因`


    `int newGene = 1;`


    `if (individual.getGene(geneIndex) == 1) {`


    `newGene = 0;`


    `}`


    `// 变异基因`


    `individual.setGene(geneIndex, newGene);`


    `}`


    `}`


    `}`


    `// 将个体添加到种群`


    `newPopulation.setIndividual(populationIndex, individual);`


    `}`


    `// 返回变异后的种群`


    `return newPopulation;`


    `}`


    `mutatePopulation()` 方法首先为变异后的个体创建一个新的空种群，然后开始循环当前种群。接着循环每个个体的染色体，并根据变异率考虑对每个基因进行位翻转变异。当一个个体的整个染色体循环完毕后，该个体就被添加到新的变异种群中。当所有个体都经历了变异过程后，返回变异后的种群。


    现在，我们可以通过将 `mutate` 函数添加到主方法中来完成进化循环的最后一步。完成后的主方法如下所示。与上一次相比只有两处不同：首先，我们在“Apply
    mutation”注释下方添加了对 `mutatePopulation()` 的调用。其次，既然我们已经理解了精英主义的工作原理，我们将 `new GeneticAlgorithm`
    构造函数中的“elitismCount”参数从 0 改为了 2。


    `package chapter2;`


    `public class AllOnesGA {`


    `public static void main(String[] args) {`


    `// 创建 GA 对象`


    `GeneticAlgorithm ga = new GeneticAlgorithm(100, 0.001, 0.95, 2);`


    `// 初始化种群`


    `Population population = ga.initPopulation(50);`


    `// 评估种群`


    `ga.evalPopulation(population);`


    `// 记录当前代数`


    `int generation = 1;`


    `while (ga.isTerminationConditionMet(population) == false) {`


    `// 打印种群中最优个体`


    `System.out.println("Best solution: " + population.getFittest(0).toString());`


    `// 应用交叉`


    `population = ga.crossoverPopulation(population);`


    `// 应用变异`


    `population = ga.mutatePopulation(population);`


    `// 评估种群`


    `ga.evalPopulation(population);`


    `// 当前代数递增`


    `generation++;`


    `}`


    `System.out.println("Found solution in " + generation + " generations");`


    `System.out.println("Best solution: " + population.getFittest(0).toString());`


    `}`


    `}`

