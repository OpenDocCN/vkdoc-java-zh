  trans: "\n### 种群规模\n\n种群规模即遗传算法中每一代种群所含个体的数量。种群规模越大，算法能够采样的搜索空间就越大，这有助于引导算法朝着更精确、更全局最优的解方向前进。种群规模过小往往会导致算法在搜索空间的局部最优区域找到不太理想的解，但每代所需的计算资源也更少。\n\
    \n与变异率类似，这里也需要在遗传算法的最优性能之间找到平衡。同样，所需的种群规模也会根据待解决问题的性质而变化。大型的、起伏不平的搜索空间通常需要更大的种群规模才能找到最佳解。有趣的是，在选择种群规模时，存在一个临界点，超过该点后，增加规模将不再显著提升算法所找到解的精度，反而会因为处理额外个体所需的计算量增加而拖慢执行速度。处于这个转变点附近的种群规模，通常能在资源与结果之间提供最佳平衡。\n\
    \n### 交叉率\n\n交叉操作的频率也会影响遗传算法的整体性能。改变交叉率会调整种群中解被应用交叉算子的概率。高交叉率允许在交叉阶段发现许多新的、可能更优的解。较低的交叉率则有助于将适应度更高的个体的遗传信息完整地保留到下一代。交叉率通常应设置得相当高，以促进对新解的搜索，同时允许一小部分种群不受影响地保留到下一代。\n\
    \n## 遗传表示\n\n除了参数之外，另一个影响遗传算法性能的组件是所使用的遗传表示。这是遗传信息在染色体中的编码方式。更好的表示方式能够以一种既富有表现力又易于进化的方式来编码解。Holland（1975）的遗传算法基于二进制遗传表示。他提出使用由\
    \ 0 和 1 组成的字符串构成的染色体。这种二进制表示可能是最简单的编码方式，但对于许多问题而言，其表现力不足以成为合适的首选。考虑一个例子：使用二进制表示来编码一个整数，该整数正被优化用于某个函数。在这个例子中，“000”代表\
    \ 0，“111”代表 7，这与二进制通常的表示方式一致。如果染色体中的第一个基因发生突变——通过将比特位从 0 翻转为 1，或从 1 翻转为 0——它将使编码值改变\
    \ 4（“111”=7，“011”=3）。然而，如果染色体中的最后一个基因发生改变，它只会使编码值改变 1（“111”=7，“110”=6）。在这里，变异算子对候选解的影响取决于其染色体中被操作的基因，这种差异并不理想，因为它会降低算法的性能和可预测性。对于这个例子，更好的做法是使用一个整数，并配合一个互补的变异算子，该算子可以对基因值进行相对较小的加减操作。\n\
    \n除了简单的二进制表示和整数，遗传算法还可以使用：浮点数、基于树的表示、对象以及其遗传编码所需的任何其他数据结构。在构建有效的遗传算法时，选择合适的表示方式至关重要。\n\
    \n## 终止条件\n\n遗传算法可以根据需要持续进化出新的候选解，所需时间从几秒到数年不等，具体取决于问题的性质。我们将遗传算法结束搜索的条件称为其终止条件。\n\
    \n一些典型的终止条件包括：\n\n*   达到最大代数\n*   超过分配的时间限制\n*   找到了满足所需标准的解\n*   算法已达到收敛平台期\n\
    \n有时，实现多个终止条件可能更可取。例如，设置一个最大时间限制，同时允许在找到足够好的解时提前终止，这样会很方便。\n\n## 搜索过程\n\n在本章结束前，让我们逐步审视遗传算法背后的基本过程，如图\
    \ 1-10 所示。\n\n遗传算法首先初始化一个候选解种群。这通常是随机进行的，以便对整个搜索空间进行均匀覆盖。  \n接下来，通过为种群中的每个个体分配一个适应度值来评估种群。在此阶段，我们通常需要记录当前最优解以及种群的平均适应度。\
    \  \n评估之后，算法根据设定的终止条件决定是否应终止搜索。通常，这是因为算法达到了固定的代数或找到了一个合适的解。  \n如果终止条件未满足，种群将进入选择阶段，在此阶段，根据个体的适应度评分从种群中选择个体——适应度越高，个体被选中的机会就越大。\
    \  \n下一阶段是对选中的个体应用交叉和变异。此阶段是为下一代创建新个体的地方。  \n此时，新种群返回评估步骤，过程重新开始。我们将这个循环的每一轮称为一代。\
    \  \n当最终满足终止条件时，算法将跳出循环，并通常将其最终搜索结果返回给用户。\n\n![A978-1-4842-0328-6_1_Fig10_HTML.jpg](img/A978-1-4842-0328-6_1_Fig10_HTML.jpg)\n\
    \n图 1-10.\n\n遗传算法的一般过程\n\n## 参考文献\n\nTuring, A.M. (1950). “Computing Machinery\
    \ and Intelligence”\n\nSimon, H.A. (1965). “The Shape of Automation for Men and\
    \ Management”\n\nBarricell, N.A. (1975). “Symbiogenetic Evolution Processes Realised\
    \ by Artificial Methods”\n\nDarwin, C. (1859). “On the Origin of Species”\n\n\
    Dorigo, M. (1992). “Optimization, Learning and Natural Algorithms”\n\nRechenberg,\
    \ I. (1965) “Cybernetic Solution Path of an Experimental Problem”\n\nRechenberg,\
    \ I. (1973) “Evolutionsstrategie: Optimierung technischer Systeme nach Prinzipien\
    \ der biologischen Evolution”\n\nSchwefel, H.-P. (1975) “Evolutionsstrategie und\
    \ numerische Optimierung”\n\nSchwefel, H.-P. (1977) “Numerische Optimierung von\
    \ Computer-Modellen mittels der Evolutionsstrategie”\n\nFogel L.J; Owens, A.J;\
    \ and Walsh, M.J. (1966) “Artificial Intelligence through Simulated Evolution”\n\
    \nHolland, J.H. (1975) “Adaptation in Natural and Artificial Systems”\n\nDorigo,\
    \ M. (1992) “Optimization, Learning and Natural Algorithms”\n\nGlover, F. (1989)\
    \ “Tabu search. Part I”\n\nGlover, F. (1990) “Tabu search. Part II”\n\nKirkpatrick,\
    \ S; Gelatt, C.D, Jr., and Vecchi, M.P. (1983) “Optimization by simulated annealing”\n"
- fmt: '# Implementation of a Basic Genetic Algorithm


    In this chapter we will begin to explore the techniques used to implement a basic
    genetic algorithm. The program we develop here will be modified adding features
    in the succeeding chapters in this book. We will also explore how the performance
    of a genetic algorithm can vary depending on its parameters and configuration.


    To follow along with the code in this section you’ll need to first have the Java
    JDK installed on your computer. You can download and install the Java JDK for
    free from the Oracle’s website:


    [`oracle.com/technetwork/java/javase/downloads/index.html`](http://oracle.com/technetwork/java/javase/downloads/index.html)


    Although not necessary, in addition to installing the Java JDK, for convenience
    you may also choose to install a Java compatible IDE such as Eclipse or NetBeans.


    ## Pre-Implementation


    Before implementing a genetic algorithm it’s a good idea to first consider if
    a genetic algorithm is the right approach for the task at hand. Often there will
    be better techniques to solve specific optimization problems, usually by taking
    advantage of some domain dependent heuristics. Genetic algorithms are domain independent,
    or “weak methods”, which can be applied to problems without requiring any specific
    prior knowledge to assist with its search process. For this reason, if there isn’t
    any known domain specific knowledge available to help guide the search process,
    a genetic algorithm can still be applied to discover potential solutions.


    When it has been determined that a weak search method is appropriate, the type
    of weak method used should also be considered. This could simply be because an
    alternative method provides better results on average, but it could also be because
    an alternative method is easier to implement, requires less computational resources,
    or can find a good enough result in a shorter time period.


    ## Pseudo Code for a Basic Genetic Algorithm


    The pseudo code for a basic genetic algorithm is as follows:


    ```

    1: generation = 0;

    2: population[generation] = initializePopulation(populationSize);

    3: evaluatePopulation(population[generation]);

    3: While isTerminationConditionMet() == false do

    4:     parents = selectParents(population[generation]);

    5:    population[generation+1] = crossover(parents);

    6:   population[generation+1] = mutate(population[generation+1]);

    7:    evaluatePopulation(population[generation]);

    8:     generation++;

    9: End loop;

    ```


    The pseudo code begins with creating the genetic algorithm’s initial population.
    This population is then evaluated to find the fitness values of its individuals.
    Next, a check is run to decide if the genetic algorithm’s termination condition
    has been met. If it hasn’t, the genetic algorithm begins looping and the population
    goes through its first round of crossover and mutation before finally being reevaluated.
    From here, crossover and mutation are continuously applied until the termination
    condition is met, and the genetic algorithm terminates.


    This pseudo code demonstrates the basic process of a genetic algorithm; however
    it is necessary that we look at each step in more detail to fully understand how
    to create a satisfactory genetic algorithm.


    ## About the Code Examples in this Book


    Each chapter in this book is represented as a package in the accompanying Eclipse
    project. Each package will have, at minimum, four classes:


    *   A `GeneticAlgorithm` class, which abstracts the genetic algorithm itself and
    provides problem-specific implementations of interface methods, such as crossover,
    mutation, fitness evaluation, and termination condition checking.

    *   An `Individual` class, which represents a single candidate solution and its
    chromosome.

    *   A `Population` class, which represents a population or a generation of `Individual`s,
    and applies group-level operations to them.

    *   A class that contains the “main” method, some bootstrap code, the concrete
    version of the pseudocode above, and any supporting work that a specific problem
    may need. These classes will be named according to the problem it solves, e.g.
    `AllOnesGA`, `RobotController`, etc.


    The `GeneticAlgorithm`, `Population`, and `Individual` classes that you initially
    write in this chapter will need to be modified for each of the following chapters
    in this book.


    You could imagine that these classes are actually concrete implementations of
    interfaces such as `GeneticAlgorithmInterface`, `PopulationInterface`, and `IndividualInterface`–however,
    we’ve kept the layout of the Eclipse project simple and avoided using interfaces.


    The `GeneticAlgorithm` classes you’ll find throughout this book will always implement
    a number of important methods such as `calcFitness`, `evalPopulation`, `isTerminationConditionMet`,
    `crossoverPopulation`, and `mutatePopulation`. However, the contents of these
    methods will be slightly different in each chapter, based on the requirements
    of the problem at hand.


    While following the examples in this book we recommend copying the `GeneticAlgorithm`,
    `Population`, and `Individual` classes over to each new problem, as some methods’
    implementations will remain the same from chapter to chapter, but others will
    differ.


    Also, be sure to read the comments in the source code in the attached Eclipse
    project! To save space in the book we’ve left long comments and docblocks out,
    but have taken great care to annotate the source code thoroughly in the Eclipse
    file available for download. It’s like having a second book to read!


    In many cases, the chapters in this book will ask you to add or modify a single
    method in a class. Generally, it doesn’t matter where in a file you add a new
    method, so in these cases we’ll either omit the rest of the class from the example,
    or we’ll show function signatures only to help keep you on track.


    ## Basic Implementation


    To remove any unnecessary details and keep the initial implementation easy to
    follow, the first genetic algorithm we will cover in this book will be a simple
    binary genetic algorithm.


    Binary genetic algorithms are relatively easy to implement and can be incredibly
    effective tools for solving a wide spectrum of optimization problems. As you may
    remember from [Chapter 1](#A978-1-4842-0328-6_1_Chapter.html), binary genetic
    algorithms were the original category of genetic algorithm proposed by Holland
    (1975).


    ### The Problem


    First, let’s review the “all ones” problem, a very basic problem that can be solved
    using a binary genetic algorithm.


    The problem isn’t very interesting, but it serves its role as being a simple problem
    which helps emphasize the fundamental techniques involved. As the name suggests,
    the problem is simply finding a string which is comprised entirely of ones. So
    for a string with a length of 5 the best solution would be, `11111`.'
