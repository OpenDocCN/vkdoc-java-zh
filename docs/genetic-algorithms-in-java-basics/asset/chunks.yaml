- fmt: '# Summary


    In this chapter, we have covered the basics of class scheduling using genetic
    algorithms. Rather than using a genetic algorithm to find an optimal solution,
    we used a genetic algorithm to find the first valid solution that satisfies a
    number of hard constraints.


    We also explored a new mutation tactic that ensures mutated chromosomes remain
    valid. Instead of modifying the chromosome directly and adding randomness—which
    may have led to invalid chromosomes in this case—we created a known-valid random
    `Individual` and swapped genes with it in a style reminiscent to uniform crossover.
    This algorithm is still considered uniform mutation, however the new approach
    used in this chapter made it easier to ensure valid mutation.


    We also combined uniform crossover from [Chapter 2](#A978-1-4842-0328-6_2_Chapter.html)
    with tournament selection from [Chapter 3](#A978-1-4842-0328-6_3_Chapter.html),
    showing that many aspects of genetic algorithms are modular, independent, and
    able to be combined in different ways.


    Finally, we discussed the flexibility of the fitness score in genetic algorithms.
    We learned that the non-dimensional fitness score can be used to introduce soft
    constraints and reconcile them with hard constraints, with the ultimate goal of
    producing not just valid results, but high-quality results as well.


    # Optimization


    In this chapter we will explore different techniques that are frequently used
    to optimize genetic algorithms. Additional optimization techniques become increasingly
    important as the problem being solved becomes more complex. A well-optimized algorithm
    can save hours or even days when solving larger problems; for this reason, optimization
    techniques are essential when the problem reaches a certain level of complexity.


    In addition to exploring some common optimization techniques, this chapter will
    also cover a few implementation examples using the genetic algorithms from the
    previous chapters’ case studies.


    ## Adaptive Genetic Algorithms


    Adaptive genetic algorithms (AGA) are a popular subset of genetic algorithms which
    can provide significant performance improvements over standard implementations
    when used in the right circumstances. As we have come to learn in the previous
    chapters, a key factor which determines how well a genetic algorithm will perform
    is the way in which its parameters are configured. We have already discussed the
    importance of finding the right values for the mutation rate and crossover rate
    when constructing an efficient genetic algorithm. Typically, configuring the parameters
    will require some trial and error, together with some intuition, before eventually
    reaching a satisfactory configuration. Adaptive genetic algorithms are useful
    because they can assist in the tuning of these parameters automatically by adjusting
    them based on the state of the algorithm. These parameter adjustments take place
    while the genetic algorithm is running, hopefully resulting in the best parameters
    being used at any specific time during execution. It’s this continuous adaptive
    adjustment of the algorithm’s parameters which will often result in a performance
    improvement for the genetic algorithm.


    Adaptive genetic algorithms use information such as the average population fitness
    and the population’s current best fitness to calculate and update its parameters
    in a way that best suits its present state. For example, by comparing any specific
    individual to the current fittest individual in the population, it’s possible
    to gauge how well that individual is performing in relation to the current best.
    Typically, we want to increase the chance of preserving individuals that are performing
    well and reduce the chance of preserving individuals that don’t perform well.
    One way we can do this is by allowing the algorithm to adaptively update the mutation
    rate.


    Unfortunately, it’s not quite that simple. After a while, the population will
    start to converge and individuals will begin to fall nearer to a single point
    in the search space. When this happens, the progress of the search can stall as
    there is very little difference between individuals. In this event, it can be
    effective to raise the mutation rate slightly, encouraging the search of alternative
    areas within the search space.


    We can determine if the algorithm has begun to converge by calculating the difference
    between the current best fitness and the average population fitness. When the
    average population fitness is close to the current best fitness, we know the population
    has started to converge around a small area of the search space.


    Adaptive genetic algorithms can be used to adjust more than just the mutation
    rate however. Similar techniques can be applied to adjust other parameters of
    the genetic algorithm such as the crossover rate to provide further improvements
    as needed.'
