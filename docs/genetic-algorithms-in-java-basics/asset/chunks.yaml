    The Population and Individual classes can be left alone for now, but keep in mind
    that you’ll be adding a new constructor to each one of these files later in the
    chapter.


    ### Encoding


    The encoding we use in our class scheduling application will need to be capable
    of efficiently encoding all of the class properties we require. For this implementation,
    they are: the timeslot the class is scheduled for, the professor teaching the
    class, and the classroom for the class.


    We can simply assign a numerical ID to each timeslot, professor and classroom.
    We can then use a chromosome that encodes an array of integers—our familiar approach.
    This means each class that needs scheduling will only require three integers to
    encode it as shown below:


    ![A978-1-4842-0328-6_5_Figa_HTML.jpg](A978-1-4842-0328-6_5_Figa_HTML.jpg)


    By splitting this array into chucks of three, we can retrieve all of the information
    we need for each class.


    ### Initialization


    Now that we have an understanding of our problem and how we’re going to encode
    the chromosome, we can begin the implementation. First, we’ll need to create some
    data for our scheduler to work with: in particular, the rooms, professors, timeslots,
    modules and student groups that we’re trying to build a timetable around.


    Usually this data comes from a database containing the complete course module
    and student data. However, for the purpose of this implementation we will create
    some hard-coded dummy data to work with.


    Let’s first set up our supporting Java classes. We’ll create a container class
    for each of the data types above (room, class, group, professor, module, and timeslot).
    While each of these container classes is very simple—they mostly define some class
    properties, getters, and setters, with no real logic. We’ll print each of them
    in turn here.


    First, create a Room class that stores information about a classroom. As always,
    if using Eclipse, you can create this class using the File ➤ New ➤ Class menu
    option.


    `package chapter` `5` `;`


    `public class Room {`


    `private final int roomId;`


    `private final String roomNumber;`


    `private final int capacity;`


    `public Room(int roomId, String roomNumber, int capacity) {`


    `this.roomId = roomId;`


    `this.roomNumber = roomNumber;`


    `this.capacity = capacity;`


    `}`


    `public int getRoomId() {`


    `return this.roomId;`


    `}`


    `public String getRoomNumber() {`


    `return this.roomNumber;`


    `}`


    `public int getRoomCapacity() {`


    `return this.capacity;`


    `}`


    `}`


    This class contains a constructor, which accepts a room ID, a room number and
    the room capacity. It also provides methods to get the room’s properties.


    Next, create a Timeslot class; the timeslot represents the day of week and time
    that a class takes place.


    `package chapter` `5` `;`


    `public class Timeslot {`


    `private final int timeslotId;`


    `private final String timeslot;`


    `public Timeslot(int timeslotId, String timeslot){`


    `this.timeslotId = timeslotId;`


    `this.timeslot = timeslot;`


    `}`


    `public int getTimeslotId(){`


    `return this.timeslotId;`


    `}`


    `public String getTimeslot(){`


    `return this.timeslot;`


    `}`


    `}`


    A timeslot can be created using the constructor and passing it a timeslot ID and
    the timeslot details as a string (the details might look like “Mon 9:00 – 10:00”).
    The class also contains getters to fetch the object’s properties.


    The third class to set up is the Professor class:


    `package chapter` `5` `;`


    `public class Professor {`


    `private final int professorId;`


    `private final String professorName;`


    `public Professor(int professorId, String professorName){`


    `this.professorId = professorId;`


    `this.professorName = professorName;`


    `}`


    `public int getProfessorId(){`


    `return this.professorId;`


    `}`


    `public String getProfessorName(){`


    `return this.professorName;`


    `}`


    `}`


    The Professor class contains a constructor accepting a professor ID and professor
    name; it also contains getter methods to retrieve the professor’s properties.


    Next, add a Module class to store information about the course modules. A “module”
    is what some might call a “course”, like “Calculus 101” or “American History 302”,
    and like real-life courses, can have multiple sections and groups of students
    taking the course at different times of the week with different professors.


    `package chapter` `5` `;`


    `public class Module {`


    `private final int moduleId;`


    `private final String moduleCode;`


    `private final String module;`


    `private final int professorIds[];`


    `public Module(int moduleId, String moduleCode, String module, int professorIds[]){`


    `this.moduleId = moduleId;`


    `this.moduleCode = moduleCode;`


    `this.module = module;`


    `this.professorIds = professorIds;`


    `}`


    `public int getModuleId(){`


    `return this.moduleId;`


    `}`


    `public String getModuleCode(){`


    `return this.moduleCode;`


    `}`


    `public String getModuleName(){`


    `return this.module;`


    `}`


    `public int getRandomProfessorId(){`


    `int professorId = professorIds[(int) (professorIds.length * Math.random())];`


    `return professorId;`


    `}`


