  raw: '### Elitism


    Before discussing mutation, let’s take a look at the “elitismCount” parameter
    we introduced in the crossover method.


    A basic genetic algorithm will often lose the best individuals in a population
    between generations due to the effects of the crossover and mutation operators.
    However, we need these operators to find better solutions. To see this problem
    in action, simply edit your genetic algorithm’s code to print the fitness of the
    fittest individual over each generation. You’ll notice that although it will typically
    go up, there are occasions when the fittest solution is lost and replaced with
    a less optimal one during crossover and mutation.


    One simple optimization technique used to tackle this problem is to always allow
    the fittest individual, or individuals, to be added unaltered to the next generation’s
    population. This way the best individuals are no longer lost from generation to
    generation. Although these individuals don’t have crossover applied to them, they
    can still be selected as a parent for another individual allowing their genetic
    information to still be shared with others in the population. This process of
    retaining the best for the next generation is called elitism.


    Typically, the optimal number of ‘elite’ individuals in a population will be a
    very small proportion of the total population size. This is because if the value
    is too high, it will slow down the genetic algorithm’s search process due to a
    lack of genetic diversity caused by preserving too many individuals. Similarly
    to the other parameters discussed previously, it’s important to find a balance
    for optimal performance.


    Implementing elitism is simple in both crossover and mutation contexts. Let’s
    revisit the conditional in crossoverPopulation( ) that checks to see if crossover
    should be applied:


    `// Apply crossover to this individual?`


    `if (this.crossoverRate > Math.random() && populationIndex >= this.elitismCount)
    {`


          `// ...`


    `}`


    Crossover is only applied if both the crossover conditional is met and the individual
    is not considered elite.


    What makes an individual elite? At this point, the individuals in the population
    have already been sorted by their fitness, so the strongest individuals have the
    lowest indices. Therefore, if we want three elite individuals, we should skip
    indices 0-2 from consideration. This will preserve the strongest individuals and
    let them pass through to the next generation unmodified. We’ll use the same exact
    conditional in the mutation code to follow.


    ### Mutation


    The last thing we need to add to complete the evolution process is mutation. Like
    crossover, there are many different mutation methods to choose from. When using
    binary strings one of the more common methods is called bit flip mutation. As
    you may have guessed, bit flip mutation involves flipping the value of the bit
    from 1 to 0, or from 0 to 1, depending on its initial value. When the chromosome
    is encoded using some other representation, a different mutation method would
    usually be implemented to make better use of the encoding.


    One of the most important factors in selecting mutation and crossover methods
    is to make sure that the method you’ve selected still yields a valid solution.
    We’ll see this concept in action in later chapters, but for this problem we simply
    need to make sure that 0 and 1 are the only possible values a gene can mutate
    to. A gene mutating to, say, 7 would give us an invalid solution.


    This advice seems moot and over-obvious in this chapter, but consider a different
    simple problem where you need to order the numbers one through six without repeating
    (i.e., end up with “123456”). A mutation algorithm that simply chose a random
    number between one and six could yield “126456”, using “6” twice, which would
    be an invalid solution because each number can only be used once. As you can see,
    even simple problems sometimes require sophisticated techniques.


    Similarly to crossover, mutation is applied to the individual based on the mutation
    rate. If the mutation rate is set to 0.1 then each gene has a 10% chance of being
    mutated during the mutation stage.


    Let’s go ahead and add the mutation function to our GeneticAlgorithm class. We
    can add this anywhere:


    `public Population mutatePopulation(Population population) {`


    `// Initialize new population`


    `Population newPopulation = new Population(this.populationSize);`


    `// Loop over current population by fitness`


    `for (int populationIndex = 0; populationIndex < population.size(); populationIndex++)
    {`


    `Individual individual = population.getFittest(populationIndex);`


    `// Loop over individual’s genes`


    `for (int geneIndex = 0; geneIndex < individual.getChromosomeLength(); geneIndex++)
    {`


    `// Skip mutation if this is an elite individual`


    `if (populationIndex >= this.elitismCount) {`


    `// Does this gene need mutation?`


    `if (this.mutationRate > Math.random()) {`


    `// Get new gene`


    `int newGene = 1;`


    `if (individual.getGene(geneIndex) == 1) {`


    `newGene = 0;`


    `}`


    `// Mutate gene`


    `individual.setGene(geneIndex, newGene);`


    `}`


    `}`


    `}`


    `// Add individual to population`


    `newPopulation.setIndividual(populationIndex, individual);`


    `}`


    `// Return mutated population`


    `return newPopulation;`


    `}`


    The mutatePopulation( ) method starts by creating a new empty population for the
    mutated individuals and then begins to loop over the current population. Each
    individual’s chromosome is then looped over and each gene is considered for bit
    flip mutation using the mutation rate. When the entire chromosome of an individual
    has been looped over, the individual is then added to the new mutation population.
    When all individuals have gone through the mutation process the mutated population
    is returned.


    Now we can complete the final step of the evolution loop by adding the mutate
    function to the main method. The finished main method is as follows. There are
    only two differences from the last time: first, we’ve added the call to mutatePopulation(
    ) below the “Apply mutation” comment. Also, we’ve changed the “elitismCount” parameter
    in the “new GeneticAlgorithm” constructor from 0 to 2, now that we understand
    how elitism works.


    `package chapter2;`


    `public class AllOnesGA {`


    `public static void main(String[] args) {`


    `// Create GA object`


    `GeneticAlgorithm ga = new GeneticAlgorithm(100, 0.001, 0.95, 2);`


    `// Initialize population`


    `Population population = ga.initPopulation(50);`


    `// Evaluate population`


    `ga.evalPopulation(population);`


    `// Keep track of current generation`


    `int generation = 1;`


    `while (ga.isTerminationConditionMet(population) == false) {`


    `// Print fittest individual from population`


    `System.out.println("Best solution: " + population.getFittest(0).toString());`


    `// Apply crossover`


    `population = ga.crossoverPopulation(population);`


    `// Apply mutation`


    `population = ga.mutatePopulation(population);`


    `// Evaluate population`


    `ga.evalPopulation(population);`


    `// Increment the current generation`


    `generation++;`


    `}`


    `System.out.println("Found solution in " + generation + " generations");`


    `System.out.println("Best solution: " + population.getFittest(0).toString());`


    `}`


    `}`'
