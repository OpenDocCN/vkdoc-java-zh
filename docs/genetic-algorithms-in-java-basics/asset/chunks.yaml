    ## 摘要


    遗传算法可用于设计复杂的控制器，而人工手动设计这类控制器可能既困难又耗时。机器人控制器通过适应度函数进行评估，该函数通常会模拟机器人及其所处环境，从而无需进行物理测试即可节省时间。


    通过为机器人提供一个迷宫和一条优选路径，可以应用遗传算法来寻找一个控制器，使其能够利用机器人的传感器成功导航穿越迷宫。这可以通过在个体的染色体编码中为每个传感器分配一个动作来实现。通过交叉和变异进行微小的随机改变，并在选择过程的引导下，逐步找到更优的控制器。


    锦标赛选择是遗传算法中较为流行的选择方法之一。其工作原理是从种群中随机挑选预定数量的个体，然后比较所选个体的适应度值以找出最佳个体。适应度值最高的个体“赢得”锦标赛，并被作为选中的个体返回。较大的锦标赛规模会导致较高的选择压力，在选择最佳锦标赛规模时需要仔细权衡。


    当一个个体被选中后，它将经历交叉；可用的交叉方法之一是单点交叉。在这种交叉方法中，染色体会随机选取一个点，该点之前的遗传信息来自父本 A，该点之后的遗传信息来自父本
    B。这会产生父本遗传信息的合理随机混合，但通常更常用的是改进后的两点交叉法。在两点交叉中，会选取一个起点和一个终点，用于确定来自父本 A 的遗传信息，而剩余的遗传信息则来自父本
    B。


    ### 练习


    1.  添加第二个终止条件，当路线被完全探索时终止算法。

    2.  使用不同的锦标赛规模运行算法。研究性能如何受到影响。

    3.  为锦标赛选择方法添加一个选择概率。使用不同的概率设置进行测试。检查它如何影响遗传算法的性能。

    4.  实现两点交叉。它能改善结果吗？


    # 旅行商问题


    ## 引言


    在本章中，我们将探讨旅行商问题以及如何使用遗传算法来解决它。在此过程中，我们将研究旅行商问题的特性，以及如何利用这些特性来设计遗传算法。


    旅行商问题（TSP）是一个经典的优化问题，其研究历史可追溯到 19 世纪。旅行商问题涉及寻找一条经过一系列城市的最有效路线，每个城市恰好访问一次。


    旅行商问题通常被描述为优化经过一系列城市的路线；然而，旅行商问题也可以应用于其他领域。例如，城市的概念可以看作是某些应用中的客户，甚至是微芯片上的焊点。距离的概念也可以修改，以考虑时间等其他约束条件。


    在最简单的形式中，城市可以表示为图上的节点，城市之间的距离由边的长度表示（见图 4-1）。“路线”或“旅程”简单地定义了应该使用哪些边以及以何种顺序使用。然后，可以通过对路线中使用的边的长度求和来计算路线的得分。


    ![A978-1-4842-0328-6_4_Fig1_HTML.jpg](img/A978-1-4842-0328-6_4_Fig1_HTML.jpg)


    图 4-1.


    我们的图表显示了城市及它们之间的相应距离


    在 20 世纪，许多数学家和科学家研究了旅行商问题；然而，直到今天，这个问题仍未得到解决。产生旅行商问题最优解的唯一有保证的方法是使用暴力算法。暴力算法是一种旨在系统地尝试每一种可能解的算法。然后，从完整的候选解集中找到最优解。尝试用暴力算法解决旅行商问题是一项极其困难的任务，因为随着城市数量的增加，潜在解的数量会经历阶乘增长。阶乘函数的增长速度甚至比指数函数还要快，这就是为什么暴力破解旅行商问题如此困难的原因。例如，对于
    5 个城市，有 120 种可能的解（1x2x3x4x5），而对于 10 个城市，这个数字将增加到 3,628,800 种解！到 15 个城市时，解的数量超过一万亿。到
    60 个城市时，可能的解的数量比可观测宇宙中的原子还要多。


    当城市数量很少时，暴力算法可以用来寻找最优解，但随着城市数量的增加，这变得越来越具有挑战性。即使应用技术来移除反向和重复的路线，在合理的时间内找到最优解仍然很快变得不可行。


    实际上，我们知道通常不需要找到最优解，因为一个足够好的解通常就足够了。有许多不同的算法可以快速找到可能仅比最优解差几个百分点的解。其中一种较常用的算法是最近邻算法。使用该算法，随机选择一个起始城市。然后，找到下一个最近的未访问城市，并将其选为路线中的第二个城市。重复选择下一个最近的未访问城市的过程，直到所有城市都被访问过，并找到一条完整的路线。事实证明，最近邻算法在产生合理解方面出奇地有效，这些解的得分在最优解的一小部分范围内。更好的是，这可以在非常短的时间内完成。这些特性使其在许多情况下成为一种有吸引力的解决方案，并且可能是遗传算法的一种替代方案。


    ## 问题


    在此实现中，我们将要解决的是一个典型的旅行商问题，即需要优化一条经过一系列城市的路线。我们可以通过将每个城市设置为随机的 x、y 位置，在二维空间中生成一定数量的随机城市。


    在计算两个城市之间的距离时，我们将简单地使用城市之间的最短直线距离作为距离。我们可以用以下公式计算这个距离：


    ![$$ Dis \tan ce=\sqrt{{\left({x}_a-{x}_b\right)}²+{\left({y}_a-{y}_b\right)}²}
    $$](img/A978-1-4842-0328-6_4_Chapter_TeX2GIF_Equa.gif)


    通常，问题会比这更复杂。在这个例子中，我们假设每个城市之间存在一条直接的理想路径；这也被称为“欧几里得距离”。这通常不是典型情况，因为可能存在各种障碍物，使得实际最短路径比欧几里得距离长得多。我们还假设从城市
    A 到城市 B 所需的时间与从城市 B 到城市 A 所需的时间相同。同样，在现实中这种情况很少见。通常会有单向道路等障碍物，影响沿特定方向行进时城市之间的距离。城市间距离随方向变化而变化的旅行商问题实现被称为非对称旅行商问题。


    ## 实现


    是时候利用我们对遗传算法的知识来着手解决这个问题了。为此问题设置一个新的 Java/Eclipse 包后，我们将从编码路线开始。

