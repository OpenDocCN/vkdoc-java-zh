    \ in all of the previous chapters – so it’s especially important to follow this\
    \ section closely!\n\nBefore you start, create a new Eclipse or NetBeans project,\
    \ or create a new package in your existing project for this book called `chapter5`.\n\
    \nCopy the `Individual`, `Population`, and `GeneticAlgorithm` classes over from\
    \ `chapter4` and import them into `chapter5`. Make sure to update the package\
    \ name at the top of each class file! They should all say `package chapter5` at\
    \ the very top.\n\nOpen the `GeneticAlgorithm` class and make the following changes:\n\
    \n- Delete the `selectParent` method, and replace it with the `selectParent` method\
    \ from chapter 3 (tournament selection)\n- Delete the `crossoverPopulation` method,\
    \ and replace it with the `crossoverPopulation` method from chapter 2 (uniform\
    \ crossover)\n- Delete the `initPopulation`, `mutatePopulation`, `evalPopulation`,\
    \ and `calcPopulation` methods – you’ll re-implement them in this chapter\n\n\
    The `Population` and `Individual` classes can be left alone for now, but keep\
    \ in mind that you’ll be adding a new constructor to each one of these files later\
    \ in the chapter.\n\n### Encoding\n\nThe encoding we use in our class scheduling\
    \ application will need to be capable of efficiently encoding all of the class\
    \ properties we require. For this implementation, they are: the timeslot the class\
    \ is scheduled for, the professor teaching the class, and the classroom for the\
    \ class.\n\nWe can simply assign a numerical ID to each timeslot, professor and\
    \ classroom. We can then use a chromosome that encodes an array of integers—our\
    \ familiar approach. This means each class that needs scheduling will only require\
    \ three integers to encode it as shown below:\n\n![A978-1-4842-0328-6_5_Figa_HTML.jpg](A978-1-4842-0328-6_5_Figa_HTML.jpg)\n\
    \nBy splitting this array into chucks of three, we can retrieve all of the information\
    \ we need for each class.\n\n### Initialization\n\nNow that we have an understanding\
    \ of our problem and how we’re going to encode the chromosome, we can begin the\
    \ implementation. First, we’ll need to create some data for our scheduler to work\
    \ with: in particular, the rooms, professors, timeslots, modules and student groups\
    \ that we’re trying to build a timetable around.\n\nUsually this data comes from\
    \ a database containing the complete course module and student data. However,\
    \ for the purpose of this implementation we will create some hard-coded dummy\
    \ data to work with.\n\nLet’s first set up our supporting Java classes. We’ll\
    \ create a container class for each of the data types above (room, class, group,\
    \ professor, module, and timeslot). While each of these container classes is very\
    \ simple—they mostly define some class properties, getters, and setters, with\
    \ no real logic. We’ll print each of them in turn here.\n\nFirst, create a `Room`\
    \ class that stores information about a classroom. As always, if using Eclipse,\
    \ you can create this class using the `File ➤ New ➤ Class` menu option.\n\n```java\n\
    package chapter5;\n\npublic class Room {\n\n    private final int roomId;\n  \
    \  private final String roomNumber;\n    private final int capacity;\n\n    public\
    \ Room(int roomId, String roomNumber, int capacity) {\n        this.roomId = roomId;\n\
    \        this.roomNumber = roomNumber;\n        this.capacity = capacity;\n  \
    \  }\n\n    public int getRoomId() {\n        return this.roomId;\n    }\n\n \
    \   public String getRoomNumber() {\n        return this.roomNumber;\n    }\n\n\
    \    public int getRoomCapacity() {\n        return this.capacity;\n    }\n}\n\
    ```\n\nThis class contains a constructor, which accepts a room ID, a room number\
    \ and the room capacity. It also provides methods to get the room’s properties.\n\
    \nNext, create a `Timeslot` class; the timeslot represents the day of week and\
    \ time that a class takes place.\n\n```java\npackage chapter5;\n\npublic class\
    \ Timeslot {\n\n    private final int timeslotId;\n    private final String timeslot;\n\
    \n    public Timeslot(int timeslotId, String timeslot) {\n        this.timeslotId\
    \ = timeslotId;\n        this.timeslot = timeslot;\n    }\n\n    public int getTimeslotId()\
    \ {\n        return this.timeslotId;\n    }\n\n    public String getTimeslot()\
    \ {\n        return this.timeslot;\n    }\n}\n```\n\nA timeslot can be created\
    \ using the constructor and passing it a timeslot ID and the timeslot details\
    \ as a string (the details might look like `Mon 9:00 – 10:00`). The class also\
    \ contains getters to fetch the object’s properties.\n\nThe third class to set\
    \ up is the `Professor` class:\n\n```java\npackage chapter5;\n\npublic class Professor\
    \ {\n\n    private final int professorId;\n    private final String professorName;\n\
    \n    public Professor(int professorId, String professorName) {\n        this.professorId\
    \ = professorId;\n        this.professorName = professorName;\n    }\n\n    public\
    \ int getProfessorId() {\n        return this.professorId;\n    }\n\n    public\
    \ String getProfessorName() {\n        return this.professorName;\n    }\n}\n\
    ```\n\nThe `Professor` class contains a constructor accepting a professor ID and\
    \ professor name; it also contains getter methods to retrieve the professor’s\
    \ properties.\n\nNext, add a `Module` class to store information about the course\
    \ modules. A “module” is what some might call a “course”, like “Calculus 101”\
    \ or “American History 302”, and like real-life courses, can have multiple sections\
    \ and groups of students taking the course at different times of the week with\
    \ different professors.\n\n```java\npackage chapter5;\n\npublic class Module {\n\
    \n    private final int moduleId;\n    private final String moduleCode;\n    private\
    \ final String module;\n    private final int professorIds[];\n\n    public Module(int\
    \ moduleId, String moduleCode, String module, int professorIds[]) {\n        this.moduleId\
    \ = moduleId;\n        this.moduleCode = moduleCode;\n        this.module = module;\n\
    \        this.professorIds = professorIds;\n    }\n\n    public int getModuleId()\
    \ {\n        return this.moduleId;\n    }\n\n    public String getModuleCode()\
    \ {\n        return this.moduleCode;\n    }\n\n    public String getModuleName()\
    \ {\n        return this.module;\n    }\n\n    public int getRandomProfessorId()\
    \ {\n        int professorId = professorIds[(int) (professorIds.length * Math.random())];\n\
    \        return professorId;\n    }\n}\n```"
