    `}`


    `}`


    The City class has a constructor that takes an x and y coordinate to create a
    city on a 2D plane. The class also contains a distanceFrom method that calculates
    the straight-line distance from the current city to another city using the Pythagorean
    Theorem. Finally, there are two getter methods which can be used to retrieve the
    city’s x and y position.


    Next, we should reinstate the Individual class constructor we deleted in the “Before
    You Start” section. The traveling salesman problem has different constraints on
    the chromosome from those of our last two problems. Recall that the only constraints
    in the robot controller problem were that the chromosome must be 128 bits long,
    and that it must be binary.


    Unfortunately, this is not the case with the traveling salesman problem; the constraints
    are more involved and dictate the initialization, crossover, and mutation techniques
    we can use. In this case, the chromosome must be of a certain length (however
    long the city tour is), but an additional constraint is that each city must be
    visited once and only once, otherwise the chromosome is invalid. There can be
    no duplicate genes in the chromosome, and there can be no omitted cities in the
    chromosome.


    We can easily create a naïve Individual constructor without any randomness. Simply
    create a chromosome with each city’s index in it: 1, 2, 3, 4, 5, 6…, etc. Randomizing
    the initial chromosome is an exercise for the reader at the end of the chapter.


    Add the following constructor to the Individual class. You can place this anywhere
    you like, but near the top is a good location for constructors. As always, comments
    and docblocks have been omitted here, but please see the provided Eclipse project
    accompanying this book for additional commentary.


