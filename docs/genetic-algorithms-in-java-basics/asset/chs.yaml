  在上述虚拟染色体中，第一对（位置 0）代表当传感器输入总和为 0 时（即所有传感器均未触发）要执行的动作。第二对（位置 1）代表当传感器输入总和为 1 时（即只有前传感器检测到墙壁）要执行的动作。第三对（位置
  2）代表仅左前传感器被触发的情况。第四对（位置 3）代表前传感器和左前传感器同时被触发的情况。以此类推，直到最后一对（位置 63），它代表所有传感器都被触发的情况。


