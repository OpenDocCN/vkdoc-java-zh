  `// 该基因是否需要变异？`


  `if (this.mutationRate > Math.random()) {`


  将其改为包含新的温度变量：


  `// 该基因是否需要变异？`


  `if ((this.mutationRate * this.getTempature()) > Math.random()) {`


  最后，更新执行类“main”方法中的遗传算法循环代码，使其在每一代结束时运行 `coolTemperature()` 函数。同样，你可能需要调整初始变异率，因为它现在将根据温度值充当一个最大变异率。


