  将 Individual、Population 和 GeneticAlgorithm 类从第 3 章复制过来，并导入到 chapter4 中。请务必更新每个类文件顶部的包名！它们的最顶部都应显示“package
  chapter4”。


  打开 GeneticAlgorithm 类，删除以下方法：`calcFitness`、`evalPopulation`、`crossoverPopulation`
  和 `mutatePopulation`。你将在本章的学习过程中重写这些方法。


  接下来，打开 Individual 类，删除签名为“public Individual(int chromosomeLength)”的构造函数。Individual
  类中有两个构造函数，请小心删除正确的那一个！要删除的构造函数是随机初始化染色体的那个；你也将在本章中重写它。


  来自第 3 章的 Population 类除了文件顶部的包名外，无需其他修改。


  ### 编码


  本例中选择的编码需要能够按顺序对城市列表进行编码。我们可以通过为每个城市分配一个唯一 ID，然后使用染色体按照候选路线的顺序引用它来实现这一点。这种使用基因序列的编码方式被称为排列编码，非常适合解决旅行商问题。


  我们需要做的第一件事是为我们的城市分配唯一 ID。如果有 5 个城市需要访问，我们可以简单地将它们分配为 ID：1,2,3,4,5。然后，当遗传算法找到一条路线时，我们的染色体可能会将城市
  ID 排序如下：3,4,1,2,5。这仅仅意味着我们将从城市 3 出发，然后前往城市 4，接着是城市 1，然后是城市 2，最后是城市 5，之后再返回城市 3 以完成整个路线。


  ### 初始化


  在开始优化路线之前，我们需要创建一些城市。如前所述，我们可以通过随机选取 x,y 坐标来生成随机城市，并用它们来定义城市位置。


  首先，我们需要创建一个 City 类，它可以创建并存储一个城市，以及计算到另一个城市的最短距离。


  `package chapter4;`


  `public class City {`


  `private int x;`


  `private int y;`


  `public City(int x, int y) {`


  `this.x = x;`


  `this.y = y;`


  `}`


  `public double distanceFrom(City city) {`


  `// 计算 x,y 的差值`


  `double deltaXSq = Math.pow((city.getX() - this.getX()), 2);`


  `double deltaYSq = Math.pow((city.getY() - this.getY()), 2);`


  `// 计算最短路径`


  `double distance = Math.sqrt(Math.abs(deltaXSq + deltaYSq));`


  `return distance;`


  `}`


  `public int getX() {`


  `return this.x;`


  `}`


  `public int getY() {`


  `return this.y;`


  `}`


  `}`


  City 类有一个构造函数，它接受 x 和 y 坐标来在二维平面上创建一个城市。该类还包含一个 `distanceFrom` 方法，该方法使用勾股定理计算从当前城市到另一个城市的直线距离。最后，有两个
  getter 方法可用于获取城市的 x 和 y 位置。


  接下来，我们应该恢复在“开始之前”部分删除的 Individual 类构造函数。旅行商问题对染色体的约束与我们前两个问题不同。回想一下，机器人控制器问题中唯一的约束是染色体必须为
  128 位长，并且必须是二进制的。


  不幸的是，旅行商问题并非如此；其约束更为复杂，并且决定了我们可以使用的初始化、交叉和变异技术。在这种情况下，染色体必须具有特定的长度（与城市巡游的长度相同），但还有一个额外的约束：每个城市必须且只能被访问一次，否则染色体无效。染色体中不能有重复的基因，也不能遗漏任何城市。


  我们可以轻松地创建一个简单的 Individual 构造函数，而不需要任何随机性。只需创建一个包含每个城市索引的染色体：1, 2, 3, 4, 5, 6…等等。随机化初始染色体将作为本章末尾留给读者的练习。


