  ### 评估


  在评估阶段，种群中的每个个体都会计算其适应度值并存储起来供后续使用。为了计算个体的适应度，我们使用一个称为“适应度函数”的函数。


  遗传算法通过使用选择来引导进化过程朝向更优的个体。正是因为适应度函数使得这种选择成为可能，所以设计良好的适应度函数至关重要，它能为个体的适应度提供准确的值。如果适应度函数设计不佳，可能会花费更长时间才能找到满足最低标准的解，甚至可能完全无法找到可接受的解。


  适应度函数通常是遗传算法中计算量最大的部分。因此，适应度函数也必须得到良好优化，这有助于防止瓶颈，并使算法能够高效运行。


  每个特定的优化问题都需要一个独特开发的适应度函数。在我们全一问题的示例中，适应度函数相当直接，只需计算个体染色体中 1 的数量即可。


  现在向 `GeneticAlgorithm` 类中添加一个 `calcFitness` 方法。该方法应计算染色体中 1 的数量，然后通过除以染色体长度将输出归一化到
  0 到 1 之间。你可以将此方法添加到 `GeneticAlgorithm` 类的任意位置，因此我们在下面省略了周围的代码：


  `public double calcFitness(Individual individual) {`


        `// 记录正确基因的数量`


        `int correctGenes = 0;`


        `// 遍历个体的基因`


        `for (int geneIndex = 0; geneIndex < individual.getChromosomeLength(); geneIndex++)
  {`


              `// 每找到一个 "1" 就加一个适应度点`


              `if (individual.getGene(geneIndex) == 1) {`


                    `correctGenes += 1;`


              `}`


        `}`


        `// 计算适应度`


        `double fitness = (double) correctGenes / individual.getChromosomeLength();`


        `// 存储适应度`


        `individual.setFitness(fitness);`


        `return fitness;`


  `}`


  我们还需要一个简单的辅助方法来遍历种群中的每个个体并对它们进行评估（即对每个个体调用 `calcFitness`）。我们将此方法命名为 `evalPopulation`，并将其也添加到
  `GeneticAlgorithm` 类中。它应该如下所示，同样，你可以将其添加到任意位置：


  `public void evalPopulation(Population population) {`


        `double populationFitness = 0;`


        `for (Individual individual : population.getIndividuals()) {`


              `populationFitness += calcFitness(individual);`


        `}`


        `population.setPopulationFitness(populationFitness);`


  `}`


