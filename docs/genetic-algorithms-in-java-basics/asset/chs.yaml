  getDistance 方法遍历路径数组（一个有序的城市对象数组），并依次调用 City 类的“distanceFrom”方法计算每两个城市之间的距离，同时累加距离值。


  为了实现这种适应度评分方法，我们需要更新 GeneticAlgorithm 类中的 calcFitness 函数。calcFitness 类应将距离计算委托给
