  100 个真实机器人的种群上运行 1000 代进化。你经常会在此类优化问题中看到像 Maze 和 Robot 这样的类，在这些问题中，先在软件中进行模拟，再在生产硬件上优化结果，是一种成本效益高的做法。


  回想一下，从技术上讲，是 Maze 类负责评估路径的适应度。然而，我们仍然需要在 GeneticAlgorithm 类中实现 calcFitness 方法。calcFitness
  方法并不直接计算适应度分数，而是负责将 Individual、Robot 和 Maze 类联系起来：它使用 Individual 的染色体（即传感器控制器指令集）创建一个新的
  Robot，并针对我们的 Maze 对其进行评估。


  请在 GeneticAlgorithm 类中编写以下 calcFitness 函数。和往常一样，此方法可以放在类中的任何位置。


  `public double calcFitness(Individual individual, Maze maze) {`


  `int[] chromosome = individual.getChromosome();`


  `Robot robot = new Robot(chromosome, maze, 100);`


  `robot.run();`


  `int fitness = maze.scoreRoute(robot.getRoute());`


  `individual.setFitness(fitness);`


  `return fitness;`


  `}`


  在这里，calcFitness 方法接受两个参数：individual 和 maze。它使用这两个参数创建一个新的机器人，并让其在迷宫中运行。然后，对机器人的路径进行评分，并将其存储为该个体的适应度。


  这段代码将创建一个机器人，将其放入我们的迷宫，并使用进化后的控制器进行测试。Robot 构造函数的最后一个参数是机器人允许移动的最大步数。这将防止它陷入死胡同或无限循环地移动。然后，我们可以简单地获取机器人路径的分数，并使用
  Maze 的 scoreRoute 方法将其作为适应度返回。


  有了可用的 calcFitness 方法，我们现在可以创建一个 evalPopulation 方法。回想一下第 2 章的内容，evalPopulation 方法只是遍历种群中的每个个体，并为该个体调用
  calcFitness，同时累加整个种群的适应度。实际上，本章的 evalPopulation 与第 2 章的几乎相同——但在本例中，我们还需要将 maze 对象传递给
  calcFitness 方法，因此需要稍作修改。


  将以下方法添加到 GeneticAlgorithm 类中，可以放在任何你喜欢的位置：


  `public void evalPopulation(Population population, Maze maze) {`


  `double populationFitness = 0;`


  `for (Individual individual : population.getIndividuals()) {`


  `populationFitness += this.calcFitness(individual, maze);`


  `}`


  `population.setPopulationFitness(populationFitness);`


  `}`


  此版本与第 2 章版本之间的唯一区别在于，它包含了第二个参数“Maze maze”，并且在调用 calcFitness 时也将“maze”作为第二个参数传递。


