  将传感器值映射到动作


  这种编码方案起初可能看起来有些晦涩难懂——而且染色体本身也不具备人类可读性——但它有几个有用的特性。首先，染色体可以作为一个位数组进行操作，而不是复杂的树结构或哈希映射，这使得交叉、变异和其他操作变得容易得多。其次，每一个
  128 位的值都是一个有效的解（尽管不一定是一个好的解）——本章稍后会详细介绍这一点。


