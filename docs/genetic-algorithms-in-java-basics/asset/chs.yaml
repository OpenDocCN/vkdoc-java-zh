  2.  使用不同的锦标赛规模运行算法。研究性能如何受到影响。

  3.  为锦标赛选择方法添加一个选择概率。使用不同的概率设置进行测试。检查它如何影响遗传算法的性能。

  4.  实现两点交叉。它能改善结果吗？


