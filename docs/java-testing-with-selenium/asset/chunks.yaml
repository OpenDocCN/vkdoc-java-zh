  trans: "\niframe\niframe 是嵌入在网站中另一个 HTML 文档中的 HTML 文档。iframe HTML 元素通常用于添加来自不同来源的内容。特别是，iframe\
    \ 用于将一个文档嵌入到另一个文档中，将嵌入的文档与主页面隔离开来。这种隔离有助于防止第三方内容干扰主页面的 DOM 或 JavaScript 环境。\n\
    你可以嵌入视频（例如 YouTube 视频）和 PDF 等文档。第三方小部件等等。对于测试自动化来说，了解 iframe 内的内容存在于一个独立的文档中至关重要。这意味着\
    \ Web 元素存储着 Web 元素。\n早期的 HTML 使用 frameset 标签，与现在的 iframe 标签类似，但它将浏览器窗口分割成多个包含不同\
    \ URL 的部分。这些分割后的窗口每个都被称为一个*框架*，显示不同的文档。与 iframe 不同，frameset 标签不能放置在页面的任意位置，并且由于其灵活性较低，frameset\
    \ 的使用逐渐减少。然而，iframe 仍然是现代 Web 开发中不可或缺的一部分。\n\n让我们来测试 iframe。\n\n```\n\nIframe\
    \ 示例\n\n这是主页面的内容。\n\n主页面的更多内容。\n\n```\n\n此示例使用了嵌入在 iframe 页面中的 [`https://www.selenium.dev/`](https://www.selenium.dev/)。已为\
    \ iframe 指定了高度和宽度。src 参数包含在 iframe 中显示的网站的 URL。\n\n图 7-1 展示了该 HTML 在网页上的显示效果。\n\
    \n![](img/608985_1_En_7_Fig1_HTML.jpg)\n\nSelenium 网站的截图。中心的文字如下：Selenium Conf\
    \ Chicago 2023 已圆满结束。Selenium 自动化浏览器。\n\n图 7-1\n显示 Selenium 网站的单个 iframe\n\nSelenium\
    \ 网站由一个 iframe 显示，如图 7-1 所示。这个 iframe 看起来像一个窗口中的窗口。在测试用例场景中，它被视为一个独立的文档。在与 iframe\
    \ 中的内容交互之前，你需要切换到这个窗口。接下来的主题将深入探讨实现无缝切换的方法和最佳实践。\n\n切换到 iframe\n当你想要测试嵌入在 iframe\
    \ 中的 Web 元素或功能时，首先需要定位并切换到该特定的 iframe。\n由于嵌入在 iframe 中的 Web 元素不能直接访问，你必须先定位并切换到该特定的\
    \ iframe 才能进行测试。一旦你切换到 iframe，就可以像第 4 章讨论的那样定位元素。让我们探索各种定位 iframe 的技术。\n\n使用 ID\
    \ 切换\n\n要从网页访问 iframe，请使用提供的 ID 属性。以下方法将控制权切换到 iframe。\n\n```\ndriver.switchTo().frame(driver.findElement(By.id(\"\
    iframe0\")));\n```\n\n一旦你切换到 iframe，你的操作就被限制在其 Web 元素内，可以执行定位元素或与之交互等操作，直到你切换回主页面或另一个\
    \ iframe。\n\n使用名称切换\n\n与 ID 属性类似，当名称属性可用时，你可以使用它从网页切换到 iframe。\n\n```\n// 使用名称切换到\
    \ iframe\ndriver.switchTo().frame(\"selenium_java\");\n```\n\n使用索引值切换\n虽然你可以使用\
    \ ID 或 Name 等属性来定位和切换 iframe，但这些属性可能并不总是可用或唯一的。在这些情况下，使用 iframe 的索引是一种合理的方法。\n\
    \n索引表示 iframe 在网页上序列中的位置，从 0（零）开始。第一个 iframe 可以使用索引值 0 访问，第二个使用 1，依此类推。让我们使用多个\
    \ iframe 的示例。\n\n```\n\n多个 iframe\n\n这是主页面内容。\n\n主页面内容结束。\n\n```\n\n前面的示例在网页中嵌入了三个\
    \ iframe。让我们讨论如何使用索引值与这些 iframe 进行交互；你可以看到没有使用任何属性。\n\n```\n// 使用索引切换到第一个 iframe\n\
    driver.switchTo().frame(0);\n// 通过索引直接导航到第二个 iframe\ndriver.switchTo().frame(1);\n\
    // 通过索引直接导航到第三个 iframe\ndriver.switchTo().frame(2);\n```\n\n带有索引值的 switchTo().frame()\
    \ 方法会从零开始切换到 iframe。如果你提供的索引值与网页上可用的 iframe 不对应，则会发生 NoSuchFrameException 错误。一旦你切换到任何\
    \ iframe，你需要切换回主页面才能再次进入另一个 iframe。这将在接下来的 iframe 层级结构中解释。\n\n切换 iframe 的层级结构\n\
    \n你已经了解了多个 iframe 及其访问方式。让我们看看嵌套在其他 iframe 中的多个 iframe。理解这些 iframe 放置的层级结构对于与\
    \ Web 元素交互是必要的，因为每一层都需要对 WebDriver 的上下文进行有效声明。以下是 HTML 中 iframe 的层级结构。让我们探索与之交互的方式。\n\
    \n```\n\n主文档\n\n这是主页面的内容。\n\n这是第一级 iframe 的内容。\n\n这是嵌套的第二级 iframe 的内容。\n\n主页面的更多内容。\n\
    \n```\n\n层级结构表示如下。\n\n*   主页面或文档代表最顶层。\n*   包含 id=“firstLevelIframe” 的 iframe\
    \ 位于第一级，代表嵌入在主文档中的层级。\n*   第一级 iframe 内嵌套的 iframe 构成了第二级 iframe。\n\n注意\n\n如果一个\
    \ iframe 嵌入在另一个 iframe 内部，则称为*嵌套 iframe*。可能存在多个层级的 iframe 相互嵌套，以此类推。\n\n在层级结构中导航\
    \ iframe\n\n*   **主文档上下文**：在 Selenium 中，当网页加载时，主文档或最顶层被设置为 WebDriver 的默认上下文；因此，无需切换到主文档，你可以直接访问其中的元素。\n\
    \n*   **访问第一级 iframe**：要从主文档定位第一级 iframe，你可以使用 Selenium 中的 switchTo() 函数。\n\n\
    driver.switchTo().frame(driver.findElement(By.id(“firstLevelIframe”)));\n\n* \
    \  **访问第二级/嵌套 iframe**：当你想访问嵌入在第一级 iframe 中的第二级或嵌套 iframe 时，你可以使用相同的 switchTo()\
    \ 函数。\n\ndriver.switchTo().frame(driver.findElement(By.id(“secondLevelIframe”)));\n\
    \nSelenium WebDriver 无法直接访问嵌套的 iframe，因为它需要按顺序遍历 iframe 层级。\n\n如你所见，当需要访问第二个 iframe\
    \ 时，首先需要访问第一个 iframe，然后才能访问第二个。现在，让我们看看如何从嵌套的 iframe 中返回。\n\n*   **返回第一级**：当你处于嵌套的\
    \ iframe 中（即本例中的第二级）并需要返回到第一个 iframe 时，可以使用\n    **driver.switchTo().parentFrame();**。\n\
    \n如果你切换到的 iframe 没有父级 iframe，或者该 iframe 没有嵌套在另一个 iframe 中，那么再次使用此函数将切换回主文档。因此，parentFrame()\
    \ 函数通常用于嵌套情况。\n\n*   **返回主文档**：如果你想从任何 iframe 返回主文档，可以将 defaultContent() 函数与 switchTo()\
    \ 函数一起使用。\n\n**driver.switchTo().defaultContent();**\n\n当你想要切换回主文档时，可以在任何嵌套层级的\
    \ iframe 中使用此函数。一旦你回到主文档并想再次切换回 iframe，则需要按照前面讨论的方式遍历层级结构。\n\n将元素作为 Switch 使用\n"
- fmt: 'When you are dealing with dynamic web pages, where iframes do not render fixed
    attributes, or their position could change. In such cases, you need to locate
    them as a web element, just like any other element on the page. Once the element
    is located then you need to switch to it. The following is simple HTML code for
    an iframe.


    ```

    <iframe src="https://example.com/dynamic-iframe" class="dynamicIframe"></iframe>

    ```


    Since the iframe is dynamic, you need to locate iframe using the class name.


    ```java

    // Locate the iframe as a WebElement

    WebElement iframeElement = driver.findElement(By.className("dynamicIframe"));

    ```


    Now, after locating the iframe as a web element, you need to switch to the iframe
    with `switchTo()` function.


    ```java

    // Switch to the iframe using the WebElement

    driver.switchTo().frame(iframeElement);

    ```


    This method gives more flexibility and precision, especially in the modern era
    of web applications where one can generate, remove, or have dynamic attributes
    changing via JavaScript for iframes.


    ## Frames with Waits


    When dealing with web elements that may require time to load or become interactive,
    which is often needed for web testing, this is particularly valid for iframes
    and frames with synchronous content loading abilities. To ensure strong and reliable
    tests, it is imperative to wait for iframes to become available on the web page
    before switching to them.


    Waits can be used in dealing with iframes, ensuring it is loaded and its content
    is available, when you want to interact with elements inside an iframe. Here is
    the HTML code for it.


    ```

    <iframe id="dynamicLoadingFrame" src="https://example.com/dynamic-content"></iframe>

    ```


    Let’s use explicit wait, which is often used in Selenium, wherein a certain condition
    should be met before proceeding further.


    ```java

    import org.openqa.selenium.By;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.support.ui.ExpectedConditions;

    import org.openqa.selenium.support.ui.WebDriverWait;

    // Assuming ''driver'' is an instance of WebDriver and is already initialized

    // Set up the explicit wait with a timeout of 10 seconds

    WebDriverWait wait = new WebDriverWait(driver, 10);

    // Wait for the iframe to be available and then switch to it

    wait.until(ExpectedConditions.frameToBeAvailableAndSwitchToIt(By.id("dynamicLoadingFrame")));

    // Now, you''re inside the iframe and can perform operations

    // ...

    // Switch back to the main content after operations

    driver.switchTo().defaultContent();

    ```


    The code uses explicit wait to ensure that `WebDriver` instance is made to wait
    for 10 seconds to make the iframe available on the page. If the iframe is not
    available within the timeframe, you get `TimeoutException` error. By using this
    strategy, you may prevent unexpected loading delays from causing your tests to
    fail, increasing their resistance to changes in network speed, server response
    time, and other unforeseen circumstances. Always waiting until the iframe or its
    components are ready to be used before interacting with them is a good practice,
    especially in cases where content loading may be dynamic or asynchronous.


    ## Textboxes


    In many web forms, textboxes are important elements that facilitate user inputs
    from simple searches to intricate data entries. Next, let’s look at various types
    of textboxes and how to locate them using Selenium.


    ### Single Line Textbox


    An input field, often shown as a single-line textbox with the `type` attribute
    set to `text`, is used for concise entries. Some examples include usernames, query
    searches, and email addresses.


    The following is an HTML example.


    ```

    Single Line Textbox

    Book Name:

    <input type="text" id="nook_name" name="book_name">

    ```


    Figure [7-2](#608985_1_En_7_Chapter.xhtml#Fig2) shows what the HTML looks like
    on a web page.


    ![](images/608985_1_En_7_Chapter/608985_1_En_7_Fig2_HTML.jpg)


    A screenshot of the book name field on a web page. The single-line textbox is
    present.


    **Figure 7-2** Single-line textbox with Book Name field


    You need to locate the textbox on a web page before you can interact with it.
    So, from the provided HTML, let’s locate a textbox using the ID attribute.


    ```java

    // Locating Textbox

    WebElement bookTextbox = driver.findElement(By.id("nook_name"));

    ```


    Now, you can interact with the textbox as you have located it.


    - **Inserting values**: After locating the textbox, you can insert a value using
    the keyboard actions discussed in Chapter [3](#608985_1_En_3_Chapter.xhtml).


    ```java

    // Inserting Value into Textbox

    bookTextbox.sendKeys("Python Testing with Selenium");

    ```


    You have inserted the value `Python Testing with Selenium` into the textbox. Let’s
    look at how to retrieve this value.


    - **Retrieving value**: You can also retrieve the value that has been given in
    a textbox. This is generally used to compare the value with the expected one and
    if the textbox makes any other behavior.


    ```java

    // Retrieving Value from Textbox

    String bookName = bookTextbox.getAttribute("value");

    System.out.println("Book name entered: " + bookName);

    ```


    This provides the output of the book name you entered in the textbox if that text
    is present in the located textbox.


    You have now seen how to locate a textbox and interactions like inserting values
    into it and validating the text entered using Selenium, ensuring that a web application
    accepts and displays the input provided by the user as it is.


    ### Multiline Textbox


    In a multiline textbox, a user can span multiple lines as input that can be a
    form of comments, descriptions, or any form of extended text.


    You can create a multiline textbox using the `<textarea>` tag in HTML. The following
    code represents a multiline textbox in HTML.


    ```

    Multiline Textbox

    Description:

    <textarea id="description" name="description" rows="4" cols="50"></textarea>

    ```


    Figure [7-3](#608985_1_En_7_Chapter.xhtml#Fig3) shows what the HTML looks like
    on a web page.


    ![](images/608985_1_En_7_Chapter/608985_1_En_7_Fig3_HTML.jpg)


    A screenshot of the description field on a webpage. The multi-line textbox is
    present.


    **Figure 7-3** Multiline textbox with Description field


    In the HTML code, a description field is provided for the users to enter their
    multiline text, which you don’t see in the single-line textbox. From this HTML
    code, let’s locate a multiline textbox using its ID attribute having `description`
    as its value.


    #### Locating the Multiline


    Let’s locate a multiline textbox and then interact with it by inserting and retrieving
    the value entered from it. So, let’s start by locating it by using the ID attribute.


    ```java

    // Locating Multiline Textbox

    WebElement descriptionTextarea = driver.findElement(By.id("description"));

    ```


    #### Inserting Values


    Now, once you located the multiline element from the web page, you can use `sendKeys()`
    method to provide input into the multiline textbox.


    ```java

    // Inserting Value into Textbox

    descriptionTextarea.sendKeys("This is a sample description text.\nIt covers multiple
    lines.");

    ```


    The `sendKeys()` method uses `\n`, an escape sequence in Java that stimulates
    pressing the Enter key, thus creating a new line in the text area.


    #### Retrieving a Value from a Multiline Textbox


    To retrieve the entered text from a multiline textbox, you use the `getText()`
    method. Its value is retrieved to validate or verify in automated testing.


    ```java

    // Retrieving Value from Textbox

    String descriptionText = descriptionTextarea.getText();

    System.out.println("Description entered: " + descriptionText);

    ```


    This code snippet returns all the entered text from the multiline textbox. It
    is a crucial procedure in testing scenarios like user feedback, comment sections
    or any situation where you expect extended text input by the user.'
