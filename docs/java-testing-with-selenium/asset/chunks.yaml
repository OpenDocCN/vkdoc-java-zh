  trans: "\nJava 类中常用的 ExpectedConditions\n\n为了更有效地进行 Web 元素交互，你可以使用 Selenium WebDriver\
    \ for Java 中提供的 `ExpectedConditions` 类，该类包含一组预定义的条件。以下是部分常用的 ExpectedConditions，包括其描述、失败原因以及引发的异常。\n\
    \n*   **elementToBeClickable(By locator)** 等待页面上的某个 Web 元素变为可见且可启用，以便你可以对其执行点击操作。\n\
    \n**失败原因**：如果该 Web 元素不可点击（不可交互）。\n\n**引发的异常**：`ElementNotInteractableException`\n\
    \n```\n    WebDriverWait wait = new WebDriverWait(driver, 10);\n    WebElement\
    \ element = wait.until(ExpectedConditions.elementToBeClickable(By.id(\"someId\"\
    )));\n    element.click();\n    ```\n\n*   **elementToBeClickable(WebElement element)**\
    \ 等待特定的 WebElement 变为可点击，即同时满足可见和可启用。\n\n**失败原因**：如果该 WebElement 在指定时间内不可点击。\n\
    \n**引发的异常**：如果尝试点击时元素不可交互，则抛出 `ElementNotInteractableException`。\n\n```\n    WebElement\
    \ myElement = driver.findElement(By.id(\"clickableElement\"));\n    WebDriverWait\
    \ wait = new WebDriverWait(driver, 10);\n    WebElement clickableElement = wait.until(ExpectedConditions.elementToBeClickable(myElement));\n\
    \    clickableElement.click();\n    ```\n\n*   **elementToBeSelected(By locator)**\
    \ 等待某个元素被选中。这通常用于复选框或单选按钮等按钮元素。\n\n**失败原因**：如果该按钮元素未被选中或不存在。\n\n**引发的异常**：如果元素在指定时间内未被选中，通常会导致\
    \ `TimeoutException`。除了超时之外，没有针对元素未被选中的特定异常。\n\n```\n    WebDriverWait wait =\
    \ new WebDriverWait(driver, 10);\n    Boolean isSelected = wait.until(ExpectedConditions.elementToBeSelected(By.id(\"\
    checkboxId\")));\n    ```\n\n*   **elementToBeSelected(WebElement element)** 等待特定的\
    \ WebElement 被选中。\n\n**失败原因**：如果该 Web 元素未被选中。\n\n**引发的异常**：如果 WebElement 无效或不可选择，你可能会遇到\
    \ `StaleElementReferenceException` 或 `TimeoutException`。\n\n```\n    WebElement\
    \ checkbox = driver.findElement(By.id(\"checkboxId\"));\n    WebDriverWait wait\
    \ = new WebDriverWait(driver, 10);\n    Boolean isSelected = wait.until(ExpectedConditions.elementToBeSelected(checkbox));\n\
    \    ```\n\n*   **presenceOfElementLocated(By locator)** 等待某个 Web 元素出现在 DOM 中，该元素不一定是可见的。一旦该\
    \ Web 元素出现，你就可以执行与其相关的后续操作。\n\n**失败原因**：当该 Web 元素未出现在 DOM 中时，会引发异常。\n\n**引发的异常**：`NoSuchElementException`\n\
    \n```\n    WebDriverWait wait = new WebDriverWait(driver, 10);\n    WebElement\
    \ element = wait.until(ExpectedConditions.presenceOfElementLocated(By.id(\"someId\"\
    )));\n    ```\n\n*   **presenceOfAllElementsLocatedBy(By locator)** 等待定位器指定的所有匹配的\
    \ Web 元素都出现在 DOM 中。\n\n**失败原因**：如果并非所有匹配的 Web 元素都出现。\n\n**引发的异常**：如果并非所有元素都在等待期内出现，通常会导致\
    \ `TimeoutException`。除了超时之外，没有针对部分出现的特定异常。\n\n```\n    WebDriverWait wait = new\
    \ WebDriverWait(driver, 10);\n    List elements = wait.until(ExpectedConditions.presenceOfAllElementsLocatedBy(By.className(\"\
    someClass\")));\n    ```\n\n*   **visibilityOfElementLocated(By locator)** 等待某个\
    \ Web 元素出现在 DOM 中并且可见。可见性意味着该元素不仅被显示，而且其高度和宽度都大于 0。\n\n**失败原因**：如果该 Web 元素已出现但在指定时间内不可见。\n\
    \n**引发的异常**：`ElementNotVisibleException`\n\n```\n    WebDriverWait wait = new\
    \ WebDriverWait(driver, 10);\n    WebElement element = wait.until(ExpectedConditions.visibilityOfElementLocated(By.id(\"\
    someId\")));\n    ```\n\n*   **visibilityOf(WebElement element)** 等待特定的 WebElement\
    \ 变为可见。可见性意味着该元素不仅被显示，而且其高度和宽度都大于 0。\n\n**失败原因**：如果该 WebElement 在指定时间内不可见。\n\n\
    **引发的异常**：如果在元素不可见时尝试与之交互，则抛出 `ElementNotVisibleException`。\n\n```\n    WebElement\
    \ myElement = driver.findElement(By.id(\"visibleElement\"));\n    WebDriverWait\
    \ wait = new WebDriverWait(driver, 10);\n    WebElement visibleElement = wait.until(ExpectedConditions.visibilityOf(myElement));\n\
    \    ```\n\n*   **visibilityOfAllElementsLocatedBy(By locator)** 等待定位器指定的所有 Web\
    \ 元素在网页上都可见。\n\n**失败原因**：如果任何一个元素不可见。\n\n**引发的异常**：如果并非所有元素都在指定时间内可见，通常会导致 `TimeoutException`。除了超时之外，没有针对部分可见的特定异常。\n\
    \n```\n    WebDriverWait wait = new WebDriverWait(driver, 10);\n    List elements\
    \ = wait.until(ExpectedConditions.visibilityOfAllElementsLocatedBy(By.className(\"\
    someClass\")));\n    ```\n\n*   **visibilityOfAllElements(List<WebElement> elements)**\
    \ 等待提供的列表中的所有元素都可见。当你已经定位到元素并需要确保它们在继续操作前全部可见时，这非常有用。\n\n**失败原因**：如果列表中的并非所有元素都在指定时间内可见。\n\
    \n**引发的异常**：如果并非所有元素都在指定时间内可见，通常会导致 `TimeoutException`。除了超时之外，没有针对部分可见的特定异常。\n\
    \n```\n    List elements = driver.findElements(By.className(\"someClass\"));\n\
    \    WebDriverWait wait = new WebDriverWait(driver, 10);\n    List visibleElements\
    \ = wait.until(ExpectedConditions.visibilityOfAllElements(elements));\n    ```\n\
    \n*   **textToBePresentInElementLocated(By locator, String text)** 等待特定文本出现在特定元素中。\n\
    \n**失败原因**：如果指定元素中不存在该文本。\n\n**引发的异常**：如果在等待时间内未找到该文本，通常会导致 `TimeoutException`。除了超时之外，没有针对文本不存在的特定异常。\n\
    \n```\n    WebDriverWait wait = new WebDriverWait(driver, 10);\n    Boolean isTextPresent\
    \ = wait.until(ExpectedConditions.textToBePresentInElementLocated(By.id(\"someId\"\
    ), \"Expected Text\"));\n    ```\n\n*   **textToBePresentInElement(WebElement\
    \ element, String text)** 等待特定文本出现在提供的 WebElement 中。\n\n**失败原因**：如果指定文本在指定时间内未出现在该元素中。\n\
    \n**引发的异常**：如果在指定时间内未找到该文本，则抛出 `TimeoutException`。\n\n```\n    WebElement myElement\
    \ = driver.findElement(By.id(\"textElement\"));\n    WebDriverWait wait = new\
    \ WebDriverWait(driver, 10);\n    Boolean isTextPresent = wait.until(ExpectedConditions.textToBePresentInElement(myElement,\
    \ \"Expected Text\"));\n    ```\n\n*   **textToBePresentInElementValue(By locator,\
    \ String text)** 等待特定文本出现在由定位器定位的元素的 value 属性中。\n\n**失败原因**：如果该文本未出现在元素的 value\
    \ 中。\n\n**引发的异常**：如果在指定时间内未在元素的 value 中找到该文本，通常会导致 `TimeoutException`。除了超时之外，没有针对文本不存在的特定异常。\n"
