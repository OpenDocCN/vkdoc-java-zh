  trans: '

    摘要

    本章聚焦于 Web 自动化中的两个核心元素：iframe 和文本框。首先介绍了如何处理 iframe，这对于与嵌入式 Web 内容交互至关重要。本章探讨了切换到
    iframe 的不同策略，例如使用 ID、名称、索引和 Web 元素。掌握这些知识十分必要，因为 iframe 通常包含关键元素，由于其独立的 DOM 结构，这些元素需要特别关注。此外，你还学习了处理嵌套
    iframe 时面临的挑战，这强调了顺序导航的重要性，并讨论了用于支持动态内容加载的显式等待，从而确保了测试用例的健壮性和可靠性。


    本章还讨论了单行文本框和多行文本框的细微差别。单行文本框用于输入字段，如电子邮件地址或姓名，在高效插入和检索值的场景中进行了讨论，这是基于表单的应用程序中的常见操作。你学习了多行文本框和文本区域，深入探讨了它们在捕获更广泛的用户输入（如评论或描述）中的作用。你看到了在
    Selenium 中与这些用户输入进行交互的实际示例，突出了在自动化测试中精确输入和验证数据的重要性。

    本章涵盖了处理复杂 Web 元素的内容，使你能够创建有效且可靠的自动化测试。


    8. 断言


    本章探讨了 Selenium 中断言的基本概念、技术和最佳实践。断言是在自动化测试期间验证 Web 应用程序行为和功能的可靠工具。

    从断言简介开始，你将了解什么是断言以及为什么它们在 Selenium 测试框架中极其重要。然后，你将深入探讨两种主要的断言类型：硬断言和软断言。

    接下来，你将探索 Selenium 提供的一系列断言方法，这些方法对于在测试中将预期结果与实际结果进行比较和验证至关重要。你还将深入研究如何处理断言失败，了解断言失败时会发生什么，以及如何在确保全面日志记录和报告的同时优雅地管理这些失败。

    自定义断言是另一个讨论重点。你将发现如何创建针对特定应用程序需求定制的自定义断言方法。你将探索扩展断言功能，以有效满足你独特的测试需求。

    最后，你将学习在 Selenium 中使用断言时的常见陷阱和错误，以及避免误报和漏报的策略。

    在整个学习过程中，你将强调在 Selenium 中使用断言的最佳实践，涵盖何时使用它们、如何保持简单和具体、编写有意义的错误消息以及在测试用例中组织断言。这些最佳实践使你能够构建可靠、可维护且高效的
    Selenium 测试脚本。


    什么是断言？

    Selenium 中的断言是你嵌入到自动化测试脚本中的语句或检查点，用于验证 Web 应用程序执行期间是否满足某些条件。这些条件可以涵盖广泛的标准，例如检查特定元素是否存在于网页上、文本是否与你的预期匹配，或者
    URL 是否与预定义模式匹配。本质上，断言帮助你验证应用程序是否按预期运行。


    断言的必要性


    断言不仅仅是代码语句；它们对于自动化测试的有效性和可靠性至关重要。


    *   **验证预期行为：** 断言充当质量控制机制和标准，使你能够确保 Web 应用程序按预期运行并符合预定义标准。它还确保新的更改或更新不会破坏现有功能或行为。

    *   **测试自动化效率：** 如果没有断言，你将需要手动干预来确认测试是通过还是失败，这违背了自动化的目的。断言自动化了验证过程，并加快了开发周期中的反馈循环。

    *   **错误检测：** 断言帮助你在测试过程的早期发现问题。如果断言失败，则表明应用程序或测试脚本存在问题，使你能够迅速定位并解决问题。

    *   **文档：** 断言是测试脚本中的文档，阐明了你在测试什么条件以及什么构成成功的测试。


    硬断言

    硬断言是 Selenium 测试中的严格检查点。当你使用一个失败的硬断言时，测试脚本会立即停止，整个测试被标记为失败。可以将它们视为测试继续进行必须满足的不可协商的条件。

    例如，当你使用硬断言确认页面上的“提交”按钮存在但未找到时，测试停止，你将收到一条失败消息。这对于避免误报和确保测试结果的可靠性至关重要。


    使用 Java 代码，以下示例说明了 Selenium 中的硬断言。让我们也为这个示例创建一个简单的 HTML 页面。


    ```

    //HTML 代码


    示例页面


    欢迎来到 Selenium 断言示例

    这是一个示例段落。

    提交


    ```


    让我们编写使用 Selenium 与这个 HTML 页面交互并执行断言的 Java 代码。


    ```

    import org.openqa.selenium.By;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.WebElement;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.testng.Assert;

    public class HardAssertionsExample {

    public static void main(String[] args) {

    // 设置 ChromeDriver 可执行文件的路径

    System.setProperty("webdriver.chrome.driver", "path/to/chromedriver");

    // 创建 ChromeDriver 的新实例

    WebDriver driver = new ChromeDriver();

    // 导航到 HTML 页面

    driver.get("file:///path/to/example.html");

    // 在页面上查找元素

    WebElement textElement = driver.findElement(By.id("textElement"));

    WebElement submitButton = driver.findElement(By.id("submitButton"));

    // 执行硬断言

    Assert.assertEquals(textElement.getText(), "这是一个示例段落");

    Assert.assertTrue(submitButton.isDisplayed());

    // 关闭浏览器

    driver.quit();

    }

    }

    ```


    此示例使用硬断言来验证两个条件：段落元素的文本和“提交”按钮的存在。如果这些断言中的任何一个失败，测试会立即停止，并且测试被标记为失败。


    软断言

    软断言，通常称为*验证*，是 Selenium 中一种更灵活的验证方法。当你使用软断言时，你设置的条件很重要需要检查，但不足以在失败时立即停止测试。使用软断言，即使某些条件失败，测试脚本也会继续运行，并收集所有失败的信息以供后续分析。

    考虑一个例子：当你使用软断言来验证页面上多个元素的内容时，如果其中一个不符合你的预期，测试不会立即停止。相反，它会继续运行，你可以在测试完成后检查所有失败。在测试
    Web 应用程序时，验证是软断言的另一个说法。


    对于前面的 HTML 代码，对其实现一个软断言，并观察测试行为的不同之处。

    '
- fmt: '```java

    //Java Code

    import org.openqa.selenium.By;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.WebElement;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.testng.asserts.SoftAssert;

    public class SoftAssertionsExample {

    public static void main(String[] args) {

    // Set the path to your ChromeDriver executable

    System.setProperty("webdriver.chrome.driver", "path/to/chromedriver");

    // Create a new instance of ChromeDriver

    WebDriver driver = new ChromeDriver();

    // Navigate to the HTML page

    driver.get("file:///path/to/example.html");

    // Find the elements on the page

    WebElement textElement = driver.findElement(By.id("textElement"));

    WebElement submitButton = driver.findElement(By.id("submitButton"));

    // Initialize SoftAssert

    SoftAssert softAssert = new SoftAssert();

    // Perform soft assertions (Verify)

    softAssert.assertEquals(textElement.getText(), "This is a sample paragraph");

    softAssert.assertTrue(submitButton.isDisplayed());

    // Continue with test steps

    // ...

    // Assert all soft assertions at the end of the test

    softAssert.assertAll();

    // Close the browser

    driver.quit();

    }

    }

    ```


    This example uses soft assertions (Verify) with TestNG’s `SoftAssert` class. Even
    if one of the assertions fails, the test continues executing, and all failures
    are collected. The `softAssert.assertAll()` statement at the end of the test marks
    the test as failed if any soft assertion has failed. This allows you to collect
    all failures and continue running the test to gather comprehensive information
    about the application’s behavior before reporting the results.


    ## Hard vs. Soft


    Table [8-1](#608985_1_En_8_Chapter.xhtml#Tab1) compares hard assertions (Asserts)
    and soft assertions (Verify).


    **Table 8-1** Represents Differences Between Hard (Asserts) and Soft (Verify)
    Assertions


    | Aspect | Hard Assertions (Asserts) | Soft Assertions (Verify) |

    | --- | --- | --- |

    | **Behavior on Failure** | Immediately stops test execution and marks the entire
    test as failed. | Continues test execution and collects information about all
    failures. |

    | **Use Case** | Suitable for critical conditions that must be met for the test
    to proceed. | Appropriate for scenarios where comprehensive information about
    multiple conditions or elements is needed within a single test run. |

    | **Handling Multiple Assertions** | Typically used for non-negotiable checks
    where any deviation from expected behavior signifies a significant issue. | Allows
    assessing various aspects of the application’s behavior before reporting results.
    |

    | **Reporting** | Provides clear and immediate feedback about failures, making
    it easy to identify and address issues promptly. | Doesn’t halt the test on failure
    but accumulates information about all failures for later analysis. Requires using
    `assertAll()` at the end of the test to mark it as failed if any soft assertion
    has failed, providing a consolidated report of all issues encountered during the
    test. |


