- fmt: "# Setting Up TestNG: A Step-by-Step Guide\n\nSetting up TestNG in your Java\
    \ development environment is a straightforward process. This guide assumes you\
    \ have installed Java and an IDE (Eclipse or IntelliJ IDEA). Let’s walk through\
    \ the steps to get TestNG up and running.\n\n## Step 1: Installing TestNG in IDEs\n\
    \n### Eclipse\n\n1. **Start Eclipse** and enter your preferred workspace.\n2.\
    \ **Install the TestNG plugin**.\n   - Go to **Help** ➤ **Eclipse Marketplace**.\n\
    \   - Search for **TestNG**.\n   - Find the TestNG plugin in the search results,\
    \ click **Install**, and initiate installation.\n3. **Complete installation**.\
    \ After the installation, Eclipse prompts a restart to complete the integration\
    \ process, embedding TestNG into your Eclipse ecosystem.\n\n### IntelliJ IDEA\n\
    \n1. **Open IntelliJ IDEA** and proceed to your project workspace.\n2. **Add TestNG\
    \ plugin**.\n   - Access **File** ➤ **Settings** ➤ **Plugins**.\n   - In the **Marketplace**\
    \ tab, search for **TestNG**.\n   - Click **Install** on the TestNG plugin.\n\
    3. **Restart IntelliJ IDEA**. A restart post-installation is essential for the\
    \ plugin to be fully functional within the IDE.\n\n## Step 2: Creating a New Java\
    \ Project\n\nWith TestNG installed in your IDE, the next step is to create a new\
    \ Java project.\n\n- In **Eclipse**: Navigate to **File** ➤ **New** ➤ **Java Project**.\n\
    - In **IntelliJ IDEA**: Choose **File** ➤ **New** ➤ **Project**, and select Java\
    \ from the available options.\n\n## Step 3: Incorporating TestNG into the Project\n\
    \nThe method to add TestNG to your project depends on whether you use Maven.\n\
    \n### For Maven-based Projects\n\n1. **Open the `pom.xml` file**. Locate this\
    \ Maven configuration file of your Java project.\n2. **Add TestNG dependency**.\
    \ Insert the following dependency into your `pom.xml`.\n\n```xml\n<dependency>\n\
    \    <groupId>org.testng</groupId>\n    <artifactId>testng</artifactId>\n    <version>7.x.x</version>\n\
    \    <scope>test</scope>\n</dependency>\n```\n\n3. **Update the project**. Save\
    \ the file and update your Maven project. Maven automatically downloads and incorporates\
    \ TestNG into your project’s classpath.\n\n> **Note**: As of December 26, 2023,\
    \ the most recent version of TestNG is 7.0.0.\n\n### For non-Maven Projects\n\n\
    - **In Eclipse**: Right-click on the project ➤ **Properties** ➤ **Java Build Path**\
    \ ➤ **Libraries** ➤ **Add Library** ➤ Select **TestNG**.\n- **In IntelliJ IDEA**:\
    \ Navigate to **File** ➤ **Project Structure** ➤ **Libraries** ➤ Press **+** ➤\
    \ **From Maven...**. Search for `org.testng:testng` and include it in the project.\n\
    \n> **Note**: Apache Maven is a powerful project management and automation tool\
    \ used primarily for Java projects. It simplifies the build process, manages project\
    \ dependencies, and provides a uniform build system through its project object\
    \ model (POM).\n\n## Step 4: Confirming Your TestNG Setup\n\nTo ensure that TestNG\
    \ is correctly set up and operational:\n\n1. **Create a test class**. Name it\
    \ something like `ExampleTest`.\n2. **Draft a simple test method**.\n\n```java\n\
    import org.testng.annotations.Test;\npublic class ExampleTest {\n    @Test\n \
    \   public void simpleTest() {\n        System.out.println(\"TestNG is perfectly\
    \ set up!\");\n    }\n}\n```\n\n3. **Execute the test**. Run this test method\
    \ from any of the IDEs. A successful execution that prints “TestNG is perfectly\
    \ set up!” in the console confirms that TestNG is ready for action.\n\nYou have\
    \ successfully installed TestNG in your IDE and added it to a Java project. This\
    \ setup is a fundamental step toward advanced testing using TestNG’s features,\
    \ such as running tests in parallel, grouping tests, and using TestNG’s assertions\
    \ and annotations for effective testing.\n\n# TestNG Annotations and Attributes\n\
    \nIn TestNG, annotations are the signposts that guide the execution of your test\
    \ scripts. They are crucial for defining the test structure, specifying test execution\
    \ flow, and configuring test behavior. Let’s dive into the details of TestNG annotations,\
    \ their attributes, and when and how to use them effectively in test scripts,\
    \ emphasizing their practical application.\n\n## `@Test`: The Core of TestNG\n\
    \nThe `@Test` annotation is what identifies a method as a TestNG test. It has\
    \ several attributes that allow you to control various aspects of the test method’s\
    \ behavior. Let’s explore some of its key attributes with examples.\n\n- **`priority`**\
    \ defines the order of test method execution. Lower priority numbers are executed\
    \ first.\n\n```java\n@Test(priority = 1)\npublic void firstTest() {\n    // This\
    \ test will run first due to its higher priority (lower number)\n    System.out.println(\"\
    First test method\");\n}\n```\n\nUse `priority` when the execution order of your\
    \ test methods is important.\n\n- **`enabled`** determines whether the test method\
    \ is enabled or disabled. A value of `false` skips the execution of the test method.\n\
    \n```java\n@Test(enabled = false)\npublic void disabledTest() {\n    // This test\
    \ will not be executed\n    System.out.println(\"This test method is disabled.\"\
    );\n}\n```\n\nUse the `enabled` attribute to disable a test method without removing\
    \ the code.\n\n- **`dependsOnMethods`** ensures that certain methods are run before\
    \ the annotated test method. If the methods it depends on fail, the annotated\
    \ method is skipped.\n\n```java\n@Test(dependsOnMethods = {\"firstTest\"})\npublic\
    \ void dependentTest() {\n    // This test runs only after 'firstTest' has successfully\
    \ completed\n    System.out.println(\"Runs after firstTest\");\n}\n```\n\nUse\
    \ the `dependsOnMethods` attribute to manage test dependencies and order, especially\
    \ when test outcomes are interdependent.\n\n- **`groups`** assigns the test method\
    \ to one or more groups. It is useful for managing and running subsets of your\
    \ entire test suite.\n\n```java\n@Test(groups = {\"sanity\"})\npublic void sanityTest()\
    \ {\n    // Part of the 'sanity' group of tests\n    System.out.println(\"Part\
    \ of sanity tests\");\n}\n```\n\nYou can use `groups` for categorizing tests,\
    \ which is helpful in larger projects where tests can be grouped based on features,\
    \ modules, or test types like sanity, regression, etc.\n\n- **`dataProvider`**\
    \ specifies a method that provides data to the test method, enabling data-driven\
    \ testing.\n\n```java\n@Test(dataProvider = \"dataMethod\")\npublic void dataDrivenTest(String\
    \ input) {\n    // This test will run multiple times with different inputs\n \
    \   System.out.println(\"Data driven test with input: \" + input);\n}\n\n@DataProvider\n\
    public Object[][] dataMethod() {\n    return new Object[][] {{\"data1\"}, {\"\
    data2\"}};\n}\n```\n\nTo run a test multiple times with different data sets, use\
    \ the `dataProvider` attribute.\n\n- **`expectedExceptions`** indicates that the\
    \ test method is expected to throw an exception. If the specified exception is\
    \ thrown, the test passes.\n\n```java\n@Test(expectedExceptions = ArithmeticException.class)\n\
    public void exceptionTest() {\n    // This test is expected to throw ArithmeticException\n\
    \    int i = 1 / 0;\n}\n```\n\nUse this attribute when testing for conditions\
    \ that are expected to throw exceptions.\n\n## `@Test` with Other Annotations\n\
    \nCombining the `@Test` annotation with other TestNG annotations is often used\
    \ to create a comprehensive and efficient testing workflow. It allows you to set\
    \ up pre-conditions and post-conditions and manage test dependencies. In practical\
    \ scenarios, combining `@Test` with other TestNG annotations is a common way to\
    \ set up a comprehensive test environment.\n\n### `@BeforeSuite` and `@AfterSuite`"
