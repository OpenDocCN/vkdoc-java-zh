    \ `TimeoutException`。\n\n```\n    WebElement myElement = driver.findElement(By.id(\"\
    dynamicElement\"));\n    // 执行某些导致刷新或更新的操作\n    WebDriverWait wait = new WebDriverWait(driver,\
    \ 10);\n    WebElement refreshedElement = wait.until(ExpectedConditions.refreshed(ExpectedConditions.visibilityOf(myElement)));\n\
    \    ```\n\n现在，您已经了解了每个 `ExpectedCondition` 的工作原理、条件失败时会发生什么、通常会引发的异常，以及演示其用法的\
    \ Java 代码片段。\n\nFluent Waits\nSelenium 中的 Fluent Wait 是一种显式等待，提供了高级等待功能。它允许您设置等待条件的最大时间，以及检查条件的频率。此外，您还可以在等待时忽略特定类型的异常，这使其比标准的\
    \ `WebDriverWait` 更加灵活。\n\n假设您想等待一个元素变为可见，但预计可能需要一些时间，并且您不希望过于频繁地检查。以下展示了如何设置一个\
    \ Fluent Wait。\n\n```\nimport org.openqa.selenium.By;\nimport org.openqa.selenium.WebDriver;\n\
    import org.openqa.selenium.WebElement;\nimport org.openqa.selenium.firefox.FirefoxDriver;\n\
    import org.openqa.selenium.support.ui.FluentWait;\nimport org.openqa.selenium.NoSuchElementException;\n\
    import java.time.Duration;\nimport java.util.function.Function;\npublic class\
    \ SeleniumFirefoxFluentWaitExample {\npublic static void main(String[] args) {\n\
    // 设置 Firefox 驱动的属性\nSystem.setProperty(\"webdriver.gecko.driver\", \"path/to\
    \ geckodriver\");\n// 初始化 WebDriver\nWebDriver driver = new FirefoxDriver();\n\
    try {\n// 导航到 URL\ndriver.get(\"http://example.com\"); // 替换为您的目标 URL\n// 定义 FluentWait\
    \ 实例\nFluentWait wait = new FluentWait(driver)\n.withTimeout(Duration.ofSeconds(30))\
    \ // 总等待时间\n.pollingEvery(Duration.ofSeconds(5)) // 检查条件的频率\n.ignoring(NoSuchElementException.class)\
    \ // 忽略 NoSuchElementException\n.withMessage(\"元素在 30 秒内未找到\");\n// 使用 FluentWait\n\
    WebElement elementToTypeIn = wait.until(new Function() {\npublic WebElement apply(WebDriver\
    \ webDriver) {\nreturn webDriver.findElement(By.id(\"elementId\")); // 替换为合适的定位器\n\
    }\n});\n// 在输入框中输入内容\nelementToTypeIn.sendKeys(\"Hello, World!\");\n} finally\
    \ {\n// 关闭浏览器\ndriver.quit();\n}\n}\n}\n```\n"
- fmt: "# Fluent Wait\n\nIn this example, the `FluentWait` is set to wait up to 30\
    \ seconds for an element to appear, checking every 5 seconds. It ignores `NoSuchElementException`,\
    \ which is thrown by `driver.findElement()` if the element is not found on the\
    \ page. The custom message is included in the exception thrown if the timeout\
    \ is exceeded. This approach is useful when you are dealing with elements that\
    \ may have very variable load times or when dealing with a page that has a lot\
    \ of dynamic content. By using a fluent wait, you can create a highly customized\
    \ waiting strategy that’s adapted to the specific needs of the application.\n\n\
    ## Key Features of a Fluent Wait\n\n- **Customizable polling**: You can define\
    \ the frequency at which the condition should be checked. This is useful for reducing\
    \ the number of checks in scenarios where the element takes time to load.\n- **Timeout**:\
    \ You can set the maximum time to wait for a condition.\n- **Ignoring exceptions**:\
    \ You can specify one or more exceptions to ignore if they occur while polling\
    \ for the condition.\n- **Custom message**: You can provide a custom timeout message\
    \ which can be helpful for debugging.\n\n## Selecting the Right Wait\n\nThe choice\
    \ between implicit, explicit, and fluent waits depends on the specific requirements\
    \ and complexities of the web elements and their behavior in a test environment.\
    \ Let’s discuss the workings, usage, setup, and behavior along with the limitations\
    \ for each wait to help choose the best one for the requirements.\n\n### Implicit\
    \ Wait\n\n- **How it works**: An implicit wait tells `WebDriver` to wait for a\
    \ certain amount of time before throwing a `NoSuchElementException` if an element\
    \ is not found. This wait is set globally for the lifetime of the `WebDriver`\
    \ instance and is applied to all element searches.\n- **When to use it**: Use\
    \ it when you have a relatively small, fixed delay that you can apply to all element\
    \ searches in a test script.\n- **Setting it up**: It is set for the entire duration\
    \ of the `WebDriver` object’s life. Once set, it is applied to all `findElement`\
    \ and `findElements` calls.\n- **Behavior**: The driver polls the DOM at regular\
    \ intervals until the element is found or the timeout is reached.\n- **Limitations**:\
    \ It cannot be used for more complex conditions. Also, if set too long, it can\
    \ cause unnecessary delays in test execution.\n- **Code example**\n\n```\ndriver.manage().timeouts().implicitlyWait(10,\
    \ TimeUnit.SECONDS);\n```\n\n### Explicit Wait\n\n- **How it works**: An explicit\
    \ wait instructs the `WebDriver` to wait for certain conditions (Expected Conditions)\
    \ or the maximum time exceeded before throwing an `ElementNotVisibleException`.\
    \ Explicit wait is specific to a particular element and its condition.\n- **When\
    \ to use it**: Use it when you need to wait for specific conditions on certain\
    \ elements, like waiting for an element to become clickable, visible, or to have\
    \ a specific text.\n- **Setting it up**: It is set for each particular instance\
    \ where it is needed. You can define `WebDriverWait` along with the specific condition.\n\
    - **Behavior**: The driver waits for the specified condition before proceeding.\
    \ If the condition is not met within the timeout, a `TimeoutException` is thrown.\n\
    - **Limitations**: It requires more boilerplate code compared to implicit waits\
    \ and needs to be implemented for each specific condition and element.\n- **Code\
    \ example**\n\n```\nWebDriverWait wait = new WebDriverWait(driver, 10);\nWebElement\
    \ element = wait.until(ExpectedConditions.visibilityOfElementLocated(By.id(\"\
    someId\")));\n```\n\n### Fluent Wait\n\n- **How it works**: A fluent wait allows\
    \ for more complex configurations of wait conditions. You can set the maximum\
    \ amount of time to wait for a condition, the frequency with which to check the\
    \ condition, and ignore certain types of exceptions during the wait.\n- **When\
    \ to use it**: It is ideal for more complex scenarios where you need to customize\
    \ the polling frequency or ignore specific types of exceptions during the wait\
    \ (e.g., waiting for Ajax elements).\n- **Setting it up**: You can configure a\
    \ fluent wait by creating a `FluentWait` instance, setting the timeout, polling\
    \ frequency, and exceptions to ignore.\n- **Behavior**: A fluent wait checks the\
    \ condition at the specified polling intervals and continue until the condition\
    \ is met or the timeout expires. It ignores the specified exceptions during the\
    \ polling process.\n- **Limitations**: It is more complex to set up and configure\
    \ compared to an explicit wait. Might be overkill for simpler conditions where\
    \ standard `ExpectedConditions` are sufficient.\n- **Code example**\n\n```\nFluentWait\
    \ wait = new FluentWait(driver)\n    .withTimeout(Duration.ofSeconds(30))\n  \
    \  .pollingEvery(Duration.ofSeconds(5))\n    .ignoring(NoSuchElementException.class);\n\
    WebElement element = wait.until(new Function() {\n    public WebElement apply(WebDriver\
    \ driver) {\n        return driver.findElement(By.id(\"someId\"));\n    }\n});\n\
    ```\n\n## Comparative Analysis of Implicit, Explicit, and Fluent Waits\n\nTable\
    \ [10-1](#608985_1_En_10_Chapter.xhtml#Tab1) summarizes implicit, explicit, and\
    \ fluent waits in Selenium.\n\n**Table 10-1** *Waits Comparison*\n\n| Criteria\
    \ | Implicit Waits | Explicit Waits | Fluent Waits |\n| --- | --- | --- | ---\
    \ |\n| **Scope of Application** | Global for all web elements | Specific to particular\
    \ elements or conditions | Specific, with customizable polling and timeout settings\
    \ |\n| **Wait Conditions** | Waits for elements to be present in the DOM | Waits\
    \ for specific conditions (like visibility, clickability) | Waits for custom-defined\
    \ conditions with flexible checking intervals |\n| **Flexibility** | Less flexible;\
    \ same wait time for all elements | More flexible; different conditions for different\
    \ elements | Most flexible; customizable wait conditions, intervals, and timeouts\
    \ |\n| **Frequency of Condition Checking** | No control over frequency | Fixed\
    \ frequency as defined in `ExpectedConditions` | Customizable frequency for condition\
    \ checks |\n| **Exception Handling** | No specific exception handling mechanism\
    \ | Can handle some exceptions (like `NoSuchElementException`) | Allows for detailed\
    \ exception handling during the wait period |\n| **Timeout Configuration** | Fixed\
    \ timeout for the duration of the `WebDriver` | Fixed timeout for each condition\
    \ | Customizable maximum timeout and polling frequency |\n| **Complexity** | Simple\
    \ to implement and use | More complex than implicit waits but generally straightforward\
    \ | Most complex, offering granular control over wait conditions |\n| **Use Case**\
    \ | Useful for simple, static pages where elements load at similar times | Ideal\
    \ for dynamic content where specific conditions are expected | Best suited for\
    \ highly dynamic and unpredictable web elements |\n\nThis table highlights the\
    \ key differences to help you make an informed choice about which type of wait\
    \ to use in Selenium testing scenarios.\n\n## Best Practices to Use Waits in Selenium\
    \ Test Automation\n\nUsing waits effectively is a crucial aspect of Selenium test\
    \ automation, as it ensures that the tests are reliable and robust. Here are some\
    \ best practices for using waits in Selenium.\n\n- **Prefer explicit waits over\
    \ implicit waits.** Use explicit waits (`WebDriverWait` with `ExpectedConditions`)\
    \ as they are more reliable for complex conditions. They allow you to wait for\
    \ specific conditions on specific elements.\n- **Avoid using fixed sleeps (`Thread.sleep()`).**\
    \ Fixed sleeps (`Thread.sleep()`) cause tests to wait for a predetermined amount\
    \ of time, which can be inefficient and lead to longer test execution times. They\
    \ do not account for the actual condition of the elements."
