  trans: "\n当您处理动态网页时，iframe 可能不会渲染固定属性，或者其位置可能发生变化。在这种情况下，您需要像定位页面上其他任何元素一样，将它们作为\
    \ Web 元素进行定位。一旦定位到该元素，您就需要切换到它。以下是 iframe 的简单 HTML 代码。\n\n```\n\n由于 iframe 是动态的，您需要使用类名来定位它。\n\
    \n```\n// 将 iframe 定位为 WebElement\nWebElement iframeElement = driver.findElement(By.className(\"\
    dynamicIframe\"));\n```\n\n现在，将 iframe 定位为 Web 元素后，您需要使用 `switchTo()` 函数切换到该 iframe。\n\
    \n```\n// 使用 WebElement 切换到 iframe\ndriver.switchTo().frame(iframeElement);\n\
    ```\n\n这种方法提供了更高的灵活性和精确性，尤其是在现代 Web 应用时代，iframe 可以通过 JavaScript 生成、移除或拥有动态变化的属性。\n\
    \n**带等待的框架**\n\n当处理可能需要时间加载或变为可交互的 Web 元素时（这在 Web 测试中经常需要），这一点对于具有同步内容加载能力的 iframe\
    \ 和框架尤其有效。为了确保测试健壮可靠，在切换到 iframe 之前，必须等待它们在网页上变为可用。\n\n在处理 iframe 时可以使用等待，确保在您想要与\
    \ iframe 内部的元素交互时，它已加载完毕且其内容可用。以下是其 HTML 代码。\n\n```\n\n让我们使用显式等待，这在 Selenium 中经常使用，即在继续之前应满足特定条件。\n\
    \n```\nimport org.openqa.selenium.By;\nimport org.openqa.selenium.WebDriver;\n\
    import org.openqa.selenium.support.ui.ExpectedConditions;\nimport org.openqa.selenium.support.ui.WebDriverWait;\n\
    // 假设 'driver' 是 WebDriver 的一个实例并且已经初始化\n// 设置超时时间为 10 秒的显式等待\nWebDriverWait wait\
    \ = new WebDriverWait(driver, 10);\n// 等待 iframe 可用，然后切换到它\nwait.until(ExpectedConditions.frameToBeAvailableAndSwitchToIt(By.id(\"\
    dynamicLoadingFrame\")));\n// 现在，您已进入 iframe 内部，可以执行操作\n// ...\n// 操作完成后切换回主内容\n\
    driver.switchTo().defaultContent();\n```\n\n该代码使用显式等待来确保 WebDriver 实例等待 10 秒，以使\
    \ iframe 在页面上可用。如果 iframe 在指定时间内不可用，您将收到 `TimeoutException` 错误。\n\n通过使用此策略，您可以防止意外的加载延迟导致测试失败，从而提高测试对网络速度、服务器响应时间和其他不可预见情况变化的抵抗力。在与\
    \ iframe 或其组件交互之前，始终等待它们准备就绪是一个好习惯，尤其是在内容加载可能是动态或异步的情况下。\n\n**文本框**\n\n在许多 Web\
    \ 表单中，文本框是重要的元素，它们方便用户输入，从简单的搜索到复杂的数据录入。接下来，让我们看看各种类型的文本框以及如何使用 Selenium 定位它们。\n\
    \n**单行文本框**\n\n一个输入字段，通常显示为 `type` 属性设置为 `text` 的单行文本框，用于简洁的输入。一些示例包括用户名、查询搜索和电子邮件地址。\n\
    \n以下是一个 HTML 示例。\n\n```\n单行文本框\n书名：\n\n```\n\n图 7-2 显示了该 HTML 在网页上的呈现效果。\n\n![](img/608985_1_En_7_Fig2_HTML.jpg)\n\
    \n网页上书名字段的截图。显示了单行文本框。\n\n**图 7-2**\n带有书名字段的单行文本框\n\n在与文本框交互之前，您需要先在网页上定位它。因此，根据提供的\
    \ HTML，让我们使用 ID 属性来定位文本框。\n\n```\n// 定位文本框\nWebElement bookTextbox = driver.findElement(By.id(\"\
    nook_name\"));\n```\n\n现在，您已经定位了文本框，可以与之交互了。\n\n*   **插入值**：定位文本框后，您可以使用第 3 章讨论的键盘操作来插入值。\n\
    \n```\n    // 向文本框插入值\n    bookTextbox.sendKeys(\"Python Testing with Selenium\"\
    );\n    ```\n\n*   您已将值 `Python Testing with Selenium` 插入到文本框中。让我们看看如何检索这个值。\n\
    \n*   **检索值**：您还可以检索已在文本框中输入的值。这通常用于将该值与预期值进行比较，并检查文本框是否有其他行为。\n\n```\n    //\
    \ 从文本框检索值\n    String bookName = bookTextbox.getAttribute(\"value\");\n    System.out.println(\"\
    输入的书名: \" + bookName);\n    ```\n\n*   如果该文本存在于定位到的文本框中，这将输出您在文本框中输入的书名。\n\n您现在已了解如何使用\
    \ Selenium 定位文本框以及执行诸如插入值和验证输入的文本等交互操作，从而确保 Web 应用程序能够按原样接受并显示用户提供的输入。\n\n**多行文本框**\n\
    \n在多行文本框中，用户可以跨多行输入，可以是评论、描述或任何形式的扩展文本。\n\n您可以使用 HTML 中的 `<textarea>` 标签创建多行文本框。以下代码表示\
    \ HTML 中的多行文本框。\n\n```\n多行文本框\n描述：\n\n```\n\n图 7-3 显示了该 HTML 在网页上的呈现效果。\n\n![](img/608985_1_En_7_Fig3_HTML.jpg)\n\
    \n网页上描述字段的截图。显示了多行文本框。\n\n**图 7-3**\n带有描述字段的多行文本框\n\n在 HTML 代码中，提供了一个描述字段供用户输入多行文本，这在单行文本框中是看不到的。根据此\
    \ HTML 代码，让我们使用其 ID 属性（其值为 `description`）来定位多行文本框。\n\n**定位多行文本框**\n\n让我们定位一个多行文本框，然后通过插入和检索输入的值来与之交互。那么，我们首先使用\
    \ ID 属性来定位它。\n\n```\n// 定位多行文本框\nWebElement descriptionTextarea = driver.findElement(By.id(\"\
    description\"));\n```\n\n**插入值**\n\n现在，一旦您从网页上定位到多行元素，就可以使用 `sendKeys()` 方法向多行文本框提供输入。\n\
    \n```\n// 向文本框插入值\ndescriptionTextarea.sendKeys(\"这是一段示例描述文本。\\n 它覆盖了多行。\");\n\
    ```\n\n`sendKeys()` 方法使用了 `\\n`，这是 Java 中的一个转义序列，模拟按下 Enter 键，从而在文本区域中创建新行。\n\n\
    **从多行文本框检索值**\n\n要从多行文本框中检索输入的文本，您可以使用 `getText()` 方法。检索其值是为了在自动化测试中进行验证或确认。\n\
    \n```\n// 从文本框检索值\nString descriptionText = descriptionTextarea.getText();\nSystem.out.println(\"\
    输入的描述: \" + descriptionText);\n```\n\n此代码片段返回从多行文本框中输入的所有文本。这在测试场景中是一个关键步骤，例如用户反馈、评论部分或任何您期望用户输入扩展文本的情况。\n"
- fmt: '# Summary


    This chapter focused on two pivot elements in web automation: `iframes` and textboxes.
    It started by handling `iframes`, which are crucial for interacting with embedded
    web content. It explored different strategies for switching to `iframes`, such
    as using ID, name, index, and web element. This knowledge is necessary as `iframes`
    often contain essential elements that require special attention because of their
    separate DOM structure. In addition, you learned the challenges while handling
    nested `iframes`, which emphasized the importance of sequential navigation and
    discussed explicit waits that enabled dynamic content loading, thus ensuring the
    robustness and reliability of test cases.


    The chapter also discussed the nuances of single-line textboxes and multiline
    textboxes. Single-line textboxes used for entering fields, like email addresses
    or names, were discussed in the context of efficiently inserting and retrieving
    values, a staple in form-based applications. You learned about multiline textboxes
    and textareas, delving into their role in capturing more extensive user inputs
    like comments or descriptions. You saw practical examples of interacting with
    these user inputs in Selenium, highlighting the importance of precision in entering
    and validating data for automated testing.


    The chapter covered handling complex web elements to enable you to create effective
    and reliable automated tests.


    # 8. Assertions


    This chapter explores the fundamental concepts, techniques, and best practices
    related to assertions in Selenium. Assertions are trusted tools for validating
    the behavior and functionality of web applications during automated testing.


    Starting with an introduction to assertions, you learn what assertions are and
    why they hold immense importance in the Selenium testing framework. You then dive
    into the two primary types of assertions: hard and soft.


    Next, you explore a range of assert methods provided by Selenium, which are essential
    for comparing and verifying expected outcomes against actual results in your tests.
    You also delve into handling assertion failures, where you learn what happens
    when assertions fail and how to gracefully manage these failures while ensuring
    comprehensive logging and reporting.


    Custom assertions are another focus of discussion. You discover how to create
    custom assertion methods tailored to specific application requirements. You explore
    extending assertion functionality to effectively meet your unique testing needs.


    Finally, you learn the common pitfalls and mistakes made when working with assertions
    in Selenium, along with strategies to avoid false positives and negatives.


    Throughout your journey, you emphasize best practices for using assertions in
    Selenium, covering when to use them, how to keep them simple and specific, crafting
    meaningful error messages, and organizing assertions within your test cases. These
    best practices enable you to build reliable, maintainable, and efficient Selenium
    test scripts.


    ## What Are Assertions?


    Assertions in Selenium are statements or checks that you embed in your automated
    test scripts to verify whether certain conditions are met during the execution
    of a web application. These conditions can encompass a wide range of criteria,
    such as checking if a specific element is present on a web page, if the text matches
    your expectations, or if the URL matches a predefined pattern. Essentially, assertions
    help you validate whether the application behaves as expected.


    ## The Need for Assertions


    Assertions are not just code statements; they are integral to the efficacy and
    reliability of automated tests.


    - **Verification of expected behavior:** Assertions act as quality control mechanisms
    and standards, allowing you to ensure that the web application behaves as intended
    and conforms to predefined criteria. It also ensures that new changes or updates
    haven’t broken existing features or behavior.

    - **Test automation efficiency:** Without assertions, you would need manual intervention
    to confirm whether a test has passed or failed, which defeats the purpose of automation.
    Assertions automate the validation process and speed up the feedback loop in development
    cycles.

    - **Error detection:** Assertions help you detect issues early in the testing
    process. If an assertion fails, it indicates a problem with the application or
    your test script, enabling you to promptly pinpoint and address the issue.

    - **Documentation:** Assertions are documentation within your test scripts, clarifying
    what conditions you are testing and what constitutes a successful test.


    ## Hard Assertions (Asserts)


    Hard assertions are stringent checkpoints in your Selenium tests. When you employ
    a hard assertion that fails, the test script halts immediately, and the entire
    test is marked as failed. Think of them as non-negotiable conditions that must
    be met for the test to proceed.


    For example, when you use a hard assertion to confirm that a Submit button is
    present on a page and it’s not found, the test stops, and you’ll receive a failure
    message. This is essential for avoiding false positives and ensuring the reliability
    of test results.


    Using Java code, the following illustrates hard assertions (Asserts) in Selenium.
    Let’s also create a simple HTML page for this example.


    ```html

    //HTML Code


    Sample Page


    Welcome to Selenium Assertions Example

    This is a sample paragraph.

    Submit

    ```


    Let’s write Java code using Selenium to interact with this HTML page and perform
    assertions.


    ```java

    import org.openqa.selenium.By;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.WebElement;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.testng.Assert;

    public class HardAssertionsExample {

    public static void main(String[] args) {

    // Set the path to your ChromeDriver executable

    System.setProperty("webdriver.chrome.driver", "path/to/chromedriver");

    // Create a new instance of ChromeDriver

    WebDriver driver = new ChromeDriver();

    // Navigate to the HTML page

    driver.get("file:///path/to/example.html");

    // Find the elements on the page

    WebElement textElement = driver.findElement(By.id("textElement"));

    WebElement submitButton = driver.findElement(By.id("submitButton"));

    // Perform hard assertions (Asserts)

    Assert.assertEquals(textElement.getText(), "This is a sample paragraph");

    Assert.assertTrue(submitButton.isDisplayed());

    // Close the browser

    driver.quit();

    }

    }

    ```


    This example used hard assertions (Asserts) to validate two conditions: the text
    of a paragraph element and the presence of a Submit button. If either of these
    assertions fails, the test stops immediately, and the test is marked as failed.


    ## Soft Assertions (Verify)


    Soft assertions, often called *verify*, are a more flexible approach to validation
    in Selenium. When you use a soft assertion, you are setting conditions that are
    important to check but not critical enough to warrant stopping the test immediately
    upon failure. With soft assertions, the test script continues running even if
    some conditions fail, and it collects information about all the failures for later
    analysis.


    Think of an example: when you use a soft assertion to validate the content of
    multiple elements on a page, and one of them doesn’t match your expectations,
    the test won’t stop immediately. Instead, it continues running, and you can inspect
    all the failures once the test is complete. Verify is another word given to soft
    assertions when testing a web application.


    For the preceding HTML code, implement a soft assertion to it and see the difference
    in the behavior of the test.'
