- fmt: '### Pause


    A pause is a delay in actions to be performed. This delay can be used in a sequence
    of actions to be performed or on a single action that needs to be available on
    a web page.


    ```

    import java.time.Duration;

    Actions actions = new Actions(driver);

    actions.moveToElement(someElement)

    .click()

    .pause(1000) // Pause for 1000 milliseconds (1 second)

    .click(anotherElement)

    .perform();

    ```


    In some cases, the UI functionality can be tested in automation by imitating the
    user actions, making a more realistic scenario.


    ### Release


    It is a method to release a mouse action (button) clicked earlier and held down.
    One common example is drag-and-drop, where you need to drag an element from its
    position to its destination and release it.


    ```

    import org.openqa.selenium.interactions.Actions;

    // Other imports...

    Actions actions = new Actions(driver);

    actions.clickAndHold(someElement) // Click and hold on an element

    .moveToElement(anotherElement) // Move to another element

    .release() // Release the mouse button

    .perform(); // Perform the entire action sequence

    ```


    ### Reset


    This reset action in Selenium is used to reset or clear all the current state
    of the actions that are listed in the action builder.


    ```

    Actions actions = new Actions(driver);

    actions.moveToElement(someElement)

    .click()

    .perform();

    actions.reset(); // Reset the actions builder

    actions.moveToElement(anotherElement)

    .contextClick()

    .perform();

    ```


    Note


    This function focuses an element on the web page.


    As seen in the preceding code snippet, you can build a new sequence of actions
    from the start without creating an `Action` object.


    ## Mouse Movements


    Mouse movement refers to the cursor or pointer that moves on the screen with the
    help of the mouse. These movements are chained into various actions in Selenium
    that are explained next.


    ### Move to Element


    This method moves the mouse cursor to the center of the defined web element, which
    imitates the hover behavior. It is used in hover-related cases like drop-down
    menus or exploring hidden elements when hovering.


    ```

    from selenium import webdriver

    from selenium.webdriver.common.action_chains import ActionChains

    # Initialize WebDriver

    driver = webdriver.Chrome()

    # Navigate to website

    driver.get("https://example.com")

    # Locate the element

    element_to_hover_over = driver.find_element_by_id("some-id")

    # Create ActionChains object

    action = ActionChains(driver)

    # Perform the hover action

    action.move_to_element(element_to_hover_over).perform()

    ```


    This method moves the mouse pointer to the center of the web element. If the web
    element is not available then it raises an error.


    ### Move by Offset


    In Selenium, you can move the mouse pointer by defining the number of pixels as
    offset values. The mouse pointer can be at the current position in the viewport
    or on a specific web element. The offset values are `x` and `y` coordinates defining
    the position to move the mouse pointer.


    Note


    Viewport is the display region of the web page that is seen on the browser window.


    ```

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.openqa.selenium.interactions.Actions;

    public class OffsetExample {

    public static void main(String[] args) {

    // Initialize the WebDriver

    WebDriver driver = new ChromeDriver();

    // Navigate to a website

    driver.get("https://example.com");

    // Create an instance of the Actions class

    Actions actions = new Actions(driver);

    // Move the mouse 50 pixels to the right and 100 pixels down from the viewport''s
    top-left corner

    actions.moveByOffset(50, 100).perform();

    // Optionally, close the browser

    driver.quit();

    }

    }

    ```


    The offset value starts from the upper-left corner of the screen defined at (`x=0`,
    `y=0`). Remember that there is no default value of the offset and the offset value
    is always relative to the current position of the mouse pointer. Let’s look at
    the various methods available to move the mouse pointers.


    ### Offset from Element


    When this method is used, the mouse pointer moves to the center of the specified
    web element. When the mouse pointer is positioned at the center of the web element,
    the mouse pointer is moved by the offset values provided.


    ```

    import org.openqa.selenium.By;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.WebElement;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.openqa.selenium.interactions.Actions;

    public class OffsetFromElementExample {

    public static void main(String[] args) {

    // Initialize the WebDriver

    WebDriver driver = new ChromeDriver();

    // Navigate to a website

    driver.get("https://example.com");

    // Locate the desired web element

    WebElement targetElement = driver.findElement(By.id("someElementId"));

    // Create an instance of the Actions class

    Actions actions = new Actions(driver);

    // Move the mouse to the center of the target element and then move it by the
    specified offsets

    actions.moveToElement(targetElement).moveByOffset(50, 100).perform();

    // Optionally, close the browser

    driver.quit();

    }

    }

    ```


    This code moves the mouse pointer to the center of the defined web element (i.e.,
    `targetElement`) and then immediately moves it by the specified offset values.
    This combined action is executed by the `perform()` function.


    Note


    `xOffset` -> defines horizontal movement (when the value is positive mouse pointer
    moves toward the right, and if negative, it moves toward the left.)


    `yOffset` -> Vertical movement (positive value defines the down movement whereas
    negative value define upward movement.)


    ### Offset from Viewport


    The viewport is the visible part of the web page, and the mouse cursor moves within
    this viewport. The offset value starts from the upper-left corner of the screen.


    ```

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.openqa.selenium.interactions.Actions;

    public class OffsetExample {

    public static void main(String[] args) {

    // Initialize the WebDriver

    WebDriver driver = new ChromeDriver();

    // Navigate to a website

    driver.get("https://example.com");

    // Create an instance of the Actions class

    Actions actions = new Actions(driver);

    // Move the mouse 50 pixels to the right and 100 pixels down from the viewport''s
    top-left corner

    actions.moveByOffset(50, 100).perform();

    // Optionally, close the browser

    driver.quit();

    }

    }

    ```


    There are two offset values: `x` and `y`. The `x` offset value depicts horizontal
    movement, and the `y` offset value depicts vertical movement of the cursor. This
    example moved the mouse cursor using offset values starting from the viewport’s
    top-left corner.'
