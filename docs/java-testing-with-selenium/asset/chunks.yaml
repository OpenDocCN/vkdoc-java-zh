- fmt: '# Key Down


    `keyDown`方法模拟键盘操作中的按键按下。按键按下意味着按住一个键而不释放。当您希望字母大写或使用特殊字符时，请按住`Shift`键。要通过按住`Ctrl`键选择多个元素，请使用`keyDown`方法。


    # Key Up


    `keyUp`方法释放之前按下的键，然后执行其他键盘操作。它主要与`keyDown`方法配合使用，以模拟完整的按键按下和释放动作。


    # Send Keys


    当您想要在网页元素（例如密码、文本区域和搜索框）中输入文本时，请使用`sendKeys`方法。您可以使用此方法链式执行多个操作。以下代码展示了以大写字母输入文本的示例。


    按键将保持按下状态，直到您结束链式操作或使用接下来讨论的`keyUp`方法。


    ```

    public class Mouse {

    public static void main(String[] args) {

    //Set system properties

    System.setProperty("webdriver.firefox.driver"," path/to/geckodriver");

    // Creating a new instance for Firefox driver

    WebDriver driver = new FirefoxDriver();

    // Directing to the URL

    driver.get("https://google.com/");

    Actions actions = new Actions(driver);

    // Locate the element with ID "query" and simulate pressing and holding the Shift
    key while typing "abc"

    actions.moveToElement(driver.findElement(By.name("q")))

    .keyDown(Keys.SHIFT)

    .sendKeys("java selenium book sujay")

    .keyUp(Keys.SHIFT)

    .perform();

    }

    }

    ```


    此示例代码使用了`keyDown`和`keyUp`方法与`sendKeys`，模拟了在Google搜索框中以大写形式输入文本的操作。


    # Scroll


    在操作方面，除了鼠标点击之外，您还可以使用鼠标滚轮执行操作。在Selenium WebDriver中，您可以向上或向下滚动网页。Selenium WebDriver本身不支持像鼠标和键盘操作那样的滚动操作。接下来，让我们讨论用于模拟滚动操作的动作。


    # Scroll to Element


    当处理视口之外的元素时，请使用`scrollToElement`方法。Selenium中的`Action`类不会像`click()`或`sendKeys()`等更传统的方法那样自动将目标元素滚动到视口中。因此，在使用`Actions`类对元素执行操作之前，您通常需要确保该元素是可见的。


    ```

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.firefox.FirefoxDriver;

    import org.openqa.selenium.interactions.Actions;

    import org.openqa.selenium.By;

    import org.openqa.selenium.JavascriptExecutor;

    import org.openqa.selenium.WebElement;

    public class Mouse {

    public static void main(String[] args) {

    //Set system properties

    System.setProperty("webdriver.firefox.driver","path/to/geckodriver");

    // Creating a new instance for Firefox driver

    WebDriver driver = new FirefoxDriver();

    // Directing to the URL

    driver.get("https://link.springer.com/");

    WebElement elementToScrollTo = driver.findElement(By.linkText("Biomedicine"));

    Actions actions = new Actions(driver);

    actions.moveToElement(elementToScrollTo).perform();

    // Using JavascriptExecutor

    JavascriptExecutor js = (JavascriptExecutor) driver;

    js.executeScript("arguments[0].scrollIntoView(false);", elementToScrollTo);

    }

    }

    ```


    要执行滚动操作，请使用Selenium中的`JavascriptExecutor`库。如示例所示，`scrollIntoView`方法将目标元素带入视口，而`scrollIntoView(false)`确保目标元素的底部与视口底部对齐。


    # Scroll by a Given Amount


    `scrollByAmount`是最常用的滚动方法之一，用于按像素数垂直或水平滚动。`delta x`和`delta y`值分别指定水平滚动和垂直滚动的量。当您希望按指定量（而非按元素）滚动Web应用程序时，此方法非常有用。


    ```

    public static void main(String[] args) {

    //Set system properties

    System.setProperty("webdriver.firefox.driver","path/to/geckodriver");

    // Creating a new instance for Firefox driver

    WebDriver driver = new FirefoxDriver();

    // Directing to the URL

    driver.get("https://selenium.dev/");

    // Define the amount to scroll horizontally and vertically

    int deltaX = 50; // 50 pixels to the right

    int deltaY = 100; // 100 pixels downward

    // Create an Actions sequence to scroll by the fixed amount

    new Actions(driver)

    .scrollByAmount(deltaX, deltaY)

    .perform();

    }

    }

    ```


    此示例向右滚动50像素，向下滚动100像素。此操作在测试懒加载项、无限滚动功能或在特定滚动量后激活的任何其他功能时非常有用。


    # Scroll from an Element by a Given Amount


    在此方法中，您首先将定义的Web元素带入视图，然后按预定的像素数分别水平（`delta x`）和垂直（`delta y`）滚动离开该元素。当您想要测试紧邻指定参考元素侧面或下方的Web元素或功能时，可以使用此操作。


    ```

    public static void main(String[] args) {

    //Set system properties

    System.setProperty("webdriver.firefox.driver","path/to/geckodriver");

    // Creating a new instance for Firefox driver

    WebDriver driver = new FirefoxDriver();

    // Directing to the URL

    driver.get("https://link.springer.com/");

    // Locate the origination element

    WebElement originationElement = driver.findElement(By.linkText("books"));

    // Define the scroll origin at the center of the element

    WheelInput.ScrollOrigin scrollOrigin = WheelInput.ScrollOrigin.fromElement(originationElement);

    WheelInput.ScrollOrigin scrollOrigin = WheelInput.ScrollOrigin.fromElement(originationElement,
    0, 100);

    // Create an Actions sequence to scroll from the defined origin by 500 pixels
    downward

    new Actions(driver)

    .scrollFromOrigin(scrollOrigin, 0, 500)

    .perform();

    }

    ```


    该示例定义了视口中可用的元素，然后使用`scrollIntoView`方法按像素数进行滚动。接下来，让我们看看带偏移量的元素滚动。


    # Scroll from an Element with an Offset


    此方法允许您从由相对于已定义Web元素中心的偏移量确定的特定位置滚动Web应用程序。当您想要滚动到与元素对应的特定位置（而非元素本身）时，此方法非常有用。


    ```

    public static void main(String[] args) {

    //Set system properties

    System.setProperty("webdriver.firefox.driver","path/to/geckodriver");

    // Creating a new instance for Firefox driver

    WebDriver driver = new FirefoxDriver();

    // Directing to the URL

    driver.get("https://link.springer.com/");

    // Locate the origination element

    WebElement originationElement = driver.findElement(By.linkText("books"));

    // Define the scroll origin as a point 100 pixels above the center of the footer

    WheelInput.ScrollOrigin scrollOrigin = WheelInput.ScrollOrigin.fromElement(originationElement,
    0, 100);

    // Create an Actions sequence to scroll from the defined origin by 500 pixels
    downward

    new Actions(driver)

    .scrollFromOrigin(scrollOrigin, 0, 500)

    .perform();

    }

    ```


    在此示例中，从已定义的Web元素按像素数执行了滚动操作。接下来，让我们看看可以使用Selenium执行的滚动操作。'
