    ### Scroll


    When referring to operations, you can use the mouse’s actions apart from clicks
    by the mouse’s scroll wheel. In Selenium WebDriver, you can scroll the web page
    up or down. Selenium WebDriver does not natively support scroll actions like mouse
    and keyboard actions. Next, let’s discuss actions that are used to stimulate scrolling
    actions.


    ### Scroll to Element


    When dealing with elements that are present outside of the viewport, you use the
    scrollToElement method. The Action class in Selenium does not automatically scroll
    the target element into the viewport like more conventional methods, such as click()
    or sendKeys(), do. As a result, before performing actions on an element using
    the Actions class, you frequently need to make sure that it is visible.


    ```

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.firefox.FirefoxDriver;

    import org.openqa.selenium.interactions.Actions;

    import org.openqa.selenium.By;

    import org.openqa.selenium.JavascriptExecutor;

    import org.openqa.selenium.WebElement;

    public class Mouse {

    public static void main(String[] args) {

    //Set system properties

    System.setProperty("webdriver.firefox.driver","path/to/geckodriver");

    // Creating a new instance for Firefox driver

    WebDriver driver = new FirefoxDriver();

    // Directing to the URL

    driver.get("https://link.springer.com/");

    WebElement elementToScrollTo = driver.findElement(By.linkText("Biomedicine"));

    Actions actions = new Actions(driver);

    actions.moveToElement(elementToScrollTo).perform();

    // Using JavascriptExecutor

    JavascriptExecutor js = (JavascriptExecutor) driver;

    js.executeScript("arguments[0].scrollIntoView(false);", elementToScrollTo);

    }

    }

    ```


    To execute the scroll action, use the JavascriptExecutor library in Selenium.
    As seen in the example, the scrollIntoView method brings the target element into
    the view in the viewport, and scrollIntoView(false) ensures that the bottom of
    the target element aligns with the bottom of the viewport.


    ### Scroll by a Given Amount


    scrollByAmount is one of the most common scrolling methods used to scroll vertically
    or horizontally, defined by the number of pixels. The delta *x* and delta *y*
    values specify to scroll horizontally and vertically respectively. This method
    is useful when you want to scroll web applications by a specified amount rather
    than an element.


    ```

    public static void main(String[] args) {

    //Set system properties

    System.setProperty("webdriver.firefox.driver","path/to/geckodriver");

    // Creating a new instance for Firefox driver

    WebDriver driver = new FirefoxDriver();

    // Directing to the URL

    driver.get("https://selenium.dev/");

    // Define the amount to scroll horizontally and vertically

    int deltaX = 50; // 50 pixels to the right

    int deltaY = 100; // 100 pixels downward

    // Create an Actions sequence to scroll by the fixed amount

    new Actions(driver)

    .scrollByAmount(deltaX, deltaY)

    .perform();

    }

    }

    ```


    This example scrolls by 50 pixels to the right and 100 pixels down. This operation
    can be helpful when testing lazy-loading items, infinite scrolling capabilities,
    or any other functionality that is activated after a particular amount of scrolling.


    ### Scroll from an Element by a Given Amount


    In this method, you first bring the defined web element into view before scrolling
    away from it by a predetermined number of pixels both horizontally (delta *x*)
    and vertically (delta *y*), respectively. This action is used when you want to
    test web elements or functionalities that are present immediately to the side
    or below a specified reference element.


    ```

    public static void main(String[] args) {

    //Set system properties

    System.setProperty("webdriver.firefox.driver","path/to/geckodriver");

    // Creating a new instance for Firefox driver

    WebDriver driver = new FirefoxDriver();

    // Directing to the URL

    driver.get("https://link.springer.com/");

    // Locate the origination element

    WebElement originationElement = driver.findElement(By.linkText("books"));

    // Define the scroll origin at the center of the element

    WheelInput.ScrollOrigin scrollOrigin = WheelInput.ScrollOrigin.fromElement(originationElement);

    WheelInput.ScrollOrigin scrollOrigin = WheelInput.ScrollOrigin.fromElement(originationElement,
    0, 100);

    // Create an Actions sequence to scroll from the defined origin by 500 pixels
    downward

    new Actions(driver)

    .scrollFromOrigin(scrollOrigin, 0, 500)

    .perform();

    }

    ```


    The example defined the element available in the viewport and then scrolled using
    the scrollIntoView method with the number of pixels. Next, let’s look at scrolling
    an element with an offset.


    ### Scroll from an Element with an Offset


    This method allows you to scroll web applications from a specific position determined
    by an offset from the center of a defined web element with an offset action. It
    is useful when you want to scroll to a particular location corresponding to an
    element rather than the element itself.


    ```

