    This chapter discussed action chains for stimulating complex user interactions
    incorporating several steps or using a keyboard and mouse simultaneously. The
    action chains enable you to automate testing the functionality of the web applications.


    With Action chains, you can perform a variety of keyboard actions like key presses,
    text entry, and key combinations. They also allow mouse actions like clicks, double
