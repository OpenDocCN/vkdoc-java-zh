    does not match within the wait period. There’s no specific exception for title
    mismatch other than timeout.


    ```java

    WebDriverWait wait = new WebDriverWait(driver, 10);

    Boolean isTitle = wait.until(ExpectedConditions.titleIs("Expected Title"));

    ```


    - `titleContains(String title)` waits for the page title to contain a certain
    text.


    **Failure**: If the title does not contain the specified text.


    **Exception Raised**: Typically results in a `TimeoutException` if the title does
    not contain the text within the specified time. There’s no specific exception
    for the title not containing the text other than timeout.


    ```java

    WebDriverWait wait = new WebDriverWait(driver, 10);

    Boolean doesTitleContain = wait.until(ExpectedConditions.titleContains("Partial
    Title"));

    ```


    - `alertIsPresent()` checks for an alert box to be present within a specified
    time frame set. If it is present, then it returns an alert element.


    **Failure**: If there’s an attempt to switch to or interact with an alert that’s
    not present.


    **Exception Raised**: `NoAlertPresentException`


    ```java

    WebDriverWait wait = new WebDriverWait(driver, 10);

    Alert alert = wait.until(ExpectedConditions.alertIsPresent());

    alert.accept();

    ```


    - `frameToBeAvailableAndSwitchToIt(String frameLocator)` waits for the frame to
    be available and then switches to it.


    **Failure**: If the frame is not found.


    **Exception Raised**: `NoSuchFrameException`


    ```java

    WebDriverWait wait = new WebDriverWait(driver, 10);

