  trans: "\n### 第 2 步：安装 JDK\n\n1.  **运行安装程序。**\n    *   **Windows**：双击下载的 .exe 文件，并按照安装说明进行操作。你可以选择希望安装\
    \ JDK 的目录。\n\n    *   **macOS（手动安装）**：打开 .dmg 文件并按照说明操作，通常涉及将 JDK 拖入“应用程序”文件夹。\n\
    \n    *   **macOS（使用 Homebrew）**：无需手动下载和安装 JDK，而是使用 Homebrew 这个包管理器来简化流程。打开终端并执行以下命令。\n\
    \n    ```\n    brew install openjdk\n    ```\n\n    安装后，Homebrew 可能会提示你链接 JDK。命令可能类似于以下内容。\n\
    \n    ```\n    sudo ln -sfn /usr/local/opt/openjdk/libexec/openjdk.jdk /Library/Java/JavaVirtualMachines/openjdk.jdk\n\
    \    ```\n\n    此步骤确保 JDK 在你的 macOS 系统中被正确识别。\n    *   **Linux**：通过图形文件管理器或使用命令行\
    \ **tar -xzf [文件名]** 将 .tar.gz 文件解压到你想要的位置。这会将 JDK 解压到你选择的目录中。\n\n2.  **按照安装步骤操作。**\
    \ 除非你有特定的偏好或要求，否则在安装过程中通常可以保持默认设置。\n\n### 第 3 步：设置环境变量\n\n在 Windows 中，执行以下操作。\n\
    \n1.  右键单击“此电脑”，选择“属性”，然后选择“高级系统设置”，打开“系统属性”。\n\n2.  单击“环境变量”按钮。\n\n3.  在“系统变量”中，单击“新建”创建一个新的\
    \ `JAVA_HOME` 变量，并将其值设置为你的 JDK 安装路径（例如，**C:\\Program Files\\Java\\jdk-11**）。\n\
    \n4.  在“系统变量”中找到 `Path` 变量，单击“编辑”并添加一个新条目：**%JAVA_HOME%\\bin**。\n\n在 macOS 和 Linux\
    \ 中，执行以下操作。\n\n1.  打开终端，使用 **vi** 或 **vim** 编辑你的 shell 配置文件，例如位于主目录下的 **.bash_profile**、**.bashrc**\
    \ 或 **.zshrc**。要打开文件，请键入 **vi ~/.bashrc** 或 **vim ~/.bashrc**（或替换为适合你 shell 的相应文件）。\n\
    \n2.  添加一行来导出 `JAVA_HOME` 变量，例如 **export JAVA_HOME=/usr/lib/jvm/jdk-11**。\n\n\
    3.  使用 **export PATH=$JAVA_HOME/bin:$PATH** 将 Java bin 目录添加到你的 `PATH` 变量中。此步骤确保\
    \ Java 二进制文件可以从命令行访问。\n\n4.  保存文件并退出 **vi** 或 **vim**。如果你使用的是 **vi**，可以通过键入 **:wq**\
    \ 并按 Enter 键来保存并退出。对于使用 **vim** 的用户，保存并退出的命令相同，即 **:wq**。\n\n5.  保存文件并重新加载你的配置文件，例如，通过运行\
    \ **source ~/.bashrc** 或与你编辑的 shell 配置文件相对应的命令。\n\n### 第 4 步：验证安装\n\n1.  打开命令行界面。\n\
    \    *   **Windows**：打开命令提示符。\n\n    *   **macOS/Linux**：打开终端。\n\n2.  检查 Java\
    \ 版本。\n    1.  键入 **java -version** 并按 Enter 键。这应该会显示已安装的 Java 版本，确认 Java 已成功安装并且路径在你的机器上设置正确。\n\
    \n    2.  键入 **javac -version** 以确保 Java 编译器已安装并可运行。\n\n### 第 5 步：必要时进行更新\n\n\
    定期检查 JDK 的更新，以确保你拥有最新的安全修复和性能改进。\n\n完成这些步骤后，你将在机器上建立一个功能完整的 Java 开发环境。此设置对于开发\
    \ Java 应用程序至关重要，并且是运行和编写 Selenium 自动化脚本的先决条件。\n\n## 安装 Eclipse IDE\n\n安装 Java\
    \ 后，下一步是安装 Eclipse IDE。以下步骤说明了如何操作。\n\n### 第 1 步：下载 Eclipse\n\n1.  打开你的网页浏览器，访问\
    \ [Eclipse 官方网站](https://www.eclipse.org/downloads/) ([`www.eclipse.org/downloads/`](http://www.eclipse.org/downloads/))。\n\
    \n2.  单击“**安装你喜欢的桌面 IDE 包**”的下载按钮，这将带你进入下一页进行下载，或者你也可以通过单击“下载包”链接，根据需求选择包。\n\n\
    3.  下载最新的可用版本，该版本非常适合 Java 开发。\n\n### 第 2 步：运行 Eclipse 安装程序\n\n1.  找到下载的文件（通常在“下载”文件夹中）。\n\
    \n2.  运行安装程序。\n    *   在 Windows 中，它是一个 .exe 文件。\n\n    *   在 macOS 中，它是一个 .dmg\
    \ 文件。\n\n    *   在 Linux 中，它通常是一个 .tar.gz 文件。\n\n### 第 3 步：安装 Eclipse\n\n1.  当安装程序打开时，选择“Eclipse\
    \ IDE for Java Developers”。\n\n2.  安装程序会提示你选择一个安装文件夹。你可以保留默认设置，或选择你希望安装 Eclipse\
    \ 的其他位置。\n\n3.  单击“安装”继续。\n\n### 第 4 步：完成安装\n\n等待安装完成。这可能需要几分钟时间。\n\n### 第 5 步：启动\
    \ Eclipse\n\n1.  Eclipse 安装完成后，你可以直接从安装程序启动它，或者通过在你选择的目录或桌面上创建的快捷方式启动。\n\n2. \
    \ 首次启动时，Eclipse 会要求你选择一个工作空间目录。这是你所有项目存储的位置。\n\n### 第 6 步：配置 Eclipse（可选）\n\nEclipse\
    \ 启动后，你可能希望根据自己的偏好进行配置。这可以包括设置代码样式、字体和颜色，或通过 Eclipse Marketplace 安装额外的插件。\n\n\
    ### 第 7 步：创建一个 Java 项目进行测试\n\n让我们创建一个新的 Java 项目，以确保一切设置正确。\n\n1.  转到文件 **➤** 新建\
    \ **➤** Java 项目。\n\n2.  如果你可以输入项目名称并设置项目，则你的 Eclipse 安装已准备好进行 Java 开发。\n\n注意\n\
    \nMaven 是专业 IT 环境中的首选工具，尤其是在测试自动化中，因为它具有项目管理和构建自动化能力。Apache Maven 的设置，包括其安装和环境配置，将在第\
    \ 12 章中讨论。\n\n就是这样！你已经成功地在你的机器上安装了 Eclipse IDE，可以开始处理 Java 项目了。具体步骤可能因操作系统而异，但整体流程大致相同。\n\
    \n## Selenium 安装\n\n成功安装 Java 和 Eclipse IDE 后，在开始你的自动化测试项目之前，你必须安装 Selenium WebDriver。以下步骤可确保\
    \ Selenium WebDriver 与 Eclipse IDE 的顺利安装。\n"
- fmt: "### Step 1: Download Selenium WebDriver\n\n1.  Open your web browser and navigate\
    \ to the Selenium official website (`https://www.selenium.dev/downloads/`).\n\n\
    2.  Scroll to the Selenium Client & WebDriver Language Bindings section and download\
    \ the Selenium WebDriver Java client. The download is a ZIP file containing Selenium\
    \ Java libraries and drivers.\n\nTable [2-1](#608985_1_En_2_Chapter.xhtml#Tab1)\
    \ lists WebDrivers and where to download each.\n\n**Table 2-1** WebDrivers\n\n\
    | WebDriver | Browser Supported | Download URL |\n| --- | --- | --- |\n| ChromeDriver\
    \ | Google Chrome | `https://sites.google.com/chromium.org/driver/` |\n| GeckoDriver\
    \ | Mozilla Firefox | `https://github.com/mozilla/geckodriver/releases` |\n| EdgeDriver\
    \ | Microsoft Edge | `https://developer.microsoft.com/en-us/microsoft-edge/tools/webdriver/`\
    \ |\n| SafariDriver | Apple Safari | `https://developer.apple.com/documentation/webkit/testing_with_webdriver_in_safari`\
    \ |\n| OperaDriver | Opera | `https://github.com/operasoftware/operachromiumdriver/releases`\
    \ |\n| IEDriverServer | Internet Explorer | `https://www.selenium.dev/downloads/`\
    \ |\n\n> **Note:** Internet Explorer support is being phased out in favor of Edge,\
    \ and `IEDriverServer` is listed under the Previous Releases section on the Selenium\
    \ downloads page.\n\nThis table covers the most popular web browsers. Each WebDriver\
    \ allows Selenium to interact with the respective browser, enabling automated\
    \ testing. The Safari WebDriver comes pre-installed with the browser, but you\
    \ may need to enable it for automation.\n\n### Step 2: Create a New Java Project\
    \ in Eclipse\n\n1.  In Eclipse, go to **File ➤ New ➤ Java Project**.\n2.  Name\
    \ your project, for example, `SeleniumTestProject`, and click **Finish**.\n\n\
    ### Step 3: Add Selenium JARs to the Project\n\n1.  Extract the downloaded ZIP\
    \ file to a folder on your computer.\n2.  In Eclipse, right-click your project\
    \ (`SeleniumTestProject`) in Project Explorer and select **Properties**.\n3. \
    \ In the Properties window, navigate to **Java Build Path** on the left.\n4. \
    \ In the **Libraries** tab, click `Add External JARs...`.\n5.  Navigate to the\
    \ folder where you extracted Selenium WebDriver and select all JAR files in the\
    \ `client-combined-x.x.x.jar` and the `libs` folder.\n6.  Click **Open** and then\
    \ **Apply and Close**.\n\n### Step 4: Verify Installation\n\nLet’s create a simple\
    \ test script to verify that Selenium WebDriver was installed correctly.\n\n1.\
    \  Right-click the `src` folder of your project, go to **New ➤ Class**, name it\
    \ (e.g., `SeleniumTest`), and click **Finish**.\n2.  In the newly created class\
    \ file, write a simple Selenium WebDriver test. Here’s an example script that\
    \ opens Google in a web browser.\n\n    ```java\n    import org.openqa.selenium.WebDriver;\n\
    \    import org.openqa.selenium.chrome.ChromeDriver;\n    public class SeleniumTest\
    \ {\n        public static void main(String[] args) {\n            // Set the\
    \ path of the Chrome driver executable\n            System.setProperty(\"webdriver.chrome.driver\"\
    , \"path/to/chromedriver\");\n            // Initialize a Chrome driver instance\n\
    \            WebDriver driver = new ChromeDriver();\n            // Open Google\
    \ in the browser\n            driver.get(\"https://www.google.com\");\n      \
    \      // Close the browser\n            driver.quit();\n        }\n    }\n  \
    \  ```\n\n    In the preceding script, replace `\"path/to/chromedriver\"` with\
    \ the path to your machine’s ChromeDriver executable.\n\n### Step 5: Run the Test\
    \ Script\n\nTo run the script, right-click it in Eclipse and choose **Run As ➤\
    \ Java Application**.\n\nIf everything is set up correctly, this script should\
    \ open a Google web page in the Chrome browser and then close it.\n\nYou’ve successfully\
    \ added Selenium WebDriver to your Eclipse project and are ready to write automated\
    \ tests! Remember to download the specific WebDriver for the browser you intend\
    \ to use (ChromeDriver for Google Chrome, GeckoDriver for Firefox, etc.) from\
    \ the Selenium website.\n\n## Browser Commands\n\nOpening a browser using Selenium\
    \ WebDriver is a foundational step in automating web application testing. Selenium\
    \ WebDriver provides an interface for interacting with web browsers, allowing\
    \ you to control a browser session programmatically. This includes opening a browser,\
    \ navigating web pages, and executing various user actions. The following guide\
    \ and Java code snippet demonstrate how to open a web browser (Google Chrome,\
    \ Firefox, and Microsoft Edge) using Selenium WebDriver.\n\nTo begin, ensure that\
    \ you have the following prerequisites installed and set up on your machine.\n\
    \n*   Java Development Kit (JDK)\n*   Selenium WebDriver library\n*   Browser-specific\
    \ WebDriver executables (ChromeDriver for Google Chrome, GeckoDriver for Firefox,\
    \ and EdgeDriver for Microsoft Edge)\n\n## Opening a Selenium WebDriver Using\
    \ Java Code\n\nThe following Java program demonstrates how to open web browsers\
    \ using Selenium WebDriver. This example presupposes that Selenium WebDriver is\
    \ integrated into your project and that you have the respective WebDriver executables\
    \ ready.\n\n```java\nimport org.openqa.selenium.WebDriver;\n// Uncomment the import\
    \ for the browser you are going to use\nimport org.openqa.selenium.chrome.ChromeDriver;\n\
    // import org.openqa.selenium.firefox.FirefoxDriver;\n// import org.openqa.selenium.edge.EdgeDriver;\n\
    public class OpenBrowserExample {\n    public static void main(String[] args)\
    \ {\n        // Uncomment one of the following sections to use the corresponding\
    \ WebDriver and browser.\n        // For Google Chrome:\n        System.setProperty(\"\
    webdriver.chrome.driver\", \"path/to/chromedriver\");\n        WebDriver driver\
    \ = new ChromeDriver();\n        driver.get(\"https://www.google.com\");\n   \
    \     System.out.println(\"Google Chrome launched successfully.\");\n        driver.quit();\
    \ // Close the browser\n\n        // For Firefox:\n        // System.setProperty(\"\
    webdriver.gecko.driver\", \"path/to/geckodriver\");\n        // WebDriver driver\
    \ = new FirefoxDriver();\n        // driver.get(\"https://www.google.com\");\n\
    \        // System.out.println(\"Firefox launched successfully.\");\n        //\
    \ driver.quit(); // Close the browser\n\n        // For Microsoft Edge:\n    \
    \    WebDriver firefoxDriver = new FirefoxDriver();\n        firefoxDriver.get(\"\
    https://www.google.com\");\n        System.out.println(\"Firefox launched successfully.\"\
    );\n\n        // Open Microsoft Edge\n        // System.setProperty(\"webdriver.edge.driver\"\
    , \"path/to/edgedriver\");\n        // WebDriver driver = new EdgeDriver();\n\
    \        // driver.get(\"https://www.google.com\");\n        // System.out.println(\"\
    Microsoft Edge launched successfully.\");\n        // driver.quit(); // Close\
    \ the browser\n    }\n}\n```\n\nIn this program, do the following:\n\n1.  Set\
    \ the system properties for ChromeDriver, GeckoDriver, and EdgeDriver to inform\
    \ Selenium where to find the browser-specific WebDriver executables.\n2.  Instantiate\
    \ `ChromeDriver`, `FirefoxDriver`, and `EdgeDriver` objects, which open Google\
    \ Chrome, Firefox, and Microsoft Edge browsers, respectively. (All browsers are\
    \ shown comprehensively for simplicity; you can choose any one.)\n3.  Navigate\
    \ to `https://www.google.com` in each browser using the `get()` method, marking\
    \ the start of your test.\n\n> **Note:** Make sure to replace `\"path/to/chromedriver\"\
    `, `\"path/to/geckodriver\"`, and `\"path/to/edgedriver\"` with the actual paths\
    \ to your downloaded WebDriver executables.\n\nThis simple yet fundamental program\
    \ shows how Selenium WebDriver empowers you to initiate and control browser sessions,\
    \ laying the groundwork for more elaborate automated web tests.\n\n## Opening\
    \ a Web Page Online or Offline\n\nWhen automating web testing with Selenium WebDriver,\
    \ you often need to open web pages to verify the application’s behavior under\
    \ test. Selenium allows you to open both online and offline web pages seamlessly."
