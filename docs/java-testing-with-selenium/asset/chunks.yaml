  trans: '

    ## 使用坐标设置窗口大小


    要使用坐标设置浏览器大小，可结合使用 **setSize** 和 **setPosition** 方法，通过 *x* 和 *y* 坐标指定浏览器窗口在屏幕上的位置，并通过宽度和高度值指定其尺寸。当您需要测试
    Web 应用在屏幕特定位置的特定大小窗口中的表现时，此方法尤为实用。


    ```

    import org.openqa.selenium.Dimension;

    import org.openqa.selenium.Point;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.firefox.FirefoxDriver;

    public class SetBrowserSizeAndPosition {

    public static void main(String[] args) {

    // 使用 Firefox 初始化 WebDriver

    WebDriver driver = new FirefoxDriver();

    // 导航至 Apress 网页

    driver.get("https://apress.com");

    // 使用坐标设置窗口大小和位置

    driver.manage().window().setPosition(new Point(30, 30)); // 将窗口位置设置为 x=30, y=30

    driver.manage().window().setSize(new Dimension(450, 500)); // 将窗口大小设置为 450x500
    像素

    System.out.println("使用坐标设置浏览器大小");

    // 关闭浏览器并结束会话

    driver.quit();

    }

    }

    ```


    在此示例中，您首先使用 Firefox WebDriver 打开 Apress 网页。然后，将窗口位置设置为屏幕上的 **x=30** 和 **y=30**
    坐标，从而将浏览器窗口移动到该特定位置。之后，将窗口大小调整为 450x500 像素，确保浏览器窗口符合测试所需尺寸。这种方法让您能够精确控制测试环境，准确模拟用户条件，并确保应用的布局和功能在不同场景下保持一致。


    通过操控浏览器窗口的大小和位置，您可以有效测试响应式设计、位置相关功能以及整体用户体验，确保您的 Web 应用既健壮又用户友好。


    ## 获取浏览器位置


    了解浏览器窗口的当前位置非常有用，尤其是在运行涉及屏幕坐标的测试时，或者需要验证窗口在多窗口或多显示器场景中是否按预期定位时。


    获取浏览器位置可以让您获得浏览器窗口在屏幕上的当前位置。


    ```

    Point position = driver.manage().window().getPosition();

    System.out.println("浏览器位置 - X: " + position.getX() + ", Y: " + position.getY());

    ```


    通过获取表示浏览器位置的 **Point** 对象，您可以在测试中断言浏览器窗口的位置。这在窗口定位可能影响 UI 元素行为或可见性的场景中尤为有用。


    ## 获取窗口大小


    了解浏览器窗口的当前大小对于响应式设计测试至关重要，它能让您验证 Web 应用在不同尺寸下是否正确适配。


    获取浏览器窗口的大小有助于您了解 Web 应用当前所处的视口尺寸。


    ```

    Dimension size = driver.manage().window().getSize();

    System.out.println("窗口大小 - 宽度: " + size.getWidth() + ", 高度: " + size.getHeight());

    ```


    通过获取的尺寸，您可以确认应用在给定窗口大小下是否按预期显示。这非常宝贵，因为它有助于确保应用的响应式设计行为正确，在所有设备尺寸上提供无缝的用户体验。


    ## 使用 Selenium WebDriver 浏览网页


    浏览网页是自动化测试流程中的基本环节。Selenium WebDriver 提供了直观的命令，用于在浏览器历史记录中前进和后退、刷新当前页面，甚至在同一浏览器窗口中跳转到新
    URL。让我们来探索这些导航命令。


    ### 后退导航


    要模拟按下浏览器的后退按钮，请使用 WebDriver 的 **navigate().back()** 方法。这允许您测试当用户导航回上一页时 Web 应用的行为。


    ```

    import java.util.concurrent.TimeUnit;

    import org.openqa.selenium.By;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.WebElement;

    public class BackClickExample {

    public static void main(String[] args) {

    WebDriver driver = new ChromeDriver();

    driver.get("https://example.com");

    // 执行点击操作

    WebElement link = driver.findElement(By.id("link-id"));

    link.click();

    // 后退导航

    driver.navigate().back();

    driver.quit();

    }

    }

    ```


    导航到第二个页面后，调用 **navigate().back()** 将返回第一个页面。此命令在测试多页面工作流时至关重要，可确保每个页面在用户后退时保持其状态或执行正确的操作。


    ### 前进导航


    您可能需要在浏览器历史记录中再次前进。**navigate().forward()** 命令模拟用户点击浏览器中的前进按钮。


    ```

    import java.util.concurrent.TimeUnit;

    import org.openqa.selenium.By;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.WebElement;

    public class ForwardClickExample {

    public static void main(String[] args) {

    WebDriver driver = new ChromeDriver();

    driver.get("https://example.com");

    WebElement link = driver.findElement(By.id("link-id"));

    link.click();

    // 后退导航

    driver.navigate().back();

    // 前进导航

    driver.navigate().forward();

    driver.quit();

    }

    }

    ```


    此命令在测试用户会话的完整导航流程时尤为有用，可确保前进导航无缝运行，并且页面状态被正确保留或恢复。


    ### 刷新页面


    刷新或重新加载当前页面是一种常见的浏览器操作，您可以使用 **navigate().refresh()** 方法将其自动化。这对于测试当用户手动刷新页面时
    Web 应用的行为非常有用。


    ```

    // 导航至 URL

    driver.get("https://www.apress.com");

    // 执行一些操作，然后刷新页面

    driver.navigate().refresh();

    ```


    刷新页面可确保应用的状态正确重置，或任何动态内容按预期加载。此操作对于测试包含动态或实时内容的页面至关重要，可验证数据在无需用户手动干预的情况下是否正确更新。


    通过这些导航命令，您可以全面测试 Web 应用的导航流程和内容行为，确保流畅直观的用户体验。WebDriver 的导航方法让您能够模拟真实的用户交互，从而增强自动化测试的可靠性和覆盖率。

    '
- fmt: '# Summary


    This chapter journeyed through the foundational steps of configuring a sophisticated
    automated testing environment using Java, Eclipse IDE, and Selenium WebDriver.
    The exploration began with installing Java, providing a versatile programming
    base for your test scripts. It then progressed to setting up the Eclipse IDE,
    customizing it to serve as an efficient platform for your development and testing
    endeavors.


    The integration of Selenium WebDriver marked a significant milestone, granting
    the ability to automate browser interactions and accurately simulate user behaviors.
    You delved into advanced techniques for manipulating browser windows, adjusting
    their dimensions and positions to suit a variety of testing scenarios. This practice
    proved invaluable for validating the responsiveness of web applications across
    multiple devices.


    Furthermore, you tackled the intricacies of loading web pages, paying special
    attention to the protocols that underpin web security. The discussion highlighted
    the importance of HTTPS in safeguarding data integrity and user privacy. The application
    of Selenium WebDriver’s comprehensive navigation commands allowed you to navigate
    through web applications with ease, testing the user experience across different
    flows and functionalities.


    You have enhanced your technical skill set and gained a deeper understanding of
    the strategic application of automated testing tools. This chapter has prepared
    you to tackle complex testing challenges, ensuring the applications you develop
    and test meet the highest quality, security, and user satisfaction standards.


    # 3. Mouse and Keyboard Actions


    In this chapter, you will delve into the concept of action chains, a powerful
    feature for simulating complex user interactions in web applications. Action chains
    allow for the automation of multiple steps, integrating keyboard and mouse inputs
    simultaneously. This functionality is essential for thorough testing of web applications.
    By using action chains, you can automate a range of keyboard actions, such as
    key presses and text entry, as well as mouse actions like clicks and drag-and-drop.
    Additionally, action chains support scroll actions, enabling automated scrolling
    to specific web elements. These capabilities ensure a comprehensive approach to
    testing interactive features and user interactions. This chapter will introduce
    you to the basics of creating and executing action chains, along with methods
    to manage these sequences effectively.


    ## Action Chains


    The term *action chain* means a set of instructions are carried out sequentially
    to enact the user actions in a web application to test their functionality.


    Let’s use the Eclipse IDE to write test cases in Java because it is one of Java’s
    most widely used IDE. Another reason to use this IDE is that it installs the Java
    JRE (Java Runtime Environment), making a smooth setup to get started.


    ## Mouse Actions


    The mouse does various operations, such as clicking, dragging, moving from one
    end to another, and so on. These operations are used to enact the user movements
    and test the application’s features in the browser. Let’s start with the mouse-click
    functionality.


    ### Click


    The `click()` method is one of the most used. You select an element by moving
    to its center and clicking it. A click is performed with the left button of the
    mouse.


    ```

    Code 3.1:

    import java.util.concurrent.TimeUnit;

    import org.openqa.selenium.By;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.WebElement;

    public class Mouse {

    public static void main(String[] args) throws Exception {

    // Note: Starting with ChromeDriver version 114, there is no need to download
    or specify the chromedriver location

    // Creating a new instance for Firefox driver

    WebDriver driver = new ChromeDriver();

    // Directing to the URL

    driver.get("https://www.selenium.dev");

    //Timer for page to get downloaded

    TimeUnit.SECONDS.sleep(5);

    //Locating Sign in button

    WebElement login_button=driver.findElement(By.linkText("Downloads"));

    //Clicking on the ''login'' button

    login_button.click();

    }

    }

    ```


    This example demonstrated a click operation on the Downloads link available on
    the `selenium.dev` web page. The timer is kept to load the page so that the elements
    are available to locate and perform a click operation.


    Note


    The `click()` function is performed by the left mouse button; it is also known
    as *click and release*.


    ### Double Click


    A double click means clicking the left mouse button twice. The mouse pointer first
    moves to the center of the web element that needs to be double clicked.


    ```

    import org.openqa.selenium.By;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.WebElement;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.openqa.selenium.interactions.Actions;

    public class DoubleClickExample {

    public static void main(String[] args) {

    WebDriver driver = new ChromeDriver();

    driver.get("https://example.com");

    WebElement elementToDoubleClick = driver.findElement(By.id("element-id"));

    Actions actions = new Actions(driver);

    actions.doubleClick(elementToDoubleClick).perform();

    driver.quit();

    }

    }

    ```


    This method can trigger events like opening an item, selecting text, or activating
    certain controls.


    ### Context Click


    The context click function is the action of moving the mouse pointer to the center
    of an element and then right-clicking.


    ```

    import org.openqa.selenium.By;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.WebElement;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.openqa.selenium.interactions.Actions;

    public class ContextClickExample {

    public static void main(String[] args) {

    WebDriver driver = new ChromeDriver();

    driver.get("https://example.com");

    WebElement elementToRightClick = driver.findElement(By.id("element-id"));

    Actions actions = new Actions(driver);

    actions.contextClick(elementToRightClick).perform();

    driver.quit();

    }

    }

    ```


    It is commonly used to test functionality related to context menus available in
    a web application.


    ### Click and Hold


    In the click-and-hold method, you move the mouse pointer to the center of an element
    and press it using the left mouse button without releasing it. Let’s use the preceding
    example and see if the web page navigates to the sign-in page or remains on the
    same page by holding it.


    ```

    import org.openqa.selenium.By;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.WebElement;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.openqa.selenium.interactions.Actions;

    public class ClickAndHoldExample {

    public static void main(String[] args) {

    WebDriver driver = new ChromeDriver();

    driver.get("https://example.com");

    WebElement elementToClickAndHold = driver.findElement(By.id("element-id"));

    Actions actions = new Actions(driver);

    actions.clickAndHold(elementToClickAndHold).perform();

    // Additional actions like moving the element can be performed here

    actions.release().perform(); // Don''t forget to release the click

    driver.quit();

    }

    }

    ```


    It is most commonly used in drag-and-drop scenarios where an element is clicked
    and not released for a specific time to reach its destination. You see more of
    this in later sections.


    ### Perform


    The preceding code used the `perform()` function to execute the `clickAndHold()`
    function. The `perform()` function enables to carry out all mouse (except click)
    and keyboard actions. When more than one action or any sequence of actions defined
    needs to be executed, the `perform()` function is used.


    ```

    Actions actions = new Actions(driver);

    actions.moveToElement(someElement)

    .click()

    .perform(); // Executes the click action on the element

    ```'
