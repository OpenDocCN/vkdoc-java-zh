  trans: '

    *   **注意超时设置。** 根据网络速度、应用程序响应时间和整体性能，设置合理的超时时间。避免设置过长的超时时间，因为这会导致测试套件运行缓慢。


    *   **对更复杂的条件使用流畅等待。** 当处理加载时间高度不可预测的元素时，请使用流畅等待。它允许自定义轮询频率，并且可以忽略特定类型的异常，从而使测试更具弹性。


    *   **尽量减少隐式等待的使用。** 隐式等待是全局设置的，适用于所有元素查找。虽然它们易于使用，但可能会导致意外的延迟。请谨慎使用，并且仅在所有元素查找都需要一致且较小的延迟时才使用。


    *   **明智地组合等待。** 谨慎组合不同类型的等待，因为它们可能导致不可预测的等待时间甚至超时。了解不同等待在您的特定上下文中如何协同工作。


    *   **等待页面加载和 Ajax 调用完成。** 在与元素交互之前，确保页面已完全加载并且所有 Ajax 调用已完成。这可以通过自定义的 `ExpectedConditions`
    或执行 JavaScript 来实现。


    *   **使用等待来提高测试的可扩展性和可维护性。** 实施适当的等待可以使测试更具可扩展性和可维护性，因为它减少了由时序问题引起的测试不稳定性。


    *   **必要时创建自定义等待条件。** 有时，内置的 `ExpectedConditions` 可能无法满足您的需求。在这种情况下，请创建自定义等待条件来处理特定于您应用程序的独特场景。


    *   **定期审查和调整等待策略。** 随着应用程序的发展，您的等待策略也应随之调整。定期审查和调整它们，以适应当前应用程序的行为。


    *   **记录您的等待策略。** 确保您的等待方法有良好的文档记录。这有助于在整个测试套件中保持一致性，并使新团队成员更容易理解该方法。


    遵循这些最佳实践，您可以创建不仅在功能测试方面准确，而且在执行方面高效可靠的 Selenium 测试。


    总结

    本章深入探讨了在 Web 应用程序中正确处理元素同步的重要性。本章介绍并深入探讨了 Selenium 中的三种主要等待类型——隐式等待、显式等待和流畅等待——每种类型都适用于测试自动化中的不同场景。隐式等待是一种全局设置，简单但灵活性较差，适用于所有元素查找的统一等待条件。相比之下，显式等待提供了更高的精度，允许对特定元素上的特定条件进行等待，使其更适合更复杂的同步需求。最先进的流畅等待提供了最高级别的控制，包括可自定义的轮询间隔和异常处理，非常适合处理高度动态的内容和
    Ajax 元素。

    本章强调了最佳实践，例如优先使用显式等待而非隐式等待以获得更高的准确性，避免使用固定休眠以提高效率，以及设置适当的超时时间以平衡测试速度和可靠性。本章还通过代码示例提供了实用的实施指导，使读者具备有效选择和应用适当等待类型的知识。这一全面的概述旨在赋予读者必要的技能，以创建稳定、可靠且高效的自动化测试，能够应对现代
    Web 应用程序的异步和不可预测性。


    11. 页面对象模型 (POM)


    本章深入探讨了 Selenium WebDriver 框架内的各种测试自动化策略。通过剖析每种方法的复杂性，本章使技术从业者能够全面理解驱动有效且高效自动化测试的方法论。让我们首先审视
    Selenium 中测试自动化的传统方法。这种方法通常被认为是 Selenium 测试的基石，涉及通过显式定位器和操作与 Web 元素直接交互。虽然它是一种基本策略，但其在复杂且不断变化的测试环境中的可扩展性和可维护性仍有待讨论。

    接下来，您将探索页面对象模型 (POM)，这是一种结构设计模式，它将网页的属性和行为封装到不同的类中。POM 提倡一种更加模块化和面向对象的方法来编写测试脚本，解决了与传统方法相关的许多挑战，特别是那些与可维护性和代码重用相关的挑战。

    在 POM 框架的基础上，本章介绍了 Page Factory，这是 Selenium 支持库提供的一种优化实现。凭借其注解驱动的配置，Page Factory
    通过提供更简化、更直观的初始化 Web 元素的方式来增强 POM。本节将涵盖其语法、用法、实际优势以及在不同测试场景中的局限性。通过这次探索，您将获得构建健壮、可扩展且可维护的自动化测试解决方案的知识。


    传统方法


    传统上，自动化测试脚本是元素定位器（如 ID、XPath）、测试数据和操作命令（如点击、输入文本）混合在单个脚本中。这种方法虽然直接，但随着应用程序变得复杂和测试套件扩展，会变得笨重且脆弱。考虑一个简单的
    HTML 登录表单。


    ```

    Login Page


    ```


    在传统方法中，测试直接写在测试脚本中。定位器和元素上的操作都在同一个方法中。以下是一个简单的登录测试可能的样子。


    ```

    import org.openqa.selenium.By;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.junit.Test;

    public class TraditionalLoginTest {

    @Test

    public void testLogin() {

    WebDriver driver = new ChromeDriver();

    driver.get("http://www.example.com/login");

    driver.findElement(By.id("username")).sendKeys("user");

    driver.findElement(By.id("password")).sendKeys("password");

    driver.findElement(By.id("loginButton")).click();

    // 断言和测试逻辑在此处

    driver.quit();

    }

    }

    ```


    在这个例子中，测试做了所有事情：打开浏览器、导航到页面、查找元素、与元素交互，然后关闭浏览器。


    什么是 POM？

    页面对象模型 (POM) 是一种设计模式，它鼓励采用模块化和可维护的方法进行 Selenium 测试脚本编写。在 POM 中，网页被表示为类，这些页面中的元素被表示为类上的变量。与这些元素的交互被封装为类中的方法。这种抽象产生了一个更清晰、更易于理解的代码库。


    解码 DOM

    文档对象模型 (DOM) 将网页的结构表示为对象的树。Selenium 与此 DOM 交互以定位元素并执行操作。理解 DOM 至关重要，因为它是传统测试方法和基于
    POM 的测试方法的基础（参见第 4 章）。现在，让我们通过为提供的 HTML 创建 POM 来深入 POM 的结构化世界。


    创建页面类

    首先，您需要创建一个表示登录页面的 Java 类。此类包含用于交互的定位器和方法。

