- fmt: '# HTML Button Types


    The simplicity of the standard HTML button serves as a baseline for understanding
    more complex buttons like the submit button, which introduces the additional layer
    of form submission.


    ## Submit Button


    A submit button is specifically designed to submit a form to a server. It’s created
    using the `<input>` element with the `type` attribute set to `submit` (`<input
    type="submit">`). When clicked, it sends the form data to the server.


    Figure [6-2](#608985_1_En_6_Chapter.xhtml#Fig2) shows the submit button, similar
    to standard buttons but often labeled with Submit or other action-oriented text.


    ![](images/608985_1_En_6_Chapter/608985_1_En_6_Fig2_HTML.jpg)


    A screenshot titled submit button has a rectangular shaded button with an inside
    text, submit.


    **Figure 6-2** Standard HTML button


    Similar to standard buttons, you can interact with submit buttons using the `click()`
    method in Selenium. Ensure the form data is correctly filled out before clicking
    the submit button, as it triggers form validation and submission.


    ```

    WebElement submitButton = driver.findElement(By.id("submitButton"));

    submitButton.click(); // Interaction

    Assert.assertTrue(driver.getCurrentUrl().contains("destinationURL"), "Form was
    not submitted."); // Post-interaction validation

    ```


    Clicking a submit button often leads to a page change or form submission, requiring
    you to validate that the intended action occurred.


    > **Note:** Usually found in forms and used to submit form data and defined with
    `<input type="submit">`.


    ### Asserting Button Type


    Verifying the submit button’s type is crucial to ensure it’s correctly configured
    to submit user data.


    ```

    // Type validation

    Assert.assertEquals("submit", submitButton.getAttribute("type"), "Not a submit
    button.");

    ```


    As you understand the functional role of submit buttons, you encounter image buttons,
    which add an aesthetic dimension to your interactions.


    ## Image Button


    An image button uses an image as a clickable area and is created using the `<input>`
    element with the `type` attribute set to `"image"` (`<input type="image" src="path/to/image.jpg">`).
    It can serve as a submit button and a visually appealing clickable element.


    The button appears as the image provided in the `src` attribute, offering a visual
    cue for interaction that can be seen in Figure [6-3](#608985_1_En_6_Chapter.xhtml#Fig3).


    ![](images/608985_1_En_6_Chapter/608985_1_En_6_Fig3_HTML.jpg)


    An icon of a right arrowhead with a text that reads, image button.


    **Figure 6-3** Image as a button


    You can interact with image buttons like standard or submit buttons. The `click()`
    method is used after locating the element. Ensure you consider the image loading
    time and visibility during interactions.


    ```

    WebElement imageButton = driver.findElement(By.id("imageButton"));

    imageButton.click(); // Interaction

    // Additional validation depending on expected outcome

    Assert.assertTrue(imageButton.isDisplayed(), "The image button did not function
    as expected."); // Post-interaction validation

    ```


    > **Note:** A button with an image, typically created with `<input type="image">`.


    ### Asserting Button Type


    You can confirm an image button’s type by asserting the type value `image`, essential
    to ensure it’s intended to be interacted with visually.


    ```

    // Type validation

    Assert.assertEquals("image", imageButton.getAttribute("type"), "Not an image button.");

    ```


    From the visual cues of image buttons, you delve into the more dynamic and script-driven
    nature of JavaScript buttons.


    ## JavaScript Button


    A JavaScript button doesn’t necessarily refer to a specific type of button element
    but to any clickable element that triggers JavaScript code. It could be a standard
    button, a link, or `div` with an `onclick` event.


    ```

    Click Here!

    ```


    When you perform a click action on the button shown in Figure [6-4](#608985_1_En_6_Chapter.xhtml#Fig4),
    the JavaScript is triggered and pops up an alert box.


    ![](images/608985_1_En_6_Chapter/608985_1_En_6_Fig4_HTML.jpg)


    A screenshot titled Java Script button has a rectangular shaded button with an
    inside text, click here exclamation mark.


    **Figure 6-4** Button triggering JavaScript


    Interacting with these involves not just a click but handling the dynamic elements
    they might invoke, such as pop-ups or changes in the DOM, leading you into more
    complex wait and validation scenarios.


    ```

    WebElement jsButton = driver.findElement(By.id("jsButton"));

    jsButton.click(); // Interaction

    new WebDriverWait(driver, 10).until(ExpectedConditions.alertIsPresent()); // Handling
    dynamic behavior

    driver.switchTo().alert().accept(); // Accepting the alert

    Assert.assertTrue(jsButton.isDisplayed(), "The JavaScript button did not execute
    as expected."); // Post-interaction validation

    ```


    When interacting with JavaScript buttons, ensure the JavaScript code has loaded
    and is ready to execute. Use the `click()` method as usual, and consider implementing
    waits to handle any asynchronous operations that the JavaScript might perform.


    > **Note:** JavaScript buttons do not have a specific type; confirming their functionality
    or existence post-interaction ensures they perform the expected script.


    ## Disabled Button


    Disabled buttons are unique as they’re meant to be non-interactive. It’s often
    grayed out and is set using the `disabled` attribute (`<button disabled>`). They’re
    essential for scenarios where certain conditions must be met before an action
    can be taken.


    ```

    Disabled

    ```


    A disabled button usually appears grayed-out or faded, as seen in Figure [6-5](#608985_1_En_6_Chapter.xhtml#Fig5),
    indicating its non-interactive state.


    ![](images/608985_1_En_6_Chapter/608985_1_En_6_Fig5_HTML.jpg)


    A screenshot titled disabled button has a rectangular shaded button with an inside
    text, disabled.


    **Figure 6-5** Disabled button


    You should first check if the button is disabled using the `isEnabled()` method.
    This can be part of your test validation to ensure buttons are enabled or disabled
    as expected under certain conditions.


    ```

    WebElement disabledButton = driver.findElement(By.id("disabledButton"));

    Assert.assertFalse(disabledButton.isEnabled(), "The button should be disabled
    but is enabled.");

    ```


    Here, your interaction is more about verification than action; you check if the
    button is disabled when it should be, reflecting the preventive aspect of testing.


    ### Asserting Button Type


    Ensuring a button is correctly marked as disabled helps maintain the user interface’s
    integrity.


    ```

    Assert.assertEquals("button", disabledButton.getAttribute("type"), "Not a standard
    button or incorrect type."); // Type validation

    ```


    From the passivity of disabled buttons, you transition to toggle buttons, which
    offer an active and changeable user experience.


    ## Toggle Button


    Toggle buttons are interactive elements that switch between two states, such as
    on/off, with each click, offering a dynamic user experience.


    ```

    On

    ```


    It may appear as a standard button but often includes visual cues indicating its
    toggle state, like On/Off labels or color changes as shown in Figure [6-6](#608985_1_En_6_Chapter.xhtml#Fig6).


    ![](images/608985_1_En_6_Chapter/608985_1_En_6_Fig6_HTML.jpg)


    Two screenshots of a rectangular shaded button titled toggle button. An inside
    text reads, on, in the first, and off, in the second.


    **Figure 6-6** Toggle button displaying On and Off


    You can interact with toggle buttons using the `click()` method. You may also
    want to verify the button’s state before and after the click to ensure it’s performing
    the toggle action correctly. This can be done by checking the button’s attributes
    or associated text.


    ```

    WebElement toggleButton = driver.findElement(By.id("toggleButton"));

    String initialState = toggleButton.getText();

    toggleButton.click(); // Interaction

    String finalState = toggleButton.getText();

    Assert.assertNotEquals(initialState, finalState, "The toggle button state did
    not change."); // Validation

    ```'
