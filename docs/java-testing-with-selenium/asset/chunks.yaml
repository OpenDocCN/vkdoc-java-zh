    for (WebElement option : selectedOptions) {\nAssert.assertNotEquals(\"Python\"\
    , option.getText(), \"Python should be deselected but is still selected.\");\n\
    }\n```\n\n断言 MultiSelectList 的元素类型\n\n与 SelectList 元素一样，断言你正在交互的\n元素是一个 MultiSelectList\
    \ 元素非常重要。你可以\n检查 `multiple` 属性是否存在且设置为 true。\n\n```\nWebElement languagesElement\
    \ = driver.findElement(By.id(\"languages\"));\nAssert.assertTrue(Boolean.parseBoolean(languagesElement.getAttribute(\"\
    multiple\")), \"The element is not a MultiSelectList .\");\n```\n\n注意\n\nMultiSelectList\
    \ 元素在 HTML 中通过带有 `multiple` 属性的 `<select>` 标签来标识，允许选择多个选项。\n\n测试注意事项\n在使用 Selenium\
    \ 测试 Web 应用程序中的按钮时，有几个注意事项可以确保你的测试健壮、可靠，并能反映用户交互。以下是一种结构化的方法来理解这些测试注意事项。\n\n按钮可见性与可访问性\n\
    \n*   **按钮是否可见？** 在尝试任何交互之前，确保按钮是\n    可见的。\n    通过 CSS 或其他方式隐藏的按钮可能存在于 DOM 中，但不可点击。\n\
    \n*   **按钮是否可访问？** 检查按钮是否对用户\n    可访问，尤其要考虑可访问性标准。\n    这包括验证 `aria-labels` 等属性是否适用于屏幕阅读器。\n\
    \n按钮状态\n\n*   **按钮是启用还是禁用？** 在交互之前验证按钮的\n    状态。\n    测试应确认按钮在正确的条件下变为启用或禁用。\n\
    \n*   **按钮是否处于正确状态？** 对于切换按钮，\n    确保按钮的状态（开/关，激活/未激活）在每次交互后按预期变化。\n\n按钮功能\n\n\
    *   **按钮是否执行了预期的操作？**\n    确认点击按钮会触发\n    预期的结果，无论是提交表单、导航到新页面，\n    还是执行脚本。\n\
    \n*   **按钮的功能在不同浏览器中是否一致？**\n    在不同浏览器中进行测试以确保功能一致，\n    因为按钮的行为可能有所不同。\n\n按钮交互\n\
    \n*   **按钮如何响应点击？** 检查响应时间和\n    任何即时的视觉反馈（如旋转加载图标），以表明点击已被记录且正在处理某个操作。\n\n* \
    \  **是否有特殊的交互注意事项？** 对于图像按钮或具有复杂设计的按钮，\n    确保可点击区域被正确映射且响应灵敏。\n\n交互后验证\n\n* \
    \  **UI 是否反映了预期的变化？** 点击后，验证\n    UI 是否更新以反映任何变化。例如，提交按钮可能会变为“已提交”或更新页面某部分。\n\n\
    *   **是否有任何副作用？** 确认没有\n    意外的副作用，如页面错误、非预期的导航或\n    不正确的表单提交。\n\n安全注意事项\n\n\
    *   **点击按钮是否会暴露安全漏洞？**\n    确保与按钮的交互不会暴露 SQL 注入等漏洞，\n    特别是对于与表单提交相关的按钮。\n\n\
    性能注意事项\n\n*   **按钮响应是否迅速？** 检查按钮的响应性和\n    加载时间，特别是对于触发复杂后端操作的按钮。\n\n跨平台与跨浏览器测试\n\
    \n*   **按钮在不同平台和浏览器上的表现如何？** 验证按钮在不同浏览器和设备上的\n    功能和外观，\n    考虑渲染和性能的差异。\n\n\
    动态与上下文相关行为\n\n*   **按钮的行为是否会根据上下文而改变？** 某些按钮的行为可能取决于页面上其他地方输入的数据或做出的选择。确保这些动态行为\n\
    \    被正确实现和测试。\n\n错误处理\n\n*   **按钮如何处理错误？** 测试按钮在错误场景下的行为，例如表单提交失败\n    或资源不可用。它应该优雅地处理错误并提供适当的用户反馈。\n\
    \n总结\n本章探讨了 Selenium 自动化测试中至关重要的交互式 Web 元素。从与按钮的直接交互到 MultiSelectList 元素中的细微选择，涵盖了广泛的元素和交互类型。本章的学习历程不仅让你掌握了执行交互的技能，还强调了验证所执行的操作以及元素本身的重要性。\n\
    本章的一个关键收获是 Web 元素的多样性以及每种元素在交互和验证方面所需的独特方法。理解按钮、单选按钮、复选框、SelectList 和 MultiSelectList\
    \ 元素的复杂性，对于任何希望创建健壮可靠自动化测试的测试人员来说都至关重要。验证作为本章反复出现的主题，已被强调为确保测试准确性和可靠性的关键。\n本章大部分内容致力于按钮测试注意事项，你在此概述了确保全面测试的关键点。这些注意事项包括确保可见性和可访问性、验证按钮状态、确认功能、评估交互和性能等。通过理解这些细微差别，你将能更好地创建有效、健壮且能反映真实用户交互的测试。\n\
    此外，这里获得的知识是层层递进的，提供了一个结构化的理解和技能集，增强了每一部分的内容。随着本章的结束，你应该有信心使用 Selenium 处理各种 Web\
    \ 元素。技术技能，加上对元素行为及其在 Web 应用程序中作用的深刻理解，将极大地提升你自动化测试的质量和有效性。无论你是在测试一个简单的用户表单还是一个复杂的交互式应用程序，从本章获得的见解和技能都是你\
    \ Selenium 工具包中宝贵的补充。\n\n7. iframe 与文本框\n\n在 Web 应用程序测试中，有两个 Web 元素始终需要关注：iframe\
    \ 和文本框。在 iframe 中，内容从一个源嵌入到另一个源中，其功能类似于网页内的一个独立窗口。另一方面，文本框是基本的输入字段，用于捕获用户数据以实现各种目的。\n\
    本章从 iframe 开始，探讨了有效定位和与之交互的技术。一旦你牢固掌握了 iframe，重点将转向文本框，讨论精确交互和数据检索的机制。到本章结束时，你应该对这两个关键的\
    \ Web 元素以及如何在自动化任务中处理它们有一个全面的理解。\n"
- fmt: '# iframes


    An `iframe` is an HTML document embedded within a different HTML document on a
    website. The `iframe` HTML element is often used to add content from different
    sources. Particularly, `iframe` is used to embed a document within another, isolating
    the embedded document from the main page. This isolation helps to keep third-party
    content from interfering with the main page’s DOM or JavaScript environment.


    You can embed documents like videos (e.g., YouTube videos) and PDFs, third-party
    widgets, and many more. For test automation, knowing that content inside an `iframe`
    exists in a separate document is crucial. This means that web elements store the
    web elements.


    Earlier HTML used `frameset` tags that were similar to the present `iframe` tags,
    but it split the browser window into various sections with different URLs. Each
    of these split windows was called a *frame*, displaying different documents. Unlike
    `iframes`, `frameset` tags cannot be placed anywhere on the page, and due to their
    lower flexibility, the use of `framesets` declined. However, `iframes` have remained
    an integral part of modern web development.


    Let’s test `iframes`.


    ```

    Iframe Example


    This is content of the main page.


    More content of the main page.

    ```


    This example used [`https://www.selenium.dev/`](https://www.selenium.dev/) embedded
    in an `iframe` page. The height and width have been specified for the `iframe`.
    The `src` parameter contains the URL of the site that is displayed in the `iframe`.


    Figure [7-1](#608985_1_En_7_Chapter.xhtml#Fig1) shows what the HTML looks like
    on a web page.


    ![](images/608985_1_En_7_Chapter/608985_1_En_7_Fig1_HTML.jpg)


    A screenshot of the Selenium website. The text at the center is as follows: Selenium
    Conf Chicago 2023 is a wrap. Selenium automates browsers.


    **Figure 7-1** Single `iframe` displaying Selenium website


    The Selenium website is displayed by an `iframe`, as seen in Figure [7-1](#608985_1_En_7_Chapter.xhtml#Fig1).
    The `iframe` seems like a window within a window. In the test case scenario, it
    is considered as a separate document. Before interacting with the contents in
    the `iframe`, you need to switch to this window. The upcoming topics dissect the
    methods and best practices to make this transition seamless.


    ## Switching to an iframe


    When you want to test a web element or functionality embedded within an `iframe`,
    first, you need to locate and switch to that particular `iframe`. As the web elements
    embedded in an `iframe` are not immediately accessible, you must first locate
    and switch to that particular `iframe` to test. Once you switch to the `iframe`,
    you can locate the element in the same way as discussed in Chapter [4](#608985_1_En_4_Chapter.xhtml).
    Let’s explore various techniques in which `iframe` can be located.


    ### Switch Using ID


    To access the `iframe` from the web page, use the ID attribute provided. The following
    method switches control to the `iframe`.


    ```

    driver.switchTo().frame(driver.findElement(By.id("iframe0")));

    ```


    Once you switch to the `iframe`, you are confined to its web elements and can
    carry out operations like locating elements or interacting with them until you
    switch back to the main page or another `iframe`.


    ### Switch Using Name


    Similar to the ID attribute, you can switch to `iframe` from the web page using
    the name attribute, when available.


    ```

    // Switch to the iframe using its name

    driver.switchTo().frame("selenium_java");

    ```


    ### Switch Using Index Value


    While you can locate and switch to `iframes` using attributes like ID or Name,
    these attributes may not always be available or unique. Using the `iframe`’s index
    makes sense as a method in these cases.


    The index represents the position of the `iframe` beginning with 0 (zero) in a
    sequence on a web page. The first `iframe` can be accessed using index value zero,
    the second as one, and so on. Let’s use the example for multiple `iframes`.


    ```

    Multiple Iframes


    This is the main page content.


    End of main page content.

    ```


    The preceding example embedded three `iframes` in a web page. Let’s discuss how
    to interact with these `iframes` using index values; you can see no attributes
    are used.


    ```

    // Switch to the first iframe using index

    driver.switchTo().frame(0);

    // Navigate directly to the second iframe by its index

    driver.switchTo().frame(1);

    // Navigate directly to the third iframe by its index

    driver.switchTo().frame(2);

    ```


    The `switchTo().frame()` method with an index value switches to the `iframes`
    starting from zero. If the index value you provided does not correspond to `iframes`
    available on a web page, a `NoSuchFrameException` error occurs. Once you switch
    to any `iframe`, you need to switch back to the main page to enter again for a
    different `iframe`. This is explained in the hierarchy structure of `iframes`
    next.


    ### Hierarchy in Switching iframes


    You have seen multiple `iframes` and the ways to access them. Let’s look at multiple
    `iframes` that are nested within other `iframes`. Understanding the hierarchy
    in which these `iframes` are placed is necessary to interact with web elements,
    as each level requires a valid declaration of the `WebDriver`’s context. The following
    is the hierarchy of `iframe` in HTML. Let’s explore ways to interact with it.


    ```

    Main Document


    This is the content of the main page.


    This is the content of the first-level iframe.


    This is the content of the nested, second-level iframe.


    More content of the main page.

    ```


    The hierarchy is represented as follows.


    - The main page or document represents the topmost level.

    - The `iframe` containing `id="firstLevelIframe"` is at the first level, representing
    the hierarchy embedded in the main document.

    - A nested `iframe` within the first-level `iframe` makes it a second-level `iframe`.


    > **Note**: If an `iframe` is embedded inside another, it is known as a *nested
    iframe*. There may be more than one level of `iframes` nested in one another,
    and so on.


    ### Navigating an iframe in a Hierarchy


    - **Main document context**: In Selenium, when a web page is getting loaded, the
    main document or the topmost layer is set as `WebDriver`’s default context; hence,
    there is no need to switch to the main document, and you can access your elements
    in it.


    - **Accessing first-level iframe**: To locate the first-level `iframe` from the
    main document, you can use the `switchTo()` function in Selenium.


    ```

    driver.switchTo().frame(driver.findElement(By.id("firstLevelIframe")));

    ```


    - **Accessing second-level/nested iframe**: When you want to access the second-level
    or nested `iframe` that is embedded in the first `iframe`, you can use the same
    `switchTo()` function.


    ```

    driver.switchTo().frame(driver.findElement(By.id("secondLevelIframe")));

    ```


    Selenium `WebDriver` cannot directly access a nested `iframe` as it requires sequential
    navigation through the `iframe` levels.


    As you have seen, when you need to access the second `iframe`, at the start, you
    need to access the first `iframe` and then the second. Now, let’s look at how
    to return from nested `iframes`.


    - **Returning to the first level**: When you are in a nested `iframe` (i.e., second
    level, as seen in our case) and need to return to the first `iframe`, you can
    use `driver.switchTo().parentFrame();`.


    If the `iframe` you switched to does not have any parent `iframe` or the `iframe`
    is not nested within an `iframe`, then this function, used again, switches back
    to the main document. So, this `parentFrame()` function is commonly used in nested
    cases.


    - **Returning to the main document**: If you want to return to the main document
    from any `iframe`, you can use the `defaultContent()` function along with the
    `switchTo()` function.


    ```

    driver.switchTo().defaultContent();

    ```


    You can use this function in any of the nested layers of `iframes` when you want
    to switch back to the main document. Once you are back to the main document and
    want to switch back again to the `iframe`, then you need to navigate through the
    hierarchy as discussed earlier.


    ### Switch as an Element'
