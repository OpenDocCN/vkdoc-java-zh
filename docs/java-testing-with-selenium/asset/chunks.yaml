- fmt: "# Attributes\n\nAttributes provide additional information about HTML elements\
    \ and are included within the opening tag. Attributes consist of a name and a\
    \ value, separated by an equal sign. The following is an example using the `src`\
    \ attribute for an image element.\n\n```\n<img src=\"image.jpg\" alt=\"A beautiful\
    \ image\">\n```\n\nIn the example provided, you have the following attributes.\n\
    \n- `src` is the attribute name.\n- `image.jpg` is the attribute value.\n- `alt`\
    \ is another attribute name.\n- `A beautiful image` is its attribute value.\n\n\
    Attributes can influence the behavior and appearance of elements, making them\
    \ essential for web element locators and automation. For instance, the `id` and\
    \ `name` attributes can be locators to uniquely identify elements.\n\n# Overview\
    \ of the DOM Tree Structure\n\nYou need to understand the key concepts in DOM\
    \ and their definitions before moving to the relationship between them. Let’s\
    \ start with nodes, the initial and primary concept in the DOM structure.\n\n\
    Nodes represent individual elements, attributes, and text content within the DOM\
    \ tree. Common types of nodes include the following.\n\n- **Root node**: Represents\
    \ the entire document (`document` object).\n- **Element nodes**: Represent HTML\
    \ tags and form the structure of the HTML document.\n- **Attribute nodes**: Associated\
    \ with element nodes and provide additional information about elements (though\
    \ in the DOM API, attributes are typically accessed as properties of element objects).\n\
    - **Text nodes**: Contain the actual text within elements and are always leaf\
    \ nodes (they do not have child nodes).\n\nUnderstanding the DOM structure and\
    \ how to effectively locate elements within it is crucial for web automation testing,\
    \ enabling testers to create test cases.\n\n# Relationships in the DOM\n\nElements\
    \ in the DOM can have a parent-child relationship, sibling relationship, or both.\
    \ This hierarchical structure allows you to navigate and manipulate the document\
    \ efficiently.\n\n- **Parent-child relationship**: This relationship describes\
    \ elements nested within other elements. For instance, if you have a `<div>` element\
    \ with a `<p>` element inside it, the `<div>` is considered the parent and the\
    \ `<p>` is the child.\n- **Sibling relationship**: Siblings are elements on the\
    \ same level or share the same parent. For example, if two `<div>` elements are\
    \ placed one after the other within the same parent element, they are considered\
    \ siblings.\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n    <title>Our Document</title>\n\
    </head>\n<body>\n    <div>\n        <h1>Welcome to Our Page</h1>\n        <p>This\
    \ is a paragraph in our document.</p>\n        <a href=\"https://example.com\"\
    >Visit Example</a>\n    </div>\n</body>\n</html>\n```\n\nThe following describes\
    \ the elements in this HTML.\n\n- The `<html>` element is the root element, with\
    \ `<head>` and `<body>` as its children.\n- `<title>` element is the child of\
    \ `<head>`.\n- Inside `<body>`, `<div>` is a child element, which further contains\
    \ `<h1>`, `<p>`, and `<a>` as its children.\n- The `<a>` element has an attribute\
    \ `href` with the value `https://example.com`.\n\nFigure [4-1](#608985_1_En_4_Chapter.xhtml#Fig1)\
    \ is a flowchart that diagrams the structure and relationships described in the\
    \ example.\n\n![](images/608985_1_En_4_Chapter/608985_1_En_4_Fig1_HTML.jpg)\n\n\
    A DOM structure tree diagram starts with an `html` element, with `head` and `div`\
    \ elements. The `head` element consists of a `title`, whereas the `div` element\
    \ includes `h1`, `p`, and `a`.\n\n**Figure 4-1** DOM structure\n\nFigure [4-1](#608985_1_En_4_Chapter.xhtml#Fig1)\
    \ illustrates how each element in the HTML document is connected, showcasing the\
    \ parent-child and sibling relationships. Starting from the `<html>` root element,\
    \ you can see how elements are nested within each other, leading down to the individual\
    \ `<h1>`, `<p>`, and `<a>` elements within the `<div>` element. The `<a>` element's\
    \ `href` attribute is also depicted, demonstrating how attributes provide additional\
    \ information about an element.\n\n# Locators\n\nLet’s explore various Selenium\
    \ WebDriver locators, including ID, name, XPath, CSS selectors, link text, partial\
    \ link text, tag name, and class name. These locators provide different methods\
    \ for identifying and interacting with web elements. Each locator type has a description,\
    \ Java syntax, and an HTML code example.\n\n## ID Locator\n\nThe ID locator in\
    \ Selenium is used to find an element by its unique ID. It’s one of the most efficient\
    \ ways to locate elements, as IDs are supposed to be unique within an HTML document.\n\
    \n**Java Syntax**\n\n```\nWebElement element = driver.findElement(By.id(\"elementId\"\
    ));\n```\n\nThis syntax tells Selenium to find an element with the specified ID\
    \ attribute. The `By.id` method is fast and reliable due to the uniqueness of\
    \ the ID attribute in HTML.\n\n**HTML Code Example**\n\n```\n<button id=\"submitBtn\"\
    >Submit</button>\n```\n\nThis example has a button element with a unique ID `submitBtn`.\
    \ You can use this ID to directly locate the button.\n\n**Java Code to Locate\
    \ Web Elements**\n\n```\nWebElement submitButton = driver.findElement(By.id(\"\
    submitBtn\"));\n```\n\nThe code uses the `By.id` method to find the button with\
    \ the ID `submitBtn`. This approach is straightforward and effective due to the\
    \ ID’s uniqueness.\n\n## Name Locator\n\nThe name locator is used to find an element\
    \ by its `name` attribute. It is useful when the `name` attribute is available\
    \ and can conveniently locate elements, especially in forms.\n\n**Java Syntax**\n\
    \n```\nWebElement element = driver.findElement(By.name(\"elementName\"));\n```\n\
    \nThis command finds elements whose `name` attribute matches the provided value.\
    \ It’s a commonly used method, especially in forms.\n\n**HTML Code Example**\n\
    \n```\n<input type=\"text\" name=\"username\" placeholder=\"Enter your username\"\
    >\n```\n\nHere, an input field for a username with the `name` attribute set to\
    \ `username`. This attribute can be used to locate the input field.\n\n**Java\
    \ Code to Locate Web Elements**\n\n```\nWebElement usernameInput = driver.findElement(By.name(\"\
    username\"));\n```\n\nThe code locates the input field by searching for an element\
    \ with the `username` `name` attribute. This method is particularly useful in\
    \ scenarios like forms where the `name` attribute is commonly used.\n\n## Link\
    \ Text Locator\n\nThe link text locator finds a link element by its exact visible\
    \ text. It’s particularly useful for links where the text is distinct and known.\n\
    \n**Java Syntax**\n\n```\nWebElement element = driver.findElement(By.linkText(\"\
    Exact Link Text\"));\n```\n\nThis syntax locates link (`<a>`) elements based on\
    \ their exact text content. It’s ideal for scenarios where you need to interact\
    \ with text-specific links.\n\n**HTML Code Example**\n\n```\n<a href=\"https://example.com/login\"\
    >Login</a>\n```\n\nThe example contains a link with the text `Login`. This text,\
    \ being distinct and exact, can be used to locate the link.\n\n**Java Code to\
    \ Locate Web Elements**\n\n```\nWebElement loginLink = driver.findElement(By.linkText(\"\
    Login\"));\n```\n\nThe code finds the link element that exactly matches the text.\
    \ This approach is straightforward and efficient for locating text-based links.\n\
    \n## Partial Link Text Locator\n\nThe partial link text locator allows you to\
    \ find a link element based on a substring of its visible text. This is helpful\
    \ when the exact text of the link is either unknown or too long.\n\n**Java Syntax**\n\
    \n```\nWebElement element = driver.findElement(By.partialLinkText(\"Part of Link\
    \ Text\"));\n```\n\nThis command finds link elements that contain the specified\
    \ substring in their text. It offers more flexibility compared to the exact link\
    \ text locator.\n\n**HTML Code Example**\n\n```\n<a href=\"https://example.com/about\"\
    >Learn more about you</a>\n```\n\nIn this case, the link text is longer. If you\
    \ only remember a part of it, like `about you`, you can still locate the link.\n\
    \n**Java Code to Locate Web Elements**\n\n```\nWebElement aboutLink = driver.findElement(By.partialLinkText(\"\
    about you\"));\n```\n\nThis code finds any link that includes the text `about\
    \ you` in its visible text. It’s a versatile approach for links with long or partially\
    \ remembered texts.\n\n## Tag Name Locator\n\nThe tag name locator is used to\
    \ find elements by their tag names. It’s useful for identifying elements when\
    \ class, name, or ID is not available.\n\n**Java Syntax**"
