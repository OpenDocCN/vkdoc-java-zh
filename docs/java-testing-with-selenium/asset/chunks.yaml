    The keys are provided with a set of constant values in the form of Unicode representing
    special and non-printable keys on the keyboard. These constant values allow you
    to automate key presses. The keys with their Unicode’s are given in Table [3-1](#608985_1_En_3_Chapter.xhtml#Tab1).


