- fmt: "### Step 2: Install the JDK\n\n1. **Run the installer.**\n   - **Windows**:\
    \ Double-click the downloaded `.exe` file and follow the installation instructions\
    \ together. You can choose the directory where you wish to install the JDK.\n\
    \   - **macOS (manual installation)**: Open the `.dmg` file and follow the instructions,\
    \ which typically involve dragging the JDK into your Applications folder.\n  \
    \ - **macOS (using Homebrew)**: Instead of manually downloading and installing\
    \ the JDK, use Homebrew, a package manager that simplifies the process. Open Terminal\
    \ and execute the following command.\n\n   ```\n   brew install openjdk\n   ```\n\
    \n   After installation, Homebrew may prompt you to link the JDK. The command\
    \ will likely look something like the following.\n\n   ```\n   sudo ln -sfn /usr/local/opt/openjdk/libexec/openjdk.jdk\
    \ /Library/Java/JavaVirtualMachines/openjdk.jdk\n   ```\n\n   This step ensures\
    \ that the JDK is properly recognized across your macOS system.\n   - **Linux**:\
    \ Extract the `.tar.gz` file in your desired location through a graphical file\
    \ manager or via the command line with `tar -xzf [filename]`. This unpacks the\
    \ JDK into your chosen directory.\n\n2. **Follow the installation steps.** You\
    \ can usually stick to the default settings throughout the installation unless\
    \ you have specific preferences or requirements.\n\n### Step 3: Set Environment\
    \ Variables\n\nIn Windows, do the following.\n\n1. Open System Properties by right-clicking\
    \ This PC, selecting Properties, and then Advanced System Settings.\n2. Click\
    \ the Environment Variables button.\n3. In System Variables, click New to create\
    \ a new `JAVA_HOME` variable and set its value to your JDK installation path (e.g.,\
    \ `C:\\Program Files\\Java\\jdk-11`).\n4. Find the `Path` variable in System Variables\
    \ and click Edit to add a new entry with `%JAVA_HOME%\\bin`.\n\nIn macOS and Linux,\
    \ do the following.\n\n1. Open Terminal and use `vi` or `vim` to edit your shell\
    \ profile file, such as `.bash_profile`, `.bashrc`, or `.zshrc`, found in your\
    \ home directory. To open the file, type `vi ~/.bashrc` or `vim ~/.bashrc` (or\
    \ substitute with the appropriate file for your shell).\n2. Add a line to export\
    \ the `JAVA_HOME` variable, such as `export JAVA_HOME=/usr/lib/jvm/jdk-11`.\n\
    3. Add the Java bin directory to your `PATH` variable with `export PATH=$JAVA_HOME/bin:$PATH`.\
    \ This step ensures that the Java binaries are accessible from the command line.\n\
    4. Save the file and exit `vi` or `vim`. If you’re using `vi`, you can save and\
    \ exit by typing `:wq` and pressing Enter. For those using `vim`, the command\
    \ to save and exit is the same, `:wq`.\n5. Save the file and reload your profile,\
    \ for example, by running `source ~/.bashrc` or the appropriate command for the\
    \ shell profile file you edited.\n\n### Step 4: Verify the Installation\n\n1.\
    \ Open a command-line interface.\n   - **Windows**: Open Command Prompt.\n   -\
    \ **macOS/Linux**: Open Terminal.\n2. Check the Java version.\n   1. Type `java\
    \ -version` and press Enter. This should display the installed Java version, confirming\
    \ that Java is successfully installed and the path is set correctly on your machine.\n\
    \   2. Type `javac -version` to ensure that the Java compiler is installed and\
    \ operational.\n\n### Step 5: Update When Necessary\n\nRegularly check for updates\
    \ to the JDK to ensure you have the latest security fixes and performance improvements.\n\
    \nAfter following these steps, you will have set up a fully functional Java development\
    \ environment on your machine. This setup is crucial for developing Java applications\
    \ and serves as a prerequisite for running and writing Selenium automation scripts.\n\
    \n## Installing Eclipse IDE\n\nOnce you’ve installed Java, the next step is to\
    \ install Eclipse IDE. The following steps explain how to do it.\n\n### Step 1:\
    \ Download Eclipse\n\n1. Open your web browser and go to the [Eclipse official\
    \ website](https://www.eclipse.org/downloads/) (`www.eclipse.org/downloads/`).\n\
    2. Click the Download button for the **Install your favorite desktop IDE packages**,\
    \ which takes you to the next page for download, or you can choose the packages\
    \ according to the requirement by clicking the Download Packages link.\n3. Download\
    \ the latest available version, which is ideal for Java development.\n\n### Step\
    \ 2: Run the Eclipse Installer\n\n1. Locate the downloaded file (usually in the\
    \ Downloads folder).\n2. Run the installer.\n   - In Windows, it’s an `.exe` file.\n\
    \   - In macOS, it’s a `.dmg` file.\n   - In Linux, it’s typically a `.tar.gz`\
    \ file.\n\n### Step 3: Install Eclipse\n\n1. When the installer opens, select\
    \ Eclipse IDE for Java Developers.\n2. The installer prompts you to choose an\
    \ installation folder. You can stick with the default or choose another location\
    \ where you’d like Eclipse installed.\n3. Click Install to proceed.\n\n### Step\
    \ 4: Complete the Installation\n\nWait for the installation to complete. This\
    \ might take a few minutes.\n\n### Step 5: Launch Eclipse\n\n1. Once Eclipse is\
    \ installed, you can launch it directly from the installer or via the shortcut\
    \ created in your chosen directory or desktop.\n2. Upon the first launch, Eclipse\
    \ asks you to select a workspace directory. This is where all your projects are\
    \ stored.\n\n### Step 6: Configure Eclipse (Optional)\n\nAfter Eclipse starts,\
    \ you might want to configure it according to your preferences. This can include\
    \ setting up code styles, fonts, and colors or installing additional plugins through\
    \ the Eclipse Marketplace.\n\n### Step 7: Create a Java Project to Test\n\nLet’s\
    \ create a new Java project to ensure everything is set up correctly.\n\n1. Go\
    \ to File **➤** New **➤** Java Project.\n2. If you can enter a project name and\
    \ set up a project, your Eclipse installation is ready for Java development.\n\
    \n**Note**: Maven is the preferred tool in professional IT environments, especially\
    \ in testing automation, due to its project management and build automation capabilities.\
    \ Apache Maven setup, including its installation and environment configuration,\
    \ is discussed in Chapter [12](#608985_1_En_12_Chapter.xhtml).\n\nAnd that’s it!\
    \ You’ve successfully installed Eclipse IDE on your machine, ready to start working\
    \ on Java projects. The steps might vary slightly based on the operating system,\
    \ but the overall process remains largely the same.\n\n## Selenium Installation\n\
    \nAfter successfully installing Java and Eclipse IDE, you must install Selenium\
    \ WebDriver before moving to your automation testing projects. The following steps\
    \ ensure smooth installation of Selenium WebDriver with Eclipse IDE."
