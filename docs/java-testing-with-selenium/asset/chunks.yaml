    ```


    **断言已取消选择**


    与选择断言类似，当您断言一个复选框已被取消选择时，您是在验证您取消选择的动作已生效。此步骤对于涉及更改或重新考虑选择的测试至关重要，反映了用户交互的动态性和通常不可预测性。


    ```

