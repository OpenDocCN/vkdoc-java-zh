    **用于定位 Web 元素的 Java 代码**


    ```

    WebElement secondItem = driver.findElement(By.xpath("(//ul/li)[2]"));

    ```


    该代码定位无序列表中的第二个 `<li>` 元素。XPath 表达式 `(//ul/li)[2]` 指示 Selenium 选择第二个 `li` 元素，演示了位置过滤器如何根据元素在
