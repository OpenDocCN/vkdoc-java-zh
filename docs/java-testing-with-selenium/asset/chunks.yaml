    相对 XPath

    相对 XPath 提供了一种更灵活的定位元素的方法。它以双斜杠 **//** 开头，表示该元素可以位于文档中的任何位置。此方法不易因文档结构的变化而失效。

    **Java 语法**


    ```

    WebElement element = driver.findElement(By.xpath("//tag[@attribute=''value'']"));

    ```


