    The keyUp method releases a key pressed before and performs other keyboard actions
    afterward. It is primarily used with the keyDown method imitating a complete key
    press and release action.


    ### Send Keys


    When you want to enter text into a web element (e.g., passwords, text areas, and
    search boxes), use the sendKeys method. You can chain multiple actions with this
    method. An example of typing letters in uppercase letters is shown in the following
    code.


    The key remains in the pressed state until you end the chain action or use the
