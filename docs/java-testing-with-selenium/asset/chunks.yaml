    MultiSelectList（多选列表）

    MultiSelectList 是一种重要的 Web 元素，它允许进行多项选择，这与 SelectList（每次只能选择一个选项）不同。它常用于 Web 表单中，以捕获所有适用的用户偏好或数据点。


    让我们考虑一个 HTML 表单，用户可以在其中选择他们精通的多种编程语言。


    ```


    语言能力


