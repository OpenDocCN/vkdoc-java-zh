- fmt: '### Offset from Current Pointer Location


    This method allows you to move the mouse pointer to specified *x* and *y* offset
    values from its current position. Moving the mouse pointer without indulging web
    elements as reference points is reliable.


    ```

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.openqa.selenium.interactions.Actions;

    public class OffsetFromCurrentPointerLocationExample {

    // Initialize the WebDriver

    WebDriver driver = new ChromeDriver();

    // Navigate to a website

    driver.get("https://example.com");

    // Create an instance of the Actions class

    Actions actions = new Actions(driver);

    // Define the x and y offsets

    int xOffset = 30;   // Move 30 pixels to the right from the current position

    int yOffset = -10;  // Move 10 pixels up from the current position

    // Move the mouse by the specified offsets from its current position

    actions.moveByOffset(xOffset, yOffset).perform();

    // Optionally, close the browser

    driver.quit();

    }

    }

    ```


    **Note**


    If the mouse pointer has not moved by any prior Selenium command, then the mouse
    pointer is located upper-left corner of the viewport. Also, remember the mouse
    pointer position remains unchanged when the page is scrolled.


    In this example, the mouse pointer moves by 30 pixels from its current position,
    considering the *x* and *y* offsets. This method can be used when the mouse pointer’s
    starting point varies or the movement does not depend on any web element.


    ### Drag and Drop on Element


    This method is used to test the drag-and-drop functionality in a web application.
    This action is automated by combining click and hold with move to element actions
    discussed earlier. For the drag-and-drop method, let’s use simple HTML and JavaScript
    code for implementation.


    ```

    #drag, #drop {

    float: left;

    padding: 15px;

    margin: 15px;

    -moz-user-select: none;

    }

    #drag {

    background-color: #A9A9A9;

    height: 50px;

    width: 50px;

    border-radius: 50%;

    cursor: pointer; /* Makes it clear the element is draggable */

    }

    #drop {

    background-color: #fd8166;

    height: 100px;

    width: 100px;

    border-radius: 50%;

    border: 2px dashed #000; /* Visual cue for drop area */

    }


    function dragStart(event) {

    event.dataTransfer.setData("Text", event.target.id);

    event.dataTransfer.effectAllowed = ''move'';

    return true;

    }

    function dragEnter(event) {

    event.preventDefault();

    return true;

    }

    function dragOver(event) {

    event.preventDefault(); // Necessary for allowing a drop

    return false;

    }

    function dragDrop(event) {

    var src = event.dataTransfer.getData("Text");

    var srcElement = document.getElementById(src);

    event.target.appendChild(srcElement);

    srcElement.style.backgroundColor = ''green''; // Change color upon drop

    event.stopPropagation();

    return false;

    }


