    \n当文本内容静态且唯一时，通过其可见文本定位超链接非常有用。此方法依赖于语言，可能不适用于多语言网站，除非测试也针对不同语言进行了适配。\n\n```\n\
    WebElement linkPython = driver.findElement(By.linkText(\"Python\"));\n```\n\n\
    一旦通过可见文本定位到超链接，就可以执行各种交互操作，例如点击或链接验证，这些操作均可由 Selenium WebDriver 执行。\n\n按部分链接文本定位超链接\n\
    \n当您不知道完整文本，或只有部分文本稳定且一致时，可以使用部分可见文本来定位超链接。此方法适用于处理较长或动态的链接文本，其中只有一部分保持不变。\n\n\
    ```\nWebElement linkPartial = driver.findElement(By.partialLinkText(\"Shar\"));\n\
    ```\n\n按 XPath 定位超链接\n\n这是一种更灵活的定位超链接的方式，尤其适用于无法使用更简单的定位策略定位链接，或处理复杂的 DOM 结构时。\n\
    \n```\nWebElement linkCSharp = driver.findElement(By.xpath(\"//a[@id='csharp']\"\
    ));\n```\n\n第 N 个超链接\n\n当处理一系列相似或相同的超链接，且直接属性不可用或不适用时，可以使用第 N 个超链接方法。此方法基于索引，当超链接的顺序或数量发生变化时可能失效；因此，需要仔细管理和验证用于定位超链接的索引。\n\
    \n```\nWebElement nthLink = driver.findElements(By.tagName(\"a\")).get(1);\n```\n\
    \n返回所有超链接\n\n当您想要检索应用程序中所有可用的超链接以执行验证或按顺序与多个链接交互时，使用此方法可以获取所有超链接的列表，并可对其进行迭代，以对每个超链接执行各种操作或验证。\n\
    \n```\nList allLinks = driver.findElements(By.tagName(\"a\"));\n```\n\n测试超链接\n\
    \n超链接是导航以及访问各种资源和信息的主要途径。测试超链接至关重要，原因如下。\n\n*   **准确导航**：测试确保用户被引导至正确的目标位置。准确导航是用户体验的关键，引导用户沿着预期路径前进，并能够访问相关内容和功能，而不会出现误导或错误。\n\
    \n*   **链接完整性**：识别并修复损坏或无效的链接对于维护超链接的完整性至关重要。\n\n*   **下载链接测试**：与数据相关、为用户启动文件下载的超链接，必须确保执行正确的操作并提供预期的文件。\n\
    \n*   **资源可访问性**：必须测试链接以确认它们是否指向预期的资源，确保用户能够正确访问内容。\n\n*   **安全性**：测试可以让您了解是否有任何链接可能使用户面临安全威胁。\n\
    \n检查有效超链接\n\n您可以通过使用 href 属性检索 URL 并验证其格式来检查超链接是否有效。您可以发送请求以检查其可访问性的响应。请求是发送到\
    \ URL 的 HTTP 请求，而响应中会返回一个状态码。这确保了超链接不仅格式正确，而且能够指向预期的目标位置。\n\n```\nimport org.openqa.selenium.WebDriver;\n\
    import org.openqa.selenium.WebElement;\nimport org.openqa.selenium.chrome.ChromeDriver;\n\
    import org.openqa.selenium.By;\nimport java.net.HttpURLConnection;\nimport java.net.URL;\n\
    public class ValidateHyperlink {\npublic static void main(String[] args) throws\
    \ Exception {\nWebDriver driver = new ChromeDriver();\ndriver.get(\"your_website_url\"\
    );\nWebElement link = driver.findElement(By.id(\"java\"));\nString href = link.getAttribute(\"\
    href\");\nHttpURLConnection connection = (HttpURLConnection) new URL(href).openConnection();\n\
    connection.setRequestMethod(\"HEAD\");\nint responseCode = connection.getResponseCode();\n\
    if (responseCode == 200) {\nSystem.out.println(\"Valid Hyperlink\");\n} else {\n\
    System.out.println(\"Invalid Hyperlink\");\n}\ndriver.quit();\n}\n}\n```\n\nHTTP\
    \ 状态码是服务器返回的三位数字，用于指示所发送请求的状态（见表 5-1）。它们根据第一位数字分为五类。\n\n表 5-1\nHTTP 状态码\n\n范围\
    \ |\n 描述 |\n 示例代码 |\n\n| --- | --- | --- | --- | --- | --- | --- |\n\n1xx（信息性）\
    \ |\n 请求已收到，处理正在进行中。 |\n 100 Continue, 101 Switching Protocols |\n\n2xx（成功） |\n\
    \ 请求已成功接收、理解并接受。 |\n 200 OK, 201 Created |\n\n3xx（重定向） |\n 需要采取进一步操作才能完成请求。 |\n\
    \ 300 Multiple Choices, 301 Moved Permanently |\n\n4xx（客户端错误） |\n 请求包含错误的语法或服务器无法完成请求。\
    \ |\n 400 Bad Request, 404 Not found |\n\n5xx（服务器错误） |\n 服务器未能完成一个有效的请求。 |\n 500\
    \ Internal Server Error, 502 Bad Gateway |\n\n检查损坏的图片\n\n测试图片时，您必须定位通常嵌套在锚点标签内的图片，并验证\
    \ src 属性。为确保图片正确加载，您需要向图片 URL 发送一个 HTTP 请求，然后检查响应。如果状态码为 200，则表示图片可访问且加载正确，类似于前面案例中看到的链接验证。您可以使用\
    \ 404 状态码来指示图片已损坏。通过使用此方法，您可以确保超链接内的图片能够正确显示，不会导致出现损坏的图片图标，从而保持网页的视觉完整性。\n\n```\n\
    import org.openqa.selenium.WebDriver;\nimport org.openqa.selenium.WebElement;\n\
    import org.openqa.selenium.chrome.ChromeDriver;\nimport org.openqa.selenium.By;\n\
    import java.net.HttpURLConnection;\nimport java.net.URL;\nimport java.util.List;\n\
    public class ValidateImages {\npublic static void main(String[] args) throws Exception\
    \ {\nSystem.setProperty(\"webdriver.chrome.driver\", \"path/to/chromedriver\"\
    );\nWebDriver driver = new ChromeDriver();\ndriver.get(\"your_website_url\");\n\
    List images = driver.findElements(By.tagName(\"img\"));\nfor (WebElement img :\
    \ images) {\nString src = img.getAttribute(\"src\");\nHttpURLConnection connection\
    \ = (HttpURLConnection) new URL(src).openConnection();\nconnection.setRequestMethod(\"\
    HEAD\");\nint responseCode = connection.getResponseCode();\nif (responseCode ==\
    \ 200) {\nSystem.out.println(src + \" - Image is valid\");\n} else if (responseCode\
    \ == 404) {\nSystem.out.println(src + \" - Image is broken\");\n} else {\nSystem.out.println(src\
    \ + \" - Image status is \" + responseCode);\n}\n}\ndriver.quit();\n}\n}\n```\n\
    \n数据属性超链接\n\n当处理动态或相似的标准属性时，您需要使用自定义数据属性来定位超链接，这提供了一种灵活且自定义的方法。这些自定义数据属性为定位超链接以进行各种交互和验证提供了一种稳定且唯一的方式，确保在执行的测试中能够准确定位到正确的超链接。\n\
    \n```\nWebElement dataLink = driver.findElement(By.cssSelector(\"a[data-info='pythonLink']\"\
    ));\n```\n"
- fmt: '# Summary


    This chapter explored the complex world of hyperlinks in your testing using Selenium
    WebDriver and Java. You learned various strategies for identifying and interacting
    with hyperlinks, utilizing different locators. The chapter investigated image
    validation, ensuring that images on a web page are not broken and displayed correctly.
    Furthermore, you explored the concept of data attributes in hyperlinks, understanding
    their role in storing additional information, and learned how to interact with
    them. The chapter equips you with practical knowledge and skills through clear
    examples and use cases, ensuring that the strategies discussed are applicable
    in real-world testing scenarios. This foundational knowledge is crucial for navigating
    web pages and ensuring that automated tests are robust and effective.


    # 6. Buttons


    This chapter explores a wide array of interactive elements commonly encountered
    in web interfaces, such as buttons, radio buttons, checkboxes, and drop-down lists.
    Each element offers unique functionalities and user interactions, making it imperative
    for testers to understand and effectively automate their behavior.


    Your journey begins with buttons—how users interact with web pages. You’ll explore
    various types: standard, submit, image, JavaScript, disabled, and toggle buttons.
    Each type introduces its own set of functionalities and complexities. Next, you’ll
    focus on radio buttons and checkboxes, which are essential for single and multiple
    option selections. Understanding how to interact with and validate these elements
    accurately is crucial for form-based testing. Then, you’ll explore the `SelectList`
    and `MultiSelectList` elements, which are critical for user selection in drop-down
    formats. Learning to interact with and validate single and multiple options in
    these lists is key for testing comprehensive form-related features.


    Throughout this chapter, your aim is not just to interact with these elements
    but also to confirm their types and validate the outcomes of your interactions.
    It outlines key considerations to consider when testing buttons using Selenium.
    These points serve as a guide to help you create thorough, effective test cases
    and ensure your application’s buttons are reliable and user-friendly. This ensures
    your tests are precise, reliable, and reflect real-world user experiences.


    As you move from one element to the next, the chapter is designed to provide a
    smooth transition, ensuring you understand how each component fits into the broader
    context of web application testing.


    ## Standard HTML Button


    The standard HTML button is a fundamental element for user interaction on web
    pages and is typically created using the `<button>` tag in HTML. It’s versatile
    and often used for triggering scripts or as a simple clickable element.


    ```

    Click Here!

    ```


    Figure [6-1](#608985_1_En_6_Chapter.xhtml#Fig1) represents a standard rectangular
    button, often with a default style that can be customized with CSS.


    ![](images/608985_1_En_6_Chapter/608985_1_En_6_Fig1_HTML.jpg)


    A screenshot titled standard button has a rectangular shaded button with an inside
    text, click here exclamation mark.


    **Figure 6-1** Standard HTML button


    In Selenium, you can interact with standard buttons using the `click()` method
    after locating them with selectors like `By.id`, `By.className`, or `By.cssSelector`.


    ```

    WebElement standardButton = driver.findElement(By.id("standardButton"));

    standardButton.click(); // Interaction

    Assert.assertTrue(standardButton.isDisplayed(), "The standard button is not visible.");
    // Post-interaction validation

    ```


    You locate this button by its ID and perform a click action. After the interaction,
    you might validate its visibility or any other page changes it triggers.


    ### Asserting Button Type


    After you interact with the standard button, confirming its type reassures you
    that your actions were performed on the correct element.


    ```

    // Type validation

    Assert.assertEquals("button", standardButton.getAttribute("type"), "Not a standard
    button.");

    ```'
