- fmt: "# Toggle Buttons\n\nYou click the toggle button and then validate that its\
    \ state has indeed toggled from its previous state. These require a check before\
    \ or after the click to ensure the state has changed as expected, introducing\
    \ a cyclical pattern to your interaction and validation process. In some cases,\
    \ you need to check each state’s effect when clicked. Toggle buttons do not have\
    \ a unique type, so you can validate them by their function to toggle between\
    \ the two states on/off, as intended during user interactions.\n\n# Radio Buttons\n\
    \nRadio buttons are fundamental elements in web forms, ensuring users make a singular,\
    \ clear choice. Each set of radio buttons is grouped by a shared `name` attribute,\
    \ allowing only one button in the group to be selected at a time. This exclusivity\
    \ is vital in scenarios like surveys or settings requiring a definite answer.\n\
    \nThe following is HTML code for a set of radio buttons asking users about their\
    \ preferred genre of music.\n\n```\nMusic Preference Survey\n\nRock\n\nJazz\n\n\
    Classical\n```\n\nIn this structure, each radio button is marked with a unique\
    \ ID, making them easily identifiable. The `label` tags enhance user accessibility\
    \ and provide a larger clickable area.\n\nNext, take a look at Figure [6-7](#608985_1_En_6_Chapter.xhtml#Fig7).\n\
    \n![](images/608985_1_En_6_Chapter/608985_1_En_6_Fig7_HTML.jpg)\n\n2 sets of 3\
    \ radio buttons for rock, jazz, and classical, are titled, music preference survey.\
    \ The first set is unchecked. The radio button for rock is checked in the second\
    \ set.\n\n**Figure 6-7** Displaying radio buttons unchecked and checked\n\nFigure\
    \ [6-7](#608985_1_En_6_Chapter.xhtml#Fig7) shows the default unchecked and checked\
    \ radio buttons when a click operation is performed. It demonstrates whether a\
    \ radio button is selected, and if selected, which option, ensuring you develop\
    \ test scenarios accordingly.\n\n> **Note**  \n> A black dot in a radio button\
    \ shows that the button has been selected.\n\n## Locating and Selecting with Radio\
    \ Buttons\n\nLocating elements is a cornerstone of Selenium testing. Let’s discuss\
    \ how to locate and interact with the radio buttons that are provided in the HTML.\n\
    \n### By ID\n\nThis method is precise and efficient, especially when each radio\
    \ button has a unique ID.\n\n```\nWebElement rockRadio = driver.findElement(By.id(\"\
    rock\"));\nrockRadio.click(); // Selecting the 'Rock' radio button\n```\n\n###\
    \ Using Label\n\nLocating by label is particularly useful when the ID is dynamic\
    \ or part of a complex structure.\n\n```\nWebElement jazzRadioLabel = driver.findElement(By.xpath(\"\
    //label[text()='Jazz']\"));\njazzRadioLabel.click(); // Clicking the label also\
    \ selects the associated radio button\n```\n\n### By Index Values\n\nYou can use\
    \ index value when interacting with a radio button based on its position in a\
    \ group.\n\n```\nList musicRadios = driver.findElements(By.name(\"music\"));\n\
    WebElement classicalRadio = musicRadios.get(2); // Index 2 for the third element,\
    \ which is 'Classical'\nclassicalRadio.click(); // Selecting the 'Classical' radio\
    \ button\n```\n\n## Myth of Deselecting Radio Buttons\n\nYou can’t directly deselect\
    \ a radio button. Once selected, a radio button remains active until another button\
    \ in the group is chosen. This behavior underscores the importance of always providing\
    \ a default or neutral option in forms.\n\n## Validating Your Choices with Assertions\n\
    \n### Validating / Confirming Element Type\n\nBefore interacting with what you\
    \ assume is a radio button, let’s make sure it is one.\n\n```\nAssert.assertEquals(\"\
    radio\", rockRadio.getAttribute(\"type\"), \"The element is not a radio button.\"\
    );\n```\n\nThis assertion checks the element’s `type` attribute and compares it\
    \ to the string `radio`, ensuring that you’re dealing with a radio button or not.\n\
    \n### Verifying the Selection State\n\nAfter selecting, confirming that the radio\
    \ button reflects the correct state is vital, so you verify the state using the\
    \ assertion method.\n\n```\nrockRadio.click(); // Clicking the 'Rock' radio button\n\
    Assert.assertTrue(rockRadio.isSelected(), \"The radio button is not selected as\
    \ expected.\");\n```\n\nThis assertion checks if the Rock radio button is selected.\
    \ If it’s not, the test fails, indicating a potential issue with the selection\
    \ process.\n\n# Checkboxes\n\nCheckboxes are a staple in web forms, allowing you\
    \ to make multiple selections. They’re versatile, providing various choices, unlike\
    \ radio buttons, which limit users to a single selection. Understanding checkbox\
    \ interactions is vital for any tester to ensure forms capture user inputs accurately.\n\
    \nConsider an HTML form asking users about their hobbies. This example serves\
    \ as your testing ground.\n\n```\nHobbies Selection\n\nMusic\n\nTravel\n\nBooks\n\
    ```\n\nEach checkbox is uniquely identified by its ID, and the label provides\
    \ a human-readable text. Let’s look at how to locate and interact with these checkboxes.\n\
    \nFigure [6-8](#608985_1_En_6_Chapter.xhtml#Fig8) shows three checkboxes. The\
    \ top image shows that none of the checkboxes are checked or selected. In the\
    \ bottom image, two checkboxes are selected among the three. Figure [6-8](#608985_1_En_6_Chapter.xhtml#Fig8)\
    \ helps you understand that more than one checkbox can be selected, which is not\
    \ the case with radio buttons.\n\n![](images/608985_1_En_6_Chapter/608985_1_En_6_Fig8_HTML.jpg)\n\
    \n2 sets of 3 checkboxes for music, travel, and books. The first set is not selected.\
    \ The checkboxes for music and books are selected in the second set.\n\n**Figure\
    \ 6-8** Displaying checkboxes unchecked and checked\n\n> **Note**  \n> Selection\
    \ and checked are referred to interchangeably.\n\n## Locating and Selecting Checkboxes\n\
    \nA checkbox is selected by clicking the located element, similar to the radio\
    \ buttons discussed earlier. With radio buttons, only one selection is allowed,\
    \ while you can select more than one choice in checkboxes. You need to first locate\
    \ the element and then make the selection accordingly.\n\n### By ID\n\nYou begin\
    \ by identifying and interacting with checkboxes using their unique IDs. This\
    \ step is foundational, leading you naturally into the exploration of more complex\
    \ locating strategies.\n\n```\nWebElement musicCheckbox = driver.findElement(By.id(\"\
    music\"));\nmusicCheckbox.click(); // Selecting the 'Music' checkbox\n```\n\n\
    ### Using Label\n\nThis method locates checkboxes by their labels, a strategy\
    \ that reflects how users might interact with the form. This approach sets the\
    \ stage for understanding the importance of user-centric testing.\n\n```\nWebElement\
    \ travelCheckboxLabel = driver.findElement(By.xpath(\"//label[text()='Travel']\"\
    ));\ntravelCheckboxLabel.click(); // Clicking the label selects the associated\
    \ checkbox\n```\n\n### By Name\n\nWhen you want to interact with a group of checkboxes,\
    \ a scenario that introduces you to handling multiple elements and paves the way\
    \ for more advanced interactions, you can use the following Java snippet to find\
    \ all checkboxes by their `name` attribute:\n\n```\nList hobbiesCheckboxes = driver.findElements(By.name(\"\
    hobby\"));\n```\n\n### Selecting a Checkbox by Visible Text\n\nSelecting based\
    \ on the visible text ensures that the test reflects how a user might interact\
    \ with the form.\n\n```\nfor (WebElement checkbox : hobbiesCheckboxes) {\nif (checkbox.getAttribute(\"\
    value\").equalsIgnoreCase(\"Travel\")) {\nif (!checkbox.isSelected()) {\ncheckbox.click();\n\
    }\nbreak;\n}\n}\n```\n\n### Selecting a Checkbox by Value\n\nSometimes, you might\
    \ want to select a checkbox based on its `value` attribute, an effective way when\
    \ the visible text isn’t reliable.\n\n```\nfor (WebElement checkbox : hobbiesCheckboxes)\
    \ {\nif (\"Travel\".equals(checkbox.getAttribute(\"value\"))) {\ncheckbox.click();\n\
    break;\n}\n}\n```\n\n### Select All Checkboxes at Once\n\nSometimes, your test\
    \ cases require you to select all available checkboxes. This action isn’t just\
    \ about ensuring every box is checked; it’s about validating the application’s\
    \ response to multiple selections. By iterating over each checkbox and selecting\
    \ them, you’re simulating a common user interaction, ensuring your test is as\
    \ realistic as possible.\n\n```\nfor (WebElement checkbox : hobbiesCheckboxes)\
    \ {\nif (!checkbox.isSelected()) {\ncheckbox.click();\n}\n}\n```\n\n### Selecting\
    \ and Deselecting by Index"
