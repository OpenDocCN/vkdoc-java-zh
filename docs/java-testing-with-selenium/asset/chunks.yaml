  trans: "\n超时异常用于等待网页元素变为可见状态。当指定的等待时间到期时，会触发超时异常，该异常在 `try` 块中被提及，并在 `catch` 块中附带消息。`finally`\
    \ 块包含无论是否引发异常都用于关闭 WebDriver 的代码。通过这种方式，你可以使用 try-catch-finally 处理在网页上遇到的任何异常。\n\
    \n使用带有 throw 的 try-catch-finally 处理过时元素异常\n\n让我们使用 Java 语言中带有 `throw` 的 try-catch-finally\
    \ 来处理过时元素异常。当网页元素因页面重新加载或动态内容更新而过时时，可能会发生此异常。你可以使用 *throw* 关键字抛出自定义异常。\n\n```\n\
    try {\nWebElement element = driver.findElement(By.id(\"dynamicElement\"));\nelement.click();\n\
    } catch (StaleElementReferenceException e) {\nSystem.out.println(\"Stale Element\
    \ Reference: \" + e.getMessage());\nthrow new RuntimeException(\"Failed due to\
    \ stale element reference.\");\n} finally {\nSystem.out.println(\"Cleanup actions\
    \ if any.\");\n}\n```\n\ntry-catch-finally 的结构保持不变。添加了 `throw` 关键字以引发自定义异常。这对于在动态场景中进行测试至关重要，在这些场景中，DOM\
    \ 中的 Web 元素可能变化过于频繁。\n\n使用多个 catch 块处理各种异常\n\n当与网页交互时可能发生各种异常时，你需要一种方法来处理这种机制。这可以通过使用多个\
    \ `catch` 块来实现。每个块代表不同的异常，允许你分别处理它们。以下代码片段处理了不同的异常。\n\n```\ntry {\nWebElement\
    \ element = driver.findElement(By.id(\"someElement\"));\nelement.click();\n} catch\
    \ (NoSuchElementException e) {\nSystem.out.println(\"Element not found: \" + e.getMessage());\n\
    } catch (StaleElementReferenceException e) {\nSystem.out.println(\"Stale Element\
    \ Reference: \" + e.getMessage());\n} catch (TimeoutException e) {\nSystem.out.println(\"\
    Operation timed out: \" + e.getMessage());\n} finally {\ndriver.quit();\n}\n```\n\
    \n此示例使用了多个异常，例如元素未找到、过时元素和超时异常，分别写在每个 `catch` 块中。你还在 WebDriver 关闭时使用了 `finally`\
    \ 块，以保持干净的测试环境。这可用于测试期间可能发生多个故障的情况。\n\n处理自定义异常\n\n你可以根据测试需求自定义异常处理技术。以下定义了自定义异常处理。\n\
    \n```\ntry {\n// Selenium interactions\n} catch (Exception e) {\nthrow new CustomSeleniumException(\"\
    Custom message\", e);\n} finally {\n// Cleanup actions\n}\npublic class CustomSeleniumException\
    \ extends Exception {\npublic CustomSeleniumException(String message, Throwable\
    \ cause) {\nsuper(message, cause);\n}\n}\n```\n\n这种自定义异常处理有助于封装有关错误的更多信息，或为测试套件创建更标准化的异常处理方式。它特别适用于大型项目或框架，在这些项目中，你需要一致地处理各种类型的异常。定义自定义异常可提供有关错误的更详细信息，使其更易于理解和调试。\n\
    这些示例帮助你处理 Java 中在自动化 Web 测试期间出现的、与各种场景相关的不同 Selenium 异常。接下来，让我们讨论处理异常的一般最佳实践。\n\
    \n处理异常的最佳实践\n\n以下是编写 Selenium 异常处理的一些最佳实践。\n\n*   **显示异常信息**。有三种方法可以获取有关所引发异常的信息。\n\
    \n    *   **printStackTrace()** 打印堆栈跟踪、异常名称及其描述等信息。它主要用于调试，因为它显示了导致异常的调用方法序列。\n\
    \n    *   **toString()** 显示异常名称和简要描述消息。通常用于创建日志信息或显示有关错误的简明信息。\n\n    *   **getMessage()**\
    \ 是以消息形式检索到的关于所遇到特定错误的详细信息。\n\n*   你可以使用上述任何一种方法来记录信息。\n\n*   **尽可能捕获最具体的异常。**\
    \ 你需要力求捕获特定的异常，以了解其原因并进行相应处理。\n\n*   **包含用于资源清理的 finally 块。** 无论是否发生任何异常，你都可以使用\
    \ `finally` 块代码来释放 WebDriver 等资源。\n\n*   **实现自定义异常以提高清晰度和一致性。** 自定义异常在复杂测试项目中添加上下文和标准化错误处理方面非常有用。\n\
    \n*   **优雅地处理异常。** 当测试脚本失败时，你必须确保错误信息清晰简洁，以便于故障排除。\n\n*   **考虑对瞬时错误使用重试机制。** 对于网页上频繁变化导致\
    \ StaleElementReferenceException 的元素，重试机制使测试场景在新的动态时代更具弹性。\n\n*   **使用 findElements\
    \ 和等待来避免异常。** 使用 `driver.findElements` 而不是 `driver.findElement` 来防止在未找到元素时出现异常，因为\
    \ `findElements` 返回一个列表。结合显式等待以确保元素已加载。此方法通过检查返回列表的大小是否至少为 1 来验证元素是否存在，从而实现安全且无异常的操作：\n\
    \n```\n    WebDriverWait wait = new WebDriverWait(driver, Duration.ofSeconds(10));\n\
    \    boolean isElementPresent = wait.until((WebDriver d) -> d.findElements(locator).size()\
    \ >= 1);\n    if (isElementPresent) {\n    // Element is present; actions can\
    \ be safely performed.\n    }\n    ```\n\n*   此技术提供了一种验证元素存在的稳健方法，而不会遇到 NoSuchElementException，从而提高了脚本的稳定性。\n\
    \n总结\n本章包含两个重要部分：一是异常及其类型，二是异常处理。第一部分讨论了什么是异常及其发生的原因。它还分类并列出了在自动化测试执行期间可能遇到的所有异常。\n\
    第二部分重点介绍了异常处理。它探讨了使用 Java 的各种 try-catch 块来处理单个到多个 Selenium 异常。通过应用这些技术，你可以确保测试在遇到错误时不会突然失败，从而大大增强测试的稳定性和可靠性。本章还讨论了处理各种异常的最佳实践。\n\
    \n10. Selenium 测试自动化中的等待策略\n"
- fmt: "# Selenium Waits\n\nIn Selenium test automation, managing the timing for web\
    \ elements to load and become interactable is a key challenge. Waits are essential\
    \ for handling the asynchronous behavior of web applications, ensuring that elements\
    \ are ready for interaction before a test proceeds. This chapter focuses on the\
    \ different types of waits in Selenium—implicit, explicit, and fluent—and provides\
    \ an overview of their applications and best practices.\n\nWaits are crucial in\
    \ avoiding flaky tests, which result from attempting to interact with elements\
    \ that are not yet available. Let’s explore how to effectively use these waits\
    \ to ensure robust and reliable automated tests. The chapter covers the distinct\
    \ features of each wait type, guiding you through their appropriate use cases\
    \ and helping you understand which wait to choose for specific testing scenarios.\n\
    \nThis concise overview is designed to enhance your understanding of waits in\
    \ Selenium, ensuring the tools and knowledge to efficiently handle element synchronization\
    \ challenges in test automation projects. Let’s delve into these vital components\
    \ of Selenium to optimize the performance and reliability of your automated tests.\n\
    \n## Need for Waits\n\nYou need to test the web application and yield accurate\
    \ results; hence, you use waits in automation testing. There are significant reasons\
    \ to have waits in test scripts.\n\n### Dynamic Content Loading\n\nYou know that\
    \ modern web pages often take time to load all the dynamic elements using JavaScript\
    \ or Ajax. During this time, a test script tries to interact with elements that\
    \ are not yet available, making an exception occur. To avoid such instances, you\
    \ use waits to ensure the page is completely loaded and the corresponding element\
    \ is available to interact with the test script.\n\n### Network Latency and Performance\
    \ Variations\n\nNetwork latency and server response time can cause variations\
    \ in the time it takes to load a web page. Wait facilitates handling these variation\
    \ times by enabling the test script to pause while waiting for web elements to\
    \ become available or actions to be performed.\n\n### Synchronization\n\nThe state\
    \ of the test script and the web application are synchronized with the help of\
    \ waits. This synchronization is crucial for the robustness and reliability of\
    \ a test script.\n\n### Reducing Flakiness\n\nTest scripts without having proper\
    \ waits can be flaky as they might pass sometimes and fail at other times. The\
    \ use of waits makes a test script more consistent.\n\n### Uncertain User Input\n\
    \nSometimes, when a user provides an unexpected input, there are instances where\
    \ the script cannot interact with the web element until a specific condition mentioned\
    \ is met. Using waits ensures the condition specified is successfully met before\
    \ interacting with the web element.\n\n## Wait Types\n\nIn Selenium, waits are\
    \ an essential feature for handling the asynchronous behavior of web applications.\
    \ There are mainly three types of waits: implicit, explicit, and fluent. Let’s\
    \ delve into each type in more depth.\n\n### Implicit Waits\n\nWhen using implicit\
    \ waits, you specify a time frame that makes the `WebDriver` wait for an element\
    \ to be available in the DOM (Document Object Model) to avoid throwing of `NoSuchElementException`.\
    \ This wait is set to last the entire `WebDriver` object’s life. The default time\
    \ for the wait is zero seconds.\n\n> **Note**  \n> DOM is an interface for HTML\
    \ and XML.\n\nYou set a wait time period in the test script so that the defined\
    \ web element will be available on the given page. During this time period, the\
    \ `WebDriver` will not proceed to execute further commands and will avoid throwing\
    \ an exception. The `WebDriver` is made to wait for the specified wait time. If\
    \ the web element is not available or visible within this time frame, it raises\
    \ a `NoSuchElementException`. When the web element is loaded and found after the\
    \ wait time is set, the `WebDriver` executes future test commands in the script.\
    \ The concept of implicit waits is inspired by the Watir tool.\n\nThe following\
    \ is an example of implicit wait:\n\n```java\nimport org.openqa.selenium.By;\n\
    import org.openqa.selenium.WebDriver;\nimport org.openqa.selenium.WebElement;\n\
    import org.openqa.selenium.firefox.FirefoxDriver;\nimport java.util.concurrent.TimeUnit;\n\
    public class SeleniumFirefoxExample {\npublic static void main(String[] args)\
    \ {\n// Set the property for the Firefox driver\nSystem.setProperty(\"webdriver.gecko.driver\"\
    , \"path/to/geckodriver\");\n// Initialize WebDriver\nWebDriver driver = new FirefoxDriver();\n\
    // Set implicit wait time\ndriver.manage().timeouts().implicitlyWait(10, TimeUnit.SECONDS);\n\
    // Navigate to a URL\ndriver.get(\"http://example.com\"); // Replace with target\
    \ URL\n// Find the element using its ID\nWebElement elementToTypeIn = driver.findElement(By.id(\"\
    elementId\")); // Replace with appropriate locator\n// Type something into the\
    \ input field\nelementToTypeIn.sendKeys(\"Hello, World!\");\n// Close the browser\n\
    driver.quit();\n}\n}\n```\n\nIn this example of implicit wait, you use a 10 seconds\
    \ time frame to find/locate the web element by ID. The time frame is determined\
    \ by the tester depending on the scenario and the test case needs to be conducted.\
    \ You can use a `try-catch` block to handle exceptions as discussed in the exception\
    \ Chapter [9](#608985_1_En_9_Chapter.xhtml). Within the defined time frame, the\
    \ `WebDriver` waits until the element is located. When the element is located,\
    \ the provided text is submitted, and later the browser is closed. If the web\
    \ element is not found within the time frame, a `NoSuchElementException` is raised.\n\
    \n> **Note**  \n> An implicit wait is used for web elements that are not instantly\
    \ available.\n\n### Explicit Waits\n\nAs you have seen, implicit waits make the\
    \ `WebDriver` wait for a specific time. The web element is made available on the\
    \ web page after the specified time has elapsed. However, implicit waits cannot\
    \ be used for all web elements because the time taken to execute the test case\
    \ is longer. This leads to the use of explicit wait, which is an improved version\
    \ of implicit wait.\n\nThe explicit wait defines the `ExpectedConditions` along\
    \ with the `WebDriverWait`. The `WebDriver` is made to wait for a specified condition\
    \ that must be satisfied within the time frame set. When the condition is met\
    \ or the time has elapsed, the test script begins to proceed with subsequent actions\
    \ defined in the script.\n\n> **Note**  \n> The default poll frequency of explicit\
    \ wait is 0.5 seconds, which cannot be altered.\n\nThe major difference between\
    \ implicit and explicit waits is that the explicit wait proceeds with code execution\
    \ when the defined condition is met and does not wait for the time to complete.\
    \ The explicit wait provides more precise control and prevents indefinite waiting\
    \ time, ensuring smooth continuation of the test script.\n\nExample code for using\
    \ explicit wait:\n\n```java\nimport org.openqa.selenium.By;\nimport org.openqa.selenium.WebDriver;\n\
    import org.openqa.selenium.WebElement;\nimport org.openqa.selenium.firefox.FirefoxDriver;\n\
    import org.openqa.selenium.support.ui.ExpectedConditions;\nimport org.openqa.selenium.support.ui.WebDriverWait;\n\
    public class SeleniumTest {\npublic static void main(String[] args) {\nSystem.setProperty(\"\
    webdriver.gecko.driver\", \"path/to/geckodriver\");\nWebDriver driver = new FirefoxDriver();\n\
    driver.get(\"http://example.com\"); // Replace with target URL\nWebDriverWait\
    \ wait = new WebDriverWait(driver, 10); // 10 seconds wait\nWebElement dynamicElement\
    \ =\nwait.until(ExpectedConditions.visibilityOfElementLocated(By.id(\"dynamicElementId\"\
    ))); // Replace with appropriate locator\ndynamicElement.sendKeys(\"Text to type\"\
    );\ndriver.quit();\n}\n}\n```\n\nThe preceding code defines a condition that waits\
    \ until the specified web element is visible on the page. The time to wait is\
    \ set to 10 seconds. When you cannot predict the wait times of a web element,\
    \ you use explicit wait, hence providing a better way to handle the asynchronous\
    \ nature of modern-day web applications. Expected conditions are important in\
    \ defining the explicit waits. These are known conditions that are discussed in\
    \ the next topic."
  raw: 'In Selenium test automation, managing the timing for web elements to

    load and become interactable is a key challenge. Waits are essential for

    handling the asynchronous behavior of web

    applications, ensuring that elements are ready for interaction before a

    test proceeds. This chapter focuses on the different types of waits in

    Selenium—implicit, explicit, and fluent—and provides an overview of

    their applications and best practices.

    Waits are crucial in avoiding flaky tests, which

    result from attempting to interact with elements that are not yet

    available. Let’s explore how to effectively use these waits to ensure

    robust and reliable automated tests. The chapter covers the distinct

    features of each wait type, guiding you through their appropriate use

    cases and helping you understand which wait to choose for specific

    testing scenarios.

    This concise overview is designed to enhance your understanding of

    waits in Selenium, ensuring the tools and knowledge to efficiently

    handle element synchronization challenges in test automation projects.

    Let’s delve into these vital components of Selenium to optimize the

    performance and reliability of your automated tests.


    Need for Waits

    You need to test the web application and

    yield accurate results; hence, you use waits in automation testing.

    There are significant reasons to have waits in test scripts.


    Dynamic Content Loading

    You know that modern web pages often take time to load all the dynamic elements
    using

    JavaScript or Ajax. During this time, a test script tries to interact

    with elements that are not yet available, making an exception occur. To

    avoid such instances, you use waits to ensure the page is completely

    loaded and the corresponding element is available to interact with the

    test script.


    Network Latency and Performance Variations

    Network latency and server response time can

    cause variations in the time it takes to load a web page. Wait

    facilitates handling these variation times by enabling the test script

    to pause while waiting for web elements to become available or actions

    to be performed.


    Synchronization

    The state of the test script and the web application are synchronized

    with the help of waits. This synchronization is

    crucial for the robustness and reliability of a test script.


    Reducing Flakiness

    Test scripts

    without having proper waits can be flaky as they might pass sometimes

    and fail at other times. The use of waits makes a test script more

    consistent.


    Uncertain User Input

    Sometimes, when a user provides an

    unexpected input, there are instances where the script cannot interact

    with the web element until a specific condition mentioned is met. Using

    waits ensures the condition specified is successfully met before

    interacting with the web element.


    Wait Types

    In Selenium, waits are an essential feature for handling the

    asynchronous behavior of web applications. There are mainly three types

    of waits: implicit, explicit, and fluent. Let’s delve into each type in

    more depth.


    Implicit Waits

    When using implicit

    waits, you specify a time frame that makes the WebDriver wait for

    an element to be available in the DOM (Document Object

    Model) to avoid

    throwing of NoSuchElementException. This wait is set to last the entire

    WebDriver object’s life. The default time for the wait is zero

    seconds.


    Note


    DOM is an interface for HTML and XML.


    You set a wait time period in the test script so that the defined web

    element will be available on the given page. During this time period,

    the WebDriver

    will not proceed to execute further commands and will avoid throwing an

    exception. The WebDriver is made to wait for the specified wait time. If

    the web element is not available or visible within this time frame, it

    raises a NoSuchElementException. When the web element is loaded and

    found after the wait time is set, the WebDriver executes future test

    commands in the script. The concept of implicit waits is inspired by the

    Watir tool.


    The following is an example of implicit wait:


    ```

    import org.openqa.selenium.By;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.WebElement;

    import org.openqa.selenium.firefox.FirefoxDriver;

    import java.util.concurrent.TimeUnit;

    public class SeleniumFirefoxExample {

    public static void main(String[] args) {

    // Set the property for the Firefox driver

    System.setProperty("webdriver.gecko.driver", "path/to/geckodriver");

    // Initialize WebDriver

    WebDriver driver = new FirefoxDriver();

    // Set implicit wait time

    driver.manage().timeouts().implicitlyWait(10, TimeUnit.SECONDS);

    // Navigate to a URL

    driver.get("http://example.com"); // Replace with target URL

    // Find the element using its ID

    WebElement elementToTypeIn = driver.findElement(By.id("elementId")); // Replace
    with appropriate locator

    // Type something into the input field

    elementToTypeIn.sendKeys("Hello, World!");

    // Close the browser

    driver.quit();

    }

    }

    ```


    In this example of implicit wait, you use a 10 seconds time frame

    to find/locate the web element by ID. The time frame is determined by

    the tester depending on the scenario and the test case needs to be

    conducted. You can use a try-catch block to

    handle exceptions as discussed in the exception Chapter [9](#608985_1_En_9_Chapter.xhtml).
    Within the defined time frame,

    the WebDriver waits until the element is located. When the element is

    located, the provided text is submitted, and later the browser is

    closed. If the web element is not found within the time frame, a

    NoSuchElementException is raised.


    Note


    An implicit wait is used for web elements that are not instantly

    available.


    Explicit Waits

    As you have seen, implicit waits make the WebDriver wait for a

    specific time. The web element is made available on the web page after

    the specified time has elapsed. However, implicit waits cannot be used

    for all web elements because the time taken to execute the test case is

    longer. This leads to the use of explicit wait, which is an improved

    version of implicit wait.

    The explicit wait defines the ExpectedConditions

    along with the WebDriverWait. The

    WebDriver is made to wait for a specified condition that must be

    satisfied within the time frame set. When the condition is met or the

    time has elapsed, the test script begins to proceed with subsequent

    actions defined in the script.


    Note


    The default poll frequency of explicit wait is 0.5 seconds, which

    cannot be altered.


    The major difference between implicit and explicit waits is that

    the explicit wait proceeds with code execution when the defined

    condition is met and does not wait for the time to complete. The

    explicit wait provides more precise control and prevents indefinite

    waiting time, ensuring smooth continuation of the test script.


    Example code for using explicit wait:


    ```

    import org.openqa.selenium.By;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.WebElement;

    import org.openqa.selenium.firefox.FirefoxDriver;

    import org.openqa.selenium.support.ui.ExpectedConditions;

    import org.openqa.selenium.support.ui.WebDriverWait;

    public class SeleniumTest {

    public static void main(String[] args) {

    System.setProperty("webdriver.gecko.driver", "path/to/geckodriver");

    WebDriver driver = new FirefoxDriver();

    driver.get("http://example.com"); // Replace with target URL

    WebDriverWait wait = new WebDriverWait(driver, 10); // 10 seconds wait

    WebElement dynamicElement =

    wait.until(ExpectedConditions.visibilityOfElementLocated(By.id("dynamicElementId")));
    // Replace with appropriatelocator

    dynamicElement.sendKeys("Text to type");

    driver.quit();

    }

    }

    ```


    The preceding code defines a condition that waits until the specified

    web element is visible on the page. The time to wait is set to 10 seconds.

    When you cannot predict the wait times of a web element,

    you use explicit wait, hence providing a better way to handle the

    asynchronous nature of modern-day web applications. Expected conditions

    are important in defining the explicit waits. These are known conditions

    that are discussed in the next topic.'
  trans: '

    在 Selenium 测试自动化中，管理 Web 元素加载并变为可交互状态的时机是一项关键挑战。等待机制对于处理 Web 应用程序的异步行为至关重要，它能确保元素在测试继续执行前已准备好进行交互。本章重点介绍
    Selenium 中不同类型的等待——隐式等待、显式等待和流畅等待，并概述其应用场景和最佳实践。


    等待机制对于避免因尝试与尚未就绪的元素交互而导致的**不稳定测试**至关重要。让我们探讨如何有效使用这些等待机制，以确保自动化测试的健壮性和可靠性。本章涵盖了每种等待类型的独特特性，指导您了解其适当的使用场景，并帮助您理解在特定测试情况下应选择哪种等待方式。


    本概述旨在加深您对 Selenium 中等待机制的理解，确保您掌握在测试自动化项目中高效处理元素同步挑战所需的工具和知识。让我们深入探讨 Selenium
    的这些关键组件，以优化自动化测试的性能和可靠性。


    ### 等待的必要性


    您需要测试 Web 应用程序并获得准确的结果；因此，在自动化测试中需要使用等待机制。在测试脚本中使用等待机制有以下几个重要原因。


    #### 动态内容加载


    您知道，现代网页通常需要时间才能使用 JavaScript 或 Ajax 加载所有动态元素。在此期间，测试脚本会尝试与尚未就绪的元素交互，从而导致异常发生。为避免此类情况，您需要使用等待机制来确保页面完全加载，并且相应的元素可用于与测试脚本交互。


    #### 网络延迟和性能差异


    网络延迟和服务器响应时间可能导致加载网页所需的时间发生变化。等待机制通过使测试脚本在等待 Web 元素变为可用或操作执行时暂停，从而帮助处理这些变化的时间。


    #### 同步


    借助等待机制，测试脚本和 Web 应用程序的状态得以同步。这种同步对于测试脚本的健壮性和可靠性至关重要。


    #### 减少不稳定性


    没有适当等待机制的测试脚本可能不稳定，因为它们有时会通过，有时会失败。使用等待机制可以使测试脚本更加一致。


    #### 不确定的用户输入


    有时，当用户提供意外输入时，脚本可能无法与 Web 元素交互，直到满足指定的特定条件。使用等待机制可确保在与 Web 元素交互之前成功满足指定的条件。


    ### 等待类型


    在 Selenium 中，等待是处理 Web 应用程序异步行为的基本功能。主要有三种类型的等待：隐式等待、显式等待和流畅等待。让我们更深入地探讨每种类型。


    #### 隐式等待


    使用隐式等待时，您指定一个时间范围，使 WebDriver 等待元素在 DOM（文档对象模型）中可用，以避免抛出 `NoSuchElementException`。此等待设置为持续整个
    WebDriver 对象的生命周期。等待的默认时间为零秒。


    > **注意**

    >

    > DOM 是 HTML 和 XML 的接口。


    您在测试脚本中设置一个等待时间段，以便定义的 Web 元素在给定页面上可用。在此期间，WebDriver 不会继续执行后续命令，并将避免抛出异常。WebDriver
    被强制等待指定的等待时间。如果在此时间范围内 Web 元素不可用或不可见，则会引发 `NoSuchElementException`。当设置等待时间后 Web
    元素被加载并找到时，WebDriver 将执行脚本中的后续测试命令。隐式等待的概念灵感来源于 Watir 工具。


    以下是隐式等待的示例：


    ```

    import org.openqa.selenium.By;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.WebElement;

    import org.openqa.selenium.firefox.FirefoxDriver;

    import java.util.concurrent.TimeUnit;

    public class SeleniumFirefoxExample {

    public static void main(String[] args) {

    // 设置 Firefox 驱动属性

    System.setProperty("webdriver.gecko.driver", "path/to/geckodriver");

    // 初始化 WebDriver

    WebDriver driver = new FirefoxDriver();

    // 设置隐式等待时间

    driver.manage().timeouts().implicitlyWait(10, TimeUnit.SECONDS);

    // 导航到 URL

    driver.get("http://example.com"); // 替换为目标 URL

    // 使用 ID 查找元素

    WebElement elementToTypeIn = driver.findElement(By.id("elementId")); // 替换为合适的定位器

    // 在输入字段中输入内容

    elementToTypeIn.sendKeys("Hello, World!");

    // 关闭浏览器

    driver.quit();

    }

    }

    ```


    在此隐式等待示例中，您使用 10 秒的时间范围来通过 ID 查找/定位 Web 元素。时间范围由测试人员根据场景和需要执行的测试用例决定。您可以使用 `try-catch`
    块来处理异常，如异常章节 9 所述。在定义的时间范围内，WebDriver 会一直等待，直到元素被定位。当元素被定位后，提交提供的文本，然后关闭浏览器。如果在时间范围内未找到
    Web 元素，则会引发 `NoSuchElementException`。


    > **注意**

    >

    > 隐式等待用于并非立即可用的 Web 元素。


    #### 显式等待


    如您所见，隐式等待使 WebDriver 等待特定时间。Web 元素在指定时间过后才在网页上可用。但是，隐式等待不能用于所有 Web 元素，因为执行测试用例所需的时间会更长。这导致了显式等待的使用，它是隐式等待的改进版本。


    显式等待定义了 `ExpectedConditions` 以及 `WebDriverWait`。WebDriver 被强制等待一个必须在设定的时间范围内满足的指定条件。当条件满足或时间已过时，测试脚本开始执行脚本中定义的后续操作。


    > **注意**

    >

    > 显式等待的默认轮询频率为 0.5 秒，此频率无法更改。


    隐式等待和显式等待的主要区别在于，显式等待在定义的条件满足时立即继续执行代码，而不会等待时间结束。显式等待提供了更精确的控制，并防止无限等待时间，确保测试脚本的顺利继续。


    使用显式等待的示例代码：


    ```

    import org.openqa.selenium.By;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.WebElement;

    import org.openqa.selenium.firefox.FirefoxDriver;

    import org.openqa.selenium.support.ui.ExpectedConditions;

    import org.openqa.selenium.support.ui.WebDriverWait;

    public class SeleniumTest {

    public static void main(String[] args) {

    System.setProperty("webdriver.gecko.driver", "path/to/geckodriver");

    WebDriver driver = new FirefoxDriver();

    driver.get("http://example.com"); // 替换为目标 URL

    WebDriverWait wait = new WebDriverWait(driver, 10); // 10 秒等待

    WebElement dynamicElement =

    wait.until(ExpectedConditions.visibilityOfElementLocated(By.id("dynamicElementId")));
    // 替换为合适的定位器

    dynamicElement.sendKeys("Text to type");

    driver.quit();

    }

    }

    ```


    上述代码定义了一个条件，该条件等待直到指定的 Web 元素在页面上可见。等待时间设置为 10 秒。当您无法预测 Web 元素的等待时间时，可以使用显式等待，从而提供更好的方法来处理现代
    Web 应用程序的异步特性。预期条件对于定义显式等待非常重要。这些是已知的条件，将在下一个主题中讨论。

    '
- fmt: '# Commonly Used ExpectedConditions in the Java Class


    For more effective web element interaction, you can use the `ExpectedConditions`
    class available in Selenium WebDriver for Java, wherein you have a collection
    of predefined conditions. The following are some of the commonly used `ExpectedConditions`
    with their description, cause of failure, and the exception raised.


    - `elementToBeClickable(By locator)` waits for a web element to be visible and
    enabled on a page so that you can perform a click action on it.


    **Failure**: If the web element is not clickable (interactable).


    **Exception Raised**: `ElementNotInteractableException`


    ```

    WebDriverWait wait = new WebDriverWait(driver, 10);

    WebElement element = wait.until(ExpectedConditions.elementToBeClickable(By.id("someId")));

    element.click();

    ```


    - `elementToBeClickable(WebElement element)` waits for a specific `WebElement`
    to be clickable, meaning both visible and enabled.


    **Failure**: If the `WebElement` is not clickable within the time frame.


    **Exception Raised**: `ElementNotInteractableException` if the element is not
    interactable when an attempt to click is made.


    ```

    WebElement myElement = driver.findElement(By.id("clickableElement"));

    WebDriverWait wait = new WebDriverWait(driver, 10);

    WebElement clickableElement = wait.until(ExpectedConditions.elementToBeClickable(myElement));

    clickableElement.click();

    ```


    - `elementToBeSelected(By locator)` waits for an element to be selected. This
    is typically used for buttons such as checkboxes or radio buttons.


    **Failure**: If the button element is not selected or doesn’t exist.


    **Exception Raised**: Usually results in a `TimeoutException` if the element isn’t
    selected within the specified time. There’s no specific exception for the element
    not being selected other than timeout.


    ```

    WebDriverWait wait = new WebDriverWait(driver, 10);

    Boolean isSelected = wait.until(ExpectedConditions.elementToBeSelected(By.id("checkboxId")));

    ```


    - `elementToBeSelected(WebElement element)` waits for a specific `WebElement`
    to be selected.


    **Failure**: If the web element is not selected.


    **Exception Raised**: If the `WebElement` isn’t valid or not selectable, you might
    get a `StaleElementReferenceException` or `TimeoutException`.


    ```

    WebElement checkbox = driver.findElement(By.id("checkboxId"));

    WebDriverWait wait = new WebDriverWait(driver, 10);

    Boolean isSelected = wait.until(ExpectedConditions.elementToBeSelected(checkbox));

    ```


    - `presenceOfElementLocated(By locator)` waits for a web element to be present
    in the DOM that is not necessarily visible. Once the web element is present, then
    you can perform future actions associated with it.


    **Failure**: When the web element is not present in the DOM, then an exception
    is raised.


    **Exception Raised**: `NoSuchElementException`


    ```

    WebDriverWait wait = new WebDriverWait(driver, 10);

    WebElement element = wait.until(ExpectedConditions.presenceOfElementLocated(By.id("someId")));

    ```


    - `presenceOfAllElementsLocatedBy(By locator)` waits for all available matching
    web elements specified by the locator to be present in the DOM.


    **Failure**: If all the matching web elements are not present.


    **Exception Raised**: Typically results in a `TimeoutException` if not all elements
    are present within the wait period. There’s no specific exception for partial
    presence other than timeout.


    ```

    WebDriverWait wait = new WebDriverWait(driver, 10);

    List elements = wait.until(ExpectedConditions.presenceOfAllElementsLocatedBy(By.className("someClass")));

    ```


    - `visibilityOfElementLocated(By locator)` waits for a web element to be present
    in the DOM and visible. Visibility means that the element is not only displayed
    but also has a height and width greater than 0.


    **Failure**: If the web element is present but not visible within the specified
    time.


    **Exception Raised**: `ElementNotVisibleException`


    ```

    WebDriverWait wait = new WebDriverWait(driver, 10);

    WebElement element = wait.until(ExpectedConditions.visibilityOfElementLocated(By.id("someId")));

    ```


    - `visibilityOf(WebElement element)` waits for a specific `WebElement` to be visible.
    Visibility means that the element is not only displayed but also has a height
    and width greater than 0.


    **Failure**: If the `WebElement` is not visible within the time frame.


    **Exception Raised**: `ElementNotVisibleException` if an attempt to interact with
    the element is made while it is not visible.


    ```

    WebElement myElement = driver.findElement(By.id("visibleElement"));

    WebDriverWait wait = new WebDriverWait(driver, 10);

    WebElement visibleElement = wait.until(ExpectedConditions.visibilityOf(myElement));

    ```


    - `visibilityOfAllElementsLocatedBy(By locator)` waits for all web elements specified
    by the locator to be visible on the web page.


    **Failure**: If any of the elements are not visible.


    **Exception Raised**: It usually results in a `TimeoutException` if not all elements
    are visible within the specified time. There’s no specific exception for partial
    visibility other than timeout.


    ```

    WebDriverWait wait = new WebDriverWait(driver, 10);

    List elements = wait.until(ExpectedConditions.visibilityOfAllElementsLocatedBy(By.className("someClass")));

    ```


    - `visibilityOfAllElements(List<WebElement> elements)` waits for all elements
    in the provided list to be visible. This is useful when you have already located
    the elements and need to ensure they are all visible before proceeding.


    **Failure**: If not all elements in the list are visible within the time frame.


    **Exception Raised**: Typically results in a `TimeoutException` if not all elements
    are visible within the specified time. There’s no specific exception for partial
    visibility other than timeout.


    ```

    List elements = driver.findElements(By.className("someClass"));

    WebDriverWait wait = new WebDriverWait(driver, 10);

    List visibleElements = wait.until(ExpectedConditions.visibilityOfAllElements(elements));

    ```


    - `textToBePresentInElementLocated(By locator, String text)` waits for a specific
    text to be present in a particular element.


    **Failure**: If the text is not present in the specified element.


    **Exception Raised**: This usually results in a `TimeoutException` if the text
    isn’t found within the wait time. There’s no specific exception for the text not
    being present other than timeout.


    ```

    WebDriverWait wait = new WebDriverWait(driver, 10);

    Boolean isTextPresent = wait.until(ExpectedConditions.textToBePresentInElementLocated(By.id("someId"),
    "Expected Text"));

    ```


    - `textToBePresentInElement(WebElement element, String text)` waits for a specific
    text to be present in the provided `WebElement`.


    **Failure**: If the specified text is not present in the element within the time
    frame.


    **Exception Raised**: `TimeoutException` if the text is not found within the specified
    time.


    ```

    WebElement myElement = driver.findElement(By.id("textElement"));

    WebDriverWait wait = new WebDriverWait(driver, 10);

    Boolean isTextPresent = wait.until(ExpectedConditions.textToBePresentInElement(myElement,
    "Expected Text"));

    ```


    - `textToBePresentInElementValue(By locator, String text)` waits for a specific
    text to be present in the value attribute of an element located by the locator.


    **Failure**: If the text is not present in the element’s value.


    **Exception Raised**: Typically results in a `TimeoutException` if the text isn’t
    found within the element’s value in the specified time. There’s no specific exception
    for the text not being present other than timeout.'
