  trans: "\n*   **最佳实践：** 将复杂的断言分解为多个简单的断言，每个断言验证页面状态或行为的特定方面。这有助于在测试失败时更轻松地定位问题。\n\
    \n使用有意义的错误消息\n\n当断言失败时，有意义的错误消息能提供宝贵的见解。通用或模糊的消息会使问题诊断变得困难。\n\n*   **最佳实践：** 编写能清晰描述错误原因的错误消息。包含关于预期条件和应用程序实际状态的信息，以辅助调试。\n\
    \n在测试用例中组织断言\n\n在测试用例中恰当地组织断言能增强可读性和可维护性。混乱或分散的断言可能导致混淆。\n\n*   **最佳实践：** 将相关的断言分组，放在测试用例中结构良好的方法或部分中。使用注释或清晰的命名约定来表明每组断言的目的。\n\
    \n遵循这些最佳实践可确保您的断言有效、清晰且易于管理。这反过来又帮助您创建可靠且可维护的 Selenium 测试脚本，从而准确地验证 Web 应用程序的功能。\n\
    \n总结\n本章将您进一步带入 Selenium 断言的领域，探讨了它们在 Web 测试自动化中的重要性。您从理解断言以及它们为何是 Selenium 框架中不可或缺的工具开始。本章考察了硬断言和软断言在验证测试结果中的作用。\n\
    在继续探索的过程中，您深入了解了 Selenium 提供的一系列全面的断言方法，包括 `assertEqual` 和 `assertTrue`，这些方法为您提供了强大的工具，用于比较和验证预期结果与实际结果。\n\
    您还学习了如何处理断言失败，深入了解了断言失败时会发生什么，并掌握了优雅错误管理的技巧。您强调了全面的日志记录和报告对于故障排除和分析的重要性。\n自定义断言成为焦点，您学习了如何创建定制的断言方法来满足应用程序的特定需求。您还探索了如何扩展断言功能以有效适应独特的测试需求。\n\
    为了确保基于断言的测试健壮且可持续，您深入探讨了常见的陷阱、错误以及防止误报和漏报的策略。您还讨论了使用断言的最佳实践，包括何时以及如何使用它们、编写清晰且有意义的错误消息，以及在测试用例中组织断言。\n\
    通过本章的学习，您已掌握了在 Selenium 测试自动化工作中充分利用断言潜力的知识和技术，从而实现更准确、高效且信息量更丰富的测试流程。\n\n9. 异常\n\
    \n在使用 Selenium WebDriver 进行 Web 自动化的快速变化环境中，即使是最有经验的测试专业人员也会遇到不熟悉的情况。随着 Web 元素或其性质的不断变化、间歇性的网络问题以及网站和\
    \ Web 应用程序中特定于浏览器的怪癖，会导致许多不可预测的测试场景。然而，为了应对实时环境不可预测性的大多数情况，细致的脚本编写和充分的准备需要对异常这一基本概念有更深入的理解。\n\
    作为 Selenium 测试专家，识别异常的区别不仅有益，而且是必要的。本章提供了对 Selenium 相关异常迷宫的见解。精通异常可确保您的自动化脚本不仅功能正常，而且具有适应性、弹性和健壮性，将潜在的障碍转化为通往全面\
    \ Web 测试道路上的垫脚石。\n\nSelenium 中的异常是什么？\n在任何编程语言中，异常是在程序执行期间发生的事件，它会中断程序的正常流程。异常主要表示程序在执行过程中遇到的错误条件或意外行为。就\
    \ Selenium 而言，异常主要用于表示在定位或与 Web 元素交互、浏览器通信或执行自动化命令时遇到的挑战。\n例如，当您想要定位一个在网页上不可用的\
    \ Web 元素时，Selenium WebDriver 会抛出 `NoSuchElementException` 错误。此异常有助于您理解、排查并可能修复自动化脚本中的错误，因为它提供了有关所遇问题性质的具体信息。\n\
    接下来，让我们讨论 Selenium 中的各种异常，每个异常都代表了测试自动化期间引发的独特问题或挑战。为了开发健壮且可靠的 Selenium 测试脚本，您将学习如何处理这些异常，确保测试执行更准确、更流畅。\n\
    \n异常类型\n本节讨论在自动化测试执行期间遇到的各种异常。这些异常被分为不同的类别，以简化其发生原因的排查。\n\nSelenium 中的常见异常\n在不同的测试场景中会发生各种异常。很难将它们全部列出，但让我们回顾一下最常发生的常见情况。这些异常已根据其在测试场景中的发生情况进行分类。\n\
    \n连接异常\n当与 WebDriver 或浏览器的通信过程发生意外中断或阻塞时，您会遇到以下异常。\n\n*   **ConnectionClosedException**\n\
    \    在尝试与 WebDriver 交互但连接已关闭时抛出。\n\n```\nWebDriver driver = new ChromeDriver();\n\
    driver.close();\ndriver.getTitle();  // 这将抛出 ConnectionClosedException。\n```\n\
    \n元素交互异常\n当尝试访问或与网页上相应的 Web 元素交互时，会发生这些异常。\n\n*   **ElementClickInterceptedException**\n\
    \    在点击操作时目标元素被隐藏或不可用时抛出。\n\n*   **ElementNotInteractableException**\n    当 Web\
    \ 元素不可交互，但尝试进行交互时抛出。\n\n```\nWebDriver driver = new ChromeDriver();\ndriver.get(\"\
    http://example.com\");\ndriver.findElement(By.id(\"overlayedButton\")).click();\
    \ // 这将抛出 ElementClickInterceptedException。\n```\n\n*   **ElementNotSelectableException**\n\
    \    当 Web 元素不可选择，而您尝试选择它时发生。主要发生在与按钮、复选框等交互时。当必须执行某些操作导致选择按钮时，也可能发生此异常。\n\n```\n\
    driver.findElement(By.id(\"nonInteractableElement\")).sendKeys(\"Test\"); // 这将抛出\
    \ ElementNotInteractableException。\n```\n\n```\ndriver.findElement(By.xpath(\"\
    //unselectableOption\")).click(); // 这将抛出 ElementNotSelectableException。\n```\n\
    \n基于状态的异常\n这些异常与测试执行期间 Web 元素或网页的状态相对应。\n\n*   **ElementNotVisibleException**\n\
    \    当元素存在于网页上但不可见以执行操作时发生；在这种情况下会引发此异常。可以使用等待条件或必要的操作使元素可见来解决。\n\n*   **InvalidElementStateException**\n\
    \    当元素被禁用或未处于可执行指定操作的状态时发生。在这种情况下会引发此异常。您可以以表单提交按钮或日历中的日期选择为例，在点击之前需要提供所需信息。\n\
    \n```\ndriver.findElement(By.id(\"hiddenElement\")).click(); // 这将抛出 ElementNotVisibleException。\n\
    ```\n"
- fmt: '# Selenium WebDriver 异常分类与处理


    ## StaleElementReferenceException


    `StaleElementReferenceException` 发生在 Web 元素在 DOM 中不再可用时，因为它已被删除或不再处于稳定状态。这是由 Web
    元素的动态特性引起的常见异常之一。可以通过使用 XPath 定位 Web 元素来处理此异常。


    ```java

    driver.findElement(By.id("disabledInput")).sendKeys("Test"); // 这将抛出 InvalidElementStateException

    ```


    ```java

    WebElement oldElement = driver.findElement(By.id("oldElement"));

    // DOM 发生变化

    oldElement.click(); // 这将抛出 StaleElementReferenceException

    ```


    ## 超时与延迟异常


    当您使用等待函数定位或对 Web 元素执行操作时，会遇到这些异常。


    ### TimeoutException


    `TimeoutException` 发生在操作未在指定时间范围内完成时。时间值应设置为标准值，以避免测试脚本执行进一步延迟。


    ```java

    WebDriverWait wait = new WebDriverWait(driver, 5);

    wait.until(ExpectedConditions.visibilityOfElementLocated(By.id("delayedElement")));
    // 这可能会抛出 TimeoutException

    ```


    ## 导航问题


    这些异常在页面之间导航或上下文切换期间引发。


    ### NoSuchWindowException


    `NoSuchWindowException` 发生在您执行切换到不同窗口或移动窗口位置等操作，但浏览器位置不正确或窗口不可用时。Selenium WebDriver
    会抛出此异常。


    ### NoAlertPresentException


    `NoAlertPresentException` 发生在警告弹窗（如警告框、提示框和确认框）不可用而您尝试访问时。这些警告弹窗是 JavaScript 启用的。有时，警告需要更多时间加载，JavaScript
    在浏览器端被阻止，或者弹窗不可用或已关闭。


    ```java

    driver.switchTo().window("nonExistentWindowHandle"); // 这将抛出 NoSuchWindowException

    ```


    ```java

    driver.switchTo().alert(); // 如果没有警告，这将抛出 NoAlertPresentException

    ```


    ## 选择器与搜索问题


    当未找到网页上指定的 Web 元素时，您可能会看到以下任何异常。


    ### NoSuchElementException


    `NoSuchElementException` 是从网页定位 Web 元素时最常见的异常之一。当指定的 Web 元素不在网页上时发生。此异常可能由以下原因引起：指定的
    Web 元素不正确，或与页面上的可用元素不匹配。


    Web 定位器需要更多时间加载，因此在定位时不可用。


    - 如第 [4](#608985_1_En_4_Chapter.xhtml) 章所述，您可以使用不同的定位器方法定位 Web 元素，并指定等待时间，这些内容在第
    [10](#608985_1_En_10_Chapter.xhtml) 章中介绍。


    ### InvalidSelectorException


    `InvalidSelectorException` 与 `NoSuchElementException` 类似。这里指定的选择器无效或动态更改。


    ```java

    driver.findElement(By.id("nonExistentElement")); // 这将抛出 NoSuchElementException

    ```


    ### NoSuchFrameException


    `NoSuchFrameException` 是因为定义的框架在网页上未找到。


    ```java

    driver.findElement(By.xpath("///invalidXPath")); // 这将抛出 InvalidSelectorException

    ```


    ```java

    driver.switchTo().frame("nonExistentFrame"); // 这将抛出 NoSuchFrameException

    ```


    ## JavaScript 执行异常


    此异常在执行与网页关联的 JavaScript 代码时发生。


    ```java

    ((JavascriptExecutor) driver).executeScript("invalidJavaScript()"); // 这将抛出 JavascriptException

    ```


    ## 会话异常


    当会话过期或无效时，Selenium WebDriver 会抛出 `InvalidSessionIdException`。


    ```java

    driver.get("http://example.com");

    // 假设会话在此处因某种原因终止

    driver.getTitle(); // 这将抛出 InvalidSessionIdException

    ```


    ## 驱动程序配置与能力异常


    当 WebDriver 与目标 Web 浏览器之间存在配置错误或不支持的功能时，会引发此异常。它是 Selenium WebDriver 异常的基类，所有其他异常都包含在此类下。


    ```java

    driver.get("httt://invalidUrl"); // 由于 URL 格式无效，这可能会抛出 WebDriverException

    ```


    ## 输入与参数异常


    这些异常与您指定给 WebDriver 的输入数据或参数有关，包括以下内容。


    ### InvalidArgumentException


    `InvalidArgumentException` 发生在您传递了不正确的参数时。


    ```java

    driver.manage().timeouts().implicitlyWait(-5, TimeUnit.SECONDS); // 由于负时间，这将抛出
    InvalidArgumentException

    ```


    ## 警告与弹窗异常


    此异常与弹窗或警告有关。在测试执行期间，出现意外的弹窗，然后抛出 `UnexpectedAlertPresentException`。


    ```java

    driver.get("http://example.com");

    // 假设此处出现意外警告

    driver.findElement(By.id("someElement")).click(); // 如果未处理，这将抛出 UnexpectedAlertPresentException

    ```


    ## 截图异常


    当您向 Selenium WebDriver 提供截图指令但无法获取截图时，会发生此异常。


    ```java

    ((TakesScreenshot)driver).getScreenshotAs(OutputType.FILE); // 如果截图捕获失败，这可能会抛出
    ScreenshotException

    ```


    ## 移动与操作异常


    此异常与鼠标移动操作有关。当鼠标试图移出边界时，会遇到 `MoveTargetOutOfBoundsException`。


    ```java

    Actions actions = new Actions(driver);

    actions.moveToElement(someElement, -1, -1).perform(); // 这将抛出 MoveTargetOutOfBoundsException

    ```


    ## 浏览器能力与支持异常


    以下是与不支持的功能或浏览器能力相关的异常。


    ### InsecureCertificateException


    `InsecureCertificateException` 发生在您导航的站点具有不安全的证书时。属于 TLS（传输层安全）的证书可能无效或已过期。


    ### ImeNotAvailableException


    `ImeNotAvailableException` 发生在不支持 IME 时，通常是由于缺少操作系统级别的库或组件。


    ```java

    driver.get("https://insecure-certificate-website.com"); // 这可能会抛出 InsecureCertificateException

    ```


    ### ImeActivationFailedException


    `ImeActivationFailedException` 发生在输入法引擎（IME）激活失败时。它通常与日语、中文或多字节字符有关，这些字符由 Selenium
    WebDriver 作为输入提供。此类输入框架的一个示例是 IBus，它支持像 Anthy 这样的日语引擎。


    ```java

    driver.manage().ime().activateEngine("IME_ENGINE"); // 如果 IME 支持不可用，这将抛出 ImeNotAvailableException

    ```


    ```java

    driver.manage().ime().activateEngine("Invalid_IME_ENGINE"); // 这将抛出 ImeActivationFailedException

    ```


    ## 属性与特性异常


    当您尝试检索元素的属性或特性但这些属性不可用时，会显示此异常。可以通过了解元素是否包含您正在测试的属性来避免此异常。您还可以通过更新 DOM 中更改的值来处理此异常。


    ```java

    String attributeVal = driver.findElement(By.id("elementWithoutAttribute")).getAttribute("nonExistentAttribute");
    // 这可能会抛出 NoSuchAttributeException

    ```


    ## Cookie 处理异常


    您列出了在测试用例中初始化或处理 Cookie 时引发的一些异常。


    ### InvalidCookieDomainException


    `InvalidCookieDomainException` 在您尝试为当前 URL 以外的其他域添加 Cookie 时被调用。


    ### UnableToSetCookieException


    `UnableToSetCookieException` 发生在 Selenium WebDriver 无法设置新 Cookie 时。您在测试期间会遇到此异常。'
