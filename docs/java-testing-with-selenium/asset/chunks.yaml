    \ available.\n```\n\n```\ndriver.manage().ime().activateEngine(\"Invalid_IME_ENGINE\"\
    ); // This will throw ImeActivationFailedException.\n```\n\nAttribute and Property\
    \ Exception\n\nWhen you are trying to retrieve attributes or properties of an\
    \ element\nand these attributes are not available, you are shown this exception.\n\
    The exception can be avoided by knowing whether an element contains the\nattribute\
    \ you are testing. You can also handle this exception by\nupdating the changed\
    \ value from the DOM.\n\n```\nString attributeVal = driver.findElement(By.id(\"\
    elementWithoutAttribute\")).getAttribute(\"nonExistentAttribute\"); // This might\
    \ throw NoSuchAttributeException.\n```\n\nCookie Handling Exception\n\nYou have\
    \ listed some exceptions raised while initiating or handling\ncookies in a test\
    \ case.\n\n*   **InvalidCookieDomainException**\n    is invoked when you try to\
    \ add a cookie for another domain rather than\n    for the present or current\
    \ URL.\n\n*   **UnableToSetCookieException**\n    occurs when Selenium WebDriver\
    \ is unable to set a new cookie. You get\n    this exception during a test."
