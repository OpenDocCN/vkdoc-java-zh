    ### Drag and Drop by Offset


    The drag and drop by offset method is similar to the preceding method. The only
    difference is that you move the source element with offset values (i.e., *x* and
    *y* values rather than defining the target element).


    ```

    import org.openqa.selenium.By;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.WebElement;

    import org.openqa.selenium.Point;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.openqa.selenium.interactions.Actions;

    public class DragAndDropByOffsetExample {

    public static void main(String[] args) {

    WebDriver driver = new ChromeDriver();

    // Open the web page with the drag and drop elements

    driver.get("URL_of_your_drag_and_drop_page");

    // Locate the elements to be dragged and the target

    WebElement sourceElement = driver.findElement(By.id("drag"));

    WebElement targetElement = driver.findElement(By.id("drop"));

    // Get the location of source and target elements

    Point sourceLocation = sourceElement.getLocation();

    Point targetLocation = targetElement.getLocation();

    // Calculate offset (consider the size of the element if needed)

    int xOffset = targetLocation.getX() - sourceLocation.getX();

    int yOffset = targetLocation.getY() - sourceLocation.getY();

    // Create an instance of Actions class

    Actions actions = new Actions(driver);

    // Perform drag and drop by calculated offset

    actions.dragAndDropBy(sourceElement, xOffset, yOffset).perform();

    // Close the browser

    driver.quit();

    }

    }

    ```


    This code calculates the offset values based on the positions of the source and
    target elements and then executes the drag-and-drop action for the HTML created.
    The next section looks at keyboard actions.


    ## Keyboard Actions


    In Selenium WebDriver, keyboard actions automate key press and release. It can
    be a combination of one or more such key events where the web application’s functionality
    is tested. Let’s discuss various keyboard actions used to interact with web applications.


    ### Keys


    The keys are provided with a set of constant values in the form of Unicode representing
    special and non-printable keys on the keyboard. These constant values allow you
    to automate key presses. The keys with their Unicode’s are given in Table [3-1](#608985_1_En_3_Chapter.xhtml#Tab1).


    **Table 3-1** Basic and Unicode Keys


    | Basic Keys | Unicode | Basic Keys | Unicode |

    | --- | --- | --- | --- |

    | `NULL` | `\uE000` | `ENTER` | `\uE007` |

    | `CANCEL` | `\uE001` | `Shift` | `\uE008` |

    | `HELP` | `\uE002` | `CONTROL` | `\uE009` |

    | `BACK_SPACE` | `\uE003` | `LEFT` | `\uE012` |

    | `TAB` | `\uE004` | `UP` | `\uE013` |

    | `CLEAR` | `\uE005` | `RIGHT` | `\uE014` |

    | `RETURN` | `\uE006` | `DOWN` | `\uE015` |'
