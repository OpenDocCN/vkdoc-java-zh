- fmt: '# TestNG Assertions in Selenium


    ## Basic Assertion Methods


    - The assertion will fail in this example because the expected and actual integers
    are equal.


    - `assertTrue(condition)`: It is used to verify that a given condition or expression
    evaluates to `true`. Commonly used to verify elements displayed on the page or
    if certain conditions are met in the application state.


    ```java

    import org.testng.Assert;

    public class AssertNotEqualsExample {

    public static void main(String[] args) {

    int expected = 10;

    int actual = 10;

    // Assert that the expected and actual integers are not equal

    Assert.assertNotEquals(expected, actual);

    System.out.println("Test completed.");

    }

    }

    ```


    - In this example, the assertion will fail because the condition is `false`.


    - `assertFalse(condition)`: This method is used to verify that a given condition
    or expression evaluates to `false`. It is instrumental in asserting boolean conditions,
    such as the visibility of web elements.


    ```java

    import org.testng.Assert;

    public class AssertTrueExample {

    public static void main(String[] args) {

    boolean condition = false;

    // Assert that the condition is true

    Assert.assertTrue(condition);

    System.out.println("Test completed.");

    }

    }

    ```


    - In your example, the assertion will fail because the condition is `true`.


    - `assertNull(object)`: The value or object is used to verify is `null`. If the
    value is not `null` then it throws an error.


    ```java

    import org.testng.Assert;

    public class AssertFalseExample {

    public static void main(String[] args) {

    boolean condition = true;

    // Assert that the condition is false

    Assert.assertFalse(condition);

    System.out.println("Test completed.");

    }

    }

    ```


    - The assertion will fail in this example because the object is not `null`.


    - `assertNotNull(object)`: This method is contrary to the `assertNull()` function
    wherein, the value or object is used to verify whether it is `null`. If it''s
    `null`, then it throws an `AssertionError`.


    ```java

    import org.testng.Assert;

    public class AssertNotNullExample {

    public static void main(String[] args) {

    Object object = null;

    // Assert that the object is not null

    Assert.assertNotNull(object);

    System.out.println("Test completed.");

    }

    }

    ```


    - In this example, the assertion will fail because the object is `null`.


    ```java

    import org.testng.Assert;

    public class AssertNullExample {

    public static void main(String[] args) {

    Object object = new Object();

    // Assert that the object is null

    Assert.assertNull(object);

    System.out.println("Test completed.");

    }

    }

    ```


    These assert methods are essential for verifying expected conditions in your Selenium
    test scripts and help ensure the correctness of your web application''s behavior.


    ## Handling Assertion Failures


    Handling assertion failures is an important aspect of Selenium test automation.
    When an assertion fails, the expected condition or value did not match the actual
    condition or value, and you need to handle this gracefully. Properly handling
    assertion failures ensures that you can capture information about the failure,
    log it, and report it effectively. Let''s explore this.


    ### What Happens When an Assertion Fails?


    When an assertion fails in Selenium, an `AssertionError` exception is thrown.
    This exception interrupts the normal flow of your test script, and the test is
    marked as failed. If you don''t handle assertion failures, your test execution
    may stop abruptly. The following describes what happens when an assertion fails.


    - The test execution is interrupted.

    - An `AssertionError` exception is thrown by the assertion library (e.g., TestNG,
    JUnit).

    - The test is marked as failed.

    - Any subsequent test steps or code after the failed assertion are not executed
    within the current test case.


    ### Handling Assertion Failures Gracefully


    Handling assertion failures gracefully is essential to ensure that your test automation
    can continue running and provide valuable insights. The following describe ways
    to handle assertion failures gracefully.


    - **Using try-catch:** You can use `try-catch` blocks to capture and handle assertion
    failures. Within the `catch` block, you can define your custom error-handling
    logic, such as logging the failure, taking screenshots, or performing other recovery
    actions.

    - **Recovery actions:** Depending on the nature of the failure, you can take recovery
    actions. For example, you might want to refresh the page, navigate to a different
    URL, or close and reopen the browser.


    ### Logging and Reporting Assertion Failures


    You can integrate logging and reporting functionality to improve the handling
    of assertion failures.


    - **Logging:** You can log assertion failures using standard libraries like Log4j
    or print error messages to the console. The logs should include details about
    which test case failed, what assertion failed, and why.

    - **Reporting:** Reporting frameworks help organize and present test results.
    They can capture assertion failures and generate detailed reports with test case
    names, failure descriptions, timestamps, and screenshots. This makes it easier
    to analyze test results and track issues.


    ## Custom Assertions


    Creating custom assertion methods in Selenium allows you to tailor your assertions
    to specific application requirements and extend the functionality of built-in
    assertion libraries. This can be valuable when performing complex or domain-specific
    checks in your automated tests. Let''s explore custom assertions.


    ### Creating Custom Assertion Methods for Specific Application Requirements


    Custom assertion methods are user-defined assertion checks that go beyond the
    standard assertion methods provided by testing frameworks like TestNG or JUnit.
    The following explains how to create custom assertions for specific application
    requirements.


    1. **Identify a specific requirement.** Begin by identifying a unique or complex
    condition for which your application demands validation. This could involve the
    behavior of a custom UI component, data verification, or specific business logic.

    2. **Write the custom assertion method.** Create a new method that encapsulates
    the logic for validating the identified requirement. This method should return
    a Boolean value to indicate whether the condition is met.

    3. **Use the custom assertion in tests.** Seamlessly incorporate your custom assertion
    method into your test scripts wherever necessary. It can be utilized like any
    other assertion method your testing framework provides.

    4. **Handle assertion failures.** Take care of assertion failures within your
    custom assertion method. This can involve throwing a custom exception, logging
    detailed information about the failure, or executing recovery actions tailored
    to your application.


    ### Example: Custom Assertion for Checking Data Validity


    Suppose you have a specific requirement to verify if a user''s age falls within
    a predefined range. The following is a custom assertion method.


    ```java

    public class CustomAssertions {

    public static boolean isAgeInRange(int age, int minAge, int maxAge) {

    return age >= minAge && age <= maxAge;

    }

    }

    ```


    In your test script, you can utilize this custom assertion as follows.


    ```java

    import org.testng.Assert;

    public class TestExample {

    public static void main(String[] args) {

    int userAge = 30;

    int minValidAge = 18;

    int maxValidAge = 60;

    boolean isAgeValid = CustomAssertions.isAgeInRange(userAge, minValidAge, maxValidAge);

    Assert.assertTrue(isAgeValid, "User''s age is not within the valid range.");

    }

    }

    ```


    ### Extending Assertion Functionality


    Extending assertion functionality allows you to enhance the built-in assertion
    methods provided by your testing framework to cater to additional checks or customize
    reporting. The following explains how to extend assertion functionality.'
