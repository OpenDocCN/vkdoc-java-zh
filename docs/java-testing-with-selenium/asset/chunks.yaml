    )); // This will throw NoSuchElementException.\n```\n\n*   **NoSuchFrameException**\n\
    \    is because the defined frame is not found on the web page.\n\n```\ndriver.findElement(By.xpath(\"\
    ///invalidXPath\")); // This will throw InvalidSelectorException.\n```\n\n```\n\
    driver.switchTo().frame(\"nonExistentFrame\"); // This will throw NoSuchFrameException.\n\
    ```\n\nJavaScript Execution Exceptions\n\nThis exception occurs when executing\
    \ JavaScript code associated with the\nweb page.\n\n```\n((JavascriptExecutor)\
    \ driver).executeScript(\"invalidJavaScript()\"); // This will throw JavascriptException.\n\
    ```\n\nSession Exceptions\n\nWhen a session expires or is invalid, Selenium WebDriver\
    \ gives you InvalidSessionIdException.\n\n```\ndriver.get(\"http://example.com\"\
    );\n// Suppose session terminates here for some reason\ndriver.getTitle(); //\
    \ This will throw InvalidSessionIdException.\n```\n\nDriver Configuration and\
    \ Capability Exceptions\n\nThis exception is raised when there is misconfiguration\
