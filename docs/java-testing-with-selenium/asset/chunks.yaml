    **Java 语法**


    ```

    WebElement element = driver.findElement(By.xpath("//tag[@attr=''value1'' or @attr=''value2'']"));

    ```


    此语法选择满足提供的任一条件的元素。`or` 运算符通过接受匹配任一条件的元素来扩大选择范围。

