  trans: "\n在此示例中，`FluentWait` 被设置为最多等待 30 秒让元素出现，每 5 秒检查一次。它会忽略 `NoSuchElementException`（当页面未找到元素时由\
    \ `driver.findElement()` 抛出）。如果超时，自定义消息会包含在抛出的异常中。当处理加载时间变化很大的元素，或处理包含大量动态内容的页面时，这种方法非常有用。通过使用流畅等待，你可以创建高度自定义的等待策略，以适应应用程序的特定需求。\n\
    \n流畅等待的关键特性\n\n*   **可自定义的轮询频率**：你可以定义检查条件的频率。这在元素需要时间加载的场景下，有助于减少检查次数。\n\n* \
    \  **超时时间**：你可以设置等待条件的最大时间。\n\n*   **忽略异常**：你可以指定在轮询条件时发生的一个或多个要忽略的异常。\n\n*  \
    \ **自定义消息**：你可以提供自定义的超时消息，这有助于调试。\n\n选择合适的等待方式\n在隐式等待、显式等待和流畅等待之间进行选择，取决于 Web\
    \ 元素的具体要求、复杂性及其在测试环境中的行为。让我们讨论每种等待方式的工作原理、用法、设置、行为以及局限性，以帮助根据需求选择最佳方案。\n\n隐式等待\n\
    \n*   **工作原理**：隐式等待告诉 WebDriver，如果在指定时间内未找到元素，则在抛出 `NoSuchElementException` 之前等待一段时间。此等待在\
    \ WebDriver 实例的整个生命周期内全局设置，并应用于所有元素查找。\n\n*   **使用时机**：当你有一个相对较小、固定的延迟，可以应用于测试脚本中的所有元素查找时使用。\n\
    \n*   **设置方法**：它在 WebDriver 对象的整个生命周期内设置。一旦设置，它将应用于所有 `findElement` 和 `findElements`\
    \ 调用。\n\n*   **行为**：驱动程序会定期轮询 DOM，直到找到元素或达到超时时间。\n\n*   **局限性**：它不能用于更复杂的条件。此外，如果设置时间过长，可能会导致测试执行出现不必要的延迟。\n\
    \n*   **代码示例**\n\n```\n    driver.manage().timeouts().implicitlyWait(10, TimeUnit.SECONDS);\n\
    \    ```\n\n显式等待\n\n*   **工作原理**：显式等待指示 WebDriver 等待特定条件（预期条件）满足，或等待超过最大时间后抛出\
    \ `ElementNotVisibleException`。显式等待特定于某个元素及其条件。\n\n*   **使用时机**：当你需要等待特定元素满足特定条件时使用，例如等待元素变为可点击、可见或具有特定文本。\n\
    \n*   **设置方法**：它在每个需要它的特定实例中设置。你可以定义 `WebDriverWait` 以及特定条件。\n\n*   **行为**：驱动程序在继续之前等待指定的条件。如果在超时时间内条件未满足，则会抛出\
    \ `TimeoutException`。\n\n*   **局限性**：与隐式等待相比，它需要更多的样板代码，并且需要为每个特定条件和元素实现。\n\n\
    *   **代码示例**\n\n```\n    WebDriverWait wait = new WebDriverWait(driver, 10);\n\
    \    WebElement element = wait.until(ExpectedConditions.visibilityOfElementLocated(By.id(\"\
    someId\")));\n    ```\n\n流畅等待\n\n*   **工作原理**：流畅等待允许对等待条件进行更复杂的配置。你可以设置等待条件的最大时间、检查条件的频率，以及在等待期间忽略某些类型的异常。\n\
    \n*   **使用时机**：它非常适合更复杂的场景，例如你需要自定义轮询频率或在等待期间忽略特定类型的异常（例如，等待 Ajax 元素）。\n\n*  \
    \ **设置方法**：你可以通过创建 FluentWait 实例、设置超时时间、轮询频率和要忽略的异常来配置流畅等待。\n\n*   **行为**：流畅等待以指定的轮询间隔检查条件，并持续进行，直到条件满足或超时到期。它在轮询过程中会忽略指定的异常。\n\
    \n*   **局限性**：与显式等待相比，它的设置和配置更复杂。对于标准 ExpectedConditions 就足够的简单条件，可能显得大材小用。\n\n\
    *   **代码示例**\n\n```\n    FluentWait wait = new FluentWait(driver)\n    .withTimeout(Duration.ofSeconds(30))\n\
    \    .pollingEvery(Duration.ofSeconds(5))\n    .ignoring(NoSuchElementException.class);\n\
    \    WebElement element = wait.until(new Function() {\n    public WebElement apply(WebDriver\
    \ driver) {\n    return driver.findElement(By.id(\"someId\"));\n    }\n    });\n\
    \    ```\n\n隐式等待、显式等待和流畅等待的对比分析\n\n表 10-1 总结了 Selenium 中的隐式等待、显式等待和流畅等待。\n\n表\
    \ 10-1\n*等待方式对比*\n\n| 标准 | 隐式等待 | 显式等待 | 流畅等待 |\n| --- | --- | --- | --- |\n|\
    \ **应用范围** | 全局应用于所有 Web 元素 | 特定于特定元素或条件 | 特定，具有可自定义的轮询和超时设置 |\n| **等待条件** | 等待元素出现在\
    \ DOM 中 | 等待特定条件（如可见性、可点击性） | 等待自定义条件，具有灵活的检查间隔 |\n| **灵活性** | 灵活性较低；所有元素等待时间相同\
    \ | 更灵活；不同元素可设置不同条件 | 最灵活；可自定义等待条件、间隔和超时 |\n| **条件检查频率** | 无法控制频率 | 频率由 ExpectedConditions\
    \ 固定定义 | 可自定义条件检查的频率 |\n| **异常处理** | 无特定异常处理机制 | 可以处理某些异常（如 `NoSuchElementException`）\
    \ | 允许在等待期间进行详细的异常处理 |\n| **超时配置** | 在 WebDriver 生命周期内固定超时 | 每个条件固定超时 | 可自定义最大超时时间和轮询频率\
    \ |\n| **复杂度** | 实现和使用简单 | 比隐式等待更复杂，但通常直接明了 | 最复杂，提供对等待条件的精细控制 |\n| **使用场景** |\
    \ 适用于元素加载时间相似的简单静态页面 | 适用于需要特定条件的动态内容 | 最适合高度动态和不可预测的 Web 元素 |\n\n此表突出了关键差异，以帮助你在\
    \ Selenium 测试场景中做出关于使用哪种等待方式的选择。\n\n在 Selenium 测试自动化中使用等待的最佳实践\n\n有效使用等待是 Selenium\
    \ 测试自动化的关键方面，因为它能确保测试的可靠性和健壮性。以下是一些在 Selenium 中使用等待的最佳实践。\n\n*   **优先使用显式等待而非隐式等待。**\
    \ 使用显式等待（WebDriverWait 配合 ExpectedConditions），因为它们对于复杂条件更可靠。它们允许你等待特定元素上的特定条件。\n\
    \n*   **避免使用固定休眠（Thread.sleep()）。** 固定休眠（Thread.sleep()）会导致测试等待预定的时间量，这可能效率低下并导致更长的测试执行时间。它们不考虑元素的实际状态。\n"
- fmt: '*   **Be mindful of timeout settings.** Set realistic timeouts considering
    the network speed, application response time, and overall performance. Avoid setting
    overly long timeouts as they can make your test suite slow.


    *   **Use a fluent wait for more complex conditions.** When dealing with elements
    with highly unpredictable load times, use a fluent wait. It allows customization
    of polling frequency and can ignore specific types of exceptions, making tests
    more resilient.


    *   **Minimize the use of implicit waits.** Implicit waits are set globally and
    apply to all element searches. While they are easy to use, they can cause unintended
    delays. Use them sparingly and only when you have a consistently small delay applicable
    to all element searches.


    *   **Combine waits wisely.** Be cautious when combining different types of waits,
    as they can lead to unpredictable wait times or even timeouts. Understand how
    different waits work together in your specific context.


    *   **Wait for page load and Ajax calls to complete.** Ensure that the page is
    fully loaded and any Ajax calls are completed before interacting with the elements.
    This can be achieved through custom `ExpectedConditions` or JavaScript execution.


    *   **Use waits for test scalability and maintainability.** Implementing proper
    waits makes tests more scalable and maintainable because it reduces flakiness
    caused by timing issues.


    *   **Create custom wait conditions when necessary.** Sometimes, the built-in
    `ExpectedConditions` might not fit your needs. In such cases, create custom wait
    conditions to handle unique scenarios specific to your application.


    *   **Regularly review and adjust wait strategies.** As your application evolves,
    so should your wait strategies. Regularly review and adjust them to suit the current
    behavior of the application.


    *   **Document your wait strategy.** To ensure that your approach to waits is
    well-documented. This helps in maintaining consistency across the test suite and
    makes it easier for new team members to understand the approach.


    By following these best practices, you can create Selenium tests that are not
    only accurate in terms of functionality testing but also efficient and reliable
    in their execution.


    ## Summary


    This chapter delved into the importance of correctly handling element synchronization
    in web applications. The chapter introduced and thoroughly explored the three
    primary types of waits in Selenium—implicit, explicit, and fluent—each catering
    to different scenarios in test automation. An implicit wait, a global setting,
    is simple but less flexible, suitable for uniform wait conditions across all element
    searches. An explicit wait, in contrast, offers more precision, allowing waits
    for specific conditions on particular elements, making it ideal for more complex
    synchronization needs. The most advanced, the fluent wait, provides the highest
    level of control, including customizable polling intervals and exception handling,
    perfect for handling highly dynamic content and Ajax elements.


    This chapter emphasized best practices, such as preferring explicit over implicit
    waits for greater accuracy, avoiding fixed sleeps for efficiency, and setting
    appropriate timeouts to balance test speed and reliability. The chapter also offered
    practical implementation guidance with code examples, equipping readers with the
    knowledge to choose and apply the appropriate wait type effectively. This comprehensive
    overview aimed to empower readers with the skills necessary to create stable,
    reliable, and efficient automated tests capable of handling the asynchronous and
    unpredictable nature of modern web applications.


    ## 11. Page Object Model (POM)


    This chapter embarks on an in-depth exploration of various test automation strategies
    within the Selenium WebDriver framework. By dissecting the intricacies of each
    approach, this chapter equips technical practitioners with a comprehensive understanding
    of the methodologies that drive effective and efficient automated testing. Let’s
    begin by examining the conventional method of test automation in Selenium. This
    approach, often considered the bedrock of Selenium testing, involves direct interactions
    with web elements through explicit locators and actions. While it serves as a
    fundamental strategy, its scalability and maintainability in complex and evolving
    test environments are subjects for discussion.


    Next, you will explore the Page Object Model (POM), a structural design pattern
    that encapsulates the properties and behaviors of web pages into distinct classes.
    POM promotes a more modular and object-oriented approach to crafting test scripts,
    addressing many challenges associated with the conventional method, particularly
    those related to maintainability and code reuse.


    Building upon the POM framework, the chapter introduces Page Factory, an optimized
    implementation provided by Selenium’s support library. With its annotation-driven
    configuration, Page Factory enhances POM by offering a more streamlined and intuitive
    way to initialize web elements. This section will cover its syntax, usage, practical
    benefits, and limitations within various testing scenarios. Through this exploration,
    you will gain the knowledge to architect robust, scalable, and maintainable automated
    testing solutions.


    ### The Conventional Approach


    Traditionally, automated test scripts have been a mix of element locators (like
    IDs, XPaths), test data, and action commands (like `click`, `input text`) all
    rolled into a single script. This approach, while straightforward, becomes unwieldy
    and fragile as applications grow complex and test suites expand. Consider a simple
    login form in HTML.


    ```

    Login Page

    ```


    In the traditional approach, tests are written directly in the test script. Locators
    and operations on elements are all in the same method. The following is what a
    simple login test might look like.


    ```

    import org.openqa.selenium.By;

    import org.openqa.selenium.WebDriver;

    import org.openqa.selenium.chrome.ChromeDriver;

    import org.junit.Test;

    public class TraditionalLoginTest {

    @Test

    public void testLogin() {

    WebDriver driver = new ChromeDriver();

    driver.get("http://www.example.com/login");

    driver.findElement(By.id("username")).sendKeys("user");

    driver.findElement(By.id("password")).sendKeys("password");

    driver.findElement(By.id("loginButton")).click();

    // Assertions and test logic here

    driver.quit();

    }

    }

    ```


    In this example, the test is doing everything: opening the browser, navigating
    to the page, finding elements, interacting with them, and then closing the browser.


    ### What Is POM?


    The Page Object Model (POM) is a design pattern that encourages a modular and
    maintainable approach to Selenium test scripting. In POM, web pages are represented
    as classes, and elements within those pages are represented as variables on the
    class. Interactions with these elements are encapsulated as methods within the
    class. This abstraction results in a cleaner, more understandable codebase.


    ### Decoding DOM


    The Document Object Model (DOM) represents the structure of a web page as a tree
    of objects. Selenium interacts with this DOM to locate elements and execute actions.
    Understanding the DOM is critical as it underpins both traditional and POM-based
    testing approaches (see Chapter [4](#608985_1_En_4_Chapter.xhtml)). Now, let’s
    delve into the structured world of POM by creating it for the HTML provided.


    ### Create a Page Class


    At first, you need to create a Java class representing the login page. This class
    contains the locators and methods for interactions.'
