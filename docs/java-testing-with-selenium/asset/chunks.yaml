- fmt: '# Best Practices for Assertions


    **Best Practice:** Break down complex assertions into multiple simple assertions,
    each validating a specific aspect of the page’s state or behavior. This makes
    it easier to pinpoint issues when tests fail.


    ## Using Meaningful Error Messages


    Meaningful error messages provide valuable insights when assertions fail. Generic
    or vague messages make it challenging to diagnose issues.


    **Best Practice:** Craft error messages that clearly describe what went wrong.
    Include information about the expected condition and the actual state of the application
    to aid in debugging.


    ## Organizing Assertions within Test Cases


    Proper organization of assertions within test cases enhances readability and maintainability.
    Chaotic or scattered assertions can lead to confusion.


    **Best Practice:** Group related assertions together within well-structured methods
    or sections of your test cases. Use comments or clear naming conventions to indicate
    the purpose of each group of assertions.


    Adhering to these best practices ensures that your assertions are effective, clear,
    and easy to manage. This, in turn, helps you create reliable and maintainable
    Selenium test scripts that accurately validate the functionality of web applications.


    ## Summary


    This chapter took you further into the realm of Selenium assertions, exploring
    their significance in web testing automation. You began by understanding assertions
    and why they are indispensable tools within the Selenium framework. It examined
    hard and soft assertions in validating test outcomes.


    Continuing your exploration, you delved into a comprehensive array of assert methods
    provided by Selenium, including `assertEqual` and `assertTrue`, equipping you
    with powerful tools for comparing and verifying expected outcomes against actual
    results.


    You also addressed handling assertion failures, gaining insights into what transpires
    when assertions fail, and mastering techniques for graceful error management.
    You emphasized the importance of comprehensive logging and reporting for troubleshooting
    and analysis.


    Custom assertions emerged as a focal point as you learned how to create tailored
    assertion methods to meet the specific requirements of your applications. You
    also explored extending assertion functionality to accommodate unique testing
    needs effectively.


    To ensure that your assertion-based tests are robust and sustainable, you delved
    into common pitfalls, mistakes, and strategies to prevent false positives and
    negatives. You also discussed best practices for employing assertions, encompassing
    when and how to use them, crafting clear and meaningful error messages, and organizing
    assertions within test cases.


    Throughout this chapter, you have acquired the knowledge and techniques to harness
    the full potential of assertions in your Selenium test automation efforts, resulting
    in more accurate, efficient, and informative testing processes.


    # 9. Exceptions


    In the rapidly changing environment of web automation with Selenium WebDriver,
    even the most experienced test professionals discover themselves in unfamiliar
    situations. With ever-changing web elements or their nature, intermittent network
    issues and browser-specific quirks in websites and web applications lead you to
    many unpredictable test scenarios. However, meticulous script writing and thorough
    preparation for most situations of the unpredictable nature of live environments
    require a greater understanding of one fundamental concept of exception.


    As a Selenium test expert, recognizing the distinctions of exceptions is not only
    advantageous but also necessary. This chapter offers insights into the labyrinth
    of exceptions pertaining to Selenium. Becoming proficient in exceptions ensures
    that your automation scripts aren’t just functional but adaptive, resilient, and
    robust, transforming potential roadblocks into mere stepping stones on the path
    to comprehensive web testing.


    ## What Is an Exception in Selenium?


    In any programming language, an exception is an event that occurs during the execution
    of a program, disrupting its default flow. Exceptions primarily represent error
    conditions or unexpected behaviors that a program encounters during execution.
    In relation to Selenium, exceptions are majorly used to signify challenges faced
    while locating or interacting with web elements, browser communication, or performing
    commands for automation.


    For example, when you want to locate a web element that is not available on the
    web page, then the Selenium WebDriver raises the `NoSuchElementException` error.
    This exception helps you understand, troubleshoot, and potentially fix the error
    in your automation script because it provides specific information regarding the
    nature of the problem encountered.


    Next, let’s discuss various exceptions in Selenium, each representing a unique
    issue or challenge raised during test automation. To develop robust and reliable
    Selenium test scripts, you learn about handling these exceptions, ensuring smooth
    test execution with more accuracy.


    ## Types of Exceptions


    This section discusses various exceptions encountered during the execution of
    automated tests. The exceptions are divided into different categories to simplify
    the cause of their occurrence.


    ### Common Exceptions in Selenium


    Various exceptions occur during different test scenarios. It is difficult to list
    them all, but let’s go over the most common cases that tend to occur. The exceptions
    have been classified according to their occurrence in test scenarios.


    #### Connection Exception


    When there is unexpected loss or obstruction in the communication process with
    WebDriver or browser you get the following exception.


    - **`ConnectionClosedException`** is raised when attempting to interact with WebDriver,
    but it is closed.


    ```java

    WebDriver driver = new ChromeDriver();

    driver.close();

    driver.getTitle();  // This will throw ConnectionClosedException.

    ```


    #### Element Interaction Exceptions


    These exceptions occur when trying to access or interact with respective web elements
    available on a web page.


    - **`ElementClickInterceptedException`** is raised when the target element is
    hidden or not available at the time of click action.


    - **`ElementNotInteractableException`** is thrown when the web element is not
    interactable, but an interaction attempt is made.


    ```java

    WebDriver driver = new ChromeDriver();

    driver.get("http://example.com");

    driver.findElement(By.id("overlayedButton")).click(); // This will throw ElementClickInterceptedException.

    ```


    - **`ElementNotSelectableException`** occurs when a web element is not selectable,
    and you attempt to do so. Mostly occurs while interacting with buttons, checkboxes,
    and so forth. This exception may also occur when some actions must be carried
    out, which results in selecting the button.


    ```java

    driver.findElement(By.id("nonInteractableElement")).sendKeys("Test"); // This
    will throw ElementNotInteractableException.

    ```


    ```java

    driver.findElement(By.xpath("//unselectableOption")).click(); // This will throw
    ElementNotSelectableException.

    ```


    #### State-based Exceptions


    These exceptions correspond to the state of web elements or web pages during the
    execution of tests.


    - **`ElementNotVisibleException`** occurs when an element is present on a web
    page but not visible to perform actions; this exception is raised in such cases.
    It can be resolved using wait conditions or necessary actions to make the element
    visible.


    - **`InvalidElementStateException`** occurs when an element is disabled or not
    in a state to perform actions specified to it. In such scenarios, the exception
    is raised. You can take the form submission button or date selection in a calendar
    as an example, wherein you need to provide the required information before clicking
    it.


    ```java

    driver.findElement(By.id("hiddenElement")).click(); // This will throw ElementNotVisibleException.

    ```'
