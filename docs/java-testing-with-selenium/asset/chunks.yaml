  trans: "\n设置 TestNG：分步指南\n在 Java 开发环境中设置 TestNG 是一个直接的过程。本指南假设您已安装 Java 和 IDE（Eclipse\
    \ 或 IntelliJ IDEA）。让我们逐步完成 TestNG 的安装和运行。\n\n步骤 1：在 IDE 中安装 TestNG\n\nEclipse\n\
    \n1.  **启动 Eclipse** 并进入您偏好的工作空间。\n\n2.  **安装 TestNG 插件**。\n\n*   转到 **帮助** ➤\
    \ **Eclipse Marketplace**。\n\n*   搜索 **TestNG**。\n\n*   在搜索结果中找到 TestNG 插件，点击安装，并启动安装过程。\n\
    \n3.  **完成安装**。安装完成后，Eclipse 会提示重启以完成集成过程，将 TestNG 嵌入到您的 Eclipse 生态系统中。\n\nIntelliJ\
    \ IDEA\n\n1.  **打开 IntelliJ IDEA** 并进入您的项目工作空间。\n\n2.  **添加 TestNG 插件**。\n\n*\
    \   访问 **文件** ➤ **设置** ➤ **插件**。\n\n*   在 Marketplace 选项卡中，搜索 **TestNG**。\n\n\
    *   点击 TestNG 插件上的安装。\n\n3.  **重启 IntelliJ IDEA**。安装后重启对于插件在 IDE 中完全正常运行至关重要。\n\
    \n步骤 2：创建新的 Java 项目\n\n在 IDE 中安装 TestNG 后，下一步是创建一个新的 Java 项目。\n\n*   在 **Eclipse**\
    \ 中：导航到 **文件** ➤ **新建** ➤ **Java 项目**。\n\n*   在 **IntelliJ IDEA** 中：选择 **文件**\
    \ ➤ **新建** ➤ **项目**，并从可用选项中选择 Java。\n\n步骤 3：将 TestNG 集成到项目中\n\n将 TestNG 添加到项目的方法取决于您是否使用\
    \ Maven。\n\n对于基于 Maven 的项目\n\n1.  **打开 pom.xml 文件**。找到您 Java 项目的这个 Maven 配置文件。\n\
    \n2.  **添加 TestNG 依赖**。将以下依赖插入到您的 `pom.xml` 中。\n\n```\n\norg.testng\n    testng\n\
    \    7.x.x \n    test\n\n```\n\n3.  **更新项目**。保存文件并更新您的 Maven 项目。Maven 会自动下载并将\
    \ TestNG 集成到项目的类路径中。\n\n注意\n\n截至 2023 年 12 月 26 日，TestNG 的最新版本是 7.0.0。\n\n对于非\
    \ Maven 项目\n\n*   **在 Eclipse 中**：右键点击项目 ➤ **属性** ➤ **Java 构建路径** ➤ **库** ➤ **添加库**\
    \ ➤ 选择 **TestNG**。\n\n*   **在 IntelliJ IDEA 中**：导航到 **文件** ➤ **项目结构** ➤ **库**\
    \ ➤ 按 **+** ➤ **从 Maven...**。搜索 **org.testng:testng** 并将其包含到项目中。\n\n注意\n\nApache\
    \ Maven 是一个强大的项目管理和自动化工具，主要用于 Java 项目。它简化了构建过程，管理项目依赖，并通过其项目对象模型（POM）提供统一的构建系统。\n\
    \n步骤 4：确认您的 TestNG 设置\n\n为确保 TestNG 已正确设置并可运行。\n\n1.  **创建一个测试类**。将其命名为类似 **ExampleTest**\
    \ 的名称。\n\n2.  **编写一个简单的测试方法**。\n\n```\n    import org.testng.annotations.Test;\n\
    \    public class ExampleTest {\n    @Test\n    public void simpleTest() {\n \
    \   System.out.println(\"TestNG is perfectly set up!\");\n    }\n    }\n    ```\n\
    \n3.  **执行测试**。从任一 IDE 运行此测试方法。成功执行并在控制台打印“TestNG is perfectly set up!”即确认 TestNG\
    \ 已准备就绪。\n\n您已成功在 IDE 中安装 TestNG 并将其添加到 Java 项目。此设置是使用 TestNG 功能进行高级测试的基础步骤，例如并行运行测试、对测试进行分组以及使用\
    \ TestNG 的断言和注解进行有效测试。\n\nTestNG 注解和属性\n在 TestNG 中，注解是指导测试脚本执行的标志。它们对于定义测试结构、指定测试执行流程和配置测试行为至关重要。让我们深入了解\
    \ TestNG 注解的细节、它们的属性，以及如何在测试脚本中有效使用它们，重点强调其实际应用。\n\n@Test：TestNG 的核心\n\n`@Test`\
    \ 注解用于标识一个方法为 TestNG 测试。它具有多个属性，允许您控制测试方法行为的各个方面。让我们通过示例探索其一些关键属性。\n\n*   **priority**\
    \ 定义测试方法的执行顺序。优先级数字越低，执行越早。\n\n```\n    @Test(priority = 1)\n    public void firstTest()\
    \ {\n    // 此测试将因其较高优先级（较低数字）而首先运行\n    System.out.println(\"First test method\"\
    );\n    }\n    ```\n\n当测试方法的执行顺序很重要时，使用 **priority**。\n\n*   **enabled** 决定测试方法是启用还是禁用。值为\
    \ false 会跳过该测试方法的执行。\n\n```\n    @Test(enabled = false)\n    public void disabledTest()\
    \ {\n    // 此测试将不会被执行\n    System.out.println(\"This test method is disabled.\"\
    );\n    }\n    ```\n\n使用 **enabled** 方法可以在不删除代码的情况下禁用测试方法。\n\n*   **dependsOnMethods**\
    \ 确保某些方法在被注解的测试方法之前运行。如果它所依赖的方法失败，则被注解的方法会被跳过。\n\n```\n    @Test(dependsOnMethods\
    \ = {\"firstTest\"})\n    public void dependentTest() {\n    // 此测试仅在 'firstTest'\
    \ 成功完成后运行\n    System.out.println(\"Runs after firstTest\");\n    }\n    ```\n\
    \n使用 **dependsOnMethods** 函数来管理测试依赖和顺序，尤其是在测试结果相互依赖时。\n\n*   **groups** 将测试方法分配到一个或多个组中。它对于管理和运行整个测试套件的子集非常有用。\n\
    \n```\n    @Test(groups = {\"sanity\"})\n    public void sanityTest() {\n    //\
    \ 属于 'sanity' 测试组的一部分\n    System.out.println(\"Part of sanity tests\");\n   \
    \ }\n    ```\n\n您可以使用 **groups** 对测试进行分类，这在大型项目中非常有用，可以根据功能、模块或测试类型（如冒烟测试、回归测试等）对测试进行分组。\n\
    \n*   **dataProvider** 指定一个为测试方法提供数据的方法，从而实现数据驱动测试。\n\n```\n    @Test(dataProvider\
    \ = \"dataMethod\")\n    public void dataDrivenTest(String input) {\n    // 此测试将使用不同的输入多次运行\n\
    \    System.out.println(\"Data driven test with input: \" + input);\n    }\n \
    \   @DataProvider\n    public Object[][] dataMethod() {\n    return new Object[][]\
    \ {{\"data1\"}, {\"data2\"}};\n    }\n    ```\n\n要使用不同的数据集多次运行测试，请使用 **dataProvider**\
    \ 方法。\n\n*   **expectedExceptions** 指示测试方法预期会抛出异常。如果抛出了指定的异常，则测试通过。\n\n```\n \
    \   @Test(expectedExceptions = ArithmeticException.class)\n    public void exceptionTest()\
    \ {\n    // 此测试预期会抛出 ArithmeticException\n    int i = 1 / 0;\n    }\n    ```\n\
    \n在测试预期会抛出异常的条件时使用此方法。\n\n@Test 与其他注解结合使用\n将 `@Test` 注解与其他 TestNG 注解结合使用，通常用于创建全面且高效的测试工作流。它允许您设置前置条件和后置条件，并管理测试依赖。\n\
    在实际场景中，将 `@Test` 与其他 TestNG 注解结合使用是设置全面测试环境的常见方式。\n\n@BeforeSuite 和 @AfterSuite\n"
- fmt: "# TestNG Annotations\n\nThese annotations specify methods that run before\
    \ and after all tests in a suite. Use them for setup and teardown tasks common\
    \ to all tests, like initializing shared resources or cleaning up after all tests\
    \ are done.\n\n```\n@BeforeSuite\npublic void globalSetup() {\n    // Code for\
    \ global setup\n    System.out.println(\"Global setup before any suite is executed.\"\
    );\n}\n@AfterSuite\npublic void globalTeardown() {\n    // Code for global teardown\n\
    \    System.out.println(\"Global teardown after all suites are executed.\");\n\
    }\n```\n\n## `@BeforeTest` / `@AfterTest`\n\nMethods annotated with these run\
    \ before and after the test methods inside the `<test>` tag in the TestNG XML.\
    \ They’re suitable for preparing and cleaning up conditions common to all tests\
    \ within a particular `<test>` group.\n\n```\n@BeforeTest\npublic void setupTest()\
    \ {\n    // Setup code for a group of tests\n    System.out.println(\"Setting\
    \ up before a group of tests.\");\n}\n@AfterTest\npublic void teardownTest() {\n\
    \    // Teardown code for a group of tests\n    System.out.println(\"Cleaning\
    \ up after a group of tests.\");\n}\n```\n\n## `@BeforeClass` / `@AfterClass`\n\
    \nThese annotations are used to run methods before the first method of the current\
    \ class is invoked and after all the test methods of the current class have been\
    \ run. Ideal for setup and cleanup activities specific to a particular class.\n\
    \n```\n@BeforeClass\npublic void setupClass() {\n    // Code executed before any\
    \ method of the class runs\n    System.out.println(\"Setup actions before any\
    \ test method of this class.\");\n}\n@AfterClass\npublic void teardownClass()\
    \ {\n    // Code executed after all methods of the class have run\n    System.out.println(\"\
    Cleanup actions after all test methods of this class.\");\n}\n```\n\n## `@BeforeMethod`\
    \ / `@AfterMethod`\n\nThe annotate methods are used to run them before and after\
    \ each test method. They’re perfect for preparing and cleaning up the test environment\
    \ for every individual test method.\n\n```\n@BeforeMethod\npublic void setupMethod()\
    \ {\n    // Code to run before each test method\n    System.out.println(\"Running\
    \ before each test method.\");\n}\n@AfterMethod\npublic void teardownMethod()\
    \ {\n    // Code to run after each test method\n    System.out.println(\"Running\
    \ after each test method.\");\n}\n```\n\nUnderstanding TestNG annotations and\
    \ attributes is essential for writing effective and efficient test cases. These\
    \ annotations provide a powerful way to control the flow and behavior of tests,\
    \ enabling you to write more organized and reliable automated tests. With this\
    \ knowledge, you can write your first TestNG program, implementing these annotations\
    \ to create a structured and comprehensive testing framework.\n\n# TestNG Test\
    \ Case with Selenium\n\nLet’s create a TestNG test case using Selenium, which\
    \ demonstrates the usage of various TestNG annotations. This example assumes that\
    \ you have Selenium set up in your Java project along with the TestNG framework.\n\
    \nFirst, let’s consider a simple HTML snippet and then write a TestNG test case\
    \ to interact with and validate elements from this snippet.\n\n## HTML Snippet\
    \ Example\n\nAssuming you have a basic HTML file named `example.html` with the\
    \ following content.\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <title>Test\
    \ Page</title>\n</head>\n<body>\n    <h1>Welcome to the Test Page</h1>\n    <button\
    \ id=\"testButton\">Click Me</button>\n</body>\n</html>\n```\n\nThis HTML features\
    \ a simple button with an ID `testButton`.\n\n## Writing TestNG Test Case\n\n\
    Let’s write a TestNG test case to load this HTML file in a browser, locate the\
    \ button by its ID, and perform an action or validation, ensuring you have Selenium\
    \ WebDriver set up in your project to interact with the web browser.\n\n- **Setting\
    \ up WebDriver**  \n  Set the system property for the Chrome driver and initialize\
    \ it. This opens a Chrome browser window.\n\n- **`@BeforeMethod` - `setUp`** \
    \ \n  This method prepares the testing environment before each test method by\
    \ initializing the `WebDriver`.\n\n- **`@Test` - `testButtonPresence`**  \n  The\
    \ test method loads the local HTML file in the browser using `driver.get(\"file:///path/to/example.html\"\
    )`. Ensure to replace `file:///path/to/example.html` with the actual file path\
    \ on your machine.  \n  Locate the button element using `driver.findElement(By.id(\"\
    testButton\"))`. An assertion is used to check if the button is displayed on the\
    \ page using `Assert.assertTrue`.\n\n- **`@AfterMethod` - `tearDown`**  \n  This\
    \ method is executed after each test method and is responsible for closing the\
    \ browser window and ending the WebDriver session.\n\n```java\nimport org.openqa.selenium.By;\n\
    import org.openqa.selenium.WebDriver;\nimport org.openqa.selenium.WebElement;\n\
    import org.openqa.selenium.chrome.ChromeDriver;\nimport org.testng.Assert;\nimport\
    \ org.testng.annotations.AfterMethod;\nimport org.testng.annotations.BeforeMethod;\n\
    import org.testng.annotations.Test;\n\npublic class ExampleHtmlTest {\n    private\
    \ WebDriver driver;\n\n    @BeforeMethod\n    public void setUp() {\n        System.setProperty(\"\
    webdriver.chrome.driver\", \"path/to/chromedriver\");\n        driver = new ChromeDriver();\n\
    \    }\n\n    @Test\n    public void testButtonPresence() {\n        // Replace\
    \ the path with the absolute path to your example.html\n        driver.get(\"\
    file:///path/to/example.html\");\n        // Locate the button by its ID\n   \
    \     WebElement testButton = driver.findElement(By.id(\"testButton\"));\n   \
    \     // Validate that the button is displayed\n        Assert.assertTrue(testButton.isDisplayed(),\
    \ \"Test button should be displayed\");\n    }\n\n    @AfterMethod\n    public\
    \ void tearDown() {\n        driver.quit();\n    }\n}\n```\n\nFinally, run the\
    \ test by executing as a TestNG test from IDE. Open the specified HTML file in\
    \ Chrome, verify the presence of the button, and then close the browser.\n\nThis\
    \ example demonstrates a basic use case of combining TestNG with Selenium WebDriver\
    \ to perform automated testing on a simple HTML page. Such tests are crucial in\
    \ validating UI elements and their interactions, forming an integral part of web\
    \ application testing. You can expand upon these basics to test more complex scenarios\
    \ and interactions as you progress in the automation domain.\n\n# TestNG Assertions\n\
    \nTestNG provides a set of assertion methods in the `Assert` class, which are\
    \ crucial for verifying the correctness of test conditions. These assertions are\
    \ key in validating the expected and actual results in TestNG tests. Let’s explore\
    \ some commonly used assertions: `assertEquals`, `assertTrue`, `assertFalse`,\
    \ `assertNull`, and `assertNotNull`.\n\n- **`assertEquals`** checks whether two\
    \ values or objects are equal. This method is one of the most commonly used assertions.\n\
    \n```java\n@Test\npublic void testEquality() {\n    String expected = \"TestNG\"\
    ;\n    String actual = \"Test\" + \"NG\";\n    Assert.assertEquals(actual, expected,\
    \ \"Strings are not equal\");\n}\n```\n\nHere, `assertEquals` compares two strings:\
    \ `expected` and `actual`. The test fails if they are not equal, and the provided\
    \ message (\"Strings are not equal\") is displayed.\n\n- **`assertTrue`** verifies\
    \ that a condition is true. It’s useful when you want to assert that a certain\
    \ condition holds.\n\n```java\n@Test\npublic void testCondition() {\n    boolean\
    \ condition = 5 > 3;\n    Assert.assertTrue(condition, \"Condition is not true\"\
    );\n}\n```\n\nIn this case, `assertTrue` checks if the condition (5 > 3) is true.\
    \ If not, the test fails with a \"Condition is not true\" message.\n\n- **`assertFalse`**\
    \ checks that a condition is false. This method is the opposite of `assertTrue`.\n\
    \n```java\n@Test\npublic void testFalseCondition() {\n    boolean condition =\
    \ 3 > 5;\n    Assert.assertFalse(condition, \"Condition is not false\");\n}\n\
    ```\n\nHere, `assertFalse` verifies that the condition (3 > 5) is false. If the\
    \ condition is true, the test fails with a \"Condition is not false\" message.\n\
    \n- **`assertNull`** is asserted when an object is null.\n\n```java\n@Test\npublic\
    \ void testNull() {\n    Object myObject = null;\n    Assert.assertNull(myObject,\
    \ \"Object is not null\");\n}\n```\n\nThis method checks that `myObject` is null.\
    \ If `myObject` is not null, the test fails with an \"Object is not null\" message.\n\
    \n- **`assertNotNull`** is used when you want to check if an object is not null."
