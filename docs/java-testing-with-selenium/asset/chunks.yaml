    \ having its own block of code. The `try` block is the starting block containing\
    \ the code you expect to raise an exception, whereas the `catch` block contains\
    \ the code executed when an exception occurs.\n\nThe following `try-catch` example\
    \ expects an exception raised when an element is not found on a web page.\n\n\
    ```java\ntry {\n    WebElement element = driver.findElement(By.id(\"optionalElement\"\
    ));\n    element.click();\n} catch (NoSuchElementException e) {\n    System.out.println(\"\
    Element not found: \" + e.getMessage());\n}\n```\n\nThe `findElement()` function\
    \ throws `NoSuchElementException` when an element is unavailable on a web page.\
    \ In a `try` block, you define the code to locate the element; in a `catch` block,\
    \ you define a print statement to execute when this exception occurs. This method\
    \ allows the script to run irrespective of the exception that may be encountered.\n\
    \n> **Note**: The code you have written in the `try-catch` block is also called\
    \ *protected code*. It is ideal for optional web elements on a page when their\
    \ unavailability does not result in a test failure.\n\n#### Timeout Exception\
    \ Using `try-catch-finally`\n\nIt is similar to the `try-catch` method; the only\
