  );\n// 假设会话因某种原因在此终止\ndriver.getTitle(); // 这将抛出 InvalidSessionIdException。\n```\n\
  \n驱动程序配置与功能异常\n\n当 WebDriver 与目标 Web 浏览器之间存在配置错误或不支持的功能时，会引发此异常。它是 Selenium WebDriver\
  \ 异常的基类，所有其他异常都包含在此类下。\n\n```\ndriver.get(\"httt://invalidUrl\"); // 由于 URL 格式无效，这可能会抛出\
