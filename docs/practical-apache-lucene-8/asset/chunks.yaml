- fmt: '# Using Spatial Indexing


    Let’s now look at an example of how to use Lucene’s spatial indexing capabilities
    to express spatial data and corresponding queries (the same example present in
    Lucene''s repository).


    We start by creating the index first:


    ```

    final SpatialContext spatialCxt = SpatialContext.GEO;

    final ShapeFactory shapeFactory = spatialCxt.getShapreFactory();

    spatialCxt.getShapeFactory();

    // Define how the spatial tree will be constructed — we will add prefixes to the
    tree using "Coordinates" as the key. The maximum depth of the tree is 5

    // being the tree to be used with level depth 5\. "Coordinates" is the field to
    be used as key.

    final SpatialStrategy coordinatesStrategy = new RecursivePrefixTreeStrategy(new
    GeohashPrefixTree(spatialCxt, 5), "coordinates");

    // Create an index

    Final Directory directory = new RAMDirectory();

    IndexWriterConfig iwConfig = new IndexWriterConfig();

    IndexWriter indexWriter = new IndexWriter(directory, iwConfig);

    ```


    Clearly, we are creating a geohash-based prefix tree on top of the standard `IndexWriter`
    class that we have seen before. This will now allow us to directly index points
    into the prefix tree using the created instance.


    Now let’s index some documents:


    ```

    //Index some documents

    var r = new Random();

    for (int i = 0; i < 3000; i++) {

    double latitude = ThreadLocalRandom.current().nextDouble(50.4D, 51.4D);

    double longitude = ThreadLocalRandom.current().nextDouble(8.2D, 11.2D);

    Document doc = new Document();

    doc.add(new StoredField("id", r.nextInt())));

    var point = shapeFactory.pointXY(longitude, latitude);

    for (var field: coordinatesStrategy.createIndexableFields(point)) {

    doc.add(field);

    }

    doc.add(new StoredField(coordinatesStrategy.getFieldName(), latitude + ":" + longitude));

    indexWriter.addDocument(doc);

    }

    indexWriter.forceMerge(1);

    indexWriter.close();

    ```


    Note that the `SpatialContext` class being used is a class present in Spatial4j,
    a dependency of Lucene’s spatial module. `SpatialContext` allows the creation
    of points from a variety of sources (in this context, from the latitude and the
    longitude). The point is then indexed into the data structure.


    Now let’s query the index:


    ```

    //Query the index

    final IndexReader indexReader = DirectoryReader.open(directory);

    IndexSearcher indexSearcher = new IndexSearcher(indexReader);

    // Get the search range

    double latitude = ThreadLocalRandom.current().nextDouble(50.4D, 51.4D)

    double longitude = TheradLocalRandom.current().nextDouble(8.2D, 11.2D);

    /// Approximate radius degree

    final double NEARBY_RADIUS_DEGREE = DistanceUtils.dist2Degrees(100, DistanceUtils.EARTH_MEAN_RADIUS_KM);

    final var spatialArgs = new SpatialArgs(SpatialOperation.IsWithin, shapeFactory.circle(longitude,
    latitude, NEARBY_RADIUS_DEGREE));

    final Query q = coordinatesStratefy.makeQuery(spatialArgs);

    try {

    final TopDocs topDocs = indexSearcher.search(q, 1 // Number of docs);

    if (topDocs.totalHits == 0) {

    return;

    }

    // Get the doc

    var doc = indexSearcher.doc(topDocs.scoreDocs[0].doc);

    // Get the ID

    var id = doc.getField("id").numericValue();

    } catch (IOException e) {

    e.printStackTrace();

    }

    ```


    Here we generate random latitude and longitude values. We then create a spatial
    “bounding box” of a circle with the relation that the point should be inside the
    circle. Hence, a point will be qualified as a hit only when it lies within the
    defined circle.


    # Location-Aware Search Engines


    Location-aware search engines are pretty crucial today, both as standalone search
    engines as well as components supporting business logic and operations (think
    of a food-delivery application). With the advent of location-enabled smart devices,
    this data is available more than ever, but that also signifies an information
    explosion in the amount of data that is available at any given point in time for
    such queries. Hence it is imperative that we build storage, indexing, and searching
    strategies that scale with the data while consistently delivering a reasonable
    degree of performance.


    > **Note**: This is a theoretical chapter that builds on what we’ve covered previously.
    The concepts will help reinforce what you already know and give you a foundation
    for building a location-aware search engine.


    ## Why Use a Search Engine for Geographic Searches?


    Many geographic information system (GIS) tools that are available do the task
    of performing geographic searches. However, the advantage of leveraging a search
    engine for this use case is that you can combine structured and unstructured data.
    This advantage implies that queries can be expressed that allow seeking across
    text and geographic data. A query can query on text data and create filters on
    geographic data and vice versa.


    Another advantage of having search engines handle the functionality is the availability
    of things such as faceting, highlighting, and spell checking, which enable users
    to have greater control when expressing queries.


    The next section first reviews some of the core query options exposed by Lucene
    that enable you to build such applications. The discussion then turns to geospatial
    searching basics, and then we work through a relevant project.


    Knowledge of geospatial systems is not necessary, although it is good to understand
    latitude and longitude generalities. This chapter provides enough background context
    to help you make sense of the concepts covered.


    ## Range Queries


    Range queries and range filters allow you to restrict a given space of input.
    In a range query, the user specifies a bounding range. The bounding range acts
    as a bounding box for the documents in the index, and the query returns only the
    documents lying within the given range. This query model proves useful because
    it allows the application to filter down on geographic ranges and thus perform
    complex operations on only a subset of the dataset.


    ```

    mod_date:[20020101 TO 20030101]

    ```


    Internally, Lucene must enumerate all documents and match them against the given
    criteria to ensure that they match and choose only the ones that match the range
    (and discard others in accordance with the query). This process can be expensive,
    and so it is crucial to define the geographic data that you have so that these
    queries are not slowed down significantly.


    ## Function Queries


    Lucene also features function queries, which basically allow participation of
    the value of a field into the scoring mechanism instead of using just the default
    scoring mechanism. We use function queries to incorporate latitude and longitude
    data into our scoring mechanism later in this chapter.


    ```

    q={!func}div(popularity,price)&fq={!frange l=1000}customer_ratings

    ```'
