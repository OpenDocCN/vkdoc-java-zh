  trans: '

    ## 提高索引速度


    我们先从速度提升说起：


    *   **减少并发写入器的数量**。打开一个写入器，并在整个会话期间使用它。


    *   过多的并发写入器会导致负载过高，从而普遍降低写入性能。你应该在搜索应用的整个生命周期中使用单一的写入器。


    ## 重用字段实例


    要添加新文档，请创建 `Field` 实例，为其赋值，然后将它们分配给一个文档。在将文档添加到索引后，重新为字段赋值，将它们分配给一个新文档，然后添加这个新文档。


    ## 大型提交的特殊情况


    `IndexWriter` 实例在合并大文件时可能会产生过多的开销。在这种情况下，切换到 `autoCommit=false` 可以确保最佳性能。然而，这种切换也会导致打开的搜索器在
    `IndexWriter` 关闭之前无法看到更改。理想的方法是将数据分块成更小的块（批量处理你的文档），并保持 `autoCommit` 为 true。


    ## 在分析器中重用令牌


    分析器会为序列中的每个词条创建一个新的令牌。


    重用令牌是一个明智的策略。


    ```

    StoredFieldsWriter.MergeVisitor.tokenStream(Analyzer analyzer, TokenStream reuse)

    ```


    ## 调整刷新间隔


    Lucene 允许你根据不同的标准（如文档数量或 RAM 使用量）来定义刷新间隔。基于 RAM 使用量的刷新间隔可以更好地利用 RAM，并且在处理小/平均文档长度时，可以减少因频繁刷新而导致的磁盘抖动。请参见
    `LiveIndexWriterConfig` 类。


    ## 增加 mergeFactor


    小幅增加 `mergeFactor` 应该能提高索引速度。


    ## 选择正确的分析器


    分析器在索引速度中扮演着重要角色。慢速的分析器会导致整体索引速度下降。


    ## 使用单个 IndexWriter 的多个线程


    在 `IndexWriter` 中使用并发可以提高索引速度并更好地利用 CPU 核心能力。然而，存在一个临界点，所以要注意不要过度。该设置不应超过机器的核心数。请参见你的
    `MergeScheduler` 实例的 `setMaxThreadCount` 方法。


    ## 分别索引到多个索引，然后合并


    如果你有非常大量的内容需要索引，你可以将内容分成 N 个“筒仓”，在单独的机器上索引每个筒仓，然后使用 `writer.addIndexes` 将它们全部合并到一个最终的索引中。


    ## 提高搜索性能


    本节和前一节并非互斥，并且可能取决于你在索引时关注的重点。请记住，索引和搜索通常发生在同一台机器上，资源重叠是可能发生的。


    ## 使用最新版本的 Lucene


    如果你没有使用最新版本的 Lucene，你可能会错过升级以及 Lucene 提供的最新功能。


    ## 使用 readOnly 属性为 True 的 IndexReader


    使用 `readOnly=true` 的 `IndexReader` 可以在一定程度上减少线程争用，从而提高性能。


    ## 使用 MMapDirectory/NIOFSDirectory


    `MMapDirectory` 和 `NIOFSDirectory` 都能提供显著更好的 I/O 性能，从而提升整体性能。请注意，`NIOFSDirectory`
    和 `MMapDirectory` 实现在 Windows 中会遇到文件通道问题。最好使用 `FSDirectory.open()`，Lucene 会为当前环境提供合适的
    Directory 实现。


    ## 减少 mergeFactor


    减少 `mergeFactor` 会导致段数量减少，从而减少扇出，进而提高查询性能。然而，这可能会对索引性能产生不利影响，因此需要谨慎操作。


    ## 忽略第一个查询的性能


    第一个查询通常会遇到冷缓存，所以忽略它的性能。你需要一个更大的数据集来获得关于性能特征的整体答案。


    ## 避免重新打开 IndexSearcher 实例


    重新打开 `IndexSearcher` 实例代价高昂。除非绝对必要，否则不要这样做。


    ## 共享 IndexSearcher 实例


    延续上一点，共享 `IndexSearcher` 实例是一个好主意，这样可以减少争用。


    ## 谨慎使用存储字段和词向量


    存储字段和词向量通常占系统整体内存使用量的很大一部分。不加区分地使用它们会导致更高的内存占用。


    ## 使用过滤器


    过滤器可以减少 Lucene 为获取结果集所需命中项而进行的整体磁盘寻道。过滤器禁用分数计算并减少需要查看的数据集。将查询包装在 `ConstantScoreQuery`
    中或使用过滤器。


    ## 关于最佳实践的最终思考


    虽然这不是一个结论性的列表，但本章确定了一些提高 Lucene 索引和搜索整体性能的方法。请记住，过早优化很容易，然后会看到性能下降。更好的策略是首先使用默认配置构建你的搜索应用并测量性能。只有在识别出瓶颈之后，才应该专注于改进性能。


    # 8. 你的第一个 Lucene 补丁


    本章涵盖了为 Apache Lucene 做贡献的一些最佳实践。本指南详细介绍了 Apache 软件基金会、Apache 之道，以及如何编写你的第一个补丁并与社区互动。

    '
- fmt: '# Why Contribute to Open Source Projects?


    Contributing to open source projects can be intimidating. Everyone is busy. Perhaps
    you have a million other things to do. Why would you want to contribute to open
    source and not do something else instead?


    This is a tricky question, and everybody has different motivations for contributing
    to open source. Read on for some of the common motivations. Some of these might
    encourage you to contribute.


    ## Improve Projects Based on Real-World Experience and Proven, Working Solutions


    This is a no-brainer. We use a piece of open source software and realize that
    it can be improved based on our use case and actual experience with it. Active
    actual user feedback enables improvement of the product. You’ll feel warm and
    fuzzy contributing code back to products you love.


    ## Discover and Share Project Internals


    Your contribution to an open source project may help a user learn more about the
    product/project and the internals of the system being using. Your contribution
    might even lead to a deeper usage pattern, where the use is based on an enhanced
    understanding system operation.


    You might enable users to leverage the system in the best manner possible while
    also avoiding complex/costly pitfalls. Open source contributions are also a great
    opportunity for you (and other users) to enter the engineering space and peek
    under the hood. You can learn from this because most popular open source projects
    are engineered to perfection and have a high-quality bar for submissions.


    ## Enhance Your Reputation, Boost Your Career


    Contributing to an open source project can help establish/enhance your reputation
    and credibility as an engineer and developer. You have the change to showcase
    your capabilities, and because the Internet is written in ink and not pencil,
    your contributions are everlasting and ever-present. Your contribution can be
    referred to whenever needed.


    ## Mitigate Future Risks


    Unlike a closed source project, an open source project publishes its roadmap clearly
    and is also explicit about risks such as end of life, deprecations, and component
    removal. Being part of the open source community for a project you care about
    can help alleviate these risks while ensuring that you are able to plan for the
    future, know what is on the horizon, and note salient points of interest in upcoming
    releases.


    ## Derive Personal Satisfaction


    You might just have a desire to contribute to an open source project for the sake
    of contributing and building something that might potentially affect a lot of
    people. What else can you do to impact the world in such a massive way?


    # How to Contribute to Open Source Projects


    Although there is no strict process to contribute to an open source project, the
    following steps generally work well when looking to contribute a feature:


    1. Determine which part of your solution is worth contributing.

    2. Study the contribution guidelines of the target project.

    3. Obtain and build the project.

    4. Extract the relevant code fragments.

    5. Adapt the code and integrate the desired changes.

    6. Provide the required level of automated test cases and documentation.

    7. File an issue.

    8. Submit the change.


    # Apache Software Foundation


    From Wikipedia:


    *The Apache Software Foundation /əˈpætʃi/ (ASF) is an American nonprofit corporation
    (classified as a 501(c)(3) organization in the United States) to support Apache
    software projects, including the Apache HTTP Server. The ASF was formed from the
    Apache Group and incorporated on March 25, 1999.[2][3]*


    *The Apache Software Foundation is a decentralized open source community of developers.
    The software they produce is distributed under the terms of the Apache License
    and is free and open-source software (FOSS). The Apache projects are characterized
    by a collaborative, consensus-based development process and an open and pragmatic
    software license. Each project is managed by a self-selected team of technical
    experts who are active contributors to the project. The ASF is a meritocracy,
    implying that membership of the foundation is granted only to volunteers who have
    actively contributed to Apache projects. The ASF is considered a second generation[4]
    open-source organization, in that commercial support is provided without the risk
    of platform lock-in.*


    Note that the foundation is based on the principles of decentralized, free software
    and focuses on meritocracy and a consensus-based software development approach.
    These represent the core principles on which the Apache Lucene/Solr community
    is based. Potential contributors need to be aware of these principles and respect
    all standards their standards. After all, a core idea of the Apache Software Foundation
    is “community over code.”


    # Working with Git


    To interact with the community and create patches, potential contributors must
    have a basic knowledge of Git. Git is the CVS that the Lucene/Solr community uses,
    and contributing is made easy by raising pull requests.


    ## Basic Git Terminology


    ### Blobs


    `Blob` stands for Binary Large OBject. A blob is an generic way of storing and
    representing a file in Git. Any file changed in a Git-controlled repository is
    represented in a delta as a blob.


    ### Trees


    A tree is an object that represents a directory. It holds blobs and other subdirectories.
    A tree is a binary file that stores references to blobs and subtrees. (These references
    are also called the SHA-1 hash of the tree object.)


    ### Commits


    A commit holds the current state of the repository. Every commit is like a node
    in a linked list, with each commit having a pointer to its parent commit (and
    thus allowing a chain of hierarchy to be built). Every commit is named with the
    SHA-1 of its content. If a commit has multiple parent commits, that particular
    commit has been created by merging two branches.


    ### Branches


    Branches are used to create another line of development. By default, Git has a
    `master` branch, which is same as a trunk in Subversion. Usually a branch is created
    to work on a new feature. Once the feature is completed, it is merged back with
    the `master` branch, and we delete the branch. Every branch is referenced by `HEAD`,
    which points to the latest commit in the branch. Whenever you make a commit, `HEAD`
    is updated with the latest commit.


    ### Tags


    Tags are used to mark checkpoints in the repository. Think of tags as read-only
    branches that are snapshots of given branches. Typically tags are used to mark
    releases, but they can be used for other purposes as well.


    ### Clones


    Clones are used to create a copy of the entire repository. A clone is not just
    a mirror; it is a fully functional copy of the main code base. Generally these
    are used to keep local copies of the code.


    ### Pull


    A pull operation copies the changes from a remote repository instance to a local
    one. A pull synchronizes two repositories and allows changes from the main one
    to be synchronized into the fork.


    ### Push


    A push operation allows local changes to be pushed to the remote repository.


    # JIRA


    JIRA is the issue tracker used by the Apache Lucene/Solr community. JIRA is simple
    to use and is the default community interaction mechanism.


    The simplest way to interact with the community when an issue is found is to raise
    a JIRA. Do proper due diligence before raising a JIRA, and include the following
    in your JIRA: the issue, steps to reproduce, proposed fix (if any), and so on.'
  raw: '## Why Contribute to Open Source Projects?


    Contributing to open source projects can be intimidating. Everyone is busy. Perhaps
    you have a million other things to do. Why would you want to contribute to open
    source and not do something else instead?


    This is a tricky question, and everybody has different motivations for contributing
    to open source. Read on for some of the common motivations. Some of these might
    encourage you to contribute.


    ### Improve Projects Based on Real-World Experience and Proven, Working Solutions


    This is a no-brainer. We use a piece of open source software and realize that
    it can be improved based on our use case and actual experience with it. Active
    actual user feedback enables improvement of the product. You’ll feel warm and
    fuzzy contributing code back to products you love.


    ### Discover and Share Project Internals


    Your contribution to an open source project may help a user learn more about the
    product/project and the internals of the system being using. Your contribution
    might even lead to a deeper usage pattern, where the use is based on an enhanced
    understanding system operation.


    You might enable users to leverage the system in the best manner possible while
    also avoiding complex/costly pitfalls. Open source contributions are also a great
    opportunity for you (and other users) to enter the engineering space and peek
    under the hood. You can learn from this because most popular open source projects
    are engineered to perfection and have a high-quality bar for submissions.


    ### Enhance Your Reputation, Boost Your Career


    Contributing to an open source project can help establish/enhance your reputation
    and credibility as an engineer and developer. You have the change to showcase
    your capabilities, and because the Internet is written in ink and not pencil,
    your contributions are everlasting and ever-present. Your contribution can be
    referred to whenever needed.


    ### Mitigate Future Risks


    Unlike a closed source project, an open source project publishes its roadmap clearly
    and is also explicit about risks such as end of life, deprecations, and component
    removal. Being part of the open source community for a project you care about
    can help alleviate these risks while ensuring that you are able to plan for the
    future, know what is on the horizon, and note salient points of interest in upcoming
    releases.


    ### Derive Personal Satisfaction


    You might just have a desire to contribute to an open source project for the sake
    of contributing and building something that might potentially affect a lot of
    people. What else can you do to impact the world in such a massive way?


    ## How to Contribute to Open Source Projects


    Although there is no strict process to contribute to an open source project, the
    following steps generally work well when looking to contribute a feature:


    1.  Determine which part of your solution is worth contributing.


    2.  Study the contribution guidelines of the target project.


    3.  Obtain and build the project.


    4.  Extract the relevant code fragments.


    5.  Adapt the code and integrate the desired changes.


    6.  Provide the required level of automated test cases and documentation.


    7.  File an issue.


    8.  Submit the change.


    ## Apache Software Foundation


    From Wikipedia:


    *The Apache Software Foundation /ə*ˈ*pætʃi/ (ASF) is an American nonprofit corporation
    (classified as a 501(c)(3) organization in the United States) to support Apache
    software projects, including the Apache HTTP Server. The ASF was formed from the
    Apache Group and incorporated on March 25, 1999.[2][3]*


    *The Apache Software Foundation is a decentralized open source community of developers.
    The software they produce is distributed under the terms of the Apache License
    and is free and open-source software (FOSS). The Apache projects are characterized
    by a collaborative, consensus-based development process and an open and pragmatic
    software license. Each project is managed by a self-selected team of technical
    experts who are active contributors to the project. The ASF is a meritocracy,
    implying that membership of the foundation is granted only to volunteers who have
    actively contributed to Apache projects. The ASF is considered a second generation[4]
    open-source organization, in that commercial support is provided without the risk
    of platform lock-in.*


    Note that the foundation is based on the principles of decentralized, free software
    and focuses on meritocracy and a consensus-based software development approach.
    These represent the core principles on which the Apache Lucene/Solr community
    is based. Potential contributors need to be aware of these principles and respect
    all standards their standards. After all, a core idea of the Apache Software Foundation
    is “community over code.”


    ## Working with Git


    To interact with the community and create patches, potential contributors must
    have a basic knowledge of Git. Git is the CVS that the Lucene/Solr community uses,
    and contributing is made easy by raising pull requests.


    ### Basic Git Terminology


    #### Blobs


    Blob stands for Binary Large OBject. A blob is an generic way of storing and representing
    a file in Git. Any file changed in a Git-controlled repository is represented
    in a delta as a blob.


    #### Trees


    A tree is an object that represents a directory. It holds blobs and other subdirectories.
    A tree is a binary file that stores references to blobs and subtrees. (These references
    are also called the SHA-1 hash of the tree object.)


    #### Commits


    A commit holds the current state of the repository. Every commit is like a node
    in a linked list, with each commit having a pointer to its parent commit (and
    thus allowing a chain of hierarchy to be built). Every commit is named with the
    SHA-1 of its content. If a commit has multiple parent commits, that particular
    commit has been created by merging two branches.


    #### Branches


    Branches are used to create another line of development. By default, Git has a
    master branch, which is same as a trunk in Subversion. Usually a branch is created
    to work on a new feature. Once the feature is completed, it is merged back with
    the master branch, and we delete the branch. Every branch is referenced by `HEAD`,
    which points to the latest commit in the branch. Whenever you make a commit, `HEAD`
    is updated with the latest commit.


    #### Tags


    Tags are used to mark checkpoints in the repository. Think of tags as read-only
    branches that are snapshots of given branches. Typically tags are used to mark
    releases, but they can be used for other purposes as well.


    #### Clones


    Clones are used to create a copy of the entire repository. A clone is not just
    a mirror; it is a fully functional copy of the main code base. Generally these
    are used to keep local copies of the code.


    #### Pull


    A pull operation copies the changes from a remote repository instance to a local
    one. A pull synchronizes two repositories and allows changes from the main one
    to be synchronized into the fork.


    #### Push


    A push operation allows local changes to be pushed to the remote repository.


    ## JIRA


    JIRA is the issue tracker used by the Apache Lucene/Solr community. JIRA is simple
    to use and is the default community interaction mechanism.


    The simplest way to interact with the community when an issue is found is to raise
    a JIRA. Do proper due diligence before raising a JIRA, and include the following
    in your JIRA: the issue, steps to reproduce, proposed fix (if any), and so on.'
  trans: '

    ## 为什么要为开源项目做贡献？


    为开源项目做贡献可能会让人望而生畏。每个人都很忙。也许你还有无数其他事情要做。为什么你要为开源做贡献，而不是去做别的事情呢？


    这是一个棘手的问题，每个人为开源做贡献的动机都不同。请继续阅读一些常见的动机。其中一些可能会鼓励你做出贡献。


    ### 基于实际经验和经过验证的可行方案改进项目


    这是显而易见的。我们使用一个开源软件，并意识到可以根据我们的用例和实际使用经验来改进它。积极的实际用户反馈能够促进产品的改进。为你喜爱的产品贡献代码，会让你感到温暖而充实。


    ### 发现并分享项目内部机制


    你对开源项目的贡献可以帮助用户更多地了解产品/项目以及所使用系统的内部机制。你的贡献甚至可能带来更深层次的使用模式，这种使用基于对系统操作的增强理解。


    你或许能让用户以最佳方式利用系统，同时避免复杂/代价高昂的陷阱。开源贡献也是你（以及其他用户）进入工程领域、一探究竟的绝佳机会。你可以从中学习，因为大多数流行的开源项目都经过精心设计，达到完美，并且对提交内容有很高的质量标准。


    ### 提升声誉，助推职业发展


    为开源项目做贡献有助于建立/提升你作为工程师和开发者的声誉与可信度。你有机会展示自己的能力，而且由于互联网是“用墨水书写”而非“铅笔书写”，你的贡献是永恒且随时可见的。你的贡献可以在需要时被随时引用。


    ### 降低未来风险


    与闭源项目不同，开源项目会清晰地公布其路线图，并明确说明诸如生命周期终止、弃用和组件移除等风险。成为你所关心的项目的开源社区一员，有助于缓解这些风险，同时确保你能够规划未来，了解即将发生的变化，并留意未来版本中值得关注的要点。


    ### 获得个人满足感


    你可能仅仅出于贡献本身以及构建可能影响许多人的东西的愿望，而想为开源项目做贡献。还有什么其他方式能让你如此大规模地影响世界呢？


    ## 如何为开源项目做贡献


    虽然为开源项目做贡献没有严格的流程，但在寻求贡献一个功能时，以下步骤通常效果不错：


    1.  确定你解决方案的哪一部分值得贡献。

    2.  研究目标项目的贡献指南。

    3.  获取并构建项目。

    4.  提取相关的代码片段。

    5.  调整代码并整合所需的更改。

    6.  提供所需级别的自动化测试用例和文档。

    7.  提交一个 issue。

    8.  提交更改。


    ## Apache 软件基金会


    摘自维基百科：


    *Apache 软件基金会 /əˈpætʃi/ (ASF) 是一家美国非营利公司（在美国归类为 501(c)(3) 组织），旨在支持 Apache 软件项目，包括
    Apache HTTP 服务器。ASF 由 Apache 小组组建，并于 1999 年 3 月 25 日注册成立。[2][3]*


    *Apache 软件基金会是一个由开发者组成的去中心化开源社区。他们生产的软件根据 Apache 许可证条款分发，是免费和开源软件 (FOSS)。Apache
    项目的特点是协作、基于共识的开发过程以及开放、实用的软件许可证。每个项目由一个自我选择的技术专家团队管理，这些专家是项目的活跃贡献者。ASF 是一个精英管理组织，这意味着基金会的成员资格仅授予那些积极为
    Apache 项目做出贡献的志愿者。ASF 被认为是第二代[4]开源组织，因为它提供商业支持，而没有平台锁定的风险。*


    请注意，该基金会基于去中心化、自由软件的原则，并专注于精英管理和基于共识的软件开发方法。这些代表了 Apache Lucene/Solr 社区所依据的核心原则。潜在的贡献者需要了解这些原则，并尊重其所有标准。毕竟，Apache
    软件基金会的核心理念是“社区重于代码”。


    ## 使用 Git


    为了与社区互动并创建补丁，潜在的贡献者必须具备 Git 的基本知识。Git 是 Lucene/Solr 社区使用的版本控制系统，通过发起拉取请求可以轻松地进行贡献。


    ### 基本 Git 术语


    #### Blob


    Blob 代表二进制大对象。Blob 是在 Git 中存储和表示文件的一种通用方式。在 Git 控制的仓库中，任何被更改的文件都会在增量中表示为 blob。


    #### 树


    树是一个表示目录的对象。它包含 blob 和其他子目录。树是一个二进制文件，存储着对 blob 和子树的引用。（这些引用也称为树对象的 SHA-1 哈希值。）


    #### 提交


    提交保存了仓库的当前状态。每个提交都像是链表中的一个节点，每个提交都有一个指向其父提交的指针（从而允许构建一个层级链）。每个提交都以其内容的 SHA-1 值命名。如果一个提交有多个父提交，那么该特定提交是通过合并两个分支创建的。


    #### 分支


    分支用于创建另一条开发线。默认情况下，Git 有一个主分支，它类似于 Subversion 中的主干。通常，创建分支是为了开发一个新功能。一旦功能完成，它会被合并回主分支，然后我们删除该分支。每个分支都由
    `HEAD` 引用，它指向该分支中的最新提交。每当你进行一次提交时，`HEAD` 都会更新为最新的提交。


    #### 标签


    标签用于标记仓库中的检查点。可以将标签视为给定分支的快照的只读分支。通常，标签用于标记发布版本，但它们也可以用于其他目的。


    #### 克隆


    克隆用于创建整个仓库的副本。克隆不仅仅是镜像；它是主代码库的一个功能完备的副本。通常，这些用于保留代码的本地副本。


    #### 拉取


    拉取操作将更改从远程仓库实例复制到本地仓库。拉取同步两个仓库，并允许将主仓库的更改同步到复刻中。


    #### 推送


    推送操作允许将本地更改推送到远程仓库。


    ## JIRA


    JIRA 是 Apache Lucene/Solr 社区使用的问题跟踪器。JIRA 使用简单，是默认的社区互动机制。


    当发现问题时，与社区互动的最简单方式是提交一个 JIRA。在提交 JIRA 之前，请进行适当的尽职调查，并在你的 JIRA 中包含以下内容：问题、重现步骤、建议的修复（如果有的话）等等。

