    BooleanQuery query = new BooleanQuery();

    query.add(firstInternalQuery, BooleanClause.Occur.MUST_NOT);

    query.add(secondInternalQuery, BooleanClause.Occur.MUST);

    TopDocs hits = searcher.search(query);

    long endTime = System.currentTimeMillis();

    for(ScoreDoc scoreDoc : hits.scoreDocs) {

    Document doc = searcher.getDocument(scoreDoc);

    }

    searcher. Close();

    }

    ```


    ## MultiTermQuery


    `MultiTermQuery` is a query type that matches a subset of terms and returns corresponding
    results.


    Multiterm queries are great when a query needs to filter by multiple terms. They
    are the equivalent of `IN` and `NOT IN` SQL constructs. Think of them as powerful
    tools for dynamic filtering. They prove especially useful when autogenerating
    queries through an application.


    Multiterm queries require a `FilteredTermsEnum` to be passed in for defining the
    set of terms to be used for filtering. A `FilteredTermsEnum` is an iterator of
    terms, which is basically a subset.


    Multiterm queries cannot be used directly (by invoking a constructor). Instead,
    they must be passed in a `FilteredTermsEnum`’s concrete implementation, and then
    `getTerms()` needs to be invoked.


    One popular version of `MultiTermQuery` is `TermRangeQuery` . `TermRangeQuery`
    allows specifying a range of terms to be used as the filter, both ends inclusive.
    Any term greater than or equal to a lower term and lesser than or equal to an
    upper term will match.


    ```

    //Assume the index already exists

    IndexReader reader = DirectoryReader.open(dir);

    IndexSearcher searcher = newSearcher(reader);

    TermRangeQuery query = new TermRangeQuery("content", new Term("foo"),

    new Term("bar"), true, true);

    searcher.search(query);

    ```


    The preceding code defines a range of terms, from “foo” to “bar.”'
  trans: '

    ## 词项向量


    你可能还记得，词项是 Lucene 中基本的可搜索单元。它由一对字符串组成：字段名和值。


    词项向量是一种字段级数据结构，适用于多种操作。如果为某个字段启用了词项向量，该字段中的所有词项都会出现在词项向量中，并且会为每个词项计算相应的元数据。


    让我们看几个用例来理解词项向量的价值。


    考虑这样一种情况：用户想要挖掘两个文档之间的相似性，或者想要从查询返回的命中结果中获取数据字段的预览。在这两种场景中，底层任务都是在查询生成相应命中结果后，获取关于这些命中结果的额外元数据。


    这种操作在倒排索引中很难实现，因为倒排索引的结构和布局不允许轻松获取命中结果周围的内容。为了解决这个特定问题，词项向量应运而生。


    我们可以使用词项向量来获取此类数据，并执行复杂的排序（例如在向量空间模型中）、相似度排序，或者仅仅是从命中结果中获取文本摘要。


    ```

    RAMDirectory ramDir = new RAMDirectory();

    //索引一些虚构的内容

    IndexWriter writer = new IndexWriter(ramDir, new StandardAnalyzer(), true,

    IndexWriter.MaxFieldLength.UNLIMITED);

    for (int i = 0; i < DOCS.length; i++){

    Document doc = new Document();

    Field id = new Field("id", "doc_" + i, Field.Store.YES,

    Field.Index.NOT_ANALYZED_NO_NORMS);

    doc.add(id);

    //同时存储位置和偏移量信息

    Field text = new Field("content", DOCS[i], Field.Store.NO, Field.Index.ANALYZED,

    Field.TermVector.WITH_POSITIONS_OFFSETS);

    doc.add(text);

    writer.addDocument(doc);

    }

    writer.close();

    ```


    可以将词项向量视为针对单个文档的微型倒排索引。


    词项向量的各种构建模式包括：


    *   `TermVector.YES`：仅存储出现次数。

    *   `TermVector.WITH_POSITIONS`：存储词项的出现次数和位置，但不存储偏移量。

    *   `TermVector.WITH_OFFSETS`：存储词项的出现次数和偏移量，但不存储位置。

    *   `TermVector.WITH_POSITIONS_OFFSETS`：存储词项的出现次数、位置和偏移量。

    *   `TermVector.NO`：不存储任何词项向量信息。


    词项向量为启用了词项向量的字段存储了关于词项的大量元数据。存储的信息包括：


    *   文档 ID

    *   字段名

    *   词项的实际文本

    *   频率

    *   位置

    *   偏移量


    ## BooleanQuery


    `BooleanQuery` 是用于查询 Lucene 并获取相关文档的基本构造。由于其通用行为以及其子句的多样性和表现力，`BooleanQuery` 是最常用的查询类型之一。


    `BooleanQuery` 允许指定多个子句及其在整个评分/选择过程中的重要性。


    布尔模型在第 2 章中讨论过——本章讨论 Lucene 中的 `BooleanQuery` 实现。


    你可以为查询中的子句分配三种“级别”：


    *   `MUST`：文档必须匹配此子句才能被视为命中结果。

    *   `SHOULD`：这些子句是可选的，有助于提高分数。

    *   `MUST NOT`：要被视为命中结果，文档中不应出现这些子句。


    以下方法执行了一个 `BooleanQuery`：


    ```

    private void booleanQueryExample(String firstQuery,

    String secondQuery) throws I0Exception, ParseException {

    searcher = new Searcher(indexDir);

    long startTime = System.currentTimeMillis();

    Term firstTerm = new Term("foo", firstQuery);

    Query internalFirstQuery = new TermQuery(firstTerm);

    Term secondTerm = new Term("bar", secondQuery);

    Query internalSecondQuery = new PrefixQuery(secondTerm);

    BooleanQuery query = new BooleanQuery();

    query.add(firstInternalQuery, BooleanClause.Occur.MUST_NOT);

    query.add(secondInternalQuery, BooleanClause.Occur.MUST);

    TopDocs hits = searcher.search(query);

    long endTime = System.currentTimeMillis();

    for(ScoreDoc scoreDoc : hits.scoreDocs) {

    Document doc = searcher.getDocument(scoreDoc);

    }

    searcher. Close();

    }

    ```


    ## MultiTermQuery


    `MultiTermQuery` 是一种查询类型，它匹配词项的一个子集并返回相应的结果。


    当查询需要按多个词项进行过滤时，多词项查询非常有用。它们相当于 SQL 中的 `IN` 和 `NOT IN` 构造。可以将它们视为动态过滤的强大工具。当通过应用程序自动生成查询时，它们尤其有用。


    多词项查询需要传入一个 `FilteredTermsEnum` 来定义用于过滤的词项集合。`FilteredTermsEnum` 是一个词项迭代器，本质上是一个子集。


    多词项查询不能直接使用（通过调用构造函数）。相反，必须传入一个 `FilteredTermsEnum` 的具体实现，然后调用 `getTerms()` 方法。


    `MultiTermQuery` 的一个流行版本是 `TermRangeQuery`。`TermRangeQuery` 允许指定一个词项范围作为过滤器，两端都包含在内。任何大于或等于下限词项且小于或等于上限词项的词项都将匹配。


    ```

    //假设索引已存在

    IndexReader reader = DirectoryReader.open(dir);

    IndexSearcher searcher = newSearcher(reader);

    TermRangeQuery query = new TermRangeQuery("content", new Term("foo"),

    new Term("bar"), true, true);

    searcher.search(query);

    ```


    上述代码定义了一个词项范围，从“foo”到“bar”。

    '
- fmt: '# QueryCache


    `QueryCache` proves useful when you want to enable heavy query performance. `QueryCache`
    defines an interface that allows caching queries at the junction when it is needed
    most: at the start of the query.


    The `QueryCache` implementation used is `LRUQueryCache`. As the name implies,
    `LRUQueryCache` uses the Least Recently Used algorithm to evict keys when the
    cache is full.


    As described in Chapter [2](#485809_1_En_2_Chapter.xhtml), each query creates
    a `Weight` instance (associated with the corresponding `IndexSearcher`). The default
    `IndexSearcher` implementation uses an instance of `LRUQueryCache` to cache the
    incoming query and create a cacheable `Weight` instance. When the scoring starts,
    the cacheable `Weight` instance checks whether the query is present in the cache.
    If it is present, the cached version is retrieved and returned. Otherwise, a cache
    load is done, and the corresponding instance is returned (see Figure [3-1](#485809_1_En_3_Chapter.xhtml#Fig1)).


    ![../images/485809_1_En_3_Chapter/485809_1_En_3_Fig1_HTML.jpg](images/485809_1_En_3_Chapter/485809_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    `QueryCache` in action


    `QueryCache`s greatly speed up performance under high-load and repetitive queries.
    However, for a large number of distinct queries, `QueryCache`s can actually increase
    query latencies because of the additional query cache loading times. Also, if
    the query being cached is large, that becomes a significant overhead in the entire
    query’s latency.


    `Weight` represents the per-`IndexSearcher` statistics associated with a query.
    This is essential because it allows a query to be reused (as discussed with regard
    to `QueryCache` earlier in the chapter). Therefore, the same query can be used
    across multiple `IndexSearcher`s, but each `IndexSearcher` will have its own `Weight`
    instance. Remember that `Weight` is correlated to `IndexSearcher` + `Query`, not
    just one of the two.


    When a query is given to an `IndexSearcher` for execution, the `IndexSearcher`
    instance creates a `Weight` instance for the same. The lifetime of the `Weight`
    is limited to the query’s execution lifetime within the `IndexSearcher`.


    `Weight` is also responsible for participating in the scoring process. `Weight`
    creates the corresponding `Scorer` (described in the next section), and the `Scorer`
    is then invoked on various documents that the query is being evaluated against.


    Note that the `Weight` is completely owned by the `IndexSearcher`. It is only
    maintaining statistics for a particular query, and the `IndexSearcher` is free
    to play with the `Weight`’s data as much as it wants, with no side effects impacting
    other parts of the system.


    ## Scorer as Part of the Search Process


    `Scorer` is the core of the search process in Lucene. `Scorer` is responsible
    for identifying matches and scoring hits from the set of documents present.


    `Scorer` is a special class. It is also an extension of a class known as `DocIdSetIterator`.
    `DocIdSetIterator` allows “iteration” over document IDs, thus allowing seeks over
    the index to get specific documents or to iterate over all documents. Note that
    the iterator can go forward only; it cannot go backward. This restriction simplifies
    the underlying codec supporting the iterator.


    `DocIdSetIterator` provides three useful methods:


    *   `docID()`: Get the internal index document ID for this document. This method
    always returns monotonically increasing document IDs.

    *   `nextDoc()`: Iterate to the next document.

    *   `advance(location)`: Advance to the location specified.


    This interface allows a `Scorer` to iterate over all documents and determine whether
    they are relevant to the query.


    The `Scorer` works by implementing the `score()` method on top of the iterators.
    The `score()` method gets the current document ID, gets the current document,
    and returns a score for the same. `IndexReader` has statistics about the current
    document that can be fully utilized by the `Scorer` to determine a score. If term
    vectors are enabled for the field, the `Scorer` can get access to the term vector
    and perform even more elaborate operations.


    How scoring is performed is discussed in Chapter [2](#485809_1_En_2_Chapter.xhtml).
    Here you’ll see how it all fits together (see Figure [3-2](#485809_1_En_3_Chapter.xhtml#Fig2)).


    ![../images/485809_1_En_3_Chapter/485809_1_En_3_Fig2_HTML.jpg](images/485809_1_En_3_Chapter/485809_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    A `Scorer` in a search


    The user issues a query with an instance of the `Query` class. The query is given
    to an `IndexSearcher`, which first rewrites the query recursively (invoking any
    modifications/simplifications if possible). Upon completion of the rewrite, an
    instance of the `Weight` class is created, which is specific to the `Query` +
    `IndexSearcher` combination. This `Weight` will contain all the query-specific
    statistics that apply to the execution of this query.


    During the scoring, the `Weight` creates a `Scorer`, which iterates over all documents
    in the index, filters out the irrelevant documents, and applies the scoring algorithm
    on the candidate documents. The scoring algorithm can be anything that the user
    chooses to implement or use, but typically is a version of term frequency/inverse
    document frequency (TF/IDF) family.


    The `Scorer` interacts with the `IndexReader` to get the relevant details from
    the underlying file directory. If a term vector is present, the `Scorer` can choose
    to use features from that as well to calculate the score for the document. The
    `Scorer` is expected to return a score per document it iterates on.


    After scoring completes, the results are returned to the collector, which then
    chooses the next set of steps. If the top N hits are requested, the collector
    typically will maintain a priority queue to identify the top N hits and then return
    them back to the user.


    # 4. Spatial Indexing


    Lucene provides a rich set of application programming interfaces (APIs) to index
    and query spatial fields, which allows for a variety of queries to be performed.
    Lucene allows either flat-plane or spherical models of spatial search.


    Some key features of Lucene in that space are multidimensional points, latitude
    and longitudinal points, and box queries.


    Lucene has a spatial module, which is the core engine responsible for spatial
    indexing and searching. The next section examines the API exposed by the module.'
