- fmt: "### Writing a Patch\n\nIf you have identified what you want to change in Lucene/Solr\
    \ and have a good idea about how to do so, it makes sense to write a patch. A\
    \ patch is a change delta. Think of it as a “change” you want to make in the code\
    \ base.\n\nHow you do this is by first forking the Lucene/Solr code base on Github.\
    \ Post that, and then clone the repository by using `git clone`. Post that, and\
    \ then create a branch by using `git checkout -b <foobar>`. Remember that the\
    \ commit that you raise into the Lucene/Solr code base has to be marked with the\
    \ JIRA number of the JIRA that you are working against. So, ensure that you have\
    \ set up the JIRA number beforehand.\n\nAfter making the changes locally in your\
    \ repository, do a `git diff` to ensure that you have written the code the way\
