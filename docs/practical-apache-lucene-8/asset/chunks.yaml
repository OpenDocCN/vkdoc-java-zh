    现在，让我们看看如何查询刚刚写入索引的数据。


    ## 文档搜索


    Lucene 搜索 API 接收一个查询，并可选地指定要返回的顶部命中数。返回的文档按相关性和分数排序。分数表示命中结果与给定参数的“接近程度”。下一章将讨论
    Lucene 的排名和评分模型。以下代码执行搜索并返回前 N 个命中结果。


    ```

    private void performIndexSearch(File indexDir, String query, int maxHits) throws
    Exception {

    Directory directory = FSDirectory.open(indexDir);

    //Contents 是要分析的默认字段

    QueryParser parser = new QueryParser(Version.LUCENE_80, "contents'', new StandardAnalyzer());

    Query query = parser.parse(query);

    TopDocs topDocs = searcher.search(query. maxHits);

    //获取为此查询返回的顶部文档（由 maxHits 指定）

    ScoreDoc[] hits = topDocs.scoreDocs;

    for (int i = 0; i < hits.length; i++) {

    int docId = hits[I].doc;

    System.out.println(docId);

    }

    }

    ```


    现在让我们看看代码的具体细节。


    `Directory` 是底层实现，允许访问、加载和读取正在被搜索的索引。


    ### QueryParser


    `QueryParser` 从查询字符串生成一个 `Query` 实例。一个查询可以由一系列子句组成。子句可以以 `+` 或 `-` 为前缀，表示该子句是
    `MUST` 或 `MUST_NOT`。如前面的代码所示，调用的构造函数定义了要使用的编解码器（`LUCENE_80`）、默认字段（`"contents"`）以及要使用的分析器（`StandardAnalyzer()`）。


    ### TopDocs


    `TopDocs` 是匹配给定查询的顶部文档的表示。它们是一种通用表示，不一定依赖于用于计算顶部文档的底层算法。`TopDocs` 由两部分组成：`scoreDocs`（前
    N 个命中结果的 `documentIDs`，其中 N 是请求的值）以及每个命中结果的分数。文档的分数是 Lucene 的内部概念，将在本章后面讨论。


    `TopDocs` 的第二部分是 `totalHits`，它表示命中的总数。


    在前面的代码示例中，我们通过指定查询和希望返回的命中数来获取 `TopDocs`。


    ### IndexSearcher


    `IndexSearcher` 是 Lucene 中存在的抽象，用于在单个 Lucene 索引上执行搜索。`IndexSearcher` 在 `IndexReader`
    之上打开，`IndexReader` 用于使用 `Directory` 和相应的抽象来读取底层索引。请注意，我们需要 `IndexReader`，因为 `Directory`
    可能以一种不便于直接搜索的格式表示索引（因此需要抽象来处理这种情况）。


    构建 `IndexSearcher` 实例的开销很大，因此应重复使用，除非底层索引发生变化且用户希望看到更新后的值。可以通过使用 `DirectoryReader.openIfChanged(DirectoryReader)`
    重新打开搜索器来实现“重用”。前面代码中使用的构造函数使用给定的目录打开了一个 `IndexSearcher`。


    ### IndexReader


    `IndexReader` 是一个抽象，提供访问索引的接口。`IndexReader` 的两种类型如下：


    *   `AtomicReader`：这些读取器读取实际文件，例如 posting 列表、文档值、词项和存储字段。这些操作是原子性的。


    *   `CompositeReader`：`CompositeReader` 实例用于从底层的 `AtomicReader` 获取存储字段。请注意，无法直接从
    `CompositeReader` 实例获取 posting 列表；你仍然需要获取底层的 `AtomicReader` 实例。


    ## 搜索


    Lucene 信息检索机制的核心是评分算法，该算法确定文档与给定查询的相关性。


    让我们首先看看 Lucene 使用的查询执行模型。


    ### 布尔模型


    在布尔模型中，查询被表示为一组由 AND、OR 和 NOT 连接的谓词，用于查找与查询匹配的文档。


    例如，查询 x AND y AND z 将只匹配同时包含 x、y 和 z 的文档。

    '
- fmt: '### What Is Relevance?


    Relevance refers to the measure of similarity (that is, how relevant a document
    is to a given query). Each document is assigned a score that is used to filter
    documents out and return top hits (see Figure [2-2](#485809_1_En_2_Chapter.xhtml#Fig2)).
    Note that relevance is calculated per query for all documents.


    ![../images/485809_1_En_2_Chapter/485809_1_En_2_Fig2_HTML.jpg](images/485809_1_En_2_Chapter/485809_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Search layout


    Following the boolean model described earlier, let’s assume that the query consists
    of multiple clauses, each of which can be the same or different.


    Each clause contributes to the scoring differently, and not all clauses necessarily
    contribute to scoring.


    Note that the parameters for relevance (or similarity) as seen by each type of
    query are different.


    ### Scoring Algorithms


    Scoring algorithms are what determine the “similarity” of documents given a query
    (that is, how close a given document is to the given query).


    Lucene has a number of scoring algorithms. The following subsections describe
    the most common ones.


    #### TF/IDF


    Term frequency/inverse document frequency (TF/IDF) is the default scoring algorithm
    Lucene uses.


    The following factors contribute to TF/IDF’s scoring model:


    - *Term frequency*: Term frequency is simply the frequency of a repetition rate
    of a term in the document. A repetition of 5 is better than 1.

    - *Inverse document frequency*: Inverse document frequency is the measure of how
    frequently the term appears across documents. This defines the “rare” words from
    the “common.” For example, if a word occurs only in one document, that might be
    a more interesting hit than some word that occurs in 80% of the documents.

    - *Field length norm*: Field length is an important aspect of measuring the relevance
    of a term and a hit document. The longer the matched field, the lesser the probability
    of the field being only about the term. The shorter the field, the higher the
    probability.


    These three factors in conjunction generate a weight that signals the significance
    of the document.


    #### Vector Space Model


    The Vector Space Model uses a vector model to compare against multiple terms in
    a query. Every term in the vector represents the TF/IDF score of one term of the
    query. Note that TF/IDF is one option. Any other scoring model can also be used
    here.


    Consider a query for “foo bar,” for example. For this query, calculate the weight
    of each term for each document, construct a vector for each document, and plot
    them with the vector for the query. The angle between the vectors gives the deviation
    or, conversely, the relevance.


    #### Scoring Example


    Consider a document containing 100 words wherein the word “cat” appears 3 times.
    The term frequency (tf) for “cat” is then (3 / 100) = 0.03. Now, assume we have
    10 million documents, and the word “cat” appears in 1,000 of these. Then, the
    inverse document frequency (idf) is calculated as log(10,000,000 / 1,000) = 4.
    Therefore, the tf-idf weight is the product of these quantities: 0.03 * 4 = 0.12.


    ### Lucene’s Scoring Model


    Whereas single-term queries are good for learning and `their` internals, real
    production workloads deal with multiterm queries. Lucene builds a model combining
    all of what was discussed earlier in this chapter into a single generic model.


    Lucene’s core querying model is built on a boolean model; all multiterm queries
    are a family of clauses connected by predicates.


    The core idea for Lucene’s scoring algorithm is that it takes stock of the number
    of times a term appears in a document relative to the number of times the term
    appears in all documents in the said collection. If a document has 100 occurrences
    of the term, and the times the term appears in all documents is 10,000, that is
    a worse score than when a term appears 5 times in a document and 7 times across
    all documents in the collection.


    #### Fields


    Fields are the building blocks of documents. Documents consist of a set of fields.
    Note that Lucene’s scoring works on fields and not documents, so field representations
    are crucial in the way scores are computed.


    #### Similarity


    The `Similarity` class is what is responsible for the final “closeness” computation
    for a given term. Similarity can be overridden, and advanced users can write their
    own similarity. However, those are tricky waters to chart, so caution is advised.


    Once the boolean clauses identified for filtering terms are used to approve documents,
    they are then scored using the `Similarity` class defined. The default scoring
    model works on TF/IDF and computes results that are then returned upstream for
    further processing.


    ## Boosting


    Boosting can be done at three levels:


    - *Document-level boosting*: Can be specified at index time

    - *Field-level boosting*: Can be specified at the time of adding the field to
    the document

    - *Query level boosting*: Can be specified during querying by specifying boost
    on a specific clause in the query


    Boosts allow influencing the entire scoring decision and giving priorities to
    a specific document, field, or clause in a query.


    ## Collectors


    Collectors are the “file vault” of querying in Lucene. They collect hits as dictated
    by the given query. Collectors are very useful because they define the structure
    of results and can be used to process hits in a much more helpful manner. Examples
    include top-score docs collectors (described in the next section), elastic search
    aggregations, and so on.


    Users can write their custom collectors by implementing the `Collector` interface
    defined in Lucene. This facility allows for great flexibility in terms of what
    can be done with hits collected and how hits are returned/ranked.


    In most common search cases, the user cares only about the top N relevant hits
    for a given query and dataset. Top N query supported in Lucene is useful for building
    search engines, searching for items, and so on.


    Lucene provides a special mechanism to serve this exact specific set of queries.
    These are known as top N hits queries.


    Typically, a user must specify a `Collector` and a `Query` to the underlying `IndexSearcher`
    to get the query to populate the results needed. However, for the top N hits,
    the user can specify the query and the number of hits requested, and Lucene will
    internally create a `Collector` from a family of collectors (known as `TopScoreDocsCollector`)
    and return an object of a class named `TopDocs`. `TopDocs` is responsible for
    holding the top N hits of the given query.


    Internally, `TopScoreDocCollector` uses a priority queue to maintain documents
    according to their score. When the collection completes, the priority queue is
    used to return the top N hits.


    # 3. Core Search Fundamentals


    Queries are the fundamental building blocks in any application using Lucene, and
    so they should be. After all, Lucene is much loved because of its powerful search
    capabilities built on top of its sophisticated indexing models.


    This chapter covers Lucene core search fundamentals, the components involved in
    the process, and the more commonly used constructs used to tap into the power
    of Lucene search.


    As an overview, this chapter introduces you to the basics without delving too
    deeply into complex details.'
