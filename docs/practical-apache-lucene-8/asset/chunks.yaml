- fmt: '# Term Vectors


    As you may recall, a term is the basic searchable unit in Lucene. It consists
    of a pair of strings, the field name, and the value.


    Term vectors are a field-level data structure that are useful for a wide variety
    of operations. If a term vector is enabled for a field, all terms in the field
    will be present in the term vector, and the corresponding metadata will be computed
    for each term.


    Let’s take a look at a couple of use cases to understand the value of term vectors.


    Consider a case in which a user wants to mine similarity between two documents,
    or wants to get a preview of a data field from the hits given by a query. In both
    scenarios, the underlying task is to get extra metadata about hits once a query
    generates the corresponding hits.


    This kind of operation is hard in an inverted index because the structure and
    layout of inverted indexes do not allow easy fetching of content around a hit.
    To solve that specific issue, term vectors come to the rescue.


    We can use term vectors to get such data and to perform complex ranking (such
    as in the Vector Space Model), or similarity ranking, or just to get a text summary
    from a hit.


    ```

    RAMDirectory ramDir = new RAMDirectory();

    //Index some made-up content

    IndexWriter writer = new IndexWriter(ramDir, new StandardAnalyzer(), true,

    IndexWriter.MaxFieldLength.UNLIMITED);

    for (int i = 0; i < DOCS.length; i++){

    Document doc = new Document();

    Field id = new Field("id", "doc_" + i, Field.Store.YES,

    Field.Index.NOT_ANALYZED_NO_NORMS);

    doc.add(id);

    //Store both position and offset information

    Field text = new Field("content", DOCS[i], Field.Store.NO, Field.Index.ANALYZED,

    Field.TermVector.WITH_POSITIONS_OFFSETS);

    doc.add(text);

    writer.addDocument(doc);

    }

    writer.close();

    ```


    Think of term vectors as micro inverted indexes against a single document.


    The various modes of term vector construction include the following:


    *   `TermVector.YES`: Only store the number of occurrences.

    *   `TermVector.WITH_POSITIONS`: Store the number of occurrence and positions
    of terms, but no offset.

    *   `TermVector.WITH_OFFSETS`: Store the number of occurrence and offsets of terms,
    but no positions.

    *   `TermVector.WITH_POSITIONS_OFFSETS`: Store the number of occurrence and positions,
    and store the offsets of terms.

    *   `TermVector.NO`: Don''t store any term vector information.


    Term vectors store myriad metadata about the terms for the field that has the
    term vector enabled. Information stored includes the following:


    *   Document ID

    *   Field name

    *   Actual text of the term

    *   Frequency

    *   Position

    *   Offsets


    # BooleanQuery


    `BooleanQuery` is a fundamental construct used in querying Lucene and getting
    relevant documents. Because of its generic behavior and the diversity and expressiveness
    of its clauses, `BooleanQuery` is one of the most used query types.


    `BooleanQuery` allows specifying multiple clauses and their significance in the
    entire scoring/selection process.


    The boolean model was discussed in Chapter [2](#485809_1_En_2_Chapter.xhtml) —
    this chapter talks about `BooleanQuery` implementation in Lucene.


    You can assign three types of “levels” to a clause in a query:


    *   `MUST`: This clause must be matched by a document to be deemed a hit.

    *   `SHOULD`: These clauses are good to have and increase scores.

    *   `MUST NOT`: To be considered a hit, these clauses should not occur in the
    document.


    The following method carries out a `BooleanQuery`:


    ```

    private void booleanQueryExample(String firstQuery,

    String secondQuery) throws I0Exception, ParseException {

    searcher = new Searcher(indexDir);

    long startTime = System.currentTimeMillis();

    Term firstTerm = new Term("foo", firstQuery);

    Query internalFirstQuery = new TermQuery(firstTerm);

    Term secondTerm = new Term("bar", secondQuery);

    Query internalSecondQuery = new PrefixQuery(secondTerm);

    BooleanQuery query = new BooleanQuery();

    query.add(firstInternalQuery, BooleanClause.Occur.MUST_NOT);

    query.add(secondInternalQuery, BooleanClause.Occur.MUST);

    TopDocs hits = searcher.search(query);

    long endTime = System.currentTimeMillis();

    for(ScoreDoc scoreDoc : hits.scoreDocs) {

    Document doc = searcher.getDocument(scoreDoc);

    }

    searcher. Close();

    }

    ```


    # MultiTermQuery


    `MultiTermQuery` is a query type that matches a subset of terms and returns corresponding
    results.


    Multiterm queries are great when a query needs to filter by multiple terms. They
    are the equivalent of `IN` and `NOT IN` SQL constructs. Think of them as powerful
    tools for dynamic filtering. They prove especially useful when autogenerating
    queries through an application.


    Multiterm queries require a `FilteredTermsEnum` to be passed in for defining the
    set of terms to be used for filtering. A `FilteredTermsEnum` is an iterator of
    terms, which is basically a subset.


    Multiterm queries cannot be used directly (by invoking a constructor). Instead,
    they must be passed in a `FilteredTermsEnum`’s concrete implementation, and then
    `getTerms()` needs to be invoked.


    One popular version of `MultiTermQuery` is `TermRangeQuery`. `TermRangeQuery`
    allows specifying a range of terms to be used as the filter, both ends inclusive.
    Any term greater than or equal to a lower term and lesser than or equal to an
    upper term will match.


    ```

    //Assume the index already exists

    IndexReader reader = DirectoryReader.open(dir);

    IndexSearcher searcher = newSearcher(reader);

    TermRangeQuery query = new TermRangeQuery("content", new Term("foo"),

    new Term("bar"), true, true);

    searcher.search(query);

    ```


    The preceding code defines a range of terms, from “foo” to “bar.”'
