    Let’s now take a look at how to query the data we just wrote to the index.


    ## Document Search


    The Lucene search API takes a query and optionally a number of top hits to return.
    The documents to be returned are ordered by relevance and score. The score represents
    the “closeness” of the hit to the given parameters. The next chapter discusses
    Lucene ranking and scoring models. The following code executes a search and returns
    top N hits.


    ```

    private void performIndexSearch(File indexDir, String query, int maxHits) throws
    Exception {

    Directory directory = FSDirectory.open(indexDir);

    //Contents is the default field to be analyzed

    QueryParser parser = new QueryParser(Version.LUCENE_80, "contents'', new StandardAnalyzer());

    Query query = parser.parse(query);

    TopDocs topDocs = searcher.search(query. maxHits);

    //Get the top documents that were returned for this

    //query (specified by maxHits)

    ScoreDoc[] hits = topDocs.scoreDocs;

    for (int i = 0; i < hits.length; i++) {

    int docId = hits[I].doc;

    System.out.println(docId);

    }

    }

    ```


    Let’s now look at specifics of the code.


    `Directory` is the underlying implementation that allows accessing, loading, and
    reading the index being searched.


    ### QueryParser


    `QueryParser` generates a `Query` instance out of a query string. A query can
    consist of a family of clauses. A clause can be prefixed by `+` or `-`, indicating
    that the clause is `MUST` or `MUST_NOT`. as the preceding code shows, the constructor
    invoked defines the codec to be used (`LUCENE_80`), the default field (`"contents"`)
    and the analyzer to be used (`StandardAnalyzer()`).


    ### TopDocs


    `TopDocs` is the representation of the top documents that match the given query.
    They are a generic representation and do not necessarily depend on the underlying
    algorithm used to calculate how the top documents are calculated. `TopDocs` consist
    of two components: `scoreDocs` (the `documentIDs` of the top N hits, where N was
    the requested value) and the score of each of those hits. The score of a document
    is an Lucene internal concept discussed later in this chapter.


    The second part of `TopDocs` is `totalHits`, which represents the total number
    of hits.


    In the preceding code sample, we get `TopDocs` by specifying the query and the
    number of hits we want returned .


    ### IndexSearcher


    `IndexSearcher` is the abstraction present in Lucene that executes search over
    a single Lucene index. `IndexSearcher` is opened on top of `IndexReader`, which
    is used to read the underlying index using the `Directory` and corresponding abstractions.
    Note that we need `IndexReader` since the `Directory` might represent the index
    in a format that is not immediately useful for searching (hence the need for an
    abstraction to deal with the scenario).


    `IndexSearcher` instances are expensive to build and so should be reused unless
    the underlying index changes and the user wants to see the updated values. The
    `reuse` can be done by reopening the searcher with `DirectoryReader.openIfChanged(DirectoryReader)`.
    The constructor used in the preceding code opens an `IndexSearcher` with the given
    directory.


    ### IndexReader


    `IndexReader` is an abstraction provided to allow an interface to access an index.
    The two types of `IndexReader` are as follows:


    *   `AtomicReader` : These readers read actual files such as postings, doc values,
    terms, and stored fields. These operations are atomic.


    *   `CompositeReader` : `CompositeReader` instances are used to get stored fields
    from underlying `AtomicReaders`. Note that it is not possible to directly get
    a postings list from `CompositeReader` instances; you still need to get the underlying
    `AtomicReader` instances.


    ## Searching


    At the core of Lucene’s information-retrieval mechanism lies the scoring algorithms
    that determine the relevance of a document to the given query.


    Let’s first look at the query-execution model that Lucene uses.


    ### Boolean Model


    In the boolean model , a query is expressed as a family of AND, OR, and NOT connected
    predicates to find the documents that match a query.


    For example, the query x AND y AND z will only match documents that have x and
    y and z present.'
